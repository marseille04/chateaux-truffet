ssance de la cour intérieure. Le 28 janvier 1960 la partie ouest du donjon s'effondre pour deux raisons : selon une inspection du château, toute la partie sud « glissait » sur le rocher, et ce très ancien bâtiment n'est plus guère entretenu.","habitants":"Famille de la Rochefoucauld \r\n        \"","divers":"Rochefoucauld 45° 44' 48\" nord, 0° 22' 50\" est","gps":"","images":["../image/image_16/16_Rochefoucauld_1.jpg","../image/image_16/16_Rochefoucauld_2.jpg","../image/image_16/16_Rochefoucauld_3.jpg","../image/image_16/16_Rochefoucauld_4.jpg","../image/image_16/16_Rochefoucauld_5.jpg"]},"Consult_chateau_formulaire1f2e":{"id":"Consult_chateau_formulaire1f2e","dept":"16","canton":"Val-de-Tardoire","commune":"La Rochette","nom":"Rochette_16","type":"Manoir","periode":"XVI-XVIII","histoire":"ROCHETTE, ce fief des Rousseau ou Rousselet de La Rochette est passé aux Tizon d'Argence au XIVe siècle, en 1579 mariage d'Anne Tizon avec jean Frottier de la Messelière écuyer seigneur de Coussay. En 1726 la seigneurie de la Rochette et le logis passe à la famille de Paris.  Jean de Paris, conseiller au présidial d'Angoulème et en 1752 la Rochette passe aux Souc de Plancher seigneur de la Garélie, époux de Marguerite Magdeleine de Chérade de Montbron eurent deux filles célibataires, Elisabeth et Madeleine-Honorée s'y installe après la Révolution elle mourront en 1838, le domaine passe aux Guitard de Riberolles, puis aux comte de Causans qui en 1946 en fera don à la commune de la Rochette transforma le logis en mairie et l'étage en salle des fêtes sous verrière.","architecture":"ROCHETTE, la construction  date de 1580 à 1617,  et à nouveau, remanié au XVIIIe siècle. Le logis carré possède à ses quatre angles des tourelles à culot coiffées de toits en poivrière dont une avec escalier à vis. Les ouvertures datent pour certaines de la construction du logis au XVIe siècle, d'autres du XVIIIe siècle. Les toitures ont été arasées, l'édifice à trois niveaux, de plan carré avec petites baies obturées par des grilles ainsi que des occuli au rez-de-chaussée le second étage fut décapité et l'ensemble fut très modifié. Il reste sa cuisine voutée et la porte d'entrée de la chapelle située à l'entresol, disparue, inscrit aux M.H. partiellement depuis le 3/07/1992, excepté les toitures, la verrière et l'escalier extérieur.","habitants":"Famille de Paris\r\n        \"","divers":"Rochette 45° 48' 12\" nord, 0° 18' 43\" est2","gps":"","images":["../image/image_16/16_Rochette_16_1.jpg","../image/image_16/16_Rochette_16_2.jpg"]},"Consult_chateau_formulaireafa2":{"id":"Consult_chateau_formulaireafa2","dept":"16","canton":"Charente-Champagne","commune":"Angeac-Champagne","nom":"Roissac","type":"Château","periode":"XV-XVI","histoire":"ROISSAC , initialement relevant du comté d'Angoumois, la terre de Roissac était une seigneurie qui faisait partie, avec Marville et Gensac d'une transaction qui a eu lieu en 1231 entre les comtes d'Angoulême, en l'occurrence Hugues X de Lusignan et sa femme Isabelle, ex-reine d'Angleterre, et Itier II de Barbezieux, de Saintonge. Ce dernier renonçait aux droits sur la châtellenie de Merpins en échange de ceux sur ces trois seigneuries. Geoffroy Ier de La Rochefoucauld reçoit ces terres en héritage d'Agnès de Barbezieux. Elles passent ensuite par mariage aux  de Pons, aux Mortemer, aux La Rochefoucauld, aux Lusignan. À cet emplacement ont existé une villa gallo-romaine puis un logis seigneurial du Moyen-Age. Le château actuel aurait été bâti pour les Beauchamp vers 1770.  Le château de Roissac porte la date de 1830, mais ce serait un château construit au Moyen Age, pour la famille La Rochefoucauld. Arlette Lardillon, accablée de dettes, la châtelaine de limposant domaine de Roissac. Le Château a été mis aux enchères et vendu. Sa propriétaire a été expulsée le 27.10.2017.","architecture":"ROISSAC, porte la date de 1830, mais ce serait un château construit au Moyen-Age pour les La Rochefoucauld, à l'emplacement d'une villa gallo-romaine. La date de 1830 accompagnée des initiales I.P. correspond à des remaniements des dépendances. Il présente des décors et en particulier dans le salon, des lambris ornés de toiles peintes avec oiseaux, fleurs, fruits, paysages, scène avec un semeur, Moïse et les tables de la Loi. Il a été inscrit comme M.H. le 13 avril 1989. \r\n Le manoir de Lorimont qui selon certains érudits (dont Martin Civat) existait déjà au XVIe siècle a été reconstruit au XIXe siècle, et porte l'inscription « Fait en 1831. Chaillou Paul ».","habitants":"Famille de  La Rochefoucauld\r\n        \"","divers":"Roissac 45° 37' 03\" nord, 0° 16' 59\" ouest","gps":"","images":["../image/image_16/16_Roissac_1.jpg","../image/image_16/16_Roissac_2.jpg","../image/image_16/16_Roissac_3.jpg"]},"Consult_chateau_formulairec4b3":{"id":"Consult_chateau_formulairec4b3","dept":"16","canton":"Charente-Bonnieure","commune":"Romazières -Loubert","nom":"Romazières_Loubert","type":"Château","periode":"XIII-XV-XVI","histoire":"Trois châteaux à Roumazières-Loubert celui de Chambes, Peyras et Sablières.                              CHAMBES,  en 1444 relevait de la seigneurie de la Tour de Loubert. Au XVIe siècle le domaine passe à Hélie Manson vassal du prince de Chabanais, en 1594, la fille ainée de François, Marie, épouse René Barbarin, seigneur de Litrat; en 1680  le seigneur de Chambes François Barbarin écuyer, le domaine relève  des maitéries de la Porte, de Chambes, de Genest,  de la Forge et autres. En 1780 les seigneurs de Chambes et de Laplaud sont rattachés à Jean Lucas sieur de la Brousse. Au XVIIIe siècle un cousin de Barbarin Léon Aubain Sardain ancien gendarme du roi, seigneur de la Soutière de Champferrand et autres lieux devient propriétaire meurt en 1793 ses neveux Pierre-Daniel et Jean-Jacques Sardain   a leur mort le château passe au deuxième fils d de Jean Jacques, leur fille héritière Juliette épouse Jean Sardain qui en 1912 se défait de Chambes qui fut acquis par madame Roth le Gentil.  En 2008, a été acheté par l'imitateur Yves Lecoq qui y a fait aménager des chambres d'hôtes, est inscrit aux M.H.depuis le 8/12/2009.\r\nPEYRAS les archives du Moyen-Age ont disparu, mais au cours de travaux on a eu la certitude qu'il existait avant le XIIe siècle. Du XVe siècle au XVIIIe siècle il a été le fief de la famille Feydeau de Peyras, seigneurs de Roumazières.","architecture":"CHAMBES, construit du XIIIe, reconstruit au XVIe siècle sur des murs existants comme le montre sa façade encadrée de deux tours gauche par un angle saillant. l'édifise se compose de deux corps de bâtiments en équerre en façade  un pavillon carré à toit pyramidal serait plus récent. Le château a gardé du XIIIe siècle deux petites tours d'entrée de l'ancienne enceinte fortifiée. \r\nPEYRAS  le logis rectangulaire avec étage et sa charpente mansardée recouverte de tuiles plates datent du XVe siècle, d'une reconstruction après la guerre de cent ans. Il présente toutes les caractéristiques des constructions frustes et solides de la Charente limousine. Il a possédé cinq tours, deux carrées et trois rondes d'un diamètre de 10 m, dont il ne reste qu'une, coiffée d'une poivrière couverte de tuiles plates. La façade ouest qui présente une porte du XVIIe siècle est semble-t-il de construction plus tardive. L'intérieur possède une salle basse qui communique avec la chapelle à huit arcades située dans la tour. Le corps de logis oriental et la tour cylindrique nord-est du château ont été inscrits M.H. par arrêté du 21 décembre 1998.","habitants":"Chambes Yves Lecoq                                                    Peyras   famille Feydeau de Peyras\r\n        \"","divers":"Chambes GPS : 45° 54' 34\" Nord et 0° 34' 50\" Est         Peyras  45° 52' 18,12\" Nord, 0° 36' 23,04\" Est","gps":"45° 54' 34\" Nord et 0° 34' 50\" Est         Peyras  45° 52' 1","images":["../image/image_16/16_Romazi%c3%a8res_loubert_1.jpg","../image/image_16/16_Romazi%c3%a8res_loubert_2.jpg","../image/image_16/16_Romazi%c3%a8res_loubert_3.jpg","../image/image_16/16_Romazi%c3%a8res_loubert_4.jpg","../image/image_16/16_Romazi%c3%a8res_loubert_5.jpg","../image/image_16/16_Romazi%c3%a8res_loubert_6.jpg","../image/image_16/16_Romazi%c3%a8res_loubert_7.jpg"]},"Consult_chateau_formulaire2c36":{"id":"Consult_chateau_formulaire2c36","dept":"16","canton":"Tude-et-Lavalette","commune":"Rougnac","nom":"Rougnac","type":"Château","periode":"XV-XVI","histoire":"ROUGNAC, les propriétaires de ce château médiéval dont la construction a débuté au XIIe siècle sont connus depuis le règne de Louis IX. Le château actuel qui a succédé à un château primitif est attesté appartenir à Hélie Arnaud en 1238. Par mariages et héritages ce sera Jean de Birac en 1454, puis les Raymond, les Ranconnet, les Galard de Béarn qui deviendront seigneurs du Repaire (ils ont donné la branche Galard du Repaire) et le possèderont jusqu'à la Révolution. Les terres qui couvraient plus de 1 000 ha ne font plus que 160 ha et à la Révolution le château est déjà en mauvais état. Par héritage, il passe alors aux Vassoigne, cousins des Galard, puis par mariage aux Roffignac qui le possédaient encore au début du XXe siècle. Proche de la ligne de démarcation, il fut le siège de la Kommandantur durant la seconde guerre mondiale. \r\nMONCHOIX,  haras et des chambres d'hôtes.  Un couple de Hollandais Wilja et Rien Van Aart et ses dix-huit chevaux sont installés au château de Monchoix à Rougnac. Ils espèrent développer des chambres d'hôtes et des stages de dressage.","architecture":"ROUGNAC, le château est situé au bord d'un étang ce qui rend le site pittoresque. L'entrée se fait par un pont dormant et un châtelet d'entrée du XVe siècle sur une terrasse bordée d'arcades du XVIIe siècle. Il y a une imposante tour ronde avec créneaux et mâchicoulis, et une tour d'escalier. La tour du XVIe siècle a son linteau orné des trois blasons des Raymond, Ranconnet et Galard de Béarn. Le logis en partie du XVe siècle, réaménagé au XVIIIe siècle, comporte une grande cave voûtée. Une échauguette surplombe les douves. Le logis comporte encore ses dallages de tomettes anciennes et ses plafonds d'époque. Une partie, le châtelet d'entrée, l'aile ouest des communs, le logis, la terrasse et la tour a été inscrite au M.H.  le 14 avril 1997.","habitants":"Rougnac Famille de Vassoigne                           Monchoix famille de Wilja et Rien Van Aart \r\n        \"","divers":"Rougnac  45° 32' 26,88\" Nord, 0° 21' 56,16\" Est          Monchoix grav 3","gps":"","images":["../image/image_16/16_Rougnac_1.jpg","../image/image_16/16_Rougnac_2.jpg","../image/image_16/16_Rougnac_3.jpg"]},"Consult_chateau_formulairecd94-2":{"id":"Consult_chateau_formulairecd94-2","dept":"16","canton":"Charente-Nord","commune":"Ruffec","nom":"Ruffec","type":"Château","periode":"XIX","histoire":"RUFFEC, au début du XIe siècle, la terre de Ruffec fut donnée par les Taillefer aux seigneurs de Marcillac et de Montignac. D'abord baronnie, elle devint une vicomté. Au XIVe siècle, la terre de Ruffec passa dans la maison des Volvire avec le mariage d'Hervé de Volvire avec Eléonore de Ruffec. Entre le Xe et XVIIIe siècles, comme sa voisine Condac, Ruffec était le siège d'une viguerie, qui rendait la justice localement. Elle était alors dans le diocèse de Poitiers, puis fut rattachée aux six autres du comté d'Angoulême, qui en comptera une vingtaine de par son extension au XIe siècle. La ville se bâtit un château forteresse, avec l'aide de la riche abbaye de Nanteuil, une église, et, peu à peu, établit son habitat sur le promontoire qui domine ses deux rivières, le Lien et la Péruse, dont la première est la mystérieuse résurgence de l'autre. La ville de Ruffec était entourée d'une ceinture de murailles, dont le périmètre était assez important, mais dont il ne reste rien. Le château, siège de la seigneurie, était à l'extérieur de ces murailles, sur une plateforme dominant le Lien, en vis-à-vis de la ville. En 1790, Ruffec devient chef-lieu de son district. En 1800, elle devient chef-lieu de l'arrondissement de Ruffec. Elle le restera jusqu'en 1926. Propriétaire du château  Jacques Dupuy","architecture":"RUFFEC, c'est un bâtiment rectangulaire imposant avec sur la façade une symétrie de deux portes et trois fenêtres, à l'étage cinq grandes fenêtres rectangulaires, un toit à la Mansart à deux ouvertures. Le toit est curieusement recouvert de tuiles et d'ardoises. Les dépendances ont été remaniées au XIXe siècle.Son parc de 15 ha comporte des bassins et  des statues et  clos par des murs. Les importantes dépendances de 3000 m2 sont de style Renaissance. Le château de Ruffec est de style Néo-Gothique et Néo-Renaissance.","habitants":"Famille de Ruffec\r\n        \r\n        \"","divers":"Ruffec  GPS : 46° 1' 38,67\" N, 0° 12' 8,36\" Est grav 1-2 Vieux château grav  3-4                                               Duportal grav 5","gps":"46° 1' 38,67\" N, 0° 12' 8,36\" Est grav 1-2 Vieux château gra","images":["../image/image_16/16_Ruffec_1.jpg","../image/image_16/16_Ruffec_2.jpg","../image/image_16/16_Ruffec_3.jpg","../image/image_16/16_Ruffec_4.jpg","../image/image_16/16_Ruffec_5.jpg"]},"Consult_chateau_formulairebdb1":{"id":"Consult_chateau_formulairebdb1","dept":"16","canton":"Charente-Bonnieure","commune":"Beaulieu sur Sonette","nom":"Sansac","type":"Château","periode":"XVII","histoire":"SANSAC Le château de Sansac est un château élégant, de style Renaissance. Il fut le berceau d'une des familles les plus remarquables de l'Angoumois, la famille Prévost de Sansac, d'où sont issues les branches de Lavauzelle, de Touchimbert et de Traversay. Le membre le plus connu de la famille est Louis Prévost de Sansac, qui fut un fidèle compagnon d'armes du roi François Ier, puis devint gouverneur de l'Angoumois. Il avait été fait prisonnier à la bataille de Pavie mais il réussit à s'échapper en sautant sur le cheval d'un Espagnol. A 80 ans, il se signalait encore par son ardeur guerrière. Il mourut à l'âge de 84 ans, probablement à Cognac. L'état des paroisses de 1686 nomma la Comtesse de Sansac, comme dame de cette paroisse de Beaulieu de 94 feux (maisons) où étaient produits du grain et des châtaignes et où se pratique l'élevage.  Au XVIIe siècle et au début du XVIIIe siècle, une branche de la famille Bardonin (ou Bardonnin) étaient comtes de Sansac et habitaient au château de Sansac. [1530] Loys Prévost, seigneur de Sansac, ami de François Ier (prisonnier à Pavis, gouverneur de l'Angoumois) bâti l'édifice; Il est la souche des familles Prévost de Lavauzelle, Prévost de Touchimbert et Prévost de Traversay, au XVIIIe siècle Famille Bardonnin.\r\n[Révolution] Famille Jacques Montaxier, officier d'Empire; ses héritiers le vendent.","architecture":"SANSAC, corps de logis central  de plan rectangulaire à deux niveaux sur soubassement flanqué en façade de deux tours rondes saillantes toit en poivrières, l'ensemble recouvert de tuiles. Le corps de Logis est flanqué de tours d'inégale largeur, coiffées de toits coniques; Aile, en retour d'équerre, adossée au corps de logis renferme au rez-de-chaussée, une galerie refaite au XIXe siècle, la porte du chateau s'ouvre à l'angle; terrasse sur la base d'une ancienne tour.","habitants":"Famille Prévost de Sansac\r\n        \"","divers":"Sansac 45° 55' 31\" Nord et 0° 23' 04\" Est","gps":"","images":["../image/image_16/16_Sansac_1.jpg"]},"Consult_chateau_formulaire0a00-2":{"id":"Consult_chateau_formulaire0a00-2","dept":"16","canton":"Charente-Nord","commune":"Paizy-Nauduoin","nom":"Saveille_Villefagan","type":"Château","periode":"XV-XVI","histoire":"SAVEILLE, le seigneur de Saveilles apparaît en 1591. Après la mort de son mari en 1591, «la Dame de Saveilles», qui était, semble-t-il, Charlotte de La Rochefoucauld, continue d'héberger un ministre : il s'appelle, d'un nom prédestiné; Guillaume Preschon ; et lorsqu'il vient à mourir au château, on ouvre son testament daté du 9 mars de l'année 1591 ou 1594. Le successeur de Preschon se nommait Pascard.  Le 1er février 1598, nous voyons cinq personnes de Villefagnan aller chercher à Saveilles le ministre Pascard. M. de Goulard était aussi seigneur du Breuil il préférait sans doute résider au Breuil, plutôt que de vivre à l'ombre du château de Saveilles. il appartint  au maréchal de Caumont la Force, au Grand Turenne et en 1700, on trouvera les de Goulard, marquis de Vervant et seigneurs de Roullet et Rochereau. Au XVIIIe siècle le comte Maurice de Bourdeille, le dernier de la branche de Saveilles, y est décédé, en 1888. Il laissait pour unique héritière Charlotte-Alix, mariée à M. Disnematin de Salles (de Limoges), dont la fille Hermine-Catherine-Adélaïde à épousé, en 1877, M. le Vicomte du Ligondès, originaire du Bourbonnais où il possède le château historique  de Rochefort . M. du Ligondès, ancien colonel d'artillerie, a deux fils, dont l'ainé, François, se propose d'habiter la terre de Saveilles.  propriétaire Dominique de Mas Lastrie.   TOURS, Villefagnan a été jusqu'à la Révolution un fief des évêques de Poitiers.  Le logis des Tours et ce qui reste du château Lesvescault, le château de lévêque construit au XVe siècle dans le bourg de Villefagnan. Le futur roi Henri IV, Roi de Navarre, y séjourna en 1586, événement mentionné dans le journal dHenri IV, aux archives du musée National de Pau (Pyrénées). Les tours, le porche et le mur de clôture sont inscrits M.H. depuis 1951..","architecture":"SAVEILLE, la construction date du XVe par la famille de Rochefaton, remanié au XVIe et XIXe siècle. C'est un ancien château fort de style Médiéval et Renaissance, est une vaste construction rectangulaire des XVe et XVIe siècles, entourée de fossés d'eaux-vives et flaquées aux angles de tours et tourelles en encorbellement, coiffées de poivrières. Mis à part, une reprise au début du XIXe siècle, tout l'ensemble porte la marque des deux époques où il a été construit, avec des croisées et lucarnes à meneaux de la dernière période ogivale ou des fenêtres à pilastres sculptés de la Renaissance. Le château de Saveilles allie des caractéristiques de château-fort à un décor Renaissance, entouré de vastes douves en eau, comprenant deux corps de logis disposés en L avec une tour à chaque extrémité. Il conserve encore une multitude de meurtrières, canonnières et mâchicoulis, de sculptures, lucarnes ornées de sujets mythologiques, et sa chapelle (XIXe siècle). La cour dentrée comprend un long bâtiment des communs et des tours dangle. C'est un des plus beaux châteaux de la région. C'est aussi un des plus importants au point de vue historique.  Il est inscrit aux M.H. depuis 2005.                                                                           TOURS, ces deux tours rondes coiffées de tuiles plates, entourent le porche d'entrée. Elles se continuent par un mur de clôture. La Révolution française y laissa ses marques : le Logis fut en partie détruit, ses terres vendues, mais le destin permit quil reprenne forme et vie en 1801.","habitants":"Famille  de Rochefaton\r\n        \r\n        \r\n        \r\n        \"","divers":"Saveilles  46° 02' 28\" Nord et 0° 00' 30\" Ouest              Tours 46° 00' 51\" Nord, 0° 04' 50\" Est","gps":"","images":["../image/image_16/16_Saveille_Villefagan_1.jpg","../image/image_16/16_Saveille_Villefagan_2.jpg","../image/image_16/16_Saveille_Villefagan_3.jpg","../image/image_16/16_Saveille_Villefagan_4.jpg","../image/image_16/16_Saveille_Villefagan_5.jpg","../image/image_16/16_Saveille_Villefagan_6.jpg"]},"Consult_chateau_formulaire0a06":{"id":"Consult_chateau_formulaire0a06","dept":"16","canton":"Boème-Echelle","commune":"Nanteuil en Vallée","nom":"Sers_Nanteuil","type":"Château","periode":"XV","histoire":"SERS  au Moyen Âge le siège d'une seigneurie, qui dépendait de l'évêché d'Angoulême et de la baronnie de Marthon. Les anciens seigneurs de Sers sont connus depuis le XIIIe siècle, comme Élie Arnauld et Pierre Arnauld de Sers. Au XVe siècle, Sers était possédé par la famille de La Tour, puis passa par mariage et héritage à Jean de Montalembert, qui devint seigneur de Sers, à condition que son premier-né prendrait le nom et les armes des de La Tour. Vers la fin du XVIIe siècle, Sers passa par mariage d'Anne de Montalembert à François Des Bordes, écuyer, seigneur de Gensac, dont hérita plus tard son arrière-neveu, François du Chasteigner de La Rochepozay.","architecture":"Le château de Sers , situé derrière l'église, est d'origine féodale et a appartenu aux Latour de Montalembert. Il a été remanié au XVIIIe siècle. On note la présence d'une remarquable fenêtre du XVe siècle surmonté d'un blason aux armes des Latour. Il accueille actuellement des chambres d'hôtes.","habitants":"Famille des Arnauld de Sers.\r\n        \"","divers":"Sers 45° 35' 53\" Nord, 0° 19' 25\" Est","gps":"","images":["../image/image_16/16_Sers_Nanteuil_1.jpg","../image/image_16/16_Sers_Nanteuil_2.jpg","../image/image_16/16_Sers_Nanteuil_3.jpg","../image/image_16/16_Sers_Nanteuil_4.jpg","../image/image_16/16_Sers_Nanteuil_5.jpg","../image/image_16/16_Sers_Nanteuil_6.jpg"]},"Consult_chateau_formulaire717d":{"id":"Consult_chateau_formulaire717d","dept":"16","canton":"Val-de-Tardoire","commune":"Coulgens","nom":"Sigogne","type":"Manoir","periode":"XIV-XV","histoire":"SIGOGNE Logis du Campus La construction du Logis de Sigogne date du XIVe au XVe siècle. Ses premiers propriétaires étaient les seigneurs de Sigogne. Un premier seigneur était attesté en 1463. Après la Révolution, le Logis de Sigogne fut vendu comme bien national et divisé en 25 lots.    RULLE, à Sigogne, logis de Rulle, présumé être du XVIIe siècle. Sous l'Ancien Régime, il appartenait à la famille de Lestang de Rulle, seigneurs de Sigogne. Cette famille a compté en son sein des ancêtres de Madame de Maintenon et de l'écrivain Agrippa d'Aubigné. Le Logis de Rule est un manoir bâti à Sigogne, L'édifice date du XVIIe siècle. Pierre de Lestang, chevalier, seigneur de Rulle, a été mentionné en 1702. Il fut marié en 1716 avec Jacquette du Puy. C'est la première indication concernant le toponyme de Rulle.","architecture":"SIGOGNE, il présentait encore d'importants vestiges des XIIIe et XIVe siècle au cours du XXe siècle. Il s'agissait d'un ensemble de plan carré ou rectangulaire dont il ne subsiste que la tour qui surmontait l'entrée et des salles souterraines. Cette poterne a été aménagée au XVe siècle. De chaque côté de l'entrée, un rempart aboutissait à une tour d'angle, cylindrique. A la moitié du XVIIIe siècle, des bâtiments d'habitation furent construits autour de la poterne. Mais ils furent détruits dans la seconde moitié du XXe siècle. La tour poterne est percée à sa base d'un passage voûté en berceau brisé. Elle est flanquée d'une tourelle hexagonale contenant un escalier en vis dont l'accès se fait à l'Ouest, côté cour, par une porte à ouverture rectangulaire. Il ne reste que la haute et imposante tour d'entrée du XIVe siècle et la tour d'escalier polygonale dont elle a été flanquée au XVIe siècle. Le logis dont elle desservait les étages a disparu. Les bâtiments du XVIIe siècle qui formaient deux ailes en équerre donnant sur une terrasse ont été rasés en 1970 après que les boiseries et les autres éléments de décor aient été vendus. L'ensemble a été restauré par le club Marpen, entre 1985 et 2008. Les vestiges du Logis de Sigogne sont inscrits aux M.H. le 8/10/1986. Aujourdhui, le Logis de Sigogne appartient à une association.                                                                       RULLE,  il possède un étage carré et un étage de comble. A 3 kilomètres, le vieux Logis de Rulle, qui aurait été construit au XVIIe siècle, sous l'Ancien Régime.","habitants":"seigneur de Sigogne   Famille de Lestang de Rulle\r\n        \"","divers":"Sigogne  45° 49' 29\" Nord, 0° 16' 05\" Est                     Rulle 45° 44' 16\" Nord, 0° 09' 25\" Ouest  grav 2","gps":"","images":["../image/image_16/16_Sigogne_1.jpg","../image/image_16/16_Sigogne_2.jpg"]},"Consult_chateau_formulaire220a":{"id":"Consult_chateau_formulaire220a","dept":"16","canton":"Val-de-Nouère","commune":"Sireuil","nom":"Sireuil","type":"Château","periode":"XVIII","histoire":"SIREUIL  En 1838, une tréfilerie a succédé à un ancien moulin à blé sur la Charente, au nom de Malagou, Cordier et Bouzac. Dans l'année qui suit, une forge a été ajoutée, puis un haut fourneau en 1846. La société devient alors anonyme. Pierre-Émile Martin, ingénieur et industriel, met alors au point un procédé d'affinage de l'acier, qu'il expérimente à Sireuil, et la forge devient une aciérie en 1860. Elle comprenait alors un four Martin, un haut fourneau, quatre fours à puddler et deux marteaux-pilons. C'était, dans son genre, le seconde usine du département, après la fonderie de Ruelle. On y fondait des poutres métalliques, et aussi des canons de fusils pendant la guerre de 1870. Mais après le départ d'Émile Martin, l'usine périclite rapidement, et en 1882, le matériel commence à être vendu. En 1884, elle ferme, et une usine de fabrication de feutre ou mégisserie est ouverte en 1894 par M. Lehmann (Procop), papetier à La Couronne. L'usine devient une tannerie en 1923. Des ateliers de fabrication en shed sont construits entre 1926 et 1930, ainsi que le bâtiment frigorifique où étaient stockées les peaux. Le finissage s'effectuait aux étages.","architecture":"SIREUIL,  l'activité s'est arrêtée en 1981. Le bâtiment d'eau a été transformé par la suite en micro-centrale hydroélectrique, les autres bâtiments sont désaffectés.  La mairie occupe un logis du XVIIIe siècle situé près de l'église qui est inscrit monument historique depuis 1964.","habitants":"Famille  de Malagou\r\n        \"","divers":"45° 36' 59\" nord, 0° 00' 38\" est","gps":"","images":["../image/image_16/16_Sireuil_1.jpg","../image/image_16/16_Sireuil_2.jpg"]},"Consult_chateau_formulaire4c11":{"id":"Consult_chateau_formulaire4c11","dept":"16","canton":"Boixe-et-Manslois","commune":"Saint-Amant de Bonnieure","nom":"St_Amant_Bonnieure","type":"Manoir","periode":"XV","histoire":"St-AMANT-BONNIEURE, les plus anciens seigneurs de Saint-Amant-de-Bonnieure furent Louis Dexmier puis son fils Guillaume. La famille conserva le domaine et le logis jusqu'en 1550 puis il passa par le mariage de Jacquette Dexmier à René Ravard, seigneur d'Oriou.  En 1666, Jacques de Ravart, seigneur de Saint-Amant, était sénéchal du duché de La Rochefoucauld. Seigneurie et logis de Saint-Amant-de-Bonnieure passent en 1765 à Jacques Rioux qui les vend en 1772 à Pierre de Montalembert. Les plus anciens registres paroissiaux remontent à 1679. Au Châtenet existait au XIIIe siècle un petit château dont le possesseur avait droit de haute justice. Ce château fut probablement détruit pendant la guerre de cent ans. Au XVIIIe siècle, le fief du Châtenet dépendait de la baronnie de Verteuil et appartenait à la famille Salomon. Sur la rive gauche de la Bonnieure, le fief de la Borde était possédé par Jacques Le Mercier, seigneur de La Borde et de La Trimouille (à Saint-Angeau), qui a fait partie du ban de 1635. Le logis a été démoli en 1888 par son propriétaire il a été reconstruit au XVe siècle, pour Guy Dexmier, seigneur de Saint-Amant-de-Bonnieure. Il passa par succession et mariage puis fut vendu en 1780 par Jacques Rioux au marquis Pierre de Montalembert.","architecture":"ST-AMANT, le logis est constitué de deux corps de bâtiments en équerre datant du XVe siècle avec des fenêtres à moulures et une porte principale de style gothique flamboyant, encadrée de pinacles et surmontée d'un gâble orné d'un fleuron. La porte cochère est surmonté d'un écusson martelé. La tourelle comporte un escalier à vis. La charpente et les poutres peintes de la grande salle du rez-de-chaussée sont remarquables et ont été classés aux M.H.le 21/03/1983. Le Logis de Saint-Amant-de-Bonnieure abrite dans ses murs, la mairie.","habitants":"Famille de  Guy Dexmier\r\n        \"","divers":"St-Amant 45° 51' 06,84\" Nord, 0° 17' 39,12\" Est","gps":"","images":["../image/image_16/16_St_Amant_Bonnieure_1.jpg"]},"Consult_chateau_formulaire1e60":{"id":"Consult_chateau_formulaire1e60","dept":"16","canton":"Cognac","commune":"Saint-Brice","nom":"St_Brice","type":"Château","periode":"XVI-XVII","histoire":"Trois châteaux à Saint-Brice celui de Saint-Brice de la Garde-Epée et Hufaud article suivant pour ces deux derniers.                                                                       St-BRICE,  passa  aux mains de la famille Poussard, de Fors, en Poitou. Un membre de cette famille, Jean Poussard, épousa Catherine Gasteuil, dame de Saint-Trojan. Cest très probablement à leurs fils aîné, Charles Poussard, quest due la construction du château actuel de Saint-Brice,  qui le laissa à son fils Daniel, qui eut lhonneur de recevoir Catherine de Médicis et sa cour, lors des conférences de 1586 avec le roi Henri III de Navarre. Le mariage de Suzanne Poussard, sur de Daniel, avec Louis dOcoy, seigneur de Saint-Trojan, porta la terre de Saint-Brice dans la famille dOcoy, dont deux membres, Jean-Casimir dOcoy et François dOcoy, fils et petit-fils de Louis dOcoy, en 1651, François dOcoy Les seigneurs de Saint-Brice, protestants, redeviennent catholiques à la révocation de lÉdit de Nantes, en 1685. Vers 1734 ou 1736, la terre de Saint-Brice passa, avec Saint-Trojan, entre les mains de la famille de Maulevrier. À lépoque de la Révolution, Saint-Brice était possédée par messire Jean-Baptiste des Nanots, écuyer, conseiller au parlement de Bordeaux, qui avait épousé Anne-Rosalie de Maulevrier, en 1792 vendu à Michel-Desprez-Delaunay son gendre le général Guillaume Joseph de Brémont d'Ars sénateur de la Charente. A la fin du XIXe siècle le baron Otard de la Grange négociants rachète le domaine et le revende en 1915  à la famille Hennessy qui le possède toujours.","architecture":"St-BRICE, du XVIe et XVIIe siècles,  le général de Brémond d'Ars entreprit d'importantes restaurations vers 1875. Le logis à deux  étages est encadré de tourelles couvertes de poivrières percées à la base de Canonnières. Demeure de plaisance, à sept travées qui sont éclairés par des fenêtres à meneaux encadrées de fines moulures, la terrasse  bordée par une balustrade. Du côté cour subsiste une partie de l'appareil défensif de l'ancienne maison forte, notamment un mur d'enceinte reliant une grosse tour couronnée de mâchicoulis au nord ouest une autre tour dont il subsiste que la base. Sa toiture d'ardoise à deux pentes présente en façade, comme le premier étage, cinq fenêtres en partie prises sur la façade et en partie au niveau du toit, ayant chacune un fronton de pierre sculptée. Le château de Saint-Brice est une propriété privée, il ne se visite pas, sauf pendant les Journées européennes du patrimoine. Il est toutefois visible de l'extérieur et en bateau sur le fleuve Charente.","habitants":"Famille Poussard                                                           famille de Maulevrier.\r\n        \"","divers":"St-Brice grav 1-2","gps":"","images":["../image/image_16/16_St_Brice_1.jpg","../image/image_16/16_St_Brice_2.jpg"]},"Consult_chateau_formulaire0250":{"id":"Consult_chateau_formulaire0250","dept":"16","canton":"Cognac","commune":"Saint-Brice","nom":"St_Brice_2","type":"Château","periode":"XV-XVII-XIX","histoire":"A Saint-Brice deux châteaux dont celui de St-Brice (voir article) et de la Garde Epée, Huffaut et Chatenay (voir article).                                                                  GARDE-EPEE, le 7 janvier 1553, le sieur Ancelin, marchand, achète ce fief au marquis de Caravaz  avec permission d'y édifier une maison à créneaux avec une fuie gigantesque, vivier et garenne. Vers le milieu du XVIIe siècle, Jean Ancelin étant mort sans enfants, ses héritiers vendirent le domaine de Garde-Épée à un M. Richard, qui en était encore possesseur en 1698. Enfin le logis de Garde-Épée passa dans la famille de Jarnac de Garde-Épée, qui le possède encore aujourd'hui avec l'abbaye de Châtre, par l'intermédiaire d'une société privée, la société de Garde-Épée, dont le principal actionnaire est Henri de Jarnac.           HUFFAUD, on trouve mention de la « mestairie Dufau » dans un acte du 10 février 1671. Jean Esrable des Barrières (1729-1799), frère de Guillaume, sieur de Saint-Rémy, sinstalle à Cognac en 1755. Il est conseiller du roi, juge civil et criminel de lélection de Cognac jusquen 1790. Il acquiert Uffaud  le 2 novembre 1757.","architecture":"GARDE-EPEE à droite, avant l'entrée, l'imposante fuie ronde comporte 2600 boulins. Elle est couverte d'un toit en poivrière avec trois lucarnes et date de 1553. Les armes des Ancelins sont visibles au-dessus de la porte. L'entrée est imposante avec une porte cochère surmontée d'une longue courtine couronnée de merlons. Les bâtiments forment un vaste quadrilatère. Le logis qui occupe le côté nord a été reconstruit fin XVIIIe avec deux niveaux sous une toiture basse; il est prolongé par deux ailes à un seul niveau. La cour comporte un curieux puits au centre couvert d'un toit. \r\nLe château est inscrit aux M.H.depuis le 30 octobre 1973. \r\nHUFFAUD, de la demeure ancienne, il ne reste quun portail crénelé se composant dune porte cochère et dune porte pour les piétons. Celle-ci est décorée de trois motifs géométriques gravés. Sur la clé de larc en plein cintre, des initiales surmontées dune couronne, avec au-dessus un triangle portant la date de juillet 1612. Les six merlons disposés au-dessus dune simple corniche sont couronnés de frontons triangulaires.","habitants":"Garde-Epée  famille de Jarnac de Garde-Épée   Chatenay famille Caminade                                        Huffaud Jean Esrable des Barrières\r\n        \"","divers":"Garde-Epée 45° 41' 22\" Nord et 0° 15' 37\" Ouest    St-Brice  45° 41' 12,84\" Nord, 0° 16' 40,08\" Ouest","gps":"","images":["../image/image_16/16_ST_Brice_2_1.jpg","../image/image_16/16_ST_Brice_2_2.jpg","../image/image_16/16_ST_Brice_2_3.jpg","../image/image_16/16_ST_Brice_2_4.jpg","../image/image_16/16_ST_Brice_2_5.jpg"]},"Consult_chateau_formulaire1365-2":{"id":"Consult_chateau_formulaire1365-2","dept":"16","canton":"Charente Bonnieure","commune":"Saint-Claud","nom":"St_Claud","type":"Château","periode":"XVI-XVII","histoire":"Quatre châteaux à Saint-Claud dont celui de la Boussardie, de Signac, des Ponts et du Treuil.            La BOUSSARDIE, en 1747 Louis Suzanne du Soulier fils de Louis Charles Léonard du Soulier, écuyer, capitaine au Royal de Cavalerie, chevalier de Saint-Louis et de Dame Anne-Marie de Perry au château de la Boussardie; en 1777  Louis du Soulier y habite et était marié à Anne Desmier de Chenon; en 1791  Baptême de Adolphe Emmanuel Garnier de la Boissière fils de Pierre, capitaine aux chasseurs à cheval et de Dame Marie-Eulalie  Boissière demeurant au lieu de la Boussardie; Marraine: Magdeleine d'Escravayat de Belat veuve de François  Boissière \"ayeulle de lenfant\".  En  1793 Achat de la Boussardie et de ses dépendances comme bien national par Joseph Martin-Lamothe;  On trouve des Martin, sieur de la Motte à partir de 1737.   Famille de Saint-Claud alliée entre autre aux Boissière, Rizat, et Daigueplas; en  1826 décès de Joseph Florent Martin, fils de Etienne Martin, sieur de la Motte et de Dame Jeanne Tenet à son domicile de la Boussardie. En XIXe siècle. Agrandi par M. Rizat-Laterrière (maire de Saint-Claud) souche de la famille Maze-Sencier;          Les PONTS,  en 1733  François Lousmeau, avocat en Parlement, sénéchal de Champagne-Mouton; Sa fille épouse de M. Sardainde Champ-Ferrand à Vitrac; en 1773 Madeleine (petite fille de François) épouse François  Sardain de Fonfaits (Chabanais);en  1851 Louis-Frédéric, marquis Dassier des Brosses.            TREUIL, en 1380 fief de Guillaume Ier Devezeau, Vaslet,  en 1789 même famille jusqu'en 1920 un Devezeau professeur à la Faculté de Médecine de Nancy; en 1851 Louis Guitard de Riberolles,    passa à M. de Lartige.","architecture":"la BOUSSARDIE, le corps de logis central à trois niveaux sur soubassements entre deux pavillons  carrés de quatre niveaux prolongé de chaque côté par des dépendances à trois  niveaux identique au corp de logis  et attiques, l'ensemble est recouvert de tuiles.      Les PONTS, domine la vallée du Son ; logis en L à deux niveaux toit en croupes; Porche sous pavillon;     TREUIL logis du Treuil, corps de logis en équerre avec  tour carrée médiévale (1998).édification d'un logis sur le côté sud,","habitants":"Famille de Saint-Claud\r\n        \"","divers":"La Boussardie grav 1-2-3                                              la Motte grav -5                                                               Treuil grav 4                                                                   Les Ponts grav 6","gps":"","images":["../image/image_16/16_St_Claud_1.jpg","../image/image_16/16_St_Claud_2.jpg","../image/image_16/16_St_Claud_3.jpg","../image/image_16/16_St_Claud_4.jpg","../image/image_16/16_St_Claud_5.jpg","../image/image_16/16_St_Claud_6.jpg"]},"Consult_chateau_formulairef30f":{"id":"Consult_chateau_formulairef30f","dept":"16","canton":"Boëme-Echelle","commune":"Claix","nom":"St_Georges_Claix","type":"Château","periode":"XV-XVIII","histoire":"Saint-GEORGES, château du Moyen-Âge, reconstruit ou entièrement restauré pour Antoine de Julgart dans la seconde moitié du XVIIIe siècle. Léon de Lescure de Combemary, devenu propriétaire du château en 1877, fait construire une laiterie en 1884, qui devient la laiterie coopérative en 1908.","architecture":"St-GEORGES, de plan carrée à trois niveaux avec terrasses accolé de tours rondes couvertes de toit en bulbes il de buf sur les flans. Construction de la distillerie en 1894 (porte la date) et des bureaux au cours du 1er quart du XXe siècle. En 1921, achat des terrains et du château par la coopérative. Les logements d'ouvriers datent sans doute de cette époque. Modernisation de l'usine avec de nouveaux ateliers de fabrication dans la 2e moitié du XXe siècle.","habitants":"Léon de Lescure de Combemary\r\n        \"","divers":"","gps":"","images":["../image/image_16/16_St_Georges_Claix_1.jpg","../image/image_16/16_St_Georges_Claix_2.jpg"]},"Consult_chateau_formulaire182c":{"id":"Consult_chateau_formulaire182c","dept":"16","canton":"Charente-Vienne","commune":"Saint-Germain de Confolens","nom":"St_Germain_Confolens","type":"Vestiges","periode":"XII-XV","histoire":"ST-GERMAIN, les premiers seigneurs de Saint-Germain connus sont Hélie en 1073 et Conis en 1087.  Les comtes de la Marche en furent possesseurs, puis la famille de Mortemart, puis par mariage les Rochechouart. En 1498 elle est vendue à Gauthier de Pérusse des Cars et passe à ses descendants. En 1570 la forteresse est prise par les protestants puis reprise par Jean des Cars.  Elle passa ensuite, par mariage, aux d'Armentières en 1750. Après la Révolution, la forteresse est vendue comme bien national, démantelée, puis les ruines sont rachetées en 1900 par le curé Laffay, données à l'évêché, puis reprise par le syndicat d'initiative de Confolens.","architecture":"St-GERMAIN, les ruines du XVe siècle, consistent en deux énormes tours, reliées entre elles par un corps de bâtiment. Ces tours ont la particularité d'être rondes à l'extérieur et carrées à l'intérieur, juchées au sommet d'une haute colline dominant le bourg. Il est inscrit M.H. depuis 1925.  Un donjon carré a été construit au XIIe siècle puis au XIIIe siècle la tour du Puits et au XVe siècle les deux grosses tours rondes à trois étages, hautes de 18 mètres et le logis. La troisième tour dite de la cuisine comportait six étages et une quatrième tour, un châtelet d'entrée et une deuxième ligne de muraille qui a récemment été restaurée complétaient les défenses. Les ruines consistent en deux énormes tours, reliées entre elles par un corps de bâtiment.","habitants":"Famille de Mortemart\r\n        \"","divers":"St-Germain 46° 03' 11\" nord, 0° 41' 07\" est1","gps":"","images":["../image/image_16/16_St_Germain_Confolens_1.jpg","../image/image_16/16_St_Germain_Confolens_2.jpg","../image/image_16/16_St_Germain_Confolens_3.jpg"]},"Consult_chateau_formulaire25e0":{"id":"Consult_chateau_formulaire25e0","dept":"16","canton":"Va-de-Tardoire","commune":"Saint-Projet-Saint-Constant,","nom":"St_Projet_St_Constant","type":"Château","periode":"XIV-XV","histoire":"Deux châteaux à Saint-Projet celui de l'Age-Baston, d'Ombrais et de Puyvidal.                                               AGE-BASTON  construit à Saint-Projet-Saint-Constant, à La Rochefoucauld, près d'un gouffre de la Tardoire. Son nom est attesté dès 1309. Il passera par de nombreux propriétaires : Eymeri du Leyrat, Benoist, Pasquet, de Lau, de Roffignac. Le château de l'Age-Baston a été reconverti en auberge et chambres d'Hôtes. \r\nOMBRAIS, bâti à Saint-Projet-Saint-Constant, a été construit, au XVe siècle, pour Jean de Valois, comte d'Angoulême.\r\nPUYVIDAL, le Vidal qui a donné son nom à la motte puis au château reste inconnu, le premier seigneur attesté est Guyot David qui rend hommage en 1267 au comte d'Angoulême Hugues de Lusignan. Le château de Puyvidal par les femmes en dot ou en héritage change plusieurs fois de famille et passe en 1456 à Charles de Livron. La famille de Livron gardera Puyvidal jusqu'en 1908. Il a été inscrit au M.H. le 18 septembre 2006.","architecture":"AGE-Baston, la maison forte de Beaumont, appelée aussi la maison de Saint-Constant, est bâtie à Saint-Projet-Saint-Constant,. Elle est attestée dès le XVe siècle et semble avoir été le fief de Beaumont. Elle est dotée de structures défensives (mâchicoulis, échauguette, corbeaux pour d'anciens hourds).\r\n OMBRAIS, le château des Ombrais vous propose la location de ses salles de réception pour fêter ces évènenements.                                                      PUYVIDAL, les trois tours cylindriques peuvent dater du XIIIe siècle. La tour nord-ouest a été remplacée en 1810 par un pavillon rectangulaire. La tour sud-ouest aurait pu être une salle de justice, mais sa transformation en appartement en a détruit les spécificités. Le logis, maison fortifiée rectangulaire, reconstruite au XVe siècle, est percée de fenêtres à meneaux. Il est adossé aux restes de la courtine nord. La porte, à moulures prismatiques, ouvre sur un escalier en uvre, chose peu courante à cette époque, la vis étant éclairée par des baies moulurées. Ses charpentes ont été modifiées au XIXe siècle transformant les toitures en toits plats.  Le bâtiment du XIXe siècle a été construit à la place de la courtine et de la porte médiévale.","habitants":"Age-Baston famille de  La Rochefoucauld           Ombrais, comte Jean de Valois                              Puyvidal famille de Livron\r\n        \"","divers":"OMBRAIS : 45° 37' 30,73\" Nord, 0° 6' 14,78\" Est      grav 3                                                                         Age-Baston GPS : 45° 44' 23\" Nord et 0° 21' 41\" Est   Grav-4                                                                  Beaumont r GPS : 45° 44' 23\" Nord et 0° 21' 41\" Est  Puyvidal 45° 43' 2\" nord, 0° 20' 28\" est grav 1-2","gps":"45° 44' 23\" Nord et 0° 21' 41\" Est   Grav-4","images":["../image/image_16/16_St_Projet_St_Constant_1.jpg","../image/image_16/16_St_Projet_St_Constant_2.jpg","../image/image_16/16_St_Projet_St_Constant_3.jpg","../image/image_16/16_St_Projet_St_Constant_4.jpg","../image/image_16/16_St_Projet_St_Constant_5.jpg"]},"Consult_chateau_formulaire744c":{"id":"Consult_chateau_formulaire744c","dept":"16","canton":"Charente-Bonnieure","commune":"Suaux","nom":"Suaux","type":"Maison forte","periode":"XVI","histoire":"SUAUX, le logis de Brassac fut construit par Jean de Volvire, seigneur de Brassac, vers 1610. Ce domaine passa en 1822 à la famille de James. Il fut un lieu de refuge pour la Résistance. Le logis nest pas visible de la route et lentrée du domaine est privée. La propriété possède un pigeonnier avec un toit à quatre pans recouvert de tuiles. Des vestiges d'une villa gallo-romaine du Ier siècle situés au lieu-dit chez Michaud ont été découverts en 1962 et classés  au M.H.en 1973. Ces vestiges ont été recouverts en 1985 et le pré a retrouvé sa vocation agricole. L'ancienne voie romaine de Saintes à Lyon passait en effet à proximité, au sud de la vallée de la Bonnieure, à un kilomètre. À la fin du XVIe siècle, Jean de Volvire, fils de Philippe de Volvire, baron de Ruffec, qui a joué un rôle important dans les guerres de religion du côté des catholiques en Angoumois, était seigneur de Brassac. Il a fait reconstruire le logis de Brassac en 1610. Le château du Suaux fut construit en 1585 par le marquis de Chesse, ou par le chevalier Isaac de Saint-Georges selon une autre source. Sous l'Ancien Régime, Suaux faisait partie avec les paroisses de Mazerolles, Cherves, Châtelars et Rouzède de la baronnie de Manteresse, qui a appartenu à Étienne Chérade, comte de Montbron et de Marthon.","architecture":"SUAUX,   du château de Suaux construit en 1585 il reste une partie où s'est installée la mairie depuis 1878 et une partie occupée par des logements. Du XVIe siècle restent une échauguette sur la mairie, un pigeonnier à 180 boulins, des fresques et une cheminée. Les fossés et le pont-levis ont disparu.","habitants":"Famille de James\r\n        \"","divers":"Suaux 45° 51' 09\" nord, 0° 30' 25\" est","gps":"","images":["../image/image_16/16_Suaux_1.jpg","../image/image_16/16_Suaux_2.jpg","../image/image_16/16_Suaux_3.jpg"]},"Consult_chateau_formulaire9f53":{"id":"Consult_chateau_formulaire9f53","dept":"16","canton":"Charente-Nord","commune":"La Forêt de Tessé","nom":"Tessé","type":"Maison forte","periode":"XVI","histoire":"TESSE, la Forêt-de-Tessé était le siège d'une seigneurie qui, dans les dernières années du XVIe siècle, était la propriété de Louis de Versac, écuyer. Ce dernier était alors en procès avec son voisin, Antoine Corgnol, seigneur de Tessé. François Corgnol son petit-fils sera l'écuyer du seigneur de Ruffec durant les guerres de Charles VII de France.  On voit encore à Tessé les restes d'un ancien logis, qui, depuis le milieu du XVe siècle jusqu'à la fin du XVIIIe siècle, demeura la propriété de la famille Corgnol. En 1634, Louis Corgnol, vendit Tessé à son cousin, Charles Corgnol, seigneur de Beauregard, à Ébréon, et par cette vente, fit passer la seigneurie aux mains de la branche cadette de la famille. Les Corgnol resteront seigneurs de Tessé jusqu'au XVIIIe siècle. Cette famille était une des plus anciennes et des plus importantes de la région, et ne s'est éteinte que vers le milieu du XIXe siècle.","architecture":"TESSE, le donjon carré, élément le plus ancien date  du XIe siècle. Les destructions causées durant la guerre de cent ans ne sont pas connues. Le logis a été édifié au XVe siècle. Certains éléments sont d'origine, la porte d'entrée, la salle du troisième étage, la cheminée monumentale, les baies à coussièges de la façade sud, a gardé son aspect originel. C'est la porte d'origine. La partie sud-est a gardé sa charpente dite « à l'anglaise », datée du XVe siècle. \r\nUne restauration a eu lieu au XIXe siècle.","habitants":"Famille de Louis de Corgnol\r\n        \"","divers":"Tessé 46° 04' 13\" nord, 0° 04' 45\" est2","gps":"","images":["../image/image_16/16_Tess%c3%a9_1.jpg","../image/image_16/16_Tess%c3%a9_2.jpg"]},"Consult_chateau_formulaire3894":{"id":"Consult_chateau_formulaire3894","dept":"16","canton":"Angoulême","commune":"Angoulême","nom":"Tourgarnier","type":"Tour-Château","periode":"XIII-XVI","histoire":"TOURGARNIER, du XVIe au XVIIIe siècle, ses possesseurs sont la famille de La Place, seigneurs de La Tour-Garnier, Torsac, Javerlhac et Montgauguier. En 1506, Pierre de La Place, seigneur de La Tourgarnier est maire d'Angoulême. Son fils, Hélie, écuyer, seigneur de Torsac et de La Tourgarnier, protestant, devient à son tour maire d'Angoulême en 1561. Il était un proche de Calvin lorsque celui-ci vint à Angoulême en 1533-1534. Il fit rebâtir le logis de la Tour-Garnier.  En 1565, lorsque la régente Catherine de Médicis et son fils le roi Charles IX, alors âgé de 15 ans, s'arrêtent à Angoulême pour calmer les esprits suite aux guerres de Religion qui font beaucoup de ravages en Angoumois, c'est donc naturellement dans la demeure du maire, la Tourgarnier, qu'ils séjournent pendant cinq jours. En 1778, le logis devient la propriété de Claude Ogerdias, maître particulier des Eaux et Forêts d'Angoulême, puis passe aux Ducluzeau en 1788. En janvier 2011, la propriété est vendue et la nouvelle propriétaire a fait d'importants travaux d'aménagement d'intérieur ainsi que les jardins.","architecture":"TOURGARNIER, l'origine de la  tour, carrée du XIIIe siècle, dont on retrouve des murs dans la construction actuelle, est assez mystérieuse, ses premiers propriétaires semblent inconnus. Malheureusement, il sera mutilé lors de la Révolution. Le pavillon en avancée pentagonal ne semble pas antérieur aux premières années du XVIIe siècle. Le logis, s'il s'agit bien de lui dans la notice Mérimée, a aussi été remanié vers 1760-1770. Entre 1825 et 1936, il serait devenu le logement patronal d'une papeterie (Papeterie de la Tourgarnier), qui occupera une grande partie du quartier entre 1908 et la fin des années 1970, avec la société Couprie et Blanch.   Il a été remanié aux XVIe et XVIIIe siècles. Sa façade s'élève au sud. En son centre s'élève en avant-corps un pavillon pentagonal, renfermant l'escalier qui dessert les trois étages. La grande salle du rez-de-chaussée possède un pavage remarquable. La cour du logis est précédée par un mur de clôture qui semble dater du XVIIe siècle surmonté d'un crénelage simulant un mâchicoulis. Les merlons en haut des créneaux sont des boules à facettes. Le portail est surmonté du blason mulilé des de La Place.","habitants":"Pierre de La Place\r\n        \"","divers":"Tourgarnier 45° 38' 27\" nord, 0° 10' 13\" est2","gps":"","images":["../image/image_16/16_Tourgarnier_1.jpg","../image/image_16/16_Tourgarnier_2.jpg","../image/image_16/16_Tourgarnier_3.jpg","../image/image_16/16_Tourgarnier_4.jpg"]},"Consult_chateau_formulaire26c6":{"id":"Consult_chateau_formulaire26c6","dept":"16","canton":"Charente-Sud","commune":"Touvérac","nom":"Touvérac","type":"Château","periode":"XIX","histoire":"TOUVERAC dit  de St-Bernard  impressionnant date du XIXe siècle et c'est aujourd'hui un centre médical. Il y a aussi dans la forêt quelques parcelles éclatées d'une minuscule forêt domaniale, la forêt de la Grolle. Et surtout dans « Les Lettres charentaises », de Babaud Laribière, en 1866 : « La Grolle, au départ, était un lieu dhabitation isolé avec un pavillon de chasse. Une habitation pour les hommes de loi et maîtres du relais de poste au XVIe siècle. » Parmi les vestiges : « Une pierre gravée indique une halte de mesdames les filles du roi en juin 1743. Ce serait en souvenir du passage des filles de Louis XV. » Toujours au XVIIIe siècle, le comte Charles-Maurice de Talleyrand-Périgord, prince de Bénevent, homme dÉtat, rapporte que durant son enfance et ses vacances au château de Chalais, chez sa grand-mère, il aimait se rendre à La Grolle, propriété des comtes de Chalais où se trouvait une gentilhommière. » La famille Esmain quitte La Grolle entre 1860 et 1870. Elle vend à M. De Carbonnel, receveur des finances à Toulouse. Cest lui qui fait construire le château « dans une partie couverte des landes sauvages » (selon « Les Attaches charentaises et familiales dAdhémar Esmain »).Le château changera plusieurs fois de mains : comte de Traversay, commandant Chanu, ou encore Tardet, notaire. Cest ce dernier, scieur de long, qui vend la propriété à lÉtat pour y construire un sanatorium en 1936. On y soigne les adultes pour la tuberculose qui fait rage. Quant aux enfants, ils sont placés au château de Montchoix, à Rougnac.","architecture":"TOUVERAC  est situé au nord du bourg, au lieu-dit le château. Il est du style de Renaissance, avec créneaux. Il date du XVIIe siècle, et a été remanié à la fin du XIXe siècle. Corps de logis rectangulaire entre deux pavillons saillants série de lucarnes sur combles  et  quatre tours rondes à cinq niveaux et mâchicoulis toits en poivrières dont un toit à l'impérial, l'ensemble recouvert d'ardoise. Prolongé sur la droite d'un pavillon et la chapelle.","habitants":"Comte Charles-Maurice de Talleyrand-Périgord\r\n        \"","divers":"Touvérac 45° 23' 03\" nord, 0° 13' 07\" ouest","gps":"","images":["../image/image_16/16_Touv%c3%a9rac_1.jpg","../image/image_16/16_Touv%c3%a9rac_2.jpg","../image/image_16/16_Touv%c3%a9rac_3.jpg","../image/image_16/16_Touv%c3%a9rac_4.jpg","../image/image_16/16_Touv%c3%a9rac_5.jpg"]},"Consult_chateau_formulairec931":{"id":"Consult_chateau_formulairec931","dept":"16","canton":"Boëme-Echelle","commune":"Garat","nom":"Tranchade","type":"Forteresse","periode":"XIV-XVI","histoire":"TRANCHADE, en 1396 Aymar de Pressac construit le donjon et  les Nesmond  en 1573 l'acquièrent ils construisirent le corps de logis au XVIe siècle. En 1667, François III Normand de Puygrelier achète le château à la famille de Lambertie, qui avait succédé à la famille d'Aydie et se fera appeler Normand de La Tranchade, étant seigneur de ces deux fiefs.  En 1792, Louis Normand de La Tranchade émigra en Angleterre avec une partie de sa famille et laissa le château à son demi-frère, le seigneur de la Reynerie en Chenaud. Le château fut alors vendu aux enchères comme bien national, pris le nom de Normand de La Tranchade grâce à monsieur Vaslet, avocat à Angoulême, qui l'acquit en 1816 et dont la fille épousa Joseph Normand de La Tranchade, qui fut maire dAngoulême de 1837 à 1840 puis de 1849 à 1855.  Les Normand de la Tranchade seront propriétaires du château jusqu'au début du XXe siècle. Le domaine se délabre. En 1929, le professeur Louis Portes achète le château et le restaure avec sa femme née Marmier. Sa veuve se remariera avec le comte Amédée de Lorgeril, et la comtesse Marie-Madeleine de Marmier descendante du grand ministre de Louis XV qui assurera la préservation du site jusqu'à 1999, date de la tempête Martin qui a fait d'importants dégâts dans le Sud-Ouest  sur le domaine en particulier. Leur fils prend alors la relève.","architecture":"TRANCHADE, le portail, qui date de 1598, avec parapet crénelé sur mâchicoulis orné de coquilles. Il est entouré de tourelles carrées aux mêmes décors. Les armes des Normand sont sculptées sur le parapet. l'imposant donjon carré construit à la fin du XIVe siècle, qui est la partie la plus ancienne. Le donjon central est accompagné d'une tourelle polygonale renfermant l'escalier à vis en pierre. Ce donjon conserve ses mâchicoulis. D'une hauteur d'une trentaine de mètres et assis sur l'à-pic rocheux de la vallée qu'il surplombe, il comporte trois étages percés de fenêtres étroites. Les bâtiments forment deux ailes en équerre appuyées sur le donjon. L'aile orientale, la poterne et le chai ont été construits au XVIe siècle et l'aile nord au XVIIe siècle. Ces bâtiments ont été repris au XIXe siècle. Les pierres ayant servi à la construction du donjon proviennent des douves sèches. Sur l'autre aile est sculpté un écusson aux armes des Normand de La Tranchade. Sous la cour, une petite salle voûtée en berceau brisée et donnant sur la vallée fait office de chapelle. On y voit une plaque commémorative dédiée au docteur Portes. Une petite tour arrasée flanquant la chapelle a une construction antérieure à celle du donjon. Une grosse tour arrasée plus récente, à l'extérieur des remparts, pouvait être une fuie, courante dans la région pour indiquer une maison noble. Le bâtiment de deux étages, accolé au portail et de la même époque, pouvait être un corps de garde.","habitants":"Famille de monsieur de Lorgeril\r\n        \"","divers":"Tranchade 45° 37' 08\" nord, 0° 14' 26\" est2","gps":"","images":["../image/image_16/16_Tranchade_1.jpg","../image/image_16/16_Tranchade_2.jpg","../image/image_16/16_Tranchade_3.jpg","../image/image_16/16_Tranchade_4.jpg","../image/image_16/16_Tranchade_5.jpg"]},"Consult_chateau_formulaire39de":{"id":"Consult_chateau_formulaire39de","dept":"16","canton":"Jarnac","commune":"Triac-Lautrait","nom":"Triac_Lautait","type":"Château","periode":"XIV-XVIII","histoire":"TRIAC, détruit durant la guerre de cent ans. Le fief relevé de la seigneurie de Lartige est en possession de la famille de Lestang au XIVe siècle, le château est ravagé par les protestants lors de la guerre de cent-ans, reconstruit, il est incendié pendant les guerres de Religion par les huguenots en 1569, à la suite de la bataille de Jarnac.  au XVIe siècle passe par alliance aux le Mesmier, François de Mesmier, président et maire de la ville décéde en 1605, ces son fils qui le fit restaurer. Le fils cadet de François Le Musnier, Clément, conserva le château de Triac qui resta dans la famille jusqu'en 1768. À cette époque, Louis Le Musnier, lieutenant-général et seigneur de Raix, vendit Triac à messire Abraham Bonniot, chevalier, seigneur de Fleurac, Salignac et autres lieux. Ce dernier fit édifier de 1773 à 1777 un nouveau château, encore plus près de la Charente. En 1802, le château de Triac fut acquis par monsieur Roy d'Angeac, dont la petite-fille épousa Louis-Joseph de Fereire. Vendu de nouveau en 1871, il changea plusieurs fois de propriétaire depuis cette époque et fut encore incendié en 1877. Racheté par un négociant il a été restauré. il fut malheureusement détruit à nouveau au XVIIIe siècle et Jean Abraham Bonniot acquièrent les terres en 1768 remplace le château par une constrution plus adapter au gout du temps puis vendu par ses héritiers  à Louis François Roy D'Angeac et à son épouse, Appolonie Texier de la Pégerie qui décèderont en 1851 passa par héritage aux Féreire de Saint-Antonin. En 1877 nouvel incendie, reconstruit en 1880. Monsieur Pignon propriétaire des distillerie de Cognac entreprend la reconstruction du château et passe entre temps aux Antier, est   en 1946 passe aux Braastard d'origine norvégienne Steve de Braastard époux de la petite fille du fondateur de la société de cognac Tiffon, le château  est toujours dans cette famille.","architecture":"TRIAC, l'entrée a gardé ses deux tours rondes et à un angle du mur d'enceinte un pigeonnier au toit arasé. Sa façade à un étage avec deux ailes en retour est percée de larges fenêtres. Le toit d'ardoise à pente simple présente trois ouvertures ornementées. Le château est entouré de douves sèches, délimitées par une rangée de balustres. Au fond de la cour d'honneur bordée au nord-Est par les bâtiments des communs et par les dépendances, se développe la façade  du corps central à sept travées, qui s'encadre entre deux pavillons en retour. Au rez-de-chaussée, le centre de la façade est occupé par un avant-corps, éclairés par des baies vitrées dont le toit en terrasse possède un curieux garde-corps en zinc imitant un crénelage. Le toit peu pentu est éclairé par une lucarne de pierre à fronton triangulaire et par deux oeils-de-boeuf, trois travées plein cintre en façade réunis sous un fronton triangulaire encadré  par des pilastres.","habitants":"Famille de Lestang et Louis François Roy D'Angea\r\n        \r\n        \"","divers":"Triac 45° 40' 37\" nord, 0° 07' 02\" ouest1","gps":"","images":["../image/image_16/16_Triac_Lautait_1.jpg","../image/image_16/16_Triac_Lautait_2.jpg","../image/image_16/16_Triac_Lautait_3.jpg","../image/image_16/16_Triac_Lautait_4.jpg","../image/image_16/16_Triac_Lautait_5.jpg"]},"Consult_chateau_formulaire64d6":{"id":"Consult_chateau_formulaire64d6","dept":"16","canton":"Charente-Nord","commune":"Verteuil en Charente","nom":"Verteuil_Charente","type":"Château","periode":"XV","histoire":"VERTEUIL, en 1080,  appartenait  aux La Rochefoucauld, est assiégé par Bernard, comte de la Marche possédé par l'actuel duc.  En 1135 est cité un premier siège de Verteuil par Vulgrin II, comte d'Angoulême. Par le traité de Brétigny en 1360, il est remis aux anglais qui ne peuvent entrer en sa possession qu'un an plus tard. Il est repris en 1385 par le duc de Bourbon après un siège qui l'endommage, puis il est pris et repris et enfin en partie « démoli et abattu » suivant les textes de l'époque. En 1446, Guillaume de La Rochefoucauld obtient du roi le droit de reconstruire une défense : une muraille et deux tours de défense. Le château actuel date du XVe siècle;  il aurait été construit en 1459, en remplacement du château féodal édifié au XIe siècle et démantelé en 1442 par ordre du roi Charles VII, à la suite de la Praguerie. La châtellenie de Verteuil fut érigée en baronnie au XVe siècle; elle s'étendait alors sur 16 paroisses et elle comprenait 62 fiefs dans sa mouvance. En 1665, François VI de La Rochefoucauld, duc de La Rochefoucauld et prince de Marcillac, né à Paris en 1613, y a rédigé ses Maximes. Le château, meublé et habité, demeuré propriété familiale de la famille de La Rochefoucauld, appartint à Anne de Amodio (née La Rochefoucauld) qui fut cofondatrice vers 1960 de l'association de défense du patrimoine Vieilles maisons françaises, jusqu'à sa mort en 1980. Il appartient maintenant au comte Sixte de La Rochefoucauld-Estissac.","architecture":"VERTEUIL, au milieu d'un parc aménagé au XIXe siècle, le château qui domine la Charente présente une fortification de plan triangulaire : l'entrée se fait par le centre du petit côté par une porte cavalière flanquée de deux tours rondes, en avant d'un pavillon qui fait la jonction des deux corps de bâtiments à deux étages qui forment un léger angle obtus ; Le côté droit de la cour comporte un haut mur ; le côté gauche est bâti avec deux tours rondes et une petite chapelle.Toutes les toitures sont en ardoises ; elles sont en poivrières pour les tours, à deux pans pour les bâtiments, pyramidale pour le pavillon d'entrée et en voûte pour la chapelle. Une des cartes postales de l'intérieur du château datant du début du XXe siècle montre, pendues au mur du \"salon de la Licorne\", les célèbres tapisseries dites « les Tapisseries de la Licorne », chef-d'uvre de l'art textile médiéval, qui furent offertes par John D.Rockfeller Jr, en 1937, au \"Cloysters Museum\" de New York. Avant de bénéficier du classement au titre des M.H. en avril 2017, il a été partiellement inscrit  en mars 1966 et totalement depuis 2010.","habitants":"La Rochefoucauld\r\n        \"","divers":"Verteuil  : 45° 58' 58\" Nord et 0° 13' 50\" Est","gps":"","images":["../image/image_16/16_Verteuil_Charente_1.jpg","../image/image_16/16_Verteuil_Charente_2.jpg"]},"Consult_chateau_formulaire9995":{"id":"Consult_chateau_formulaire9995","dept":"16","canton":"Charente-Champagne","commune":"Vibrac","nom":"Vibrac","type":"","periode":"XIII-XV","histoire":"VIBRAC, baronnie au Moyen-Âge, la terre de Vibrac appartenait à Hugues de Montchaude, qui possédait Vibrac au XIVe siècle, maria sa fille, Jovide, à Raymond de Mareuil, seigneur de Villebois, qui par ce mariage devint également seigneur de Vibrac. Un neveu de Hugues de Montchaude avait embrassé la cause des Anglais, qui ravageaient alors la France. Le château de Vibrac a été pris et repris plusieurs fois durant la guerre de cent ans. Pour le punir le roi Jean le dépouilla de tous ses biens en faveur de Raymond de Mareuil. La famille de Mareuil conserva Vibrac jusque vers le milieu du XVIe siècle. Guy II de Mareuil fut sénéchal d'Angoumois. Ce dernier, de ses 2 mariages eut, entre autres, Gabrielle qui fut mariée, en 1541, à Nicolas d'Anjou, marquis de Mézières, gouverneur d'Angoulême. Il n'eut, lui-même qu'une fille, Renée, qui épousa, en 1566, François de Bourbon, duc de Montpensier. Leur fils unique vendit, vers 1597, Vibrac à Jean-Louis de Nogaret de La Valette, duc d'Épernon et gouverneur d'Angoumois. Ce dernier revendit, en 1684, son duché de La Valette, les châtellenies d'Angeac et de Vibrac au maréchal de Navailles, qui mourut en 1684, laissant trois héritières. La plus jeune, Gabrielle, prit pour époux le marquis de Pompadour, dont elle eut une fille, Françoise, qui épousa messire Philippe de Courcillon, marquis de Dangeau, gouverneur de Touraine. Vibrac passa à ses héritiers, qui le vendirent un peu après 1784.                BOIS CHARENTE à cinq KM àau sud ouest à Graves  St-Amant le château de Bois Charente Les Giraud d'Anqueville, seigneurs de Bois-Charente, ont construit le château au XVIe siècle. En 1680, le château passe par mariage à François Goulard, seigneur de la Faye, et il devient la propriété de Jean Thioulet, gentilhomme du roi, au début du XVIIIe siècle, a appartenu au début du XXe siècle à Jean Fougerat dit Élie, riche propriétaire et bienfaiteur, mort en 1932.","architecture":"VIBRAC, passe par alliance à la famille de Mareuil qui au XVe siècle remplace le fort par le premier château. Ce château devait être très important, et pourtant, à partir du XVIIe siècle, il fut peu habité par ses possesseurs qui, appartenant tous à d'illustres familles, en abandonnant la garde à des intendants Sur une île de la Charente, il ne reste que des ruines, une chapelle, un pont et des communs.  Du château fort du XIIIe siècle reconstruit au XVe siècle, puis remanié aux XVIIe et XVIIIe siècles, il reste la façade d'entrée du XVIIIe siècle avec ses trois arcs en anse de panier, et au niveau de l'aile gauche une tour carrée médiévale.  Il a été dessiné par Claude Chastillon, dans sa Topographie française ce qui nous montre un château du XVe siècle flanqué de tours rondes et carrées précédé d'une avant-cour bordée de bâtiments bas accostés aux angles de pavillons à toiture pyramidale. Au milieu d'une île entourée par la Charente et cachée par un rideau de verdure, s'élève une vaste construction abandonnée. C'est l'ancien château de Vibrac, construit au XVe siècle par les seigneurs de Mareuil.                                                     BOIS-CHARENTE a été construit au XVIe siècle et sur la tourelle d'escalier, on peut lire 15xx, une date dont les dizaines et les unités sont effacées. La tour hexagonale et la tourelle d'escalier, au centre de la façade antérieure, seraient donc du XVIe siècle alors que l'élévation serait postérieure et qu'il y a eu des restaurations au XIXe siècle.","habitants":"Famille de Mareuil \r\n        \"","divers":"Vibrac 45° 38' 27\" nord, 0° 03' 53\"  ouest1                     Bois Charente grav-5","gps":"","images":["../image/image_16/16_Vibrac_1.jpg","../image/image_16/16_Vibrac_2.jpg","../image/image_16/16_Vibrac_3.jpg","../image/image_16/16_Vibrac_4.jpg","../image/image_16/16_Vibrac_5.jpg"]},"Consult_chateau_formulaire9d37":{"id":"Consult_chateau_formulaire9d37","dept":"16","canton":"Jarnac","commune":"Mérignac","nom":"Villars_Marange","type":"Château","periode":"XV-XVII","histoire":"VILLARS-MARANGE, le petit fief de Villars dépendait donc indirectement de ces comtes et appartenait à une famille de ce nom. En 1520, Marguerite Portier, dame de Gademoulins et petite-fille de Guillaume de Villars, vend le domaine à Jean de Fontenay, écuyer et conseiller du roi. Celui-ci rend hommage à Catherine de Clermont, dame de Mareuil, Villebois, Vibrac et Angeac-Charente. En 1524, la seigneurie de Villars est passée aux mains d'Hélie Dussault, écuyer, seigneur de Birac. Son fils Girard Dussault, écuyer et seigneur de Birac et de Villars, épousa Claire Méhée, fille de François Méhée et de Claire de La Guirande en 1556. La terre relevait des châtellenies de Vibrac et d'Angeac-Charente. En 1666, Antoine Dussault vend la terre de Villars à Annet de La Charlonnerie, et cette famille la conservera pendant deux siècles. En 1875, le domaine est vendu à Amédée Duclou, négociant en eaux-de-vie. Cette famille le conservera jusqu'en 1959, puis passe à la famille de Brou de Laurière, qui en sont les propriétaires actuels.","architecture":"VILLARS, le bâtiment présente à l'est un châtelet d'entrée du XVe siècle et un logis en retour d'équerre du XVIIe siècle. Le corps de logis le plus ancien comporte une bretèche et des fenêtres ornées de pinacles du XVIe siècle. La partie sud, remaniée au XIXe siècle, est surmontée de crénelages et de parapets ornementaux comme on en a fait en Charente au XVIIe siècle, et dont les exemples les plus représentatifs sont Bouteville, Château Chesnel, Fleurac et la Tranchade.   Le fief est mentionné dans les textes au début du XVIe siècle. Un haut pavillon, sans doute le châtelet d'entrée datant des XVe et XVIe siècles, présente des lucarnes à fronton triangulaire et une bretèche à la jonction avec les vestiges d'une enceinte. En retour d'équerre est construit un logis du début du XVIIe siècle à tour d'escalier hors-oeuvre et pavillon d'angle. La porte d'entrée est ornée de pilastres cannelés et d'un fronton triangulaire. Sa façade sud a été reprise au XIXe siècle. La partie supérieure de ses élévations sont crénelées. Les créneaux sont garnis de sculptures en bas-relief d'une grande richesse ornementale. L'intérieur du bâtiment a été remanié. Une chapelle très remaniée et servant actuellement de communs, est accolée, au nord, au premier logis. Les communs sont été en partie reconstruits à la fin du XIXe siècle.","habitants":"Famille de  Jean de Fontenay                                 Famille de Brou de Laurière\r\n        \"","divers":"Villars-Marange 45° 41' 33\" nord, 0° 02' 28\" ouest2","gps":"","images":["../image/image_16/16_Villars_Marange_1.jpg","../image/image_16/16_Villars_Marange_2.jpg","../image/image_16/16_Villars_Marange_3.jpg"]},"Consult_chateau_formulaireb525-2":{"id":"Consult_chateau_formulaireb525-2","dept":"16","canton":"Charente-Vienne","commune":"Ansac sur Vienne","nom":"Villatte_Ansac","type":"Maison forte","periode":"XV","histoire":"VILLATTE, François de Pontbriand, soldat breton né à Saint-Malo, nommé par Louis XI maire de Limoges en 1473 se marie en 1475 avec Mathive Formier qui lui apporte l'importante baronnie dotée d'un sénéchal avec droit de haute et basse justice. Mathive avait perdu son père, Jehan Formier et hérité du fief.  François de Pontbriand, baron de la Villatte sera ambassadeur en Italie puis intendant des travaux du château de Chambord, gouverneur de Blois et maître d'hôtel de François Ier. Il meurt en 1521. La baronnie passe par sa fille Antoinette à Marin de Montchenu puis par l'aînée de ses petites filles Marie-Salomé à Claude de Chateauvieux comte de Confolens.  Le logis de la Villatte ne sera pas leur résidence ni celle de leurs successeurs et sera en 1786 vendu à l'amiral Alexis Poute puis vendu comme bien national.  Le logis de la Villatte a été inscrit au M.H. par arrêté du 8 mars 1991 ainsi que la chapelle avec son plafond à caissons est située dans l'aile ouest du logis.","architecture":"VILLATTE, la fuie ronde qui a perdu sa toiture signe l'importance du fief doté de droit de haute et basse justice (et son année de construction correspond au document royal de leur attribution). Le portail est surmonté de créneaux et donne dans une basse-cour entourée de communs remaniés et transformés en logements.  Le manoir se compose de deux ailes en équerre, le logis du XVe siècle à un étage et toiture en tiers-point et l'aile en équerre du XVIe siècle avec un escalier à vis situé à l'angle des deux ailes. Le système de défense comporte à l'arrière du logis une tour d'angle et deux petites tours carrées.","habitants":"Amiral Alexis Poute \r\n        \"","divers":"Villatte 45° 59' 23\" nord, 0° 38' 05\" est2","gps":"","images":["../image/image_16/16_Villatte_Ansac_1.jpg","../image/image_16/16_Villatte_Ansac_2.jpg","../image/image_16/16_Villatte_Ansac_3.jpg"]},"Consult_chateau_formulaire5541":{"id":"Consult_chateau_formulaire5541","dept":"16","canton":"Tude-et-Lavalette","commune":"Villebois-Lavalette","nom":"Villebois","type":"Forteresse","periode":"XII-XVI","histoire":"VILLEBOIS, au VIIIe siècle, les Fulcher de Villebois en étaient les seigneurs. Puis en 959, ce furent les Hélie. En 1120, le château fut pris par Vulgrin II Taillefer, comte d'Angoulême, et en 1143 il passa aux Ithier de Villebois, Au XIIIe siècle Villebois passe aux Lusignan, comtes d'Angoulême,En 1355, Raymond de Mareuil, chevalier, seigneur de Mareuil et de Bourzac, reçut du roi Jean le Bon la seigneurie de Villebois après l'extinction de la lignée des Lusignan. Les sires de Mareuil figurent alors parmi les propriétaires successifs du château, durant la guerre de cent ans, les Anglais y tiennent une garnison, ils confient la garde du château à son propriétaire, Raymond de Mareuil. En 1376, Villebois est repris aux Anglais par le duc de Berry, frère de Charles V. Guy de Mareuil, baron de Mareuil et de Villebois, seigneur de Bourzac, Angeac, Vibrac, Montmoreau et Pranzac, fut sénéchal d'Angoumois. Décédé en 1519, En 1541, le château revient par le rocambolesque mariage de sa fille, Gabrielle de Mareuil, à Nicolas d'Anjou, marquis de Mézières en Berry. En 1556, Renée d'Anjou-Mézières épouse le très catholique François de Bourbon, duc de Montpensier, et lui apporte en dot ses terres de Vibrac, Villebois et Mareuil.  en 1596, le duc d'Épernon acquit de sa propriétaire, la marquise de Mézières, En 1660, Bernard de Nogaret, duc de La Valette, fils héritier de Jean-Louis de Nogaret, n'ayant lui-même plus d'héritier et délaissant la la terre de Villebois-Lavalette, vendit celle-ci avec son titre, à Philippe de Montaut-Bénac, duc de Navailles. En 1665 le duc de Navailles et de La Valette, éloigné de la cour par Louis XIV, se retira sur ses terres.","architecture":"VILLEBOIS, en 1665 le duc de Navailles et de La Valette, Il fit raser l'ancienne forteresse et construisit le château dont il ne reste que l'aile ouest. Lors de la convention, le château devint un magasin de vivres et une prison de suspects. En 1816, il devint caserne de gendarmerie, jusqu'au 10 décembre 1822 où un incendie détruisit l'aile orientale et le dôme des bâtiments du XVIIe siècle.  Le château fut vendu plusieurs fois, en 1838 ce fut l'abbé Michon qui l'acheta pour y construire une école de garçons,  suite à des impayés, le château passa à la commune En 1914, il fut acheté par le docteur Maurice de Fleury, grand-père de l'acteur Bernard Lavalette, qui y fit d'importants travaux pour rendre habitable l'aile ouest, et la restauration des remparts. La famille de Fleury sera propriétaire du château jusqu'en 1998. Philippe et Bernard de Fleury, est créée l'association des Amis du château de Villebois-Lavalette.Le propriétaire actuel, Norbert Fradin, acquiert le château en l'an 2000. Le site consiste en un plateau allongé de 150 mètres de long sur 50 mètres de large,  Le rempart est flanqué extérieurement de sept tours semi-circulaires, dont deux au nord très rapprochées laissant supposer une entrée au Moyen-Age, condamnée par la suite. La partie sud de l'éperon, correspondant en surface à peu près au tiers de l'ensemble, est celle où est construit le château actuel avec une grande terrasse à l'ouest Une tour quadrangulaire avec escalier à vis forme l'angle sud-est du rempart","habitants":"Famille de Raymond de Mareuil\r\n        \"","divers":"Villebois GPS : 45° 29' 03\" Nord et 0° 16' 58\" Est","gps":"45° 29' 03\" Nord et 0° 16' 58\" Est","images":["../image/image_16/16_Villebois_1.jpg","../image/image_16/16_Villebois_2.jpg","../image/image_16/16_Villebois_3.jpg","../image/image_16/16_Villebois_4.jpg","../image/image_16/16_Villebois_5.jpg","../image/image_16/16_Villebois_6.jpg","../image/image_16/16_Villebois_7.jpg","../image/image_16/16_Villebois_8.jpg","../image/image_16/16_Villebois_9.jpg"]},"Consult_chateau_formulaire4ffe":{"id":"Consult_chateau_formulaire4ffe","dept":"16","canton":"Charente-Vienne","commune":"Esse","nom":"Villevert","type":"Château","periode":"XV-XVII-XIX","histoire":"VILLEVERT, ancienne maison forte du XVIe siècle, présence des comtes de Chamborant au XIXe siècle, bâti à Esse, la construction  date des XVe et XVIIe siècles, a été remanié, voire reconstruit au XIXe siècle. C'est une ancienne maison forte de style XIXe siècle. Sa construction date du XIVe à 1880.  Le Château de Villebert est inscrit aux M.H. depuis le 29 avril 1988.","architecture":"VILLEVERT  Profondément remanié. Le château est formé d'un corps de logis à un étage, encadré de deux pavillons à deux étages prolongés par deux ailes. La haute toiture est couverte d'ardoises, percée de quelques ouvertures à curieuse couverture pointue et d'un clocheton ajouré second empire. \r\nLa chapelle sainte Hélène est de style néo-byzantin de la fin du XIXe siècle.","habitants":"comtes de Chamborant \r\n        \"","divers":"Villevert 46° 01' 22\" nord, 0° 41' 29\" est2","gps":"","images":["../image/image_16/16_Villevert_1.jpg"]},"Consult_chateau_formulaire5c3a":{"id":"Consult_chateau_formulaire5c3a","dept":"16","canton":"Boëme-Echelle","commune":"Vouzan","nom":"Vouzan","type":"Forteresse","periode":"XV-XIX","histoire":"VOUZAN, est érigé sur un emplacement contenant des vestiges archéologiques. La chapelle castrale a été construite au XIIe siècle. Une partie du château, sa façade nord date du XVe siècle. L'important fief de Vouzan a appartenu à la famille de Livenne, puis aux d'Abzac, et aux Arnaud de Bouëx. Le comte de Thienne figure parmi les derniers propriétaires. L'ensemble formé par le château et la chapelle castrale fait lobjet dune inscription au titre des M.H. depuis le 31 décembre 1986.","architecture":"VOUZAN  C'est un château de style Médiéval. Sa construction date du XVe au XIXe siècle,  la façade nord est accostée d'échauguettes sur contreforts est du XVe siècle, alors que la chapelle castrale remonte au XIIe siècle mais a été rénovée au XVIIe siècle, période de construction du portail monumental couronné d'un parapet festonné. Une tour polygonale sectionnée est enclavée dans des bâtiments modernes. Il comporte aussi un pigeonnier carré, et un parc qui contient des vestiges archéologiques.","habitants":"Famille de Livenne\r\n        \"","divers":"Vouzan 45° 36' 11\" nord, 0° 21' 24\" est","gps":"","images":["../image/image_16/16_Vouzan_1.jpg","../image/image_16/16_Vouzan_2.jpg","../image/image_16/16_Vouzan_3.jpg","../image/image_16/16_Vouzan_4.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','16 — Charente'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
