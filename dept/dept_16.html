ouves et accessible par un pont-levis. \r\nCette tour rectangulaire monumentale, de 12 mètres sur 9 mètres, haute de 20 mètres, aux murs d'une épaisseur d'1,80 m à leur base, aux étages séparés par des planchers avec mâchicoulis, est surmontée d'un parapet percé de créneaux. \r\nOn remarque sur le pourtour des fenêtres, d'ailleurs modifiées, les trous des barreaux qui en défendaient l'accès. Le chemin de ronde sur mâchicoulis a été remanié au XVIIe siècle ( haut mur orné extérieurement de coquilles, chemin dallé, fenêtres, archères). Il est évident qu'il s'agissait, à l'origine, d'un bâtiment à caractère purement militaire de surveillance et de défense. Le logis primitif occupe la face nord des bâtiments, protégé par la tour, par une tourelle à l'ouest et une autre tourelle en son milieu qui a été détruite lors d'aménagements au XIXe siècle. Il y est accolé, au sud, un bâtiment moderne datant du XIXe siècle (rez-de-chaussée du XVIe siècle. Le premier étage dont le hall actuel reliant ces bâtiments à la Tour ne datent que de 1920). Les 1,20 m d'épaisseur du mur entre ces deux bâtiments montrent bien qu'il s'agit de l'ancien mur extérieur. Autrefois une tour hexagonale dont il reste une partie de l'escalier en spirale qui conduit de la cuisine à la cave voûtée et une porte d'entrée sculptée du XVe siècle, déplacée, flanquaient le bâtiment d'habitation et commandaient sans doute une poterne d'accès.","habitants":"Famille de Jean Le Roy de Lenchères\r\n        \"","divers":"Breuil-Dignac GPS : 45° 33' 42\" Nord et 0° 17' 27\" Est","gps":"45° 33' 42\" Nord et 0° 17' 27\" Est","images":["../image/image_16/16_Breuil_Dignac_1.jpg","../image/image_16/16_Breuil_Dignac_2.jpg","../image/image_16/16_Breuil_Dignac_3.jpg","../image/image_16/16_Breuil_Dignac_4.jpg","../image/image_16/16_Breuil_Dignac_5.jpg","../image/image_16/16_Breuil_Dignac_6.jpg","../image/image_16/16_Breuil_Dignac_7.jpg"]},"Consult_chateau_formulairee789":{"id":"Consult_chateau_formulairee789","dept":"16","canton":"Charente-Vienne","commune":"Brigueuil","nom":"Brigueuil","type":"Château","periode":"XI-XV","histoire":"BRIGUEUIL, sur ce site défensif naturel, dont le nom vient du gaulois \"briga\" dérivé en \"brigolies\" puis en Brigueuil, la baronnie est attestée depuis le début du XIe siècle avec Aymeri IX de Rochechouart.  Louis de Rochechouart-Brigueuil combat les Anglais et Charles V, en récompense, le nomme gouverneur du Limousin et chambellan.  Brigueuil fut vendu plusieurs fois. Il fut pris par les huguenots en 1567 qui furent chassés par le comte de Lunes en 1574. En 1718 Louis des Monstiers-Mérinville achète Brigueuil et cette famille très aimée n'est pas inquiétée durant la terreur.","architecture":"BRIGUEUIL,  le donjon carré date du XIe siècle était surnommé les yeux de Brigueuil,  Il ne reste que peu d'éléments car le donjon carré du XIe siècle haut de 41 mètres s'est partiellement effondré au XVIIIe siècle et a été arasé en ne gardant que le premier étage en 1825, il ne reste qu'un étage après un effondrement partiel au XVIIIe siècle et une démolition en 1825. Le donjon carré   sur 2 niveaux en comptait autrefois 7 d'une hauteur de 44 mètres, et le clocher, aussi élevé, a été foudroyé en 1844 il reste que le portail renaissance à pilastres moulurés et les chapiteaux sculptés, l'ensemble est en granit rose. Le château s'élevait au sud des fortifications, et se prolongeait vers l'est. Les murailles faisaient deux mètres d'épaisseur, et on rentrait dans la ville par deux portes, l'une à l'est et l'autre à l'ouest, qui existent encore. Le château primitif a fait place à un château plus moderne au XVe siècle, qui a subsisté jusqu'à  1825. Une haute tour carrée demeure, qui a longtemps servi d'hôtel de ville.  Le portail d'entrée de la cour est sculpé de fleurs, de fruits et oiseaux.  il ne reste que le portail Renaissance, sculpté de feuilles d'acanthe.","habitants":"Famille de Louis des Monstiers-Mérinville \r\n        \"","divers":"Brigueuil GPS : 45° 57' 13\" Nord et 0° 51' 40\" Est","gps":"45° 57' 13\" Nord et 0° 51' 40\" Est","images":["../image/image_16/16_Brigueuil_1.jpg","../image/image_16/16_Brigueuil_2.jpg","../image/image_16/16_Brigueuil_3.jpg"]},"Consult_chateau_formulaireeace":{"id":"Consult_chateau_formulaireeace","dept":"16","canton":"Charente-Vienne","commune":"Brillac","nom":"Brillac","type":"Château","periode":"XVI","histoire":"BRILLAC, en 1459 Louis XI, en réponse à la rébellion de Guyart de Brillac, ordonne la démolition « des maisons et hôtels de la place de Brillac ».  Clément de Brillac en 1544, seigneur. En 1559, le château sera reconstruit, Jean de la Cassagne en devient le seigneur.  En 1633, la Tour de Brillac appartenait à Paul de Rabaynes, seigneur , Louis de Conflans  seigneur. De 1608 à 1667, Paul de Rabayne, seigneur d'Usson, dont la fille, Jeanne, épousa le seigneur de Saint-Nectaire en Auvergne, en est propriétaire. Charles de Sennecterre acquiert donc le château en 1667. Il fut vendu comme bien national le 20 juin 1796 à Clément Sudre Labrousse et à sa femme, Agathe Dansays. Ils démontèrent la partie ouest, vendirent une partie des matériaux et s'autorisèrent une nouvelle construction illicite sur la place publique du Fort. En 1811, la commune fait procès à la veuve Sudre concernant les limites de l'ancien château. À la suite de l'abus de pouvoir du seigneur, son époux, la commune demande en dédommagement la démolition du mur d'enceinte Est. Le village et le château furent désormais liés. Les éléments ont servi à édifier plusieurs bâtisses du village. Vers 1820, Joseph Peyraud, descendant du fermier général de Brillac devint propriétaire de l'emplacement. Le notaire Rabette deviendra ensuite l'acquéreur du bien. Il est désormais propriété de l'actuel maire et médecin du village depuis plusieurs décennies. \r\nFOURNIOUX  Il a appartenu à la famille Vars, puis à la famille Peyraud qui l'habite toujours, pas de gravure.","architecture":"BRILLAC, lenceinte était fortifiée par deux tours au nord et nord-ouest, une ayant déjà disparu au nord-est. Elle était encerclée de fossés et protégeait à l'intérieur le château, un pont-levis semble être le seul point d'entrée du fort. Deux places bordaient le fort. À l'est, le long d'un fossé insalubre, À l'intérieur du fort, l'espace était scindé entre le château et l'espace de vie publique.  Ainsi elle faisait face au mur sud du château. Le château (et le fort) était accessible, au nord, par un pont-levis arrivant au pied de la tour nord. Construit autour d'une grande cour rectangulaire bordée de bâtiments il disposait d'un puits central. Les parties intérieures édifiées du château sont les ailes nord et Est, et le mur sud-sud-est.  L'aile orientale, bordée par un fossé en comblement, était composée d'une petite grange et une grande écurie.  Dans la partie Est de l'aile nord, bordant un fossé rempli d'eau, un grand bâtiment servait à deux fonctions encore mal définies. À l'endroit où le passage du pont-levis faisait son entrée dans la cour ont été bâtis une boulangerie et un four. Auparavant totalement équipée de grand bâtiments, elle était déjà ruinée à l'époque. L'aile sud avait déjà vu disparaître ses bâtiments .\r\nFOURNIOUX, il est composé d'un bâtiment central et de dépendances encadrant une cour, est un château-manoir qui fut restauré à la fin du XXe siècle.","habitants":"Brillac, Famille de  Clément de Brillac                    Fournioux Famille Vars\r\n        \"","divers":"Brillac  GPS : 46° 03' 37\" Nord et 0° 46' 39\" Est   Fournioux : 46° 03' 41\" Nord et 0° 46' 42\" Est","gps":"46° 03' 37\" Nord et 0° 46' 39\" Est   Fournioux : 46° 03' 41\"","images":["../image/image_16/16_Brillac_1.jpg","../image/image_16/16_Brillac_2.jpg","../image/image_16/16_Brillac_3.jpg","../image/image_16/16_Brillac_4.jpg"]},"Consult_chateau_formulaire2f8c":{"id":"Consult_chateau_formulaire2f8c","dept":"16","canton":"Val de Tardoire","commune":"Grassac","nom":"Bréchinie_Horte","type":"Château","periode":"XVII-XVIII","histoire":"HORTE, il est situé à 1 km au nord-ouest de Grassac. L'ancien château d'Horte, ruiné, a donné son nom à la forêt, à moins que ce soit la ferme Horte, située à son pied, non loin du bourg. Joseph Chérade de Montbron (1768-1852), Comte de Montbron, député de la Haute-Vienne, est né au château d'Horte, qui était un fief démembré de la forêt de Feuillade et appartenait au XVe siècle à la famille de Vassoigne. Ce fief passa par mariage à la famille de La Place au milieu du XVIIIe siècle, qui fit construire le château. Celui-ci fut abandonné à la Révolution et tomba en ruines. Un nouveau château fut rebâti à côté par la suite.      BRECHINIE, la Bréchinie relevait du château de Marthon. Le logis actuel aurait été construit au XVIIe siècle par René de Vassoigne. Il a servi de cadre au roman La Maîtresse servante de Jérôme et Jean Tharaud (1911).","architecture":"HORTE, vestiges à été remplacé par le château de Bréchinie.                                                               BRECHINIE, de plan en U la longue façade est coiffée d'un toit mansardé à cinq lucarnes couvert de tuiles. Elle est encadrée de deux pavillons en saillie. Le mur d'enceinte est cantonné d'une tourelle et d'une grosse fuie ronde.  Le logis, ainsi que ses murs d'enceinte et l'ensemble des bâtiments inclus dans cette enceinte est inscrit M.H. par arrêté du 31 décembre 1993. le domaine fut mis sous séquestre comme bien d'émigrés. Le corps principal comprend le logis rectangulaire, avec deux pavillons en saillie vers le sud-ouest, ainsi que deux ailes de communs en retour d'équerre vers le nord-est, autour de l'ancienne cour d'honneur. Le tout est situé au centre d'un rectangle ceint d'un mur de pierre, défendu par deux tours rondes aux angles sud-ouest. Au-dessus de la corniche de la porte d'entrée centrale de l'élévation sud-ouest, se développe un décor sculpté sans doute du XIXe siècle.  Au nord-est du logis se dresse la chapelle en retour d'équerre. Une cave voûtée en berceau a été transformée en citerne et glacière. A l'est se trouve la grange ; au sud-ouest le pigeonnier qui a conservé son échelle tournante et daterait du XVIe siècle. Près de ce dernier est située une orangerie du XIXe siècle.","habitants":"Horte et Bréchinie  famille de Vassoigne\r\n        \r\n        \"","divers":"Brechinie GPS : 45° 35' 12\" Nord et 0° 24' 13\" Est  Horte r GPS : 45° 35' 12\" Nord, 0° 24' 13\" Est  grav-1","gps":"45° 35' 12\" Nord et 0° 24' 13\" Est  Horte r GPS : 45° 35' 12","images":["../image/image_16/16_Br%c3%a9chinie_Horte_1.jpg","../image/image_16/16_Br%c3%a9chinie_Horte_2.jpg","../image/image_16/16_Br%c3%a9chinie_Horte_3.jpg","../image/image_16/16_Br%c3%a9chinie_Horte_4.jpg","../image/image_16/16_Br%c3%a9chinie_Horte_5.jpg"]},"Consult_chateau_formulaire870e":{"id":"Consult_chateau_formulaire870e","dept":"16","canton":"Boixe-et-Manslois","commune":"Cellettes Mansle","nom":"Cellettes","type":"Château","periode":"XV-XVII","histoire":"CELLETTES, le premier seigneur connu est Bertrand de Celette (ou Celettes). En 1589 Josias de Celette reçoit d'Henri de Navarre le prieuré de Cellettes et Villognon. A Jean Gaston, vicomte du Lau, colonel au régiment de Saintonge, il fit construire une partie du logis, l'autre partie qui porte la date de 1772 serait due à Jean Gaston. Résidence de monsieur Marc Bédier acquis en 1994.\r\nECHOISY,  vers 1622 de Philippe Lesmerie, écuyer, seigneur de la Grave et d'Échoisy et le château, actuellement en grande partie détruit, a été construit  par le marquis d'Échoisy, lieutenant du roi en Angoumois. Sa vente au XIXe siècle comportait une clause, sa démolition qui a été partiellement effectuée. Il est alors transformé en site de production de chaux. Ce site créé en 1850 et qui était exploité jusqu'en 1956.  Le château a été détruit et il ne reste qu'un logis du XVIIIe siècle, une ferme comportant des bâtiments du XVIIIe siècle et d'autres du XIXe siècle, ainsi qu'un moulin. La Communauté de communes du Pays Manslois qui en a fait l'acquisition a déjà rénové une partie des bâtiments. C'est maintenant un site préservé pour le loisir.","architecture":"CELLETTES, le logis ancien, séparé du second logis par sa tourelle d'escalier polygonale à porte ornée d'un décor reconnu comme de la fin du XVIe siècle, est accosté d'une tour carrée et présente un édifice servant de latrines aux premier et second étages. Le logis daté de 1772 montre cinq travées de fenêtres et cinq lucarnes dans les combles. Son décor intérieur de scènes militaires peintes sur cloisons de bois ou de plâtre rappelle les fonctions de Jean Gaston, vicomte de Lau, colonel au régiment de Saintonge. La petite chapelle accolée à la partie la plus ancienne du logis est dénommée le Temple.  La totalité du château, logis, clôtures, portail et parties non bâties, a été inscrite au M.H. le 23 juillet 2004.                             ECHOISY  La porte d'entrée est encadrée de pilastres doriques. Le château a été construit  à la fin du XVIIe siècle sur une terrasse qui domine la Charente. Il se composait d'un corps central et de deux ailes. Il n'en reste qu'une aile, vaste demeure rectangulaire.  De la chapelle il ne reste que le clocher au milieu des terrasses des jardins, a été inscrit M.H. (les bâtiments, les sols et la carrière) le 23 décembre 1994.","habitants":"Famille de Bertrand de Celette                                    Echoisy Famille de  Philippe Lesmerie\r\n        \"","divers":"Cellettes GPS : 45° 51' 51\" Nord et 0° 08' 44\" Est","gps":"45° 51' 51\" Nord et 0° 08' 44\" Est","images":["../image/image_16/16_Cellettes_1.jpg","../image/image_16/16_Cellettes_2.jpg","../image/image_16/16_Cellettes_3.jpg","../image/image_16/16_Cellettes_4.jpg","../image/image_16/16_Cellettes_5.jpg","../image/image_16/16_Cellettes_6.jpg"]},"Consult_chateau_formulairedce2":{"id":"Consult_chateau_formulairedce2","dept":"16","canton":"Tude-et-Lavalette","commune":"Chadurie","nom":"Chadurie","type":"Château-Tour","periode":"XVI-XVII","histoire":"CHADURIE, aux XVIe et XVIIe siècles, Chadurie était le siège d'un fief appartenant à la famille noble de Laâge, qui formaient deux seigneuries : Chadurie et Puygâty. Chadurie relevait de la justice de Montmoreau.                                                                  PUYGATY, le logis de Puygâty aurait été construit sous Louis XI aux environs de 1465. Les premières traces tiennent à François  de Laâge seigneur de Puygâty, conseiller au présidial d'Angoulême au début du XVIe siècle. Pierre de Arceluz a restauré ce château dont le logis, les tours, la poterne et l'enceinte ont été inscrits M.H le 6 mars 1987.  Grâce à la famille De Lâage, qui le conserva plus de 200 ans et à M. de Arceluz, sauveur et restaurateur du logis,","architecture":"CHADURIE, le logis de Puygâty a été construit sous Louis XI aux environs de 1465, il devint la seigneurie de Chadurie, Le logis des Thibaudières est une bâtisse de style Renaissance, avec un toit à la Mansart, ayant appartenu à la famille de La Laurencie. L'abbé Michon y fonda une école pour enfants défavorisés de 1832 à 1838, avant de fonder la congrégation Notre-Dame des Anges à l'abbaye de Puypéroux. Aujourd'hui ce logis est devenu le siège de la congrégation religieuse les Oblates de Saint-Benoît qui l'ont transformé en maison de retraite.                                                    PUYGATY  L'entrée se fait par une poterne d'entrée du XVIIe siècle avec porte cochère et porte piétonne coiffée d'une toiture à quatre pans. Les communs du XVIIe siècle entourent une vaste cour qui possède deux tours dont une est ancienne. Une partie du logis date du XVe siècle et comporte deux fenêtres à meneaux. La tourelle carrée renferme l'escalier à vis et sa porte moulurée est surmontée d'une bretèche. L'autre partie du logis a été reconstruite au XIXe siècle.","habitants":"Famille de Laâgeet de M. de Arceluz\r\n        \r\n        \"","divers":"Chadurie 45° 29' 47? nord, 0° 08' 18? est     grav 1-2   Puygaty 45° 31' 26? nord, 0° 08' 45? est, grav 3 à 6,   chat à Brie sous chalaie grav 7","gps":"","images":["../image/image_16/16_Chadurie_1.jpg","../image/image_16/16_Chadurie_2.jpg","../image/image_16/16_Chadurie_3.jpg","../image/image_16/16_Chadurie_4.jpg","../image/image_16/16_Chadurie_5.jpg","../image/image_16/16_Chadurie_6.jpg","../image/image_16/16_Chadurie_7.jpg"]},"Consult_chateau_formulaire7c5a":{"id":"Consult_chateau_formulaire7c5a","dept":"16","canton":"Val-de-Tardoire","commune":"Vouthon","nom":"Chaises","type":"Château-Tour","periode":"XI-XVI","histoire":"CHAISE, la seigneurie de la Chaise est mentionnée sur un acte de 1512. Le donjon de la Chaise est le vestige d'un ancien château du XIe siècle qui a dû être détruit pendant la guerre de Cent Ans. Au XVIe siècle, le domaine de La Chaise appartenait à la famille de Corlieu, qui possédait également les terres de la Fenêtre et des Ombrais. En 1581, ces terres passèrent par mariage à la famille de La Croix, qui conserva le domaine de La Chaise jusqu'au milieu du XVIIIe siècle. Puis le domaine passa aux de Lambertye, puis en 1813 par mariage à Charles du Rousseau, marquis de Ferrières, à la famille du Rousseau de Ferrières qui le possédait encore au début du XXe siècle.","architecture":"CHAISE, ce donjon carré est un édifice fortifié qui a été remanié aux XVe et XVIe siècles, au lieu-dit la Garenne, est un édifice fortifié,  sur un rocher percé de souterrains. Il a été inscrit au M.H. le 8 juillet 1988. Il n'est visible que de loin. Sa haute tour carrée serait du XIe siècle.  La Seigneurie de la Chaise est mentionnée sur un acte de 1512. Une tourelle en surplomb contient un étroit escalier en vis. Cette tour faisait partie d'un ensemble fortifié, ou servait de tour de surveillance. Des ses mâchicoulis, il ne subsiste depuis que les consoles. Deux niveaux au-dessus du rez-de-chaussée sont visibles. Au premier niveau, un réservoir a été installé. Des vestiges de cheminées médiévales subsistent dans les étages.  Le Donjon de la Chaise est inscrit aux M.H. depuis le 8/07/1988. Il est privé, fermé au Public.","habitants":"la Chaise à la famille de Corlieu\r\n        \"","divers":"Chaise GPS : 45° 4' 13\" Nord et 0° 26' 43\" EST","gps":"45° 4' 13\" Nord et 0° 26' 43\" EST","images":["../image/image_16/16_Chaises_1.jpg","../image/image_16/16_Chaises_2.jpg","../image/image_16/16_Chaises_3.jpg","../image/image_16/16_Chaises_4.jpg"]},"Consult_chateau_formulaire576b":{"id":"Consult_chateau_formulaire576b","dept":"16","canton":"Tude-Et-Lavalette","commune":"Chalais","nom":"Chalais","type":"Château","periode":"XI-XVI","histoire":"CHALAIS, au cours de la guerre de cent ans, le château est occupé par les Anglais. Quant Jacques de Chabannes, lieutenant du roi Charles VII, le reprit le 17 juin 1453, il le fit démanteler. Il appartenait à Hélie, seigneur de Chalais. Agnès de Chalais, l'épouse d'Hélie de Talleyrand et les Talleyrand prennent au XIIIe siècle le titre de princes de Chalais. Françoise de Montluc, fille du maréchal Blaise de Montluc, s'y retire après la disgrâce de sa famille à la suite de l'affaire de Chalais. (Henri de Talleyrand, comte de Chalais, sera condamné pour crime de lèse-majesté et exécuté, en 1626, à l'age de 27ans, par un bourreau novice. Talleyrand, important homme politique, y séjournera, entre 1758 et 1761. Il fut reçu par son arrière-grand-mère, Marie-Françoise de Rochechouart-Mortemart. À la Révolution, le Prince de Chalais n'émigrera pas. Il sera emprisonné comme suspect, mais réussira à conserver ses propriétés. A sa mort, en 1883, Hélie-Louis-Roger de Talleyrand, dernier Prince de Chalais, lèguera le château de Chalais aux Delacroix qui eux le céderons à l'hospice de la ville de Chalais, en créant un asile pour accueillir des vieillards. La vente des tapisseries, en 1896, fut versée à l'hospice. C'est en 2011, faute de moyens pour l'entretien du château de Chalais, que les hospices mettent le château en vente. Il est racheté fin 2011 par l'imitateur Yves Lecoq,   Depuis, le château de Chalais bénéficie d'une double protection, auprès des M.H. Il est inscrit aux M.H.le 4/09/2002 pour l'ensemble des bâtiments bâtis et classé.","architecture":"CHALAIS, attesté dès le XIe siècle, est l'ancien château des Talleyrand-Périgord. Sa construction a débuté au XIe siècle et s'est achevée au XVIe siècle.  Au cours de la Guerre de Cent Ans, il fut démanteler. François de Talleyrand le fit reconstruire, au début du XVIe siècle. Il ne restait qu'une tour carrée du XIVe siècle encore debout.  Henry lancera un programme de travaux importants dont il reste sa chapelle privée, à l'intérieur du château de Chalais. De cette construction ne subsiste, aujourd'hui, que le châtelet d'entrée et le corps de bâtiment principal. L'entrée se fait par une double porte piétonne et cochère percée dans un pavillon qui a gardé son pont-levis qui s'ouvre sur une enceinte quadrangulaire et un corps de logis d'esprit Renaissance avec une aile nord rebâtie vers 1880, une façade du XVIe siècle, une grosse tour carrée rebatie à la même époque. Les toitures ont été mansardées au XVIIe siècle.","habitants":"Famille de Talleyrand\r\n        \"","divers":"Chalais GPS : 45° 16' 24,24\" Nord et 0° 2' 16,44\" Est","gps":"45° 16' 24,24\" Nord et 0° 2' 16,44\" Est","images":["../image/image_16/16_Chalais_1.jpg","../image/image_16/16_Chalais_2.jpg","../image/image_16/16_Chalais_3.jpg","../image/image_16/16_Chalais_4.jpg","../image/image_16/16_Chalais_5.jpg","../image/image_16/16_Chalais_6.jpg","../image/image_16/16_Chalais_7.jpg","../image/image_16/16_Chalais_8.jpg"]},"Consult_chateau_formulaire5d19":{"id":"Consult_chateau_formulaire5d19","dept":"16","canton":"Angoulême","commune":"Fléac","nom":"Chalonne","type":"Château","periode":"XIX","histoire":"CHALONNE, le château de Fléac a été construit par Louis Plauchut à la fin du XIXe siècle. Son frère, Edmond Plauchut, fut secrétaire de George Sand. Le château resta la propriété familiale, jusqu'à son achat par la commune en 1996. Depuis, il a été rénové et est désormais ouvert à la location, a été la propriété de la famille de Montgeon dont le représentant le plus connu est Jean de Montgeon, l'auteur de L'Alphabet de l'art militaire des armées royales. Il a été restauré de 1763 à 1772 par le marquis de Montalembert, créateur de la fonderie de Ruelle. Le général d'Empire Martin de Bourgon, gouverneur de la Guyane y a résidé. Son dernier propriétaire, Fernand Pluviaud, l'a légué à la commune en 1996. \r\nFLEAC, l'hôtel de ville est un logis construit par le banquier Jules Durandeau en 1852. Il surplombe un très beau parc et des jardins potagers et d'agrément qui étaient ornementés d'une grotte artificielle, d'une cressonnière et de différentes sources naturelles. De sa terrasse, le panorama permet de découvrir toute la vallée et la ville d'Angoulême sur son éperon rocheux.\r\n De 1918 à 1946, ce fut une pension luxueuse, la pension Reverdy. La mairie abrite une statue gallo-romaine du IIe siècle, dite sainte Barbe, qui se trouvait dans une chapelle où elle était l'objet d'un pèlerinage pour demander la pluie.","architecture":"CHALONNE, date du XVIe siècle,  Bâtiment construit par Louis Plauchut fin du XIXe siècle sur l'emplacement d'un vieux logis, cette construction serait la copie fidèle d'un petit castel écossais remarqué lors d'un voyage par Louis Plauchut. Le frère de Louis, Edmond Plauchut homme de lettres et journaliste, fut secrétaire de George Sand à Nohant.  Berthe Plauchut, belle fille de Louis réunissait au château des gens de lettres dont elle aimait la compagnie.  Elle décéda à Fleac en 1948.","habitants":"Famille de  Louis Plauchut\r\n        \"","divers":"Grav - 4 mairie","gps":"","images":["../image/image_16/16_Chalonne_1.jpg","../image/image_16/16_Chalonne_2.jpg","../image/image_16/16_Chalonne_3.jpg","../image/image_16/16_Chalonne_4.jpg"]},"Consult_chateau_formulaire6cf8":{"id":"Consult_chateau_formulaire6cf8","dept":"16","canton":"Charente-Bonnieure","commune":"Champagne-Mouton","nom":"Champagne_Mouton","type":"Maison forte","periode":"XV","histoire":"Deux chateaux à Champagne-Mouton dont celui de Champagne et celui de Juyers (Voir article).         CHAMPAGNE-MOUTON, dès le XIVe siècle, une des nombreuses possessions de la famille de La Rochefoucauld. Le premier membre de cette famille qui soit mentionné comme seigneur de Champagne-Mouton, est Guy VII de La Rochefoucauld, qui meurt en 1350, laissant de son mariage avec Agnès de Culant, de nombreux enfants, dont Geoffroi et Eymery III ; Geoffroi est seigneur de Verteuil et Eymeri conserve Champagne-Mouton. En 1427, son petit-fils, Foulques est encore seigneur de Champagne-Mouton, lors de son mariage avec Jeanne de Rochechouart. Peu de temps après, la seigneurie de Champagne est érigée en baronnie et passe entre les mains de la famille de La Chambre, d'origine écossaise certainement parmi les compagnons de Jeanne d'Arc, et assistent au sacre du roi Charles VII à Reims. Ils possèdent également la terre de Villeneuve-la-Comtesse, donnée par le roi à Christin. La famille de La Chambre conserve la baronnie de Champagne jusqu'a la fin du XVIe siècle. En 1601, la baronnie  revient dans la famille de La Rochefoucauld, en la personne de Charles de Roye de La Rochefoucauld, comte de Roucy, baron de Verteuil et de Montignac. Le dernier seigneur de Champagne ayant séjourné au château et la duchesse douairière de La Rochefoucauld, qui y vient en 1780. Le lieu-dit Fontclairet correspond à un ancien fief dépendant de la baronnie qui, dans un acte de 1579, est nommé Ferraboeuf et appartient à la famille de Goret. Le fief de Fontclairet passe au XVIIe siècle par mariage à Girard de Sallignac, écuyer, seigneur de La Guerlie. Champagne-Mouton qui faisait partie du Poitou est inclus dans le département de la Charente en 1793.","architecture":"CHAMPAGNE, dont les parties sont encore visibles, les corps de logis et l'enceinte, ont été construits vers la fin du XVe siècle. Le chatelet d'entrée carré, muni d'un pont-levis, existait encore vers 1885. L'un des corps de logis, flanqué de tours du XVe siècle a été remanié au XVIIe siècle.Certaines parties sont encore visibles. Les corps de logis et l'enceinte, furent construits à la fin du XVe siècle. Les douves étaient alimentées par la rivière l'Argent.                                    L'hôtel Duvignaud, hôtel particulier du XVIIIe siècle agrémenté d'un parc. La bâtisse en forme de U dont les ailes donnent sur le parc et la base possède une façade côté rue, flanquée d'un double escalier droit, les toitures sont mansardées. Situé Grand Rue, il forme un remarquable exemple d'architecture civile de cette époque en Charente.","habitants":"Famille de La Rochefoucauld\r\n        \"","divers":"Champagne GPS : 45° 59' 33\" Nord, 0° 24' 45\" Est","gps":"45° 59' 33\" Nord, 0° 24' 45\" Est","images":["../image/image_16/16_Champagne_Mouton_1.jpg","../image/image_16/16_Champagne_Mouton_2.jpg","../image/image_16/16_Champagne_Mouton_3.jpg"]},"Consult_chateau_formulaire4e16":{"id":"Consult_chateau_formulaire4e16","dept":"16","canton":"Tude-et-Lavalette","commune":"Charmant","nom":"Charmant","type":"Château","periode":"XVI","histoire":"CHARMANT, cet ancien château jouxte l'église, et occupe une surface assez grande. Le bâtiment actuel date de la fin du XVIe siècle et a appartenu à la famille de Feydicq. En effet, en 1631, Jean de Feydicq, chevalier et seigneur de Charmant, Salles, Vaux, Gurat, demeure dans son château de Charmant, en Angoumois. Une fuie témoigne du caractère seigneurial de ce fief. Le logis a ensuite appartenu à Jeanne Barreau, décédée en 1719, puis à son fils Bernard de Villoutreys, seigneur de la Vergne, d'où sa seconde appellation. La fille de ce dernier, Jeanne de Villoutreys se marie en 1731 avec Pierre de Bonnevin, seigneur de Jussas et Sousmoulins, près de Montendre en Saintonge. La « maison noble de la Vergne » est apportée en dot, un état des lieux est fait, et le domaine est alors affermé, ce jusqu'à la Révolution. C'est alors que leur fils, Bernard de Bonnevin, baron de Sousmoulins, seigneur de Jussas, Pomiers, etc. émigre, et le bien est vendu aux enchères. Au XIXe siècle, quatre familles propriétaires se succèdent (Lacroix, Petit, Quichaux Degroix) dans le domaine à nouveau affermé. L'actuel propriétaire du château, Paul-Marie Coûteaux, a restauré « la commanderie » et souhaite mettre en valeur ce patrimoine en partie pour hébergement touristique et aussi visites.","architecture":"CHARMANT, au nord de l'église, le château est un ancien logis qui forme un bâtiment avec deux niveaux de galeries, une tourelle d'angle en encorbellement et un escalier intérieur remarquable. Il présente aussi une façade nord ajourée d'une galerie à arcades.  Le bâtiment se compose de trois parties juxtaposées en longueur, dans un plan légèrement convexe au nord. L'entrée se fait par le côté sud, avec une cour et un porche donnant sur l'église. La première partie, à l'est, comporte deux niveaux et une tourelle en encorbellement. L'étage supérieur comporte une galerie, côté nord, avec quatre arcades. La deuxième partie, centrale en avant-corps, comporte trois niveaux, avec un escalier intérieur monumental et un portail sculpté côté sud. Le mur d'enceinte du jardin, au nord, s'appuie sur les vestiges de deux tours. \r\nLe château est classé M.H.en 1925.","habitants":"Famille de Feydicq\r\n        \"","divers":"Charmant","gps":"","images":["../image/image_16/16_Charmant_1.jpg","../image/image_16/16_Charmant_2.jpg","../image/image_16/16_Charmant_3.jpg","../image/image_16/16_Charmant_4.jpg","../image/image_16/16_Charmant_5.jpg"]},"Consult_chateau_formulaireac38":{"id":"Consult_chateau_formulaireac38","dept":"16","canton":"Val-de-Tardoire","commune":"Charras","nom":"Charras","type":"Château","periode":"XII-XV","histoire":"CHARRAS, la seigneurie de Charras était importante dès le XVe siècle. Elle appartenait à Jean de Plouer, écuyer, seigneur de Claix, dont la fille Marie épousa en 1493 François de La Laurencie, qui devient ainsi marquis de Charras. La famille de La Laurencie, originaire de  Saint-Auvent près de Rochechouart, conservera Charras jusqu'à la Révolution. Les foires sont très anciennes. À la demande de François de La Laurencie et par lettres patentes de mars 1519, le roi François Ier autorisa la création à Charras de quatre foires par an et d'un marché par semaine. Les quatre foires se tenaient le 6 des mois de mai, juillet, août et novembre. Elles furent supprimées pendant les guerres de religion, et furent rétablies en 1609 par Henri IV. Au début du XXe siècle, elles se tenaient le 9 de chaque mois. Les registres de l'état civil remontent à 1699.Jean-Baptiste-Auguste-François-Marie de La Laurencie (1780-1857), marquis de Charras et homme politique du début du XIXe siècle. Lors de la Révolution, la famille de La Laurencie-Charras émigra et passa dans l'armée de Condé, sauf le marquis en mauvaise santé qui ne fut pas inquiété et resta à Asnières près de Paris. Mais sa femme et sa sur furent saisies comme complices de l'émigration et guillotinées. Aux XVIIIe et XIXe siècles, des gisements de fer ont été exploités, comme dans la commune voisine de Mainzac, pour faire des canons. Alcide Gauguié disait en 1865 : « la route de Grassac à Charras est pavée de débris de fer et résonne agréablement sous les pas du cheval ».","architecture":"CHARRAS, le domaine, incendié vers 1850, fut restauré par la suite. Un corps de logis autrefois cantonné de pavillons, se trouve en fond de cour. Une aile  du XVIIe siècle à toiture à pans brisés occupe le côté sud de la cour, tandis qu'un bâtiment de petite taille occupe la partie nord. Une double clôture précède le logis. Une ferme, une orangerie, une ancienne tour du XVe siècle et une série de trois terrasses bordées de murets à piliers ou de balustrades avec trois escaliers différents, une rocaille et un bassin en ciment, complètent le domaine. Deux allées de tilleuls sont encore en place,  le deuxième bâtiment moderne de plan rectangulaire à deux niveaux à sept travées dont la centrale supporte un fronton galbé, la toiture presque plate avec balustres et une tour carrée sur angle du terrain de plan carrée crénelée à mâchicoulis sous un toit pyramidal. Le château du XVIIe siècle mais très modifié au XIXe siècle dont la clôture, le portail d'entrée imposant de plan arrondie , le jardin, ainsi que l'escalier et la balustrade sont inscrits M.H. depuis le 23 octobre 1992.","habitants":"Famille de La Laurencie-Charras\r\n        \"","divers":"Charras  45° 32' 36 nord, 0° 25' 01? est","gps":"","images":["../image/image_16/16_Charras_1.jpg","../image/image_16/16_Charras_2.jpg","../image/image_16/16_Charras_3.jpg","../image/image_16/16_Charras_4.jpg","../image/image_16/16_Charras_5.jpg","../image/image_16/16_Charras_6.jpg"]},"Consult_chateau_formulaire4771":{"id":"Consult_chateau_formulaire4771","dept":"16","canton":"Charente-Sud","commune":"Passirac","nom":"Chatelard_Passirac","type":"Château","periode":"XVII","histoire":"CHATELARD, au Moyen Age, Passirac était un prieuré-cure rattaché à la sacristie de l'abbaye de Baignes. Ce prieuré fut conventuel jusqu'après le XVIe siècle, puis il devint commendataire et le curé seul desservit la paroisse. La seigneurie du Châtelard (Chatelars, les Chatelars, Chatelard), était déjà mentionnée en 1640. Elle relevait du marquisat de Barbezieux et, pour sa plus grande partie, de l'évêché de Saintes. Au XVIIe siècle, la seigneurie comprenait les paroisses de Passirac, Guizengeard, Boresse, une enclave à Sainte-Souline et une autre à Oriolles. Elle appartenait à Jacques Vigier, seigneur du Luchet. En 1648, elle passa aux mains de la famille La Rochefoucauld, par mariage, de Lydie de Lanes avec Léonor de La Rochefoucauld, seigneur de Roissac. Les époux étaient protestants. En 1671, un autre mariage fit passer le Châtelard aux Saint-Gelais de Lusignan, seigneurs de Montchaude. A la fin du XVIIe siècle et au début du XVIIIe siècle, la seigneurie fut démembrée. Au XVIIIe siècle, Charles de Livenne, baron ou comte de Ballans fut propriétaire du château du Chatelard. Après la Révolution, le Châtelard fut vendu comme bien national et changea plusieurs fois de propriétaires. En 1872, Marc de La Croix de Saint-Cyprien acquit le domaine, fit reconstruire un nouveau château et restaurer l'église. Béatrice de Castelbajac et Christopher Macann vous y accueillent","architecture":"CHATELARD  de style néo-Renaissance . Au cours de la Révolution française de 1789, le château fut vendu comme bien national. Il a été racheté en 1872 par Marc de la Croix de Saint-Cyprien, arrière grand-père de Béatrice de Castelbajac, actuelle propriétaire. Marc de la Croix de Saint-Cyprien fit détruire l'ancien château ainsi que tous les bâtiments en ruine. Il n'est resté que la partie centrale longeant le mur ouest. Le Chatelard a été entièrement reconstruit avec des pierres de Grison sur les ruines de la maison du notaire Joubert au cours de la période de 1875 à 1879 par l'architecte Edouard Warin.","habitants":"Famille La Rochefoucauld\r\n        \"","divers":"Chatelard GPS : 45° 20' 47\" Nord, 0° 03' 49\" Ouest","gps":"45° 20' 47\" Nord, 0° 03' 49\" Ouest","images":["../image/image_16/16_Chatelard_Passirac_1.jpg","../image/image_16/16_Chatelard_Passirac_2.jpg","../image/image_16/16_Chatelard_Passirac_3.jpg","../image/image_16/16_Chatelard_Passirac_4.jpg"]},"Consult_chateau_formulairea05e":{"id":"Consult_chateau_formulairea05e","dept":"16","canton":"Cognac","commune":"cognac","nom":"Chatenay_Cognac","type":"Châtenay","periode":"XVIII","histoire":"CHATENAY,  en 1541, cest une métairie appartenant au duc Charles, fils de François Ier, fut détruit, puis reconstruit vers 1807 (corps central et aile gauche) pour la famille Caminade, peut-être par larchitecte François-Nicolas Pineau.  Le domaine de Chatenay a été acheté par M. Hrayr Hakobyan en 2007, et après quatre ans de travaux, celui-ci est maintenant  entièrement rénové. Site exceptionnel de 40 hectares dont treize de vignes. Ouvert au public, concept unique alliant divers services : restaurant  gastronomique, club de Cognac, salles de séminaires et chambres d'hôtes,  cest lancienne propriété de Louise de Savoie, plantée sur un domaine de 40 hectares, près du lycée Jean-Monnet.  Le gérant des lieux annonçait en 2013 vouloir faire du domaine lun des sites les plus visités du cognaçais, est racheté en 2006 par un oligarque arménien, Hrayr Hakobyan à M. Grégoire. Après quatre ans de rénovation, le domaine est transformé en un complexe hôtelier ; celui-ci sera liquidé en 2015, cinq ans à peine après son ouverture.","architecture":"CHATENAY a été construit, à une date inconnue, sur l'emplacement d'une villa gallo-romaine. En 1541, c'est une métairie appartenant au duc Charles, fils  de François Ier, avec maison, grange, bâtiments, jardins, prés, terres et bois. Le château fut détruit, puis reconstruit vers 1807 corps central et aile gauche pour la famille Caminade, peut-être par l'architecte François Nicolas Pineau. L'aile latérale droite est agrandie vers 1897. Ferme reconstruite vers 1900, les écuries et le pigeonnier détruits. Logis principal avec ses ailes et ses quatre tours couvert d'ardoise, autres bâtiments couverts de tuiles creuses, seules les tours sont en pierre de taille.\r\nLe parc comprend une conciergerie, une ferme, une orangerie, une chapelle,des communs,  totalement reconstruit, accueille des réceptions d'évènements culturels, musicaux, artistiques. Partenariat avec les différentes associations de la région. Tois salles de séminaire, une grande salle de mariage et une terrasse.  Agrandi (aile latérale droite) vers 1897. Ferme reconstruite vers 1900, écuries et pigeonnier détruits.","habitants":"M. Hrayr Hakobyan \r\n        \"","divers":"","gps":"","images":["../image/image_16/16_Chatenay_Cognac_1.jpg","../image/image_16/16_Chatenay_Cognac_2.jpg","../image/image_16/16_Chatenay_Cognac_3.jpg","../image/image_16/16_Chatenay_Cognac_4.jpg","../image/image_16/16_Chatenay_Cognac_5.jpg"]},"Consult_chateau_formulaire07d0":{"id":"Consult_chateau_formulaire07d0","dept":"16","canton":"Boixe-et-Manslois","commune":"Chenon","nom":"Chenon","type":"Maison forte","periode":"XV","histoire":"CHENON, a appartenu à la famille Dexmier depuis le XVe siècle et dépendait de la baronnie de Verteuil. Le premier texte existant est de 1458 quand Louis Dexmier rend hommage à Guy de la Rochefoucauld. Alexandre Dexmier, protestant sera un compagnon d'Henri IV. Le logis restera dans la famille Dexmier jusqu'au milieu du XXe siècle. aujoiurd'hui propriété de monsieur Claude Lecomte.","architecture":"CHENON,  a été construit au XVe siècle, possède un corps de logis du XVe siècle qui a sans doute été prolongé vers le sud. Il est flanqué, côté cour, d'une tourelle polygonale contenant un escalier à vis. L'angle nord-est est également flanqué d'une tour circulaire à toit en poivrière et l'angle nord ouest d'une tour arrasée. Un bâtiment en retour conserve des ouvertures médiévales sur sa façade sur cour. A l'intérieur, les cheminées anciennes ont été conservées. Le corps de logis possède deux tours rondes, à son angle nord-ouest une tour ronde arasée qui semble bien antérieure au logis et au nord une tour ronde coiffée d'une toiture en poivrière. L'escalier à vis est à l'intérieur d'une tourelle polygonale située au tiers de la façade côté cour. Les fenêtres sont ornées de moulurations à nervure. Le toit à deux pans couvert de tuiles est percé de petites lucarnes. Le bâtiment en retour est percé d'ouvertures à meneaux attestant son origine médiévale. Il a été remanié au XVIIe siècle. D'autres bâtiments ont disparu. Le château (le corps de logis flanqué de ses deux tours) a été inscrit au M.H. par arrêté du 16 décembre 1987.","habitants":"Famille Dexmier \r\n        \"","divers":"Chenon 45° 56' 34 nord, 0° 14' 19? est","gps":"","images":["../image/image_16/16_Chenon_1.jpg","../image/image_16/16_Chenon_2.jpg","../image/image_16/16_Chenon_3.jpg","../image/image_16/16_Chenon_4.jpg"]},"Consult_chateau_formulaireac8b":{"id":"Consult_chateau_formulaireac8b","dept":"16","canton":"Charente-Nord","commune":"Vivier-Longré","nom":"Cherconnay","type":"Maison forte","periode":"XIV","histoire":"CHERCONNAY, la construction date du XIVe au XVe siècle. Ithier Corgnol, écuyer, seigneur de Mirbazin, aurait été le premier seigneur de Cherconnay, situé au Vivier-Estrain et de Tessé en Angoumois, Au Moyen Âge, Longré était le siège d'une seigneurie qui relevait de celle de Londigny et qui appartenait à la famille de Lestang. En 1469, Henri de Lestang, écuyer, seigneur de Longré, rendait aveu et hommage de ce fief à Jean Jousserand, seigneur de Lairé et de Londigny. La famille de Lestang conserva la possession de Longré jusqu'a la fin du XVIIIe siècle, au XIVe siècle Cherconnay passa par mariage aux Lestang puis en 1766 aux Bernonville. En 1593 René de Lestang est chargé de défendre les protestants de l'Angoumois auprès d'Henri IV. Le fief sera cédé aux Brumeaud de Moulinneuf en 1654. Catherine Brumeaud de Moulinneuf l'apporte à Louis Duge de Bernonville en 1766 cette famille le gardera jusqu'en 1928. René de Lestang était fils cadet d'Antoine de Lestang et petit-fils d'Henri de Lestang et de Perrette Corgnoul, et seigneur du Vivier, en la paroisse de Longré, en Angoumois. Il existe encore des descendants de cette famille dans la paroisse de Villefagnan.","architecture":"CHERCONNAY, le logis a été édifié aux XIVe et XVe siècles. C'est un bâtiment rectangulaire allongé à un étage sous toit à deux pans couvert de tuiles plates, aux fenêtres à traverses et à meneaux, très bien conservées. Sur la façade nord, la tour ronde coiffée d'une poivrière est percée d'archères. \r\nC'est un bâtiment rectangulaire allongé à un étage sous toit à deux pans couvert de tuiles plates, aux fenêtres à traverses et à meneaux, très bien conservées.  En 2012, la restauration du logis de Cherconnay a commencé. Ses façades et les toitures du corps de logis ont été inscrites aux M.H. depuis le 23/12/1994. En 2012, une restauration respectueuse est en cours.","habitants":"Famille de Lestang\r\n        \"","divers":"Cherconnay GPS : 45° 59' 14\" Nord, 0° 01' 24\" Ouest","gps":"45° 59' 14\" Nord, 0° 01' 24\" Ouest","images":["../image/image_16/16_Cherconnay_1.jpg","../image/image_16/16_Cherconnay_2.jpg","../image/image_16/16_Cherconnay_3.jpg"]},"Consult_chateau_formulaire6a22":{"id":"Consult_chateau_formulaire6a22","dept":"16","canton":"Cognac","commune":"Cherves-Richemont","nom":"Cherves_16","type":"Château","periode":"XVI-XVII","histoire":"Plusieurs châteaux à Cherves-Richemont dont celui de Bourgneuf, de Boussac, de Chanteloup, de Champblanc, dans article suivant le Petit-Coudret, Chesnel (voir article suivant) et Fontaulière.  Ainsi que Brissac et Saint-Rémy.                                           BOURGNEUF, bâti à Cherves-Richemont. La construction du château date du XVIe siècle. En 1540, le Seigneur de Bourgneuf était Jean Robicquet, qui fut le fidèle valet de chambre du roi François Ier.       BOUSSAC,  la construction du Logis de Boussac date de 1695, pour Jacques Perrin. Le logis de Boussac se situe sur les bords de l'Antenne, à la hauteur du bief du moulin. Le logis de Boussac a été bâti au XVIIe siècle, mais l'existence du moulin n'est connue qu'en 1427. En 1786, l'autorisation est donnée de construire à l'arrière, un moulin à papier, qui a fonctionné jusquen 1831, puis, il a été transformé en moulin à farine. Son propriétaire actuel est monsieur François Méhaud, qui la transformé en hôtel restaurant.  Le logis de Boussac a été inscrit aux M.H. en 1987","architecture":"BOURGNEUF, le logis est composé de deux ailes en équerre dont une, à deux niveaux, sous un toit en tiers-point et pignon; lautre à deux niveaux plus un de lucarnes qui peuvent dater du XVIe siècle mais dont les ouvertures ont été très remaniées. Leur jonction comporte une tourelle polygonale contenant un escalier à vis. Il dessert un étage supérieur carré souligné de 4 encorbellements moulurés. Le logis de Bourgneuf date du XVIe siècle.                         CHANTELOUP dit aussi château de Richemont,  a été reconstruit de 1930 à 1933, lors de sa transformation en séminaire. Il est actuellement le siège d'un Institut rural d'éducation et d'orientation (IREO). Le pigeonnier date de 1574 et 1582).  il ne reste que son portail, sa tour et son corps de logis. De style néo-normand, il a une charpente en fer, des murs en briques, granit, calcaire et bois. Il comporte des dépendances une orangerie. Le château  a été rénové et restauré à plusieurs reprises, en particulier par Édouard Martell, maire de Cherves et Paul Firino Martell. \r\nCHAMPBLANC, des réfugiés lorrains y seront accueillis au cours de la seconde guerre mondiale : « 60 orphelins, dit Guy Gauthier, avec dix surs et un moine. » Ils auraient été hébergés dans la tour, dite « la tour dorgueil ». La grange près du vieux pigeonnier servira alors de lieu de culte pour le voisinage. Au début du XXe siècle, la reine de Madagascar aurait séjourné dans cette tour. Aujourdhui, reprise par un propriétaire privé, la conservation de la Tour d'Orgueil reste la priorité de celui-ci.","habitants":"Bourgneuf famille de  Jean Robicquet                Boussac  Famille de Jacques Perrin                  Chanteloup d'Edouard Martell                                Champblanc  Guy Gauthier\r\n        \"","divers":"Bourgneuf GPS  : 45° 43' 08\" Nord et 0° 22' 49\" Ouest  Boussac GPS : 45° 43' 39\" Nord et 0° 21' 16,92\" Ouest     grav 5-6-7                                         Chanteloup  GPS : 45° 43' 08\" Nord et 0° 21' 36\" Ouest    Grav-8                                             Champblanc GPS : 45° 44' 39\" Nord, 0° 21' 07\" Ouest,  grav-2-3-4                                                        St-Remy grav 9","gps":"45° 43' 08\" Nord et 0° 22' 49\" Ouest  Boussac GPS : 45° 43'","images":["../image/image_16/16_Cherves_16_1.jpg","../image/image_16/16_Cherves_16_2.jpg","../image/image_16/16_Cherves_16_3.jpg","../image/image_16/16_Cherves_16_4.jpg","../image/image_16/16_Cherves_16_5.jpg","../image/image_16/16_Cherves_16_6.jpg","../image/image_16/16_Cherves_16_7.jpg","../image/image_16/16_Cherves_16_8.jpg"]},"Consult_chateau_formulairefe72":{"id":"Consult_chateau_formulairefe72","dept":"16","canton":"Cognac","commune":"Cherves-Richemont","nom":"Cherves_Brissac","type":"Château","periode":"XVII-XVIII","histoire":"BRISSAC, le 18 mai 1778, Joseph Busques, écuyer, seigneur de Pellisson, agissant pour Jean Baptiste Roland Claessen, ancien commissaire de la Marine, fait faire létat du logis de Brissac. Pierre Lanchère, notaire à Cognac, a vendu les lieux à Claessen le 22 avril précédent. Le logis comprend alors, au rez-de-chaussée, un salon, une chambre dont la cheminée est très ancienne, une autre derrière, une cuisine. A létage, se trouvent deux chambres, un corridor et un grenier.                                                                        ST-REMY, En 1698, Théodore-Jonas de Roxel, lieutenant de vaisseau du roi, achète une terre noble et les bois de Saint-Rémy. Le logis change ensuite souvent de mains sans modification. La construction du logis de Saint-Rémy date du XVIIe siècle, est composé d'un corps de logis rectangulaire, flanqué de deux pavillons carrés, qui le surplombent dun étage. Côté jardin, dans le brisis de la couverture, sont aménagées 5 lucarnes, sur le corps central et une, sur chaque pavillon. Ces lucarnes sont flanquées d'ailerons et portent des frontons, les uns cintrés et surmontés d'acrotères, les autres triangulaires. La porte d'entrée est encadrée de pilastres ioniques. La façade et la toiture du Logis de Saint-Rémy ont été inscrits aux M.H. depuis le 25/06/1979.","architecture":"BRISSAC, la construction date du XVIIIe siècle. Il est implanté au lieu-dit de lEpine. C'est un long bâtiment rectangulaire à un étage avec une petite aile en retour déquerre. Sur la façade principale ouvrant au sud-ouest, la porte, couverte en arc segmentaire, est surmontée dun entablement droit mouluré. Sur sa plate-bande, se trouvent une inscription en bas « NOBISTINE LOCUM POTIOREM RURE BEATO » et la date 1778. Cette inscription peut se traduire par « connais-tu un endroit préférable à une délicieuse campagne« , citation tirée dHorace. Trois travées de baies souvrent de part et dautre. A droite, le rez-de-chaussée de la deuxième travée est occupé par une porte basse à linteau droit. A gauche, se voient les restes dune porte identique, aujourdhui murée et partiellement amputée par une fenêtre. En effet, les deux travées de lextrémité du côté droit de lentrée ont été rajoutées. Toutes les fenêtres sont couvertes en arc segmentaire. Cette façade est soulignée dune terrasse ornée dune balustrade. Elle a été restaurée en 1994. La façade arrière, au nord-est, est percée, au rez-de-chaussée, de deux portes fenêtres et à létage de cinq petites baies couvertes en arc segmentaire, et dun oeil de boeuf. Laile en retour possède deux travées douvertures.","habitants":"Brissac famille de Jean Baptiste Roland Claessen      St-Rémy  Théodore-Jonas de Roxel\r\n        \"","divers":"Brissac GPS : 45° 44' 39\" Nord, 0° 21' 07\" Ouest  grav-2                                                                                St-Rémy  : 45° 42' 51,84\" Nord et 0° 22' 36,12\" Ouest grav-7","gps":"45° 44' 39\" Nord, 0° 21' 07\" Ouest  grav-2","images":["../image/image_16/16_Cherves_Brissac_1.jpg","../image/image_16/16_Cherves_Brissac_2.jpg"]},"Consult_chateau_formulaire62fd":{"id":"Consult_chateau_formulaire62fd","dept":"16","canton":"Cognac","commune":"Cherves-Richemont","nom":"Cherves_Richemont","type":"Château","periode":"XV-XVI-XVII","histoire":"CHERVES, ou Richemont. Au Nord-Est du massif rocheux, se trouve le logis, occupé depuis 1970, par lInstitut Rural dEducation et dOrientation. Un premier château avait été bâti vers 1550 par la famille de Lestang. Il n'en subsiste que les caves. Il fut remplacé en 1610 par une seconde construction réalisée par Pierre Jarousseau. Vendu au diocèse, en 1839, le logis abrita, le petit séminaire, de 1839 à 1968. Pusieurs aménagements furent réalisés à l'époque, dédiée à Notre-Dame de Richemont, bâtie de 1868 à 1873, sur les plans de larchitecte Alexandre Tessier.  On peut admirer les 6 grandes verrières ornées de personnages bibliques qui illuminent la chapelle. Réalisées de 1870-1880, par le maître-verrier Lobin de Tours, elles sont depuis en fort mauvais état. La chapelle est aujourdhui désaffectée.                             PETIT COUDRET,  Il y a à Cherves deux noms de Coudret : Le Coudret qui est un village et Le Petit-Coudret qui est un domaine. A la fin du XVIe siècle, ce dernier appartenait à la famille Cordon. François Cordon était contrôleur des Eaux et Forêts, de lAngoumois.  En 1730, le domaine du petit-coudret a été racheté par Léon-Alexis de Brémond, vicomte dArs, lieutenant de vaisseau, marié avec Louise Faure de La Fayolle, laquelle mourut au Coudret, le 6/12/1769. Sa fille, Marie-Judith, veuve de Charles-Jacob de Brémond, se retira à Paris, où elle décèda, en 1782. Le logis du Petit-Coudret passa alors à la famille Brunet, qui le conserva, durant 80 ans. Il appartient depuis à Mr Baron.","architecture":"FONTAULIERE,  était un petit fief seigneurial qui dépendait de la principauté de Cognac. Sous Henri IV, sous Louis XIII et au début du règne de Louis XIV, les Maignan puis, par achat, Henri de Poquaire, déjà seigneur du Cormier, réidèrent au château de Fontaulière. Ses héritiers le conservèrent jusquen 1767. Puis, les Saulnier de Montlambert leur succédèrent. En 1775, ils tiraient du domaine le modeste revenu de 340 livres par an. Ce fut ensuite la famille Benon qui fit rebatire  le château, au XIXe siècle, pour en faire une résidence dété. Aujourdhui, la demeure appartient à la famille Garandeau.\r\n Construite au cours du XIXe siècle, elle présente un plan rectangulaire. Elle est couverte dune toiture à la Mansart, ses lucarnes sont ornées dun fronton segmenté, la façade arrière est flanquée dune tour cylindrique.","habitants":"Cherves   famille de Lestang                                    Petit Coudret  Famille Cordon                                   Fontauliere  famille Benon\r\n        \r\n        \"","divers":"Cherves GPS : 45° 44' 39\" Nord, 0° 21' 07\" Ouest    Grav-1 -2                                                            Coudret GPS : 45° 44' 39\" Nord, 0° 21' 07\" Ouest grav-3,                                                                           Fontaulière grav 4","gps":"45° 44' 39\" Nord, 0° 21' 07\" Ouest    Grav-1 -2","images":["../image/image_16/16_Cherves_Richemont_1.jpg","../image/image_16/16_Cherves_Richemont_2.jpg","../image/image_16/16_Cherves_Richemont_3.jpg","../image/image_16/16_Cherves_Richemont_4.jpg"]},"Consult_chateau_formulaire22cc":{"id":"Consult_chateau_formulaire22cc","dept":"16","canton":"Cognac","commune":"Cherves-Richemont","nom":"Chesnel","type":"Château","periode":"XV-XVII","histoire":"CHESNEL, situé dans le bourg de ce nom était au Moyen-Age qu'une simple habitation, siège d'une seigneurie ou les seigneurs de Cognac avaient le droit de gîte. En 1450 Pierre de Parage, vassal du comte d'Angoulême \"Jean d'Orléans\" dont la fille hérite du domaine qu'elle apporte en dot à Jacques Adam riche bourgeois, leur fille épouse Barthélémy de Limbert et en 1540 , les Limbert se défond  de la seigneurie de Cherves  le vende à Jacques Chesnel seigneur des Réaux gouverneur de la ville de Cognac, c'est au XVIe siècle que son petit-fils Charles-Roch Chesnel, délaisse le vieux manoir transporte la seigneurie dans le nouveau château  qu'il vient de faire construire au lieu dit de la Roche, les Chesnel alliès à de grandes familles tel que les Polignac, les Chasteignier, etc, tiennent un rang élevé. au XVIIe siècle, Claude Chesnel petit fils fait carrière dans la marine portera le titre de Marquis d'Ecoyeux, sa fille  Marie-Madeleine héritière du château de Chesnel épouse Louis Guilhouet d'Orvilliers futur amiral de la flotte, les Orvilliers ayant perdu leur fille unique en 1779, ils léguent le château à leur neveux les Frétard  d'Ecoyeux et en 1861  à l'extinction du dernier de leurs descendants, le château est racheté par la famille des Otards de la Grange également propriétaire du château de Cognac. En 1885 le château passe à la famille de Roffignac qui depuis cette date devenu une exploitation viticole.","architecture":"CHESNEL style classique français, surprend par son architecture originale et ses dépendances sont restés intacts, depuis leur construction jusqu'au début du XVIIe, de plan en U  consiste un corps de logis central, prolongé par des ailes que terminent deux gros pavillons carrés. Il est composé d'une vaste avant-cour rectangulaire à trois ailes ouvrant sur le château de plan carré, la cour centrale, entouré de douves sèches, sur quatre faces. Le bâtiment central comporte deux niveaux de baies carrées avec au milieu un perron et une porte.  Est encadré de deux pavillons ou de tours carrées qui précèdent les ailes basses de retour. Un parapet avec des merlons de fantaisie surmontés de boules les couronne.  le bâtiment présente une silhouette trapue et semble conçu pour la défense, cependant le crénelage couronnant le parapet supporté par des consoles, qui dissimule  un toit plat apparaît purement décoratif.  Inscrit aux M.H. depuis le 24/05/1965.","habitants":"Famille de Jacques Chesnel \r\n        \"","divers":"Chesnel GPS : 45° 45' 05,31\" Nord et 0° 22' 03,94\"","gps":"45° 45' 05,31\" Nord et 0° 22' 03,94\"","images":["../image/image_16/16_Chesnel_1.jpg","../image/image_16/16_Chesnel_2.jpg","../image/image_16/16_Chesnel_3.jpg","../image/image_16/16_Chesnel_4.jpg","../image/image_16/16_Chesnel_5.jpg","../image/image_16/16_Chesnel_6.jpg"]},"Consult_chateau_formulaire2da2-2":{"id":"Consult_chateau_formulaire2da2-2","dept":"16","canton":"Charente-Sud","commune":"Chillac","nom":"Chillac","type":"Château","periode":"XV","histoire":"CHILLAC, les seigneurs de Chillac sont mentionnés dans de nombreux textes anciens, et le château existait déjà au XIe siècle ; il relevait de Barbezieux, mais il a disparu durant la guerre de cent ans.  Tout autour de la construction actuelle se trouvent des fondations anciennes émergeant de terre. Il était le siège d'une seigneurie à toute justice relevant de Barbezieux. Au XVIIIe siècle, il devient propriété du marquis de Donissan de Citran, grand sénéchal de Guyenne.   Propriétaire  aujourd'hui monsieur Jean-François Hurtaud.","architecture":"CHILLAC,  après la guerre de cent ans, il est reconstruit au XVe siècle sur les soubassements, il occupe un terre-plein rectangulaire dont le côté sud est constitué par l'église romane du XIIe siècle. En deux corps de bâtiment dans le prolongement de l'un de l'autre reliés par une tour carrée. L'entrée était à l'est de son chevet, où se trouvent les vestiges dérasés d'une tour ronde.  Un corps de logis flanqué aux angles du couchant de deux tours rondes. Une tourelle en pierre, de plan polygonal, contient l'escalier en pierre à vis qui dessert cette partie du château qui est éclairée par des fenêtres à moulures et accolades du XVe siècle. Le bâtiment de la courtine nord est une longue aile à deux niveaux, aux baies à meneaux, et à la toiture à forte pente. Il est desservi par un escalier à vis dans une tour polygonale.  Un simple pan de mur relie le pavillon carré adossé à la grande tour à un autre corps de logis de plan rectangulaire avec tourelle polygonale, tronquée. Elle décore la façade sud dont toute la partie  a été reconstruite à une époque relativement récente. Le bâtiment à l'angle nord-ouest est formé de deux ailes en équerre, à fenêtres à meneaux. Il est encadré de trois tours rondes coiffées, pour deux d'entre elles, de toitures quadrangulaires recouvertes de tuiles plates, et pour la troisième d'une très haute poivrière.","habitants":"Marquis de Donissan de Citran\r\n        \"","divers":"Chillac GPS : 45°21'44\"Nord et 0°04'55\" Ouest","gps":"45°21'44\"Nord et 0°04'55\" Ouest","images":["../image/image_16/16_Chillac_1.jpg","../image/image_16/16_Chillac_2.jpg","../image/image_16/16_Chillac_3.jpg","../image/image_16/16_Chillac_4.jpg","../image/image_16/16_Chillac_5.jpg"]},"Consult_chateau_formulaire1f20-2":{"id":"Consult_chateau_formulaire1f20-2","dept":"16","canton":"Charente-Vienne","commune":"Exideuil","nom":"Chétardie","type":"Château","periode":"XV-XVIII","histoire":"CHETARDIE Le nom de la Chétardie vient de la famille Chétard, dont la dernière de la lignée épouse en 1500 Jean Trotti, ce qui donne la lignée de la Chétardie. Jacques-Joachim Trotti de La Chétardie (1705-1759), officier, diplomate et écrivain, est leur descendant le plus connu. Le marquis de La Chétardie était ambassadeur de Louis XV, en Russie, de 1636--1714, Abbé Joachim de La Chétardie, curé de Saint-Sulpice de Paris, confesseur de madame de Maintenon, moraliste mondain, théologien; 3e branche: Polignac; Mascureau (Massignac); Verthamont; [novembre 26, 1651]. Naissance , de Anne de Mercy, fille de Ezechiel de Mercy de la Maison-Neuve qui s'était réfugiée au château \"à cause de la guerre des Princes\";[novembre 9, 1657] décès de Charles de la Chétardye [>1705-1759 célibataire] marquis Jacques-Joachim, officier, ambassadeur en Russie, amant de la tsarine Elisabeth Petrovna [1741]; [1744] rappelé à Paris; achat des seigneuries du Bureau (La Péruse) et La Mirande; [1759] château vendu à Joseph Paris-Duvernay banquier; Jean Paris de Montmartel [1766] financier, frère de Joseph Paris-Duvernay; marquis de Brunoy  fils de Jean Paris de Montmartel, ruiné il vend;en 1787 à Ignace de Lagrange Labaudie qui fut maire d'Exideuil; [1855] Eusèbe Nassaud (avocat); [1900] Edouard Boulouneix sénateur;\r\n Médecin-général Gravelat; famille Tisseuil.","architecture":"CHITARDIE, du château du XIe siècle il reste deux tours coiffées de poivrières. Le château rectangulaire a été rebâti au XVIIe siècle. Il a été remanié au XVIIIe siècle, avec en particulier l'ajout de douves sèches. Sur l'autre façade du château, une pièce en rotonde d'inspiration Russe a été ajouté par Jacques-Joachim Trotti de La Chétardie, ministre plénipotentiaire de Louis XV dans ce pays. Il a été en partie inscrit au M.H. le 30 octobre 1973. L'inscription comprend les douves et le portail, les façades et les toitures du château et des deux tours ainsi que l'escalier intérieur et le plafond peint de la tour située à l'est.","habitants":"Famille Chétard,                                                              Madame de Maintenon\r\n        \"","divers":"Chétardie 45° 53' 01? nord, 0° 40' 10 est2","gps":"","images":["../image/image_16/16_Ch%c3%a9tardie_1.jpg","../image/image_16/16_Ch%c3%a9tardie_2.jpg","../image/image_16/16_Ch%c3%a9tardie_3.jpg"]},"Consult_chateau_formulairedcba":{"id":"Consult_chateau_formulairedcba","dept":"16","canton":"La-Couronne","commune":"Puymoyen","nom":"Clairgon_Diable","type":"Manoirs","periode":"XVI","histoire":"CLAIRGON,  bâti à Puymoyen,  fut l'ancien haut lieu des colonies angoumoisines. LAmicale laïque dAngoulême avait un projet pour aménager le site de Clairgon. Larchitecte des Bâtiments de France la interdit. Personne ne veut investir pour réhabiliter ce lieu chargé dhistoire. Depuis, le château de Clairgon est à l'abandon depuis sa fermeture en 1998.\r\nDIABLE possédé alors par Pierre de Montjean, seigneur du Petit Rochefort. Le château actuel fut construit au tout début du XVIe siècle et possédé alors par Pierre de Montjean, seigneur.","architecture":"DIABLE, au pied du hameau du Petit Rochefort, ce manoir est situé dans la rue à laquelle il a donné son nom, occupait un château plus ancien qui avait été occupé puis détruit lors de la guerre de cent ans par les Anglais.   Le château du Diable est une ancienne place forte anglaise de la guerre de cent ans. Les Anglais étaient alors surnommés les diables rouges, ce qui lui a donné son nom. Il reste du château du XVIe siècle une vaste salle voûtée en berceau brisé qui permet de le classer dans la catégorie des manoirs-salles jadis fréquents en Angoumois comme en Gascogne. Le portail avec les diables sculptés a été ajouté par son propriétaire, M. Boeglen, en 1937. L'édifice jouit d'une vue imprenable sur la vallée qu'il surplombe. On aperçoit très nettement le \"Château du Diable\" de la vallée des Eaux Claires, avec sa façade blanche, qui se détache nettement parmi les chênes verts.","habitants":"Famille de Pierre de Montjean,\r\n        \r\n        \"","divers":"Clairgnon  GPS : 45° 36' 52\" Nord, 0° 10' 55\" Est  Diable GPS : 45° 36' 52\" Nord, 0° 10' 55\" Est  grav -4","gps":"45° 36' 52\" Nord, 0° 10' 55\" Est  Diable GPS : 45° 36' 52\" N","images":["../image/image_16/16_Clairgon_Diable_1.jpg","../image/image_16/16_Clairgon_Diable_2.jpg","../image/image_16/16_Clairgon_Diable_3.jpg","../image/image_16/16_Clairgon_Diable_4.jpg"]},"Consult_chateau_formulairef8c8":{"id":"Consult_chateau_formulairef8c8","dept":"16","canton":"Cognac","commune":"Cognac","nom":"Cognac_Chateaux","type":"Château","periode":"XV-XIX","histoire":"Chateaux de Cognac, outre le château des Valois Plusieurs fois reconstruit, le château de Cognac, aussi appelé château des Valois ou château François I??, est un monument situé dans la commune  de Cognac et existant depuis le Xe siècle.                                      MUSEE  c'était en décembre et le musée de Cognac, très actif en matière d'animations culturelles.   PELLISON, bâti à Cognac,  vous propose ses salles de réception pouvant contenir 300 personnes, dont 120 places assises, pour fêter vos événements privés ou professionnels.                                                           YEUSE  est un château bâti à Chateaubernard-Cognac,  est reconverti en un superbe hôtel-restaurant gastronomique 4 Etoiles, avec un bistrot, un traiteur et pour votre détente et un Spa. De Celine Desmazières.","architecture":"Les châteaux aux environs de Cognac sont de constructions assez moderne du XVIII et XIXe siècle.  Musée classé en 1943. De style  néo-classique, à la limite de l'austérité, la demeure est parfaitement symétrique et résolument sobre. Si elle n'était agrémentée par les deux portiques en plein cintre ménageant un passage vers le parc, elle serait presque banale.                                                          PELLISSON  bâti à Cognac,   ancienne bâtisse des années 1890 au coeur de Cognac, autrefois mise en bouteille dune célèbre maison de négoce, est aujourd hui rénovée et adaptée pour tout type de réception: privée, professionnel.                                                YEUSE, construction du XIXe siècle.","habitants":"Divers seigneurs\r\n        \"","divers":"Pellison 45° 41' 45\" Nord, 0° 19' 45\" Ouest     grav-3-4-5                                                                               Yeuse  GPS : 45° 40' 24\" Nord, 0° 18' 47\" Ouest grav 7-8","gps":"45° 40' 24\" Nord, 0° 18' 47\" Ouest grav 7-8","images":["../image/image_16/16_Cognac_Chateaux_1.jpg","../image/image_16/16_Cognac_Chateaux_2.jpg","../image/image_16/16_Cognac_Chateaux_3.jpg","../image/image_16/16_Cognac_Chateaux_4.jpg","../image/image_16/16_Cognac_Chateaux_5.jpg","../image/image_16/16_Cognac_Chateaux_6.jpg","../image/image_16/16_Cognac_Chateaux_7.jpg","../image/image_16/16_Cognac_Chateaux_8.jpg","../image/image_16/16_Cognac_Chateaux_9.jpg"]},"Consult_chateau_formulaire6471":{"id":"Consult_chateau_formulaire6471","dept":"16","canton":"Cognac","commune":"Cognac","nom":"Cognac_Valois","type":"Forteresse","periode":"XII-XV-XVIII","histoire":"Plusieurs châteaux à Cognac, Plessis et Chatenay et Yeuse voir article pour ces derniers.                   COGNAC, Marie-Amélie de Jarnac, fille d'Ithier V de Cognac, avec son fils illégitime Philippe de Falcombridge, qui vend la seigneurie de Cognac à Jean sans Terre, roi d'Angleterre. Sa veuve Isabelle Taillefer  se remarie avec Hugues X de Lusignan, gardant Cognac malgré les menaces, dont celle d'excommunication par le pape Honorius III. Au XIIIe siècle, le comte Guy de Lusignan effectue d'importantes transformations et fortifie la ville. Au XIVe siècle, Philippe le Bel rattache l'Angoumois avec la seigneurie de Cognac à la couronne de France. Mais pendant la guerre de cent ans, Cognac change de suzerain au gré des combats et des traités, entre les Anglais et les Français. Le retour après 33 ans de captivité en Angleterre de Jean de Valois, dit « le bon comte Jean », marque la fin de longues années de troubles et le retour de la prospérité. Jean de Valois retrouve un château abandonné et en très mauvais état. Le nouveau comte d'Angoulême s'installa à Cognac avec son épouse Marguerite de Rohan et entreprend la reconstruction du château en 1450. Commence alors le « siècle d'or des Valois ». En 1467, Charles  de Valois  succède à son père, a épousé en 1487 Louise de Savoie un fils en 1494 François de Valois qui devient roi de France en 1515 sous le nom de François Ier, le duc d'Artois futur Charles X vend  certains bâtiment  en 1788 au baron Otard négociant.","architecture":"COGNAC, vers 1200, le château est reconstruit en pierre par les Taillefer, comtes d'Angoulême, sur le même emplacement au bord du fleuve face aux quais et à gauche des portes de la ville en y entrant. Une première fortification encercle le bourg,  la construction date du XIIe-XVe siècle, faute d'entretien, le château se délabre durant la fin du XVIIe et XVIIIe siècles. De 1756 à 1757, il sert de prison qui  laissent leurs graffitis étudiés récemment.  Au cours du XIXe siècle certains aménagements ont provoqué la destruction de vestiges du château mais la société Otard a aussi fait d'importants travaux de conservation et de restauration.  Venant du quartier Saint-Jacques, le pont médiéval qui a été démoli en 1855 enjambait la Charente face aux deux tours à courtine et mâchicoulis trilobés construites de 1499 à 1500 en remplacement de tours carrées ; c'est pratiquement tout ce qu'il reste de l'enceinte fortifiée de la ville. Le château présente une façade imposante à gauche des portes avec les quais à ses pieds. Cette façade très sobre, surélevée vers 1852, est égayée par une grande fenêtre nommée balcon du roi, ornée de médaillons sculptés (avec en particulier le profil de François Ier) et repose sur deux salamandres qui encadrent un blason.","habitants":"Famille de  Charles  de Valois  \r\n        \"","divers":"Cognac GPS : 45° 41' 54\" Nord et 0° 19' 48\" Ouest, Musée grav-7","gps":"45° 41' 54\" Nord et 0° 19' 48\" Ouest, Musée grav-7","images":["../image/image_16/16_Cognac_Valois_1.jpg","../image/image_16/16_Cognac_Valois_2.jpg","../image/image_16/16_Cognac_Valois_3.jpg","../image/image_16/16_Cognac_Valois_4.jpg","../image/image_16/16_Cognac_Valois_5.jpg","../image/image_16/16_Cognac_Valois_6.jpg","../image/image_16/16_Cognac_Valois_7.jpg"]},"Consult_chateau_formulaire8867":{"id":"Consult_chateau_formulaire8867","dept":"16","canton":"Charente-Vienne","commune":"Confolens","nom":"Confolens","type":"Vestiges","periode":"XI-XII-XV","histoire":"CONFOLENS,  Aynard, seigneur de Chabanais, aurait construit ce château, d'après les cartulaires de l'abbaye de Lesterps cette communauté initiale de possession par une même famille se traduira par cinq siècles d'histoire confondue.  En 1023 il est assiégé par Bernard comte de la Marche.  En 1091, Boson III, autre comte de la Marche, y trouva la mort en tentant de l'assiéger. Au milieu du XIIIe siècle passa à la famille de Matha, puis après quelques tribulations dans celle des Thouars. Catherine de Thouars fit passer par remariage  Confolens dans la maison de Vendôme, elle était veuve  du sinistre Gilles de Rais. Mais au XVe siècle  le château s'intègre dans un système défensif protégeant la ville, fut remplacé par une résidence au bas de la ville.  Les seigneurs de Chabanais réussissent à se défendre de leurs voisins, les La Rochefoucauld, les comtes d'Angoulême et les vicomtes de Rochechouart. Par mariages puis ventes à partir de 1130, le château passe dans les mains de grands seigneurs qui n'y résident pas ; seule la salle de l'auditoire aux fonctions judiciaires était utilisée.","architecture":"CONFOLENS, le Donjon carré date du XIe siècle et fait partie de l'ancien château. « En dépit de son arasement, le donjon domine encore aujourdhui la ville. Il est constitué dune tour de plan carré, sur trois niveaux sans contrefort, conservée sur 10 mètres de hauteur. Il est bâti en grand appareil de granite avec des pierres imposantes dans les angles. Il conserve, au centre de lélévation occidentale, la mieux préservée, une baie romane couverte en plein cintre qui dissimule une meurtrière à double ébrasement. Il ne reste que les murailles et le donjon carré Les remparts de granit rose sont percées d'une porte étroite en arc brisé. Une courtine rejoint le donjon carré.","habitants":"Famille de Matha\r\n        \"","divers":"Confolens  GPS : 46° 00' 53\" Nord et 0° 40' 27\" Est","gps":"46° 00' 53\" Nord et 0° 40' 27\" Est","images":["../image/image_16/16_Confolens_1.jpg","../image/image_16/16_Confolens_2.jpg"]},"Consult_chateau_formulaire796c":{"id":"Consult_chateau_formulaire796c","dept":"16","canton":"Charente-Vienne","commune":"Confolens","nom":"Confolens_Comtes","type":"Manoir-Château-Vestiges","periode":"XV-XVI","histoire":"deux châteaux à Confolens (voir articles) celui des Comtes et le Mas Marteau.                               COMTES, le manoir des comtes appelé aussi la maison d'Oradour est bâti à Confolens, près du Goire, la construction   date du XVe au XVIe siècle, pour la famille Guimard puis par les comtes de Confolens pour avoir un logement plus confortable que leur château qui tombait en ruines. Les armes des comtes apparaissaient sur l'un des bâtiments, d'où le nom du logis. Ils ne semblent jamais y avoir habité, et le plus ancien propriétaire connu est Mr Guimard, receveur du comté. Le bâtiment Nord date du XVIIe siècle. Au XVIIIe siècle, le manoir des comtes fut revendu à Nicolas Marcillac d'Oradour, d'où le second nom du manoir. En 1793, il appartenait à la commune et servit de prison aux prisonniers espagnols, des guerres napoléoniennes. En 1826, le manoir des Comtes appartenai à Mr Decauffour.                                            MAS-MARTEAU Charles VII récompensa ses fidèles serviteurs en leur donnant des terres, notamment en Berry où ils se fixèrent. A Guillaume Perry il donna le domaine du Mas-Marteau, près de Confolens, car l'Angoumois, comme le Berry, faisait partie du domaine royal. le château du Mas-Marteau a été  restauré par la famille Périgord de Villechenon. Les Perry, à la suite de ce mariage, eurent un blason « d'argent, à la bande de sable accompagnée de deux lions léopardés de gueules, l'un en chef, l'autre en pointe ». La ressemblance est frappante. Les Perry, en signe d'alliance, adoptèrent donc, en le modifiant légèrement, le blason des Tison, qui était aussi semblable au blason de leurs suzerains, les princes de Chabanais.","architecture":"COMTES du XVe siècle comprend 4 corps de logis distincts, dont un plus bas, plus récent, le plus proche du pont du Goire. Les 3 corps de logis principaux s'articulent autour d'une cour donnant sur la rivière. Une grosse tourelle quadrangulaire d'escalier à porte Renaissance flanqué au midi, sa toiture primitive en pyramide a été tronquée au XVIIIe siècle pour en faire un pavillon mansardé, celui le plus à l'Est n'a pas de façade côté rue du Soleil, contrairement aux 3 autres bâtiments. Le corps de logis rectangulaire a un toit pointu à 2 pans. Il possède 3 étages ainsi qu'une chapelle voûtée en ogives. Le corps de logis de plan carré est légèrement plus haut que le précédent et possède un toit à 4 pans, en forme de calotte. Sa façade sur rue est percée d'une porte de style Renaissance. Le dernier corps de logis possède une poterne surmontée d'un entablement sur lequel étaient sculpté le blason des comtes de Confolens, encadré par des motifs en X. La cour intérieure possède un puits et une galerie, à 3 arcades.                                   MAS-MARTEAU maison forte du XVe siècle. Elle est typique de larchitecture des manoirs défensifs de la région. Elle comporte un corps de logis principal, orné de fenêtres à meneaux avec une tour d'escalier en demi-hors-duvre. La cour, autrefois fermée par un mur denceinte de 6 mètres de haut, est flanquée de 2 tours défensives, dont une est, aujourdhui, partiellement arasée.","habitants":"Comtes  famille Guimard                                                Mas-Marteau Famille de Guillaume Perry\r\n        \"","divers":"Comtes GPS : 46° 00' 55\" Nord, 0° 40' 29\" Est","gps":"46° 00' 55\" Nord, 0° 40' 29\" Est","images":["../image/image_16/16_Confolens_Comtes_1.jpg","../image/image_16/16_Confolens_Comtes_2.jpg","../image/image_16/16_Confolens_Comtes_3.jpg","../image/image_16/16_Confolens_Comtes_4.jpg"]},"Consult_chateau_formulaireb9f3":{"id":"Consult_chateau_formulaireb9f3","dept":"16","canton":"Val-de-Nouère","commune":"Moulidars","nom":"Cour_Moulidars","type":"Maison forte","periode":"XV","histoire":"COUR, le logis de la Cour, aurait été le premier château de la seigneurie de Moulidars, cet ancien fief de la Cour fut successivement la propriété de Renault de La Cour initialement, puis de Jean de Bos, frère de Saint-Jean-de-Jérusalem, des Nory, des Popillon, du comte de Nancy, et en 1649, de François de la Croix. Il changea plusieurs fois de main avant d'être acquis en 1714 par Pierre Imbert de Ballore. C'est dans la seconde moitié du XVIIIe siècle que les Ballore firent construire l'édifice actuel sur l'emplacement du château féodal. Lors de la Révolution, Jacques Imbert de Ballore, propriétaire du château, fut condamné à mort et guillotiné. Anne Heulhard, sa veuve, demanda la levée du séquestre des biens de son mari, et réussit à l'obtenir quelques jours plus tard : l'entièreté du château, ainsi que la moitié des biens, étaient laissés à la veuve et à ses enfants ; le reste des possessions de la famille devinrent biens nationaux, comme indiqué dans une lettre du commissaire du gouvernement chargé de gérer les biens des Ballore : « Occupé de faire le recolement des meubles et effets séquestrés sur le guillotiné Ballore, il s'est trouvé deux chasubles, six chandeliers de cuivre, que je n'ai pas mis au nombre des effets qui doivent être vendus. Je vous les envoie pour faire destination utile à la République. », 5 germinal an III (25 mars 1795).","architecture":"COUR, aujourd'hui, il ne subsiste plus aucune trace du château originel datant du Moyen Âge. Le château actuel a été construit en remplacement de l'ancien, sans rien en laisser. Ce premier château se composait d'un vaste corps de logis, flanqué de deux pavillons et entouré de fossés surmontés d'un pont-levis. Doté d'un étage et de deux ailes de chaque côté du bâtiment formant une cour régulière, le château possédait dans son aile gauche une chapelle, construite en 1649.  Son intérêt repose, en particulier, sur ses souterrains-refuges. L'actuel corps de logis date du XVe siècle car le château fût rebâti après la guerre de cent ans. C'est devenu ensuite la métairie du C.","habitants":"Famille de François de la Croix\r\n        \r\n        \"","divers":"Cour GPS : 45° 39' 46\" Nord et 0° 01' 57\" Ouest","gps":"45° 39' 46\" Nord et 0° 01' 57\" Ouest","images":["../image/image_16/16_Cour_Moulidars_1.jpg"]},"Consult_chateau_formulairea543":{"id":"Consult_chateau_formulairea543","dept":"16","canton":"Boème-Echelle","commune":"Dignac","nom":"Dignac_Pouyaud","type":"Forteresse","periode":"XV-XVI","histoire":"DIGNAC, le château du Pouyaud est situé sur un des points culminants de la commune. Son donjon du XVIe siècle domine les alentours. Le château est inscrit monument historique en 1966.  Tour du Breuil.(voir article)Du château de la Tour du Breuil du XVIe siècle \r\nPOUYAUD, au milieu du XVe siècle, le fief du Pouyaud (ou des Poyaux) est passé par mariage de la famille Fougières à celle de Prévost de Touchimbert. Ce fief relevait du baron de Villebois, Guy de Mareuil, un dénombrement lui ayant été fourni en 1481. La tour a été reconstruite en 1520. En 1665, le Pouyaud appartient à Jeanne de Lespinay, veuve de Charles de Galard de Béarn, seigneur de Mirande et du Pouyaud. Elle se remaria avec Joseph de Raymond, seigneur voisin de la Tour du Breuil. Louis de Galard de Béarn, seigneur de Mirande, qui est le fils de Jeanne et Charles, hérite du domaine, qui restera ensuite dans cette famille jusqu'à la Révolution. Au XVIIe siècle, le corps de logis est reconstruit et un étage ajouté, puis au XVIIIe siècle une aile est ajoutée. En 1902, le Pouyaud appartient à la famille de Juglart de Lardinie, puis Grassal en 1914, puis après plusieurs ventes, aux Buraud dans les années 1960, qui l'ont restauré.","architecture":"POUYAUD, du château du Pouyaud il reste les vestiges d'une porte du XVe siècle accostée d'une échauguette d'angle mutilée sur le bâtiment en retour d'équerre, et du château édifié en 1520, il reste la tour couronnée de mâchicoulis qui abrite la chapelle dont la voûte repose sur des nervures. Un pavillon couvert d'une haute toiture d'ardoise est collé au logis principal reconstruit au XVIIe siècle. Les bâtiments forment un fer à cheval. L'élément central, côté cour, est le donjon carré du XVIe siècle. Il s'élève à une hauteur de 14 mètres sur deux étages voûtés. Il est orné de mâchicoulis et surmontée d'une fine tourelle. Une chapelle occupe sa base, dont la voûte repose sur des nervures. Accolée au donjon se trouvent le pavillon de plan carré et le corps de logis. Le pavillon est surmonté d'un toit en ardoises à la Mansart. \r\nLa façade intérieure du corps de logis du XVIIe et XVIIIe siècles est percée de fenêtres à petit-bois et d'une porte. Celle-ci a des sculptures moulurées, et elle est surmontée d'un fronton curviligne reposant sur deux pilastres. Les vestige
