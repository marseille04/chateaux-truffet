s d'une porte du XVe siècle accostée d'une échauguette d'angle se trouvent aussi sur l'angle nord-ouest du bâtiment en retour d'équerre. Le château, avec ses façades et toiture, est inscrit M.H.e le 9 juin 1966.","habitants":"Famille Fougières\r\n        \"","divers":"Pouyaud-5° 33' 15? nord, 0° 15' 59? est[2]                     Tour du  reuil grav 1-6","gps":"","images":["../image/image_16/16_Dignac_Pouyaud_1.jpg","../image/image_16/16_Dignac_Pouyaud_2.jpg","../image/image_16/16_Dignac_Pouyaud_3.jpg","../image/image_16/16_Dignac_Pouyaud_4.jpg","../image/image_16/16_Dignac_Pouyaud_5.jpg","../image/image_16/16_Dignac_Pouyaud_6.jpg","../image/image_16/16_Dignac_Pouyaud_7.jpg"]},"Consult_chateau_formulairea294":{"id":"Consult_chateau_formulairea294","dept":"16","canton":"Boème-Echelle","commune":"Dirac","nom":"Dirac","type":"Château","periode":"XV-XVIII","histoire":"DIRAC, appartenait à l'une des plus vieilles et illustres familles de l'Angoumois, les Tison d'Argence. Hubert  Bettan et Isabelle Dubois-Dumée vont sortir de l'ombre pour faire revenir la vie dans l'ancienne demeure de la famille Tison d'Argence.    Aujourd'hui, le château des Tison d'Argence, illustre famille de l'Angoumois, commence à revivre grâce à leurs nouveaux propriétaires qui ont ouvert un showroom et envisagent d'aménager 3 gîtes et une salle événementielle.           CHATELARD, petit château du XVIIIe siècle  Transformé en chambres d'hôtes et restaurant gastronomique  par la famille Deschamps.","architecture":"DIRAC, du XII-XVe siècle, n'a conservé que ses deux tours médiévales. Elles encadrent le logis carré construit à la place du logis primitif,  le château féodal de Dirac, dont il reste des oubliettes creusées dans le roc et deux tours, au XIIIe siècle, les Tison reconnaissaient à l'évêque le droit d'y séjourner lorsqu'il le requérait, « ami ou ennemi, en paix ou en guerre ». Le château de Dirac domine le vallon de l'Anguienne, deux hautes tours l'une du XIIIe siècle et l'autre du XVe siècle encadrent la bâtisse carrée du XIXe siècle qui a remplacé les bâtiments de la fin du Moyen-Âge. L'enceinte du château comprenait deux tours rondes encadrant un pont-levis, les tours ont été rasées et le pont-Levis a disparu. Dans la cour, un escalier très raide donne accès à un cluzeau (souterrain-refuge) comprenant plusieurs salles.                                                                           Châtelard de style gentilhommière oblongue à deux niveaux  de plan en U toit à deux pans.","habitants":"Dirac, famille Tison d'Argence                              Châtelard  famille Deschamps\r\n        \"","divers":"Chatelard grav 5-6                                                          Dirac 45° 36' 19 nord, 0° 14' 57? est grav de 1-4","gps":"","images":["../image/image_16/16_Dirac_1.jpg","../image/image_16/16_Dirac_2.jpg","../image/image_16/16_Dirac_3.jpg","../image/image_16/16_Dirac_4.jpg","../image/image_16/16_Dirac_5.jpg","../image/image_16/16_Dirac_6.jpg"]},"Consult_chateau_formulaireb1f6":{"id":"Consult_chateau_formulaireb1f6","dept":"16","canton":"Tude-et-Lavalette","commune":"Déviat","nom":"Déviat","type":"Château","periode":"XV-XVI","histoire":"FAYE, durant la guerre de cent ans toute la population trouvait refuge derrière ses remparts cernés de larges douves en eau, alimentées par des étangs. Au XVe siècle, il est la dot de Perette de Montendre, propriétaire M. Maury-Laribière.  La Faye  remonte au XIIIe siècle. C'était le siège d'une importante seigneurie. LouisGabriel s'installe au château et doit être l'auteur des transformations du logis médiéval en demeure plus commode. La famille partira à la Révolution. Au XIXe siècle, la chapelle fut détruite, le bâtiment principal nettoyé de divers bâtiments annexes et entouré d'un jardin, des meneaux furent rajoutés aux fenêtres et les intérieurs réaménagés. Une allée de marronniers, deux bâtiments de communs, une ferme conduisent au château bâti sur un terre-plein entouré de douves autrefois alimentées par trois étangs. Un pont enjambe le fossé au nord. Deux corps de logis en angle droit forment le château. L'aile nord-sud est de caractère médiéval (XVe siècle) dans sa structure et ses détails de construction (pignons, fenêtres à meneaux...).Elle abrite des anciennes cuisines, granges, ateliers, greniers. L'aile est-ouest sous toiture à pans brisés est cantonnée d'une tour carrée orientale et d'une petite avancée à l'ouest. Elle comprend les pièces d'habitation.                           BEAULIEU logis chambres d'hôtes.","architecture":"FAYE, Le domaine du château de La Faye, d'une superficie de plus de 430 hectares clôturés, profite d'une situation exceptionnelle en  Sud-Charente, entre Angoulême et Bordeaux ainsi que de sa proximité avec la Dordogne, haut lieu touristique. Entouré d'un parc de 5 hectares, le château cerné de douves, sera un endroit exceptionnel pour vos réceptions, mariages ou banquets et séminaires.  La construction  date du XVe au XVIe siècle.  L'entrée se fait en passant les douves, sur un pont à deux arches, pour arriver à une vaste esplanade face au logis. Le corps de logis du XVe siècle, remanié au XIXe siècle, est coiffé d'un toit à la mansard percé de petites lucarnes à fronton triangulaire. Il est flanqué d'un pavillon carré. L'aile en retour en équerre est du XVIe siècle, avec un toit de tuiles plates à deux versants. Éléments protégés MH : les façades et les toitures des deux ailes.\r\nIl est inscrit au M.H.  depuis le 23 octobre 1992.","habitants":"Famille de Perette de Montendre. \r\n        \"","divers":"Faye 45° 24' 41 nord, 0° 01' 05? est2                          Beaulieu grav -4","gps":"","images":["../image/image_16/16_D%c3%a9viat_1.jpg","../image/image_16/16_D%c3%a9viat_2.jpg","../image/image_16/16_D%c3%a9viat_3.jpg","../image/image_16/16_D%c3%a9viat_4.jpg"]},"Consult_chateau_formulaire3004":{"id":"Consult_chateau_formulaire3004","dept":"16","canton":"Charente-Champagne","commune":"Gensac la Pallue","nom":"Eclopard","type":"Château","periode":"XVII","histoire":"ECLOPARD, bâti à Gensac-la-Pallue. La terre de l'Éclopart est vendue par François de Mortemer à Henri Bernard, en 1537. Puis les terres passèrent aux Prévostière. C'est Nicolas Prévostière qui fit construire le Logis de l'Éclopart au début du XVIIe siècle. Nicolas Prévostière laissa une fille, Marie, qui épousa Philippe Guillemeteau et lui porta en dot la terre de l'Eclopart. La famille Guillemeteau a conservé cette terre jusqu'après la Révolution. Le Logis de l'Éclopard est inscrit aux M.H. depuis 1986.","architecture":"ECLOPARD, bâti à Gensac-la-Pallue. Le Logis a été construit au début du XVIIe siècle, de plan carré, le corps de logis, de deux étages  est encadré de deux pavillons à toits à pans et couverture de tuiles.  Le logis est orné de lucarnes ornementées et d'une porte d'entrée encadrée de pilastres canelés. Enfermé dans un parc avec dépendance droite et gauche de même niveau.","habitants":"Famille de Nicolas Prévostière\r\n        \"","divers":"Eclopard  GPS : 45° 38' 57\" Nord, 0° 16' 22\" Ouest","gps":"45° 38' 57\" Nord, 0° 16' 22\" Ouest","images":["../image/image_16/16_Eclopard_1.jpg","../image/image_16/16_Eclopard_2.jpg"]},"Consult_chateau_formulairec179-2":{"id":"Consult_chateau_formulairec179-2","dept":"16","canton":"Charente-Vienne","commune":"Abzac","nom":"Fayolle_Abzac","type":"Château","periode":"XV","histoire":"FAYOLLE,  en 1363 aux Ambasmat; famille attestée à Charroux  ;  Robert Ambasmat, seigneur des Vieux-Tizons; en 1506 Antoinette Ambasmat. épouse François de Couhé de Lusignan;  en 1427 Couhé branche de L'Estang à Lessac; hérité de Jeanne du Mosnard  au XVe siècle famille s'éteint; en 1502 François Ier de Couhé rend aveu à Louis Bonnin, seigneur de Montaumar;  Le château de Fayolle aurait été construit au XVe siècle par la famille Ambasmat, premier propriétaire connu du château. Il fut transmis par le biais des alliances à la famille de Couhé de Lusignan, qui en demeura propriétaire jusqu'à la Révolution.. En 1536 son fils François II épouse Denise de La Rochebeaucourt; en 1621 son petit fils François III, \"un gentilhomme de grand jugement\";  François IV a 8 enfants; dont Henri qui n'a que des filles; en 1636 Gabrielle épouse Jean de Chamborand, seigneur de Villevert; Couhé de Fayolle; Jacques, Gilbert ; en  1717 Pierre de Couhé est tué d'un coup de pistolet sur la chaussée de l'étang du Vignault  \"le marquis de Fayolle\" petit fils de l'amiral Duquesne, compagnon de La Fayette s'engage dans l'armée américaine. Abzac, en 1767 Marie-Jeanne, dame de Fayolle épouse François de Couhé de Lusignan ; que des filles en 1790 l'une épouse Etienne de La Rapidie; en 1798 . le domaine Il passa au XIXe siècle à la famille de Boismarin. Il fut transmis au XXe siècle à la famille de L'Hermite qui en est toujours propriétaire l'autre Jean Babaud de Marcillac; au XIXe siècle famille Boismarmin;  au XXe siècle  famille L'Hermine alliée aux Maury-Laribière.","architecture":"FAYOLLE,  il est constitué d'un logis rectangulaire et de deux ailes disposés en U autour d'une cour. Le logis rectangulaire est flanqué de trois tourelles d'angle circulaires aveugles et d'une tour polygonale à l'angle nord-ouest. L'escalier à vis demi hors-oeuvre qui permet de desservir les deux étages est situé dans une tour circulaire placée au centre de la façade sur cour. Cette façade est percée de deux travées.  Les encadrements de ses ouvertures sont en pierre de taille calcaire. Les ouvertures sont surmontées de linteaux en arc segmentaire excepté les ouvertures de la travée centrale de la façade sur jardin qui sont également plus petites que celles des autres travées. La porte d'entrée  est située sur la tour d'escalier. Elle est perpendiculaire à la façade. Son encadrement est en granite, ainsi que ceux des petites baies de la tour d'escalier. Ses piédroits sont sculptés en cavet. Son linteau sculpté comprend l'emplacement d'un blason qui semble ne pas avoir reçu de décor. Le logis est couvert d'un toit à longs pans brisés en tuiles plates et ardoises. La tour nord-ouest est couverte d'un toit polygonal en ardoise. Latour d'escalier est couverte d'un toit conique. Les trois contre-forts sont couverts de toit bombés. L'aile gauche est constituée de quatre bâtiments accolés. Un premier bâtiment situé dans l'angle a été remanié. Le second  est couvert d'un toit à longs pans à croupe en tuiles creuses. Ses élévations ont été recouverte de ciment. Il comporte un demi-étage.","habitants":"Famille Ambasmat\r\n        \r\n        \r\n        \"","divers":"Fayolle 46° 05' 49 nord, 0° 41' 40 est1","gps":"","images":["../image/image_16/16_Fayolle_Abzac_1.jpg","../image/image_16/16_Fayolle_Abzac_2.jpg","../image/image_16/16_Fayolle_Abzac_3.jpg","../image/image_16/16_Fayolle_Abzac_4.jpg","../image/image_16/16_Fayolle_Abzac_5.jpg","../image/image_16/16_Fayolle_Abzac_6.jpg"]},"Consult_chateau_formulaire4868":{"id":"Consult_chateau_formulaire4868","dept":"16","canton":"Touvre et Braconne","commune":"Ruelle sur Touvre","nom":"Fissac","type":"Château","periode":"XV","histoire":"FISSAC, le fief de Fissac est mentionné en 1445 par un aveu de son seigneur, Jean Acarie, sieur de Sigogne. En 1446, son possesseur est Martin Tizon, damoiseau, seigneur d'Argence, habitant à Angoulême. Fissac demeurera aux Tizon (ou Tison) d'Argence, Un peu plus lard, c'est Charles Tison, écuyer, seigneur de Fissac et de Rays.  famille notable de l'Angoumois, jusqu'en 1608, date de sa vente à François de Hauteclaire, écuyer, seigneur du Maine-Gagnaud. En 1701, le fief passe aux du Theil, puis aux Trémeau en 1769, en la personne de Claude Trémeau, écuyer, juge au présidial d'Angoumois. En 1807, Alexandre Trémeau, adjoint au maire de Ruelle, est propriétaire de Fissac. Le 1er décembre 1969, le logis (façade et toitures) est inscrit M.H. Actuellement en 2018, le logis est occupé en partie par la Maison Jean-Baptiste, une maison d'enfants à caractère social.","architecture":"FISSAC, le logis est situé au bord de la Touvre. Il consiste en un corps de logis à trois niveaux : un rez-de-chaussée, un étage et un toit percé de lucarnes. Le toit à double pente est couvert d'ardoises. La façade sud, faisant face à la rivière, est percée d'ouvertures plus nombreuses. La lucarne centrale est surmontée d'une coquille.Un inventaire de 1687 laisse deviner des fenêtres à traverse, voire à croisées de meneaux, ainsi qu'un cadran solaire dans le jardin. Au rez-de-chaussée, la porte centrale est surmontée d'un fronton curviligne avec écusson et entourée de deux colonnes ioniques, ce fronton repose sur deux pilastres terminés par des chapiteaux ioniques. Ce bâtiment est prolongé à l'est et à l'ouest de deux bâtiments plus bas surmontés de terrasses avec balustrades. La cour intérieure au nord est entourée des communs. Elle est hélas sectionnée en deux par un mur du nord au sud, empêchant une vue d'ensemble du logis. Le logis de Fissac est une construction présentant trois niveaux percés chacun de cinq ouvertures.","habitants":"Famille de Tizon\r\n        \"","divers":"Fissac 45° 40' 53 nord, 0° 12' 44? est2","gps":"","images":["../image/image_16/16_Fissac_1.jpg","../image/image_16/16_Fissac_2.jpg"]},"Consult_chateau_formulaireff7f":{"id":"Consult_chateau_formulaireff7f","dept":"16","canton":"Jarnac","commune":"Nersac","nom":"Fleurac_Nersac","type":"Château","periode":"XVI-XVII","histoire":"FLEURAC, date du XIVe, du XVIIe, du  XIXe siècle. Il a été restauré, à grands frais, dans le dernier quart du XIXe siècle. Il est entouré d'un parc magnifique, le premier seigneur connu est un La Porte qui vivait au XIVe siècle. Plus tard, le château devint la propriété des Couvidou dont Jean de Baudoin, en 1581,  décide de faire transformer l'édifice à la mode de la \"première Renaissance Italienne  par des ouvriers italiens venus à la suite de François 1er et qui s'établirent, dans les années 1515, en angoumois épouse une Rochefoucauld en première noce puis en 1584 la veuve de Louis de Chesnel en deuxième noce, de ce second lit naquit, Léon constructeur du château.  Le Château de Fleurac a subi d'importantes restaurations dans le 4ème quart du XIXe siècle, aujourd'hui est une demeure privée, fermée au Public.                             Le Château de Fleurac appartenait en premier à la Famille de Neuillac. Ses propriétaires actuels sont Michel-Alexandre et Bénédicte Mahy.","architecture":"FLEURAC, la construction d'une architecture toscane ou vénitienne  aurait durée une quinzaine d'année de 1610 à 1625 entouré de douves profondes et sèches le château se dessine autour d'une cour centrale un U ponctué aux angles et aux extrémitées de quatres tours carrées et refermé sur le quatrième côté par une élégante balustrade ouverte en son milieu, d'un portail auquel on accède par un pont de pierre enjambant les fossées, le château présente en façade ouest, une trés belle porte d'entrée encadrée de pilastres,  le corps de logis   à deux niveaux avec des toitures avec crénelages se sont des parapets ou des acrotères détachées, servant à masquer les couvertures à faible pente qui avec la généralisation de l'usage de tuile canal. Cet ensemble dégage la puissance , l'aspect massif des tours, profondeurs des fossés la balustrade d'entrée, des grandes fenêtres ordenancées décorées de fronton surmontées de pinacles qui adoucissent la sévérité des mâchicoulis. Il se compose d'un corps  de logis flanqué de deux pavillons latéraux. L'édifice est entouré d'un profond fossé creusé à même le roc et gardé par un parapet qui se prolonge autour des pavillons latéraux. Certains éléments d'architecture du château médiéval subsistent.","habitants":"Famille d'Alain Baudoin de fleurac\r\n        \"","divers":"Fleurac  GPS : 45° 43' 18\" Nord, 0° 04' 56\" Ouest","gps":"45° 43' 18\" Nord, 0° 04' 56\" Ouest","images":["../image/image_16/16_Fleurac_Nersac_1.jpg","../image/image_16/16_Fleurac_Nersac_2.jpg","../image/image_16/16_Fleurac_Nersac_3.jpg","../image/image_16/16_Fleurac_Nersac_4.jpg","../image/image_16/16_Fleurac_Nersac_5.jpg","../image/image_16/16_Fleurac_Nersac_6.jpg","../image/image_16/16_Fleurac_Nersac_7.jpg","../image/image_16/16_Fleurac_Nersac_8.jpg"]},"Consult_chateau_formulairefefc":{"id":"Consult_chateau_formulairefefc","dept":"16","canton":"Cognac","commune":"Louzac Saint-André","nom":"Font_Joyeuse","type":"Château","periode":"XIX","histoire":"FONT-JOYEUSE,  à quelques kilomètres de la ville de Cognac, le château de Font-Joyeuse domaine viticole  appartient à la même famille de viticulteurs depuis plusieurs générations. Lorigine du nom Font-Joyeuse remonte à lépoque Gallo-Romaine. Une source sacrée coulait à cet endroit et était vénérée car ses eaux étaient réputées vertueuses.     Alain et Alexandre Vinet  propriétaires viticulteurs","architecture":"FONT-JOYEUSE,  est  bâti à Louzac-Saint-André,  Le château a été reconstruit au milieu du XIXe siècle, sur un ancien emplacement bâti. Le château de Font Joyeuse est installé sur une ancienne villa gallo-romaine, en pierre de taille et couvert d'ardoise avec un étage de soubassement un étage et un étage de combles. Les bâtiments de ferme et les communs comportent les ruines d'un moulin, les viviers, la cressonnière. La fontaine qui fournit l'eau en continu serait d'origine romaine.","habitants":"Famille d'Alain et Alexandre VINET\r\n        \"","divers":"Font-Joyeuse   GPS : 45° 43' 55,24\" Nord, 0° 23' 43,26\" Ouest","gps":"45° 43' 55,24\" Nord, 0° 23' 43,26\" Ouest","images":["../image/image_16/16_Font_Joyeuse_1.jpg","../image/image_16/16_Font_Joyeuse_2.jpg"]},"Consult_chateau_formulairec18c":{"id":"Consult_chateau_formulairec18c","dept":"16","canton":"","commune":"Saint-Amant de Nouère","nom":"Fontguyon","type":"Château","periode":"XVI","histoire":"FONTGUYON, c'est sur le site d'une villa gallo-romaine puis d'une villa carolingienne, le Mayne de Négronde attestée en 911 que le château de Fontguyon a été bâti au XVIe siècle, vers 1570, sur le domaine de Fontguyon.  Ce château a été en particulier possédé par Guillaume de La Porte, prévôt des maréchaux du duché d'Angoulême, Élie Laisné maire d'Angoulême en 1585, Antoine Gandillaud son gendre, maire d'Angoulême en 1623, Gabriel I Gandillaud lieutenant général et conseiller d'état et Gabriel I Gandillaud lui aussi lieutenant général. \r\nPuis, le château parvint à  François et Pierre Poitevin de Fontguyon, directeurs des fonderies royales de 1784 à 1790. Jean Adam Poitevin né à Vienne (Autriche) le 26 Juin 1769, décédé à Fontguyon le 29 Janvier 1826. Chambellan de l'empereur, il épousa par contrat passé le 19 Janvier 1791 (Gaboriau, Notaire à Jarnac) puis célébré à Triac le 7 Février 1791, Jeanne Marie Adélaïde Bonniot de Fleurac née le 19 Juin 1772,   Ils ont acquis le dommaine de Triac, deux maisons et un chai en la citéde Cognac. Dont :","architecture":"FONTGUYON, le corps de logis en U, donc composé de trois ailes, ouvre sur une vaste cour. Il a été remanié au XVIIe siècle avec aménagement de la terrasse et de l'escalier en fer à cheval. L'entrée comporte un portail à pilastre accosté d'une échauguette d'angle en encorbellement coiffée d'une poivrière. La chapelle et l'escalier en vis avec sa cage, situé à l'angle sud-est du logis sont d'époque Renaissance. Il est inscrit au M.H. depuis le 8 septembre 1989 et l'escalier à vis renaissance a été classé le 2 septembre 19941.","habitants":"Guillaume de La Porte\r\n        \r\n        \"","divers":"Fontguyon  45° 43' 21? nord, 0° 00' 03 ouest2","gps":"","images":["../image/image_16/16_Fontguyon_1.jpg","../image/image_16/16_Fontguyon_2.jpg","../image/image_16/16_Fontguyon_3.jpg","../image/image_16/16_Fontguyon_4.jpg"]},"Consult_chateau_formulairec977":{"id":"Consult_chateau_formulairec977","dept":"16","canton":"Angoumême","commune":"soyaux","nom":"Fréjeneuil","type":"Château","periode":"XVII","histoire":"FREJENEUIL  Le fief de Frégeneuil connu depuis le XIIe siècle, appartenait au chapitre de la cathédrale d'Angoulême sous le nom de Doroma. Les Géraud en ont longtemps été les tenanciers et en 1529 le chapitre anoblit Jean Géraud. Du XVIIe siècle au XIXe siècle le domaine fut très souvent vendu. Il fut acheté par Charles-César Desmier, décédé dans ce château le 19 avril 1801, époux de Marguerite de Galard de Béarn, fille de Philippe-Paul de Galard de Béarn et d'Anne d'Astelet.\r\nMONTBOULARD, elle fut la propriété de limportante famille Bourdin pendant plus de deux siècles.","architecture":"FREJENEUIL, il ne reste des bâtiments les plus anciens que les ruines de l'imposante fuie ronde. Frégeneuil est constitué d'un ensemble de bâtiments de communs, de plan rectangulaire, qui forment un U enserrant une basse-cour. Un deuxième enclos, entouré de murs sur les côtés nord et est, comprend le logis rectangulaire avec un décrochement sur l'élévation nord, et un pigeonnier dans l'angle Sud-Est. Le mur de clôture est orné par endroit de pilastres sommés de chapiteaux et d'acrotères. Il est interrompu par les piles d'un portail. L'élévation Sud du logis donne sur une terrasse avec un puits et un bassin communiquant avec une vaste prairie. Un bâtiment en ruine servait, selon la tradition, de chapelle. A l'intérieur, le logis a conservé l'escalier, des plafonds à solives, des cheminées, des vantaux de portes du XVIIe siècle. Le logis de Fréjeneuil qui présente une longue façade, à un étage, du XVIIIe siècle, qui se termine au centre par un fronton triangulaire et des dépendances du XVIIe siècle, a été inscrit aux M.H. partiellement le 16/12/1996.\r\nMONTBOULARD, le Logis de Montboulard : grande propriété privée, isolée au milieu des bois est connue depuis le XIIe siècle. La maison de maître et les dépendances ont été transformées en gîtes ruraux.","habitants":"Fréjeneuil famille des Guéraud                        Montboulard  famille Bourdin\r\n        \"","divers":"Fréjeneuil 45° 37' 55? nord, 0° 11' 30? est2 grav 1-2-3  Montboulard grav 4","gps":"","images":["../image/image_16/16_Fr%c3%a9jeneuil_1.jpg","../image/image_16/16_Fr%c3%a9jeneuil_2.jpg","../image/image_16/16_Fr%c3%a9jeneuil_3.jpg","../image/image_16/16_Fr%c3%a9jeneuil_4.jpg"]},"Consult_chateau_formulaire20c8":{"id":"Consult_chateau_formulaire20c8","dept":"16","canton":"Charente-Champagne","commune":"Gensac la Pallue","nom":"Gademoulins","type":"Palais","periode":"XVIII","histoire":"GADEMOULINS,  les pères de la Mission, aidés dun régisseur, administrèrent la terre de Gademoulins. Deux supérieurs y moururent : Jean de Lacroix en 1760, et Antoine Levasseur en 1778, et furent inhumés dans léglise de Gensac.  De 1780 à 1790, le séminaire de Saintes fit régir Gademoulins par Joseph Mérat, Celui-ci y maria sa fille Elisabeth le 4 février 1788. Joseph Mérat est décédé au logis de Gademoulins, le 24 septembre 1790, à lâge de 59 ans, et est qualifié par le curé Dupuy : « homme daffaires de messieurs du séminaire de Saintes. » Après la Révolution, le domaine de Gademoulins, devenu propriété nationale, fut acquis par madame Noël, de Cognac, née Françoise Perrin de Beaugaillard, épouse de Jean Noël, avoué au tribunal. Les héritiers de cette dame en vendirent ensuite une partie à M. de Jarnac, ancien notaire à Cognac, et lautre partie, contenant le logis, des champs et des vignes à M. Le Poitevin de Fontguyon, des mains duquel elle est passée à M. Edmond Jaulin, négociant, puis à sa famille. Lancien château a été démoli, et à la place quil occupait sélève depuis une trentaine dannées un magnifique château, lune des plus jolies constructions des environs de Cognac. Paul Poziumschi en a gros sur le coeur. Le riche homme d'affaires  rêvait de transformer la magnifique demeure de Gademoulins  en hôtel de luxe.","architecture":"GADEMOULINS,  un ancien château médiéval a été détruit en 1548 lors des soulèvements de protestations contre la gabelle. Reconstruit, il est vendu comme bien national à la Révolution et à nouveau détruit. Rebâti à Gensac-La-Pallue, l'actuel château de Gademoulins a été reconstruit à partir de 1835, dans un style néogothique, reconstruit fin XIXe sur les ruines d'un logis charentais, se transforme lentement en un hôtel très haut de gamme de 45 chambres, 8 suites, 2 restaurants, des salles de conférence et vue sur la Charente.","habitants":"Famille de Joseph Mérat \r\n        \"","divers":"Gademoulins : 45° 40' 46\" Nord 0° 15' 32\" Ouest","gps":"","images":["../image/image_16/16_Gademoulins_1.jpg","../image/image_16/16_Gademoulins_2.jpg","../image/image_16/16_Gademoulins_3.jpg","../image/image_16/16_Gademoulins_4.jpg","../image/image_16/16_Gademoulins_5.jpg","../image/image_16/16_Gademoulins_6.jpg"]},"Consult_chateau_formulaire9603":{"id":"Consult_chateau_formulaire9603","dept":"16","canton":"Charente-Vienne","commune":"Pleuville","nom":"Gorce_Grollière","type":"Château","periode":"XV-XVII","histoire":"GORCE, son propriétaire initial était Antoine de Fontlebon. La constuction du château de Gorce date du XVe siècle. L'existence de la famille de Fontlebon est attestée par des dons depuis 1160 mais ce n'est qu'en 1473, qu'un texte cita Antoine de Fontlebon comme seigneur de Gorce. Le fief passe par succession jusqu'à Jean d'Asnière qui le vendit en viager à Jacques du Verrier de Boulzat, en 1787, qui n'émigra pas.Le château de Gorce a été vendu plusieurs fois au XXe siècle. \r\nGROLLIERE, en 1510 Jean de La Tour est dit seigneur de Gorce et La Grollière; en 1404 Léonard Mascureau de Sainte-Terre consul à Rochechouart; en 1612  meurtre de Jean Guillaud; Condamnation à avoir la tête tranchée: Jean de Mascureau, son frère et 2 cousins; Condamnation non exécutée: les condamnés s'engagent dans l'armée du Roi; Alliance avec les familles: Rousiers; Chevreuse; Dauphin; Caillou; Cimetière;  en 1839  Victor de Mascureau de Sainte-Terre  épouse Emerance de Monmillon de la Paillerie;  Edith leur fille épouse de  Jehan-Charles-Marie Prévost-Sansac, vicomte de Traversay, lieutenant au 20e régiment de Dragons; en 1993 familles Mascureau (Poitiers); Prévost-Sansac de Traversay (Poitiers).","architecture":"GORCE,  ruines du donjon circulaire qui constituait le château primitif subsistent près de l'étang.  Le château de Gorce actuel date de la fin du Moyen Âge. Les bâtiments forment un U composé du châtelet d'entrée qui communique avec le logis par un pont volant et d'un bâtiment de commun attenant et, de part et d'autre d'une cour ouverte, des communs dont l'aile sud est cantonnée, aux extrémités, d'une tour de section carrée. Le donjon, couronné de machicoulis est flanqué de tourelles en encorbellement. Les rainures correspondant au pont-levis y sont encore visibles ainsi que sur le logis. Le logis est flanqué d'une tour ronde coiffée d'une poivrière et d'une tourelle d'escalier polygonale. La porte est ornée de pilastres de style renaissance et le linteau est marqué d'un écusson parfaitement conservé. Une partie des communs remonte au XVIIe siècle avec la date de 1654 sur une poutre, a été inscrit aux M.H. depuis le 14/10/2002.\r\nGROLLIERE \"Lieu des corbeaux\";  du XIXe siècle de  style troubadour (sur un vieux fief); Tourelles d'ardoises; Lucarnes \"gothiques\".\r\nLe château de Pleuville, situé au bourg, du XVIIe siècle très remanié au XIXe siècle.","habitants":"Gorce  Famille de Antoine de Fontlebon                   Grollière  Victor de Mascureau \r\n        \"","divers":"Gorce 46° 04' 07\" Nord, 0° 29' 47\" Est                           Grollière grav1 à 2 Pleuville grav 3-4","gps":"","images":["../image/image_16/16_Gorce_Grolli%c3%a8re_1.jpg","../image/image_16/16_Gorce_Grolli%c3%a8re_2.jpg","../image/image_16/16_Gorce_Grolli%c3%a8re_3.jpg","../image/image_16/16_Gorce_Grolli%c3%a8re_4.jpg"]},"Consult_chateau_formulairea122":{"id":"Consult_chateau_formulairea122","dept":"16","canton":"Val de Nouère","commune":"Gourville","nom":"Gourville","type":"Château","periode":"XV-XVII","histoire":"GOURVILLE, en 1642,  Henri dOrléans, duc de Longueville, reçu en dot le château et la terre de Gourville. La duchesse de Longueville,  y vécut de 1649 à 1651 avec François VI de La Rochefoucauld,  y écrivit un recueil sur Anne dAutriche et une première partie de ses mémoires. Destruction de Verteuil en 1651, la bataille du faubourg Saint-Antoine en 1652 où il fut blessé, il y revint jusquen 1655 . Le 25 octobre 1660, Jean Héraut en devient propriétaire. Ce Jean Héraut, plus connu sous le nom de Gourville fut valet de chambre de Louis de La Rochefoucauld, évêque de Lectoure, puis maître d'hôtel du frère de ce dernier, l'écrivain François VI de La Rochefoucauld. Il sut s'attirer les bonnes grâces du surintendant Fouquet, qui lui fait obtenir la recette générale des tailles de Guyenne, source de sa richesse. En 1718, à la mort de François Héraut, neveu de Jean Héraut, la baronnie passe par testament aux mains de Philippe d'Hauteclaire, seigneur de Fissac, dont la famille conservera la terre de Gourville jusqu'en 1780, date à laquelle elle est vendue judiciairement à Jean Valeteau de Chabrefy, receveur des tailles de l'élection d'Angoulême. Début XIXe siècle, ses héritiers vendent le château à Rouchier Préneuf, originaire de Tusson, capitaine de l'Armée impériale. Au cours des deux derniers siècles, le château change souvent de mains et subit alors de nombreuses vicissitudes jusqu'en 1974, . Quelques personnages importants ont visité le château : Charles Quint en 1539 (y coucha), Henri IV en 1604 (y coucha), Louis XIV en 1651, Louvois en 1680 (y coucha), Félix Faure y fut reçu lors de manuvres.","architecture":"GOURVILLE,  la duchesse de Longueville fit reconstruire le donjon ouest, agrandir avec les pierres du château jetées dans les douves la grande galerie. Elle fit aussi construire la tour avec escalier à vis pour desservir sa chambre entre le pont-levis et le donjon ouest, et percer dans la tour du pont-levis deux fenêtres c'est une forteresse imposante et dont toute l'architecture est fonction de propriétés défensives. \r\nIl est entouré de douves sèches et l'entrée se fait par un pont-levis donnant accès à une salle romane du XIIe siècle. Cette salle basse voûtée en berceau et à demi-enterrée, était probablement un cellier ou magasin à vivres. C'est la partie la plus ancienne du château. Les autres parties sont du XVe siècle, XVIe et XVIIe siècles. Le gros donjon carré, à l'ouest, du XVe siècle, a conservé une galerie de mâchicoulis sous son toit pyramidal en ardoise. Une autre tour date du XVIe siècle. Une tour ronde semi-circulaire, à l'est, daterait du XIIIe siècle. Le propriétaire d'alors entreprend d'importants travaux de réhabilitation qui dureront jusqu'en 1983. Le corps d'habitation est de la fin du XVe siècle.","habitants":"Famille de Jean de Héraut\r\n        \"","divers":"Gourville : 45° 49' 41\" Nord et 0° 00' 48\" Ouest","gps":"","images":["../image/image_16/16_Gourville_1.jpg","../image/image_16/16_Gourville_2.jpg","../image/image_16/16_Gourville_3.jpg","../image/image_16/16_Gourville_4.jpg","../image/image_16/16_Gourville_5.jpg"]},"Consult_chateau_formulaire995c":{"id":"Consult_chateau_formulaire995c","dept":"16","canton":"Val de Nouère","commune":"Champmillon","nom":"Grande_Chapelle","type":"Château","periode":"XVIII","histoire":"GRANDE-CHAPELLE, vers 1040, le comte d'Angoulême Geoffroy Taillefer possédait plusieurs terres sur Champmillon qu'il a données à l'abbaye de Saint-Cybard. Ainsi en 1286, le cartulaire de l'abbaye fait état du fief de la Chapelle, qui donné par le sieur Gardrat (ou Gaudrat), guerrier, à l'abbaye. En 1583 la terre de la Chapelle est inféodée par Gabriel de Livenne abbé de St-Cybard, on trouve les Faligon au XVIe siècle, dont l'un était procureur fiscal à l'abbaye de Saint-Cybard durant les guerres de religion, puis, par mariage de Laetitia Faligon, au XVIIe siècle la famille Maron, propriétaire, cette famille est célèbre par un de ses membres, Jacques de La Croix Maron (1560-1620), seigneur de Segonzac, au XVIIIe siècle qui ont entrepris la construction du château. La Chapelle a ensuite appartenu par ventes successives, au XVIIIe et XIXe siècles, acquis en 1737 par la   familles Marchais, qui le cèderont en 1835 à la famille Labrousse de Moulidars, qui le conserveront trois générations et en 1886 est acquis par Bernard Durand capitaine  d'infanterie  en retraite. Au tout début du XXe siècle, le domaine a appartenu à Jean Fougerat, inventeur, pharmacien, philanthrope et viticulteur, qui possédait plusieurs propriétés dans le département. Le château actuel a surtout été construit entre 1715 et 1780.","architecture":"GRANDE-CHAPELLE, sobre est précédé de trois étages de terrasses encadrées de balustres et reliés par des escaliers, descendant vers un grand parterre qui rejoint les douves. L'habitaion seigneuriale consiste un corps central élevé sur deux niveaux, à huit travées de façade dans lesquelles s'encadrent des fenêtres et des portes fenêtres à arc bombé. Le toit plat est masqué par une balustrade aveugle qui semble relier les deux pavillons latéraux, plus élevés d'un demi-étage  et couverts de hauts combles pyramidaux. Le bâtiment est composé de deux parties distinctes juxtaposées en longueur 35 mètres : le logis au sud, et la ferme viticole au nord. Le logis est un long bâtiment à un étage avec balustrade et terrasse, flanqué de deux tours carrées couvertes en ardoise. Le tout est orienté vers l'est-sud-est et la vallée. L'ensemble est de style XVIIIe siècle, car construit à cette époque.  La terrasse de 2 500 m2 est desservie par un escalier monumental menant à une fontaine couverte. Au nord, le corps de ferme s'organise autour d'une vaste cour carrée, et comprend écuries, chais, distillerie et logements annexes. Le château est inscrit M.H.depuis 1976.","habitants":"Famille de Jacques de La Croix Maron \r\n        \"","divers":"Chapelle 45° 38' 51 nord, 0° 00' 59 est2","gps":"","images":["../image/image_16/16_Grande_Chapelle_1.jpg","../image/image_16/16_Grande_Chapelle_2.jpg","../image/image_16/16_Grande_Chapelle_3.jpg","../image/image_16/16_Grande_Chapelle_4.jpg"]},"Consult_chateau_formulaire7381":{"id":"Consult_chateau_formulaire7381","dept":"16","canton":"Tude-et-Lavalette","commune":"Gurat","nom":"Gurat","type":"maison-forte","periode":"XV-XVI","histoire":"GURAT, au Moyen-Âge, à l'Ermite, en direction de Ronsenac, était autrefois le petit prieuré de Saint-Jacques de l'Ermitage, qui dépendait de l'abbaye de Saint-Cybard.  La Baudie, dans l'est de la commune, était jusqu'au milieu du XIXe siècle la propriété de la famille de Corlieu. Charles, petit-neveu de François de Corlieu, l'historien de l'Angoumois, en était devenu propriétaire à la suite de son mariage avec Nicole Grimouard, fille de François Grimouard, sieur de la Croix en 1611. \r\nLANGELY, au début du XXe siècle, Langelie était la propriété de Paul Déroulède. L'industrie était alors représentée par l'importante minoterie du moulin Goujat, appartenant à M. Jougier, (autrefois orthographié l'Angely), est situé plus en amont au bord de la Lizonne, ce petit manoir des XVe et XVIe siècles est surtout connu parce qu'il a appartenu à la famille Déroulède. C'est là que Paul Déroulède, homme politique et poète, au retour de la guerre de 1870 a écrit les chants du paysan et aimait venir y passer les mois d'été.","architecture":"GURAT est situé au centre du bourg de Gurat, à côté de l'église et de la mairie est un ensemble architectural datant du XVe siècle. Aujourd'hui, il sert de gîte d'hôtes dans un cadre agréable. Il y a cinq gites meublée indépendants sur le domaine du chateau qui date du XVe siècle. le château est entouré de 5 hectares de bois et de prés.                                            LANGELY, manoir de plan carré  à deux niveaux accolée d'une tour carrée flaquée d'une échauguette, un corps de logis bordé d'un pavillon.","habitants":"Gurat   famille de Corlieu                                      Langely Famille Déroulède\r\n        \"","divers":"Gurat 45° 25' 49? nord, 0° 16' 13? est  grav1-2     Langely grav 3","gps":"","images":["../image/image_16/16_Gurat_1.jpg","../image/image_16/16_Gurat_2.jpg","../image/image_16/16_Gurat_3.jpg"]},"Consult_chateau_formulaire13cb":{"id":"Consult_chateau_formulaire13cb","dept":"16","canton":"Jarnac","commune":"Jarnac","nom":"Jarnac","type":"Château","periode":"XIX-","histoire":"JARNAC Trois châteaux Chabannes, Souillac et St-Martial.                                                                         St-MARTIAL dit de Chabannes  est un logis du XIXe siècle construit au bord de la Charente par la famille Bisquit, date de 1884. Dans les années 1840-1850, Alexandre Bisquit achète des terres au lieu-dit la Coute, côteau à proximité du bourg et y construit une maison vers 1850, dont l'apparence est inconnue, reprit par le gendre d'Alexandre, Adrien Dubouché (1818-1881), avant tout grand collectionneur de céramiques d'art et fondateur du musée de Limoges. Il fréquente surtout les milieux artistiques de Paris et Limoges. Son gendre et successeur Maurice Laporte-Bisquit (1842-1908) s'implique beaucoup dans la ville de Jarnac, dont il est maire à partir de 1889. Il décide naturellement d'y construire sa propre demeure et choisit le site de la Coute. Après avoir acheté les bandes de terres qui n'étaient pas encore à la famille Bisquit,  réalise son château, alors dit « des Chabannes » par l'architecte parisien Henri Parent (1819-1895), de 1882 à 1884. Le plan de Saint-Martial fut publié dans la revue L'architecture pour tous. En 1914, Solange Laporte-Bisquit, veuve de Jean-Maurice Laporte-Bisquit ancien maire de Jarnac, établit un hôpital pour les soldats blessés dans le château. En 1919, Bisquit célèbre son 100e anniversaire en même temps que la fin de la guerre en présence de plusieurs centaines d'invités pour un « grand Banquet républicain ». Le château devenu Saint-Martial , tombe aux mains du groupe Paul Ricard lors du rachat de Bisquit en 1966.  Actuellement chambres d'hôtes.","architecture":"JARNAC, la mairie est située place Jean-Jaurès. Les travaux de construction se déroulent du 15 août 1864 à 1888, mené par le tandem Paul Abadie fils, Édouard Warin. Cet hôtel de ville est un édifice imposant, architecture du XIXe siècle adaptée à la notion de pouvoir communal. L'arcade centrale, qui sert de porche d'accès, porte la date de 1867, année d'achèvement du gros uvre. À l'intérieur, la Table de Condé, objet remarquable en bois ouvragé surmontée d'une dalle de marbre rouge, aurait accueilli la dépouille du prince de Condé tué pendant la bataille de Jarnac (1569), ainsi que le buste d'Alexandre Bisquit en marbre du XIXe siècle. \r\nSOUILLAC date du XIXe siècle, au lieu-dit Souillac. \r\nSt-MARTIAL dit de chabannes  est un logis du XIXe siècle construit au bord de la Charente, il est inscrit M.H. depuis 2014,  le logis,  est une construction massive de plan centré en H (25 m x 20 m), de style néo-Renaissance. La façade principale est encadrée par deux avant-corps polygonaux traités comme des tours (hauteur environ 20 mètres), la façade arrière est ornée d'un péristyle central supportant un balcon à balustres elle est dotée, en raison de la dénivellation du terrain, d'un escalier monumental à volées convergentes en fer-à-cheval.","habitants":"St-Martial  Alexandre Bisquit\r\n        \"","divers":"Jarnac mairie grv-1                                                        St-Martial 45° 40' 43? nord, 0° 10' 08? ouest grac -2-3-4-5","gps":"","images":["../image/image_16/16_Jarnac_1.jpg","../image/image_16/16_Jarnac_2.jpg","../image/image_16/16_Jarnac_3.jpg","../image/image_16/16_Jarnac_4.jpg","../image/image_16/16_Jarnac_5.jpg","../image/image_16/16_Jarnac_6.jpg","../image/image_16/16_Jarnac_7.jpg"]},"Consult_chateau_formulairef94a":{"id":"Consult_chateau_formulairef94a","dept":"16","canton":"Charente-Champagne","commune":"Juillac le Coq","nom":"Juillac_le_Coq","type":"Forteresse","periode":"XIV-XVII","histoire":"A Julliac le Coq le chateau de  Juillac de Beauregard  (voir article) et le logis des Frêne.              BEAUREGARD, en 1737, les terres de Beauregard sont vendues à Paul-César Guédon, conseiller référendaire au parlement de Bordeaux. Par mariage elles passent à la famille de Lotherie.                        JUILLAC le COQ Vers 1147, Guillaume VI Taillefer engage la seigneurie de Juillac au chapitre de la cathédrale dAngoulême pour réunir largent de lexpédition pour accompagner Louis VII à la Croisade. Mais, à son retour, il ne peut pas récupérer ses biens ni ses droits de haute, moyenne et basse justice. Le 10 décembre 1308 par un accord entre les chanoines et le comte Hugues de Lusignan les habitants de la paroisse sont exemptés de tous services, bans, corvées, guet, garde et réparations du château de Bouteville. Ces privilèges furent confirmés par deux fois par le comte Jean dAngoulême. château de Beauregard est devenu une propriété viticole qui appartient à Henri de Lotherie. Le château est ouvert au public, en Eté (Juillet-Août) pour la dégustation et la vente de Pineau des Charentes et de Cognac.en 1737, les terres de Beauregard sont vendues à Paul-César Guédon, conseiller référendaire au parlement de Bordeaux. Par mariage elles passent à la famille de Lotherie.\r\nLOGIS du FRENE, ancienne possession des familles de Verdelin et de Brémond dArs.                                  Font-Pinot transformé en distillerie par Renaud Cointreau.","architecture":"BEAUREGARD, au château de Juillac-le-Coq, des travaux ont eu lieu, en 1594 puis, tout au long du XVIIe siècle. Le portail, avec une grande et petite porte en plein cintre et, sur les mâchicoulis une murette avec une rangée de pinacles baroques ornés de rosaces. La tourelle polygonale couverte d'un toit à pans attenante et sa grange semblent dater du XVIe siècle. La tour servait alors de prison, il  a été très remanié au XIXe siècle. Côté cour, la façade est ornée de sculptures. Les façades et la toiture ont été inscrites à l'inventaire supplémentaire des M.H. le 8 /07/1988. La terrasse a été construite à la fin du XIXe siècle, pour agrandir les chais situés dans les caves de la maison les travaux ont eu lieu en 1594 puis tout au long du XVIIe siècle. La tourelle polygonale couverte dun toit à pans attenante et la grange semblent dater du XVIe siècle.                                                                            FRENE, construit à flanc de coteau porte la date de 1589 inscrite près de l'oriel qui orne la façade du logis. Le portail et les tours de l'enceinte semblent bien dater eux aussi de la fin du XVIe siècle.","habitants":"Fréne familles de Verdelin                                              Juillac famille de Lotherie\r\n        \"","divers":"Beauregard GPS : 45° 35' 20\" Nord et 0° 15' 01\" Ouest      Grav-1-2-3                                           Juillac : 45° 35' 20\" Nord 0° 15' 01\" Ouest grav 3-4-5  Fréne grav  6-7-8       Font-Pinot grav 9","gps":"45° 35' 20\" Nord et 0° 15' 01\" Ouest      Grav-1-2-3","images":["../image/image_16/16_Juillac_le_Coq_1.jpg","../image/image_16/16_Juillac_le_Coq_2.jpg","../image/image_16/16_Juillac_le_Coq_3.jpg","../image/image_16/16_Juillac_le_Coq_4.jpg","../image/image_16/16_Juillac_le_Coq_5.jpg","../image/image_16/16_Juillac_le_Coq_6.jpg","../image/image_16/16_Juillac_le_Coq_7.jpg","../image/image_16/16_Juillac_le_Coq_8.jpg","../image/image_16/16_Juillac_le_Coq_9.jpg"]},"Consult_chateau_formulaireba57":{"id":"Consult_chateau_formulaireba57","dept":"16","canton":"Charente-Bonieure","commune":"Champagne-Mouton","nom":"Juyers","type":"Château","periode":"XV","histoire":"JUYERS  Les premiers seigneurs connus sont Guy Vilain qui rend aveu pour ses terres de Juyers en 1408, puis Pierre de Nouzières qui fut seigneur de Juyers en 1465. Il revient par mariage à Charles Chrestien au XVIe siècle puis vers 1649, Juyers passe à la famille de Goret, des magistrats protestants qui revinrent au catholicisme et conserveront le château jusqu'à la Révolution.","architecture":"JUYERS, les deux tours arasées reliées par un mur situées près de la rivière l'Argent, un affluent de l'Argentor datent probablement du XVe siècle et sont des vestiges d'un premier château, tout comme le pigeonnier qui a été détruit vers 1930. Le château actuel a été construit par Charles de Goret. L'entrée se fait en passant l'enceinte défensive formée par les communs percés d'un porche, un passage couvert en anse de panier qui permet d'accéder à une porte charretière et à une porte piétonne, face à la porte d'entrée du logis. Celui-ci, dont seule la moitié a été construit, situé sur une cave voûtée en plein cintre, possède un étage et des combles sous un toit à deux pans. Le pavillon qui possède des échauguettes d'angle est coiffé d'un toit pyramidal percé de lucarnes. Le logis, le pavillon et les dépendances ont été construits au XVIIe siècle, la deuxième moitié du logis et le deuxième pavillon n'ont jamais été construits.","habitants":"Famille de Goret\r\n        \"","divers":"Juyers 45° 58' 55\" Nord, 0° 25' 39\" Est","gps":"","images":["../image/image_16/16_Juyers_1.jpg","../image/image_16/16_Juyers_2.jpg","../image/image_16/16_Juyers_3.jpg"]},"Consult_chateau_formulaire7bc3":{"id":"Consult_chateau_formulaire7bc3","dept":"16","canton":"Val-de-Nouère","commune":"Rouillac","nom":"Lignières","type":"Château","periode":"","histoire":"LIGNIERES, le fief de Lignères appartenait au XVIIIe siècle à la famille La Porte aux Loups. La famille Rémy-Martin y installa chais et distillerie d'un côté de la route, et construisit le château de Lignères en 1872 au centre d'un parc. La propriété Château de Lignères, après avoir appartenu pendant une dizaine d'années à Madame Eléonore Orséro, auparavant viticultrice en Algérie est achetée par la société Ricard en 1965. Elle fait construire, en 1974, une nouvelle distillerie La distillerie est probablement la plus grande d'Europe et le vignoble qui couvre 205 ha d'un seul tenant est le plus grand de la région du Cognac. En mars 2009, le groupe Pernod Ricard a cédé la Marque de Cognac Bisquit au Groupe sud-africain Distell. Le château de Lignères a fourni le décor d'une partie du film Bang-Bang du réalisateur Serge Piolet avec Sheila. Ce film a été tourné sur l'île de Bendor et au château de Lignères, deux propriétés du principal mécène du film, Paul Ricard.","architecture":"LIGNIERES, du XVIIe siècle, de plan rectangulaire à un étage est flanqué de deux tours carrées, hautes de deux étages. Chacun de ces trois éléments est coiffé d'un toit d'ardoise percé de lucarnes à frontons triangulaires ornés de pinacles. \r\nUne tourelle en surplomb, deux terrasses en une serre . Une tourelle en surplomb, deux terrasses en une serre complètent cette élégante demeure qui est devenue le lieu de réception des invités de marque de la société exploitant le domaine La famille Rémy-Martin y installa chais et distillerie d'un côté de la route, et construisit le château de Lignères en 1872 au centre d'un parc. La distillerie et les chais des établissements Rémy Martin datent de la fin du XIXe siècle. Le logement patronal a été construit entre 1892 et 1898.","habitants":"Famille La Porte aux Loups\r\n        \r\n        \"","divers":"Lignières, 45° 48' 22 nord, 0° 03' 14 ouest1","gps":"","images":["../image/image_16/16_Ligni%c3%a8res_1.jpg","../image/image_16/16_Ligni%c3%a8res_2.jpg","../image/image_16/16_Ligni%c3%a8res_3.jpg","../image/image_16/16_Ligni%c3%a8res_4.jpg"]},"Consult_chateau_formulairea34d":{"id":"Consult_chateau_formulairea34d","dept":"16","canton":"Charente-Champagne","commune":"Lignières_Sonneville","nom":"Lignières_Sonneville","type":"Château","periode":"XVII","histoire":"LIGNIERES,  \"Encore deux, trois ans et il nétait plus récupérable.\" Quand il a pris possession des pierres du château de Montchoisy à Lignières-Sonneville en 2004, Patrick Vigneron-Larosa a hérité dun chef-doeuvre en péril. \"Cétait inhabité depuis dix ans. Il y avait des tôles ondulées sur le toit, des trous dans la charpente et les planchers, des bassines partout, les portes ne souvraient plus.                                      CHEZ-BALLET, la construction du Logis date de la fin du XVIIe siècle, pour la famille Ballet. Le Logis tire son nom de la famille la plus importante qui y a vécu : le Sieur Ballet en 1637, Charles Ballet en 1724, tous collecteurs d'impôts, charge importante, mais aussi Josué Ballet, marchand, en 1713, Jacques Ballet, bourgeois, en 1736, y habitait encore en 1777.","architecture":"LIGNIERES, la construction  actuel date du XVIIe siècle. L'Architecte était Jehan Cosset. Son premier propriétaire était Charles Poussard. En 1116, un Geoffroy de Lignières fut mentionné dans le cartulaire de l'abbaye de La Couronne. En 1493, Guy Poussard obtient droit de haute Justice pour sa seigneurie de Lignières.  Le château est classé aux M.H. depuis 1977. Il est entouré de douves en eau. La mairie de Lignières-Sonneville a été installée dans les murs du château,  inscrit aux M.H.  depuis 1971.\r\nCHEZ-BALLET, est une ancienne maison bourgeoise bâtie à Lignières-Sonneville, La construction du Logis date de la fin du XVIIe siècle, le lieu-dit porte aussi ce nom. Peu de documents mentionnent son évolution architecturale. L'ensemble semble remonter aux XVIIe siècle et a été modifié au XVIIIe siècle. Il sert de double habitation privée aujourd'hui et est fermé au public. La propriété a été divisée en deux parties à une date inconnue.","habitants":"Lignières Patrick Vigneron-Larosa                                  Chez-Ballet famille Ballet\r\n        \r\n        \r\n        \"","divers":"Lignères  45° 33' 28\" Nord et 0° 10' 57\" Ouest             Chez-Ballet  : 45° 34' 57\" Nord, 0° 11' 05\" Ouest grav -4","gps":"","images":["../image/image_16/16_Ligni%c3%a8res_Sonneville_1.jpg","../image/image_16/16_Ligni%c3%a8res_Sonneville_2.jpg","../image/image_16/16_Ligni%c3%a8res_Sonneville_3.jpg","../image/image_16/16_Ligni%c3%a8res_Sonneville_4.jpg"]},"Consult_chateau_formulaire4a24":{"id":"Consult_chateau_formulaire4a24","dept":"16","canton":"Charente-Nord","commune":"Londigny","nom":"Londigny","type":"Château","periode":"XV-XVII-XX","histoire":"BREUIL-GOULARD,  le château du Breuil-Goulard est la propriété de la famille Chalmot de la Meslière ; originaire de la région de Niort, elle y a occupé des charges municipales dès le XIIIe siècle, au XVe siècle,  appartenait à Pierre de Vasselot, écuyer, seigneur de la Chagnée ; il avait épousé Marie de la Porte, fille de Pierre seigneur de Guignebourg. En 1525, le petit-fils de Pierre de Vasselot, Jean, se disait encore seigneur du Breuil-Millon; mais à la même époque les de Montalembert sen disaient aussi seigneurs. Il faut donc supposer que ce fief avait été morcelé. Quoi quil en soit, Jeanne de Montalembert lapporta en dot à son époux Jacques Goulard, écuyer, seigneur de la Ferté (Villefagnan) baron de la Faye, et le Breuil demeura dans la descendance de ces derniers jusquà la fin du XVIIe siècle, époque à laquelle il avait pris le nom de Breuil-Goulard. A partir de 1800 et jusqu'en 1942, le Breuil demeura, la propriété de la famille Malbay de Lavigerie et de ses descendants : les Chapiteau de Remondias et les Chamerlat. Ils reconstruisirent le château qui aurait été incendié pendant la Révolution et, semble-t'il, à quelques 200 m en retrait par rapport à l'ancien emplacement, en utilisant les pierres du logis d'origine. En 1942, M. Charles-Antoine-Pierre de Chamerlat vendit le château à M. Régis Marcetteau de Brem et à sa femme, née Odile Cartier-Bresson. Ils ne le gardèrent pas longtemps puisque, huit ans plus tard,en 1950, le château fut acheté par la famille Rimpaud-Migaud dont le descendant le vendit, en 1968, aux propriétaires actuels.                                          LONDIGNY,  appartient en 1635 à René Jousserand, en 1666 à Casimir Prévost, en 1729 à Auguste Prévost de Touchimbert, puis à Auguste-François suivi de Jean-Auguste Prévost, marquis de Touchimbert. Ce château appartint à la famille de Sansac, illustre sous François Ier.","architecture":"LONDIGNY, dit du Peu  se situe en réalité sur le hameau du Peu à 7 km environ,   Londigny, Le gothique y côtoie le style renaissance, les sculptures du parc en béton, ajoutent encore au baroque de l'ensemble.  De lépoque de la Renaissance, lancien château formait un corps de logis à charpente en tiers-point, flanqué de deux tours à l'est et à l'ouest. Il offrait un pavillon carré du XVIe siècle ; une belle fuie dont les fenêtres sont ornées de pilastres et couronnées d'un fronton époque de la renaissance. Château formant un corps de logis à charpente en tiers-point, flanqué de deux tours à l'est et à l'ouest ; pavillon carré du XVIe siècle ; belle fuie dont les fenêtres sont ornées de pilastres et couronnées d'un fronton.","habitants":"Breuil-Famille de Jacques Goulard                        Londigny famille de Sansac\r\n        \"","divers":"Breuil grav 1-2                                                          Londigny 46° 05' 01 nord, 0° 08' 16 est  garv 3 à 8","gps":"","images":["../image/image_16/16_Londigny_1.jpg","../image/image_16/16_Londigny_2.jpg","../image/image_16/16_Londigny_3.jpg","../image/image_16/16_Londigny_4.jpg","../image/image_16/16_Londigny_5.jpg","../image/image_16/16_Londigny_6.jpg","../image/image_16/16_Londigny_7.jpg","../image/image_16/16_Londigny_8.jpg"]},"Consult_chateau_formulaire43ea":{"id":"Consult_chateau_formulaire43ea","dept":"16","canton":"Tude-et-Lavalette","commune":"Nonac","nom":"Léotardie","type":"Château-fort","periode":"XIII-XIV-XV","histoire":"LEOTARDIE, le château de la Léotardie a été construit à 1 km à l'est du bourg par Hélie Léotard, archidiacre de Bourges, attaché à la maison d'Hugues le Brun, comte d'Angoulême, au XIIIe siècle, plus exactement de 1283 à 1303. Il lui a donné son nom. Ce logis était mi-maison de campagne, mi-monastère. Il fut reconstruit au XIVe siècle puis rénové au XVe siècle.  Sous Louis XI Pierre et Jean de Caillou en sont les seigneurs. Sous Henri IV, Marie de Cancaret est dame de la Léotardie. La tour du grand escalier date de cette époque. Durant les guerres de Religion, au XVIe siècle, il fut habité par le chevalier de la Léotardie (ou de Nonac) qui fut un fanatique catholique. Au XVIIIe siècle, les familles de Tournemire, de La Porte, Cadiot de Saint-Paul s'y succèdent par mariages. Le château fut remanié à cette époque. Propriéte de M. Charles-Emmanuel Geynet. Il a été inscrit M.H. en 1944.","architecture":"LEOTARDIE,  est un chateau fort, de style Médiéval, coontruit au XVe siècle. Situé à 1 km à l'Est de Nonac, fut un ensemble fermé et fortifié autour d'une cour. Il a été construit sous Hélie Léotard, archidiacre de Bourges, au XIIIe siècle, attaché à la maison de Hugues le Brun, comte d'Angoulême. Il reste une tour carrée crénelée du XIVe siècle, un corps de logis qui date du XVe siècle. Les étages sont accessibles par un escalier à vis dans une tourelle octogonale sur contrefort. Une galerie Renaissance est d'âge indéterminé car elle aurait pu être construite par réemploi des éléments d'un cloître. Il a été remanié au XVIIIe siècle puis plus tard fut un ensemble fermé et fortifié autour d'une cour, dont il ne reste que trois côtés de ce vaste rectangle. Il reste une tour carrée crénelée du XIVe siècle, dont la porte donne sur une seconde porte dans un mur surmonté d'une bretèche. Le corps de logis du XVe siècle aux étages accessibles par un escalier à vis dans une tourelle octogonale sur contrefort comprend un pavillon du XVe siècle à fenêtres à meneaux et le logis possède deux tourelles d'angle carrées comme l'aile en retour. La galerie Renaissance est d'âge indéterminé car elle aurait pu être construite par réemploi des éléments d'un cloître. Une grange médiévale à triple nef est située à une centaine de mètres des autres bâtiments.","habitants":"Famille du chevalier de la Léotardie\r\n        \r\n        \"","divers":"Léotardie 45° 25' 23 nord, 0° 04' 04 est2","gps":"","images":["../image/image_16/16_L%c3%a9otardie_1.jpg","../image/image_16/16_L%c3%a9otardie_2.jpg","../image/image_16/16_L%c3%a9otardie_3.jpg","../image/image_16/16_L%c3%a9otardie_4.jpg","../image/image_16/16_L%c3%a9otardie_5.jpg"]},"Consult_chateau_formulaire0466":{"id":"Consult_chateau_formulaire0466","dept":"16","canton":"Touvre-et-Braconne","commune":"Magnac sur Touvre","nom":"Magnac_Touvre","type":"Forteresse","periode":"XVII","histoire":"Trois châteaux à Magnac sur Touvre, celui de Maumont  de Lèche et de Touvre vestiges.           MAUMONT, à la mort dAymard, dernier représentant des Taillefer, lAngoumois passa à la famille de Lusignan, qui ladministra jusquà la réunion du comté à la Couronne par Philippe-le-Bel en 1307. Les biens nobles étaient tenus à lhommage envers le seigneur, les biens roturiers étaient soumis à une redevance annuelle. Le 30 mars 1257, Thomas de Tizon faisait à Bertrand de Sigogne donation de ses biens situés à Magnac, en stipulant que le domaine était « mouvant, tenu en fief et hommage lige à lévêque dAngoulême ».  La seigneurie de Touvre subsistait, mais le siège était transporté à La Lèche. En 1375, lAngoumois avait été cédé par Charles VI à son frère Louis dOrléans.  Plus tard François érigea lAngoumois en duché, pour sa mère Louise de Savoie.","architecture":"LECHE, située à Touvre à  2 Km à l'est  de Magnac, chambre d'hôtes château manoir de la Lèche vous accueille dans un manoir du XVIIe siècle inscrit à l'inventaire supplémentaire des M.H.français. Elle possède un grand parc et un jardin fleuri.              TOUVRE, était alors une puissante forteresse, la seigneurie de Touvre était rattachée à la sénéchaussée dAngoulême (1349) avec garnison et gouverneur dépendant de lautorité royale. En 1373, pour la première fois, le cartulaire signale le domaine de Maumont et lattribue à lévêché dAngoulême. Au cours de la guerre de cent ans, Touvre était tombé entre les mains des Anglais, qui pillèrent le pays.  Quand ils en furent chassés, les paysans démolirent le château-forteresse, utilisèrent les pierres pour construire des maisons. Actuellement, seuls les vestiges d'une tour sont visibles. Le site (pied du château) est visitable par un sentier contournant le Dormant dans la végétation et rejoignant l'église, qui était l'ancienne chapelle castrale. Le sommet de la plateforme du château sont des terrains privés.","habitants":"Famille de Lusignan,\r\n        \r\n        \"","divers":"Magnac sur touvre  45° 39' 43 nord, 0° 15' 35 est Lèche  grav 1 -3,                                                           Maumont grav 4 à 8","gps":"","images":["../image/image_16/16_Magnac_Touvre_1.jpg","../image/image_16/16_Magnac_Touvre_2.jpg","../image/image_16/16_Magnac_Touvre_3.jpg","../image/image_16/16_Magnac_Touvre_4.jpg","../image/image_16/16_Magnac_Touvre_5.jpg","../image/image_16/16_Magnac_Touvre_6.jpg","../image/image_16/16_Magnac_Touvre_7.jpg","../image/image_16/16_Magnac_Touvre_8.jpg"]},"Consult_chateau_formulaireb408":{"id":"Consult_chateau_formulaireb408","dept":"16","canton":"Tude-et-Lavalette","commune":"Villebois-Lavalette","nom":"Mailleberchie","type":"Château","periode":"XVII","histoire":"MAILLEBERCHIE,  le site fait partie des premières places fortifiées dans les années 1500. Pendant la période des guerres de religion les constructions on été en partie détruites. C'était alors le territoire féodal du seigneur Joseph des Chastellars. Le château a ensuite été donné comme dot à Jean de Villedon, seigneur de Pérefond et de Laurière à l'occasion de son mariage avec Anne de la Rebuterie, Dame de Mailleberchie. Sa reconstruction a alors été entreprise à la fin des années 1890 par Paul Abadie, architecte controversé du Sacré Cur de Paris, et du sculpteur Ernest Jordes sous commande de monsieur Henri Blanc-Fontenille, qui fut par la suite maire de Villebois-Lavalette. Dès le début de la seconde guerre mondiale et jusqu'à la fin de l'occupation le château devint une commanderie militaire de l'armée allemande. Après leur départ le château est retrouvé en partie dévasté. L'ancien propriétaire, exilé au Québec, ne revint jamais au château. Ce dernier servit alors par moment de pavillon de chasse en tombant avec les années à l'état de ruines.","architecture":"MALLEBERCHIE, les enceintes du château ont été détruites dans les années 1700. Quelques vestiges font toujours partie intégrante de bâtiments situés au nord du site. C'est à cette période que la production de Cognac puis de pineau prit son essor dans la région.  Dans les années 1800, un vaste incendie a été la cause de la démolition d'un grande partie du château. En 2005 les bâtiments agricoles  furent rasés. Il fut ensuite acquit par une communauté bouddhiste qui le remet en état depuis cette date en utilisant des méthodes à l'ancienne et des matériaux de la région. Le château sert de lieu de retraite spirituelle à usage privé et n'est pas ouvert au public.","habitants":"Famille de Joseph des Chastellars\r\n        \"","divers":"","gps":"","images":["../image/image_16/16_Mailleberchie_1.jpg","../image/image_16/16_Mailleberchie_2.jpg","../image/image_16/16_Mailleberchie_3.jpg","../image/image_16/16_Mailleberchie_4.jpg","../image/image_16/16_Mailleberchie_5.jpg","../image/image_16/16_Mailleberchie_6.jpg"]},"Consult_chateau_formulaire41b8":{"id":"Consult_chateau_formulaire41b8","dept":"16","canton":"Val-de-Nouère","commune":"Saint-Saturnin","nom":"Maillou","type":"Château","periode":"XVI","histoire":"MAILLOU, la première mention de Maillou date du XVe siècle. Les terres de la paroisse de Saint-Saturnin relèvent directement de la châtellenie d'Angoulême, car il n'y a pas de château seigneurial. Maillou était un fief, comme Tarsac, Mouillac, Moulède, Beauregard, etc. En fait il s'agissait d'un hameau, possédé par les seigneurs de Mosnac (1457-1571), avec en particulier un hôtel,. En 1539, la propriété est cédée aux Nesmond, famille de marchands puis de juristes, originaires d'Angoulême, qui en deviennent seigneurs à part entière en 1579. En 1580, François Nesmond, conseiller d'état et président du parlement de Bordeaux, édifie le donjon et l'aile nord. Calvin aurait peut-être habité le château, mais la confusion est possible car il a été hébergé au logis de la paroisse, près de l'église, accueilli par Louis du Tillet, archidiacre de la cathédrale en 1534 et 1562, où on trouve encore ladite chambre de Calvin, et où il aurait écrit ses \"Commentaires\". André Nesmond du 1553-1616, fils de François et qui possède les mêmes fonctions dû au soutien de la reine Marie de Médicis, refait l'aile orientale. En 1712, le château passe à Henry Rambaud, écuyer, seigneur de Bourg-Charente, Torsac et Saint-Saturnin. Les Rambaud le garderont un siècle. SCEA exploité par Eric Gauche.","architecture":"MAILLOU, est constitué d'un donjon inachevé, isolé, relié au corps de logis par un pont-volant. Ce corps de logis du XVIe siècle est complété par une maison d'habitation de XVIIe siècle dont la porte est encadrée de pilastres. Le donjon est une tour massive et carrée, de style médiéval et défensif à cause des guerres de religion encore présentes à l'époque. On y accédait par un pont-levis, aujourd'hui disparu. Elle est entièrement séparée des deux corps de logis dont elle forme l'angle. Elle possède une voûte en dôme, et elle est surmontée par une sorte d'échauguette caractéristique. L'aile orientale, qui sert aujourd'hui de maison, datant du XVIIe siècle, comporte au rez-de-chaussée une salle voûtée du XVe siècle d'un bâtiment antérieur. Les bâtiments de l'exploitation viticole complètent la fermeture de la cour ou l'on entre par un porche charentais avec devant dans l'axe un pigeonnier.","habitants":"Famille de  François Nesmond\r\n        \"","divers":"Wikipédia","gps":"","images":["../image/image_16/16_Maillou_1.jpg","../image/image_16/16_Maillou_2.jpg","../image/image_16/16_Maillou_3.jpg","../image/image_16/16_Maillou_4.jpg"]},"Consult_chateau_formulaire1726":{"id":"Consult_chateau_formulaire1726","dept":"16","canton":"Charente-Sud","commune":"Champagne de Blanzac-Vigny","nom":"Maine_Giraud","type":"Manoir","periode":"XV-XVI","histoire":"MAINE-GIRAUD, date du XIIe aménagé au XVe-XVIe siècle. Il a appartenu à Alfred de Vigny de 1827 à 1863 et il y a vécu de 1850 à 1853. Le manoir était déjà au centre d'une propriété et Vigny allait négocier la vente de son vin à Blanzac à lhôtel Monte-Christo, rue de la Voûte. Son grand-père, le marquis de Baraudin, avait acheté le Maine-Giraud en 1768 puis la propriété est revenue à sa « douce et spirituelle » tante, Sophie de Baraudin, chanoinesse de l'Ordre souverain de Malte. Alfred de Vigny s'y rend la première fois en 1823, et il écrit alors: « Je fus épris de son aspect mélancolique et grave et en même temps je me sentis le cur serré à la vue de ses ruines. » Dans ses Mémoires inédits, il écrit aussi : « Le souffle de la Terreur avait traversé cette demeure. » Il refusa de vendre la propriété, la fit restauré peu à peu, remit les terres en valeur, acheta un alambic d'occasion, fit réparer le manoir du Maine-Giraud, et fit reconstruire l'une des tours. Il méditait et écrivait dans la tourelle, dans une petite pièce en haut de l'escalier en colimaçon. Il lègua le manoir de Maine-Giraud à Louise Lachaud, fille de madame Ancelot, qui tenait un salon littéraire parisien. Il passa ensuite aux Philippon, puis fut racheté, en 1938, par la famille Durand, qui a replanté et développé le vignoble. Il est inscrit aux M.H.depuis 1967. Il est ouvert au public et abrite aujourd'hui le musée Alfred-de-Vigny.","architecture":"MAINE-GIRAUD; au centre du logis, une tour polygonale, couverte en ardoise, est datée 1464 à l'intérieur. Elle renferme un escalier à vis en pierre. Elle est accompagnée d'une tourelle en encorbellement. Une tour carrée est située à l'ouest le corps de logis est doté en son milieu, d'une agréable tourelle en encorbellement et coiffée d'un toit en ardoise, une tour polygonale, couverte aussi d'ardoise, surmonte une charmante petite cour carrée. Façades et toitures ont été inscrits au M.H. par arrêté du 13 novembre 1967. Le logis est entouré de bâtiments agricoles et d'un vignoble comme au temps d'Alfred de  Vigny.","habitants":"Alfred de Vigny \r\n        \"","divers":"Maine-Giraud 45° 29' 49\" Nord, 0° 01' 45\" Est","gps":"","images":["../image/image_16/16_Maine_Giraud_1.jpg","../image/image_16/16_Maine_Giraud_2.jpg","../image/image_16/16_Maine_Giraud_3.jpg"]},"Consult_chateau_formulaire3b61":{"id":"Consult_chateau_formulaire3b61","dept":"16","canton":"Val-de-Tardoire","commune":"Marthon","nom":"Marthon","type":"Tour-Château","periode":"XV-XVI","histoire":"MARTHON, la seigneurie de Marthon existe depuis le Xe siècle. Son premier seigneur connu est Hugues de Marthon, fils cadet, né du mariage de Robert de Montberon, avec une fille d'Audouin II, comte d'Angoulême. Le donjon dit tour du Breuil est le seul vestiges a seigneurie de Marthon qui existe depuis le Xe siècle. Son premier seigneur connu est Hugues de Marthon, fils cadet né du mariage de Robert de Montbron avec une fille d'Audouin II, comte d'Angoulême. Au XVe siècle, lors des démêlés du roi Louis XI avec son frère Charles, duc de Guyenne, l'armée royale trouva un appui solide dans ce château. Le baron Hubert se retire à Marthon, où il meurt en 1566, sans laisser d'enfant. Après sa mort, la baronnie de Marthon est partagée entre différents membres de la famille de La Rochefoucauld, et recouvre son unité seulement vers le milieu du XVIIe siècle, avec François de Roye, arrière-petit-neveu du baron Hubert.  Le nouveau château, construit sur l'emplacement d'un château roman incendié en 1347 situé à l'écart et dont la construction a commencé au XVIe siècle par Hubert de La Rochefoucauld, baron de Marthon, a achevé la ruine de l'ancien château. Construit sur l'emplacement d'un château roman incendié en 1347, le Château-neuf date de la Renaissance. Il a été fortement remanié au début du XXe siècle à l'initiative de Maurice Raynaud, député de la Charente.  \r\nCOURONNE situé à l'ouest de la commune, ce château a été transformé en hôtel. En 2006, il a été le théâtre du film ( nos jours heureux avec Jean-Paul Rouve).                                                                            La petite MOTTE  à la feuillade","architecture":"MARTHON à proximité du château vieux dont-il reste un donjon qui domine toujours le bourg , à moitié démantelé c'est une tour fortifiée qui date du Xe siècle est le seul vestige de l'ancien château, qui s'élevait au nord-est et dont on peut encore distinguer l'enceinte.  Le nouveau château a appartenu jusqu'au XVIIe siècle à la famille de La Rochefoucauld. De plan quadrangulaire, il s'élève encore sur une hauteur de 15 mètres.. En 1960, le donjon a été arasé d'un mètre. Le château était constitué d'une enceinte polygonale dominée par le donjon carré à l'angle sud-ouest. Il possédait une chapelle romane à deux étages, le niveau inférieur servant d'abri aux pèlerins et le niveau supérieur réservé au seigneur.  Le corps d'habitation s'adossait à la face nord de la tour ; une tourelle a disparu. Il possédait une chapelle romane à deux étages. Il est inscrit aux M.H. depuis 1928.","habitants":"Famille d'Hugues de Marthon\r\n        \"","divers":"Marthon 45° 36' 46\" nord, 0° 26' 43\" est  tour grav 1à 5, nouveaux château grav 6,                                        la Couronne grav 7-8","gps":"","images":["../image/image_16/16_Marthon_1.jpg","../image/image_16/16_Marthon_2.jpg","../image/image_16/16_Marthon_3.jpg","../image/image_16/16_Marthon_4.jpg","../image/image_16/16_Marthon_5.jpg","../image/image_16/16_Marthon_6.jpg","../image/image_16/16_Marthon_7.jpg","../image/image_16/16_Marthon_8.jpg"]},"Consult_chateau_formulaire4699":{"id":"Consult_chateau_formulaire4699","dept":"16","canton":"Charente-Bonieure","commune":"Massignac-Alloue","nom":"Massignac","type":"Château","periode":"XV-XVI","histoire":"MASSIGNAC, le château de Massignac aurait appartenu au XVe siècle à la famille Tizon, puis au XVIe siècle aux Barbarin, pour passer ensuite à la famille Régnaud, puis par mariage, à la famille Guiot, vendu comme bien national à la Révolution. En 1861 il a été très remanié.                                                    ETANGS,   bâti à Massignac, le fief des Étangs, pourtant situé dans la même paroisse, relevait de la principauté de Chabanais, est devenu avec son parc, un important hôtel de luxe. Fermé en 2013, le domaine des Etangs a été depuis entièrement restauré. Le château des Etangs est redevenu un magnifique hôtel de luxe 5 Etoiles.","architecture":"MASSIGNAC, c'est un bâtiment rectangulaire flanqué de grosses tours d'angle rondes. Ces tours d'angles circulaires sont carrées à l'intérieur, munies de plusieurs archères canonnières. Il est organisé en deux grandes pièces séparées par un large couloir. Ses fenêtres à encadrement et appui moulurés sont d'un château du XVe siècle. Il a été remanié en 1861 avec installation d'un escalier et c'est sans doute à cette occasion que la tour d'escalier a été détruite et des ouvertures percées.                                            ETANGS,  du XVIIe siècle. Il a fortement été remanié au XIXe siècle en U flanqué de tours rondes de diamètre différents à trois niveaux  aux angles toits en poivrières , corps de logis principal à deux niveaux et série de lucarnes haute à fronton triangulaire sur comble recouvert de tuiles.","habitants":"Massignac famille Tizon                                        Etangs Fabien Beaufour\r\n        \"","divers":"Massignac grav 1-2,                                                        Etangs GPS : 45° 46' 51\" Nord, 0° 39' 18\" Est","gps":"45° 46' 51\" Nord, 0° 39' 18\" Est","images":["../image/image_16/16_Massignac_1.jpg","../image/image_16/16_Massignac_2.jpg","../image/image_16/16_Massignac_3.jpg","../image/image_16/16_Massignac_4.jpg","../image/image_16/16_Massignac_5.jpg","../image/image_16/16_Massignac_6.jpg","../image/image_16/16_Massignac_7.jpg"]},"Consult_chateau_formulaire6352":{"id":"Consult_chateau_formulaire6352","dept":"16","canton":"Val-de-Tradoire","commune":"Montbron","nom":"Menet","type":"Château","periode":"XVI","histoire":"MENET, au XIIIe siècle Menet appartient à la famille de Céris, puis passe par mariage en 1366 à la famille de La Faye. En 1530, Jeanne de La Faye épouse François de Lambertie, appartiendra par la suite à cette dernière famille pendant quatre siècles. En 1780, un acte stipule que « les seigneurs de Menet sont en possession d'un ban dans le chur de l'église à Saint-Maurice de Montbron, un tombeau élevé dans l'église avec ses inscriptions. À la Révolution, Pierre de Lambertie décède et le domaine est partagé entre ses quatre enfants, dont trois ont émigré. La quatrième, Marguerite, reçoit « la maison de maître appelée Menet » par tirage au sort. Le château appartiendra encore à la famille de Lambertie jusqu'en 1941, alors acquis par la famille Maccioni, passe à la famille Bodinaud.","architecture":"MENET  Le château de Menet dévoile ses 3 tourelles dont une est placée au centre de sa façade. Elles dateraient du XVIe siècle. Le corps de logis est rectangulaire et possède trois tours rondes coiffées en poivrières, située sur la façade intérieure, côté cour d'honneur. Il possède un étage et il est couvert d'un toit haut. La tour centrale possède un escalier à vis monumental. L'ensemble datant du XVIe siècle a été remanié au XVIIe siècle. Les deux tours d'angles, en briques, sont plus récentes.Le mur au nord de la tour centrale fait 1,20 m d'épaisseur. Dans l'aile orientale se trouve une chapelle dont la porte s'ouvre sur l'extérieur. Côté sud se trouve une terrasse avec balustrade et double escalier descendant vers la Tardoire. De ce côté toutes les ouvertures de la façade ont été modifiées sous la Restauration lors de la construction de la terrasse. L'intérieur de la cuisine possède encore un sol en caillebottage typiquement charentais. La cour d'honneur, bordée par des communs, est fermée par une grille encadrée par deux pavillons de garde carrés. Le château, privé, n'est visitable que lors de certaines Journées du patrimoine. \r\n Le château de Menet est inscrit aux M.H. depuis 1983.","habitants":"Famille de Pierre de Lambertie\r\n        \r\n        \"","divers":"Menet 45° 40' 03\" nord, 0° 30' 52\" est2","gps":"","images":["../image/image_16/16_Menet_1.jpg","../image/image_16/16_Menet_2.jpg","../image/image_16/16_Menet_3.jpg"]},"Consult_chateau_formulaire0b23":{"id":"Consult_chateau_formulaire0b23","dept":"16","canton":"Tude-et-Lavalette","commune":"Magnac-Lavalette","nom":"Mercerie","type":"Palais","periode":"XIX","histoire":"MERCERIE, en 1771, Étienne du Rousseau était chevalier.   En 1924, grâce à la générosité de leur oncle, les frères Réthoré, Raymond, industriel puis député gaulliste de la Charente, et Alphonse, architecte autodidacte, ont acheté le domaine de 600 ha à la famille Mesnaud de Saint-Paul, qui avait hérité du lieu par le mariage en 1799 de Paul Mesnaud de Saint-Paul (né à Laplaud le 20 octobre 1766 ; mort à Voulgézac le 12 février 1838), avec Marie-Julie Rousseau de Magnac de la Mercerie. Ils meurent respectivement en 1983 (Alphonse) et en 1986 Raymond,  leur héritier, sans lien de parenté d'ailleurs, va devoir vendre les collections pour faire face aux dettes lors d'une vente aux enchères en 1987, et en 1988 le château est acquis par Bernard Baruch Steinitz (1933-2012), célèbre antiquaire parisien, qui hélas l'entretient peu. En 2002 un projet de restauration est élaboré par Isabel Guérin, dont l'objet est de redonner vie au site en lui donnant la possibilité d'accueillir des collections d'art contemporain. En 2008, le château est vendu à la société foncière parisienne Volta. En 2011, un bail emphytéotique de 75 ans est signé le 22 août entre la société propriétaire et la commune de Magnac-Lavalette. La commune, à l'aide d'une association de bénévoles Saint-Étienne Patrimoine, entreprend alors une restauration des parties construites et des uvres d'art afin d'ouvrir le château à la visite en été à partir de 2013.","architecture":"MERCERIE, château de style \"néo-gothique\" datant de la fin du XIXe siècle, remplace l'ancien logis, comprend deux parties. L'ensemble fait face au sud-ouest. En 1939 les deux frères entreprennent l'extension du château et projettent de le transformer en Versailles charentais par la construction d'une longue façade de style Renaissance italienne,  la partie la plus ancienne, qui est la demeure primitive, est située à l'extrême gauche de la façade de l'édifice actuel, au nord-ouest; datant de la fin du XIXe siècle et elle est de style néogothique. Une façade de 220 mètres de large, d'une profondeur de 20 mètres et de 15 mètres de haut est accolée à partir de 1947 au sud-est du manoir primitif  qu'il était prévu de démolir par souci d'unité stylistique  imitant l'architecture Renaissance italienne et qui présente une certaine ressemblance avec les façades du château de Bizy à Vernon, reconstruit vers 1860 par l'architecte William Henry White en s'inspirant, dit-on, de la villa Albani à Rome.","habitants":"Famille d' Étienne du Rousseau\r\n        \"","divers":"Mercerie 45° 30' 05\" nord, 0° 14' 32\" est2","gps":"","images":["../image/image_16/16_Mercerie_1.jpg","../image/image_16/16_Mercerie_2.jpg","../image/image_16/16_Mercerie_3.jpg","../image/image_16/16_Mercerie_4.jpg","../image/image_16/16_Mercerie_5.jpg","../image/image_16/16_Mercerie_6.jpg"]},"Consult_chateau_formulaire7b93":{"id":"Consult_chateau_formulaire7b93","dept":"16","canton":"Cognac","commune":"Merpins","nom":"Merpins","type":"Vestiges","periode":"XII","histoire":"MERPINS, l'éperon rocheux sur lequel a été bâti le château a été occupé dès le Néolithique. Le site est situé à moins de 2 km de l'ancienne voie romaine de Saintes à Périgueux, le chemin Boisné qui passe à la Frenade, et des historiens ont longtemps soupçonné que c'était l'emplacement de l'étape Condate.  La tradition orale fait remonter l'origine de la forteresse à Charlemagne mais aucun document ne le prouve. Au Xe siècle la châtellenie de Merpins appartenait aux Taillefer, comtes d'Angoulême. En 1179 Merpins fut pris par les Anglais et Richard Cur de Lion le donna en 1180 à son fils illégitime Philippe de Falcombridge, marié à Amélie de Cognac. Cognac et Merpins ne furent pas réunis longtemps, en 1204 Philippe de Falcombridge vendit Merpins à Jean sans Terre. Son fils Henri III donna Merpins à Hugues X de Lusignan, seigneur de Cognac, mari d'Isabelle d'Angoulême. En 1308 Merpins fut réuni aux possessions royales mais, le traité de Brétigny de 1360 le rendit aux Anglais. C'est après un siège de six ans mené par le maréchal de Sancerre que le château fut repris en 1387. Le roi Charles VI ordonna sa destruction. Le site fut encore un lieu de combats aux cours des guerres de religion, occupé par les catholiques puis les protestants. C'est le duc de Mayenne qui les déloge en 1577.","architecture":"MERPINS, élevée à l'extrémité d'une pointe rocheuse, le château est séparée du reste du plateau par un large fossé. Des contreforts de maçonnerie soutenaient l'ensemble. Des tours rondes s'avançaient dans les douves. S'il existait un donjon, on ne connait pas son emplacement. La forteresse primitive aurait été construite au IXe siècle. Elle a, dès le Xe siècle, été renforcée par des pierres puis entre 1140 et 1150 ont été érigés le donjon et le château fort. Après 1179 trois tours furent construites par les Anglais qui renforcèrent les murailles et creusèrent une douve sèche. D'autres travaux de fortification datent des XIIIe siècle. Le château de Merpins est inscrit aux M.H. depuis 1973","habitants":"Famille de  Philippe de Falcombridge\r\n        \"","divers":"Merpins 45° 40' 35\" Nord, 0° 23' 45\" Ouest","gps":"","images":["../image/image_16/16_Merpins_1.jpg","../image/image_16/16_Merpins_2.jpg","../image/image_16/16_Merpins_3.jpg","../image/image_16/16_Merpins_4.jpg"]},"Consult_chateau_formulaire16a1":{"id":"Consult_chateau_formulaire16a1","dept":"16","canton":"Cha
