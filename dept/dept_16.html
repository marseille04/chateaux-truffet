rente-Sud","commune":"Baignes-Sainte-Radegonde","nom":"Montausier","type":"Château","periode":"XV-XVII","histoire":"MONTAUSIER, le fief de Montausier est attesté aux comtes d'Angoulême Taillefer dès le début du XIe siècle. Il est érigé en baronnie et reste aux Taillefer de Montausier jusqu'en 1320, date à laquelle il passe aux Sainte-Maure par mariage. La baronnie ressortait de la sénéchaussée d'Angoulême, les seigneurs de Montausier rendaient hommage au comte d'Angoulême et avaient le droit de haute, moyenne et basse justice. Charles de Sainte-Maure, duc de Montausier (1610-1690) abjura le protestantisme en 1645. Il fut maréchal de camp, gouverneur de Saintonge et d'Angoumois, puis il fut nommé gouverneur du Grand Dauphin en 1668. La baronnie de Montausier fut élevée en marquisat, puis en duché-pairie en 1668. Le château est confisqué à la Révolution, puis en grande partie détruit en 1793. En 1871, l'abbé Jean Hippolyte Michon, archéologue et rédacteur de la Statistique monumentale de la Charente, fait construire un manoir à l'angle sud pour y habiter.","architecture":"MONTAUSIER, une tour du XVe siècle est le seul vestige du château détruit. Cette tour ronde comporte un rez-de-chaussée et deux étages, avec une pièce à chaque niveau. Elle présente encore ses consoles de crénelages sur machicoulis. Elle se situait à l'angle sud du château rectangulaire disparu. La reproduction d'un plan est conservé. Il reste aussi comme autre vestige la Fontaine de Madame, avec une inscription Marguerite de Châteaubriand et une année à moitié illisible du XVIIe siècle.","habitants":"Marguerite de Châteaubriand \r\n        \"","divers":"Montausier  45° 23' 16\" Nord, 0° 14' 19\" Ouest","gps":"","images":["../image/image_16/16_Montausier_1.jpg","../image/image_16/16_Montausier_2.jpg","../image/image_16/16_Montausier_3.jpg"]},"Consult_chateau_formulaire606b":{"id":"Consult_chateau_formulaire606b","dept":"16","canton":"Val-de-Tradoire","commune":"Montbron","nom":"Montbron_16","type":"Château","periode":"XV-XVII","histoire":"A Montbron plusieurs châteaux dont celui de Chabrot, de Ferrières, de Lavaud, de Marendat, de Montgaudier,  de Menet (voir article) et de Montbron (Article suivant).                                                         CHAISE dit le vieux château Montbron occupe la maison du docteur Léon Rebière-Laborde, acquise en 1945. La mairie était avant cette date située dans le Vieux Château.                                                      CHABROT,  Il fut la propriété de la famille du Rousseau, et entre autres de Jean Gédéon du Rousseau de Chabrot, qui fut maire de Montbron en 1790. \r\nFERRIERES, il fut la propriété des Couraudin, maîtres de forges qui possédaient des terres et des mines de fer dans la région. Il est depuis longtemps la propriété de la famille du Rousseau de Ferrière. Le monument fait lobjet dune inscription au titre des M.H. depuis le 12 octobre 1973. \r\nLAVAUD , Florence et Robert Manderscheid ont transformé l'ancien monument du marquis de Courtis en gîte quatre épis.                                                      La MAIRIE de Montbron occupe la maison du docteur Léon Rebière-Laborde, acquise en 1945. La mairie était avant cette date située dans le Vieux Château.","architecture":"CHABROT,  est composé d'un logis édifié au XIVe siècle, et d'un donjon circulaire isolé bâti à la même époque à Montbron, construction élégante du XVe siècle modifiée au XVIIe siècle, est un logis avec des tourelles et une galerie à deux niveaux sur une portion de la façade.  Le manoir présente schématiquement un corps de logis de plan rectangulaire, coiffé d'une haute toiture en tuiles plates, et de tourelles cylindriques qui flanquent ses angles. Son donjon médiéval a été restauré et réhabilité en 2012.  inscrit aux M.H. depuis 1973.                                                La FERRIERE,  ce château date des XVIe et XVIIe siècles consiste en un corps de logis flanqué de deux tours aux toits pointus, avec au sud une autre tour renfermant l'escalier.   Les bouches à feu escamotables sont toujours utilisables réalisées dans des pierres pivotantes. Ferrières, formé de trois ailes autour d'une cour ouverte, avait son entrée sous un pavillon carré.  La porte d'entrée est décorée d'un ordre de fantaisie. La grille d'entrée dans la cour date de la fin du XVIIIe siècle.\r\nLAVAUD, de plan rectangulaire formant un T avec en façade   deux tours rondes aux angles à trois niveaux accolées  toit en poivrières sur la partie central de la façade avant corps légèrement saillant  avec refend et fronton retondant  et cordon au niveau du premier étage.","habitants":"Chabrot  famille du Rousseau                              Ferrières Famille des Couraudin                       Lavaud    Florence et Robert Manderscheid\r\n        \"","divers":"Chabrot GPS : 45° 40' 34\" Nord et 0° 30' 48\" Est  Grav-2-3                                                                            Ferrieres 45° 40' 35? nord, 0° 30' 40? est  grav-4,          La Chaise Grav -1,                                                 Lavaud grav 5-6,                                                     Mairie grav -7,                                                            Marendat grav-8","gps":"45° 40' 34\" Nord et 0° 30' 48\" Est  Grav-2-3","images":["../image/image_16/16_Montbron_16_1.jpg","../image/image_16/16_Montbron_16_2.jpg","../image/image_16/16_Montbron_16_3.jpg","../image/image_16/16_Montbron_16_4.jpg","../image/image_16/16_Montbron_16_5.jpg","../image/image_16/16_Montbron_16_6.jpg","../image/image_16/16_Montbron_16_7.jpg","../image/image_16/16_Montbron_16_8.jpg"]},"Consult_chateau_formulaire9d01":{"id":"Consult_chateau_formulaire9d01","dept":"16","canton":"Val-de-Tradoire","commune":"Montbron","nom":"Montbron_Charente","type":"Château","periode":"XV-XVII","histoire":"MONTBRON, l'ancien château de Montbron, au XVe siècle, il a été rasé, avec son donjon primitif rectangulaire, en signe d'infamie, sur ordre du roi Charles VII. Marguerite de Rohan, comtesse d'Angoulême (épouse du bon comte Jean), a fait reconstruire le château dont quelques parties subsistent encore, comme le donjon de style roman. Jacquette de Montberon, dernière représentante de la branche aînée de la famille de Montberon, épouse André de Bourdeille en 1558 et lui apporte la seigneurie qui passe ensuite aux mains de Louise de Savoie comtesse d'Angoulême et mère de François Ier. En 1624, les héritiers d'Henri de Luxembourg doivent vendre le comté de Montbron à la famille de Loménie, qui conserve Montbron ainsi que le comté de Brienne jusqu'à la fin du XVIIe siècle. En 1699, Étienne Chérade acquiert le comté. Son petit-fils Adrien-Alexandre-Étienne Chérade de Montbron obtint par lettres patentes de décembre 1766 l'érection en comté de sa seigneurie de Montbron mais il en est dépossédé à la Révolution.\r\nSAINTE-CATHERINE, à la périphérie de la commune de Montbron, le château Sainte-Catherine vous accueille dans ses chambres et tables dhôtes toute lannée, où séjourna l'Impératrice Joséphine de Beauharnais, épouse de Napoléon, plus récemment, le château était une destination phare de Georges Pompidou et de son épouse. Chambres d'hôtes de Jean-François Bassard.","architecture":"MONTBRON, il ne subsiste que la tourelle polygonale. Des dessins montrent un bâtiment à toiture à pente unique. Le donjon a été percé de fenêtres rectangulaires au XVIIe siècle. Les deux cheminées peintes datant du XVIIe siècle et situées au premier étage sont classées. Le château est mentionné dans un diplôme de Charles le Chauve de 852. L'édifice fut en grande partie reconstruit au XVe siècle puis endommagé pendant les guerres de Religion. Au XVIIe siècle, des travaux de décoration intérieure furent entrepris . Au XVIIe siècle, la toiture fut refaite. Un escalier en vis dans une tourelle hexagonale, sur la façade ouest, dessert les quatre étages. Des fenêtres à meneaux et des meurtrières ont été conservées. Toutes les dépendances et les jardins ont disparu, de même que les remparts. Le château se présente comme deux quadrilatères accolés dans le sens de la longueur et dont l'un est partiellement prolongé en appenti au sud. L'implantation au sol semble être celle de l'édifice roman, à l'exception de la partie sud en appenti. Une petite porte en plein cintre, murée, sur la façade nord et la moitié inférieure du mur sud pourraient avoir appartenu à ce premier édifice.   SAINTE-CATHERINE du XVIIe siècle, le  corps de logis rectangulaire saillants côté parc à six travées à deux niveaux toits en croupes entre deux pavillons saillants côtés entrée  à trois niveaux lucarnes sur toits brisés.","habitants":"Montbron Famille de Montberon                                Ste-Catherine Jean-François Bassard\r\n        \"","divers":"Montbron 45° 40' 05\" nord, 0° 30' 06\" est  grav 1-à 4,  Ste Catherine grav 5-6","gps":"","images":["../image/image_16/16_Montbron_Charente_1.jpg","../image/image_16/16_Montbron_Charente_2.jpg","../image/image_16/16_Montbron_Charente_3.jpg","../image/image_16/16_Montbron_Charente_4.jpg","../image/image_16/16_Montbron_Charente_5.jpg","../image/image_16/16_Montbron_Charente_6.jpg"]},"Consult_chateau_formulairee38e":{"id":"Consult_chateau_formulairee38e","dept":"16","canton":"Charente-Sud","commune":"Montchaude","nom":"Montchaude","type":"Château","periode":"XVI-XIX","histoire":"MONTCHAUDE, la terre de Montchaude a appartenu à des seigneurs de la maison de Barbezieux. Arnaud de Montchaude est cité dans le cartulaire de Baignes vers 1075 et Hugues de Montchaude donne pour dot Vibrac à sa fille Jovide au début du XIVe siècle. Il a ensuite appartenu aux Saint-Gelais de Lusignan. Pour certains, le château a été construit au milieu du XVIe siècle par les Bouchards, pour d'autres à la fin du XVIe siècle, pour les Saint-Gelais, peut-être par le même architecte que le château de La Rochefoucauld, Antoine Fontan. Il était alors entouré de douves. Les Saint-Gelais ont gardé Montchaude du milieu du XVIe siècle à 1732 date de la mort de Jean de Saint-Gelais qui a deux filles. Hélie de Céris ayant épousé Jehanne de Saint-Gelais en devint propriétaire. Il passe en plusieurs mains par héritage et par vente. Louis-Eugène Arnous, député de Barbezieux, l'achète en 1889 et entreprend un important remaniement sous la direction des architectes Edouard Warin, puis de Raymond Barbaud. Le château est acheté en 1986 par Fahd bin Mahmoud al Said, vice premier ministre du Sultanat d'Oman, cousin direct de Qabus ibn Saïd, sultan d'Oman. Inhabité, il est racheté le 15 juillet 2013 par un jeune couple de Canadiens. Une semaine après, il est partiellement détruit par un incendie. La partie endommagée du château a été restaurée entre 2014 et 2015 par l'atelier d'architecture bordelais Brachard de Tourdonnet. il à été la propriéte de monsieur Jean Banasiack","architecture":"MONTCHAUDE, construction du XVIe siècle soigneusement restauré au XIXe siècle, malgré qu'une grande partie, fut détruite par un incendie, formé d'un corps de logis principal, coupé par un pavillon central plus élevée est  flanqué de deux pavillons en légère saillies, le décor des fenêtres hautes et trés riches de belle qualité, l'édifice comporte un étage et un étage de combles coiffé d'un toit d'ardoises à longs pans brisés, rehaussé au XIXe siècle. Ses lucarnes sont très ornées de motifs floraux, d'arabesques et de blasons, possède une terrasse et se trouve entouré d'un jardin et du parc. Une grosse fuie ronde est à l'écart du château de Montchaude.","habitants":"Famille de  Saint-Gelais de Lusignan\r\n        \"","divers":"Montchaude 45° 26' 51\" nord, 0° 12' 06\" ouest1","gps":"","images":["../image/image_16/16_Montchaude_1.jpg","../image/image_16/16_Montchaude_2.jpg","../image/image_16/16_Montchaude_3.jpg","../image/image_16/16_Montchaude_4.jpg"]},"Consult_chateau_formulaireef89-2":{"id":"Consult_chateau_formulaireef89-2","dept":"16","canton":"Boixe-et-Manslois","commune":"Montignac","nom":"Montignac_16","type":"Vestiges-Forteresse","periode":"XII-XV-XVI","histoire":"Deux châteaux à Montignac dont Montignac et Lugérat.                                                                 MONTIGNAC, au début du XIe siècle, Guillaume II Taillefer obtient l'autorisation de l'évêque d'Angoulême de fortifier le château à partir des matériaux du tout proche castrum d'Andone qu'il possédait à Villejoubert. Dans les premières années du XIIe siècle, le château n'appartenait plus que pour un quart au comte d'Angoulême, et Vulgrin II avec l'aide du duc d'Aquitaine, et de seigneurs voisins de la Saintonge et du Poitou, dut y mettre le siège, le commandant de la place Gérard de Blaye refusant de s'en dessaisir. Finalement Vulgrin s'y établit et en fit hommage à Girard II, évêque d'Angoulême. En 1220, comme tout l'Angoumois, le château passa des Taillefer aux Lusignan par mariage d'Isabelle d'Angoulême, ex-reine d'Angleterre, avec Hugues X de Lusignan. En 1243, son quatrième fils, Guillaume de Valence, hérita de Montignac. Mais il devint comte de Pembroke. Montignac passa à ses descendants, Guillaume, puis Aymar, mort en 1324. En 1350, Pierre II d'Amboise, vicomte de Thouars, en était le propriétaire. Il passa ensuite dans la maison des La Rochefoucauld en 1399, qui le gardèrent jusqu'à la Révolution. La paix revenue, Montignac perdit de son importance. À partir du XVe siècle, la châtellenie est érigée en baronnie. Propriété de la commune.\r\nLUGERAT maison forte de Jean-Richard de Micoulaud.","architecture":"MONTIGNAC la puissante forteresse des comtes d'Angoulème subsistent encore la base du donjon rectangulaire du XIIe siècle avec ses tours portières du XIIIe siècle sont les vestiges du château;     De l'enceinte, il reste la porte avec herse à deux tours rondes en haut d'un escarpement, la partie ouest de l'enceinte et une tour ronde. Lors de la guerre de cent ans, Montignac eut à souffrir de nombreux dégâts, la place forte étant convoitée par les deux camps, et les fortifications étaient négligées. La paix revenue, Montignac perdit de son importance. L'actuel champ de foire correspond à la basse cour. Une aquarelle du XIIIe siècle montre qu'il y avait en plus deux tours couvertes de poivrières. Le prieuré saint-Étienne qui datait de 1030 a été démoli en 1960, et ses pierres ont en partie servi à remonter le donjon. Celui-ci forme une masse imposante d'où la vue s'étend sur la vallée de la Charente.  Les vestiges ont été inscrits aux M.H. le 28 mai 1962. \r\n  LUGERAT maison forte de Lugérat, situé sur la rive gauche de la Charente en amont de Montignac, date du XVIe siècle et a été remanié au XVIIIe siècle. Le corps de logis est accolé de deux tours cylindriques et d'une tour polygonale.","habitants":"Famille de la  La Rochefoucauld                         Lugerat Jean-Richard de Micoulaud\r\n        \"","divers":"Montignac 45° 47' 03? nord, 0° 07' 24? est, grav 1 à 6,  Lugérat grav 7-8","gps":"","images":["../image/image_16/16_Montignac_16_1.jpg","../image/image_16/16_Montignac_16_2.jpg","../image/image_16/16_Montignac_16_3.jpg","../image/image_16/16_Montignac_16_4.jpg","../image/image_16/16_Montignac_16_5.jpg","../image/image_16/16_Montignac_16_6.jpg","../image/image_16/16_Montignac_16_7.jpg","../image/image_16/16_Montignac_16_8.jpg"]},"Consult_chateau_formulaired979":{"id":"Consult_chateau_formulaired979","dept":"16","canton":"Jarnac","commune":"Chassors","nom":"Montjourdain","type":"Château","periode":"XVI","histoire":"MONTJOURDAIN, peu avant la Révolution, le fief de Montjourdain comme celui de Nanclas dépendait du comté de Jarnac « au devoir d'une paire d'éperons dorés à muance de seigneur et de vassal ». En 1642, Montjourdain appartenait à Bernard Martin, avocat au conseil privé du roi, puis à François Laisné, seigneur de la Nérolle. En 1698, Nanclas et Montjourdain sont vendus à Jean de La Charlonnerie et son épouse Françoise Laisné. En 1751, Montjourdain est cédé à Jacques Poujaud de Chaignet, seigneur de Nanclas. En 1771, le domaine est vendu à Jean Guillé, négociant de la ville de Cognac, qui fit construire le logis actuel. Au cours du XIXe siècle, la propriété, morcelée, change souvent de propriétaires. Pendant la seconde guerre mondiale, le logis, à l'abandon, est occupé par des réfugiés, son état est très dégradé quand en 1965 le propriétaire en entreprend la restauration. Le 7 juin 1968, le château, façade et toiture, est inscrit M.H.","architecture":"MONTJOURDAIN, construit sur l'emplacement d'une ancienne demeure rasée vingt ans plus tôt  sans modification apportée extérieurement, date de la fin du XVIIIe siècle (1790), le bâtiment offre une architecture de style néo-classique en pierre et tuile charentaise, comme on en trouve parmi les riches demeures viticoles de la région, mais surtout dans le Bordelais. Il s'agit d'un bâtiment rectangulaire à un étage, pourvu sur ses deux façades d'un avant-corps en légère avancée, chacun étant surmonté d'un fronton triangulaire percé d'un il-de-buf. Un fronton curviligne surmonte aussi la porte d'entrée. Sept fenêtres percent l'étage sur chaque façade. D'accès privé, le domaine n'est pas visitable, mais des manifestations culturelles y sont parfois organisées. propriété de monsieur Trux.                                         Le logis d'Estivalle, ou logis de Chassors, aurait, d'après Charles Daras, été reconstruit en 1730, date inscrite sur un portail muré. Il ne subsisterait du XVIe siècle que la tour polygonale qui flanque cette maison noble restaurée au XXe siècle.","habitants":"Famille de  Jean Guillé\r\n        \"","divers":"Montjourdain 45° 41' 51\" nord, 0° 11' 45\" ouest2","gps":"","images":["../image/image_16/16_Montjourdain_1.jpg","../image/image_16/16_Montjourdain_2.jpg","../image/image_16/16_Montjourdain_3.jpg"]},"Consult_chateau_formulairef1cb":{"id":"Consult_chateau_formulairef1cb","dept":"16","canton":"Tude-et-Lavalette","commune":"Montmoreau-Saint-Cybard","nom":"Montmoreau","type":"Château","periode":"XV","histoire":"MONTMOREAU, la seigneurie est attestée depuis 1075 comme appartenant à Alo ou Alon. En 1376 elle a été vendue à Raymond de Mareuil. Le château détruit pendant la guerre de cent ans a été reconstruit sur place, au XVe siècle. Au XVe siècle Jean de Mareuil était baron de Montmoreau. Il passera au XVIe siècle à la famille Prévost de Sansac, puis aux Rochechouart, enfin à une famille irlandaise, les Perry, jusqu'au milieu du XIXe siècle.  Le château a servi de gendarmerie, et il a été dévasté lors de la seconde guerre mondiale. Il fut par la suite acquis par M. Tête, artiste peintre et sculpteur, qui l'a restauré en partie. \r\nLa chapelle, datant du XIIe siècle, a été classée  au M.H. le 15 mai 1952, et les façades et les toitures du château le 18 septembre 1952. Aujourd'hui propriété de M. Willy d'Huysser.","architecture":"MONTMOREAU, le château domine la vallée de la Tude et la petite ville de Montmoreau. Du château du XIe siècle restent des vestiges de l'enceinte intérieure, une porte monumentale, une partie de mur et deux tours. C'est entre ces deux tours qu'a été rebâti sur les remblais au XVe siècle le château actuel sous forme d'un manoir à l'abri de ses enceintes. Le logis est flanqué côté cour, d'une tour polygonale formant un avant corps avec une belle partie décorée contient l'escalier à vis, trois absidioles, située dans les jardins, qui daterait du XIe siècle est classée M.H.","habitants":"Famille Prévost de Sansac\r\n        \"","divers":"Montmoreau 45° 24' 00\" nord, 0° 07' 45\" est2","gps":"","images":["../image/image_16/16_Montmoreau_1.jpg","../image/image_16/16_Montmoreau_2.jpg","../image/image_16/16_Montmoreau_3.jpg","../image/image_16/16_Montmoreau_4.jpg"]},"Consult_chateau_formulaire605e":{"id":"Consult_chateau_formulaire605e","dept":"16","canton":"Charente-Champagne","commune":"Criteuil-la-Magdeleine","nom":"Mothe_Criteuil","type":"Château","periode":"XVI-XVII","histoire":"Il n'y avait pas de château à Criteuil, mais la paroisse possédait trois logis : la Mothe, l'Épine, et Barbe.           MOTHE, il appartenait en 1126, au comte de La Mothe qui fit sa deuxième croisade. Jean Marchand de La Mothe était le voisin du chevalier de la Croix Maron, seigneur de Segonzac et inventeur de la seconde chauffe au XVIIe siècle selon une légende, il  appartient pendant plusieurs siècles à une famille Marchand, dont plusieurs membres servent à la guerre. Jacques Marchand, qui vit sous le règne du roi Henri II, obtient de ce roi, en 1556, des lettres-patentes lui permettant de changer son nom en celui  de La Mothe. Au XVIIIe siècle, cette famille se divise en deux branches, dont l'une se fixe dans la paroisse de Reignac, et l'autre à Cherves. Il prit part à l'élaboration du cognac.\r\nEPINE,  appartient au XVIIe siècle au baron de Blanquefort. Il devient ensuite la propriété de la famille Dupuy, qui le conserve jusqu'en 1860. \r\nBARBE, au XVIIIe siècle, qui forme aujourd'hui un joli village près du Né, est possédé par les Prigné de Guippeville, ancienne famille de la Saintonge.","architecture":"la MOTHE, sa construction date du XVIe siècle, le logis forme une vaste demeure rectangulaire à un étage, un sous-toit à petites ouvertures, le tout recouvert de tuiles canal.   Le Logis de la Mothe est entouré de douves en eau. Ses importantes dépendances furent modifiées au XIXe siècle. C'est aujourd'hui une propriété viticole de Grande Champagne qui produit du Cognac et du Pineau. Le Logis de la Mothe a été remanié depuis et est devenu un domaine viticole.\r\nL'EPINE de plan rectangulaire à cinq travées à deux niveaux et attiques toits en croupes.","habitants":"Famille Marchand\r\n        \"","divers":"La Mothe  45° 32' 08\" Nord, 0° 12' 57\" Ouest grav-1,  L'Epine grav-2","gps":"","images":["../image/image_16/16_Mothe_Criteuil_1.jpg","../image/image_16/16_Mothe_Criteuil_2.jpg"]},"Consult_chateau_formulaire5769":{"id":"Consult_chateau_formulaire5769","dept":"16","canton":"Boême-Echelle","commune":"Moutiers sur Boême","nom":"Moutiers_Boème","type":"Château","periode":"XV-XVI","histoire":"Plusieur châteaux à Moutiers sur Bohême, Foy, Bréduyère ( manoir pas d'information), Logis de Forge, Rochandry ( voir article),                                                FOY, ce château est situé près du lieu-dit la Foy, à 0,7 km au nord-est du bourg de Mouthiers. En 1094, le seigneur Chandéric de Mouthiers fonde à cet endroit une annexe du monastère (moustier) dédié à l'abbaye bénédictine Saint-Martial de Limoges. Ce fief dépend du château de la Rochandry et des archères du XIVe siècle témoignent de l'existence d'une maison forte à cette époque. Au début du XVIIe siècle, le domaine appartient aux Vigier, famille notable de l'Angoumois, puis passe par mariages à différentes familles : du Refuge, puis de Chambes en 1635, qui le possède jusqu'en 1814, puis par mariage, vente, échange et héritage, jusqu'à la famille Dexant qui le possède encore en 1963.\r\nFORGES Jusqu'au XVIIIe siècle, Forge sera alternativement moulin à fer. En 1711, la « métairie de Forge » appartenait à François Gaston Houlier, seigneur de Plassac. C'est en 1781 que le domaine a été acheté par Bernard Sazerac, faïencier à l'Houmeau Habitant ce logis. En 1969, la dernière représentante de cette famille, Geneviève, décède, et le domaine est transmis à la famille de Beaucé par héritage familial.     En 1941, le film Pontcarral, avec Pierre Blanchar, est tourné à Forge. En 1970, les propriétaires restaurent le logis et les bâtiments, actuellement loués à plusieurs familles.","architecture":"FOY, le bâtiment est de forme rectangulaire; il est orienté vers le sud-ouest et comprend deux époques : la partie nord date des XVe et XVIe siècles, et elle a été étendue au sud en 1719. La première partie comprend deux anciennes meurtrières et une échauguette coiffée en poivrière, un couloir voûté, un escalier et la cuisine dont le sol est en \"caillebottage\", revêtement en petits cailloux typique des cuisines de cette époque et de la région. La partie sud comprend le salon et salle à manger avec une cheminée style Régence. L'étage comprend les chambres, avec parquet en bois, cheminées Louis XIV et Louis XVI. Le tout donne sur une vaste terrasse orientée au sud dominant le vallon avec balustrade. La cour est entourée d'un mur d'enceinte avec deux pavillons carrés aux angles. \r\nFORGES, l'ancien logis, datant des XVe et XVIe siècles. Il était protégé par des fossés remplis d'eau et une double enceinte. Du côté de la cour d'honneur se présente au centre de la façade une tour ronde qui abrite l'escalier à vis, toiture basse et conique, une lucarne à fronton prend appui sur un cordon de pierre. A gauche de la tour les deux travées comportent des fenêtres à meneaux et une fenêtres à droite. La façade a été agrémentée de deux tours carrées coiffées de toits pyramidaux aplati, l'une d'elle est orné d'une lucarne que surmonte un fronton à coquille orné d'acrotères. La tour nord est surmontée d'une lucarne portant une coquille Saint-Jacques.  Le 10 juin 2005, le logis (façades et toitures) est inscrit M.H.","habitants":"Foy, Famille de Viguier                                                    Forges  François Gaston Houlier,\r\n        \"","divers":"Moutiers 45° 33' 20\" nord, 0° 07' 27\" est                         Foy 45° 33' 55\" nord, 0° 08' 14\" est2 grav 1-2-3, Forges grav 4 à 8,                                                     Bréduyère grav 9","gps":"","images":["../image/image_16/16_Moutiers_Bo%c3%a8me_1.jpg","../image/image_16/16_Moutiers_Bo%c3%a8me_2.jpg","../image/image_16/16_Moutiers_Bo%c3%a8me_3.jpg","../image/image_16/16_Moutiers_Bo%c3%a8me_4.jpg","../image/image_16/16_Moutiers_Bo%c3%a8me_5.jpg","../image/image_16/16_Moutiers_Bo%c3%a8me_6.jpg","../image/image_16/16_Moutiers_Bo%c3%a8me_7.jpg","../image/image_16/16_Moutiers_Bo%c3%a8me_8.jpg","../image/image_16/16_Moutiers_Bo%c3%a8me_9.jpg"]},"Consult_chateau_formulairebace":{"id":"Consult_chateau_formulairebace","dept":"16","canton":"Jarnac","commune":"Mérignac","nom":"Mérignac_16","type":"Château","periode":"XVI-","histoire":"Quatres  châteaux à Mérignac dont celui de Mérignac, du logis Lafont et Villars-Marange (voir article) et triac.  MERIGNAC, le logis de la Font qui a appartenu à la famille Livenne. Il a passé par mariage en 1661 aux Sainte-Hermine qui le conservèrent jusqu'à la Révolution, puis fut acquise en 1834 par la famille Sabouraud. était au début du XVIIe siècle une maison forte protégée par des fossés et un pont-levis. Ce logis formait une dépendance de la seigneurie de Hautemoure à Saint-Simon et relevait de l'abbaye de Bassac. Il fut acquis, au XVIIe siècle, par François Aigron de Combizan, vice sénéchal d'Aunis, Saintonge et Angoumois, dont la fille, Françoise, épousa, le 27 août 1647, Louis Bernard, écuyer, conseiller du roi et lieutenant particulier au présidial d'Angoulême. Par contrat du 5 mars 1715, les héritiers de Louis Bernard vendirent La Font à Pierre Navarre, sieur de Boisderet, maître de poste à Villars-Marange, qui ne conserva pas longtemps cette terre : il la revendit dès le 5 août 1718 à Jean Fé de Ségeville, écuyer, conseiller du roi et lieutenant général au siège de Cognac. La petite-fille de ce dernier, Louise Marie-Anne Catherine Fé, épousa le 10 août 1773, Jean Philippe André Guillet des Fontenelles, dont la fille Marie Marguerite se maria avec M. Robin de Cognac. Il fut acquis, le 2 Février 1972, par Philippe Marie Joseph Vallantin Dulac. Puis vers 1993, par Yves Poullat. Il fut de nouveau vendu, fin 2001. Aujourd'hui propriété de Philippe Berrini.","architecture":"MERIGNAC LAFONT, le château est une bâtisse rectangulaire de la fin du XVIe siècle, cantonnée de tours rondes, coiffées en poivrières. La porte d'entrée de la façade sur cour, les lucarnes de la toiture et la terrasse bordée de balustres qui donnent sur un jardin à la française sont modernes. Cette demeure a été restauré dans les années 70. Il a été remanié au fil des siècles et forme désormais un corps de logis rectangulaire à un étage couvert de tuiles plates et encadré de quatre tours rondes. Il est ouvert sur une terrasse côté jardin.Le château est entouré de douves en eau que drainent des canaux. Côté jardin,la façade est flanquée de deux tours cylindriques couvertes de poivrières en ardoises, dont l'origine, selon Charles Daras remonterait au XVIIe siècle. Celle-ci on souffert de la \"tempête du siècle\", le 27 décembre1999, et furent restauré à l'identique. Le corps d'habitation,de type rectangulaire, présente une grande sobriété. Sur chaque façade, les lucarnes offrent une alternance de frontons segmentés et triangulaires. Enfin,à proximité, se tiennent les anciennes dépendances dont la date de construction, malgré certaines modifications, est antérieure à celle du château actuel.                             Château de la COURONNE  situé à l'ouest de la commune, ce château a été transformé en hôtel. En 2006, il a été le théâtre du film; Nos jours heureux avec Jean-Paul Rouve.","habitants":"Mérignac                                                                          Lafont  Saint-Hermine\r\n        \r\n        \"","divers":"Mérignac  45° 41' 59\" nord, 0° 04' 45\" ouest Grav 1     Lafont grav  2-3,                                                        Villars grav 4-5-6-7","gps":"","images":["../image/image_16/16_M%c3%a9rignac_16_1.jpg","../image/image_16/16_M%c3%a9rignac_16_2.jpg","../image/image_16/16_M%c3%a9rignac_16_3.jpg","../image/image_16/16_M%c3%a9rignac_16_4.jpg","../image/image_16/16_M%c3%a9rignac_16_5.jpg","../image/image_16/16_M%c3%a9rignac_16_6.jpg","../image/image_16/16_M%c3%a9rignac_16_7.jpg"]},"Consult_chateau_formulaire5a9b":{"id":"Consult_chateau_formulaire5a9b","dept":"16","canton":"Jarnac","commune":"Nanclas Jarnac","nom":"Nanclas_Jarnac","type":"Manoir","periode":"XVI-XVII","histoire":"NANCLAS, La construction du Logis de Nanclas date des XVIe, XVIIe et XVIIIe siècles. La terre de Nanclas appartenait à la famille Laisné, dont le représentant le plus connu a été Isaac Laisné, seigneur de Nanclas, Lieutenant général des armées du roi, mort en 1704. Nanclas passa ensuite dans les mains de la famille Sarlandie puis fut offert en dot par Anne de Sarlandie qui épousa Pierre Arnaud, procureur au siège présidial d'Angoulême.","architecture":"NANCLAS,  est un manoir bâti à Jarnac,  la construction du Logis de Nanclas date des XVIe, XVIIe et XVIIIe siècles. Le corps de logis, le portail et la fuie sont inscrits aux M.H. depuis 1985. Le portail à porte cochère et piétonne ouvre sur une cour et un logis à un étage. La porte est ornée de pilastres. Elle daterait du XVIe siècle et a conservé une bretèche, dans l'angle de sa façade. Le cadran solaire date de 1714. Devant le logis, se trouve une fuie ronde avec 3 lucarnes et d'un toit en poivrière de tuiles plates, marquant la possession d'un droit de justice. Le logis de Nanclas est inscrit aux M.H. depuis 1986. Il est privé et fermé au Public.","habitants":"Famille Laisné\r\n        \"","divers":"Nanclas 45° 41' 21\" Nord, 0° 11' 22\" Ouest","gps":"","images":["../image/image_16/16_Nanclas_Jarnac_1.jpg"]},"Consult_chateau_formulairee36a":{"id":"Consult_chateau_formulairee36a","dept":"16","canton":"Boême-Echelle","commune":"Nanteuil en Vallée","nom":"Nanteuil_Vallée","type":"Château","periode":"XIV-XVII","histoire":"NANTEUIL, la construction du Logis de Nanteuil date du XIVe au XVIIe siècle. Le fief, qui relevait de l'évêque d'Angoulême, qui comme celle de Sers, relevait pour moitié de l'évêché d'Angoulême et de l'autre de la baronnie de Marthon est attesté en 1427 par l'hommage de Jean de La Mare et Marguerite Chauvin sa femme. Il appartint pendant plusieurs siècles à la famille de La Garde. François de La Garde était seigneur de Nanteuil en 1648. Peu avant la Révolution, François Desbordes, déjà possesseur de la seigneurie de Sers, acquit ce domaine, vendu par les frères Cazeau, ruinés, qui en avaient hérité. Le château changera souvent de propriétaires ce qui sera l'occasion de profondes transformations en particulier aux XVIIe et XIXe siècles. Le logis, y compris la salle basse et la fuie au sud du château ont été inscrits au M.H. 14 avril 1997.","architecture":"NANTEUIL, est un logis bati à Sers  de style Médiéval, la construction  date du XIVe au XVIIe siècle, il domine la vallée de l'Échelle. Le premier édifice, dont l'origine pourrait remonter au XIVe siècle, occupait la partie ouest, correspondant à la salle voûtée. Son agrandissement vers l'est pourrait dater de la fin du XVIe ou du début du XVIIe siècle (édification du crénelage fantaisie sur le logis pour dissimuler les deux toitures). L'entrée de la propriété est inscrite dans un mur d'enceinte reconstitué au  XIXe siècle, cantonné de deux tours rondes et basses et couronnées d'un parapet crénelé sur consoles de mâchicoulis. Il est composé d'une salle basse, d'une salle voûtée intérieure, au sous-sol de sa partie occidentale qui remonterait, au XIVe siècle. L'intérieur du logis a été réaménagé au XIXe siècle, il est couronné d'un crénelage qui date du XVIe siècle. Le Logis de Nanteuil, y compris la salle basse et la fuie qui est le pigeonnier, au Sud du château, ont été inscrits aux M.H. le 14/04/1997. Le Logis de Nanteuil est privé et fermé au public.","habitants":"Nanteuil Famille de La Garde                                     \r\n        \"","divers":"Nanteuil : 45° 35' 40\" Nord, 0° 18' 13\" Est","gps":"","images":["../image/image_16/16_Nanteuil_Vall%c3%a9e_1.jpg","../image/image_16/16_Nanteuil_Vall%c3%a9e_2.jpg"]},"Consult_chateau_formulaire6a7d":{"id":"Consult_chateau_formulaire6a7d","dept":"16","canton":"La Couronne","commune":"Nersac","nom":"Nersac","type":"Forteresse","periode":"XVI","histoire":"Deux châteaux à Nersac celui de Fleurac( voir article) et Foucaudie.                                                       FOUCAUDIE, on sait seulement qu'au XVIIe siècle, Étienne de Lubersac, qui avaient ses ancêtres à Lubersac près de Brives, seigneurs d'une terre considérable, possédait la Foucaudie, seigneurie de Nersac dont le fief dépendait alors de l'abbaye de Saint-Cybard. En 1743, Louis de Lubersac, chevalier, seigneur de l'Herse et de la Foucaudie, vend la terre de Nersac, et celle-ci passe entre plusieurs mains jusqu'en 1798 où la Foucaudie est acquise par Jean Marie du Tillet de Boisbedeuil. Elles sont l'uvre de Jean-Louis de Lubersac. Au XVIIIe siècle, le château est possédé par François de Lubersac. La Foucaudie est depuis 1952 l'hôtel de ville de Nersac, et il comprend aussi la poste. \r\nMOULINS de Fleurac  au pied du château du même nom, est à l'origine un moulin à blé et à huile du XVIe siècle. Il a été presque entièrement reconstruit à la fin du XIXe siècle, transformé en 1978 en moulin à papier, puis acheté en 1983 par le Conseil général de la Charente et transformé en musée à papier.","architecture":"FAUCAUDIE a été construit au XVIe siècle. La Foucaudie a conservé une courtine du XVIIIe siècle encadrée de deux tourelles. La façade ouest comporte deux tourelles carrées, l'une datant du XVIe siècle, portant échauguette, crénelage de fantaisie et trous de mousquets, et l'autre copiée au XIXe siècle. Elles encadrent une terrasse reposant sur des arcades et accessible par un bel escalier monumental également du XIXe siècle. Les deux tourelles extérieures, datant du XVIIe siècle, sont rondes et couvertes de poivrières. Elles sont l'uvre de Jean-Louis de Lubersac. Leurs murs sont percés de meurtrières et de bouches à feu.\r\nMoulins de Fleurac ; de plan rectangulaire à trois niveaux toit en croupe.  Le matériel de fabrication et la roue hydraulique ont été reconstruits selon les planches de l'Encyclopédie. Il est inscrit aux M.H. depuis 1984.","habitants":"Famille des Lubersac\r\n        \"","divers":"Nersac 45° 44' 32\" nord, 0° 04' 45\" est grav de1 à 6 Moulins grav 7","gps":"","images":["../image/image_16/16_Nersac_1.jpg","../image/image_16/16_Nersac_2.jpg","../image/image_16/16_Nersac_3.jpg","../image/image_16/16_Nersac_4.jpg","../image/image_16/16_Nersac_5.jpg","../image/image_16/16_Nersac_6.jpg","../image/image_16/16_Nersac_7.jpg"]},"Consult_chateau_formulairec01e":{"id":"Consult_chateau_formulairec01e","dept":"16","canton":"Charente-Bonnieure","commune":"Nieuil","nom":"Nieuil_16","type":"Château","periode":"XVI-XVIII","histoire":"NIEUIL, un premier château fut construit à l'époque de François Ier qui possédait un relais de chasse. Le premier seigneur connu était, en 1467, Bernon Jaubert, écuyer. Puis entre le XVIe et le XVIIIe siècle, le château appartient aux Green de Saint-Marsault, jusqu'au mariage de Suzanne Green, Dame de Nieuil, en 1724, avec Jean Perry, chevalier et seigneur de Montmoreau. Entre 1724 et la Révolution, le château de Nieuil appartient aux Perry. En 1883, le comte Guillaume-Guy de Dampierre (1849-1906) achètera la terre de Nieuil et fera, entièrement, construire le château actuel avec l'aide de l'architecte charentais Alexandre Mignon. Guy de Dampierre y a fit pousser, en 1900, le vignoble de la Brénanchie, connu localement. En 1937, il fit partie des premiers châteaux de France, transformés en hôtels, par la famille Fougerat, grands-parents des propriétaires Luce et Jean-Michel Bodinaud. Le plan de l'ancien château est conservé par le cadastre de 1818. Ses propriétaires actuels sont Mr et Mme Bodinaud.","architecture":"NIEUIL, le plan de l'ancien château est conservé par le cadastre de 1818, belles façades Renaissance, grosses tours rondes entourant le corps de logis, douves en eau, jardin à la française, il avait deux ailes en retour d'équerre, et était entouré de bassins comme le château actuel. Une tour ronde crénelée subsiste au nord. L'architecture du château actuel est du XIXe siècle il est en pierre calcaire blanche, aux toits pentus couverts d'ardoise. Il est entouré d'un bassin à trois côtés, au nord, à l'ouest et au sud, est inscrit  au M.H. depuis 2014.","habitants":"Famille des  Green de Saint-Marsault\r\n        \"","divers":"Nieuil 45° 52' 51\" Nord et 0° 31' 15\" Est","gps":"","images":["../image/image_16/16_Nieuil_16_1.jpg","../image/image_16/16_Nieuil_16_2.jpg","../image/image_16/16_Nieuil_16_3.jpg","../image/image_16/16_Nieuil_16_4.jpg","../image/image_16/16_Nieuil_16_5.jpg"]},"Consult_chateau_formulaireb144":{"id":"Consult_chateau_formulaireb144","dept":"16","canton":"La Couronne","commune":"La Couronne","nom":"Oisellerie","type":"Château","periode":"XV-XVI","histoire":"OISELLERIE, bâti à la Couronne,ainsi nommé serait une ancienne fauconnerie, appartenant au abbés de La Couronne. En 1498, ce fief appartenait à Arnault Calluau, procureur général du comte d'Angoulême, qui fit construire une grande partie du logis actuel, ainsi que son fils Jean, évêque de Senlis. En 1526, François Ier de retour d'Espagne où il était prisonnier, vint se reposer en Angoumois et séjourna dans le château de l'Oisellerie où, au cours d'une chasse au cerf, il se cassa le bras. En 1678, le Château de l'Oisellerie appartiendra à Jean de Tiers, seigneur de La Rochette, puis en 1691 à François Maulde, conseiller au Présidial d'Angoulême. En 1989, le château de l'Oisellerie est racheté, par le conseil général de la Charente. Au début du XXe siècle, s'installe l'école d'agriculture puis la demeure est transformée en lycée agricole.","architecture":"OISELLERIE, le premier château qui constitue une des ailes est un bâtiment à étage, au toit pentu recouvert de tuiles plates ; une tourelle carrée qui contient l'escalier à vis présente des créneaux plus tardifs. Deux tourelles forment les angles de la cour primitive ; elles ont retrouvé leurs toits à poivrière et l'une est prise dans les communs. Un pavillon carré a été construit plus tard entre la tourelle carrée et le pignon sud. La grande aile nord, la grosse tour cylindrique et le pavillon rectangulaire sont du milieu du XVIe siècle. Certains des toits sont couverts de tuiles plates, d'autres d'ardoises. Le portail d'entrée présente une porte piétonne et une porte cavalière surmontées de merlons et de créneaux. Le corps de logis est situé dans la cour. Le cadran solaire, datant du XVIIe ou XVIIIIe siècle, fait lobjet dun classement au titre objet des M.H.","habitants":"Famille d'Arnault Calluau\r\n        \"","divers":"Oisellerie: 45° 37' 30\" Nord et 0° 06' 15\" Est","gps":"","images":["../image/image_16/16_Oisellerie_1.jpg","../image/image_16/16_Oisellerie_2.jpg","../image/image_16/16_Oisellerie_3.jpg","../image/image_16/16_Oisellerie_4.jpg","../image/image_16/16_Oisellerie_5.jpg","../image/image_16/16_Oisellerie_6.jpg"]},"Consult_chateau_formulaireb125":{"id":"Consult_chateau_formulaireb125","dept":"16","canton":"Charente-Bonnieure","commune":"Les-Pins","nom":"Pins_16","type":"Forteresse","periode":"XV-XVI","histoire":"PINS, il n'existe que peu d'archives. Un litige sur le droit de justice aurait opposé le seigneur des Pins et les augustins du couvent de Mortemart. La famille Viroulaud de Marillac aurait construit le château placé à la frontière entre les possessions anglaises et françaises durant la guerre de cent ans. Un litige sur le droit de justice aurait opposé le seigneur des Pins et les Augustins du Couvent de Mortemart. C'est en 1643, que François Viroulaud de Marrillac, qui s'opposait au roi, mourut durant la fronde, et fut décapité. La seigneurie des Pins fut rachetée, en 1626, par René de Devezeau. Puis, ce fut le curé de Saint-Mary René Merceron qui rachèta le château des Pins à la Révolution, et devint maire des Pins, en 1840.","architecture":"PINS, le donjon carré à trois étages et couronné de mâchicoulis se caractérie par la blancheur de sa pierre calcaire. Il se compose d'une grande pièce à chaque étage. L'entrée comportait un pont-levis qui a disparu. Une tourelle d'angle et une petite tourelle d'escalier qui remplace une tour d'escalier écroulée complètent les constructions. Il est inscrit aux M.H. depuis le 3 avril 1958.","habitants":"famille Viroulaud de Marillac \r\n        \"","divers":"Pins   45° 49' 14,88\" Nord et 0° 23' 26,16\" Est               Les Pins  45° 49' 15? nord, 0° 23' 26? est2","gps":"","images":["../image/image_16/16_Pins_16_1.jpg","../image/image_16/16_Pins_16_2.jpg","../image/image_16/16_Pins_16_3.jpg"]},"Consult_chateau_formulaire57b4":{"id":"Consult_chateau_formulaire57b4","dept":"16","canton":"Cognac","commune":"Saint-Sulpice-de-Cognac","nom":"Plessis_16","type":"Château","periode":"XIX","histoire":"COULONGES, le fief de Coulonges est attesté dès le XVIe siècle. Ce fief a appartenu à cette époque aux Montalembert, puis par mariage en 1653 aux de Curzay, seigneurs de Boisbertaud (dans la paroisse de Rouillac), jusquen 1737 où il est passé aux mains de Charles Tizon, chevalier.                                             PLESSIS, Le fief de Coulonges est attesté dès le XVIe siècle. Ce fief a appartenu à cette époque aux Montalembert, puis par mariage en 1653 aux de Curzay, seigneurs de Boisbertaud (dans la paroisse de Rouillac), jusqu'en 1737 où il est passé aux mains de Charles Tizon, chevalier.  L'autre fief important de la paroisse était Vaujompe. Il a appartenu à la famille de Régnier, noble depuis 1545, puis est passé à la famille de Badiffe.  Camus nen revendique pas moins sa gestion familiale, le président actuel, Cyril Camus, né en 1971, incarnant la cinquième génération aux manettes. Cest dans la demeure de prestige des propriétaires, le château du Plessis à Saint-Sulpice-de-Cognac, que lentreprise a choisi de convier ses hôtes.","architecture":"COULONGES, le bâtiment comprend trois niveaux. Rez-de-chaussée et premier étage sont éclairés par de grandes baies couvertes en arc segmentaire, et létage à surcroît par des oculi ovales. La porte est cantonnée de deux pilastres nus amortis par des chapiteaux ioniques supportant un entablement droit mouluré. On y lit la date de 1766. La clé de la plate-bande est ornée dune tête. Lintérieur conserve une fontaine ornée dune tête entre deux rameaux. La niche au-dessus, couverte en anse de panier, est cantonnée de deux pilastres et surmontée dun fronton triangulaire interrompu par une coquille Saint-Jacques.         PLESSIS, le corps de logis en façade de plan rectangulaire à deux niveaux flanqué aux angles  d'une tour polygonale  toit plat crénelée  et à l'opposé d'une tour ronde toit en poivrière. Prolongement des dépendances sur l'arrière, côté cour à deux niveaux toits à deux pans.","habitants":"Famille de  Badiffe\r\n        \"","divers":"St-Sulpice de Cognac  45° 45' 38\" nord, 0° 22' 51\" ouest                                                                        Coulonges grav-5","gps":"","images":["../image/image_16/16_Plessis_16_1.jpg","../image/image_16/16_Plessis_16_2.jpg","../image/image_16/16_Plessis_16_3.jpg","../image/image_16/16_Plessis_16_4.jpg","../image/image_16/16_Plessis_16_5.jpg"]},"Consult_chateau_formulaire101d":{"id":"Consult_chateau_formulaire101d","dept":"16","canton":"Boixe-et-Manslois","commune":"Vars","nom":"Portal_Vars","type":"Château","periode":"XV","histoire":"PORTAL, dès les premiers temps du Moyen Âge, la terre de Vars appartenait aux évêques d'Angoulême. En 1110, une bulle du pape Pascal II, relative au partage des terres entre l'évêque et les chanoines, attribua l'église de Vars à la mense épiscopale. L'évêque Girard accrut ce domaine et y construisit un château avec murailles et douves. Malgré ces précautions, vers la fin du XIIe siècle, le propre fils du comte d'Angoulême, Vulgrin II, à la tête d'une bande de cottereaux, ravagea ces terres. Mais c'est pendant la guerre de cent ans que Vars eut le plus à souffrir. Le château, construit sur une île à côté du bourg, fut pris par les Anglais en 1421. Repris trois ans après, il fut rasé sur ordre du roi de France, de peur qu'il soit de nouveau repris. Vers la fin du XVe siècle, Vars s'était relevé de ses ruines. Le château fut rebâti, probablement par l'évêque Raoul du Fou, qui le munit de créneaux. Dans la seconde moitié du XVIe siècle, l'évêque François de Péricard en fit une demeure de plaisance, où les évêques venaient passer une partie de l'été.","architecture":"PORTAL, le château fut rebâti, probablement, munit de créneaux. Dans la seconde moitié du XVIe siècle se  fut une demeure de plaisance, où les évêques venaient passer une partie de l'été. Cette demeure existe encore, privée et située entre la Charente et l'église. De plan oblong à deux niveaux toit en croupe.","habitants":"évêque Raoul du Fou\r\n        \r\n        \"","divers":"","gps":"","images":["../image/image_16/16_Portal_Vars_1.jpg","../image/image_16/16_Portal_Vars_2.jpg","../image/image_16/16_Portal_Vars_3.jpg","../image/image_16/16_Portal_Vars_4.jpg"]},"Consult_chateau_formulaire47ef":{"id":"Consult_chateau_formulaire47ef","dept":"16","canton":"Gond-Pontouvre","commune":"Saint-Yrieix sur Charente","nom":"Pouyade(la)","type":"Château","periode":"XIX","histoire":"La POUYADE, le château de la Pouyade a été construit en 1870 sur une ancienne maison noble. Il appartenait au début du XXe siècle à un riche négociant bordelais. Pendant la seconde guerre mondiale, il a été occupé par les Allemands. À la fin de la guerre il a été confisqué et vendu à la communauté des « Surs apostoliques du Bon Pasteur », dont les bâtiments de la rue de Paris à Angoulême avaient été détruits par les bombardements. En 1990, l'institution cessa son activité et le château fut transformé en résidence hôtelière et centre de séminaires.","architecture":"POUYADE, le château de la Pouyade. Comme son nom l'indique (vieil occitan pujada : côte), il est situé au sommet d'une côte dominant la Charente, en fait la rive concave. L'ancienne maison noble a disparu pour laisser place à un château édifié au XVIIIe siècle. Actuellement, c'est le Bon Pasteur, centre social et de séminaires. Grande demeure du milieu du XIXe siècle, le château de la Pouyade est idéalement situé à 10 minutes dAngoulême, ville de festivals et capitale mondiale de la Bande Dessinée et de limage.  Cest lendroit idéal pour vos séjours, réceptions, événements professionnels ou privés.","habitants":"Industriel Henk Paerel\r\n        \"","divers":"45° 40' 33\" nord, 0° 07' 41\" est","gps":"","images":["../image/image_16/16_Pouyade(la)_1.jpg","../image/image_16/16_Pouyade(la)_2.jpg","../image/image_16/16_Pouyade(la)_3.jpg","../image/image_16/16_Pouyade(la)_4.jpg"]},"Consult_chateau_formulaire7d55":{"id":"Consult_chateau_formulaire7d55","dept":"16","canton":"Charente-Vienne","commune":"Ambernac","nom":"Praisnaud","type":"Château","periode":"XVI","histoire":"PRAISNAUD, demeure de la famille Babaud, est mentionné au XVIe siècle. L'arc d'entrée est daté 1777. L'ensemble des bâtiments, logis, tour, grange, cour, communs ont été inscrits monument historique le 26 octobre 2004. Il possède une imposante fuie ronde, signe que le seigneur du lieu avait droit de haute et basse justice.  En 1935, le château était acheté par le comédien Noël-Noël, dont l'épouse était originaire d'Ambernac, et qui l'a restauré.","architecture":"PRAISNAUD  se compose d'un logis rectangulaire à deux niveaux et lucarnes sur un toit brisé, flanqué de deux tours en diagonale, surmontées de toits coniques. La tour ouest serait un vestige d'une construction du XVIe siècle alors que la tour est datée du XIXe siècle. Les toitures sont en tuiles plates.","habitants":"Famille Babaud\r\n        \"","divers":"Praisnaud 5° 59' 12\" nord, 0° 34' 23\" est","gps":"","images":["../image/image_16/16_Praisnaud_1.jpg","../image/image_16/16_Praisnaud_2.jpg","../image/image_16/16_Praisnaud_3.jpg"]},"Consult_chateau_formulaire9e25-2":{"id":"Consult_chateau_formulaire9e25-2","dept":"16","canton":"Charente-Bonnieure","commune":"Pranzac","nom":"Pranzac","type":"Vestiges","periode":"XV","histoire":"PRANZAC, le château de Pranzac date du XVe siècle. Il ne fut jamais un fief titré, mais dépendait de la châtellenie de La Rochefoucauld.  En 1666, Alexandre Redon, marquis de Pranzac, en était propriétaire. En 1682, sa fille, Marie-Barbe-Françoise Dreux Redon de Salens, épouse François de Pérusse, comte des Cars et de Saint-Bonnet. C'est en ce lieu que Louis-François, dernier comte des Cars devenu marquis, adoptera la devise « Fais ce que dois, advienne que pourra ».  Les comtes des Cars possédaient aussi le logis de Chez Monot (de l'autre côté du Bandiat), qui était la métairie du château.  À la Révolution, le comte des Cars émigra et ses biens furent vendus comme biens nationaux. Le château fut abandonné et ruiné.","architecture":"PRANZAC, seuls subsistent les vestiges de deux tours découronnées de la fin du XVe siècle, reliées par un mur. L'une fait 16 mètres, l'autre 10 mètres de haut.  Les caves présentant de trop grands dangers pour les riverains ont été remblayées. Le château inclut chez certains auteurs le logis attenant qui date du XVIe siècle et qui possède une tourelle dont les créneaux sont ornés de coquilles. En 2018, les vestiges de ce modeste château ne sont ni inscrits, ni classés M.H., et ni le château, ni le logis attenant ne sont décrits dans la base patrimoniale Mérimée.","habitants":"Famille de Alexandre Redon\r\n        \"","divers":"Pranzac 45° 40' 16\" nord, 0° 21' 04\" est1","gps":"","images":["../image/image_16/16_Pranzac_1.jpg","../image/image_16/16_Pranzac_2.jpg","../image/image_16/16_Pranzac_3.jpg","../image/image_16/16_Pranzac_4.jpg","../image/image_16/16_Pranzac_5.jpg","../image/image_16/16_Pranzac_6.jpg"]},"Consult_chateau_formulaire24e7":{"id":"Consult_chateau_formulaire24e7","dept":"16","canton":"Charente-Vienne","commune":"Saint-Quentin sur Charente","nom":"Pressac","type":"Château","periode":"XIII-XIV","histoire":"PRESSAC, au XIe siècle, le fief de Pressac appartient à dame Barbe Galiène  qui l'apporte en mariage à un cadet de la maison de Montesquiou, Louis-Guillaume de Fezensac. Leurs descendants y restèrent jusqu'au XVIe siècle. C'était une des quatre seigneuries qui dépendaient de la principauté de Chabanais et des seigneurs de Confolens. Au milieu du XIVe siècle, lors de la guerre de cent ans, comme le seigneur avait pris position pour le roi de France, le château est brûlé par les Anglais, et son seigneur se réfugie dans son château du Moulin Paute, à Videix. Le château est resté en ruines jusqu'en 1543, date à laquelle le prince de Chabanais autorise Anne (Caillou) de Pressac et son mari Jean de Singarreau à le reconstruire. D'importants aménagements sont alors réalisés. En 1613, le château passe par mariage de la famille de Singarreau et celle d'Abzac. En 1627, on trouve un aveu et hommage de Raymond d'Abzac à Adrien de Montluc, prince de Chabanais. Les Abzac réalisent d'autres travaux, et construisent les terrasses. En 1779, le château est vendu pour cause de dettes à Léonard Peyroche, un marchand de Limoges. Il fait partie des plus grosses fortunes de la Charente et il est sera le premier maire de Saint-Quentin, entre 1808 et 1813. Sans héritier direct, il assure sa nièce Maria Anne Peyroche de la propriété ; celle-ci se marie en 1815 avec le baron de la Bastide. Paul de la Bastide, capitaine, réside dans le château. Son fils, le commandant de la Bastide (1866-1957), loge dans le château et abrite pendant la seconde guerre mondiale les hommes du colonel Bernard, avec le maquis FTP de la région de Chabanais. C'est la famille de la Bastide qui possède Pressac jusqu'à aujourd'hui.","architecture":"PRESSAC,  autrefois  ne comprenait que les deux tours nord. Le corps de logis les reliant a été construit au XIVe siècle,le château du XIIIe siècle   et en 1850, le logis principal est restauré,  possède un corps de logis principal dont la façade est orientée à l'est avec deux ailes en retour d'équerre. Il possède une tour à chaque angles. L'ensemble est sur une importante terrasse avec pelouse dominant le paysage à l'est et au nord. La cour d'honneur, orientée à l'ouest, est prolongée par une bordure de bâtiments communs, avec l'entrée et le chemin d'accès au château. Les tours sont coiffées en poivrière. L'imposant corps de logis possède trois étages dont un sous mansarde et toit pentu couvert en tuiles plates. Les lucarnes, à la base du toit, ont des linteaux décorés. L'aile en retour nord comprend un haut pavillon à toit à quatre pans. Les tours de la façade principale, à l'est, ont un diamètre légèrement supérieur à celles de la cour d'honneur, à l'ouest.","habitants":"Famille de Jean de Singarreau\r\n        \"","divers":"Pressac 45° 51' 14\" nord, 0° 39' 47\" est1","gps":"","images":["../image/image_16/16_Pressac_1.jpg","../image/image_16/16_Pressac_2.jpg","../image/image_16/16_Pressac_3.jpg","../image/image_16/16_Pressac_4.jpg","../image/image_16/16_Pressac_5.jpg"]},"Consult_chateau_formulaire0de0":{"id":"Consult_chateau_formulaire0de0","dept":"16","canton":"Charente-Bonnieure","commune":"Saint-Coutant","nom":"Puybautier","type":"Château","periode":"XV- XVI","histoire":"PUYBAUTIER, dès le XVe siècle, on trouve des traces des seigneurs de Puybautier. Le plus célèbre est François Charles Gabriel Prévost Sansac de Lavauzelle, franc-maçon, qui sous la Révolution est membre du directoire du district de Confolens, puis du département.","architecture":"PUYBAUTIER, du manoir du XVIe siècle ne subsiste qu'une tour ronde isolée, coiffée d'une poivrière recouverte de tuiles plates.  Le logis, centré par un fronton triangulaire, est encadré de deux pavillons mansardés prolongés de communs. Il est doté d'un étage percé de fenêtres rectangulaires et il est recouvert d'un toit de tuiles mansardé,  alors que l'aile des communs n'a pas d'étage et que son toit mansardé est recouvert d'ardoises avec série de lucarnes.","habitants":"François Charles Gabriel Prévost Sansac de Lavauzelle\r\n        \"","divers":"Puybautier 46° 00' 34\" nord, 0° 25' 09\" est2","gps":"","images":["../image/image_16/16_Puybautier_1.jpg","../image/image_16/16_Puybautier_2.jpg","../image/image_16/16_Puybautier_3.jpg","../image/image_16/16_Puybautier_4.jpg"]},"Consult_chateau_formulaire2696":{"id":"Consult_chateau_formulaire2696","dept":"16","canton":"Val-de-Tardoire","commune":"Rancogne","nom":"Rancogne","type":"Château","periode":"XV-XVI","histoire":"Trois château à Rancogne celui de Rancogne  de tuffas et  la tour de Cresseic.                          RANCOGNE, à la Renaissance, le seigneur de l'époque a voulu construire un nouveau château plus spacieux. C'est ainsi que Jean Maindron (ou Mandron), seigneur de Cressiec, et Marie Raymond, son épouse, firent construire le logis d'habitation du château actuel, sur une basse plateforme dominant la Tardoire, vers 1519, avec galeries extérieures en bois. Des pierres de l'ancien château ont été réemployées. Le donjon et le reste du château ont été bâtis à la fin du XVIe siècle (1569 le donjon). En 1548, leur fille, Jeanne Maindron, épouse Jean de Devezeau, écuyer, seigneur de Chillac. Les Devezeau seront seigneurs de Rancougne jusqu'après la Révolution, en 1797, date à laquelle le château est cédé à Jean-Baptiste Binet, beau-père de Joseph Gabriel de Barbarin. Le château restera aux Barbarin pendant quatre générations, qui effectueront des travaux d'entretien. Le mur nord-est face à la Tardoire, qui était aveugle, est alors percé d'ouvertures. En 1898, le domaine passe à la famille Desormeaux, qui le possède encore aujourd'hui. Au XXe siècle, d'importants travaux de restauration ont été effectués : suppression du crépi, dégagement du donjon des autres bâtiments. \r\nTUFFAS, Ilona Gervais est gérant d'une sci.","architecture":"RANGOGNE, formé de quatre corps de bâtiment disposés  autour d'une tour carrée, situé à l'angle ouest, le portail d'entrée est percé dans un pavillon accosté de deux tourelles munies de meurtrières. Les bâtiments s'organisent en un quadrilataire presque complet marqué de deux tours rondes aux angles nord et sud et du donjon rectangulaire daté de 1588, à l'angle Est. Le donjon est surmonté d'une échauguette. Une troisième tour ronde est située dans l'angle nord de la cour. Une courtine récente avec galerie relie le donjon au corps de logis. La galerie en bois, rare en Angoumois, date du début du XVIe siècle. Une fuie ronde de seigneur haut-justicier est située à l'écart et au nord des autres constructions. \r\nLa tour de CRESSIEC, cachée dans la végétation à flanc de coteau entre l'église et le château, est une tour en demi-lune, défendant l'entrée des grottes et de vastes souterrains rejoignant l'église. Elle est le seul vestige de l'ancien château, et elle appartient encore foncièrement au château actuel. \r\nDéjà dès le XVIe siècle, seule cette tour subsistait du château du IXe siècle.\r\nTUFFAS,  la construction du Logis des Tuffas date du XVIe siècle. Il possède un corps de logis et une tour ronde à bretèche du XVIIe siècle. Des pavillons rectangulaires en saillie encadrent le logis principal.","habitants":"Famille de  Jean Maindron\r\n        \"","divers":"Rancogne 45° 41' 45\" nord, 0° 24' 24\" est1     grav de 1 à 5                                                                                  Tuffas  :  46° 06' 14\" Nord, 0° 42' 18\" Est grav de 6à 7  De Ruelle grav 8","gps":"","images":["../image/image_16/16_Rancogne_1.jpg","../image/image_16/16_Rancogne_2.jpg","../image/image_16/16_Rancogne_3.jpg","../image/image_16/16_Rancogne_4.jpg","../image/image_16/16_Rancogne_5.jpg","../image/image_16/16_Rancogne_6.jpg","../image/image_16/16_Rancogne_7.jpg","../image/image_16/16_Rancogne_8.jpg"]},"Consult_chateau_formulairedc3b":{"id":"Consult_chateau_formulairedc3b","dept":"16","canton":"Montemboeuf","commune":"Lézignac-Durand","nom":"Redortière","type":"Château","periode":"XVII","histoire":"REDORTIERE, chambres d'hôtes de Marie-Paule Michaud","architecture":"REDORTIERE, manoir du XIXe siècle domine la vallée de la Moulde, de plan rectangulaire à deux niveaux  série de lucarnes gothique sur toit à deux pans très incliné couvert d'ardoises , accolé sur la gauche d'un pavillon de même niveau avec lanternon sur le toit  lucarne gothique et flanqué en façade d'un pavillon hors-oeuvre polygonal à deux niveaux vitré, sur la partie central porche d'entrée sur colonnes.","habitants":"Marie-Paule Michaud\r\n        \"","divers":"","gps":"","images":["../image/image_16/16_Redorti%c3%a8re_1.jpg","../image/image_16/16_Redorti%c3%a8re_2.jpg","../image/image_16/16_Redorti%c3%a8re_3.jpg","../image/image_16/16_Redorti%c3%a8re_4.jpg","../image/image_16/16_Redorti%c3%a8re_5.jpg","../image/image_16/16_Redorti%c3%a8re_6.jpg"]},"Consult_chateau_formulaire475a":{"id":"Consult_chateau_formulaire475a","dept":"16","canton":"Val-de-Tardoire","commune":"Rivières","nom":"Riberolles","type":"Château","periode":"XV","histoire":"RIBEROLLES, en 1260 une charte du comte d'Angoulême Hugues X le Brun mentionne le fief de Ribérolles situé au bord de la Tardoire, et accorde à ses seigneurs le droit de glandée dans la forêt de la Braconne. Ce fief dépendait de la baronnie de La Rochefoucauld et du comté d'Angoulême. \r\nAux XIVe et XVe siècles, le domaine appartient à une famille Vigier, puis jusqu'en 1633 à la famille Raymond , écuyer, seigneurs de Ribérolles, Mazottes et de la Gaudinière. Le fief est alors vendu à François de Guitard, écuyer, seigneur de La Borie et de Villejoubert, en Limousin. La famille de Guitard est alors constamment associée aux de Croizant , chevaliers, seigneurs de Rivières. Le domaine de Ribérolles va appartenir à la famille de Guitard du XVIIe au XXe siècle. La famille de Causans qui lui fut alliée lui succédera au XXe siècle, après la mort de la baronne de Guitard en 1948. Le domaine sera vendu à la fin des années 1980, puis changera plusieurs fois de propriétaire. Un premier château construit au XVe siècle dont seuls subsistent la fuie et une porte latérale fut remplacé au XVIIIe siècle par la demeure actuelle. Le corps central et son aile droite furent achevés en 1786, d'après les dates inscrites sur les frontons. L'aile gauche fut construite en 1811.  En 1914, la baronne de Ribérolles épousa Mr de Causans. Début des années 90,  Mr de Causans cèda cette demeure à Mr Guillaume. Depuis, elle appartient à Mr et Mme George. Elle figure sur la liste des M.H.  depuis 2010.","architecture":"RIBEROLLES, il comporte un corps de logis central à un étage, flanqué de deux ailes dans son alignement possédant un seul rez-de-chaussée. Le sous-sol comprend trois caves voûtées. \r\nL'imposante fuie au nord du château date du XVe siècle. Coiffée d'un toit conique et pavée, elle comprend dix rangée de boulins.  Dans le muret séparant le château de la métairie s'ouvre une porte datant aussi du XVe ou XVIe siècle avec une arcade « gothique » Renaissance et le blason des de Guitard : un agneau passant. La partie centrale et l'aile droite du château ont été bâties en 1786, l'aile gauche en 1818. Ils'agit d'une demeure néo-classique à deux niveaux de baies et couverte d'une  toiture d'ardoise. Les dispositions intérieures ont été préservées comme en témoignent le décor rocaille des boiseries et les ferronneries du XVIIIe siècle, auxquelles sont venues s'ajouter des cheminées et des peintures sous  la restauration ainsi que des sols en tapisserie de carreaux ciment à la fin  du XIXe siècle. Hormis le colombier restauré, une porte moulurée à accolade du XVe siècle a été préservée et remontée dans le mur séparant le château de la métairie. Les granges, les écuries, les remises et les dépendances fermières furent construites au milieu du XIXe siècle.","habitants":"Famille Vigier\r\n        \"","divers":"Riberolles 45° 45' 40\" nord, 0° 21' 26\" est","gps":"","images":["../image/image_16/16_Riberolles_1.jpg","../image/image_16/16_Riberolles_2.jpg","../image/image_16/16_Riberolles_3.jpg"]},"Consult_chateau_formulaire3f8f":{"id":"Consult_chateau_formulaire3f8f","dept":"16","canton":"Boéme-Echelle","commune":"Moutiers sur Bohême","nom":"Rochandry","type":"Château","periode":"XV-XIX","histoire":"ROCHANDRY, l'existence des seigneurs de la Rochandry n'est pas attestée avant mais il est vraisemblable que c'est Chanderic, le seigneur de Saintes en guerre contre le comte d'Angoulême, qui au IXe siècle, aurait édifié la première châtellenie en construisant le château primitif sur le rocher où se trouve le château actuel, d'où le nom de La Roche Chandéric, devenu La Roche-Chandry, puis La Rochandry ou Rochandry, formant ainsi les « quatre Roches de l'Angoumois », avec La Rochefoucauld, La Rochebeaucourt et Rocheraud. Pendant la guerre de Cent Ans le château fut l'objet de grandes convoitises entre les Anglais et les Français. Il fut pris et repris et en 1387 par Louis de Sancerre, maréchal de France en chasse les Anglais et ordonne sa démolition, mais les Anglais le reprennent, puis en sont à nouveau chassés en 1416 par le seigneur de Barbazan, capitaine de Charles VII qui le fait démolir. Jean de La Rochandry le reconstruit au XVe siècle puis il passe aux Saint-Gelais en 1445, aux Tison d'Argence et, vers 1580, aux Forgues de Lavedan qui le rénovent entre 1613 et 1616 en château Renaissance. Le château est vendu en 1681 à Étienne Chérade, comte de Montbron. Sa fille Marguerite épousa en 1721 Jacques Louis Le Musnier, seigneur de Lartige. Leur fils, plus connu sous le nom de M. de Raix, fut lieutenant-général en 1746 et conserva le château jusqu'à la Révolution. En 1766, Marguerite Chérade, dame de Rouffiac, le fait découvrir et fait abattre une partie des murs. Au début du XIXe, en 1814,  le château est racheté par Lacourade.     En 1850 le banquier Servant, d'Angoulême, achète ce qui reste du château, le fait recontruire en 1852 tel qu'il est de nos jours.","architecture":"ROCHANDRY, la baronnie  dépendait de l'évêché d'Angoulême.  En 1781 le logis de Forge est acheté par Bernard Sazerac, faïencier et maître de forges, qui devient vassal du baron de La Rochandry. Il fonde une papeterie à Forge où, vers 1830, on fabriquait du papier de grande qualité dont celui de certains billets de banque des tsars de Russie. En 1850 le banquier Servant, d'Angoulême, achète le restant des ruines et fait construire le château actuel.  Cependant, en 1845 on distinguait encore les différentes époques de la contruction de l'édifice comme le montre une lithographie publiée à l'époque par Paul Sazerac de Forge : au centre des ruines se remarquent les pignons aigus du logis du XVe siècle, une fenêtre à meneaux, deux tourelles à encorbellement et, sur la gauche, des fenêtres à fronton et un parapet crénelé. Au pied du château apparaissent deux tours rondes, restes de la forteresse médiévale. La forme en arc du château permet de voir les côtés en même temps que la façade, ce qui le fait apparaître plus grand.","habitants":"Famille de Jean de La Rochandry \r\n        \"","divers":"Rochandry  45° 33' 20\" nord, 0° 07' 27\" est","gps":"","images":["../image/image_16/16_Rochandry_1.jpg","../image/image_16/16_Rochandry_2.jpg","../image/image_16/16_Rochandry_3.jpg","../image/image_16/16_Rochandry_4.jpg","../image/image_16/16_Rochandry_5.jpg"]},"Consult_chateau_formulairedad8-2":{"id":"Consult_chateau_formulairedad8-2","dept":"16","canton":"Tude-et-Lavalette","commune":"Combiers-Edon","nom":"Rochebeaucourt","type":"Château","periode":"XIV-XVIII","histoire":"ROCHEBEAUCOURT, au XVe siècle, des fenêtres à meneaux sont percées. Au XVIe siècle, François de la Rochebeaucourt fit raser la grosse tour carrée établir des terrasses et construire l'orangerie. Le roi Charles IX y a séjourné en 1565. En 1790 le plafond de l'orangerie est dit \"cassé et tombé en plusieurs parties\". Pauline de Tourzel, fille de la duchesse de Tourzel, qui accompagna sa mère, désigné comme gouvernante des enfants de Louis XVI et Marie-Antoinette en août 1789 à 1795, épousa en 1797 le marquis Alexandre Galard de Béarn propriétaire du château et y vivra jusqu'à sa mort en 1839. Entre 1853 et 1859, Louis-Hector de Galard de Brassac de Béarn, diplomate et sénateur d'Empire, fit détruire le château et construire un château moderne par l'architecte parisien Pierre-Charles Dusillion (1804-1878) et l'entrepreneur angoumoisin Nicolas, à qui il fit ensuite un procès pour malfaçon. Un ensemble de clichés sur plaques de verre de Léo Justin Laffargue  montrent le château à cette époque. Les Galard de Béarn en restèrent propriétaires jusqu'en 1892. Réquisitionnée par les Allemands durant la seconde guerre mondiale, la demeure fut brûlée accidentellement le 5 février 1941.","architecture":"ROCHEBEAUCOURT, c'était un des plus imposants châteaux de Charente. En mai-juin 1792, alors que le mobilier est vendu à la requête de Me Cousin au nom d'un mineur, le manoir est ainsi décrit par le régisseur Boulland : « un des plus conséquents par sa forme et son étendue, flanqué de deux tours dont une garnie de créneaux, en entier couvert d'ardoises, 12 pièces grandes et petites, à chaque étage, dont 9 à feux et les deux tours appelées donjons ont une chambre haute avec une jolie chapelle au premier et un des plus beaux escaliers qu'on puisse voir, en dernier lieu a été construit un corps de bâtiment de six pièces basses à cheminées ».  De ce château reconstruit dans le style Renaissance sous le second Empire, comme en témoigne le décor mural du passage aux voitures sous la terrasse permettant de descendre à couvert et de gagner l'escalier donnant accès au château, il ne reste que des ruines, le soubassement sur un plan en L constitué d'arcatures fermées. Un passage conduit à des pièces ornées de sculptures de la fin du XVIe siècle. L'arc de triomphe de style néo-classique construit en 1840 sur \"l'Allée Verte\" du parc est dédié par son mari à sa mémoire et à sa vertu. En 1850 il restait de ce château un logis cantonné de tours rondes à créneaux et mâchicoulis coiffées de toitures en poivrières.","habitants":"Famille de Alexandre Galard de Béarn\r\n        \"","divers":"Rochebeaucourt 45° 29' 12,84\" Nord, 0° 22' 32,88\" Est","gps":"","images":["../image/image_16/16_Rochebeaucourt_1.jpg","../image/image_16/16_Rochebeaucourt_2.jpg","../image/image_16/16_Rochebeaucourt_3.jpg","../image/image_16/16_Rochebeaucourt_4.jpg"]},"Consult_chateau_formulaire0c52":{"id":"Consult_chateau_formulaire0c52","dept":"16","canton":"Val-de-Tardoire","commune":"Vilhonneur","nom":"Rochebertier","type":"Château","periode":"XVI","histoire":"ROCHEBERTIER, en 1363, Robert de Matha, tuteur du jeune seigneur Jacques de Montbron, rend hommage au Prince Noir, roi d'Angleterre et duc d'Aquitaine, qui tient sa cour à la forteresse de Rochebertier ». À la Renaissance, les Renouard sont seigneurs du lieu. Jean Renouard, écuyer, est en 1520 seigneur de Pranzac et de Rochebertier. Les Renouard rebâtissent un nouveau château sur la rive droite, afin de l'ouvrir davantage à la lumière. Ils fortifient cependant le lieu par des murs épais et des tours percées de meurtrières. Aux XVIIe siècle, le domaine passe successivement par alliances aux Lériget, de Chièvres, Pasquet, familles protestantes. En 1700, Louis de Pasquet épouse Anne de Bernon, famille notable de La Rochelle qui se livre au commerce triangulaire, et de ce mariage naissent deux enfants dont une fille Jeanne, qui épouse Louis Corgnol (famille d'Anais). Bien que le fils unique de Louis de Corgnol émigre à la Révolution, la famille de Corgnol possèdera Rochebertier jusqu'à la fin du XIXe siècle où le logis sera vendu.  Au XIXe siècle, au moment de la découverte de la grotte du Placard, des vestiges de constructions anciennes, aujourd'hui disparus, sont encore signalés au sommet de la falaise sur la rive droite de la Tardoire.                         VILHONNEUR, du château  actuel, dont il reste encore la tour d'entrée, a été remanié par la famille de Jambes  vers la fin du XVIe siècle. C'était le siège d'une seigneurie qui jusqu'à la fin du XVIe siècle a appartenu à cette famille. En 1597, la seigneurie est passée par mariage de Christine de Jambes à Pierre Dussault, écuyer et seigneur de Villars-Marange. Vilhonneur est restée dans la famille Dussault jusqu'au milieu du XVIIIe siècle. Son dernier possesseur était Pierre de Labatud, écuyer, seigneur du Maine Gagnaud.","architecture":"ROCHEBERTIER, le logis est composé de deux bâtiments disposés en L faisant face à l'ouest, à l'intersection desquels se trouve une tour ronde à l'intérieur, bâtie hors-uvre. Deux autres tours rondes entourent le bâtiment principal, sur sa façade principale qui donne à l'est. Une tour carrée, qui n'est peut-être pas d'époque, borde l'aile en retour au sud-ouest.  La tour centrale contient un escalier à vis. Des traces de fortifications sont visibles, comme une bretèche à l'entrée, des meurtrières dans les tours et une trace d'échauguette. La porte d'entrée de la tour centrale comporte un linteau style Renaissance avec des armoiries. Le bâtiment en retour d'équerre était fortifié, et un ancien chemin de ronde est visible à l'étage sous la forme d'un étroit couloir. L'ensemble des bâtiments est couvert en tuiles canal et tuiles plates pour les tours. Deux communs bordent le logis, au sud-ouest et au nord. L'accès, privé, se fait par un chemin au nord avec un portail charentais.\r\nVILHONNEUR Le donjon a été construit au XIVe siècle. D'autres bâtiments sont du XVIe siècle. L'ensemble des façades et toitures des bâtiments anciens fait lobjet dune inscription au titre des M.H. depuis le 24 janvier 19662. Le donjon et les autres bâtiments du château actuellement en grande partie détruit étaient accessibles par un pont-levis et entourés de douves maintenant comblées. Le portail est protégé par une ligne de merlons sur mâchicoulis avec corps de garde au premier étage. Le gros donjon carré est flanqué d'une tourelle enfermant l'escalier à vis.","habitants":"Rochebertier Famille de Jean Renouard                      Vilhonneur famille de Chambes\r\n        \"","divers":"Rochebertier 45° 41' 19\" nord, 0° 25' 20\" est2","gps":"","images":["../image/image_16/16_Rochebertier_1.jpg","../image/image_16/16_Rochebertier_2.jpg","../image/image_16/16_Rochebertier_3.jpg","../image/image_16/16_Rochebertier_4.jpg","../image/image_16/16_Rochebertier_5.jpg"]},"Consult_chateau_formulaire4338":{"id":"Consult_chateau_formulaire4338","dept":"16","canton":"Charente-Vienne","commune":"Etagnac","nom":"Rochebrune_16","type":"Château","periode":"XI-XVI","histoire":"ROCHEBRUNE, au XIe siècle fondation des princes de Chabanais, Au XIIIe siècle par voie d'héritage passe  à la maison de Matha puis aux Rochechouart et aux Thouars et par les femmes aux Vendôme, aux Ferrières puis aux La-Fin qui vende  en 1561, à Joachim de Montluc à lépoque des guerres de religions, le château échut à Blaise de Montluc, maréchal de France, catholique fervent et vaillant pour défenseur des protestants.  Après qu'il eut été incendié par les protestants en 1569. en 1597 la veuve Anne de Montesquiou fait exécuter d'énormes travaux qui seront poursuivis par son fils Adrien ce dernier céde le château au sieur de la Boixière, par mariage de leur fille Jeanne Rochebrune passa aux Escoubleau marquis de Sourdis. Rochebrune restera dans la descendance des la Boixière passe par alliance aux Chauveron puis en 1694 aux Régaud de la Soudière qui céde la seigneurie à jean Etienne Rouillac écuyer.  Angélique Charlotte d'Escoubleau de Sourdis, dame de Chabanais épousa François Gilbert Colbert (1676-1719), marquis de Saint-Pouange. Lors du contrat de mariage, en 1702, Louis XIV éleva la terre de Chabanais au rang de marquisat. Ce sont les Colbert-Chabanais qui percèrent les grandes fenêtres de Rochebrune.  En 1805, le comte Pierre Dupont de l'Étang, général dempire, officier de Napoléon, acquiert Rochebrune. Son petit-fils, sans descendance, le laissera à son cousin, le comte de Richemont, ancêtre de lactuel propriétaire. Le château de Rochebrune appartient depuis à Henri de Richemont.","architecture":"ROCHEBRUNE, forterrese  de plan carré à trois corps de bâtiment. Les descendants de Jourdain Ier augmentèrent peu à peu lédifice pour lui donner son volume actuel. cest la belle-fille de Montluc qui rendit le château habitable en perçant les façades douvertures qui amènent de la lumière. En effet, les murs ne supportaient alors quun chemin de ronde reliant les quatre tours. Les trois corps de bâtiments à étage forment un carré flanqué de quatre tours d'angles et entouré de douves. Ils sont recouverts de toitures à deux pans , celles des tours sont des poivrières. La quatrième aile qui fermait la cour a été démolie en 1808 et des fenêtres ont été ouvertes. Les toits sont couverts d'ardoises à la place des tuiles plates d'origine. L'intérieur possède un plafond peint daté de 1581 aux armes des Montluc et des Rochechouart. Pour rendre la demeure plus agréable, le pont-levis fut remplacé au XVIIIe par lactuel passage. Les façades et les toitures du château et des communs ainsi que les douves ont été inscrites au M.H. par arrêté du 24 juin 1959.","habitants":"Famille d' Anne de Montesquiou\r\n        \"","divers":"Rochebrune 45° 53' 48\" nord, 0° 47' 14\" est2","gps":"","images":["../image/image_16/16_Rochebrune_16_1.jpg","../image/image_16/16_Rochebrune_16_2.jpg","../image/image_16/16_Rochebrune_16_3.jpg"]},"Consult_chateau_formulaire0d7a":{"id":"Consult_chateau_formulaire0d7a","dept":"16","canton":"Val-de-Tardoire","commune":"Rochefoucauld","nom":"Rochefoucauld","type":"Forteresse","periode":"XIV-XVI","histoire":"ROCHEFOUCAULD, en 1494, François I de la Rochefoucauld est le parrain du fils du comte d'Angoulême et de Louise de Savoie (le futur roi François Ier et son prénom fut attribué à l'enfant. En 1515 François Ier érigea en sa faveur la baronnie de La Rochefoucauld en comté en y incorporant la baronnie de Marthon. François II de La Rochefoucauld (1494-1533), marié à Anne de Polignac, fait construire la plus grande partie du château.  Au XVIe siècle, François II de La Rochefoucauld ordonne en 1533 à sa future veuve de se retirer dans le château de Verteuil et le château de La Rochefoucauld inhabité n'est plus utilisé que pour les grandes réceptions officielles. En 1909, à la suite de la disparition prématurée de François XVII de La Rochefoucauld, son tombeau de style Renaissance, François XVI (1853-1925), 11e duc, et sa mère Matti-Elizabeth Mitchell (1866-1933).  comte puis prince Orlov (1787-1862) sont acquis par Alphonse et Raymond Réthoré pour leur projet de château à la Mercerie près de Villebois-Lavalette mené de 1939 à 1970, et dont le mobilier est lui-même vendu aux enchères en 1987. Le château, vidé, reste inhabité pendant de longues années. Pendant la seconde guerre mondiale, il sert de dépôt d'archives, puis, livré aux troupes d'occupation, il en sort dans un état de délabrement avancé, qui ne fait que s'aggraver 40 ans plus tard. À la suite de la vente en 1993 par le 14e duc de La Rochefoucauld (mort à La Rochefoucauld en 2011) du château de Montmirail, les meubles, les nombreux tableaux, livres et divers souvenirs familiaux qui s'y trouvaient sont installés à La Rochefoucauld,","architecture":"ROCHEFOUCAULD, le château Renaissance conserve les éléments du château précédent (en particulier le donjon et les tours) : l'agencement est étudié pour que le donjon reste bien visible tant de l'extérieur du château que de l'intérieur de la cour,   deux corps de logis, des galeries superposées, la chapelle et un grand escalier en colimaçon, les galeries sont superposées sur trois étages selon un modèle italien.  En 1615, le château médiéval est démoli. La cour est ouverte vers le nord. Le duc en avait dessiné le plan, avec deux chambres basses et deux chambres hautes. Ce duc fit entreprendre par le maître maçon Jean Cazier, neveu de l'architecte, des travaux de pavage de la muraille côté ville. En 1760 l'aile du XVIIe siècle, qui a brûlé, est reconstruite. L'accès au château se fait du côté du plateau, à travers un pavillon datant du début du XVIIe siècle. L'édifice est précédé d'un vaste parterre sur lequel se développe la façade du corps de logis XVIe siècle (1824-1900) représente au moins deux aspects du château : sa façade dominant la Tardoire et le bourg et celles à triples galeries Renai
