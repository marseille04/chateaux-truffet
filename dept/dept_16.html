teau_formulaire5c3a","nom":"Vouzan","commune":"Vouzan","type":"Forteresse","img":"../image/image_16/16_Vouzan_1.jpg"}];const FULL={"Consult_chateau_formulaire147b":{"id":"Consult_chateau_formulaire147b","dept":"16","canton":"Charente-Nord","commune":"Bioussac","nom":"Abrégement","type":"Château","periode":"XVIII","histoire":"ABREGEMENT, c'était un fief dépendant de la Baronnie de Verteuil il a d'abord appartenu au XIVe siècle aux La Rochefoucauld, puis aux Saint-Amand (seigneurs du Châtelard et de Saint-Front), et aux Desmier, seigneurs de Chenon. En 1555, Jacquette Desmier se maria avec Perceval de Volvire ou Voluyre, guidon de la compagnie du marquis de Ruffec et de la famille de ce dernier. En 1579, leur fille Anne épousa Guillaume Massacré, descendant d'une famille originaire de Normandie qui s'était établie dans le Périgord. En 1750, le dernier Massacré eut une fille unique qui épousa Olivier-Mathurin d'Hémery, chevalier, seigneur de Cerné. Cette famille originaire d'Ile-de-France s'établit dans le Poitou à la fin du XVIIe siècle. François d'Hémery (1752-1828) compta parmi les personnages influents du département de la Charente né à la Révolution, comme la plupart de ses descendants par la suite dont certains ont été maires de Bioussac ou conseillers généraux. Olivier-Mathurin d'Hémery a reconstruit le château médiéval de son beau-père en 1750 et 1751 en une demeure du XVIIIe siècle, construit par son frère César d'Hémery.   Le château appartient aujourd'hui à son descendant, William Anseau dHémery, né en 1988, qui a rénové le parc. Celui-ci, qui s'est agrandi depuis un plan de 1819. Il a particulièrement souffert lors de la tempête Martin de 1999 qui a balayé le Sud-Ouest.","architecture":"ABREGEMENT, du château primitif ne sont conservées que des caves voûtées et quelques murets du corps principal. Le château a été reconstruit en grande partie au XVIIIe siècle et remanié au XIXe siècle.  Il est de style Néo-classique. Le château se compose d'un corps central de style classique et deux ailes latérales. La chapelle de style néo-gothique est carrelée et possède aussi de beaux vitraux, le nouveau château possède deux avant-corps cantonnés de tours. Il ressemble un peu au château de la Martinière, situé non loin de là à Rom dans le Poitou, l'aile Est a été entièrement refaite, une galerie a été ajoutée en avant du corps central, et une maison accolée à l'ouest construite sur les plans de l'architecte Paul Abadie. Il est inscrit aux M.H. depuis 2014.","habitants":"Famille  d'Olivier-Mathurin d'Hémery\r\n        \"","divers":"Château d'Abrégement : 46° 01' 42\" Nord, 0° 16' 48\" Est","gps":"","images":["../image/image_16/16_Abr%c3%a9gement_1.jpg","../image/image_16/16_Abr%c3%a9gement_2.jpg","../image/image_16/16_Abr%c3%a9gement_3.jpg"]},"Consult_chateau_formulaire3ee9":{"id":"Consult_chateau_formulaire3ee9","dept":"16","canton":"Charente-Vienne","commune":"Abzac","nom":"Abzac","type":"Château","periode":"XV-XIX","histoire":"A Abzac trois châteaux celui de Fayolle (voir article), de Monette et de Serre (voir article).                        MONETTE est un château bâti à Anzac, Le logis de Monette a appartenu à la famille de Tisseuil et aux Garnier de la Boissière. Il a été reconstruit au XIXe siècle dans la forêt de Monette, il fut reconstruit en 1850; pour le comte Jules Octave Garnier de La Boissière,  époux de Marie-Joséphine de James, et petit-fils du général d'Empire Pierre Garnier de La Boissière, fils de Jean Garnier (1848) député, et de Marie-Anne Blanchon. Sa fille épousa le comte Augier de Moussac. \r\nSERRES de d'Archiac, qui rend hommage au comte de la Marche au début du XVIe siècle, aurait commencé la construction de ce château. Cette famille est originaire de Saintonge et sont châtelains d'Availles-Limouzine depuis le XIIIe siècle. Par mariage, le château de Serre passe dans la famille de la Béraudière puis dans la famille de Grandseigne. Diane de Grandseigne qui héritera du château épousera le premier duc de Mortemart et leur fille Françoise sera connue sous son nom de femme mariée, la marquise de Montespan. La propriété et son domaine resteront entre les mains des Rochechouart de Mortemart jusqu'à la Révolution où il sera vendu comme bien national. La famille Prévost-Maisonnais la conservera pendant la première moitié du XIXe siècle puis en 1860 la famille Pichon de Vendeuil, originaire de l'Indre, achète le château et répare sa toiture. En 1976, le château sera vendu par cette famille à Monsieur et Madame Jacques Guttin qui en sont toujours propriétaires.","architecture":"MONETTE     [1850] Monette reconstruit par le comte Jules Octave Garnier de La Boissière de plan rectangulaire à trois niveaux et série de lucarnes sur combles d'un toit brisé à la mansard, construction aux lignes sobres, toiture d'ardoise.                                SERRES  château est constitué de deux bâtiments de même hauteur construits, l'un au XVIe siècle, l'autre au XVIIe siècle, et disposés en équerre avec une tour d'escalier dans l'angle intérieur qu'ils forment. Les toitures sont couvertes de tuiles plates. Une pièce au deuxième étage est ornée de peintures. Se retrouvent des défilés de personnages dont un fou et la mort, et de nombreuses inscriptions et maximes. Elles seraient liées à la nostalgie de Diane de Granseigne, veuve d'Archiac, après le décès du duc de Vivonne en 1688. Une partie des façades du château a été remaniée au XVIIe siècle. L'intérieur et l'extérieur sont classés à l'inventaire supplémentaire, et trois pièces ont été protégées au titre des monuments historiques, la chambre dite de la Montespan qui est en fait celle du duc de Mortemart son père, l'antichambre et une pièce dans son état du XVe siècle ornée de peintures murales. La chapelle extérieure aurait contenu les reliques de saints Lucius et Émérite, jeunes martyrs romains donnés par le pape au duc de Vivonne, frère de la marquise de Montespan. C'est l'origine des ostensions septennales d'Abzac, célèbres en Charente limousine. Le château a été inscrit au M.H. le 26 juillet 1988, et à la même date la chambre du duc de Vivonne contenant l'alcôve peinte, son antichambre et la pièce du deuxième étage ornée de peintures murales ont été classées.","habitants":"Monette Comte Jules Octave Garnier de La Boissière                                                                         Serre Famille des Rochechouart-Mortemart\r\n        \"","divers":"Château de Monette 46° 06' 14\" Nord, 0° 42' 18\" Est                                                                                    Serres : 46° 06' 32,04\" Nord et 0° 42' 10,08\" Est","gps":"","images":["../image/image_16/16_Abzac_1.jpg","../image/image_16/16_Abzac_2.jpg","../image/image_16/16_Abzac_3.jpg"]},"Consult_chateau_formulaire010a":{"id":"Consult_chateau_formulaire010a","dept":"16","canton":"Charente-Nord","commune":"Nanteuil en Vallée","nom":"Aizecq","type":"Manoir","periode":"XVII","histoire":"AIZECQ, le premier seigneur connu est Jean Prévost de Salles qui rend hommage en 1171 à l'abbé de Nanteuil car la terre d'Aizecq dépendait de l'abbaye Notre-Dame de Nanteuil. Le premier seigneur connu est Jean Prévost de Salles.  À la fin du XVIe siècle, cette terre passe à François Préveraud, dont le petit-fils gentilhomme de la maison du roi est anobli par Louis XIII. Le colombier à pied, en est le symbole et marque le droit de haute justice. Charles de Saluces l'achète en 1669. Après la Révolution, elle est restituée à Charles de Saluces bien qu'il ait émigré. Aizecq était autrefois un fief dépendant de la baronnie de Verteuil, et qui a appartenu à la famille Prévéraud jusqu'à la fin du XVIIe siècle.","architecture":"AIZECQ, est constitué d'un logis et d'une aile de communs. Ce logis noble à deux niveaux et un étage de comble présente en son milieu une tour d'entrée carrée flanquée d'une tourelle en suspens. Les bâtiments ont été remaniés au XIXe siècle avec deux arcades rajoutées sur un côté de cette façade. Heureusement une lucarne à tympan en demi-cercle, des fenêtres à meneaux et une porte d'entrée ornée d'un gâble en accolade qui sont caractéristiques du XVIe siècle ont été conservées. L'autre façade a gardé une échauguette à toit conique à son extrémité sud. \r\nLe pigeonnier dont l'intérieur a conservé ses boulins est inscrit au M.H. depuis le 30 décembre 2002.","habitants":"Famille de Charles de Saluces\r\n        \"","divers":"Château  d'Aizecq 45° 59' 24\" Nord et 0° 16' 51\" Est","gps":"","images":["../image/image_16/16_Aizecq_1.jpg"]},"Consult_chateau_formulaire0b0e":{"id":"Consult_chateau_formulaire0b0e","dept":"16","canton":"Charente-Bonnieure","commune":"Alloue","nom":"Alloue","type":"Château","periode":"XV","histoire":"Plusieurs châteaux à Alloue celui de l'Age de Voluté  de Beauchêne, de la Fayolle,  gorse, de la Gueuche, de Massignac, le manoir de Pavillon et la Vergne.     AGE de VOLUTE est un manoir bâti à Alloué,  En 1399, Guy de l'Age Landri, damoiseau, rendit aveu à Aimar, abbé de Charroux, de son « hébergement de l´Age de Volude en Alloue ». Le manoir de l'Age, date de la fin du XVe siècle. Il aurait été occupé  par les familles Green de Marsault, de Laage et de Verdilhac.                                                                MASSIGNAC  Le château de Massignac aurait appartenu au XVe siècle à la famille Tizon, puis au XVIe siècle aux Barbarin, pour passer ensuite à la famille Régnaud, puis par mariage, à la famille Guiot puis a été vendu comme bien national à la Révolution. En 1861 il a été très remanié.","architecture":"AGE de VELOUTE  à l'origine, constitué d'une enceinte quadrangulaire avec chemin de ronde cantonnée de quatre tours circulaires possédant un pont-levis, datant du XVe siècle et d'un logis construit à la fin du XVIe siècle. Il ne reste de son enceinte que deux tours situées au sud-ouest et au sud-est. Cette dernière est percée de 4 meurtrières-canonnières, par niveau. Le mur d´enceinte était couronné d´un parapet sur mâchicoulis dont il ne reste que les consoles au niveau de la tour Sud-Ouest. Le logis de plan rectangulaire possède un étage et un comble ainsi qu'une tour d´escalier circulaire, semi-hors-uvre, au milieu de la façade percée de petites fenêtres et d´une archère.    Sur le plan cadastral de 1835, des douves et les quatre tours étaient encore présentes et un bâtiment qui s´appuyait sur l´enceinte au sud-ouest, dans le prolongement de l´actuelle pièce voûtée, reliait les deux tours d´angle. Sur des vues anciennes du début du XXe siècle, la tour située au nord-ouest et le chemin de ronde en façade du logis sont encore visibles.                                                                          MASSIGNAC, c'est un bâtiment rectangulaire flanqué de grosses tours d'angle rondes. Ces tours d'angles circulaires sont carrées à l'intérieur, munies de plusieurs archères canonnières. Il est organisé en deux grandes pièces séparées par un large couloir. Ses fenêtres à encadrement et appui moulurés sont d'un château du XVe siècle. \r\nIl a été remanié en 1861 avec installation d'un escalier et c'est sans doute à cette occasion que la tour d'escalier a été détruite et des ouvertures percées.","habitants":"Familles Green de Marsault\r\n        \"","divers":"Château d'Age de Velouté  46° 01' 42\" Nord, 0° 16' 48\" Est   grav de 1 à 4                                             Massignac grav de 5 à 6, Gorse_7","gps":"","images":["../image/image_16/16_Alloue_1.jpg","../image/image_16/16_Alloue_2.jpg","../image/image_16/16_Alloue_3.jpg","../image/image_16/16_Alloue_4.jpg","../image/image_16/16_Alloue_5.jpg","../image/image_16/16_Alloue_6.jpg","../image/image_16/16_Alloue_7.jpg","../image/image_16/16_Alloue_8.jpg"]},"Consult_chateau_formulaire1bfc":{"id":"Consult_chateau_formulaire1bfc","dept":"16","canton":"Charente-Bonnieure","commune":"Alloue","nom":"Alloue_Age","type":"Château","periode":"XVII","histoire":"BEAUCHENE, les De Lage, seigneurs de Beauchesne, une branche de la famille des De Lage de Volude, possédèrent la seigneurie jusqu'à la fin du XVII siècle, ensuite les Gracieux la gardèrent jusqu'à la Révolution.                                                                      \r\nLa GEUCHE, manoir dont l'origine date de 1396 ; propriété des Perrot de la Lande, il devient au XVIIe siècle le château de la famille Gracieux, il est transformé après sa vente à la révolution en entreprise agricole familiale.          \r\nPAVILLON, pas d'information historique.","architecture":"BEAUCHENE, bâti à Alloué, date du XVIIe siècle. Il est constitué de bâtiments cantonnés de 4 tours, dont la partie la plus ancienne est la Tour Sud-Est. Le blason des De Lage se retrouve ré-employé sur le mur Est de la cour du logis. Une inscription « F.P.P.D.Lage 1656 » se trouve inséré au-dessus d'un corbeau  dans la construction d'un escalier extérieur. L'aile Nord du château fut détruite en 1873. \r\nLa GEUCHE  Il a conservé sa structure du XIVe siècle bien qu'une grande partie des murs aient été remontés vers 1870, date inscrite sur le linteau de la porte. Il est de plan rectangulaire avec cave voûtée en sous-sol, un étage et un comble couvert d'un haut toit à croupes en tuiles plates. La tour d'escalier accolée au sud-est coiffée d'un toit conique en ardoises possède des archères. Les dépendances ont été ajoutées au XIXe siècle .En 1870 il est partiellement reconstruit.             \r\nPAVILLON manoir  est indiqué comme étant une seigneurie au XVIIIe siècle et a été, depuis, très remanié. La maison face à l'église serait du XVIe siècle reprise au XIXe siècle). Cette grande demeure à façade austère, a fait l'objet d'une décoration unique de papiers peints français exécutés entre 1834 et 1836 dans la manufacture de Jean Zuber. Ces papiers peints présentent des séries comme \"vue de l'Amérique du Nord\" ou encore \"Helvéthie.","habitants":"Famille Gracieux\r\n        \"","divers":"Alloue 46° 01' 38\" Nord et 0° 30' 57\" Est          Massignac     46° 00' 06\" Nord et 0° 31' 52\" Est   Beauchène grav 4-5 Lagueuche grav 3                  Pavillon grav 6","gps":"","images":["../image/image_16/16_Alloue_Age_1.jpg","../image/image_16/16_Alloue_Age_2.jpg","../image/image_16/16_Alloue_Age_3.jpg","../image/image_16/16_Alloue_Age_4.jpg","../image/image_16/16_Alloue_Age_5.jpg","../image/image_16/16_Alloue_Age_6.jpg"]},"Consult_chateau_formulaire8ebd":{"id":"Consult_chateau_formulaire8ebd","dept":"16","canton":"Charente-Bonnieure","commune":"Alloue","nom":"Alloue_Vergne","type":"Château","periode":"XV","histoire":"La VERGNE. ce domaine a appartenu à l'actrice Maria Casarès (actrice française de cinéma et de théâtre). Maria Casarès y rencontre Albert Camus le 19 mars 1944 chez Michel Leiris. Ils nouent une relation amoureuse, en 1944, où elle joue Martha. L'écrivain, qui met Maria au contact de la Résistance et des exilés espagnols, est pour la comédienne « père, frère, ami, amant, et fils parfois ». La guerre et Francine Faure, la compagne de Camus, les séparent : à la fin de la seconde guerre mondiale, ils romprent.  Ils se retrouvent par hasard en 1948 et entretiennent une liaison secrète passionnée qui ne prend fin qu'avec la mort accidentelle de l'écrivain, en 1960. Après la mort d'Albert Camus, pour tenter de la détourner de son chagrin, ses amis, dont André Schlesser  l'incitent à s'acheter une maison. Le 5 août 1961, Maria Casarès et André Schlesser achètent  une partie chacun le manoir, les dépendances et les terres de la Vergne, à Alloue. Elle épousera le 27 juin 1978, son ami de longue date, André Schlesser, mort à Saint-Paul-de-Vence le 15 février 1985.Après la mort d'André, ses enfants Anne et Gilles Schlesser lèguent à Maria Casarès la partie du domaine de La Vergne qui appartenait à leur père.","architecture":"La VERGNE,  date du XVe au XVIIe siècle.  Situé à 300 m au sud du bourg au bord de la Charente, ce domaine a appartenu à l'actrice Maria Casarès. La bibliothèque et l'ensemble du logis ont été inscrits au M.H. le 12 décembre 2002. Pour remercier la France d'avoir été une terre d'asile, Maria Casarès, sans descendance, fait don à la commune d'Alloue du domaine et du manoir de La Vergne  qui, désormais, lui appartiennent donc en entier. Le lieu est devenu, depuis, un lieu de rencontre et de conférence ayant pris le nom de « La Maison du comédien  Maria Casarès ». Le comédien François Marthouret est actuellement le Président de l'association. La bibliothèque et l'ensemble du Logis de la Vergne ont été inscrits aux M.H. le 12/12/2002.","habitants":"Actrice Maria Casarès\r\n        \"","divers":"Château de Lavergne 46° 01' 08\" Nord et 0° 31' 12\" Est","gps":"","images":["../image/image_16/16_Alloue_Lavergne_1.jpg","../image/image_16/16_Alloue_Lavergne_2.jpg","../image/image_16/16_Alloue_Lavergne_3.jpg"]},"Consult_chateau_formulairefda2":{"id":"Consult_chateau_formulairefda2","dept":"16","canton":"Angoulême","commune":"Angoulême","nom":"Angoulème","type":"Château","periode":"X-XV","histoire":"A Angoulême la Tourgarnier et autres châteaux sur Angoulème (voir article)                                  ANGOULEME, lhôtel de ville du Xe siècle au XIIIe siècle, les comtes d'Angoulême, les Taillefer puis les Lusignan renforcèrent les défenses de la ville et les agrandirent en englobant le quartier Saint-Martial. En 1308, à la mort de Guy Ier de Lusignan, le comté d'Angoulême revient à la couronne de France. Il est donné à Louis d'Orléans, frère du roi Charles VI, en 1394 puis transmis à son fils Jean d'Orléans, grand-père de Marguerite d'Angoulême et de François Ier. Le Bon comte Jean d'Angoulême va  agrandir le château comtal lors de son retour de captivité anglaise au milieu du XVe siècle. Le duc d'Épernon (Jean-Louis de Nogaret de La Valette), gouverneur de l'Angoumois, y reçut Marie de Médicis en fuite en 1619. Ensuite le château ne fut que la résidence des gouverneurs. En 1825, on y établit un télégraphe Chappe, dont la « pierre du télégraphe » (au sommet de la tour) reste le seul vestige. En 1840, sur proposition du maire de l'époque Paul Joseph Normand de la Tranchade, la ville l'acheta pour en faire la mairie. C'est ainsi que Paul Abadie, architecte chargé des travaux, fit détruire le logis du XVe siècle et ne garda le donjon que sous la pression de la société archéologique et historique de la Charente qui amena le conseil général de l'époque à ne céder l'ancien château à la ville, qu'à condition que n'en soit pas modifié le caractère monumental.","architecture":"ANGOULEME, l'hôtel de ville  du XIXe siècle ancien château comtal néogothique, inspiration Renaissance flanqué d'un beffroy à la flamande, construit sur l'emplacement de l'ancien château des comtes d'Angoulème.  Des éléments du château demeurent cependant, la tour polygone qui était son donjon du XIIIe siècle et la tour ronde  du XVe siècle aux fenêtres à meneaux. Le donjon polygonnal  dit de Lusignan, le châtelet et le « château neuf » sont construits aux XIIe siècle et XIIIe siècle. Au XVe siècle s'ajoute un pavillon carré collé à l'ouest de la tour Marguerite. Ce pavillon est muni d'une tourelle polygonale renfermant l'escalier. Les remparts dit Desaix, deux tours rondes en bastions  rectangulaires. À la fin du XVe siècle sont construites des fortifications en étoile, dont il ne reste que trois échauguettes, rue de Bélat, rue du Sauvage et une troisième dans un jardin privé impasse d'Austerlitz, et une tour visible à l'espace Marengo. Du château des comtes d'Angoulême il ne reste que le donjon des Lusignan et la tour des Valois. Ils ont été inscrits comme M.H. en 1929.","habitants":"Jean-Louis de Nogaret de La Valette\r\n        \r\n        \r\n        \"","divers":"Angoulême GPS : 45° 38' 54\" Nord et 0° 09' 24,97\" Est","gps":"45° 38' 54\" Nord et 0° 09' 24,97\" Est","images":["../image/image_16/16_Angoul%c3%a8me_1.jpg","../image/image_16/16_Angoul%c3%a8me_2.jpg","../image/image_16/16_Angoul%c3%a8me_3.jpg","../image/image_16/16_Angoul%c3%a8me_4.jpg","../image/image_16/16_Angoul%c3%a8me_5.jpg"]},"Consult_chateau_formulairec167":{"id":"Consult_chateau_formulairec167","dept":"16","canton":"Charente-Champagne","commune":"Bouteville","nom":"Anqueville","type":"Château-fort","periode":"XV-XVIII","histoire":"ANQUEVILLE, au XIIIe siècle la seigneurie d'Anqueville dépendait de la châtellenie de Bouteville et le château détruit durant la guerre de cent ans appartenait aux Taillefer de Montauzier. Au XVe siècle il appartient aux Giraud ce qui est attesté par l'hommage rendu par Pierre Giraud à Louise de Savoie en 1497. Le château d'Anqueville a été saccagé durant les guerres de religion. Par mariages et successions il passa aux Culant en 1666 qui le gardèrent un siècle et Alexandre-Louis de Culant fut député aux États Généraux. Quand sa veuve mourut sans descendance en 1824 le château a été acheté par le curé de Châteauneuf. Il a en partie été démoli après 1840. Le moulin à eau avait déjà été détruit en 1768 par une tempête. Le château d'Anqueville fait chambre d'hôtes.","architecture":"ANQUEVILLE a été ruiné pendant la guerre de cent ans et reconstruit au XVe siècle. Le château d'Anqueville sera ruiné au cours de la Guerre de Cent Ans puis reconstruit au XVe siècle. La façade nord-est date du XVIIIe siècle. Il ne reste qu'une salle basse voûtée en berceau brisé, un donjon rectangulaire datant du XIIIe siècle, flanqué d'une tourelle polygonale du XVe siècle et des vestiges de fortifications avec un chemin de ronde, des tourelles et des courtines La fuie a disparu. De ces parties anciennes il reste une salle basse voûtée en berceau brisé, un donjon rectangulaire du XIIIe siècle flanqué d'une tourelle polygonale du XVe siècle et des vestiges de fortifications avec chemin de ronde, tourelles et courtines. La façade nord-est date du XVIIIe siècle.","habitants":"Famille Taillefer de Montauzier.\r\n        \"","divers":"GPS : 45°37'52\" Nord et 0°07'15\" Ouest.","gps":"45°37'52\" Nord et 0°07'15\" Ouest.","images":["../image/image_16/16_Anqueville_1.jpg","../image/image_16/16_Anqueville_2.jpg","../image/image_16/16_Anqueville_3.jpg","../image/image_16/16_Anqueville_4.jpg"]},"Consult_chateau_formulairef17e":{"id":"Consult_chateau_formulairef17e","dept":"16","canton":"Val de Nouère","commune":"Moulidars","nom":"Ardenne_Moulidars","type":"Château","periode":"XII-XVIII","histoire":"ARDENNE, au Moyen Âge, il y avait deux châteaux dans Moulidars :  au XVe siècle, elle appartenait à Henri Pelletan, écuyer, qui avait épousé une fille de Charlot de Mosnac. Elle fut vendue en 1602 à François Le Musnier, seigneur de Lartige. En 1476 le seigneur Jean de Lousme était le propriétaire,  En 1480,  vendu à la famille Nourrigier, qui acquirent aussi le château de la Cour.  Entre 1612 et 1625, Jacques Le Musnier, conseiller du roi et seigneur de Rouffignac à Moulidars, acquit l'ensemble des terres de Moulidars, sauf le château même d'Ardenne qui avait été vendu par Isaac Méhée et possédé en 1608 par Raymond de Forgues, baron des Pins, de la Rochandry, d'Audenge et de Lacanau. C'est seulement en 1633, quatre ans après la mort de Jacques Le Musnier, que sa veuve Hippolyte de La Place, acquit de Catherine Redon, dame de Forgues, le château d'Ardenne, en échange de la seigneurie de Mosnac. Lors des guerres de religion, Condé, chef des protestants, mourut au château d'Ardenne des suites de ses blessures reçues à la bataille de Jarnac le 13 mai 1569. La tour, construite par Richard de Montbrun, date du XIIe siècle. Le reste de l'édifice date du XVIe siècle et a été remanié au XVIIIe siècle. Les familles Nourrigier du XVIe siècle, Le Musnier au XVIIe siècle, Méhée d'Anqueville, de Terrasson de Montleau au XVIIIe siècle, et Hine célèbres négociants de cognac à Jarnac en furent les principaux propriétaires.","architecture":"ARDENNE, le plus ancien, qui s'appelait la Cour de Moulidars, est aujourd'hui à peu près complètement détruit et les quelques constructions qui en subsistent forment ce qu'on appelle la Métairie du château d'Ardenne, a été construit en plusieurs étapes, du XIIe au XVIIIe siècle.  Plusieurs de ses parties, sa façade et ses toitures, la grande terrasse sud, sa balustrade ainsi que le grand escalier, sa rampe en fer forgé et l'escalier à vis de la tour nord-ouest ont été inscrits monument historique par arrêté du 29 décembre 1978. Le pigeonnier, qui faisait autrefois partie du domaine d'Ardenne, est construit à flanc de coteau et offre une vue magnifique vers l'ouest sur les vignobles alentour. C'était la fuie du château, et elle fut construite dans les années 1720 par Pierre Méhée alias d'Ardenne (1677-1760), mousquetaire plus connu par son surnom « d'épée du roi ». Ce pigeonnier possède 850 boulins. En 1999, la tempête Martin qui a traversé le Sud-Ouest a abîmé la toiture et l'association \"le Pigeonnier d'Ardenne\" a été créée afin de restaurer l'édifice.","habitants":"Famille de  Jacques Le Musnier\r\n        \r\n        \"","divers":"Ardenne GPS : 45° 39' 45\" Nord et 0° 02' 16\" Ouest","gps":"45° 39' 45\" Nord et 0° 02' 16\" Ouest","images":["../image/image_16/16_Ardenne_Moulidars_1.jpg","../image/image_16/16_Ardenne_Moulidars_2.jpg","../image/image_16/16_Ardenne_Moulidars_3.jpg","../image/image_16/16_Ardenne_Moulidars_4.jpg","../image/image_16/16_Ardenne_Moulidars_5.jpg"]},"Consult_chateau_formulaired720":{"id":"Consult_chateau_formulaired720","dept":"16","canton":"Cognac","commune":"Ars","nom":"Ars_16","type":"Château","periode":"XIV","histoire":"ARS,  la seigneurie d'Ars passa dans la famille de Bremond d'Ars à la suite du mariage de Jeanne d'Ars, dame d'Ars et de Balanzac en 1340 avec Guillaume de Bremond. Lorsque les frondeurs commandés par le duc de La Rochefoucauld assiégèrent Cognac en 1651, Jean-Louis de Brémond d'Ars (1606-1652) défendit une des portes de Cognac et il fit preuve d'une valeur qui méritèrent les plus grandes éloges. Il reçut le grade de maréchal des camps et armées du roi. il avait épousé au château d'Orlac Marie-Guillememette de Verdelin, dame d'Orlac (1606-1687). Tandis que Jean-Louis de Brémond d'Ars défendait Cognac assiégé par les frondeurs, sa femme Guillemette enfermée dans le château en assurait la défense. C'est elle aussi qui fit creuser un canal pour assécher le marais d'Ars. Le château d'Ars est resté dans la famille de Brémond d'Ars jusqu'à la fin du XIXe siècle. Il eut des hôtes célèbres qui y séjournèrent ou y passèrent. Louise de Savoie, son mari Charles duc d'Orléans, leur fils François Ier, Jean le Bon, le duc d'Anjou. La marquise de Verdelin y invita Jean-Jacques Rousseau.  La propriété, longtemps abondonnée, fut acquise vers 1960 par un propriétaire voisin, Raymond Thomas, qui la restaura.","architecture":"ARS, il ne reste aucun vestige du premier château médiéval,Le château d'Ars forme une masse d'aspect imposant. Son plan dessine une équerre. L'une des ailes est de construction plus moderne. Les angles sont flanqués d'échauguettes caractéristiques avec leur encorbellement bien dessiné, la moulure qui les ceinture et leur toiture arrondie en forme de dôme. Toutes les toitures sont recouvertes d'ardoises et dotées de hautes lucarnes. Sur la cour d'honneur, la partie ancienne a une grande porte d'entrée encadrée de pilastres plats et dont l'arc plein cintre est entouré d'une moulure. Un fronton coupé, dont le sommet est arrondi, s'élève au-dessus. Le claveau central de l'arc est orné d'un visage humain. \r\nDeux fenêtres à droite et à gauche de la porte d'entrée sont placées au-dessus d'une moulure. Au-dessus de chacune d'elles existe un motif sculpté. Les fenêtres du premier étage sont soulignées, elles aussi, par une moulure. Quatre grandes lucarnes, avec ouverture plein cintre et fronton arrondi et coupé, complètent cet ensemble qui a, en outre, au-dessus de la porte d'entrée, un fronton plus large avec un oculus. Le château possède encore une très belle charpente ancienne, dans le goût  du Moyen-Age. Les caves, cuisines et autres pièces du sous-sol sont voûtées en pierre. La terrasse est entourée par les anciennes douves. Les parapets sont soulignés par une grosse moulure comme les parapets des remparts de Brouage.","habitants":"Famille de Jean-Louis de Brémond d'Ars \r\n        \"","divers":"Ars GPS : 45°38'45\" Nord et 0°23'24\" Ouest.","gps":"45°38'45\" Nord et 0°23'24\" Ouest.","images":["../image/image_16/16_Ars_16_1.jpg","../image/image_16/16_Ars_16_2.jpg"]},"Consult_chateau_formulaire4e4e":{"id":"Consult_chateau_formulaire4e4e","dept":"16","canton":"Tude-et-Lavalette","commune":"Aubeterre sur Dronne","nom":"Aubeterre","type":"Forterresse","periode":"XIII","histoire":"AUBETERRE, les premiers seigneurs d'Aubeterre connus sont des co-seigneurs, les Géraud, les Castillon, les Raymond, les Bouchard et les Espardés de Lussan. Puis à la fin du XIIIe siècle, les co-seigneurs auraient été les Raymond et les Vigier, l'écusson anglais sur la porte d'entrée. Durant la guerre de cent ans le château fut pris et repris plusieurs fois, la dernière en 1453 date à laquelle François Bouchard, baron d'Aubeterre reconstitue la seigneurie et marque son indépendance vis-à-vis de l'abbé d'Aubeterre et du comte d'Angoulême. En novembre 1574, Pierre de Bourdeille, plus connu sous le nom de Brantôme, est nommé responsable du château en remplacement du sieur de Chamberlanne. Les guerres de religion divisèrent la famille. Plus tard, David Bouchard, vicomte d'Aubeterre, revenu au catholicisme, fut un fidèle des rois Henri III et Henri IV. Par sa fille, le château passa au maréchal d'Aubeterre jusqu'en 1628.  En 1810, Aubeterre revint au chevalier de Bourbon-Conti qui le détruisit, le démembra et le vendit. Le château eut plusieurs personnages célèbres. Un Brémond d'Ars y fut décapité, François Ier y passa, Calvin y séjourna, Henri IV y aurait couché, Poltrot de Méré, futur assassin du duc de Guise, y passa son enfance, Louis XIII et Anne d'Autriche s'y arrêtèrent, ainsi que Louis XIV. Madame Moulinier va acheter les ruines et tenter de les sauver. Ensuite l'ensemble des vestiges sera encore vendu plusieurs fois, dont à un Britannique M.Horny qui en a fait dans les années 1970 une luxueuse résidence entourée de son parc. Propriété de Roger et Girard Vivier.","architecture":"AUBETERRE, le château a été édifié sur la butte dans laquelle avait été creusée l'église monolithe. Il était entouré de fossés et les esplanades fortifiées ont disparu au XVIIe siècle quand fut percée la grande allée. Il reste les bases des quatre tours rondes et des morceaux de murailles qui les unissaient, une tour carrée du XVIe siècle qui était la poterne et une aile de communs. Des jardins entouraient le château, il reste les vestiges d'une orangerie. La poterne, le logis, la chapelle Renaissance ainsi que les vestiges de l'enceinte et de la tour Saint-Jean ont été inscrits  au M.H. le 1er mars 1973.","habitants":"Famille de Pierre de Bourdeille\r\n        \"","divers":"Aubeterre GPS : 45° 16' 19\" Nord et 0° 10' 14\" Est château de Janvray grav 7","gps":"45° 16' 19\" Nord et 0° 10' 14\" Est château de Janvray grav 7","images":["../image/image_16/16_Aubeterre_1.jpg","../image/image_16/16_Aubeterre_2.jpg","../image/image_16/16_Aubeterre_3.jpg","../image/image_16/16_Aubeterre_4.jpg","../image/image_16/16_Aubeterre_5.jpg","../image/image_16/16_Aubeterre_6.jpg","../image/image_16/16_Aubeterre_7.jpg"]},"Consult_chateau_formulairefc42":{"id":"Consult_chateau_formulairefc42","dept":"16","canton":"Cognac","commune":"Cognac","nom":"Bagnolet_Hennessy","type":"Château","periode":"XIX","histoire":"BAGNOLET, dans le « grand parc » de Cognac qui borde la Charente sur sa rive droite et fut propriété royale jusqu'à la Révolution, la famille Augier a construit Bagnolet en 1810. En 1841, Irène dAnthès-Hennessy, lépouse dAuguste, tombe amoureuse dune superbe propriété, le château de Bagnolet. Construite en 1810 au cur des Borderies, lun des grands crus de Cognac, cest une demeure implantée en bord de Charente.  Auguste Hennessy en fait lacquisition, et le couple sy installe avec ses trois enfants. Deux autres y naîtront. Le château devient lemblème de tout un art de vivre au XIXe siècle : Auguste Hennessy organise de nombreuses parties de chasse. Réceptions et concerts se succèdent, tandis que la table accueille les clients internationaux. Bagnolet devient ainsi lambassade de la maison Hennessy.  Il reçoit clients et invités, de personnalités historiques comme le Général de Gaulle ou la fille de Deng Xiao Ping, le Prince Bulgarie ou le Duc de Kent, à de grands artistes du cinéma et de la musique comme Lauren Bacall, Alain Delon, Oliver Stone, Robert Mitchum, Dee Dee Bridgewater, Ray Charles, Joe Cocker ou Mstislav Rostropovitch. Cest le chef David Fransoret qui officie à la cuisine, perpétuant la tradition dune table réputée pour lexcellence de ses mets. Membre des « Maîtres Cuisiniers de France », il offre aux invités des repas mettant en valeur les mets dune région reconnue pour sa richesse gastronomique.","architecture":"BAGNOLET, est une demeure implantée en bord de Charente, un pavillon central carré, flanqué de deux pavillons plus petits, faisant face à un parc à l'anglaise qui descend en pente douce jusqu'au fleuve. Sa blancheur et sa simplicité rappellent à la fois les maisons de Louisiane. Réservée aux réceptions privées et aux invités de la marque, la propriété souvre également au public à loccasion des Rendez-vous des Jardins et des Journées du Patrimoine.","habitants":"Famille Augier                                                             Famille Auguste Hennessy \r\n        \"","divers":"Bagnolet GPS : 45° 42' 48\" Nord et 0° 19' 12\" Ouest grav 1 à 4,                                                                      Hennessy à st Brice grav 5","gps":"45° 42' 48\" Nord et 0° 19' 12\" Ouest grav 1 à 4,","images":["../image/image_16/16_Bagnolet_Hennessy_1.jpg","../image/image_16/16_Bagnolet_Hennessy_2.jpg","../image/image_16/16_Bagnolet_Hennessy_3.jpg","../image/image_16/16_Bagnolet_Hennessy_4.jpg","../image/image_16/16_Bagnolet_Hennessy_5.jpg"]},"Consult_chateau_formulaire588a":{"id":"Consult_chateau_formulaire588a","dept":"16","canton":"Gond-Pontouvre","commune":"Balzac","nom":"Balzac","type":"Château","periode":"XVI-XVII","histoire":"BALZAC, un gentilhomme languedocien, Guillaume de Guez, nouvellement anobli, faisait partie de la maison du duc d'Épernon quand celui-ci est devenu gouverneur d'Angoumois et de Saintonge. Il était trésorier principal à l'extraordinaire des guerres en Angoumois, Aunis et Saintonge, quand il a acheté la seigneurie de Balzac proche d'Angoulême et fait construire ce château vers 1600. Il prend alors le nom de cette terre. Jean-Louis Guez de Balzac, son fils, couramment appelé Guez de Balzac, né le 31 mai 1597 et mort le 8 février 1654 vécut au château de Balzac jusqu'en 1612 puis revint à Angoulême passer la fin de sa vie. Cet écrivain français du XVIe siècle contribua à la réforme de la langue française. Des poètes, écrivains, épistoliers, vinrent le voir et relatèrent leurs séjours à Balzac. Marie de Médicis, après s'être évadée de son exil à Blois en 1619, y séjourna six mois ce qui en fit un lieu de rencontre des notoriétés de l'époque. Le cardinal de Richelieu y est venu pendant 10 jours. En 1729 ses descendants vendirent les terres du grand et petit Balzac à Robert Bourrée et en 1794 le domaine est acquis par Pierre Neuiller-Noguera. Les actuels propriétaires, la famille Boissinot depuis 1973, ont entrepris une restauration d'une très grande fidélité en se basant des écrits de Guez de Balzac et de ses visiteurs.","architecture":"BALZAC, à l'origine, bâti à l'emplacement d'une autre construction, il comportait un corps de logis et deux ailes en équerre avec un pavillon d'angle à haute toiture pyramidale. La construction date du XVIIe siècle. Les lucarnes à fronton et le balcon en fer forgé sont de cette époque.  Il a été doté de trois nouvelles façades autour de la cour carrée au XVIIIe siècle, ce qui crée un couloir alors que dans l'ancienne disposition les pièces se commandaient : on devait les traverser pour passer de l'une à l'autre. L'ancienne cuisine, la salle à voûte en arc de cloître du rez-de-chaussée de l'aile nord, une porte et des restes de fresques dans le corridor de l'aile sud.","habitants":"Famille de  Jean-Louis Guez de Balzac\r\n        \"","divers":"Balzac GPS : 45° 42' 28,08\" Nord, 0° 6' 33,12'est","gps":"45° 42' 28,08\" Nord, 0° 6' 33,12'est","images":["../image/image_16/16_Balzac_1.jpg","../image/image_16/16_Balzac_2.jpg","../image/image_16/16_Balzac_3.jpg","../image/image_16/16_Balzac_4.jpg","../image/image_16/16_Balzac_5.jpg","../image/image_16/16_Balzac_6.jpg"]},"Consult_chateau_formulaire8ee0":{"id":"Consult_chateau_formulaire8ee0","dept":"16","canton":"Charente-Nord","commune":"Barbezières","nom":"Barbezières","type":"Manoir","periode":"XV","histoire":"BARBEZIERES, la plus ancienne trace que nous avons du seigneur de Barbezières date de 1303 quand il est sommé par Philippe le Bel de se rendre aux armées. La forteresse de Barbezières a été détruite durant la guerre de cent ans et une demeure est construite à quelques centaines de mètres au début du XVe siècle. Barbezières relevait de Marcillac pour la haute justice et n'avait que des droits de moyenne et basse justice. Au décès de Charles de Barbezières en 1666 terre et château sont vendus. Ils passeront entre diverses mains, aux Brouillac, aux Babin, aux d'Escoubleau de Sourdis, puis aux Faure de Rencureau. Le château menaçait de ruine en 1699. Les toitures seront refaites, mais au début du XXe siècle les toitures s'écroulent et il faudra attendre 1981 pour que le château soit acheté et sauvé de la ruine. Les propriétaires monsieur Renault et monsieur  Briant. Le château de Barbezières a été inscrit au M.H. le 27 février 1925.","architecture":"BARBEZIERES du XVe siècle  se compose d'un corps de logis rectangulaire à un étage, toiture à deux pans avec à une extrémité une grosse tour ronde coiffée d'une poivrière côté jardin et une petite tour carrée située au milieu de la façade renfermant un escalier à vis en pierre. Les toitures sont couvertes de tuiles plates. La tour ronde offre des fenêtres à meneaux et à moulures. Le château renferme des cheminées du XVe siècle.","habitants":"Famille de Charles de Barbezières\r\n        \r\n        \r\n        \"","divers":"Barbézières GPS : 45° 54' 54\" Nord et 0° 06' 40\" Ouest","gps":"45° 54' 54\" Nord et 0° 06' 40\" Ouest","images":["../image/image_16/16_Barbezi%c3%a8res_1.jpg","../image/image_16/16_Barbezi%c3%a8res_2.jpg","../image/image_16/16_Barbezi%c3%a8res_3.jpg"]},"Consult_chateau_formulaire432a":{"id":"Consult_chateau_formulaire432a","dept":"16","canton":"Charente-sud","commune":"Barbézieux Saint-Hilaire","nom":"Barbézieux","type":"Forterresse","periode":"XII-XV","histoire":"BARBEZIEUX, commencée par Jean de la Rochefoucauld, fut poursuivie après sa mort par sa femme, Marguerite de la Rochefoucauld dite Dame de Barbezieux et de Montendre vers 1460. Il passa de main en main et devint la propriété de Richelieu, puis fut acheté par François Michel Le Tellier, marquis de Louvois et fut érigé en marquisat en 1678, par Louis XIV. Suite aux épisodes de la Fronde et sa possession par la famille des Le Tellier, sires de Louvois, le château revint en 1718 aux La Rochefoucauld. Mais dès le XVIIe siècle, le château ne vit que très peu, puis jamais, ses détenteurs y loger, condamnant ainsi le donjon-corps de logis à se détériorer et à tomber en ruine au cours du XVIIIe siècle. En 1829, afin d'éviter la destruction totale du château, la ville de Barbezieux entama des pourparlers avec la famille Levraud, propriétaire alors, et le lui acheta en 1845.  En partie démoli, le château devient propriété de la commune en 1844. Depuis 1900, Important point stratégique, Le château de Barbezieux a été la propriété de familles célèbres et de grands noms de lHistoire de France : les Barbezieux, les La Rochefoucauld, les dEspinay de Duretal, les Schomberg-Vignier, les Richelieu, le Tellier et Louvois. A la Révolution, le châtelet sert de prison. Aujourdhui propriété de monsireur Duruty de Graufre.","architecture":"BARBEZIEUX,  au XIIe siècle, un ensemble imposant, en pierre, permettait de surveiller les alentours, reconstruit selon les préceptes de l'art gothique flamboyant, la nouvelle forteresse allia parfaitement l'idée d'un château fort avec des systèmes de défense représentatifs de la fin du Moyen-Age, mais aussi cette idée de résidence seigneuriale luxueuse annonçant les nouvelles donnes immobilières aristocratiques de la Renaissance, il fut un des plus importants de la région et fut la base de la puissance des premiers seigneurs de Barbezieux, dont la dynastie féodale se maintiendra jusqu'à la guerre de Cent Ans, consolidée.  Il est vendu à la Révolution. Le châtelet sud-est (porte Chavaroche) servit de prison jusqu'en 1820, mais au début du XIXe siècle, l'ensemble garda son aspect de forteresse médiévale imposante. Mais c'est au cours de ce même siècle que va s'amorcer une nouvelle phase de l'histoire du château : le temps des démolitions et ultimes sauvegardes, qui vont lui donner l'aspect que nous connaissons aujourd'hui.  De l'édifice, il ne reste actuellement que la porte du nord flanqué de tours à machicoulis et des fragments d'enceinte du XVe siècle.  Il abrite alors un hôpital. Le château est classé M.H.depuis 1913.  Un musée archéologique et l'office de tourisme occupent la tour de la porte d'Archiac.","habitants":"Cardinal de Richelieu\r\n        \r\n        \"","divers":"Barbézieux GPS : 45° 28' 23,16\" Nord et 0° 9' 27\" Ouest","gps":"45° 28' 23,16\" Nord et 0° 9' 27\" Ouest","images":["../image/image_16/16_Barb%c3%a9zieux_1.jpg","../image/image_16/16_Barb%c3%a9zieux_2.jpg","../image/image_16/16_Barb%c3%a9zieux_3.jpg","../image/image_16/16_Barb%c3%a9zieux_4.jpg","../image/image_16/16_Barb%c3%a9zieux_5.jpg","../image/image_16/16_Barb%c3%a9zieux_6.jpg"]},"Consult_chateau_formulairec6f9":{"id":"Consult_chateau_formulairec6f9","dept":"16","canton":"Boixe-Manslois","commune":"Villejoubert","nom":"Barre_Villejoubert","type":"Forteresse","periode":"XV","histoire":"La BARRE,  la première mention de ce fief remonte à 1487, date d'un dénombrement de Jean Triquot, écuyer, seigneur de La Barre, à son suzerain le seigneur de Montignac. C'est sans doute lui, ou son gendre Antoine Horric au début du XVIe siècle, qui a fait construire le château, placé en haut d'une source, et situé à 400 mètres au nord de l'ancien castrum d'Andone, 500 mètres au sud de l'ancienne voie romaine qui va à Montignac, et 1,3 km au sud-ouest du bourg de Villejoubert. Le château reste dans la famille Horric, famille protestante dont on retrouve les armes sur la porte d'une tour, jusqu'à la fin du XVIIe siècle, où il passe, sans doute par vente, à François Gourdin, écuyer, pais, par héritage et alliance en 1771, à la famille Duboys de la Bernarde. Lors de la Révolution, leur fils, Louis Robert Duboys de La Barre, est considéré comme émigré. Le domaine de la Barre est alors vendu et acquis en 1796 par Pierre Dubois, un des administrateurs du département, dont la famille le possède encore aujourd'hui. Le 30 avril 1990, le logis, les restes de son portail d'entrée au nord, trois tours, le pigeonnier et les vestiges de fortifications, sont inscrits au M.H.","architecture":"La-BARRE, le logis s'articule autour d'une cour triangulaire. Le corps de logis se trouve à l'est. Il forme un plan rectangulaire allongé du nord au sud. Au nord, il est cantonné par une grosse tour ronde avec mâchicoulis et créneaux. Sur cette tour est accolée une petite tour carrée s'appuyant au sud sur le toit du corps principal et légèrement plus haute que la grosse tour, et contenant un escalier à vis. Le bâtiment central est cantonné au sud par une tour carrée coiffée d'un toit pyramidal. Au centre du logis, côté cour, est aussi accolée une tour carrée coiffée d'un toit pyramidal, qui s'appuie sur une tour ronde en encorbellement avec une base moulurée de huit tores au-dessus de la porte du logis. Cette tour contient l'escalier à vis menant aux étages du château. La porte possède un pourtour ouvragé. La cour est fermée par des communs à l'ouest. L'entrée s'effectue par un portail. Au nord de cet ensemble se trouve une fuie de plan octogonal, ce qui est assez exceptionnel en Charente, arrasée. Son intérieur est circulaire et creusé de sept rangées de boulins. À l'ouest se trouve les vestiges d'une fuie encore plus ancienne, de plan circulaire. L'Est du logis donne sur une terrasse occupée par le jardin avec une piscine.","habitants":"Famille Louis Robert Duboys de La Barre\r\n        \"","divers":"La Barre GPS : 45° 47' 40,56\" Nord et 0° 9' 47,52\" Est","gps":"45° 47' 40,56\" Nord et 0° 9' 47,52\" Est","images":["../image/image_16/16_Barre_Villejoubert_1.jpg","../image/image_16/16_Barre_Villejoubert_2.jpg","../image/image_16/16_Barre_Villejoubert_3.jpg","../image/image_16/16_Barre_Villejoubert_4.jpg","../image/image_16/16_Barre_Villejoubert_5.jpg","../image/image_16/16_Barre_Villejoubert_6.jpg"]},"Consult_chateau_formulaire098c":{"id":"Consult_chateau_formulaire098c","dept":"16","canton":"Boixe-Manslois","commune":"Aunac","nom":"Bayers","type":"Château","periode":"XI-XV","histoire":"BAYERS  Un château fort existait au XIe siècle, cependant, le château actuel date du XVe siècle, construit pour l'essentiel par Guillaume de La Rochefoucauld, puis à la famille de Rochefoucauld-Bayers par le mariage de Guillaume de la Rochefoucauld et de Marguerite de Torsay fille du seigneur d'Aunac en 1434, c'est Guillaume qui fit construire le château qui sera  vendu comme bien national a un paysan à la Révolution, il tombe peu à peu en ruine. La branche des Rochefoucauld-Bayers s'est  éteinte en 1950 avec le décès de Victoria de La Rochefoucauld-Bayers au château de Fresnay à Plessé (Loire-Atlantique). La descendance actuelle se poursuit par la famille Durant de La Pastellière. Mathilde de La Rochefoucauld-Bayers ayant épousée en 1878 Abel Durant de La Pastellière,  et depuis 1976 à la famille Degorce par le docteur Degorce.","architecture":"BAYERS, a été reconstruit au XVe siècle, en réutilisant divers éléments de fortifications. Du donjon carré renforcé de contreforts plats du XIIe siècle, il reste un pan dans un des angles de la cour. Le château est entouré de douves sèches, d'où ont été extraits les matériaux de construction. La cour intérieure est bordée d'un mur d'enceinte avec un chemin de ronde couvert à tourelle d'angle en encorbellement et logette sur consoles. Le corps de logis, rectangulaire, parallèle à la Charente, possède à son angle une grosse tour ronde crénelée coiffée d'un toit conique de tuiles plates, des meurtrières apparaissent dans les dépendances. La façade comporte côté cour une tour d'escalier carrée et une tour d'escalier polygonale. Il a existé un bâtiment en équerre qui a disparu. \r\nLe pigeonnier, une fuie ronde qui a perdu son toit se trouve à l'extérieur du mur d'enceinte. Il a été en partie inscrit au M.H. le 18 septembre 1989, puis l'ensemble des bâtiments constituant le château le 22 avril 2003 et l'ancien jardin, l'orangerie et les murs de clôture le 22 avril 2004.","habitants":"Famille de Rochefoucauld-Bayers\r\n        \"","divers":"Bayers  GPS : 45° 55' 13\" Nord et 0° 13' 45\" Est","gps":"45° 55' 13\" Nord et 0° 13' 45\" Est","images":["../image/image_16/16_Bayers_1.jpg","../image/image_16/16_Bayers_2.jpg","../image/image_16/16_Bayers_3.jpg","../image/image_16/16_Bayers_4.jpg","../image/image_16/16_Bayers_5.jpg"]},"Consult_chateau_formulaire9dbb":{"id":"Consult_chateau_formulaire9dbb","dept":"16","canton":"Val-de-Tardoire","commune":"Feuillade","nom":"Belleville_Feuillade","type":"Château","periode":"XIII-XIV-XVII","histoire":"BELLEVILLE, situé près de l'église, était le siège d'une autre seigneurie relevant de l'évêché d'Angoulême et appartenant à la famille Vigier, d'Angoumois. En 1514, Jean Hélie de Colonges, le fortuné prieur de Bussière-Badil l'acquit et eut l'autorisation royale d'y construire une maison. Entre les XVIIe et XIXe siècles, le château passa par alliance aux de Roffignac, puissante famille du Limousin. À la fin du XIXe siècle, Belleville était possédé par la famille Lévy, puis par les de Roussel de Préville au XXe siècle. \r\nFEUILLADE, aux XIIIe et XIVe siècles, changea fréquemment de propriétaires. D'abord possédé par Guillaume Robert, baron de Marthon, il passa par alliance à la famille de Villebois. Puis par un traité de 1365, le fief passa à Émery et Ythier de Saint-Laurent, et il resta à cette famille jusqu'au XVIIIe siècle. François de Saint-Laurent étant mort sans héritier direct, le fief de Feuillade revint à son gendre, Bernard Texier, marquis de Javerlhac, jusqu'à la Révolution. Il ne reste plus aucun vestige du château de Feuillade.   \r\nMOTHE,  appartenait aussi aux Vigier. Il passa par alliance aux Saint-Laurent, puis presque immédiatement au marquis de Javerlhac, Bernard Texier. La Petite Mothe, logis du XVIe siècle, était le lieu de résidence de ce marquis. Il fut vendu en 1795 aux Guyot, puis passa par mariage au siècle suivant aux Hériard, qui le possédèrent jusqu'au XXe siècle.","architecture":"BELLEVILLE,  corps de logis rectangulaire à deux niveaux avec lucarnes sur toit brisé, accolé d'une grosse tour ronde toit en poivrière et au portail une tour ronde crénelée    Le château de Belleville remonte au XVIe siècle. Son beau corps de logis sorne sur sa façade sud dune tourelle chapeautée dun toit en poivrière. Une autre tourelle agrémente son angle nord-ouest. Cet édifice possède une grosse tour ronde isolée, vestige dune époque plus reculée.          FEUILLADE  est une construction qui se trouve près du pont. Elle possède une tour ronde récemment restaurée. Le logis de Crognac est une vaste bâtisse qui date du XVIIIe siècle. Sur la façade nord subsiste une porte voûtée ancienne,   corps de logis rectangulaire à deux niveaux avec lucarnes, accolé d'une grosse tour ronde toit en poivrière\r\nChâteau de la Petite Mothe et son pigeonnier, de plan en U propriétés privées.","habitants":"Feuillade Famille  d'Émery et Ythier de Saint-Laurent                                                                       Belleville et la Mothe famille Vigier\r\n        \"","divers":"Belleville_GPS : 45° 36' 28\" Nord et 0° 28' 21\" Est, la Petie Mothe grav 6-7-8","gps":"45° 36' 28\" Nord et 0° 28' 21\" Est, la Petie Mothe grav 6-7-","images":["../image/image_16/16_Belleville_Feuillade_1.jpg","../image/image_16/16_Belleville_Feuillade_2.jpg","../image/image_16/16_Belleville_Feuillade_3.jpg","../image/image_16/16_Belleville_Feuillade_4.jpg","../image/image_16/16_Belleville_Feuillade_5.jpg","../image/image_16/16_Belleville_Feuillade_6.jpg","../image/image_16/16_Belleville_Feuillade_7.jpg","../image/image_16/16_Belleville_Feuillade_8.jpg","../image/image_16/16_Belleville_Feuillade_9.jpg"]},"Consult_chateau_formulaire40aa":{"id":"Consult_chateau_formulaire40aa","dept":"16","canton":"Chalais","commune":"Saint-Avit","nom":"Bellevue_St-Avit","type":"Château","periode":"XVII","histoire":"BELLEVUE Le château de Bellevue, au sud de la commune, peut dater du tout début du XVIIe siècle. Sous l'Ancien Régime, il était la propriété de la famille de Poncharral, dont deux membres, Daniel-Louis de Poncharral, marquis de Pouillac, et son fils, Jean-Baptiste de Poncharral, furent lieutenants des maréchaux de France, en Saintonge. Le fils de ce dernier, Eutrope-Louis-Alexandre de Poncharral, marquis de Pouillac, ne put divorcer de sa femme, mena une vie dissolue et fut bientôt ruiné. Ses héritiers durent vendre le château en 1861 à M. Paulin de Lamballerie. Il fut ensuite la propriété de M. Auger, négociant à Montmoreau, qui l'a fait restaurer en le reconstruisant quasiment entièrement.  Aujourd'hui chambres d'hôtes de Gabrielle Braschler Wenger","architecture":"Bellevue, du XVIIe siècle, est dans la commune de Saint-Avit, mais la châtellenie englobait aussi une partie de Bazac. Le corps de logis de plan en T à deux niveaux  sur soubassements avec une série de lucarnes sur combles  recouvert d'ardoises deux échauguettes sur encorbellements aux angles du corps de logis et à l'opposé donjon carré à mâchicoulis et créneaux sous un toit pointus à quatre pans.","habitants":"Famille de Poncharral\r\n        \r\n        \r\n        \r\n        \"","divers":"Bellevue   (45°14'14.1\" N) / 0.049750 (0°2'59.1\" E)","gps":"","images":["../image/image_16/16_Bellevue_St-Avit_1.jpg","../image/image_16/16_Bellevue_St-Avit_2.jpg","../image/image_16/16_Bellevue_St-Avit_3.jpg","../image/image_16/16_Bellevue_St-Avit_4.jpg","../image/image_16/16_Bellevue_St-Avit_5.jpg"]},"Consult_chateau_formulairea2d7":{"id":"Consult_chateau_formulairea2d7","dept":"16","canton":"Charente-Bonnieure","commune":"Benest","nom":"Benest","type":"Château","periode":"XIV-XVII","histoire":"Deux chateaux à Benest celui d'Ordières et  de la Borderie                                                                           ORDIERES,  au XIVe siècle le fief   appartenait à la famille de La Rochefoucauld et le donjon date de cette époque. Le document le plus ancien rapporte qu'en 1486 Pierre de Fontlebon rend hommage pour Ordières au comte de La Rochefoucauld. Geoffroy Pastoureau devient seigneur d'Ordières en 1530. Son descendant indirect Abel Pastoureau fit construire le logis central et sculpter les armoiries en 1617. Sa fille apporte Ordières à Pierre de Monéïs, et la famille Monéïs gardera le château jusqu'à la Révolution. Vendu comme bien national Ordières est acheté par Jean-Baptiste Grellier, huissier à Confolens, est inscrit partiellement aux M.H. le 13/04/1989 pour sa Tour, au Sud-Est, qui représente l'ancien donjon, sa façade nord et sa toiture.                                                   \r\nBORDERIE, gîtes de France de Mr Julien Sabatier.","architecture":"ORDIERES, sa construction date du XVe au XVIIe siècle. Ordières était entouré de deux enceintes de défense. L'enceinte extérieure était constituée des dépendances et de la fuie. Pour accéder à la cour, la seconde enceinte se passe par une porte qui comportait une herse percée dans un bâtiment entre deux tours rondes munies de meurtrières. La cour comporte un donjon de neuf mètres de diamètre et aux murs de deux mètres d'épaisseur couronné de mâchicoulis. Le rez-de-chaussée, sans ouverture est circulaire et vouté en coupole alors que les pièces des trois étages sont carrées reliées par un escalier à vis qui donne aussi sur une bretèche servant de latrines. Il pourrait dater du XIVe siècle et être antérieur au logis avec qui il communique par un pont volant au niveau du second étage. Le logis à fenêtres à meneaux est centré par une tour d'escalier polygonale qui est surmontée d'une bretèche. Sa porte est surmontée d'une remarquable sculpture des armoiries des Pastoureau supportées par des griffons, la tour sud-est qui est un ancien donjon, les bâtiments au nord constitués des tours d'angle et du bâtiment central.      BORDERIE  château du XIXe siècle, corps de logis central de plan rectangulaire à deux niveaux  et trois lucarnes accolés sur le toits en croupes recouvert d'ardoises, pavillons sur les flancs latéraux du château à trois niveaux toits en croupe.","habitants":"Famille de Geoffroy Pastoureau \r\n        \"","divers":"Borderie grav 1-2                                                 Ordières  46° 03' 01\" Nord, 0° 28' 24\" Est grav 3-4-5","gps":"","images":["../image/image_16/16_Benest_1.jpg","../image/image_16/16_Benest_2.jpg","../image/image_16/16_Benest_3.jpg","../image/image_16/16_Benest_4.jpg","../image/image_16/16_Benest_5.jpg"]},"Consult_chateau_formulairea891":{"id":"Consult_chateau_formulairea891","dept":"16","canton":"Tude-Lavalette","commune":"Blanzaguet-Saint-Cibard","nom":"Blanzaguet","type":"Château","periode":"XII-XVI","histoire":"BLANZAGUET, à  Blanzaguet se trouvait la tour des Poitevin dont parle le chroniqueur de l'Historia Pontificum et Comitum Engolismensium en 1159, tour dont ce sont peut-être les vestiges qu'on peut voir à l'ouest de la partie du château remaniée par les Galard de Béarn. Les Poitevin sont restés seigneurs de cette commune avant le XIIe siècle jusqu'au milieu du XVIe siècle. Par la suite la seigneurie est passée par mariage à la famille de Xans ou de Sans et ceci presque jusqu'au milieu du XVIIe siècle. En 1616, par mariage avec un Galard de Béarn et un fils de cette union, elle restera aux Galard de Béarn jusqu'en 1759. Le château actuel a été construit au XVIe siècle. En 1757 ou 1759, Philippe-Paul de Maillard devient seigneur de Blanzaguet à la suite de son mariage avec Jeanne de Galard, fille de Pierre de Galard de Béarn. En 1762 le château est vendu à François d'Aubert d'Aubuf, dernier seigneur jusqu'à la Révolution. Après la Révolution, le château a été vendu comme bien national le 12 messidor an IV, mais a été racheté, ainsi que le terrain attenant, par la commune en 1867 à dame Dubois-Lacroix et sieur Blanchard pour en faire la mairie, l'école et le presbytère.","architecture":"BLANZAGUET, La construction date du XVIe siècle. La mairie est installée dans les murs du château de Blanzaguet, domine le Voultron. Le bâtiment à étage et toit de tuiles plates forme une équerre. Le château possédait deux tourelles cylindriques. L'échauguette ou poivrière située au nord a disparu avant 1867. La tour située à l'angle ouest demeure; elle est couverte de tuiles plates. Lors de la transformation en mairie-école par la commune, les viviers et le puits, situé dans la cour d'honneur, ont été comblés. Toutes les fenêtres ont été remaniées. Il restait aussi un joli portail d'entrée en 1844.","habitants":"Famille de Philippe-Paul de Maillard\r\n        \"","divers":"Blanzaguet GPS : 45° 24' 00\" Nord et 0° 07' 45\" Est grav 1 à 5,                                                                       logis Peyrat grav 6","gps":"45° 24' 00\" Nord et 0° 07' 45\" Est grav 1 à 5,","images":["../image/image_16/16_Blanzaguet_1.jpg","../image/image_16/16_Blanzaguet_2.jpg","../image/image_16/16_Blanzaguet_3.jpg","../image/image_16/16_Blanzaguet_4.jpg","../image/image_16/16_Blanzaguet_5.jpg","../image/image_16/16_Blanzaguet_6.jpg"]},"Consult_chateau_formulaire092f":{"id":"Consult_chateau_formulaire092f","dept":"16","canton":"Tude_Lavalette","commune":"Bonnes","nom":"Bonnes","type":"Château","periode":"XII-XIV-XVI","histoire":"BONNES; la seigneurie de Bonnes rendait hommage au château d'Aubeterre et aurait appartenu aux Lambert au XIIe siècle, aux La Roche au XIVe siècle. Robert de La Marthonie, maître d'hôtel de François Ier épouse Jeanne de Cablanzac qui lui apporte Bonnes dont il va reconstruire le château au tout début du XVIe siècle. La seigneurie de Bonnes fut une seigneurie importante, non par la taille de son domaine mais par les personnages qui en furent les seigneurs. Elle fut dabord le berceau de la famille de Lambert de Saint-Bris, dont une branche resta en Périgord et une autre devint les marquis de Saint-Bris (dans lAuxerrois), au XVIIe siècle, après avoir, comme plusieurs gentilshommes du Périgord, aidé Henri IV à la conquête du trône. Suite à des litiges en 1659 le château de Bonnes revient à Marie de Pompadour, marquise d'Aubeterre. La famille de Pompadour sentend avec François dEsparbès de Lussan, le maréchal dAubeterre, premier du nom, pour conclure un mariage entre Marie de Pompadour, demoiselle de Bonne, avec François II dEsparbès de Lussan. La famille de Pompadour connaissait bien la vallée de la Dronne : une demoiselle de Pompadour fut lépouse de François II Bouchard dAubeterre, une autre était la mère de Robert de La Marthonie.  Ce château sera le lieu de résidence des châtelains d'Aubeterre jusqu'à la vente en 1770 à Jean-Baptiste Perrier de Gurat qui démembre et vend ses terres à partir de 1802.","architecture":"BONNES, il a été édifié au début de la Renaissance sur le château médiéval de la seigneurie de Bonne et remanié au XVIIe siècle, avec une de ses façades en style classique. Il a été en grande partie détruit à la Révolution. La partie de style Renaissance était constituée de deux ailes en équerre, trois tours et une porterie. Puis des agrandissements (prolongement d'une aile) et embellissements ont été effectués au XVIIe siècle. Du château de Bonnes il ne reste autour de la cour rectangulaire que le logis avec accolé un pavillon quadrangulaire à couverture en pyramide et une aile perpendiculaire datant du début du XVIe siècle. Une autre aile et une tour ont disparu. Le château a été en partie inscrit M.H. le 10 avril 1974 pour l'aile Renaissance et le 4 décembre 1995 pour les deux ailes du château, à l'exclusion de la partie construite au XXe siècle. Lédifice est lobjet dun programme de restauration important depuis lannée 2007.","habitants":"Famille de Lambert de Saint-Bris\r\n        \"","divers":"Bonnes GPS : 45° 14' 23\" Nord et 0° 09' 01\" Est","gps":"45° 14' 23\" Nord et 0° 09' 01\" Est","images":["../image/image_16/16_Bonnes_1.jpg","../image/image_16/16_Bonnes_2.jpg","../image/image_16/16_Bonnes_3.jpg"]},"Consult_chateau_formulaire07b8":{"id":"Consult_chateau_formulaire07b8","dept":"16","canton":"Roullet-St-Estèphe","commune":"Bouëx","nom":"Bouex","type":"Château","periode":"XV","histoire":"BOUEX,  l'existence des seigneurs de Bouëx est attestée dès le Moyen Âge. En 1452, Jean de La Rochefoucauld fait don de ce fief aux frères de Livenne. En 1629 Bouex est vendu à Jean Arnauld.  Le château féodal, situé près de l'église, date des XVe et XVIe siècles. Les Arnaud, seigneurs de Bouex, étaient une ancienne famille angoumoisine. Jean Arnaud a été maire d'Angoulême en 1682, et son fils jusqu'à 1686, ainsi que son neveu de 1721 à 1723. La terre de Bouëx passa par mariage et héritage à la famille de Jovelle, qui la conserva pendant une grande partie du XIXe siècle, puis passa à Jean de la Boutelière au début du XXe siècle. L'orangerie du château, qui était remarquable, fut vendue en 1893 à la ville de Bordeaux.","architecture":"BOUEX, comporte deux corps de logis en équerre qui sont attenants à l'église à leur jonction. Le plus ancien comporte des caves à deux niveaux du XVe siècle. Il possède deux tours carrées de faible section à toit pointu couvert de tuiles plates dont une est sur la façade extérieure. L'autre corps de logis est un rez-de-chaussée avec lucarnes dans le toit en brisis. Une tour de guet carrée est séparée des autres bâtiments.  Le château de Bouëx est inscrit aux M.H. depuis 2009.","habitants":"Famille de  Jean de La Rochefoucauld\r\n        \"","divers":"Boueïx GPS : 45° 36' 53\" Nord et 0° 19' 03\" Est","gps":"45° 36' 53\" Nord et 0° 19' 03\" Est","images":["../image/image_16/16_Bouex_1.jpg","../image/image_16/16_Bouex_2.jpg"]},"Consult_chateau_formulaireda13":{"id":"Consult_chateau_formulaireda13","dept":"16","canton":"Cognac","commune":"Javrezac","nom":"Bouquet_Javrezac","type":"Manoir","periode":"XVII","histoire":"BOUQUET Le fief de Javrezac appartenait aux Bernard de Javrezac auxquels ont succédé les Céris alors que les fiefs d'Angeliers et de Monsauson étaient aux Pons de la Gourgue qui les vendirent aux Brémond d'Ars au XVIIe siècle.Bernard de Javerzac, qui était en partie seigneur de Javerzac est un poète du XVIIe siècle, mort après 1660 qui a publié une entière description de la ville de Cognac en 1625 , le logis du Bouquet a appartenu à la famille Broussard. En 1696, Bertrand Broussard est gentilhomme de la grande vénerie du Roi. Il passe ensuite aux Lecoq de Boisbaudran puis au marquis de La Porte aux Loups. A la Révolution, il sera confisqué puis racheté par les Lecoq de Boisbaudran. Le Logis du Bouquet fut ensuite transmis, par un mariage, à Pierre-Étienne Albert qui devint maire de Cognac, de 1791 à 1794. Bernard de Javerzac, qui était en partie seigneur  est un poète du XVIIe siècle. Il est aussi l'un des ancêtres de François Mitterrand. Le 7 mars 1787 les représentants de Javrezac à l'assemblée préliminaire des états généraux qui se tient à la salle capitulaire des Récollets de Cognac sont Landard et François Billard. Aujourd'hui chambres d'hôtes.","architecture":"BOUQUET, de style Renaissance, le logis du Bouquet porte le date de 1670 sur son portail. Il aurait été un relais de chasse du roi François Ier. C'est un beau manoir qui date du XVIIe ou XVIIIe siècle, à un niveaux et attiques.","habitants":"Famille de Bernard de Javerzac\r\n        \"","divers":"Bouquet GPS : 45° 42' 21\" Nord et 0° 22' 19\" Ouest","gps":"45° 42' 21\" Nord et 0° 22' 19\" Ouest","images":["../image/image_16/16_Bouquet_Javrezac_1.jpg"]},"Consult_chateau_formulairec201":{"id":"Consult_chateau_formulairec201","dept":"16","canton":"Jarnac","commune":"Bourg-Charente","nom":"Bourg_Charente","type":"Château","periode":"XV-XIX","histoire":"Trois châteaux à Bourg celui de Bourg,  de Cresse et de Tilloux.                                                                     BOURG-CHARENTE, en 1262, Bourg appartient déjà à la famille Ollivier. En 1363 messire Ollivier, baron de Bourg,  Il est passé ensuite aux familles Bragier, Gouffier, Pons de Pons, au comte de Miossens gouverneur de Guyenne. Le château actuel a été construit par Pons de Pons, pour remplacer le château fort détruit par le maréchal de Sancerre en essayant de le reprendre aux Anglais.  Le Camus de Neville en fut le dernier seigneur. En 1921 il est racheté par la famille Marnier-Lapostolle  Aujourd'hui propriété d'Alexandre Pélisson. \r\nCRESSE, construit par  Jacques Pierre Salimon, seigneur de Moulineuf et de Cressé. Il a ensuite été acheté par la famille Martell et c'est Gabriel Martell qui a fait construire le château actuel. Le château  appartenait à Mr Gabriel Martell.                              TILLOUX, a appartenu à  M. Harris Favraud, siège d'une seigneurie dont les possesseurs, à la fin du XVIe siècle étaient Jean Vinsonneau, écuyer, sieur de Lapréruse, et Jeanne Geoffrion, son épouse. Leur fille, Jacquette Vinsonneau, leur succéda et porta la terre de Tilloux à son époux, Charles de Crugy de Marcillac, capitaine des gardes du duc d'Épernon, qui fut nommé, en 1624, capitaine du château de Châteauneuf. Charles de Marcillac se distingua au siège de La Rochelle, en 1628, et fut tué au siège de Privas, en 1631. Le membre le plus remarquable de la famille de Marcillac, qui conserva la terre de Tilloux jusqu'à la fin du XVIIIe siècle, fut Jean-Louis de Marcillac, il prit part au siège de Maastricht en 1673. Janek Polha est depuis président de la société du château.","architecture":"BOURG-CHARENTE, du château et de sa chapelle situés à cet emplacement en 1264 et détruits en 1378, il est possible qu'il reste le fossé et un morceau de tour au nord-ouest. Le pavillon sud a été remonté au XIXe siècle  de style Renaissance le logis principal, rectangulaire, est surmonté d'une balustrade et flanqué d'un pavillon à très haut toit pyramidal. L'aile en retour d'équerre a des créneaux ornés de cartouches prises au château de Bouteville. La cheminée monumentale vient aussi de ce château. \r\nCRESSE, a été construit en 1875. Le château de Cressé actuel a été construit  au XVIIIe siècle à Jacques Pierre Salimon Il servit à différentes uvres sociales. Vaste demeure rectangulaire flanquée d'un côté d'un pavillon polygonal, de l'autre d'une tourelle et centré par un pavillon en avant-corps. Son originalité vient de l'alliance de la brique et de la pierre et son élégance des lucarnes du second étage à fronton triangulaire. Le château de Cressé a depuis été transformé en résidence de retraite EHPAD.              TILLOUX, fut démoli au moment de la Révolution, et le domaine fut morcelé,  est une construction \"moderne\" édifiée en 1872.                                                            Le manoir de MOULINEUF  existait en 1176, date à laquelle il a été pris par Richard Cur de Lion.","habitants":"Bourg-Charente famille Marnier-Lapostolle            Cresse Gabriel Martel                                            Tilloux famille de Marcillac\r\n        \"","divers":"Cressé  GPS : 45° 40' 21\" Nord et 0° 12' 05\" Ouest  grav 1-2-3                                                                      Bourg Charente GPS : 45° 40' 36\" Nord et 0° 13' 38\" Ouest grav  4-5-6                                                             Tilloux   45° 40' 25\" Nord et 0° 13' 11\" Ouest      Grav-7","gps":"45° 40' 21\" Nord et 0° 12' 05\" Ouest  grav 1-2-3","images":["../image/image_16/16_Bourg_Charente_1.jpg","../image/image_16/16_Bourg_Charente_2.jpg","../image/image_16/16_Bourg_Charente_3.jpg","../image/image_16/16_Bourg_Charente_4.jpg","../image/image_16/16_Bourg_Charente_5.jpg","../image/image_16/16_Bourg_Charente_6.jpg","../image/image_16/16_Bourg_Charente_7.jpg"]},"Consult_chateau_formulaire2b8b":{"id":"Consult_chateau_formulaire2b8b","dept":"16","canton":"Boixe-et-Manslois","commune":"Valence","nom":"Bourgon","type":"Maison-Forte","periode":"XIII-XV","histoire":"BOURGON, la seigneurie de Bourgon relevait de la châtellenie de Verteuil. Le premier seigneur connu est Guillaume de Bourgon. Au début du XVe siècle elle tombe par alliance aux de Barbezières, qui se transmettent le domaine, souvent par les cadets (branche des seigneurs de Saint- Mary), sans doute jusqu'au milieu du XVIIe siècle, puisqu'un Jean de Barbezières, seigneur de Bourgon, est cité en 1674, le domaine est acheté par Jean Martin, parmi les membres de cette famille Jacques Martin de Bourgon, chevalier de l'ordre de Saint-Louis, gouverneur de Cayenne et de Guyane. En 1778 le château semble avoir changé de main puisque c'est là que nait Guillaume de La Croix de Bourgon, remarquable homme d'armes qui fait les campagnes d'italie et de Russie, participe aux batailles d'Iéna, de Wagram, de Leipzig et qui meurt général après la bataille de Waterloo. Après la Révolution Française (1802), Bourgon est vendu comme bien national à Maître Guyot, notaire à Angoulême, et passe par alliance aux familles Hériard, Mimaud-Grand-Champs, Jourdain et Gervais de Lafond. Aux XIXe et début XXe siècles, les propriétaires résident à Angoulême et le château est utilisé comme relais de chasse.","architecture":"BOURGON, le début de la construction date du XIIIe siècle, à lépoque il était fortifié, il subsiste un impressionnant pont à trois arches qui emjambe les douves aujourdhui asséchées. A lorigine le château était entouré dun vaste étang, un pont levis interrompait le pont de pierres avant de pénétrer par le porche dans la cour du château. Cette seule entrée était flanquée de deux tours massives dont lune a été conservée, lautre sert de fondation à la chapelle construite en 1528 par les Montécler. Peu avant cétait lépoque de loccupation anglaise qui a laissé sa trace avec les fenêtres à meneaux dangles. Puis une période plus stable a permis dentreprendre la partie « Renaissance » du château avec la cheminée monumentale en granit ornée des armes de la famille Montécler. Une porte en ogive sculptée souvre sur un escalier à vis comptant 70 marches et qui mène aux chambres peintes, en 1580 et 1625, dont le célèbre cabinet bleu de la marquise de Sablé. Dautres parties ont été ajoutées au XVII et XVIIIe siècle dont les communs, contruits par Pierre le Nicolais, négociant en toiles de Mayenne et dont la correspondance est gardée aux archives de Laval. Le bassin de teinture est situé dans les anciennes douves. Cest un précieux témoignage du commerce triangulaire de lépoque.","habitants":"Famille Jacques Martin de Bourgon\r\n        \r\n        \r\n        \"","divers":"Bourgon GPS : 45° 53' 16\" Nord et 0° 18' 49\" Est","gps":"45° 53' 16\" Nord et 0° 18' 49\" Est","images":["../image/image_16/16_Bourgon_1.jpg","../image/image_16/16_Bourgon_2.jpg","../image/image_16/16_Bourgon_3.jpg","../image/image_16/16_Bourgon_4.jpg"]},"Consult_chateau_formulaire98b7":{"id":"Consult_chateau_formulaire98b7","dept":"16","canton":"Charente-Champagne","commune":"Bouteville","nom":"Bouteville","type":"Vestige-Forteresse","periode":"XI-XVI","histoire":"BOUTEVILLE, repasse plusieurs fois aux Français mais les Anglais y sont encore en 1445, avant leur retrait définitif. Ruiné par la guerre de cent ans, il est restauré en 1453 par Jean d'Orléans. Les parents de François Ier, Charles d'Orléans, comte d'Angoulême, et Louise de Savoie aimaient Bouteville. Après eux vient les Montmorency. François de Montmorency-Bouteville s'illustrera tristement à Paris par son duel qui lui vaudra d'être décapité. Lors des guerres de Religion, le château fut l'objet de luttes entre catholiques et protestants, et il est de nouveau en ruines en 1598. Le domaine devient possession de Bernard de Béon du Massès, à la fin du XVIe siècle, qui de 1593 à 1608, date de sa mort, commence à construire le dernier château sur les ruines du précédent. Sa veuve, Louise de Luxembourg, fait poursuivre les travaux qui dureront jusqu'en 1624 ; mais un état dressé à cette date indique que seul le gros uvre est achevé, pas la décoration. Le domaine de Bouteville est resté dans la maison de Béon jusqu'en 1726, date de son engagement à Henri de Bruzac-Hautefort, major des gardes du corps. Il y habite jusqu'en 1736, faisant procéder à des transformations importantes. Il meurt en 1751. Il est en très mauvais état quand, en 1788, il entre dans l'apanage du comte d'Artois, qui commence sa rénovation. À la Révolution, les travaux sont achevés, mais le château est séquestré à la suite de l'émigration du comte d'Artois. Il est alors vendu à Antoine Marcombe, marchand de Bouteville, qui commence aussitôt les démolitions. Ainsi la cheminée monumentale est remontée au château de Bourg-Charente.","architecture":"Bouteville, construction de la forteresse au XIe siècle. le château a la forme classique d'un quadrilatère. L'entrée est en haut à droite. Il forme un imposant ensemble en ruines de bâtiments entourant une vaste cour. L'entrée se fait par un pont et une poterne. Les bâtiments sont sur trois côtés, et un mur forme le quatrième. On trouve une tour et une tourelle à deux des angles de grosseur inégale, de deux ailes en retour d'équerre dont l'une au nord renfermait  une galerie à deux niveaux et d'une aile basse fermant la cour. cette aile comportait en son centre un pavillon carré  dans lequel s'ouvrait le porche d'entrée, précédé  par un pont-lavis. Des décors sont encore présents, en particulier au-dessus des fenêtres restantes.  Ainsi la cheminée monumentale est remontée au château de Bourg-Charente. En 1929-1930, Richard de Segonzac, effectue à son tour quelques travaux, notamment la charpente de la grande salle, la démolition des restes de l'aile sud, l'aménagement de la terrasse de l'aile principale, la démolition du porche d'entrée de la cour. À partir de 1935, le domaine est la propriété de la famille de Joyet. Puis le château devient propriété de la commune de Bouteville.","habitants":"François de Montmorency\r\n        \"","divers":"Bouteville GPS : 45° 36' 01\" Nord et 0° 08' 07\" Ouest","gps":"45° 36' 01\" Nord et 0° 08' 07\" Ouest","images":["../image/image_16/16_Bouteville_1.jpg","../image/image_16/16_Bouteville_2.jpg","../image/image_16/16_Bouteville_3.jpg","../image/image_16/16_Bouteville_4.jpg","../image/image_16/16_Bouteville_5.jpg","../image/image_16/16_Bouteville_6.jpg","../image/image_16/16_Bouteville_7.jpg","../image/image_16/16_Bouteville_8.jpg"]},"Consult_chateau_formulaireac7b":{"id":"Consult_chateau_formulaireac7b","dept":"16","canton":"Charente-Champagne","commune":"Bonneuil","nom":"Breuil_Bonneuil","type":"Manoir","periode":"XV","histoire":"BREUIL, les possesseurs connus sont les d'Ingrandes. On attribue la construction du château actuel à Philippe d'Ingrandes à la fin du XVe siècle. Philippe d'Ingrandes aurait habité le château du Breuil entre 1508 et 1532 et la date de sa construction reste controversée, entre la fin du XVe siècle et 1535. Marie d'Ingrandes, célibataire, laisse le Breuil à ses neveux, les frères de Xant, et ce fut Louis, l'ainé qui le conservera; sa fille ainée, Magdeleine, décédée en 1716 donna le Breuil au petit-fils de sa tante, Marguerite de Xant, qui avait épousé un Leroy de Lenchères.  Le Breuil est resté dans la même famille ou ses alliés jusqu'en 1919, avec les de Xant puis les Le Roy de Lenchères, après le mariage de Marie-Magdeleine Babin de Ranville en 1716. Les Lenchères possédaient aussi la Tour du Breuil, à Dignac. En 1919, madame de Rancourt de Mimérand vend le château à monsieur Castillon du Perron. Dans les années 1960, le château appartient au docteur Brisset et sa femme. Il a été inscrit au M.H. le 23 juin 1952.","architecture":"BREUIL est construit sur une petite éminence baignée par un ruisseau dont la dérivation alimente les douves. La façade nord présente des tours rondes coiffées de hautes toitures terminées par des faîteaux en métal, des fenêtres à meneaux et des hautes lucarnes finement sculptées. La façade ouest est surmontée d'un pignon orné de crosses et la façade sur cour propose une tourelle accostée d'une gargouille et une tour contenant l'escalier en pierre; elle possède trois fenêtres superposées et est ornée d'une curieuse décoration de rosaces et de bustes, et de médaillons. Le milieu de la façade sud conserve une ligne indiquant l'arrêt de la première construction et le départ de l'adjonction. Côté cour il est précédé d'une terrasse à balustrades plus récentes que le logis. Celui-ci présente un étage et des lucarnes ornementées dans le toit en ardoises à double pente. En angle la tour d'escalier polygonale (et à toit polygonal lui aussi) présente une porte et des fenêtres agrémentées d'ornementations de style gothique. Les fenêtres du logis ont, elles, été agrandies sans doute au XVIIIe siècle.","habitants":"Famille Philippe d'Ingrandes\r\n        \"","divers":"Breuil  GPS : 45° 34' 22\" Nord et 0° 09' 13\" Ouest","gps":"45° 34' 22\" Nord et 0° 09' 13\" Ouest","images":["../image/image_16/16_Breuil_Bonneuil_1.jpg","../image/image_16/16_Breuil_Bonneuil_2.jpg","../image/image_16/16_Breuil_Bonneuil_3.jpg","../image/image_16/16_Breuil_Bonneuil_4.jpg"]},"Consult_chateau_formulaire0410":{"id":"Consult_chateau_formulaire0410","dept":"16","canton":"Roullet-St-Estèphe","commune":"Dignac","nom":"Breuil_Dignac","type":"Forteresse","periode":"XVII-XIX","histoire":"BREUIL, au XVIIIe siècle Arnauld de Boueix cède le Breuil à son parent Arnauld de Ronsenac, devenu par héritage la propriété de François de La Laurencie, marquis de Charras, baron de Neuvicq, maître de camp de Cavalerie, qui vendit le fief le 22 avril 1774, à Jean Le Roy de Lenchères, chevalier, brigadier des Armées du Roi, chevalier des Ordres de Saint Louis. Il était le second fils dAnthoine sieur du Breuil de Bonneuil. Ce Jean de Lenchères fut gouverneur de Corte, pacifia la Corse et mourut à 50 ans maréchal des Camps et Armées du Roi. Les Le Roy de Lenchères étaient une ancienne famille du pays, apparentés aux Galard de Béarn et dont le fief dorigine semble bien avoir été le Maine Léonard  qui est resté propriété des Lenchères jusque vers 1920. La petite-fille de Jean de Lenchères, Élisabeth, épouse Louis Benjamin Fernand des Roches de Chassay et lui apporte le Breuil vers 1845 . Leur fille et héritière, Odette des Roches de Chassay (1846-1940, arrière-grand-mère de lactuelle propriétaire) épousa Armand de Laferrière qui laissa cette propriété à son second fils Robert de Laferrière, lequel, sans enfant, eut comme héritière sa nièce Marie-Thérèse de Laferrière, épouse du colonel Xavier de Villemandy de La Mesnière, père de Bruno de Villemandy de La Mesnière, fils unique et propriétaire actuel. Pour mémoire  Odette de Chassay avait deux surs qui devinrent, lune, Catherine, Mme de Larivière et lautre, Marguerite, Mme X. Vignaud dEssenat, et un frère, Richard, qui mourut pour la France pendant la guerre de 1870-1871.","architecture":"BREUIL-DIGNAC, la tour domine un ensemble de bâtiments établis autour d'une cour rectangulaire. C'était un élément séparé entouré de d
