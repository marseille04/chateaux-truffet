:"Château","img":"../image/image_17/17_Thors_1.jpg"},{"id":"Consult_chateau_formulaire974d","nom":"Thénac_Charente","commune":"Thénac","type":"Château","img":"../image/image_17/17_Th%c3%a9nac_Charente_1.jpg"},{"id":"Consult_chateau_formulaired0b3","nom":"Tillade","commune":"St-Simon de  Pélouaille","type":"Château","img":"../image/image_17/17_Tillade_1.jpg"},{"id":"Consult_chateau_formulaire2d8a","nom":"Tonnay_Boutonne","commune":"Tonnay-Boutonne","type":"Château","img":"../image/image_17/17_Tonnay_Boutonne_1.jpg"},{"id":"Consult_chateau_formulaire7f50","nom":"Tonnay_Charente","commune":"Tonnay Charente","type":"Château","img":"../image/image_17/17_Tonnay_Charente_1.jpg"},{"id":"Consult_chateau_formulaire4f4a","nom":"Usson_Pernan","commune":"Pons","type":"Château","img":"../image/image_17/17_Usson_Pernan_1.jpg"},{"id":"Consult_chateau_formulaire1cf6-3","nom":"Vallade_Rétaud","commune":"Retaud","type":"Château","img":"../image/image_17/17_Vallade_R%c3%a9taud_1.jpg"},{"id":"Consult_chateau_formulaire87e9","nom":"Villeneuve_Comtesse","commune":"Villeneuve la Comtesse","type":"Forteresse","img":"../image/image_17/17_Villeneuve_Comtesse_1.jpg"}];const FULL={"Consult_chateau_formulaire0987":{"id":"Consult_chateau_formulaire0987","dept":"17","canton":"Matha","commune":"Aulnay de Saintonge","nom":"Aulnay","type":"Donjon","periode":"XII","histoire":"AULNAY, aunedonacum, sur la voie romaine reliant Saintes à Poitiers a constamment été habitée et, du IXe siècle au XIIIe siècle, la seigneurie appartient à la famille Maingot. Après des passages aux Mortagne, aux Clermont, puis aux Montberon la seigneurie d'Aulnay est vendue. Louise de Savoie l'achète en 1506 et le donne à Charles d'Orléans avec retour au domaine royal à sa mort. Donné à Marie Stuart comme complément de douaire, il y revient à son exécution. Il passe par de nombreux propriétaires pour finir par être vendu le 8 thermidor an XIII.","architecture":"AULNAY, le château a disparu, les dernières ruines ont été nivelées en 1840. Les pierres ont  été utilisées dans les constructions de l'époque et de nombreuses pierre ciselées sont visibles aux détours des petites rues du village.  Le donjon du XIIe siècle s'élève sur un tertre circulaire. C'est une tour ronde de 15 mètres de haut, l'entrée donne dans un escalier en colimaçon situé dans l'épaisseur du mur, les deux étages ont des planchers et ne sont éclairés que par des meurtrières. Le pigeonnier est une imposante fuie ronde qui a perdu sa toiture. Les vicomtes d'Aulnay (vicomtes d'Aunay), qui furent la souche d'autres familles seigneuriales du Poitou et de la Saintonge, habitaient un château, démoli en 1818, et dont une tour subsiste encore.","habitants":"Famille Maingot\r\n        \r\n        \"","divers":"Châteaux à Aulnay 46° 01' 12\" nord, 0° 20' 46\" ouest","gps":"","images":["../image/image_17/17_Aulnay_1.jpg","../image/image_17/17_Aulnay_2.jpg","../image/image_17/17_Aulnay_3.jpg"]},"Consult_chateau_formulairef7c2":{"id":"Consult_chateau_formulairef7c2","dept":"17","canton":"Chaniers","commune":"Authon-Ebéon","nom":"Authon","type":"Château","periode":"XV","histoire":"AUTHON, la famille d'Authon est mentionnée dès le IXe siècle. Roland d'Authon est un compagnon de Saint-Louis. La motte féodale passée aux seigneurs de Brizambourg, leur revient en 1500. En 1651, durant la fronde le château est pris par le prince de Condé. Le logis seigneurial est élevé en 1607 par Seguin d'Authon, conseiller du roi et sénéchal de Saintonge, alors que la famille d'Authon est à son apogée, son autorité s'étendant jusqu'à l'île d'Oléron. Au XVIIe siècle, ils sont sénéchaux héréditaires de Saintonge. Authon est pillé et incendié en 1791 et l'aile nord disparaît.","architecture":"AUTHON, le château est bâti sur une terrasse cernée de douves alimentées en eau par une dérivation de la rivière Dandelot qui forme une courtine. Il a fait l'objet de destructions et de restaurations nombreuses et cest Marcelin Normand dAuthon qui est à lorigine des transformations les plus marquantes. Vers 1500, construction d'un corps de logis agrémenté d'une galerie italianisante.   En 1580 construction de la tour des gardes et en 1607 modification de la façade avec de hautes ouvertures et des mansardes ornées de frontons de pierres sculptées.  Il a été remanié aux cours des siècles suivants. La tour des gardes et la porte d'entrée du château datent de 1580, et le pavillon d'angle à fenêtres à meneaux de 1606.  De 1875 à 1878 des travaux lui donnent son aspect actuel, ils n'ont laissé que la tour des gardes et les bâtiments de 1607. Une chapelle romane existait qui a été détruite en 1878.","habitants":"Famille d'Authon \r\n        \r\n        \"","divers":"Château à Authon  45° 50' 07\" nord, 0° 24' 14\" ouest","gps":"","images":["../image/image_17/17_Authon_1.jpg","../image/image_17/17_Authon_2.jpg","../image/image_17/17_Authon_3.jpg","../image/image_17/17_Authon_4.jpg"]},"Consult_chateau_formulaire2654":{"id":"Consult_chateau_formulaire2654","dept":"17","canton":"Saint-Porchaire","commune":"Balanzac","nom":"Balanzac","type":"Château","periode":"XVI","histoire":"BALANZAC,  est attesté qu'en 1336, Jeanne d'Ars, dame d'Ars et de Balanzac, épouse Guillaume de Brémond. En 1652 le château de Balanzac était suffisamment fortifié pour que la population du village y trouve refuge. Nicolas Pasquier (1561-1631) seigneur de Mainxe et de Balanzac, époux de Suzanne de Brémond d'Ars, lieutenant général au présidial de Cognac, maître des requêtes de l'Hôtel du Roi, écrivain, fils d'Etienne Pasquier, avocat général du Roi en la chambre des Comptes, écrivain et poète de la Renaissance.","architecture":"BALANZAC Une partie remonte au début du XVIe siècle. Il est au centre d'une vaste enceinte qui présente encore quelques éléments de défense. La construction du château de Balanzac remonte au XVIe et XVIIIe siècle. Il a été fortifié au XVIe siècle avec la pose de tourelles et d'un encorbellement,  le château se situe à l'intérieur d'une enceinte ovale, entourée de bâtiments de communs du XVIIIe siècle, au sud et à l'est du logis. L'enceinte conserve les bases de tours carrées et une chapelle du XVIe siècle construite selon le même principe que la partie haute de la tour du logis, les galeries datent du XVIIe siècle , étroite en retour d'équerre, aux ouvertures en demi-cercle, part de l'élévation postérieure pour rejoindre l'enceinte. Le logis a été recouvert de dalles plates en 1703. Ce logis présente à ses quatre angles des échauguettes soutenues par des contreforts très massifs. Leurs ouvertures sont agrémentées d'un petit fronton triangulaire. Une d'elles a fait office de pigeonnier.  Le corps de logis rectangulaire possède, au centre de son élévation antérieure, une tour massive hexagonale enfermant un escalier à vis,  Après 1703 la toiture est en partie modifiée avec un brisis au niveau des combles et les tuiles plates sont remplacées par des ardoises. Le puits couvert au centre de la cour est surmonté d'une coupole de pierre. Le château de Balanzac est classé aux M.H.en 1957","habitants":"Famille de guillaume de Brémond \r\n        \r\n        \"","divers":"Château à Balanzac 45° 44' 23\" nord, 0° 50' 15\" ouest","gps":"","images":["../image/image_17/17_Balanzac_1.jpg","../image/image_17/17_Balanzac_2.jpg","../image/image_17/17_Balanzac_3.jpg"]},"Consult_chateau_formulaireee5f":{"id":"Consult_chateau_formulaireee5f","dept":"17","canton":"Pons","commune":"Lorignac","nom":"Bardine","type":"Vestiges","periode":"XII-XIII","histoire":"BARDINE, est un ouvrage fortifié situé dans la commune de Lorignac. Aujourd'hui presque entièrement ruiné, il conserve néanmoins une partie de sa structure médiévale (corps de bâtiment, annexes, enceinte défensive). Remanié au XVIe siècle, il appartient à la veille de la Révolution au comte de Plassac. Cet ancien château fort, qui appartient à une personne privée, ne bénéficie pour l'heure d'aucune protection des M.H..","architecture":"BARDINE, le château fort de Bardine se dresse sur un côteau dominant la modeste vallée du Taillon, à proximité immédiate du hameau de La Roche, de style Médiéval,  fut construit au XII ou XIIIe siècle. En ruines, il ne reste que des vestiges aujourd'hui, il pourrait avoir succédé à un édifice plus ancien, dont il ne subsiste néanmoins aucun vestige.  Laissé à l'abandon depuis lors, il dresse ses quelques restes au milieu d'un champ, non loin de la route départementale. L'entrée principale, faisant face à l'ouest, est flanquée des restes de deux tours. À l'opposé, un corps de logis présente des ouvertures à créneaux et à impostes, de même qu'une ouverture en plein cintre qui devait correspondre à une ancienne porte d'entrée. Une aile, placée en équerre, vient se greffer sur le corps de logis principal, présentant encore des traces d'ouvertures, d'escaliers et de cheminées. \r\nDes souterrains, qui ne sont plus accessibles depuis longtemps, sont situés sous le château. Contreforts et barbacanes avec mâchicoulis, bien que fort dégradés, témoignent du caractère défensif du lieu.","habitants":"Comte de Plassac\r\n        \"","divers":"Vestiges du château à Bardine 45° 26' 44\" Nord et 0° 40' 56\" Ouest","gps":"","images":["../image/image_17/17_Bardine_1.jpg","../image/image_17/17_Bardine_2.jpg"]},"Consult_chateau_formulaire1c37":{"id":"Consult_chateau_formulaire1c37","dept":"17","canton":"Saintogue-Estuaire","commune":"Meschers","nom":"Bardon","type":"Château","periode":"XVI","histoire":"BARDON, mentionné dès le milieu du XVe siècle, ce domaine, auquel est lié le droit de nommer un prévôt pour la baronnie de Didonne, appartient alors à Jean de cette seigneurie  et à  la famille des du Breuil de Théon, qui l'acquirent en 1594. Madeleine du Breuil de Théon (1749-1812) l'apporta à son époux Henry-Mathieu Isle de Beaucheine qui en fut le dernier seigneur. Le château revient à leur fils Victor Isle (1789-1866), maire de Meschers, qui y mourut. Le seigneur Châteaubardon, époux d'Alix Gua. En 1584, le manoir passe à Jeanne de Montmorency, duchesse de Thouars, qui le transmet en 1592 à sa fille, Charlotte-Catherine de La Trémoille, veuve du prince de Condé. Dès 1595,  Château-Bardon est vendu à Gilles du Breuil, seigneur de Théon-de-Meschers.  Le domaine va demeurer dans les mains de ses descendants jusqu'au XIXe  siècle.","architecture":"BARDON, la construction  date du XVIe siècle.  Les bâtiments se répartissent principalement en deux ensembles. Une aile de communs, terminée par un logement, s'étire à l'est de la cour, et au nord, se trouve un pigeonnier. Le logis de plan en L, prend place au nord de la cour, entre elle et l'ancien parc. Une belle allée d'arbres relie le logis au portail. Les deux ailes du logis sont réunies par un pavillon surmonté d'un haut toit à croupes, couvert en tuiles plates, orné d'épis de faîtage. Comme ce pavillon, l'aile nord du logis comprend un rez-de-chaussée et un étage, auxquels s'ajoute un soubassement qui compense la pente du terrain.","habitants":"Famille des du Breuil de Théon\r\n        \"","divers":"Château à Bardon 45° 33' 27\" Nord, 0° 57' 14\" Ouest","gps":"","images":["../image/image_17/17_Bardon_1.jpg","../image/image_17/17_Bardon_2.jpg","../image/image_17/17_Bardon_3.jpg"]},"Consult_chateau_formulaire4fdb":{"id":"Consult_chateau_formulaire4fdb","dept":"17","canton":"Saint-Jean-d","commune":"Mazeray","nom":"Beaufief","type":"Château","periode":"XVI","histoire":"BEAUFIEF, le domaine appartint jusqu'en 1633 à la famille Abillon, échevins de Saint-Jean-d'Angély, dont Joachim fut maire en 1547, et son fils Jean en 1582. Par suite de mariages, successions et ventes, la seigneurie échut en 1763 à Pierre Auguste Perrodeau, issu d'une ancienne famille de robe, il  fut élu maire en 1765. Ayant ajouté le nom de Beaufief au sien, et ce patronyme aristocratique sera porté par ses descendants, dont son arrière-petit-fils Joseph-Edouard (1821-1908), le créateur vers 1860 de la station balnéaire de Ronce-les-Bains. Perraudeau fait démanteler les ruines de l'ancienne forteresse voisine des comtes de Taillebourg afin d'en récupérer des pierres et faire édifier en 1768 une nouvelle demeure, dont le garde-corps en fer forgé d'un balcon porte encore son chiffre. A partie  de 1923 le château passe entre les mains de plusieurs propriétaires. À la fin du XXe siècle, la maison quasi-ruinée fut acquise et restaurée par le comte Jehan Marie de la Tour de Geay (1913-1991) et par son épouse, née Jacqueline Collieaux , qui avaient fait de même à partir de 1952 au château d'Ecoyeux, \r\nLe Domaine de CHANCELEE  est un château bâti à Saint Jean-dAngely,  a 1km au nord. Durant le XIXe siècle, le domaine devient propriété de la famille Lair. Joseph Lair a été le maire de Saint-Jean-dAngély de 1879 à 1889 et il va avoir un impact important sur le rôle de Chancelée. Sans enfant, il va léguer la propriété de la bâtisse à la Ville pour quil y soit installé un refuge pour les enfants dans le besoin.","architecture":"BEAUFIEF, un premier château daterait du XVIe siècle, il a été reconstruit à échelle réduite en 1768. Il se caractérise comme une « folie » avec une allée centrale axiale qui traverse bois, parc et jardin. L'entrée se fait par une avant cour puis une cour dessinant un jardin à la française. Les huit boules de buis marquent depuis l'origine le dessin des parterres. Le logis à un étage et toit de tuiles romaines est centré par un pavillon sommé d'un fronton triangulaire surmonté d'un toit pyramidal couvert d'ardoises qui n'est pas d'origine et est probablement une adjonction du XIXe siècle. Les décors sont de style rococo. Les deux ailes latérales symétriques sont en arc-de-cercle. À l'extrémité Ouest la petite chapelle est de style Louis XV. Le 4 octobre 1973, le château (ses façades et ses toitures), l'escalier et sa rampe en fer forgé, en 1984, les restaurateurs de Beaufief ont reçu en outre le prix du concours \"Chefs-d'uvre en péril\". \r\nCHANCELEE, du XIXe siècle, le château en pierre de taille,  propose sur quatre niveaux, corps de logis  de deux niveaux et attiques rectangulaire flanqué de deux pavillons rectangulaires à une travée, prolongé d'ailes à deux niveaux et tour sur l'arrière. Deux extensions, à l'arrière et à la droite du château, donnent accès à la chaufferie, ainsi qu'à un bâtiment sur trois niveaux.","habitants":"Famille Abillon                                                     Famille de Joseph Lair \r\n        \r\n        \"","divers":"château de Beaufief  grav 1 à 4  45° 55' 30\" nord, 0° 33' 02\" ouest2                                                     Château de  Chancelée grav 5-6   45° 56' 48\" Nord, 0° 31' 46\" Ouest","gps":"","images":["../image/image_17/17_Beaufief_1.jpg","../image/image_17/17_Beaufief_2.jpg","../image/image_17/17_Beaufief_3.jpg","../image/image_17/17_Beaufief_4.jpg","../image/image_17/17_Beaufief_5.jpg","../image/image_17/17_Beaufief_6.jpg"]},"Consult_chateau_formulairee89a":{"id":"Consult_chateau_formulairee89a","dept":"17","canton":"Pons","commune":"Saint-Dizant du Gua","nom":"Beaulon_17","type":"Château","periode":"XV","histoire":"BEAULON, c'est vers 1480  la famille de Vinsons fait construire le château qui prendra le nom de Beaulon en 1510, lorsque la seigneurie de Saint-Dizant est acquise par la famille de Beaulon, en 1502. Après un incendie en 1510, le château est reconstruit par Jacques de Beaulon dans sa partie ouest dans le style Renaissance. Au début du XVIIe siècle, Monseigneur de Nesmond, évêque de Bayeux et conseiller de Louis XIV, devient par héritage le seigneur de Beaulon (La famille de Nesmond en sera propriétaire jusqu'en 1712) et le droit de haute justice est donné à la seigneurie en 1635.  Il fut au XVIIe siècle, la résidence d'été des évêques de Bordeaux. Par la suite, par alliance, le château de Beaulon sera, après la famille de Nesmond, la propriété des familles de Bigot, de Brémond d'Ars, en 1833 acquis par M. Manès dont l'une des petites filles épousera  Amédée de la Porte ministre des colonies. Après les Manès le château connait une période d'abandon avant d'être acquis par monsieur Chabrou en 1942 et  en 1959, devient la propriété de Christian Thomas. Depuis cette année où il acquit le domaine, des travaux de rénovation importants ont été effectués tant au niveau des bâtiments que de l'aménagement et l'embellissement des vignobles. Inscrit au M.H. en 1987 grâce à la pugnacité de son propriétaire, après cinq siècles d'existence, le domaine familial, depuis une quarantaine d'années, accueille les visiteurs.","architecture":"BEAULON, construit entre 1480 et 1520, le corps de logis est surmonté d'une haute toiture d'ardoise munie de rampants à crochets. C'est la façade nord, qui révèle le style initial de la construction, à l'exception des bâtiments plus tardifs flanqués de part et d'autre.  La lucarne de gauche, élément majeur de la composition, est un somptueux témoinage du style Louis XII, formant la transition entre l'art gothique finissant et la Première Renaissance.  Placée dans l'aplomb d'une travée de fenêtres, l'ogive du galbe est devenu ici un arc en plein cintre qui se découpe sur le fond sombre des ardoises du toit. Si les festons et les motifs de choux frisés à crochets surmontant la lucarne restent dans l'esprit du gothique flamboyant, les ornementations stylisées d'inspiration florale, sculptées en damier, ainsi que la corniche à Rais-de-cur, annonçent déjà la Première Renaissance. Les petits pinacles à colonnes torses, représentent quant à eux, lun des ornements communs au répertoire français et espagnol, depuis son apparition dans la région de Valence au XVe siècle. La seconde lucarne de style Renaissance, contraste par sa rigueur.  La tour d'escalier polygonale prévue au château de Beaulon, fut remplacée au cours du XVIe siècle par un escalier rampe sur rampe. C'est pourquoi, l'escalier monumental qu'on appelle « à l'italienne », s'il a été rénové, a toujours fait partie de la tour originale qui nous est parvenue aujourd'hui.","habitants":"Famille de Beaulon\r\n        \r\n        \"","divers":"Château de Beaulon    45° 26' 03\" nord, 0° 42' 17\" ouest4","gps":"","images":["../image/image_17/17_Beaulon_17_1.jpg","../image/image_17/17_Beaulon_17_2.jpg","../image/image_17/17_Beaulon_17_3.jpg","../image/image_17/17_Beaulon_17_4.jpg"]},"Consult_chateau_formulaireab04":{"id":"Consult_chateau_formulaireab04","dept":"17","canton":"Saint-Porchaire","commune":"Trizay","nom":"Belenfant","type":"Château","periode":"XIX","histoire":"BELENFANT, de style néo-gothique, la construction du château Belenfant date de 1887, pour un négociant de Trizay, Émile Belenfant. négociant de la commune de Trizay. S'inspirant de l'architecture castrale du Moyen-Âge.","architecture":"BELENFANT,  inspiré de l'architecture du Moyen-Age, il se compose d'un corps de logis rectangulaire, à deux niveaux, surmonté par des combles. La façade du château de Belenfant est ornée de 7 fenêtres à meneaux, auxquelles s'ajoutent 4 fenêtres plus petites, au niveau des combles. La toiture, en forte pente, est en ardoise. Un faux chemin de ronde vous mènera au sommet. Le château de Belenfant est ouvert au Public et se visite.","habitants":"Émile Belenfant\r\n        \r\n        \"","divers":"Château de Belenfant 45° 53' 00\" Nord et 0° 53' 44\" Ouest et de Trizay grav 4","gps":"","images":["../image/image_17/17_Belenfant_1.jpg","../image/image_17/17_Belenfant_2.jpg","../image/image_17/17_Belenfant_3.jpg","../image/image_17/17_Belenfant_4.jpg"]},"Consult_chateau_formulaire9812":{"id":"Consult_chateau_formulaire9812","dept":"17","canton":"Saint-Jean d","commune":"Nouillers","nom":"Bois_Charmant","type":"Château","periode":"XVI","histoire":"BOIS-CHARMANT, le château de Bois-Charmant a été construit au XVIe siècle. Aujourd'hui, il remonte essentiellement à Henri IV et Louis XIII. Le premier seigneur de Bois-Charmant connu est Colin Mauny en 1408.  Le château passe  par héritages ou ventes, et de mains en mains, et il existe un état des lieux de 1756, date à laquelle des travaux d'entretien ont été effectués.","architecture":"BOIS-CHARMANT,  les parties les plus anciennes du bâtiment remontent vraisemblablement au moins au XVe siècle. Le logis à un étage est encadré par deux tours carrées construites en avancée côté cour d'honneur. Ces tours sont de style Henri IV comme en témoignent les lucarnes et les hauts toits d'ardoises à quatre pans. Le toit d'ardoises \"à la Mansart\" du logis est percé de lucarnes à pointes de diamant, motif typique du début du XVIIe siècle. Un timbre situé dans la basse-cour porte le souvenir du passage du Roi Henri IV. En effet, on distingue nettement sur le rebord et dans le timbre, deux traces de sabots de cheval, marquage destiné à immortaliser dans la mémoire collective le passage de cet hôte prestigieux dans les murs de Bois-Charmant.","habitants":"Famille de  Colin Mauny\r\n        \r\n        \"","divers":"Château de  Bois-Charmant 45° 55' 44\" nord, 0° 40' 05\" ouest","gps":"","images":["../image/image_17/17_Bois_Charmant_1.jpg","../image/image_17/17_Bois_Charmant_2.jpg","../image/image_17/17_Bois_Charmant_3.jpg","../image/image_17/17_Bois_Charmant_4.jpg","../image/image_17/17_Bois_Charmant_5.jpg","../image/image_17/17_Bois_Charmant_6.jpg","../image/image_17/17_Bois_Charmant_7.jpg"]},"Consult_chateau_formulaireacea":{"id":"Consult_chateau_formulaireacea","dept":"17","canton":"Île d","commune":"Saint-Pierre d","nom":"Bonnemie","type":"Château","periode":"XVI-XVIII","histoire":"BONNEMIE, ancienne demeure seigneuriale des Le Berton de Bonnemie, ce château remonte au XIVe siècle, pour sa partie la plus ancienne.  La période de construction du Château Bonnemie date du 4ème quart du XVIe siècle et du 1er quart du XVIIe siècle et du XVIIIe siècle. La seigneurie est recensée depuis le XIe siècle. propriété de la commune, c'est devenu un centre aéré.  Le château est inscrit aux M.H. depuis le 1/09/1981 et le 4/10/1994.","architecture":"BONNEMIE, le logis présente un plan en L, avec une tour carrée dans l'angle en oeuvre, une autre à l'extrémité du pignon Est (ancienne chapelle). Deux tours en fer à cheval font saillie sur l'élévation Sud. A gauche, de la tour de l'horloge, les bâtiments se poursuivent en formant une loggia, puis des servitudes plus basses que le logis. L'intérieur comprend, au rez-de-chaussée, un hall avec un escalier tournant à droite accolé au mur de la tour centrale, un grand salon avec des lambris bas, une cuisine et arrière-cuisine. L'aile en retour d'équerre abrite un salon, une chambre avec cheminées et la chapelle dans la tour. Quelques boiseries du XVIIIe ont été conservées. A l'étage, les dispositions sont identiques. Chaque chambre possède une cheminée monumentale du XVIIe siècle. Une aile de communs et un parc clôturé complètent l'ensemble.","habitants":"Famille des Le Berton de Bonnemie\r\n        \"","divers":"Château de Bonnemie à Saint-Pierre d'Oléron","gps":"","images":["../image/image_17/17_Bonnemie_1.jpg","../image/image_17/17_Bonnemie_2.jpg","../image/image_17/17_Bonnemie_3.jpg","../image/image_17/17_Bonnemie_4.jpg","../image/image_17/17_Bonnemie_5.jpg"]},"Consult_chateau_formulairebdd4":{"id":"Consult_chateau_formulairebdd4","dept":"17","canton":"Neuvicq","commune":"Macqueville","nom":"Bouchereau","type":"Château","periode":"XV","histoire":"BOUCHEREAU, au XIIe siècle, les chanoines dAngoulême  confient à Raoul Charel ladministration de leur terre de Macqueville château Bourg-Chareau devenu château Bouchereau, fief du seigneur de Macqueville, qui a donné son nom au village, mais la seigneurie n'apparaît dans les textes qu'en 1419   le logis de Fonbedouère était à lorigine un arrière-fief, démembrement de bourg-Chareau.  Il date du XIIe siècle puis a été remanié aux XVe siècle, XVIe siècle puis au XVIIIe siècle. Il est inscrit par arrêté du 14 avril 1997. L'état des paroisses de Macqueville en 1686 a pour seigneur monsieur de Montespan. Aujourd'hui SCEA de F. Jobet,distillerie.","architecture":"BOURCHEREAU, pourrait bien avoir été, dès le XII-XIIIe siècle, le siège d'un château important, avec donjon roman. La partie ouest est le vestige d'un ancien donjon du XIIe siècle ce qui en fait un logis d'origine romane. Les échauguettes d'angle datent de la fin du XVIe siècle Le château présente une vaste cour quadrangulaire, entourée de communs tardifs et accessible par un portail daté de 1791. Il s'agit d'un rectangle aux murs étayés de contreforts plats aux angles et sur le côté sud. Construit en moyen appareil, il semble, au moins dans sa moitié occidentale, être le vestige d'un donjon rectangulaire dont il subsiste encore quelques éléments : baies géminées, meurtrières d'éclairage, voûte en berceau brisé. Ruiné au cour des guerres de cent ans, il est une première fois remanié aux alentours de 1598. De cette époque doivent dater les deux échauguettes cylindriques à culot mouluré et toit en poivrière, élevées aux angles de la façade sud. Cette même façade est percée, plus tard, de baies rectangulaires en travées et d'une porte d'entrée à pilastres et entablement.","habitants":"Famille de Bouchereau\r\n        \r\n        \"","divers":"Château de Bouchereau à Macquevillre  45° 48' 01\" nord, 0° 12' 46\" ouest","gps":"","images":["../image/image_17/17_Bouchereau_1.jpg","../image/image_17/17_Bouchereau_2.jpg","../image/image_17/17_Bouchereau_3.jpg"]},"Consult_chateau_formulairee601":{"id":"Consult_chateau_formulairee601","dept":"17","canton":"Chaniers","commune":"Burie","nom":"Burie","type":"Château","periode":"XVI","histoire":"BURIE, sur sa hauteur, Burie existe depuis fort longtemps, au XVIe siècle,  Pierre de Coucy en 1418 puis son descendant Charles de Coucy, seigneur de Burie, qui fait ses premières armes en Italie et  capitaine-général des Bandes Françaises en 1527 et capitaine d'une compagnie de gendarmes à partir de 1537. C'est lui qui reconstruit le château vers 1545. Il n'a pas d'enfant. Il meurt en 1565 et son épouse, Suzanne de Belleville, cinq ans plus tard. Puis Burie passe dans plusieurs familles et sera la dot de Gabrielle Thérèse de Chasteigner qui épouse Charles-Louis Chesnel d'Ecoyeux le 17 avril 1709. Dans un dénombrement il est déclaré chevalier, seigneur d'Ecoyeux, Montigny, Burie, Rochereau, château Chesnel, Cherves, Ménac, Chazotte et autres lieux, capitaine des vaisseaux du Roi, chevalier de l'ordre royal et militaire de Saint-Louis. Le 7 mars 1787, les représentants de Burie à l'assemblée préliminaire des États Généraux qui se tient à la salle capitulaire des Récollets de Cognac sont P. Foucaud, F. Gabeloteau, Corbineau, notaires, J. Garnier et Élie Borde. En effet, jusqu'en 1789, Burie appartient à la province de l'Angoumois.","architecture":"BURIE,  il ne reste de l'ancien château de Charles de Coucy, qu'une partie de la construction du XVIe siècle, l'escalier Renaissance avec un contrefort surmonté d'une poivrière. L'élévation, le jardin et la porte cochère dont il reste une partie datent de 1546, 1548. La façade nord, la façade sud et la porte du jardin sont inscrits au titre des M.H.  par arrêté du 23 février 1925.","habitants":"Famille de Coucy\r\n        \r\n        \"","divers":"Château à Burie  45° 46' 24\" nord, 0° 25' 16\" ouest","gps":"","images":["../image/image_17/17_Burie_1.jpg","../image/image_17/17_Burie_2.jpg","../image/image_17/17_Burie_3.jpg","../image/image_17/17_Burie_4.jpg"]},"Consult_chateau_formulairecece":{"id":"Consult_chateau_formulairecece","dept":"17","canton":"La Jarrie","commune":"La Jarne","nom":"Buzay","type":"Château","periode":"XVIII","histoire":"BUZAY, en 1687 la seigneurie de La Jarne est achetée par Pierre Harouard, armateur à La Rochelle, lieutenant général de lAmirauté de La Rochelle et son épouse, Marie Agathe Petit du Petit Val,  fit construire le château en 1771, leur fille, Marie Louise Henriette déposait solennellement  la première pierre de Buzay. Par la suite, seize ans plus tard, en février 1787, Marie Louise Henriette épousait un jeune officier, Étienne-Pierre de Montbron : les actuels propriétaires sont leurs descendants en ligne directe. En 1771, son petit-fils, Pierre-Étienne Harouard du Beignon, Lieutenant de l'Amirauté de La Rochelle, avocat au parlement de Paris et armateur, se fait construire, une \"maison des champs\", expression courante de l'époque, au lieu-dit Buzay. Il est à remarquer qu'il a publié par la suite des ouvrages de botanique et d'agriculture. \r\nSa fille apporte le château en dot à Etienne Pierre Chérade comte de Montbron. Il est resté depuis dans la famille de Chérade de Montbron.","architecture":"BUZAY, construit entre 1771 et 1776, d'après les plans de l'architecte parisien Nicolas Ducret, codessinateur avec Gabriel et Soufflot des plans de la cathédrale de La Rochelle, le château de Buzay est un exemple parfait de ce que l'on appelle le style Louis XV. Le bâtiment à un seul tenant avec avant corps en légère saillie  prolongés de deux courtes ailes que terminent deux pavillons, assez fortement saillants, aux angles soulignés par des refends et coiffés  à toits à quatre pans en forme de pyramides. la façade qui s'ouvre sur la cour d'honneur encadrée  par des communs. Un étage couvert d'un toit d'ardoise est compact et la façade est centrée par un pavillon à fronton triangulaire qui repose sur quatre colonnes ioniques supportant un entablement, celui-ci est surmonté d'un fronton sculpté orné des armes. Il est recouvert et c'est le seul endroit, d'un comble à brisis plus haut que les autres toitures. Les fenêtres sont hautes, à petits carreaux et surmontées de discrètes sculptures de guirlandes, que l'on retrouve à lintérieur même du château. La façade postérieure donne sur une terrasse qui domine le jardin de broderie de buis.","habitants":"Famille de Chérade de Montbron. \r\n        \r\n        \"","divers":"Château de Buzay 46° 07' 36\" nord, 1° 04' 55\" ouest","gps":"","images":["../image/image_17/17_Buzay_1.jpg","../image/image_17/17_Buzay_2.jpg","../image/image_17/17_Buzay_3.jpg","../image/image_17/17_Buzay_4.jpg"]},"Consult_chateau_formulaire8390":{"id":"Consult_chateau_formulaire8390","dept":"17","canton":"Chatelaillon","commune":"Chatelaillon","nom":"Chatelaillon","type":"Construction moderne","periode":"XIX","histoire":"CHATELAILLON,   seigneurie de la succession d'Isembert II-III est revendiquée par Èbles de Mauléon et Geoffroy III de Rochefort, probablement deux cousins  germain et parents à ce même degré d'Isembert II, Geoffroy de Rochefort hérite d'Isembert II la moitié de Châtelaillon : Châtelaillon fut cédé, le 31 août 1615, et définitivement le 5 février 1699, aux Green de Saint-Marsault, qui devinrent marquis de Châtelaillon en 1780 avec Henri-Charles Benjamin, grand-sénéchal de La Rochelle et de l'Aunis. Cette famille était protestante lors des premières acquisitions (Daniel fut un combattant rochelais lors du siège de 1622), mais Pharamond se convertit au catholicisme sous Louis XIV.","architecture":"CHATELAILLON, Beauséjour fut construit à la fin du XIXe siècle lors de l'installation de la gare de Châtelaillon-Plage et de son essor en tant que station balnéaire. Sa première vocation fut l'hôtellerie. Il devint au début du XXe siècle une colonie de vacances puis hébergea l'école maternelle de Châtelaillon-Plage avant d'être rénové entièrement en 2007. Ce magnifique hôtel particulier est aujourd'hui un espace culturel et un lieu de loisirs pour les Châtelaillonnais.                                                           Casino Il fut construit en 1893 lorsque Châtelaillon se transforma en station balnéaire recherchée. Après des dégâts causés par la seconde guerre mondiale, l'entrée fut reconstruite, un cinéma installé ainsi qu'une salle de spectacle en plein air. Détruit pendant la deuxième moitié du XXe siècle, il fut reconstruit à l'identique. Il est toujours le lieu central des soirées châtelaillonnaises avec son restaurant, sa discothèque (La Licorne) et sa salle de jeux.","habitants":"Èbles de Mauléon \r\n        \"","divers":"le château hôtel beauséjour grav1.                                 le casino grav 2              Rathaus plage grav 3","gps":"","images":["../image/image_17/17_Chatelaillon_1.jpg","../image/image_17/17_Chatelaillon_2.jpg","../image/image_17/17_Chatelaillon_3.jpg"]},"Consult_chateau_formulaire8bad":{"id":"Consult_chateau_formulaire8bad","dept":"17","canton":"Montendre","commune":"Chevanceaux","nom":"Chaux_Chevanceaux","type":"Château","periode":"XIV-XV","histoire":"CHAUX, aux Sainte Maure en 1323 par le mariage de Marguerite,fille de Foulque, Seigneur de Montauzier avec Guy de Sainte Maure, Haut Baron de Touraine venu faire la guerre aux anglais de 1327 à 1337.  En 1500, Philippe est le premier à porter le titre de Seigneur de Chaux. En 1553, les domaines de la seignerie de Chaux sétendent sur les paroisses de Chevanceaux, Bors, Montendret, Venet, Pouillac, Sainte Colombe, Chantillac, Saint Palais et Chatenet. En 1623, à la mort dAlain de Sainte Maure, la terre de Chaux fut saisie à la requête du seigneur de Touvérac. François de Jussac dAmbleville, seigneur de Saint Preuil, la racheta en 1625. Cest à lui que lon doit laspect actuel du château.  Si ce ?brave Saint-Preuil? fut une bénédiction pour le château, sa fin fut plus délicate! En effet, pour avoir déplu au marquis de La Meilleraye et par vengeance du cardinal de Richelieu, il fut condamné et décapité le jour même (9 novembre 1641) dans la citadelle dAmiens où, détail macabre mais savoureux, sa maîtresse, une vivandière fort jolie, dit-on (une Du Ryer), qui lui était très attachée, reçut sa tête dans son tablier! et lui fit faire un magnifique service. Le dernier des Saint Maure, Louis Marie, mourut en 1763 après avoir fait combler les douves et conçu le parc. Cest au XIXe siècle que le Marquis de Lestrange créa lensemble des bâtiments dexploitation et développa un vignoble . A sa mort, en 1885 la propriété fut mise en vente et rachetée par le comte de Treville, arrière grand-père de M. Emmanuel Benoît du Rey.","architecture":"CHAUX, vers 1630, François de Jussac le fit transformer par un architecte saintongeais Cest à lui que lon doit laspect actuel du château. Il semble que la structure ait été largement conservée en respectant les murs, fondations, douves, tours et la galerie fin XVIe mais le percement des fenêtres, les cheminées, la chapelle et le pont levis datent de cette époque.   Au siècle suivant, le dernier possesseur de Sainte-Maure y apporte divers embellissements dont la plantation d'un bois de chênes-lièges, diverses modifications furent également apportées au XIXe siècle. L'édifice du XVIIe siècle présente une cour intérieure et quatre tours circulaires de flanquement avec fruits. L'entrée dans la cour se fait par une poterne. Au centre de la façade nord, tour carrée au-dessus du porche d'entrée. Au sud, galerie à grandes arcades.","habitants":"François de Jussac dAmbleville\"","divers":"Château de Chaux -Chevanceaux","gps":"","images":["../image/image_17/17_Chaux_Chevanceaux_1.jpg","../image/image_17/17_Chaux_Chevanceaux_2.jpg","../image/image_17/17_Chaux_Chevanceaux_3.jpg","../image/image_17/17_Chaux_Chevanceaux_4.jpg"]},"Consult_chateau_formulairea0f9-2":{"id":"Consult_chateau_formulairea0f9-2","dept":"17","canton":"Saint-Porchaire","commune":"Crazannes","nom":"Crazannes","type":"Forteresse","periode":"XIV-XVI","histoire":"CRAZANNES,  est l'un des plus anciens châteaux de Charente-Maritime, et l'un des premiers châteaux privés à avoir obtenu ce classement. Initialement propriété des seigneurs de Tonnay-Charente, le site a connu de nombreux propriétaires dont, entre autres, Jacques Poussard, conseiller de Charles VI, la famille Daillon ou encore la famille Acarie. Cette famille, dont les hommes étaient d'illustres militaires, a vécu au château plus de 300 ans et a réalisé d'importants travaux d'agrandissement.  Parmi les personnes ayant séjourné au château, quelques-unes ont plus particulièrement marqué les esprits : ainsi au XIVe siècle, le Prince Noir a séjourné quelque temps dans le domaine, et en 1519, François Ier y passa une nuit. Le maître du chat, le Marquis de Carabas, a réellement existé de son nom Jules Gouffier et a vécu au château de Crazannes au XVII siècle. Mais le plus célèbre demeure le Chat Botté, dont le maître, propriétaire du château, fut célébré par Charles Perrault dans son conte. Par la suite, le château a appartenu à la famille Chaudruc qui, au début du XXe siècle, y entreprit de lourds travaux de restauration, le château a ensuite changé assez souvent de famille dans son histoire pour appartenir, depuis 2010 à la famille Giambasi, propriétaire des lieux. Classé M.H. en 1913","architecture":"CRAZANNES, sa construction a débuté au XIVe siècle, à l'emplacement même d'une ancienne forteresse médiévale du XIe siècle dont il reste aujourd'hui la chapelle, les douves et le donjon, vestige du mur d'enceinte. La façade nord, du début du XVIe siècle, présente des portes et fenêtres ornées d'élégantes sculptures de pierre, d'un style flamboyant remarquable. La façade Sud, totalement différente, a été reconstruite dans les années 1920 car elle était très abimée. La tour cylindrique qui s'y appuie s'orne de mâchicoulis, elle est coiffée d'une poivrière très pointue. On suppose quà lorigine,le château du XIVe sarrêtait avant la galerie et que c'est au XVIe siècle, que l'on y a rajouté un système de galeries, à chaque étage, qui n'étaient sans doute pas fermées comme maintenant, mais ouvertes sur lextérieur. Le pigeonnier date du XVIIe siècle.  La chapelle romane date, quant à elle, du XIe siècle, de même que le donjon qui a subi différentes modifications au cours du temps.","habitants":"Famille Chaudruc \"","divers":"le châteaux fort de Crazannes 45° 50' 42\" Nord et 0° 41' 38\" Ouest","gps":"","images":["../image/image_17/17_Crazannes_1.jpg","../image/image_17/17_Crazannes_2.jpg","../image/image_17/17_Crazannes_3.jpg","../image/image_17/17_Crazannes_4.jpg","../image/image_17/17_Crazannes_5.jpg","../image/image_17/17_Crazannes_6.jpg"]},"Consult_chateau_formulaire282e":{"id":"Consult_chateau_formulaire282e","dept":"17","canton":"Matha","commune":"Dampierre sur Boutonne","nom":"Dampierre_Boutonne","type":"Château","periode":"XV-XVI","histoire":"DAMPIERRE, en 1495, la baronnie de Dampierre se sépare de celle de Surgères ; François de Clermont, de retour des guerres d'Italie, entreprend la construction du château Renaissance sur deux îles de la Boutonne, qui fut terminé vers 1475. Son petit-fils Claude, épousa Jeanne de Vivonne, fille du sénéchal du Poitou, gouverneur du Dauphin, et, disgracié, mourut en 1545.  Sa fille Claude-Catherine, duchesse de Retz, épouse en secondes noce  à Cognac en 1565 Albert de Gondi,  maréchal de France, duc et pair. Claude-Catherine modifia vers 1545-1550  le château-fort par l'ajout de galeries superposées  à l'Italienne , joyau renaissance. En janvier 1586, le château fut assiégé par les protestants mais sauvé par l'arrivée du gouverneur Malicorne, qui fit pendre les assaillants. Le 4 mai 1587, il est pris par Condé et pillé pour venger la destruction du château de Marcoussis, propriété de l'épouse de Condé, par Gondi. En 1599, le château est vendu à un certain David Fourré, qui rase une partie des bâtiments fermant la cour transformée en jardin, et crée la terrasse Ouest, ornée de balustres en pierre ; sa famille le conservera jusqu'en 1712. En 1752, il est acheté par le marquis Philippe-Christophe-Amateur de Gallifet, ancêtre d'un général du Second Empire. En 1789, les châtelains émigrent, il est vendu le 8 avril 1795 au cultivateur Dubois. Revendu, il est acquis en 1851 par la famille Rabault-Texier-Hédelin. En 1923 au docteur Jacques Texier qui en hérite, toujours dans la descendance du docteur les Hadelin.","architecture":"DAMPIERRE, forteresse quadrangulaire bâti sur une île de la Boutonne, le château a été construit à la fin du XVe siècle  consistant en deux corps de logis placés face à face reliés par des ailes, cantonnée à chacun de ses angles de tours rondes avec mâchicoulis, ont accède par un pont-levis, et la galerie a été ajoutée en 1550, bijou d'architecture sculptée au décor alchimique mystérieux.  ont accède par un pont-levis à la cour avec en face la façade renaissance et ses deux galeries superposées, aux cinq arcades reposant sur des piliers massifs. Ce corps de logis au toit à deux pans est flanqué de deux tours à créneaux et mâchicoulis coiffées de toitures  en poivrière, recouvertes elles aussi d'ardoises. La façade qui les relie présente peu de fenêtres et l'étroite terrasse est baignée par la Boutonne.","habitants":"Famille de François de Clermont\r\n        \"","divers":"Le château de Dampierre sur Boutonne 46° 04' 04\" Nord et 0° 24' 57\" Ouest","gps":"","images":["../image/image_17/17_Dampierre_Boutonne_1.jpg","../image/image_17/17_Dampierre_Boutonne_2.jpg","../image/image_17/17_Dampierre_Boutonne_3.jpg","../image/image_17/17_Dampierre_Boutonne_4.jpg","../image/image_17/17_Dampierre_Boutonne_5.jpg"]},"Consult_chateau_formulaire64d1":{"id":"Consult_chateau_formulaire64d1","dept":"17","canton":"Pons","commune":"Sémussac","nom":"Didonne","type":"Château","periode":"XVIII","histoire":"DIDONNE, fut construit pendant la première moitié du XVIIIe sièclesur l'emplacement de l'ancien château de la Touche et prit le nom de Didonne lorsque son propriétaire acheta la baronnie de ce nom. La partie la plus ancienne de la demeure fut bâtie vers 1730 par Marie de Béchillon ou par son fils, le marquis de Sennecterre. L'actuel corps de logis correspondrait à l'ancienne aile latérale. Le marquis Jean Charles de Sennecterre en fit sa résidence de campagne vers 1750, agrandissant ses terres par lacquisition du Marquisat de Pisany vers 1738, des baronnies dArvert et de Saujon vers1758, de la châtellenie du Chay en 1764, de la seigneurie de Chenaumoine et une partie de Brézillas. Jean Charles de Sennecterre, Maréchal de France mourut à Didonne le 23 février 1771 à 85 ans, laissant un fils le comte de Sennecterre, qui semble avoir continué luvre dextension du domaine  entreprise par son père. Mort sans postérité mâle, ses domaines passèrent à sa fille, Marie Charlotte de Sennecterre, mariée au marquis dArmentières. À la révolution, la propriété est confisquée et devient propriété de la République. Le 5 fructidor an II de la république Marie Charlotte de Sennecterre périssait sur léchafaud. Le château de Didonne fut vendu comme bien national le 2 thermidor an IV à Étienne Raboteau, négociant de Bordeaux, puis au comte de la Grandière en 1834 qui le restaura.","architecture":"DIDONNE,l'actuel corps de logis correspondrait à l'ancienne aile latérale.   Par la suite, il fut la propriété de MM Lambert et Boyer, puis du comte Alfred de la Grandière, maire de Royan. À la fin du XIXe siècle, après la mort du comte Alfred de la Grandière, le logis passa entre les mains de M.Cocq, puis à son gendre, M Delézinier banquier à Cognac. Le musée du vieux matériel agricole fondé par le comité de la fête des battages de Cozes et par lAsmala a été aménagé dans une dépendance du château en 1982. Lensemble du domaine a de nouveau été vendu en 2002. Le musée agricole a été déménagé en Octobre 2006.  L'édifice de plan en U à deux niveaux, corps de logis oblong à huit travées deux ailes en retour d'équerre, toit en croupe sur l'ensemble recouvert de tuiles même les dépendances qui se prolonges formant une grande cour.","habitants":"Famille de Sennecterre\r\n        \"","divers":"Le château de Didonne à Sémussac","gps":"","images":["../image/image_17/17_Didonne_1.jpg","../image/image_17/17_Didonne_2.jpg","../image/image_17/17_Didonne_3.jpg"]},"Consult_chateau_formulaire2f1d-2":{"id":"Consult_chateau_formulaire2f1d-2","dept":"17","canton":"Chaniers","commune":"Dompierre sur Charente","nom":"Dompierre_Charente","type":"Château","periode":"XVII","histoire":"Deux châteaux à Dompierre  celui de Dompierre et celui de Ste-Marie                                               DOMPIERRE, avant le 16 septembre 1918  s'appelait simplement Dompierre. L'ordonnance du 28 décembre 1825 intègre la commune d'Orlac à celle de Dompierre-sur-Charente. Avant 1789, la commune couvrait une partie de celle de Chérac.  L'ancien château déjà presque en ruine à la Révolution fut confisqué et vendu au nom de la Nation. En 1612, la terre d'Orlac fut vendue par Jacques le Comte à Jacques de Verdelin, enseigne des gendarmes du duc d'Épernon, dont la fille Marie-Guillemette se maria en 1630 à Jean-Louis de Bremond d'Ars, Marquis d'Ars, maréchal de camp, tué au siège de Cognac en 1651 qui depuis est restée à sa postérité.                                                       Château de SAINTE-MARIE transformé en hôtel","architecture":"DOMPIERRE date du XVIIe siècle transformé en chambres d'hôtes par madame Cocuaud, de plan rectangulaire à neuf travées et deux étages toits presque plat.                                                               Château de SAINTE-MARIE transformé en hôtel à deux niveaux de plan quadrangulaire à gros pavillons en angles avec lucarnes et pavillon central saillant avec lucarne sur toit en ardoise.","habitants":"Jacques le Comte\r\n        \"","divers":"Château de Dompierre charente  Grav 1     45° 42' 09\" nord, 0° 29' 29\" ouest                                                   Château Ste Marie Grav 2","gps":"","images":["../image/image_17/17_Dompierre_Charente_1.jpg","../image/image_17/17_Dompierre_Charente_2.jpg"]},"Consult_chateau_formulairef64d":{"id":"Consult_chateau_formulairef64d","dept":"17","canton":"Chaniers","commune":"Douhet","nom":"Douhet","type":"Château","periode":"XVII","histoire":"DOUHET, les Charbonnière ont  la seigneurie du Douhet remonte au XIVe siècle relevant de la châtellenie de Taillebourg. Puis elle est léguée, échangée, vendue et arrive à la famille Vallée. Nicolas de Vallée, calviniste, y installe un ministre du culte protestant.  Par le mariage de Claude de Vallée en 1618 la seigneurie du Douhet passe aux la Rochefoucauld, par alliance de Claude de Vallée avec Charles de la Rochefoucauld, leur fille Marie-Judith épousera le marquis de lignière, puis Bernard de Pons marquis de Thors décéde sans decendance. En 1769 sort de la descendance des Vallée.  Louis Ignace de Karrer colonel descendand des Poussard de Lignières devient propriétaire mais décède en 1752 dont le tuteur loue le château à l'évêque de Saintes, et en1769 les Karrer cèdent le Douhet à Pierre-Léonard de Laage. Vendu comme bien national à la Révolution en 1794 acquis par Mathieu Faure banquier, et par héritage passe aux  Voyer d'Argenson puis aux Clairveaux qui le conserveront jusqu'en 1923, la famille Damilleville propriétaire  depuis 1946. Il a été inscrit au M.H le 26 septembre 1969.","architecture":"DOUHET, l'entrée se fait par un porche dans le mur et donne sur une avant-cour bordée des deux côtés de dépendances à un étage couvertes de longs toits de tuiles. L'allée centrale passe une balustrade pour arriver au logis en U autour de la cour. Le pavillon central couvert d'ardoise est prolongé par deux ailes à toiture basse limitées à leur extrémité par deux pavillons à haute toiture d'ardoise. L'autre façade,à trois niveaux côté jardin est marquée en son centre par un escalier à double révolution. Sous la cour des caves voutées viennent d'un château antérieur. Le pigeonnier, une fuie cylindrique du XVIe siècle,  mais il a perdu son toit. Un château féodal semble exister sous le règne de Saint-Louis. En 1652, un incendie ravage l'édifice. La reconstruction est achevée en 1678. L'édifice présente un grand corps de bâtiment, terminé à chaque extrémité par un pavillon carré. Le pavillon central est délimité par des moulures. Un escalier de pierre, à double volée demi-circulaire, fait communiquer rez-de-chaussée et jardin. Les portes du sous-sol sont surmontées de frontons. Les communs touchent le château à l'ouest et en sont séparés à l'est. Ils se développent symétriquement de chaque côté d'une cour intérieure. Il s'agit de deux corps de bâtiment du XVIIe siècle, à deux étages, surmontés d'un toit charentais très plat.","habitants":"Famille Vallée\r\n        \"","divers":"Le château de Douhet 45° 49' 13\" nord, 0° 34' 11\" ouest","gps":"","images":["../image/image_17/17_Douhet_1.jpg","../image/image_17/17_Douhet_2.jpg","../image/image_17/17_Douhet_3.jpg","../image/image_17/17_Douhet_4.jpg"]},"Consult_chateau_formulairef65e":{"id":"Consult_chateau_formulairef65e","dept":"17","canton":"Chaniers","commune":"Ecoyeux","nom":"Ecoyeux","type":"Château","periode":"XVII","histoire":"Châteaux et maisons fortes à Ecoyeux           ECOYEUX, construit par Louis de Polignac, seigneur d'Écoyeux au début du XVIIe siècle comme l'attestent des marchés de construction passés en 1614. La vieille maison forte ne semble plus intéresser la noble famille. Vers 1620, le \"château vieux\" appartient au procureur du Roi : Pierre Roy. Vers 1622, il semble que la maison forte soit louée à Jacques Boutillon. Vers 1671, la maison forte est en ruine et son propriétaire, Mathieu Mauchen, la délaisse.  Il est vendu le 22 fructidor de l'an XII au baron d'Authon dont le fils s'y installe en 1835, fait quelques travaux, mais ce n'est qu'en 1952 que le nouveau propriétaire commence son sauvetage.   Marc-Henri Évariste Poitevin dit Goulebenéze, le barde charentais, un temps propriétaire du château qui venait de sa mère, Néhomaïe Hiblot dont la famille l'avait acheté en 1856 aux Normand dAuthon. Léon de Polignac, seigneur dÉcoyeux, gouverneur de Saintes, époux de Catherine Tizon. Au XVIIe siècle, Léon de Polignac fait établir, un peu à l'extérieur du bourg, un château plus grand et plus confortable, nommé Château Neuf.  Au XXe siècle , la municipalité achète le site et le transforme en mairie. Au XXIe siècle, la découverte de l'extérieur est libre et gratuite. La visite de l'intérieur est interdite. Il est inscrit au M.H. depuis le 27 octobre 1971.","architecture":"ECXOYEUX  le château n'a jamais été achevé et seule une moitié du corps de logis prévu a été construit. Il n'a pas été habité par ses propriétaires successifs.  Du XVIIe siècle il reste la tour polygonale à cinq pans, d'un genre très rare, est couverte d'un haut toit d'ardoises, d'escalier et une travée. Le corps de logis est à deux niveaux, percé de fenêtres à fronton triangulaire, couvert d'un toit de tuiles. Le château vieux, le jardin du château des Princes de Polignac est inscrit au pré-inventaire des jardins remarquables. La maison forte  sa forme polygonale rappelle les constructions de la fin du XVe siècle, elle est trop étroite pour en faire un \"donjon\" habitable, trop grande pour être une tour escalier. Sur le coté,  quelques fenêtres et surtout une tourelle posée sur culots. Elle doit contenir un escalier pour passer du 1er étage au dernier.  La tour polygonale est donc habitable, surtout depuis l'ouverture des fenêtres.","habitants":"Famille de Polignac                                              Famille du baron d'Authon \r\n        \"","divers":"Ecoyeux mairie grav 1  45° 49' 23\" Nord et 0° 30' 32\" Ouest                                                                            Manoir de Polignac grav 2-3-4                                  M.F d'Ecoyeux grav 5-6","gps":"","images":["../image/image_17/17_Ecoyeux_1.jpg","../image/image_17/17_Ecoyeux_2.jpg","../image/image_17/17_Ecoyeux_3.jpg","../image/image_17/17_Ecoyeux_4.jpg","../image/image_17/17_Ecoyeux_5.jpg","../image/image_17/17_Ecoyeux_6.jpg"]},"Consult_chateau_formulaire7910":{"id":"Consult_chateau_formulaire7910","dept":"17","canton":"Saint-Porchaire","commune":"Ecurat","nom":"Ecurat","type":"Château","periode":"XIX","histoire":"A Ecurat le château de Beauvoir et de la Morinerie     BEAUVOIR, le château appartenait au XVIIe siècle à la famille Demainvielle. Au XIXe siècle. Il était propriété de la famille Oudet.  Cest  Amédée-Jacques-Joseph Oudet qui fit construire le château actuel, il appartient aujourdhui aux descendants de la famille Oudet.                                                                               MORINERIE, Le premier propriétaire connu de La Morinerie, est Pierre Senné, seigneur de La Fourest, capitaine des ponts, portes et tours de la ville de Saintes, qui, en 1593, habite  le logis noble de La Morinerie, paroisse d'Ecurat . En 1618, par l'union de Charles Duval sieur de Varaise et de Catherine Senné, le logis entre dans la famille Duval.  Ce dernier était, en 1618 et 1620, qualifié de  sieur de La Morinerie, concierge des prises royales de Saintes. De ce mariage naquit, entre autres, Guillaume Duval qui épousa, le 9 février 1659, Marie Ferrant de Saint-Dizant. Procureur du Roi en lélection de Saintes, seigneur de la Forêt-Plassay , c'est lui qui, vers 1670, fit rebâtir le château.","architecture":"BEAUVOIR, l'édifice présente un plan rectangulaire prolongé de part et dautre par un corps de bâtiment plus bas en retrait. Les deux façades sont parfaitement identiques. Les portes sont ornées de gables en accolade, agrémentés de sculptures. Chaque façade possède cinq lucarnes dont quatre plus modestes. Un fronton triangulaire étroit, ajouré dun trèfle qui encadre la lucarne centrale,surmontée dune sculpture représentant la vierge.                                                     MORINERIE C'est un bel exemple de château du XVIIe siècle influencé par l'architecture militaire.  En 1670, il est reconstruit sous la direction del'architecte Paul Guerinet, par Guillaume Duval dont les descendants conservent le château jusqu'en 1895. Il était prévu pour faire 80 mètres delong, avec un pavillon central et deux ailes basses de six travées terminées par un pavillon carré à étage, l'aile sud-est et son pavillon ont été arrêté aux 2/3 de la hauteur. Le pavillon central possède un étage et un toit en carène avec une porte, une fenêtre à l'étage et dans le toit une ouverture ronde sur fronton de pierre orné. Le pavillon carré possède une haute toiture d'ardoises. Une aile en retour a été construite plus tard. À la fin du XIXe siècle, les toitures des ailes ont été rehaussées et les tuiles romaines remplacées par des ardoises.","habitants":"Famille  de Demainvielle                                               Famille de Charles Duval \r\n        \"","divers":"Château à Ecurat Morinerie grav 1     45° 47' 12\" nord, 0° 40' 59\" ouest                                                        Beauvoir grav 2","gps":"","images":["../image/image_17/17_Ecurat_1.jpg","../image/image_17/17_Ecurat_2.jpg"]},"Consult_chateau_formulaire25b0":{"id":"Consult_chateau_formulaire25b0","dept":"17","canton":"Jonzac","commune":"Mosnac","nom":"Favières_Monsac","type":"Château","periode":"XVII","histoire":"FAVIERES, sur la vallée de la Seugne, deux hauts pavillons coiffés d'ardoise annoncent le château de Favières. Au milieu du XVIe siècle, la terre appartenait à la famille La Mothe-Fouquet, puis elle passa aux mains de Jean de Candelay. Avant 1616, Pierre de Foix, ingénieur du Roi, et son gendre, Jean de Saint-Mauris, seigneur de Saint-Seurin-de-Clerbise, achetèrent la seigneurie de Favières. Le château resta propriété de la famille Saint-Mauris pendant environ un siècle. Vers 1715, il appartenait à Luc Bellanger, chevalier, seigneur du Bourneuf, à cause de sa femme, Judith-Anne de Saint-Mauris.\r\nA cette époque, un grand procès secoua la famille des seigneurs de Favières. En effet, la tante paternelle de Judith-Anne, Françoise de Saint-Mauris, épouse de Jean Tiaule, seigneur de Verdeuil, prétendait que celle-ci et sa soeur, religieuse à Saint-Jean-d'Angély, n'étaient pas filles de Jean de Saint-Mauris, chevalier, seigneur de Favière, et de Jeanne Arnoul, mais d'un premier mariage de la dite Jeanne Arnoul.","architecture":"FAVIERES entouré de dépendances assez vastes, très remaniées et flanquées d'une tour cylindrique et d'une échauguette carrée sur consoles, le château, en fond de cour, se présente comme un grand corps de bâtiment flanqué de deux gros pavillons couverts d'ardoise. L'un a été repercé et remanié à la fin du XIXe siècle dans un style pseudo-médiéval. Le corps de logis présente, sur ses deux façades, des consoles qui devaient à l'origine supporter un chemin de ronde plus symbolique qu'efficace, masquant la toiture. Côté cour, l'entrée est marquée par une simple porte à fronton. Sur la façade postérieure, l'escalier qui descendait dans les jardins èst précédé par un pont dormant qui fait penser que le château était, au moins en partie, entouré de fossés à l'origine. Une partie du parc est encore dotée de hauts murs. flanqués de tours cylindriques couvertes de toitures pyramidales d'un curieux effet, qui sont une invention du XIXe siècle. Tel qu'il se présente aujourd'hui, malgré quelques restaurations peu discrètes du XIXe siècle et une indivision fâcheuse, le château de Favière est encore un intéressant exemple d'édifice de la première moitié du XVIIe siècle. \r\nAujourd'hui le château est divisé en plusieurs habitations et ne peut être visité.","habitants":"Famille La Mothe-Fouquet\r\n        \"","divers":"","gps":"","images":["../image/image_17/17_Favi%c3%a8res_Monsac_1.jpg","../image/image_17/17_Favi%c3%a8res_Monsac_2.jpg","../image/image_17/17_Favi%c3%a8res_Monsac_3.jpg","../image/image_17/17_Favi%c3%a8res_Monsac_4.jpg"]},"Consult_chateau_formulaire798b":{"id":"Consult_chateau_formulaire798b","dept":"17","canton":"Jonzac","commune":"Villexavier","nom":"Faye_Villexavier","type":"Château","periode":"XVI","histoire":"FAYE, la seigneurie de la Faye appartenait à la famille Guinanson au XVe siècle. Elle est saisie et vendue en 1683 à Claude-Louis de Saint-Simon-Montbléru. Claude-Anne de Rouvroy, marquis, puis duc de Saint-Simon, maréchal de camp et député de la noblesse de l'Angoumois aux états généraux de 1789 émigre et La Faye est vendu comme bien national.","architecture":"FAYE, le château construit en 1666 a été en partie détruit au XIXe siècle: il formait un U et le château actuel est l'ancienne aile droite. Le logis est bas avec des combles à brisis percés de hautes lucarnes à volutes et fronton semi-circulaire dépassant le brisis du toit. Le gros pavillon à toit élevé à quatre pans est couvert d'ardoises. Le 26 février 2010, le château a été inscrit au titre des M.H..","habitants":"Famille Guinanson\r\n        \"","divers":"Château de la Faye à Villexavier  45° 22' 35\" Nord et 0° 26' 02\" Ouest","gps":"","images":["../image/image_17/17_Faye_Villexavier_1.jpg","../image/image_17/17_Faye_Villexavier_2.jpg","../image/image_17/17_Faye_Villexavier_3.jpg"]},"Consult_chateau_formulaire71c8":{"id":"Consult_chateau_formulaire71c8","dept":"17","canton":"Marennes","commune":"Saint-Just-Luzac","nom":"Feusse","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux à St just celui de Feusse et celui de Rochebonne gîtes de France.                           FEUSSE,   à la charnière des XVIe et XVIIe siècles, Feusse appartenait à Jean Jousselin, époux en premières noces de Marie Bourget, puis en secondes noces de Marie Aubert. La famille Jousselin conserva le domaine toute une partie du XVIe siècle, puis Marie Jousselin l'apporta en dot à son époux, Jean Bernon, pasteur de Saint-Just,  Au fond de ce jardin, dans un angle du mur d'enceinte, subsiste la chapelle bâtie pour Jean Bernon, bénie en 1710. Aujourd'hui chambres d'hôtes de Nicole Meunier.","architecture":"FEUSSE, Jean Bernon, pasteur de Saint-Just à qui l'on doit l'aménagement du rez-de-chaussée et des jardins, la chapelle, et peut-être l'édification de la remarquable porte cochère, à pilastres doriques et à fronton brisé, donnant accès à la cour. La demeure est un simple bâtiment à étage, pourvu d'une tour polygonale d'escalier percée d'une porte en plein cintre encadrée par des pilastres, formant la souche ancienne du bâtiment. La grande porte-fenêtre à double battant, donnant accès au vestibule, appartient à une seconde campagne de construction que l'on peut attribuer à l'extrême fin du XVIIe siècle ou au tout début du XVIIIe siècle. Côté jardin, le logis a été doublé en profondeur, simplement au rez-de-chaussée. Éléments protégés MH : le portail d'entrée, les façades et les toitures sur cour ainsi que le vestibule et le salon contigü avec le décor de boiseries peintes du corps de logis principal : classement par arrêté du 11 octobre 1984.","habitants":"Famille Jousselin \r\n        \"","divers":"Château de feusse grav 1-2-3                                        Hôtel de Rochebonne grav 4-5           45° 48' 09\" nord, 1° 02' 12\" ouest","gps":"","images":["../image/image_17/17_Feusse_1.jpg","../image/image_17/17_Feusse_2.jpg","../image/image_17/17_Feusse_3.jpg","../image/image_17/17_Feusse_4.jpg","../image/image_17/17_Feusse_5.jpg"]},"Consult_chateau_formulairee808":{"id":"Consult_chateau_formulairee808","dept":"17","canton":"Chatelaillon","commune":"Chatelaillon","nom":"Fort_Boyard","type":"Fort","periode":"XIX","histoire":"FORT-BOYARD, le fort Boyard est une fortification située sur un haut fond formé d'un banc de sable à l'origine, appelé la « longe de Boyard » qui se découvre à marée basse et est situé entre l'île d'Aix au nord-est, l'île d'Oléron au sud-ouest, avec l'île Madame au sud-est et l'île de Ré au nord, appartenant à l'archipel charentais. La Longe de Boyard est rattachée au cadastre de la commune de l'Île-d'Aix. Si la construction d'un dispositif défensif sur la « longe de Boyard » est envisagée dès le XVIIe siècle, le projet n'est concrétisé que dans le courant du XIXe siècle. Édifié afin de protéger la rade, l'embouchure de la Charente, le port et surtout le grand arsenal de Rochefort des assauts de la marine anglaise, il est transformé en prison quelques années à peine après son achèvement. Surnommé « fort de l'inutile » par la population locale lors de sa longue période d'abandon, l'édifice est, dorénavant, essentiellement connu dans le monde entier grâce au jeu télévisé du même nom, tourné sur place depuis 1990. Le fort Boyard fait partie intégrante de l'Arsenal maritime de Rochefort qui s'étend tout au long de l'estuaire de la Charente. Il est la propriété du conseil départemental de la Charente-Maritime depuis 1989. Il fait lobjet dune inscription au titre des M.H. depuis le 1er février 1950.","architecture":"Fort BOYARD, de forme oblongue, le positionnement du fort est situé à 2 900 m de l'île d'Aix et à 2 400 m de l'île d'Oléron. Il mesure 68 mètres de long dans l'axe sur 31 mètres de large, pour une superficie au sol de 2 065 m2 et totale de 2 689 m2. La cour intérieure mesure 43 m de long dans l'axe, 12 m de large et sa surface est de 565 m2. Les murs d'enceinte culminent à 20 mètres depuis les fondations. Il est visible depuis Fouras, depuis l'île d'Oléron, depuis le pont qui relie le sud de l'île au continent, depuis le phare de Chassiron par beau temps, à l'extrême nord de l'île ainsi que d'une bonne partie de la côte est de celle-ci, notamment depuis Boyard ville, mais aussi depuis la ville de La Rochelle et bien sûr de la côte ouest de l'île d'Aix, où de nombreux touristes et enfants viennent en été voir le fort de plus près. \r\nDe 1995 à 2002, dans le cadre d'animations organisées par des groupements de communes et le conseil général, appelé les « Sites en Scènes », un feu d'artifice y était tiré à la nuit tombante depuis son couronnement supérieur, le 14 juillet, visible depuis toutes les plages des alentours. Ce feu d'artifice contenait des milliers de fusées et durait, en moyenne, une trentaine de minutes avec, en simultané, la 1re version (1989) du générique de l'émission (composé par Paul Koulak), diffusée en boucle sur une radio locale.","habitants":"Arsenal maritime de Rochefort\r\n        \"","divers":"","gps":"","images":["../image/image_17/17_Fort_Boyard_1.jpg","../image/image_17/17_Fort_Boyard_2.jpg","../image/image_17/17_Fort_Boyard_3.jpg"]},"Consult_chateau_formulairea826":{"id":"Consult_chateau_formulairea826","dept":"17","canton":"Marennes","commune":"Brouage","nom":"Fort_Brouage","type":"Citadelle","periode":"XVI","histoire":"BROUAGE, la citadelle de 1555, Jacques de Pons, seigneur dHiers, décide de créer une place de commerce, «Jacopolis», édifiée sur un dépôt de lest des navires. Le flot, en se retirant, laisse dans les creux de leau salée que le soleil évapore. Ces salines naturelles, enrichies du travail de lhomme, contribuent à faire la prospérité économique de Brouage devenue un lieu de négoce international. Embellie par le cardinal de Richelieu «avec plus de façon et de gentillesse qui ne se voit ailleurs», la place forte connaît au XVIIe siècle un essor fabuleux. Mais son apogée marque aussi le début de son déclin. Troublée par les querelles religieuses, rognée par son manteau de vase, délaissée par les jeux du pouvoir, Brouage sera peu à peu abandonnée de tous. Linvestissement des collectivités, la création du Syndicat Mixte pour la Restauration et lanimation du site de Brouage en 1989 ont permis la renaissance de cette place forte oubliée, qui nous livre aujourdhui les histoires dhommes disparus, témoignages de notre passé.","architecture":"BROUAGE, la place forte , une construction impressionnante de 400 mètres de côté, 7 bastions, 19 échauguettes,7 courtines d'une hauteur moyenne de 11 mètres. Du haut des remparts qui ceinturent la cité, on aperçoit le village de Hiers, qui était à lorigine lune des nombreuses îles du golfe de Saintonge. Une courtine assure la liaison entre deux bastions. Il est facile de se repérer car tous les bastions et courtines portent un nom dans une grande logique!  En partant de l'escalier de Marie Mancini, on quitte le bastion Royal pour prendre la courtine du gouvernement qui conduit au bastion de la mer, puis la courtine de la mer qui conduit au bastion de Saint-Luc, puis la courtine de Saint-Luc qui conduit au bastion d'Hiers, puis la courtine d'Hiers qui conduit au bastion Richelieu, puis la courtine Richelieu qui conduit au bastion de la Brèche, puis la courtine de la Brèche jusqu'au bastion de la Rivière, puis enfin la courtine Royale pour retrouver le bastion Royal.  Dix-neuf échauguettes veillent aujourdhui sur le rempart de Brouage. Les tourelles suspendues, les échauguettes, sont très gracieuses et donnent beaucoup d'allure à l'ensemble.  La porte Royale, très bien conservée, donnait accès aux quais du port.","habitants":"Cardinal de Richelieu\r\n        \"","divers":"","gps":"","images":["../image/image_17/17_Fort_Brouage_1.jpg","../image/image_17/17_Fort_Brouage_2.jpg","../image/image_17/17_Fort_Brouage_3.jpg","../image/image_17/17_Fort_Brouage_4.jpg"]},"Consult_chateau_formulaire10b0":{"id":"Consult_chateau_formulaire10b0","dept":"17","canton":"Marennes","commune":"St-Sornin","nom":"Fort_Broue","type":"Fort","periode":"X-XII","histoire":"TOUR de BROUE, mentionné pour la première fois dans une charte de 1047, mais il existe probablement au début du XIe siècle, quand le comte de Poitiers et duc dAquitaine Guillaume le Grand accorde au comte dAnjou Foulque Nerra « Saintes et quelques châteaux  en 1047, il appartient à Geoffroy Martel, fils de Foulque Nerra, qui sera le premier comte de Broue.  En 1062, le comte de Poitiers Guy-Geoffroy chasse par les armes Geoffroy Martel et prend alors en mains la destinée de Broue. Armes de la famille de Baussay. Il passe ensuite à la maison des Rochefort jusqu'en 1330. Et enfin il passe à la maison de Baussay , puis aux sires de Pons. En 1380, le roi Charles V accorde le château et les droits et privilèges seigneuriaux s'y rattachant à Renaud VI de Pons. Les sires de Pons garderont le château jusqu'au début du XVIIe siècle, avant de finalement l'abandonner, du fait de l'envasement de l'ancien golfe, rendant le site obsolète d'un point de vue stratégique. Au XVIIIe siècle, le château apparaît déjà ruiné sur les cartes de Claude Masse.","architecture":"BROUE, les ruines de ce donjon, bâti sur une colline haute de 27 mètres dominant l'ancien golfe de Brouage, sont tout ce qui subsiste d'un puissant château-fort dont les origines remontent au XIe siècle. À cette époque, les marais ne s'étaient pas encore formés, et l'océan battait les remparts de cet important édifice défensif. Broue formait alors un port maritime, une paroisse et une châtellenie, dont l'enrichissement était dû au commerce du sel.  Le château était organisé autour d'un corps principal, d'une cour intérieure, d'une chapelle et du donjon proprement dit, qui mesurait alors près de 30 mètres de haut (il ne mesure plus que 25 mètres aujourd'hui), l'ensemble étant clos par une série de remparts, dont il subsiste quelques vestiges. Autour du château existait une petite ville dont il ne reste rien, mis à part quelques pans de murs à demi ruinés.              Le château est mentionné pour la première fois dans une charte de 1047, mais il existe probablement au début du XIe siècle, quand le comte de Poitiers et duc dAquitaine Guillaume le Grand accorde au comte dAnjou Foulque Nerra  Saintes et quelques châteaux .  Aujourd'hui préservé, le donjon laisse apparaître deux murs en moellons soutenus par des contreforts. Des restes des remparts, qui mesuraient à l'origine près de sept mètres de haut, sont toujours visibles.","habitants":"Maison des Rochefort\r\n        \"","divers":"Fort de Broue à Saint-Sornin 45° 47' 15\" Nord et 0° 58' 33\" Ouest","gps":"","images":["../image/image_17/17_Fort_Broue_1.jpg","../image/image_17/17_Fort_Broue_2.jpg","../image/image_17/17_Fort_Broue_3.jpg","../image/image_17/17_Fort_Broue_4.jpg","../image/image_17/17_Fort_Broue_5.jpg","../image/image_17/17_Fort_Broue_6.jpg"]},"Consult_chateau_formulaire6b88":{"id":"Consult_chateau_formulaire6b88","dept":"17","canton":"Marennes","commune":"Bourcefranc le Chapus","nom":"Fort_Chapus_Louvois","type":"Fort","periode":"XVIII","histoire":"CHAPUS, le fort Chapus, aujourdhui appelé fort Louvois, est édifié à partir de 1690 sur un rocher bordant le pertuis de Maumusson qui sépare lîle dOléron du continent. Louvois, ministre de la Guerre de Louis XIV, en ordonne la construction à Michel Begon, intendant de Rochefort, afin daugmenter la protection du mouillage dans la zone non couverte par les canons de la citadelle dOléron. Le fort, dont la réalisation est confiée à lingénieur François Ferry, doit croiser ses feux avec ceux de la citadelle dOléron. Le fort, dont la réalisation est confiée à lingénieur François Ferry, doit croiser ses feux avec ceux de la citadelle dOléron. Le projet de lingénieur consiste en un fort de forme ovale doté de deux étages de canons et deux tourelles encadrant sa porte ; une chaussée submersible à marée haute le relie à la terre ferme. Le chantier débute en janvier 1691. Le 19 juin 1691, Louvois valide le dernier projet de Ferry mais son décès un mois plus tard conduit à labandon dudit projet, critiqué par Vauban. Les fondations sont en cours. Elles ont coûté la moitié du prix total de la construction, aux vues des problèmes de stabilité du sous-sol.","architecture":"CHAPUS, le fort est modifié dans la seconde moitié du XVIIIe siècle. Des latrines-échauguettes sont percées donnant au fort son aspect actuel. En 1870, les canons sont remplacés par six mortiers, la garnison est de 36 soldats. Rongées par les marées, les fondations sont restaurées en 1875. Le fort est armé jusquen 1909, et remis aux Domaines en 1920. Classé au titre des M.H. en 1929, les bombardements de lartillerie allemande depuis la citadelle dOléron en 1944 lendommagent fortement. En 1960, la commune lachète et le restaure pendant 12 ans afin de le transformer en musée maritime et historique. Le fort se visite, librement ou lors de visites guidées, davril à novembre. Le fort Chapus, tour à batterie basse, illustre lévolution des conceptions de Vauban pour les fortifications côtières.","habitants":"ingénieur François Ferry\r\n        \"","divers":"Fort -Chapus à Louvois  45°5126 N ; 1°1027 O","gps":"","images":["../image/image_17/17_Fort_Chapus_Louvois_1.jpg","../image/image_17/17_Fort_Chapus_Louvois_2.jpg","../image/image_17/17_Fort_Chapus_Louvois_3.jpg","../image/image_17/17_Fort_Chapus_Louvois_4.jpg"]},"Consult_chateau_formulaireb714":{"id":"Consult_chateau_formulaireb714","dept":"17","canton":"Chatelaillon","commune":"Fouras","nom":"Fort_Fouras","type":"Fort","periode":"XII-XV","histoire":"Plusieurs fort à Fouras celui d'Enet, du Sémaphore, de Lapointe de l'aiguille et de Vauban                       ENET, le rocher d'Énet est fortifié dès le Moyen Âge. Le fort actuel est construit après la Bataille de l'île d'Aix, face à l'embouchure de la Charente. Le fort d'Énette, comme on disait à l'époque, devait protéger l'Arsenal de Rochefort créé en 1666.  Sa simplicité architecturale lui confère un équilibre esthétique souvent apprécié.                                                                                  FOURAS, la châtellenie de Fouras revient au XIe siècle à la famille de Rochefort qui obtient droit de haute, moyenne et basse justice, et de taxer les bateaux sur la Charente. En 1305, Philippe le Bel rachète Fouras et le rattache à la couronne, puis concède à nouveau ce fief qui changera plusieurs fois de seigneur, jusqu'à Jehan II de Brosse, seigneur de L'Aigle en 1449 , qui a construit le donjon de 1480 à 1490. C'est la fin de la guerre de Cent Ans. Durant les guerres de religion, la position stratégique de Fouras lui vaut d'échapper à la destruction ordonnée par Louis XIII pour toutes les places fortes après la prise de La Rochelle. Il en fait une forteresse royale. Durant la guerre de Hollande (1672 à 1678) elle protège l'embouchure du fleuve et les travaux de fortifications vont se poursuivre jusqu'en 1693. Lorsque le vieux fort de Rochefort-sur-Charente est devenu l'Arsenal royal de la Marine de Rochefort, le donjon de Fouras servait à observer les mouvements des navires et à envoyer des messages à la tour des signaux construite près du logis du chef d'Escadre.  Le fort et la citadelle ont été classés au M.H.e le 13 mars 1987.","architecture":"ENET, le projet est relancé sous Napoléon à la suite de l'affaire des brûlots qui voit la destruction partielle de l'escadre de Rochefort. La construction s'étale de 1809 à 1812. Le fort est remis à la Marine dès le mois de décembre 1811 pour permettre son armement. Jusqu'au milieu du XIXe siècle, il subit quelques adaptations à cause des assauts des marées. On installe des casemates entre 1848 et 1850. Propriétaire du fort, l'armée fait plusieurs expérimentations de tirs d'artillerie en 1863. Le fort sert aussi de prison pour quelques communards en 1871. Le fort est totalement réaménagé, dix ans plus tard, pour s'adapter aux progrès de l'artillerie rayée. Au début du XXe siècle, il est déclassé peu avant la première guerre mondiale.                                             FOURAS Il présente le plus bel exemple de donjon de place forte seigneuriale des fortifications du littoral. \r\nIl ne reste rien des premières constructions médiévales et le donjon actuel du XVe siècle constitue avec la muraille sud de la première enceinte la partie la plus ancienne. D'une hauteur de 30 mètres il forme quatre niveaux sur une crypte. Il est entouré des fortifications du XVIIe siècle : plates-formes, courtines, tour massive, le tout en à pic sur la mer, constructions caractéristiques de l'architecture militaire de l'époque du à Vauban.","habitants":"Famille de Rochefort\r\n        \"","divers":"Fort Enet  grav 7-8     46° 0' 13,75\" Nord et 1° 8' 37,46\" Ouest                                                                            Fouras   grav 1 à 6    45° 59' 09\" nord, 1° 05' 51\" ouest                                                                               Fort Lapointe à fouras grav-8","gps":"","images":["../image/image_17/17_Fort_Fouras_1.jpg","../image/image_17/17_Fort_Fouras_2.jpg","../image/image_17/17_Fort_Fouras_3.jpg","../image/image_17/17_Fort_Fouras_4.jpg","../image/image_17/17_Fort_Fouras_5.jpg","../image/image_17/17_Fort_Fouras_6.jpg","../image/image_17/17_Fort_Fouras_7.jpg","../image/image_17/17_Fort_Fouras_8.jpg"]},"Consult_chateau_formulairecca1":{"id":"Consult_chateau_formulairecca1","dept":"17","canton":"Chatelaillon","commune":"La Flotte Ile de Ré","nom":"Fort_la_Prée","type":"Fort","periode":"XVII","histoire":"La PREE, fort étoile à quatre bastions, dont deux tournés vers la mer, reliés par des courtines en demi cercle (cul de chaudron), doublée par une enceinte extérieure et un chemin couvert. Il abrite un petit port, ouvert à l'est. Il a été construit en partie avec des matériaux prélevés sur les ruines de Notre-Dame de Sainte-Marie-des-Châtelier, toute proche, et avec des pierres apportées par bateau des carrières de Crazannes. \r\nLe duc de Buckingham, en 1627, lors de son débarquement sur l'île, néglige ce fortin qui lui est fatal, puisqu'il rend possible, en octobre 1627, le débarquement nocturne de 800 hommes du régiment des Gardes françaises avec d'autres troupes royales commandée par le Maréchal Henri de Schomberg, envoyé en secours, permet de prendre les Anglais à revers et de les chasser de l'île. Sa conception est pourtant fortement critiquée, en 1658, par le gouverneur de l'île, pour sa taille trop petite, étant prévu pour seulement 400 hommes, mais, surtout, par sa vulnérabilité au manque d'eau potable. Des modifications furent entreprises, sur ordre de Colbert, en 1664, puis une enceinte supplémentaire édifiée, en 1672.","architecture":"La PREE, dans le cadre du mur de lAtlantique, pendant la seconde guerre mondiale, larmée doccupation y a intégré, en 1942, un blockhaus dobservation et un blockhaus des télécommunications, et sera renommée la batterie « Berta ». Le Fort a abrité, des années 1950 à 1980, un centre de vacances, géré par les PEP de l'Eure, pour enfants de 6 à 10 ans . Le fort appartient alors au Conseil Général de l'Eure, lequel a plusieurs centres dans l'île, dont La Ferme  en face du Fort  et l'Îlot Normand, au Bois-Plage. Il est cédé au comité national des uvres sociales de l'administration pénitentiaire (CNOSAP), actuellement propriétaire, après qu'un mur d'enceinte se soit effondré. Le CNOSAP en a assuré la restauration par des détenus, de 1981 à 1987, est vont être effectuées par les chantiers bénévoles du patrimoine jusqu'en 2011. Des visites y sont organisées d'avril à fin septembre et pour les vacances de la Toussaint, avec des animations durant la période estivale; ainsi que la privatisation du site, pour festivités et événements.  Le fort la Prée fait lobjet dun classement au titre des M.H., par arrêté du 21 mai 2008.","habitants":"Conseil Général de l'Eure,\r\n        \"","divers":"Fort de La Prée à la flotte","gps":"","images":["../image/image_17/17_Fort_la_Pr%c3%a9e_1.jpg","../image/image_17/17_Fort_la_Pr%c3%a9e_2.jpg","../image/image_17/17_Fort_la_Pr%c3%a9e_3.jpg","../image/image_17/17_Fort_la_Pr%c3%a9e_4.jpg","../image/image_17/17_Fort_la_Pr%c3%a9e_5.jpg"]},"Consult_chateau_formulaire7d3f":{"id":"Consult_chateau_formulaire7d3f","dept":"17","canton":"Chatelaillon","commune":"Fouras","nom":"Fouras_Chateau","type":"Château","periode":"XVIII-XIX","histoire":"Plusieurs châteaux à Fouras celui de bois-Vert, de Bugeau, du Treuil, et des villas  tel que la villa -Jetée et de la plage.                                                          BOIS-VERT  Cette belle demeure de style néo-classique date de 1870. Elle fut conçue à l'origine comme une habitation, puis sera transformée, en casino en 1886.  En 1887, l'aile gauche sera rajoutée. Une salle de spectacle fut inaugurée ultérieurement tandis que le parc, arboré de chênes-verts, attenant au château sera aménagé pour servir à des fêtes de plein air. En 1913, le château sera transformé en hôtel. Puis deviendra une maison de convalescence, afin d'accueillir les soldats blessés durant la Première Guerre Mondiale. Le château sera alors surnommé « l'Hôpital 103 ». En 1946, il est racheté par la commune et sera fermé en 1975. Le château de Bois Vert, toujour
