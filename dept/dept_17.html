les de Sainte-Maure, duc de Montausier homme de guerre, gouverneur du Grand Dauphin, et Julie dAngennes quil épousa après une cour assidue de huit ans et à laquelle il dédiera le célèbre ouvrage La Guirlande de Julie : comte et comtesse de Talmont, de 1656 à 1690. En 1830, elle est la propriété du charpentier Pierre Soulisse. Elle change deux fois de propriétaire avant d'être finalement acquise par la commune en 1859, dans le but d'y aménager l'école élémentaire du village.             LA-FOND,  la plus ancienne mention du logis de la Fond figure sur le plan de Talmont de l'ingénieur du roi Claude Masse datant du début du XVIIIe siècle. Au milieu de ce siècle et jusqu'en 1820, le logis appartient à la famille Thomas. En 1833, le domaine appartient à Guillaume Pairaudaux du 1763 à 1838, officier de la marine royale et maire de Talmont à partir de 1835. En 1908, le logis de la Fond est reconstruit par Alexandre Pellisson, négociant à Cognac et maire de Talmont de 1908 à 1912.","architecture":"TALMONT, le musée   conserve cette fonction jusqu'en 1970, avant que le faible nombre d'élèves scolarisés dans la commune n'entraîne la fermeture de l'école. Le bâtiment est alors acquis par la société des amis de Talmont dans le but de créer un musée consacré à l'histoire locale auquel est adjoint en 1992 un musée de la pêche. Les deux entités sont finalement municipalisées en 1998 puis réhabilitées par un syndicat mixte regroupant le conseil général et la commune.\r\nDomaine de LA-FOND, ce logis datant de la fin du XIXe siècle est construit pour les membres de la famille Pélisson Le domaine comprend un corps de bâtiment en double profondeur cantonné d'un pavillon et d'une tour cylindrique, auxquels viennent s'ajouter une série de dépendances séparées du bâtiment central par un jardin. La partie orientale du domaine abrite une fuie rectangulaire.","habitants":"Famille Thomas\r\n        \"","divers":"La Fond et vestiges   45° 32' 10\" nord, 0° 54' 24\" ouest","gps":"","images":["../image/image_17/17_Talmont_1.jpg","../image/image_17/17_Talmont_2.jpg","../image/image_17/17_Talmont_3.jpg","../image/image_17/17_Talmont_4.jpg"]},"Consult_chateau_formulaire517d":{"id":"Consult_chateau_formulaire517d","dept":"17","canton":"Jonzac","commune":"Saint-Sigismont de Clermont","nom":"Tenailles","type":"Château","periode":"XVIII","histoire":"TENAILLES, cest un domaine classé aux M.H. depuis une cinquantaine dannées. Désormais propriété dun homme daffaires américain, à la suite de ventes successives au fil des quarante dernières années, le château de la Tenaille, sa chapelle du XIIe siècle et ses écuries remarquables du XVIIIe siècle sont en état de complet abandon.","architecture":"TENAILLES, l'édifice était à l'origine une abbaye fondée au XIIe siècle par Gérard ou Girard de Salle, religieux de Fontevrault, de l'ordre de Saint-Benoît. Pendant la Révolution, l'abbaye de La Tenaille sera confisquée, et mise en adjudication le 21 décembre 1793 et reprise par M. et Mme de Labarre. La longue façade sur jardin, constituée de onze travées, s'élève sur trois étages séparés par un bandeau, dont un étage attique. Cette façade est animée en son centre par un avant-corps, coiffé d'un fronton triangulaire. Le niveau des fenêtres de cet avant-corps ne correspond pas aux étages du corps de logis, mais aux paliers intermédiaires de l'escalier d'honneur. La porte fenêtre ouvrant sur le jardin est encadrée de colonnes doriques et surmontée d'un linteau à trygliphes et métopes, formant balcon. Au début du XXe siècle, il a été maquillé en faux château de style Louis XVI. On le dota d'une toiture à l'italienne, avec balustres, masquant les tuiles. La façade antérieure a été complétée par l'adjonction d'une aile en retour d'équerre, ses baies ont reçu des guirlandes sculptées de style Louis XVI.","habitants":"Famille de Girard de Salle\r\n        \"","divers":"Château de Tenailles à Saint-Sigismont de Clermont","gps":"","images":["../image/image_17/17_Tenailles_1.jpg","../image/image_17/17_Tenailles_2.jpg","../image/image_17/17_Tenailles_3.jpg","../image/image_17/17_Tenailles_4.jpg","../image/image_17/17_Tenailles_5.jpg","../image/image_17/17_Tenailles_6.jpg"]},"Consult_chateau_formulaire8a61":{"id":"Consult_chateau_formulaire8a61","dept":"17","canton":"Thénac","commune":"Tesson","nom":"Tesson","type":"Château","periode":"XVI","histoire":"TESSON, au début du XVIe siècle, la seigneurie de Tesson appartient à la famille Gombaud, les Brémond puis les Guinot  marquis Étienne Louis Antoine Guinot de Monconseil de 1695 à 1782, seigneur de Tesson, ainsi que de Thénac, Courcoury et Rioux, fut un des plus illustres saintongeais du XVIIIe siècle. Tesson connaît au XVIIIe siècle une certaine renommée lorsquÉtienne Guinot, seigneur de Tesson et marquis de Monconseil, lieutenant général des armées du roi, décide en 1760 de se retirer sur ses terres, après une belle carrière militaire. Il y reconstruit lun des plus beaux châteaux de la région, démoli au XIXe siècle. Dans le bourg il fait édifier des halles, toujours visibles, afin que Tesson puisse accueillir des foires et des marchés, ainsi quun hospice. Cest au XVIIIe siècle aussi que débute lexploitation des carrières. Lexploitation cessa en 1960 et la rue, ou route, dite des carrières permet den retrouver la trace des entrées. Plusieurs belles maisons de maître du bourg et de fermes excentrées datent de ce siècle. Les nombreux moulins à vent (14 dénombrés en 1820), dont lemplacement est reflété dans la toponymie de plusieurs lieux-dits de la commune, sont désaffectés voire pour la plupart détruits. Il nen subsiste que deux.","architecture":"TESSON, de style renaissance de plan en U avec tour carré au centre  et deux corps de logis à deux  niveaux avec série  de lucarne  sur comble  à deux pans recouvert d'ardoise.                                                   GUYNOT gentilhommière à deux niveaux sur soubassement   avec tour centale rectangulaire à trois niveaux.","habitants":"Famille du  marquis Étienne Louis Antoine                  Guinot de Monconseil \r\n        \"","divers":"A Tesson le château de Tesson, de Guinot   grav-3 et le grand Hôtel grav 4 45° 37' 55\" nord, 0° 39' 11\" ouest","gps":"","images":["../image/image_17/17_Tesson_1.jpg","../image/image_17/17_Tesson_2.jpg","../image/image_17/17_Tesson_3.jpg","../image/image_17/17_Tesson_4.jpg"]},"Consult_chateau_formulaire031a":{"id":"Consult_chateau_formulaire031a","dept":"17","canton":"Matha","commune":"Thors","nom":"Thors","type":"Château","periode":"XVII","histoire":"THORS, l'état des paroisses de 1686 nous précise que la paroisse du Thors a pour seigneur monsieur le marquis de Pons, comporte 60 feux et que la terre y est bonne pour les grains et le vin. Thors, en Saintonge, était un des repaires ou recepts des évêques dAngoulême. Nous possédons la relation dune visite quy fit, vers la fin du XIIIe siècle, Guillaume de Blaye avec une suite nombreuse. Ynde, veuve dEbble de Rochefort, était alors dame de Thors. Guillaume, arrivé sur le bord du fossé, lui envoya dire dapporter toutes les clés du château, y compris celles des cachots ; ce qui fut fait. Les gens et les chevaux de la châtelaine, cédèrent ensuite la place à ceux de lévêque.","architecture":"THORS, il ne subsiste rien ou presque aujourd'hui de l'ancien château fort qui relevait alors de l'évêque d'Angoulême.  Ce château était à l'origine un « repaire, il était habité par un seigneur, mais celui-ci devait le céder à l'évêque dont il dépendait, dès lors qu'il lui en faisait la demande. Le premier seigneur de Thors semble être un certain Eblon de Rochefort. \r\nVéritable maître de la maison, celui-ci y resta le temps quil lui plut, rendant la justice, faisant grâce et exerçant dans le repaire tous les droits seigneuriaux. En partant il rendit les clés, sur le bord du fossé, en présence de sa suite, où se trouvaient Hyrvoix, seigneur de Ruffec le seigneur de Neuvic, les abbés de Fontdouce, de Bassac, de Lieu-Dieu et beaucoup dautres clercs et laïcs. En même temps il dit à la châtelaine : « je vous confie ces clés et la garde de ce repaire de Thors jusquà ce que nous ou notre successeur nous revenions et vous les réclamions. » Nul fait, je crois, ne montre mieux ce que furent à lorigine les concessions de fief.","habitants":"marquis de Pons\r\n        \"","divers":"Château de Thors45° 49' 58\" nord, 0° 18' 40\" ouest","gps":"","images":["../image/image_17/17_Thors_1.jpg"]},"Consult_chateau_formulaire974d":{"id":"Consult_chateau_formulaire974d","dept":"17","canton":"Thénac","commune":"Thénac","nom":"Thénac_Charente","type":"Château","periode":"XVIII","histoire":"THENAC, le château Maguier fut construit par Edmond Maguier entre 1873 et 1875 en pierre de Thénac ;  Edmond Maguier, poète, né en 1847 à Rioux, décédé en 1907 à Thénac.                                                      Le GRAND-LOGIS fut rebâti au XVIIIe siècle sur le modèle des chartreuses girondines par Étienne Guinot de 1695 à 1782, à qui son épouse depuis 1725, Cécile Thérèse Pauline de Rioult de Curzay de 1707 à 1787, réussit à faire attribuer en 1729 la seigneurie de Monconseil, terre érigée en marquisat par le Roi pour Louis de Lorraine, prince de Pons. Le marquis fera édifier en 1738 et agrandir en 1767 un hôtel à Saintes musée Dupuy-Mestreau, puis municipal, et reconstruire en 1735 celui de Thénac d'un style proche de celui de Boffrand détruit au XIXe siècle.  À sa mort le Grand Logis sera transmis à son gendre, le comte Jean-Frédéric de La Tour du Pin Gouvernet, ministre de la Guerre en 1789, puis à la famille Eschassériaux.","architecture":"A Thénac plusieurs châteaux de style différend du XVI au XIX siècle; le château Gallut dit Marguier style renaissance à deux niveaux avec pavillons rectangulaires de part et autre encerclant le corps de logis rectangulaire flanqué au centre d'un avant corps d'entrée saillant, de belles lucarnes sur combles.\r\nLe grand logis manoir rectangulaire  à deux niveaux  étages supérieurs à colombages flanque transversallement d'un pavillon avec toit en croupe.       Autre château plus maison forte que château appartenant à des viticulteurs.","habitants":"Thénac famille de Edmond Maguier                               le gd logis famille de Étienne Guinot\r\n        \"","divers":"Château de Marguier grav de 1à 3  du grand logis grav 7et 8 et autre château dans la commune                    45° 40' 07\" nord, 0° 39' 10\" ouest","gps":"","images":["../image/image_17/17_Th%c3%a9nac_Charente_1.jpg","../image/image_17/17_Th%c3%a9nac_Charente_2.jpg","../image/image_17/17_Th%c3%a9nac_Charente_3.jpg","../image/image_17/17_Th%c3%a9nac_Charente_4.jpg","../image/image_17/17_Th%c3%a9nac_Charente_5.jpg","../image/image_17/17_Th%c3%a9nac_Charente_6.jpg","../image/image_17/17_Th%c3%a9nac_Charente_7.jpg","../image/image_17/17_Th%c3%a9nac_Charente_8.jpg"]},"Consult_chateau_formulaired0b3":{"id":"Consult_chateau_formulaired0b3","dept":"17","canton":"Meschers sur Gironde","commune":"St-Simon de  Pélouaille","nom":"Tillade","type":"Château","periode":"XIX","histoire":"TILLADE, chambres d'hôtes  Michel et Solange de Salvert seront très heureux de vous accueillir dans cette grande maison de famille, qu'ils ont rénovée, avec tout le confort, pour mieux vous recevoir. Les chambres sont toutes rénovées et très confortables.","architecture":"TILLADE, au bout d'une longue allée de marronniers et de tilleuls, La Tillade se présente comme un vaste domaine à la fois château d'agrément et propriété viticole (cognac et pineau des Charentes). C'est une maison raffinée, où il fait bon vivre, grâce à la présence chaleureuse et joyeuse de Solange et Michel de Salvert, grâce aussi à l'atmosphère qu'ils ont créée en mariant un bel ensemble décoratif des XVIIIe et XIXe siècles à des couleurs vives et denses du meilleur effet.","habitants":"Famille de Salvert\r\n        \"","divers":"Château de Tillade à St-Simon de  Pélouaille","gps":"","images":["../image/image_17/17_Tillade_1.jpg"]},"Consult_chateau_formulaire2d8a":{"id":"Consult_chateau_formulaire2d8a","dept":"17","canton":"Saint-Jean d","commune":"Tonnay-Boutonne","nom":"Tonnay_Boutonne","type":"Château","periode":"XVIII","histoire":"A deux Km au nord-est le château d'Annezay, chambre d'hôte de la famille Jouve                            TONNAY-BOUTONNE , au Xe siècle, un château sur motte est mentionné. Au XIIe siècle, fortification du bourg.  Vers 1242, les armées du roi de France  Louis IX attaque la cité et s'en emparre. Au XIVe siècle, construction de la porte fortifiée nommée : Saint Pierre. Au XIXe siècle, destruction du château et d'une partie des remparts.  Au XXIe siècle, la découverte de l'extérieur de la porte est libre et gratuite. La visite de l'intérieur est interdite.","architecture":"TONNAY-BOUTONNE, la porte st- pierre par sa hauteur, l'ouvrage marque le respect et la puissance de l'ancienne cité. Il se compose de deux tours reliées par une voûte gothique, la base des tours possède un évasement permettant la stabilité et peut être l'efficacité des pierres rondes jetées depuis le sommet. Avec un peu d'attention il est possible de voir les traces de la herse, un rainurage mais un rattrapage des pierres rondes de la tour pour ne pas fragiliser l'angle fermé avec la paroi de la courtine. Au sommet, les consoles sont les vestiges des mâchicoulis. La courtine reliant les 2 tours a une faible épaisseur. A cause de l'arasement, il n'y a pas de crénelage ni mâchicoulis sur cette paroi. Un joli décor en pointe de diamant court sur deux niveaux sur les tours et la courtine. Force et coquetterie sont les qualificatifs de cette beauté. L'ouverture au centre devait correspondre à la salle des gardes. Pas de  fente pour les flèches d'un pont levis. Cette porte des XIIe et XIVe siècles est lunique vestige imposant danciens remparts.","habitants":"Famille Jouve\r\n        \"","divers":"","gps":"","images":["../image/image_17/17_Tonnay_Boutonne_1.jpg","../image/image_17/17_Tonnay_Boutonne_2.jpg","../image/image_17/17_Tonnay_Boutonne_3.jpg","../image/image_17/17_Tonnay_Boutonne_4.jpg","../image/image_17/17_Tonnay_Boutonne_5.jpg"]},"Consult_chateau_formulaire7f50":{"id":"Consult_chateau_formulaire7f50","dept":"17","canton":"Tonnay Charente","commune":"Tonnay Charente","nom":"Tonnay_Charente","type":"Château","periode":"Châteaux","histoire":"A cinq km au sud-est à st Hippolyte, le château de la Bergerie dont Il ne reste que des ruines.              CAPUCINS, dit de Rochecouart-Mortemart est un édifice d'origine médiévale, construit en pierres en 1090, sur les restes d'un castellum romain, puis d'un château carolingien construit en bois en 765. Ce château fut achevé au début du XIIe siècle mais il a connu de nombreuses destructions par la suite, notamment pendant la guerre de cent ans, en 1574 pendant les guerres de Religion, en 1651 pendant la Fronde. Il fut reconstruit au début du XVIIIe siècle avec restauration de la grosse tour médiévale et agrémenté d'un parc à la française mais, en 1760, un violent incendie le ravagea en très grande partie. En 1791, il fut vendu comme bien national et abrita les services de la mairie jusqu'en 1846. À partir de 1913, il servit de sanatorium. Il est aujourd'hui occupé par la Croix-Rouge Française avec pour dénomination \"Institut Médico-Professionnel.  Madame de Montespan, maîtresse du roi Louis XIV, séjourna à de nombreuses reprises dans le château. Celui-ci, toujours debout, est actuellement la propriété de la Croix-Rouge française.","architecture":"CAPUCINS  Camping  balisé du patrimoine tonnacquois et admirez les vestiges des remparts de l'ancien château-fort.                                              CENTRE RICHARD  Il s'agit d'un grand immeuble à deux étages, d'architecture simple, délimité par un bandeau entre chaque étage, qui relevait de l'ancienne abbaye et qui était géré par les Surs de Saint-Vincent-de-Paul. Légué à la ville en 1842,  Aujourd'hui, ce grand bâtiment a gardé sa vocation sociale par son lieu d'accueil et de rencontre des personnes du Troisième âge et a élargi cette fonction vers des activités culturelles multiples.\r\nBERGERIE est un ancien château féodal bâti entre les communes de Saint-Hippolyte et La Vallée.  Les seigneurs  étaient : François de La Rochefoucauld, mort en 1571, seigneur de Bayers, du Parc dArchiac, de la Bergerie, baron dAirvaut  épousa Isabelle de Lanes alias de Lanes de Cuzaguès, fille de Clinet de Lanes, trépassé en 1544, Baron de Belhade, seigneur de La Rochebaladé (depuis Rochechalais) et Catherine de Mortemer, dame d'Ozillac.","habitants":"Madame de Montespan,\r\n        \r\n        \"","divers":"Château des Capucins,  du Centre-Richard  à Tonnay-Charente Bergerie 45° 54' 05\" Nord et 0° 52' 25\"","gps":"","images":["../image/image_17/17_Tonnay_Charente_1.jpg","../image/image_17/17_Tonnay_Charente_2.jpg","../image/image_17/17_Tonnay_Charente_3.jpg","../image/image_17/17_Tonnay_Charente_4.jpg","../image/image_17/17_Tonnay_Charente_5.jpg"]},"Consult_chateau_formulaire4f4a":{"id":"Consult_chateau_formulaire4f4a","dept":"17","canton":"Pons","commune":"Pons","nom":"Usson_Pernan","type":"Château","periode":"XIV-XIX","histoire":"USSON dit d'EGRETAUX ou d'Enigmes, au XIVe siècle Hélie du Fâ est seigneur d'Usson et passe aux Rabaine au XVIe siècle William Augereau, propriétaire des Égretaux, achète en 1879 les restes du château d'Usson, implanté sur la commune d'Echebrune, située à 7,5 km à l'est de Pons. Menacé de tomber en ruines, il fait démonter et transporter sur des wagonnets les éléments du château dont le transfert commence en 1886. Il en achève la reconstitution au cours de l'année 1890, sur un site agreste, près de la vallée de la Seugne,  le château est reconstruit selon les fantaisies de son acheteur qui y a ajouté des éléments provenant d'autres édifices, dont une cheminée du château de Pons et des boiseries régence du château de Rosny-sur-Seine.  Le château des Egreteaux  donne le tournis  avec son concept original qui mêle l'histoire au divertissement. Philippe Lapouyade est l'animateur et le créateur du site original au décor de rêve. Le 14 mai 1925, le château a été inscrit au titre des M.H.. \r\n  PERNAN   A deux kilomètres au sud -Est, le château de Pernan à Avy  datant du XVIe siècle, chambres d'hôtes de Rénier Emanuel.","architecture":"USSON-EGRETAUX,  le château est réédifié selon un plan fantaisiste où le bâtiment principal a la forme d'un U, avec un corps de logis à galerie Renaissance, dont le centre du rez-de-chaussée est occupé par un jardin d'hiver. Les deux ailes ont des tourelles, l'aile la plus large a été constituée à partir de la galerie Renaissance datée de 1536, elle se compose d'un portique dont les arcades à anse de panier très larges et comme écrasées sont encadrés par des pilastres cannelées terminés par des chapitaux corinthiens, au-dessus  un entablement garni de médaillons ornés de portraits sert d'allège aux fenêtres de l'étage, qu'un second entablement, sur lequel se détachent des galbes triangulaires, séparé d'une crête décorative faite de merlons et de créneaux dépourvu  de toute fonction défensive,  et seulement du côté de la cour centrale sont ornées de décors Renaissance, broderies de sculptures et frontons des fenêtres. On note l'ancien porche inséré dans l'aile gauche et à droite la tour aveugle surmontée d'un lanternon, qui sont de conceptions diverses. Les façades externes donnent sur le parc, ses pelouses et ses grands arbres.\r\nPERNAN; l'édifice  de plan rectangulaire à deux niveaux toit à deux pans flanqué côté cour d'une tour polygonale à escalier à vis.","habitants":"Famille de William Augereau\r\n        \"","divers":"Chaâteau d'Usson 45° 34' 07\" nord, 0° 32' 13\"     ouest  et de Pernan grav 6-7-8","gps":"","images":["../image/image_17/17_Usson_Pernan_1.jpg","../image/image_17/17_Usson_Pernan_2.jpg","../image/image_17/17_Usson_Pernan_3.jpg","../image/image_17/17_Usson_Pernan_4.jpg","../image/image_17/17_Usson_Pernan_5.jpg","../image/image_17/17_Usson_Pernan_6.jpg","../image/image_17/17_Usson_Pernan_7.jpg","../image/image_17/17_Usson_Pernan_8.jpg"]},"Consult_chateau_formulaire1cf6-3":{"id":"Consult_chateau_formulaire1cf6-3","dept":"17","canton":"Thénac","commune":"Retaud","nom":"Vallade_Rétaud","type":"Château","periode":"XVIII","histoire":"VALLADE, il appartenait à Henriette Michel, Veuve de Seguin Gentil, Seigneur de Lafond et de Rétaud. Sa fille Eustelle puis sa petite fille Angélique, en hériteront. Angélique, divorce de son époux, qui a émigré durant la Révolution, se remarie avec Jean Millon. En 1823, après un long procès pour régler la succession, le château de La Vallade sera saisi et adjugé à Henri Constant dAbzac. En 1844, celui-ci le cède au comte Jean de Luc, connu sous le nom de Frère Théodore, fera transformer le logis de Vallade en asile de Notre-Dame de Vallade. C'est en 1844, qu'il propose de recevoir des enfants orphelins ou abandonnés.  Il a été prouvé que les enfants vivaient dans de mauvaises conditions d'accueil et de carences éducatives, liées, en particulier, à l'absence de personnel féminin. Plus tard, ces mêmes encadrants seront accusés d'abus sexuels sur des mineurs, à la colonie pénitentiaire de Pezet, dans l'Aveyron. Suite à la faillite de l'établissement, le domaine de Vallade est, une nouvelle fois, saisi et revendu, en 1852, par le Tribunal de Saintes. Georges Joseph Picard le racheta puis, en 1890, décida de le revendre à la famille Meaume.","architecture":"VALLADE, construit en 1746, au 2ème quart du XVIIIe siècle.  Ses façades, ses toitures, les deux perrons et son escalier à balustres à l'intérieur sont inscrits aux M.H. depuis le 3/07/1992. Le Logis de Vallade est depuis une propriété privée, fermée au Public.L'édifice à deux niveaux avec  série de lucarnes sur toits brisés et fronton triangulaire sur porte d'entrée.","habitants":"Comte Jean de Luc\r\n        \r\n        \"","divers":"Vallade  45° 41' 46\" Nord et 0° 42' 41\" Ouest","gps":"","images":["../image/image_17/17_Vallade_R%c3%a9taud_1.jpg"]},"Consult_chateau_formulaire87e9":{"id":"Consult_chateau_formulaire87e9","dept":"17","canton":"Saint-Jean d","commune":"Villeneuve la Comtesse","nom":"Villeneuve_Comtesse","type":"Forteresse","periode":"XIII","histoire":"VILLENEUVE la COMTESSE, au Xe siècle, la seigneurie appartient à Guillaume, comte du Poitou. Au XIIe siècle, un château est construit à la frontière de deux fiefs importants : la Guyenne et le Poitou.  Au milieu du XIIe siècle, appartient à Aliénor d'Aquitaine. A la fin du XIIe siècle, Richard Ier Cur de Lion, Roi d'Angleterre, est propriétaire du château. Au début du XIIIe siècle, le château est possession de Jean-sans-Terre.  En 1350,  appartient à la couronne de France.  Au XIVe et XVe siècle, durant la guerre de cent ans, la forteresse appartient alternativement aux Anglais et aux Français. En 1433, le Roi de France Charles VII donne le  château et les terres à Christin de la Chambre. En 1524, par son mariage avec Marie de la Chambre, Christophe de La Laurencie est le nouveau propriétaire. Au XVIe siècle, durant les guerres de religion, le château fort résiste aux assauts des protestants. Vers 1792, les révolutionnaires récupèrent le château à la famille La Laurencie et le vendent comme bien national à André Marchand  homme de paille de la famille La Laurencie. En 1834, Marie-Anne de La Laurencie donne le château à sa petite nièce Marie-Sophie Augier de Saint André. Vers 1840, le château est vendu aux ancêtres de l'actuel propriétaire de ce début du vingtième siècle. En 1949, le château est inscrit aux M.H. A la fin du XXe siècle, le propriétaire le restaure avec passion.","architecture":"VILLENEUVE, il est construit sur un terre-plein de 48 mètres sur 58 mètres entouré de fossés de 15 mètres de large maintenant en partie comblés. Le châtelet d'entrée carré de 10 mètres de côté est au centre de la façade nord. Il est encore haut de 18 mètres bien qu'ayant été dépossédé de ses créneaux et de ses mâchicoulis en 1848. D'après les archives il était haut de près de 28 mètres. L'entrée s'y faisait par le pont-levis et une poterne. Deux tours de 4 mètres de diamètre et 10 mètres de hauteur sont aux angles sud-est et sud-ouest et les courtines sud, Est et ouest de 10 mètres de hauteur forment avec elles et le donjon l'enceinte qui pourrait remonter au XIVe siècle. Le château est inscrit depuis septembre 1949  au M.H.  Le pigeonnier, carré, en pied pourrait lui aussi remonter au XVIIe siècle.","habitants":"Famille La Laurencie\r\n        \r\n        \"","divers":"Villeneuve 46° 05' 23\" Nord et 0° 30' 09\" Ouest","gps":"","images":["../image/image_17/17_Villeneuve_Comtesse_1.jpg","../image/image_17/17_Villeneuve_Comtesse_2.jpg","../image/image_17/17_Villeneuve_Comtesse_3.jpg","../image/image_17/17_Villeneuve_Comtesse_4.jpg","../image/image_17/17_Villeneuve_Comtesse_5.jpg","../image/image_17/17_Villeneuve_Comtesse_6.jpg"]}};

function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','17 — Charente-Maritime'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
