s propriété de la commune.                            BUGEAU est appelé aussi la Villa Jetée à Fouras, dans le département de la Charente-Maritime, en région Nouvelle-Aquitaine, en France. Il fut construit en 1903, au Port Nord. Il est connu aussi sous le nom de Château Bugeau.  La Jetée, et inscrit aux M.H. depuis 2007.     Hôtel particulier bâti en 1903, la villa située au Port Nord, également connue sous le nom de château Bugeau la Jetée, est inscrite aux M.H. romans ou à des séries télévisées, bien avant que le « Père Fouras », personnage clé du jeu télévisé Fort Boyard, le contribue à populariser la cité.","architecture":"TREUIL-BUSSAC, cette maison noble datant du début du XVIIe siècle fut reconstruite par la famille D'Ansays, issue de la noblesse de robe protestante, sur les ruines d'un château plus ancien, ruiné par les guerres de religion, lui-même bâti sur des fondations gallo-romaines . En 1633, le seigneur du lieu était Jean-Marc d'Ansays, notable et commerçant de La Rochelle. Son fils, Pierre d'Ansays du Treuil, fut contraint d'abjurer la religion calviniste sous la contrainte lors de la révocation de l'édit de Nantes. La seigneurie passa ensuite à Jean d'Ansays du Treuil-Bussac, son fils. Au début du XVIIIe siècle, la famille d'Ansays possédait de nombreuses propriétés situées dans les paroisses de Fouras et de Saint-Laurent-de-la-Prée (fief de la Motte, fief de Magnou, terres de La Raize), ainsi qu'une demeure à La Rochelle, le château, très sobre, constituait une des principales propriétés de la famille. Il est entouré d'une enceinte flanquée de tourelles à bretèches, ouvrant sur une cour via un double porche - à piétonne et à charretière,  daté de 1621. Adossé à l'enceinte, le logis est desservi par un escalier droit. Des vestiges d'époque gallo-romaines ont été retrouvés dans la propriété en 1872 et 1883, notamment un moyen-bronze daté du IVe siècle représentant l'empereur Maximien Hercule.","habitants":"Famille d'Ansays, \r\n        \"","divers":"Bois verts: grav-2.    45° 59' 16\" Nord et 1° 05' 35\" Ouest                                                                           Bugeau grav-3.    45° 59' 45,19\" Nord et 1° 5' 57,78\" Ouest                                                                               Treuil Grav 3-4-5                 5° 59' 16\" Nord et 1° 05' 35\" Ouest","gps":"","images":["../image/image_17/17_Fouras_Chateau_1.jpg","../image/image_17/17_Fouras_Chateau_2.jpg","../image/image_17/17_Fouras_Chateau_3.jpg","../image/image_17/17_Fouras_Chateau_4.jpg","../image/image_17/17_Fouras_Chateau_5.jpg"]},"Consult_chateau_formulaireb36c":{"id":"Consult_chateau_formulaireb36c","dept":"17","canton":"Thénac","commune":"Salignac sur Charente","nom":"Garde_Salignac","type":"Château","periode":"XVII","histoire":"La GARDE, bâti à Salignac-sur-Charente, est situé à la sortie orientale du bourg. Relevant de la puissante forteresse de Merpins, cétait au XIVe siècle une possession de Louis de France, duc dOrléans, comte dAngoulême, de Cognac et de Merpins, assassiné par Jean Sans Peur en 1407. Son fils, Comte dAngoulême, dit \"Bon Comte Jean\", laliéna aux Green de Saint-Marsault lors de sa captivité en Angleterre où il resta plus de 30 ans en prison, pour contribuer au paiement de sa rançon. La première mention connue du fief de La Garde est un aveu rendu en 1470 au seigneur de Merpins, par Jean de La Magdeleine, écuyer. Cette maison-forte et hébergement fut complètement remodelée sous le règne dHenri IV, et terminée lannée de sa mort, en 1610, comme en fait foi la date inscrite sur une belle porte à fronton. En 1651, Osé Green de Saint Marsault vendit le château aux Brémond, seigneurs dArs, dont une branche loccupa dans la deuxième moitié du XVIIe et XVIIIe siècles. En 1770, la fille de Charles de Brémond dArs, marquise de Verdelin, amie de Jean-Jacques Rousseau, était propriétaire de la Garde et du Slençon, près de Cognac.","architecture":"La GARDE, château date du XVIIe siècle, il est le seul M.H.  classé de la commune. Lédifice est inscrit à linventaire supplémentaire des M.H. depuis 1987. Au cours des années 2008/2009, son propriétaire a effectué un grand travail de restauration, qui a permis de redonner les lumières d'antan à ce bel édifice. Ce logis imposant, à façade austère, est caractéristique d'un style renaissance tardif. Lensemble architectural sapparente à un manoir de plaisance. Sa situation dans une plaine ne lui  confère pas  un rôle de défense. La présence de canonnières judicieusement réparties est uniquement dissuasive. En effet, en labsence de fossé et de courtine et compte tenu du nombre douvertures au rez-de-chaussée, le château nopposerait aucune résistance à un assaut militaire. Lunité du plan, lhomogénéité des constructions et la qualité des encadrements des baies témoignent dun chantier encadré par un architecte et réalisé par une main duvre qualifiée présente en continu. Lédifice correspond parfaitement à larchitecture édifiée durant le règne dHenri IV. Il se démarque des autres châteaux construits dans la région à la même période par la discrétion des aménagements militaires, souvent ostentatoires.","habitants":"Famille deJean de La Magdeleine\r\n        \"","divers":"La Garde à Salignac  45° 40' 22\" Nord, 0° 25' 19\" Ouest                                                                              Hôtel Breuil à Salignac grav-4","gps":"","images":["../image/image_17/17_Garde_Salignac_1.jpg","../image/image_17/17_Garde_Salignac_2.jpg","../image/image_17/17_Garde_Salignac_3.jpg","../image/image_17/17_Garde_Salignac_4.jpg"]},"Consult_chateau_formulaire2089":{"id":"Consult_chateau_formulaire2089","dept":"17","canton":"Marennes","commune":"Marennes","nom":"Gataudière","type":"Château","periode":"XVII","histoire":"GATAUDIERE, le 26 avril 1367, de  Guillaume de Ransanne , en 1372, relevait, à son tour, des puissants sires de Pons. L'avant-dernier propriétaire de l'ancienne Gataudière était un certain François Fresneau de la Ruchauderie, escuyer, seigneur de la Parée, de Trillou et autres lieux, conseiller et secrétaire du Roy. En 1700, il avait épousé Anne Regnauld qui lui apportait en dot la Gataudière et pris le titre de seigneur de la Gataudière : de cette union naquit, le 29 septembre 1703, un fils, François. François Fresneau, 1703-1770, ingénieur du roi -Au cours de son séjour à la colonie, ce disciple de Vauban, mathématicien, botaniste et explorateur, devait découvrir en 1747, après quatorze ans de recherches, l'hévéa ou l'arbre à caoutchouc qui, plus tard, le rendra célèbre. Dès son retour en France, en 1749, Fresneau entreprit de reconstruire sa maison natale. La petite fille de François Fresneau, épousera, en 1794 François Chasseloup Laubat, le futur général commandant en chef le Génie de l'armée d'Italie c'est ainsi que la Gataudière devint la propriété de la famille du prince Murat de Chasseloup Laubat, descendant directement par sa mère, Magdeleine de Chasseloup Laubat du 1901  à 1945, fille aînée du marquis Louis de Chasseloup Laubat (1863-1954), qui épousa en 1923  le prince Achille Murat du 1898 à 1987, arrière petit-fils de Joachim Murat, roi de Naples et des Deux-Siciles, et de son oncle, le marquis François de Chasseloup Laubat du 1904 à 1968. Appartient aujourd'hui au prince Murat.","architecture":"GATAUDIERE . on retrouve dans son uvre la synthèse de sa vie : d'une part, un amalgame des styles Louis XIV, Régence et Louis XV et, d'autre part, l'empreinte du mathématicien et de l'architecte militaire.  puis de la Grande Armée : c'est un bâtiment en longueur, centré sur un pavillon central de 3 travées orné de pilastres, à fronton triangulaire qui surplombe le reste du logis.  L'ensemble présente une symétrie de 11 travées avec un soubassement de pièces en demi-étage, un étage de hautes fenêtres à partie supérieure en demi-cercle, des ouvertures du 2e étage dans le brisis de la toiture (4 de chaque côté) et dans le fronton . Côté jardin, une terrasse masque le soubassement. Le fronton est sculpté d'un \"triomphe de Flore\".","habitants":"Famille de François Fresneau\r\n        \"","divers":"Gataudière à Marennes et maison forte grav-6  : 45° 50' 05\" Nord et 1° 06' 51\" Ouest","gps":"","images":["../image/image_17/17_Gataudi%c3%a8re_1.jpg","../image/image_17/17_Gataudi%c3%a8re_2.jpg","../image/image_17/17_Gataudi%c3%a8re_3.jpg","../image/image_17/17_Gataudi%c3%a8re_4.jpg","../image/image_17/17_Gataudi%c3%a8re_5.jpg","../image/image_17/17_Gataudi%c3%a8re_6.jpg"]},"Consult_chateau_formulaired73a":{"id":"Consult_chateau_formulaired73a","dept":"17","canton":"Saint-Porchaire","commune":"Geay","nom":"Geay","type":"Château","periode":"XVI","histoire":"GEAY, le château a été construit par Jean de Latour de Geay vers 1591 afin de remplacer la précédente demeure de sa famille qui était difficilement défendable car située au centre du bourg. Dans le contexte de la fin des guerres de religion, le seigneur de Geay avait en effet reçu de sa suzeraine, la dame de Tonnay-Charente.","architecture":"GEAY, ce château rectangulaire entouré de deux pavillons carrés se distingue par sa haute toiture en ardoise. Il est ceinturé d'une muraille qui comptait à l'origine une tour à chacun des quatre angles, dont seules deux subsistent aujourd'hui. L'ensemble de la construction fait preuve de sobriété à l'exception de la porte d'entrée, remarquable par ses pilastres et son fronton triangulaire. La construction du château de Geay date de la fin du XVIe siècle. A la fin des guerres de religion,l'autorisation de fortifier son domaine; qui appartenait a sa famille depuis 1490. Le Château de Geay fut alors pourvu d'un mur d'enceinte, de bretèches et d'archères. Le château de Geay, qui a vu passer 20 générations, est toujours aux mains de la famille qui l'a fait ériger. Il est inscrit aux aux M.H. depuis 1986.","habitants":"Famille de Jean de Latour de Geay\r\n        \"","divers":"Geay 45° 52' 15\" nord, 0° 44' 55\" ouest","gps":"","images":["../image/image_17/17_Geay_1.jpg","../image/image_17/17_Geay_2.jpg"]},"Consult_chateau_formulaire10d5-2":{"id":"Consult_chateau_formulaire10d5-2","dept":"17","canton":"Pons","commune":"Givrezac","nom":"Givrezac_Gémozac","type":"Château","periode":"XV-XVIII","histoire":"Deux châteaux à Givrezac dont celui de Givrezac  et celui de la salles à Gémozac à peu de distance au nord ouest.                                                         GEMOZAC, le chateau dit de la SALLES   au nord -ouest  une bourgeoisie active et protestante soccupe du négoce des vins, des eaux de vie de cognac et des céréales, pendant que deux puissants seigneurs des lieux résident dans les deux châteaux de Gémozac, les logis de Bernessard et de La Salle. Ils veillent jalousement sur cette grande paroisse, qui est déjà lune des plus peuplées de lancienne province de Saintonge. En tant que représentants de laristocratie terrienne, ils pèsent de tout leur poids lors de la constituante pour faire de Gémozac un chef-lieu de canton.  Ce château aurait été bâti en 1730 par le chevalier d'Aubeterre, seigneur de Gémozac.        GIVREZAC dit logis de  Charpenaise. Vers le milieu du XVe siècle, la seigneurie de Jonzac est la possession de Geoffroy Gombaud en la châtellenie de Cozes. Ce dernier est issu par filiation d'une des plus anciennes familles de Saintonge. Dans la seconde moitié du XVe siècle apparaît le nom d'Izabeau de Maugésir. Ce dernier attribue une rente  à l'Hôpital Neuf de Pons, puis une aux frères prescheurs de Pons. En 1522, Marguerite Gombaud vend ses fiefs, terres et seigneurie de Givrezac à Guillaume de Balode. La famille de Gombaud s'éteint au XVIIe siècle. Givrezac est l'une des plus petites communes de Saintonge.","architecture":"GEMOZAC, ce château aurait été bâti en 1730 par le chevalier d'Aubeterre, seigneur de Gémozac. L'édifice de plan en U est bordé de fossés couronnés de balustrades traversées par des ponts de pierre. Deux pavillons symétriques, rectangulaires, encadraient une clôture au centre de laquelle se trouvent encore les traces du portail et d'une porte piétonnière.   GIVREZAC  dit logis de Charpenaise du XVIIIe siècle de plan en U  à deux niveaux retour \"en équerres formant une cour carrée et d'un pigeonnier du XVIIe siècle.","habitants":"Salles; Famille du chevalier d'Aubeterre            Giversac     famille de Gombaud           \r\n        \"","divers":"Château à Salles  45° 34' 11\" nord, 0° 40' 29\" ouest  Gemozac grav-1                                                Givrezac grav 2-3","gps":"","images":["../image/image_17/17_Givrezac_G%c3%a9mozac_1.jpg","../image/image_17/17_Givrezac_G%c3%a9mozac_2.jpg","../image/image_17/17_Givrezac_G%c3%a9mozac_3.jpg"]},"Consult_chateau_formulaireb562-2":{"id":"Consult_chateau_formulaireb562-2","dept":"17","canton":"Chätelaillon","commune":"Île d","nom":"Ile_Aix","type":"Fort","periode":"XVII-XVIII","histoire":"ÎLE-D'AIX  appelle aussi  la \"petite Corse de l'Atlantique\" ! Sur ce petit croissant de paradis de 3 kms. Les fortifications de lîle dAix méritent une visite toute particulière. En effet, clé de voûte de la ceinture de feu protégeant larsenal de Rochefort et sa Rade.  Fort de la Rade face au fort Boyard, sur la partie méridionale de l'île, la pointe Sainte-Catherine accueille dès la création de l'arsenal de Rochefort les premières fortifications de l'île d'Aix.  S'inspirant de plans conçus par Vauban, l'édification du fort de la Sommité débute en 1699 pour s'achever en 1703. Accessible par un pont-levis et entouré de douves, l'ouvrage est par la suite flanqué de cinq bastions, dont les stigmates restent visibles aujourd'hui lors des grandes marées. En 1779, Montalembert, secondé par Choderlos de Laclos, entreprend la construction sur le même emplacement d'un ouvrage en bois, fort éphémère puisque détruit en 1783 sans avoir jamais livré le moindre combat. Le fort de la Rade doit sa physionomie et son nom actuels aux travaux napoléoniens. Doté d'un imposant bâtiment central destiné à accueillir les pièces d'artillerie, le fort dispose de longs remparts permettant de faire le tour de l'ouvrage, en offrant une vue imprenable sur les îles Madame, d'Oléron et de Ré, les deux phares de l'île d'Aix, et le célèbre fort Boyard.","architecture":"LIEDOT, Fort de  1808, Napoléon Ier décide la construction, sur le point culminant de lîle, dun fort  indestructible et imprenable. Les travaux débutent en 1810 et sachèvent en 1834. Louvrage pouvait abriter une garnison forte de 600 hommes. Lieu de détention pour des prisonniers militaires et politiques, dont Ahmed Ben Bella, premier président de la république dAlgérie, il est aujourdhui la propriété du conservatoire du littoral et des rivages Lacustres.\r\nLe fort Liédot, d'abord nommé fort de la Sommité, Initialement à visée défensive, à la demande de Napoléon Ier, il remplit, tour à tour, bien d'autres fonctions : il fut un lieu de détention, une cible d'expériences de tir, puis une colonie de vacances de l'Armée. Destination prisée des randonneurs et des cyclistes, propriété du conservatoire du Littoral, géré par la commune, il est aujourd'hui ouvert en saison estivale aux visites guidées, sa cour intérieure sert de décor aux spectacles en été.","habitants":"Vauban et Montalembert\r\n        \"","divers":"Ile d'Aix le fort la Rade grav de 1 à 4, le fort Liedot grav 5 et 6","gps":"","images":["../image/image_17/17_Ile_Aix_1.jpg","../image/image_17/17_Ile_Aix_2.jpg","../image/image_17/17_Ile_Aix_3.jpg","../image/image_17/17_Ile_Aix_4.jpg","../image/image_17/17_Ile_Aix_5.jpg","../image/image_17/17_Ile_Aix_6.jpg"]},"Consult_chateau_formulaire5276":{"id":"Consult_chateau_formulaire5276","dept":"17","canton":"Saint-Martin de Ré","commune":"Île de Ré","nom":"Ile_de_Ré","type":"Fort","periode":"XV-XVI","histoire":"ÎLE de RE dit  manoir d'Hasrel  bâti à Rivedoux-Plage, La seigneurie de Rivedoux remonte au 15/01/1480. Messire Jean I Bruneau, écuyer, décide de faire bâtir, en 1593, autour de son manoir, les premières habitations de Rivedoux. Le manoir va appartenir ensuite à la famille d'Hastrel, devenue le Seigneur de Rivedoux (une rue de la commune porte le nom du Comte d'Hastrel). Sa tour est le seul vestige qui reste de la seigneurie de Rivedoux, créée en 1480. En 1661 Philippe Mancini Duc de Nevers fut Gouverneur de lîle. En 1681, Vauban revisite les défenses des trois redoutes de l'île, Les Portes-en-Ré, Le Martray (Ars-en-Ré) et Rivedoux-Plage, puis il commence à fortifier Saint-Martin en commençant par reconstruire la citadelle qui avait été rasée en même temps que les fortifications de La Rochelle, à la suite du siège de 1573.  Les 15 et 16 juillet 1696, la flotte anglaise bombarde Saint-Martin-de-Ré. Le 23 août 1743, Madame de Tencin reçoit la baronnie de Saint-Martin de l'Isle de Ré des dépouilles de Charles-Joseph de La Fresnay. En 1745, elle délègue ses fiefs de la Grenetière à Penaud des Marais .","architecture":"La centre historique de l'île est Saint-Martin-de-Ré, qui forme avec la commune voisine de La Flotte l'unité urbaine  d'une population de 5 302 habitants en 2013.L'île de Ré est séparée du continent par le pertuis Breton et se situe au nord des îles d'Aix, d'Oléron, de Madame et de Nôle, et des forts Boyard, d'Énet et de Louvois situé dans le pertuis d'Antioche au sud. Depuis le 19 mai 1988, elle est reliée au continent par le pont de l'île de Ré   qui possède de nombreux monuments historiques notables. Le plus touristique, le phare des Baleines, a été construit en 1853, à la pointe ouest de l'île. Sa hauteur est de 57 m, et sa portée de 39 km. Un phare plus ancien, moins haut, situé à côté du grand , a été édifié à l'époque de Vauban (1682). L'île possède d'autres monuments, à Saint-Martin-de-Ré, inscrits au Patrimoine mondial de l'UNESCO, l'enceinte et ses deux portes, sa citadelle, construites pour se protéger des Anglais, l'hôpital, de nombreux corps de garde, une poudrière ; à La Flotte un fort, appelé Fort La Prée, (modifié par Vauban) datant de 1625, et deux redoutes à Rivedoux-Plage et au Martray à Ars-en-Ré.                                RIVEDOUX La tour du manoir d'Hastrel (XVIIe siècle) est un des rares vestiges subsistant de la seigneurie de Rivedoux créée en 1840 par Louis de la Trémoille. Située rue Albert-Sarrault, elle s'élevait autrefois à la pointe de l'île,avant que la mer ne se retire progressivement...","habitants":"seigneurie de Rivedoux,\r\n        \"","divers":"A l'ile de Ré le fort Legroin.                                  Hastrel 46° 09' 37\" Nord et 1° 16' 28\" Ouest","gps":"","images":["../image/image_17/17_Ile_de_R%c3%a9_1.jpg","../image/image_17/17_Ile_de_R%c3%a9_2.jpg","../image/image_17/17_Ile_de_R%c3%a9_3.jpg"]},"Consult_chateau_formulaire6974":{"id":"Consult_chateau_formulaire6974","dept":"17","canton":"Saint-Porchaire","commune":"Saint-Sulpice -D","nom":"Isleau_Tour","type":"Vestiges","periode":"XII","histoire":"TOUR-ISLEAU, ce vestige féodal qui date du XIIe siècle représente un des plus anciens monuments militaires de la région. Certains attribuent l'édification du donjon de l'Isleau, sur une petite éminence dominant le marais, à Henri III Plantagênet. Le premier seigneur connu avec certitude apparaît dans un aveu rendu en 1368: il s'agit de Pont de Vivonne Chevalier, « Tesmoing de vérité » sous le scellé de sa « chastellerie de Lileau près de Pontlabay ». Au cours des XVIIe et XVIIIe siècles, le domaine devint la propriété des barons de la Chaume. En 1521, Jean III Isle de la Cave hérite l'Isleau de son oncle Guy d'Estuer. Son fils, François Isle de la Matassière, le reçoit en 1557 et le passera à son fils, Daniel Isle de Forgette, en 1578. Les sites d'héraldique notent un Prévost, seigneur de l'Isleau, paroisse de Sainte-Gemme, élection de Saintes.  Au XIXe siècle, le donjon, propriété d'exploitants agricoles, fut abandonné et envahi par les ronces et les herbes. Sa restauration a été entreprise par des propriétaires privés depuis 1974.","architecture":"TOUR-ISLEAU, le donjon, carré de 11 mètres de côté et 17 mètres de hauteur au niveau de la terrasse, était autrefois entouré d'une enceinte quadrangulaire flanquée de petites tours d'angle, encore debout au XIXe siècle. À proximité subsistent les restes d'une modeste chapelle datant d'un ancien village qui dominait la plaine du haut de la colline. Il a été inscrit au M.H. par arrêté du 14 mai 1925.","habitants":"Pont de Vivonne Chevalier\r\n        \"","divers":"Tour de L'Idsleau 45° 47' 09\" nord, 0° 50' 09\" ouest","gps":"","images":["../image/image_17/17_Isleau_Tour_1.jpg","../image/image_17/17_Isleau_Tour_2.jpg","../image/image_17/17_Isleau_Tour_3.jpg"]},"Consult_chateau_formulaire6848":{"id":"Consult_chateau_formulaire6848","dept":"17","canton":"Jonzac","commune":"Jonzac","nom":"Jonzac","type":"Forteresse","periode":"XII-XV","histoire":"JONZAC, en 1073, le château existe déjà ; le premier seigneur connu est Guillaume de la Rochandry au début du XIIe siècle. En 1370 la famille Ste-Maure s'installe à Jonzac.  L'inscription 1449 sur le château atteste de sa reconstruction à la suite des destructions engendrées par la guerre de cent ans.   En 1505, Jean de Sainte-Maure, seigneur de Jonzac, fonde le monastère des Carmes sur les vestiges d'une ancienne chapelle dédiée à Saint Nicolas. En 1570 siège par Agrippa d'Aubigné. Le cloître est édifié en 1657. Le jeune Louis XIV, la Reine mère et Mazarin séjournent au château en 1659. Le château reste aux Sainte-Maure jusqu'à la fin du XVIIe siècle, puis passe par mariage aux Espardes de Lussan qui le gardent jusqu'à la Révolution qui ne sera pas vendu, son nouveau propriétaire François de Tillière neveu du dernier  Jonzac le vend au marquis de Malleysie et en 1818 passe à Jacques et  Etienne Gaudret, et en 1841 la commune acquiert l'aile nord et aujourd'hui la commune et le conseil général le possède entièrement. Actuellement l'aile nord du château abrite les bâtiments de l'hôtel de ville (restauré au XIXe siècle), et l'aile sud, ceux de la sous-préfecture. Le cloître a été restauré entre 1976 et 1978, et abrite aujourd'hui un centre culturel, avec salles d'exposition et musée archéologique.","architecture":"JONZAC, l'enceinte est médiévale et le fossé, taillé dans le rocher, a été comblé au XIXe siècle. L'imposant châtelet d'entrée est marqué 1549 et date donc du XVIe siècle, époque de travaux dont fait partie la tour nord-ouest alors que la tour sud-ouest, d'un plus petit diamètre, est du XVIIe siècle. La cour d'honneur est entourée de bâtiments très remaniés ; elle a été recreusée pour transformer le demi-étage en rez-de-chaussée, avec destruction des escaliers extérieurs qui menaient à l'étage noble. Les toitures d'ardoise sont de hautes poivrières sur les tours, et un curieux ensemble à deux pans reliant deux poivrières pour le châtelet d'entrée. La façade sur la Seugne a gardé son crénelage, ses tourelles en encorbellement et ses balcons à balustres. Les tours et la poterne ont été classées par arrêté du 3 mai 1913 puis la fontaine du sous-sol a été inscrite par arrêté du 11 juillet 1942 et la salle de théâtre avec son décor par arrêté du 6 mars 1979.","habitants":"Famille Ste-Maure\r\n        \"","divers":"Château de Jonzac 45° 26' 44\" nord, 0° 25' 52\" ouest","gps":"","images":["../image/image_17/17_Jonzac_1.jpg","../image/image_17/17_Jonzac_2.jpg","../image/image_17/17_Jonzac_3.jpg","../image/image_17/17_Jonzac_4.jpg","../image/image_17/17_Jonzac_5.jpg","../image/image_17/17_Jonzac_6.jpg","../image/image_17/17_Jonzac_7.jpg"]},"Consult_chateau_formulaire9206":{"id":"Consult_chateau_formulaire9206","dept":"17","canton":"Saint-Jean d","commune":"Puy du Lac","nom":"Lagrève","type":"Manoir","periode":"XV","histoire":"LA-GREVE , manoir,  était depuis la fin du Moyen-Age la résidence des seigneurs de Tonnay Boutonne, et ce pendant plusieurs siècles.  manoir du XVe siècle, très restauré au XIXe siècle, appartenant aux La Mothe Fouqué au XVIIe siècle, rattaché à la baronnie de Tonnay Charente, acheté au XVIIIe siècle par Moreil d'Aubigny.","architecture":"La GREVE, le corps de logis du château présente des fenêtres à meneaux ainsi que des lucarnes à frontons triangulaires. Ce corps est aussi doté d'une tour d'escalier polygonale avec une partie supérieure de forme carrée à laquelle on accède par une porte surmontée d'une bretèche. La face Est est dotée d'une tour d'escalier polygonale dont la partie supérieure est flanquée d'une tourelle en encorbellement. L'accès à la tour se fait par une porte de style gothique flamboyant elle-même surmontée d'une bretèche. La façade sur le parc est flanquée d'une tour carrée en pierre de taille, et  coiffée d'un toit en pavillon.  Les dépendances se présentent sous la forme d'un grand corps allongé, percé d'ouvertures en plein cintre à encadrement en brique.  Dans la 2e moitié du XIXe siècle, le château et ses dépendances ont subi d'importantes transformations. Une tour carrée en pierre de taille a été aménagée sur la façade ouest. Dans les années 1865 à 1880, les dépendances sont détruites puis reconstruites un peu plus loin. \r\nLe parc du château a été créé au milieu du XXe siècle, par le jardinier paysagiste le comte Choulot.","habitants":"Famille de La Mothe Fouqué \r\n        \"","divers":"Manoir de la Grèze au  Puy du lac","gps":"","images":["../image/image_17/17_Lagr%c3%a8ve_1.jpg"]},"Consult_chateau_formulairee4b4":{"id":"Consult_chateau_formulairee4b4","dept":"17","canton":"Tonnay boutonne","commune":"Château-Boutonne","nom":"Luret","type":"Château","periode":"XV-XVII","histoire":"LURET, a partir du XVe siècle, et jusqu'au XVIIe siècle, plusieurs générations de Bidault,  François Bidault est le premier propriétaire identifié au XVIe siècle. En 1619, Elisabeth Bidault épouse Jean de Ligourre, fils de Jean et de Marie d'Abillon. Jean de Ligourre prend alors le titre de seigneur de Luret par suite de l'abandon de son beau-frère, Charles Bidault, à Elisabeth en 1623. Propriétaires dès le XVIIe siècle, les de Ligourre se succèdent à la tête de Luret jusqu'en 1755, date à laquelle les héritiers d'Elisabeth de Ligourre vendent le domaine aux de Sérigny.  La comtesse Ferdinand de Sérigny, née Richeteau, et ses enfants feront reconstruire et agrandir la chapelle, dans les années 1860. On peut encore voir, au-dessus du portail d'entrée de la chapelle, les initiales de la famille, RS.  Plusieurs familles de propriétaires se firent enterrer à Luret et notamment les de Ligourre au XVIIe siècle.\nAu XIXe siècle, les dames de Sérigny vendirent le château à Me Charpentier, notaire à Tonnay-Boutonne.  Me Charpentier revendit ensuite Luret à Hippolyte Baron en 1881. Le château demeure dans la famille Baron depuis cette date.","architecture":"LURET, l'état primitif du château, datable du XVIe siècle. L'édifice était cantonné de quatre tourelles. D'une superficie au sol de six-cents-quarante-quatre mètres carrés, chaque façade présentait trois niveaux d'élévation, chaque étage était séparé de l'étage inférieur par un bandeau, les pignons étaient percés d'une étroite fenêtre. Chaque tour était percée de deux ouvertures : une fenêtre principale surmontée d'une plus petite  corniche. Sur deux côtés du château se développait un mur d'enceinte muni de meurtrières et flanqué de deux poternes à pont-levis. Le mur d'enceinte était entouré de douves alimentées par la Boutonne. La rivières et les fossés servaient de défense sur les autres côtés. Cantonné de quatre tourelles d'angle, le château est entouré d'une terrasse à l'ouest et au sud. Elle est accessible sur ces deux façades par un escalier en rotonde de dix marches. Une porte d'entrée centrale ouvre sur le logement. Encadrée de pilastres, elle est surmontée d'un linteau sculpté et d'une corniche sur laquelle reposent deux pots de fleurs.  \n Les quatre façades sont ornées d'une corniche, la tourelle nord-est est percée de quatre ouvertures chanfreinées.Les quatre tourelles disposent d'une corniche et sont coiffées d'une toiture conique.\nLe château est couvert d'une croupe en ardoise et les tourelles d'un toit conique en ardoise.","habitants":"Famille de Sérigny\"","divers":"Château de Luret à Tonnay-Boutonne","gps":"","images":["../image/image_17/17_Luret_1.jpg","../image/image_17/17_Luret_2.jpg","../image/image_17/17_Luret_3.jpg"]},"Consult_chateau_formulaire3b20":{"id":"Consult_chateau_formulaire3b20","dept":"17","canton":"Jonzac","commune":"Lussac","nom":"Lussac_17","type":"Château","periode":"XVII","histoire":"LUSSAC, la seigneurie existe dès le XVIe siècle, et elle passe en 1530 de Jean Vidault à François Lefourestier, seigneur d'Orignac, le mari de Catherine Vidault. En 1729, Françoise-Marguerite Arnould de Vignolle fait faire une estimation : tout est en ruine. La restauration du château et son embellissement sont luvre de la marquise des Dunes, qui y mourut en I766, après avoir installé son cousin, François de Poute, seigneur de Nieul-le-Virouil, son légataire universel, lequel vendit le château et son annexe du Breuillé, le 30 juin I782, à Charles Lys. Quelques années plus tard, le 2 août I784, Charles Lys achetait, mais cette fois en commun avec son frère, Daniel Lys, du Sire de Pons, la terre détachée de sa châtellenie de Clion, contiguë à celle de Lussac. Charles et Daniel Lys, dont nous avons déjà vu les noms, descendants de Jean Lys-Dallay sont restés suivant la tradition des leurs de fervents prosélytes.","architecture":"LUSSAC, tout est en ruine, les granges, le colombier, les murailles comme une des tours. Il ne reste que le pavillon de gauche et une tour, et elle fait reconstruire un corps de logis bas s'appuyant sur eux et un pavillon symétrique.  le château domine la vallée de la Seugne et surplombe les jardins qui sont en terrasse et où l'on accède par des escaliers à balustres dont un est marqué 1769. Le corps de logis bas est encadré de deux pavillons à haute toiture à pans couverts d'ardoises. De l'autre côté, la cour est encadrée de dépendances : écuries, poulailler, chenil, bugeoir (ou pièce à bugée la lessive), fenil, granges et logements ouvriers. Le logis, les communs, le lavoir, la glacière, l'orangerie, ainsi que les terrasses, leurs escaliers, le parc, la passerelle métallique, le pont sur la Seugne et le vivier en pierre ont été inscrits au M.H. par arrêté du 21 décembre 1999.","habitants":"Famille de la marquise des Dunes\r\n        \"","divers":"Lussac 5° 28' 10\" nord, 0° 28' 43\" ouest","gps":"","images":["../image/image_17/17_Lussac_17_1.jpg","../image/image_17/17_Lussac_17_2.jpg"]},"Consult_chateau_formulairee651":{"id":"Consult_chateau_formulairee651","dept":"17","canton":"Saint-Porchaire","commune":"Plassay","nom":"Lépine","type":"Château","periode":"XVII","histoire":"LEPINE, le logis  depuis lachat, en 1739, de la terre et seigneurie de LÉpine, à Plassay, par Guillaume Pissonnet de Bellefond écuyer, seigneur de Plassay, de Marc Coudreau, sieur de LÉpine,","architecture":"LEPINE, lhistoire de la seigneurie de Plassay et de celle de LÉpine se confondent, au point que le château de Plassay porte aussi le nom de lEpine, peut-être après avoir été rebâti sur ce fief. Le logis actuel, qui aurait succédé à une importante demeure fortifiée, est une longue construction de deux niveaux surmontés dun niveau de combles à surcroît éclairé par une série dils-de-bufs. La partie centrale de la façade antérieure est marquée par un avant-corps sur trois travées, couronné par un fronton triangulaire dont le décor est resté à létat de projet puisquil contient des pierres brutes. La façade postérieure, moins percée, offre un intérêt bien moindre. Lensemble ne paraît pas antérieur à la seconde moitié du XVIIIe siècle.","habitants":"Famille de  Marc Coudreau\r\n        \"","divers":"Château de Lépine à Plassay","gps":"","images":["../image/image_17/17_L%c3%a9pine_1.jpg","../image/image_17/17_L%c3%a9pine_2.jpg"]},"Consult_chateau_formulaire2fd5":{"id":"Consult_chateau_formulaire2fd5","dept":"17","canton":"Surgères","commune":"Chambon","nom":"Marlonges","type":"Château","periode":"XVII","histoire":"MARLONGES, au XVIIIe siècle, Chambon était une paroisse de Saintonge qui formait une enclave dans le pays d'Aunis.  Le 18 avril 1827, les deux communes voisines Chambon et Le Cher fusionnent, ce qui explique la présence de deux églises et de deux cimetières sur ce nouveau territoire.  En 1518, la seigneurie appartenait à Antoine de Marlonges, époux de Catherine de Ponthieu. Vers 1532, il se remarie à Suzanne de La Vauzouzière. En partie entouré de douves, c'est un imposant édifice couvert d'ardoise doté d'un comble en surcroît, éclairé par une série d'ils-de-buf. Côté jardin, il est flanqué de deux pavillons rectangulaires couverts d'ardoise, dont les parties supérieures et les corniches peuvent avoir été reprises au XIXe siècle. Malgré les vissicitudes qu'il connut, il renferme encore aujourd'hui une remarquable salle boisée, décorée de peintures aux armes de la famille d'Aitz, qui est sans doute contemporaine de la construction du château de Marlonges construit  vers 1660, dans un style froid et sévère très classique pour l'époque.","architecture":"MARLONGES,  rue de la Grosse Motte, château départemental, il accueille une maison de repos médicalisée en son sein. En 2008, le conseil général de Charente-Maritime a effectué des travaux d'agrandissement et de mise aux normes. De plan en U, le corps de logis rectangulaire à trois niveaux toit en croupes, flanqué en retour d'équerre en façade de deux pavillons carrés toit à quatre pans et prolongés de dépendances de un niveau.","habitants":"Famille d'Antoine de Marlonges\r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Marlongues à Chambon","gps":"","images":["../image/image_17/17_Marlonges_1.jpg","../image/image_17/17_Marlonges_2.jpg"]},"Consult_chateau_formulairee1d1":{"id":"Consult_chateau_formulairee1d1","dept":"17","canton":"Matha","commune":"Matha","nom":"Matha","type":"Tour","periode":"XVI","histoire":"MATHA, le premier château de Matha remonte au IXe siècle quand Wulgrin, comte d'Angoulême, élève la première motte castrale vers 866. Plus tard, Isabelle veuve de Jean sans Terre donne Matha à son fils Henri III d'Angleterre et le roi Saint-Louis (Louis IX) reprend Matha. En 1242 Saint-Louis fait raser le château et sa grosse tour avant la bataille de Taillebourg. Durant la guerre de cent ans Matha est pris et repris par les Anglais, et à la fin reste à la famille Montberon. Jacquette de Montberon apporte la seigneurie en dot à André de Bourdeilles en 1558, et les Bourdeilles la gardent jusqu'à la Révolution. En 1621, la reine mère y a résidé durant le siège de Saint-Jean-d'Angély, le 24 mars 1961  le château est acheté par la commune de Matha, après avoir connu plusieurs propriétaires. Le château est inscrit au titre des M.H. depuis 1948, alors que les façades et toitures sont classées en 1952.","architecture":"MATHA, actuellement, il ne reste, sur un tertre accessible au public, qu'un pavillon Renaissance construit sous la direction de Jacquette de Montbron entre 1582 et 1587. La tour carrée à trois étages s'élève sur un porche. Elle est flanquée d'une deuxième tour carrée de même hauteur, mais de moindres dimensions. Les deux tours sont couronnées de créneaux et mâchicoulis et coiffées de hauts toits d'ardoises. Les fenêtres et une porte sont ornées de frontons sculptés. La ville est connue pour son château Renaissance, le château de Matha, dont seul subsiste le châtelet d'entrée (XVIe siècle) situé dans le parc. Le chemin de ronde et la charpente ont été reconstruits au XIXe siècle. Propriété de la commune.","habitants":"Famille Montberon\r\n        \"","divers":"Matha 45° 52' 06\" nord, 0° 19' 08\" ouest","gps":"","images":["../image/image_17/17_Matha_1.jpg","../image/image_17/17_Matha_2.jpg"]},"Consult_chateau_formulaired3b2":{"id":"Consult_chateau_formulaired3b2","dept":"17","canton":"Meschers sur Gironde","commune":"Meursac","nom":"Meursac","type":"Château","periode":"XV","histoire":"Deux châteaux à Meursac,  le Chatelars  et de la Mothe.                                                                 CHATELARS, bâti à partir du XVe siècle,  appartient à l'origine à Antoine du Gua. Il constitue la résidence de la Famille de Montault au XXIe siècle. Gardant une allure défensive (la province sort à peine de la guerre de cent ans au moment de sa construction, il est doté de plusieurs tours polygonales. Il est remanié à plusieurs reprises, notamment au XXe siècle.  Ce monument date du XV et XVIe siècles et fait partie des trois constructions répertoriées de Meursac  avec l'église Saint-Martin classée le 10 février 1909 et le camp Gaulois classé le 6 octobre 1936. Le château est inscrit à l'inventaire supplémentaire des M.H. par arrêté du 19 septembre 2001.\r\nMOTHE (ou de la Mothe-Meursac) est édifié au XVe siècle, mais subit d'importants remaniements au cours des siècles suivants. En 1486, il est la propriété de Jean de Brémond, seigneur de la Mothe-Meursac. Dans la deuxième moitié du XVIe siècle, le château de La Mothe passa aux mains de la famille Montgaillard. Vers 1674, la demeure revint à Pierre de Rabaine, qui mourut quelques années après, laissant deux enfants mineurs et d'importantes dettes. La seigneurie fut saisie et adjugée en 1696, à Charles Daulnis, écuyer, seigneur du Vignaud.","architecture":"CHATELARS,  édifice de la première Renaissance, représentatif des petits châteaux d'allure archaïque très médiéval, à corps de logis rectangulaire, à un étage, couvert d'une haute toiture, flanqué en façade ou dans un angle d'une tour d'escalier en vis hors-d'oeuvre. Les larges fenêtres à croisillons scandées de pilastres, se superposent en travées couronnées par une haute lucarne pendante sommée par un amortissement en pierre. Le château présente une grosse tour polygonale. A l'intérieur, l'escalier en vis en pierre est couvert d'une voûte d'ogives au-dessus de laquelle se trouve une salle haute accessible par une tourelle.                                                                    MOTHE  en 1486, Jean de Brémond, chevalier, seigneur de Balanzac, de Puyridault et l'était aussi de la Mothe Meursac.  Aussitôt après en avoir pris possession, il fit exécuter des travaux de réparations aux différents bâtiments du château qui n'avaient pas été entretenus depuis des années. Il se compose d'un corps de logis très simple, encadré de deux tours, d'une porte fortifiée, d'une basse-cour et de souterrains-refuges aménagés. Au XIXe siècle, il est la propriété de l'ingénieur et inventeur Auguste Forestier puis de son fils Georges Forestier, inspecteur général des Ponts et chaussées, spécialiste technique des débuts de l'automobile.","habitants":"Chatelars Famille du Gua.                                    Mothe; famille de Jean de Brémond\r\n        \"","divers":"Château du Chatelars, grav 1-2-3. de la Mothes grav 4-5 et hôtel de ville  grav 6 à Meursac  45° 39' 00\" nord, 0° 48' 28\"  ouest","gps":"","images":["../image/image_17/17_Meursac_1.jpg","../image/image_17/17_Meursac_2.jpg","../image/image_17/17_Meursac_3.jpg","../image/image_17/17_Meursac_4.jpg","../image/image_17/17_Meursac_5.jpg","../image/image_17/17_Meursac_6.jpg"]},"Consult_chateau_formulaireb3b3":{"id":"Consult_chateau_formulaireb3b3","dept":"17","canton":"Jonzac","commune":"Meux","nom":"Meux","type":"Château","periode":"XIII-XV","histoire":"MEUX, le premier château de Meux remonte au XIIIe siècle. Geoffroy et son fils Thomas de Meux en ont été les premiers seigneurs. En 1408 possession de Jeanne de Frenay, épouse   en seconde noce Aymar  de la Laigne. Leur petite fille Blanche de la Laigne l'apporte en dot à  Louis de Chesnel en 1444 qui reconstruit le château. Jacques Chesnel , fils de Louis avec  Béatrice de Sainte-Maure, et  Charles Chesnel  avec Suzanne de Gouy, contriburont à éloigner les Chesnel de Saintonge. Il revient en héritage à Jacques de Laage qui le vend en 1719 à Antoine Bonnet, qui le revend en 1721 à Élie de Laage, qui le garde jusqu'au milieu du XIXe siècle. puis cédé à des cultivateurs qui délaissent l'entretien Le propriétaire actuel mademoiselle Guibot.","architecture":"MEUX, le château de Meux se présente sous la forme d'un manoir ayant une architecture renaissante orné de grandes cheminées faites de pierres le logis, construit au XVe siècle durant la période de reconstruction après le départ des Anglais, est de style flamboyant, l 'édifice présente un corps de logis central autres fois flanqué de deux tours rasées au XIXe siècle L'entrée se fait par un porche qui donne sur le jardin bordé sur trois côtés de dépendances basses à toits de tuiles.  Au centre de la façade principale une tourelle hors oeuvres à pans coupés   abrite l'escalier à vis  décoré par la cagouille saintongeaise sans compter ses fenêtres à meneaux qui sont dotées d'un ornement assez sobre. C'est avec un style prestigieux d'entant qu'à été construit le logis avec une tour sous forme de polygone avec un toit à plusieurs  pans et une fenêtre décorée avec des broderies en pierre, ornement principal haute lucarne passante encadrée par des pilastres et fenêtres à meneaux. Le château et les communs font lobjet dune inscription au titre des M.H. depuis le 25 avril 1975.","habitants":"Famille de Louis de Chesnel\r\n        \r\n        \"","divers":"Meux 45° 26' 39\" nord, 0° 20' 52\" ouest                        Etangs  45° 25' 09\" Nord et 0° 16' 49\" Ouest","gps":"","images":["../image/image_17/17_Meux_1.jpg","../image/image_17/17_Meux_2.jpg","../image/image_17/17_Meux_3.jpg"]},"Consult_chateau_formulairedd15":{"id":"Consult_chateau_formulairedd15","dept":"17","canton":"Pons","commune":"Mirambeau","nom":"Mirambeau","type":"Château","periode":"XIX","histoire":"MIRAMBEAU  Ce château était alors une des plus puissantes forteresses de Haute Saintonge son seigneur, Artaud de Mirambeau. Propriété deux siècles plus tard de Guilhem de Cheyning, il est dans la mouvance du roi d'Angleterre et duc d'Aquitaine Édouard 1er. Très disputé au cours de la guerre de cent ans, en 1415 il échoit à Jean II Harpedanne, chambellan du roi de France et sénéchal de Saintonge, déjà maître de la seigneurie de Montendre . Endommagé au cours des guerres de religion, il est restauré par Arnaud d'Escodéca de Boisse pendant quarante ans (1617-1657). Il appartint aux seigneurs de Pons. En 1818, il est vendu par un marquis de Caupenne au comte et homme politique d'origine normande Charles-Jacques-Nicolas Duchâtel, qui de 1825 à 1836 confia sa modernisation et sa quasi-reconstruction à l'architecte Poitevin; celui-ci utilisera les fondations voûtées de la vieille forteresse pour édifier l'actuel château, \"pastiche\" de qualité des différents styles et courants architecturaux appréciés à cette époque. À sa mort en 1844 le domaine passa à son fils, le journaliste et homme politique Tanneguy Duchâtel comme son père, fut après lui député de Jonzac (1833), ministre du Commerce du 1834 à 1836 puis des Finances (1839) ;  créa un orphelinat dans le château. Son fils Charles Tanneguy (1838-1907), député de 1871 à 1875 puis en 1885, conseiller général jusqu'à sa mort, maire de Mirambeau pendant 25 ans  où il fut inhumé  siégea au Centre-Gauche, vota pour Thiers en mai 1873, contre Mac Mahon en 1875, devint ministre plénipotentiaire de 1875 à 1880.","architecture":"MIRAMBEAU, étant le dernier du nom, ses héritiers donneront le domaine à l'État, qui y aménagea un centre de convalescence des armées. Le riche fonds d'archives Duchâtel, apporté par mariage aux ducs de La Trémoille, est conservé au château de Serrant (49). \r\nDans les années 1980 le château  devint un luxueux hôtel de 22 chambres classé cinq étoiles; depuis 2011 il appartient au groupe d'investisseurs italiens Sorgent Group. Dissimulé par un parc, le château n'est que difficilement visible depuis le centre-ville. Il ne conserve que peu d'éléments vraiment anciens, sinon un châtelet et un pan de courtines, refaits au XVIIe siècle. Le corps de bâtiment date essentiellement du XIXe siècle, et mêle styles néo-Louis XIII et néo-Renaissance. La chapelle, un peu en retrait, est de style néo-gothique. Le château de Mirambeau est aujourd'hui reconverti en hôtel de haut standing, classé 5 étoiles. Il compte 22 chambres, un restaurant gastronomique est entouré d'un parc de huit hectares et d'un jardin d'hiver.","habitants":"Famille d'Artaud de Mirambeau\r\n        \"","divers":"Mirambeau  45° 22' 27\" Nord et 0° 34' 09\" Ouest","gps":"","images":["../image/image_17/17_Mirambeau_1.jpg","../image/image_17/17_Mirambeau_2.jpg","../image/image_17/17_Mirambeau_3.jpg","../image/image_17/17_Mirambeau_4.jpg"]},"Consult_chateau_formulaire094d":{"id":"Consult_chateau_formulaire094d","dept":"17","canton":"Montendre","commune":"Montendre","nom":"Montendre","type":"Tour-Château","periode":"XV-XVIII","histoire":"MONTENDRE, à la fin du XVe siècle le château passe à la maison de La Rochefoucauld, branche de Montendre  dont certains représentants, comme Louis Ier de La Rochefoucauld, seigneur de Montendre, adhèrent aux idées réformées. Henri IV fait de Montendre une place de sûreté protestante, au même titre que Pons ou Royan. Une garnison, logée dans le château, est chargée de garantir la sécurité de la place. En 1608, le château est pris  par une bande d'aventuriers, au cours d'un événement passé à la postérité sous le nom de  surprise de Montendre. À la même époque, le marquis Louis II de La Rochefoucauld-Montendre de 1669 à 1742 ; Louis Ier ci-dessus était son quadrisaïeul quitte ses appartements de la tour carrée et fait édifier un corps de bâtiment en pierre de taille, dit  logis de La Rochefoucauld. Lorsqu'il meurt sans héritier direct en 1742, le château passe de famille en famille. En 1923, le château est la propriété de Mme Faure, qui transforme une partie  en promenade, laissée en libre accès. À sa mort en 1953, elle lègue le château à la commune, qui poursuit les aménagements : construction d'un théâtre de verdure en 1959, puis mise en place d'un musée consacré aux traditions locales, le musée d'art et de traditions populaires, dans la tour carrée.","architecture":"MONTENDRE, il ne subsiste de la forteresse médiévale qu'une haute tour carrée de trois étages du XVe siècle, remaniée au XIXe, qui formait l'entrée de la cour, une tour ronde, des souterrains, ainsi que des vestiges de fortifications. La tour carrée abrite un musée consacré aux traditions locales. Au centre de l'esplanade subsistent les ruines d'un logis noble, à un étage et d'aspect très simple, dit « logis de La Rochefoucauld ». Bâti au XVIIIe siècle à la demande du marquis Louis de La Rochefoucauld de Fonsèque, il comprenait à l'origine plusieurs chambres, deux cuisines, un office, et de nombreux communs parmi lesquels des écuries, une sellerie, une étable, une porcherie, un chai à vin et une remise. Abandonné au XIXe siècle, il apparaît encore dans son intégralité au début du XXe siècle, mais est finalement détruit, à l'exception d'un pan de façade doté d'une porte moulurée, qui sert de toile de fond au théâtre de verdure. Plusieurs bâtiments ont également été détruits, parmi lesquels la « maison des Féodistes », qui jouxtait la tour carrée, et une partie des souterrains a été comblée pour des raisons de sécurité. Le site du château est aujourd'hui une promenade appréciée, d'où l'on jouit d'une vue sur la ville et les landes et bois environnant. Le théâtre de verdure, aménagé en 1959, a 1 200 places; on y donne des représentations et des spectacles pendant la saison estivale.","habitants":"Louis Ier de La Rochefoucauld,\r\n        \"","divers":"Tour et château à Montendre  45° 17' 04\" Nord et 0° 24' 44\" Ouest","gps":"","images":["../image/image_17/17_Montendre_1.jpg","../image/image_17/17_Montendre_2.jpg","../image/image_17/17_Montendre_3.jpg","../image/image_17/17_Montendre_4.jpg","../image/image_17/17_Montendre_5.jpg","../image/image_17/17_Montendre_6.jpg","../image/image_17/17_Montendre_7.jpg"]},"Consult_chateau_formulaire7f1b":{"id":"Consult_chateau_formulaire7f1b","dept":"17","canton":"Montendre","commune":"Montguyon","nom":"Montguyon","type":"Vestiges","periode":"XIII-XV","histoire":"Deux châteaux à Montguyon dont les vestiges du château de Montguyon et celui de la Magdeleine pas d'information .                                                    MONTGUYON, en 1404, Rosine de Montaut-Mussidan, dame de Montendre et Montguyon l'apporte en dot à Guy II de La Rochefoucauld, seigneur de Verteuil et de Barbezieux, et la famille de La Rochefoucauld le conserve jusqu'en 1683 et sa vente sur saisie.  En 1451, à la suite de la bataille de Montguyon, Dunois libère la forteresse de la présence anglaise. C'est une place forte protestante durant les guerres de religion. Henri de Navarre, le futur Henri IV, y séjournera, plusieurs fois, entre 1571 et 1586.  En 1621, les 7 et 8 juillet, le Roi Louis XIII et Anne d'Autriche ont séjourné au château. En 1683, Pélagie Chabot de Rohan achète la baronnie qui reste la propriété des Rohan jusqu'à la Révolution. En 1793, la foudre qui s'est abattue sur la tour, a provoqué un incendie. C'est une ruine qui est vendue comme bien national. De 1980 à 1984, l'A.S.P.H.M. va faire restaurer les écuries du château. De 1996 à 2001, l'Association pour la Sauvegarde et la Valorisation du Patrimoine de Montguyon fait consolider et reconstruire les remparts de la fortification. La vieille tour est inscrite à l'inventaire des monuments historiques, le 11 février 1929, l'arrêté a été annulé et remplacé par l'inscription de l'ensemble du château, des vestiges et des anciennes écuries, le 23 juillet 2004.","architecture":"MONTGUYON, le château est bâti sur un éperon rocheux qui porte des traces du pont-levis. En 1793, la foudre qui s'abat sur la tour provoque un incendie, et c'est une ruine qui est vendue comme bien national. De 1996 à 2001, l'A.S.P.H.M consolide et reconstruit les remparts de la fortification. La vieille tour a été inscrite à l'inventaire des M.H. le 11 février 1929, l'arrêté a été annulé et remplacé par l'inscription de l'ensemble du château, des vestiges et des anciennes écuries le 23 juillet 2004. Le château, précédé d'une basse-cour, dans laquelle sont construites les écuries, et d'un pont-levis est constitué d'un corps de logis flanqué d'une tour du XIIIe siècle, remaniée au XIVe siècle, qui aurait eu une hauteur de 50 mètres avec sa toiture ; mais il n'en reste qu'une ruine après l'incendie de 1793. En 1982 un pan du donjon s'est effondré après une secousse tellurique. Des inscriptions de maximes ont été relevées sur les murs du second étage.","habitants":"Famille de Pélagie Chabot de Rohan\r\n        \"","divers":"Vestiges du château de Montguyon 45° 12' 58\" nord, 0° 11' 18\" ouest1  et château de la Magdeleine  grav 7","gps":"","images":["../image/image_17/17_Montguyon_1.jpg","../image/image_17/17_Montguyon_2.jpg","../image/image_17/17_Montguyon_3.jpg","../image/image_17/17_Montguyon_4.jpg","../image/image_17/17_Montguyon_5.jpg","../image/image_17/17_Montguyon_6.jpg","../image/image_17/17_Montguyon_7.jpg"]},"Consult_chateau_formulaireec11":{"id":"Consult_chateau_formulaireec11","dept":"17","canton":"Matha","commune":"Saint-Pierre-de-l","nom":"Mornay","type":"Forteresse","periode":"XV-XVI","histoire":"MORNAY, le premier seigneur aurait été Pierre Pastureau au XVe siècle, père de Guillaume Patureau de Mornay (1466 - 1534), second seigneur du lieu. Le château a été reconstruit vers 1642 . Il fut l'objet de nombreuses ventes dont les actes nous en donnent une bonne description. Entre deux grosses tours à mâchicoulis du XVIe siècle se déploie une galerie. Celle-ci a été peinte au cours du XVIIe siècle d'une série de scènes mythologiques inspirées des Métamorphoses d'Ovide, non sans rappeler celle, du XVIe siècle, au château d'Oiron. Au XIXe siècle ces peintures étaient attribuées au jeune Nicolas Poussin, ce qui leur avait donné une certaine renommée. Cette attribution est fausse, la qualité des peintures n'étant pas  d'une qualité suffisante, et surtout la chronologie de Poussin est incompatible avec sa présence dans la région. Les autres pièces étaient meublées et aménagées au XVIIIe siècle, on y conservait des cartons de tapisserie par François Boucher. En 1947 les peintures de la galerie et les appartements sont détruits par un incendie. Il est vendu en 1949 et c'est depuis une maison de repos et de convalescence. Le château, sa porterie, la tour du Chardon et le parc fait lobjet dune inscription au titre des M.H. depuis le 22 août 1949.","architecture":"MORNAY, un châtelet d'entrée dite tour Impériale précède le château. Le logis construit au XVIe siècle, restauré au XIXe siècle, entouré de douves, aurait été prévu en U et resté inachevé, ce qui n'est pas certain. Le logis est donc un bâtiment en L flanqué de deux pavillons fortifiés. Les sous-sols du château présentent des croisées d'ogives qui posent la question d'une longue tradition gothique en Poitou ou de fondations plus anciennes. La « tour du chardon », isolée des autres constructions, est semblable aux tours refuges du XVIe siècle. Le château se compose d'un corps de logis couronné d'un attique orné de pots à feu. Les tours carrées des extrémités présentent trois étages couronnés de créneaux et de mâchicoulis. Elles sont flanquées de tourelles d'escalier en colimaçon. Deux tours sont réunies par une galerie. La voûte est entièrement peinte à l'italienne et représente les Métamorphoses d'Ovide ainsi que des sujets mythologiques en camaïeu. Il subsiste aussi un ancien pavillon du XVe siècle, dit « Tour du chardon » à cause de la forme de son épi de faîtage en plomb.","habitants":"Famille de Guillaume Patureau de Mornay\r\n        \"","divers":"Mornay 46° 01' 24,1\" Nord et 0° 26' 10,12\" Ouest","gps":"","images":["../image/image_17/17_Mornay_1.jpg","../image/image_17/17_Mornay_2.jpg","../image/image_17/17_Mornay_3.jpg","../image/image_17/17_Mornay_4.jpg"]},"Consult_chateau_formulaire0eee":{"id":"Consult_chateau_formulaire0eee","dept":"17","canton":"Matha","commune":"Neuvicq-le-Château","nom":"Neuvicq","type":"Château","periode":"XV","histoire":"NEUVICQ  datant du XVe siècle. Dès le XVe siècle le château est une possession de la famille de Rochendry . À partir de 1550 il changea souvent de propriétaires et, en 1673, le marquis de Montespan, mari de Françoise-Athénaïs de Rochechouart, marquise de Montespan. Son fils le vendra en mauvais état, fossés comblés. Il a depuis été partiellement restauré et a toujours fière allure. Le château de Neuvicq est propriété de la commune depuis 1904. La mairie de Neuvicq y est aujourd'hui installée. Le château a été classé M.H. le 14 septembre 1912.","architecture":"NEUVICQ ancien manoir comprenant deux parties élevées à des époques différentes. Le manoir proprement dit remonte au XVe siècle. Une annexe lui a été accolée au XIXe siècle. Le manoir s'élève de cinq étages, distribués par un escalier à vis en pierre, avec marches à contre-courbe. Dans l'angle formé par la tour à six pans de l'escalier et le mur de la façade sur cour, se trouve un petit escalier dans un échiffre, supporté par un encorbellement. Il dessert l'étage supérieur. Le corps de bâtiment est très haut, avec trois niveaux surmontés d'un toit d'ardoises à deux pans, le troisième niveau de fenêtres étant surmonté de hauts frontons sculptés. Il est flanqué de deux tours cylindriques de diamètre inégal recouvertes de poivrières. Une tour polygonale contient l'escalier à vis.  La fuie a perdu sa toiture.","habitants":"Famille de Rochendry   et   de Françoise-Athénaïs de Rochechouart, marquise de Montespan\r\n        \"","divers":"Neuvicq 45° 48' 09\" nord, 0° 09' 50\" ouest","gps":"","images":["../image/image_17/17_Neuvicq_1.jpg","../image/image_17/17_Neuvicq_2.jpg","../image/image_17/17_Neuvicq_3.jpg","../image/image_17/17_Neuvicq_4.jpg","../image/image_17/17_Neuvicq_5.jpg"]},"Consult_chateau_formulaire92fe":{"id":"Consult_chateau_formulaire92fe","dept":"17","canton":"Saint-Porchaire","commune":"Nieul les saintes","nom":"Nieul_Saintes","type":"Vestiges","periode":"XIII-XIV","histoire":"NIEUL- Les -SAINTES,  Jeanne de Parthenay hérite de la terre de Nieul en 1370, et c'est son mari, Jehan Chaudrier, un ancêtre de Ronsard, qui construit ce château fort. C'est ce même Jehan Chaudrier, maire de La Rochelle, qui est célèbre pour avoir délivré la ville des Anglais grâce à une ruse. En 1573 et 1574 le culte protestant y est célébré. Directement vassaux du Roi de France, les Chaudrier se transmettent le fief de père en fils  Jeanne Chaudrier en 1524 donnera naissance à Pierre de Ronsard. On célébrera de 1573 à 1574, le culte protestant au château de Nieul  et certains écrits attesteront du passage de Bernard  Palissy ainsi que du baptême de Marie, fille de Guillaume  Esbaudy et de Perette Roy, présentée par Mathurin Palissy  fils de Bernard Palissy. De Chaudrier en De Culant, de De Wandel en Lemouzin, de catholique à protestant et de protestant à catholique, la seigneurie de Nieul sera vendue comme bien national en 1793, et son dernier Baron Isaie Lemouzin mourra de sa belle mort en 1797 à 83 ans, en un logis tout proche de son château. Transformé en ferme tombe en ruine jusqu'à son rachat en 1972  par monsieur Morain.","architecture":"NIEUL-les-Saintes, l'enceinte reliait  plusieurs tours.  le château est entouré de douves sèches qui étaient munies de deux ponts-levis, enceinte polygonale irrégulière aux murs à contreforts en saillie à l'angle des courtines, qui font penser à l'architecture militaire des XIIIe siècle et XIVe siècle. Les courtines qui sont hautes de plus de 12 mètres étaient couronnées d'un chemin de ronde qui est toujours présent sur la façade des deux tours carrées. Dans la cour intérieure, logis et communs sont adossés à la muraille. Des trois tours d'escalier il en reste deux, la troisième ne menant qu'aux salles voutées en sous-sol. Sa restauration se poursuit et il a été inscrit à l'Inventaire supplémentaire des M.H. le 8 juillet 1988.","habitants":"Famille de  Jehan Chaudrier                                     Pierre de Ronsard\r\n        \"","divers":"Neuil 45° 45' 38\" nord, 0° 43' 52\" ouest","gps":"","images":["../image/image_17/17_Nieul_Saintes_1.jpg","../image/image_17/17_Nieul_Saintes_2.jpg","../image/image_17/17_Nieul_Saintes_3.jpg"]},"Consult_chateau_formulairead90":{"id":"Consult_chateau_formulairead90","dept":"17","canton":"Saint-Pierre d","commune":"Oléron","nom":"Oléron","type":"Citadelle","periode":"XVII","histoire":"OLERON, la citadelle du château-d'Oléron est un ouvrage militaire édifié de 1630 à 1704 afin de protéger la partie méridionale de l'île d'Oléron.  La citadelle succède à un ancien château fort tombé en désuétude au début du XVIIe siècle. Édifiée sur l'ordre du cardinal de Richelieu à partir de 1630, elle est modernisée ultérieurement par le maréchal Vauban et devient l'un des éléments-clef du dispositif de défense du littoral atlantique. Elle demeure longtemps l'un des lieux d'entraînement et d'embarquement pour les soldats en partance vers la Nouvelle-France. Transformée en prison durant la Terreur, elle est classée M.H. en 1929. Occupée par les Allemands en 1940, elle est endommagée à la suite d'un bombardement le 17 avril 1945. La citadelle est convertie en prison  une nouvelle fois en 1870. Elle est rendue au service militaire peu après et abrite une garnison jusqu'en 1911.  Sérieusement endommagée par le raid, elle est restaurée de 1959 à 1971, puis une nouvelle fois à partir de 1988.","architecture":"OLERON, la citadelle est établie sur un relief dominant d'une part l'océan Atlantique, d'autre part les terres basses et marécageuses d'Ors. Elle présente les traces de différentes campagnes de construction, le gros-uvre ayant été réalisé de 1630 à 1704, sous le règne des rois Louis XIII et Louis XIV. Sévèrement dégradée durant la Seconde Guerre mondiale, elle conserve plusieurs bâtiments, bastions et casemates. Parmi les bâtiments situés dans l'enceinte fortifiée, notons la Porte Royale, sans doute édifiée vers 1640. Elle conserve sur une face des armes généralement attribuées au cardinal de Richelieu. La porte est précédée d'un pont dormant et d'une demi-lune. La cour principale est organisée autour du bâtiment de l'arsenal, un corps de bâtiment longitudinal à un étage édifié au XVIIe siècle. Sa fonction était multiple : il comportait, outre un arsenal, un magasin aux vivres, un magasin aux farines et une chapelle. À droite du portail se trouvait le logis du gouverneur de l'ile d'Oléron. Le bâtiment de l'arsenal. De part et d'autre de ce bâtiment principal sont situés deux bastions, le bastion de la Brèche et le bastion Royal. Tous deux sont utilisés pour des expositions thématiques, l'une d'elles étant consacrée aux soldats de la Nouvelle-France. Enfin, isolé au sud de la citadelle, à gauche de l'entrée principale, se trouve l'ancien magasin à poudre.","habitants":"Maréchal Vauban \r\n        \"","divers":"La citadelle d'Oleron 45° 53' 09\" nord, 1° 11' 41\" ouest","gps":"","images":["../image/image_17/17_Ol%c3%a9ron_1.jpg","../image/image_17/17_Ol%c3%a9ron_2.jpg","../image/image_17/17_Ol%c3%a9ron_3.jpg","../image/image_17/17_Ol%c3%a9ron_4.jpg","../image/image_17/17_Ol%c3%a9ron_5.jpg","../image/image_17/17_Ol%c3%a9ron_6.jpg"]},"Consult_chateau_formulaire56c2":{"id":"Consult_chateau_formulaire56c2","dept":"17","canton":"Saint-Pierre d","commune":"St-George d","nom":"Oléron_Chateau","type":"Château","periode":"XVII-XIX","histoire":"La Villa BRIQUET,  est un château bâti proche du château Fournier, à Saint-Georges-d'Oléron,  datant de 1881, ce château a une histoire charmante : Briquet était un boucher maquignon qui vivait dans une maison simple du bourg. Les affaires marchant bien, sa femme lui montra une cachette où un  bassiot  plein de louis dor était dissimulé et lui proposa de faire construire une belle maison. Pendant des années, la brave épouse avait mis régulièrement de côté des pièces dor. On peut découvrir les initiales des époux Briquet-Perron sont enlacées, dans un macaron, au dessus du portail.                                                            FOURNIER, bâti à Saint-Georges-d'Oléron, aurait été construit en 1877. Il appartenait, à Jules Fournier et son épouse Esilda Raoulx, importants propriétaires fonciers.","architecture":"FOURNIER,  dans le vignoble, qui sétaient enrichis durant le second Empire. Nouveauté pour lépoque, il fut construit daprès un modèle sur catalogue. La légende raconte quune pièce dor aurait été cachée sous lune de ses tours. Les initiales des anciens propriétaire Jules Fournier et son épouse Esilda Raoulx ont leurs initiales entrelacées, gravées, dans le fronton du portail. Aujourd'hui, la façade du château Fournier cache une extension moderne qui sert de maison de retraite.Dans le prolongement de la place de Verdun, se trouve le château Fournier. Il a été construit en 1877 par Jules Fournier riche propriétaire de vignobles. Le bâtiment a été édifié sur un plan en U très classique sur 4 niveaux.Il est flanqué de tours d' angle en pierre de taille et couvertes d'un toit conique. Le reste du bâtiments est en moellons enduits et le toit à pans à croupes. Le château accueille aujourd'hui une maison de retraite.","habitants":"Famille Fournier\r\n        \"","divers":"Villa Briquet 45° 58' 47\" Nord et 1° 19' 54\" Ouest  Fournier 45° 58' 47\" Nord et 1° 19' 54\" Ouest","gps":"","images":["../image/image_17/17_Ol%c3%a9ron_Chateau_1.jpg","../image/image_17/17_Ol%c3%a9ron_Chateau_2.jpg","../image/image_17/17_Ol%c3%a9ron_Chateau_3.jpg"]},"Consult_chateau_formulaireb683":{"id":"Consult_chateau_formulaireb683","dept":"17","canton":"Saint-Pierre d","commune":"Saint Georges d","nom":"Oléron_Saumonards","type":"Fort","periode":"XIX","histoire":"SAUMONARDS  où batteries des Saumonards, à l'origine Fort de la Galissonière puis fort Napoléon est situé dans la forêt du même nom au nord de Boyardville sur l'ile d'Oléron.  On attribue la conception de ses premières infrastructures en 1701 à l'ingénieur du roi Louis XIV. Après la période Napoléonienne , l'armée conserve ce site . En 1871 sous \" La Commune \" une partie des bâtiments servira de prison. En 1879 est édifié à l'extérieur, au nord-ouest, la batterie annexée des Saumonards, puis peu après la batterie de mortiers des Saumonards et la redoute de Beauregard pour assurer la défense arrière ; vers 1890, en raison de la crise de l'obus torpille, sont construits, à la batterie annexe et à la batterie de Mortiers, des magasins à poudre en béton spécial ; appelée fort la Galissonnière Plus près de nous, les batteries de Saumonards ouvriront une annexe à l'école des torpilles de Boyardville . A partir de 1886, la batterie des Saumonards est l'objet de projets de remaniements non aboutis ; aucun ouvrage n'est ajouté pendant l'occupation .Après la seconde guerre mondiale  le fort devient colonie de vacances tandis que la redoute de Beauregard et la batterie de Mortiers sont aliénés à des particuliers. Ce fort participait à la défense de l'embouchure de la Charente, et le Fort Boyard,  fut construit dans le but de croiser les feux des canons avec lui. Ce fort participait à la défense de l'embouchure de la Charente, et le Fort Boyard,  fut construit dans le but de croiser les feux des canons avec lui.","architecture":"SAUMONARDS; rappelons que le site représente 25 600 mètres carrés et quil appartient au ministère de la Défense.c'est bien l'Ecole  de Xavier Niel qui a racheté le Fort des Saumonards, que le ministère de la Défense avait mis en vente Ancien ouvrage militaire composé de 8 bâtiments sarticulant autour d'une tour de 1811. Il se situe sur lîle d'Oléron dans la forêt domaniale des Saumonards à 120 m de la plage.Le Fort avait accueilli des colonies de vacances jusquen 2012. Il est composé de 8 bâtiments d'une superficie utile de 3 219 m² et d'une grande cour centrale. Le Fort sarticule autour dune tour modèle de 1811. De 1849 à 1854, un véritable fort avec fossé sec est accolé à la tour. Le fort affecte la forme dun pentagone très étiré  de 130 m de longueur.  Le tout est entouré dun important glacis de terre qui le rend invisible de la mer. L'ensemble, homogène, présente un caractère austère, isolé dans la forêt des Saumonards, sans vue directe compte tenu de la hauteur des arbres environnants mais à 120 m de la plage accessible à pied par la dune boisée.  Lensemble est composé de 4 bâtiments historiques et de 4 plus récents.","habitants":"ministère de la Défense \r\n        \r\n        \r\n        \"","divers":"Le fort de Saumonards à Oléron","gps":"","images":["../image/image_17/17_Ol%c3%a9ron_Saumonards_1.jpg","../image/image_17/17_Ol%c3%a9ron_Saumonards_2.jpg","../image/image_17/17_Ol%c3%a9ron_Saumonards_3.jpg","../image/image_17/17_Ol%c3%a9ron_Saumonards_4.jpg","../image/image_17/17_Ol%c3%a9ron_Saumonards_5.jpg","../image/image_17/17_Ol%c3%a9ron_Saumonards_6.jpg"]},"Consult_chateau_formulaire68e6":{"id":"Consult_chateau_formulaire68e6","dept":"17","canton":"Saint-Porchaire","commune":"Port d","nom":"Panloy","type":"Château","periode":"XVIII","histoire":"PANLOY, Guillaume de Ransannes est connu comme le premier seigneur de Panloy, puis les Moreau, qui furent seigneurs de Panloy du début du XVe siècle à 1680 et firent construire le premier château. Saisie et vendue, la seigneurie change plusieurs fois de propriétaire, en 1683 passe à Joseph le Berthon conseiller au parlement de Bordeaux et le 8 juillet 1760 la petite fille de Joseph constitue la dot apportée par Marie Sarry, dame de la baronnie de la Chaume de Nancras et de Champagne, de la Tour et de Panloy, à Jacques Michel, baron de Saint-Dizant.  Il reconstruit le château en ne gardant que les deux pavillons d'entrée. Leur fille Anne-Marie épouse en 1785 le marquis de Grailly. Durant la Révolution, la marquise, utilise comme d'autres aristocrates dont les biens, voire la vie étaient menacés, la loi révolutionnaire du divorce, ce qui lui permet de conserver le domaine; quand son mari est amnistié durant le consulat, il revient en 1802 et ils se remarient en 1806; depuis, le château reste dans la même famille avec le mobilier d'époque Louis XV appartient toujours aux de Grailly.","architecture":"PANLOY, construit de 1770 à 1772 pour le baron de Saint-Dizant est en forme de U.  Il n'en reste qu'un pavillon de style fin Renaissance, et un autre plus tardif, peut-être mi-XVIIIe, ornés de colonnettes, chapiteaux, caissons sculptés de fleurs, de lions, de masque.; il présente une façade centrée par une avancée à fronton triangulaire sculpté des armoiries familiales, ajouté lors des importants travaux d'agrandissement et d'embellissement entrepris vers 1870, les deux ailes sont flanquées de quatre pavillons hauts. Le petit pavillon de droite date de la Renaissance, il appartenait à l'ancien château renaissance. Le pavillon de gauche a été copié sur lui lors de la construction de Panloy mais possède des ornements du XVIIIe siècle. Les toitures couvertes d'ardoises sont percées de lucarnes à fronton sculpté ajouté depuis 1877 époque où le toit originel à combles dits brisés ou à la Mansard  tuiles et ardoises  a été supprimée et refaite plus haute, suivant la mode du XIXe siècle. La longue terrasse à balustrade de pierre domine la Charente. La façade d'architecture Louis XV, la suite de tapisseries de Beauvais du XVIIIe siècle, encastrées dans les boiseries et la balustrade sur la Charente sont inscrits à l'I.S.M.H. depuis le 18 octobre 1983; le pigeonnier est classé M.H.","habitants":"Baron de Saint-Dizant\r\n        \"","divers":"Le château de Panloy 45° 50' 33\" nord, 0° 41' 12\" ouest","gps":"","images":["../image/image_17/17_Panloy_1.jpg","../image/image_17/17_Panloy_2.jpg","../image/image_17/17_Panloy_3.jpg","../image/image_17/17_Panloy_4.jpg"]},"Consult_chateau_formulairec8f2-2":{"id":"Consult_chateau_formulairec8f2-2","dept":"17","canton":"Thénac","commune":"Pisany","nom":"Pisany","type":"Château","periode":"XV","histoire":"PISANY, dès 1270, des chartes mentionnent le nom d'Hélie Rabaine, seigneur de Pisany. Probablement élevé un siècle plus tôt à l'emplacement d'une ancienne motte féodale, le château fort de Pisany est durant plusieurs siècles une place stratégique contrôlée par la famille de Rabaine. Au XVe siècle, elle devient la propriété du président du parlement de Bordeaux Arnauld de Tourettes, frère de l'abbé de Sablonceaux Guy de Tourettes. Celui-ci entame une campagne de travaux visant à moderniser l'ancienne forteresse médiévale.  À sa mort, il lègue la propriété à son neveu Arthus de Vivonne. De l'union de ce dernier avec Catherine de Brémond naît vers 1530 Jean de Vivonne, appelé à devenir plus tard marquis de Pisany en 1586, sénéchal de Saintonge, ambassadeur de France à Madrid puis à Rome, chevalier de l'ordre du Saint-Esprit et maréchal de France. En marge de sa carrière politique et diplomatique, il fait fortifier le bourg et modernise le château. Sa fille Catherine de Vivonne, marquise de Rambouillet, et sa petite-fille Julie d'Angennes, duchesse de Montausier, sont des femmes de lettres influentes au XVIIe siècle. Au siècle suivant, le château est vendu à plusieurs reprises, d'abord à Charles-Auguste Bessier, conseiller du Roi en 1737  puis à Jean-Charles de Senecterre en 1748. Le château, peu entretenu, est endommagé par la tempête de 1784, puis de nouveau durant la période révolutionnaire. Vendu comme bien national et non entretenu, il tombe partiellement en ruine.","architecture":"PISANY, le château est formé d'un corps de bâtiment épaulé de contreforts. Percé de hautes fenêtres à meneaux, il semble dater du XVe siècle. Une aile perpendiculaire au corps de logis témoigne d'une reconstruction partielle au XVIIe siècle. Il ne subsiste rien de l'ancienne chapelle Sainte-Barbe, relevée en 1657 par Julie d'Angennes après avoir été détruite une première fois durant les guerres de religion. \r\nLe bâtiment est précédé de vestiges du mur d'enceinte et du pavillon d'entrée, autrefois équipé d'un pont-levis. Bien que très remanié au XIXe siècle, le château reste le témoin de l'architecture militaire féodale.","habitants":"Famille d'Arthus de Vivonne\r\n        \"","divers":"Château de Pisany 45° 42' 11\" Nord et 0° 46' 54\" Ouest","gps":"","images":["../image/image_17/17_Pisany_1.jpg","../image/image_17/17_Pisany_2.jpg","../image/image_17/17_Pisany_3.jpg","../image/image_17/17_Pisany_4.jpg","../image/image_17/17_Pisany_5.jpg"]},"Consult_chateau_formulaire74b0":{"id":"Consult_chateau_formulaire74b0","dept":"17","canton":"Pons","commune":"Plassac","nom":"Plassac","type":"Château","periode":"XIV-XVI","histoire":"PLASSAC, il est sûr qu'un premier château fort existait en 1340, date d'un procès pour sa possession entre Guillaume de Flotte et Pons de Mortagne. Confisqué par la couronne il est donné à Renaud IV, sire de Pons, et reste dans cette famille jusqu'à sa vente à Jean-Louis Nogaret de La Valette, duc d'Épernon. Le château aurait été reconstruit vers 1555. En 1633, à la suite de son altercation avec larchevêque de Bordeaux et son excommunication, Jean-Louis Nogaret s'exile à Plassac, érigé depuis peu de baronnie en comté. Après 1633 le château est agrandi par le duc d'Épernon puis vendu par son fils, vidé de ses meubles et laissé à l'abandon lors de contestations d'héritage jusqu'en 1755. Il revient à la marquise de Montazet dont le fils, Charles va entreprendre sa démolition à partir de 1769 pour ne conserver que les bases et les fossés et construire un château neuf. Le château est vendu le 8 ventôse an V mais la vente est cassée, et le château est racheté par sa femme. Au milieu du XIXe siècle, la famille de Dampierre fait construire une aile de dépendances parallèle à celle des écuries, niveler l'esplanade et détruire les restes de l'ancienne basse-cour médiévale. En 1940, Rommel y installe son état-major. Le château bénéficie de multiples protections aux M.H.: une inscription le 6 novembre 2003, un classement pour la totalité du château le 9 juin 2008 et une inscription pour la cour des communs ce même 9 juin 2008.","architecture":"PLASSAC, le château médiéval était une construction irrégulière, aux murs à contreforts sur lesquels étaient adossés des dépendances ; il a été rasé vers 1769 sauf la porte du pèlerin qui était le châtelet d'entrée, construction rectangulaire à pilastres flamboyants sur culots figuratifs. Ont aussi été conservés les fossés avec escarpe et contrescarpe. L'avant-cour, bordée de dépendances à toit d'ardoise, est séparée de la cour par une balustrade. Les deux ailes et les quatre pavillons construits par le duc d'Épernon ont aussi été nivelés.  Le château du XVIIIe siècle comporte un haut pavillon à combles brisés encadré de deux ailes terminées chacune par une avancée à fronton triangulaire. Les toitures, très hautes, couvertes d'ardoises sont percées de lucarnes de petites dimensions à fronton arrondi.  La cour est encadrée par les écuries du XVIIIe siècle et les communs du XIXe siècle.","habitants":"Famille de Jean-Louis Nogaret\r\n        \"","divers":"Château de Plassac 45° 28' 15,96\" Nord et 0° 33' 50,04\" Ouest","gps":"","images":["../image/image_17/17_Plassac_1.jpg","../image/image_17/17_Plassac_2.jpg","../image/image_17/17_Plassac_3.jpg","../image/image_17/17_Plassac_4.jpg","../image/image_17/17_Plassac_5.jpg","../image/image_17/17_Plassac_6.jpg","../image/image_17/17_Plassac_7.jpg","../image/image_17/17_Plassac_8.jpg"]},"Consult_chateau_formulaire3ee8":{"id":"Consult_chateau_formulaire3ee8","dept":"17","canton":"Pons","commune":"Pons","nom":"Pons","type":"Forteresse","periode":"XVI-XVII","histoire":"PONS, forteresse elle a appartenu au sire d'Aulnay, aux ducs d'Aquitaine, puis aux sires de Pons. Rasé en 1179 par le duc d'Aquitaine Richard Cur de Lion à la suite d'une révolte de son vassal, le château est relevé en 1187 par Geoffroy III de Pons. De cette époque date notamment l'imposant donjon quadrangulaire, pièce maîtresse du dispositif défensif de la place-forte, qui apparaît comme l'un des plus beaux exemples de donjon-palais roman de Saintonge. Le château est de nouveau détruit en 1622 à l'exception du donjon et de quelques éléments défensifs  par les armées de Louis XIII à la suite du siège de 1621. Quelques années plus tard, le maréchal César Phbus d'Albret fait édifier le corps de logis actuel et ordonne la construction de l'escalier monumental. Il permet de relier la ville-haute à la ville-basse. En 1807 le château  du maréchal d'Albret du XVIe siècle appelé château des Sires devient la propriété de la ville qui en ont fait l'hôtel de ville.","architecture":"PONS,  donjon de Pons est le plus bel exemple de donjon palais roman de l'ouest de la France. Ses murailles, en pierre de taille, ont une épaisseur de 2,5 mètres sur trois de ses côtés et 4,40 mètres d'épaisseur sur le côté nord. D'une hauteur de 33 mètres il a une base de 26,45 mètres sur 15,25 mètres. L'intérieur comportait trois niveaux. Jusquen 1904, le donjon était couronné dun entablement percé de créneaux  et  rajout des mâchicoulis fantaisies et des échauguettes dangle postiches munies de meurtrières, sur la foi d'une gravure qui représentait le donjon de Tonnay-Boutonne ! Les travaux furent financés par la vente d'une cheminée qui est maintenant au château d'Usson. À l'origine, lentrée du donjon, située au nord, permettait daccéder au premier étage à l'aide d'un escalier en bois. Comme pour le Donjon de la Tour de Londres, l'escalier pouvait être détruit ou démonté en cas d'attaque. Aujourd'hui, laccès se fait par un escalier à vis en pierre. Le premier étage comporte une vaste salle éclairée, côté sud, par deux fenêtres géminées surmontées de deux autres fenêtres de plein-cintre. Toutes les autres ouvertures ont été percées ultérieurement en fonction des utilisations de lédifice. Les circulations intérieures sont réalisées par d'étroits escaliers en colimaçon, logés dans l'épaisseur des murs. Depuis la terrasse de l'édifice, la vue sétend sur toute la ville et la large vallée de la Seugne.","habitants":"Maréchal César Phbus d'Albret\r\n        \"","divers":"Tour de Pons  45° 34' 41\" Nord et 0° 32' 51\" Ouest      Sires 45° 34' 52\" Nord et 0° 32' 49\" Ouest  et hôtel de ville grav 6","gps":"","images":["../image/image_17/17_Pons_1.jpg","../image/image_17/17_Pons_2.jpg","../image/image_17/17_Pons_3.jpg","../image/image_17/17_Pons_4.jpg","../image/image_17/17_Pons_5.jpg","../image/image_17/17_Pons_6.jpg"]},"Consult_chateau_formulaired520":{"id":"Consult_chateau_formulaired520","dept":"17","canton":"Saint-Porchaire","commune":"Pont l","nom":"Pont_Labbé_Arnoult","type":"Château","periode":"XV","histoire":"Port-L'ABBE, le séminaire Saint-Antoine de la Chaume a accueilli, de 1934, date de sa création par les Assomptionnistes pour y établir leur noviciat de la province de Bordeaux, jusqu'en 1968, 34 promotions de jeunes se préparant à la vie religieuse. Il occupait le site d'un manoir féodal du Xe siècle. En 1969, une communauté des surs de la Sagesse s'y est aussi installée. Elle a quitté les lieux en 2011 avant les pères en 2012. Emmanuel dAlzon, fondateur des assomptionnistes, meurt le 21 novembre 1880. Dès 1899, une communauté sinstalle à Saujon où elle ouvre un petit séminaire. Mais trois ans plus tard, il faut fermer la maison, faute de vocations en nombre suffisant. Plus durable a été limplantation, en 1934, à Pont-lAbbé-dArnoult, dans la propriété que leur lègue M. Bonnet à la Chaume pour y établir le premier noviciat de la province de Bordeaux. Ce dernier ouvre donc en septembre 1934, avec 27 novices, dont un Espagnol.","architecture":"PORCHE, il s'agit de deux tours cylindriques formant une porte de ville qui comportait une herse en fer fermant la ville. Il existait également des créneaux et des mâchicoulis qui ont été détruits : c'est donc aujourd'hui un bâtiment tronqué.                                PRIEURE, il a subi au fil des années de nombreuses r
