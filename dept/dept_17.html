estaurations, mais son aspect actuel date des XVIe et XVIIe siècles. Les vestiges des bâtiments comportent une porte et une tour de guet, restes des fortifications.","habitants":"Saint-Antoine de la Chaume\r\n        \r\n        \"","divers":"Porte de Pont Labbé grav 1-2                                      château de Chaume grav 3-4-5","gps":"","images":["../image/image_17/17_Pont_Labb%c3%a9_Arnoult_1.jpg","../image/image_17/17_Pont_Labb%c3%a9_Arnoult_2.jpg","../image/image_17/17_Pont_Labb%c3%a9_Arnoult_3.jpg","../image/image_17/17_Pont_Labb%c3%a9_Arnoult_4.jpg","../image/image_17/17_Pont_Labb%c3%a9_Arnoult_5.jpg"]},"Consult_chateau_formulaire43a8":{"id":"Consult_chateau_formulaire43a8","dept":"17","canton":"Saint-Porchaire","commune":"Port D","nom":"Port_Denvaux","type":"Château","periode":"XIV-XVIII","histoire":"A Port d'Envaux  le manoir de la Prêvoté, le château de Mouillepied,  de Priousté et la Capitainerie.             PORT d'ENVAUX, le manoir de la Prévôté  est délimitée par une enceinte dont il reste la partie méridionale et occidentale où deux meurtrières sont encore visibles. Il était le logis du prévôt royal dont les obligations étaient de citer et garder tous larrons et malfaiteurs arrêtés dans les paroisses de Saint-Saturnin et Plassay, puis de les conduire à Saintes.     MOUILLEPIED, le domaine doit son nom aux nombreuses sources qui y prennent naissance,  fut témoin de la fameuse bataille à lissue de laquelle le Roi de France Saint-Louis reconquit lAquitaine qui était sous domination anglaise depuis plusieurs siècles. Cette bataille fut immortalisée en 1837 par le peintre Delacroix. En 1638, le Sénéchal, sieur de Mouillepied était assesseur du comte de Taillebourg.    PRIOUSTE, dominant la Charente, il fût aménagé, à la fin du XIXe siècle par Abel Mestreau qui  décida dy bâtir un logis dans lesprit renaissance. On laperçoit idéalement lors des croisières sur la Charente, entre Port dEnvaux et Saintes.","architecture":"PORT-d'ENVAUX, maison forte  de la Tour du XIVe siècle bâtie pour la défense, avec un long mur denceinte, pourvu darchères et de meurtrières. Au moment de la guerre de cent ans, la Tour fut la demeure du Sénéchal anglais, cest-à-dire du chevalier nommé par le Roi dAngleterre pour veiller à la justice. Ce manoir se compose de deux tours : une ronde tronquée à langle Nord-Ouest et une autre tour octogonale sur la façade sud, saillante, ayant en son sein un escalier à vis permettant une distribution verticale des différentes salles de la maison forte.    PRIOUSTE, dominant la Charente, il fût aménagé, à la fin du XIXe siècle, un logis dans lesprit renaissance.\r\nCAPITAINERIE , ces maisons ont été construites entre le XVIIIe et le XIXe siècle, date de lessor commercial du port. \r\nMOUILLEPIED , château Mouillepied doit son aspect actuel à lingénieur en chef de larsenal de Rochefort, Guillaume Clairins des Lauriers, chevalier de Saint-Michel, qui agrandit cette demeure en une agréable résidence de style classique XVIIIe siècle agrémentée de jardins en terrasse et de pièces deau. Toute lannée les propriétaires vous accueillent dans ce château du XVe et le XVIIIe siècle restauré dans le respect du patrimoine avec le confort daujourdhui.","habitants":"Seigneurs locaux\r\n        \"","divers":"A port Denvaux le château de Mouillepied Grav 1 à 4    45° 50' 13\" Nord, 0° 40' 49\" Ouest, de la   Capitainerie grav-9 , de    Latour grav -8    de la   Prévoté grav de 5 à 6   et de   Priousté grav 7","gps":"","images":["../image/image_17/17_Port_Denvaux_1.jpg","../image/image_17/17_Port_Denvaux_2.jpg","../image/image_17/17_Port_Denvaux_3.jpg","../image/image_17/17_Port_Denvaux_4.jpg","../image/image_17/17_Port_Denvaux_5.jpg","../image/image_17/17_Port_Denvaux_6.jpg","../image/image_17/17_Port_Denvaux_7.jpg","../image/image_17/17_Port_Denvaux_8.jpg","../image/image_17/17_Port_Denvaux_9.jpg"]},"Consult_chateau_formulaire4375":{"id":"Consult_chateau_formulaire4375","dept":"17","canton":"Thénac","commune":"Pérignac","nom":"Pérignac_Lerse","type":"Château","periode":"XV","histoire":"PERIGNAC-LERSE, le château de Pérignac, aussi appelé château de Lerse, a été construit en 1410 par le seigneur local. Des Coquilles Saint-Jacques ciselées sur les côtés du portail d'entrée laissent penser que le château hébergeait des pèlerins sur la route de Compostelle.    Loti en carré comme une petite place-forte, est resté  dans la même famille.  La particularité de ce château est d'avoir toujours appartenu à la même famille du XVe au XXe siècle. Souvent transmis par la descendance féminine, divers noms se rattachent à son histoire : les Dexmier de L'Herse au XVe siècle, les Lubersac aux XVIe et XVIIe siècles, les Des Gentils aux XVIII et XIXe siècles et les Lafargue au XXe siècle.  En 1761, Pierre Bourderon lève le plan du Logis noble de L'Herse y compris la métairie et le jardin.","architecture":"LERSE appelé aussi le hâteau de Pérignac est un château bâti à Pérignac. Il dresse ses tours entre les champs et les bois de Pérignac.L'ensemble se situe au milieu de 105 hectares de verdure, dont 35 hectares de forêts. Derrière les pierres de taille, 600 m² habitables se répartissent sur 2 étages : une salle à manger au sol carrelé de tomettes, 4 chambres aux poutres apparentes, un salon agrémenté d'une cheminée monumentale et la salle de billard. Du côté des dépendances,  le plan, conservé au château, nous montre les trois bâtiments toujours existants, plus un quatrième, disparu, finissant de clore la cour.  Le principal corps de logis est flanqué de deux tours couvertes en poivrière. Il a perdu sa haute couverture en tiers-point, remplacée sur une partie par un toit à la Mansart et sur le reste par une couverture à deux pentes. Au premier étage, on voit encore une baie avec traverse et appui saillant mouluré. L'ancien portail d'entrée dans la cour s'ouvre dans un bâtiment situé à l'est. La porte en arc surbaissé est surmontée de mâchicoulis et était défendu par des bouches à couleuvrines disposées latéralement.  La fuie, figurant sur le plan à l'extrémité sud-est du jardin à la française, existe encore en bordure de l'allée menant au château.","habitants":"Famille de Dexmier de L'Herse\r\n        \"","divers":"Lerse     45° 37' 28\" Nord, 0° 27' 46\" Ouest           Pérignac 45° 37' 28\" nord, 0° 27' 46\" ouest","gps":"","images":["../image/image_17/17_P%c3%a9rignac_Lerse_1.jpg","../image/image_17/17_P%c3%a9rignac_Lerse_2.jpg","../image/image_17/17_P%c3%a9rignac_Lerse_3.jpg","../image/image_17/17_P%c3%a9rignac_Lerse_4.jpg","../image/image_17/17_P%c3%a9rignac_Lerse_5.jpg","../image/image_17/17_P%c3%a9rignac_Lerse_6.jpg","../image/image_17/17_P%c3%a9rignac_Lerse_7.jpg","../image/image_17/17_P%c3%a9rignac_Lerse_8.jpg"]},"Consult_chateau_formulaire2a0c":{"id":"Consult_chateau_formulaire2a0c","dept":"17","canton":"Saint-Porchaire","commune":"Soulignonne","nom":"Ransanne","type":"Château","periode":"XV","histoire":"RANSANNE, au XIVe siècle Guillaume de Ransanne est le premier seigneur connu du fief. En 1518 ce fief a droit de haute et basse justice, comme le montre l'hommage d'Andrée de Ransanne au roi. La famille de Ransanne possédait ce château en 1480, sous le règne de Louis XI. La demeure a très probablement été bâtie sur les ruines dun château plus ancien. Au XVe siècle, la famille de Losme posséda également le fief. Il est probable que les armoiries surmontant lentrée de la tour soient celles des De Losme. En 1530, le domaine devint la propriété de François Lebrethon, avocat du roi et maire de Saintes. La famille Lebrethon le garda jusquen 1763, date à laquelle un ancien capitaine des vaisseaux du roi, Claude-Mathieu Mac Nemara, en devint propriétaire. Si le château de Ransanne a changé souvent de propriétaires au fil des siècles, son caractère a cependant été préservé. Les propriétaires actuels en firent lacquisition dans les années quatre-vingt dix, le château faisait grise mine avec ses murs décrépis, ses tuiles cassées et ses planchers vermoulus.","architecture":"RANSANNE, la demeure élevée du XVe siècle est massive, avec un corps de logis à trois niveaux, couvert d'une toiture à deux pentes. Elle possède deux façades très différentes : l'une avec uniquement deux travées d'étroites fenêtres est encadrée de deux tours en poivrière presque sans ouvertures alors que l'autre présente une tour d'escalier carrée en milieu de façade, et c'est la seule entrée du logis par une porte ornée d'un arc brisé quatre bretèches, une par tour ronde et deux sur le haut de la tour carrée, complètent la défense. Le petit bâtiment au sud du château est cantonné de deux échauguettes. Le château de Ransanne et le petit bâtiment de communs ont été inscrits au M.H. le 29 août 1991.","habitants":"Famille de Lebrethon\r\n        \"","divers":"Ransanne 45° 46' 47\" Nord et 0° 48' 02\" Ouest","gps":"","images":["../image/image_17/17_Ransanne_1.jpg","../image/image_17/17_Ransanne_2.jpg","../image/image_17/17_Ransanne_3.jpg","../image/image_17/17_Ransanne_4.jpg"]},"Consult_chateau_formulaire3c18":{"id":"Consult_chateau_formulaire3c18","dept":"17","canton":"Saujon","commune":"Médis","nom":"Rigaudière_Médis","type":"Château","periode":"XVII","histoire":"RIGAUDIERE,  la seigneurie est achetée le 24 janvier 1654 par André II Froger (1612-1670), négociant dans le sel, armateur. À cette époque, elle est dans les mains du fils d'André II, André III Froger (1655-1727), nouveau seigneur de La Rigaudière, lieutenant de vaisseau anobli par Louis XV en 1711. Elle passe ensuite au fils aîné d'André III, Michel-Honoré Froger de La Rigaudière (1687-1759), appelé auparavant Froger de La Clisse du nom d'un fief de sa mère, et qui devient lui aussi officier de marine. Au titre de la Rigaudière, Michel-Honoré rend aveu le 7 novembre 1730 à Jean Charles de Saint-Nectaire, le futur maréchal de France. André Alexandre Froger de La Rigaudière (1722-1807), fils de Michel-Honoré, devient lui aussi officier de marine, premier lieutenant de vaisseau de la compagnie des Indes. Il hérite du domaine, c'est lui qui fait construire le château subsistant actuellement. Pendant la Révolution Française,  perquisitionné en mars 1790 par les autorités municipales et la garde nationale, qui cherchaient des armes et des munitions. La demeure n'est pas endommagée. Froger de La Rigaudière n'émigre pas, ce qui sauve les bâtiments. À sa mort en 1807, la propriété passe d'abord à sa fille aînée, Marie Thérèse Jeanne Froger de La Rigaudière (née en 1753), mariée en mai 1775 à M. Montalier de Grissac, conseiller au parlement de Bordeaux, puis à sa fille cadette, Marie Julie Adélaïde Froger de La Rigaudière, qui avait épousé un lieutenant d'artillerie, Joseph Bernard de Bouet du Portal, dont la descendance l'occupe encore.","architecture":"RIGAUDIERE, une demeure antérieure s'élevait au même emplacement, datant du XVIIe siècle. Elle pourrait dater de 1636, date inscrite sur une pierre remployée, petit bâtiment en forme de U, avec une cour rectangulaire plus petite que l'actuelle, et un mur de clôture flanqué apparemment de deux petites tours à ses extrémités ; les routes et chemins d'accès sont les mêmes qu'actuellement. La Rigaudière, dans son état actuel, est construit entre 1759 et 1776. Le château et plusieurs de ses dépendances sont classés au M.H. en 1996 : après un arrêté du 14 octobre, annulé, le classement intervient par arrêté du 27 décembre 1996. Sont compris dans le classement : le château lui-même, pavillon et toiture ; les façades et les toitures des communs ; la cour et ses murs ; le jardin à l'arrière ; l'allée d'entrée ; les parcelles où se trouvent les bâtiments. Le parc est inscrit à l'inventaire général. Le prix Sazerac, fondé par F.-J. Dallett, est attribué au château de la Rigaudière en 1998.","habitants":"Famille d'André Alexandre Froger de La Rigaudière \r\n        \"","divers":"Rigaudière 45° 39' 17\" nord, 0° 57' 59\" ouest","gps":"","images":["../image/image_17/17_Rigaudi%c3%a8re_M%c3%a9dis_1.jpg","../image/image_17/17_Rigaudi%c3%a8re_M%c3%a9dis_2.jpg"]},"Consult_chateau_formulaire4466":{"id":"Consult_chateau_formulaire4466","dept":"17","canton":"Thénac","commune":"Rioux","nom":"Rioux","type":"Château","periode":"XV","histoire":"RIOUX, appartenant aux seigneurs de Didonne, Rioux fut retiré à ces seigneurs, pour être donné au seigneur de Beaumont, pour ses bons et loyaux services pendant la guerre de cent ans  La baronnie de Rioux est confisquée à la maison de Didonne, et passe dans de nombreuses mains à partir de 1302.  Les Guinot sétaient établis en Saintonge en 1480, par le mariage de Nicolas Guinot (fils Honoré), seigneur de Viron avec Françoise de Beaumont de Cravans et Rioux.   Le père de Françoise était seigneur de Rioux depuis 1506, il inféoda et anoblit la terre de Beaupréau en faveur de son petit-fils, Jean Guinot, qui avait combattu avec lui en Italie. Cest Jean qui fit construire le manoir actuel de Beaupréau. Il épousa Roberte de la Barde et ils eurent quatre enfants dont deux fils : Charles, doù sortie la branche des Guinot de Rioux, et Almery qui devint seigneur de Beaupréau. Le château est réparé en 1619 par Georges Lemusnier puis en 1716 par Henri de Mirande.   Ce sont désormais les familles Rémont, Ecochard et Delmas qui en sont propriétaires.","architecture":"RIOUX,  la construction du château remonte au XVe siècle. Bien sûr, il a subi des transformations au cours des siècles, mais le côté Nord-Est, que lon peut admirer en passant sur la route de Saintes, conserve encore le magnifique aspect dun château féodal, ce qui est très rare dans les environs. Un pont dormant à deux arches a succédé au pont-levis.  Dans une enceinte rectangulaire entourée de fossés, renforcée de courtines qui étaient munies de canonnières, le logis est précédé d'une basse-cour. C'est un bâtiment à un étage et ouvertures étroites, sur sous-sol sans ouverture et couvert d'un toit à deux pans de tuiles plates.  Côté cour une tour d'escalier polygonale a été arasée, deux tours cylindriques flanquent l'autre façade, l'une avec chemin de ronde, l'autre avec toiture en poivrière et une petite tour carrée à toit d'ardoise s'appuie au centre de cette façade. Il est inscrit au M.H. depuis le 5 octobre 1965.","habitants":"Famille de Guinot de Rioux\r\n        \"","divers":"Rioux 45° 38' 58\" nord, 0° 42' 29\" ouest","gps":"","images":["../image/image_17/17_Rioux_1.jpg","../image/image_17/17_Rioux_2.jpg","../image/image_17/17_Rioux_3.jpg","../image/image_17/17_Rioux_4.jpg"]},"Consult_chateau_formulaire0ec9":{"id":"Consult_chateau_formulaire0ec9","dept":"17","canton":"Saint-Porchaire","commune":"Saint-Porchaire","nom":"Rochecourbon","type":"Forteresse","periode":"XVII","histoire":"ROCHECOURBON, autour de 1475, Jehan II de Latour fait construire une forteresse, en 1603, Jacques de Courbon, ayant épousé Jeanne de Gombaud en 1595, libère totalement Romette d'une indivision de cent treize ans, au XVIIe siècle, Jean-Louis de Courbon, petit-fils de Jacques, transforme La Roche-Courbon comme, la suite du XVIIIe siècle ne voit pas beaucoup de propriétaires sinon, en 1785, le marquis Sophie-Jacques de Courbon Blénac, l'un des anciens propriétaires du château fut Jean-Baptiste Mac Nemara, lieutenant de Frégate et enseigne d'une compagnie de marine, qui épousa en 1713 Julienne Stapleton, fille de Jean Ier Stapleton, l'un des premiers Irlandais de Nantes. Il acheta beaucoup plus tard le château, en 1756, un peu avant son décès,  le château n'est pas vendu comme bien national, en 1785 Sophie-Jacques de Courbon Blénac le rachète. en 1794 passe par alliance au général d'Hédouville.  En 1817, sa fille vend le domaine aux enchères, en 1920  Paul Chénereau acheta puis fit restaurer le domaine, lui redonnant sa splendeur d'antan.  En 1967, il laisse à ses enfants, Marie-Jeanne et Jacques Badois, la charge de maintenir le domaine.","architecture":"ROCHECOURBON, une forteresse composée de deux corps de logis, avec quatre puissantes tours et un donjon massif, ce château fort, construit en forme de triangle sur un éperon rocheux. Au nord, en avancée, la tour de la Fuye monte la garde. Après trois siècles de conflits entre Français et Anglo-Aquitains dans la région, il n'est pas possible de construire un château autrement que fort et défensif, le corps de logis s'ouvre à la lumière : de larges fenêtres sont percées au levant comme au couchant, le toit est muni d'ouvertures à la Mansart, un élégant balcon est construit en avancée sur des arcs en anse de panier, soutenu par cinq colonnes d'ordre toscan, un escalier à double palier descend vers les jardins, bordés par le paresseux Bruant. En octobre 1990, un terrible incendie a dévasté un bâtiment de 750 m2 appelé « La Grange ». Il a été restauré et accueille maintenant des manifestations à caractère professionnel ou familial.   Le donjon date du XVe siècle. Le château, restauré au XVIIe siècle présente une façade ornée d'arcades Renaissance. Aujourd'hui, le château de la Roche Courbon est ouvert aux visiteurs toute l'année et propose également des salles de location pour des mariages et toute sorte d'évènements professionnels ou privés.","habitants":"Famille de Jean-Louis de Courbon,\r\n        \"","divers":"Rochecourbon 45° 50' 10\" nord, 0° 46' 53\" ouest","gps":"","images":["../image/image_17/17_Rochecourbon_1.jpg","../image/image_17/17_Rochecourbon_2.jpg","../image/image_17/17_Rochecourbon_3.jpg","../image/image_17/17_Rochecourbon_4.jpg","../image/image_17/17_Rochecourbon_5.jpg"]},"Consult_chateau_formulaire9a1d":{"id":"Consult_chateau_formulaire9a1d","dept":"17","canton":"Rochefort","commune":"Rochefort en Charente","nom":"Rochefort_Charente","type":"Fort","periode":"XV-XVII","histoire":"ROCHEFORT, pour protéger cette ville fut bâtit le fort Lupin     construit par Vauban commandée en 1683, la construction commencera en 1685 et se terminera en 1689.                                                                       ROCHEFORT,  est un château féodal français en grande partie disparu,  son site comporte plusieurs bâtiments : Un château fort, qui était situé sur une roche crayeuse dominant la Charente et qui est actuellement connu sous le nom d'Hôtel de la Marine de Rochefort. Il a été successivement le siège de la seigneurie , puis de l'Intendant  de 1671 à 1781, puis de la préfecture maritime de 1800 à 1927, puis du commandement de l'arrondissement maritime  de 1927 à 1989, puis du commandement de la Marine de Rochefort-La Pallice de 1989 à 2002, et actuellement du commandement des écoles de la Gendarmerie nationale.                                                                          La maison du ROY abrita à deux reprises l'empereur Napoléon Bonaparte : la première fois en août 1808 pour visiter le fort Boyard en construction et pour dresser les plans du fort Liédot et la seconde, moins glorieuse, le 3 juillet 1815, lors de son départ sur l'île d'Aix avant son exil sur l'île Sainte-Hélène.","architecture":"LUPIN, il a été construit pour défendre l'accès à Rochefort et son arsenal. Vingt-deux embrasures en arc de cercle côté fleuve permettaient un tir rasant en direction des coques des navires ennemis. Au centre, une tour-réduit, armée pour des tirs plongeant, logement pour les officiers, flanquée par deux casernes.  Fort Lupin est protégé, côté terre, d'un glacis, d'un chemin-couvert et d'un fossé en eau. Il fait lobjet dun classement au titre des M.H. depuis le 26 juin 1950. Sur les rives de l'estuaire, on trouve, en allant un peu plus vers la mer, à Port-des-Barques. Sur la même rive, la Fontaine Saint-Nazaire (1676), où les navires du Roi venaient s'approvisionner en eau en quittant l'arsenal de Rochefort. Sur la rive nord, Fort Lapointe, dit aussi \"Fort Vasou\" construit en 1672 puis transformé au XVIIIe siècle.\r\nROCHEFORT, un château de plaisance, dit l'hôtel de Cheusses, qui était situé à une centaine de mètres, dont une partie de 1599 est conservée comme aile nord de l'édifice actuel. Il a successivement servi de logement pour les chefs d'escadre (jusqu'en 1782), de siège de l'Intendance de la marine, de siège du commissariat de la marine (jusqu'en 1927), et il est devenu, depuis 1973, le musée national de la marine de Rochefort.","habitants":"Vauban  \r\n        \"","divers":"Lupin grav de 6 à 9                                                          Rochefort  45° 56' 32\" Nord et 0° 57' 32\" Ouest Grav1 à 5","gps":"","images":["../image/image_17/17_Rochefort_Charente_1.jpg","../image/image_17/17_Rochefort_Charente_2.jpg","../image/image_17/17_Rochefort_Charente_3.jpg","../image/image_17/17_Rochefort_Charente_4.jpg","../image/image_17/17_Rochefort_Charente_5.jpg","../image/image_17/17_Rochefort_Charente_6.jpg","../image/image_17/17_Rochefort_Charente_7.jpg","../image/image_17/17_Rochefort_Charente_8.jpg","../image/image_17/17_Rochefort_Charente_9.jpg"]},"Consult_chateau_formulaired1e5":{"id":"Consult_chateau_formulaired1e5","dept":"17","canton":"La Rochelle","commune":"La Rochelle","nom":"Rochelle_Chateaux","type":"Patrimoine","periode":"XV-XVII","histoire":"La ROCHELLE; HOTEL de VILLE, bâtiment qui héberge la mairie depuis 1298 ; il est pour cette raison le plus ancien hôtel de ville français encore en fonction. Entre 1628 et 1748, le bâtiment est la résidence du Gouverneur de l'Aunis et de la ville. Il est classé au titre des M.H. depuis le 27 décembre 1861. Largement détérioré, le bâtiment subit, à la fin du XIXe siècle, une  restauration à l'identique, transformation et extension de bâtiment.                                                  La Villa ALSACE, est inscrite aux M.H. depuis 1992.     La MAISON au CHIEN,  été construite au XVIe et XVIIe siècle. Elle est inscrite aux M.H. depuis le 14.06.1928.\r\nCHAINE, bâtie à la Rochelle,                                    VILLA DIANE, la construction date du XVIe siècle, est classée aux M.H. depuis 1897. Elle appartient à la commune                                                                          PASSY, cétait dès 1267 la propriété de Gilbert Vender qui fut maire de La Rochelle et grand chambellan dAquitaine à lépoque dAlienor dAquitaine et de La Rochelle aux mains des Plantagenêts. Les Chaudrier, descendants du célèbre maire de La Rochelle annobli par Charles V pour avoir chassé les anglais de la ville étaient seigneurs de Passy de 1424 à 1524.  Leur succèdèrent les Cherbeys au XVIe siècle  puis les Brunet au début du XVIIe siècle et les descendants de Gabriel Béraudin seigneur de Grandzay et lieutenant général de la Sénéchaussée de La Rochelle, jusquen 1771. Au XIXe siècle, Françoise-Armande des Roches de Chassais en fut propriétaire à partir de 1834.","architecture":"HOTEL de VILLE, le 5 février 1718, Louis XV détacha la mairie du bureau de finance, constitua un corps de ville et rendit la mairie élective. Privé de léchevinage, le bureau des finances, puis le corps de ville, se réunissait dans la maison Henri II. En 1748, la maison du gouverneur n'était plus adapté à son rôle de résidence du gouverneur qui préféra négocier avec le corps de ville son échange au profit de l'hôtel Jouin de la Tremblaye. Le bâtiment fut acquis par la ville  auprès de M. Tremblay. Le vieil échevinage est alors récupéré par la ville et redevint l'hôtel de ville de La Rochelle.\r\nVILLA DIANE, située rue des Augustins, la maison Henri II également connue sous le nom de Diane de Poitiers est une luxueuse demeure construite en 1555 pour Hugues de Pontard, seigneur de Champdeniers, procureur du roi en Saintonge. Il sagit dun édifice de style renaissance, unique en son genre, qui se compose de deux pavillons de hauteur différente, réunis par une galerie à deux étages et une loggia.  Une frise découpée en rainures ainsi que des médaillons et bucranes sont également remarquables.\r\nPASSY, lingénieur du roi et architecte Jean Grissot racheta alors la seigneurie de Passy dont les bâtiments étaient en ruine.","habitants":"Gouverneur de l'Aunis    M. Tremblay                       Villa Diane Hugues de Pontard                             Passy Jean Grissot \r\n        \"","divers":"Alsace 46° 09' 24\" Nord et 1° 09' 50\" Ouest           Hotel de ville grav 2                                                     La Chaine  46° 09' 21\" Nord et 1° 09' 15\" Ouest  Chien : 46° 09' 37\" Nord et 1° 09' 13\" Ouest           Diane : 46° 09' 37\" Nord et 1° 09' 11\" Ouest   grav 1-3-4-5.                                                                                   Grosse Horloge  46° 09' 30\" Nord et 1° 09' 13\" Ouest     grav-7                                                               Passy grav-6","gps":"","images":["../image/image_17/17_Rochelle_Chateaux_1.jpg","../image/image_17/17_Rochelle_Chateaux_2.jpg","../image/image_17/17_Rochelle_Chateaux_3.jpg","../image/image_17/17_Rochelle_Chateaux_4.jpg","../image/image_17/17_Rochelle_Chateaux_5.jpg","../image/image_17/17_Rochelle_Chateaux_6.jpg","../image/image_17/17_Rochelle_Chateaux_7.jpg"]},"Consult_chateau_formulaire100d":{"id":"Consult_chateau_formulaire100d","dept":"17","canton":"La Rochelle","commune":"La Rochelle","nom":"Rochelle_Tour","type":"Fort","periode":"XIII-XV","histoire":"La ROCHELLE, les fortifications ont été classées en 1889.  La Tour Saint-Nicolas  est classée aux M.H. depuis 1879. Tour La LANTERNE, date du XVe siècle elle est également connue sous les noms de Tour du Garrot, Tour des Prêtres et Tour des Quatre Sergents, c'est un ouvrage fortifié qui servait initialement à protéger lentrée du port primitif . Sa construction date de 1209 , les travaux furent achevés en 1468, grâce aux deniers personnels du maire de l'époque, Jean Mérichon. À l'origine, située au bord de l'eau, elle formait l'angle Sud-Ouest de l'enceinte médiévale et sa tourelle à lanterne servait de phare . Conservée lors du rasement des fortifications en 1629, elle sera intégrée, en 1689, dans la nouvelle enceinte. De 1900 à 1914, la restauration de la Tour de la Lanterne fut entreprise. Suivant les projets de Juste Lisch, puis sous la direction d'Albert Ballu, la restauration lui rendit son aspect médiéval. Lors de nouvelles rénovations de 2014 à 2015, 2 gargouilles ont été recréées, à l'effigie des dessinateurs et caricaturistes Cabu et Wolinski.  Devenue un musée, elle est ouverte au public et se visite.                                                                   GROSSE HORLOGE est une porte bâtie à La Rochelle, a été classée aux M.H. depuis 1978, la porte de ville fortifiée, ouverte dans l'enceinte médiévale.","architecture":"LA CHAINE, sa construction date de 1382 à 1390. Elle est de style médiéval. La Tour de la Chaîne est, avec la Tour Saint-Nicolas et la Tour de la Lanterne, l'une des 3 tours du front de mer de La Rochelle. Elle constitue une majestueuse porte d'entrée. C'est de cette tour qu'était manuvrée la Chaîne, fixée dans la tour Saint-Nicolas, sur l'autre rive, pour interdire l'accès au port. La tour de la Chaîne s'élevait à une hauteur de 34 mètres, contre 20 mètres aujourd'hui, depuis la base du parapet. Elle a un diamètre de 16 mètres et sa muraille est épaisse de 3,50 mètres. Elle était surmontée d'une  toiture en forme de toit poivrière en ardoise, qui, refaite plusieurs fois à des hauteurs différentes, fut définitivement  recouverte tout à bout  dit un chroniqueur sous l'année 1588. La tour était couronnée de créneaux à meurtrières cruciformes, avec mâchicoulis. Des réduits ont été pratiqués dans l'épaisseur de la muraille pour recevoir, plus tard des canons et les escaliers se développaient dans l'épaisseur de cette double muraille. \r\nGROSSE HORLOGE porte de ville fortifiée, ouverte dans l'enceinte médiévale. Elle a été bâtie à partir du XIIe siècle et  initialement connue sous le nom de \"porte de Pérot ou Parrot\", quartier situé à l'époque en dehors des fortifications.","habitants":"Jean Mérichon.\r\n        \"","divers":"Fortifications 46° 09' 21\" Nord et 1° 09' 19\" Ouest         la Lanterne  46° 09' 20,9\" Nord et 1° 9' 25,4\" Ouest       St-Nicolas  46° 09' 19\" Nord et 1° 09' 10\" Ouest","gps":"","images":["../image/image_17/17_Rochelle_Tour_1.jpg","../image/image_17/17_Rochelle_Tour_2.jpg","../image/image_17/17_Rochelle_Tour_3.jpg","../image/image_17/17_Rochelle_Tour_4.jpg","../image/image_17/17_Rochelle_Tour_5.jpg","../image/image_17/17_Rochelle_Tour_6.jpg"]},"Consult_chateau_formulaire56e8":{"id":"Consult_chateau_formulaire56e8","dept":"17","canton":"Saint-Porchaire","commune":"Saint-Georges des Coteaux","nom":"Romefort","type":"Château","periode":"XV","histoire":"ROMEFORT, au XVe siècle la seigneurie de Romefort appartient à la famille Robert. Elle est constamment habitée depuis.","architecture":"ROMEFORT,  le corps de logis qui date du XVe siècle est un bâtiment simple à couverture d'ardoise à deux pans. Il a été inscrit au M.H. le 26 septembre 1995. Il forme la partie ouest, et les communs la partie sud autour de la cour. Des bâtiments de l'aile nord ne reste que la chapelle sur porche.  Le porche d'entrée, surmonté d'une chapelle voutée, date lui aussi du XVe siècle. Il n'est pas sans rappeler celui du passage Saint-Gilles à Pons. Ces chapelles construites sur des passages voutées avaient la fonction de protection des lieux. Cette chapelle de style gothique flamboyant a été classée au M.H. le 11 décembre 2002. \r\nAutrefois située au milieu de bâtiments à ce jour disparus formant l'aile nord du château, la chapelle fin du XVe siècle est maintenant isolée. Le corps de logis  du XVe siècle, remanié aux XVIIe siècle escalier, portail et XVIIIe siècle cheminées  et ses annexes forment l'aile ouest. Les bâtiments de communs l'aile sud forment un retour sur le côté Est de cette cour rectangulaire. La chapelle sur porche, de style gothique flamboyant, est un élément assez rare.","habitants":"Famille Robert\r\n        \"","divers":"Château de  Romefort 45° 46' 37\" nord, 0° 40' 55?\"ouest","gps":"","images":["../image/image_17/17_Romefort_1.jpg","../image/image_17/17_Romefort_2.jpg","../image/image_17/17_Romefort_3.jpg"]},"Consult_chateau_formulaire04eb":{"id":"Consult_chateau_formulaire04eb","dept":"17","canton":"Royan","commune":"Royan","nom":"Royan","type":"Château","periode":"XV","histoire":"A Royan le château de Mons la villa Primavera et l'hôtel de ville.                                                                 MONS, succédant à une maison noble appartenant au XVe siècle au prieur de Saint-Pierre de Royan, puis plus tard à Pierre Dugua de Mons, l'un des premiers explorateurs de la Nouvelle-France, il est vendu par ce dernier en 1599 afin de financer ses expéditions. Le château est acquis par François de Videgrain, seigneur de Belmont, avant de passer en 1646 à la famille Morineau, qui le conserve jusqu'en 1736. Le 5 juillet 1736, le château est racheté par Pierre Vallet de Salignac, un négociant originaire de Marennes enrichi par le commerce du sel. Son fils Nicolas-Thérèse Vallet de Salignac marque l'histoire de la commune en devenant en 1790 le premier maire de Royan. Vers 1919, le château est converti en un pensionnat de jeunes filles. Les bombardements de 1945 détruisent partiellement le site. La reconstruction du château est confiée à l'architecte Marc Quentin. \r\nPRIMAVERA, hôtel à St-Palais du XIXe siècle.","architecture":"MONS, l'édifice, uvre de l'entrepreneur Pierre Caumont, est entièrement reconstruit à partir de 1737 dans un style inspiré par le classicisme. Bien qu'endommagée par le bombardement du 5 janvier 1945, la demeure peut être considérée comme un précieux témoignage de l'architecture saintongeaise du XVIIIe siècle. On pénètre dans la cour d'honneur après avoir franchi deux enceintes. La seconde, formée de hauts murs renards rythmés sur leurs faces internes par des pilastres entre lesquels sont dessinées de fausses baies, est coupée par une porte cochère monumentale. Les dépendances, qui avaient été rejetées sur la droite, s'organisaient autour d'une seconde cour, celle de la première maison noble qui est décrite en 1736 comme un édifice organisé à partir d'un « pavillon » contenant l'escalier principal. Le corps de logis élevé entre 1737 et 1745 forme un H en double profondeur, ce qui a permis d'aménager une façade latérale dominant la baie de Royan. Coté jardin, les larges terrasses à balustres et le jeu de toitures donnent l'illusion d'une longue demeure encadrée par deux pavillons à combles brisés.","habitants":"Famille Morineau\r\n        \"","divers":"Mons 45° 37' 44\" Nord et 1° 01' 39\" Ouest   grav de 2 à à5                                                                             Hôtel de ville de Royan grav-1                                  Primavera grav-6","gps":"","images":["../image/image_17/17_Royan_1.jpg","../image/image_17/17_Royan_2.jpg","../image/image_17/17_Royan_3.jpg","../image/image_17/17_Royan_4.jpg","../image/image_17/17_Royan_5.jpg","../image/image_17/17_Royan_6.jpg"]},"Consult_chateau_formulaire8985":{"id":"Consult_chateau_formulaire8985","dept":"17","canton":"Thénac","commune":"Rétaud","nom":"Rétaud_Chatenet","type":"Vestiges","periode":"XV","histoire":"CHATENET, au XVe siècle, construction du château. Il est possession d'une branche cadette des Beaumont.  A la fin du XVe siècle, le site appartient à Isabeau Chaudrier, veuve de François de Clermont, seigneur de Dampierre-sur-Boutonne .  Au XVIIe siècle siècle, le château passe par mariage aux Dexmier En 1625, un membre de la famille Dexmier épouse Marie d'Archiac et prend ce patronyme. En 1845, le site est acheté par Louis Fretard d'Écoyeux. A la fin du XIXe siècle, la fille de Louis épouse le marquis  de Serigny. Plusieurs travaux de consolidation et d'agrandissement sont réalisés.  En 1942, en mars, le donjon est classé aux M.H. , puis en juillet le reste du château est inscrits aux M.H.  En 1945, le propriétaire du site ayant été accusé de collaboration avec l'ennemi, le château est victime de pillages.  En 1997, Jérôme Arnauld des Lions achète le château et tente de le consolider. Au début du XXIe siècle, une association de sauvegarde est créée.","architecture":"CHATENET,  l'ensemble fortifié était constitué, à l'origine, d'une enceinte à peu près carrée dont trois des angles (nord, ouest et sud) étaient garnis d'une petite tour de défense. A l'angle est se trouvait un donjon rectangulaire. Ce donjon avait ses trois angles extérieurs garnis de mâchicoulis de pierre. L'ensemble a subi de nombreuses transformations. Seule la tour nord a conservé l'intégrité de son soubassement, avec ses meurtrières de flanquement et une couverture. Celle de l'ouest est en ruines. Les travées de celle du sud subsistent dans la construction plus récente du corps de logis bâti à la suite du donjon au XVIIe siècle. Le portail d'entrée actuel semble une reconstruction du XVIIe siècle. Le donjon a conservé ses défenses. Il comprend un rez-de-chaussée voûté. Les deux étages au-dessus sont effondrés. La charpente semble remonter, dans ses éléments essentiels, au XVe siècle.","habitants":"Famille de François de Clermont\r\n        \"","divers":"Château du châtenet en parti ruiné à Rétaud","gps":"","images":["../image/image_17/17_R%c3%a9taud_Chatenet_1.jpg","../image/image_17/17_R%c3%a9taud_Chatenet_2.jpg","../image/image_17/17_R%c3%a9taud_Chatenet_3.jpg","../image/image_17/17_R%c3%a9taud_Chatenet_4.jpg","../image/image_17/17_R%c3%a9taud_Chatenet_5.jpg","../image/image_17/17_R%c3%a9taud_Chatenet_6.jpg","../image/image_17/17_R%c3%a9taud_Chatenet_7.jpg","../image/image_17/17_R%c3%a9taud_Chatenet_8.jpg"]},"Consult_chateau_formulaire6c63":{"id":"Consult_chateau_formulaire6c63","dept":"17","canton":"Saintes","commune":"Saintes","nom":"Saintes","type":"Patrimoine","periode":"X-XII","histoire":"SAINTES, possède de fabuleux vestiges gallo-romains, comme lénigmatique arc de triomphe sur les rives de la Charente, ou cet amphithéâtre antique lové dans un écrin de verdure et sans doute lun des premiers construit en Gaule.Ce n'est pas un arc de triomphe, mais la porte de la ville avec une entrée et une sortie. Cet arc de Germanicus était alors placé au milieu d'un pont sur la Charente. Il a ensuite été déplacé et remonté sur la rive.   LAmphithéâtre est un monument majeur du premier siècle après Jésus-Christ, son histoire et ses caractéristiques nous sont expliquées sur un panneau d'information à l'entrée du site:  Construit dans les années 40-50 après Jésus-Christ, sous le règne de lempereur Claude, comme nous lapprend un fragment de la dédicace, lamphithéâtre est aujourdhui le vestige le plus important de lantique Mediolanum, puisque la presque totalité des autres édifices publics ou privés ont disparu.","architecture":"SAINTES, construit très tôt, sous les règnes de Tibère et Claude, en profitant des versants naturels dun vallon, lamphithéâtre de Saintes reste lun des mieux conservés sur le territoire de la Gaule dite chevelue. Cette imposante ellipse  de 102 sur 126 mètres a été bâtie à la périphérie occidentale de la ville. Ses ruines romantiques contrastent aujourdhui avec les spectacles sanglants auxquels pouvaient assister plusieurs milliers de Gallo-romains. Les spectateurs, classés selon leur rang social, sinstallaient sur les gradins pour acclamer les exécutions, les chasses danimaux sauvages ou les  combats de gladiateurs.    Saintes, le musée archéologique et la colonnade provenant de monuments antiques  Un panneau à l'entrée, nous précise l'origine et la vocation du musée.","habitants":"Seigneur locaux\r\n        \"","divers":"Patrimoine de Saintes arénes, musée et Châteaux","gps":"","images":["../image/image_17/17_Saintes_1.jpg","../image/image_17/17_Saintes_2.jpg","../image/image_17/17_Saintes_3.jpg","../image/image_17/17_Saintes_4.jpg","../image/image_17/17_Saintes_5.jpg","../image/image_17/17_Saintes_6.jpg"]},"Consult_chateau_formulaired222":{"id":"Consult_chateau_formulaired222","dept":"17","canton":"Chatelaillon","commune":"Salles sur Mer","nom":"Salle_sur_Mer","type":"Château","periode":"XV-XVI","histoire":"A Salles sur Mer le château de Cramahé du XVIIIe siècle, de l'Herbaudière (article suivant), de l'Héronière du XVIIIe siècle, du Roullet du  XVe et XVIIIe siècles, et de Montagne le Jeune  (article suivant).\r\nCRAMAHE seigneurie de Chatelaillon, en 1518, Jeanne, duchesse de Longueville, vicomtesse de Chatelaillon, accorde la terre et le premier château à Pierre Châteigner, maire de La Rochelle. Les descendants de Pierre Châteigner gardèrent Cramahé jusquà la révocation de lEdit de Nantes. En 1865, les derniers Châteigner passèrent à létranger. En 1714, à la suite dune licitation entre les héritiers, la seigneurerie revint à Henriette-Céleste de Béjarry       L'HERONIERE, lhistoire du logis de lHéronière est assez obscure. Au XVIIIe siècle, il était détenu par Antoine Saulnier, inspecteur des fermes du Roi.          ROULET, dès 1401, Huguet Desnorp possédait un hébergement  à Salles. Le 26 avril 1438 « loustel » du Roullet,  furent anoblis et inféodés par le comte de Richemont, connétable de France, en faveur de Laurent Desnorp. En 1468, le Roullet passe par mariage à Antoine de Jarrie. La même famille le conserve jusquen 1598, où la fille de Jarrie épouse Daniel de Green de Saint-Marsault, écuyer, seigneur de la Garde Merpins. Cest à Louis Green de Saint-Marsault que lon doit lactuel château commencé vers 1710 .","architecture":"CRAMAHE . Le corps du logis que nous connaissons, grâce à des relevés effectués par lingénieur Claude Masse, aurait été reconstruit en 1753. La façade postérieure contient les armoiries sculptées sur bois des familles Harouard et Larocque-Latour. Cramahé est lune des premières maisons nobles de lAunis à adopter des formes nouvelles influencées par les hôtels particuliers.                                               L'HERONIERE Etablie en forme de U, la construction se compose dun logis avec dépendances entourant une tour carrée. Ce manoir présente les caractéristiques tout en longueur des maisons Aunisiennes de la première moitié du XVIIIe siècle. Le portail monumental, encadré de deux lions, contraste avec lallure générale de ce manoir. Dans le jardin, une statue de Vénus sculptée par Allegrain, porte la mention « Allegrain fecit 1765 », ce qui permet une datation pour le logis                                             ROULET     Des travaux de réfection entrepris au XVIIIe siècle sont interrompus par la mort du propriétaire au siège de Lisbonne en 1714 et laile sud reste inachevée.","habitants":"Cramahé, famille de Pierre Châteigner                    Héronière  Antoine Saulnier,                                 Roulet famille d'Antoine de Jarrie.\r\n        \"","divers":"Roulet grav 1 -2,                                                  Cramahé grav 3-4                                                         Héronière grav 5-6                                                          Salles sur mer 46° 06' 19\" nord, 1° 03' 14\" ouest","gps":"","images":["../image/image_17/17_Salle_sur_Mer_1.jpg","../image/image_17/17_Salle_sur_Mer_2.jpg","../image/image_17/17_Salle_sur_Mer_3.jpg","../image/image_17/17_Salle_sur_Mer_4.jpg","../image/image_17/17_Salle_sur_Mer_5.jpg","../image/image_17/17_Salle_sur_Mer_6.jpg"]},"Consult_chateau_formulaire618e":{"id":"Consult_chateau_formulaire618e","dept":"17","canton":"Pons","commune":"Saint-Fort sur Gironde","nom":"Salles_St_Fort","type":"Château","periode":"XVI-XVII","histoire":"Les SALLES  situé rue du Gros-Chêne, semble dater du XVIe siècle pour ses parties les plus anciennes. Propriété du Marquis de Cumont, sous l'ancien régime, il est confisqué au moment de la Révolution et passe entre les mains de Charles-Henri de Pont en 1862. L'édifice actuel a cependant fait l'objet d'une importante campagne de restauration au XIXe siècle, sous la direction de l'architecte Gustave Alaux. Appartenant à la famille Couillaud, depuis 1959, le château des Salles a été aménagé en maison d'hôtes. Mme Sylvie Couillaud est la propriétaire du château des Salles.","architecture":"SALLES  du XVIe -XVIIe siècle, restauré en 1862 par l'architecte bordelais Gustave Alaux, celui -ci conservera, en autres, une grande tour carrée.","habitants":"Marquis de Cumont,\r\n        \"","divers":"les Salles à saint-Fort  45° 27' 38\" Nord, 0° 43' 15\" Ouest","gps":"","images":["../image/image_17/17_Salles_St_Fort_1.jpg","../image/image_17/17_Salles_St_Fort_2.jpg","../image/image_17/17_Salles_St_Fort_3.jpg","../image/image_17/17_Salles_St_Fort_4.jpg","../image/image_17/17_Salles_St_Fort_5.jpg"]},"Consult_chateau_formulairea6be-3":{"id":"Consult_chateau_formulairea6be-3","dept":"17","canton":"Chatelaillon","commune":"Salles sur mer","nom":"Salles_sur_Mer_2","type":"Château","periode":"XVI","histoire":"l'HERBAUDIERE, la seigneurerie de lHerbaudière ne remonte sans doute pas au delà de 1539. Dès 1557, Pierre Salbert, pair et échevin de La Rochelle est qualifié sieur de lHerbaudière. A la fin du XVIe siècle Elisabeth Salbert apporta la terre à son mari, René Blandin. Une gravure de Claude Chatillon réalisée au début du XVIIe et un dessin complet de lingénieur Claude François Masse au début du XVIIIe siècle permet de cerner lévolution.  LHerbaudière a subi quelques transformations par rapport a ses origines; les douves notamment ont été comblées avec les pierres des remparts du château.                            MONTAGNE la JEUNE, pas d'information historique.","architecture":"HERBAUDIERE, petite gentilhommière bâtie au XVIe siècle, sans doute sur un site féodal. Les percements ont été faits ou refaits au cours du XVIIIe siècle. Au sud, le corps de bâtiment principal est flanqué d'une tour. La façade nord est formée de deux petits pavillons qui, autrefois, bordaient une petite cour. Pour agrandir le logement, un petit bâtiment a été construit, reliant les deux pavillons. A l'intérieur, un salon boisé a été refait au début du XXe siècle sur le modèle des boiseries existant au XVIIe.                                                                                  MONTAGNE la JEUNE, la cour dhonneur sorganise autour dun pavillon central présentant un décor végétal de style Louis XVI et  encadrée par deux ailes de dépendances. Au début du XXe siècle, cet espace était largement arboré et comportait un parterre central planté de palmiers.","habitants":"Herbaudière famille de Pierre Salbert                          Montagne\r\n        \"","divers":"Château de l'Herbaudière et de Montagne grav-3 à Salles sur mer 46° 06' 19\" nord, 1° 03' 14\" ouest","gps":"","images":["../image/image_17/17_Salles_sur_Mer_2_1.jpg","../image/image_17/17_Salles_sur_Mer_2_2.jpg","../image/image_17/17_Salles_sur_Mer_2_3.jpg"]},"Consult_chateau_formulairec37d":{"id":"Consult_chateau_formulairec37d","dept":"17","canton":"Thonay-Charente","commune":"Soubise","nom":"Soubise","type":"Château","periode":"XVII","histoire":"SOUBISE, la châtellenie appartint à la Seigneurie de Châtelaillon, puis aux Comtes de Poitiers, avant de passer, par Aliénor dAquitaine, au Roi de France, puis au Roi dAngleterre. Pendant la guerre de cents-ans, le château changea plusieurs fois de mains et même trois fois dans une même journée dAout 1372 où Jean de Grailly, dit le Captal de Buck, lun des meilleurs capitaines du Prince Noir, y fut capturé par des gens de Dugesclin.  En 1575, Catherine de Parthenay, dernière héritière de la branche cadette de la famille de Parthenay apporte la seigneurie de Soubise en dot lors de son mariage avec René II de Rohan. C'est elle qui fit construire au début du XVIIe siècle ce bel hôtel qui se trouve en face de léglise. Elle est huguenotte, et, en 1627, elle et son fils Benjamin de Rohan seigneur de Soubise jouent un rôle dans le siège de La Rochelle (1627-1628). L'hôtel de la seigneurie de Soubise est acheté par le roi Louis XIV en 1690 qui le met en 1691 à disposition des surs de saint Vincent de Paul pour y installer un hospice en 1696.    Charles de Rohan-Soubise de 1715 à 1787, dit le maréchal de Soubise. Ainsi il sera l'hospice de Soubise pendant un siècle. Après la Révolution il est durant 180 ans l'école publique de la commune, puis à partir de 1982, l'hôtel de ville. \r\nL'hôtel a été inscrit au M.H. le 8 décembre 1928.","architecture":"SOUBISE, le château domina son éperon rocheux jusquen 1844, où un deuxième incendie le détruisit. Il ne faut pas manquer dadmirer son imposante façade, son mur sculpté, son escalier de pierre, dont le mur déchiffre est typique de cette époque et la très belle cheminée du bureau du maire.\r\nLe corps de logis, qui date du XVIIe siècle, est un bâtiment rectangulaire à étages, surmonté d'une toiture de tuiles canal avec cinq lucarnes ornées de frontons sculptés. Celle du centre à fronton triangulaire est plus haute que les quatre autres à fronton arrondi, mais toutes sont surmontées d'acrotères. La porte est ornée et surmontée d'un arc brisé.","habitants":"Famille de Parthenay\r\n        \"","divers":"Hôtel de Rohan à soubise 45° 55' 34\" nord, 1° 00' 28\" ouest","gps":"","images":["../image/image_17/17_Soubise_1.jpg","../image/image_17/17_Soubise_2.jpg","../image/image_17/17_Soubise_3.jpg"]},"Consult_chateau_formulaire6e17-2":{"id":"Consult_chateau_formulaire6e17-2","dept":"17","canton":"La Jarrie","commune":"Saint-Christophe","nom":"St_Christophe","type":"Château","periode":"XVII","histoire":"ST-CHRISTOPHE, le château de Saint-Christophe,   Charles François Michel César Le Tellier, seigneur de Montmirail, marquis de Cusy arrière-petit-fils du marquis de Louvois, ministre de Louis XIV. Billaud-Varenne député de la convention. Famille Chertemps seigneurs de Saint Christophe. Le 12 Juin 1680 suite à une vente aux enchères Pierre Chertemps de Seuil devint  seigneur de St Christophe. A la Révolution la famille  a émigré et le château fut détruit en 1793.  Les terres et dépendances furent vendues à la marquise de Montmirail qui revendit ses propriétés aux frères Michelin.  Le 5 Novembre 1820 Etienne Benjamin Michelin et son frère Isaac négociants à Mauzé sur le Mignon devinrent propriétaires.  Le 4 Octobre 1822 les deux frères Michelin procèdent au partage de leurs biens et la propriété de Saint Christophe est attribuée à Etienne Michelin. Le 14 Avril 1852 Etienne Michelin a fait une donation partage et les propriétés de Saint-Christophe furent attribuées à la baronne de Nagle. Le château actuel a été reconstruit en 1860 par les époux de Nagle.","architecture":"ST-CHRISTOPHE, château dans la maison du gardien ... Vous serez conquis par une décoration chaleureuse, un endroit confortable. Sur une propriété de 10 000 m2 vous pourrez vous laisser tenter par un moment calme de lecture au pied d'un arbre. L'édifice de plan rectangulaire à huit travées  sur deux niveaux sous un toits brisés avec  deux  lucarnes en façade.","habitants":"Famille Chertemps\r\n        \"","divers":"Châteaude saint-Christophe et de Banner grav-3","gps":"","images":["../image/image_17/17_St_Christophe_1.jpg","../image/image_17/17_St_Christophe_2.jpg","../image/image_17/17_St_Christophe_3.jpg"]},"Consult_chateau_formulaire7e4a":{"id":"Consult_chateau_formulaire7e4a","dept":"17","canton":"Pons","commune":"Saint-Dizant du Gua","nom":"St_Dizant_du_Gua","type":"Château","periode":"XVII-XVIII","histoire":"ROMANEAU et PIBLE,   Beaulon parmi lesquels François-Théodore de Nesmond qui, en 1635, accroît son pouvoir seigneurial en achetant le droit de haute justice. Le château de Beaulon, qui sert au XVIIe siècle de résidence dété à lévêque de Bordeaux, incarne cette autorité seigneuriale qui doit cependant composer avec un autre fief, celui de Romaneau, au sud du bourg. À partir du XVIe siècle, Saint-Dizant néchappe pas à la forte diffusion du protestantisme dans la région. Les idées protestantes semblent séduire une partie de ses élites entre 1702 et 1704, deux jeunes filles issues de la famille. Lorigine de la seigneurie du Pible est encore mal connue. En 1567, Jean le Forestier époux de Jeanne de Saint Martin, écuyer, seigneur dOrignac, de Lassac,  de Saulge, létait aussi  de Saint-Dizant du Gua et du Pible. Par la suite, les seigneurs de Romaneau se prétendent seigneur du Pible, mais le domaine appartenait dès la première partie du XVII siècle à Jean Morineau, sieur du Pible, époux dAnne de Rochefort.\r\nCette maison, habitée au début du XVIII e siècle par François de Gonde, seigneur de Romaneau, fut bâtie à cette époque, aux environs de 1760 par larchitecte Macaire, le même qui refît de 1761 à 1764 léglise de Saint-Dizant du Gua pour monsieur Bonniot seigneurs des Essarts qui fut anobli par Louis XIV en 1760. Cest le même Macaire qui bâtît également Romaneau, le style de ces deux maisons étant analogue,","architecture":"PIBLE, Beaulon et de Romaneau restent catholiques, ceux du Pible, en particulier la famille Bonniot, au XVIIIe siècle, ne cachent pas leur préférence pour la réforme  bien que le Pible présente une plateforme avec colonnade à litalienne. En traversant le porche, on aboutit à la basse  cour à langle de la clôture de laquelle se trouvait  un pigeonnier, démoli depuis, et qui ressemblait, par ses alvéoles et son échelle à la périphérie intérieure, mobile sur une poutre centrale, à celui de Panloy. Au bas de la propriété coule le Taillon qui va se jeter dans la Gironde à Port Maubert et dont le cours est bordé de peupliers, doù le nom de « PIBLE », que lon plantait à la naissance d une fille pour lui constituer une dot à vingt ans, dot composée également d un tierçon d eau de vie soigneusement surveillée et maintenue à niveau.","habitants":"Famille de  Jean Morineau\r\n        \"","divers":"Château de Romaneau  grav 1-2 et de Pible grav -3  à St-Dizant du Gua","gps":"","images":["../image/image_17/17_St_Dizant_du_Gua_1.jpg","../image/image_17/17_St_Dizant_du_Gua_2.jpg","../image/image_17/17_St_Dizant_du_Gua_3.jpg"]},"Consult_chateau_formulaire2083":{"id":"Consult_chateau_formulaire2083","dept":"17","canton":"Marennes","commune":"Saint-Jean d","nom":"St_Jean_Angle","type":"Forteresse","periode":"XII-XIII-XIV","histoire":"ST-JEAN-D'ANGLE, le fief est cité dans les premières années du XIIe siècle, avec Foucher de Saint-Jean-d'Angle. Au XIVe siècle apparaît Johan de Remont, chevalier de Saint-Jean-d'Angle. En 1406, la forteresse est apportée en dot par Yolande de Bouchard à son époux Charles de Saint-Gelais dont la famille relèvera le nom des Lusignan ; elle y demeurera durant six générations. Au XVIIe siècle, Charlotte de Saint Gelais-Lusignan apportera le domaine à son époux Guy-Philippe de Salins de La Fin ; elle fera réparer et agrandir le château en 1624, comme l'indique une inscription gravée sur une bretèche-latrine, près de ses armoiries placée sous une sirène (Mélusine). A sa mort, le 4 avril 1652, le domaine passa entre les mains de coseigneurs, dont Jacques Dupuy de Tournon (+ 1715). Sa fille Louise de Pontevès vendra la forteresse, le 24 août 1729, à Pierre de Verthamon. Jean-Baptiste de Verthamon la cèdera à son tour,  au cartographe du Roi, Jean-Jacques Isle de Ballode du 1747 à 1803, dernier seigneur de Saint-Jean-d'Angle, qui achète à cette occasion la ville de Saint-Symphorien. Le domaine reviendra à son neveu Louis-Henry Isle de Beaucheine  du 1777 à 1870, seigneur de Malvillars, époux de Marie-Pauline Aubert de Boumois, le 8 janvier 1818, à Pierre Beau. Le domaine passa ensuite aux familles Herbout, de Lestrange, Latreuille, Fougère, Lacour qui le cèdera à Alain Rousselot ; celui-ci entreprit une sérieuse restauration des bâtiments. Le château est classé aux M.H.  depuis le 21 mars 1994.","architecture":"ST-JEAN-D'ANGLE, est un château fort très primitif construit au XII-XIIIe siècle sur le modèle dit du shell keep. Il a subit plusieurs sièges pendant la guerre de cent ans, les murs d'enceinte toujours entourés de douves, la belle tour qui protège l'entrée forment un beau spécimen  d'architecture militaire et a reçu le Grand Prix des Vieilles maisons françaises et le Prix Europa Nostra pour la qualité de sa restauration. Il tient son nom de la commune de Saint Jean d'Angle où il se situe.","habitants":"Famille de  Johan de Remont\r\n        \"","divers":"Fort de St-Jean d'Angle 45° 49' 14\" nord, 0° 57' 03\" ouest1","gps":"","images":["../image/image_17/17_St_Jean_Angle_1.jpg","../image/image_17/17_St_Jean_Angle_2.jpg","../image/image_17/17_St_Jean_Angle_3.jpg","../image/image_17/17_St_Jean_Angle_4.jpg","../image/image_17/17_St_Jean_Angle_5.jpg","../image/image_17/17_St_Jean_Angle_6.jpg","../image/image_17/17_St_Jean_Angle_7.jpg","../image/image_17/17_St_Jean_Angle_8.jpg"]},"Consult_chateau_formulaireddb6-2":{"id":"Consult_chateau_formulaireddb6-2","dept":"17","canton":"Saint-Jean d","commune":"Saint-Jean d","nom":"St_Jean_Angély","type":"Patrimoine","periode":"XVI-XVIII","histoire":"St-JEAN d'ANGELY, le musée des Cordeliers est situé dans l'ancien hôtel de la sous-préfecture du XIXe siècle ouvert en 2003. Il contient les souvenirs des expéditions Citroën : première traversée du Sahara en automobile  en 1922,  la croisière noire  en 1924, expédition en Centre-Afrique, légués par l'Angérien d'origine Louis Audouin-Dubreuil, un des deux chefs de l'expédition Citroën, et par Maurice Penaud, chef mécanicien. Parmi de nombreux objets africains se trouve la vedette du musée, le  croissant d'Argent , la première voiture.\r\nSalle Aliénor-d'Aquitaine, ancien marché couvert construit en 1805 à partir d'éléments de pierres déposés du cloître XVIIe de l'abbaye royale.\r\nHÔTEL de VILLE, bâti entre 1882 et 1884, il est de style néo-renaissance. Le projet est de Charles-François Bunel (1848-1926). Dans le hall, deux niches présentent des statues de Carlo Nicoli  Manfredi (XIXe siècle) et de Léon Pilet (mort en 1916).","architecture":"Musée des cordeliers, le bâtiment contient également des collections d'arts décoratifs, de sculptures religieuses, d'armes blanches et à feu européennes, de mobilier régional et accueille des expositions temporaires.                                                        \r\nLe BEFFROI, bâti par le corps de ville entre 1406 et 1410, sa cloche date du XVIIIe. Il présente une haute toiture d'ardoise (1764), et il est orné d'une représentation de l'archange saint Michel. À côté se trouve l'ancienne façade très détériorée de l'échevinage. \r\nLa tour de lHorloge est un monument historique classé par arrêté du 25 avril 189240. \r\n Salle Aliénor-d'Aquitaine; Ancien marché couvert construit en 1805. En 1903, on combla les arcs de la façade par une maçonnerie similaire et on transforma l'édifice en salle des fêtes. Le ravalement récent des façades est venu donner un éclat supplémentaire à cet édifice.                                                                               Hôtel de ville;  la salle des fêtes présente une belle cheminée ornée du blason de la ville. Le plan d'ensemble, comprenant un grand escalier d'honneur et une salle des fêtes, est proche de celui des hôtels de ville de Niort et de Poitiers.","habitants":"Louis Audouin-Dubreuil\r\n        \"","divers":"A st-Jean d'Angély l'hôtel de ville, le musée Cordeliers grav-2 et la salle Aliénor grav 3  St-Saviniens grav -4","gps":"","images":["../image/image_17/17_St_Jean_Ang%c3%a9ly_1.jpg","../image/image_17/17_St_Jean_Ang%c3%a9ly_2.jpg","../image/image_17/17_St_Jean_Ang%c3%a9ly_3.jpg","../image/image_17/17_St_Jean_Ang%c3%a9ly_4.jpg"]},"Consult_chateau_formulairebaf7":{"id":"Consult_chateau_formulairebaf7","dept":"17","canton":"Archiac","commune":"Saint-Maigrin","nom":"St_Maigrin","type":"Château","periode":"XIX","histoire":"SAINT-MAIGRIN, en 1790, par ordre du représentant du peuple, la municipalité de Saint-Maigrin invite les propriétaires de biens-fonds, à ensemencer toutes les terres et projette dassécher le Grand Étang et de le mettre en culture. Les tentatives ne furent abandonnées que devant limpossibilité de réussir. Le 14 floréal, an III, de la République, Jacques Lallis, tailleur de pierre, se rend acquéreur du château et de ses dépendances, pour le démolir, son lot est distribué en sept parts.  Après les seigneurs de Saint Maigrin, le domaine et les étangs ont appartenu à Mr De Raisme, puis à la famille de Lestrange, enfin en 1869 à Mr et Mme Martell.\r\nM. Edouard Martell, descendant des fondateurs et chef de la maison bien connue de Cognac, En 1824, la terre de Saint-Maigrin appartenait à Mme de Quélen de La Vauguyon, alors princesse de Carignan, et bien des pièces, acquises de la Nation, avaient été rachetées par elle. En 1827, M. le duc de La Vauguyon père avait acquis, avec des terres et prés, le fossé y attenant et qui sert à lécoulement de leau du Grand-Étang par le déversoir, qui avaient été séquestrés sur la tête de M. le duc de La Vauguyon, lors émigré. Cest en  1860 et 1861 que le Vicome Frédéric de Lestrange fit bâtir ce gracieux château, avec tourelles, mélange des styles du XIIIe siècle et de la Renaissance. Après avoir acquis la terre de Saint-Maigrin, en 1869, M. Edouard Martell, alors député de la Charente, puis sénateur, .","architecture":"Saint-MAIGRIN, avec sa façade néogothique, ses quatre niveaux, a fière allure. En 1869, monsieur Edouard Martell fit entreprendre ladjonction à cette première partie du château dune construction de même dimension qui finit par donner à lensemble de larchitecture laspect à la fois gracieux, fort élégant et sévère dun château Renaissance.","habitants":"Famille de Lestrange\r\n        \"","divers":"Château de Saint-Maigrin","gps":"","images":["../image/image_17/17_St_Maigrin_1.jpg","../image/image_17/17_St_Maigrin_2.jpg","../image/image_17/17_St_Maigrin_3.jpg","../image/image_17/17_St_Maigrin_4.jpg","../image/image_17/17_St_Maigrin_5.jpg"]},"Consult_chateau_formulaireff0b":{"id":"Consult_chateau_formulaireff0b","dept":"17","canton":"Saint-Martin de Ré","commune":"Saint-Martin de Ré","nom":"St_Martin_de_Ré","type":"Citadelle","periode":"XVII","histoire":"CITADELLE Une première citadelle est construite en 1625 qui fut détruite en 1628. Ferry de 1681 jusqu'à la fin du XVIIe siècle, à la suite du siège de La Rochelle. Elle protège la Rochelle et Rochefort des invasions anglaises.  Elle est reconstruite par Vauban et François. Au XVIIIe siècle, on reconstruit les ponts d'accès. Au XXe siècle, on construit des bâtiments pour les prisonniers.  La citadelle de Saint-Martin-de-Ré est un ouvrage militaire édifié de 1690 afin de protéger l'île de Ré. Elle est l'un des principaux M.H. de la ville de Saint-Martin-de-Ré,  En 1873 elle fut transformée en dépôt pour le regroupement des prisonniers destinés à être envoyés aux bagnes et fut pendant 65 ans de 1873 à 1938, l'unique point de regroupement des condamnés aux travaux forcés, avant leur départ, par bateau, la Loire, ou le Martinière, vers le bagne de la Guyane française ou le bagne de Nouvelle-Calédonie. La citadelle et les fortifications de Saint-Martin-de-Ré sont classés au titre des M.H. par arrêté du 20 mars 1984.  Louis-Joseph des Escotais, comte de Chantilly, fut le dernier gouverneur militaire de l'île (1775 à 1790)                                                                                                     TOUR des BALEINES, est construite sur ordre de Colbert daprès un programme établi par Vauban pour servir avec le phare de Chassiron, de protection avancée au tout nouvel arsenal de Rochefort créé en 1666.  Ce tout premier phare des Baleines est construit sur des plans dessinés par Augier en 1669. Cest une tour en pierres de taille provenant des carrières de la région de Saint-Savinien. Lédifice a 3 étages avec chacun une pièce à laquelle on peut accéder par un escalier à vis situé sur un côté du bâtiment.","architecture":"La CITADELLE, lenceinte urbaine, unique par ses dimensions, un demi-cercle de 1,5 kilomètres de rayon et de 14 kilomètres de rempart, est réalisée dun seul jet sans contraintes géographiques liées au site.\r\n La citadelle,présente un carré parfait, nest accessible que par une seule porte dentrée monumentale, ouvrant sur un petit port retranché. Des bâtiments intérieurs, prévus pour 1200 hommes, subsiste une caserne, la chapelle, larsenal, les souterrains des bastions et le pavillon dofficier. Conservée intacte dans son écrin de glacis non urbanisé, Saint-Martin-de-Ré est la plus belle application conservée du premier système de Vauban et sûrement le plus bel exemple dun réduit insulaire. Jadis place militaire puissante et port actif, Saint-Martin-de-Ré est devenue une charmante cité aux rues étroites et paisibles. La place forte Vauban, exemple de réduit insulaire, est classée depuis le 7 juillet 2008 au patrimoine mondial de l'UNESCO. Cette candidature a été soutenue au niveau local par l'Étoile de Vauban, une association présidée par le comédien Charles Berling.","habitants":"Vauban et Colbert\r\n        \"","divers":"Citadelle de saint-Martin de Ré 46° 12' 20\" nord, 1° 21' 31\" ouest .                                                                  Tour des Baleines grav-6","gps":"","images":["../image/image_17/17_St_Martin_de_R%c3%a9_1.jpg","../image/image_17/17_St_Martin_de_R%c3%a9_2.jpg","../image/image_17/17_St_Martin_de_R%c3%a9_3.jpg","../image/image_17/17_St_Martin_de_R%c3%a9_4.jpg","../image/image_17/17_St_Martin_de_R%c3%a9_5.jpg","../image/image_17/17_St_Martin_de_R%c3%a9_6.jpg"]},"Consult_chateau_formulaire315c":{"id":"Consult_chateau_formulaire315c","dept":"17","canton":"Pons","commune":"Pons","nom":"St_Maury","type":"Château","periode":"XV","histoire":"St-MAURY, château ancien de la famille d'Aubigné de Surimeau, poète et gentilhomme protestant, né le 8 février 1552 au château de Saint Maury à Pons, décédé à Genève le 29 avril 1630. Père de Constant (vers 1585 - 1647) et surtout grand père de madame de Maintenon. Son père, qui se nommait Jean d'Aubigné, juge à Pons en Saintonge, était un homme remarquablement cultivé, un helléniste qui fera donner à son fils une instruction approfondie. Sa mère, Catherine de l'Estang meurt en lui donnant le jour, d'où son prénom d'Agrippa, actuellement hôtel de Ville.\r\nPONS, n'est aujourd'hui qu'un chef-lieu de canton de l'arrondissement de Saintes ; il ne reste plus du château de la Sirauté que le donjon, grosse tour carrée servant de prison; la ville s'étend dans un vallon riant, sur la rive gauche de la Seugne.                             EGRETAUX, dit château d'Usson (voir article) patrimoine classé, étudié ou inscrit dit  château des Egreteaux, dit château d'Usson  à  Pons (charente maritime ).\r\nChâteau du FA (ancien) vestiges.","architecture":"St-MAURY, la seigneurie  de Pons, riche, a été fort importante et a joué maintes fois un rôle dans l'histoire. De l'ancien castrum rasé par Louis XIII en 1621, il ne reste que quelques tours et quelques pans de murailles de l'enceinte fortifiée et le donjon roman parallélogramme, large de 25 m. sur son plus grand côté et de 15 m. seulement sur son plus petit; son élévation totale est de 27 m. La chapelle du château, devenue propriété particulière, sert de magasin à bois; elle a conservé sa façade du XIIe siècle et présente un vaste portail à cinq voussures décorées avec une grande richesse et une grande profusion de détails : l'une de ces voussures est occupée par une série de têtes de buf.","habitants":"Famille d'Aubigné de Surimeau\r\n        \"","divers":"Château de St-Maury hôtel de ville et les vestiges du château de Fa","gps":"","images":["../image/image_17/17_St_Maury_1.jpg","../image/image_17/17_St_Maury_2.jpg"]},"Consult_chateau_formulaire6c60":{"id":"Consult_chateau_formulaire6c60","dept":"17","canton":"Chaniers","commune":"Saint-Sauvant","nom":"St_Sauvant","type":"Tour","periode":"XI-XII-XIV","histoire":"TOUR SAINT-SAUVANT, au 1er siècle, pour surveiller la voie Romaine entre Saintes et Clermont Ferrant, un poste fortifié est élevé et aménagé. Au XIIe siècle, un \"château fort\" est construit  pour surveiller la vallée de la rivière Coran. Au XIVe siècle, durant la guerre de cent ans, le \"château\" est détruit.  Au XXIe siècle, la découverte de l'extérieur est libre et gratuite. La visite de l'intérieur est interdite.","architecture":"TOUR SAINT-SAUVANT, il pourrait s'agir de l'unique vestige d'un château-fort ou encore des restes d'une enceinte urbaine. La tour carrée n'est point construite sur la falaise mais appuyée contre elle. C'est assez surprenant pour une tour défensive dont le château fort  devait être posé sur le plateau supérieur. A moins que sa fonction ait été un poste avancé, pour protéger la falaise du travail des sapeurs. Au sommet, les merlons  du crénelage sont borgnes, cela signifierait que la tour date du XIIe siècle et n'a point été remaniée. L'absence de mâchicoulis confirmerait ma datation du XIIe siècle. La tour de Saint-Sauvant, propriété de la commune, a été classée au M.H. le 24 octobre 1914. Haut donjon carré de style roman au centre du village. Le site fortifié est décrit parfois comme les vestiges d'un château fort, mais  il est considéré comme les restes d'un rempart du bourg fortifié. Toutes les villes médiévales ne furent pas entourées de remparts, beaucoup ne le furent entièrement quaprès 1340, sous leffet de la guerre de cent ans. A linverse, de nombreux villages furent fortifiés.  Et pourtant la muraille fut lélément le plus important de la réalité physique et symbolique des villes médiévales.","habitants":"Seigneur locaux\r\n        \"","divers":"St-Sauvant 45° 44' 22\" nord, 0° 30' 18\" ouest2","gps":"","images":["../image/image_17/17_St_Sauvant_1.jpg","../image/image_17/17_St_Sauvant_2.jpg","../image/image_17/17_St_Sauvant_3.jpg"]},"Consult_chateau_formulairec583":{"id":"Consult_chateau_formulairec583","dept":"17","canton":"Saint-Jean d","commune":"Saint-Saviniens","nom":"St_Saviniens","type":"Château","periode":"XIII-XVI","histoire":"La CAVE, en 1521 Guy d'Estuer céda son château de La Cave à son neveu Jean III Isle de La Matassière, époux de Bonnaventure de Mortagne, le passa le 17 juin 1556, a son fils François  sa fille Charlotte devint dame de La Cave, puis le fief passa à son fils Jean IV Isle des Groies, époux de Marie Guichard avec qui il vécut, le 24 juillet 1630, donnant son château à son fils aîné Daniel Isle ; celui-ci y vécut à son tour, le 5 janvier 1661. Le fils de ce dernier, Claude Isle, hérita le fief et épousa Jacquette de Marbeuf qui décéda à La Cave, le 5 mars 1680, car le domaine passera à leurs cousins Daniel de Laval, qui en sera coseigneur, et Louis de Siorac qui en rend hommage au prince Guillaume de La Trémoille, le 6 juin 1723. La Cave passera à Pierre Mesliand, seigneur de Saint-Savinien, à Jean de La Marthonie, et à François d'Aignières. Ce dernier le cèdera en 1761 à Vincent-Guillaume-Gaspard Torchebeuf. Passa à Le Comte (1724-1790). Puis il sera la propriété des familles Favin-Lévêque et de Clédat.\r\nFORGETTES, en 1545, Jeanne Germain apporte le fief de Forgettes  en mariage à Louis du Chesne. Leur fille Marguerite épouse en 1556 François Isle de la Matassière. Le fief reviendra en 1578 à leur fils Pierre Isle, seigneur de Loire, Quincé, etc, époux de Noémie Conte, dame de Loire, puis en 1599 à son frère Daniel Isle, seigneur de L'Isleau, époux de Marie Esneau,  Forgettes reviendra à leur fille Léa qui l'apportera à son époux René de Marbeuf, lesquels eurent une fille Jacquette de Marbeuf qui épousera son cousin Claude Isle des Groies, seigneur de La Cave  au logis noble de Forgette, le 9 août 1656.","architecture":"CAVE, dont les origines remontent au XIIIe siècle, fut longtemps la principale forteresse de la cité, variante locale du terme « Puy », il conserve une tour avec sa poivrière, trois tours découronnées et une échauguette. Forteresse importante durant la guerre de cent ans, lorsque la Charente formait la frontière entre les possessions françaises et anglaises, il passa successivement entre les mains des deux partis, avant de revenir au comte de Taillebourg. Il fut transformé en résidence d'agrément à partir du XVIe siècle : dès cette époque, les murs d'enceinte furent abaissés et les tours découronnées, tandis qu'une partie du logis était reconstruit.                                                 FORGETTES, après la mort de Claude Isle, Jacquette épousera Jean-Louis de Malsac qui deviendra seigneur de Forgettes ; veuf, ce dernier épouse Marguerite Béraudin, héritière du domaine qui passera tour à tour aux familles de Menou, de Lalié, de Luchet, de Ponthieu qui le gardera jusqu'à la Révolution, puis aux Desprès d'Ambreuil et de Laage de Meux : Théophile de Laage de Meux (1833-1922), conseiller général de Saint-Savinien, en sera propriétaire.","habitants":"La Cave,Famille deGuy d'Estuer                               Forgettes famille de Louis du Chesne\r\n        \"","divers":"Château de Saint- Savinien et le château de la Cave grav  3-4","gps":"","images":["../image/image_17/17_St_Saviniens_1.jpg","../image/image_17/17_St_Saviniens_2.jpg","../image/image_17/17_St_Saviniens_3.jpg","../image/image_17/17_St_Saviniens_4.jpg"]},"Consult_chateau_formulaire8e6b":{"id":"Consult_chateau_formulaire8e6b","dept":"17","canton":"Jonzac","commune":"Saint-Simon de Bordes","nom":"St_Simon_Bordes","type":"Château","periode":"XVIII-XIX","histoire":"ST-SIMON,  appartenait en 1524 à Nicolas Arnoul, conseiller au parlement de Bordeaux, passa à son fils aîné, puis à sa mort sans postérité, à ses deux frères : Bertrand, Seigneur de Nieul le Virouil, et André, seigneur de Vignolles, puis de Saint-Simon, de Vaumondois. En partie, marié à Lucrèce Echallard qui lui donna deux fils : André et Jonathan.  Dans les années 1770 c'est Auguste Poussard  seigneur, sa fille Louise, Françoise, Jeanne, Marie Poussard du Vigean épouse le Marquis du Chilleau. qui fait bâtir en 1775 le château suivant les plans de l'architecte Louis, à son emplacement actuel. Ce dernier venait de réaliser le grand théâtre de Bordeaux. Son fils, Charles Marie, chevalier dAirvault, fut gouverneur de Saint-Domingue en 1788. N'ayant pas émigré au moment de la Révolution, il est arrêté le 21 Décembre 1793, enfermé à Brouage, il décède au début de l'année 1794. Le château est alors vendu comme bien national. Le 1er Thermidor de l'an XII, le tribunal de Jonzac l'attribue à Sieur Dauvin qui le cède à un certain Péligrino. En 1812, Jacques Julien Blanc Fontenille, avocat et maire de Jonzac, lachète. En 1832, ce dernier le revend au Baron de Lajus, député en 1849. Il fut maire de Saint-Simon. C'est le comte Pierre Marie Louis Ernest de Vallée qui en hérite en 1862, ayant épousé la fille de monsieur de Lajus Marie Françoise, Caroline Laure. Il fut maire de Saint-Simon. Le 29 décembre 1869, la baronne de Dampierre, née Naïs Panon Desbassayns de Richemont, veuve de Guillaume Louis Roger de Dampierre, l'achète.","architecture":"Ce dernier était premier secrétaire d'ambassade à Lisbonnes. Elle le lègue à son fils aîné, le baron Roger Charles Eugène de Dampierre qui vient d'épouser une Mexicaine : Mademoiselle Etchegueren. A l'écart dans le parc, fut bâtie une chapelle gothique vers 1860-1880. Dans la nuit du 28 au 29 septembre 1889, un incendie causé croit-on par une imprudence détruisit  le château, il venait d'être entièrement restauré. Le château était alors une petite place forte, qui joua un rôle certain durant les guerres de Religion. Son emplacement reste hypothétique.  Il fut reconstruit à l'identique à l'exception des toitures et de certaines fenêtres. René Aymard de Dampierre, en hérite à la mort de son père en 1935. Il épouse Suzanne Véron, une princesse d'origine Roumaine. Il décède en 1949, elle décède en 1975. Ils n'eurent pas d'enfant. Sa sur, Marie Conception, Françoise, Naîs, Rita de Dampierre n'a pas d'héritier non plus.  C'est le vicomte Jean de Richemont qui en hérite, il le donne à son fils Yves. Vendu aux enchères à la fin de l'année 1999, il est acheté par une société américaine et géré par monsieur Richard Postrel. L'édifice  de plan rectangulaire à deux niveaux, trois avec la série de lucarnes sur combles brisés et plat au dessus, avant corps central à toit impérial  et deux pavillons droit et gauche dans le même style recouvert d'ardoise, prolongé à droite et à gauche par  des dépendances d'un niveau.","habitants":"Famille d'Auguste Poussard\r\n        \"","divers":"Château st- Simon à Bordes","gps":"","images":["../image/image_17/17_St_Simon_Bordes_1.jpg","../image/image_17/17_St_Simon_Bordes_2.jpg"]},"Consult_chateau_formulaire8a85":{"id":"Consult_chateau_formulaire8a85","dept":"17","canton":"Surgères","commune":"Surgères","nom":"Surgères_Rouarderie","type":"Forteresse","periode":"XVI","histoire":"Au Sud -Est à une vingtaine de KM à Bernay Saint-Martin  le manoir de la Rouarderie.              SURGERES, la construction date du Xe au XVIe siècle, est aussi inscrit dans la route historique des trésors de Saintonge, qui est un circuit de découverte des plus beaux monuments de la Saintonge. Les Maingot sont les premiers seigneurs à habiter ce logis, ils jouent un rôle politique important tout au long de leur domination.                                       ROUARDERIE, appartenant à la même famille depuis 1830, transformé en logis de France.","architecture":"SURGERES, la construction  au XVIe siècle. Il date du Moyen-Age. Son style est Renaissance. Ce remarquable édifice religieux est situé à l'intérieur de l'enceinte médiévale et offre une spectaculaire façade longue de 23 mètres, ornée du pur style saintongeais roman. Alors que cette magnifique façade menaçait de tomber en ruine, elle a été sauvée d'une destruction certaine, grâce à l'intervention énergique de Prosper Mérimée en 1841. La façade du château a été classée aux M.H. au même titre que les différents bâtiments civils situés à l'intérieur de l'enceinte fortifiée du château de Surgères datent du XVIe siècle a un développement semi-circulaire de 600 mètres de longueur, entourée de douves à l'origine, comptait 24 tours identiques à celle de la « Tour Hélène »  dissemblables et  inscrite au M.H.  depuis 1925. Avec la tour isolée dans les jardins de la mairie et la porte Renaissance, les remparts constituent les restes de l'ancien château.                                                 ROUARDERIE élégante demeure typiquement charentaise est située à l'extrémité du village de Saint-Martin de la Coudre.","habitants":"Famille des Maingot\r\n        \"","divers":"Surgères grav de 1 à  46° 06' 23\" Nord et 0° 44' 58\" Ouest                                                                   Rouarderie 46° 03' 55\" nord, 0° 37' 09\" ouest","gps":"","images":["../image/image_17/17_Surg%c3%a8res_Rouarderie_1.jpg","../image/image_17/17_Surg%c3%a8res_Rouarderie_2.jpg","../image/image_17/17_Surg%c3%a8res_Rouarderie_3.jpg","../image/image_17/17_Surg%c3%a8res_Rouarderie_4.jpg","../image/image_17/17_Surg%c3%a8res_Rouarderie_5.jpg","../image/image_17/17_Surg%c3%a8res_Rouarderie_6.jpg","../image/image_17/17_Surg%c3%a8res_Rouarderie_7.jpg","../image/image_17/17_Surg%c3%a8res_Rouarderie_8.jpg","../image/image_17/17_Surg%c3%a8res_Rouarderie_9.jpg"]},"Consult_chateau_formulaire7b24":{"id":"Consult_chateau_formulaire7b24","dept":"17","canton":"Saint-Jean d","commune":"Taillebourg","nom":"Taillebourg","type":"Vestiges","periode":"XIV","histoire":"TAILLEBOURG, c'est le lieu de la bataille de Taillebourg en 1242 entre saint Louis et Henri III d'Angleterre C'est un comté dès le XVe siècle dont l'histoire est bien connue par les archives de la maison de La Trémouille. La forteresse a été rebâtie après 1423 par Henri de Pluqualec. Elle fut ensuite la résidence favorite des Coëtivy, et Louise de Coëtivy l'apporta en dot à Charles de La Trémouille en 1501. Le château qui avait traversé tous les sièges durant la guerre de cent ans et les guerres de religion a été pris et détruit pendant la Fronde en 1652. Frédéric-Guillaume de La Trémouille, duc de Talmont, entreprend d'énormes travaux de reconstruction à partir de 1714. Mais durant la Révolution, le château est vendu en lots comme bien national. Ayant souffert de manque d'entretien, il fut victime d'un incendie en 1822 et détruit. Propriété de la commune. A peu de distance au sud à St-James l'hôtel de ville est un magnifique chateau.","architecture":"TAILLEBOURG, ce château est d'abord une puissante forteresse, puis résidence gothique et enfin le plus important château de Saintonge au XVIIIe siècle. \r\nLe château, avec sa terrasse construit entre 1717 et 1739, était un grand corps de bâtiment en U flanqué de deux pavillons couverts de toitures d'ardoise à brisis.  Du XVe siècle, il ne reste que la tour médiévale, les terrasses et les caves. Les restes des fortifications classées, comportent les murs de soutènement les fossés et les ponts. Deux ailes des dépendances du XVIIIe siècle sont devenues des résidences particulières. Il est classé par arrêté du 10 mars 1995 pour ses fortifications, alors que les vestiges du château ont été inscrits le 8 mars 1991.","habitants":"Frédéric-Guillaume de La Trémouille\r\n        \"","divers":"Vestiges grav de3 à 8    Taillebourg 45° 50' 06\" nord, 0° 38' 49\" ouest                                                        Mairie st-James  grav-1 Mairie                                  taillebourg grav2","gps":"","images":["../image/image_17/17_Taillebourg_1.jpg","../image/image_17/17_Taillebourg_2.jpg","../image/image_17/17_Taillebourg_3.jpg","../image/image_17/17_Taillebourg_4.jpg","../image/image_17/17_Taillebourg_5.jpg","../image/image_17/17_Taillebourg_6.jpg","../image/image_17/17_Taillebourg_7.jpg","../image/image_17/17_Taillebourg_8.jpg"]},"Consult_chateau_formulaire2ea8":{"id":"Consult_chateau_formulaire2ea8","dept":"17","canton":"Meschers sur Gironde","commune":"Talmont-sur-Gironde","nom":"Talmont","type":"Vestiges-Château","periode":"XVIII","histoire":"TALMONT, le musée de Talmont est aménagé dans une maison traditionnelle située non loin de l'église et dont les origines semblent remonter au XVIIIe siècle, période au cours de laquelle plusieurs demeures du village ont été rebâties sur les fondations de maisons antérieures. Char
