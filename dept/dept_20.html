"../../jctruffet.com/image/image_20/20_Corte_1.jpg"},{"id":"Consult_chateau_formulaire60cb","nom":"Covasina","commune":"Covasina","type":"Cap Corse","img":"../../jctruffet.com/image/image_20/20_Covasina_1.jpg"},{"id":"Consult_chateau_formulaire62e3","nom":"Fantauzzi","commune":"Morsiglia","type":"Cap Corse","img":"../../jctruffet.com/image/image_20/20_Fantauzzi_1.jpg"},{"id":"Consult_chateau_formulaire5e25","nom":"Furiani","commune":"Furiani","type":"Bastia","img":"../../jctruffet.com/image/image_20/20_Furiani_1.jpg"},{"id":"Consult_chateau_formulairefdbd","nom":"Muracciole","commune":"Muracciole","type":"Corte","img":"../../jctruffet.com/image/image_20/20_Muracciole_1.jpg"},{"id":"Consult_chateau_formulairec5ed","nom":"Porto_Vecchio","commune":"Porto-Vecchio","type":"Porto-Vecchio","img":"../../jctruffet.com/image/image_20/20_Porto_Vecchio_1.jpg"},{"id":"Consult_chateau_formulairefb04","nom":"Punta","commune":"Alata","type":"Ajaccio","img":"../../jctruffet.com/image/image_20/20_Punta_1.jpg"},{"id":"Consult_chateau_formulaire0ce3","nom":"Quenza","commune":"Quenza","type":"Propriano","img":"../../jctruffet.com/image/image_20/20_Quenza_1.jpg"},{"id":"Consult_chateau_formulairec863","nom":"Rogliano","commune":"Rogliano","type":"San-Martino-di-Lota","img":"../../jctruffet.com/image/image_20/20_Rogliano_1.jpg"},{"id":"Consult_chateau_formulairefb39","nom":"Seravalle","commune":"Prato-di-Giovellina","type":"Golo-Morosaglia","img":"../../jctruffet.com/image/image_20/20_Seravalle_1.jpg"},{"id":"Consult_chateau_formulaired9f4-2","nom":"St_Florent","commune":"St -Florent","type":"Calvi","img":"../../jctruffet.com/image/image_20/20_St_Florent_1.jpg"},{"id":"Consult_chateau_formulaire2b5b","nom":"Tour Genoises","commune":"sanguinaires_Ajaccio","type":"Ajaccio","img":"../../jctruffet.com/image/image_20/20_Tour_Genoises_1.jpg"},{"id":"Consult_chateau_formulairecc9d-3","nom":"Vico_Ornano","commune":"Santa Maria Siché","type":"vestiges château","img":"../../jctruffet.com/image/image_20/20_Vico_Ornano_1.jpg"}];
const FULL={"Consult_chateau_formulaire19b2":{"id":"Consult_chateau_formulaire19b2","dept":"20","canton":"","commune":"Ajaccio","nom":"Ajaccio","type":"Ajaccio","periode":"Citadelle","histoire":"AJACCIO  Ajaccio a été fondée par les Génois, du moins dans sa forme moderne. Ce sont eux qui ont installé en 1492 la citadelle qui indique toujours lentrée du port de la ville.\nIls ont marqué la cité de leur passage, en lui conférant cet aspect si caractéristique des villes génoises, avec des rues étroites et colorées, comme on les retrouve à Bastia, à Calvi ou à Porto-Vecchio.\nLhistoire de la ville a pris un tournant inattendu le 15 août 1769 avec la naissance du petit \"Napoléon Bonaparte\", qui deviendra l'empereur des Français et dont la renommée anime toujours sa ville natale. Cours Napoléon, rue du Roi de Rome, avenue du 1er Consul, place Austerlitz, autant de noms qui rappellent à tous l'histoire de la cité impériale.","architecture":"LANTIVY palais, situé sur le cours Napoléon, le Palais Lantivy est le siège de la préfecture. Sa construction débute en 1826 et les plans ont été tracés par Alphonse-Henri de Gisors. Le palais est entouré dun joli jardin, planté de toutes sortes despèces méditerranéennes ou tropicales, notamment des palmiers et des cédratiers. Le hall dentrée du palais abrite le sarcophage du Bon Pasteur, vestige du Vème siècle en marbre de Carrare, trouvé dans le quartier St -Jean en 1934. Le bâtiment est ouvert au public durant les journées du patrimoine.                 La Tour de CAPO di MURO est située au bout de la rive sud du golfe dAjaccio. On y accède dabord par une petite route après le village d'Acqua-Doria . Prévoir ensuite 40 minutes de marche. La tour qui date du XVIe siècle est bâtie sur un promontoire dans un site complètement sauvage. Cest la seule tour dans le golfe dAjaccio dont laccès à lintérieur est possible. De son sommet (15m de haut), on peut admirer tout le Golfe d'Ajaccio.Une tour similaire, construite en 1590, se trouvait autrefois sur le point culminant de l'île de la Grande Sanguinaire et s'appelait la Sanguinera di Fuori ou la Sanguinera di Mare. La tour de Grande Sanguinaire a été démolie au XIXe siècle pour permettre la construction du phare en 1840-1844. Une deuxième tour, carrée et plus petite, située à l'extrémité sud-ouest de l'île de la Grande Sanguinaire, a été construite dans un but défensif, dans la seconde moitié du XVIIIe siècle (plan terrien de 1770. Elle s'appelait la torretta piccola et aujourd'hui, on la nomme la torra di Castelluchju.","habitants":"VI-XVIII\"","divers":"Quatre édifices dans cet  article ; Ajaccio, Fresch,grav -5            Lantivy devenu prefecture du Sud Grav-3 ;                                    .  Ajaccio 42° 10' 26? nord, 9° 10' 15? est","gps":"","images":["../../jctruffet.com/image/image_20/20_Ajaccio_1.jpg","../../jctruffet.com/image/image_20/20_Ajaccio_2.jpg","../../jctruffet.com/image/image_20/20_Ajaccio_3.jpg","../../jctruffet.com/image/image_20/20_Ajaccio_4.jpg","../../jctruffet.com/image/image_20/20_Ajaccio_5.jpg"]},"Consult_chateau_formulaire498a":{"id":"Consult_chateau_formulaire498a","dept":"20","canton":"","commune":"Aleria","nom":"Aleria","type":"Ghisonaccia","periode":"Fort","histoire":"ALERIA, ancienne colonie grecque, puis romaine, la cité fut la capitale de l'Ile pendant  l'Antiquité, avant d'être abandonnée au Ve siècle. Les fouilles ont permis de dégager le forum et le soubassement des principaux monuments de la ville romaine.Si la présence romaine y semble déjà effective dès la fin du 3e s. av. J.C.,  Aleria et son territoire connaitront trois colonisations successives attribuées à Sylla vers-81, à César en -46 et à Octave aux alentours de -32. Délimitée par un rempart encore visible au sud-est et par la forte déclivité naturelle à louest et au nord, la surface de la ville est de 11 ha environ. Les portes, dont les traces ont été révélées par larchéologie, la morphologie du terrain ou la toponymie, ont été aménagées au sud, à louest et au nord-est, dans le rempart qui entourait la cité. La ville évoluera jusquà lantiquité tardive et connaitra de nombreuses modifications et reprises visibles sur les bâtiments ou sur lorganisation générale des axes de circulations internes à la cité.","architecture":"ALERIA; Une « ville carrière » A la période dabandon de la ville succède une phase dexploitation des ruines qui semble remonter au XIVe siècle, sous lautorité de la république de Gènes. Il sagit en particulier du recyclage déléments architecturaux calcaires transformés en chaux ou remployés tels quels en maçonnerie que lon retrouve notamment dans les maisons alentours et au-delà. Les traces de cette exploitation sont visibles partout sur le site, notamment sur les piliers nord et sud de larc occidental, où lon observe en négatif les empreintes des blocs qui ont servi à son édification. Ce constat pourrait expliquer en partie la relative rareté de la roche calcaire sur le site, ou seuls quelques fragments dinscriptions, de marbres ornementaux ou de statues ont été découverts. La fabrication de chaux tout comme la récupération de roches à bâtir semblent avoir perduré jusquau XIXe siècle.","habitants":"XIV\"","divers":"Aleria, le fort de Matra grav-1-2-3","gps":"","images":["../../jctruffet.com/image/image_20/20_Al%c3%a9ria_1.jpg","../../jctruffet.com/image/image_20/20_Al%c3%a9ria_2.jpg","../../jctruffet.com/image/image_20/20_Al%c3%a9ria_3.jpg","../../jctruffet.com/image/image_20/20_Al%c3%a9ria_4.jpg","../../jctruffet.com/image/image_20/20_Al%c3%a9ria_5.jpg"]},"Consult_chateau_formulairea40b":{"id":"Consult_chateau_formulairea40b","dept":"20","canton":"","commune":"Algajola","nom":"Algajola","type":"Calvi","periode":"forteresse","histoire":"ALGAJOLA,  ;  la province de Balagne avait pour capitale administrative Algajol  où résidait le lieutenant de l'Office de Saint-Georges. D'où la construction au début du XVIe siècle, peu avant 1531, du château forteresse destiné à servir de demeure au représentant de l'Office. C'est ainsi que, grâce à ses fortifications, Algajola fit partie du système défensif génois. Saccagé par les pirates en 1643, l'édifice fut relevé de ses ruines en 1664. Il faut passer sous une voûte pour accéder aux ruelles escarpées qui mènent à l'église Saint-Georges, site le plus touristique de ce village dont le nom signifie « petite algue ». Celui-ci borde une plage de sable fin de trois kilomètres, parsemée de criques. Il est recommandé de commencer sa découverte par le chemin côtier. Il longe l'eau et offre une vue admirable sur ses remparts crénelés qui ont vu passer les grands événements de la région, en représentant l'un des plus jolis.","architecture":"ALGAJOLA   les pieds dans l'eau, ses pierres blondes sont battues par les vents et les vagues de la mer Méditerranée. Édifiée sur les vestiges d'une tour génoise, pour servir de résidence au gouverneur de cette région, cette forteresse a toujours eu une fonction défensive. Au fil des conquêtes et du ravage des pillages des pirates, cette bâtisse, encastrée dans l'habitat ancien du village qui lui a donné son nom, a toujours pu reconstruire ses fortifications, tel un phnix. À la pointe de cette station balnéaire du nord de la Corse, le temps ne semble pas avoir d'emprise sur celle qui domine l'horizon, à quelques encablures de Calvi. Cela va sans dire, le lieu est inscrit à l'inventaire des monuments historiques dès le milieu du XXe siècle et c'est l'un des seuls au XVIe siècle, l'île était sous domination génois.\nÉléments protégés MH : le château-fort en totalité : inscription par arrêté du 15 juillet 1965.","habitants":"XV-XVI\"","divers":"Algajola  42° 36' 34? N, 8° 51' 44? E","gps":"","images":["../../jctruffet.com/image/image_20/20_Algajola_1.jpg","../../jctruffet.com/image/image_20/20_Algajola_2.jpg","../../jctruffet.com/image/image_20/20_Algajola_3.jpg","../../jctruffet.com/image/image_20/20_Algajola_4.jpg"]},"Consult_chateau_formulaire4e10":{"id":"Consult_chateau_formulaire4e10","dept":"20","canton":"","commune":"Bastia","nom":"Bastia","type":"Bastia","periode":"Citadelle","histoire":"BASTIA.  La Citadelle  est un quartier historique de la ville. Sa construction date de la présence génoise en Corse. Le quartier porte également le nom de Terra Nova.\nC'est le quartier le plus ancien de la ville de Bastia. Il est d'un haut intérêt patrimonial et historique. Les remparts de la citadelle ainsi que la porte monumentale sont inscrits aux monuments historiques. Les façades et la toiture du palais des Gouverneurs sont inscrits aux monuments historiques. Au sein de la Citadelle on trouve deux édifices religieux qui sont classées monument historiques. La citadelle de Bastia a été fondée au XIVe siècle par les Génois. La capitale de la Corse est alors Biguglia, où résident les gouverneurs. Mais les Génois considèrent l'endroit dangereux et peu adapté pour le commerce. En 1380, le gouverneur Leonello Lomellini décida de construire un nouveau fort, appelé Castello della Bastia ou  Fortino, situé sur un promontoire rocheux surplombant deux ports : la marine du village de Cardu, appelé Portu Cardu et qui correspond au Vieux-Port actuel, et la marine du village disparu de Belgudere, appelée Portu Vechju, qui correspond à l'actuelle anse de Ficaghjola. L'anse de Portu Vechju. En 1475, le podestà Antonio Tagliacarne entreprend la construction d'une vingtaine de maisons. Ainsi nait le quartier de Terra Nova, en opposition à celui de Terra Vechia, qui correspond au quartier actuel du Vieux-Port, anciennement appelé Portu Cardu . Dessin génois de la Citadelle de Bastia, entre 1600 et 1668. Ce premier noyau d'une vingtaine de maisons correspond aujourd'hui aux immeubles qui se trouvent rue Notre-Dame et rue de la Paroisse. De la première fortification de la Citadelle, en italien le Castello della Bastia, il ne reste plus rien. Il était situé en lieu et place du bastion Saint-Charles, au-dessus du jardin de Romieu actuel. C'est cette tour du Fortino qui va donner son emblème à a ville. On la retrouve sur les armoiries de Bastia.","architecture":"BASTIA., c'était le lieu de résidence de l'évêque de Mariana. En 1570 le siège est transféré à Bastia. En 1660 Mgr Giustiniani fait l'acquisition de cet ancien couvent qui appartenait aux Turchine, les Turquines.  Le bâtiment ne laisse à découvrir que sa façade sobre et austère. Elle était décorée d'un fronton de marbre blanc qui portait les armoiries de la famille Giustiniani. Il a été cassé à la Révolution et on peut le voir aujourd'hui au musée de Bastia.\nLe palais s'étend en profondeur mais les rues sont aujourd'hui bouchées. On dénombrait 32 pièces, dont certaines richement décorées. Après la Révolution le palais est abandonné. Il a été récupéré par l'armée. Il a servi de résidence aux officiers du Génie militaire. La place du Donjon, ou Piazza di à Corte\nPlaque bilingue à la Citadelle. C'est la place principale de la Citadelle. On y accédait par ce qui était l'unique porte d'entrée de Terra Nova, la ville haute. La place est entourée de bâtiments historiques qui ont fait l'histoire de la ville : le Palais des gouverneurs, le pavillon des Nobles-Douze, la Casetta. Son nom ancien est Piazza di A Corte, en français \"Place de la Cour\". Le nom fait référence à la cour de justice, qui était installée à la Citadelle. Le chemin de ronde de la Citadelle de Bastia faisait le tour des remparts. Il était destiné à la surveillance. Il n'est aujourd'hui pas praticable dans son intégralité. Le bastion du Chjostru est situé du côté sud-est de la Citadelle. Il abritait une poudrière.","habitants":"XIV-XV\"","divers":"Bastia   42° 41' 29? N, 9° 27' 07? E                         la Tragonne grav-1-2-3-4_5-6-7                                                Palais  des   Gouverneurs du gouverneur   grav- 8-9                 42° 41' 37? N, 9° 27' 04? E","gps":"","images":["../../jctruffet.com/image/image_20/20_Bastia_1.jpg","../../jctruffet.com/image/image_20/20_Bastia_2.jpg"]},"Consult_chateau_formulaireced2":{"id":"Consult_chateau_formulaireced2","dept":"20","canton":"","commune":"Furiani","nom":"Biguglia","type":"Calvi","periode":"Château Fortin","histoire":"Trois châteaux dans cet article  Biguglia, Olmeta di  Tuda                                                                           BIGUGLIA, dans ce Moyen-Âge, les seigneurs de Cinarca se considèrent comme les descendants dUgo Colonna, cest donc par le sang et la propriété du Château de Cinarca quils sestiment les seuls à pouvoirs constituer un Comté de Corse.\nEn 1264, Sinucellu della Rocca, Comte de Cinarca, Giudice di Corsica per Pisa fut le premier à devenir « Signore Assoluto di Corsica » acclamé lors de la « Veduta » assemblée populaire qui sest tenue à la Canonica. Celui que lhistoire retient sous le titre de Giudice di Cinarca sera leur modèle, ses descendants, Arrigo della Rocca, Vincentellu dIstria se feront acclamer « comtes de Corse » soutenus par le Roi dAragon, tirent leur légitimité du droit divin, fondement de toute la monarchie, puisquil sagit dun royaume créé par le Pape.\nAinsi le château de Biguglia, celui dont il fallait se rendre maître pour gouverner toute la Corse fut maintes fois assiégé, au moins vingt fois en 130 ans, pris et repris sans cesse. Sa destruction fut décidée par lOffice de Saint Georges en 1489 après leur victoire sur les « Seigneurs de Leca » afin que ce lieu ne puisse plus devenir lenjeu du pouvoir.\nBastia deviendra alors la capitale, le siège des Gouverneurs Génois jusquà la révolution du Bozziu de 1729.","architecture":"BIGUGLIA, le fortin de Biguglia situé au nord de l'étang, témoigne des fortes activités d'autrefois. Cette ancienne place forte qui faisait partie d'un dispositif mis en place par les Génois pour la défense de Bastia au XVIe siècle, attaquée par onze galères du duc François de Guise, mille hommes, et plus dautres renforts, a été détruite lors de la bataille d'Ischia Nova en 1558. Le Génois Ravaschiero Ettore qui en commandait la garnison, s'était rendu aux Français. Ce Patrimoine historique est devenu aujourd'hui l'écomusée de la réserve naturelle, consacré à la pêche et à la migration animale et inauguré le 11 juin 2011. L'écomusée comporte un bureau d'accueil avec billetterie, deux salles d'exposition, un aquarium dans lequel on observe toutes les espèces de poissons fréquentant l'étang (dorade, bar, sar, muge, anguille, etc.), un atelier extérieur sur le matériel de pêche ainsi que des locaux administratifs pour les agents etc. Il développe des thématiques propres aux domaines historique, écologique et piscicole de l'étang de Biguglia. L'accès à l'écomusée est libre.                                       OLMETA  di Tuda,  la lutte entre les deux partis se poursuivit. Soutenu par Giudice son beau-père, Rollanduccello passa dans le Nebbio, enleva le château de Pietr'all'Arretta à Ugo et Mannone, puis construisit le château de Brumica. Pour se mettre en état de lui résister, Ugo et Mannone en construisirent un autre à Tuda. À la fin, Ugo vint à mourir. Rollanduccello, après avoir noué des intelligences dans le château de Tuda, y pénétra pendant la nuit, et tua Mannone avec tous les autres membres de la famille de Giovanninello, à l'exception d'un bâtard d'Ugo, qui fut secrètement sauvé","habitants":"XIV\"","divers":"trois châteaux dans cet article  Biguglia statue  grav-1 et erbalunga grav-5-6-7-8 et Olmeta di  Tuda  grav -2-3-4                                                                               Biguglia statue grav-1                                   42° 37' 36? N, 9° 25' 06? E","gps":"","images":["../../jctruffet.com/image/image_20/20_Biguglia_1.jpg","../../jctruffet.com/image/image_20/20_Biguglia_2.jpg","../../jctruffet.com/image/image_20/20_Biguglia_3.jpg","../../jctruffet.com/image/image_20/20_Biguglia_4.jpg","../../jctruffet.com/image/image_20/20_Biguglia_5.jpg","../../jctruffet.com/image/image_20/20_Biguglia_6.jpg","../../jctruffet.com/image/image_20/20_Biguglia_7.jpg","../../jctruffet.com/image/image_20/20_Biguglia_8.jpg"]},"Consult_chateau_formulaire52a9":{"id":"Consult_chateau_formulaire52a9","dept":"20","canton":"","commune":"Bonifacio","nom":"Bonifacio","type":"Porto-Vecchio","periode":"Citadelle","histoire":"BONIFACIO, si la citadelle de Bastia évoque la longue domination génoise sur l'île, celle de Bonifacio représente la première place forte de la Corse. Au nom du pape, le seigneur Boniface fit construire en 830 une forteresse à laquelle il donna son nom. Elle fut remaniée et agrandie ultérieurement, en fonction des progrès des techniques militaires. Située à l'ouest de la ville haute sur un plateau étroit, la citadelle était destinée à protéger la côte méridionale contre les incursions des Sarrasins.Le roi Alphonse V d'Aragon, maintint en 1420 un siège pendant cinq mois avant de baisser les armes face à l'intouchable cité qu'était Bonifacio. Bonifacio a subi au cours des siècles, de multiples attaques ; mais la plus terrible fut celle de la peste qui en 1528 fit plus de 4 300 morts dans la cité qui à cette époque comptait 5 000 habitants. Les murailles imprenables se révélèrent inutiles face à ce fléau. La chapelle Saint-Roch, à l'entrée de la ville, reste un témoignage de la fin de cette sombre période. On y fait toujours une procession qui rappelle que c'est en ce lieu, où est mort le dernier Bonifacien atteint de la maladie, avant la fin de la peste.En 1553, encore très affaiblie par le passage de la peste, Bonifacio subissait une nouvelle attaque et dut se rendre à Dragut, un ancien corsaire turc dont on dit qu'il avait été commandité par le Maréchal des Thermes. La ville assiégée capitula pour la première fois et fut mise au pillage.  Le roi François Ier  prend possession d'une ville détruite et dépeuplée que les Français commencent à reconstruire, mais qui, en vertu du traité de paix passé en 1559, est rendue à la République de Gênes.\nLa ville restera par la suite génoise jusqu'à l'annexion de l'île toute entière par la France le 15 mai 1768.","architecture":"BONIFACIO, l'origine de la ville actuelle de Bonifacio n'est pas vraiment connue avec précision, mais des dates approximatives indiquent sa refondation entre 828 et 833 par Boniface II de Toscane qui lui donna son nom actuel. L'histoire attestée de Bonifacio remonte en 1195 mais la ville fut colonisée par les Génois qui imposèrent à la ville des modifications militaires structurelles importantes (et qui créèrent la citadelle actuelle). La citadelle de Bonifacio est un ouvrage militaire bâti progressivement à partir du XIIe siècle pour permettre la protection de Bonifacio qui est une place importante de la République de Gênes pour la sécurité de son commerce entre Gênes, la Ligurie, et la Sardaigne et pour permettre le contrôle des Bouches de Bonifacio.Comme tous les ports de commerce, son histoire a été relativement mouvementée notamment par un conflit guerrier entre Pise et Gênes, ces deux républiques se disputant avec acharnement sa citadelle qui était un maillon stratégique militaire et un complexe portuaire sans égal en Corse. Dans un premier temps, Pise fut maîtresse des lieux jusqu'à la fin du XIIe siècle.","habitants":"VIII-XV-XVI\"","divers":"Bonifacio  41° 23' 13? N, 9° 08' 59? E                         Pertusato  41° 22' 04? N, 9° 11' 04? E","gps":"","images":["../../jctruffet.com/image/image_20/20_Bonifacio_1.jpg","../../jctruffet.com/image/image_20/20_Bonifacio_2.jpg","../../jctruffet.com/image/image_20/20_Bonifacio_3.jpg","../../jctruffet.com/image/image_20/20_Bonifacio_4.jpg","../../jctruffet.com/image/image_20/20_Bonifacio_5.jpg"]},"Consult_chateau_formulaire4e10-2":{"id":"Consult_chateau_formulaire4e10-2","dept":"20","canton":"","commune":"Erbalongua","nom":"Brando","type":"Bastia","periode":"Fort","histoire":"BRANDO, est une commune située sur la côte Est du Cap Corse, à 8 km au nord de Bastia. Autrefois, la communauté de Brando était un fief des De Gentile ; elle se situe dans l'ancienne pieve de Brando. Le site de Brando est occupé depuis la préhistoire. En effet, on retrouve au lieu-dit Tesoru (ou Tresoro), au nord-est, les vestiges d'un castrum préhistorique, avec enceinte. La fondation d'Erbalonga remonte également à la préhistoire. Dans son ouvrage pouvoirs et fortifications dans le nord de la Corse : du XIe au XIVe siècle, Daniel Istria écrit que les terres du Cap ne sont mentionnées dans la documentation notariale génoise qu'à partir du mois d'août 1179. À cette époque, les Avogari, les Pevere et les de Turca formaient à Gênes, avec les de Antioca et les Embroni, le parti de Curia. Il émet ensuite l'hypothèse suivante : « Un document de 1239, mentionnant l'envoi dans l'île, par Lanfranco Avogari, de vingt-cinq hommes bien armés, se fait l'écho de probables guerres seigneuriales que cet état de fait a dû engendrer. Un acte de vente daté de 1249, indique que les terres objet de la transaction et sises à l'extrémité nord du Cap, appartenaient jadis au marquis de Massa. Par conséquent, on ne peut écarter l'hypothèse que l'arrivée des familles génoises dans l'île soit consécutive à l'accord passé entre Guglielmo de Massa et la commune de Gênes en 1174. C'est d'ailleurs à ce moment qu'est également fondée la colonie de Bonifacio. »                        Au nord GRANAJOLA  à Rapaggio . Maison de notable de la famille Manfredi datant de la fin du XVIIIe siècle ou du début du XIXe siècle. Transformée dans la seconde moitié du XIXe siècle en hôtel, afin d'accueillir les curistes de l'établissement thermal d'Orezza.","architecture":"BRANDO  village médiéval, il est décrit par les noms de ses 4 quartiers : Chialza (venant d'un mot arabe signifiant mûrier), Ripa (du latin voulant dire « en bord de falaise », Cascata (cascade) et Forte (où sont les ruines du Fort de Brando). Au XIIe siècle Forte est la citadelle des seigneurs Avogari. Au XIVe siècle, Gênes forma le fief voisin d'Erbalonga. Pendant plus d'un siècle les deux fiefs se livrèrent une guerre acharnée. Détruit, le château de Castellu-Brando sera relevé par les Français en 1558   À Brando, le château des seigneurs Avogari fut construit au XIIe siècle sur un petit éperon, au cur d'une vallée encaissée, relativement loin de la mer mais à une croisée de chemins. À environ 300 m de la fortification, à la même hauteur et de l'autre côté du vallon, se trouve la petite église piévane Santa Maria delle Nevi dont la construction pourrait remonter aux XIe et XIIe siècles. Le choix de l'emplacement du château paraît avoir été déterminé ici par la présence de l'église piévane, ou du moins par cette position privilégiée et centrale par rapport à la circonscription religieuse et administrative. Le castellu de Brando avait une tour, structure souvent unique, la plus caractéristique et la plus spectaculaire de ces nouveaux châteaux. L'épaisseur de ses murs en pierre, le matériau de base, variait entre 1 m et 1,55 m.\nAu XIVe siècle, Gênes forma le fief voisin d'Erbalunga qui entra en conflit avec les seigneurs Avogari établis dans la citadelle reconstruite de Forte. Pendant plus d'un siècle les deux fiefs se livrèrent une guerre acharnée, entraînant la destruction du castellu. Le château de Castello-Brando relevé par les Français en 1558, sera à nouveau détruit. Ses ruines sont encore visibles de nos jours, au quartier Forte.","habitants":"XII-XV\"","divers":"Granajola    42° 28' 00? nord, 9° 12' 00? est\nBrando 41° 23' 13? N, 9° 08' 59? E        Erbalunga grav-3","gps":"","images":["../../jctruffet.com/image/image_20/20_Brando_1.jpg","../../jctruffet.com/image/image_20/20_Brando_2.jpg","../../jctruffet.com/image/image_20/20_Brando_3.jpg","../../jctruffet.com/image/image_20/20_Brando_4.jpg"]},"Consult_chateau_formulaire38b5":{"id":"Consult_chateau_formulaire38b5","dept":"20","canton":"","commune":"Saint Hyacinthe de Lota.","nom":"Cagninacci","type":"San-Martino di Lota","periode":"Cagninacci","histoire":"CAGNINACCI de tout temps, les Cap-Corsins ont émigré. Au XIXe siècle plusieurs sinstallèrent en Amérique du Sud : Porto-Rico, Saint Domingue, VenezuelaQuelques uns y firent souche, dautres revinrent dans leurs villages une fois fortune faite, et se firent construire de somptueuses demeures ou «Palazzi» que lon appelle maintenant «maisons daméricains»\n L'une d'elles est le château Cagninacci à San Martino di Lota.\nElle offre lexpérience, unique en Corse, de séjourner chez les descendants de ceux qui ont construit le château. Sur le site d'un couvent de Capucins, larrière grand-père Cagninaccia construit un impressionnant palais néo-toscan. De l'ancien couvent du XVIIe siècle subsistent la chapelle, vide maintenant, et quelques cellules de moines.  Bertrand, Florence, et leur mère vous proposent 4 chambres dhôtes (toutes avec salle de bains privative, une chambre dispose également d'une splendide terrasse privée), dans leur maison de maître merveilleusement romantique. Transformé en chambres d'hotes.","architecture":"CAGNINACCI est situé dans 3 hectares de terrain privé boisé de châtaigniers, doliviers, de magnolias géants, dorangers parfumés et de tilleuls dont le parfum en juin est irrésistiblement entêtant, tout en profitant de la vue spectaculaire sur la mer. Par beau temps, vous pourrez voir les îles d'Elbe et de Capraia, et très rarement la côte italienne. Si le temps ne le permet pas, vous serez servi dans la spectaculaire salle à manger.\n Pour la plage, la mer est à seulement 8 kilomètres.\nSan Martino di Lota est à la porte du Cap Corse, de St Florent, du désert des Agriate et de la splendide mais fort méconnue Castagniccia, «le cur de la Corse».","habitants":"XVII-XVIII-XX\"","divers":"pas de gps","gps":"","images":["../../jctruffet.com/image/image_20/20_Cagninacci_1.jpg","../../jctruffet.com/image/image_20/20_Cagninacci_2.jpg","../../jctruffet.com/image/image_20/20_Cagninacci_3.jpg"]},"Consult_chateau_formulairea55e":{"id":"Consult_chateau_formulairea55e","dept":"20","canton":"","commune":"Calvi","nom":"Calvi","type":"Calvi","periode":"Citadelle","histoire":"trois édifices dans cet article ;Calvi; le fort Mozello et le fort Charlet                                                                                                                                  CALVI  se pose naturellement comme un site emblématique de la Balagne. LOffice de Tourisme Calvi-Balagne vous propose des visites audio guidées ainsi quune Chasse au Trésor pour une découverte ludique de la citadelle, lun des plus beaux sites de Corse,  est aussi appréciée, cest également pour sa situation géographique privilégiée. Perchée sur son promontoire rocheux, elle propose un panorama à 360 degrés sur la ville, le port de plaisance, et les montagnes qui se jettent dans la mer. Ses ruelles pavées et ses maisons typiquement \"genovese\" vous racontent à leur manière lhistoire de la cité.Sous le porche d'entrée, vous pourrez désormais visiter le Musée des Arts . Celui-ci rassemble les oeuvres du Fonds d'Art Contemporain de la ville. Le musée est en accès libre.  LOffice de Tourisme Calvi-Balagne propose depuis plusieurs années déjà une visite audio guidée de la Citadelle . Des musiques traditionnelles rythment la visite et viennent agrémenter lhistoire de cette forteresse génoise et des personnages qui ont contribué à sa notoriété (Christophe Colomb, lAmiral NelsonLaurent Giubega, parrain de Napoléon) et rendent le récit vivant et émouvant.Le système offre une totale autonomie à lutilisateur, qui, chemin faisant sur les pavés de lhistoire, peut également se laisser aller à quelque flânerie.                                               Le fort MOZELLO  fort militaire construit en 1756 à Calvi, en Balagne   devenu caserne Maillebois du nom du marquis et petit neveu de Colbert, fut construit en 1756 par les ingénieurs militaires génois. Protégeant la citadelle de Calvi, il fut pris par les troupes anglaises commandées par l'amiral Horatio Nelson dans la nuit du 13 au 14 juillet 1794, lors du siège de Calvi. Après la prise de ce fort, l'artillerie anglaise envoya 8 500 boulets sur la ville de Calvi de cette position.","architecture":"CALVI  uvre génoise du XIIIe siècle, la citadelle  fièrement érigée sur un promontoire rocheux, veille sur la ville et la baie étendues à ses pieds. Un lieu dhistoire, un lieu de vie aussi au charme si particulie Au fil de la visite, on se perd, on se retrouve, on sémerveille devant un panorama à 360° sur la ville, la mer et les montagnes alentour !  Ceint par les remparts, le passé de Calvi se conjugue au présent. Reliés par des ruelles pavées au charme fou, maisons typiques et édifices « guerriers » ou religieux se côtoient. Les amateurs de « vieilles pierres » ne manqueront pas de sémouvoir devant quelques richesses patrimoniale.  Construite par la Confrérie Saint-Antoine Abbé au début du XVIe siècle, la chapelle est classée « Monument Historique » depuis 1976. Elle continue à abriter les activités de la Confrérie, tournées vers lentraide aux personnes en difficulté. Elle accompagne bien sûr la vie liturgique de la cité calvaise et participe à la sauvegarde des traditions religieuses locales. la tour du Sel  Cette tour de guet, édifiée par les génois en 1495, servait à entreposer le sel. Classée « Monument Historique » (comme les remparts) en 1992, elle délimite le port de plaisance et le port de commerce.  la Caserne Sampiero, ancien Palais des Gouverneurs  Le « Castel Nuovo » était la résidence des gouverneurs génois aux XVIème et XVIIème siècles. Il sagit désormais du mess des officiers parachutistes du 2ème régiment étranger.  on dit aussi\nQue Christophe Colomb serait né à Calvi et que sa maison se trouverait dans la Citadelle.                                                                  Fort CHARLET ou fort Torretta) est un fort militaire construit en 1845 à Calvi, en Balagne (Corse). Depuis 2019, il abrite le Centre de Conservation et de Restauration du Patrimoine Mobilier de Corse.  Le bâtiment principal est une grosse batterie d'artillerie, remanié au fil des ans. Fin XIXe  début XXe siècle, de nouveaux bâtiments et des prisons sont ajoutés.  L'ancienne batterie d'artillerie devient un quartier de casernement et un centre de détention dans une enceinte fortifiée. À partir des années 1930, des opposants des colonies françaises, en particulier malgaches, y furent incarcérés. Les bastions abritèrent aussi les quartiers disciplinaires de l'Infanterie de marine, appelées \"Sections spéciales\" ou \"La Camise\". Dans la nuit du 20 octobre 1930, le fort est le siège d'une mutinerie de 5 fusiliers marins, barricadés en chantant l'Internationale et agitant le drapeau rouge.","habitants":"XV-XVII\"","divers":"trois édifices dans cet article ;Calvi; le fort Mozello et le fort Charlet   Calvi  42° 34' 05? N, 8° 45' 38? E                             Fort Charlet 42° 34' 00? N, 8° 45' 05? E.                  Palais des Gouverneurs 42° 34' 04? N, 8° 45' 36? E","gps":"","images":["../../jctruffet.com/image/image_20/20_Calvi_1.jpg","../../jctruffet.com/image/image_20/20_Calvi_2.jpg","../../jctruffet.com/image/image_20/20_Calvi_3.jpg","../../jctruffet.com/image/image_20/20_Calvi_4.jpg","../../jctruffet.com/image/image_20/20_Calvi_5.jpg"]},"Consult_chateau_formulaire6a4b":{"id":"Consult_chateau_formulaire6a4b","dept":"20","canton":"","commune":"Centuri","nom":"Centuri","type":"Cap Corse","periode":"Châteaux","histoire":"Deux châteaux dans cet article; Stopielle et Merlacce STOPPIELLE, à Centuri, commune d'où partaient un grand nombre d'habitants pour Porto Rico, se trouvent onze maisons dites d'Américains. Cette maison est caractéristique d'une architecture ostentatoire et décorative. Elevée sur deux niveaux et un étage de combles au-dessus d'une corniche très saillante, couverte d'un toit en lauzes surmonté d'une petite terrasse en belvédère, la maison possède trois façades ordonnancées à travées que couronne une balustrade pleine masquant une partie de la toiture et renforçant le caractère toscan néo-classique de l'ensemble. La façade principale possède un porche d'entrée surmonté d'un balcon à balustrade, décoré de deux aigles impériaux qui attestent des accointances bonapartistes des propriétaires. Le plan est original par rapport au modèle carré ou rectangulaire des maisons dites d'Américains en ce qu'il possède contre le corps principal, rectangulaire, une aile arrière allongée comprenant l'ensemble des anciennes cuisines et l'actuelle grande salle à manger de part et d'autre d'un petit patio carré. L'ensemble est distribué par un escalier monumental à trois volées droites et possède des décors peints plafonnants et muraux du peintre Paul-Baptiste Profizzi. L'allégorie de l'Amérique est peinte au centre du plafond du grand salon. Le château en totalité, ses abords et les façades et toitures de l'écurie, inscription par arrêté du 25 mars 2011.","architecture":"MERLACCE  la tour, cette merveille. Le portail est ouvert mais les lieux semblent totalement abandonnés, le bâtiment est dailleurs en très mauvais état et présente de nombreuses fissures. Mais il est absolument merveilleux, tel un château de conte de fée dans son écrin de verdure et avec une vue splendide sur la côte et le port de Centuri en contre-bas. Nous découvrons sur un panneau à lentrée que son nom est « château Merlacce Tour », propriété du marquis de Sedilo. Édifié en 1492, le bâtiment, classé monument historique en 1980, est logé en hauteur, sur son promontoire. Encadré par les montagnes, il surplombe le village  est bordé par une oliveraie. Avant d'être un lieu de prière et de retraite pour les moines, il était un château défensif. La nature a depuis poussé à l'intérieur de l'édifice, entre les pierres. Elle est devenue, selon l'architecte, une \"armure végétale qui protège de l'effondrement\". « Château Merlacce Tour » et voici ce que jai découvert sur cette belle demeure : au XXe siècle, la famille Franceschi (peut-être la même famille que lancien moulin Franceschi, aujourdhui appelé Moulin Mattei), et plus précisément le marquis de Sedilo, a racheté lancienne tour carrée de la famille Preziosi pour la transformer en château. Je nai pas trouvé dinformations sur la date de construction dorigine de la tour carrée mais ce genre de tour, appelée également « maison forte », construit par les notables et les seigneurs, était répandu dans le Cap Corse entre le 15ème et le 16ème siècle, elle doit donc sans doute dater de cette période. Vous pouvez en savoir plus sur ces tours carrées sur mon article dédié à leur édification au Cap Corse.","habitants":"XV-XVII\"","divers":"Stopielle grav 5  <Merlacce grav 1-2-3-4","gps":"","images":["../../jctruffet.com/image/image_20/20_Centuri_1.jpg","../../jctruffet.com/image/image_20/20_Centuri_2.jpg","../../jctruffet.com/image/image_20/20_Centuri_3.jpg","../../jctruffet.com/image/image_20/20_Centuri_4.jpg","../../jctruffet.com/image/image_20/20_Centuri_5.jpg"]},"Consult_chateau_formulaire6d75":{"id":"Consult_chateau_formulaire6d75","dept":"20","canton":"","commune":"Centuri","nom":"Centuri_20","type":"Cap Corse","periode":"ChâteauX","histoire":"Trois édifice dans cetaticle Centuri, Bellavista et Cenci à Piazze.                       CENTURI,   le port de Centuri daterait du VIe siècle avant Jésus Christ, il était connu sous le nom de « Centurinum Civitas », le reliant à Macinaggio par une route romaine.\nPar la suite, la ville appartenait au Seigneur Peverelli avec le soutien de Gênes jusquà la fin du XIIe siècle.\nLe port de Centuri était au XIIIe siècle, le 2ème port de lîle derrière Erbalunga. Cest durant ce siècle que les génois ont fortifié lîle de Capense. A partir du XVIIIe siècle, la ville se voit octroyer une jetée.  Le port de Centuri devient à cette période un port servant à la guerre sous le commandement de Pascal Paoli. Il fut dailleurs larsenal de la marine nationale corse.\nA partir de 1767, Paul Mattei originaire de Centuri réussit à récupérer aux génois lîle de Capraia avec laide de corses et de capicorsins. Pendant la révolution française de 1789, le Cap Corse est divisé en 4 cantons, dont celui de Rogliano dont dépend Centuri, anciennement Pieve de Capo Bianco.\nSon port est malheureusement brûlé en 1794 par les britanniques.  Château de Bellavista à Ortinola et les tours genoises de Capu-Biancru et de Porto.","architecture":"BELLAVISTA à Ortinola, dans une verdure glissant en pente douce vers la mer, l'ancien château du comte Cipriani agit comme un anachronisme captant tous les regards. Caractérisée par une carapace de pierres apparentes, cette demeure intrigue avec sa ligne de remparts, ornement féodal d'une époque révolue. Ce \"palazzu\" dont l'histoire se déroule comme un feuilleton sur un siècle et demi, fut édifié par un personnage hors du commun qui a marqué le XIXe siècle tant en Corse qu'en Italie et jusqu'à San Francisco, Leonetto Ciprani. Tombé en ruines entre les deux guerres, le château est d'abord vendu en 1928 à la société Corsotel puis fut racheté par Lucien Morel d'Arleux, qui lanca les opérations de reconstruction  de l'édifice actuel. Aujourd'hui résidence privée, le château Bellavista est actuellement propriété d'une famille d'origine corse honorablement connue, les Marini.                       CENCI PIAZZE  à Piazze, avec trois tours crênelées. Il a été construit à l'emplacement même de l'ancien château des Cenci, rasé par les troupes génoises d'Andrea Doria en 1554.\nVestiges de la tour à feu dont il ne reste que l'embase, au-dessus de la marine de Canelle.\nTour carrée ruinée à l'ancien village de Linaghje (ou Linaglie) situé sur le versant occidental du Monte 359 m, au-dessus de la route D33 dite « petite corniche ».","habitants":"XVII\"","divers":"trois édifice dans cetatic le Centuri  grav-1-    Cenci Piazze   grav-4-5                      .Belavista- grav -2-3 42°57'29\"N   9°21'58\"E","gps":"","images":["../../jctruffet.com/image/image_20/20_Centuri_20_1.jpg","../../jctruffet.com/image/image_20/20_Centuri_20_2.jpg","../../jctruffet.com/image/image_20/20_Centuri_20_3.jpg","../../jctruffet.com/image/image_20/20_Centuri_20_4.jpg","../../jctruffet.com/image/image_20/20_Centuri_20_5.jpg"]},"Consult_chateau_formulaireaab2":{"id":"Consult_chateau_formulaireaab2","dept":"20","canton":"","commune":"Colenzana","nom":"Colenzana","type":"Colenzana","periode":"Vestiges","histoire":"COVASINA , vestiges du château du prince Pierre Bonaparte.                                                                 La fontaine du Prince Pierre a été érigée dans les années 1860, lorsqu'il siégeait à la présidence du conseil général de Corse. Pierre-Napoléon Bonaparte fit construire cette fontaine, surmontée de son buste en bronze, sur la place centrale du village de Calenzana.                                                                               La TOUR MONZA  dans l'enceinte de l'ancienne propriété (maison de chasse) du prince Pierre Bonaparte à Luzzipeo.","architecture":"COLENZANA la TORRE MOZZA est  située à un peu moins de deux km de la Torre Truccia, la Torre Mozza correspondait directement avec sa consoeur par feux. Elle a été construite au XVIe siècle à Luzzipeo par les génois lorsque ceux-ci ont mis en place un système de défense. Au XIXe siècle, le Prince Pierre-Napoléon Bonaparte construisit son lieu de résidence sur le terrain des ruines de la Torre Mozza qui elle est située à un peu moins de deux km de la Torre Truccia,                                            Aujourdhui en ruines, la Torre TRUCCIA est une ancienne tour génoise du XVIe siècle, située sur un piton rocheux à environ 340 m de la côte. Elle faisait partie du dispositif de défense mis en place par les génois et était en relation directe avec la Torre Mozza, située près de 2 km plus bas à Luzzipeo. La Torre Truccia est accessible via un sentier qui part du lieu-dit Mansu.","habitants":"IX-XIX\"","divers":"Tour Monza grav 8             41°58'01\" nord 9°21'57\"Est","gps":"","images":["../../jctruffet.com/image/image_20/20_Colenzana_1.jpg","../../jctruffet.com/image/image_20/20_Colenzana_2.jpg","../../jctruffet.com/image/image_20/20_Colenzana_3.jpg","../../jctruffet.com/image/image_20/20_Colenzana_4.jpg","../../jctruffet.com/image/image_20/20_Colenzana_5.jpg","../../jctruffet.com/image/image_20/20_Colenzana_6.jpg","../../jctruffet.com/image/image_20/20_Colenzana_7.jpg","../../jctruffet.com/image/image_20/20_Colenzana_8.jpg"]},"Consult_chateau_formulaire9033":{"id":"Consult_chateau_formulaire9033","dept":"20","canton":"","commune":"Corte","nom":"Corte","type":"Corte","periode":"Forteresse","histoire":"CORTE, Au XVIIIe siècle le général de la Nation Pascal Paoli fait de Corte la capitale de son gouvernement pour la nation corse. En 1769 après la défaite du 9 mai de ses troupes corses à la bataille de Ponte-Novo contre celles du roi Louis XV, la Corse passe sous domination française. Le comte de Vaux ordonne alors d'augmenter les fortifications de la ville par la construction de la citadelle actuelle, sur le principe des fortifications et constructions de Vauban (seule citadelle parmi les six citadelles Corse à être construite à lintérieur des terres). La construction de la caserne Padoue s'achève en 1776.  Le pays du Cortenais, bassins sculptés de terrasses et hauteurs escarpées, se déploie au cur de la Corse, offrant un paysage de montagne grandiose qui s'élève jusqu'à 2710 mètres pour le Monte Cinto, le plus haut sommet de l'île. Le Cortenais regorge de merveilles naturelles : cirques, panoramas, cascades (notamment la Cascade des Anglais), arches de pierres, lacs d'altitudes, forêts et maquis odorants où gambadent chèvres, brebis et vaches. Sillonné de nombreux fleuves et torrents qui se prêtent aux sports d'eau vive et à la pêche, il invite également à l'escalade dans ses gorges sèches. Quelques villages perchés aux vieilles maisons pointent à travers le maquis. Deux anciennes pièves (équivalents du canton), la Caccia et le Niolo s'y distinguent.  La première est encaissée entre deux versants abrupts aux neiges éternelles, où s'étendent bois de pins silencieux et maquis broussailleux.","architecture":"CORTE,  En 1419 le comte et vice-roi de Corse Vincentello d'Istria, vassal du roi Alphonse V d'Aragon, fait construire le château au sommet du rocher qui domine la ville, en Haute-Corse à mi chemin entre Bastia à Ajaccio, avec une muraille crénelée et trois tours, pour combattre la république de Gênes, opposée au royaume d'Aragon. Entre 1421 et 1434 il règne en souverain sur la Corse et installe le siège de son gouvernement à Corte. La deuxième est striée de murets de pierres soutenant de maigres cultures en terrasse. Situées dans le parc naturel régional de la Corse, leurs forêts abritent des animaux rares : mouflons, aigles royaux et vautours dans un cadre extrêmement sauvage comme les Gorges de l'Asco ou la Scala di Santa, défilé taillé dans le granit rouge. La citadelle de Corte, surnommée le nid d'aigle, est une citadelle du XVIII e siècle construite autour d'un château du XV e siècle à Corte en Haute-Corse, classée monument historique le 10 août 1977 et « musée de la Corse » depuis 1984. Le château de la citadelle, au sommet du rocher qui domine Corte .                 \nZUANI est une commune de la façade orientale de la Corse, sans littoral, au cur de l'ancienne piève de Serra, faisant partie de la Costa Serena microrégion regroupant 27 communes. Adhèrente au parc naturel régional de Corse, Zuani y est située dans le « territoire de vie » de la Castagniccia.","habitants":"XV-XVIII\"","divers":"Corte  42° 16' 20? nord, 9° 20' 49? est","gps":"","images":["../../jctruffet.com/image/image_20/20_Corte_1.jpg","../../jctruffet.com/image/image_20/20_Corte_2.jpg","../../jctruffet.com/image/image_20/20_Corte_3.jpg"]},"Consult_chateau_formulaire60cb":{"id":"Consult_chateau_formulaire60cb","dept":"20","canton":"","commune":"Covasina","nom":"Covasina","type":"Cap Corse","periode":"Château","histoire":"COVASINA.  le château de Covasina est bâti sur un endroit stratégique car il surplombe toute la plaine avoisinante. Ce lieu était déjà occupé par les Romains et relié au port de Palo et à la Strada Romana dont on peut encore voir le tracé.\nPtolémée, dans son énumération des peuplades de la Corse, mentionne que le Fiumorbo est peuplé par les Koumasanoi ou Comasini. Koumasanoi signifie « chevelus » et cest ainsi que lon dénommait les habitants de la Gaule septentrionale. On peut donc supposer que la région a été colonisée par des vétérans gaulois. Selon Giovanni della Grossa, le château fut construit par Truffet, envoyé de Charlemagne, qui aurait lutté contre les Biancolacci, une des plus anciennes familles seigneuriales de Corse. La partie la plus ancienne du château se situe au nord car les murs sont construits de petites pierres bien taillées liées au mortier, les trous de charpente résultant de lécartement des assises. Ce type dappareillage suggère une datation du 9e siècle. Par la suite, de nombreux remaniements et agrandissements indiquent que le château fut habité jusquaux  XVIIe-XVIIIe siècles.","architecture":"COVASINA  dépendant du château, la chapelle San-Michele, aujourdhui en ruines, remonte elle aussi au 9e siècle car elle présente, notamment dans langle sud-est, les mêmes caractéristiques que les murs de la partie nord du château.\nElle est de petites dimensions (de 6,30 m x 4,50 m) et bâtie à lextrémité sud de la colline. Le mur sud est dailleurs en surplomb ainsi que labside. Toute la façade occidentale sest écroulée. Selon le rapport de Mgr Mascardi, la nef, en contre-bas de deux marches, était couverte en pierres ; deux portes y donnaient accès et des bancs de pierre se trouvaient le long des murs.Des remaniements ont eu lieu à différentes époques.\nSi labside a sans doute été refaite à la fin du Moyen Age, une remise au goût du jour a été effectuée aux 17e-18e siècles : abside fermée par un mur, obturation de la porte nord et adjonction dun décor à pilastres recouvert dun crépi masquant les claveaux de larc triomphal. Létat des ruines ne permet pas une analyse plus poussée.","habitants":"IX-XVII-XVIII\"","divers":"pas de gps","gps":"","images":["../../jctruffet.com/image/image_20/20_Covasina_1.jpg","../../jctruffet.com/image/image_20/20_Covasina_2.jpg"]},"Consult_chateau_formulaire62e3":{"id":"Consult_chateau_formulaire62e3","dept":"20","canton":"","commune":"Morsiglia","nom":"Fantauzzi","type":"Cap Corse","periode":"Châteaux","histoire":"FANTAUZZI , visite guidée, pour Corse Net Infos, de Michel-Edouard Nigaglioni, un des deux commissaires de lexposition avec Jean-Christophe Liccia, je suis Cap-corsin dorigine. Les maisons dAméricains ont bercé mon enfance. Elles ponctuent le paysage et sont, pour le Nord de la Corse, un marqueur aussi important que les églises baroques ou les tours génoises. Le phénomène de ces familles, qui on catalogue permettent justement de montrer que ce phénomène se retrouve, aussi, dans une moindre mesure, en Balagne et en Castagniccia. Ce fut un plaisir pour les commissaires de lexposition de creuser le sujet et de revisiter ce que lon savait sur ces maisons-là. Au mode et au cadre de vie des notables et, à travers les familles , à tout un village. Ces maisons dAméricains avaient une domesticité importante - les gens du village y travaillaient , elles accueillaient les amis des enfants de la famill Cétaient des maisons ouvertes qui permettaient à tout un village davoir accès à des choses comme le phonographe, les premiers chauffages électriques, les premiers ventilateurs,  des objets dorigine américaine, mais avec des prises conçues pour le marché européen. Lexposition montre un ventilateur des années 20, un chauffage électrique et une radio des années 30, et une télévision des années 50.                                                                                              STANTI est un petit village moyenâgeux, bâti sur un promontoire. Stanti vient du grec istànai qui veut dire \"dressé\". S'y trouvent la chapelle San Roccu ainsi qu'une tour carrée du XIIIe siècle. Cette tour haute de 17 m, a été incendiée au XVIe siècle par les Sarrasins.Au sud de Stanti, se dresse la tour carrée de Gaspari, du XVIe siècle, également haute de 17 m. À 30 m au sud de la tour on distingue encore les ruines de l'antique village d'Acamorsiglia fondé il y a 25 siècles par les Phocéens, abandonné vers 1905 et nommé Camorsiglia de nos jours.","architecture":"FANTAUZZI, du,1er quart du XXe siècle; la construction du château, débutée avant la Première guerre mondiale, s'achève en 1924, ce qui en fait la dernière maison dite d'Américain. L'édifice contraste avec les modèles néo-classiques de type toscan habituellement choisis durant la seconde moitié du XXe siècle. Le volume est complexe et découpé en plusieurs tours et tourelles. Les façades sont différenciées selon leur orientation. Le plan en U développe, côté mer, une enfilade de salons au rez-de-chaussée surélevé, de chambres aux étages. L'ensemble est distribué par un escalier rampe sur rampe, proche de l'entrée de service latérale. Aucun décor ne semble avoir été peint à l'intérieur.  Les maisons des Américains ! Lexpression, tout comme les demeures exceptionnelles quelle désigne et les mythiques destins quelle illustre, ont toujours fasciné les Corses. Pour fêter son vingtième anniversaire, le musée de la Corse à Corte présente une superbe exposition qui invite à plonger dans ce pan glorieux de lhistoire insulaire. Inaugurée début août, prévue jusquà fin décembre, elle rassemble, sur cinq siècles, plus de 150 objets emblématiques, issus souvent de collections particulières, des films, des photos et 15 maquettes inédites.    déjà, je suis Cap-corsin dorigine. Les maisons dAméricains ont bercé mon enfance. Elles ponctuent le paysage et sont, pour le Nord de la Corse, un marqueur aussi important que les églises baroques ou les tours génoises.","habitants":"XIX-XX\"","divers":"Fantauzi grav-1-2       Lorsiglia  grav-3                         Morsiglia grav-4                           42°56' 47\" nord 9°21'54\" Est","gps":"","images":["../../jctruffet.com/image/image_20/20_Fantauzzi_1.jpg","../../jctruffet.com/image/image_20/20_Fantauzzi_2.jpg","../../jctruffet.com/image/image_20/20_Fantauzzi_3.jpg","../../jctruffet.com/image/image_20/20_Fantauzzi_4.jpg"]},"Consult_chateau_formulaire5e25":{"id":"Consult_chateau_formulaire5e25","dept":"20","canton":"","commune":"Furiani","nom":"Furiani","type":"Bastia","periode":"Vestiges-château","histoire":"FURIANI, au Moyen Âge Furiani était un fief seigneurial avec un château. La  tour est ce qui subsiste de lancien château de Furiani. Elle a été entièrement rebâtie après 1763 par Pascal Paoli, doù son nom de « Tour paoline ».\nLa tour de Furiani et la tour de Nonza sont les deux seules tours carrées édifiées sous Pascal Paoli.\nFuriani était une des places fortes appartenant aux seigneurs de Bagnaria ; elle a été fortifiée depuis la présence pisane, du XIe siècle au XVe siècle, mais surtout par les Gênois.\nSur une plaque apposée au pied de la tour, il est écrit : « Cette tour carrée dont les échauguettes sont restées inachevées, a été édifiée par Pascal Paoli à lépoque de son généralat (1765  1769). Assiégé sept fois entre 1729 et 1769, Furiani fut à lépoque des révoltes, un haut lieu de la résistance contre la République de Gênes. La date de lédification du clocher qui surmonte la tour est incertaine mais sa présence est notée en 1839 »","architecture":"FURIANI , cernées par cette ancienne forteresse génoise, ses vieilles maisons aux façades hautes sélèvent fièrement. Étagées à flanc de collines, ces habitations traditionnelles de la Corse rurale donnent à larrière- pays bastiais son véritable caractère. emprunter ses étroites ruelles pavées qui serpentent entre lavoirs, fontaines et fours à pain suffit à offrir une déambulation dans lhistoire. Cest ici, au sommet du village, que la commune réserve lun de ses joyaux. Tenue à distance des «importuns» par une petite heure de marche, la chapelle de santa Maria Assunta remonte le temps jusquau iXe siècle. Bâtie sur un plateau, cette ancienne église romane aurait même abrité un ermitage. sur ce promontoire prisé des randonneurs, lauthenticité des lieux a su résister au temps et le panorama suffit à découvrir lautre facette de la commune.  sur sa partie littorale, la commune a su profiter de lexode rural du siècle dernier pour prendre son essor économique avec limplantation de nombreux commerces dynamiques. première brasserie dans lhistoire de la Corse, À quelques encablures, cest un autre équipement qui fait la renommée de la commune : tristement connu pour la tragédie du 5 mai 1 992, le stade Armand-Cesari accueille dans son enceinte le sporting Club de Bastia. il demeure, depuis près dun siècle, le berceau de la « passion bleue ».","habitants":"XVII-XVIII\"","divers":"Furiani 42°39'32\" nord 9°24' 54\" Est                        grav 1-2 écomusé grav 3","gps":"","images":["../../jctruffet.com/image/image_20/20_Furiani_1.jpg","../../jctruffet.com/image/image_20/20_Furiani_2.jpg","../../jctruffet.com/image/image_20/20_Furiani_3.jpg"]},"Consult_chateau_formulairefdbd":{"id":"Consult_chateau_formulairefdbd","dept":"20","canton":"","commune":"Muracciole","nom":"Muracciole","type":"Corte","periode":"Château","histoire":"MURACCIOLE 1790 - le département de Corse est créé avec Bastia pour préfecture.1791 -Corte devient chef-lieu du département ; le siège de lévêché est fixé à Ajaccio.\n1793 - An II. la Convention divise l'île en deux départements : El Golo (l'actuelle Haute-Corse) et Liamone (l'actuelle Corse-du-Sud) sont créés. La commune qui porte le nom de Muracciole, dans le canton du Tavignano, se retrouve dans le canton du Vecchio, le district de Corte, dans le département d'El Golo.\n1801 - Sous le Consulat, au Bulletin des Lois, la commune de Muracciole passe dans l'arrondissement de Corte, dans le département d'El Golo.  En 1811 - Les départements d'El Golo et du Liamone sont fusionnés pour former le département de Corse.  En 1824, les communes de Tallone, Zuani, Vivario et Muracciole cèdent des terrains pour la création de la commune d'Aleria.. En 1828 - Muracciole passe dans le canton de Venaco.      En1954  Muracciole avec les communes de Casanova, Poggio-di-Venaco, Riventosa, Santo-Pietro-di-Venaco, Venaco et Vivario, composent le canton de Venaco. Muracciole comptait alors 117 habitants, en.1975  le département de Corse est divisé en deux départements. Muracciole se retrouve dans celui de Haute-Corse.","architecture":"MURACCIOLE, le château « Renaissance » de Muracciole a été bâti vers la fin du XIXe siècle avec les mêmes matériaux que ceux utilisés pour les Tuileries. Il est une propriété privée. Le portail d'entrée à 2 vantaux en fer forgé ouvragé porte les initiales A.M. du propriétaire Ange Muracciole, ancien sénateur de Corse, qui l'a fait construire à son retour du Panama où il avait fait fortune avec le canal. Son jardin est ceint d'une clôture en fer forgé.  On l'aperçoit au détour d'un virage de la D 343, depuis Vivario. Il figure à l'inventaire préliminaire du patrimoine de la Corse (bâti) sur la base de territoires pertinents (microrégions de la Corse).","habitants":"XVIII-XIX\"","divers":"Muracciole 42°10' 15\" nord 9°11' 05\" Est","gps":"","images":["../../jctruffet.com/image/image_20/20_Muracciole_1.jpg","../../jctruffet.com/image/image_20/20_Muracciole_2.jpg","../../jctruffet.com/image/image_20/20_Muracciole_3.jpg","../../jctruffet.com/image/image_20/20_Muracciole_4.jpg"]},"Consult_chateau_formulairec5ed":{"id":"Consult_chateau_formulairec5ed","dept":"20","canton":"","commune":"Porto-Vecchio","nom":"Porto_Vecchio","type":"Porto-Vecchio","periode":"Forteresse-Citadelle","histoire":"PORTO VECHIO; construite en 1539, la citadelle, voit le jour sous limpulsion des Génois qui confie la gestion de lîle de Beauté à loffice Saint-Georges, lequel est alors la plus grande banque du monde entier. Souhaitant protéger lîle de toute invasion ou attaque éventuelle, les Génois font construire la forteresse. Cest pourquoi la citadelle arbore une allure solide, et son architecture est travaillée avec de larges meurtrières. Aujourdhui, la citadelle est devenue un site très prisé par les touristes.  A visiter autour de la place de la République, léglise paroissiale Saint Jean-Baptiste. Erigée au XIXe siècle, elle porte le nom du patron de Porto-Vecchio. Elle possède une histoire originale car sa construction a été influencée par les habitants des campagnes alentours. En effet, ces derniers souhaitaient retrouver en cette église une architecture similaire à celle érigées dans leurs villages. Cest ainsi que le clocher de léglise Saint Jean-Baptiste est une réplique de celui de la ville de Quenza.  Le bastion de France, le plus célèbre. Il fut terminé en 1542. Les Génois le baptisèrent U Baluardo di a marina car il était affecté à la garde du port. Ce monument avait pour vocation de surveiller le mouvement des bateaux dans le port et dalerter les invasions maritimes. Aujourdhui restauré, il permet chaque été de voir des expositions dart, peintures et sculptures. Il dispose également dun toit-terrasse offrant une vue panoramique sur le golfe de Porto-Vecchio.","architecture":"PORTO VECHIO;  pour un moment de plénitude et de pur détente, rendez vous sur la plage de Palombaggia. Paradisiaque, cette plage est considérée comme lune des plus belles de Corse. Avec son eau turquoise et en pente douce, son sable fin, ses pins parasols et ses collines environnantes, elle possède un décor de carte postale dont vous ne vous lasserez pas. De plus, cette sublime plage corse vous propose de faire le plein de divertissements avec ses activités nautiques et ses spots pour manger ou boire un verre les pieds dans leau. La Porte génoise. Elle était lunique entrée de la citadelle. Protégée par une solide porte et des mâchicoulis, elle était défendue par un canon placé en hauteur, sur une plate-forme servant de mirador. Cette porte donnait un accès direct au port. Elle offre, aujourdhui, un point de vue incontournable sur les marais salants. Les Porto-Vecchiais appelaient ce quartier Piazza di Po car il constituait certainement le lieu où demeurait le podestat (titre décerné au Moyen-Âge au premier magistrat de la ville)   Le bastion de la Porte, situé entre le bastion Sant Antonu et le bastion de France, fait front au Golfe de Porto-Vecchio. Il nest visible que de lextérieur de la citadelle, depuis le port de plaisance. Il est également appelé bastion du Canon.\nLe bastion du Palais, U baluardo di u Palazzu publicu. Cest dans cette ancienne caserne que les soldats et officiers génois tenaient garnison .","habitants":"XV-XVI\"","divers":"pas de gps","gps":"","images":["../../jctruffet.com/image/image_20/20_Porto_Vecchio_1.jpg","../../jctruffet.com/image/image_20/20_Porto_Vecchio_2.jpg","../../jctruffet.com/image/image_20/20_Porto_Vecchio_3.jpg","../../jctruffet.com/image/image_20/20_Porto_Vecchio_4.jpg"]},"Consult_chateau_formulairefb04":{"id":"Consult_chateau_formulairefb04","dept":"20","canton":"","commune":"Alata","nom":"Punta","type":"Ajaccio","periode":"Château","histoire":"PUNTA,   Afin de perpétuer en Corse le souvenir de ses ancêtres, Charles-Jérôme Pozzo di Borgo ( 1879), fait duc par le roi de Naples, en 1852 en remerciement des services rendus aux Bourbon, avait demandé à ses neveux et héritiers de reconstruire le village de Pozzo di Borgo, le berceau familial détruit en 1594 par les Barbaresques, les habitants fuyant dans la commune voisine d'Alata. Du fait de la grande aridité des terres cela ne fut pas possible, mais afin de remplir cette obligation morale, ils firent néanmoins édifier cette demeure de 1883 à 1891.","architecture":"PUNTA , le château correspond à la reconstruction, avec ses pierres dorigine, de lun des pavillons Renaissance du palais des Tuileries (Paris), incendié sous la Commune. Après la décision de sa démolition intégrale par la Chambre des députés, l'entrepreneur Achille Picard avait fait l'acquisition, en 1882, des ruines du palais, au terme d'une vente aux enchères, pour 33 000 francs3. Il les revend au détail ; le lot le plus important revient au duc Jérôme Pozzo di Borgo (1832-1910) et à son fils, le comte Charles (1858-1902).\nLes pierres démontées et relevées par l'architecte Albert-Franklin Vincent furent mises en caisse puis acheminées par voie ferrée jusqu'à Marseille, puis convoyées par bateau pour Ajaccio ; la fortune de cet oncle permit de financer une entreprise qui nécessita, afin d'acheminer les matériaux jusqu'au lieu choisi, le creusement dans le roc d'une route de sept kilomètres. Cette difficile et coûteuse entreprise n'empêcha pas le duc Pozzo di Borgo de renouveler l'expérience de 1896 à 1899 en faisant déposer, transporter et réédifier (en l'agrandissant) par l'architecte Louis Dauvergne le château XVIIIe de Montretout, à Saint-Cloud, sur le domaine normand de Dangu, acquis en 18842, et d'en faire aménager le parc par Achille Duchêne.","habitants":"XIX-XX\"","divers":"pas de gps","gps":"","images":["../../jctruffet.com/image/image_20/20_Punta_1.jpg","../../jctruffet.com/image/image_20/20_Punta_2.jpg","../../jctruffet.com/image/image_20/20_Punta_3.jpg","../../jctruffet.com/image/image_20/20_Punta_4.jpg","../../jctruffet.com/image/image_20/20_Punta_5.jpg"]},"Consult_chateau_formulaire0ce3":{"id":"Consult_chateau_formulaire0ce3","dept":"20","canton":"","commune":"Quenza","nom":"Quenza","type":"Propriano","periode":"Forteresse","histoire":"QUENZA, est une curiosité architecturale, situé dans le Parc naturel régional de Corse, au cur de lAlta Rocca. Construite par Sébastien Colonna Cesari, Consul Général de France à Florence jusquen 1932, sur le modèle des palazzi toscans, cette belle maison de maître à tour carrée et fenêtres à colonnettes fut érigée dans l'entre-deux guerres, en 1935.\nOriginaire dune famille de notables ruraux, Sébastien Colonna Cesara fut contraint de quitter sa terre natale à lâge de 19 ans, suite au décès tragique de son père, qui provoqua une terrible Vendetta entre deux familles rivales. A son retour en Corse, il fit édifier ce château à lentrée du village au milieu dun parc et dun environnement naturel et paysager particulièrement remarquables, avec une vue imprenable sur les Aiguilles de Bavella. Sinspirant des palais toscans, de style médiéval, il est construit par des artisans-maçons venus dItalie, en pierres de granite blond et rosé, ainsi que de briques. Rêve inachevé par manque de fonds, Sébastien Colonna Cesari y décède le 4 avril 1939.Le château est un exemple tout à fait unique au niveau insulaire, et représente une certaine idée du faste de lentre-deux-guerres. La commune de Quenza, propriétaire du château, souhaite lui redonner vie. Une étude d'opportunité et de faisabilité est actuellement portée par la Communauté de Commune d'Alta Rocca . Ce projet de réhabilitation sera axé autour de plusieurs dimensions, à la fois environnementales, culturelles et administratives.","architecture":"QUENZA, votre soutien est indispensable pour sauvegarder le château de Quenza, un édifice rural du XXe siècle en péril imminent. Situé à Quenza, à 45 km de Porto-Vecchio et à 38 km de Propriano, le château fut construit au début du XXe siècle et a obtenu le label Architecture Contemporaine Remarquable en 2020, à linitiative de la direction régionale des affaires culturelles et de la sous-préfecture.\nAujourd'hui propriété de la commune, cette imposante bâtisse est en péril imminent, et laccès en est formellement interdit. Les niveaux intérieurs sont pour lessentiel déjà affaissés. Chaque hiver fait redouter des chutes de neige importantes, tout comme chaque épisode de pluies intenses, qui pourraient engendrer leffondrement de la toiture. Une partie de lédifice, détérioré par les brutales intempéries du mois de novembre 2021, serait alors emportée.","habitants":"XIX-XX\"","divers":"pas de gps","gps":"","images":["../../jctruffet.com/image/image_20/20_Quenza_1.jpg","../../jctruffet.com/image/image_20/20_Quenza_2.jpg","../../jctruffet.com/image/image_20/20_Quenza_3.jpg"]},"Consult_chateau_formulairec863":{"id":"Consult_chateau_formulairec863","dept":"20","canton":"","commune":"Rogliano","nom":"Rogliano","type":"San-Martino-di-Lota","periode":"Vestiges","histoire":"ROGLIANO , seigneurie de San-Colombano. Le château qui domine Rogliano nest pas un simple castellu : cest « le » château seigneurial. Un seigneur génois y « régnait » : un Da Mare, propriétaire de la seigneurie à partir de 1246, cest-à-dire des villages dErsa, Tomino, Centuri, Morsiglia, Meria, Pino, Barretali, Luri, Cagnano jusquaux frontières de lautre seigneurie cap corsine : celle des Gentile qui régnaient à Brando, Erbalunga, Pietra-Corbara, Canari, Nonza.\nLes Da Mare levaient des impôts sur leurs vassali, habitants de tous ces villages, sauf sur les franchis  exemptés dimpôts (taille, corvées). Grâce à ces revenus, le seigneur entretenait le château, détruit par lamiral génois Andrea Doria en 1554 ; puis la Tour de Barbara, dame-seigneur de San Colombano de 1554 à 1604. Le seigneur faisait des dons pour construire le couvent franciscain qui domine le village depuis 1520 et léglise conventuelle, lun des deux lieux de sépulture de tous les villageois avec léglise Saint-Agnel (abbé napolitain)   Macinaggio et Centuri assuraient la vie économique du pays : pêche au corail, exportation des vins (notamment des muscats : excellents), importation du blé. Doù la richesse des cap corsins, leur haut niveau dinstruction dans les universités italiennes et leurs nombreuses constructions roglianaises.","architecture":"ROGLIANO en haut du cap Corse est regardé aujourdhui comme un simple village. Pourtant, lancien pagus aurelianus (le pays dAurélien, empereur romain) était la capitale de la Seigneurie de San Colombano. Le château qui domine Rogliano nest pas un simple castellu : cest « le » château seigneurial. Un seigneur génois y « régnait » : un Da Mare, propriétaire de la seigneurie à partir de 1246, cest-à-dire des villages dErsa, Tomino, Centuri, Morsiglia, Meria, Pino, Barretali, Luri, Cagnano jusquaux frontières de lautre seigneurie cap corsine : celle des Gentile qui régnaient à Brando, Erbalunga, Pietra-Corbara, Canari, Nonza.\nDu CASTELLACIU (le château maudit) San Colombanu, (hameau de Vignale), on domine lespace pour comprendre lhistoire de Rogliano. Ici, dans les ruines de ce château construit au XIIe siècle par Ansaldo da Mare, les siècles de plomb pèsent encore. Les génois, en 1554, ont détruit le château et, tout à côté, le Castellu San Colombanu (appartenant aux Negroni qui lont habité de 1556 à 1947) est lui-même ruiné. Vue immense de ce promontoire sur la vallée et sur les îles de larchipel toscan : le regard peut suivre, par temps clair, la ligne découpée de Capraia, lîle aux chèvres, comme celle de lIle dElbe. Elles paraissent si proches quand la mer est dhuile","habitants":"XV-XVI\"","divers":"pas de gps","gps":"","images":["../../jctruffet.com/image/image_20/20_Rogliano_1.jpg","../../jctruffet.com/image/image_20/20_Rogliano_2.jpg","../../jctruffet.com/image/image_20/20_Rogliano_3.jpg"]},"Consult_chateau_formulairefb39":{"id":"Consult_chateau_formulairefb39","dept":"20","canton":"","commune":"Prato-di-Giovellina","nom":"Seravalle","type":"Golo-Morosaglia","periode":"Vestiges","histoire":"SERAVALLE  du Moyen Age   un des édifices militaires médiévaux les mieux conservés de l'île. Castello a peut-être été construit au  XIIIe siècle, occupé par les Gênois au  XVe siècle, puis abandonné au  XVIe siècle. Le castello est constitué d'un rempart circulaire percé de plusieurs archères. Il correspond à un deuxième état de construction, postérieur à celui de la tour. deux ou trois bâtiments ont été accolés à l'intérieur de la courtine. Au centre, le donjon carré présente une maçonnerie révélant deux campagnes de construction. La partie supérieure montre un aspect similaire à celui de la courtine. La partie inférieure est constituée de moellons de calcaire bien taillés, disposés en assises horizontales selon un rythme faisant alterner assises épaisses et assises plus fines. L'ensemble du rez-de-chaussée est occupé par une citerne recouverte d'une voûte.","architecture":"SERAVALLE,  monuments historiques, cette notice reprend intégralement les termes de larrêté de protection au titre des Monuments historiques. Elle répond à lobligation réglementaire du ministère de la Culture détablir la liste générale des édifices protégés. Elle est donc opposable et fait foi juridiquement. Aucune copie numérique ou papier ne sera fournie par courrier ni courriel. Le dossier de protection complet et larrêté sont consultables uniquement sur place, dans la salle de lecture de la Médiathèque du patrimoine et de la photographie (MPP), à Charenton-le-Pont .","habitants":"XIII-XV\"","divers":"pas de gps","gps":"","images":["../../jctruffet.com/image/image_20/20_Seravalle_1.jpg","../../jctruffet.com/image/image_20/20_Seravalle_2.jpg","../../jctruffet.com/image/image_20/20_Seravalle_3.jpg"]},"Consult_chateau_formulaired9f4-2":{"id":"Consult_chateau_formulaired9f4-2","dept":"20","canton":"","commune":"St -Florent","nom":"St_Florent","type":"Calvi","periode":"Forteresse","histoire":"SAINT-FLORENT; le seul témoignage de cette époque est la cathédrale Santa Maria Assunta, appelée également cathédrale du Nebbiu. Construite au XIIe siècle à lemplacement dune basilique paléochrétienne, elle est darchitecture typiquement pisane, et possède une très belle façade de calcaire blanc. Si le décor extérieur est très simple, lintérieur est majestueux, avec ses colonnes sculptées et ses nefs. Son premier évêque prit ses fonctions en 1133, et le diocèse du Nebbiu devint indépendant de Gênes peu de temps après.Cest là que se trouvent les reliques de Saint Flor, patron de la ville, qui était un soldat romain martyrisé au IIIe siècle de notre ère. Une légende, rapportée par Mérimée, veut que la cathédrale exhale parfois un parfum de violettes, le jour de la saint Flor. La relique du saint est fêtée tous les 3 ans, le lundi de pentecôte. Cette coutume remonte au XVIIIe siècle. Les reliques furent données par Rome à lévêque du Nebbiu. Signalons que la cathédrale est habituellement fermée, mais que les clés sont disponibles à loffice du tourisme.Ce seront les génois qui se réapproprieront le territoire, en y édifiant une citadelle. La ville avait une vocation à la fois militaire et marchande. Les fortifications furent ainsi érigées en 1440, et les génois y installèrent la résidence des gouverneurs du Nebbiu.","architecture":"SAINt_FLORENT; la ville se développe et devient une place commerciale importante. A linstar de Bastia et Biguglia, Saint Florent accepte la tutelle de lOffice de Saint Georges en 1484. Les génois, conscients de limportance de la ville, développent les fortifications et font assécher les marais. Saint Florent connaîtra un déclin à partir du XVIe siècle, lors de loccupation par les FrançaisLa ville est de nouveau cédée aux génois en 1559 par le traité de Cateau-Cambrésis, mais ses fortifications sont détruites. Le système défensif se remet en place quelques années plus tard, devant la menace barbaresque. Autour du Turrione (donjon), on construit des maisons et une église. Malgré les troubles des XVIIe et XVIIe siècles, Saint Florent continue de jouer une importance stratégique.\nEn 1765, les français sy installent, restructurent la forteresse et aménagent des bâtiments annexes, comme la poudrière. Lédifice, au XIXème siècle, est rehaussé, couvert, et devient une caserne. La ville acquiert la citadelle en 1974, et en 1991, les fortifications et le Turrione sont inscrits aux Monuments Historiques, ce qui permit leur restauration.","habitants":"XV-XVIII\"","divers":"pas de gps","gps":"","images":["../../jctruffet.com/image/image_20/20_St_Florent_1.jpg","../../jctruffet.com/image/image_20/20_St_Florent_2.jpg","../../jctruffet.com/image/image_20/20_St_Florent_3.jpg"]},"Consult_chateau_formulaire2b5b":{"id":"Consult_chateau_formulaire2b5b","dept":"20","canton":"","commune":"sanguinaires_Ajaccio","nom":"Tour Genoises","type":"Ajaccio","periode":"Tours","histoire":"TOUR GENOISE l'archipel des Sanguinaires se compose à vue, après la presqu'île de la Pointe de la Parata, des îlots Isola di Porri ou I Porri (l'îlot des poireaux), d'un gros rocher U Sbiru, de l'Isoloto, l'Oga ou encore l'Isulu di l'Oca (l'îlot des cormorans), de l'Isola Cala d'Alga et enfin au bout signalant l'entrée du golfe d'Ajaccio, le grand îlot principal Mezu Mare ou Grande Sanguinaire.  En 1959, les îles furent vendues à une société immobilière qui envisageait de lotir les îlots et d'installer un téléphérique de la Pointe de la Parata à la Grande Sanguinaire. Le projet ne se réalisa pas, et le conseil départemental de la Corse-du-Sud a ensuite acquis l'intégralité du site Bénéficiant d'une grande notoriété et soumis à une fréquentation touristique importante grâce à son patrimoine naturel, historique et culturel considérable, l'archipel et la presquîle se doivent d'être protégés, mis en valeur et accessibles dans un esprit de développement durable. La pointe de la Parata, au sein de l'archipel des Sanguinaires, est intégré en novembre 2008 au Réseau des grands sites de France. Ce label Grand Site de France lui est attribué en mars 2017 pour une durée de 6 ans .Les édifices bâtis sont une partie importante qui fait la renommée du paysage singulier de l'archipel et du Grand Site en général comprenant l'archipel et la presquîle, La tour génoise de la Parata est édifiée en 1550 par Giacomo Lombardo, un chef maçon génois. Ce monument endommagé par les intempéries est sélectionné en 2021 par la Mission patrimoine pour la sauvegarde du patrimoine en péril.","architecture":"TOUR GENOISE une tour similaire, construite en 1590, se trouvait autrefois sur le point culminant de l'île de la Grande Sanguinaire et s'appelait la Sanguinera di Fuori ou la Sanguinera di Mare. La tour de Grande Sanguinaire a été démolie au XIXe siècle pour permettre la construction du phare en 1840-1844. Une deuxième tour, carrée et plus petite, située à l'extrémité sud-ouest de l'île de la Grande Sanguinaire, a été construite dans un but défensif, dans la seconde moitié du XVIIIe siècle (plan terrier de 1770). Elle s'appelait la torretta piccola et aujourd'hui, on la nomme la torra di Castelluchju.\nEn 1806, Mezu Mare devient un poste sanitaire avec la construction dun lazaret, destiné à la mise en quarantaine des pêcheurs de corail revenant d'Afrique ; le lazaret sera transféré sur la terre ferme en 1847. Le soubassement pentagonal du bâtiment subsiste, entre le sémaphore et le phare. .                  La tour de la Parata est une tour génoise en ruine située à une altitude de 55 mètres, sur la pointe de la Parata, au nord-est des Îles Sanguinaires. La tour a été construite en 1550-1551 par Giacomo Lombardo ; elle a une hauteur de 12 m et un diamètre de 7,3 m au niveau de la plate-forme du toit, et est composée de deux salles voûtées superposées. Sur les archives génoises, la tour est appelée la Sanguinera di Terra. Elle est restée la propriété du ministère de la Guerre jusqu'en 1838, année où la presqu'île a été cédée à la commune d'Ajaccio. Ceci n'est qu' partie receuillie, il en existe beaucoup d'autre sur l'isle.","habitants":"XV-XVI\"","divers":"Tour de Diana grav-9 ' de Porto- Vecchio grav 2  , tour Sanguinaire grav-6, Tour Senèque grav-1, tour capo-ajaccio grav-4, tour centuri- grav-7, tour Pogggio grav-8,  tour Eberalungua-grav-1                         pas de gps","gps":"","images":["../../jctruffet.com/image/image_20/20_Tour_Genoises_1.jpg","../../jctruffet.com/image/image_20/20_Tour_Genoises_2.jpg","../../jctruffet.com/image/image_20/20_Tour_Genoises_3.jpg","../../jctruffet.
