com/image/image_20/20_Tour_Genoises_4.jpg","../../jctruffet.com/image/image_20/20_Tour_Genoises_5.jpg","../../jctruffet.com/image/image_20/20_Tour_Genoises_6.jpg","../../jctruffet.com/image/image_20/20_Tour_Genoises_7.jpg","../../jctruffet.com/image/image_20/20_Tour_Genoises_8.jpg"]},"Consult_chateau_formulairecc9d-3":{"id":"Consult_chateau_formulairecc9d-3","dept":"20","canton":"Taravo-Ornano","commune":"Santa Maria Siché","nom":"Vico_Ornano","type":"vestiges château","periode":"XVIII-","histoire":"VICO D'ORNANO du D'Ornano Paul-François , marquis (maître d'ouvrage)  Maison de notable construite sur les plans de l'architecte Barthélémy Maglioli  à la demande du marquis Paul François d'Ornano. Achevée en 1913. Ornée d'un décor peint exécuté par Jean-Baptiste Bassoul. Mentionnée en 1930 comme propriété de Vincent d'Ornano, frère du marquis.","architecture":"VICO D'ORNANO,  il s'agit d'une grosse demeure pourvue de trois tourelles d'angles coiffées en poivrière, et caractéristique d'un certain type d'architecture domestique de la seconde moitié du XIXe siècle. L'intérieur renferme des décors peints réalisés par Jean-Baptiste Bassoul, notamment un vestibule de style Néo-Pompéien. La salle à manger de style Renaissance, le salon et la chambre de style Louis XV, et le bureau Empire sont traditionnels des aménagements intérieurs des bâtisses du XIXe siècle. Il s'agit d'une des rares grandes maisons de notables de Corse à posséder cette apparence de petit château. Éléments protégés MH : le château en totalité : inscription par arrêté du 10 mai 2012.  toit à longs pans ; croupe. Emplacement, forme et structure de lescalier  de distribution extérieur ; escalier intérieur, commentaire descriptif de l'édifice  Logis réparti sur le rez-de-chaussée surélevé desservi par un escalier de distribution extérieur perpendiculaire à la façade et sur l'étage carré desservi par un escalier intérieur. Présence de deux tours d'angle sommées de flèches polygonales. Lucarnes à fronton mouluré éclairant le comble. Belvédère. Armoiries en façade.","habitants":"D'Ornano Paul-François \"","divers":"pas de gps","gps":"","images":["../../jctruffet.com/image/image_20/20_Vico_Ornano_1.jpg","../../jctruffet.com/image/image_20/20_Vico_Ornano_2.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','20 — Département 20'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)showDet(start);
