const FULL={"Consult_chateau_formulaire3b1f":{"id":"Consult_chateau_formulaire3b1f","dept":"67","canton":"Obernai","commune":"Andlau","nom":"Andlau","type":"Château","periode":"XIII_XVI","histoire":"ANDLAU,  En 996, une famille d'Andlau est citée dans un texte. Cet acte fait des Andlau l'une des familles la plus ancienne d'Alsace.\nVers 1246, Eberhard d'Andlau réalise la construction d'un château.Vers 1264, le château semble terminé et habité. En 1274, la famille d'Anlau fait allégeance à l'évêque de Strasbourg. En 1376, le seigneur d'Andlau blesse gravement un soldat de Strasbourg. Les représailles sont terribles. Le château semble avoir été pillé. En 1438, le château est habité par un riche bourgeois devenu le châtelain (Thenie Lamprech). Il semble qu'il soit fait capturé contre rançon par les soldats de la ville de Obernai . En 1618, début de la \"guerre de 30 ans\" . Ce château d'habitation souffre un peu durant cette dévastatrice guerre. En 1633, les Suédois attaquent puis envahissent le château. Vers 1636, les troupes de Strasbourg occupent maintenant la place. En 1648 (le 24 octobre), signature du Traité de Westphalie mettant fin à la guerre de \"30 ans\", en 1673, une petite garnison de soldats de Strasbourg garde le château. En 1678, le roi Louis XIV (voir liste des rois) envoie une troupe commandée par le maréchal Créqui pour occuper la région. Le château est pillé puis partiellement détruit. Mais le seigneur d'Andlau est toujours propriétaire du domaine. En 1792, les révolutionnaires le réquisitionnent puis le vendent à un commerçant. A partir de 1806, ce nouveau propriétaire démantèle le château et vend les plus belles boiseries et pierres aux plus offrants. En 1818, le Comte Antoine Henri d'Andlau achète la ruine et tente de consolider les murs détruits par 12 ans de \"saccage\". En 1859, des travaux importants de consolidation sont entrepris.  En 1926, la ruine est classée aux Monuments Historiques. En 1928, le Club Vosgien entreprend quelques travaux de restauration. A la fin du 20ème siècle, l'état et la collectivité aident le Comte Guillaume d'Andlau à consolider certains murs de ce merveilleux et unique château.","architecture":"HAUT-ANDLAU, la construction de cette ancienne demeure seigneuriale d'Andlau date de 1246 à 1264. C'est un château de style médiéval. Son propriétaire initial était Eberhard d'Andlau. Encore bien conservé, lédifice possède 2 donjons jumeaux, dont l'architecture est unique en France.vant de rêver sur les fenêtres du logis, je m'attarde sur les donjons. Ils semblent massifs et devaient avoir une triple fonction : Tour d'observation. De là haut, la vue sur la vallée d'Andlau et de la Kirneck doit être unique. (Hélas, il n'y a plus d'escalier pour confirmer mes dires). Protection ultime en cas d'attaque. Les corbeaux, devant supporter une bretèche, montrent le caractère défensif. Symbole de la puissance du seigneur. Depuis la route nationale dans la vallée, bien qu'aujourd'hui cachées par la forêt (qui ne devait pas exister au moyen âge) ces 2 puissantes tours sont visibles. Le symbole est fort. Situé à 450 mètres daltitude, le bâtiment se situe en pleine forêt mais il est accessible à pied. Le château du Haut-Andlau a connu de nombreux propriétaires différents. Il fut détruit en 1633. Il est aujourdhui, en partie restauré. Ses murs ont été consolidés , le château du Haut-Andlau est devenu le centre de multiples activités, tournant autour de l'Art Contemporain et de la Formation. Le comte Guillaume d'Andlau est devenu le propriétaire du château en 2005 et une convention de gestion du site a été signée en 2008 entre le nouveau président de l'association Raoul Bock et le propriétaire. Le Public peut y accéder librement. Vous pouvez aussi visiter le château du Spesbourg qui se trouve non loin de là.","habitants":"Famille de Frédéric-Antoine-Marc d'Andlau\"","divers":"haut-Andlau 3 gravures                                                     GPS : 48° 24' 05\" Nord, 7° 24' 45\" Est","gps":"48° 24' 05\" Nord, 7° 24' 45\" Est","images":["../../jctruffet.com/image/image_67/67_Andlau_1.jpg","../../jctruffet.com/image/image_67/67_Andlau_2.jpg","../../jctruffet.com/image/image_67/67_Andlau_3.jpg"]},"Consult_chateau_formulaire00f2":{"id":"Consult_chateau_formulaire00f2","dept":"67","canton":"Obernai","commune":"Andlau","nom":"Andlau_Spesbourg","type":"Châteaux","periode":"XIII_XVI","histoire":"ANDLAU-SPESBOURG   sa construction a débuté de 1246 à 1264. Sa construction est attribué à Alexandre de Stahleck-Dicka, avoué de l'abbaye d'Andlau, originaire de Mayence. Il est fait mention du château du Spesbourg, pour la première fois, qu'en 1322. A la mort de Gauthier de Dicka. Le château du Spesbourg fut transmis en 1386, aux seigneurs d'Andlau. Le château est définitivement ruiné pendant la guerre de Trente Ans (1630), alors qu'il servit de refuge à ses habitants. A la Révolution, l'édifice est diminué de nombreuses pierres, utilisées pour créer d'autres bâtisses. Après plusieurs propriétaires, le château revient définitivement à la commune d'Andlau en 1904. Depuis 1985, une association restaure le château et entretient les vestiges du Spesbourg. Le château du Spesbourg est plus accessible pour la visite et mieux sécurisé. Le logis seigneurial est ajouré, coté Est, par des fenêtres en arc brisé, dont certaines ornementées de grès. Une oeuvre d'art contemporain de Marc Linder est intégrée dans l'une des baies. Le Spesbourg possède un large donjon, de forme carré, qui est haut de 24 mètres. Le donjon n'est pas accessible pour l'instant. Il y a aussi une cour intérieure. Sur l'une des voûtes, on aperçoit des fragments de fresques, colorés. Les chapiteaux dévoilent des cheminées sculptées, qui évoquent un raffinement, peu connu, au XIVe siècle. Aujourd'hui, son propriétaire actuel est le comte Guillaume d'Andlau.","architecture":"ANDLAU-SPESBOURG l'aspect général rappelle le château-fort du XIIIe siècle, avec un donjon d'environ 24 m dont l'accès n'est possible que par une porte haut placée. Mais le côté de \" l'attaque \", au Nord, ne présente pas le profil habituel en pointe qu'on exposait dès 1200 à l'assaillant pour dévier les projectiles. Bien au contraire, le Spesbourg ne propose qu'un large mur plat, un mur \" bouclier \" dont l'épaisseur, curieusement, ne se distingue pas des murs Est et Sud. Le constructeur a occupé au mieux l'espace disponible sur le rocher et place le logis seigneurial côté Est, à l'abri des intempéries , mais militairement fragile. L'appareillage général, très soigné, témoigne de l'aisance des propriétaires de l'époque.Ces éléments confèrent au Spesbourg les caractéristiques d'un manoir qui sacrifie les impératifs militaires du XIIIe siècle aux nécessités de l'agrément de la résidence d'une famille noble du XIVe siècle. Casteland  remercie tout particulièrement l'association du château ainsi que Gabriel Gehenn pour les photos ainsi que les renseignements sur celui-ci.","habitants":"comte Guillaume d'Andlau. \"","divers":"Spesbourg-Andlau les 5 gravures GPS : 48° 24' 06,89\" Nord, 7° 23' 49,82\" Est","gps":"48° 24' 06,89\" Nord, 7° 23' 49,82\" Est","images":["../../jctruffet.com/image/image_67/67_Andlau_Spesbourg_1.jpg","../../jctruffet.com/image/image_67/67_Andlau_Spesbourg_2.jpg","../../jctruffet.com/image/image_67/67_Andlau_Spesbourg_3.jpg","../../jctruffet.com/image/image_67/67_Andlau_Spesbourg_4.jpg"]},"Consult_chateau_formulairee412":{"id":"Consult_chateau_formulairee412","dept":"67","canton":"Obernai","commune":"Barr","nom":"Barr_Kleppernburg","type":"Châteaux","periode":"XVI-XVII","histoire":"KLEPPERNBURGt; il date du XVIIIe siècle. La construction de l'Hôtel de Ville de Barr date de 1640,   fut gravement endommagé, par faits de guerre, pendant l'hiver 1944/1945. Il est appelé le château dit Kleppernburg ou Wepfermannsburg, puis devint la Maison du Bailli, puis  l'Hôtel de Ville. Le 1er château aurait été construit par le bailli de Frédéric II, Woelfelin ; reconstruction vers 1210 par les Wepfermann, le mur d'enceinte qui subsiste daterait du XIIIe siècle. Vers 1380, la reconstruction eut lieu, pour les Ochsenstein. A partir de 1568, le château devint la propriété de la ville de Strasbourg et servit de résidence au Bailli. Le Château Kleppernburg fut reconstruit en 1640 ainsi qu'une partie des communs et des ailes accolées avec passage d'entrée qui portent les dates 1617, 1641, 1644 et 1763. Le château vendu en 1791 sert depuis d'hôtel de ville et a reçu à cette occasion le clocheton de l'ancienne maison commune. En 1833, le rez-de-chaussée fut percé d'arcs en plein-cintre par l'architecte Kuhlmann ; en 1850 l'architecte Antoine Ringeisen aménagea une chapelle provisoire dans la salle du juge de paix créée au début du XIe siècle à l'étage d'un bâtiment annexe, le grenier aurait été détruit en 1873 mais le bâtiment avec garage et salle des fêtes qui le remplace semble plus récent ; endommagé pendant la dernière guerre, l'Hôtel de Ville de Barr a été restauré à l'identique. Il est inscrit aux M.H. partiellement depuis le 5/05/1931 pour ses façades et ses toitures,  de nombreuses variantes orthographiques de ces noms ont été utilisées, notamment à la fin de lépoque moderne, pendant laquelle le nom est parfois écrit Bach, Haubar, Haut Baar, Aubart, etc.   Le monument date du XIIIe siècle, le premier château fut construit pour le Bailli Frédéric II. Le château de Barr dit le château de Kleppernburg fut endommagé pendant la dernière guerre. Devenu l'Hôtel de Ville, il a été restauré, à l'identique.","architecture":"HAUT-BARR  le nom dorigine, tel que mentionné en 1112, est Borre, ou sa variante orthographique Borra, qui se retrouve dans un document de 1168. Ce nom a probablement pour origine le mot bor, ou bar, signifiant « sommet » ou « hauteur », provenant peut-être de la langue celtique plutôt que germanique. À partir du XVIe siècle, sous linfluence de la normalisation de lallemand, le nom Borr devient peu à peu Bar, parfois aussi orthographié Barr, bien que la forme dorigine apparaisse encore dans les documents jusquau XVIIe siècle. Lévêque Charles de Lorraine est le premier à utiliser à la fin du XVIe siècle la forme Hohenbarr, peut-être pour distinguer le château des localités du même nom se trouvant sur ses terres. Ce terme devient par la suite Hohbarr en allemand et traduit Haut-Barr en français.  Édifié en 1170, il est transformé et restauré au XIVe siècle. La première partie du château est construite au début du XIIe siècle, en grès, à 458 mètres d'altitude. Il est érigé pour surveiller la vallée de la Zorn et la plaine d'Alsace par les évêques de Strasbourg. C'est ainsi qu'il est surnommé « l'il de l'Alsace » par les Strasbourgeois. Le prince-électeur de Westphalie ordonne la destruction de plusieurs châteaux dont il fait partie, mais durant la guerre de succession d'Espagne, les soldats décident de réintégrer la forteresse.Le château est abandonné vers 1770, mais il continue à être occupé jusqu'à la Révolution française.","habitants":"Famille  les Ochsenstein\"","divers":"Barr-Klepernburg les 3 grav.                GPS : 48° 24' 32,51\" Nord, 7° 26' 58,08\" Est                                                                Haut GPS : 48° 43' 30' Nord, 7° 20' 19\" Est","gps":"48° 24' 32,51\" Nord, 7° 26' 58,08\" Est","images":["../../jctruffet.com/image/image_67/67_Barr_Klepernburg_1.jpg","../../jctruffet.com/image/image_67/67_Barr_Klepernburg_2.jpg","../../jctruffet.com/image/image_67/67_Barr_Klepernburg_3.jpg"]},"Consult_chateau_formulaire210a":{"id":"Consult_chateau_formulaire210a","dept":"67","canton":"Bischwiller","commune":"Fort Louis","nom":"Battiston","type":"Château","periode":"XJX","histoire":"BATTISTON appelé aussi le château de Fort-Louis est une Maison noble, bâti à Fort-Louis. Sa construction date du 2e quart du XIXe siècle. Il comporte un étage carré. Cette grande demeure dite château Battiston ou château de For- Louis ; elle a été construite vers 1835 pour Christophe Battiston, maire et riche propriétaire à Fort-Louis ; en 1935, elle a été léguée par une héritière à l'Evêché de Strasbourg qui y installa une cure d'air et une colonie de vacances. Dans la cour, devant la maison, se situe une grande ferme de plan en U, à l'arrière, se trouve un vaste jardin. Actuellement, le Château Battiston est une propriété privée, fermé au Public  Il subsiste peu de vestiges de la place forte de Fort-Louis-du-Rhin suite à sa prise par les Autrichiens en 1793, prise qui a entrainé des destructions importantes, ainsi que le démantèlement du fort d'Alsace. Lenceinte et les ruines du fort ont été en grande partie rasés au XIXe siècle. il ne subsiste que des talus, les fossés et quelques pans de murailles du fort Carré, tous les bâtiments intérieurs ayant disparu. Les deux bras du Rhin qui entouraient lîle ont été asséchés, le fleuve passe à un kilomètre à lest de lagglomération dont ne subsiste que la trame orthogonale.","architecture":"BATTISTON; la place est assiégée à plusieurs reprises au cours du XVIIIe siècle, notamment en 1793 par le général autrichien Lauer : Lors de la guerre de la Première Coalition, les troupes autrichiennes investissent Fort-Vauban (alias Fort-Louis), avec l'aide de troupes émigrées. La garnison française, forte de 4 500 hommes et disposant 111 pèces d'artillerie, était commandée par le général Michel Durand  secondé par le chef de bataillon du génie Dominique-André de Chambarlhac. Les tirs des assiégeants mirent le feu à la ville, dont la plupart des maisons étaient en bois, ainsi qu'aux forts Vauban et d'Alsace. Les civils s'étaient réfugiés dans les souterrains du fort pour tenter d'échapper aux bombardements. Le 14 novembre, après 1 mois de siège, manquant de munitions et de nourriture, la place tombe en présence du corps d'armée du prince de Condé. Les prisonniers républicains sont envoyés en captivité dans le Banat de Temeswar en Roumanie. Les Français reprennent possession de la place l'année suivante, sans reconstruire.  Le 1er janvier 1814 (dans le cadre de la Campagne de France), un corps d'armée russe sous Wittgenstein et un corps badois sous le comte de Hochberg passent le Rhin et rétablissent en partie les fortifications, mais après la paix, ils les rasent de nouveau. Le fort Carré est démantelé en 1818. Il est racheté par la commune en 1890.","habitants":"Famille de  Christophe Battiston, \"","divers":"Battiston GPS : 48° 48' 7,22\" Nord, 8° 03' 33,95\" Est","gps":"48° 48' 7,22\" Nord, 8° 03' 33,95\" Est","images":["../../jctruffet.com/image/image_67/67_Battiston_1.jpg"]},"Consult_chateau_formulaire2cb9":{"id":"Consult_chateau_formulaire2cb9","dept":"67","canton":"Benfeld","commune":"Benfeld","nom":"Benfeld","type":"Château","periode":"XV-XVIII","histoire":"BENFELD,  lun des fiefs de Huttenheim, qui depuis le XIVe siècle passe successivement aux Kind, aux Zorn de Bulach puis aux Mans, finit par échoir à la famille de Mullenheim. Celle-ci, au cours du XVIIIe siècle, se construit une résidence neuve dans le style de lépoque, avec de grandes fenêtres cintrées et un toit à combles brisés à la Mansart.\nLa demeure, située au nord du village, comprenait aussi un vaste domaine et des dépendances. Elle changea à plusieurs reprises de propriétaires au cours des XIXe et XXe siècles, pour finalement abriter un institut déducation spécialisée depuis les années 1960.   C'était l'ancien château épiscopal. Un 1er château épiscopal aurait existé à la fin du XIIIe siècle. Il fut restauré et agrandi ou reconstruit par la ville de Strasbourg, vers 1400. Il fut démoli, en 1694, par l'Evêque de Strasbourg. Un 2e château fut construit un peu plus à l'Est au XVIe siècle, pour l'hébergement de l'évêque. Il fut fortement restauré en 1626 et en 1700. Une aile lui fut adjointe en 1712, construite par Georg Huber (maître maçon). Le château fut revendu en 1811 à la Régie des Tabacs et le corps principal, après avoir servi de magasin  fut détruit en 1853.","architecture":"BENFELD Il fut  restauré en 1626 et en 1700. L'aile du XVIIIe siècle fut détruite, en 1879, lors du percement de la rue du château. Seule, subsiste une porte piétonne, murée dans le mur de clôture, qui date de 1575. La porte du château de Benfeld est inscrite aux M.H. depuis le 20/12/1988.                                                                          Le CHATELET,  la construction du Chatelet date de 1610. Il est inscrit aux M.H. partiellement pour les façades avec les oriels et toiture, son parquet en marqueterie de la pièce située dans l'angle Nord, au 1er étage, depuis le 7/12/1990.","habitants":"famille de Mullenheim\"","divers":"Benfeld grav -1-2   GPS : 48° 22' 16\" Nord, 7° 35' 50\" Est                                                                              Chatelet grav-3  GPS : 48° 22' 10\" Nord, 7° 35' 35\" Est","gps":"48° 22' 16\" Nord, 7° 35' 50\" Est","images":["../../jctruffet.com/image/image_67/67_Benfeld_1.jpg","../../jctruffet.com/image/image_67/67_Benfeld_2.jpg","../../jctruffet.com/image/image_67/67_Benfeld_3.jpg"]},"Consult_chateau_formulaire4539":{"id":"Consult_chateau_formulaire4539","dept":"67","canton":"Obernai","commune":"Dambach la ville","nom":"Bernstein","type":"forteresse","periode":"XIII_XVI","histoire":"Deux châteaux dans cet article ; Bernstein et Frélott.                                                                 BERNSTEIN, le comte Albert II, s'allie à Otton IV aux côtés de son parent Conrad II de Hunebourg, évêque de Strasbourg, dans le conflit qui l'oppose à Philippe de Souabe pour l'élection au titre d'empereur romain germanique. L'édifice originel fut probablement détruit à la fin du XIIe siècle par Philippe, lors d'une expédition punitive. Les comtes d'Eguisheim l'ont, par la suite, reconstruit et remanié dans les volumes que nous lui connaissons actuellement. Les deux fils d'Albert II de Dabo-Moha décèdent au cours d'un tournoi organisé par le comte de Flandre, Baudoin IV. Sa fille, Gertrude de Dabo, mariée à Thiébaud Ier de Lorraine, devint donc la seule héritière. C'est ainsi que Bernstein échut dans les possessions du Liste des ducs de Lorraine à la mort du comte, en 1211. A la mort de Gertrude de Dabo en 1225, la forteresse fut l'objet de vives querelles. Malgré 3 mariages, elle ne donna le jour à aucun enfant. Soutenu par l'évêque de Strasbourg, le Simon de Sarrebruck (Sigismond von Leinigen, comte de Linange, 3ème mari de Gertrude, occupa le château. Mais finalement, l'évêque, révoquant sa protection, s'empara de Bernstein au terme d'un siège d'un mois en l'an 1227. Bernstein fut officiellement octroyé à l'évêché par la Paix de 1236 avec l'assentiment de l'empereur Frédéric II. Le château sortit ruiné de cet épisode. L'évêque le fit restaurer soigneusement et en fit le siège d'un vaste bailliage épiscopal dont l'administration fut confiée à un gouverneur. Fin du XIVe siécle, le château du Bernstein servit de résidence aux évêques Jean de Lichtenberg de 1354 à 1365 et Lambert de Burne en 1374. En 1421, des mercenaires strasbourgeois l'investirent avec l'appui des bourgeois de Dambach lors de la guerre de Dachstein.","architecture":"BERNSTEIN; en 1422, la Paix de Spire le rendit à l'évêché. Les Armagnacs l'ignorèrent en 1444. Lors des révoltes du Bundschuh, il servit de refuge aux paysans insurgés. À la fin du XVIe siècle, l'évêque acheta la ville de Benfeld et y transféra le siège de son bailliage en 1580. Le château fut déserté et resta à l'abandon. Il fut pillé et incendié par les Suédois en 1632. Lors de la période révolutionnaire le château servit d'exutoire aux paysans des environs et fut vendu en tant que bien national. La légende nous rapporte que le château aurait été construit sur le rocher où logeait une famille d'ours, d'où son nom.                                                                    FREHOTT est une ancienne gentilhommière bâtie à Neuwiller-les-Saverne. C'est un château de style Classique. La construction du château de Freihof date du XIIIe, XIVe et XVIIIe siècle. Le château de Freihof est un ancien château médiéval, qui a presque entièrement disparu. Il existe 2 autres châteaux sur la commune à découvrir : Le Manoir Freihof.","habitants":"Les comtes d'Eguisheim\"","divers":"Bernstein  grav-1 GPS : 48° 19' 18,75\" Nord, 7° 23' 58,8\" Est      Bernstein et Frélott grav-2","gps":"48° 19' 18,75\" Nord, 7° 23' 58,8\" Est      Bernstein et Frél","images":["../../jctruffet.com/image/image_67/67_Bernstein_1.jpg","../../jctruffet.com/image/image_67/67_Bernstein_2.jpg"]},"Consult_chateau_formulairef7cf":{"id":"Consult_chateau_formulairef7cf","dept":"67","canton":"Maesrmoutier","commune":"Birkenwald","nom":"Birkenwald","type":"Château","periode":"XV-XVI","histoire":"BIRKENWALD, un château aurait existé à Birkenwald au XIIe siècle, dépendant de l'abbaye d'Andlau. Au XIVe siècle, il fut donné en fief aux Wasselnheim, puis à différentes familles et enfin à Louis d'Ingenheim en 1529. Son fils Nicolas Jacques fit construire le château actuel, qui porte ses armoiries et celles de sa femme Hélène de Landsberg (au-dessus de la porte d'entrée de la tourelle et de la porte de la grande salle du rez-de-chaussée). A sa mort, en l'absence d'un héritier, le château fut administré par l'abbaye d'Andlau jusqu'en 1649. Il fut alors donné en fief à Gabriel du Terrier, commandant de la garnison de Saverne et du Haut-Barr, époux de Marie Ursule d'Andlau, soeur de l'abbesse d'Andlau. Gabriel du Terrier ajouta à son nom celui de Bürckwald que ses descendants allaient conserver jusqu'à la Révolution, en premier lieu les Duprès d'Ordal, alliés aux Truchsess de Rheinfelden, puis aux Musiel de Berg, dont les armoiries figurent sur l'aile ouest du château. La dernière descendante, Fanny de Birkenwald, épousa le marquis de Grimaldi en 1802 et fit apposer leurs armoiries sur la tourelle d'escalier. Le château passa entre les mains de Louis Arth, maire de Saverne, puis du baron Adolphe de Latouche, également maire de Saverne, dont les descendants en sont toujours propriétaires. Depuis 1562, le château a subi peu de transformations extérieures. A l'intérieur, le rez-de-chaussée semble ne pas avoir été transformé; l'escalier d'accès à l'étage est celui du XVIe siècle (avec de nombreuses marques de tâcheron) ; l'étage a conservé la distribution d'origine, certaines pièces ont été ornées de lambris et d'un décor stuqué de la deuxième moitié du XVIIIe siècle.","architecture":"BIRKENWALD   le château est construit en bordure de la rue principale sur laquelle donne sa façade antérieure, la plus ornée et comportant les entrées. Un escalier aux bordures sculptées donne accès de la rue au château qui est en contrebas. Le bâtiment se compose de deux corps accolés, celui à l'est plus large que celui de l'ouest. Côté jardin ils sont couverts du même toit, côté rue deux toits à croupes parallèles couvrent l'aile Est. Ainsi que deux tours rondes flanquent la façade, réunies à l'étage par une terrasse plus tardive (les tours sont interrompues au niveau de l'étage) sur laquelle ouvrent des fenêtres aux chambranles sculptés. A l'ouest deux tours flanquent également l'élévation, réunies par un corps demi-circulaire . Entre les deux corps principaux une tourelle d'escalier demi-hors-oeuvre est couverte d'un toit en bulbe, avec écailles de bois. Les portes et les fenêtres de l'élévation nord ont des chambranles sculptés de motifs Renaissance d'une grande richesse : sirènes, rinceaux, coquilles, masques, profils masculins et féminins. Le rez-de-chaussée comprend une cave voûtée en berceau à l'est, au centre, une grande salle voûtée d'ogives sexpartites retombant sur des colonnes et des culots sculptés, dite salle des gardes. Dans l'aile ouest la cuisine a une cheminée portée par une colonne sculptée. Un escalier en vis, à limon hélicoïdal mouluré conduit à l'étage, traversé par un couloir longitudinal: des lambris d'appui et un décor stuqué ornent certaines pièces : panneaux à trophées (cor de chasse, canon, armes. Éléments protégés MH : le château et l'escalier conduisant de la route au château : inscription par arrêté du 16 octobre 1930.","habitants":"Louis d'Ingenheim\"","divers":"Birkenwald   grav de 1 à 4                           GPS : 48° 39' 31,66\" Nord, 7° 20' 37,79\" Est","gps":"48° 39' 31,66\" Nord, 7° 20' 37,79\" Est","images":["../../jctruffet.com/image/image_67/67_Birkenwald_1.jpg","../../jctruffet.com/image/image_67/67_Birkenwald_2.jpg","../../jctruffet.com/image/image_67/67_Birkenwald_3.jpg","../../jctruffet.com/image/image_67/67_Birkenwald_4.jpg"]},"Consult_chateau_formulairea964":{"id":"Consult_chateau_formulairea964","dept":"67","canton":"Strasbourg","commune":"Blaesheim","nom":"Blaesheim","type":"Tour-chateaux","periode":"XII-XVII","histoire":"Trois châteaux ; la Tour de Gloeckesberg, Blaesheim et Halsdenbourg.                              LA TOUR DU GLOECKELSBERG, la construction de la Tour du Gloeckelsberg date du XIIe siècle au 4ème quart du XIXe siècle. La nef et le choeur furent démolis en 1833. Il ne subsiste que la tour porche. La toiture de la tour fut remaniée en 1876, elle a conservé un linteau, dont le relief a été une bûche, qui représentait un agneau mystique et une clé de cintre de la porte, vers la nef représentant 2 personnes nues. Ils ont été déposés au musée de l'Oeuvre Notre-Dame à Strasbourg, 4 chapiteaux et 3 bases provenant de la nef de l'église, les chapiteaux sont sculptés d'animaux monstrueux, de palmettes et d'arbres stylisés, qui dateraient de 1100. Des colonnes auraient été réemployées pour la mairie de Blaesheim. La Tour du Gloeckelsberg a été inscrite aux M.H. en 1898. Elle est la propriété de la commune.","architecture":"BLAESHEIM  Rattachée à une nef avant sa destruction pendant la guerre de Trente Ans vers 1830, la tour garde une architecture romane bien que sa construction soit estimée au XIIe siècle.\nLa nef mesurait environ 24 mètres de long pour 16 mètres de large. Seuls quatre chapiteaux et trois colonnes peuvent être admirés car ils ont été déposés au musée de l'Oeuvre Notre-Dame à Strasbourg. La tour était alors couverte par un toit en double batière, qui a été remplacé par une terrasse avec des créneaux en brique en 1873.\nDes baies géminées peuvent être aperçues en dessous de la terrasse.                                                                                                                HALSDENBOURG, de 1901 à 1902 une batterie, la «Kirschbaum-Batterie», fut construite sur le site historique du Glckelsberg où se trouvait, au Moyen-âge, le château du Haldenburg. Au début de la Seconde Guerre mondiale, la «Batterie des Cerisiers» a servi pour pilonner la rive droite du Rhin. Pendant loccupation, les canons ont été démontés et louvrage na donc pas pu servir lors de la Libération de lAlsace en 1945. A lissue de la guerre, les fortifications de Strasbourg nont plus présenté dintérêt militaire et la «Batterie des Cerisiers» a été entièrement détruite.  Le site a été acquis par la commune en vue daménager un dépôt dordures ménagères. Recouvert de terre végétale après sa fermeture, le site a été aménagé en 1992 en parc botanique. Malheureusement, ces bouleversements de terrain ont fait disparaître les traces de la «Batterie des Cerisiers» et celles des vestiges du château médiéval du «Halsdenbourg».","habitants":"Seigneurs locaux\"","divers":"Trois châteaux ; la Tour de Gloeckesberg grav 2, Blaesheim grav-1 et Halsdenbourg grav-3.GPS : 48° 30' 24\" Nord, 7° 36' 36\" Est","gps":"48° 30' 24\" Nord, 7° 36' 36\" Est","images":["../../jctruffet.com/image/image_67/67_Blaesheim_1.jpg","../../jctruffet.com/image/image_67/67_Blaesheim_2.jpg"]},"Consult_chateau_formulaire2851":{"id":"Consult_chateau_formulaire2851","dept":"67","canton":"Boersch","commune":"Boersch","nom":"Boersch","type":"Portes","periode":"XVI-XVII","histoire":"BOERSCH , toute petite ville de la route des vins, loin du flot des touristes, mérite pourtant quon sy arrête pour se promener à travers ses petites rues et y découvrir de belles maisons ainsi que les trois portes fortifiées de la ville. Vous pourrez poursuivre votre promenade dans le vignoble.  Elle date du XVIe et XVIIe siècle. Cet édifice de style Renaissance fut construit au XVIe siècle, en 2 étapes. C'est d'abord la partie nord qui est achevée, puis séparée de la seconde partie par une tour qui abrite un escalier hélicoïdal en pierre. Le rez-de-chaussée comporte alors une halle ouverte pour le marché. Au début du XVIIe siècle, un oriel à deux étages est ajouté par l'architecte Jakob Zumsteg. Il est ensuite recouvert d'un toit un peu bizarre en forme de bulbe en 1872. Au XVIIIe siècle, le bâtiment est la résidence du bailli. La tourelle porte la date de 1572 et l'oriel de 1615. C'est aujour'hui la Mairie de Bouersch. Boersch château du Commandeur  de l'Ordre-Teutonnique a Boersch.","architecture":"BOERSCH, Porte fortifiée de Boersch.   Loccupation du site semble ancienne puisquon en retrouve des traces datant de plus de 3000 ans. Néanmoins la première mention écrite de Boersch, date de 1109, le village étant alors la propriété de labbaye de Saint Léonard. En 1340 le statut de ville lui est accordé et des remparts sont édifiés. Au Moyen-Age, la ville subit des destructions suite à des guerres locales ou des révoltes. La ville connaît une période de prospérité au XVIe siècle, avant dêtre ravagée lors de la guerre de Trente Ans. Boersch devient alors une ville française et connaît le destin commun de lAlsace. Aujourdhui la richesse principale de Boersch est la vigne.  A visiter et à voir à Boersch. Débutez votre visite par lune des trois portes de lenceinte fortifié.  Les portes fortifiées et les remparts : cet ensemble, construit vers 1340, comprenait à lorigine une enceinte et quatre portes fortifiées (il nen reste aujourdhui plus que trois).  La Porte Haute est ornée dune peinture de Saint Médard, patron de la ville. La Porte Basse abrite une statue de la Vierge. La Porte Arrière mène au chemin de ronde et peut être un point de départ agréable vers le vignoble et ses chapelles.","habitants":"l'architecte Jakob Zumsteg\"","divers":"Boersch grav 1 à 5                                          GPS : 48° 28' 40\" Nord, 7° 26' 30\" Est","gps":"48° 28' 40\" Nord, 7° 26' 30\" Est","images":["../../jctruffet.com/image/image_67/67_Boersch_1.jpg","../../jctruffet.com/image/image_67/67_Boersch_2.jpg","../../jctruffet.com/image/image_67/67_Boersch_3.jpg","../../jctruffet.com/image/image_67/67_Boersch_4.jpg","../../jctruffet.com/image/image_67/67_Boersch_5.jpg"]},"Consult_chateau_formulairef8c5":{"id":"Consult_chateau_formulairef8c5","dept":"67","canton":"Breuschwickersheim","commune":"Breuschwickersheim","nom":"Breuschwickershem","type":"château","periode":"XIII_XV","histoire":"BREUSHWICKERSHEIM  , la construction du château date du XIIIe, XVe, XVIe, XVIIe et XVIIIe siècle. Le château de Breuschwickersheim est devenu une exploitation agricole mais, depuis, est en voie de transformation. Ses façades et ses toitures sont inscrites aux M.H. depuis le 18 juin 1929, il est privé, fermé au Public.    En 1416, pendant la guerre contre lévêque Guillaume de Diest, le château a été brûlé par les Strasbourgeois. En décembre 1444, il est occupé par les Armagnacs. Au XVe siècle il est aux mains de la famille Sturm de Strasbourg. On sait quen 1435 celui-ci est déjà occupé dans le village. Durant la seconde moitié du XVe siècle, les Sturm acquièrent toutes les parts des ayant droits du château. En 1484, Louis Sturm vend à son frère Martin le château avec le jardin, le colombier, la basse- cour et les granges. A lextinction de la famille Sturm, le château revient à Philippe Bechthold de Weitersheim après un célèbre procès contre Benigna Salomé von Manteuffel. Le manoir est aujourdhui habité, il se situe au sud du village, près de la route menant à Hangenbieten.","architecture":"BREUSHWICKERSHEIM  \" Breusch  qui se réfère à la Bruche, cours deau se trouvant à proximité. Wickers  qui est le nom de famille dun ancien occupant du château  Heim qui signifie maison dans le dialecte Alsacien. Les habitants disent Wickersche (mot alsacien) ou Breusch. Au temps des Romains un petit village déjà se trouvait sur le site, comme en témoigne des bas-reliefs, sarcophages et un autel romain découverts dans les années 1500. Cest en 788 que lon trouve les premières traces officielles du village sous la forme Wiegfriedasheim, la demeure des Wiegfried. La vie du village est étroitement liée à celle du château, construit dans la deuxième moitié du XIIe siècle : Guerre des Strasbourgeois contre leur évêque en 1261, dévastation par les Armagnacs en 1444, désolations de la guerre de trente ans.","habitants":"la famille Sturm de Strasbourg.\"","divers":"Breuschwickersheim grav -1-2; GPS : 48° 34' 44\" Nord, 7° 36' 17\" Est","gps":"48° 34' 44\" Nord, 7° 36' 17\" Est","images":["../../jctruffet.com/image/image_67/67_Breuschwickersheim_1.jpg","../../jctruffet.com/image/image_67/67_Breuschwickersheim_2.jpg"]},"Consult_chateau_formulaire838c":{"id":"Consult_chateau_formulaire838c","dept":"67","canton":"Brumath","commune":"Brumath","nom":"Brumath","type":"Château","periode":"XVII-XVIII","histoire":"BRUMATH, Il est de 2 styles : du Moyen Age, et Classique. La construction du Château de Brumath date du XVIIIe et XIXe siècle. Entre 1720 et 1728, le Comte Jean Reinhard III (Jean René) de Hanau-Lichtenberg (dernier de la lignée) reconstruisit le château (signalé détruit en 1672) ; il devait servir de résidence d'été à sa fille, la comtesse de Hesse Darmstatt ; sous la Révolution, les ailes du château furent détruites ; le corps de bâtiment principal, acheté par la communauté protestante en 1804 fut transformé en temple  ; un campanile de 1805, couronne la partie centrale du toit à versants brisés. Dans le sous-sol voûté d'arêtes, a été aménagé, le Lusée archéologique de la Ville de Brumath.","architecture":"BRUMATH, le château, qui avait été détruit en 1672, a été reconstruit entre 1720 et 1728 par le comte Jean Reinhard III de Hanau-Lichtenberg, pour servir de résidence d'été à sa fille, la comtesse de Hesse Darmstatt.\nEn 1775, il a été loué à Christine de Saxe, abbesse de Remiremont.\nPendant la Révolution, les ailes du château ont été démolies, mais le corps principal a été acheté par la communauté protestante en 1804 et transformé en temple.\nLes façades ont été conservées, mais les plafonds et les salles ont été remplacés par un grand espace articulé par deux rangées de colonnes doriques portant des tribunes.","habitants":"comte Jean Reinhard III de Hanau-Lichtenberg\"","divers":"Brumath;  GPS : 48° 43' 54\" Nord, 7° 42' 35\" Est","gps":"48° 43' 54\" Nord, 7° 42' 35\" Est","images":["../../jctruffet.com/image/image_67/67_Brumath_1.jpg"]},"Consult_chateau_formulairec3e3-2":{"id":"Consult_chateau_formulairec3e3-2","dept":"67","canton":"Ingwiller","commune":"Wangenemuhle,","nom":"Castel_Garat","type":"château","periode":"XVIII","histoire":"GARAT; la construction du CASTEL DES GARAT date du 4ème du XVIIIe au 2ème moitié du XIXe siècle. La structure de cette maison est comparable à celle des autres constructions de Wangenmuehle, du 4ème quart du XVIIIe siècle. Le Castel des Garat a été transformé, pour lui donner cet aspect défensif, à partir de 1871, lorsqu'il fut acquis par la Famille Carat, du 4ème quart du XVIIIe siècle.","architecture":"WAGIN,  premier village fortifié sur la route des Vins, traversé par un sentier viticole, Wangen est surnommé « le petit Riquewihr du Bas-Rhin ». A voir : la vieille ville et son mur denceinte du XIII° siècle de plus de 1 000 mètres, le Niedertor ou porte basse (datant des XIIIe et XIVe siècles), les nombreux emblèmes de corps de métiers, le château dit Freihof, édifié du XVIe siècle), le tympan roman « Agneau mystique » (daté de 1214) de léglise Saint-Etienne.\nChaque année, depuis plus de 180 ans, le village célèbre la fête de la Fontaine, en commémoration dune victoire juridique abolissant une ancienne taxe. A cette occasion, en juillet, la municipalité distribue du vin coulant « symboliquement » de cette fameuse fontaine.","habitants":"la Famille Carat\"","divers":"Garat GPS : 48° 37' 5,92\" Nord, 7° 28' 28,41\" Est","gps":"48° 37' 5,92\" Nord, 7° 28' 28,41\" Est","images":["../../jctruffet.com/image/image_67/67_Castel_Garat_1.jpg"]},"Consult_chateau_formulaire9a7b":{"id":"Consult_chateau_formulaire9a7b","dept":"67","canton":"Schiltigheim","commune":"Bishheim","nom":"Cour_d","type":"château","periode":"XVI_XVII-I","histoire":"COUR D'ANGLETERRE, date du XVIIIe siècle,   Robert Koenigsmann achète le domaine vers 1600. Celui-ci, amateur d'agronomie va initier la culture du tabac en Alsace ayant ramené, selon les écrits, des plants d'Angleterre. Il sera également le premier à planter la pomme de terre dans son jardin vers 1620. A cette même époque, de nombreux exilés anglais vont trouver refuge dans ce domaine qui prend alors le surnom de \"Engländischer Hof\" (Jardin d'Angleterre). En 1663, Georg von Snoilsky, diplomate suédois, achète le domaine. En 1687, Jean Dietrich se rend acquéreur de la propriété. Son petit-fils, Jean de Dietrich, entre 1749 et 1751, va construire l'actuelle demeure et les jardins. Une grande orangerie située à l'entrée principale abritait les arbres fragiles , la \"petite orangerie\" servait de remise à outils. Les jardins agrémentés d'arbres rares, tels que les lauriers, grenadiers, myrtes, orangers, citronniers, étaient ornés de six statues du XVIIIe siècle. Les deux sphinges, existantes encore aujourd'hui  étaient accompagnées de vases en fonte de style rocaille. Quelques vases se trouvent aujourd'hui au château de Kolbsheim, à la Léonardsau à Obernai au château de Pourtalès et au moulin de la Gantzau à Strasbourg. Quatre statues représentant les quatre saisons furent également achetées par le baron de Dietrich puis transportées par lui à la Léonardsau où on les trouve encore. Deux statues de grès rouge, représentant l'une Flore et un amour portant une corbeille de fleur, l'autre un berger et son chien, figurent aujourd'hui dans la ville de Kientzheim. Vingt ans après (1771), Jean de Dietrich vend le domaine à Jean-Louis Beyerlé. Celui-ci introduit un parterre régulier dans le jardin. Par la suite, Conrad Alexandre Gérard, \"l'homme de Boston\", acquiert le domaine. Il envisagea de transformer le domaine d'Angleterre en parc américain ; il se fit envoyer des graines et des plants du Nouveau Monde mais ne put accomplir son travail du fait de la Révolution.","architecture":"La COUR d'ANGLETERRE: A l'intérieur d'une enclave formée par une boucle de l'Ill, le jardin s'axe aujourd'hui autour d'une allée centrale rectiligne nord-sud, bordée de buis taillés en cônes et de deux allées transversales vers chaque extrémité. Aux extrémités de cette structure, base de l'ancien jardin régulier, se trouvent deux carrefours simplement matérialisés par de petites plates-bandes de gazon. Sur les côtés de l'axe principal, deux prairies couvrent l'essentiel du jardin. Une allée rectiligne de platane longe l'étang ; un verger termine le jardin au sud. Dans le mur sud s'ouvrait un portail aujourd'hui condamné. Une allée de tilleuls conduit à l'entrée du château. Le jardin ne bénéficie plus aujourd'hui d'un accès à l'Ill. Le domaine s'interrompt avant, mais on peut encore lire quelques anciens aménagements au delà de ses limites actuelles. Ainsi, quelques très vieux platanes en alignement au bord de l'étang, évoquent une ancienne allée plantée.\nÉléments protégés MH : les façades et les toitures du château, les terrasses et les clôtures. A l'intérieur : l'escalier d'honneur et l'enfilade de cinq pièces lambrissées du rez-de-chaussée, les dépendances du XVIIIe siècle : les façades et les toitures et le jardin: inscription par arrêté du 21 avril 1995.  Après être passé par de multiples mains et avoir souffert de trois guerres, l'Association Régionale pour la Sauvegarde de l'Enfance et de l'Adolescence remet le château en état à partir de 1947. La terrasse et le parc, au sud de la façade principale, sont défrichés et réaménagés, on ne conserve que les structures de jardin régulier.","habitants":"l'Anglais Robert Koenigsmann\"","divers":"Grav-1-2-3     GPS : 48° 37' 52\" Nord, 7° 47' 56\" Est","gps":"48° 37' 52\" Nord, 7° 47' 56\" Est","images":["../../jctruffet.com/image/image_67/67_Cour_d%27Angleterre_1.jpg","../../jctruffet.com/image/image_67/67_Cour_d%27Angleterre_2.jpg","../../jctruffet.com/image/image_67/67_Cour_d%27Angleterre_3.jpg"]},"Consult_chateau_formulaire34df-2":{"id":"Consult_chateau_formulaire34df-2","dept":"67","canton":"Molsheim","commune":"Odratzhzeim","nom":"Dachstein","type":"Château","periode":"XVI-XVII","histoire":"Trois châteaux dans cet article   Dachsheim, Géraudon, le Vieux Château et Boucart                                                                                                                                                             DACHSHEIM,  a été désigné siège résidentiel des évêques de Strasbourg au 13e siècle. En 1214 est élevé un château, démoli en 1675. En 1572, l'évêque Jean de Mandescheid se fait construire une nouvelle résidence, occupée par les évêques jusqu'en 1718. Au XIXe sièlce, agrandissements de style néo-Renaissance par la famille de Turckheim. Portails d'entrée sur rues, et murs d'enceinte du domaine ; vestiges du château médiéval : douves, tour ronde (au nord-ouest du château actuel) et tour carrée (à l'est ; château Renaissance et ses transformations et agrandissements du XIXe siècle : façades, y compris les enduits néo-Renaissance, toitures ; tourelle d'escalier en vis et cheminée des cuisines, en totalité ; dépendances au nord du château : façades et toitures ; puits néo-Renaissance dans la cour ; parc,  inscription par arrêté du 23 décembre 2002                                                                                                                             GERAUDON, Il fut construit à l'instigation du Commissaire Royal de guerre Augustin-Pierre Geraudon. Les deux façades sont animées par un avant-corps central sommé d'un fronton avec cartouche. La cour d'honneur s'ouvre, sur la rue, par un beau portail en fer forgé. Les façades, la toiture et un escalier intérieur sont classés aux M.H. depuis 1940.","architecture":"DIT le  VIEUX CHÄTEAU,  résidence privilégiée des évêques de Strasbourg, du XIII au XVe siècle, le premier château dit Vieux château est victime des luttes engagées contre ses propriétaires.\nA partir de 1572, Jean de Manderscheid fait construire un château de plaisance dans l'enceinte de la forteresse médiévale.\nAu fil du temps, et notamment au XIXe siècle, l'édifice subit un certain nombre d'embellissements et de restauration.                                                                                            Porte de la Bruche  principal témoin des fortifications médiévales, la porte de la Bruche ou Breuschtor possède des angles renforcés par des pierres à bossage. De plan carré, elle est abaissée de moitié à la fin du XVIe siècle, comme l'atteste l'inscription de 1574 ornant la façade extérieure de l'édifice. Avec tours et remparts.                         BOUCART à Dachstein,  le château Hervé est appelé aussi le château Bourcart dit « La Magnanerie ». il fut construit en 1750, au coeur du village. Le château Hervé, privé, abrita l'École Royale de la culture des vers à « Soye ». Depuis 1838, le château Hervé est la propriété de la Famille Hervé. En 1990, ce cadre idyllique servit au tournage de la saga cinéma \"Les Alsaciens ou les Deux Mathilde\". Le château Hervé est privé, fermé au Public.","habitants":"évêque Jean de Mandescheid ,                           Commissaire Royal de guerre Augustin-Pierre Geraudon et la Famille Hervé.\"","divers":"Trois châteaux dans cet article   Dachsheim grav 1 à 6, Géraudon grav-7, le Vieux Château.  GPS : 48° 36' 05\" Nord, 7° 29' 24,7\" Est","gps":"48° 36' 05\" Nord, 7° 29' 24,7\" Est","images":["../../jctruffet.com/image/image_67/67_Dachstein_1.jpg","../../jctruffet.com/image/image_67/67_Dachstein_2.jpg","../../jctruffet.com/image/image_67/67_Dachstein_3.jpg","../../jctruffet.com/image/image_67/67_Dachstein_4.jpg","../../jctruffet.com/image/image_67/67_Dachstein_5.jpg","../../jctruffet.com/image/image_67/67_Dachstein_6.jpg","../../jctruffet.com/image/image_67/67_Dachstein_7.jpg"]},"Consult_chateau_formulaire5632":{"id":"Consult_chateau_formulaire5632","dept":"67","canton":"Ingwiller","commune":"Diedendorf","nom":"Diedendorf","type":"Château","periode":"XV","histoire":"DIEDENDORF,   la construction du château de Diedendorf date de 1577 à 1580. Son propriétaire initial était Jean Streiff de Lauenstein qui en avait fait sa résidence seigneuriale. Dans une lettre d'investiture datée du 12 février 1570, le comte Jean IV de Nassau-Sarrebruck donna, en fief, à Jean Streiff de Lauenstein, alors Bailli du comte de Sarrewerden, une métairie et les terres de Diedendorf. Jean Streiff y fit construire en 1577, peu de temps après, le château de Diedendorf. Ce dernier fut terminé vers 1580. Il fit aussi bâtir l'église de Diedendorf en 1588. Il décèdera, en 1595. De son union, avec Maria de Eich, il eut 1 fille et 6 garçons. Sa fille Elisabeth épousa Mathias Steyss de Görnitz, châtelain de Lorentzen. Le château resta dans la descendance de la famille Streiff von Lauenstein jusqu'en 1730, date à laquelle les Münchhausen le vendirent à Auguste-Guillaume de Lüder. Le fils de ce dernier, Charles Frédéric, grand bailli du comté de Nassau-Sarrewerden céda le fief et le château en 1743 à son suzerain le Prince Guillaume-Henri de Nassau-Sarrebruck. Le château va alors entrer dans une période d'instabilité, durant un siècle où il changera 12 fois de propriétaires ! En 1862, il devient la propriété d'un richissime clerc de notaire Simon Striffler, important propriétaire terrien. Ses descendants conserveront le château de Diedendorf, plus d'un siècle, puis il sera revendu, en 1966, aux époux Clark-Schlumberger. C'est Mme Clark qui le revendit, en 1977, à Jean-Daniel Ludmann, alors conservateur du Palais des Rohan de Strasbourg.","architecture":"DIEDENDORF est constitué d'un logis rectangulaire et de deux ailes en retour à fenêtres à meneaux. Il est flanqué de deux tours d'angle dont l'une est une tour d'escalier.Les murs intérieurs du château ont un décor de style rhénan unique en Alsace. Celui-ci permet d'imaginer les conditions de vie de la noblesse dans le canton au XVIe siècle. Ils sont agrémentés de cordons, de bouquets floraux et de cariatides, motifs très rares dans la région. Le décor intérieur d'origine avec les voûtes, les plafonds à solives, les peintures murales, les boiseries, les planchers et les cheminées rapportés, du XVIIIe siècle, ont été inscrits aux monuments historiques le 23 décembre 2027.","habitants":"a la Famille Streiff \"","divers":"GPS : 48° 52' 40,94\" Nord, 7° 2' 47,92\" Est","gps":"48° 52' 40,94\" Nord, 7° 2' 47,92\" Est","images":["../../jctruffet.com/image/image_67/67_Diedendorf_1.jpg","../../jctruffet.com/image/image_67/67_Diedendorf_2.jpg"]},"Consult_chateau_formulairef355-2":{"id":"Consult_chateau_formulairef355-2","dept":"67","canton":"Ingviller","commune":"Diemeringen","nom":"Diemeringen","type":"Château","periode":"XVII","histoire":"DIEMERINGEN, la première mention du château remonte à l'an 1275. Hugues de Fenetrange épouse Catherine de Deux-ponts apparaît une famille noble DE Diemeringen qui est châtelaine. La place est engagée par Henri de Fenetrange à Philippe 1er de Nasseau. Cette engagère prend fin en 1474. A cette date les Fenetrange s'éteignent. Barbe de Fenetrange dernière de sa lignée épouse le comte Nicolas de Moers-Sawerden.  Cette propriété sera de courte durée. Dès 1482 le château est dans les mains du Rhingrave Jean  VI de Salm. Les Salm seront les derniers maîtres du château. 1525. Révolte des Rustauds. Le duc de Lorraine Antoine Le Bon pacifie la contrée. Survient la guerre de Trente-Ans. Diemeringen est occupé de 1629 à 1643 par les troupes de Charles IV de Lorraine. Les Suédois à la solde du roi de France conquièrent les lieux en 1634 mais en sont chassés par les Impériaux en 1635. Une nouvelle occupation lorraine a lieu entre 1647 et 1659.  Entre 1670 et 1673 une redoutable chasse aux sorcières entraine l'exécution de douze personnes convaincues de sorcellerie. Le 3 mars 1674 alors que la guerre de Hollande bat son plein, les troupe de Turenne assiègent le château qui est pris et démantelé. En 1677 les terres du Rhingrave de Salm sont en grande partie annexées.","architecture":"DIEMERINGEN, un nouveau château est construit à proximité des ruines féodales à la fin du XVII siècle. Le Rhingrave Jean X s'éteint en 1718. La seigneurie est alors divisée entre ses héritiers: Les princes de Salm-Salm et les princes de Salm-Kirburg  autres.Il ne subsiste que la base de l'une des quatre tours du château-fort. Le nouveau château est quant à lui une propriété privée qui ne se visite pas. La seigneurie est alors divisée entre ses héritiers: Les princes de Salm et les princes de Kirburg entre autres. Les terres de Diemeringen resteront une enclave des pays de Salm jusqu'en 1793 lorsque les habitants de la principauté de Salm obtiennent le rattachement provisoire du pays à la France (voir châteaux de Senones), Diemerigen est alors rattaché au département de la Moselle avant d'être cédé à celui du Bas-Rhin pour un motif religieux.","habitants":"Famille de Salm-Salm\"","divers":"Déméringen  gps  48° 56' 32? nord, 7° 11' 15? est","gps":"","images":["../../jctruffet.com/image/image_67/67_Diemeringen_1.jpg","../../jctruffet.com/image/image_67/67_Diemeringen_2.jpg","../../jctruffet.com/image/image_67/67_Diemeringen_3.jpg"]},"Consult_chateau_formulaire5a62":{"id":"Consult_chateau_formulaire5a62","dept":"67","canton":"Wissembourg","commune":"Reichshoffen","nom":"Dietrich","type":"Château","periode":"XVII-XVIII","histoire":"DIETRICH dit aussi de Reichshoffen,  en 1232, un premier château fut construit, pour le duc de Lorraine. Il a appartenu après 1286, aux comtes d'Ochsenstein, puis il fut démoli en 1769. Il comportait une enceinte circulaire flanquée de 4 tours rondes. Le Château de Dietrich actuel fut construit pour Jean de Dietrich (1719-1795) par Joseph Massol, architecte strasbourgeois. Le gros-uvre du château de Dietrich fut érigé, de 1770 à 1771, sous la direction de Christian Gstyr. Sur la lucarne Sud-Est se trouvait avant la guerre, l'inscription, aujourd'hui, a disparu : IFD HANVER 1779. Vers 1807, Mathieu de Faviers fit supprimer le corps de passage qui reliait les communs au Nord. L'aile Est des communs fut démolie, en 1811 et en 1812, par les de Bussière. L'aile Ouest subsiste en partie, complètement réaménagée. Le château, gravement endommagé pendant la dernière guerre a été soigneusement restauré. Il sert à présent de siège administratif à la Société De Dietrich. L'une des tours de l'ancien château qui avait subsisté a été reconstruite, en 1807, pour servir d'élévateur hydraulique. En limite Nord du parc, sont situés les dépendances agricoles et une ancienne maison de jardinier sous toit à croupes figuraient déjà sur le plan cadastral napoléonien vers 1840. Le Château de Dietrich a été classé aux M.H. depuis 1940. il a été brûlé le 31 décembre 1939.\nLe vestibule d' entrée et l'escalier d'honneur précédé d'une paire de colonnes comptent parmi les rares témoins des aménagements intérieurs. Comme preuve de l'histoire mouvementée de cette région, on citait souvent la \"chambre historique\" où dormirent successivement Bucher, Wellington et Mac Mahon.","architecture":"DIETRICH,  cette notice reprend intégralement les termes de larrêté de protection au titre des Monuments Historiques. Elle répond à lobligation réglementaire du ministère de la Culture détablir la liste générale des édifices protégés (art. R. 621-80 du Code du patrimoine). Elle est donc opposable et fait foi juridiquement. Aucune copie numérique ou papier ne sera fournie par courrier. Le dossier de protection complet et larrêté sont consultables uniquement sur place, dans la salle de lecture de la Médiathèque du patrimoine et de la photographie (MPP), à Charenton-le-Pont (Val-de-Marne). Restauré conjointement par le ministère de la Reconstruction et le Service des Monuments Historiques, le château, resté dans le patrimoine de la famille de Dietrich, abrite aujourd'hui le siège administratif de la société. Le château de Reichshoffen est un lieu chargé d'histoire. Ce beau site, entouré d'un magnifique parc et baigné par le Schwarzbach et le Falkensteinerbach, a marqué à deux reprises l'histoire des Dietrich. D'abord au XVIIIe siècle, lorsque Jean de Dietrich acheta la seigneurie de Reichshoffen, ensuite en 1950 lorsque le château devint propriété de la Société \"De Dietrich\".                          REICHSHOFFEN. Il existe aussi plusieurs châteaux sur la commune : , la Tour des Suédois, fortification d'agglomération du XIIIe, rue des remparts, et l'ancienne Léproserie date des XIIIe-XIVe siècles. . Il existe aussi plusieurs châteaux sur la commune : Château De Dietrich, la Tour des Suédois, fortification d'agglomération du XIIIe, rue des remparts, et l'ancienne Léproserie date des XIIIe-XIVe siècles.","habitants":"Famille de Jean de Dietrich\"","divers":"Dietrich grav 1 à 6                                            GPS : 48° 55' 50,63\" Nord, 7° 39' 56,06\" Est                                         GPS : 48° 56' 06\" Nord, 7° 40' 01\" Est","gps":"48° 55' 50,63\" Nord, 7° 39' 56,06\" Est","images":["../../jctruffet.com/image/image_67/67_Dietrich_6.jpg"]},"Consult_chateau_formulaire3c64":{"id":"Consult_chateau_formulaire3c64","dept":"67","canton":"Molsheim","commune":"Dorlisheim","nom":"Dorlisheim_Brosse","type":"Château","periode":"XVII","histoire":"DORLISHEIM  la comtesse Marie de Brosses et son époux le baron Hervé de Brosses furent les derniers occupants du château. Mais le baron Hervé qui a donné son nom à ce château est le grand-père de la comtesse, le baron Alfred Hervé-Gruyer né en 1860 à Strasbourg. Sa famille fut apparenté aux Coulaux, qui dispose de plusieurs usines de quincaillerie dans la région de Molsheim-Mutzig. Il a acheté cette demeure en 1890 à la famille Hecht (Hecht en allemand signifie brochet, d'où le poisson sur la tourelle). Selon une inscription figurant sur la voûte de la cave cette demeure, anciennement château du Baron Hervé, aurait été érigée en 1714 et pourrait avoir été construit par larchitecte du château dOttrott.","architecture":"DORLISHEIM  La demeure fut restaurée en 1820 et enfin transformée sous le second empire (1868) avec l'ajout d'une tourelle ronde par la famille Hecht. Il a été saisi par les Allemands en 1918 qui lont vidé de sa bibliothèque et de ses documents officiels et a souffert dun autre pillage durant la Seconde Guerre mondiale. Lédifice a été acheté par la mairie en 1999 à la famille Hervé-Gruyer. Un gros travail de restauration a été entrepris car il a fallu démolir et reconstruire à lidentique la pointe Est du château.  Il s'y déroule toute l'année des animations pour enfants et adultes organisés par l'amicale du Château.La vie associative du village a pris possession des lieux.Le château ne se visite pas en dehors des journées du patrimoine ou des expositions.  Cependant, dans le parc arboré se trouvent une aire de jeux en libre accès, ainsi qu'une petite basse cour avec des poules.","habitants":"Baron Hervé de Brosses \"","divers":"Dorlisheim gps \n48° 31' 33? nord, 7° 29' 12? est","gps":"","images":["../../jctruffet.com/image/image_67/67_Dorlisheim_Brosse_1.jpg"]},"Consult_chateau_formulaire820e":{"id":"Consult_chateau_formulaire820e","dept":"67","canton":"Ingwiller","commune":"Drulingen","nom":"Drulingen","type":"château","periode":"XIX+","histoire":"DRULINGEN,   château mentionné pour la première fois en 1212, en tant que possession des seigneurs d'Asswiller. Fief des comtes de Lutzelstein à partir du XIIIe siècle.   L'édifice est construit en 1816, au retour des guerres napoléoniennes, pour Jean Schmidt (1775-1844)1, capitaine au 6e régiment de hussards.  La maison d'habitation, les dépendances (datées de 1818) et le pigeonnier font l'objet d'une inscription au titre des monuments historiques depuis le 16 juillet 1987.","architecture":"DRULINGEN,  Le château est rénové sous les Palatin-Deux-Ponts en 1561 et remplacé au XVIIIe siècle par une nouvelle construction dont le bâtiment principal sera détruit en 1839. Deux ailes sont conservées dont l'une, celle de droite, porte la date de 1769 ; elles sont englobées dans une vaste exploitation agricole. Sa construction date de 1816. Cette maison d'habitation est faite d'une dépendance et d'un pigeonnier datant de 1816. Son propriétaire initial était Jean Schmidt. Le château de Drulingen fut construit en 1816, de retour des guerres napoléoniennes, pour Jean Schmidt (1775-1844), Capitaine au 6e Régiment de Hussards. Il est classé aux M.H. depuis le 16/07/1987 (pour ses façades, ses toitures des maisons d'habitation, son pigeonnier, les murs et grilles de clôture de la propriété)  de plan régulier, à l'origine, subsistent deux tours de flanquement circulaires munies de bouches-à-feu et percées d'ouvertures au  XVIIIe siècle.Du plan régulier, à l'origine, subsistent deux tours de flanquement circulaires munies de bouches-à-feu et percées d'ouvertures au XVIIIe siècle. Les deux ailes conservées sont prolongées par des bâtiments agricoles.","habitants":"Famille de Jean Schmidt \"","divers":"Drulingen grav-1 Hôtel de ville  Gerudertheim                                                         grav -3 GPS : 48° 51' 57,53\" Nord, 7° 11' 20,68\" Est","gps":"48° 51' 57,53\" Nord, 7° 11' 20,68\" Est","images":["../../jctruffet.com/image/image_67/67_Drulingen_1.jpg","../../jctruffet.com/image/image_67/67_Drulingen_2.jpg","../../jctruffet.com/image/image_67/67_Drulingen_3.jpg"]},"Consult_chateau_formulairec223":{"id":"Consult_chateau_formulairec223","dept":"67","canton":"Sélestat","commune":"Epfig_Stotzheim","nom":"Epfig_Grunstein","type":"Château","periode":"XVIII","histoire":"EPFIG,    ce bâtiment, ultime développement architectural sur le site de lancien cimetière fortifié dEpfig (avant léglise actuelle) a été construit sur les ruines de lancien logis rattaché au château fort épiscopal.\nDe cet ancien logis, il reste actuellement la porte dentrée qui daterait du XV siècle et qui est encore couronnée du blason des anciens seigneurs Von Eppfich, lignée éteinte à la fin du XV siècle. Ce blason, qui est différent de celui dEpfig, est décrit comme suit en héraldique: « de gueules, à un pal de sable », (en clair, rouge avec une bande centrale verticale de couleur noire).  Le château devenu presbytère abritait régulièrement un curé et 2 vicaires, parfois plus quand la paroisse accueillait des missions. A la fin des années 1970, le bâtiment était devenu bien trop grand pour le seul curé restant et bien trop compliqué à chauffer. Il sert aujourdhui dannexe à lIME Cottolengo qui lutilise pour héberger une partie de ses élèves. En visitant, on remarquera le superbe escalier principal en bois, inscrit   linventaire du patrimoine régional.Le château, cest aussi son jardin. Au temps de son ancienne splendeur, on y faisait pousser des plantes, des légumes, des fleurs ou des vignes, il a servi de potager quelques voisins ou de terrain dapprentissage aux élèves de lIME Cottolengo. Après un long sommeil, il a été récupéré par la commune pour y créer son parc avec laire de jeux. Les idées ne manquent pas pour continuer à mettre en valeur cette partie du village. Y compris ce qui reste du donjon comme lappelle les anciens qui ont encore connu jusquau début des années 1960 les vestiges de la tour nord-est de lenceinte du cimetière fortifié avec sa rehausse et son toit octogonal. Un belvédère avec vue sur la plaine vers le nord. Vestige de ces temps là. La construction du nouveau château, également connu sous la dénomination « maison épiscopale » ou « maison de lévêque », date du premier quart du XVIII siècle et a été réalisée à la demande du cardinal de Rohan qui souhaitait en faire sa résidence dété.","architecture":"EPFIG,  près de léglise Saint-Georges dEpfig se trouvait, à lorigine, un château du XIe  siècle, dans lenceinte de lancien cimetière fortifié, dont il ne subsiste quun pan du donjon et des caves voûtées. Reconstruit par les cardinaux de Rohan, ce château leur servait de résidence de chasse.Le puits visible dans la cour est également un . Ce bâtiment est aujourdhui le seul survivant facilement visible des anciennes possessions des évêques de Strasbourg à Epfig. Dans ses premières années il a été occupé, comme le bâtiment quil remplaçait, par le receveur épiscopal. En 1793, il a été réquisitionné par la Révolution avant dêtre racheté aux enchères par Louis Armand Kuhn, un juge de paix qui souhaitait au départ le rendre à lévêché. Près de léglise Saint-Georges dEpfig se trouvait, à lorigine, un château du XIe  siècle, dans lenceinte de lancien cimetière fortifié, dont il ne subsiste quun pan du donjon et des caves voûtées. Reconstruit par les cardinaux de Rohan, ce château leur servait de résidence de chasse.                                                      GRUNSTEIN Divers occupants se sont succédé à travers les siècles. Ainsi, le premier château est bâti en 1163 par Otton de Stotzheim et porte le nom de \"Schollenhof\".  En 1339, est construit un nouveau château sur lemplacement du précèdent. Les comtes de Rechberg en sont les propriétaires et lui donne le nom de \"Steinerstock\".  La construction du château actuel est réalisée en 1574.  En 1690, après la guerre de trente ans, lAlsace redevient française et le château est racheté par le Sieur Claudius Le Laboureur En 1741, le château est alors vendu au Maréchal Jean Frédéric de Schwengsfeld et en 1789 est occupé par le clerc Euloge Schneider. Il est, par la suite, racheté en 1830 par la famille de Mullenheim qui y entreprend de grandes rénovations.  En 1918, le château est aménagé en casino pour les officiers de larmée allemande. Les propriétaires actuels achètent le château inoccupé en 2009. Celui-ci est rénové pour en faire des chambres dhôtes","habitants":"seigneurs Von Eppfich\"","divers":"Epfig  gps 48° 15' nord, 7° 27' est  grav 1et 2","gps":"","images":["../../jctruffet.com/image/image_67/67_Epfig_Grunstein_1.jpg","../../jctruffet.com/image/image_67/67_Epfig_Grunstein_2.jpg","../../jctruffet.com/image/image_67/67_Epfig_Grunstein_3.jpg"]},"Consult_chateau_formulaire4d5b":{"id":"Consult_chateau_formulaire4d5b","dept":"67","canton":"Bischwiller","commune":"Fort_Louis","nom":"Fort_Louis","type":"Fort_Louis","periode":"Fort","histoire":"FORT-LOUIS ;Fort-Louis est une commune française située dans la circonscription administrative du Bas-Rhin et, depuis le 1er janvier 2021, dans le territoire de la Collectivité européenne d'Alsace, en région Grand Est. Cette ancienne place forte et ville nouvelle a été construite par Vauban au XVIIe siècle. La commune se trouve dans la région historique et culturelle d'Alsace. Lhistoire du fort Saint-Louis commence vers 1640, lorsque Du Parquet, gouverneur de la Martinique, décide de fortifier la  petite péninsule rocheuse qui avance dans le cul-de-sac Royal, baie des Flamands.  Ce qui, au départ, nest quune simple  palissade en bois devient progressivement,  par la volonté de gouverneurs généraux tels Baas ou Blénac, et avec les subsides  octroyés par le roi Louis XIV, un fort dit à  la Vauban. Au cours des siècles, il demeure  un témoin privilégié de lhistoire de la  Martinique et par extension de la  France, participant, outre-mer, aux  conflits qui opposent les Européens  entre eux.  Ses puissantes murailles témoignent dun  passé où son nom rimait avec guerres,  sièges, bombardements Autour du fort  Royal, devenu fort Edward, fort de la\nRépublique et puis fort Saint-Louis,  se sont développés la ville de Fort-de-\nFrance, ainsi que le port, poumon   économique de lîle.  Le fort est classé monument historique en  1973. La Marine, avec l'aide du ministère\nde la Culture, restaure régulièrement  les parties endommagées par le climat  tropica.l","architecture":"FORT-LOUIS ; En 1648, le Traité de Westphalie met fin à la Guerre de Trente Ans ; lAlsace devient française. Louis XIV confie alors à son ingénieur militaire, Vauban, la construction de fortifications militaires. Celle de Fort-Louis appartient à la « ligne de la Moder » et se situait sur lîle de Giesenheim formée par deux bras du Rhin.\nLes travaux ont débuté en 1686/1687 et duré dix ans. Les briques et tuiles étaient fabriquées à Roeschwoog et à Neuhaeusel, des blocs provenant de Haguenau et de châteaux alentours ont  été réemployés. La place forte est constituée du fort principal ou Fort Carré et de deux forts secondaires dits dAlsace et Marquisat. Cette place forte a subi des destructions en 1793 puis entre 1815 et 1818 par les armées de lEmpire.  La commune a porté le nom de « Fort Vauban » de la Révolution à 1818 ; aujourdhui les fort-ludoviciens vivent dans un écrin de verdure notamment protégé par le biotope de la Moder.","habitants":"Maréchal de Vauban\"","divers":"Fort 48° 48' 07? nord, 8° 03' 26? est","gps":"","images":["../../jctruffet.com/image/image_67/67_Fort_Louis_1.jpg","../../jctruffet.com/image/image_67/67_Fort_Louis_2.jpg","../../jctruffet.com/image/image_67/67_Fort_Louis_3.jpg"]},"Consult_chateau_formulaire79ea":{"id":"Consult_chateau_formulaire79ea","dept":"67","canton":"Reichshoffen","commune":"Frschwiller","nom":"Frschwiller","type":"Château","periode":"XVIII-XIX","histoire":"Deux châteaux dans cet article Durckheim et Froeschwiller.                                               DURCKHEIM  Sa construction commença en 1407 ainsi que son parc. La famille Eckbrecht de Durckheim tenait en fief de l'évêque de Strasbourg, le village de Froeschwiller, depuis le XIVe siècle. Ils y possédaient un château, connu par deux dessins de la 1ère moitié du XIXe siècle, par Straus-Durckheim. Ce château accolé à l'église du village était constitué d'un corps principal flanqué de deux tours et de dépendances accessibles par une porte dans un corps de passage. A l'arrière un jardin et un parc. Vers 1850, le château fut racheté par un cousin des Durckheim-Montmartin, Ferdinand de Durckheim, alors préfet du Haut-Rhin, qui le fit reconstruire. C'était alors une grande villa rectangulaire, avec un balcon sur le mur-gouttereau, porté par des piliers. Son fils, Albert, le fit à nouveau transformer et agrandir en 1890, par l'architecte allemand Gabriel von Seidl, de Munich. Il y fit ajouter un important toit brisé, avec lucarnes à frontons et une tour couverte d'un belvédère ; un second bâtiment d'habitation fut élevé à ses côtés, réuni au bâtiment principal par un passage à l'étage, porté par un arc surbaissé. Les dépendances portent les armoiries de la famille de Durckheim et la date de 1891. La propriété passa à sa femme, Eugénie Haniel, remariée au comte de Holnstein. Le château fut vendu à ses propriétaires actuels après la seconde guerre mondiale. Le château des De Dürckheim est classé aux M.H. le 29/09/2009","architecture":"FROESCHWILLER Il date du 4ème quart du XIXe siècle. La famille Eckbrecht de Durckheim tenait en fief de l'évêque de Strasbourg le village de Froeschwiller depuis le XIVe siècle. Le château de Froeschwiller, accolé à l'église, était constitué d'un corps principal flanqué de 2 tours et de dépendances accessibles, par une porte, dans un corps de passage. A l'arrière, se trouvaient le jardin et le parc. Vers 1850, le château de Froeschwiller fut reconstruit et se présentait comme une grande villa rectangulaire, avec un balcon porté par des piliers. Il fut à nouveau transformé et agrandi en 1890 par l'architecte Gabriel von Seidl qui y ajouta un toit brisé, avec lucarnes à frontons et une tour couverte d'un belvédère. Un second bâtiment d'habitation fut élevé à ses côtés, réuni au bâtiment principal, par un passage à l'étage porté par un arc surbaissé. Les dépendances portent la date de 1891. Le château de Froeschwiller est classé aux M.H. depuis le 29/09/2009. Il appartient à une société privée.","habitants":"La famille Eckbrecht de Durckheim \"","divers":"Deux châteaux dans cet article Durckheim grav-4 et Froeschwiller . Grav-1-2-3                                                                     GPS : 48° 56' 35,01\" Nord, 7° 43' 20,24\" Est","gps":"48° 56' 35,01\" Nord, 7° 43' 20,24\" Est","images":["../../jctruffet.com/image/image_67/67_Froeschwiller_1.jpg","../../jctruffet.com/image/image_67/67_Froeschwiller_2.jpg","../../jctruffet.com/image/image_67/67_Froeschwiller_3.jpg"]},"Consult_chateau_formulaire902d":{"id":"Consult_chateau_formulaire902d","dept":"67","canton":"Wissembourg","commune":"Wissembourg","nom":"Geisberg","type":"château","periode":"XVII","histoire":"GEISBERG, le domaine de Geisberg a été vendu, en 1755, à Philippe Michel Weber, qui en resta propriétaire jusqu'à la Révolution. Le château du Geisberg et le Plateau du Geisberg firent l'objet de durs combats, en 1793, entre les Troupes Révolutionnaires Française et les Autrichiens alliés aux Prussiens, lors de la 2ème Bataille de Wissembourg, durant les Guerres de la Première Coalition. Le château et le Plateau du Geisberg subirent, à nouveau,un dur combat entre les Troupes Françaises et Prussiennes, lors de la Bataille de Wissembourg, au début de la guerre de 1870. En 1940, le château du Geisberg abandonné, fut pris pour cible. Il sera incendié durant la guerre puis rasé en 1947, pour y construire de nouvelles habitations. Aujourd'hui, les seuls vestiges restants sont la tour-porche, la maison du gardien et les ruines des 2 pavillons de jardin.  Le château du Geisberg est inscrit aux M.H. depuis 1990.","architecture":"GEISBERG, en 1692, Jean Gaspard de Hatzel fit lacquisition des terres et fit construire un château, par larchitecte Rondouin. Le domaine, construit entre 1711 et 1714, était composé d'une demeure principale, d'un grand jardin avec 2 pavillons, ainsi que de multiples bâtiments agricoles. Les terres étaient entretenues par des fermiers mennonites dont les descendants occupent encore le Geisberg.","habitants":"famille de Philippe Michel Weber\"","divers":"Geisberg_ grav-1                                                        GPS : 49° 00' 48,8\" Nord, 7° 57' 14,08\" Est","gps":"49° 00' 48,8\" Nord, 7° 57' 14,08\" Est","images":["../../jctruffet.com/image/image_67/67_Geisberg_1.jpg"]},"Consult_chateau_formulaire4aa7":{"id":"Consult_chateau_formulaire4aa7","dept":"67","canton":"Haguenau","commune":"Haguenau","nom":"Haguenau","type":"Château","periode":"XVIII-XIX","histoire":"HAGUENAU  Le château Impérial  est bâti à Haguenau. C'est un château fort de style Classique. Sa construction date du XIIe siècle, XVIIIe et XIXe siècles. Le château Impérial de Haguenau est aujourd'hui une Maison de Retraite ,  il est de style classique. C'était le Palais Impérial des Hohenstaufen, puis Pfalz ou Burg des Hohenstaufen. Le château fort, puis le palais dit aussi Pfalz ou Burg, fut fondé par Frédéric II, duc de Souabe et d'Alsace entre 1115 et 1130 environ sur une île de la Moder. Il devint l'une des résidences préférées des Hohenstaufen. L'empereur Frédéric 1er fit construire la chapelle palatine vers 1170. Elle avait trois niveaux et une tour-choeur octogonale. Au XIVe siècle, le palais passa sous la responsabilité des baillis, l'enceinte du palais était entourée d'eau et fortifiée, à l'intérieur se situaient les curies des ministériaux avec maisons, dépendances, cours et jardins, à l'extérieur se trouvaient les greniers a blé, les écuries, la métairie, les moulins, jardins et viviers de la cour impériale. Palais et chapelle furent rasés en 1688 et leurs pierres furent utilisées dans la construction des fortifications du Fort-Louis, certaines pierres sculptées furent récupérées et sont exposées au musée historique. A l'emplacement du palais, les jésuites construisirent leur collège composé de trois ailes en fer à cheval. Dans l'une se trouvait leur église à l'emplacement de la chapelle palatine, dans les 2 autres les salles du collège et le corps de logis, la première pierre fut posée en 1730 ; une deuxième école réservée aux classes latines fut construite en face du collège en 1742, dans la basse cour se situaient les dépendances et à l'ouest du collège, dans le reste de l'île, se trouvaient une terrasse, un jardin potager et un verger, le collège ferma ses portes en 1765   dissolution de la société de Jésus en Alsace.","architecture":"HAGUENAU,  à  partir de 1772 projets d'aménagements du collège en caserne de cavalerie ; en 1775 le rez-de-chaussée était occupé par des écuries et un deuxième étage fut aménagé dans le bâtiment ; l'école latine fut transfomée en pavillon d'officiers, il sera détruit en 1838 ; de nouvelles écuries et un manège furent construits dans la partie ouest de l'île, ils seront complétés par d'autres écuries en 1846 ; au nord de l'île se trouvaient l'infirmerie des chevaux, l'étendage ou sécherie, les magasins à poudre, à bois de chauffage, paille, à fourrage, à vivres, la manutention des vivres, le pavillon ou bureau du génie et le magasin du génie ; ces bâtiments dataient du XVIIIe siècle et du début du XIXe siècle ; ils sont tous détruits ; en 1847 fut construit un grand manège ; et en 1874 un nouveau manège et des écuries réservés aux officiers ; en 1912 l'ancien collège fut surhaussé d'un 3e étage et d'un étage attique supprimant l'ancien toit à la Mansart ; en 1951 la ville racheta le bâtiment désaffecté de l'ancien collège et le transforma en maison de retraite, l'étage attique de 1912, le fronton et le portail qui subsistaient du collège, furent supprimés.","habitants":"Frédéric II, duc de Souabe \"","divers":"grav-1-2-3-GPS : 48° 48' 57\" N, 7° 47' 16\" Est","gps":"48° 48' 57\" N, 7° 47' 16\" Est","images":["../../jctruffet.com/image/image_67/67_Haguenau_1.jpg","../../jctruffet.com/image/image_67/67_Haguenau_2.jpg","../../jctruffet.com/image/image_67/67_Haguenau_3.jpg"]},"Consult_chateau_formulaire0208":{"id":"Consult_chateau_formulaire0208","dept":"67","canton":"Sélestat","commune":"Orschwiller","nom":"Haut_Knigsbourg","type":"forterresse","periode":"XII","histoire":"HAUT-KOENIGSBOURG Cette ancienne forteresse du XIIe siècle a été restaurée. Le château se situe sur un mont, avec ses tours d'artillerie, ses chambres royales et son jardin médiéval. Le château du Haut-Knigsbourg est ouvert au Public et se visite. Comptez 3 bonnes heures d'une visite vraiment passionnante ! Il a été complètement restauré au début du XXe siècle et  parfaitement entretenu. Le château du Haut-Koenigsbourg : construit au XIIe siècle,  domine la plaine dAlsace à plus de 700 mètres daltitude. Détruit lors de la guerre de Trente Ans, il est restauré de 1900 à 1908 par lempereur allemand Guillaume II. Il accueille une importante collection darmes et de meubles de lépoque. Le château du Haut-Knigsbourg est immense à découvrir. Un panorama magnifique vous récompensera de votre fatigue.   Tout d'abord appelé Staufenberg, le site comprend dès 1147 des fortifications qui permettent de surveiller la route reliant l'Alsace du Nord au Sud et l'un des axes principaux d'Est en Ouest. Il appartient alors à Frédéric de Hohenstaufen, futur empereur du Saint Empire Romain Germanique. Le nom de Koenigsbourg (château du roi) apparaît en 1192. Au XIIIème siècle, le château passe aux familles des Ratsamhausen et des Hohenstein. Devenu un repère de chevaliers brigands, le château est conquis et incendié en 1462 par une coalition regroupant Colmar, Strasbourg et Bâle.  Les restes du château du Haut Koenigsbourg sont alors confiés à la famille des Thierstein en 1479, qui le reconstruisent et l'adaptent à l'artillerie. A l'extinction de la famille des Thierstein en 1517, le château n'est plus entretenu et se délabre petit à petit.","architecture":"HAUT-KOENIGSBOURG,  Les fortifications ne résisteront pas aux Suédois, qui s'en emparent et l'incendient en 1633 lors de la guerre de Trente Ans.  Le château du Haut Koenigsbourg a été entièrement restauré à la demande de l'Empereur Guillaume II à partir de 1900, ce qui fait son originalité et son attrait, malgré les polémiques qui concernent la restauration. Un monument incontournable.  Franchir la haute porte du Haut-Koenigsbourg, cest plonger dans lunivers du Moyen Âge. L'unique château médiéval d'Alsace entièrement restauré. Un lieu unique à ne pas manquer ! \"Passer la porte du château du Haut-Koenigsbourg, c'est plonger dans l'univers du Moyen Âge, et c'est en le visitant  librement et en découvrant le parcours à votre rythme, que vous profiterez pleinement du monument, ses richesses et ses détails. Une visite privilégiée dans cette impressionnante forteresse.","habitants":"Empereur allemand Guillaume II, et   Frédéric de Hohenstaufen\"","divers":"Grav de 1 à 8                                                    GPS : 48° 14' 58\" Nord, 7° 20' 40\" Est","gps":"48° 14' 58\" Nord, 7° 20' 40\" Est","images":["../../jctruffet.com/image/image_67/67_Haut_Koenigsbourg_1.jpg","../../jctruffet.com/image/image_67/67_Haut_Koenigsbourg_2.jpg","../../jctruffet.com/image/image_67/67_Haut_Koenigsbourg_3.jpg","../../jctruffet.com/image/image_67/67_Haut_Koenigsbourg_4.jpg","../../jctruffet.com/image/image_67/67_Haut_Koenigsbourg_5.jpg","../../jctruffet.com/image/image_67/67_Haut_Koenigsbourg_6.jpg","../../jctruffet.com/image/image_67/67_Haut_Koenigsbourg_7.jpg","../../jctruffet.com/image/image_67/67_Haut_Koenigsbourg_8.jpg"]},"Consult_chateau_formulaire92c6":{"id":"Consult_chateau_formulaire92c6","dept":"67","canton":"Mutzig","commune":"Oberhaslach","nom":"Hohenstein","type":"Vestiges","periode":"XII","histoire":"HOHENSTEIN, le château est bâti par la famille de Hohenstein; l'évêque de Strasbourg est lun des copropriétaires à la fin du  XIIIe siècle. L'évêque Berthold de Bucheck est y retenu prisonnier en 1337 par Rodolphe de Hohenstein; à sa libération en 1338, il prend le château qui ne se relèvera plus de ses ruines. Accessible par un sentier de randonnée : l'Office de Tourisme de la Région de Molsheim-Mutzig propose la randonnée \"les ruines du Hohenstein\".","architecture":"HOHENSTEIN , le château du Hohenstein, surplombant l'entrée de la Vallée de la Bruche se situe dans la commune d'Oberhaslach, à une quarantaine de kilomètres de Strasbourg. Ce château du  XIIIe siècle fut construit sur un rocher à une altitude de 640 m.\nLe site est un éperon barré; du château il reste peu de chose : au nord, on distingue le moignon déparementé du donjon qui protégeait le logis en enfilade. Entre le fossé qui sépare le site de la montagne du Grand Ringelsberg et le donjon s'étend la basse-cour. Une enceinte flanquée d'un bastion semi-circulaire fut ajoutée par la suite. La construction est typique du début du XIIIe siècle compte tenu du site et du plan de l'ensemble.","habitants":"famille de Hohenstein\"","divers":"gps 48° 34' 02? nord, 7° 18' 38? est1","gps":"","images":["../../jctruffet.com/image/image_67/67_Hohenstein_1.jpg","../../jctruffet.com/image/image_67/67_Hohenstein_2.jpg"]},"Consult_chateau_formulairef20d":{"id":"Consult_chateau_formulairef20d","dept":"67","canton":"Bouxwiller","commune":"Dossenheim-sur-Zinsel,","nom":"Hunebourg","type":"Château","periode":"XX","histoire":"HUNEBOURG, le château de Hunebourg date du XXe siècle. il se situe sur un rocher gréseux à 425 mètres d'altitude. On accède au château du Hunebourg depuis la Vallée de la Zinsel. Les comtes de Hunebourg, issus des comtes de Dabo-Metz, c'est-à-dire des Folmar de Bliesgau-Metz-Lunéville par les hommes et des Eguisheim-Dabo comtes du Nord ou par les femmes, furent cités au début du XIIe siècle, dans des documents qui signalent l'existence du château et des deux premiers comtes Théoderic et Folmar. Les Sires de Hunebourg qui le possèdaient  jusqu'en 1225, étai
