n suivit l'exemple en prélevant massivement des pierres pour la construction des maisons. Le bâtiment a été restauré en partie par la Ville de Schirmeck en 1969.","habitants":"comte Jean de Salm\"","divers":"GPS : 48° 28' 46\" Nord, 7° 13' 11\" Est","gps":"48° 28' 46\" Nord, 7° 13' 11\" Est","images":["../../jctruffet.com/image/image_67/67_Schirmeck_1.jpg","../../jctruffet.com/image/image_67/67_Schirmeck_2.jpg"]},"Consult_chateau_formulaire17fb":{"id":"Consult_chateau_formulaire17fb","dept":"67","canton":"Molsheim","commune":"Dorlisheim","nom":"St_Jean_ Bugatti","type":"Château","periode":"XIX","histoire":"ST-JEAN -BUGATTI, la construction du château date du 1857. Vers 1830 le domaine de l'ancienne commanderie (environ 6 ha) fut acheté par la famille des Wangen de Geroldseck. En 1853 ils firent ériger une dépendance, dite pavillon de chasse, au nord de l'emplacement des bâtiments conventuels. Côté sud, ils firent bâtir une dépendance, dite chalet, réutilisant en partie centrale, une grange de 1788 de la commanderie. Le château fut construit ou achevé en 1857 (date portée). Les Wangen vendirent le domaine en 1910. En 1928 il fut acquis par Ettore Bugatti. Il servait pour les réunions publiques et les réceptions. Dans les années cinquante il fut aménagé pour loger des cadres de la société Automobile Ettore Bugatti. Actuellement propriété de la société allemande Bugatti automobile SAS.","architecture":"ST-JEAN -BUGATTI,  le château, restauré, sert à nouveau pour les réceptions. Les bâtiments annexes sont en cours de démolition (2003) mais devraient être reconstruits à l'identique. Le château Saint-Jean fut le siège du constructeur automobile Bugatti. Le château Saint-Jean fut érigé, de 1853 à 1857, par la Famille Wangen de Geroldseck à l'emplacement d'une ancienne commanderie du XVIIIe siècle de l'ordre de Saint-Jean de Jérusalem.  le château Bugatti sert de cadre à la présentation des voitures de luxe, aux réceptions et à l'accueil des clients. Les pavillons de chasse datent respectivement de 1766 et de 1853. En 2001, le château devint le siège de la société Bugatti-Automobiles SAS et permet d'accueillir, comme jadis, les clients .","habitants":"famille des Wangen de Geroldseck. \"","divers":"GPS : 48° 31' 35,88\" Nord, 7° 29' 56,03\" Est","gps":"48° 31' 35,88\" Nord, 7° 29' 56,03\" Est","images":["../../jctruffet.com/image/image_67/67_St_Jean_Bugatti_1.jpg"]},"Consult_chateau_formulaire2d33":{"id":"Consult_chateau_formulaire2d33","dept":"67","canton":"Strasbourg","commune":"Strasbourg","nom":"Strasbourg","type":"Palais","periode":"XVII-XVIII","histoire":"Trois palais dans cet artcle, le Pavillon Joséphine, Pourtalés et le Palais du Rhin.                                                                                                                                   PAVILLON JOSEPHINE, la construction du Pavillon Joséphine date de 1804. Il tient son nom de l'impératrice Joséphine de Beauharnais, femme de Napoléon Bonaparte, entre 1796 et 1809. Les 3 salles du Pavillon Joséphine (Salle Napoléon, la salle de l'Impératrice et la salle Joséphine) offrent pour vos réceptions, un cadre chic et agréable. Deux salles contiennent 240 personnes pour un banquet assis ou 300 pour un cocktail. Souvent utilisées pour des manifestations publiques comme des salons, concerts, conférences ou expositions, les salles du pavillon sont également très demandées pour l'organisation de banquets et de mariages. Le lieu est idéalement situé pour une petite fête ou un événement au coeur de ce superbe écrin de verdure qu'est le jardin de l'Orangerie. Pour une soirée dansante avec dj, des formules de sonorisation adéquates vous sont proposées. L'espace cuisine est à disposition près de la salle Napoléon avec un accès traiteur. Vous pouvez profiter du parvis extérieur qui donne sur le parc du côté de la fontaine. La fête peut durer jusqu'à 6h du matin.                                                                                                                              POURTALES,   son premier propriétaire fut Joseph Guérault, entrepreneur des ouvrages du Roi et chargé notamment de construire les fortifications de Strasbourg au XVIIIe siècle.  En 1784, le baron de Coehorn en fait sa résidence principale. En 1802, le banquier et homme politique Athanase Paul Renouard de Bussierre (1776-1846) l'acquiert. En 1844 son fils Alfred Renouard de Bussière (1804-1887) y effectue une série de transformations.\nLe château échoit à sa fille Mélanie de Pourtalès (1836-1914), épouse du banquier Edmond de Pourtalès-Gorgier. Mélanie de Pourtalès reçoit beaucoup dans le château qu'elle fait très profondément transformer, de 1887 à 1902, par l'architecte Breffendille : réorganisation totale des intérieurs, adjonction d'un nouveau corps de bâtiment de style Louis XV accolé à l'aile droite du château, création de vastes dépendances. En 1897 elle fait aménager un deuxième étage mansardé au château.","architecture":"POURTALES  , en 1907, une tourelle est créée par les architectes Berninger et Krafft pour y loger notamment une vaste bibliothèque. Elle fait du lieu une plaque tournante de la diplomatie européenne, en y recevant de nombreuses personnalités (Napoléon III, le Prince de Metternich.) et un cercle de culture française, durant l'annexion (consécutive au traité de Francfort) , après la guerre franco-allemande de 1870.                                                                               PALAIS DU RHIN est de style Néo-Renaissance. C'est l'ancien Kaiserpalast ce qui veut dire  un Palais impérial. Le Palais du Rhin est de style Néo-Renaissance prussienne. Sa construction a débuté en 1883 et s'est achevée en 1888. C'était un Palais Impérial. Menacé de destruction dans les années cinquante par la municipalité, il devait être remplacé par une tour. Il est sauvé grâce à laction de lassociation des « Amis du Vieux Strasbourg » créée à cette occasion. Le palais est classé monument historique depuis 1932. Il accueille désormais, en plus de la commission centrale pour la navigation du Rhin, la Direction régionale des Affaires culturelles (DRAC). Les écuries du palais sont, elles, classées monument historique en 2009. Le Palais du Rhin se situe à Strasbourg, dans la Neustadt, sur la Place de la République, quil domine de son imposante coupole. Avec le grand jardin qui lentoure, le Palais du Rhin, ceint de grilles en fer forgé ornées, et les anciennes écuries situées derrière le bâtiment, il forme lun des ensembles les plus complets et les plus emblématiques de l'architecture prussienne. Le Palais du Rhin est classé aux M.H. depuis 1993 et ses écuries en 2009,  de style Néo-Renaissance.","habitants":"impératrice Joséphine de Beauharnais.                Pourtalés   Joseph Guerault.\"","divers":"Trois palais dans cet artcle, le Pavillon Josephine grav_2, Pourtalés grav_1 et le Palais du Rhin grav-3.                                         Pourtales GPS : 48° 36' 30\" Nord 7° 48' 00\" Est                                                  GPS : 48° 34' 24 Nord, 7° 45' 08\" Est          Palais GPS : 48° 35' 15\" Nord, 7° 45' 09\" Est .                                                       Hôtel de Hanau grav_5 et la cathedrale grav _4  lycée Pontiers_grav-8 et le pont couvert_grav-7","gps":"48° 36' 30\" Nord 7° 48' 00\" Est","images":["../../jctruffet.com/image/image_67/67_Strasbourg_1.jpg","../../jctruffet.com/image/image_67/67_Strasbourg_2.jpg","../../jctruffet.com/image/image_67/67_Strasbourg_3.jpg","../../jctruffet.com/image/image_67/67_Strasbourg_4.jpg","../../jctruffet.com/image/image_67/67_Strasbourg_5.jpg","../../jctruffet.com/image/image_67/67_Strasbourg_6.jpg"]},"Consult_chateau_formulaire182f":{"id":"Consult_chateau_formulaire182f","dept":"67","canton":"Mutzig","commune":"Thanvillé","nom":"Thanvillé","type":"Château","periode":"XVI","histoire":"THANVILLE,  le nouveau château de Thanvillé date du XVIe siècle. C'est un beau château de style Renaissance. Le château de Thanvillé est inscrit aux M.H. depuis le 9/05/1988 et classé aux M.H. depuis le 9/05/1989. Le château de Thanvillé vous propose, depuis, la location de ses salles pour vos réceptions privées et mariages, dans un cadre superbe. Il est la propriété d'une société privée. Le château de Thanvillé est situé au schlosshof - le 17 août 1870, le capitaine Stouvenot, de la 8è compagnie, sétait dirigé vers 13 heures en direction de louest avec le sous-lieutenant Minicus et 48 hommes. Il poussa la reconnaissance jusque dans le Val-de-Villé.  Les gardes mobiles surprirent dans leur bivouac, en face du château de Thanvillé, deux escadrons du régiment de dragons badois du 20è corps, commandés par le major von Kleiser. Les mobiles attaquèrent les Badois qui eurent le temps de monter en selle avant dêtre cernés. Ils séchappèrent en gagnant le fond de la vallée et en sabrant hommes et femmes quils trouvaient sur leur passage.","architecture":"THANVILLE, Ils gagnèrent les bois dErlenbach, du côté de lUngersberg. Le capitaine Stouvenot avait fait prévenir la place de Schlestadt quil était fortement engagé dans Thanvillé contre des forces supérieures en nombre. Le commandant ordonna à la 7è compagnie de se porter à son secours. Les cavaliers badois eurent 10 hommes tués et une trentaine de blessés qui furent laissés sur place. Cinq prisonniers furent ramenés à Schlestadt.Le lendemain, il manquait 47 dragons à lappel ce qui incita les Badois à exercer de violentes représailles car ils pensaient que les paysans de la vallée avaient secondé les gardes mobiles. Les soldats badois se répandirent alors dans toute la vallée, réquisitionnant à outrance dans tous les villages, pillant et fusillant même quatre pères de famille à Thanvillé, soupçonnés davoir tiré sur les dragons.  M. de Castex, considéré comme le chef du mouvement, fut condamné à mort par contumace. Son château fut pillé, des vases de Sèvres de grande valeur furent brisés et la tenue de général du premier Empire de son père fut lacérée. Villé fut rançonnée sans pitié, on emmena comme otages des prêtres, des maires, des notables qui ne furent relâchés que le 2 septembre grâce à lintervention de lambassadeur dAngleterre.","habitants":"M. de Castex,\"","divers":"GPS : 48° 19' 23\" Nord, 7° 20' 43\" Est","gps":"48° 19' 23\" Nord, 7° 20' 43\" Est","images":["../../jctruffet.com/image/image_67/67_Thanvill%c3%a9_1.jpg","../../jctruffet.com/image/image_67/67_Thanvill%c3%a9_2.jpg","../../jctruffet.com/image/image_67/67_Thanvill%c3%a9_3.jpg","../../jctruffet.com/image/image_67/67_Thanvill%c3%a9_4.jpg","../../jctruffet.com/image/image_67/67_Thanvill%c3%a9_5.jpg","../../jctruffet.com/image/image_67/67_Thanvill%c3%a9_6.jpg","../../jctruffet.com/image/image_67/67_Thanvill%c3%a9_7.jpg"]},"Consult_chateau_formulaire0ae8":{"id":"Consult_chateau_formulaire0ae8","dept":"67","canton":"Reichshoffen","commune":"Reichshoffen","nom":"Tour_des_Suédois","type":"Tour","periode":"XIV-XV","histoire":"TOUR  DES SUEDOIS, la construction de la Tour du Suédois date du XIVe au XVe siècle. 3 enceintes furent bâties autour de Reichshoffen. La plus ancienne attestée date du XIIe siècle. A la fin du XIIIe siècle, une seconde enceinte succéda à l'enceinte primitive quand Rodolphe 1er de Habsbourg éleva, en 1286, Reichshoffen, au rang de ville. Cette promotion lui permit d'organiser son propre marché et de dresser des remparts. A cette époque, Reichshoffen était la seule ville fortifiée d'Alsace.","architecture":"TOUR  DES SUEDOIS,  Au début du XIVe siècle, Reichshoffen s'agrandit au-delà de la seconde enceinte, qui ne la protège plus. Une 3ème enceinte fut alors bâtie avec un rempart, 5 tours et 3 portes de ville dénommées \"Hinterdor\", \"Vorderdor\", et \"Mitteldor\". Un veilleur de nuit assurait des rondes régulières. En 1633, ce dispositif défensif fut mis à mal par les Suédois. Au XIXe siècle, les 3 portes furent démolies pour faciliter la circulation. Des 5 tours, 2 ont été totalement rasées et 1, située rure du château,le fut partiellement. Il ne subsiste que 2 tours, rénovées en 2007 et coiffées comme autrefois d'une toiture en poivrière, d'après une gravure du XVIIe siècle. La Tour des Suédois, restaurée en 2007, se dresse place de Woerth, en face du cimetière et du Monument des Morts aux Ambulances. Elle ressemble beaucoup à la Tour des Remparts, mais cette dernière est recouverte d'un enduit peint en blanc.","habitants":"Rodolphe 1er de Habsbourg\"","divers":"GPS : 48° 56' 06\" Nord, 7° 40' 01\" Est","gps":"48° 56' 06\" Nord, 7° 40' 01\" Est","images":["../../jctruffet.com/image/image_67/67_Tour_des_Su%c3%a9dois_1.jpg"]},"Consult_chateau_formulaired490":{"id":"Consult_chateau_formulaired490","dept":"67","canton":"Molsheim","commune":"Dachstein","nom":"Turckheim","type":"château","periode":"XVI-XVIII","histoire":"TURCKHEIM Il fut bâti de 1572 à 1872. Dachstein était la résidence principale des évêques de Strasbourg au XIIIe siècle. En 1214, un château sera élevé puis démoli, * Au début du moyen âge, une première fortification existe certainement. Le site formant une grande île enserrée par les bras de la rivière Bruche est propice à un système défensif habitable. Les évêques de Strasbourg sont propriétaires des terres et de la fortification. En 1262, le bourg est pillé et incendié après la bataille de Hausbergen. A la fin du XVIe siècle , Jean de Manderscheid aménage les fortifications de Dachstein. En 1592, le bourg est pris lors de la guerre des évêques. Au début du XVII siècle, Dachstein est attaqué puis occupé par les Suédois. Quelques temps après, les troupes impériales occupent le site. En 1663, le bourg passe sous le contrôle de la France.  En 1675, après un long siège, le maréchal Turenne laisse les Français piller Dachstein. En 1718, le Cardinal de Rohan-Soubise donne le petit bourg de Dachstein au bailli François Antoine Herrenberger. Au XXI siècle, la découverte du bourg est libre et gratuite. La plupart des bâtiments sont privés et leur intérieur non visitable .en 1675. En 1572, l'évêque Jean de Mandescheid se fait bâtir une nouvelle résidence, occupée par les évêques, jusqu'en 1718. Au XIXe siècle, le Vieux château de  Dachstein bénéficiera d'agrandissements de style néo-Renaissance, grâce à la famille de Turckheim. Le château de Turchheim est classé aux M.H. depuis 1992.  Le château de Dachstein ne se visite qu'en de rares occasions  Le château de Turckheim est la résidence privilégiée des évêques de Strasbourg du XIIIe siècle au XVe siècle.","architecture":"TURCKHEIM ,  au départ, le château de Turckheim était un château fort du Moyen Age jusqu'à la construction d'un château de plaisance, dans son enceinte. Au cours du temps, le château a subi de nombreuses restaurations et de réaménagement. Étant composée de deux ailes en équerre, la construction est bâtie sur deux niveaux. Coté Est, on peut observer la façade principale décorée de deux oriels, tandis qu'à l'Ouest, la façade est interrompue, par une tourelle, contenant des escaliers.","habitants":"Famille de Turckheim.\"","divers":"GPS : 48° 33' 42,32\" Nord, 7° 31' 49,74\" Est                                                   Turckheim  GPS : 48° 33' 42,93\" Nord, 7° 31' 50,12\" Est","gps":"48° 33' 42,32\" Nord, 7° 31' 49,74\" Est","images":["../../jctruffet.com/image/image_67/67_Turckheim_Dachstei_1.jpg","../../jctruffet.com/image/image_67/67_Turckheim_Dachstei_2.jpg","../../jctruffet.com/image/image_67/67_Turckheim_Dachstei_3.jpg"]},"Consult_chateau_formulaire08e4":{"id":"Consult_chateau_formulaire08e4","dept":"67","canton":"Molsheim","commune":"Ernolsheim-Bruche,","nom":"Urendorf","type":"Château","periode":"XVI-XVII","histoire":"URENDORF, la construction du château d'Urendorf date du XVIe au XVIIe siècle. En 1554, la famille Uhrendorf érigea un petit château Renaissance, comme l'indique le nombre inscrit dans la pierre scellée dans le mur du pignon. Les Uhrendorf faisaient partie d'une famille de chevaliers de Strasbourg, famille qui est connue depuis le milieu du XIVe siècle. On peut voir encore aujourd'hui derrière la chapelle du cimetière une pierre tombale qui était dédiée au sévère seigneur Caspar Von Uhrendorf, décédé en 1599. A l'extinction de leur lignée, en 1636, le château d'Urendorf devint la propriété de Franz Reinhard von Bettendorf, qui le revendit en 1685 à Frédéric Casimir de Rathsamhausen-Ehenweier, faisant partie de la noblesse d'Empire. Les seigneurs d'Uhrendorf et Breuschwald disposaient de biens importants. En l'an 1732, les châteaux d'Uhrendorf et de Breuschwald changèrent de propriétaires : François-Antoine de Cléry fit l'acquisition de tous les biens et se nomma alors « Seigneur d'Uhrendorf et de Breuschwald ».","architecture":"URENDORF, Les de Cléry descendaient d'une famille suisse connue depuis deux siècles pour être au service des rois de France en tant qu'officiers. François-Antoine ne resta pas longtemps seigneur d'Uhrendorf et de Breuschwald. Tout laisse à penser qu'il géra mal ses biens et fut obligé de les vendre. Le colonel de Cléry fut pensionné en 1770 et se retira à Soultz dans le Haut-Rhin. Son fils, François-Jacques, complètement ruiné, entra alors dans l'armée du Roi de Prusse, comme simple soldat, en 1773 à Berlin. Il abandonna son titre de noblesse. Il devint sergent et en 1804, il était maître d'armes du futur empereur Guillaume Ier d'Allemagne.  Au cours du XVIIIe siècle, il passa  aux mains des Wimpfen, avant de devenir une exploitation agricole. Aujourd'hui, il est la propriété de la famille Reibel, depuis la fin du XIXe siècle à ce jour.","habitants":"famille Uhrendorf et e Franz Reinhard von Bettendorf\"","divers":"GPS : 48° 33' 49,78\" Nord, 7° 33' 52,6\" Est","gps":"48° 33' 49,78\" Nord, 7° 33' 52,6\" Est","images":["../../jctruffet.com/image/image_67/67_Urendorf_1.jpg"]},"Consult_chateau_formulairec121":{"id":"Consult_chateau_formulairec121","dept":"67","canton":"Erstein","commune":"Matzenheim","nom":"Verdé","type":"château","periode":"XVII-XIX","histoire":"VERDE, Installé au cur de l'Alsace, le château de Werde vous accueille dans un bâtiment du XVIIe siècle, au sein d'un paisible parc au bord d'une rivière. Il vous propose des hébergements élégants et confortables ainsi qu'une connexion à Internet gratuite.  Le site semble habité depuis l'époque gauloise, en effet, les vestiges de l'époque de ce qui serait une ferme a été découvert. Des fouilles effectuées en 2005, le long de la voie de chemin de fer, ont mis au jour deux nécropoles mérovingiennes à cheval sur les bans des communes dOsthouse et Matzenheim, lors des sondages en vue de la création de la troisième voie. Le château de Werde est une résidence des comtes de Werde, principaux vassaux de la région depuis le XIIe siècle.","architecture":"VERDE,   le château des comtes de Werde a été construit au XIIe siècle, puis il fut restauré au XIXe siècle ainsi qu'en 2005. Il dispose de chambres élégantes et confortables.  Il  a été reconstruit au XVIIe siècle et  entièrement rénové pour offrir tout le confort moderne tout en conservant son charme d'origine. Les chambres sont décorées de façon individuelle et disposent d'un mobilier confortable, d'une télévision et d'une salle de bains privative. Le petit déjeuner est servi tous les jours et le personnel pourra vous suggérer quelques restaurants de qualité dans les environs. Le château De Werde se trouve à 25 kilomètres au sud de Strasbourg, en bordure de la rivière Ill. Il est entouré de beaux jardins paysagers.","habitants":"comtes de Werde\"","divers":"GPS : 48° 23' 17\" Nord, 7° 38' 15\" Est","gps":"48° 23' 17\" Nord, 7° 38' 15\" Est","images":["../../jctruffet.com/image/image_67/67_Verd%c3%a9_1.jpg","../../jctruffet.com/image/image_67/67_Verd%c3%a9_2.jpg"]},"Consult_chateau_formulairea2e4":{"id":"Consult_chateau_formulairea2e4","dept":"67","canton":"Bouxwiller","commune":"Wilwisheim","nom":"Wangen","type":"château","periode":"XVII","histoire":"WANGEN,  sa construction date du 3e quart du XVIIe siècle. Le manoir élevé par Jean-Louis Albert de Wangen en 1669 était complété d'un grand parc, disparu lors de la transformation des lieux en domaine agricole. Il est composé d'un corps de logis, assez intact extérieurement et intérieurement, et de deux dépendances perpendiculaires, dont l'une se prolonge d'une chapelle. C'est une propriété privée qui appartient à la commune de Wilwisheim. Le manoir est inscrit aux M.H. depuis le 30/10/2003.  il est privé, fermé au Public.                                         WILWISHEIM   est une commune française de la plaine d'Alsace située à 25,8 km au nord-ouest de Strasbourg dans la circonscription administrative du Bas-Rhin et, depuis le 1er janvier 2021, dans le territoire de la Collectivité européenne d'Alsace, en région Grand Est.\nn 2013, la population légale est de 716 habitants. Village de milieu rural, Wilwisheim est intégrée dans la communauté de communes du Pays de la Zorn qui regroupe 27 localités autour de Hochfelden.","architecture":"WANGEN,  c'était un château fort construit en 1260, qui se dressait à Wangen. Les éléments subsistants de l'enceinte extérieure et du terrain archéologique correspondant sont inscrits aux M.H. partiellement depuis le 3/12/1993. Le château de Wangen adoptait un plan polygonal. Ses courtines étaient régulièrement flanquées en leur milieu par des tours. Il ne reste quasiment rien du château féodal, si ce n'est son emplacement délimité par l'actuelle rue du château, il est une propriété privée, fermée au Public. Il est inscrit comme M.H. en 1993.","habitants":"commune de Wilwisheim.\"","divers":"GPS : 48° 45' 27,83\" Nord, 7° 34' 6,21\" Est                                                         Wangen  GPS : 48° 37' 01,56\" Nord, 7° 27' 56,7\" Est","gps":"48° 45' 27,83\" Nord, 7° 34' 6,21\" Est","images":["../../jctruffet.com/image/image_67/67_Wangen_1.jpg","../../jctruffet.com/image/image_67/67_Wangen_2.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','67 — Bas-Rhin'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
