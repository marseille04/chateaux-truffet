ent les avoués des abbayes de Neuwiller et de Honau. Le plus connu de la famille des Hunebourg est Conrad II, évêque de Strasbourg de 1190 à 1202. Il rompt l'alliance traditionnelle entre les évêques de Strasbourg et les empereurs du Saint Empire. Avec les comtes de Dabo-Metz, il prend le parti du pape Innocent III contre les Hohenstaufen lors de la succession de Henri VI. La compétition oppose Otton de Brunswick au Hohenstaufen Philippe de Souabe qui vient ravager les terres épiscopales et l'évêque doit finalement se rallier à ce dernier. Au XIIIe siècle, le château passe aux mains des Lichtenberg. Vendu à la Révolution, les ruines du château sont acquises, en 1809, par le général Clarke, qui transforme le domaine en un parc. En 1932, Fritz Spieser achète les ruines du château et fit construire, en 1934, par Karl Erich Loebell, architecte de l'École de Stuttgart et élève de Paul Schmitthenner, de nouveaux bâtiments résidentiels et un donjon en style néoroman.","architecture":"HUNEBOURG,  le château abritait des réunions dassociations alsaciennes autonomistes (Erwinsbund, Jungmannschaft) et Spieser y organisait des manifestations de danse folklorique et de chant populaire. La presse francophile d'Alsace attaqua le château reconstruit comme un bastion de l'esprit allemand. Le lieu, après la réoccupation de l'Alsace l'exécution de Charles Roos est un site récupéré par la propagande nazie et devient un lieu de pèlerinage obligatoire pour les écoliers mosellans et alsaciens. Le château du Hunebourg est mis sous séquestre en 1944. Le service des domaines, chargé du séquestre, le donnera en location à la société mutualiste de l'Enregistrement à Paris. Celle-ci s'en rendit acquéreur lors d'une vente publique le 19 mai 1949. Le château resta, agrandi et rénové, longtemps une structure mutualiste destinée aux agents du Ministère des Finances. Le château du Hunebourg, devenu un lieu d'accueil touristique, a été transformé en un très bel hôtel de charme, qui comporte 3 salles de réunion. Il est géré depuis par la Société Vacanciel. Le château du Hunebourg est inscrit aux M.H. depuis 2007.","habitants":"Aux mains des Lichtenberg\"","divers":"grav -1-2                                                            GPS : 48° 50' 00\" Nord, 7° 21' 51\" Est","gps":"48° 50' 00\" Nord, 7° 21' 51\" Est","images":["../../jctruffet.com/image/image_67/67_Hunebourg_1.jpg","../../jctruffet.com/image/image_67/67_Hunebourg_2.jpg"]},"Consult_chateau_formulaire99ae":{"id":"Consult_chateau_formulaire99ae","dept":"67","canton":"Ingwiller","commune":"Ingwiller","nom":"Ingwiller","type":"pavillon","periode":"XIV-XV","histoire":"INGWILER,  le château d'Ingwiller, aujourd'hui entièrement disparu, fut une forteresse de type tour d'habitation construite vers le XIVe siècle. Plusieurs fois rénové, sa fonction fut plus résidentielle que défensive. Le bâtiment ne survécut pas aux tourmentes de l'histoire alsacienne. Au XIXe siècle, la synagogue de la communauté juive du bourg d'Ingwiller (département du Bas-Rhin fut construite sur les fondations de cet édifice défensif.  Il date du Moyen Âge, et fut presque entièrement détruit. Les anciens communs du château abritaient au XVIIe siècle les logements des domestiques, les cuisines, la pharmacie et un \"laboratorium\". D'après les fenêtres moulurées des pignons, le bâtiment remonte au moins au XVIIe siècle. En 1674, il aurait abrité le magasin à fourrages. La façade sur cour fut refaite au xixe siècle avec sa porte sculptée qui date de 1825. En 1847, une moitié du bâtiment fut acquise, par le Notaire Louis Rauch, pour servir de Presbytère au Pasteur et au Vicaire, la moitié Sud fut rachetée plus tard, il est permis de penser qu'un château existait déjà à Ingwiller en 1346, année où fut accordée à la ville le droit de se ceindre d'une muraille. Cependant, la première mention sûre ne remonte qu'à l'année 1405. Le château fut rénové en 1472 par le comte Jacques de Lichtenberg (selon une inscription commémorative conservée à la mairie locale). Ce personnage, dernier mâle des sires de Lichtenberg y décède le 5 janvier 1480, suivi de près par son gendre Philippe I de Hanau-Lichtenberg, le 10 janvier 1480, résidant au château le temps des funérailles et du règlement de la succession. Sous le règne de Philippe III, la famille comtale y fit aménager en 1521 une chambre dorée.","architecture":"INGWILER. Durant la guerre de Trente Ans, le château fut lourdement endommagé sans être entièrement détruit. Un document de 1680 mentionne en effet le mauvais état de la chambre dorée. De ce château, il ne subsiste plus qu'une cave voutée ainsi que contre le mur oriental, les restes d'une tour ronde (fin XIVe siècle ou début XVIe siècle). On peut déduire de ces vestiges que le château d'Ingwiller devait se présenter comme une tour de plusieurs étages destinée à l'habitation. Un inventaire de 1624 mentionne un espace considérable de trente-six salles et chambres. Cette tour est sans doute celle érigée en 1379 par le sire Simon de Lichtenberg. Au XVIIe siècle, l'enclos castral réunissait, outre les communs, un arsenal, un abattoir, une buanderie, une boulangerie, des écuries, des étables et un hangar.\nEn 1807, le château et ses communs furent accordés, en guise de dédommagement, à l'hôpital de Bouxwiller. En 1821, une partie du terrain de l'ancien château fut cédé à la communauté juive locale qui y fit construire en 1822, sur la cave, sa nouvelle synagogue dIngwiller, elle est de style néo-roman. Elle est bâtie sur les fondations de lancien château des comtes de Lichtenberg. Admirez son clocher à bulbe de style oriental, revêtu de cuivre en 1913.","habitants":"le comte Jacques de Lichtenberg\"","divers":"grav -1-2                                                         GPS : 48° 52' 22\" Nord, 7° 28' 44\" Est","gps":"48° 52' 22\" Nord, 7° 28' 44\" Est","images":["../../jctruffet.com/image/image_67/67_Ingwiller_1.jpg","../../jctruffet.com/image/image_67/67_Ingwiller_2.jpg"]},"Consult_chateau_formulaire0b0c":{"id":"Consult_chateau_formulaire0b0c","dept":"67","canton":"Molsheim","commune":"Klingenthal","nom":"klingenthal","type":"Château","periode":"XVII-XVIII","histoire":"KlINGENTHAL , niché au pied du Mont Saint Odile, le village de Klingenthal  vallée des lames,  tire son nom de létablissement en son sein de la première Manufacture royale darmes blanches. Situé sur un terrain de 1,4 hectares, dont 50 ares constructibles, ce château fut érigé en 1732 pour le compte des entrepreneurs de la Manufacture. Actuellement exploité pour de lorganisation dévénements, il offre une surface de 1000 m² ainsi que de nombreuses dépendances.   Ce \"chateau\" (une fois traduit) du premier entrepreneur des forges est un charmant manoir du XVIIIe siècle construit pour Henri Anthès, déjà propriétaire de forges à Rothau, afin qu'il puisse administrer les forges que Louis XV avait installées dans la vallée (en faisant venir des artisans étrangers puisque le savoir-faire n'existait pas dans le semblant dhexagone de l'époque). Léchauguette décorative fait bon effet ainsi que les détails du fronton de la grille.\nEdit 2022 : il est actuellement en vente .","architecture":"KlINGENTHAL ,  un superbe escalier orné de fer forgé distribue les différents étages de la demeure et notamment le sous-sol et son vaste espace de réception voûté réchauffé par une monumentale cheminée centrale. Entièrement doté de parquets massifs, le premier étage comprend un petit salon, une très belle salle de réception ainsi que deux chambres. Enfin, le second et dernier étage dessert les autres chambres du château qui en totalise 25. Au sein du parc, les 4 anciens ateliers daffûtage représentent un potentiel daménagements supplémentaires tandis que les anciennes écuries abritent désormais les voitures des visiteurs.\nParticulièrement adapté à une activité daccueil dhôtes et dorganisation dévénements, ce lieu chargé dhistoire a conservé son charme des siècles passés. Il ravira les amoureux de vieilles pierres à la recherche dun écrin pour faire éclore leurs projets.","habitants":"famille d' Henri Anthès\"","divers":"48° 28' 00? nord, 7° 25' 00? est","gps":"","images":["../../jctruffet.com/image/image_67/67_Klingenthal_1.jpg","../../jctruffet.com/image/image_67/67_Klingenthal_2.jpg","../../jctruffet.com/image/image_67/67_Klingenthal_3.jpg"]},"Consult_chateau_formulairefe48-2":{"id":"Consult_chateau_formulairefe48-2","dept":"67","canton":"Illkirch-Graffenstaden","commune":"Illkirch-Graffenstaden,","nom":"Klinglin","type":"château","periode":"XVII","histoire":"KLINGLIN,  sa construction date du 2èe quart du XVIIIe siècle. Construit vers 1735 sur l'emplacement de l'ancien château d'Illhausen pour le préteur royal Klinglin ; la construction peut être attribuée à Jean pierre Pflug, architecte de la ville de Strasbourg qui aurait construit l'hôtel de Klinglin dans cette ville ; les grilles du parc et de l'escalier sont l'oeuvre de Sigismond Falkenhauer vers 1745 ; 2 statues de sphinges provenant de l'orangerie sont conservées actuellement au pavillon Joséphine dans le jardin de l'orangerie de Strasbourg. Le Château Klinglin fut démoli, après 1789, sauf l'orangerie que l'on peut encore admirer.","architecture":"KLINGLIN, construit en 1735 par le Prêteur royal de la province d'Alsace François-Joseph de Klinglin, cet élégant bâtiment de style Régence est tout ce qu'il reste de son château, détruit durant la Révolution. L'architecte en serait Jean-Pierre Pflug, qui avait réalisé l'hôtel du préfet à Strasbourg. Il se compose d'un rez-de-chaussée surélevé orné sur toute la façade d'un balcon-coursive auquel on accède par un escalier double, et d'un étage dans les combles. Il est flanqué de deux pavillons carrés.  Autour, Klinglin fait réaliser un parc important, qu'il agrémente de jets d'eau, d'une quarantaine de statues évoquant la mythologie grecque. Les grilles du parc, celles de l'escalier et du balcon, dues à Sigismond Falkenhauer, sont classés Monuments historiques.L'Orangerie abrite aujourd'hui les bureaux du collège. Son parc a été réaménagé dans une évocation contemporaine de ce jardin d'antan, dont un texte d'époque expliquait \"qu'il n'était qu'un massif de fleurs et d'orangers\".\nLes deux sphinges en grès rose, qui flanquent aujourd'hui symétriquement l'entrée du Pavillon Joséphine de l'Orangerie à Strasbourg, faisaient à l'origine partie des aménagements de ce jardin.","habitants":"oeuvre de Sigismond Falkenhauer \"","divers":"GPS : 48° 31' 55,35\" Nord, 7° 42' 55,43\" Est","gps":"48° 31' 55,35\" Nord, 7° 42' 55,43\" Est","images":["../../jctruffet.com/image/image_67/67_Klinglin_1.jpg"]},"Consult_chateau_formulaire04dc":{"id":"Consult_chateau_formulaire04dc","dept":"67","canton":"Lingolsheim","commune":"Kolbsheim","nom":"Kolbsheim","type":"Château","periode":"XVII-XX","histoire":"Deux châteaux dans cet article Kolbsheim et Hangenbietein.                     dans la zone à l'est de KOLBSHEIM le château de Hangenbietein   \nEn 1900, Philippe Bernhard achète la propriété, où se trouve une villa datant de 1830 quil détruit, pour faire construire lédifice actuel. Le château est composé de pierres de taille et sa toiture est couverte dardoise. Le château est une demeure privée, Sur cette propriété s'élevait une superbe maison de maître dite \" villa Flaxland \" construite en 1830. En 1900, elle fut achetée par Philippe Bernhard qui la fit raser pour y édifier la résidence actuelle. Selon un renseignement oral de l'actuelle propriétaire, cette demeure pourrait être une oeuvre de l'architecte Moessler de Strasbourg. Elle mériterait une visite de l'intérieur.   L'édifice, en maçonnerie enduite, comporte cependant un avant-corps et un rez-de chaussée en pierre de taille et du pan de bois au niveau des combles. La toiture complexe est couverte d'ardoise. Les élévations sont animées d'avants-corps, surmontés de terrasses rectangulaires ou semi-circulaire, d'une véranda, de tourelles de plan quadrilatère et d'une logette sur l'angle. Les baies adoptent des formes variées, les combles sont éclairés de lucarnes à frontons triangulaires. Une maison de gardien se situe près de l'entrée.","architecture":"HAGENBIETEIN, il s'agit d'un château médiéval autour duquel des huttes se sont groupées petit à petit pour former un hameau, un Heim, le Bittenheim. La proximité d'une colline, à la pente, \"am Hang\" explique la désignation Hangenbuotenheim, devenue en 1540 Hangenbietenheim et en 1790 Hangenbieten.\nLe blason de la commune représente une coupe d'or sur un champ d'azur, portant un serpent surmonté d'une main tendue. Il rappellerait le signe de croix fait par l'apôtre Jean pour écarter les effets nocifs d'un poison contenu dans le calice. Mais le serpent était un symbole volontairement ambigu. Il pouvait exprimer à la fois le bien et le mal.","habitants":"famille Mullenheim-Rechberg  et   Philippe Bernhard \"","divers":"deux châteaux dans cet article Kolbsheim grav-1-2 et Hangenbietein.   Grav 3","gps":"","images":["../../jctruffet.com/image/image_67/67_Kolbsheim_1.jpg","../../jctruffet.com/image/image_67/67_Kolbsheim_2.jpg","../../jctruffet.com/image/image_67/67_Kolbsheim_3.jpg"]},"Consult_chateau_formulaire4882":{"id":"Consult_chateau_formulaire4882","dept":"67","canton":"Molsheim","commune":"Marlenheim","nom":"Kronembourg","type":"forteresse","periode":"XII","histoire":"KRONEMBOURG ,  HOHENSTAUFFEN, Le château de Kronenbourg est sans doute fort ancien. Au début du XII° siècle il est occupé par le grand bailli impérial de Haguenau WOLFHELM (1218). Ce personnage eut un destin tragique. Etant tombé en disgrâce, l'empereur FREDERIC II le fait emprisonner au château de HAGUENAU et ourdit un plan diabolique pour se débarrasser de son bailli: Le détenu est exceptionnellement autorisé à visiter son épouse, laquelle en accord avec l'empereur va l'étouffer durant son sommeil.  la construction du château de Kronembourg date du XIIIe siècle. La mairie de Marlenheim est installée dans ces murs  fort ancien. Au début du XIIe siècle il est occupé par le grand bailli impérial de Haguenau Wolfhelm (1218).\nLa forteresse dont les occupants se sont rebellés contre l'autorité impériale est détruite par les strasbourgeois emmenés par lévêque Henri de Stalfelm en 1246, en même temps que le château de Wickersheim Longtemps le site servira de carrière de pierres et sera aménagé pour la culture de la vigne comme en témoignent les divers murs de soutènement présents aux alentours du château et qui ont été érigés avec les pierres de la forteresse dont l'aspect brut est si particulier.","architecture":"KRONEMBOURG; Le rocher imposant est équipé d'escaliers métalliques avec rambardes qui permettent daccéder à la ruine qui elle est envahit par une végétation luxuriante et impénétrable. Outre quelques vestiges de murailles accrochées au rocher, les principaux vestiges sont constitués de restes de l'enceinte dont les murs atteignent encore par endroit une hauteur de plus d'un mètre. L'appareillage de ces murs est constitué de moellons grossiers et irréguliers, mais certaines pierres sont plus élaborées. Il subsiste beaucoup de vestiges qui mériteraient une considération plus appuyée. La plupart des restes sont masqués par une inextricable végétation, les ruines se trouvent sur la commune de Marlenheim au rocher de Loewenkopf à 280 mètres daltitude. Le château servait au contrôle du défilé du Kronthal par ou la route reliant Stasbourg à Saverne (actuelle R.N. 4) se fraie un passage.Le rocher imposant est équipé d'escaliers métalliques avec rambardes qui permettent daccéder à la ruine qui elle est envahit par une végétation luxuriante et impénétrable. Outre quelques vestiges de murailles accrochées au rocher, les principaux vestiges sont constitués de restes de l'enceinte dont les murs atteignent encore par endroit une hauteur de plus d'un mètre. L'appareillage de ces murs est constitué de moellons grossiers et irréguliers, mais certaines pierres sont plus élaborées. Il subsiste beaucoup de vestiges qui mériteraient une considération plus appuyée. La plupart des restes sont masqués par une inextricable végétation.","habitants":"grand bailli impérial de Haguenau \"","divers":"Grav-1                                                                GPS : 48° 37' 25\" Nord, 7° 29' 38\" Est","gps":"48° 37' 25\" Nord, 7° 29' 38\" Est","images":["../../jctruffet.com/image/image_67/67_Kronembourg_1.jpg"]},"Consult_chateau_formulaire9dcf":{"id":"Consult_chateau_formulaire9dcf","dept":"67","canton":"Obernai","commune":"Heiligenstein","nom":"Landsberg","type":"vestiges","periode":"XV","histoire":"Deux châteaux dans ceta artice Landsberg et Dartein.                              LANDSBERG cette forteresse possède une façade de style roman. Le château du Landsberg fut construit au début de 1197 à 1200 puis 1275,; il fut agrandi au nord-ouest vers 1235 par un nouveau château qui comportait une courtine flanquée de 2 tours circulaires, 2 logis et une vaste basse cour ; vers la fin du 3e quart du 15e siècle, le château délabré fut remanié et adapté aux armes à feu, il fut étendu vers le sud-est des grands travaux seront achevés par Woelflin, bailli impérial, en 1220 et des décennies durant, le château a été le siège ancestral des Chevaliers de Landsberg. Il a été conçu de façon à pouvoir se protéger tout en poursuivant lennemi. Ainsi, dun point de vue architectural, on distingue un donjon carré, un oriel abritant une chapelle centrale et derrière lui sérige de manière significative les bâtiments résidentiels de protection. pour Conrad de Landsberg. Il était destiné à assurer la défense des abbayes de Hohenbourg,au Mont Sainte-Odile), Niedermunster, Truttenhausen et Andlau. Sa construction a été achevée au XVe siècle. Il servait aussi de refuge en cas de danger, au château de Niedernai. C'est, en 1632, que les Suédois le détruisirent. Il est inscrit aux M.H. en 1965. Depuis 3 mois, dans le calme feutré dune étude de notaire, le château des Landsberg a retrouvé de nouveaux propriétaires : la famille du comte Christian dAndlau-Hombourg. Jadis, la prise dun château nécessitait la levée dune armée. « Aujourdhui, nous sommes dans un État de droit et nous sommes donc passés devant des gens de lois », glisse le comte à la vie trépidante. A 65 ans, il « ne reste jamais plus de 3 jours au même endroit », naviguant entre le château familial dIttenwiller (entre Saint-Pierre et Eichhoffen), Paris et les grandes villes européennes, pour ses activités politiques. Celui-ci a depuis, un projet de chai de vinification au château des Landsberg.","architecture":"DARTEIN, le château passa à la famille des barons von Falkenheim, originaires de Silésie. Sous lEmpire, il fût acquis par Charles de Dartein commissaire général des fontes de lartillerie de Strasbourg.  En 1843, Jean Georges Humann, député du Bas-Rhin puis ministre des Finances de Louis-Philippe, premier homme politique alsacien à devenir ministre, devint propriétaire de lensemble et entreprit la construction de laile Sud.  Son fils Théodore, né dans les lieux, sera maire de Strasbourg de 1864 à 1870.","habitants":"famille du comte Christian dAndlau-Hombourg\"","divers":"Landsberg GPS : 48° 27' 01\" Nord, 7° 03' 21\" Est                                                                TOUR de Guet GPS : 48° 27' 08,24\" Nord, 7° 31' 0,56\" Est","gps":"48° 27' 01\" Nord, 7° 03' 21\" Est","images":["../../jctruffet.com/image/image_67/67_Landsberg_1.jpg","../../jctruffet.com/image/image_67/67_Landsberg_2.jpg"]},"Consult_chateau_formulairee8dc":{"id":"Consult_chateau_formulairee8dc","dept":"67","canton":"Wissembourg","commune":"Lauterbourg","nom":"Lauterbourg","type":"château","periode":"XVIII","histoire":"LAUTERBOURG , Selon des documents des années 1083 et 1103 Henri IV transféra les possessions de Lauterbourg au diocèse de Spire. Ils comprenaient des terres, une forêt et les droits de chasse et de pêche qui y étaient joints. La ville continua de se développer dans les années suivantes et en 1252, elle obtint le droit de marché. Peu de temps après, elle fut le siège d'un bailliage qui comprenait 20 communautés des deux côtés de la Lauter. Pour protéger la ville on construisit un double cercle de murs avec 12 tours. Les évêques de Spire résidaient dans un château qui dominait la Lauter ;Bataille de Lauterbourg (Lignes de la Lauter), le 18 septembre 1793 entre les troupes des armées de la République et les troupes prussiennes de la Première Coalition (mort au combat du général Gabriel Louis Sabas Faivre de Courcelles, dit Febure (1726-1793).","architecture":"LAUTERBOURG , la construction du château episcopal de Lauterbourg date de 1716. Il fut la Maison du Bailli Holzapfel, puis devint l'ancien château épiscopal (1592-1716), puis un collège et un Tribunal. Le château épiscopal de Lauterbourg est inscrit aux M.H. depuis le 5/09/1932. Les éléments protégés du château sont l'escalier, la tourelle, l'élévation et la toiture. Il est ouvert au Public et se visite. Au début du XVIIIe siècle la ville, qui servait désormais de place forte à lextrémité orientale de la ligne de la Lauter, fut reconstruite par les Français. Après la chute de Napoléon le Congrès de Vienne, en 1815, constitua la Lauter comme frontière définitive de la France.La paix de Francfort en 1871 donna à lEmpire allemand Lauterbourg qui commença à sindustrialiser. On construisit une ligne de chemin de fer et un port sur le Rhin avec un terminal charbonnier. En 1919 le traité de Versailles rendit la ville à la France. \nFaçades avec tourelle d'escalier et toiture : inscription par arrêté du 5 septembre 1932 depuis 1870 il appartient à la famille Grunelius, Aujourd'hui propriété de l'état.","habitants":"Bailli Holzapfel et la famille Grunelius\"","divers":"grav_1 à 4                                                                           GPS : 48° 54' 17,33\" Nord, 8° 2' 37,74\" Est","gps":"48° 54' 17,33\" Nord, 8° 2' 37,74\" Est","images":["../../jctruffet.com/image/image_67/67_Lauterbourg_1.jpg","../../jctruffet.com/image/image_67/67_Lauterbourg_2.jpg","../../jctruffet.com/image/image_67/67_Lauterbourg_3.jpg","../../jctruffet.com/image/image_67/67_Lauterbourg_4.jpg"]},"Consult_chateau_formulaire2948":{"id":"Consult_chateau_formulaire2948","dept":"67","canton":"Molsheim","commune":"Broersch","nom":"Leonardeau","type":"Château","periode":"XIX","histoire":"LEONARDSAU, depuis le XIIIe siècle et jusquà la Révolution, les prairies sur lesquelles sest développé le domaine de la Léonardsau appartenaient à la collégiale Saint-Léonard. La construction du château de la Leonardseau date du XIXe siècle. Il se situe à cheval sur les communes de Brsch et d'Obernai. Le domaine est acheté en 1896 par le baron Albert-Louis-Eugène de Dietrich (1861-1957) qui fit construire le château de la Léonardeau actuel, par étapes : la villa formant la partie centrale du château, de 1899 à 1900. L'aile Ouest de 1909 à 1910 et la salle à manger du jardin, en 1921.","architecture":"LEONARDSAU, l'ensemble a été réalisé dans le goût de la Renaissance avec de nombreux éléments de remploi. L'un des salons de la villa fut décoré, en 1902, par le peintre Charles Spindler, dans un style influencé par l'Art Nouveau, l'architecte Louis Feine participa également à la décoration intérieure. Le parc de 9 Ha, dessiné par le paysagiste belge Jules Buyssens, en collaboration avec le baron, comporte des éléments d'un parc anglais, d'un jardin à la française et des microcosmes de jardins italiens et japonais. Interventions de Edouard André dans le parc. Le Domaine de La Léonardsau est inscrit aux M.H. depuis 1986 et, le parc en 1990. Le Domaine de la Léonardseau a été acquis par la ville, en 1970. IL est devenu, depuis, le musée du cheval et de l'attelage.","habitants":"baron Albert-Louis-Eugène de Dietrich \"","divers":"GPS : 48° 28' 10,56\" Nord, 7° 26' 35,23\" Est                                                            Maison GPS : 48° 28' 39\" Nord, 7° 26' 20\" Est","gps":"48° 28' 10,56\" Nord, 7° 26' 35,23\" Est","images":["../../jctruffet.com/image/image_67/67_Leonardsau_1.jpg"]},"Consult_chateau_formulaire85ca":{"id":"Consult_chateau_formulaire85ca","dept":"67","canton":"Ingwiller","commune":"Lichtenberg","nom":"Lichtenberg","type":"château","periode":"XIII","histoire":"LICHTENBERG, l'histoire du village se confond avec l'histoire du château de Lichtenberg, édifié dès le XIIIe siècle, et de ses seigneurs, les sires de Lichtenberg puis comtes de Hanau-Lichtenberg, qui ont régné sur une partie de l'Alsace pendant plusieurs siècles. Plusieurs évêques de Strasbourg sont issus de la famille de Lichtenberg. On note la mention de Lichtemberc dans les écrits dès 1206.  Puisque des seigneurs puis des garnisons y défendaient les alentours, le village a été victime des guerres plusieurs fois ; la guerre de 1870 a laissé beaucoup de traces dans les esprits. En effet, le 9 août 1870, le village et le donjon du château qui étaient défendu par une petite garnison dut capituler après un bombardement meurtrier des troupes allemandes. Une escouade de 6 canonniers du 5e régiment d'artillerie soutient pendant 22 heures le feu de 16 pièces allemandes. Les munitions épuisées ceux-ci continuent de combattre avec les fantassins. La troupe de théâtre de Lichtenberg, très active, propose des spectacles en alsacien depuis 100 ans.   Il a été fort bien restauré et abrite depuis un Musée dans ses murs. La construction du château date du XIIIe siècle. On doit à Vauban la fortification  qui date de 1684,  il était à l'époque un point stratégique qui permettait le contrôle dun passage, entre lAlsace et la Lorraine. Aujourdhui, le Parc naturel régional des Vosges du Nord y a installé son siège, sa maison. A lintérieur une exposition permanente « L'aventure des Vosges du Nord » permet de découvrir lhistoire du château, le pourquoi du classement de toute une région en espace protégé, et ses objectifs. Les remparts sont accessibles, gratuitement, toute l'année. Le Pass Sanitaire sera obligatoire pour lentrée du château de Lichtenberg .","architecture":"LICHTENBERG,  les éléments historiques narrés ci-après sont issus de la chronique du moine Richerde l'Abbaye de Senones (88). ( réédition de 2013 pour la région Lorraine sous la direction de Monsieur Dominique Dantand docteur en histoire). Possession du Saint -Empire Romain Germanique sous les Hochhenstauffen. Le château de Kronenbourg est sans doute fort ancien. Au début du XIIe siècle il est occupé par le grand bailli impérial de Haguenau Wolfhelm (1218). Ce personnage eut un destin tragique. Etant tombé en disgrâce, l'empereur Frédéric  II le fait emprisonner au château de Hagueneau et ourdit un plan diabolique pour se débarrasser de son bailli: Le détenu est exceptionnellement autorisé à visiter son épouse, laquelle en accord avec l'empereur va l'étouffer durant son sommeil, la forteresse dont les occupants se sont rebellés contre l'autorité impériale est détruite par les strasbourgeois emmenés par lévêque Henri de Sahleck  en 1246, en même temps que le château de Wickersheim. Longtemps le site servira de carrière de pierres et sera aménagé pour la culture de la vigne comme en témoignent les divers murs de soutènement présents aux alentours du château et qui ont été érigés avec les pierres de la forteresse dont l'aspect brut est si particulier.","habitants":"Monsieur Dominique Dantand \"","divers":"Vestiges grav de 1 à 6                                      GPS : 48° 55' 16\" Nord, 7° 29' 14\" Est","gps":"48° 55' 16\" Nord, 7° 29' 14\" Est","images":["../../jctruffet.com/image/image_67/67_Lichtenberg_1.jpg","../../jctruffet.com/image/image_67/67_Lichtenberg_2.jpg","../../jctruffet.com/image/image_67/67_Lichtenberg_3.jpg","../../jctruffet.com/image/image_67/67_Lichtenberg_4.jpg","../../jctruffet.com/image/image_67/67_Lichtenberg_5.jpg","../../jctruffet.com/image/image_67/67_Lichtenberg_6.jpg"]},"Consult_chateau_formulaire25a1":{"id":"Consult_chateau_formulaire25a1","dept":"67","canton":"Ingwiller","commune":"Lorentzen","nom":"Lorentzen","type":"forteresse","periode":"XIV-XVI","histoire":"LORENTZEN   L'histoire de Lorentzen est étroitement liée à celle du château. Construit au début du XIVe siècle sous forme de Wasserburg par le comte Frédéric II de Saarwerden, le château est donné en partie en caution à larchevêque de Trêves pour des raisons économiques. En 1527, il passe aux Nassau Saarebrucken par le mariage entre Catherine de Saarwerden et Johan Ludwig de Nassau Sarrebruck. À la suite de difficultés financières, il est tenu en bail pendant plus de 100 ans par la famille Steyss von Gornetz. À la fin du XVIIIe siècle, il est repris par la famille de Nassau Sarrebruck qui en fait le château douairière jusqu'à la Révolution. Il est vendu comme bien national en 1793 et est converti en exploitation agricole. Il appartient aujourd'hui à huit propriétaires différents qui se partagent neuf parties du château. En 2008, une partie du site castral est occupé par un C.I.N.E. (Centre d'initiative à la nature et à l'environnement). La grange à dîme du XVIe siècle accueille la partie pédagogique, l'ancien moulin du XVIe l'hébergement. Le projet conduit par la communauté de communes d'Alsace Bossue et réalisé par l'agence d'architecture dwpa, architectes est l'occasion d'une remise en valeur de tout l'espace central du village. Une micro-brasserie a ouvert dans l'ancienne brasserie « Lorentzator » du XIXe siècle située à proximité du château. L'ancienne localité de Meditheldingen était située sur le ban de la commune  a disparu après 1350. Par ailleurs, la localité de Wersingen a disparu après le XVe siècle, sa chapelle existait encore en 1542 .  Aujourd'hui l'industrie et le tourisme (bénéficiant notamment de nombreux circuits de randonnées bien entretenus) constitue l'essentiel de l'activité de la commune.","architecture":"LORENTZEN, la construction du château date du XIVe siècle. C'est une Wasserburg, un château de plaine, protégé autrefois, d'un fossé en eau alimenté par l'Eichel, construit par Friedrich II de Sarrewerden. Le château de Lorentzen, le moulin, la grange dîmière et la maison d'habitation constituent un ensemble remarquable et imposant. Des 5 tours de la demeure féodale, il ne reste que 3 tours depuis, ainsi que la base de la 4ème. La tour Renaissance dans la cour du château de Lorentzen témoigne de sa rénovation au XVIe siècle.","habitants":"Seigneurs locaux\"","divers":"grav -1-2-3                                                 GPS : 48° 57' 10,79\" N, 7° 10' 36,65\" Est","gps":"48° 57' 10,79\" N, 7° 10' 36,65\" Est","images":["../../jctruffet.com/image/image_67/67_Lorentzen_1.jpg","../../jctruffet.com/image/image_67/67_Lorentzen_2.jpg","../../jctruffet.com/image/image_67/67_Lorentzen_3.jpg"]},"Consult_chateau_formulaire2e3d":{"id":"Consult_chateau_formulaire2e3d","dept":"67","canton":"Ingwiller","commune":"La Petite Pierre","nom":"Lutzelstein","type":"château","periode":"XII-XVI","histoire":"trois châteaux dans cet article,  Lutzelstein et Hohenstauffen et la Petite Pierre.                        LUTZELSTEIN, La Petite pierre, c'est une ancienne forteresse aménagée, sa construction date du XIIe siècle, érigé en comté de La Petite Pierre, au profit d'un cadet de la Famille de Blieskastel. En 1403, Bourcard de Lutzelstein, évêque de Strasbourg et dernier héritier mâle du château, cède le quart de la Petite-Pierre au comte palatin Robert III devenu empereur germanique, qui lui accorde de transmettre ces biens par voie d'héritage par les femmes. Mais en 1452, le comte palatin Frédéric Ier s'empare de tout le château. Le comté ira à la maison palatine, et le château devient, en 1566, la résidence de Jerri-Hans, comte palatin de Veldenz, qui le fait modernser. Le 24 octobre 1648, grace aux traités de Westphalie et de Münster qui mettent fin à la guerre de Trente Ans, les terres et seigneuries des Habsbourg, en Alsace, iront au Roi de France. L'armée royale occupe le château en 1677, et en 1681 Vauban est chargé de restructurer les fortifications, encore en grande partie visibles aujourd'hui, alors que les autres châteaux-forts alsaciens étaient voués à l'abandon, l'arasement sinon à la destruction, à l'exception des châteaux de Lichtenberg et du Landskron. Depuis 1977, le bâtiment abrite les services administratifs du parc naturel régional des Vosges du Nord. Dans l'exposition multimédia L'aventure des Vosges du Nord aménagée sur 700 m², une salle est spécifiquement consacrée à l'histoire du château de la Petite-Pierre, avec notamment une superbe maquette du Staedtel, la vieille ville fortifiée, d'après des plans de 1771 et, une vue impressionnante de la citerne du château. La ville fortifiée de Lutzelstein, avec la chapelle Saint-Louis, le chur de l'église du XVe siècle et la tour-bastion qui protège les citernes, sont étroitement liés au château de Lutzelstein.","architecture":"LUTZELSTEIN,  c'est une ancienne forteresse aménagée, Sa construction date du XIIe siècle, érigé en comté de La Petite Pierre, au profit d'un cadet de la Famille de Blieskastel.                                                                             le château de la Petite-Pierre a été construit au XIIe siècle. Il sera transformé au cours du XVIe siècle. Cet ancien château fort était une forteresse, aménagée, revu par Vauban. Il a été classé aux M.H. depuis 1922. Le château de la Petite-Pierre abrite, depuis, les services administratifs du Parc Naturel Régional des Vosges du Nord.                                                             Possession du Saint-Empire Romain Germanique.                                       LA PETITE PIERRE   le château est situé sur l'extrémité d'une crête, à 340m d'altitude, séparé de la vieille ville par un fossé artificiel. Il daterait du début du XIIIe siècle. Le donjon pentagonal a été détruit au XIXe siècle Le logis a été très remanié mais dans sa cave la citerne à filtration daterait du XIVe siècle et sur sa façade sud des fenêtres romanes. Le puits à décor Renaissance, la porte d'entrée à pilastres et la tourelle d'escalier dateraient du XVIe siècle\nUne construction polygonale présente des ornementations gothiques en particulier des chapiteaux à crochets. Les \"ruines du château et restes des enceintes fortifiées\" sont classées en 1922 au titre des Monuments Historiques.                                          HOHENSTAUFFEN,  au début du XIIe siècle il est occupé par le grand bailli impérial de Haguenau Wolfhelm (1218). Ce personnage eut un destin tragique. Etant tombé en disgrâce, l'empereur FREDERIC II le fait emprisonner au château de Hagueneau et ourdit un plan diabolique pour se débarrasser de son bailli: Le détenu est exceptionnellement autorisé à visiter son épouse, laquelle en accord avec l'empereur va l'étouffer durant son sommeil. aujourd'hui vestiges.","habitants":"seigneuries des Habsbourg\"","divers":"Deux châteaux dans cet article, Lutzelstein gra-1 et Hohenstauffen grav-2.                                               GPS : 48° 51' 26\" Nord, 7° 18' 53\" Est\npetite pierre  grav-1 à 4 48° 53' 07? nord, 7° 20' 04? est","gps":"48° 51' 26\" Nord, 7° 18' 53\" Est","images":["../../jctruffet.com/image/image_67/67_Lutzelstein_1.jpg","../../jctruffet.com/image/image_67/67_Lutzelstein_2.jpg","../../jctruffet.com/image/image_67/67_Lutzelstein_3.jpg","../../jctruffet.com/image/image_67/67_Lutzelstein_4.jpg"]},"Consult_chateau_formulairead71":{"id":"Consult_chateau_formulairead71","dept":"67","canton":"Molsheim","commune":"Marlenheim","nom":"Marlenheim","type":"Abbaye","periode":"XIV-XVIII","histoire":"MARLENHEIM, Le château de Marlenheim était la propriété de labbaye dAndlau au XIVe siècle. Il devient propriété de la ville de Strasbourg au XVIe siècle. Les fondations du bâtiment se trouvent sous le sol de la cour et le château actuel est construit au XVIIIe siècle et porte les armoiries de la ville. Il devait sûrement servir de logement au bailli. Après la Révolution il passe entre les mains de divers propriétaires et lévêque de Strasbourg va installer dans les communs la petite Sorbonne afin de compléter léducation des meilleurs élèves du séminaire.","architecture":"MARLENHEIM  De nos jours, le bâtiment est propriété des surs de Ribeauvillé qui lutilisent en tant que maison de retraite. Lensemble des bâtiments est en U et souvrent sur la cour. Lécole surnommée la Petite Sorbonne ferme ses portes en 1842 après le décès de Mgr Le Pape de Trévern, pour être repris en 1916 par les surs de Ribeauvillé.","habitants":"lévêque de Strasbourg\"","divers":"gps  48° 37' 25\" Nord  7° 29° 38° est","gps":"","images":["../../jctruffet.com/image/image_67/67_Marlenheim_1.jpg","../../jctruffet.com/image/image_67/67_Marlenheim_2.jpg","../../jctruffet.com/image/image_67/67_Marlenheim_3.jpg"]},"Consult_chateau_formulaire6e18":{"id":"Consult_chateau_formulaire6e18","dept":"67","canton":"Molsheim","commune":"Ottrott","nom":"Mont_Saint_Odile","type":"abbaye","periode":"XVII","histoire":"MONT ST-ODILE,  selon la légende, née aveugle, Odile aurait retrouvé la vue et serait alors devenue une sainte, voilà pourquoi de nombreux croyants (et beaucoup de personnes qui ont des problèmes de vue) viennent se recueillir devant son tombeau, toujours présent à l'intérieur de l'une des chapelles du Mont Sainte Odile.  Sur cet amas de gré rose, tout au bout dun chemin qui traverse une dense forêt, apparaît une Abbaye, un édifice exceptionnel. Appelé le Couvent du Mont Sainte-Odile, il semble veiller sur le paysage quil surplombe, et on y recherche aussi bien une vue imprenable sur la région quune parenthèse de calme ou de spiritualité. On sest rendu sur place pour vous parler de ce bout de patrimoine étonnant auquel les Alsaciens sont très attachés.  Labbaye du Mont Sainte-Odile est un témoin de notre patrimoine culturel, archéologique et religieux. Cest un livre ouvert sur le passé du culte chrétien en Alsace, mais pas seulement. Tout a commencé avec un mur païen qui aurait été érigé sur le site à une date encore controversée. Puis le Duc dAlsace, père d'Odile (la future sainte), décide de construire un château tout en haut du rocher. Par la suite, Odile en aurait hérité après avoir été rogné par son père et laurait transformé en monastère à la VIIIe siècle.","architecture":"MONT ST-ODILE, le sanctuaire du mont Sainte-Odile est un lieu multiple. À la fois lieu de pèlerinage et de prière, mais aussi hôtel et étape de randonnée, le site situé à lorée des Vosges est unique en son genre. Ouvert toute lannée, aux curieux comme aux croyants, il est visité par quelque 1300 000 personnes par an, ce qui le classe parmi les sites le plus visités dAlsace, avec son voisin le très populaire château du Haut-Koenigsbourg. La beauté du site, sa situation géographique, la vue imprenable qui donne jusquà la Forêt-Noire allemande, les petits jardins richement ornés et la cour intérieur, mais aussi le restaurant et lhôtel sont autant déléments qui attirent les touristes du monde entier, sans oublier sa gratuité. Hé oui, labbaye a fait le choix de rester accessible pour pas un sou, et cest assez rare pour le noter. Mais évidemment, même si la boutique, les espaces privatifs pour les séminaires ou les banquets privatifs permettent de faire tourner le lieu économiquement et de lentretenir, il est avant tout un site dédié à la spiritualité et au culte chrétien.  Le passé religieux donc, mais aussi lactivité ecclésiastique qui continue encore aujourdhui avec les surs du couvent, prolonge la tradition religieuse et continue dattirer des milliers de croyants. Une abbaye, une église, de petites chapelles, des lieux de recueillements, on peut à la fois méditer sur un banc, prier, venir en tant que pèlerin, où tout simplement se ressourcer et prendre un bol dair frais dans ce lieu au panorama exceptionnel (que lon soit croyant ou non évidemment)","habitants":"Duc dAlsace, père d'Odile \"","divers":"Mont 48° 26' 14? nord, 7° 24' 15? est1","gps":"","images":["../../jctruffet.com/image/image_67/67_Mont_Saint_Odile_1.jpg","../../jctruffet.com/image/image_67/67_Mont_Saint_Odile_2.jpg","../../jctruffet.com/image/image_67/67_Mont_Saint_Odile_3.jpg","../../jctruffet.com/image/image_67/67_Mont_Saint_Odile_4.jpg","../../jctruffet.com/image/image_67/67_Mont_Saint_Odile_5.jpg"]},"Consult_chateau_formulaire3773":{"id":"Consult_chateau_formulaire3773","dept":"67","canton":"Obernai","commune":"Niedernai","nom":"Niedernai","type":"Châteaux","periode":"XVII","histoire":"Deux châteaux dans cet article; Drulingen et Niedernai.                                                       DRULINGEN,   château mentionné pour la première fois en 1212, en tant que possession des seigneurs d'Asswiller. Fief des comtes de Lutzelstein à partir du XIIIe siècle.   L'édifice est construit en 1816, au retour des guerres napoléoniennes,  On ne connaît aucun autre document mentionnant la commune qui soit antérieur au XIVe siècle. Le premier, daté de 1322, porte le nom de Drulingen et se trouve aux archives de léglise protestante de Sarre-Union ; le second est linventaire des revenus du comté de Sarrewerden de 1347-1350, conservé aux archives départementales ; le troisième est un compte rendu dun légat du pape concernant une collecte faite dans le diocèse de Metz ; il se trouve au Vatican et est daté du 20 novembre 1361. Pendant le Moyen Âge et jusquà la Révolution de 1789, Drulingen a toujours partagé le sort du comté de Sarrewerden et a été annexée avec lui à la République française par un simple décret de la Convention du 14 février 1793. Devenant par ce fait alsacienne. À l'issue de la guerre de 1870, l'Alsace intègre l'Empire allemand. Le 21 novembre 1918, à l'issue de la Première Guerre mondiale, Drulingen accueille le quartier-général du 2e corps d'armée français, commandé par le général Philipot. Avec le traité de paix de 1919, l'Alsace est restituée à la France.","architecture":"NIEDERNAI,  est une commune typique de la plaine dAlsace. Elle est  située au pied du Mont Ste Odile en contrebas des collines sous-vosgiennes à une altitude aux environs 150 mètres.\nLe ban sétend sur 1133 ha jusquau Bruch de lAndlau.  Deux cours deau le parcourent:  LEhn prend sa source près de la Rothlach et se jette dans lIll près de Geispolsheim. Le Doschbach, un petit cours deau, qui sécoule au sud de lagglomération. Après 1945, la commission héraldique a repris pour la commune les armoiries de la famille des Landsberg  en modifiant la forme des coupelles « pour ressembler un peu plus à une montagne »le château, entouré par le Stadel est protégé par des remparts qui sont précédés de 2 fossés séparés par une levée de terre servant de chemin de ronde. Les fortifications souvrent par deux portes dentrée : le Stadeltor à lest et le Graffentor à louest dont il reste des traces sur le mur dune maison dans la rue du château. Cette porte était précédée de 2 ponts levis. En 1434, Niedernai acquiert officiellement le droit dêtre fortifiée et de tenir un marché le mercredi, ce qui lui donne le rang de ville. Mais, les châteaux et le Stadel vont subir les conséquences de 3 guerres . Au cours du XVII° siècle, le château est devenu le siège du tribunal des maléfices pour juger les sorcières de Niedernai et des environs.","habitants":"Seigneuril local\"","divers":"Deux châteaux dans cet article; Drulingen grav-4-5 et Niedernai grav-1-2-3.et Landsberg grav-6 et la 7 mairie \nGps 48° 26' 54? nord, 7° 31' 01? est","gps":"","images":["../../jctruffet.com/image/image_67/67_Niedernai_1.jpg","../../jctruffet.com/image/image_67/67_Niedernai_2.jpg","../../jctruffet.com/image/image_67/67_Niedernai_3.jpg","../../jctruffet.com/image/image_67/67_Niedernai_4.jpg","../../jctruffet.com/image/image_67/67_Niedernai_5.jpg","../../jctruffet.com/image/image_67/67_Niedernai_6.jpg","../../jctruffet.com/image/image_67/67_Niedernai_7.jpg"]},"Consult_chateau_formulaire7a02":{"id":"Consult_chateau_formulaire7a02","dept":"67","canton":"Molsheim","commune":"Molsheim","nom":"Oberhirch","type":"château","periode":"XIII-XIX","histoire":"deux châteaux dans cet article; Oberkirch et St-Jean Dorlisheim . OBERKIRCH, la construction du château  est reservé au Public.  Maison de maître du XVIIIe siècle il offre le charme propre aux anciennes demeures vosgiennes, au centre dun vaste parc arboré et fleuri entouré dune muraille et dune tour en grès rose datant du XIIe siècle. Situé en plein cur du village historique de Neuwiller-lès-Saverne avec ses églises classées Monument historique et ses maisons à colombage, lenvironnement du château constitue une véritable invitation à voyager dans le temps.                                                                                                           Le ST-JEAN DORLISHEIM  le manoir est érigé en 1857 par la famille Wangen de Geroldseck à l'emplacement d'une ancienne commanderie du XIIIe siècle de l'ordre de Saint-Jean de Jérusalem.\nAcheté avec son parc de 6 ha en 1928 par Ettore Bugatti, le château sert de cadre à la présentation des voitures de luxe, aux réceptions et à l'accueil des clients. Les pavillons de chasse datent respectivement de 1766 et de 1853.  En 2001, le château devient le siège de la société Bugatti-Automobiles SAS et permet d'accueillir, comme jadis, les clients.","architecture":"OBERKIRCH_St-JEAN  à DORLISCHEIM Le manoir est érigé en 1857 par les Wangen de Geroldseck à l'emplacement de l'ancienne commanderie du XIIIe siècle des chevaliers hospitaliers de l'ordre de St-Jean-de-Jérusalem.\nAcheté avec son parc de 6 ha en 1929, le château sert de cadre à la présentation des voitures de luxe, aux réceptions et à l'accueil des clients. Les pavillons de chasses dates respectivement de 1766 et de 1853.","habitants":"Wangen de Geroldseck\"","divers":"deux châteaux dans cet article; Oberkirch et St-Jean Dorlisheim grav 3                                                                                  GPS : 48° 32' 24,06\" Nord, 7° 29' 47,07\" Est","gps":"48° 32' 24,06\" Nord, 7° 29' 47,07\" Est","images":["../../jctruffet.com/image/image_67/67_Oberkirch_1.jpg","../../jctruffet.com/image/image_67/67_Oberkirch_2.jpg","../../jctruffet.com/image/image_67/67_Oberkirch_3.jpg","../../jctruffet.com/image/image_67/67_Oberkirch_4.jpg"]},"Consult_chateau_formulaire25df":{"id":"Consult_chateau_formulaire25df","dept":"67","canton":"Lingolsheim","commune":"Osthoffen","nom":"Osthoffen","type":"forteresse","periode":"XII-XVIII","histoire":"Deux châteaux dans cet article Ostoffen et Schrrachbergheim.     OSTHOFFEN,  son origine réelle remonte à la conquête romaine. Il faisait partie du dispositif dalerte des troupes romaines dans leur colonisation de lAlsace. Pendant les 12 siècles qui suivirent les murs denceinte du château et ses bâtiments étaient de bois et de pierre, selon les techniques de lépoque, avant la rénovation « moderne » du XIIe siècle.  Il ny eut jamais deau autour du château, ce ne fut jamais un Wasserschloss, mais un classique château de plaine tel quon en trouve beaucoup dans le centre de la France avec glacis et contrescarpes selon les anciennes techniques des camps romains du 1er millénaire.  En 1410, lEvêque de Strasbourg assiège le château pendant une bataille qui dura 10 jours. Le château fût réduit à létat de ruines et le resta pendant un siècle. Il fut reconstruit par larchitecte Von Seebach mi propriété privée à destination agricole, mi forteresse militaire pour abriter des troupes. Sa vocation militaire ne sarrêta quaprès la fin de la guerre de 30 ans (1648).  La construction du château date du XIIe et du XIXe siècle. Ses frontons sont de style Renaissance. Il vous est proposé la location de salles pour vos réceptions privées ou professionnelles. il est inscrit aux M.H. depuis 1963. Son propriétaire initial fut Von Bock. L'architecte Von Seebach. Le château d'Osthoffen est de type Médiéval, Renaissance Rhénane, du XVIIIe siècle. Son propriétaire est Mr Philippe Grouvel,  cest seulement au XVIIIe siècle que le château dOsthoffen fut définitivement transformé en maison dhabitation. Les façades aveugles furent percées de magnifiques fenêtres à la française, les pignons furent ouvragés et décorés, les courtines abattues.","architecture":"OSTHOFFEN  La Révolution Française le détruisit en grande partie : démolition du donjon et de la tour daccès, démolition des tours, ruines des pièces dhabitation.  En 1817 il fut acheté par le Général François Grouvel, vicomte et gouverneur militaire de la place de Strasbourg qui avait épousé la fille de Monsieur Nebel maire de Haguenau.  Il fut entièrement reconstruit (pont, tours, salons,toit, perron) par les généraux Grouvel, dont les héritiers lhabitent encore à ce jour. Ces travaux durèrent toute la première moitié du XIXe siècle.                                                                                                    SCHRRACHBERGHEIM  à  quelques  K.M à l'ouest  Irmstett,  L'édifice fait l'objet d'une inscription au titre des monuments historiques depuis 1982. Le château a été la propriété de nombreuses familles au cours de lhistoire dont la famille Léopold a la suite de lacquisition du domaine par le baron Charles-Philippe Léopold. Bibliographie  Aujourd'hu appartient à  M.et  Mme Goormarghtrigh.\n Pierre-Valentin Blanchard, « Histoire du Schlössel de Scharrachbergheim et de ses occupants », in Kronthal et Mossig : annuaire du Cercle d'histoire de Marlenheim et environs.  Siècle de la campagne principale de construction;  au  XVe siècle ; 2e quart du XVIIIe siècle ; 2e quart du XIXe siècle.","habitants":"Ostoffen   Mr Philippe Grouvel.  M.et  Mme Goormarghtrigh\"","divers":"Deux châteaux dans cet article Ostoffen grav 1-2                                         et Schrraachbergheim grav-3-4  Osthoffen  GPS : 48° 35' 3,48\" Nord, 7° 33' 11,52\" Est                                                  Scharra 48° 35' 41? N, 7° 29' 44? E","gps":"48° 35' 3,48\" Nord, 7° 33' 11,52\" Est","images":["../../jctruffet.com/image/image_67/67_Osthoffen_1.jpg","../../jctruffet.com/image/image_67/67_Osthoffen_2.jpg","../../jctruffet.com/image/image_67/67_Osthoffen_3.jpg","../../jctruffet.com/image/image_67/67_Osthoffen_4.jpg"]},"Consult_chateau_formulaire2c29":{"id":"Consult_chateau_formulaire2c29","dept":"67","canton":"Erstein","commune":"Osthouse","nom":"Osthouse","type":"Château","periode":"XIV","histoire":"OSTHOUSE, la première aile du château des Zorn de Bulach a été édifiée, en 1436 En 1431 lEmpereur Sigismond donna en fief la moitié du village à Rodolf Zorn de Bulach et en 1442, l'Empereur Frédéric III donna l'autre moitié en fief à Nicolas Zorn de Bulach. Un premier château dont subsistent les douves, la base du mur d'enceinte et les tours polygonales fut peut-être construit au  XIVe siècle, on ignore la date. L'aile ouest est construite vers 1436 par Claus Zorn de Bulach et ses trois fils Georges, Caspar et Claus. Elle est rénovée en 1558 d'après l'inscription sur la porte de la cave.  Le château dOsthouse est situé dans la plaine dErstein au sud du village, dans l'angle Est d'un vaste enclos limité par un mur et par le ruisseau du village.  Lexploitation agricole et les communs du château sont situés au sud du ruisseau.  L'accès au château et à lancienne ferme se fait par une large allée ombragée, fermée sur la rue  par une grille.","architecture":".\nOSTHOUSE ,le château comporte :  un large fossé d'eau périphérique avec pont, une enceinte (primitivement fortifiée) avec 4 grosses tours d'angle, polygonale, un ouvrage d'entrée dans l'axe du pont, un corps de logis dans l'angle Sud-Ouest de l'enceinte formé par deux ailes en équerre un puits au milieu de la cour. Laile sud fut construite en 1552 d'après l'article de Merveilles ou 1570 daprès le baron Zorn  de Bulach, et la seconde, en 1570. C'est un des rares, sinon le seul château dont les douves sont encore alimentées par une dérivation de l'Ill. Une trentaine de chambres, une chapelle privée à l'intérieur du bâtiment, des bâtiments annexes, des bâtiments agricoles, ainsi qu'un bâtiment de défense, avec cave et créneaux, constituent l'ensemble du domaine. Le châtelain d'Osthouse est propriétaire de terres agricoles, de forêts, de prés. Il possède également des terres dans d'autres communes. Le château d'Osthouse est classé aux M.H. depuis 1983, pour les façades et toitures des deux ailes avec les tours, le bastion d'entrée, la cour avec son puits, le mur d'enceinte et les douves qui entourent le château. Le fossé d'eau est bordé par un haut talus extérieur auquel donnent accès deux petites portes dans le mur de clôture Est.  Entre ces deux portes un pont en grès à une arche, enjambe le fossé et conduit à lavant-porte où se trouvait le pont-levis. Cette avant - porte est ornée des armes des Zorn de Bulach d'Osthouse à gauche et de celles des Zorn de Bulach de Plobsheim à droite. Le portail en plein cintre est surmonté des armoiries des Zorn de Bulach. Des monuments funéraires sont remployés sur les deux faces de l'ouvrage d'entrée. Sur les tours, côté fossé, se trouvent en pendant les monuments funéraires de Georges et Ursula Zorn de Bulach représentés agenouillés sur des éléphants.","habitants":"le baron Zorn  de Bulach\"","divers":"GPS : 48° 24' 4,86\" Nord, 7° 38' 24,38\" Est","gps":"48° 24' 4,86\" Nord, 7° 38' 24,38\" Est","images":["../../jctruffet.com/image/image_67/67_Osthouse_1.jpg","../../jctruffet.com/image/image_67/67_Osthouse_2.jpg"]},"Consult_chateau_formulaire5765":{"id":"Consult_chateau_formulaire5765","dept":"67","canton":"strasbourg","commune":"Ostwalt-Strasbourg","nom":"Ostwalt_Strasbourg","type":"Château","periode":"XVIII-XIX","histoire":"OSTWALT; est une commune française située dans la proche banlieue de Strasbourg, dans la circonscription administrative du Bas-Rhin et, depuis le 1er janvier 2021, dans le territoire de la Collectivité européenne d'Alsace, en région Grand-Est. Dans la circonscription administrative du Bas-Rhin et, depuis le 1er janvier 2021, dans le territoire de la Collectivité européenne d'Alsace, en région Grand Est. Ostwald est une commune urbaine, car elle fait partie des communes denses ou de densité intermédiaire, au sens de la grille communale de densité de l'Insee Elle appartient à l'unité urbaine de Strasbourg (partie française), une agglomération internationale dont la partie française regroupe 23 communes et 487 063 habitants en 2021, dont elle est une commune de la banlieue                                                                                                                                                                 îLE  C'est devenu un Hôtel-Restaurant-Spa 5 Etoiles. Vous pouvez louer les salles du château de l'Ile pour fêter vos évènements privés (mariages, départ en retraite, fiancailles, etc.). Les salles du château de l'Ile peuvent contenir  280 personnes.","architecture":"STRASBOURG, l'histoire est muette sur ce qui se passe entre 451 et la fin du Ve siècle. Il est probable que les restes de la chrétienté romaine y subsistent et y côtoient les Alamans qui s'installent dans la région. La cité est restaurée sous le nom de Strateburgum. Il semblerait que les Alamans, dans leur majorité, privilégient des implantations en campagne et évitent la ville. La transition linguistique entre le latin et l'alémanique dans la ville s'est faite très rapidement, du fait de l'apport conséquent d'Alamans et du peu de gallo-romains restés sur place. Après une série de batailles, dont la plus connue est celle de Tolbiac en 496, les Francs finissent par prendre l'ascendant sur la gouvernance de la ville et de la région (coté Alsace mais pas coté suisse alémanique) vers 530. Ces derniers favorisent le développement de la ville, après la conversion de Clovis Ier au christianisme. En effet, elle est lune des rares villes de la région à devenir le siège d'un évêque, véritable gouverneur de lépoque, à l'instar de Bâle plus au sud et de Cologne au nord. Le centre historique, la Grande Île (ou ellipse insulaire), a été classé patrimoine mondial par lUNESCO en 1988. En 2017, la partie centrale de la Neustadt, vaste extension de la ville réalisée à partir de 1880, est également inscrite au patrimoine mondial dans le cadre d'une extension du périmètre. Strasbourg est aussi labellisée ville d'art et d'histoire par le ministère de la culture. Si les vestiges de la ville romaine ont quasiment disparu, Strasbourg conserve en revanche un patrimoine architectural remarquable qui s'étend du Moyen-Âge à aujourd'hui.","habitants":"seigneurs locaux\"","divers":"GPS : 48° 32' 33\" Nord, 7° 42' 37\" Est","gps":"48° 32' 33\" Nord, 7° 42' 37\" Est","images":["../../jctruffet.com/image/image_67/67_Ostwalt_Strasbourg_1.jpg","../../jctruffet.com/image/image_67/67_Ostwalt_Strasbourg_2.jpg","../../jctruffet.com/image/image_67/67_Ostwalt_Strasbourg_3.jpg","../../jctruffet.com/image/image_67/67_Ostwalt_Strasbourg_4.jpg"]},"Consult_chateau_formulaire67ca":{"id":"Consult_chateau_formulaire67ca","dept":"67","canton":"Molsheim","commune":"Ottrott","nom":"Ottrott","type":"Châteaux","periode":"XII-XIII","histoire":"Quatre châteaux dans cet article; Ottrot,  Biierkenfil, Lutzelbourg,  Lutz   OTTROTT, deux ruines magnifiques dominent la plaine d'Alsace au dessus de la commune d'Ottrott. Deux châteaux médiévaux, séparés par quelques dizaines de mètres, comme affrontés : le Rathsamhausen et le Lutzelbourg. Le premier possède un \"donjon-palais\" unique en Alsace et dont les très importants vestiges permettent de bien appréhender le mode de vie de ses habitants.  Le castel primitif qui occupait le site vers lan mille, est remplacé en 1196 par le château des Hohenstaufen inféodé à Conrad de Lutzelbourg. Il sera détruit dans un incendie à la fin du XIIe siècle, époque à laquelle le Rathsamhausen est construit. Le Lutzelbourg, quant à lui, il est édifié au milieu du XIIIe siècle , et mentionné comme ruiné dès 1392. La famille des Rathsamhausen-Ehenweier le fait ensuite reconstruire. Elle sera propriétaire des deux châteaux jusquà la Révolution. Au XVIIIe siècle, alors que lhistorien alsacien Silbermann explore la région, il loge chez un fermier du coin qui lui raconte une étrange histoire : celle dun prisonnier oublié dans les cachots du donjon du Rathsamhausen. Avec ses murs de 13 pieds dépaisseur, la tour navait pas de porte pour y entrer et on fit appel à des mineurs pour explorer le réduit où gisait le squelette enchaîné dun inconnu.                                                    LUTZ, le site semble occupé au XIe siècle par une construction en bois. Après l'incendie en 1100, construction d'un édifice en pierres entièrement remodèle vers 1250, puis détruit par un incendie ; vers 1200, construction du grand donjon rectangulaire, et peu après, on lui adjoint une enceinte avec logis. Puis au début du XIIIe siècle le site est morcelé, un fossé va séparer le donjon, qui prendra le nom de Hinterlutzelbourg puis Rathsamhausen à partir de 1561 et un second château dénommé Vorderlutzelbourg puis Lutzelbourg en réaction à cette nouvelle construction, on ajoute un donjon rond et on renforce le mur de courtine Est du château de Rathsamhausen dont l'enceinte sera terminée au XIVe siècle.","architecture":"LUTZELBOURG, vers 1370, le château Lutzelbourg est dévasté par un incendie, il est acquis par la famille de Rathsamhausen en 1392 puis reconstruit vers 1400 : armoiries dans le logis, et quelques travaux au XVe siècle: les parties hautes des fausses braies, l'avant porte et la barbacane. Abandon des châteaux fin XVIe, début XVIIe siècle; travaux de restauration et consolidation au XIXe siècle. La voûte en berceau se trouve au sous-sol du donjon rectangulaire du Rathsamhausen.                                                                                              BIRKENFELS, village situé sur la voie romaine menant d'Obernai à Hohenbourg (mont Sainte-Odile) ; Ottrott-le-Bas est cité dans une charte datée 1059, Ottrott-le-Haut en 1222 ; en 1857, réunion des deux anciennes communes avec construction d'une nouvelle mairie en 1861 aux armes des deux villages réunis et nouvelle adduction d'eau avec fontaines. Les archéologues et historiens datent le château fort de Birkenfels des environs de 1260, la première mention écrite porte la date 1289; la tour d'entrée du logis et la basse-cour sont de la fin du XVe siècle ou du début du XVIe siècle. Le château-fort a été construit pour Burkhard Beger, vassal de l'évêque de Strasbourg, il a appartenu à cette famille jusqu'en 1532, ensuite il est passé aux de Mundolsheim jusqu'à la Révolution. Il était utilisé pour surveiller la route romaine du Mont Sainte-Odile au Champ du Feu. Le château se compose d'un corps de logis à trois niveaux, percés de meurtrières à niche et de grandes fenêtres, le donjon pentagonal est inachevé, le gros oeuvre est en grès, pierre de taille, moyen appareil, bossage et moellon.","habitants":"famille des Rathsamhausen-Ehenweier\"","divers":"Quatre châteaux dans cet article; Ottrot,  Biierkenfil  grav-1-2, Lutzelbourg,  Lutz  grav 1-  à -6            GPS : 48° 25' 45,46\" Nord, 7° 23' 02,66\" Est                                                      Lutzelbourg; GPS : 48° 27' 41,23\" Nord, 7° 24' 29,25\" Est \nOttrot  grav -7-8-9    GPS : 48° 27' 31\" Nord, 7° 25' 35\" Est","gps":"48° 25' 45,46\" Nord, 7° 23' 02,66\" Est","images":["../../jctruffet.com/image/image_67/67_Ottrott_1.jpg","../../jctruffet.com/image/image_67/67_Ottrott_2.jpg","../../jctruffet.com/image/image_67/67_Ottrott_3.jpg","../../jctruffet.com/image/image_67/67_Ottrott_4.jpg","../../jctruffet.com/image/image_67/67_Ottrott_5.jpg","../../jctruffet.com/image/image_67/67_Ottrott_6.jpg","../../jctruffet.com/image/image_67/67_Ottrott_7.jpg","../../jctruffet.com/image/image_67/67_Ottrott_8.jpg","../../jctruffet.com/image/image_67/67_Ottrott_9.jpg"]},"Consult_chateau_formulaire76c8":{"id":"Consult_chateau_formulaire76c8","dept":"67","canton":"Saverne","commune":"Saverne","nom":"Palais_de_Rohan","type":"palais","periode":"XVIII","histoire":"PALAIS de ROHAN, le château des Rohan est un ancien château épiscopal construit à la fin du XVIIIe siècle à 1857. Le Palais Rohan de Strasbourg a été construit, de 1732 à 1742, d'après les plans de Robert de Cotte, Premier architecte du Roi, pour le Cardinal Armand-Gaston. Situé face à la Cathédrale, le Palais Rohan, qui fut l'ancienne résidence des évêques. C'est un château de style néoclassique. L'Architecte était Salins de Montfort. Son propriétaire initial était le Cardinal de Rohan. Le château était d'abord un château médiéval qui fut transformé en résidence par Robert de Cotte au XVIIIe siècle, résidence détruite par un incendie en 1779. Alors, le propriétaire du château le cardinal Louis René Édouard de Rohan décida la construction d'un palais, plus somptueux que l'ancien. Mais le cardinal de Rohan ne put pas profiter de ce palais, étant entrainé dans l'affaire du collier qui le contraignit à terminer sa vie en exil. L'architecte Nicolas-Alexandre Salins ne put terminer le palais lorsque éclata la Révolution française. Délaissé jusqu'au Second Empire, le château dut sa conservation à Napoléon III, qui le fit achever pour y loger les veuves des hauts fonctionnaires décédés dans l'exercice de leur fonction.  En 1871, le château fut transformé en caserne allemande, puis française, en 1918. En 1952, l'édifice devint une institution municipale culturelle. Il est classé aux M.H. depuis 1995. Le château des Rohan est ouvert au Public et se visite. Il abrite aujourd'hui 3 Musées de Strasbourg, à découvrir : le musée Archéologique, le musée des Beaux-Arts et musée des Arts Décoratifs.","architecture":"ROHAN,de Saverne ou château des Rohan est La décoration intérieure ne fut jamais achevée car les travaux furent interrompus en 1790 par la Révolution française. Le château de saverne fut en premier, un château médiéval, transformé en résidence par Robert de Cotte au XVIIIe siècle. Alors, le propriétaire du château le cardinal Louis René Édouard de Rohan décida la construction d'un palais plus somptueux que l'ancien. L'architecte Nicolas-Alexandre Salins ne put terminer le palais lorsque éclata la Révolution française. Délaissé jusqu'au Second Empire, le château dut sa conservation à Napoléon III, qui le fit achever pour y loger les veuves des hauts fonctionnaires décédés dans l'exercice de leur fonction. En 1871 le château fut transformé en caserne allemande, puis française en 1918. En 1952, l'édifice devient une institution municipale culturelle. Il se trouve au coeur de la ville de Saverne et abrite dans ses murs 3 musées municipaux. Actuellement, le château des Rohan abrite toute une série d'institutions municipales : Le musée d'art et d'histoire. Après ceux de Strasbourg et de Colmar le plus ancien musée municipal dAlsace. Il accueille de riches collections archéologiques et historiques ainsi que la donation Louise Weiss. L'Espace Rohan - Relais Culturel de Saverne, qui accueille toute l'année un programme varié dans sa salle en gradins de 500 places, L'école primaire du centre, Une auberge de jeunesse, Le poste de police municipale, Le Club Vosgien, Une série de salons et de salles dédiés à des réunions et des conférences. Dessiné par Robert de Cotte lors de l'aménagement de 1723.","habitants":"Cardinal de Rohan\"","divers":"GPS : 48° 44' 32\" Nord, 7° 21' 48\" Est","gps":"48° 44' 32\" Nord, 7° 21' 48\" Est","images":["../../jctruffet.com/image/image_67/67_Palais_de_Rohan_1.jpg","../../jctruffet.com/image/image_67/67_Palais_de_Rohan_2.jpg","../../jctruffet.com/image/image_67/67_Palais_de_Rohan_3.jpg","../../jctruffet.com/image/image_67/67_Palais_de_Rohan_4.jpg"]},"Consult_chateau_formulaire48e1":{"id":"Consult_chateau_formulaire48e1","dept":"67","canton":"Molsheim","commune":"Ottrott","nom":"Rathsamhaussen","type":"vestige_fort","periode":"XII-XIII-XV","histoire":"RATHSAMHAUSSEN,  le château prendra le nom de Hinterlutzelbourg et Rathsamhausen dès 1561. Un renforcement du mur de la courtine et un donjon rond sont faits en réaction au château de Lutzelbourg, dénommé auparavant Vorderlutzelbourg. Au XIVe siècle, l'enceinte est finie, le château de Lutzelbourg est racheté en 1392 par la famille de Rathsamhausen après un incendie il est rebâti vers 1400. Les armoiries sont alors situées dans le logis. Il subit des travaux au XVe siècle, notamment sur les parties hautes des fausses braies, de l'avant porte et de la barbacane. Les châteaux sont ensuite abandonnés au XVIe siècle et début du XVIIe siècle avant de recevoir une restauration et une consolidation au XIXe siècle. Des travaux historiques justifient les datations. L'endroit a sans doute été occupé au XIe siècle par une construction en bois. Un édifice fut construit en pierres après un incendie en 1100, il fut détruit de nouveau par un incendie vers 1250. Le grand donjon rectangulaire fut édifié vers 1200 avec une enceinte du logis peu de temps après. Le site est démembré au début du XIIIe siècle et un fossé va isoler le donjon. La tour d'habitation quadrangulaire, crénelé à son sommet, date de la fin du XIIe siècle. Le donjon cylindrique ou bergfried date du XIIIe siècle, et  pourvu à son sommet d'une galerie de hourds.\nUn « bâton à feu » en bronze daté de la fin du XIVe siècle, a été mis au jour sur le site.                                                                                                              WINDECK,  château du Windek se situe sur l'ancien Domaine de Windeck, il date du milieu du XVIIIe siècle. Il fut agrandi au XIXe siècle. Il est inscrit partiellement aux M.H. pour son portail d'entrée, sa grille, son parc et son petit jardin à l'Italienne. Le château avec ses façades, ses toitures et ses escaliers d'accès ainsi que les ruines , sont inscrits aux M.H. depuis le 19/10/1992. Il est devenu la propriété d'une association religieuse, appelée le foyer de Charité. Il est inscrit aux M.H.","architecture":"WINDECK, depuis 1992. Il existe de nombreux châteaux à Ottrott à découvrir, de Dreistein  du  XIIIe siècle a été construit soit au XIIIe soit au XIVe siècle et a été séparé en deux parties plus tard. C'est au XVIIe siècle qu'il aurait été détruit,  du Hagelschloss du XIIIe siècle, du XIIIe siècle, c'est un fief de l'empire germanique. On ne connaît pas avec précision la date de construction de la forteresse. Un châtelain du nom de Guillaume Erb entre en conflit avec la ville de Strasbourg. Des ambassadeurs du prélat sont retenus captifs au château, ce qui va motiver un siège de la place, en 1406. À l'issue de ce siège, Erb est capturé et le château fut démantelé. Il ne sera jamais reconstruit, de Kagenfels du XIIIe siècle.  Le château du Kagenfels (également Kaguenfels ou Kagenburg) est un château fort en ruines construit au XIII e siècle situé dans la forêt indivise d'Obernai,  de Koepfel en ruine, Lutzelbourg  du XIIIe au XVe siècle, le Rathsamhausen  ruiné  du XIIII-XVe siècle),  de Windeck, (milieu du XVIIIe siècle, agrandi au XIXe siècle).","habitants":"Famille de Rathsamhausen\"","divers":"Windeck grav 3_4 GPS : 48° 27' 32,51 Nor, 7° 25' 35\" Est           Rathsamhausen, grav-1-2                                              gps 48° 27' 39.6? N, 7° 24' 24.44? E","gps":"48° 27' 32,51 Nor, 7° 25' 35\" Est           Rathsamhausen, g","images":["../../jctruffet.com/image/image_67/67_Rathsamhausen_1.jpg","../../jctruffet.com/image/image_67/67_Rathsamhausen_2.jpg","../../jctruffet.com/image/image_67/67_Rathsamhausen_3.jpg","../../jctruffet.com/image/image_67/67_Rathsamhausen_4.jpg"]},"Consult_chateau_formulaire414f":{"id":"Consult_chateau_formulaire414f","dept":"67","canton":"Saverne","commune":"Saverne","nom":"Saverne","type":"Château","periode":"XII","histoire":"trois châteaux à Saverne, Greifeinstein, Haut Barr,  et Oberhof.    GREIFENSTEIN,  la construction  ou château du Griffon date du XIIe siècle. Son premier propriétaire fut le Chevalier de Greifenstein. Avec une histoire remontant au 12ème siècle, le château de Greifenstein (Burg Greifenstein) est l'une des plus anciennes forteresses d'Allemagne et est protégé en tant que monument national. Perché sur une colline dans la vallée de l'aneth, la façade en pierre sombre du château et ses tours jumelles peuvent être vues à des kilomètres à la ronde, surveillant les pentes boisées en contrebas.Le château  est, aujourd'hui, en ruines.  il est classé aux M.H. depuis 1898.  Le château serait hanté par une dame blanche qui se transforme chaque vendredi en un crapaud particulièrement hideux avec une clé en or dans la bouche. Ce spectre serait celui d'une jeune femme très avare. Elle est condamnée à hanter les ruines tant qu'un jeune homme ne l'embrasse pas et ne s'empare pas de la clé qu'elle a dans la bouche, clé qui donnerait accès aux richesses amassées par la dame de son vivant, est inscrit aux M.H. du 1/10/1986.                                                                              HAUT BARR, le château a été construit par un certain Merboto de Borre. En 1142, il signe une donation à la cathédrale de Strasbourg qui était en construction. À partir du XIIe siècle jusquà la Révolution, le château appartient donc à lévêché de Strasbourg, dirigé par des princes évêques extrêmement puissants. Ils étaient de grands seigneurs territoriaux, ce qui a fait de Saverne et de la région un pilier de lévêché de Strasbourg », Aujourdhui, il est la propriété de la ville de Saverne.","architecture":"GREIFENSTEIN   deux ponts permettent l'accès au château, les façades et toitures du corps de logis à l'exclusion du bâtiment annexe adossé au mur, le portail Sud et le corps de passage adjacent avec ses éléments lapidaires en réemploi, avec les pierres tombales de la famille de Mullenheim . La construction du château de Greifenstein ou château du Griffon date du XIIe siècle. Sa construction date du XIIIe, XVe et XIXe siècle. Il existait autrefois deux châteaux à Stotzheim. L'un des châteaux, construit sur une motte, datait du XIIIe siècle. Il était connu sous le nom de Schollenhof. Le second dénommé le château de Grunstein a été construit, dans sa basse-cour, au XVe siècle. Il est toujours entouré de fossés, rectangulaire, mêlé de styles différents qui sont le résultat d'aménagements successifs. Le château de Grünstein vous propose des chambres d'hôtes.                                                                                       HAUT-BARR  a été construit sur trois rochers. Un pont relie le rocher médian. Aujourdhui encore, on peut lemprunter.\nCe pont, qui a su résister au passage du temps, on le nomme le pont du diable. « On dit quil a été construit par le diable car personne nétait capable de bâtir un tel pont, aussi solide. Le diable, déguisé en colporteur, se serait présenté à la porte du château pour proposer ses services ».                                                                                  OBERHOF, ancien palais épiscopal situé sur la commune de Saverne, dans le Bas-Rhin, a été construit au XIIe siècle et fait aujourd'hui l'objet d'une inscription aux Monuments Historiques.\nÀ l'origine de style gothique, le bâtiment a été en partie endommagé à la fin du XVIIe siècle lors de la construction de la Régence épiscopale, principalement d'inspiration Renaissance, abrite aujourd'hui la sous-préfecture.","habitants":"Greifenstein.  famille de Mullenheim.  Oberhof  résidence aux évêques de Strasbourg.\"","divers":"trois châteaux à Saverne, Greifeinstein  grav -3  , Haut Barr. grav 1-2    Shouenbourg grav-5 et  Oberhof grav-4                                           GPS : 48° 44' 09\" Nord, 7° 20' 03\" Est                                                                      Haut GPS : 48° 43' 30' Nord, 7° 20' 19\" Est     Oberhof  grav-4","gps":"48° 44' 09\" Nord, 7° 20' 03\" Est","images":["../../jctruffet.com/image/image_67/67_Saverne_1.jpg","../../jctruffet.com/image/image_67/67_Saverne_2.jpg","../../jctruffet.com/image/image_67/67_Saverne_3.jpg","../../jctruffet.com/image/image_67/67_Saverne_4.jpg","../../jctruffet.com/image/image_67/67_Saverne_5.jpg","../../jctruffet.com/image/image_67/67_Saverne_6.jpg"]},"Consult_chateau_formulairec849":{"id":"Consult_chateau_formulairec849","dept":"67","canton":"Brumath","commune":"Geudertheim","nom":"Schauenbourg","type":"Château","periode":"XV-XIX","histoire":"SCHAUENBOURG, la construction du château de Schauenbourg date du XVe, XVIe, XVIIIe et XIXe siècle. Le château présente des éléments disparates allant du XVe siècle au XIXe siècle ; 1ère mention en 1399. D'importants travaux furent effectués vers 1580, pour Peter Isaac Würm : transformation d'un château, plus archaïque, en un manoir Renaissance ; l'escalier hélicoïdal de la grande tour polygonal, en partie du XVIe siècle, présente des marques de tâcheron dont deux se retrouvent à Strasbourg sur la maison de l'oeuvre Notre-Dame ; au XVIIIe siècle, travaux de réfection (nouvelle porte d'entrée, dallage, parquets.) pour les Falckenhayn ; entre 1815 et 1820, réfection pour le Général de Schauenbourg avec conservation de la façade Renaissance et de la tour polygonale, et peut être adjonction de la petite tour postérieure vers la Zorn ; au milieu du XIXe siècle, les deux tours sont rehaussées d'un étage, l'une est ornée alors des créneaux et merlons. Le château de Schauenbourg est privé, fermé au Public. Il a été entièrement restauré.","architecture":"SCHAUENBOURG, une maison avec dépendances, entourée d'un grand jardin, fut élevée dans la 2e moitié du XVIIIe siècle, non loin de l'église paroissiale et de l'ancien château. Le nom du commanditaire est resté inconnu. A la Révolution, elle appartenait à un certain Kuhn ; il la vendit à un Desmoulins de Phalsbourg, qui la revendit en 1802 au général Balthasar de Schauenburg, époux de Sophie Albertini d'Ichtratzheim, apparentée à la famille qui possédait Hochfelden avant la Révolution. En 1867, le baron Pierre Maximilien Arthur de Schauenbourg (plusieurs fois maire de la commune) entreprit un remaniement important de la maison : il fit ajouter un toit à la Mansart sur le bâtiment, un avant-corps pour la cuisine et un autre avec une cage d'escalier. Au-dessus des portes d'entrée il fit sculpter des écus aux armes des Schauenbourg. La porte de l'avant-corps ouest remploie une grille en fer forgé du  XVIII siècle, dans la fenêtre en dessus-de-porte ; au centre un médaillon présente un monogramme . Les anciennes dépendances furent détruites et de nouveaux bâtiments élevés avec des étables, granges et bâtiments utilitaires, à côté de l'ancienne sellerie. Ces travaux ont été sans doute exécutés par Louis Furst, architecte de l'arrondissement de Saverne. Après la mort du baron de Schauenbourg, en 1894, le château ne fut plus habité et la ville en fit l'acquisition en 1909 pour abriter la maison des malades et les soeurs garde-malades. En 1989 de nouveaux grands bâtiments furent élevés dans le jardin pour la maison de retrait.","habitants":"Famille de  Peter Isaac Würm\"","divers":"GPS : 48° 43' 18,52\" Nord, 7° 45' 14,16\" Est","gps":"48° 43' 18,52\" Nord, 7° 45' 14,16\" Est","images":["../../jctruffet.com/image/image_67/67_Schauenbourg_1.jpg","../../jctruffet.com/image/image_67/67_Schauenbourg_2.jpg"]},"Consult_chateau_formulairefc32":{"id":"Consult_chateau_formulairefc32","dept":"67","canton":"Mutzig","commune":"Schirmeck","nom":"Schirmeck","type":"château","periode":"XIII-XIV","histoire":"SCHIRMECK,  il occupait une place importante au carrefour du haut du Schlossberg. Il aurait été construit de 1291 à 1328. Perché à 350m d'altitude, le long de la Vallée de la Buche, il permettait de surveiller un des passages les plus étroits de la Vallée de la Bruche. De nombreuses routes existaient à l'époque reliant l'Alsace et la Lorraine. On doit à l'évêque de Strasbourg Jean de Dirpheim (1308-1328) d'avoir eu l'idée de faire fortifier de nombreuses bourgs importants, comme Schirmeck, Molsheim, Mutzig et Dachstein. Pourtant le château n'est explicitement mentionné qu'en 1362. En 1366, la Vallée de la Bruche est vendue au comte Jean de Salm. Celui-ci revendra en 1389, le château de Schirmeck, à des bourgeois de Strasbourg. Ensuite le château changera maintes fois de propriétaires. Mais, en 1503, l'Evêque de Strasbourg rachètera la seigneurie et le château de Schirmeck et y fera installer un bailli épiscopal. Enfin, en 1525, des travaux importants de restauration eurent lieu, puis en 1541. ce n'est qu'en 1969 que le château de Schirmeck sera reconstruit. Alors qu'il tombait en ruines, le château de Schirmeck fut restauré aux alentours de 1617. Mais les Suédois le détruisirent en 1633. Ses vestiges serviront en 1757 à la contruction de l'église du village. Restauré en 1969, son donjon abrite, depuis un Musée.","architecture":"SCHIRMECK,  le château voit le jour à la fin du XIIIe siècle par la volonté de l'évêque de Strasbourg. Son rôle est de s'assurer de la frontière entre l'Alsace et le comté de Salm. Un péage y est perçu dés 1350. Finalement la ville et le château sont vendus de même que l'intégralité de la vallée de la Bruche au comte Jean III de Salm le 26 novembre 1366. A cette époque la cité se nomme Laneuville-Devant-Barembach. En 1518, Schirmeck est restitué à lévêché strasbourgeois, bailliage de Molsheim,  cependant la région demeurera francophone. Un bailli demeure au château. La guerre de Trente-Ans éclate, les Suédois semparèrent du château en 1633. Il est démantelé. En 1705, les français envisagent une reconstruction de la place qui ne se fera pas. La ruine devient une carrière de pierre.  En 1969, une décision municipale entraîne le massacre des vestiges et la construction du pseudo château actuel transformé un temps en musée. Construit au début du Xllle siècle, ce château fut détruit par les Suédois en 1633 pendant la guerre de Trente Ans. En 1705, les Français songèrent à le reconstruire, mais abandonnèrent le projet et, en 1778, on édifia le clocher de l'église avec les matériaux du château. La populatio
