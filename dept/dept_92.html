","nom":"Thierry","commune":"Ville d","type":"Château","img":"../image/image_92/92_Thierry_1.jpg"},{"id":"Consult_chateau_formulaire2b04","nom":"Vert_Mont","commune":"Rueil-Malmaison","type":"Château","img":"../image/image_92/92_Vert_Mont_1.jpg"},{"id":"Consult_chateau_formulaire0189","nom":"Villeneuve_Létang","commune":"Marnes la coquette","type":"Château","img":"../image/image_92/92_Villeneuve_L%c3%a9tang_1.jpg"}];const FULL={"Consult_chateau_formulaire92d0":{"id":"Consult_chateau_formulaire92d0","dept":"92","canton":"Antony","commune":"Antony","nom":"Antony","type":"château","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article ; Antony, les Tourelles et Sarran                                                            ANTONY, en 1177 devient paroisse ; village ravagé par la guerre de cent ans ; en 1549 création du hameau du pont d'Antony sur la nouvelle route ; château de Berny rattaché à Antony en 1679 ; aux XVIIe et XVIIIe siècles, implantation de grandes propriétés. Le château d'Antony fut construit dans la première moitié du XVIIe siècle (aile de la tourelle) dont le premier propriétaire connu est le sieur de Moricq. il fut construit par messire Isaac du Jugé, Sire de Moricq. Il fut conseiller d'Etat et président des comptes en 1648. Le château eut plusieurs propriétaires, dont le prince Ferdinand Maximilien Meriadek de Rohan, qui fut archevêque de Cambrai. SARRAN   le château Saran a été construit vers 1880 à l'emplacement de la Folie du marquis de Castries. La maison de François Molé que l'on voit sur le plan de 1753, Il n'en subsiste aujourd'hui que la demi-lune de l'entrée, ainsi que les communs constitués par les écuries construites dans la seconde moitié du XVIIIe siècle. Le bâtiment principal a été démoli vers 1815 pour être remplacé par le château Sarran, dans le parc aujourd'hui nommé parc Heller. Il est situé aujourd'hui au sein du parc Heller, classé à l'inventaire. Racheté par la Ville d'Antony, le 9/06/1938, après avoir abrité la bibliothèque, il devint, de 1977 à 1996, le siège du conservatoire municipal de musique Darius Milhaud. C'est devenu un Centre Culturel.","architecture":"ANTONY, les bâtiments, qui étaient occupés jusque dans les années 1960 par un cours privé, ont été rénovés et forment actuellement une résidence privée. L'aile de la tourelle, la partie la plus ancienne, date de la première moitié du XVIIe siècle. Cette partie a été agrandie par la construction du bâtiment principal au XVIIIe siècle. Les communs sont surmontés d'un pigeonnier, également du XVIIIe siècle. Ce pigeonnier abritait autrefois les nichées de pigeons, droit seigneurial. En 1859, il fit bâtir une fontaine surmontée d'un réservoir à l'emplacement du regard, créé par le sieur de Moricq qui avait reçu, le 16 octobre 1634, l'autorisation de faire descendre l'eau de la fontaine Mouton, jusqu'à sa maison. Au XVIIIe siècle, agrandissement (aile de la rue du Moulin et communs surmontés d'un pigeonnier). Dans la deuxième moitié du XIXe siècle, aménagement, pour le carrossier Michalon, d'un parc paysager. Un regard sur un ru capté est aménagé en fabrique surmonté d'un réservoir vers 1859 : la fontaine Michalon. Elle est démolie en 1929. Le parc est détruit dans les années 1960 par la construction de la résidence du château, il est actuellement aménagé en immeuble résidentiel.                                                                                                                      SARRAN le château Saran a été construit vers 1880 à l'emplacement de la Folie du marquis de Castries. Il est situé aujourd'hui au sein du parc Heller, classé à l'inventaire. Acheté par la ville le 9 juin 1938, après avoir abrité la bibliothèque, il fut de 1977 à 1996 le siège du conservatoire municipal de musique Darius Milhaud.","habitants":"sieur de Moricq\"","divers":"","gps":"","images":["../image/image_92/92_Antony_1.jpg","../image/image_92/92_Antony_2.jpg","../image/image_92/92_Antony_3.jpg","../image/image_92/92_Antony_4.jpg"]},"Consult_chateau_formulaire651e":{"id":"Consult_chateau_formulaire651e","dept":"92","canton":"Asnières sur seine","commune":"Asnières sur seine","nom":"Asnières_sur_Seine","type":"Château","periode":"XVII","histoire":"Deux châteaux dans cet article; Asnières et Ozanam.                       ASNIERES ; dès le XVIIIe siècle commencent cependant à s'élever, du fait de la proximité de Paris, quelques riches maisons de campagne, au 1er rang desquelles le château, est une demeure de plaisance au plan en forme d'équerre construite en 1750 pour Marc René, marquis de Voyer d'Argenson; une description de 1755 donne comme architecte Mansart, les travaux historiques l'attribuent à Jacques Hardouin-Mansart, dit Mansart de Sagonne, plutôt qu'à son frère Mansart de Jouy; l'architecte réutilisa les fondations et une partie du gros-oeuvre du bâtiment précédent construit entre 1690 et 1705 pour l'abbé Lemoyne, les groupes sculptés qui décoraient jusqu'en 1890 l'avant-corps sur le jardin sont attribués à Guillaume II. Coustou et le modèle des agrafes est sans doute de Nicolas Pineau ; le marquis d'Argenson revend le château dès 1769; le parc de 17 ha, réduit des deux tiers par lotissement dans les années 1850, est loué sous le Second Empire; abîmé par les combats de 1870, le château est dépecé d'une partie de son décor dans les années 1890 et transformé alors en école ; ce qui subsistait du parc a été loti dans les années 1880 ; inoccupé depuis  1975, et devenu propriété de la commune, le château est en cours de restauration et en attente d'affectation.: édifié de 1750 à 1752 pour le marquis d'Argenson,                                                                                          OZANAM  fut construit à l'emplacement d'un ancien château ayant appartenu à la comtesse de Parabère, maîtresse du Régent. Ce monument fut dessiné par Jacques Hardouin-Mansart de Sagonne, architecte du Roi. La décoration intérieure est due à Nicolas Pineau et Guillaume II Coustou. Acquis en 1991 par la mairie, la restauration intérieure est loin d'être achevée : seule la moitié du rez-de-chaussée est accessible au public. La statue centrale qui orne son fronton a été remplacée à l'identique de l'original par une association asniéroise.","architecture":"ASNIERES, le château sera épargné à la Révolution Française et passera des mains des militaires à celles des banquiers. Sous la seconde République, son propriétaire « l'ancien maire Jean-Baptiste Duchesnay » poursuit le morcellement du Domaine, en le louant à des entreprises qui y organisent des fêtes. Le parc d'Asnières et son château accueillent, sous le Second Empire, les réjouissances y sont organisées depuis qu'Offenbach, dans La vie parisienne, fait chanter au tonitruant Brésilien : « Qu'on me mène au bal d'Asnières ! » Mais le château d'Asnières et Offenbach tomberont avec Napoléon III, à Sedan. Occupé par les troupes prussiennes, les salons du  château d'Asnières serviront d'écuries. Peu à peu, la résidence du marquis de Voyer d'Argenson se dégrada rapidement. La propriété fut morcellée. Ses décorations et boiseries furent dispersées et vendues. Le château d'Asnières a été racheté par la mairie d'Asnières-sur-Seine, qui y organise depuis, des visites, régulièrement, est destiné à devenir un musée. Les murs sont en calcaire moyen appareil sauf sur le côté nord-est et la moitié de la façade nord-ouest, ou ils sont en moellon enduit ; le château était primitivement couvert d'un toit en plomb à deux pans et ensuite d'une dalle en béton jusqu'aux restaurations récentes ; une partie de la façade sur cour est entresolée ; les deux escaliers, d'origine, sont dans-oeuvre, tournants à retours avec jour et en charpente.  Éléments protégés MH: le jardin: classement par arrêté du 9 juin 1971, propriété de la commune.","habitants":"Famille de Marc René, marquis de Voyer d'Argenson;\"","divers":"","gps":"","images":["../image/image_92/92_Asni%c3%a8res_sur_Seine_1.jpg","../image/image_92/92_Asni%c3%a8res_sur_Seine_2.jpg","../image/image_92/92_Asni%c3%a8res_sur_Seine_3.jpg","../image/image_92/92_Asni%c3%a8res_sur_Seine_4.jpg"]},"Consult_chateau_formulaireb0ab":{"id":"Consult_chateau_formulaireb0ab","dept":"92","canton":"Châtenay-Malabry","commune":"Sceaux","nom":"Aurores","type":"Pavillon","periode":"XVII-XIX","histoire":"PAILLONS DE L'AURORE, à sceaux Il fut construit, vers 1671, par Claude Perrault pour Jean-Baptiste Colbert, dans le parc de Sceaux. C'est un château bâti en 1937. Jean-Baptiste Colbert (1638-1683), baron de Sceaux, surintendant des bâtiments, Arts et Manufactures en 1664, fit l'acquisition du domaine de Sceaux en 1670 et, vers 1672, commanda à l'architecte Claude Perrault (1613-1688) la construction du château du Pavillon de l'Aurore, dans le potager du domaine. Il utilisa cet endroit comme cabinet de travail et y reçut son conseil. En 1677, Colbert invita les membres de l'académie française pour y donner une lecture d'une description en vers du décor du cabinet de l'Aurore, composée par Philippe Quinault (1635-1688).","architecture":"PAILLONS DE L'AURORE, en juillet 1685, le fils de Colbert, Jean-Baptiste Colbert de Seignelay (1651-1690), invita le roi Louis XIV à Sceaux et y donna une grande fête. Devenu le propriétaire du domaine de Sceaux en 1700, Louis-Auguste de Bourbon (1670-1736), duc du Maine, et son épouse, Louise-Bénédicte de Bourbon, y organisèrent les enchantements des 16 grandes nuits de Sceaux, de Juillet 1714 à Mai 1715. Voltaire (1694-1778), qui y écrit Zadig et Micromégas, et Émilie du Châtelet (1706-1749), y vinrent fréquemment, participant aux animations théâtrales de la duchesse et particulièrement lors d'un long séjour en 1747.","habitants":"Jean-Baptiste Colbert,\"","divers":"","gps":"","images":["../image/image_92/92_Aurores_1.jpg"]},"Consult_chateau_formulairee79a":{"id":"Consult_chateau_formulairee79a","dept":"92","canton":"St_Cloud","commune":"St_Cloud","nom":"Avelines_St_Cloud","type":"Château","periode":"XIX-XX","histoire":"Deux châteaux dans cet article , Avelines et Pélican.                      AVELINES, sa dirigeante est Emmanuelle Le Bail depuis 2007. Le musée des Avelines est installé dans la villa Brunet, l'ancienne propriété d'un riche industriel de l'industrie pharmaceutique et collectionneur d'art, Alfred Daniel-Brunet (1882-1943). il y  meurt en 1943. En 1979, sa veuve cède sa maison et la ville de Saint-Cloud exerce son droit de préemption, pour acquérir la villa. La municipalité n'a pas encore l'idée d'y installer les collections qu'elle possède sur l'histoire de la commune. En attendant la création du musée, la villa Brunet sert notamment de lieu de tournage à plusieurs films. En 1986, la villa est restaurée par François Hacq dans le but d'y installer le futur musée, qui est inauguré en 1988. En 2008, une première campagne de travaux conduit à un renouvellement complet de la Muséographie.  Celle-ci accueille le salon de thé du musée, le Musée Gourmand.                              PELICAN,  date de 1866, pour Annie Moray. Il fut vendu en 1878 à Charles Porgès, un scientifique et collectionneur. Son gendre, André Chevrillon, y résida de 1906 à 1940. Sa destination initiale fut un hôtel particulier. Il fut occupé par les allemands, durant la seconde guerre mondiale. Après la guerre, le chateau de Pélican fut racheté, en 1950, par l'association pour l'Insertion sociale (ADAPT), qui le transforma en un centre de rééducation fonctionnel dont la direction médicale sera confiée, successivement, au Dr Lescoeur puis, au Dr Kouvalchouk, qui dirigeaient une équipe composée de 50 personnes.","architecture":"AVELINES, sa construction date de 1888. On y trouve les Arts décoratifs, les Beaux Arts et l'Histoire,  Construite par l'architecte Louis Mourot sur le modèle de la villa Kerylos, à Beaulieu-sur-Mer, entre 1928 et 1935, cette villa à l'antique est située sur les hauteurs de Saint-Cloud. La municipalité n'a pas encore l'idée d'y installer les collections qu'elle possède sur l'histoire de la commune. En 2008, une première campagne de travaux conduit à un renouvellement complet de la muséographie. Une seconde campagne de restauration, en 2009, réhabilite la rotonde, dans l'esprit de l'ancienne demeure Brunet.                                                                                                              PELICAN,  l'association revendit, la propriété, en 2015, au Promoteur Immobilier Interconstruction. En 2014, une demande de permis de construire acceptée par la mairie de Saint-Cloud et les architectes des bâtiments de France autorisa la démolition du château pour construire 72 logements à la place. Les architectes obligèrent l'entreprise Interconstruction, propriétaire du terrain, à reconstruire les parties  remarquables  désignées dans le plan local d'urbanisme. Cette démolition fut dénoncée par certains habitants, qui y voient la disparition d'un monument emblématique de Saint-Cloud. Les travaux ont été achevés en 2019. Appelé aussi le \"Château de Pélican\", il fut édifié à lépoque du développement du chemin de fer et de lengouement des parisiens pour ce lieu de villégiature, dont le coteau est bordé par la Seine et rendu célèbre par son illustre château, ses fêtes, son parc et ses nombreuses guinguettes.","habitants":"Famille de Alfred Daniel-Brunet\"","divers":"","gps":"","images":["../image/image_92/92_Avelines_St_Cloud_1.jpg","../image/image_92/92_Avelines_St_Cloud_2.jpg","../image/image_92/92_Avelines_St_Cloud_3.jpg","../image/image_92/92_Avelines_St_Cloud_4.jpg","../image/image_92/92_Avelines_St_Cloud_5.jpg","../image/image_92/92_Avelines_St_Cloud_6.jpg"]},"Consult_chateau_formulaire15b3":{"id":"Consult_chateau_formulaire15b3","dept":"92","canton":"Rueil-Malmaison","commune":"Rueil-Malmaison","nom":"Bois_Préau","type":"Château","periode":"XVIII","histoire":"BOIS-PREAU, d'abord simple fief de la très riche abbaye de Saint-Denis, la terre de Bois-Préau est achetée conjointement en 1696 par Frédéric Léonard et par son fils Frédéric-Pierre Léonard, tous deux imprimeurs et libraires ordinaires du Roi, qu' ils font bâtir entre 1697 et 1700 une assez vaste demeure entourée de jardins agrémentés de pièces d'eau. Le fils de Frédéric-Pierre s'en sépare en 1747 en faveur d'un ancien marmiton, Jean Garnier, devenu maître d'hôtel de la reine Marie Leszczynska ; jusqu'en 1765, Garnier embellit le domaine en créant une maison de bains et en ornant le parc de statues. Après être resté neuf ans propriétaire de Bois-Préau, de 1765 à 1774, le comte de Prie vend la propriété au banquier Louis Julien qui y meurt en 1796. C'est sa fille, Anne-Marie Julien, qui refusera toujours de vendre Bois-Préau à Bonaparte, en dépit des propositions avantageuses qui lui sont faites. Il faudra attendre la mort accidentelle de la vieille fille, retrouvée noyée dans la pièce d'eau du parc le 9 mars 1808, pour que Joséphine puisse enfin étendre son domaine en direction du village de Rueil. Après avoir fait sonder les héritiers, l'Impératrice ne peut résister à agrandir sa propriété, au point que Napoléon lui écrit depuis Schönbrunn en septembre 1809 : Mais une fois achetée, ne fais pas démolir pour y faire quelques rochers. Trois semaines après le divorce, il lui fait parvenir l'argent pour acheter Bois-Préau et le contrat est signé le 29 janvier 1810.  Joséphine y loge plusieurs personnes de son service comme le médecin ou l'intendant et en profite pour y placer le surplus de la bibliothèque de Malmaison, y aménager une salle pour les archives du domaine ou y abriter une partie de son cabinet d'histoire naturelle.","architecture":"BOIS-PREAU, la mort de l'Impératrice interrompt les travaux entrepris par Louis-Martin Berthault dans les jardins qu'elle envisageait de remodeler. Bois-Préau continue d'être entretenu par son fils et héritier, le prince Eugène et lorsqu'il meurt en 1824, sa veuve vend la propriété à des négociants parisiens en 1828. En 1853 la propriété trouve un nouvel acquéreur en la personne d'Edouard Rodrigues-Henriques, bienfaiteur de Rueil, qui réunit à Bois-Préau artistes et musiciens comme les compositeurs Fromental Halévy, qui avait épousé sa cousine germaine, ou Georges Bizet qui avait épousé la fille d'Halévy. Il entretient également une abondante correspondance avec George Sand qui lui avait été présentée par Alexandre Dumas. Avec elle, il choisit les livres à acheter pour la bibliothèque destinée aux pauvres de Rueil, tandis que sa femme, Sophie Rodrigues, crée une crèche de vingt berceaux. Mais le château n'était pas en très bon état, et le premier soin d'Edouard Rodrigues est d'en faire démolir les ailes et de faire reconstruire la plus grande partie du corps central en 1854 par son architecte qui était peut-être Alfred-Louis Feydeau, l'oncle du célèbre écrivain. Lorsque Rodrigues-Henriques meurt en 1878, ses enfants vendent Bois-Préau dès l'année suivante au journaliste Jouvin qui avait ressuscité le Figaro avec son beau-père Villemessaint. Après être passée de mains en mains, la propriété est achetée sous réserve d'usufruit en 1920 par un autre couple de grands bienfaiteurs de Rueil, Edward Tuck et son épouse Julia Stell. Ils offrent Bois-Préau  aux Musée nationaux en 1926 afin d'en faire une annexe du musée de Malmaison.","habitants":"Famille de Frédéric-Pierre Léonard\"","divers":"","gps":"","images":["../image/image_92/92_Bois_Pr%c3%a9au_1.jpg","../image/image_92/92_Bois_Pr%c3%a9au_2.jpg"]},"Consult_chateau_formulaire3fa7":{"id":"Consult_chateau_formulaire3fa7","dept":"92","canton":"Bagneux","commune":"Bourg la Reine","nom":"Bourg_la_Reine","type":"Château","periode":"XIV-XVIII","histoire":"NOTRE DAME BOURG LA REINE, le nom du château de Childebert, demeure des abbés de Saint-Germain-des-Prés, rappelle la probable implantation ancienne du roi à Issy et le fief de l'abbaye parisienne sur une partie des terres de la commune dès le XIIIe siècle. Il faut sans doute situer au XIIe siècle la construction de la première église paroissiale, reconstruite en 1335. Les fiefs se multiplient à partir du XVIe siècle : le plus célèbre fut celui de Vaudetard dont la reine Margot acheta une partie. Au début du XVIIe siècle, cette dernière fit élever un nymphée dans le parc de sa demeure. En 1638, l'église paroissiale devenue insuffisante est reconstruite. Durant la seconde moitié du siècle, la demeure de la reine Margot, transformée en séminaire par l'abbé Ollier, fut dotée d'une chapelle Notre-Dame-de-Lorette. A la fin du siècle, François Conti demande à Pierre Bullet de lui bâtir un château. Celui-ci sera remanié au début du XVIIIe siècle, son parc, dessiné par André Le Nôtre, sera alors agrandi. Les maisons de plaisance de grands bourgeois parisiens se multiplient alors à Issy. Le château de Notre-Dame-du-Calvaire du premier quart du XVIIe siècle, est bâti selon un plan en U; en 1856, transformé en couvent par les soeurs aveugles de saint Paul; en 1858 installation des filles de la charité, et en 1861 des soeurs de Notre-Dame-du-Calvaire,                                                                            Villa HENNEBIQUE construite entre 1901 et 1903 par l'architecte et entrepreneur François Hennebique pour son propre usage, il s'agit d'une démonstration de l'usage du béton armé pour une habitation","architecture":"NOTRE DAME BOURG LA REINE, la demeure abrite une école; l'aile sud des communs est surélevée et transformée en logement ; l'aile Est du château est abattue pour faire place à un nouveau bâtiment peu avant 1900 ; vers la même date, on bâtit sur le côté ouest de la cour des communs, des salles de classes en rez-de-chaussée ; le corps de logis est double au nord par un bâtiment en pierre de taille dans l'entre deux guerres ; l'aile ouest est démolie sans doute vers 1945 ; école affectée actuellement aux déficientes auditives. Château en moellon recouvert d'enduit, couverture par toit à longs pans et croupe en tuiles plates ; aile sud des communs en moellon recouvert d'enduit, toit à longs pans en tuiles plates mécaniques ; salles de classe (aile ouest des communs) en brique, recouvertes de tuile plates mécaniques ; bâtiment fin XIXe siècle en meulière recouverte d'enduit, couverture en tuiles plates mécaniques. Villa HENNEBIQUE , cette villa familiale possède une architecture unique, véritable vitrine des possibilités novatrices du béton armé : terrasse en encorbellement, tour-minaret de 40 mètres de hauteur faisant office de château d'eau destiné à l'arrosage par gravitation des serres et des jardins suspendus de la villa, portées importantes sans piliers, porte-à-faux, différences de niveaux et saillies illustrant la souplesse du matériau   Véritable laboratoire d'idées innovantes pour un matériau encore méconnu à l'époque, elle est considérée aujourd'hui comme l'une des constructions qui ont marqué l'histoire de l'architecture de ce début du vingtième siècle,  est classée aux monuments historiques depuis le 27 janvier 2012.","habitants":"la reine Margot \"","divers":"","gps":"","images":["../image/image_92/92_Bourg_la_Reine_1.jpg","../image/image_92/92_Bourg_la_Reine_2.jpg"]},"Consult_chateau_formulaire7325":{"id":"Consult_chateau_formulaire7325","dept":"92","canton":"Boulogne Billancourt","commune":"Boulogne Billancourt","nom":"Buschilot","type":"Château","periode":"XVIII","histoire":"BUSCHILOT, la commune de Boulogne Billancourt résulte de la fusion en 1859 des villages de Boulogne et de Billancourt. Jusqu'au haut Moyen Age, la forêt couvre tout le territoire de Boulogne et de Billancourt. Le terme des menus, ancienne appellation de Boulogne, apparaît pour la première fois dans une charte de 1134 qui indique l'existence, à cette date, de quelques maisons entourées de prés, vignes et labours. Une église est construite au XIVe siècle sous le vocable de Notre-Dame-de-Boulogne-sur-Mer. Sous l'Ancien Régime, le bourg de Boulogne abrite cultivateurs, artisans et blanchisseurs. On y remarque déjà quelques maisons de campagne comme le château de Buschillot. La ferme de Billancourt apparaît au XIIIe siècle comme propriété de l'abbaye parisienne de Saint-Victor. Le château dit château de Buschillot aurait été construit en 1730 pour la famille de Meulan par un architecte inconnu à ce jour.   Les trois bâtiments ont été aménagés en musée Paul-Belmondo.","architecture":"BUSCHILOT, est une \"Folie\" du XVIIIe siècle, autrefois annexée au château Rothschild. Le bâtiment se compose d'un sous-sol, de deux étages carrés et étage de comble. Gros-oeuvre en calcaire, pierre de taille, enduit, escalier dans-oeuvre, élévation à travées surmontée d'un toit à longs pans brisés et croupe brisée recouverts d'ardoise. Beau portail d'accès donnant dans la cour d'honneur.  Les trois bâtiments ont été aménagés en Musée Paul-Belmondo. L'atelier de l'artiste a été reconstitué. Un des pavillons expose les dessins de l'artiste Paul Belmondo,  Un autre est consacré à des expositions d'artistes contemporains inspirés du style moderniste. Le visiteur est accueilli, dans la cour, par la célèbre statue \"la Jeune femme en marche\". C'est un musée ouvert au Public. Éléments protégés MH : les façades et les toitures du château : inscription par arrêté du 5 juin 1951. Le château Buchillot a été classé aux monuments historiques.","habitants":"famille de Meulan et Musée Paul-Belmondo\"","divers":"","gps":"","images":["../image/image_92/92_Buschilot_1.jpg","../image/image_92/92_Buschilot_2.jpg","../image/image_92/92_Buschilot_3.jpg"]},"Consult_chateau_formulairef27a":{"id":"Consult_chateau_formulairef27a","dept":"92","canton":"Saint-Cloud","commune":"Vaucresson","nom":"Castel_Aubert","type":"Château","periode":"XVIII-XIX","histoire":"CASTEL-AUBERT;  le Castel Aubert construit en 1880 par Henri Parent, au 160, boulevard de la République. Cet architecte est notamment second au concours de l'Opéra de Paris et réalise le musée Jacquemart-André.  En 1887, Sosthène de La Rochefoucauld acquit trois maisons mitoyennes situées près de son château et fit édifier à leur place la maison actuelle, probablement par l'architecte Henri Parent qu'il employait alors à la restauration du château. Le parement imitant le pan-de-bois hourdé de briques des élévations évoque les façades sur cour de l'hôtel Menier, au 5 de l'avenue Van-Dyck à Paris, ou les parties hautes de la maison dite Castel Aubert à Vaucresson, les deux construits par ce même architecte. Le jardin fut en grande partie gagné sur le cours du Tripoulin.","architecture":"CASTEL-AUBERT; l'édifice à une  allure de château mi-normand mi-flamand avec son mur-pignon à pas de moineaux  et sa silhouette ramassée couronnée de tourelles,  compte un étage carré et un étage de comble. Les communs, en rez-de-chaussée, sont au droit de l'aile en retour et sont reliés à cette dernière par un toit en appentis récent. Les deux bâtiments sont construits dans le style néo-normand (pan-de-bois hourdé en briques, décor du pignon droit et des lucarnes-pignons imitant les fermes débordantes et toit débordant de la maison). La façade sur rue de la maison est ornée de deux sculptures représentant deux personnages en costume médiéval.Deux consoles figurées ornent la façade sur rue de la maison, de part et d'autre de la porte d'entrée : un homme à droite et une femme à gauche, tous deux portant des vêtements d'inspiration médiévale.","habitants":"Archi Henri Parent\"","divers":"","gps":"","images":["../image/image_92/92_Castel_Aubert_1.jpg"]},"Consult_chateau_formulaire0807":{"id":"Consult_chateau_formulaire0807","dept":"92","canton":"Chatenay-Malabry","commune":"Chatenay-Malabry","nom":"Chateaubriand_92","type":"Château","periode":"XVIII","histoire":"CHÄTEAUBRILLANT, elle fut occupée par François-René de Chateaubriand de 1807 à 1818. La maison fut construite à la fin du XVIIIe siècle par un riche brasseur, André-Arnoult Acloque. Le 22 août 1807, Chateaubriand fit l'acquisition du domaine de la Vallée-aux-Loups dans le hameau d'Aulnay, grâce à un prêt de la comtesse de Choiseul-Beaupré. Il y rédigea plusieurs de ses uvres, en particulier les mémoires d'outre-tombe, dans la tour Velléda. Il aménagea le domaine et créa le parc de la Vallée-aux-Loups sur 14 hectares. Après avoir perdu son poste de ministre d'état en 1816, il se retrouva dans une situation financière catastrophique. Le domaine de la Vallée-aux-Loups fut alors vendu et acheté par Mathieu de Montmorency, ami et créancier de Chateaubriand. Il y construira une aile avec tourelle, ainsi qu'une orangerie. Le domaine fut transmis par succession aux ducs de La Rochefoucauld-Doudeauville qui y feront d'importants aménagements. À partir de 1910, le Domaine deviendra la propriété du docteur Henri le Savoureux, qui y installera un asile psychiatrique, qui servit pendant la seconde guerre mondiale à abriter des résistants, dont le peintre Jean Fautrier, qui loua ensuite la propriété voisine de l'Île Verte. Le 6 novembre 1929, l'écrivain Jacques Rigaut s'y suicide dune balle tirée en plein cur. Le domaine de la Vallée-aux-Loups a par la suite été vendu au département de la Seine, en 1967.","architecture":"CHÄTEAUBRILLANT,  Il est blotti au cur du Val dAulnay, dans le parc de la Vallée-aux-Loups. La demeure fut occupée par François-René de Chateaubriand, de 1807 à 1818. Le château de la Vallée-aux-Loups est depuis protégée au titre des M.H, appelée la maison de Chateaubriand, vous découvrirez des expositions temporaires, des spectacles, des visites guidées, des conférences, des rencontres-débats ainsi qu'une bibliothèque consacrée à Chateaubriand, au romantisme et au XIXe siècle français.  Le domaine de la Vallée-aux-Loups est la propriété du conseil départemental, des Hauts-de-Seine, depuis 1987. C'est devenu un musée départemental.","habitants":"Famille de  André-Arnoult Acloque.  Et François-René de Chateaubriand\"","divers":"","gps":"","images":["../image/image_92/92_Chateaubriand_92_1.jpg","../image/image_92/92_Chateaubriand_92_2.jpg"]},"Consult_chateau_formulaired904":{"id":"Consult_chateau_formulaired904","dept":"92","canton":"Clamart","commune":"Clamart","nom":"Clamart","type":"Patrimoine","periode":"XVIII","histoire":"Quatre châteaux dans cet article, Clamart, Ferrari, Marèse et Louvois.                                                                                                                CLAMART, hôtel de ville  Trois corps de bâtiment composent aujourdhui lhôtel de Ville de Clamart : lancien château de Barral, la tour ronde et une ancienne maison bourgeoise. Entre 1919 et 1923, lassemblage des trois édifices en retour dangle, la modification des ouvertures et de la forme du toit, ainsi que la suppression du campanile donnent à lHôtel de Ville son aspect actuel.  À lintérieur, la salle des commissions, la salle des mariages et la salle du conseil ont été décorées, au cours du XXe siècle, de peintures murales classées au titre des Monuments Historiques ou inscrites à lInventaire Supplémentaire.                                                                                                        Maison FERRARI située à Clamart , a été fondée en 1878 par la duchesse de Galliera, Maria Brignole Sale De Ferrari. Le bâtiment, construit par l'architecte Léon Ginain, d'une surface habitable de 11 000 m2, est enchâssé dans un parc de deux hectares et peut abriter plus de cent-cinquante personnes. Depuis 2009, cette institution est sous la direction de la branche française de l'ordre de Malte. Le bâtiment a été ajouté à la liste des monuments architecturaux française en tant que monument historique en 1983, 2003 et 2019.","architecture":"MARESE, la villa Marèse est une ancienne maison de retraites spirituelles, fondée par des pères jésuites en 1876. Elle est située à flanc de coteau dans un cadre verdoyant et calme. En 1901, les Pères doivent abandonner cette demeure en raison de la séparation de lÉglise et de lÉtat. Ils y reviennent en 1920.                                                                                                                       Maison FERRARI, le bâtiment a trois grandes ailes en fer à cheval et qui entourent le parc. Trois autres bâtiments encadrent une cour carrée avec le corps de logis principal.  Au milieu du corps de logis se trouve la chapelle à nef unique divisée en trois travées. Six hautes fenêtres cintrées illuminent l'intérieur, qui se termine par une abside semi-circulaire. Elle est suivie d'un clocher élancé, à travers lequel un passage mène au jardin. Une médiathèque est désormais installée dans l'ancienne laverie.                                                                                       LOUVOIS, appelée par tradition orale \"Pavillon Louvois\", cette propriété, aujourdhui bien transformée, appartenait au début du XVIIIe siècle aux seigneurs de Marsillac et de Charmont. En façade, lescalier monumental du perron évoque la grandeur de lancienne demeure. A lintérieur, le contrecoeur de la cheminée du grand salon, frappé aux armes du Grand Dauphin, est semblable à ceux du château royal de Meudon. Il aurait été transporté par les Révolutionnaires depuis le château de Meudon (à la fin du XVIIe siècle, Louis XIV avait acheté la propriété de Meudon pour son fils).","habitants":"Duchesse de Galliera,\"","divers":"","gps":"","images":["../image/image_92/92_Clamart_1.jpg","../image/image_92/92_Clamart_2.jpg","../image/image_92/92_Clamart_3.jpg","../image/image_92/92_Clamart_4.jpg","../image/image_92/92_Clamart_5.jpg","../image/image_92/92_Clamart_6.jpg"]},"Consult_chateau_formulairefabc":{"id":"Consult_chateau_formulairefabc","dept":"92","canton":"","commune":"Clichy sous bois","nom":"Clichy (92)","type":"Château","periode":"XVII-XVIII","histoire":"CLICHY Forte de son histoire séculaire, la ville de Clichy-sous-Bois possède un patrimoine architectural  très riche. Les pèlerins du Moyen-âge et les seigneurs du siècle des Lumières y ont laissé leurs traces. Le château fut construit en 1645 à lemplacement dun ancien rendez-vous de chasse. Saccagé en 1870 par les Prussiens, il fut rénové puis cédé à la Ville en 1930 par la famille Lindet-Girard afin dabriter lhôtel de ville.\nLorangerie, Construite dans la seconde moitié du XVIIIe siècle, lorangerie est également devenue propriété de la Ville en 1930 puis inscrite à linventaire des monuments historiques en 1972.\nEn dehors des périodes de froid, durant lesquelles elle servait à entreposer des caisses dorangers, lorangerie abritait les différentes réceptions des équipages royaux et seigneuriaux venus chasser dans les forêts avoisinantes.\nConsciente de la valeur inestimable de cet édifice, la Ville de Clichy-sous-Bois a engagé une campagne de restauration et de restructuration de ses espaces intérieurs et extérieurs.","architecture":"Construit en 1800, le château est très endommagé pendant la guerre franco-prussienne de 1870-1871. Il est remplacé, en 1906, par l'actuel édifice. Il devient ensuite propriété de la commune puis loué comme restaurant. Saccagé intérieurement et victime d'un incendie en 1996, le bâtiment est aujourd'hui fermé.                                                                        La TERRASSE  Le premier tirait son nom du promontoire en demi-lune sur lequel sélevait la Commanderie de lOrdre des Templiers autrefois érigée à cet endroit. Construit en 1800, le château est très endommagé pendant la guerre franco-prussienne de 1870-1871. Il est remplacé, en 1906, par lactuel édifice. Il devient ensuite propriété de la commune puis loué comme restaurant. Saccagé intérieurement et victime dun incendie en 1996, le bâtiment est aujourdhui fermé.Suite aux derniers remaniements dont il a fait l'objet, le château a considérablement été réduit et ne présente plus rien de l'aspect massif de la commanderie de l'ordre du Temple. Après avoir accueilli un restaurant, le château de Clichy est désormais une maison médicale.","habitants":"famille Lindet-Girard \"","divers":"","gps":"","images":["../image/image_92/92_Clichy_1.jpg","../image/image_92/92_Clichy_2.jpg","../image/image_92/92_Clichy_3.jpg","../image/image_92/92_Clichy_4.jpg"]},"Consult_chateau_formulaire5031":{"id":"Consult_chateau_formulaire5031","dept":"92","canton":"Châtillon","commune":"Châtillon","nom":"Desmares","type":"Château","periode":"XVIII","histoire":"FOLIE DESMARES, sa construction a débuté en XVIIIe siècle. Son commanditaire fut Högguer Antoine. Charlotte Desmares, une comédienne française, y résida. Les architectes étaient Debias-Aubry François et Le Blond Alexandre Jean-Baptiste. Le peintre fut Desportes Alexandre-François. La maison et son terrain de 5 Ha ont été achetés, en 1708, par le Banquier suisse Antoine Högguer, baron de Presles, au maître de danse Claude Bellon. Sur les caves conservées de l'ancienne maison, Högguer fait reconstruire, vers 1728, par l'architecte François Debias Aubry une \" folie \" pour sa maîtresse l'actrice Charlotte Desmares  nièce de la Champmeslée et aurait été le modèle de Watteau. Cette construction, considérée comme un rendez-vous de chasse du roi Louis XV, est à rapprocher de l'hôtel parisien de Högguer élevé par le même auteur au N°78 rue de Varenne vers 1720. Le jardin dessiné par l'architecte J.B.A. Le Blond entre 1710 et 1715 comportait une grande pièce d'eau, terrasses, potager et orangerie.","architecture":"DESMARES, la propriété vendue en 1742, subit des transformations au gré de ses propriétaires successifs : aménagement du comble et transformation de l'aile droite en chapelle au XIXe siècle, aile gauche amputée de moitié en 1923 pour alignement. De la Révolution à 1854, c'est une institution pour jeunes gens. En 1880, les Soeurs Dominicaines y installèrent le refuge Sainte-Anne. Acquise par la commune, en 1984, elle doit devenir le nouvel hôtel de ville et le parc sera un jardin public. Le décor intérieur est partiellement conservé à l'exception de deux grands peintures d'Alexandre François Desportes représentant des scènes de chasse. La Folie Desmares est inscrite aux M.H. depuis le 5/06/1987.","habitants":"Famille de Charlotte Desmares\"","divers":"","gps":"","images":["../image/image_92/92_Desmares_1.jpg","../image/image_92/92_Desmares_2.jpg"]},"Consult_chateau_formulairea55f":{"id":"Consult_chateau_formulairea55f","dept":"92","canton":"Châtillon","commune":"Fontenay aux roses","nom":"Fontenay_aux_Roses","type":"Château","periode":"XVIII","histoire":"Deux châteaux dans cet article; Fontenay et Laboissière.   FONTENAY,  la paroisse se détache de Bagneux au XIIIe siècle. Les principaux seigneurs sont les abbayes de Sainte-Geneviève et Saint-Germain-des-Prés, et le chapitre de Notre-Dame de Paris. Dans le quatrième quart du XVIe siècle, rentre dans la mouvance des seigneurs de Sceaux. Aux XVIIe et XVIIIe siècles, implantation de maisons de plaisance. Le château est construit dans la première moitié du XVIIIe siècle à l'emplacement de l'ancienne maison seigneuriale de Sainte-Geneviève (comprend alors le corps de logis principal et une cour des communs sur l'aile Est). Acheté en 1851 par le collège Sainte-Barbe de Paris, qui fait aménager l'édifice en 1852 par l'architecte Henri Labrouste L'aile sur le jardin et peut être l'aile ouest sont édifiées entre 1854 et 1862. Le collège quitte Fontenay en 1899. Achat par le petit séminaire de N-D-des-Champs de Paris qui y fait remonter par l'architecte Ruprich-Robert la chapelle élevée en 1862 par l'architecte Eugène Viollet-le-Duc. Saisis après la loi de Séparation de l'Eglise et de l'Etat, le bâtiment est attribué en 1907 à la commune. En 1927, l'architecte Georges Boiret aménage des logements. En 1937, installation d'une garderie au rez-de-chaussée et une école occupe l'aile sur le jardin. En 1974, démolition de la chapelle de Viollet le Duc. Vers 1990, démolition des anciens bâtiments de la cour des communs.\nÉléments protégés MH : le château de Fontenay : inscription par arrêté du 17 décembre 1943, bâtiment administratif.","architecture":"LABOISSIERE,  porte le nom d'un des anciens propriétaires du XIXe siècle, Charles Pillault Laboissière. Construit à la fin du XVIIe siècle, pour Denis Thiérry, Editeur des fables de La Fontaine, les héritiers de Thiérry le château Laboissière  vendent, en 1720, à Pierre Saintard, directeur de la compagnie des Indes. Il sera revendu, en 1758 à Denis Lempereur, puis passera, entre plusieurs mains. M. Lempereur vend en 1778 à un sieur Legendre avocat au parlement, le cède un an après en 1779 à Mme Lelong de Ligny, deux changement  avant d'échoir en 1827 à Jean Baptiste Pillault de la Boissière qui laissera son nom à la demeure. En 1956 le domaine appartient à l'usine Citroën, est acquis par la caisse des dépots et consignations et amputé de son parc à l'emplacement duquel est construit un grand ensemble. Proprriété communale, abrite aujourd'hui le centre culturel et loisirs. La maison de la musique et de la danse a ouvert ses portes en septembre 2016. Elle regroupe tous les cours du conservatoire et les activités musicales du CCJL  Après deux ans de travaux (2014-2016), bâtiment classé, dune superficie de 1 200 m², a été entièrement rénové et remis aux normes. Le projet architectural de Pierre-Louis Faloci a permis la création dune extension de 760 m, semienterrée dans la cour, intégrant un auditorium de 176 places et une salle de danse. Lauditorium dispose dun accès public indépendant et peut ainsi fonctionner indépendamment du reste du château. Ce nouvel équipement a coûté, toutes dépenses confondues, près de 6 millions d'euros. Il a été financé par Vallée Sud - Grand Paris avec une subvention de la région pour la construction.","habitants":"Famille de Charles Pillault Laboissière\"","divers":"","gps":"","images":["../image/image_92/92_Fontenay_aux_Roses_1.jpg","../image/image_92/92_Fontenay_aux_Roses_2.jpg","../image/image_92/92_Fontenay_aux_Roses_3.jpg","../image/image_92/92_Fontenay_aux_Roses_4.jpg","../image/image_92/92_Fontenay_aux_Roses_5.jpg","../image/image_92/92_Fontenay_aux_Roses_6.jpg"]},"Consult_chateau_formulaire9654":{"id":"Consult_chateau_formulaire9654","dept":"92","canton":"Saint-Cloud","commune":"Garches","nom":"Garches","type":"Château","periode":"XVIII-XIX","histoire":"deux châteaux dans cet article; Garches et château civial.        GARCHES, cest en 1828, sous le règne de Charles X, que Michel Brézin, directeur de la fonderie de lArsenal de Paris, lègue à ladministration des hospices civils de Paris le terrain de sa propriété, sur la commune de Garches.  La clinique du château de Garches a été fondée en 1930 par son Altesse la Reine de Grèce, Marie Bonaparte, élève de Freud, avec quelques médecins renommés dont le Docteur Rondepierre et le Docteur Olivier Garand. En 1928, lassistance publique entreprend la construction de lactuel hôpital qui sera inauguré en 1936. Cest de cette époque que datent les pavillons Letulle, Netter et Widal. La population crie dabord au scandale, redoutant la propagation des maladies. Une pétition est lancée contre lactivité de létablissement mais naura pas raison du projet de lassistance publique. Originellement lhôpital était destiné aux malades chroniques des deux sexes, à lexclusion des malades tuberculeux et atteints de cancer.\nLannée 1941 voit la mise en place dun service de chirurgie osseuse avec bloc opératoire. Progressivement, lactivité de létablissement soriente vers la prise en charge des séquelles de la poliomyélite (de 1950 à 1970) puis se spécialise dans la rééducation de patients atteints de troubles moteurs neurologiques. Les premiers kinésithérapeutes de lassistance publique-hôpitaux de Paris y reçoivent leur formation.","architecture":"Château civial;  Originellement, la bâtisse ancienne de lactuelle Mairie était une maison de maître, entourée dun parc de 15 hectares délimité par les actuelles rues : de Villeneuve au sud, de lAbreuvoir et Claude Liard au nord, Frédéric Clément à lest et, à mi-distance, par lavenue Foch et la Grande Rue, à louest.  Henri Bergeron et Sidney Beschet ont résidé dans ce château.  La façade de la propriété était alors située au nord-est, du côté de la rue de la Procession, actuellement rue Frédéric Clément. Acquise par le Docteur Civiale, célèbre chirurgien, la demeure fut baptisée par les Garchois « Chateau Civiale » et son parc « Parc Civiale ». Elle fut lancienne résidence de la princesse de Beauvau-Craon.","habitants":"Famille de Brézin\"","divers":"","gps":"","images":["../image/image_92/92_Garches_1.jpg","../image/image_92/92_Garches_2.jpg","../image/image_92/92_Garches_3.jpg","../image/image_92/92_Garches_4.jpg"]},"Consult_chateau_formulaire2a96":{"id":"Consult_chateau_formulaire2a96","dept":"92","canton":"Rueil-Malmaison","commune":"Rueil-Malmaison","nom":"Malmaison","type":"Château","periode":"XIX","histoire":"Deux châteaux dans cet article ; Malmaison et la Petite Malmaison.                                                                                            MALMAISON, au XVIIe siècle, construction du château par Christophe Perrot  l'origine du nom « Malmaison » est peu connue. Malmaison, de mala domus, signifierait \"mauvaise maison\". L'hypothèse avancée serait due à la mauvaise fréquentation des lieux (brigands, invasion des Normands) durant le Moyen-Age. Cet édifice va devenir un petit château assez simple au cours du XVIIIe siècle. Son propriétaire est à cette époque Jacques-Jean Le Coulteux du Molay, un riche banquier, qui possède aussi un manoir à Le Molay-Littry, à coté de Bayeux. C'est durant le Directoire, que le château de Malmaison entre dans l'histoire de France lorsque Joséphine de Beauharnais devenue l'épouse de Napoléon Bonaparte, rachète le château le 21 avril 1799,  à l'époque. Napoléon y viendra jusqu'en 1809, date de son divorce. Le château de Malmaison devient la demeure principale de Joséphine, qui, après sa répudiation, y menera une vie désuvrée, sans Bonaparte. Elle y recevra le Tsar Alexandre Ier de Russie, la veille de sa mort, le 29 mai 1814. Son fils le prince Eugène devait en hériter , auparavant passa dans différentes mains  mais sa veuve le revendit à Napoléon III maison de sa grand mère en 1861 , endommangé pendant le siège de Paris , l'Etat s'en défait en 1877 de nouveau le château passe de mains en mains passe à un banquier suédois,en 1897 à Jonas Hagermann,  passe en 1897 M. Orsini banquier, après avoir restauré le château et le parc   en fait don à l'Etat. Le château de Malmaison est ouvert au Public et se visite. C'est devenu un musée Napoléonien. En 1904 donné à l'état.","architecture":"PETITE  MALMAISON, c'est un pavillon de style Empire. L'ancienne serre chaude du domaine de Malmaison a été construite de 1803 à 1805. Les Architectes furent Jean-Marie Morel, Jean-Thomas Thibault, Barthélémy Vignon et Louis-Martin Berthault. Construit pour l'Impératrice Joséphine, propriétaire du château de Malmaison voisin. Il s'agissait d'un pavillon de réception, attenant à une vaste serre chaude, détruite depuis. Elle est accessible, d'un entretien coûteux, la serre fut démolie dès 1827. Les salons furent redécorés en partie vers 1828 par le nouveau propriétaire, le Banquier suédois Jonas-Philip Hagerman. Après la vente du domaine par lots en 1878, la Petite Malmaison devient en 1887 la propriété de Pascal des Deux-Siciles (1852-1904), comte de Bari, dernier fils de Ferdinand II, roi des Deux-Siciles, qui réside dans son hôtel parisien du no 8 avenue Matignon mais meurt à la Petite Malmaison en 1904. Ensuite Marcel de Chabrières de Charmes, administrateur de société et associé chez Chabrières et Cie,devient propriétaire de la Petite Malmaison. On peut y voir en médaillon le portrait de son fils Paul, dans la salle à manger. Le château de la petite-Malmaison appartient actuellement au comte Stefan C. Czarnecki. Il a été classé avec son parc aux M.H. depuis le 26/04/1995.","habitants":"l'Impératrice Joséphine\"","divers":"","gps":"","images":["../image/image_92/92_Malmaison_1.jpg","../image/image_92/92_Malmaison_2.jpg","../image/image_92/92_Malmaison_3.jpg","../image/image_92/92_Malmaison_4.jpg","../image/image_92/92_Malmaison_5.jpg","../image/image_92/92_Malmaison_6.jpg","../image/image_92/92_Malmaison_7.jpg"]},"Consult_chateau_formulaire97df-2":{"id":"Consult_chateau_formulaire97df-2","dept":"92","canton":"Meudon","commune":"Meudon","nom":"Meudon","type":"Château","periode":"XVIII-XIX-","histoire":"Trois châteaux dans cet article Bussière, Meudon et Montalets.  BUSSIERE, sa construction date de 1863. Le château de Bussière est une grande bâtisse située dans le quartier de Bellevue à Meudon. Le château a été construit  pour le Baron et la Baronne de Bussière. Le château de Bussière avait accueilli la maison d'enfants de Sèvres en 1950. En 2013, la société Steva va racheter le château de Bussière et y fait construire une Résidence de luxe pour les Seniors retraités, baptisée Villa Beausoleil de Meudon, inaugurée en mai 2019. Une belle opération financière pour le conseil Général qui empochera la coquette somme de 12 Millions d'euros.                                                   MEUDON, son architecture est de style baroque. Les architectes qui l'ont créé sont Mansart et Le Vau. Il est classé aux M.H. depuis 1972 et 2000. Il fut la résidence de Louvois puis de Monseigneur, dit le Grand Dauphin. L'ancien chateau a été incendié en 1795. Le nouveau château, bâti en 1871, dont la démolition avait été envisagée, a été transformé, en 1876, en observatoire avant d'être rattaché à l'Observatoire de Paris en 1927. Le site du château sur l'arête d'un plateau boisé offre des vues sur la Seine et Paris. Situé entre Paris et Versailles, au cur d'une abondante réserve de chasse, jouissant d'une topographie idéale pour de vastes jardins, il bénéficia d'aménagements somptueux de la part de ses propriétaires successifs. L'ensemble du domaine est inscrit aux M.H. depuis le 12/04/1972. Le hangar appelé « bâtiment Y » dans le Parc de Chalais-Meudon est classé aux M.H. depuis le 4/06/2000. Vue de l'entrée du château de Meudon, vers 1715. Restitution 3D de Franck Devedjian et Hervé Grégoire, 2013. Le château de Meudon est réservé au Président de la République.","architecture":"MONTALETS   Le château des Montalets doit son nom au lieu-dit les Montalais qui donne son nom à un vaste domaine, qui s'appelle couramment : \"Les Montalais\". On retrouve sur le plan cadastral de Meudon, de 1816, la délimitation des Montalais. Déjà à l'époque, ce domaine est parfois écrit « Montalets » à la suite d'une erreur d'orthographe. C'est cette erreur même qui s'inscrira dans le temps pour donner son nom à une belle propriété que l'on appellera, en 1990, le château des Montalets. Ce dernier n'est pas construit sur le domaine, mais à côté du domaine des Montalais. C'est pourquoi on confond souvent le château des Montalets avec l'ancien château des Montalais construit sur l'ancien domaine des Montalais, château aujourd'hui détruit. Au XXe siècle, la Mutuelle des PTT en devient propriétaire et en fit un orphelinat, pour les orphelins des agents des PTT. La mutuelle des PTT finira par le vendre à la Ville de Meudon. Mais le château des Montalets se situe au-dessus des carrières des Montalets, de très grandes carrières, sur 5 niveaux, avec de nombreux kms de galeries, dont plusieurs niveaux sont inondés. La ville va décider de s'en séparer et le met en vente. Mis en vente dans une agence immobilière de la place Rabelais de Meudon, il resta longtemps abandonné. Le château des Montalets sera vendu  en 2003. Démenbrée de son parc, la propriété sera vendue à un marchand de biens. Le château et ses dépendances ont alors une superficie totale de 1 350 m2 habitables sur un terrain de 5 595 m2. Le marchand de bien le revendra en l'état, par appartements, sans le rénover.","habitants":"Baronne de Bussière,  Meudon,résidence de Louvois                               et famille des Montalais\"","divers":"","gps":"","images":["../image/image_92/92_Meudon_1.jpg","../image/image_92/92_Meudon_2.jpg","../image/image_92/92_Meudon_3.jpg","../image/image_92/92_Meudon_4.jpg"]},"Consult_chateau_formulaire942b":{"id":"Consult_chateau_formulaire942b","dept":"92","canton":"Meudon","commune":"Meudon","nom":"Meudon_II","type":"Château","periode":"XV","histoire":"MEUDON,  la villa des Brillants est l'un des deux sites du musée Rodin Ainsi, fin 1893, Rodin s'installe dans la villa des Brillants, avant de lacheter en décembre 1895. Jusqu'à la fin de sa vie, il ne cesse d'aménager ce petit domaine en l'agrandissant.   Au XVe siècle, simple demeure particulière juchée au sommet dune colline, le domaine de Meudon est devenu, à laube du XVIIIe siècle lun des plus beaux domaines dIle-de-France.\nSes châteaux édifiés par les plus grands architectes, son parc dessiné par Le Notre en firent un haut lieu de lart et du divertissement durant plusieurs siècles.\nPropriété du grand Dauphin, fils aîné de Louis XIV, le domaine sagrandit au Grand Siècle par la construction dun second château, le château-neuf, surplombant la forêt domaniale et le bourg de Meudon. Subissant les vicissitudes de lhistoire, le château vieux fut démoli en 1795 tandis que le château neuf brûla durant la guerre de 1870.  La science vint, au cours du XIXe siècle, revivifier ce domaine oublié et lui permit de survivre au temps. En 1885, lastronome Jules Janssen transforma les ruines du château en Observatoire spécialisé dans létude du soleil, rattaché à lObservatoire de Paris en 1923.\nAujourdhui le Domaine est un lieu vivant de recherche scientifique, de culture et de promenade aux portes de Paris.","architecture":"MEUDON, bien que le château-vieux ait été détruit, il reste dimportants vestiges de lancien domaine royal et impérial de Meudon :lorangerie du château-vieux, le château-neuf transformé en Observatoire (accès réservé), les anciennes écuries et corps de garde à lentrée de la terrasse, et la grande porte voisine la Grande Perspective, dont lavenue du château, létang de Chalais et le Tapis Vert, le bassin de Bel Air ainsi que toute lemprise des jardins hauts (appartenant à l'Observatoire, accès réservé). A tout cela est venu se superposer le patrimoine scientifique du XIXe siècle, dont le Hangar Y et la Grande Soufflerie sur le domaine de Chalais-Meudon sont les exemples conservés les plus spectaculaires.\nLOrangerie construite en 1657 par Abel Servien, alors propriétaire du château, lOrangerie, entièrement rénovée, est gérée par la Ville de Meudon depuis 2006. Cette construction dexception a retrouvé les couleurs de sa jeunesse et sa fonction initiale car cest lune des dernières orangeries encore utilisée comme telle en Île-de-France. Doctobre à mai, les orangers des domaines de Meudon, de Saint-Cloud et des Tuileries y passent lhiver. Tandis quà la belle saison, des spectacles et des expositions y sont présentées.                                            BELLEVUE  château de Bellevue, ayant appartenu à la célèbre Madame de Pompadour, maîtresse et confidente de Louis XV, puis au roi lui-même, enfin aux filles de ce dernier, Mesdames, tantes de Louis XVI.","habitants":"lastronome Jules Janssen \"","divers":"","gps":"","images":["../image/image_92/92_Meudon_II_1.jpg","../image/image_92/92_Meudon_II_2.jpg","../image/image_92/92_Meudon_II_3.jpg","../image/image_92/92_Meudon_II_4.jpg","../image/image_92/92_Meudon_II_5.jpg","../image/image_92/92_Meudon_II_6.jpg"]},"Consult_chateau_formulaire3b15":{"id":"Consult_chateau_formulaire3b15","dept":"92","canton":"Neuilly sur Seine","commune":"Neuilly sur Seine","nom":"Neuilly_sur_Seine","type":"Château","periode":"XVII","histoire":"trois châteaux dans cet article ; Villiers et Neuilly et Folies s- James.                                     VILLIERS, composé de 24 pièces avec un beau jardin séparé par une palissade du parc de Neuilly proprement dit. Cette propriété fut finalement rattachée à la suivante dans les premières années du XIXe siècle. Lors de la Révolution de 1848, il fut incendié et pillé le 25/02/1848. Confisqué par Napoléon III, en 1852, avec les biens de la maison d'Orléans, le parc fut divisé en 700 lots qui, après la création de sept boulevards de 30 mètres de largeur et de 9 rues limitées à 15 mètres de largeur, sont l'objet d'adjudications successives à partir de 1854. Il ne subsiste alors du château de Villiers qu'une des ailes édifiées par Murat, appelée « aile de Mme Adélaïde », faisant partie des constructions de Fontaine. Elle est occupée de 1863 à 1874 par le pensionnat Notre-Dame-des-Arts, puis de 1874 à 1907 par une maison de travail pour les jeunes filles pauvres dirigée par Mlle Glaude. Le Domaine de Villiers a été racheté, en 1907, par la Congrégation des Surs de Saint-Thomas de Villeneuve, à la suite de l'expropriation de sa maison de la rue de Sèvres à Paris. Les religieuses confient à l'architecte Maurice Humbert le soin de restaurer les bâtiments et de construire leur nouveau couvent en harmonie avec l'aile subsistante. Les surs s'y installent le 23 septembre 1908 et demandent à Maurice Humbert de construire une chapelle, la chapelle Notre-Dame de Bonne Délivrance. Cette chapelle est consacrée le 22/06/1910 et abrite la statue de Notre-Dame de Bonne-Délivrance, appelée \"la Vierge Noire de Paris\".","architecture":"NEUILLY, le château de Neuilly, à l'ouest, était à l'origine une construction construite, dans le 2e quart du XVIIe siècle, appartenait en 1668 à Louis Béchameil de Nointel, Surintendant des Finances du duc d'Orléans et maître d'Hôtel du roi Louis XIV. Détruit en 1848, il ne reste aujourd'hui que l'aile Nord, appelé le Pavillon de madame Adélaïde. Cette aile a été rachetée en 1907 par les Surs de Saint Thomas de Villeneuve. Ces dernières firent appel à l'architecte Maurice Humbert qui surélèva l'aile et construisit une chapelle ainsi qu'un bâtiment rattaché à l'hôpital municipal en s'appuyant sur les ruines du château, qui est inscrit à l'inventaire général du patrimoine culturel, il est devenu depuis le couvent des Surs de Saint-Thomas-de-Villeneuve,                                                                        FOLIE de ST JAMES , c'est un château de la Renaissance. L'architecte était Bélanger François-Joseph qui construisit en 1777, cette maison, pour Baudard de Vaudésir, Baron de Saint-James, contrôleur général de la Marine. Une cour d'honneur, avec ses pavés d'origine, sépare l'entrée, marquée par une belle grille à lances et la façade principale du château. Au milieu de cette façade se trouve un péristyle à 4 colonnes surélevé de 3 marches, qui donne accès au vestibule. Le vestibule est décoré de fresques en trompe-l'oeil. L'escalier a gardé sa rampe en fer forgé qui date du XVIIIe siècle. La plupart des pièces du rez-de-chaussée a conservé un décor de boiseries et de décor stuqué. Le parc, contemporain de la maison, est parsemé de fabriques. Il est partiellement loti à partir de 1825. La Folie Saint-James est inscrite aux M.H. depuis le 23/02/1922 est ouverte au Public et se visite.                                                                                                                              HOTEL de Ville, situé au N° 96 avenue du Roule  a été construit, entre 1882 et 1886. La Mairie est inscrite à l'Inventaire Général du Patrimoine Culturel.","habitants":"Famille de Louis Béchameil de Nointel,\"","divers":"","gps":"","images":["../image/image_92/92_Neuilly_sur_Seine_1.jpg","../image/image_92/92_Neuilly_sur_Seine_2.jpg","../image/image_92/92_Neuilly_sur_Seine_3.jpg","../image/image_92/92_Neuilly_sur_Seine_4.jpg","../image/image_92/92_Neuilly_sur_Seine_5.jpg","../image/image_92/92_Neuilly_sur_Seine_6.jpg","../image/image_92/92_Neuilly_sur_Seine_7.jpg"]},"Consult_chateau_formulaire2d32":{"id":"Consult_chateau_formulaire2d32","dept":"92","canton":"Châtenay-Malabry","commune":"Le_Plessis-Robinson","nom":"Plessis_Robinson","type":"Château","periode":"XV-XIX","histoire":"Trois châteaux  dans cet article ; Colbert, Petit Robinson et Plessis-Piquet.                                                                                                       COLBERT, les premières traces remontent au Néolithique. Au XIIe siècle,  le village prend le nom du Plessis-Raoul puis du Plessis-Piquet. Au XVIIe et XVIIIe siècle, installation de grandes enclosures et creusement d'étangs. Jean-Baptiste Colbert achète la seigneurie du Plessis en 1682, aménage l'étang et revend en 1683 après avoir transféré les droits seigneuriaux sur la ferme \"de Normandie\" construction de deux petites tours encadrant la maison du fermier. Le château est sans doute bâtit vers la même époque pour Bertrand Dufresne. En 1888, il devient \"la Société du Refuge\", oeuvre de bienfaisance juive. Elle se transforme en école d'horticulture. En 1923, le château Colbert abrite le presbytère, puis en 1978 la communauté chrétienne de \"la Fontaine\". Le château est couvert par des toits à longs pans brisés et croupes brisées en ardoise ; les communs et les bâtiments de ferme par des toits à longs pans brisés et croupes brisées en tuile mécanique, zinc ou ardoise pour les brisis ; la ferme et l'orangerie par des toits à longs pans et croupes en tuile plate mécanique ; les tourelles de la ferme par des toits coniques en ardoise ; la \"grange\" par un toit à longs pans et croupes en tuile plate et tuile plate mécanique.","architecture":"PLESSIS ROBINSON; C'est un château de la Renaissance. Le château seigneurial dit Hachette est l'un des éléments importants du Patrimoine de Plessis-Robinson. Le ministre Colbert fut propriétaire du château du Plessis-Piquet. Louis-Christophe Hachette le racheta à la famille Odier, en 1954. il est devenu la mairie de Plessis-Robinson.                                            PLESSIS-PIQUET, au XVIIe et XVIIIe siècle, la première mention d'un château date du début du XVe siècle (peut-être construit pour Jean Piquet de la Haye); après 1609, transformé pour Louis Potier ; la terrasse est construite en 1703 pour le maréchal de Montesquiou d'Artagnan; à partir de 1763 Nicolas Mathieu Dutrou, puis Jérôme Frédéric Bignon font édifier le bâtiment que perce le porche d'entrée ; après 1776, construction de l'orangerie pour Jérôme Frédéric Bignon ; les communs sont sans doute élevés au début du XIXe siècle ; en 1864 Louis Hachette fait construire la salle de banquet et la façade de l'aile sud, puis en 1870, l'escalier extérieur et le couloir sur arcade reliant les deux corps de bâtiment; le petit pavillon à décor de céramique semble postérieur ; le château est racheté en 1915 par l'OPHBMS et sert actuellement de mairie.  Corps principal en moellon, couvert d'ardoise ; salle de banquet et petit pavillon en brique, couvert par une terrasse ; communs rocailles couverts de tuiles mécaniques, propriété de la commune, hôtel de ville.","habitants":"Famille de Jean Piquet de la Haye                               Colbert;  Bertrand Dufresne.\"","divers":"","gps":"","images":["../image/image_92/92_Plessis_Robinson_1.jpg","../image/image_92/92_Plessis_Robinson_2.jpg","../image/image_92/92_Plessis_Robinson_3.jpg","../image/image_92/92_Plessis_Robinson_4.jpg"]},"Consult_chateau_formulaire9ef5":{"id":"Consult_chateau_formulaire9ef5","dept":"92","canton":"Issy-les-Moulineaux.","commune":"Issy les Moulineaux","nom":"Prince_de_Conti","type":"Château","periode":"XIV-XV","histoire":"PRINCE de CONTI, si la légende place l'origine d'Issy dans l'antiquité romaine, l'histoire rapporte que le roi Charles le Simple, le premier, mentionna en 907 le nom d'Issy en y signant une charte. Le nom du château de Childebert, demeure des abbés de Saint-Germain-des-Prés, rappelle la probable implantation ancienne du roi à Issy et le fief de l'abbaye parisienne sur une partie des terres de la commune dès le XIIIe siècle. Les fiefs se multiplient à partir du XVIe siècle :  Au début du XVIIe siècle, la reine Margot fit élever un nymphée dans le parc de sa demeure. Durant la seconde moitié du siècle, la demeure de la reine Margot, transformée en séminaire par l'abbé Ollier, fut dotée d'une chapelle Notre-Dame-de-Lorette. Le président Denis Talon acheta en 1681 une propriété à Issy consistant en un terrain sur lequel le précédent propriétaire  Macé Berthrand de la Bazinière, avait commencé à construire une maison de plaisance, peut-être sur des plans de l'architecte François Mansart. Il demanda à l'architecte Pierre Bullet d'y bâtir un petit château et aux architectes paysagers André Le Nôtre et Pierre II Desgots d'en dessiner le parc. François-Louis de Bourbon, prince de Conti, achète l'édifice en 1699, et fait modifier, sans doute par Bullet, les façades sur cour et sur parc, et construire l'entrée en hémicycle ainsi que le \"petit château\" ou \"pavillon des bains\". L'ensemble est achevé en 1709.","architecture":"PRINCE de CONTI,  c'est sans doute pendant la première moitié du XIXe siècle que sont édifiés le colombier, l'orangerie et le pavillon. Le comptoir central de crédit acquiert en 1860 le domaine dont il lotit le parc en 1866. Durant le conflit de 1870 et 1871, le château est bombardé et incendié, il sera démoli vers 1910. Ne restent aujourd'hui sur place que la moitié la plus récente de l'hémicycle d'entrée, l'orangerie, le colombier et la fontaine. Une petite partie du parc, rachetée par la commune, a été transformée en parc municipal Henri Barbusse. Le sculpteur Rodin racheta le fronton de la façade sur jardin, ainsi que les colonnes de l'avant-corps sur cour, qu'il fit remonter dans sa propriété de Meudon., musée municipal.","habitants":"la reine Margot\"","divers":"","gps":"","images":["../image/image_92/92_Prince_de_Conti_1.jpg","../image/image_92/92_Prince_de_Conti_2.jpg"]},"Consult_chateau_formulaire8240-2":{"id":"Consult_chateau_formulaire8240-2","dept":"92","canton":"Clamart","commune":"Vanves","nom":"Prévost","type":"Château","periode":"XVII","histoire":"Deux châteaux dans cet article Prévost et Vanves.                        PREVOST; au moyen-âge la plus grosse partie du territoire de Vanves appartient à l'abbaye parisienne de Sainte-Geneviève, et le restera jusqu'à la Révolution, son territoire comprend alors aussi le XIVe arrondissement et une partie du XVe arrondissement de Paris, cédés à Paris en 1859, ainsi que le territoire actuel de Malakoff ; l'activité principale de la population sous l'ancien régime est l'agriculture, on cultive des céréales qui nécessitent la construction de moulins à vent, on y produit du vin qui est exporté sur la Seine, les cultures maraîchères et l'élevage laitier alimentent Paris, la population réside alors dans le bourg rassemblé autour de l'église ou dans le hameau du petit Vanves, cédé à Montrouge en 1799 ; jusqu'à la Révolution, le territoire de Vanves porte plusieurs châteaux correspondant à plusieurs domaines aristocratiques : le premier château connu sur ce site fut probablement bâti vers le milieu du XVIIe siècle pour l'abbé Charles Le Prévost qui fut le seigneur de Vanves de 1638 à 1661 ; en 1655, Claude Le Bas de Montargis acquit la seigneurie de Vanves, conservant le château Le Prévost, il demanda à son beau-père, l'architecte Mansart de lui construire un nouveau château qui fut achevé en 1704; le domaine est vendu comme bien national en 1792 et racheté en 1799 par le collège Louis Le Grand ; en 1859, on ajoute au pavillon de Mansart deux ailes en retrait et deux préaux, en 1862, l'architecte Louis Joseph Duc bâtit une chapelle. Emancipé sous le nom de lycée du prince impérial en 1864, le lycée s'agrandit en 1866.","architecture":"PREVOST, en 1871, sous la commune un assaut de versaillais incendie une partie du lycée; de 1883 à 1887, l'architecte Alfred Normand élève le grand collège, comportant des ateliers, il élève aussi une infirmerie ; en 1899, le château de Le Prevost devenu ferme du lycée est vendu pour un lotissement ; en 1935 est bâti la conciergerie. Le château Le Prévost avait un colombier avec toit à l'impériale ; le château d'Hardouin-Mansart possédait un escalier tournant à retours avec jour suspendu ; le lycée de Vanves a une chapelle en brique et pierre avec croupe polygonale, une piscine en pan de fer, un gymnase avec lanterneau et une conciergerie en béton armé.  Éléments protégés MH : le château Le Prévost en totalité : inscription par arrêté du 10 juillet 1986, actuellement Lycée Michelet.                                                              VANVES, il date du milieu du XVIIe siècle et fut construit sous les ordres de l'abbé Charles Le Prévost, ancien seigneur de Vanves durant 1638 à 1661. C'est en à 1655, que Claude Lebas de Montargis deviendra propriétaire du chateau de Vanves et fera constuire, par l'architecte Jules Hardoin Mansart, un nouveau château. Celui-ci sera achevé en 1704. Il sera ensuite vendu à la Révolution française comme bien national. Ce n'est qu'en 1799, que le château de Vanves sera racheté par le collège Louis le Grand qui le transformera, en Collège, puis en Lycée. Le château sera ensuite agrandi et une nouvelle chapelle sera bâtie, en 1859. Le Lycée Michelet est privé, fermé au Public.","habitants":"l'abbé Charles Le Prévost\"","divers":"","gps":"","images":["../image/image_92/92_Pr%c3%a9vost_1.jpg","../image/image_92/92_Pr%c3%a9vost_2.jpg","../image/image_92/92_Pr%c3%a9vost_3.jpg"]},"Consult_chateau_formulairece94":{"id":"Consult_chateau_formulairece94","dept":"92","canton":"Chatenay-Malabry","commune":"Chatenay-Malabry","nom":"Roseraie_Petite","type":"Château","periode":"XVII-XVIII","histoire":"Petite ROSERAIE  date des XVIIe au XVIIIIe siècles. Le château est construit au XVIIIe siècle. Il a appartenu au maréchal de Ségur, aux Arouet, au prince Francesco Borghèse, ainsi qu'au comte de Boigne, dont l'épouse y tenait des salons fréquentés par des opposants à la politique de Napoléon, dont Germaine de Staël, Benjamin Constant, Mme Récamier et son amant Châteaubriand, dont la propriété, dans la Vallée aux Loups, n'est guère éloignée. Voltaire a toujours prétendu ne pas être né à Paris, comme indiqué sur son acte de naissance, mais à Châtenay-Malabry, dans la propriété de son père, le château de la Petite Roseraie. Ce fait a été confirmé par la comtesse de Boigne, qui l'écrit dans ses mémoires. En 1829, il devint la propriété d'Alexandre Roland-Gosselin, agent de change à Paris. Il fit agrandir le domaine de la Petite Roseraie en faisant l'acquisition de l'ensemble des terres avoisinantes et aménager le parc par larchitecte Varé. Après sa mort, en 1866, il passa à sa fille qui y fit construire un orphelinat, réservé aux jeunes filles nécessiteuses.","architecture":"Le Domaine de la Petite ROSERAIE est acquis en 1941 par l'État qui y installa l'école normale supérieure déducation physique de Jeunes Filles devenue ensuite, le centre d'éducation populaire, puis le CREPS. Le château de la Petite Roseraie avec ses toitures, ses façades et son parc inscrits aux M.H. le 5/06/1946.","habitants":"Mme Récamier \"","divers":"","gps":"","images":["../image/image_92/92_Roseraie_petite_1.jpg"]},"Consult_chateau_formulairebd36":{"id":"Consult_chateau_formulairebd36","dept":"92","canton":"Boulogne Billancourt","commune":"Boulogne Billancourt","nom":"Rothschild","type":"Château","periode":"XVIII-XIX","histoire":"ROTHSCHILD, la commune résulte de la fusion en 1859 des villages de Boulogne et de Billancourt.  Le terme des menus, ancienne appellation de Boulogne, apparaît pour la première fois dans une charte de 1134 qui indique l'existence, à cette date, de quelques maisons entourées de prés, vignes et labours. Sous l'ancien régime, le bourg de Boulogne abrite cultivateurs, artisans et blanchisseurs. La ferme de Billancourt apparaît au XIIIe siècle comme propriété de l'abbaye parisienne de Saint-Victor. Le territoire de Billancourt reste en partie en cultures, en partie en friches jusqu'au XIXe siècle. En 1825, le comte de Gourcuff  l'achète pour le lotir. L'opération réussit mais n'entraîne aucune extension jusqu'à 1859. Durant la seconde moitié du XIXe siècle, Napoléon III transforme Boulogne : aménagement du bois, modifications de la voirie, restauration de l'église, constructions résidentielles (château des Rothschild). Le château d'architecture néo-Louis XIV, est construit en 1855 par l'architecte Joseph-Armand Berthelin pour le banquier James de Rothschild. Parc dessiné à l'anglaise par l'architecte paysager Loyre ou Joseph Paxton, il comporte entre autre une pièce d'eau, une ile et une cascade. Les historiens des châteaux de la famille Rothschild indiquent l'intervention du peintre-architecte-paysager Eugène Lami pour les décors intérieur. Il est aujourd'hui ruiné, mais la distribution intérieure n'a pas été modifiée. Éléments protégés MH : le château : inscription par arrêté du 24 avril 1997. Le parc classé par arrêté du 12 décembre 1951.","architecture":"ROTHSCHILD, Il était entouré de splendides jardins à la française et à langlaise sur 30 hectares. Le château de Rothschild fut longtemps un lieu de rencontres de la haute société. Pillé par les nazis et endommagé par les Américains lors de la seconde guerre mondiale, il a été ensuite revendu. Totalement abandonné, le château de Rothschild est, aujourd'hui, en ruine. Quinze hectares du parc subsistent en parc public, tout le reste est à labandon ou a fait place à diverses constructions et aménagements. Le château Edmond de Rothschild à Boulogne-Billancourt - va revivre le temps dun week-end ! Vous lavez sans doute appris, les boulonnais vont enfin être privés du navrant spectacle de la décrépitude du château Edmond de Rothschild, laissé à labandon par une famille saoudienne dans le célèbre parc du même nom. Le château a été racheté lannée dernière par la société Novaxia, leader du capital développement immobilier, qui sest engagé à le rénover en échange de lautorisation de créer 6000 m2 de logement sur un terrain derrière. On parle même de Stéphane Bern comme parrain de cette prestigieuse Renaissance. Pour une expérience encore plus étonnante, Novaxia a noué un partenariat avec la société Histovery, spécialiste de la reconstitution numérique du patrimoine historique français et de la realité augmentée, cette jeune start-up a reconstitué des décors du château tels quils existaient au début du XXe siècle. Pendant 30 ans, le château connut plusieurs incendies et subit de lourdes dégradations. Publié sur Blog de Boulogne le 15/09/2017. Très dégradé,  Les 15 Ha du parc subsistent en un parc public, le reste  à labandon avec le château, ou a fait place à divers aménagements et constructions.","habitants":"Famille  d'Edmond de Rothschild\"","divers":"","gps":"","images":["../image/image_92/92_Rothschild_1.jpg","../image/image_92/92_Rothschild_2.jpg"]},"Consult_chateau_formulaire1705":{"id":"Consult_chateau_formulaire1705","dept":"92","canton":"Rueil_Malmaison","commune":"Rueil_Malmaison","nom":"Rueil_Malmaison","type":"Château","periode":"XIV-XVIII-XIX","histoire":"Deux châteaux dans cet article , Buzenval et la Malmaison. BUZENVAL  château acheté par Jean Choart en 1470, détruit en partie en 1567. Il est probablement remanié au XVIIIe siècle. Le domaine passe entre diverses mains. Il est annexé à la Malmaison sous l'Empire. La chapelle Notre-Dame-de-Toutes-Grâces est édifiée en 1875 par la duchesse de Cadore qui lègue la propriété au collège de Saint-Nicolas qui s'y installe en 1901. Bâtiments administratifs et logements pour les pensionnaires bâtis au XXe siècle, propriété privée, collège de Passy Buzenval.","architecture":"La MALMAISON  L'origine du nom de Malmaison serait liée à l'existence d'un repaire d'envahisseurs normands exerçant des razzias sur les environs. Cette \"Mala domus\" (mauvaise maison),  une demeure seigneuriale est mentionnée au XIVe siècle sous le nom de La Malmaison. En 1390, la terre est achetée par Guillaume Goudet sergent d'armes de Charles VI et reste dans sa descendance jusqu'en 1763 par les familles Barentin, Dauvergne et Perrot. A partir de 1737, le château est loué à de riches financiers qui y reçoivent une société choisie. En 1763, la terre passe au fils du chancelier d'Aguesseau et en 1771 à Jacques Jean Le Couteulx du Molay riche banquier du royaume. Madame du Molay y tient un salon littéraire où elle reçoit l'Abbé Delille, Mme Vigée Lebrun, Bernardin de Saint-Pierre et Grimm. A la Révolution, ils vendent l'édifice en 1799 à Joséphine Bonaparte. L'achat est confirmé par Bonaparte à son retour d'Egypte et il devient ainsi le véritable propriétaire du domaine. De 1800 à 1802,  le château devient, avec les Tuileries, le siège du gouvernement de la France. A l'automne 1802, le consul et sa famille s'installent à Saint-Cloud et Joséphine revient souvent au \"Palais Impérial de Malmaison\" pour aménager et agrandir le domaine. Après le divorce en 1809, l'Empereur lui donne la propriété avec toutes ses collections et c'est là qu'elle meurt le 29 mai 1814. Son fils le prince Eugène en hérite mais sa veuve cède l'édifice en 1828. Endommagé par les combats de 1870, le château est vendu en 1877 par l'État à un marchand de biens qui lotit le parc. En 1896, Daniel Iffla achète le château avec son parc réduit à six hectares et l'offre à l'Etat en 1904. Un musée y est inauguré en 1906.","habitants":"Buzenval duchesse de Cadore                                   Vert-Mont M. Edward Tuck                                         Malmaison, famille Barentin et de Molay\"","divers":"","gps":"","images":["../image/image_92/92_Rueil_Malmaison_1.jpg","../image/image_92/92_Rueil_Malmaison_2.jpg"]},"Consult_chateau_formulairedf48":{"id":"Consult_chateau_formulairedf48","dept":"92","canton":"Châtenay-Malabry","commune":"Sceaux","nom":"Sceaux","type":"Château","periode":"XV-XVII-XIX","histoire":"SCEAUX, les Baillet restèrent à Sceaux pendant plus de cent ans. En 1597, à la famille Baillet succéda à  la famille Potier de Gesvres. Louis Potier fit construire un château. En 1644, son fils René, agrandit la propriété au sud. Peu après sa mort en avril 1670, ses héritiers vendaient la terre de Sceaux à Jean-Baptiste Colbert, ministre du Roi Louis XIV. Colbert agrandit la propriété et transforme le château. La façade ouest sur les jardins est peu modifiée, mais elle est élargie par laugmentation des pavillons dangle. A linverse, la façade Est, du côté de lentrée, est totalement transformée. Elle est doublée par des galeries de circulation doù partent deux ailes en retour déquerre terminées par des pavillons de plan carré. Lentrée dhonneur est reconstruite, couronnant les guérites que gardent les animaux de Colbert, accueillant le visiteur. Le peintre décorateur Charles Le Brun établit un programme décoratif dans lequel symboles et allégories tiennent une place essentielle. Il réalise de grands décors peints pour lintérieur du château de Sceaux, la chapelle et les pavillons de jardin comme le pavillon de lAurore qui seul a subsisté. Jean-Baptiste de la Quintinie plante le potager et le fontainier Nicolas, le Jongleur, aménage le réseau hydraulique. Les plus habiles sculpteurs de lépoque travaillent pour orner les bâtiments et les jardins: Jean baptiste Tuby, Antoine Coysevox,les frères Marsy, Jean-Baptiste Théodon, Michel Anguier, Pierre Puget et François Girardon. En 1683, au décès de Colbert, son fils aîné, le marquis de Seignelay hérite de tous ses biens. Devenu seigneur de Sceaux, en 1685 il offre au roi une fête magnifique dont les gazettes de lépoque rendront compte. En 1686, Jules Hardouin Mansart construit une nouvelle orangerie qui sera trouvée si belle quelle servira aussitôt de galerie, dautres espaces seront trouvés pour protéger les orangers.","architecture":"SCEAUX , Seignelay agrandit le domaine. Le Nôtre peut créer le grand canal, la terrasse qui le surplombe, et le long tapis vert qui prolonge les parterres à louest du château. En 1700, il devient la propriété du duc et de la duchesse du Maine. En 1720, la duchesse crée le jardin de la ménagerie. Pendant la deuxième moitié du XVIIIe siècle, le parc est parfaitement entretenu par ses différents propriétaires, le prince de Dombes, le comte dEu et leur cousin le duc de Penthièvre. A la Révolution, le domaine est confisqué comme bien national, puis vendu en 1798. Les statues sont dispersées, et les jardins sont ruinés puis le château est détruit vers 1803. Au XIXe siècle les nouveaux propriétaires, le duc et la duchesse de Trévise restaurent le domaine. Un château de style brique et pierre est reconstruit sous le Second Empire, à partir de 1856. En 1870, la guerre de saccage, une fois de plus, le parc et les bâtiments. En 1923, la princesse de Cystria Faucigny Lucinge, descendante des Trévise, vend le domaine au département de la Seine qui doit lotir une partie du parc pour financer les travaux de restauration, confiés à l'architecte Léon Azéma. Le parc est inauguré, en 1935, par Albert Lebrun, président de la République. Le musée de lIle de France, installé dans le château, ouvre ses portes en 1937. Depuis 1971, la propriété est gérée par le département qui mène une politique active de mise en valeur, est bien connu grace à son parc immense, qui fut dessiné par André Le Nôtre. Sa superficie est de 181 ha dont 120 ha sur la commune de Sceaux. Il appartenait à Colbert dont le Domaine fut détruit sous le Consulat. Il devint ensuite la résidence principale de la duchesse du Maine, bru du Roi Louis XIV. Le château de Sceaux actuel, qui est plus petit, a été reconstruit au XIXe siècle sous les ordres du second duc de Trévise, qui était le fils du maréchal Mortier, à l'époque du Second Empire. Il est de style néo - Louis XIII. Reconstruit au XIXe siècle, abrite, depuis, le musée de la région Ile-de-France.","habitants":"la famille Potier de Gesvre\"","divers":"","gps":"","images":["../image/image_92/92_Sceaux_1.jpg","../image/image_92/92_Sceaux_2.jpg"]},"Consult_chateau_formulaire5fb8":{"id":"Consult_chateau_formulaire5fb8","dept":"92","canton":"Châtillon","commune":"Fontenay aux roses","nom":"Ste_Barbe_des_Champs","type":"Château","periode":"XVIII","histoire":"STE-BARBE, fut construit dans la première moitié du XVIII
