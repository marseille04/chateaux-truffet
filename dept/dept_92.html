e siècle à l'emplacement de l'ancienne maison seigneuriale de Sainte-Geneviève. Cet édifice a été acheté en 1851 par le Collège Sainte-Barbe de Paris qui fit réaménager l'édifice en 1852, et ce, par l'architecte Henri Labrouste. L'aile donnant sur le jardin, et l'aile Ouest ont été construites, entre 1854 et 1862. Le Collège Sainte-Barbe quitta la commune en 1899. Le château est alors racheté par le séminaire Notre-Dame-des-Champs de Paris. Les bâtiments sont d'abord saisis, puis attribués à la commune de Fontenay-aux-Roses (en 1907) à la suite de la séparation de l'Église et de l'État de 1905. Par la suite, des logements sont aménagés en 1927 par l'architecte Georges Boiret.","architecture":"STE-BARBE, en 1937, une garderie est installée au rez-de-chaussée puis une école fut installée dans l'aile donnant sur le jardin. La chapelle a été démolie en 1974, puis en 1990, les anciens bâtiments de la cour furent démolis, à leur tour. Depuis 2004 à 2005, une médiathèque a été aménagée dans l'aile Est. Le jardin est accessible au public. Il fut la propriété des établissements Citroën, en 1955. Le château de Sainte-Barbe-des-Champs est actuellement la propriété de la commune. Il abrite dans ses murs le centre culturel jeunesse et loisirs ainsi que la bibliothèque municipale.","habitants":"le séminaire Notre-Dame-des-Champs de Pari\"","divers":"","gps":"","images":["../image/image_92/92_Ste_Barbe_des_Champs_1.jpg"]},"Consult_chateau_formulaireecd8":{"id":"Consult_chateau_formulaireecd8","dept":"92","canton":"Saint-Cloud","commune":"Ville d","nom":"Thierry","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article Thierry et Marches.                       Château THIERRY, première mention de la seigneurie des Davray au XIIe siècle. Village érigé en paroisse à la fin du XIVe siècle. De 1497 à 1747, les célestins de Paris détiennent le fief de Ville-d'Avray puis le vendent à Louis XV. En 1784, Louis XVI cède Ville-d'Avray au baron Thierry, intendant général du garde-meuble de la couronne. Ce dernier fait reconstruire l'église et bâtir son château. Le château, de plan rectangulaire régulier, fut construit en 1785, sur l'emplacement du manoir de la Brosse ; aujourd'hui seule la partie centrale subsiste, une partie du domaine est occupée par le CES; ce qu'il reste du château a été acquis par la commune en 1969 et transformé en musée ; le rendez-vous de chasse est devenu le conservatoire de musique.  Éléments protégés MH : les façades et les toitures du château et du pavillon dit ancienne gendarmerie des chasses; l'escalier principal du château avec sa rampe en fer forgé; la grille avec sa demi-lune: inscription par arrêté du 30 juillet 1973. abrite un musée et une école de musique.","architecture":"THIERRY Il date de 1776  est de style néo-classique. Le château est un manoir,  doit son nom à Marc-Antoine Thierry qui le fit construire en 1776 pour en faire sa résidence à Ville-d'Avray. Le château de Thierry a été racheté par Les Laboratoires \"Novartis\", en 1996. Leur siège social est à Bâle, en Suisse.                                                                                                                      MARCHES, à Marne la coquette à cinq K. M au nord.  Il datait du XVe siècle. Il a été détruit. Le château a appartenu au financier John Law et à la reine Marie-Antoinette. La partie ouest conserve le château jusqu'en 1937 ou un lotissement de la société générale foncière pour 200 lots de 520 m2 environ le \"domaine de la Marche\" est aménagé. La vente du château correspondant à une douzaine de lots s'avérant impossible, il est alors détruit au printemps 1938 pour créer l'actuelle Avenue de Chamillard du domaine de la Marche qui reste une résidence privée.","habitants":"Famille du baron Thierry                                Financier John Law\"","divers":"","gps":"","images":["../image/image_92/92_Thierry_1.jpg","../image/image_92/92_Thierry_2.jpg","../image/image_92/92_Thierry_3.jpg","../image/image_92/92_Thierry_4.jpg"]},"Consult_chateau_formulaire2b04":{"id":"Consult_chateau_formulaire2b04","dept":"92","canton":"Rueil-Malmaison","commune":"Rueil-Malmaison","nom":"Vert_Mont","type":"Château","periode":"XVIII","histoire":"VERT-MONT,  la construction du château de Vert-Mont ou domaine des Fossés date du XIX et XXe siècle. (1858-1910). Le château est de style néo-Louis XVI. Le château de Vert-Mont abrite, aujourd'hui, la Fondation Tuck, qui est liée à l'Institut Français du pétrole. Le domaine de Vert-Mont est accessible que sur RDV. La propriété connue primitivement sous le nom de « domaine des Fossés » est constituée entre 1855 et 1858 par Gustave d'Eichthal (1804-1886), helléniste et ethnologue, gendre du propriétaire de Bois-Préau, Édouard Rodrigues-Henriques, à partir de parcelles détachées du domaine de Bois-Préau et de terres environnantes, rachetées à des paysans. L'ensemble forme un domaine de 12 hectares à proximité immédiate des châteaux de Bois-Préau et de Malmaison. Il conserve de l'époque consulaire une terrasse due à l'architecte et paysagiste attitré de l'impératrice Joséphine, Louis-Martin Berthault.  Une première demeure est construite vers 1858, à un seul étage et toit en terrasse, qui est fortement endommagée par un incendie en 1870. Une première demeure est construite vers 1858, à un seul étage et toit en terrasse, qui est fortement endommagée par un incendie en 1870.","architecture":"Le VERT-MONT,  propriété rattachée à l'origine au domaine impérial, conservant de l'époque consulaire une terrasse due à l'architecte Louis Berthault. La propriété est achetée en 1898 par M. Edward Tuck, banquier américain, et sa femme, Julia Stell. A la place de la demeure du début du XIXe siècle, détruite par un incendie en 1870, ils font construire, vers 1900, un château de style néo-Louis XVI, avec un jardin d'hiver ajouté entre 1900 et 1910. La salle de bains de la demeure est entièrement décorée de motifs végétaux sur faïence de Venise. Le parc, de douze hectares à l'origine est dessiné par M. Tuck lui-même et comprend différents bâtiments bâtis dans un style régionaliste: écuries, orangerie et pavillon de gardien. Depuis 1992, l'ensemble, propriété de la fondation Tuck dépendant de l'Institut Français du pétrole, est en cours de restauration.  Le financier et philanthrope américain Edward Tuck (1842-1938) se fixe définitivement à Paris vers 1890 et achète en 1898 le domaine pour en faire sa résidence. C'est lui qui lui donne le nom actuel de Vert-Mont. Vers 1900, il fait construire le château actuel, de style néo-Louis XVI, sur la base de l'ancien bâtiment dont le rez-de-chaussée conserve la trace. Les deux étages supérieurs possèdent une ornementation à frontons triangulaires, différente de celle du rez-de-chaussée, soulignant les deux étapes de construction. Le corps de logis principal est agrémenté d'un jardin d'hiver, dit « salle de verdure », ajouté avant 1910. La salle de bains est entièrement décorée de motifs végétaux sur faïence de Venise. Le parc paysager est redessiné par Edward Tuck lui-même et comprend différents bâtiments élevés dans un style régionaliste : écuries, serres, orangerie et une usine électrique, actuellement transformée en pavillon de gardien.","habitants":"Gustave d'Eichthal\"","divers":"","gps":"","images":["../image/image_92/92_Vert_Mont_1.jpg","../image/image_92/92_Vert_Mont_2.jpg"]},"Consult_chateau_formulaire0189":{"id":"Consult_chateau_formulaire0189","dept":"92","canton":"Saint-Cloud","commune":"Marnes la coquette","nom":"Villeneuve_Létang","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article , Villeneuve l'Etang et Vaucresson. ViILLENEUVE L' ETANG,  en 1205, l'évêque Odon de Sully fonde le village, qui doit son nom à la nature de son sol. Une partie du territoire de la Marche lui est annexée en 1702 ainsi que le domaine de Villeneuve-l'Etang. En 1786, la terre de Jardies lui est réunie. Napoléon III fait agrandir et remanier le château de Villeneuve-l'Etang. Marnes devient la Coquette en 1859. Château construit à la fin du quatrième quart du XVIIIe siècle ; remanié et agrandi pour Napoléon III en 1852 et 1853 par Arveuf et Clerget, architecte du palais de Saint-Cloud, il comprenait une laiterie, des écuries, une ferme appelée pavillon des cent gardes et des pavillons en bordure du domaine .                                                                                                             VAUCRESSON . A deux K. M. au nord de Marnes la Coquette, La construction du château date de 1855, dans un domaine où se trouvait l'ancienne bâtisse des anciens Seigneurs de Vaucresson. Le château de Vaucresson est en briques et en pierres, proche de l'emplacement de l'ancien château du duc de Beauvillier.","architecture":"ViILLENEUVE L' ETANG,  il comprenait une laiterie, des écuries, une ferme appelée pavillon des cent gardes et des pavillons en bordure du domaine : pavillon de la grille, pavillon des gendarmes et pavillon de la grille du combat; le domaine fut transformé en camp militaire de 1872 à 1876 et le château fut alors détruit ; en 1882, le pavillon des gendarmes fut cédé pour y créer une école enfantine ; en 1884 la ferme fut donnée à Louis Pasteur qui y installa un chenil et un laboratoire de recherches; Pasteur y mourut en 1895;  le parc est partiellement intégré au domaine national de Saint-Cloud et en 1898 sa partie est du côté de la gare de Garches est lotie ; en 1897 le pavillon de la grille devient le bureau de poste de Marnes. L'institut Pasteur garde une partie du domaine, bâti des écuries en 1907 et 1911 et de nouveaux bâtiments dont le bâtiment Ramond en 1930 ; le pavillon des 100 gardes est transformé en musée Pasteur en 1986.abrite l'Institut Pasteur.","habitants":"Napoléon III \"","divers":"","gps":"","images":["../image/image_92/92_Villeneuve_L%c3%a9tang_1.jpg","../image/image_92/92_Villeneuve_L%c3%a9tang_2.jpg","../image/image_92/92_Villeneuve_L%c3%a9tang_3.jpg"]}};

function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','92 — Hauts-de-Seine'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
