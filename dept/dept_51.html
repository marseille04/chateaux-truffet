ille du chevalier Guérin Le Groing\"","divers":"Trois châteaux à Esternay grav-1-2             Courgivaux grav-3                                                   GPS : 48° 42' 47\" Nord, 3° 29' 20\" Est","gps":"48° 42' 47\" Nord, 3° 29' 20\" Est","images":["../../jctruffet.com/image/image_51/51_Esternay_1.jpg","../../jctruffet.com/image/image_51/51_Esternay_2.jpg","../../jctruffet.com/image/image_51/51_Esternay_3.jpg"]},"Consult_chateau_formulairea16b":{"id":"Consult_chateau_formulairea16b","dept":"51","canton":"Dormans","commune":"Etoges","nom":"Etoges","type":"Château","periode":"XIII-XVII","histoire":"ETOGES, doit son origine à louvrage bâti au XIIe ou XIIIe siècle par Eustache de Conflans et ses successeurs. En 1339, Marguerite de Conflans lapporta en mariage à Oger III dAnglure, chevalier d'honneur du duc dOrléans. En 1572, Antoinette dAnglure épousa Chrétien de Savigny, chambellan du duc dAlençon. A leur fils Charles de Savigny, dit dAnglure, succéda leur petit-fils Antoine, qui reçut Louis XIII à Etoges en 1632 et obtint en 1656 lérection de la terre en comté. Cest Antoine dAnglure qui dut faire reconstruire le château, lorsque son épouse, Louise-Angélique de Braux, hérita de son frère le marquisat dAnglure.  Marc-Antoine, marquis dAnglure et comte dEtoges, confia au rémois Jean Hélart,  Marc-Antoine dAnglure mourut jeune, et son fils Charles-Nicolas ne laissa pas de postérité. Mis en vente à la requête des créanciers, le comté dEtoges, par le fils du maréchal de Boufflers  lors de larrivée de la future reine Marie Leszczynska, en 1725, le duc de Boufflers fit  construire le fort élégant pont actuel, à quatre arches et balustres de pierre. A nouveau saisi en 1758, le domaine est acquis par Clément de Feuillet, conseiller au parlement de Paris, petit-fils de laccoucheur de Mme de Montespan et de la princesse palatine. En 1782 lui succède Claude-Christophe Lorimier de Chamilly, premier valet de chambre du Roi, qui suit Louis XVI au Temple et paye sa fidélité sur léchafaud.   Saisi et vendu en 1792, le château connaît sept propriétaires en dix ans, avant déchoir à François de Guéheneuc, beau-père du maréchal Lannes, sénateur et comte dEmpire. Fait rarissime, les appartements sont demeurés intacts; et lorsque Blücher occupe Etoges, du 13 au 17 février 1814, le portrait de Louis XVI en pied qui trône dans le grand salon, présent du roi à Lorimier de Chamilly, désigne le château à sa respectueuse sollicitude.  Après la mort de la baronne Kirgener de Planta, née Guéhéneuc, en 1874, tout est malheureusement dispersé. Rachetées par le comte Alfred Werlé.","architecture":"ETOGES, quant au château lui-même, il réclame durgentes réparations. A défaut du conseil général, un moment pressenti, se présente un acquéreur qui adapte bientôt lédifice à ses besoins: il en fait démolir les deux tiers, ne gardant quune partie du corps principal et la galerie basse lui servant de remise. Entreprise vers 1930 par M. Robert Neuville, la restauration a été poursuivie par sa petite-fille, Mme Fillette-Neuville. De lépoque médiévale, le château conserve plusieurs meurtrières à mire cruciforme, ménagées à la base des tours, ainsi que lentrée primitive, à lest, avec sa porte en tiers-point et la feuillure de son pont-levis. Créé au XVIIIe siècle, lescalier dhonneur développe une superbe rampe en fer forgé. Sur lun des paliers, la statue orante de Guy Piédefer provient des collections de Baye. Il conserva le dessin de la cour carrée, ajouta une quatrième tour dangle, celle qui subsiste, et fit reconstruire les bâtiments: corps de logis de onze travées, au nord; grande aile à lest, englobant lentrée médiévale; corps de galeries à louest, celle du rez-de-chaussée ouverte par de grandes arcades, celle de létage, fermée; corps de dépendances, ou simple mur, au sud. Sur les façades, faites de briques sur la cour, de moellons enduits sur les douves, la pierre calcaire formait des cordons, des chaînes harpées, et une ligne de consoles soulignant la base des combles dardoise, profilés à forte pente sur les corps de bâtiment, en cloche sur les tours.","habitants":"Famille de Conflans         Famille d'Antoine dAnglure\"","divers":"Château d'Etogrs                                              GPS : 48° 52' 54,12\" Nord, 3° 51' 5,04\" Est","gps":"48° 52' 54,12\" Nord, 3° 51' 5,04\" Est","images":["../../jctruffet.com/image/image_51/51_Etoges_1.jpg","../../jctruffet.com/image/image_51/51_Etoges_2.jpg","../../jctruffet.com/image/image_51/51_Etoges_3.jpg","../../jctruffet.com/image/image_51/51_Etoges_4.jpg","../../jctruffet.com/image/image_51/51_Etoges_5.jpg"]},"Consult_chateau_formulaire6351":{"id":"Consult_chateau_formulaire6351","dept":"51","canton":"Sermaize-les-Bains","commune":"Etrepy","nom":"Etrepy","type":"Château","periode":"XVI-XVIII","histoire":"ETREPY;  Johann de Nivenheim, originaire de Cologne, acquit la seigneurie en 1447. Varin de Nivenheim, baron dEtrepy, colonel de cavalerie, dut faire reconstruire le corps de logis et les pavillons dangle après 1610, date de son mariage avec Barbe dErnecourt. Remanié au milieu du XVIIIe siècle par son arrière-petit-neveu, François de Sorcy de Lorins, le château fut acquis en 1760 par Jules-François Cappellet, auditeur à la chambre des comptes de Paris. Il échut par alliance aux Davy de Chavigné, ancêtres de la marquise de la Vergne de Tressan qui dut le faire entièrement restaurer à la suite des dégâts causés par larmée du Kronprinz, le 6 septembre 1914.","architecture":"ETREPY doit son origine à un ouvrage fortifié dorigine gallo-romaine, élevé au confluent de lOrnain et de la Saulx, sur la frontière de lEmpire germanique. De lépoque médiévale, il a conservé un puissant terre-plein quadrangulaire, taluté et entouré de douves, et le gros-oeuvre dune tour octogonale. Sur la cour, quatre pilastres à chapiteaux corinthiens encadrent de grandes baies ornées de masques sculptés de très belle facture. Ravagé par des projectiles incendiaires, il nen restait que les façades, avec leurs fenêtres encadrées de chaînes appareillées à bossages et leurs lucarnes à volutes et frontons chargés de boules. À nouveau éprouvé au cours de la dernière guerre, le château a été remis en état par la comtesse Gonzague de Ripert dAlauzier et Mme Jean Vasseur. Au centre de chacune des deux façades, élevées seulement dun rez-de-chaussée, se détache une sorte davant-corps couronné dun large fronton, correspondant au grand salon, ancienne salle des gardes. A lintérieur, les stucs du grand salon ont pu être restitués en 1922 grâce aux moulages pris à la veille de la guerre, lors de la restauration du décor. Cest à loccasion du déblaiement que fut mise à jour la pierre gravée précisant la date de 1741 et lauteur des travaux, François de Sorcy de Lorins. Ce dernier fit également placer les sphinges de la cour et supprimer le pont-levis au profit dun pont fixe et dune grille accompagnée de lions et de pots-à-feu. Éléments protégés MH : les façades et les toitures du château (corps principal et pavillons), sa parcelle d'implantation, le portail d'entrée avec ses lions, les maçonneries des courtines, l'escalier ouest et les deux sphinges le gardant, les douves et le pont d'accès, ainsi que le décor intérieur du grand salon : inscription par arrêté du 28 novembre 2011.","habitants":"Famille de François Cappellet\"","divers":"Etrepy  GPS : 48° 46' 02\" Nord, 4° 48' 22\" Est","gps":"48° 46' 02\" Nord, 4° 48' 22\" Est","images":["../../jctruffet.com/image/image_51/51_Etrepy_1.jpg","../../jctruffet.com/image/image_51/51_Etrepy_2.jpg","../../jctruffet.com/image/image_51/51_Etrepy_3.jpg","../../jctruffet.com/image/image_51/51_Etrepy_4.jpg"]},"Consult_chateau_formulaire5884":{"id":"Consult_chateau_formulaire5884","dept":"51","canton":"Sézanne","commune":"Gault-Soigny","nom":"Gault_Soigny","type":"Château","periode":"XIII-XVIII","histoire":"Trois châteaux dans cet article Gault, Morsains et Recoude.                GAULT-SOIGNY, c'est un château d'époque dont la restauration a eu lieu en 1827. Il a une superficie de 450 m² habitables, avec une orientation Est-Ouest, triple réception de 75 m², sols en parquet (pointe de Hongrie) en très bon état, cave voûtée de 214 m², tennis, source, lavoir, maison de gardien de 130 m² + 65 m² de grenier aménageable (ancien petit château du XIIIe siècle, calme absolu, hors du temps, habitat très sain (toiture et gros oeuvre, cave) énorme potentiel de développement, prévoir des travaux de rafraîchissement.  Année de rénovation en 1997. Idéale résidence secondaire, hôtellerie de luxe, chambres d'hôtes, demeure de charme, mécénat culturel, siège social de société, maison de retraite, centre de rééducation fonctionnel, centre de formation, de séminaire, de méditation, centre sportif, négoce de vins, de champagne, spiritueux, centre informatique, etc...le prix de vente est exprimé frais d'agence inclus (FAI) à la charge du vendeur.                                                                                               MORSAINS, le propriétaire initial de cette terre fut Nicolas de Champagne, écuyer au Seigneur de Morsains, de Leuze. Il l'avait acheté, par un acte officiel, le 9/06/1556, de Jacques Verdelot, les droits sur les terres fiefs et maison seigneuriale de Morsains. La famille de Champagne posséda le château de Morsains jusqu'en 1751, date à laquelle il fut ensuite vendu, à Etienne Guérard, Officier au Régiment de Touraine.","architecture":"A cinq K.M. au sud ouest le château de MORSAINS est un château bâti à Morsains, date de l'époque Régence-Louis XV. Entouré de ses douves (du XVIe siècle) il possède une tour ronde qui date du XVIe siècle. Le château de Morsains appartenait autrefois aux seigneurs de Morsains et de Leuze. Il a été construit sur les ruines d'un ancien château fort, médiéval. Le nom de cette seigneurie servit à désigner les Champagne, qui s'établirent en Brie, et qui furent connus sous ce nom.                                                      RECOUDE,  Charles Sorel a été nommé « Seigneur de Soigny » dans le privilège des divers traités sur les droits et les prérogatives des Roys de France, publiés en 1666. Le château du Recoude a une belle histoire et est surtout un des derniers châteaux construits en France, avec un début de construction au XIXe siècle et une fin au tout début du XXe siècle. Le propriétaire, Louis François Lebevre, a commencé la construction avec, comme point de départ, la maison de son grand-père et a entouré le château du Recoude, dun parc de 12 Ha.  Cest dans ce milieu, que naquît, en 1863, Pauline, la petite fille de Louis, qui était distillateur. Elle se maria, en 1882, avec Paul, Victor Clacquesin. Ce dernier, pharmacien-herboriste, inventa une boisson à base de plantes qui connut un véritable succès, grâce aux compétences avant-gardistes de Pauline, en matière de promotion. La liqueur apéritive fut médaillée, en 1900, lors de lExposition Universelle.","habitants":"Morsains Famille de Etienne Guérard\"","divers":"Trois châteaux dans cet article Gault grav-1, Morsains grav-2  et Recoude grav 3-4-5.   GPS : 48° 48' 58\" Nord, 3° 35' 32\" Est                                                                  Morsains  GPS : 48° 47' 53\" Nord, 3° 32' 12\" Est                                                   Recoude GPS : 48° 48' 58\" Nord, 3° 35' 32\" Est","gps":"48° 48' 58\" Nord, 3° 35' 32\" Est","images":["../../jctruffet.com/image/image_51/51_Gault_Soigny_1.jpg","../../jctruffet.com/image/image_51/51_Gault_Soigny_2.jpg","../../jctruffet.com/image/image_51/51_Gault_Soigny_3.jpg","../../jctruffet.com/image/image_51/51_Gault_Soigny_4.jpg","../../jctruffet.com/image/image_51/51_Gault_Soigny_5.jpg"]},"Consult_chateau_formulaire5414":{"id":"Consult_chateau_formulaire5414","dept":"51","canton":"Sézanne","commune":"la Noue","nom":"Grange_La_Noue","type":"Château","periode":"XVIII","histoire":"La GRANGE, en 1754, Prudent de Villiers (1720-1798), conseiller du Roï au Châtelet de Paris, acquit la terre de La Noue et le fief des Granges. Il attendit, semble-t-il, les dernières années du règne de Louis XV pour faire construire le château avec cour, basse-cour, jardin, parc et dépendances sur les fondations du manoir des Granges. Au début de lEmpire, son neveu racheta le domaine quil offrit en 1820 à son fils à loccasion de son mariage. À Prudent-Adrien, officier des dragons de la garde royale, devenu en 1826 vicomte de Villiers, succéda Prudent-Fernand, conseiller général de la Marne, qui se consacra à la colonie éducative de Mettray. Vendu à Madame de Montegudet au lendemain de la guerre de 1914-1918 quil traversa sans dommage, le château a été acquis à la fin du XXe siècle par M. Thierry Flobert qui sattache à le mettre en valeur.","architecture":"La GRANGE, il s'agit d'un bâtiment très caractéristique des domaines campagnards de la deuxième moitié du XVIIIe siècle (plan très simple, construction en moellons et briques). Un parc \"à la française\" entourait l'édifice, dont subsiste aujourd'hui la grande allée venant du village et conduisant à une cour verte à l'avant des douves. Le reste du parc a été transformé, au début du XIXe siècle, en parc paysager. Toute la partie arrière a été convertie en sous-bois traversé d'allées sinueuses encore visibles à ce jour.  La salle voûtée est préservée de même que le puits. Les murs de clôture de l'ancien potager entourent un grand pré. La ferme demeure présente bien que transformée au XIXe siècle par la destruction de certains bâtiments et l'aménagement d'une aile en écurie, sellerie et remise à voitures. Une longue allée bordée de vieux arbres conduit aux vestiges de lancien château de La Noue, dont ne subsiste quune tour carrée renfermant un auditoire de justice et une prison.  Éléments protégés MH : les façades et les toitures ; l'ensemble du décor intérieur (lambris, cheminées, rampe en fer forgé) ; les douves avec pont d'accès : inscription par arrêté du 21 novembre 1989. L'ensemble du parc y compris la grande allée conduisant au château et la cour verte, la glacière, le potager avec ses murs, la ferme (façades et toitures des bâtiments), le puits, l'écurie y compris ses aménagements (intérieur de la sellerie, stalles des chevaux, mangeoires et râteliers), la mare et l'abreuvoir : inscription par arrêté du 25 mai 2010.","habitants":"Famille d'Adrien Prudent\"","divers":"Grange_La_Noue                                       GPS : 48° 45' 09\" Nord, 3° 36' 35\" Est","gps":"48° 45' 09\" Nord, 3° 36' 35\" Est","images":["../../jctruffet.com/image/image_51/51_Grange_La_Noue_1.jpg","../../jctruffet.com/image/image_51/51_Grange_La_Noue_2.jpg"]},"Consult_chateau_formulaire17a1":{"id":"Consult_chateau_formulaire17a1","dept":"51","canton":"Fismes","commune":"Gueux","nom":"Gueux","type":"Château","periode":"XV-XVII","histoire":"GUEUX, fondé au XIIe siècle par les archevêques de Reims, le premier château ou maison forte de Gueux, du nom dune colonie de goths venue, dit-on, du Danube, fut détruit au XIIIe siècle lorsque Jacques de Rumigny sopposa au pouvoir épiscopal. Relevé vers 1330 par Raoul de Vandières, il échut à Rose de Guibourg, puis à Jean Cauchon, lieutenant des habitants de Reims et frère de Pierre Cauchon, archevêque de Reims, qui joua un rôle déterminant dans la condamnation de Jeanne dArc. Passé à la famille de Miremont, il servit en 1484 de halte au jeune Charles VII, la veille de son sacre. Démantelé par les ligueurs rémois, soucieux de créer un glacis autour de leur ville, lédifice fut relevé sous Louis XIII. Il appartint sous Louis XV aux Dames de France et, à la veille de la Révolution, à la comtesse de Failly, née Oudan de Montarson. Acquéreur en 1856, Eugène Roederer fit construire une grande demeure qui disparut au cours des combats de 1918. Autour des anciens bâtiments, réparés après la guerre, M. Georges Charbonneaux créa le golf qui, agrandi et redessiné, devint celui de Reims. En 1944, le général Eisenhower vint souvent à Gueux où sétait installé le service radio de son armée, et reçut Churchill dans le château.","architecture":"GUEUX. Lors de sa confiscation, il comprenait deux bâtiments en fort mauvais état, entourés de fossés en eau: une aile de communs, que fit abattre ladjudicataire, et un corps d'habitation flanqué de tourelles, abritant la salle à manger, le salon, neuf chambres et la chapelle, le corps de logis doit son allure à ses tours dangle et surtout à son pavillon dentrée, flanqué de fortes tourelles cylindriques. Au-dessus de larcade charretière et des hautes rainures de lancien pont-levis, entre deux petites bretèches plus décoratives que redoutables, la lucarne porte la date de 1621.Abrite le House Club du Golf de Reims.","habitants":"Famille de Miremont\"","divers":"Gueux GPS : 49° 15' 03\" Nord 3° 54' 32\" Est","gps":"49° 15' 03\" Nord 3° 54' 32\" Est","images":["../../jctruffet.com/image/image_51/51_Gueux_1.jpg","../../jctruffet.com/image/image_51/51_Gueux_2.jpg","../../jctruffet.com/image/image_51/51_Gueux_3.jpg","../../jctruffet.com/image/image_51/51_Gueux_4.jpg","../../jctruffet.com/image/image_51/51_Gueux_5.jpg"]},"Consult_chateau_formulairee343":{"id":"Consult_chateau_formulairee343","dept":"51","canton":"Sainte-Menehould","commune":"Hans","nom":"Hans","type":"Château","periode":"XVII","histoire":"HANS, Pierre de Hans, qui fut évêque de Châlons, naquit ici au XIIIe siècle. À proximité du manoir, Mansio de Hans, où il avait fondé une chapelle en 1209, Henri de Grandpré fit élever en 1238 une nouvelle demeure (novus domus de mota de Hans) dont la motte féodale entourée de douves est toujours bien visible, en 1578  la fille de Nicolas de Bossut, comte de Dampierre et baron de Hans, épousa Jacques du Val, gentilhomme ordinaire de la chambre du Roi et maître dhôtel de Catherine de Médicis, qui devint gouverneur de Sainte-Menehould. Souvent remanié, cet ouvrage servit aux ligueurs en 1590. Pris par Germain Godet, lieutenant au bailliage de Sainte-Menehould, il fut démantelé sur ordre d'Henri IV, et remplacé par une demeure classique qui eut beaucoup à souffrir en 1792 du passage des armées. Cest de Hans, quartier général du roi de Prusse, Frédéric-Guillaume, que le duc de Brunswick donna à ses troupes lordre de retraite, le soir de Valmy.","architecture":"HANS , à demi démoli en 1819, le château comprend un corps de bâtiment reliant deux pavillons, lun coiffé dun toit à la française, lautre placé en saillie et couvert dun comble à la Mansart. Il renferme un bel escalier de pierre  antérieur au XVIIe siècle, mais doit à de multiples remaniements la simplicité de ses façades de craie taillée, animées de chaînes et dencadrements de briques. Leurs successeurs se distinguèrent dans les armes, et Anne-Elzéar paya de sa vie son dévouement à Louis XVI lors de laffaire de Varennes. Entre 1889 et 1893, à linitiative du général Maurice du Val de Dampierre, le maître-verrier Duhamel réalisa dans léglise paroissiale, devenue Notre-Dame du Soldat, treize vitraux exaltant loeuvre de restauration morale entreprise à la suite de la défaite de 1870. Cet intéressant édifice (XIIe-XVIe siècles), malheureusement bâti en pierre gélive, abrite également de nombreux ex-votos évoquant les théâtres dopérations militaires du siècle dernier.","habitants":"Famille de Jacques du Val\"","divers":"Hans;  GPS : 49° 06' 38\" Nord, 4° 44' 59\" Est","gps":"49° 06' 38\" Nord, 4° 44' 59\" Est","images":["../../jctruffet.com/image/image_51/51_Hans_1.jpg","../../jctruffet.com/image/image_51/51_Hans_2.jpg","../../jctruffet.com/image/image_51/51_Hans_3.jpg"]},"Consult_chateau_formulairec12f":{"id":"Consult_chateau_formulairec12f","dept":"51","canton":"Bourgogne-Fresne","commune":"Hermonville","nom":"Hermonville","type":"Château","periode":"XVIII","histoire":"MARZILLY, date du XVIIIe et XIXe siècle. Il fut longtemps laissé à l'abandon et en ruines. ses propriétaires étaient repartis sur Paris en l'oubliant, le château de Marzilly en cours de restauration. Johnatan Olden (Bienfaiteur anglais) fut le propriétaire du château de Marzilly à Hermonville,  se trouve sur la route entre Hermonville et Trigny, près de Reims. Il est entouré de vignes et de bois. La restauration du château de Marzilly est achevée. Hermonville était un bourg important au Moyen-age. La commune ne comptait pas moins de onze châteaux avant la première guerre mondiale il y avait le château d'Avesne Dumenil, actuelle maison de retraite, le château Druart rue de Visin, le château du Bois-de-l'Arbre ou d'Anglemont de Tassigny ayant disparu, le château Holden puis Fagot situé à Marzilly, actuellement disparu, le château Holden puis Dubois puis Peignot à Marzilly. Le château de Toussicourt ayant appartenu à Hugues Krafft, des ruines dans la forêt, le château de Saint-Rémi ou le château de Sommerville rue de Gaulle.","architecture":"TOUSSICOURT,   est un ancien château bâti à Hermonville,  sa construction date du XVIIIe siècle au milieu des Bois d'Hermonville. Cette magnifique demeure appartenait à la Famille Arnould, qui étaient de riches négociants en draps. Autrefois, le magnifique château  se dressait derrière des grilles imposantes, toujours en place, encore, aujourd'hui. Une large allée, plantée d' arbres menait, pour la famille Cliquot. Son fils Jean-Baptiste Cliquot, fut anobli par le roi Louis XIV, en 1765. Il eut un fils Jean-Nicola qui fut maire d'Hermonville. Le dernier propriétaire, à la veille de la première mondiale, fut Hugues Krafft, riche héritier et grand voyageur. Après 1918, c'est avec les dommages de guerre perçus du fait de la destruction de château, qu'Hugues Krafft fit entreprendre la reconstruction et la rénovation de la maison Le Vergeur. Il ne reste que des murs d'enceinte de l'ancien château de Toussicourt, peu à peu, engloutis sous la végétation vorace. Dans les bois d'Hermonville se cachent encore les derniers vestiges, qui fut une grande demeure construite au XVIIIe siècle pour la famille Clicquot, plus tard propriété d'Hugues Krafft, rasée après des bombardements destructeurs pendant la grande guerre.","habitants":"Marzilly ,Famille de Johnatan Olden Toussicourt, Famille Arnould et la famille Clicquot\"","divers":"Deux châteaux à Hermonville GPS : 49° 19' 29,6\" Nord 3° 54' 25,22\" Est                                                     Marzilly grav-1-2-3-4                                                             Toussicourt grav-5                                              GPS : 49° 20' 10\" Nord, 3° 54' 34\" Est                                               Bouvancourt. GPS : 49° 20' 20\" Nord, 3° 50' 07\" Est","gps":"49° 19' 29,6\" Nord 3° 54' 25,22\" Est","images":["../../jctruffet.com/image/image_51/51_Hermonville_1.jpg","../../jctruffet.com/image/image_51/51_Hermonville_2.jpg","../../jctruffet.com/image/image_51/51_Hermonville_3.jpg","../../jctruffet.com/image/image_51/51_Hermonville_4.jpg","../../jctruffet.com/image/image_51/51_Hermonville_5.jpg"]},"Consult_chateau_formulaire5b2f":{"id":"Consult_chateau_formulaire5b2f","dept":"51","canton":"Sermaize-les-Bains","commune":"Isle sur Marne","nom":"Isle_sur_Marne","type":"Château","periode":"XVII-XVIII","histoire":"ISLE sur MARNE, le château occupe lemplacement dun bâtiment qui appartint longtemps à la famille dAmance, seigneurs dIsle depuis le Moyen Age. Il est loeuvre de Jean-Robert Volland (1769), écuyer, préposé à la fourniture des sels, surtout connu par sa fille Sophie, amie de Diderot qui vint à plusieurs reprises séjourner à Isle.","architecture":"ISLE sur MARNE, il partage avec dimportantes dépendances latérales un terre-plein rectangulaire, entouré de douves en eau. Construit en 1732, date relevée sur le petit pont daccès, il présente dharmonieuses proportions, en dépit dune allure un peu ramassée due à sa profondeur et à la saillie à peine marquée de ses ailes, tant en élévation que dans la toiture. Sur la façade d'arrivée, au nord, chaînes, encadrements et corniches en pierre appareillée se détachent sur lenduit qui recouvre la maçonnerie de briques. Le décor se concentre autour de la travée centrale: pilastres classiques autour de la porte de bois sculpté et de la grande fenêtre de létage, armoiries bien restaurées au XIXe siècle, et petit fronton. Les guirlandes en stuc qui, à l'étage, ornent lallège des fenêtres, remontent aux remaniements opérés au siècle dernier, sensibles dans lordonnance de la façade sud ainsi que dans les lucarnes et les chéneaux. A lintérieur, le décor a été entièrement renouvelé, à lexception de la belle rampe descalier provenant, dit-on, de labbaye voisine de Montcetz. Les dépendances ne sont pas moins intéressantes. A lorigine, elles occupaient trois côtés dune vaste cour ouverte sur le château. Les granges sont de bons témoins de larchitecture rurale champenoise. Quant au pigeonnier octogonal, bâti en colombage et ceint de plusieurs colliers dardoise destinés à en interdire laccès au rats, il présente la particularité dêtre recouvert dessentes, écailles de chêne dites arcioles, sur les côtés exposés aux pluies poussées par les vents dominants.","habitants":"Famille dAmance\"","divers":"Isle-sur-Marne ; GPS : 48° 38' 28\" Nord, 4° 41' 30\" Est.","gps":"48° 38' 28\" Nord, 4° 41' 30\" Est.","images":["../../jctruffet.com/image/image_51/51_Isle_sur_Marne_1.jpg","../../jctruffet.com/image/image_51/51_Isle_sur_Marne_2.jpg","../../jctruffet.com/image/image_51/51_Isle_sur_Marne_3.jpg"]},"Consult_chateau_formulaire6b00":{"id":"Consult_chateau_formulaire6b00","dept":"51","canton":"Châlons-en-Champagne","commune":"Juvigny_Sarry","nom":"Juvigny","type":"Château","periode":"XVI","histoire":"JUVIGNY, de lancien château de Juvigny, enjeu de combats sous Charles VI, au cours de la guerre de cent ans, les douves constituent le vestige le plus visible. Passée au XVIe siècle aux Dorigny, la terre fut acquise en 1631 par Jean Clozier, commissaire ordinaire des guerres et conducteur de la cavalerie légère, qui fit élever une chapelle dans léglise et mourut en 1660. Également prénommé Jean, son second fils passa avec Nicolas Petit, architecte à Reims, un marché en date du 3 février 1702, \"pour démolir le château de Juvigny et le rebâtir, sous réserve de la fourniture des matériaux nécessaires. Mort le 22 juin de la même année, il laissa à son neveu Charles Roland, conseiller au parlement de Paris, le soin de mener à bien les travaux. Passé en 1780 à Pierre-Florimond de Fraguier, président à la chambre des Comptes de Paris, qui fit restaurer léglise par larchitecte Durand, le domaine fut acquis sous lEmpire par Alexandre Godart, qui devint maire de Châlons, il y fit preuve de talents durbaniste, et se retira à Juvigny où il sattacha à améliorer les techniques de culture. transformé en hôtel restaurant par la famille Caubère.","architecture":"JUVIGNY, le château de Juvigny, situé à l'extrémité du village, est une demeure paisible et dépourvue de toute ostentation. Sur ses façades de craie taillée se détachent discrètement les cordons rectilignes et les chaînes harpées en pierre dure qui soulignent les angles et les travées. Simple en profondeur, le corps de logis se développe entre deux ailes dont la saillie, sur la cour dhonneur, correspond aux escaliers latéraux, lun en bois, lautre doté dune rampe en fer forgé. A ce parti, hérité du XVIIe siècle, appartient également le dessin des portes latérales, ménagées sous une imposte et un tableau encadré de volutes. Deux corps de dépendances, rehaussés dun étage sous la Restauration, se développent de part et dautre de la cour, jusqu'aux hauts pavillons qui encadrent lentrée. Sur la droite, un porche conduit à la cour de ferme, située sur le terre-plein qui porte le château. Ses bâtiments brique et pierre se prolongent au-delà des douves.  Éléments protégés MH : les façades et les toitures du château (corps central et ailes en retour sur la cour) ; les douves et le pont donnant accès à la cour : inscription par arrêté du 26 août 1988. La laiterie située à l'extrémité de l'aile sud, l'ensemble du parc tel qu'il est délimité par le ruisseau de la Veuve et le ruisseau du château qui l'entourent, l'orangerie, l'espace du potager et son mur de clôture, inscription par arrêté du 31 mai 2010,  chambres d'hôtes.","habitants":"Pierre-Florimond de Fraguier\"","divers":"Juvigny;     GPS : 49° 00' 55\" Nord, 4° 15' 54\" Est","gps":"49° 00' 55\" Nord, 4° 15' 54\" Est","images":["../../jctruffet.com/image/image_51/51_Juvigny_1.jpg","../../jctruffet.com/image/image_51/51_Juvigny_2.jpg","../../jctruffet.com/image/image_51/51_Juvigny_3.jpg","../../jctruffet.com/image/image_51/51_Juvigny_4.jpg"]},"Consult_chateau_formulaire086c":{"id":"Consult_chateau_formulaire086c","dept":"51","canton":"Dormans","commune":"Lagery","nom":"Lagery","type":"Maison forte","periode":"XIII","histoire":"LAGERY, a été construit aux XIIIe, XVe et XVIe siècles. Odon de Lagery (1042-1099), né à Châtillon-sur-Marne, Pape connu sous le nom dUrbain II, à lorigine de la première croisade, était le fils du Seigneur de Lagery. Le château surplombe légèrement le village et forme un carré protégeant une cour centrale. L'aile ouest, la plus ancienne forme la porterie qui est constituée d'une porte cochère et d'une porte piétonne et va jusqu'à la tour du XIIIe. L'aile Nord qui fait face à l'église est la partie d'habitation qui est rattachée à l'aile, est par une tour intérieure du XVIe siècle. Il est devenu depuis une habitation et une ferme.\nÉléments protégés MH : la tour du XIIIe siècle ; la tour d'escalier ; le porche d'entrée ; les façades et les toitures de la maison à galerie : inscription par arrêté du 24 février 1992.","architecture":"LAGERY, date du XIIIe siècle avec des restaurations réalisées dans la deuxième moitié du XVe siècle, et dans la première moitié du XVIe siècle. Le château surplombe légèrement le village et forme un carré protégeant une cour centrale. L'aile ouest, la plus ancienne forme la porterie qui est constituée d'une porte cochère et d'une porte piétonne et va jusqu'à la tour du XIIIe siècle. L'aile nord qui fait face à l'église est la partie d'habitation qui est rattachée à l'aile est par une tour intérieure du XVIe siècle. La coutume veut que le château soit relié avec l'église par un souterrain, une porte particulière donne dans le cimetière et l'église a une chapelle seigneuriale. L'Église Saint-Martin de Lagery a une dalle funéraire des anciens seigneurs,  et des blasons peints.","habitants":"Seigneur de Lagery\"","divers":"Lagery; GPS : 49° 12' 27\" Nord, 3° 44' 41\" Est","gps":"49° 12' 27\" Nord, 3° 44' 41\" Est","images":["../../jctruffet.com/image/image_51/51_Lagery_1.jpg","../../jctruffet.com/image/image_51/51_Lagery_2.jpg","../../jctruffet.com/image/image_51/51_Lagery_3.jpg"]},"Consult_chateau_formulairefbbb":{"id":"Consult_chateau_formulairefbbb","dept":"51","canton":"Epernay","commune":"Louvois","nom":"Louvois","type":"château","periode":"XVII","histoire":"LOUVOIS, seigneurie acquise en 1576 dAntoine de Silly, la terre de Louvois fut, en 1625, érigée en marquisat en faveur de Claude Pinart de Comblizy, gouverneur de château-Thierry. En 1656, Eustache de Conflans la vendit à Michel Le Tellier. Nommé par Mazarin secrétaire dÉtat à la Guerre et devenu lun des plus proches collaborateurs du jeune Louis XIV, Michel Le Tellier fut en 1677 chancelier de France. En 1663, il fit don du marquisat de Louvois à son fils François-Michel, à loccasion de son mariage avec Anne de Souvré. Très tôt associé aux responsabilités de son père, au département de la Guerre, François-Michel, le célèbre Louvois, fut lun des grands ministres du règne, décédé en 1691. Le château comprenait encore en 1656 quatre tours dangle, fossés et ponts-levis. Reconstruit à partir de 1665, mais agrandi et embelli par la suite, notamment par Michel-François Le Tellier, secrétaire d'Etat, il devint lune des plus somptueuses demeures de Champagne, accompagnée de jardins dont plusieurs gravures rappellent la qualité et lampleur. En 1776, Louis Le Tellier vendit le marquisat,  à Mesdames Adélaïde et Sophie, filles du feu roi Louis XV. Mesdames de France partagèrent leur existence entre le château de Bellevue, à Meudon ancienne demeure de Mme de Pompadour et celui de Louvois dont Louis XVI fit en 1777 le siège d'un duché-pairie. Elles se rendaient souvent à La Bove, chez Mme de Narbonne-Lara par Laon et le Chemin des Dames rendu tristement célèbre par les combats de 1917. Madame Sophie mourut en 1782, Madame Adélaïde partit en 1790 pour lémigration . En 1950  le château est acquis par monsieur Bernard de Nonancourt.","architecture":"LOUVOIS. , Il est de style classique et de type Pavillon. Son premier propriétaire était Gaucher de Chatillon. Le château est inscrit aux M.H. depuis 1991. Depuis 1989, le château de Louvois, avec ses 35 hectares de jardins, est la propriété de la maison de Champagne Laurent-Perrier. Une petite partie du jardin historique a été reconstitué, à partir des plans d'origine. Saisi comme bien national, vendu et privé de son mobilier, le château, de 160 pièces, fut démoli sous lEmpire et remplacé par une demeure beaucoup plus modeste, élevée dans un style très classique à partir de matériaux récupérés. Grille et perspectives ont en partie survécu, mais rien ne rappelle la somptuosité des jardins. \nÉléments protégés MH : le château de Louvois : l'ensemble du parc du château avec ses aménagements, y compris les façades et les toitures du château, ses douves, la grille d'entrée, l'orangerie, le mur d'enceinte, à l'exception des bâtiments construits au XIXe siècle : inscription par arrêté du 2 juillet 2015.   est la propriété de la maison de champagne Laurent-Perrier.                                                                                                                                     A un K.M.au sud le  château de TAUXIERES-MUTRY se situe au bout de la rue, fut construit au XIXe siècle. Il accueille aujourd'hui une Maison de Champagne.","habitants":"Famille de  Michel Le Tellier\"","divers":"Louvois  grav 1-2-3   GPS : 49° 06' 14,58\" Nord, 4° 07' 04,48\" Est                                                    Tauxières  Grav  4                                        GPS : 49° 05' 31\" Nord, 4° 06' 16\" Est","gps":"49° 06' 14,58\" Nord, 4° 07' 04,48\" Est","images":["../../jctruffet.com/image/image_51/51_Louvois_1.jpg","../../jctruffet.com/image/image_51/51_Louvois_2.jpg","../../jctruffet.com/image/image_51/51_Louvois_3.jpg","../../jctruffet.com/image/image_51/51_Louvois_4.jpg"]},"Consult_chateau_formulaire9dad":{"id":"Consult_chateau_formulaire9dad","dept":"51","canton":"Châlons-en-Champagne","commune":"Mairy sur marne","nom":"Mairy","type":"Château","periode":"XVI-XVII","histoire":"MAIRY En 1698, au retour des eaux de Sermaize, Jacques II Stuart, ancien roi dAngleterre, séjourna plusieurs mois à Mairy avec son épouse, Marie-Béatrice dEste. En 1710, Michel Jourdain, seigneur de Chanteraine, procureur du Roi au bailliage de Châlons, mourut après avoir légué sa terre de Mairy à Pierre-Louis Loisson, seigneur de Guinaumont, grand-prévôt de la maréchaussée de Champagne (1683-1731), fils et petit-fils de présidents à ce même bailliage.  En 1710 le domaine passe aux Loisson, Claude Loisson de Guinaumont, maître en la chambre des comptes de Paris en 1752, est lancêtre du comte de Guinaumont qui, après la Révolution, sattacha au développement des techniques agricoles et de linstruction publique, et de l'actuel propriétaire.    Au cours de la première guerre mondiale, le château abrita plusieurs états-majors: en septembre 1915, le général Joffre y tint la réunion préparatoire à l'offensive de Champagne; au printemps de 1918, le général Pétain y réunit à son tour ses officiers.","architecture":"MAIRY, les trois tours rondes qui marquent les angles du vaste terre-plein rectangulaire précédant le château, doivent correspondre à lenceinte extérieure dun ouvrage fortifié, relevé au XVe siècle. Construit dans les années 1680, le corps de logis développe de sobres façades en craie appareillée, sous la corniche à modillons habituelle aux demeures de la région de Châlons. Les ailes en retour sur la cour, moins élevées et peut-être un peu plus récentes, ont perdu quelques travées au XIXe siècle, lors dune restauration générale qui saccompagna de la réfection des lucarnes et du balcon central. A lintérieur, un parti de sobriété analogue sexprime dans les boiseries des salons, desservis par la galerie qui, au revers de la façade sur cour, occupe toute la longueur du corps principal. Dessiné dans un coude de la Marne, mais coupé en 1855 par la voie ferrée Paris-Strasbourg, le parc conserve plusieurs allées tracées en étoile.        Sa construction date du XVe au XVIIe siècle.   Éléments protégés MH : les façades et les toitures du château, et des deux pavillons d'entrée ; la salle à manger et le grand salon avec leur décor : inscription par arrêté du 29 novembre 1977.       chambres d'hôtes","habitants":"Famille de Michel Jourdain\"","divers":"Mairy GPS : 48° 53' 00\" Nord, 4° 25' 07\" Est","gps":"48° 53' 00\" Nord, 4° 25' 07\" Est","images":["../../jctruffet.com/image/image_51/51_Mairy_1.jpg","../../jctruffet.com/image/image_51/51_Mairy_2.jpg"]},"Consult_chateau_formulairea499-2":{"id":"Consult_chateau_formulairea499-2","dept":"51","canton":"Dormans","commune":"Mareuil en Brie","nom":"Mareuil_Coupigny","type":"Château","periode":"XVIII-XIX","histoire":"Deux châteaux dans cet article  Mareuil et coupigny.                            MAREUIL  en brie suite  De 1802 à 1836, le nouveau propriétaire de Mareuil-en-Brie est un Champenois, Joseph-Alexandre-Jacques Durant. Haut fonctionnaire et diplomate, nommé chef de la division politique au ministère des Relations extérieures de 1796 à 1805, il sera ambassadeur à Naples jusqu'en 1814, puis dans différents pays européens et américains. Baron de l'Empire en 1809, élu député de la Marne à la Chambre des Cents Jours en 1815, pair de France en 1832, il est mis à la retraite en 1834 et meurt en 1855. Durant réalise d'importantes acquisitions en terres et en bois autour de Mareuil et de Montmort. En 1830, il fait démolir l'ancien château du XVIIe siècle pour reconstruire l'actuelle grande demeure, au goût du XIXe siècle. Quelques années plus tard, en 1836, il vend le domaine au banquier parisien Charles Salverte. Celui-ci viendra s'installer à Mareuil, dont il sera maire à partir de 1840. En 1875, à la requête de la famille Salverte, le domaine de Mareuil est vendu par licitation et adjugé à un fondé de pouvoir de la banque Salverte, Ernest Orville. Mort en 1911, celui-ci laisse la propriété à sa fille cadette Renée, épouse du comte Paul de Vibraye (mort en 1953). Leur fils aîné Raoul, né en 1909, connaît des difficultés financières et doit finalement mettre le domaine en vente en 1973.","architecture":"A deux K.M. à l'est à Orbais l'Abbaye le château de COUPIGNY  Il date du XVII et XIXe siècle. Le château de Coupigny est privé, fermé au Public mais il reste visible, uniquement de l'extérieur,  le corps principal de plan rectangulaire avec un pavillon central et deux pavillons latéraux, l'ensemble ne présente pas de symétrie. La partie couverte de longs pans brisés semble être ajoutée à une construction plus ancienne, celle-ci possédant la symétrie tant dans l'élévation que dans le plan au sol, château très restauré. Bâtiment composé de deux étages carrés, trois étages carrés et d'un étage de comble, élévation ordonnancée, le gros-oeuvre: moellon sans chaîne en pierre de taille, enduit et brique","habitants":"famille Salverte\"","divers":"château de Coupigny  GPS : 48° 57' 03\" Nord, 3° 41' 58\" Est","gps":"48° 57' 03\" Nord, 3° 41' 58\" Est","images":["../../jctruffet.com/image/image_51/51_Mareuil_Coupigny_1.jpg","../../jctruffet.com/image/image_51/51_Mareuil_Coupigny_2.jpg","../../jctruffet.com/image/image_51/51_Mareuil_Coupigny_3.jpg","../../jctruffet.com/image/image_51/51_Mareuil_Coupigny_4.jpg"]},"Consult_chateau_formulaireeb31":{"id":"Consult_chateau_formulaireeb31","dept":"51","canton":"Dormans","commune":"Mareuil en Brie","nom":"Mareuil_en_Brie","type":"Château","periode":"XVIII-XIX","histoire":"MAREUIL EN BRIE, par mariage dans la famille de Conflans, qui détient également les seigneuries d'Etoges et de Congy. Mareuil revient à Gaucher de Conflans, marié à la fille du seigneur de Baye, Marie de Châteauvillain. Mort sans postérité, Gaucher de Conflans transmet les seigneuries de Baye et de Mareuil à sa sur Jeanne de Conflans, dont le fils, Eustache de Vaudenay, fera entrer les deux terres dans les possessions de la maison de Béthune par son mariage avec Marie de Béthune (morte en 1400). La seigneurie de Mareuil va demeurer aux mains des Béthune plus longtemps encore que la baronnie de Baye, puisqu'après la mort d'Alpin de Béthune, en 1544, la baronnie de Baye est vendue au duc de Nevers François de Clèves, tandis que Mareuil-en-Brie passe à une autre branche de la famille. Ce n'est qu'en 1607 que la seigneurie est vendue par la veuve de Florestan de Béthune à Claude de Nargonne, lui-même allié aux Béthune par sa femme Judith. Famille de petite noblesse champenoise, implantée dans la région de Bergères-sous-Montmirail, Boissy-le-Repos et Corfélix, les Nargonne détiennent Mareuil et le Baizil pendant le XVIIe siècle. Les terres reviennent à Charles, fils de Claude (mort en 1645), puis à son fils Jean-Charles (mort en 1659), qui les transmet à sa fille Françoise de Nargonne, décédée sans postérité en 1662. Mareuil revient alors à sa tante, Françoise de Nargonne, épouse de Charles de Valois, fils légitimé du roi Charles IX et de Marie Touchet. La duchesse d'Angoulême, accablée de dettes, doit vendre la seigneurie de Mareuil, en 1708, à Jacques Rémond, seigneur de La Renouillère, avant d'aller vivre au château de Montmort dont le seigneur, Pierre Rémond (par ailleurs apparenté au nouveau propriétaire de Mareuil), avait épousé sa petite nièce. Françoise de Nargonne meurt en 1713 et est enterrée dans l'église de Montmort.","architecture":"MAREUIL EN BRYE, Au cours des XVIIIe et XIXe siècles, le hasard veut que les propriétaires se succèdent environ tous les trente ans. Après Jacques Rémond (1708-1740), le seigneur de Mareuil est François de Monestay, marquis de Chazeron, dont les documents énumèrent les titres et charges: \"maréchal des camps et armées du roi, lieutenant des gardes du corps de sa majesté, gouverneur des ville et château de Brest et des îles d'Ouessant \". En 1771, ses héritiers vendent la terre de Mareuil au comte de Coigny, Augustin-Gabriel Franquetot, qui l'achète au nom de sa femme, Anne-Josèphe-Michelle de Roissy. La famille Franquetot, d'origine normande, propriétaire de la terre de Coigny (Manche) depuis le XVIIe siècle, est connue pour avoir donné plusieurs illustres militaires au cours du XVIIIe siècle. Malgré les dettes dont il était couvert, le comte de Coigny fait aménager aux abords du château, construit sous les Nargonne au XVIIe siècle, un beau parc à l'anglaise. La comtesse de Coigny meurt en 1775, laissant une fille à son mari Aimée de Coigny, née en 1769, épouse du duc de Fleury. Après un séjour à Mareuil dans les années 1792-1793, elle est arrêtée et emprisonnée à la prison Saint-Lazarre, où le poète André Chenier la rencontra et la rendit célèbre sous le nom de la \"jeune captive \". Divorcée du duc de Fleury en 1793, elle épouse le comte de Montrond en 1795, dont elle divorcera également dès 1802. La même année, ses dettes augmentant, elle est contrainte par ses créanciers de vendre la terre de Mareuil et meurt presque ruinée en 1820.                                                          A deux K.M. à l'est à Orbais l'Abbaye le château de COUPIGNY  Il date du XVII et XIXe siècle. Le château de Coupigny est privé, fermé au Public mais il reste visible, uniquement de l'extérieur.","habitants":"Famille de Conflans,\"","divers":"Mareuil  GPS : 48° 57' 32\" Nord, 3° 44' 40\" Est","gps":"48° 57' 32\" Nord, 3° 44' 40\" Est","images":["../../jctruffet.com/image/image_51/51_Mareuil_en_Brie_1.jpg","../../jctruffet.com/image/image_51/51_Mareuil_en_Brie_2.jpg"]},"Consult_chateau_formulaireb0e5":{"id":"Consult_chateau_formulaireb0e5","dept":"51","canton":"Epernay","commune":"Mareuil sur Ay","nom":"Mareuil_sur_Ay","type":"Château","periode":"XVIII","histoire":"MAREUIL sur AY, lhistoire du château débute au milieu du XVIIIe siècle lorsque Thomas de Demangeville décide doffrir à sa jeune épouse une demeure digne delle. La construction sera achevée en 1765, dans le style Louis XV. En souvenir du château de Pange en Moselle quil affectionnait enfant, où il passa toute son enfance, Thomas de Demangeville décidera dy ajouter des parements de briques rouges. En 1774 il meurt et son épouse le suivra, deux mois plus tard. Leurs trois enfants continuent de vivre au château, où ils reçoivent de nombreux amis, dont le poète André Chénier. A la fin de 1788, des dissensions familiales amènent à vendre le domaine, qui passe aux mains du duc dOrléans, le fameux Philippe Egalité, mais il monte sur léchafaud le 6 novembre 1793. C'est les fils du maréchal Lannes, duc de Montebello, qui reprennent le domaine, en 1830, une belle superficie de terres cultivées, dont une centaine dhectares de vignes. deux dentre eux créent la marque Alfred de Montebello qui ne cessera de prospérer malgré les guerres et les crises, jusquà celle de 1929 qui lui sera fatale: elle est rachetée à la barre du tribunal par René Chayoux, par un Rémois entreprenant. René Chayoux meurt sans héritier et il fait de son bras droit son héritier: Jean-Michel Ducellier transmettra le flambeau à son fils Alain, qui vendra peu après à un homme daffaires suisse. Celui-ci se séparera de Ayala au profit de Bollinger mais conservera le château et le rénovera.","architecture":"MAREUIL sur AY, château construit par l'architecte Chevotet, et terminé par Chaussard. Les deux jardins potagers clos de murs ont été construits vers la fin du XVIIIe siècle. le parc est aménagé avec des souterrains et sa glacière, la grille et la clôture, des communs et deux pavillons dentrée vers le haut du château et possède une tour, le corps de logis date du XVIIIe siècle. De vastes communs de plan en U complètent la propriété. Plusieurs modifications sont apportées à la fin du XIXe siècle : le jardin est redessiné vers 1896 par le paysagiste Edouard Redon ; l'aile nord de communs est modifiée. Deux pavillons sont construits à l'entrée de la cour. Le pigeonnier est entièrement transformé en lieu d'accueil. L'édifice utilise la brique dans les chaînages et les encadrements de baies. A l'intérieur, le vestibule d'entrée donne accès à un escalier avec une rampe en fer forgé du XVIIIe siècle. Les boiseries de hauteur et les cheminées de marbre sont conservées dans l'ensemble des pièces. La bibliothèque est aménagée au XIXe siècle, ainsi que le salon polygonal. Le parc comprend une grille en fer forgé ainsi qu'une glacière du XVIIIe siècle. L'orangerie en brique ne paraît dater que de la deuxième moitié du XIXe siècle.\nÉléments protégés MH : le corps de logis XVIIIe siècle en totalité, le parc avec ses aménagements y compris les souterrains et la glacière, la clôture avec sa grille, les façades et les toitures des deux grands bâtiments des communs et des deux pavillons d'entrée vers la cour du château, la tour d'accueil des clients en totalité, ainsi que les deux potagers avec leur enceinte et leur orangerie: inscription par arrêté du 5 novembre 2003.","habitants":"le poète André Chénier.\"","divers":"Mareuil-sur-Ay                                                   GPS : 49° 02' 56\" Nord, 4° 01' 55\" Est","gps":"49° 02' 56\" Nord, 4° 01' 55\" Est","images":["../../jctruffet.com/image/image_51/51_Mareuil_sur_Ay_1.jpg","../../jctruffet.com/image/image_51/51_Mareuil_sur_Ay_2.jpg"]},"Consult_chateau_formulairea813":{"id":"Consult_chateau_formulairea813","dept":"51","canton":"Epernay","commune":"Pierry","nom":"Marquetterie","type":"gentilhommière","periode":"XVIII","histoire":"MARQUETTERIE à louest du village de Pierry au sud dEpernay. Cette belle gentilhommière du XVIIIe siècle fut de 1760 jusquà la Révolution Française propriété dun illustre écrivain, Jacques Cazotte, Maître de la littérature fantastique du XVIIIe siècle. A loccasion des vendanges, Jacques Cazotte réunissait à La Marquetterie quelques-uns des plus célèbres écrivains de lépoque dont Voltaire et Chénier. Pur joyau du style Louis XV il fut sauvegardé par Pierre-Charles Taittinger.","architecture":"MARQUETTERIE, cest aussi le coup de foudre du Jeune officier de cavalerie Pierre-Charles Taittinger qui en tombe amoureux lorsquil rejoint le Maréchal Joffre qui y avait établit son état-major pendant la guerre de 1914. Pierre-Charles Taittinger en a fait vingt ans plus tard (1934) un symbole de la famille Taittinger et de sa Maison de Champagne qui assure toujours la sauvegarde de cette brillante parcelle du patrimoine de la Champagne.  domaine viticole.","habitants":"Famille de Jacques Cazotte,\"","divers":"Marquetterie                                                  GPS : 49° 01' 16\" Nord, 3° 56' 02\" Est","gps":"49° 01' 16\" Nord, 3° 56' 02\" Est","images":["../../jctruffet.com/image/image_51/51_Marquetterie_1.jpg","../../jctruffet.com/image/image_51/51_Marquetterie_2.jpg"]},"Consult_chateau_formulaire9953":{"id":"Consult_chateau_formulaire9953","dept":"51","canton":"Sézanne","commune":"Mondement-Montgivroux","nom":"Mondement_Montgivroux","type":"Château","periode":"XII-XVII-XIX","histoire":"MONDEMENT-MONTGIVROUX , dépendance de la puissante seigneurie de Broyes, le château de Mondement doit son plan à louvrage fortifié qui occupa le site dès le début du XIIe siècle:  François Lefèvre de Guibermesnil mourut en 1698, et labbé de Blair, son petit-fils, en 1765. Agrandi dailes au début du XIXe siècle . Le château appartient à la famille Louis-Jacques Desroches. Le 6 septembre 1914, le général Humbert installa le P.C. de sa division marocaine dans le château de Mondement, rustique et sans grand style, comme lécrira Weygand dans ses mémoires, situé sur la crête boisée (323 mètres) qui domine les marais de Saint-Gond. Il appartenait à la IXe armée, celle du général Foch qui, de son Q.G. de Pleurs, venait de lancer la contre-offensive. Au terme dune intense préparation dartillerie, dans la nuit du 8 au 9 septembre, la garde prussienne lança plusieurs assauts, parvint à semparer de la position mais, dès le 10, dut labandonner au colonel Lestocquoi. Trois ans plus tard, les Beaux-Arts se voyaient confier lorganisation dun concours pour lérection dun monument commémorant la victoire de la Marne. Le projet retenu, dû à larchitecte Paul Bigot et au sculpteur Henri Bouchard, consista en une borne, symbole de larrêt de lavance ennemie, haute de 33 mètres, portant une grande victoire ailée et l'effigie des généraux. La construction du monument, structure métallique recouverte de béton teinté par de la poudre de grès des Vosges, nécessita d'importantes fondations; la sculpture nintervint quen 1938 et linauguration en 1951.","architecture":"MONDEMENT, dans cette modeste gentilhommière champenoise, façades enduites et chaînes de briques soulignant les travées,  enceinte rectangulaire cantonnée de tours rondes, et donjon dhabitation barlong auquel lactuel corps de logis doit lépaisseur de ses murs,le logis doit son allure un peu lourde aux restaurations qui suivirent 1918: les lucarnes disparurent alors au profit dun second étage qui nexistait que sur les tourelles latérales                                                                                                              La Bataille de Mondement en septembre 1914 fut un épisode important de la Première Bataille de la Marne. Le 19e Bataillon de Chasseurs à Pied s'est installé le 8 septembre, au soir, au château de Montgivroux et le 9 septembre au château de Mondement.","habitants":"Famille de Louis-Jacques Desroches. \"","divers":"Mondement_Montgivroux                         GPS : 48° 47' 17\" Nord, 3° 46' 43\" Est","gps":"48° 47' 17\" Nord, 3° 46' 43\" Est","images":["../../jctruffet.com/image/image_51/51_Mondement_Montgivroux_1.jpg","../../jctruffet.com/image/image_51/51_Mondement_Montgivroux_2.jpg","../../jctruffet.com/image/image_51/51_Mondement_Montgivroux_3.jpg","../../jctruffet.com/image/image_51/51_Mondement_Montgivroux_4.jpg"]},"Consult_chateau_formulairec545":{"id":"Consult_chateau_formulairec545","dept":"51","canton":"Sézanne","commune":"Montmirail","nom":"Montmirail_Marne","type":"Château","periode":"XVI-XVI","histoire":"MONTMIRAIL  Possession de Jean de Silly au milieu du XVIe siècle, la seigneurie échut à Philippe-Emmanuel de Gondi, général des galères de France. François-Paul de Gondi, futur cardinal de Retz, y naquit en 1613, et saint Vincent de Paul, son précepteur. Louis II de La Trémoïlle, duc de Noirmoutier, lachète en 1655. Il fait abattre divers bâtiments, et entreprend la construction dun grand corps de logis, flanqué dailes saillantes couvertes de combles indépendants et précédé dune vaste cour dhonneur encadrée de pavillons et de dépendances. Sur les sobres façades en moellons enduits, se détachent les briques des encadrements et des corniches, et la pierre appareillée qui forme les chaînes dangle. François-Michel Le Tellier, marquis de Louvois, fils du chancelier Le Tellier, acquiert le domaine en 1678 et lagrandit de plusieurs terres voisines. Il fait achever le château dont il demande à André Le Nôtre, dessin des parterres et des bassins. Il fait ajouter au sud un pavillon en retour déquerre abritant un grand escalier de pierre, couvert dun toit à la Mansart et précédé dun perron monumental descendant vers les parterres. Du 13 mai au 5 juin 1687, Louis XIV séjourne chez son fils, le marquis de Courtanvaux, avant de rejoindre larmée qui assiège Luxembourg. Louis-César Le Tellier, duc dEstrées et maréchal de France en 1757, fait prolonger le pavillon sud dune aile abritant un élégant salon Louis XV, couverte dun haut comble à la française analogue à ceux de la façade principale. Héritière du maréchal décédé en 1771, Augustine Le Tellier épouse le vicomte Ambroise de La Rochefoucauld, futur duc de Doudeauville et ministre de Charles X, dont descend lactuel propriétaire. En 1791, plusieurs habitants de Montmirail reconnurent la famille royale dans la berline qui lemmenait vers Varennes.","architecture":"MONTMIRAIL, le 11 février 1814, Napoléon remporta au nord de la ville une brillante victoire contre les Russes,  Marmont logea dans le château avant larrivée des troupes alliées qui en saccagèrent les appartements. Un siècle plus tard, le 5 septembre 1914, le général Von Bülow établit son état major dans le château, mais ny demeura que quelques jours. Le 18 juin 1940, larmée allemande revint occuper la Champagne, et Ernest Jünger écrivit dans son Journal de Guerre: \"je m'installai dans ladmirable château de Montmirail, qui a malheureusement souffert lui aussi. Montmirail est le château de La Rochefoucauld  un acte de gratitude spirituelle que de sauver tout ce qui pouvait être sauvé. Je fis donc mettre le château sous garde, et commençai à en faire déblayer lintérieur. Le Mont Mirail a été jadis un récif dans cette mer de craie. et que, sans doute, il avait abrité plusieurs fois déjà des officiers prussiens: en 1814, en 1870, en 1914, il en accueillait maintenant, une fois de plus\". Depuis 2002, le château de Montmirail appartient à Joseph Puzo, président directeur général d'Axon Cable.                                                                                               L'ECHELLE le FRANC , corps de logis construit au milieu du XVIe siècle, de plan rectangulaire, avec une tourelle d'escalier hors oeuvre. La famille des Marins ne réside plus dans la demeure à partir du début du XVIIe siècle, et les bâtiments sont loués à des fermiers. Le colombier, les autres granges et l'ancien manège sont édifiés entre le XVIIe et le XIXe siècle, en matériaux traditionnels de la Brie champenoise. Éléments protégés MH : le corps de logis (façades et toitures), le colombier, la grange nord y compris l'ancien manège : inscription par arrêté du 5 novembre 2003.                                                                                                                                     Beaumont château  siècle, nous attendons votre concours                                                                                          Courbeteaux château XIIIe siècle, propriété privée ruines.","habitants":"Famille de François-Michel Le Tellier\"","divers":"Montmirail                                                GPS : 48° 52' 09\" Nord, 3° 32' 16\" Est                                                                   Echelle grav-4 GPS : 48° 53' 21\" Nord, 3° 33' 58\" Est","gps":"48° 52' 09\" Nord, 3° 32' 16\" Est","images":["../../jctruffet.com/image/image_51/51_Montmirail_Marne_1.jpg","../../jctruffet.com/image/image_51/51_Montmirail_Marne_2.jpg","../../jctruffet.com/image/image_51/51_Montmirail_Marne_3.jpg","../../jctruffet.com/image/image_51/51_Montmirail_Marne_4.jpg","../../jctruffet.com/image/image_51/51_Montmirail_Marne_5.jpg"]},"Consult_chateau_formulaired820-2":{"id":"Consult_chateau_formulaired820-2","dept":"51","canton":"Dormans","commune":"Montmort Lucy","nom":"Montmort_Lucy","type":"Château","periode":"XV-XVII","histoire":"MONTMORT-LUCY, Son propriétaire initial était Germond de Montmort. C'est une belle demeure seigneuriale. appartient à la famille Crombez de Montmort. Au Moyen-Age son ancienne forteresse fut habitée par de nombreux seigneurs. Le premier dont on ait connaissance par une charte des comtes de Champagne, est Germond de Montmort en 1042. En 1394 la famille de Hangest en prend possession, Au XVIe siècle Jeanne de Hangest  veuve de second noce de Claude d'Aguerre  baron de Vienne le châtel , la petite fille de Louis de Hangest Chrétienne  d'Algoult leur fils  marèchal de Créqui qui en hérite assure la reconstruction, terminée en 1577,  tout en lui conservant son aspect féodal en 1622 à la fille de celui-ci  Françoisel épouse de Maximilien de Béthune-Sully. Pierre de Rémond de Montmort qui avait épousé  la petite nièce de Françoise de Narbonne en fait l'acquisition en 1704; il est célèbre par son \"Essay d'analyse sur les jeux de hazard\" et depuis lors ses descendants y résident, le fils ayant émigré le château acquit comme bien national par le marquis de la Ferrière en 1815 après sa mort le château revient à son neveu Auguste de Rémont qui meurt en 1848 avec le grade de maréchal de camp, le château qui n'a jamais été vendudepuis appartientaujourd'hui aux Crombrez de Montmort descendance de la ligne feminine des Rémond.                                                                                CASTAIGNER  acheté récemment, est devenu le Siège social de la Financière Vankren (Champagne)","architecture":"MONTMORT-LUCY, date du XVe au XVIIe siècle, de style Henri II. En évoquant le château, Victor Hugo parlait d'un \"ravissant tohu-bohu de tourelles, de girouettes, de pignons, de lucarnes et de cheminées\". Il faut avouer que la silhouette du château vous apparaît d'un coup, impressionnante par son élégance et sa majesté: construction en brique, surélevée, avec des toits d'ardoise, protégée par des doubles fossés, accessible par un pont à trois arches qui aboutit au pont-levis,Forteresse en ruine, transformée à la Renaissance en demeure d'agrément, le château, accroché à la falaise domine la paysage, le cours du Surmelin en contre bas. L'aspect médiéval est conservé par la forme carrée et les quatre grosses tours d'angle. Le village se trouve en Brie des Etangs, dans la vallée du Surmelin, entouré de son parc et de son jardin potager qu'il domine, est un très beau spécimen de l'architecture du XVIe siècle. Édifice en brique à parement de pierre : massif carré cantonné de quatre tours circulaires ; couverture à l'inclinaison très prononcée, couronnée d'un belvédère dont l'axe est décalé de 45 degrés par rapport à celui de la toiture ; salles du rez-de-chaussée voûtées d'ogives ; dans la salle dite du gros pilier, une des ogives rayonnant à partir de celui-ci vient retomber au milieu de la hotte de la cheminée, au lieu de s'appuyer au niveau du mur sur un culot ; le château lui même est entouré d'une terrasse terminée à ses angles par quatre bastions : un fait directement la liaison avec la basse-cour et comporte une rampe hélicoïdale au centre de laquelle est ménagé un escalier en vis.","habitants":"famille Germond de Montmort                            famille de Hangest\"","divers":"GPS : 48° 55' 31\" Nord, 3° 48' 34\" Est                                                                Montmort GPS : 48° 55' 24\" Nord, 3° 48' 39\" Est                                            Castagnier  grav-7                                            GPS : 48° 55' 31\" Nord, 3° 48' 34\" Est","gps":"48° 55' 31\" Nord, 3° 48' 34\" Est","images":["../../jctruffet.com/image/image_51/51_Montmort_Lucy_1.jpg","../../jctruffet.com/image/image_51/51_Montmort_Lucy_2.jpg","../../jctruffet.com/image/image_51/51_Montmort_Lucy_3.jpg","../../jctruffet.com/image/image_51/51_Montmort_Lucy_4.jpg","../../jctruffet.com/image/image_51/51_Montmort_Lucy_5.jpg","../../jctruffet.com/image/image_51/51_Montmort_Lucy_6.jpg","../../jctruffet.com/image/image_51/51_Montmort_Lucy_7.jpg"]},"Consult_chateau_formulaire9bdb":{"id":"Consult_chateau_formulaire9bdb","dept":"51","canton":"Sézanne","commune":"Neuvy","nom":"Nogentel","type":"Château","periode":"XVII","histoire":"NOGENTEL, en 1785, le château de Nogentel fut la demeure de Mme la Marquise de Coudrille, de Madame la comtesse de Marboeuf, épouse du comte de Marboeuf protecteur de l'empereur Napoléon, puis de Louis Marie Wallon d'Ambrugeac qui fit avec beaucoup de distinction les campagnes d'Espagne sous l'Empire en 1806 et sous la Restauration en 1823 et devint Pair de France et Ministre des Finances sous Charles X. Il fut inhumé à Neuvy en grande pompe. A la fin du XIXe siècle, ce fut la propriété du comte de Saint-Léon, à cette époque le domaine de Nogentel comprenait outre le château et les bois environnants, les fermes de la Poste, Saint-Grégoire, du château des Près. Après son décès en janvier 1933 le domaine fut mis en vente. En 1943 l'État Espagnol acheta le château et la partie du parc pour servir de refuge aux enfants d'origine espagnole de la périphérie parisienne. Le docteur Tarare, chirurgien à Sézanne l'acheta à l'État Espagnol en 1967 et c'est en 1982 que les familles Moreau et Amblard achetèrent la propriété pour créer un parc résidentiel de Loisirs. Les propriétaires actuels ont installé des bungalows dans le parc adjacent où on peut passer un agréable séjour dans un cadre tout à fait insolite.","architecture":"NOGENTEL  Première mention de la terre et d'une maison forte à Nogentel au XIIIe siècle. L'édifice de plan rectangulaire  flanqué de tours rondes aux angles toit en poivrière, avant corps sur façade en tour mi-uvre, à trois niveaux avec serie de lucarnes en comble.","habitants":"Famille du comte de Marboeuf\"","divers":"Nogentel    GPS : 48° 44' 48\" Nord, 3° 31' 12\" Est","gps":"48° 44' 48\" Nord, 3° 31' 12\" Est","images":["../../jctruffet.com/image/image_51/51_Nogentel_1.jpg","../../jctruffet.com/image/image_51/51_Nogentel_2.jpg","../../jctruffet.com/image/image_51/51_Nogentel_3.jpg"]},"Consult_chateau_formulaireecc6-2":{"id":"Consult_chateau_formulaireecc6-2","dept":"51","canton":"Dormans","commune":"Orbais l","nom":"Orbais_Abbaye","type":"Château","periode":"XVIII","histoire":"Deux châteaux dans cet article,   Jard.                                              JARD, le château du Jard a été construit et se situe dans un cadre exceptionnel. Il est dans le prolongement de l'abbatiale d'Orbais l'Abbaye dont les travaux sont soutenus par la Fondation du patrimoine. Il est également entouré d'un parc de 4 ha dont le jardin à l'anglaise, le potager, l'étang et les bassins, le tout dessiné en 1838 par un paysagiste de renom, Louis Sulpice Varé, à qui l'on doit le Bois de Boulogne.   Le château accueille chaque année des manifestations culturelles : Fête de la Musique et du Moyen-Age, \"Rendez-vous aux jardins\" organisées par la commune. Dans le potager, sont envisagées de petites cultures biologiques, plantes aromatiques et vignes. Il est également envisagé d'accueillir des séminaires d'entreprises ou des réunions.","architecture":"JARD, votre soutien est indispensable pour sauvegarder le château du Jard à Orbais l'Abbaye, une demeure bourgeoise de le fin du XVIIIe siècle dans un écrin de verdure, cet édifice est d'un style très classique et élégant.  Le projet porte sur la restauration des façades du château fortement dégradés depuis l'incendie  en 2016. Les travaux seront réalisés par une entreprise locale. La grange du château, à proximité de celui-ci, fait actuellement l'objet d'un label avec la Fondation du patrimoine. Grâce à vos dons, le château retrouvera son éclat d'antan et pourra être transmis aux générations futures. Il est 6 heures du matin quand le CTA-CODIS de Fagnières est prévenu qu'un incendie ravage le château du Jard à Orbais-l'Abbaye.","habitants":"Louis Sulpice Varé\"","divers":"Orbaie 48° 57' 03? nord, 3° 41' 58? est                                                                                                                          Jard grav_1","gps":"","images":["../../jctruffet.com/image/image_51/51_Orbais_Abbaye_1.jpg","../../jctruffet.com/image/image_51/51_Orbais_Abbaye_2.jpg","../../jctruffet.com/image/image_51/51_Orbais_Abbaye_3.jpg"]},"Consult_chateau_formulaire219d":{"id":"Consult_chateau_formulaire219d","dept":"51","canton":"Sermaize-les-Bains","commune":"Pargny sur Saulx","nom":"Pargny_sur_Saulx","type":"Château","periode":"XIX","histoire":"deux châteaux dans cet article, Giilardini et Bussemont.                     GILARDONI, le château de Gilardoni fut construit, en 1884. Il se trouve  à une centaine de mètres de l'usine, à la lisière de la forêt. Ce château, maintenant en ruine, était représentatif de l'entreprise Gilardoni, il est, aujourd'hui, laissé à l'abandon. Quel Dommage,  restauré, il aurait pu devenir un lieu intéressant de visites pour les touristes et faire vivre le village grace à de nombreux visiteurs.","architecture":"BUSSEMONT A cinq K.M au sud  à Saint-Lumier-la-Populeuse, épargné par les combats, en raison de sa situation en arrière du front,  souffre des remaniements apportés dans les parties hautes par Jean-Baptiste Morillot, acquéreur du domaine en 1864. On en attribue la construction à Henri de Wignacourt, comte de Morimont, qui épousa en 1722 Marie-Anne de Tournebulle, dame de Saint-Lumier. Dans le grand salon, dont le décor rocaille rappelle celui dEtrepy, se tint la réunion préliminaire chargée de désigner les députés de la noblesse aux états de 1789.","habitants":"Bussemont Famille de Henri de Wignacourt\"","divers":"deux châteaux dans cet article, Giilardini grav-1-2                                    et Bussemont grav-3-4                            GPS : 48° 46' 12\" Nord, 4° 50' 19\" Est","gps":"48° 46' 12\" Nord, 4° 50' 19\" Est","images":["../../jctruffet.com/image/image_51/51_Pargny_sur_Saulx_1.jpg","../../jctruffet.com/image/image_51/51_Pargny_sur_Saulx_2.jpg","../../jctruffet.com/image/image_51/51_Pargny_sur_Saulx_3.jpg","../../jctruffet.com/image/image_51/51_Pargny_sur_Saulx_4.jpg"]},"Consult_chateau_formulaireea46":{"id":"Consult_chateau_formulaireea46","dept":"51","canton":"Blancs-Coteaux","commune":"Pleurs","nom":"Pleurs","type":"Château","periode":"XVII-XVIII","histoire":"PLEURS,   la reconstruction revient à Pierre de Pleurre, grand bailli d'épée et gouverneur de Sézanne, qui obtint en 1661 lérection en marquisat de sa baronnie de Pleurre, le seigneur est alors Pierre IV de Pleurre bailli d'épée et gouverneur de Sézanne dont le fils  Charles Henri sera le premier à porter le titre de marquis,  le domaine se transmettra sans interruption dans la même lignée jusqu'au décès, en 1888 de Charles Albéric marquis de Pleurre. de son mariage avec Michelle Berthe Florenza Brossin de Méré, il  laissait deux filles  qui épouseront le comte de Lenzbourg et le comte du Bourg, autorisé à relever le nom  de Pleurre. Le domaine sort de la famille  et passe à divers propriétaires dont monsieur Emile Woern  qui vers 1905 entreprend la restauration de l'édifice et depuis 1984  est la propriété de la famille d'Authenac qui ont aménagé dans le château une maison de retraite. Une plaque de marbre rappelle quen septembre 1914, lors de la première bataille de la Marne, Foch y installa le P.C. de sa IXe armée.","architecture":"PLEURS, de lancien château fort, démoli vers 1650, subsiste à lentrée dune cour latérale, un intéressant pavillon analogue à ceux de Vermoise et de Saint-Benoist-sur-Vanne, dont un pont-levis précédait le passage charretier. Quant au château actuel, on en attribue la reconstruction à Pierre de Pleurre.   Les travaux menés lors dune seconde campagne, datée de 1770 grâce au millésime relevé dans lun des salons, lui donnèrent son ordonnance actuelle, à la fois simple dans ses lignes et originale dans sa conception sur la haute façade en moellons enduits se détache une sorte de grand portique, fait  de larges pierres appareillées en bossages ou en claveaux, et couronné dun fronton triangulaire chargé de vases. Lavant-corps ainsi constitué embrasse les trois niveaux, le dernier correspondant à une suite doeils-de-boeuf ornés de guirlandes. Précédé dune cour dhonneur encadrée de pavillons de même style, couverts de combles à faible pente, le château présente à lest une façade beaucoup plus simple, donnant sur un parc boisé traversé par la rivière. A lintérieur, l'escalier a conservé le sobre dessin de sa rampe en fer forgé, et plusieurs salons avec leurs boiseries et leurs stucs néoclassiques.","habitants":"Famille de Pierre de Pleurre\"","divers":"Pleurs     GPS : 48° 41' 29\" Nord, 3° 52' 18\" Est","gps":"48° 41' 29\" Nord, 3° 52' 18\" Est","images":["../../jctruffet.com/image/image_51/51_Pleurs_1.jpg","../../jctruffet.com/image/image_51/51_Pleurs_2.jpg","../../jctruffet.com/image/image_51/51_Pleurs_3.jpg","../../jctruffet.com/image/image_51/51_Pleurs_4.jpg"]},"Consult_chateau_formulairec977-2":{"id":"Consult_chateau_formulairec977-2","dept":"51","canton":"Reims","commune":"Reims","nom":"Pommery_Vaukren","type":"Château","periode":"XVIII-XIX","histoire":"POMMERY, Il a été construit, de 1868 à 1878. L'Initiatrice du projet fut Jeanne-Alexandrine Louise Pommery. Vranken-Pommery Monopole est le deuxième plus gros groupe de vins de champagne. Le domaine attire chaque année des milliers de touristes.  Son portefeuille comprend les marques de champagne Vranken et ses cuvées Diamant et Demoiselle, Pommery et ses cuvées Louise et POP, Charles Lafitte, Heidsieck & CO Monopole. Louis-Alexandre Pommery, négociant en laine, s'associe en 1856 à Narcisse Greno pour fonder la maison Pommery & Greno. Au décès de Louis-Alexandre, en 1858, c'est sa veuve, Jeanne Alexandrine Pommery, qui reprit ce qui n'est encore qu'une modeste affaire. En 1866, Louis, le fils aîné du couple, est associé à la gestion de l'entreprise qui prend alors le nom de Veuve Pommery & Fils. La veuve développa l'activité, fit creuser les 18 kilomètres de caves et de grands bâtiments dans le style néo-gothique élisabéthain dans le quartier de la butte Saint-Nicaise à Reims. Le réseau souterrain relie des crayères d'époque gallo-romaine. Outre ses marques de champagne, Vranken-Pommery Monopole est propriétaire des marques de porto Rozes et Terras do grifo. Enfin, le groupe est le leader des vins rosés avec les Sables de Camargue (gris de gris) des domaines Listel et les Côtes de Provence (rosé) du chateau la Gordonne.","architecture":"POMMERY ; Le groupe Vranken-Pommery Monopole possède le plus important vignoble en Europe réparti entre la Champagne, la Provence, la Camargue et le Portugal. L'entreprise a été la propriété de différents groupes de luxe à la fin du XXe siècle : Xavier Gardinier, groupe BSN, groupe LVMH et, depuis 2002, le groupe Vranken Monopole. Le groupe Vranken-Pommery Monopole a été fondé en 1976 par Paul-François Vranken. Le château Vankren-Pommery a changé de couleurs en 2014 et a repris ses teintes bleutées. Au premier semestre 2019, le groupe déplore une nette baisse de son chiffre d'affaires de 8,2 % à 87 millions d'euros. La direction pointe du doigt la nouvelle loi alimentation pour justifier un tel recul des ventes.                                                                                                                 SACY au sud ouest de Reims cle château de SACY.  Il était fortement endommagé et laissé longtemps à l'abandon, on l'appellé la maison Menesson par l'architecte Paul Gosset, le château de Sacy est devenu, après une importante restauration, un prestigieux Hôtel-Restaurant, avec une vue superbe, sur le vignoble champenois. Les commentaires de ceux qui y sont allés sont tès élogieux et les tarifs abordables.","habitants":"Jeanne-Alexandrine Louise Pommery.\"","divers":"Pommery grav 1-2-3                                                         GPS : 49° 15' 46\" Nord, 4° 02' 05\" Est                                                                Sacy   grav-4                                                                   GPS : 49° 11' 52\" Nord, 3° 56' 57\" Est","gps":"49° 15' 46\" Nord, 4° 02' 05\" Est","images":["../../jctruffet.com/image/image_51/51_Pommery_Vaukren_1.jpg","../../jctruffet.com/image/image_51/51_Pommery_Vaukren_2.jpg","../../jctruffet.com/image/image_51/51_Pommery_Vaukren_3.jpg","../../jctruffet.com/image/image_51/51_Pommery_Vaukren_4.jpg"]},"Consult_chateau_formulairee823":{"id":"Consult_chateau_formulairee823","dept":"51","canton":"Fismes","commune":"Serzy-et-Prin","nom":"Prin","type":"Château","periode":"XVII","histoire":"PRIN, le château de Prin, situé à quelques kilomètres à louest de Gueux, a dut être construit au milieu du XVIIe siècle par Nicolas Thirel dAssy, à partir dun précédent édifice. À côté dun corps dhabitation reconstruit après 1918, subsistent louvrage dentrée, un pavillon isolé, coiffé dun haut comble, une vaste terrasse et une pièce deau. L'intérieur possédait une intéressante cheminée ornée dun tableau de pierre accompagné de caryatides. Autour du château style Renaissance sérigent encore la tour du Guetteur et la Malgouverne. On peut encore lire aujourdhui les traces du passé par les inscriptions gravées dans la pierre. A deux pas du château de Prin, une étable, une bergerie et une ferme, donnent un agrément plus rustique à lensemble architectural du domaine.  Chambres d'hôtes.","architecture":"PRIN est un château qui fut construit au XVIIe siècle, il abrita, en Juillet 1641, le cardinal de Richelieu, lors du séjour du Roi Louis XIII à Reims. Linfluence des dignitaires religieux de Reims et des seigneurs locaux, se fera sentir au cours du temps, en provoquant de nombreux conflits liés, en grand partie, au servage et à la forte imposition. Il ne reste que des vestiges du château de Prin en ruine aujourd'hui. On en sait plus sur le décès dun homme de 48 ans, ce lundi après-midi, au bord dun étang privé de la commune de Serzy-et-Prin. Lhomme, qui se baignait dans létang privé de son employeur, a probablement été victime dune hydrocution. Le drame sest produit au château de Prin où son nouveau propriétaire Éric Gnat, bien connu dans la région, comme Président de l'entreprise Gnat Ingénierie, avait invité les ouvriers qui avaient uvré à la rénovation du Domaine.","habitants":"Famille de Nicolas Thirel dAssy\"","divers":"Serzy-et-Prin                                                 GPS : 49° 15' 02\" Nord, 3° 46' 02\" Est","gps":"49° 15' 02\" Nord, 3° 46' 02\" Est","images":["../../jctruffet.com/image/image_51/51_Prin_1.jpg","../../jctruffet.com/image/image_51/51_Prin_2.jpg","../../jctruffet.com/image/image_51/51_Prin_3.jpg"]},"Consult_chateau_formulaire2be7-2":{"id":"Consult_chateau_formulaire2be7-2","dept":"51","canton":"Reims","commune":"Reims","nom":"Reims","type":"Château_palais","periode":"XVIII-XIX","histoire":"REIMS; l'hôtel de ville construit à lemplacement dune maison romaine, le bâtiment date de Louis XIII, avec une statue équestre du roi, construit par Jean Bonhomme, architecte rémois en 1927. Il regroupe alors les édiles de la ville (conseil de ville et échevins). Devenu hôtel de ville en 1880, l'édifice est incendié en 1917 avant d'être reconstruit. La façade et la toiture sont restaurées par Bernard Haubold, l'intérieur reconstruit par Roger-Henri Expert.","architecture":"Palais de TAU Autrefois résidence de larchevêque, le palais du Tau a joué, par sa proximité avec la cathédrale, un grand rôle dans le cérémonial des sacres des rois de France. Cest dans sa grande salle du XVe siècle que se réunissaient pour festoyer le roi, la cour et les invités. Ce très beau lieu a été transformé en musée dans les années 1950. Il présente aujourdhui les objets constituant le trésor de la cathédrale, mais aussi des tapisseries et collections qui entretiennent le souvenir des sacres.","habitants":"Roger-Henri Expert. \"","divers":"A Reims ;  Esplanade Simone Veille grav-1-2, Hôtel de Marc grav-5 Palais de Tau grav-3 et la porte de Mars grav-4 hotel vergeur  grav-6","gps":"","images":["../../jctruffet.com/image/image_51/51_Reims_1.jpg","../../jctruffet.com/image/image_51/51_Reims_2.jpg","../../jctruffet.com/image/image_51/51_Reims_3.jpg","../../jctruffet.com/image/image_51/51_Reims_4.jpg","../../jctruffet.com/image/image_51/51_Reims_5.jpg","../../jctruffet.com/image/image_51/51_Reims_6.jpg"]},"Consult_chateau_formulaire0b8d":{"id":"Consult_chateau_formulaire0b8d","dept":"51","canton":"Mourmelon-le-Grand","commune":"Rilly la Montagne","nom":"Rilly_la_Montagne","type":"Château","periode":"XVIII","histoire":"RILLY, ce  bel hôtel-restaurant possède une imposante cave à vins et se dresse dans un jardin, au cur des vignobles de la région Champagne. Il abrite un sauna ainsi qu'une baignoire spa et se trouve à 650 mètres de la gare ferroviaire de Rilly-la-Montagne, desservie par la ligne reliant Épernay à Reims. Le château De Rilly propose aussi de belles chambres à la décoration individuelle et ornées d'un mobilier traditionnel.  L'hôtel-restaurant château de Rilly se trouve à 11 kilomètres du centre-ville de Reims. Il se situe au coeur du Parc naturel Régional de la Montagne de Reims. Contrairement aux idées reçues, les tarifs sont tout à fait abordables et l'accueil y est même très chaleureux.","architecture":"A trois K.M. à l'ouest à  Villers Allerand château de la ROSIERE du XIXe siècle  est devenu un centre aéré qui accueille, chaque année, une centaine d'enfants venus de la région.  Le château est un lieu d'accueil pour les enfants de la ville de Reims.  Le parc abrite aussi un préau et une forêt de 100m de profondeur. Ancienne maison de tisserands construit en 1856, le château a été légué à la ville de Reims en 1903 pour un usage unique : accueillir des enfants.\nAujourd'hui utilisé par les écoles de Reims pour des classes vertes, le château a servi de preventorium pendant plusieurs années : les enfants logeaient au château et allaient à l'école dans une dépendance.","habitants":"responsable local\"","divers":"Rilly la montagne grav 1-2                    GPS : 49° 09' 57\" Nord, 4° 02' 47\" Est                                                                   RILLY Rosière grav  3-4                              GPS : 49° 10' 00\" Nord, 4° 01' 33\" Est","gps":"49° 09' 57\" Nord, 4° 02' 47\" Est","images":["../../jctruffet.com/image/image_51/51_Rilly_La_Montagne_1.jpg","../../jctruffet.com/image/image_51/51_Rilly_La_Montagne_2.jpg","../../jctruffet.com/image/image_51/51_Rilly_La_Montagne_3.
