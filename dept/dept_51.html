jpg","../../jctruffet.com/image/image_51/51_Rilly_La_Montagne_4.jpg"]},"Consult_chateau_formulaire0eb8":{"id":"Consult_chateau_formulaire0eb8","dept":"51","canton":"Dormans","commune":"Igny-Comblizy","nom":"Ru_Jacquier","type":"Château","periode":"XVIII","histoire":"RU-JACQUIER, placé à proximité de la Vallée de La Marne, où vous trouverez les meilleurs champagnes, cet hôtel à 3 tours ne manque pas de charme. Il est maintenu dans l'état d'un château avec sa décoration et son mobilier d'époque. L'accueil au château du Ru-Jacquier y est vraiment très chaleureux, et leurs propriétaires sont un couple attachant et proche de sa clientèle. Vous pourrez y louer des salles pour fêter vos événements privés (mariage, départ en retraite, fiançailles, etc). Proche de Dormans et Epernay, bien situé pour découvrir la Champagne.","architecture":"RU-JACQUIER,   ce château de plan rectangulaire à deux niveaux, toit en croupes avec série dce lucarnes sur combles , 4 tours  rondes à mâchicoulis  toit en poivrières,  aux angles du début XVIIIe siècle, avant corps d'entrée saillant avec deux occulus  à toit surélevé sur frise avec deux attiques une lucarne centrale dominante.  Ce  domaine   vous accueille dans un écrin de verdure dominant un parc de 15 ha et son petit jardin à la française. Dans cette demeure ambiance cosy, salons boisés et mobilier de style. Les anciens haras abritent des salles de réceptions et des chambres confortables.","habitants":"Famille de Granger\"","divers":"Ru-Jacquier                                               GPS : 49° 01' 10\" Nord, 3° 42' 50\" Est","gps":"49° 01' 10\" Nord, 3° 42' 50\" Est","images":["../../jctruffet.com/image/image_51/51_Ru_Jacquier_1.jpg","../../jctruffet.com/image/image_51/51_Ru_Jacquier_2.jpg","../../jctruffet.com/image/image_51/51_Ru_Jacquier_3.jpg"]},"Consult_chateau_formulairec364":{"id":"Consult_chateau_formulairec364","dept":"51","canton":"Epernay","commune":"Réveillon","nom":"Réveillon_Marne","type":"Château","periode":"XVII-XVIII","histoire":"REVEILLON,  confirment l'attribution du château à Claude dAncienville, issu dune famille dont plusieurs représentants furent maîtres d'hôtel du Roi et baillis de Sézanne au début du XVIe siècle. En 1640, Michel Larcher acquit de Pompée dAncienville les domaines de Réveillon et dEsternay, et fit évaluer par l'architecte Villedo les réparations dont avaient besoin leurs deux châteaux. Ses héritiers cédèrent celui de Réveillon à Philippe Millien, directeur général des Vivres, qui le revendit à son tour en 1719 à René-Louis Le Voyer, marquis dArgenson, conseiller dÉtat et futur ministre des Affaires étrangères de Louis XV. Nommé à Valenciennes, le marquis dArgenson dut fort peu venir à Réveillon dont la vente en 1730. Le nouveau propriétaire, Jules-Robert de Cotte, le fils du grand Robert de Cotte, premier architecte du Roi, porta létendue du domaine à près de 9000 arpents et sattacha à embellir le château, à l'instar de Jules Hardouin-Mansart à Sagonne et de Jacques V Gabriel à Mézières. Sous le Second Empire, le château échut à Mme Herbelin, peintre de miniatures, dont hérita sa nièce, Madeleine Lemaire. Peintre de roses très appréciée, Mne Lemaire tient un salon à Paris, et convia à Réveillon les célébrités et les espoirs de lépoque: elle y reçut notamment Dumas fils, Edouard Detaille, Sarah Bernhart et, en août 1894, le jeune Proust qui y passa un mois, travailla à son recueil Les Plaisirs et les Jours et se lia à Reynaldo Hahn, musicien prodige.   Achat par la famille Bouniol de Gineste éprouvé par la guerre, le domaine fut à partir de 1947 lobjet de travaux de restauration qui permirent de sauvegarder le gros-oeuvre du château, mais savérèrent insuffisants, face à limmensité de la tâche.","architecture":"REVEILLON, son nouveau propriétaire actuel, M. Pierre Besançon, a entrepris de dégager les perspectives, de restaurer le château et de sauver ce qui peut lêtre des dépendances. A l'extérieur, seuls les pavillons dangle ont conservé leur ordonnance primitive. Sur les trois corps de bâtiments, les remaniements opérés au XVIIIe siècle ont fait disparaître la ligne de hautes fenêtres qui, échancraient la base des toits. Sculpté à cette époque, le fronton qui fait face au grand parterre représente Athéna protectrice des arts. Le château de Réveillon abritait un décor prestigieux, en partie dispersé avant la vente de 1947 et assez dégradé, dans le vestibule, quatre panneaux décoratifs et quatre dessus-de-porte de Claude III Audran, dans les galeries occupant les deux ailes, cinq paysages (sur un total de douze) attribués à Pierre-Denis Martin, dit Martin des Batailles, représentant des châteaux Royaux; dans la salle à manger, deux panneaux attribués à Jean-Baptiste Oudry et un vase de fleurs de Madeleine Lemaire; dans le petit salon, une nature morte animée de chiens également attribuée à Oudry; dans la chambre de l'évêque, une peinture du château Hennuyer de Mariemont; et sur le retable de la chapelle, une Piéta daprès Charles Le Brun. \nÉléments protégés MH : le château, demeure qui  occupe un terre-plein quadrangulaire isolé par de larges douves sèches. Bâtis en moellons revêtus dun enduit rosé et rehaussés de chaînes de briques, ses trois corps de bâtiment sordonnent autour dune cour ouverte au nord. Le choix de ce plan carré, cantonné de pavillons saillants, plus élevés dun étage, limportance des grands combles dardoise à la française et létroitesse des travées, réduites à des demi-fenêtres dans les pavillons, : classement par arrêté du 8 juin 1948.","habitants":"Claude dAncienville\"","divers":"Réveillon  GPS : 48° 45' 13\" Nord, 3° 27' 09\" Est","gps":"48° 45' 13\" Nord, 3° 27' 09\" Est","images":["../../jctruffet.com/image/image_51/51_R%c3%a9veillon_Marne_1.jpg","../../jctruffet.com/image/image_51/51_R%c3%a9veillon_Marne_2.jpg","../../jctruffet.com/image/image_51/51_R%c3%a9veillon_Marne_3.jpg","../../jctruffet.com/image/image_51/51_R%c3%a9veillon_Marne_4.jpg"]},"Consult_chateau_formulairefadc":{"id":"Consult_chateau_formulairefadc","dept":"51","canton":"Epernay","commune":"Chouilly","nom":"Saran","type":"Château","periode":"XVIII","histoire":"SARAN,  cest en 1801 que Jean-Rémy Moët acquiert des propriétés au lieu-dit Saran. Vignes, il poursuivra ses achats tout au long de sa vie. En lisière du bois de Saran, Jean-Rémy Moët fait bâtir une maison qui consiste en \"logement de maître, bâtiment dexploitation et logement de garde\". La maison est alors un rendez-vous de chasse. Jean-Rémy Moët ne se contente pas dêtre propriétaire à Chouilly, il en est également le premier magistrat de 1817 à 1826. Cest en 1833 que Victor Moët hérite de la maison de Saran et du vaste domaine attenant. Quelques années plus tard, en 1846, il transforme la modeste construction en un charmant manoir que lon qualifie aujourdhui de château. En 1881, à la mort de Victor Moët, sa fille unique Rachel Moët, épouse de Victor Auban-Moët, hérite du château et des propriétés alentours. Après le décès de son épouse Victor Auban-Moët se remarie avec Mme Vve Van Bomberghen et adopte la fille de celle-ci, Eugénie, dont il fera sa légatrice. Devenue Mme Thomas, Eugénie Van Bomberghen, héritera à son tour du domaine. Saran devient alors sa seule résidence dans la région dEpernay. En 1952, selon une volonté de Madame Thomas, ses héritiers lèguent le château à lhôpital Auban-Moët dEpernay, pour quil soit utilisé comme maison de convalescence ou de retraite. Dans limpossibilité dutiliser ce legs, lhôpital souhaite le revendre et la Maison Moët & Chandon sen porte acquéreur en février 1954 et y reçoit depuis lors ses hôtes de marque.","architecture":"SARAN  bâti à Chouilly, caché au coeur d'un parc boisé. Il appartient à la maison de Champagne Moët-et-Chandon. La construction du château de Saran date de 1801, pour Jean-Rémy Moët, qui est le petite fils du Fondateur de Moët-et-chandon. Le château de Saran est situé à Chouilly mais à l'extérieur du village. C'était autrefois un pavillon de chasse, devenu depuis la propriété de la Maison Moët & Chandon. Une sépulture datant du Néolithique fut découverte dans le parc, ainsi que des vestiges gallo-romains. Dans le dernier quart du XIXe siècle les pavillons latéraux ont été rehaussés tandis quen 1898 est décidé un remaniement de lensemble architectural. Une galerie couvre un premier étage élargi et une décoration florale sculptée ainsi que des médaillons se développent en façade.Les travaux de transformation du château sont confiés à larchitecte sparnacien Fernand Gallot. Laile nord-ouest du bâtiment est surélevée et la façade acquiert alors son style XVIIIe siècle.\nBombardé lors des attaques des 19 et 20 juillet 1918, lhôtel Moët ne conserve que sa façade. Il est reconstruit à lidentique mais assoupli dans sa structure et ses décorations, qui ont disparu. Le dernier étage est transformé en terrasse en son centre et ne sont rebâtis que les pavillons latéraux.","habitants":"Famille de Jean-Rémy Moët\"","divers":"Saran                                                        GPS : 49° 01' 34\" Nord, 4° 00' 52\" Est","gps":"49° 01' 34\" Nord, 4° 00' 52\" Est","images":["../../jctruffet.com/image/image_51/51_Saran_1.jpg","../../jctruffet.com/image/image_51/51_Saran_2.jpg"]},"Consult_chateau_formulairef639":{"id":"Consult_chateau_formulairef639","dept":"51","canton":"Châlons-en-Champagne","commune":"Sarry","nom":"Sarry","type":"Château","periode":"XVI","histoire":"SARRY,  le château remontait à la reconstruction opérée par Mgr Geoffroy Floreau, ancien bénédictin, évêque de 1453 à 1503, qui avait également fait rebâtir le palais épiscopal de Châlons. Le corps de logis sappuyait sur lancienne courtine dont les murs, plus ou moins découronnés, entouraient toujours le terre-plein quadrangulaire, isolé par des fossés. Restauré vers 1641 par Mer Félix Vialart.","architecture":"SARRY, vestiges, de cette ancienne résidence de campagne des évêques de Châlons, comtes et pairs de France, agréablement située dans la vallée de la Marne, le zèle révolutionnaire na laissé subsister que de maigres vestiges: la motte, les fossés et les deux pavillons rebâtis au XVIIIe siècle de part et dautre de lentrée. Connu par plusieurs dessins aquarellés de la fin du XVIIe siècle, provenant de la collection Gaignières, il conservait les deux tourelles polygonales abritant des escaliers en vis et, à lun des angles extérieurs, une forte tour ronde. Sur la gauche se détachait une grande et élégante chapelle gothique en retour déquerre, élevée de deux niveaux et terminée par un chevet polygonal. De part et dautre de la cour dhonneur, deux portails classiques conduisaient aux parterres, attribués à André Le Nôtre, régulièrement tracés entre de longs canaux. Face au corps de logis, au-delà du pavillon dentrée et de lancien pont-levis, la chaussée daccès traversait une avant-cour délimitée par une enceinte flanquée de tours découronnées, jusquau châtelet qui en commandait lentrée. Élevé sur des bases plus anciennes, en pierre appareillée, ce châtelet devait son aspect pittoresque à ses maçonneries champenoises, faites de lits alternés de briques et de craie, à sa grande lucarne sculptée et à la multiplication de hautes tourelles dangle en encorbellement.","habitants":"Famille de Mer Félix Vialart\"","divers":"Château de Sarry","gps":"","images":["../../jctruffet.com/image/image_51/51_Sarry_1.jpg","../../jctruffet.com/image/image_51/51_Sarry_2.jpg"]},"Consult_chateau_formulaire5fdc":{"id":"Consult_chateau_formulaire5fdc","dept":"51","canton":"Mourmelon-le-Grand","commune":"Sept Saulx","nom":"Sept_Saulx","type":"Château","periode":"XIX","histoire":"SEPT-SAULX , ses jardins ont été dessinés par l'architecte paysagiste Jean Claude Nicolas Forestier. A la fin de la 5èime guerre mondiale, Edouart Mignot mit le château de Sept-Saulx à la disposition de l'armée américaine, pour héberger les aviateurs en convalescence. Il offrit aussi l'hospitalité au Général Eisenhower dans son hotel particulier du Boulevard Lundi à Reims,  a été construit à la fin des années 1920, d'après les plans de l'architecte décorateur Louis Süe, pour Édouard Mignot qui fut le fondateur des Comptoirs Français (1867-1949)   A défaut de cet édifice, on trouvera à Sept-Saulx, sur la route de Sillery, le château construit entre 1928 et 1930. Précédé dun grand rond-point et dune cour dhonneur. Le parc a été réalisé en même temps que le bâtiment, par le paysagiste Jean Claude Nicolas Forestier, conçu dans le même classicisme épuré que le château.  il est inscrit en totalité  par arrêté du 8 novembre 2000.","architecture":"SEPT-SAUX, situé au nord de la Vesle, dans la vaste plaine qui sétend entre Reims et Châlons, ce modeste village doit son origine à une villa gallo-romaine et à son appartenance à labbaye Saint-Basle, fondée à proximité après la défaite dAttila. Siège dune garnison et résidence occasionnelle des évêques,  Une gravure de Chastillon montre un puissant donjon quadrangulaire, bien conservé dans son gros-oeuvre, et de grands logis ruinés adossés aux courtines droites, dotés de cheminées et de grandes fenêtres. Épaulé de hauts contreforts, placés aux angles et au milieu des côtés, distribué lui aussi en différents appartements et couronné dune terrasse cantonnée déchauguettes, le donjon correspondait au type d'ouvrage de la seconde moitié du XIIe siècle, le château fut réparé après la guerre de Cent Ans, et joua encore un rôle au cours de la Fronde.  Précédé dun grand rond-point et dune cour dhonneur, le corps de logis de plan rectangulaire, couvert en terrasse, donne à louest sur un vaste parc tracé dans la vallée de la Vesle. A l'intérieur du château, la salle à manger est la pièce la plus intéressante pour son décor, c'est également la seule pièce voûtée. Le salon est de style néo XVIIIe. Le salon est de style néo-XVIIIe. Le ferronnier d'art était Richard Georges Desvallières. Le château de Sept-Saulx est protégé aux M.H. depuis 2000 ainsi que classé M.H. exceptionnel du XXe siècle. C'est un château privé, qui sert d'habitation.","habitants":"Famille de Édouard Mignot \"","divers":"Château de Sept-Saulx                                             GPS : 48° 47' 11\" Nord, 4° 54' 40\" Est","gps":"48° 47' 11\" Nord, 4° 54' 40\" Est","images":["../../jctruffet.com/image/image_51/51_Sept_Saulx_1.jpg","../../jctruffet.com/image/image_51/51_Sept_Saulx_2.jpg","../../jctruffet.com/image/image_51/51_Sept_Saulx_3.jpg"]},"Consult_chateau_formulairefac6":{"id":"Consult_chateau_formulairefac6","dept":"51","canton":"Reims","commune":"Sillery","nom":"Sillery","type":"Château","periode":"XVI","histoire":"SILLERY, la Cour de France appréciait le vin produit par les coteaux de Sillery. Mais cest la famille Brulart, qui en posséda la terre pendant près de trois siècles, qui fit dans l'Histoire la célébrité du nom de Sillery. Au milieu du XVIe siècle, Marie Cauchon, dame de Sillery et de Puisieulx, épousa Pierre Brulart, président au parlement de Paris et conseiller d'Etat. Leur fils Nicolas, négociateur à Vervins, puis à Florence lors du mariage de Marie de Médicis, devint garde des sceaux, puis chancelier de France en 1607. Il obtint de Louis XIII lérection de sa terre en marquisat, en 1619, et se retira en sa maison de Sillery, en Champagne, où il mourut  en 1624. Saint Vincent de Paul vint en 1643 prêcher une mission à Sillery, et Louis XIV sy arrêta en 1673. Au XVIIe siècle, Louis Brulart, marquis de Puisieulx, ami intime du duc de Penthièvre, fut ministre des Affaires étrangères de Louis XV et démissionna lors de linterdiction des jésuites. Le marquis et la marquise de Puisieulx, née Louvois, reçurent à Sillery leur nièce, la célèbre Mme de Genlis, qui joua la comédie devant larchevêque de Reims, Mgr de La Roche-Aymon, son coadjuteur, Mgr de Talleyrand, et le neveu de ce dernier, le futur prince de Bénévent. Héritier de Sillery en 1785, le comte de Genlis y vécut avec faste. Au cours de lété 1787, il y reçut le duc et la duchesse dOrléans, revenant des eaux de Spa en compagnie du futur Louis-Philippe. En 1801, le général de Valence, gendre de Mme de Genlis, racheta le château, pillé au cours de la Révolution, et le fit restaurer. Devenu sous lEmpire sénateur de la Marne, il y reçut en 1810 la future impératrice Marie-Louise et le céda en 1820 à son gendre, le général Gérard, qui le revendit.","architecture":"SILLERY, corps de logis central  avec avant corps de trois niveaux  avec série de lucarnes sur combles et de trois travées saillantes entre deux pavillons toits à  l'impériale. Une gravure de Chastillon (début du XVIIe siècle) rappelle les traits du logis élevé par le chancelier de Sillery près de la Vesle, sur lun des côtés de la cour de lancien château.","habitants":"Famille Brulart\"","divers":"Château de Sillery","gps":"","images":["../../jctruffet.com/image/image_51/51_Sillery_1.jpg","../../jctruffet.com/image/image_51/51_Sillery_2.jpg"]},"Consult_chateau_formulaire6dc5":{"id":"Consult_chateau_formulaire6dc5","dept":"51","canton":"Dormans","commune":"Baye","nom":"St_Alpin","type":"Château","periode":"XIII-XV","histoire":"ST-ALPIN, la tradition y fait naître Saint-Alpin au Ve siècle. Son histoire commence au début du XIIIe siècle comme le montre la chapelle, probablement bâtie, entre 1205 et 1220, par Simon Ier de Châteauvillain dit « le Jeune », seigneur de Baye, mort avant l'an 1260, d'après Joseph de Braye. La chapelle en est aujourd'hui l'élément le plus ancien, construite pour Simon de broyés, l'histoire architecturale est floue,  Simon de Châteauvillain était le fils d'Hugues III de Broyes et d'Isabelle de Dreux, dame de Baudement, fille de Robert Ier de Dreux, cinquième fils du roi Louis VI le Gros..  Marion Delorme naquit au château de Baye qui était la propriété du Baron de Baye. Elle y passa une vie paisible, avant de devenir une grande courtisane et davoir une vie, plus agitée. Le baron de Baye collectionnait de riches collections artistiques et archéologiques. L'ancien château de Baye reste très bien entretenu, devenu un foyer de Charité. Un grand parc permet de s'y promener.  Éléments protégés MH : la chapelle du château: classement par arrêté du 22 mars 1923.","architecture":"ST-ALPIN, château de fondation très ancienne :Des seigneurs de Baye sont connus à partir du XIe siècle mais il n'y a pas de documents permettant de faire remonter l'implantation de ce château. Joseph de Baye a affirmé que cette chapelle était l'aboutissement d'une campagne de construction du château commencée en 1150,   La chapelle en est aujourd'hui l'élément le plus ancien, construite entre 1205 et 1220 pour Simon de Broyés, elle conserve ses vitraux d'origine, cette chapelle est connue pour ses vitraux datant du XIIIe siècle.Il devait cependant y avoir un château à cet emplacement car, à cette époque, Baye était une des grandes baronnies du comté de Champagne.   le château avait  au XVe la forme d'un quadrilatère cantonné aux angles de trois tours et de la chapelle, avec implantation de communs au sud. Au cours du XVIe siècle, sont élevées une galerie entre la chapelle et une des tours du mur d'enceinte, cette galerie est surélevée au XIXe siècle par le baron de Baye, puis dans les années 1950. Le château de Baye accueille dans ses murs le foyer de Charité.  Au XVIIe siècle, l'aile sud est régularisée, l'accès à la cour est déplacé pour donner plus de symétrie à l'ensemble, vers le milieu du XVIIIe siècle, le corps de logis central est transformé: percements  modifiés et placage sur les façades, rien ne reste des aménagements intérieurs de cette époque sauf l'escalier et sa rampe en fer forgé.","habitants":"Simon de Broyés Baron de Baye\"","divers":"Château de St-Alpin                                               GPS : 48° 51' 08\" Nord, 3° 45' 50\" Est","gps":"48° 51' 08\" Nord, 3° 45' 50\" Est","images":["../../jctruffet.com/image/image_51/51_St_Alpin_1.jpg","../../jctruffet.com/image/image_51/51_St_Alpin_2.jpg","../../jctruffet.com/image/image_51/51_St_Alpin_3.jpg"]},"Consult_chateau_formulaire561a":{"id":"Consult_chateau_formulaire561a","dept":"51","canton":"Châlons-en-Champagne","commune":"Champigneul-Champagne","nom":"St_Georges_Marne","type":"Château","periode":"XVI","histoire":"Saint-GEORGES, cité à la fin du XIVe siècle, le château dEcury-le-Chétif, devenu Ecury-le-Grand, puis Saint-Georges, échut par alliance en 1482 à Guillaume Godet, receveur des tailles à Châlons, puis gouverneur de la ville. On en attribue la reconstruction à Germain Godet, lieutenant général au bailliage de Sainte-Menehould et gouverneur de la place pour Henri IV, et à son fils, capitaine au régiment de Coligny, décédé en 1624. Philippe François de Montbayen, trésorier du Roi à Châlons, acquiert en 1643 la terre dEcury, mais ses héritiers la revendent en 1708, à François-Joseph de Cappy, maréchal de camp de cavalerie et commandant pour Sa Majesté en Picardie et en Champagne. Le nouveau seigneur dEcury-le-Grand achète le Petit-Ecury voisin et, en 1721, lègue lensemble à son neveu François, seigneur dAthis. César de Cappy, cornette au régiment dHarcourt, sy retire en 1763, némigre pas et meurt en 1795 à Châlons. Sa fille Marie épouse Pierre Chamorin, chirurgien militaire, qui devient maire de Châlons et dont lattitude courageuse face aux alliés, en 1814, conduit Louis XVIII à lanoblir. La comtesse de Sainte-Suzanne, née Chamorin, fait remanier le château vers 1835, et surtout vers 1875. Son fils Auguste, attaché au comte de Chambord, y meurt en 1912. Vendu en 1922 au comte de sainte Suzanne qui le revende   quelques années plus tard par M. André dHalluin, père de lactuel propriétaire est resté dans la descendance.","architecture":"Saint-GEORGES, comme ceux de Rosières et de Droupt-Saint-Basle, le château comprenait une cour et une vaste basse cour isolées par une double ceinture de fossés en eau. Trois corps de bâtiments entourent aujourdhui la cour dhonneur, à lorigine pavée, flanquée à louest par une tour-porche en pierre dont larcade sinscrit dans la feuillure du pont-levis disparu, un petit perron à deux volées conduit aux appartements du bel étage: salon, salle à manger et grande chambre dont César de Cappy fit poser les boiseries en 1764. Remaniée intérieurement sous Louis-Philippe, laile gauche abrite la chapelle, pavée de plates-tombes en pierre noire et signalée par un haut clocher dardoise. Quant à l'aile droite, qui correspondait au XVIIe siècle à une galerie, elle rejoint un pavillon reconstruit vers 1875 par Poistel, architecte à Châlons, et flanqué dune tour dangle cylindrique, rehaussée dun étage. La maçonnerie, faite dassises alternées de briques et de pierre, à la manière champenoise, contraste par sa sécheresse avec celle des autres façades. Célèbre par sa grande héronnière, mentionnée dans les archives depuis 1383, le parc a été replanté et percé de longues perspectives rayonnantes.","habitants":"François-Joseph de Cappy\"","divers":"Château de St-Georges                        GPS : 48° 58' 28\" Nord, 4° 11' 11\" Est","gps":"48° 58' 28\" Nord, 4° 11' 11\" Est","images":["../../jctruffet.com/image/image_51/51_St_Georges_Marne_1.jpg","../../jctruffet.com/image/image_51/51_St_Georges_Marne_2.jpg","../../jctruffet.com/image/image_51/51_St_Georges_Marne_3.jpg"]},"Consult_chateau_formulaire992b":{"id":"Consult_chateau_formulaire992b","dept":"51","canton":"Dormans","commune":"Saint Martin d","nom":"St_Martin_Ablois","type":"Château","periode":"XVIII","histoire":"St-Martin ABLOIS, le château est loeuvre de Charles-Jacques de Meulan, receveur général des finances de Paris et secrétaire des commandements du comte dArtois, qui dut le créer après son mariage avec Marguerite de Saint-Chamans, en 1762. Élégante et intellectuelle, fort appréciée de Rulhières et de Condorcet, Mme de Meulan fit de son salon parisien lun des hauts lieux de l'esprit philosophique et des idées nouvelles. M. de Meulan mourut ruiné en 1790. Sa fille Pauline, adaptatrice de Shakespeare et auteur douvrages sur léducation, fit au Publiciste la connaissance de Guizot, le futur ministre de Louis-Philippe, quelle épousa en 1812 malgré une différence dâge de quatorze ans.  En 1780 le château vendu au comte de Vauvigneux  et en 1792 le domaine est vendu à sieur Sannegon qui deviendra maire de Saint-Martin sous la Restauration d'origine champenoise, Antoine, devenu propriété du comte Roy, ministre des Finances de Charles X, à son déçès en 1847, le château passe à son gendre  au marquis de Talhouët , puis à leur fils Auguste, ministre des travaux publics en 1870 député et sénateur de la Sarthe, au Talhouët succèdent un industriel de la région d'Epinal, famille Géliot et en 1919, l'héritier à une grande maison de champagne Lucien-Durand Mercier. Le château de Saint-Martin dAblois fut transformé dans les années 1950 par les jésuites qui y installèrent leur séminaire des missions. Il abrite depuis 1971 une maison de retraite.  En 2009, le château d'Ablois a été racheté par la famille Breul, qui y organise depuis des réunions pour ses clients, pour des dégustations et la vente de leur champagne \"Patrick Breul\".","architecture":"St Martin-ABLOIS , date du XVIIIe siècle, de plan rectangulaire présente sur ses façades principales deux avant-corps latéraux appareillés à refends  ses deux façades les plus étroites  son couronnées par un fronton  triangulaire percées d'un oculus.  Grand château aux lignes sobres et son vaste parc paysager tracé sur les pentes boisées de la vallée, le domaine de Saint-Martin dAblois évoque la société brillante de la fin du XVIIIe siècle. Adepte du retour à la nature et de langlomanie alors en honneur, le constructeur a cherché à insérer le mieux possible le corps dhabitation dans le vaste parc paysager. Ses façades principales, encadrées détroits avant-corps, donnent ainsi lune et lautre sur des esplanades gazonnées, prolongées par des perspectives tracées à travers les bois et la vallée. Lune des façades latérales domine la cour dhonneur, aménagée en contrebas pour nêtre pas visible du parc. Précédée dun perron à double révolution, elle apparaît surélevée dun niveau de soubassement dont les hautes arcades sincurvent de part et dautre jusqu'aux corps de dépendances latéraux,  chambres d'hôtes.","habitants":"Famille du marquis de Talhouët \"","divers":"St-Martin-Ablois                                             GPS : 48° 48' 51\" Nord, 4° 31' 21\" Est","gps":"48° 48' 51\" Nord, 4° 31' 21\" Est","images":["../../jctruffet.com/image/image_51/51_St_Martin_Ablois_1.jpg","../../jctruffet.com/image/image_51/51_St_Martin_Ablois_2.jpg"]},"Consult_chateau_formulaire8e3f":{"id":"Consult_chateau_formulaire8e3f","dept":"51","canton":"Sainte-Menehould","commune":"Ste_Menehould","nom":"Ste_Menehould","type":"Château","periode":"XVIII","histoire":"STE-MENEHOULD, la commune était jusqu'en 2017 le chef-lieu de l'arrondissement de Sainte-Menehould du département de la Marne. Par décret du 29 mars 2017, cet arrondissement est supprimé. La commune est alors intégrée le 31 mars 2017 à l'arrondissement de Châlons-en-Champagne. Elle était depuis 1793 le chef-lieu du canton de Sainte-Menehould.  dans le ressort de la cour d'appel de Reims, Une grande partie de la ville fut détruite en 1719 par un incendie. Elle fut reconstruite dans un style remarquable, en brique et gaize alternés, avec toit à la Mansard, à lexemple de lHôtel de Ville, dont la première pierre fut posée en 1730.  Sainte-Menehould est également connue comme la ville où le roi Louis XVI de France a été reconnu lors de sa tentative de fuite. À la demande de la municipalité, Jean-Baptiste Drouet et Jean-Chrisosthome Guillaume  se lancent à la poursuite des voitures et font arrêter le roi à Varennes-en-Argonne le 21 juin 1791. Le 3 septembre 1792, le corps de Nicolas Beaurepaire, héros malheureux de la bataille de Verdun, est inhumé discrètement à Sainte-Menehould. Malgré sa panthéonisation officielle, il y est resté.                                                                                                             VAUX  est à Chaudefontaine,  La construction date du XIXe siècle.  est visible de l'extérieur, à 5 minutes de Sainte Ménéhould. Mariano et Natale, leurs propriétaires, des jumeaux, sont nés en Sicile. Ce sont des artistes qui ont créé un art nouveau. Cet art n'est pas encore dénommé. Leurs tableaux et leurs statuettes sont des exemplaires uniques, ou visiter le moulin de Valmy qui est tout proche, ou vous baigner à la piscine de Sainte-Ménéhould.","architecture":"STE-MENEHOULD, place du Général Leclerc, vous découvrirez ce superbe bâtiment. Une partie importante de la ville a été détruite par un incendie en 1719. L'Hôtel de Ville, reconstruit en 1730, est formé d'une alternance de lits de briques et de pierre. C'est l'oeuvre de l'ingénieur du Roi Philippe de La Force, qui s'est appuyé sur les plans des premiers architectes du Roi, Mansart, De Cotte et Gabriel. Les façades extérieures et les toitures ont été classées aux M.H. en janvier 1922. Hôtel de ville en briques roses à chaînages de pierres. Les origines de la ville sont incertaines. La butte de Gaize est probablement un lieu de culte païen dès l'Antiquité, avant d'accueillir un château. Une ville se forme dès le Ve siècle sur les bords de l'Auve et se développe grâce aux ressources de la forêt défrichée et de l'agriculture. La ville, souvent située en zone frontalière, subit de nombreuses guerres et sièges. Elle passe sous le contrôle des comtes de Champagne à la fin du XIIe siècle, puis de la couronne de France à la fin du siècle suivant. Elle accueille ensuite des reliques de la sainte dont elle porte le nom, Ménehould.  Incendiée en 1719 puis reconstruite, elle conserve donc un important patrimoine architectural de XVIIIe siècle. Lors de la Révolution française, c'est dans cette ville qu'est reconnu Louis XVI, qui est ensuite poursuivi, notamment par Jean-Baptiste Drouet, et rattrapé à Varennes, non loin de là. La ville souffre beaucoup des guerres de 1870 mais surtout de 1914-1918, qui dévaste la région. Elle connaît entre 1945 et 1975 un développement démographique faible mais régulier, ainsi qu'une industrie assez importante, puis une légère baisse de population durant les trente dernières années.","habitants":"roi Louis XVI de France\"","divers":"trois châteaux dans cet article St-Menehould et Vaux grav 3 hôtel de ville grav 2                                                                                  Gps 49° 05' 27? nord, 4° 53' 53? est","gps":"","images":["../../jctruffet.com/image/image_51/51_Ste_Menehould_1.jpg","../../jctruffet.com/image/image_51/51_Ste_Menehould_2.jpg","../../jctruffet.com/image/image_51/51_Ste_Menehould_3.jpg"]},"Consult_chateau_formulaireb3fb":{"id":"Consult_chateau_formulaireb3fb","dept":"51","canton":"Sézanne","commune":"Le Thoult-Trosnay","nom":"Thoult_Trosnay","type":"Château","periode":"XVII-XVIII","histoire":"THOULT-TROSNAY, au-delà du Reclus, le Petit Morin traverse le parc du château du Thoult, dont deux tours rondes encadrent le corps de logis. Lirrégularité des chaînes et des cordons de briques qui animent les façades en moellons enduits témoigne de lancienneté de la construction et de limportance des remaniements. La demeure était un lieu de passage pour Blanche de Navarre et de villégiature lors de sa jeunesse de Thibault de Champagne. Acquis en 1616 par Guillaume de Baradat, le Thoult passa en 1663 à François de Louviers, puis aux Saint-Vallier qui firent dessiner vers 1848 le beau parc paysager. Le château a été restauré à la fin du XXe siècle par M. Francis Galichon.","architecture":"TOULT-TROSNAY, date des XVIIe et XVIIIe siècles. Il est classé aux M.H depuis 1992. Le château de Trosnay a été racheté par une société privée. Le château fait lobjet dune inscription au titre des monuments historiques depuis le 26 août 1988,  est actuellement découpé en deux propriétés: la partie ancienne avec la tour et la partie ferme, qui est devenue une grande propriété en U avec son clocheton.","habitants":"Famille de Guillaume de Baradat \"","divers":"Thoult-Trosnay                                           GPS : 48° 51' 07\" Nord, 3° 41' 27\" Est","gps":"48° 51' 07\" Nord, 3° 41' 27\" Est","images":["../../jctruffet.com/image/image_51/51_Thoult_Trosnay_1.jpg","../../jctruffet.com/image/image_51/51_Thoult_Trosnay_2.jpg","../../jctruffet.com/image/image_51/51_Thoult_Trosnay_3.jpg","../../jctruffet.com/image/image_51/51_Thoult_Trosnay_4.jpg","../../jctruffet.com/image/image_51/51_Thoult_Trosnay_5.jpg"]},"Consult_chateau_formulairec342":{"id":"Consult_chateau_formulairec342","dept":"51","canton":"Dormans","commune":"Vandières sous chatillon","nom":"Vandières","type":"Château","periode":"XVI-XVIII","histoire":"VANDIERES,  bâti à Vandières-sous-Chatillon, Mr Desrousseaux de Vandières Jean-François est le Maire de Vandières mais aussi le propriétaire du château, légué par son père.  Il était la résidence de : en 1134 : Guy de Vandières, en 1198 : Raoul Plonquet,  Vers 1300 : Perette de Vandières épouse de Jacques Lescot,  Vers 1350 : Jean de Cauchont,\nen  1420 : Eléonore de Cauchon épouse de Pierre Condé, et en \n1520 : Pierre II de Condé. La propriété est très bien entretenue. De belles oies blanches montent la garde, comme à l'époque des romains, n'hésitant pas à vous charger pour vous pincer les mollets. Le château de Vandières a été édifié au VIe siècle, remanié au XVIIIe siècle, restauré entièrement après les dommages de la guerre 1914-1918. Il est la résidence de la famille Desrousseaux de Vandières, depuis son acquisition par le gentilhomme verrier, Joseph-Auguste Desrousseaux (1783-1838).  d'Antoinette-Adélaïde-Julie de Sauville née Mignon et de ses huit enfants.","architecture":"VANDIERES, le château avec ses bâtiments, sa cour, son jardin et clos de fossés était d'une superficie de 5 hectares et quarante neuf ares. Outre les réfections sur le corps principal du logis ils firent édifier l'habitation placée à l'ouest ; une partie des canaux furent comblés, les autres curés. C'est Edouard quii héritait du château le 22 décembre 1837,  puis il passait à Auguste son fils en 1861. C'est à cette date que fut vendue la ferme, habitation seigneuriale proche de l'église avec son pigeonnier, vendue en lots. C'est M. Legras qui achetait le pigeonnier, cour, porte principale et terrain touchant le cimetière: il y avait là un pressoir. Parc du château de Vandières, il a été réalisé au XIXe siècle par le célèbre architecte-paysagiste Jacques Lalos . Il est au pré-inventaire de 2003 . On ne peut pas visiter l'intérieur du château qui demeure une propriété privée.","habitants":"Famille Desrousseaux de Vandières,\"","divers":"Vandières                                                        GPS : 49° 06' 31\" Nord, 3° 44' 18\" Est","gps":"49° 06' 31\" Nord, 3° 44' 18\" Est","images":["../../jctruffet.com/image/image_51/51_Vandi%c3%a8res_1.jpg","../../jctruffet.com/image/image_51/51_Vandi%c3%a8res_2.jpg"]},"Consult_chateau_formulaire120e":{"id":"Consult_chateau_formulaire120e","dept":"51","canton":"Fismes","commune":"Fismes","nom":"Vilette_Fismes","type":"Manoir","periode":"XV","histoire":"VILLETTE est un château bâti à Villette,  est devenu un château-ferme. Dépendait de l'Archevêché de Reims, qui y avait installé un monastère. Plus tard, il deviendra le château de la Vicomté. C'est aussi à cette période qu'on retrouve une pétition qui fut déposée sur le bureau du maire de Fismes, M. Couvreur, pour qu'une école soit installée à Villette. Elle vit le jour en 1913, le marquis de Lubersac, propriétaire du château, ayant vendu les locaux pour installer l'école à la commune. En 1963, par décision de l'Académie, l'école fut fermée. Mr Dohain a été le dernier instituteur de Fismes. Le hameau de Villette accueillait, chaque année, une fête fort appréciée appelée la Fête des ufs rouges, qui avait lieu au Café Sauteret.","architecture":"VILLETTE ou château de la Vicomté est un château bâti à Fismes. Le manoir, au lieu-dit Villette sur la route de Reims, corps de logis avec tourelle et bouche à feu ainsi qu'une fenêtre et colonnettes cannelées en délis oratoir Renaissance. Pour la journée du Patrimoine, plusieurs possibilités s'offrent aux Fismois de mieux connaître leur ville et ses alentours. L'association Loisir Détente Service propose deux parcours commentés.La promenade à l'est de Fismes, guidée par M. Prévot et commentée par Mme Batteux puis par M. Caron, vous révèlera bien des aspects historiques passionnants. Les randonneurs apprendront qu'au XIe siècle, le Château de Villette qui n'avait pas encore, à l'époque, son beau style Renaissance,","habitants":"Famille du marquis de Lubersac, \"","divers":"Villette à Fismes                                             GPS : 49° 18' 28\" Nord, 3° 40' 53\" Est","gps":"49° 18' 28\" Nord, 3° 40' 53\" Est","images":["../../jctruffet.com/image/image_51/51_Villette_Fismes_1.jpg","../../jctruffet.com/image/image_51/51_Villette_Fismes_2.jpg","../../jctruffet.com/image/image_51/51_Villette_Fismes_3.jpg"]},"Consult_chateau_formulaire096a":{"id":"Consult_chateau_formulaire096a","dept":"51","canton":"Blancs-Coteaux","commune":"le Mesnil sur oger","nom":"Villers_aux_Bois","type":"Château","periode":"XVI","histoire":"VILLERS aux BOIS dit de Launois. Brûlées en 1914, lors de linvasion allemande. La date de 1661 figurant sur le portail de lavant-cour doit néanmoins correspondre à la reconstruction du corps de logis, sur le côté dun terre-plein entouré de douves. Passé en 1704 à la famille Aubelin qui le conserva jusquà la Révolution, le domaine fut acquis en 1804 par Mme Lemaître-Ferat. En 1870, il échut par héritage à Raoul Brinquant qui fit entièrement rhabiller le corps de logis dans le goût néo-gothique et donna à Villers aux Bois des chasses mémorables. Vendu en 1960, après la mort de son fils Victor, le château nétait plus habité depuis la dernière guerre. Il a été restauré à partir de 1978 par la famille Baijot.","architecture":"VILLERS aux BOIS  Aujourdhui traité en jardins de fleurs et de buis taillés, le terre-plein rectangulaire était à lorigine encadré de dépendances, supprimées au XVIIe siècle, et dun colombier abattu à la fin du XVIIIe siècle. Le corps de logis, au fond, était un bâtiment très sobre et de proportions modestes, simple en profondeur, seulement élevé dun rez-de-chaussée et encadré de gros pavillons. En 1882 fut appliqué devant la maçonnerie de pierre crayeuse un parement de briques roses et noires, avec chaînes dangle en besace et grandes baies néo-gothiques à meneaux de pierre. La légère surélévation du corps de logis et la création dun grand comble profilé à limpériale permirent ladjonction dun étage, éclairé par de hautes lucarnes. La sculpture, exécutée dans une pierre dexcellente qualité, exprime le soin particulier apporté à la mise en oeuvre. Elle se traduit non seulement dans les habituels motifs décoratifs, crochets et fleurons sur les pinacles et les gâbles, mais aussi dans de nombreux sujets historiés: masques souriants ou grimaçants, animaux fantastiques, figures grotesques sur les culs-de-lampe; cavaliers, sangliers, hérissons, têtes de cerf évoquant la chasse sur les tympans; frise déléments empruntés à la vigne autour de la porte\nÉléments protégés MH : les façades et les toitures : inscription par arrêté du 15 décembre 1980.","habitants":"Famille  Aubelin\"","divers":"Villers-aux-Bois à le Mesnil sur oger","gps":"","images":["../../jctruffet.com/image/image_51/51_Villers_aux_Bois_1.jpg","../../jctruffet.com/image/image_51/51_Villers_aux_Bois_2.jpg"]},"Consult_chateau_formulaire83e9":{"id":"Consult_chateau_formulaire83e9","dept":"51","canton":"Châlons-en-Champagne","commune":"Villers-le château","nom":"Villers_le_Château","type":"Château","periode":"XVII","histoire":"VILLERS LE CHATEAU,  première mention de la terre de Villers au XVIe siècle lorsque Jean de Pinteville, notaire et procureur du Roi, et seigneur de Moncetz et de Villers. Puis nous trouvons successivement Philippe Saguez, écuyer, seigneur de Breuvery et de Villers en partie, né le 17 octobre 1615, élevé dans la religion protestante réformée, officier, capitaine lieutenant du Mestre de Camp du duc de Rohan en 1665, et issu de noble race et lignée par arrêt de la cour des aides de Paris en 1677, maintenu dans sa noblesse par ordonnance de lintendant de Champagne de 1698. Maurice Saguez, écuyer, seigneur de Breuvery et de Villers, né le 27 décembre 1654, décédé le 23 octobre 1699, capitaine de cavalerie au régiment de Viltz en 1688. Philippe Maurice Saguez, écuyer, seigneur de Breuvery, Moncetz et Villers, né à Sedan le 7 mars 1684  il embrassa la religion catholique ; conseiller du roi, président-trésorier de France au bureau des finances de la généralité de Champagne. La seigneurie passa ensuite à Jean Baptiste Rosnay, mousquetaire du roi, dont la famille la possédait toujours en 1785. Son propriétaire actuel est la Maison de Champagne Laurent-Perrier.","architecture":"VILLERS.  à la place de l'ancienne demeure fut construit le château actuel, assez vaste édifice carré, flanqué de quatre tourelles qui date du XVIIe siècle et qu'entoure un parc à la française. Le XIXe siècle amena de profondes transformations: surélévation de laile des dépendances, à lest; altération du profil des combles, au-dessus de la corniche à modillons; adjonction de tourelles de briques en encorbellement dans les angles de la cour. La modification de la plupart des fenêtres enleva aux façades beaucoup de caractère. La porte dentrée, au sud, souvre dans un élégant encadrement sculpté: pilastres à chapiteaux ioniques, et cartouche orné darmoiries et de guirlandes.  A lintérieur, la salle à manger a conservé une belle cheminée en bois sculpté, au linteau décoré darmoiries accompagnées de trophées militaires. Quant à l'escalier, également en bois, il occupe lune des tours dangle. Éléments protégés MH : les façades et les toitures ; les douves ; le portail orné de deux lions sculptés : inscription par arrêté du 29 janvier 1986. Sa construction remonte au XVIIe au XIXe siècle. C'est un château de style Classique. Il est inscrit aux M.H. depuis 1986, pour ses façades, ses toitures, ses douves et son portail orné de deux superbes lions sculptés.","habitants":"Famille de Philippe-Maurice Saguez\"","divers":"Villers-le château GPS : 48° 57' 41\" Nord, 4° 16' 08\" Est","gps":"48° 57' 41\" Nord, 4° 16' 08\" Est","images":["../../jctruffet.com/image/image_51/51_Villers_le_Ch%c3%a2teau_1.jpg","../../jctruffet.com/image/image_51/51_Villers_le_Ch%c3%a2teau_2.jpg","../../jctruffet.com/image/image_51/51_Villers_le_Ch%c3%a2teau_3.jpg","../../jctruffet.com/image/image_51/51_Villers_le_Ch%c3%a2teau_4.jpg"]},"Consult_chateau_formulaire9e51":{"id":"Consult_chateau_formulaire9e51","dept":"51","canton":"Châlons-en-Champagne","commune":"Vitry la Ville","nom":"Vitry_la_Ville","type":"Château","periode":"XVIII","histoire":"VITRY la VILLE, château des Clacy puis des   Conflans   à son décès sans descendance directe vers 1440  Vitry passe  à sa soeur Robine de Conflans  épouse  de Gauthier de Thorote dont une descendante  épouse un Conflans.  En 1608  Hugues Mathé, receveur général des Finances de Champagne, acquit de Jacques de Maurepas la terre de Vitry-la-Ville et y fit élever la maison seigneuriale qui figure en 1656 dans la vente consentie à Claude Debar.  François Morel, président du présidial de Châlons, acheta le domaine en 1735 et fit pratiquement reconstruire le château, comme le révèle une lettre adressée à sa fille, Mme du Boys de Riocour: \"J'aime mieux m'occuper de la reconstruction de mon château, qui est une bien grosse affaire, écrivait-il le 15 janvier 1757, que de suivre tous les grands repas et les gros jeux dont j'entends parler tous les jours\". Les travaux devaient être achevés lorsquen 1761, le président Morel fit célébrer à Vitry le mariage de Mme de Mardeuil. A la mort du président Morel   le château passe à son fils Jean-Charles qui meurt à son tour en 1791 passe alors à sa soeur la comtesse de Roicour dont les descendants  le garderont jusqu'en 1993 date à  laquelle la famille Riocour se défait de Vitry, comme ceux dIsle-sur-Marne et de Juvigny.","architecture":"VITRY la VILLE bâti à Vitry-la-Ville,  date du XVIIIe au XXe siècles. Vous y trouverez, 3 salons pour vos réceptions. Le château occupe un vaste terre-plein rectangulaire entouré de douves. Élevée de trois niveaux en pierre crayeuse, et relativement épargnée lors des profonds remaniements opérés au siècle dernier, la façade antérieure doit au XVIIe siècle lespacement de ses travées. Les pavillons bas qui lencadrent sont plus récents, de même que le pont sur les douves maçonnées et la grille d'honneur, exécutée sur le modèle de celle du parc. La façade nord doit au second Empire son caractère Louis XIII obtenu par la multiplication des fenêtres encadrées de chaînes de pierre harpées, et par ladjonction de pavillons latéraux brique et pierre, coiffés de hauts combles à la française. Tracé au-delà des anciens parterres, agrémenté de grandes pièces deau et traversé par le canal de la Guenelle, le beau parc a été coupé au XIXe siècle par la construction de la voie ferrée.                                                                                             Sur la rive droite de la Marne OMEY, le village dOmey appartenait au domaine royal et fut ensuite acquis par la famille Truc de Châlons qui le conserva pendant un siècle et demi, jusqu'en 1740, époque à laquelle remonte le château actuel. L'édifice est couvert dune toiture à la Mansart, et occupe lemplacement d'une demeure construite par Guillaume Godet, archidiacre de Châlons en 1571. Après avoir passé dans les mains de divers propriétaires, le château devint successivement la possession au XIXe siècle du comte de Briey, de la Famille Ponsard, du Comte de Riocour en 1900, et du Sieur Edouard Pluss au XXe siècle. Aujourdhui le château est la propriété de la société Omy.","habitants":"Famille de François Morel\"","divers":"Vitry la Ville et Omey grav-6                                                    GPS : 48° 50' 29\" Nord, 4° 27' 47\" Est","gps":"48° 50' 29\" Nord, 4° 27' 47\" Est","images":["../../jctruffet.com/image/image_51/51_Vitry_la_Ville_1.jpg","../../jctruffet.com/image/image_51/51_Vitry_la_Ville_2.jpg","../../jctruffet.com/image/image_51/51_Vitry_la_Ville_3.jpg","../../jctruffet.com/image/image_51/51_Vitry_la_Ville_4.jpg","../../jctruffet.com/image/image_51/51_Vitry_la_Ville_5.jpg","../../jctruffet.com/image/image_51/51_Vitry_la_Ville_6.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','51 — Marne'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
