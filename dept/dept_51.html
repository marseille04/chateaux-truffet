const FULL={"Consult_chateau_formulaired1f3":{"id":"Consult_chateau_formulaired1f3","dept":"51","canton":"Vitry le François","commune":"Ablancourt","nom":"Ablancourt","type":"Château","periode":"XVI-XVIII","histoire":"ABLANCOURT, le château dAblancourt aligne à partir dune tour dangle une succession de bâtiments couronnés de la corniche à modillons traditionnelle, mais dotés sur la cour dune façade en colombage. Il évoque Perrot dAblancourt  en 1644, traducteur plus fidèle dans ses travaux littéraires que dans ses convictions religieuses, et la famille Jacobé qui lui succéda au XVIIIe siècle.","architecture":"A deux K.M. au nord Est le château D'AULNAY-L'AITRE  Au Moyen Âge, le village était le siège de la maison d'Aulnay, une importante famille champenoise, dont plusieurs de ses membres ont été maréchal de Champagne et qui a fondé la baronnie d'Arcadie. Isolé dans la vallée du Fion, peu avant Saint-Amand et sa merveilleuse église, se trouve le château dAulnay-lAître dont le corps de logis doit sa silhouette un peu écrasée à un immense comble à la Mansart doté dun terrasson à forte pente. Reconstruit au XVIIIe siècle par les Leclerc de Lesseville, il souffre dun excès de plomberies; couverture, lucarnes et faîtages, et du voisinage de dépendances quasi-industrielles élevées à partir de deux étroits pavillons brique et pierre.","habitants":"Leclerc de Lesseville\"","divers":"Château  d'Ablancourt grav 1 et Aulnay l'Aitre grav-2","gps":"","images":["../../jctruffet.com/image/image_51/51_Ablancourt_1.jpg","../../jctruffet.com/image/image_51/51_Ablancourt_2.jpg"]},"Consult_chateau_formulaire9fb1":{"id":"Consult_chateau_formulaire9fb1","dept":"51","canton":"Anglure","commune":"Anglure","nom":"Anglure","type":"Château","periode":"XVIII-XIX","histoire":"ANGLURE , en 1580, les habitants relèvent les murailles avec l'accord du roi, les travaux se faisant sous le commandement de Seranin Marcilly, capitaine élu d'Anglure. La ville est assaillie par Chrétien de Savigny, capitaine de François, frère du roi. Les portes de la ville sont ouvertes et elle est pillée, une partie de la population ayant trouvé refuge au château fortifié, Laurent de Cardone étant seigneur d'Anglure. Le 27 septembre 1607, un grand incendie détruit presque toute la ville, un autre en 1609 la ravage de nouveau. Fin 1789, la commune se dote d'une garde municipale de 71 personnes du village avec Moreau comme commandant. Le 27 avril 1791, un appel aux volontaires est lancé pour faire trois années de service dans les troupes auxiliaires, Mimi Darras de 28 ans, Louis Jamard de 27 ans et Sulpice Vaillant se proposent. En 1793, pour la Levée en masse, Anglure envoie quatre hommes : Louis Feugé, Isidore Gallois, Louis Billot (remplacé par François Leleure de Sézanne) et Césaire Lemesle (remplacé par Pierre Caille) Château d'Anglure : date de 1840, avec le ré-emploi du donjon de l'ancien château.","architecture":"ANGLURE, la construction du château d'Anglure date du XIXe siècle. Il est privé et fermé au Public. Il est visible de la rue. Le château d'Anglure date de 1840, avec le ré-emploi du donjon de l'ancien château. Il existe une anecdote dans la famille qui dit que ce château se transmet uniquement aux femmes, car il porterait malheur aux hommes. Le château d'Anglure est privé, fermé au public.","habitants":"Famille de Louis Jamard \"","divers":"Château d'Anglure                                     GPS : 48° 35' 09\" Nord, 3° 48' 54\" Est","gps":"48° 35' 09\" Nord, 3° 48' 54\" Est","images":["../../jctruffet.com/image/image_51/51_Anglure_1.jpg","../../jctruffet.com/image/image_51/51_Anglure_2.jpg"]},"Consult_chateau_formulaire8c6e":{"id":"Consult_chateau_formulaire8c6e","dept":"51","canton":"Fismes","commune":"Arcis de Ponsart","nom":"Arcis_le_Ponsart","type":"Château","periode":"XIII-XVII","histoire":"ARCIS DE PONSART,  son surnom de Ponsart lui vient dun ancien seigneur dArcis, le chevalier Ponsard dArcy, compagnon darmes de Gauthier de Chatillon qui, à lépoque de la première croisade en 1096 fit don dune grande partie de ses biens à Renaud de Martigny, archevêque de Reims Ce dernier conféra en 1127 à labbé de Clairvaux, le futur Saint Bernard, toutes les terres et forêts quil possédait à Igny sur la commune dArcis. Probablement reconstruit par Louis Rolland, échevin de Reims en 1712, ou par son fils.","architecture":"ARCIS DE PONSART,  vestiges.  Le nom dArcis vient du latin \"arx\" qui signifie, endroit fortifié. En effet, le château médiéval est situé sur une éminence qui domine toute la commune et présente en quelque sorte laspect dune forteresse. Cest là que fut fondé le très ancien monastère cistercien de lAbbaye dIgny. Le château d'Arcis-le-Ponsart se dissimule dans un parc boisé, derrière la belle église qui domine le village. l'actuel château remplace un ouvrage fortifié dont subsiste une tourelle de guet ou échauguette.  \nÉléments protégés MH : la tourelle d'angle : classement par arrêté du 24 septembre 1931.","habitants":"Famille du chevalier Ponsard dArcy,\"","divers":"Arcis-de-Ponsart                                       GPS : 49° 00' 28,37\" Nord, 3° 51' 40,32\" Est","gps":"49° 00' 28,37\" Nord, 3° 51' 40,32\" Est","images":["../../jctruffet.com/image/image_51/51_Arcis_le_Ponsart_1.jpg","../../jctruffet.com/image/image_51/51_Arcis_le_Ponsart_2.jpg","../../jctruffet.com/image/image_51/51_Arcis_le_Ponsart_3.jpg"]},"Consult_chateau_formulaireac56":{"id":"Consult_chateau_formulaireac56","dept":"51","canton":"Vitry-le-François","commune":"Athis","nom":"Athis","type":"Château","periode":"XVII-XVIII","histoire":"ATHIS , la seigneurie d'Athis fut saisie en 1502 sur Jean des Abbés. Adjugée à Guillaume Godet, receveur des tailles à Châlons, elle échut à sa fille Jeanne, qui épousa le troyen Pierre Le Boucherat et adopta la religion réformée. Incendiée pendant les guerres de religion et reconstruite sous Henri IV, la maison seigneuriale figure dans un texte de 1602 comme \"fermée de murailles, tours, fossés et ponts-levis\". En 1662, Pierre Lallement, vicomte de Lettrée, échange sa terre de Pringy contre celle d'Athis, cédée par Christophe Le Boucherat. Il fait construire le corps de logis correspondant au château actuel, mais les revenus de sa charge de grand maître des eaux et forêts d'Orléans ne lui suffisent pas à éviter la ruine. Lorsqu'en 1708, il meurt à Athis, la terre ne lui appartient plus. Saisie dès 1689, elle a été adjugée l'année précédente à l'un de ses voisins. Le nouveau propriétaire est Jean-François Cappy, seigneur de Oiry, commissaire ordinaire des guerres et conducteur de la cavalerie légère, issu dit-on d'une famille originaire de Mantoue. En 1712, il reçoit à Athis Jacques Stuart, le fils de l'ancien Roi d'Angleterre, quittant Saint-Germain pour partir en exil. François de Cappy, major au régiment du Roi, vient habiter Athis après son mariage, en 1724. Son fils Gilles, le chevalier d'Athis, capitaine au Royal Champagne, quitte le service en 1765 et vient à son tour y habiter. A sa mort en 1795, sa nièce hérite du domaine mais s'installe à Ecury après son mariage avec monsieur de Chamorin. La comtesse de Sainte-Suzanne, sa fille, délaisse Athis au point qu'en 1832 l'ancien logis, à l'est, s'effondre dans les douves, aussitôt comblées.","architecture":"ATHIS, Il faut attendre la mariage de sa petite-fille avec le baron Ludovic de La Tullaye en 1848, pour qu'intervienne une restauration générale, accompagnée de transformations dans la distribution intérieure et la décoration. Toujours transmis par succession, depuis 1707 jusqu'à monsieur Bernard Machet, propriétaire actuel, le château garde le charme des demeures marquées par l'apport des générations. De part et d'autre du corps de logis principal, daté de 1699, deux ailes basses rejoignent des ouvrages d'angle au tracé bastionné dont l'un, à l'ouest, conserve plusieurs fenêtres à mouluration gothique. L'unité de l'ensemble vient des maçonneries de craie, rehaussées de chaînes et d'encadrement de pierre dure, et des corniches à modillons caractéristiques de la région de Châlons. Mais plus que cette architecture assez courante, c'est la qualité du décor qui retient l'attention: la rampe de l'escalier, simulant une succession de balustres, et surtout les boiseries exécutées en 1764 par monsieur Dema, ébéniste à Paris, pour la chambre que se fit aménager le chevalier d'Athis lorsqu'il quitta l'Armée. Guirlandes et trophées Louis XVI accompagnent des médaillons peints de sujets mythologiques ou galants. L'alcôve présente la particularité de pouvoir disparaître entièrement derrière la boiserie.  La construction du château d'Athis date du XVIIe et XVIIIe siècle. La tour Sud-Ouest a été récemment restaurée. Les éléments protégés du château sont : les façades et toitures à l'exclusion de la partie de la tour, l'escalier avec sa rampe en fer forgé, la cheminée du salon au 1er étage. Éléments protégés MH : les façades et les toitures, : inscription par arrêté du 17 février 1982. A 10 K.M.au sud POCANCY  fut construit au XVIe puis il fut détruit, en 1902, dans un incendie. Le nouveau château de Pocancy fut reconstruit en 1913. Sa ferme dispose d'un donjon.","habitants":"Monsieur Bernard Machet\"","divers":"Château d'Athis à Athis                        GPS : 49° 01' 02\" Nord, 4° 07' 32\" Est                                                               Marais  GPS : 49° 1' 10,17\" Nord, 4° 7' 32,61\" Est                                            Pocancy grav 2 GPS : 48° 56' 44,96\" Nord, 4° 8' 44,72\" Est","gps":"49° 01' 02\" Nord, 4° 07' 32\" Est","images":["../../jctruffet.com/image/image_51/51_Athis_1.jpg","../../jctruffet.com/image/image_51/51_Athis_2.jpg"]},"Consult_chateau_formulairef37e":{"id":"Consult_chateau_formulairef37e","dept":"51","canton":"Epernay","commune":"Pierry","nom":"Aulnoi_Pierry","type":"Château","periode":"XVII","histoire":"AULNOIS  dit aussi la maison des Aulnes à Pierry. A lorigine, ce domaine est une riche exploitation viticole  d'André Delaplace, conseiller du Roi et contrôleur général des finances, lacquiert en 1771. A lemplacement de lancienne bâtisse, il bâtit le château en 1778 et en fait une résidence dété. Le domaine est une entité de vie à part entière comprenant les installations à la production du vin et tous les éléments permettant une vie domestique aisée. Il possède colombier, puits, four à pain, basse-cour, jardin potager, verger et parc. André Delaplace développe lactivité viticole et celle de négociant. Au cours de la dernière décennie de lAncien Régime, il devient un important expéditeur de bouteilles de champagne. A la Révolution, il est contraint en 1791 de vendre le domaine à sieur Tirant de Flavigny, lui aussi négociant et producteur à Aÿ. Jusquà nos jours le château change plusieurs fois de propriétaire, mais il a la chance dêtre à chaque épisode de sa vie, entre des mains qui ont ou se sont donné les moyens de conserver les beautés qui sont transmises.\nLa maison des Aulnes ou château des Aulnois est la propriété du Champagne Henriot depuis janvier 2014.                                                PIERRY la notoriété du village de Pierry (au sud dEpernay capitale Cur de Champagne) remonte à la fin du XVIIe quand le moine cellérier bénédictin Frère Jean Oudart (1654-1742), disciple contemporain du célèbre Prieur de lAbbaye dHautvillers Dom Pérignon (1638-1715), participe aux travaux délaboration du champagne effervescent","architecture":"AULNOIS, les éléments décoratifs du XVIIe siècle, portes, trumeaux, miroirs, poignées et serrures, dalles de pierre,vitres dépoque, livres, sont toujours présents. Le logis sarticule, de la cave jusquau belvédère, autour dun octogone central dans une belle symétrie. Au rez-de-chaussée, le grand salon est tapissé par une fresque en papier peint représentant des scènes et des personnages de la mythologie grecque, scènes inspirées des Métamorphoses dOvide. Les quarante ouvertures, portes et fenêtres, sont encadrées par des briques de couleur doucement orangée caractéristiques de lépoque. La belle exposition de la bâtisse principale au sud-ouest, abritée des vents par les dépendances viticoles permet au soleil dinonder les chambres d'hôtes et les salons. Du passé viticole de la propriété reste un imposant pressoir abrité sous la belle charpente du bâtiment ouest. Au cours du temps, le château perd sa fonction viticole et devient un lieu de résidence. Éléments protégés MH : les façades et les toitures du bâtiment principal et des communs; le grand salon avec son décor; le jardin: inscription par arrêté du 1er septembre 1986.                       PIERRY dans les années 1730, Claude Antoine de Choiseul Beaupré, 24ème Evêque Comte de Châlons-en-Champagne, Pair de France y construit sur un terrain , (avec pressoirs, celliers et caves) « pour y avoir en priorité \"du bon vin de Pierry travaillé selon la méthode du Frère Jean Oudart\" ». Mgr de Choiseul réalisera cette \"petite\" résidence de campagne personnelle (25 pièces, plus de 1000 m2 habitables, 3000 m2 de dépendances et 25 arpents de bonnes vignes) et la gardera jusquà sa mort en 1763.La famille Gobillard, (dont laïeul Jean-Baptiste Gobillard fut le premier Maître Vigneron de Monseigneur de Choiseul), deviendra propriétaire dune partie des dépendances en 1858, et Jean-Paul Gobillard rétablira lunité originelle de cette belle demeure dans les années 1970, en restaurant son identité originelle dexploitation viti-vinicole.","habitants":"Famille d'André Delaplace\"","divers":"Deux châteaux à Aulnois et Pierry grav 3-4Aulnois grav 1-2                            GPS : 49° 1' 8,04\" Nord, 3° 56' 19,28\" Est                                                            Pierry grav 3-4","gps":"49° 1' 8,04\" Nord, 3° 56' 19,28\" Est","images":["../../jctruffet.com/image/image_51/51_Aulnois_Pierry_1.jpg","../../jctruffet.com/image/image_51/51_Aulnois_Pierry_2.jpg","../../jctruffet.com/image/image_51/51_Aulnois_Pierry_3.jpg","../../jctruffet.com/image/image_51/51_Aulnois_Pierry_4.jpg"]},"Consult_chateau_formulaire9cdb":{"id":"Consult_chateau_formulaire9cdb","dept":"51","canton":"Epernay","commune":"Avize","nom":"Avize_Desbordes","type":"Château","periode":"XVIII-XIX","histoire":"AVIZE, le château d'Avize est une propriété qui a connu bien des acquéreurs. Il appartenait à la famille De Cazanove qui l'a vendu à Martini. L'édifice est passé ensuite à la société Moët et Chandon dans les années 1980. Puis il a été de nouveau vendu à Patrick Bauchet, et peu de temps après à Dominique Pierson de Bergère-les-Vertus. C'est ce dernier qui a vendu cette propriété viticole à M. Boris Titov l'actuel propriétaire. Ce domaine exceptionnel trouve en son sous-sol de longues caves anciennes où les conditions de vieillissement des vins sont idéales. Son vignoble situé au pied de la bâtisse en une parcelle unique, donne, grâce à son orientation et son sol argilo-calcaire typique dAvize, des chardonnays dexception, propriété viticole. Cest au cur de la côte des Blancs, haut lieu du Champagne, que vous accueilleront Corinne et Anselme Selosse. Ce lieu de charme a pour vocation dinitier les voyageurs aux secrets du Champagne. Le château d'Avize à lambiance raffinée au milieu du vignoble, une demeure néoclassique du XIXe siècle où se côtoient de beaux meubles de famille et créateurs contemporains. Au restaurant, le chef Stéphane Rossillon conçoit, midi et soir, privilégiant les produits locaux,( restaurant-hôtel Les Avisés)","architecture":"DESBORDES  construit vers 1890, pour Paul Desbordes, d'une grande famille de vignerons d'Avize. Paul Desbordes habita au château d'Avize jusqu'à sa mort en 1943, âgé de 81 ans et sa femme Cécile (née Loche) le suivant en 1949, à 83 ans. Le château Desbordes fut ensuite racheté par la municipalité d'Avize qui y fit installer le Collège d'Enseignement Général, puis la Maison des Associations","habitants":"Famille De Cazanove                 Famille de Paul Desbordes\"","divers":"Deux châteaux dans cet article Avize grav-1 Debordes grav-2 -3                            Avize et débordes                                           GPS : 48° 58' 20\" Nord 4° 00' 37\" Est","gps":"48° 58' 20\" Nord 4° 00' 37\" Est","images":["../../jctruffet.com/image/image_51/51_Avize_Desbordes_1.jpg","../../jctruffet.com/image/image_51/51_Avize_Desbordes_2.jpg","../../jctruffet.com/image/image_51/51_Avize_Desbordes_3.jpg"]},"Consult_chateau_formulaire801e":{"id":"Consult_chateau_formulaire801e","dept":"51","canton":"Blancs-Coteaux","commune":"Marcilly sur Seine","nom":"Barbanthall","type":"Château","periode":"XVIII-XIX","histoire":"BARBANTHALL, était une maison forte en 1453 appelée Pont-Viel, l'édifice sera remmplacé par une demeure plus imposante, démolie dans le dernier quart du XVIIIe siècle par le marquis de Galliffet seigneur du lieu  pour construire un nouveau château qui sera rasé sous la Révolution, les Galliffet ayant entretenu de mauvaises relations avec la population locale. Après la tourmente le domaine est restitué, il passe par héritage à la marquise de Barbenthane née Galliffet dont le nom déformé à donné Barbanthall, vendu en 1861, acquise par la famille Pinart qui vers 1877 fait édifier le château. Entré en possession de Franz Thiery de Cabanes, connu dans le monde hippique, fait construire en 1900 un haras pour l'élevage des trotteurs. Puis par héritage à sa fille, Mme Emmanuel Derode, puis à la fille de cette dernière, la comtesse René Paulze d'Ivoy de la Poype. Barbanthall appartient aujourd'hui à ses enfants.","architecture":"BARBANTHALL, de style Louis XIII, élevé sur un sous sol en pierre meulière, un rez-de-chaussée accessible par un pérron à double révolution sur l'une des façades, un étage carrée et un étage dans les combles éclairés par des lucarnes sommées de frontons. Le corps principal s'encadre entre deux pavillons en légère saillies, les travées et les angles sont soulignés par des chaînes verticales en pierre se détachant sur l'appareil  de brique. L'ensemble de dimensions assez modestes, s'inspire du style Louis XIII.","habitants":"Famille de  Franz Thiery de Cabanes\"","divers":"Barbanthall à  Marcilly sur Seine\nGps 48° 33' 27? nord, 3° 42' 36? est","gps":"","images":["../../jctruffet.com/image/image_51/51_Barbanthall_1.jpg","../../jctruffet.com/image/image_51/51_Barbanthall_2.jpg"]},"Consult_chateau_formulaire99db":{"id":"Consult_chateau_formulaire99db","dept":"51","canton":"Vitry-le-François","commune":"Baye","nom":"Baye_Aulnay","type":"Château","periode":"XVIII","histoire":"trois châteaux dans cet article Baye et Aulnay .                                    BAYE, terre natale de Paul de Condi  mais aussi de Marion de Lorme, célèbre courtisane qui inspira Victor Hugo.  Au XIIe siècle, Hugues III de Broyes, baron de Baye, épousa la petite-fille du roi Louis VI le Gros. La chapelle élevée au début du XIIIe siècle, par Simon de Chateauvillain, rappelle cette époque faste. Héritiers des familles de Conflans et de Vaudenay, les Béthune vendirent en 1554 la baronnie de Baye à François de Clèves, duc de Nevers, gouverneur de Champagne et de Brie, qui fit élever sur le côté nord de la cour une double galerie et un pavillon dangle. En 1603, Catherine de Clèves, duchesse de Guise, vendit le domaine à Jean Delon Delorme, président-trésorier de France en Champagne, père de la célèbre Marion Delorme (1613-1650) qui passa son enfance à Baye. Lentrée charretière, au sud, avec son encadrement classique, doit remonter aux travaux de Jean Delorme. En 1660, Pierre Larcher, marquis dEsternay, conseiller au grand conseil et président de la chambre des comptes, se rendit adjudicataire du château et des cinq grosses fermes. Il nhabita pas plus Baye que son fils Michel, intendant de Champagne, qui échangea le domaine en 1708 avec son beau-frère Etienne Berthelot de Pléneuf.                                                                                                                            A  une dizaine de K.M. à l'est le château AULNAY-Aux Planches, Il date du XVIIe siècle. Racheté en 2000, il a été reconverti en gite d'hôtes. Puis a ouvert en 2004. par Mme Laurence Cordonnier sera ravie de vous accueillir pour un week-end chaleureux ou une semaine, voir plus, passionnante en découvertes, sur réservation.","architecture":"BAYES,  ce nest quau milieu du XVIIIe siècle que François Berthelot, baron de Baye, lieutenant général des armées du Roi et attaché à la cour de Lorraine, fit moderniser le château: il fit régulariser les percements, revêtir les façades dun enduit uniforme, construire un grand escalier de pierre et réaménager les appartements. Il se garda bien, cependant, de modifier la fort belle chapelle, entièrement voûtée et vitrée à l'antique. Demeuré dans sa postérité, le château appartint au début du siècle au baron Joseph de Baye, archéologue et père de la préhistoire en Champagne, dont la galerie nord abrita les collections jusquà leur transfert au musée de Saint-Germain en-Laye, en 1910. éprouvé par la guerre de 1914-1918, occupation par le prince royal Ruprecht de Bavière et passage des troupes, lédifice perdit lors dune vente, en 1934, tout ce qui en faisait le décor intérieur: mobilier, boiseries et peintures, notamment de remarquables uvres de Nattier et de Largillière. Affecté aux centres de Jeunesse, puis livré à labandon et au vandalisme, il était très délabré en 1959, lorsque Mile Yolande de Baye en fit don à loeuvre des foyers de charité qui le fit réparer, redistribuer les appartements et surélever l'aile nord. Une terrasse, autrefois plantée darbres, sépare la route du château dont les bâtiments entourent une cour pavée. On reconnaît au fond le corps d'habitation principal, cantonné de pavillons et de tourelles polygonales. Dans ses murs très épais, hérités du Moyen-Age, ont été percées de nombreuses fenêtres dont la distribution régulière date des remaniements du XVIIIe siècle.","habitants":"Baron François Berthelot\"","divers":"trois châteaux dans cet article Baye et Aulnay.  Baye grav 1-2-3                                                            Aulnay grav-4 GPS : 48° 50' 43\" Nord, 3° 57' 54\" Est","gps":"48° 50' 43\" Nord, 3° 57' 54\" Est","images":["../../jctruffet.com/image/image_51/51_Baye_Aulnay_1.jpg","../../jctruffet.com/image/image_51/51_Baye_Aulnay_2.jpg","../../jctruffet.com/image/image_51/51_Baye_Aulnay_3.jpg","../../jctruffet.com/image/image_51/51_Baye_Aulnay_4.jpg"]},"Consult_chateau_formulairede13":{"id":"Consult_chateau_formulairede13","dept":"51","canton":"Sézanne","commune":"Bergères-sous-Montmirail","nom":"Bergères","type":"Château","periode":"XVII","histoire":"BERGERES, situé dans la vallée du Petit-Morin, ce petit château remplace la demeure où naquit en 1621 Françoise de Nargonne, qui épousa le vieux duc d'Angoulême qui mourut à Montmort en 1713. au XVIIIe siècle  le domaine est acquis par  Nicolas Guérard à qui on attribue la construction du château  avocat au parlement de Paris, qui hérita en 1726 de son père, receveur général des fermes à Troyes, et épousa en 1730 Marie-Pélagie de Milleville. Héritière de Bergères, Louis-Pélagie Guérard épousa son cousin Jean-Vincent de Milleville qui, dit-on, se tua en 1777 en tombant dun échafaudage. La veuve  fit interrompre les travaux et, en 1786, vendit le domaine au comte Lefebvre de Plinval, fils dun avocat au parlement. Et par alliance à la famille Pusy-Lafayette L'ensemble a été restauré avec beaucoup de goût par le comte de Pusy-Lafayette, descendant direct du Général La Fayette.","architecture":"BERGERES, un plan de 1733 montre le corps de logis tel qu'il se présente aujourdhui, sans les corps intermédiaires qui, jusqu'aux années 1960, le reliaient aux dépendances latérales. Il précise aussi le tracé de la cour dhonneur, avec sa grille encadrée de fossés et ses allées pavées, lordonnancement des cours latérales et celui des parterres dessinés en terrasses, près de la longue pièce deau. Couvert dun comble à la Mansart, le corps de logis présente des façades classiques, au développement modeste, élevées en moellons enduits et renforcées par des chaînes dangle en besace. Au centre de chacune dentre elles se détache un avant-corps encadré de refends, large du côté du jardin, plus étroit sur la cour où laccompagnent de courtes ailes. La distribution intérieure a conservé ses volumes dorigine: au revers de la façade, vestibule et escalier orné dune rampe en fer forgé; sur le jardin, enfilade de pièces de réception habillées de sobres boiseries; petits appartements entresolés dans les ailes latérales. Éléments protégés MH : les cinq pièces lambrissées du rez-de-chaussée ; les façades et les toitures des quatre bâtiments des communs ; la partie ordonnancée du parc avec sa pièce d'eau : inscription par arrêté du 29 décembre 1982. La grille d'entrée ; les façades et les toitures du château ; le hall d'entrée, la cage d'escalier avec sa rampe en fer forgé : classement par arrêté du 29 décembre 1982.","habitants":"Famille de Nicolas Guérard\"","divers":"Bergères-sous-Montmirail                            GPS : 48° 50' 39\" Nord, 3° 35' 33\" Est","gps":"48° 50' 39\" Nord, 3° 35' 33\" Est","images":["../../jctruffet.com/image/image_51/51_Berg%c3%a8res_1.jpg","../../jctruffet.com/image/image_51/51_Berg%c3%a8res_2.jpg"]},"Consult_chateau_formulairef206":{"id":"Consult_chateau_formulairef206","dept":"51","canton":"Sermaize-les-Bains","commune":"Bignicourt sur Saulx","nom":"Bignicourt","type":"Château","periode":"XVIII-XIX","histoire":"BIGNICOURT, Pierre Langault, trésorier de France à Châlons, acquit en 1654 la motte de Bignicourt-sur-Seaux environnée de fossés et, quatre ans plus tard, obtint non seulement lautorisation de faire construire et parachever sa maison de Bignicourt, mais aussi de la doter de fossés et dun pont-levis sil le jugeait utile. Le roi souhaitait créer des refuges permettant de soustraire les populations aux exactions de bandes armées qui sétaient multipliées lors de la Fronde. Tout devait être achevé lorsque, le 6 mars 1680, le jour des Cendres, Pierre Langault eut lhonneur de recevoir la dauphine. Marie-Anne de Bavière entendit la messe dite par Bossuet dans la chapelle du château Langault, dîna et repartit pour Vitry. À Pierre Langault, devenu bailli de Vitry, succéda sa petite-fille Marie-Anne, comtesse de Houdan, qui mourut en 1761 couverte de dettes. Saisie par ses créanciers, la terre de Bignicourt fut adjugée en 1778 à Jean-Baptiste Barbat, un riche cultivateur qui abandonna le château à une lente dégradation. Lorsquen 1818, le second de ses fils épousa la rémoise Clémentine Andrieux, il fit abattre ce qui subsistait, combler les douves et bâtir le château actuel, quil accompagna en 1837 dune chapelle néogothique. Laissé à labandon après la mort de Mme de La Porte, née Pauline Barbat de Bignicourt, en 1951, le domaine a fait lobjet dun début de restauration. Fabrice Charton, a racheté le château de Bignicourt-sur-Saulx, en 2002, dans le but de le restaurer.","architecture":"BIGNICOURT,  voilà une demeure atypique, tant par lépoque de sa construction que par son allure et son environnement, plus fréquents dans les collines de Vénétie que dans la campagne du Perthois. élevée sur une colline gazonnée, devant les sinuosités de la Saulx, cette demeure néoclassique sinspire de la célèbre Malcontenta de Palladio. La façade sud sorganise autour dun grand portique \"in antis\" dont les colonnes et les pilastres à chapiteaux ioniques supportent un large fronton triangulaire. L'important soubassement, réservé au service, correspond à une terrasse accessible par deux escaliers latéraux. La simplicité des lignes et la nudité des maçonneries, en pierre de Savonnières, mettent en valeur le jeu des volumes et des surfaces. À lintérieur, le vestibule, le salon, la salle à manger et la chambre principale sorganisent autour dune sorte datrium à éclairage zénithal, orné de faux marbre aux tons pompéiens et entouré dune galerie à létage.  Éléments protégés MH : le château : le bâtiment principal en totalité, les deux pavillons (pigeonnier et four à pains): Le parc du château : inscription par arrêté du 18 octobre 2005.","habitants":"Famille   Jean-Baptiste Barbat,\"","divers":"Bignicourt sur Saulx GPS : 48° 45' 58\" Nord, 4° 46' 26\" Est","gps":"48° 45' 58\" Nord, 4° 46' 26\" Est","images":["../../jctruffet.com/image/image_51/51_Bignicourt_1.jpg","../../jctruffet.com/image/image_51/51_Bignicourt_2.jpg"]},"Consult_chateau_formulairef3fc":{"id":"Consult_chateau_formulairef3fc","dept":"51","canton":"Dormans","commune":"Bligny","nom":"Bligny_Marne","type":"Château","periode":"XVIII","histoire":"BLIGNY, le château de Bligny est une construction issue d'un château fort médiéval et chef lieu de châtellenie de la commune éponyme. La châtellenie se composait de Bligny, Belroy, les Cabots, le Pré-Bannois et une partie de Bossancourt en 1553. Il fut la propriété, au XVIIIe siècle, des Dinteville puis, par succession, du comte André de Dampierre au milieu du XIXe siècle.  Il fut la propriété, qui avait un équipage de chasse à courre et un haras. Dans les années 1950 la propriété du château passe à la famille Lambert. Ultérieurement, c'est l'homme politique Jean-Marie Le Pen qui sera propriétaire du château et des vignobles adjacents  en tant qu'héritier d'Hubert Lambert.","architecture":"BLIGNY, cette propriété associée à G.H. Martel & de Cazanove, est édifiée en 1773 sur les ruines dun château féodal (tourelle et aile ajoutées au XIXe siècle). Le château de Bligny domine le village et la vallée du Landion dont la source située sous les caves lalimente encore aujourdhui. La porte principale est un ancien vestige de lancien château médiéval de style Louis XIII avec de fines décorations sculpturales de raisins et de pampres. Le château est cité en 1465, avait une chapelle castrale sous le vocable de Sainte-Catherine, mais elle est ruinée en 1770.  Sur des caves anciennes, s'élève un bâtiment XVIIIe siècle avec une aile et une tourelle du XIXe siècle.Il est actuellement une maison de champagne.","habitants":"Famille  des Dinteville  \"","divers":"Bligny  48° 10' 21? nord, 4° 37' 02? est","gps":"","images":["../../jctruffet.com/image/image_51/51_Bligny_Marne_1.jpg","../../jctruffet.com/image/image_51/51_Bligny_Marne_2.jpg","../../jctruffet.com/image/image_51/51_Bligny_Marne_3.jpg"]},"Consult_chateau_formulaire4732":{"id":"Consult_chateau_formulaire4732","dept":"51","canton":"Dormans","commune":"Boursault","nom":"Boursault","type":"Château","periode":"XIX","histoire":"BOURSAULT, la célèbre veuve Clicquot, née Ponsardin, possédait à Oger un petit château au milieu des vignes. Après le mariage de sa fille Clémentine avec le comte de Chevigné en 1817, elle acheta le domaine de Boursault, sur la rive sud de la Marne, et la terre de Villers-en-Crayère. Mais ce nest que vingt ans plus tard, après le mariage de Marie-Clémentine de Chevigné avec le comte de Mortemart, quelle se laissa convaincre de faire construire une nouvelle demeure, face au vaste panorama de la vallée de la Marne. Mme  Ponsardin dit veuve  Clicquot fit graver sur la façade principale la sentence latine: Natis mater, cest-à-dire: Une mère à ses enfants. À lintérieur, Clagman sculpta les boiseries de la salle à manger et du grand salon, Levastre peignit le plafond du boudoir. L'architecte fit aussi remodeler la colline quil transforma en un vaste parc paysager, agrémenté de rochers, de belvédères et dun bassin dont le jet deau atteignait 25 mètres de haut. Il fit également tracer une longue allée rectiligne, traversant un pont rocheux, pour rejoindre les grands bois du plateau. Dans la grande serre à fleurs, maintenue à 30° en atmosphère humide, Louis de Mortemart acclimata lorchidée.  Exploitant viticole de Champagne.","architecture":"BOURSAULT, la construction du château de Boursault date de 1842 à 1848. Son Propriétaire initial était Louis de Chevigné. Jean Jacques Nicolas Arveuf-Fransquin en fut l'architecte. Il travaillait à la cathédrale de Reims. quelle se laissa convaincre de faire construire une nouvelle demeure, face au vaste panorama de la vallée de la Marne, avec hauts combles à la française, tours, tourelles et lucarnes ouvragées.C'est un château de style Renaissance. Ce magnifique château qui surplombe la Vallée de la Marne, inspiré, dit-on, de Chambord, fut construit en 1845 par madame Ponsardin, Veuve Cliquot. Il comporte 365 ouvertures, fenêtres et portes, une pour chaque jour de lannée. Le château de Boursault appartient à une grande maison de champagne. Quant au corps de logis de lancien château, flanqué dune tour et dune tourelle en encorbellement, il devint lhabitation du régisseur. Vestige de louvrage fortifié médiéval, possession de la famille dAnglure jusqu'au début du XVIIe siècle, il avait appartenu à Nicolas Dauvet des Marets, grand fauconnier de France (1650) et gouverneur du Beauvaisis, puis à M. Charpentier, président au présidial de Tours, et enfin au comte d'Orsay qui, en 1814, navait pu empêcher les troupes bavaroises de le piller. Mme Clicquot neut pour descendance quune arrière petite-fille, Anne de Mortemart, la célèbre duchesse dUzès, qui figure à ses pieds dans le tableau de Cogniet actuellement conservé à Brissac. Vendu en 1912, saccagé en 1945 lors de son occupation par les troupes alliées, le château nest plus habité. Il appartient à M. Nourhan Fringhian.","habitants":"Madame Ponsardin,  veuve Clicquot\"","divers":"Boursault  GPS : 49° 03' 50\" Nord, 3° 51' 01\" Est","gps":"49° 03' 50\" Nord, 3° 51' 01\" Est","images":["../../jctruffet.com/image/image_51/51_Boursault_1.jpg","../../jctruffet.com/image/image_51/51_Boursault_2.jpg"]},"Consult_chateau_formulaire714e":{"id":"Consult_chateau_formulaire714e","dept":"51","canton":"Fismes","commune":"Bouvancourt","nom":"Bouvancourt","type":"Château","periode":"XV-XVII","histoire":"BOUVANCOURT, au XIIIe siècle, Vaux Varennes est également une seigneurie particulière. On trouve trace de Fourquaud de Vaux en janvier 1238 puis de Guyard, nommé écuyer de Vaux en 1269-1270 et enfin de Lionnet du Sart, seigneur de Vaux, dans une condamnation du 25 juin 1456. Au XIVe siècle, Bouvancourt est administré par un maire et trois échevins. Le maire est certainement nommé par la seigneurie, mais les échevins sont peut-être nommés par la communauté car l'hôtel-Dieu ne revendique pas le droit de les nommer contrairement à d'autres villages. Les habitants se réunissent par ailleurs à plusieurs reprises en assemblée générale pour imposer des tailles et établir des procureurs. La seigneurie les poursuit pour cela et il est convenu le 20 mai 1345 qu'ils doivent désormais demander la permission de former des assemblées.","architecture":"Prieuré, au hameau de Châlons-le-Vergeur, ancien prieuré de lordre de Malte, Michèle Chantraine a fait de cette demeure, un restaurant accueillant des petits groupes de 20 à 30 personnes pour des repas en famille ou des séminaires professionnels. \nChâteau de Vaux Varennes, construit à l'emplacement d'une ancienne forteresse médiévale à Vaux Varennes,  en direction d'Hermonville,","habitants":"Famille de Guyard\"","divers":"Trois châteaux Bouvancourt grav-1 le prieuré grav-2     Varennes grav-3                              Bouvancourt 49° 20' 20? nord, 3° 50' 07? est","gps":"","images":["../../jctruffet.com/image/image_51/51_Bouvancout_1.jpg","../../jctruffet.com/image/image_51/51_Bouvancout_2.jpg","../../jctruffet.com/image/image_51/51_Bouvancout_3.jpg"]},"Consult_chateau_formulaire6135":{"id":"Consult_chateau_formulaire6135","dept":"51","canton":"Sainte-Menehould","commune":"Braux Ste-Cohière","nom":"Braux","type":"Château","periode":"XVI-XVII","histoire":"BRAUX, construite par la famille de saullx au début du XVIIe siècle la demeure devait abriter une garnison de chevau-légers, formation d'élite chargée de surveiller la frontière du royaume, face au duché de Lorraine. A laustérité dune ordonnance quasi militaire, elle allie léclat dun appareil brique et pierre extrêmement soigné. Seigneur de Braux-Sainte-Cohière à la fin du XVIe siècle, Philippe de Thomassin devint en 1588 gouverneur de Châlons sur Marne, Daniel Drouet lui succéda au début du XVIIIe siècle et, Le domaine passa par héritage à Géoffroy le Gorlier seigneur de Verneuil  procurer du roi en 1765, à Daniel Drouet avocat. Charles-Louis Drouet, ancien capitaine d'infanterie, vendit la seigneurie, à Adam-Claude dOrigny, capitaine au régiment de Champagne- infanterie, les citoyennes Dorigny  furent autorisées à demeurer à Braux, à la double condition de convertir les bâtiments à usage agricole et den faire disparaître les attributs seigneuriaux. La fille d'Adam Claude , Marie épouse Joseph Constantin qui parvient à racheter Braux et installe sa demeure.  Cest à Braux-Sainte-Cohière quà la veille de Valmy, Dumouriez établit le P.C. des troupes françaises. Saccagés à plusieurs reprises par le passage des troupes, convertis en exploitation agricole, puis en hôpital militaire et en cantonnements pour les troupes américaines, au cours de la guerre de 1914-1918, en 1921 la propriété à la famille de Dartein, et en 1969 le domaine est acquis par monsieur Bussinger, qui en fait un centre danimation privilégié de l association culturelle Champagne-Ardennes, primé au concours chefs-duvre en Péril, par la fondation de France et par plusieurs associations de sauvegarde du patrimoine.","architecture":"BRAUX, élevé au XVIIe siècle, comme en témoigne sa façade de briques, rehaussée de cordons et de chaînes de pierre appareillées en relief, le corps dhabitation doit aux remaniements opérés au XVIIIe le profil courbe des linteaux de ses baies et celui de son comble à la Mansart, couvert en ardoise. Sur la droite venait saccoler le grand manège carré, abattu au début du siècle, qui achevait de fermer la cour. Le pigeonnier octogonal, brique et pierre au rez-de-chaussée, colombage recouvert dardoise à létage, abrite un petit musée régional dorientation. Quant aux dépendances, dotée dune superbe charpente et dune galerie de bois; salle de concerts et de conférences dans le bâtiment symétrique. La Tuile d'Or quy décerne un jury vise à encourager la restauration de maisons anciennes dans le respect de loriginalité régionale et de la qualité de vie. Quant au désormais célèbre Noël des Bergers, la chute de lélevage du texel en Argonne risque de le remettre en question, tout au moins dans lauthenticité qui a fait sa réputation. Au fond, face au logis, un tapis vert rejoint les allées dentraînement tracées dans le bois et lobélisque qui marque laxe de la composition, classement par arrêté du 12 octobre 1972 les bâtiment ont cependant gardé leur caractère et leur authenticité, mis en valeur par une restauration attentive. De larges douves entourent le terre-plein à peu près carré qui leur sert dassise. Un pont dormant conduit au grand portail de pierre, orné de pilastres et dun fronton courbe, qui sépare de vastes corps de dépendances aux combles débordants, à faible pente, couverts de tuile romaines reposant sur un plancher déclatés de chêne, comme il est dusage en Champagne humide. Flanquées de hautes tours dangle cylindriques, ces dépendances doivent beaucoup de leur caractère au parement continu, fait dassises alternées de briques et de pierre de gaize, et régulièrement scandé par des jambes de pierre, qui se poursuit sur les bâtiments de service en retour, de part et dautre de la cour.","habitants":"famille de saullx  et la famille d' Adam-Claude dOrigny\"","divers":"Braux Ste-Cohière                                         GPS : 49° 05' 33,73\" Nord, 4° 49' 38,92\" Est","gps":"49° 05' 33,73\" Nord, 4° 49' 38,92\" Est","images":["../../jctruffet.com/image/image_51/51_Braux_1.jpg","../../jctruffet.com/image/image_51/51_Braux_2.jpg","../../jctruffet.com/image/image_51/51_Braux_3.jpg","../../jctruffet.com/image/image_51/51_Braux_4.jpg","../../jctruffet.com/image/image_51/51_Braux_5.jpg","../../jctruffet.com/image/image_51/51_Braux_6.jpg"]},"Consult_chateau_formulaire0320":{"id":"Consult_chateau_formulaire0320","dept":"51","canton":"Sézanne","commune":"Broyes","nom":"Broyes_Marne","type":"Château","periode":"XVII","histoire":"BROYES,   en 1580 les troupes protestantes brûlèrent le village le château et l'église. Au XVIIe siècle, le bourg de Broyes est une baronnie tenue par la famille Barbin qui l'a acquise à la fin du XVIe siècle. Sa situation, au sommet d'un plateau calcaire, a favorisé sa défense et son développement. À cette époque, on y comptait deux églises (Saint-Blier la collégiale et l'église paroissiale Saint-Martin). Le château dit des Pucelles disposait d'une chapelle (Notre-Dame). Aujourd'hui la mairie de Broyes occupe les restes du château des Pucelles où le général Humbert dut replier son P.C. le 7 septembre 1914. Le château de Broyes sert de chambres d'hôtes. Il est accolé à la Mairie de Broyes.","architecture":"BROYES,  mentionné depuis le XIe siècle et berceau de lune des plus puissantes familles de Champagne, subsiste un pavillon flanqué dune échauguette à pans de briques, jouxtant lancienne entrée reconnaissable à son arcade charretière, à la feuillure de son pont-levis et aux traces de sa herse (début du XVIIe siècle). Hôtel de Ville. On peut encore admirer la porte du château de la Haute-Feuille ou des Pucelles. Il ne reste que quelques vestiges dont la porte du château de Broyes que l'on peut observer de l'extérieur.","habitants":"Famille Barbin\"","divers":"Broyes                                                                 GPS : 48° 45' 34\" Nord, 3° 45' 59\" Est","gps":"48° 45' 34\" Nord, 3° 45' 59\" Est","images":["../../jctruffet.com/image/image_51/51_Broyes_Marne_1.jpg","../../jctruffet.com/image/image_51/51_Broyes_Marne_2.jpg"]},"Consult_chateau_formulaire7edd":{"id":"Consult_chateau_formulaire7edd","dept":"51","canton":"Epernay","commune":"Brugny-Vaudancourt","nom":"Brugny","type":"Château","periode":"XVI-XVIII","histoire":"BRUGNY, la première mention de la seigneurie de Brugny date de 1223 par l'hommage que Guy  de Châtillon rendit pour cette terre au comte de Champagne qui fait partie des seigneurs de Robert III qui la vend en 1320 à Geoffroy de Naast, Béatrice leur fille l'apporte en dot à Philippe de Terriers seigneurs de St-Mars. Par alliance  en 1470 Brugny à Robert de St-Blaise dont le fils, Louis rebâti la maison forte dont Oger terminera en château. Au XVIIe siècle, le château toujours dans la descendance des St-Blaise  passe  par mariage à Nicolas de Hautoy qui décéde en 1759 son successeur, César de Maizières comte de Brugny, laisse le domaine à sa fille la marquise d'Estournel qui décède en 1788. Le Roi Henri IV y aurait séjourné à la suite du siège d'Epernay. La particularité du château de Brugny et de n'avoir jamais été vendu, de son origine à aujourd'hui. En 1844 dont seule l'aile des dépendances fait l'objet des transformations vers 1825 et échoit à au comte Gaspard de Clermont-Tonnerre. Acquit par l'aïeul de son actuel propriétaire le comte Jean-Ghislain Eudes d'Eudeville. Le château est inscrit aux M.H. depuis le 17/05/1990.","architecture":"BRUGNY, la construction du château de Brugny date du XVIe et XVIIIe siècle. Le château médiéval était construit selon un plan quadrangulaire flanqué de quatre tours rondes. Entouré   de douves en eau. Une cinquième faisait office de donjon et protégeait l'entrée du château. Elle est le vestige de l'ancien château détruit pendant la Guerre de Cent-Ans. Il était entouré de larges fossés. Des quatre ailes il n'en reste aujourd'hui que deux. La tour carrée sur la façade nord date du XIIIe siècle  cantonnée de  d'échauguettes en brique reposant sur des bases moulurées. Le château de Brugny et son fief relevaient de la seigneurie d'Epernay.","habitants":"Famille de César de Maizières \"","divers":"Brugny-Vaudancourt                                  GPS : 48° 59' 38,65\" Nord, 3° 53' 17,8\" Est","gps":"48° 59' 38,65\" Nord, 3° 53' 17,8\" Est","images":["../../jctruffet.com/image/image_51/51_Brugny_1.jpg","../../jctruffet.com/image/image_51/51_Brugny_2.jpg"]},"Consult_chateau_formulairea219":{"id":"Consult_chateau_formulairea219","dept":"51","canton":"Châlons-en-Champagne","commune":"Châlons-en-Champagne","nom":"Chalon_Champagne","type":"Château","periode":"XVII-XVIII","histoire":"quatre  châteaux dans cet article Fontenay, Jacquesson, Casllane et l'Arc porte, et du Marché.                                                                                                                                                                JACQUESSON    Issue d'un famille qui a fait sa fortune dans le Champagne, Eugène Jacquesson décide de faire construire une résidence en face de son entreprise. Le château fut construit, entre 1863 et 1866, sur des plans du célèbre architecte Eugène Viollet-le-Duc. Il est composé d'une aile centrale avec deux courtes ailes à angle droit et est construit avec des pierres provenant de Savonnière et d'Euville. Il fut successivement l'établissement de vins de champagne Jacquesson, puis une brasserie de la Comète, un entrepôt industriel et actuellement il abrite des bureaux.\nÉléments protégés MH : le château Jacquesson : inscription par arrêté du 13 novembre 1980. C'est un château de style néo-classique, bâti avec des pierres de Savonnière et d'Euville. La construction du château a débuté en 1863 et s'est achevée en 1866. Son premier propriétaire était Eugène Jacquesson. Il en avait fait sa maison d'habitation face à son entreprise spécialisée dans le champagne. L'association l'ADEME est installée dans les murs du château Jacquesson aujourd'hui.                                                                   FONTENAY, Lieu de villégiature de religieux pendant des décennies, le château de Fontenay profite depuis vingt-cinq ans aux enfants en tant que centre aéré à Saint-Memmie  accueille le centre aéré (ALSH) depuis plusieurs années. Le château de Fontenay comporte 6 salles d'activités,  bibliothèque.","architecture":"Du MARCHE est construit au-dessus du Nau. Il est installé sur un pont qui date du XVIIe siècle.Le pont est fortifié, il faisait partie des remparts de la ville. Il enjambait le Nau, à son entrée dans la ville et, fut reconstruit, en 1602, sur l'ordre du Vidame Philippe de Thomassin. Il est aussi connu sous le nom de château du Marché, à cause de la proximité de la place du marché ou sous celui de pont des archers, à cause de la maréchaussée qui y logeait ses chevaux mais aussi comme la caisse d'Épargne à cause de sa face sur place qui a abrité la banque. Le château du Marché possède un aspect, selon la face où il est regardé il intégre l'ancienne face extérieure du pont fortifié sur le Sud et le Jard. Il a été réalisé selon les plans d'Alexis Vagny, architecte de la ville, de 1869-1870. La tourelle sur le jardin fut surélevée à cette occasion. En 1897, on y a adjoint deux pavillons latéraux réalisés selon les plans de l'architecte Paul George. En 1980, la caisse d'épargne fut remplacée par la caisse des dépôts et consignations.","habitants":"Famille de Eugène Jacquesson\"","divers":"Trois châteaux dans cet article Frontenay grav-6, Jacquesson grav 4-5, Casllane grav 2 et l'Arc porte Grav-1  et du Marché grav-3.   Marché; GPS : 48° 57' 15\" Nord, 4° 21' 43\" Est                                                               Fontenay Grav 6  GPS : 48° 57' 13\" Nord, 4° 23' 02\" Est                                                 Jacquesson GPS : 48° 57' 15,47\" Nord, 4° 20' 33,39\" Est","gps":"48° 57' 15\" Nord, 4° 21' 43\" Est","images":["../../jctruffet.com/image/image_51/51_Chalon_Champagne_1.jpg","../../jctruffet.com/image/image_51/51_Chalon_Champagne_2.jpg","../../jctruffet.com/image/image_51/51_Chalon_Champagne_3.jpg","../../jctruffet.com/image/image_51/51_Chalon_Champagne_4.jpg","../../jctruffet.com/image/image_51/51_Chalon_Champagne_5.jpg","../../jctruffet.com/image/image_51/51_Chalon_Champagne_6.jpg"]},"Consult_chateau_formulairea064":{"id":"Consult_chateau_formulairea064","dept":"51","canton":"Châlons-en-Champagne","commune":"Vassimont et Chapelaine","nom":"Chapelaine","type":"Château","periode":"XVI-XX","histoire":"CHAPELAINE  Thibault, comte de Champagne, possédait au XIIe siècle un château fort à Chapelaine. En 1597, Catherine de Clèves, duchesse de Guise, vendit la baronnie à Nicolas Largentier qui entreprit la construction dune vaste et somptueuse demeure, achevée par sa veuve, Marie Le Mairat et par son fils Georges, adjudicataire général des fermes du Roi. En 1696, au cours dune expérience alchimique, dit-on, Henri-Louis Largentier, marquis de Chapelaine, provoqua une explosion qui entraîna lincendie et la ruine complète de lédifice. À Antoine Mégret dEtigny, seigneur de la baronnie de Chapelaine en 1761, succédèrent Jean-Louis Thomas de Pange en 1778, puis Jean-François Chassepot de Bourdin en 1788 dont les héritiers conservèrent le domaine au   XIXe siècle.","architecture":"CHAPELAINE, le château plus modeste reconstruit à proximité brûla à son tour le 7 septembre 1914. Il doit à sa restauration le profil de ses combles, caractéristique des années 1920. La ferme voisine a conservé deux porches monumentaux.","habitants":"Antoine Mégret dEtigny,\"","divers":"Vassimont et Chapelaine                         48° 34' 47? nord, 4° 29' 55? est","gps":"","images":["../../jctruffet.com/image/image_51/51_Chapelaine_1.jpg"]},"Consult_chateau_formulaireb3c0":{"id":"Consult_chateau_formulaireb3c0","dept":"51","canton":"Dormans","commune":"Montmort-Lucy","nom":"Charmoy","type":"Château","periode":"XIX","histoire":"CHARMOY, au soir de la bataille de Champaubert, en 1814, Monsieur Hémard, maire de Montmort-Lucy et propriétaire du château de la Charmoy, sentretient avec Napoléon. La façade orientale a échappé aux restaurations menées au XIXe siècle, sensibles dans les parties hautes: suppression des tuiles au profit de lardoise et modification de la pente des combles.                                                château des Castaigne  siège société Financière Vranken","architecture":"CHARMOY, réunion de la commune de Montmort à celle de Lucy en 1973 ; mentions de Montmort en 1042 et de Lucy en 1235 ; avant la Révolution, l'église de Montmort relevait du diocèse de Châlons, archidiaconné et doyenné de Vertus, et celle de Lucy du diocèse de Soissons, archidiaconné de Brie et doyenné d'Orbais, le prieur de Montmort décimait ; l'ensemble dépendait de l'élection d'Epernay et était régi par la coutume de Vitry. Le château de La Charmoye, construit en 1750, autrefois appelé Charmoie des Bois) est issu d'une abbaye fondée par les cisterciens en 1167, et disparue pendant la Révolution Française.","habitants":"Famille de monsieur Hémard\"","divers":"Château de Charmoy","gps":"","images":["../../jctruffet.com/image/image_51/51_Charmoy_1.jpg","../../jctruffet.com/image/image_51/51_Charmoy_2.jpg"]},"Consult_chateau_formulaire6dca":{"id":"Consult_chateau_formulaire6dca","dept":"51","canton":"Dormans","commune":"Congy","nom":"Congy","type":"Château","periode":"XVI","histoire":"CONGY,entièrement remanié au début du XXe siècle dans un style opulent inspiré de la fin du XVIe siècle, le château de Congy semble abandonné. Entouré dun beau parc paysager, il conserve un pigeonnier et un intéressant pavillon dentrée du début du XVIIe siècle, avec arcade charretière, passage piétonnier et meurtrières latérales. Ancienne possession de la famille de Conflans, la terre de Congy appartint au XVIe siècle à Florentin de Béthune, gentilhomme de la chambre du Roi de Navarre et tuteur du futur Sully.","architecture":"CONGY de plan oblong, le corps de logis rectangulaire à neuf travées  sur deux niveaux et série de lucarnes sur comble du  toit en croupe entre deux pavillons latéraux toit à l'impérial  le château possédait en 1886 un escalier en pierre et un salon orné de peintures mythologiques, remontant probablement à Bénigne Chasot, président au parlement de Metz, seigneur de Congy en 1704.","habitants":"Famille de  Florentin de Béthune       \"","divers":"Congy                                                              GPS : 48° 51' 37\" Nord, 3° 49' 44\" Est","gps":"48° 51' 37\" Nord, 3° 49' 44\" Est","images":["../../jctruffet.com/image/image_51/51_Congy_1.jpg","../../jctruffet.com/image/image_51/51_Congy_2.jpg"]},"Consult_chateau_formulaire8ad0":{"id":"Consult_chateau_formulaire8ad0","dept":"51","canton":"Châlons-en-Champagne","commune":"Coolus","nom":"Coolus","type":"Château","periode":"XVIII","histoire":"COOLUS , au Moyen-âge, une maison forte, puis un château se développent à Coolus. A partir du XIIe siècle, de nombreux seigneurs s'y succèderont jusquau XXe siècle (les Beschefer, Daoust, Le Rebours).  Le seigneur exerce aussi des pouvoirs de justice. En 1789, à la veille de la Révolution, Coolus comme de nombreux villages du royaume, rédige son cahier de doléances. La population y réclame la suppression des multiples impôts et la réforme de la justice. Elle propose comme tant dautres la création dimpôts plus justes et moins nombreux. Le village néchappe pas non plus à la réforme religieuse qui sannonce à partir de novembre 1789: les biens ecclésiastiques de Coolus furent confisqués et vendus  comme biens nationaux. En juin 1791, le curé de Coolus prêtera serment à la Nation et à la Constitution. En 1870, le village subit loccupation prussienne. La population dût faire face aux réquisitions et à loccupation du château jusquen 1872.","architecture":"COOLUS, cest une seigneurie composée dun château de plan oblong à toit brisés avec  lucarnes sur comble entre deux pavillons de plan carrés  prolonge du côté droit par un bâtment identique à toit en deux pans ,  et son parc, de grosses fermes, chapelle, moulin, terres et bois (sous sa dépendance directe ou confiés à des fermiers moyennant redevance). Lhistoire de son destin tragique est faite de solitude, despoir déçu et de coups du sort pendant des siècles, jusquà sa fin tragique dans les années 2000.","habitants":"Famille des Rebours\"","divers":"Château de Coolus","gps":"","images":["../../jctruffet.com/image/image_51/51_Coolus_1.jpg","../../jctruffet.com/image/image_51/51_Coolus_2.jpg"]},"Consult_chateau_formulaire2fd8":{"id":"Consult_chateau_formulaire2fd8","dept":"51","canton":"Reims","commune":"St-Brice-Courcelles","nom":"Courcelles_Malle","type":"Château","periode":"XVIII","histoire":"COURCELLES, maison de plaisance néo-classique construite en 1831 par l'architecte Antoine Martin Garnaud, Prix de Rome en 1817, pour l'industriel rémois Jobert Paquot, fils du député et maire de Reims, Jobert Lucas. Le bâtiment est très détérioré pendant la première guerre mondiale (toit crevé, intérieur saccagé). Dès 1920, la restauration est menée en respectant l'état ancien (les boiseries Louis XV dans deux pièces du rez-de-chaussée proviennent d'une maison détruite à Charleville). C'est un édifice élevé sur deux niveaux. La partie centrale est surmontée d'un fronton triangulaire. Chaque niveau est rythmé par des pilastres en stuc. Le bâtiment est bati en petits moellons recouverts d'enduit. A l'intérieur, le salon reprend le décor de la façade avec ses pilastres à chapiteaux ioniques appliqués sur les murs.\nÉléments protégés MH : les façades et les toitures ; le salon central au rez-de-chaussée : inscription par arrêté du 30 avril 1999.","architecture":"COURCELLES, ce petit palais construit en 1829 pour le filateur Jobert-Lucas et acquis par Pol Marguet en 1857, ascendant des propriétaires actuels, est blotti dans un parc richement arboré, d'une superficie de 8 ha. Il est de style néo-classique. C'est aussi la maison natale du Colonel Pol Charbonneaux, compagnon de la libération, chef d'escadrille du Groupe Lorraine, qui rejoignit le Général de Gaulle, dès le 17 juin 1940, de son frère Philippe inventeur de la R6, de la R16 et de nombreux bijoux dans l'automobile à Reims. Cette demeure a été occupée ponctuellement par les Français et les Allemands pendant la guerre de 1914-1918. Le Château de Courcelles, après ces évènements, a été restauré à l'identique, en 1920, par Mr René Charbonneaux, le père de Mme Henriot-Charbonneaux, l'actuelle propriétaire des lieux,  reste le témoin des évènements historiques de 1870.                                                                                                                                                              Le château de la MALLE fut détruit suite à un violent incendie en 1975. Il ne reste que des ruines de cet ancien château.                                                         à l'ouest de st-Brice MERFY est un château bâti à Merfy,","habitants":"Famille de  Pol Marguet\"","divers":"Courcelles grav-1-2                               GPS : 49° 16' 07\" Nord, 3° 59' 24\" Est                                                                  La Malle grav-3                                            GPS : 49° 15' 43\" Nord, 3° 59' 12\" Est                                                              Merfy  grav-4                                                  GPS : 49° 17\" 49' Nord, 3° 56' 56\" Est","gps":"49° 16' 07\" Nord, 3° 59' 24\" Est","images":["../../jctruffet.com/image/image_51/51_Courcelles_Malle_1.jpg","../../jctruffet.com/image/image_51/51_Courcelles_Malle_2.jpg","../../jctruffet.com/image/image_51/51_Courcelles_Malle_3.jpg","../../jctruffet.com/image/image_51/51_Courcelles_Malle_4.jpg"]},"Consult_chateau_formulairecb80":{"id":"Consult_chateau_formulairecb80","dept":"51","canton":"Reims","commune":"Reims","nom":"Crayères_Reims","type":"Château","periode":"XIX","histoire":"CRAYERES, construit en 1904, au sommet de la butte Saint-Nicaise par Melchior de Polignac (petit-fils de Madame Pommery), le château des Crayères est à limage de son époque; sobre darchitecture mais donnant une impression de majestueuse puissance. Le début du XXe siècle voit se développer la prospérité industrielle et de merveilleuses nouvelles inventions telle laviation. Cest à proximité du futur château des Crayères quen 1908, Henri Farman viendra se poser après avoir réalisé le 1er voyage en avion dune ville à lautre. Cest dans un parc contigu que le Président de Pommery décidera, à peine quelques années après la construction de son château, doffrir son parc contigu de 22 hectares pour la création dune école de sportifs de toutes disciplines, se voyant décerner à cette occasion le titre de premier mécène sportif de France. Durant sept décennies, le château des Crayères conserve sont affectation initiale de maison familiale des Présidents successifs de la Maison Pommery. En 1979, le domaine est cédé à de nouveaux propriétaires qui décident de transformer ce château en site gastronomique et hôtel permettant daccueillir les hôtes venus découvrir les terroirs et les secrets délaboration des grandes marques de Champagne à lorigine du prestige de la région dans les plus grands pays du Monde. Hôtel restaurant de charme, racheté en 2009, c'est le nouveau siège de la maison de champagne Jacquart. Les propriétaires du château Les Crayères sont la famille X. Gardinier et dernièrement Gérard Boyer.","architecture":"VILLA-DOUCE  date de 1929 à 1934. Elle appartient à l'Université de Reims  Cette villa est issue de la reconstruction d'après-guerre. Elle fut construite, pour André Douce, notaire à Reims, par l'architecte Pol Gosset, en 2 parties, l'une sur la rue qui accueillait l'étude notariale, en retrait de la rue, un immeuble d'habitation et de réception. Les travaux débutèrent, en 1929, en utilisant le béton armé avec une vêture en brique rouge dans un style art déco pour se finir, en 1932. Elle fut restaurée de 1986 à 1987 pour accueillir les bureaux de la S.O.R.E.F.I., Paul Samuel directeur de cet organisme, par Jean-Baptiste Michel architecte DPLG à Reims. L'habitation comprend un escalier suspendu avec une rampe en fer forgé, un vaste salon à musique avec une galerie et un abat-son, une aire semi-circulaire ouvrant par des baies vitrées sur le parc. Ces parties sont classées aux M.H. depuis 1993. La Villa Douce a été, de 1994 à 2021, le siège de la Présidence de l'U.R.C.A. elle est régulièrement le cadre de manifestations culturelles.","habitants":"Famille de  Melchior de Polignac\"","divers":"Crayères grav 1-2-3                       GPS : 49° 15' 46\" Nord, 4° 02' 05\" Est\nVilla-Douce Grav-4                         GPS : 49° 15' 21\" Nord, 4° 02' 27\" Est","gps":"49° 15' 46\" Nord, 4° 02' 05\" Est","images":["../../jctruffet.com/image/image_51/51_Cray%c3%a8res_Reims_1.jpg","../../jctruffet.com/image/image_51/51_Cray%c3%a8res_Reims_2.jpg","../../jctruffet.com/image/image_51/51_Cray%c3%a8res_Reims_3.jpg","../../jctruffet.com/image/image_51/51_Cray%c3%a8res_Reims_4.jpg"]},"Consult_chateau_formulaire0c81":{"id":"Consult_chateau_formulaire0c81","dept":"51","canton":"Dormans","commune":"Cuisles","nom":"Cuisles","type":"Château","periode":"XIII-XVI","histoire":"CUISLES, fondé en 1215 par Baudoin de Ville en Tardenois, avec Gilles et Jacques de Cuisles. Le château fût d'abord une forteresse habitée par les seigneurs de Cuisles et du Tardenois. Au fil des siècles et des propriétaires, la forteresse est devenue le château de Cuisles, il a appartenu successivement à des personnages très influents de France, comme le duc de Salnove (en 1602), ou bien encore à Jean Tapin, lieutenant et conseiller de Louis XV (en 1747). La famille Pascal Delette, viticulteur Champenois de Père en Fils depuis cinq générations en a fait l'acquisition en mars 2000. Au coeur du vignoble champenois, blotti dans un parc de 11 hectares propice aux promenades, le château vous accueille. Vous pourrez profiter du terrain de tennis et déguster du champagne à tout moment de la journée, location chambres d'hôtes.","architecture":"CUISLES, iL appartient à 5 générations de viticulteurs et date du XIIIe siècle. Le château de Cuisles fut fondé par Beaudoin de Ville en Tardenois avec Gilles et Jacques de Cuisles. Cette forteresse au cours des siècles, le château de Cuisles se situe dans un beau parc de 11 hectares. En 1602, il va appartenir à Duc de Salnove, puis en 1747, à Jean Tapin, qui était Lieutenant et Conseiller du Roi Louis XV. En mars 2000, Pascal Delette, un viticulteur champenois, décide de se porter acquéreur du château de Cuisle. Aujourd'hui, il est devenu un gite d'hôtes, dans un cadre enchanteur, agrémenté d'un terrain de tennis, où vous vous détendrez devant une coupe de champagne.","habitants":"famille Pascal Delette,\"","divers":"Château de Cuisles","gps":"","images":["../../jctruffet.com/image/image_51/51_Cuisles_1.jpg","../../jctruffet.com/image/image_51/51_Cuisles_2.jpg"]},"Consult_chateau_formulaire1085":{"id":"Consult_chateau_formulaire1085","dept":"51","canton":"Dormans","commune":"Dormans","nom":"Dormans","type":"Château","periode":"XIV-XVII","histoire":"DORMANS, on attribue la construction du château à Jean de Dormans, évêque de Beauvais, cardinal et chancelier de France en 1361, fondateur du collège de Dormans qui, transféré en 1370 à Paris, est à lorigine du lycée Louis-le-Grand. Endommagé au cours des guerres de religion, cest à la bataille de Dormans quen 1575, Henri de Guise reçut sa célèbre balafre,  des Laon se transmet aux Ancienville avant d'échoir à Michel Larchet d'Olisy , puis à Claude de Bullion.  Devenue propriété du Grand Condé  qui le cède à son frère le prince de Conti et en 1660, Charles de Broglie, comte de Santena, lieutenant général des armées du Roi, l'acquit  dont il obtint, onze ans plus tard, lérection en marquisat. Il dut faire reconstruire le corps de logis où il mourut en 1702. Son fils Maurice poursuivit les aménagements, mais après la mort de son gendre, le prince de Ligne, marquis de Moy, Claude-Lamoral de Ligne céda le marquisat à la famille Boucot et par héritage aux Feydeau de Brou puis aux Rouault de Gamaches  En 1791, Paul-Louis de Thélusson, marquis de Franconville, acquit le domaine de Dormans avec son frère Pierre Germain dont la famille habita le château jusquau milieu du XIXe siècle. Dans le haut de son parc paysager sélève en effet la chapelle de la Reconnaissance, érigée entre 1921 et 1931 par larchitecte Closson, Le château passa par la suite à plusieurs familles  propriété de la ville de Dormans.","architecture":"DORMANS, date du XIVe et XVIIe siècle en forme d'un quadrangulaire cantonné de tours. Cest aux Thélusson quil faut attribuer lattique qui donne un caractère néoclassique aux deux façades, lune alliant brique et craie, lautre conservant la pierre dure dorigine. Seules les deux tours cylindriques qui encadrent la façade postérieure remontent à Jean de Dormans. Bâties en pierre appareillée, elles ont conservé la ligne de consoles et de linteaux de leurs anciens mâchicoulis. Restauré après la première guerre mondiale, le château abrita un séminaire de salésiens. Il appartient aujourdhui à la fondation du monument des victoires qui le loue à la ville. Le château de Dormans a été, depuis, racheté par la commune de Dormans. A l'intérieur, se trouve installé l'Office de Tourisme. Des réceptions sont organisées régulièrement au château de Dormans. Lactuel château de ce parc date du XIVe siècle. est mit à la disposition du public pour lorganisation de réceptions, de cérémonies, de séminaires.                                                                                                                        A  une dizaine de K.M. au nord ANTHENAY  Les tours d'Anthenay. Au dessus d'une fenêtre se trouve un blason avec indication de la date 1603 et avec la devise « Sat cito si sat bene » : c'est toujours assez tôt si c'est bien.                                                                                                                                        TROISSY  à deux K.M, à l'est  Troissy est un ancien château  qui date du XIIe siècle. Sa crypte a été classée aux M.H. depuis le 11.10.1924. Le château est devenu un Collège et un Lycée.","habitants":"Famille de Charles de Broglie\"","divers":"Anthenay grav-1                              GPS : 49° 04' 24\" Nord, 3° 38\" 36' Est                                                                   Troissy  grav-6                                               GPS : 49° 04' 53\" Nord, 3° 42' 32\" Est","gps":"49° 04' 24\" Nord, 3° 38\" 36' Est","images":["../../jctruffet.com/image/image_51/51_Dormans_1.jpg","../../jctruffet.com/image/image_51/51_Dormans_2.jpg","../../jctruffet.com/image/image_51/51_Dormans_3.jpg","../../jctruffet.com/image/image_51/51_Dormans_4.jpg","../../jctruffet.com/image/image_51/51_Dormans_5.jpg","../../jctruffet.com/image/image_51/51_Dormans_6.jpg"]},"Consult_chateau_formulaire2790-2":{"id":"Consult_chateau_formulaire2790-2","dept":"51","canton":"Epernay","commune":"Epernay","nom":"Epernay_Lafond","type":"Château","periode":"XVIII","histoire":"Trois châteaux dans cet article, Moet-Chandon, et château Lafond, la tour Castellane\nMOET-CHANDON  date de 1793. Lhôtel  a accueilli des hôtes de marques dont l'Empereur Napoléon 1er et lImpératrice Joséphine. Claude Moët, fondateur, en 1743, fut lun des premiers Sparnaciens à sinstaller, hors des remparts protecteurs de la ville, dans les années 1740. A lemplacement de lactuel hôtel Moët, il fit creuser des caves et aménager un pressoir, des celliers et des jardins. Son fils Claude Louis Nicolas, lui succèda, puis vint Jean-Rémy son petit-fils, associé aux affaires, dès 1788. En 1793, Jean-Rémy Moët commanda lhôtel et put sinstaller dans un hôtel particulier, très élégant, composé dun étage et dun faux grenier, qui allège la structure. Lensemble est assez sage, en pierre blanche et en ardoise. Le corps principal est agrémenté de deux ailes aux décorations ouvragées qui fermaient ainsi un espace privilégié dans lesprit de la cour dhonneur des grandes demeures.  Dans le dernier quart du XIXe siècle, les pavillons latéraux ont été rehaussés, tandis quen 1898, est décidé un remaniement de lensemble architectural. Une galerie couvre un premier étage élargi et une décoration florale sculptée ainsi que des médaillons qui se développent en façade. Bombardé lors des attaques des 19 et 20/07/1918, lhôtel Moët n'a conservé que sa façade. Il a été reconstruit à lidentique mais assoupli dans sa structure. Ses décorations ont disparu. Le dernier étage est transformé en terrasse, en son centre, et seuls, les pavillons latéraux ont été rebâtis.","architecture":"Ancien hôtel AUBAN-MOET, l'édifice a été construit  par l'architecte Victor Lenoir. Elevé sur 3 niveaux, il est de style Néo-Classique avec un décor de pilastres qui valorise les façades. Le décor intérieur est très soigné: vestibule évoquant un atrium à l'antique. La grande salle à manger et les salons de réception présentent un décor de belle facture de style Néo-classique. L'architecture en brique et pierre très décorative des communs offre un style volontairement différent de celui de la maison. Le parc aménagé entre 1870 et 1880, associe un jardin à la Française et un jardin à l'Anglaise. Il est inscrit aux M.H. depuis le 26/06/2012. C'est devenu la mairie d'Epernay,  situé à Epernay dans la prestigieuse Avenue de Champagne et est symbole de qualité et délégance, comme les cuvées de prestige dédiées à la comtesse Lafond, aïeule du baron Patrick de Ladoucette. Son portrait peint par Franz Xavier Winterhalter (1805-1873) qui a été aussi le portraitiste de la reine Victoria, de limpératrice dAutriche, ainsi que de nombreuses familles royales dEurope, aujourdhui dans les salons du château comtesse Lafond. Il fut également décidé que figurerait son nom sur les cuvées de prestige afin de perpétuer le symbole de qualité et délégance à lorigine de notre Maison. La famille des comte Lafond, défenseurs des grandes traditions viticoles françaises a su insuffler à travers son savoir-faire et sa passion, une élégance unique aux Champagnes.                                                                                                                     LA LUNE la construction du Château de la Lune date de 1896. construit en brique polychrome et comporte des décorations en pierre. Il est de style Art Nouveau. Il est en cours de restauration.                                                                      La tour CASTELLANE Haute de 66 mètres, la tour est le point culminant de la ville. La légende dit qu'elle pourrait être un ancien réservoir d'eau. Elle aurait été construite entre 1903 et 1905 et conçue par Marius Toudoire, architecte de la gare de Lyon à Paris. Ses murs sont ornés des noms de grandes villes du monde et de blasons des principales villes marnaises et productrices de Champagne.","habitants":"Famille de Moët                 et la  comtesse Lafond,\"","divers":"Epernay                                                       GPS : 49° 02' 25\" Nord, 3° 57' 36\" Est                                                               La Lune  grav-4  GPS : 49° 02' 25\" Nord, 3° 57' 36\" Est     Lafond grav-2-3                                                                                             Moet GPS : 49° 02' 25\" Nord, 3° 57' 36\" Est","gps":"49° 02' 25\" Nord, 3° 57' 36\" Est","images":["../../jctruffet.com/image/image_51/51_Epernay_Lafond_1.jpg","../../jctruffet.com/image/image_51/51_Epernay_Lafond_2.jpg","../../jctruffet.com/image/image_51/51_Epernay_Lafond_3.jpg","../../jctruffet.com/image/image_51/51_Epernay_Lafond_4.jpg","../../jctruffet.com/image/image_51/51_Epernay_Lafond_5.jpg"]},"Consult_chateau_formulairea2b9":{"id":"Consult_chateau_formulairea2b9","dept":"51","canton":"Epernay","commune":"Epernay","nom":"Epernay_Pékin","type":"Château","periode":"XVIII","histoire":"PEKIN, un hôtel est construit en 1866 pour le négociant François Abelé de Muller (1811-1876) au lieu-dit le Mont Saint-Joseph. Le domaine est racheté par Eugène Mercier en décembre 1873, qui fait construire ses caves à proximité. Le nom de Château de Pékin,  Ce pourrait être une allusion à l'entrée des troupes impériales de Napoléon III dans la capitale chinoise, à moins qu'il ne vienne de l'éloignement du lieu. Il est encore appelé château Mercier en souvenir de son propriétaire. En 1874  Mercier y installe le siège de sa maison de commerce, avec son épouse  née Marguerite Bourlon et ses enfants jusqu'en 1892 date du mariage de sa fille Blanche avec Georges  Lemaître le jeune ménage résidera à Pékin  et Eugène  Mercier  et son épouse  au 75 de l'avenue mais la demeure restera le cadre des grandes festivités familiales, comme en 1904 de Claire Mercier avec Lucien Durand. Eugène Mercier décède en 1904.La propriété est restée dans la famille Lemaître  pendant une grande partie du XXe siècle , puis le château est racheté par un négociant en vins qui le restaure depuis 2000  par le baron Patrick de Ladoucette pour sa représentation commerciale. Aujourd'hui siege du champagne de Canteneur. Le plan du château a sensiblement la forme d'un T précédé du côté du portail d'entrée d'un \"châtelet\" à deux tours.                                                                                                             A l'est d'Epernay à Mutigny le château de MONTFLAMBERT, à la rencontre des routes de Champagne et des paysages de vignes et de forêts, il est agréable de séjourner dans un ancien manoir du XVIIe siècle aux confins de la route. Sa situation géographique permet de parcourir toute la région : Montagne de Reims, Côte des Blancs, Vallée de la Marne, Massif de St Thierry ponctuée de charmants villages, de milieux naturels, de grandes marques et de maisons de Champagne.","architecture":"PEKIN , est construit sur une galerie de caves et un sous-sol servant d'entrepôt est relié à un réseau de caves à vin, situé à 25 mètres de profondeur sous l'édifice. Deux pavillons de communs encadrent le portail d'entrée; escalier extérieur à degré adouci en maçonnerie. Les corps des bâtiments aux deux extrémités et le mur de clôture sont en brique et pierre à assises alternées. Le bâtiment central est en pierre de taille calcaire (chaînes à refends, corniche à modillons, encadrements de baies, frontons et soubassement) avec remplissage couvert d'enduit. Les communs sont construits en pierre et brique. Les toits ont un brisis en ardoise ; un terrasson en zinc, épis de faîtage, verrière sur la façade ouest. Lucarnes à fronton courbe  et oculus dans l'axe, en partie dénaturé,  portail et ancres en fonte.                                                                             PERRIER. construit par l'architecte Eugène Cordier pour le négociant Charles-Nicolas Perrier, est à la fois résidence privée, lieu de réception, lieu de stockage et d'élaboration du champagne. Les travaux débutent en 1852 par le creusement des caves. Les deux pavillons sur rue sont construits, en commençant par celui du concierge, au cours des années 1852-1853. Ils se poursuivent par les maçonneries du corps principal : 1853-1854. La charpente et la couverture sont posées en 1855 permettant de commencer l'aménagement intérieur qui s'achève à la fin de l'année 1856. En 1890, la statue en fonte intitulée \"Le veneur\" est installée dans la cour d'honneur. Les caves du château serviront d'hôpital militaire pour les troupes italiennes pendant la première guerre mondiale. Le bâtiment a servi successivement de quartier général aux armées britanniques (1940), allemandes (de 1942 à 1944) et américaines (1945) avant d'abriter momentanément la bibliothèque et le musée municipal.\nÉléments protégés MH : le logis en totalité, y compris sa grande cave, les deux pavillons d'entrée, : classement par arrêté du 2 octobre 2013.","habitants":"Famille d' Eugène Mercier \"","divers":"Hotel Auban Grav-1         GPS : 49° 02' 43\" Nord, 3° 57' 21\" Est  Perrier grav-2-3                                                  Montflambert grav_4","gps":"49° 02' 43\" Nord, 3° 57' 21\" Est  Perrier grav-2-3","images":["../../jctruffet.com/image/image_51/51_Epernay_P%c3%a9kin_1.jpg","../../jctruffet.com/image/image_51/51_Epernay_P%c3%a9kin_2.jpg","../../jctruffet.com/image/image_51/51_Epernay_P%c3%a9kin_3.jpg","../../jctruffet.com/image/image_51/51_Epernay_P%c3%a9kin_4.jpg"]},"Consult_chateau_formulairee35a":{"id":"Consult_chateau_formulairee35a","dept":"51","canton":"Sézanne","commune":"Esternay","nom":"Esternay","type":"Château","periode":"XVI-XVII","histoire":"ESTERNAY,  en 1378 lorsque la dame Eustache de Trainel, dame du Châtel de Nangis et dEsternay-en-Brie, se livre à quelques achats pour arrondir ses terres. En 1408 elle vend terres et château à Alexandre Leboursier, receveur général , qui fit restaurer le château pour le rendre plus fort, mais celui-ci tombe rapidement aux mains des Anglais. Henri V confisque la terre pour la donner à un Bourguignon, Hugues de Saubertier, et en 1444, Jean, le fils dAlexandre Leboursier, récupère la terre dEsternay. Jean Leboursier avait pris ses précautions en cédant sa terre à Mathieu Beauvarlet, conseiller du roi, receveur général des finances, et maître de la chambre des comptes. Mais à sa mort, la terre dEsternay est donnée à un favori du roi, le chevalier Guérin Le Groing. Cest sa fille, Marie Beauvarlet, qui récupère Esternay en 1483, après la mort de Louis XI et vingt années de litige entre son père et Guérin Le Groing. Elle épouse en 1468 Jean Raguier, seigneur dEsternay, la Motte-Tilly et Soligny, baron de Payens, financier, trésorier des guerres de Normandie, maître en la chambre des comptes, conseiller et chambellan du roi Charles VIII, dont elle aura trois fils. Louis, laîné des trois frères Raguier, gentilhomme de la chambre du Roi, épouse Charlotte de Ditenville en 1496. Jean est archidiacre de Sézanne, et Guillaume est abbé de Soligny et de Saint Michel de Tonnerre. Jean se désiste en premier et fait don de sa part à son neveu, le fils de Louis, appelé Jean également. Louis meurt en 1539, et son épouse en 1548. En 1555, Guillaume Raguier fait don de sa part au jeune Jean, qui devient donc le seul propriétaire dEsternay.","architecture":"ESTERNAY, le château na même peut-être jamais été complètement terminé car à lépoque des guerres de religion, un des Raguier se fit protestant et, avec une armée de Huguenots venus de lEst, entreprit contre ses frères une bataille fratricide. En 1569, après avoir abattu une partie de laile nord du château, les catholiques emportent la place et massacrent les huguenots. Le château dEsternay est remis par les catholiques à la veuve de Jean Raguier, Marie de Béthune. Après la mort de son jeune fils Salomon en 1592, la terre dEsternay tombe en quenouille. En 1638, cest Pompée dAncienville, fils de Judith Raguier et de Claude dAncienville, qui possède la terre dEsternay. Il meurt en 1650. Esternay est alors vendu à Claude du Bellay, qui le cède en 1651 à Michel Larcher, conseiller du roi et président de la cour des comptes.En 1774, monsieur de Saint-Martial, baron dAurillac, entre en possession dEsternay. Pendant la Révolution, le château nest jamais devenu un bien public ou un bien national, car son propriétaire, en tant quambassadeur de France à létranger, nétait pas considéré comme un émigré. Après la Révolution, la baronne dAurillac évite donc la vente du château en faisant rayer son mari de la liste des émigrés. Le couple le récupère en piteux état en 1797, et doit vendre une partie de ses biens pour payer les dettes de lémigration et les nécessaires réparations. Le baron séteint en 1804, sans laisser de descendance. Son énergique épouse rachète alors à ses beaux-frères les parties de la terre dEsternay qui leur revenaient. Elle y restera quarante années. En 1844 passe par héritage aux Larochelambert à l'une de ces  nièces, toujours dans la descendance.                                                                                          A cinq K.M au sud Ouest le château de COURGIVAUX pas d'information.","habitants":"Fam
