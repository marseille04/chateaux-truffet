e une activité de gîte.","habitants":"Lara Lunow\r\n        \"","divers":"Château de Percey à Percey                                                             47° 57' 52\" Nord et 3° 49' 34\" Est","gps":"","images":["../image/image_89/89_Percey_1.jpg","../image/image_89/89_Percey_2.jpg","../image/image_89/89_Percey_3.jpg","../image/image_89/89_Percey_4.jpg"]},"Consult_chateau_formulairefa56":{"id":"Consult_chateau_formulairefa56","dept":"89","canton":"Joux la Ville","commune":"Pierre-Perthuis","nom":"Pierre_Perthuis","type":"Vestiges-Forteresse","periode":"XII-XVI","histoire":"PIERRE-PERTHUIS; fort, le château-fort a été bâti par l'évêque Rodmond d'Autun, avec des matériaux issus de villas gallo romaines alentours et d'autres provenant de l'abbaye de la Cure. Rotmond, évêque d'Autun, fut le fondateur du château de Pierre-Perthuis. Le roi de France Philippe Auguste, séjourna au château de Pierre-Perthuis, vers 1180 . Philippe de Rouvres, duc de Bourgogne, acquiert la seigneurie de Pierre-Perthuis en 1360. Jean III de Chalon-Arlay, Seigneur d'Arlay, Prince d'Orange, devint Châtelain par mariage. Charles-Emmanuel de Savoie, Duc de Nemours et de Genève, ligueur, s'empara et réduisit le château de Pierre-Perthuis vers 1580. Jean VI d'Aumont, maréchal de France, ennemi de la Ligue, fait raser le château.  Un document de décembre 1264 mentionne le partage des biens de la succession d'Agnès de Bazarne entre ses trois enfants : Gui de Toucy, Renaud de Champrécieux, et Agnès de Charenton seconde femme de Guillaume de Courtenay. En 1590 le manoir appartenait à jean Massol, conseiller au parlement de Dijon. Puis d'autres propriétaires sont cités: Ducray en 1630, Guyon en 1705 et Laureau en 1725. Longtemps rattaché à la commune de Menades, le hameau revint à la Révolution de 1789 à Pierre-Perthuis.","architecture":"manoir de PRECY, lieu-dit: Précy-le-Moult, mentionné sous le nom de Presseium au XIIe siècle, l'ancien fief a relevé alternativement de Saint Père, de Pierre-Perthuis, de Ménades et dépendait du duché de Bourgogne. Les dimes étaient payés en partie à Vézelay et Précy. La famille Sainte-maure est propriétaire des terres vers 1500 avec justice haute, moyenne et basse. Aujourd'hui même si la partie supérieure a disparu, la porte est plutôt bien conservée, ces restes de la porte du XIIe siècle appartenaient à lenceinte extérieure du château. Elle possédait quatre logettes voûtées, aménagées dans l'épaisseur des piédroits.L'ensemble comprenait des dépendances et une habitation, manoir du XVIIe ou XVIIIe siècle. Le manoir sur un plan rectangulaire avec deux étages dont un en rez de jardin et des combles est couvert d'un toit à croupe en tuiles plates. La propriété ceinte de murs, possède de beaux jardins. Aujourd'hui résidence secondaire, une scène en plein air a été aménagée pour recevoir du public lors de représentations artistiques.","habitants":"Famille de Guillaume de Courtenay                                                                          jean Massol,\r\n        \"","divers":"A Pierre-Perthuis château fort de Pierre Perthuis et de Précy  47° 25' 59\" Nord, 3° 47' 03\" Est","gps":"","images":["../image/image_89/89_Pierre_Perthuis_1.jpg","../image/image_89/89_Pierre_Perthuis_2.jpg","../image/image_89/89_Pierre_Perthuis_3.jpg"]},"Consult_chateau_formulaire06b9":{"id":"Consult_chateau_formulaire06b9","dept":"89","canton":"Villeneuve-sur-Yonne","commune":"Piffonds","nom":"Piffonds_Clairis","type":"Château","periode":"XV-","histoire":"CLAIRIS,  à deux kilomètres au sud -Est à Savigny les Clairis; le château est devenu un hôtel et une résidence privée pour quelques résidents exclusivement réservé à lusage des membres de lASPDC et de leurs invités identifiés.  Les activités équestres et golfiques, proposées respectivement par « le Club Hippique de Clairis » et « Gaïa Concept Golf de Clairis » (GCGC) sont ouvertes au public, sous réserve du respect du règlement intérieur du Domaine.                                                                                                  PIFFONDS, c'est un ancien château fort. Au Moyen-Age on appelait la seigneurie \"Piffonds lès-le-Parc\" et appartenait aux seigneurs de Courtenay. Ce château rebâti au XVe siècle a un plan tout à fait particulier, identique au plan primitif qu'avait adopté le fondateur au XIIIe siècle. C'est un plan de forme trapézoïdale, qui possède une entrée sur la façade Est. Il ne reste aujourd'hui que la façade Est, la façade Nord et une tour à l'angle Sud-Ouest appelée le Colombier. La façade Est possédait un pont-levis à flèches, visible par l'emplacement des deux longues rainures. En effet, un système de poulie permettait d'ouvrir ou fermer l'accès au château, en tirant deux chaînes de fer qui glissaient à travers ces rainures. L'entrée est voûtée en plein cintre. A droite de cette entrée on observe un passage réservé aux piétons, voûté en plein cintre également, et qui possédait son propre pont-levis. La rainure située au dessus de ce passage pour piéton prouve l'existence de ce dernier. Au dessus de notre entrée, une fenêtre centrale a remplacé la bretèche à archère et qui assurait la défense de la porte. La façade Est conserve sa belle charpente en forme de carène de navire renversé qui date de la reconstruction du bâtiment du XVe siècle. La partie la plus au nord de cette façade Est accueille aujourd'hui la mairie.","architecture":"PIFFONDS, le château primitif été présenté dans une forme pentagonale irrégulière avec 7 tours, 5 aux angles et 2 à la poterne. Le château fut brûlé et détruit, il n'est donc pas possible de retrouver dans l'ensemble des bâtiments actuels autre chose que des reconstructions de la fin du XVe siècle.  La partie Nord s'étend quant à elle sur une cinquantaine de mètres, et offre au visiteur le plus beau vestige de ce château. Il s'agit d'une façade imposante composée de deux tours d'angle et de deux tours centrales. Elles entourent une poterne qui s'ouvre sur la droite d'un pavillon central de deux étages. Sur le flanc de ces deux tours centrales, des archères sont disposées pour la sécurité de ce passage. Depuis les réaménagements de 1844, la tour de droite communique à chaque étage avec l'aile Nord-Ouest. La tour de gauche fut transformée en escaliers et desservait tous les appartements de notre pavillon central. Cet escalier primitif en pierre a été remplacé par un escalier de bois, formé de contre-marches de carreaux de terre cuite. Sur certaines de ces contre-marches vernissées, on a retrouvé des motifs de fleur de lys du XVe siècle.","habitants":"Seigneurs de Courtenay.\r\n        \r\n        \"","divers":"Château de Piffonds à Piffonds    et de Clairis a Savigny  grav-1-2    48° 04' 32\" Nord, 3° 05' 38\" Est                                                       48° 03' 17,38\" Nord et 3° 08' 46,86\" Est","gps":"","images":["../image/image_89/89_Piffonds_Clairis_1.jpg","../image/image_89/89_Piffonds_Clairis_2.jpg","../image/image_89/89_Piffonds_Clairis_3.jpg","../image/image_89/89_Piffonds_Clairis_4.jpg","../image/image_89/89_Piffonds_Clairis_5.jpg","../image/image_89/89_Piffonds_Clairis_6.jpg"]},"Consult_chateau_formulairee545":{"id":"Consult_chateau_formulairee545","dept":"89","canton":"Chablis","commune":"Pisy","nom":"Pisy","type":"Forteresse","periode":"XV-XVI","histoire":"PISY, cette puissante maison forte bâtie en 1325, Guillaume de Grancey, lieutenant du duc de Bourgogne, devient seigneur de Pisy lors de son mariage avec Jeanne d'Arcy. Puis la seigneurie échoit en 1370 à Guy de Grancey, gouverneur de Bourgogne. En 1373, celui-ci obtient des subsides de Marguerite de Flandre, duchesse de Bourgogne, afin de faire restaurer la demeure. En 1410, le domaine appartenait à l'évêque d'Autun, Milon de Grancey. Il en fit la donation, avec sa seigneurie et toutes ses dépendances, le 12 novembre 1412, à Pierre de Montot, seigneur de St Phal. En 1450, François de Surienne, dit l'Aragonais, chambellan du duc de Bourgogne, en fait l'acquisition. Sa fille, Jeanne de Surienne épouse Claude de Ragny. C'est à Eudes de Ragny que l'on doit la reconstruction du château en 1480. Il obtint de Louis XI la tenue de quatre foires annuelles à Pisy, le fief de Pisy relevait alors du donjon de Semur, c'est à dire directement du roi de France, et ce depuis 1477, date du retour à la Couronne de l'apanage bourguignon. En 1580, Pisy était pour moitié dans les mains de François Aux-Épaules, seigneur de Sainte Marie du Mont, par son mariage avec Gabrielle de Laval, dame de Pisy, marquise de Nesles, dont il prit le nom et les armes. L'une de ses filles, Claudine, hérita de Pisy, le transmit dans la famille des Brulart de Genlis par son mariage avec Gilles Brulart, seigneur de Genlis.","architecture":"René Brulart de Genlis, marquis de Genlis, ne réside pas non plus à Pisy, dont il possède la moitié, puis les trois quarts. Il racheta la quatrième part du fief en 1646 à son cousin René de Laval. C'est sa petite-nièce Marie-Anne-Claude Brulart, fille de Claude Brulart, qui hérite de Pisy et le porte dans la famille d'Harcourt par son mariage en 1687 avec Henri d'Harcourt, marquis de Beuvron. En 1779, Anne Pierre d'Harcourt, pair de France et chevalier de l'ordre du Saint-Esprit, vend le domaine à Antoine Louis Marie Destiennot de Vassy, sa famille s'en sépare en 1794 à un groupe de spéculateurs qui le revendent à Jacques Emmanuel Laugier en 1795.\r\nPISY transformé en bâtiment agricole depuis le XVIIIe siècle, cette utilisation, pour des raisons économiques l'a sauvé de la destruction. Son état exceptionnel de conservation, tout en étant délabré, est dû au manque d'intérêt de ses différents seigneurs et propriétaires à le faire évoluer en habitation digne de ce nom. Propriété privée, mais on peut visiter les extérieurs; éléments protégés MH : le château  en totalité, avec son emprise, y compris celle de la tour disparue et de ses anciens fossés, et son pont dormant, correspondant à la partie cernée de route : classement par arrêté 12 juillet 2013.","habitants":"Famille d'Harcourt\r\n        \"","divers":"Château de Pisy à Pisy:                                                               47°33'22\" Nord et 4°08'33\" Est","gps":"","images":["../image/image_89/89_Pisy_1.jpg","../image/image_89/89_Pisy_2.jpg","../image/image_89/89_Pisy_3.jpg"]},"Consult_chateau_formulaire4d60":{"id":"Consult_chateau_formulaire4d60","dept":"89","canton":"Sens","commune":"Plessis- saint-Jean","nom":"Plessis_St_Jean","type":"Château","periode":"XII-XIV-XV","histoire":"PLESSIS st-JEAN, fut un lieu habité depuis le XIIe siècle. Le mot \"plessis\" évoque un lieu clos, protégé contre les bêtes. Une maison-forte fut bâtie au XIVe siècle par la famille Leventés. Il sagissait dune forteresse avec tour dobservation. A la fin du XVe siècle, les fossés à parois maçonnées apparaissent, il ont une profondeur moyenne de six mètres et une largeur de dix mètres, à parement de grés. Il sagit de douves sèches. En 1363, le village sappelait Plessis Messsire Guillaume du nom du chevalier propriétaire des lieux. La seigneurie passe en 1504 à Pierre de Choiseul, son fils se faisait appeler seigneur de Praslin sous François Ier. Le vieux château fut démoli à la renaissance puis remplacé par un château élégant et confortable, il reste des vestiges dune tour ronde et deux puits. Sous Louis XIII avec Ferry de Choiseul, la seigneurie devint Comté du Plessis-Praslin. En 1714, Plessis-Praslin est transmis à Michel-François Lebas du Plessis, trésorier général des guerres de Louis XIV. Henry Lebas du Plessis le remodela en 1830 et le reconstruisit selon un style néo-gothique. La tour des escaliers aux trois ogives en est un témoignage, cest ainsi que cette demeure nous apparaît actuellement.","architecture":"PLESSIS st-JEAN, il se situe au sein d'un parc arboré. Un vaste et profond fossé circulaire encercle un terrain plat, accessible par un pont au couchant. Le château de Plessis-Saint-Jean actuel, est de forme rectangulaire, et voisine la section Nord du fossé. Il fut très remanié durant le XIXe siècle. Des salles ont été creusées dans le talus extérieur du fossé. Le puits est impressionnant par sa profondeur (environ 60 mètres). L'emplacement de la motte du donjon, et d'un bâtiment rectangulaire proche du fossé méridional, ne sont connus que par la prospection radio électrique. En 2012, le château de Plessis-Saint-Jean a bénéficié de la restauration de sa toiture et de ses douves. Le château de Plessis-Saint-Jean abrite aujourd'hui, dans ses murs, un musée ouvert au Public. Il reste de cette époque, à lintérieur, un salon dhiver en boiserie type XVIIIe. Le château est entouré dun beau parc de quatre hectares avec forêts. À lintérieur de lenceinte : deux oubliettes, une delles était placée au centre de lancienne tour circulaire. Reste dune tour ronde. Trace qui témoignent de la présence dun pont-levis, aujourd'hui détruit.","habitants":"Famille de Pierre de Choiseul\r\n        \"","divers":"Château de Plessis Saint-Jean                                                               GPS : 48° 21' 11\" Nord, 3° 18' 24\" Est","gps":"48° 21' 11\" Nord, 3° 18' 24\" Est","images":["../image/image_89/89_Plessis_St_Jean_1.jpg","../image/image_89/89_Plessis_St_Jean_2.jpg"]},"Consult_chateau_formulaire8d3a-2":{"id":"Consult_chateau_formulaire8d3a-2","dept":"89","canton":"Toucy","commune":"Moulins-sur-Ouanne-Toucy","nom":"Pont_Marquis","type":"Château","periode":"XV","histoire":"PONT-MARQUIS,     Pierre de Prégrimault ouvre, en 1404, la longue suite des seigneurs de Pont Marquis et de Moulins sur Ouanne, terres qu'il tient du baron de Toucy. Le domaine passe ensuite à la famille Le Chantier, Alain Le Chantier sera capitaine de Toucy en 1475, de  Cravant en 1478. Sa petite-fille, Perette Le Chantier apporte Pont-Marquis à son époux Jean d'Assigny, leurs descendants vont se transmettre cette terre pendant trois siècles. Le château Pont-Marquis sera reconstruit par un d'Assigny au XVIIIe siècle. En 1783, un officier du génie, René de Perthuis de Laillevaut en fait l'acquisition. Napoléon Ier en fera un baron d'empire et érigera pour lui en marquisat les terres de l'ancienne seigneurie. En 1842, le comte Heudebert se rend acquéreur de Pont-Marquis. Il revendra la propriété en 1861 à Amand Lechiche, propriétaire d'une importante exploitation d'ocre. Vers 1929, le château deviendra la propriété de la famille Arrighi.","architecture":"PONT-MARQUIS, Bâtisse de plan rectangulaire avec lucarnes sur toit brisé grande dépendance.","habitants":"famille Le Chantier\r\n        \r\n        \r\n        \"","divers":"89_Pont_Marquis          7° 29' 41\" nord, 4° 04' 09\" est","gps":"","images":["../image/image_89/89_Pont_Marquis_1.jpg","../image/image_89/89_Pont_Marquis_2.jpg"]},"Consult_chateau_formulairef84d":{"id":"Consult_chateau_formulairef84d","dept":"89","canton":"Avallon","commune":"Pontaubert","nom":"Pontaubert","type":"Château","periode":"XIX","histoire":"ORBIGNY, a été construit au début du XIXe siècle, on ignore l'existence d'un château plus ancien et de la famille dorigine. Famille Guillaume dOrbigny ; famille Raudot (dite parfois dOrbigny) vers 1734. La carte de Cassini du XVIIIe siècle n'indique aucun château dans le hameau d'Orbigny.  S'il date essentiellement du XIXe siècle, il est bâti sur une cave romane, et conserve une tour-pigeonnier de 995 boulins, à échelle tournante.","architecture":"ORBIGNY, le château et ses dépendances sont dessinés avec soin sur le cadastre de 1838, il domine la sortie Est de Pontaubert. Du portail de lentrée principale, on contemple un corps de logis avec une aile de style néo-classique sur deux étages percés régulièrement par de nombreuses fenêtres. La propriété entourée de murs comporte de nombreuses dépendances, un pigeonnier et un parc. Orbigny est à laplomb au sud de la vallée du Cousin et du moulin des Templiers. Une tour belvédère distante du château domine le Cousin. A noter une chapelle Saint-Jean, disparue, qui se trouvait en contre bas de la propriété au bord du Cousin.","habitants":"Famille d'Orbigny\r\n        \r\n        \r\n        \"","divers":"A Pontaubert le château  d'Orbigny grav-2-3","gps":"","images":["../image/image_89/89_Pontaubert_1.jpg","../image/image_89/89_Pontaubert_2.jpg","../image/image_89/89_Pontaubert_3.jpg"]},"Consult_chateau_formulairea734":{"id":"Consult_chateau_formulairea734","dept":"89","canton":"Joux la Ville","commune":"Fontenay-près-Vézelay,","nom":"Pouilly_Fontenay","type":"Maison forte","periode":"XV-XVI","histoire":"POUILLY, au hameau de Pouilly, au lieu-dit le Château, subsistent les vestiges importants d'un château féodal, ou d'une maison forte. L'origine et la typologie de cette construction demeurent incertaines. D'aucuns pensent qu'il s'agit là d'une maison forte des XVe et XVIe siècles et également un château féodal avec cinq tours appartenant au seigneur Jean de Pouilly au XIIe siècle. Pillé et détruit, il fut reconstruit à une époque inconnue. Il figure comme château sur la carte Cassini en 1750. Au XIXe siècle, il servait de logement à trois ou quatre familles, comme le confirme le cadastre de 1818 .","architecture":"POUILLY, le bâtiment est partagé en trois parcelles. Aujourd'hui remaniée, la construction a conservé deux de ses tours, encadrant un corps de logis à haut toit. Les caves, ainsi que certains murs anciens, restent en bon état. Le linteau d'une porte basse conserve un blason, malheureusement illisible. Cette bâtisse est accolée à un autre bâtiment de taille moyenne, légèrement en retrait.","habitants":"seigneur Jean de Pouilly\r\n        \"","divers":"a Fontenay-près-Vézelay, château de Pouilly                                 47° 25' 09\" nord, 3° 45' 39\" est","gps":"","images":["../image/image_89/89_Pouilly_Fontenay_1.jpg","../image/image_89/89_Pouilly_Fontenay_2.jpg"]},"Consult_chateau_formulaire2bcf":{"id":"Consult_chateau_formulaire2bcf","dept":"89","canton":"Charny","commune":"Prunoy","nom":"Prunoy","type":"Château","periode":"XVI-XVII","histoire":"PRUNOY, au début du XVIe siècle, Guillaume de Crèvecoeur choisit le site de Prunoy pour y construire son château. En 1721, François Christophe de Lalive, Receveur Général des Finances, fait transformer le vieux château. A son décès, en 1765, le domaine revient à Ange Laurent Lalive de Jully, diplomate, qui multiplie les plantations et assèche les étangs. La Révolution ne touchera pas la demeure, mais elle est abandonnée en 1779, à la mort de Ange Laurent Lalive de Jully. Le château passe alors à l'aîné des de Lalive en 1799. Il en est chassé par les soldats Bavarois qui font du château un quartier général lors de la campagne de France et la chapelle est incendiée en 1826. Le dernier des de Lalive le vend à son neveu Raymond Aymery, duc de Montesquiou Fezensac, Ambassadeur de France à Madrid, qui le fera restaurer en 1851. Sa fille Henriette Oriane en héritera en 1867, épouse du comte de Goyon, ils s'attacheront à lui redonner vie. Vers 1900, la famille de Goyon vendra la propriété à Georges Raverat, grand maître du port du Havre. Son fils Jacques en hérite et épousera la petite-fille de Darwin. En 1926 le château est acquis par la famille Loyer Roumilhac. En 1955, la petite-fille, Josée Roumilhac en hérite mais le château est à l'abandon. Après de très longs travaux, le château est magnifiquement restauré aujourd'hui.","architecture":"PRUNOY, château de plan rectangulaire, édifice à deux niveaux et série de lucarnes sur comble, pavillon d'entrée légèrement saillant avec un fronton triangulaire, la bâtisse oblong de dix travées entre  un pavillon rectangulaire accolé de deux tours rondes sur les deux angles et  à l'opposée une tour ronde avec un retour en équerre de dépendance à deux niveaux.","habitants":"Famille de Ange Laurent Lalive de Jully\r\n        \"","divers":"Château de Prunoy à Prunoy                                                                    47° 54' 31\" N, 3° 07' 28\" Est","gps":"","images":["../image/image_89/89_Prunoy_1.jpg","../image/image_89/89_Prunoy_2.jpg","../image/image_89/89_Prunoy_3.jpg","../image/image_89/89_Prunoy_4.jpg"]},"Consult_chateau_formulaire36f5":{"id":"Consult_chateau_formulaire36f5","dept":"89","canton":"Joigny","commune":"Précy-sur-Vrin","nom":"Précy_sur_Vrin","type":"Château","periode":"XIX","histoire":"PRECY sur-VRIN, après les troubles de la guerre de Cent Ans, la région est complètement dépeuplée et la maison forte de Précy est probablement ruinée. En 1505 la comtesse de Joigny accorde le droit de châtellenie à François Allègre et le 21 mars 1517, François Allègre, comte de Joigny, prend le titre de seigneur de Précy. Il fait construire une nouvelle demeure, celle qui se situe au bord du Vrin. Le château sert de refuge pendant les guerres de Religion. Encore debout au début du XIXe siècle, il est détruit et on reconstruit le château que nous pouvons admirer aujourd'hui dans le premier quart du XIXe siècle.","architecture":"PRECY sur-VRIN, la construction du château  date de 1803. Le château est inscrit partiellement aux M.H. le 23.12.1993, pour ses éléments protégés : les façades et toitures du château , les deux pavillons, la salle à manger, le grand salon, l'ancienne bibliothèque. L'édifice de plan en U, le corps de logis de cinq travées  entre deux pavillons de trois travées avec pavillon d'entrée saillant l'ensemble à deux étages. toit recouvert d'ardoises.","habitants":"\"","divers":"Château de Précy-sur-Vrin                                                                  47° 58' 02' Nord, 3° 15' 06\" Est","gps":"","images":["../image/image_89/89_Pr%c3%a9cy_sur_Vrin_1.jpg"]},"Consult_chateau_formulaire23b0":{"id":"Consult_chateau_formulaire23b0","dept":"89","canton":"Vincelles","commune":"Treigny","nom":"Ratilly","type":"Forteresse","periode":"XIII-XVIII","histoire":"RATILLY, cest au XIIIe siècle que fut édifié lactuel château, pendant la guerre de Cent Ans, le fief échoit à Jean de Beaumont puis à partir de 1357 à  Guy de Vallery qui hébergea une bande de pillards. Passa à Jean de Chandiou qui le transmet à sa fille Anne qui épouse Jean de  la Menue. Puis en 1567, il deviendra le repaire des Huguenots dans l'Auxerrois. En 1587, Mary du Puy  seigneur d'Igny s'installera à Ratilly après avoir fait restaurer le château. Jeanne du Puy l'apporte en dot à Louis de Menou qui fit édifier le corps de logis seigneurial, ses successeurs y accueilleront, en 1653, la Grande Mademoiselle. Dans l'année ou il meurt en 1653 sa fille Madeleine, hérite et épouse Barthélemy de Clugny le domaine restera dans la sa descendance jusqu'en 1732 date à laquelle Charles-Antoine de Clugny sans enfants l'aliène à  Louis-Bazile Carré de Montgeron, ce propriétaire  en fait un foyer de la cause janséniste revend le château en 1740 à Pierre Frappier de Dalinet  sa fille Geneviève épouse en 1755 un magistrat auxerrois  André-Marie D'Avigneau que les descendants revendent en 1822, et en 1849 change une nouvelle fois de mains  Charles-Louis Vivien, juge à Saint-Fargeau qui, dès 1849, fit entretenir superbement le château, en y faisant planter des vergers et en faisant assécher les douves du château de Ratilly,  une vente intervient en 1912 et  sera une nouvelle fois, vendu, en 1951, à Jeanne et Norbert Pierlot qui en firent un atelier de poterie, un lieu de stage et un centre d'Art Vivant.  Le château de Ratilly est inscrit aux M.H. en 1983.","architecture":"RATILLY, c'est un château fort de style Philippien, le début de la construction du château actuel date de 1270 pour Mathieu de Ratilly, est implanté au sommet d'un mamelon qui surplombe la Vallée de la Vrille à 270 mètres d'altitude. Un premier édifice, du XIe siècle, aurait été rasé au cours des guerres féodales, de forme quadrangulaire entourant une cour centrale, il s'agit d'une masse carré fossoyée et en eau et d'un deuxième fossé. La porte est cintré et accueille un pont-levis. Elle est défendue par quatre tours rondes que précède deux autres tours circulaires à dix mètres des murailles. Deux autres tours flanquent les angles extrêmes. Les tours n'ont pas de créneaux, tout comme les murs qui sont percés de quelques rares baies étroites. Le parement est de taille moyenne. Au XVIIe siècle, on a construit un donjon sur le pont-levis. Les bâtiments intérieurs sont moderne sauf la chapelle qui date de la Renaissance. En avant du château, il y a un portail cintré qui date de 1619. Sur ses cotés quatre trous pour tirer au fusil: des archères de fusillade. Entre les deux enceintes on découvre une chapelle ogivale du XVIe siècle. Enserré dans son écrin de verdure,  le château de Ratilly est devenu aujourdhui un lieu de culture qui accueille un atelier de poterie et une exposition permanente de céramique.","habitants":"Mary du Puy  Pierre Frappier de Dalinet\r\n        \"","divers":"Château de Ratilly à Treigny                                                              47° 33' 16,63\" Nord, 3° 10' 2,35\" Est","gps":"","images":["../image/image_89/89_Ratilly_1.jpg","../image/image_89/89_Ratilly_2.jpg","../image/image_89/89_Ratilly_3.jpg","../image/image_89/89_Ratilly_4.jpg","../image/image_89/89_Ratilly_5.jpg","../image/image_89/89_Ratilly_6.jpg"]},"Consult_chateau_formulaire96a3":{"id":"Consult_chateau_formulaire96a3","dept":"89","canton":"Tonnerre","commune":"Ravières","nom":"Ravières","type":"Château","periode":"XIV","histoire":"RAVIERES, première mention en 1210 dans un aveu rendu par Pierre, seigneur de Ravières au comte de Nevers. En 1315, Guillaumes de Tanlay tient et entend et avoue tenir de notre seigneur le comte en la ville de Ravières, la maison forte de la dite ville. Le 24 septembre 1674, Marie Catherine de Bessey, veuve de René Jazu, chevalier, conseiller et maître d'hôtel ordinaire du roi, seigneur de Méreuil, Junay, Villiers-le-Haut et de Ravières en partie, demeurant à Ravières, rend foi et hommage à Roger de Clermont, marquis de Cruzy, et seigneur de Maulnes. Elle déclare posséder le quart de la terre et seigneurie de Ravières, la \"basse-cour du château de Marmeaux, sise à Ravières où est assise la maison seigneuriale appelée Chardagne\". Vendu par lots après la Révolution, l'édifice a été très remanié.     A noter; un dernier étage résidentiel a été démonté et vendu en 1919 à un colonel américain qui l'a emmené aux Etats-Unis. L'ensemble est en mauvais état.","architecture":"RAVIERES, l'ancien château est inclus dans un îlot d'habitations. La partie gauche de la façade antérieure est située en bordure de la ruelle du château, la partie droite, au fond d'une impasse, bordée de maisons; la façade arrière ouvre sur des jardins. La façade de droite est longée par une venelle et la façade de gauche est intégrée à un bâtiment d'exploitation. Le corps de bâtiment, de plan rectangulaire, est cantonné de tours circulaires et sur la façade antérieure, flanqué d'une tour d'escalier octogonale demi-hors-oeuvre. Ce bâtiment devait comprendre un rez de chaussée, deux étages carrés et un étage de comble. Le corps de logis principal montre des traces d'arcades brisées au troisième niveau du corps principal dans les angles de la tour d'escalier. La tour octogonale est percée sur sa face antérieure de trois baies superposées à appui saillant. La tour d'angle droite est percée d'une canonnière à droite de la porte au niveau inférieur. Devant la façade antérieure à droite se trouve un puits à margelle octogonale, dont trois faces sont ornées d'écus en relief : l'un porte des armoiries, le deuxième est bûché et le troisième lisse.","habitants":"Ravières;Roger de Clermont,\r\n        \"","divers":"Château de Ravières                                                                                 47° 44' 07\" nord, 4° 13' 43\" est","gps":"","images":["../image/image_89/89_Ravi%c3%a8res_1.jpg","../image/image_89/89_Ravi%c3%a8res_2.jpg","../image/image_89/89_Ravi%c3%a8res_3.jpg"]},"Consult_chateau_formulaire0bfe":{"id":"Consult_chateau_formulaire0bfe","dept":"89","canton":"Auxerre","commune":"Appoigny","nom":"Regennes","type":"Château","periode":"XVI-XVIII","histoire":"REGENNES, les évêques d'Auxerre le firent bâtir fin XIIe siècle. Malgré la concurrence de Beauretour, Saint-Louis établit une ordonnance à Regennes en 1266 pour construire un pont sur lYonne. Après Guy de Mello, Regennes est un peu délaissé. Au XIVe siècle, sa position stratégique lui redonne une importance accrue. Pierre de Villaines le garni dartillerie et relève les fortifications en 1347. Au milieu du XIVe siècle, il devient la clé d'Auxerre: tenir Regennes, c'est contrôler le commerce d'Auxerre avec Paris. En 1358, Jean dAuxois qui occupe la forteresse, se retire à Auxerre à lapproche des Anglais. Robert Knowlles peut alors en prendre possession sans aucun problème le 8 décembre 1358 . Le 23 juillet 1360, Nicolas Tamworth est capitaine de Regennes. Cest lui qui donne, au nom du roi, une quittance à Philippe de Bourgogne pour la somme reçu afin de quitter la forteresse, comme le prévoit le traité de Brétigny. Jean Dalton, un de ses lieutenants, occupe Régennes quil abandonne en octobre 1360 après que le 28 octobre 1360, le roi dAngleterre lui en ait donné lordre. Le 8 février 1364 une troupe de routiers, commandée par Jean de Blasent, sinstalle dans la forteresse puis labandonne après lavoir incendiée. L'histoire de Regennes est alors marquée par la multiplication des sièges et des reconstructions. Sous lépiscopat de Philippe des Essarts, Regennes est encore ruiné. Après la bataille de Cravant, en 1423, Regennes est détruit par les Anglo-Bourguignons, puis livré en 1426 aux armées royales En 1469, Jacques de Savoie prend Regennes quil fait rasé par la population locale. Hôpital psychiatrique à Appoigny","architecture":"REGENNES, en 1569, le château est pris par les protestants et le corps de logis est à nouveau brûlé. Après quil soit endommagé lors des Guerres de Religion, Jacques Amyot le fait ressortir de ses ruines et le rétablit en 1576 dans son état antérieur. De 1764 à 1769, le château sera reconstruit par l'architecte Claude-Louis d'Aviler. L'édifice sera vendu comme bien d'Eglise et rasé en 1791 par ses acquéreurs. Le château des Régennes fut détruit à plusieurs reprises, mais il fut chaque fois reconstruit somptueusement. Trois rois et un dauphin y furent reçus. Le château de Régennes a été vendu en 1791 et fut totalement rasé la même année. Le château actuel a été reconstruit, pour Mr Millon, natif d'Appoigny, entre la première et la deuxième Guerre Mondiale. Le château abrite dans ses murs depuis une clinique. Les jardins sont inventoriés à l'Inventaire général du patrimoine Culturel Français.","habitants":"Mr Millon,\r\n        \"","divers":"Château de Regennes à Appoigny                                                       47° 52' 29\" Nord, 3° 32' 29\" Est","gps":"","images":["../image/image_89/89_Regennes_1.jpg","../image/image_89/89_Regennes_2.jpg","../image/image_89/89_Regennes_3.jpg"]},"Consult_chateau_formulaire55bc":{"id":"Consult_chateau_formulaire55bc","dept":"89","canton":"Auxerre","commune":"Chevannes","nom":"Ribourdin","type":"Château","periode":"XV","histoire":"RIBOURDIN, apparaît à la fin du XVe siècle, au nombre des maisons fortes qui protégeaient le gros bourg de Chevannes. Pierre de Chuin est seigneur de Ribourdin en 1517, jusqu'à sa mort vers 1540. Le fief se transmettra ensuite par mariages jusqu'à sa vente, le 4 mars 1761, à François-Michel Petit de Marivats, commissaires des guerres en Bourgogne, qui le laisse au marquis de Germigny vers 1771. Reconstituer lascension sociale dun bourgeois au temps de Louis XIV : Geoffroy Petit, marchand mercier, directeur des Postes, intendant militaire puis seigneur de Nanteau-sur-Lunain. Depuis Besançon, il se contente d'en percevoir les revenus avant de le céder à la famille de Châteauvieux de Fontaine Madame. La terre est comprise dans la vente faite par les Châteauvieux en 1811, au sieur Davache de Thèze puis se trouve séparée en 1820 et fit l'objet de ventes successives à des fermiers. Les propriétaires actuels, Marie Claude et Claude Brodard, après une année consacrée aux travaux d'aménagements de l'ancienne grange, ouvrent depuis 1995 cinq chambres d'hôtes. situé dans une petite dépression à lest du village où coule un petit ruisseau le château surveille la route qui va de Vallan à Chevannes.","architecture":"RIBOURDIN,  deux corps de logis sarticulent autour dune cour, ils devaient être reliés entre eux par une muraille. Lensemble était flanqué par deux tours, aux angles nord-est et sud-ouest, accolées sur les deux bâtisses opposées. Ce flanquement sur deux côtés rendu possible uniquement par lutilisation darmes à feu de portée moyenne et par la modeste taille de la maison forte, révèle une construction tardive. Des cartes postales anciennes et une gravure de 1897 contredisent le cadastre sur plusieurs points. L'entrée du château semble sêtre effectuée par le nord au siècle dernier, et non par lest comme le suggère le cadastre et il exagère la taille du logis. Une petite tourelle flanque le logis seigneurial par lest. Néanmoins, aucune meurtrière na subsisté sur celui-ci car toutes ont été arrachées, comme sur la tour située au nord-est qui nen possède quune de petit calibre. La façade a gardé ses meurtrières et les traces danciennes fenêtres. Deux canonnières entourent lancienne entrée et deux canonnières informes protègent le sud du corps de bâtiment Est.","habitants":"sieur Davache de Thèze\r\n        \r\n        \"","divers":"Château de Ribourdin à Chevannes                                                   GPS : 47° 45' 09\" Nord et 3° 29' 33\" Est","gps":"47° 45' 09\" Nord et 3° 29' 33\" Est","images":["../image/image_89/89_Ribourdin_1.jpg","../image/image_89/89_Ribourdin_2.jpg","../image/image_89/89_Ribourdin_3.jpg"]},"Consult_chateau_formulaire2413":{"id":"Consult_chateau_formulaire2413","dept":"89","canton":"Auxerre","commune":"Aillant sur Tholon; Chassy","nom":"Roncemay","type":"Château","periode":"XIX","histoire":"RONCEMAY, château XIXe siècle, hôtel restaurant quatre étoiles, avec parcours de golf. Touchant le territoire du Roncemay se trouve un ravissant et très ancien château de Frauville était aux XVIIIe  siècle au cur d'un immense territoire étendu sur plus de 2500 hectares entre les communes de Chassy et de Saint-Aubin Châteauneuf, il fut décidé de construire un pavillon de chasse sur le territoire  le Roncemay pour que les invités de Frauville soient traités convenablement. En 1870 la famille Cahen  dorigine Alsacienne et de confession juive sinstalle à Paris et développe le commerce du café et de lépicerie fine. Le petit-fils du fondateur, Albert Cahen, fit en 1927 un grand mariage d'amour avec une femme charmante, mais non juive. Le mariage nest pas accepté par la famille et il achète en 1928 Roncemay joli pavillon de chasse pour sinstaller avec son épouse. Albert Cahen entretenait amoureusement une vieille Renault 1914, restée au Roncemay, aida beaucoup les familles des prisonniers et des résistants. Albert Cahen mourut en 1972, et son épouse en 1987. Un an après la mort de celle-ci, en 1988, nayant pas de descendance directe, les trois nièces héritières décident de vendre la propriété. Plusieurs personnes, dont François Schneider, industriel Jovinien décident de sunir pour réaliser le golf 18 trous que nous connaissons aujourd'hui et en 1997 propriété de  Mr Schneider.","architecture":"RONCEMAY, investirent en créant un hôtel et un restaurant à la place des communs, corps de ferme et granges. Il sentoure alors des meilleurs artisans de la région et singènue à trouver les matériaux précieux : pierre de bourgogne , carreaux de terre cuite pour les salles de bain, poutres originelles, tuiles plates.  Style dominant   architecture régionale traditionnelle","habitants":"famille Cahen\r\n        \"","divers":"Château de Roncemay à   Aillant sur Tholon;                                       47° 51' 09\" nord, 3° 20' 57\" est","gps":"","images":["../image/image_89/89_Roncemay_1.jpg","../image/image_89/89_Roncemay_2.jpg","../image/image_89/89_Roncemay_3.jpg","../image/image_89/89_Roncemay_4.jpg"]},"Consult_chateau_formulaire45df":{"id":"Consult_chateau_formulaire45df","dept":"89","canton":"Avallon","commune":"St-Leger Vauban","nom":"Ruère","type":"Manoir","periode":"XIII-XIX","histoire":"RUERE, cette baronnie était en 1318 à Huguenin et Pierrot de Veillart ou Véliart qui prirent part au partage de la terre de Sainte-Marie, entre l'abbaye de Reigny et l'abbaye de Vézelay, au finage de Saint-Léger-de-Foucheret. Plus tard, en 1370, Isabelle de Beauvoir, morte après 1399, fille de Jean de Beauvoir seigneur de Thury et de La Guette, officier de Charles le Mauvais et de Jacquette d'Autun-Bordeaux, veuve de Gérard de Bourbon, seigneur de Montperroux la porta en dot avec le Vault, à Philippe Ier de Jaucourt, baron de Villarnoult, qui reçut du duc de Bourgogne : Philippe le Hardi, Marrault, Auxois, Saint-Brancher, Chassigny, chevalier banneret et gouverneur du Nivernais et Donziois, conseiller et enseigne du corps de bataille (Chevau-légers) du duc de Bourgogne, sous le capitaine Enguerrand de Coucy, gouverneur de Philippe, comte de Nevers, commandait des troupes en Champagne (1364-1367).  En 1478, Louis XI donne l'ordre à Charles Ier d'Amboise, gouverneur de Bourgogne de raser des châteaux et maisons à pont-levis de Jean de Jaucourt dit Digoine, qui seront reconstruits au siècle suivant. Devenu protestant les Jaucourt établiront un prêche à Ruères dans leur chapelle. Puis par mariage ce fief entre dans la Maison de Briquemault et sera vendu en 1705 à François Friant, secrétaire de Vauban. Puis viennent les Sainte-Maure qui feront dans la seconde moitié du XVIIIe siècle abaisser la tour d'un étage et d'autres transformations interviendront tout au long du  XIXe siècle et du XXe siècle selon les différents propriétaires.","architecture":"RUERE, le château sera reconstruit au siècle suivant. A la même époque les Jaucourt passent à la Réforme. Un prêche protestant est établi dans la chapelle du château et la propriété entre, par mariage, en la possession de François Tauvenay de Briquemaut, déjà seigneur de Saint-Léger et l'un des principaux lieutenants de l'amiral de Coligny. échappe au massacre de la Saint-Barthélémy, le sire de Ruères sera peu après traduit devant le parlement et pendu en présence de Charles IX. En 1705, Ruères sort des mains de la famille de Briquemaut pour passer, par achat, en celles de François Friant secrétaire du maréchal de Vauban, dont certains indices laissent à penser qu'il a pu naître au château même. Ruères passera ensuite aux Sainte-Maure, qui feront abaisser d'un étage la grosse tour. De nouvelles atteintes seront apportées aux bâtiments du château au cours du XIXe siècle et au début du XXe siècle.                                                                                                    La construction du manoir de Ruères date du XIIIe au XVe siècle.  C'est le lieu de naissance de Sébastien Le Prestre de Vauban. Bien que désigné sous le nom de château, c'était une maison-forte limitée, aujourd'hui, au logis seigneurial. La construction initiale date de la seconde moitié du XIVe siècle.","habitants":"Ruères; Jean de Jaucourt\r\n        \r\n        \"","divers":"A St-Leger Vauban, Ruére                                                                   47° 23' 11\" Nord, 4° 04' 13\" Est","gps":"","images":["../image/image_89/89_Ru%c3%a8re_1.jpg","../image/image_89/89_Ru%c3%a8re_2.jpg","../image/image_89/89_Ru%c3%a8re_3.jpg","../image/image_89/89_Ru%c3%a8re_4.jpg","../image/image_89/89_Ru%c3%a8re_5.jpg","../image/image_89/89_Ru%c3%a8re_6.jpg"]},"Consult_chateau_formulaired959":{"id":"Consult_chateau_formulaired959","dept":"89","canton":"Vincelles","commune":"Sainpuits","nom":"Sainpuits","type":"Château","periode":"XVIII-XIX","histoire":"BARRES, ce château fort a été construit en 1636, de style Louis XIII. Il a été érigé pour Jean Baptiste Couste et achevé, en 1636.  château construit en 1777, puis modifié par Claude-Etienne Chaillou des Barres) (1784-1857), préfet de la Creuse et de l'Ardèche, ami du Roi Frédéric II de Prusse et créateur d'une société savante (la société historique des sciences de l'Yonne). Celui-ci ainsi que son gendre, transforma le château des Barres: aménagement d'une bibliothèque construction d'une aile reliant le château à la bibliothèque, édification d'une chapelle funéraire avec un décor en trompe-l'oeil, aménagement du parc. Le château conserve un fonds d'archives d'intérêt local et national.                                                                                       FLACY,  il se situe sur la RD3 en direction d'Entrains-sur-Nohain. Le corps central du Château de Flacy a été érigé, pour Nicolas de Chégoin, en 1843. Les ailes ont été construites en 1913. Il a servi de colonie de vacances.                                                                                        FLACY,  Nicolas décède en 1877 à lâge de 86 ans et on imagine le plaisir quil retira de ses séjours dans ce cadre de verdure et de dépendances. le 19 mai 2000 le château est acquis lors dune vente aux  enchères  à  la  chandelle  par  à  un  résident  dAlfortville, marchand de biens immobiliers, monsieur Boyadjian. Il reste en létat jusquen 2006 date à laquelle il est  racheté  par  lartiste  sculpteur  aragonais  Angel  Oren-Sanz.   Jacques  Montanier  de  Belmont  en  fut  propriétaire  étant  le  petit  fils  dAngélique de Chégoin elle-même la petite fille de Nicolas de Chégoin. La suite de lhistoire de cette résidence devient différente à partir de son acquisition en 1948 par la caisse dallocations familiales de Douai.","architecture":"BARRES, . Le château a été construit en 1777, fondateur et premier président de la société des sciences historiques et naturelles de l'Yonne de 1847 à 1858. Avec son gendre, il transforma le château. Ainsi, une bibliothèque fut aménagée, une aile fut édifiée pour relier la nouvelle bibliothèque au château. C'est également à cette époque que fut construite la chapelle funéraire avec ses décors en trompe-l'il. Le parc fut également aménagé. Le château a conservé un fonds d'archives d'intérêt local et national. Le château des Barres est inscrit aux M.H. depuis le 5-11-1997\r\nFLACY,  en 1843 est   lannée   de   la   construction  en    pierre    blanche  sculptée sur trois étages du corps de logis central  à deux niveaux sur soubassement le troisième niveau sur comble éclairé par série de lucarnes accolée entre deux pavillons saillants de quatre  niveaux et série de lucarnes sur combles,  la demeure est flanquée dun escalier dhonneur  à  balustrade  entourant  un  grand  balcon  qui  souligne laspect baroque, style de lépoque. Les deux ailes du château furent ajoutées en 1913 lui donnant laspect que  lon  connait  aujourdhui.  Le corps de logis de plan rectangulaire.","habitants":"Famille de Claude-Etienne Chaillou des Barres\r\n        \"","divers":"A Sainpuits château de la  Barres  grav 1-2-3  et de Flacy  grav- 4-5                                                                                               47° 31' 07\" Nord et 3° 15' 29\" Est","gps":"","images":["../image/image_89/89_Sainpuits_1.jpg","../image/image_89/89_Sainpuits_2.jpg","../image/image_89/89_Sainpuits_3.jpg","../image/image_89/89_Sainpuits_4.jpg","../image/image_89/89_Sainpuits_5.jpg"]},"Consult_chateau_formulaire5fca":{"id":"Consult_chateau_formulaire5fca","dept":"89","canton":"Chablis","commune":"Etivey","nom":"Sanvigne","type":"Château","periode":"XV","histoire":"SANVIGNE, nous trouvons en 1390, Aliz de Flavigny, fillle de noble homme monseigneur de Flavigny, chevalier et de feu noble dame, madame Marguerite de Sanvigne jadis sa femme, tient en fief et en hommage de noble et puissante dame mademoiselle de Noyers à cause du chastel de Noyers les choses qui sensuivent c'est a savoir la maison qu'elle a audit Sanvigne.","architecture":"SANVIGNE est située près de la route qui mène à Noyers. Les parties conservées de l'enceinte paraissent remonter à la fin du XVe siècle ou au début du XVIe siècle. Vestiges envahis par la végétation. L'enceinte, de plan polygonal, est flanquée par deux tours d'angle circulaires. Seule la partie inférieure des côtés sud et ouest de l'enceinte est conservée. Elle comprend deux courtines rectilignes en équerre et l'amorce d'une troisième, flanquée, par deux tours d'angle rondes. La courtine ouest est percée de deux baies carrées au linteau décoré d'un arc en accolade, une canonnière subsiste dans l'angle de la courtine et de la tour.","habitants":"monseigneur de Flavigny, \r\n        \"","divers":"Château de Sanvigne                                                                             46° 39' 58\" nord, 4° 17' 40\" est","gps":"","images":["../image/image_89/89_Sanvigne_1.jpg","../image/image_89/89_Sanvigne_2.jpg"]},"Consult_chateau_formulaire9434":{"id":"Consult_chateau_formulaire9434","dept":"89","canton":"Vincelles","commune":"Escolives-Sainte-Camille","nom":"Saulces_Yonne","type":"Château","periode":"XVII","histoire":"SAULCES, le château du Saulce fut construit au XVIIIe siècle à l'emplacement d'une ancienne commanderie de l'ordre de Saint Jean de Jérusalem pour servir de résidence aux commandeurs d'Auxerre. Celle-ci avait été fondée en 1192 par Guillaume Ier, Comte de Joigny, seigneur de Coulanges la Vineuse et Escolives puis abondamment dotée par la famille de Mello. En 1760, Jacques Armand de Rogres de Champignelles, commandeur de 1756 à 1772, fit construire le château et durant les six années qui suivirent sa mutation, en conserva la jouissance moyennant versement d'une pension annuelle à son successeur. Le chevalier de Mallard en prit possession en 1777 et y demeura jusqu'à la veille de la Révolution. Jean de La Varende, son petit neveu, a romancé la fin tragique du Commandeur d'Auxerre dans son ouvrage \"les manants du Roi\". Le dernier détenteur du château fut Edouard-Henri de Fitz James, fils du duc et pair de France, qui en prit possession en 1789. La terre du Saulce fut vendue comme bien national vers 1792. Depuis 2009, le château appartint à la famille De Roubaix. Château situé sur la rive gauche du canal. Il subsiste aujourd'hui : un château de plan barlong, remanié au XIXe siècle et flanqué d'importantes dépendances ; un pavillon de jardin ; le jardin ; le moulin alimenté par un bief dérivé de l'Yonne et du canal du Nivernais.","architecture":"SAULCES,  date du XVIIIe siècle. C'est un château fort. Une commanderie de l'ordre de Saint-Jean de Jérusalem fut fondée en 1192 sur un lieu templier mais plus ne subsiste du passé médiéval ou hospitalier de cette ancienne commanderie. Du XVIIIe siècle demeure un petit pavillon carré intégré dans un vaste parc avec parterres à la française et disposé devant un bassin avec des allées plantées. Les 4 façades présentent la même ordonnance avec un décor sculpté de frises, guirlandes, fruits, fleurs, trophées, motifs de vénerie et halieutiques. Ce petit pavillon, qui annonce le goût des folies, reste un cas unique dans l'Yonne. Le Château du Saulce, de plan barlong, a été remanié. Le fronton de sa façade abrite un bas-relief en terre cuite apparenté à l'oeuvre de Clodion.                                            A 10 km au sud le château de VAL DE MERCY,  faisait parti de la seigneurie de Coulanges-la-Vineuse, et sur cette terre était édifié l'ancien château de cette commune qui a été racheté par Jean Contaud en 1712 (écuyer, employé pour les affaires du roi en Languedoc). Le nouveau château a été construit de 1783 à 1793 par Jean François de Contaud, et n'ayant pas d'héritier masculin, le Val-de-Mercy passa à son gendre, François-Hippolyte d'Aleyrac, dont le fils aîné obtint, en 1875, l'autorisation de joindre à son nom, celui des Contaud de Coulanges. Les descendants, les Chambaudoin d'Erceville, ont possédés le domaine jusqu'en 1975. Imposante bâtisse rectangulaire à trois niveaux toit en croupes recouvert d'ardoises  avec attiques.","habitants":"famille de Mello.                                                                                                        Val de Mercy Jean François de Contaud\r\n        \"","divers":"château de Saulce                                                                                                   47° 43' 23\" Nord, 3° 37' 09\" Est                                                       Val de Mercy","gps":"","images":["../image/image_89/89_Saulces_Yonne_1.jpg","../image/image_89/89_Saulces_Yonne_2.jpg"]},"Consult_chateau_formulairea31a":{"id":"Consult_chateau_formulairea31a","dept":"89","canton":"Chablis","commune":"Sauvigny les Bois","nom":"Sauvigny","type":"Château","periode":"XVII-XVIII","histoire":"SAUVIGNY, un premier château du XVIIe siècle avait appartenu aux seigneurs de Montréal. Après de multiples cessions il a été acquis par la famille Bertier, dont l'un des membres était chevalier de Saint-Louis et conseiller du roi. Entièrement rénové, le château de Sauvigny est un édifice élégant construit au XVIIIe siècle par la famille Bertier et remanié au cours du XIXe siècle. Le pavillon est l'ancien commun d'un édifice plus ancien du début du XVIIe siècle.","architecture":"SAUVIGNY, c'est une construction élégante qui date des premières années de l'Empire,  la construction du château date du XVIIIe siècle, par la Famille Bertier, à l'emplacement d'un édifice plus ancien du XVIIe siècle. Il a été remanié au cours du XIXe siècle. On notera la présence d'un ensemble de boiseries de styles néo-Louis XIV et néo-Louis XV. Le château de Sauvigny-le-Bois est inscrit aux M.H. depuis 1996","habitants":"Famille Bertier\r\n        \"","divers":"Sauvigny les bois le château de Sauvigny                                47° 31' 2,58\" Nord, 3° 56' 29,3\" Est","gps":"","images":["../image/image_89/89_Sauvigny_1.jpg","../image/image_89/89_Sauvigny_2.jpg","../image/image_89/89_Sauvigny_3.jpg"]},"Consult_chateau_formulaire9692":{"id":"Consult_chateau_formulaire9692","dept":"89","canton":"Sens","commune":"Sens","nom":"Sens","type":"Patrimoine","periode":"XVIII","histoire":"SENS-PATRIMOINE, l'Hôtel de Vaudricourt, façade et cour d'un hôtel particulier du XVIIe.                                                                                                           Hôtel Fournier d'Yauville, les cours, porche et façades de cet hôtel particulier du XVIIIe siècle.                                                                                                  Hôtel de Ville de Sens et exposition, édifice inauguré en 1904 par Lucien Cornet, maire de Sens.                                                                        Le Palais archiépiscopal de Sens est un ensemble de bâtiments, qui fut le siège de l'ancien archevêché de Sens jusqu'à la Séparation des Églises et de l'État en 1905, est classé aux M.H. depuis 1862, 1909, 2014, abrite, depuis 1980, les Musées de Sens.","architecture":"LE PALAIS ARCHIEPISCOPAL, c'est un ensemble de bâtiments. le Palais archiépiscopal fut le siège de l'ancien archevêché de Sens. Situé derrière la cathédrale Saint-Étienne, l'ensemble des bâtiments a formé jusqu'en 1905 le palais des Archevêques de Sens et abrite aujourd'hui le musée de Sens et le Trésor de la Cathédrale. Le palais est maintenant composé de quatre corps de bâtiments, disposés autour d'une grande cour. Le côté ouest de la cour est fermé par un grand bâtiment médiéval qui est le Palais synodal. Au sud de la cour se trouve un bâtiment datant du XVIIIe siècle, qui abritait les écuries autrefois. A l'arrière de ce bâtiment, au nord, les jardins de l'archevêché ont récemment été reconstitués avec l'ouverture du pavillon de l'Orangerie comme lieu d'expositions temporaires, tout près de la grande chapelle des archevêques, ensemble édifié au XVIIIe siècle. L'ancien archevêché bénéficie de plusieurs protections aux M.H. grâce à des classements en 1862, 1909 et 2014.","habitants":"archevêché de Sens\r\n        \r\n        \"","divers":"A Sens le Palais. Musées grav-2-3-4, hôtel de ville grav-8, Hotel d'uzès, palais-grav -5 porte grav-1 Poterne grav -6_7 et Théatre grav-9                                                                                         47° 51' 20\" nord, 3° 58' 29\" est                                                                         : 48° 06' 53\" Nord 3° 10' 14\" Est","gps":"","images":["../image/image_89/89_Sens_1.jpg","../image/image_89/89_Sens_2.jpg","../image/image_89/89_Sens_3.jpg","../image/image_89/89_Sens_4.jpg","../image/image_89/89_Sens_5.jpg","../image/image_89/89_Sens_6.jpg","../image/image_89/89_Sens_7.jpg","../image/image_89/89_Sens_8.jpg","../image/image_89/89_Sens_9.jpg"]},"Consult_chateau_formulairef5ed":{"id":"Consult_chateau_formulairef5ed","dept":"89","canton":"Avallon","commune":"Sermizelles","nom":"Sermizelles","type":"Château","periode":"XV-XVI","histoire":"SERMIZELLES; la fin du XIIe siècle voit la construction de l'église avec son clocher fortifié. Elle inclut plusieurs sortes de canonnières. Malgré ces moyens de défense, elle est prise en 1427 (guerre de Cent Ans). Ce château a appartenu à Robert de Domecy qui a commandé la décoration de la salle à manger au peintre Odilon Redon.","architecture":"SERMIZELLES, à cette époque, le village est circonscrit dans un mur d'enceinte qui comprend 8 tours  et deux portes fortifiées. Les fossés sont alimentés en eau par une dérivation de la Cure. Un petit château est construit, dont il ne reste que les aménagements du XVIIe siècle. Un travail d'envergure par le nombre de panneaux (dix-huit ; il n'en subsiste plus que seize aujourd'hui), par leurs dimensions (le plus grand atteint presque 2,50 m de haut), par leur technique mixte (pastel, huile, détrempe) et par le fait que l'iconographie est laissée à l'appréciation de l'artiste.  Re-fortifiè au XVIe siècle, elle inclut alors : d'étroites arquebusières avec fente de visée en façade à tous les niveaux ; des orifices circulaires étroits servant de canonnières sur la tourelle descalier sur le côté nord-est du clocher ; et au rez-de-chaussée, des canonnières à la française rectangulaires, qui donnent un angle de tir plus large.","habitants":"Robert de Domecy \r\n        \r\n        \r\n        \"","divers":"Château de Sermizelles   et tour de Malakoff grav-5                                      7° 32' 13\" nord, 3° 47' 38\" est","gps":"","images":["../image/image_89/89_Sermizelles_1.jpg","../image/image_89/89_Sermizelles_2.jpg","../image/image_89/89_Sermizelles_3.jpg","../image/image_89/89_Sermizelles_4.jpg","../image/image_89/89_Sermizelles_5.jpg"]},"Consult_chateau_formulairec239":{"id":"Consult_chateau_formulairec239","dept":"89","canton":"Tonnerre","commune":"Serrigny","nom":"Serrigny_Yonne","type":"Château","periode":"XVII","histoire":"SERRIGNY, première mention en 1325 lorsque Marguerite de Sarrigny, dame de Roncenay, reconnait \"tenir en fief de très noble chevalier, seigneur de Noyers, les choses qui suivent:  toute la justice que j'ai sur la ville de Sarrigny et audite appartenance qui sont la maison de Sarrigny\". En 1351, Marguerite de Serriny, dame de Roncemay et son mari Adam de Roncemay rendent foi et hommage; Adam, seigneur en partie du village, mentionne tout d'abord la maison forte qu'il a dans la ville de Sarrigny. En 1405, le noble Gilles de Flavigny rend foi et hommage : \"La maison dudit écuyer assise sur la motte de Sarrigny closée de fossés, le vergier tenant au dit fossés,auquel il a un petit fossé tenant au chemin qui va du pont d'icelle motte à la fontaine dudit lieu de Sarrigny et d'autre part au champ de noîers\". Jehan Davout, seigneur de divers lieux dont Serrigny, Marguerite sa soeur qui épouse Chambornet et meurt en 1521 dans la maison forte de Sarrigny. En 1605 et 1606, Terrier cette famille a conservé le château jusqu'à la Révolution. Auguste Anne Louis de Saucières de Tenance, était maire de Serrigny sous l'Empire. Mais en 1836, il a vendu le château à la famille Falateuf, qui l'a agrandit, en profitant d'un incendie en 1882. Depuis 1973, c'est la SCI du château de Serrigny qui le possède et s'emploie activement à le faire revivre et à exploiter ses terres.","architecture":"SERRIGNY, Le château de Serrigny défend l'accès au village par une vallée situé au nord. Il est situé en lisière et semble avoir été ceint de fossés disposés selon un plan carré. Le bâtiment actuel, avec sa belle grille d'entrée, semble dater du XIXe siècle. Serrigny il y a un château fort et maison seigneuriale; comme elle s'étend et comprend en tous ses édifices et appartenances. colombier, portal et pont-levis, le tout fermé de murailles, fossés et entouré d'eau, tenant d'une part au chemin tirant à Tonnerre, d'autre aux prés de ladite maison, seigneurie et château et auquel il y a des prisons, y ayant aussi dudit Serrigny toute justice, haute, moyenne et basse\". Edme de Saucières, baron de Tenance, fait construire le château de Serrigny, sur l'emplacement de l'ancienne demeure.","habitants":"Auguste Anne Louis de Saucières de Tenance,\r\n        \"","divers":"Château de Sérrigny à Serrigny                                                     47° 50' 10\" nord, 3° 54' 53\" est","gps":"","images":["../image/image_89/89_Serrigny_Yonne_1.jpg","../image/image_89/89_Serrigny_Yonne_2.jpg","../image/image_89/89_Serrigny_Yonne_3.jpg"]},"Consult_chateau_formulairece66":{"id":"Consult_chateau_formulairece66","dept":"89","canton":"Saint-Valérien","commune":"Saint-Agnan","nom":"St_Agnan","type":"Manoir","periode":"XIX","histoire":"ST-AGNAN, dans le bourg, au bord du lac, se trouve le manoir du XIXe siècle, construit peut-être sur un ancien château, d'origine non datée. La seigneurie en toute justice de Saint Agnan, mouvante du duché de Bourgogne, appartenait à labbaye de Fontenay qui jouissait de tous les droits féodaux. Elle était tenue en fief en 1686 par la famille Bazin de Saulieu, puis les Chartraire. En 1741, la possession de la seigneurie passa de l'abbaye de Fontenay à Marc Antoine Chartraire, comte de Montigny, mort vers 1750, qui créa haras et forge à Saint Agnan.","architecture":"ST-AGNAN, le manoir aurait été reconstruit vers 1840. Il est curieux d'observer, accolé à la façade sud du bâtiment, une dépendance aux longs toit. Le manoir actuel, type grande demeure, présente une architecture classique sur un plan rectangulaire, couvert par un toit en croupe en ardoises. Bâti en granit taillé et moellon, la façade sur deux niveaux est percée de baies régulières. De belles dépendances sur un plan carré et un parc. Le propriétaire a crée des chambres d'hôtes et un accueil touristique.","habitants":"famille Bazin de Saulieu,\r\n        \"","divers":"Manoit de Saint-Agnan                                                                     48° 18' 23\" nord, 3° 03' 07\" est","gps":"","images":["../image/image_89/89_St_Agnan_1.jpg","../image/image_89/89_St_Agnan_2.jpg"]},"Consult_chateau_formulaire6fce":{"id":"Consult_chateau_formulaire6fce","dept":"89","canton":"Charny","commune":"Saint-Aubin-Château-Neuf","nom":"St_Aubin_Chateau_Neuf","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article, Beaurin et Fourolles.                          BEAURIN,  est cité en 1605, le fief relève de Saint-Maurice-Thizouaille. Le 30 mai 1607, Roch de Racault rend foi et hommage pour le fief de Beaurin. Il a sur ce fief, basse et moyenne justice. Le château de Beaurin est constituée désormais de quelques corps de bâtiments datant  de la fin du XVIIe ou du XVIIIe siècle. On trouve un étang à l'est du château qui fossilisent peut-être d'anciens fossés. Le château semble être porté par la plate-forme primitive. On remarquera que la demeure de l'époque devait se révéler fort modeste, à l'image de cette petite seigneurie. Le château de Beaurin est trop proche de ce site qui se trouve sur la paroisse de Dracy, pour avoir été ignoré par les scribes lorsqu'ils mentionnent une seigneurie ou un fief de Borin. Ceci laisse supposer que ces deux sites n'ont jamais été contemporains. L'un étant exclusivement médiéval, l'autre ayant été créé au XVIe siècle.                                                                             FOUROLLES, a été construit au XVIIe siècle sur l'emplacement d'un édifice existant déjà au XIIe siècle. Cest un fief en franc alleu lors de létablissement dune ferme près de ce point deau arrondie ou fontaine ronde que vendit, le 23 juillet 1614, Loup de La Ferté à Jean Armand, époux de Michelle Jamyon qui, veuve, le revendit le 14 mars 1640 à Léon De France, écuyer, seigneur de La Ronce : cétait alors un bâtiment assis en la justice de Saint-Aubin nayant aucune fenêtre et grandement démoli.","architecture":"FOUROLLES, Adrien de Roslin acquiert  en 1667, à Léon de France, des terres quil possédait et cherche à faire admettre un droit de haute, moyenne et basse justice sur laire de Fourolles ce qui lui vaut des démêlés avec le chapitre de Sens qui détient la justice sur Saint-Aubin. Le chapitre attaque Roslin sur le fait quil a indûment dressé un pont-levis avec flèches à sa maison de Fourolles.\r\nAinsi, selon toute probabilité, il y avait une modeste maison seigneuriale à Fourolles, édifiée au cours du XVIe siècle. Le château était décrit en 1868 avec deux petites tours circulaires et une tour carrée sur le portail d'entrée, des fossés l'entourent. Le château a au cours des siècles vécu l'Histoire de France au rythme de ses illustres et nombreux propriétaires; Antoine de La Salle, Soufflot de Magny y séjournèrent. Aujourd'hui, le château de Fourolles se présente isolé au fond dune vallée, au bord du Vrin. En forme de U, flanqué de deux tourelles sur ses angles nord-est et nord-ouest, il est porté par une plate forme à peu près carrée, entourée de fossés en eau. Lentrée seffectuait à lorigine par lest, par une tour porche équipée dun pont-levis. Au nord, deux ailes en retour déquerre abritent les communs.    Le domaine a été la propriété d'Antoine de La Salle et de la famille Soufflot de Magny.   L'édifice est inscrit au titre des M.H. en 19891.   éléments protégés, Communs, douves, escalier, élévation, toiture.","habitants":"Beaurin,   Roch de Racault                                                                                      Fourolles; Antoine de La Salle \r\n        \r\n        \"","divers":"A Saint-Aubin-Château-Neuf, le château de Beaurin et de Fourolles  47° 49' 25\" nord, 3° 18' 36\" est","gps":"","images":["../image/image_89/89_St_Aubin_Chateau_Neuf_1.jpg","../image/image_89/89_St_Aubin_Chateau_Neuf_2.jpg","../image/image_89/89_St_Aubin_Chateau_Neuf_3.jpg","../image/image_89/89_St_Aubin_Chateau_Neuf_4.jpg"]},"Consult_chateau_formulaire2b77":{"id":"Consult_chateau_formulaire2b77","dept":"89","canton":"Charny","commune":"St_Aubin_Château-neuf","nom":"St_Aubin_Chateau_neuf_II","type":"Château","periode":"XVI-XVII","histoire":"FRAUVILLE, à la fin du XVe siècle ou au début du XVIe siècle, la famille de Courtenay, en réinvestissant ses possessions désolées après leur abandon au XVe siècle, doit reconstruire son ancien manoir de Frauville. En novembre 1631, la maison seigneuriale de Frauville est donnée à demi profit à Etienne Le Loup. Le château de Frauville se compose de nos jours dun bâtiment d'aspect fin XVIIIe siècle, posé sur une plate-forme fossoyée par les anciennes douves aujourd'hui asséchées et larges de plus de dix mètres. Les fossés ont été creusés très régulièrement et maçonnés avec des rognons de silex pris dans du mortier. Cet empierrement semble assez moderne. A l'est au-devant du château, on devine la base d'une tour dont l'existence est confirmée par le cadastre de 1832. La partie située sous les logis semble plus ancienne. Le cadastre indique deux enceinte de fossés en eau: celle encerclant le château et une autre entourant les communs, d'une largeur bien plus modeste denviron cinq mètres. L'entrée de la plate-forme du château se fait par le sud. Le bâtiment des communs, en forme de U, est flanqué, sur le cadastre, d'une tourelle à son angle sud-ouest.","architecture":"FUMERAULT, le 25 octobre 1549, partage établi dans la famille de Courtenay où apparaît la terre, fief et seigneurie de Fumerault, qui semble n'avoir porté alors qu'une demeure fort modeste. Le 19 septembre 1556, Guillaume de Courtenay rend foi et hommage à René de Courtenay seigneur de La Ferté-Loupière, avec les droits de haute, moyenne, et basse justice sur toute létendue du fief de Fumerault entraînant celui de pont-levis et de colombier. Il fut acquis en 1673 par Adrien Roslin, curé de Saint-Merry, à Paris, célèbre par ses démêlés avec les jansénistes. En 1788, celui-ci vend Fumerault à François Roslin, sieur de Préval et de Beaurin dont la famille conserva la propriété jusqu'en 1817. Pierre-Frédéric Lemonnier s'en porte alors acquéreur. En 1851, Charles Bazin prend possession du domaine qu'on appelle La Ricardière, sa femme l'ayant hérité de Pierre Frédéric Lemonnier dont elle est la petite nièce. Une fille Bazin épouse un certain Jauffret qui vend le château en 1920, au comte Rossi di Montelera, propriétaire de la firme Martini. Fumerault devient en 1958 la propriété de la famille Moreau. Le château du XVIIIe siècle, est remanié et apuré, dans son aspect global par Pierre-Martial Moreau. Aujourd'hui le château sorganise en un corps de bâtiment flanqué de deux ailes en retour déquerre, le tout posé sur une plate-forme légèrement surélevée.","habitants":"famille de Courtenay \r\n        \r\n        \"","divers":"A St-Aubin-Château-neuf deux châteaux Frauville grav-2-3   et Fumerault grav-1                                                                               47° 49' 25\" nord, 3° 18' 36\" est","gps":"","images":["../image/image_89/89_St_Aubin_Chateau_neuf_II_1.jpg","../image/image_89/89_St_Aubin_Chateau_neuf_II_2.jpg","../image/image_89/89_St_Aubin_Chateau_neuf_II_3.jpg"]},"Consult_chateau_formulairebe60":{"id":"Consult_chateau_formulairebe60","dept":"89","canton":"Auxerre","commune":"Saint-Bris le Vineux","nom":"St_Bris_le_Vineux","type":"Château","periode":"XVII","histoire":"ST-BRIS, cette famille de Dreux de  Mello picarde arrive à la tête de la seigneurie de Saint-Bris dans la seconde moitié du XIIe siècle. Cette  famille s'éteint en 1490 par la mort de Charles de Mello sans postérité, sa veuve Catherine de Rougemont lui apporte la baronnie en dot.  L'héritage   échoit à la famille de Vernaux puis indivision des Intervilles et des Gruyer, puis réunifiée  à Charles de Coligny  d'Andelot  époux de Huberte de Castenay d'Interville   qui obtient l'érection en marquisat.  En 1642 achat par Jean de Lambert, son fils Henri lieutenant général  des armées du roi, époux de la célèbre marquise. En 1754 à la mort d'Henri-François de Lambert lieutenant général des armées et Gouverneur d'auxerre, les terres de St-Bris passe par Héritage au comte de Lillebonne, de la maison d'Harcourt qui  cède le domaine en 1763 à Joseph-Guillaume-Augustin Deschamps de Charmelieu receveur des tailles, il fut assassiné. Au XIXe siècle de domaine appartient au Petiet-Larousse. La commune en fait acquisition en 1863   et y installa une école et la mairie.","architecture":"ST-BRIS, le château le plus ancien a été détruit pendant les Guerres de Religion, il sétendait sur cinq hectares environ. Il ne reste que deux tourelles au milieu des bois de Senois,  le château actuel. composé d'un pavillon central flanqué de deux ailes dans le goût dorique. Il mesure 48,70 mètres de long et 8, 50 mètres de large. Lentrée principale était située à larrière de léglise, près du chur. Un portail Renaissance, orné de feuilles de chênes, flanqué de deux pilastres décorés de palmes et de casques et de deux tourelles reliées par une galerie donnait accès à une cour intérieure qui contenait les écuries. Du côté de la mairie, on distingue nettement la structure du château : un pavillon central, surmonté dun fronton où sont sculptées les armes des Lambert, et deux ailes de style dorique grec ornées de têtes en relief.","habitants":"Henri-François de Lambert \r\n        \"","divers":"A Saint-Bris le Vineux, le château de Saint-Bris                             47° 44' 39\" nord, 3° 39' 01\" est","gps":"","images":["../image/image_89/89_St_Bris_le_Vineux_1.jpg","../image/image_89/89_St_Bris_le_Vineux_2.jpg","../image/image_89/89_St_Bris_le_Vineux_3.jpg"]},"Consult_chateau_formulaire38da":{"id":"Consult_chateau_formulaire38da","dept":"89","canton":"Toucy","commune":"ST-Fargeau","nom":"St_Fargeau","type":"Palais","periode":"XV-XVII","histoire":"SAINT-FARGEAU,  du Xe rendez vous de chasse, au XVe siècle,  vendu à Jacques Coeur le célèbre argentier de Charles VII qui est arrêté un an après accusé de l'empoisonnement d'Agnès Sorel (complot des argentiers),   le château a pour propriétaires des familles illustres : les seigneurs de Toucy, de Bar jusqu'en 1430 vendu à la maison de Montferrat. Le château fut reconstruit en 1453 sur les bases de l'ancien édifice par Antoine de Chabannes, érigé en comté en 1541 revient à Nicolas d'Anjou, descendant d'un bâtard du roi René transforme le château en style Renaissance. En 1566 passe par mariage à François de Bourbon duc de Montpensier dont la petite fille épousera le frère de Louis XIII, Gaston d'Orléans  de ce mariage naîtra la Grande Demoiselle, Anne-Marie-Louise d'Orléans de Montpensier, cousine germaine du roi Louis XIV, fille de Gaston d'Orléans, surnommée la grande Mademoiselle, fut exilée à Saint Fargeau en 1652 à cause de ses prises de position pendant la Fronde. Elle confie la restauration des façades de Saint Fargeau à l'architecte François Le Vau, les deux ailes figurent parmi les plus élégantes des premiers bâtiments classiques en France. passe  au mari de la princesse le duc de Lauzun le château est vendu  en 1715 a Michel Le Pelletier  et demeurera dans cette famille pendant quatre générations. Louis Michel Le Pelletier des Forts, contrôleur des finances fait édifier l'aile nord-ouest,en 1752 un incendie ravage la ville et trois quarts du château à la veille de la Révolution. Le château appartenait  à Louis le Pelletier le passa à sa fille qui épousera en secondes noces  son cousin Le Pelletier de Mortefontaine et passe en 1809 en héritage au Boisgelin, aux Anisson du Perron puis à la marquise d'Ormessson, mère  de l'écrivain. Aujourd'hui appartient à monsieur Guyot.","architecture":"DANNERY, en  1652, la Grande Mademoiselle, Anne Marie Louise d'Orléans, exilée sur sa terre de Saint-Fargeau, logea quelque temps à Dannery, que son propriétaire, Nicolas Davau, contrôleur de la maison du duc de Guise, mit à sa disposition . Marie Davau apporta le château de Dannery à son mari Philippe de la Verne. Puis il passera à la fin du XVIIe siècle, par mariage de leur petite-fille, aux Du Deffand, qui le vendirent à Edme Paul de Vathaire du Fort en 1802. Dannery demeurera dans cette famille jusqu'en 1891.                                                                       SAINt-FARGEAU, le château actuel élevé sur les  fondations  de l'édifice primitif au XVe siècle, il se présente comme un majestueux pentagone recouvert d'ardoises et flanqué de six tours monumentales dont cinq sont ornées de campanile. l'épaisseur de ses murs était suffisante pour résister à la puissance des canons. la tour du Trésor qui avec la tour du Bégault encadre la façade, atteint vingt deux mètres de diamètre. En 1752, un incendie ravagea le château et une partie de la ville. Le château est très célèbre au XIXe siècle en particulier pour son jardin à l'Anglaise et ses chasses à courre. C'est un bâtiment en très mauvais état que Michel et Jacques Guyot achètent en 1979 et tentent de le restaurer.\r\nLe château de Saint Fargeau est ouvert à la visite, les parties restaurées tout au moins. Il héberge le spectacle historique  son et lumière organisé par les amis du château de Saint-Fargeau afin de financer les restaurations.","habitants":"Antoine de Chabannes-Anne-Marie-Louise d'Orléans de Montpensier,                                                                                  Dannery; Nicolas Davau,\r\n        \"","divers":"Château de  ST-Fargeau  et de Dannery grav-1-2                          47° 38' 22\" Nord et 3° 04' 19\" Est","gps":"","images":["../image/image_89/89_St_Fargeau_1.jpg","../image/image_89/89_St_Fargeau_2.jpg","../image/image_89/89_St_Fargeau_3.jpg","../image/image_89/89_St_Fargeau_4.jpg","../image/image_89/89_St_Fargeau_5.jpg","../image/image_89/89_St_Fargeau_6.jpg"]},"Consult_chateau_formulaired69a-2":{"id":"Consult_chateau_formulaired69a-2","dept":"89","canton":"Avallon","commune":"Saint-Germain-des-Champs","nom":"St_Germain_Champs","type":"Château","periode":"XIII-XVI-XVIII","histoire":"Deux châteaux dans cet article; Lautreville et Railly.                               RAILLY, dominant le lac du Crescent et la Cure, se trouvait un château-fort féodal du XIIIe siècle, remanié au XVIIe et reconstruit au XIXe siècle. Du XIIIe au XVIIIe siècle, le fief de la Gorge appartient presque toujours aux seigneurs de Railly. Ces noms sont tirés surtout des archives de Chastellux, dont Railly mouvait noblement, même daprès les plus anciennes chartes. En 1280, Guyot de Railly, seigneur de la Gorge, damoiseau et écuyer, fait hommage à Guy de Chastellux, chevalier, de tout ce quil tient en la ville de Railly et en toutes ses dépendances, hommes, femmes, cens, rentes, prés, bois, justices et seigneuries. En 1311, reconnaissance de fief par Isabelle, veuve de Guy de Railly, damoiseau. En 1324, reconnaissance passée par Guillaume de Railly, damoiseau, à Guy, seigneur de Chastellux, pour ce qu'il possède audit lieu de Railly, c'est-à-dire une maison entourée de fossés. En 1372 aveu et dénombrement par Guillaume de Railly, écuyer, à dame Laure de Bordeaux, dame de Chastellux. En 1764, il fut vendu par Antoine dEscorailles à Nicolas-Marie Chauveau. Celui-ci le revendit en 1781 à Jean-Louis de Morot de Grésigny. Pendant la Révolution, le château de Railly accueillit, à linstar de celui de Lautreville, des prêtres réfractaires. En 1806, le château fut vendu à Léonard Houdaille. Son petit-fils, Achille, fit ajouter, en 1860, deux tours aux anciens bâtiments, et de grands corps de logis.","architecture":"LAUTREVILLE, selon l'abbé Baudiau, Lautreville formait, avec Villers-lès-Potot en partie, Velars et La Verdière, un fief en toute justice, prévôté et messerie, mouvant du duché de Bourgogne. Cette terre était possédée en 1248 par Bernard de Luzy. Il évoque la destruction du manoir féodal sans préciser de date: après la destruction de ce manoir les habitants durent se soumettre au même devoir envers la forteresse de Chastellux. Mais ils se libérèrent en 1628 en payant seize sous par feu, chaque mois, en temps troubles. La demeure actuelle date du XVIIIe siècle. Elle accueillit, pendant la Révolution, plusieurs prêtres réfractaires qui avaient refusé de prêter serment à la constitution civile du Clergé. Après 1810, le manoir fut transformé en maison de charité qui accueillait les pauvres des environs, une grande demeure en pierres, sur deux niveaux percés de baies régulières et avec des dépendances.                                                                                        RAILLY, aujourdhui le château, sur un plan en équerre, sur deux niveaux, est pourvu à chaque angle dune tour coiffée dun toit conique. Du château du XVIe siècle, il ne subsiste plus que la façade et la tour nord-est. La reconstruction imitant lancienne, date de 1861. Les pierres grand appareil, reflétant les tons grisâtres du granit de Quarré, conservent par conséquent un caractère local à lédifice. Cet air de sévérité et de jeunesse, de solidité et de bon goût, est loin du nuire au site, lun des plus beau du territoire. Le château comporte un grand parc et des dépendances. Une grande ferme avec une belle villa vénitienne dépendant anciennement du château se trouve au nord de celui-ci.","habitants":"Lautreville;  Bernard de Luzy.                                                            Railly,  Guy de Railly\r\n        \"","divers":"Deux châteaux; Lautreville grav -1-2 et Railly grav 3-4-5.                          47° 24' 41\" nord, 3° 55' 20\" est","gps":"","images":["../image/image_89/89_St_Germain_Champs_1.jpg","../image/image_89/89_St_Germain_Champs_2.jpg","../image/image_89/89_St_Germain_Champs_3.jpg","../image/image_89/89_St_Germain_Champs_4.jpg","../image/image_89/89_St_Germain_Champs_5.jpg"]},"Consult_chateau_formulaireec1c":{"id":"Consult_chateau_formulaireec1c","dept":"89","canton":"Joigny","commune":"St-Julien de Sault","nom":"St_Julien_de_Sault","type":"Château","periode":"XIV-XVII-XIX","histoire":"SAINT JULIEN de SAULT, à la suite de la Grande Peur, le 26 juillet 1789 on consacre une messe à la levée d'une milice bourgeoise pour la garde de la ville, qui deviendra une garde nationale. Les officiers municipaux demandent un corps de garde pour la ville. Un appentis est construit, à l'extérieur du clocher à côté de la porte principale, aux frais de la fabrique autorisée à le louer lorsqu'il ne sera pas occupé par la garde nationale34. Le curé prête serment à la constitution civile du clergé. En 1792, les habitants de Saint-Julien forment la 6e compagnie de volontaires des bataillons de l'Yonne pour aller combattre les armées alliées autrichiennes et prussiennes qui arrivent le long des frontières. Leur capitaine Louis Jean-Baptiste Cornebize devint par la suite baron d'Empire,  C'est surtout à partir de 1793 que la municipalité et le clergé plièrent sous la Terreur.                                                                                                                       VAUGUILLAIN,  était une forteresse qui appartenait aux Archevêques de Sens construite vers 1168 à l'emplacement d'un ancien camp gallo-romain. Au XIVe siècle, les murs d'enceinte de la forteresse sont reconstruits une première fois par les habitants suite aux dévastations provoquées par la guerre. Ce fut à nouveau le cas en 1406 et en 1492. Au milieu du XVIIe siècle, le château est abandonné mais la chapelle est entretenue par les villageois, et ce, jusqu'à la fin du XVIIIe siècle. A la révolution, la chapelle est vendue à un vigneron de Vauguillain puis rachetée par les villageois. Malheureusement, faute de moyens suffisant pour l'entretenir, ils la revendent en 1813. La chapelle aura comme dernier propriétaire privé le Dr Bernard Chérest qui décide d'en faire don à la ville de Saint-Julien-du-Sault en 1962.","architecture":"SAINT JULIEN de SAULT, longtemps la rivière a été franchie par un gué seulement praticable en saison sèche, puis un bateau remplacé par un bac dans les années 1820. Afin notamment de favoriser les activités agricole entre les villes de la rive gauche et celles de la rive droite et le passage des journaliers et pour éviter d'aller passer le pont de Villeneuve-sur-Yonne et le pont de Joigny, on construisit un pont à péage en 1833. Ce pont suspendu  construit par décret de Louis-Philippe du 24 juillet 1832 d'une longueur de 90 m est une uvre de la Compagnie Seguin (Marc Seguin) qui a financé la construction du pont dont elle était propriétaire pour une concession de 99 ans et dont elle assurait le péage. Toutefois le péage s'est arrêté puisque la loi du 30 juillet 1880 obligeait les communes de racheter les concessions, pour rendre libre et gratuit l'accès au pont.                                                                            CUDOT, le premier édifice du XIIe siècle a été bâti à partir d'une ferme seigneuriale qui correspond à la cour nord-est du château actuel. Le pigeonnier et les écuries sont du XVe siècle. L'actuelle partie habitable en brique rouge a été reconstruite au XIXe siècle grâce à la femme de Gaston de Saint-Phalle, née Alix de Man d'Attenrode. La famille Saint-Phalle a possédé cette demeure du XIIIe siècle, jusqu'en 1991. La famille Arthus-Bertrand en est propriétaire
