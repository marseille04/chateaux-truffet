/89_Chaumont_Yonne_1.jpg","../image/image_89/89_Chaumont_Yonne_2.jpg","../image/image_89/89_Chaumont_Yonne_3.jpg","../image/image_89/89_Chaumont_Yonne_4.jpg"]},"Consult_chateau_formulaire2d71":{"id":"Consult_chateau_formulaire2d71","dept":"89","canton":"Villeneuve-sur-Yonne","commune":"Chaumot","nom":"Chaumot","type":"Château","periode":"XVI-XVIII","histoire":"CHAUMOT, c'était un ancien château de style médiéval puis classique à la moderne. L'architecte était Jacques-Guillaume Legrand. Le château de Chaumot fut édifié au cours du Xe siècle et reconstruit à la moderne au XVIe siècle dans le creux du vallon, au sud-est du hameau des Vinées. La légende raconte que Saint Louis aurait fait jaillir de sa lance les trois sources du château. Le château de Chaumot appartenait au Prince François-Xavier de Saxe, qui y logeait sa cour et sa famille. Il état l'oncle du roi Louis XVI. Le Château de Chaumot fut détruit et pillé après la Terreur. Louis Jacques Thénard avait fait déplacer les deux tourelles et les avait fait rattacher à sa ferme. Il n'en reste qu'une seule, depuis. Il ne subsiste du château de Chaumot que des ruines, des aqueducs, des souterrains, un parc, des sources, les traces de bassins et jardins, les caves et quelques communs. Deux princesses naquirent dans la chapelle Sainte-Marie-Madeleine du château de Chaumot : Béatrix de Saxe épouse Rario-Sforza di Corleto en 1772, et Cunégonde de Saxe épouse Patrizi Naro Montoro en 1774. A la fin de la Terreur, le château de Chaumot fut pillé, puis mis en vente par les filles du Prince de Saxe, en 1809.  Le château « retiré » des mains du prince en 1792, et décrété bien national, sera incendié par les habitants. À la fin de la Terreur, la demeure est pillée, puis vendue en « pièces détachées » par les filles du prince de Saxe de 1809 à 1818.","architecture":"CHAUMOT,  un tunnel souterrain médiéval, confirmé par les anciens du village, prend alors son point de départ (bouché) au douves du château, puis passe légèrement sous toute la longueur du hameau des Marnes, puis sous l'ancienne avenue du château, allant du château principal au château de Mardelin où le point d'arrivée n'est pas bouché, mais bien gardé. Le tunnel fait 2170 mètres. La grille et le pont du château de Chaumot ont été déplacés à Pennery, en 1809.                                                                                                             BOIS-ROND est un château bâti à Bussy-le-Repos, à deux kilomètre au sud\r\nFerme du manoir THENARD à Chaumot et les tourelles déplacées du château, en 1900.                                                           COURTOIN, à Domats, Robert Knolles, chef de guerre anglais surnommé « le vieux bandit », est l'une des plus sinistres figures, ravage le village en 1358. Il ne reste alors plus que ruines et cendres. En 1383, soit 26 ans après,  le château est en épines et en désert. Ce texte, extrait de l'acte d'aveu et dénombrement de Raymond de Mareuil, prouve que l'existence d'un château à Domats n'est pas une légende. Au lieu-dit de la Motte Gâteau, sur l'ancienne route de Domats à Courtenay, ou au cur du village                   Au moyen-âge, la terre de Courtoin appartenait à labbaye de château-Landon. Elle fut vendue en 1667 au seigneur de Chaumot. Le Prince Xavier de Saxe, oncle de Marie-Antoinette, en fut le dernier propriétaire avant la révolution. Son château, ses terres, et son étang, ont appartenu au prince François-Xavier de Saxe.","habitants":"Prince François-Xavier de Saxe\r\n        \"","divers":"Bois-Rond  grav-3,    Courtoin  grav  1-2       Thénard grav-4 et     Chaumot grav-5                                                                      GPS : 48° 04' 37\" Nord, 3° 13' 12\" Est","gps":"48° 04' 37\" Nord, 3° 13' 12\" Est","images":["../image/image_89/89_Chaumot_1.jpg","../image/image_89/89_Chaumot_2.jpg","../image/image_89/89_Chaumot_3.jpg","../image/image_89/89_Chaumot_4.jpg","../image/image_89/89_Chaumot_5.jpg"]},"Consult_chateau_formulairef0d7":{"id":"Consult_chateau_formulairef0d7","dept":"89","canton":"Tonnerre","commune":"Cheney","nom":"Cheney","type":"Château","periode":"XVIII","histoire":"CHENEY; le château fut construit vers 1770 par Antoine Pierre Crespin Quatrefoux de La Motte, fournisseur des selliers de Louis XV. Au début du XIXe siècle, le château appartint à la famille de Vergennes, puis à M. Junonce. C'est au milieu de ce siècle, que M. Textoris, agent de change, le posséda, son amour des chasses fit dire qu'il avait été ancien capitaine des chasses de Louis Philippe. A sa mort, le château passa aux mains de son gendre Mr Archdeacon, d'origine irlandaise, puis au fil de celui-ci, député du Ier arrondissement de l'Yonne, époux de Mlle de Rocquigny du Fayel. En 1906, leur fille, épouse du comte Chandon de Briailles, en hérita. Il fut mis en vente peu après et la mutuelle du bâtiment, devenue propriétaire, le transforma en aérium pour enfants, et de nouveau mis en vente en 1973, il est aujourd'hui la propriété du centre hospitalier de Tonnerre.","architecture":"CHENEY, le château est constitué d'un corps de logis principal flanqué de deux pavillons en légère saillie. Son élévation comprend un rez-de-chaussée surélevé et percé de baies cintrées, d'un étage carré percé de baies rectangulaires et d'un étage de comble ouvert par des lucarnes. Les trois travées centrales des façades côté cour d'honneur et côté jardin sont surmontées d'un fronton triangulaire sculpté et percé d'un oeil-de-boeuf. L'ensemble est construit en pierre et couvert de toitures à croupes en ardoise. Ce château a reçu un décor \"à la grecque\", typique de cette époque: la façade latérale donnant sur le canal est ainsi ornée de tores de laurier et de masques humain ou animal. Un portail donnant sur le canal permet un accès secondaire au domaine. Une rigole d'alimentation en provenance du parc alimente le canal en aval du site d'écluse 98 Y.","habitants":"famille de Vergennes\r\n        \"","divers":"Château de Cheney  47° 54' 30\" nord, 3° 56' 54\" est","gps":"","images":["../image/image_89/89_Cheney_1.jpg"]},"Consult_chateau_formulaire2b9e":{"id":"Consult_chateau_formulaire2b9e","dept":"89","canton":"Auxerre","commune":"Chevannes","nom":"Chevannes_89","type":"Maison forte","periode":"XV-XVI","histoire":"plusieurs châteaux dans cet article;  de la famille Mérat Chevannes, Beaulches, la Motte, Ribourdin voir article.                                                                                                BEAULCHE, en 1248, Guillaume de Mello fait hommage à lévêque, Guy de Mello pour la maison forte de Beaulches. En 1319, Raoul de Brienne devient seigneur de Beaulches, en épousant Jeanne de Mello. Charte de rémission accordée en août 1380, à Thibaut Bonnes, laboureur détenu dans les prisons du château de Beaulches pour des larcins effectués au détriment dAgnès veuve de Jean de Chevannes. En novembre 1472, Jacques de Savoie, comte de Romont, chef du parti bourguignon, détruit le château. Le 23 août 1490, Jacques de Veilhan, écuyer reçoit pour Jean de Chabannes, son maître, lhommage du duc de Nevers pour la seigneurie de \"la basse cour de Beaulche\".                                                   La MOTTE, au XVIe siècle aveu et dénombrement de la terre de la Motte Chevannes par Messire de Cullon. En 1534, Jacques de Chuin, seigneur de la Motte, aurait laissé après sa mort sa demeure, relevant de la châtellenie de Beaulches, à sa fille Marie de Chuin qui épouse Georges de Cullon. Le château de la motte est situé au sud de Chevannes et surveille la route dEscamps.","architecture":"BEAULCHE, la maison forte de Beaulches sorganise en un ensemble de bâtiments liés entre eux, formant une structure circulaire, à lintérieur de laquelle sinscrit une cour. Au sud, une tourelle carrée est toujours visible. Deux rainures encadrant une archère sy distinguent, elles servaient peut être aux bras dun pont-levis, à la base de la tour.                                                                                             La MOTTE, cet édifice ne paraît pas avoir été un habitat fortifié. Le corps de logis, doté de deux étages, est flanqué dune tourelle coiffée dune poivrière à son angle nord-est. Au sommet de celle-ci, une bretèche protège une porte dentrée monumentale de style gothique flamboyant qui souvre à lest. Les armes du seigneur sont inscrites au centre d'un galbe sculpté au-dessus de la porte. Sur le corps de logis, les seules ouvertures désormais visibles sont des fenêtres à meneaux. Pour être complet, il faut noter que les corps de ferme, bordant la demeure au sud-ouest, sont probablement danciens communs. Site appelé aussi la Mothe-Cullon du nom d'une famille qui en possédait la seigneurie autrefois.","habitants":"Beaulches Jean de Chabannes,                                                   la Motte; famille Jacques de Chuin, \r\n        \"","divers":"château de  Chevannes grav-3-4, Beaulches grav-1   Fontaine madame grav-2-  ,                                                          la Motte,47° 45' 03\"  nord, 3° 29' 35\" est","gps":"","images":["../image/image_89/89_Chevannes_89_1.jpg","../image/image_89/89_Chevannes_89_2.jpg","../image/image_89/89_Chevannes_89_3.jpg","../image/image_89/89_Chevannes_89_4.jpg"]},"Consult_chateau_formulairedaa8":{"id":"Consult_chateau_formulairedaa8","dept":"89","canton":"Charny","commune":"Charny Orée de Puisaye,","nom":"Chevillon","type":"Forteresse","periode":"XII-XV-XVIII","histoire":"CHEVILLON, au début du XVe siècle Jean de Courtenay, seigneur de Bléneau, de Champignelles et de La Ferté-Loupière, apparaît comme possesseur de la terre de Chevillon dont il est déjà fait mention au XIIe siècle. Marié à Catherine de l'Hospital, ils eurent plusieurs enfants dont Pierre de Courtenay, seigneur de La Ferté-Loupière et Chevillon, marié à Perrine de La Roche. Le second fils né de cette union, Jean de Courtenay, hérita de la terre de Chevillon qui demeura dans  la famille jusqu'à Louis, Prince de Courtenay, Comte de Césy, né en 1610 et mort le 23 novembre 1672, qui ne cessa de protester à la cour pour être reconnu dans sa qualité de prince du sang de France comme descendant direct de Louis VI le Gros. Le 1er avril 1661, il vendit sa terre, peut-être pour payer les frais considérables de la succession de son cousin Courtenay Bléneau dont il héritait. Le comte du Roure, Louis-Pierre-Scipion de Grimoard, s'intitule seigneur de Chevillon (vers 1692) et le reste jusqu'aux 1ères années du XVIIIe siècle quand la terre est acquise, avant 1722, par Abraham de la Fitte, marquis de Pelleport, lieutenant général des armées du roi. A sa mort, Chevillon est saisi le 3 décembre 1745, et adjugé à Claude-Mathieu Radix, conseiller du Roi. Il y mourut le 29 décembre 1752 le laissant à ses enfants dont l'aîné, Claude-Mathieu Radix, héritier de Chevillon, fut contraint de mettre le domaine en vente pour faire face aux dépenses de son frère, intendant du futur Charles X. Acquis en 1784, il ne profita guère à son nouveau propriétaire, Etienne Philippe, marquis de Villaines. En 1950 sert de centre de colonies de vacances, sa perte fut sauvé par Serge Grimberg qui s'en porte acquéreur.","architecture":"CHEVILLON,  Construit au XVe au XVIIe siècle, le château de Chevillon possède une forme géométrique. il a été remanié au XVIIIe et XIXe siècle. Il appartient à la Famille de Courtenay qui participa autrefois aux croisades, en 1745  Claude-Mathieu Radix, conseiller du Roi. Le château était dans un grand état de délabrement ; le nouveau seigneur le restaura, l'embellit et le meubla avec goût. Il est inscrit aux M.H. depuis le 6/11/1985  Seuls les extérieurs se visitent.  la propriété fut vendue comme bien national à un marchand de vin de Joigny, qui s'empressa de détruire une aile importante du château et, bénéfice fait, le céda à un autre.","habitants":"Jean de Courtenay,\r\n        \"","divers":"a Charny Orée de Puisaye, le château de Chevillon 47° 49' 14\" nord, 3° 06' 07\" est","gps":"","images":["../image/image_89/89_Chevillon_1.jpg","../image/image_89/89_Chevillon_2.jpg","../image/image_89/89_Chevillon_3.jpg","../image/image_89/89_Chevillon_4.jpg","../image/image_89/89_Chevillon_5.jpg"]},"Consult_chateau_formulaire11a8":{"id":"Consult_chateau_formulaire11a8","dept":"89","canton":"Joux la Ville","commune":"Asquins","nom":"Choslin","type":"Forteresse","periode":"XVI","histoire":"CHOSLIN, une tour a conservé ses meurtrières. Sa construction remonterait au XVIe siècle, et aurait subi des remaniements aux XVIIIe et XIXe siècles. Son bâtisseur est inconnu bien que la tradition locale, depuis 1900, le nomme manoir de Choslin, du nom dune famille originaire de Bazoches.  Au 11 rue du Four, une grange imposante est appelée \"grange aux Dimes\". Remaniée au XIXe siècle, elle daterait du Xe siècle selon certaine sources.","architecture":"CHOSLIN, au bas de léglise, au nord, se trouve un manoir fortifié, dorigine imprécise, appelé « rendez-vous de chasse », dont une tour a gardé des meurtrières. Nous navons que peu dinformations sur ce bel ensemble.   Sa construction remonterait au XVIe siècle, et aurait subi des remaniements aux XVIIIe et XIXe. Son bâtisseur est inconnu bien que la tradition locale, depuis 1900, le nomme manoir Choslin, du nom dune famille originaire de Bazoches (notaire).\r\nLe manoir fut transformé en ferme. Le cadastre de 1819 le montre dans son plan actuel. Entourant une cour pavée, on observe un corps de logis, une dépendance type grange-écurie, deux tours et deux murs. La tour ronde percée de meurtrières renferme un escalier en colimaçon. La tour carrée est un pigeonnier. Le logis, bâtiment le plus ancien, comporte quatre salles voutées ,et à létage trois grandes pièces distribuées par un couloir, coté cour. Lensemble est couvert en tuiles de Bourgogne. Les sources situées à proximité justifient probablement labsence de caves. Une des sources appelée Cholin, alimente en partie Vézelay.","habitants":"Famille choslin\r\n        \"","divers":"A Asquins le château de Choslin   47° 28' 52\" nord, 3° 45' 21\" est","gps":"","images":["../image/image_89/89_Choslin_1.jpg","../image/image_89/89_Choslin_2.jpg","../image/image_89/89_Choslin_3.jpg","../image/image_89/89_Choslin_4.jpg"]},"Consult_chateau_formulaire35b9":{"id":"Consult_chateau_formulaire35b9","dept":"89","canton":"Vincelles","commune":"Coulangeron","nom":"Chéry","type":"Château-fort","periode":"XV-XVI","histoire":"CHERY, le fief de Chéry n'apparaît qu'assez tardivement comme relevant de la terre de Merry Sec. En 1473, Blaise Tribolé, avocat du duc à Auxerre et Germain de Chuin, son beau-frère possédaient l'un et l'autre plusieurs fiefs en Auxerrois. Leurs descendants sont détenteurs de la seigneurie de Chéry au début du XVIe siècle, Pierre de Chuin pour le manoir et les trois quarts de la terre et les Tribolé pour une modeste portion. Les derniers des Chuin cédèrent la maison seigneuriale et les trois quarts de la terre de Chéry, le 19 août 1623, à Marie de la Borde, veuve de Loup de la Ferté. cinq ans plus tard, le 2 mai 1628 un partage réalisé devant le notaire d'Auxerre attribuait la seigneurie à Jean Moncorps, seigneur de Bauvais. La famille de Montcorps de Chéry va le conserver pendant deux siècles et s'illustrer durant la Révolution, en la personne de Jean-Baptiste-Lazare-René, comte de Montcorps du Chesnoy, ancien capitaine au régiment de Conti, élu par la noblesse du bailliage d'Auxerre député aux états généraux de 1789. Le 17 mars 1825, Charles-Antoine de Montcorps de Chéry cédait le domaine à Adolphe Duchesne de Denant, cavalcadour de la duchesse de Berry et à Delphine de Vathaire son épouse. Le 13 septembre 1828 ils le revendirent à Louis-Victor Bouillé, propriétaire à Précy le Sec, qui transforma le domaine, rebâtissant à peu près tout, y compris le château et la chapelle.","architecture":"CHERY, c'est un château-fort de petite dimension, cité au long du XVIe siècle. Le fief est dans la mouvance de la seigneurie de Merry-sur-Yonne. En 1648-1652, la famille de Moncorps, seigneur du lieu, entreprit de racheter, une à une, la dizaine de maisons du hameau. Elle vida littéralement les lieux de ses habitants qui s'éloignèrent en conséquence, dans les hameaux de La Grilletière et Les Chocats. Elle fit bâtir, ensuite, un château, au travers du vallon de Chéry. Ce château possède un jardin et une orangerie. En amont, se situent les communs du château (écuries) et, en aval, une grande ferme fut construite autour d'une cour fermée. La chapelle de la famille des propriétaires du château est montée sur le coteau Sud où elle existe toujours. Les titres du château, ou tout du moins ceux qui n'ont pas servi à allumer le feu de la cuisinière jusqu'en 1960, ont été déposés aux archives départementales de l'Yonne, par l'abbé Jacques Leviste. Le château de Chéry a été inscrit aux M.H. en 1997.","habitants":"Famille de Pierre de Chuin\r\n        \"","divers":"A Coulangeron château de Chéry, : 47° 41' 35\" Nord, 3° 28' 42\" Est","gps":"","images":["../image/image_89/89_Ch%c3%a9ry_1.jpg"]},"Consult_chateau_formulaire8f97":{"id":"Consult_chateau_formulaire8f97","dept":"89","canton":"Chablis","commune":"Cisery","nom":"Cisery","type":"Maison forte","periode":"XIV","histoire":"Deux châteaux à Cisery, celui de Cisery et Vignes.                               CISERY,  il s'agit des vestiges de l'ancien château seigneurial de Cisery, qui date du XIVe siècle, et fut transformé aujourd'hui en ferme. Le manoir était flanqué de quatre tours et entouré de larges douves remplies d'eau, on y accédait par une poterne à pont-levis du XVIe siècle. Malgré l'importance de ses bâtiments, le château de Cisery n'a pas eu de rôle important au Moyen Age, sinon celui de servir de refuge aux populations des environs lorsque des bandes pillaient la région. Il subsiste aujourd'hui le corps de logis, flanqué d'une tour ronde à toiture conique et, à l'autre extrémité, la tour carrée du pont-levis, munie d'une bretèche sur consoles. Deux matériaux ont été utilisés : le calcaire qui constitue le sous-sol de la Terre-Plaine et le granite qui provient du Morvan tout proche.","architecture":"A cinq kilomètres à l'Est à Vignes château de Vignes            VIGNES, c'est en 1416 qu'une certaine dame Beatrix, veuve de Bridoul de Plestin, possédant la terre de Vignes, demande appui à l'abbé de Moutiers Saint-Jean et donne toutes ses terres à ladite abbaye. Celle-ci gère la terre jusqu'en 1422 date à laquelle l'abbé la donne au capitaine d'Avout, seigneur de Senailly, en remerciement pour l'avoir protégé des attaques des Ecorcheurs. C'est à cette époque que le château fut construit, on a retrouvé inscrite sur un carreau dans une chambre la date 1424. Vignes est associée à celle de la famille d'Avout, qui par de nombreuses alliances, s'implante dans la région: Nicolas s'installe à Annoux et fonde la branche d'où sortira le maréchal. Ce Jean d'Avout meurt sans héritier et son neveu reprend la terre; il est en même temps seigneur de Prey, Thorcy, Marcilly, Lucy, Etaules, Sainte-Colombe et Serrigny. au XVIIe siècle le château devient le berceau de la famille d'Avout, en 1661 Jacques a neuf enfants, en 1681 Jean en a treize et le maréchal en aura dix. Après 1800, Vignes ne sera plus qu'une résidence de passage.","habitants":"Famille d'Avout\r\n        \"","divers":"A Cisery le château de Cisery  et de la Vignes grav-3  : 47° 30' 29,48\" Nord, 4° 03' 47,04\" Est","gps":"","images":["../image/image_89/89_Cisery_1.jpg","../image/image_89/89_Cisery_2.jpg","../image/image_89/89_Cisery_3.jpg"]},"Consult_chateau_formulaire3991":{"id":"Consult_chateau_formulaire3991","dept":"89","canton":"St-Valérien","commune":"Vallery","nom":"Condés_Valléry","type":"Château","periode":"XVI","histoire":"CONDES , en Aout 1238, Hugues, seigneur de Vallery, se rend caution envers le roi, pour Jean de Toucy qui a reçu de ce prince la garde du château de Vau-Guidon. Jean donna aussi pour garantie Saint-Fargeau et dépendances qu'il tenait du Roi. En 1250, Jehan de Vallery est conseiller de Louis IX pendant la bataille de Mansura. Situé au nord du village, le château de Vallery est avec Maulnes et Tanlay, Jacques dAlbon, seigneur de Saint-André et maréchal de France \"château passa aux Condés qui lui donnèrent son nom, En 1564 la veuve  du maréchal fait don de Valléry au prince de Condé, puis à des familles moins fortunées qui firent abattre une aile du château Renaissance. En 1747 mademoiselle de Sens fille de Louis III  de Condé hérite et s'en défait au profit de jacques-René Cordier de Launay son petit-fils Charles-Michel Cordier chevalier de Vallery, mutile le château.  Vendu en 1822, au comte de la Ferrière qui passera par héritage aux la Rochejacquelin, puis à la comtesse de la Rochechouart en 1910  à monsieur de Varu descendant des Cordirer le rachète. En 1990, le château était en bien mauvais état lorsquil fut racheté et restauré par lactuel propriétaire monsieur de Rochefort.","architecture":"CONDES, on découvre donc à Vallery un curieux ensemble, avec à louest le pavillon dangle et laile occidentale du château bâti en 1550 sur les plans de Pierre Lescot, larchitecte du Louvres, et à lest une grande enceinte médiévale, formant un demi-cercle, flanquée régulièrement de six tours rondes à archères bâties en petit appareil régulier cubique, qui peuvent remonter au tout début du XIIIe siècle. Au sud, la porte médiévale sous arc tiers-point s'ouvre entre deux tours rondes peu saillantes. L'entrée, sans trace de ponts-levis, est protégée par une herse. Les tours sont munies d'archères à niches sous arc segmentaires, au nombre de quatre au rez-de-chaussée. Le premier étage est occupé par une salle qui s'étend sur le passage et les deux tours, formant logis-porche. L'enceinte a conservé sept segments de courtines rectilignes, reliant six tours circulaires ou semi-circulaires. Parmi ces tours, deux au moins ont un rez-de-chaussée équipé d'archères. La quatrième et la sixième tour en partant de la porte sont des tours rondes en encorbellement, et contiennent une latrine. Le manoir était flanqué de quatre tours et entouré de larges douves remplies d'eau, on y accédait par une poterne à pont-levis du XVIe  siècle. Malgré l'importance de ses bâtiments, le château de Cisery n'a pas eu de rôle important au Moyen Âge, sinon celui de servir de refuge aux populations des environs lorsque des bandes pillaient la région.","habitants":"Famille de Rochefort et de  patrice-vansteenberghe\r\n        \"","divers":"Château de condés à Valléry,                                                                48° 14' 29\" Nord et 3° 03' 02\" Est","gps":"","images":["../image/image_89/89_Cond%c3%a9s_Vall%c3%a9ry_1.jpg","../image/image_89/89_Cond%c3%a9s_Vall%c3%a9ry_2.jpg","../image/image_89/89_Cond%c3%a9s_Vall%c3%a9ry_3.jpg","../image/image_89/89_Cond%c3%a9s_Vall%c3%a9ry_4.jpg","../image/image_89/89_Cond%c3%a9s_Vall%c3%a9ry_5.jpg","../image/image_89/89_Cond%c3%a9s_Vall%c3%a9ry_6.jpg","../image/image_89/89_Cond%c3%a9s_Vall%c3%a9ry_7.jpg","../image/image_89/89_Cond%c3%a9s_Vall%c3%a9ry_8.jpg"]},"Consult_chateau_formulairef574":{"id":"Consult_chateau_formulairef574","dept":"89","canton":"Avallon","commune":"Courtanoux","nom":"Courtanoux","type":"Maidson forte","periode":"XV","histoire":"COURTANOUX, dit la maison des Goix,  cet ancien manoir des procureurs fiscaux de la seigneurie de l'Isle-sur-Serein date du XVe siècle.  il a été entièrement restauré par son propriétaire, est citée en 1188 sous le nom latin « Curtis Arnulphi » (ferme d'un homme avec le nom germanique Arn-wulf). Elle est donnée par Charles Martel à l'abbaye Saint-Germain d'Auxerre en 735, qui l'aliéna en 1741. Le territoire est divisé en quatre fiefs au Moyen Âge. La forêt d'Hervaux était domaine royal sous les Carolingiens et appartenait aux seigneurs de l'Isle au Moyen Âge.\r\n Le village était entouré par une muraille défensive dont il reste encore quelques traces, notamment du côté du couchant. On retrouve sur plusieurs tombes de l'église le nom des Sainte-Maure, famille d'ancienne noblesse, dont une branche était établie sur les terres de Courtarnoux, Sainte Colombe, Provency et Dissangis. Classé monument historique,","architecture":"COURTANOUX maison forte  exploitées depuis le XIIe siècle, les carrières de Champ Retard et de Crot-Rateau ont servi à approvisionner les pierres du Pont Neuf à Paris et du château de Versailles. La maison des Goix est l'ancienne maison des procureurs de l'Isle-sur-Serein. Depuis sa construction dans le troisième quart du XVe siècle jusqu'à la Révolution, elle fut occupée par la même famille, puis vendue comme bien national en 1794. Les deux statues de pierre du XVe siècle sur le mur pignon de la rue n'ont disparu qu'au XIXe siècle (Saint-Jacques en pèlerin et une Vierge à l'Enfant). La maison est constituée d'un corps de logis de deux pièces carrées par niveau, desservies par un escalier central en colimaçon contenu dans une tour polygonale couverte d'une poivrière.","habitants":"Famille de Goix\r\n        \"","divers":"Maison forte des Goix à  Coutarnoux                                                 47° 35' 15\" nord, 3° 57' 56\" est","gps":"","images":["../image/image_89/89_Coutarnoux_1.jpg"]},"Consult_chateau_formulaire26d7":{"id":"Consult_chateau_formulaire26d7","dept":"89","canton":"Chablis","commune":"Guillon","nom":"Courterolles","type":"Château","periode":"XVIII","histoire":"COURTEROLLES,  partir de 2007, les propriétaires actuels ont décidé de créer ce jardin et continuent de le faire évoluer avec de nombreux projets. Le potager a été redessiné et remis en culture progressivement. Les bosquets ont été créés au fil des années et la première uvre contemporaine a été installée en 2014.  En 2019 a été construit le Labyrinthe Auto parallèle de Gabrielle Conilh de Beyssac. Cette uvre importante, en pierre, est une nouvelle interprétation du concept de labyrinthe qui remonte à la haute antiquité et qui a été maintes fois repris au cours des siècles.","architecture":"COURTEROLLES, les bâtiments se répartissent autour dune cour. Le corps de logis principal a été construit à la fin du XVIIIe siècle et modifié au XIXe siècle avec lajout des deux pavillons latéraux. Autour, les bâtiments sont plus anciens et certaines parties remontent au XVe siècle, comme la chapelle. Ils ont été toutefois fortement remaniés. Le domaine ne bénéficie daucun classement, ce qui  laisse aux propriétaires une grande liberté pour son aménagement. Son parc comporte une importante collection darbres, darbustes et de fleurs qui présentent un intérêt tout au long des quatre saisons. Le printemps est une explosion de fleurs : narcisses, prunus, pivoines, iris. Lété apporte ses couleurs chaudes et ses floraisons tardives : hémorocalles, asters Lautomne est une symphonie de couleurs. En hiver, on découvre les écorces, les formes des arbres, et de nombreuses floraisons comme celle du lonicera frangantissima qui nous offre aussi son parfum. Le potager est un endroit en perpétuel mouvement : les légumes, les fleurs, les fruits y règnent au fil des saisons.","habitants":"Gabrielle Conilh de Beyssac\r\n        \r\n        \"","divers":"Château de Courterolles à Guillon                                                       47° 30' 54\" nord, 4° 05' 38\" est","gps":"","images":["../image/image_89/89_Courterolles_1.jpg","../image/image_89/89_Courterolles_2.jpg","../image/image_89/89_Courterolles_3.jpg"]},"Consult_chateau_formulaireabcb":{"id":"Consult_chateau_formulaireabcb","dept":"89","canton":"Avallon","commune":"Cussy les forges","nom":"Cussy_les_Forges","type":"Château","periode":"XII-XIII-XVII","histoire":"Trois châteaux à Cussy les Forges ; Cussy, Rangy et Presles.                                                                                RAGNY, est mentionné en 1501 et le propriétaire était Claude de Ragny. Au XVIe siècle  Ragny est apportée par Huguette de Ragny  à son époux Jean de Damas. En 1522  leur fille Claudine épouse  Gérard de La Magdeleine, en 1594  puis à son fils François fidèle compagnon d'Henri IV qui l'a érigé en marquisat en 1597 seigneur de Courcelles, Léonor de Ragny épouse Hippolyte de Gondi de Retz et succède à son père François comme lieutenant général du Nivernais, maréchal de camp séjourne peu au château, son fils Claude meurt sans descendance en 1631. Anne hérite du domaine et  par mariage, l'apporte à François de Bonne Créqui duc de Lesdiguière;  Ragny est passé en 1632 dans les mains des Créqui de Lesdiguières qui l'ont conservés pendant un siècle. En 1716 passe en héritage aux Villeroy et vendent en 1717 à  Guy Chartraire de Saint-Agnan pour y rester jusqu'en 1812, et au XIXe siècle Ragny a connu une successions de propriétaires et a perdu une parti de ses bâtiments, l'orangerie, les archives et la plupart de ses tours. Le château fut acquis par la banque d'Algérie en janvier 1960. La Banque de France est devenue propriétaire du domaine le 1er octobre 1974.                                                                                              PRESLES, le fief de Cussy relevait de la seigneurie de Montréal. existait au Moyen Âge une seigneurie importante, dont le château était établi près de l'antique voie romaine. Le domaine fut ensuite vendu au comte Bertier de Sauvigny.","architecture":"CUSSY les Forges,  le fief de Cussy relevait de la seigneurie de Montréal. À Presles existait au Moyen Âge une seigneurie importante, dont le château était établi près de l'antique voie romaine.  Pendant la guerre de Cent Ans, Cussy s'était entourée de fortifications afin de se protéger. « Le village de Cussy est clos de hautes murailles avec de bons fossés et les portes en sont presque toujours fermées. » Les murs existaient encore en 1521, d'après l'historien Courtépée.                                                                                              RAGNY,  jadis ce château au début du XVIe siècle possédait onze tours  date des XIIe et XIIIe siècles, corps de logis de plan rectangulaire à trois niveaux avec toit haut en tuile avec lucarnes sur combles  accolée  remanié aux XVe siècle et XVIIe siècles dans le style Louis XIII, enceinte quadrangulaire, tours d'angle rondes, donjon carré à mâchicoulis, bretèche, contreforts.                                                                                                 PRESLES, pendant la guerre de cent ans, Cussy s'était entourée de fortifications afin de se protéger. « Le village de Cussy est clos de hautes murailles avec de bons fossés et les portes en sont presque toujours fermées. » Les murs existaient encore en 1521.","habitants":"François de Bonne Créqui duc de Lesdiguières \r\n        \"","divers":"Trois châteaux à Cussy les Forges ; Rangy    Grav-8    et Presles grav 1-2-3-4-5.                                                                47° 28' 15 nord, 4° 01' 38 est","gps":"","images":["../image/image_89/89_Cussy_les_Forges_1.jpg","../image/image_89/89_Cussy_les_Forges_2.jpg","../image/image_89/89_Cussy_les_Forges_3.jpg","../image/image_89/89_Cussy_les_Forges_4.jpg","../image/image_89/89_Cussy_les_Forges_5.jpg","../image/image_89/89_Cussy_les_Forges_6.jpg","../image/image_89/89_Cussy_les_Forges_7.jpg","../image/image_89/89_Cussy_les_Forges_8.jpg"]},"Consult_chateau_formulaire8c3b":{"id":"Consult_chateau_formulaire8c3b","dept":"89","canton":"Brienon-sur-Armançon","commune":"Cérilly","nom":"Cérilly_89","type":"Château","periode":"XV","histoire":"CERILLY,  le château-Manoir actuel a été construit sur la base d'un monastère dédié à Saint Laurent détruit par les guerres. Jacques de Bérulle en 1488, ancêtre du cardinal de Bérulle \"maître de la verrerie de Vieil-Verger, âgé de 34 ans. Il déclare qu'il est natif du Perche, et en fut amené jeune enfant \"et vingt-quatre ans il  vint  y demeurer à Cérilly pour 18 ans, il  partit pour aller demeurer au Vieil-Verger qui est contigu dudit Cérilly.\"  Il habitait sans doute au Chateau de Cerilly ou naquit le cardinal de Bérulle. A cette date lui est donné  à vie à noble Jacques Bérulle et damoiselle Anne, sa femme, d'un sault de moulin situé sur le ruisseau de Cérilly, au-dessous d'un autre moulin qu'il a commencé à faire près de la fontaine Jourdain en 1529. Le château a vu naître le Cardinal de Bérulle le 4 février 1575, fondateur de lordre des Oratoriens.  Il semble que le moulin  ajouté au premier existant à Cérilly par les Bérulle disparurent faute de suffisamment de force de courant de la rivière. La verrerie du vieux verger disparu également au profit de celles plus prospères d'Arces-Dilo et autres. Cérilly connu de grandes inondations en 1697 et 1740, endommageant le village et ses bâtiments.                                                                                                    la PIERRE pas d'information historique.","architecture":"CERILLY construit à l'endroit du Monastère Saint Laurent. La société des Eaux de Paris en association avec la Mairie de Cérilly a proposé de découvrir le château de Cérilly, ancien manoir fortifié construit en 1441 à l'emplacement d'un ancien, composé  d'un logis central rectangulaire avec deux ailes en retour terminées par des tours différentes l'une de l'autre, l'aile de droite est constituée par deux galeries superposées à colombages, la gauche de deux pavillons carrés de hauteurs inégales. Acquit en 1907 par la Ville de Paris. Le château de Cérilly est un ancien manoir fortifié construit en 1441 par Jean de Bérulle, verrier à Fournaudin, à l'emplacement d'un ancien \"Hostel\" appartenant aux moines de Vauluisant et détruit pendant la guerre de cent ans..  En 1865, la Ville de Paris achète les terres du bîme de Cérilly afin de garantir une protection accrue des sources découvertes par ses ingénieurs et de permettre le captage d'eau de bonne qualité à destination de la capitale. Le château est quant à lui acquit en 1907 au fermier vivant sur le site. Eau de Paris, entreprise publique, est aujourd'hui le gestionnaire de ce domaine et veille à son entretien et sa surveillance pour le compte de la Ville de Paris.                                                                                        La PIERRE, corps de logis rectangulaire à deux niveaux et série de lucarnes sur toit brisé, flanqué de deux tours une ronde sur la gauche et une carrée sur la droite les deux à trois niveaux, toit en poivrières.","habitants":"Jacques de Bérulle \r\n        \"","divers":"Château de Cérilly  grav 5-6-7 et de la Pierre  grav 1  à 4                                    48° 10' 59\" nord, 3° 37' 24\" est","gps":"","images":["../image/image_89/89_C%c3%a9rilly_89_1.jpg","../image/image_89/89_C%c3%a9rilly_89_2.jpg","../image/image_89/89_C%c3%a9rilly_89_3.jpg","../image/image_89/89_C%c3%a9rilly_89_4.jpg","../image/image_89/89_C%c3%a9rilly_89_5.jpg","../image/image_89/89_C%c3%a9rilly_89_6.jpg","../image/image_89/89_C%c3%a9rilly_89_7.jpg"]},"Consult_chateau_formulaire0429":{"id":"Consult_chateau_formulaire0429","dept":"89","canton":"Toucy","commune":"Diges","nom":"Diges","type":"Forteresse","periode":"XIV-XV-XVII","histoire":"DIGES, au IXe siècle, Charles le Chauve fit don à l'abbaye Saint-Germain d'Auxerre de plusieurs domaines de grande étendue situés sur le territoire de l'actuelle commune de Diges, donation qu'Héribert, évêque d'Auxerre, compléta au siècle suivant en abandonnant à l'abbaye le droit de patronage sur l'église du lieu. Sous l'abbatial de Gervais, un château est construit dans le village pour mettre ce dernier à l'abri des féodaux locaux. Il sera pourvu d'une garnison en 1163, puis placé par l'abbé Humbaud sous la sauvegarde de Pierre de Courtenay en 1174. Il en reste le bâtiment de la porte, trois tours d'enceinte et des sections importantes de la muraille. Au XIVe siècle ou au XVe siècle sont édifiés les deux corps de bâtiments placés de part et d'autre de la porte d'entrée. A la même époque est entreprit l'édification, au centre de la cour du château, d'une église dont l'achèvement se fera au XVIIe siècle. Devenu sans intérêt sur le plan défensif bien que des restaurations soient intervenues en 1576, le logis, les dépendances et le domaine sont concédés par l'abbaye à des fermiers.  Le château de Diges, séquestré comme bien d'Eglise, sera vendu en 1792. Il demeurera propriété de Nicolas Gaudet, commerçant à Toucy, dont les descendants le vendront en 1963 aux propriétaires actuels.","architecture":"DIGES, de l'enceinte du château, il reste encore deux tours en élévation. Au sud, un grand corps de bâtiment de même facture que les tours, flanqué lui-même de deux tourelles semble être les vestiges d'anciens communs. Tout cet ensemble, bâti de manière homogène et datant sûrement de la même période, est équipé d'archères-canonnières. Il a été bâti de blocs irréguliers de grès, posés en assises régulières. Le mode de construction du corps de logis na pas pu être identifié car il est couvert denduit. Une fenêtre ouvragée en calcaire, percée tardivement, souvre à louest. Une série de corbeaux entoure le bâtiment et trahit peut-être un ancien hourdage ou des mâchicoulis. L'actuelle église paroissiale, bâtie entre 1567 et 1580 par l'abbé François de Beaucaire, est incluse dans l'enceinte du château.","habitants":"Famille de Nicolas Gaudet\r\n        \"","divers":"château de Diges                                                                                  47° 43' 49\" nord, 3° 23' 55\" est","gps":"","images":["../image/image_89/89_Diges_1.jpg","../image/image_89/89_Diges_2.jpg","../image/image_89/89_Diges_3.jpg","../image/image_89/89_Diges_4.jpg"]},"Consult_chateau_formulairea2f8":{"id":"Consult_chateau_formulairea2f8","dept":"89","canton":"Joux-la-Ville","commune":"Domecy sur cure","nom":"Domecy_Cure","type":"Château","periode":"XV","histoire":"DOMECY,  au XIIe siècle, la châtellenie de Domecy appartenait à une famille de chevaliers portant le nom de ce fief. A partir du XIIIe siècle, se succédèrent à Domecy les familles du Bouchet, de la Tournelle, de Saint-Aubin. Au début du XVe siècle, Jean de Saint-Aubin, chambellan à la cour des ducs de Bourgogne, reconstitue l'unité de la seigneurie et seul maître de la terre et de la maison-forte de Domecy. C'est sans doute lui qui fit reconstruire le château à cette époque. Au XVIe siècle, apparaît à Domecy la famille de Loron, originaire du Nivernais, du fait du mariage, en 1488 de Jacques de Loron, écuyer, avec Odette de Chassaing, héritière de cette châtellenie. Les sires de Loron de Domecy passent au protestantisme et se signalent par leur ferveur huguenote. Lazare de Loron pille l'abbaye de Cure en 1578. Une alliance, en 1625, fait passer le château des mains des Loron en celles des Jaucourt connus également pour leurs convictions protestantes. Catherine de Jaucourt l'apporte en 1721 à Laurent Gabriel de Montrichard de Vismal, seigneur de Fontenay en Comté, son époux. En 1728, la châtellenie est achetée par le sieur Sarrazin, dont la fille Bernarde Judith épouse Nouviau de Chenevières. Madame de Chenevières revendit Domecy en 1762 à Marie-Angélique-Catherine Darlus, dame de Bazoches, d'une famille de fermiers généraux, épouse de François Angran d'Alleray, lieutenant du châtelet de Paris, qui possédait les domaines de Bazoches et de Pierre Perthuis achetés aux descendants du maréchal de Vauban. Angran d'Alleray fut le dernier seigneur de Domecy, il périt sur l'échafaud en 1794. Vendit en 1816  à Antoine Gontard en 1884 et revendus à Antonin Houdaille passa aux Driot, aux Girval et aux Boisselet.","architecture":"DOMECY, ses biens, confisqués, furent vendus la même année et le château acquis par la famille Marion qui en exploitait le domaine au XVIIIe siècle. Antoine Gontard, avocat à Avallon, en devint propriétaire en 1844 et le restaura. Ses héritiers le vendirent en 1884 à Jules et Antonin Houdaille, d'Avallon. En 1905, le domaine passa à la famille Driot.  Le peintre Odilon Redon y exécuta 15 grands panneaux, pour décorer la salle à manger. Entrés par donation, dans les collections de l'État, ils sont exposés au Musée d'Orsay. Le château de Domecy-sur-Cure est inscrit aux M.H. en 1986. Le château de style maison forte de trois niveaux, toit en croupes recouvert de tuiles,   flanqués de quatre tourelles     mi-hors oeuvre, toit en poivrières.","habitants":"Laurent Gabriel de Montrichard de Vismal\r\n        \"","divers":"Château de Domecy sur Cure:                                                        47° 24' 40,16' Nord, 3° 47' 51,78\" Est","gps":"","images":["../image/image_89/89_Domecy_Cure_1.jpg","../image/image_89/89_Domecy_Cure_2.jpg","../image/image_89/89_Domecy_Cure_3.jpg"]},"Consult_chateau_formulaire9844":{"id":"Consult_chateau_formulaire9844","dept":"89","canton":"Avallon","commune":"Domecy sur le Vault","nom":"Domecy_Vault","type":"Château","periode":"XII-XV-XVIII","histoire":"DOMECY sur le VAULT, en 1225, Regnaud d'Ostun, chevalier, est seigneur de Domecy. Le 12 avril 1288, Hugues de Brugny, damoiseau, et Margueronne de Saincte-Pallaye vendent à Gauthier de Domecy,  toutes les maisons, granges et édifices, situés à Domecy, avec fossés et dépendances. En mai 1316, Marguerite de Dissangis, épouse de Gauthier d'Arcy, déclare qu'avant son mariage, elle avait vendu au duc de Bourgogne \"tout le fief que tenait d'elle Gautier de Domecy, son oncle, en la ville de Domecy savoir : la maison forte, le moulin, le pressoir, les étangs. En 1440, la seigneurie et le château passent par mariage à Edme de Salins, puis, après 1478, à son fils Jean. Ce dernier possède à Avallon une maison située devant la collégiale Saint-Lazare et connue sous le nom d'hôtel des sires de Domecy. En 1507 Domecy est vendu à Louis de Robert. Claude de Longueville, seigneur de Santigny, fait entrer Domecy dans sa famille en 1537, en épousant Philiberte de Robert. En 1569, la maison forte est brûlée par les reîtres du duc de Deux-Ponts. Les Longueville de Domecy s'éteignent en 1695. Une fille Jeanne de Loron apporte en dot  à Elie de Jaucourt. Leur succession passe aux Faverolles qui vendent la terre en 1748 à Michel-Auguste de Denesvre, dont la famille occupait les premiers rangs de la société à Avallon et qui fait entreprendre la reconstruction de l'aile sud du château, et la famille de Denesvre est restée en possession du château jusqu'à nos jours.","architecture":"DOMECY, situé au centre du village, le château est flanqué de tours et entourés de vestiges de fossés. Le corps de bâtiment sud a été reconstruit au XVIIIe siècle. Il est constitué d'un élégant bâtiment rectangulaire à un étage carré sous toit d'ardoise à la Mansart. Il est flanqué à droite d'un colombier à boulins et échelle et à gauche d'une tourelle rectangulaire dont la base, en bossage, est un vestige du château du XVIe siècle. L'angle nord-ouest est flanqué d'une échauguette sur cul de lampe et contrefort, qui est ouverte de deux canonnières de flanquement. Dans l'angle nord-ouest, on trouve une tour ronde percée de canonnières à ressaut.","habitants":"Famille de Louis de Robert\r\n        \"","divers":"Château de Domecy  à Domecy sur le Vault  grav 1-2-3                                  Vieux château grav-4                                                                        47° 24' 40\" nord, 3° 47' 52\" est","gps":"","images":["../image/image_89/89_Domecy_Vault_1.jpg","../image/image_89/89_Domecy_Vault_2.jpg","../image/image_89/89_Domecy_Vault_3.jpg","../image/image_89/89_Domecy_Vault_4.jpg"]},"Consult_chateau_formulaire7423":{"id":"Consult_chateau_formulaire7423","dept":"89","canton":"Toucy","commune":"Dracy et Villiers-Saint-Benoît,","nom":"Dracy_Villiers","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux dans cet article Bréau et  Bruyère.                                   BREAU, un édifice fortifié fut érigé, au XVe siècle, à l'emplacement d'une ancienne forge. Le château est reconstruit, à la fin du XVIIe siècle, sur la terrasse de l'édifice fortifié, dans un style classique. Au début du XIXe siècle, la façade nord de la demeure fait l'objet de remaniements, doublant ainsi le corps de bâtiment principal et flanquant ses deux extrémités de deux tours dressées sur des assises médiévales. Des communs, situés en retour d'équerre, achèvent la composition. L'ensemble du domaine a conservé ses dispositions spécifiques à la seconde moitié du XIXe siècle : ferme, lavoir, moulin, etc. L'occupation allemande, en 1940, eut pour conséquence la destruction des archives du domaine sauvegardées jusque-là.","architecture":"BRUYERE, maison forte, en 1400 dénombrement rendu à lévêque dAuxerre Michel de Creney, de la seigneurie de Toucy, \"une maison forte, dun demi arpent de terre avec  un colombier\". En 1500, aveu de Pierre LEspervier de \"notre maison de la Bruyère en la paroisse de Dracy, laquelle était close de murailles et édifiée de tours de pierre comme encore à présent. Le demi arpent y est appelé basse-cour. Cette maison-forte est située à lintersection de deux routes anciennes, dont lune au moins était un axe important : la route de Bléneau à Auxerre par Dracy et Tonnerre passe en effet à 150 mètres selon lactuel tracé. Elle suivait peut-être plus anciennement un parcours parallèle, plus au sud, qui laurait fait passer par le Vau à lest, la Jacquoterie à louest, où existaient deux habitats seigneuriaux. flanqué de deux tours posées sur une plate-forme rectangulaire. Ce terre-plein semble avoir été remanié à l'époque moderne au moment de la construction du bâtiment nord. Au siècle dernier la maison était dèjà signalée en ruine.","habitants":"évêque dAuxerre Michel de Creney\r\n        \"","divers":"Deux châteaux Bréau grav-3 et  Bruyère à Dracy et Villiers-Saint-Benoît.                                                                                              47° 45' 20\" nord, 3° 15' 07\" est","gps":"","images":["../image/image_89/89_Dracy_Villiers_1.jpg","../image/image_89/89_Dracy_Villiers_2.jpg","../image/image_89/89_Dracy_Villiers_3.jpg"]},"Consult_chateau_formulairef455":{"id":"Consult_chateau_formulairef455","dept":"89","canton":"Vincelles","commune":"Druyes-Les-Belles-Fontaines","nom":"Druyes","type":"Forteresse","periode":"XII-XIV","histoire":"Deux châteaux dans cet article Druyes et Boulet.                                    DRUYES,  en 1216,  le comte Pierre reçoit une délégation qui lui propose la couronne de l'empire latin de Constantinople. Couronné à Rome le 9 avril 1217, il part à la tête de 5000 hommes afin de défendre son empire. Il tombe dans une embuscade tendue par des Grecs dans les montagnes d'Albanie et n'atteindra pas Constantinople, il meurt en prison vers 1218. En application de l'accord passé, Mathilde de Courtenay, comtesse de Nevers, hérite des comtés d'Auxerre et de Tonnerre, elle vient régulièrement y séjourner. C'est au château qu'elle remet le 15 août 1223 une charte d'affranchissement aux députés envoyés par Auxerre. Cette charte, qui accorde des libertés et franchises aux habitants d'Auxerre et marque la naissance de leur bourg, confirme celle octroyée par le comte Pierre de Courtenay en 1188. En 1255, elle reçoit à Druyes l'hommage de l'évêque d'Autun, et en 1257, elle confirme les biens de l'abbaye de Reigny. A sa mort en 1257, c'est son arrière-petite-fille, Mathilde de Bourbon, qui lui succède comme comtesse de Nevers, Auxerre et Tonnerre. Elle meurt cinq ans plus tard, en 1262, et son mari Eudes de Bourgogne partage les trois comtés entre ses filles Yolande, Alix et Marguerite.  En 1477, la mort du duc Charles le Téméraire marque l'éclatement et la fin de l'État bourguignon. Le comté de Nevers est alors entre les mains de Jean de Bourgogne, cousin du duc Philippe le Bon. À sa mort en 1491, son petit fils Engilbert de Clèves lui succède. Après les décès de ses frères en 1564, Henriette de Clèves devient comtesse de Nevers et de Rethel. Les propriétaires les Gonzagues; les Mancini, puis les Damas d'Anlezy laissèrent le bâtiments se dégrader. Vendu comme bien national en 1794 pour carrière de pierre et acquis en 1965 par Girard-Claudon.","architecture":"DRUYES,  entre 1378 et 1384, la forteresse ait l'objet de réparations et ses défenses sont renforcées. La bannière du duc de Bourgogne flotte désormais sur la tour du Sault. Le château de Druyes échappe à la démolition sous la Révolution, mais il faut attendre la deuxième moitié du XXe siècle pour que les habitants de Druyes et les pouvoirs publics se préoccupent de son sort et le sauvent de la ruine.  Aujourd'hui la forteresse est utilisée pour des animations médiévales et culturelles.                                                                                               BOULET, au pied du château de Druyes, à 300 mètres au sud du château et de l'église, isolé, on peut voir le manoir du Boulet, de plan rectangulaire, dont la façade orientale est flanquée de deux hautes tours rondes. Notons également la massive église fortifiée de Druyes-les-Belles-Fontaines du XIIIe siècle, mise en défense par la construction au sud-ouest d'une tour ronde permettant l'accès aux combles. Cette tour est éclairées par des canonnières à fente à plusieurs niveaux, et défendue par trois petites bretèches près du sommet.","habitants":"Mathilde de Bourbon,\r\n        \"","divers":"Deux châteaux Druyes et Boulet grav -9 ;                                                        47° 32' 55,28\" Nord et 3° 25' 21,32\" Est                                           et  portes 47° 33' 02\" nord, 3° 25' 30\" est","gps":"","images":["../image/image_89/89_Druyes_1.jpg","../image/image_89/89_Druyes_2.jpg","../image/image_89/89_Druyes_3.jpg","../image/image_89/89_Druyes_4.jpg","../image/image_89/89_Druyes_5.jpg","../image/image_89/89_Druyes_6.jpg","../image/image_89/89_Druyes_7.jpg","../image/image_89/89_Druyes_8.jpg","../image/image_89/89_Druyes_9.jpg"]},"Consult_chateau_formulaire12d3":{"id":"Consult_chateau_formulaire12d3","dept":"89","canton":"Vincelles","commune":"Escolives-Sainte-Camille,","nom":"Escolives_Ste_Camille","type":"Château","periode":"XV-XVIII","histoire":"quatre châteaux à Escolives Bellombre, Barcour et Borgnat et Saulce.                                                                                                                   BELLOMBRE, le fief de Bellombre était le siège d'une partie de la seigneurie d'Escolives que détenait, en 1507, le lieutenant général d'Auxerre, Blanchet David. Marie David l'apporta à Jacques de Meung dit de La Ferté, qui mourut le 4 juin 1589, massacré par les Ligueurs d'Auxerre. Madeleine de La Ferté Meung, sa petite-fille, transmit Bellombre aux La Bussière et Catherine de La Bussière l'apporta aux Girard d'Azy. Les enfants de Paul de Girard le vendirent, vers 1656, à François de Chastellux, qui céda cette première moitié d'Escolives en 1670, à Robert Chaponnel, receveur général des Finances. Il mourut le 28 octobre 1678 sans postérité, alors qu'il entreprenait la reconstruction du château.   Anne Robineau, receveur général des Finances en Provence, En 1709, Louis Gayot, acquéreur réunit les deux parts de la terre d'Escolives avant de vendre le château de Bélombre en novembre 1726, à Joseph Le Muet, procureur du Roi au bailliage d'Auxerre. Rosalie Le Muet épousa en 1804, Jean Jacques Claude Baudenet d'Annoux. Leur fils, Louis-Hugues, qui craignait les envahissements dangereux des eaux de l'Yonne, décida la démolition du château qu'il reconstruisit sur de vastes sous-sols vers 1870.                                 BORGNAT La famille Borgnat, depuis les années 1970, a utilisé tout son savoir-faire pour redonner à cette ancienne ferme du XVIIe siècle, sa vocation viticole. Le château vous propose des séjours notouristiques, dans des chambres dhôtes ou des gîtes, confortablement aménagés, que vous pourrez découvrir.","architecture":"BARCOUR  ce domaine, composé d'un château construit au XVIIIe siècle et d'un vaste jardin, le château de Barcour est situé sur la rive gauche du canal. Un grand jardin se développe à l'arrière de la demeure. En face, sur la rive droite, déversoir de superficie, de  plan rectangulaire régulier, rez-de-chaussée à un étage carré et étage de comble,  toit à deux pans ;en croupe couverture en tuile plate.                                                                               BELLOMBRE,  qui réalisa le projet élaboré par Chaponnel et bâtit un nouveau château sur le terre-plein entouré de douves à l'emplacement du manoir médiéval.  Le domaine se situe sur la rive gauche du canal. Il s'agit d'un grand corps de logis à un seul étage. Des chaînes d'angle et des jambes harpées de pierre supportent l'entablement et un étage mansardé dans la retombée du toit brisé. Les douves et le pont de pierre orné d'élégantes ferronneries du XVIIIe ont été conservés.                                                                         La SAULCE, le domaine actuel fut construit à la demande de Jacques Armand de Rogres de Champignelles, qui fut commandeur de 1756 à 1772. Le château fut édifié à l'emplacement de l'ancienne commanderie, pour servir de résidence aux commandeurs d'Auxerre. En 1763, il fit bâtir le petit pavillon carré au milieu d'importants jardins. Château situé sur la rive gauche du canal. Il subsiste aujourd'hui : un château de plan barlong, remanié au  XIXe siècle et flanqué d'importantes dépendances ; un pavillon de jardin ; le jardin ; le moulin alimenté par un bief dérivé de l'Yonne et du canal du Nivernais.","habitants":"Bellecombe; François de Chastellux                                            Borgnat; famille Borgnat                                                                                 la Saulce; Jacques Armand de Rogres de Champignelles\r\n        \r\n        \"","divers":"quatre châteaux à Escolives Bellombre grav-2, Barcour grav 1 et Borgnat  grav-3-4   et Saulce grav-5.                                                  47° 43' 38\" nord, 3° 36' 24\" est","gps":"","images":["../image/image_89/89_Escolives_Ste_Camille_1.jpg","../image/image_89/89_Escolives_Ste_Camille_2.jpg","../image/image_89/89_Escolives_Ste_Camille_3.jpg","../image/image_89/89_Escolives_Ste_Camille_4.jpg","../image/image_89/89_Escolives_Ste_Camille_5.jpg"]},"Consult_chateau_formulaire6a44":{"id":"Consult_chateau_formulaire6a44","dept":"89","canton":"Brienon-sur-Armançon","commune":"Esnon","nom":"Esnon","type":"Château","periode":"XVIII","histoire":"ESNON   En 1180, Bouchard un cadet de la puissante maison des seigneurs de Seignelay, est en possession d'une partie de la terre d'Esnon, que ses descendants tiendront des comtes de Joigny jusqu'au milieu du XVe siècle. A cette époque, Esnon et sa maison forte passent aux l'Espinasse, famille d'Auvergne que la conduite des armées a amenée dans cette région de Champagne, puis il entrent en 1501 par mariage dans la famille de Langhac. A l'époque des guerres de Religion, il fut à diverses reprises occupé et abrita des garnisons tantôt protestantes, tantôt catholiques. Il était sans doute en ruine lorsqu'il fut vendu en 1625 à Pierre de Villegagnon. En 1751 il appartint au comte Jacques-Henry de Baugy, ancien capitaine d'infanterie. Le comte de Baugy fit modifier le château, supprimant l'aile ouest et restaurent le corps de logis principal. Il combla les marais qu'il transforma en jardins et fit tracer les parterres d'une cour d'honneur. Le fermier général Bouret de Vézelay, qui acquit Esnon en 1773, fit démolir le château et bâtir à la place celui que l'on voit aujourd'hui. Il le revendit en 1785 à Georges Grand, Suisse d'origine, il fit entreprendre d'importants travaux pour mettre en valeur le domaine et y créant un étang de deux hectares. Le baron William Grand d'Esnon le restaura au XIXe siècle. Il est toujours la propriété de ses descendants.","architecture":"ESNON, sur le plan du linéaire levé par les ingénieurs du canal au milieu du XIXe siècle, une rigole est représentée sur la rive droite, en aval du pont routier isolé d'Esnon, \"Prise d'eau du château d'Esnon\". Ce domaine fit l'objet à la fin du XVIIIe siècle d'importants travaux d'aménagements avec la création de pièces d'eau qui entourent les cours et les jardins : la cascade et son rond-point, la rivière anglaise et la fontaine du Rocher. Cette rigole devait y prendre sa source.                                                                           La construction du château date de 1773. Le château d'Esnon est inscrit aux M.H. depuis le 22/02/1980 pour ses façades, les toitures du château (à l'exclusion des deux ailes du XIXe siècle) ainsi que celles des communs, son pigeonnier, son orangerie. Sur le plan du linéaire levé par les ingénieurs du canal au milieu du XIXe siècle, une rigole est représentée sur la rive droite, en aval du pont routier isolé d'Esnon, avec une mention au crayon à papier : \"Prise d'eau du château d'Esnon\". Ce domaine fit l'objet à la fin du XVIIIe siècle d'importants travaux d'aménagements.","habitants":"baron William Grand d'Esnon\r\n        \"","divers":"Château d'Esnon; 47° 59' 17,52\" Nord, 3° 34' 39,86\" Est et 47° 59' 17\" nord, 3° 34' 40\" est","gps":"","images":["../image/image_89/89_Esnon_1.jpg","../image/image_89/89_Esnon_2.jpg"]},"Consult_chateau_formulaire6a81":{"id":"Consult_chateau_formulaire6a81","dept":"89","canton":"Avallon","commune":"Etaule","nom":"Etaule","type":"Château","periode":"XV-XVI-XIX","histoire":"Deux châteaux à Etaule celui d'Etaule et de Vassy le bois.                ETAULE, entre les mains d'une famille qui en portait le nom, la seigneurie d'Etaule a pu, durant le Moyen-Âge, posséder un caractère militaire du fait de la présence d'un château remparé, dont l'emplacement seul subsiste à quelque distance de l'actuel château. Aux XVe et XVIe siècles la terre appartint en indivis à la famille Du Verne et à la collégiale Notre-Dame et Saint Lazare d'Avallon. Au début du XVIe siècle, les Clugny d'Avallon se substituent aux Du Verne dans la possession d'Etaule. Georges de Clugny y fait à cette époque reconstruire l'ancienne demeure seigneuriale en forme de château et maison-forte,  attenant fermé de murailles. Sur le fossé qui l'entoure, Jacques de Clugny fera en 1643 placer un pont-levis. En 1707  le château d'Etaule sort des mains de cette famille pour passer en celles de François Huguet, officier de la grande prévôté de France. Le château, très restauré, se compose de trois corps de logis dont celui de l'est est flanqué de deux tours circulaires. A l'ouest une porte présente des fentes de flèches et un mâchicoulis moderne.","architecture":"VASSY LE BOIS, château construit en 1873 par Guérinot, élève de Eugène Viollet-le-Duc. Symbole du mécénat, de la richesse et de la réussite sociale d'un grand patron d'industrie avallonnais au XIXe siècle, découverte par Ernest Gariel du ciment de Vassy. Le vocabulaire architectural se réfère aux modèles de la Renaissance : arcades, jeux de pierres sculptées, corniches moulurées.  Les éléments les plus authentiques sont un portail en pierre sculptée du XVIIe siècle et l'ancienne chapelle, datant de 1700, sur des bases plus anciennes. Le Château de Vassy-le-Bois est classé aux M.H. depuis 1997. Bâti à la fin du XVIe siècle, et remanié au XIXe siècle, une aile massive à l'est à été installée en 1980. Le château de Vassy-le-Bois construit avec des techniques modernes pour l'époque charpente métallique , chauffage à air chaud,  possède un portail de pierre sculptée du XVIIe siècle et une ancienne chapelle datant de 1700. Château du XIXe siècle construit en 1873 par la famille Gariel, encadré par deux tours rondes. Le parc est agrémenté d'un bassin et de fausses ruines appartenant actuellement à la famille Du Baysnat de Septfontaine.","habitants":"Etaule; Georges de Clugny                                                         Vassy; famille Gariel,\r\n        \"","divers":"Deux châteaux à Etaule celui d'Etaule grav-1-2-3  et de Vassy le bois grav-5-6-7-8.                                                                           47° 32' 08\" nord, 3° 54' 40\" est                                                       Etaule  47° 31' 19\" Nord et 3° 55' 15\" Est                                           Vassy  47° 32' 08\" Nord et 3° 54' 40\" Est","gps":"","images":["../image/image_89/89_Etaule_1.jpg","../image/image_89/89_Etaule_2.jpg","../image/image_89/89_Etaule_3.jpg","../image/image_89/89_Etaule_4.jpg","../image/image_89/89_Etaule_5.jpg","../image/image_89/89_Etaule_6.jpg","../image/image_89/89_Etaule_7.jpg"]},"Consult_chateau_formulaire350f":{"id":"Consult_chateau_formulaire350f","dept":"89","canton":"Joux la ville","commune":"Lichères-sur-Yonne,","nom":"Faulin","type":"Forteresse","periode":"XIII-XV","histoire":"Deux châteaux dans cet article Faulin et Misery.                                     FAULIN, mentionné pour la première fois au XIIIe siècle. Il appartient alors aux Ascelin, seigneurs de Châtel-Censoir. On le retrouve en 1389 en la possession des Le Bourgoing, famille nivernaise dont une branche, les Le Bourgoing du Faulin, conserve le château durant trois siècles et fait élever, à la fin du XVe siècle, le manoir actuel.  En 1699, la dernière descendante des Le Bourgoing  Marguerite-Françoise apporte le Faulin à son époux Paul de Grivel de Grossouvre, maître de camp de cavalerie, d'une famille ancienne du Bourbonnais. Puis le manoir et son domaine passent à David Pierre Perrinet du Pezeau, et par héritage à sa fille qui épouse le marquis de Langeron, puis à sa petite-fille  comtesse de Damas qui épousera  Elzéar Charles de Voguë, puis César-Laurent de Chastellux député et président du conseil général de l'Yonne. La fille de Charles, Marguerite, épouse son cousin germain Charles-Jean Melchior de Voguë historien académicien. Au XIXe siècle  le château n'est plus habité, seul les bâtiments  de la basse cour servent d'exploitation agricole sont entretenu par la famille  Choisy.  Les bâtiments d'exploitation qui entourent le manoir inscrit au M.H. en 1993.                                                                                                     De L'autre côté de L'Yonne  MISERY   dans un cadre très agréable, sur les terres verdoyantes du château de Misery construit au XIXe siècle, le golf niché sur deux hectares, imaginé de part en part par son président, se dessine sur un parcours neuf trous et une offre pitch and putt. Le golf s'est vu attribuer le label Club sport responsable en 2015. C'est le seul golf dans les départements de l'Yonne et la Nièvre.","architecture":"FAULIN, le manoir actuel a été construit à laube dune nouvelle période de prospérité.  Le manoir est constitué du château et de sa basse-cour entourés par une enceinte rectangulaire cantonnée de trois tours circulaires, d'une tour maîtresse (donjon) et d'une tour sur plan carré. Dans la tour Est du logis, la chapelle présente un décor peint du début du XVIIe siècle ayant pour thème l'enfance du Christ (annonciation, nativité, adoration des mages et présentation au temple) et le couronnement de la Vierge. Faulin a conservé une partie du chemin de ronde qui conduit vers le donjon. La poterne est datée de 1577, date à laquelle lancienne poterne protégeant la haute cour a été déplacée pour clore la basse cour. Bien que le logis soit bâti avec des larges ouvertures, le château de Faulin est protégé par des douves sèches, un rempart conséquent (partiellement baissé côté Ouest), de nombreux mâchicoulis, bouches à feu, archères et assommoirs et des grilles en fer forgé sur les fenêtres basses. La surface des bâtiments de la basse cour indique bien lusage principal de ce château, à savoir un fief agricole, bâti pour protéger les récoltes. La dimension des terres agricoles est indiquée par un imposant colombier, correspondant à une surface dexploitation denviron 600 hectares.","habitants":"Famille de  Paul de Grivel de Grossouvre,\r\n        \"","divers":"Deux châteaux à Lichères-sur-Yonne, Faulin et Misery grav-7-8-9.                                                                                         47° 31' 04,44\" Nord et 3° 35' 47,4\" Est","gps":"","images":["../image/image_89/89_Faulin_1.jpg","../image/image_89/89_Faulin_2.jpg","../image/image_89/89_Faulin_3.jpg","../image/image_89/89_Faulin_4.jpg","../image/image_89/89_Faulin_5.jpg","../image/image_89/89_Faulin_6.jpg","../image/image_89/89_Faulin_7.jpg","../image/image_89/89_Faulin_8.jpg","../image/image_89/89_Faulin_9.jpg"]},"Consult_chateau_formulaire617d":{"id":"Consult_chateau_formulaire617d","dept":"89","canton":"Joigny","commune":"Villecien","nom":"Fey","type":"Château","periode":"XVII","histoire":"FEY, dans les dernières années du XVIe siècle NIcolas Hannequin duc d'Anjou et son épouse Marguerite le Ferron font construire le manoir, au XVIIe siècle construction du château par Nicolas de Baugy, conseiller et maître d'hôtel du roi,  Trois générations se succèdent jusqu'à Louis-Eugène ancien page des écuries du roi, veuf en 1750 qui cèdera en 1751 le domaine à Melchior-Philbert, baron de Chamousset, après la mort de la baronne en 1806 la Fey passe à Louise-Josephine-Eugénie  Cornisset-Desprez  épouse de l'amiral de vaisseau  de Meynard  de la Farges (1775-1848). le domaine restera jusqu'en 1917 dans cette famille  quand le vicomte Pierre d'Indy, devenu propriétaire, fit placer ses armoiries au fronton de la façade ouest, et le revend à M. Favier qui sera transmis à la famille Wallaert et au baron Fernand de Drouas avant d'être acquis  en 1982 par Marc Cherniavsky.","architecture":"FEY,  le château du Fey est construit de style Louis XIII sur le plateau dans la deuxième moitié du XVIIe siècle.   Après une longue allée ombragée, le château apparaît à travers les grilles du portail mais au fond de la grande cour d'honneur plantée d'ifs. Deux lions de pierre, couchés sur leur socle. Le château est composé d'un corps de logis aux façades assez basses avec un étage mansardé sur un vaste rez-de-chaussée. Des pavillons l'encadrent, prolongés par des ailes perpendiculaires. Les mansardes ont été retouchées. Les éléments protégés sont les façades et les toitures avec celles des communs ainsi que le salon, la salle à manger, la chambre et la petite chambre au rez-de-chaussée, dîte de Ninon de Lenclos. Si le XVIIIe siècle, à son apogée, n'a apporté sur la cour intérieure que la légère retouche d'une porte monumentale surmontée d'une horloge, il s'est imposé dans l'aménagement des salles de réception. Le grand salon a conservé ses panneaux aux motifs en bois sculpté, la tour d'angle de la ferme, le pavillon qui à l'ouest fait pendant à l'énorme colombier carré et le portail muré aujourd'hui, situé entre les deux, ont  fait partie d'un premier château, construit au XVIe siècle, au moment de l'érection en fief du Fey. Cette première construction, resserrée entre ses murs et inspirée des édifices féodaux, fut délaissé et transformé en communs et le château actuel fut édifié à l'extrémité de la terrasse.","habitants":"vicomte Pierre d'Indy\r\n        \"","divers":"A Villecien le château de Fey                                                                           : 48° 00' 50\" Nord et 3° 19' 49\" Est","gps":"","images":["../image/image_89/89_Fey_1.jpg","../image/image_89/89_Fey_2.jpg","../image/image_89/89_Fey_3.jpg","../image/image_89/89_Fey_4.jpg"]},"Consult_chateau_formulaire8b5d":{"id":"Consult_chateau_formulaire8b5d","dept":"89","canton":"Thorigny-sur-Oreuse","commune":"Thorigny-sur-Oreuse","nom":"Fleurigny","type":"Forteresse","periode":"XII-XIV","histoire":"FLEURIGNY, aux confins actuels de la Champagne et de la Bourgogne, était à lorigine une forteresse médiévale. Au cours de la guerre de Cent Ans, le seigneur des lieux, Philippe Lejay de Fleurigny fut tué à la bataille de Cravant en 1423. Les Anglais chassés en 1453, Charles VII ordonna le démantèlement de Fleurigny qui appartenait à Jehanne Lejay de Fleurigny, petite-fille de Philippe, veuve deux fois, sans enfants, elle laissa le domaine  en 1513 à son cousin François Leclerc à condition quil relevât les ruines du château et que son fils Charles reprît les armes de Fleurigny. En 1615 le domaine est érigé en marquisat.  Après la Révolution française, le château, saisi et pillé, fut remis en état par le dernier marquis de Fleurigny. À sa mort en 1843, sans enfants, il céda la propriété au petit-fils de sa sur, le marquis de Raigecourt dont descend lactuelle propriétaire, la comtesse F. de Limburg Stirum, puis passa par alliance aux Boisgelin  et appartient aujourd'hui à la marquise Castellane d'Esparon née Boisgelin. Le maréchal Leclerc logea dans ce château en 1944 après la libération de Paris. Il est à noter que le château na jamais été vendu.","architecture":"FLEURIGNY, était une forteresse médiévale du XIIe siècle. C'est aujourd'hui un beau château de style Renaissance, construit sur les restes d'un ancien manoir datant du Moyen-Age. Le château apparait à travers les arbres entouré de douves à eau courante, alimenté par l'Oreuse. Entouré de belles douves alimentées par la rivière, l'ensemble a grande allure. On peut y admirer la salle des gardes, avec sa cheminée monumentale, la salle à manger décorée de panneaux peints datant du XVIe et XVIIIe siècle et, surtout, la chapelle, qui est un véritable joyau de la Renaissance Française, dont les sculptures et les vitraux sont attribués à Jean Cousin. Ce bel édifice de la Renaissance est flanqué de trois tours rondes à toits pointus. Le château de Fleurigny est classé aux M.H. depuis le 26/04/1930. Sa chapelle a été classée dès 1889.","habitants":"Famille de  Jehanne Lejay de Fleurigny\r\n        \"","divers":"A  Thorigny-sur-Oreuse le château de Fleurigny                                               48° 17' 42\" Nord et 3° 21' 47\" Est","gps":"","images":["../image/image_89/89_Fleurigny_1.jpg","../image/image_89/89_Fleurigny_2.jpg","../image/image_89/89_Fleurigny_3.jpg","../image/image_89/89_Fleurigny_4.jpg","../image/image_89/89_Fleurigny_5.jpg","../image/image_89/89_Fleurigny_6.jpg","../image/image_89/89_Fleurigny_7.jpg"]},"Consult_chateau_formulaire0259":{"id":"Consult_chateau_formulaire0259","dept":"89","canton":"Auxerre","commune":"Chevannes","nom":"Fontaine_Madame","type":"Château","periode":"XVI","histoire":"FONTAINE-MADAME, le fief de Fontaine-Madame remonte au début du XVIe siècle et fut érigé, par mesure de sécurité, par les seigneurs de Baulche Chevannes au lendemain de la guerre de Cent ans. Le bourg de Chevannes, alors ceinturé de murailles, était protégé par une succession de maisons fortes dont la Motte de la Fontaine devenue Fontaine-Madame qui fut attribuée à Jehanne de Chuin, tandis que ses frères, Jacques et Pierre de Chuin, recevaient en apanage les manoirs voisins de La Motte du Bois et de Ribourdin. Le manoir passa ensuite en diverses mains avant d'échoir le 11 août 1723, à Pierre d'Armand de Châteauvieux, à cette époque, l'ancienne maison et pavillon, mentionnée dans l'aveu de la terre de 1731, fut remplacée par la demeure actuelle. Au lendemain de la Révolution, la famille de Châteauvieux dut l'abandonner et fut vendue le 8 avril 1811 à Jean-Joseph Davache de Thèze puis adjugée en 1820 à Antoine Marey, magistrat à Auxerre. Le château, après une longue période d'abandon, fut restauré à partir de 1931 par M. Camoin, antiquaire à Paris. Propriétaire  actuel  monsieur Grandchamp.","architecture":"FONTAINE-MADAME, le château de Fontaine Madame est situé au fond de la vallée de la Beaulche, non loin de la maison forte de Beaulche. La maison sélève sur une plate-forme fossoyée de dimension modeste. Le porche fortifié, où des rainures rappellent lexistence dun ancien pont-levis, a résisté aux restaurations. Cette porte aurait été fermée par une herse de fer, et un escalier en vis aurait permis daccéder à la salle de garde. Sur le cadastre de 1808, il ne reste que deux corps de bâtiments, séparé par une vaste cour, dont la porte-pavillon, mais aucune tour de flanquement ne subsiste. Des tours, reliées entre elles par des courtines, garnissaient les angles de la demeure, puisquelles  furent mises à jour au cours de travaux de restaurations. Certains affirment que la terre de Fontaine Madame est érigée en fief par les seigneurs de Beaulches à la fin du XVe siècle, avec maison forte. Néanmoins, la première mention de Fontaine Madame date du début XVIe siècle. Le seigneur est alors le capitaine du château de Beaulches. La demeure subit deux vagues de remaniement à la fin du XVIe siècle et au XVIIIe siècle.","habitants":"Famille  de  Jacques et Pierre de Chuin\r\n        \"","divers":"A Chevannes le château de Fontaine -Madame et de la Motte Grav-2;                                                                                                 47° 45' 09\" nord, 3° 29' 33\" est","gps":"","images":["../image/image_89/89_Fontaine_Madame_1.jpg","../image/image_89/89_Fontaine_Madame_2.jpg"]},"Consult_chateau_formulaired197":{"id":"Consult_chateau_formulaired197","dept":"89","canton":"Chablis","commune":"Fresnes","nom":"Fresnes","type":"Château","periode":"XVIII","histoire":"FRESNES,  dont le logis construit à partir de 1766, en contrebas de l'église ; scellée dans le mur de la façade, en bas, à droite, une pierre de fondation porte, gravée, l'inscription suivante: \"Cette pierre a été posée par messire Edmé Louis de Guijon fils de messire Louis Marie de Guion seigneur de Fresnes et madame Louise Edmée Dautre. Les communs et le colombier semblent dater du XVIIe siècle, quelques ouvertures ont été remaniées au XVIIIe siècle.","architecture":"FRESNES, corps de logis de plan rectangulaire allongé avec adjonction d'un bâtiment trapézoïdal. L'élévation du corps de logis est à dix travées, percée de fenêtres. Au centre de la façade, la porte d'entrée à encadrement mouluré formant saillie est couronnée d'une sorte de fronton cintré, flanqué de deux urnes. Un escalier cintré à double volée en permet l'accès. Aux extrémités de la façade, deux autres escaliers desservent le rez-de-chaussée et le pavillon, ouvert par deux porte-fenêtres, les combles sont éclairés par deux lucarnes ornées de volutes. Les salons sont lambrissés, l'un est couvert d'un plafond orné d'une croix grecque incurvée. Le toit, à longs pans à croupes est couvert de tuiles plates. Les portes charretières sont en plein cintre, les fenêtres rectangulaires à linteau en arc segmentaire, le toit, à croupes, brisé sur la partie gauche, est couvert de tuiles plates, le colombier circulaire, à toit conique, est surmonté d'une pierre sculptée représentant une colombe.","habitants":"Louis Marie de Guion\r\n        \"","divers":"Chateau de Fresnes à Fresnes;                                                        47° 45' 42\" nord, 3° 59' 38\"  est","gps":"","images":["../image/image_89/89_Fresnes_1.jpg","../image/image_89/89_Fresnes_2.jpg"]},"Consult_chateau_formulaire846f":{"id":"Consult_chateau_formulaire846f","dept":"89","canton":"Tonnerre","commune":"Fulvy","nom":"Fulvy","type":"Château","periode":"XVIII","histoire":"Deux chateaux à Fulvy ; Fulvy et Chaouen.                                                     FULVY,  édifié dans la première moitié du XVIIIe siècle pour Jean-Henri-Louis Orry, intendant des finances, directeur de la compagnie des Indes et fondateur de la manufacture de porcelaine de Vincennes, avec l'aide de son frère Philibert Orry, contrôleur des finances. Il aurait fait élever l'édifice avant sa nomination comme intendant des finances en 1737. Son fils, Louis-Philibert Orry, vendit le château en 1776. Détruit partiellement par un incendie, restauré sommairement.","architecture":"FULVY, la propriété, située à l'ouest du Fulvy, est fermée par un mur d'enceinte. A l'ouest se trouvent deux portails; l'un a une grille en fer forgé, et donne accès à une allée menant au château proprement dit; l'autre mène à la cour des communs. Ceux ci sont situés au sud du château et sont alignés de part et d'autre d'une cour. Le logis est dans le bâtiment principal, fait de moellons équarris pour le gros-oeuvre, et de pierre de taille pour les chaînes d'angle, les encadrements et entablements. Le plan général est celui de quatre corps de logis rectangulaires, disposés autour d'une petite cour intérieure fermée, de plan carré. Deux corps de bâtiments  principaux (bâtiment de façade et bâtiment de droite) et deux corps secondaires. L'accès à la cour intérieure se fait par un passage aménagé dans le corps de bâtiment gauche. La distribution intérieure se fait sur un rez-de-chaussée et un étage. Les pièces des deux corps principaux sont disposées en enfilade. Les armoiries des Orry de Vignory : \"de gueules (ou de pourpre) à un lion d'or rampant sur un rocher d'argent mouvant du flanc dextre de l'écu\" figurent sur une plaque de cheminée.  Colonie de vacances de la ville de Malakoff.","habitants":"Jean-Henri-Louis Orry\r\n        \"","divers":"Deux chat à Fulvy ; Fulvy et Chaouen grav-3.                                 47° 44' 31\" nord, 4° 10' 19\" est","gps":"","images":["../image/image_89/89_Fulvy_1.jpg","../image/image_89/89_Fulvy_2.jpg","../image/image_89/89_Fulvy_3.jpg"]},"Consult_chateau_formulaire301c":{"id":"Consult_chateau_formulaire301c","dept":"89","canton":"Charny","commune":"Grandchamps","nom":"Grandchamps","type":"Château","periode":"XVII","histoire":"GRANDCHAMP, au début du XIVe siècle, époque où apparaît Jean de Liénas, premier seigneur connu de Grandchamp, devait exister sur le cours de l'Ouanne à l'endroit même où sera construit l'actuel château, un manoir clos à eau, dont rien ne subsiste. A la fin du XVe siècle la seigneurie de Grandchamp est aux mains de la famille le Roy. Françoise Chouart, dame de Grandchamp, épouse vers 1590 François Lemaistre de la Robie qui compte parmi ses ancêtres Lucca della Robbia, célèbre artiste italien dont le père, venu d'Italie, comme architecte à Fontainebleau. On peut leur attribuer l'édification de l'actuel château, la construction des communs ayant été entreprise de 1610 à 1642. En 1695, Grandchamp est acquis par Melchior de Jordy sieur de Cabanac, commandant de la petite écurie du Roi. Son fils Guy, devenu marquis de Grandchamp, sera commandant de la Vénerie Royale en 1732. Le domaine sera acquis en 1779 par Bénigne-Henri de Sacristie, marquis de Tombeboeuf. Madame de Tombeboeuf née de Bombelles, parviendra en dépit de l'émigration de son mari, à conserver le château et à le transmettre à l'une de ses filles, la comtesse de Grimoard du Roure. Les Grimoard du Roure feront abattre l'aile gauche et les tours carrées qui l'accompagnaient. M. Defrance, ancien collaborateur du baron Haussmann, achète le château en 1875 et fait reconstruire l'aile gauche et sa tour dans le style des autres bâtiments. Par sa petite-fille le château de Grandchamp deviendra propriété de la famille Maringe, qui le possède encore aujourd'hui.","architecture":"GRANDCHAMP,  c'est un château fort reconstruit au XIVe siècle et remanié  en 1610, est classé aux M.H. depuis 1949 et du 26.11.1993. Construit en brique rose et de pierre bâti par les Courtenay, sa façade basse qu'encadrent de forts pavillons d'angle, flanqués de tourelles ainsi que le pavillon d'entrée, ferme une autre cour bordée par les pavillons des communs. Les parties protégées du château sont ses façades et toitures de la partie ancienne du château et des communs, le pigeonnier, les douves, son allée d'eau et sa cour d'entrée qui sont classés depuis le 8/03/1949, est situé sur l'Ouanne, qui alimente ses douves. Cette belle construction, telle qu'elle se présente actuellement, est le fruit des multiples restaurations qu'elle a subies au cours des siècles.","habitants":"Famille le Roy\r\n        \"","divers":"Chat de Grandchamps;                                                                                            47° 48' 23,95\" Nord, 3° 09' 24,67\" Est","gps":"","images":["../image/image_89/89_Grandchamps_1.jpg","../image/image_89/89_Grandchamps_2.jpg","../image/image_89/89_Grandchamps_3.jpg"]},"Consult_chateau_formulaire1de7":{"id":"Consult_chateau_formulaire1de7","dept":"89","canton"
