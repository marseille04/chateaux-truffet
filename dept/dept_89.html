:"Avallon","commune":"Beauvilliers","nom":"Grésigny","type":"Château","periode":"XVIII","histoire":"GRESIGNY, dès le XIIe siècle, Grésigny appartenait à une famille qui en portait le nom. En 1150, Thibaut de Grésigny signe, comme témoin, un jugement rendu contre Geoffroy, évêque de Langres. En 1318, Huguenin et Lucas de Presle, écuyers, seigneurs de Grésigny et de Beauvilliers en partie, partagent avec Béatrix de Bourgogne, comtesse de la Marche, un bien enlevé par force à labbaye de Vézelay. En 1471, Grésigny est entre les mains de Jeanne de La Mothe, dame de la Gorge, de Velard et de Railly, fille de Guillaume, et veuve dUstelin Lebourgeois, seigneur de Railly. Le château était alors dépourvu de fortifications et consistait en un rez-de-chaussée ni fossoyé ni fortifié, avec maison, granges, étables, vieilles murailles, courtil, verger, aisances et appartenances. Au XVIe siècle, le bâtiment passa dans la famille de Morot, originaire de Lorraine, Jean de Morot de Grésigny épousa Jacqueline Le Queux. Leurs fils Lazare, sieur de Bois-la-Dame, devint en 1608 écuyer ordinaire de la grande écurie du roi. Georges de Morot, fils de Lazare, servit comme chevau-léger de la garde royale. On voit en 1654 Jean de Morot, fils du précédent, faire hommage de sa terre au château de Presle, à Georges Filzjean seigneur du lieu. Cest vers cette époque que le château sera reconstruit. François de Morot sillustra pendant les guerres de Louis XIV. Gouverneur de Gérone, il mourra en 1734 brigadier des armées du roi. Les Morot conserveront Grésigny jusquau XIXe siècle. Il passera à cette époque, par mariage, à Gabriel Pinon, comte dErceville.","architecture":"GRESIGNY, Si le château d'aujourd'hui n'a plus rien a voir avec celui construit vers la fin du Moyen-Âge, il existe encore un certain nombre de trace de l'enceinte en grande partie arasée pour permettre surement au XVIIIe siècle la construction d'un pavillon et de diverses dépendances. Le château de Grésigny forme un corps de bâtiment isolé vers le milieu d'une cour bordée par de nombreux bâtiments de service ou dépendances agricoles. Les murs de clôture ont conservé leurs moyens de défense (meurtrières permettant de repousser un coup-de-main).","habitants":"Famille de Morot\r\n        \"","divers":"a Beauvilliers le château de Grésigny                                                    47° 24' 46\" N, 4° 02' 42\" E","gps":"","images":["../image/image_89/89_Gr%c3%a9signy_1.jpg","../image/image_89/89_Gr%c3%a9signy_2.jpg","../image/image_89/89_Gr%c3%a9signy_3.jpg"]},"Consult_chateau_formulaire649d":{"id":"Consult_chateau_formulaire649d","dept":"89","canton":"Vincelles","commune":"Tréigny","nom":"Guédelon","type":"Château","periode":"XX","histoire":"GUEDELON, au coeur de la Puisaye, dans l'Yonne en Bourgogne, une cinquantaine d'ouvriers relèvent un défi hors norme, construire aujourd'hui un château-fort selon les techniques et avec les matériaux utilisés au Moyen-Âge. Au milieu d'un espace naturel mettant à disposition toutes les matières premières nécessaires à sa construction : pierre, sable, argile, bois, terre... des maçons, tailleurs de pierre, carriers, bûcherons, charpentiers, forgeron, tuiliers, charretiers, vannier, cordier... bâtissent jour après jour un véritable château-fort sous les yeux de milliers de visiteurs. Ce chantier a débuté en juin 1997 et devrait durer environ 25 ans. L'intérêt majeur d'une telle aventure réside dans l'observation des différentes phases de travaux. Chaque étape de construction est unique et constitue un événement en soi. Quel que soit le créneau de réflexion retenu pour aborder ce chantier, Guédelon répond à bien des attentes de l'homme du XXIe siècle, c'est un chantier pédagogique, scientifique, historique, touristique et humain.                                                                                                                                                                                                                       Le futur château de Guédelon est une pure création utilisant les canons architecturaux instaurés par Philippe Auguste aux XIIe et XIIIe siècles. Philippe Auguste, roi de France de 1180 à 1223, est à l'origine d'une standardisation de l'architecture militaire des châteaux dans les territoires philippiens. Les châteaux du Louvre à Paris, de Yèvre le Châtel dans le Loiret, celui de Ratilly, et de Druyes les Belles Fontaines en sont quelques exemples.","architecture":"GUEDELON, un château \"philippien\" se caractérise de la façon suivante un plan polygonal constitué de hautes courtines maçonnées dont les bases sont souvent talutés ; au pied de ces courtines, un fossé sec, des tours d'angle rondes munies d'archères à ébrasement simple et disposées en quinconce suivant les niveaux; une tour d'angle, plus haute et plus grosse : la tour maîtresse, un châtelet entre deux tours défensif à l'entrée. A cette période, Philippe-Auguste avait initié par le biais de traités, d'alliances et de mariages une politique capétienne d'expansion durable.  Guédelon n'étant pas une restauration mais bien une construction à part  entière, il a donc fallu concevoir des plans pour le dépôt du permis de construire et c'est Jacques Moulin, architecte en chef des M.H., qui fut chargé de réaliser ces plans dans le respect des canons architecturaux de Philippe Auguste. L'esprit général du projet du château de Guédelon a été clairement défini : recherche de l'authenticité maximale dans toutes les technologies mises en oeuvre avec pour seule limite la sécurité et sa législation actuelle.","habitants":"Philippe Auguste\r\n        \"","divers":"Château de Guédelon à Treigny                                                         47° 35' 01\"nord, 3° 09' 20\" est","gps":"","images":["../image/image_89/89_Gu%c3%a9delon_1.jpg","../image/image_89/89_Gu%c3%a9delon_2.jpg","../image/image_89/89_Gu%c3%a9delon_3.jpg","../image/image_89/89_Gu%c3%a9delon_4.jpg"]},"Consult_chateau_formulairebb69":{"id":"Consult_chateau_formulairebb69","dept":"89","canton":"Sens","commune":"Malay le Grand","nom":"Houssayes","type":"Château","periode":"XVII","histoire":"HOUSSAYES, c'est un manoir construit en 1654. Sa construction date de la Guerre de Cent Ans  du XVe et XVIe siècle. Le château de la Houssayes a été remanié aux XVIe et XVIIe siècles,  la Houssayes fut acheté par Bourrienne, alors quil était ambassadeur à Hambourg. Il l'offrit à sa fille comme cadeau de mariage, le 17/03/1815, avec Mr Massieu de Clerval.","architecture":"HOUSSAYES, est dorigine féodale, c'est un château flanqué de 4 tours. Un corps de logis, au grand toit de tuiles, relie deux tours sur la face Ouest. Coté Est subsistent un colombier et une chapelle. Il possède une intéressante chapelle avec une cloche en bronze, des douves. Une grande cour entoure la demeure et ses communs, aux ouvertures à encadrements de briques On accède par un pont dormant au logis seigneuriale qui s'ouvre sur une seconde cour fermée. Un corps de logis, au grand toit de tuiles, relie deux tours sur la face Ouest, tandis quà lEst subsistent colombier. Une grande cour entoure la demeure et les communs, aux ouvertures à encadrements de briques. On accède par un pont dormant au logis seigneuriale qui s'ouvre sur une seconde cour fermée. A lorigine, une longue allée traversait, limmense forêt pour aboutir à la façade principale. Un chemin de ronde surplombe la façade septentrionale.","habitants":"Famille de Bourrienne\r\n        \"","divers":"A Malay le Grand, château de la Houssayes                                      48° 10' 32\" nord, 3° 20' 31\" est","gps":"","images":["../image/image_89/89_Houssayes_1.jpg","../image/image_89/89_Houssayes_2.jpg","../image/image_89/89_Houssayes_3.jpg"]},"Consult_chateau_formulairedea8":{"id":"Consult_chateau_formulairedea8","dept":"89","canton":"St-Florentin","commune":"Héry","nom":"Héry_Seignelay","type":"Château","periode":"XV-XVII","histoire":"CHAPELOTTE, en 1381 l'abbaye reçoit l'autorisation de fortifier sa maison d'Héry et de la mettre en état de forteresse et de défense. De cette époque, peut-on penser, date le premier château d'Héry. Durant les guerres de religion, le château est tenu par un capitaine. En 1592, le maréchal d'Aumont emporte la place, y causant de grands dégâts. Le manoir seigneurial va perdre ensuite son importance défensive. Devenu logis du régisseur des terres abbatiales, il gardera encore longtemps ses fossés pleins d'eau et son donjon. Le seigneur s'y réservera jusqu'à la fin de droit d'y pêcher les poissons de ses fossés et d'y loger lui, ses gens et ses chevaux, lorsqu'il visitera son domaine d'Héry. La Chapelotte paraît avoir été bâtie peu avant la Révolution et non loin de l'ancien château par le dernier régisseur, Jean-Baptiste Bernard, à qui on doit attribuer la création du parc qui l'avoisine. Cette demeure appartint ensuite à son fils Pierre Bernard, dit Bernard d'Héry, qui siégea sur les bancs de la Législative, il figura parmi les membres de l'administration du département de l'Yonne à cette époque et entra au conseil de la Préfecture sous le Consulat. La demeure ne permettait pas, par ses dimensions restreintes, de recevoir une nombreuse compagnie. Bernard d'Héry fera édifier sur la gauche un nouveau corps de bâtiment comportant une salle de bal au premier étage. Son fils Paul hérite de la Chapelotte et la lègue à son cousin Vergennes. Entre les deux guerres, l'aile de Bernard d'Héry disparaît et un pavillon couvert d'une toiture en terrasse est adjoint aux bâtiments d'habitation.","architecture":"SEIGNELAY, au XIIIe siècle on a la construction d'un château rectangulaire avec une tour à chaque angles. Charles de Savoisy a fait bâtir sur ce même emplacement un nouveau château, formé d'une enceinte jalonnée de treize tours délimitée par une muraille elle-même renforcée de tours. Colbert acquiert la seigneurie et son château en 1657 dans un état très délabré, il s'engage dans d'importants travaux qui vont faire disparaître petit à petit les remparts. Il fait élever une chapelle, un parc, des halles couvertes, tracer la perspective de la route de Brienon, ouvrir une manufacture de draps et une autre de soie au village. Au début du XVIIIe siècle Seignelay passe dans la famille de Montmorency-Luxembourg, et de 1780 à 1784, ils entreprennent des travaux sur des  constructions antérieures. A la Révolution le domaine est saisi et vendu en l'an IV. Mais sera démoli deux ans plus tard et ses matériaux serviront à construire le château de Guillebaudon et les casernes de Joigny. De l'ancien château, il reste de nos jours un pavillon d'entrée érigé à la fin du XVIIIe siècle avec une tour.  Vestige du mur ouest d'enceinte de l'ancien château la tour y figurant étant une reconstitution, rebâtie après la démolition du château.                                                                                                                             CHAPELOTTE suite des colonnes provenant de l'abbaye de Pontigny entrèrent dans la construction. Homme de lettres et amateur d'art, Bernard d'Héry installa à la Chapelotte une remarquable bibliothèque et une importante galerie de tableaux.","habitants":"Famille de Spitzmuller\r\n        \"","divers":"A Héry  le château de Chapelotte grav 1-2-3 et de Signelay  47° 54' 15\" nord, 3° 37' 38\" est","gps":"","images":["../image/image_89/89_H%c3%a9ry_Seignelay_1.jpg","../image/image_89/89_H%c3%a9ry_Seignelay_2.jpg","../image/image_89/89_H%c3%a9ry_Seignelay_3.jpg","../image/image_89/89_H%c3%a9ry_Seignelay_4.jpg","../image/image_89/89_H%c3%a9ry_Seignelay_5.jpg"]},"Consult_chateau_formulaire6902":{"id":"Consult_chateau_formulaire6902","dept":"89","canton":"Avallon","commune":"Island","nom":"Island","type":"Château","periode":"XV","histoire":"ISLAND, a été construit à partir de 1448 par Guillaume de Ferrières, seigneur d'Island et de la Chaume. En 1510, son petit-fils, Philippe de Ferrières, rend foi et hommage de son domaine à Phillippe de Chastellux, haut seigneur d'Island. En 1581, Etienne Filtzjean et son frère Georges, d'une famille de magistrats d'Avallon, achètent le château. Ils rendent foi et hommage, en 1599, à Olivier, sire de Chatellux. En 1617, Madeleine Fitzjean épouse François de Longueville, seigneur de Domec. C'est la réunion des 2 familles d'Island et de Domecy. Jacques, l'aîné hérite de la maison seigneuriale de Domecy, Philippe, le cadet, hérite de la terre et seigneurie d'Island avec le château des Chaumes. Le testament de Phiippe de Longueville disposait de sa seigneurie d'Island en faveur de ses trois neveux. Etienne Thomas rachète les parts de ses frères et devient en 1695, seigneur d'Island. A sa mort, en 1710, François, son frère et son neveu, fils de Pierre entrent en possession du domaine. La seigneurie passe ensuite à Nicolas Thomas, fils de François. En 1759 son fils, nommé également François, occupe la terre d'Island et le château des Chaumes. Sa fille Marie Pierrette Thomas, hérite du château. Elle se marie à Jean de Contye en 1788, capitaine des dragons et en seconde noce à Aimé Renier de Fargis. Restée seule durant la Révolution, elle contracte enfin mariage en 1798, avec son régisseur et fermier, Hilaire Dorneau, qui héritera du château à sa mort, au début du XIXe siècle. Il assure la maîtrise d'oeuvre du nouveau logis du XVIIIe siècle, qui se soude à l'extrémité sud du premier et s'allonge d'Est en Ouest. Il reste dans la famille Amelin jusqu'en février 1977, date à laquelle, Marie et Philippe Claverie achètent le château et le restaurent pour en faire un lieu de vie privilégié et rempli d'histoire.","architecture":"ISLAND, le château se compose de deux parties distinctes, à l'Est, le corps de logis primitif, très restauré au XIXe siècle, comporte dans son angle sud un pavillon en partie masqué par l'aile perpendiculaire construite dans les dernières années du XVIIIe siècle. Au centre s'élèvent une tour carrée, coiffée d'un toit élancé et, à l'extrémité nord, un autre pavillon en avancée, mais plus bas que le reste de la construction. Le corps de logis est enfin cantonné côté nord, d'une grosse tour cylindrique, dont la construction est contemporaine des remaniements du XIXe siècle. Les fenêtres de ce \"château vieux\" présente une grande diversité  de caractères mais peu sont authentiques. Certaines à montants moulurés et à linteaux en accolade, peuvent cependant être datées des XVe siècle ou XVIe siècles. Le corps de bâtiment moderne qui s\"allonge d'Est en Ouest, présente des façades sobres, à percements réguliers. Son petit côté  ouest s'encadre entre deux minces tourelles à toits en poivrière, percées d'archères canonnières de fantaisie.","habitants":"Famille de Phiippe de Longueville \r\n        \"","divers":"Château d'Island  47° 27' 54\" nord, 3° 49' 26\"est","gps":"","images":["../image/image_89/89_Island_1.jpg","../image/image_89/89_Island_2.jpg","../image/image_89/89_Island_3.jpg","../image/image_89/89_Island_4.jpg","../image/image_89/89_Island_5.jpg","../image/image_89/89_Island_6.jpg","../image/image_89/89_Island_7.jpg"]},"Consult_chateau_formulaire80a4":{"id":"Consult_chateau_formulaire80a4","dept":"89","canton":"Chablis","commune":"L","nom":"Isle_sur_Serein","type":"Château","periode":"XV-XVIII","histoire":"ISLE sur SEREIN, au XIIe siècle les sires de Montréal possédaient un château dans l'île qui a donné son nom à la localité. A la suite des exactions d'Anséric X de Montréal, le duc de Bourgogne mit la main sur la terre de l'Isle sous Montréal, qui par mariage passa aux Chalon d'Arlay en 1297. Après diverses vicissitudes, ceux-ci la conservèrent jusqu'à la fin du XVe siècle, sans guère y résider. Dès le début de la guerre de Cent Ans, le château avait été pris par les Anglais d'Edouard III et il ne semble pas avoir pu résister ensuite, ni aux grandes compagnies ni aux Ecorcheurs. Il ne paraît pas avoir eu à se défendre durant les guerres de Religion. Pendant la Ligue, à laquelle la population se montra favorable, les royalistes y mirent une garnison qui ne fut pas délogée. Passé au XVIIe siècle à Louis de Mailly, le château devint au siècle suivant, résidence de sa petite-fille la princesse de Nassau, dont les démêlés avec les habitants sont passés à la postérité. Le château, assez vaste, présente une porte charretière, avec en façade une poterne. Le grand corps de logis central est du XVe siècle.","architecture":"ISLE sur SEREIN, il a été construit en 1789. Opportunity vous propose dans un village,  le château de l'Isle-sur-Serein est mis en vente : pour devenir un hôtel ou un lieu évènementiel. Entouré d'un parc de 5ha bien entretenu, bordé sur la rivière du Serein. Toutes les toitures, façades et gros oeuvre rénovés. Le château d'une surface de 17000 m² sur 4 niveaux et un grenier de 400m². Dépendances Louis XIII d'une surface de 1000m² et 500m² de Conciergerie, des écuries (possibilité 15 boxes)+ petit manège. Pavillon gardien moderne et confortable 4 pièces de 115m² et un hangar de 500m². Château 39 pièces A L'angle de la rue  Jean de Chalon se dresse une tour en encorbellement dite tour de l'évêque en souvenir d'Antoine de Chalon évêque qui y vécut à la fin du XVe siècle. La petite ville à conservé des vestiges de fortifications des deux  châteaux l'un du XVIIIe siècle  et l'autre du XIIIe siècle caché sur l'isle.","habitants":"Famille Louis de Mailly\r\n        \"","divers":"A L'Isle-sur-Serein le château  Pacy grav-2:   Courtharoux grav-4                                                                                               47° 35' 18\" Nord, 4° 00' 19\" Est","gps":"","images":["../image/image_89/89_Isle_sur_Serein_1.jpg","../image/image_89/89_Isle_sur_Serein_2.jpg","../image/image_89/89_Isle_sur_Serein_3.jpg","../image/image_89/89_Isle_sur_Serein_4.jpg"]},"Consult_chateau_formulaireed67":{"id":"Consult_chateau_formulaireed67","dept":"89","canton":"Avallon","commune":"Ste Magnance","nom":"Jacquard_Jacquot","type":"Maison forte","periode":"XV","histoire":"JACQUARD, maison forte à l'origine, ce château date du XV siècle. En 1525, il appartenait à M. Jaquot, du Baillage de Dijon. Selon la mémoire locale, au XVIIe et XVIIIe siècle, il aurait été occupé par un riche paysan qui aurait construit un bâtiment de ferme. L'abbé Baudiau, au milieu du XIXe siècle le cite \"fort délabré\".   Ce château figure sur la carte de Cassini en 1760. En 1936, un boucher achète ce château et y fait un dépôt pour la viande.  Dans les années 1990, les propriétaires actuels le rachète, le restaure tout en conservant son aspect médiéval, transformé en logis de France par la famille Costaille Martine.","architecture":"JACQUARD, la silhouette massive du château Jacquard, construit en pierres brutes, est situé en vigie sur un haut de côte, quelques tours et tourelles lui font belle allure. Un escalier à vis au dessin de fluidité mène vers une grande chambre qui peut accueillir jusqu'à quatre personnes. Latmosphère des lieux avec ses plafonds à tavaillons, sa cheminée monumentale et son mobilier, nous transporte dans l'univers du moyen-âge.","habitants":"famille Costaille Martine\r\n        \"","divers":"A Ste Magnance château de Jacquard                                                47° 27' 04\" nord, 4° 04' 43\" est","gps":"","images":["../image/image_89/89_Jacquard_Jacquot_1.jpg","../image/image_89/89_Jacquard_Jacquot_2.jpg","../image/image_89/89_Jacquard_Jacquot_3.jpg","../image/image_89/89_Jacquard_Jacquot_4.jpg"]},"Consult_chateau_formulaire51cf-2":{"id":"Consult_chateau_formulaire51cf-2","dept":"89","canton":"Joigny","commune":"Joigny","nom":"Joigny","type":"Château","periode":"XVI-XVII","histoire":"Trois châteaux dans cet article celui des comtes de Gondi, des Bailli de Joigny et Puynesge.                                                                                      COMTES de GONDI, c'est un château de style Renaissance. Sa construction date du 3e quart du XVIe siècle et du 1er quart du XVIIe siècle. En 1569, Louis de Sainte-Maure, comte de Joigny, confia les travaux du château à Jean Chéreau . En 1603, le château fut vendu à Pierre de Gondi. La façade Sud du château fut terminée en 1613. Après la suppression du comté, en 1790, le château devint un bien national. Il fut vendu en deux parties : le corps du logis a été racheté par la ville et le pavillon, par un particulier Mr Picard. En 1826, celui-ci entreprit la démolition du 3ème étage du pavillon et de la petite aile en retour ainsi que tous les aménagements intérieurs. Le château de Gondi servit, ensuite, d'école supérieure de jeunes filles jusqu'en 1966, puis il fut occupé par des associations. Le Château des comtes de Gondi surplombe la ville, entouré de quelques beaux hôtels particuliers. Ses éléments protégés aux M.H. sont la salle, l'élévation, la toiture, le décor intérieur. L'ancien château des comtes de Gondi est inscrit partiellement le 21/03/1983. Il est la propriété de la commune de Joigny.","architecture":"BAILLI à JOIGNY, la maison du Bailli est une maison-tour bâtie à Joigny. Elle date du XVIe siècle, elle a été construite à la Renaissance. Ses façades sont habillées dinscriptions, en vieux français, gravées sur les pierres, en latin et en grec et portent la date de 1573. Elle présente aussi des pans de bois, sculptés d'éléments végétaux sur deux  façades. On peut y voir des écailles sur sa façade principale et, des losanges sur lautre. De saints personnages et une annonciation ornent les aisseliers. Il y a aussi un léger encorbellement à l'étage. La maison du Baili était dotée d'un système défensif avec une bretèche protégeant la porte d'entrée, ainsi qu'un escalier à  vis dont la spirale s'assouplit, à mesure de la montée, vers les étages privés. Une charpente par Philibert Delorme supporte une belle toiture qui coiffe l'édifice. Le bailli y rendait la justice, selon la tradition. La maison du Bailli a été restaurée au XXe siècle, par l'Abbé Vignot. Puis, après les bombardements de 1940, elle fut à nouveau restaurée par les M. H.. Située ruelle haute Saint-Jean en contrebas de l'église Saint-Jean.                                                                                                            PUYNESGE,  sa construction date de la 1ère moitié du XVIIe siècle. La maison Puynesge est privée, elle est inscrite partiellement aux M.H. depuis le 24/10/1989 pour ses façades et toitures du bâtiment donnant sur la rue et sur la cour, et sur le jardin, pour ses deux perrons et ses terrasses.","habitants":"Gondi,Louis de Sainte-Maure\r\n        \"","divers":"Trois châteaux à Joigny celui des comtes de Gondi  grav 1-2-3-4, des Bailli de Joigny et Puynesge grav -4.                                        Comtes de Gondi: 47° 58' 59\" Nord, 3° 23' 51\" Est                                       Puynesge 47° 58' 57\" Nord, 3° 23' 59\" Est                                                   : Bailli 47° 32' 22\" Nord, 3° 13' 09\" Est                                                               Porte st-Jean grav-6.  47° 58' 58\" nord, 3° 23' 52\"est                                                 Porte du bois grav 5 . 47° 59' 05\" nord, 3° 23' 46\"est","gps":"","images":["../image/image_89/89_Joigny_1.jpg","../image/image_89/89_Joigny_2.jpg","../image/image_89/89_Joigny_3.jpg","../image/image_89/89_Joigny_4.jpg","../image/image_89/89_Joigny_5.jpg","../image/image_89/89_Joigny_6.jpg"]},"Consult_chateau_formulaire87dd":{"id":"Consult_chateau_formulaire87dd","dept":"89","canton":"Chablis","commune":"Jouancy","nom":"Jouancy","type":"Château","periode":"XV-XVI","histoire":"JOUANCY, des documents mentionnent Jouancy dès le XIIe siècle, une maison-forte devait exister à cette époque. En 1250 le fief est vendu par Jean de Polisy à Miles de Noyers, comte de cette ville. En 1448, le domaine échoit à Bonne de Damas, épouse de Jean d'Edouard. Cette famille conserve le fief jusqu'à la fin du XVIIe siècle. En 1563, Nicolas d'Edouard fit démolir l'ancien manoir ruiné et construit le château actuel par Nicolas Dange (ou Dangiers) de Troyes comme en témoigne une inscription gravée sur le corps de logis (fenêtre située à l'aplomb du portail d'entrée) : \"Lan Mil Vc soyxante et trois Nicolas Dange natif de Troye. La construction était à peine terminée en 1575, à la mort du seigneur. En 1682, l'édifice passe aux Pernes d'Epinac et en 1740 à Armand-Jean de Senevoy. Au début du XIXe siècle, la propriété est morcelée en diverses propriétés agricoles, le château est en mauvais état et le décor intérieur a été pillé. Il est vendu en 1980 et le nouveau propriétaire entreprend d'importantes restaurations de 1980 à 1997.","architecture":"JOUANCY, le château est composé d'un corps principal flanqué de deux pavillons sensiblement carrés. Construit en grand appareil de pierre du pays, au niveau inférieur de la façade du corps central et des faces internes des pavillons, et pour le solin des autres faces des pavillons et l'allège des fenêtres du second niveau. L'entrée du corps central donne sur un vestibule couvert d'une voûte en berceau à caissons et lunettes ; le bâtiment, double en profondeur, est dessservi par un couloir couvert d'une voûte en berceau. Les pièces du rez-de-chaussée sont voûtées soit en arc de cloître déprimée, soit en berceau, soit en voûte d'arêtes, l'une d'elles possède une cheminée monumentale. A l'étage de l'aile droite, une pièce est couverte d'une voûte en arc-de-cloître. Le portail et les bâtiments annexes sont difficilement datable avec certitude et présentent de fort remaniements contemporains. Dans la cour se dresse un pigeonnier circulaire, couvert de lave. Enfin, ce château présente le seul assommoir installé sur un habitat connu dans le Tonnerrois ainsi qu'une grande variété de forme de canonnières.","habitants":"Famille de Jean d'Edouard\r\n        \"","divers":"Château de Jouancy  à Chablis                                                              47° 41' 2,62\" Nord, 4° 01' 52,02\" Est","gps":"","images":["../image/image_89/89_Jouancy_1.jpg","../image/image_89/89_Jouancy_2.jpg","../image/image_89/89_Jouancy_3.jpg","../image/image_89/89_Jouancy_4.jpg","../image/image_89/89_Jouancy_5.jpg"]},"Consult_chateau_formulaire361d":{"id":"Consult_chateau_formulaire361d","dept":"89","canton":"Tonnerre","commune":"Jully","nom":"Jully","type":"Château","periode":"XII-XV","histoire":"JULLY, au XIIe siècle, le château existait déjà. Le comte de Tonnerre, Milon 1er, l'aurait construit vers 987. La terre resta aux comtes de Tonnerre jusqu'en 1144. Le seigneur était Milon, comte de Bar-sur-Seine, auquel Saint-Bernard demanda le château pour en faire un monastère de femmes relevant de l'abbaye de Molesmes. Le couvent fut fondé en 1114. Alors le château prit le nom de la Loge aux Convers et il fut réunit au XVe siècle à Molesmes pour l'office du cellerier. L'abbé commanditaire de l'abbaye de Molesmes était le seigneur suzerain de Jully. Au XXe siècle des ouvriers, en réparant la toiture du château, transformé en prieuré et en ferme, trouvèrent des liasses de parchemins dont des chartes du XIIe au XVIe siècles et les terriers de 1607 et 1708. L'édifice était implanté au lieu dit Sully, il se composait de plusieurs bâtiments, d'une chapelle, d'une terrasse, de vergers et de prés. Il tombait en ruines en 1708, puis à la Révolution, il fut transformé en ferme. Sous un blason est gravée la date 1544, au-dessus de la porte de l'étable.","architecture":"JULLY, seul subsiste du château un corps de bâtiment à demi-ruiné, édifié sur une cave voûtée. La façade antérieure comprend un sous-sol, un rez-de-chaussée, un étage carré et un étage de comble. Le rez-de-chaussée est percé d'une fenêtre à meneaux à piédroits et traverses à moulures prismatiques et d'une simple fenêtre à piédroits. Un bandeau sépare les niveaux. Le toit est à longs pans couvert de tuiles plates. A droite, est située une étable ouverte par une porte à linteau segmentaire, surmontée d'une pierre sculptée d'un écu et de la date  de 1544. Au-dessus de cette porte, une fenêtre remaniée, à pilastres ornés de losanges, semble remonter à l'époque Renaissance. Le toit est à deux pans en tuiles mécaniques. Dans la cour devant les façades antérieures, un puits carré, en pierre, se trouve à proximité de l'étable. Ce site, restauré par une association, est devenu la salle des fêtes municipale et a été affublé d'un bâtiment contemporain qui nuit à sa lecture.","habitants":"suzerain de Jully\r\n        \"","divers":"Château de Jully à Jully                                                                     47° 46' 32\" nord, 4° 17' 48\" est","gps":"","images":["../image/image_89/89_Jully_1.jpg","../image/image_89/89_Jully_2.jpg","../image/image_89/89_Jully_3.jpg"]},"Consult_chateau_formulaireb481":{"id":"Consult_chateau_formulaireb481","dept":"89","canton":"Toucy","commune":"Lalande","nom":"Lalande_Yonne","type":"Château","periode":"XVI-XVII","histoire":"LALANDE, il date de la 2e moitié du XVIe siècle - XVIIe siècle. La seigneurie est citée pour la première fois en 1170, sous le nom de Landa. C'était un fief de la Baronnie de Toucy. En 1585, Olivier Foudriat, lieutenant particulier au bailliage d'Auxerre, vendra le domaine et la seigneurie de Lalande à Loup du Deffand. La seigneurie est érigée en marquisat en 1647 pour Louis du Deffand, lieutenant général en Orléanais, Dunois et Vendômois, à l'occasion de son mariage avec Anne-Madeleine Brulard. L'aisance que lui procure ce mariage lui permet de bâtir un nouveau château destiné à remplacer la simple gentilhommière de Lalande. Il meurt sans avoir pu mener les travaux à leur terme. Son petit-fils Jean-Baptiste du Deffand, marquis de Lalande, colonel de dragons, épouse en 1718 sa cousine Marie de Vichy-Chamrond. Mais la nouvelle, sémillante et spirituelle marquise de Lalande se lasse rapidement des séjours que son époux la contraint de faire à Lalande. Elle préfère renoncer à la vie commune et s'installer à Paris, où elle tient l'un des plus célèbres salon de son temps. En 1809, le château de Lalande passe, par achat, aux mains de la Famille de La Celle, puis, par mariage, aux  Beaurepaire de Louvagny, qui le conservent jusqu'en 1939.  Le château de Lalande est inscrit aux M.H. depuis 2000","architecture":"LALANDE, château bâti en trois phases entre la fin du XVIe et la fin du XVIIe siècle. L'ensemble est formé d'un château, de deux communs en retour d'équerre, un colombier, des douves, une grille et une allée perspective, il présente un bel exemple d'évolution typologique de la modénature brique et pierre dans cette région de Puisaye. La ferme du domaine, à droite du château, est dénaturée.","habitants":"Jean-Baptiste du Deffand\r\n        \"","divers":"Château de lalande: 47° 40' 43\" Nord et 3° 19' 22\" Est","gps":"","images":["../image/image_89/89_Lalande_Yonne_1.jpg","../image/image_89/89_Lalande_Yonne_2.jpg","../image/image_89/89_Lalande_Yonne_3.jpg","../image/image_89/89_Lalande_Yonne_4.jpg"]},"Consult_chateau_formulaire7b96-2":{"id":"Consult_chateau_formulaire7b96-2","dept":"89","canton":"Chablis","commune":"Massangis","nom":"Larchèvre","type":"Chäteau","periode":"XVII","histoire":"LARCHEVRE, la terre de Tormancy était partagée au Moyen-Age en plusieurs petits fiefs qui relevaient de la baronnie de L'Isle sur Serein. Une famille a porté le nom de cette terre aux XIVe et XVe siècles, et le dernier d'entre eux, Jacques de Tormancy, laissa sa part de la seigneurie à Claude de Rabutin, fils d'un premier mariage de sa femme. Laurent des Georges, héritier des d'Avout, possédait une part de la terre, en particulier le manoir de Larchèvre, au début du XVIIe siècle. Il céda le domaine à Jacques de Bataille, issu d'un rameau des Bataille de Pancy, installé à Tormancy, dont la fille, Anne, en épousant Gabriel de la Roche, reçut le fief de Larchèvre qu'elle laissa à Georges de La Roche, son fils, marié à Marie le Prince. A leur mort les biens de leur succession furent saisis sur leurs enfants et le château fut adjugé le 1er septembre 1693 à Magdeleine Regnault, veuve d'Antoine de Quesse. Jean François de Quesse de Valcourt, son fils, hérita du fief. A la mort de Jean-Antoine, en 1813, il laissait le château à sa jeune veuve Pauline d'Avout, Larchèvre échut au baron Auguste d'Avout en 1881.","architecture":"LARCHEVRE, de plan carré à deux niveaux toits en croupes de style classique de son époque , accolé de dépendances sur flanc gauche à mi-hauteur.","habitants":"Jean François de Quesse de Valcourt\r\n        \"","divers":"Château de Larchèvre à Massangis                                                   7° 37' 27\" nord, 3° 58' 30\" est","gps":"","images":["../image/image_89/89_Larch%c3%a8vre_1.jpg"]},"Consult_chateau_formulaire5c2b":{"id":"Consult_chateau_formulaire5c2b","dept":"89","canton":"Joigny","commune":"Looze","nom":"Looze","type":"Château","periode":"XVII","histoire":"LOOZE,  du XIVe au XVIIe siècle, Guiot de Looze, dorigine inconnue mais qui prit le nom de lun de ses fiefs, était premier écuyer de cuisine de Philippe VI de Valois. Vers 1447, la seigneurie de Looze passe par achat dans la famille de Lespinasse-Langeac, seigneur dEsnon, de Brion et dautres lieux, avant déchoir par achat ou mariage, à la puissante famille de parlementaires, les Piedefer, seigneur de Champlost. La seigneurie de Looze est ensuite vendue le 29 mai 1628 à Pierre de Hannicques de Benjamin, seigneur de Cheny, Bonnard, Bordes, Bazarnes et La Malmaison, 1er Écuyer de Gaston, frère du Roi Louis XIII, duc d'Orléans. Le château de Looze, fut construit vers 1640 par Roger de Hanniques, fils de Pierre de Hannicques de Benjamin. Cest Marie de Hannicques, fille du premier mariage de Charles, frère de Roger de Hannicques, qui hérita non sans peine du château et des terres de Looze en 1679. Elle avait épousé le 6 avril 1655, Edme de Chassy, baron de Doys en Berry, seigneur de Saint Hilaire de Gondilly et dautres lieux, auquel elle apporta les seigneuries de Looze. La commune de Looze acheta l'avenue du château et la mare, d'une superficie de 30 ares 50 (aujourd'hui la rue du château, l'allée des Tilleuls et la place de l'Eglise). Ensuite, le château fut la propriété du commandant Renard, chef d'escadron au 1er dragons de Joigny, en retraite à Looze vers 1900. La famille Renard habita le château jusqu'aux années 1925. Puis, le château fut la propriété de Mme Vedrenne qui avec M. Lecardez exploiteront un débit de boissons et la restauration pour mariages et banquet .En 1959, le château, dont l'état était plus qualarmant, fut acquis par Monsieur Henri Becq, architecte de son métier.","architecture":"Trois châteaux dans cet article celui des comtes de Gondi, des Bailli de Joigny et Puynesge.                                                                   LOOZE,  le château, ainsi que ses communs, fut lobjet dimportants travaux dembellissement entrepris au XVIIIe siècle par larchitecte François II Franque. La rampe de lescalier dhonneur, les boiseries du grand salon, et les cinq cheminées ont été réalisées entre 1745 et 1758, et la chapelle fut consacrée en 1756.  Monsieur Henri Becq s'est beaucoup investi dans le sauvetage, toujours en cours de ce superbe édifice (restauration de la tour, des toitures et des corniches). Aujourd'hui, son fils Denis Becq a repris le flambeau et poursuit de nombreuses restaurations, notamment la chapelle en 2013 qui a été loccasion de faire intervenir Eric Bourgoin, artisan ébéniste du village, ancien élève de lEcole Boulle.","habitants":"famille de Lespinasse-Langeac\r\n        \"","divers":"Château de Looze à Looze                                                                  47° 59' 41\" nord, 3° 26' 14\"est","gps":"","images":["../image/image_89/89_Looze_1.jpg","../image/image_89/89_Looze_2.jpg","../image/image_89/89_Looze_3.jpg"]},"Consult_chateau_formulaire874a":{"id":"Consult_chateau_formulaire874a","dept":"89","canton":"Joux la Ville","commune":"Mailly le château","nom":"Mailly_chateau","type":"Château","periode":"XIV","histoire":"MAILLY le CHÂTEAU, c'est au château de Mailly que fut écrite par Pierre II de Courtenay (~1165 - 1219), comte d'Auxerre (1185-1219)) et confirmée par sa fille Mathilde (1188-1257), la première charte d'affranchissement des serfs. Cette charte est considérée comme une pièce maîtresse dans la démarche sur l'abolition de l'esclavage en Europe. Au demeurant, l'église de Mailly-le-Château (qui date de cette époque (XIIe??XIIIe siècle) est un des rares édifices religieux à ne pas comporter un motif biblique en fronton.  La construction du Donjon  date du XIVe siècle.   Le 30 octobre 1606, un incendie détruit plusieurs  maisons, un lieutenant en l'élection particulière de Mailly-le-Châtel y siège en 1620 et 1631, un élu en 1646. En 1633, le prince de Condé achète le seigneurie sur les héritiers d'Anne de Rochefort, poursuivis à la requête de Françoise de Sufferte. En 1633, le prince de Condé achète la seigneurie aux héritiers d'Anne de Rochefort, poursuivis à la requête de Françoise de Sufferte. Il y prend les eaux, en revenant du siège infructueux de Dole, en septembre 1636. Le prince et son fils, le futur Grand Condé viennent sur place en 1633, à 1646, du temps de leur gouvernorat de Bourgogne. Ensuite, la seigneurie passe aux princes de Conti. Au cours de la Révolution française, la commune est nommée Mailly-le-Vineux.","architecture":"A dix kilomètres à l'ouest à Courson les Carrières le manoir de COURSON,   Courson-les-Carrières tient son nom du duc de Courson. Les tailleurs de pierre de Courson ont fait la réputation de ce petit village de l'Yonne. De nombreux peintres comme l'espagnol Miguel García Vivancos se sont servis du cadre local pour peindre leurs toiles. C'est devenu la  mairie.                                                                                                  COUR les MAILLY, manoir  Cette localité appartint à lévêché dAuxerre jusquau XIIe siècle. A partir de ce moment, il y eut des seigneurs particuliers puisquils donnèrent des terres aux moines de Vézelay ; les comtes dAuxerre cédèrent au XIVe siècle Mailly-la-Ville en fief, et ce quils possédaient aux environs, à des vassaux. En 1760, la seigneurie appartenait au prince de Conti et Mailly-la-Ville était prévôté royale. A la Révolution, labbaye de Reigny et lhôpital de Coulanges-la-Vineuse , avec la famille dAngrand dAlleray, y possédaient des biens qui furent vendus. A Cour-lès-Mailly, il existait un ancien fief. Le premier seigneur connu fut Didier Boisselet, écuyer du roi Charles VI, qui acquiert un fief à Mailly-la-Ville : la Cour les Mailly, dont il fait hommage au roi, au titre du comté dAuxerre, en 1393. Cour les Mailly appartenait autrefois à feu Hérart Quarré, chevalier. Le manoir a été bâti au XVIe siècle et très restauré au XIXe siècle, élévation à travées à un étage carré en pierre ; Couverture : toit à longs pans ; toit en pavillon ; toit conique ; toit en bâtière ; croupe en  tuile plates, Il subsiste aujourd'hui le corps de logis flanqué d'une tour ronde à toiture conique, et à l'autre extrémité la tour carrée du pont-levis, munie d'une bretèche sur consoles. Deux matériaux différents sont utilisés : le calcaire qui constitue le sous-sol de la Terre-Plaine et le granite qui provient du Morvan tout proche.","habitants":"Pierre II de Courtenay Famille de Rochefort\r\n        \r\n        \"","divers":"Trois châteaux à Mailly le château  Cour de Mailly Grav-3-4                                             Courson  47° 36' 55\" Nord, 3° 30' 03\" Est                                                                            Mailly : 47° 35' 49\" Nord, 3° 38' 11\" Est","gps":"","images":["../image/image_89/89_Mailly_chateau_1.jpg","../image/image_89/89_Mailly_chateau_2.jpg","../image/image_89/89_Mailly_chateau_3.jpg","../image/image_89/89_Mailly_chateau_4.jpg","../image/image_89/89_Mailly_chateau_5.jpg","../image/image_89/89_Mailly_chateau_6.jpg"]},"Consult_chateau_formulairedac4":{"id":"Consult_chateau_formulairedac4","dept":"89","canton":"Chablis","commune":"Maligny","nom":"Maligny","type":"Château","periode":"XIV","histoire":"MALIGNY, au milieu du XIVe siècle et sans doute  avant cette époque, les seigneurs de Maligny disposent d'un château entouré de fossés et d'une chapelle. En 1358, Edouard III envahit l'Auxerrois et Gille de Maligny défend  le château. Il sera livré en otage au souverain anglais en garantie de l'exécution du traité signé à Calais en 1360. En son absence, un lieutenant de l'Archiprêtre, fameux routier qui tient le parti de Jean le Bon, s'y installe, d'où il répand la désolation aux alentours. La seigneurie passe par mariage en 1483 à Jean de Ferrière, bailli du Beaujolais et conseiller du duc de Bourbon. En 1605 la terre de Maligny est saisie par arrêt du parlement de Paris et adjugée à César de Vendôme, fils naturel d'Henri IV et de Gabrielle d'Estrée. Il la vend en 1620 à Antoine de La Grange, seigneur d'Arquian, qui deviendra gouverneur de Metz, Calais et Gien et prendra le titre de comte de Maligny. Son second fils Henri  recueille Maligny en 1650 et aura de son union avec Françoise de La Châtre, une fille, Marie-Casimir, épouse de Jean Sobieski élu roi de Pologne en 1676. Henri, délaissant Maligny, ira résider près de sa fille à Varsovie. Ses héritiers le revendront en 1746 à Jean-Baptiste-Paulin d'Aguesseau. En 1791, Jacques-Julien Devin, président à la chambre des comptes de Paris, en fait l'acquisition. Des Devin, le château passe en 1817 aux Bastard d'Estang, et ensuite aux du Peyroux qui le posséderont jusqu'en 1929.","architecture":"MALIGNY, Henri, délaissant Maligny, ira résider près de sa fille à Varsovie. Négligé par ses propriétaires, le château de Maligny est dans un état de délabrement complet. Deux ans plus tard, la terre de Maligny est vendue à Alphonse-François de La Tour, abbé de Simiane, maître de l'oratoire du duc d'Orléans, qui fait agrandir et moderniser le château où il réside lorsque ses fonctions ne le retiennent pas à la Cour Selon Quantin en 1868; \"château ancien mais qui a perdu ses principaux caractères. Il se composait en 1626, d'une tour carrée couronnée de mâchicoulis au sommet, de bâtiments construits récemment alors, d'une chapelle et de tours flanquant les murailles. Il reste le donjon et des portions de l'enceinte qui est entourée des fossés en eau. Pierre tombale d'un sire de Maligny au musée d'Auxerre.","habitants":"Antoine de La Grange, seigneur d'Arquian\r\n        \"","divers":"Château de Maligny à Maligny                                                            47° 52' 12\" nord, 3° 45' 42\" est","gps":"","images":["../image/image_89/89_Maligny_1.jpg","../image/image_89/89_Maligny_2.jpg","../image/image_89/89_Maligny_3.jpg","../image/image_89/89_Maligny_4.jpg","../image/image_89/89_Maligny_5.jpg"]},"Consult_chateau_formulaired526":{"id":"Consult_chateau_formulaired526","dept":"89","canton":"Avallon","commune":"Magny","nom":"Marrault","type":"Château","periode":"XVIII","histoire":"MARRAULT,  a été, pendant plus de deux siècles, la plus vaste place forte des Jaucourt. Lorsque Jean de Jaucourt, après la mort de Charles le Téméraire, prit le parti de Marie de Bourgogne contre Louis XI, celui-ci fit démanteler le château, dont les derniers vestiges disparurent presque entièrement au XIXe siècle. Mais Jacques de Ganay, acquéreur du fief en 1716, avait entrepris peu après, la construction du château actuel qui semble avoir été achevé vers 1735, par l'architecte Bruno Calcia. Après la mort de Jacques de Ganay en 1743, Marrault passa, tour à tour, à son cousin Nicolas de Ganay, à J-B Gitton de la Rebellerie, puis à son fils Gitton de Magny qui vendit Marrault à Bertier de Sauvigny. Au XIXe siècle le château de Marrault fut acheté par le docteur Guiard, le savant y séjourna plusieurs fois, notamment en 1885, alors qu'il attendait de connaître les effets de sa première inoculation du vaccin antirabique. Puis l'édifice est devenu la propriété d'une société, et enfin du propriétaire actuel qui l'entretient avec beaucoup de goût et de respect.","architecture":"MARRAULT,du XVIIIe siècle, sur l'emplacement d'une ancienne forteresse démantelée en 1478. Louis Pasteur y effectua plusieurs séjours. Le château est composé de deux niveaux toit  en croupes recouvert de tuile, avant corps d'entrée légèrement saillant sur les deux niveaux avec fronton triangulaire au niveau comble avec deux lucarnes, l'édifice est accolé  à droite et à gauche de deux dépendances d'un niveau , toit en croupes et retour en équerre  sur la gauche.","habitants":"Jacques de Ganay\r\n        \"","divers":"Château de Marrault à Magny                                                                  47° 28' 54\" nord, 3° 58' 41\"  est","gps":"","images":["../image/image_89/89_Marrault_1.jpg","../image/image_89/89_Marrault_2.jpg"]},"Consult_chateau_formulairec97b":{"id":"Consult_chateau_formulairec97b","dept":"89","canton":"Tonnerre","commune":"Cruzy le Chatel","nom":"Maulnes","type":"Forteresse","periode":"XVI","histoire":"MAULNES, en 1565, le Roi érige le duché dUzès, Louise de Clermont et Antoine de Crussol devenant duc et duchesse, ainsi ces nouvelles attributions augmentent leur prestige jusquau comté de Tonnerre, qui navait plus de château.  Château Renaissance édifié entre 1566 et 1573 à la demande d'Antoine de Crussol, duc d'Uzès qui ce dernier décède en 1572.  Louise de Clermont devenue veuve devait séjourner jusqu'à sa mort en 1591; Maulnes passa ensuite à une autre branche des Clermont qui le cède  en 1697 à Anne de Souvré, marquise de Courtanvaux veuve de François-Michel  le Tellier marquis de Louvois qui le revendra en 1834 dernier des Louvois qui aliène Maulnes, acquis en 1960 par la famille Vallery-Radot, Son propriétaire actuel est le conseil général de l'Yonne qui recouvrant une procédure  d'expropriation à acquis l'édifice  depuis 1997 et a fait entreprendre sa restauration sur plusieurs années. En 1993, le château de Maulnes a servi de décors pour le tournage de certaines scènes de La Reine Margot, film de Patrice Chéreau qui relate le mariage d'Henri de Navarre avec Marguerite de France,  puis quelques jours plus tard le massacre de la Saint-Barthélemy, des évènements auxquels le duc et la duchesse d'Uzès ont été intimement mêlés. Le château de Maulnes est classé aux M.H. depuis 1942.","architecture":"MAULNES, c'est un Palais. a l'origine était entouré d'une vaste enceinte bastionnée dont la partie nord était occupée par une basse cour de forme circulaire, bordée  par un ensemble de bâtiment en hémicycle dont ne subsiste plus que la partie droite, au centre  un passage menait  à une galerie à deux niveaux, entouré de douves sèches, de plan Massé  élevé sur cinq étages Il a la forme d'un pentagone. Cest dans ce contexte quen 1566 débute les travaux à Maulnes, lidée et la mise au point du projet étant bien entendu plus anciennes. Les commanditaires désiraient que ce château soit vu de loin et même quil soit spécial et remarquable, et si ce nest par sa taille alors par sa forme. Le château fut achevé en 1573.  La source d'inspiration fut la \"Renaissance Italienne\". Il est élevé  centré autour d'un escalier-puits, très surprenant par son architecture. L'escalier et le puits sont remarquables, tant par leur caractère central qui en font le noyau structurant de lédifice que par leur forme même. Un pont levis, un fossé maçonné et des bastions assuraient sa défense.","habitants":"Antoine de Crussol, duc d'Uzès\r\n        \"","divers":"A Cruzy le Chatel le château de Maulnes                                          47° 53' 24,18\" Nord et 4° 12' 50,76\" Est","gps":"","images":["../image/image_89/89_Maulnes_1.jpg","../image/image_89/89_Maulnes_2.jpg","../image/image_89/89_Maulnes_3.jpg","../image/image_89/89_Maulnes_4.jpg","../image/image_89/89_Maulnes_5.jpg"]},"Consult_chateau_formulaire1533":{"id":"Consult_chateau_formulaire1533","dept":"89","canton":"Avallon","commune":"Sauvigny le Bois","nom":"Montjalin","type":"Château","periode":"XII-XVIII","histoire":"MONTJALIN,  en 1766 la famille de Fresne fait raser le château fort qu'Hérard de Montjalin avait fait bâtir en 1147 et commande la construction du château actuel sur un point culminant de la région, à 310 mètres daltitude.  Monte-Jalen au XIIe siècle, le château actuel, a été reconstruit avant la Révolution par César de Fresne seigneur de Montjalin (1743-1807) époux de Denise Michaud de la Tour, dont les armes d'alliance ornent le fronton. actuellement il abrite un musée, où sont présentées des voitures ayant appartenu à des chefs d'État, vous y verrez des voitures des années 60, mais aussi une superbe exposition retraçant les grands thèmes de la Présidence de John F. Kennedy, ainsi quun espace consacré au supersonique Concorde. Début septembre, dans le parc du château, grande brocante et autojumble,  rassemblée par Olivier Delafon et que celui-ci a dispersé lors d'une vente aux enchères en février 2011.","architecture":"MONTJALIN , appelé originellement Monte-Jalen, il se présente au XIIe siècle sous la forme d'un manoir entouré de douves. Le château actuel, entouré d'un parc boisé, de sobre élégance, s'élève  sur trois étages traduit le style classique des dernières années  du règne de Louis XV. Un fronton triangulaire percé d'une lucarne ronde domine l'avant corps central au pied duquel s'élève l'escalier en fer à cheval desservant la cour d'honneur. A la Révolution, les armes  de César de Fresnes  qui ornent la façade sud sont détruites.","habitants":"César de Fresne \r\n        \"","divers":"A Sauvigny le Bois le château de Montjalin                                       47° 31' 12\" nord, 3° 58' 55\" est","gps":"","images":["../image/image_89/89_Montjalin_1.jpg","../image/image_89/89_Montjalin_2.jpg"]},"Consult_chateau_formulaire7b71":{"id":"Consult_chateau_formulaire7b71","dept":"89","canton":"Chablis","commune":"Montréal-Monthelon","nom":"Montréal_fort","type":"Forteresse","periode":"XVI-XVII","histoire":"MONTREAL-Fort, d'après l'historien Courtépée : On regardait cette forteresse comme la clef de la Bourgogne, du côté de la Champagne, construite avec de belles pierres provenant des carrières de Champ-Retard, à Coutarnoux, elle est défendue par 5 anciennes tours carrées (la tour de la Porte, la tour du Logis, la tour de Beauregard, la tour de la Cigogne et la tour du Roi, car le roi de France François Ier y séjourna). Un fossé large et profond l'entoure. La grande salle a 100 pieds de long sur 36 de large, avec deux cheminées immenses et 4 croisées, ajoute Courtépée, qui a vu les ruines avant la Révolution (c'est-à-dire 33 m sur 12 m).Pour l'historien Victor Petit, les châteaux voisins de Pisy et Thizy, antérieurs eux aussi au XIIIe siècle, donnent une bonne représentation de ce que devait être le château de Montréal. Il ne reste que le puits et remparts comme ultimes vestiges                                                                                            L'ancien château seigneurial appartenait, en 1280, à Henri, bailli de Montréal. En 1374, il fut vendu par Gauthier de Brignard, seigneur de Corsaint, à Huguenin, gruyer de Montréal. Subsistent encore des vestiges d'enceinte de l'époque médiévale. Il est reconstruit au XIVe siècle et appartient alors à Robert de Sermizelles, puis Robert de Monteplain, avant de revenir aux mains du gruyer de Montréal à la fin du siècle. Le château est à nouveau détruit pendant la révolution (1789-1795), avant de servir de ferme à la famille en Denèvre à la fin du XIXe siècle.","architecture":"MONTREAL, l'ouvrage d'entrée, le colombier et l'extrémité nord du bâtiment des communs pourraient dater de la fin du XVIe siècle ou du début du XVIIe siècle. Une grande partie du château a été reconstruite au XVIIe siècle, autour d'une cour fermée. A la fin du XIXe siècle et au XXe siècle, les bâtiments sud et ouest du logis ont été détruits, les autres remaniés et restaurés, certaines parties reconstruites à l'extrémité sud du bâtiment est du logis et des communs et l'intérieur du logis refait lors de l'aménagement en résidence d'artistes. A la fin du XIXe siècle, le château était composé de quatre bâtiments, dont deux ont disparu, autour d'une cour fermée ; l'ouvrage d'entrée, dont le passage est couvert d'une voûte en berceau en anse-de-panier, se situe au centre du bâtiment Est. Le colombier circulaire comprend deux niveaux, le premier couvert d'une coupole irrégulière ; le second, tapissé de trous de boulins en pierre, est également couvert d'une coupole. Le chiffre du roi Henri II (H et deux croissants) sculpté en relief a été remployé, couché, au dessus de la porte (refaite) du colombier. Toit conique en pierre plate sur le colombier, en tuile plate sur les tourelles du logis. Les communs se trouvent à l'est du logis. Depuis la fin du XIXe siècle, les vestiges de l'enceinte médiévale ont presque totalement disparu et notamment les tours circulaires des angles nord-ouest et sud-est. Il ne reste que le soubassement de la tour carrée de l'angle nord-ouest du logis. La chapelle, devenue église collégiale fut restaurée par Eugène Viollet-le-Duc.","habitants":"Seigneur locaux\r\n        \r\n        \"","divers":"A Montréal-Monthelon le château-fort de Montréal                         47° 32' 35\" Nord, 4° 02' 12\" Est","gps":"","images":["../image/image_89/89_Montr%c3%a9al_fort_1.jpg","../image/image_89/89_Montr%c3%a9al_fort_2.jpg","../image/image_89/89_Montr%c3%a9al_fort_3.jpg","../image/image_89/89_Montr%c3%a9al_fort_4.jpg","../image/image_89/89_Montr%c3%a9al_fort_5.jpg","../image/image_89/89_Montr%c3%a9al_fort_6.jpg"]},"Consult_chateau_formulairef03a":{"id":"Consult_chateau_formulairef03a","dept":"89","canton":"Chablis","commune":"Annay-sur-Serein","nom":"Moutot","type":"Château","periode":"XVI","histoire":"MOUTOT, la seigneurie de Moutot est donnée en 1271 par un seigneur de Noyers à son écuyer Hernault de Villelongue. A partir du XVIe siècle, Moutot appartient à la famille du Breuil puis aux Hennequin, seigneurs de Mathan et de Clichy-la-Garenne. En 1639, Anne de Montafier, veuve de Charles de Bourbon-Condé, comte de Soissons, en fait l'acquisition ; trois ans plus tard, il est vendu à Henri de Bourbon, comte de Dunois. Sa fille l'apporte en dot à Charles Philippe Albert de Luynes en 1710. En 1792, leur petit-fils le vend à des négociants en vin de Paris, les Rodot, qui le négligent. En 1852, Moutot se trouve dans un état de délabrement complet. Il est acquis à cette date par Pierre François Constant Grangier qui en entreprend la restauration, non sans lui apporter de multiples altérations et en faisant disparaître les fossés, le bâtiment de la conciergerie ainsi que la chapelle et font place à des parterres de verdure. La ligne de chemin de fer départemental joignant la Roche Migennes à l'Isle sur Serein est construite entre la terrasse du château et la rivière du Serein, défigurant le site.","architecture":"MOUTOT, le château a été transformé en 1852 Actuellement, le château est composé de plusieurs corps de bâtiments juxtaposés appartenant à des époques différentes.  L'accès à la cour se fait par un très beau portail qui date du XVIe siècle Devant la façade antérieure s'étend une cour d'honneur, aménagée en parterre et formant terrasse. Le corps principal, au centre, bâti au XVIIe siècle, comporte un rez-de-chaussée surélevé et un étage ; couvert d'une toiture à croupes percée de lucarnes. A gauche, est accolée une tourelle d'escalier octogonale. A gauche, un pavillon se raccorde au précédent corps de logis. Sa façade principale est flanquée de deux tourelles rondes. Les trois façades de ce pavillon sont percées de baies à meneau et traverse. Le bâtiment de Dunois s'élève sur la droite du bâtiment de Condé, disposé en retour d'équerre sur la cour d'honneur, à deux étages avec des baies à meneau flanqué d'une tourelle ronde sur l'angle.  possède de plusieurs tourelles d'angle. Les encadrements des baies sont moulurés en pierre de taille très soignée. Un ensemble, aujourd'hui, très composite, se substitue à la structure médiévale classique à l'intérieur du logis en raison des modifications de la deuxième partie du XIXe siècle. En 1879, le moulin du château de Moutot fut transformé en cimenterie, dont les bâtiments furent conservés. L'activité de l'usine s'arrêta en 1930.","habitants":"Pierre François Constant Grangier \r\n        \"","divers":"Annay-sur-Serein le château de Moutot                                            47° 43' 04\" Nord, 3° 58' 10\" Est","gps":"","images":["../image/image_89/89_Moutot_1.jpg","../image/image_89/89_Moutot_2.jpg","../image/image_89/89_Moutot_3.jpg","../image/image_89/89_Moutot_4.jpg","../image/image_89/89_Moutot_5.jpg"]},"Consult_chateau_formulaire6426":{"id":"Consult_chateau_formulaire6426","dept":"89","canton":"Toucy","commune":"Mézilles","nom":"Mézilles","type":"Forteresse","periode":"XIV-XVI","histoire":"FORT-MEZILLES,   le château du Fort, sur les hauteurs du village anciennement la Mothe de Nevoy puis le Fort d'Assigny. La chapelle date de 1575  a été construit à l'emplacement d'une ancienne motte féodale arasée dont ne subsistent que les fossés.  Le château et les communs datent du XVIIe siècle, puis modifiés sous la Restauration.  Le château et les communs du XVIIe siècle, furent modifiés sous la Restauration.  Le château du Fort est inscrit partiellement aux M.H. depuis 1996 pour les façades et toitures du château, les communs, le pigeonnier, la chapelle, les douves et l'ancienne motte.   Quand il est arrêté et ses biens confisqués en 1451,  la seigneurie est récupérée par son plus grand persécuteur Antoine de Chabannes, qui met aussi la main sur nombre d'autres seigneuries des environs. Geoffroy Cur, fils de Jacques Cur, récupère Mézilles et onze autres propriétés par lettres patentes de Louis XI du 7 septembre 1463 ; cependant Chabannes revenu en grâce peu après les lui conteste âprement.                                                                                                   le VIEUX CHATEAU, situé dans le centre du village, aurait appartenu à Anne de Beaujeu. Remembré au cours des siècles, il est habité depuis le XIXe siècle par les descendants de la famille Lavollée. Parmi ses dépendances, il compte un ancien pressoir en pierre de taille.","architecture":"MEZILLES, très importants centres de production de fer en bas-fourneaux depuis le second âge du fer et pendant toute l'Antiquité. Du mobilier gaulois et gallo-romain en atteste, découvertes faites dans les nombreux ferriers (amas souvent gigantesques de résidus et scories de fer provenant du traitement du minerai de fer - le ferrier de Tannerre proche est l'un des plus grands d'Europe). Connue au Ve siècle sous le nom de Miciglae ou Miciglis, elle fut donnée par saint Germain, évêque d'Auxerre, au monastère de Saint-Côme, qu'il avait fondé à Auxerre. Siège d'une châtellenie appartenant aux seigneurs de Saint-Fargeau et relevant du château de Montargis, elle est en 1450 la propriété de Jacques Cur.  le château est composé par un corps de logis central rectangulaire à deux niveaux, trois lucarnes en façade sur comble sur un toit  brisé  couvert d'ardoises, reliant deux pavillons rectangulaires dont un est à trois niveaux.","habitants":"seigneur locaux\r\n        \"","divers":"Le château-fort de Mézilles grav-1-2                                          Vieux château grav 3-4     47° 42' 03\" Nord, 3° 11' 39\" Est","gps":"","images":["../image/image_89/89_M%c3%a9zilles_1.jpg","../image/image_89/89_M%c3%a9zilles_2.jpg","../image/image_89/89_M%c3%a9zilles_3.jpg","../image/image_89/89_M%c3%a9zilles_4.jpg"]},"Consult_chateau_formulaire17cb":{"id":"Consult_chateau_formulaire17cb","dept":"89","canton":"Chablis","commune":"Noyers sur Serein","nom":"Noyers_Serein","type":"Vestiges-Forteresse","periode":"XII-XV","histoire":"Château-fort de NOYERS,  la date de fondation du château, construit sur la colline par les sires de Noyers est inconnue, mais il existait au XIe siècle. Après sa mort, Hugues de Noyers, tuteur de son neveu, Mile VII, agrandit le château et le fortifia de 1196 à 1206, en conservant l'enceinte. Hors de l'enceinte de la partie principale de la forteresse, il construisit un palais d'une grande beauté qui complétait la défense de la partie principale de la forteresse. En 1216, Miles, parent et allié à Erard de Brienne qui revendiquait la champagne, soutient dans son château modernisé un siège victorieux de plusieurs mois contre l'armée de Thibaut de Champagne. En 1347, Miles, sires de Noyers, bouteillier de France, confesse que comme il tient de franc aleus le chastel de Noyers. Le bâtiment, cité comme l'un des plus beaux châteaux de France, fut restauré aux XIVe et XVe siècles. Foi et hommage en 1403 par Damoiselle Jehanne de Monestaul, dame d'Arcy, de noble et puissant messeigneurs de Noyers a cause de leur chastel dudit lieu de Noyers. Le 5 janvier 1528, déclaration de foi et hommage au roi de Louis, duc de Longueville, grand chambellan de France, pour la seigneurie de Noyers mouvante de Sens. A la fin du XVIe siècle, le château occupé par le prince de Condé était un des pôles de résistance des Réformés. Il fut pris, en 1568, par Gaspard de Tavannes.                                                                                                       ARCHAMBAULT,  initialement construit vers 1800 comme pavillon de chasse sur le site dune ancienne ferme fortifiée avant dêtre agrandi vers le milieu du XIXe siècle par un certain M. Masson, cuisinier de Napoléon III. Aujourd'hui chambre d'hôtes.","architecture":"Vestiges:  Château fort de NOYERS, A la fin du XIIe siècle, Clarembaud de Noyers entoura d'une solide muraille le château, constitué d'une chapelle et d'un vaste donjon. La ville et le château furent pillés et incendiés en 1569. Le 8 mars 1599, Henri IV ordonna son démantèlement dont subsistèrent des vestiges de murailles et de tours. Le duc de Luynes, seigneur de Noyers, autorisa, en 1785 et 1788, la démolition d'une partie de ces ruines, pour la construction d'un mur le long du Serein. Le premier château était composé d'une chapelle et d'un vaste donjon. Il fut ensuite agrandi et fortifié par une imposante enceinte triangulaire pourvue de dix tours. Il comprenait un colombier, deux chapelles, la chapelle Saint-Georges et la chapelle Notre-Dame de la Vesvre, bâtie à la fin du XVe siècle, des logements pour la garnison, les maisons du capitaine, du bailli, du receveur, une prison, de grands greniers, des granges, des étables, une citerne, etc... Il subsiste les ruines des anciennes tours, notamment la tour du Guetteur, une partie de l'enceinte, les vestiges de deux autres tours et d'un escalier. Chantiers de bénévoles pour permettre au château de sortir peu à peu de l'oubli. Noyers est classé parmi les plus beaux villages de France.                                                              ARCHAMBAULT, le château est remanié, on lui ajoute une tourelle, des fenêtres et une grande cuisine. Laissé durant 20 ans à l'abandon, le château est aujourd'hui une maison d'hôtes accueillante à quelques kms de Noyers-sur-Serein.","habitants":"Hugues de Noyers\r\n        \"","divers":"vestiges et patrimoine dans la ville Noyers sur Serein le château-fort du Noyers   Archambault grav 8-9                                                              47° 41' 51\" nord, 3° 59' 41\" est","gps":"","images":["../image/image_89/89_Noyers_Serein_1.jpg","../image/image_89/89_Noyers_Serein_2.jpg","../image/image_89/89_Noyers_Serein_3.jpg","../image/image_89/89_Noyers_Serein_4.jpg","../image/image_89/89_Noyers_Serein_5.jpg","../image/image_89/89_Noyers_Serein_6.jpg","../image/image_89/89_Noyers_Serein_7.jpg","../image/image_89/89_Noyers_Serein_8.jpg","../image/image_89/89_Noyers_Serein_9.jpg"]},"Consult_chateau_formulaire2a3b":{"id":"Consult_chateau_formulaire2a3b","dept":"89","canton":"Tonnerre","commune":"Nuits Sur Armancon","nom":"Nuits_Armancon","type":"Château","periode":"XVI","histoire":"NUITS, Pierre de Chenu devient en 1533 seigneur de Nuits,  le château construit vers 1560 pour François de Chenu, seigneur de Ravières, il est un exemple de l'architecture Renaissance.  La Gravure d'Israël Silvestre représentant Nuits au XVIIe siècle. De 1689 et jusquà la Révolution française, de 1789, le Domaine de Nuits est devenu la propriété de la Famille de Clugny. Jean Étienne Bernard de Clugny fut le plus connu. Succédant à Turgot, au contrôle général des finances, il fonda la caisse descomptes et la grande loterie royale, ancêtre de la loterie nationale. Le dernier des Clugny, propriétaire de Nuits, passa la fin de sa vie au château, recevant le maréchal dEmpire Davout et le naturaliste Buffon. A la Révolution, le château de Nuits fut vendu comme bien national, acquis par Jacques-Locquin de Tonnerre qui le revend peu après aux sieurs de Bossange er Besson. En 1806, il sera racheté par la marquise de La Guiche, née Jeanne-Marie de Clermont-Montoison, qui y fera apporter de nombreux aménagements. Elle fit dessiner le parc du château à langlaise. Menés au fil des XVIIIe et XIXe siècles. Après le décès terrible de la marquise de La Guiche, qui périt, brûlée vive, en 1822, devant la cheminée de la salle à manger. Les intérieurs historiques du château (18 salles sont ouvertes à la visite) offrent une promenade originale à travers 5 siècles de vie quotidienne de ses occupants successifs : les Clugny, La Guiche, Berthon.  Quelques années plus tard acquis par Louis Berthon dans sa descendance depuis cette famille établie à Paris, mais originaire dAncy-le-Franc.","architecture":"NUITS, corps de logis central  de plan rectangulaire accosté de deux massifs pavillons carrés en saillie, doté d'une façade à pilastres cannelés surmontée d'une toiture pyramidales en ardoise, était protégée autrefois par des douves en eau. Il sert d'habitation. Nuits présente un décor sobre et des volumes rigoureux. Ses caractères défensifs encore nombreux et évidents en font une uvre à part. Son architecture civile s'est adaptée aux nécessités de la défense. Il reste de nombreuses meurtrières. Des traces de tirs dartillerie sont visibles sur les façades, les travaux ont permis de rendre la demeure plus habitable.  Le château subira de graves dommages lors de la seconde guerre mondiale et connut de nombreux pillages. Depuis 20 ans, les intérieurs sont l'objet d'une restauration méticuleuse. Le château de Nuits a été classé aux M.H.en 1967. L'ensemble du domaine, à l'exception des parties déjà classées, a été inscrit par arrêté du 30/09/2013  . Ce château présente un corps de bâtiment principal flanqué sur jardin de deux gros pavillons carrés. Le corps de logis principal comporte sur la façade principale un rez de chaussée surélevé, le terrain étant en pente et un comble à croupe ouvert de lucarnes en pierre, côté jardin le corps de logis principal possède un rez-de-chaussée un étage carré et un comble ouvert de lucarnes. Les pavillons ont une toiture en pavillon avec des lucarnes et comportent deux étages sur soubassement. Les façades du corps de logis et des pavillons sont en pierre de taille. Le château de Nuits est doté de communs aux façades en moellons. L'ensemble des bâtiments est couvert de tuiles plates.","habitants":"François de Chenu Famille de Clugny\r\n        \"","divers":"Nuits Sur Armancon  le château de Nuits                                                            47° 43' 59,01\" Nord et 4° 12' 53,19\" Est","gps":"","images":["../image/image_89/89_Nuits_Armancon_1.jpg","../image/image_89/89_Nuits_Armancon_2.jpg","../image/image_89/89_Nuits_Armancon_3.jpg","../image/image_89/89_Nuits_Armancon_4.jpg"]},"Consult_chateau_formulairec2a2-2":{"id":"Consult_chateau_formulairec2a2-2","dept":"89","canton":"Tonnerre","commune":"Pacy sur Armançon","nom":"Pacy_Armancon","type":"Château-fort","periode":"XIII-XVI","histoire":"PACY SUR ARMANCON, Pacy dépendait de la châtellenie de Tonnerre. Le château-fort occupait lemplacement du bourg actuel où lon peut encore voir des vestiges du mur denceinte et dune porte fortifiée. A la fin du XVIe siècle, Charles de Neufville, marquis de Villeroy, démolit la forteresse médiévale pour faire bâtir à la place un nouveau château constitué de trois corps de logis réunis par des pavillons dangle comme le montre la gravure dIsraël Silvestre \"Vue du château de Passy en Champagne\". Mais sa petite-fille, Anne de Souvré, abandonne le château de Pacy pour celui d'Ancy le Franc après son mariage en 1662 avec François Michel le Tellier de Louvois, ministre de Louis XIV. Au début du XVIIIe siècle plusieurs incendies ne laissent subsister que le pavillon Est avec le corps de logis nord. En 1730, le château de Pacy est vendu à la famille Beau des Lisses qui le conserve jusquen 1845. Ensuite une partie des communs et du parc sont morcelés, notamment pour édifier la mairie et lécole. Le château a été restauré dans les années 1980.","architecture":"PACY se compose de deux bâtiments de plan régulier en L, très remaniés, limitant la cour bordant la Grande-Rue. La façade postérieure ouvre sur une terrasse en pente dominant la vallée de l'Armançon, limitée par un mur de soutènement en bordure. Le bâtiment du fond comprend un étage de soubassement, un rez-de-chaussée et un comble à surcroît. Le bâtiment de droite est composé d'un sous-sol, un rez-de-chaussée, un étage carré et un comble à surcroît ; il est relié aux bâtiments de la mairie-école par un corps de passage à un étage, situé au même alignement. Le passage voûté est percé d'une porte centrale, accostée de deux niches en cul-de-four. Le bâtiment du fond comprend, dans sa partie gauche, une grande salle carrée couverte d'une voûte d'arêtes reposant au centre sur une colonne et, à droite, un couloir couvert d'une voûte assisée en berceau. Le bâtiment de droite comporte, à gauche du corps de passage. Un écu armorié en relief surmonte l'arc du passage voûté, côté cour. Les croisées et baie de la façade postérieure sont encadrées de pilastres et couronnées d'un entablement à frise lisse ou avec triglyphes. Les baies du corps de passage et de la face latérale droite sont à encadrements de bossages troués un-sur-deux. Les toits des deux bâtiments sont à longs pans, avec une croupe sur le bâtiment de droite, et couverts en tuiles plates. Le mur de soutènement de la terrasse des jardins constitue le seul vestige de l'enceinte : haut mur en moellons assistés avec des chaînes d'angle et un cordon régnant en pierre de taille. Des tourelles en surplomb avec des têtes de lions sculptés sous le cul-de-lampe dominent les extrémités ; sa partie supérieure est ruinée.","habitants":"François Michel Le Tellier de Louvois,\r\n        \"","divers":"Château à Pacy sur Armançon                                                               47° 46' 41\" nord, 4° 05' 41\" est","gps":"","images":["../image/image_89/89_Pacy_Armancon_1.jpg","../image/image_89/89_Pacy_Armancon_2.jpg"]},"Consult_chateau_formulaireb6b7":{"id":"Consult_chateau_formulaireb6b7","dept":"89","canton":"Villeneuve-sur-Yonne","commune":"Armeau","nom":"Palteau","type":"Château","periode":"XVII-XIX","histoire":"PALTEAU, situé sur la colline au- dessus d'Armeau le château de Palteau, de style Louis XII possède une aile XVIIe siècle et une autre du XIXe siècle. Le château a vu le masque de fer y séjourner plusieurs jours en 1680 lors de son transfert vers la prison de la Pignerol dans le midi de la France. En effet, Bénigne Dauvergne de Saint-Mars est le châtelain de Palteau. Il est geôlier, son métier consiste à garder des prisonniers prestigieux, comme Nicolas Fouquet, un adversaire du roi Louis XIV. Ses détenus le suivent dans tous ses déplacements et l'homme au masque de fer en fait partie. La chambre appelée aussi salle du coffre est restée dans son décor d'époque. Aujourd'hui la propriété est privée, et a été transformée en un centre équestre et une colonie de vacances pour les enfants et leurs offre un vaste ensemble de jardins, de prés et de bois de plus de 30 hectares. Agrée par le ministère de la jeunesse et des sports, de linspection académique et par la fédération Française déquitation, le poney club reçoit les enfants à loccasion de toutes les vacances scolaires et classes vertes.","architecture":"PALTEAU c'est un Manoir qui date du XIXe siècle. Au Moyen-Age, c'était une forteresse, entourée d'un fossé qui existe encore. Il a abrité l'homme au masque de fer, en 1698, lors de son transfert de la forteresse de Pignerol, à la Bastille. Le château de Palteau actuel date du règne de Louis XVIII. L'aile Ouest a été reconstruite au XIXe siècle. Le parc du château de Palteau a été inscrit au pré-inventaire des Jardins remarquables. C'est devenu un centre de loisirs avec un poney-club.","habitants":"Famille de Saint-Mars\r\n        \"","divers":"A Armeau le château de Palteau;                                                      GPS : 48° 03' 12\" Nord et 3° 20' 37\" Est","gps":"48° 03' 12\" Nord et 3° 20' 37\" Est","images":["../image/image_89/89_Palteau_1.jpg","../image/image_89/89_Palteau_2.jpg","../image/image_89/89_Palteau_3.jpg","../image/image_89/89_Palteau_4.jpg","../image/image_89/89_Palteau_5.jpg","../image/image_89/89_Palteau_6.jpg"]},"Consult_chateau_formulaire3d23":{"id":"Consult_chateau_formulaire3d23","dept":"89","canton":"Chablis","commune":"Angely","nom":"Pancy","type":"Château","periode":"XV","histoire":"PANCY, le château fort  était connu sous le nom de la Grosse Tour de Pancy et appartenait à Jean de Vieilchastel, châtelain de Montréal, Sa fille Odette, épouse de Jean Millot, en hérita. Compromis au moment des luttes entre le parti bourguignon et la couronne de France, les possesseurs du château de Pancy se virent condamnés par lettre du 12 octobre 1448, et leur fief saisi, fut adjugé à Lancelot Le  Robert, serviteur plus docile, ce châtelain est le secrétaire du duc de Bourgogne. En 1472, le château est partagé entre deux familles, et l'entente est bonne. En 1704, Pancy est vendu à Jean Morizot puis à Pierre Auret. En 1793, à la mort de ce dernier, le château fut morcelé, tandis qu'une portion demeurait dans le patrimoine des héritiers, une autre avec la tour, était acquise par Robert Baudenet, d'une vieille famille avallonnaise. Utilisée longtemps comme maison d'habitation des fermiers, la Tour de Pancy a été restaurée avec soin dans les années 1950-1960 par la famille Bidault de l'Isle. Au sud-est de la tour, importants corps de dépendance constitués de trois ailes en u autour d'une cour carrée.","architecture":"PANCY, le bel édifice est constitué dun logis carré à trois étages, flanqué de deux tours rondes dont une à mâchicoulis Victime des luttes pour la couronne de France.\r\nAu temps des luttes entre la couronne de France et les derniers ducs de Bourgogne, le manoir était entouré d'une enceinte fortifiée pourvue de tours de défense.\r\nEn 1793, à la mort de Pierre Aurait, le château fut morcelé. Une portion est demeurée dans le patrimoine des héritiers, l'autre (celle avec la tour) fut acquise par Robert Baudenet, une vieille famille avallonnaise. Si la tour fut longtemps habitée par des fermiers. Le château est aujourd'hui la propriété d'un Parisien.","habitants":"Lancelot Le  Robert\r\n        \"","divers":"A Angely le château de Pancy                                                          47° 33' 56\" nord, 4° 01' 19\" est","gps":"","images":["../image/image_89/89_Pancy_1.jpg","../image/image_89/89_Pancy_2.jpg","../image/image_89/89_Pancy_3.jpg","../image/image_89/89_Pancy_4.jpg"]},"Consult_chateau_formulaire912d-2":{"id":"Consult_chateau_formulaire912d-2","dept":"89","canton":"Villeneuve-sur-Yonne","commune":"Passy","nom":"Passy_Véron","type":"Château","periode":"XVIII","histoire":"PASSY-VERON, la tradition en attribue la construction du château de Passy, à la demande de l'Evêque de Nevers, Paul Spifam, entre 1548 et 1550. Certains éléments des communs du château de Passy datent du XVIIIe siècle.  À la Révolution, le château appartenait au financier Antoine Mégret, comte de Sérilly, qui périt en 1794 sur l'échafaud avec toute sa famille en même temps que Madame Élisabeth, sur de Louis XVI. Seule sa femme, née Anne-Louise de Domangeville, fut épargnée, parce qu'elle se croyait enceinte. Elle se remaria en 1796 avec François de Pange puis avec Anne-Pierre de Montesquiou-Fézensac. Le château abrite un hôpital militaire pendant la première guerre mondiale. Il accueille longtemps dans ses murs une colonie de vacances, avant d'être vendu au début du XXIe siècle comme copropriété d'appartements privés. Les communs ont été réhabilités pour être vendus aussi par lots en appartements les uns à côté des autres. L'ensemble ne se visite pas. Tous les intérieurs, sauf l'escalier d'époque, ont été remaniés. L'édifice est inscrit au titre des M.H. en 1926.","architecture":"PASSY, malgré de profondes transformations exécutées au milieu de notre siècle, le château de Passy demeure par son aspect et son gros oeuvre, tel que les architectes du XVIe siècle l'ont réalisé. Le château de Passy et ses vastes communs occupent un terre plein entouré de douves sèches.     Le château conserve son aspect des XVIe et XVIIe siècles. Il se compose d'un corps principal de plan rectangulaire avec deux ailes en retour d'équerre sur la cour et deux tours rondes sur les fossés. Les longs communs entourent une grande tour carrée. A l'intérieur, aménagements du XXe siècle.    Le château en forme de U, avec un corps de logis à fronton en façade et deux ailes en avancée au levant, est d'architecture classique du XVIIe siècle de style Louis XIII, donnant sur la cour d'honneur, tandis que la façade Ouest donne sur ce qu'il reste de l'ancien parc (et au delà vers l'Yonne), avec une tourelle à l'angle Sud-Ouest. Les communs à droite de la cour d'honneur s'organisent comme un quadrilatère autour d'une vaste cour carrée. On y accède par une porte anciennement à pont-levis au dessus des anciennes douves. Une longue allée bordée d'arbres mène à la cour d'honneur.","habitants":"Famille d' Antoine Mégret\r\n        \"","divers":"Château de  Passy-Véron à Passy                                                      : 48° 06' 38\" Nord, 3° 18' 12\" Est","gps":"","images":["../image/image_89/89_Passy_V%c3%a9ron_1.jpg","../image/image_89/89_Passy_V%c3%a9ron_2.jpg","../image/image_89/89_Passy_V%c3%a9ron_3.jpg","../image/image_89/89_Passy_V%c3%a9ron_4.jpg"]},"Consult_chateau_formulaire099e":{"id":"Consult_chateau_formulaire099e","dept":"89","canton":"Saint-Florentin","commune":"Percey","nom":"Percey","type":"Château","periode":"XVIII","histoire":"PERCEY, une longue avenue bordée de peupliers mène au château construit au XVIIIe siècle, situé dans la haute Bourgogne au bord de l'Armançon avec le Canal de Bourgogne en face. Au XVIIIe siècle, se trouvait au nord, un grand jardin à la française protège par des biefs en eau. Au XIXe siècle le jardin à la française est transformé et divisé en deux, par un bosquet avec rond point et allées et par un bois planté en quinconce. Puis au XXe siècle le parterre Est est modifié, construction d'une fabrique avec terrasse et fontaine, construction du pont dormant.","architecture":"PERCEY, date du du XVIIIe siècle, avec sa galerie d'art. Il possède un parc qui couvre près de quatre hectares et qui est divisé en quatre jardins: l'entrée, le jardin naturel, le jardin romantique et le labyrinthe. Le château de Percey est devenu un Hôtel de qualité.   Le jardin actuel à été dessiné en 2003, selon des plans du XVIIIe siècle autour du château. On pourra y découvrir des buis datant des années vingt et des arbres centenaires. Une collection de bulbes à fleurs, (narcisses, jonquilles, tulipes et allium) et de grands massifs de Rhododendron, Azalée et Hydrangea. Un labyrinthe en ifs est planté en 2005 avec 900 mètres de chemins.  Le château de Percey du XVIIIe siècle, avec galerie d'art possède un parc qui couvre près de quatre hectares et qui est divisé en quatre jardins: l'entrée, le jardin naturel, le jardin romantique et le labyrinthe. Il est privé mais propos
