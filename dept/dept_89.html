"Yrouerre","commune":"Yrouerre","type":"Château","img":"../image/image_89/89_Yrouerre_1.jpg"}];const FULL={"Consult_chateau_formulaireac83":{"id":"Consult_chateau_formulaireac83","dept":"89","canton":"Le Tonnerre","commune":"Ancy le franc","nom":"Ancy_le_Franc","type":"Château","periode":"XVI-XVII","histoire":"ANCY le FRANC,  Charles-Henri de Clermont-Tonnerre, héritier du château, poursuivit les travaux mais apporta quelques modifications, notamment en doublant le nombre des fenêtres.  Le château reçut Henri IV en 1591 et Louis XIII en 1631. Après le décès de Charles-Henri (1640), François de Clermont y reçut Louis XIV. Le château fut acheté en 1683 par François Michel Le Tellier, marquis de Louvois, ministre de Louis XIV, marquis de Courtanvaux et comte de Tonnerre, transforma le parc et les jardins, en 1761, comme l'atteste le recueil de planches aquarellées qu'il fit dessiner à cette occasion, établissant un état des lieux pour les années 1759-1761. Ce recueil indique que le pavillon au milieu du grand étang fut construit en 1761 sur les dessins de Mr Devigny, et conduit de Mr Chauvelot et que le jardin fut planté l'an 1761, en même temps qu'on y créait deux cascades, l'une dite ronde et l'autre carrée. Devigny, auteur des dessins du pavillon de jardin, pourrait être l'architecte Pierre Vigné de Vigny. Après la Révolution, le dernier marquis de Louvois, Auguste, s'employa à faire restaurer le château, notamment les décors intérieurs dont certains furent modifiés. Il fit également combler les fossés, redessiner le parc et réaménager le pavillon de jardin. En 1845, les Clermont-Tonnerre rachetèrent le château de leurs ancêtres : les salles firent l'objet de travaux sous la conduite de l'architecte Henri Parent. En 1940, l'édifice fut transmis à la famille de Mérode. En 1999, après deux ventes et une expropriation, la société Paris  acheta le château et entreprit sa restauration.","architecture":"ANCY le FRANC, le château de plan carré, est constitué de quatre corps de bâtiment de deux étages entourant une cour carrée, et cantonné de pavillons à trois étages carrés. Il est construit en pierre de taille et sa toiture toits à longs pans et toits en pavillon sur les angles est couverture en ardoise. Au rez-de-chaussée se répartissent plusieurs salles décorées de peintures murales : les chambres dans les pavillons; des Césars , chambre de Diane , chambre de Ganymède, la chambre du Zodiaque ainsi que la chambre de l'Aigle et la petite chambre voisine à l'est. Les principales salles du premier étage, également ornées de peintures murales, sont la salle des Gardes, les galeries dites de Médée , de Pharsale et des Sacrifices, la chambre de Judith, la chambre des Arts et la chapelle. Les communs, construits au nord-ouest du château, sont répartis autour de deux cours rectangulaires qui communiquent : la cour dite des écuries ouvre à l'est sur la cour d'honneur et à l'ouest sur la cour de la ferme. Les toits des communs sont couverts de tuiles plates. Un pavillon de jardin s'élève sur l'île aménagée au centre de l'étang.","habitants":"Famile des Clermont-Tonnerre \r\n        \r\n        \"","divers":"Le château d'Ancy le Franc                                                                47° 46' 27\" nord, 4° 09' 42\" est","gps":"","images":["../image/image_89/89_Ancy_le_Franc_1.jpg","../image/image_89/89_Ancy_le_Franc_2.jpg","../image/image_89/89_Ancy_le_Franc_3.jpg","../image/image_89/89_Ancy_le_Franc_4.jpg"]},"Consult_chateau_formulaire8ac3":{"id":"Consult_chateau_formulaire8ac3","dept":"89","canton":"Tonnerre","commune":"Ancy le Franc","nom":"Ancy_le_Franc_Cusy","type":"Château","periode":"XVI","histoire":"CUSY, la seigneurie de Cusy relevait de la châtellenie de Cruzy-le-Châtel. Louis Le Cosquyno, seigneur de Fulvy, possédait la seigneurie de Cusy au XVIIe siècle.","architecture":"CUSY,  le bâtiment principal, en bordure de rue, se compose de trois corps de bâtiment : un corps de passage au centre, de plan rectangulaire allongé, encadré par deux pavillons sur le même alignement. Le corps de passage comprend un rez-de-chaussée, un étage carré et un comble à surcroît. Il est ouvert, en son centre, par le passage permettant l'accès à la cour. La partie médiane et les extrémités latérales de la façade sur rue sont en ressaut vertical avec un entablement à frise nue. Les parties latérales sont percées de fenêtres rectangulaires et de jours jumelés au niveau de l'entablement, entre les consoles supportant la corniche. Le bandeau régnant à hauteur des appuis de fenêtres de l'étage carré se prolonge sur les pavillons latéraux. Les pavillons comprennent un rez-de-chaussée et un étage carré. Celui de gauche est ouvert au rez-de-chaussée par un oculus ovale et à l'étage carré également, ainsi que par une fenêtre rectangulaire. Le pavillon de droite est percé au rez-de-chaussée par une fenêtre en arc segmentaire, récente, et à l'étage carré par une ouverture rectangulaire au même aplomb. Le gros oeuvre est en petits moellons équarris, les chaînes d'angle, les encadrements, l'entablement et le bandeau sont en pierre de taille. Le niveau inférieur des parties en ressaut est en pierre de taille à bossage troué pour les ressauts latéraux, le ressaut central est à bossage à chanfrein. Le plafond du passage est en bois. Le corps central est couvert d'un toit à deux pans en tuile plate et les deux pavillons d'un toit en ardoise et tuile mécanique.","habitants":"Famille de Louis Le Cosquyno\r\n        \"","divers":"Château de Cusy à Ancy le Franc                                                       47° 46' 27\" nord, 4° 09' 42\" est","gps":"","images":["../image/image_89/89_Ancy_le_Franc_Cusy_1.jpg","../image/image_89/89_Ancy_le_Franc_Cusy_2.jpg"]},"Consult_chateau_formulaire3da5":{"id":"Consult_chateau_formulaire3da5","dept":"89","canton":"Tonnerre","commune":"Ancy le libre","nom":"Ancy_le_Libre","type":"Château","periode":"XV-XVI","histoire":"ANCY le LIBRE, citée pour la première fois en 1402, la maison forte dite d'Ancy-le-Serveux a été détruite et reconstruite à plusieurs reprises au cours des XVe et XVIe siècle, jusqu'à sa conquête par le duc de Nevers en 1593. Les bâtiments actuels consistent en un corps de logis bâti au XVIIe siècle, et un colombier portant la date 1672, gravée dans un cartouche, sous la tablette circulaire, à l'aplomb de la porte. L'ensemble est visible sur la rive droite du canal. Les bâtiments principaux de la ferme limitent une cour fermée, en retrait par rapport à la rue. A gauche est situé le logis. En avant et à droite se trouvent les dépendances. Le colombier et d'autres dépendances sont situés dans une prairie de l'autre côté de la rivière qui traverse la propriété. Le logis, de plan rectangulaire, comprend un rez-de-chaussée, un étage carré et un étage de comble. La façade antérieure, très remaniée, est à cinq travées, certaines ouvertures sont bouchées, trois lucarnes à croupe débordante percent la toiture. La façade postérieure est ouverte par quatre fenêtres à l'étage, et trois lucarnes dans le toit. La face droite est aveugle. Une corniche moulurée régnante, située au niveau de l'étage de comble, orne les différentes façades du bâtiment.","architecture":"ANCY le LIBRE, les chaînes d'angle, les encadrements et la corniche sont en pierre de taille. Le toit à croupes à égout retroussé est couvert d'ardoise. Le colombier, de plan circulaire, est à deux niveaux séparés par une tablette circulaire formant perchoir, régnant au niveau de l'appui de la baie du pigeonnier. Au rez-de-chaussée s'ouvre la porte principale rectangulaire et un jour oblong éclairant la partie droite ; à gauche, une porte couverte d'une plate-bande clavée est accostée, et de deux larges baies murées. Le premier étage est percé par trois baies ébrasées couvertes d'une plate-bande. La baie du pigeonnier est couverte d'un arc segmentaire monolithe, à l'aplomb de la porte principale. Le rez-de-chaussée est divisé par un mur de refend dans lequel est inclus un puits bouché. La partie gauche sert de bergerie et est couverte d'un plafond de bois, et la partie droite, d'une voûte assistée en arc segmentaire, à pénétrations. Le premier étage est aménagé en clapier. Le colombier, au deuxième étage, est pourvu de boulins carrés en brique ; l'échelle tournante est brisée. Les étages sont desservis par un escalier tournant à gauche, longeant le mur extérieur. Des tuiles plates couvrent le toit conique à égout de pierres plates.","habitants":"duc de Nevers \r\n        \r\n        \"","divers":"Château d'Ancy le Libre                                                                       47° 48' 05\" nord, 4° 07' 10\" est","gps":"","images":["../image/image_89/89_Ancy_le_Libre_1.jpg","../image/image_89/89_Ancy_le_Libre_2.jpg"]},"Consult_chateau_formulairecd40":{"id":"Consult_chateau_formulairecd40","dept":"89","canton":"Chablis","commune":"Annoux","nom":"Annoux","type":"Château","periode":"XIV-XIX","histoire":"Trois château à  Annoux, celui d'Annoux de Garenne et d'Avout.                                                                                   ANNOUX , la terre d'Annoux aurait appartenu à la maison de Grancey qui la vendit en 1312 à la duchesse Agnès de Bourgogne. En 1329, Annoux était en grande partie entre les mains d'Hugues des Granges, seigneur de Nuits et d'Annoux, époux de Marie de Sancy. Au XVe siècle, la propriété passa à la famille du Fèbvre, puis à celle de Vezon. Au XVIIe siècle, elle entra dans la famille Baudenet par dot, leurs descendants ont longtemps conservé ce château médiéval avant de s'installer dans le château de La Garenne.                                                                                                GARENNE, courant du  XVIIe siècle, les Baudenet s'installèrent dans un nouveau manoir qu'ils firent édifier, le château dit de La Garenne. La principale lignée des Baudenet allaient vivre à Bélombre par mariage, alors le manoir est revenu à Louise Charlotte Baudenet d'Annoux décédée en 1885, épouse du comte de Virieu. Le château étant hérité par des filles passa à d'autres familles en particulier les de Laistre et de Talhouët.                                AVOUT , pas d'information historique.","architecture":"ANNOUX, actuellement il est entretenu par un particulier, se compose d'un logis rectangulaire à pignons avec fenêtres géminées, flanqué d'une tour rectangulaire. Les créneaux sous toiture montrent encore les gonds en pierre des volets. On peut voir une latrine en encorbellement sur la tour. Cette maison forte était tenue par les d'Avoust, famille du maréchal d'Empire.                                           GARENNE Le château de la Garenne a été construit vers 1830. Il est formé d'un corps de logis de plan rectangulaire flanqué de deux tours carrées, aux angles de la façade nord, sur la cour.","habitants":"Annoux;   famille du Fèbvre                                          Garenne; famille Baudenet \r\n        \"","divers":"A Annoux de trois châteaux dont Annoux grav-1, Garenne grav-4-5  et d'Avout grav-2-3.                                                           47° 37' 38\" nord, 4° 03' 05\" est","gps":"","images":["../image/image_89/89_Annoux_1.jpg","../image/image_89/89_Annoux_2.jpg","../image/image_89/89_Annoux_3.jpg","../image/image_89/89_Annoux_4.jpg","../image/image_89/89_Annoux_5.jpg"]},"Consult_chateau_formulairedc5a":{"id":"Consult_chateau_formulairedc5a","dept":"89","canton":"Avallon","commune":"Annéot","nom":"Annéot","type":"Château","periode":"XVIII","histoire":"ANNEOT, c'est au XVIIIe siècle que Charles-François Champion, seigneur d'Annéot,  né le 24 mai 1701 et décédé le 3 mars 1779, issu dune vieille famille avallonnaise, fut marié à Melle Minard de Lautreville en 1729.   Charles-François Champion, seigneur dAnnéot, il fit construire le château au XVIIIe siècle. Il laissa 3 fils, dont Etienne-Louis Champion marié le 19 mars 1768 à Claude-Françoise de Denesvre, fille de Michel-Auguste de Domecy, seigneur de Domecy. La veuve de ce dernier transmit la terre et le château dAnnéot à son neveu, Ernest Guillier de Monts, grand-père de Melle de Noville. Le château est classé partiellement aux M.H. depuis 1983.","architecture":"ANNEOT,  situé en face de l'église. Il s'agit d'un ensemble fort curieux qui depuis cinquante ans au moins, avait beaucoup perdu de sa prestance. Une longue grille, coupée de place en place par des pilastres en pierre de taille, surmontés de vases sculptés, sépare la cour des communs d'une petite cour d'honneur où deux bassins ronds et un bassin rectangulaire lançaient des jets d'eau. Le pavillon central est orné de l'écusson des Champion. Sur le côté sud, des jardins à la française étaient peuplés de statues de pierre. Les hautes murailles étaient décorées de grottes en rocaille encadrées de pierre de taille et surmontées de vases sculptés et de bustes.","habitants":"Famille de Charles-François Champion\r\n        \"","divers":"Château d'Annéot                                                                                 47° 31' 09\" Nord et 3° 52' 58\" Est","gps":"","images":["../image/image_89/89_Ann%c3%a9ot_1.jpg"]},"Consult_chateau_formulairef9d2":{"id":"Consult_chateau_formulairef9d2","dept":"89","canton":"Chablis","commune":"Bierry-les-Belles-Fontaines","nom":"Anstrude","type":"Château","periode":"XVIII","histoire":"ANSTRUDE, au XIVe siècle le jeu des héritages partage la propriété: elle appartient désormais à des femmes qui l'apportent en dot à de petits vassaux de la région qui n'abandonnent pas leur terre pour vivre sur celle de leur épouse. En 1649, Charles de Chargère la Boutière rachète la totalité de la seigneurie de Bierry et la donne à sa fille Françoise qui épouse un écossais, Claude d'Anstruther. Un certain Henri d'Anstruther avait accompagné Saint-Louis en Terre Sainte, mais c'est en 1515 que la famille s'était installée en Bourgogne pour servir dans la garde écossaise de François Ier. En 1695, André François d'Anstruther affranchit les habitants du lieu. Il fut construit, en 1710, par André François d'Anstruther, seigneur d'origine écossaise. Louis XV fit franciser son nom en Anstrude. Sans doute est-ce à lui que l'on doit la construction du château actuel tandis que son fils, François-César, portera le premier le titre de baron d'Anstrude en 1737.","architecture":"ASTRUDE, bâti à Bierry-les-Belles-Fontaines. Il date du XVIIIe siècle. On accède au château d'Anstrude par une porte monumentale, en fer forgé, encadrée par deux pilastres. Se compose d'un corps de logis central avec deux tours rondes coiffées d'ardoises, prolongé de chaque côté par une aile plus basse. Le château a été remanié mais garde les traces de constructions anciennes dont il ne reste plus que deux tourelles rondes. Le bâtiment est relié à l'église voisine, par un passage fermé, qui permettait, au seigneur et à sa suite, d'assister à l'office sans sortir. Le château a été classé aux M.H. depuis 1946.","habitants":"Familles des d'Anstruther\r\n        \"","divers":"Château d'Astrude à Bierry-les-Belles-Fontaines                                             47° 35' 45 Nord et 4° 11' 00\" Est","gps":"","images":["../image/image_89/89_Anstrude_1.jpg","../image/image_89/89_Anstrude_2.jpg"]},"Consult_chateau_formulaire7a0e":{"id":"Consult_chateau_formulaire7a0e","dept":"89","canton":"Chablis","commune":"Noyers sur Serein","nom":"Archambault","type":"Château","periode":"XVIII-XIX","histoire":"ARCHAMBAULT,  le bâtiment actuel a vu le jour comme pavillon de chasse de la famille Davout qui était établie dans le village voisin dAnnoux. Le maréchal dEmpire Louis Nicolas Davout, un temps ministre de la guerre de Napoléon I, est le plus célèbre dentre eux mais rien nindique quil ait fréquenté le château. Le bâtiment a ensuite été racheté par M. Masson, cuisinier de Napoléon III qui a construit laile sud avec sa tourelle et au nord la cuisine et le bureau-office, ainsi quun système hydraulique avec un vivier alimenté par une pompe sur le Serein, et qui a commencé à aménager le parc. A lépoque une grande partie des terres étaient recouvertes de vignes et il est probable que lappellation de château a été donnée pour en faire un domaine viticole.  Lhéritière de M. Masson a épousé un certain M Linget et le château est resté dans la famille jusquen 1995, il  a été racheté par M. Claude Marie qui la entièrement rénové et modernisé et y a établi des chambres dhôtes où il a accueilli de nombreux visiteurs jusquen 2010.","architecture":"ARCHAMBAULT, il se raconte quil aurait existé un passage souterrain reliant la ferme au vieux château fortifié de Noyers qui fut détruit au XVIe siècle par Henri IV. Le pigeonnier qui abrite une ancienne échelle tournante très intéressante est antérieur à la construction du château et faisait  partie des fortifications de la ferme. A été construit au XIXe siècle pour rendez-vous de chasse et rajout d'une tourelle en fait aujourd'hui une demeure de charme, sur le site dune ancienne ferme fortifiée, ses hauts murs denceinte avec meurtrières et le travail des pierres en sont témoins,  Les Allemands lont occupé pendant la seconde guerre mondiale. La réputation du château et le bâtiment lui-même se sont détériorés. Outre la restauration des sols et des portes et fenêtres, la rénovation de linstallation électrique et de la plomberie et lajout de nombreuses salles deau, le principal changement apporté par M. Marie a été de faire ériger par M. Collette, un architecte des monuments historiques vivant dans un château voisin, un magnifique jardin dhiver sur la façade ouest. Le château était vide depuis plusieurs années quand ses propriétaires actuels lont acquis en 2017. En dépit des périodes dabandon, le château dArchambault a conservé de nombreux éléments dorigine dont la plupart des fenêtres et des volets, une partie des planchers et de nombreux plafonds.","habitants":"Famille de  M. Masson\r\n        \"","divers":"a Noyers sur Serein le château d'Archambault.                                              47° 42' 04\" nord, 3° 59' 51\" est","gps":"","images":["../image/image_89/89_Archambault_1.jpg","../image/image_89/89_Archambault_2.jpg"]},"Consult_chateau_formulaire936a":{"id":"Consult_chateau_formulaire936a","dept":"89","canton":"Joux la Ville","commune":"Arcy sur cure","nom":"Arcy_sur_Cure","type":"Château","periode":"XIV-XVI-XIX","histoire":"A Arcy sur Cure  quatre châteaux  dont celui d'Arcy  de Chastenay, de Cobarde..                                                                    ARCY, est très ancien, il apparaît au XIe siècle avec la famille du même nom. Par la suite ce sont les Digogne, au XIVe siècle, qui en deviennent propriétaires. C'est à cette époque que face au château des Digogne, une maison-forte se dresse appartenant à une branche de cette famille. Les Breuillard et les Cullon, qui succèderont aux Digogne à l'issue des guerres du XVe siècle, délaisseront le vieux château d'Arcy, vraisemblablement ruiné, pour s'établir dans cette maison-forte.                                                     CHASTENAY, lactuel manoir du Chastenay doit son édification à Guillaume dAulenay et de Jacques  de Molay.  Ce château est issu du château d'Arcy, issue d'une branche des Digogne au début du XIVe siècle. Dans le courant du XVe siècle ce sont les seigneurs de Chastenay en Bourbonnais qui en deviennent les propriétaires d'où l'appellation \"Château du Chastenay\". Puis ce sont les Loron du Chastenay qui en héritent et le conservèrent jusqu'a la fin du XVIIe siècle. Puis il passe à la famille d'Estutt d'Assay, la comtesse d'Assay achète Tharoisseau en 1767. En 1861, le Chastenay passe par mariage  à la famille berger du Sablon au comte. En 1875 a été édifié, à côté du manoir, un pavillon néo-Renaissance. Presque une ruine en 1966, lorsque le propriétaire Gabriel  Mallard de la Varende le récupère, le château subit une restauration qui débuta en 1972 sous la direction de lassociation des monuments de France.","architecture":"ARCY, au sud de l'église d'Arcy-sur-Cure, entre le fort de Digogne et le château de Chastenay, sur un rebord de plateau boisé dominant la Cure, le château de Vieuxchamps dit la Cobarde, ARCY avait conservé, jusqu'au début du XXe siècle, une enceinte flanquée de tours circulaires. Les bâtiments flanquant cette enceinte sont tombés au cours du XXe siècle, mais on voit encore, au sud du château, quatre tours circulaires de différents gabarits, équipés d'orifice d'artillerie.                                                                                                                                                    COBARDE, maison forte d'Arcy sur Cure de joseph Baudesson de Vieuxchamps est à l'origine une simple maison fortifiée qui abrite les taxes et impôts en nature. Elle devient peu à peu une véritable forteresse possédant une double enceinte et deux pont-levis avec la création de la Seigneurie d'Arcy au XIIe siècle. Démantelé peu avant la Révolution, on peut encore admirer ses ruines.    CHASTENAY, le Val-Sainte-Marie,  Anciennement château du Lys du XIe jusquau milieu du XIVe siècle, lactuel manoir du Chastenay ou château des Lys a été construit, en 1549, sur l'emplacement d'un ancien manoir,  avec des ajouts datant du XVIIIe siècle.  XIIIe, XVe et XIXe siècle. L'édification des parties les plus anciennes encore existantes, dont la Tour Saint-Jean, remonte à l'an 1080 environ. Les façades et toitures du manoir sont classées au titre des M.H. depuis 1971. le manoir est également le théâtre d'opérations supra-normales. Des bruits étranges  s'y font entendre « sorte de borborygmes géants ». On dit que le château est hanté.","habitants":"Famille d'Arcy                                                                                   Chastenay; Famille d'Estutt d'Assay         \r\n        \r\n        \r\n        \"","divers":"A Arcy sur Cure  quatre châteaux  dont celui d'Arcy grav 1-2                                 de Chastenay grav-3-4-5, de Cobarde grav-6- 7-8.                                                                              47° 23' 32\" Nord et 3° 53' 24\" Est","gps":"","images":["../image/image_89/89_Arcy_sur_Cure_1.jpg","../image/image_89/89_Arcy_sur_Cure_2.jpg","../image/image_89/89_Arcy_sur_Cure_3.jpg","../image/image_89/89_Arcy_sur_Cure_4.jpg","../image/image_89/89_Arcy_sur_Cure_5.jpg","../image/image_89/89_Arcy_sur_Cure_6.jpg","../image/image_89/89_Arcy_sur_Cure_7.jpg","../image/image_89/89_Arcy_sur_Cure_8.jpg"]},"Consult_chateau_formulairefe3e":{"id":"Consult_chateau_formulairefe3e","dept":"89","canton":"Charny","commune":"Merry la vallée","nom":"Arthé","type":"Château","periode":"XIV","histoire":"ARTHE, est un château bâti à Merry-la- Vallée,  cette seigneurie, bien que située dans le diocèse de Sens, est un arrière fief de lévêque dAuxerre. Au XIVe siècle, la maison dArthé apparaît parmi les fiefs de la baronnie de Toucy. Cette petite maison forte a probablement été rasée en 1423, au moment du sac de Toucy. Le château actuel aurait été reconstruit à la fin du XVe siècle, comme le laissent supposer les armoiries martelées de Jean Béranger du Gua, au-dessus de la porte. Du fait de ses seigneurs, le château sert de repaire aux huguenots de la région jusquau début du XVIIe siècle. Le château fut remanié ensuite et à plusieurs reprises, en se développant vers le nord. Au-dessus de la porte gothique-flamboyant sculptée, un écusson mutilé se devine : ce serait celui de la famille Béranger-du-Gua.","architecture":"ARTHE,  occupe un point névralgique, situé à cinq kilomètres au nord de Toucy sur le territoire du diocèse de Sens, à la limite de celui dAuxerre. Le château souvre au sud sur une voie romaine, aujourdhui nommée chemin des Romains. Il est perché au rebord dun plateau dont il épouse les déclivités. Il se voit ainsi protégé de manière naturelle sur les côtés sud et est par le dénivelé qui est très escarpé. A louest et au nord, il est enfermé par des fossés remplis deau. Le château nest plus constitué que dun grand bâtiment rectangulaire, flanqué au sud-est dune grosse tour dont la base est large de plusieurs mètres et à lest, face à la cour, dune tour descalier octogonale. Seule la moitié est de cette bâtisse est antérieure au XVIIIe siècle. La grosse tour ronde, qui flanque le château à son angle sud-est, pourrait remonter au XIIIe siècle. Présence de canonnières à la française sur les tours. Certaines ouvertures de tir sont assez arrondies. Quelques-unes sont d'une seule pièce. La bretèche au-dessus de la porte Est, est selon toute vraisemblance une restauration datant du XIXe siècle. Celle-ci se situe au bas de la terrasse, un peu à lécart du lieu-dit, Le champ de la chapelle. Les premiers seigneurs dArthé et leur maison apparaissent au début du XIIIe siècle.","habitants":"famille Beranger-du-Gua\r\n        \"","divers":"A Merry la vallée château d'Arthé:                                      47° 47' 57\" Nord, 3° 19' 58\" Est","gps":"","images":["../image/image_89/89_Arth%c3%a9_1.jpg","../image/image_89/89_Arth%c3%a9_2.jpg","../image/image_89/89_Arth%c3%a9_3.jpg","../image/image_89/89_Arth%c3%a9_4.jpg","../image/image_89/89_Arth%c3%a9_5.jpg"]},"Consult_chateau_formulaire40e0":{"id":"Consult_chateau_formulaire40e0","dept":"89","canton":"Auxerre","commune":"Auxerre","nom":"Auxerre","type":"Patrimoine","periode":"XV-XVIII","histoire":"A Auxerre la tour de l'horloge, l'amphithéâtre, le palais épiscopale, le musée  le château de Montboulon  et des Maréchaux.                                                                            AUXERRE, lamphithéâtre du vieil Auxerre sélève sur un coteau qui réunit les commerces du centre-ville au gré des ruelles tortueuses, des jardins clos et des maisons anciennes serrées les unes contre les autres autour des églises. Implantée près du palais épiscopal, siège de la Préfecture de lYonne, la cathédrale Saint-Etienne, majestueuse, coiffe la colline. A droite, St-Germain. A gauche, St-Pierre. Là-bas, le clocher roman de St-Eusèbe et la fine pointe de la tour de lHorloge. Palais de l'ancien évêché : préfecture de l'Yonne depuis la révolution, il a été construit par François de Dinteville, évêque d'Auxerre au XVIe siècle, mais sa partie Nord est constituée de lancien palais construit par lévêque Hugues de Montaigu vers 1130. Il fut restauré par Viollet-Le-Duc vers 1840, conservant néanmoins presque intacte sa façade extérieure.","architecture":"AUXERRE, l'horloge est placée au-dessus de l'ancienne porte de Paris, dans la rue qui joint la place de l'Hôtel de ville (côté nord-est) à la rue de la Draperie (côté sud-ouest). La tour est accolée au côté sud-est de la poterne, légèrement décalée vers l'ouest.   Appuyée à la tour, une chambre contient le mécanisme de l'horloge. Le cadran se répète des deux côtés de la porte. Chaque cadran est divisé en deux fois 12 sections, avec les heures marquées en chiffres romains de I à XII, et les demies sont indiquées par des losanges.Sous chaque cadran se trouve une inscription. Sur la face sud-ouest.                                                                                         MONTBOULON  se situe à 4 km du centre historique d'Auxerre lieu dit Perrigny. Magnifique propriété du XVIIIe siècle tout en confort et modernité avec une vue panoramique sur la vallée du Baulche.","habitants":"François de Dinteville, évêque d'Auxerre\r\n        \"","divers":"Patrimoine d'Auxerre grav-4  la tour de l'horloge grav-8-9, l'amphithéâtre, le palais épiscopale grav-3, le musée grav -1-2 le château de Montboulon grav-6-7  et des Maréchaux grav-5 .  Porte.                                                                                             47° 47' 55\" nord, 3° 34' 23\" est","gps":"","images":["../image/image_89/89_Auxerre_1.jpg","../image/image_89/89_Auxerre_2.jpg","../image/image_89/89_Auxerre_3.jpg","../image/image_89/89_Auxerre_4.jpg","../image/image_89/89_Auxerre_5.jpg","../image/image_89/89_Auxerre_6.jpg","../image/image_89/89_Auxerre_7.jpg","../image/image_89/89_Auxerre_8.jpg","../image/image_89/89_Auxerre_9.jpg"]},"Consult_chateau_formulaireffec":{"id":"Consult_chateau_formulaireffec","dept":"89","canton":"Auxerre","commune":"Auxerre","nom":"Auxerre_Sparre","type":"Forteresse","periode":"Xv-XVIII","histoire":"SPARRE, Joseph de Sparre, ancien général du régiment royal suédois qui combattit au côté de la France contre lAutriche et lAngleterre, sinstalle à Auxerre en 1767 où il achète un terrain et fait bâtir sa demeure. Il s'agit d'un édifice de style néo-classique, qualifié parfois de \"Petit Trianon Auxerrois\", qui a été édifié, entre 1768 et 1770 sur les plans de larchitecte parisien Philippe Dullin. Sur le léger avant-corps central de lélégante façade  un bel escalier, un fronton triangulaire sur lequel est gravé la date 1769 et un blason sculpté représentant un lion couronné par trois étoiles. Une corniche à modillons et une balustrade portant des pots à feu dissimulent un toit plat.  Le château de Sparre est inscrit aux M.H. depuis le 12/10/1929. C'est un château privé.","architecture":"Palais SYNODAL C'est une propriété de l'État qui a été classée monument historique en 1862 et restaurée par Eugène Viollet-le-Duc. Le palais synodal jouxte la Cathédrale Saint-Étienne de Sens et le palais archiépiscopal (les Musées de Sens). Le Palais synodal est un palais, de style art-gothique. Il date du XIIe siècle. La salle principale, ou salle synodale, de 500 m2 environ et 12 m sous plafond, accueillait les synodes à l'époque où Sens était au-dessus de Paris dans la hiérarchie catholique. De nos jours, le Palais abrite les expositions temporaires des musées de Sens. Chaque été, depuis 2015, les uvres d'artistes contemporains y seront présentées. En 2015, Arnaud Cohen qui bénéficiera dans le même temps d'une exposition rétrospective au sein des collections permanentes, du Musée de Sens. Le palais Synodal est inscrit aux M.H. depuis 1862.","habitants":"Famille Joseph de Sparre\r\n        \"","divers":"A Auxerre le château de  Sparre                                                             47° 47' 47\" Nord 3° 34' 54\" Est                                                                  Palais synodal,   8° 12' 0,27 Nord, 3° 16' 55,37\" Est","gps":"","images":["../image/image_89/89_Auxerre_Sparre_1.jpg","../image/image_89/89_Auxerre_Sparre_2.jpg","../image/image_89/89_Auxerre_Sparre_3.jpg"]},"Consult_chateau_formulaire8f85":{"id":"Consult_chateau_formulaire8f85","dept":"89","canton":"Avallon","commune":"Avallon","nom":"Avallon_89","type":"Palais","periode":"XV","histoire":"Patrimoine d'Avallon  les portes de l'horloge, la tour Beurdelaine, la tour Gauchard le château des Alleux et de Champieu.                                                                         AVALLON, au Xe siècle. Dominant plusieurs vallées, la ville joue un rôle militaire important durant plusieurs siècles. Les premières fortifications de cet éperon rocheux datent des IXe et Xe siècles.  Une des conséquences de l'événement est l'arrivée de quatorze moines de l'ordre des Minimes en 1607. En 1652, avec le soutien d'Anne-Autriche, mère de Louis XIV et reine de France, l'ordre s'oppose à l'arrivée de l'ordre des Franciscains. Le XVIIIe siècle est le temps des embellissements : lhôpital est reconstruit en 1713 par une dotation du président Odebert et lhôtel de ville construit en 1770. En 1791 léglise de Saint-Julien est démolie. En 1790, pendant la Révolution française, le couvent des Minimes est vendu à la ville,  château d'Avallon. De ce qui fut la demeure des ducs de Bourgogne il ne reste rien. lemplacement « englobait les terrains occupés actuellement par le collège et le couvent des Ursulines au nord, le tribunal et la maison de détention à louest, et par les églises de Saint-Lazare et Saint-Pierre à lest. Le côté sud, cest-à-dire celui qui touche à la Petite-Porte pouvait, selon toutes les probabilités, être occupé par le donjon ». Cette forteresse est mentionnée dès le VIIe siècle. Elle est prise par le roi Robert le Pieux au XIe siècle lors de l'attaque de la ville, puis rasée  par  Vauban.  Cette statue en bronze représentant le maréchal de France Sébastien Le Prestre de Vauban est luvre d'Auguste Bartholdi. En effet, le maréchal Vauban est un « enfant du pays » car il est originaire de Saint-Léger-Vauban. Il s'illustre sous le règne de Louis XIV en fortifiant notamment les frontières françaises.","architecture":"AVALLON; en 1005, le roi Robert le Pieux veut reprendre le duché de Bourgogne à Otte-Guillaume : Avallon est assiégée et prise par l'armée royale la même année. Une fois la ville prise, le château est détruit. La ville retombe au duché de Bourgogne en 1032, peu après la mort du roi de France. Au XIIe siècle, la ville se dote de nouveaux remparts. Après la prise de la ville, Philippe le Bon fait reconstruire les remparts, dont la Tour Beurdelaine en 1435 pour en faire un dépôt d'artillerie, en partie abattus par la sape et le bélier des assiégeants. Il fait élever en 1453 une tour carrée au point le plus haut d'Avallon, pour y établir le guet et y placer une horloge, puis en 1455, il modernise les fortifications en faisant équiper les remparts pour l'usage des armes à feu.                                                                      La maison des sires de Domecy, construite par Jean et Antoine de Salins. l'Hôpital, en 1659, le futur établissement  du président Pierre Odebert. Le bâtiment est construit aux frais de la ville entre 1715 et 1728 : il est situé vers lextrémité de la promenade du Grand-Cours. En 1843, le bâtiment sagrandit dun corps de logis pour les hommes du côté ouest. En 1867 nouvelle construction pour les femmes, en parallèle au bâtiment précédent. Tour Beurdelaine est construite en 1404 sur demande de Jean Sans Peur, duc de Bourgogne. Au cours du Moyen Âge, elle porte plusieurs dénominations : tour Beurdelaine, mais aussi tour du Magasin. Puis, elle sert de dépôt d'artillerie après sa rénovation en 1435. L'avant dernière rénovation date de la décennie  en 1860 lui faisant perdre son statut défensif. Sa dernière rénovation commence en février 2019.","habitants":"Anne-Autriche, mère de Louis XIV\r\n        \"","divers":"Patrimoine d'Avallon  les portes de l'horloge grav-1-2-5,                                                          47° 29' 12\" nord, 3° 54' 25\" est   ,                                                        la tour Beurdelaine, grav-1-2, théâtre grav-7 des Alleux grav- 4   de Champieu  grav  -8  Domecy  grav-9       et des rempart grav 3   47° 29' 11\" nord, 3° 54' 26\" est. Remparts 47° 29' 05\" nord, 3° 54' 26\" est","gps":"","images":["../image/image_89/89_Avallon_89_1.jpg","../image/image_89/89_Avallon_89_2.jpg","../image/image_89/89_Avallon_89_3.jpg","../image/image_89/89_Avallon_89_4.jpg","../image/image_89/89_Avallon_89_5.jpg","../image/image_89/89_Avallon_89_6.jpg","../image/image_89/89_Avallon_89_7.jpg","../image/image_89/89_Avallon_89_8.jpg","../image/image_89/89_Avallon_89_9.jpg"]},"Consult_chateau_formulaire8e11":{"id":"Consult_chateau_formulaire8e11","dept":"89","canton":"Vincelles","commune":"Escamps","nom":"Avigneau","type":"Château","periode":"XV-XVII","histoire":"AVIGNEAU, Regnault de Beaumont, d'une branche de la maison de Seignelay, possédait le fief d'Avigneau en 1339. Devenu la propriété de Philippe de Champs-Montreuillon, au début du siècle suivant, il est donné en dot à Marie de Champs, sa petite-fille, quand elle épouse, vers 1540, Guillaume de Chuin. Claude de la Bussière fait entrer le château dans le patrimoine des Chastellux. Après avoir reçu Louis XIV, le 19 avril 1652, Léon de Chastellux, baron d'Avigneau, cède le domaine à sa fille Anne, dame Boucherat de la Rocatelle. Thomas Marie, conseiller du roi, anobli pour son courage durant la Fronde, acquiert la terre d'Avigneau en 1661. En 1823, le baron Alban d'Avigneau meurt sans postérité, c'est Françoise de Bèze qui conserve la propriété jusqu'à sa mort en 1855. Le château fut alors vendu à Charles-Auguste Gillon qui le revendit, le 16 juillet 1890, à Arsène. Jouan, bienfaiteur du musée d'Auxerre, son successeur, précipita la ruine de la demeure que M. Hugues Roux, antiquaire à Paris, réussit à sauver à partir de 1924.","architecture":"AVIGNEAU est une belle résidence qui donna son nom à une famille honorable de l'Auxerrois : datant pour la plupart de l'époque Renaissance, ses bâtiments ont été largement restaurés au XVIIe siècle, au lendemain des guerres civiles. François 1er, Louis XIV, et l'amiral de Coligny y furent reçus. De ses quatre tours d'angle, deux subsistent. L'une garde les traces d'une latrine, l'autre a été convertie en colombier. Le corps de logis est formé d'un bâtiment sous un toit en croupes percé de trois lucarnes à pignon de pierre, fronton triangulaire et fenêtres jumelées. Sur la façade sud au rez-de-chaussée, les deux portes s'ouvrent sous des portiques à fronton triangulaire portés par de simples pilastres. La maçonnerie de pierre contraste avec celle de l'étage, traitée en brique et chaîne de pierre, sous un toit de tuiles profilé à la Mansart. Le corps de logis s'appuie en arrière sur des éléments plus anciens : une tourelle carrée en pierre appareillée, abritant un escalier à vis et une salle couverte d'une voûte d'arêtes à six pénétrations. A l'extrémité du pont qui franchit les douves, conservées de ce côté, la date de 1733 figure au fronton du portail. Le remarquable pavillon isolé à l'arrière marquait l'extrémité d'une aile disparue : de brique et de pierre, il présente sur des jardins sa façade du XVIIIe siècle.","habitants":"Famille de Léon de Chastellux,\r\n        \"","divers":"A Escamps le château d'Avigneau                                                   47° 42' 49,36\" Nord 3° 29' 7,72\" Est","gps":"","images":["../image/image_89/89_Avigneau_1.jpg","../image/image_89/89_Avigneau_2.jpg","../image/image_89/89_Avigneau_3.jpg"]},"Consult_chateau_formulaire7965":{"id":"Consult_chateau_formulaire7965","dept":"89","canton":"Joux la Ville","commune":"Bazarnes","nom":"Bazarnes","type":"Château","periode":"XV-XVIII","histoire":"Trois châteaux dans cet article dont Bouchet, de ste Pallaye et Cravant.                                                                                                        BOUCHET, du XVIIIe ou XIXe siècle a été construit à l'emplacement d'un château plus ancien.  La Seigneurie appartenaient aux Barons de Toucy,  En effet, les recherches récentes de M. Hervé Mouillebouche ont permis la localisation d'un site fortifié à côté du château du Bouchet, peut-être un premier emplacement, vers la tuilerie, fait apparaître un domaine important : un corps de logis donne sur un vaste parc à l'anglaise surplombant la rive gauche du canal. Il est accompagné de vastes communs en L et d'un hameau. Il était également doté d'une tuilerie. Aujourd'hui on accède au corps de logis par une grille en fer forgée flanquée d'un pavillon.                                                                                                                     Ste-PALLAYE,  a un kilomètre au sud  le château a été construit au XVIIIe siécle pour les frères Lacurne. En 1740, le parc à été planté par Polet daprès des dessins de Le Nôtre. Édifice de plan symétrique, composé d'un étage carré et étage de comble, le gros-oeuvre en calcaire, moellon et enduit, élévation à travées, toit à longs pans brisés recouvert de tuiles plates.","architecture":"BOUCHET; de forme rectangulaire, le bâtiment principal est complété par une tour, également rectangulaire, plus haute. L'ensemble bénéficie d'une décoration soignée, avec chaînages d'angle en pierre de taille sur les murs, crêtes de toit et épis de faîtage. La travée centrale de la façade antérieure est traitée comme un avant-corps avec un fronton en demi-cercle orné d'un caducée sur un cuir découpé, lui-même sur fond de feuillage de chêne, des mascarons surmontent les fenêtres. Sur la façade postérieure, une porte centrale à l'encadrement en pierre de taille finement mouluré donne sur un perron où trônent deux statues  se faisant face. Les communs se sont développés, la tuilerie a été transformée en habitation. Aux XIIe et XIIIe siècles, la construction du château du Bouchet date du XIXe siècle.\r\nA Cinq kilomètres au nord le château de CRAVANT,  la construction du donjon de Cravant date de 1304 au XVe siècle.  Il a servi de prison aux chevaliers de l'ordre du Temple. Il a été transformé en habitation au XVIIe siècle. Il est classé aux M.H. le 14.03.1991.","habitants":"Seigneur locaux\r\n        \"","divers":"Trois châteaux dont Bouchet grv-1, de ste Pallaye grav 3 et Cravant grav-2.                                                                         Bouchet 47° 41' 02\" Nord, 3° 41' 30\" Est                                                 Cravant : 47° 41' 02\" Nord, 3° 41' 30\" Est","gps":"","images":["../image/image_89/89_Bazarnes_1.jpg","../image/image_89/89_Bazarnes_2.jpg","../image/image_89/89_Bazarnes_3.jpg"]},"Consult_chateau_formulairecdd2":{"id":"Consult_chateau_formulairecdd2","dept":"89","canton":"Joigny","commune":"Cézy","nom":"Bellerive_Cézy","type":"Château","periode":"XVIII","histoire":"BELLERIVES, château de la belle rive à Cézy ,ils furent les seigneurs de Cézy,  tout à commencé avec  Louis de Noyers, comte de Joigny peut-être  avant avec le rusé Raynard dit le Petit Vieux, celui là même qui avait volé les terres de Joigny au comté de Sens Bureau  de la Rivière  vers 1370, Jacques Coeur Antoine de Chabanne  Perrette bureau de la Rivière Marie de la Roche Guyon, en mars 1474, Adam Cousinot, son fils, Jean Cousinot Louis de Harlay en  1544, Jacques de Harlay, l'ainé des fils de Louis de Harlay, par son droit d'ainesse,  pris le titre de chevalier seigneur de Cézy, et toutes les propriétés en dépendant. Il épouse Anne de la Vernade. Il mourut sans enfant. Louis de Harlay  frère de Jacques, septième fils de Louis de Harlay et de Germaine Coeur, repris le titre de seigneur de Cézy. Il était déjà seigneur de Champvallon.en 1632, Jean de Harlay, fils du précédent lui succède dans ses titres et biens. Sa fille Lucréce de Harlay  épousa en 1638 louis de Courtenay, seigneur de Chévillon , en 1650  Philippe de Harlay en 1730 à la famille Bauffremont par le mariage de Hélène de Courtenay  avec louis de Bauffremont  en 1712. Les Baufremont possèdent le château de Cézy jusqu'en 1804.","architecture":"Bellerives, de style Renaissance, l'édifice se compose de plan en U à deux niveaux  et lucarnes sur combles, tours rondes sur angles intérieur et extérieure, le corps de logis rectangulaire accolés de pavillons rectangulaires  à toits  avec pignon à  fronton triangulaire avec galbes et pinacles également sur lucarnes. Côté parc les ouvertures à arcades sont plein cintre.","habitants":"famille Bauffremont\r\n        \"","divers":"Bellerive-Cezy                                                                                         47° 59' 35\" nord, 3° 20' 24\" est","gps":"","images":["../image/image_89/89_Bellerive_C%c3%a9zy_1.jpg","../image/image_89/89_Bellerive_C%c3%a9zy_2.jpg","../image/image_89/89_Bellerive_C%c3%a9zy_3.jpg"]},"Consult_chateau_formulaire89fb":{"id":"Consult_chateau_formulaire89fb","dept":"89","canton":"Toucy","commune":"Bléneau","nom":"Bléneau","type":"Château","periode":"XIII-XVI-XX","histoire":"Trois châteaux à Bléneau dont Bléneau, Champoulet et la Motte -Jarry pas d'information historique pour Champoulet.                                                                                                                   BLENEAU, la défense du bourg de Bléneau paraît avoir été assurée durant les hautes époques par une fortification de terre appelée la Mothe-Jarry, placée au sud-ouest du village dans une position élevée, sur le rebord du plateau qui domine le Loing. Les sires de Saint-Vérain exercent alors leur autorité sur cette région frontière entre le comté du Gâtinais et lévêché dAuxerre. On leur attribue, au XIIIe siècle la construction en bordure du bourg dun premier château de plan quadrangulaire entouré de deux enceintes de fossés alimentés par le Loing tout proche. En 1328, les courtenay, issus de Louis VI le Gros, entrent par alliance en possession de Bléneau. Les nouveaux seigneurs sont des hommes de guerre, Jean 1er est à Poitiers et prend part avec Du Guesclin à la conquête de la Guyenne. Son frère Pierre, qui lui succède, combat à Rosbecque. Un court moment, le château de Bléneau tombe au pouvoir dArnaud de Cervoles, dit \"lArchiprêtre\", chef de Grandes Compagnies au service de Jean le Bon, puis à celui du comte de Nevers. Il reviendra aux Courtenay avant la fin du XIVe siècle.","architecture":"BLENEAU, cest  François Ier de Courtenay, seigneur de Bléneau à partir de 1511, qui fit rebâtir le château sur un plan identique à lancien, doté d'une tour à chaque angle, mais en donnant sans doute à la construction un caractère conforme au goût de lépoque. En 1655, Bléneau passe aux Courtenay, seigneurs de Chevillon, qui en conservèrent la seigneurie jusquen 1771. Cest à ces derniers quil faut attribuer la construction de laile ouest. Au nombre des propriétaires du château se succédèrent après 1771, il convient de mentionner lagronome et poète Rougier de la Bergerie, qui siègera à lAssemblée législative et qui sera le premier préfet du département de lYonne de 1800 à 1813, et Alexandre Dethou, député de lYonne de 1876 à 1892, qui morcela le parc. Le château a cependant conservé son aspect du XVIe siècle avec ses fenêtres à meneaux.                                               château de la MOTTE-JARRY du XVIIe-XXe siècles, basse-cour carrée, propriété privée, pas d'historique sur plan architecture magnifique château, un corps de logis rectangulaire à deux niveaux sur soubassements , série de lucarnes sur comble à toit brisés accolé à un pavillon rectangulaire de trois niveaux toit à l'impérial, avant corps d'entrée dans une tour ronde à toit en poivrière et une autre tour ronde côté parc.                                                       CHAMPOULET de plan rectangulaire à trois niveaux  avec série de lucarnes sur combles à toit très pentu accolé à deux pavillons rectangulaires aux extrémités également  accolés de tours carrés à angles extérieurs arrondies.","habitants":"Seigneurs locaux\r\n        \"","divers":"Bléneau grav-1-2, Champoulet grav-6    garniers grav 7    et la Motte-Jarry grav 3-4 5 à Bleneau:                                                                     47° 41' 52\" Nord, 2° 57' 03\" Est","gps":"","images":["../image/image_89/89_Bl%c3%a9neau_1.jpg","../image/image_89/89_Bl%c3%a9neau_2.jpg","../image/image_89/89_Bl%c3%a9neau_3.jpg","../image/image_89/89_Bl%c3%a9neau_4.jpg","../image/image_89/89_Bl%c3%a9neau_5.jpg","../image/image_89/89_Bl%c3%a9neau_6.jpg","../image/image_89/89_Bl%c3%a9neau_7.jpg"]},"Consult_chateau_formulairecef7":{"id":"Consult_chateau_formulairecef7","dept":"89","canton":"St-Valérien","commune":"Nailly","nom":"Bois_le_Roi","type":"Château","periode":"XV-XVI","histoire":"BOIS le ROI, lagrément des archevêques de Sens, seigneurs de la baronnie de Nailly, au XVIe siècle appartenait à la famille Dissier. érigé en fief le 29 août 1633, le domaine rural que possédait la famille sénonaise des Couste. Jean Baptiste Couste, messager de lambassadeur du roi de France auprès du Grand Turc à Constantinople fit construire ce château et obtient son érection en fief. Au XVII édification du corps de  logis  principal, au début du XVIIIe siècle le domaine passe à Jacques le Rahier ancien capitaine de Cavalerie qui le cède en 1718 à une vieille famille sénonaise les Colmesnil  qui vont entreprendre divers travaux, corps de loigis, façade, un avant corps à trois travées sommé d'un fronton  sans décor que perce un oculus, apparait le style  Louis XV. En 1792 acquisition du domaine  par la famille Tarbé de Vauxclairs originaire de Sens ces derniers font combler les fossées et en 1929 la famille Lemerle devient propriétaire avec l'aide de Paul Gélis architecte des M.H..le domaine toujours dans la famille des Lemerle.","architecture":"BOIS LE ROI appelé aussi le château de Nailly est un château bâti à Nailly. Il est de style Louis XIII.  Il prit les apparences dun manoir fortifié avec tours et fossés. Cependant il ne comportait pas autant de régularité dans son élévation et cest au XVIIIe siècle que fut édifiée laile centrale reliant les deux tourelles dangle, donnant à lensemble beaucoup délégance et dharmonie. Cette aile centrale, face au parc, est longue de quarante mètres. Elle relie deux tourelles dune époque plus ancienne; elle est formée de plusieurs travées se dessinant sur leur soubassement depuis les douves sèches entourant le château. Cest un bâtiment construit sur un plan rectangulaire irrégulier qui comporte deux niveaux sous un toit de tuiles mansardé.  Il possède une architecture bourguignonne typique, avec un pigeonnier remarquable.  Aux quatre angles, une tour du XVe siècle et trois tourelles. Des fossés entourent le bâtiment. La façade Est, percée dune tour porche (ancien pont-levis), relie le bâtiment nord à lancienne tour du XVe siècle transformée en colombier en 1636 après lanoblissement par Louis XIII de Jean Baptiste Couste. Le pigeonnier est dans un état remarquable avec ses 1200 boulins, son échelle tournante, et sa charpente en coeur de chêne de 400 ans dâge.","habitants":"Famille Dissier                                                                               Famille Tarbé de Vauxclairs \r\n        \"","divers":"Château de Bois le Roi ;                                                                   48° 13' 13,19\" Nord et 3° 13' 9,96\" Est","gps":"","images":["../image/image_89/89_Bois_le_Roi_1.jpg","../image/image_89/89_Bois_le_Roi_2.jpg","../image/image_89/89_Bois_le_Roi_3.jpg"]},"Consult_chateau_formulaire2ce8":{"id":"Consult_chateau_formulaire2ce8","dept":"89","canton":"Charny","commune":"Les Ormes","nom":"Bontin","type":"Château","periode":"XVII","histoire":"BONTIN, au début du XVIe siècle Louis de Courtenay fait aveu pour sa maison seigneuriale de Bontin qui se compose alors de trois corps de logis munis de tourelles et entourés de fossés. Le 24 décembre 1540, François de Courtenay, écuyer, devient seigneur de Courtenay à la mort de Louis de Courtenay. C'est là que furent unis par mariage, le 4 octobre 1583, Anne de Courtenay et Maximilien de Béthune, qui deviendra par la suite le très célèbre ministre de Henri IV: Sully.  Le château fut reconstruit à la fin du XVIIe siècle et la façade antérieure refaite vers 1820. Monsieur de la Prée nouvel acquéreur, était un soldat auquel sa bravoure valut le grade de maréchal des camps et armées du roi Louis XIV qu'il servit pendant trente ans. Il fit entreprendre et presque achever l'actuel château, ne laissant à compléter qu'une partie de la façade sur le parc. Après M. de la Prée, le château passa à sa fille qui apporta le domaine en mariage à Gislain de La Bontin, qui prit le titre de baron et le transmit à ses descendants qui possèdent encore le château.                                                                                                            Autres château de BONTIN à Aillant sur Thollon à cinq kilomètres à L'ouest, viticole, construit dans le même style avec tours carrées sur cour.","architecture":"BONTIN, il est fièrement implanté sur un vaste plateau qui domine la Vallée du Vrin. Le Château de Bontin fut reconstruit à la fin du XVIIe siècle. La façade antérieure a été refaite en 1820. Les cheminées sculptées sur des modèles de David Bertrand, sculpteur de l'équipe des Coustou.  Lactuelle demeure se compose dun élégant corps de bâtiment bâti de briques, remontant à la fin du XVIIe siècle. Ce bâtiment est installé sur une plate-forme rectangulaire très allongée entourée de fossés en eau. Les communs semblent dater de la même époque. On constate sur le cadastre que la plate-forme, qui porte le château de Bontin, se compose de deux parties distinctes. Lune, immédiatement devant le château, au nord-ouest, est rectangulaire et semble correspondre à la plate-forme initiale. Elle devait porter la première demeure. La partie sud-est provient sans doute dun aménagement moderne construit en même temps que le château actuel de brique. Notons enfin que ce fief aurait relevé en partie de la châtellenie de Chevillon et du comté de Joigny.","habitants":"François de Courtenay\r\n        \"","divers":"Au Ormes le château de Bontin;                                                        7° 50' 50,42\" Nord et 3° 14' 46,77\" Est","gps":"","images":["../image/image_89/89_Bontin_1.jpg","../image/image_89/89_Bontin_2.jpg"]},"Consult_chateau_formulaireddc7":{"id":"Consult_chateau_formulaireddc7","dept":"89","canton":"Toucy","commune":"Treigny en Puissaye","nom":"Boutissaint","type":"Château","periode":"XVI","histoire":"BOUTISSAINT, au XVe siècle elle n'est plus qu'un prieuré, et au XVIe siècle un simple bénéfice. Pendant la Révolution, l'église de Boutissaint sert d'entrepôt pour les cendres d'une verrerie fonctionnant alors dans les environs. En 1827 la terre de Boutissaint est vendue à Armande Pauline Marie de Castellane-Majastre, veuve de Louis Pierre Quentin de Champcenetz et épouse de Jacques Marie Anatole. Le Clerc de Juigné, pair de France, le château date du XVIe siècle. Une annexe du château a été transformée en gîte de France. A côté du château de Boutissaint se trouve la source appelée la fontaine de Sainte-Langueur. Il fait partie actuellement de la gestion du patrimoine naturel. L'étang a complètement disparu en seulement quelques mois. La propriétaire et directrice du parc Mme Valérie Galabert, fille du créateur du parc Mr Pierre-Elie Borione, a entrepris de lever les fonds nécessaires pour reconstruire la digue et restaurer l'étang, point d'eau nécessaire aux animaux du parc. Le château de Boutissaint est entouré d'un parc de 400 ha ou vivent 500 animaux en liberté et quelques uns dans un enclos. Les animaux sont visibles aux visiteurs, déambulant sous leurs yeux, dans une immense prairie. On y voit : des bisons d'Europe, des cerfs, des sangliers, des daims, des chevreuils, des mouflons de corse, des biches, et plusieurs animaux de la ferme qui gambadent dans une vaste forêt.","architecture":"BOUTISSAINT, de style maison forte le corps de logis en équerre à deux niveaux avec tours rondes sur angles extèrieures  et sur angle intérieur et une troisième en prolongement de dépendances mais d'un niveau inférieur, toit de l'édifice assez haut et les tours en poivrière l'ensemble recouvert de tuiles.  Est situé dans un parc qui a conservé le caractère sauvage des forêts de Puisaye. Les promeneurs pourront les voir évoluer dans une vaste prairie à découvert, proche de l'étang du château, où les animaux se regroupent s'offrant à la vue du public. Véritable musée vivant de la forêt le parc naturel de Boutissaint propose la découverte de la faune qui peuplait autrefois nos contrées: Le corps de logis principal, l'escalier la charpente et les tours datent du XVe - XVIe siècle de plan rectangulaire à deux niveaux, haut toit en tuiles, une échauguette sur la tour afin de la défendre.","habitants":"Armande Pauline Marie de Castellane-Majastre                                  Mr Pierre-Elie Borione\r\n        \"","divers":"A Treigny en Puissaye le châteu de Boutissaint :                                                    47° 34' 46,04\" Nord, 3° 07' 26,55\" Est","gps":"","images":["../image/image_89/89_Boutissaint_1.jpg","../image/image_89/89_Boutissaint_2.jpg","../image/image_89/89_Boutissaint_3.jpg","../image/image_89/89_Boutissaint_4.jpg"]},"Consult_chateau_formulairecf48":{"id":"Consult_chateau_formulairecf48","dept":"89","canton":"Brienon-sur-Armançon","commune":"Brienon sur Amançon","nom":"Brienon","type":"Château","periode":"XVIII","histoire":"BRIENON, le château a été toujours un bâtiment privé, sauf un an, en 1791. Il fut dabord la résidence brienonnaise de larchevêque, en très mauvais état en 1426. Cest le cardinal Louis de Bourbon Vendôme qui la fait reconstruire en 1536.  Le projet dy faire une caserne est abandonné en 1792, il est alors acquis par la famille Ferrand; puis dimportants embellissements lui sont apportés par Vulfran Verrollot, marchand de bois et maire qui le possédera jusquen 1868. Cest la famille Normand, en 1869 qui lui a donné son aspect actuel.","architecture":"BRIENON,  lenceinte moyenâgeuse peut être suivie en empruntant le boulevard circulaire, ses vestiges peuvent se devinés,   les trois portes Est, Nord, Sud ont complètement disparu au début du XIXe siècle, remplacées un temps par des pilastres, la promenade à lEst plantée de tilleuls.\r\nUne inscription latine gravée dans une pierre scellée à proximité de la porte Nord date de 1582 et témoigne des guerres de religion. Aujourdhui la salle des mariages se trouve au premier étage et au second, un théâtre. Les proportions harmonieuses de lensemble, son fronton, ses lignes et sa rénovation achevée début 2009, en font un bâtiment qui illumine la place.  Au cours de ces 2 siècles, il a connu de nombreuses transformations. De grands travaux étaient décidés en août 1829, pour son achèvement,  sa toiture qui venait dêtre endommagée par un violent orage était refaite en ardoise,  il était décidé de faire dans le grand grenier, une nouvelle salle, un théâtre. Les trois niveaux seront encore lobjet de rénovations importantes en 1848. Au fil des années la distribution des différentes salles a varié et depuis une trentaine dannées, les services municipaux se sont installés de lautre côté de la rue, seule la salle des mariages et des conseils municipaux demeure dans le bâtiment «maison commune».","habitants":"Famille Ferrand\r\n        \"","divers":"A  Brienon sur Amançon le château  de Brienon.                                                            47° 59' 33\" nord, 3° 37' 07\" est","gps":"","images":["../image/image_89/89_Brienon_1.jpg","../image/image_89/89_Brienon_2.jpg","../image/image_89/89_Brienon_3.jpg"]},"Consult_chateau_formulaire4c9e":{"id":"Consult_chateau_formulaire4c9e","dept":"89","canton":"Chablis","commune":"Béru","nom":"Béru","type":"Château","periode":"XVI","histoire":"BERU, cette demeure a été construite au XIIIe siècle et appartenait aux comtes de Béru depuis 1627, toujours propriétaires de ce domaine. Le château a connu des modifications à la Renaissance et au XVIIIe siècle. On peut y voir un rare cadran solaire et lunaire du XVIe siècle, une porte et sa tour du XIIIe siècle, un colombier avec 1500 cases du XIIIe siècle et des chais du XVIe siècle.  Le château a connu des modifications à la Renaissance et au XVIIIe siècle.  Athénaïs à repris le vignoble familial que sa famille  le possédait depuis plus de 400 ans","architecture":"BERU . C'est un château fort. La construction date du XVIe, XVIIe et XVIIIe siècles. Le château a été reconstruit après l'incendie de 1646. C'est un ensemble de bâtiments ordonnés autour d'une vaste cour carrée. A l'étage, de part et d'autre d'une fenêtre rectangulaire, se trouvent les traces de 2 cadrans solaires et lunaires rares avec des inscriptions latines. Le château est placé au fond de la cour, et les communs de part et d'autre de la cour fermée. Des alignements de plantations sont encore lisibles selon le dessin de 1728. Les toits du château et des communs possèdent de rares lucarnes en pierre à motif ajouré stylisé d'aigles bicéphales. A l'extérieur de l'enceinte, s'élève une maison médiévale qui était probablement celle des gardes du château. Le château a été inscrit aux M.H. en 2001. \r\nAu sud de Béru Manoir de Pouilly sur Serein transformé en hôtel par monsieur Moreau.","habitants":"Comtes de Béru\r\n        \"","divers":"Le château de Béru,                                                                             47° 48' 04\" Nord, 3° 53' 16\" Est","gps":"","images":["../image/image_89/89_B%c3%a9ru_1.jpg","../image/image_89/89_B%c3%a9ru_2.jpg","../image/image_89/89_B%c3%a9ru_3.jpg","../image/image_89/89_B%c3%a9ru_4.jpg","../image/image_89/89_B%c3%a9ru_5.jpg"]},"Consult_chateau_formulaired956":{"id":"Consult_chateau_formulaired956","dept":"89","canton":"Chablis","commune":"Chablis","nom":"Chablis","type":"Château","periode":"XV-XVI-XVII","histoire":"CHABLIS, plusieurs châteaux à Chablis. BERU, LAROCHE, MILLY, PERCEY (voir article), SERIGNY (voir article).                                                                                  CHABLIS, en 1274, le rattachement de la Champagne à la France fait rentrer l'avouerie de Chablis sous suzeraineté royale. À partir de cette époque, deux justices sont exercées tour à tour (celle du prévôt de Saint-Martin de Tours et celle des officiers des sires de Noyers). En 1358, lors de la guerre de Cent ans, les Anglais pillent Chablis et d'autres villes de l'Yonne (dont Auxerre), ce qui oblige le duc de Bourgogne, Philippe Ier de Bourgogne, à signer le traité de Brétigny en 1360 -1460. En 1403, le bourg est entouré d'une enceinte (trois portes et vingt-neuf tours). Les faubourgs (incluant l'église Saint-Pierre et le prieuré de Saint-Cosme) sont eux aussi protégés par une muraille. En 1425, la ville fortifiée. En 1478, les Lerouge établissent à Chablis la cinquième imprimerie de France.En 1568, les huguenots prennent et incendient Chablis. De 1887 à 1951, Chablis accueille une station de chemin de fer départemental « Le Tacot ».  Le 1er janvier 1973, les communes de Fyé, Milly et Poinchy sont rattachées à celle de Chablis sous le régime de la fusion simple.                                                                                                         En patrimoine la porte Noël et dit porte st Pierre.","architecture":"VIVIERS  la construction du château du Viviers date du XVIIe siècle, au milieu du vignoble de Chablis. Le vin du château du Viviers fut servi au mariage du roi Louis XV et de Marie Leczinska et a obtenu plusieurs médailles d'or ou d'argent, lors des manifestations viticoles. Contemporain du magnifique château d'Ancy-le-Franc, non loin de là, il est probable que le seigneur suzerain de celui-ci ait fait édifier celui du Viviers, d'un plan plus sobre, plus au goût français, par égard pour l'un des Mousquetaires gris de la Reynes (Anne d'Autriche), gris, parce qu'ils montaient des chevaux gris, en remerciement d'importants services rendus. Le château du Viviers a été inscrit partiellement aux M.H. depuis 1984 pour ses façades et sa toiture.                                                                                             BERU, cette demeure a été construite au XIIIe siècle et appartient aux comtes de Béru depuis 1627, toujours propriétaires de ce domaine.   Le château a connu des modifications à la Renaissance et au XVIIIe siècle.\r\nOn peut y voir un rare cadran solaire et lunaire du XVIe siècle, une porte et sa tour du  XIIIe siècle, un colombier avec 1500 cases du  XIIIe siècle.                                                                         MiLLY du XVIIIe siècle plus maison forte que château corps de logis d'un niveau entre deux pavillons carrés.","habitants":"Seigneurs locaux\r\n        \"","divers":"plusieurs châteaux à Chablis. Béru grav-5 , Laroche grav-2, Milly grav-4, et Viviers grav-6 -7,    Chablis  grav-8                                            Chablis obediencerie grav-3                                                         . 47°48'58.28\"N, 3°48'1.25\"E. 47° 48' 58\" nord, 3° 48' 01\" est","gps":"","images":["../image/image_89/89_Chablis_1.jpg","../image/image_89/89_Chablis_2.jpg","../image/image_89/89_Chablis_3.jpg","../image/image_89/89_Chablis_4.jpg","../image/image_89/89_Chablis_5.jpg","../image/image_89/89_Chablis_6.jpg","../image/image_89/89_Chablis_7.jpg","../image/image_89/89_Chablis_8.jpg"]},"Consult_chateau_formulairec711":{"id":"Consult_chateau_formulairec711","dept":"89","canton":"Toucy","commune":"Champcevrais","nom":"Champcevrais","type":"Château-fort","periode":"XVI","histoire":"Trois châteaux dans cet article Châtres, Prie et Bouron.            CHATRES, c'est au moment de son mariage avec Charlotte de la Rivière que Jean de Giverlay possède le fief de Châtres, en 1441 il rend hommage au roi. Sept générations de Giverlay s'y succéderont jusqu'à la mise en vente sur Jean Louis de Giverlay le 13 décembre 1679. Le fief est acquis par Antoine Sadoc un marchand enrichi au service de Louvois. Les Sadoc conservent Châtres jusqu'à sa vente vers 1740, à Joseph d'Aldart, capitaine au régiment de la Reine et à Anne Françoise de Picot de Combreux, son épouse. La maison d'Aldart, originaire d'Ecosse et dont les armoiries accolées à celles des Picot sont sculptées sur les façades du château, ne va pas demeurer longtemps à Châtres qui échoit à Anne Elisabeth d'Aldart mariée à Louis de Machault. Durant la Révolution, Louis de Machault, colonel au régiment de la Reine, qui a succédé à ses parents, part pour l'émigration. Le 19 décembre 1794, le château est vendu comme bien national au citoyen Antoine Tronquet puis aux XIXe siècle aux Daubru, aux Espivent de la Villeboinest. Après avoir appartenu à la mort de Tronquet aux de Rochebouit, le domaine, laissé entre les mains des régisseurs, était à l'abandon. Acquis par M. Fernand Ducatte, le château fut restauré et n'a pas cessé, depuis près d'un siècle, d'appartenir à ses descendants qui l'entretiennent avec le plus grand soin.                      BOURRON, établissement public local social et médico-social est en activité depuis 42 ans. établie à Champcevrais, elle est spécialisée dans le secteur d'activité de l'hébergement médicalisé pour personnes âgées.","architecture":"BOURON,  corps de logis rectangulaire à deux niveaux avec série de lucarnes sur comble, toit en croupe accolé aux extrémités de pavillon rectangulaire à l'entrée de la cour deux pavillons d'un niveau.                                                                                                                        CHATRES, Idem que le château de Bouron les pavillons en retour d'équerres à toit brisés et tour rondes sur façade opposées avec fronton triangulaire, est un château fort date du XVIIe siècle. Les façades et les toitures du château et des communs, les douves, le parc et ses éléments se composent de 2 bassins et du pavillon de la chapelle. Ils sont inscrits aux M.H. le 16/09/1985. Son étang du même nom, de 6 hectares, est alimenté par l'Aveyron et touche la limite de commune du Charme, C'est un château privé, fermé au public.                                                                                                        PRIE  Il aurait été construit au XIIe siècle, pour un membre cadet de la Maison de Prie. Entre les remaniements au cours des temps et la restauration du XVIIe siècle, il ne reste plus grand-chose de l'ensemble originel.  Le château de Prix est un bâtiment de plan carré, en briques formant des losanges, occupant quinze ares de superficie, construit au XVe siècle, composé d'un rez-de-chaussée et d'un étage. Au premier, une vaste cheminée ayant sur son manteau un écusson supporté par deux hommes des bois mutilés; tours rondes crénelées, mais en ruine.","habitants":"Famille de Antoine Sadoc \r\n        \"","divers":"Trois châteaux  à champcerais; Châtres grav4-5, Prie grav 6  et Bouron  grav 1-2-3.                                                                      Chatres 47° 44' 47\" Nord, 2° 57' 30\" Est                                                       Prix  47° 44' 48,26\" Nord, 2° 56' 39,49\" Est","gps":"","images":["../image/image_89/89_Champcevrais_1.jpg","../image/image_89/89_Champcevrais_2.jpg","../image/image_89/89_Champcevrais_3.jpg","../image/image_89/89_Champcevrais_4.jpg","../image/image_89/89_Champcevrais_5.jpg","../image/image_89/89_Champcevrais_6.jpg"]},"Consult_chateau_formulaire7ff8":{"id":"Consult_chateau_formulaire7ff8","dept":"89","canton":"Toucy","commune":"Champignelles","nom":"Champignelles","type":"Château","periode":"XVII","histoire":"Quatre châteaux à Champingnelles; Asnière, Crouzilles, Lordereau et Parc-Vieil                                                                                                      ASNIERE, CROUZILLES, LORDEREAU  PARC-VIEIL pas d'information historique pour ses quatres derniers.                                                                                                   PARC-VIEIL, la seigneurie de Champignelles, fief des Courtenay, rendue célèbre par le mariage dElisabeth avec Pierre de France, 6ème fils de Louis VI le Gros, dut prendre le nom et les armes des Courtenay suite à la négociation du Roi avec Renaud de Courtenay. Cette  famille illustre protégea Champignelles, et pendant sept siècles lAbbaye Cistercienne de Fontainejean, à quelques kilomètres, qui fut livrée à la démolition après la révolution de 1789. Le manoir du Parc Viel a été construit sur les murs de lancien manoir appelé le Parc au XIIIe Siècle.","architecture":"ASNIERE, corps de logis rectangulaire d'un niveau sur soubassement accolé à un pavillon de deux niveaux toit haut en croupe.                                                                                                  CROUZILLES, corps de logis rectangulaire à deux niveaux , toit en croupe avec deux lucarnes et fronton triangulaire  central.                                                                             LORDEREAU, corps de logis central d'un niveau entre deux pavillons intermédiaire les pavillons de deux niveaux en retour d'équerre, côté parc une tour carrée et une ronde à l'opposé. Parc viel, bâtisse en équerre à un niveau, toit en croupe.","habitants":"Parc-Vieil; Famille de Courtenay\r\n        \"","divers":"Quatre châteaux à Champingnelles; Asnière grav-1-2, Crouzilles grav-3-4, Lordereau  grav -5-6  et parc Vieil-grav-7.     47° 47' 08\" nord, 3° 03' 41\" est","gps":"","images":["../image/image_89/89_Champignelles_1.jpg","../image/image_89/89_Champignelles_2.jpg","../image/image_89/89_Champignelles_3.jpg","../image/image_89/89_Champignelles_4.jpg","../image/image_89/89_Champignelles_5.jpg","../image/image_89/89_Champignelles_6.jpg","../image/image_89/89_Champignelles_7.jpg"]},"Consult_chateau_formulaire4fc0":{"id":"Consult_chateau_formulaire4fc0","dept":"89","canton":"Charny","commune":"Charny","nom":"Charny_Yonne","type":"Château","periode":"XVI","histoire":"A  Charny trois châteaux dans cet article; Fontenouilles , Hautefeuille et l'hôtel de Ville  (ancien château Jacot).                                                                                                         CHARNY et environ. En 1583, Sully, premier ministre de Henri IV, épouse Anne de Courtenay qui lui amène le château de Bontin entre Sommecaise et Les Ormes, distant de 13 km. Il apporte quelque renouveau à Charny et sa région. Mais arrivent la fin du XVIe siècle et les guerres de religion; de nouveau Charny, comme bien d'autres à l'époque, connaît une halte dans son développement.  La fille de Marie Henriette de Bourbon Montpensier et de Gaston de France est Anne-Marie-Louise d'Orléans (1627-1693), duchesse de Montpensier et de Saint Fargeau, la « Grande Mademoiselle ». Exilée à Saint-Fargeau par son cousin Louis XIV pour cause de Fronde, elle donne Charny à son demi-frère illégitime Louis d'Orléans en 1653 ; mais elle change d'avis par la suite et en 1661 elle vend Charny à Charles Martin de Crèvecour, seigneur de Prunoy. C'est donc cette année-là que la châtellerie de Charny est détachée du comté de « Saint-Fargeau et des pays de Puisaye ». En 1688 Germain Texier (Famille Texier d'Hautefeuille), seigneur de Hautefeuille et de Malicorne, achète Charny. Il vendit au détail le château, qui était en piteux état. Malgré une longue dispute avec la famille de Chabanne, les Texier d'Hautefeuille furent les seigneurs de Charny jusqu'à la Révolution.","architecture":"FONTENOUILLES, château de la Gruerie En 1535, Fontenouilles appartenait aux Célestins de Sens, co-seigneurs avec les barons de Châtillon-sur-Loing (maintenant Châtillon-Coligny).                                                                             HAUTEFEUILLE, Étienne Texier d'Hautefeuille, chevalier de l'ordre de Saint-Jean de Jérusalem (1633), bailli de l'Ordre (1669), prieur d'Aquitaine (1691) à sa mort et ambassadeur extraordinaire de l'Ordre auprès de Sa Majesté. Parallèlement, capitaine de la compagnie écossaise des gendarmes du Roi, capitaine et gouverneur des ville et château du Mont-Saint-Michel, lieutenant général des armées du roi (1677) et abbé commanditaire de l'Abbaye du Mont-Saint-Michel de 1670 à 1702, décédé à Paris le 3 mai 1702 ; Françoise Texier d'Hautefeuille, mariée en 1665 au marquis de Crèvecur, maréchal de camps et armée du roi, gouverneur et bailli de Montargis, seigneur de Prunoy.\r\nEn 1812, le domaine de Hautefeuille est acheté par Antoine-Jean Séguier, premier président de la cour d'appel de Paris. C'est à lui qu'on doit la décoration intérieure de l'église.\r\nLe château de Hautefeuille a été détruit dans les années 1970 par la ville de Nanterre qui l'avait acquit pour y installer sa colonie de vacances.","habitants":"Charny; Charles Martin de Crèvecour                                        Étienne Texier d'Hautefeuille,\r\n        \"","divers":"A  Charny trois châteaux Fontenouilles gruerie grav-2-3 , Hautefeuille grav-5-6  Rochrebois grav-4 et l'hôtel de Ville grav 1.                                                                                                      Charny   47° 53' 25\" nord, 3° 02' 49\" est","gps":"","images":["../image/image_89/89_Charny_Yonne_1.jpg","../image/image_89/89_Charny_Yonne_2.jpg","../image/image_89/89_Charny_Yonne_3.jpg","../image/image_89/89_Charny_Yonne_4.jpg","../image/image_89/89_Charny_Yonne_5.jpg","../image/image_89/89_Charny_Yonne_6.jpg"]},"Consult_chateau_formulaire4c3b":{"id":"Consult_chateau_formulaire4c3b","dept":"89","canton":"Avallon","commune":"Chastellux sur cure","nom":"Chastellux","type":"Forteresse","periode":"XV","histoire":"CHASTELLUX, les ducs de Chastellux étaient les plus puissants seigneurs du Morvan et leurs terres, avec le château de Bazoches, s'étendaient jusqu'à Anost. Dès 1116, une assemblée de barons et d'évêques se tenait à Chastellux. Répondant à l'appel de Saint Bernard à Vézelay en 1146, Artaud de Chastellux suivait le Roi Louis VII Le Jeune en Terre Sainte. Le plus illustre de ces seigneurs fut Claude de Beauvoir, sire de Chastellux, Maréchal de France en 1418, la bataille de Cravant est un de ses faits darmes qui l'avaient rendu indispensable aux ducs de Bourgogne, Philippe le Bon et Jean sans Peur. Propriété de la famille de Chastellux depuis 1000 ans,. La chapelle du château de Chastellux se situe au premier étage d'une tour construite par Claude de Beauvoir en 1414 et restaurée en 1824, son propriétaire, le comte Philippe de Chastellux ou par un membre de sa famille. Le château, exceptée la tour classée, est inscrit aux M.H.. La tour Saint-Jean est classée depuis le 10/11/1979. En cours de restauration suite à un incendie qui la partiellement endommagé.","architecture":"CHASTELLUX , le bâtiment connaît un épisode tragique le 30 mai 1975, un incendie se déclare dans un conduit de cheminée et met le feu à la toiture et aux greniers, la tour dAmboise en porte encore la trace comme en témoigne labsence de toit.  le château présente encore des éléments défensifs: murailles, tour à canon et échauguette. La cour du château est triangulaire, resserrée par des constructions irrégulières auxquelles se rattachent six tours. La tour Saint-Jean, du XIe siècle, est détachée du château et fut édifiée pour le protéger                                                                                                 RIVIERE maison forte, daterait du XVe siècle, constituée d'une tour défensive et d'un corps de logis. Elle pourrait être un ouvrage défensif avancé du château de Chastellux, situé sur l'autre rive de la Cure, et le versant opposé. Le corps de logis médiéval fut agrandi par un bâtiment accolée au XVIIe siècle, peut-être pour loger des soldats. Aujourd'hui la tour a conservé son aspect médiéval, avec une bretèche au-dessus de la porte d'accès, des archères, et son toit conique en tuiles plates. Il y aurait eu peut être un léger remaniement au XVIe siècle. On peut lire les agrandissements successifs de l'ensemble de la propriété. A l'intérieur de la tour, un escalier à vis en bois, dessert des ouvertures sur les deux niveaux du corps de logis. A deux niveaux, deux ouvertures murées et superposées (dont une avec un linteau de bois cintré donnent sur lextérieur du corps de logis), et une deuxième avec linteau de granite donne accès à une grande salle sous comble avec bretèche. Le rez-de-chaussée du logis comporte une très grande cheminée.","habitants":"comte Philippe de Chastellux \r\n        \"","divers":"Chastellux sur Cure  grav de 1 à 7  et Rivière grav-8                                       47° 23' 32\" Nord et 3° 53' 24 Est","gps":"","images":["../image/image_89/89_Chastellux_1.jpg","../image/image_89/89_Chastellux_2.jpg","../image/image_89/89_Chastellux_3.jpg","../image/image_89/89_Chastellux_4.jpg","../image/image_89/89_Chastellux_5.jpg","../image/image_89/89_Chastellux_6.jpg","../image/image_89/89_Chastellux_7.jpg","../image/image_89/89_Chastellux_8.jpg"]},"Consult_chateau_formulaire709d":{"id":"Consult_chateau_formulaire709d","dept":"89","canton":"Pont-sur-Yonne","commune":"Chaumont sur Yonne","nom":"Chaumont_Yonne","type":"Château","periode":"XVI","histoire":"CHAUMONT, vers 1160, c'est Guillaume II des Barres qui, en épousant en secondes noces Hélissende, Vicomtesse de Sens, Dame de Chaumont, fille de Salon, fit de Chaumont la terre seigneuriale des des Barres. Guillaume III des Barres, le grand Guillaume, celui qui illustra la famille, ne paraît pas être né à Chaumont comme on l'a souvent prétendu, mais y avoir été élevé très jeune, y avoir vécu un certain temps et avoir ainsi mérité dans ses exploits d'être nommé Guillaume de Chaumont. Chaumont restera ainsi la propriété des \"des Barres\" jusqu'en 1450 : Claude des Barres, dame de Chaumont, apporte en mariage la seigneurie de Chaumont qui n'avait eu jusqu'alors que des \"des Barres\" comme titulaires, à Denis de Buffévent, qui meurt en 1520,  en 1613 Henri de Bourbon, Prince de Condés et en 1818 le Comte Cazin d'Honnuncthon, lieutenant des chasses du Roi Charles X. En 1854, le Marquis Aymard de la Tour du Pin. En 1890, la propriété passe à Pierre Emile Chevalier, ingénieur de l'école des Mines de Saint Etienne, il restaura le pavillon, la tourelle en même temps qu'il construisit l'orangerie, la famille en restera propriétaire jusqu'en 1940. Le château de Chaumont était le siège de la seigneurie de Chaumont depuis le XIIIe siècle. Jean II des Barres, était Chevalier, seigneur de Chaumont et maréchal de France. Le château de Chaumont est devenu un hôtel de charme.","architecture":"CHAUMONT,  primitivement, le château était situé dans la Garenne du côté de Villeblevin. Quelques vestiges ça et là en font foi. D'après un vieux document, le château ancien existait encore au XVIe siècle. Le château actuel, sans avoir la majesté d'un château féodal ni l'élégance d'un château renaissance, s'impose quand même par la masse de ses constructions. De la terrasse, la vue est superbe et l'on peut découvrir les vallées de l'Yonne et de la Seine. La partie la plus ancienne fut habitée par les Condé. Les deux ailes de la façade sont à admirer par leur régularité. L'une d'elle ouvre sur les anciens communs qui, suivant un plan de 1754, constituaient la ferme. La belle grille d'entrée en fer forgé est remarquable et constitue à elle seule une belle pièce du XVIIIe siècle.","habitants":"Famille des Barres\r\n        \"","divers":"Château de Chaumont sur Yonne                                                     : 48° 19' 29\" Nord 3° 06' 16\" Est","gps":"","images":["../image/image_89
