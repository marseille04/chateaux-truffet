aujourd'hui. Mettre avec chateau de St-Martin d'Ordon à dix kilomètres à   l'ouest pas d'information historique pour ce dernier et de Cudot.","habitants":"ST-Julien:  capitaine Louis Jean-Baptiste Cornebize                             Vauguillain; Dr Bernard Chérest                                                Cudot; famille Saint-Phalle \r\n        \r\n        \"","divers":"Trois châteaux St-Julien de Sault grav-6-7 dont celui de St-Julien de Cudot grav 4-5 et de Vauguillain grav 1-2                                                         48° 01' 38\" N, 3° 17' 41\" E","gps":"","images":["../image/image_89/89_St_Julien_de_Sault_1.jpg","../image/image_89/89_St_Julien_de_Sault_2.jpg","../image/image_89/89_St_Julien_de_Sault_3.jpg","../image/image_89/89_St_Julien_de_Sault_4.jpg","../image/image_89/89_St_Julien_de_Sault_5.jpg","../image/image_89/89_St_Julien_de_Sault_6.jpg","../image/image_89/89_St_Julien_de_Sault_7.jpg"]},"Consult_chateau_formulaire0ffe":{"id":"Consult_chateau_formulaire0ffe","dept":"89","canton":"Charny","commune":"Saint-Maurice de Thizouaille","nom":"ST_Maurice_Thizouaille","type":"Château","periode":"XIV","histoire":"St-MAURICE de THIZOUEAILLE, les comtes de Joigny édifièrent dès 1110 une forteresse contrôlant les passages vers l'Auxerrois. Terre relevant du comté de Champagne, la seigneurie de Saint-Maurice passa, après divers conflits, dans la mouvance auxerroise à la fin du XIIe siècle. Au moment de la Guerre de Cent Ans, le château était la propriété de Jeanne d'Artois, en 1378, celle de Bureau de La Rivière qui le fit reconstruire. Passé ensuite aux La Trémoille, il fut pris ensuite par Perrinet Gressard, puis par Jean de Poilly, dit Fortépices, qui fut inhumé dans l'église de Saint-Maurice Thizouaille en 1439. La châtellenie fut vendue en 1446 aux Blosset originaires de Blosseville en Normandie. Le bien échut ensuite aux Montagny puis aux Bernage. Le château joua un rôle important au début de la guerre de Cent Ans, à la bordure des pays de Puisaye et de l'Auxerrois. Il servit de refuge à certains seigneurs français et il fut assiégé à plusieurs reprises. En 1512, don par Louis XII au seigneur de Bommiers: \"du chastel et chastellenye, terre et seigneurie de Saint-Morise, tenu et mouvant de nous à cause de notre chastel de Montargis.","architecture":"St-Maurice de THIZOUEAILLE, vendu comme bien national, le château fut entièrement démoli et reconstruit à l'intérieur de l'enceinte fortifiée qui n'avait pas été atteinte. A la place de l'ancien logis seigneurial, aujourd'hui se dresse une grosse demeure datant du XIXe siècle. Du château, il reste la porte d'entrée fortifiée, flanquée de deux tours rondes et une seule des sept tours qui jalonnaient le tracé de l'enceinte. L'ancien moulin banal est situé au nord du château. Sur un plan dressé par Paul Dejus, conservé à la bibliothèque d'Auxerre, on voit la motte entourée d'un fossé, garnie d'une porte à pont-levis, protégée de trois tours. On y verrait aussi une tour dite La Bohême, sur les remparts, où l'on aurait rendu foi et hommage. Sans préciser quand, Le cadastre permet de percevoir l'importance des douves, larges marécages isolant le château et difficilement franchissables.","habitants":"seigneur de Bommiers:\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Château de  Saint-Maurice de Thizouaille                                       47° 49' 59\" N, 3° 21' 50\" E","gps":"","images":["../image/image_89/89_ST_Maurice_Thizouaille_1.jpg","../image/image_89/89_ST_Maurice_Thizouaille_2.jpg"]},"Consult_chateau_formulaire5b4e":{"id":"Consult_chateau_formulaire5b4e","dept":"89","canton":"Joux la Ville","commune":"St_Moré","nom":"St_Moré","type":"Château","periode":"XVII","histoire":"SAINT-MORE,  un château existait à Saint-Moré dès 1463, bâti entre l'église et la rivière de Cure sur un clos ayant autrefois appartenu à l'abbaye de Molesme, puis à celle de Vézelay. A cette époque, Hugues de Saint-Aubin, fils d'Eglantine du Bouchet, prenait le titre de seigneur du lieu. Durant les guerres religieuses, Saint-Moré appartint à la famille d'Aulnay, puis passa par mariage, à la fin du XVIe siècle, aux Veilhan, comme leurs prédécesseurs seigneurs d'Arcy-sur-Cure. C'est à cette époque que fut élevé l'actuel château. Des bourgeois d'Avallon, les Gaillard, étaient en possession de la propriété dès 1722. Les Lefèbvre, une autre famille notable de Vermenton, leur succédèrent peu avant la Révolution. Ils conservèrent le château jusqu'au XXe siècle.","architecture":"Sur la rive gauche de la cure, petit château modernisé, entouré d'eau, flanqué de quatre tours rondes à toits aigus. Quelques meurtrières y sont pratiquées.","habitants":"famille d'Aulnay\r\n        \"","divers":"Château de saint Moré                                                                        47° 34' 37\" nord, 3° 46' 35\" est","gps":"","images":["../image/image_89/89_St_Mor%c3%a9_1.jpg"]},"Consult_chateau_formulaire4b6e":{"id":"Consult_chateau_formulaire4b6e","dept":"89","canton":"Vincelles","commune":"St_Sauveur en Puisaye","nom":"St_Sauveur_Puisaye","type":"Château","periode":"XII-XX","histoire":"A St-Sauveur  château de la Goutte de l'Orme du Pont  et le château de St-Sauveur avec la tour Sarrazine.                                                                                                                       ST-SAUVEUR EN PUISAYE, le premier château  a été construit dans la première moitié du XIIe siècle, il est mentionné en 1161. En 1600, la châtellenie est vendu à François d'Agès, gentilhomme de la Chambre du Roi et époux de la dame des Barres. Ce propriétaire a entrepris des travaux d'agrandissements qu'il n'a pas pu achevé à cause de son décès en 1618. La famille de Nigot en est devenu acquéreur et a poursuivi les travaux en 1687. Le fief est resté dans cette famille pendant un siècle, pour allé dans les mains des Vathaire de Guerchy en 1798, pour aller ensuite aux Gandrille qui, en 1879  l'ont légués à un syndicat de communes. Le château de Saint Sauveur est transformé, au XXe siècle, en maison de retraite : \" Résidence Gandrille en Bel Air \". Depuis 1995, il abrite le musée consacré à Colette, réalisé grâce à Monsieur Foulques de Jouvenel, Monsieur Bertrand de Jouvenel ainsi que ses enfants Anne et Hugues de Jouvenel.","architecture":"TOUR SARRAZINE, à ST-Sauveur en Puisaye,   première mention en 1161 lors d'un accord entre Guillaume III, comte de Nevers et l'abbé de Saint-Germain: \"le comte et son fils renoncent aux droits qu'ils réclament sur quatre femmes de Diges. Ils cèdent des droits de sauvegarde sur certaines maisons situées dans l'enceinte du village. Dans le château de Saint-Sauveur le prieur aura 2/3 de la justice et le comte l'autre tiers. Les archives concernant ce donjon sont rares et peu documentées. Certains historiens le datent entre le XIe et le XIIIe siècle, sans quaucune étude nait été menée. La maçonnerie en grès ferrugineux, liée dun mortier de chaux, montée en joints larges et avec des pierres de chant et le type de mise en uvre, laissent supposer que lédifice date du Xe-XIe siècle. Les traces doutils sur les blocs de calcaire, la présence dun système de poutres ceinturant lédifice dans la maçonnerie, le plomb qui scelle les gonds des portes et fenêtres et surtout le plan plus ou moins ovoïdale, conduisent à lhypothèse dune tour du XIIe siècle.","habitants":"famille de Nigot\r\n        \r\n        \"","divers":"A st Sauveur  chateau de la Goutte grav 2-3  de l'Orme du Pont grav 1  et le château de St-Sauveur avec la tour sarrazine grav - 4                                                                                      47° 37' 09\" nord, 3° 11' 52\" est","gps":"","images":["../image/image_89/89_St_Sauveur_Puisaye_1.jpg","../image/image_89/89_St_Sauveur_Puisaye_2.jpg","../image/image_89/89_St_Sauveur_Puisaye_3.jpg","../image/image_89/89_St_Sauveur_Puisaye_4.jpg"]},"Consult_chateau_formulaireccfb":{"id":"Consult_chateau_formulaireccfb","dept":"89","canton":"Vincelles","commune":"Sainte-Colombe","nom":"Ste_Colombe_Yonne","type":"Château","periode":"XVI-XVII","histoire":"MOUTOMBLE, la commune de Sainte-Colombe est constituée du bourg et de trois hameaux : Moutomble, la Cour et Origny. A voir au hameau de Moutomble, ce château du XVIe siècle et également l'orme de Sully situé à l'entrée de la propriété. Le château possède un étage carré avec escalier demi-hors-oeuvre. Le gros-oeuvre en pierre et revêtement, toit en pavillon ; croupe ; toit à longs pans recouverts de tuile plate.","architecture":"ORIGNY, vestige du  fief d'Origny et son château seigneurial appartenaient à la famille de Sainte-Maure au XVIe siècle. De cette époque subsistent la façade postérieure du corps de logis et le colombier qui porte gravé 1550 sur un linteau. Une partie des communs fut construite au XVIIe siècle. La façade antérieure du logis et une autre partie des communs datent du XVIIIe siècle,  à  un étage carré et étage de comble.\r\nescalier dans-oeuvre  tournant. toit en pavillon ; croupe ; toit à longs pans. Couvert en ardoise et  tuile plate.","habitants":"famille de Sainte-Maure\r\n        \r\n        \"","divers":"A Sainte-Colombe château de Moutomble et Origny                       47° 34' 02\" nord, 3° 58' 12\" est","gps":"","images":["../image/image_89/89_Ste_Colombe_Yonne_1.jpg","../image/image_89/89_Ste_Colombe_Yonne_2.jpg","../image/image_89/89_Ste_Colombe_Yonne_3.jpg"]},"Consult_chateau_formulaire5451":{"id":"Consult_chateau_formulaire5451","dept":"89","canton":"Sens","commune":"La Belliole","nom":"Séréville","type":"Manoir","periode":"XIX","histoire":"SEREVILLE, à une heure au sud de Paris, construit en 1820 par le chef de la famille Chapelain, fait Baron de Séréville par Louis XVIII, ce manoir vous accueille au milieu de sa forêt de 50 hectares.  M. de Sereville, lieutenant de louveterie en 1878.\r\nLa jeune soprano lyrique Eva Ganizate y est décédée le 4 janvier 2014, à l'âge de 28 ans.   Aujourd'hui chambres d'hôtes","architecture":"SEREVILLE, manoir de style Directoire dans un parc de 6 ha d'arbres centenaires, avec 2 étangs, au sein d'une forêt privée de 40 ha. Cours d'eau traversant toute le propriété. Ancienne ferme avec animaux.","habitants":"famille Chapelain,\r\n        \"","divers":"Séréville  48° 08' 50\" nord, 3° 05' 28\" est","gps":"","images":["../image/image_89/89_S%c3%a9r%c3%a9ville_1.jpg","../image/image_89/89_S%c3%a9r%c3%a9ville_2.jpg","../image/image_89/89_S%c3%a9r%c3%a9ville_3.jpg"]},"Consult_chateau_formulaire3bd6":{"id":"Consult_chateau_formulaire3bd6","dept":"89","canton":"Tonnerre","commune":"Tanlay","nom":"Tanlay","type":"palais, Forteresse","periode":"XIV","histoire":"TANLAY, style Renaissance, entouré de douves, bâti sur les fondations dune ancienne forteresse. Première mention du château de Tanlay en 1222, lorsque Guillaume de Courtenay et Adeline, du consentement de leur fils Robert de Courtenay, . Vers 1380, Monseigneur de Tanlay tient en fief de Monseigneur de Noyers le château de Tanlay. En 1461, il appartient à Amey de Tanlay. En 1533, le château passe à Louise de Montmorency, veuve du Maréchal Gaspard de Coligny et sur du connétable Anne de Montmorency. Son jeune fils, François de Coligny, seigneur dAndelot, en 1559 François d'Andelot  le reçoit de sa mère.  entreprit la construction du grand château de 1550 à 1568.  jusquaux guerres de religion (saint Barthélemy 1572)  En effet, lamiral de Coligny avait lhabitude de réunir au château les chefs de la ligue protestante. Anne de Coligny épouse en 1574 le marquis de Mirabeau, lieutenant du roi poursuit la construction.   De la Renaissance française datent la tour Coligny et la tour de la Ligue et le petit château (1610), commencé par François de Coligny et terminé par son gendre, Jacques Chabot, Marquis de Mirebeau. Mme Hurey ou Mme Belnot,  le grand château fut achevé vers le milieu du XVIIe siècle. Son propriétaire, Michel Particelli, seigneur dHemery, surintendant des finances, fit appel à larchitecte Pierre Le Muet. Fin XVIIe siècle, Jean Thevenin, gouverneur de Saint Denis, est fait marquis de Tanlay en 1705 par Louis XIV, acquiert le château, depuis, il appartient à cette famille qui l'a orné intérieurement au XVIIIe siècle. Le comte de la Chauvinière, actuel propriétaire est le fils de l'ambassadeur Edouard de La Chauvinière et de Marguerite de Tanlay.","architecture":"TANLAY,  darchitecture, tels que les pyramides sur le pont daccès, le mur entourant la cour verte, la galerie des Césars, le Nymphée, sont imprégnées du goût italien. C'est l'un des plus beaux châteaux de la Renaissance Française, en Bourgogne. Il fut légué en 1533 à Louis de Montmorency, de Gaspard de Coligny, pour ses enfants. Son fils, François de Coligny entreprit la construction du grand puis du petit château, sur les ruines de l'ancien chateau fort, et réalisa ce bel ensemble que constituent le château, le petit château, les communs le parc et le canal. A la fin du XVIIe siècle, le château  bâti sur un plan rectangulaire, légèrement irrégulier deux tours  dite de la Ligue et la justice,   le grand château fut achevé vers le milieu du XVIIe siècle.  Le Domaine devint la propriété de Jean Thevenin, conseiller du Roi, Gouverneur de Saint-Denis, nommé marquis de Tanlay par le Roi Louis XIV, en 1705. Depuis, le château de Tanlay est resté dans la même famille. Bien qu'étant un monument privé,  il est ouvert à la visite. Il est inscrit et classé aux M.H. depuis 1949.                                                                              ST-VINNEMER, maison forte construite entre le XVe et le XVIe siècle, transformée plus tard en ferme. Elle a conservé ses structures gothiques (baies à meneaux, escalier dans une tourelle semi-hors-oeuvre, cheminées). Les armoiries qui figurent sur l'entrée pourraient correspondre à celles d'Edme de Courcelles qui a affranchi la communauté de Saint-Vinnemer en 1524. Sur la rive droite du canal, face au port, la maison est édifiée en pierre de taille soigneusement appareillée tandis que les dépendances sont construites en pierre sèche, selon l'usage dans le Tonnerrois. De plan rectangulaire, elle est flanqué sur son grand côté nord d'une tourelle d'escalier orthogonale. Elle est percée de plusieurs croisées.","habitants":"Famille de Guillaume de Courtenay  et famille de Coligny\r\n        \"","divers":"Château de Tanlay et la maison forte de saint-Vinnemer  grav-7                                                                                                 47° 50' 57\" Nord et 4° 5' 7\" Est","gps":"","images":["../image/image_89/89_Tanlay_1.jpg","../image/image_89/89_Tanlay_2.jpg","../image/image_89/89_Tanlay_3.jpg","../image/image_89/89_Tanlay_4.jpg","../image/image_89/89_Tanlay_5.jpg","../image/image_89/89_Tanlay_6.jpg","../image/image_89/89_Tanlay_7.jpg"]},"Consult_chateau_formulaireb4a9":{"id":"Consult_chateau_formulaireb4a9","dept":"89","canton":"Joux la Ville","commune":"Tharoiseau","nom":"Tharoiseau","type":"Château","periode":"XV-XIX","histoire":"THAROISEAU, au Moyen-âge, la terre de Tharoiseau appartenait à Girard de Roussillon, avant de relever du chapitre d'Avallon. Le château est attesté qu'au XVe siècle, sous le règne de Charles VII , la famille Destutt dAssay issue dune très ancienne famille écossaise, sétablit à Tharoiseau. En septembre 1537, permission donnée par François 1er aux habitants de Tharoiseau en Auxois de fortifier leur bourg et de le clore de murs. Labbé Pissier raconte comment M. d'Assay fut emmené en prison comme un criminel et son château pillé au moment de la Révolution. Après la vente du château en 1910, les archives se retrouvent sur un tas de fumier.\r\nSitué dans le bourg, ce château bénéficie dun superbe panorama sur la vallée. L'actuelle demeure fut reconstruite en 1847 sur lemplacement dun ancien corps de logis plus modeste. Aujourd'hui, derrière de hauts murs, la propriété comprend le château du XIXe siècle avec son corps de logis flanqué de tourelles et d'une aile carré, un parc, et plusieurs dépendances.","architecture":"THAROISEAU,  est un château bâti à Tharoisy. Fut rebâti au XIXe siècle, dont la grande façade tournée vers l'Ouest s'ouvre largement sur la vallée de la Cure. Tharoiseau étant situé en hauteur à flanc de colline. A l'Est, le corps de logis à 3 tourelles jouxte la rue principale du village et de l'église. Le château a appartenu jusqu'à la Révolution, à la famille d'Estutt d'Assay. Aujourd'hui privé. Les jardins sont inscrits à l'Inventaire général du Patrimoine culturel. Le château de Tharoiseau se situe sur la R.D. 71.","habitants":"Famille Destutt\r\n        \"","divers":"Tharoisseau 7° 27' 46,6\" Nord, 3° 48' 14,55\" Est","gps":"","images":["../image/image_89/89_Tharoiseau_1.jpg","../image/image_89/89_Tharoiseau_2.jpg","../image/image_89/89_Tharoiseau_3.jpg"]},"Consult_chateau_formulaire111a":{"id":"Consult_chateau_formulaire111a","dept":"89","canton":"Chablis","commune":"Thizy","nom":"Thizy_Blacy","type":"Maison forte","periode":"XV-XVI","histoire":"THIZY, au XIIIe siècle, les moines de Saint-Jean-de-Réome établissent un prieuré à Thizy. Dans une charte en 1372, Philippe le Hardi parle de la \"forteresse de Thizy, nouvellement forte et appareillée.\" En 1461 \"Thisy, ou il a chastel fort, est à l'abbé de Moustier-Saint-Jean\". La vocation militaire du bâtiment est attestée par la présence déchauguettes en encorbellement à mâchicoulis. Le logis seigneurial a été édifié au XVIe siècle. Pendant les guerres de Religion, le château fut dabord aux mains des royalistes contre les protestants et passe ensuite sous le contrôle des Ligueurs avant de revenir aux royalistes. En 1792, il est vendu comme bien national. Les caves du château sont remarquables avec leurs deux nefs à trois travées gothiques soutenant trois colonnes à chapiteaux, ornées de griffes à la base.                                                                            Thizy, divisé en deux propriétés dont l'une est habitée et l'autre est un atelier de sculpture, visite des extérieurs uniquement.","architecture":"THIZY est inscrit partiellement aux M.H depuis 1974. Sa construction date du XIIIe, XIVe, XVe, et XVIe siècle. Le château de Thizy est devenu un atelier qui appartient à Michel Roetzer.\r\nA un kilomètre à l'ouest;  BLACY, ce manoir construit au XVIe siècle est l'ancienne demeure des comtes de Blacy ; initiales en lettres gothiques sur l'écusson ornant une cheminée, d'un étage carré avec  escalier à vis hors-oeuvres  à : toit conique ; toit à longs pans à deux pans avec: tuile plate ; tuile mécanique ; calcaire en couverture.","habitants":"Michel Roetzer.\r\n        \"","divers":"A Thizy le château de Thizy grav de 4 à 8   et de Blacy  grav 1-2-3                                                                                                            47° 34' 06\" Nord et 4° 03' 15\" Est","gps":"","images":["../image/image_89/89_Thizy_Blacy_1.jpg","../image/image_89/89_Thizy_Blacy_2.jpg","../image/image_89/89_Thizy_Blacy_3.jpg","../image/image_89/89_Thizy_Blacy_4.jpg","../image/image_89/89_Thizy_Blacy_5.jpg","../image/image_89/89_Thizy_Blacy_6.jpg","../image/image_89/89_Thizy_Blacy_7.jpg","../image/image_89/89_Thizy_Blacy_8.jpg"]},"Consult_chateau_formulairecffc":{"id":"Consult_chateau_formulairecffc","dept":"89","canton":"Avallon","commune":"Thory","nom":"Thory","type":"Forteresse","periode":"XV-XVI","histoire":"THORY, Jusqu'au XVIe siècle, Thory n'est qu'un franc alleu sans autre droit que celui de nommer des gardes des récoltes, mais aussi sans devoir vis-à-vis d'aucun seigneur et c'est seulement vers 1555 que la justice y a été réunie après avoir été détachée du domaine royal. Anciennement le duc de Bourgogne, puis le roi de France d'une part, et d'autre part, différents seigneurs tels que les sires de Noyers et leurs féodaux, avaient eu des droits sur Thory.","architecture":"THORY, le château qui domine la plaine du haut d'une terrasse, présente de loin un aspect assez imposant, avec sa façade grise flanquée de deux tours, l'une ronde, l'autre carrée et ses grands toits de tuiles. Sur la terrasse et devant les fenêtres, se dresse un bâtiment qui intercepte en partie la vue. Si l'on veut atteindre l'entrée du château de Thory, il faut traverser une avant cour entourée de bâtiments d'exploitation. Une porte donne accès à une cour intérieure ou se trouve à droite le corps de logis qui domine la plaine et frappe de loin les regards et à gauche un autre logis. Dans la cour on trouve un puits à curieuse margelle du XVIe siècle. Le plan et l'aspect général, les tours placées à côté des granges et des celliers, tout révèle la demeure d'une de ces familles de gentilshommes de campagne qui partageaient leur vie entre le service militaire et la culture des champs.","habitants":"Seigneur locaux\r\n        \r\n        \"","divers":"château de Thory à Thory                                                                  47° 33' 57\" nord, 3° 54' 50\" est","gps":"","images":["../image/image_89/89_Thory_1.jpg","../image/image_89/89_Thory_2.jpg","../image/image_89/89_Thory_3.jpg","../image/image_89/89_Thory_4.jpg"]},"Consult_chateau_formulaire8014":{"id":"Consult_chateau_formulaire8014","dept":"89","canton":"Tonnerre","commune":"Tonnerre","nom":"Tonnerre","type":"Château","periode":"XV-XVI","histoire":"TONNERRE, la forteresse dominant Tonnerre se serait située sur les lieux « Mont Bellant » et « Vieux Châteaux » livrant de nombreux vestiges antiques. Quant à la « source divinisée », le vestige en est dune évidence flagrante, puisquil sagit de la Fosse Dionne.   La porte de Tonnerre ou de Sainte-Vérote est un bâtiment massif avec un toit de lave. Dans la niche de cette porte, se trouve une statue polychrome bourguignonne de la Vierge datant du XVIe siècle. Cette statue est ornée tous les 15 août d'une grappe de raisins, vert ou vérot. C'était pour protéger les vignes des orages estivaux, d'où son nom sainte Vérote.                                                                                                      VAULICHERES, la famille seigneuriale était issue des comtes de Bar-sur-Seine. Au XIe siècle, le comté est réuni à celui d'Auxerre et de Nevers, puis en est séparé avec Marguerite de Bourgogne. Le château et la ville haute sont détruits par les troupes bourguignonnes en octobre 1414. Le château de Vaulichères est une magnifique demeure seigneuriale, ancienne propriété de la famille Clermont-Tonnerre, c'était lun des plus importants domaines de la région, il avait alors la réputation dêtre le meilleur du Tonnerrois.  En 1993 le Domaine acquiert 92 ares de vignes plus âgées en appellation Chablis, et aujourdhui, le château exploite, entre Pinot Noir et Chardonnay, un domaine de huit hectares. A l'intérieur de Vaulichères flotte le parfum, lesprit et la touche artistique de la famille Zuber, manufacture de papiers peints alsacienne. Aujourd'hui chambre d'hôtes.","architecture":"TONNERRE, ses portes, du côté ville, elle est ornée dune statue de pierre polychrome du XVIe siècle, dite Sainte Vérote ou Notre Dame de la Voie de Pacy. Les vignerons du village, nombreux à cette époque, ont pensé que la Vierge pouvait protéger leurs vignes. Ils déposaient en offrande, le 15 août, des raisins encore verts, les \"vérots\", au pied de la statue. Il ne faut pas oublier en visitant la ville de faire un détour par la Fosse Dionne, source vauclusienne qui servit longtemps à lapprovisionnement en eau de la ville avant dêtre transformée en lavoir en 1758, et de devenir le point de rencontre des lavandières Tonnerroises.                                                                             UZES  maison natale du chevalier dEon en 1728, personnage ambigu, L'hôtel d'Uzès est un hôtel bâti à Tonnerre,  La construction de l'hôtel d'Uzès date de la 2eme moitié du XVIe siècle. Il est la propriété d'une société privée. Lhôtel d'Uzès, qui fut la maison natale du chevalier d'Éon, est devenue la propriété de la caisse d'épargne, depuis 1879, le bâtiment, restauré en 1888, est décoré de fresques murales du peintre Georges Henri Carré. L'hôtel d'Uzès est inscrit aux M.H. depuis le 18-05-1926.","habitants":"Famille Clermont-Tonnerre\r\n        \"","divers":"A Tonnerre le palais d'Uzés Grav-1 le château de Vaulichères grav-6-7-8                                                                                           Uzes  47° 51' 20\" Nord, 3° 58' 29\" Est","gps":"","images":["../image/image_89/89_Tonnerre_1.jpg","../image/image_89/89_Tonnerre_2.jpg","../image/image_89/89_Tonnerre_3.jpg","../image/image_89/89_Tonnerre_4.jpg","../image/image_89/89_Tonnerre_5.jpg","../image/image_89/89_Tonnerre_6.jpg","../image/image_89/89_Tonnerre_7.jpg","../image/image_89/89_Tonnerre_8.jpg","../image/image_89/89_Tonnerre_9.jpg"]},"Consult_chateau_formulairea344":{"id":"Consult_chateau_formulairea344","dept":"89","canton":"Toucy","commune":"Toucy","nom":"Toucy","type":"Château","periode":"XV-XVII","histoire":"Deux châteaux à Toucy la Motte- Miton et l'écodomaine de Gilats. MOTTE-MITON, lorsqu'en 1523 le baron Aymard II de Prie rase les restes du donjon de la Motte de Toucy, il fait édifier une nouvelle demeure sur le site de la \"Motte-Miton\" déjà occupé par une construction fortifiée d'origine inconnue et qui fut longtemps la source d'une confusion avec le château de la Motte de Toucy. Au XVIIIe siècle, la terre de Toucy, devenue marquisat en l'honneur d'Henri de Prie tué en 1622 au siège de Montauban, est aux mains de financiers, dont Law. En 1751 le marquis Claude Hugues de Perratière fait démolir le château vieux et le château neuf (le donjon n'existe déjà plus en 1722). Le château vieux est alors converti en terrasse, le plan d'ensemble les soubassements et sans doute une bonne partie des tours d'angle sont réutilisés pour construire, \"du côté du soleil levant\", un château moderne tel que nous pouvons le voir aujourd'hui.  Château du Miton ou de la \"Motte-Miton\" du XVIIIe siècle : corps de logis d'environ 40 mètres de long avec deux courtes ailes en retour d'équerre et deux tours sur la façade arrière. Le colombier est toujours visible. On distingue encore les assises du XVIe siècle. Le château abrite le presbytère catholique de l'ensemble paroissial de Toucy .                                                                                    GILATS, écodomaine,  gîte de groupe,  Anne et Jean-Luc Delmotte vous accueillent à l'Ecodomaine des Gilats.","architecture":"La MOTTE-TOUCY, en 1170 le baron Narjot II fortifie d'une grosse tour le château d'Héribert tandis que, sur le même site, en contrebas, l'évêque Guillaume de Toucy fait construire un château avec toutes ses dépendances. La prise de Toucy par les Anglo-Bourguignons en 1423, suivie d'une ruine d'un siècle, entraîne la disparition du double système. Si le Petit châtel est relevé dès 1523 par l'évêque François de Dinteville, le donjon seigneurial est abattu et l'église paroissiale établie dans l'angle nord laissé libre par la destruction de la demeure                                                    TOUCY, au cours du Moyen Âge, de par sa position géographique, Toucy est longtemps disputée entre royaume de France et duché de Bourgogne. Au cours de la guerre de Cent Ans, la ville prend le parti du roi de France contre les anglo-bourguignons. En 1420, Toucy se défend avec acharnement contre une attaque du maréchal de l'Isle-Adam envoyé par Philippe le Bon (duc de Bourgogne 1419-1467). C'est peut-être la raison pour laquelle, malgré seulement quelques jours de résistance et une reddition en bonne forme, elle est complètement brûlée en août 1423 lorsqu'elle se rend à un détachement anglais venu du champ de bataille de Cravant (écrasante victoire anglo-bourguignonne du 31 juillet précédent). Cet incendie est si fort qu'il ne reste que les remparts pour marquer l'endroit de la ville. Une tour qui restait de l'ancien château porte une inscription donnant quelques indications sur son ancienneté.","habitants":"marquis Claude Hugues de Perratière \r\n        \"","divers":"Deux châteaux à Toucy la Motte- Miton grav-1-2-3-4   et l'écodomaine de Gilats grav-5-6-7-8                                                      47° 44' 14\" nord, 3° 17' 39\" est","gps":"","images":["../image/image_89/89_Toucy_1.jpg","../image/image_89/89_Toucy_2.jpg","../image/image_89/89_Toucy_3.jpg","../image/image_89/89_Toucy_4.jpg","../image/image_89/89_Toucy_5.jpg","../image/image_89/89_Toucy_6.jpg","../image/image_89/89_Toucy_7.jpg","../image/image_89/89_Toucy_8.jpg"]},"Consult_chateau_formulaireedf5":{"id":"Consult_chateau_formulaireedf5","dept":"89","canton":"Joux la Ville","commune":"Merry sur Yonne","nom":"Tour_Yonne","type":"Vestiges-Forteresse","periode":"XII-XVI","histoire":"La TOUR, les premiers seigneurs de Merry apparaissent au milieu du XIIe siècle. Geoffroy de Merry suit le comte d'Auxerre Pierre de Courtenay lorsque celui-ci est appelé au trône de l'Empire latin de Constantinople. Il devint connétable de l'Empire en 1238 et participe aux négociations qui aboutissent à l'achat de la Couronne d'épines par Saint-Louis. De 1315 date la première mention de la maison d'où cette lignée de seigneurs a pris son essor. En 1473, la terre est tenue par Jehan de La Rivière, parent de l'illustre Bureau de La Rivière, conseiller de Charles V. A partir de 1516 elle passe par mariage aux Veilhan, famille nivernaise qui vers cette époque fait construire le logis d'habitation placé à l'est. Dès le XVIIe siècle, les seigneurs de Merry n'habitent plus le château, La seigneurie de Merry entre dans le domaine royal et le château est donné en usufruit aux princes de Conti avant 1679. Vendu comme bien national en l'an IV, le domaine est demeuré jusqu'à nos jours une exploitation agricole.","architecture":"La TOUR,  les bâtiments sont convertis à usage agricole ou sont laissés à l'abandon et tombent lentement en ruine. en arrière-plan légèrement à gauche du clocher de l'église on aperçoit un petit bout de chemin. Il contourne le cimetière et monte au château de la Tour, perdu dans les bois ; on aperçoit tout à fait en haut un bout de toit du château.","habitants":"les seigneurs de Merry \r\n        \"","divers":"A Mery sur Yonne le château de la tour La Tour                                        47° 33' 59,76\" Nord, 3° 38' 52,99\" Est","gps":"","images":["../image/image_89/89_Tour_Yonne_1.jpg","../image/image_89/89_Tour_Yonne_2.jpg","../image/image_89/89_Tour_Yonne_3.jpg"]},"Consult_chateau_formulairef0ff":{"id":"Consult_chateau_formulairef0ff","dept":"89","canton":"Vincelles","commune":"Tregny","nom":"Treigny","type":"Château","periode":"XCVI-XVIII","histoire":"TREIGNY, le manoir de la Bussière, une commune très riche en patrimoine (église, châteaux de Ratilly, Guerchy, Boutissaint, la Cour-des-Prés, chantier en construction de Guédelon), est en cours de restauration après un long abandon. Il tient son nom dune famille poitevine venue en Berry, puis en Puisaye au début du XVIe siècle  sans doute par protection de Nicolas dAnjou, marquis de Mézières  dont une branche fonda ce fief par détachement de celui de Guerchy voisin. Elle sétablit solidement dans la région où elle noua de nombreuses alliances qui nous font la retrouver en bien des sites.                                                                                                    GUERCHY, le fief de Guerchy était composé de deux manoirs, celui de la Bussière propriété jusqu'en 1845 de la famille qui lui avait donné son nom, et celui de Guerchy. En 1523, Guillaume de Paris, seigneur de Guerchy, céda le fief à Guillaume du Pestit, époux d'Isabeau Carbonnet. Georges et Jean du Pestit vendirent la terre, en 1544 à Jean Braque qui venait d'épouser Suzanne Damas. Claudine Braque devint à son tour dame de Guerchy qu'elle apporta à Nicolas de Lenfernat, seigneur de Gurgy, son époux. Mathurin de Lenfernat, marié avec Lucrèce du Roux, eurent une fille, Marie qui épouse en 1653  Claude de Vathaire. Edme Paul de Vathaire de Guerchy, capitaine au régiment d'Auvergne, leur descendant, remplaça l'ancien manoir de Guerchy par celui que nous voyons actuellement, peu avant de comparaître, en 1789, avec la noblesse de l'Auxerrois. Son fils, Jules, fut le dernier seigneur de Guerchy que ses descendants n'ont cessé d'habiter.","architecture":"BUSSIERE, fut construit aux XIIe, XVe, XVIe et XVIIe siècles. Le château de la Bussière a été restauré au XXIe siècle. À ne pas confondre avec le château de La Bussière dans le Loiret, ou le château de La Bussière à Oullins, dans le département du Rhône. Le nouveau propriétaire du château de la Bussière est Paulo Da Silva Moreira. Depuis les croisades, en passant par la guerre de cent ans et les conflits religieux du XVIe siècle, l'histoire du pays de Puisaye Forterre nous est racontée au travers des hommes et femmes qui ont habité le château de la Bussière. Ils rachètent aux moines de labbaye de Moutiers des terres pour créer la Bussière des bois où sera installée une tuilerie. La famille était propriétaire du fief de Guédelon, alors moulin et étang fort rentables. A la Révolution, les héritiers mâles de la dynastie sont victimes de la guillotine mais leurs héritières parviennent à récupérer une petite partie de ce qui fut saisi par la Nation. Au XIXe siècle, le château de la Bussière est habité par le Dr Edme Morin, conseiller général du canton de Saint-Sauveur et républicain engagé contre le coup d'état de Napoléon III. Membre de la loge maçonnique de Mézilles, fervent opposant au régime politique du second empire, il conserva une place de choix dans lhistoire puisquil fut réélu conseiller général après la chute de 1871.","habitants":"Edme Paul de Vathaire de Guerchy                                         Bussière  Dr Edme Morin\r\n        \"","divers":"A Trégny ; château  de Guerchy et de Bussière                                      47° 34' 56\" Nord et 3° 11' 07\" Est","gps":"","images":["../image/image_89/89_Treigny_1.jpg","../image/image_89/89_Treigny_2.jpg"]},"Consult_chateau_formulairefdc8":{"id":"Consult_chateau_formulairefdc8","dept":"89","canton":"Vincelles","commune":"Fontenoy","nom":"Tremblay","type":"Manoir","periode":"XVII","histoire":"TREMBLAY, en 1408 on trouve le premier document faisant état du Tremblay. Cet acte ratifie l'échange que fait Pierre Du Deffand de sa succession contre le fief du Tremblay, propriété du sieur Hugues Trissonneau. En 1719  Marie  de Vichy Chamrond, épouse Jean-Baptiste Jacques du Deffand.  Il sera conservé quatre siècles par la même famille jusqu'à l'extinction du nom en 1813, suite au décès du comte Loup Eustache François Du Deffand. Plus tard, en 1838, ce qui reste de la propriété, appartenant alors à M. Duchesne de Denant, est dispersé à l'encan. C'est le premier morcellement puisque l'aile Est est vendue à part. Un siècle plus tard, vers 1938, l'aile ouest est également dissociée. Le château forme actuellement trois propriétés différentes. Les Du Deffand ayant possédé le Tremblay n'occupèrent jamais des postes en vue, si leur nom retient l'attention des lettrés, il le doit à l'épouse de l'un d'entre eux, c'est en effet la femme de Jean Baptiste Jacques Du Deffand qui anima l'un des célèbres salons littéraires parisiens du XVIIIe siècle.  centre régional dart contemporain, ouvert au public tous les jours.                                                                                                        le château de TEST-MILON à quelques kilomètres à l'est à Sermenton est mentionné pour la première fois en 1317 et était situé à quelques mètres de l'actuel château. Louis de Prie a fait construire l'actuel château en 1713, puis son neveu, nommé aussi Louis de Prie l'a vendu en 1781 pour payer ses dettes. Test-Milon est devenu la propriété d'André de Champcour, qui y a entreprit des travaux d'agrandissements. Par mariage, il est allé dans la famille de Gentil de La Breuille, Léon l'a fait reconstruire en 1870, son fils, Etienne à fait édifier la chapelle en 1888. En 1929 le château est passé au comte Bernard de Lambertyre.","architecture":"TREMBLAY, actuel simple gentilhommière succédé à une maison forte dont subsiste quelques éléments défensifs. Le corps de logis principal élevé sur un étage et de plan rectangulaire, ses angles sont flanqués de tours rondes sur la façade principale, au sud , carrées  sur l'autre façade. Celle-ci sont prolongées à l'Est et à l'ouest par deux constructions comportant une tourelle à leur angles extérieur. Ces bâtiments, à usage de ferme et de communs, ont conservé certains de leurs encadrements de fenêtres faits de briques et de pierres, ils délimitent avec des corps en retour, deux cours latérales. L'aile a conservé des meurtrières et des vestiges de douves  et, dans la cour qui la précède, subsiste un fossé, en partie comblé qui appartenait au système défensif du château.","habitants":"Comte Loup Eustache François Du Deffand\r\n        \"","divers":"A Fontenoy château de Tremblay et Test Milon à Sermenton      grav-1                                                                                                                     47° 38' 59\" nord, 3° 18' 28\" est","gps":"","images":["../image/image_89/89_Tremblay_1.jpg","../image/image_89/89_Tremblay_2.jpg","../image/image_89/89_Tremblay_3.jpg","../image/image_89/89_Tremblay_4.jpg"]},"Consult_chateau_formulaire0bb2":{"id":"Consult_chateau_formulaire0bb2","dept":"89","canton":"Avallon","commune":"Vault de Lugny","nom":"Vault_Lugny","type":"Château","periode":"XIII-XIV-XV","histoire":"VAULT, il y a eut un château primitif édifié au XIIIe siècle par la famille d'Arcy. Puis vers 1300, il passa dans la famille de Toucy qui le conserva jusqu'au milieu du XVe siècle. La puissante famille Jaucourt, disgraciée par Louis XI en 1478, voit son château démantelé. Seuls le donjon et une partie du mur denceinte sont épargnés. Durant les guerres de Religion, le château devient alors le lieu de rassemblement des Huguenots. Un document mentionne que le 12 janvier 1580, Jacques de Jaucourt, seigneur de Vault-de-Lugny entraine en justice les habitants de Domecy car son château \"par leur négligence et contravention est demeuré pendant tout les troubles précédents sans aucune garde et à l'abandon, ce qui a été cause d'infinité de ruines audit chasteau, tant aux maisons, tours, murailles que fossés notamment à la prise qui y aurait fait un nommé Jacqueminier qui y aurait fait mille dégâts et insolences et qui sont cause que de présent tous les fossés sont en ruine\". Une certaine liberté retrouvée, des travaux sont entrepris, et les douves élargies. La famille Jaucourt reconstruira le domaine qu'elle conservera pendant quatre siècles. Le dernier du nom Jacques Anne, vend ses biens en 1773 à Germain de Montmien avant de mourir en 1774. Ce dernier cède rapidement à son tour au comte de Crillon en 1776 qui le revends à la famille de Vaulgrenant. Vers 1870, la branche Peting de Vaulgrenant sallie aux Jordan. Une des filles, décédée en 1859, lègue le domaine à Gabriel de Laissardière qui le cède aux Cartier, agriculteurs, jusquen 1967. De nos jours il appartient à la société hôtelière famille Audan et agricole du château de Vault-de-Lugny.","architecture":"VAULT, aujourd'hui le château de Vault-de-Lugny, l'un des plus importants de l'Avalonnais, se développe dans une enceinte sur la rive sud du Cousin, à l'extérieur du village. Il est principalement composé d'une porterie au sud, d'un grand logis moderne qui occupe tout le côté Est et une belle tour carré au milieu du côté nord. L'entrée primitive se faisait au sud par une porte charretière aménagée dans une tour rectangulaire, sans trace apparente de pont-levis. Le grand corps de logis moderne, sur le côté ouest de la plate forme, contient quelques éléments plus anciens, notamment un linteau de baie à accolade finement mouluré en remploi sur la face nord de l'aile nord. La façade postérieure, à l'ouest, et décorée de deux échauguette; la plus au nord est néo-gothique, celle au centre du logis est ornée d'un curieux motif de bossage en boule, et ouverte de canonnière. Le fossé à l'ouest de ce logis a été remplacé par un parterre. La tour nord est construite sur la muraille, elle est ornée de bossage sur tous les parements extérieurs à l'enceinte. Elle se compose d'un sous-sol vouté, un rez-de-chaussée surélevé, un premier étage voûté traversé par le chemin de ronde, un deuxième étage planchéié, et un troisième étage de tir, desservant deux bretèches aménagées à l'aplomb des portes donnant sur le chemin de ronde. Les trois étages sont reliés entre eux par une vis demie-hors-uvre, logée dans une tourelle semi-circulaire appuyée sur un cul-de-four et ornée de bossages.","habitants":"famille de Toucy                                                                            famille Jaucourt\r\n        \r\n        \"","divers":"A  Vault de Lugny  le château de Vault                                                       47° 29' 46\" Nord et 3° 51' 14\" Est","gps":"","images":["../image/image_89/89_Vault_Lugny_1.jpg","../image/image_89/89_Vault_Lugny_2.jpg","../image/image_89/89_Vault_Lugny_3.jpg","../image/image_89/89_Vault_Lugny_4.jpg","../image/image_89/89_Vault_Lugny_5.jpg","../image/image_89/89_Vault_Lugny_6.jpg","../image/image_89/89_Vault_Lugny_7.jpg","../image/image_89/89_Vault_Lugny_8.jpg","../image/image_89/89_Vault_Lugny_9.jpg"]},"Consult_chateau_formulaire412a":{"id":"Consult_chateau_formulaire412a","dept":"89","canton":"Joux la Ville","commune":"Vermenton","nom":"Vermenton","type":"Tour","periode":"XVII","histoire":"A Vermenton le château de Betry et la tour                                               BETRY, situé sur le Polygone à l'entrée Nord de Vermenton, sa première mention remonte à 1157 en tant que château  tenu en fief par les comtes d'Auxerre. En 1213, l'évêque d'Auxerre transforme la chapelle du château en église paroissiale. Le château est abandonné mais l'église était encore entretenue et utilisée au cours des siècles suivants. En effet en 1368, les habitants ont été autorisés par le roi à entourer la ville d'une première enceinte érigée autour du quartier de l'église. En 1404, Charles VI autorise la population à restaurer cette fortification. La deuxième enceinte, construite en 1514 avec l'autorisation du roi Louis XII, entourait l'agglomération actuelle qui était partagée en plusieurs seigneuries pour l'exercice de la justice, le roi, l'abbaye de Reigny et Bazarnes.","architecture":"VERMENTON; située sur le bord de la Nationale 6 qui traverse le village et voisine du cadran solaire qui lui donne son nom, cette tour est tout ce qui reste de lancienne forteresse. Elle fut réparée au milieu du XVIIe siècle. Ses fonctions ont été diverses : hôtel de ville, beffroi, prison dans sa partie inférieure qui abrite de nos jours le syndicat dinitiative, lieu où se tenait les audiences de justice, doù son autre nom : Tour de justice.","habitants":"comte d'Auxerre.\r\n        \"","divers":"A Vermenton le château de Betry et la tour                                              47° 39' 57\" nord, 3° 44' 10\" est","gps":"","images":["../image/image_89/89_Vermenton_1.jpg","../image/image_89/89_Vermenton_2.jpg"]},"Consult_chateau_formulaire29c5":{"id":"Consult_chateau_formulaire29c5","dept":"89","canton":"Joux la ville","commune":"Vezelay","nom":"Vezelay","type":"Vetiges","periode":"XIII","histoire":"VEZELAY, lors des guerres de religion, elle passe au gré de ses abbés, de place forte des Réformés à citadelle de la Ligue. L'influence de Théodore de Bèze, l'abbaye en pleine décadence, font de Vézelay une des premières villes de la région acquise au protestantisme. En mars 1569, la ville est prise par les troupes protestantes des capitaines Sarrasin et Blosset, soucieuses de gagner une belle position militaire. La ville est bientôt assiégée par les armées de Charles IX commandées par Louis Prévost de Sansac. La cavalerie est lancée sur Vézelay le 6 octobre, mais les capitaines retranchés dans la ville se défendent très bien en attaquant à leur tour. Les bombardements depuis Asquins et Saint-Père ne donnent rien. Le siège se transforme en blocus pour affamer la ville. La ville ne se rend pas malgré huit mois de siège et de combats intenses, grâce à un ravitaillement de secours de troupes protestantes. Sansac lève le camp, laissant la ville invaincue, le 25 février 1570.\r\nAu traité de Saint-Germain (1570), Vézelay est l'une des deux villes du gouvernement de Champagne à autoriser les protestants à exercer librement leur culte. En 1594, Edme de Rochefort, sieur de Pluvault, qui gouverne la ville au nom de la Ligue, livre la place à Henri IV et prend la tête des troupes royalistes pour prendre Avallon. C'est sous l'abbé Jacques Berthier, prédicateur du roi, que le château gaillard est détruit : l'abbé de Cours le trouve trop triste et lui préfère une construction plus au goût de l'époque (1752-1769). À la veille de la Révolution, Vézelay a perdu ses privilèges municipaux, voit sa population diminuer et n'est plus qu'un petit bourg.","architecture":"VEZELAY, la muraille a une étendue d'environ 1,9 km, elle est épaisse en moyenne de 2 mètres et haute de dix mètres. Pour accéder à la ville, deux portes ont été construites avec trois siècles d'intervalle : la porte Sainte-Croix date du XIIe siècle et a probablement été construite vers 1150 pour donner accès dans l'enceinte de l'abbaye. La voûte qui menaçait de s'effondrer a été démolie en 1814. La muraille qui la prolonge est remarquable par la beauté de sa construction. La porte Neuve à la fin du XVe siècle entourée par deux tours rondes de douze mètres de diamètre et des murs de trois mètres d'épaisseur, et dont l'accès étaient barrés par deux herses. Les remparts sont protégés au titre des monuments historiques par plusieurs décisions : avis de classement du 13 juillet 1875, inscription par arrêté du 23 mai 1995 et classement par arrêté du 20 juillet 1998.","habitants":"Edme de Rochefort\r\n        \r\n        \"","divers":"A Vezelay le château vestiges et porte grav-1-6  Palombire grav-7                                                                                                               47° 27' 59\" nord, 3° 44' 54\"  est","gps":"","images":["../image/image_89/89_Vezelay_1.jpg","../image/image_89/89_Vezelay_2.jpg","../image/image_89/89_Vezelay_3.jpg","../image/image_89/89_Vezelay_4.jpg","../image/image_89/89_Vezelay_5.jpg","../image/image_89/89_Vezelay_6.jpg","../image/image_89/89_Vezelay_7.jpg","../image/image_89/89_Vezelay_8.jpg"]},"Consult_chateau_formulaire5c23":{"id":"Consult_chateau_formulaire5c23","dept":"89","canton":"Avallon","commune":"Bussières","nom":"Villarnoux","type":"Château","periode":"XVI-XIX","histoire":"VILLARNOUX, le château est édifié dans la vallée du Creusant, petite rivière dont les eaux, retenues en aval par une chaussée, formèrent un étang isolant et garantissant de toutes les parts la forteresse. La terre de Villarnoult (Villa Arnulphi) appartint dabord à une lignée de seigneurs originaires de lAutunois, les Besors. Au début du XIVe siècle, elle passe par mariage aux Jaucourt, qui occuperont de très hautes fonctions de cour auprès des ducs de Bourgogne de la maison de Valois dont ils seront les fermes soutiens dans lAvallonnais. De cette époque date le château, puissante forteresse que Louis XI fit démanteler en 1478. Aubert de Jaucourt obtint de Charles VIII la restitution de Villarnoult et fit bâtir dans la première avant-cour, au sud de lancienne forteresse, un nouveau bâtiment. Les successeurs dAubert embrasseront la Réforme et feront figure de chefs locaux de ce parti durant les guerres religieuses. A cette époque, un prêche est établi dans la chapelle du château. A la fin du XVIIe siècle, Villarnoult passe par mariage aux comtes de Bellay de La Pallu. Il appartient ensuite aux Montmorency-Robecq, dont les descendants ont possédé Villarnoult et son château ruiné, converti en ferme, jusquà la Révolution.","architecture":"VILLARNOUX, château des XVIe-XIXe siècles en forme de fer à cheval, la forteresse était protégée par deux avant-cours successives munies de murailles et séparées lune de lautre par un fossé rempli deau. De la première subsiste un corps de bâtiment dit le petit château construit au début du XVIe siècle, et dont la fonction était de défendre laccès de cette avant-cour à louest. Cest un édifice dun étage en forme de fer à cheval. Un pont fixe dune seule arche, auquel succédait un pont à bascule y donnait accès au sud. La tour ronde qui le flanque à louest est munie de canonnières. Le château proprement dit présente la forme dun demi-cercle irrégulier. Contre les murs sappuyaient les bâtiments dhabitation, la chapelle, les remises, ne laissant au centre quune cour. Les murs sont arasés et les bâtiments ont disparu, à lexception de la base dune tour descalier de plan hexagonal posée en demi-hors uvre et dun édifice dont létage renferme la chapelle à laquelle on accède  par un escalier extérieur.","habitants":"comte de Bellay de La Pallu\r\n        \"","divers":"A Bussières le châteaux de Villarnoux                                                 47° 25' 53\"  N, 4° 02' 07\"  Est","gps":"","images":["../image/image_89/89_Villarnoux_1.jpg","../image/image_89/89_Villarnoux_2.jpg","../image/image_89/89_Villarnoux_3.jpg"]},"Consult_chateau_formulairec1d6":{"id":"Consult_chateau_formulairec1d6","dept":"89","canton":"Auxerre","commune":"Villefargeau","nom":"Villefargeau","type":"Château","periode":"XIII-XIV","histoire":"VILLEFARGEAU, on cite l'existence de la famille de Villefargeau dès 1217, mais on ne sait rien sur la date de construction du château. On sait aussi qu'en 1373, le domaine appartient à Etienne de Chanteloup et qu'en 1401 il lutte contre les bourgeois d'Auxerre qui voulaient acquérir sa terre pour renforcer vers le sud la défense de la ville. Le 28 janvier 1402, Hugues de Saint Aubin, chevalier, seigneur de Domecy, tient la forteresse de Villefargeau et ses dépendances grâce à sa femme Urbaine de Merry. Il en fait laveu au comte dAuxerre, duquel relève cette place. Le 8 novembre 1405, Jehan Coignet, conseiller du roi fait hommage au roi, à cause du \"chastel dAucerre\". Il lui fait aveu et dénombrement le 15 décembre de la même année pour ses \"vile et chastel dudit lieu de Villefargeau avec les fossés grands et petits dentour ledit chastel\". Les termes \"fossés grands et petits\" traduisent en fait que le château et ses fossés sont entourés par deux bras de la Beaulche qui forment ainsi une seconde enceinte de fossés. Puis il passe entre les mains de nombreux propriétaires, entre autres la famille d'Estampes du Berry. En 1642,  quitte cette famille et passe dans d'autres mains jusqu'aux Pommier en 1907.  Le château de Villefargeau joue un rôle stratégique important dans la défense du comté dAuxerre. Le cadastre de 1805 montre une enceinte de fossés en eau extrêmement importante, où sinscrivent les communs modernes et le colombier du défunt château. Le vieux château devait logiquement se situer dans la partie sud de cette enceinte de fossés, en deçà des communs. Il devait très probablement avoir une forme rectangulaire laquelle a ensuite déterminé la forme actuelle des fossés.","architecture":"VILLEFARGEAU, le château est toujours en état à la fin du XVe siècle et endossera un rôle important pendant les guerres de la ligue. Claude d'Estampes y réunira une assemblée pour établir une trêve. Propriété de Mr Thierry Lemonier-Vilotte                                                                           à Castillon Pujols. Le château de La Villotte se situe dans la vallée de la Beaulche entre la maison forte de Beaulche et le château de Villefargeau. Sa relative proximité avec ce dernier, environ 500 mètres, laisse supposer qu'il a pu en être une dépendance. Le site quaffiche le cadastre de 1808 na pas été retrouvé. Il se présente en une enceinte de fossés de forme vaguement ovale où sinscrivait un corps de bâtiment, comportant peut-être des parties du XVIe siècle, mais qui remontent plus probablement au XVIIe siècle. La plate-forme, intéressante par sa physionomie, portait peut-être un habitat médiéval fortifié. Les fossés qui ont environ dix mètres de large sont inondés par les eaux de la Beaulche. On ne possède aucune mention dun quelconque habitat seigneurial à La Villotte. On connaît dailleurs assez mal le château au XVIIIe siècle. Pour autant, on ne peut pas écarter lhypothèse que ce soit une structure seigneuriale médiévale ou Renaissance dépendant du château de Villefargeau voisin. Le château de La Villotte a appartenu à la famille Uzanne en 1839 et a été transmis jusquen 1905, date du décès de la veuve Uzanne. A cette date on ne sait pas sil a été vendu ou sil est resté quelques années encore la propriété indivise des frères Octave et Joseph Uzanne.","habitants":"Famille d'Estampes du Berry.\r\n        \"","divers":"Château de Villefargeau et Vilotte grav 8-9                                   47° 47' 00\" nord, 3° 30' 18\" est","gps":"","images":["../image/image_89/89_Villefargeau_1.jpg","../image/image_89/89_Villefargeau_2.jpg","../image/image_89/89_Villefargeau_3.jpg","../image/image_89/89_Villefargeau_4.jpg","../image/image_89/89_Villefargeau_5.jpg","../image/image_89/89_Villefargeau_6.jpg","../image/image_89/89_Villefargeau_7.jpg","../image/image_89/89_Villefargeau_8.jpg"]},"Consult_chateau_formulaire7b88":{"id":"Consult_chateau_formulaire7b88","dept":"89","canton":"Charny","commune":"Villefranche","nom":"Villefranche_St_Phal","type":"Château","periode":"XVI","histoire":"Saint-PHAL, les premiers  chateaux seigneurs de Villefranche sont connus depuis le début du XIVe siècle.  De 1306 à 1322, Pierre de Dicy, légiste de Philippe le bel, est seigneur de Villefranche en Gâtinais. En mai 1361, le roi décharge Guichard d'Ars, bailli de Sens des poursuites dont il fait l'objet, celui-ci sachant que le prince de Galles et le roi d'Angleterre occupaient Regennes et Malicorne, il convoqua plusieurs nobles et après visite ordonna la destruction de plusieurs forteresses et monastères dont la forteresse de Villefranche, puis reconstruite dès le XVe siècle. Le 6 août 1488, hommage au roi par Nicolas de Blondeaux, écuyer des terres et seigneuries de Villefranche et Dicy, assises au bailliage de Sens et mouvant de la grosse tour de Villeneuve-Le-Roi. Le château de Villefranche a été bâti par Etienne de Blondeau au XVe siècle. Son fils, Nicolas est assassiné le 17 mai 1494 et a pour héritiers deux enfants encore mineurs, dont Béraud qui épousera Eustache de Saint-Phalle le 6 février 1567. Ainsi une branche des Saint-Phalle va demeurer à Villefargeau et donner leur nom à la demeure, d'où l'appellation \"château de Saint-Phal\". La dernière héritière abandonne la propriété en 1798. C'est ainsi que le domaine a été utilisé pour des fonctions agricoles, mais avec le temps il a été abandonné.","architecture":"La COTE RENARD, à l'initiative de la Récré Chevillonnaise et des propriétaires du château original de La Côte Renard, la fête médiévale de Villefranche poursuit sa grande première, ce dimanche 15 septembre. Comme \"un mini Puy du Fou\", sourit dans l'allée centrale menant à la bâtisse familiale Cécile Bonnichon, propriétaire des lieux.                                                   ST-PHAL, le château de Saint-Phal est flanqué de deux grosses tours rondes et muni de grands fossés pleins d'eau. Quantin en 1868 \"de la maison forte de Saint-Phalle, subsiste un grand corps de logis rectangulaire, flanqué de tours à toit en poivrière aux angles sud-ouest et nord-est. Cette bâtisse est entourée d'une enceinte de fossés en eau, rectangulaires, larges de dix mètres environ. La plate-forme qui porte le bâtiment fait environ quarante mètres de long sur soixante mètres de large. Aucun élément défensif na été aperçu dans les maçonneries. Sur le cadastre de 1828, aucun pont nest représenté pour accéder à la plate-forme. Au sud du château, sont signalés les communs et à lest, les jardins entourés eux aussi de fossés en eau.","habitants":"Nicolas de Blondeaux\r\n        \"","divers":"Château de Saint-Phal grav -3-4et de la côte Renard 1-2  à Villefranche et deux nouveaux châteaux.                                                  47° 56' 25\" nord, 3° 07' 50\" est","gps":"","images":["../image/image_89/89_Villefranche_St_Phal_1.jpg","../image/image_89/89_Villefranche_St_Phal_2.jpg","../image/image_89/89_Villefranche_St_Phal_3.jpg","../image/image_89/89_Villefranche_St_Phal_4.jpg","../image/image_89/89_Villefranche_St_Phal_5.jpg","../image/image_89/89_Villefranche_St_Phal_6.jpg"]},"Consult_chateau_formulaire91f9":{"id":"Consult_chateau_formulaire91f9","dept":"89","canton":"Brienon-sur-Armançon","commune":"Villeneuve sur yonne","nom":"Villeneuve_Yonne","type":"Patrimoine","periode":"XII-XVIII","histoire":"Des quatre portes d'origine (portes de Sens, de Joigny, de Valprofonde et de Rampillon) qui perçaient l'enceinte de la ville, il n'en subsiste plus que deux (classées monuments historiques) : les portes de Sens et de Joigny. Bâties au XIIIe siècle, elles ont été remaniées au XVIe siècle. Les statuettes en plomb de un mètre de haut de la porte de Joigny représentent des templiers armés qui défendent la ville. Du château royal des Salles il ne reste aucun vestige et la chapelle dédiée à saint Jean a été détruite en 1820, mais il est toutefois possible d'emprunter la cour des princes, aujourd'hui rue du Grand Four qui conduisait de l'église au château.\r\nLa grosse tour ne faisait pas partie de l'enceinte, mais on peut supposer qu'elle constitue le donjon du château royal.                    RELAIS demeure d'aspect seigneurial avesc sa superbe façade et sa grande cour d'honneur, elle tire son nom de ce qu'elle était autrefois relais de poste, faire différence des portes                                                                                            TOUR PHILIPPE, Villeneuve est située au débouché d'un gué de l'Yonne commandant le pont. La ville qui s'édifie se construit à la romaine, sur un plan quadrillé rigoureux, à lintérieur de remparts protecteurs et dominée par son église. Villeneuve fait partie des villes dotées d'un donjon royal « la Grosse Tour », attribut de la puissance et de la gloire de Philippe Auguste dans le droit fil de la tour du Louvre, qu'il édifie de 1205 à 1211 à l'angle de l'enceinte dressée par son père Louis VII.","architecture":"PORTE de JOIGNY, Porte sud de lenceinte médiévale, vestige des fortifications réalisées vers 1200 sur la commande du roi Philippe Auguste, la porte de Joigny conserve son plan très caractéristique constitué dun châtelet carré flanqué de 4 tourelles dangle, dont à lextérieur le profil en éperon offrait un maximum defficacité aux défenseurs de la ville. La Renaissance a profondément remanié ce monument en ouvrant sa façade de fenestrages à meneaux et en le couronnant dune haute toiture dardoise que somment deux statues de plomb figurant les archanges protecteurs de la ville brandissant le glaive. Mais, sous la voûte, on remarque toujours lemplacement des deux herses qui jusquau XVIe siècle assuraient sa fermeture, ainsi que des archères et des assommoirs qui contribuaient à la défense de la ville.Au XVIIIe siècle et jusquen 1837, cette porte abrita la mairie de la ville ainsi quune cellule de détention. Puis elle servit de salle de répétition pour les associations musicales et son premier étage devint le logement de la gardienne de lasile de nuit.    RELAIS demeure d'aspect seigneurial avec sa superbe façade et sa grande cour d'honneur, elle tire son nom de ce qu'elle était autrefois relais de poste,","habitants":"roi Philippe Auguste\r\n        \r\n        \"","divers":"A Villeneuve sur Yonne  la porte de Joigny, de Sens grav-1-2-3   château de Champ du Guet grav-5, tour de Bonneville  Grav-4, château de Bordes grav-6 et de Jolivaux  grav-7                                                                                                              De la Motte grav-9         48° 05' 34\" nord, 3° 17' 40\" est","gps":"","images":["../image/image_89/89_Villeneuve_Yonne_1.jpg","../image/image_89/89_Villeneuve_Yonne_2.jpg","../image/image_89/89_Villeneuve_Yonne_3.jpg","../image/image_89/89_Villeneuve_Yonne_4.jpg","../image/image_89/89_Villeneuve_Yonne_5.jpg","../image/image_89/89_Villeneuve_Yonne_6.jpg","../image/image_89/89_Villeneuve_Yonne_7.jpg","../image/image_89/89_Villeneuve_Yonne_8.jpg","../image/image_89/89_Villeneuve_Yonne_9.jpg"]},"Consult_chateau_formulairebfd0":{"id":"Consult_chateau_formulairebfd0","dept":"89","canton":"Vincelles","commune":"Vincelles","nom":"Vincelles","type":"Château","periode":"XVII","histoire":"VINCELLES,  le château a été construit vers 1775 par Edmé Germain Villetard, alors écuyer du Roy. En 1804, il appartient à Monsieur Biderman, banquier suisse, et c'est en 1806 que Madame de Staël s'y installe avec ses deux enfants. Femme de lettres, elle a publié des écrits politiques déplaisant à Napoléon qui l'exile à plus de 40 lieues de Paris, à partir de 1807, le château est habité par Louis Joseph II, de Bardereau de Saint-Martin et Eugénie Berhier de Viviers  quil a épousée le 14 avril 1807 à Chemilly sur Serein. Son père, Louis Joseph, domicilié au château de la Minée à Soullans,  en Vendée, partage son temps entre Soullans et Vincelles, chez son fils. Il décède à lâge de 84 ans à Vincelles le 19 août 1832.  Louis Joseph devient maire de Vincelles et chef dEtat major des gardes nationales du département de lYonne. Deux enfants sont nés de lunion de Louis Joseph  et dEugénie : Gustave-Louis-Eugène, né le 4 juillet 1810 à Chemilly sur Serein. Capitaine dEtat major, il épouse en 1838 Alexandrine dErard qui va mourir à Pau (Basses Pyrénées) le 12 novembre 1844 à 24 ans et laissant trois jeunes enfants, Jeanne, Charles et Maurice. Charles est lancêtre de la branche actuelle des Badereau de St Martin établie en Normandie depuis 1867. Gustave décède chez ses parents, le 23 octobre 1857, au château de Vincelles. Eugénie Louise Joséphine Amicie, sa soeur, est née le 23 septembre 1813 au château de Vincelles. Elle épouse François-Marie Eugène Le Fournier dYauville, lequel sera maire de Sens de 1852 à 1858, puis Sénateur de lYonne.  Louis Joseph II est décédé au château de Vincelles le 24 février 1863 à lâge de 83 ans. Cest sa fille Eugénie Louise, épouse Le Fournier dYauville qui hérite du château par donation partage de sa mère, Eugénie Berthier De Viviers en date du 24 avril 1863. Elle meurt le 4 avril 1867 à 53 ans au château de Vincelles, elle avait quatre enfants. Sa mère Eugénie Berthier  de Viviers, chez sa petite fille Jeanne qui a épousé un baron alsacien, en 1875,","architecture":"VINCELLES, en 1875, le château est vendu par les consorts Le Fournier dYauville au Général et à Madame Alphonse de  Delerbecque. En 1902, il devient la propriété de leur neveu, Monsieur Paul Boyard.1903, Monsieur et Madame Jules Terisse  Fouilloze l'achètent  et lagrandissent par la construction, en 1905, dune aile à langle Sud Ouest.\r\nAprès le décès de Monsieur Jules Terisse en 1910 et de Madame Fouilloze en 1939, le château devient la propriété des consorts Terisse qui le vendent en 1943 à la S.N.C.F. laquelle en fait une école et une colonie de vacances.  En 1973, la S.N.C.F. vend le château à lA.P.A.J.H., Association Pour Adultes et Jeunes Handicapés,  qui lutilise comme Institut Médico Pédagogique, lequel devient en 1994, Institut Médico Educatif (I.M.E.) et Service d'Education et de Soins Spécialisés à domicile.","habitants":"Madame de Staël Eugénie Berhier de Viviers  \r\n        \"","divers":"Château de Vincelles à Vincelles   47° 42' 17\" nord, 3° 37' 57\" est","gps":"","images":["../image/image_89/89_Vincelles_1.jpg","../image/image_89/89_Vincelles_2.jpg","../image/image_89/89_Vincelles_3.jpg","../image/image_89/89_Vincelles_4.jpg"]},"Consult_chateau_formulaire10f2":{"id":"Consult_chateau_formulaire10f2","dept":"89","canton":"Tonnerre","commune":"Vézinnes","nom":"Vézinnes","type":"Château","periode":"XV-XVI","histoire":"VEZINNES, c'est à Jean Stuart que l'on doit la construction du château de Vézinnes. En effet celui-ci épouse Claude de Laing en 1530, fille du seigneur de Vezinnes, Fontaine Géry et Lignières. Jean Stuart, descendant d'un cadet de la maison des Stuart, quitta la cour d'Ecosse afin de se réfugier auprès de Louis XI. Il fut capitaine de la garde écossaise de François Ier. Le château demeura dans cette famille jusqu'en 1650, pour passer dans la famille du Pé, les barons de Tannerre et Louesme (parente par Claudine Stuart). Puis Pierre du Pé l'a vendu en 1710 à Nicolas Bazard, devenu conseiller du Roi et contrôleur des rentes de l'Hôtel de Ville de Paris. Il entreprit des restaurations de la propriété. En 1744, son petit-fils en hérita, Edme-Antoine de Boucher, comte de Flogny, dit l'abbé de Flogny. A son décès en 1779, une longue procédure de partage fait échoir le château à Alexandre Louis Nicolas de Boucher, comte de Flogny, page du Roi de Pologne et époux d'Henriette-Simone Anjorrant. Ils furent les derniers seigneurs de Vezinnes et moururent sans héritiers. Depuis la Révolution, à la suite de successions, l'ensemble fut morcelé, aujourd'hui le pavillon nord appartient à M. Nuttinck qui y réside tandis que le pavillon sud appartient à M. Pacault qui a entrepris de le remettre en état.","architecture":"VEZINNES, le château de Vézinnes domine la vallée de l'Armançon du haut de sa terrasse accolée à l'église. Il ne subsiste aujourd'hui que deux bâtiments symétriques cantonnés sur deux angles chacun d'une tourelle élancée en encorbellement. Ces quatre tourelles sont percées de petits orifices de tir. Les deux pavillons étaient primitivement réunis par les trois arceaux d'une galerie en terrasse masquant une cour derrière laquelle se trouvait le corps du bâtiment principal et qui ne fut détruite que dans les premières années du XIXe siècle, vers 1820. Sous la terrasse s'étageait un potager. Sur la gauche en regardant la façade s'étendait un parc planté de chênes et de charmilles. A droite s'élevait la chapelle et l'entrée principale était située du côté du pays, flanquée d'une tour avec herse et pont levis.","habitants":"Famille Nicolas Bazard\r\n        \"","divers":"Château de Vézinnes à Vézinnes                                                      47° 53' 36\" nord, 3° 56' 39\" est","gps":"","images":["../image/image_89/89_V%c3%a9zinnes_1.jpg","../image/image_89/89_V%c3%a9zinnes_2.jpg"]},"Consult_chateau_formulaireefa5":{"id":"Consult_chateau_formulaireefa5","dept":"89","canton":"Tonnerre","commune":"Yrouerre","nom":"Yrouerre","type":"Château","periode":"XVII","histoire":"YROUERRE, cet étonnant bâtiment du XVIIe siècle, planté dans la campagne, est l'ancienne orangerie du château d'Yrouerre, aujourd'hui disparu. Un premier édifice fut détruit sous Charles le Téméraire et a été remplacée par un château fortifié au XVe siècle. Au XVIIIe siècle, sur ce même emplacement, fut construit un troisième château qui se dégradera progressivement et disparaitra en 1987.","architecture":"YROUERRE, subsiste lorangerie bâtie en même temps que ce troisième bâtiment. Situé à larrière du château disparu, la façade sud, constituée de onze arcades égales permettait un bon ensoleillement propice à la culture dorangers, dananas et autres plantes délicates. Chaque arcade présente une clef sculptée. Sur larcade centrale est représentée une corbeille de roses. Au sommet du fronton, un acrotère, sorte de piédestal, portant une pierre dassez grande taille sculptée en forme de fruit, probablement une poire, symbolise les vergers voisins et les arbres fruitiers quabritaient lorangerie.","habitants":"Seigneur local\r\n        \"","divers":"Château de YROUERRE  47° 47' 41\" nord, 3° 56' 56\" est","gps":"","images":["../image/image_89/89_Yrouerre_1.jpg","../image/image_89/89_Yrouerre_2.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','89 — Yonne'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
