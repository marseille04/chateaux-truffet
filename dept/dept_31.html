onestrol Transformé en ferme.                                                                                                    MONTGEARD est en réalité un hôtel particulier de la Renaissance édifié par Guillaume Durand, riche marchand pastellier, la famille Durand s'est singularisée à travers son plus célèbre représentant, Guillaume, à qui l'on doit la construction . En effet, le troisième fils de Bernard Durand rachète en 1554 à Catherine de Médicis, comtesse du Lauragais, les droits seigneuriaux sur le village devenant ainsi le premier seigneur de Montgeard.  Lan 1555, aux calendes de décembre ». Ce même personnage, greffier de présentation au parlement de Toulouse, devient par la suite capitoul  en 1559, marque de réussite et de reconnaissance incontestable pour un nouvel anobli. La famille Durand de Montgeard se maintient dans le village pendant plus de trois siècles, elle est par la suite contrainte de démolir puis de vendre son château à la découpe, la famille Durand perdure à Montgeard jusquen 1850. Dès 1840, la haute tour descalier de 220 marches est ainsi détruite et vendue. En 1842, cest au tour du château dêtre vendu dans son intégralité à neuf familles du village qui sen servent comme carrière. Propriété de la famille Dublois, depuis son rachat , le château de Montgeard est progressivement restauré par ses nouvelles propriétaires, celles-ci reconstituant patiemment lhôtel dans un état proche de ses dispositions dorigine.                                                                       ROQUEFOULET SCI   Gestion des sites et monuments historiques et des attractions touristiques similaires de  M Christian DURET et Gerard Deseilles\r\n, elle est spécialisée dans le secteur d'activité de la gestion des sites et monuments historiques et des attractions touristiques similaires.","architecture":"Montgeard  a été fondé en 1317 par Guy Guiard, sénéchal de Toulouse et Hugues Peytavin, seigneur de Nailloux, sous le règne de Philippe V Le Long. Aux XVe et XVIe siècles,  la famille Durand édifie un ample château avec une haute tour.  Le château de Montgeard a été décrit dans un inventaire comme \"bâti à quatre murs, avec sentinelles et défenses de notable valeur\". Au-delà de la rue principale, un grand jardin \"environné de murailles à carneaux\" lui était attenant. De nos jours et malgré sa destruction partielle, lhôtel Durand conserve des vestiges remarquables de sa splendeur passée. Le château sert ensuite de carrière de briques et de pierres.  Il reste cependant de beaux vestiges à lintérieur : dimpressionnantes caves voûtées, de magnifiques cheminées. De nombreux éléments du château semblent avoir été réutilisés dans des maisons de Montgeard voire de villages voisins. Échappant de peu à une destruction totale, le logis du château est ensuite reconverti en presbytère à une date inconnue, durant la deuxième moitié du XIXe siècle. Aujourdhui située à langle dune propriété voisine, une échauguette a appartenu à lhôtel Durand des origines. Placée en encorbellement sur le mur et dotée de bouches à feu, elle gardait lextrémité du mur denceinte du jardin de lhôtel avant qu'il ne soit vendu pour constituer une nouvelle propriété                                                           Roquefoulet villa néo-palladienne construite en 1818 appartenant au type des maisons de campagne que caractérise la simplicité du plan et du dessin des élévations. Construit en briques, l'édifice est un corps de logis rectangulaire avec une partie centrale cubique et deux parties latérales en rez-de-chaussée, établies à l'alignement du corps central. Décor soigné (serliennes, menuiseries néo-classiques et peintures néo-pompéiennes). Présence d'un parc aux essences rares autour de cette demeure.","habitants":"Famille Durand \r\n        \"","divers":"Château de Montgeard et de Roquefoulet","gps":"","images":["../../jctruffet.com/image/image_31/31_Montgeard_1.jpg","../../jctruffet.com/image/image_31/31_Montgeard_2.jpg","../../jctruffet.com/image/image_31/31_Montgeard_3.jpg","../../jctruffet.com/image/image_31/31_Montgeard_4.jpg","../../jctruffet.com/image/image_31/31_Montgeard_5.jpg","../../jctruffet.com/image/image_31/31_Montgeard_6.jpg"]},"Consult_chateau_formulairee367":{"id":"Consult_chateau_formulairee367","dept":"31","canton":"Escalquens","commune":"Montgiscard","nom":"Montgiscard","type":"Château","periode":"XV","histoire":"MONTGISCARD, au Moyen-Âge, le territoire de Montgiscard était d'abord placé sous l'autorité du seigneur de Belbèze. Il y détenait un domaine et un château fort au lieu-dit Endardé. En 1211, le seigneur de Montgiscard se rallia au parti de Simon de Montfort. Et en guise de représailles, le comte de Toulouse rasa le village de même que l'oratoire de Roqueville et s'empara de la seigneurie et du château de Belbèze. Placée sur une terrasse qui commande la vallée de l'Hers, la ville de Montgiscard, fut le centre d'une bailli, puis d'une châtellenie.\r\nEn 1355, elle fut prise et brûlée par les troupes du Prince Noir, mais commença à se rétablir l'année suivante. En 1517, G. de Borderia porta le titre de seigneur de Montgiscard. Au XVIIIe siècle, ce lieu fut rattaché à la seigneurie d'Ayguesvives en échange à un descendant du surintendant Fouquet. À l'époque moderne, Montgiscard était l'une des villes maîtresses du diocèse civil de Toulouse.                                                                                                               Château de Roqueville du XVe et XVIIIe siècles. Le fief de Roqueville est cité dès le XIIe siècle. Cette puissante famille adhère à l'hérésie cathare, ce qui précipite sa ruine et sa spoliation. Roqueville est alors rattaché à la baronnie de Montbrun, qui est attribuée par le roi à l'évêque de Toulouse. Après les Roqueville, la seigneurie échoit à la famille Gavarret puis à la fin du XVe siècle, aux Garaud, qui la conservent jusqu'au XVIIIe siècle. En 1760 le domaine est acquis par Marc Derrey, ancien capitoul, qui y fait des travaux.","architecture":"Château de Roqueville à Montgiscard de plan rectangulaire à deux niveaux et attiques  flanqué de chaque flan latéral d'un donjon à cinq étages  mâchicoulis toit à quatre pans.                                                                                        Château de Montgiscard  bâtiment de plan rectangulaire à deux niveaux et attiques.","habitants":"Famille Gavarret \r\n        \"","divers":"Château de Roqueville et de Montgiscard","gps":"","images":["../../jctruffet.com/image/image_31/31_Montgiscard_1.jpg","../../jctruffet.com/image/image_31/31_Montgiscard_2.jpg","../../jctruffet.com/image/image_31/31_Montgiscard_3.jpg"]},"Consult_chateau_formulaire33ad":{"id":"Consult_chateau_formulaire33ad","dept":"31","canton":"Escalquens","commune":"Montlaur","nom":"Montlaur_31","type":"Château","periode":"XV-XVII","histoire":"Deux châteaux à Montlaur celui de Montlaur et celui de Barrots    Le château Les BARROTS situé dans la ville de Montlaur, de Guido Rachetto, vous accueille tous les jours de la semaine, toute l'année dans un cadre exceptionnel.                                                                                                                                                        MONTLAUR  Le château de Montlaur, au sommet de la colline, au-dessus du village, fut un pied-à-terre de Catherine de Médicis. Sa construction initiale remonte au temps des Cathares. Il est inscrit aux monuments historiques en 1982.","architecture":"Le château de Montlaur, avec des tours en encorbellement. Sa défense était assurée depuis les 4 tours en poivrière placées dans les angles.Un château fort devait exister avant la construction Renaissance. Des vestiges en sont encore visibles autour de l'ancien moulin, remanié sous Napoléon III, le château de Montlaur remonte aux XVIe et XVIIe siècles, au sommet de la colline, au-dessus du village. Il est en parfait état, fait de brique rouge. Sa construction initiale remonte au temps des Cathares. Il est inscrit aux monuments historiques en 1982.  L'édifice se compose d'un avant-corps central, de deux ailes en retour, un bâtiment de communs. Les transformations du XIXe siècle ont fait disparaître les échauguettes d'angle ainsi que la tour remplacée par une chapelle. Les meneaux ont été retirés des fenêtres. Le mur à créneaux fermant la cour a été remplacé par une grille. A l'intérieur, un salon conserve ses papiers peints du XIXe siècle, représentant les principaux monuments de Paris.                                                                           Château les Barrots quadrilatère avec des corps de logis sur soubassement à deux niveaux  et attiques flanqué dans chaque angles  de pavillons carrés saillant de quatre niveaux avec toit peu élevés à quatre pans, escalier en fer à cheval  pour accéder à l'étage.","habitants":"Famille de Guido Rachetto\r\n        \"","divers":"Château de Montlaur et les Barrots","gps":"","images":["../../jctruffet.com/image/image_31/31_Montlaur_31_1.jpg","../../jctruffet.com/image/image_31/31_Montlaur_31_2.jpg","../../jctruffet.com/image/image_31/31_Montlaur_31_3.jpg","../../jctruffet.com/image/image_31/31_Montlaur_31_4.jpg","../../jctruffet.com/image/image_31/31_Montlaur_31_5.jpg","../../jctruffet.com/image/image_31/31_Montlaur_31_6.jpg","../../jctruffet.com/image/image_31/31_Montlaur_31_7.jpg"]},"Consult_chateau_formulairedffa":{"id":"Consult_chateau_formulairedffa","dept":"31","canton":"Pechbonnieu","commune":"Montpitol","nom":"Montpitol","type":"Château","periode":"XII-XV","histoire":"MONTPITOL, au Moyen-Âge faisait partie de la seigneurie de Verfeil. Jusqu'à la croisade des Albigeois (1208-1229) la puissante famille de Portal, adeptes du catharisme, était seigneurs de Montpitol et entretenait le fort dont seul un lieu-dit dominant le village sur la route des crêtes rappelle l'existence. En 1215 Simon de Montfort se fait attribuer les terres du comte Raymond VI de Toulouse protecteur des cathares et le revenu du fief de Verfeil dont fait partie Montpitol est alors attribué aux évêques de Toulouse. En 1278, Bérenger de Portal obtient la restitution de ses biens. L'avancée de la Réforme protestante au début du XVIe siècle permit à Jehan de Portal dit le Jeune de recouvrer en dot les propriétés de Montpitol mais pas la seigneurie et son droit de haute et basse justice qui restèrent à l'archevêque de Toulouse. Le 5 août 1595, Anne de Levis, duc de Ventadour, lieutenant-général pour le roi Henri IV de la province du Languedoc, dans sa lutte contre les ligueurs sur le chemin de Lavaur à Toulouse, assiégea et brula le fort de Montpitol dont les consuls furent pendus \"pour avoir oser soutenir le canon !\". En 1733, Jacques Duilhé, bourgeois de Toulouse et propriétaire à La Soulade fut anobli par le capitoulat de Toulouse. Il devint alors coseigneur de La Soulade et rajouta à son patronyme le nom de fief de Saint-Projet.","architecture":"Le fort de Montpitol fut  édifié au moment de la Guerre de Cent Ans pour défendre les villageois contre la menace anglaise et les mercenaires. Des murailles de terre édifiées et entretenues par les habitants, entouraient les maisons. En 1570, sous la conduite de l'amiral de Coligny, s'emparaient des forts qu'ils trouvaient sur leur passage qui n'étaient défendus que par quelques paysans mal armés et sans expérience militaire.  En 1574, ils réparaient celui de Montpitol avec les matériaux de l'église qui avait été saccagée récemment par les huguenots.","habitants":"Famille de Portal\r\n        \"","divers":"Château de Montpital et de Prats -Vidal","gps":"","images":["../../jctruffet.com/image/image_31/31_Montpitol_1.jpg","../../jctruffet.com/image/image_31/31_Montpitol_2.jpg","../../jctruffet.com/image/image_31/31_Montpitol_3.jpg","../../jctruffet.com/image/image_31/31_Montpitol_4.jpg"]},"Consult_chateau_formulaire11bd":{"id":"Consult_chateau_formulaire11bd","dept":"31","canton":"Saint-Gaudens","commune":"Montréjeau","nom":"Montréjeau","type":"Château","periode":"XVI-XVIII","histoire":"Plusieurs châteaux à Montréjeau celui  de Valmirande (voir article ) de Gourdan, le palais de la baronne de Lassus  et à  cinq kilomètres au Nord-Est le château de Bordes de Rivières.                                                                                                    MONTREJEAU, demeure traditionnelle de la noblesse (famille Baron de Lassus) : hôtel particulier construit en retrait de la voie publique, il s'ouvre sur une cour d'honneur encadrée des communs et du logis du maître. Les 19 et 20 septembre pour les journées européennes du patrimoine, le patrimoine du XXIe siècle est à l'honneur. À Montréjeau l'hôtel de Lassus s'intègre dans ce patrimoine réhabilité. Une histoire d'avenir, bien que construit au XVIIIe siècle il sera réhabilité au fil des siècles, il a été un petit séminaire de 1929 jusqu'à 1970. Aujourd'hui rénové il abrite les bureaux de la communauté de communes, Sous le patio de l'Office de tourisme intercommunal sera présenté une exposition photographique «le patrimoine de nos communes» Ses animations sont gratuites et accessibles à tous.                                                     BORDES La RIVIERE pas d'information historique.","architecture":"Château de la baronne de Lassus, de plan en U à trois niveaux et lucarnes  toit en ardoise en croupes avec tour à clocheton sur la partie centrale.                                                                                                                             Dans le piémont pyrénéen, charmant château de Bordes de Rivière du XVIII-XIXe siècle, flanqué d'une tour sur sa façade Est, d'environ 460 m² en 12 pièces principales, et une grande ferme voisine.","habitants":"Famille Baron de lassus)\r\n        \r\n        \"","divers":"Château de la Baronnede Lassus et de Bordes la Rivière","gps":"","images":["../../jctruffet.com/image/image_31/31_Montrejeau_1.jpg","../../jctruffet.com/image/image_31/31_Montrejeau_2.jpg","../../jctruffet.com/image/image_31/31_Montrejeau_3.jpg","../../jctruffet.com/image/image_31/31_Montrejeau_4.jpg","../../jctruffet.com/image/image_31/31_Montrejeau_5.jpg"]},"Consult_chateau_formulairedd35":{"id":"Consult_chateau_formulairedd35","dept":"31","canton":"Muret","commune":"Muret","nom":"Montégut_Ségla","type":"Château","periode":"XVI","histoire":"MONTEGUT-SEGLA, l'histoire commence avec la famille de Ségla, héritière et propriétaire de terres. Bernard de Ségla puis de son fils Louis qui en 1669 dénombre les terres de Ségla dans le livre terrier de Muret. En 1725, l'unique descendante de cette famille de Ségla épouse à l'age de 16 ans un Montégut; . Cette Jeanne de Montégut reste une des figures les plus marquantes puisqu'elle est connue aussi pour son uvre littéraire et poétique. Jeanne de Montégut mourut en 1752, et avec elle disparut le doux et nostalgique épicurisme campagnard attaché au lieu. Les Montégut comme beaucoup de familles aristocratiques avaient eu des charges au parlement de Toulouse. Or l'affaire Calas avait contribué à donner des parlementaires toulousains une image d'aristocrates obscurantistes et fanatiques de l'ancien régime. Lorsque la Révolution durcit ses positions en 1794, ils furent des victimes toutes désignées. Des charrettes de parlementaires partirent alors de Toulouse pour rejoindre Paris, le tribunal de Fouquier-Tinville et enfin la guillotine. Les Lecomte du château de Daulin, les Ortet de Ribonnet de Beaumont sur Lèze, les Méric de Montgazin de Saint Sulpice, les Lespinasse du château de Lacombe, tous devaient périr avec les deux descendants de Jeanne de Montégut, l' érudit Jean François et son fils Philibert. Montégut-Ségla entrait alors dans une période de deuil.","architecture":"Montségut, magnifique demeure en briques et galets du XVI  chargée d'histoire. de plan rectangulaire à deux niveaux et attiques pavillon d'escalier saillant plein cintre avec sortie d'un étage sur toit, toitures en croupes avec protection,  flanqué de tours hors oeuvre à chaque angles à toits plats, escaliers à vis, vitraux, salle des templiers, cachots, cachet et authenticité sont répartis en 16 pièces principales développant de très beaux volumes: réception de 90 m², 9 chambres entre 15 et 40 m², de nombreuses salles de bains. Très beau parc arboré et paysagé de 2 hectares avec son espace piscine, pool-house et dépendances, en bord de Garonne. Pour tout amateur de vie de famille, hôtellerie, chambres d'hôtes.","habitants":"Famille de Segla\r\n        \r\n        \"","divers":"Château de Montégut-Ségla","gps":"","images":["../../jctruffet.com/image/image_31/31_Montegut_Segla_1.jpg","../../jctruffet.com/image/image_31/31_Montegut_Segla_2.jpg","../../jctruffet.com/image/image_31/31_Montegut_Segla_3.jpg","../../jctruffet.com/image/image_31/31_Montegut_Segla_4.jpg","../../jctruffet.com/image/image_31/31_Montegut_Segla_5.jpg"]},"Consult_chateau_formulaire0eb9":{"id":"Consult_chateau_formulaire0eb9","dept":"31","canton":"Revel","commune":"Mourvilles-Hautes","nom":"Mourvilles","type":"Château","periode":"XVII","histoire":"Deux châteaux à Mourvilles  celui de Mourvilles et le château de Biés.                                                                                          MOURVILLES, château  du XVIIe siècle en briques  La tour crénelée rappelle que Mourvilles Hautes était à lorigine une forteresse ou le maréchal de Joyeux avait établi une garnison. Cette configuration de la tour et des étoiles qui la surmontent est un rappel des armes du général de la Plane ou figurent une tour crénelée surmontée de trois étoiles. Le fond azur, couleur du ciel, est aussi la couleur du pastel qui est à lorigine de la prospérité du Lauragais.   \r\nà Mourvilles Basses : le château de la famille de Villèle, lune des plus anciennes du Lauragais, remontant aux Croisades ; au XIIIe siècle, les frères de Villèle sont seigneurs de Nailloux et cathares, et se font inhumer au cimetière hérétique de Montesquieu.  Le château de la famille de Villèle est établi au bord de la vallée de la Marcaissonne à mi-pente d'un coteau dans un grand parc (environ 40 hectares).\r\nLe château de Biés, Il fut la résidence de Bertrand de Varagnes, fils dArnaud de Baziège , seigneur de Mourvilles Hautes et Belesta . Sa devise « Nulli cedo « a été reprise dans le blason de la commune.","architecture":"Mourvilles, la façade nord ne semble pas de la même époque que celle du sud, cette dernière semble antérieure et présente notamment deux clefs d'arc énigmatiques, à la porte principale et à celle de l'aile ouest, ornées de masque d'un art des plus primitifs lesquels détonnent dans un ensemble Louis XIV.  Le château est une grosse maison des champs qui résulte de l'extension, vers 1700, d'un premier édifice des années 1580 dont les dispositions architecturales se rattachent à une famille de châteaux élevés en pays toulousain pendant les guerres de Religion. Au XIXe siècle, les intérieurs du château furent réaménagés par le comte de Villèle ministre de Louis XVIII puis de Charles X. Construction d'une chapelle funéraire de style néo-gothique, et de deux ensembles de communs.                                                                                                                                      Biés plus maison fortes que château bâtiment quadrangulaire à deux niveaux  flanqué de tours rondes.","habitants":"Famille de Villèle\r\n        \"","divers":"Château de Mourvilles et maison forte de Bies","gps":"","images":["../../jctruffet.com/image/image_31/31_Mourvilles_1.jpg","../../jctruffet.com/image/image_31/31_Mourvilles_2.jpg","../../jctruffet.com/image/image_31/31_Mourvilles_3.jpg","../../jctruffet.com/image/image_31/31_Mourvilles_4.jpg","../../jctruffet.com/image/image_31/31_Mourvilles_5.jpg"]},"Consult_chateau_formulaire9cb7":{"id":"Consult_chateau_formulaire9cb7","dept":"31","canton":"Castanet Toulousan","commune":"Caujac","nom":"Moussens","type":"Château","periode":"XIX","histoire":"MOUSSENS, le château de Moussens sera le joyau de votre couronne, celui qui la fera briller de mille feux ! Votre réception de princesse se déroulera dans une vaste salle spacieuse et lumineuse, de 400m2 . Son architecture chaleureuse saura vous séduire : des briques foraines de types Lauragais, des arcades romanes et une charpente apparente dépoque. Le magnifique château rend tous vos désirs possibles notamment celui de loger votre famille dans une partie de son corps dhabitation aménagé tout juste à cet effet !   tenu par la famille Darnaud.","architecture":"Moussens du XIXe siècle constitué dun bâtiment principal avec deux tours carrées à toits à quatre pans très pointu  corps dhabitation rectangulaire avec aile en retour d'équerre aménagée en hébergement. Le bâtiment à l'écart en arcade au premier est la salle de restauration.","habitants":"Famille Darnaud\r\n        \"","divers":"Château de Moussens et sa salle","gps":"","images":["../../jctruffet.com/image/image_31/31_Moussens_1.jpg","../../jctruffet.com/image/image_31/31_Moussens_2.jpg","../../jctruffet.com/image/image_31/31_Moussens_3.jpg","../../jctruffet.com/image/image_31/31_Moussens_4.jpg","../../jctruffet.com/image/image_31/31_Moussens_5.jpg","../../jctruffet.com/image/image_31/31_Moussens_6.jpg","../../jctruffet.com/image/image_31/31_Moussens_7.jpg"]},"Consult_chateau_formulaire5184-2":{"id":"Consult_chateau_formulaire5184-2","dept":"31","canton":"Muret","commune":"Muret","nom":"Muret_31","type":"Château","periode":"","histoire":"Trois châteaux à Muret  château de Cadeilhac, de Montégut Ségla (voir article), de Rudelle (voir article). À une époque où les entités féodales notamment le comte de Toulouse et ses alliés qui croient encore pouvoir jouer un rôle dans la maîtrise des espaces méridionaux sur les deux versants des Pyrénées, les seigneurs du nord de la France, lancés dans la croisade contre les Albigeois, tentent de s'imposer dans le sud et d'éradiquer le catharisme.\r\nMURET, le 12 septembre 1213,  le Roi Pierre II d'Aragon venu en renfort des forces occitanes locales, perd la vie. Cette défaite des troupes occitano-aragonaises annonça l'annexion du Languedoc à la couronne de France et la fin du catharisme. Marc-Antoine Muret, humaniste, (1526-1585). Château Lacombe. Des martyrs nous ont précédées  : les carmélites font allusion à Pierre-Antoine, marquis de Lespinasse et son fils Guillaume, les propriétaires du château de Lacombe, qui furent guillotinés en 1794, à Paris. Le domaine quitte la famille de Lespinasse en 1859 et passe aux mains de plusieurs propriétaires privés. Les derniers le transforment en ferme. L'architecte Jean Montier, qui a édifié l'aéroport de Blagnac, des quartiers neufs et la halle de Muret, a transformé le château en monastère, tout en conservant des éléments de la demeure du XVIIe siècle.","architecture":"le château de Cadeilhac, de Lagardelle, de la Masquère, de Saint-Germier. les châteaux  sont inscrits sur la liste des monuments historiques.\r\n  Les vestiges du château des comtes du Comminges, édifié au début du XIIe siècle et détruit en 1624 sur ordre de Louis XIV.                                     MURET La construction des fortifications de Muret, commencée au Xe siècle, poursuivie aux XIe et XIIe siècle a surtout été l'uvre, au XIIIe siècle, de l'évêque de Carcassonne à qui Simon de Montfort avait confié la ville qu'il avait conquise sans trop de résistance en 1212.","habitants":"Marquis de Lespinasse \r\n        \"","divers":"le château de Cadeilhac, de Lagardelle, de la Masquère, de Saint-Germier et de  Rudelle  à Muret","gps":"","images":["../../jctruffet.com/image/image_31/31_Muret_31_1.jpg","../../jctruffet.com/image/image_31/31_Muret_31_2.jpg","../../jctruffet.com/image/image_31/31_Muret_31_3.jpg","../../jctruffet.com/image/image_31/31_Muret_31_4.jpg","../../jctruffet.com/image/image_31/31_Muret_31_5.jpg","../../jctruffet.com/image/image_31/31_Muret_31_6.jpg","../../jctruffet.com/image/image_31/31_Muret_31_7.jpg","../../jctruffet.com/image/image_31/31_Muret_31_8.jpg"]},"Consult_chateau_formulaire0b54":{"id":"Consult_chateau_formulaire0b54","dept":"31","canton":"Toulouse","commune":"Toulouse","nom":"Neil","type":"Palais","periode":"XIX","histoire":"PALAIS-NIEL, lorsque, sous le Second Empire, on décida d'organiser les grands commandements et de placer à leur tête un maréchal de France, Toulouse fut désignée pour recevoir le chef de l'armée régionale du Sud (sixième grand commandement militaire). Le maréchal Adolphe Niel l'inaugura en 1859, au retour de la campagne d'Italie. L'hôtel Duranti était alors le siège du quartier général et le maréchal Niel s'y installa. Très vite, on admit la nécessité de lui trouver une installation plus en rapport avec sa fonction et son prestige. La décision de lui construire un palais fut alors prise.\r\nLe Palais Niel a donc été construit sur les anciennes fortifications de Toulouse. Une partie des habitations classées insalubres ont été détruites pour la construction du palais et l'aménagement de la place Saint-Jacques. Les travaux furent exécutés de 1863 à 1868 et le 1er janvier 1868, le comte de Goyon, nouveau commandant du 6e corps d'armée, prit possession de la demeure car, ironie du sort, le maréchal Niel, devenu entre temps ministre de la Guerre en 1867, ne résidera jamais dans le palais qui porte son nom et mourra en 1869.","architecture":"Ce capitaine, d'origine toulousaine, fournit les plans d'ensemble du bâtiment, dont la construction démarre sous le règne de Napoléon III, juste après la construction de l'aile Rivoli du Louvre et de l'Opéra Garnier. Sa particularité demeure dans ses diverses influences architecturales.\r\nBâti sur trois niveaux, le bâtiment principal sera critiqué, notamment pour son entrée, jugée trop petite par rapport à l'ensemble, ce qui peut paraître excessif car il est osé de prétendre qu'une entrée plus grande aurait donné plus d'harmonie à la façade. Fait rare dans la région, la toiture mansardée est en ardoise, ce qui n'est pas sans rappeler l'influence de l'architecture parisienne.  La façade Nord, côté place Montoulieu, sévère et martiale, est complétée par deux ailes en retour qui délimitent la cour d'honneur.  L'entrée, encadrée par des colonnes doriques, évoque un arc de triomphe. Une frise de trophées et de casques en souligne l'aspect militaire. Henri Mauriette, professeur aux Beaux-Arts, sculpta le fronton qui couronne l'étage. Il nous montre ainsi \"France couronnée de lumière entre la guerre et la paix\", ainsi que Minerve et les arts. Quant aux fenêtres, l'ornement a été réalisé par Calmettes.\r\nLa façade Sud s'ouvre sur les jardins et le Jardin du Grand-Rond en s'intégrant harmonieusement à ce cadre. Le péristyle confère à cette façade un aspect prestigieux et élégant. Le fronton curviligne sculpté par le Toulousain Charles Ponsin-Andarahy représente d'aimables motifs au milieu de symboles militaires et agricoles (allusion peut-être à l'économie toulousaine). À noter les génies de la guerre, sculptés par Alphonse Azibert.","habitants":"Maréchal Adolphe Niel \r\n        \"","divers":"le palais Niel à Toulouse","gps":"","images":["../../jctruffet.com/image/image_31/31_Niel_1.jpg","../../jctruffet.com/image/image_31/31_Niel_2.jpg"]},"Consult_chateau_formulaire0fd9":{"id":"Consult_chateau_formulaire0fd9","dept":"31","canton":"Auterive","commune":"Noè","nom":"Noè_Capèle","type":"Château","periode":"XVI-XVIII","histoire":"NOE, les seigneurs de Noé qui ont des possessions multiples, au Fousseret ou à Ox, sinstallent à LIsle de Noé (Gers) au XVIIe siècle et cèdent leur territoire à un conseiller au parlement de Toulouse, François de Chaubard, en 1680. Sa fille épouse un membre de la famille Lecomte, qui devient et reste propriétaire jusquà la Révolution. En 1814, les troupes anglaises de lord Wellington traversent Noé, ainsi que celles du maréchal Soult qui passe une nuit au château. De 1680 à 1806, elle appartient à la famille de Chaubard, puis aux Leconte. Elle devient  ensuite la propriété de Germain Théodore Abolin, membre du conseil  des Cinq-Cents. Son fils Jean Bernard la conserve jusquen 1873, date à laquelle elle est rachetée par la municipalité pour être transformée en presbytère.                                                                                                                            CAPELE,  Raymond Joseph de Capèle, né en 1811 et mort en 1874, acquiert un important domaine terrien sur lequel il fait construire ce château. Le nom des Capèle ou Capelle apparaît dans divers registres toulousains dès le début du XVIe siècle. En 1602, Philippe de Capèle exerce la fonction de capitoul, titre porté par les magistrats de Toulouse. Il est également procureur au Sénéchal et à la Cour, conseiller et secrétaire daudience du roi à la chancellerie de Toulouse. Il fait figure de fondateur dune petite dynastie locale, qui détient la seigneurie dOx au début du XVIIe siècle jusquà la Révolution. Propriétaire Isabelle Claudel, petite fille dHenri de Capèle.","architecture":"Noé, du château primitif subsiste une grande bâtisse rectangulaire sélevant sur trois étages, sorte de tour trapue et massive. Demeure seigneuriale des Noé du XIe siècle à 1680, elle est accolée à léglise, avec laquelle ont communique directement avant le XIXe siècle.                                                                                 Capèle, Il est édifié en deux temps par larchitecte de la ville de Toulouse, auteur de léglise Saint-Aubin. La dernière partie date de 1895. Lensemble composite est inspiré par plusieurs styles, dont celui de la Renaissance toulousaine. Le résultat final montre cependant une certaine homogénéité.","habitants":"Famille Lecomte  Noè.                                                                               Famille de  Philippe de Capèle \r\n        \r\n        \r\n        \"","divers":"château de Noé et autre aux environ  à Mauzac et Capens","gps":"","images":["../../jctruffet.com/image/image_31/31_Noe_Capele_1.jpg","../../jctruffet.com/image/image_31/31_Noe_Capele_2.jpg","../../jctruffet.com/image/image_31/31_Noe_Capele_3.jpg","../../jctruffet.com/image/image_31/31_Noe_Capele_4.jpg","../../jctruffet.com/image/image_31/31_Noe_Capele_5.jpg","../../jctruffet.com/image/image_31/31_Noe_Capele_6.jpg"]},"Consult_chateau_formulaire5800":{"id":"Consult_chateau_formulaire5800","dept":"31","canton":"Cazères","commune":"Cazères","nom":"Palaminy_Cazères","type":"forteresse","periode":"XIII","histoire":"Trois châteaux à  Cazères dont celui de Cazères , de Palaminy et de Montbéraud.                                                                                                                 PALAMINY, compte parmi les bastides fondées par Sicart-Aleman, sénéchal du comte de Toulouse, en 1250-1260, Palaminy devient seigneurie directe de Philippe le Hardi.   Au cours des périodes suivantes, les rois de France demeurent co-seigneurs de Palaminy. Le château de Palaminy a été construit au XIIIe siècle par Sicart-Aleman, sénéchal du comte de Toulouse Raymond VII de Toulouse et son successeur Alphonse de Poitiers. Le château a vu se succéder de grandes familles de la région : par mariage à Gaston de Phébus,  les LIsle dArbéchan,  par héritage  à Paul de Fontaines en 1499, toujours par héritage aux de  Tersac baron de Montberaud, etc. Au XVIIIe siècle, un conseiller au parlement de Toulouse en fait lacquisition : Samuel Eimar, qui est à lorigine de la famille de Palaminy. On doit à Samuel de Palaminy en 1951 la restauration de la façade du corps de logis et la création de lactuel parc à la française. La famille d'Eimar de Palaminy est propriétaire depuis dix générations.                                                                                                                                                MONTBERAUD, une famille seigneuriale incarne le Volvestre de cette époque: les Tersac-Gensac. Du nord au sud, ils ont des droits partout, sur les  châteaux, les églises et les villages. Le centre de gravité de leur seigneurie passe au XIVe siècle de Tersac au bord de Garonne à Montberaud au cur du vieux pays. Ils connaissent leur heure de gloire au XVIe siècle quand les Tersac de Montberaud dirigent avec succès la résistance catholique aux offensives protestantes venues du Daumazan voisin.","architecture":"Cazères     Au XVIe siècle, un autre château est construit à langle nord-est de la ville, près de la porte de Mondavezan. Il est en briques, darchitecture Renaissance. Vendu comme bien national en 1792, puis  démoli en 1853, il en reste les murs nord et Est et deux gargouilles donnant sur la place.                                                                                         Palaminy est construit en briques rouge et galets de Garonne, avec plan en damier et des murailles en galets.  Le château constitue l'angle nord ouest de la bastide et a intégré dans ses murs l'enceinte primitive  octogonale.  Le bâtiment se présente comme un quadrilatère irrégulier cantonné de tours massives aux angles de plans carrées, sauf l'angle sud est occupé par une tour carrée en encorbellement du XVIIe siècle. Les façades présentent des percements de différentes époques.  De l'autre côté de la rue, la maison La Roucat et la maison du Tilleul à corrondages, complètent l'ensemble.    Les bâtiments actuels, construits en briques et en galets de Garonne, sorganisent autour dune cour rectangulaire : à louest, le corps de logis principal avec ses deux tours dangle est dominé par une tour centrale et sa mirande, « les quatre vents ». Les fenêtres Renaissance sont en partie celles de lagrandissement du château vers 1560. Une haute et élégante échauguette décore langle sud-est.                                                                                     Montbéraud    De leur grand château quadrangulaire, il ne reste de médiéval que lénorme motte et la tour mage de langle ouest. Les autres bâtiments disposés autour dune petite cour rectangulaire sont plus tardifs, et certains mêmes postérieurs aux guerres de religion comme laile sud-est avec sa terrasse qui souvre sur les Pyrénées.","habitants":"Famille  de Palaminy\r\n        \r\n        \"","divers":"Château de Palaminy, de Montbéraud et de Cazères.","gps":"","images":["../../jctruffet.com/image/image_31/31_Palaminy_Cazeres_1.jpg","../../jctruffet.com/image/image_31/31_Palaminy_Cazeres_2.jpg","../../jctruffet.com/image/image_31/31_Palaminy_Cazeres_3.jpg","../../jctruffet.com/image/image_31/31_Palaminy_Cazeres_4.jpg","../../jctruffet.com/image/image_31/31_Palaminy_Cazeres_5.jpg","../../jctruffet.com/image/image_31/31_Palaminy_Cazeres_6.jpg","../../jctruffet.com/image/image_31/31_Palaminy_Cazeres_7.jpg","../../jctruffet.com/image/image_31/31_Palaminy_Cazeres_8.jpg","../../jctruffet.com/image/image_31/31_Palaminy_Cazeres_9.jpg"]},"Consult_chateau_formulairea17f":{"id":"Consult_chateau_formulairea17f","dept":"31","canton":"Toulouse-7","commune":"Pibrac","nom":"Pibrac","type":"Château","periode":"XII-XVI","histoire":"PIBRAC, une histoire familiale riche de plus de 500 ans. Le château : Joyau de la Renaissance Italienne,  en 1516 passe par alliance à la famille de Faur, en 1540, Pierre du Faur président au parlement de Toulouse confie à lillustre Nicolas Bachelier la transformation de lancienne place forte en château dapparat.  Pibrac na donc pas échappé à linfluence italienne, ce qui en fait aujourdhui lun des plus bel exemple darchitecture « Renaissance italienne » du sud de la France. Un chroniqueur de lépoque, après la visite de Catherine de Médicis et de Marguerite de Navarre à Guy du Faur de Pibrac, a ces mots pour parler du château de Pibrac « bien que de taille modeste. Pibrac qui est resté en permanence dans la famille des Faur de Pibrac, accueille aujourdhui la fondation Bemberg et lacadémie des Jeux floraux.","architecture":"Le château de Pibrac, classé monument historique, offre une architecture magnifique au cur du pays toulousain, de style Renaissance est construit en brique rouge, il présente  trois corps de logis de même niveau formant un plan en  U, au fond le corps de logis principal reste du manoir primitif couronné de faux mâchicoulis et de deux échauguettes.  La tour centrale est à pans coupés et les angles intérieurs sur la cour comportent des échauguettes. Le château lui-même est constitué d'un corps central ancien et d'ailes construites en 1540. L'aile nord est flanquée d'une tour ronde à terrasse et comporte une tourelle d'escalier. Le second étage de l'aile sud comporte une galerie à jour ou mirande.  Une des pièces, dite le « cabinet des Quatrains », possède des voûtes ornées de sujets mythologiques datant du XVIe siècle, des plafonds à solives apparentes moulurées ou peintes ont été conservés, et la cheminée de briques de la salle basse est ornée d'un grand cartouche Renaissance. Le portail qui date du XVIe siècle présente une voûte à trois cintres. Il est surmonté d'une petite terrasse et flanqué de deux pavillons carrés réunis par un fronton triangulaire et accotés d'un mur couronné par quatre pylônes reposant sur une corniche ouvragée. Le parc du château de Pibrac. Il a été dessiné dans un style très épuré par le paysagiste Eugène Bühler en 1897, avec des terrasses, un bassin et des massifs arborés sur 14 ha.","habitants":"Famille de Pierre Duèze\r\n        \"","divers":"Château de Pibrac","gps":"","images":["../../jctruffet.com/image/image_31/31_Pibrac_1.jpg","../../jctruffet.com/image/image_31/31_Pibrac_2.jpg","../../jctruffet.com/image/image_31/31_Pibrac_3.jpg","../../jctruffet.com/image/image_31/31_Pibrac_4.jpg","../../jctruffet.com/image/image_31/31_Pibrac_5.jpg","../../jctruffet.com/image/image_31/31_Pibrac_6.jpg","../../jctruffet.com/image/image_31/31_Pibrac_7.jpg"]},"Consult_chateau_formulaireea23":{"id":"Consult_chateau_formulaireea23","dept":"31","canton":"Portet sur Garonne","commune":"Pins-Justaret","nom":"Pins_Justaret","type":"Château","periode":"XVI","histoire":"PINS-JUSTARET, le nom de Justaret est mentionné pour la première fois en 1034, dans l'acte de partage passé entre Pierre évêque de Girone et Roger 1er son neveu, comte de Foix, le hameau se trouvant sur la ligne de partage.\r\nEn 1124, Odon de Pins fait don à l'église d'une partie de ses terres. Justaret attire beaucoup les paysans pour défricher et mettre en valeur le sol. En 1296, le comte de Comminges donne des terres près de Muret à Odon de Pins, constituant ainsi la seigneurie de Pins. Ce dernier mourut sans descendance en 1298, abandonnant ainsi ses terres à la famille de son frère aîné : Bernard de Pins.   Les Justaretois sont alors  agriculteurs, mais également pêcheurs et bateliers. La vie de la commune s'organise durant l'époque moderne autour du château des seigneurs de Pins, maîtres du terroir et des nombreuses métairies .Justaret se transforme alors doucement en une  commune résidentielle.","architecture":"Depuis la Révolution, la commune s'agrandit ; elle étend son influence sur les hameaux alentours et prend le nom de Pins Justaret. La vie agricole et artisanale domine encore jusqu'au milieu du XXe siècle, où Pins Justaret se transforme alors doucement en une  commune résidentielle. Deux châteaux dont la mairie  de plan rectangulaire à deux niveaux sur soubassement important à toits en croupes presque plats, le deuxième  la façade se présente avec un corps de logis à un niveau et attiques flanqué au centre d'un pavillon se terminant par une lucarne au deuxième étage  avec fronton triangulaire, sur les flans  deux tours carrées à deux étages avec toit  à quatre pans.","habitants":"seigneurs de Pins\r\n        \"","divers":"Château à Pins-Justaret","gps":"","images":["../../jctruffet.com/image/image_31/31_Pins_Justaret_1.jpg","../../jctruffet.com/image/image_31/31_Pins_Justaret_2.jpg","../../jctruffet.com/image/image_31/31_Pins_Justaret_3.jpg"]},"Consult_chateau_formulaire4d98":{"id":"Consult_chateau_formulaire4d98","dept":"31","canton":"Portet sur Garonne","commune":"Pinsaguel","nom":"Pinsaguel","type":"Château","periode":"XVIII","histoire":"PINSAGUEL-BERTIER, en 1418, Jacques Ysalguier seigneur de Pinsaguel, complète les défenses du château. Son descendant Jean dYsalguier vend en 1494 ce fief à Simon de Bertier, maître des eaux et forêts du Languedoc. Cette famille le conservera  pendant cinq siècles. En acquérant le château, il hérite des conflits latents avec la communauté de Portet concernant la possession dun Ramier au terroir dit de la pointe acquis autrefois par le seigneur dYsalguier. Le différend durera longtemps et au XVIIe siècle, il en est encore question dans une reconnaissance de 1612 où les consuls de Portet reprochent une fois encore au seigneur de Bertier la possession du Ramier.  Le marquis François de Bertier décide à partir de 1754 de démanteler lancien château et de construire une nouvelle demeure. elle appartient aujourd'hui à madame Lot de Laurencin, petite fille du dernier du marquis de Bertier-Pinsaguel.","architecture":"Bertier, construit vers le XIIIe siècle, sur des fondations romaines, la forteresse de Pinsaguel occupait une position stratégique, au confluent de l Ariège et de la Garonne, les vieux actes la qualifiaient de « Forteresse » et de « clé du pays de Foix » Elle était considérable,  un corps carré avec une tour à chaque angle, le donjon au milieu, deux tours à lentrée du pont-levis, entourée de fossés et de remparts de défense.\r\nElle fût démantelée par François de Bertier en 1754.  Comme il nous apparaît aujourdhui, le corps de logis du château Bertier Pinsaguel, en forme de U, avec ses deux ailes est daté du milieu du XVIIIe siècle. Son architecture est de style néoclassique. La construction a intégré les deux tours carrées du château médiéval primitif. Il est établi sur une cave et des fondations qui pourraient également être médiévales ou antérieures.\r\nLes plans du rez-de-chaussée et du 1er étage sont réguliers et fonctionnels : Au centre, les pièces de vie et de réception avec au 1er étage la galerie distribuant les chambres. Laile arrière comprend, sur 2 niveaux, les appartements du châtelain et de la châtelaine.  Laile Garonne est dédiée à la domesticité avec notamment la grande cuisine du domaine et la chapelle. Du parc, la façade du château pourrait être de caractère médiéval ou Renaissance, dominée par les deux tours carrées et limposante toiture du corps de logis.","habitants":"Famille de Simon de Bertier\r\n        \"","divers":"Château de  Pinsaguel","gps":"","images":["../../jctruffet.com/image/image_31/31_Pinsaguel_1.jpg","../../jctruffet.com/image/image_31/31_Pinsaguel_2.jpg","../../jctruffet.com/image/image_31/31_Pinsaguel_3.jpg","../../jctruffet.com/image/image_31/31_Pinsaguel_4.jpg","../../jctruffet.com/image/image_31/31_Pinsaguel_5.jpg"]},"Consult_chateau_formulaire48ea":{"id":"Consult_chateau_formulaire48ea","dept":"31","canton":"Portet sur Garonne","commune":"Portet sur Garonne","nom":"Portet","type":"Château","periode":"XVIII","histoire":"Quatre châteaux à  Portet, de Ficat, de Clairfont et de Palarin et de la Creuse (voir article).                                                                                                                                           FICAT, ce château qui a vu le jour en 1738 appartenait à un avocat du parlement maître Belly qui possédait de plus des terres sur la commune, la propriété passa ensuite entre les mains de la famille De Bosque et  De Laforcade. le magnifique parc entretenu entre autres par la famille Pasqualon. Sur une aile du château visible depuis le square Mitterand sont incrustées  les armoiries de deux familles. Le professeur Ficat se porta ensuite acquéreur de cette propriété entretenue jusquen 2013 par la famille et qui vient de la céder à la ville de Portet. La municipalité a plusieurs projets pour redonner une vie à ce havre de verdure et de calme.\r\nPORTET, dépendait en 961 des comtes de Toulouse. Chef-lieu de baylie, puis de châtellenie. Passage de larmée du Prince Noir en 1355. Charte de coutumes en 1391. Assiégé et pris par Matignon en 1595. Tentative de passage de la Garonne par les Anglais en 1814, déjouée par le général Ritay.  Le quartier du Récébédou.   Vers 1560, la propriété de noble Jehan de Gilbert, receveur des Jugeries de Rivière-Verdun, est appelée par la population  « la ferme du receveur ». Le nom restera à ce territoire, de terres agricoles et forêt, en bord de Garonne. À la Révolution, vendu comme bien national, il est acquis en 1791 par l'aubergiste toulousain Daumont, qui rénove les bâtisses de la métairie, qui deviendront le château de Clairfont.","architecture":"Ficat, le domaine Ficat attenant à léglise paroissiale sétend de lavenue des bosquets vers la rue Désiré et la rue Saintigny et avait lobjet dun droit de préemption par lancien maire François Péraldi qui avait souhaité sauvegarder ce lieu unique du centre-ville au grand dam de promoteurs éventuels. Les transactions viennent dêtre menées à leur terme par Thierry Suaud malgré quelques réticences ce qui réjouira les anciens qui connurent lépoque dorée du château et son parc ainsi que les nouveaux portésiens qui découvriront cette oasis de verdure unique peut-être lors de la journée du patrimoine. Portet de plan en U  avec deux corps de logis en équerre à trois niveaux toit en croupes  flanqué d'échauguettes carrées en angle et à l'opposé une tour carrée à quatre niveaux toit à quatre pans avec tour encastré  au trois quart sur l'angle interne à trois niveaux avec terrasse.                                                                                                                                                         Portet de plan en équerre à trois niveaux,  toit en croupes flanqués d'échauguettes et accolé d'une tour ronde mis hors oeuvre de quatre étages à toit en poivrières.","habitants":"Maître Belly \r\n        \"","divers":"Château de Portet, de Ficat et de Clairfont.","gps":"","images":["../../jctruffet.com/image/image_31/31_Portet_1.jpg","../../jctruffet.com/image/image_31/31_Portet_2.jpg","../../jctruffet.com/image/image_31/31_Portet_3.jpg","../../jctruffet.com/image/image_31/31_Portet_4.jpg","../../jctruffet.com/image/image_31/31_Portet_5.jpg"]},"Consult_chateau_formulaire3ef4":{"id":"Consult_chateau_formulaire3ef4","dept":"31","canton":"Leguevin","commune":"Pradère les Bourguets","nom":"Pradères","type":"Château","periode":"XVIII","histoire":"Trois châteaux à Pradères les Bourgets,de Foudade, de Las-Néous  gites de France de François et Bernadette de la Fage et Claouère.                                                                                                                PRADERES, le XVIe siècle connut un certain repeuplement et vit la construction de nombreux châteaux. Mais les guerres de religion causèrent à leur tour des dommages importants dans le secteur  carré-vert. Dautres bâtiments sont éparpillés sur le territoire, notamment des grandes propriétés, patrimoine architectural de la commune, comme le château de Las Néous, le domaine de Claouère. Les châteaux, les anciens domaines agricoles, les pigeonniers, sont autant de repères visuels de qualité dans le paysage.                                                                                                                 FAUDADE, occupant un château privé bicentenaire, le château de Faudade vous accueille à proximité des Pyrénées,  Las Néous et Claouère pas d'information historique A  5 kilomètres à l'ouest à la limite du département de Ste-Livrade un château dont je n'ai aucune information.","architecture":"Las Néous, quadrilatère à deux niveaux pavillons d'entrée saillant plein cintre en façade avec fronton triangulaire édifice flanqué de quatre tours carrées au angles avec des toits à quatre pans et jolie pigeonnier à l'extérieure carrée sur galeries à arc et lanternon sur toit à quatre pans . CLaouère de plan rectangulaire à deux niveaux flanqué de tours carrées.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Château de Las Neous et de Claouère à Pradères les bourgets.","gps":"","images":["../../jctruffet.com/image/image_31/31_Praderes_1.jpg","../../jctruffet.com/image/image_31/31_Praderes_2.jpg","../../jctruffet.com/image/image_31/31_Praderes_3.jpg"]},"Consult_chateau_formulaire13f5":{"id":"Consult_chateau_formulaire13f5","dept":"31","canton":"Escalquens","commune":"Préserville","nom":"Préserville","type":"Château","periode":"XVII","histoire":"PRESERVILLE, en effet, une autre commune a été érigée à l'Est, à la limite des terres des anciennes seigneuries de Préserville et de Barthecave la commune de Villèle. Cette communauté d'habitants très ancienne englobe les secteurs de Calmontet et des Hugous, aujourd'hui commune de Tarabel, fief des seigneurs de Villèle, une des plus anciennes familles du Lauragais. Vers 1800, Villèle disparaît en tant que \"commune\". La quasi-totalité de son territoire est rattaché à celui de Préserville,","architecture":"Il se compose de plusieurs « lieux » : une superbe bâtisse avec deux petits donjons aux airs de château romantique, de plan rectangulaire à deux niveaux et attiques flanqué de tourelles carrée en encorbellement sur façade.","habitants":"Seigneuries de Préserville \r\n        \r\n        \r\n        \"","divers":"Château de Préserville","gps":"","images":["../../jctruffet.com/image/image_31/31_Preserville_1.jpg","../../jctruffet.com/image/image_31/31_Preserville_2.jpg","../../jctruffet.com/image/image_31/31_Preserville_3.jpg","../../jctruffet.com/image/image_31/31_Preserville_4.jpg"]},"Consult_chateau_formulaire0a61":{"id":"Consult_chateau_formulaire0a61","dept":"31","canton":"Revel","commune":"Lanta-Valleseville","nom":"Pujolet","type":"Château","periode":"XVII","histoire":"PUJOLET  famille Pujolet;  Marie-Jean-Louis-Jacques-Joseph-Maurice  en 1851.  Hortense-Eugénie Conti en 1862- Hélène en 1884  Henri de Martrin-Donos en 1878  aujourd'hui  à la famille de Sartres  de Salis.","architecture":"A La fin du XVIe siècle, Jean Lombrail, marchand drapier, capitoul, achète les terres du Pujolet avec les bâtiments qui en dépendent. Une maison de maître, qui est qualifiée de château en 1659, est alors édifiée sur ses terres. Il en subsiste les deux tours en pavillon flanquant l'entrée de la cour d'honneur et une partie des communs. Vers 1735, construction du château actuel, les communs sont réaménagés autour d'une vaste cour carrée. Un beau pavillon, semblable à l'aile ouest du château, abrite une magnanerie et sans doute le logement du régisseur. Bâtie en briques recouvertes d'un enduit imitant la pierre, la demeure se présente comme un château à la française avec une seule enfilade de pièces. La façade sur la cour d'honneur possède un avant-corps de trois travées couronnées d'un fronton triangulaire et scandées d'une superposition de pilastres doriques et ioniques. La façade donnant vers le jardin est rythmée par des chaînages de bossages lisses, la travée centrale est ornée d'un fronton semi circulaire sur pilastres ioniques jumelés.                                                         BOUSQUET de plan en U à deux niveaux deux tour carrées saillantes en façade possédant un étages supplémentaires avec fenêtres jumenées et mâchicoulis, toit plats, l'ensemble prolongé de chaque côté par un bâtiment à deux étages avec terrasse.","habitants":"Famille de  Jean Lombrail\r\n        \"","divers":"Château de Pujolet à Lanta","gps":"","images":["../../jctruffet.com/image/image_31/31_Pujolet_1.jpg","../../jctruffet.com/image/image_31/31_Pujolet_2.jpg","../../jctruffet.com/image/image_31/31_Pujolet_3.jpg"]},"Consult_chateau_formulaire94ba":{"id":"Consult_chateau_formulaire94ba","dept":"31","canton":"Cazères","commune":"Puymaurin","nom":"Puymaurin","type":"Château","periode":"XIX","histoire":"PUYMAURIN, est perché sur un vallon du Comminges. Cette très belle demeure fin XIXe siècle, fleuron du village de Puymaurin, sera vendue aux enchères à Toulouse le 22 mai. Les actuels propriétaires y avaient installé quatre chambres d'hôtes. Bâtie en éventail sur un vallon dominant le paysage du Comminges, entre Lisle-en-Dodon et Boulogne-sur-Gesse,  ce ravissant château sera vendu aux enchères  par le tribunal de grande instance de Toulouse. Après avoir tenté de céder à l'amiable cette demeure d'exception, les propriétaires sont forcés de s'en séparer. «Ce château a appartenu autrefois à la famille de Franlieu, qui s'en est séparé, il y a une cinquantaine d'années. L'édifice a été laissé à l'abandon. Il a changé de main à plusieurs reprises. Il y a eu différents projets comme d'installer des bungalows dans le parc. Depuis, le château de Puymartin a été en partie rénové. Les propriétaires actuels en ont fait l'acquisition, il y a 7 ou 8 ans. Ils y ont ouvert un restaurant, et plusieurs chambres d'hôtes de charme. Le château est entouré d'un parc , qui donne une vue dominante sur la chaîne des Pyrénées.","architecture":"Ce château  du XIXe siècle, est une demeure située près du village dont la façade Napoléon III contraste de façon insolite avec l'environnement bucolique, bâtie en éventail sur un vallon dominant le paysage du Comminges,  de plan rectangulaire à trois niveaux avec lucarnes sur un toit brisé, en façade au centre un avant corps en semi tour hors oeuvre et pavillon  central saillant sur la façade arrière toit en fronton triangulaire avec balcon au premier étage.","habitants":"Famille de Franlieu\r\n        \"","divers":"Château de Puymaurin","gps":"","images":["../../jctruffet.com/image/image_31/31_Puymaurin_1.jpg","../../jctruffet.com/image/image_31/31_Puymaurin_2.jpg","../../jctruffet.com/image/image_31/31_Puymaurin_3.jpg"]},"Consult_chateau_formulaire6e79":{"id":"Consult_chateau_formulaire6e79","dept":"31","canton":"Toulouse-11","commune":"Ramonville","nom":"Ramonville","type":"Château","periode":"XVI-XVIII","histoire":"Plusieurs châteaux à Ramonville  dont celui de Montjoie, de Bellevue (voir article), de Ramonville, de la Soule et d'Aubuisson.                                                                MONTJOIE,le domaine de Montjoie propose un hôtel de charme.             RAMONVILLE,                                                                                                               La SOULE dit château de la comtesse, château Pailhès. Construit pour Balthazar de Boutaric, conseiller au parlement de Toulouse, qui avait acheté cet ancien domaine au roi en 1695. Le château est vendu à monseigneur Loménie de Brienne, en 1776, pour en faire une résidence d'été des archevêques de Toulouse. Il est vendu comme bien national à la Révolution. Il est propriété de la mairie de Ramonville-Saint-Agne depuis 1999.                                                                                                                                 AUBUISSON, dit château Latécoère. Il appartient avant la Révolution à la famille d'Aubuisson, vieille famille de noblesse d'épée. Au début du XXe siècle il appartient à lindustriel Pierre Latécoère, créateur de la ligne aérienne Toulouse-Dakar et constructeur davion.","architecture":"Dans le cadre de la réhabilitation du château de Soule, La bâtisse en brique, relativement sobre, les deux échauguettes , édifiées fin du XVIIe siècle à lorigine de la construction et détruites depuis, vont être réintégrées à la bâtisse principale.  Cet objet, une plaque mobile sur son axe qui peut prendre des formes diverses et qui est fixée aux sommets des toitures, \r\nAubuisson, le château se devine au fond de son parc. Un pigeonnier de la comtesse datant du XVIIe siècle se trouve au lieu-dit Dralet. Il est inscrit aux monuments historiques. On en avait fait à tort, un supposé moulin à pastel.                                                                                                                       Ramonville  compte sur son territoire en plus du château de Bellevue pas d'information, La première mention d'un domaine agricole sur ce lieu date de 1571. Le château actuel présente une façade sobre sur deux niveaux, couronnés d'une balustrade. La travée centrale, couronnée d'un fronton, joue le rôle d'avant-corps. La façade arrière offre des dispositions similaires. Deux courtes ailes en retour contiennent les escaliers d'accès à l'étage.","habitants":"Seigneurs locaux\r\n        \r\n        \r\n        \"","divers":"Château d'Aubuisson de Montjoie, de la Soule et de Ramonville.","gps":"","images":["../../jctruffet.com/image/image_31/31_Ramonville_1.jpg","../../jctruffet.com/image/image_31/31_Ramonville_2.jpg","../../jctruffet.com/image/image_31/31_Ramonville_3.jpg","../../jctruffet.com/image/image_31/31_Ramonville_4.jpg","../../jctruffet.com/image/image_31/31_Ramonville_5.jpg","../../jctruffet.com/image/image_31/31_Ramonville_6.jpg"]},"Consult_chateau_formulairecd0c-2":{"id":"Consult_chateau_formulairecd0c-2","dept":"31","canton":"Toulouse","commune":"Toulouse","nom":"Reynerie","type":"Château","periode":"XVI","histoire":"REYNERIE, le domaine se situe à cheval sur la terrasse haute et  basse de Lardenne, autrefois dans le capitoulat de St-Simon. Il est au XVIe siècle propriété des familles Deymier et Labatut, il passe au XVIIe siècle entre les mains des Reynier qui lui laissent leur nom. Le domaine échoit à la fin du XVIIIe siècle au conseiller en parlement de Toulouse Pierre Marie de Reversac de Celès de Marsac. Celui-ci léchange en 1781 avec Guillaume du Barry (1732-1811) contre l'ancien duché gascon de Roquelaure et le château du Rieutort. Le nouveau propriétaire va transformer le lieu et en faire une folie qui est lune des plus belles réalisations de la fin du XVIIIe siècle à Toulouse.  En remerciement de sa complaisance dans son mariage avec Jeanne Bécu en 1768, Louis XV verse à Guillaume une généreuse pension, le titre de colonel d'infanterie, et le don (en fait une vente fictive) de l'ancien duché de Roquelaure. Sa fortune est désormais faite, il peut alors planifier la rénovation de ce domaine. Entre 1781 et 1783, il fait bâtir un nouveau château et s'attache tout particulièrement à la décoration du bâtiment et à laménagement des jardins. Vendus en 1812 au décès de Guillaume, le domaine change plusieurs fois de mains au cours du XIXe siècle. Son aspect est modifié.   Le 23 octobre 2008, au terme dune vente aux enchères, la mairie de Toulouse sest portée acquéreur de la partie du domaine comportant le château et son orangerie.","architecture":"Le château de la Reynerie du XVIe siècle forme un rectangle régulier. Les façades occidentales et orientales sont rythmées par sept travées. Du côté cour, la façade possède un avant-corps peu marqué ou prennent place trois portes-fenêtres qui éclairent un grand vestibule. La façade orientale, donnant sur le jardin est agrémentée d'une rotonde qui souligne l'emplacement du grand salon. Les refends horizontaux ornent toutes les façades. Çà et là s'ajoutent des arcades de pierre et des guirlandes de pierres sculptées. L'ensemble est surmonté d'une puissante    corniche et d'un garde-corps agrémenté de balustres. Linfluence de larchitecture parisienne est bien visible, seuls les matériaux employés rappellent le caractère toulousain de la construction. Le bâtiment des communs, qui était l'ancien château du XVIIIe siècle avait été réaménagé par Guillaume Dubarry. Les anciens appartements furent reconvertis en cuisine, lavoir, office et autres pièces de service, seuls furent conservés l'appartement du concierge, la chapelle, son vestibule, l'appartement du prêtre et la sacristie. Un passage couvert avec une galerie en bois reliait la cuisine à la salle à manger du nouveau château. La ferme de son côté comprenait des vastes écuries, et également un chai, un fouloir, une forge, une tonnellerie et des greniers. Les communs ont aujourd'hui disparus, la ferme et l'orangerie ont été reconstruits, son aspect est modifié. La partie supérieure du parc est réaménagée à l'anglaise, les communs et la chapelle sont détruits.","habitants":"Familles Deymier et Labatut\r\n        \"","divers":"Château de a Reynerie","gps":"","images":["../../jctruffet.com/image/image_31/31_Reynerie_1.jpg","../../jctruffet.com/image/image_31/31_Reynerie_2.jpg","../../jctruffet.com/image/image_31/31_Reynerie_3.jpg","../../jctruffet.com/image/image_31/31_Reynerie_4.jpg"]},"Consult_chateau_formulairef842":{"id":"Consult_chateau_formulairef842","dept":"31","canton":"Auterive","commune":"Beaumont sur Léze","nom":"Ribonnet","type":"Château","periode":"XV","histoire":"RIBONNET,  Clément Ader : aventurier de la téléphonie et pionnier de l'aviation,  acheta et restaura  le château de Ribonnet   et produit son propre vin Il modifia, améliora le vignoble et remplaça les plants détruits par le phylloxéra par des plants hybrides.    Peu avant sa mort en 1923, Clément Ader a vendu la propriété à une famille belge. C'est en 1974 que Christian Gerber, issu d'une famille dagriculteurs suisses, reprend le domaine. et Gerber Christian digne successeur de son glorieux viticulteur.","architecture":"Ribonnet construit au XVe siècle est un château de style féodal et néo-gothique avec un corps de logis rectangulaire à deux niveaux sur soubassement, pavillon d'entrée plein cintre en façade avec fronton triangulaire au niveau du toit ce dernier à deux pans, sur façade latérale une tour à trois niveaux octogonal a créneaux et bretèches sur partie extérieure accolé d'une tourelle en encorbellement sur angle intérieure avec toit pointu à six pans et quatre autres échauguettes  à chaque angles de bâtisse.","habitants":"Clément Ader \r\n        \"","divers":"Château de Ribonnet","gps":"","images":["../../jctruffet.com/image/image_31/31_Ribonnet_1.jpg","../../jctruffet.com/image/image_31/31_Ribonnet_2.jpg","../../jctruffet.com/image/image_31/31_Ribonnet_3.jpg","../../jctruffet.com/image/image_31/31_Ribonnet_4.jpg","../../jctruffet.com/image/image_31/31_Ribonnet_5.jpg","../../jctruffet.com/image/image_31/31_Ribonnet_6.jpg","../../jctruffet.com/image/image_31/31_Ribonnet_7.jpg"]},"Consult_chateau_formulairef0bf":{"id":"Consult_chateau_formulairef0bf","dept":"31","canton":"Bagnères de Luchon","commune":"Roquefort sur Garonne","nom":"Roquefort","type":"Château","periode":"XIX","histoire":"ROQUEFORT,  pendant le Moyen Âge les châteaux de Roquefort, de Ballesta et de Montpezat surveillaient étroitement le défilé que formait le confluent de la Garonne et du Salat.  Des sires de Roquefort  du XIIe siècle assiégé par Simon de Montfort en 1213 passe à une branche de la famille de Comminges dans la seconde moitié du XIVe siècle.  Au XIVe et XVe siècle Roquefort-sur-Garonne dépendait de la châtellenie de Salies-du-Salat.                                                                                                                                         le château de Roquefort dit de TOUSSAN construit autour de 1880 par une riche famille du village   L'avant dernier propriétaire, Victor Toussan, fit carrière dans l'armée au grade de général.  Il possédait également un important domaine agricole qu'un métayer faisait fructifier, en 1974, le château ne présentant plus dintérêt pour lhéritière, fille du général, fut vendu. Cest la commune qui en fit lacquisition. Cest là que se situe  la mairie de Roquefort.  Dans le parc du château sont exposés quelques outils agricoles anciens qui témoignent du passé historique du village.","architecture":"Vestiges du château, cité au XIIe siècle une petite enceinte entourant un  donjon carré  et une seconde enceinte plus récente avec une grosse tour construite sur une arête rocheuse dominant de 114 mètres, le château de Roquefort est un vestige des ouvrages de défense de la vallée de la Garonne.                                                                                                                                          Ce beau château  de Toussan de plan rectangulaire   sur soubassement à deux niveaux  complété par une série de lucarne sur un toit brisé en croupe flanqué sur façade avant de deux tours carrée aux angles cassées toit à quatre pans très pointus.","habitants":"Famille de  Victor Toussan\r\n        \"","divers":"Vestiges du château féodal et château de Toussan à Roquefort-sur-Garonne.","gps":"","images":["../../jctruffet.com/image/image_31/31_Roquefort_1.jpg","../../jctruffet.com/image/image_31/31_Roquefort_2.jpg","../../jctruffet.com/image/image_31/31_Roquefort_3.jpg","../../jctruffet.com/image/image_31/31_Roquefort_4.jpg","../../jctruffet.com/image/image_31/31_Roquefort_5.jpg","../../jctruffet.com/image/image_31/31_Roquefort_6.jpg","../../jctruffet.com/image/image_31/31_Roquefort_7.jpg","../../jctruffet.com/image/image_31/31_Roquefort_8.jpg","../../jctruffet.com/image/image_31/31_Roquefort_9.jpg"]},"Consult_chateau_formulaire44b0":{"id":"Consult_chateau_formulaire44b0","dept":"31","canton":"Portet sur Garonne","commune":"Roquettes","nom":"Roquettes","type":"Château","periode":"XVI-XVII","histoire":"ROQUETTES,   la seigneurie de Muret qui sétend au XIIe siècle jusquen amont du confluent à Roques. Le mariage de Bernard 1er de Comminges et de Dias de Muret en lan 1120 fait passer la seigneurie muretaine dans le comté de Comminges. Dès lors Roquettes, Roques et Saubens sont Commingeois. La châtellenie de Muret aux XIVe et XVe siècles est un ensemble administratif comprenant plusieurs communautés sur lesquelles le comte de Comminges possède des droits directs. En 1534, Roquettes a un seigneur  Jehan de Ulmières. Il possède une très large partie du terroir de la communauté, avec plusieurs métairies. La plupart des habitants travaillent sur le domaine du seigneur.  Jehan de Ulmières possède également une tuilerie, un moulin à blé à deux roues et un autre moulin en « différend » avec Portet. Il a aussi un moulin à pastel. Durant le XIXe siècle plusieurs familles toulousaines (Gavarret-Rouaix, dOrgaix, Marestaing, Lauzun) se succèdent comme propriétaires du château, de Mailles et du Sarret. Roquettes cultive le pastel depuis la fin du XVe siècle. En 1982, Etienne Paumès vend le château, alors très délabré à la commune de Roquettes qui décide en 1986 de le réhabiliter et y installe le centre socioculturel qui sera inauguré le 28 janvier 1989. En 1901, la famille Paumès acquiert la métairie de Mailles et le château qui sera progressivement déserté.  Réhabilité en 1989, le centre socioculturel François Mitterrand reste \"le château\" pour de nombreux Roquettois, devenu le Centre socio-culturel François Mitterrand.","architecture":"Roquettes, a loccasion des travaux de réhabilitation, quelques recherches ont été faites sur les origines de ce bâtiment, ce qui nous a permis de remonter un peu le cours du temps et davoir un aperçu du passé lointain de notre commune. En létat actuel de nos recherches, la date précise de lédification du château nous est inconnue. Nous la situons à la fin du XVIe siècle ou début du XVIIe siècle. De plan quadrangulaire, les corps de logis à deux niveaux avec attiques flanqués de tours carrées en angles  et deux petites tours carrées en entrée.","habitants":"Jehan de Ulmières.\r\n        \"","divers":"Château de Roquettes","gps":"","images":["../../jctruffet.com/image/image_31/31_Roquettes_1.jpg","../../jctruffet.com/image/image_31/31_Roquettes_2.jpg","../../jctruffet.com/image/image_31/31_Roquettes_3.jpg","../../jctruffet.com/image/image_31/31_Roquettes_4.jpg"]},"Consult_chateau_formulairea203":{"id":"Consult_chateau_formulairea203","dept":"31","canton":"Muret","commune":"Muret","nom":"Rudelle","type":"Château","periode":"XVI","histoire":"RUDELLE  le moulin de Rudelle fut la propriété du capitoul Guillaume de Rudelle (1607). Château bâti par Guillaume de Rudelle, fils de Jean de Rudelle, conseiller. En 1783, Ingres père y séjourna et peignit plusieurs plafonds. Cette imposante bâtisse a su traverser les siècles d'histoires en conservant ses charmes d'antan,   est un magnifique hôtel de charme du XVIe siècle qui dispose de tous les atouts. La décoration y est raffinée, les 5 hectares  de jardins fleuris sont somptueux, et leau entoure le domaine pour vous faire rêver.","architecture":"Rudelle, à la Révolution, la propriété est saisie comme bien national et vendue aux enchères, la demeure présente un plan rectangulaire cantonnée, à ses angles, de tours carrées. Côté sud, une tour carrée est en très légère saillie. L'étage supérieur, immédiatement sous le toit, possède, des façades sud et nord, une suite d'arcades en anse de panier. Plusieurs fenêtres à meneaux ouvragés ornent la façade. Le rez-de-chaussée, autrefois occupé par les communs, était indépendant du reste du château. Les étages sont desservis par un escalier à vis en bois.","habitants":"Famille de  Guillaume de Rudelle\r\n        \r\n        \r\n        \"","divers":"Château de Rudelle","gps":"","images":["../../jctruffet.com/image/image_31/31_Rudelle_1.jpg","../../jctruffet.com/image/image_31/31_Rudelle_2.jpg","../../jctruffet.com/image/image_31/31_Rudelle_3.jpg"]},"Consult_chateau_formulaire0e84":{"id":"Consult_chateau_formulaire0e84","dept":"31","canton":"Saliès de Salat","commune":"Saliès de Salat","nom":"Saliès_Salat","type":"Château","periode":"XV-XVII","histoire":"Quatre châteaux à Saliès du Salat  outre les vestiges de Saliès (voir article suivant) ces châteaux se trouvent aux environ de la cité, celui de His , de Montsaunès de Cassagne et de Touille.                                                                                                                                     CASSAGNE,  dès 1272 on signale l'existence de consuls, ancêtres des conseils municipaux. Cassagne faisait alors partie du Comté de Comminges et relevait plus directement au point de vue administratif de la châtellenie de Salies.. Il nous en reste le château de Sarradas que la tradition fait remonter au règne d'Henri IV et la maison Hugues où l'on peut encore voir l'emplacement de fenêtres à meneaux.                                                                                                             HIS pas d'information historique.                                                                                     TOUILLE, les Montpezat, seigneurs de Touille, possédaient la forge-aciérie. Dès le XIIIe siècle, la forge  de Touille était la plus importante des Pyrénées centrales. Grâce à la proximité de lAriège,  la commune pouvait facilement se fournir en fer de bonne qualité,  elle  devint une forge   artisanale vers le milieu du XVIIIe siècle et sindustrialisa  au début du XIXe siècle. François Lasvignes donna son nom à la forge en 1829.                                                                                                                                                                                                                                                              MONTSAUNES, à la fin du XIIIe siècle, les templiers de Montsaunès octroyèrent des libertés et franchises à plusieurs villes et dépendances de la commanderie. Après la suppression de l'Ordre du Temple, Montsaunès devint une des principales commanderie de l'Ordre de l'Hôpital, avec ses dépendances à Mazères-sur-Salat. Une fois sous possession hospitalière, la commanderie porta son attention sur ses fortifications jugées insuffisantes, et Raymond de Lescure, grand prieur de Toulouse, fit élever à partir de 1397, un fort composé de maisons entourées d'un mur de défense.","architecture":"Cassagne, l'édifice  de plan rectangulaire à trois niveaux flanqué sur le toit en croupe de quatre tourelles et une tour polygonale sur l'arrière.                                                                                                                                                             His, corps de logis rectangulaire flanqué de pavillon d'entrée mis hors oeuvre cintré dans les angles de la façade plate balconnet à chaque étages avec fronton triangulaire au dessus du toit, l'édifice est accolé de deux tours hexagonale à trois niveaux  toit pointus à six pans,  cintré sur les deux flans opposées.                                                                                                    Montsaunès,   corps de logis rectangulaire à trois niveaux chaque façades  est flanqué de tour ou de tourelles  seul le côté entrée est muni d'un pavillon carré à deux niveaux  avec lucarne accolé d'une tour hexagonale à trois niveaux toit pointu à six pans                                                                                   Touille de plan rectangulaire à deux niveaux  avec rangée de lucarnes sur toit en croupe  quatre échauguettes sur encorbellement à chaque angles plus deux accolées contre la façade de chaque côté de la porte d'entrée.","habitants":"Comte Compans \r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Cassagne, de His, de Montsaunès et de Touille.","gps":"","images":["../../jctruffet.com/image/image_31/31_Salies_Salat_1.jpg","../../jctruffet.com/image/image_31/31_Salies_Salat_2.jpg","../../jctruffet.com/image/image_31/31_Salies_Salat_3.jpg","../../jctruffet.com/image/image_31/31_Salies_Salat_4.jpg","../../jctruffet.com/image/image_31/31_Salies_Salat_5.jpg","../../jctruffet.com/image/image_31/31_Salies_Salat_6.jpg","../../jctruffet.com/image/image_31/31_Salies_Salat_7.jpg","../../jctruffet.com/image/image_31/31_Salies_Salat_8.jpg","../../jctruffet.com/image/image_31/31_Salies_Salat_9.jpg"]},"Consult_chateau_formulaire8d9e":{"id":"Consult_chateau_formulaire8d9e","dept":"31","canton":"Bagnères de Luchon","commune":"Saliès du Salat","nom":"Saliès_Vestiges","type":"Vestiges","periode":"XII-XIX","histoire":"A Saliès du Salat; la ville fut rattachée à la couronne de France. En 1789, Saliès se rallia à la Révolution et exécuta les directives du pouvoir central. la ville mit en place « les ateliers de charité ». Les archives municipales ne relatent rien de particulier sur lépopée napoléonienne ; toutefois, on ne peut passer sous silence, la carrière militaire du Général Compans, enfant de Saliès, qui combattit sur tous les champs de bataille dEurope.    son histoire est liée à sa fontaine salée et aussi à ses thermes romains toujours en activité ; on y trouve des piscines à contre-courant pour y faire des cures. Les seigneurs de Saliès appartenant à la lignée du comté de Comminges, puis au sires de Montpezat au  XVe siècle, le château comtal était considéré autrefois comme l'un des plus puissants de la région mais avec les différents conflits finirent par aboutir au démantèlement de la forteresse   Alexandre d'Anouilh de Saliès, descendant des seigneurs  au XVIIIe siècle, Alexandre Danouilh (ou d'Anouilh) de Saliès (1815-1883) est connu pour ses travaux historiques et archéologiques en Vendômois, notamment sur les châteaux de Lavardin et de Vendôme (entre 1865 et 1879), pour une histoire de Foulques Nerra (1874). En 1877, l'abbé Roussel le nommera rédacteur en chef de La France illustrée, revue de l'Orphelinat d'Auteuil. Enterré au cimetière d'Auteuil.","architecture":"De la forteresse il reste quelques ruines et le donjon,   la colline du château des comtes de Comminges. Sa plate-forme, inclinée vers lest, garde les vestiges daménagements successifs. Une muraille épaisse dun mètre et parfois doublée dun fossé comme à louest et dont il reste que des lambeaux, en faisait le tour. Elle abritait une superficie de 2 ha 70 environ. Cest un édifice rectangulaire (7,25 x 5,75 m), aux murs épais à la base (plus de 1m 40), autrefois divisé en plusieurs niveaux de planchers. A lorigine, on y accédait au nord par une porte qui desservait le premier étage ; cette porte murée a été remplacée, au même niveau, par une porte à lest. Lappareil des murs peu soigné, sauf aux angles, en fait un édifice du XIIIe siècle. La motte est entourée sur trois côtés par un fossé quun pont-levis permettait de franchir au sud. Dans les années 1970, une « fouille » a montré quelle était aussi couronnée par une enceinte de forme semi-circulaire, à lintérieur de laquelle des murs délimitent un ensemble de petites pièces. La mauvaise qualité de la « fouille » na pas permis de les dater de façon précise, mais leur occupation, en particulier par un atelier monétaire, ne semble pas dépasser le milieu du XVe siècle.                                                                                      Le château Compans du XIXe : remanier la bâtisse familiale de Pont de Prades est un château « au style troubadour » de lépoque.","habitants":"Seigeurs locaux\r\n        \r\n        \r\n        \"","divers":"Vestiges du château de Saliès -Salat","gps":"","images":["../../jctruffet.com/image/image_31/31_Salies_Vestiges_1.jpg","../../jctruffet.com/image/image_31/31_Salies_Vestiges_2.jpg","../../jctruffet.com/image/image_31/31_Salies_Vestiges_3.jpg","../../jctruffet.com/image/image_31/31_Salies_Vestiges_4.jpg","../../jctruffet.com/image/image_31/31_Salies_Vestiges_5.jpg"]},"Consult_chateau_formulaire74bd":{"id":"Consult_chateau_formulaire74bd","dept":"31","canton":"Léguevin","commune":"La Salvetat-Saint-Gilles","nom":"Salvetat","type":"Forteresse","periode":"XII-XV","histoire":"La SALVETAT, vers 1088, Raymond de Saint-Gilles, pense à prévenir les invasions qui pourraient se renouveler. Aussi, il lance la construction du château à La Salvetat Saint-Gille Raymond IV (sixième du nom) quitta sa forteresse en 1096 pour la terre sainte et laissa derrière lui son château, pour seul édifice féodal témoin de la dynastie des comtes de Toulouse. Ce n'est qu'au XIVe siècle qu'il est fait mention d'un chevalier, Bertrand Tournier, seigneur de la Salvetat St-Gilles. En 1481, Guillaume Lamarche, secrétaire du Roi et propriétaire des lieux y fit tenir les séances du parlement au chateau. Au XVIe siècle ce sont les Rigaud qui héritent du titre de seigneur de la Salvetat-St Gilles, puis les Lombrail (Pierre de Lombrail est conseiller du Roi et membre du parlement de Toulouse). Le domaine sera d'ailleurs vendu en 1729 à Nicolas de Reversat de Celès, doyen du Parlement de Toulouse. Son héritier sera guillotiné à Paris durant la Révolution et le château sera vendu.  C'est au début du XXe siècle que la toiture du donjon (escalier) fut remplacée par une terrasse à créneaux. Le château fut cédé en 1936 à la famille qui en est aujourdh'ui propriétaire. Depuis, il n'a pour ainsi dire jamais été habité et laissé à l'abandon. Le château n'aura été classé monument historique que le 6 août.","architecture":"le château de La Salvetat-Saint-Gilles, donjon quadrangulaire, remanié au XVIIIe siècle  est aujourd'hui fortement menacé. A l'abandon depuis de nombreuses décennies, sa toiture laisse désormais pénétrer l'eau et les dégâts sont de plus en plus importants. Si la charpente a été consolidée il y a quelques années, certaines parties se sont déjà effondrées et ce sont désormais les murs qui commencent à fléchir.\r\nToutefois, le propriétaire a décidé de s'en séparer et il faut désormais trouver comment prendre en charge la sauvegarde de ce monument unique et chargé d'histoire.  La magnifique tour théâtrale à 3 niveaux de coursives avec ses arches de briques n'est pas sans rappeler la tour de l'hôtel Jean de Pin, au centre de Toulouse, reconstruit au XIX, et qui aurait pu s'en inspirer. Cette tour, dont le premier étage est ornée de voûtes et de fresques a sans doute été créé à la Renaissance.  Si de nombreux éléments semblent hérités de la Renaissance (fenêtres à meneaux, arches, voûtes, fresques au pochoir, escalier monumental ), la façade sud a quant à elle traversé le millénaire et date certainement de sa période féodale comme en témoignent les larges arches dominées par des mâchicoulis ainsi que les meurtrières à archers.","habitants":"Famille de  Guillaume Lamarche,\r\n        \"","divers":"Château de la Salvetat","gps":"","images":["../../jctruffet.com/image/image_31/31_Salvetat_1.jpg","../../jctruffet.com/image/image_31/31_Salvetat_2.jpg","../../jctruffet.com/image/image_31/31_Salvetat_3.jpg","../../jctruffet.com/image/image_31/31_Salvetat
