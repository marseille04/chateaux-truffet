_4.jpg","../../jctruffet.com/image/image_31/31_Salvetat_5.jpg"]},"Consult_chateau_formulaire1e30":{"id":"Consult_chateau_formulaire1e30","dept":"31","canton":"Saint-Gaudens","commune":"Sarremezan","nom":"Sarremezan","type":"Manoir","periode":"XV","histoire":"SARREMEZAN, pas d'information historique.","architecture":"Le château se compose d'une grosse tour polygonale dont les baies portent les caractéristiques architecturales du XVe siècle, d'une petite aile en retour qui semble dater de la même époque, et d'un troisième bâtiment du XVIIIe ou du début du XIXe siècle. Il s'agit des vestiges d'un château-fort dont la courtine et sans doute d'autres bâtiments ont été détruits. La tour contient un escalier à vis. La façade ouest s'ouvre par une porte ornée d'une accolade à crochets encadrés de pinacles.","habitants":"Seigneur local\r\n        \"","divers":"Château de Sarremezan","gps":"","images":["../../jctruffet.com/image/image_31/31_Sarremezan_1.jpg","../../jctruffet.com/image/image_31/31_Sarremezan_2.jpg"]},"Consult_chateau_formulaired8fa":{"id":"Consult_chateau_formulaired8fa","dept":"31","canton":"Cazères","commune":"Savères","nom":"Savères","type":"Château","periode":"XVI","histoire":"SAVERES, les hospitaliers sont vite remplacés par la famille de Touges qui demeure au castrum dont on ne connaît toujours pas la date de la construction du château la famille de Touges demeure au castrum dont on ne connaît toujours pas la date de la construction du château de Savères. En 1277, Willem de Touges partage sa seigneurie avec Bernard VI, alors Comte de Comminges, ainsi jusquen 1714, Savères possède deux seigneurs, ce château vient d'être remanié par son propriétaire le baron de Saint-Blanquat.\r\nEn 1790, la commune de Savères fait partie du canton de Rieumes.","architecture":"Le château de Savères dont la construction remonte au XVIe siècle, remanié au XVIIe siècle. Cependant il fut remanié plusieurs fois avec notamment la construction dune tour au début du XXe siècle. Laile nord fut détruite par un incendie en 1924.La métairie ; cette ferme du XIXe siècle servait dhabitation au régisseur du château.   Construction en briques, comprenant un rez-de-chaussée et un étage pour le corps central, et deux ailes. Les montants des fenêtres sont réalisés par assises alternées de pierre et de brique,meneaux cruciformes.","habitants":"Famille de Touges \r\n        \r\n        \"","divers":"Château de Savères","gps":"","images":["../../jctruffet.com/image/image_31/31_Saveres_1.jpg","../../jctruffet.com/image/image_31/31_Saveres_2.jpg","../../jctruffet.com/image/image_31/31_Saveres_3.jpg"]},"Consult_chateau_formulaireae5a":{"id":"Consult_chateau_formulaireae5a","dept":"31","canton":"Blagnac","commune":"Seilh","nom":"Seilh_Percin","type":"Château","periode":"XIV XVII","histoire":"Deux châteaux à Seilh celui de Percin et de Rochemontés    et ( à quelques kilomètres au sud-Est le château de Fenouillet  et de Beauzelle                                                                                                     PERCIN au XIVe siècle faisait partie du fief de Cluez ou de la Tricherie qui appartient à la famille des Guizot. Une partie fut vendue en 1509 au sieur Pierre de Buisson qui en fit don à l'hôpital Saint-Jacques de Toulouse, Les XVIIe et XVIIIe siècles. Dès 1664, la Tricherie après maints changements de propriétaire, appartient au seigneur Jean de Percin.  Sous le règne de Louis XIV en 1660, le seigneur de Percin a le grand honneur de remettre les clés de la ville de Toulouse au roi lui-même à son passage dans la cité. En 1789, époque douloureuse pour la France, et en particulier pour le seigneur Antoine de Percin qui doit faire face à un procès au sujet des ramiers de la vallée de la Garonne. Dès l'An II de la République, notre commune obtient gain de cause et les terrains furent partagés entre les habitants de Seilh. Le seigneur de Percin, alors emprisonné, fit opposition à ce jugement dès sa sortie de prison. La commune, en 1807, est condamnée non seulement à restituer les terrains mais encore à payer une amende, en dédommagement de cette usurpation.\r\nROCHEMONTES, à 1 kilomètre au nord de Seilh, Ces indices ne sont pas suffisants pour rétablir si le château actuel est l'oeuvre des Chalvet avant sa vente en 1661, s'il a été vendu inachevé à Jean-Salvy de Lombrail qui le terminera, ou bien s'il est entiérement bâti après 1661.\r\nL'intérieur du château ne se visite pas car il est toujours habité par la famille    d'Henri de Roaldès-du-Bourg.                                                   FENOUILLET et BEAUZELLE  pas d'information historique.","architecture":"Château de Percin - En 1884, le château de Percin est dans un état de délabrement complet et aux yeux de certains, il est dénué de toute valeur architecturale, corps de logis rectangulaire à trois niveaux toit en  croupes accolé de deux tours  carrées  positionné en quinconce  l'une avec toit pointu à quatre pans l'autre de style pavillonnaire, l'édifice est accolé de bâtiment de dépendance en retour d'équerre à deux niveaux .                                                                                                                           Rochemontés, entièrement bâti en briques, son plan se présente sous la forme d'un rectangle allongé cantonné de quatre tours carrées.  Aux angles de sa façade Est, s'élèvent deux hautes tours à trois étages couverts de flèches pyramidales de maçonnerie ; elles contiennent à chaque niveau une petite pièce carrée à usage de cabinet et conservent quelques dalles de pierres percées de petites meurtrières canonnières. Aux angles de la façade Ouest,  deux tourelles qui reposaient autrefois en encorbellement sur des culs-de-lampe, contiennent des latrines.  Possédant deux étages, elle est rythmée de cinq travées de fenêtres régulièrement espacées et dont les murs d'allège ont été abaissés et munis de balcons de ferronnerie au XIXe siècle. La travée centrale, qui correspond au vestibule, est surmontée d'un petit fronton semi-circulaire orné de trois sphères, la porte d'entrée, sommée du blason des Du Bourg, a été refaite au XIXe siècle. Beauzelle bâtisse à deux niveaux  de plan en U avec tour carrée toit à quatre pans  et pigeonniers","habitants":"Pour Percin seigneur Jean de Percin.                                                       pour Rochemontès Famille des Chalvet.\r\n        \"","divers":"Château de Seilh et de Percin à Percin et de Beauzelle","gps":"","images":["../../jctruffet.com/image/image_31/31_Seilh_Percin_1.jpg","../../jctruffet.com/image/image_31/31_Seilh_Percin_2.jpg","../../jctruffet.com/image/image_31/31_Seilh_Percin_3.jpg","../../jctruffet.com/image/image_31/31_Seilh_Percin_4.jpg","../../jctruffet.com/image/image_31/31_Seilh_Percin_5.jpg","../../jctruffet.com/image/image_31/31_Seilh_Percin_6.jpg","../../jctruffet.com/image/image_31/31_Seilh_Percin_7.jpg"]},"Consult_chateau_formulairec356":{"id":"Consult_chateau_formulairec356","dept":"31","canton":"Escalquens","commune":"Seyre","nom":"Seyre","type":"Château","periode":"XIX","histoire":"SEYRE, la seigneurie  dès le commencement du Xe siècle, sous le roi Charles Le Simple, elle occupait un rang élevé dans la Province. La famille dHautpoul sest divisée en trois branches principales, dont les dHautpoul-Seyre, branche aînée, qui est porteur du titre de Marquis dHautpoul, installée depuis 1715 à Seyre apporté en dot par Marguerite de Vernon.   Parmi les membres de la famille dHautpoul qui se sont illustrés,  cette dernière sest illustrée aussi avec la mort héroïque du marquis Eugène dHautpoul, constructeur de lactuel château de Seyre, victime de son dévouement et de son courage lors de la grande inondation de  1875 à Toulouse. Son fils, Fernand marquis dHautpoul-Seyre épousa Lady Stonor, dame dhonneur de la reine Mary dAngleterre. Faute de descendance, le château et le domaine passèrent à sa sur, qui, morte elle aussi sans enfants, adopta son neveu Gaston de Capèle, père de lactuel propriétaire Edmond de Capèle dHautpoul.  En juin 1940, Seyre vit arriver dans ses murs, un pensionnat denfants juifs réfugiés de Belgique. Ils quittèrent les lieux au printemps 1941 pour le château de la Hille, dans lAriège. 60 ans plus tard, une nombreuse délégation vint apposer une plaque sur les murs de lArsenal en souvenir de la qualité de laccueil reçu de Gaston de Capèle dHautpoul et de sa famille.","architecture":"Cet élégant château du XIXe siècle  le château de Seyre trône au milieu dun grand parc, son impressionnante stature se déploie au cur du pays du pastel. Lespace dune journée et dune soirée, soyez la châtelaine des lieux et émerveillez vos amis avec une réception grandiose ! Laissez-vous enchanter par le charme de cette demeure, par ses mosaïques, ses meubles anciens, ses lustres en cristal et ses vitraux empreints dhistoire. Petit plus que vous offre le château, tous vos invités pourront loger sur place. Corps de logis de plan rectangulaire à deux niveaux sur soubassements, toitures en croupes avec lucarne sur façade d'entrée flanquée d'échauguette sur encorbellement et deux tours carrées rectangulaires accolés sur côte parc avec toit à l'impériale.","habitants":"Famille Capele dHautpoul,\r\n        \"","divers":"Château de Seyre","gps":"","images":["../../jctruffet.com/image/image_31/31_Seyre_1.jpg","../../jctruffet.com/image/image_31/31_Seyre_2.jpg","../../jctruffet.com/image/image_31/31_Seyre_3.jpg","../../jctruffet.com/image/image_31/31_Seyre_4.jpg","../../jctruffet.com/image/image_31/31_Seyre_5.jpg","../../jctruffet.com/image/image_31/31_Seyre_6.jpg"]},"Consult_chateau_formulaire175d-2":{"id":"Consult_chateau_formulaire175d-2","dept":"31","canton":"Muret","commune":"Seysses","nom":"Seysses","type":"Forteresse","periode":"XVII","histoire":"Deux châteaux à Seysses dont celui de Seysses et celui de la Motte.                                                                                            SEYSSES, le baron de Guillermin était conseiller au parlement de Toulouse et seigneur de Seysses. Appartenant à une famille des plus charitables, il était, lui aussi, toujours disposé à venir en aide   le château appartenait à un parent de M. de Guillermin ; ses restes sont aujourdhui la propriété de monsieur Olières ex-adjoint au  maire, monsieur de Guillermin habitait le château qui a été la propriété de monsieur Prévost et que possède aujourdhui son gendre, lunique héritier, M.Daguillon-Pujol, puis au  général M.J. de Marqués. aujourd'hui  le château est transformée en clinique  neuro-psychiatrique.                                                                                                                                                La MOTTE au sud -Est de Seysses,  ce domaine est composé d'un couvent religieux et d'une coopérative agricole. Nous y trouvons donc des champs mais aussi un petit bois et une rivière le Touch. Le couvent, avec son château, son église et sa petite chapelle dans le petit bois existe depuis plus de 60 ans. Il héberge des soeurs religieuses qui peuvent venir de différents pays.","architecture":"Cette forteresse de Seysses  est composé d'un corps central à trois niveaux avec séries d'arcades à anse de paniers aux troisième étage et de lucarnes sur toit brisé accolé de quatre tours carrées deux à toit plats en terrasse et deux à toits pointus très effilé.                                                               La Motte, quadrilatère à trois niveaux sur soubassement à arcades côté parc flanqué de tourelles en angles à toit pointus.","habitants":"Famille de M.de Guillermin\r\n        \"","divers":"Château de Seysses et de la Motte à Seysses","gps":"","images":["../../jctruffet.com/image/image_31/31_Seysses_1.jpg","../../jctruffet.com/image/image_31/31_Seysses_2.jpg","../../jctruffet.com/image/image_31/31_Seysses_3.jpg","../../jctruffet.com/image/image_31/31_Seysses_4.jpg","../../jctruffet.com/image/image_31/31_Seysses_5.jpg","../../jctruffet.com/image/image_31/31_Seysses_6.jpg","../../jctruffet.com/image/image_31/31_Seysses_7.jpg","../../jctruffet.com/image/image_31/31_Seysses_8.jpg"]},"Consult_chateau_formulairece01":{"id":"Consult_chateau_formulairece01","dept":"31","canton":"Bagnères de Luchon","commune":"Saint-Béat","nom":"St_Béat","type":"Château-fort","periode":"XII-XVI","histoire":"St-BEAT, à Saint-Béat, la Garonne a percé un passage étroit dans un verrou glaciaire faisant de ce site dès lantiquité un passage obligé et stratégique. Passage très étroit, Saint-Béat fut appelé par les Romains « Passage des loups »  et il est normal de penser que des premières fortifications ont dû y voir le jour.\r\nLe château actuel lui, date du XIIe siècle et fut construit par les seigneurs de Saint-Béat pour assurer la protection de la cité et le contrôle de la vallée. Il fut agrandi par ses consuls, et sous Henri IV, de même que la cité fut dotée de murailles et de portes. Il fut tenu par des capitaines d'armes jusqu'au XVIe siècle, et au besoin, on n'hésitait pas à réquisitionner les habitants de Melles pour garder la place. Le château neut pas au cours des siècles à supporter de faits militaires importants si bien que ce château nous est parvenu en état.","architecture":"Château fort du XIIe siècle et sa chapelle,  une porte ouverte au pied de ses remparts,  monter au château est une destinée touristique de premier plan, réservant à ceux qui y montent un beau panorama sur le village.  Le château de Saint-Béat est l'une des rares citadelles de la chaîne des Pyrénées, de l'époque féodale qui ne soit pas dégradée.A  été agrandi par Henry IV. Robert Pujol, qui est à l'origine de sa restauration précise: « Les touristes ont, le plus souvent, l'idée d'un château très vaste. Or, au Moyen-Age, ils étaient très petits car nichés sur des nids d'aigle, elle conserve un donjon (dimension 5m x 5m) , un logis seigneurial (on distingue bien lemplacement de la cheminée), sa citerne et ses remparts.   fait cinq mètres sur cinq. On imagine très bien l'espace de défense et les deux étages qui servaient d'habitation au seigneur, l'endroit où était installée la cheminée. Bien placé, le château n'eut pas, dans son histoire, à repousser d'invasions, même s'il fut le théâtre de combats inter-vallées. Néanmoins, sa position était stratégique, « la clef de France » aux portes de l'Espagne.","habitants":"Seigneurs locaux\r\n        \r\n        \r\n        \r\n        \"","divers":"Vestiges du fort de Saint-Béat","gps":"","images":["../../jctruffet.com/image/image_31/31_St_Beat_1.jpg","../../jctruffet.com/image/image_31/31_St_Beat_2.jpg","../../jctruffet.com/image/image_31/31_St_Beat_3.jpg","../../jctruffet.com/image/image_31/31_St_Beat_4.jpg","../../jctruffet.com/image/image_31/31_St_Beat_5.jpg","../../jctruffet.com/image/image_31/31_St_Beat_6.jpg"]},"Consult_chateau_formulaire665f-2":{"id":"Consult_chateau_formulaire665f-2","dept":"31","canton":"Muret","commune":"Saint-Clar de Rivière","nom":"St_Clar_Rivière","type":"Château","periode":"XVII","histoire":"St-CLAR, la commune de Saint-Clar n'est pas assez riche pour acheter cette grande bâtisse  datant des XVIIe et XIXe siècles.  Vestige des charmes des siècles passés, la bâtisse semble figée par le temps, laissée à elle-même, car personne n'a entrepris de gros travaux depuis plusieurs années. Derrière les trois bâtisses, avec un brin de nostalgie, on pourrait presque voir des enfants s'égayer au milieu des arbres centenaires. Sur la façade, en prenant le temps de les regarder, «les masques ou mascarons représentent la comédie, Jean qui rit et Jean qui pleure»  La mairie de Saint-Clar-de-Rivière n'a pas prévu de le racheter.","architecture":"St-Clar a été édifié dans le troisième quart du XVIIIe siècle, le château s'apparente plutôt à une grosse maison de maître avec dépendances. Construit sur plan rectangulaire à quatre tours d'angle, la façade principale sur la rue présente les proportions classiques des maisons du XVIIIe siècle, élévation à deux niveaux séparés par des mouluration de briques et terminés par un bandeau attique, les trois travées centrales sont surmontées par un fronton triangulaire percé d'un oculus. Son originalité consiste dans le parti adopté pour la partie supérieure des quatre tours d'angle: Le plan intérieur est significatif des nouvelles conceptions de la vie familiale et domestique au XVIIIe siècle (pièces  en enfilade sur les façades principales et pièces de service à l'arrière, séparées par un couloir de desserte). Logis agrandi au XIXe siècle. Dans les deux cours de part et d'autre, communs reconstruits autour de 1900.","habitants":"Seigneur local\r\n        \r\n        \r\n        \"","divers":"Château de Saint-Clar de Rivière","gps":"","images":["../../jctruffet.com/image/image_31/31_St_Clar_Riviere_1.jpg","../../jctruffet.com/image/image_31/31_St_Clar_Riviere_2.jpg","../../jctruffet.com/image/image_31/31_St_Clar_Riviere_3.jpg"]},"Consult_chateau_formulaire156f":{"id":"Consult_chateau_formulaire156f","dept":"31","canton":"Cazères","commune":"Saint-Elix le Château","nom":"St_Elix_Chateau","type":"Château","periode":"XVI","histoire":"SAINT-ELIX, château de Saint-Élix, édifié au XVIe siècle, est un fleuron de l'architecture Renaissance en Midi-Pyrénées. Pierre de Potier de la Terrasse, secrétaire de François 1er, capitoul, et président du parlement de Toulouse, le fait construire en 1540. Il compte alors trois niveaux de 500m2, et ses douves sont alimentées par le canal de Saint-Martory.  Domaine de Charles Ledesme, dernier baron de Saint Elix, son histoire est émaillée de hauts faits ou d'étonnantes anecdotes. Il a appartenu  ensuite au cours des siècles à de nombreuses familles dont celle du marquis de Montespan, dont l'épouse était la favorite de Louis XIV, lequel lui donnera huit enfants. Toujours dans la famille du marquis de Montespan. Claude Cambou son actuel propriétaire le fit entièrement restaurer en 1982, et ce pendant huit ans.","architecture":"St-Elix est aujourd'hui dans un état de conservation parfait et témoigne de la grandeur des constructions de la Renaissance, unique dans la région de Toulouse. A mi-chemin entre Toulouse et Saint Gaudens, se situe le majestueux château de Saint-Elix, qui surprend par son style. Bâti sous François 1er par Laurens Clary à la demande de Pierre de Potier, le château fut embelli au fil des siècles par des artistes de renom.  Le château de Saint Elix est un des plus beaux du département construit en 1540 de plan carré flanqué de tours massives  aux angles, des fenêtres à meneaux adoucissent les façades, les beaux toits à forte pente qui le coiffaient ont  été incendiés en 1945. Détruit au début du siècle par les intempéries et  le feu, il fut reconstruit dans les années 80 dans un souci de fidélité très recherché.   Ce château classé monument historique, est composé d'un donjon central flanqué de 4 tours rondes dont deux furent étêtées à la Révolution, et les douves en partie comblées par leurs gravats.","habitants":"marquis de Montespan\r\n        \"","divers":"Château de Saint-Elix le Châteaux","gps":"","images":["../../jctruffet.com/image/image_31/31_St_Elix_Chateau_1.jpg","../../jctruffet.com/image/image_31/31_St_Elix_Chateau_2.jpg","../../jctruffet.com/image/image_31/31_St_Elix_Chateau_3.jpg","../../jctruffet.com/image/image_31/31_St_Elix_Chateau_4.jpg","../../jctruffet.com/image/image_31/31_St_Elix_Chateau_5.jpg"]},"Consult_chateau_formulaireeb88":{"id":"Consult_chateau_formulaireeb88","dept":"31","canton":"Revel","commune":"Saint-Felix-lauragais","nom":"St_Felix_Lauragais","type":"Château","periode":"XIII-XVI","histoire":"ST-FELIX-LAURAGAIS, en 1 150 on parle d'un certain Guillaume de Saint-Félix dont le château figure comme l'un des premiers fiefs du pays Toulousain. C'est au XIe et XIIe siècles que sont mentionnés les premiers seigneurs de Saint-Félix :  Guillaume Jourdain en 1139, Raymond de Castlar en 1144. En 1211 puis repris par Raymond VII avant de retomber dans les mains de Simon de Montfort.  Après la mort de Simon de Montfort, Raymond VII reprit et agrandit le château de 1229 à 1249.   Guillaume de Saint-Félix en 1302.  Il faut attendre 1321 pour que le château soit cité, lorsque le roi de France, Philippe V Le Long, cède la seigneurie de Saint-Félix au frère du pape Jean XXII.  En 1322  Charles IV fait don à Pierre Duèze. Au fil des siècles, la demeure eut donc tour à tour un rôle militaire, protecteur, politique et enfin, il fut dernièrement résidence privée, Saint-Félix et son château furent pris par les croisés. Jean de Caraman descendant d'Arnaud de Duèze épouse en 1427   Isabelle de Foix donnant la ligné des Foix-Caraman, en 1592 la baronnie passe par alliance de la fille Jeanne à Adrien de Montluc, puis leur fille Jeanne épouse  Charles d'Escoubleau marquis de Sourdis, cette famille vend  la baronnie en 1670 à Pierre-Paul de Riquet, le constructeur du canal du midi, en 1712 passe à son intendant au marquis de la Garde de Chambonas , ensuite à  Joseph Mauriès de Mourville à ses descendnats les Mouriès  de Mourville puis les d'Auberjeon qui conserveront  Saint-Félix jusqu'en 1945 .                                                                                                                                         \r\nRacheté par la commune en novembre 2012, le château de Saint-Félix-Lauragais  classé au patrimoine national en 1994,","architecture":"Le château de St-Félix de Lauragais posté en proue d'un éperon rocheux est cité  à partir de 1033. D'abord doté d'une chapelle et d'un donjon carré  imposant, l'édifice  de plan rectangulaire prolongée par une enceinte de murs,  fera l'objet de nombreux aménagements défensifs entre les XIIe et XIVe siècle. C'est à partir du XVIe siècle en suivant le courant de la Renaissance, que la demeure quitte sa fonction de protection pour devenir une véritable résidence avec des grandes fenêtres mais aussi des pièces plus confortables conçues et aménagées entre les XVIe et XIXe. Si l'on ne connaît pas exactement la date de la construction du premier château médiéval, on trouve des traces dans des écrits anciens. Donjon et chapelle furent les deux premiers éléments du château. Le découronnement de ses tours, maintenant au même niveau que les autres bâtiments lui confère un aspect massif et trapu. Il apparaît comme un quadrilatère irrégulier légèrement trapézoïdal (61 m à l'est, 57 m à l'ouest, 34 m au nord et 36 m au sud). Le plan est délimité par toute une série de bâtiments d'époques diverses, château féodal très tôt devenu château de résidence. Terrasses bastionnées, à la cour intérieure où s'exprime cette mosaïque de périodes ainsi qu'à différentes pièces.","habitants":"Guillaume de Saint-Félix \r\n        \"","divers":"Forteresse de St-Felix en Lauragais","gps":"","images":["../../jctruffet.com/image/image_31/31_St_Felix_Lauragais_1.jpg","../../jctruffet.com/image/image_31/31_St_Felix_Lauragais_2.jpg","../../jctruffet.com/image/image_31/31_St_Felix_Lauragais_3.jpg","../../jctruffet.com/image/image_31/31_St_Felix_Lauragais_4.jpg","../../jctruffet.com/image/image_31/31_St_Felix_Lauragais_5.jpg","../../jctruffet.com/image/image_31/31_St_Felix_Lauragais_6.jpg"]},"Consult_chateau_formulaire6e9d":{"id":"Consult_chateau_formulaire6e9d","dept":"31","canton":"Pechbonnieu","commune":"Saint-Giniès","nom":"St_Giniès","type":"Château","periode":"XVI","histoire":"St-GINIES, en 1279 ce dernier cède les fiefs de Saint-Geniès à l'évêque de Toulouse, également seigneur de beaucoup de villages environnants.\r\nAu XVIe siècle, le village entre dans la seigneurie des Berthier. Ces toulousains avaient accédé à la noblesse par les charges municipales en la personne de Guillaume Berthier, capitoul de Toulouse en 1465. Un des descendants, Pierre, évêque de Montauban fut un des plus célèbres prédicateurs de son temps. Il prononça l'oraison funèbre de Louis XIII. Selon toute vraisemblance cest Guillaume III Berthier, seigneur de Saint-Geniès, docteur en droit et secrétaire du Roi, capitoul en 1595, qui fera reconstruire le château. \r\nLe château de Saint-Geniès-Bellevue, ancienne demeure du capitoul Guillaume III Berthier. La famille De Lassus en devint propriétaire en 1742, conservant ce patrimoine, depuis ce jour, de père en fils.","architecture":"La date de construction ne peut être avancée avec précision, mais les historiens la situent entre 1580 et 1600, pendant les années encore troublées qui marquent la fin des guerres de religions.\r\nLe plan primitif est simple : une grosse tour rectangulaire sur laquelle est venu se greffer au sud le corps principal à deux étages orné à l'angle sud-est d'une tourelle montée sur un culot et sans doute couverte en pyramide à l'origine. Du coté sud, il jouxte léglise actuelle, sans doute l'ancienne chapelle du château. Le long de la façade Est, des fenêtres à meneaux à simple section carrée sont encore visibles.  Au XVIIIe siècle, le château est complété par deux ailes latérales mettant en scène la façade principale dont les percements sont alors modernisés. Deux avant-cours, dont l'une est bordée des écuries, précèdent la cour d'honneur.\r\nLensemble du bâtiment à deux étages de brique montre pour seul ornement un fort bandeau soulignant les niveaux. La distribution intérieure est conforme à celle de nombreux châteaux de la fin du XVIe siècle : un escalier à rampes droites et paliers de repos, soigneusement bâti avec des voûtes rampantes, coupe la maison aux deux tiers.\r\nLa façade Est du château, le « théâtre de verdure », lescalier et la cheminée de la grande salle du 1er étage sont inscrits à lInventaire supplémentaire des monuments historiques.","habitants":"Famille de Lassus\r\n        \r\n        \"","divers":"Château de Saint-Giniès","gps":"","images":["../../jctruffet.com/image/image_31/31_St_Ginies_1.jpg","../../jctruffet.com/image/image_31/31_St_Ginies_2.jpg"]},"Consult_chateau_formulaire88ce":{"id":"Consult_chateau_formulaire88ce","dept":"31","canton":"Saint-Gaudens","commune":"Saint-Ignan","nom":"St_Ignan","type":"Château","periode":"XVI","histoire":"ST-IGNAN est  I.T.E.P. L'ESSOR est un établissement,  instituts thérapeutiques,éducatifs et pédagogiques de la ville.","architecture":"Château de plan rectangulaire à deux niveaux avec série de lucarnes sur toits brisés flanqué de quatre pavillons  carrés saillants sur les quatre angles à toit à quatre pans, au centre du toit une tourelle à clocheton.","habitants":"\"","divers":"Château de Saint-Ignan","gps":"","images":["../../jctruffet.com/image/image_31/31_St_Ignan_1.jpg","../../jctruffet.com/image/image_31/31_St_Ignan_2.jpg"]},"Consult_chateau_formulaire3d61":{"id":"Consult_chateau_formulaire3d61","dept":"31","canton":"Castelginest","commune":"Saint-Jory","nom":"St_Jory","type":"Château","periode":"XVI","histoire":"ST-JORY, le XVe siècle vit le début d'une série de luttes et de procès entre le village et la famille des Garrigia de Villeneuve. Les villageois se révoltèrent contre Jean de Garrigia, et ce n'est qu'au XIXe siècle que cessèrent les procès.\r\nSous la domination des Du Faur, un magnifique château Renaissance fut construit. En 1569, les guerres de religion le ruinèrent, lui et l'église.  Pas un personnage de la cour ne venait en Languedoc sans s'arrêter dans ce magnifique château lorsque Saint-Jory était sous la domination de très puissantes familles. Larchitecte toulousain Nicolas Bachelier, engagé par les frères Du Faur, intervient sur la propriété familiale existant depuis le XVe siècle, et y greffe vers 1545 un portail dentrée monumental de style Renaissance. Leur importante valeur ornementale vient palier laustérité de la façade de brique, animée par le seul jeu des percements. Ce bâtiment constitue le seul vestige du château des Du Faur.","architecture":"Ensuite vint la Révolution, et avec le XIXe siècle ses transformations, ses plans d'aménagements.  Le soubassement, avec son bossage et son arc cintré, sinspire des modèles italiens. Leur importante valeur ornementale vient palier laustérité de la façade de brique, animée par le seul jeu des percements. Ce bâtiment constitue le seul vestige du château des Du Faur. Le château de Saint-Jory, le château primitif  a été démoli en 1354 pendant l'invasion anglaise, il fut reconstruit en 1502.","habitants":"les frères Du Faur\r\n        \r\n        \"","divers":"Château de St-Jory","gps":"","images":["../../jctruffet.com/image/image_31/31_St_Jory_1.jpg"]},"Consult_chateau_formulaire90da":{"id":"Consult_chateau_formulaire90da","dept":"31","canton":"Saint-Gaudens","commune":"Saint-Marcet","nom":"St_Marcet","type":"Vestiges","periode":"XII","histoire":"SAINT-MARCET, un château oublié, par quels mystères, lun des plus grands châteaux forts du Comminges a-t-il sombré dans loubli. Si lon doit à la monarchie elle-même sous Henry IV et Louis XIII davoir détruit les places fortes qui pouvaient être susceptible de constituer une menace sur leur autorité, si la noblesse sentichera dès le XVIIe de ces lieux militaires quelle transformera en palais et résidences, si la bourgeoisie en fera de même au XIXe siècle, ceci ne répond que partiellement à la question.\r\nLouvrage sarticule autour du rôle majeur joué par le château sur le plan historique, sur son intérêt architectural indéniable et sur la beauté du site.\r\nSur le plan historique, le château de Saint-Marcet fut la pierre angulaire de la diplomatie de la monarchie capétienne, qui après avoir écrasé le catharisme, sest appuyé sur lui pour structurer sa ligne de défense militaire à lencontre de lAragon au sud, de la mouvance anglo-gasconne à louest mais aussi pour contenir les velléités de ses voisins, à savoir Béarn, Foix, Bigorre et Armagnac. Il fut le centre politique, administratif et militaire de la châtellenerie avant dêtre transformé en prison au XVe siècle puis en locaux agricoles au XVIIIe. Enfin, clin dil vers ce quil fut du temps de sa majesté, il abritera dans ses ruines à partir de 1933 et pendant une vingtaine dannées, un proscrit qui y vivra dans le dénuement. Et lauteur de ce livre adoptera un choix de vie qui nest pas dénué de lien avec celui de cet homme.","architecture":"Quant à lintérêt architectural, il est manifeste. Lensemble forme un vaisseau symbolique dont la proue est dirigée vers Jérusalem. Les vestiges du château sétendent sur un hectare et demi, sur une longueur de 250 mètres, cerclés de deux enceintes. La première présente un remarquable travail de maçonnerie. La seconde, de forme oblongue, est percée de deux portes principales et trois de service. La porte principale, encore visible aujourdhui, est une tour-porte de près de sept mètres de haut qui fut probablement équipée dun pont-levis. Le château est doté dune tour triangulaire dont léperon figure cette proue. Cette forme architecturale particulièrement rare abrite en son sein une citerne de 50 m3 pour la réserve deau mais aussi dune guette de 18 mètres au-dessus des fossés. A lextrémité de la cour simpose le donjon, tour maîtresse, qui sélevait à lorigine à environ 24 mètres avec des murs de 2 mètres dépaisseur.","habitants":"Seigneurs locaux\r\n        \"","divers":"Vestiges de St-Marcet","gps":"","images":["../../jctruffet.com/image/image_31/31_St_Marcet_1.jpg","../../jctruffet.com/image/image_31/31_St_Marcet_2.jpg","../../jctruffet.com/image/image_31/31_St_Marcet_3.jpg"]},"Consult_chateau_formulaireeb37":{"id":"Consult_chateau_formulaireeb37","dept":"31","canton":"Pechbonnieu","commune":"Saint-Pierre","nom":"St_Martin_31","type":"Château","periode":"XVIII","histoire":"St-MARTIN,  faisait partie du territoire de Verfeil et dépendait des seigneurs de Bébian et  de Saint-Martin. Le chef lieu de la nouvelle commune fut fixé à Saint-Martin des Pierres et pris dès ce jour le nom de Saint-Pierre.  Lhistoire de la commune est intimement liée au château de Saint-Martin construit au XVIIIe siècle par José Honoré Vares marquis du Fauga à lemplacement dun château plus ancien car il existerait dans les fondations actuelles des éléments de ce passé. Révolution et terreur blanche touchèrent cette commune au travers des propriétaires du château de Saint-Martin mais aussi de celui dEscalonne qui si aujourdhui, désigne, une grande propriété cachée dans les bois ou un lieu dit, a  été le lieu de laveuglement de certains révolutionnaires qui nayant pu se saisir de David Baudrigue dEscalonne propriétaire des lieux  parce quil mourut le 7 Janvier 1793 se vengèrent aveuglement sur sa femme en lemprisonnant et surtout en guillotinant son fils de 22 ans. Le château de Saint-Martin à lui été le théâtre dun enlèvement par les Verdets en 1815 : la victime  fut le baron Cerise symbole de larmée impériale qui  sétait retiré là avec son épouse dorigine hollandaise. Une autre personnalité est aussi liée à la commune : Jean de Fermat marchand grossiste puis banquier à Toulouse, bourgeois de Toulouse et capitoul en 1633. Il acquiert le domaine et le château de Lafaurie aujourdhui quasiment disparu   ainsi que les droits de haute, moyenne et basse justice pour le consulat de Saint-Jean des Pierres.  Aujourd'hui chambres d'hôtes par Georges Maury.","architecture":"De plan en U corps de logis rectangulaire à trois niveaux avec fronton triangulaire  sur trois travées, toit en croupes.","habitants":"Marquis   José Honoré Vares\r\n        \"","divers":"Château de Saint-Martin","gps":"","images":["../../jctruffet.com/image/image_31/31_St_Martin_31_1.jpg","../../jctruffet.com/image/image_31/31_St_Martin_31_2.jpg"]},"Consult_chateau_formulairedc26":{"id":"Consult_chateau_formulairedc26","dept":"31","canton":"Bagnères de Luchon","commune":"Saint-Martory","nom":"St_Martory","type":"Vestiges-Château","periode":"XII-XVI","histoire":"ST-MARTORY, la famille des Montpezat, comtes de Comminges, seigneurs de Lajan et de Saint Martory, qui épouse Jeanne de Castelbajac en 1496 et en seconde noce Raymonde d'Antin en 1513;  a  construit deux châteaux à Saint-Martory?: le premier, du XIIe siècle, qu'il quittèrent au XVIe siècle pour  l'autre, d'architecture Renaissance.\r\n le domaine passe au début du XVIIIe siècle par alliance à Claude de Moret de Montarnal, en 1789, Jean -Henri de Moret de Grolée, comte de Peyre gouverneur du bourbonnais. Durant la Révolution Française, le château de Saint-Martory est vendu à sieur Laffont, dont la petite fille mademoiselle de Marin, épouse le prince de Berghes Saint Winock (1793-1879), d'une des plus illustres familles du nord de la France originaires de Bergues près de Dunkerque. A la demande du prince, est entreprise après 1860, une prestigieuse campagne de restauration du château, confié à Victor Ruprich Robert, architecte et inspecteur général des monuments historiques. En 1990 il appartient à monsieur Delort qui le loue pour  des séminaires.","architecture":"deux châteaux à Saint-Martory,  le premier, château du XVe siècle, surplombe la ville sur la colline de Montpezat, l'autre, d'architecture Renaissance, est bâti sur la rive droite de la Garonne. Ce dernier est inscrit au titre des monuments historiques depuis 1993 la propriété du château de Saint-Martory sétend sur 40 hectares, en grande partie boisés.  Le château a été construit entre 1515 et 1525.    De plan rectangulaire, le corps de logis à quatre niveaux dont un sous comble tourelle polygonale hors oeuvre d'escalier à vis, la défense est assurée par une grosse tour  cylindrique percée de canonnières flanquant l'angle sud -ouest, la façade nord du corps de logis arrondie pour former une demi-tour   également munie de canonnières, au sud-est une tourelle en encorbellement qui complète le dispositif dissuasif.   Sa rénovation a débuté en 1998 et sest achevée en 2008, après plusieurs tranches de travaux. On modernise les appartements en cloisonnant les salles médiévales et en y apportant un nouveau confort. A l'intérieur, les pièces reçoivent un décor néo-gothique de lambris de chêne, des peintures murales et les cheminées restaurées ou s'ornent des armoiries et monogrammes du prince de Berghes.                                                                              Montpezat à 2 kilomètres au Nord-Est, sur une colline, se trouvent les ruines du château de Montpezat (XIIIe siècle), à deux donjons. On y voit encore la haute tour d'un de ces donjons dominant un groupe de constructions qui formaient jadis l'habitation des possesseurs de cette forteresse. Une vaste enceinte de murs crénelés entoure, en suivant la pente de quelques escarpements, toute sa surface occupée par les bâtiments du château.  était défendu par une porte à herse de fer et une tour du XIVe siècle dont parle Froissart.","habitants":"Famille des Montpezat\r\n        \"","divers":"Vestiges et châteaus à Saint-Martory","gps":"","images":["../../jctruffet.com/image/image_31/31_St_Martory_1.jpg","../../jctruffet.com/image/image_31/31_St_Martory_2.jpg","../../jctruffet.com/image/image_31/31_St_Martory_3.jpg","../../jctruffet.com/image/image_31/31_St_Martory_4.jpg","../../jctruffet.com/image/image_31/31_St_Martory_5.jpg","../../jctruffet.com/image/image_31/31_St_Martory_6.jpg","../../jctruffet.com/image/image_31/31_St_Martory_7.jpg","../../jctruffet.com/image/image_31/31_St_Martory_8.jpg"]},"Consult_chateau_formulaire7e75":{"id":"Consult_chateau_formulaire7e75","dept":"31","canton":"Cazères","commune":"Saint-Michel","nom":"St_Michel","type":"Château","periode":"XV","histoire":"Saint-MICHEL, le château de Saint-Michel fait lobjet dune inscription au titre des monuments historiques depuis 2002 ; les seigneurs, les Hunaud de Lanta, au XVe siècle.   Ceux-ci en conservèrent la seigneurie pendant trois siècles, jusqu'en 1754, date à laquelle ils en vendirent les 7/8e (le roi étant alors seigneur pour un huitième et Lézat ayant disparu du paysage seigneurial) à Bernard d'Ustou, d'une famille issue du sud-Couserans et du Comminges,  les Huos. Son fils Stanislas fut député de la noblesse du Comminges aux états généraux, et sa mort sans héritier de son propre fils Jules, en 1858, le château, qui avec ses archives, avait traversé sans dommage la Révolution, passa à sa nièce, Louise d'Ustou. Celle-ci avait épousé Maxime de Courrèges dont la famille était originaire du Béarn. Leur dernier fils  Tony, reçut la château et la terre de Saint-Michel et releva le nom d'Ustou.","architecture":"Plus au nord, un second château des Lanta appelé \"château neuf\", est reconnaissable à ses murs très épais  à l'intérieur du château actuel. Ce second château fut agrandi vers l'est, sans doute par Stanislas d'Ustou, avant la Révolution. L'ensemble fut ensuite complété au nord par deux tours d'angle, et vers 1820, par un corps de bâtiment qui les relia: c'est la façade du jardin avec son escalier droit.","habitants":"Famille des Hunaud de Lanta\r\n        \"","divers":"Château de Saint-Michel","gps":"","images":["../../jctruffet.com/image/image_31/31_St_Michel_1.jpg","../../jctruffet.com/image/image_31/31_St_Michel_2.jpg","../../jctruffet.com/image/image_31/31_St_Michel_3.jpg"]},"Consult_chateau_formulaire90bf":{"id":"Consult_chateau_formulaire90bf","dept":"31","canton":"Bagnères de Luchon","commune":"Saint-Paul d","nom":"St_Paul_Oueil","type":"Maison forte","periode":"XV","histoire":"St-PAUL,  les droits des seigneurs de Larboust ne s'étendent en Oueil qu'au début du XIIIe siècle.  Aussi, vers 1290, les grands seigneurs locaux tels Jourdan et Marie de Gouaux ont laissé leurs dîmes au chapitre diocésain. D'autres, comme Bertrand de Jussan, Auger de Barbazan et Pérégrin de Saux, sont forains. Les Saint-Paulins passent des alliances avec les habitants de la Neste et du Vidaussan. Au XVIIe siècle, un incendie détruit le village. En 1787, l'archiprêtre d'Espouy proclame le seigneur d'Espouy, maître des lieux.","architecture":"la maison forte de saint-Paul d'Oueil se présente sous la forme d'un logis rectangulaire orienté nord-sud avec une tourelle d'escalier hexagonale proéminente à l'ouest, percée de fenêtres à meneau simple, et un pavillon, côté sud.  Château d'époque Renaissance dont l'unique tour encore existante, en saillie sur la façade, est un donjon hexagonal renfermant un escalier de pierre, sur lequel s'ouvrent les pièces d'habitation de la partie gauche. Trois fenêtres à meneaux horizontaux éclairent l'escalier. Les pièces desservies par cet escalier ont des plafonds à poutres apparentes nervurées, avec motifs de tête de poutre. C'est le seul type régional de château de haute montagne.","habitants":"seigneur d'Espouy\r\n        \"","divers":"Manoir à Saint-Paul-D'Oueil","gps":"","images":["../../jctruffet.com/image/image_31/31_St_Paul_Oueil_1.jpg","../../jctruffet.com/image/image_31/31_St_Paul_Oueil_2.jpg","../../jctruffet.com/image/image_31/31_St_Paul_Oueil_3.jpg","../../jctruffet.com/image/image_31/31_St_Paul_Oueil_4.jpg","../../jctruffet.com/image/image_31/31_St_Paul_Oueil_5.jpg"]},"Consult_chateau_formulaire0287":{"id":"Consult_chateau_formulaire0287","dept":"31","canton":"Revel","commune":"Saint-Pierre de Lages","nom":"St_Pierre_Lages","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux à Saint-Pierre de Lages celui du Bousquet et celui de Roussillous devenu collège, dont je n'ai pas d'information historique et à quelques kilomètres au nord du bourg  Saint-Bernard de Vallesville un château.                                                                                                                                BOUSQUET chambres d'hôtes par la famille de Lachadenède, l'élégance architecturale d'une demeure des XVIIe et XVIIIe siècles à 15 km de Toulouse.","architecture":"Bousquet château du XVIIe siècle de plan en U, corps de logis rectangulaire à deux niveaux flanqué de deux tours carrées saillantes en façade avec mâchicoulis à toit plats, en briques roses avec communs formant une cour intérieure, situé dans un ensemble de bois et de prairies.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château de Saint-Pierre de Lages","gps":"","images":["../../jctruffet.com/image/image_31/31_St_Pierre_Lages_1.jpg"]},"Consult_chateau_formulairecd6d":{"id":"Consult_chateau_formulairecd6d","dept":"31","canton":"Revel","commune":"Toutens","nom":"St_Pierre_Toutens","type":"Château","periode":"XVI","histoire":"St-PIERRE, Toutens était à l'origine une seigneurie,dépendante de la baronnie de Beauville; en 1463 Toutens a été détachée  en faveur de la famille noble du nom de De Ver. Un document de recensement de 1554 de Noble Jean De Ver, nous apprend qu'il y a un château avec pressoir, fosses et pigeonnier à quatre piliers. Il était situé à lest du village à lemplacement même ou se trouve aujourdhui léglise. En 29 juin 1580, à la fête de la Saint-Pierre, durant les guerres de religion, le vicomte de Turenne, du parti protestant prend le château de Toutens le brûle. Le château actuel bâti par la même famille De Ver avec les pierres du château féodal a été renommé en honneur à cet événement: \"château Saint-Pierre\". Le château actuel a été reconstruit sur un autre site à 300 mètres à l'ouest de l'ancien après 1580. Ce château est l'ancien château du marquis de Toutens. Et le 25 août 1817, le roi Louis XVIII donnait à la seigneurie de Toutens un Majorat avec le titre de marquis au profit des héritiers De Ver : la famille De Puybusque. Cette famille, l'une des plus ancienne famille de la Lauragais. Le château a été vendu à M. Caze en 1860. Edmond-Marie-Justin Caze, président de la société nationale à l'agriculture, président de l'administration des chemins de fer et homme politique français. Élu député de la Haute-Garonne de 1876 à 1906 et sénateur en 1906. Demeuré durant 145 ans dans cette famille, le domaine passa en 2003 à une société immobilière qui la vendu en 2013 à la famille De Bois, famille australienne d'ascendance anglo-normande.","architecture":"Le château de saint-Pierre  à Toutens  actuel semble avoir succédé à un bâtiment plus ancien, certains murs très épais à l'intérieur témoigneraient d'un \"ancien château\". Ce que l'on peut voir aujourd'hui est le résultat des remodelages dans les XVIIe et XVIIIe siècles. Le corps de logis central de plan rectangulaire à deux niveaux toits en semi-terrasse, pavillon d'entrée  légèrement saillant en façade avec fronton triangulaire, l'édifice  est prolongé de chaque côté par des dépendances à un niveau.","habitants":"Marquis de Toutens\r\n        \"","divers":"Château de Saint-Pierre à Toutens","gps":"","images":["../../jctruffet.com/image/image_31/31_St_Pierre_Toutens_1.jpg","../../jctruffet.com/image/image_31/31_St_Pierre_Toutens_2.jpg","../../jctruffet.com/image/image_31/31_St_Pierre_Toutens_3.jpg","../../jctruffet.com/image/image_31/31_St_Pierre_Toutens_4.jpg"]},"Consult_chateau_formulaire1e58":{"id":"Consult_chateau_formulaire1e58","dept":"31","canton":"Revel","commune":"Saint-Rome","nom":"St_Rome","type":"Château","periode":"XVIII","histoire":"St-ROME,  village de Saint-Rome a été imaginé au XIXe siècle par un riche propriétaire terrien, le marquis Louis-César de La Panouse, originaire de Toulouse. Ses voyages de par le monde lui ont donné l'idée de rassembler, en un même lieu, divers styles architecturaux. A la fin du XIXe siècle, comme beaucoup dendroits du Lauragais, Saint-Rome était une petite bourgade agricole où tout le monde travaillait pour monsieur le comte, propriétaire des terres, qui vivait au château. Le domaine a été constitué à partir de 1837 par Alexandre-César de la Panouse qui faisait partie des nobles légitimistes sous la monarchie de Juillet.  Cest son fils Henri-Louis César qui a agrandi le domaine et la entièrement reconstruit. Il aimait sans doute son village, puisquil a voulu y être enterré, dans un tombeau aussi modeste que ses constructions avaient été extravagantes.  Au fil du temps, la famille de la Panouse a cédé l'église et le cimetière de cette ancienne bourgade agricole à la municipalité pour 1 franc symbolique. Les descendants du comte ont également vendu la quasi-totalité des habitations à des particuliers, mais conservent toujours le château dans lequel ils résident encore aujourd'hui.","architecture":"Saint-Rome, domaine agricole construit entre 1874 et 1893 par un aristocrate parisien. L'architecture s'inspire de celle des expositions universelles. Le domaine se compose d'un ensemble de maisons construites en étroite dépendance du château, avec rue centrale. L'aspect fonctionnel est sacrifié au sens décoratif: beffrois flamands, bains turcs, maisons suisses, mosquées arabes, etc. L'engouement de l'époque pour l'architecture vernaculaire s'exprime à travers les procédés de construction et d'ornementation.\r\nLe château de style néo-Renaissance est un exemple de l'architecture pastiche du second empire. Le vocabulaire décoratif des façades est emprunté à celui des demeures toulousaines du XVIIIe siècle. Les ailes latérales de style néo-classique,  présentent chacune un long bâtiment précédé de propylées avec chapiteau de style corinthien. A l'intérieur du château, le décor utilisé, peinture, papiers peints et bois sculpté. Le plafond peint de la salle à manger, du XVIIIe siècle, a été rapporté sur place.","habitants":"Alexandre-César de la Panouse \r\n        \"","divers":"Château de Saint-Rome","gps":"","images":["../../jctruffet.com/image/image_31/31_St_Rome_1.jpg","../../jctruffet.com/image/image_31/31_St_Rome_2.jpg","../../jctruffet.com/image/image_31/31_St_Rome_3.jpg","../../jctruffet.com/image/image_31/31_St_Rome_4.jpg","../../jctruffet.com/image/image_31/31_St_Rome_5.jpg"]},"Consult_chateau_formulairec873-2":{"id":"Consult_chateau_formulairec873-2","dept":"31","canton":"Toulouse","commune":"Toulouse","nom":"St_Simon_Marrot","type":"Château","periode":"XIV","histoire":"A Saint-Simon le Vieux deux château celui de Candie est le plus ancien château d'origine médiévale de la commune de Toulouse  et celui de Marrot.                                                                                                                               CANDIE,  du XIIIe au XVe siècle, avait pour seigneur le chef de la maison toulousaine des Yzalguier. La seigneurie et le château furent vendus le 11 novembre 1498 à Jean Laysani, notaire de Toulouse. Vers 1540, le domaine est acquis par le conseiller au parlement Mariet d'Angilbaut, dit de Chabanès. Durant le XVIIe siècle, la seigneurie était divisée en trois domaines mais réunies de nouveau par Jean-François-Marie Candie, trésorier général de France. Guillaume Camille Alfred Candie de Saint-Simon fut le dernier des Candie à posséder Saint-Simon-le-Vieux qui passe fin du XIXe siècle à la veuve de François Bary et ensuite à son fils Louis-Eugène Bary. En 1784, fut créé le taillable de Saint-Simon, détaché de celui de Portet.  En 1789, le seigneur de Saint-Simon était Mr de Candie, trésorier de France, à Toulouse. Il avait un château de forme carrée, entourée de fossés. Saint-Simon devint alors une annexe de la paroisse de Portet. A la suite de demandes répétées en faveur dune église plus centrale, et malgré les réticences de Mr de Candie,  propriété de la ville de Toulouse depuis 1976.","architecture":"Le château de Saint-Simon  médiéval se trouvait au centre de l'ancienne seigneurie de Saint-Simon, sur laquelle s'élevait également une église. Construit à la fin du XIIIe siècle ou au début du XIVe siècle pour ses parties les plus anciennes, le château est un bâtiment massif, entouré de douves sur deux de ses côtés. Ce bâtiment carré était flanqué au nord-est par une tour carrée. Les autres angles de la forteresse supportaient des échauguettes de défense dont celle placée au sud-ouest disparue aujourd'hui. La porte de la façade principale, au sud, présente une porte ogivale à double rouleau de briques et pourrait remonter au moins au XIIIe siècle. Sa clef de pierre présente un relief martelé. À l'intérieur de la cour centrale, le mur sud conserve des traces de fenêtres d'époque gothique. La porte d'entrée s'ouvre sur un vestibule carré voûté de croisées d'ogives dont les nervures retombent sur des culots sculptés de têtes de femmes. Le château est bordé au sud et à l'est de douves remplies d'eau.                                                                                                        Château de Marrot,  corps de logis central rectangulaire à deux niveaux toit à la mansard avec lucarne sur l'entrée flanqué de deux tours carrées  aux extrémité   toits à quatre pans.","habitants":"Jean-François Marie de Candie\r\n        \"","divers":"Château de Saint-Simon et de Marrot à Saint-Simon","gps":"","images":["../../jctruffet.com/image/image_31/31_St_Simon_Marrot_1.jpg","../../jctruffet.com/image/image_31/31_St_Simon_Marrot_2.jpg","../../jctruffet.com/image/image_31/31_St_Simon_Marrot_3.jpg","../../jctruffet.com/image/image_31/31_St_Simon_Marrot_4.jpg","../../jctruffet.com/image/image_31/31_St_Simon_Marrot_5.jpg"]},"Consult_chateau_formulaire9ed7":{"id":"Consult_chateau_formulaire9ed7","dept":"31","canton":"Auterive","commune":"Saint-Sulpice sur léze","nom":"St_Sulpice_Léze","type":"Château","periode":"XV-XVII","histoire":"St-SULPICE, on l'a baptisé le château, sans l'associer à une famille de nobles ou à un lieu-dit. Situé au cur du village il est dans la ligne de mire de l'église qui pointe son clocher à une centaine de mètres. Son histoire débute en 1810 où il est entré dans le riche patrimoine de ce bourg. Des générations de saint- sulpiciens ont côtoyé les châtelains en toute simplicité mais rares sont ceux qui ont pu le visiter. À l'occasion de la vente de l'ensemble du mobilier; une visite qui précède la vente sur place. Deux siècles d'histoire ouvrent une dernière fois leurs portes précise François de Malafosse, commissaire-priseur associé.                                                                                                                                                 A quelques kilomètres au nord-est le château d'Auribail dont je n'ai pas d'information historique.","architecture":"Ce château de Saint-Sulpice a été construit vers 1810 dans un style très régional de briques et dans le goût encore marqué du XVIIIe siècle,  le corps de logis central à trois niveaux flanqué de deux pavillons rectangulaires sur les flans prolongé à droite comme à gauche de dépendances d'un niveau. La façade de l'édifice révèle un grand équilibre entre partie noble et dépendances ; le tout ouvrant sur un vaste parc terrasse ayant vue sur les Pyrénées.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Chateaux à Saint-Sulpice sur Léze château d'Auribail et Sauvetat","gps":"","images":["../../jctruffet.com/image/image_31/31_St_Sulpice_Leze_1.jpg","../../jctruffet.com/image/image_31/31_St_Sulpice_Leze_2.jpg","../../jctruffet.com/image/image_31/31_St_Sulpice_Leze_3.jpg","../../jctruffet.com/image/image_31/31_St_Sulpice_Leze_4.jpg","../../jctruffet.com/image/image_31/31_St_Sulpice_Leze_5.jpg","../../jctruffet.com/image/image_31/31_St_Sulpice_Leze_6.jpg","../../jctruffet.com/image/image_31/31_St_Sulpice_Leze_7.jpg","../../jctruffet.com/image/image_31/31_St_Sulpice_Leze_8.jpg","../../jctruffet.com/image/image_31/31_St_Sulpice_Leze_9.jpg"]},"Consult_chateau_formulaire64c8":{"id":"Consult_chateau_formulaire64c8","dept":"31","canton":"Léguevin","commune":"Cabanac-Séguenville","nom":"Séguenville","type":"Château","periode":"XVII","histoire":"SEGUENVILLE, chambres d'hôtes  par la famille de Lareng.   Les origines du château remontent à 1271, quand le seigneur Thibault de Séguenville prêta serment à Philippe le Hardi. Sen suit les lignées des de Seguenville, de Brugymont, de Roquemaurel et de Faudoas. Il vient dêtre trouver un bail à bâtir du 10 mars 1653 pour le château de Séguenville, Pierre Jean de Faudoas fit construire ce que nous connaissons aujourdhui du château, hormis semble-t-il les terrasses et deux tours carrées. L'histoire ne s'invente pas, il faut reconstruire le puzzle ! La famille Charlet-Durieu, fut propriétaire durant environ 200 ans. Puis la propriété vit défiler une multitude de propriétaires vendant progressivement les terres.","architecture":"Château dont le corps de logis est de plan carré  à trois niveaux avec lucarnes au dernier niveau sur toitures à la mansard flanqué côté entrée de deux tourelles carrées aux angles à toit finement pointus et à l'arrière côté parc deux tours  carrées de style donjon  à quatre niveaux avec mâchicoulis et créneaux.","habitants":"Famille de Charlet-Durieu\r\n        \r\n        \r\n        \"","divers":"Château de Séguinville","gps":"","images":["../../jctruffet.com/image/image_31/31_Seguenville_1.jpg","../../jctruffet.com/image/image_31/31_Seguenville_2.jpg","../../jctruffet.com/image/image_31/31_Seguenville_3.jpg","../../jctruffet.com/image/image_31/31_Seguenville_4.jpg","../../jctruffet.com/image/image_31/31_Seguenville_5.jpg"]},"Consult_chateau_formulairea41c-2":{"id":"Consult_chateau_formulairea41c-2","dept":"31","canton":"Revel","commune":"Lanta","nom":"Tarabel_Duffau","type":"Château","periode":"","histoire":"deux châteaux à Lanta  celui de Tarabel et celui de Duffau chambres d'hôtes.                                                                                                                                      TARABEL est caractéristique de l'architecture de ce beau XVIe siècle. Il y eut  à l'origine un château fort. Tarabel était alors une seigneurie, qui appartient la famille Palais jusqu'en 1523. En 1540, c'est Pierre de Coustous qui est seigneur de Tarabel. C'est sans doute vers cette époque bénie du pastel que Tarabel est construit (ou reconstruit) en style Renaissance. En 1587, Jeanne de Coustous épouse un membre de la famille du Faur. Michel du Faur-Tarabel le restaure en 1626. Le château sera à nouveau restauré aux XIXe et XXe siècles.   Fin du XIXe et XXe siècles, est élevé par Pierre de Coustous.  Il est passé par mariage à la famille du Faur, et restauré en 1626. Endommagé à la Révolution, il n'est finalement restauré qu'à la fin du XIXe siècle et au début du XXe siècle. M. Olin, fondeur toulousain, l'achète vers 1900.","architecture":"Tarabel Le premier édifice est sans doute un château fort. Le château actuel, de style Renaissance,  Il se distingue par sa façade caractéristique des châteaux du pastel, l'impression d'ensemble, c'est celle d'une demeure qui, malgré des restaurations remontant sans doute aux deux derniers siècles, a gardé certains caractères médiévaux et renaissants. Un fossé conserve, semble-t-il, le souvenir d'anciennes douves : voilà peut-être pour le Moyen-âge.  Ce fossé est enjambé par un petit pont qui mène à la porte d'entrée en plein-cintre, surmontée d'un fronton et encadrée de pilastres. A sa gauche, elle est flanquée d'une belle tour octogonale, sans doute une tour d'escalier. Cette tour protège la porte par deux meurtrières encore visibles ; aux étages supérieurs, elle a des fenêtres, dont l'une à croisée sculptée ; au dernier étage, une sorte de belvédère ou de galerie, sous le toit. A gauche de la porte, une tour de forme rectangulaire, avec en bas d'autres bouches à feu qui protègent la porte.   Au-dessus de la porte, une fenêtre, de style Renaissance ou maniériste. Elle est surmontée d'un fronton avec une petite corbeille pleine de fruits, appétissants. Les croisées sont joliment sculptées. Il semble que tous les éléments ne soient pas authentiques et que la fenêtre a été restaurée.","habitants":"Famille des Hunaud de Lanta                                                          Famille de Pierre de Coustous\r\n        \r\n        \"","divers":"Chaâteau de Tarabel de Duffau et la mairie de Lanta.","gps":"","images":["../../jctruffet.com/image/image_31/31_Tarabel_Duffau_1.jpg","../../jctruffet.com/image/image_31/31_Tarabel_Duffau_2.jpg","../../jctruffet.com/image/image_31/31_Tarabel_Duffau_3.jpg","../../jctruffet.com/image/image_31/31_Tarabel_Duffau_4.jpg","../../jctruffet.com/image/image_31/31_Tarabel_Duffau_5.jpg","../../jctruffet.com/image/image_31/31_Tarabel_Duffau_6.jpg","../../jctruffet.com/image/image_31/31_Tarabel_Duffau_7.jpg"]},"Consult_chateau_formulaire12fe":{"id":"Consult_chateau_formulaire12fe","dept":"31","canton":"Auterive","commune":"Carbonne","nom":"Terrasse","type":"Château","periode":"XI-XVII","histoire":"Deux châteaux à Carbonne celui des Terrasse.                                                                                                                                                  La TERRASSE de monsieur  Prunet,  c'est dans la deuxième moitié du XIe siècle que Roger de Montaut fait construire au faubourg de la Terrasse à Carbonne un imposant château féodal. En 1415, la seigneurie de la Terrasse appartient à Pons de Montaut, de la puissante famille des Montaut-Noé. Le 25 septembre 1482, noble Pierre Raymond de la Gabriolle, trésorier général du Roi, cette seigneurie, à Pierre  de Potier (II), jeune, bourgeois de Toulouse, avec juridiction de haute, moyenne et basse justice restera dans cette famille  jusqu'en 1710. Etienne de Potier (II) meurt en 1710 sans héritier mâle, au château de la Terrasse. Françoise de Potier, fille d'Etienne (II), épouse le 4 janvier 1630, Anne de Roux, né en 1599, Juge-mage et président du présidial, baron de Puivert et de Sainte-Colombe. Ils auront 13 enfants et Anne de Roux meurt en 1653.  Leur fils Pierre de Roux, seigneur de Montbel, Pexiora et Besplas, syndic général de la Province du Languedoc devient seigneur de la Terrasse à la mort d'Etienne (II). Il épouse Marthe de Peyrat. Pierre de Roux décède en 1735 sans descendance mâle et ses gendres lui succèdent. Tout d'abord, Louis, Marie,François d'Hautpoul, né en 1773, fils de Pierre, François d'Hautpoul et de Marie de Montesquieu de Roquefort, émigré en 1792 en Espagne, chevalier et marié le 24 novembre 1806 avec Adélaïde, Joséphine de Lordat, fille de François, Anne de Lordat et de Marie de Caumont. Il décède au château de la Terrasse le 21 mai 1845. Alfred-Paul meurt le 8 décembre 1892, sa fille Alix avait épousé en 1871, Joseph, Antonin, Etienne de Bonnin, marquis de Fraysseix capitaine de vaisseaux et son autre fille Berthe, le 23 avril 1875, Max, comte de Faulong, officier au  décès de cette famille en 1904. En 1910 le château est vendu à Gaston et Thérèse Lacombe née Mercadier.","architecture":"La terrasse,  en 1967, quelques carbonnais créèrent « L'association des Amis du château historique de la Terrasse » dans le but de sauver les restes de l'édifice et de tenter une restauration, de plan en équerre à deux niveaux, toit en tuiles en croupes avec série de lucarnes et un donjon rectangulaire accolé de trois  niveaux toit en croupes.","habitants":"Roger de Montaut \r\n        \"","divers":"Château de la Terrasse à Carbonne","gps":"","images":["../../jctruffet.com/image/image_31/31_Terrasse_1.jpg","../../jctruffet.com/image/image_31/31_Terrasse_2.jpg","../../jctruffet.com/image/image_31/31_Terrasse_3.jpg","../../jctruffet.com/image/image_31/31_Terrasse_4.jpg"]},"Consult_chateau_formulaire0d0e":{"id":"Consult_chateau_formulaire0d0e","dept":"31","canton":"Toulouse","commune":"Toulouse","nom":"Toulouse_Chateau","type":"Château","periode":"XV-XVII","histoire":"TOULOUSE,  plusieurs châteaux a Toulouse, voir article pour les châteaux de  Bellevue collège, de  Calquet, de la Cépière, de Marmande, de Mirail, le palais de Niel, de la Reynerie et de St-Simon .                                                                                              Toulouse  au Moyen-Âge, la ville reste longtemps indépendante. Les comtes de Toulouse étendent leur domaine sur la plus grande partie du midi de la France. Témoin de la présence des comtes de Toulouse, les restes des fondations du château comtal ont été récemment mis au jour près de la porte sud de la ville médiévale à l'emplacement du palais de justice.   Au XIVe siècle, la ville prospère grâce au commerce et devient la quatrième ville du royaume de France. Au XVe siècle, elle doit aussi assurer l'effort de la guerre de Cent Ans et subir le brigandage. Les faubourgs sont détruits et la ville se replie derrière ses fortifications.  Durant la Renaissance, de la fin du XVe siècle au XVIe siècle, Toulouse connaît une période de grande prospérité, grâce à l'industrie du pastel. C'est l'époque de construction de grands hôtels particuliers ( Voir article Patrimoine)                                                                                                                     Castellet de la CROIX DORADE, orangerie, temple de l'amour et pavillon carré.  celui  de Marmande-Marast siège de la croix rouge,                                              \r\nLe musée de L'Ardenne  est installé pour l'inauguration de 1955 dans l'hôtel Dumay (don à l'association du musée en 1947 par le docteur Siméon Durand) , bâtiment érigé entre 1590 et 1611 pour le docteur-régent de la faculté de médecine de Toulouse, conseiller et premier médecin de Marguerite de Valois, Antoine Dumay puis pour son fils Antoine II Dumay avocat au parlement et capitoul en 1600-1601.","architecture":"A Toulouse, l' hôtel Lestang  façade historique et jardins, escalier monumental. Salle du conseil du rectorat de l'académie de Toulouse.                                                                                    Centre hospitalier Guy Marchand du style romano-gothique de la chapelle ou des rappels de l'architecture locale par l'emploi de briques foraines et l'ouverture de mirande.                                                                                              Musée:  Lardenne  tout au début il faut dire que Lardenne est l'un des quartiers de Toulouse. Son nom vient de L'Ardenne, d'arduenna, mot gaulois signifiant \"forêt\". Parfois les toulousains pensent quil ny a rien à voir là-bas, mais cest faux l'hôtel, en briques et pierres blanches, est constitué de quatre façades distribuées autour d'une large cour pavée. Hôtel particulier de fin XVIe siècle.  A Lardenne se trouve un vieux château de Marmande, cest une véritable merveille de larchitecture.  L'Estang,  Mardy et le château de Vidaussan.","habitants":"Famille d'Antoine Dumay\r\n        \r\n        \"","divers":"A Toulouse, château de la Croix Dorade, de Fonsegrives, de Launaguet, de Lestang, de Marmande de Lardenne, le Manoir de Marty et  de  Vidaussan.","gps":"","images":["../../jctruffet.com/image/image_31/31_Toulouse_Chateau_1.jpg","../../jctruffet.com/image/image_31/31_Toulouse_Chateau_2.jpg","../../jctruffet.com/image/image_31/31_Toulouse_Chateau_3.jpg","../../jctruffet.com/image/image_31/31_Toulouse_Chateau_4.jpg","../../jctruffet.com/image/image_31/31_Toulouse_Chateau_5.jpg","../../jctruffet.com/image/image_31/31_Toulouse_Chateau_6.jpg","../../jctruffet.com/image/image_31/31_Toulouse_Chateau_7.jpg","../../jctruffet.com/image/image_31/31_Toulouse_Chateau_8.jpg"]},"Consult_chateau_formulaire87b7":{"id":"Consult_chateau_formulaire87b7","dept":"31","canton":"Toulouse","commune":"Toulouse","nom":"Toulouse_Palais","type":"Palais","periode":"XIX","histoire":"Palais NIEL (voir article).    Palais Edouard Marchand  la construction commença en 1852, pour se terminer en 1864, Gérard Marchant fut un médecin toulousain, élève de Jean-Baptiste Delaye, avec lequel il uvrera pour la construction de l'asile de Braqueville. Plus tard, il en deviendra le premier directeur et marquera en profondeur la vie de l'asile.  Mon existence à Toulouse n'a été consacrée qu'à une pensée unique, la construction d'un asile.  C'est en 1937 en l'honneur de son fondateur et alors que les asiles deviennent des hôpitaux psychiatriques que l'asile de Braqueville fut rebaptisé  centre  hospitalier Gérard Marchant .  Le Capitole est un monument de la ville française de Toulouse, qui abrite aujourdhui l'hôtel de ville et le théâtre du Capitole.","architecture":"Les Palais;   mais ce n'est qu'au XVIIe siècle que le palais que nous connaissons aujourdhui est construit par les capitouls. Le nom de cette maison commune fait référence à l'antique Capitole, temple légendaire dédié à Jupiter, et pourvu d'un grand escalier. Il rappelle surtout les magistrats qui l'ont fait édifier.  La tour du donjon, les façades de la cour Henri IV et la façade donnant sur la place du Capitole par la liste de 1840 et par arrêté du 11 février 1911. La salle des Illustres, la salle des Pas Perdus, la salle du conseil municipal, la salle des mariages et le grand escalier d'honneur sont classés au titre des monuments historiques par arrêté du 17 février 1995.                                                                                                             Palais Edouard Marchand, les façades et toitures des bâtiments administratifs bordant la cour d'honneur, du bâtiment en hémicycle situé à l'ouest de la chapelle, des pavillons des malades bordant les deux allées situées au nord et au sud de la cour d'honneur avec leurs galeries de circulation bordant les allées centrales ainsi que les restes de galeries transversales situées côté nord, avec leurs restes de pavement en calade, À l'arrière du Capitole, le donjon est situé dans un parc et regroupe les locaux de l'office du tourisme.                                                              Grande conception des bâtiments de la gare, la prison ,et  la bibliothèque etc.","habitants":"Maréchal Adolphe Niel Comte de Goyon\r\n        \"","divers":"A Toulouse, le palais de Niel, le petit Capitol-Lardenne; la Capitole et sa porte , le palais de Gérard Marchand","gps":"","images":["../../jctruffet.com/image/image_31/31_Toulouse_Palais_1.jpg","../../jctruffet.com/image/image_31/31_Toulouse_Palais_2.jpg","../../jctruffet.com/image/image_31/31_Toulouse_Palais_3.jpg","../../jctruffet.com/image/image_31/31_Toulouse_Palais_4.jpg","../../jctruffet.com/image/image_31/31_Toulouse_Palais_5.jpg","../../jctruffet.com/image/image_31/31_Toulouse_Palais_6.jpg","../../jctruffet.com/image/image_31/31_Toulouse_Palais_7.jpg"]},"Consult_chateau_formulairec06e":{"id":"Consult_chateau_formulairec06e","dept":"31","canton":"Toulouse","commune":"Toulouse","nom":"Toulouse_Patrimoine","type":"Patrimoine","periode":"XV","histoire":"TOULOUSE, c'est l'époque de construction de grands hôtels particuliers comme l'hôtel de Bernuy ou l'hôtel d'Assézat.                                                                                               Toulouse est la ville française où l'on trouve cinquante  hôtels particuliers datant du XVIe siècle. hôtel Assezat (voir article),  hôtel de Lestang, rectorat de l'académie de Toulouse du XVIe siècle construit par Christophe de Lestang, évêque de Lodève.                                                                             Occitania est composé de deux hôtels  dans le quartier Esquirol : l'hôtel de Boysson, maison capitulaire de style renaissance  et l'hôtel de Chévérry son extension au XVIIIe siècle. Avec la création de l'Ostal d'Occitania, la mairie de Toulouse a doté la ville d'une institution en lien avec son statut historique et culturel de capitale de l'Occitanie.","architecture":"Ville à l'architecture caractéristique des cités du midi de la France, Toulouse est surnommée la « ville rose » en raison de la couleur du matériau de construction traditionnel local, la brique de terre cuite. Le développement de la culture de la violette de Toulouse au XIXe siècle en fait un emblème de la ville et lui vaut le surnom de « cité des violettes ». Elle est aussi, beaucoup plus rarement, surnommée la « cité Mondine »  en référence à la dynastie des comtes de la ville, souvent nommés Raymond.","habitants":"Les comtes de Toulouse\r\n        \"","divers":"A Toulouse le patrimoine de l'hôtel Occitanie, le donjon du Capitole, l'Assezatbimberg, l'hôtel Courtois, hôtel d'Arnault de Brucelles, La Garonette, la tour de Laganne et de la Verrière","gps":"","images":["../../jctruffet.com/image/image_31/31_Toulouse_Patrimoine_1.jpg","../../jctruffet.com/image/image_31/31_Toulouse_Patrimoine_2.jpg","../../jctruffet.com/image/image_31/31_Toulouse_Patrimoine_3.jpg","../../jctruffet.com/image/image_31/31_Toulouse_Patrimoine_4.jpg","../../jctruffet.com/image/image_31/31_Toulouse_Patrimoine_5.jpg","../../jctruffet.com/image/image_31/31_Toulouse_Patrimoine_6.jpg","../../jctruffet.com/image/image_31/31_Toulouse_Patrimoine_7.jpg","../../jctruffet.com/image/image_31/31_Toulouse_Patrimoine_8.jpg"]},"Consult_chateau_formulaire5ce3":{"id":"Consult_chateau_formulaire5ce3","dept":"31","canton":"Tournefeuille","commune":"Tournefeuille","nom":"Tournefeuille","type":"Château","periode":"XIV","histoire":"TOURNEFEUILLE -GRAMART,le château  propriété de la commune   datant de lépoque de Louis XIII, actuellement mairie. Les sires de Caulet, anciens seigneurs du lieu et dont lécu figure au fronton de la mairie, bien quils aient été \"marquis de Tournefeuille\" par la grâce de Louis XIV, préférèrent le titre de \"marquis de Gramont\" et ne portèrent donc jamais, ce titre principal, le nom de notre ville. Tournefeuille bourg ne commence vraiment quà la fin du Moyen-Age. C'est alors une seigneurie et, en même temps, lannexe de la paroisse Saint-Nicolas de Toulouse depuis 1503. La seigneurie, élevée par Louis XIV au rang de marquisat, a appartenu longtemps à la famille de Caulet, membre de la noblesse parlementaire toulousaine. Cela nempêche pas les habitants davoir leur propre organisation avec des \" consuls \" à leur tête.","architecture":"Gramart, corps de bâtiment d'époque Louis XIII en U ouvert sur une large allée menant à la route nationale. Trois arcades au fond surmontées de fenêtres très simples en constituent la façade. A droite, une belle porte en pierre sculptée donne accès à un escalier à la française avec sa rampe en fer forgé possédant une grille d'influence espagnole.","habitants":"Des sires de Caulet\r\n        \"","divers":"Château de Gramart à Tournefeuille","gps":"","images":["../../jctruffet.com/image/image_31/31_Tournefeuille_1.jpg","../../jctruffet.com/image/image_31/31_Tournefeuille_2.jpg"]},"Consult_chateau_formulairecd29":{"id":"Consult_chateau_formulairecd29","dept":"31","canton":"Auterive","commune":"Bois de la Pierre","nom":"Trémoulet","type":"Château","periode":"XVI","histoire":"TREMOULET  Le village du Bois de la Pierre se situe à la pointe nord du canton du Volvestre à la limite du canton de Savès. Son exposition sur un plateau bien ensoleillé nous procure une vue sur la vallée de Carbonne et sur le Mont-Vallier, vit passer sur son domaine une lignée de Bonnecarrère plusieurs siècles durant  Jallier Emmanuel-Jean-Pacôme  né le 11 mai 1789, commerçant prospère, membre du conseil politique en 1832 et maire de la commune de Bois de la Pierre en 1834, devient le propriétaire du château de Trémoulet. Nayant pas eu de descendance, il lègue à sa mort le 27 juillet 1850, la recette de la vente de ses biens pour que soit construit un grand hospice destiné à accueillir les pauvres du canton. Létablissement est édifié à Carbonne et Jallier fût qualifié de « bienfaiteur des pauvres ».","architecture":"Le château de Trémoulet La bâtisse dont les premiers écrits date du XIe siècle, de plan carré à trois niveaux toit en ardoise quatre pans flanqué de quatre tours dont deux carrées à l'opposée l'une de l'autre toit à quatre pans et de deux tourelles  rondes également à l'opposée toit en poivrières.","habitants":"Emmanuel-Jean-Pacôme Jallier\r\n        \r\n        \"","divers":"Château de Trémoulet au Bois de la Rive","gps":"","images":["../../jctruffet.com/image/image_31/31_Tremoulet_1.jpg","../../jctruffet.com/image/image_31/31_Tremoulet_2.jpg"]},"Consult_chateau_formulairec827-2":{"id":"Consult_chateau_formulairec827-2","dept":"31","canton":"Saint-Gaudens","commune":"Montréjeau","nom":"Valmirande","type":"Palais","periode":"XVI","histoire":"VALMIRANDE, le duc dAntin, Louis de Pardailan de Gondrin, fils du marquis Louis Henri de Montespan, né en 1665, deux ans avant que sa mère (Françoise Athénaïs de Rochechouart) ne devienne la favorite de Louis XIV. Demi-frère des légitimés de France, il ne profita dabord que modérément de cette position, mais il la fit fructifier dès la mort de madame de Montespan, en 1707.\r\nPuis, en 1708, il surprit la cour en succédant à Jules Hardouin-Mansart à la direction des bâtiments du roi. En 1712, le duc dAntin plaça à la tête de ce service royal Claude-Félix Tarlé (1666-1735), un marbrier de renom  chargé depuis longtemps dentreprises pour les maisons royales.   La même année, il nomma officiellement contrôleur des marbres des Pyrénées et du Languedoc Bertrand de Lassus fait construire à Montréjeau, à partir de 1892, une extravagante et somptueuse construction néo-Renaissance, avec sa chapelle, de grands parterres, un parc d'une superficie de 41 hectares. « Palais quasi-royal », dit Henry Russell. Bertrand de Lassus acquiert dix parcelles d'un seul tenant à la sortie de Montréjeau en direction de Lannemezan en 1893. La première pierre est posée en octobre 1893. En 1898, seulement cinq ans plus tard, le château, le mur d'enceinte et les dépendances sont construits. La propriétaire actuelle est la baronne Simone de Lassus.","architecture":"Le château constitué d'un corps de logis double de 70 m de long et 40 m de haut qui présente une structure rectangulaire, s'inspire des châteaux de la Loire (Chambord, Chenonceau, Azay),  de minces  tours cylindriques, des tourelles en encorbellement de massifs pavillons carrés , des galeries à arcades, forment un jeu savant de retraits et d'avancées faisant naître de la dissymétrie un effet d'accumulation. Les toitures d'ardoise, hérissée de souches de cheminées, de poivrières de flèche en zinc sont dominée par la haute  silhouette d'un clocheton dont la base, aménagé en terrasse  forme belvédère.  Les dépendances sont dans le style bigourdan. Ce château et ses dépendances (écuries) sont une oeuvre de l'architecte bordelais Louis Garros. Cet ensemble fut créé à partir de 1892.   Il est entouré d'un magnifique parc de 40 hectares de caractère pittoresque et remontant à la fin du XIXe siècle. Parc aménagé par le paysagiste Bülher. Perspective exceptionnelle sur les Pyrénées : arboretum varié (plus de 180 espèces d'arbres). Écuries et selleries classées parmi les plus belles de France. Architecture du château néo-renaissance avec sculptures sur pierres blanches de l'Angoûmois. Chapelle, joyau  du début 20 siècle, vitraux, émaux.","habitants":"Louis de Pardailan de Gondrin\r\n        \"","divers":"Château de Valmirande à Montréjeau","gps":"","images":["../../jctruffet.com/image/image_31/31_Valmirande_1.jpg","../../jctruffet.com/image/image_31/31_Valmirande_2.jpg","../../jctruffet.com/image/image_31/31_Valmirande_3.jpg","../../jctruffet.com/image/image_31/31_Valmirande_4.jpg","../../jctruffet.com/image/image_31/31_Valmirande_5.jpg","../../jctruffet.com/image/image_31/31_Valmirande_6.jpg"]},"Consult_chateau_formulaire5d95":{"id":"Consult_chateau_formulaire5d95","dept":"31","canton":"Escalquens","commune":"Varennes","nom":"Varennes_31","type":"Château","periode":"XVI","histoire":"VARENNES,   le château est actuellement habité par la 22ème génération de la même famille à la fois convivial et chaleureux, vous pourrez profiter de la douceur des lieux en vous promenant dans le parc aux arbres centenaires, dans le potager, ou dans le jardin aux plantes médicinales.","architecture":"Le château des Varennes est un lieu dune grande prestance où célébrer votre union aux portes de Toulouse.  Sa cour en briques roses possède un charme incroyable et sa forme en fer à cheval est un clin dil à cette alliance qui vous portera chance ! Que tous vos souhaits deviennent réalité en ces lieux, telle est la philosophie des propriétaires de ce château.","habitants":"Famille Méricq\r\n        \"","divers":"Château de Varennes","gps":"","images":["../../jctruffet.com/image/image_31/31_Varennes_31_1.jpg","../../jctruffet.com/image/image_31/31_Varennes_31_2.jpg"]},"Consult_chateau_formulairef079":{"id":"Consult_chateau_formulairef079","dept":"31","canton":"Revel","commune":"Vaudreuille","nom":"Vaudreuille","type":"Château","periode":"XII","histoire":"VAUDREUILLE, le nom de Vaudreuille provient du nom latin Vallis Drulha, qui signifie Vallée de Dreuilhe. Dreuilhe est un petit village situé au Nord-Ouest à moins de deux kilomètres.  construction du barrage-réservoir de Saint-Ferréol au XVIIe siècle, par Pierre Paul Riquet, pour alimenter le Canal du Midi,. Le château féodal domine sur une colline boisée au nord-ouest du village toute la proche région. En dehors du village on aperçoit les tours rondes à mâchicoulis du château des de Rigaud de Vaudreuille qui fut la plus puissante famille du Lauragais, et dont le nom est lié à l'histoire du Canada.","architecture":"Le château féodal domine sur une colline boisée au nord-ouest du village toute la proche région.  Plusieurs fois remanié et restauré, sa construction remonterait au XIIe siècle, période où apparaît la seigneurie des Rigaud de Vaudreuil. Vaste bâtisse rectangulaire, avec une façade principale donnant sur une cour intérieure, dont le portail dentrée se termine en arc brisé.      Cette façade de style Renaissance, avec des fenêtres à meneaux, a une porte surmontée des armoiries des seigneurs. Deux tours rondes moyenâgeuses sont flanquées au sud-est, restes des défenses de cet ancien château fort. Tout cela a beaucoup souffert dans un récent et important incendie. Une restauration est en cours.","habitants":"Famille de Rigaud de Vaudreuil\r\n        \"","divers":"Château de Vaudreuille et de Rigaud","gps":"","images":["../../jctruffet.com/image/image_31/31_Vaudreuille_1.jpg","../../jctruffet.com/image/image_31/31_Vaudreuille_2.jpg","../../jctruffet.com/image/image_31/31_Vaudreuille_3.jpg","../../jctruffet.com/image/image_31/31_Vaudreuille_4.jpg","../../jctruffet.com/image/image_31/31_Vaudreuille_5.jpg","../../jctruffet.com/image/image_31/31_Vaudreuille_6.jpg","../../jctruffet.com/image/image_31/31_Vaudreuille_7.jpg","../../jctruffet.com/image/image_31/31_Vaudreuille_8.jpg"]},"Consult_chateau_formulaireaecc":{"id":"Consult_
