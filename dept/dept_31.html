ette architecture remonte aux origines du village, au XIIIe siècle, période d'édification d'une grande tour carrée, origine du château, à la confluence de deux ruisseaux. Le château connaîtra par la suite de nombreuses modifications, notamment du XVIe au XVIIIe siècle.                                                                                                                                      château Catelan, reconstruit au XIXe siècle, et porte le nom de Jean-Paul Laurens. Classée à lInventaire des monuments historiques, l'orangerie faisait initialement partie des dépendances du château. Ce bâtiment sans étage est couronné par trois frontons ornés de mascarons et de bas-reliefs, dont un représente Flore, la déesse de la nature.","habitants":"Famille Beccaria de Pavie\r\n        \"","divers":"Château de Fourquevaux et de Catelan","gps":"","images":["../../jctruffet.com/image/image_31/31_Fourquevaux_1.jpg","../../jctruffet.com/image/image_31/31_Fourquevaux_2.jpg","../../jctruffet.com/image/image_31/31_Fourquevaux_3.jpg","../../jctruffet.com/image/image_31/31_Fourquevaux_4.jpg","../../jctruffet.com/image/image_31/31_Fourquevaux_5.jpg","../../jctruffet.com/image/image_31/31_Fourquevaux_6.jpg","../../jctruffet.com/image/image_31/31_Fourquevaux_7.jpg","../../jctruffet.com/image/image_31/31_Fourquevaux_8.jpg"]},"Consult_chateau_formulaire96a1":{"id":"Consult_chateau_formulaire96a1","dept":"31","canton":"Cazères","commune":"Fousseret","nom":"Fousseret","type":"Château","periode":"XVIII","histoire":"A Fousseret trois châteaux celui de Fousseret du   Petit Johannet  et de  la Grave  viticole et chambres d'hôtes  situés sur la route de Saint-Elix.                                                                          FOUSSERET, au Moyen-Age, le Fousseret est un « castrum » cest-à-dire un château doublé dun village fortifié, en 1226, les comtes de Toulouse et de Comminges contraignent les coseigneurs du Fousseret, les seigneurs de Noé, dOrbessan et de Seysses  qui sont leurs vassaux, à sen partager les droits et les obligations, notamment la garde et lentretien des fortifications de « terre et de bois » et à mettre fin à leurs querelles. Cest ce quon a improprement appelé « lacte de paréage ». Le site du Picon porte alors un château et sans doute un premier habitat autour du château. Puis, un autre habitat fortifié sest développé à lest et au sud du Picon comme latteste la mention de « porte dAspet » et lexistence de talus fortifiés. Au XIIIe siècle, le village se dilate au sud-est vers la porte den bas et surtout au nord où le faubourg sorganise autour des rues Maubec, de la Tour et de la Grand Rue. En 1271, la cité est rattachée au domaine royal, avec le comté de Toulouse dont elle fait partie depuis son rachat par Alphonse de Poitiers qui en avait hérité par sa femme. . En 1531, les franchises dont jouit Le Fousseret sont confirmées par François Ier.                      PETIT-JOHANNET sur la commune de Fousseret  en 1271, la cité est rattachée au domaine royal, avec le comté de Toulouse dont elle fait partie depuis son rachat par Alphonse de Poitiers qui en avait hérité par sa femme. En 1531, les franchises dont jouit Le Fousseret sont confirmées par François Ier.  Au XIXe siècle, la ville connaît un important essor économique quattestent encore les belles façades des anciennes maisons bourgeoises.","architecture":"Du château Picon, au XIVe Siècle, une enceinte de briques flanquée de tours est construite pour  protéger la ville, Il reste quelques vestiges de cette enceinte. Au XVIIIe Siècle, le château, en partie ruiné et qui sert alors de prison est détruit (vers 1820) pour laisser place à lactuelle promenade du Picon. le château actuel de plan rectangulaire à trois niveaux toit en croupe, accolé sur façade d'entrée de deux tours carrées à quatre niveaux toit en ardoises quatre pans.                                                           Grave, un authentique château du XVIe siècle restauré  au début XIXe siècle dans le style Louis XIII.                                                                                           Au XVIIIe Siècle, le château du petit-Johannet, de plan rectangulaire à deux niveaux avec série de lucarnes sur toit à la Mansard, en partie ruiné et qui sert alors de prison est détruit vers 1820 pour laisser place à lactuelle Promenade du Picon. Au XIXe siècle, la ville connaît un important essor économique quattestent encore les belles façades des anciennes maisons bourgeoises.","habitants":"\"","divers":"Château du Petit-Johanés de la Grave et de Fausseret.","gps":"","images":["../../jctruffet.com/image/image_31/31_Fousseret_1.jpg","../../jctruffet.com/image/image_31/31_Fousseret_2.jpg","../../jctruffet.com/image/image_31/31_Fousseret_3.jpg","../../jctruffet.com/image/image_31/31_Fousseret_4.jpg","../../jctruffet.com/image/image_31/31_Fousseret_5.jpg"]},"Consult_chateau_formulaire00cc":{"id":"Consult_chateau_formulaire00cc","dept":"31","canton":"Fronton","commune":"Fronton","nom":"Fronton","type":"Château","periode":"XVIII","histoire":"A Fronton plusieurs châteaux vinicoles  dont celui de  Capdeville de  Marine Gholami,  la maison du vin, celui de Cransac, de Joliet, de Bellevue la Forêt (voir article) Le vignoble a été créé par Patrick Germain en 1974. et de Clamens. Mis à part Capdeville et Joliet pas d'information historique pour les autres châteaux.","architecture":"château Capdeville se développe sur 4 niveaux chacun : le sous-sol, le rez de jardin, le premier étage et les combles. Ce programme a pour objet, la restructuration  en maison des vins et du tourisme et la création dune extension servant de lieu de réceptions (séminaires, mariages) avec un espace traiteur.  Choix architecturale : entre patrimoine et modernité\r\nAvant tout, le château de Capdeville, maison datant des années 1870 devait être rénové. Il s'agissait aussi de créer une extension en concevant une architecture qui correspond à des besoins contemporains et en relation avec celle du patrimoine ancien.                                                                     Joliet Le domaine de Joliet a changé de propriétaire, Marie-Claire et François Daubert vont profiter d'une retraite méritée. Marie-Ange et Jérôme Soriano ne sont pas des nouveaux venus, ils cultivent la vigne et la négrette depuis longtemps pour la cave coopérative.","habitants":"Viticulteurs\r\n        \r\n        \"","divers":"Château de Capdeville, de Cransac de Joliet, de vignolles et de Clamens à Fronton","gps":"","images":["../../jctruffet.com/image/image_31/31_Fronton_1.jpg","../../jctruffet.com/image/image_31/31_Fronton_2.jpg","../../jctruffet.com/image/image_31/31_Fronton_3.jpg","../../jctruffet.com/image/image_31/31_Fronton_4.jpg","../../jctruffet.com/image/image_31/31_Fronton_5.jpg","../../jctruffet.com/image/image_31/31_Fronton_6.jpg","../../jctruffet.com/image/image_31/31_Fronton_7.jpg"]},"Consult_chateau_formulairef594":{"id":"Consult_chateau_formulairef594","dept":"31","canton":"Muret","commune":"Frouzins","nom":"Frouzins","type":"Château","periode":"XVI","histoire":"Deux châteaux à Frouzins celui des Demoiselles  et celui de Montbel.  De la période féodale à la fi n du XVIe siècle, Frouzins est une seigneurie abrité par une enceinte  de son passé, il reste aussi trois châteaux, La Bourgade propriété de monsieur Darolles, Les Demoiselles et  Montbel.                                                  DEMOISELLES, en 1742, Pierre-François Dumay, chanoine de l'église Saint-Sernin de Toulouse, rend hommage au roi pour la partie de Frouzins, achetée précédemment à Joseph de Maynial-Latomy. René-Bernard de Gaillard, seigneur de Frouzins, est capitoul en 1744, sa famille rebâtit le château seigneurial, route de Plaisance. Connu aujourd'hui sous le nom de « château des Demoiselles ». Pendant la Terreur, Jean-Louis-René de Gaillard, conseiller au parlement de Toulouse, est inquiété comme de nombreux parlementaires. En 1794, il est arrêté et emprisonné dans la prison de la Visitation, puis emmené à Paris où il est jugé, condamné et guillotiné, place de la Révolution, le 14 juin de cette année.                                                                                                              MONTBEL, d'Antoine de Montbel, propriétaire du château. Ce dernier fut par la suite la propriété du comte Alfred d'Antras qui s'y maria avec Léonie Marestaing.   Messire Pierre de Laguarigue de Savigny chevalier brigadier des armées du roi et capitaine de vaisseau, grand-oncle maternel, représenté par messire Jacques François Michel Marin, écuyer, frère, gouverneur de la ville de Montesquieu au diocèse de Rieux ; Marie Claire de Perié  épouse de messire Guillaume Marcel Marin gouverneur de la ville de Rieux.","architecture":"Château des Demoiselles du XVIIIe et XIXe siècles, inscrit aux monuments historiques en 1979 : Façades et toitures du château à l'exclusion de la tour Nord-Est du XIXe siècle, des communs, de l'orangerie et du pigeonnier, escalier intérieur avec sa rampe à balustres. Résidence de campagne du XVIIIe siècle composé d'une maison d'habitation jouxtée de communs disposés autour d'une cour. Le château rectangulaire est à un étage, la façade de l'avant corps central est surmonté d'un fronton triangulaire. Une tour a été élevée au XIXe siècle pour abriter un réservoir. Au rez-de-chaussée, décor de gypseries dans le petit salon de la salle à manger, une pièce servant de débarras et le grand salon. Le décor de gypserie fait le tour de la pièce, associé à cinq dessus de porte dont les peintures datent sans doute du début du siècle.\r\nChâteau de Montbel, seigneurie mentionnée dès le XVIe siècle. Résidence de campagne du XVIIIe siècle composé d'un corps de logis rectangulaire  à trois niveaux à fenêtres réduites au troisième étage et une lucarne centrale sur toit avec prolongement sur le centre, l'édifice est flanqué en façade de deux tours carrées sur angles  à quatre niveaux toit à quatre pans, le bâtiment est accolé sur les côtés de dépendances et orangerie  de un niveau.","habitants":"Famille de Jean de Maynial\r\n        \r\n        \"","divers":"Château des Demoiselles et de Montbel à Frouzins","gps":"","images":["../../jctruffet.com/image/image_31/31_Frouzins_1.jpg","../../jctruffet.com/image/image_31/31_Frouzins_2.jpg","../../jctruffet.com/image/image_31/31_Frouzins_3.jpg","../../jctruffet.com/image/image_31/31_Frouzins_4.jpg"]},"Consult_chateau_formulairee447":{"id":"Consult_chateau_formulairee447","dept":"31","canton":"Castelginest","commune":"Gagnac sur Garonne","nom":"Gagnac","type":"Château","periode":"XVI","histoire":"Deux châteaux à Gagnac sur Garonne,  celui de Gagnac et celui de Durcis.                                                                                     GAGNAC Le 9 novembre, dans la salle du conseil de la mairie, l'acte de vente du château a été signé entre d'une part la mairie représentée par son maire Michel Simon, d'autre part Lydia et Fouad Meftouh. C'est avec beaucoup d'émotion que Michel Simon leur a remis  les clés, de ce site si cher aux gagnacais. Rencontre avec Lydia et Fouad Meftouh dans ce qui sera leur nouvelle demeure dès que cela sera possible. La famille dans l'immédiat savoure un rêve qui se réalise.                                                                                                  DURCIS,   Ehpad  Pas d'information historique.","architecture":"Nous savons ce que nous voulons. Ce sera la résidence principale de notre famille. . Mais au-delà de cela, notre but est la conservation et la restauration du patrimoine historique de Gagnac sur Garonne, sans oublier le parc avec ses arbres centenaires. Nous voulons rendre au château son aspect d'origine, édifice de plan carré à trois niveaux avec série de lucarnes dur toit en croupe accolé de quatre tours hexagonales aujourd'hui à toitures en poivrières. conservations  des éléments d'origine, parquets, plafonds, les cheminées, et surtout les armoires en bois dans les salles principales et refaire le toit.","habitants":"Famille de Fouad Meftouh\r\n        \"","divers":"Château de Gagac et de Durcis","gps":"","images":["../../jctruffet.com/image/image_31/31_Gagnac_1.jpg","../../jctruffet.com/image/image_31/31_Gagnac_2.jpg"]},"Consult_chateau_formulairedc1c":{"id":"Consult_chateau_formulairedc1c","dept":"31","canton":"Auterive","commune":"Gensac sur Garonne","nom":"Gensac_Tersac","type":"Maison forte","periode":"XVIII","histoire":"Gensac,  le château de Gensac-sur-Garonne date du XVIIIe siècle. Les seigneurs de Gensac sont nommés dès le XIIe siècle.  Il est inscrit aux M.H. par arrêté du 23 juillet 1981.  pas d'information historique.","architecture":"Château construit en briques sur un plan rectangulaire avec, aux angles, quatre pavillons. Une corniche saillante de briques sépare le rez de chaussée de l'étage, et court au-dessous du toit. La porte d'entrée est en plein cintre. Une porte fenêtre rectangulaire lui correspond au milieu de la façade arrière.      Le bâtiment actuel remonte au XVIe siècle. Cest un édifice rectangulaire. Il comprend au sud un bâtiment étroit qui sert de cage descalier, accolé à un édifice plus ancien de trois étages, au mur très épais (1,50m). Le premier étage est formé de deux salles contiguës dotées chacune dune cheminée en anse de panier. Elles donnent sur lextérieur par de grandes fenêtres à meneaux.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château de Gensac à Gensac sur Garonne","gps":"","images":["../../jctruffet.com/image/image_31/31_Gensac_Tersac_1.jpg","../../jctruffet.com/image/image_31/31_Gensac_Tersac_2.jpg","../../jctruffet.com/image/image_31/31_Gensac_Tersac_3.jpg","../../jctruffet.com/image/image_31/31_Gensac_Tersac_4.jpg"]},"Consult_chateau_formulaire411e":{"id":"Consult_chateau_formulaire411e","dept":"31","canton":"Saint-Gaudens","commune":"Boulogne sur Gesse","nom":"Gesse","type":"Château","periode":"XVI","histoire":"GESSE Aujourd'hui  Haras de la Gesse.                                                                                      La Bastide de Boulogne fut fondée en 1286 par l'abbaye de Nizors sous l'abbé Taillefer, en paréage avec le Roi de France.  Jusqu'à la Révolution, Boulogne (Boulogne-sur-Gesse depuis 1958) était une des nombreuses enclaves de la Jugerie de Rivière-Verdun avec les paroisses de Saint-Pé-Delbosc (Haute-Garonne) et de Lalanne-Arqué (Gers), toutes les trois étant alors des paroisses du Comminges en limite de la Gascogne.","architecture":"Gesse château de plan rectangulaire à trois niveaux flanqué de pavillons rectangulaires accolés de tourelles donjon plein cintre sur façade crénelée et mâchicoulis.","habitants":"Abbé Taillefer\r\n        \"","divers":"Château de Gesse à Boulogne sur Gesse","gps":"","images":["../../jctruffet.com/image/image_31/31_Gesse_1.jpg","../../jctruffet.com/image/image_31/31_Gesse_2.jpg","../../jctruffet.com/image/image_31/31_Gesse_3.jpg"]},"Consult_chateau_formulairef859":{"id":"Consult_chateau_formulairef859","dept":"31","canton":"Bagnères de Luchon","commune":"Gourdan-Polignan","nom":"Gourdan_Polignan","type":"Manoir","periode":"XV","histoire":"GOURDAN, au XIIe siècle, un château fort existait sur la colline du Bouchet. Dépendait de la châtellenie de Sauveterre, et son territoire appartenait au Nébouzan tandis que Polignan faisait partie du Comminges. Comminges et Nébouzan avaient des statuts politiques distincts.  Au cours du XVIe siècle, la seigneurie de Gourdan passe entre les mains de la famille des Binos dont la marque est une roue dentelée faisant référence à linstrument de supplice de Sainte-Catherine dAlexandrie. A cette époque, la seigneurie de Gourdan est tenue par les Mauléon, puis les Binos et enfin les Lassus qui, faisant partie des curiaux de Rivière, rendaient la justice. Au cours du XVIe siècle la seigneurie de Gourdan passe entre les mains de la famille de Mauléon, avant dêtre détenue par la famille des Binos. Les Lassus-Duperon ont racheté le manoir peu de temps avant la révolution. Depuis cette époque, les propriétaires se succèdent.\r\n Polignan reste un lieu-dit de Gourdan jusquen 1905, année au cours de laquelle est créée la commune de Gourdan-Polignan. Le blason de la commune symbolise les deux grands seigneurs de Gourdan. Le lévrier dressé sur ses pattes arrière, appelé le \"lévrier rampant\", est le symbole de la famille de Bize dont un membre était le seigneur de Gourdan à la Renaissance.","architecture":"Un château Renaissance de Gourdan fut édifié en 1520 par Hespagnolet de Mauléon au pied du Bouchet, a été construit à la Renaissance par le seigneur de Gourdan, membre de la famille de Bize. Auparavant, le seigneur local résidait dans un petit château situé sur la colline du Bouchet. \r\nManoir de plan d'équerre à deux niveaux  avec donjon en angle hors oeuvre sur angle  extérieur  échauguettes et tour carrée sur angle intérieur, l'ensemble semble être remanié dernièrement avec un toit en ardoises.","habitants":"Famille de Bize\r\n        \"","divers":"Château de Gourdan à Polignan","gps":"","images":["../../jctruffet.com/image/image_31/31_Gourdan_Polignan_1.jpg","../../jctruffet.com/image/image_31/31_Gourdan_Polignan_2.jpg"]},"Consult_chateau_formulaired56c":{"id":"Consult_chateau_formulaired56c","dept":"31","canton":"Bagnères de Luchon","commune":"Guran","nom":"Guran","type":"Château","periode":"XVII","histoire":"Trois châteaux à Guran celui de Cierp, celui de Serres Barbier.                            GURAN, sur le côté ouest du château se trouve une chapelle du XVIIe siècle. Le bâtiment a été construit par Jean Louis de Binos, seigneur de Signan, homme d'armes, qui se serait retiré vers la fin de sa vie dans sa maison de Guran et y serait mort en 1659. A cet emplacement se trouvait le château féodal, le fief de Guran appartenant au comté de Comminges.\r\nEléments protégés MH : les façades et les toitures du château et de la chapelle ; cheminées de la salle à manger et du salon au rez-de-chaussée ; cheminée de la chambre de maître au premier étage; cheminée de style Troubadour au deuxième étage ; escalier : inscription par arrêté du 12 septembre 1977.","architecture":"GURAN, château à trois niveaux, construit  au XVIIe siècle sur un plan en L cantonné, aux trois angles, de trois tours carrées. deux façades   en équerre plus riantes sur cour d'honneur La petite cour d'honneur présente deux tourelles en damier de marbre rose et blanc. A l'intérieur, escalier à rampes droites et balustres en marbre rose.                                                                                                         Serres-Barbier, ce château du XIXe siècle se trouve dans un jardin privé près de la forêt de Marignac, à seulement 9 km de la frontière espagnole. Le château Serre Barbier propose des chambres modernes et décorées individuellement.","habitants":"Famille de  Jean-Louis de Binos\r\n        \"","divers":"Château de Cierp et de Serres Barbier à Guran","gps":"","images":["../../jctruffet.com/image/image_31/31_Guran_1.jpg","../../jctruffet.com/image/image_31/31_Guran_2.jpg","../../jctruffet.com/image/image_31/31_Guran_3.jpg","../../jctruffet.com/image/image_31/31_Guran_4.jpg","../../jctruffet.com/image/image_31/31_Guran_5.jpg"]},"Consult_chateau_formulaire3b74":{"id":"Consult_chateau_formulaire3b74","dept":"31","canton":"Escalquens","commune":"issus","nom":"Issus","type":"Château","periode":"XVII","histoire":"Issus , Raymond Corraze (prêtre dIssus auteur de nombreux textes et essais sur la seigneurie et le seigneur d Issus.                                                                                          Hôtel de madame Christine Lascazas  de Saint-Martin.","architecture":"Le château dIssus : « vaste construction rectangulaire avec un jardin fermé de hautes murailles de briques, parc aux ombrages séculaires et une immense cour précédée dune porte monumentale formant porcheAu fond de cette cour, le bâtiment principal flanqué de 4 pigeonniers caractéristiques du Lauragais. Sa construction a dû débuter au commencement du XVIIe siècle sous les règnes dHenri IV et de Louis XIII. Le château fut pillé par les Huguenots et incendié vers 1590-1591. \r\nLéclatante luminosité de son ciel, la rare qualité de la lumière qui la baigne, la splendeur de ses horizons, la tiédeur de son climat, la grâce mesurée de ses collines et de ses vallons, la fertilité de son sol, les rudes caresses du vent dAutan qui purifie latmosphère, toutes ces qualités réunies en font une terre délite et lui communiquent cette poésie intense qui se dégage de beaux spectacles de la nature et qui enchante nos yeux avant démouvoir les facultés de notre âme.","habitants":"Seigneur Locaux\r\n        \"","divers":"Château d'Issus","gps":"","images":["../../jctruffet.com/image/image_31/31_Issus_1.jpg","../../jctruffet.com/image/image_31/31_Issus_2.jpg","../../jctruffet.com/image/image_31/31_Issus_3.jpg","../../jctruffet.com/image/image_31/31_Issus_4.jpg","../../jctruffet.com/image/image_31/31_Issus_5.jpg"]},"Consult_chateau_formulaire27f8":{"id":"Consult_chateau_formulaire27f8","dept":"31","canton":"Cazères","commune":"Lherm","nom":"Jottes","type":"Château","periode":"XVI","histoire":"Deux châteaux à Jottes celui de Jottes et de Serreuille.                                        JOTTES,  le château  et ses communs dont les premières mentions datent du XIe siècle est presque entièrement construit en briques.  Lors de la belle époque, il connut une vie mondaine importante comme l'atteste la vaste salle de bal du rez-de-chaussée.  L'incendie de 1997 détruisit une partie importante du château de Serreuille et surtout son remarquable mobilier. Sa cour intérieure carrée, utilisée pour des spectacles, a des proportions monumentales.   Le château de Jottes à Lherm, retrouvera son lustre d'antan grâce à l'opiniâtreté de ses propriétaires. Cinquième volet de notre dossier sur le patrimoine. Claude et Nicole Clairac, propriétaires du château.\r\nEt pourtant tout avait bien commencé. En 1980, Claude, un professionnel de la rénovation de bâtiments anciens et son épouse Nicole, restauratrice de formation, vendent leur résidence girondine. Ils se portent acquéreurs du château ; une belle demeure avec un corps principal du XVIIe siècle, des écuries fermant une cour centrale et 13 hectares de parc et bois.","architecture":"Le château de Jottes et ses communs dont les premières mentions datent du XIe siècle est presque entièrement construit en briques.\r\nLors de la belle époque, il connut une vie mondaine importante comme l'atteste la vaste salle de bal du rez-de-chaussée. \r\nL'incendie de 1997 détruisit une partie importante du château et surtout son remarquable mobilier. Sa cour intérieure carrée, utilisée pour des spectacles, a des proportions monumentales.\r\nLe château de la Serreuille, également en briques a été remanié au cours des siècles et conserve une vasque de marbre, vestige d'une fontaine italienne. Jottes à la fin du XIIe siècle, un castrum (château fort) occupe l'actuelle place de l'église, les douves le ceinturant sont devenues les voies de circulation au coeur du village. ils redonnent éclat et splendeur au château. Ils aménagent quatre chambres d'hôtes meublées dans un style napoléonien, restaurent la rotonde, la grande salle de bal aux tentures géantes, où jadis étaient données des fêtes somptueuses. Nicole qui n'a pas perdu ses talents de cuisinière accueille  sur réservations  ses clients en bonne maîtresse de maison. Le château constitue un cadre idéal pour mariages et séminaires.","habitants":"Famille de Clairac\r\n        \"","divers":"Château  de Jottes et de Serreuille à Jottes","gps":"","images":["../../jctruffet.com/image/image_31/31_Jottes_1.jpg","../../jctruffet.com/image/image_31/31_Jottes_2.jpg","../../jctruffet.com/image/image_31/31_Jottes_3.jpg"]},"Consult_chateau_formulaire5d0d":{"id":"Consult_chateau_formulaire5d0d","dept":"31","canton":"Revel","commune":"Juzes","nom":"Juzes","type":"Château","periode":"XV","histoire":"JUZES  En 1440 Arnaud de la Tour d'Auvergne de Juzes fait un legs à l'église Notre-Dame de Lasplane. Quelques années plus tard en 1477, Louis XI, en délicatesse avec les anglais échange le Lauragais contre la terre de Boulognes-sur-Mer, fief de Bertrand de la Tour d'Auvergne et de Boulogne.\r\n Ils prennent alors le nom de la Tour d'Auvergne, comte du Lauragais et possèdent un vaste territoire de Toulouse aux portes de Castelnaudary.\r\n fief transmit  à Bertrand de la Tour comte dAuvergne et de Boulogne, par voie déchange de ce comté contre celui de Boulogne sur Mer, qui avait été reconnu très nécessaire pour la conservation et défense du royaume, tant contre les anglais que les autres. La petite fille de Bertrand épouse Laurent II de Médicis. Leur fille sera Catherine de Médicis.\r\nCette famille possède encore aujourd'hui le château de Saint-Paulet, à quelques kilomètres de Juzes, dans l'Aude où elle conserve, dit-on, l'urne contenant le coeur du grand Turenne, mort au combat en 1675.Le vicomte de Juillac Vignolles  en 1867  s'inquiète de cette ancienne église ; il écrit : \" En 1704, il y avait à la paroisse de Juzes une église dédiée à Notre-Dame de Lasplanes. Y est-elle encore? ... \". Aujourd'hui, on peut répondre \" non \", mais au hameau de Casse, au lieu-dit \" En Capelle \", une croix - existant déjà sur le plan cadastral de 1831 - porte l'inscription .","architecture":"Château de Juze entièrement bâti en pierre, cantonné de deux tours, et ouvert de petites fenêtres carrées. La porte d'entrée est en plein cintre. Le rez-de-chaussée est supporté par une voûte en plein cintre surbaissée. L'enceinte du château est formée en grande partie par les murs extérieurs des communs. A la fin du XVIe siècle, la commune était administrée par trois consuls élus dont l'autorité subissait l'influence du seigneur. Toute décision prise n'avait force de loi qu'après avoir été approuvée par le châtelain.","habitants":"Bertrand de la Tour d'Auvergne\r\n        \"","divers":"Château de Juzes","gps":"","images":["../../jctruffet.com/image/image_31/31_Juzes_1.jpg","../../jctruffet.com/image/image_31/31_Juzes_2.jpg","../../jctruffet.com/image/image_31/31_Juzes_3.jpg","../../jctruffet.com/image/image_31/31_Juzes_4.jpg"]},"Consult_chateau_formulaire2c3e":{"id":"Consult_chateau_formulaire2c3e","dept":"31","canton":"Escalquens","commune":"Labastide Beauvoir","nom":"Labastide_Beauvoir","type":"Château","periode":"XIII-XVIII","histoire":"LABASTIDE-BEAUVOIR, la construction de « la Bastide » débute sous Saint-Louis (Louis XI) au XIIIe siècle. En 1300, elle est la propriété du Baron de Labastide, seigneur de Fourquevaux. Elle est achetée par Jean de Beauvoir en 1482 et donne son nom au village. En 1510, François 1er autorise la famille de Beauvoir à porter les armoiries des comtes de Toulouse. Un descendant cède la Bastide en 1679 à Marie d'Assézat.   Depuis, la propriété est passée de main en main à l'occasion de mariages et de successions : la famille de Comère, conseillers au parlement de Toulouse, qui y firent d'importants travaux au XVIIIe siècle, incluant l'aile ou se trouve l'Orangerie. Puis les familles d'Anceau, par héritage à la famille  de Marsac. En 1888, Gabriel de Saint Blanquat hérite de Labastide Beauvoir de son grand oncle Victor de Marsac, toujours dans la famille de Raoul de Saint-Blanquart.","architecture":"La Bastide Beauvoir, édifice dont la construction a commencé au XIIIe siècle pour s'achever au XVIIIe  siècle. A cette époque l'édifice fortifié disposait de tours, douves, fossés, oubliettes, souterrains et tunnels de secours aujourd'hui disparus, à l'exception de la tour sud visible depuis l'intérieur du salon du conseiller du parlement. Situé à 25 km à l'est de Toulouse et à 12 km de Villefranche de Lauragais, le château de Labastide-Beauvoir est une grande demeure familiale dont la construction a débuté au XIIIe siècle par l'édification d'une bastide qui a évolué jusqu'au XVIIIe. C'est de cette Bastide qu'est né, au XVe siècle, le nom du village.\r\nAu coeur d'un parc boisé d'arbres centenaires, le  château vous accueille toute l'année pour vos mariages, communions, autres réceptions. L'ancienne orangerie du château, aux murs de briques toulousaines a été transformée en salle de réception pouvant accueillir jusqu'a 280 personnes assises. Donnant de plein-pied sur les jardins à la française du château, la salle modulable selon vos besoins, permet d'accueillir vos convives dans un cadre privilégié. Son sol pavé de terre cuite et ses mûrs en briques apparentes, donnent à cette salle, d'une superficie de 320m², un charme et une chaleur particulière. Votre réception prendra une dimension inoubliable.","habitants":"Baron de Labastide                                                                             Famille de Beauvoir\r\n        \"","divers":"Château de Labastide-Beauvoir","gps":"","images":["../../jctruffet.com/image/image_31/31_Labastide_Beauvoir_1.jpg","../../jctruffet.com/image/image_31/31_Labastide_Beauvoir_2.jpg","../../jctruffet.com/image/image_31/31_Labastide_Beauvoir_3.jpg","../../jctruffet.com/image/image_31/31_Labastide_Beauvoir_4.jpg","../../jctruffet.com/image/image_31/31_Labastide_Beauvoir_5.jpg","../../jctruffet.com/image/image_31/31_Labastide_Beauvoir_6.jpg","../../jctruffet.com/image/image_31/31_Labastide_Beauvoir_7.jpg"]},"Consult_chateau_formulaire47aa":{"id":"Consult_chateau_formulaire47aa","dept":"31","canton":"Cazères","commune":"Labastide Paumès","nom":"Labastide_Paumès","type":"Château","periode":"XVI-XVIII","histoire":"Quatre châteaux à Labastide Paumès comprenant celui de  Labastide,  la Broquère à  st-André et le château de Riolas                                                                 LABASTIDE-PAUMES,  château  inscrit au titre des monuments historiques depuis 1927. on peut situer lorigine du village de Labastide-Paumès entre 1200 et 1300. Fut pendant un temps un haut lieu du Comminges, à cause de la puissance de sa famille seigneuriale : les Dorbessan. Ils sont seigneurs de Labastide, mentionnés très tôt comme donateurs de biens. Aucun document ne peut nous préciser lorigine et la date exacte de cette bastide, fondée sur la rive gauche du Touch.                                                                      FABAS, ancienne ferme fortifiée, autrefois entité religieuse et agricole groupée autour d'une petite église, c'est sur ce domaine que Yann et Loïc Augustin élèvent avec un soin méticuleux des vins intenses,  Ils portent la marque de ce terroir, naturel, sincère et préservé, qui les a vus naître et grandir. Sur cette propriété, La famille Augustin révèle la richesse exceptionnelle qu'offre vignes et terroir, à la recherche de l'élégance puis de la puissance, dans le souci d'obtenir un équilibre parfait.                                                                                                                                                                                                                                                                                     RIOLAS, gîtes de France.","architecture":"Le château De Labastide-Paumès comprend une tour circulaire, qui renferme l'escalier en spirale, s'ouvrant par une porte rectangulaire encadrée d'un triple rang de moulures s'entre-pénétrant. De chaque côté de la porte, deux culots ornés de feuilles de chardon supportent deux pinacles reliés par un arc en contre courbe, dessinant un tympan au dessus de la porte. Dans le tympan, portée par un culot, se trouve la statue d'un chevalier en armure appuyé sur un écu armorié.                                                                                              Le château d'Orbessan du XVIe siècle, dans sa cour intérieure, une façade en pierre fait penser au style de la Renaissance. Sur cette dernière se trouve la porte de la chapelle castrale avec un oculus, 2 ouvertures ogivales surmontées d'une fenêtre à meneaux et, en haut de quelques marches, une porte en plein cintre, 2 colonnes de style ionique.                                                                                                                                                                                                                Riolas, de plan rectangulaire à trois niveaux toit en croupe en façades deux balconnet avec fronton retondant sous une charpente à toit pointus protégeant uniquement ce fronton; l'édifice est accolé à un pavillon rectangulaire en retour d'équerre avec deux balconnets en façade et un toit en croupes plus prononcé.","habitants":"Famille des Dorbessan                                                                        Famille Augustin                                                                             \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Château de labastide, d'Orbessan de Riolas et de Poudelay à Labastide-Paumès.","gps":"","images":["../../jctruffet.com/image/image_31/31_Labastide_Paumes_1.jpg","../../jctruffet.com/image/image_31/31_Labastide_Paumes_2.jpg","../../jctruffet.com/image/image_31/31_Labastide_Paumes_3.jpg","../../jctruffet.com/image/image_31/31_Labastide_Paumes_4.jpg","../../jctruffet.com/image/image_31/31_Labastide_Paumes_5.jpg","../../jctruffet.com/image/image_31/31_Labastide_Paumes_6.jpg","../../jctruffet.com/image/image_31/31_Labastide_Paumes_7.jpg"]},"Consult_chateau_formulairee9c4":{"id":"Consult_chateau_formulairee9c4","dept":"31","canton":"Castanet-Tolosan","commune":"Lacroix_Falgarde","nom":"Lacroix_Falgarde","type":"Château","periode":"XVI","histoire":"LACROIX-FALGARDE ;   au XIVe siècle,  la seigneurie de Lacroix a été achetée  par François Delpuech, un riche marchand pastelier, homme de guerre, puis quil conduisit des opérations pendant les guerres de religion sous les ordres de Blaise de Montluc. Lacquisition de terres nobles quil complète par lachat de la métairie de Falgarde en 1574, fait édifié  par l'architecte Dominique Bachelier la demeure campagnarde confortable, les travaux sont achevés en 1581. Au 1er étage, dans la grande salle se trouve une magnifique cheminée à briques moulurées. Au XVIIIe siècle les Delpuech remettent en état  avant de le cèder aux Tournemire.  Vers 1730, François de Tournemire adapte les intérieurs au goût du jour, puis en 1900 passe  à Antoine Labit entrepreneur qui  le restaure à nouveau ce dernier  créateur à Toulouse de la « maison universelle ».  Un siècle plus tard, un de ses descendants vend la propriété à un promoteur immobilier. Celui-ci, avec la collaboration d'un architecte du patrimoine toulousain, entreprend la « rénovation » du château dans le but d'y créer des studios et appartements de luxe, inscrit en 1927, est classé monument historique en septembre 1958.","architecture":"Edifié à partir de 1574 : une demeure campagnarde confortable au décor Renaissance, le château se compose de bâtiments autour d'une cour d'honneur  centrale rectangulaire pavée de galets; on y pénètre par un portail en plein cintre encadré de pilastres jumelés à bossages un-sur-deux  comme les pieds-droits et larc du portail, ouvert dans un mur de clôture qui relie deux bastions, percés chacun de deux bouches à feu en pierre qui défendent lentrée. Les ailes dun seul niveau abritent des remises, rythmées de pilastres portant des arcades pleines, mais des traces darrachage montrent quil était prévu un premier étage, sans doute de galeries. Le corps de logis à deux niveaux, coiffé dun toit à la française dorigine, couvert de tuiles en écaille, sétend sur trois travées de fenêtres à meneaux et croisillons de pierre très finement sculptée. Le corps de logis est encadré de deux tours, dont celle de gauche le dépasse dun niveau ; fortement taluté sur lextérieur, elles sont aussi équipées de canonnières de pierre qui défendent les fossés et lentrée de la façade sur parc, de cinq travées, avec un corps central au très léger ressaut, le corps de logis  de plan carré à tours en bastion (losangées) a certainement servi de modèle à Caumont, La Réole, Varennes et Maurémont.","habitants":"Famille de François Delpuech\r\n        \"","divers":"Château de Lacroix-Falgarde","gps":"","images":["../../jctruffet.com/image/image_31/31_Lacroix_Falgarde_1.jpg","../../jctruffet.com/image/image_31/31_Lacroix_Falgarde_2.jpg","../../jctruffet.com/image/image_31/31_Lacroix_Falgarde_3.jpg","../../jctruffet.com/image/image_31/31_Lacroix_Falgarde_4.jpg","../../jctruffet.com/image/image_31/31_Lacroix_Falgarde_5.jpg","../../jctruffet.com/image/image_31/31_Lacroix_Falgarde_6.jpg","../../jctruffet.com/image/image_31/31_Lacroix_Falgarde_7.jpg","../../jctruffet.com/image/image_31/31_Lacroix_Falgarde_8.jpg","../../jctruffet.com/image/image_31/31_Lacroix_Falgarde_9.jpg"]},"Consult_chateau_formulairefa7d":{"id":"Consult_chateau_formulairefa7d","dept":"31","canton":"Auterive","commune":"Lafitte_Vigordane","nom":"Lafitte_Vigordane","type":"Château","periode":"XVII","histoire":"LAFITTE-VIGORDANE, le 27 novembre 1693, noble Léonard Bastard, ancien capitoul de Toulouse âgé de 80 ans, fils de Blaise de Bastard, écuyer, co-seigneur de Vidalot, de Mirail et de Paul de Lauzit. À partir du Moyen-Âge jusqu'à sa disparition en 1790 pendant la Révolution Française, Lafitte-Vigordane faisait partie du diocèse de Rieu,  où les Rémusat ont habité ainsi que la petite-fille de Lafayette. \r\nLe père de Charles de Rémusat, Auguste Laurent, comte de Rémusat, appartenant à une bonne famille de Toulouse, était chambellan de Napoléon Ier, mais se rallia, à la Restauration, aux Bourbons et devient préfet de la Haute-Garonne. Après la Révolution de juillet 1830, il entra dans la vie politique active. Il fut élu député de la Haute-Garonne par le collège électoral de Muret, dont il ne cessa d'être le représentant jusqu'en 1848. Le 8 janvier 1846, il entra à l'Académie Française. En 1871, il fut nommé ministre des affaires étrangères. Puis à la suite d'une élection partielle, il fut élu en Haute-Garonne. Il siégea jusqu'à sa mort le 6 juin 1875. La petite-fille de Lafayette, Pauline de Lasteyrie, fut lépouse de Charles de Rémusat. Marie Lannelongue née Marie Cibiel,  issue d'une famille bourgeoise  implantée dans le commerce et l'industrie des tissus. En 1857, elle épouse en première noce le vicomte Pierre de Rémusat, fils de Charles de Rémusat. Veuve à 25 ans, elle se consacre aux autres et crée deux écoles gratuites pour filles en Haute-Garonne, à Lafitte-Vigordane et à Fabas.","architecture":"Château de Lafitte-Vigordane, édifice constitué d'un corps de logis rectangulaire à deux niveaux et attiques à toit en tuiles à deux pans flanqué de chaque côtés d'un pavillon rectangulaire toit à quatre pans à faible hauteur au niveau de l'ensemble saillant côté parc retour en équerre d'un bâtiment oblong d'un niveau et attiques se terminant par une tour carrée et prolongé par un autre bâtiment en équerre de dépendances. Inscrit au titre des monuments historiques depuis 1991.","habitants":"noble Léonard Bastard\r\n        \"","divers":"Château de Lafitte-Vigordane","gps":"","images":["../../jctruffet.com/image/image_31/31_Lafitte_Vigordane_1.jpg","../../jctruffet.com/image/image_31/31_Lafitte_Vigordane_2.jpg","../../jctruffet.com/image/image_31/31_Lafitte_Vigordane_3.jpg","../../jctruffet.com/image/image_31/31_Lafitte_Vigordane_4.jpg"]},"Consult_chateau_formulaire4ce0":{"id":"Consult_chateau_formulaire4ce0","dept":"31","canton":"Léguevin","commune":"Thil","nom":"Lagaillarde","type":"Château","periode":"XIX","histoire":"Thil, au Moyen Âge le village était un fief des Jourdain de lIsle, dont les descendants, de Tilho, ont laissé leur nom au village fortifié de Thil fut construit contre la butte du château, à laquelle il était relié par un pont-levis. La protection de ce bourg était assurée à lest par un mur très épais, sur lequel sappuyait des maisons à lintérieur de lenceinte. Le château ayant disparu. La mairie fut construite entre 1840 et 1850  sur la butte.                                                                                                                                           LAGAILLARDE construit en 1859, par  M. Lagaillarde fit construire un château sur les terres de son beau-père, M. Estellé qui était propriétaire terrien et agriculteur à Thil. Le château Lagaillarde est un château néo-gothique situé à 25 km de Toulouse. relais de chasse construit en 1859, abrite aujourd'hui des chambres d'hôtes  de Jacques De Jesse.","architecture":"Le château Lagaillarde est un château néo-gothique,  de brique orné de décors de terre cuite moulée selon la mode de la seconde moitié du XIXe siècle dans la région toulousaine. Lédifice carré à deux niveaux est encadré de quatre tours en encorbellements  en poivrière autrefois couronnées de toitures pointues.  Le château était entouré de fossés sur trois côtés. On pouvait  y accéder grâce à un pont-levis qui se trouvait à lemplacement actuel de la halle. Les restes des anciens fossés  étaient encore visibles dans les années 1960. Le village sétablit alors autour de léglise tout contre le château.","habitants":"Famille de  Jacques De Jesse \r\n        \"","divers":"Château de Lagaillarde et mairie","gps":"","images":["../../jctruffet.com/image/image_31/31_Lagaillarde_1.jpg","../../jctruffet.com/image/image_31/31_Lagaillarde_2.jpg","../../jctruffet.com/image/image_31/31_Lagaillarde_3.jpg","../../jctruffet.com/image/image_31/31_Lagaillarde_4.jpg","../../jctruffet.com/image/image_31/31_Lagaillarde_5.jpg"]},"Consult_chateau_formulaire89fa":{"id":"Consult_chateau_formulaire89fa","dept":"31","canton":"Portet sur Garonne","commune":"Lagardelle sur Léze","nom":"Lagardelle_Léze","type":"Château","periode":"XVI","histoire":"Quatre châteaux à Lagardelle sur Léze, et aux environs celui de Crazannes, de Redon du XVIIIe siècle,  de Vignaou (mairie) et  un peu plus au nord le château de Vernet pas d'information.                                                                                                                       LAGARDELLE, du XVIe siècle, après bien des cassures, le château fut vendu à une institution qui a fait  un foyer pour les personnes âgées. Aujourdhui, on le nomme « le château des Surs ». Le second, situé sur la côte de la Lèze, fut bâti par les « Villepigue » au commencement du XVIIIe siècle, qui lont habité de 1711 à 1789, plus tard par la famille « Groc », qui la possédé pendant un siècle environ. Aujourdhui  appartient à la municipalité et abrite les services de la mairie, du syndicat dassainissement, et quelques associations.\r\nLe troisième château dit de Redon  semble avoir été habité par les plus anciens seigneurs de Lagardelle. Il se situe au nord de la rue du village. Il fut habité par les trois générations des « Dumay » et fut acquis en 1711 par les « Villepigue » qui ne lhabitèrent pas, il passa en 1760 à M. de Lanes qui était un des coseigneurs de Lagardelle au moment de la Révolution. Le nom passa à un « de Bonnefoy » en 1936 qui fut lui aussi maire. Cest la petite-fille de cette grande famille qui détient le domaine.                                                                              CRAZANNES, l'association du patrimoine communal de Lagardelle vient de publier un nouvel ouvrage retraçant les six siècles d'histoire que nous raconte le château central, communément appelé de notre temps « Maison de retraite Notre Dame de la Paix ».  Des nobles familles De Résseguier, aux de Crazannes en passant par Joséphine Elisabeth Verguin qui légua ce château central, à la fondation des petites surs de Marie mère du rédempteur, le 13 décembre 1967. L'association du patrimoine nous plonge à l'aide d'archives, de plans cadastraux.\r\nVIGNAOU,  ou  siège maintenant la mairie du village.","architecture":"château du Vignaou : fin XVIIIe siècle rénové au XXe siècle Le fort de Lagardelle dominant les deux vallées était un point à exploiter : par le château se situant à lentrée du village (lactuelle mairie). Une grande enceinte carrée, entourée de fossés profonds et de deux hautes tours. \r\n Lagardelle  fut  remanié en 1867. Les quatre tours embellies par un toit recouvert dardoises dominent la vallée de la Lèze.                                Crazannes, quadrangulaire à deux niveaux et attiques flanquées de pavillons carrés  l'ensemble est flanqué de mâchicoulis et créneaux. retour en équerre de chaque côté d'une cour d'honneur de dépendances avec  galeries.                                                                                                                Vernet de plan rectangulaire à deux niveaux avec lucarnes sur toits en croupe accolé d'une tour carrée toit en terrasse.","habitants":"Famille Groc \r\n        \r\n        \"","divers":"Château de Crazannes, de Vignaou de Vernet à Laguardelle sur Léze","gps":"","images":["../../jctruffet.com/image/image_31/31_Lagardelle_Leze_1.jpg","../../jctruffet.com/image/image_31/31_Lagardelle_Leze_2.jpg","../../jctruffet.com/image/image_31/31_Lagardelle_Leze_3.jpg","../../jctruffet.com/image/image_31/31_Lagardelle_Leze_4.jpg","../../jctruffet.com/image/image_31/31_Lagardelle_Leze_5.jpg","../../jctruffet.com/image/image_31/31_Lagardelle_Leze_6.jpg","../../jctruffet.com/image/image_31/31_Lagardelle_Leze_7.jpg"]},"Consult_chateau_formulaire5184":{"id":"Consult_chateau_formulaire5184","dept":"31","canton":"Cazères","commune":"Lahage","nom":"Lahage","type":"Château","periode":"XVI","histoire":"LAHAGE, au XVIIIe siècle, la famille de Mengaud achète la seigneurie de Lahage, cette famille de parlementaires toulousains ennoblis par le capitoulat va donner au château son aspect extérieur quil conserve encore aujourdhui.\r\nLa chapelle du parc  fut construite par la famille de Corail. Elle est en brique et de style néo-gothique et fut achevée en 1872. La chapelle fut dotée dune crypte où reposaient les membres de la famille de Corail.  Pendant la seconde guerre mondiale, le château de Lahage fut lun des repères du réseau Morhange actif dans le contre-espionnage de la Résistance. Durant la seconde guerre mondiale, l'église du village aurait servi de cache pour armes, hommes ou ravitaillement à l'usage du maquis de Rieumes. Par ailleurs, le château servit de point d'appui au réseau Morhange. En 1958, le château est acheté par lAssociation les Jeunes Handicapés (AJH).","architecture":"Château  de Lahage d'époque Louis XIV, ayant servi de résidence aux nobles qui venaient chasser dans les bois de la commune.  De Plan en U trois corps de logis à deux niveaux avec série de Lucarnes sur un toit brisés en ardoise flanqué de quatre tours rondes toit en poivrière, en façade entre tour et bâtiment échauguettes en encorbellement. Chapelle du château, restaurée et rénovée.","habitants":"Maquis de Rieumes\r\n        \"","divers":"Château de Lahage","gps":"","images":["../../jctruffet.com/image/image_31/31_Lahage_1.jpg","../../jctruffet.com/image/image_31/31_Lahage_2.jpg"]},"Consult_chateau_formulaire4ce5":{"id":"Consult_chateau_formulaire4ce5","dept":"31","canton":"Léguevin","commune":"Larra","nom":"Larra","type":"Château","periode":"XVIII","histoire":"LARRA, au XVIe siècle la maison de maître de Larra est habité par la  famille Tournier, Bernard Tournier  conseiller du Roi,  construit de 1743 à 1746  sur lexemple des villas italiennes, à la demande de Jean-François Tournier de Vaillac (1690-1748), président de la chambre des enquêtes du parlement de Toulouse en 1721 fait bâtir le château dans le but d'en faire sa résidence secondaire.   Depuis, ses descendants se succèdent dans ses murs. Raphaêl-François-Auguste de Tournier  conseillé au parlement de Toulouse, arrêté à Paris au début de la Révolution condamné à mort et exécuté avec cinquante autres parlementaires en juillet 1794, A la mort du dernier des Tournier en 1832 le domaine passe à un frère Charles-Louis , époux de Rosalie de Belloc, leur fille Bathilde de Tournier  le lègue à sa mort  en 1875 à sa nièce Marie-Justine-Louise d'Antin, épouse de Fernand-Louis de Carrière   La Baronne Brigitte de Carrière a beau vivre dans ce château depuis 1945 - l'année de son mariage  elle ne mène pas pour autant la grande vie. Faut dire que Brigitte de Carrière est treize fois grand-mère et neuf fois arrière-grand-mère « ça en fait des titres de noblesse », dit-elle, le visage tout illuminé. Aujourd'hui chambres d'hôtes de Mme Brigitte de Carrière.","architecture":"Larra  construit de 1743 à 1746 sur lemplacement dune maison de style Louis XIII, le château de Larra est une maison de plaisance conçue pour être habitée lété Les plans ont été réalisé par Guillaume Cammas, architecte de la façade du capitole, sur lexemple des villas italiennes. De l'extérieur, c'est un cube en brique rose. Vingt-cinq mètres sur vingt-cinq. Les quatre façades du château de Larra comptent chacune deux rangées de neuf fenêtres. L'ensemble est surmonté d'un belvédère. Edifié entre 1743 et 1746. L'état actuel peut être analysé en fonction du plan conservé d'époque Romantique. La partie centrale de la composition est occupée par un parterre à l'anglaise d'une largeur égale à la façade orientale du château et qui occupe en longueur les deux-tiers du terrain. Ce parterre est cantonné par deux allées parallèles qui se rejoignent en équerre, donnant accès à une troisième allée.","habitants":"Famille Tournier\r\n        \"","divers":"Château de Larra","gps":"","images":["../../jctruffet.com/image/image_31/31_Larra_1.jpg","../../jctruffet.com/image/image_31/31_Larra_2.jpg","../../jctruffet.com/image/image_31/31_Larra_3.jpg","../../jctruffet.com/image/image_31/31_Larra_4.jpg","../../jctruffet.com/image/image_31/31_Larra_5.jpg"]},"Consult_chateau_formulairef76a":{"id":"Consult_chateau_formulairef76a","dept":"31","canton":"Boulogne sur Gesse","commune":"Boulogne sur Gesse","nom":"Larroque_Lespuche","type":"Vestiges","periode":"XII","histoire":"LARROQUE, la commune de Larroque est la plus étendue du canton (après Boulogne). C'est un vestige de son importance passée ! L'instituteur, auteur de la monographie des années 1880, en vrai « hussard noir de la République » évoque le « vautour féodal » installé en surplomb de la vallée de la Save et rapporte l'opinion des anciens de l'époque sur « l'horreur du régime féodal » Un d'entre eux avait été sénéchal du Nébouzan.  Dans la salle de la mairie du village  est présentée une image d'un des derniers « seigneurs » qui est une grande et belle dame.   Bien différente des chevaliers bardés de fer qui servaient Foix contre Armagnac ou France contre Angleterre.","architecture":"LARROQUE, il est vrai que le seul souvenir visible de ce passé est impressionnant : un donjon carré de 4 mètres de côté et d'une vingtaine de mètres de haut.  Larroque n'était qu'une de leur possession mais le vieux château fort du XIIe siècle abritait un manoir totalement disparu : l'ensemble, hormis le donjon et le cimetière sur le tertre, a servi de carrière de pierres au début du XIXe siècle, tout ayant été vendu comme bien national en 1792. \r\nLespuche, les vestiges du château de Lespuche, que de magnifiques arbres semblent vouloir protéger, datent du XIVe siècle. Le site est interdit au public car non sécurisé et donnant sur une falaise. Il était délimité par un mur d'enceinte, par la Prade (affluent de la Save) et par les gorges de la Save. quelques pans de mur, une baie géminée, des pavements en galets de rivière formant des dessins géométriques sont les derniers témoignages de son existence. L'une des piéces pourrait être une chapelle castrale à chevet plat.","habitants":"Seigneurs locaux\r\n        \"","divers":"Vestige de l'Espuche","gps":"","images":["../../jctruffet.com/image/image_31/31_Larroque_Lespuche_1.jpg","../../jctruffet.com/image/image_31/31_Larroque_Lespuche_2.jpg"]},"Consult_chateau_formulaire5211":{"id":"Consult_chateau_formulaire5211","dept":"31","canton":"Léguevin","commune":"Laréole","nom":"Laréole","type":"Château","periode":"XVI","histoire":"Château de Laréole  et à quelques kilomètres au nord-ouest le château de la Folie du Bois à Puysségur  dont je n'ai aucune information historique.                                                                                                     LAREOLE, splendide édifice qui a été construit dans la région toulousaine par le  seigneur du pastel. On doit sa construction en 1579 à Pierre de Cheverry (1528-1593) héritier dun grand marchand de pastel toulousain et trésorier général des finances et de conseiller du roi de profession. Il sassurera des services du principal architecte et ingénieur de la sénéchaussée de Toulouse, Dominique Bachelier (1530-1594) qui succède sur les chantiers à son père Nicolas Bachelier de très grande renommée dans la région et à qui lon doit de belles constructions comme l'hôtel d'Assézat (Toulouse). Cest le maçon toulousain Jean Anglade qui obtiendra le contrat de construction. Il sagira de construire un nouveau château et réaliser des travaux d'aménagements intérieurs. Le délai sera court en 3 ans le château sera édifié.   Le château au cours des siècles changera de propriétaire, et certains dentre eux embelliront le château, notamment Jean-Pierre Colomès, qui l'acquit en 1707 et entreprend sa restauration, lui adjoignant un jardin à la française. Son fils Joseph Colomès poursuivra ces travaux dembellissement, en 1768 le château passe par héritage  à son neveu Isidore de Poulhariès qui périra sur l'échafaud pendant la Révolution passa en héritage aux Lavedan et acquit  en 1825 par Marie-Madeleine Arnal veuve d'un négociant toulousin et en 1846 devient la propriété d'Albert de Puymirol  et après avoir redonné sa splendeur au château le revend à la famille de Galard, il sera racheté en 1984 par le conseil général de la Haute-Garonne qui entreprendra sa restauration et la remise en état du parc.","architecture":"Ce château  de Laréole a le style des châteaux Renaissance au bâti quadrangulaire, les bâtiments s'ordonnent autour d'une cour flanquées à ses angles extérieurs de quatre massives tours carrées dont les bases talutés plongent dans un fossé, le corps de logis au fond de la cour relié par deux ailes latérales basses  rytmées par des arcs  en anse de panier supportant les galeries ouvertes. Les rayures de briques et de pierre blanche striant sa façade, ainsi que la coursière,   confiant au sculpteur toulousain Marc Arcis une décoration statuaire sur le thème des dieux et déesses de l'Antiquité. La prospérité de ses propriétaires nétant plus la même au cours du temps, le château tombera dans un état de quasi-abandon.  Laréole a laspect sévère dun château construit pendant  les guerres de religion, à la pointe des techniques militaires protégé par quatre tours et de larges fossés. la cour fermée dont l'accès est défendu par un pont-levis et les bouches à feu ménagées dans les murs extérieurs. Mais le caractère défensif de lensemble est adouci par  une polychromie de pierres et de briques. Le décor sobre et la coursière donnent à lensemble un charme hérité de la Renaissance italienne. Les fenêtres à meneaux encadrées de pilastres comme la discrète corniche à consoles à la base des toits.  Car toute loriginalité de larchitecture de Laréole tient dans cette transition entre Moyen-Age et Renaissance, entre fortification et demeure de plaisance : le contexte dinsécurité des guerres de religion impose laustérité de la défense, mais les revenus du pastel autorisent des pièces agréables à vivre, typiques du XVIe siècle.                                                                              Château de la Folie du Bois, corps de logis de plan rectangulaire à trois niveaux avec toit  à deux pans, flanqué d'une tour ronde et deux échauguettes en façades toit en poivrières.","habitants":"Famille de Colomès\r\n        \r\n        \r\n        \"","divers":"Château de Laréole et de la Folie du Bois","gps":"","images":["../../jctruffet.com/image/image_31/31_Lareole_1.jpg","../../jctruffet.com/image/image_31/31_Lareole_2.jpg","../../jctruffet.com/image/image_31/31_Lareole_3.jpg","../../jctruffet.com/image/image_31/31_Lareole_4.jpg","../../jctruffet.com/image/image_31/31_Lareole_5.jpg","../../jctruffet.com/image/image_31/31_Lareole_6.jpg","../../jctruffet.com/image/image_31/31_Lareole_7.jpg"]},"Consult_chateau_formulaire7b8f":{"id":"Consult_chateau_formulaire7b8f","dept":"31","canton":"Pechbonnieu","commune":"Monstratruc","nom":"Lasserre","type":"Château","periode":"XVI","histoire":"LASSERRE,   qui a abrité le Roi Henri IV, le Duc de Montgomery, le Général de castelnau, , fief au Moyen-Age de Sicard DAlaman, le second de Raymond IV, comte de Toulouse. Il est reconstruit en 1559 par la famille de Bernuy, sous la direction de Nicolas Bachelier,  le château acquiert le titre de terre noble par décret de Louis XI en remerciement à Guillaume Le Brun son propriétaire, qui le restaure alors.   Henri IV et les troupes protestantes de Coligny, y résidèrent en 1570. Le Château sera épargné par la Révolution. Le domaine passe ensuite à M. Louis, François, Charles de Ricard,qui sera maire de Montastruc de 1825 à 1830, puis à la famille Barthe de Mandebourg par son mariage, le château devient la propriété du célèbre Général de Castelnau, le grand chef de larmée française en 14/18.  Depuis la fin du siècle dernier le château de Lasserre est la propriété du descendant dune vieille famille noble du Tarn, les Delon de la Gazelle. Aujourd'hui, le château de Lasserre sera ravi de vous accueillir sur son site, bonheur des amoureux en quête de l'organisation du mariage de leurs rêves. Dépaysement assuré, vous serez emportés pour certains, dans un univers de contes et légendes, pour d'autres, dans des ambiances magiques qui ont accueilli divers cinéastes.","architecture":"Lasserre du XVI- XVIIe siècle en briques roses de Toulouse,  façade principale du XVII- XVIIIe siècle orientation vers le sud façade arrière : au XVIe siècle orientation vers le nord  terrasse, au  nord    2 cours intérieures  la première du  XVII- XVIIIe siècle , la deuxième du  XVIe siècle orientation vers le sud. Enfin, la cour d'honneur présente la façade nord de la Renaissance, la façade sud à été recrée au XVIII.  La façade sud souvre sur la cour dhonneur flanquée de deux pavillons et présente sur la droite les dépendances des écuries, chais, orangerie et une ruelle conduisant à la cour à arcades de « la ménagerie », dans un décor de 30 hectares de parc, et de bois qui entourent des étangs agrémentés dun arc de triomphe du XVIIIe siècle. Léclairage de cette cour pendant votre soirée rend le lieu magique.","habitants":"Famille de Bernuy                                                                              Général de Castelnau\r\n        \"","divers":"Château de Lasserre à Montastruc la Conseillière","gps":"","images":["../../jctruffet.com/image/image_31/31_Lasserre_1.jpg","../../jctruffet.com/image/image_31/31_Lasserre_2.jpg","../../jctruffet.com/image/image_31/31_Lasserre_3.jpg","../../jctruffet.com/image/image_31/31_Lasserre_4.jpg"]},"Consult_chateau_formulaire9165":{"id":"Consult_chateau_formulaire9165","dept":"31","canton":"Pechbonnieu","commune":"Montastruc la Conseillière","nom":"Lasserre_Campagne","type":"Château","periode":"XVI","histoire":"Plusieurs châteaux à Montastruc celui de Lasserre (voir article), de Campagne de madame du Lac chambres d'hôtes et de Valade.                                                                                                                                                                                                                         CAMPAGNE, cest la famille Massol, anciennement implantée à Montastruc, qui a fait bâtir ce château en 1824. Fin des années 1990, Geneviève Massol y vivait avec son fils mais noccupait que deux pièces. Agnés et Renaud Du Lac tombent sous le charme de cette bâtisse «dinspiration Italienne néopalladienne» précise Agnés. Geneviève Massol «fait partie de la famille» et en 1997, ils achètent le château. Sans rien modifier, ils font les travaux nécessaires qui vont durer neuf mois, installent le chauffage et depuis vivent «une histoire damour» avec cette bâtisse. Une aile est louée pour des locations saisonnières, et des pèlerins de Saint-Jacques de Compostelle peuvent y faire une halte.                                                                                                                                      VALADE, chambres d'hôtes de madame Véronique Jourdan.","architecture":"Campagne.  un ensemble harmonieux composé dun corps principal  à deux niveaux  toits en croupes avec ses deux tours et deux bâtiments plus bas sur les côtés.                                                                                                                  Valade en plan de U relié sur la partie centrale par un édifice d'un niveau à toit plat qui relie deux bâtiments en retour d'équerre à deux niveaux toit à deux pans.","habitants":"Famille du  Général de Castelnau\r\n        \"","divers":"Château de Campagne et de Valade à Montastruc la Conseillière","gps":"","images":["../../jctruffet.com/image/image_31/31_Lasserre_Campagne_1.jpg","../../jctruffet.com/image/image_31/31_Lasserre_Campagne_2.jpg","../../jctruffet.com/image/image_31/31_Lasserre_Campagne_3.jpg","../../jctruffet.com/image/image_31/31_Lasserre_Campagne_4.jpg","../../jctruffet.com/image/image_31/31_Lasserre_Campagne_5.jpg","../../jctruffet.com/image/image_31/31_Lasserre_Campagne_6.jpg"]},"Consult_chateau_formulaire61c6":{"id":"Consult_chateau_formulaire61c6","dept":"31","canton":"Cazères","commune":"Latoue","nom":"Latoue","type":"Château","periode":"XIII-XVIII","histoire":"LATOUE,  vers 1140, arrivée, depuis Muret, de Gaucerannus de Turre, pour la chasse comtal du comte Bernard 1er de Comminges, des 22/24 de Latoue (francisation tardive de Lato, Lator ou Latou en gascon, signifiant Latour), dont, au nord à un km, lancien domaine, au nom gallo-romain, de Floran, où est aussi élevée une tour de défense.                                                                                              A Latoue  château Floran  gîte de France de  Mary-Jo.","architecture":"Château de Latoue : Sa construction date de 1140. Le château de Latoue dont les parties les plus anciennes ont été construites dans la première moitié du XIIIe siècle. Lensemble en forme dellipse comprenait à lintérieur dune enceinte. Tour de 5 m x 5 m en parement de pierre rouges sur 15 mètres de hauteur, bâtie sur un important affleurement de rocher calcaire parallèle à la Noue, avec entrée suspendue par porte romane à gorge à 6 mètres à louest par échelle de bois escamotable (type Génos), mur de épaisseur de 1 m environ à la base.  Deux mâchicoulis assuraient la défense de la porte d'entrée. Ce dispositif défensif appliqué à une porte d'entrée est exceptionnel en France,  deux mâchicoulis assuraient sa défense. Quatre parties se distinguent. L'ancien donjon du XIe siècle, à l'angle nord-est, avec une salle basse voûtée en cintre surbaissé au rez-de-chaussée. La tour du XIIIe siècle comportant l'escalier à vis. La tourelle du XVIe siècle prenant la suite de l'escalier à vis pour accéder aux parties hautes. La maison d'habitation du XVIIIe siècle possède certaines pièces qui ont conservés des placages de bois de style Louis XV. En 1500, le château brûle en partie. Il est restauré en 1581 et complété par une tourelle sur trompe d'angle.                                                                                            Château Floran  à l'origine, était un donjon, au XVIe siècle, le grand escalier en pierre a été ajouté pour faciliter l'accès aux 3 étages.","habitants":"Comte Bernard 1er de Comminges \r\n        \"","divers":"Château de Latoue et de Floran","gps":"","images":["../../jctruffet.com/image/image_31/31_Latoue_1.jpg","../../jctruffet.com/image/image_31/31_Latoue_2.jpg","../../jctruffet.com/image/image_31/31_Latoue_3.jpg","../../jctruffet.com/image/image_31/31_Latoue_4.jpg","../../jctruffet.com/image/image_31/31_Latoue_5.jpg"]},"Consult_chateau_formulaire86ae":{"id":"Consult_chateau_formulaire86ae","dept":"31","canton":"Léguevin","commune":"Launac","nom":"Launac","type":"Forteresse","periode":"XII-XV","histoire":"LAUNAC, les vicomtes de Gimoés élevèrent au XIIe siècle un puissant château autour duquel fut créé un village fortifié qui devint un des centres les plus importants de la région. En 1148 le château passa dans la maison de l'Isle Jourdain, qui accorda  Launac sa charte de coutumes en 1297. Démantelé après le traité de Paris de 1229, la forteresse fut rebâtie au XVe siècle par les Carmaing de Nègrepelisse. Sur un ancien fundus gallo-romain,  elle fut la propriété de plusieurs capitouls, parlementaires toulousains qui se succédèrent à la tête de la baronnie de Launac. A partir du XVIIe siècle, le château devint la propriété de différents parlementaires toulousains dont Nicolas d'Aguin en 1710 qui modernisa l'édifice, et en 1731, Jean-François Tournier de Vaillac qui choisit cependant de résider dans son château de Larra.  \r\nAprès la Révolution, le XIXe siècle vit samorcer une forte baisse démographique en même temps que furent conduits des efforts de rénovation : les remparts furent abattus, la halle et léglise furent reconstruites et on édifia lécole.   Nouveau  propriétaire famille Lorgerie.","architecture":"Le château de Launac fut  abandonné  aux fermiers qui lutilisent à des fins agricoles, jusquen 1971. Les nouveaux propriétaires entreprennent pendant 14 ans une restauration exemplaire qui sera terminée en 1984.\r\nA ce jour, le château accueille des groupes divers leur permettant de connaître et dapprécier une atmosphère médiévale et seigneuriale.\r\nIl était entouré de fossés et un pont-levis donnait accès au village qui était aussi entouré de fossés. Il ne reste aujourd'hui qu'une tour la partie la plus ancienne datant du XIIe ou XIIIe siècle. Ce château classé avait autrefois quatre tours dangle. Elle comportait quatre tours d'angle dont une ancienne tour du XIIe siècle. Il en subsiste aujourd'hui deux ailes de l'édifice d'origine   dont l'aile nord coiffée d'une rangée de mâchicoulis et d'un chemin de ronde ainsi que la tour du XIIe siècle.","habitants":"Famille de Carmaing de Nègrepelisse\r\n        \"","divers":"Château de Launac","gps":"","images":["../../jctruffet.com/image/image_31/31_Launac_1.jpg","../../jctruffet.com/image/image_31/31_Launac_2.jpg","../../jctruffet.com/image/image_31/31_Launac_3.jpg","../../jctruffet.com/image/image_31/31_Launac_4.jpg","../../jctruffet.com/image/image_31/31_Launac_5.jpg","../../jctruffet.com/image/image_31/31_Launac_6.jpg","../../jctruffet.com/image/image_31/31_Launac_7.jpg","../../jctruffet.com/image/image_31/31_Launac_8.jpg"]},"Consult_chateau_formulaire99de":{"id":"Consult_chateau_formulaire99de","dept":"31","canton":"Toulouse-8","commune":"Launaguet","nom":"Launaguet","type":"Palais","periode":"XIX","histoire":"LAUNAGUET,  le domaine avait été acheté en décembre 1843 par Jasques-Henry Dufaÿ, baron de Launaguet, préfet de Montauban, puis maître des requêtes au conseil d'État. Son tombeau se trouve dans la chapelle, devant l'église actuelle. Ce château a été restauré par un architecte Auguste Virebent (1729-1857), ce dernier architecte briquetier, créateur d'une usine de céramique artistique au pied de la colline de Miremont, entreprend la reconstruction dès 1845 du château de Launaguet sur les ruines d'un ancien manoir. Il fit de cet édifice un véritable témoignage du travail de la terre cuite. A la mort d'Auguste en 1857 son fils Gaston à vingt ans poursuit ses études aux beaux arts de Toulouse, comme son pére et son grand-père prend la direction de l'usine de Miremont, en 1869 il épouse Gabrielle Roumengas qui lui donnera six enfants. En 1991 Suite à la volonté du conseil municipal de lépoque, le château de Launaguet est devenu patrimoine communal en septembre 1993 et classé monument historique le 11 février 1993  et abrite la mairie.   Ce château a été restauré par un architecte installé à Launaguet, Auguste Virebent  spécialiste d'ornement en terre cuite moulée. devenu industriel.","architecture":"Le château  de Launaguet actuel a été construit en 1845 sur les ruines dun manoir incendié en 1805. De plan rectangulaire à deux niveaux sur soubassement flanqué de huit  échauguettes en encorbellement à toit en poivrières très effilés. Le bâtiment en briques est entièrement crépi couleur pierre avec un dessin dappareil et un dessin de bossage à la base des tourelles. Lencadrement des fenêtres et des portes, des balcons, des soubassements des tourelles ont reçu un décor de terre cuite moulée à partir déléments gothiques flamboyants : feuilles de vigne, chou frisé, chardon et monogramme du propriétaire. Les deux fenêtres à chaque extrémité du rez-de-chaussée de la façade Nord sont peintes en trompe loeil. Les baies du premier étage sont ouvertes au-dessus des balustrades gothiques ajourées. Les cinq fenêtres centrales sont surmontées dun gable et de pinacles. Sur la façade sud, les fenêtres sont encadrées plus simplement de briques apparentes, seules les trois portes-fenêtres centrales sont décorées comme celles de la façade Nord.Toute la décoration intérieure a été conçue par Auguste Virebent, meubles compris.","habitants":"Baron Jasques-Henry Dufaÿ\r\n        \"","divers":"Château de Launaguet","gps":"","images":["../../jctruffet.com/image/image_31/31_Launaguet_1.jpg","../../jctruffet.com/image/image_31/31_Launaguet_2.jpg","../../jctruffet.com/image/image_31/31_Launaguet_3.jpg","../../jctruffet.com/image/image_31/31_Launaguet_4.jpg","../../jctruffet.com/image/image_31/31_Launaguet_5.jpg","../../jctruffet.com/image/image_31/31_Launaguet_6.jpg","../../jctruffet.com/image/image_31/31_Launaguet_7.jpg"]},"Consult_chateau_formulairedf51":{"id":"Consult_chateau_formulairedf51","dept":"31","canton":"Corèzes","commune":"Lavelanet de Comminges","nom":"Lavelanet_Comminges","type":"Château","periode":"XV","histoire":"Deux châteaux à Lavelanet celui de la Bastide actuel mairie et de Lavelanet. LAVELANET, Les châtelains de Lavelanet, également seigneurs de Saint-Cizy, appartenaient à la famille des Tersac au XVe siècle puis des dAnceau jusquà la Révolution. Par le jeu dalliances, le château passa aux mains des Cafarelli puis des Gleizes, très investis dans la vie de la commune et qui contribuèrent à laménagement du réseau dirrigation et à la construction de lécole. Un autre château, dont les vestiges ont été détruits en 1989, se situait au lieu-dit Larrouzet. Il sagissait de la propriété et demeure de familles nobles dont les origines remontent au moins au XVIe siècle avec les familles des de Bazon et des de Hunaud.  Lavelanet formera une seigneurie propre. En 1510, le château de Lavelanet est dit « défendable » dans le cartulaire de Mirepoix durant les guerres de religion, le comte de Carmaing brûle Lavelanet et massacre la population du 29 août 1622. Reconnaissances féodales en faveur de Philippe de Lévis, baron de Mirepoix : en  1590 le fief de Lavelanet qui était aux de Lévis passa à la famille de Fumel par le mariage de Margueritte de Lévis, fille du baron de Mirepoix et de dame Catherine de Caulet, le 28 juin 1653, avec Louis, comte de Fumel, au pays de Quercy, le seigneur Jean de Lévis, baron de Mirepoix et seigneur de Lavelanet, n'ayant pas d'héritier mâle, à sa mort en mai 1656.   Le comte de Fumel, seigneur en 1765-1789. Le sieur Raymond, seigneur en 1788-1791. Baronnie de Lavelanet : Lavelanet, Dreuilhe, Saint-Jean, Benaix.","architecture":"LAVELANET ce village est une ancienne bastide fondée au XIIIe siècle par un comte de Toulouse : Alphonse de Poitiers.  Il connut, au XIVe et au XVe siècle, des attaques dévastatrices de la part des anglais puis des routiers.\r\nA partir du siècle suivant, le riche terroir agricole apporta un essor considérable permettant de surpasser les villages voisins, grâce à la culture du pastel.  Lavelanet château de plan en U corps de logis central à deux niveaux toits en tuiles avec une lucarne centrale deux autres corps de logis transversal à deux niveaux, bâtiment d'un niveau et en prolongement sur flan droit et gauche et en retour d'équerre les communs autour d'une cour.","habitants":"Famille des Tersac                                                                                 Louis, comte de Fumel, \r\n        \"","divers":"Château de la Bastide et de Lavelanet à Lavelanet","gps":"","images":["../../jctruffet.com/image/image_31/31_Lavelanet_Comminges_1.jpg","../../jctruffet.com/image/image_31/31_Lavelanet_Comminges_2.jpg","../../jctruffet.com/image/image_31/31_Lavelanet_Comminges_3.jpg","../../jctruffet.com/image/image_31/31_Lavelanet_Comminges_4.jpg","../../jctruffet.com/image/image_31/31_Lavelanet_Comminges_5.jpg","../../jctruffet.com/image/image_31/31_Lavelanet_Comminges_6.jpg","../../jctruffet.com/image/image_31/31_Lavelanet_Comminges_7.jpg"]},"Consult_chateau_formulaire63d2":{"id":"Consult_chateau_formulaire63d2","dept":"31","canton":"Muret","commune":"Lavernose-Lacasse","nom":"Lavernose_Lacasse","type":"Château","periode":"XV","histoire":"LAVERNOSE-LACASSE,  bâti à la limite de la bastide au début du XIIe siècle,  établi par le comte de Comminges Bertrand VI dune part et le prieur de Saint-Pierre de Vernosol,  En 1554, lorsque les Huguenots menacent Lavernose, le syndic du Tiers Etat « avertit noble Durand de Gestes de larrivée des ennemis du Roy qui tâchent de surprendre le fort » et demande au seigneur de Vernoze « quil y soit fait bonne et exacte garde, tant de jour que de nuit, attendu que la maison est forte. En 1671, Jean Durand de Rivalet achète la seigneurie de Lavernose, que ses descendants ont conservée jusquà la Révolution. Il est également seigneur du Frechet. En 1776, le Roi et la comtesse de Verlhac  née Durand de Rivalet se partagent la justice de la seigneurie.  Au XIIIe siècle, le comte de Comminges et le prieur de Saint-Pierre signent un acte de paréage qui crée et délimite la bastide de Lavernose, mais ne concerne pas Lacasse dont les terres sont inféodées par le roi. Après la construction au XVIe siècle \"du fort et maison du seigneur de Vernose\" la protection du \"pays et des lieux circonvoisins\" est assurée. Au XVIIe la seigneurie est divisée. Puis avec la Révolution se fait la réunion éphémère des deux communes \"dans lintérêt de la République !\".  Malgré labandon de nouveaux projets au cours du XIXe siècle, les deux communes déjà réunies en une même paroisse, décident de fusionner : le 19 mars 1964 naît la commune Lavernose-Lacasse.                                                         Le château, de LACASSE devenu propriété municipale, abrite la mairie.    Il appartient sous lancien régime aux Durand de Rivalet puis à la marquise Descodeca de Boisse. Très endommagé pendant la Révolution, il est racheté en 1822 par Ambroise Campardon, puis restauré par son fils Raymond.  En 1956, les descendants de la famille Campardon le vendent à la municipalité qui le transforme en mairie.","architecture":"Lavernose, en effet aux XVe et XVIe siècles, linsécurité règne dans le pays et la région : guerres entre seigneurs (Foix et Armagnac), et guerres de religion se succèdent.  Réhabiliter l'aile d'un château classé en redonnant à ses façades leur style d'antan.  Seule la façade classée est conservée. Ses attributs caractéristiques négligés au fil du temps :  Les parties basses des tours du porche dentrée présentent des bouches à feu et un encorbellement de la fin du XIXe siècle, avec un décor en terre cuite de la maison Virebent qui présente des antéfixes, une balustrade et un panneau à enroulements, des feuilles d'acanthe et des personnages mythologiques. lucarnes, encadrements de briques et oeils de bufs, sont restaurés. Le bâtiment est reconstruit selon les techniques des monuments historiques : récupération des matériaux anciens, patines et enduits à la chaux. De nouvelles ouvertures sont pratiquées dans le style de lédifice. Le château de Lavernose Lacasse dispose désormais de belles salles de réunion pour les associations de la ville et son conseil municipal.                                                                               LACASSE,  ce château était constitué dun bâtiment rectangulaire construit sur pilotis, flanqué dune tour carrée peu élevée, surmontée dune sorte de chemin de ronde. Limportance des bâtiments, habitation et dépendances se justifie par lactivité agricole de ce domaine appartenant au Roi. En effet, ce domaine fut inféodé par bail « consenti » à Gilles Vares, seigneur de cette commune, le 7 juin 1627. Le château fut certainement reconstruit au cours du XVIIe siècle, par  le plan cadastral de 1813  le tout disposé en U.","habitants":"Marquise Descodeca de Boisse\r\n        \"","divers":"Château de Lavernose et de Lacasse","gps":"","images":["../../jctruffet.com/image/image_31/31_Lavernose_Lacasse_1.jpg","../../jctruffet.com/image/image_31/31_Lavernose_Lacasse_2.jpg","../../jctruffet.com/image/image_31/31_Lavernose_Lacasse_3.jpg","../../jctruffet.com/image/image_31/31_Lavernose_Lacasse_4.jpg","../../jctruffet.com/image/image_31/31_Lavernose_Lacasse_5.jpg","../../jctruffet.com/image/image_31/31_Lavernose_Lacasse_6.jpg","../../jctruffet.com/image/image_31/31_Lavernose_Lacasse_7.jpg"]},"Consult_chateau_formulaire7cc4":{"id":"Consult_chateau_formulaire7cc4","dept":"31","canton":"Muret","commune":"Le Fauga","nom":"Le_Fauga","type":"Château","periode":"XVIII-XIX","histoire":"Trois châteaux à Le Fauga, le château de Fauga, de Mandres  hôtel restaurant , et de  Despierre de M.H. Leygue. Pas d'information historique  pour ses châteaux","architecture":"Fauga Le château comporte un corps central flanqué de deux ailes, et une tour circulaire coiffée d'un dôme de pierre. Il fait aujoud'hui partie d'une propriété viticole.\r\nUn second édifice, situé sur le bord de la route à 435 m à vol d'oiseau, porte également le nom de château de Fauga. De style quelque peu colonial et de couleur ocre, il s'agit plus d'une grosse demeure que d'un château, avec une tour ronde mis hors oeuvres à toit plat.","habitants":"Famille de de M.H. Leygue\r\n        \"","divers":"Château de Despierre de Mandres et de Fauga","gps":"","images":["../../jctruffet.com/image/image_31/31_Le_Fauga_1.jpg","../../jctruffet.com/image/image_31/31_Le_Fauga_2.jpg","../../jctruffet.com/image/image_31/31_Le_Fauga_3.jpg","../../jctruffet.com/image/image_31/31_Le_Fauga_4.jpg"]},"Consult_chateau_formulaire4c2d":{"id":"Consult_chateau_formulaire4c2d","dept":"31","canton":"Toulouse","commune":"Montaudran-Toulouse","nom":"Lespinet","type":"Château","periode":"XVIII","histoire":"LESPINET, jusqu'à la fin des années 1930 : le château est occupé par la famille Latécoère (constructeur d'avions). \r\n1940 : Réquisition par l'Etat du domaine de Lespinet pour y installer l'école des cadres des chantiers de Jeunesse de la région Pyrénées Gascogne. (L'armée allemande occupera la propriété pendant quelques mois ; l'armée française fera de même à la Libération). \r\n1944 : La direction de l'éducation populaire du ministère de l'éducation nationale y installe le centre d'éducation populaire où les associations organiseront les stages de formation de leurs animateurs et de leurs adhérents. Le premier directeur du CREPS est M. Legris.","architecture":"Le château date de la fin du XVIIIe siècle de style néogothique, d'un corps de logis rectangulaire à deux niveaux sur soubassement  et lucarnes sur un toit en ardoise à deux pans accolé de deux pavillons  transversal sur les deux flan à deux niveaux et attiques à toit trés incliné, l'ensemble est accolé d'une tour ronde l'angle gauche côté parc et échauguettes à l'opposée. L'usine est construite en 1917 et l'aéroport en 1918. Ce site comprend une piste, des halles de montage et la tombe de l'aviateur Didier Daurat. Aujourd'hui, le site a été partiellement détruit et les terrains ont été, en partie, vendus à la promotion i
