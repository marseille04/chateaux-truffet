chateau_formulaireaecc","dept":"31","canton":"Revel","commune":"Le Vaux","nom":"Vaux","type":"Forteresse","periode":"XIV","histoire":"VAUX, en 1921, le château a été revendu en deux parties: l'aile droite est alors devenue, une écurie, puis, quelques décennies plus tard, le café du village. Le château  l'autre partie ; il sera pourtant laissé à l'abandon. Jusqu'en 1994. C'est alors Louis de Pardailan de Gondrin, un passionné de vieilles pierres, qui sauve l'édifice des oubliettes et des ronces, orties et autres avatars du temps qui passe. Il a le coup de foudre pour le domaine, pourtant privé d'eau courante, et dont certaines poutres se sont effondrées. « Il avait le charme endormi du château de la belle au bois dormant. » Francis Béthune l'achète séance tenante. Il quitte sa toulousaine des années 30 pour installer ses quartiers dans une partie du château. Un an plus tard, il acquiert l'aile droite. Il partage désormais son temps entre la visite des lieux, en été, et la restauration progressive du domaine, avec le soutien d'une association des amis du château.","architecture":"Le hameau de Vaux héberge un château qui présente une architecture hybride, mêlant le Moyen-Age, la Renaissance et le XIXe siècle.\r\nPlusieurs époques sont passées par là. A ce titre, le château de Vaux vaut le détour, en tant que témoignage précieux de la succession des styles architecturaux et des volontés parfois contradictoires des différents occupants des lieux. Les fondations du château sont médiévales. A la Renaissance, les propriétaires, pris par une frénésie de reconstruction, ont transformé les façades, auxquelles ils ont ajouté de belles fenêtres à meneaux, surmontées de linteaux décorés. Les guerres de religion sont passées par là, la Révolution, et pour finir, les ravages du XIXe siècle, où les monuments historiques, qui protègent aujourd'hui les anciennes demeures, n'existaient pas encore.  Un incendie a détruit une partie du château au XVIe siècle, mais les deux façades Renaissance, très richement décorées, qu'il présente encore aujourd'hui, sont dignes d'intérêt. Cage d'escalier à rampe droite, salle au plafond à la française et cheminée, belle cave voûtée. Du château du Moyen-Age subsiste une tour d'artillerie.","habitants":"Louis de Pardailan de Gondrin\r\n        \"","divers":"Château de Vaux","gps":"","images":["../../jctruffet.com/image/image_31/31_Vaux_1.jpg","../../jctruffet.com/image/image_31/31_Vaux_2.jpg","../../jctruffet.com/image/image_31/31_Vaux_3.jpg","../../jctruffet.com/image/image_31/31_Vaux_4.jpg"]},"Consult_chateau_formulaireef90-2":{"id":"Consult_chateau_formulaireef90-2","dept":"31","canton":"Pechbonnieu","commune":"Verfeil","nom":"Verfeil","type":"Forteresse","periode":"XIII","histoire":"VERFEIL, en 1207 les prédicateurs, Diègue dAcébès et Dominique de Calernegua, futur fondateur de lOrdre des Dominicains, connaissent le même sort ; les « cathares parfaits », Pons Jourde et Arnaud Arrufat,  En juin 1213, au sud de Verfeil, le château de Pujol (commune Sainte Foy dAigrefeuille) était défendu par une garnison de croisés. Raymond VI assiégea le château, le conquit et tous ceux qui ne moururent pas sur place furent ramenés à Toulouse pour y être pendus par la population.     Pendant lhiver 1227-1228, Raymond VII renforce les garnisons de Puylaurens et Saint-Paul Cap de Joux pour protéger Guilhabert de Castres, son fils majeur Bernard Lamothe, les diacres de Saint Paul, de Lanta et de Verfeil qui fuient les armées de Simon de Montfort. En 1227, linquisiteur Foulque demande au légat du pape la possession  de Verfeil. Mais la noblesse locale, fidèle à la foi cathare, refuse et avec lappui de Bernard-Othon de Niort affronte larmée des Croisés qui perdront la bataille. Mais le seigneur de Niort gravement blessé au front dune flèche recevra le sacrement cathare ou « consolament » des mains de Guilhabert de Castres. Les portes Vauraise et Tholozenque témoignent de lépoque.  Lors de la guerre des religions une forte délégation verfeilloise rejoindra les protestants toulousains.  La Révolution Française eut pour conséquences lexil de la noblesse, le départ de quelques gros commerçants, la fuite du clergé mais la conservation du château, un temps menacé de démolition, est due à lachat de celui-ci par Antoine-Marie Baptistat.","architecture":"Le château de Verfeil, du VIIIe siècle, sur une plate-forme où s'élève aujourd'hui le château, une enceinte quadrangulaire fut construite pour abriter des hommes darmes accompagnés de leur progéniture et de leurs animaux. Quelques chaumines de paysans et d'artisans souhaitant une protection sinstallèrent ensuite au pied de cette forteresse, le village grandit lentement une église de torchis fut érigée : Verfeil était né. Sa situation dominante au-dessus  du bourg lui permettait den assurer la protection.  Le château devint citadelle et faillit disparaître totalement : mal entretenu, dégradé et découronné, il devait être démoli entièrement, peu après la Révolution, par des entrepreneurs peu scrupuleux qui projetaient den vendre les débris comme matériaux, il en reste encore une belle bâtisse  de plan rectangulaire à deux niveaux avec série d'oculi un toit en croupe avec fronton triangulaire et flanqué d'une tour donjon à créneaux et mâchicoulis avec ouvertures de fenêtres jumellés. La porte Vauraise  est flanqué d'échauguettes carrées en encorbellement à toits plats. Il est inscrit au titre des monuments historiques.","habitants":"Lezs seigneurs\r\n        \"","divers":"La forteresse de Verfeil et la porte Vauraise","gps":"","images":["../../jctruffet.com/image/image_31/31_Verfeil_1.jpg","../../jctruffet.com/image/image_31/31_Verfeil_2.jpg","../../jctruffet.com/image/image_31/31_Verfeil_3.jpg","../../jctruffet.com/image/image_31/31_Verfeil_4.jpg","../../jctruffet.com/image/image_31/31_Verfeil_5.jpg","../../jctruffet.com/image/image_31/31_Verfeil_6.jpg","../../jctruffet.com/image/image_31/31_Verfeil_7.jpg","../../jctruffet.com/image/image_31/31_Verfeil_8.jpg","../../jctruffet.com/image/image_31/31_Verfeil_9.jpg"]},"Consult_chateau_formulaire6eba":{"id":"Consult_chateau_formulaire6eba","dept":"31","canton":"Toulouse","commune":"Toulouse","nom":"Verrières_31","type":"Château","periode":"XIX","histoire":"Castel-Gesta appelé aussi le château des Verrières ou la Maison du Verrier, est une villa castellisée, bâti par Louis-Victor Gesta, peintre-verrier, à la fin du XIXe siècle, à Toulouse, Louis-Victor Gesta mourut le 6 septembre 1894, après avoir fait faillite, et ses héritiers ne parvinrent pas à s'entendre. Le château avait été vendu. En 1895, le maire de Toulouse, Honoré Serres, fit procéder à l'alignement de la rue du faubourg Arnaud Bernard qui devait plus tard porter son nom, condamnant le pavillon d'entrée des Verrières.  Le château fut d'abord la propriété de Bernard Bordes, un négociant toulousain. L'uvre de Bénézet, \"véritable Salle des Illustres\" eut un grand succès. À partir de 1937, le château devient propriété des surs de la Charité de saint Vincent-de-Paul. Au début de la guerre, elles y hébergèrent des familles réfugiées du nord de la France,  elles vendirent le château à l'État en 1956. Il devient le Lycée d'enseignement professionnel Hélène Boucher,  en 1987, le château fut racheté par la mairie de Toulouse.  En 2004 la SMESO  qui avait racheté l'édifice à la ville, l'a revendu à un architecte bordelais. Ce dernier a floué plusieurs centaines d'investisseurs en France, à qui il avait vendu des appartements de grand standing dans des demeures et châteaux historiques, sans jamais réaliser les travaux annoncés. L'affaire avait été portée devant le tribunal  de Libourne, certains acheteurs ont pu récupérer leur investissement et se grouper en syndic. L'état de délabrement de ce joli castelet a interpellé nombre de Toulousains amoureux de leur patrimoine. La Maison du Verrier est un joyau historique du quartier. Elle a une histoire. Certains se souviennent de l'époque où Xavier Darrasse y dirigeait l'école d'orgue du conservatoire, dans les années 80.","architecture":"De type néo-gothique, le château s'élève sur 4 niveaux ; il est doté de 3 tourelles, dont 2 en encorbellements et 1 tour d'escalier hexagonale ; fenêtres en ogives, balcon à baldaquin, tourelle en poivrière, gargouilles sur la façade sud, complètent le tableau médiéval. Des éléments de décor des XVe et XVIe siècles ont été remployés (sur la retombée des voûtes de la tourelle nord-est, dans les gargouilles saillantes, et dans le fronton couronnant la porte Nord. Depuis 2014, l'édifice fait l'objet d'une campagne de restauration qui doit, dans un premier temps, permettre de rénover extérieurement le bâtiment et lui rendre son lustre d'antan. Les propriétaires prévoient ensuite un réaménagement intérieur et la réalisation d'un projet immobilier. On restaure la Maison du Verrier ! Les copropriétaires de cette bâtisse du XIXe siècle, vestige d'une ancienne manufacture de vitraux, se sont décidés à entreprendre des travaux. Cette demeure classée était à l'abandon depuis des années, . L'ASL (association syndicale libre) des copropriétaires a confié ces travaux à TMH, une société spécialisée dans la restauration du patrimoine ancien, qui a son siège à Floirac en Gironde et une antenne à Riscle dans le Gers. Le chantier devrait durer un an. «Il y a beaucoup de travail sur la façade, mais pour l'instant on ne touche pas à l'intérieur, qui est dans un état pitoyable. Les propriétaires ont l'intention de réaliser une opération immobilière, donc les aménagements se feront dans un second temps» . De quoi en tout cas alimenter les conversations des passants de la rue Godolin et des habitués du petit jardin public créé dans l'ancien parc de la demeure.","habitants":"Louis-Victor Gesta\r\n        \r\n        \"","divers":"Château de la Verrières à Toulouse","gps":"","images":["../../jctruffet.com/image/image_31/31_Verrieres_31_1.jpg","../../jctruffet.com/image/image_31/31_Verrieres_31_2.jpg","../../jctruffet.com/image/image_31/31_Verrieres_31_3.jpg","../../jctruffet.com/image/image_31/31_Verrieres_31_4.jpg","../../jctruffet.com/image/image_31/31_Verrieres_31_5.jpg"]},"Consult_chateau_formulaire956a":{"id":"Consult_chateau_formulaire956a","dept":"31","canton":"Revel","commune":"Vieillevigne","nom":"Vieillevigne","type":"Château","periode":"XVI","histoire":"Vieillevigne a été bâti au XVIe siècle, pas d'information historique.","architecture":"Le château de Vieillevigne bâti au XVIe siècle fut réaménagé et agrandi aux XVIIe et XVIIIe siècles. Entouré d'un parc paysager de la fin du XIXe siècle, le bâtiment se compose d'un corps de logis flanqué au nord de deux tours d'angle circulaires, et au sud de deux pavillons carrés enserrant une terrasse. Deux ailes basses de communs entourent une cour que fermait encore en 1824 un quatrième corps de bâtiment. A l'intérieur, un grand escalier du XVIIe siècle, et quelques éléments de décor du XVIIIe siècle.","habitants":"Seigneurs locaux\r\n        \r\n        \r\n        \"","divers":"Château de Vieillevigne","gps":"","images":["../../jctruffet.com/image/image_31/31_Vieillevigne_1.jpg","../../jctruffet.com/image/image_31/31_Vieillevigne_2.jpg","../../jctruffet.com/image/image_31/31_Vieillevigne_3.jpg","../../jctruffet.com/image/image_31/31_Vieillevigne_4.jpg","../../jctruffet.com/image/image_31/31_Vieillevigne_5.jpg"]},"Consult_chateau_formulaire2ff5":{"id":"Consult_chateau_formulaire2ff5","dept":"31","canton":"Castanet-Tolosan","commune":"Vigoulet_Auzil","nom":"Vigoulet_Auzil","type":"Château","periode":"XV","histoire":"deux châteaux à Vigoulet-Auzil celui d'Arquier et celui de Vigoulet.                VIGOULET, de Pierre de Vigoles, capitoul de Toulouse.  La famille de Noz,  occupa longtemps le château de Vigoulet.  Pierre de Noz, seigneur de Vigoulet, siégeant au parlement, Gabriel de Foucaud, en l'absence d'héritier mâle vivant, sa fille Gabrielle De Nos hérita de Vigoulet. Elle épousa en 1670 Pierre de Martiny, juge-mage . En 1715, Rose de Martiny, épouse de Jean Antoine de Sevin Mansencal, céda le château à Roch de Jaume. En 1753, Rose de Jaume, veuve successive de « noble Jean-François Huleau de Francon », capitoul en 1720, puis de « maître Alexis de Pascal, trésorier général de France de la généralité de Montauban » Thomas Alexandre dHuleau de Francon, fils de Rose de Jaume, héritier par sa mère du château, du domaine et de la seigneurie de Vigoulet, épousa Suzanne de Sers, disparut en 1749. Sa mère légua Vigoulet à sa belle-fille Suzanne de Sers, épouse dHuleau de Francon, qui en hérita en 1766, sans héritier, Suzanne dHuleau de Francon légua ses biens en 1783 à sa sur Louise de Sers, veuve de Balthazar Emmanuel de Cambon conseiller du parlement de Toulouse. Le fils de ces derniers, Jean-Louis Emmanuel Augustin de Cambon, héritier de Vigoulet, a été le dernier président du parlement de Toulouse. Il échappa, en se cachant, aux recherches engagées contre lui pendant la Terreur, mais son épouse, Dorothée-Etiennette Riquet de Bonrepos, mourut guillotinée, auparavant, il avait vendu Vigoulet, Lacquéreur, Jean Calixte Pechoultre de Lamartinie, le revendit assez vite à un membre de la famille Teynier, sans doute à Joseph Étienne Ville, Jean-Louis Teynier , négociant toulousain, né en 1712, ancien prieur de la bourse de Toulouse, fut élu capitoul en 1767.                                                                                                             ARQUIER Chambres d'hôtes de Pierre Espagno.","architecture":"Vigoulet château de plan en U à deux niveaux à toit en croupe presque  plat, flanqué de pavillons saillants aux extrémités.                                                 Château Arquier de plan rectangulaire à deux niveaux  toit en terrasse en prolongement de chaque côté bâtiment d'un niveau dans le même style de l'édifice.","habitants":"La famille de Pierre de Vigoles\r\n        \"","divers":"Château de Vigoulet et d'Arquier","gps":"","images":["../../jctruffet.com/image/image_31/31_Vigoulet_Auzil_1.jpg","../../jctruffet.com/image/image_31/31_Vigoulet_Auzil_2.jpg","../../jctruffet.com/image/image_31/31_Vigoulet_Auzil_3.jpg","../../jctruffet.com/image/image_31/31_Vigoulet_Auzil_4.jpg"]},"Consult_chateau_formulaire8470":{"id":"Consult_chateau_formulaire8470","dept":"31","canton":"Villemur sur Tarn","commune":"Villaudric","nom":"Villaudric","type":"Château","periode":"XVII","histoire":"VILLAUDRIC hôtel restaurant  Le fort, ses terres et ses dépendances sont cédés à François de Seguier, seigneur de la Gravière et sénéchal du Quercy. Au cours des guerres de religion, la seigneurie de Villaudric apparaît comme une place forte catholique, non loin de la ville protestante de Montauban. Le cardinal de Richelieu sarrêta à deux reprises au château, en 1629, la veille de son passage à Montauban où il y ordonna la destruction des fortifications. Le travail accompli, il revient se reposer au château avant de regagner Paris. \r\n En 1824 par le jeu de mariages et dhéritage, plusieurs propriétaires se succèdent : après les seigneurs de Seguier, la famille de Paucy (1713) puis le marquis de la Valette Percin de Montgaillard.   Un autre illustre visiteur est accueilli également au château. En juillet 1808, lempereur Napoléon 1er séjourne plusieurs jours comme en témoigne largenterie frappée à son effigie. Le château est acheté par le comte de Villèle en 1830. ministre de Louis XVIII et de Charles X, Joseph comte de Villèle, est lun des hommes marquants de la Restauration. Il joue également un rôle politique de tout premier plan à Toulouse, dont il été le maire, et dans ses environs.  Le 20 Août 1944, les habitants de Villaudric se cachent une fois encore dans les caves afin déchapper à la menace allemande. Villaudric est accordé en dot à sa fille Henriette de Villèle. Par alliance et héritage, le château devient la propriété successive des familles de Pons et dArgoubet. Il appartient à cette dernière depuis 7 générations.","architecture":"A la fin du XVIe siècle le château de Vallaudric  est incendié lors des   guerres de religions. Dès le début du XVIIe siècle, il est reconstruit sur les caves médiévales ayant échappées au sinistre. Sa reconstruction nobéit plus désormais aux impératifs de défense. Larchitecture correspond plus à un lieu dhabitation dune famille noble plutôt quà un lieu de refuge pour une communauté. Le bâtiment actuel remonte pour lessentiel à la fin du XVIIe et au XVIIIe siècles  les deux ailes latérales sont plus tardives : Le château de Villaudric fut d'abord un château fort au Moyen-Age , avant de devenir un lieu d'habitation. Le bâtiment est en briques, traditionnel du pays toulousain, élégant et classique.","habitants":"Famille de   François de Seguier\r\n        \"","divers":"Château de Vallaudric","gps":"","images":["../../jctruffet.com/image/image_31/31_Villaudric_1.jpg","../../jctruffet.com/image/image_31/31_Villaudric_2.jpg","../../jctruffet.com/image/image_31/31_Villaudric_3.jpg","../../jctruffet.com/image/image_31/31_Villaudric_4.jpg","../../jctruffet.com/image/image_31/31_Villaudric_5.jpg","../../jctruffet.com/image/image_31/31_Villaudric_6.jpg","../../jctruffet.com/image/image_31/31_Villaudric_7.jpg"]},"Consult_chateau_formulaire4fc0-2":{"id":"Consult_chateau_formulaire4fc0-2","dept":"31","canton":"Villemur-Sur-Tarn","commune":"Villeneuve lès Bouloc","nom":"Villefranche_Bouloc","type":"Château","periode":"XVI","histoire":"VILLEFRANCHE    Il abrita au fil des siècles plusieurs familles dont les noms sont attachés à l'histoire du village : de Gout, de Beaumont, de Caylus, de Pertinais et enfin le marquis Valentin de Caumels qui fut deux fois maire de Villeneuve de 1871 à 1878, puis de 1886 à 1892, année de son décès. Le château fut alors racheté par la famille Galli qui l'a conservé durant tout le XXe siècle.\r\n«La restauration ne fût pas une mince affaire», confie Pierre-Jean Cossié en charge de la coordination générale des travaux. Il a fallu faire avec les multiples contraintes liées au classement monument historique.   «Il n'était pas question de toucher à l'aspect extérieur. Il a fallu par exemple refaire entièrement le toiture à l'identique». Une des dimensions particulières fût la restauration des papiers peints, marouflés sur toile et tendus sur châssis bois, datant du début du XVIIIe siècle, qui fût confiée à la spécialiste Édith Garrigues.","architecture":"Siège de la co-seigneurie de Villeneuve-les-Bouloc, le château est une grande maison des champs de la fin du XVIe siècle,  le logis, entouré d'anciens parcs et jardins, conserve de l'époque Renaissance sa volumétrie et un portail architecturé. A l'intérieur, plusieurs pièces sont ornées de papiers peints des années 1810. Les communs se composent de la ferme, ensemble du XVIIIe siècle conçu sur les quatre côtés d'une cour fermée, et d'une bergerie datée de 1868.  Voilà sept ans que le projet de rénovation du château de Villefranche a éclos. Sept années ont été nécessaires pour penser, convaincre, fédérer, financer, planifier, et enfin réaliser le sauvetage de ce patrimoine historique sur son parc de 11 hectares.Cette magnifique bâtisse du XVIe siècle, remaniée et mise aux goûts du jour aux XVIII et XIXe fut le siège d'une co-seigneurie, la seigneurie principale étant assurée depuis le château de Villeneuve.  Philippe  Tilliet à restauré le château de Villefranche à Villeneuve les Bouloc.","habitants":"Marquis Valentin de Caumels \r\n        \"","divers":"Château de Villefranche de Bouloc","gps":"","images":["../../jctruffet.com/image/image_31/31_Villefranche_Bouloc_1.jpg","../../jctruffet.com/image/image_31/31_Villefranche_Bouloc_2.jpg","../../jctruffet.com/image/image_31/31_Villefranche_Bouloc_3.jpg","../../jctruffet.com/image/image_31/31_Villefranche_Bouloc_4.jpg"]},"Consult_chateau_formulaireb01c-3":{"id":"Consult_chateau_formulaireb01c-3","dept":"31","canton":"Revel","commune":"Villefranche Lauragais","nom":"Villefranche_Lauragais","type":"Château","periode":"XII-XVIII","histoire":"A Villefranche en Lauragais, le château de  Saint-Rome à 3 km au nord-ouest (voir article),  de Vallière à Villenouvelle à 5 Km au nord-ouest restaurant par M. Guillaume Evesque, de Vallègue à 5 km au nord-Est (voir Article) et un peu plus au nord le château de Varennes chambres d'hôtes par la famille Méricq.                                                                                                                BARELLES, bastide fondée au XIIIe siècle (vers 1270) par Alphonse de Poitiers, comte de Toulouse.   En 1280, Philippe le Bel lui accorda une nouvelle charte de privilèges. Elle sera dévastée en 1355 par les anglais. La bastide de Villefranche fondée sur un terroir propice à lagriculture (céréales) et lélevage  prit son essor au XVIe siècle au détriment de sa voisine Avignonet-Lauragais. Elle est une cité prospère du « Pays de Cocagne ».  Quant aux rues longilignes, elles se croisent en angle droit en bordure de laxe routier commercial, datant de son origine. Une venelle coupe-feu témoigne de son passé médiéval ainsi quun nom : place du Portail (ancienne porte dAutan), preuve de ses défenses. En 1790, la bastide devient chef-lieu de canton, sous-préfecture en 1800.  Elle fut chef-lieu de district de 1790 à 1795 et d'arrondissement de 1800 à 1926.                                                                                                                                                                                                                                                                                           VALLEGUES, A quelques kilomètres au nord-Est c'est un  bâtiment historique original du XIIIe siècle. Vous pourrez admirer la salle d'armes, vous détendre dans le bar des années 1950 .                                                                                                        Château de Laffont à Montgaillard gîtes de France.","architecture":"Les édifices  de Villefranche en Lauragais comporte, dans le prolongement l'un de l'autre, un bâtiment de communs (l'ancienne ferme) et une maison de maître qui présente une façade classique.   Mis à part le château fort  du XIIe siècle.                                                        Vallègues, le château , maison de maître des XIIIe, XVIe et XVIIIe siècles, est inscrit au monument historique depuis 2003.","habitants":"Alphonse de Poitiers\r\n        \"","divers":"Château  de Vallègues, de Barelles et de Laffont à Villefranche Lauragais.","gps":"","images":["../../jctruffet.com/image/image_31/31_Villefranche_Lauragais_1.jpg","../../jctruffet.com/image/image_31/31_Villefranche_Lauragais_2.jpg","../../jctruffet.com/image/image_31/31_Villefranche_Lauragais_3.jpg","../../jctruffet.com/image/image_31/31_Villefranche_Lauragais_4.jpg","../../jctruffet.com/image/image_31/31_Villefranche_Lauragais_5.jpg","../../jctruffet.com/image/image_31/31_Villefranche_Lauragais_6.jpg","../../jctruffet.com/image/image_31/31_Villefranche_Lauragais_7.jpg","../../jctruffet.com/image/image_31/31_Villefranche_Lauragais_8.jpg"]},"Consult_chateau_formulaireed88":{"id":"Consult_chateau_formulaireed88","dept":"31","canton":"Villemur sur Tarn","commune":"Villemur sur Tarn","nom":"Villemur","type":"Château","periode":"XV-XVII","histoire":"VILLEMUR sur Tarn  La Tour de défense, construite au bord du Tarn au XIIIe siècle, agrandie au siècle suivant, elle interdisait laccès au gué dans le système de défense de la ville.  Villemur Tout d'abord, ses défenses naturelles étaient constituées par le large fossé de la rivière et par deux ravins . Ces fossés en V étaient quasi infranchissables, le fossé Notre Dame, toujours visible aujourd'hui et qu'enjambe une voûte de briques, puis le ravin de Bifranc, comblé après l'inondation de 1930.\r\nLe duc de Joyeuse, ligueur, y met le siège en 1592. Mais le sire de Rastignac et une troupe dAuvergnats fidèles au roi Henri IV le repousse : ses troupes espagnoles sont jetées à la rivière, et lui est tué.                                                                                BONDIGOUX dit de Vernhes , appartenant au départ au duc de Lesdiguières, a d'abord été vendu à Jean Vernhes, qui donnera son nom à la propriété. Après une succession de propriétaires, devient en 1964 une clinique de convalescence privée. Situé au confluent du Souhet et du Tarn, le pavillon du Moine, ou de la petite folie, visible depuis la route Bondigoux-Villemur-sur-Tarn.                                                                                                                                  VERNHES, aujourd'hui clinique Le château, appartenant au départ au duc de Lesdiguières, a d'abord été vendu à Jean Vernhes, qui donnera son nom à la propriété. Après une succession de propriétaires, le château devient en 1964 une clinique de convalescence privée. Situé au confluent du Souhet et du Tarn, le pavillon du Moine, ou de la petite folie, visible depuis la route Bondigoux-Villemur-sur-Tarn, était un lieu où se réunissaient les amoureux. Il abrita longtemps une statue d'ermite car un moine venait y prier. Aujourd'hui il s'y organise des séances d'art-thérapie.","architecture":"La tour de défense  de Villemur est bâtie en brique sur deux étages et haute de 30 m. Sa construction date du XIIIe siècle, et a bénéficié de divers aménagements aux siècles suivants. La tour interdisait laccès au gué dans le système de défense de la ville. Elle fermait les remparts au Sud-Est. Sa fonction militaire perdure après le démantèlement des remparts jusqu'en 1631. La partie basse abritait le moulin seigneurial. Celui-ci sera remplacé par un foulon pour les draps de laine au XVIIe siècle. Au XIXe siècle, il est remplacé par trois paires de meules pour moudre le grain. Ces aménagements sont encore bien visibles dans les soubassements de la tour. C'est dans ces lieux que la famille Brusson commença à fabriquer ses premières pâtes alimentaires en 1872. Avant de construire en face de la tour sur la rive Est du Tarn, lusine de pâte.                                                                                            Bondigoux de plan en U à trois niveaux flanqué sur parc de deux tours carrées aux angles toit plat en terrasse.                                                                           Bernadou utilisé par le conseil général pour des besoins administratif et centre socio-culturel. En 2012,la municipalité continue à rénover et embellir le cadre de vie des Villemuriens.                                                                    Le château du XIXe siècle devient hôtel de luxe  par Zeid Hassim qui est en train de réaliser son dernier projet : construire un hôtel grand luxe au château Lagarrigues,","habitants":"le sire de Rastignac           \r\n        \"","divers":"Château de Lagarrigues, de Bernadou, de Vernhes, de fosse Nôtre-Dame et la tour de Défense.","gps":"","images":["../../jctruffet.com/image/image_31/31_Villemur_1.jpg","../../jctruffet.com/image/image_31/31_Villemur_2.jpg","../../jctruffet.com/image/image_31/31_Villemur_3.jpg","../../jctruffet.com/image/image_31/31_Villemur_4.jpg","../../jctruffet.com/image/image_31/31_Villemur_5.jpg","../../jctruffet.com/image/image_31/31_Villemur_6.jpg","../../jctruffet.com/image/image_31/31_Villemur_7.jpg","../../jctruffet.com/image/image_31/31_Villemur_8.jpg","../../jctruffet.com/image/image_31/31_Villemur_9.jpg"]},"Consult_chateau_formulairec1cd":{"id":"Consult_chateau_formulairec1cd","dept":"31","canton":"Plaisance du Touch","commune":"Plaisance du Touch","nom":"Vitarelles_31","type":"Château","periode":"XVII","histoire":"Deux châteaux à Vitarelles dont celui de Vitarelles et celui de Lardenne dont je n'ai pas d'information historique.                                                         VITARELLES  Plaisance du Touch.                                                                                                                                            LARDENNE  appartenant à la mairie de Toulouse.","architecture":"VITARELLES LARDENNE, demeure de plaisance d'une famille de parlementaires toulousains. La tradition familiale attribue cette construction au prince de Conti, gouverneur du Languedoc dans la seconde moitié du XVIIe siècle, qui en aurait fait son rendez-vous de chasse. Deux longues façades divisées en neuf travées. Chacune d'elles est animée au centre par une légère avancée, sommée d'un fronton triangulaire partant directement de la corniche. L'intérieur est orné d'un décor de gypseries de la fin du XVIIIe siècle. Des cheminées en marbre sont surmontées de hautes glaces encadrées par des moulures et des panneaux stuqués. Chaque porte à double battant est ornée de panneaux à décor musical champêtre ou à décor cynégétique.                                                                                                              VITARELLES, propriété de la Ville à Lardenne,  en mars 2012 un groupe de sans-abris avec l'intention de s'installer durablement dans les lieux,  avaient entrepris des petits travaux à l'intérieur et projetaient d'ouvrir des atelier.  Un an plus tard, Tarak, Sophie, Aldo, Pom et les autres sont tous partis. Ils ont été relogés ailleurs. C'est maintenant une famille avec des enfants qui vit dans ce petit manoir en brique rose.«Cette famille est suivie par l'association Espoir, qui a été mandatée par la préfecture. Elle va rester au château, moyennant un petit loyer, le temps qu'une solution durable soit trouvée» indique Claude Touchefeu. Longtemps resté inoccupé, le château a finalement trouvé sa nouvelle fonction. La ville va l'aménager pour y faire du logement intermédiaire pour des personnes en difficulté.","habitants":"Prince de Conti\r\n        \"","divers":"Château de Vitarelles à Plaisance de Touche","gps":"","images":["../../jctruffet.com/image/image_31/31_Vitarelles_1.jpg","../../jctruffet.com/image/image_31/31_Vitarelles_2.jpg","../../jctruffet.com/image/image_31/31_Vitarelles_3.jpg"]}};

function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','31 — Haute-Garonne'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)showDet(start);
</script></body></html>
