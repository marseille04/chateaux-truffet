En 1270, Alphonse de Poitiers, comte de Toulouse, fait occuper les terres et le château et fonde une bastide (dite \"La Tourelle\") au pied du donjon féodal. Devenu chef-lieu d'une bailli, gouverné par des consuls, Calmont est réuni à la couronne de France. Dès les premières années du XIVe siècle, la baronnie de Calmont est confiée à Bernard Saquet dont la famille directe conservera la seigneurie jusqu'au milieu du XVe siècle. Elle passa ensuite, en 1463, aux mains de Jean de Château-Verdun, sénéchal du comte de Foix. C'est lui qui fit bâtir vers 1485, sur les bords de l'Hers, en aval de Calmont, le premier château de Terraqueuse.  En 1721, Antoine de Paulo, comte de Calmont, seigneur et baron de Saint-Jean-de-Tor, est sénéchal de Lauragais. C'est un membre de cette famille, Jules de Paulo qui, rentré de l'émigration, fut le plus connu des chefs de l'insurrection royaliste de l'an VII (1799), visant à prendre l'arsenal de Toulouse.  Le château de Terraqueuse ayant appartenu au comte de Paulo seigneur de Calmont et l'un des chefs des insurgés royalistes entre 1797 et 1799.","architecture":"Calmont se présente comme une forteresse avec de grosses tours  rondes en angles à toits arasées.  Le château du Calmont est une maison fortifiée.  Une maison fortifiée correspondant à l'ancien château dresse ses deux tours du XIVe siècle, au bord de l'Hers. Elle est inscrite monument historique depuis 1927.  Cette somptueuse habitation deviendra le lieu de séjour de ses successeurs jusquà la Révolution. Situé en aval du village, le château dans un domaine de 18 hectares entouré de murs, présente encore une tour du XVe siècle et une superbe cour d'honneur de 2500 m². Aménagement paysager avec bassins, canaux et ruines romantiques au XVIIIe siècle. Installation des bâtiments à fonction agricole au XIXe siècle. Intégré dans l'important domaine rural de Terraqueuse, où des moulins étaient déjà attestés lors de l'achat de la baronnie de Calmont et de Terraqueuse en 1641.  De la maison fortifiée, située au bord de la rivière et gardant le gué, les restes les plus intéressants sont deux tours du XIVe siècle de forme circulaire ; le sommet de l'une a été refait ; l'autre est découronnée, mais porte un pigeonnier hexagonal. Cette maison fortifiée est classée monument historique.","habitants":"Famille de Bernard Saquet\r\n        \"","divers":"Vestiges des fortifications du château de Calmont  et château de Terraqueuse","gps":"","images":["../../jctruffet.com/image/image_31/31_Calmont_1.jpg","../../jctruffet.com/image/image_31/31_Calmont_2.jpg","../../jctruffet.com/image/image_31/31_Calmont_3.jpg","../../jctruffet.com/image/image_31/31_Calmont_4.jpg","../../jctruffet.com/image/image_31/31_Calmont_5.jpg","../../jctruffet.com/image/image_31/31_Calmont_6.jpg","../../jctruffet.com/image/image_31/31_Calmont_7.jpg","../../jctruffet.com/image/image_31/31_Calmont_8.jpg","../../jctruffet.com/image/image_31/31_Calmont_9.jpg"]},"Consult_chateau_formulaire2e12":{"id":"Consult_chateau_formulaire2e12","dept":"31","canton":"Toulouse","commune":"Toulouse","nom":"Calquet","type":"Château","periode":"XVII","histoire":"CALQUET, cette école est logée depuis sa création dans le quartier de Lardenne, au château du Calquet. Cette vaste demeure garde des traces du château du XVIIe siècle, élevé par la famille Calquet. Ainsi, la clé d'une porte à l'encadrement de brique et pierre porte l''inscription latine « hic ure, hic seca, modo in eternum parcas » : « ici brûle, ici tranche, pourvu que tu me pardonnes dans l'éternité », devise qui n'est bien sûr pas appliquée par les futurs agents du cadastre, disposant des outils informatiques et photogrammétriques les plus modernes. L'édifice est remanié au XVIIIe siècle, mais c'est surtout le XIXe siècle qui lui donne son apparence actuelle.                                                                          CHAMPREUX Dans la rue Sainte-Anne se trouve le consulat d'Espagne et, juste à côté, le logement du consul. Ce dernier prend ses quartiers dans l'ancien hôtel particulier du marquis de Champreux d'Altenbourg construit à la fin du XVIIe siècle dans un style très classique évoquant, par de nombreux détails, le XVIIIe siècle. Le marquis avait fait construire un château à Villefranche de Lauragais.","architecture":"Calquet le château est alors surmonté d'un toit à longs pans brisés percé de lucarnes, l'entrée précédée d'un porche à balustrade et les tours coiffées d'un toit en poivrière.                                                                                                      Hôtel du marquis de Champreux, le bâtiment se déploie en fond de parcelle. Il est précédé par un espace servant de cour et de jardin tandis que deux pavillons latéraux reliés par un mur de clôture et un portail l'isolent de la rue. L'élévation principale combine les caractéristiques de la façade sur cour et de celle sur jardin. Symétrique, de plan en U, même si les ailes latérales sont peu saillantes, elles se développent sur un sous-sol semi-enterré servant de soubassement au rez-de-chaussée accessible depuis le perron par un double accès, des baies segmentaires animent les murs. Elles sont ornées d'une clé sculptée d'une feuille d'acanthe, et de deux branchages rappelant le XVIIIe siècle, tout comme les garde-corps évasés du 1er étage aux motifs de feuillage. Deux d'entre elles portent les armoiries de la famille : d'un côté celles du marquis de Champreux, et de l'autre celles de son épouse, née de Saint-Félix. Un toit à la « Mansard » couvert d'ardoises et éclairé par de petites lucarnes couronne le bâtiment, renforçant l'impression d'architecture classique.","habitants":"Famille Calquet.                                                                                Marquis de Champreux\r\n        \"","divers":"Château de Calquet et l'hôtel particulier de Champreux","gps":"","images":["../../jctruffet.com/image/image_31/31_Calquet_1.jpg","../../jctruffet.com/image/image_31/31_Calquet_2.jpg","../../jctruffet.com/image/image_31/31_Calquet_3.jpg","../../jctruffet.com/image/image_31/31_Calquet_4.jpg"]},"Consult_chateau_formulairef40f":{"id":"Consult_chateau_formulairef40f","dept":"31","canton":"Revel","commune":"Cambiac","nom":"Cambiac","type":"Château","periode":"XVI","histoire":"CAMBIAC, fût construit comme lieu d'habitation pour le sieur Milhau nommé connétable de la région de Montauban par la reine Marguerite de Navarre. Au XIXe siècle la famille de Puy-Montbrun fit d'importants travaux l'adjonction d'une tour quadrangulaire imposante.  Château du XVIe siècle, avec de beaux éléments de la Renaissance, fenêtres à meneaux, tour octogonale protégeant un escalier à vis, belles cheminées.","architecture":"Le château de Cambiac vaste logis de la fin du XVIe siècle  reconstruit sur les bases d'un premier édifice. A la fin du XIXe siècle, de grands travaux de restauration dotent le château d'un étage supplémentaire et d'un pavillon. Réalisation d'un décor historiciste Louis XII appliqué aux façades et aux intérieurs. Toute la partie de l'édifice datant du XVIe siècle est intacte. Enfin au XIXe siècle, adjonction d'une importante tour quadrangulaire. Dans le parc du château, une orangerie du XVIIIe siècle et un petit puits du XIXe siècle complètent cet ensemble architectural. \r\n éléments de la renaissance  fenêtres à meneaux, tour octogonale protégeant un escalier à vis, échauguettes. Agrandissement sur la façade sud, au XIXe siècle, dans le style renaissance. Orangerie du XVIIIe siècle. Dépendances et écuries du XVIIIe siècle. Grand parc avec beaux arbres pluri-centenaires.","habitants":"Famille de Puy-Montbrun \r\n        \"","divers":"Château de Cambiac avec sa tour","gps":"","images":["../../jctruffet.com/image/image_31/31_Cambiac_1.jpg","../../jctruffet.com/image/image_31/31_Cambiac_2.jpg","../../jctruffet.com/image/image_31/31_Cambiac_3.jpg","../../jctruffet.com/image/image_31/31_Cambiac_4.jpg","../../jctruffet.com/image/image_31/31_Cambiac_5.jpg"]},"Consult_chateau_formulaire6e61":{"id":"Consult_chateau_formulaire6e61","dept":"31","canton":"Revel","commune":"Caraman","nom":"Caraman","type":"Château","periode":"XVI","histoire":"plusieurs  châteaux à Caraman  celui de  Croisillat, chambres d'hôtes par monsieur Guerrin (voir article);    le Saussens à Bourg Saint-Bernard , le Pujolet à Vallesville Lantat (voir article)                                                                                                                    CARAMAN était une  vicomté, puis un comté autonome en 1484 ; ce comté fut de 1321 à 1670 sous la domination des descendants de Pierre Duèse frère du pape dAvignon Jean XXII, puis de 1670 jusquà la Révolution de 1789, le comté appartient aux descendants de Pierre Paul Riquet, le créateur du canal du Midi, appelé alors le Canal Royal du Languedoc. Sur la famille Duèse, cest Pierre, frère du pape (né à Cahors) qui achète la vicomté de Caraman le 20 mai 1321 un descendant Paul dEscoullan de Monluc de Foix vend le comté et la baronnie de Saint Félix le 5 août 1670 à Pierre Paul Riquet qui devient ainsi comte de Caraman ; son arrière petit fils Victor de Riquet épouse une Marie Anne dAlsace Hénin-Liétard, princesse de Chimay, dont postérité jusquà nos jours. En 1981 une princesse de Chimay est venue à Caraman et Revel pour les cérémonies du Tricentenaire du Canal.                                                                                                                                                                          SAUSSENS  à Bourg Saint-Bernard  maison de Repos et convalescence, en sci  société civile immobilière de madame Sylviane Dore ou clinique.","architecture":"Mascarville, au nord de Caraman, maison des champs de la fin du XVIIe siècle ou du début du XVIIIe, ornée d'un décor intérieur de gypseries dans les années 1750. D'un type à rapprocher des modèles de la Renaissance, le jardin constitue un espace clos situé dans la continuité de la façade arrière et se développe sur trois terrasses successives.                                                                                                                                                                                                                                         Saussens,  De plan rectangulaire à trois niveaux toit en croupes entre deux pavillon carrées en façade toit à l'impérial avec tourelle crénelées côté parc  et prolongement en façade de deux corps  de un à deux niveaux avec terrasses.","habitants":"Famille De Villeneuve\r\n        \"","divers":"Château des environs de Caraman, Croizillat, Mascarville, et Saussens","gps":"","images":["../../jctruffet.com/image/image_31/31_Caraman_1.jpg","../../jctruffet.com/image/image_31/31_Caraman_2.jpg","../../jctruffet.com/image/image_31/31_Caraman_3.jpg","../../jctruffet.com/image/image_31/31_Caraman_4.jpg","../../jctruffet.com/image/image_31/31_Caraman_5.jpg","../../jctruffet.com/image/image_31/31_Caraman_6.jpg","../../jctruffet.com/image/image_31/31_Caraman_7.jpg"]},"Consult_chateau_formulaire9deb":{"id":"Consult_chateau_formulaire9deb","dept":"31","canton":"Toulouse","commune":"Casselardit","nom":"Casselardit","type":"Château","periode":"XVI","histoire":"CASSELARDIT,   domaine de Casselardit remonte en  1571 qui évoque une  maison avec tour  appartenant à Jean Lassus. Un marchand enrichi, devenu noble, Richard Déjean, baron de Launac et capitoul est considéré après son acquisition comme le véritable constructeur du château.  Après plusieurs changements la partie principale passa ensuite à Simon de Bastard, avocat et professeur de droit français à l'Université de Toulouse, Le château sera brièvement transformé en moulin ( le moulin de Maynery) en 1829 en y adjoignant des meules. \r\n En moulin de Maynery devenant le château de Magneri.  Le domaine passa en 1873 au maître tailleur toulousain Antoine Cathala puis à Justin Itié avant d'être acheté par Pierre Ducis en 1905. L'ancien artiste lyrique Pierre Ducis apporta quelques modifications notamment dans la porte située à droite sur la façade principale : aux armoiries de Dejean répondent les volutes Art nouveau des fers forgés sertis dans une arcade symétrique. La terrasse descendant en arcs de cercle vers le fleuve et le parc planté d'essences exotiques sont aménagés dans le même temps et ouvert aux habitants encore rares du quartier ; l'ancien vivier est quant à lui transformé en bassin d'agrément. À la mort de sa veuve, le château devient une maison de retraite dédiée aux anciens artistes lyriques. Désormais géré par le CCAS, le site s'est agrémenté de deux nouvelles structures gériatriques : l'EHPAD Pierre Ducis et la maison de retraite Les Fontaines.","architecture":"Château en briques rouges de plan carrée à deux niveaux et attiques, flanqué à chaque angles de tourelles carrées sur encorbellement  avec toit style asiatique.Un blason, qui représente sur la façade ouest un oiseau au vol abaissé et un chef chargé de trois soleils, semble en attester. Le château, un temps laissé à l'écart pour cause de non conformité, est aujourd'hui occupé par les services communs aux deux structures.","habitants":"Famille de Richard Déjean,\r\n        \r\n        \"","divers":"Chateau de Casselardit à Toulouse","gps":"","images":["../../jctruffet.com/image/image_31/31_Casselardit_1.jpg","../../jctruffet.com/image/image_31/31_Casselardit_2.jpg","../../jctruffet.com/image/image_31/31_Casselardit_3.jpg"]},"Consult_chateau_formulaire2b8c":{"id":"Consult_chateau_formulaire2b8c","dept":"31","canton":"Auterive","commune":"Castagnac","nom":"Castagnac","type":"Château","periode":"XV","histoire":"CASTAGNAC Alexandre de Lordat de Castagnac fait chevalier de l'ordre royal et militaire de Saint-Louis le 23 avril 1740.   Le château de Castagnac possède un fossé en eau. Il est de style Moyen-Age, du XIIe siècle. C'est une ancienne motte castrale transformée vers le XIIe siècle en place forte. Le plus ancien document qui mentionne un seigneur à Castagnac concerne Bernadus de Castagnac et date de 1162. Les armes présentes sur la face Est du château sont \"d'or à croix de gueule\" et correspondent aux armes des Lordat, ancienne famille de chevalerie du comté de Foix. Le château de Castagnac est inscrit aux M.H. depuis 2003. Il appartient à une famille de notables.","architecture":"Ce château de Castagnac  est un témoignage non négligeable de l'histoire régionale toulousaine, en effet il représente le passage entre les courants architecturaux individualiste de la guerre de Cent Ans et l'avènement de la renaissance française, transformant ainsi une place forte en lieu de confort. Château construit à la fin du Moyen-Age, constitué d'une tour-résidence de plan quadrangulaire avec quatre tours circulaires aux angles. L'édifice a été réaménagé une première fois autour de 1500, puis aux XVIIIe et XIXe siècles. Il témoigne d'une petite seigneurie rurale du XVIe siècle avec système défensif,  fossé en eau datant du début du XIIe siècle est classé aux monuments historiques.  il présente toutes les caractéristiques d'un château médiéval du XIVe siècle, il a été totalement restauré par les propriétaires.","habitants":"Alexandre de Lordat de Castagnac \r\n        \"","divers":"Château féodal de Castagnac","gps":"","images":["../../jctruffet.com/image/image_31/31_Castagnac_1.jpg","../../jctruffet.com/image/image_31/31_Castagnac_2.jpg","../../jctruffet.com/image/image_31/31_Castagnac_3.jpg","../../jctruffet.com/image/image_31/31_Castagnac_4.jpg","../../jctruffet.com/image/image_31/31_Castagnac_5.jpg","../../jctruffet.com/image/image_31/31_Castagnac_6.jpg"]},"Consult_chateau_formulaire7d66":{"id":"Consult_chateau_formulaire7d66","dept":"31","canton":"Castanet Tolosan","commune":"Castanet_Tolosan","nom":"Castanet_Tolosan","type":"Chateaux","periode":"XV-XVI","histoire":"CASTANET TOLOSAN,   au Moyen-Âge, un fort sélevait dans ce secteur. Le 28 octobre 1355, Édouard de Woodstock, dit le Prince Noir, duc d'Aquitaine, et ses troupes, incendièrent la ville au cours d'une chevauchée ravageant la région.\r\nLe fort fut rasé en 1626 sur ordre de Richelieu. En 1814, après la bataille de Toulouse, l'armée du maréchal Soult fut battue par celle de Wellington, laquelle occupa Castanet.   Aujourd'hui  mairie .                                                                                                                               RABAUDY, chambres d'hôtes  occupe les anciennes écuries rénovées d'un château du XVIe siècle.  société civile immobilière est en activité depuis 22 ans., elle est spécialisée dans le secteur d'activité de la location de terrains et d'autres biens immobiliers. Pierre Péchou en est le gérant.\r\n PECHABOU, aucune source écrite ne fait mention de l'histoire de Péchabou avant le XIIe siècle, pour lequel l'histoire des évêques et archevêques de Toulouse fait mention d'une donation à sa cathédrale de Géraud de Labarthe, évêque de 1164 à 1170, de ses propriétés de Balmar, Puécabo, Donaville et Castanet. Une donation de Bertrand Guilabert et son frère Martin à l'ordre du Temple en 1234 fait de Péchabou une limite du gardiennage de Toulouse. À la disparition de l'ordre, le domaine revient aux hospitaliers de Pompertuzat. Le livre du prévôt de Toulouse en 1272 cite le capellanus de Podio Abono. Une charte de 1475 fait mention de l'existence de reliques et d'une confrérie de Saint-Antoine à Péchabou. Reliques encore présentes en 1596, citées par le visiteur épiscopal Martin Rouelle. En 1570, lors des guerres de religion, l'église et la maison presbytérale sont incendiées, puis rapidement reconstruites.","architecture":"Chateau Dubarry corps de logis oblong à un niveau   toit à deux pans  flanqué de deux tourelles carrées aux angles côté parc                                             Une tour pentagonale, qui faisait partie du couvent des Cordeliers.\r\nLe château de Rabaudy, demeure seigneuriale : sa construction date du XIIIe siècle. Certaines fenêtres sont de style renaissance.  A deux niveaux et attiques toits en croupe pour l'ensemble  presque plat et en retour d'équerre en façade formant un U.","habitants":"le Prince noir Édouard de Woodstock\r\n        \"","divers":"Vchâteau de Castanet -Tolosan dont celui de la mairie, château Dubarry, de Raboudy et de Pechabou","gps":"","images":["../../jctruffet.com/image/image_31/31_Castanet_Tolosan_1.jpg","../../jctruffet.com/image/image_31/31_Castanet_Tolosan_2.jpg","../../jctruffet.com/image/image_31/31_Castanet_Tolosan_3.jpg","../../jctruffet.com/image/image_31/31_Castanet_Tolosan_4.jpg","../../jctruffet.com/image/image_31/31_Castanet_Tolosan_5.jpg","../../jctruffet.com/image/image_31/31_Castanet_Tolosan_6.jpg","../../jctruffet.com/image/image_31/31_Castanet_Tolosan_7.jpg","../../jctruffet.com/image/image_31/31_Castanet_Tolosan_8.jpg","../../jctruffet.com/image/image_31/31_Castanet_Tolosan_9.jpg"]},"Consult_chateau_formulairef237":{"id":"Consult_chateau_formulairef237","dept":"31","canton":"Villemur sur Tarn","commune":"Castelnau-Estrétefonds","nom":"Castelnau_Estrétefonds","type":"Château","periode":"XII-XVI","histoire":"Deux châteaux à Castelnau-Estrétefonds  celui de Castelnaud et de Lafite de Eric Gendre, viticole.                                                                                                                                       CASTELNAU-Estretefonds,  À la fin du XIIe siècle, à  la famille de Castelnau. Aymeric de Castelnau se verra céder la propriété du village par le comte Raymond IV de Toulouse ; le village a désormais son propre seigneur. Au XIVe siècle, à la puissante famille des Isalguier. Après le bannissement de Jehan Isalguier par François 1er , la famille de Vabres devient la nouvelle famille détentrice de Castelnau. En 1537, Michel de Vabres veut embellir le château, et le léguèrent aux Bar du Périgord en 1747. La dernière représentante  de cette famille Judith de Bar s'allia au Palarin et sa fille Marie-Raymonde épouse en 1782 François-Géraud de Cambolas ;   Le 3 août 1790, le maire Raynaud va à Toulouse pour adhérer à la Fédération.  Les Palerins de Cambolas ont conservés  le château jusque dans les premières années du XXe siècle, vendu ensuite à plusieurs reprises, il est resté en déshérence   jusqu'à l'arrivée de la communauté religieuse en 1963.  Le château qui accueille, entre autres, la communauté « Notre-Dame du Bon Accueil » fondée en 1963 (religieuses des « Petites Surs de Marie Mère du Rédempteur » Castelnau-d'Estrétefonds fait partie de l'académie de Toulouse.","architecture":"Castelnau-d'Estrétefonds le  château de Castelnau;   construit au XIIe siècle, remanié au XVIIIe siècle, de plan en U  corps de logis  à trois niveaux rectangulaire possède en façade un fronton triangulaire et deux tours carrées sur angles de la façades à quatre niveaux toit à deux pans  sur l'intérieur deux pavillons de même niveaux en U donnant sur la cour d'honneur, avec retour formant la cour. Deux tours accolé à la porte d'entrée  mi-hors-oeuvre couronné de créneaux.  Le 28 brumaire an III, les anciens presbytères sont mis à la disposition de la municipalité pour installer des écoles; au château sont installés la gendarmerie et le corps de garde, il servira aussi de prison. Depuis 700 ans, Castelnau n'avait vu aucun ennemi sur ses terres. En 1814, les anglais, alliés aux espagnols, envahissent la vallée de la Garonne, la 3e division stationnera à Castelnau ; aucun combat et aucune destruction ne sont à déplorer.                                                                                                                    Château de Castelnau-Lafitte  de plan rectangulaire  à deux niveaux flanqué en façades de deux tours carrées à trois niveaux toitures en coupoles prolongé de chaque côté du bâtiment à un niveau toit en croupe, plein cintre sur pavillon d'entrée un fronton retondant au niveau du toit à deux pans.","habitants":"Famille de Vabres\r\n        \r\n        \"","divers":"Château de castelnau d'Estrtefonds et Castelnau-Lafitte","gps":"","images":["../../jctruffet.com/image/image_31/31_Castelnau_Estretefonds_1.jpg","../../jctruffet.com/image/image_31/31_Castelnau_Estretefonds_2.jpg","../../jctruffet.com/image/image_31/31_Castelnau_Estretefonds_3.jpg","../../jctruffet.com/image/image_31/31_Castelnau_Estretefonds_4.jpg","../../jctruffet.com/image/image_31/31_Castelnau_Estretefonds_5.jpg","../../jctruffet.com/image/image_31/31_Castelnau_Estretefonds_6.jpg","../../jctruffet.com/image/image_31/31_Castelnau_Estretefonds_7.jpg","../../jctruffet.com/image/image_31/31_Castelnau_Estretefonds_8.jpg"]},"Consult_chateau_formulaire8e62":{"id":"Consult_chateau_formulaire8e62","dept":"31","canton":"Léguevin","commune":"Léguevin","nom":"Castelnouvel","type":"Château","periode":"XV","histoire":"LEGUEVIN   une commanderie fut construite à l'emplacement du château de Castelnouvel.  On décida alors de procéder à la fortification du village qui fut achevée le 30 octobre 1363. Léguevin fut rattachée au comté de l'Isle-Jourdain, au comté d'Armagnac puis aux rois de Navarre. Henri III de Navarre, futur Henri IV de France, fut seigneur de Léguevin de 1572 à 1579 et traversera Léguevin en 1579 et 1580. Le 10 août 1579 la seigneurie de Léguevin passera à Guy Du Faur de Pibrac.  En mai 1562 les troupes de Blaise de Montluc traversèrent Léguevin ; le curé Balthazar Vintimiglia fut suspecté de protestantisme et arrêté ; et le village fut mis à sac par une troupe de protestants le 11 août 1593. Louis XIV passera à Léguevin en 1659, et Napoléon en juillet 1808. Léguevin fut incorporé au département de la Haute-Garonne en 1790. Une municipalité révolutionnaire fut créée à l'instigation du curé en août 1789. L'hôtel de ville fut pris et pillé par des manifestants à deux reprises, le 25 juillet 1790 et le 15 juin 1792. Un contingent de prisonniers espagnols séjourna dans le village en 1795, accentuant les difficultés provoquées par la famine de 1794. Les 8 et 9 août 1799 des royalistes abattirent larbre de la Liberté et renversèrent lautel de la Patrie. Du 26 au 29 mars 1814 les troupes de Wellington occupèrent Léguevin. Ce furent près de 7 000 fantassins et 800 cavaliers, placés sous le commandement du lieutenant général, sir Rowland Hill, qui séjournèrent sur la commune.                                                                                                                            CASTELNOUVEL La maison denfants à caractère sanitaire de « Castelnouvel » est un établissement de soins et de réadaptation spécialisé dans la prise en charge denfants et dadolescents atteints dépilepsies sévères avec troubles et déficiences associés.","architecture":"Le château de Castelnouvel aujourd'hui  transformé en maison ds'enfants centre de réadaptation, de convalescence. Quadrilatère plus forteresse féodal que château avec ses grosses tours carrées en angles avec mâchicoulis et créneaux, échauguettes accolées à toit pointu.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château de Castelnouvel à Léguevin et Hôtel de ville","gps":"","images":["../../jctruffet.com/image/image_31/31_Castelnouvel_1.jpg","../../jctruffet.com/image/image_31/31_Castelnouvel_2.jpg","../../jctruffet.com/image/image_31/31_Castelnouvel_3.jpg","../../jctruffet.com/image/image_31/31_Castelnouvel_4.jpg","../../jctruffet.com/image/image_31/31_Castelnouvel_5.jpg","../../jctruffet.com/image/image_31/31_Castelnouvel_6.jpg","../../jctruffet.com/image/image_31/31_Castelnouvel_7.jpg"]},"Consult_chateau_formulaire0b1c":{"id":"Consult_chateau_formulaire0b1c","dept":"31","canton":"Castanet -Tolosan","commune":"Saint-Orens de Gameville","nom":"Catala","type":"Château","periode":"XVII","histoire":"CATALA du XVIIe siècle, Saint-Orens-de-Gameville ,  est en fait une maison de maître aux allures de grande maison toulousaine. Elle aurait appartenu à un pasteur protestant, le père Mayeu, au début du vingtième siècle. Aujourd'hui, l'essentiel de son domaine a laissé place à un lotissement de pavillons récents mais il reste une partie du parc, qui ne manque pas de charme. La maison, quant à elle, appartient à la mairie et accueille associations, clubs et réunions.                                                                                St-ORENS de GAMEVILLE,  l'ancien château de Cornac a été détruit par M. Labouilhe parce qu'il était \"trop humide\" est remplacé par une métairie plus fonctionnelle. Cette ferme sert maintenant aux clubs de poteries et d'émaux.\r\nLe château de Montpapou n'apparaît plus : il était indiqué très ancien. Ce nom pourrait être en liaison avec saint Papoul, saint connu dans tout le Lauragais.  Le château de CAYRAS  est de 1750.   Le château Catala est une maison de maître qui, au début du XX°, appartenait à un pasteur protestant, le Père Mayeu.  Le château de la Viguerie est au centre d'un important domaine agricole. Le viguier  était le nom donné aux prévôts (magistrats royaux) dans le Midi de la France. Le château du Bousquet est assez ancien puisqu'il possédait une chapelle privée avant la Révolution. Le château de Soye est le plus récent. Un incendie l'a endommagé dans les années 1980.\" je n'ai pas de gravure.","architecture":"Le château de Soye est le plus récent. Le cadre du parc du château  de Catala ajoute à l'agrément et permet de mieux faire connaître ce patrimoine. Le bâtiment chargé d'histoire était en fait une métairie au XVIIIe siècle. Durant la première moitié du XXe siècle, il fut occupé par un pasteur d'origine belge. À l'intérieur du château, il installe une chapelle dans laquelle il officie parfois. Acheté par la municipalité et rénové entre 1985 et 1989, ce bâtiment accueille de nombreuses manifestations culturelles, familiales et associatives. Le parc qui entoure le château avec ses arbres centenaires est l'endroit idéal pour venir écouter de la musique en famille.","habitants":"le Père Mayeu\r\n        \"","divers":"Château de Catala et de la Soye à Saint-Orens de Gameville","gps":"","images":["../../jctruffet.com/image/image_31/31_Catala_1.jpg","../../jctruffet.com/image/image_31/31_Catala_2.jpg","../../jctruffet.com/image/image_31/31_Catala_3.jpg","../../jctruffet.com/image/image_31/31_Catala_4.jpg","../../jctruffet.com/image/image_31/31_Catala_5.jpg"]},"Consult_chateau_formulaire6ac7":{"id":"Consult_chateau_formulaire6ac7","dept":"31","canton":"Bagnières de Luchon","commune":"Cierp-Gaud","nom":"Cierp_Gaud","type":"Château","periode":"XVI","histoire":"CIERP-GAUD,  en 1156  les Templiers s'installent à Cierp et dans d'autres villages de la région d'où ils rayonnaient pour garder les passages de la montagne et défendre les voyageurs. Pendant la guerre de Cent Ans, le pays du confluent est occupé par des collaborateurs des anglais. En 1591, à l'époque des guerres de religion, Cierp-Gaud et son château ont vécu des moments dramatiques. En 1702, alors que la guerre de Succession d'Espagne se déroule dans les plaines de Catalogne et d'Aragon des préparatifs en vue de l'attaque du Vénasque et du Val d'Aran sont déclenchés. Le sentier qui relie Montréjeau à Luchon est amélioré et les troupes régulières installent un dépôt à Cierp.\r\nLe nom de Cierp-Gaud n'apparait qu'en 1972, lorsque les communes de Cierp et de Gaud fusionnent. L'année suivante, la commune de Signac entre en fusion-association avec Cierp-Gaud qui prend alors le nom de Cierp-Gaud-Signac. En 1983, Signac reprend son indépendance et Cierp-Gaud-Signac redevient Cierp-Gaud.","architecture":"Le château de Cierp-Gaud   du XVIe siècle avec deux échauguettes du XIXe siècle, siège de l'actuelle mairie. De plan en équerre  à trois niveaux avec lucarnes sur le toit en croupes flanqué d'une tour ronde à l'angle extérieure des deux corps de logis toit en coupole.","habitants":"Seigneur local\r\n        \"","divers":"Château de Cierp-Gaud actuel mairie","gps":"","images":["../../jctruffet.com/image/image_31/31_Cierp_Gaud_1.jpg","../../jctruffet.com/image/image_31/31_Cierp_Gaud_2.jpg","../../jctruffet.com/image/image_31/31_Cierp_Gaud_3.jpg","../../jctruffet.com/image/image_31/31_Cierp_Gaud_4.jpg","../../jctruffet.com/image/image_31/31_Cierp_Gaud_5.jpg"]},"Consult_chateau_formulaire4caf":{"id":"Consult_chateau_formulaire4caf","dept":"31","canton":"Castanet-Tolosan","commune":"Clermont-le-Fort","nom":"Clermont_Fort","type":"Village fortifié","periode":"XV","histoire":"CLERMONT, le site est habité dès le néolithique, comme l'ont montré les fouilles de Jean-Baptiste Noulet. L'histoire connue de Clermont-le-Fort débute vers l'an mil, époque où les premiers seigneurs, les Clermont, s'y installèrent, prenant le nom même de leur seigneurie. Mais les documents relatifs à cette époque sont hélas rares et fragmentaires. C'est au XIVe siècle que les Isalguier simplantèrent à Clermont par le mariage de Pierre Isalguier avec Jeanne de Montaut qui lui apporta en dot la part de seigneurie que sa famille possédait en ce lieu. Le premier acte d'administration civile signé de son nom à Clermont est daté du 20 novembre 1370, et c'est en 1469 que fut libellé l'acte d'inféodation du fort par Odet Isalguier, seigneur de Clermont et d'Aureville. Son fils, Jacques Isalguier, baron de Clermont et de Clermont-Dessous, s'est marié avec Agnès de Foix-Rabat en 1465, puis à Miramonde de Montaut dont il a eu Antoinette Isalguier, mariée à Blaise de Monluc. En 1564, la seigneurie revient à Jacques de Rochechouart par son mariage avec Marie Isalguier, alors veuve sans enfant.  Elle resta dans la famille jusqu'en 1786, année où Pierre de Buisson-Beauteville en devient propriétaire. Ce fut le dernier seigneur de Clermont. Chaque dynastie seigneuriale possédait ses propres armoiries, et c'est ainsi que Clermont-le-Fort est devenu, au cours des siècles, un village très blasonné.","architecture":"Clermont le fort, porte fortifiée du XVe siècle. Minuscule village perché sur la falaise, surplombant lAriège, il doit à sa configuration originale et à son site magnifique dêtre classé depuis 1933. Rien détonnant si les toulousains en ont fait lune de leurs promenades dominicales préférées.\r\nLe fort de Clermont possédait jadis tourelles et courtines, enfermant la grande et forte église Saint- Pierre et nombre dhabitations. Mais les murailles ont disparues, et ce sont à présent ces constructions elles-mêmes qui forment les remparts, formant autour dune cour commune un parallélépipède clos, avec pour seul accès le portail en arc brisé de sa tour carrée. Sous un beau mur clocher souvre léglise où la vierge a trouvé refuge.","habitants":"Famille d'Isalguier\r\n        \"","divers":"Porte de Clermont le Fort","gps":"","images":["../../jctruffet.com/image/image_31/31_Clermont_Fort_1.jpg","../../jctruffet.com/image/image_31/31_Clermont_Fort_2.jpg"]},"Consult_chateau_formulaire7d9f":{"id":"Consult_chateau_formulaire7d9f","dept":"31","canton":"Toulouse_7","commune":"Colomiers","nom":"Colomiers","type":"Château","periode":"XVIII","histoire":"Cinq châteaux à Colomiers , celui de l'Armurier, de Lasplane, le Franc,  le Garoussal, Raspaud( voir article) et des Tourelles.                                                                                                                                                                     ARMURIERS  du XVIIe siècle,  ce château fut le témoin d'un événement tragique marquant : l'arrestation le 15 septembre 1940 de Léon Blum à Colomiers à l'invitation d'Eugène Montel, maire de l'époque. Vincent Auriol fut aussi arrêté dans ce même château ainsi qu'Eugène Montel. Une grade partie de la population se bat pour sauver ce château des griffes d'un promoteur Pitch.                                                                                                                                                   CABIROL, édifié au XIXe siècle, il s'élève  au milieu d'un vaste parc, longtemps occupé par les services de la clinique du même nom, le château est à l'abandon depuis plusieurs années, relate Christophe Fanouillère du cabinet courtage et patrimoine, assistant au maître d'ouvrage chargé de la réhabilitation. Et d'assurer : « Nous allons conserver l'aspect extérieur avec un ravalement et un gommage des façades. Les fenêtres seront changées à l'identique.                                                                                  GARROUSSAL, l'imposant château de Garroussal   est édifié  au XVIIIe siècle.\r\nDisposant à l'origine d'une chapelle domestique, il appartient à la famille Satgé depuis 1852.                                                                                                                     LASPLANE maison de retraite.                                                                                         RASPAUD Antoine de Raspaud avaient fait reconstruire en 1530, Jean Jacques de Raspaud, Marc Antoine de Raspaud, Jean Louis de Raspaud  qui meurt en 1657.  A la fin du XVIIe siècle, après un procès, les Raspaud perdent lunité de leur domaine et doivent partager Colomiers avec les Goyrans. A la suite des successions, ils démembrent leur part de Colomiers et le château passe au début du XVIIIe siècle, entre les mains des familles Séde et Vignes.                                                                                    TOURELLES ce château a été la propriété dEmile Calvet qui fut maire de Colomiers de 1934 à 1945 et appartient toujours à cette famille.","architecture":"Château du Cabirol, depuis 1898, le château dresse son imposante silhouette parmi les frondaisons de l'un des plus grands parcs de la ville. Ce manoir du XIXe siècle va devenir un lieu de vie. La demeure abritera 30 appartements.\r\nChâteau de l'Armurier  au cur d'une zone protégée de l'urbanisation sur les hauteurs des Ramassiers,   cette prestigieuse demeure, dotée dun jardin central, apparaît  avec ses deux tours carrées. Sa façade est habillée de larges briques rouges qui contrastent élégamment avec les toitures coiffées de tuiles canal.                                                                                                       La Porte du château des Raspaud est un dernier vestige des Raspaud,   le château a été construit en XVe siècle, avait été pratiquement détruit lors de la guerre civile entre Armagnacs et Bourguignons. Le château des Raspaud a été démoli en 1963. Il ne reste comme vestige encore debout que son portail d'entrée, qui date du XVIIIe siècle.                                                                                                               Lasplane de plan quadrangulaire à deux niveaux.                                                   le Franc de plan rectangulaire à deux niveaux avec lucarnes sur toit brisés. Garoussal de plan rectangulaire à deux niveaux   avec pavillon d'entrée dépassant d'un étage accolé sur l'aile droite d'une tourelle carrée de même niveaux plus orangeraie en prolongement.                                                                  Tourelles, cette vaste demeure dresse ses fines tourelles au coeur dun grand domaine. Construit en briques, avec arceaux de terre cuite dans les parties hautes, en terre cuite de couleur pâle dans les consoles qui soutiennent la corniche de frontispice.","habitants":"Léon Blum et Vincent Auriol \r\n        \"","divers":"Château de l'Armurier,  de Cabirol, de Franc, de Garousal et des Tourelles.","gps":"","images":["../../jctruffet.com/image/image_31/31_Colomiers_1.jpg","../../jctruffet.com/image/image_31/31_Colomiers_2.jpg","../../jctruffet.com/image/image_31/31_Colomiers_3.jpg","../../jctruffet.com/image/image_31/31_Colomiers_4.jpg","../../jctruffet.com/image/image_31/31_Colomiers_5.jpg","../../jctruffet.com/image/image_31/31_Colomiers_6.jpg","../../jctruffet.com/image/image_31/31_Colomiers_7.jpg","../../jctruffet.com/image/image_31/31_Colomiers_8.jpg","../../jctruffet.com/image/image_31/31_Colomiers_9.jpg"]},"Consult_chateau_formulairee3a0":{"id":"Consult_chateau_formulairee3a0","dept":"31","canton":"Bagnières de Luchon","commune":"Castelbiague","nom":"Compans","type":"Château","periode":"XIX","histoire":"CASTELBIAGUE, du Moyen-Âge jusqu'au XVIe siècle, les barons d'Aspet  sont les seigneurs. La famille de Sarrieu  en prenne possession dès le début du XVIIe siècle.  les différents possesseurs seront : Géraud, remarié le 10 juin 1609 à Bertrande de Binos ; lui et son père décéderont  en 1631. Guy de Sarrieu, seigneur de Castelbiague, leur fils, épouse le 2 août 1647 Jeanne de Latour Lendorthe ; François de Sarrieu, seigneur, leur fils, épouse le 2 juin 1679 à Mancioux Françoise de Vendomois ; François de Sarrieu, seigneur , leur fils, épouse le 6 février 1722 à Villarzel du Razès Catherine d'Hélie. La famille quitte alors Castelbiague pour s'installer au château de Martres-Tolosane ;\r\nLouis François de Sarrieu, seigneur , Villarzel et autres lieux, leur fils, épouse Elisabeth de Portes de Pardaillan. Début 1767, il délègue ses pouvoirs seigneuriaux à Bertrand de Lafitte son beau-frère, idem en 1771 où il fait casser l'élection consulaire annuelle du 16 mars 1771. La seigneurie échoit en partage à Marie Antoinette de Sarrieu, sur de Louis François et mariée avec Bertrand de Lafitte, elle en rend aussi hommage devant le parlement de Navarre en 1779 et la gardera jusqu'en 1789.  Jean Dominique Compans est né le 26 juin 1769 d'une famille de notables.   En 1789, il se rallie à la Révolution et choisit la carrière militaire. Capitaine à 23 ans, au III° Bataillon des volontaires de la Haute-Garonne, puis Soldat de l'An II (1793)  L'Empereur le nomme général de division (1813), Grand Officier de la Légion d'Honneur et comte d'Empire.Il se retire dans ses châteaux de Blagnac et de Castelbiague; Il se met au service de la Monarchie et se consacre aux devoirs de sa charge de Conseiller Général. Il est nommé Pair de France   Il meurt à Blagnac, le 10 novembre 1845. le château passe à M. de Tersac","architecture":"Vestiges de l'ancien château féodal du XIII-XVe siècle à Castelbiague. Le château Compans du XIXe siècle: cest le général de division  comte de Compans  qui fit remanier la bâtisse en château familial de Pont de Prades de  style troubadour de lépoque.  Le randonneur passionné de botanique, remarquera sur la droite du château, un conifère dune espèce, sinon rare du moins peu courante « le Ginkgo Biloba » originaire dAsie et plus connu sous la dénomination de « larbre aux quarante écus.                                                                                                         Château de Compans corps de logis rectangulaire à deux niveaux et attiques avec série de lucarnes galbé de fronton triangulaire   flanqué de deux tours rondes toit en poivrières.","habitants":"famille de Sarrieu                                                                                    Jean Dominique Compans\r\n        \"","divers":"Vestiges du premier château et le nouveau","gps":"","images":["../../jctruffet.com/image/image_31/31_Compans_1.jpg","../../jctruffet.com/image/image_31/31_Compans_2.jpg","../../jctruffet.com/image/image_31/31_Compans_3.jpg","../../jctruffet.com/image/image_31/31_Compans_4.jpg"]},"Consult_chateau_formulaire2c99":{"id":"Consult_chateau_formulaire2c99","dept":"31","canton":"Toulouse-9","commune":"L","nom":"Cornaudric","type":"Château","periode":"XVII","histoire":"trois châteaux à l'Union celui de Cornaudric, de Belbèze et de Malpagat (voir article).                                                                                                                                    L'UNION, lors de la retraite d'Espagne des troupes napoléoniennes sous les ordres du maréchal d'Empire Soult, le territoire de la commune fut le théâtre de combats entre ces troupes et celles du duc de Wellington lancées à leur poursuite, en marge de la bataille qui eut lieu à Jolimont, bataille de Toulouse en  1814.                                                                                                                                   CORNAUDRIC, en 1522, Jean de Bernis  seigneur de la Cornaudric. Il est possible quil soit le constructeur dun premier château, aujourdhui disparu. En 1644, François de Resseguier, conseiller au parlement de Toulouse, fait construire une chapelle. En 1766, Dominique de Gérie, écuyer, fait reconstruire le château et la chapelle.                                                                                                                             BELBEZE, lactuel château de Belbèze, plutôt gentilhommière, est-il le même que celui implanté en 1768. Le plan de Dupré-Lacaze de 1887 indique, en effet, au même emplacement une construction assez importante ; cest donc bien possible. Deux parcs existaient de part et dautre des corps du bâtiment, parcs qui sont allés en samenuisant par suite des cessions.","architecture":"Cornaudric  Il sagit du château que nous connaissons actuellement implanté au milieu dun parc dominant la vallée de lHers. Quant à la chapelle actuelle, érigée en 1781, non loin de lentrée du parc par Jacques Gounon, seigneur de La Cornaudric, elle fut « chapelle domestique » jusquà ce que fut construit léglise de LUnion, à la fin du XIXe siècle.","habitants":"Famille de François de Resseguier\r\n        \"","divers":"Château de Cornaudric à l'Union.","gps":"","images":["../../jctruffet.com/image/image_31/31_Cornaudric_1.jpg","../../jctruffet.com/image/image_31/31_Cornaudric_2.jpg"]},"Consult_chateau_formulaire00e8":{"id":"Consult_chateau_formulaire00e8","dept":"31","canton":"Blagnac","commune":"Cornebarrieu","nom":"Cornebarrieu","type":"Château","periode":"XVI","histoire":"Quatre châteaux à Cornebarrieu celui de Cornebarrieu, du Pontié, de Laran et  d'Alliez clinique des Cèdres.                                                                                                                                                PONTIE   du XIVe siècle.  Hôtel de madame Chantal de Faletans                                                     CORNEBARRIEU   Alain Toppan, conseiller municipal, également historien du village a fait des recherches sur ce château: «Sous l'ancien régime et depuis le Moyen-Age, c'était la demeure historique des seigneurs de Cornebarrieu. En 1536 ce fût la commanderie de l'ordre hospitalier de Saint Jean de Jérusalem». Vers 1930, c'est Raymond Grimaud le propriétaire: « C'était un homme remarquable, il a aidé de nombreux habitants. Dans les années 50 en tant que directeur, il a fait rentrer la moitié de la population à Sud Aviation» . Après le décès de Raymond Grimaud il y a 20 ans, sa fille Jacqueline Habile-Gal lui succède. Le conseil municipal a voté à la majorité moins deux abstentions l'acquisition de ce château avec ses dépendances,son jardin et parc situé sur une surface totale de 15 622 m2. L'acte authentique sera signé mi-juin.  Notre commune n'est pas endettée, nous avons une bonne gestion. Le maire, Gilles de Faletans, a une autre bonne nouvelle :«Nous venons également d'acheter la propriété de Georges Guiraud face à la mairie»                                                              LARAN; Domenge de Laran avait acquis au XVIe siècle le domaine il agrandit sa propriété pour exploité une tuilerie et par des prêts à des tiers, il récupéré des biens. Jean de Laran hérita de tout et fit fortune dans  le commerce des tissus.","architecture":"Château de Cornebarrieu. Le maire de Cornebarrieu, Gilles de Faletans souhaite conserver le patrimoine:  La collectivité a le devoir de saisir l'opportunité d'acquérir pour préserver et mettre en valeur cette propriété. C'est un château, où sa grille d'entrée est située, avenue de Versailles, que l'on peut le contempler sur son promontoire, à droite de l'église vers le quartier des syndics, route de Pibrac. Château de Laran (privé). Château d'Alliez (Clinique des Cèdres)                                                                                PONTIE,    déjà présent sur les cartes du XIVe Siècle, a gardé les traits propres aux domaines fortifiés de l'époque. En effet, même si le mur d'enceinte original a aujourd'hui disparu nous pouvons retrouver, dans celui qui a pris sa place, l'esprit de l'époque. D'ailleurs des traces de fortifications visibles sur les murs intérieurs, des meurtrières sont là pour nous permettre d'imaginer le climat d'insécurité de l'époque.Les différents remaniements de cette demeure ont laissés des \"strates\" architecturales qui sont autant de preuves quant aux origines anciennes et aux modes traversées par Pontié. Une des deux marques les plus visibles est la cave, une voûte de 6 mètres de large sur 25 mètres de long, dont la taille est inférieure à celle du corps principal. L'autre, plus récente (110 ans) est de style toscan donné à la tour principale. Loin de son pays d'origine, ce genre trouve néanmoins son allure par la présence des pins parasols  dans le parc.    Hôtel de madame Chantal de Faletans","habitants":"Raymond Grimaud \r\n        \"","divers":"Château de Cornebarrieu, d'Alliez (Cédres) de Pontié, de Laran.","gps":"","images":["../../jctruffet.com/image/image_31/31_Cornebarrieu_1.jpg","../../jctruffet.com/image/image_31/31_Cornebarrieu_2.jpg","../../jctruffet.com/image/image_31/31_Cornebarrieu_3.jpg","../../jctruffet.com/image/image_31/31_Cornebarrieu_4.jpg","../../jctruffet.com/image/image_31/31_Cornebarrieu_5.jpg","../../jctruffet.com/image/image_31/31_Cornebarrieu_6.jpg"]},"Consult_chateau_formulaire100f":{"id":"Consult_chateau_formulaire100f","dept":"31","canton":"Portet-sur-Garonne","commune":"Portet-sur-Garonne","nom":"Creuse_31","type":"Château","periode":"XVI","histoire":"CREUSE, demeure du général Ritay, baron d'Empire, bâtie ou transformée vers 1585 par Guillaume Mestre.  Le Baron Jean-Marie Ritay, général d'Empire et maire de Portet-sur-Garonne de 1818 à 1821, revient en chair et en os les 16, 17 et 18 septembre prochains sur le festival MéditerranéO'! L'association Portet Jum'Accueil a travaillé pendant de nombreuses années à la recherche de tous documents officiels concernant la vie du général Ritay, figure emblématique de la ville. C'est en s'aidant de ces éléments, ordres de missions de Napoléon au supérieur du général Ritay, « La dernière bataille du général Ritay » , « Histoire d'un confluent » , ainsi que des archives privées du château de Creuse, son propriétaire actuel  Mr Jany.","architecture":"Le château de  Creuse,  façade à ordonnance classique de briques avec claveaux de pierres aux portes et aux fenêtres pour recevoir les charnières. Deux tourelles d'angles, en opposition, sont coiffées de toitures de type Renaissance archaïsant et reposent à la base sur un culot en forme de pilastre. Les murs des constructions latérales reprennent la technique traditionnelle des pays de plaine garonnaise, avec assises alternées de briques et de galets.","habitants":"Guillaume Mestre\r\n        \"","divers":"Château de Creuse à Portet sur Garonne","gps":"","images":["../../jctruffet.com/image/image_31/31_Creuse_31_1.jpg","../../jctruffet.com/image/image_31/31_Creuse_31_2.jpg","../../jctruffet.com/image/image_31/31_Creuse_31_3.jpg","../../jctruffet.com/image/image_31/31_Creuse_31_4.jpg"]},"Consult_chateau_formulaired073":{"id":"Consult_chateau_formulaired073","dept":"31","canton":"Revel","commune":"Caraman","nom":"Croisillat","type":"Château","periode":"XVII","histoire":"CROISILLAT, a   appartenu durant 5 siècles à la puissante famille de Villeneuve qui s'illustra par sa bravoure et son sens de l'honneur au côté des comtes de Toulouse et des Rois de France. Détruit au XVIe siècle lors des guerres de religion par les armées protestantes,  chambres d'hôtes est dirigée par Annick Brard.","architecture":"Le Château du Croisillat a été construit en 1472. Au XVIIe siècle,  le château est reconstruit après une période de troubles avec d'anciennes pierres, l'établissement dispose d'une architecture d'époque,  de plan en équerre deux corps de logis rectangulaires à deux niveaux flanqué sur l'angle d'une tour ronde toit en poivrière.  Remanié par la suite, son architecture est aujourd'hui le témoin des périodes de la  Renaissance du XIXe siècle avec une très belle chapelle classée monument historique. l'édifice est augmenté à l'ouest d'une tour, cantonnée d'une tourelle d'angle, ainsi que d'une chapelle sur un ancien pallier voûté. Au XVIIIe siècle, un grand logis est accolé au sud, la chapelle et les pièces sont redécorées. Le château est situé dans un vaste enclos, conservant des vestiges de fossé défensif taillé dans le roc et transformé, sans doute au XVIIIe siècle Son parc de 11 hectares, autrefois aménagé en Jardin à la Française, abrite des arbres centenaires et possède des bassins en terrasse.","habitants":"Famille de Villeneuve \r\n        \"","divers":"Château de Croisillat à Caraman","gps":"","images":["../../jctruffet.com/image/image_31/31_Croisillat_1.jpg","../../jctruffet.com/image/image_31/31_Croisillat_2.jpg","../../jctruffet.com/image/image_31/31_Croisillat_3.jpg","../../jctruffet.com/image/image_31/31_Croisillat_4.jpg","../../jctruffet.com/image/image_31/31_Croisillat_5.jpg","../../jctruffet.com/image/image_31/31_Croisillat_6.jpg","../../jctruffet.com/image/image_31/31_Croisillat_7.jpg"]},"Consult_chateau_formulairedbfc":{"id":"Consult_chateau_formulairedbfc","dept":"31","canton":"Tournefeuille","commune":"Cugnaux","nom":"Cugnaux","type":"Château","periode":"XVI","histoire":"Deux châteaux à Cugnaux Maurens et de Cassagnère.                           CASSAGNERE, Le château actuel de briques et pierres blanches a été construit en 1680 en une seule fois, par le baron Pierre de Papus, président du parlement du Languedoc et membre de l'académie des jeux Floraux. Du XVII au XIXe siècle, la culture de la vigne, du fait d'un terrain caillouteux, permettait à la population toulousaine de subvenir à ses besoins en vin. Classé monument historique depuis 1979, il appartient aujourd'hui à la famille Gourdou qui l'a rénové et en ouvre les portes lors des journées du patrimoine.                                                                                                                                          \r\nMAURENS  date du XVIe siècle. A cette époque, cétait un château féodal, entouré de plusieurs fermes. La culture de la vigne occupait alors plus de 30 hectares. En 1814, il devient la propriété de la famille de Boyer Montegut qui loccupe encore aujourdhui.   Le pavillon Louis XVI a été construit en 1779 pour Jacques Lacans, fermier général des gabelles. Il est situé dans lancienne ceinture viticole de Toulouse, le long dune route où les parlementaires de la seconde moitié du XVIIIe siècle achetaient des propriétés destinées à la construction.","architecture":"Cugnaux château de Maurens  date du XVIe siècle. A cette époque, cétait un château féodal, entouré de plusieurs fermes.\r\nLe château de la Cassagnère du XVIIIe siècle, classé monument historique.\r\nainsi que le pavillon Louis XVI et son parc.  Ce château est un bon exemple d'architecture de briques du XVIIIe siècle dans la région de Toulouse. Composé d'un corps de logis central flanqué de deux ailes de communs, il est typique des grandes habitations rurales de cette région. La sobriété des briques est rehaussée par l'emploi de pierres blanches.","habitants":"Famille Gourdou \r\n        \"","divers":"Château  de Maurens, de la Casagnère et de Loubayssens à Cugnaux","gps":"","images":["../../jctruffet.com/image/image_31/31_Cugnaux_1.jpg","../../jctruffet.com/image/image_31/31_Cugnaux_2.jpg","../../jctruffet.com/image/image_31/31_Cugnaux_3.jpg","../../jctruffet.com/image/image_31/31_Cugnaux_4.jpg","../../jctruffet.com/image/image_31/31_Cugnaux_5.jpg","../../jctruffet.com/image/image_31/31_Cugnaux_6.jpg","../../jctruffet.com/image/image_31/31_Cugnaux_7.jpg","../../jctruffet.com/image/image_31/31_Cugnaux_8.jpg"]},"Consult_chateau_formulaire221a":{"id":"Consult_chateau_formulaire221a","dept":"31","canton":"Fronton","commune":"Cépet","nom":"Cépet","type":"Château","periode":"XVII-XX","histoire":"CEPET,   qui a vu naître ses premières bâtisses en 1273, est fière d'un passé émaillé d'épisodes historiques. Après avoir appartenu à divers seigneurs locaux, le village devient la propriété des Varaignes à partir de 1778.   Cette riche famille édifie son château sur la place principale où se trouve toujours le four banal utilisé jadis par les villageois contre redevance. Aujourd'hui, sur Cépet et ses environs, on peut admirer de nombreux vestiges dont le porche de l'enceinte du château fort du XVIIe siècle et l'église Sainte-Foy du XIIe.\r\nLa région du Frontonnais est également riche d'empreintes historiques. Lors des guerres de religions, le village de Fronton devint un carrefour d'affrontements sur la route reliant Toulouse la catholique à Montauban la protestante : le château puis l'église sont alors détruits. Aujourd'hui, la vigne est devenue l'activité principale de la plus vaste commune du nord de la Haute-Garonne, Fronton ayant donné son nom à un cru éponyme très apprécié bien au-delà de la région, fruit d'un cépage unique nommé Négrette.","architecture":"Cépet de plan rectangulaire à deux niveaux à sept travées dont la centrale ne joue plus son rôle d'entrée mais à gardé son fronton triangulaire sur la toiture ainsi que les lucarnes à galbe triangulaire.","habitants":"Famille des Varaignes\r\n        \r\n        \"","divers":"Le château de Cépet","gps":"","images":["../../jctruffet.com/image/image_31/31_Cepet_1.jpg","../../jctruffet.com/image/image_31/31_Cepet_2.jpg"]},"Consult_chateau_formulaire2c9d":{"id":"Consult_chateau_formulaire2c9d","dept":"31","canton":"Toulouse","commune":"Toulouse","nom":"Cépière","type":"Château","periode":"XVII","histoire":"CEPIERE, s'élève aujourd'hui sur la ferme forte connue sous le nom de \"Bordo del Comte\", qui appartient aux comtes de Toulouse jusqu'à l'extinction de cette famille en 1271. Au XVe siècle, la métairie appartenait aux Goyrans  . Les terres passèrent ensuite entre les mains de plusieurs capitouls. Augier de la Cipière, dont la famille a donné son nom au château, en fut propriétaire dans la seconde moitié du XVIe siècle. Il fut ensuite acquis en 1588 par Pierre de Vignaux, riche marchand de pastel plusieurs fois capitoul. Au début du XVIIe siècle, le domaine fut transmis au capitoul Michel Bayard, cousin de Pierre de Vignaux, qui acheva la construction.  Il devient à partir de 1736 propriété de l'église.  L'édifice est vendu au titre de bien d'église à la Révolution et durant tout le XIXe siècle les propriétaires se succèdent. La famille du baron Sabatié-Garat, dont le château conserve la mémoire grâce au portail en fer forgé portant ses initiales, a conservé la belle demeure pendant plus de cinquante ans. Les héritiers vendent le château et le champ de course à la ville de Toulouse dans les années 1960 dans le cadre de la zup du Mirail, par l'intermédiaire de la Setomip. Le castel est alors laissé à l'abandon, jusqu'au rachat par le promoteur Bernard Cave, qui entreprend de restaurer le château sous la direction de l'architecte Dominique Alet.","architecture":"La Cépière au Moyen-Age, était une métairie du comte de Toulouse. En 1588, est construit le château actuel. L'ensemble est vendu à la Révolution comme bien de l'église. L'édifice est construit sur un plan en L, en briques. La façade côté Est, est agrémentée d'une tourelle et d'une ornementation en dentelle de staff au niveau du deuxième étage des fenêtres orientales. Le portail comporte une ornementation en fer forgé, décorée des initiales GS du baron Sabatié Garat, propriétaire au XIXe siècle. Près du château se trouve un pigeonnier de la même époque. Sa masse de briques roses fièrement dressée au bord de la rocade est agrémentée de belles fenêtres à meneaux qui témoignent de l'époque Renaissance.  la tour quadrangulaire nord-est pourrait dater de l'époque médiévale. Les vestiges d'une tourelle gothique polygonale repérés dans l'actuelle tourelle pourraient aller dans ce sens.   Les fenêtres à meneaux et l'escalier à rampes droites à l'intérieur du château datent de la seconde moitié du XVIe siècle. On lui doit la construction de la tourelle et de la façade sud, dont la superposition d'une fenêtre couronnée par un fronton cintré et d'une autre surmontée par un fronton triangulaire évoque un style Louis XIII.  La tour a perdu son crénelage et les fenêtres ont été modifiées ou déplacées. Aujourd'hui une copropriété. Deux constructions neuves ont été réalisées en contrepoint de l'aile nord du château et les anciennes écuries ont été entièrement remaniées.","habitants":"Famille du baron Sabatié-Garat\r\n        \r\n        \"","divers":"Château de Cépière","gps":"","images":["../../jctruffet.com/image/image_31/31_Cepiere_1.jpg","../../jctruffet.com/image/image_31/31_Cepiere_2.jpg","../../jctruffet.com/image/image_31/31_Cepiere_3.jpg","../../jctruffet.com/image/image_31/31_Cepiere_4.jpg"]},"Consult_chateau_formulaire2ca1":{"id":"Consult_chateau_formulaire2ca1","dept":"31","canton":"Pechbonnieu","commune":"Villariès","nom":"De_Jean","type":"Château","periode":"XVII","histoire":"DE JEAN, vers 1559, la famille De Jean acquiert le château. Le reconstructeur est Jean De Jean, procureur au sénéchal de Toulouse en 1604, on lui doit la majeure partie de la construction actuelle, après 1621, ainsi que celle du Vivier mentionné à plusieurs reprises dans les textes. En 1754, le château est racheté par un riche négociant, Jean Toulza qui fait procéder à de nombreux aménagements et agrandissements : terrasse, percements des façades, ailes latérales et chapelle, décoration intérieure, les travaux de gypseries sont datés de 1787.","architecture":"De Jean a  été construit sur l'emplacement d'un ancien château fort détruit en 1570 au cours des guerres de religion, le château actuel a été réédifié au début du XVIIe siècle avec un caractère défensif, puis largement repris au XVIIIe siècle pour en faire une demeure de plaisance. Le château des \"De Jean\" comporte  un corps de logis central, quadrilatère cantonné par 4 tours d'angle à encorbellement, dotées à leurs bases de meurtrières défensives,  deux ailes latérales symétriques de communs et à l'extrémité de l'aile Nord, l'ancienne chapelle. Le bâtiment du XVIIe siècle est construit sur des caves voûtées. Il est précédé au midi d'une terrasse aménagée au XVIIIe siècle. Les quatre tours d'angle sont voûtées au rez-de-chaussée.  De cette époque, date la décoration intérieure : cage d'escalier,  de belles gypseries dans le salon des Arts-Libéraux et du négoce au premier étage. Les façades arrières ont été moins retouchées. Dans le prolongement du commun Est a été édifiée la chapelle par Jean Toulza qui s'y fit enterrer. Elle comporte un gracieux fronton intérieur exécuté en gypseries représentant des anges musiciens.","habitants":"Famille De Jean\r\n        \"","divers":"Château de De-Jean à Villariès","gps":"","images":["../../jctruffet.com/image/image_31/31_De_Jean_1.jpg","../../jctruffet.com/image/image_31/31_De_Jean_2.jpg","../../jctruffet.com/image/image_31/31_De_Jean_3.jpg"]},"Consult_chateau_formulaire5111":{"id":"Consult_chateau_formulaire5111","dept":"31","canton":"Pechbonnieu","commune":"Gragnague","nom":"Degrés","type":"Château","periode":"XVIII","histoire":"DEGRES, ce superbe château reconstruit au XVIIIe siècle par le  comte Jean-Baptiste de Bernard de Seigneurens, seigneur direct de Lastens et Pugnères né en 1770 à Pugnères, fils du comte Jean Joseph de Bernard de Seigneurens, seigneur de Moulinac  et de demoiselle Marie de Nohic.    Il épouse demoiselle Elisabeth Joséphine de Virvent de Rouaix. Capitaine de dragons à l'époque des levées en masse.  Rentrant d'Italie, étant souffrant en 1814, il fut nommé inspecteur des vivres des hôpitaux et des armées d'Italie.   Maire de Gragnague en 1820 -1825, il conserva ces fonctions d'adjoint au maire et conseiller municipal jusqu'en 1832, malgré son refus en 1830 de prêter serment à Louis Philippe, roi. Il vendit le château de Degrés  à la famille Bazelaire de Boucheporn,ils eurent six enfants 4 garçons et 2 filles dont le représentant le plus célèbre est le général qui défendit  la rive gauche de la Meuse au cours de la bataille de Verdun, en 1916   sa femme décéda le 14 juillet 1830. Il décéda le 30 août 1856 à Toulouse. Aujourd'hui chambres d'hôtes.","architecture":"Degrés  le château abrite des chambres dhôtes. Le site du château Degrés était occupé,depuis le Moyen-Age, par une église dédiée à Saint Sernin et par son cimetière. Le château a été reconstruit en 1767 et a conservé son architecture de lépoque, de plan en U,  corps de logis rectangulaire à deux niveaux avec série d'occulus sous toit en croupe flanqués de deux tours   aux deux angles de la façade côté parc, retour en équerre par deux pavillons de même niveaux et même toiture,   il domine la vallée sur la rive droite du Girou,  l'église et le cimetière ont eux été détruits lors de la Révolution Française. Le parc dagrément du château, composé darbres remarquables est inscrit à linventaire général du patrimoine culturel. Une splendide allée de plus de 60 pins parasols sétire sur la crête de la colline.","habitants":"Comte Jean Baptiste de Bernard de Seigneurens\r\n        \r\n        \"","divers":"Château de Degrés à Gragnagues","gps":"","images":["../../jctruffet.com/image/image_31/31_Degres_1.jpg","../../jctruffet.com/image/image_31/31_Degres_2.jpg","../../jctruffet.com/image/image_31/31_Degres_3.jpg","../../jctruffet.com/image/image_31/31_Degres_4.jpg","../../jctruffet.com/image/image_31/31_Degres_5.jpg","../../jctruffet.com/image/image_31/31_Degres_6.jpg","../../jctruffet.com/image/image_31/31_Degres_7.jpg"]},"Consult_chateau_formulairecbb9":{"id":"Consult_chateau_formulairecbb9","dept":"31","canton":"Saint-Lys","commune":"Empeaux","nom":"Empeaux","type":"Château","periode":"XVI","histoire":"EMPEAUX   de la moitié du XIXe siècle par le bijoutier toulousain  Lautier. \r\nles Lambes et la moitié de Saiguède constituent une baronnie dont le centre et le château se fixent à Empeaux. Les barons sont les Cathalas, conseillers du rois, puis les Doujat qui possèdent 115 hectares de terres. Le hameau de la Rivière, au nord, regroupe les maisons des brassiers.   Le château, privé, fut construit à la fin du XVIe siècle par les Lambes, il devient par la suite la demeure de la famille italienne Cathala (ou Catellan).\r\nFrançois Cathala est d'ailleurs en 1607 seigneur d'Empeaux et de Lamasquère. Plus tard ce château sera occupé par la famille Doujat. Jean Doujat est célèbre pour son esprit et mainteneur des jeux floraux. Il entre à l'Académie Française en 1650. Henri-Joseph Doujat, fils du baron d'Empeaux et de Claire le Comte, dame de Saiguède, est officier et seigneur d'Empeaux pendant la Révolution.","architecture":"Le village primitif d'Empeaux est sans doute situé à Lambes où se trouve le castrum d'une ancienne famille noble. L'agglomération actuelle semble résulter d'un déplacement de la fin du XVe siècle. Le château en briques cuites est construit fin du XVIe et est remanié dans le goût médiéval de Viollet-le-Duc de la moitié du  XIXe siècle, corps de logis rectangulaire à trois niveaux flanqués côté entrée de deux échauguettes  en encorbellement sur angles et  côté parc  deux grosses tours carrées.","habitants":"Famille Lautier\r\n        \"","divers":"Château d'Empeaux","gps":"","images":["../../jctruffet.com/image/image_31/31_Empeaux_1.jpg","../../jctruffet.com/image/image_31/31_Empeaux_2.jpg"]},"Consult_chateau_formulaireb236":{"id":"Consult_chateau_formulaireb236","dept":"31","canton":"Escalquens","commune":"Espanès","nom":"Espanès","type":"Château","periode":"XV","histoire":"ESPANES château dit des Pasteliers, avant dentrer dans le domaine royal, Espanès appartenait à la famille dEspagne dont un membre lui a légué son nom.  Pillée par les Hugenots en 1590, la commune se reconstruit autour du château, grâce au pastel  et à lagriculture céréalière.  Il a été construit vers 1560  par l'architecte D. Bachelier. Son commanditaire serait Pierre Delpuech, capitoul en 1 554 et riche marchand ayant bâti sa fortune sur le commerce du pastel. On accède par un pont de briques à une cour intérieure très protégée qui concentre toutes les ouvertures, au milieu de cette construction en U, flanquée de 4 tours, entourée de douves sèches.\r\nAujourdhui, la commune d'Espanès se développe en préservant son caractère rural.","architecture":"Les communs du château sont constitués de trois bâtiments en briques, disposés en U, délimitant une cour répondant à celle du château. Le pigeonnier, de la fin du XVIe ou début du XVIIe siècle, est construit sur huit arcades en pleine pente, des socles rattrapant la dénivellation. De cet ouvrage ne subsistent que les arcades et la base du corps, la toiture s'étant écroulée en 1936 et la maçonnerie ayant été démolie pour récupérer les matériaux. Dans le dénombrement du château en 1639 est attesté un moulin à vent banal, il reste la tour, haute d'environ six mètres, à un étage, en maçonnerie de brique. Deux escaliers tournants extérieurs, desservent le rez-de-chaussée surélevé, témoignant de l'existence de deux coupes de meules.  On accède par un pont de briques à une cour intérieure très protégée qui concentre toutes les ouvertures, au milieu de cette construction en U, flanquée de 4 tours, entourée de douves sèches.","habitants":"Famille de Pierre Delpuech\r\n        \r\n        \"","divers":"Château du Pasteliers à Espanès","gps":"","images":["../../jctruffet.com/image/image_31/31_Espanes_1.jpg","../../jctruffet.com/image/image_31/31_Espanes_2.jpg","../../jctruffet.com/image/image_31/31_Espanes_3.jpg"]},"Consult_chateau_formulaire04f8":{"id":"Consult_chateau_formulaire04f8","dept":"31","canton":"Revel","commune":"Falga","nom":"Falga","type":"Château","periode":"XV","histoire":"Deux château à Falga celui de Falga hôtel  de la famille de Roquemaurel.                                                                              FALGA, le territoire appartenait au seigneur Deaussens et la commune, en 1384, avait deux consuls qui ont été cités dans un répertoire de la « Recette en Lauragais dun subside levé par Charles VI ». Le château, acquis en 1681, par Philippe de Caffarelli, avocat au parlement de Toulouse et contrôleur du canal du midi.   Louis Marie de Caffarelli du Falga, dit Maximilien Caffarelli (1756-1799), général de brigade de la Révolution ; Charles Ambroise de Caffarelli du Falga (1758-1826), chanoine puis préfet sous l'Empire ; Louis Marie Joseph Caffarelli du Falga (1760-1845), dit Joseph Caffarelli, premier préfet maritime de Brest ; Jean-Baptiste de Caffarelli du Falga (1763-1815), évêque de Saint-Brieuc ; Marie François Auguste de Caffarelli du Falga (1766-1849), général de division français.   Louis-Marie-Joseph-Maximilien, appelé Max, ami de Bonaparte avec lequel il fit la campagne dEgypte. Blessé à une jambe, amputé, il continuera le combat et sera tué devant Saint-Jean dAcre en 1798. Son nom est gravé sur lArc de Triomphe à Paris. Son buste est présenté à lEcole Royale de Soréze où il fut élève, ainsi quà la Salle des Illustres du Capitole de Toulouse. Charles-Ambroise, né au Falga le 15 Janvier 1758, chanoine de Toul, approuve la constitution civile du clergé et devient curé constitutionnel à Maurens en 1790. Plus tard, il fut  préfet à trois reprises, destitué, emprisonné en 1793 par le comité de surveillance de Saint­Félix ainsi que ses deux surs Sophie et Henriette, les deux benjamines, pour pratique constante de charité. Il est titré baron dempire, puis comte de Cafarelli sous la Restauration. Le parrain est Melchior Guiraud descendant des Caffarelli et maire de la commune, et la marraine, Anne Poux. Ses descendants vivent toujours au château.","architecture":"Lez château de Falga de plan rectangulaire à trois niveaux toitures  en croupes de tuiles flanqué de tours carrées en angles des XVIIe et XVIIIe siècle dont une sert de donjon  à toit à l'impérial, retour en équerre sur la droite de dépendance d'un étage.","habitants":"FamillePhilippe de Caffarelli\r\n        \"","divers":"Château de Falga","gps":"","images":["../../jctruffet.com/image/image_31/31_Falga_1.jpg","../../jctruffet.com/image/image_31/31_Falga_2.jpg","../../jctruffet.com/image/image_31/31_Falga_3.jpg","../../jctruffet.com/image/image_31/31_Falga_4.jpg","../../jctruffet.com/image/image_31/31_Falga_5.jpg"]},"Consult_chateau_formulaireedfc":{"id":"Consult_chateau_formulaireedfc","dept":"31","canton":"Villemur sur Tarn","commune":"Layrac","nom":"Felzins_Layrac","type":"Château","periode":"XVI","histoire":"FELZINS  une branche des Chambon de la Barthe se rencontre sur Layrac et Bondigoux à la fin du XVIe siècle  et au début du XVIIe siècle. Pierre de Chambon est désigné comme  sieur de la générale. La famille Dufau de Felzins possède le château de Layrac mais Les Dufau de Felzins résidèrent dans leur hôtel à Toulouse acheté en 1794   à Raymond  Dumas procureur au parlement dont la fille  Marie-Thérèse-Sophie épouse Louis Dufau de Felzin  après la Révolution. Parmi la famille de Layrac on relève plusieurs personnes. Raymond Dufau baron de Felzins réside à Toulouse fondateur et président de la caisse d'épargne de Toulouse décéde au château de Layrac en octobre 1913.","architecture":"Felzins  quadrilatère dont les corps de logis latéraux sont à deux niveaux, la partie d'entrée à un niveau et attiques avec pavillon d'entrée avec tour carrée à fenêtre jumelé.","habitants":"Famille Dufau de Felzins\r\n        \"","divers":"Château de Felzins à Layrac","gps":"","images":["../../jctruffet.com/image/image_31/31_Felzins_Layrac_1.jpg","../../jctruffet.com/image/image_31/31_Felzins_Layrac_2.jpg","../../jctruffet.com/image/image_31/31_Felzins_Layrac_3.jpg","../../jctruffet.com/image/image_31/31_Felzins_Layrac_4.jpg"]},"Consult_chateau_formulairecbe8":{"id":"Consult_chateau_formulairecbe8","dept":"31","canton":"Castelginest","commune":"Fonbeauzard","nom":"Fonbeauzard","type":"Château","periode":"XVII","histoire":"FONBEAUZARD,  en 1318, Aldric Maurand, capitoul, est seigneur de Valségur et Bordeneuve, métairie située à l'emplacement de notre actuel quartier des Cèdres. Du XIIIe siècle au XVe siècle, plusieurs propriétaires se succèdent. En 1463, Louis Du Bourg, seigneur de Clairac et également capitoul, acquiert de Pierre Azémar un château appelé Fonbeauzard assis en la seigneurie de Saint-Loup, une borde appelée Bordeneuve et une autre appelée Valségur, ce qui correspond à peu près aux trois quartiers de notre village, désormais bien identifiés : le Grand Fonbeauzard aujourd'hui Fonbeauzard Le Vieux, le Petit Fonbeauzard  car a l'époque le moins peuplé et Clairefontaine. Le nom de notre village apparaît donc  au milieu du XVe siècle : il est né autour d'une petite place forte avancée dans la plaine. Profitant de cette période de relative prospérité le conseiller au parlement Philippe André de Forest fait bâtir sous le règne de Louis XIII, un château avec des dépendances, et organise un jardin très élaboré pour l'époque qu'il clôt de murailles. C'est sans doute de là que vient le nom du quartier de l'Enclos, à l'Est de notre village. Son fils Etienne est capitoul en 1656, son petit-fils maréchal de camp dans l'armée de Louis XIV. En 1732, terres et seigneurie sont vendues à Jean-Etienne de Malaret, parlementaire lui aussi et originaire de Verfeil : elles seront érigées en baronnie par Louis XV dès 1738.    C'est à cette époque que le quartier du Mariel,  sur Saint-Alban, est rattaché à Fonbeauzard, à partir de 1847,  construit pour Camille de Malaret.","architecture":"Fonbeauzard en briques sur caves voûtées construit au début de XVIIe siècle, possède un parc du XVIIIe siècle réaménagé au XIXe siècle.  Communs construits entre 1820 et 1827 en tant que ferme modèle comprenant four à pain chai, pigeonnier, poulailler ainsi qu'une ancienne noria. Dans divers actes notariés du XVlle siècle, on trouve des baux à ferme passés avec les métayers du château.","habitants":"Famille de Philippe André de Forest\r\n        \"","divers":"Château de Fonbeauzard et l'oratoire","gps":"","images":["../../jctruffet.com/image/image_31/31_Fonbeauzard_1.jpg","../../jctruffet.com/image/image_31/31_Fonbeauzard_2.jpg"]},"Consult_chateau_formulaire79c3":{"id":"Consult_chateau_formulaire79c3","dept":"31","canton":"Toulouse_10","commune":"Quint_Fonségrives","nom":"Fonségrives","type":"Château","periode":"XVI","histoire":"FONSEGRIVES, pas d'information sur le château de Fonsegrives.                                 En 1866 est construite la première Mairie-Ecole, à Quint.\r\nEn 1937, le Maire Jean-Marie Fériol, sur les plans de lArchitecte Gillet, fait construire la nouvelle mairie-école à Fonsegrives à lemplacement de la Mairie actuelle. Lécole est alors installée au rez-de-chaussée, la mairie au premier étage. Pendant longtemps, le cur historique de la commune fut le hameau de Quint situé à 2 km de la mairie, en direction de l'est. Après la Seconde Guerre mondiale, le centre de gravité de la commune s'est déplacé vers le hameau de Fonsegrives, plus à l'ouest, qui a pris de l'importance en raison de sa proximité de Toulouse.","architecture":"Le château de plan rectangulaire à trois niveaux avec double bandeaux, toit en croupe avec lucarnes en parties centrale des deux grandes faces, flanqué de tours rondes toit en poivrière.","habitants":"Seigneur local\r\n        \r\n        \"","divers":"Château de Fonségrives à Quint-Fonségrives","gps":"","images":["../../jctruffet.com/image/image_31/31_Fonsegrives_1.jpg","../../jctruffet.com/image/image_31/31_Fonsegrives_2.jpg","../../jctruffet.com/image/image_31/31_Fonsegrives_3.jpg","../../jctruffet.com/image/image_31/31_Fonsegrives_4.jpg","../../jctruffet.com/image/image_31/31_Fonsegrives_5.jpg","../../jctruffet.com/image/image_31/31_Fonsegrives_6.jpg"]},"Consult_chateau_formulairef3d8-2":{"id":"Consult_chateau_formulairef3d8-2","dept":"31","canton":"Saint-Lys","commune":"Fontenilles","nom":"Fontenilles","type":"Château","periode":"XIX","histoire":"Deux châteaux à Fontenilles celui de Lalanne et de  Cammartin du XIXe siècle. FONTENILLES, la baronnie de Fontenilles, dame célèbre par sa beauté et son instruction, sera l'une des gloires de son époque qui donnera un grand lustre à la maison fontenilloise (hôtel « Belle Paule »  à Toulouse.  Exilés en 1793, les seigneurs de la Roche reviendront en France et sinstalleront en Picardie  au château de Rambures. Dès leur retour ils accableront les différentes municipalités de procès qui seront les faits marquants de la commune au XIXe siècle. De cette noblesse, il ne reste quune pierre tombale en marbre gris dans léglise Saint Martin.                                                                                       CAMMARTIN usine à chaussures.                                                                                 LALANNE chambres d'hôtes.","architecture":"Cammartin de plan rectangulaire à deux niveaux et lucarnes sur toit, accolé d'un pavillon en retour d'équerre à deux niveaux et lucarne accolé d'une tour mis hors uvres à toit polygonal, à l'opposé tourelles carrées à toit pointu.                                                                                                                                    Lalanne, de plan rectangulaire à deux niveaux avec terrasse.","habitants":"La baronnie de Fontenilles\r\n        \"","divers":"Château de Cammartin et de Lalanne à Fontenilles","gps":"","images":["../../jctruffet.com/image/image_31/31_Fontenilles_1.jpg","../../jctruffet.com/image/image_31/31_Fontenilles_2.jpg"]},"Consult_chateau_formulaire7e4e":{"id":"Consult_chateau_formulaire7e4e","dept":"31","canton":"Escalquens","commune":"Fourquevaux","nom":"Fourquevaux","type":"Château","periode":"XVI-XVIII","histoire":"Deux châteaux à Fourquevaux celui de Fourquevaux du XVIe siècle  et de Catellan du XVIIIe et XIXe siècle.                                                                     FOURQUEVAUX, le château a appartenu à la famille Beccaria de Pavie, dont l'un des membres fut ambassadeur de Catherine de Médicis. Jean de Beccaria de Pavie épousa Jeanne Ysalquier de Fourquevaux en 1466 et acheta le château qui resta  depuis des siècles dans la même famille. Par successions dans des grandes familles tel que le marquis de la Barthe, les vicomtes de Castelbajac, les comtes de Saint-Roman. Le château fut agrandi au XVIe siècle par  Nicolas Bachelier qui édifie un château de plan carré dont on peut admirer encore l'imposante façade nord.  Il est la propriété du baron Robert de Gary de 1866 à 1951, plusieurs fois ministre et président du conseil, et maire de Fourquevaux.  Le pilote Pierre de Serres de Saint-Roman, châtelain de Fourquevaux, tenta en mai 1927 la traversée de l'Atlantique sans escale ; malheureusement, l'avion s'abîma en mer et les trois membres de l'équipage périrent. Il date de l'époque féodale mais n'a pas perdu de sa prestance.Il fut aménagé par de nombreux écrivains et artistes.                                                                                                                        CATELAN  château Catelan, reconstruit au XIXe siècle, et porte le nom de Jean-Paul Laurens.","architecture":"Fourquevaux vaste demeure féodale est construit à partir d'un château à deux tours du XVIIIe siècle. Ce château en briques et pierres date de la fin du XVe siècle ou du début du XVIIe siècle. Une tour en encorbellement se trouve à son angle nord-ouest. Orangerie : quatrième quart du XVIIIe siècle. La partie ancienne, dont il ne subsiste que l'aile centrale, est située au nord, et présente un rez de chaussée à arcades sur la cour intérieure et un étage. L'orangerie ne possède qu'un niveau et s'orne de frontons, pilastres ioniques. Une balustrade surmontée de pots à feu relie les frontons. A l'intérieur, éléments de décoration Empire.\r\nL'église Saint-Germier est l'ancienne chapelle du château, auquel elle est adossée. Le caractère du village, tout de brique rose, lui est donné par son unité architecturale. C
