const FULL={"Consult_chateau_formulairee0dd":{"id":"Consult_chateau_formulairee0dd","dept":"31","canton":"Escalquens","commune":"Ste-Foy d","nom":"Aigrefeuille_31","type":"Château","periode":"XVIII","histoire":"AIGREFEUILLE, en 1342 un certain Guillaume Hunaud de Lanta se voit confier la basse justice de la seigneurie prérogative confirmée par un dénombrement de 1389 qui précise quelle est détenue par Bernard Raymond de Lanta. En 1444, la seigneurie appartient à Pierre de Roquette. Puis lessentiel de la seigneurie fût détenue par la famille Rigaud du XVe au XVIe siècle c'est un château bâti à Aigrefeuille. En 1609, Jeanne de Chalvet, veuve de Lauzergie, détient toute la juridiction dAigrefeuille devenue consulat depuis 1438. La seigneurie est achetée en 1610 par Pierre de Caumels, avocat au Parlement de Toulouse ; un siècle plus tard, elle est la propriété de la famille Chambon avant de faire partie du patrimoine des frères Pêcheurs de Toulouse en 1741.","architecture":"Aigrefeuille, un château de pierres et de briques bâti au XVIII siècle à lemplacement de lancien château seigneurial, de plan rectangulaire à deux niveaux, toit en croupes.\r\nLe domaine de Ronsac chambres d'hôtes  par la famille de Montsarrat                                                                                           Les maisons de maître des familles Sipière, Grailhe et Baric fières et altières dans leur appareil de briques.","habitants":"Famille Chambon\r\n        \r\n        \r\n        \"","divers":"Château d'Aigrefeuille et de Ronsac","gps":"","images":["../../jctruffet.com/image/image_31/31_Aigrefeuille_31_1.jpg","../../jctruffet.com/image/image_31/31_Aigrefeuille_31_2.jpg","../../jctruffet.com/image/image_31/31_Aigrefeuille_31_3.jpg","../../jctruffet.com/image/image_31/31_Aigrefeuille_31_4.jpg","../../jctruffet.com/image/image_31/31_Aigrefeuille_31_5.jpg"]},"Consult_chateau_formulaireb8db":{"id":"Consult_chateau_formulaireb8db","dept":"31","canton":"Cazères","commune":"Alan","nom":"Alan","type":"Palais","periode":"XV","histoire":"ALAN, village d'Alan qui fut une résidence des évêques de Comminges, à la fin du XVe siècle, l'évêque Jean de Foix de Grailly transforma sa demeure en un fastueux palais décoré de fresques, disparues pour la plupart ; Amateur d'art, il fit aussi réaliser en 1492, par Pierre de Lanouhe, un précieux missel enluminé. Au XVIIe et  XVIIIe siècles, les évêques qui y résidèrent apportèrent au palais des transformations, embellissements et remises au goût du jour mais à la Révolution l'édifice fut divisé et vendu comme bien national. En 1912 la célèbre vache, menacée d'être vendue à un amateur d'art étranger et exportée, fut défendue et sauvée par les habitants d'Alan. Un palais endormi, oublié de tous, la vaste bâtisse tomba peu à peu en ruine : jusqu'en 1969, où un ténor d'opéra, Richard Gailland, avec l'aide d'amis passionnés, entreprit courageusement le sauvetage architectural du palais ; depuis 1998, deux artistes photographes, Yuri Lewinski et Mayotte Magnus, poursuivent la restauration avec passion et originalité pour en faire un lieu vivant et culturel.","architecture":"Sur la place du village où se trouve léglise, une grille donne accès au palais des évêques, tour-escalier du XVe siècle. dont la porte de style gothique flamboyant est ornée dune vache, « la vache dAlan », que les villageois en 1912 ont préservé dun démontage vers létranger.  La vache d'Alan est le nom donné au Palais épiscopal; la tour octogonale abritant un escalier à vis est un chef d'uvre de l'art gothique flamboyant, avec son tympan orné d'une vache monumentale sculptée fut classé M.H.","habitants":"Evêque Jean de Foix de Grailly\r\n        \r\n        \"","divers":"Le palais épiscopal d'Alan","gps":"","images":["../../jctruffet.com/image/image_31/31_Alan_1.jpg","../../jctruffet.com/image/image_31/31_Alan_2.jpg","../../jctruffet.com/image/image_31/31_Alan_3.jpg","../../jctruffet.com/image/image_31/31_Alan_4.jpg","../../jctruffet.com/image/image_31/31_Alan_5.jpg"]},"Consult_chateau_formulairedd29":{"id":"Consult_chateau_formulairedd29","dept":"31","canton":"Bagnères de Luchon","commune":"Arbas","nom":"Arbas","type":"Gentilhommière","periode":"XVI","histoire":"ARBAS, gentilhommière transformée en gîtes de France par Geneviève Michel, pas d'information historique.","architecture":"Gentilhommière composé  de plan d'équerre avec un corps de logis rectangulaire à deux niveaux  flanqué d'une tour carrée à trois niveaux.","habitants":"Geneviève Michel\r\n        \r\n        \"","divers":"Gentilhommière d'Arbas","gps":"","images":["../../jctruffet.com/image/image_31/31_Arbas_1.jpg","../../jctruffet.com/image/image_31/31_Arbas_2.jpg","../../jctruffet.com/image/image_31/31_Arbas_3.jpg","../../jctruffet.com/image/image_31/31_Arbas_4.jpg"]},"Consult_chateau_formulairedb76":{"id":"Consult_chateau_formulairedb76","dept":"31","canton":"Toulouse","commune":"Toulouse","nom":"Assézat_Bembert","type":"Hôtel-Palais","periode":"XVI","histoire":"ASSEZAT, on doit ce magnifique palais hôtel particulier à un riche marchand, Pierre d'Assézat qui fit fortune grâce au commerce du pastel au XVIe siècle. Situé à peu de distance de la place Esquirol à Toulouse dans la Haute-Garonne. Derrière un monumental portail en bois se cache une cour intérieure, rénovée en 1993. Il abrite le musée de la Fondation Bemberg qui présente une collection d'art, notamment de peinture, du XVe au début du XXe siècle. Il est classé monument historique depuis 1914.","architecture":"Afin d'établir sa puissance, il confia la construction à l'un des plus fameux architectes toulousains, Nicolas Bachelier et la construction débuta en 1555. La cour est réalisée en brique mais le décor est en pierre créant ainsi un effet esthétique. Deux des côtés de la cour comportent une élévation à trois niveaux superposant les trois ordres classiques (ordre ionique, dorique et  corinthien) ; elle reprend la hiérarchie des ordres établi par le traité de Serlio. L'imposante tour d'escalier située à l'angle s'élève suffisamment haut pour être visible au loin. Avec la loggia, on retrouve tous les éléments qui composent un hôtel particulier de l'époque Renaissance. Il s'agit, avec le château de Caumont, également construit par Nicolas Bachelier en 1535 et la Cour Carrée du Louvre construite par Pierre Lescot à partir de 1546, d'une des premières manifestations du classicisme français.","habitants":"Pierre d'Assézat \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Palais musée d'Assézat-Bembert à Toulouse","gps":"","images":["../../jctruffet.com/image/image_31/31_Assezat_Bembert_1.jpg","../../jctruffet.com/image/image_31/31_Assezat_Bembert_2.jpg","../../jctruffet.com/image/image_31/31_Assezat_Bembert_3.jpg","../../jctruffet.com/image/image_31/31_Assezat_Bembert_4.jpg","../../jctruffet.com/image/image_31/31_Assezat_Bembert_5.jpg","../../jctruffet.com/image/image_31/31_Assezat_Bembert_6.jpg"]},"Consult_chateau_formulaire05cd-2":{"id":"Consult_chateau_formulaire05cd-2","dept":"31","canton":"Carèzes","commune":"Aurignac","nom":"Aurignac","type":"Château","periode":"XIII","histoire":"AURIGNAC, le château fut bâti vers 1230-1240 par Bernard V, comte de Comminges qui l'avait reçu en héritage. En 1336 la seigneurie dAurignac dépendait encore de la châtellenie de Saint-Marcet. Elle deviendra elle-même lune des huit  châtellenies possédées par les puissants comtes de Comminges. Ces derniers ny résidaient guère, un capitaine châtelain, gouverneur de la ville  le représentait et y habitait avec une garde de 5 à 6 hommes. La châtellenie sera rattachée en 1554 à la couronne royale avec tout le comté de Comminges. En 1583 le château, occupé par une bande de voleurs qui rançonnaient les habitants, faillit être démoli par décision des consuls du conseil de Communauté. En 1627, De Puiségur,  vice-sénéchal dArmagnac en mission pour le roi Louis XII trouve le château réduit à létat de murailles, les toitures sétant effondrées. Le château sera plusieurs fois sauvé de la ruine. La châtellenie subsista sous une forme purement honorifique jusquà la Révolution.","architecture":"Le château comtal et son donjon, situé au sommet dun éperon rocheux à 404 m daltitude,  construit dans les années 1230, il est le dernier rempart des trois enceintes qui protègent le village,  dans la construction adossée au donjon, la salle la plus basse devait servir de prison. Une trappe au plafond donnait sur la chapelle et permettait aux prisonniers dentendre la messe. Entouré dépais murs, le château se présente sous la forme dune enceinte rectangulaire. Les remparts sont renforcés de quatre tours dangle cylindriques pleines et autrefois couronnées de créneaux. Aujourdhui on distingue:  la grande cour : les piétons y entraient par une porte voûtée en haut dun petit escalier, laccès au nord-ouest permettait le passage des chevaux et voitures.\r\nla petite cour   renfermait des habitations accolées dans langle des remparts nord-est et sud-ouest, le logement du comte:  on y accède par une porte en plein cintre roman aménagée dans le mur sud, on peut encore voir lemplacement de deux cheminées. la chapelle: dans le mur nord-est, accolée au donjon, se trouvait la chapelle réservée au châtelain\r\nla prison : accolée au donjon et sous la chapelle, sa voûte était percée dune ouverture carrée munie dune trappe, le donjon : tour de guet non couverte, restaurée, de 18 mètres de haut, comprenant 3 salles superposées. On y accède par un escalier extérieur et par la porte dorigine. On monte au sommet par un étroit escalier en spirale construit dans lépaisseur des murs entre deux tours concentriques.","habitants":"Comte Bernard V\r\n        \r\n        \r\n        \"","divers":"Vestiges du château d'Aurignac","gps":"","images":["../../jctruffet.com/image/image_31/31_Aurignac_1.jpg","../../jctruffet.com/image/image_31/31_Aurignac_2.jpg","../../jctruffet.com/image/image_31/31_Aurignac_3.jpg","../../jctruffet.com/image/image_31/31_Aurignac_4.jpg","../../jctruffet.com/image/image_31/31_Aurignac_5.jpg","../../jctruffet.com/image/image_31/31_Aurignac_6.jpg"]},"Consult_chateau_formulaireb14e":{"id":"Consult_chateau_formulaireb14e","dept":"31","canton":"Castanet-Tolosan","commune":"Cintegabelle","nom":"Auterive","type":"Château","periode":"XIII","histoire":"Quatre chateaux à Auterive celui de Secourieu hôtel de Ville, celui d'Ampouillac et celui de Mousens et Vernière viticole dont je n'ai pas d'information historique.  de Labaury, le manoir de Lagarde et de Bouyssou.                                                                       CINTEGABELLE, le château fort fut  en possession des comtes de Carcassonne et de Foix. En 1244, Raimond VII, comte de Toulouse, acquiert le château et crée une bastide quil fait administrer par un bayle. En 1271, le Comté de Toulouse est annexé au domaine royal et Cintegabelle devient châtellenie royale avec à sa tête un capitaine châtelain.                                                                                                                                   SECOURIEU,  en 1244, Raimond VII, comte de Toulouse, acquiert le château et crée une bastide quil fait administrer par un bayle. En 1271, le comté de Toulouse est annexé au domaine royal et Cintegabelle.  En 1632, sur ordre de Richelieu, les remparts sont abattus.  Bertrand Clauzel, natif de Mirepoix, général de la République à 26 ans. Aujourd'hui château de madame de Bastoul.                                                                                                AMPOUILLAC, le baron de la Tombelle, propriétaire du château, meurt assassiné par son valet en 1873.  Le propriétaire des lieux est  Alcide Cauvet, né à Sigean  en 1824, demeurant à Toulouse, dans le même temps conseiller général du canton de Cintegabelle où se situe le château. Pour mémoire, après le décès d'Alcide Cauvet en 1911, devient le siège de l'Association amicale des anciens élèves des Arts et Manufactures. Longtemps plus tard décède à Cintegabelle Paul Astorg (1878-1946), qui fut pour sa part chimiste,                                                                                                                                       LAGARDE,   Sire Nicolas Lagarde fut consul en 1518. Son fils consul en 1547 jouissait des revenus importants que lui rapportaient terres et immeubles. Durant les générations suivantes, les Lagarde vont disperser leur riche héritage au XVIIe siècle. Pour éponger les dettes de la famille, Madeleine Lagarde cédera le domaine à Jean Roger de Foix au XVIIIe siècle.                                      BOUYSSOU,    le manoir appartint à la famille Tissandier, riches bourgeois toulousains qui le vendirent aux Goty en 1650.","architecture":"A Cintegabelle le  fort de Montmerle du Xe et XIVe siècle sétablit le système féodal. Une tour sélève au flanc du coteau et surveille lentrée dAriège avec pont-levis. Un lourd portail de fer, la porte souvre sur lenceinte fortifiée. Les murailles (remparts avec chemin de ronde sont relevées.                                                               Boyssou,  daté du XVe siècle, il tient son importance de létendue des terres que possédaient les propriétaires. Semblable à un donjon, il est agrémenté de quatre petites tourelles.          Secourieu du XVIIe siècle,  quadrilatère  avec corps de logis à deux niveaux flanqué de deux tours carrées à toits à l'impérial, en façades toit à deux pans sur l'ensemble des bâtiments  avec une  lucarne centrale, demeure avant le XVIIIe siècle mal connue. Elle procède sans doute du réaménagement dun très ancien corps de ferme, situé au coeur dun vaste domaine agricole.\r\nAmpouillac, cette ancienne demeure connue depuis le Xe siècle fait partie du patrimoine des abbayes de Cuxa puis de Boulbonne. A cette époque, il s'agit d'une exploitation agricole destinée aux religieux. La propriété de 213 sétérées ainsi que le château édifié sur son emplacement, sont vendus en 1790. \r\nManoir de Lagarde, édifié grâce aux revenus du Pastel, ce manoir   aujourd'hui est modeste , humble témoin du passé.                                                                                                                                                                                               Laborie : Autrefois grange fortifiée et demeure du seigneur, l'aspect du  a peu changé depuis le XVIe siècle, époque à laquelle les Sabatéry, propriétaires du fief, entretenaient plusieurs arquebusiers pour se défendre des attaques des protestants.  Laborie appartint depuis  le XVe siècle. à des familles nobles les Sabatéry, les Richard, les Varennes, les Dupuy-Montaut et les Serres de Justigniac. Le château à la façade sévère, mais aux beaux appartements fût construit au XVIIe siècle.","habitants":"Général Bertrand Clauzel                                                               Famille d'Alcide Cauvet\r\n        \r\n        \r\n        \"","divers":"Auterives hôtel de ville, château de Secourieu, de Lagarde d'Ampouillac et de Verrières, Laborie et de Boyssieu","gps":"","images":["../../jctruffet.com/image/image_31/31_Auterive_1.jpg","../../jctruffet.com/image/image_31/31_Auterive_2.jpg","../../jctruffet.com/image/image_31/31_Auterive_3.jpg","../../jctruffet.com/image/image_31/31_Auterive_4.jpg","../../jctruffet.com/image/image_31/31_Auterive_5.jpg","../../jctruffet.com/image/image_31/31_Auterive_6.jpg","../../jctruffet.com/image/image_31/31_Auterive_7.jpg","../../jctruffet.com/image/image_31/31_Auterive_8.jpg","../../jctruffet.com/image/image_31/31_Auterive_9.jpg"]},"Consult_chateau_formulaireb6b1":{"id":"Consult_chateau_formulaireb6b1","dept":"31","canton":"Castanet-Tolosan","commune":"Auzeville-Tolosane","nom":"Auzeville","type":"Manoir","periode":"XVII","histoire":"Manoir des FRERES le nom de la propriété vient de l'installation d'une communauté de frères tailleurs originaire de Paris, en 1655. L'ensemble leur appartient jusqu'à la Révolution où il est vendu comme bien national.","architecture":"Auzeville, c'est une construction de briques, de plan carré, une tour octogonale contenant l'escalier à vis se trouve accolée au mur sud-est, un bâtiment récent est accolé sur cette façade latérale, la façade nord-est, dont l'accès se fait par la grande grille qui perce l'enceinte, s'ouvre par une porte du XVIIe siècle surmontée d'un fronton orné de balustres de style Louis XIII, échauguettes en encorbellement. Auprès de la maison, communs anciens en brique, et jardin potager entièrement clos.","habitants":"Les  frères tailleurs\r\n        \r\n        \r\n        \"","divers":"Manoir des frères à Auzeville","gps":"","images":["../../jctruffet.com/image/image_31/31_Auzeville_1.jpg","../../jctruffet.com/image/image_31/31_Auzeville_2.jpg"]},"Consult_chateau_formulaire0ee4":{"id":"Consult_chateau_formulaire0ee4","dept":"31","canton":"Castanet-Tolosan","commune":"Auzielle","nom":"Auzielle","type":"Château","periode":"XV-XVIII","histoire":"AUZIELLE, après la bataille du \"Pujol\" en 1213, et dès 1226 l'extension de l'influence de Toulouse fait d'Auzielle le chef-lieu d'une châtellenie de la Viguerie de Toulouse.  Le château édifié au XVe siècle est la propriété de la famille Roquette. Rayond VII, comte de Toulouse, avait agrandi la banlieue en 1226, Auzielle devint le chef-lieu d'une des quatre châtellenies formant la Viguerie de Toulouse. En 1462, Pierre de Roquette, bourgeois de Toulouse est seigneur d'Auzielle, il sera capitoul. Puis les Noè au XVIIe siècle.  A la fin du XVIIIe siècle, il appartient au marquis de Rocher de Bollay, puis passa au milieu du XIXe siècle, aux héritiers de Périer avocat au parlement de Toulouse,   le château appartient à la famille de Boussac, connue à Toulouse dès le début du XVIe siècle.  Toujours dans la famille  de monsieur de Boussac.                                   A quelques kilomètres au sud-est à Odars le château de Bergues.","architecture":"Auzeille de plan carré, construit au XVIIe siècle, le château ne possédait qu'un rez-de-chaussée et un étage couvert d'un comble en pavillon à usage de galetas ; les quatre tours d'angle, deux rondes au sud côtés cour carrées au nord côté jardin, couvertes en cône ou en pyramide, avaient un deuxième étage. Le château est précédé d'une cour d'honneur bordée de deux corps de communs, l'un à l'ouest élevé au XVIIIe siècle sur l'ancienne chapelle castrale, l'autre bâti en pendant au XIXe siècle. Entouré de douves sèches, c'est une construction de briques de plan carré cantonné de quatre tours, rondes vers la cour d'honneur et carrées à l'opposé vers le jardin, elles sont munies de bouches à feu. Le sous-sol s'éclaire sur les douves par des fenêtres dont le meneau est sculpté de cariatides, de masques et d'acanthes. Une fenêtre gothique est remployée pour éclairer la cave.  Il conserve jusqu'au XVIIe siècle des éléments défensifs (douves, pont-levis). À lorigine, le château est entouré de douves franchissables au sud et au nord par des ponts dormants et à lest par un pont-levis. Au XVIIe siècle le rez-de-chaussée et le premier étage sont remaniés, sur la façade principale, lavant corps central est surmonté dun fronton. Au XVIIIe siècle, construction du deuxième étage qui condamne les fenêtres des tours.","habitants":"Famille de Boussac\r\n        \r\n        \r\n        \"","divers":"Château d'Auzeille","gps":"","images":["../../jctruffet.com/image/image_31/31_Auzielle_1.jpg","../../jctruffet.com/image/image_31/31_Auzielle_2.jpg","../../jctruffet.com/image/image_31/31_Auzielle_3.jpg","../../jctruffet.com/image/image_31/31_Auzielle_4.jpg","../../jctruffet.com/image/image_31/31_Auzielle_5.jpg"]},"Consult_chateau_formulaire0725":{"id":"Consult_chateau_formulaire0725","dept":"31","canton":"Montgiscard","commune":"Ayguesvives","nom":"Ayguesvives","type":"Château","periode":"XVIII","histoire":"AYGUESVIVES,  l'ancêtre le plus ancien connu de cette illustre famille est N. de Martin, un riche bourgeois de Gaillac dont les deux fils, Antoine laîné et Antoine dit « le jeune », sinstalle à Toulouse, rue du Bourguet et rue de Sainte-Ursule (commerce de laine). Antoine Martin le cadet, est le fondateur de la lignée des seigneurs dAyguesvives. Marié à Bertrande de Cantner, il aura douze enfants dont jacques. Jacques de Martin épouse Jeane Rahou, doù trois fils. Lun deux, appelé Jean de Martin et marié à N. de Régnier, donne naissance à sept enfants. Parmi ces sept enfants, Jacques de Martin fera lacquisition en 1706 de la seigneurie dAyguesvives: Le nom de « de Martin » se transforme en « de Martin dAyguesvives ».  Aujourd'hui hôtel de ville.                                                                   Saint-FELIX le château, ancienne résidence de la famille des de Saint-Félix de Ginisty, a été racheté en 1958 par des propriétaires terriens d'Ayguesvives,                                                                Le PONT, propriété des Gabalda qui sont issus dune très ancienne famille de propriétaires notables, avocats, militaires.","architecture":"Ayguesvives la date exacte de construction de cet édifice nest pas connue. Il semble avoir été bâti au XVII ou XVIIIe siècle. Le matériau de construction utilisé est la brique pour les murs et la pierre pour le remarquable escalier monumental intérieur. Quelques structures annexes, comme lorangerie, existent encore sur les flancs, côté sud, un magnifique parc planté de grands arbres, notamment les cèdres et les pins séculaires, offre aux Ayguesvivois un lieu de promenade ombragé.                                                                                                                                   ST-FELIX  construit au XVIIe siècle, le château de la famille des de Saint -Félix, aussi nommé \"le pavillon de chasse\", apparaît dans le compoix d'Ayguesvives en 1743. Sans en connaître la raison, le dessin du château a été volontairement effacé. Il est étonnant de constater que parmi les 4 châteaux d'Ayguesvives, aucun ne présente une architecture similaire. Le château des de Saint-Félix se distingue de loin par son raffinement: à noter surtout, son toit d'ardoises, unique sur la commune, et ses 2 élégantes tourelles en façade                                                                                           Le Pont, le château actuel présente deux façades différentes, mais à lorigine il ne comportait quun seul bâtiment qui sétendait dune tourelle à lautre. Cest à la suite dun héritage que deux frères se sont partagés la bâtisse en la séparant. Pour agrandir, lun a surélevé le toit, l'autre a fait une extension côté ouest.","habitants":"Famille de Jacques de Martin \r\n        \r\n        \r\n        \"","divers":"l'hôtel de ville d'Ayguesvives; le château du  Pont et  Saint Félix","gps":"","images":["../../jctruffet.com/image/image_31/31_Ayguesvives_1.jpg","../../jctruffet.com/image/image_31/31_Ayguesvives_2.jpg","../../jctruffet.com/image/image_31/31_Ayguesvives_3.jpg","../../jctruffet.com/image/image_31/31_Ayguesvives_4.jpg","../../jctruffet.com/image/image_31/31_Ayguesvives_5.jpg"]},"Consult_chateau_formulaireb09e":{"id":"Consult_chateau_formulaireb09e","dept":"31","canton":"Bagnères de Luchon","commune":"Bagnères de Luchon","nom":"Bagnères_Luchon","type":"Château","periode":"XVII-XIX","histoire":"A Bagnères de Luchon ville thermale de nombreux châteaux sans information historique,  la tour du château de Fronsac à l'entrée de la Vallée.  et château de Juzet  (voir article).                                                                                                                                           LAFONT, construit au XVIIIe siècle sur les ordres de l'intendant de la généralité d'Auch, pour recevoir le maréchal duc de Richelieu, gouverneur pour le roi de la haute et basse Guyenne devant se rendre à Bagnères de Luchon avec l'intendant de la généralité d'Auch, le subdélégué à Montréjeau ordonna la construction d'une maison pour recevoir ses hôtes. Par la suite, le château Lafont accueillit nombre de personnalités. L'édifice de plan carré présente un aspect archaïque avec de puissantes murailles.  Propriété de la commune, le château Lafont abrite l'office du tourisme et le musée du pays de Luchon (ancien musée archéologique de Luchon fondée en 1931).                                                                                  Trois villas du XIXe siècle ont été inscrites. La villa Édouard de style néo-gothique, construite en 1864, la villa Pyrène, et la villa Santa-Maria, (ou Narychkine) construite vers 1840, aux façades néo-palladiennes  a abrité la princesse Narychkine et Alexandre Dumas fils. Manoir de  Champsaurel de  Henri Beraldi.                                                                                                                                          Tour de FRONSAC, le village est surplombé par une tour du XIIIe siècle, qui n'est autre que le vestige du château des Comtes de Comminges. Le site est inscrit depuis 1944.","architecture":"Lassus Nestier de style Louis XVI, construit en 1772 il est la première construction des allées, son toit à 4 pentes est caractéristique des maisons nobles. Il héberge aujourdhui musée du pays de Luchon.  Les toitures et façades des trois chalets sont, construits entre 1848 et 1855, sont inscrites au M.H.\r\nLe château Lafont  une maison carrée avec en son milieu un escalier reculé de façon à ménager un vestibule, Il en est de même pour la résidence Charles Tron qui  date du XVIIIe siècle est inscrit par arrêté du 2 mars 1927 et son escalier est classé en 1931. L'édifice de plan carré présente un aspect archaïque avec de puissantes murailles. Au rez-de-chaussée, la façade comporte une grande porte donnant accès à un vestibule d'où s'élève l'escalier d'honneur. A l'intérieur, les portes, les cheminées, les boiseries sont de style Louis XV. L'escalier d'honneur se répartit sur quatre paliers jusqu'au combles. La rampe est en bois laqué noir et rouge.\r\nLe casino construit entre 1878 et 1880 en brique-pierre dans un style  classique, puis agrandi en 1929 avec ajout du décor Art-déco de la façade antérieure. Le parc est dessiné autour d'une pièce d'eau serpentine avec grotte artificielle. Le parc du casino, ses deux pavillons d'entrée et le pavillon normand ont été inscrits par arrêté du 10 mai 1999.","habitants":"Duc de Richelieu\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Lafont à Bagnères de Luchon ainsi que les vestiges de la tour de Fronsac et des villas et Casino.","gps":"","images":["../../jctruffet.com/image/image_31/31_Bagneres_Luchon_1.jpg","../../jctruffet.com/image/image_31/31_Bagneres_Luchon_2.jpg","../../jctruffet.com/image/image_31/31_Bagneres_Luchon_3.jpg","../../jctruffet.com/image/image_31/31_Bagneres_Luchon_4.jpg","../../jctruffet.com/image/image_31/31_Bagneres_Luchon_5.jpg","../../jctruffet.com/image/image_31/31_Bagneres_Luchon_6.jpg","../../jctruffet.com/image/image_31/31_Bagneres_Luchon_7.jpg","../../jctruffet.com/image/image_31/31_Bagneres_Luchon_8.jpg","../../jctruffet.com/image/image_31/31_Bagneres_Luchon_9.jpg"]},"Consult_chateau_formulairea12d":{"id":"Consult_chateau_formulairea12d","dept":"31","canton":"Toulouse-10","commune":"Balma","nom":"Balma_Thégra","type":"Château","periode":"XVI","histoire":"Trois châteaux à Balma celui de Thégra, d'Aufréry au Pin-Balma et le manoir de Saint-Clair  etle château du Val-Rose à Montradé dont je n'ai pas d'information historique pour ces deux derniers.                                                                                         AUFRERY   Le château d'Aufréry (hier Aufréri) fait partie de l'histoire de Balma, même si aujourd'hui il est situé sur la commune de Pin-Balma en bordure du plateau du Cyprié. Dès le XIIIe siècle,s'élevait une maison fortifiée appelée Camas qui deviendra plus tard le château d'Aufréry qui est de la même époque que le palais Niel à Toulouse. Alors qu'il venait d'être nommé maréchal par Napoléon III, le Général Niel plutôt que de s'installer au palais Niel a préféré avoir une propriété personnelle et acheter ce terrain de 300 hectares et faire construire Aufréry en 1862. Cette propriété fût achetée en 1938 au Comte Niel par le docteur Laboucarié.                                                                                             THEGRA, en 1370, est déjà citée en maison-forte sur le lieu-dit \"Lagarrigue\", la maison est achetée par Durand d'Abbatia qui devient Capitoul à Toulouse en 1584 qui fait  construire le château actuel. Plusieurs Capitouls de Toulouse se sont succédé comme propriétaires jusqu'à la Révolution, et en 1801 monsieur Niocel de Thégra acquiert le domaine et lui donne son nom. Le château de Thégra sera légué à Jean Pierre de Villèle en 1853, et restera jusquà nos jours dans sa descendance, le château  est la plus ancien de Balma. Témoignage de l'architecture toulousaine de la fin du XVIe siècle, est inscrit à l'inventaire M.H.\r\nÀ ce jour la propriétaire des lieux, madame de Courrèges, organise des visites pour faire découvrir ce petit château de plan classique. Sur l'un d'entre eux, on peut voir, dans un médaillon le palais des archevêques de Toulouse situé à Balma et détruit sous Louis XV par Loménie de Brienne et c'est là une rare représentation de cette ancienne forteresse moyenâgeuse.  En outre le château de Thégra est devenu un cadre de campagne pour réceptions de caractères aux portes de Toulouse. Aujourd'hui chambres d'hôtes.","architecture":"Aufréry,   l'ensemble des bâtiments composant la clinique, est un regroupement du vieux bâtiment du XIIIe siècle et des diverses extensions effectuées dans la seconde partie du XIXe siècle par le maréchal Niel et par ses descendants.                                                                                                                                   Thégra,  tour capitulaire, agrandit et décore la maison avec une nette influence italienne.  Les salles avec  des plafonds peints et des fresques du XVIe siècle.  Petit château de plan classique, composé de quatre salles au rez-de-chaussée et de quatre à l'étage, reliées par la tour octogonale renfermant un escalier à vis. Trois cheminées monumentales du XVIe siècle sont encore visibles, et les plafonds peints sont bien conservés, élégantes salles en briques roses, , des plafonds peints qui pourront accueillir toutes vos réceptions de caractère. Cette maison de famille depuis huit générations, vous propose de vastes chambres de caractère, calmes et avec leur décor du XVIIIe siècle.                                                                               Manoir de Saint-Clair, de plan rectangulaire à deux niveaux toit à deux pans accollés d'une tour hexagonale  à toit en calotte, dotée d'une terrasse avec  vue sur le jardin.","habitants":"Durand d'Abbatia\r\n        \r\n        \r\n        \r\n        \"","divers":"La château de Thégra et le manoir de Saint-Clair à Balma et Aufréry  à Pin-Balma et Val-rose à Montrabé","gps":"","images":["../../jctruffet.com/image/image_31/31_Balma_Thegra_1.jpg","../../jctruffet.com/image/image_31/31_Balma_Thegra_2.jpg","../../jctruffet.com/image/image_31/31_Balma_Thegra_3.jpg","../../jctruffet.com/image/image_31/31_Balma_Thegra_4.jpg","../../jctruffet.com/image/image_31/31_Balma_Thegra_5.jpg","../../jctruffet.com/image/image_31/31_Balma_Thegra_6.jpg","../../jctruffet.com/image/image_31/31_Balma_Thegra_7.jpg","../../jctruffet.com/image/image_31/31_Balma_Thegra_8.jpg","../../jctruffet.com/image/image_31/31_Balma_Thegra_9.jpg"]},"Consult_chateau_formulaire76ed":{"id":"Consult_chateau_formulaire76ed","dept":"31","canton":"Bagnères de Luchon","commune":"Barbazan","nom":"Barbazan","type":"Château","periode":"XV-XVIII","histoire":"Barbazan, la seigneurie de Barbazan en Nébouzan appartenait à la branche de Mauléon de Barousse et relevait du comté de Foix.  Les barons de Barbazan n'ont pas eu de problèmes avec les habitants mais quelques frictions avec les représentants du roi qui contestaient les fonctions publiques du baron. Elles furent très vives à plusieurs reprises comme en 1662, lorsque Jean-Jacques de Mauléon déposa son dénombrement. Il prétendait au titre de juge curial de Rivière et pour cela, devant les dénégations des officiers royaux de justice, il invoquait deux jugements antérieurs à l'administration : un dénombrement de Géraud de Mauléon du 24 janvier 1542, un autre d'Arnaud-Guilhem de Mauléon du 3 octobre 1478, hommage à Madeleine de France, princesse de Viane, en sa qualité de comtesse de Nébouzan. Géraud de Mauléon fut nommé le 15 décembre 1599 capitaine forestier des châtellenies de Frontignes et de Luchon. La coutume de Barbazan  produite par les consuls de Barbazan devant le parlement de Pau lors de l'accession d'un membre de la famille d'Astorg à la seigneurie de Barabzan en 1725,  le lieutenant-général Bernard d'Astorg d'Aubarède, né à Barbazan en 1630, succéda à Jean-Jacques de Mauléon son oncle. En 1639, par mariage, cette famille de Bigorre était entré dans celle de Barbazan en Nébouzan.En 1710, Bernard mourrait sans héritier et ce fut son frère Jacques qui lui succéda. Quatre générations d'Astorg suivirent jusqu'à la Révolution. De baronnie, la seigneurie devint marquisat.  Louis de Froidour rapporta au roi ses impressions sur le château et sur Jean-Jacques de Mauléon en 1667 lors de son séjour en terres commingeoises et baroussaises. A 5km au sud Luscan château du XIXe siècle  hôtellerie de madame Isabeau.                                                                     A 3 kilomètres au nord-ouest à Labroquère manoir de Vidaussan chambre d'hôte d'Isabelle Bouix-Fille.","architecture":"Barbazan est une ville thermale classée. Elle fut une forteresse du comté d'Édesse. Létablissement thermal, bâti en 1901, se situe dans un parc de 4,2 hectares, arboré. La « Chapelle inachevée » Rendre sa forme originelle à un château de style médiéval en l'agrémentant d'une touche contemporaine.\r\nPartant de ruines, le pari de l'architecte est de reconstruire entièrement ce château d'époque médiévale terminé à la Renaissance.\r\nAprès un travail minutieux de relevés et de recherches, un traitement particulier permet de respecter totalement l'Architecture d'époque : enduits à la chaux, calepinages des menuiseries bois, reconstruction de la toiture à l'identique avec lucarnes à meneaux de pierres. Des éléments modernes (baie vitrée, cuisine moderne, sol en béton ciré...) apportent confort et agrément tout en conservant sa noblesse au bâtiment.                                                   Le château de Luscan repose sur des soubassements  anciens (manoir IXe siècle). Tours du XVe siècle, ainsi qu'une aile. Corps de logis et porte des XVIIe et XVIIIe siècles. Un donjon  a été rasé en 1842. La construction massive se compose de deux ailes dont l'une flanquée de tours carrées, fenêtres à meneaux, l'aile ancienne est percée d'une porte du XVe ou XVIe siècle, ornée de monogrammes et de sculptures. L'aile du XVIIIe siècle s'ouvre par une porte surmontée de deux blasons de bois.","habitants":"Famille d'Astorg\r\n        \r\n        \"","divers":"Vestiges de l'ancien château, celui de Barbazan, de Luscan et l'hôtel et le manoir de Vidaussan  Labroquère","gps":"","images":["../../jctruffet.com/image/image_31/31_Barbazan_1.jpg","../../jctruffet.com/image/image_31/31_Barbazan_2.jpg","../../jctruffet.com/image/image_31/31_Barbazan_3.jpg","../../jctruffet.com/image/image_31/31_Barbazan_4.jpg","../../jctruffet.com/image/image_31/31_Barbazan_5.jpg","../../jctruffet.com/image/image_31/31_Barbazan_6.jpg","../../jctruffet.com/image/image_31/31_Barbazan_7.jpg","../../jctruffet.com/image/image_31/31_Barbazan_8.jpg","../../jctruffet.com/image/image_31/31_Barbazan_9.jpg"]},"Consult_chateau_formulaired1bd":{"id":"Consult_chateau_formulaired1bd","dept":"31","canton":"Escalquens","commune":"Baziège","nom":"Baziège","type":"Château","periode":"XIV-XVIII","histoire":"Deux châteaux à Baziège, Lastours, de Palis, pas d'information historique pour ce dernier.                                                                                                                           LASTOURS, le château a appartenu à Catherine de Médicis,   ancien relais de chasse,  puis à sa fille la reine Margot.  Au gré des propriétaires successifs, la bâtisse s'est agrandie et jusqu'au XVIe siècle et jusqu'en 1670, la seigneurie passe aux Ferrières. On connaît Antoine de Ferrières qui fut conseiller au parlement de Toulouse, de 1551 à 1571, et son fils Anne de Ferrières qui fut avocat au parlement, chef du Consistoire et plusieurs fois capitoul de Saint-Etienne à Toulouse, en 1670, après la mort d'Anne de Ferrières.  En 1697, le roi Louis XIV cède ses droits de justice sur Baziège à Jean-François dEsquerré, seigneur de Lastours, Jean Izarn, marchand, Mathurin Daubry,  bourgeois, et Henri du Vergier, noble. Mais au début du siècle suivant, le comté de Lauragais est vendu par le roi Louis XV à Louis-Antoine de Brancas. \r\nC'est Marc Zamit, qui est actuellement copropriétaire du château de Lastours, et Mme Verrier qui est gérante de l'immense bâtisse.\r\nIl est aujourd'hui transformé en appartements locatifs.","architecture":"Lastours du XIVe siècle terminé fin XVIIe siècle transformé en pavillon de chasse,  Il y a une dizaine d'appartements dans le château mis en location.\r\nL'accès s'effectue par une seule entrée, le château est entouré de douves larges et profondes remplis d'eau, douves qui servaient d'obstacles aux intrusions contre les attaques et qui nous transportent dans une époque de princes et de seigneurs.  La demeure est une tour fortifiée de plusieurs étages, visible dans l'angle nord-ouest. La tourelle sud ouest de la façade côté cour date  de cette époque. Une autre tour d'angle nord est en partie englobée dans un bâtiment élevé au XVIIIe siècle.  Dans la grande salle du premier étage une cheminée monumentale du XVIIe siècle, en brique, avec un décor exceptionnel d'une grande variété de motifs.   C'est la  construction massive qui subsiste dans l'angle nord-ouest et que l'on peut voir à larrière de lédifice. Les ouvertures actuelles ne sont pas d'époque et ont été agrandies par la suite.","habitants":"Famille de Marc Zamit\r\n        \r\n        \r\n        \"","divers":"Château de Lastour de Palis à Baziège","gps":"","images":["../../jctruffet.com/image/image_31/31_Baziege_1.jpg","../../jctruffet.com/image/image_31/31_Baziege_2.jpg","../../jctruffet.com/image/image_31/31_Baziege_3.jpg","../../jctruffet.com/image/image_31/31_Baziege_4.jpg","../../jctruffet.com/image/image_31/31_Baziege_5.jpg"]},"Consult_chateau_formulaire6517":{"id":"Consult_chateau_formulaire6517","dept":"31","canton":"Bagnères de Luchon","commune":"Juzet","nom":"Bazus","type":"Château","periode":"XVI","histoire":"BAZUS, doit sont nom au sieur Sode de Bazus, propriétaire du terrain au XVIIIe siècle. Daté de la fin du XIXe siècle, allure romantique à la Viollet-le-Duc. Situé sur un cône, rive gauche du Salens, domine la vallée de Luchon. Il n'a rien à voir avec l'ancienne commanderie et fut longtemps la propriété du maire Daniel Baqué. Cependant quelques pierres de réemploi (encadrements de portes et fenêtres), se distinguent ainsi que divers éléments architecturaux qui ne sont que des copies d'ancien, rajoutés par Daniel Baqué. Dès cette époque, il appartient aux Fadeuilhe, ayant comportée trois maires au début du XIXe siècle, puis aux Comet, originaires de Moustajon qui l'ont acquis vers 1900 et le possèdent toujours de nos jours ( famille Lafontan-Comet).","architecture":"Bazus  se trouve au nord du village, place de l'Ormeau,  bien, en dehors de l'église, ayant résisté au sac de Juzet par les Miquelets en 1711, il est donc postérieur à cette date et vraisemblablement contemporain du château Lafont-Lassalle de Luchon (1772). A vrai dire il comporte deux parties accolées : la plus ancienne, au couchant, et la plus récente, au levant, bâtisse carrée à un étage. Flanqué de deux tourelles au angles à toit pointu intercalé par des balcons ferraillé,  toit de la bâtisse en croupe avec lucarnes.","habitants":"sieur Sode de Bazus\r\n        \r\n        \"","divers":"Manoir de Bazus à Juzet","gps":"","images":["../../jctruffet.com/image/image_31/31_Bazus_1.jpg","../../jctruffet.com/image/image_31/31_Bazus_2.jpg"]},"Consult_chateau_formulaire6d3a":{"id":"Consult_chateau_formulaire6d3a","dept":"31","canton":"Auterive","commune":"Beaumont sur Léze","nom":"Beaumont_Léze","type":"Chateaux","periode":"XVII","histoire":"Plusieurs châteaux à Beaumont sur Léze et les environs, celui de Pellepoix , Vignolles et  Ribonnet ( Voir article).                                                                                                  BEAUMONT, le Fort, la stratégie militaire bâtit un fort sur la hauteur, il sagit de la visite pastorale effectuée en 1698 par larchevêque de Toulouse, monseigneur Charles de Montchal. Le fort seigneurial était donc déjà ruiné au début du XVIIIe siècle. Des documents de la fin du XIXe siècle désignent cet endroit comme lemplacement du château.                                                                                                                                                   PELLEPOIX  le nom de Pellepoix a été apporté tout simplement à Beaumont au XVIe siècle par les Pellepoix, famille d'ancienne noblesse. Mais au début du XVIIIe siècle  cette co-seigneurie fut cédée aux Darquier, dont le nom a été illustré plus tard par le savant astronome Antoine Darquier, auteur de l'ouvrage Uranographie. Au XIXe siècle, de nouveau la propriété fut vendue plusieurs fois et le château d'ancien régime fut détruit.  Ce sont les Du Périé qui eurent la riche idée d'en appeler à un architecte toulousain. D'ailleurs, leur monogramme se dressait naguère en haut du portail d'entrée. Par héritage et par les femmes, le lieu passa en 1929 et pendant plus de deux décennies aux Douladoure. Le nom des Douladoure est bien entendu celui des célèbres imprimeurs de Toulouse qui demeurèrent longtemps en bas de la rue Saint- Rome. Richard Abadie originaire du château de Pellepoix.    Aujourd'hui à la famille Roux.                                                                                                                                       VIGNOLLES,  utilisé par le  peintre toulousain Roques conservé dans ce château.","architecture":"Beaumont, le château féodal se situait au cur du fort sur la place des anciennes écoles au nord du village. Le fort seigneurial était ruiné au début du XVIII siècle.                                                                                                     Pellepoix, demeure classique du XIXe siècle de style palladien s'articule en trois parties : la travée centrale où intervient la pierre fait succéder une serlienne au rez-de-chaussée (ponctuée par deux bustes à l'antique) à une loggia à l'étage ; les pilastres et les colonnes mènent à un belvédère à la balustrade ajourée. À cette travée toute animée de verticales correspondent au rez-de-chaussée, les ouvertures qui jouent sur le feston continu des tympans semi-circulaires et à l'étage les fenêtres rectangulaires qui remplacent les horizontales des bandeaux et de la corniche. À ce corps de logis double, s'ajoute sur la façade postérieure une construction en U à un niveau qui abritait les services, mais ne manquait pas d'une certaine noblesse puisque la cour fermée par une grille mise en valeur par un perron devait servir d'entrée usuelle.                                                                                                                               Vignolles, quadrangulaire cette construction est caractéristique de la région toulousaine, aux XVIe et XVIIe siècles. Autour d'une cour unique s'ordonne les bâtiments des communs face au logis principal. Ce dernier, plus haut que les autres, se situe face au portail principal décoré d'une éole en terre cuite et de deux boules représentant deux petites têtes. La façade sur jardin du corps de logis a conservé ses fenêtres à meneaux sculptées. A l'intérieur, escalier du XVIIe siècle.","habitants":"Monseigneur Charles de Montchal\r\n        \r\n        \r\n        \"","divers":"Le châteaux de Pellepoix, du Vignolles à Beaumont sur Léze","gps":"","images":["../../jctruffet.com/image/image_31/31_Beaumont_Leze_1.jpg","../../jctruffet.com/image/image_31/31_Beaumont_Leze_2.jpg","../../jctruffet.com/image/image_31/31_Beaumont_Leze_3.jpg","../../jctruffet.com/image/image_31/31_Beaumont_Leze_4.jpg"]},"Consult_chateau_formulaire2fd0":{"id":"Consult_chateau_formulaire2fd0","dept":"31","canton":"Revel","commune":"Beauteville","nom":"Beauteville","type":"Forteresse","periode":"XIII","histoire":"BEAUTEVILLE dit de  Lagarde et ses dépendances à la commanderie des Hospitaliers de Caignac qui ne cesse de s'agrandir depuis sa création en 1136 par les Seigneurs de Laurac. En 1239 une charte de paix est signée entre les habitants de Caignac et de Lagarde à la suite de démêlés entre les deux communautés. En 1271, Lagarde fera partie de la Baylie d'Avignonet tout en dépendant des Hospitaliers de Caignac. Entre 1486 et 1505, Jean de Bouyssou, Seigneur de Beauteville, devient Coseigneur de Lagarde et s'enrichit comme négociant de pastel, plante qui fit la fortune du Lauragais à cette époque. C'est durant le XVIe siècle que s'accentua la construction des célèbres moulins a vent du Lauragais. Les croisés, au retour d'Asie Mineure, firent connaître cette invention qui semble venir de Chine. Lagarde possédait trois moulins à vent : deux à proximité du village et un à En Jacquou. C'est aussi donc au XVIe siècle, par conséquence qu'apparurent les armoiries de la seigneurie de Beauteville et de Lagarde qui sont restées depuis l'emblème des deux villages : \" 6 moulins à vents, symboles de la puissance économique de cette région, font face à 6 lions, symbole de la puissance nobiliaire du Seigneur de Beauteville.\" En 1573, afin que le fort de Lagarde ne serve de repère aux armées protestante, il est ordonné à la démolition.","architecture":"Le fort de Beauteville était défendu par une double enceinte de fossés dont on devine encore les traces : la première entourait le village au nord, au nord-est et au sud-est. L'emplacement est occupé aujourd'hui par des jardins dits \"vieux fossés\" la deuxième entourait le fort avec un pont Lévis. du fort imposant avec tour ronde à mâchicoulis.","habitants":"seigneur Jean de Bouyssou\r\n        \"","divers":"la forteresse de Beauteville","gps":"","images":["../../jctruffet.com/image/image_31/31_Beauteville_1.jpg","../../jctruffet.com/image/image_31/31_Beauteville_2.jpg","../../jctruffet.com/image/image_31/31_Beauteville_3.jpg"]},"Consult_chateau_formulaire3104":{"id":"Consult_chateau_formulaire3104","dept":"31","canton":"Léguevin","commune":"Merville","nom":"Beillard","type":"Château","periode":"XIX-XX","histoire":"BEILLARD, en 1850, le baron de Maynard de Ségoufielle décide de reconstruire le domaine. Le propriétaire, Henri-Auguste, marquis de Chalvet Rochemonteix, sénéchal de Toulouse, dresse lui-même les plans de sa demeure, dont lemplacement correspond à lancien château doté dune enceinte fortifiée. La bâtisse est caractérisée par une grande sobriété architecturale. \r\nAujourdhui, le château a conservé son ameublement dorigine, et constitue une des curiosités les plus remarquables de la commune.  Les propriétaires actuels, M. et Mme de Beaumont ont entrepris un important programme de restauration pour mettre en valeur cet ensemble unique, qui offre un témoignage rare du mobilier et des ornements du XVIIIe siècle.","architecture":"De l'ancienne demeure de Beillard , il ne reste que le pigeonnier du XVIIe siècle. Inspiré par le modèle de Saint-Elix, le baron compose un beau jardin d'esprit classique, avec statuaire. De composition classique, un grand axe longitudinal passe par la maison de maître en créant une double perspective. Les abords de l'édifice sont aménagés en hémicycle. Vers 1942, l'ensemble est enrichi par l'introduction de cheminements poétiques et des sculptures.  De 1743 à 1759:   Classé monument historique, le château épouse le style classique toulousain de son époque. Il offre une enfilade de salons dapparat où lon admire de riches tapisseries flamandes ainsi que le salon chinois. Les ouvertures offrent une vue splendide sur la vallée de la Garonne et sur le parc du château.","habitants":"Baron de Maynard de Ségoufielle \r\n        \"","divers":"Château de Beillard à Merville","gps":"","images":["../../jctruffet.com/image/image_31/31_Beillard_1.jpg","../../jctruffet.com/image/image_31/31_Beillard_2.jpg","../../jctruffet.com/image/image_31/31_Beillard_3.jpg","../../jctruffet.com/image/image_31/31_Beillard_4.jpg","../../jctruffet.com/image/image_31/31_Beillard_5.jpg"]},"Consult_chateau_formulaire394c":{"id":"Consult_chateau_formulaire394c","dept":"31","canton":"Villemur sur Tarn","commune":"Fronton","nom":"Bellevue_Foret","type":"Château","periode":"XIX","histoire":"Bellevue la Forêt, une oeuvre signée Patrick Germain et poursuivie avec la complicité de sa fille Diane.  Le père de son trisaïeul était déjà viticulteur en Bourgogne, au début du XIXe siècle. Son arrière-arrière-grand-père le fut à son tour en Algérie, dès 1840. Cinq générations de Germain sétant succédé en Afrique du Nord, cest donc en digne successeur dune famille de véritables pionniers que Patrick Germain prend les rênes à son tour. Après avoir quitté lAlgérie en 1963, il est contraint dabandonner le Maroc en 1973 pour regagner la France. Passionné de viticulture et fort de lexpérience familiale acquise, il préfère alors créer sa propre exploitation viticole plutôt que den reprendre une déjà existante. Cest ainsi que le château de Bellevue naît en 1974, alors que , merveilleuse coïncidence , les côtes du Frontonnais sapprête à passer en appellation dorigine contrôlée. Un signe que Patrick Germain trouve particulièrement prometteur. Cette A.O.C. nest pas encore sur le devant de la scène, mais il détecte le potentiel qui lui fera gagner un statut de premier plan.","architecture":"Le manoir de plan rectangulaire à trois niveaux toit en croupes retour en équerre d'un bâtiment de dépendance à un niveau flanqué entre deux d'une tourelle d'escalier ronde à toit coniques.","habitants":"Famille Patrick Germain \r\n        \r\n        \r\n        \"","divers":"Manoir de Bellevue la Forêt","gps":"","images":["../../jctruffet.com/image/image_31/31_Bellevue_Foret_1.jpg","../../jctruffet.com/image/image_31/31_Bellevue_Foret_2.jpg"]},"Consult_chateau_formulairef93b":{"id":"Consult_chateau_formulairef93b","dept":"31","canton":"Toulouse","commune":"Toulouse","nom":"Bellevue_Toulouse","type":"Château","periode":"XVIII","histoire":"BELLEVUE,  le docteur en droit Guillaume Molinier, conseiller au présidial  de Toulouse dispose dun domaine agricole en bordure du Grand Chemin François   érigés sur ordre de la marquise de Campels. La propriété passe rapidement aux mains des Cathelan, illustre famille dofficiers royaux, qui édifient un parc avec une esplanade plantée darbres avec deux jardins à la française.  Au milieu du XVIIIe siècle, le domaine devient lapanage des parlementaires de Niquet qui élèvent lactuel château, selon un axe nord-sud afin de profiter de la perspective. Luvre entreprise est menée à son terme par la marquise de Clermont-Gasquet, la fille des vicomtes de Bruniquel. Sous le Second-Empire, le domaine passé sous la coupe de la famille de Bray, en décembre?1894, le mécène Théodore Ozenne le rachète et en fait donation au Lycée de Toulouse (actuel lycée Pierre-de-Fermat). De 1894 à 1946, le domaine de Bellevue est le centre de plein air. Les élèves des classes préparatoires aux grandes écoles y séjournent pour y passer leur oral. À la Libération, afin de faire face au problème de sureffectifs, il est décidé,  à la donation de Théodore Ozenne, dédifier un nouvel établissement.  En novembre?1946, lannexe accueille ses 22 premiers élèves dans des pavillons construits sur la colline du Belvédère et les internes sont logés au château. Six ans plus tard, le lycée pilote mixte Bellevue ouvre ses portes. À la rentrée 1955, létablissement se sépare de sa maison-mère et devient le Lycée dÉtat mixte Bellevue.","architecture":"Le château de Bellevue sur les flancs des coteaux de Pech-David, se dresse sur une éminence, de style Louis XVI, lun des plus élégants châteaux toulousains. Une singularité que lon doit avant tout à une vue exceptionnelle qui sétend au loin sur les hauteurs de Montaudran, Balma et la vallée de lHers. Si le nom de Bellevue napparaît officiellement quen 1819 lors dun acte de vente, son origine remonte au dernier quart du XVIe siècle, De substantielles modifications, de style Louis XVI, sont apportées aux parties hautes de la demeure, contrairement à laménagement intérieur, les cheminées et lorangerie de style Empire, érigés sur ordre de la marquise de Campels. Entre-temps, le château devient lépicentre de laffrontement entre insurgés républicains et contre-révolutionnaires, lors du combat de Pech-David au cours de lété 1799.","habitants":"Famille des Cathelan\r\n        \r\n        \r\n        \r\n        \"","divers":"Le château de Bellevue à Toulouse","gps":"","images":["../../jctruffet.com/image/image_31/31_Bellevue_Toulouse_1.jpg","../../jctruffet.com/image/image_31/31_Bellevue_Toulouse_2.jpg","../../jctruffet.com/image/image_31/31_Bellevue_Toulouse_3.jpg"]},"Consult_chateau_formulaire2b85":{"id":"Consult_chateau_formulaire2b85","dept":"31","canton":"Toulouse","commune":"Odars","nom":"Bergues","type":"Château","periode":"XIX","histoire":"BERGUES fermes pédagogique le château de Bergues revisite à sa façon le programme des cycles scolaires . «Nous avons récemment décidé d'ouvrir la ferme pour des séjours plus longs. Nous proposons un hébergement dans le château pour les plus petits et sous tente pour les plus grands», détaille le propriétaire.Friand de l'ambiance que dégage son parc arboré, il a réhabilité la bâtisse du XIXe siècle pour en faire un lieu où il fait bon vivre et s'amuser.","architecture":"Le château de Bergues se trouve à Odars en Haute Garonne, à 15 km de Toulouse. Au coeur du magnifique parc arboré de 3,5 ha et de ses dépendances ; nous accueillons les groupes pour des sorties pédagogiques et détente, les enfants dans notre centre de loisirs ou pour des anniversaires, les familles pour des animations de saison , les entreprises pour des réunions et événements.","habitants":"\"","divers":"Château de Bergues à Odars","gps":"","images":["../../jctruffet.com/image/image_31/31_Bergues_1.jpg","../../jctruffet.com/image/image_31/31_Bergues_2.jpg","../../jctruffet.com/image/image_31/31_Bergues_3.jpg","../../jctruffet.com/image/image_31/31_Bergues_4.jpg"]},"Consult_chateau_formulaire38db":{"id":"Consult_chateau_formulaire38db","dept":"31","canton":"Blagnac","commune":"Blagnac","nom":"Blagnac","type":"Château","periode":"XVII","histoire":"Trois châteaux à Blagnac celui de Blagnac ancien monastère Sainte-Catherine de Sienne, le Ferradou et  celui de Purpan.                                                                 BLAGNAC  Jean dAldeguier, grand trésorier de la généralité de Toulouse, achète les terres qui lui valent le titre de baron ; il y construit un nouveau château au milieu du XVIIe siècle. Passé aux mains de différents propriétaires  il est finalement vendu en 1748 à Gaspard de Maniban, premier président au parlement de Toulouse. Ce dernier,  entreprend des travaux daménagements.\r\nEn 1810, le château et ses dépendances sont vendus au général d'Empire Jean Dominique Compans. Il y meurt en 1845.  le château est acheté en 1850 par les Trappistines, venues de labbaye de Maubec (Drôme)  En 1946 les moniales passent commande à Louis Mazetier, célèbre peintre verrier qui réalise fresques vitraux, et mobilier de l'église. Depuis les années 1950, le monastère a varié ses activités . Une pension de famille fut ensuite transformée en maison de retraite, afin dassurer la survie matérielle de la communauté.                                                FERRADOU devenu collèges public. Prosper Ferradou  Il hérite de sa mère Josèphe, fille du notaire royal  Jean Vital, du domaine du Rieu. Il a épousé le 22 juillet 1823 à Monferrand-Savès (Gers) Jeanne Delieux Il fait construire entre 1850 et 1860 un château sur le domaine du Rieu appelé aujourd'hui « Château du Ferradou.  En 1856, il est dit Chevalier de la Légion d'Honneur.   Après la guerre, des travaux de rénovation sont entrepris. En 1960  est abandonné depuis plusieurs années, en 1971, il change de nom et de propriétaire, en la personne d'André Laurent. D'école primaire, en collège puis en lycée,                                                                              PURPAN château d'un industriel local.","architecture":"Le château monastère Sainte-Catherine de Sienne bâti au sud près du fossé et du rempart entourant le village est détruit pendant les guerres de Religion et reconstruit au nord, place de la Fontcouverte. Il est difficile de se le représenter car le Blagnacais qui la acheté à Claude Amieu en 1790, la transformé.  Entre 1860 et 1862, elles construisent léglise, puis les bâtiments conventuels entre l'église et le château; commencés en 1862, ils ne furent jamais achevés.Le monastère se compose d'un imposant bâtiment conventuel et d'une église du XIXe siècle (consacrée le 18 août 1862), et d'un château du XVIIe siècle, ainsi que des dépendances du XVIIe et XIXe siècles, qui composent le monastère des Dominicaines.                         Ferradou de style néo-gothique  de plan rectangulaire à deux niveaux  et lucarnes sur toit brisé, flanqué de deux pavillons face à l'entrée à trois niveaux toit à l'impérial, côté parc pavillon central à trois travées saillants à toit deux pans formant un fronton triangulaire.                                                    Purpan corps de logis rectangulaire à deux niveaux, trois travées  saillantes en façade avec balcons féraillés, portes et fenêtres a linteau retondant, toit de l'édifice à deux pans.","habitants":"Jean dAldeguier\r\n        \"","divers":"A Blagnac le château monastère, celui de Blagnac, le Ferradou et de Purpan avec tour.","gps":"","images":["../../jctruffet.com/image/image_31/31_Blagnac_1.jpg","../../jctruffet.com/image/image_31/31_Blagnac_2.jpg","../../jctruffet.com/image/image_31/31_Blagnac_3.jpg","../../jctruffet.com/image/image_31/31_Blagnac_4.jpg","../../jctruffet.com/image/image_31/31_Blagnac_5.jpg","../../jctruffet.com/image/image_31/31_Blagnac_6.jpg","../../jctruffet.com/image/image_31/31_Blagnac_7.jpg","../../jctruffet.com/image/image_31/31_Blagnac_8.jpg","../../jctruffet.com/image/image_31/31_Blagnac_9.jpg"]},"Consult_chateau_formulaire8a8b":{"id":"Consult_chateau_formulaire8a8b","dept":"31","canton":"Pechbonnieu","commune":"Saint-Jean de L","nom":"Bonrepos_Riquet","type":"Château","periode":"XVII","histoire":"BONREPOS-RIQUET,   Pierre-Paul Riquet est né à Béziers, le 29 juin 1609, il épousa Catherine de Milhau, il s'installe à Mirepoix puis à Revel. Dès 1651, il acquit la seigneurie de Bonrepos près de Verfeil un château Renaissance.  Après sa mort, son fils Mathias, baron de Bonrepos, achève les travaux de construction, sa fille Dorothée épouse le  président du parlement de Toulouse, Jean Louis de Cambon,   son fils Jean François  marquis de Cambon, devient député et maire de Bonrepos en 1824.  À la suite d'une succession , c'est sa petite fille Charlotte Adélaïde de Tauriac qui hérite de Bonrepos vendu aux enchères en 1836.   C'est le comte Joseph Falentin de Saintenac qui  l'acquiert. Celui-ci  le revend  en 1853 à MM. Henri et Paul Courtois, banquiers de Toulouse. En 1867, Henri et Paul Courtois  vendent  le domaine  au comte de Bertier et à son épouse née Tauriac. Le château revient ainsi à une descendante de Pierre-Paul Riquet. Les Bertier habitent au château où la comtesse meurt en 1888 et son mari peu après en 1900. Le château échoit à leur fils François, comte de Bertier lors d'un partage entre ce dernier et sa sur Germaine. François meurt à Bonrepos en 1916 et laisse sa sur comme unique héritière. Celle-ci, devenue veuve, vend en 1931 le château à une demoiselle Fonvieille, qui épouse peu après le docteur Henri Marceillac, originaire de Verfeil. Au décès du docteur Marceillac, en 1953, sa famille vend le domaine au colonel Fournier, suite à une indivision entre les enfants du colonel Fournier cédèrent le domaine à la Safer en 2007 qui le revende à la commune  Bonrepos-Riquet  qui devient  classé au patrimoine mondial de l'UNESCO. La famille Fournier y demeure toujours ainsi qu'une association de Sauvegarde.\r\nA St-Jean de l'Herm le château de BARRAVIT  pas d'information historique.","architecture":"Bonrepos, le château Renaissance passablement délabré, entouré de défenses en très mauvais état en une agréable demeure dans le style austère du XVIIe siècle. Le château est reconstruit de 1654 à 1666 , en conservant plusieurs éléments militaires hérités de la maison-forte antérieure, aménagée durant les guerres de religions : fossés secs, cour intérieure close , corps de logis fortifié à l'est de deux imposantes tours carrées et à l'ouest par deux tourelles rondes en poivrière. Ils se présentent sous la forme dun corps de bâtiment principal en forme de U flanqué à ses extrémités ouest de deux petits corps. Ces derniers sont la conséquence de remaniement du milieu du XVIIIe siècle alors que lédifice central date de lépoque de Pierre-Paul Riquet, le génial concepteur du Canal du Midi. Dans cette dépendance, étaient regroupées différentes activités agricoles et domestiques. Y sont partiellement conservés aujourdhui les écuries, la sellerie, le chai, lancienne orangerie, la grange et les greniers. Situés à lentrée du site, les communs proposent une architecture de qualité et des espaces à fort potentiel de valorisation. Le projet de réhabilitation et de mise en valeur du château de Bonrepos-Riquet organise cet ensemble en un pôle accueil aux publics et administration.                                                                                                                   BARRAVIT de plan rectangulaire à trois  niveaux toit en croupe flanqué aux angles de tours carrées arrasés.","habitants":"Famille de Pierre-Paul Riquet\r\n        \"","divers":"Château de Bonrepos et de  Baravit à St-Jean de L'Herm","gps":"","images":["../../jctruffet.com/image/image_31/31_Bonrepos_Riquet_1.jpg","../../jctruffet.com/image/image_31/31_Bonrepos_Riquet_2.jpg","../../jctruffet.com/image/image_31/31_Bonrepos_Riquet_3.jpg","../../jctruffet.com/image/image_31/31_Bonrepos_Riquet_4.jpg","../../jctruffet.com/image/image_31/31_Bonrepos_Riquet_5.jpg","../../jctruffet.com/image/image_31/31_Bonrepos_Riquet_6.jpg","../../jctruffet.com/image/image_31/31_Bonrepos_Riquet_7.jpg"]},"Consult_chateau_formulaire9641":{"id":"Consult_chateau_formulaire9641","dept":"31","canton":"Cazères","commune":"Boussan","nom":"Boussan_Nine","type":"Vestiges","periode":"XIII","histoire":"trois châteaux à Boussan dont  les vestiges de Boussan, celui de Nine et à 10 km au nord celui de Labatut à Saint-André                                                                            BOUSSAN,  au XIIe siècle, un château fort est construit. il fut démoli par une jacquerie entre 1358 et 1360. Au cours du XIVe siècle, Bolsano était devenu Bossano qui fit, peu de temps après, Bossan, avant de prendre définitivement le nom de Boussan au XVIIe siècle.  Aujourd'hui, il reste que des vestiges de ce fort,  il est probable quune construction précédente existait et aurait été un rendez-vous de chasse de Henri IV. La construction du château est l'oeuvre d'Emmanuel de Valence pour son fils aîné Jean-François, qui doit hériter des terres de Boussan.                                                                                                                                              LABATUT, plusieurs seigneuries, se partagèrent le territoire de Saint-André qui reçut ses coutumes du comte de Comminges dès 1299 et fut appelé Montdésert au XIIe siècle. Au XVe siècle le seigneur de Benque délaisse son château-fort de \"Castel désert\" pour l'ancien pavillon de chasse de Labatut. L'histoire du village rendue complexe en raison de la redistribution des droits féodaux par héritage, mariage et acquisition, est depuis 1655 intimement liée à celle de la famille d'Encausse puis de la famille de Galard dont est originaire le maire actuel, Jean de Galard régulièrement réélu depuis son premier mandat en 1959.                                                                                                                                               NINE,  il est probable quune construction précédente existait et aurait été un rendez-vous de chasse de Henri IV.   Propriété de la baronne G. de Lassus Saint-Geniès. (Henri Joseph Prosper Gaston De Lassus de  Saint-Geniès) secrétaire général de la compagnie des chemins de fer Algériens,  né le 21 janvier 1851  à Toulouse,  décédé le 26 juillet 1896.  Préfet sous le II Empire, marié le 23 septembre 1881, dans cette famille jusqu'en 1965.","architecture":"Boussan, du château du  XIIIe siècle ne subsiste qu'une tour carrée, découronnée, à laquelle se rattachent le mur d'un logis.                                 cest un petit « Castelnau gascon » qui naquit au XIe siècle, un village qui prospéra au cur des temps médiévaux, puis déclina sans doute au crépuscule du Moyen-Âge. Il est le vestige simple et émouvant de ce qui peut encore nous faire percevoir la vie de nos lointains ancêtres du XIIIe siècle, dans une des plus anciennes provinces françaises, qui est aussi lune des plus pittoresques, le Comminges.                                                                              Labatut, à l'extérieur du village,  du château de Labroquère qui surveillait la vallée de la Noue, celui de Labatut, de remarquables demeures bourgeoises et de belles fermes aux murs de pierre.                                                                                                                                             Nine, le bâtiment, est flanqué de tours, également sans étage sur la façade principale, et de l'autre côté sont les communs. Mais ce qui donne un caractère tout à fait particulier à cette demeure, construite à la fin du XVIIe siècle, ce sont les deux galeries, longues de trente-deux mètres chacune, qui traversent l'édifice, formant une croix, surmontée à l'intersection par une coupole.","habitants":"Baronne G. de Lassus Saint-Geniès\r\n        \"","divers":"Vestiges de Boussan, château de Labatut et de Nine avec dépendances","gps":"","images":["../../jctruffet.com/image/image_31/31_Boussan_Nine_1.jpg","../../jctruffet.com/image/image_31/31_Boussan_Nine_2.jpg","../../jctruffet.com/image/image_31/31_Boussan_Nine_3.jpg","../../jctruffet.com/image/image_31/31_Boussan_Nine_4.jpg","../../jctruffet.com/image/image_31/31_Boussan_Nine_5.jpg","../../jctruffet.com/image/image_31/31_Boussan_Nine_6.jpg"]},"Consult_chateau_formulaired0b5":{"id":"Consult_chateau_formulaired0b5","dept":"31","canton":"Toulouse-7","commune":"Brax","nom":"Brax","type":"Château","periode":"XIV","histoire":"BRAX, fut autrefois un lieu fortifié dépendant du comté de L'Isle-Jourdain et jusqu'au XVIIe siècle eut pour seigneurs la noble famille des Montfort, et notamment Géraud de Montfort, juge royal et bailli d'Auterive, et Pierre de Montfort, conseiller au parlement de Toulouse en 1582.  Un Jean de Montfort fut capitoul de Toulouse en 1468 à 1484.  Les archives de la commune remontent à Françoise de Seysses, dame de Brax qui avait acheté le village à une autre dame, Marie Ducos, seigneuresse de Brax. On connaît un acte du parlement de Toulouse du 18 juin 1581 à ce sujet.  Arnaud de Faya semble être à lorigine de lune des premières constructions du château de Brax. Cette dame devait épouser Jean de Polastron et on peut estimer que c'est aussi la date de la construction,  en 1628, le château appartenait à la famille de Pins qui devait, à nouveau, en hériter à la fin du XIXe siècle et le conserver jusqu'en 1939. C'est le comte de Pins-Montbrun qui était le maire de Brax avant, pendant et après la grande guerre de 1914-1918.    Entre ces dates, le château avait appartenu aux familles de Polastron, Lahillère et de Hérisson.  Le château a été acheté en 1967 par l'association des enfants invalides qui l'a aménagé en « centre de rééducation de l'ouïe et de la parole ». On y éduque environ 90 sourds-muets ou malentendants.","architecture":"Brax est un vieux village blotti au pied du château comtal du XIVe siècle. sur le ruisseau de la Chauge, de ce château élégant avec ses hauts pignons et ses fenêtres mansardées qui fait l'orgueil du village actuel. La tour, le donjon et la chapelle ont disparu vers la Révolution. Le château de Brax est un château comtal du XVIe siècle. La construction du château de Brax date du XVIe et XVIIIe siècle.  Cet édifice est cantonné de 4 tours circulaires crénelées avec  mâchicoulis et toitures en poivrières. Le bâtiment contient un grand escalier. Il est accolé après. C'est une construction en briques dont les murs sont couronnés de créneaux. La façade principale se développe sur le parc, et l'accès se fait par un perron à double rampe. Un chemin de ronde porté par de faux mâchicoulis formés d'encorbellement de briques et de petites arcatures, ceinture l'ensemble de la construction.Les lieux se prêtent parfaitement à limplantation dun édifice fortifié.  Ce dernier est érigé entre 1346 et 1356.  Des murs denceinte entourent les bâtiments, protégeant les seigneurs déventuels envahisseurs ou brigands.  La toiture primitive était couverte de plomb et surmontée dune aiguille pour les armes de la famille. Le poids était tel quil menaçait deffondrement lensemble du château. Aussi la toiture a-t-elle été refaite avec des ardoises. \r\nAu XVIe siècle, le donjon, alors situé au-dessus du perron actuel, est démoli. Il est probable que le roi Henri IV a séjourné au château lors de lune de ses campagnes.  En 1934, un incendie ravage une partie du château, qui est restaurée peu de temps après.","habitants":"Famille des Montfort\r\n        \"","divers":"Château de Brax","gps":"","images":["../../jctruffet.com/image/image_31/31_Brax_1.jpg","../../jctruffet.com/image/image_31/31_Brax_2.jpg","../../jctruffet.com/image/image_31/31_Brax_3.jpg","../../jctruffet.com/image/image_31/31_Brax_4.jpg","../../jctruffet.com/image/image_31/31_Brax_5.jpg"]},"Consult_chateau_formulaireee62":{"id":"Consult_chateau_formulaireee62","dept":"31","canton":"Castelginest","commune":"Bruguières","nom":"Bruguières","type":"Château","periode":"XVII","histoire":"BRUGUIERES, le fort, à limage de celui de la plupart des villages proches, a été élevé ou consolidé lors de la guerre de cent ans pour se protéger des exactions des bandes armées du Prince Noir ou de Gaston Phébus qui sévissaient dans la région. Il a été entretenu jusquen juin 1595 où, devant larmée du Duc de Ventadour, on a ouvert les portes contrairement à Fenouillet où devant la résistance, la garnison a été tuée. Mais la terre est aux mains des riches familles toulousaines, magistrats ou marchands. Du XIV au XVIe siècle, on trouve de nombreux capitouls seigneurs ou co-seigneurs de Bruguières. Les choses sont plus claires à partir de 1560, le seigneur de St-Jory, Michel Dufaur rachète la juridiction de Bruguières. Il y aura Charles, Pierre, puis Jacques Dufaur. Ensuite en 1613 ce sera la lignée des « dOlive » avec rachat de la juridiction par Jean dOlive. Le plus fameux seigneur pendant 55 ans étant Georges dOlive conseiller du parlement qui, à lépoque de Louis XIV en 1657, a rebâtit le château actuel sur la place, comme en témoigne linscription au dessus de la porte principale. Il investit en 1675 dans le premier établissement de faïence à Toulouse. Nayant quune fille Marie-Anne dOlive, elle se marie avec François Brandouvin de Balaguier, marquis de Beaufort. Ce dernier sera seigneur de Bruguières jusquà sa mort en 1723. Sa veuve, Marie-Anne dOlive, prendra la suite jusquà ce soit leur fils, Joseph de Beaufort, lieutenant (1711-1765), qui reprenne le titre. Un de leurs 11 enfants, Joseph-Michel de Beaufort, lui aussi militaire, (1746-1795) sera le dernier seigneur de Bruguières. Il connaîtra une fin tragique comme émigré aux côtés des Anglais à Quiberon en Vendée. Contrairement à son père qui résidait à Bruguières, ce dernier était plus souvent à Paris où il sétait marié en 1781.","architecture":"À la fin du Moyen-Âge, à l'époque des guerres  de Cent Ans, le village s'entoure d'une enceinte fortifiée, comme tous les villages des alentours, était entouré dune enceinte, sans doute de 8 à 10 m de hauteur, avec fossé. On en parle à propos de « travaux à y réaliser » en 1382  en subsiste la disposition resserrée des maisons autour d'un puits, ainsi que le nom de rue du Fort. Cependant, on crée hors les murs une vaste place rectangulaire (plus grande que celle du Capitole de Toulouse) avec sur le côté Est le château du Castelet.                                                                                                  Château de Bruguières, à côté de la mairie et datant du XVIIe siècle, défiguré par l'extension ancienne de lhôtel-restaurant occupant encore les murs. Une des quatre tours d'angle a disparu «Le château a été cédé à Promologis, un bailleur social qui envisage d'y faire une vingtaine d'appartements. Les murs et l'enceinte seront conservés mais tout sera refait à l'intérieur. C'est un programme de qualité mais surtout c'est une opération qui est bonne pour la ville.","habitants":"Famille de Jean d'Olive\r\n        \r\n        \"","divers":"Château de Bruguières","gps":"","images":["../../jctruffet.com/image/image_31/31_Bruguieres_1.jpg","../../jctruffet.com/image/image_31/31_Bruguieres_2.jpg","../../jctruffet.com/image/image_31/31_Bruguieres_3.jpg"]},"Consult_chateau_formulaire90b0":{"id":"Consult_chateau_formulaire90b0","dept":"31","canton":"Villemur sur tarn","commune":"Buzet-sur-Tarn","nom":"Buzet_sur_Tarn","type":"Château","periode":"XVII","histoire":"Deux  châteaux à Buzet-sur-Tarn, celui de Conques , de la Laurentie  et à cinq kilomètres au Nord-Ouest à Bessières le château de Castelrives, pas d'information historique pour ce   dernier.                                                       .                            CONQUES hôtel restaurant de madame Daguin.                                                                    LAURENTIE fut le théâtre dun tragique et sinistre épisode du règne du roi Louis XI de France.  Le seul rescapé mâle de la maison d'Armagnac fut, semble-t-il, Charles Ier d'Armagnac qui ne dut sans doute la vie qu'au fait de ne pas avoir de descendants.  Ayant cédé son comté à Alain d'Albret, il finit misérablement, aux mains des curateurs. Charles Ier d'Armagnac, comte d'Armagnac, vicomte de Fézensaguet, était né en 1425 et décéda sans postérité le 3 juin 1497 à Castelnau-de-Montmiral, à l'âge de 72 ans. Il s'était marié le 26 novembre 1468 à Castelnau-de-Médoc avec Catherine de Foix-Candale, fille de Jean de Foix, comte de Benauges et de Kendall, vicomte de Castillon et de Meilles Captal de Buch, (1410 -1485) et de Margaret Kerdeston de La Pole Suffolk (1426-1485).","architecture":"Conques, de plan rectangulaire à trois niveaux et attiques toiture en croupe, donjon à l'écart de plan carré à cinq niveaux avec terrasse.                                                                                                                                     Château de Laurentie,   construit au XVIIe siècle, lové au cur d'un magnifique parc de 5 hectares, l'immense demeure de trois niveaux avec série de lucarne sur toit et pavillon saillant au centre de l'édifice, flanqué de tour rondes et carrées à toit très pointus  et ses élégantes façades ornées de statues et de vitraux d'époque a séduit le groupe Garrigae, un nom très connu dans le monde des rénovations de sites d'exception,  demeure  avec d'élégantes façades ornées de statues et de vitraux d'époque. A priori, tous les éléments architecturaux remarquables de l'édifice, escalier monumental, plafonds, miroirs, vitraux, ou encore statues, seront conservés et restaurés. Le projet évoque également la création de salles dédiées aux réceptions et séminaires dans l'ancienne grange. Un espace relaxation avec salles de soins, hammam, bassin intérieur sera construit dans l'orangerie.                                                                                                                  Castelribes de style napoléonien du XVIIIe siècle bâtisse à deux niveaux par éléments décalés flanqué d'une échauguette et d'une tourelle  trés hautes et une tour ronde sur angles toit en poivrière.","habitants":"Comte d'Armagnac\r\n        \"","divers":"Châteaux de Conques de Laurentie et de Castelrives à Buzet sur Tarn","gps":"","images":["../../jctruffet.com/image/image_31/31_Buzet_sur_Tarn_1.jpg","../../jctruffet.com/image/image_31/31_Buzet_sur_Tarn_2.jpg","../../jctruffet.com/image/image_31/31_Buzet_sur_Tarn_3.jpg","../../jctruffet.com/image/image_31/31_Buzet_sur_Tarn_4.jpg","../../jctruffet.com/image/image_31/31_Buzet_sur_Tarn_5.jpg","../../jctruffet.com/image/image_31/31_Buzet_sur_Tarn_6.jpg","../../jctruffet.com/image/image_31/31_Buzet_sur_Tarn_7.jpg","../../jctruffet.com/image/image_31/31_Buzet_sur_Tarn_8.jpg","../../jctruffet.com/image/image_31/31_Buzet_sur_Tarn_9.jpg"]},"Consult_chateau_formulaireb248":{"id":"Consult_chateau_formulaireb248","dept":"31","canton":"Cadours","commune":"Cadours","nom":"Cadours","type":"Château","periode":"XVI","histoire":"Cadours; château de Basseillac;  de Sainte-Livrade, de Vignaux et de Puységur.  Mis à part Sainte-Livrade pas d'information pour les autres châteaux.                                                                                                                                            Sainte-LIVRADE  En 1604, le curé du village, propriétaire du château, du pigeonnier et de quelques terres, légua tous   ses biens aux pauvres, apparemment fort nombreux dans le village. Mais après un long procès, les héritiers récupèrent une partie de lhéritage. Au début du XVIIIe siècle, les registres communaux recensent deux cent soixante habitants essentiellement des agriculteurs.","architecture":"Basseliac, ,château de plan quadrangulaire à deux niveaux et attiques  crénelées, flanqué de tours carrées en angles à trois niveaux crénelés   toit plats en terrasses.                                                                                                            Sainte-Livrade de plan rectangulaire à deux niveaux fronton en façade  et pavillon d'angle.                                                                                                                      Vignaux,  corps de logis rectangulaire à trois niveaux et attiques toit en croupe,  flanqué de deux tourelles d'angles en façade à toit conique.","habitants":"Seigneurs locaux\r\n        \"","divers":"Châteaux de Basseliac de Sainte-Livrade, de Vignaux et  de Puységur au environ de Cadours","gps":"","images":["../../jctruffet.com/image/image_31/31_Cadours_1.jpg","../../jctruffet.com/image/image_31/31_Cadours_2.jpg","../../jctruffet.com/image/image_31/31_Cadours_3.jpg","../../jctruffet.com/image/image_31/31_Cadours_4.jpg"]},"Consult_chateau_formulaireb297":{"id":"Consult_chateau_formulaireb297","dept":"31","canton":"Escalquens","commune":"Calmont","nom":"Calmont","type":"Forteresse","periode":"XIII","histoire":"CALMONT, situé aux confins du Toulousain et du Comté de Foix, le village fut très vite l'objet de contestations. Il y eut partage, en 1230, entre les héritiers d'Otton de Léran et l'abbé de Saint-Sernin.
