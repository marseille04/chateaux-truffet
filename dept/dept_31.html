mmobilière. Seuls les bâtiments inscrits au titre des monuments historiques subsistent.","habitants":"Famille Latécoère \r\n        \"","divers":"Château de Lespinet à Montraudan-Toulouse","gps":"","images":["../../jctruffet.com/image/image_31/31_Lespinet_1.jpg","../../jctruffet.com/image/image_31/31_Lespinet_2.jpg","../../jctruffet.com/image/image_31/31_Lespinet_3.jpg","../../jctruffet.com/image/image_31/31_Lespinet_4.jpg","../../jctruffet.com/image/image_31/31_Lespinet_5.jpg"]},"Consult_chateau_formulairebbb0":{"id":"Consult_chateau_formulairebbb0","dept":"31","canton":"Saint-Gaudens","commune":"Lespugue","nom":"Lespugue","type":"Vestiges","periode":"XIII","histoire":"LESPUGUE, il s'agit des ruines du château médiéval de Lespugue, mais aussi un \"site préhistorique remarquable renommé par la découverte de la Vénus Lespugue\". La Motte et Mirepoix-d'en-Bas, elles étaient commandées par le château de Lespugue, importante place forte bâtie en bordure du précipice sur le versant Est des gorges, et celui de Roquebrune. Les vestiges du château de Lespugue, avec de magnifiques arbres semblent vouloir protéger, datent du XIVe siècle. Le site est interdit au public car non sécurisé et donnant sur une falaise. Il était probablement délimité par un mur d'enceinte, par la Prade (affluent de la Save) et par les gorges de la Save.","architecture":"\"Les vestiges du château de Lespugue, datent du XIVe siècle.  La tour de guet étant donner sa position, juste sur le bord du précipice donnant sur les gorges de la Save. J'ai rejoint le plus grand corps architectural en longeant le bord de la falaise. Le château de Lespugue fut érigé au XIIIe ou au XIVe siècle. Il en subsiste encore les ruines imposantes de deux donjons, de grands murs pourvus de fenêtres géminées et une chapelle castrale pavée de galets. Sur le versant opposé des gorges se trouvait le château de Roquebrune qui relevait sans doute de la seigneurie de Mirepoix. Assez tôt disparu (le dernier texte qui s'y réfère date de 1343), il n'en restait déjà plus que quelques rares vestiges au XVIIIe. Des villages ont pu être inclus dans les enceintes de ces deux châteaux mais ils auraient été supplantés par la fondation de la bastide de Montmaurin au début du XIVe siècle\r\nQuelques pans de mur, une baie géminée, des pavements en galets de rivière formant des dessins géométriques sont les derniers témoignages de son existence. L'une des pièces pourrait être une chapelle castrale à chevet plat.","habitants":"seigneurie de Mirepoix\r\n        \"","divers":"Vestiges du château de Lespugue","gps":"","images":["../../jctruffet.com/image/image_31/31_Lespugue_1.jpg","../../jctruffet.com/image/image_31/31_Lespugue_2.jpg","../../jctruffet.com/image/image_31/31_Lespugue_3.jpg","../../jctruffet.com/image/image_31/31_Lespugue_4.jpg","../../jctruffet.com/image/image_31/31_Lespugue_5.jpg","../../jctruffet.com/image/image_31/31_Lespugue_6.jpg"]},"Consult_chateau_formulaire6534":{"id":"Consult_chateau_formulaire6534","dept":"31","canton":"Auterive","commune":"Longages -comminges","nom":"Longages","type":"Château féodal","periode":"XVI","histoire":"LONGAGES,   château construit à partir de 1482 par Roger de Comminges, Vicomte de Bruniquel.   Dans la seconde moitié du XVIe siècle, le château est bâti sur les terres du prieuré dépendant de l'ordre de Fontevrault. Au début du XVIIe siècle, le château passe à la famille du comte de Comminges et y reste jusqu'au début du XVIIIe siècle.                                                                                                      Sainte MARIE, dans la seconde moitié du XVIe siècle, le château est bâti sur les terres du prieuré dépendant de l'ordre de Fontevrault. Au début du XVIIe siècle, le château passe à la famille du comte de Comminges et y reste jusqu'au début du XVIIIe siècle. Ces vestiges confirment que le château était occupé par d'illustres familles locales telles que les Comminges-Bruniquel dès le début du XVIe siècle ou les frères Abolin, apothicaires du roi de Naples et du roi d'Espagne au XVIIIe siècle.aujourd'hui Dieudonné Duriez-Costes et son fils Déodat.","architecture":"Château de Longages dans un parc clos avec porterie fortifiée, colombier, portail à colonnes de marbre, ruisseau et vivier.  Dans la seconde moitié du XVIe siècle,  l'édifice se présente comme un quadrilatère cantonné de quatre tours d'angle crénelées avec mâchicoulis. De structure défensive il fut toutefois aménagé pour une vie de plaisance comme en témoigne la façade Est, la seule vraiment authentique avec des fenêtres Renaissance ornées de pilastres et chapiteaux. Les autres façades ont été remaniées. Hormis l'escalier à vis dans la tour sud-ouest, l'intérieur a été complètement réaménagé au XIXe siècle. Dans le prolongement des communs, portail du XVIIe siècle, à décor en damier de briques et pierre. Le château du Prieuré corps de logis de plan carré à deux niveaux toit en croupes flanqué de quatre tours, deux carrées avec mâchicoulis et créneaux deux rondes à l'opposée toit de style asiatique.                                                                        Sainte-Marie, dans la seconde moitié du XVIe siècle, le château est bâti sur les terres du prieuré dépendant de l'ordre de Fontevrault. Au début du XVIIe siècle, le château passe à la famille du comte de Comminges et y reste jusqu'au début du XVIIIe siècle. L'édifice se présente comme un quadrilatère cantonné de quatre tours d'angle. De structure défensive il fut toutefois aménagé pour une vie de plaisance comme en témoigne la façade Est, la seule vraiment authentique avec des fenêtres Renaissance ornées de pilastres et chapiteaux. Les autres façades ont été remaniées. Hormis l'escalier à vis dans la tour sud-ouest, l'intérieur a été complètement réaménagé au XIXe siècle. Dans le prolongement des communs, portail du XVIIe siècle, à décor en damier de briques et pierre.","habitants":"Roger de Comminges\r\n        \"","divers":"Château  de sainte-Marie et prieuré  à Longages","gps":"","images":["../../jctruffet.com/image/image_31/31_Longages_1.jpg","../../jctruffet.com/image/image_31/31_Longages_2.jpg","../../jctruffet.com/image/image_31/31_Longages_3.jpg","../../jctruffet.com/image/image_31/31_Longages_4.jpg","../../jctruffet.com/image/image_31/31_Longages_5.jpg","../../jctruffet.com/image/image_31/31_Longages_6.jpg"]},"Consult_chateau_formulairebaab":{"id":"Consult_chateau_formulairebaab","dept":"31","canton":"Revel","commune":"Loubens-Louragais","nom":"Loubens_Louragais","type":"Forteresse","periode":"XIII","histoire":"Deux châteaux à Loubens celui de Loubens et celui de Scopont pas d'information historique pour ce dernier.                                                                               LOUBENS  fondé en forteresse au XIIe siècle attribuée à Guillaume de Loubens  au XVIe siècle Jacques de Loubens baron de Verdalle gouverneur de la ville de Béziers et conseiller d'état fait des remaniements dans le style de la Renaissance, en 1711 extinction   de la famille des Loubens de Verdalle sans postérité le domaine se transmet à sa soeur Anne qui épouse depuis 1699  à  Raymond de Buisson  marquis de Bournazel   qui s'en séparent en 1768   vendu à Joseph-François  de Gounon, capitoul de Toulouse, son fils Jean-Matthieu poursuit les rénovations commencés et sera continué par ses trois fils Victor, Jules, et Alphonse seul à avoir une fille Clothilde-Louise  de  Gounon-Loubens   épouse  de Thonel d'Orgeix  marquis toujours dans la famille,    23 générations ont laissé l'empreinte de leur personnalité et de leur époque.","architecture":"Loubens  prend sa forme originelle à un château de style médiéval en l'agrémentant d'une touche contemporaine. Remanié au fil des ans en forteresse;  le pari de l'architecte est de reconstruire entièrement ce château d'époque médiévale terminé à la Renaissance, jouxtant  le donjon, corps de logis rectangulaire à trois niveaux et attiques flanqué de deux tours rondes à toit coniques presque plat percées de canonnières et côté parc  une tourelle d'escalier hors  oeuvre  édifié entre le donjon  et les nouveaux corps de logis décor sculpté  sur la porte d'entrée de la tourelle d'escalier évoque un arc de triomphe, la porte en plein cintre est encadrée de colonnes engagées à châpitaux corinthiens et est surmontée d'un panneau mouluré et  fenêtres à meneaux.                                                            Scopont  de plan rectangulaire à trois niveaux  toit en croupes accolé de deux tours hexagonale sur angle de la façade principale.","habitants":"Famille de Jacques de Loubens \r\n        \"","divers":"Château de Loubens et de Scopont","gps":"","images":["../../jctruffet.com/image/image_31/31_Loubens_Louragais_1.jpg","../../jctruffet.com/image/image_31/31_Loubens_Louragais_2.jpg","../../jctruffet.com/image/image_31/31_Loubens_Louragais_3.jpg","../../jctruffet.com/image/image_31/31_Loubens_Louragais_4.jpg","../../jctruffet.com/image/image_31/31_Loubens_Louragais_5.jpg","../../jctruffet.com/image/image_31/31_Loubens_Louragais_6.jpg","../../jctruffet.com/image/image_31/31_Loubens_Louragais_7.jpg","../../jctruffet.com/image/image_31/31_Loubens_Louragais_8.jpg","../../jctruffet.com/image/image_31/31_Loubens_Louragais_9.jpg"]},"Consult_chateau_formulairec0e3":{"id":"Consult_chateau_formulairec0e3","dept":"31","canton":"Léguevin","commune":"Lévignac sur save","nom":"Lévignac","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux à Lévignac sur Save celui de Faulade et la maison du Barry de monsieur Paul.                                                                                                                                               FAUDADE château du XIXe siècle bicentenaire hôtellerie                                                                           Hôtel du Barry  Lévignac  un monument historique  ou le château de Lévignac est un pur joyau du XVIIIe siècle. Le seul représentant du style troubadour en France, légué au patrimoine architectural par la favorite de Louis XV qui en a fait sont hôtel particulier.","architecture":"Château du Barry de plan en U et composé d'un corps de logis central à trois niveaux toit en croupe prolongé de chaque côté par deux prolongement avec galerie au premier étages et tourelle sur l'arrière.                                                                                                                   Faudade de plan rectangulaire à deux niveaux toiture en croupes flanqué à chaque angles de frontons triangulaires.","habitants":"Madame du Barry\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Taulade et le château du Barry à Lévignac","gps":"","images":["../../jctruffet.com/image/image_31/31_Levignac_1.jpg","../../jctruffet.com/image/image_31/31_Levignac_2.jpg","../../jctruffet.com/image/image_31/31_Levignac_3.jpg"]},"Consult_chateau_formulairef64d-2":{"id":"Consult_chateau_formulairef64d-2","dept":"31","canton":"Saint-Gaudens","commune":"Labarthe-Inard","nom":"Maguère","type":"Château","periode":"XIX","histoire":"MAGUERE,   Pierre et Eliane Monnereau se sont pris d'affection. Ils se sont installés en 1997 et ont redonné vie au château. Un  texte vu au plafond. Il est signé d'Auguste Péres, sous-officier du 95ème escadron, daté du 17 novembre 1892 et reprend le message du général Lapasset lu à ses hommes le 28 octobre 1870 au lendemain de la capitulation de l'armée française lors de la guerre avec la Prusse.Sur le mur de « La Maguère » il est écrit: « Général Lapasset à sa brigade. Officiers, sous-officiers et soldats. Ne pouvant manquer à la discipline, un brave ne peut le faire sans commettre une grande faute, la Patrie meurtrie réclame de ses enfants un acte d'héroïsme. Que nos coeurs soient unis pour la même volonté. Nous ne voulons pas trahir nos drapeaux. Ne nous faisons pas complice de leur trahison. Le drapeau national a parcouru les 5 parties du monde.","architecture":"Maguère, construction néogothique de la fin du XIXe siècle,  corps de logis à deux niveaux  avec série de lucarne sur un toit en croupe, de plan triangulaire avec tour ronde à l'angle accolé à un pavillon saillant du bâtiment principal et autre tour ronde plein cintre  ainsi à l'opposée tour hexagonale  avec toit pointu à six pans.","habitants":"Général Lapasset \r\n        \r\n        \"","divers":"Château de Maguère à Labarthe-Inard","gps":"","images":["../../jctruffet.com/image/image_31/31_Maguere_1.jpg","../../jctruffet.com/image/image_31/31_Maguere_2.jpg","../../jctruffet.com/image/image_31/31_Maguere_3.jpg","../../jctruffet.com/image/image_31/31_Maguere_4.jpg","../../jctruffet.com/image/image_31/31_Maguere_5.jpg"]},"Consult_chateau_formulaire2b2e":{"id":"Consult_chateau_formulaire2b2e","dept":"31","canton":"Toulouse-9","commune":"L","nom":"Malpagat","type":"Château","periode":"XIX","histoire":"MALPAGAT,  le château actuel a été construit en 1845 sur les ruines dun manoir incendié en 1805. Le domaine avait été acheté en décembre 1843 par Jacques-Henry Dufay, baron de Launaguet, préfet de Montauban, puis maître des requêtes au conseil dÉtat. Son tombeau se trouve dans la chapelle, devant léglise actuelle. Ce château a été restauré par un architecte installé à Launaguet, Auguste Virebent.  Le château de Malpagat du XIXe siècle, à l'intérieur du parc de même nom, accueille à présent entre autres l'association des arts plastiques et l'école de musique.","architecture":"MALPAGAT, ce fut en 1840 que Géraud Lestrade, propriétaire du domaine de Saint-Caprais fit construire la belle résidence et aménager le parc qui devinrent le château de Saint-Caprais. Cette dénomination évolua et se transforma en château de Malpagat, qui signifie parait-il \"mal payés\", les \"ont dit\" véhiculant le bruit que les ouvriers bâtisseurs avaient été mal payés. En 1984 la transformation des terres du domaine en lotissement permis à la commune de recevoir en donation l'immeuble et le parc.  Le château de Malpagat est bien connu du milieu associatif unionais. Pendant l'année il est le théâtre d'expositions, de créations et d'érudition relatées dans nos colonnes. C'est également un parc où la balade est agréable.  Ce qui surprend surtout c'est la grandeur des arbres, un gigantesque cèdre du Liban trône fièrement au milieu du parc tandis que lui fait face un immense chêne vert. L'été 2009 ne dérogera pas à la règle et Malpagat sera encore un lieu de rencontre entre le rêve et la culture.","habitants":"Jacques-Henry Dufay\r\n        \"","divers":"Château de Malpagat à l'Union","gps":"","images":["../../jctruffet.com/image/image_31/31_Malpagat_1.jpg","../../jctruffet.com/image/image_31/31_Malpagat_2.jpg","../../jctruffet.com/image/image_31/31_Malpagat_3.jpg"]},"Consult_chateau_formulairec2a2":{"id":"Consult_chateau_formulairec2a2","dept":"31","canton":"Bagnères de Luchon","commune":"Marignac","nom":"Marignac","type":"Château-Vestiges","periode":"XII","histoire":"Deux châteaux à Marignac celui de Mr. Ebelot, celui de Talazac  et une tour de guet    entre le village et le hameau de Saint-Martin et trois châteaux : celui dEspouy, celui de Sacère (accolé à léglise et partiellement détruit à la Révolution), et le château Lucien Saint.                                                                                                                                        datant de l'époque gallo-romaine) rénovée en 2003, communiquait avec les autres tours de la vallée de la Pique, cette tour portant le numéro 14, selon la carte dressée par l'ingénieur Toussaint Lézat, fait partie d'un ensemble de 19 tours qui formaient un grand système de signaux servant à prévenir la plaine et à avertir les vallées.\r\nTALAZAC, De Verdalle de Saint-Martin et seigneur Carsalade du Pont relatent la présence de Jean de Larrieu, seigneur de Marignac qui fit bâtir son château à la sortie du village, lequel château fut restauré par monsieur Talazac, Marignacais installé à Port Saïd en 1865. Monsieur de Larrieu, aurait sous Henri IV formé le premier régiment de cavalerie française et fondé l'école de Saumur en 1594.  Bertrand de Fondeville - Labatut, qui résidait au château d'Espouy.    Marie Labatut (1890  1979) - antiquaire décoratrice à Paris, originaire dAurignac, acheta le château à la famille Saint. Elle fut la créatrice du style \"Primavera\". Elle est inhumée dans le cimetière de la commune.  Henri Ebelot ( 1831  1902) - brillant avocat, maire de Toulouse, propriétaire du château d'ESPOUY à Marignac. Louis Ebelot - maire de Marignac de 1904 à 1908.   Alfred Ébelot (1837  1912) - frère de Henri Ebelot, ingénieur de l'école centrale des arts et manufactures, promotion 1863. Il prit part aux travaux de construction de La Plata (République d'Argentine), en qualité d'ingénieur arpenteur.  Paul Talazac  maire de Marignac de 1908 à 1919.  marquis de Noé, propriétaire du château d'Espouy, baron de Sacère, dont le château comportant une pierre datée de 1265 est accolé à l'église.","architecture":"une gentilhommière se trouve à l'entrée du village sur la route principale, nommée Les Bengalis  ancienne maternité. Deux autres sont construites à la sortie du village sur la même voie. La première constituée d'une tour hexagonale et d'une galerie du XVIIe siècle. La deuxième quant à elle fut l'ancienne habitation de Jean de Larrieu, seigneur de Marignac qui fit bâtir son château à cet endroit au XVIe siècle. Cependant, la propriété fut laissée à l'abandon et il faudra attendre que M. Talazac, durant la deuxième moitié du XIXe siècle, l'acquière pour entreprendre sa restauration.","habitants":"Talazac de Jean de Larrieu                                                                     Espouy de Henri Ebelot \r\n        \"","divers":"Vestiges de la tour de guet  château de Talazac, d'Espouy et de Saint-Gery","gps":"","images":["../../jctruffet.com/image/image_31/31_Marignac_1.jpg","../../jctruffet.com/image/image_31/31_Marignac_2.jpg","../../jctruffet.com/image/image_31/31_Marignac_3.jpg","../../jctruffet.com/image/image_31/31_Marignac_4.jpg","../../jctruffet.com/image/image_31/31_Marignac_5.jpg","../../jctruffet.com/image/image_31/31_Marignac_6.jpg"]},"Consult_chateau_formulaire3d59":{"id":"Consult_chateau_formulaire3d59","dept":"31","canton":"Toulouse","commune":"Toulouse","nom":"Marmande","type":"Château","periode":"XVIII","histoire":"MARMANDE; s'appelait autrefois le domaine de Marrast, du nom de Jean de Marrast qui en fut propriétaire au début du XVIIe siècle. Ses descendants cédèrent la propriété au riche marchand toulousain Jean de Castel en 1706. Ce dernier fit construire le château sur les bases de l'ancienne maison. Après la Révolution, l'édifice fut confisqué puis vendu au titre de bien national. Entre 1809 et 1829, le bâtiment à gauche du château fut reconstruit sur un plan plus massé. L'industriel Alfred Chouvel acheta Marmande en 1914. Le château conserva son activité agricole . En 1970 Les héritiers d'Alfred Chouvel vendirent le domaine à la croix rouge, qui en fit son siège toulousain et y installa une école d'infirmières et d'assistantes sociales. Cette mutation entraîna de nombreuses modifications : les bâtiments existants furent transformés en salle de cours et d'autres furent construits. Durant une vingtaine d'années, les architectes Paul de Noyers et Dominique Alet aménagèrent le château, ses dépendances et ses terres.  En 1974 fut déposé le permis de construire de l'école d'assistantes sociales et du bâtiment d'hébergement, ainsi que de l'aménagement des communs pour y établir l'école d'infirmières et du château pour y installer l'accueil et l'administration. Les travaux sont achevés en 1985 . Cette même année, la croix rouge obtient la permission d'aménager les petits communs en salle de classe.","architecture":"Symétrie et proportion sont les maîtres mots de ce château du XVIIIe siècle. Le bel équilibre du logis a été conservé malgré les modifications apportées par les propriétaires successifs.. Le bâtiment situé à droite du château a été détruit, et celui de gauche a été modifié. A l'arrière de ce dernier, plusieurs bâtiments ont été édifiés, deux bâtiments rectangulaires allongés perpendiculairement à la demeure, de part et d'autre d'une cour d'honneur.","habitants":"Jean de Castel\r\n        \r\n        \"","divers":"Château de Marmande à Toulouse","gps":"","images":["../../jctruffet.com/image/image_31/31_Marmande_1.jpg","../../jctruffet.com/image/image_31/31_Marmande_2.jpg","../../jctruffet.com/image/image_31/31_Marmande_3.jpg","../../jctruffet.com/image/image_31/31_Marmande_4.jpg"]},"Consult_chateau_formulaire2449":{"id":"Consult_chateau_formulaire2449","dept":"31","canton":"Auterive","commune":"Marquefave","nom":"Marquefave","type":"Château","periode":"XVI-XVIII","histoire":"Plusieurs châteaux à Marquefave, celui d'Auribail, de Dubuc, de Lézat et  de Laprade.                                                                                                                                   MARQUEFAVE, le territoire appartient aux seigneurs portant le nom de Marquefave, dont le premier membre cité est Guillaume Bernard dans une charte de 1121. Guillaume Arnaud épouse en 1162 la fille du comte de Foix, puis la famille apparaît dans les diverses chansons de la croisade contre les Albigeois. La communauté est attaquée en 1355 par le prince noir, fils du roi Edouard, menant un raid punitif dans la région.\r\nAURIBAIL à Marquefave qui sur son site route de Capens englobe un IME (institut médico-éducatif) un ITEP (institut thérapeutique éducatif et pédagogique) et un SESSAD (service éducation spécialisé et soins à domicile). A l'occasion d'une réunion du conseil de gestion de l'établissement Maryse Glandières présidente du conseil d'administration RESO et Jean-Paul Dupont directeur général ont présenté le grand projet qui va transformer l'architecture de cette structure médico-sociale. \r\nLAPRADE pas d'information historique.","architecture":"Château des Lézat-Marquefave du XVIIIe et première moitié du XIXe siècle en brique et enduit.  Handicap, dépendance, soin résument l'activité de l'association résilience Occitanie (RESO) dans ses 35 établissements spécialisés répartis en Tarn et Garonne et en Haute Garonne dont le château d'Auribail à Marquefave qui sur son site route de Capens englobe un IME (institut médico-éducatif) .  Début novembre sera donné le premier coup de pioche de ce grand chantier pour un investissement de l'ordre de 5 millions d' .                                                                                                                         Dubuc de plan quadrangulaire à deux niveaux pavillon saillant d'entrée avec fronton triangulaire l'édifice est accolée à quatre tour carrée en angles  aux toits à quatre pans                                                                                                                                                                                     Laprade de  plan rectangulaire à deux niveaux pour la partie centrale et trois niveaux pour les pavillons de trois travées chacun sur les extrémités.","habitants":"Guillaume Bernard Seigneur de Marquefave\r\n        \"","divers":"Château de Dubuc, d'Auribail, de Laprade de Lezat à Marquefave","gps":"","images":["../../jctruffet.com/image/image_31/31_Marquefave_1.jpg","../../jctruffet.com/image/image_31/31_Marquefave_2.jpg","../../jctruffet.com/image/image_31/31_Marquefave_3.jpg","../../jctruffet.com/image/image_31/31_Marquefave_4.jpg","../../jctruffet.com/image/image_31/31_Marquefave_5.jpg"]},"Consult_chateau_formulairea1d5":{"id":"Consult_chateau_formulairea1d5","dept":"31","canton":"Saint-Gaudens","commune":"Martres de Rivière","nom":"Martres_Rivière","type":"Château","periode":"XIX","histoire":"MARTRE de RIVIERE, en 1542, il est fait mention d'un seigneur, mais on ignore s'il était à la tête de la seigneurie de Martres car les droits seigneuriaux étaient entre les main du Roi. Au XIXe siècle la famille de Sainte-Gème marque son empreinte dans la région. Elle est présente à Sauveterre de Comminges, à Barbazan, et dans la plaine de Rivière. A la fin du XIXe siècle, le vicomte de Sainte-Gème vend le château de Barbazan, il fait construire celui de Martres de Rivière   sa construction a été entreprise par Henri Marie Didier de Sainte-Gème vicomte d'Ustou. Il est le neveu du baron de Sainte-Gème, propriétaire du château de Bagen à Sauveterre de Comminges. En 1989 le château est vendu par la petite nièce de Sainte-Géme Mlle Nancy la Fonta de Sainte-Géme qui conserve les droits de visite et souvenir de sa famille décédée.","architecture":"Martre de Rivière, architecture civile : le château du XIXe siècle en calcaire et briques. Le château a été achevé en 1867, Il est rouge et blanc avec tourelle. Sur le fronton de la porte d'entrée figurent les armoiries de la famille. Elles signalent l'alliance des Sainte-Géme et des Ustou. La grille d'entrée est ornée des loups du Comminges rappelant la passion pour la chasse que nourrissait cette famille au pied des montagnes.\r\nL'ancien château démoli pour permettre la construction du nouveau a peut-être vu le dernier grand mariage du Comminges, avant la Révolution la nièce de l 'évêque de Comminges épousait un de Saint-Géme venu du Gers. Ce château possède aussi une petite chapelle.","habitants":"Famille de Sainte-Gème\r\n        \r\n        \"","divers":"Château à Martres de Rivière","gps":"","images":["../../jctruffet.com/image/image_31/31_Martres_Riviere_1.jpg"]},"Consult_chateau_formulairebb4e":{"id":"Consult_chateau_formulairebb4e","dept":"31","canton":"Cazères","commune":"Martres-Tolosane","nom":"Martres_Tolosane","type":"Château","periode":"XIII-XVII","histoire":"Deux châteaux à Martres Tolosane celui de Thébes, de Mauran village à 2 km à l'Est restaurant  et celui de Saint-Roch.                                                                                                                                          \r\nLe château féodal des frères Montpezat de Carbon, évêque de Saint-Papoul (Aude), puis archevêque de Bourges, sest rendu célèbre dans laffaire de la régale, lorsque, en 1673 et en 1682, Louis XIV décida de percevoir les revenus des évêchés français vacants, ce qui amena dimportants conflits avec lautorité pontificale. Son frère lui succède ensuite à Saint-Papoul, avant dêtre nommé archevêque de Toulouse de 1675 à 1687.                                                                       THEBES du XVIe siècle. Il était alors à la tête dune seigneurie appelée Saint-Martin-les-Martres qui fut vendue en 1572 à Roger de Sarrieu, fils cadet dun seigneur dIzaut. En 1572, il avait aussi épousé Louise de Villemur dune grande famille du comté de Foix qui apporta la baronnie de Saint-Paul et la seigneurie de Mauran à ses deux fils, Henri puis François de Sarrieu.  A la mort sans descendance de ce dernier en 1633, le château passa à la branche aînée des Sarrieu qui étaient aussi seigneurs de Castelbiague, en la personne de Guy de Sarrieu époux de Jeanne de la Tour de Landorthe dont les armes figurent sur la grille du perron.   Ces nouveaux venus entre 1633 et 1647 pourraient être les bâtisseurs du château actuel. Leurs descendants porteront les titres de seigneurs de Martres et de Castelbiague jusquà la Révolution.  En 1809, le château et ses terres  furent vendus à Pierre-Bernardin Thèbe.  Le château reste le centre de gravité de la famille Thèbe dont Louise Thèbe (19021983).                                                                                                                                            Saint-ROCH salles de mariages de  Regis Delort, disposant d'une situation géographique stratégique,   le château Saint-Roch constitue un cadre idéal pour vos séminaires, journées d'étude.","architecture":"Vestiges du château féodal des Montpezat : au XIVe siècle  le château féodal de  Thébes perché sur une éminence, participait à la surveillance de la Garonne du haut de sa tour. Donjon du début du XIIIe siècle.  Le bâtiment a la forme dun grand rectangle. Il est flanqué de quatre tours dangle carrées. Sa façade tournée vers le sud-est, un peu sévère, est un modèle de symétrie et dunité, avec son perron central surélevé qui dessert le premier étage  et les autres niveaux habitables, avec ses hautes baies et ses élégantes lucarnes. Dans les tours dangle, des meurtrières pivotantes rappellent celles du château de Castelbiague, dont le seigneur devint aussi vers 1640 celui de Martres.                                                                                                                              Saint-Roch quadrilatère  à deux niveaux flanqué de quatre tours mi-hors oeuvre aux angles à toit en terrasse sur pavillons d'entrée fronton triangulaire.                                                                                                                                    Mauran, ce château, construit par les fondateurs dune grande compagnie dassurances du second Empire, témoigne de lessor économique et industriel qui bouleverse la région au XIXe siècle.","habitants":"Famille de Guy de Sarrieu                                                                 Famille de Regis Delort\r\n        \r\n        \"","divers":"Château de Thébes, de Saint-Roch de Mauran et vestiges de Montpezat à Martres-Tolosane","gps":"","images":["../../jctruffet.com/image/image_31/31_Martres_Tolosane_1.jpg","../../jctruffet.com/image/image_31/31_Martres_Tolosane_2.jpg","../../jctruffet.com/image/image_31/31_Martres_Tolosane_3.jpg","../../jctruffet.com/image/image_31/31_Martres_Tolosane_4.jpg","../../jctruffet.com/image/image_31/31_Martres_Tolosane_5.jpg","../../jctruffet.com/image/image_31/31_Martres_Tolosane_6.jpg","../../jctruffet.com/image/image_31/31_Martres_Tolosane_7.jpg","../../jctruffet.com/image/image_31/31_Martres_Tolosane_8.jpg"]},"Consult_chateau_formulairef61f":{"id":"Consult_chateau_formulairef61f","dept":"31","canton":"Montgiscard","commune":"Noueilles","nom":"Marty","type":"Château","periode":"XVII","histoire":"MARTY, avant d'être le château-Marty, le château de Noueilles, terminé en 1668, fut celui des comtes Polastron La Hilliere, nobles et seigneurs de Grépiac, de Venerque et de Noueilles  Devenu bien d'émigré, le château de Polastron fut vendu comme bien national à la Révolution. Son acquéreur sera Barthélémy Marty, intendant du domaine agricole noueillois des Polastron. C'est le petit-fils de Barthélémy, Emile, qui fera surélever la bâtisse dun étage, en vue de son mariage avec une jeune fille de Villefranche-de-Lauragais en 1858.\r\nA partir de 1887, le château ne sera plus occupé qu'épisodiquement, au gré des exodes ou des vacances, par les descendants d'Emile. Après 1944, surtout, la maison va se dégrader par manque de moyens et dunité de gestion. Des bâtiments sont démolis, des toits seffondrent, le symbolique pigeonnier sécroule, le parc se couvre de ronces et de lierre, de nombreux arbres meurent,  mais galvanisent  la famille qui prend alors des mesures drastiques : on vend les terres agricoles et on désigne Berengère Flamant, épouse Polack, l'arrière-petite-fille d'Emile, comme unique propriétaire. C'est elle qui s'est mise en devoir de redonner à cette maison une partie des beautés quelle a dû avoir jadis.","architecture":"C'était un grand ensemble de plain-pied, au parc dessiné par Le Nôtre, avec des allées de buis et de cyprès qui s'alliaient contre le vent d'Autan. La bâtisse principale  obligation d'autonomie à cette époque où les chemins étaient trop souvent impraticables  se doublait de celliers, four à pain, pigeonnier, remises et écuries, d'un chai bien sûr et, en plus d'une énorme cave pour la production locale de vin, d'un souterrain ! Enfin, sur l'aile droite, il y avait la maison du gardien.","habitants":"Famille de  Barthélémy Marty\r\n        \"","divers":"Château Marty à Nouielles","gps":"","images":["../../jctruffet.com/image/image_31/31_Marty_1.jpg","../../jctruffet.com/image/image_31/31_Marty_2.jpg"]},"Consult_chateau_formulairef642":{"id":"Consult_chateau_formulairef642","dept":"31","canton":"Revel","commune":"Mauremont","nom":"Mauremont","type":"Château","periode":"XVII","histoire":"MAUREMONT, château construit par Dominique Bachelier, fils de Nicolas Bachelier, sur commande de Germain de Saint-Félix, seigneur du lieu vers 1580 (propriété privée,  et à quelques kilomètre au sud ouest à Villenouvelle le château de Vallière chambres d'hôtes également.","architecture":"Au XVIe siècle, le château  de Mauremont  aurait abrité une garnison de soldats en lutte contre les Huguenots. Au XVIIe siècle, Richelieu démantèle le château qui présentait un plan quadrangulaire entouré par des douves dont la seule partie subsistante est située à l'angle sud-est. En 1660, la reconstruction de l'édifice est entreprise. Les derniers aménagements s'achèvent au XIXe siècle avec les communs et le parc. L'édifice se compose d'un corps de logis principal avec deux ailes en retour, abritant des communs, cantonnées par deux tours pigeonniers carrées. Deux légers décrochements témoignent d'anciennes ailes en retour d'un château primitif dont l'aspect militaire se retrouve dans la tour bastion carrée subsistant à l'angle sud est percée d'anciennes meurtrières. L'angle sud-ouest devait avoir une tour identique, rasée au XVIIe siècle. A l'Est fut adossée une orangerie qui servit d'habitation avant d'être utilisée comme bâtiment agricole.                                                                                                     Château de la Vallière de plan rectangulaire à deux niveaux toit presque plat avec fronton sur pavillon légèrement saillant plein cintre de la façade.","habitants":"Dominique Bachelier\r\n        \"","divers":"Château de Mauremont et de la Vallière","gps":"","images":["../../jctruffet.com/image/image_31/31_Mauremont_1.jpg","../../jctruffet.com/image/image_31/31_Mauremont_2.jpg","../../jctruffet.com/image/image_31/31_Mauremont_3.jpg","../../jctruffet.com/image/image_31/31_Mauremont_4.jpg","../../jctruffet.com/image/image_31/31_Mauremont_5.jpg"]},"Consult_chateau_formulaire3dd3":{"id":"Consult_chateau_formulaire3dd3","dept":"31","canton":"Escalquens","commune":"Mauvaisin","nom":"Mauvaisin","type":"Château","periode":"XVIII","histoire":"MAUVAISIN, au cur dune belle bâtisse du XVIIIe siècle, avec des salles de restauration donnant sur un vaste parc arboré, lauberge du château ouvre ses portes au village, gîtes de France  Au milieu du XVIIe siècle, le château est construit par François de Cousin, anobli par le roi  à la suite de bons et loyaux services rendus en tant que secrétaire. Ses descendants vivent du travail de la terre à une époque où le Lauragais connaît l'âge d'or du blé. Aujourd'hui, le château appartient toujours à la famille Cousin de Mauvaisin qui l'habite et y organise des événements (mariages, séminaires, chambres dhôtes, etc.)","architecture":"Le château de Mauvaisin est un petit château du XVIIIe siècle  à taille humaine offrant de grands espaces qui permettent de se retrouver en famille ou en groupes dans l'intimité.  de plan  en U corps de logis en retrait à deux niveaux  et occulus large fronton en façade, retour en équerre par de chaque côté de bâtiment à deux étages le deuxième est réduits en hauteur.  Dans un parc aux arbres centenaires, notre lieu apporte calme et déconnexion. Il est aussi au coeur d'une dynamique locale d'échanges et de création car il est associé depuis plusieurs années à des initiatives culturelles, artisanales et écologiques. Le lieu est idéal pour des stages, séminaires résidentiels, résidence d'artistes...","habitants":"Famille de François de Cousin\r\n        \"","divers":"Château à Mauvaisin","gps":"","images":["../../jctruffet.com/image/image_31/31_Mauvaisin_1.jpg","../../jctruffet.com/image/image_31/31_Mauvaisin_2.jpg","../../jctruffet.com/image/image_31/31_Mauvaisin_3.jpg","../../jctruffet.com/image/image_31/31_Mauvaisin_4.jpg"]},"Consult_chateau_formulaireab66":{"id":"Consult_chateau_formulaireab66","dept":"31","canton":"Bagnères de Luchon","commune":"Mazères sur Salat","nom":"Mazères","type":"Château","periode":"XV-XVII","histoire":"LACROIX, transformé en SCI du château Lacroix est dirigée par Koskinen Jussi  gérant.  Location de terrains et d'autres biens immobiliers, location de bureaux, location d'espaces commerciaux,  halls d'exposition, salles de conférence, salles de réception,  salles de réunion, location de terres, de terrains, la location au mois ou à l'année de boxes ou de lieux de garage de véhicules la location de fonds de commerce, notamment à usage agricole la location et l'exploitation d'immeubles non résidentiels, bureaux, espaces commerciaux, halls d'exposition, salle de conférence, de réception ou de réunion, installations d'entreposage en libre-service, etc.","architecture":"Lacroix château de style néo-classique du XVIIe siècle à deux niveaux sur soubassements  avec monté d'escalier plein cintre en façade et série de lucarnes sur un toit brisé à l'impérial, l'édifice est flanqué sur le côté droit d'une tour ronde se terminant au dernier étage en tour hexagonal le toit  très pointu se terminant à six pans, pavillons saillants sur la gauche de l'édifice.                                                                                                                                    Le château de Mazères attenant à une usine corps de logis à trois niveaux toit en croupes avec lucarnes  accolé d'une tour ronde toit en poivrières.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Château de Mazères et de Lacroix","gps":"","images":["../../jctruffet.com/image/image_31/31_Mazeres_1.jpg","../../jctruffet.com/image/image_31/31_Mazeres_2.jpg","../../jctruffet.com/image/image_31/31_Mazeres_3.jpg"]},"Consult_chateau_formulaired553":{"id":"Consult_chateau_formulaired553","dept":"31","canton":"Castanet-Tolosan","commune":"Mervilla","nom":"Mervilla","type":"Château","periode":"XVI","histoire":"MERVILLA, historique identique sur les deux châteaux, Mervilla ou Dubarry, ancienne résidence des Fieubet. Demeure des XVIe siècle et XVIIe siècle dans un parc formant un domaine privé.\r\n Sur le plan historique, lhistoire de Mervilla est ancienne et riche, et en relation principale avec les deux familles seigneuriales des Bérail et Fieubet, durant les XVIe et XVIIe siècles en particulier. Les Bérail dont un des membres a été Capitoul, et les Fieubet qui sinstallèrent à Mervilla en 1577, firent lacquisition de la seigneurie de Mervilla, Rebigue et Castanet-Tolosan. Pour l'histoire des Fieubet et de leur implantation à Mervilla, elle seffectua le 23 décembre 1577, date où M. Arnaud de Fieubet, greffier du diocèse de Toulouse, avait acquis la «maison de brique » que possédait à Mervilla, « noble Jehan du Faur, escuier, conseigneur de Castanet ». Ce même Arnaud de Fieubet qui fut secrétaire des Etats du Languedoc, décéda en 1603, quelques années après sa Femme morte en 1597 ; Ils furent enterrés ensemble selon les vux du défunt en léglise L'église Saint-Jean-Baptiste de Mervilla. Ils reposent tous deux sous une grande dalle de pierre où leurs armoiries, sont gravées au trait au-dessus dune lépitaphe en latin « Afin que, unis dans la tombe comme dans le lit conjugal, ils reposent éternellement... ».\" Bien entendu, sur le plan patrimonial et historique toujours, le château de Mervilla, ou château Dubarry, ancienne résidence des Fieubet, est un lieu chargé dhistoire.","architecture":"Mervilla où Dubarry, château de plan rectangulaire à deux niveaux  en briques construit à la fin du XVIe siècle et au début du XVIIe siècle à partir d'un édifice plus ancien, flanqué aux angles de tours carrées en encorbellement et à toit à quatre pans, il fut partiellement remanié au XIXe siècle, un peu trop restauré au début du XXe siècle, il n'en reste pas moins une demeure de charme.                                                                                                                               Garrigue; de plan rectangulaire,à deux niveaux    et attiques, un pavillon d'entrée  saillant ce terminant en fronton rectangulaire sur toit à deux pans.","habitants":"Famille Bérail \r\n        \"","divers":"Château de Mervilla et de Garrigues","gps":"","images":["../../jctruffet.com/image/image_31/31_Mervilla_1.jpg","../../jctruffet.com/image/image_31/31_Mervilla_2.jpg"]},"Consult_chateau_formulaire5640":{"id":"Consult_chateau_formulaire5640","dept":"31","canton":"léguevin","commune":"Merville","nom":"Merville","type":"Palais","periode":"XVIII","histoire":"MERVILLE,  en 1734, le marquis Henri-Auguste de Chalvet-Rochemonteix, grand sénéchal de Toulouse et d'Albigeois, hérite de son frère la seigneurie acquise du marquis d'Escoda de Boisse, et décide d'y édifier une somptueuse bâtisse de briques roses, dont la construction débute en 1743. Véritable homme des Lumières, il dicte lui-même les plans de construction à l'architecte toulousain Maduron. Les travaux durent un peu plus de quinze ans. À la mort du marquis de Chalvet, en 1772, le château passe à son fils André-Antoine, qui, bien que jeté en prison sous la Terreur, parvient à garder sa tête mais aussi son château ! Par chance, Merville conserve son ameublement et son décor. La petite-fille d'André-Antoine fait entrer Merville dans la famille  de Fite-Pelleport, leur fille  la comtesse de Fite-Pilleport épouse du comte de Villèle fils de l'ancien président du conseil  de Louis XIII, puis la maison passe par héritage au marquis de Beaumont du Repaire dont descendent les actuels propriétaires.                                   Château de FOURCLINS à Merville utilisé en Sci immobilières et autres.","architecture":"Le château de 1743 à 1759 construit en briques. le style navait rien des châteaux du Moyen-Age, il ny avait ni tour ni créneaux.  Il est composé de trois corps de logis disposés en U. Le corps central, qui mesure 50 mètres de long, et fait face à lEst possède un avant-corps central en hémicycle, surmonté d'un fronton triangulaire.  Il donne sur une terrasse qui surplombe le parc dessiné par le Nôtre. Les deux ailes qui mesurent chacune 18 mètres se font face et l'aile sud présente un fronton curviligne. Une terrasse de 92 mètres de long sur 28 de large entoure le château, un grand parc de 40 hectares sétend autour .  Agrément indispensable de toute gentilhommière de qualité.Les pièces d'apparat du corps central ont été conçues en enfilade autour dun grand salon qui savance en saillie sur le jardin. Les murs des vastes salles du rez-de-chaussée sont recouverts de tapisseries de Flandres datant du règne de François Ier. Le salon chinois doit son nom aux dix-huit grands panneaux de bois peints à l'huile qui ornent parois et dessus de porte. Ils furent réalisés durant l'année 1754 par le peintre et architecte toulousain Gilles Pin (1720-1804). Ces décors dans le goût des chinoiseries de pilleurs s'inspirent de gravures parisiennes exécutées d'après des dessins de François Boucher.","habitants":"Marquis Henri-Auguste de Chalvet-Rochemonteix\r\n        \"","divers":"Château de Merville et Fourclins","gps":"","images":["../../jctruffet.com/image/image_31/31_Merville_1.jpg","../../jctruffet.com/image/image_31/31_Merville_2.jpg","../../jctruffet.com/image/image_31/31_Merville_3.jpg","../../jctruffet.com/image/image_31/31_Merville_4.jpg","../../jctruffet.com/image/image_31/31_Merville_5.jpg"]},"Consult_chateau_formulaire13a0":{"id":"Consult_chateau_formulaire13a0","dept":"31","canton":"Toulouse","commune":"Toulouse","nom":"Mirail","type":"Château","periode":"XVII","histoire":"MIRAIL,  le château du Mirail fut construit en 1680 par Guillaume de Mondran. Le parc fut créé entre 1700 et 1720 sur un domaine de 52 hectares. En 1740, le château est vendu en viager au noviciat des Jésuites . En 1742, Guillaume de Mondran meurt.  Lorsque, en 1763 les Jésuites sont bannis du royaume de France le château est cédé à Monsieur Verse puis revendu à Henri de Melier. En 1777   monsieur de Saint-Quentin l'acquiert et réhabilite le parc en créant le petit bassin (toujours visible de nos jours), l'escalier principal et un long canal. En 1829, la famille Sabatier remplace monsieur de Saint-Quentin et construit le pigeonnier. En 1898, la famille Lapersonne rachète le château. Le pigeonnier du XIXe siècle. En 1912, le château est racheté par Eugénie Ningres de Roucoule, femme très riche et religieuse, elle vit dans l'hôtel particulier de Nupces à Toulouse. En 1942, elle cède par testament le château à sa belle-sur pour qu'elle le cède aux Jésuites à la condition qu'ils créent une maison de repos pour les prêtres. Mais la Seconde Guerre mondiale verra le château réquisitionné par la Wehrmacht. En 1946, les jésuites prennent possession mais Pierre de Roucoule est toujours vivant. Ils ne sont pas propriétaires. Les jésuites créent une école agricole. En 1964, à la mort de Pierre de Roucoule, les jésuites deviennent propriétaires du Mirail. Parallèlement, la mairie de Toulouse lance des négociations pour racheter le château et les terres pour y créer une université. En 1967, la mairie de Toulouse va le rétrocéder à l'université du Mirail. Le château du Mirail est un château situé à Toulouse. Il appartient depuis 1967 à l'Université Toulouse-Jean-Jaurès à laquelle il a donné son nom.","architecture":"Mirail est d'une architecture sobre mais soignée, il se présente comme un bâtiment en L, flanqué de deux majestueuses tours carrées. L'une est adossée au bâtiment sur l'angle sud est, l'autre s'inscrit dans l'angle intérieur au nord ouest. Sur la façade latérale est adossée une petite construction en rez-de-chaussée recouverte par un toit terrasse ceint d'une balustrade. le toit à croupes en tuiles canal contraste avec les toits en pavillon couvert d'ardoise des tours. Une large corniche couronne les élévations et confère toute sa noblesse à cette belle bâtisse. Le corps de bâtiment principal se développe sur deux étages. Le rez-de-chaussée est éclairé par des ouvertures segmentaires. On y accède grâce à une porte centrale rectangulaire, couronnée d'une corniche. Les fenêtres des niveaux supérieurs sont rectangulaires. Elles sont surmontées d'une corniche au premier. Les baies du second sont moins hautes, donnant presque l'impression d'un demi étage. Le rez-de-chaussée de la façade postérieure est séparé du premier par une moulure. La clé de la porte est ornée d'un masque représentant une tête de lion grimaçante. La façade latérale présente une fenêtre demi croisée. Une partie maçonnée à l'angle nord-est semble indiquer la présence ancienne d'une tourelle. La tour nord-ouest se développe sur trois étages et un étage de combles. Elle est percée de petites ouvertures rectangulaires, et d'une demi croisée divisée par une traverse en pierre sculptée de fleurs. La deuxième tour est éclairée par des fenêtres rectangulaires sur trois niveaux. A l'arrière du château s'élèvent les communs, édifiés selon un plan en U..","habitants":"Guillaume de Mondran\r\n        \"","divers":"Château de Mirail à Toulouse","gps":"","images":["../../jctruffet.com/image/image_31/31_Mirail_1.jpg","../../jctruffet.com/image/image_31/31_Mirail_2.jpg","../../jctruffet.com/image/image_31/31_Mirail_3.jpg"]},"Consult_chateau_formulaire9f4e":{"id":"Consult_chateau_formulaire9f4e","dept":"31","canton":"Auterive","commune":"Miremont","nom":"Miremont_31","type":"Vestiges","periode":"XVII","histoire":"MIREMONT, Joseph de Madron était né aux environs de 1750 d'une vieille famille qui a fourni à Toulouse nombre de capitouls, à l'église des prêtres et des religieuses, au parlement des présidents, au royaume des dignitaires (trésoriers généraux, conseiller du Roi,  et même un garde du corps du Roi en 1665.) Il avait épousé en mai 1773 à Toulouse, en l'église Notre-Dame de la Daurade, une certaine Jeanne Pétronille Duprat. Cette dernière était la fille aînée de noble Pierre Bernard de Duprat, écuyer et consul de Miremont, ainsi que de Dame Françoise de Rochefort, descendante directe des \"de Rochefort\", seigneurs de Viviers et de Miremont. Autant dire que ce mariage devait être foncièrement juteux et de la à penser que la mariée avait apporté en dot les riches terres où quelques mois plus tard, ils érigeront leur château, il n'y a qu'un pas que les recherches actuelles devraient confirmer. Juste avant la Révolution naquirent 4 enfants de ce couple, Jeanne-Marie-Françoise, Josephe -Françoise, Gabriel-Jacques  et Jean-Pierre dit Charles  qui deviendra maire de Miremont de 1814  à 1830. Le 3 novembre 1899, lors de la division entre les deux soeurs des domaines familiaux, le château de Miremont revient à Louise-Marie-Jeanne qui le revend le 6 novembre 1903 avec toute la propriété attenante à madame Victorine Boujac propriétaire à Florensac (Hérault), veuve de monsieur Louis Brouilhet. Enfin, en 1910 Jean-Marie Alexis Sentost, propriétaire,  rachète le domaine qui est toujours aujourd'hui propriété de la même famille.","architecture":"A Miremont aucun document atteste la construction de cette élégante bâtisse rose flanquée d'une tour carrée crénelée, pourtant le style architectural et les bribes de témoignage historiques nous laissent penser qu'elle fut érigée aux environs de 1775. La carte du diocèse de Toulouse dessinée en 1760 ne la mentionne pas à l'inverse du château de Burguerolles. On trouve sur le cadastre de 1659 un relevé des bâtiments encore debout aujourd'hui, mais personne ne peut témoigner avec certitude qu'ils n'ont pas été croqués plus tard, du moins avant le cadastre suivant qui, lui, a été rédigé seulement à l'époque napoléonienne, en 1809 le château ne sera désormais plus habité, si ce n'est en mai/juin 1944 pour cause de réquisition par une compagnie de soldats allemands et de 1952 à 1962 lorsque Etienne et Raymonde Rochefort décident d'aménager le rez de chaussée afin de finir leurs jours plus près de leur fille Juliette et de leur gendre François Sentost.","habitants":"Famille de  Joseph de Madron \r\n        \"","divers":"Château de Miremont","gps":"","images":["../../jctruffet.com/image/image_31/31_Miremont_31_1.jpg","../../jctruffet.com/image/image_31/31_Miremont_31_2.jpg","../../jctruffet.com/image/image_31/31_Miremont_31_3.jpg","../../jctruffet.com/image/image_31/31_Miremont_31_4.jpg"]},"Consult_chateau_formulaired54a":{"id":"Consult_chateau_formulaired54a","dept":"31","canton":"Blagnac","commune":"Mondonville","nom":"Mondonville","type":"Château","periode":"XV","histoire":"MONDONVILLE, la seigneurie fut acquise par les Jourdains de l'Isle à la suite dun mariage avec la fille de Guillaume de Taillefer, comte de Toulouse. Elle passa avec les biens des Jourdains à Jean Bourbon, comte de Clermont et puis aux Armagnacs. En 1526, la terre de Mondonville, fut apportée par Rose dArmagnac à son mari Gaspard de Villemur.  Bertrand de Villemur vendit Mondonville à Guy du Faur de Pibrac. La Seigneurie fut ensuite vendue en 1620 par Michel du Faur de Pibrac à Charles de Turle dont la femme est plus connue sous le nom de madame de Mondonville. En 1698, la  famille dAlliez , puis Valentin du Bourg, en 1757, devinrent à leur tour seigneur de Mondonville.                                                                                                  LA TOUR, le château principal était dit « de la Tour ». \r\nVIGNEAUX, son nom évoque un territoire planté de vignes. \r\nCOLOMBE, le Colombé est au XVIIIe siècle la propriété des dominicains de Toulouse qui possèdent à Mondonville 135 arpents de terre, pour lesquels ils sacquittent de taxes au seigneur de Mondonville.","architecture":"La tour de l'horloge a été construite vers 1852 par le maçon Rives de Mondonville, avec des briques rouges taillées à la main. Afin dobtenir un bureau de poste télégraphe, la commune devait posséder une horloge. Le curé de lépoque refusa de laisser établir une horloge contre les murs de léglise. La Commune de Mondonville ne possédant pas de monument public, envisagea de construire au centre de la place un édifice de forme hexagonale ; au dessus de la cloche une girouette qui  informait les anciens de larrivée du vent dAutan, fut installée.                                       \r\nColombe,  cette propriété doit son nom à la tour centrale de lédifice qui servait de pigeonnier. Sous lancien régime le terme « colombier » est employé pour qualifier ces tours nobles permettant lélevage des pigeons. Ces pigeonniers appartiennent alors à de grands domaines agricoles.                                                                                                                                   La Tour, il reste que quelques vestiges de la forteresse médiévale qui comprenait un énorme donjon large de 12 m et haut de 35 m, qui dominait lédifice. Seules subsistent les deux tours qui marquaient lentrée fortifiée. Celle de droite présente une entrée en arc brisé et garde la fente destinée à lemplacement dune herse coulissante. \r\nIl était entouré dune enceinte et dun fossé profond, auprès duquel se groupaient les maisons du village. Les remparts sont les uniques vestiges de ce château « de la Tour ».                                                                              VIgneaux  est une maison caractérisée par une grande galerie en bois qui court le long de la façade principale et comprend un promenoir à létage. Il est situé de lautre côté du ruisseau du Gajea, par rapport au château principal.","habitants":"Guy du Faur de Pibrac\r\n        \r\n        \"","divers":"Château de Mondonville et la tour","gps":"","images":["../../jctruffet.com/image/image_31/31_Mondonville_1.jpg","../../jctruffet.com/image/image_31/31_Mondonville_2.jpg","../../jctruffet.com/image/image_31/31_Mondonville_3.jpg","../../jctruffet.com/image/image_31/31_Mondonville_4.jpg"]},"Consult_chateau_formulaire0c3f-2":{"id":"Consult_chateau_formulaire0c3f-2","dept":"31","canton":"Nailloux","commune":"Monestrol","nom":"Monestrol","type":"Château","periode":"XVII","histoire":"MONESTROL;  Marquié Baptiste de la société SCEA, société civile d'exploitation agricole  est active depuis 5 ans.  Établie à Monestrol elle est spécialisée dans le secteur d'activité de la culture de céréales (à l'exception du riz), de légumineuses et de graines oléagineuses. Les scan du sceau ne reflète pas la netteté. Au verso un sceau en cirebien visible avec la chevalière du baron Emile Perrier. Représentant: en haut couronne royale au centre blason des armoiries en deux partie    Le château a accueilli la mère d' Henry IV, lors de ses visites à son cousin le comte de Foix.","architecture":"Monestrol, gîtes de France  aménagé dans une dépendance du château , dans la cour d'honneur, où vous admirerez un pigeonnier typique de la région.  Le château datant du XVIe-XVIIe siècle de plan rectangulaire à trois niveaux  toit en croupes flanqué de quatre tours carrées à quatre niveaux avec toit à quatre pans, grandes dépendances en équerre.                                                              Lasserre corps de logis rectangulaire à deux niveaux sur soubassement et attiques fronton triangulaire en façade.","habitants":"Baron Emile PERRIER \r\n        \"","divers":"Château de Monestrol et de Lasserre","gps":"","images":["../../jctruffet.com/image/image_31/31_Monestrol_1.jpg","../../jctruffet.com/image/image_31/31_Monestrol_2.jpg","../../jctruffet.com/image/image_31/31_Monestrol_3.jpg","../../jctruffet.com/image/image_31/31_Monestrol_4.jpg"]},"Consult_chateau_formulaire872c-2":{"id":"Consult_chateau_formulaire872c-2","dept":"31","canton":"Toulouse-10","commune":"Mons","nom":"Mons_Drémil_Lafage","type":"Château","periode":"XVI-XVII","histoire":"DREMIL,  en 1414 la Seigneurie de Drémil est alors propriété de la couronne, le roi de France dit \"Le Sagé\" est seigneur de Drémil.  En 1755,  Lafage annexe de Drémil est rattaché et devient Drémil-Lafage. Le 14 juillet 1789 la chute de lancien régime provoqua celle du conseil politique du consulat de Drémil-Lafage.                                                                                                                               MONDOUZIL, seigneur de Mons, ensuite vers le  XIIe siècle celle du révérend père chartreux en charge des terres de Mons, puis par la suite du marquis de Davidsard. Aujourd'hui, c'est la propriété de madame la comtesse de Talouet. À l'époque, les seigneurs du château gouvernaient le village. Dès 1570,   a été acheté par les chartreux le 22 août 1614 à Nicolas de Drot. Ce château et la propriété furent déclarés \"biens nationaux\" à la Révolution Française et les chartreux en furent alors expulsés. Dans le cadre de la vente des biens nationaux, Jean-Antoine de Catellan, marquis de Caumont achète en 1791 les trois châteaux ayant appartenu aux chartreux : Mondouzil, Mons et Paulel ainsi que 8 métairies, plus de nombreuses dépendances. Les châteaux de Mons et Paulel ont été détruits. Les descendants par alliance du marquis de Catellan de Caumont sont toujours les propriétaires du château de Mondouzil.                                                                                                                     MONTAURIOL gîte de France de Henri et Delphine de  Banières à Drémil-Lafage. pas d'information historique.                                                                                                               CLAIRAC Les Barravy, Pierre (vers 1550), Jean, Jean-Pierre, puis Pierre, ont été tous les quatre seigneurs de Clairac au XVIe et XVIIe siècles. Les Cassan Jean-Pierre, puis Pierre, leur ont succédé comme seigneurs de Clairac au cours du XVIIIe siècle. En 1761, De Cassan-Clairac fût conseiller rapporteur de laffaire Calas.                                                                                                                                                                                  Péchauriole à Flourens pas d'information historique.","architecture":"Mons le château de Berthou, du Castelet de la Fajolle, pas d'information historique pour ces trois châteaux                                                                                 Clairac château féodal  de plan rectangulaire à trois niveaux flanqué de tour carrée crénelée  à mâchicoulis et tourelle.                                                                                                                Drémil, Mondouzil  cette forteresse a toujours été entretenu, on sait qu'il a été restauré et réaménagé vers 1850 et dans les années 1920, quadrangulaire avec tours à différents niveaux crénelée à mâchicoulis une tour sur façade à toit à quatre pans.                                                                                 Montauriol classique du XIXe siècle de plan rectangulaire à trois niveaux toit en croupe fronton triangulaire plein cintre en façade, l'édifice  prolongé de chaque côté par un pavillon à deux niveaux.                                           Péchauriole  de plan rectangulaire à trois niveaux sur soubassement et lucarnes sur toit en ardoise en croupe flanqué d'échauguettes en angles à toit très pointu et de tours carrés en façade d'entrée.","habitants":"Seigneur de Drémil                                                                             Comtesse de Talouet\r\n        \r\n        \"","divers":"Château de Mondouzil, de Clairac, de Montauriol, de Berthou, du Castelet de la Fajolle  et de Péchauriole de  Flourens à Mons- Drémil-Lafage.","gps":"","images":["../../jctruffet.com/image/image_31/31_Mons_Dremil_Lafage_1.jpg","../../jctruffet.com/image/image_31/31_Mons_Dremil_Lafage_2.jpg","../../jctruffet.com/image/image_31/31_Mons_Dremil_Lafage_3.jpg","../../jctruffet.com/image/image_31/31_Mons_Dremil_Lafage_4.jpg","../../jctruffet.com/image/image_31/31_Mons_Dremil_Lafage_5.jpg","../../jctruffet.com/image/image_31/31_Mons_Dremil_Lafage_6.jpg","../../jctruffet.com/image/image_31/31_Mons_Dremil_Lafage_7.jpg","../../jctruffet.com/image/image_31/31_Mons_Dremil_Lafage_8.jpg"]},"Consult_chateau_formulaire052c":{"id":"Consult_chateau_formulaire052c","dept":"31","canton":"Pechbonnieu","commune":"Montastruc la conseillère","nom":"Montastruc_31","type":"Château","periode":"XVIII","histoire":"Plusieurs châteaux à Montastruc la Conseillère dont celui de Montrastruc, château de La Conseillère.\r\nLASSERRE, édifié aux XVIe et XVIIe siècles par la famille de Bernuy, ancienne résidence du général de Castelnau.\r\nChâteau de Campagne, édifié en 1824 par la famille Massol.   Château d'Azas,  Lassere et Campagne et Valade, (voir même article pour ces trois ), de Fond-Trutat, de Garidech du Général Toulza,  de Teulade .                                                                                                                                             MONTRASTRUC la CONSEILLIERE  Fondée en 1242 par Sicard Alaman, seigneur de la commune qui en fit une bastide. La localité fût, à partir de 1270, sous la dépendance directe du Roi de France. En 1771, Louis XV la concéda au comte de Clarac.  Ce château, qui a abrité le Roi Henri IV, le Duc de Montgomery, le Général de Castelnau, est un des plus beaux châteaux de la région toulousaine, Le château, localisé route des Birats, était habité par le seigneur dOuvrier, conseiller au parlement de Toulouse, lépouse de ce conseiller, du Moyen-Age jusquau XVIIe siècle, lAdministration Communale fut dirigée par des Consuls","architecture":"Château de la Conseillère. Entre 1858 et 1881. Vue d'ensemble extérieur du château. Au premier plan cour, pelouse, arbres ; au second plan à gauche dépendances, château, tour, cheminée ; fenêtres ; portes.                                                              Montastruc, dans ce cadre architectural aux volumes harmonieux qui permet toutes possibilités d'aménagement et de décoration sont souvent organisés : séminaire, mariages, baptêmes, déjeuners champêtres entre amis, réceptions, journées de formation, tournages de films et  court métrages.                                                                                                             .","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Château de Montastruc, d'Azas, de la Conseillière, de Guadirech, de Teulade et de Sarthe à Montastruc la Conseillière.","gps":"","images":["../../jctruffet.com/image/image_31/31_Montastruc_1.jpg","../../jctruffet.com/image/image_31/31_Montastruc_2.jpg","../../jctruffet.com/image/image_31/31_Montastruc_3.jpg","../../jctruffet.com/image/image_31/31_Montastruc_4.jpg","../../jctruffet.com/image/image_31/31_Montastruc_5.jpg","../../jctruffet.com/image/image_31/31_Montastruc_6.jpg","../../jctruffet.com/image/image_31/31_Montastruc_7.jpg","../../jctruffet.com/image/image_31/31_Montastruc_8.jpg","../../jctruffet.com/image/image_31/31_Montastruc_9.jpg"]},"Consult_chateau_formulaire2b6f":{"id":"Consult_chateau_formulaire2b6f","dept":"31","canton":"Villemur sur Tarn","commune":"Villematier","nom":"Montauriol_31","type":"Château","periode":"XIX","histoire":"MONTAURIOL,  M. Mayor, un homme daffaires suisse acquiert le domaine en 1985. Il y construit le chai actuel et ouvre les marchés internationaux.\n En 1995, le château et le vignoble sont rachetés par monsieur Hector de Galard, déjà actif en matière vitivinicole dans plusieurs régions françaises et étrangères, cofondateur du château Bellevue La Forêt dont il fût le copropriétaire jusquen 1986. Malheureusement, le décès de M. de Galard a compromis la viabilité de la propriété. Nicolas Gelis a donc racheté le château,  en juin 1998 et y applique la politique de recherche de qualité avec laide de Laurent Fadat, dans le respect de la vigne et du vin comme ils lont déjà fait au château Ferran.Cet été, Catherine, Nicolas Gelis et leurs quatre enfants seront vraiment chez eux. Ils s'installeront dans le château du XVIIe siècle qui abrita sept générations de Saint-Plancat, eux-aussi éleveurs de négrette.","architecture":"Montauriol, quadrangulaire à deux étages toit en croupe flanqué aux angles de quatre tourelles carrées à toit pointu quatre pans.","habitants":"Famille de Catherine, Nicolas Gelis \"","divers":"Château de Montauriol à Villematier","gps":"","images":["../../jctruffet.com/image/image_31/31_Montauriol_1.jpg"]},"Consult_chateau_formulaire7326":{"id":"Consult_chateau_formulaire7326","dept":"31","canton":"Pechbonnieu","commune":"Montbéron","nom":"Montbéron","type":"Château","periode":"XIV-XVIII","histoire":"Trois châteaux à Montbéron, le château féodal, le Neuville et L'Amouras pas d'information historique de ses châteaux                                                                          Une vieille légende raconte que son nom vient du fait qu'il y a longtemps, à la place du village se trouvait le Mont-Beron. La montagne s'est transformée en village et on l'appelle maintenant Montbéron. Une autre version raconte que Montberon signifie \"mont des oiseaux\".                                                                                l'Orangerie de Neuville, située dans le parc du château dominant les coteaux du Tarn, vous accueille pour toutes vos réceptions.","architecture":"Montbéron  du château féodal de plan rectangulaire avec  pignon crénelée  et  dentelée   sur la droite donjon crénelée à mâchicoulis à gauche une tourelle ronde à toit en poivrière très pointu.                                                                       Neuville de plan rectangulaire à deux niveaux et attiques  flanqué de deux  tours carrées à trois niveaux  sur les angles côtés parc  toit presque plat à quatre pans,  balcon sur façade avec au deuxième étage un fronton.  L'Orangerie est une bâtisse dotée d'une salle tout en briques de 200 m2,","habitants":"Seigneurs locaux\r\n        \r\n        \r\n        \"","divers":"Château de Montbéron, de Neuville et son orangerie","gps":"","images":["../../jctruffet.com/image/image_31/31_Montberon_1.jpg","../../jctruffet.com/image/image_31/31_Montberon_2.jpg","../../jctruffet.com/image/image_31/31_Montberon_3.jpg","../../jctruffet.com/image/image_31/31_Montberon_4.jpg"]},"Consult_chateau_formulaire952a":{"id":"Consult_chateau_formulaire952a","dept":"31","canton":"Bagnères de Luchon","commune":"Montespan","nom":"Montespan","type":"Vestiges","periode":"XII","histoire":"MONTESPAN, par le mariage de Grise d' Espagne, fille d'Arnaud d' Espagne, baron de Bordères en Louron et seigneur de Montespan avec Roger de Comminges, quatrième vicomte du Couserans. De cette union naquit Arnaud de Comminges vicomte de Couserans, comte de Foix, dont le 3ème fils Arnaud de Comminges d' Espagne premier du nom fut le chef de la maison dite \" barons d' Espagne de Montespan\". Au delà de leur rôle de \"gardiens des frontières\", les barons d' Espagne fournirent à la couronne de France, toute une lignée de vaillants guerriers, des grands dignitaires civils et ecclésiastiques. Avec Roger IV d' Espagne, mort sans enfant légitime, s'éteint en 1555, cette première lignée de la maison des barons d' Espagne de Montespan. A cette époque, la baronnie de Montespan entre dans la maison des Pardaillan de Gondrin, en vertu du mariage de Paule d' Espagne, soeur aînée de Roger IV, avec Antoine de Pardaillan de Gondrin. Hector, leur fils, ajouta alors à ses titres, celui de baron de Montespan. Montréjeau était alors la capitale de la Baronnie de Montespan. Ces terres furent érigées en marquisat, par le roi Louis XIII, en récompense des services rendus par la baronnie de Montespan. Le marquisat de Montespan comprenait les villes de Montréjeau ( capitale), Valentine, Cazères, les châteaux et maisons seigneuriales d' Ausson, Bordes, Villeneuve-Lécussan, Cazarilh, Villeneuve de Rivière, Saint-Laurent, Mazères ainsi que plusieurs capitaineries dont dépendaient 24 autres villages. En 1663, Louis de Pardaillan, arrière-arrière petit-fils de Paule d' Espagne, marquis de Montespan, épouse Françoise Athénais de Rochechouart. Belle et spirituelle, elle deviendra la favorite du roi Louis XIV, plus connue sous le nom de Marquise de Montespan.\"Ses enfants légitimés nés de \" ses amours\" avec le roi , ont encore, à ce jour,des descendants dans 9 maisons souveraines de plusieurs pays d'Europe.","architecture":"Montespan, à sa construction, au XIIe siècle, le château se résume à un donjon non habité dont la fonction de défense passive marque localement le pouvoir féodal du seigneur sur son territoire. La première occupation résidentielle date du XIIIe siècle avec lédification dune enceinte pour protéger la tour.\r\nMontespan tient son nom dune déformation de Mont dEspagne, nom de famille de seigneurs qui sy installèrent à cette époque. Le château occupait une position stratégique, chargé de veiller à la sécurité des passages du Couserans vers l' Espagne. Entre Saint-Gaudens et Saint-Martory, on aperçoit sur la rive droite de la Garonne, les vestiges d'un vieux château féodal. Ces ruines sont celles du château de Montespan, siège autrefois d'une baronnie du même nom et fief de la maison d' Espagne.","habitants":"Roger de Comminges                                                                                 Louis de Pardaillan\r\n        \"","divers":"Vestiges du château de Montespan","gps":"","images":["../../jctruffet.com/image/image_31/31_Montespan_1.jpg","../../jctruffet.com/image/image_31/31_Montespan_2.jpg","../../jctruffet.com/image/image_31/31_Montespan_3.jpg","../../jctruffet.com/image/image_31/31_Montespan_4.jpg","../../jctruffet.com/image/image_31/31_Montespan_5.jpg","../../jctruffet.com/image/image_31/31_Montespan_6.jpg","../../jctruffet.com/image/image_31/31_Montespan_7.jpg","../../jctruffet.com/image/image_31/31_Montespan_8.jpg"]},"Consult_chateau_formulaire52fe":{"id":"Consult_chateau_formulaire52fe","dept":"31","canton":"Revel-Escalquens","commune":"Montesquieu en Lauragais","nom":"Montesquieu_Lauragais","type":"Château","periode":"XVI-XVIII","histoire":"MONTESQUIEU-LAURAGAIS, anciennement appelé Montesquieu-sur-le-canal, ce village né autour du château féodal du début du Xe siècle a un passé mouvementé. Au XIIIe siècle, Montesquieu-Lauragais subira pillages et incendies menés par Simon de Montfort lors de sa croisade contre les cathares. Occupé par les protestants pendant les guerres de religion, fut assiégé, pillé et brûlé par le Duc de Joyeuse en 1586. La bastide était autrefois protégée par des remparts et des fossés dont on peut deviner le tracé en se promenant dans les rues.  Par son testament en date du 2 décembre 1683 Noble César d'Abessens, seigneur de Montesquieu, donne « aux habitants de Montesquieu les censives qu'ils lui peuvent devoir tant pour le passé que pour l'avenir », clause considérée comme l'abolition des droits féodaux locaux, mais remise en question par un de ses successeurs.  Au XVIIIe siècle  le seigneur de Montesquieu écrit dans un mémoire non daté : \"cette terre étant composée de onze fermes, elle se trouve sujette à deux inconvénient : le premier est l'entretien d'une trop grande quantité de bâtiments, le second vient de l'impossibilité qu'un seul homme d'affaires puisse veiller de bien près onze métairies, il en conclut à la nécessité d'en démolir cinq pour conserver les mieux bâties et les mieux situées, dont Laucatte et Goudet, à cause des terre situées de l'autre côté du canal et celle de St-Jean, bien bâtie.                                       A quelques kilomètres à l'ouest  de Montesquieu Louragais  à  Saint-Léon château servant d'hôtel de Ville sans information historique.","architecture":"Montesquieu en Lauragais : châteaux-forteresses du Moyen-Age (1000 à 1300)Le règne de linsécurité conduit à bâtir des châteaux-donjons avec : pas ou très peu douvertures. Si ouvertures, elles sont à grande hauteur et de petites dimensions ; épaisseur énorme des murs ; système de défense dune unique porte avec herse, mâchicoulis, tours ; pièces habitées très petites, obscures ; tout est sacrifié à la défense.                                                    Château de Saint-Léon de plan en U avec retour en équerre sur l'arrière à deux niveaux  sur soubassement flanqué de pavillons légèrement saillants  en façade dépassant d'un étage la toiture,  l'un terminant par une terrasse, l'autre toit à deux pans.","habitants":"Seigneur de Montesquieu\r\n        \"","divers":"Château de Montesquieu-Lauragais et de Saint-Léon","gps":"","images":["../../jctruffet.com/image/image_31/31_Montesquieu_Lauragais_1.jpg","../../jctruffet.com/image/image_31/31_Montesquieu_Lauragais_2.jpg","../../jctruffet.com/image/image_31/31_Montesquieu_Lauragais_3.jpg","../../jctruffet.com/image/image_31/31_Montesquieu_Lauragais_4.jpg","../../jctruffet.com/image/image_31/31_Montesquieu_Lauragais_5.jpg","../../jctruffet.com/image/image_31/31_Montesquieu_Lauragais_6.jpg"]},"Consult_chateau_formulaire7f2b-2":{"id":"Consult_chateau_formulaire7f2b-2","dept":"31","canton":"Auterive","commune":"Montesquieu-Volvestre","nom":"Montesquieu_Volvestre","type":"Château","periode":"XIV-XVI","histoire":"deux châteaux à Montesquieu-Volvestre le  Palays et de Goueytes.                                                                                                                                         PALAYS  Les premières traces du château remontent au XIVe siècle. A cette époque, une tour et peut-être un «castrum» contrôlaient un point de passage au confluent de l'Arize et d'un ruisseau, le Pas du Rat, formant la frontière entre les comtés de Toulouse et de Foix. En 1444, Jean de Massot devient « Seigneur de Palays ». Depuis, le château a  été transmis de famille en famille jusqu'à ce jour, soit 17 générations successives.  Quel est le Montesquivien de l'époque qui n'a pas encore en mémoire Mme-la comtesse de Balorre,  à plus de 80-ans, ce sera la dernière résidente de Palays. Après son décès, en 1981, M.et Mme de la Fage   et  en 1995, la restauration des salles du rez-de-chaussée permet d'accueillir mariages.\r\nGOUEYTES En 1600, un des membres de la famille de Sers d'Aulix, seigneur du Volvestre, mourut dans sa maison de Goueytes, sur les ruines de laquelle fut bâti ce château. Celui-ci est aussi associé à la famille Lartigue de Goueytes : le général de division Lartigue de Goueytes, officier de la Légion d' Honneur, reconstruisit le château au XIXe siècle. Il ne quitta les terres de Goueytes qu'au début du XXe siècle.","architecture":"Le vieux château du Palays est une petite place-forte, à la forme d'un quadrilatère, avec aux angles une tour ronde saillante, permettant des tirs de flanquement, des murs épais de 1,30-m et hauts d'un peu plus de 7-mètres, couronnés de créneaux et de mâchicoulis que dessert un chemin de ronde. Le bas est protégé par des fossés (aujourd'hui comblés), défendus par de nombreuses bouches à feu. La vaste cour carrée, d'environ 30-m de côté, est accessible par un portail et un pont-levis primitivement ouvert à l'ouest de la tour. Sur le côté est, se trouve le modeste logis seigneurial, le «vieux» logis, avec salles hautes et basses, tandis qu'à l'est, se trouve la tour maîtresse, plus grosse que les autres, munie d'escaliers à vis et d'une belle salle au 1er-étage, avec voûte en ogive à six quartiers. En 1920, le mur intérieur sud-ouest est remodelé avec de grandes ouvertures, le mur nord-ouest est rehaussé, tous les murs extérieurs de la cour ornés par des murettes et des gargouilles.   petite forteresse de plaine à la forme quadrilatère composée de murs en briques couronnés de créneaux sur faux mâchicoulis desservis par un chemin de ronde et flanqués de quatre tours rondes.                                                                  Château de la Goueytes de plan en équerre d'un corps de logis rectangulaire à trois niveaux toit à deux pans à l'extrémité tourelle carrée à quatre niveaux et dans l'angle un donjon carrée de cinq niveaux avec mâchicoulis et créneaux et une échauguette en encorbellement dépassant la plateforme crénelée, cet ensemble est prolongé en équerre d'un autre corps de logis à deux niveaux et attique par oculus reliant une grosse tour ronde à mâchicoulis et créneaux bouche à feu .","habitants":"Comtesse de Balorre.                                                                                     Famille de Sers d'Aulix\r\n        \r\n        \"","divers":"Château du Palays et de Goueytes à Montesquieu-Volvestre.","gps":"","images":["../../jctruffet.com/image/image_31/31_Montesquieu_Volvestre_1.jpg","../../jctruffet.com/image/image_31/31_Montesquieu_Volvestre_2.jpg","../../jctruffet.com/image/image_31/31_Montesquieu_Volvestre_3.jpg","../../jctruffet.com/image/image_31/31_Montesquieu_Volvestre_4.jpg","../../jctruffet.com/image/image_31/31_Montesquieu_Volvestre_5.jpg","../../jctruffet.com/image/image_31/31_Montesquieu_Volvestre_6.jpg","../../jctruffet.com/image/image_31/31_Montesquieu_Volvestre_7.jpg","../../jctruffet.com/image/image_31/31_Montesquieu_Volvestre_8.jpg","../../jctruffet.com/image/image_31/31_Montesquieu_Volvestre_9.jpg"]},"Consult_chateau_formulairea18e":{"id":"Consult_chateau_formulairea18e","dept":"31","canton":"Bagnères de Luchon","commune":"Montgaillard de Salliès","nom":"Montgaillard_Salliès","type":"Château","periode":"XIII","histoire":"MONTGAILLARD, avant 1403   Montgaillard jouit d'une charte de coutume, et à cette date, le seigneur Arnaud de Coarraze jure aux consuls de la localité de respecter leurs coutumes. Eux-mêmes lui jurent fidélité en 1416. François d'Ustou de Lamothe acquiert le bourg de Montgaillard en 1585 ; lui et ses descendants en porte le nom jusqu'au xviie siècle. En 1585, le rapport des consuls révèle une particularité fiscale sur le territoire de Montgaillard. La taille y est estimée non sur l'appréciation des revenus comme il est d'usage, mais sur l'estimation des terres et des possessions de chaque habitant. Le village d'Estadens quant à lui, a comme seigneur les barons d'Aspet, puis les rois de France en 1667. Cependant, le fief de la Comère, situé sur le territoire d'Estadens, est la propriété des seigneurs de Montgaillard. (Le patrimoine des communes de la Haute-Garonne).                                                                                        CAP del ROC Laspect médiéval du château de Cap del Roc est la volonté dun propriétaire fantasque.                                                                                                                     VAL DE SOUX hôtel restaurant pas d'information historique                                                CAP DEL TUC  Au cours du XIIIe, un château est bâti au Cap-del-Tuc. En 1585 le seigneur dEstadens, François Ustou, rachète cette bâtisse médiévale. La famille Ustou Montgaillard conservera le contrôle sur la commune jusquà la Révolution.","architecture":"Vestiges du château du XIIIe siècle, Cap del Tuc.                                                     Château du château du Cap del Roc, en effet, ce château ne date pas du Moyen Âge, mais bien du XIXe siècle, période à laquelle un archéologue allemand le fait construire.  À la fin du XIXe siècle, la mode est à l« éclectisme ». Ce nom désigne un style varié, fondé sur le renouveau de styles déjà existants. Cela est, en partie, dû aux avancées de larchéologie et de lhistoire de lart qui redécouvrent notamment les monuments du Moyen Âge.","habitants":"François d'Ustou de Lamothe\r\n        \r\n        \"","divers":"Château de Cap del Roc, du Val de Soux et de Montgaillard de Saliès","gps":"","images":["../../jctruffet.com/image/image_31/31_Montgaillard_Sallies_1.jpg","../../jctruffet.com/image/image_31/31_Montgaillard_Sallies_2.jpg","../../jctruffet.com/image/image_31/31_Montgaillard_Sallies_3.jpg"]},"Consult_chateau_formulairef002":{"id":"Consult_chateau_formulairef002","dept":"31","canton":"Escalquens-Noailloux","commune":"Montgeard","nom":"Montgeard","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux à Montgeard dont celui de Montgeard di XVIe siècle et celui de Roquefoulet  du XIXe siècle   et à trois kilomètre le château de M
