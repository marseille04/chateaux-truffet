eau de la Roncelière qui fut construit à la fin du XIXe siècle et a appartenu à la famille Péricaud de Gravillon jusqu'en 1895.           Château de la Vénérie édifié par la famille Berthelon au XVIIIe siècle il a également appartenu à madame Pinieux. Château d'Aveniens construit en 1787 par les Penet de Monterno, il présente une belle façade triangulaire, il appartient aujourd'hui à monsieur Rondot.         Le château de  Saint-Jean de Mogneniens construit au XIXe siècle dernier par le colonel de Sérezin, il appartient à la petite fille de madame Clavière.","architecture":"Deaux; cette vieille bâtisse du XIVe siècle à conservée  une tour carrée en briques de l'époque avec une meurtrière et une porte renaissance sous un arc surbaissé  accolé à cette tour, un vaste bâtiment du XVIe siècle, et un autre  du XVIIIe siècle accolés  au précédent, la façade est ornée d'une corniche de pierres.                            Château de la Roncelière construit en 1787, belle statue de la vierge bénit par Pie IX dans le parc.","habitants":"Famille Beaudet\"","divers":"Château de Deaux, château st-Jean et de la Roncelière.","gps":"","images":["../image/image_01/01_Deaux_1.jpg","../image/image_01/01_Deaux_2.jpg","../image/image_01/01_Deaux_3.jpg","../image/image_01/01_Deaux_4.jpg"]},"Consult_chateau_formulairec31e":{"id":"Consult_chateau_formulairec31e","dept":"01","canton":"Gex","commune":"Divonne-les-Bains","nom":"Divonne","type":"Château","periode":"XVIII","histoire":"Divonne. Importante seigneurie au XIIe siècle possédait par Walcher de Divonne et à son frère  Etienne de Gingins, cette seigneurie passa au XIIIe siècle aux sires de Gex, puis aux Joinville famille du célèbre chroniqueur, puis fait retour aux Gingins par alliance  en 1356 de Aymonette fille d'Aimé II de Joinville  qui épousa Jacques de Gingins, famille puissante à la cour de Savoie, le dernier baron de Divonne Laurent Gingins épousa Jeanne de Symond qui se retrouva veuve en 1653 se remaria à Gilbert de la Forest seigneur de Rumilly et de Divonne,cette seigneurie relevant du roi de France Albert Eugéne de la Forest  (fils) héritier quitte la maison de Savoie pour s'installer à Divonne  et c'est le comte Claude-Antoine de la Forest-Divonne qui fit construire le château au XIXe siècle. A la Révolution les biens sont confisqué mais Louis de la Forest les récupérera à la restauration, il fut ensuite nommé pair de France par le roi Charles X en 1827. Le château transformé en hôtel quatre étoiles en 1980 malheureusement incendié le 18 janvier 2017.                                 CRASSY: Dans ce château séjourna Alphonse de Lamartine, remanié au XIXe siècle par le comte de la Forest. Il à été racheté en 2011 par des Saoudiens pour y installer un golfe.                    Divonne-les-Bains devenue station thermale, fondé en 1849 par le docteur Vidart.","architecture":"L'ancien château du Moyen-Age puissamment fortifié était entouré  d'un mur d'enceinte appuyé sur plusieurs tours rondes. Le nouveau construit au XIXe siècle sur les ruines de l'ancien. Crassy; Château de style Louis XV construit au XVIIIe siècle, après son incendie remanié aux XIXe siècle en y ajoutant deux ailes imposantes, le corps central est le seul élément du XVIIIe siècle.","habitants":"Comte de la Forest\"","divers":"Château de Divonnes \r\nGrand-casino de Divonne-les-Bains","gps":"","images":["../image/image_01/01_Divonne_1.jpg","../image/image_01/01_Divonne_2.jpg","../image/image_01/01_Divonne_3.jpg","../image/image_01/01_Divonne_4.jpg","../image/image_01/01_Divonne_5.jpg"]},"Consult_chateau_formulaire11e4":{"id":"Consult_chateau_formulaire11e4","dept":"01","canton":"Nantua","commune":"Nantua","nom":"Dortan","type":"Château","periode":"XIV","histoire":"Dortan: La seigneurie de Dortan,  vassaux des sires de Thoire-Villars connut depuis le XIIe siècle firent construire le château avec des fortifications, malgré l'opposition de sire Humbert VI de Thoire-Villars, et les Dortan garderont le château   jusqu'au XVIIIe siècle. La seigneurie fut vendue suite à des méfaits de François de Dortan en 1703 à Pierre Gauthier, écuyer conseiller et secrétaire du roi, en 1783 à la mort  de son petit-fils le château passa à son neveu Camille Claret de Fleurieu le dernier seigneur à la Révolution fut son frère Gaspard, en 1822 il vendit le château à divers propriétaires avant d'être acquis en 1858 par un industriel lyonnais Noël le Mire qui reconstruit la tour sud et aménage la chapelle. Puis vendu par ses héritiers en 1898 aux Richoux,  puis aux  Roux qui en 1944 offre l'hospitalité à la population du village, qui vient d'être incendié par les allemands, et depuis 1973 le château appartient à Mr Rollet.","architecture":"Ce château qui date du XIIe siècle était une sentinelle  avancée de la maison de Savoie qui défendait la frontière  de la Franche-Comté.  remanié au XVIIIe siècle, composé de deux corps de logis dont les parties hautes remontent aux XIXe siècle le dernier étage  de la tour cantonné d'échauguettes est occupé par la chapelle. De l'ancien château la tour nord donjon rectangulaire  flanqué d'échauguettes  également dont  la base détruite au XVIIe siècle, le bâtiment des cuisines est du XIVe siècle.","habitants":"Renaud de Dortan\"","divers":"Château de Dortan","gps":"","images":["../image/image_01/01_Dortan_1.jpg","../image/image_01/01_Dortan_2.jpg","../image/image_01/01_Dortan_3.jpg"]},"Consult_chateau_formulaire3a41":{"id":"Consult_chateau_formulaire3a41","dept":"01","canton":"Poncin","commune":"Jujurieux","nom":"Echelles (les)","type":"Château","periode":"XVI","histoire":"Echelles: Château à Jujurieux, village  qui s'est développé  au XIXe siècle par l'industrie de la soie par les soyeux Claude-Joseph Bonnet développant  pas moins de treize châteaux par sa descendance et alliance.               Les châteaux hors Bonnet a Jujurieux, fief qui devient en 1355 à la Savoie par les comtes  de Savoie. Jean de Grammont, écuyer seigneur de Montgriffon de Montferrand et des Echelles en 1400, et depuis le début du XIVe siècle à la famille Mayria sous dépendance du Château du Varey.                               Le château de la Tour des Echelles est l'un des premier, le seigneur connu au XIIe siècle les Coligny, plusieurs branches par alliance, les sires de Thoire, les sires de Genève et de la Tour du Pin ces derniers devenaient en 1282 dauphins du Viennois.                   La tour de Cossieux (MH), et Chenavel qui a échappé a sa destruction à la Révolution (voir article).              En 1780 passe sous les ordres de Joseph Orcel de Châtillon qui racheta toutes les baronnies.                           Entre 1856 et 1859 en maisons bourgeoises et châteaux furent construits par les (Soyeux) Jules et Amédée Bonnet ce dernier chirurgien dentiste et sa descendance, tel que les EVETTES (anciennement Présavoies) construit par Jules Bonnet, le château industriel  de MONTAILLET inauguré en 1850 par Jean-Joseph Cottin gendre de Joseph Bonnet qui épousa  Adèle Bonnet, acheta le château de VALENCE qui appartenait à monsieur de Valence  aujourd'hui maison de retraite EHPAD, achetèrent GUERRET, construit par Jean Marie Pointet en 1844 industriel fabricant de soieries à Lyon qui épousa en 1872  Claire Bonnet fille de Victor Bonnet. SPEY fut construit et inauguré  en 1860 pour la famille Duchamp Pierre-Eugéne notaire à Lyon avait épousé Adèle Bonnet fille de Claude-Joseph Montaillet.                             SENECHE: Construit par Cyrille Cottin industriel (1838-1905) fils de Jean-Joseph Cottin propriétaire du château de Montaillet fabricant de soieries  à Lyon qui avait épousé Loïse Payan en 1863. CHAMPOLLION ancienne maison forte de la famille d'Oncieux de Chafferdon jusqu'en 1801 fait partie des biens de la famille Bonnet tel que VALROSE construit en 1898 et BEAUREGARD  construit au XIXe siècle par Edouard Philippon fils de Césarine Bonnet épouse de Jules Philippon.                      L'armée allemande occupa le château des Echelles en 1942, il subit de nombreuses dégradations puis transformé en terrain de camping et son propriétaire le laissa à l'abandon, trop de charge, il fut alors acheté par la commune d'Ambérieu en Bugey  qui le remit en état pour en faire une école de musique et un restaurant.","architecture":"Echelles; château détruit par le maréchal de Biron fut rebâti puis transformé, était le fleuron du Bugey ornés de fresques renaissances, actuellement un corps de logis rectangulaire à trois étages  de construction moderne flanqué d'une tour carrée à mâchicoulis et tourelles à l'opposés.","habitants":"Jean de Grammont et famille Bonnet\"","divers":"Château des Echelles, Valence, de Gueret, Montaillet, Spey et Sénéche.","gps":"","images":["../image/image_01/01_Echelles_1.jpg","../image/image_01/01_Echelles_2.jpg","../image/image_01/01_Echelles_3.jpg","../image/image_01/01_Echelles_4.jpg","../image/image_01/01_Echelles_5.jpg","../image/image_01/01_Echelles_6.jpg","../image/image_01/01_Echelles_7.jpg"]},"Consult_chateau_formulaireefed":{"id":"Consult_chateau_formulaireefed","dept":"01","canton":"Châtillon-sur-Chalaronne","commune":"Vonnas","nom":"Epeyssolles","type":"Château","periode":"XIII","histoire":"Epeyssolles: Sur la commune de Vonnas au Moyen-Age on y comptait pas moins de six châteaux, aujourd'hui il en reste deux Epeyssolles; construit par Guillaume d'Epeyssolles, ancienne seigneurie de ce nom, en 1289, Après avoir changé plusieurs fois de propriétaire au XVIe siècle,  ce domaine revient aux Guyot de la Garde  qu'il prit son nom, il fut vendue par la dernière descendance à une jeune  bourgeoise protestante de Bourg en Bresse Antoinette Poinsard, qui  par son  mariage le château reprendra le nom d'Epeyssolles  qui deviendra la propriété de Jean du Puy, comte de Ferrassière de Montbrun. En 1656 passa par alliance à  Espèrence du Puy de Montbrun qui  épousa le Burgrave Frédéric, comte de Dohna,  nommé gouverneur Burgrave de Prusse apparentées  à la famille de Stathouders ( origine Allemande).  \r\nA la fin du XVIIe siècle Frédéric de Dohna se maria a Pont de Veyle et s'établit à Epeyssolles, lorsqu'il dut renoncer a gouverner la principauté d'Orange, on retrouve sa descendance dans de nombreuses familles royales.  Passa au XIXe siècle à la famille Sayman qui le remania,  puis le domaine fut transformé en ferme en 1850 et en 1991  intégré aux établissements George Blanc qui posséde depuis longtemps une dimension européenne de centre de rencontres et d'échanges internationaux.           Béost-Sulignat: Le château fut construit au XVIIIe siècle sur les ruines de l'ancienne maison forte, appartenant à la famille du comte Boulard de Gatelier. Luponnas: Construit par Charles Duffour en 1779; appartenait aux ducs de Bourgogne; aujourd'hui lieu de séminaires et réceptions.","architecture":"Epeysolles; Nombreux propriétaires successifs donnèrent l'aspect d'un château a cette  maison bourgeoise dans un joli parc, seul le témoigne  la vieille tour  d'angle et la façade de droite.                                 Béoste-Sulignat; bâtiment en équerre à deux étages, une petite  tour ronde à toit pointu s'élève à l'angle des deux corps de bâtiment accolée d'une tourelle ronde.                                   Luponnas; Ce château suite à un incendie a été reconstruit au XIVe siècle  et au XVIIIe siècle, et en 1990 rectangulaire à deux étages et toits vernissés.","habitants":"Famille d'Epeyssolles\"","divers":"Château d'Epeysolles                     Château de Béost-Sulignat","gps":"","images":["../image/image_01/01_Epeyssoles_1.jpg","../image/image_01/01_Epeyssoles_2.jpg","../image/image_01/01_Epeyssoles_3.jpg","../image/image_01/01_Epeyssoles_4.jpg","../image/image_01/01_Epeyssoles_5.jpg","../image/image_01/01_Epeyssoles_6.jpg","../image/image_01/01_Epeyssoles_7.jpg"]},"Consult_chateau_formulaireed17":{"id":"Consult_chateau_formulaireed17","dept":"01","canton":"Trévoux","commune":"Reyrieux","nom":"Escoffier_Robillon","type":"Château","periode":"XVII","histoire":"Escoffier-Robillon: Ce château était la résidence d'été de mademoiselle de Montpensier dite la \"Grande Demoiselle\". La famille Cachet de Montezan en resta propriétaire jusqu'en 1789, fut acquis en 1820 par monsieur Piégay et remania le château en y rajoutant en 1860 un étage et les deux tours rondes. \r\nEn 1905 Louis Escoffier le racheta. Le prince de Galles y séjourna en 1912 et plus tard Edouard Herriot. Et en 1987 Pierre Escoffier vendit le château en viager à l'école Tsuji  pour en faire un centre éducatif de cuisine française pour étudiants japonnais.","architecture":"Ce château plus connu sous le nom de Balmon, était devenu un relais de la route de Paris était une halte de Mandrin.   Corps de logis à trois niveaux quadrangulaire flanqué de pavillons carrées en angle.","habitants":"Famille de Cachet de Montezan\"","divers":"Château d'Escoffier-Robillon","gps":"","images":["../image/image_01/01_Escoffier_Robillon_1.jpg"]},"Consult_chateau_formulaire6690":{"id":"Consult_chateau_formulaire6690","dept":"01","canton":"Collonges","commune":"Farges","nom":"Farges","type":"Manoir","periode":"XVI","histoire":"Farges; ce manoir reconvertit aujourd'hui en résidence immobilière, fut la propriété de la filleule de l'empereur Napoléon \"Napoléonne de Montholon\" née à Sainte-Hélène le 18 Juin 1816 à Longwood,  résidence de l'exil de Napoléon ( serait une fille naturelle de ce dernier) elle fut proche de Napoléon III, remariée au comte de la Pérouze en 1846 elle acheta le château en 1853, y résida jusqu'à sa mort, son fils fut maire de la commune de 1888 à 1890 et ce dernier revendit le château.","architecture":"Farges; Corps de logis rectangulaire flanqué d'une tourelle.","habitants":"madame Napoléonne de Montholon\"","divers":"Manoir de Farges","gps":"","images":["../image/image_01/01_Farges_1.jpg"]},"Consult_chateau_formulaire3fa6":{"id":"Consult_chateau_formulaire3fa6","dept":"01","canton":"Chalamont","commune":"Châtillon-la-Palud","nom":"Ferie","type":"Château","periode":"XIX","histoire":"Ferie ce château est devenu depuis quelques années le siège d'un institut médico professionnel centre Paul Mourlon.                                  Dans la commune château de Bublanne qui était autrefois relais de poste et le château de Grammont.","architecture":"Château du XIXe siècle  se dresse au dessus de Gevrieux, corps de logis rectangulaire flanqué plein cintre d'un pavillon saillant et deux autres en retrait sur les côtés.","habitants":"\"","divers":"Château de Férier","gps":"","images":["../image/image_01/01_Ferie_1.jpg"]},"Consult_chateau_formulairea143":{"id":"Consult_chateau_formulairea143","dept":"01","canton":"Ferney-Voltaire","commune":"Ferney-Voltaire","nom":"Ferney_Voltaire","type":"Château","periode":"XVII","histoire":"Le château de Ferney est connu depuis 1310 il fut incendié par les troupes Bernoises qui envahirent le pays de Gex en 1674, il fut racheté par le seigneur Guillaume de Budé qui entreprend d'importants travaux, Bernard de Budé comte de Montréal et de Ferney meurt sans postérité le domaine revient en 1756 à son frère qui décide de se défaire de la seigneurie,  elle sera acquise en 1759 par madame Marie-Louise Denis nièce du philosophe Voltaire ( François-Marie Arouet) qui en fait sa résidence principale pendant dix neuf années. A la mort de Voltaire, madame Denis se sépare du château pour un appartement parisien,  le vend  a un  ami de Voltaire, le marquis de la Vilette et qui s'en défait en 1782 par difficultés financières.  En 1785 Jean-Louis de Budé ( que ses ancêtres possédaient  la seigneurie) acquit le domaine, fera effectuer des modifications de façade la dotant d'un avant corps droit néo-classique et à sa mort le domaine sera  divisé en deux, le château  fut acquis par un industriel filateur de Lyon, puis par un sculpteur Emile Lambert puis à ses descendants,  et sera racheté en 1999 par l'Etat pour en faire un musée.","architecture":"Ce château à l'origine était entouré de murailles basses à mâchicoulis flanqués de quatre tours, En 1765 l'architecte Léonard Racle a rajouté deux ailes au corps de bâtiment principale. Par les années a perdu ses murs et ses tours. La façade fut doté d'un avant corps droit néo-classique.","habitants":"Famille de Budé Voltaire\"","divers":"Château de Fernay-Voltaire","gps":"","images":["../image/image_01/01_Ferney_Voltaire_1.jpg","../image/image_01/01_Ferney_Voltaire_2.jpg","../image/image_01/01_Ferney_Voltaire_3.jpg"]},"Consult_chateau_formulaire8d35-2":{"id":"Consult_chateau_formulaire8d35-2","dept":"01","canton":"Meximieux","commune":"Villieu-Loyes-Mollon","nom":"Fetans","type":"Maison forte","periode":"XII","histoire":"Fétans: Depuis le XIIe siècle il est la propriété de Villieu, érigé en fief en 1601 en faveur d'Antoine Jacquet, maître des postes à Lyon et en 1789 qui l'annexa à la baronnie de Loyes.  La tradition veut qu'Henri IV soit venu au château y vécut aussi  le peintre Utrillo de 1923 à 1848.","architecture":"Imposante bâtisse, corps de logis rectangulaire à deux étages style renaissance flanquée de deux tours rondes en façade.","habitants":"Famille Antoine Jacquet\"","divers":"Château de Fétans.","gps":"","images":["../image/image_01/01_Fetans_1.jpg","../image/image_01/01_Fetans_2.jpg"]},"Consult_chateau_formulaire58e6":{"id":"Consult_chateau_formulaire58e6","dept":"01","canton":"St-Trivier-sur-Moignans","commune":"Fareins","nom":"Flecheres","type":"Château","periode":"XVII","histoire":"Fléchéres: La vie des habitants de Fareins fut liée à celle du château , la baronnie en toute justice était possédée d'abord par les Palatins de Riottier qui possédaient aussi l'ancien château       (détruit). Les maîtres Pierre et Jean de Séve, parlementaires lyonnais de la famille du propriétaire le comte de la Ferrière qui en fit  l'acquisition en 1606. Le château souffrit peu à la révolution grâce aux habitants du village qui vinrent éteindre l'incendie allumé par les bandes de Fouché; bien que monsieur de Sarron, alors propriétaire mourût sous la guillotine, la famille put intégrer le château et continuer à vivre. En 1960 le dernier propriétaire avait en projet de transformé le parc de 40 hectares en une base de loisir, mais le classement au patrimoine le sauva, malgré cela il permit de tourner des films pour Philippe de Brocca \"Le diable par la queue\". En 1998 le domaine est laissé à l'abandon  pendant une dizaine d'années et Marc Simmonet Langlart et Pierre Almandros déjà propriétaire de Cormatin(71) en devint propriétaire.","architecture":"Le château fut remplacé et construit par Androuet de Cerceau sous Henri  IV,  merveilleusement conservé son plan médiéval cantonné de quatre  tours carrées et entouré d'un fossé. Château construit au XVIIe siècle, corps de logis central de style Louis XIII et Louis XIV,  la façade sur parc est encadrée de deux avant-corps, deux ailes en retour style XVIIIe siècle, pièces d'apparat dans le corps central et escalier d'honneur à balustres.","habitants":"Jean de Sève Famille de la Ferrière\"","divers":"Château de Fléchéres","gps":"","images":["../image/image_01/01_Flecheres_1.jpg","../image/image_01/01_Flecheres_2.jpg","../image/image_01/01_Flecheres_3.jpg","../image/image_01/01_Flecheres_4.jpg","../image/image_01/01_Flecheres_5.jpg"]},"Consult_chateau_formulairea05d":{"id":"Consult_chateau_formulairea05d","dept":"01","canton":"Viriat","commune":"Viriat","nom":"Fleyriat","type":"Château","periode":"XVI-XVIII","histoire":"Fleyriat; Les heures de gloire remonte au XVIIIe siècle, le philosophe Philibert de Bohan fonda une ferme expérimentale arboricole toujours en activité. Le château fut construit en 1867 par l'architecte Edouard Corroyer, passa au XIXe siècle à Louis Vabre militaire gouverneur de l'hôtel de ville lors de l'insurrection de la commune, ce château reçu de nombreuses personnalités, le général Trochu, le président Mac-Mahon, l'accadémicien F. Humbert et le savant Jobloskoff, ce château a failli disparaître lors du passage de l'autoroute.","architecture":"Fleyriat; corps de logis rectangulaire à trois niveaux, pavillons saillants en façade et en angles et tours rondes sur les côtés, toitures pointus avec chiens-assis  et des gargouilles permettant l'évacuation de l'eau du toit.","habitants":"Famille Edouard Corroyer  \r\nFamille Jean Yves le Bihau\"","divers":"Château de Fleyriat","gps":"","images":["../image/image_01/01_Fleyriat_1.jpg","../image/image_01/01_Fleyriat_2.jpg"]},"Consult_chateau_formulairec1b3":{"id":"Consult_chateau_formulairec1b3","dept":"01","canton":"Gex","commune":"Gex","nom":"Florimont Gex","type":"Château","periode":"XII","histoire":"Florimont: Construit au XIIe siècle par les sires de Gex, vasseaux des comtes de Genèves, en 1188  la première famille est remplacée par une branche cadette des comtes, fut la demeure de Léonéte de Gex petite-fille du comte de Genéve, fille aîné  d'Amédée de Gex et de Béatrice de Bagé qui naquit en 1232, orpheline en 1247 elle épousa Simon de Joinville. Le comte Aimé VI de Savoie s'en empara en 1353 et l'érigea en Baronnie.","architecture":"Construit au XIIe siècle à 950 mètres d'altitude et démantelé en 1601 par le roi de France. Florimont: est-ce le même abandonné au XVe siècle,  reste des vestiges du château du XIIIe siècle  Mallet: Domaine à Boisy demeure patricienne architecture locale du XVIIIe siècle.","habitants":"Simon de Joinville\"","divers":"Château de Florimont","gps":"","images":["../image/image_01/01_Florimont_Gex_1.jpg"]},"Consult_chateau_formulaire99d3":{"id":"Consult_chateau_formulaire99d3","dept":"01","canton":"Collonges","commune":"Leaz","nom":"Fort_l`Ecluse","type":"Fort","periode":"XIII","histoire":"Fort l'Ecluse: Le site fut fortifié à partir du XIIIe siècle et contrôlé  tour à tour par les Génevois, les Savoyards et finalement par les Français qui au terme du traité de 1601 garantissent passage et protection des Génevois.","architecture":"Formé de deux plans reliés par un escalier qui date de 1824, murs de courtine et base de la tour ronde; les caponnières inférieures, une partie à la porte de Genève et la fausse braie, enceinte basse enveloppant une partie ou la totalité du fort sont née de campagne de travaux en 1639-1641-1691-1700-1722-1725 qui suivirent l'arrivée des Français dans la citadelle en 1601, en 1830 construction de la partie supérieur relié par l' escalier souterrain.","habitants":"Louis XIV\"","divers":"Site du fort de l'écluse","gps":"","images":["../image/image_01/01_Fort_LEcluse_1.jpg","../image/image_01/01_Fort_LEcluse_2.jpg","../image/image_01/01_Fort_LEcluse_3.jpg","../image/image_01/01_Fort_LEcluse_4.jpg","../image/image_01/01_Fort_LEcluse_5.jpg"]},"Consult_chateau_formulairee043":{"id":"Consult_chateau_formulairee043","dept":"01","canton":"St-Trivier-sur-Moignans","commune":"Amariens-Francheleins-Ceissiens","nom":"Francheleins","type":"Château","periode":"XIV","histoire":"FRANCHELEINS; Fusion de trois communes; Cessiens et Amariens, la paroisse de Cessiens est citée  au Xe siècle, celle d'Amariens au XIe siècle  et celle de Francheliens au XIIe siècle, ces trois paroisses faisaient parties autrefois de la châtellenie de Montmerle rattaché à la France en 1762. Les conflits éclatèrent entre Savoie et les Bourbons  le seigneur de Montmerle  et de Beauregard  ces seigneuries furent rachetées par le duc de Savoie.         En 1974 prirent le nom de Francheliens,  nom d'une puissante famille en Dombes du XIIe siècle, puis aux Beaujeu et au XVe siècle  dépendait du comté de la Bâtie.  En 1638 à la mort du seigneur Ponceton son frère cadet seigneur de Laye à Taponas le remplaça  est restera jusqu'en 1681. La vie du village lui fut liée  jusqu'en 1789.                        AMARIENS même historique de Franceliens. VATANIENS;(voir article).","architecture":"Amariens élégant château du XVIIIe siècle Remanié au XVIIIe siècle. Francheliens ils ne reste que des vestiges.  Vataniens; Château de 1881. Vestiges d'un château du  XIIe siècle en briques rouges sur une légère poype, reste des remparts dans les dépendances, la tour carrée était défendu par des petites tours à chaque angles aujourd'hui disparue.","habitants":"Seigneurs des Francheliens\r\n        \r\n        \"","divers":"Château de francheleins; château de Amariens voir article pour Tavernost et pour Vataniens.","gps":"","images":["../image/image_01/01_Francheleins_1.jpg","../image/image_01/01_Francheleins_2.jpg","../image/image_01/01_Francheleins_3.jpg","../image/image_01/01_Francheleins_4.jpg","../image/image_01/01_Francheleins_5.jpg"]},"Consult_chateau_formulaire38f8":{"id":"Consult_chateau_formulaire38f8","dept":"01","canton":"Trévoux","commune":"Ars-sur-Formans","nom":"Garets","type":"Manoir","periode":"XII","histoire":"Garets: Au XIe siècle Ars et l'un des quatre vingt seize fiefs des sires de Villars possédaient un manoir à côté de l'église, en 1226 Jean d'Ars cède ses terres au monastère de l'Ile Barbe.    Au XIVe siècle la garde du château fut divisé entre les sires de Villars et les Beaujeu; le village brûla en 1409.       Propriété des seigneurs d'Ars en 1567,  la famille des Garets d'Ars deux de ses membres bienfaiteurs et les soutiens fidèle du curé.                        Ars devient la principauté des Dombes et en 1762 rattaché au royaume de France.","architecture":"Ars; Remanié plusieurs fois, il ne reste que peu de vestiges du XIIe siècle.     Le château de Garets grande demeure quadrangulaire, les corps de logis à deux niveaux celui de façade possède un fronton.","habitants":"Famille des Garets d'Ars\"","divers":"Château de Garets","gps":"","images":["../image/image_01/01_Garets_1.jpg"]},"Consult_chateau_formulaired7b5":{"id":"Consult_chateau_formulaired7b5","dept":"01","canton":"Pont-d`Ain","commune":"Certines","nom":"Genoud","type":"Château","periode":"XIV","histoire":"Genoud ce château fut construit par Pierre de Genost  chevalier Savoisien au XIVe siècle, grande dynastie proche du pouvoir Savoyard, trente deux générations se succédèrent, y construisirent le château en 1672 qui subit d'énorme dégât a la révolution, on y installa une salpétrière,  en 1837 le château fut acquis par la famille Chomel de Varagnes.","architecture":"De construction défensive possédait des tours  et murs crénelées, de larges fossés et une ceinture de palanques et pont-levis, subit des dégâts importants à la révolution, habilement restauré au XIXe siècle,  restes des murs d'enceintes en briques, corps principal du XIIIe siècle donnant sur une terrasse surélevée tour carrée rajoutée au XIXe siècle.","habitants":"Seigneur de Genost\"","divers":"Château de Genoud","gps":"","images":["../image/image_01/01_Genoud_1.jpg","../image/image_01/01_Genoud_2.jpg"]},"Consult_chateau_formulaire114a":{"id":"Consult_chateau_formulaire114a","dept":"01","canton":"Villars-les-Dombes","commune":"Lapeyrouse","nom":"Glariens","type":"Vestiges","periode":"XIV","histoire":"Glariens: Château des nobles de Liarrens (ancien nom de Glareins), rendit hommage aux seigneurs  de Thoire Villars, pour la maison forte en 1336. Vasseaux des sires de Villars.                              Au premier empire La baronnie de Glareins fut remise au général comte de Fay de la Tour-Maubourg, il paraît que ce château à eu l'honneur d'abriter Napoléon III.","architecture":"cité depuis le XIIIe siècle, reconstruit au XIVe siècle, il a conservé à l'extérieur une porte du XIVe siècle avec sa herse. Une partie du bâtiment subsiste à coté de ce qui fut remanié au XVIe siècle, vestige d'une galerie à arcades.","habitants":"Seigneurs de Lyarens\"","divers":"Château de Glariens","gps":"","images":["../image/image_01/01_Glareins_1.jpg","../image/image_01/01_Glareins_2.jpg"]},"Consult_chateau_formulaire9e29":{"id":"Consult_chateau_formulaire9e29","dept":"01","canton":"Trévoux","commune":"Jassans-Riottier","nom":"Gletiens","type":"Château","periode":"XIV","histoire":"Glétiens fut la possession des gentilhommes de Glétiens, mentionné en 1066 par Nicard de Glétiens passa au XIVe siècle  aux sires de Villars et ensuite aux /image_01/01_Gourdan_2.jpg","../image/image_01/01_Gourdan_3.jpg"]},"Consult_chateau_formulaireb528":{"id":"Consult_chateau_formulaireb528","dept":"01","canton":"Virieu-le-Grand","commune":"Ceyzerieu","nom":"Grammont (01)","type":"Château","periode":"XII","histoire":"Grammont; Château féodal construit au XIVe siècle par Hugues de Grammont qui possédait également le château de Lompnes. En 1400 Geoffroy de Grammont cède aux frères Gerbais la totalité des droits  sur la seigneurie  et en deviennent propriétaire, puis le vende à Guillaume Martel en 1408,  André de Martel en fit don  à Antoine de Forest en 1487 ses seigneurs possèdent également le château de la Bâtie d'Albanais en 1557, en 1585 une donation est faite par la fille de Pierre de la Forest, veuve de François de Michaille  en faveur de Claude-Louis de Martel. La seigneurie passe  en 1603 à charles de Forest par Lucréce de Chabeu veuve  d'Aymé-François de la Forest, passera ensuite à la famille Mornieu de 1605 à 1717, puis à la famille d'Arloz, un Anthelme d'Arloz écuyer le possédait à la Révolution est toujours dans la descendance par le Vicomte d'Arloz.","architecture":"Grammont; château féodal construit au XIVe siècle, quadrangulaire, quatre corps de logis à trois niveaux plus attiques flanqué à l'ouest d'une tour ronde crénelée, bâtiment prolongé à l'est par deux ailes de dépendances dont-une se terminant par une terrasse fermant une cour d'entrée avec poste de garde sur la gauche  et deux tourelles carrées intermédiaires entre ces bâtiments.","habitants":"Famille de Grammont                      Famille d'Arloz\"","divers":"Château de Grammont","gps":"","images":["../image/image_01/01_Grammont_1.jpg","../image/image_01/01_Grammont_2.jpg","../image/image_01/01_Grammont_3.jpg"]},"Consult_chateau_formulaire0929":{"id":"Consult_chateau_formulaire0929","dept":"01","canton":"Châtillon-sur-Chalaronne","commune":"St-André-le-Bouchoux","nom":"Grand_Romans","type":"Château","periode":"XIX","histoire":"Grand-Romans: Construit au XIXe siècle par la famille Bredin. Dans la commune le château de Vernes et d'Ollières.","architecture":"Grand-Romans, corps de logis central avec trois portes fenêtres ouvrant sur un vaste perron, il est encadré de deux corps de bâtiments surmontés de deux clochetons, tour ronde crénelée dans le parc et orangeraie.","habitants":"Famille Bredin\"","divers":"Château de Grand-Romans, chateau de Vernes et d'Ollières","gps":"","images":["../image/image_01/01_Grand_Romans_1.jpg","../image/image_01/01_Grand_Romans_2.jpg","../image/image_01/01_Grand_Romans_3.jpg","../image/image_01/01_Grand_Romans_4.jpg","../image/image_01/01_Grand_Romans_5.jpg","../image/image_01/01_Grand_Romans_6.jpg"]},"Consult_chateau_formulaire04e4":{"id":"Consult_chateau_formulaire04e4","dept":"01","canton":"Villars-les-Dombes","commune":"Lapeyrouse","nom":"Grange (01)","type":"Maison forte","periode":"XVI","histoire":"La Grange: Fief de Lapeyrouse était la propriété au XIIIe siècle des habitants du château de ce nom, il échut ensuite dans la  célèbre  seigneurie de Thoire-Villars,  Jean Bal sous la dépendance d'Humbert  de Thoire-Villars en 1368,    Depuis 1365, année où Jehan Bal, damoiseau, décide sa construction, La Grange est le château de Villars\r\nlès Dombes, situé sur la commune de Lapeyrouse. Jusquau début du XIIIe siècle, la Châtellenie de Chalamont,\r\ndite Châtellenie de la \" Petite Dombes \" appartenait à des gentilshommes qui en portaient le nom. Ensuite, la   famille de Chalamont  céda sa châtellenie aux Beaujeu, qui eux-mêmes la vendirent au Duc de Bourbon au XVe siècle. Marguerite de Bourbon épousa, à Bourg, le 25 janvier 1791, Pierre Camille Verdat, fils  du seigneur de La Grange Jehan Bal. Leur fille Catherine-Françoise Verdat de La Grange épousa Aymé-Joseph Michet de Varine, passa au XIIIe siècle aux seigneurs de Glareins, ce domaine dépendait de la principauté des Dombes jusqu'en 1762. Vendu à Louis du Marest après de multiples successions, le château  passa à la Révolution à la famille de Quinson, aujourd'hui propriété de la famille Finaz depuis 1869.                                       Dans la commune sur le bord de l'étang du Grand-Glariens une maison forte  du XIVe siècle possible qu'elle fut appelé aussi château de Glareins, construite en briques rouges qui hébergea Napoléon III de passage dans les Dombes.","architecture":"La Grange; château quadrangulaire, remanié au XIXe siècle en brique rouge flanqué de quatre tours rondes en angles à toits plats.","habitants":"Famille de Thoire-Villars\"","divers":"Maison forte de Grange","gps":"","images":["../image/image_01/01_Grange_1.jpg","../image/image_01/01_Grange_2.jpg"]},"Consult_chateau_formulaire4416":{"id":"Consult_chateau_formulaire4416","dept":"01","canton":"Trévoux","commune":"Parcieux","nom":"Grange_Blanche","type":"Château","periode":"XVI","histoire":"Grange-Blanche, appelé aussi la belle Cordière du XVIe siècle restauré sous Louis XV, Louise Labé y vécut des heures joyeuses au XVIe siècle, musicienne, écrivain et poète,  Louise fut une lyonnaise\" féministe\" avant la lettre. Elle fit sensation en s'engageant dans l'armée. On la surnomma \"la belle Cordière\".","architecture":"Grange Blanche; ce château du XVIe siècle restauré sous Louis XV possède un corps de logis rectangulaire flanqué de quatre pavillons et de tourelles.","habitants":"Louise Labé\"","divers":"Château de Grange Blanche.","gps":"","images":["../image/image_01/01_Grange_Blanche_1.jpg","../image/image_01/01_Grange_Blanche_2.jpg"]},"Consult_chateau_formulaireb796":{"id":"Consult_chateau_formulaireb796","dept":"01","canton":"Gex","commune":"Grilly","nom":"Grilly","type":"Maison forte","periode":"XIII","histoire":"Grilly; la famille de Jean de Grilly construit le château au XIIIe siècle. Claude de Grilly, seigneur de Ville-la-Grand, entreprit de faire construire en 1481 une maison haute à l'emplacement d'une ancienne tour romaine. Le château resta un siècle à cette branche des Grilly avant de passer en 1592 aux Gingins, seigneurs de Divonne. Il passe aux La Forest en 1664 lorsque Gilbert de la Forest hérite de sa mère Bonne de Gingins, dame de La Tour de Grilly, qui avait épousé Claude Antoine de la Forest, seigneur de Rumilly. Les La Forest deviennent alors seigneurs de Saint-Laurent de Rumilly et de la Tour de Grilly. Lorsqu'en 1733 Victor Amédée de la Forest cède son château de Rumilly-sous-Cornillon, il se retire à la Tour de Grilly. Le château passe ensuite aux Grenaud, seigneurs de Saint-Christophe, à la suite du mariage de Françoise Anne Gilberte de La Forest et de Joseph de Grenaud. Son fils Guillaume porte le titre de seigneur de la Tour. Lorsqu'en 1733 Victor Amédée de la Forest cède son château de Rumilly-sous-Cornillon, il se retire à la Tour de Grilly. Le château passe ensuite aux Grenaud, seigneurs de Saint-Christophe, à la suite du mariage de Françoise Anne Gilberte de La Forest et de Joseph de Grenaud. Son fils Guillaume porte le titre de seigneur de la Tour.  Les Grenaud résident depuis lors au château de Grilly, et leur ancien château de la Tour perd son caractère seigneurial. Dans la première moitié du XIXe siècle, la propriété est morcelée entre différents propriétaires. Il faut attendre 1993 pour voir l'édifice à nouveau réunifié par son propriétaire actuel, lequel a entrepris d'importants travaux de reconstruction et de restauration qui se sont achevés en 2008 et qui ont redonné à l'édifice son lustre d'antan","architecture":"L'édifice (gravures 2 et 3 sont inscrites au titre des monuments historiques depuis 1987. Dans le château de la Tour de Grilly restauré au XVIIIe siècle, se trouve une tour carrée, percée d'archères. Reconstruite fin XVe siècle il ne reste plus aujourd'hui qu'une partie du mur d'enceinte et une tour qui devait faire office de donjon, elle est flanqué à un bâtiment rectangulaire restauré au XIXe siècle en demi-croupe.","habitants":"Famille de Jean de Grilly\r\n        \"","divers":"Maison forte de Grilly","gps":"","images":["../image/image_01/01_Grilly_1.jpg","../image/image_01/01_Grilly_2.jpg","../image/image_01/01_Grilly_3.jpg","../image/image_01/01_Grilly_4.jpg","../image/image_01/01_Grilly_5.jpg"]},"Consult_chateau_formulairec003":{"id":"Consult_chateau_formulairec003","dept":"01","canton":"Lhuis","commune":"Groslèe","nom":"Groslee","type":"Vestiges","periode":"XII","histoire":"Groslée: Construit par Jacques de Groslée, sénéchal de Lyon, vers 1180. Il est restauré au XV et XVIe siècle. En 1580 le duc de Savoie érige la seigneurie en faveur de Claude de Groslée et vendu à la fin du XVIIIe siècle.                                  Vareppe fut achetée en 1934 à l'état de ruines par la famille Lyandrat, cette maison forte qui était au XIIe siècle un château fort a était transformée en maison forte remanié au XVe siècle avec des fenêtres à meneaux et de deux tours l'une ronde l'autre hexagonale  en façade.","architecture":"L'important château fort qui occupait un plan stratégique du Rhône,fut démantelé après sa vente du XVIIIe siècle, il ne subsiste aujourd'hui que le donjon, les remparts et les bases de tours. L'ensemble a été restauré.  Il y a une cinquantaine d'année à l'intérieur de l'enceinte a été édifié un logis dans le style des manoirs du Bugey, corps de logis rectangulaire flanqué d'une tour ronde.","habitants":"Famille de Groslée\"","divers":"Château de Grolée  et ses vestiges sur la partie centrale.                    Maison forte de Vareppe","gps":"","images":["../image/image_01/01_Groslee_1.jpg","../image/image_01/01_Groslee_2.jpg","../image/image_01/01_Groslee_3.jpg","../image/image_01/01_Groslee_4.jpg","../image/image_01/01_Groslee_5.jpg"]},"Consult_chateau_formulaire9bba":{"id":"Consult_chateau_formulaire9bba","dept":"01","canton":"Ceyzériat","commune":"Jasseron","nom":"Jasseron","type":"Vestiges","periode":"XIII","histoire":"Jasseron possède les vestiges du château féodal, il fut construit par Aimé de Coligny en 1230 et vendu en 1304 par les comtes de Savoie et ruiné à la fin du XVIe siècle. Le château de Saint-Angéle , la maison Bachet et la tour Ramasse du XV-XVIe siècle.","architecture":"Ruines d'un château féodal du XIIIe  ruiné au XVIe siècle, entouré  d'une enceinte quadrangulaire et d'un fossé sec et d'un donjon  carré.","habitants":"Amé de Coligny\"","divers":"Vestiges du château de Jasseron","gps":"","images":["../image/image_01/01_Jasseron_1.jpg","../image/image_01/01_Jasseron_2.jpg"]},"Consult_chateau_formulaireee7c":{"id":"Consult_chateau_formulaireee7c","dept":"01","canton":"Meximieux","commune":"Joyeux","nom":"Joyeux","type":"Château","periode":"XIX","histoire":"Joyeux:  Au XIIe siècle la seigneurie  de Joyeux était lié aux  Montélier déjà au temps des Thoires-Villars; le château appelé aussi de Barbentane construit au XIXe siècle par un industriel de la soierie Georges  Meillet-Montessuy, qui fit construire le château actuel en remplacement du premier bâtiment. Georges Meillet Montessuy épousa sa cousine en 1870 Fernande Eynard, qui cette dernière après la mort de Georges  en 1938, fit don  à sa nièce Georgette Roche de la Rigodière épouse du marquis de Barbentane mère de l'actuel propriétaire Pierre Claude,  récemment décédé son épouse le possède toujours.","architecture":"Joyeux; ce château qui fut construit en 1870 style  grand chalet par l'architecte  Henri Duchesne, en murs de briques associés aux angles par des parements de pierre, toitures d'ardoises garnis de fenêtrons et de clochetons, terrasses et parc à la française.","habitants":"Famille Meillet Montessuy\"","divers":"Château de Joyeux","gps":"","images":["../image/image_01/01_Joyeux_1.jpg","../image/image_01/01_Joyeux_2.jpg","../image/image_01/01_Joyeux_3.jpg"]},"Consult_chateau_formulairecd7d":{"id":"Consult_chateau_formulairecd7d","dept":"01","canton":"St-Trivier-sur-Moignans","commune":"Savigneux","nom":"Juis","type":"Château","periode":"XIV","histoire":"Juis: Mentionné au Xe siècle le château était la propriété de la famille qui porte ce nom. En 1315 Jean de Juis  en fait hommage aux sires de Thoire-Villars, par alliance passa à la famille de la Palud.   \r\nAu XIVe siècle aux seigneurs Bugistes de Groslée; Au XVe  siècle passa par vente dans les mains de Jean Duc de Bourbon 1459,  puis à la famille Balsac 1541 la maison d'Urfé;  Honoré d'Urfé auteur de l'Astrée, fit de nombreux séjours au château. La famille de Mars et enfin Nicolas Deschamps seigneur de Curtille, en 1660. Au XVIIIe siècle à Gilbert de la Font, échevin de Lyon. \r\nA la Révolution la famille Hervieux jusqu'en 1870 vendu ensuite au comte de Cibiens et c'est la famille Berthet qui en est l'actuel propriétaire acheté en 1936. Dans la commune sur la route d'Ambérieux château de Fontbleins.","architecture":"Enceinte  quadrangulaire en briques, dominé par un curieux donjon  en briques  du XIVe siècle, avec une étrange coupole ( extraordinaire tourelle de guet) festonnée de faux mâchicoulis haute de 12 mètres, en  brique reposant sur un arc en surplomb au  dessus de la cour intérieure, entouré d'un fossé de plus de trente cinq mètres.","habitants":"Jean de Juis\"","divers":"","gps":"","images":["../image/image_01/01_Juis_1.jpg","../image/image_01/01_Juis_2.jpg","../image/image_01/01_Juis_3.jpg","../image/image_01/01_Juis_4.jpg","../image/image_01/01_Juis_5.jpg","../image/image_01/01_Juis_6.jpg"]},"Consult_chateau_formulaireb038":{"id":"Consult_chateau_formulaireb038","dept":"01","canton":"Châtillon-sur-Chalaronne","commune":"Neuville-les-Dames","nom":"Lachassagne(01)","type":"Château","periode":"XVIII","histoire":"Lachassagne, Ancien château Jean d'Etre fut l'un des premiers seigneurs,  il fut vendu puis par héritage le domaine fut  apporté en hommage à François Ier en 1536.  Il a appartenu au XVIIIe siècle à diverses  familles  de Chanoinesse, puis il fut reconstruit au XIXe siècle par la famille Dugas de la Boissonny.","architecture":"De ce château qui fut reconstruit au XIXe siècle, trois corps de logis rectangulaires  à un étage et attiques accolé de deux pavillons saillants, l'ensemble à toitures vernissés.","habitants":"Famille Dugas de la Boissonny\"","divers":"Château de Lachassagne","gps":"","images":["../image/image_01/01_Lachassagne_1.jpg"]},"Consult_chateau_formulaired35e":{"id":"Consult_chateau_formulaired35e","dept":"01","canton":"Lagnieu","commune":"Lagnieu","nom":"Lagnieu (01)","type":"Château","periode":"XIV","histoire":"Lagnieu: Le château dit de Montferrand du XIVe siècle d'Aymard de Montferrand qui obtient du Syndic de Lagnieu une tour et des fortifications de la ville qui servit de bases à la construction du château qui ce dernier sera vendu comme bien national à la Révolution.                      Dans la commune manoir ferme du XIIIe siècle et colombier.","architecture":"Au Nord-Ouest reste d'un château du XIVe siècle attenant aux remparts  de forme rectangulaire à tours rondes arasées. plusieurs ruines aux environs dont l'une d'elle  présente un donjon carré.","habitants":"D'Aymard de Montferrand\"","divers":"Château de Montferrand, tour et maison forte.","gps":"","images":["../image/image_01/01_Lagnieu_1.jpg","../image/image_01/01_Lagnieu_2.jpg","../image/image_01/01_Lagnieu_3.jpg","../image/image_01/01_Lagnieu_4.jpg","../image/image_01/01_Lagnieu_5.jpg"]},"Consult_chateau_formulaired555":{"id":"Consult_chateau_formulaired555","dept":"01","canton":"Perronas","commune":"Lent","nom":"Lent","type":"Vestiges","periode":"XII","histoire":"Lent: Les premiers seigneurs des lieux, les sires de Beaujeu; Isabelle de Beaujeu qui adora Lent, le développa, son château fut le plus beau et le plus fortifié de la Dombes devint le centre d'une châtellenie dotée d'une garnison  elle fit entouré la cité d'une muraille et d'un fossé et en 1594 le marquis de Treffort au nom du duc de Savoie ruina le château et le village, les habitants furent massacrés,  il n'y avait que deux habitants quatre ans après, les souverains de Dombes s'efforcèrent de relever le village le duc du Maine et Nicolas Carré, verrier du duché d'Aumale firent une manufacture royale de Saint-Gobain (Verrerie).                    Dans la commune le château de Longchamp; construit sur les vestiges d'un prieuré remanié fin XVIIIe siècle puis au XIXe siècle par l'apport de deux tourelles propriété de la famille Schermesser-Shoff.","architecture":"De ces vestiges, restent une vieille tour dit \"tour de l'horloge\" dans le village, et le château Longchamps sur une poype rénové fin XVIIIe siècle, construit sur  l'ancienne paroisse de Saint-Laurent ou il y avait un prieuré.","habitants":"Isabelle de Beaujeu\"","divers":"Château de Lent et remparts.           Château de Longchamps.","gps":"","images":["../image/image_01/01_Lent_1.jpg","../image/image_01/01_Lent_2.jpg","../image/image_01/01_Lent_3.jpg","../image/image_01/01_Lent_4.jpg","../image/image_01/01_Lent_5.jpg"]},"Consult_chateau_formulaire6453":{"id":"Consult_chateau_formulaire6453","dept":"01","canton":"Montrevel-en-Bresse","commune":"Confrançon","nom":"Loriol","type":"Château","periode":"XIV","histoire":"Loriol s'appelait au Moyen-Age Asnières, des nobles de ce noms sont cités depuis 1100, vers 1300 la seigneurie parvient au Sachins qui font reconstruire  le château dans la première moitié du XIVe siècle,  au XVIIe siècle il est acquis par Jean de Loriol qui lui donne son nom, il a été mis au goût du jour en 1860. Aujourd'hui parc animalier Eurofarm.","architecture":"Imposant au milieu d'un parc, reconstruit au XIVe siècle remanié au XIXe siècle conservé dans son plan d'origine avec larges fossés,  en équerre, le corps de logis de deux niveaux possède deux ailes dont celle de droite tour d'escalier hexagonale et grosses tours rondes sur angle droit, sur sa gauche aile relié à un donjon carré à mâchicoulis, flanqué en angles d'échauguettes et tourelles, toit pointu sur donjon.","habitants":"Famille de Loriol\"","divers":"Château de Loriol","gps":"","images":["../image/image_01/01_Loriol_1.jpg","../image/image_01/01_Loriol_2.jpg","../image/image_01/01_Loriol_3.jpg"]},"Consult_chateau_formulaire8285":{"id":"Consult_chateau_formulaire8285","dept":"01","canton":"Meximieux","commune":"Villieu-Loyes-Mollon","nom":"Loyes","type":"Château","periode":"XIII-XIV-XIX","histoire":"Loyes: Dés le XIIIe siècle un fief important que se disputèrent les comtes de Savoies et les seigneurs du Dauphiné.                             Après la bataille de Varey (1325) il fut abandonné au dauphin du Viennois Guigue V, et fut alors pourvu de nouvelles défenses, il fut passé en baronnie au siècle suivant.                        Aujourd'hui à la famille Barbarin Joubert.","architecture":"Le château  du XVIIe siècle, de style Moyenageux aux tours et remparts crénelés, parc dessiné par le Nôtre.","habitants":"Guigue V\"","divers":"Château de Loyes","gps":"","images":["../image/image_01/01_Loyes_1.jpg","../image/image_01/01_Loyes_2.jpg"]},"Consult_chateau_formulairecd3e":{"id":"Consult_chateau_formulairecd3e","dept":"01","canton":"Villars-les-Dombes","commune":"Marlieux","nom":"Marlieux","type":"Château","periode":"XVI","histoire":"Marlieux: La seigneurie appartenait en 1280 à Jean de Joyeu. En 1790, la propriété fut acquise par la famille Cusset de Montrosard, puis aux Isaac Rémond, ancien maire de Marlieux qui restaura le château, et à sa mort ce dernier passa a une société civile immobilière, aujourd'hui résidence de personnes âgées. Il paraîtrait que le jeune capitaine Bonaparte y fit un court séjour en 1793 car Gaspard  Cusset de Montrosard, était son ancien directeur de l'école militaire.","architecture":"Ancienne maison forte de la ville sur Marlieu cité en 1280, restaurée au XIXe siècle, en château; trois corps de bâtiment avec ouverture au nord.","habitants":"Famille Cusset de Montrosard\"","divers":"Château de Marlieux et du clocher","gps":"","images":["../image/image_01/01_Marlieux_1.jpg","../image/image_01/01_Marlieux_2.jpg","../image/image_01/01_Marlieux_3.jpg","../image/image_01/01_Marlieux_4.jpg"]},"Consult_chateau_formulaireefc8":{"id":"Consult_chateau_formulaireefc8","dept":"01","canton":"St-André-le-Vieux","commune":"St-André-sur-Vieux-Jonc","nom":"Marmont","type":"Manoir","periode":"","histoire":"Marmont; Cité en 1272 par un acte de mariage de Sybille de Bagé avec Amédée de Savoie qui mentionne  que le seigneur Stéphane de la Balme en rend hommage et puis fidélité  au comte de Savoie pour ses terres  de Marmont sur la commune de Saint-André le Panoux. Une deuxième mention date de l'Empire napoléonnien puisque Marmont appartient à Pierre Bernard chevalier d'Empire  capitaine en retraite qui fut maire et député de Bourg en Bresse ou il résidait, Pierre Bernard fit donation du domaine en 1836 à son fils Charles qui était aussi  domicilié à Bourg en Bresse, c'est probablement Charles Bernard qui fit construire  le château dans les années 1850 sous le second Empire. En 1869 le domaine  de Charles Bernard fut acquis par  Hyacinthe Sattin dont la famille restera propriétaire pendant plus d'un siècle. Les F.F.I. pendant la seconde guerre mondiale en avait fait un poste d'observation et ont laissé leur initiales.                              Le château ne fut jamais occupé de façon permanente c'était la résidence  de campagne de famille lyonnaise jusqu'en 1984 date à laquelle une famille  en fit son logis principal et lui donna l'aspect actuel. Transformé aujourd'hui en chambres d'hôtes par la famille Guido.","architecture":"Marmont; corps de logis rectangulaire à deux étages avec  attiques et fronton.","habitants":"Famille Guido\"","divers":"Château de Marmont","gps":"","images":["../image/image_01/01_Marmont_1.jpg","../image/image_01/01_Marmont_2.jpg"]},"Consult_chateau_formulaired5fc":{"id":"Consult_chateau_formulaired5fc","dept":"01","canton":"St-Trivier-sur-Moignans","commune":"Messimy","nom":"Messimy","type":"Château","periode":"XIV","histoire":"Messimy: Château de la famille de ce nom, s'étant séparé du château   pendant plusieurs années, puis passa au XVIe siècle au duc du Maine, fils légitimé de Louis XIV et de madame de Montespan, prince des Dombes qui érigea en 1699 la terre de Messimy en comté au profit d'Antoine Desrioux, président au parlement de Trévoux, cette famille le garda jusqu'en 1910, puis fut acquis par la famille du Vernes qui en fit  une colonie de vacances  pour les enfants des employés des usines des câbles de Lyon et de Renault RVI.                  Montbriand: Erigé en comté au XVIIIe siècle par le comte d'Eu , dernier prince souverain de la Dombes.","architecture":"Messimy; l'ancienne forteresse se dressait au XIIe siècle en poste de surveillance au dessus de la Saône, il comprenait autrefois une grosse tour ronde relié à un double corps d'habitation, l'édifice actuel, objet d'une savante restauration d'aspect d'une noble résidence, grosse tour  du XIIIe et du XIVe siècle et ponceau à deux arches reste du château du XVe siècle. Construit au XIVe siècle, reconstruit au XVIIIe siècle, et de nouveau incendié en novembre 2010 entrée fortifiées avec pont  levis,  hérissée de trois  tours dont la plus ancienne est carrée, nombreuses transformations au cours des siècles, douves bouchés,              Montbriand; bâtiment quadrangulaire à deux étages, chapelle du XVe siècle etc.","habitants":"Duc du Maine  Famille Desrioux\"","divers":"Trois autres châteaux dans la commune  Le château de Lurcy, La Poyat, voir article pour ces deux derniers.","gps":"","images":["../image/image_01/01_Messimy_1.jpg","../image/image_01/01_Messimy_2.jpg","../image/image_01/01_Messimy_3.jpg","../image/image_01/01_Messimy_4.jpg","../image/image_01/01_Messimy_5.jpg","../image/image_01/01_Messimy_6.jpg","../image/image_01/01_Messimy_7.jpg","../image/image_01/01_Messimy_8.jpg"]},"Consult_chateau_formulaire8283":{"id":"Consult_chateau_formulaire8283","dept":"01","canton":"Meximieux","commune":"Meximieux","nom":"Meximieux","type":"Château","periode":"XI","histoire":"Meximieux: Le château dominant  le village fut construit par l'archevêque Humbert, archevêque à Lyon au XIe siècle Méximieux; tire son nom d'un propriétaire d'une ferme gallo-Romaine \"Maximacus\".  Au XIIe siècle Louis sire  de Baugé et les sires de Villars se partagèrent la région se  prétendant seigneur. Par alliance de la fille du sire de Beaugé en 1218 avec Hubert V de Beaujeu les Dombes passèrent au royaume de France. Au XIIIe siècle son fils prisonnier à la bataille de Varey (1325) doit donner la seigneurie au dauphin du Viennois, celle-ci passa ensuite au  comté de Savoie seigneurs de Méximieux, très malmené à la Révolution.","architecture":"le château qui fut construit au XIIe siècle détruit en partie à la Révolution  fut entièrement reconstruit au siècle dernier, mais plusieurs fois incendiés en 1990, ont considérablement détérioré le château, une porte du XIIe siècle.","habitants":"Humbert archevêque\"","divers":"Château de Meximieux","gps":"","images":["../image/image_01/01_Meximieux_1.jpg","../image/image_01/01_Meximieux_2.jpg"]},"Consult_chateau_formulaire0575":{"id":"Consult_chateau_formulaire0575","dept":"01","canton":"Miribel","commune":"Miribel","nom":"Miribel (01)","type":"Vestiges","periode":"XIII","histoire":"Miribel: Seigneurie du XI et XIIe siècle, en 1228 le sire de Beaujeu  reconnaît que le château relève de l'Abbé de l'Ile Barbe; en 1327 Guichard de Beaujeu reconnait la suzeraineté  du dauphin. Les seigneurs de Miribel dépendaient de la maison de Bâgé puis a Guichard VI sire de Beaujeu.\r\nAu XIVe siècle commence les conflits  qui finirent par l'attribution de Miribel au futur Charles V roi de France qui chercha a s'en débarrasser rapidement  ( constat d'échange le 5 janvier 1354 à Amédée V comte de Savoie) Miribel fera partie de la France le 9 mars 1594 après le siège des troupes d'Henri IV ce qui entraînera la destruction presque complète du Château. Dans ce château séjourna Jean de Vienne sire de Roulans et grand amiral de France.","architecture":"On peut voir encore une tour ronde de dix mètres de haut et les restes d'une enceinte.","habitants":"Famille de Beaujeu\"","divers":"Tour de Miribel","gps":"","images":["../image/image_01/01_Miribel(01)_1.jpg"]},"Consult_chateau_formulaire87b1":{"id":"Consult_chateau_formulaire87b1","dept":"01","canton":"Meximieux","commune":"Meximieux","nom":"Montellier (01)","type":"Château","periode":"XIII","histoire":"Montellier: En 1186 Bermond de Montellier seigneur des lieux et en 1327 le sire de Beaujeu cède au dauphin  du viennois à partir du XIVe siècle les sires de Thoire-Villars succèdent aux premiers seigneurs qui transmettent  le château jusqu'à Odon de Villars mort sans héritier en 1419;  le château partagé par deux héritières, ces deux soeurs épouses des seigneurs de Chiel de Montbel en 1554, Sébastien de Montbel acquiert d'Etienne de Grolée,  descendant des Chiel qui acquit l'autre part enfin de rassembler l'édifice, Sebastien épouse une espagnole, Béatrix Pacheco, issue d'une maison ducale  d'Escalona dont il aura une fille,  jacqueline de Montbel en 1541 qui épousera en 1571 Gaspard de Coligny, après la fin tragique de la châtelaine  \" madame l'Amira \" dans son cachot italien pour des prétexte qu'elle avait \"adoré Satan\", mourut en prison d'épuisement et de maladie.  Le château échoit à la fille unique  Béatrix de Coligny, épouse de Claude Antoine Bon, baron de de Meuillon et Montauban, grand chancelier de Savoie. Ils eurent qu'une fille qui épousa le marquis de  La Chesnelaye, et n'eut elle aussi qu'une fille mariée en 1688 à Guillaume François de l'Hospital,  marquis de Saint-Meyme, ce dernier fut un grand savant, vice président de l'Académie des sciences puis sa petite fille, Melle Chevrier tiendra  le Montellier jusqu'en 1781 vendit le château à un agronome lyonnais Antoine Greppo, puis transmis par alliance à la famille Richard, au XIXe siècle est en indivis entre les familles Chaumeau et Billard de saint Laumer.","architecture":"Construit sur une poype au XIIIe siècle , le château remanié au XIVe siècle prend un important dispositif défensif, par des profondes douves avec pont levis, encore entouré de son enceinte fortifiée flanquée de neuf tours carrées , par une galerie couverte à colonnettes élevée sur la courtine qui relient le corps du bâtiment en serrant la basse cour, le corps de logis quadrangulaire accosté à une tourelle ronde jouste le donjon cylindrique seize mètres de haut du XIIIe siècle.","habitants":"Bermond de Montellier \r\nfamille de Montbel\"","divers":"Château de Montellier","gps":"","images":["../image/image_01/01_Montellier_1.jpg","../image/image_01/01_Montellier_2.jpg","../image/image_01/01_Montellier_3.jpg","../image/image_01/01_Montellier_4.jpg","../image/image_01/01_Montellier_5.jpg","../image/image_01/01_Montellier_6.jpg","../image/image_01/01_Montellier_7.jpg","../image/image_01/01_Montellier_8.jpg"]},"Consult_chateau_formulaire3021":{"id":"Consult_chateau_formulaire3021","dept":"01","canton":"Montluel","commune":"Montluel","nom":"Montluel","type":"Maison forte","periode":"XI- XII","histoire":"Montluel: Possession des sires de Montluel depuis le XIe siècle, Montluel fut au cours des siècles  le cadre  de visites princières . Au XVe siècle la Savoie est érigée en duché et Amédée VIII, roi du Piemont couronné par l'empereur d'Allemagne Sisgemond . \r\nAu XVIe siècle  François Ier est reçu en grande pompe par Catherine de Médicis , Henri VI, Louis XIII vinrent tour à tour donner l'éclat à la cité.  Au XVIIe siècle  Henri de Bourbon prince de condé devient seigneur de Montluel. \r\nVille de Montluel: Des hôtels particuliers du XVIe siècle tel que l'hôtel Beauséjour, Messimy, Fontbleins et Condé.                            Boiron; Au XIe siècle possédait par les sires de Montluel.","architecture":"Boiron. Ancienne tour ronde et tour carrée du XIVe siècle, porche du XIIe siècle et maison du Prince de Condé.","habitants":"seigneurs de Montluel\"","divers":"Château de Boiron","gps":"","images":["../image/image_01/01_Montluel_1.jpg","../image/image_01/01_Montluel_2.jpg"]},"Consult_chateau_formulaire3fc8":{"id":"Consult_chateau_formulaire3fc8","dept":"01","canton":"Thoissey","commune":"Montmerles","nom":"Montmerles","type":"Château","periode":"XVII","histoire":"MONTMERLES, possession de la famille des Enchaînées au XIe siècle, puis passa aux sires de Beaujeu qui en firent don au XVe siècle à Louis II duc de Bourbon, passera ensuite par achat à Laurent de Gorrevod, mais ce dernier ne put en prendre possession après saisies, don et aliénation successifs.                Cette seigneurie passera à la souveraineté des Dombes au XVe siècle.  A Montmerles Chartreuse Abbaye ou monastère appelé \"Notre-Dame de Montmerles du Val de Saint-Etienne de Lescheroux de l'Ordre de Saint-Benoit fondé en 1170 par Hugues d'Asnières des Bois, elle a fonctionné jusqu'à la Révolution.                                Dans la commune le château d'Avencourt (voir article) et le château de la Zeille du XIXe siècle au centre du village, l'histoire de ces deux châteaux sont lié à l'histoire de Montmerles.","architecture":"Montmerles; ancien château féodal , le premier édifice fut construit en 1605 par le duc de Montpensier et restauré au siècle dernier. Le château,  corps de logis rectangulaire à deux niveaux fronton en façade et pavillons en retrait sur les côtés.                        Tour du château des Minimes ronde à quatre niveaux.","habitants":"Duc de Montpensier\"","divers":"Château de Montmerles Tour du château des Minimes","gps":"","images":["../image/image_01/01_Montmerles_1.jpg","../image/image_01/01_Montmerles_2.jpg"]},"Consult_chateau_formulaireab30":{"id":"Consult_chateau_formulaireab30","dept":"01","canton":"Nantua","commune":"Montréal-la-cluze","nom":"Montreal (01)","type":"Vestiges","periode":"XIII","histoire":"MONTREAL la CLUZE; Les sires de Thoire-Villars jouèrent un rôle important au XI-XIIe siècle dans l'organisation de la Bresse et des Dombes. Etienne II succéda vers 1235 à Etienne, premier fondateur de Montréal, de 1244 à 1248 Etienne II édifia le château fort sur le sommet du mont Réal dominant les châteaux voisins, Brion, Nantua, St-Martin et Volognat.   A la mort d'Etienne II, son fils Humbert III lui succéda mais la mère déclare la guerre à Nantua, ce qui entraîna la perte de Montréal et le dernier descendant Humbert IV dut vendre la seigneurie  en 1402 au comte de Savoie. Cette seigneurie fut érigée en comté par ces derniers en 1570 au profit des sires de Montfort.   En 1602 le roi Henri IV ordonna la destruction du château et Louis XIII le fit reconstruire et installa une garnison.                                 En 1635 le commandant  Antoine de Douglas reçut l'ordre de détruire à nouveau le château mais son fils Charles de Douglas racheta en 1757 le comté de Montréal qui ces derniers habitèrent dans un château plus moderne  au pied du massif, et il fut acquis par la commune en 2000.    Dans la commune le château de Dumont.","architecture":"Montréal; aujourd'hui au coeur du parc, seul des pans de murs et des tours rappellent la présence passée du château du XIIIe siècle et des fortifications.   Dumont: De construction récente du XIXe siècle corps de logis flanqué de pavillons carrés.","habitants":"Sires de ThoireVillars\"","divers":"Tour de Montréal                       Château de Dumont.","gps":"","images":["../image/image_01/01_Montreal(01)_1.jpg","../image/image_01/01_Montreal(01)_2.jpg","../image/image_01/01_Montreal(01)_3.jpg","../image/image_01/01_Montreal(01)_4.jpg"]},"Consult_chateau_formulairec895":{"id":"Consult_chateau_formulairec895","dept":"01","canton":"Trévoux","commune":"St-André-de-Corcy","nom":"Montribloud","type":"Château","periode":"XIV","histoire":"Montriboud: Baronnie puis Comté, du XIVe siècle appartenait à Hugues Brun chanoine de la métropole de Lyon puis à Humbert V  sire de Thoire-Villars qui firent édifier le château-fort et en 1334 en rendit hommage au dauphin du Viennois pour le \"donjon\" de Montribloud.  \r\nEn 1384 Humbert VI de Thoire-Villars donna en échange  de la terre de Beauvoir en Bugey, à Eudes de Villars, seigneur de Montellier, son cousin, la seigneurie de Montribloud avec des paroisses attenantes.  \r\nAprés la mort d'Eudes de Villars au XVe siècle qui décéda sans enfant,  Montribloud passa a ses petits neveux fils de Jeanne de la Tour et de Jean de la Baume, resta dans cette famille de la Beaume Montrevel jusqu'à Antoine, qui le vendit en 1590  à Martin et Jean de Covet, seigneur de la Mure, cette seigneurie acquit une immense fortune durant le XVIe et le XVIIe siècle obtint que la baronnie de Montribloud  soit érigé en comté. De la famille Covet passa à  celle de Nicoleau par achat avant d'appartenir en 1826 à la famille Bodin  (1804-1893 ) Alexandre Bodin député de l'Ain  dit \"Bodin de Montribloud\".    Dans la commune de St-André de Corcy le château de Vernage actuellement maison de retraite.","architecture":"Montribloud; construit en 1334 en château fort et restauré au XIXe siècle dans son état actuel par Alexandre Daudin, corps de logis quadrangulaire à deux étages  flanqué de pavillons carrés en angles à trois niveaux à toitures coupées.","habitants":"Famille de la Baume                 Famille Bodin\"","divers":"Château de Montribloud et de Vernange","gps":"","images":["../image/image_01/01_Montribloud_1.jpg","../image/image_01/01_Montribloud_2.jpg","../image/image_01/01_Montribloud_3.jpg","../image/image_01/01_Montribloud_4.jpg","../image/image_01/01_Montribloud_5.jpg","../image/image_01/01_Montribloud_6.jpg","../image/image_01/01_Montribloud_7.jpg"]},"Consult_chateau_formulaire687b":{"id":"Consult_chateau_formulaire687b","dept":"01","canton":"Seyssel","commune":"Culoz","nom":"Montveran","type":"Château","periode":"XIV","histoire":"Montveran: Appelé aussi château de la Fléchère. Les premiers seigneurs les Luyrieu, Humbert de Luyrieu qui reçut des sires de Valmorey le fief pour services rendus, Pierre de Luyrieu construisit le château en 1316, puis par alliance passa à la seigneurie de Prangins dont un des fils Guillaume épousa Catherine de Bourgogne fille naturelle de Charles le Téméraire dernier duc de Bourgogne. Le connétable de Bourbon s'y réfugia à sa sortie du Royaume de France, les frères Serpolet y travaillèrent leur père précurseur de l'automobile, il fut habité par Serge Prokoffiev en 1928, Henriette Angeville y séjourna . Aujourd'hui propriété du comte de la Fléchère.    Dans la commune de Culoz le château de Lavours grosse bâtisse flanquée d'une tour octogonale.                        Le château de Béon bâtisse à trois niveaux flanqué de tour carrées à mâchicoulis.","architecture":"Ce château qui fut construit vers 1320 de construction massive et de plan quadrangulaire   en parti détruit par les troupes du maréchal de Biron en 1595, le château fut restauré de 1635 à 1687, mais les tours furent rasées en 1794 et deux sont reconstruites  au XIXe siècle à toits poivrières et pavillon détaché portant échauguettes en angle restauré en 1858 de style troubadour .","habitants":"Seigneur de Luyrieu                   Famille de la Fléchére de Beauregard\"","divers":"Château de Montveran, de Lavours et de Béon","gps":"","images":["../image/image_01/01_Montveran_1.jpg","../image/image_01/01_Montveran_2.jpg","../image/image_01/01_Montveran_3.jpg","../image/image_01/01_Montveran_4.jpg","../image/image_01/01_Montveran_5.jpg","../image/image_01/01_Montveran_6.jpg","../image/image_01/01_Montveran_7.jpg","../image/image_01/01_Montveran_8.jpg"]},"Consult_chateau_formulairec6e6":{"id":"Consult_chateau_formulairec6e6","dept":"01","canton":"Virieu-le-Grand","commune":"Chegnieu-la-Balme","nom":"Montville","type":"Château","periode":"XVI","histoire":"Le château de Montville fut bâtie au XIVe siècle sur un piton dominant le Furans,  joua un rôle de surveillance, propriété de Claude du Plastre en 1561, puis devient la propriété en 1640 de la famille Curty de Belley. Gabriel Passerat de la Chapelle, né à Châtillon de Michaille , épousa en quatrième noce une demoiselle  Curty et acheta en 1669 le domaine à son beau-père. Pierre Passerat  de la Chapelle est illustré pendant les guerres indiennes au Canada et les guerres d'indépendance Américaine.  \r\nEn 1895 au décès du dernier de la Chapelle, Gabriel Honoré qui fut le premier maire de Cheigneu en 1855 . \r\nLa famille Brillat-Savarin, Récamier habitèrent la propriété en 1896 ils vendent le château à la famille  Robert Bodin qui avait épousé sa cousine Jeanne Bidauld, leur fils Alexandre  député de l'Ain, la famille Bodin ruinée durent vendre aux enchères en 1936, acheté par monsieur Pierre Passerat de la Chapelle arrière petit-fils de Pierre Passerat de la Chapelle qui avait quitté Montville en 1734.                                 Dans la commune de Cheignieu la Balme le château d'Eclaz qui fut construit par l'architecte lyonnais Claude-Marie Delorme.","architecture":"Cellier des moines de Saint-Sulpice au XVe siècle fut doté de tourelles et de mâchicoulis d'opérette du XIXe siècle.  La tour ronde à l'entrée du château est la partie la plus ancienne du XIVe siècle. La toiture étant refaite en 2005, les mâchicoulis disparurent.        Eclaz; construit à partir du XIVe siècle autour d'une grange à dîme, l'ensemble agrandi et modifié jusqu'au XIXe siècle, charpente à l'impériale (dit en carène) du XVIIe siècle abrite le musée des vins.","habitants":"Famille Claude de Plastre             Famille Delorme\"","divers":"Château de Montville","gps":"","images":["../image/image_01/01_Montville_1.jpg","../image/image_01/01_Montville_2.jpg","../image/image_01/01_Montville_3.jpg","../image/image_01/01_Montville_4.jpg"]},"Consult_chateau_formulairea69f":{"id":"Consult_chateau_formulairea69f","dept":"01","canton":"Chalamont","commune":"St-Nizier-le-Désert","nom":"Notre_Dame_des_Dombes","type":"Patrimoine","periode":"XIX","histoire":"Notre-dames des Dombes: Fondée par l'abbaye de'Aiguebelle dont les moines conçurent au Moyen-Age l'aménagement du plateau au XIXe siècle, la communauté cistercienne d'obédiance trappiste a contribué à l'assainissement du pays en développant les travaux d'assèchement.","architecture":"L'église au centre accolé sur la droite d'une aile de bâtiment et de deux sur la gauche accolé a des corps de logis surélevés.","habitants":"les trappistes\"","divers":"Abbayes de Nôtre-Dames les Dombes","gps":"","images":["../image/image_01/01_Notre_Dames_des_Dombes_1.jpg"]},"Consult_chateau_formulaire6abd":{"id":"Consult_chateau_formulaire6abd","dept":"01","canton":"Meximieux","commune":"Pérouges","nom":"Perouges","type":"Patrimoine","periode":"XV  XVI","histoire":"Village de Pérouges fut fortifié et château restauré cité en 1130 aux mains de Guichard d'Anthon, vassal du comte de Forez et de Lyon. Au XIIIe siècle  le château et la seigneurie passent par mariage à la famille de Genève et en 1319 ils sont acquis par les Dauphins du Viennois; avec le Dauphiné, ils parviennent en 1343 au roi de France  qui les échangent en 1354 avec le comté de Savoie.  \r\nLa paix régna à Pérouges a partir du traité de Lyon  en 1601 par laquelle le pays de l'Ain en partie fut rattaché à la France. Claude Favre en 1585-1650 était baron de Pérouges et seigneur de Vaugelas, chambellan de Gaston d'Orléans célèbre grammairien du XVIIe siècle.","architecture":"Pérouges; sauvé de la démolition au début du XXe siècle grâce à l'intervention du président Edouard Herriot et du comité de défense et conservation du Vieux Pérouges. Le village s'abritait derrière  une double enceinte dont il subsiste que quelques rares vestiges et le tracé de son fossé (promenade des terreaux) l'enceinte intérieure est restée intacte encore flanquée de deux tours. Dans le centre des maisons renaissances ; la maison du petit Saint-Georges, l'Ostellerie, la maison des princes de Savoie avec tour de guet, la maison des dîmes et du pressoir, la maison du sergent de justice, la maison Thibaut, le grenier à sel et  la maison de Côme-Ferran.","habitants":"Famille Claude Favre\"","divers":"Château, portes et maisons renaissances","gps":"","images":["../image/image_01/01_Perouges_1.jpg","../image/image_01/01_Perouges_2.jpg","../image/image_01/01_Perouges_3.jpg","../image/image_01/01_Perouges_4.jpg","../image/image_01/01_Perouges_5.jpg","../image/image_01/01_Perouges_6.jpg"]},"Consult_chateau_formulaire76b6":{"id":"Consult_chateau_formulaire76b6","dept":"01","canton":"Belley","commune":"Peyrieu","nom":"Peyrieu","type":"Château","periode":"XV","histoire":"Château de Peyrieu  du XV-XVI e siècle restauré et modernisé il fut acheté par l'américaine Grace  Whitney Hoff en 1919, elle y restaura de nombreux bâtiments. Aujourd'hui ce château est géré par l'Adapt pour personnes handicapées.","architecture":"Corps de logis quadrangulaire à deux étages, tour octogonale crénelée accolée en façade.","habitants":"Grace Whitney Hoff\"","divers":"","gps":"","images":["../image/image_01/01_Peyrieu_1.jpg","../image/image_01/01_Peyrieu_2.jpg","../image/image_01/01_Peyrieu_3.jpg","../image/image_01/01_Peyrieu_4.jpg"]},"Consult_chateau_formulairef221":{"id":"Consult_chateau_formulairef221","dept":"01","canton":"Belley","commune":"Virignin","nom":"Pierre_Chatel","type":"Château","periode":"XIII","histoire":"Cette chartreuse  de Pierre-Châtel fut édifiée  en résidence forteresse au XIIIe siècle par le comte de Savoie Amédée IV, elle fut  transformée en chartreuse par Amédée VI,ou les moines se transformèrent quelques fois en soldats pour garder les lieux contre les français; prison sous la révolution et résidence des autrichiens en 1814 reliée  par un escalier souterrain au fort par 475 marches, désarmée  en 1919 sera vendu à un particulier.","architecture":"Imposante forteresse qui fut également construite pour contrôler le passage sur le Rhône.","habitants":"Comtes de Savoie\"","divers":"","gps":"","images":["../image/image_01/01_Pierre_Chatel_1.jpg","../image/image_01/01_Pierre_Chatel_2.jpg"]},"Consult_chateau_formulaireefe7":{"id":"Consult_chateau_formulaireefe7","dept":"01","canton":"Chalamont","commune":"Plantay","nom":"Plantay","type":"Château","periode":"XIV","histoire":"La commune  de Plantay s'appelait  jusqu'au XIVe siècle Saint-Didier de Renon, puis prit le nom du fief d'Hugues de Plantay; vassal des sires de Thoire-Villars qui en devint propriétaire. \r\nLe château fut construit par le seigneur du Plantay, Antoine de Saint-Didier sur une poype dominant l'étang.","architecture":"château  du XIVe siècle incendié  en 1460 par les troupes du duc  de Bourbon, n'a pas été reconstruit, il reste une grosse tour ronde \"donjon cylindrique\"  de 19 m de haut en briques avec encadrement à mâchicoulis.","habitants":"Hugues de Plantay\"","divers":"Château de Plantay","gps":"","images":["../image/image_01/01_Plantay_1.jpg","../image/image_01/01_Plantay_2.jpg","../image/image_01/01_Plantay_3.jpg","../image/image_01/01_Plantay_4.jpg","../image/image_01/01_Plantay_5.jpg","../image/image_01/01_Plantay_6.jpg"]},"Consult_chateau_formulaire5715":{"id":"Consult_chateau_formulaire5715","dept":"01","canton":"Poncin","commune":"Poncin","nom":"Poncin","type":"Château","periode":"XIV","histoire":"Poncin: le centre de cette ancienne ville fortifiée a gardé son allure médiévale, château du XIVe siècle fondé en 1308 par Humbert VII de Thoire-Villars qui en fait hommage au dauphin du Viennois, en 1375 la suzeraineté passe aux comtes de Savoie qui achètent le château et le domaine en 1402 remanié au XVI e siècle et au XVIIe siècle par les ducs de Nemours qui l'on obtenu en 1565. Le château commença a se démanteler après les conflits des guerres de religion et se termina à la Révolution. Propriétaire actuel le général Tessier.                        MERIGNAT en 1343 un sieur Antoine Mathieu prêtre doyen de Cerdon dont la famille possédait le château depuis plus de cinq cent ans, aujourd'hui les ruines du château seigneurial se dressent sur un piton  à la sortie du village, il comportait quatre tours carrées dont une subsiste, récemment restaurée. Dans le village de Mérignat une grande maison du XVIIIe siècle jadis propriété de notables locaux les Mathieu (en 1867, elle appartenait à Mr Georges Benoit Mathieu d'Apremont descendant de sieur Georges Mathieu écuyer président des trésoriers de France à Dijon en 1789, cette famille est l'une des plus ancienne de Mérignat, la  maison forte de Bouvens dont il subsiste une tour du XVe siècle est certainement la demeure cité.","architecture":"Poncin; Le château rebâti au XVIIIe siècle découpe sa façade au milieu du bois.                               Mérignat cité médiévale avec château du XIVe siècle remanié au XVI et XVIIe siècle  dont il reste la tour carrée dit donjon et tour carrée des remparts.","habitants":"Seigneur de Thoire-Villars\"","divers":"Château de Mérignat,  de Champollon et maison forte de Bouvens.","gps":"","images":["../image/image_01/01_Poncin_1.jpg","../image/image_01/01_Poncin_2.jpg","../image/image_01/01_Poncin_3.jpg","../image/image_01/01_Poncin_4.jpg","../image/image_01/01_Poncin_5.jpg","../image/image_01/01_Poncin_6.jpg"]},"Consult_chateau_formulairede60-2":{"id":"Consult_chateau_formulairede60-2","dept":"01","canton":"Pont-d`Ain","commune":"Pont-d`Ain","nom":"Pont_D_Ain","type":"Château","periode":"XV","histoire":"Pont d'Ain: Sous la dépendance de la maison de Coligny puis pendant 300 ans resta dans la maison de Savoie. \r\nLe château des ducs de Savoie fut acquit par Robert le duc de Bourgogne en 1285 et remis en échange  au comte de Savoie en 1289, Charles Emmanuel de Savoie l'inféode en 1586 à Joachim de Rye marquis de Treffort qui le reconstruit en 1590, pris en 1595 par les troupes du roi Henri IV.  \r\nAchetée  et restaurée vers 1833 par l'évêché qui le possède encore aujourd'hui,  pour être transformé en maison de retraite.  Philibert le Beau y naquit tout comme la mère de François Ier(Louise de Savoie).                     Dans la commune le château de Grillerin  transformé en chambres d'hôtes. Pommiers; dans la commune de Saint-Jean du Monts le château fut construit au XIIIe siècle par Guy de Sales, il fut modifie au XVe et au XVIIIe siècle, il en reste deux corps de logis flanqué  d'un puissant donjon.","architecture":"Pont-d'Ain, le château des ducs de Savoie du XVe siècle  fut une luxueuse demeure avec sa belle façade renaissance où les princesses venaient accoucher et élever leurs enfants,  le château subit l'attaque du maréchal de Biron. Reste du château du XVe siècle reconstruit au XVIe siècle, modifié au XIXe siècle,  Il subsiste d'anciennes fortifications, le belvédère et surtout la tour Marguerite avec ses belles fenêtres à meneaux renaissance, escalier monumental de Marguerite d'Autriche  Ancien cellier, Ancien cellier des chartreux de Seillon, corps de logis rectangulaire fronton remarquable pour sa vieille horloge et clocher des chartreux de Seillon, corps de logis rectangulaire fronton remarquable pour sa vieille horloge et clocher le manoir de Grillerin transformé en chambres d'hôtes, ancien cellier des chartreux de Seillon, corps de logis rectangulaire fronton remarquable pour sa vieille horloge et clocher.","habitants":"Duc de bourgogne   Louise de Savoie\"","divers":"Château des ducs de Savoie château de Pommiers","gps":"","images":["../image/image_01/01_Pont_D_Ain_1.jpg","../image/image_01/01_Pont_D_Ain_2.jpg","../image/image_01/01_Pont_D_Ain_3.jpg","../image/image_01/01_Pont_D_Ain_4.jpg","../image/image_01/01_Pont_D_Ain_5.jpg","../image/image_01/01_Pont_D_Ain_6.jpg","../image/image_01/01_Pont_D_Ain_7.jpg"]},"Consult_chateau_formulaire98eb-2":{"id":"Consult_chateau_formulaire98eb-2","dept":"01","canton":"Pont-de-Vaux","commune":"Pont-de-Vaux","nom":"Pont_de_Vaux","type":"Vestiges","periode":"XIV","histoire":"L'hôtel de ville de Pont de Vaux est un ancien hôtel du Gouverneur agrandit en 1758 avec fronton transformé en musée Chintreuil. Façade classique avec fronton symbolique. \r\n Barthélémy Joubert général est né à Pont-de-Vaux, engagé dans le régiment de la Fère a seize ans, devenu garde national en 1789, volontaire pour la défense des frontières en 1792, connu  dès lors des promotions fulgurantes, fit des campagnes sous les ordres de Napoléon, fut général à 26 ans, mais  mortellement blessé à Novi en 1799.                      Mareste; à Chavanne de Reyssouze à quatre kilomètres de pont de Vaux, cette  bâtisse  était un rendez vous de chasse de construction en colombage avec un corps de logis en équerre de style gentilhommière avec donjon carré en angle.","architecture":"la ville a conservé  des maisons médiévales et renaissances  et quelques tours et murs de remparts des XIV et XVe siècle","habitants":"Famille Barthélémy Joubert\"","divers":"","gps":"","images":["../image/image_01/01_Pont_de_Vaux_1.jpg","../image/image_01/01_Pont_de_Vaux_2.jpg"]},"Consult_chateau_formulairefac3":{"id":"Consult_chateau_formulairefac3","dept":"01","canton":"Pont-de-Veyle","commune":"Pont-de-Veyle","nom":"Pont_de_Veyle","type":"Château","periode":"XIII","histoire":"Pont de Veyle fut construit en 1249.   La tour de l'horloge ou porte Manguet vestiges des fortifications avant le XVIIIe siècle, à proximité la maison du Guetteur à pans de bois, la maison du seigneur du comté de Savoie, et vers le grappin château du XVIII -XIX occuper par les compagnons du devoir du tour de France.\r\nLe château de Pont de Veyle qui fut construit au XVIe siècle par le duc de Lesdiguière, maréchal et connétable de France plusieurs personnalités y séjourna, depuis 1979 il est loué aux compagnons du tour de France.         Dans la commune trois autres châteaux; le Bourdonnel du XVIIIe siècle, Le Bey du XIXe siècle avec ses trois tourelles et le manoir de la Balmondière construit en briques à St-André d'Huiriat.","architecture":"Du château et des fortifications de la ville  reste la belle porte Manguet dit aussi la tour de l'horloge la toiture a été rajoutée au XVIIIe siècle; Château Pont de Veyle construit au XVIIIe siècle remanié et terminé au XIXe siècle corps de logis rectangulaire fronton imposant en façad
