mina par l'annexion de la Bresse à la France, puis acquit par les Montrevel qui ne l'habitait pas et finit par tomber en ruines.","architecture":"Site  fortifié du vieux bourg occupe l'emplacement du château fort et de la cour basse, les vestiges apparent sont de la deuxième basse cour, une tour carrée et deux tours rondes subsistent sur les cinq qui existaient, c'est dans cette enceinte que se trouvait  les bâtiments constituant  \"le vieux bourg\" qui fut, jusqu'en 1870 le centre de la commune.","habitants":"Famille Chabeu\"","divers":"Château fort d'Abergement-Clémenciat","gps":"","images":["../image/image_01/01_Abergement_Clemenciat_1.jpg","../image/image_01/01_Abergement_Clemenciat_2.jpg","../image/image_01/01_Abergement_Clemenciat_3.jpg","../image/image_01/01_Abergement_Clemenciat_4.jpg"]},"Consult_chateau_formulairec265":{"id":"Consult_chateau_formulairec265","dept":"01","canton":"Ambérieu-en-Bugey xxx","commune":"Ambérieu-en-Bugey","nom":"Allymes","type":"Château","periode":"XIV","histoire":"Allymes: Suite à la guerre de 1283 qui sépare le Dauphiné et la Savoie . Le dauphin Humbert de la Tour fit élevé une forteresse médiévale au profit du comté de Savoie, qui après la guerre en 1349 est confié à la famille François qui la garda jusqu'en 1477, puis passa aux de Lucinge;  Charles était un impétueux personnage, il eut un fils avec sa seconde épouse Renée de Lucinge en 1550. Il avait pour mission de négocier le destin du Bugey, auprès du duc de Savoie Charles-Emmanuel  et Henri IV, qui fit rattaché la Savoie  à la France au traité de Lyon  en 160. Abandonna sa carrière et s'installa aux Allymes pour se consacrer à des ouvrages historiques,  personnage diplomate et humaniste. Au XIXe siècle Adolphe de Tricaud d'Ambérieu  propriétaire restaura le château qui fut  classé monument historique en 1960 et en 1984 la commune d'Ambérieu en Bugey  le racheta.","architecture":"Edifié au XIIIe siècle , il fut agrandi et transformé au milieu du XIVe siècle et perdit sa première enceinte à la fin du XVIe siècle, architecture militaire défensive d'époque de forme rectangulaire,   mur d'enceinte de 90 m sur 30 m est dominé par un donjon carré de 30 m de haut et par une tour ronde reliée par quatre courtines. La partie nord de la forteresse constitue une basse cour abritant une petite population jusqu'au XVIe siècle.","habitants":"Famille de Charles de Lucinge\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Forteresse des Allymes.","gps":"","images":["../image/image_01/01_Allymes_1.jpg","../image/image_01/01_Allymes_2.jpg","../image/image_01/01_Allymes_3.jpg","../image/image_01/01_Allymes_4.jpg","../image/image_01/01_Allymes_5.jpg","../image/image_01/01_Allymes_6.jpg","../image/image_01/01_Allymes_7.jpg"]},"Consult_chateau_formulairef542":{"id":"Consult_chateau_formulairef542","dept":"01","canton":"St-Trivier-sur-Moignans","commune":"Amariens-Francheleins-Ceissiens","nom":"Amariens","type":"Château","periode":"XIII-XVIII","histoire":"Amariens-Franceliens-Cessiens; Amariens cité au XIe siècle Francheliens au XIIe siècle et Cessiens aux Xe siècle, les communes  se sont réunies en janvier 1974  et deviennent Francheliens en 1998. Etait autrefois la châtellenie de Montmerle dans l'ancienne souveraineté des Dombes ils furent rattaché à la france en 1762. Le château d'Amariens bâti sur une poype par le seigneur Josserand de Francheleins avec l'aide financière relevant  des ducs de Savoie. Dans la commune  château de Vataniens et de Tavernost (voir articles ).","architecture":"Amariens, élégant château du XVIIIe siècle, quadrangulaire à deux niveaux, flanquée de tours carrées en angles. Remanié au XVIIIe siècle. Francheliens ils ne reste que des vestiges.","habitants":"Les comtes de Savoie\"","divers":"Château d'Amariens","gps":"","images":["../image/image_01/01_Amariens_1.jpg"]},"Consult_chateau_formulaire3734":{"id":"Consult_chateau_formulaire3734","dept":"01","canton":"St-Trivier-sur-Moignans","commune":"Ambérieux-en-Dombes","nom":"Amberieux","type":"Vestiges","periode":"X-XII","histoire":"Ambérieux: Au Moyen-Age, le village devient le siège d'une des douze châtellenies de la souveraineté de la Dombes. Le château  féodal qui fut construit par Gondicaire( grand-père de Clothilde, femme de Clovis) sur les fondations de la résidence des anciens rois Burgonds,  était beaucoup plus importants qu'il est aujourd'hui, Il fut transmit à l'abbaye de Cluny en 934, fut construit et possédé par les sires de Villars, de Thoires, pris en 1408  par Aimé de Viry et repris peu de temps après par Jean de Château Morand et par les ducs  de Bourbons, puis par les Gadagne, banquiers Lyonnais. Des Caponi, il passa aux princes des Dombes, il a était détruit par le maréchal Biron lors de guerres qui opposait la Savoie à la France.","architecture":"Ce château  qui fut construit au XI-XIVe siècle d'un aspect de l'architecture militaire du Moyen Age fut le théâtre de sanglantes journées  par le maréchal Biron, de plan trapézoïdal cantonné de tours dont l'entrée fut complètement détruite pour la construction de l'église qui se trouvait dans son enceinte,  au XIXe siècle possède  encore un donjon carré  de 19 m de haut style XIVe siècle, et de deux tours rondes crénelées en briques qui ne sont que les vestiges de ce dernier et une chapelle  du XIIIe siècle.","habitants":"Les sires de Villars \r\nFamille Goncidaire\"","divers":"Vestiges du château féodal (tour)","gps":"","images":["../image/image_01/01_Amberieux_1.jpg","../image/image_01/01_Amberieux_2.jpg","../image/image_01/01_Amberieux_3.jpg","../image/image_01/01_Amberieux_4.jpg"]},"Consult_chateau_formulairefe49":{"id":"Consult_chateau_formulairefe49","dept":"01","canton":"St-Trivier-sur-Moignans","commune":"Ambérieux-en-Dombes","nom":"Ambronay","type":"Château","periode":"XIV","histoire":"Ambronay:  Au XIe  siècle le fief  dépendait  de l'abbaye  qui suite aux divers conflits firent appel au comté de Savoie en 1282 pour faire fortifier leur village. En 1601 passe au royaume de France par le traité de Lyon, et de nouveaux conflits des guerres de religion,  la tour Dauphine est arasée  ainsi que l'abbaye déclassée à la Révolution  et suivit du cloître en 1905. Dans la commune le château de Saint-Graz institut thérapeutique éducatif et pédagogique.","architecture":"Ambronay; Vestiges des fortifications   ( tours et porte seul la porte de la Gargouille est conservée).Le château du XVIe siècle remanié au XIXe siècle devenu hôtel de ville.","habitants":"Dauphins du Viennois\"","divers":"Deux châteaux à Ambronay.","gps":"","images":["../image/image_01/01_Ambronay_1.jpg","../image/image_01/01_Ambronay_2.jpg","../image/image_01/01_Ambronay_3.jpg","../image/image_01/01_Ambronay_4.jpg"]},"Consult_chateau_formulaire988a":{"id":"Consult_chateau_formulaire988a","dept":"01","canton":"Belley","commune":"Andert et Condon","nom":"Andert","type":"Château","periode":"XIV-XVII","histoire":"Andert: Les chevaliers d'Andert cités  en 1180, la seigneurie au XIIe siècle appartenait aux Andert qui jouèrent un rôle important dans la région (ducs de Savoie et roi de France). A l'origine maison forte, en 1461 transformé en maison de plaisance au XVIIe siècle,modifié par le baron  de Richerand et en 1867 par l'entrepreneur Chaboud. Les deux communes Andert et Condon ont fusionnées en 1791. Beauregard Maison forte a 1700 mètres au sud-ouest d'Andert d'une très ancienne seigneurie d'Andert dit maison de Paul Cottin.","architecture":"Andert; A l'origine maison forte en 1461 transformé en maison de plaisance  en forme de U composé de deux corps de bâtiment au XVIIe siècle, corps de logis surmonté d'un fronton triangulaire et deux tours rondes sur façade nord et percée au XVIIe siècle d'un portail monumental fut remanié au XIXe siècle avec rajout de tours de style néogothique, belle terrasse flanquée de tourelles.                             Beauregard; dit maison de Paul Cottin, cette maison forte a été remise en état au XVIIe siècle par de Mignieu,  puis restauré au XIXe siècle.","habitants":"Chevalier d'Andert\"","divers":"Château d'Andert                   Maison forte de Beauregard","gps":"","images":["../image/image_01/01_Andert_1.jpg","../image/image_01/01_Andert_2.jpg","../image/image_01/01_Andert_3.jpg","../image/image_01/01_Andert_4.jpg","../image/image_01/01_Andert_5.jpg","../image/image_01/01_Andert_6.jpg"]},"Consult_chateau_formulaire42ab":{"id":"Consult_chateau_formulaire42ab","dept":"01","canton":"Hauteville-Lompnes","commune":"Hauteville-Lompnes","nom":"Angeville","type":"Château","periode":"XVI","histoire":"ANGEVILLE: Le fief était détenu au XIe siècle  par les seigneurs de Longecombe une des plus vieilles familles du Bugey sur le plateau de Hautevilles-Lompnes, ce fief a été inféodé à Pierre de Nuey qui pris le nom de Longecombe de nouveau inféodé le 17septembre 1321 par le comte de Savoie. Cette famille de Longecombe  se divisa en trois branches, celle des lieux , les Longecombe de Thoy marquis de Thoy possédait le château de Thoy et les Longecombe en Dauphiné possédaient une maison à Virieu le Grand. Les Longecombe des lieux n'habitait plus le château à la Révolution  (ruiné) mais possédaient une grande maison a Belley. Les Angeville,existé bien avant la Révolution,  Henriette d'Angeville citée en 1657, un noble François d'Angeville avait épousé Benoite-Marie de Longecombe sa Mére Antoinette de Mortenay Vicomtesse de Lompnes.                            Château des seigneurs de Lompnes devenu hôtel de 1912 à 1917, un sanatorium en 1920 et un centre de réadaptation en 1970.","architecture":"Angeville: château construit en 1640 sur les ruines d'un ancien château du XIIe siècle. Corps de logis  de forme rectangulaire à trois niveaux flanqué de tous rondes en angles à toits poivrières, grande dépendance en équerre de construction moderne due à son activité actuelle.","habitants":"Famille Longecombe.\"","divers":"Château d'Angeville","gps":"","images":["../image/image_01/01_Angeville_1.jpg","../image/image_01/01_Angeville_2.jpg"]},"Consult_chateau_formulaire0485":{"id":"Consult_chateau_formulaire0485","dept":"01","canton":"Thoissey","commune":"Montmerles","nom":"Avencourt","type":"Château","periode":"XIX","histoire":"Avencourt: Comme toute les autres communes Avencourt dépendait au XIe siècle des sires de Beaujeu, qui le transmettait au XVe siècle à Louis II de Bourbon qui gardèrent la châtellenie jusqu'au XVIIe siècle. Et au début du premier Empire, la partie seigneuriale fut acquise par monsieur Rivière qui laissa à sa mort le bien a ses deux fils, le cadet capitaine de la garde nationale en 1830 fait restaurer le château; La descendance de Monsieur Rivière, par alliance passa à la famille de Vézu, Voisin, d'Avencourt et de VIlleneuve Bargemon.","architecture":"Des piliers de pierre, seul témoins de l'ancienne entrée du château, le corps principal couvert de tuiles plates et les deux ailes perpendiculaires construites à l'avant enserrent une cour d'agrément à l'ouest.","habitants":"Famille Rivière\"","divers":"Château d'Avencourt et tour à Montmerles","gps":"","images":["../image/image_01/01_Avencourt_1.jpg"]},"Consult_chateau_formulaireb5a3":{"id":"Consult_chateau_formulaireb5a3","dept":"01","canton":"Bâgé-le-Chatel","commune":"Bâgé-le-Chatel","nom":"Bage_le_Chatel","type":"Château","periode":"XII-XV","histoire":"Bagé le Chatel était au Moyen-Age le fief des sires de Bagé depuis le début du XIe siècle jusqu'en 1272, fut la capitale de la Bresse quand celle-ci devient savoyarde lorsque Sibylle de Bâgé héritière apporte la seigneurie par alliance à Amédée de Savoie.             Dans la commune le château de Montepin cité en 1273 demeure de plaisance avec tours rondes et carrées de Xavier Aymon comte de Montepin et le château de la Griffonière du XIVe siècle.","architecture":"Le château, englobé dans un château moderne, corps de logis rectangulaire a deux étages accolé a une tour carrée, dite de \"l'hôpital\".  Ce dernier  est dans une enceinte fermé par trois portes, quelques tours des remparts circulaires du XVe siècle subsistent, chemin de ronde extérieur","habitants":"Madame Sibylle de Bagé\r\n        \"","divers":"Château de Bâgé le châtel et château de Montepin.","gps":"","images":["../image/image_01/01_Bage_le_Chatel_1.jpg","../image/image_01/01_Bage_le_Chatel_2.jpg"]},"Consult_chateau_formulaire2aca":{"id":"Consult_chateau_formulaire2aca","dept":"01","canton":"Belley","commune":"Brégnier-Cordon","nom":"Barre_Cordon","type":"Château","periode":"XIV","histoire":"Barre-Cordon: Ce château fondé dès le XIIe siècle par les vassaux de Savoie le chevalier Guillaume de Cordon en fait hommage à Louis de Savoie seigneur de Vaud en 1344, son fils  Amédée V comte de Savoie  en 1362,  confisqué après le guet-apens tenté par Aymard de Cordon en 1433.  Le château fut inféodé par le duc Amédée VIII de Savoie à Lambert de Lusignan . Après avoir été vendu et revendu maintes fois jusqu'en 1488 il passe à la famille de la Forest et resta sa propriété pendant huit générations jusqu'en 1729. En 1780 Petrouille de Mareschel épouse Françoise Blaise de Cordonet ramène ainsi le château de la Barre à la famille de Cordon.   \r\nLe château est célèbre par ses souvenirs littéraires, les Bachet de Mézériat succèdent aux Cordon  et à la fin du XIXe siècle cette famille  s'éteignit  dont  le dernier baron descendant de l'écrivain bressan Gilles Finaz est le propriétaire du château et Michel Ducaroy est un vice président du patrimoine du pays de l'Ain.","architecture":"L'ancien château  servit de carrière au XVIIe siècle. Le nouveau construit au XIVe siècle, toit à quatre pans recèle des vestiges gothiques sur ses murs, quelques restes de murailles rattachent cette construction à deux tours rondes découronnées, remanié au cours des ans, corps de logis rectangulaire.","habitants":"Famille Cordon\"","divers":"Château de Barre Cordon","gps":"","images":["../image/image_01/01_Barre_Cordon_1.jpg"]},"Consult_chateau_formulairec60e":{"id":"Consult_chateau_formulairec60e","dept":"01","canton":"Thoissey","commune":"Montceau","nom":"Batie_Ain","type":"Château","periode":"XII","histoire":"La Bâtie: Les premiers seigneurs connus les de Renaud du Forez dont un avait épousé Isabelle de Beaujeu qui construisit le château au XIIe siècle, Fief des familles de Francheleins et de Beaujeu. \r\nAu XIVe siècle, Montceaux appartenait au comté de la Bâtie ., fut transmis au Bourbon en 1400 à l'extinction de cette famille,  puis le château passa de familles en familles par alliance En 1540 Marguerite de Saix épouse Claude de Champier, futur gouverneur des Dombes, leur fils fera érigé  la Bâtie en baronnie par Henri de Bourbon-Montpensier. De baronnie en comté, la propriété passera de la famille de Villeneuve à la famille d'Ormesson.     Madame Sévigné y séjourna ainsi que Jean Moulin. Propriétaire actuel la famille de Chalon.","architecture":"Château du XIIIe siècle, en briques rouges, c'était une place forte considérable  de quatre enceintes de 9 tours et une garnison de 60 personnes posé entre la Savoie et la principauté de la Dombes ;  Le château sur la poype avec ses tours fortifiés,  domine la Calonne au hameau de Beybleu. Ce château qui passa la révolution d'un aspect féodal à perdu de son charme par négligence, bien qu'il fut remanié au XVIIIe siècle  et au  XIXe siècle, deux tours rondes trapues à l'entrée du XIVe siècle ferment la cour, donjon,  tour de guet. les murs d'enceintes et les tours rondes ont été démantelés, il ne reste plus que huit tours sur dix neuf existantes à l'origine.","habitants":"Famille Cordon\"","divers":"Chateau de la batie Montceau.","gps":"","images":["../image/image_01/01_Batie_1.jpg","../image/image_01/01_Batie_2.jpg","../image/image_01/01_Batie_3.jpg","../image/image_01/01_Batie_4.jpg"]},"Consult_chateau_formulaire7698":{"id":"Consult_chateau_formulaire7698","dept":"01","canton":"Thoissey","commune":"St-Etienne-sur-Chalaronne","nom":"Beaumont_Munet","type":"Château","periode":"XIII","histoire":"Beaumont-Munet: Le bâtiment occupe l'emplacement d'un édifice plus ancien puisque le fief de Beaumont apparaît en 1330 en toute justice et avec château donné a Etienne  de Laye par le sire de Beaujeu. Le château actuel a été construit au XIXe siècle par monsieur Gauthier puis vendu à la famille de Clavière, actuellement il est la propriété  de Monsieur de Brisis gendre de monsieur Clavière.","architecture":"Beaumont; le château a été reconstruit sur l'emplacement de l'ancien, corps de logis carré flanqué de tours d'angle carrés, et  d'un donjon carré en rajout dans sa partie nord.","habitants":"Famille de Clavière\"","divers":"Château de Beaumont Munet","gps":"","images":["../image/image_01/01_Beaumont_Munet_1.jpg"]},"Consult_chateau_formulairedf62":{"id":"Consult_chateau_formulairedf62","dept":"01","canton":"Trévoux","commune":"Beauregard","nom":"Beauregard (01)","type":"Maison forte","periode":"XIII-XIX","histoire":"BEAUREGARD; Bel-regard par Guy de Saint-Thiviers par sa situation, construit par Guy de Chabeu.  En 1290 pris d'assauts par les comtes de Savoie et  par les sires de Beaujeu, seigneur de Saint-Trivier en Dombes, puis par les comtes de Savoie et rendu en 1380, il fut le siège de la justice des Dombes depuis 1346 jusqu'en 1401. Remanié en 1420 par la Dame de Beaujeu afin d'y habiter,  Edouard II de Beaujeu en fit une châtellenie,  puis il fut fortifié contre les ducs de Savoie. Remanié en style renaissance au XVIe siècle (fenêtres à meneaux) transformé en manufacture de glaces et cristaux par le duc du Maine en 1699, il est abandonné en ruines en 1789, puis  remanié et en 1840 endommagé par un incendie et reconstruit par monsieur H. Bouchet.","architecture":"Au XIXe siècle ce n'est qu'une ruine  au dessus du village remanié par M H Bouchet vers 1780, il se présente maintenant comme un somptueux corps de bâtiments avec tourelles et de deux ailes  terminées chacune d'une  haute tour. Ce château avait été fortifié d'une douzaine de tours, il en subsiste le portail ogival primitif au nord.","habitants":"Famille de Chabeu\"","divers":"Château de Beauregard","gps":"","images":["../image/image_01/01_Beauregard_1.jpg","../image/image_01/01_Beauregard_2.jpg","../image/image_01/01_Beauregard_3.jpg"]},"Consult_chateau_formulaireeb3e":{"id":"Consult_chateau_formulaireeb3e","dept":"01","canton":"Belley","commune":"St-Germain-les-Paroisses","nom":"Beauretour","type":"Vestiges","periode":"XIII","histoire":"Beauretour; cité au XII-XVe siècle suite a un retour d'un seigneur de terre sainte que le château pris le nom.     De ce château fort du XVe siècle construit par Jean de Rossillon, vassal du comte de Savoie; contrôlait l'accès à la ville de Belley, La famille de Seyssel l'acquit en 1675 fut incendié en 1793.                                        Dans le hameau de Meyrieu la maison Carron  classée M H.","architecture":"Construit au XIIIe siècle, aujourd'hui il ne reste que les ruines de l'enceinte et du donjon carré du château, un pan de mur percé de deux fenêtres à meneaux et croisillons.","habitants":"Jean de Rossillon\"","divers":"Vestige du château de Beauretour.","gps":"","images":["../image/image_01/01_Beauretour_1.jpg","../image/image_01/01_Beauretour_2.jpg","../image/image_01/01_Beauretour_3.jpg"]},"Consult_chateau_formulaire0ef5":{"id":"Consult_chateau_formulaire0ef5","dept":"01","canton":"Belley","commune":"Belley","nom":"Belley","type":"Palais","periode":"XVIII","histoire":"Belley: Palais Episcopal dit évêché construit entre 1766 et 1780 à la demande de monseigneur Cortois de Quincey. A la Révolution l'édifice vendu comme bien national, face à l'absence d'acquéreur,  transformé en dépôt militaire il fut ensuite le siège de la vaste région de la Sénatorerie des Alpes sous l'Empire, passant de dépôt et de bureau à nouveau redevient résidence épiscopal, dix affections se succèdent en deux siècles dont le dernier évêque quitta le palais en 1976,  le bâtiment fut racheté par la ville de Belley  qui le  restaure entre 1980 et 1992, abrite désormais une bibliothèque et des salles d'exposition.     \r\nBeauregard: ou se trouve le courtinaire. Maison Dallemagne, propriété du général Dallemagne 1754  -1813 anobli par Napoléon Ier après la bataille de Lodi en 1796, la vaste demeure abrite le conservatoire municipal de musique.","architecture":"Palais épiscopal: belle résidence néo- classique composée d'un corps principal de bâtiment avec fronton triangulaire et de deux pavillons saillants,  beau parc et beau portail en fer forgé.","habitants":"Monseigneur Cortois de Quincey\"","divers":"Palais épiscopal","gps":"","images":["../image/image_01/01_Belley_1.jpg","../image/image_01/01_Belley_2.jpg"]},"Consult_chateau_formulaireffc5":{"id":"Consult_chateau_formulaireffc5","dept":"01","canton":"Pont-d`Ain","commune":"Dompierre-sur-Veyle","nom":"Belvey","type":"Château","periode":"XIII","histoire":"Château fondé par les Juys , vassaux des sires de Beaujeu au XIIIe siècle, ill fut incendié et mis à sac au XVIe siècle acheté en 1715 par les Maron Genois naturalisés, il sera à nouveau saccagé à la révolution, transformé en gentilhommière massive restauré au XIXe siècle.","architecture":"De l'ancien château qui fut remanie et transformé en gentilhommière, le seul vestige ancien et la base de la tour ronde en brique, beau mur de clôture.","habitants":"Famille des Maron Genois\"","divers":"Château de Belvey","gps":"","images":["../image/image_01/01_Belvey_1.jpg"]},"Consult_chateau_formulairef70a":{"id":"Consult_chateau_formulairef70a","dept":"01","canton":"St-Trivier-sur-Moignans","commune":"Fareins","nom":"Bouchet (01)","type":"Château","periode":"XIX","histoire":"Bouchet: Construit au XIXe siècle sur l'emplacement d'une ancienne maison bourgeoise dans un grand parc. Albert Bouchet  (1835-1915)  transforma la propriété vers 1867, il avait épousé Félicité de Montelier de Gontal.    Accueille aujourd'hui une colonie de vacances de la ville de Paris.","architecture":"Bouchet; Suite à un incendie en 1913 le château est restauré, il est composé d'un corps de logis carré flanqué de tourelles rondes en angle.","habitants":"Famille d'Albert Bouchet\"","divers":"Château Bouchet","gps":"","images":["../image/image_01/01_Bouchet_1.jpg","../image/image_01/01_Bouchet_2.jpg"]},"Consult_chateau_formulaire283d":{"id":"Consult_chateau_formulaire283d","dept":"01","canton":"Villars-les-Dombes","commune":"Bouligneux","nom":"Bouligneux","type":"Château","periode":"XIV","histoire":"Bouligneux: Ce domaine fut acheté  en 1280 au seigneur de Vaucher de Commarin par le seigneur  Henri de Villars, seigneur de Trévoux et archevêque de Lyon. En 1301 son neveu  hérite de Humbert de Thoire-Villars qui inféoda  Bouligneux à Girard de la Palud, seigneur de Varambon, de Richemont et de Tossiat. Ce dernier fit construire le château et ensuite son fils Hugues de la Palud le termina, et  cette famille le conservera  jusqu'en 1704, le dernier du nom Louis fut tué a la bataille d'Italie à Verrue, la succession donna un procès de dix sept ans  dont la mère du défunt hérita et à la mort de la mère en 1720 le château passa à Paul-François le Hardy de la Trousse qui le laissa  à son cousin  Agésilas Gaston de Grossoles marquis de Flammarens . \r\nAprès  la Révolution, en 1801 Joseph de Flammarens sans descendance lègue le château à sa parente Mademoiselle de la Tour-Saint-Igest qui par alliance apporte le domaine à la famille  Mac Mahon, toujours par alliance aux Rességuier et aux Villeneuve Esclapon, le propriétaire actuel serait un descendant du comte Romée de Villeneuve Esclapon.","architecture":"Dans sa forme primitive au XIVe siècle, il comportait un corps de logis avec quatre tours dont un donjon rond, reliés entre elles par des courtines. La maison forte  du  XIVe siècle, enceinte quadrangulaire flanquée de tours d'angle  massives carrées  à gauche,  ronde à droite qui fait office de donjon cylindrique arasée  en biais et perdit son pont levis  à la révolution, utilisé comme grenier à grains par la municipalité de Bouligneux échappe à la destruction remanié au XVIIe siècle et en 1905 démolition de la courtine.","habitants":"Famille de Thoire-Villars \r\nFamille de la Palud\r\nFamille Mac Mahon      \r\nFamille de villeneuve Esclapon\r\n        \"","divers":"Château de Bouligneux.","gps":"","images":["../image/image_01/01_Bouligneux_1.jpg","../image/image_01/01_Bouligneux_2.jpg","../image/image_01/01_Bouligneux_3.jpg","../image/image_01/01_Bouligneux_4.jpg","../image/image_01/01_Bouligneux_5.jpg"]},"Consult_chateau_formulairedd7b":{"id":"Consult_chateau_formulairedd7b","dept":"01","canton":"Bourg-en-Bresse","commune":"Bourg-en-Bresse","nom":"Bourg_en_Bresse","type":"Patrimoine","periode":"XIII","histoire":"Bourg en Bresse:  Au XIIIe siècle aux sires de Bagé puis par alliance au duc de Savoie  en 1272 par le mariage, au château Chillon Sibylle de Bagé épousa le futur Amédée V de Savoie. Au XVe siècle capital de la Bresse; Au XVIe siècle les ducs de Savoie y firent une de leurs résidences principales, y construisirent un château fort . François Ier annexa la Bresse et au traité de Cambrai rendit les terres au duc de Savoie, celui-ci fit construire à Bourg, aux  portes  de la ville, une puissante citadelle, le fort Saint-Maurice qui remplit son rôle face aux troupes du roi Henri IV. au traité de Lyon, le comté de l'Ain passa définitivement à la France.  \r\nOn doit à l'amour porté par Marguerite d'Autriche à son époux mort dans la fleur de l'âge, un merveilleux chef-d'uvre du gothique flamboyant, l'église de Brou qui tire son nom du petit village du lieu. Marguerite d'Autriche fille de Maximilien d'Autriche et de Marie de Bourgogne, elle même fille de Charles le Téméraire; Marguerite mariée au duc de Savoie Philibert le Beau.                        Dans la commune bourg en Bresse le château de Pennessuyt dit aussi château de Loéze fut construit au XVIIe siècle par la famille d'Escodela, gouverneur du Bourg  puis passa à la famille de Samuel Guichenon (historien )","architecture":"Le fort Saint-Maurice fut rasé en 1650.  la collégiale Notre-Dame commencé en 1505 qui se termina au XVIIe siècle de style gothique du XVIe siècle. Brou Couvent de conception sanitaire et fonctionnelle bâti au bord de la Reyssuze de 1871 à 1787 par Adrien Paris architecte du roi. L'église Notre dame fut édifie de 1513 à 1532 à toitures vernissées et colorées, à logé jusqu'à la Révolution  une vingtaine de moines  Augustins chargés  de prier pour les princes  enterrés à Brou.  Pennesuyt; corps de logis central à deux niveaux flanqués de deux pavillons rectangulaires sur les côtés, petit pavillon carré sur l'enceinte.","habitants":"Famille de Sibylle de Bagé.\r\n        \"","divers":"Couvent de la conception de Brou.\r\nChâteau à Bourg en Bresse","gps":"","images":["../image/image_01/01_Bourg_en_Bresse_1.jpg","../image/image_01/01_Bourg_en_Bresse_2.jpg","../image/image_01/01_Bourg_en_Bresse_3.jpg","../image/image_01/01_Bourg_en_Bresse_4.jpg","../image/image_01/01_Bourg_en_Bresse_5.jpg","../image/image_01/01_Bourg_en_Bresse_6.jpg"]},"Consult_chateau_formulaire2a7f":{"id":"Consult_chateau_formulaire2a7f","dept":"01","canton":"Villars-les-Dombes","commune":"Monthieux","nom":"Breuil","type":"Manoir","periode":"XIV","histoire":"Breuil fut construit  sous les sires de Thoire-Villars, il passa  au XVe siècle à la famille Gaspard puis par alliance à la famille Damas d'Antigny dont leur résidence principale était Trévoux au XVIe siècle à François de Damas, seigneur du Breuil, cette illustre famille devint gouverneur de la principauté des Dombes pour le compte du duc de Bourbon, elle eut tous les  droits  de justice. Cédé par le duc du Maine en 1743, conservé jusqu'en 1789 au profit de Jacques de Damas dernier seigneur du Breuil.  \r\nEn 1876 la famille de Parcieux acquit le château  et le  transforme en exploitation agricole.","architecture":"Ce manoir bien que modifié en forme de U encadrant la cour rectangulaire, a perdu ses tours de guets et ainsi que ses fossés  remplis de joncs, corps de bâtiment qui demeura intact jusqu'en 1876, date à laquelle manoir et ferme furent divisés et aménagés. Très beau portail cintré.","habitants":"François de Damas\"","divers":"Domaine du Breuil","gps":"","images":["../image/image_01/01_Breuil_1.jpg"]},"Consult_chateau_formulaire59aa":{"id":"Consult_chateau_formulaire59aa","dept":"01","canton":"Ceyzériat","commune":"Hautecourt-Romanèche","nom":"Buenc","type":"Vestiges","periode":"XIV","histoire":"Buenc: Château construit par la famille de Buend aux XIIIe siècle et au XVe siècle, il fut successivement le fief de la maison de Savoie, des sires de Beaujeu,  des sires de la  Baume et des Coligny. \r\nPropriété privé ne se visite pas.","architecture":"Donjon de Buenc dans le val de Buenc, grosse tour carrée du XIIIe siècle de 30 m de haut, seul vestige d'un ancien château fort des XIII et XIVe siècle,  transformé au XIXe siècle.  Au hameau de Châtillon, ruine du château de Beaurepaire.","habitants":"Seigneur de Beaujeu\"","divers":"Vestiges de Buenc","gps":"","images":["../image/image_01/01_Buenc_1.jpg","../image/image_01/01_Buenc_2.jpg"]},"Consult_chateau_formulaire280e":{"id":"Consult_chateau_formulaire280e","dept":"01","canton":"St-Trivier-sur-Moignans","commune":"Chaniens","nom":"Chaillouvres","type":"Château","periode":"XIV","histoire":"Chaillouvres, était a l'origine par la famille qui porta le nom, un nommé Guy de Chaillouvres est cité en 1080, cette famille s'éteignit au XIVe siècle avec Guichard de Chaillouvres  et par alliance d'une de ses filles le château passa aux  Perceval le Merle. En 1551 le château fut acquis par Pelonne de Bonsin, la propriétaire dite \" la Belle Allemande\"  veuve au XIVe siècle femme du célèbre négociant lyonnais Jean Kleberger où Cleberg plus connu sous le nom de\" l'Homme de Roche\". Puis au XVIIe siècle toujours par alliance à Claude François de Joly, baron de Langes, seigneur de Choin et à la Révolution il appartenait au baron de Belvey. Un monsieur Brians John en serait propriétaire aujourd'hui.","architecture":"Ce Château construit au XIVe siècle  en briques carrons savoyard  sur des bases anciennes fut restauré après la révolution, double corps de logis, donjon octogonal, mur épais qui donne un aspect défensif, les fondations remonteraient au temps des Capétiens.","habitants":"Hugues de Riottiers\"","divers":"Château de Chaillouvres","gps":"","images":["../image/image_01/01_Chaillouvres_1.jpg","../image/image_01/01_Chaillouvres_2.jpg","../image/image_01/01_Chaillouvres_3.jpg","../image/image_01/01_Chaillouvres_4.jpg"]},"Consult_chateau_formulairedb01":{"id":"Consult_chateau_formulairedb01","dept":"01","canton":"Lagnieu","commune":"Villebois","nom":"Champdor","type":"Château","periode":"XVIII","histoire":"Champdor: La famille Montillet habitait Champdor depuis le XVe siècle.           Un Emmanuel Montillet épousa en 1629 demoiselle Catherine de Michaud,  ils habitèrent la maison forte  actuellement appelée maison Drecq, à la mort d'Emmanuel sa veuve épousa  Thomas de Bapendier en 1643 et,  en 1675 la seigneurie  passa à son fils Bertrand de Montillet  qui ce dernier avait épousé en 1660 Anselme de Rosetaing et eurent dix enfants. Le fils aîné Guy épousa en 1695 demoiselle Hippolite de Revol, c'est par elle que la parenté de cousinage se forma avec la maison de France d'Espagne et de Savoie (Médicis) et que la famille accéda à la fortune et aux honneurs dont il fit construire ce château de quatorze pièces et flanqué de quatre tourelles d'angles, ils eurent cinq enfants dont Jean François Montillet de Grenaud  né à Champdor en 1702 archevèque d'Auch et Pierre grand bailli d'épée du Bugey héritèrent également des Grenaud . Guy le père remarié en 1715 à Gasparde de Varey ou naîtra  Thomas premier du nom qui terminera le château vers 1743, épousera Marguerite Quarré de Livron, et il eurent neuf enfants à Champdor Thomas l'aîné épousa Anne de Suremain, le second Claude-Christine épousa Marie-Françoise d'Angeville. La famille passa la Révolution et firent construire la tour carrée haute de 35 mètres. Le baron Théodore mourut à Dijon en 1881, le château revint à l'un de ses neveux Xavier Montillet de Grenaud qui demeure au château et le vendit en 1911 aux enchères, Mr Garcin son régisseur le racheta pour le revendre  à Mr Chasselet et en 1920 une famille d'industriel lyonnais, les Brosette l'acquiert  et en 1949 vende le château à la mutuelle des employés de la ville de Marseille qui sans séparèrent  à leur tour en 1955  à Mr Le Tacon  docteur, ce dernier y vécut  jusqu'à son décès en 1992, les héritiers le vendirent en 1995 à la commune.","architecture":"Château  construit en 1743 pourvu de tours à chaque angle.  En 1851 une cinquième tour  carrée de 35 mètres de haut vint s'ajouter au nord , incendié volontairement en 185.","habitants":"Famille de  Montillet\"","divers":"Château de Champdor","gps":"","images":["../image/image_01/01_Champdor_1.jpg","../image/image_01/01_Champdor_2.jpg","../image/image_01/01_Champdor_3.jpg","../image/image_01/01_Champdor_4.jpg"]},"Consult_chateau_formulaired39c":{"id":"Consult_chateau_formulaired39c","dept":"01","canton":"Bâgé-le-Chatel","commune":"Dommartin","nom":"Chanay","type":"Château","periode":"XVII","histoire":"Chanay: le château le plus ancien de la commune qui reste sur les trois existant est celui des Quinsonas qui en était propriétaire au XIXe siècle jusqu'en 1916, puis fut la propriété du gouvernement Belge qui y installèrent un sanatorium pendant la première guerre mondiale, puis fut un hôtel restaurant de luxe avant d'être acquis par la MGEM  centre médical toujours existant. Ancienne maison forte  de Chanay d'Izernore, bâtie vers 1350 par Philippe de Bussy, vassal du comte de Savoie.     Un autre château voisin celui de Bellegarde de Valserine, celui de Pyrimont maison forte construite par le marquis  de Sassenay propriétaire des mines d'asphalte en 1835.","architecture":"Château des Quinsonnas; grosse bâtisse flanquée de tours hexagonales et d'un donjon complétés par des bâtiments modernes à arcades dans le but de son activité médicale.                    Maison forte de Chanay; corps de logis rectangulaire à deux niveaux avec fronton, restaurée en 1990 par l'association du patrimoine des pays de l'Ain et a été revendue.","habitants":"Famille de Quinsonas et Famille de Philippe de Bussy\"","divers":"Château de Chanay dit des Quinsonas  et vestiges du château de Dorches donjon carré du XIIe siècle.","gps":"","images":["../image/image_01/01_Chanay_1.jpg","../image/image_01/01_Chanay_2.jpg","../image/image_01/01_Chanay_3.jpg","../image/image_01/01_Chanay_4.jpg"]},"Consult_chateau_formulairea186":{"id":"Consult_chateau_formulairea186","dept":"01","canton":"Thoissey","commune":"Guereins","nom":"Charmes_Guereins","type":"Maison forte","periode":"XIX","histoire":"Charmes-Guereins fut construit au XIXe siècle par des maîtres de forges, le nom tiré de la forêt de Charmes. De la famille de Bouleau de l'Aulne. le château de l'Hermitage (viticole)","architecture":"Charmes; Maison forte du XIXe siècle à deux niveaux corps de logis flanqué sur sa partie central d'un pavillon carré saillant.","habitants":"Monsieur Marquis\"","divers":"Maison de Charmes et Guerreins","gps":"","images":["../image/image_01/01_Charmes_Guereins_1.jpg","../image/image_01/01_Charmes_Guereins_2.jpg"]},"Consult_chateau_formulaireea32":{"id":"Consult_chateau_formulaireea32","dept":"01","canton":"Champagne-en-Valromey","commune":"Songieu","nom":"Chateauneuf","type":"Vestiges","periode":"XI","histoire":"Ch$ateauneuf: Le fief était sous la domination des comtes de Savoie en 1077, en 1125 mariage d'Alice de Savoie fille d'Amédée  III avec Humbert de Beaujeu, en 1285 Amédée de Savoie cède Châteauneuf acquis au sire de Beaujeu à son neveu Louis de Savoie, seigneur de Beaugeu, baron de Vaud. En 1303 passa à Louis de Savoie . En 1369 Amédée V échange Châteauneuf avec Pierre de Gerbais (trésorier général de Savoie) contre des rentes et fiefs en Piémont. En 1377 Pierre de Gerbais  restitue les terres à Andrée de Savoie suite à un procès. En 1378 le comte de Savoie en guerre contre les Beaujeu fortifie le château . De 1438 à 1440 le châtelain Jean de Seyssel seigneur d'Aix s'oppose à l'aventure d'Anne de Lusignan. \r\nAu traité de Paris en 1410  le comte Amédée VIII donne les terres de Châteauneuf à Odon de Villars qui les cèdent au comte de Savoie, devenu duc conserve jusqu'en 1536 date de l'invasion française et en 1584 la baronnie de Virieu le Grand et le seigneur de Châteauneuf sont érigés en comté en faveur de Renée de Savoie marquise  de Bourg. En 1595 destructions par le maréchal de Biron , 1601 le traité de Lyon rattache le Valmorey à la France , 1612 Honoré d'Urfé érige le comté en marquisat.","architecture":"Le château comportait une enceinte quadrangulaire de 30 mètres de côté avec des murailles de 6 mètres d'épaisseur donjon de 30 mètres de haut carré de 8 mètres 50 de côté. Aujourd'hui il reste les vestiges des remparts et du donjon.","habitants":"Comte de Savoie\"","divers":"Vestiges de Châteauneuf","gps":"","images":["../image/image_01/01_Chateauneuf_1.jpg","../image/image_01/01_Chateauneuf_2.jpg","../image/image_01/01_Chateauneuf_3.jpg","../image/image_01/01_Chateauneuf_4.jpg"]},"Consult_chateau_formulaire45e8":{"id":"Consult_chateau_formulaire45e8","dept":"01","canton":"Pont-d`Ain","commune":"Neuville-sur-Ain","nom":"Chateauvieux (01)","type":"Château","periode":"XIX","histoire":"Châteauvieux: Fief  des seigneurs de Châteauvieux ; Claude II de Courcy seigneur en 1577 acheta  le château de Thol. En 1615 René de Vienne comte de Châteauvieux qui hérita tout le comté  et le revendit en 1662  (Châteauvieux,  Fromente, Beaurepaire, Villerevesure, les Feuilles et THol ) à Barthélémy Gueston lequel eut une fille Anne qui épousa en 1697 Paul Gayot  qui devint  propriétaire de tous ses biens que cette famille garda jusqu'à la révolution, passa ensuite aux Brac de la Perrière, puis vers 1880 à la famille Costa de Beauregard qui s'en séparèrent en 1949 au profit d'une association  d'entraide aux adolescents.","architecture":"Le château fut reconstruit sur l'emplacement d'une ancienne maison forte, la bâtisse  actuelle fut remanié vers 1820","habitants":"Famille Gayot\r\nFamille Costa de Beauregard\"","divers":"Chateauvieux à Neuville sur Ain, chateau le Chênes","gps":"","images":["../image/image_01/01_Chateauvieux(01)_1.jpg","../image/image_01/01_Chateauvieux(01)_2.jpg","../image/image_01/01_Chateauvieux(01)_3.jpg","../image/image_01/01_Chateauvieux(01)_4.jpg"]},"Consult_chateau_formulaire8a76":{"id":"Consult_chateau_formulaire8a76","dept":"01","canton":"Villars-les-Dombes","commune":"La Chapelle-du-Châtelard","nom":"Chatelard (01)","type":"Vestiges","periode":"XIII","histoire":"Châtelard: Fondé vers 1200 par Humbert de Thoire-Villars en fief de l'archevêque de Lyon, a appartenu  également  à Isabelle d'Harcourt bienfaitrice de la Dombes. Le village saccagé par les troupes du duc de Savoie en 1460, le château résista, même aux assauts en 1594 du chevalier de la Rye, un seul homme fut rescapé. \r\nLa châtellenie passa de mains en mains pour finir à la Révolution à la famille Penet.                                Dans la commune de la Chapelle du Châtelard Le château de Creusettes; Ce château fut construit par Clément-Desormes en 1850 et agrandi en 1910.     Le château de Terre  maison bourgeoise associée à une ferme importante du XVIII étant habité par la famille Penet de Maternost, au XIXe siècle appartenait à Germaine Necker Baronne de Staël.","architecture":"Châtelard: Construit sur une motte, il ne reste aujourd'hui que quelques pans de murs de l'ancien château fort.        Dans cette commune il y a le château de la Terre ancienne propriété de Madame Staël.","habitants":"Famille de Thoire-Villars\r\n        \"","divers":"Vestiges du Châtelard et château de Creusettes","gps":"","images":["../image/image_01/01_Chatelard_01_1.jpg","../image/image_01/01_Chatelard_01_2.jpg","../image/image_01/01_Chatelard_01_3.jpg"]},"Consult_chateau_formulairef407":{"id":"Consult_chateau_formulairef407","dept":"01","canton":"Chalamont","commune":"Chatenay","nom":"Chatenay","type":"Château","periode":"XIII","histoire":"Chatenay: Fief des sires de Beaujeu au XIIIe siècle, puis passa dans les mains  de Guillaume de Juys. Au XVIIIe siècle, le duc du Maine le cède à la famille d'Aubarède, qui le revendit à Monsieur Micoud, puis racheté par monsieur Joseph Ponchon qui en était propriétaire à la Révolution.                        Château-Rouge: Château ou naquit en 1585  Favre de Vaugelas baron de Pérouges (gentilhomme grammairien), le château actuel date de 1875 réalisé par un médecin lyonnais .                        Dans la commune le château de la Roue transformé en hôtel restaurent.","architecture":"Chatenay; Corps de logis quadrangulaire à deux niveaux, en briques rouges, flanqué de tours rondes en angles. Château rouge tours de style Louis XIII, le château actuel date de 1875 est une maison bourgeoise appelée  \"Château\"  avec un beau parc.","habitants":"Famille d'Aubadière\"","divers":"Château de Châtenay et château rouge","gps":"","images":["../image/image_01/01_Chatenay_1.jpg","../image/image_01/01_Chatenay_2.jpg","../image/image_01/01_Chatenay_3.jpg","../image/image_01/01_Chatenay_4.jpg"]},"Consult_chateau_formulaire7127":{"id":"Consult_chateau_formulaire7127","dept":"01","canton":"Châtillon-sur-Chalaronne","commune":"Châtillon-sur-Chalaronne","nom":"Chatillon_sur_Chalaronne","type":"Forteresse","periode":"XI-XIII","histoire":"LA FORTERESSE de Châtillon sur Challaronne; Le château féodal aujourd'hui  ruiné était la possession des seigneurs de Châtillon, puis  des sires de Beaujeu et des seigneurs de Bagé par le mariage de Sibylle  de Beaugeu à Renaud de Bagé. Englobé dans le comté de Savoie en 1272 et revint à la France. Philippe, comte de Savoie et de Bourgogne  transforma la forteresse, qui fut en partie démantelée au XVIe siècle par le maréchal de Biron. En 1650 mademoiselle de Montpensier dite la  \"Grande Demoiselle\" devient propriétaire du comté de Châtillon des Dombes et son domaine passera à sa mort aux princes d'Orléans qui le gardera jusqu'en 1793. Après la révolution il y eu divers propriétaires  jusqu'à mademoiselle Legoube qui à sa mort légua ses biens à l'hôpital, qui le cédera ensuite à la commune en 1965.                     HOPITAL:  En 1727 la ville décida de reconstruire complètement l'ancien hôpital qui datait du XIIIe siècle et qui se trouvait dans un état de délabrement extrême, des dons ont été donné par Claude Perret comte de Châtelard. Le nouvel établissement fut inauguré le 8 décembre 1732, les soeurs de Sainte Marthe de Pont-de-Vaux fondèrent la congrégation qui gérèrent l'hôpital jusqu'en 1972, désaffectation de l'hôpital en 1979, remanié,  transformé en centre culturel de la Dombes.                                 BISSIEUX: Ancien relais de chasse, de la famille de Bissieux qui a été remanié au XVIIIe siècle pour le transformé en Chambre d'hôtes.","architecture":"Châtillon sur Chalaronne; Cette forteresse situé dans la cité, construite au XIe siècle, enceinte fortifiée en 1310 qui fermait le château avec vingt cinq tours crénelées qui se reliaient entre elles par des courtines crénelées et trois portes fortifiées dont il reste la porte de Villars et une partie des murailles et quelques tours malgré le démantèlement du maréchal de Biron en 1595.                               Bissieux; élégante construction du XIXe siècle, très bien restauré possède un  corps de logis rectangulaire flanqué de tourelles en angles de façade, accolée à un bâtiment plus ancien , entouré d'un beau parc","habitants":"Seigneurs de Châtillon\"","divers":"Vestiges de Chatillon sur Chalaronne, remparts, courtines, tours et porte du Diable","gps":"","images":["../image/image_01/01_Chatillon_sur_Challaronne_1.jpg","../image/image_01/01_Chatillon_sur_Challaronne_2.jpg","../image/image_01/01_Chatillon_sur_Challaronne_3.jpg","../image/image_01/01_Chatillon_sur_Challaronne_4.jpg","../image/image_01/01_Chatillon_sur_Challaronne_5.jpg","../image/image_01/01_Chatillon_sur_Challaronne_6.jpg","../image/image_01/01_Chatillon_sur_Challaronne_7.jpg","../image/image_01/01_Chatillon_sur_Challaronne_8.jpg","../image/image_01/01_Chatillon_sur_Challaronne_9.jpg"]},"Consult_chateau_formulaire634d-2":{"id":"Consult_chateau_formulaire634d-2","dept":"01","canton":"Thoissey","commune":"Genouilleux","nom":"Chavagneux","type":"Vestiges","periode":"XIII","histoire":"Chavagneux: L'histoire de Genouilleux au Moyen-Age est inséparable liée à la  forteresse  de Chavagneux et dépendait de la châtellenie de Montmerle au XIe siècle les sires de Beaujeu acquièrent les terres  et édifièrent le château  qui servit de garnison, séparée du royaume de France par la Savoie est érigée dés 1197 sur une butte.  \r\nLe donjon dépendait d'un château qui exerça longtemps des droits de péage sur la batterie de  la Saône; dressé vers 1296 par le chevalier Milon de  Vaux qui la prit en fief-lige de Guichard de Beaujeu en 1310.                         Vendu en 1770 à la famille Bonna de Perey, puis acquit par la famille Frèrejean au début du XXe siècle et cette famille depuis 15 ans restaure le château du XVIIIe en contrebas. Le château actuellement sert de chambres d'hôtes.  Dans la commune le château de Hardies, appelé aussi de la \"Serve ou Genouilleux\", il est du XVIIe siècle, il fut démoli en 1870 pour être reconstruit par le baron de la Serve aujourd'hui appartient à la famille d'Hotelans.","architecture":"Chavagneux; donjon cylindrique en bonne conservation à trois étages voûtées et escalier pris dans l'épaisseur des murs, seul vestige du château du XIIIe siècle  accolé à un corps de logis remanié, construit en carrons savoyard à l'intérieur de la tour une fosse profonde de 7 mètre  les \"oubliettes\".","habitants":"Chevalier Milon\"","divers":"Château de Chavagneux\r\nChâteau de Bourdonnel","gps":"","images":["../image/image_01/01_Chavagneux_1.jpg","../image/image_01/01_Chavagneux_2.jpg","../image/image_01/01_Chavagneux_3.jpg","../image/image_01/01_Chavagneux_4.jpg","../image/image_01/01_Chavagneux_5.jpg","../image/image_01/01_Chavagneux_6.jpg","../image/image_01/01_Chavagneux_7.jpg"]},"Consult_chateau_formulaire7faf":{"id":"Consult_chateau_formulaire7faf","dept":"01","canton":"Lagnieu","commune":"Chazay-sur-Ain","nom":"Chazey","type":"Château","periode":"XI","histoire":"Chazey; Bâtie en partie en 974 par Manasses III, sire de Coligny, puis passa par alliance aux Dauphins de Viennois. Humbert de Viennois céda en 1349 le Dauphiné et tous ses domaines, dont Chazey à Philippe VI de Valois. Chazey vit séjourner dans ses murs toute une suite de rois  de France, Charles V de Valois, Philippe II de Savoie dit  \"sans terre\"  marié à Marguerite de Bourbon, soeur de Louis XI dont la fille Louise de Savoie fut la mère de François Ier, de son second mariage avec Claudine des Brosses de Bretagne naquit à Chazey  Philiberte de Savoie, épouse de Julien de Médicis et Charles III. Philibert le Beau, issu du premier mariage de Philippe II, fut seigneur de Chazey de 1497 à 1504; il épousa en seconde noce Marguerite d'Autriche fille de l'empereur Maximilien.  C'est la que naquit en 1486 Charles III duc de Savoie, il régna quarante neuf ans et mourut en 1553 après s'être fait ravir en 1535 le Bugey et la Savoie par François Ier.  En 1571 Jacques de Savoie-Nemours époux de Jeanne d'Este, mère du duc de Guise (assassiné à Blois) acquit le château qu'il engagea en 1580  au seigneur de Pastey. Depuis cette date changea souvent de mains ; démantelé en 1595  par le maréchal Biron. Devint ensuite propriété de la famille de Crémeaux qui le conserva  jusqu'à la révolution. Restauré au siècle dernier par un banquier lyonnais Monsieur Marius Cote, en 1964 fut la  propriété de monsieur Felix Brachet et en 1974 acquis par le district de la plaine de l'Ain pour son siège devenu communauté des communes.","architecture":"Construit au Xe siècle, mais dans son état actuel date en majeure partie du XVe siècle, démantelé au XVIe siècle  et a été largement remanié au milieu du XIXe siècle, est composé d'un corps de logis en équerre à trois étages un puissant donjon carré de six étages, flanqué d'échauguettes domine la masse des courtines crénelées et des tours couronnées de mâchicoulis à l'opposé donjon réduit à mâchicoulis. Un bâtiment a été rajouté dernièrement en continu à l'ancien pour un logement du gardien.","habitants":"Les rois de France \"","divers":"Château de Chazey","gps":"","images":["../image/image_01/01_Chazey_1.jpg","../image/image_01/01_Chazey_2.jpg"]},"Consult_chateau_formulaire3c24":{"id":"Consult_chateau_formulaire3c24","dept":"01","canton":"Poncin","commune":"Jujurieux","nom":"Chenavel","type":"Château","periode":"XVI","histoire":"Chenavel: Château médiéval inféodé en 1342 par Humbert de Thoire-Villars qui transmet en 1370 le fief  de Chenavel, de Hautecourt, de Romanèche, de Cize, de Bohas, de Rignat, de Mérignat et de Meyriat au chevalier Pernet de Buenc qui le garderont jusqu'en 1477 à la mort d'Antoine de Buhenc, le château passe à la famille de Breuil (1483), en 1556 à la famille de Bordes en 1570 la seigneurie  de Chenavel unie à celle de la Bastie sur Cerdon, est érigée en baronnie, en 1590 Claude de la Coux, abbé d'Ambronay et sénateur de Savoie le reconstruit et le château sera épargné en 1598 lors de la guerre de la France et la Savoie, en 1651 François Reydelet achète la seigneurie aux Lyobard et en 1655 François Reydelet revend la seigneurie à Claude Michon seigneur des Murs, cette famille gardera la seigneurie jusqu'en 1784 à la mort de Claude-Etienne Michon du dernier seigneur de Chenavel, chevalier de l'ordre royal et militaire de Saint-Louis. \r\nPendant la Révolution a appartenu à Etienne Joseph du Louvat de Champollon qui possède le château de la Combe mais réside à Chenavel et en 1794 fut sauvé de la destruction par le maire Jean Claude Savarin. Vendu en 1833 par le marquis Costa de Beauregard à Alfred Vincent de Lormet  qui lui fit perdre son aspect féodal par la suppression de l'aile au levant du pont-levis et fossés, puis en 1844 le vendit au manufacturier Claude-Joseph Bonnet qui en fit une maison de repos pour ses employés jusqu'au début du XXe siècle. En 1949  les héritiers firent don du château  à une association familiale de vacances et depuis 1976 la propriété est louée à l'association du centre de recherche préhistorique de l'Ain, et en 2008 la famille Cottin récupère le château.","architecture":"Chenavel;  ce château médiéval du XVIe siècle façade principale flanqué de tours rondes à perdu une partie de son enceinte,  le corps de logis rectangulaire à trois niveaux avec deux ailes en retour, les angles intérieurs sont garnis de tours octogonales, il fut remanié au XIXe siècle.","habitants":"Seigneurs de Thoire-Villars,         Famille Cottin.\"","divers":"Château de Chenavel","gps":"","images":["../image/image_01/01_Chenavel_1.jpg","../image/image_01/01_Chenavel_2.jpg"]},"Consult_chateau_formulairec5cd":{"id":"Consult_chateau_formulairec5cd","dept":"01","canton":"Montluel","commune":"Dagneux","nom":"Chiloup","type":"Château","periode":"XIV","histoire":"Chiloup: La première maison forte construite vers 1330 par Guichard de Chiloup, seigneur de Montluel, aux Decrues de Sainte-Croix. Au XIXe siècle par la famille de Montherot marquis de Ruolz et actuellement à la commune de Dagneux.","architecture":"Chiloup; cette maison forte qui a des traces du XVIe siècle, grosse bâtisse rectangulaire à trois étages surélevée au centre  d'une tour carrée  qui domine l'ensemble. Ce château possède des bustes de rois de Rome qui ornent la façade Est, pigeonnier et Chapelle désaffectés avec blason des Montherot au fond du parc remanié au_formulaire9f0e":{"id":"Consult_chateau_formulaire9f0e","dept":"01","canton":"Poncin","commune":"Jujurieux","nom":"Combe","type":"Château","periode":"XVI","histoire":"Combe: Au nord de Jujurieux, manoir séculaire des Louvat de Champollon, en 1248 fief de Geoffroy et Guillaume de Louvat faisait donation  à la maison de Saint-Jean de Jérusalem de l'Aumusse en Bresse, à la fin du XVIe siècle leurs descendants se fixèrent  à la Combe que la famille avait conservé dans la charte de 1337, puis par alliance passa à la famille de la Couz ou Coux, par le mariage de Jean-Claude de Louvat avec la fille de René et de Claudine d'Oncieux, Ennemonde de Couz. Puis est né en 1737  dans ce château Gaspard Adrien du Louvat de Champollon, officier supérieur de 1761 à 1769, il fut nommé maire sous l'Empire, il avait épousé Marie Claudine Gallien de la Chaux. En 1810 Gaspard Adrien Bonnet oncle de ces deux derniers Louvat  meurt à la Combe, lui aussi a connu une carrière militaire et termina ses jours à la Combe, le château passa à son frère Joseph-Etienne-Anne militaire également. Le nom de Louvat Champollon s'éteignit en 1885, à la Combe, du dernier descendant Louis Claude Victor. le château passa a ses filles et a son petit-fils Jean Pouzet.","architecture":"Combe; corps de bâtiment a deux tours, prolongé en retour d'équerre par une autre série de bâtiment comportant chapelle voûtée et dépendances, il fut remanié à la fin du XVIe siècle par l'abbé de la Coux.","habitants":"Famille de Louvat de Champollon\"","divers":"Château de Combe","gps":"","images":["../image/image_01/01_Combe_1.jpg","../image/image_01/01_Combe_2.jpg"]},"Consult_chateau_formulaire53b2":{"id":"Consult_chateau_formulaire53b2","dept":"01","canton":"Treffort-Cuisiat","commune":"St-Maurice-d`Echazeaux","nom":"Conflans_Ain","type":"Château","periode":"XIII","histoire":"TREFFORT; Au Xe siècle construction du village sur les hauteurs par les seigneurs de Coligny, en 1249 Amédée V de savoie fit construire le château de Montfort à cheval sur les deux communes sur le Revermont, en 1274 en guerre contre le comte de Bourgogne Humbert de la Tour du Pin, de Coligny suite à l'alliance de ce dernier avec Anne du Viennois (Béatrice de Savoie) contraint par les armes le fief du Revermont revient à la Bourgogne en 1289 le fief est vendu aux comtes de Savoie par le duc de Bourgogne. Attaque du château par les troupes de Louis XI dégâts importants remanié en 1469 par Claude de la Baume, comte de Montrevel, en 1479 destruction du château de Montfort, en 1601 au traité de Lyon le lieu passe à la France. En 1641 la ville sera détruite par les troupes francomtoises (guerre entre la France et l'Espagne) en 1944  Cuisiat est incendié par les allemands, fusionnement officiel en 1972 des deux communes Treffort et Cuisiat   CONFLANS, le château féodal  fut construit au bord du lac de Conflans à Saint-Maurice d'Eshazeaux  par Renaud de Bourgogne, comte de Montbelliard, se château au XIIIe siècle gardait la frontière savoyarde.                                Dans la commune Tour de Grammont ou tour de Rosy et la tour de Vallière.","architecture":"TReffort-Montfort; les ruines du château sur le Revermont lieu dit de Pallaches ce château n'était pas très étendu avait une enceinte de forte palissade tomba en ruine en 1600 est devenu un lieu  de pèlerinage.                            Conflans; Ce château a conservé son allure belliqueuse avec ses courtines et meurtrières, a gardé son aspect féodal du XIIIe siècle, plusieurs fois remanié, chemin de ronde à l'exception d'une seule arasée à la Révolution.          Enceinte  quadrangulaire flanqué de tours d'angle, et tour intérieure octogonale.","habitants":"Renaud de Bourgogne\"","divers":"Château de Conflans, Château à Treffortet vestiges de Montfort.","gps":"","images":["../image/image_01/01_Conflans_Ain_1.jpg","../image/image_01/01_Conflans_Ain_2.jpg","../image/image_01/01_Conflans_Ain_3.jpg","../image/image_01/01_Conflans_Ain_4.jpg","../image/image_01/01_Co
