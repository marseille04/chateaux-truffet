e, accolé de deux pavillons saillants.","habitants":"Gouverneur des ducs de Savoie\"","divers":"Château et porte","gps":"","images":["../image/image_01/01_Pont_de_Veyle_1.jpg","../image/image_01/01_Pont_de_Veyle_2.jpg","../image/image_01/01_Pont_de_Veyle_3.jpg","../image/image_01/01_Pont_de_Veyle_4.jpg","../image/image_01/01_Pont_de_Veyle_5.jpg"]},"Consult_chateau_formulairebc5c":{"id":"Consult_chateau_formulairebc5c","dept":"01","canton":"Chalamont","commune":"Villette","nom":"Richemont","type":"Vestiges","periode":"XII","histoire":"Richemont: Au XIIe siècle, Gérard de la Palud  seigneur de Varambon, illustre famille du moyen age avait des difficultés avec leur fils aîné, Aymon, abandonna le domaine de Varambon, il fit édifier Richemont en 1290 par Pierre de la Palud vassal du Dauphin du Viennois, le château  resta dans la famille jusqu'en 1664, il fut racheté par un orfèvre Lyonnais  Pierre Perrachon. \r\nEn 1595 le maréchal Biron fit saccagé le château.  Jean François Balan d'Auguste-Bourg l'acquit en 1756, il y installa Louis Michaud, son tabellion .          C'est à madame de Belvey née Constance de la Teyssonnière que l'on doit la restauration du château acheté par son ami François-Catherin Marron, baron de Belvey en 1830. C'est à Richemont que fut inventé le verre incassable vers 1870 par Alfred de la Bâtie petit-fils de madame de Belvey puis passa à la famille Véron actuellement la fille madame de la Celle est propriétaire du domaine.","architecture":"Construit au XIIe siècle, haute enceinte quadrangulaire  flanquée de tours cylindriques aux angles détruit en partie en 1595 par les troupes d'un maréchal de Biron remanié en 1830 et en 1840 un incendie détruisit les dépendances du château et en 1947, un second incendie  ravagea une grande partie  de la toiture, Monsieur Alfred Veron de la Combe entreprit la réfection des murs et des tours.","habitants":"Famille de la Palud\"","divers":"Diverses vues du château féodal de Richemont.","gps":"","images":["../image/image_01/01_Richemont_1.jpg","../image/image_01/01_Richemont_2.jpg","../image/image_01/01_Richemont_3.jpg","../image/image_01/01_Richemont_4.jpg","../image/image_01/01_Richemont_5.jpg","../image/image_01/01_Richemont_6.jpg"]},"Consult_chateau_formulaire67d2":{"id":"Consult_chateau_formulaire67d2","dept":"01","canton":"Trévoux","commune":"Jassans-Riottier","nom":"Rigaudiere","type":"Manoir","periode":"XVI","histoire":"Rigaudière: Au XVe siècle ce manoir fut rendu à l'archevêque de Lyon, puis abandonné et en 1572 l'église de Lyon vend le fief à David Clerberg, son fils en sera seigneur dit le bon \"Allemand\", banquier de François Ier et le principal fondateur de l'hospice de la Charité à Lyon. Le manoir passa en 1770 aux Hubert de Saint-Didier puis aux Chaussat de Montessuy.","architecture":"Le bâtiment actuel de ce manoir est constitué de plusieurs corps de logis en L sur cour fermée. Vestige de l'enceinte basse de la poype au côté nord mur de clôture flanqué d'une petite cour carrée garnie d'archères et canonnières cruciformes.","habitants":"Famille Clerberg\"","divers":"Manoir de la Rigaudière, de Cillery.","gps":"","images":["../image/image_01/01_Rigaudiere_1.jpg","../image/image_01/01_Rigaudiere_2.jpg","../image/image_01/01_Rigaudiere_3.jpg","../image/image_01/01_Rigaudiere_4.jpg","../image/image_01/01_Rigaudiere_5.jpg","../image/image_01/01_Rigaudiere_6.jpg"]},"Consult_chateau_formulaire9ee1-2":{"id":"Consult_chateau_formulaire9ee1-2","dept":"01","canton":"Châtillon-sur-Chalaronne","commune":"Romans","nom":"Romans","type":"Château","periode":"XVI","histoire":"ROMANS; Ce fief est mentionné au Xe siècle dans des actes de l'abbaye de Cluny, il appartenait aux de Varax.  Louis XV érigea en comté la terre de Romans pour un capitaine du régiment, originaire de Genève, appelé Ferrari, qui s'était distingué au siège de Coni.  \r\nEn 1912 Le dernier des Ferrari s'éteint et lègue le château à monsieur Domy. Puis en 1927 à madame de la Dormie; Aujourd'hui centre de réadaptation pour enfants et adolescents.           CLERDAN; ce château qui domine la vallée de Chalaronne  fut construit au milieu du XIXe siècle par le comte de la Rochette, puis à la famille Kayser depuis 1999.                              CHAPUIS: Reconstruit au début du siècle dernier par la famille Munet elle  fut la propriété  de la famille Sabran, soyeux lyonnais et fut racheté par la société Chapuis pour en faire une maison de retraite.","architecture":"Le château à deux parties distinctes, une très vieille partie moyenâgeuse qui a échappé aux troupes du maréchal de Biron, l'autre partie incendié vers 1460 par les troupes du duc de Bourbon  reconstruite  plus finement et aérée de style renaissance, il en  reste  aujourd'hui l'aile nord placée entre deux anciennes tours, le corps de logis quadrangulaire à deux étages flanqués de tours rondes et carrées.                           CHAPUIS; Cette demeure fut construite au XVIIe siècle, remanié au XIXe siècle par un rajout de deux ailes lui donnant l'aspect d'un château.            CLERDAN; Corps de logis de plan carré avec pavillon saillant plein cintre avant.                                BEAUJEU;Les deux tours sont du XXe siècle.","habitants":"Seigneur de Varax les comtes de la Rochette\"","divers":"Quatre châteaux dans la commune de Romans; le château de Romans, Chapuis, Clerdan et de Beaujeu.","gps":"","images":["../image/image_01/01_Romans_1.jpg","../image/image_01/01_Romans_2.jpg","../image/image_01/01_Romans_3.jpg","../image/image_01/01_Romans_4.jpg","../image/image_01/01_Romans_5.jpg","../image/image_01/01_Romans_6.jpg"]},"Consult_chateau_formulaire173d":{"id":"Consult_chateau_formulaire173d","dept":"01","canton":"Gex","commune":"Crozet","nom":"Rossillon","type":"Château","periode":"XIV","histoire":"Rossillon: Guillaume II seigneur de la Forest , du Châtelard, fut le premier châtelain de Rossillon, dés 1398, puis Page du Comte Vert, écuyer du comte Rouge, chambellan et ambassadeur du duc Amédée VII, succédé par son fils Jean Ier de la Forest; c'est lui qui fit construire la maison forte  et restera dans cette famille jusqu'au XVIe siècle, la ville et le château subit de gros dommages en 1353 lors de la prise de Gex par la Savoie. \r\nLa tour carrée servit au XIXe siècle  de prison,  puis caserne de gendarmerie à cheval  au début du XXe siècle.","architecture":"Du château construit au XIe siècle, fut ruiné au XVe siècle sur un monticule à 690 mètres d'altitude au dessus du village de Villeneuve, reste d'un donjon rectangulaire du XVe siècle de 9,50 m x 16 m, flanqué d'une tour carrée, enceinte fossoyé;  il reste quelques vestiges de fortifications.","habitants":"Seigneur de la Forest\"","divers":"Château de Rossillon.","gps":"","images":["../image/image_01/01_Rossillon_1.jpg","../image/image_01/01_Rossillon_2.jpg","../image/image_01/01_Rossillon_3.jpg","../image/image_01/01_Rossillon_4.jpg"]},"Consult_chateau_formulaired316":{"id":"Consult_chateau_formulaired316","dept":"01","canton":"Montrevel-en-Bresse","commune":"Attignat","nom":"Salvert","type":"Château","periode":"XIX","histoire":"Salvert; Château de Salvert fut reconstruit sur les restes de l'ancien au XIXe siècle; dans la ville il y a le château du Pavillon où maison Golletty du XVIIIe siècle.","architecture":"Salvert; Corps de logis rectangulaire flanqué d'échauguettes en angle et d'un donjon crénelé à l'opposé plein cintre.","habitants":"Famille Golletty\"","divers":"Château de Salvert.","gps":"","images":["../image/image_01/01_Salvert_1.jpg","../image/image_01/01_Salvert_2.jpg","../image/image_01/01_Salvert_3.jpg"]},"Consult_chateau_formulairef18b":{"id":"Consult_chateau_formulairef18b","dept":"01","canton":"Châtillon-sur-Chalaronne","commune":"Sandrans","nom":"Sandrans","type":"Maison forte","periode":"XIII","histoire":"Sandrans: La seigneurie aux Moyen-Age appartenait aux sires de Sandrans, famille qui s'éteignit au XIIIe siècle,  puis elle fut la possession des sires de Beaujeu, puis des Thoire-Villars et enfin des comtes de Savoie, elle fut acquise en 1684 par la famille Cardon de Sandrans qui la conservèrent jusqu'à la Révolution.","architecture":"Sandrans; la grosse tour ronde adossée à une habitation moderne est le dernier vestige de l'ancien château, reste des traces de fossé d'enceintes et du pont-levis, beau porche d'entrée, l'enceinte possède une échauguette en angle.","habitants":"Famille Cardon de Sandrans\"","divers":"Maison forte de Sandrans.","gps":"","images":["../image/image_01/01_Sandrans_1.jpg","../image/image_01/01_Sandrans_2.jpg","../image/image_01/01_Sandrans_3.jpg","../image/image_01/01_Sandrans_4.jpg","../image/image_01/01_Sandrans_5.jpg"]},"Consult_chateau_formulairee3f0":{"id":"Consult_chateau_formulairee3f0","dept":"01","canton":"Ceyzériat","commune":"Simandre-sur-Serran","nom":"Selignac","type":"Patrimoine","periode":"XIII","histoire":"Selignac: Ancien monastère des chartreux à Simmandre en Suran, chartreuse de Marie depuis 1202 à 1792 et de 1929 à 2001. Fondée par Hugues II de Coligny.         Au XVe siècle elle prospère avec la réforme protestante.                    Au XVIe siècle la chartreuse fut ruinée  mais elle fut reconstruite au XVIIIe siècle et fut de nouveau fermée en 2001.","architecture":"Fondée au XIIIe siècle, reconstruite au XVIIIe siècle, La chartreuse fut ruinée sous la Révolution et après son remaniement les chartreux sont de retour en 1928. elle est en bonne état et conserve un beau portail  Louis XIV.","habitants":"Les Chartreux\"","divers":"Monastère de Selignac.","gps":"","images":["../image/image_01/01_Selignac_1.jpg","../image/image_01/01_Selignac_2.jpg"]},"Consult_chateau_formulaire3f8e":{"id":"Consult_chateau_formulaire3f8e","dept":"01","canton":"Ferney-Voltaire","commune":"Sergy","nom":"Sergy","type":"Maison forte","periode":"XIII-XVI","histoire":"SERGY; Au XIe siècle la seigneurie possédait  de nombreux fiefs dans le pays de Gex, seigneur de Tougin vidome du prieuré de Prévésin propriétaire des terres de Prégnin, Allemagne,,Pouilly, Naz et Ferrières. En 1270 un Pierre de Sergy était propriétaire du fief. Au Moyen-Age la famille de Sergier aura la suzeraineté jusqu'en 1533, en 1755 la seigneurie passa aux Buisson par alliance et en 1779 à Pierre Pictet qui sera seigneur jusqu'à la Révolution, le château est remit en état par le petit fils de Pictet, puis fut loué à la station thermale il prit le nom de château des Bains.  La propriété a été achetée par le docteur Beauvois et revendu en 1982 à Monsieur Lafougère qui en est encore le propriétaire.          La maison forte de Sergy  abrita un temple protestant  avant la révocation de l'édit de Nantes.","architecture":"Cette maison forte construite au XVe siècle  remanié après la Révolution est composé d'un corps de logis central à deux niveaux encadrés de deux tours rondes.","habitants":"Famille de Pierre de Sergy\"","divers":"","gps":"","images":["../image/image_01/01_Sergy_1.jpg"]},"Consult_chateau_formulaire2862":{"id":"Consult_chateau_formulaire2862","dept":"01","canton":"Lhuis","commune":"Seillonnaz","nom":"Serraz (01)","type":"Château","periode":"XIV","histoire":"Serraz; le château dit la \"Serra\" fut construit par les Briord, une famille des Blumenstein y demeura d'où la légende de la Dame noire recluse dans son château  qui devient l'hôte d'un sombre fantôme qui se montre quelques fois  au sommet du donjon et dans les couloirs.","architecture":"Serraz; Château du XIVe siècle  remanié au XVIe siècle avec un puissant donjon, ensemble importants  de tours carrées de différents niveaux.","habitants":"Famille de Briords\"","divers":"Château de Serraz.","gps":"","images":["../image/image_01/01_Serraz_1.jpg","../image/image_01/01_Serraz_2.jpg"]},"Consult_chateau_formulairea7b7":{"id":"Consult_chateau_formulairea7b7","dept":"01","canton":"Ceyzériat","commune":"St-André-de-Suran","nom":"St_Andre (01)","type":"Vestiges","periode":"XI","histoire":"Saint-André: Les premiers seigneurs du château de Saint-André furent les sires de Coligny qui au XIIe siècle possédaient tout le Revermont, puis en 1213 Albert de la Tour en devient propriétaire par alliance avec Béatrice de Coligny et en 1289 Robert de Bourgogne légua le Revermont à Amédée de Savoie en échange des territoires de Cuisery et Sagny .","architecture":"Enceinte de forme quadrangulaire, dont les murs ont conservés leurs  hauteurs  de trois mètres, au point le plus haut se trouve le donjon de plan circulaire mesurant six mètres de diamètre intérieur.","habitants":"Seigneurs de Coligny\"","divers":"Vestiges du château de saint-André","gps":"","images":["../image/image_01/01_St_Andre_1.jpg"]},"Consult_chateau_formulaired069":{"id":"Consult_chateau_formulaired069","dept":"01","canton":"Lhuis","commune":"Serrières-de-Briord","nom":"St_Andre_de_Briord","type":"Vestiges","periode":"XI","histoire":"Saint-André de Briord: la seigneurie a appartenu à la famille de ce nom depuis le XIe siècle, passa aux seigneur de Coligny et en 1257  il est acquis par les comtes de Savoie et conquis ensuite  par le dauphin du Viennois en 1343  le passe à la France qui l'échange avec la Savoie en 1354.  Pierre-François-Georges d'Antraigues comte de Meillan qui épousa Marie Thérése Bonel-d'Harencourt qui devait devenir la maîtresse du régent est né à Saint-Marcellin en 1697.","architecture":"A côté d'une habitation rectangulaire flanquée d'une tourelle se trouve les vestiges du châteaux( pans de murs).","habitants":"Seigneur de Coligny\"","divers":"Château de St-André de Briord.","gps":"","images":["../image/image_01/01_St_Andre_de_Briord_1.jpg"]},"Consult_chateau_formulaireb6f0":{"id":"Consult_chateau_formulaireb6f0","dept":"01","canton":"Trévoux","commune":"St-Bernard","nom":"St_Bernard","type":"Château","periode":"XII","histoire":"Saint-Bernard: seigneurie descendante de la famille de Chabeu de Saint-Trivier vendue en 1240 aux châtelains de Riottiers, puis à Guichard V sire de Beaujeu   qui construisit le château au XIIe siècle, qui en fit hommage à l'église de Lyon et vendu au XVIe siècle  aux seigneurs de Montribloud jusqu'à la Révolution.  \r\nAcheté par la famille Corvet (marchand)  puis  il fut acheté en 1923 par Suzanne Valadon avec son mari André Utter, y vécurent une dizaine d'années accompagnés de leur fils Maurice Utrillo (peintre excentrique), jusqu'en 1934.","architecture":"Château du XIVe siècle  a gardé son allure de forteresse et son corps de logis, son enceinte rectangulaire, ses tours d'angles, châtelet et tours  rondes ; ce château perdit à la Révolution son système défensif.","habitants":"Maurice Utrillo\"","divers":"Château de St-Bernard.","gps":"","images":["../image/image_01/01_St_Bernard_1.jpg","../image/image_01/01_St_Bernard_2.jpg","../image/image_01/01_St_Bernard_3.jpg","../image/image_01/01_St_Bernard_4.jpg"]},"Consult_chateau_formulairecf25":{"id":"Consult_chateau_formulairecf25","dept":"01","canton":"Ambérieu-en-Bugey","commune":"St-Denis-en-Bugey","nom":"St_Denis_en_Bugey","type":"Vestiges","periode":"XIV","histoire":"Saint-Denis en Bugey; le village s'appelait auparavant Saint-Denis le Chausson.                              Au XIVe siècle passa aux comtes de Savoie et en 1536 François Ier l'annexe à la France, retransmis aux comtes de Savoie en 1559 et au traité de Lyon en 1601 le village est définitivement rattaché à la France mais le château fut détruit auparavant par le duc de Biron, il ne subsiste que la tour carrée.","architecture":"St-Denis; Tour carrée de cinq étages dépourvue de toiture et de plancher c'est tout ce qui reste d'un château fort qui surveillait l'entrée de la Cluze.","habitants":"Dauphins du Viennois\"","divers":"Tour du château","gps":"","images":["../image/image_01/01_St_Denis_en_Bugey_1.jpg","../image/image_01/01_St_Denis_en_Bugey_2.jpg","../image/image_01/01_St_Denis_en_Bugey_3.jpg"]},"Consult_chateau_formulaire0df1":{"id":"Consult_chateau_formulaire0df1","dept":"01","canton":"Ambérieu-en-Bugey","commune":"Ambérieu-en-Bugey","nom":"St_Germain_d`Amberieu","type":"Vestiges","periode":"XII","histoire":"Château de Saint-Germain en Bugey du XIIe siècle fut la propriété de Albert de la Tour du Pin par son mariage avec Béatrice de Coligny, en 1321 le comte de Savoie s'en empare et fait reconstruire le château qui fut ruiné par les troupes d'Henri IV à la fin du XVIe siècle.","architecture":"Sur un éperon pour contrôler l'entrée de la Cluze, enceinte haute et enceinte basse flanqués du côté de l'attaque  de deux tours semi-circulaires du XII-XIIIe siècle.","habitants":"Famille de Coligny\"","divers":"vestiges du château de St-Germain.","gps":"","images":["../image/image_01/01_St_Germain_1.jpg","../image/image_01/01_St_Germain_2.jpg"]},"Consult_chateau_formulaire6fa0":{"id":"Consult_chateau_formulaire6fa0","dept":"01","canton":"Thoissey","commune":"St-Etienne-sur-Chalaronne","nom":"St_Martin","type":"Château","periode":"XIV","histoire":"Saint-Martin: On trouve des traces de Jacques de Saint-Martin-Arriveur en 1496. J L N Arriveur, propriétaire du hameau et maire en 1818,   posa la première pierre de cette maison appelé \"château\"  Aujourd'hui propriété de monsieur Dupond, descendant de la famille Arriveur, ancien seigneur de Tallard.","architecture":"Grande bâtisse en pierre assez austère style Louis XVIII  comportant de nombreuses ouvertures en façade.","habitants":"Famille de Jacques Martin  Arriveur\"","divers":"Tour et château des Roches.","gps":"","images":["../image/image_01/01_St_Martin_1.jpg","../image/image_01/01_St_Martin_2.jpg","../image/image_01/01_St_Martin_3.jpg","../image/image_01/01_St_Martin_4.jpg"]},"Consult_chateau_formulaire3045-2":{"id":"Consult_chateau_formulaire3045-2","dept":"01","canton":"Ambérieu-en-Bugey","commune":"St-Maurice-de-Remens","nom":"St_Maurice_de_Remens","type":"Château","periode":"XVIII","histoire":"Saint-Maurice de Remens: Au XVIIIe siècle propriété de l'Apfa. Dans ce château le pilote et écrivain Antoine de Saint-Exupéry y séjourna pendant son enfance (1900-1944 ), la ville de Lyon envisage de l'acquérir pour en faire un musée.","architecture":"Ce château fut construit au XVIIIe siècle et fortement remanié sous le second Empire  corps de logis à trois niveaux rectangulaires flanqués de deux ailes et toit en terrasse.","habitants":"Antoine de Saint-Exupéry\"","divers":"Château de St-Maurice de Remens.","gps":"","images":["../image/image_01/01_St_Maurice_de_Remens_1.jpg"]},"Consult_chateau_formulaire2ae0-2":{"id":"Consult_chateau_formulaire2ae0-2","dept":"01","canton":"Chalamont","commune":"St-Nizier le Desert","nom":"St_Nizier","type":"Château","periode":"XVIII","histoire":"Château de Veyze à Saint-Nizier le Desert fut incendié par le duc de Biron lors des guerres de religion en 1595. reconstruit, il fut la propriété en 1430 par un Jean de la Fontaine,en 1430 par Humbert de Teyssonnière, en 1682 par François de Bely, en 1716 par Jean Perret de Boissonière, la veuve de ce dernier le légua à l'hôpital de Bourg qui le possédait encore en 1789. Autre château dans la commune le château de Marinet.","architecture":"Château d'un étage et attique, quadrilatère flanqué de tours carrées en Angles.","habitants":"La famille de Jean Perret de Boissonière\"","divers":"Château de Saint-Nizier","gps":"","images":["../image/image_01/01_St_Nizier_1.jpg"]},"Consult_chateau_formulaireb9ed":{"id":"Consult_chateau_formulaireb9ed","dept":"01","canton":"St-Trivier de Courtes","commune":"St-Trivier-de-Courtes","nom":"St_Trivier_de_Courtes","type":"Vestiges","periode":"XIII","histoire":"St-TRIVIER de Courtes: Le château  fut bâti  au XIIe siècle par les sires de Bagé, reconstruit au XIVe siècle, la seigneurie fut apportée aux comtes de Savoie par alliance.                    Le château de Montsymond, viticole  fut transformé en hôtel restaurant par la famille Gross.","architecture":"Château de Courtes; tour octogonale dite  \"des prisons\" incluse dans les murs des maisons environnantes. Montsymond: construit au XVI remanié au XIXe siècle, en briques rouges et pierres de taille avec jolies tourelles coiffées d'ardoise et pinacles, tour carré sur angles.","habitants":"Seigneurs de Bagé\"","divers":"Tour dans saint-Trivier de Courtes et château de Montsymond.","gps":"","images":["../image/image_01/01_St_Trivier_de_Courtes_1.jpg","../image/image_01/01_St_Trivier_de_Courtes_2.jpg","../image/image_01/01_St_Trivier_de_Courtes_3.jpg","../image/image_01/01_St_Trivier_de_Courtes_4.jpg"]},"Consult_chateau_formulaire74c5":{"id":"Consult_chateau_formulaire74c5","dept":"01","canton":"Trévoux","commune":"St-Didier de Formans","nom":"Tanay","type":"Maison forte","periode":"XIII","histoire":"Tanay: la famille seigneuriale de Tanay est citée dés le XIe siècle sous la suzeraineté des sires de Thoire-Villars qui construisirent le château du  XIIIe siècle. En 1370 la seigneurie appartient à Guichard d'Ars, puis est acquise par Henri Gletiens. \r\nEn 1789  est la propriété  de Hubert de Saint-Didier. C'est dans ce château que 26 personnes de la prison de Montluc furent abattus par les Allemand en 1944. Il fut restauré pendant une vingtaine d'année par monsieur Fayolle  qui le céda à l'ordre A M O R C. Actuellement il abrite l'ordre rosicrucien du silence.","architecture":"Tanay est dit maison forte avec fossé du XVIe siècle, dont certaines parties remontent au Moyen-Age, était en ruine au siècle dernier et restauré par monsieur Fayolle. Vieux bâtiment austère, haut corps de logis à trois étages séparés par une corniche et flanqué de deux tours d'angles rondes, fenêtres à meneaux toiture original à un seul pan.","habitants":"Guichard d'Arches\"","divers":"Château de Tanay.","gps":"","images":["../image/image_01/01_Tanay_1.jpg","../image/image_01/01_Tanay_2.jpg","../image/image_01/01_Tanay_3.jpg"]},"Consult_chateau_formulairedfb0":{"id":"Consult_chateau_formulairedfb0","dept":"01","canton":"St-Trivier-sur-Moignans","commune":"Cessiens","nom":"Tavernost","type":"Château","periode":"XIII","histoire":"Tavernost: Son origine semble remonter à la fin du XIIIe siècle, le château avait été pris par le comte de Savoie, puis repris d'assaut par Antoine de Beaujeu vers 1364. Après Josserand c'est Philibert de Francheleins qui rendit hommage au comte de Savoie. Sous la possession des Buffard, des troupes du duc de Bourgogne auraient brûlé  une partie du château.  Au milieu du XVe siècle, hommage fut rendu au duc de Bourbon. Lors des guerres de religion, son seigneur, Louis de Laye, étant passé dans les rangs des calvinistes, le duc de Montpensier lui confisqua son château en 1567.  Françoise de saint-Amour, la mère du châtelain dut vendre le château à Jean Thevenon.  Après les Monpsey; la terre de Tavernost fut vendue en 1681 aux Bellet dont les descendants possèdent toujours le château.","architecture":"Donjon et courtines  vestiges de l'ancienne forteresse tant convoitée par Antoine de Beaujeu   et Aimé VI  de Savoie Le château fut bâti au XIVe siècle, flanqué de trois tours, très remanié au XIXe siècle  de l'ancienne bâtisse primitive ne subsiste qu'une partie de la tour carrée et sa courtine.","habitants":"Famille de Thavernost\"","divers":"Château de Tavernost","gps":"","images":["../image/image_01/01_Tavernost_1.jpg"]},"Consult_chateau_formulaire86bb":{"id":"Consult_chateau_formulaire86bb","dept":"01","canton":"Viriat","commune":"Buellas","nom":"Teyssonniere","type":"Château","periode":"XVIII-XIX","histoire":"Teyssonnière: Porte le nom du comte de la Theysonnière,  nom de l'archéologue et historien,  éminent auteur des recherches historiques sur le département de l'Ain et qui y vécut en ce château. \r\nBeau parc botanique de 15 hectares qui concilie le goût du XVIIIe siècle et une inspiration Zen.","architecture":"Ce château fut reconstruit au XVIIIe siècle, corps de logis rectangulaire à deux étages et attiques avec deux ailes en retour; perron et terrasse.","habitants":"Famille de la Teyssonnière\"","divers":"Château de la Teyssonnière.","gps":"","images":["../image/image_01/01_Teyssonniere_1.jpg","../image/image_01/01_Teyssonniere_2.jpg","../image/image_01/01_Teyssonniere_3.jpg","../image/image_01/01_Teyssonniere_4.jpg"]},"Consult_chateau_formulaire7080":{"id":"Consult_chateau_formulaire7080","dept":"01","canton":"Pont-d`Ain","commune":"Villebois","nom":"Thol","type":"Vestiges","periode":"XIV","histoire":"THOL; ce château médiéval de Thol  était la possession  des comtes de Savoie de Barthélémy de la Balme,  puis devient château privé et à la suite de mariages et d'héritages successifs, il passa entre les mains de différentes familles nobles Bressanes. Il appartient aux Luyrieux, ensuite aux Vaugrigneuse, le château resta deux siècles dans cette famille et passa par alliance à Claude de Salins, son fils  vendit le château à Claude de Coucy seigneur de  Châteauvieux en 1577.  \r\nEn 1615 c'est René de Vienne, comte et seigneur le reçu par héritage et le revendit en 1622 ainsi que tout ses biens à Barthélémy Gueston lequel eu une fille Anne qui épousa en 1697  Paul Gayot et lui apporta en dot  le comté de Châteauvieux, Thol et le reste,  la famille Gayot était toujours propriétaire à la Révolution. En 1790 Châteauvieux passa aux Brac de la Perrière mais le château de Thol, devenu inutile était déjà depuis longtemps à l'abandon.                              TOUR était la troisième construction du château sur cet emplacement commandé pour le médecin et mécène Etienne Goujon sénateur de l'Ain a l'architecte Tony Ferret, construction de style néo classique du XVIIe siècle avec un donjon néo-flamand façade donnant sur le village, le visage des  deux fils d'Etienne décorent les angles.","architecture":"Château du XIIe siècle de 32 et 33 mètres de côté de forme rectangulaire  de plan défensif fut démoli au XVIe siècle, par le maréchal Biron, remanié  Il n'en reste que des vestiges depuis l'an 2000 trois personnes en son propriétaire pour créer une association  pour le sauvegarder.","habitants":"Famille Barthelemy de la Balme\"","divers":"Vestiges du château de Thol              Château de la Tour à Neuville","gps":"","images":["../image/image_01/01_Thol_1.jpg","../image/image_01/01_Thol_2.jpg","../image/image_01/01_Thol_3.jpg","../image/image_01/01_Thol_4.jpg"]},"Consult_chateau_formulaire341e-2":{"id":"Consult_chateau_formulaire341e-2","dept":"01","canton":"Trévoux","commune":"Trévoux","nom":"Trevoux","type":"Vestiges","periode":"XII","histoire":"Trévoux; fondée au XIIe siècle par les sires  de Villars pour protéger un péage que l'empereur germanique  Henri VI  leur confirmé en 1188.   Puis par alliance en 1187 de Agnés de Villars héritière avec Etienne de Thoire qui constituera le domaine et l'importante seigneurie de l'Ain.  Humbert VII de Thoire-Villars en fit sa résidence avant de la céder en 1402  à Louis II de Bourbon et  en 1410 le duc Jean de Bourbon y établit un atelier monétaire. En 1431 le château résiste à tous les efforts des alliés des Comtes de Savoie, mais la ville est mise à sac et les habitants rançonnés.  Dès 1582 il cesse d'être habité car les Bourbon-Montpensier le laissèrent tomber en ruines.  Au XVII et XVIIIe siècle; quand les souverains s'appelaient la \"Grande Demoiselle\" Anne-Marie-Louise d'Orléans(1627-1693) petite fille d'Henri IV et le duc du Maine, (1693-1736) fils de Louis XIV et de la Montespan, que Trévoux brilla particulièrement grâce aux privilèges dont elle bénéficiait. Aujourd'hui propriété du conseil général.                                   Dans la ville l'Hôpital Montpensier fondé en 1686 par la \"Grande Demoiselle\".","architecture":"Sur une hauteur dominant le bourg une enceinte de trois tours entoure le donjon construit en plusieurs phases  du XIe au XIVe siècle, il est composé  d'une enceinte de plan triangulaire flanquée d'une tour à chaque angle au nord, une tour en fer à cheval  au sud-ouest,  un puissant donjon versailleux octogonal autrefois haut de  28 mètres, abaissé à 16 mètres en 1793 privé de son crénelage, et au sud-est une petite tour circulaire, le  corps de logis  devait diviser l'espace intérieur en deux cours,  seules sont conservés aujourd'hui une tour ronde au sud et une tour en forme de fer à cheval au nord. La tour octogonal édifiée vers 1360 avec ses murs polychromes composés de pierres jaunes de Couzon alternées avec des pierres blanches de Lucenay devait impressionner l'ennemi venant de l'est. Des campagnes de rénovation se firent dans les années 1900 afin d'arrêter sa perte.","habitants":"Sires de Villars  Famille de Bourbon\"","divers":"Vestiges de la forteresse \r\nFaçade de l'hopital Montpensier","gps":"","images":["../image/image_01/01_Trevoux_1.jpg","../image/image_01/01_Trevoux_2.jpg","../image/image_01/01_Trevoux_3.jpg","../image/image_01/01_Trevoux_4.jpg","../image/image_01/01_Trevoux_5.jpg","../image/image_01/01_Trevoux_6.jpg","../image/image_01/01_Trevoux_7.jpg"]},"Consult_chateau_formulaire7c3e":{"id":"Consult_chateau_formulaire7c3e","dept":"01","canton":"Thoissey","commune":"St-Didier-sur-Chalaronne","nom":"Vannans","type":"Château","periode":"XIX","histoire":"Saint-Didier sur Chalaronne;  en 538, le moine ermite Trivier cité le village sous le nom de Priscianum-Vicus se nom restera jusqu'au Xe siècle pour le transformer ensuite en Saint-Didier et dépendra de Cluny ou l'évêque de Vienne y fut assassiné. En 1736 le duc du Maine souverain des Dombes érige Saint-Didier en comté sous le nom de Saint-Didier de Valin.                                   Château Vannans ou Vannes château actuel date du XIXe siècle. IL fut la propriété de la famille de Souvigny avant d'être acheté au début du XXe siècle par la famille Billioud-Ramaud.                Dans la commune le château de Challes dont trois familles se succédèrent; les de Challes au Moyen-Age qui héritèrent des sires de Beaujeu, la famille de Rhodes  à la fin du XVIe siècle, puis à la baronne de Raousset que son neveu revendit à la famille Cavillon, remaniement en cours du château par Henri de Vallin.                             Dans la commune voisine Saint Didier de Formans le château de Bellevue situé entre Onjat et le haut Mizériat joui d'une belle vue sur le Beaujolais, le notaire de ThoisseyElie Giraud y ajouta une aile en 1880, puis  la famille Aynes origine de Suisse en Hérita. Aujourd'hui hôtel restaurent.","architecture":"Vannans; château en briques rouges et ardoises pour ses toitures, remarquables par ses tours d'angles rectangulaires, se présente en corps de logis rectangulaire à toits à quatre pans, flanqué  de deux tours en retraits, la partie centrale est délimitée par deux tourelles circulaires aux toits en poivrières.","habitants":"Famille de Souvigny\"","divers":"Château de Vannans","gps":"","images":["../image/image_01/01_Vannans_1.jpg"]},"Consult_chateau_formulaire7f4f":{"id":"Consult_chateau_formulaire7f4f","dept":"01","canton":"Villars-les-Dombes","commune":"St-Paul-de-Varax","nom":"Varax","type":"Château","periode":"XIV-XIX","histoire":"Varax: Portant le nom de la famille éteinte en 1457, puissantes de la région et qui joua un rôle important jusqu'au XVIe siècle.\r\n Le propriétaire à la révolution , le comte Jean-Claude Rivérieux qui fut exécuté le 5 janvier de la même année, ses biens confisqués mais le château ne subit pas de dommage majeur. Dans la commune maison forte de Verfey.","architecture":"L'ensemble se compose de cinq grosses tours reliées par des courtines et défendus par des fossés. Soubassement du XVe siècle, les douves ont disparues,  tour hexagonale prés de la porte maîtresse, tour carrée, vestige d'un donjon, pigeonnier.  Maison forte en briques a été démantelée par les troupes du maréchal Biron, reconstruit et remanié au XVIe siècle, élégant ensemble de remaniement moderne.","habitants":"Famille de Varax                    Famille de Rivérieux\"","divers":"Château de Varax.","gps":"","images":["../image/image_01/01_Varax_1.jpg","../image/image_01/01_Varax_2.jpg","../image/image_01/01_Varax_3.jpg","../image/image_01/01_Varax_4.jpg","../image/image_01/01_Varax_5.jpg","../image/image_01/01_Varax_6.jpg"]},"Consult_chateau_formulaire6393":{"id":"Consult_chateau_formulaire6393","dept":"01","canton":"Lhuis","commune":"Groslèe","nom":"Vareppe","type":"Maison forte","periode":"XV","histoire":"Groslée, depuis 1988 Jean Marc Lyandrat  a repris lexploitation familiale dans un lieu de toute beauté datant du XIII e siècle, tombé dans le giron familiale depuis 1830. Jean Marc Lyandrat a donc installé sa cave sur la commune voisine de Saint-Benoît.","architecture":"Au cur d'un charmant petit village du Bugey se trouve une ancienne demeure datant du XIIIe siècle. De plan rectangulaire à deux niveaux flanqué en façade de deux tours, une ronde et l'autre polygonale toits en poivrières.","habitants":"la famille Lyandrat \"","divers":"","gps":"","images":["../image/image_01/01_Vareppe_1.jpg","../image/image_01/01_Vareppe_2.jpg","../image/image_01/01_Vareppe_3.jpg"]},"Consult_chateau_formulaire4470":{"id":"Consult_chateau_formulaire4470","dept":"01","canton":"Poncin","commune":"St-Jean-le-Vieux","nom":"Varey","type":"Château","periode":"XIII","histoire":"Château  de Varey fut construit par Gueric de Coligny en 1050  et en 1240 le château passe aux comtes de Genève.\r\n Au pied de ses murailles c'est déroulé une violente et sanglante   bataille entre Dauphinois et Savoyards en 1325. La seigneurie était alors aux mains d'Hugues de Genève, seigneur d'Anthon dont le suzerain, Guigues VIII dauphin du viennois dont son héritier Humbert II racheta le château,  qu'il cédera au roi de France en 1349, puis cette seigneurie sera successivement inféodée aux familles de Chalant, de l'Aubespin et d'Ugnie,  puis assiégé par le maréchal de Biron  sans trop de dommage passa au rang de baronnie et passera à la famille de Beaurepaire.  En 1753 elle  est cédée à jean Dervieu seigneur de Villars.  \r\nLe château fut démoli sous le second empire et Barthélémy-Noé Darvieu fait appel à l'architecte lyonnais Claude-Louis Fléchet pour reconstruire le château. Puis passa par héritage aux Rohan-Chabot qui mirent à disposition le château au prisonniers de guerre à laquelle succède un orphelinat  et depuis 1967 abrite un centre de rééducation psychopédagogique.","architecture":"Grandiose construction  du XIIIe  comptait autrefois dans son enceinte cinq maisons fortes qui servaient de refuge aux petits seigneurs qui dépendait de la châtellenie. L'architecte Fléchet a conservé les éléments réutilisables de l'ancienne forteresse. L'édifice de plan octogonale, une tour carrée  sur sa façade ouest et une tour ronde  à son angle ouest façade flanquée de deux tours carrées, a conservé sa porte Calaise précédée par un pont-levis, les corps de logis fut relevés et à reprit ses mâchicoulis sur consoles formant chemin de ronde. Remanié au XIXe siècle.","habitants":"Famille de Coligny\"","divers":"Château de Varey.","gps":"","images":["../image/image_01/01_Varey_1.jpg","../image/image_01/01_Varey_2.jpg","../image/image_01/01_Varey_3.jpg"]},"Consult_chateau_formulairefef1-2":{"id":"Consult_chateau_formulairefef1-2","dept":"01","canton":"St-Trivier-sur-Moignans","commune":"Cessiens","nom":"Vataniens","type":"Château","periode":"XIX","histoire":"Vataniens: Le fief fut racheté par le duc de Savoie en 1492. Au XVe siècle construction de la maison forte, par Abel-Roger Belley de Tavernost,  passa au Josserand de Francheliens mentionné en 1620,  les seigneurs d'Amareins se nommèrent Andrevet, pendant la période de conflits entre la Savoie et la France les seigneurs de Montmerle et de Beauregard se disputèrent la seigneurie d'Amareins. \r\n Après Pierre et Guy de Burges et les Rosset les hommages de la seigneurie d'Ammareins furent rendus aux souverains des Dombes.  Au XVIIIe siècle Jacques Gayot restaure le domaine enceintes et tours. Les Bordeaux de Lurcy les derniers seigneurs jusqu'en 1796 date à laquelle le château passa aux mains des propriétaires actuels les de Varax.","architecture":"Bel ensemble de style renaissance, construit au XIXe siècle il se compose de trois tours rondes, flanqué d ng la ville et les remparts saccagés. Le 17 janvier Henri IV signe le traité de Lyon qui mirent fin à la guerre.","architecture":"De l'ancien donjon roman de la seigneurie des Thoire-Villars bâti sur la poype il ne restent que quelques pans de murailles et un fragment de tour édifiés en carrons Haut de 16 mètres  avec un diamètre de bases de 65 mètres de forme conique  repose sur une église.","habitants":"Humbert II\"","divers":"Vestiges du château de Villard les Dombes et manoir","gps":"","images":["../image/image_01/01_Villars_les_Dombes_1.jpg","../image/image_01/01_Villars_les_Dombes_2.jpg"]},"Consult_chateau_formulaire2156":{"id":"Consult_chateau_formulaire2156","dept":"01","canton":"St-Trivier-sur-Moignans","commune":"Villeneuve","nom":"Villon","type":"Château","periode":"XIV","histoire":"Villon: En 1291 Guy seigneur de Villon rend hommage à Humbert IV sire de Thoire-Villars, en 1490  Guillaume de Lyarens seigneur de Villon vassal du duc de Bourbon,  puis par alliance Villon passe à la famille de la Teyssonière, puis fut vendu à Jean de Godon chevalier président au parlement de la Dombes et seigneur de Gravains. En 1606 Villon est vendu à Louis Austrein, en 1622   Mathieu de Séve de Fléchéres le reçoit en héritage, les de Fléchères  dont descend la famille de Virieu actuellement propriétaire. \r\nEn 1703 la terre fut érigée en comté  comme château de Séve, Gabriel de Sève  testa en faveur des enfants de sa soeur nommés de Quinsonas. le fief fut érigé en comté en 1703.                        Dans la commune au XIVe siècle sont édifié le château fort de Gravens et de Moltadés et au XVe siècle Louis de Bourbon racheta Villeneuve  pour en faire un chef lieu de Châtellenie.","architecture":"Villon: Du XIVe siècle a des fins militaire. Seule la partie occidentale de la maison date de cette époque, corps de logis du XVIe siècle bâtie  autour d'une cour fermée par des courtines de 25 mètres de côté, faux mâchicoulis sur le chemin de ronde  avec châtelet d'entrée du XVIIe siècle.","habitants":"Seigneur de la Fléchère\"","divers":"Château de Villon.","gps":"","images":["../image/image_01/01_Villon_1.jpg","../image/image_01/01_Villon_2.jpg","../image/image_01/01_Villon_3.jpg","../image/image_01/01_Villon_4.jpg"]},"Consult_chateau_formulaire54c7":{"id":"Consult_chateau_formulaire54c7","dept":"01","canton":"Virieu-le-Grand","commune":"Virieu-le-Grand","nom":"Virieu_le_Grand","type":"Tour","periode":"XI","histoire":"Virieu le Grand; Château construit en 1077 par Aimée de Savoie, agrandit par Boniface archevêque de Conterbury en 1520, passa à Louis de Savoie et au marquis de Levis de Châteaumorand et à Honoré d'Urfé  seigneur de Virieu comte de Châteauneuf et marquis de Valmorey né à Marseille en 1567 a combattu au côté de Charles de Savoie duc de Nemours contre Henri IV de 1590 à 1596 suite à ces guerres se retira à Virieu pour écrire ses romans \"l'Astrée\" entre autres.","architecture":"Château bâti au XIe siècle sur le site d'un temple romain, après la famille d'Urfé resta à l'abandon sans entretien brûla en 1726, restant divisé par plusieurs propriétaires il fut jamais reconstruit, reste la porte de la maréchalerie, la base du donjon et des pans de murs. Aujourd'hui une association l'entretien. Dans la commune il y a la maison de Saint-Pierre ou tour de Prost du XIVe siècle  à laquelle fut adjoint un corps de logis aux XVIIe siècle et la maison du Callet  du XVIe siècle organisé autour d'une cour carrée et la maison de Ravel accolé à la tour de Croz.","habitants":"La famille d'Urfé\"","divers":"Vestiges de Virieu le Grand","gps":"","images":["../image/image_01/01_Virieu_le_Grand_1.jpg","../image/image_01/01_Virieu_le_Grand_2.jpg"]},"Consult_chateau_formulaire1fdc":{"id":"Consult_chateau_formulaire1fdc","dept":"01","canton":"Izernore","commune":"Nurieux-Volognat","nom":"Volognat","type":"Château","periode":"XIV","histoire":"Volognat; ce site était habité à l'époque celtique, la paroisse existait déjà au Moyen-Age est dépendait des seigneurs  de Coligny, puis passa aux Thoire, ces derniers donnèrent les terres  de Volagnat à la maison de Mornay qui les gardèrent jusqu'à la Révolution.        Le château restant dans la famille de Mornay passa aux de Chalant, aux Verjon, aux Myria pour être vendu en 1770 a Jean-Pierre-Emmanuel Laquette baron d'Heyriat qui le garda jusqu'à la Révolution.","architecture":"Le château  de Volognat fut fortement remanié au XIXe siècle a conservé des éléments de l'ancienne maison forte primitive du XIV façade sud renaissance, corps de logis rectangulaire flanquée d'une tour ronde.","habitants":"Famille de Mornay\"","divers":"Château de Volognat.","gps":"","images":["../image/image_01/01_Volognat_1.jpg","../image/image_01/01_Volognat_2.jpg","../image/image_01/01_Volognat_3.jpg","../image/image_01/01_Volognat_4.jpg","../image/image_01/01_Volognat_5.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','01 — Ain'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
