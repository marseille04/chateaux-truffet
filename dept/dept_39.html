nt dartistes et sont à lorigine de nombreuses fondations religieuses richement dotées. résidence principale des seigneurs et princes de la Maison de Chalon-Arlay.  Ce merveilleux château fut définitivement abandonné et vidé de son contenu entre 1780 et 1785. La Comtesse de Lauraguais héritière du château aurait utilisé les pierres du château de Nozeroy afin de privilégier son domaine d'Arlay. Pour échapper à l'impôt, elle le fait raser  au niveau du premier étage et permet aux habitants d'en utiliser les matériaux.  A la fin du XIXe siècle, le prince Pierre d'Alcantara-Charles-Marie d'Arenberg, alors propriétaire, fit dégager l'extérieur des ruines et aplanir le pourtour pour en faire une promenade publique.","architecture":"Nozeroy est fondée au XIIIe siècle,  situé en hauteur,  accueillit un château fort de Nozeroy aujourd'hui en ruines.  eut son heure de gloire au Moyen-Âge, durant 300 ans, sous la dynastie de la Maison de Chalon-Arlay, princes d'Orange. Elle contrôlait les routes d'accès vers la Suisse et l'exploitation du sel.  Ce château de magnifique structure, bâti en pierres de taille bien alignées et parfaitement jointes, était défendu par quatre tours très élevées comportant des escaliers à vis de cent marches. L'aile sud-est du château renfermait, au rez-de-chaussée, la salle qui mesurait près de 35 mètres de longueur sur 14 mètres de largeur.  L'incendie terrible du 15 juillet 1815 avait incité les habitants de Nozeroy à venir puiser les pierres pour permettre la reconstruction de leurs maisons.","habitants":"seigneur Jean Ier de Chalon\r\n        \"","divers":"Portes et vestiges de Nozeory","gps":"","images":["../../jctruffet.com/image/image_39/39_Nozeroy_1.jpg","../../jctruffet.com/image/image_39/39_Nozeroy_2.jpg","../../jctruffet.com/image/image_39/39_Nozeroy_3.jpg","../../jctruffet.com/image/image_39/39_Nozeroy_4.jpg"]},"Consult_chateau_formulaire1f19":{"id":"Consult_chateau_formulaire1f19","dept":"39","canton":"Arinthod","commune":"Vescles","nom":"Oliferne","type":"Vestiges","periode":"XIII","histoire":"OLIFERNE;  construit vers 1230 par Jean de Chalon.  Le territoire dOliferne appartenait  à  lorigine à labbaye de Saint-Claude. Etienne III de Bourgogne et Jean de Chalon lAntique, Jean de Chalon-Auxerre 1er , né du second mariage de Jean de Chalon lAntique avec Isabelle de Courtenay, eut ce domaine dans son lot et le transmis à Tristan, lun de ses fils  Jean , bâtard de Chalon, fils de Jean II de Chalon-Auxerre et dAlix de Chaléa, fut capitaine du château dOliferne de 1393 à 1400. Dès le XVe siècle, ce domaine fut acquis par les seigneurs dArinthod et resta annexé à cette baronnie jusquau moment de la Révolution. M. le marquis de lAubespin en possède encore le domaine utile.","architecture":"Le château d'Oliferne, construit  au XIIIe siècle, à 807 m. d'altitude, au sommet du pic d'Oliferne, constitue un belvédère incomparable. Il domine les vallées de la Bienne et de lAin mais aussi le Lyonnais, la Savoie, le Bugey, la Suisse, la Bresse, la Bourgogne.\r\n Les colonies romaines établirent ici une tour d'observation afin de contrôler la navigation sur la Bienne et l'Ain.   Malgré quil soit considéré comme imprenable, les troupes du Roi de France Henri IV envahirent la Franche-Comté en 1592  et détruisirent de nombreux châteaux dont celui d'Oliferne. Ce sont d'abord les vestiges du logis du château. L'emplacement du donjon se devine également. Un mur d'enceinte long de 300 mètres constitue un premier ouvrage de défense. Il marque sans doute les limites du village au pied du château.","habitants":"Jean de Chalon lAntique\r\n        \"","divers":"Vestiges d'Oliferne","gps":"","images":["../../jctruffet.com/image/image_39/39_Oliferne_1.jpg","../../jctruffet.com/image/image_39/39_Oliferne_2.jpg","../../jctruffet.com/image/image_39/39_Oliferne_3.jpg","../../jctruffet.com/image/image_39/39_Oliferne_4.jpg","../../jctruffet.com/image/image_39/39_Oliferne_5.jpg","../../jctruffet.com/image/image_39/39_Oliferne_6.jpg","../../jctruffet.com/image/image_39/39_Oliferne_7.jpg","../../jctruffet.com/image/image_39/39_Oliferne_8.jpg"]},"Consult_chateau_formulaire9988":{"id":"Consult_chateau_formulaire9988","dept":"39","canton":"Orgelet","commune":"Orgelet","nom":"Orgelet","type":"Vestiges","periode":"XIII","histoire":"ORGELET;  domaine des comtes de Chalon, vassaux des ducs de Bourgogne, Orgelet, est mentionné pour la première fois en 1227.  En 1267, à la mort de son père, Jean Ier de Chalon-Arlay récupère Le fils de Jean Ier ayant été tué en 1304 à la bataille de Mons-en-Pévèle, c'est son petit-fils, Jean II, qui lui succède en 1309. Celui-ci part prêter main forte en 1323 à Édouard, comte de Savoie, en guerre contre le dauphin du Viennois Guigues VIII.     Pris par l'ennemi à la bataille de Varey  en 1325, il demeure prisonnier jusqu'en 1329. En 1335, il conduit une rébellion des barons comtois contre le duc de Bourgogne Eudes IV, par alliance, le duché et le comté de Bourgogne sont réunis.  Orgelet est brûlé lors de cette guerre qui se termine en 1336 par la défaite de Jean II à la bataille de la Malecombe. En 1342, il crée à Orgelet un atelier monétaire où l'on frappa des pièces d'or et d'argent, ce qui lui vaut condamnation et excommunication par son parent l'archevêque de Besançon. En 1356, il est fait prisonnier à la bataille de Poitiers, en même temps que le roi de France Jean le Bon, il est, comme lui, détenu à Londres jusqu'en 1360. C'est au cadet des fils de Jean II, Tristan que revient la baronnie d'Orgelet.  En 1595 Henry IV entreprit une campagne contre la Comté, ses troupes, de passage à Orgelet, mutileront encore le château. Enfin, Louis XIV finit par conquérir la province en 1678, sonnant le glas de la forteresse et des remparts de  la ville.","architecture":"Du château d'Orgelet ne restent que quelques murs et un site magnifique. Mais il subsiste le sol d'une des salles du\r\nchâteau, qui a été remonté dans l'une des chapelles de l'église, sous la direction de l'archéologue Michel Brézillon. \r\nLe château comportait une grande tour carrée, une citerne d'eau, une basse cour et un jardin. Le tracé des murs du château évoluera très peux, contrairement  aux remparts de la ville qui se développeront jusqu'à comporter  plusieurs tours et portes. Située en terre d'Empire, l'édifice connut les vicissitudes des guerres contre les Français.\r\nLe sol est constitué de carreaux vernissés datés du XIIIe siècle ou apparaissent le duc de Bourgogne et le seigneur d'Orgelet chevauchant ensemble.","habitants":"Jean Ier de Chalon-Arlay \r\n        \"","divers":"Vestiges et mairie d'Orgelet","gps":"","images":["../../jctruffet.com/image/image_39/39_Orgelet_1.jpg","../../jctruffet.com/image/image_39/39_Orgelet_2.jpg","../../jctruffet.com/image/image_39/39_Orgelet_3.jpg","../../jctruffet.com/image/image_39/39_Orgelet_4.jpg"]},"Consult_chateau_formulaire5087-2":{"id":"Consult_chateau_formulaire5087-2","dept":"39","canton":"Conliège","commune":"Perrigny","nom":"Perrigny","type":"Château","periode":"XVI","histoire":"PERRIGNY;  cest encore au château de Perrigny que le connétable de Castille fixa son quartier général en 1595 lorsquil fit le siège de Lons le Saunier occupée alors par les troupes françaises. Henri IV avait également séjourné au château pour signer la capitulation de la ville.  Lannée la plus terrible pour Perrigny fut 1637 quand le village fut incendié par le duc de Longueville et ses habitants massacrés.","architecture":"Château du XVe siècle ou du XVIe siècle, remanié au début du XIXe siècle. L'édifice est composé d'un sous-sol, et de deux étages carrés, escalier dans-oeuvre, gros oeuvre en calcaire ; moellon et enduit, élévation à travées, surmontée de toit en pavillon ; toit à longs pans et croupe, recouverts de tuile plate, pavillons carrés en angles.","habitants":"Connétable de Castille\r\n        \"","divers":"Château de Perrigny","gps":"","images":["../../jctruffet.com/image/image_39/39_Perrigny_1.jpg"]},"Consult_chateau_formulairecc2d":{"id":"Consult_chateau_formulairecc2d","dept":"39","canton":"Lons-le-Saunier","commune":"L`Etoile","nom":"Persanges","type":"Château","periode":"XVIII","histoire":"PERSANGES;  le château na retrouvé son vignoble,  anéanti par le phylloxéra, quen 1983, transformée en une sorte de maison de vacances.  Depuis 1954, le Dr Delamarche à rénové au fur et à mesure toits, charpentes, murs et même le mobilier.                              Dans la commune le château de Montbourgeau,  cette propriété, qui est en fait une gentilhommière, sans doute une ferme transformée en pavillon de chasse au XVIIIe siècle. Aujourd'hui viticole par la famille Deriaux.","architecture":"le château de Persanges est isolé sur le versant des coteaux, accessible par une avenue latérale et un portail axial.  Le corps de logis est accompagné de deux ailes de communs en retour d'équerre. L'une forme une cour des communs,  l'autre est dédiée à la viticulture. Le corps de logis  conserve des décors intérieurs.   Le domaine de Persanges s'étend sur 6 ha, au coeur du vignoble jurassien, ce monument date du  XIXe siècle et fait partie des 3 constructions répertoriées de L'Étoile.","habitants":"Dr Delamarche\r\n        \"","divers":"Château de Persanges et de Montbourgeau","gps":"","images":["../../jctruffet.com/image/image_39/39_Persanges_1.jpg","../../jctruffet.com/image/image_39/39_Persanges_2.jpg"]},"Consult_chateau_formulaire5c63":{"id":"Consult_chateau_formulaire5c63","dept":"39","canton":"Poligny","commune":"Poligny","nom":"Poligny_Vaux","type":"Vestiges","periode":"XIV","histoire":"POLIGNY;  le site devait être occupé par la tribu des Séquanes avant la conquête romaine Poligny appartient aux règnes successifs de Charles V, des Comtes de Bourgogne, la maison d'Autriche, la maison d'Espagne, et le royaume de France, après de nombreuses et sanglantes guerres, avec le traité de Nimègue.       GRIMONT fut établi sur un ancien temple dédié à Apollon Gryneus qui se dressait sur un piton rocheux, viendrait de la contraction de Grynei Mons : le Mont de Gryneus. Ayant résolu de faire de la ville de Poligny la principale place forte et le centre de son administration sur le pays, Louis XI fait fortifier la ville et le château par de grands travaux en 1481. Elle fut chef-lieu du district de Poligny de 1790 à 1795 et de larrondissement de Poligny de 1800 à 1926.\r\n Château de Vaux sur Poligny  L'architecte bisontin Ducat fut chargé de la construction d'une demeure spacieuse sur les soubassements d'un  moulin, perpendiculairement à la vallée.  L'architecte paysagiste Brice Michel aménagea le parc, mettant en scène  le cours de la Glantine. Des communs et une ferme sont disposés le long de la route nationale depuis laquelle un portail  et une rue donnent accès à la propriété. Elle comporte aussi une chapelle funéraire sur le versant Sud. Le corps de logis conserve la distribution et les décors d'origine.","architecture":"Poligny;   remonte à lépoque romaine. En font foi deux superbes mosaïques dites \"les Chambrettes du roi\", trouvées en bordure de la nationale 5, tout près de la ville au XVIIIe siècle.            Grimont, aujourd'hui restent de ces fortifications quelques murs, la tour de la Sergenterie, le donjon Saint-Laurent et sa brique en forme de visage, et des meurtrières dans les murs des maisons de la grande rue, bien visible depuis les jardins de la rue de Longeville.         Vaux ; Ensemble complet bien conservé, ce château se distingue des demeures semblables de cette époque par l'aménagement exceptionnel d'un site de reculée caractéristique du Jura,  corps de logis rectangulaire à deux niveaux, donjon sur angle  et  fronton saillants.","habitants":"Comtes de Bourgogne\r\n        \"","divers":"Vestiges à Poligny du château Grimont, château de Vaux.","gps":"","images":["../../jctruffet.com/image/image_39/39_Poligny_Vaux_1.jpg","../../jctruffet.com/image/image_39/39_Poligny_Vaux_2.jpg","../../jctruffet.com/image/image_39/39_Poligny_Vaux_3.jpg","../../jctruffet.com/image/image_39/39_Poligny_Vaux_4.jpg"]},"Consult_chateau_formulaire2aca-2":{"id":"Consult_chateau_formulaire2aca-2","dept":"39","canton":"Orgelet","commune":"Présilly","nom":"Presilly","type":"Vestiges","periode":"XII","histoire":"PRESILLY,  cité au XIe siècle, les premiers seigneurs connu sont les  Fromont de Dramelay, édifiée en 1080 par les sires de Dramalay, dans cette seigneurie jusqu'en  1408  passe à un neveu Etienne de Salins et par alliance en 1423 de Guigone de Salins avec Nicolas Rolin seigneur d'Authume  grand chancelier des ducs de Bourgogne, qui y laisse de nombreuses traces de son pouvoir,  puis passe par alliance à Anne de Château-Vilain héritière de Louis Rolin  en 1508  avec Marc  de la Baume, comtes de Montrevel, plusieurs fois attaquée, la forteresse de Présilly résiste en 1637,  aux attaques  françaises avant d'être démantelée en 1673.   A la fin du XVIIe siècle abandonnée par ses propriétaires les Baume-Montrevel au comté  qui le céderont à la France,  par bonheur un prêtre amoureux du site tire le château de l'oubli en 1949 , consolidé une première fois dans les années 1960, il fut repris dans les années 1980, après la mort de l'abbé, par une association de bénévoles, \"Les Balladins du château\", actuels locataires de l'ensemble du site.","architecture":"Le château de Présilly est une forteresse du début du XIVe siècle. Il fut détruit et démantelé en 1673.  cette imposante forteresse conserve de superbes vestiges, ses restes sont impressionnants, avec notamment une imposante barbacane, et comprennent encore la porterie, le donjon, les fossés. Il a été sauvé de la disparition complète par un prêtre amoureux du site, et fut classé Monument historique en 1955. Il est actuellement propriété du Conseil Général du Jura.","habitants":"Sires de Dramalay\r\n        \"","divers":"Vestiges de Presilly.","gps":"","images":["../../jctruffet.com/image/image_39/39_Presilly_1.jpg","../../jctruffet.com/image/image_39/39_Presilly_2.jpg","../../jctruffet.com/image/image_39/39_Presilly_3.jpg","../../jctruffet.com/image/image_39/39_Presilly_4.jpg","../../jctruffet.com/image/image_39/39_Presilly_5.jpg","../../jctruffet.com/image/image_39/39_Presilly_6.jpg","../../jctruffet.com/image/image_39/39_Presilly_7.jpg"]},"Consult_chateau_formulaire5fc3":{"id":"Consult_chateau_formulaire5fc3","dept":"39","canton":"Lons-le-Saunier","commune":"Lons-le-Saunier","nom":"Pymont_Courlans","type":"Château","periode":"XII-XVIII","histoire":"PYMONT; fut gouverné par les Vienne jusqu'en 1369 où Marguerite de Vienne le cède à Hugues de Chalon. En 1295, les barons comtois se révoltent contre Philippe le Bel et se soumettent en 1301. En 1340, Philippe de Vienne est excommunié pour fausse monnaie. La peste noire touche le château de Pymont en 1349. Lors du passage des grandes compagnie en Franche-Comté, l'une d'elles prend le château en 1369 sous le commandement de Jacques Huet en attaquant la garnison par surprise; le château est repris peu de temps après. En 1400, il est vendu à Jacques de Vienne. Claude du Pin est seigneur de Pymont en 1464, c'est le dernier seigneur connu. Leur fils Philippe de Vienne se maria avec Agnès de Chalon, fille de Hugues et de de la comtesse palatine de Bourgogne (Alix), mais dut faire hommage de ses terres et de sa forteresse à Jean de Chalon-Arlay Ier . Il eut deux épouses et de nombreux enfants; il fut inhumé à Cîteaux.\r\nGuy de Vienne fut dépossédé de son château par Jean de Chalon-Arlay II. Dès lors le château et son fief ne cessèrent de changer de propriétaire. Ainsi en 1682 ils furent achetés par Emmanuel\r\nJacquemet, bourgeois de Lons, puis revinrent en 1831 à la famille Oudet.\r\nCOURLANS et Chavannes formaient une seigneurie particulière relevant du château de Montmorot. En 1372, Jean de la Tour était le seigneur de Courlans. Une rue porte encore son nom. Bâti au XVIIIe siècle est situé au fond d'une vallée et se trouve sur l'emplacement d'une ancienne tour dite de Chardenoy.","architecture":"Il ne reste plus rien du château de Pymont. Au sud du château se trouvait une enceinte grossièrement rectangulaire qui abritait la basse-cour où se trouvaient la garnison et la population qui se réfugiait dans le castel en cas d'attaque. Cette muraille est flanquée d'une tour circulaire et est protégé par un fossé sec, appelé \"fossé à dos-d'âne\". Au nord se trouvait le donjon, défendu par une seconde enceinte, la chemise qui ferme l'espace réservé au seigneur et à ses proches par un pont-levis. On pouvait accéder à la cour seigneuriale par une poterne à deux arbalètes. Une citerne située au pied du donjon permettait de régler les problèmes d'eau potable. Au nord et à l'est du donjon se trouvaient un verger et un jardin accolé au système fortifié. L'enceinte de la basse-cour épouse le premier escarpement rocheux. Le donjon est sur le point le plus élevé, il était construit sur le rocher pour en assurer la solidité.                                                                                        Le château de Courlans est situé au fond de la vallée sur la rive gauche de la Vallière. Il fut bâti au XVIIIe siècle sur l'emplacement d'une tour, dite de Culay. Il était entouré autrefois de plusieurs bâtiments, mais il ne reste aujourd'hui que le principal dont la forme est un parallélogramme rectangle flanqué de deux tours quadrangulaires.","habitants":"Famille de Vienne\r\n        \"","divers":"Motte féodal de Pymont, château de Courlans","gps":"","images":["../../jctruffet.com/image/image_39/39_Pymont_Courlans_1.jpg","../../jctruffet.com/image/image_39/39_Pymont_Courlans_2.jpg","../../jctruffet.com/image/image_39/39_Pymont_Courlans_3.jpg","../../jctruffet.com/image/image_39/39_Pymont_Courlans_4.jpg","../../jctruffet.com/image/image_39/39_Pymont_Courlans_5.jpg","../../jctruffet.com/image/image_39/39_Pymont_Courlans_6.jpg"]},"Consult_chateau_formulaire43a5":{"id":"Consult_chateau_formulaire43a5","dept":"39","canton":"Bletterans","commune":"Quintigny","nom":"Quintigny","type":"Château","periode":"XV","histoire":"QUINTIGNY;  l'un des premiers seigneurs connus de Quintigny est, en 1358, Jean de Jauche, dit de Bouton, seigneur de Saligny, époux  de Jeanne de Champagne. Au XVIe siècle, la Seigneurie de Quintigny  appartenait à la famille Desprels, de  Lons-le-Saunier, propriétaire aussi de Proby. Elle passa dans les années 1670 à Joachim de Beaurepaire. A la mort de Jacques de Beaurepaire  en 1776, elle fut achetée  par Michel Gabriel François Joseph Mailly, président à la cour des comptes de Dole, et son fils Antoine, marquis de Châteaurenaud, en hérita. Le château de Quintigny est situé à flanc de coteau, à l'extrémité Est  du village, niché au fond d'un vallon entouré des collines du val de Seille, c'est actuellement le domaine viticole Cartaux-Bougaud, viticulteurs de vins du Jura, et la maison Claude Jacquier.","architecture":"Le château de Quintigny est un monument dont les origines remontent au XIVe siècle, en grande partie du XVe siècle. Aménagement intérieur des appartements au XVIIIe siècle date  1739 sur trois plaques de cheminées, parties agricoles remaniées au XIXe siècle. Modifié jusqu'à la fin du XVIIIe siècle, son escalier hélicoïdal ainsi qu'une imposante cheminée sont classés aux monuments historiques. Anciennement ferme fortifiée, elle est aujourd'hui un lieu de dégustation et de vente de vins du Jura.","habitants":"Jean de Jauche\r\n        \"","divers":"Château de Quintigny","gps":"","images":["../../jctruffet.com/image/image_39/39_Quintigny_1.jpg","../../jctruffet.com/image/image_39/39_Quintigny_2.jpg"]},"Consult_chateau_formulaired9cb":{"id":"Consult_chateau_formulaired9cb","dept":"39","canton":"Dole","commune":"Rans","nom":"Rans","type":"Château","periode":"XIV","histoire":"RANS; Pierre de Bauffremont marquis de Scey et Charles de Franchet se partagèrent les ruines. Cest Gillette de Rans qui par son mariage avec Hugues de Salins apporta la seigneurie de Rans à cette famille au XIVe siècle. La baronnie de Salins comprenant Rans, Ranchot et Monteplain. Rans fut pillé et détruit en 1565 par les armées du duc dAlbe qui logèrent au domaine, en 1587 par les armées du duc de Guise, en 1595 par les armées dHenri IV et en 1636 une terrible épidémie de peste ravagea Rans. En 1698, De Franchet racheta la moitié de la seigneurie érigée en marquisat en 1745 en faveur de Charles de Franchet doyen du parlement de Besançon, il fut le dernier co-seigneur de Rans avec Pierre de Beauffremont qui émigra en 1791. En 1816, un incendie détruisit 30 maisons. En 1840, le château est reconstruit à lidentique sur ses ruines par Paul Renfert. Parallèlement à Fraisans la métallurgie se développa, cest le prince de Beauffremont qui fit construire une forge et un haut fourneau. Napoléon Ier a séjourné au château lors de son retour de la campagne dItalie.","architecture":"Château de Rans,   sur une terrasse rocheuse dominant le Doubs  différentes époques marquent l'histoire du lieu. Mentionné dès le XIIIe siècle, le château se compose actuellement d'un corps de logis et d'un donjon quadrangulaire. L'édifice peut-être rapproché d'une série de châteaux régionaux construits à la fin du XVe siècle et au XVIe siècle. Restauré au XIXe siècle dans un goût troubadour, l'édifice présente une série de décors néo-flamboyants. Il était composé de trois ailes entourant une cour fermée. entouré de larges fossés alimentés par les eaux du Doubs. Il fut en grande partie détruit en 1672 et reconstruit en 1840. Le donjon est une grande tour carrée de 16 m de côté et de 22 m de haut, couronnée de mâchicoulis et surmontée dune tourelle.","habitants":"Gillette de Rans\r\n        \"","divers":"Château de Rans","gps":"","images":["../../jctruffet.com/image/image_39/39_Rans_1.jpg","../../jctruffet.com/image/image_39/39_Rans_2.jpg","../../jctruffet.com/image/image_39/39_Rans_3.jpg"]},"Consult_chateau_formulaire0c46":{"id":"Consult_chateau_formulaire0c46","dept":"39","canton":"Rochefort-sur-Nenon","commune":"Rochefort-sur-Nenon","nom":"Rochefort_Nenon","type":"Vestiges","periode":"XIII","histoire":"ROCHEFORT sur Nenon, fief des Rochefort. Leurs ancêtres; Perrenat, Pierre et Henriot, au XIIIe siècle étaient tabellions de la famille de Chalon seigneurs de Rochefort. Cette famille n'a jamais été seigneur de ce lieu, même si Jacques, le père de Guy, y possédait quelques terres par héritage. L'anoblissement de la famille date de 1357 par Guiot de Rochefort, écuyer, Seigneur de Chateau-Rouillaud (25) fils de Henriot  qui négocia en 1357, avec les Anglais, la liberté de Jean de Chalon et du roi de France Jean II le Bon après la bataille de Poitiers. A son décès, tous les biens et titres de Guiot passent à son frère, Guiot dit Raiselin, seul héritier. Foucherans et Pluvault fiefs  de Guillaume de Rochefort. Il restera dans la famille passera ensuite aux Longeault. Labergement-lès-Auxonne, Guy de Rochefort en était seigneur en 1416. Son père, Jacques de Rochefort, en fit hommage au duc de Bourgogne, Philippe le Bon, le 17 septembre 1440.                                   \r\nBilley  près de Dole, acheté par Jacques en 1417, racheté par Guy en 1505, puis échangé au roi Henri III contre ce qu'il avait à Pluvault, par Joachim de Rochefort en 1583.  Trois générations plus tard Antoine, à sa mort en 1624, lègue ce lieu à sa nièce, elle est la fille de son frère Anne, Edmée-Françoise de Rochefort, qui porte cette terre à son époux Nicolas de Brichanteau marquis de Nangis (77).","architecture":"Rochefort-sur-Nenon a conservé des vestiges de l'ancien château du XIIIe siècle qui domine le village, offrant un superbe panorama puis cette porte fortifiée de plan rectangulaire datant du XIVe siècle. Haute tour d'enceinte, coiffée d'une toiture à quatre pans, son passage en plein cintre en direction du chemin de halage.","habitants":"Seigneurs de Rochefort\r\n        \"","divers":"Vestiges porte et tour de Rochefort","gps":"","images":["../../jctruffet.com/image/image_39/39_Rochefort_Nenon_1.jpg","../../jctruffet.com/image/image_39/39_Rochefort_Nenon_2.jpg","../../jctruffet.com/image/image_39/39_Rochefort_Nenon_3.jpg","../../jctruffet.com/image/image_39/39_Rochefort_Nenon_4.jpg"]},"Consult_chateau_formulaired8a5":{"id":"Consult_chateau_formulaired8a5","dept":"39","canton":"Lons-le-Saunier","commune":"Rosay","nom":"Rosay","type":"Forteresse","periode":"XIV","histoire":"ROSAY; ancien camp romain fortifié, appelé Rosellum, au XIIIe siècle, le château faisait partie de la seigneurie de Montaigu, forteresse puissante, imprenable, en dépit de tous les sièges des Français comme ceux de Louis XI, d'Henri IV ou de Louis XIII. Lacuzon y commanda la\r\nrésistance comtoise et en fit le refuge des populations d'alentour. En 1602 François de Chissey, seigneur de Rosay est assassiné par son voisin Clériadus de Cologny, seigneur de Cressia. En 1673 les troupes françaises échouèrent devant Rosay. A la Révolution, au printemps 1793, en pleine fureur montagnarde et crise de subsistances, la population de Rosay se porta en masse sur le château, le pilla, en fracassa les portes et fenêtres, en brisa les meubles et arracha les murs. Le comte de Romanet prit la fuite avant d'être mis en pièces par ses villageois ivres de colère. Le château jusqu'à l'immigration en 1793 n'a jamais était vendu, et par alliance cinq familles se sont succédés, les Rosay, les de Varax, les de Bernauld, les de Chissey et les Romanet.  En 1980, un ami des vieilles pierres Marcel Duthion racheta le site et la ruine du château de Rosay, il remit debout le donjon et son crénelage, le remania en maison forte. C'était compter sans Marcel Duthion, né en 1923, à Condal, en Saône-et-Loire, dans une famille de fermiers, il travailla très jeune à la restauration du château, il consacre tout son temps libre à créer et réaliser de ses mains des ouvrages de toute sorte.","architecture":"Rosay; situé à la frontière de la Bourgogne, le château de Rosay hébergeait autrefois les voyageurs. Il fut souvent assiégé, après avoir cédé aux XVe et XVIe siècle, il résista aux français en 1674 lors de la conquête de la Franche-Comté.\r\nMais à la Révolution, ce furent les habitants de Rosay eux-mêmes qui vinrent à bout de leur château. Ils furent en effet pris d'une folie destructrice et pillèrent le domaine.\r\nLongtemps resté en ruine, le château de Rosay fut racheté au XXe siècle. Le donjon, la maison forte, les remises, les écuries, les granges, les terrasses et les jardins furent entièrement reconstruits, plus qu'une restauration, c'est une reconstitution du château médiéval qui fut menée par le nouveau propriétaire.\r\nLe château de Rosay a aujourd'hui retrouvé sa fonction d'antan, puisqu'il est devenu un gîte qui héberge les randonneurs et vacanciers de passage.","habitants":"Seigneurie de Montaigu\r\n        \"","divers":"Forteresse de Rosay","gps":"","images":["../../jctruffet.com/image/image_39/39_Rosay_1.jpg","../../jctruffet.com/image/image_39/39_Rosay_2.jpg","../../jctruffet.com/image/image_39/39_Rosay_3.jpg","../../jctruffet.com/image/image_39/39_Rosay_4.jpg","../../jctruffet.com/image/image_39/39_Rosay_5.jpg","../../jctruffet.com/image/image_39/39_Rosay_6.jpg","../../jctruffet.com/image/image_39/39_Rosay_7.jpg","../../jctruffet.com/image/image_39/39_Rosay_8.jpg"]},"Consult_chateau_formulaire001e":{"id":"Consult_chateau_formulaire001e","dept":"39","canton":"Beaufort","commune":"Rotalier","nom":"Rotalier_Grea","type":"Château","periode":"XVII","histoire":"ROTALIER  fut édifié pour la famille des Petitjean issue d'un conseiller maître anobli par sa charge à la cour des comptes de Dole.  Les Petigean de Rotalier parachevèrent leur intégration à la  noblesse en servant dans les rangs de l'armée et de l'émigration.   Ancienne demeure des comtes de Rotalier. Claude de Montmorot, écuyer, seigneur de Pélagey et de Licona. Il est cité dans un échange fait avec Pierre Molpré, écuyer, en 1413 .  Mariage et succession, il épouse le 21 mars 1426 Françoise, fille d'Étienne de Seyturier seigneur de Cornod,  le dernier des Montmorot  Philibert de Montmorot, écuyer, seigneur de Pélagey, il épouse Louise d'Arestel, dame de la Bévière, de qui il a Jeanne, dame de Pélagey, mariée à Jean-François de Dorsans, écuyer.  Pierre Alexis, comte de Rotalier. Maréchal de Camp, et commandant en chef de l'artillerie de l'armée du prince de Condé, débarque à Quiberon en 1795 et combat les troupes révolutionnaires du général Hoche.\r\n Charles-Félix, comte de Rotalier, mort en 1854, maréchal de camp et inspecteur général d'infanterie.                                               GREA-ROTALIER;  le château de Gréa  appartient au lignage d'une grande figure du libéralisme comtois au XIXe siècle. Désiré Adrien Gréa, avocat, s'allia par son mariage avec  Claude-Lucie Monnier   à la célèbre dynastie jurassienne des maître de forges Monnier Jobez, conseiller général du canton de Beaufort 1831 à 1848,  élu député du Jura à l'Assemblée. Désiré-Adrien Gréa  en fit un beau domaine viticole planté dans les collines du vignoble du Revermont.   viticole, puis  transformé en hôtel.","architecture":"Rotalier a connu deux châteaux : le château de Rotalier et le château Gréa. Le château Gréa ancienne demeure d'architecture civile de la fin du XVIIe siècle. Le plan masse du logis principal, construit entre cour et parc, révèle par son caractère composite  les étapes de sa construction, du XVIIIe au XIXe siècle. Caves, cuveries, et granges, ordonnées entre bâtisse et portail, confèrent à l'ensemble un air de bastide.                                                    Rotalier, à l'entrée du village, le château bâti entre 1694 et 1703, reconstruit en 1776, est le type même du manoir de plaisance du XVIIIe siècle. Tandis que la façade ouest du logis principal donne sur un grand parc planté de cèdres du Liban, la façade Est et ses 2 ailes en retour d'équerre s'élèvent  sur deux niveaux à l'arrière d'une cour fermée par  un édifice rectangulaire percé d'arcades. Une série de baies et de fenêtres rectangulaires ouvre les étages en  donnant l'impression  d'une symétrie rigoureuse, et de beaux toits à croupe et à petites tuiles coiffent l'ensemble, hérissés de cheminées.","habitants":"Monsieur Désiré Adrien  Gréa\r\n        \"","divers":"Château de Rotalier et de Gréa","gps":"","images":["../../jctruffet.com/image/image_39/39_Rotalier_Grea_1.jpg","../../jctruffet.com/image/image_39/39_Rotalier_Grea_2.jpg","../../jctruffet.com/image/image_39/39_Rotalier_Grea_3.jpg","../../jctruffet.com/image/image_39/39_Rotalier_Grea_4.jpg"]},"Consult_chateau_formulaire7066":{"id":"Consult_chateau_formulaire7066","dept":"39","canton":"Bletterans","commune":"Ruffey-sur-Seille","nom":"Ruffey_sur_Seille","type":"Château","periode":"XIX","histoire":"RUFFEY, le château dit Lecourbe fut construit en 1810 pour le général Claude Joseph Lecourbe sur l'emplacement de l'ancien château fort, détruit  en 1637 par les Français. Les Damas n'entreprirent pas de le restaurer et à la Révolution il ne restait que quelques pans de mur. Les propriétés immobilières du prieuré  vaste étendue et les revenus forts importants. Le prieur est reçu régulièrement à Cluny et reçoit également l'abbé à Ruffey. Au XIVe siècle  le prieuré est détruit, et reconstruit  en 1534 par le prieur Estienne Vaulchier est tenu de donner et administrer la vie et la maison à un religieux de l'ordre de Cluny. En 1582, le prieuré est sans signe de conventualité. Il est dit \"rural de l'ordre de Cluny\".\r\nEn 1753 et 1754 inventaire des titres et biens du prieuré, et en 1791  confiscation  des biens , le prieuré est vendu à Jean-Baptiste L'Homme, notaire à Ruffey et beau-frère du Général Lecourbe. Le prieuré est alors transformé en exploitation agricole et subit d'importants dommages. En 1970, Achat par le propriétaire actuel.","architecture":"Ruffey;  dans une belle et grande cour d'honneur, l'édifice élève sur trois niveaux un corps de logis flanqué de deux retours d'angle. La façade présente un avant corps légèrement saillant et orné d'un péristyle a colonnes doriques surmontés d'un balcon.  Un bandeau de pierre en rythme  l'horizontalité et sépare le deuxième niveau d'un étage attique. L'ordonnance en est élégante et équilibrée,  refends de l'avant-corps de la façade et  chaînages d'angle. Château néo-classique, dans le goût de l'Empire, comme faire-valoir d'une carrière militaire qu'il couronnait. Ce château Lecourbe  qui est aujourd'hui le siège de  la mairie et de l'école de Ruffey sur Seille.","habitants":"Général Claude Joseph Lecourbe\r\n        \"","divers":"Château de Lecourbe","gps":"","images":["../../jctruffet.com/image/image_39/39_Ruffey_sur_Seille_1.jpg","../../jctruffet.com/image/image_39/39_Ruffey_sur_Seille_2.jpg"]},"Consult_chateau_formulaire7778-2":{"id":"Consult_chateau_formulaire7778-2","dept":"39","canton":"Dampierre","commune":"Salans","nom":"Salans","type":"Château","periode":"XVII","histoire":"SALANS; le château fut édifié par la famille Laborey de Salans au XVIIe siècle. Léonel Laborey de Salans fut un actif défenseur de la Franche-Comté  et plus précisément de la ville de dole, contre la France. Nommé lieutenant de la place forte de Salins en 1667, il en négocia la reddition avec les français en 1668. Le dernier représentant de la branche fut exécuté à la Révolution.  Charles Desbiez, baron de Saint-Juan, acheta le château au début du XIXe siècle. Le baron de Saint-Juan, érudit, amateur de poésie et de littérature, animait dans son hôtel particulier bisontin un salon littéraire fréquenté par tous les amateurs de belles lettres, et entretenait une correspondance avec Charles Nodier. Il fut élu à l'Académie de Besançon en 1827. Orléaniste, il contribua à la création du journal Le Franc-Comtois et collabora avec son fils à la revue de la Franche Comté. Sa soeur, Marie de Saint-Juan, correspondait régulièrement avec Montalembert et de Madame de Sévigné, lieu de rencontre de poètes et d'écrivains tels que Charles Nodier ou Montalembert, Le baron de Saint-Juan embellit son château de Salans dans le goût néoclassique et y créa un parc à l'anglaise de trois hectares. Il en vanta les charmes dans de nombreux poèmes.   Les propriétaires actuels l'ont rénové en chambre d'hôtes.","architecture":"Salans, château néoclassique et parc de  trois hectares.  le château renoue avec sa tradition d'accueil après sept ans de rénovation. Ses chambres spacieuses qui donnent sur le parc sont de style Louis XVI et Directoire. Le château est de style néoclassique. Un corps de logis principal accosté de deux pavillons à toiture plate s'élève sur trois niveaux coiffés d'un toit à croupe. Un avant-corps central couronné d'un fronton triangulaire décoré d'une superbe cartouche sculpté de deux lions ailés et affrontés s'ouvre au rez-de-chaussée par trois portes cintrées rythmées par d'élégants pilastres.","habitants":"Famille Laborey de Salans\r\n        \"","divers":"Château de Salans","gps":"","images":["../../jctruffet.com/image/image_39/39_Salans_1.jpg","../../jctruffet.com/image/image_39/39_Salans_2.jpg","../../jctruffet.com/image/image_39/39_Salans_3.jpg","../../jctruffet.com/image/image_39/39_Salans_4.jpg"]},"Consult_chateau_formulaire327f":{"id":"Consult_chateau_formulaire327f","dept":"39","canton":"Salins-les-Bains","commune":"Salins-les-Bains","nom":"Salins_Bains","type":"Fort","periode":"XVII","histoire":"SALINS les Bains, au Moyen-Âge, le sel contribue à faire de la ville la deuxième cité de Franche-Comté avec plus de 8 000 habitants. Elle comprend alors 17 chapitres religieux, plus de 25 tours d'enceinte et fait figure de grand centre culturel, notamment du livre. Deux salines existent en 1115, la petite saline, avec le  puits à Muire, et la grande saline, dite grande saunerie, avec le  puits d'Amont.  En 1825, un terrible incendie frappe la ville. Le bilan est catastrophique, la ville est quasiment détruite. Salins ne sera plus la même, une partie de la grande saline est en effet détruite. Sous le Second Empire, Salins connaît un certain renouveau. On cherche à faire d'elle une élégante station thermale sous limpulsion de Grimaldi, un homme daffaires, qui a racheté la concession royale dexploitation des salines en 1843. Les premiers thermes sont construits en 1854 sur l'emplacement de la petite saline  puis à Muire.","architecture":"Salins les Bains;  La première enceinte de la ville est construite au XIIIe siècle et complétée au XVe siècle. Il en reste aujourd'hui quelques vestiges. La porte Oudin, au sud, répondant à l'ancienne porte de Malpertuis au nord, est en partie conservée. À partir de cette porte, le rempart est encore visible sur environ 200 mètres avec les bases des tours. Quelques tours sont d'ailleurs conservées : la tour dorée et la tour de Chambenoz à l'ouest, et la tour d'Andelot au nord. Sur la partie commune avec les remparts de la Grande saline, il reste la tour de Flore et la tour de Reculoz. Par ailleurs, des fouilles préventives réalisées en 2011 sur la place de la Barbarine ont mis à jour une partie de l'ancien fossé sur une largeur de 6 mètres.  fermeture  des salines  en 1962 , la station thermal et le fort militaire Saint-André et le fort Belin   est rebâti au XIXe siècle à la place d'un ancien château avec une structure en casemate.   A l'est, le fort Saint-André est reconstruit par Vauban entre 1674 et 1677 sur les bases d'un fort plus ancien,  de l'ensemble des forteresses construites dans ce but, seuls deux forts subsistent aujourd'hui, encadrant la vallée Il se caractérise par la façade de sa chapelle d'influence baroque.","habitants":"Seigneurs de Salins\r\n        \"","divers":"Tour  de Flore  de Salins, fort St-André et fort de Belin","gps":"","images":["../../jctruffet.com/image/image_39/39_Salins_Bains_1.jpg","../../jctruffet.com/image/image_39/39_Salins_Bains_2.jpg","../../jctruffet.com/image/image_39/39_Salins_Bains_3.jpg","../../jctruffet.com/image/image_39/39_Salins_Bains_4.jpg","../../jctruffet.com/image/image_39/39_Salins_Bains_5.jpg","../../jctruffet.com/image/image_39/39_Salins_Bains_6.jpg","../../jctruffet.com/image/image_39/39_Salins_Bains_7.jpg"]},"Consult_chateau_formulaire0276":{"id":"Consult_chateau_formulaire0276","dept":"39","canton":"Seillières","commune":"St-Lamain","nom":"Sauge","type":"Château","periode":"XVI","histoire":"SAUGE; le château édifié en 1530 pour Blaise de Visemal fut transmis à François de Visemal, seigneur de Frontenay et de la Sauge. Partageant le destin des seigneurs de Frontenay, il devint au XVIIIe siècle  propriété des Montrichard par le mariage de Suzanne Visemal avec Jean Baptiste de Montrichard, seigneur de Saint Martin de Voiteur, quelques  années avant la Révolution de 1789, il passa à Rémy Hippolyte Bidault de Poligny, lieutenant  au bailliage de Poligny, élu en 1789 député du tiers état aux états généraux pour ce même bailliage d'Aval.","architecture":"Sellières, dans la petite cité comtoise de caractère de Sellières, les ruines du château et des remparts datent du Xe siècle. Les remparts, composés de 11 tours, défendaient un donjon. Lensemble fut détruit sous le règne de Louis XIV. Aujourdhui, trois tours subsistent ;  quelques traces de lenceinte sont encore visibles. Château de Sauge édifié en 1530 , remanié au  XIXe siècle, l'ordonnance initiale a été conservée et les bâtiments se répartissent autour d'une cour intérieure entourée de murs. On y pénètre par  le portail d'une tour carrée coiffée en pavillon. Le corps de logis comprend une maison à deux étages flanquée d'une tour polygonale.                                                                               lhôtel Doroz édifié au XVIe siècle ou lhôtel Crécy.","habitants":"François de Visemal\r\n        \"","divers":"Château de Sauge à Sellières et le manoir de Doroz","gps":"","images":["../../jctruffet.com/image/image_39/39_Sauge_1.jpg","../../jctruffet.com/image/image_39/39_Sauge_2.jpg","../../jctruffet.com/image/image_39/39_Sauge_3.jpg","../../jctruffet.com/image/image_39/39_Sauge_4.jpg","../../jctruffet.com/image/image_39/39_Sauge_5.jpg","../../jctruffet.com/image/image_39/39_Sauge_6.jpg","../../jctruffet.com/image/image_39/39_Sauge_7.jpg"]},"Consult_chateau_formulaire2a44":{"id":"Consult_chateau_formulaire2a44","dept":"39","canton":"Gendrey","commune":"Sermange","nom":"Sermange","type":"Château","periode":"XVIII","histoire":"SERMANGE; construction de l'édifice de 1717 à 1727 pour les Bouhelier d'Offlanges. En 1762, modernisation du château. A la fin du XVIIIe siècle le château fut acheté par le baron Jean-Baptiste Adrien de Tricornot, lieutenant colonel de dragons. Après la Révolution il vécut à Sermange et se consacra à l'agronomie. Sa fille apporta le château à la famille de Fontenelle par alliance avec Louis Pernot de Fontenelle, écuyer. Il fut acheté au début du siècle par une descendante de La Fayette, de la maison de Chavaniac. Depuis 1902 propriété des comtes Fresson.","architecture":"Château de Sermange du XVIIIe siècle, deux ailes du corps de logis construit au XXe siècle. Un portail monumental  donne accès à la cour d'honneur  que deux bâtiments de communs encadrent. La partie centrale du logis correspond à un type régional  de petit château Louis XIV à trois  niveaux,  toit  à croupes à forte pente, mur de refend longitudinal. Décor intérieur avec plafonds à la française, cheminées en pierres marbrières  grises à décor de stucs.","habitants":"Bouhelier d'Offlanges\r\n        \"","divers":"Château de Sermange","gps":"","images":["../../jctruffet.com/image/image_39/39_Sermange_1.jpg","../../jctruffet.com/image/image_39/39_Sermange_2.jpg"]},"Consult_chateau_formulaire485f-2":{"id":"Consult_chateau_formulaire485f-2","dept":"39","canton":"Lons-le-Saunier","commune":"Sirod","nom":"Sirod","type":"Château","periode":"XV","histoire":"SIROD, Le fief de Sirod passe au XVe siècle à la famille de Montrichard, à qui on attribue la construction du château dans la deuxième moitié du XVIe siècle.\r\n Depuis les Montrichard qui le cédèrent au XVIIIe siècle aux Watteville, beaucoup de propriétaires se sont succéder il fut même transformé en colonie de vacances après la seconde guerre mondiale et jusqu'en 1968. Racheté alors,  il fut réaménagé et habité. Propriétaires successifs: familles de Sirod, de Montrichard, de Watteville, Monnier, Parnet, Gaiffe Jacques et Florentin actuels propriétaire.","architecture":"Château de Sirod, dit aussi de Montrichard, c'est un édifice de plan quadrangulaire cantonné de tours. L'intérieur conserve des plafonds à la française et une pièce décorée à la fin du XVIIIe siècle, du XIVe siècle, rénové au XVI° en style renaissance. La toiture restaurée brille sous le soleil d'une belle polychromie, le rouge des tuiles du toit à croupe du corps de logis répondant alors au gris argenté ou bleuté du zinc posé en poivrière sur les tours.        Vestiges du château Villain qui surplombe le village.","habitants":"Famille de Montrichard\r\n        \"","divers":"Château de Sirod et de Villain","gps":"","images":["../../jctruffet.com/image/image_39/39_Sirod_1.jpg","../../jctruffet.com/image/image_39/39_Sirod_2.jpg","../../jctruffet.com/image/image_39/39_Sirod_3.jpg","../../jctruffet.com/image/image_39/39_Sirod_4.jpg","../../jctruffet.com/image/image_39/39_Sirod_5.jpg","../../jctruffet.com/image/image_39/39_Sirod_6.jpg"]},"Consult_chateau_formulaire4e9e":{"id":"Consult_chateau_formulaire4e9e","dept":"39","canton":"St-Amour","commune":"St-Amour","nom":"St_Amour_Aubepin","type":"Vestiges","periode":"XIII","histoire":"ST-AMOUR; au Moyen-Âge sont édifiés une forteresse et des remparts pour conforter la position stratégique de la bourgade, située entre le massif jurassien et la plaine Bressane sur la route de Lyon à Strasbourg. Saint-Amour a subi trois sièges et cinq invasions liées à la conquête française. En 1477 Elle résiste aux assauts des troupes de Louis XI, et en 1595 celles d'Henri IV  mais en 1637 celles du duc de Longueville  et en 1673-74 de Louis XIV qui le dévastèrent. Démantelé puis rattaché à la France, avec la Franche-Comté en 1678 par le traité de Nimègue.\r\nDe 1262 à 1789, Saint Amour dépend du bailliage royal d'Orgelet. Six maisons y règnent successivement dont les sires de l'Aubépin du XIIe-XVe siècle, ceux de la Baume du 1548 au 1770 puis de Choiseul la Baume du 1770 au 1789. Entre 1790 et 1794, Saint-Amour absorbe la commune voisine d'Allomat. La commune change de nom pour Franc-Amour.","architecture":"St-Amour, ancien château-fort des seigneurs . Le château fut détruit en 1674. Reste la prison Royale. Placée au centre du village la Tour Guillaume trône de ses 20 mètres était autrefois incluse dans les fortifications de la ville.  Elle porte le nom de l'illustre théologien, Guillaume de Saint-Amour  1200-1272, enfant du pays, qui légua sa fortune aux pauvres de la ville et fut l'un des fondateurs de l'Hôtel-Dieu. Placé au centre du village.\r\nL'escalier central dessert quelques pièces d'habitation, cuisines, chambres, à des niveaux différents pour finir dans un magnifique grenier dont la toiture fut rénovée comme à l'origine.                         Dans le canton le vieux château  de Montagna le Reconduit.","habitants":"Guillaume de St-Amour \r\n        \"","divers":"Palais de la visitandine, les vestiges de L'Aubepin et son nouveau château, la tour Guillaume, et le manoir de Montagna le Reconduit.","gps":"","images":["../../jctruffet.com/image/image_39/39_St_Amour_Aubepin_1.jpg","../../jctruffet.com/image/image_39/39_St_Amour_Aubepin_2.jpg","../../jctruffet.com/image/image_39/39_St_Amour_Aubepin_3.jpg","../../jctruffet.com/image/image_39/39_St_Amour_Aubepin_4.jpg","../../jctruffet.com/image/image_39/39_St_Amour_Aubepin_5.jpg","../../jctruffet.com/image/image_39/39_St_Amour_Aubepin_6.jpg","../../jctruffet.com/image/image_39/39_St_Amour_Aubepin_7.jpg","../../jctruffet.com/image/image_39/39_St_Amour_Aubepin_8.jpg"]},"Consult_chateau_formulairec9d6":{"id":"Consult_chateau_formulairec9d6","dept":"39","canton":"Dole","commune":"St-Ylie","nom":"St_Ylie","type":"Château","periode":"XVI","histoire":"ST-YLIE; le château actuel a été bâti sur les ruines de la maison forte brûlée une première fois en 1477 par les troupes de Louis XI, une deuxième fois en 1636 quand le prince de Condé, venu mettre le siège devant Dole, y installa son quartier général. Le Comte de Tinseau y aménagea un très beau parc et y constitua une bibliothèque composée de plus de dix mille volumes provenant en partie  de Jean-Antoine de Tinseau, évêque de Nevers au XVIIIe siècle. Il y vécut jusqu'en 1857, date de sa mort.","architecture":"Le château de Saint-Ylie s'ouvre sur la route par une entrée en demi lune où alternent grilles et piliers dont ceux du portail sont surmontés de lanternes. Deux ailes en équerre, cantonnées  de grosses tours rondes coiffées de larges  toits de tuiles coniques, flanquent le corps de logis principal couvert d'un toit en croupe percé d'élégantes lucarnes.","habitants":"Jean-Antoine de Tinseau\r\n        \"","divers":"Château de St-Ylie","gps":"","images":["../../jctruffet.com/image/image_39/39_St_Ylie_1.jpg"]},"Consult_chateau_formulaireda0a":{"id":"Consult_chateau_formulaireda0a","dept":"39","canton":"Champagnole","commune":"Syam","nom":"Syam","type":"Manoir","periode":"XVI","histoire":"SYAM, inspiré de la villa Rotonda  édifiée en 1568-1571 par Andréa Palladio.  Le maître des forges de Syam, Emmanuel Jobez, homme d'affaires avisé dont le goût artistique était très inspiré par l'Italie.\r\nAu lieu du premier château construit près de la forge primitive, le Martinet, Étienne Jobez voulut éloigner sa nouvelle demeure des ateliers et construire la villa au milieu d'un parc, ainsi que les écuries inspirées des conceptions de Claude-Nicolas Ledoux.\r\nEmmanuel Jobez mourut en 1828, avant l'achèvement de la villa, mais ses descendants y vécurent jusqu'au début du XXe siècle. La villa, par mariage, passa à la famille du président Sadi-Carnot. Elle fut à partir de ce moment peu occupée. aujourd'hui propriété de la famille Fernique.","architecture":"Syam;  construite de 1826 à 1828 de forme carrée s'ouvrent au sud sur un portique de trois travées. Les façades symétriques à trois étages, les angles en pilastres de pierre blanche, tranche sur l'enduit orangé des façades. Toiture en zinc à quatre pans bordée par une corniche à modillons, surmontée d'une petite construction carrée percée de trois fenêtres circulaires  sur chacune de ses faces. Les pièces sont distribuées en plan carré autour d'un puits de lumière central, une rotonde.","habitants":"Mr Andréa Palladio                                                              président Sadi-Carnot\r\n        \"","divers":"Le manoir de Syam","gps":"","images":["../../jctruffet.com/image/image_39/39_Syam_1.jpg","../../jctruffet.com/image/image_39/39_Syam_2.jpg","../../jctruffet.com/image/image_39/39_Syam_3.jpg","../../jctruffet.com/image/image_39/39_Syam_4.jpg","../../jctruffet.com/image/image_39/39_Syam_5.jpg","../../jctruffet.com/image/image_39/39_Syam_6.jpg","../../jctruffet.com/image/image_39/39_Syam_7.jpg"]},"Consult_chateau_formulaire751f":{"id":"Consult_chateau_formulaire751f","dept":"39","canton":"Gendrey","commune":"Taxenne","nom":"Taxenne","type":"Château","periode":"XII","histoire":"TAXENNE; seigneurie datant de la fin du XVIIe siècle. Taxenne dépendait en toute justice de la prévôté de Gendrey, sauf un domaine appartenant à l'abbaye d'Acey. Barthélémy Raclet, François Tricalet, bachelier en Droit et intendant des affaires du Comte de Poitiers, Jean-François et Ferdinand Tricalet, ses neveux, achetèrent au Roi Louis XIV le 21 août 1698 à titre d'engagement la seigneurie de Taxenne.\r\nJean-François Catherin Tricalet, écuyer, devint seigneur incommutable de ce village par un échange qu'il fit avec le Roi le 12 juillet 1763 contre une redevance dans les salines de Salins. Le four banal appartenait en 1789 à M.Pautenet, Seigneur de Verreux. Victor Catherin Tricalet de Taxenne, mort le 21 novembre 1818, Claude François Catherin Tricalet de Taxenne, mort le 6 mars 1826, Catherin Tricalet de Taxenne, dernier seigneur de ce lieu, mort le 2 avril 1834 et Denise Catherine de Mayrot son épouse. Le Château de Taxenne est la propriété de la famille Longin  depuis le début du XXe siècle. Grâce notamment au label de la Fondation du Patrimoine qui lui a été accordé en 2003, il est  restauré.\r\nDans la commune le château de Pagney et à deux kilomètres, une tour, les restes du château d'Ougney.","architecture":"Taxenne;  deux châteaux;  pavillon de vendanges agrandit au XIXe siècle en résidences  secondaires pour et par des membres du parlement  de Besançon, ce château possède des tours plus anciennes le château près de l'église  avec deux tours une  rondes et une carrée.  Ancienne exploitation viticole, le château a était progressivement rénové depuis 2001 grâce au soutien de la Fondation du Patrimoine dispose d'un parc boisé de sept hectares et comporte un colombier et un four banal.","habitants":"Jean-François Catherin Tricalet de Taxenne\r\n        \"","divers":"Le château de Taxenne, de Pagney et la tour d'Ougney","gps":"","images":["../../jctruffet.com/image/image_39/39_Taxenne_1.jpg","../../jctruffet.com/image/image_39/39_Taxenne_2.jpg","../../jctruffet.com/image/image_39/39_Taxenne_3.jpg","../../jctruffet.com/image/image_39/39_Taxenne_4.jpg","../../jctruffet.com/image/image_39/39_Taxenne_5.jpg"]},"Consult_chateau_formulaire7507":{"id":"Consult_chateau_formulaire7507","dept":"39","canton":"Sellières","commune":"Toulouse-le-Château","nom":"Toulouse_le_Chateau","type":"Vestiges","periode":"XIII","histoire":"TOULOUSE le Château; Jacques de Marnix de Toulouse, seigneur, entre au service de la gouvernante des Pays-Bas Marie de Hongrie, épouse en 1535 Marie de Hamérirourt, dame de Mont-Sainte-Aldegonde. Leur fils cadet Philippe de Marnix de Sainte-Aldegonde étudie aux universités de Louvain, de Dole, et de Padoue, puis à l'Académie de Genève, que vient de fonder Jean Calvin. Intellectuel polyglotte, idéologue de la révolte des Pays-Bas contre l'Inquisition, Philippe de Marnix fut notamment le rédacteur de la Pacification de Gand, premier document officiel consacrant la liberté religieuse, l'auteur présumé de l'actuel hymne national des Pays-Bas et le principal conseiller de Guillaume d'Orange, qui le chargea de la défense d'Anvers peu avant son assassinat.\r\nLa famille Marnix possédait, à proximité immédiate du palais impérial de Bruxelles et du palais des Princes d'Orange, une demeure dans laquelle Philippe de Marnix est né. Elle en acquit une autre, appelée  La Fosse  à l'extérieur des remparts, en un lieu situé au cur de ce qui est aujourd'hui devenu le quartier européen de Bruxelles. Confisquée par les Espagnols sur ordre du duc d'Albe, cette propriété resta connue sous le nom de Hof van Tholouse ou hôtel de Toulouse et ne disparut qu'au XIXe siècle. Elle donna son nom à la rue qui en longe encore le site, reliant les sièges du parlement européen et du conseil européen, la rue de Toulouse ne doit donc pas son nom à la ville méridionale de Toulouse mais bien à la localité jurassienne de Toulouse-le-Château.","architecture":"Toulouse le château Le pan d'une tour du château dite Tour de Marnix est encore visible sur la colline qui domine le village. Le château a été détruit par les troupes de Louis XI. En 1938, la commune prend le nom de Toulouse le Château.","habitants":"Jacques de Marnix de Toulouse\r\n        \"","divers":"Vestiges de Toulouse le Château","gps":"","images":["../../jctruffet.com/image/image_39/39_Toulouse_le_Chateau_1.jpg","../../jctruffet.com/image/image_39/39_Toulouse_le_Chateau_2.jpg","../../jctruffet.com/image/image_39/39_Toulouse_le_Chateau_3.jpg","../../jctruffet.com/image/image_39/39_Toulouse_le_Chateau_4.jpg"]},"Consult_chateau_formulaire09e7":{"id":"Consult_chateau_formulaire09e7","dept":"39","canton":"Lons-le-Saunier","commune":"Tour-du-Meix","nom":"Tour_Meix","type":"Vestiges","periode":"XII","histoire":"TOUR de MEIX;  en 1166, Adon inféoda à Aymon II de Révigny le prieuré de Saint-Christophe avec toutes ses dépendances, à\r\ncondition qu'il préte hommage à l'abbé de St Claude. Aylon de Revigny fit alors bâtir son château à La Tour du Meix. Son fils Aymon III décida de s'affranchir de toute dépendance et  refusa de reconnaitre l'abbé comme suzerain. Dès lors, de 1200 à 1282, on trouve trace d'écrits qui témoignent  des conflits entre les 2 seigneurs. En 1282, Guy, abbé\r\nde Saint Claude reprit possession de la seigneurie de la Tour du Meix : il rebâtit alors le château qui devint bientôt l'une des principales forteresses de Saint-Claude. Au XIVe siècle, les abbés séjournaient  au château de Moirans, mais au XVe siècle, Pierre Morel préféra le château de la Tour du Meix. Il le restaura et  en fit sa résidence princière. Elle fut la résidence d'été des abbés jusqu'au XVIe siècle.","architecture":"La tour du Meix, le 16 juillet 1637, pendant la Guerre de Trente Ans, le duc de Longeville prit le château et le brûla ainsi que le bourg et le moulin. Le château ne fut jamais rebâti, on ne restaura que quelques chambres qui servirent d'entrepôt pour les dîmes.","habitants":"Aylon de Revigny \r\n        \"","divers":"Vestiges de la Tour de Meix","gps":"","images":["../../jctruffet.com/image/image_39/39_Tour_Meix_1.jpg","../../jctruffet.com/image/image_39/39_Tour_Meix_2.jpg"]},"Consult_chateau_formulairee937":{"id":"Consult_chateau_formulairee937","dept":"39","canton":"Arinthod","commune":"Valfin-sur-Valouse","nom":"Valfin","type":"Château","periode":"XVI","histoire":"VALFIN; au XIIIe siècle, les seigneurs en étaient les sires de Dramelay auxquels les abbés de Gigny avaient inféodé la seigneurie.  François de Toulongeon au XVIe siècle, puis des familles prestigieuses s'y succédèrent: les Montaigu, barons de Boutavant, faits par Louis XIV marquis de Boutavant et de Valfin, puis les Dom d'Hautecour. Le dernier seigneur de Valfin fut Joseph-Antide Dom d'Hautecour, petit-fils d'écuyer  et secrétaire du Roi. En 1953, la ville d'Argenteuil l'acheta pour en faire un centre de vacances et entraîna  d'importantes modifications d'aménagement.","architecture":"le château de Valfin,  se composait d'un puissant donjon carré flanqué à ses angles de quatre tours à mâchicoulis, flanqué de deux tours, une ronde et une quadrangulaire  un ensemble fortifié difficile d'accès. L'aspect fut profondément modifié au XVIe siècle par son nouveau propriétaire qui   supprima les tours d'angle du donjon, lui adossa une tour quadrangulaire et un corps de  logis.  Ce château a subi des modifications importantes au fil des ans,  puis converti ces dernières années en une colonie de vacances.","habitants":"François de Toulongeon\r\n        \"","divers":"Château de Valfin","gps":"","images":["../../jctruffet.com/image/image_39/39_Valfin_1.jpg","../../jctruffet.com/image/image_39/39_Valfin_2.jpg","../../jctruffet.com/image/image_39/39_Valfin_3.jpg"]},"Consult_chateau_formulaire3da7":{"id":"Consult_chateau_formulaire3da7","dept":"39","canton":"Champagnole","commune":"Vannoz","nom":"Vannoz","type":"Château","periode":"XVII","histoire":"VANNOZ;. Vannoz faisait partie de la seigneurie du Montrivel, fraction de la seigneurie de Salins connue dès 1252 qui comprenait également Champagnole, Equevillon, Saint-Germain, Ney et la grange de Burgille. Un château était établi sur le mont Rivel. Au XIVe siècle le fief a été vendu à Jean Ier de Chalon-Arlay. Passe dans les mains de la famille d'Usie et en 1415.  par son mariage avec Jean de Chissey. La famille de Chissey,  par testament la terre de Vannoz à Pierre Charreton, dit du Louverot, seigneur du Pin. En 1696, à Jean-François Français et à Anne-Marie Guignoire, Son petit-fils a trois enfants: Luc-Joseph (1772-1848) émigré en 1791,François-Bonaventure Français de Vannoz qui épouse Philippine de Sivry en 1802, et Marie-Henriette, épouse de Stanislas Boucher. Marie de Vannoz, fille de Philippine de Sivry, la poétesse Madame de Vannoz et de François-Bonaventure Français de Vannoz, hérite en 1848 de son oncle et fait entrer par son mariage le château et les propriétés de Vannoz dans la famille Scitivaux de Greische qui réside au château de Remicourt à Villers-lès-Nancy. Construit au XVIIe siècle, il abrite aujourd'hui une maison de retraite depuis que son dernier propriétaire privé, Etienne Lamy, avocat, journaliste, homme politique français, secrétaire perpétuel de lAcadémie française, l'a légué au début du XXe siècle à l'Association Diocésaine de Saint-Claude.","architecture":"Le château-fort de Vannoz dit le château de la Motte a été brûlé par les Français en 1637 lors de Guerre de Dix Ans puis reconstruit et transformé en château de résidence par le baron du Pin en 1679 avec la création d'un beau jardin en terrasses. Les aménagements ont été poursuivis par les successeurs. Le château conserve une tour rectangulaire tournée vers l'extérieur, une tour polygonale dans la cour intérieur et des bâtiments d'un étage aux toits pentus couverts de petites tuiles. On a restauré près de la porte d'entrée du bâtiment principal des armoiries et un bas-relief en pierre représentant saint-Georges.","habitants":"Etienne Lamy\r\n        \"","divers":"Château de Vannoz","gps":"","images":["../../jctruffet.com/image/image_39/39_Vannoz_1.jpg","../../jctruffet.com/image/image_39/39_Vannoz_2.jpg","../../jctruffet.com/image/image_39/39_Vannoz_3.jpg"]},"Consult_chateau_formulaire3a15":{"id":"Consult_chateau_formulaire3a15","dept":"39","canton":"Montbarrey","commune":"Vaudrey","nom":"Vaudrey","type":"Château","periode":"XVIII","histoire":"VAUDREY; le château fut la demeure des  Etienne Lamy, de la maison de Thoyres, réputés au XIIe siècle pour  leurs querelles incessantes avec les religieux de l'abbaye de Rosières et de Saint-Just à Arbois. Au début du XVIIIe siècle, Quentin Terrier de Montciel se porta acquéreur de la terre de Vaudrey et en 1740 fit ériger en marquisat ses terres de Vaudrey et Montciel. A la place de la vieille demeure, il fit édifier le château actuel.","architecture":"Vaudrey; de l'époque médiévale subsiste le système de défense externe: le fossé rempli des eaux de la Cuisance entoure le parc au milieu duquel  s'élève le château. Une tour en brique couronnée d'un toit en poivrière conique, ornée de deux rangées de faux mâchicoulis séparés par  un bandeau, flanqué sur la façade  du corps de logis principal, sur laquelle se détache, au deuxième niveau, une galerie de bois couverte par l'auvent d'un vaste toit pentu à croupe.","habitants":"Famille de Etienne Lamy\r\n        \"","divers":"Château de Vaufrey","gps":"","images":["../../jctruffet.com/image/image_39/39_Vaudrey_1.jpg","../../jctruffet.com/image/image_39/39_Vaudrey_2.jpg"]},"Consult_chateau_formulaire898a":{"id":"Consult_chateau_formulaire898a","dept":"39","canton":"Villers-Farlay","commune":"Pagnoz","nom":"Vaulgrenand","type":"Vestiges","periode":"XIII","histoire":"VAULGRENAND; cité dès le XIIIe siècle, le château fut construit pour Richard de Vaulgrenant, sa situation particulière permettait de surveiller la route dite \"du bois et du sel\" venant de Salins et passant par Pagnoz pour se diriger vers Dole et la vallée de Saône. Vers 1380, la baronnie au profit d'Anselm de Salins. En 1479, une attaque des armées du roi Louis XI  détruit la demeure. Vers 1520, restauration du château et réaménagement des logis. Mais l'édifice fut démantelé sur ordre du Roi Louis XIV en 1674, comme la plupart des forteresses Comtoises. Un grand nombre des pierres a sans doute été vendu pour construire des maisons du village.","architecture":"Le château  de Vaulgrenand  en ruine fait lobjet dune restauration depuis 2001. Un chantier de jeunes est en cours sous la responsabilité de lassociation \"Les amis de Vaulgrenant\".","habitants":"Richard de Vaulgrenant\r\n        \"","divers":"Vestiges de Vaulgrenand","gps":"","images":["../../jctruffet.com/image/image_39/39_Vaulgrenand_1.jpg","../../jctruffet.com/image/image_39/39_Vaulgrenand_2.jpg","../../jctruffet.com/image/image_39/39_Vaulgrenand_3.jpg","../../jctruffet.com/image/image_39/39_Vaulgrenand_4.jpg"]},"Consult_chateau_formulaire1716":{"id":"Consult_chateau_formulaire1716","dept":"39","canton":"Conliège","commune":"Verges","nom":"Verges","type":"Château","periode":"XVI","histoire":"VERGES, a été édifié en 1562 par Philibert de Vautravers alors que la Franche-Comté était espagnole. Le premier château de Verges était une demeure militaire qui appartenait au seigneur de Verges, famille connue au XIIIe siècle. Situé à environ 200 m à l'est de celui-ci, sa grosse tour carrée, sise sur une motte féodale, servait à protéger la vallée qui menait au château de Binans. En 1556, Jean de Verges fut contraint de vendre ses terres et tous droits seigneuriaux qui l'accompagnaient. L'acheteur Philibert de Vautravers, capitaine et gouverneur du val de Voiteur, rasa le château et commença la construction du château actuel, en 1562.  Mort avant la fin des travaux, ceux-ci sont achevés en 1593 par sa femme, Jeanne de la Chambre, cousine de Catherine de Médicis, si lon en croit une plaque qui se trouve au bas de lescalier principal, plaque qui signale la fin des travaux. Après la mort de Philibert de Vautravers et de sa femme, le château passe à la famille Montrichard.  Depuis sa construction la propriété est passée, pour de courtes périodes, entre les mains de diverses familles, les de Fussey, de Montrichard et d'Aubarède. En 1727, Paul Alexandre d'Aubarède la vendit à Jean Baptiste Chaillet de Rochejean, avocat au parlement. Depuis, elle est restée dans cette même famille jusqu'en 1988 date à laquelle, le dernier successeur, Aymar de Chomereau la vendit à Alain et Joëlle Fabry, les propriétaires actuels.","architecture":"Le château de Verges était à l'origine un quadrilatère a vocation défensive, il a été construit dune façon qui navait plus cours en France à lépoque avec des tours à chaque angle.  Actuellement, il présente un corps de logis avec des tours  à l'est et au sud  et des restes de fossés à l'ouest et au nord. Un mur d'enceinte avec deux tours cylindriques couvertes de laves ferme la propriété à l'est. Après un incendie qui a dévasté une partie de la demeure en 1746, l'édifice a été restauré  dans le style XVIIIe siècle, agrémenté  dun oratoire en encorbellement sur la façade. Lensemble garde encore son aspect extérieur médiéval. Mais il porte aussi les stigmates du temps  il cherchait, il y a peu de temps encore, un nouvel hôte pour lui changer ses lauzes et  relever les tourelles de ses murs de clôture.","habitants":"Philibert de Vautravers\r\n        \"","divers":"Château de Verges","gps":"","images":["../../jctruffet.com/image/image_39/39_Verges_1.jpg","../../jctruffet.com/image/image_39/39_Verges_2.jpg","../../jctruffet.com/image/image_39/39_Verges_3.jpg","../../jctruffet.com/image/image_39/39_Verges_4.jpg","../../jctruffet.com/image/image_39/39_Verges_5.jpg","../../jctruffet.com/image/image_39/39_Verges_6.jpg","../../jctruffet.com/image/image_39/39_Verges_7.jpg"]},"Consult_chateau_formulairee9cb":{"id":"Consult_chateau_formulairee9cb","dept":"39","canton":"Lons-le-Saunier","commune":"Vevy","nom":"Vevy","type":"Gentilhommière","periode":"XVIII","histoire":"VEVY;  belle maison bourgeoise au passé riche, construite au XVIIIe  siècle, elle a été la propriété de Chevillard  Intendant de Napoléon.  L'histoire locale nous apprend que Jean-Baptiste Chevillard, qui fut sous-intendant militaire sous Napoléon 1er, hérita en 1834 d'un \"château\" en fait une belle maison bourgeoise du début du XVIIIe siècle et de ses terres à Vevy, situation qui lui permit de donner libre cours à ses deux passions : les chevaux et la chasse. Ayant la nostalgie des châteaux, parcs et rendez-vous de chasse qu'il avait pu voir en parcourant l'Europe lors de l'épopée napoléonienne, il se fit aménager un superbe parc avec de nombreuses fabriques et installations, dont l' enclos du milieu.","architecture":"Château de Vevy situé dans un village, entouré d'un vaste jardin,d'un mur de pierre et gardé par un haut portail portant les armoiries du Jura et de la famille Chevillard. Cette demeure est un point de départ idéal aux nombreuses activités offertes par le Jura,   a été entièrement rénové, aménagé et décoré de façon moderne tout en conservant son charme d'antan.","habitants":"Monsieur Chevillard\r\n        \"","divers":"Gentilhommière de Vevy","gps":"","images":["../../jctruffet.com/image/image_39/39_Vevy_1.jpg","../../jctruffet.com/image/image_39/39_Vevy_2.jpg"]},"Consult_chateau_formulaire5036":{"id":"Consult_chateau_formulaire5036","dept":"39","canton":"Dole","commune":"Villete-lès-Dole","nom":"Vilette","type":"Château","periode":"XVIII","histoire":"VILETTE,  l'origine de Pressagne ou Presseigne, semble venir du latin Pratum Sanguinis qui signifie :  Prés du sang et marqueraient donc bien un champ de bataille . L'origine des Emards ou des Mars proviendrait du nom d'une famille de noble qui avait possédé ce fief qui s'étendait sur une partie de Parrecey (Parcey), et relevait directement du comté de Bourgogne grâce à leur château de Dole. Une partie  fut vendue le 4 octobre 1581 à Baldoine d'Astel, sur du propriétaire, épouse du sieur Gremaud, nom très connu et famille à responsabilité encore au XIXe siècle. Le reste de l'histoire de cette moitié de fief concerne la commune de Parcey. Comme indiqué ci-dessus, les fiefs de la Pressagne et des Emards furent anéantis en 1477.   Famille des Rigollier de Parcey, fief de la Preseigne.  Les deux frères, François Samuel et Jérôme, furent au XIXe siècle l'exemple même de ces nouveaux anoblis qui passent rapidement de la robe à la rente par la constitution  d'importants domaines fonciers. Ils n'émigrèrent pas à la Révolution et jouèrent un rôle important dans la vie publique doloise au XIXe siècle.","architecture":"Le château  de la Vilette fut construit au XVIIIe siècle  sur l'emplacement de l'ancienne maison forte  détruite définitivement en 1668  Il est situé sur le bord de la forêt de Chaux, derrière l'actuel cimetière, et il avait en son centre, une motte artificielle entourée de fossés, sur laquelle avait été construit un château fort.  Une longue allée conduit à la cour d'honneur au fond de laquelle l'édifice s'élève sur un plan en U. Un avant-corps  central surmonté d'un fronton triangulaire à oculus  rythme le corps de logis principal chapeauté d'un toit à croupe.   Deux niveaux et un étage attique  séparés par une corniche à modillons.","habitants":"Rigollier de Parcey\r\n        \"","divers":"Château de Vilette","gps":"","images":["../../jctruffet.com/image/image_39/39_Villette_1.jpg"]},"Consult_chateau_formulaire02f5":{"id":"Consult_chateau_formulaire02f5","dept":"39","canton":"St-Claude","commune":"Villard-St-Sauveur","nom":"Villard","type":"Château","periode":"XIV","histoire":"VILLARD, Etienne, sire de Villard, est le premier seigneur connu de cette terre; Etienne, Thomas et Berthelet du Villard firent hommage, le premier en 1307, le second en 1308 et le troisième en 1319, à Odon de Vaudrey, abbé de Saint-Claude, de la prévôté du Villard et de Septmoncel\r\nPierre de Dortan, chevalier, acquit en 1320, la seigneurie du Villard, dans cette famille jusqu'au  29 avril 1616, Pierre de Dortans vendit sa moitié à Daniel, Jacques, Théodore et Pierre de Courcault, Judith de Courcault, épouse de Paul de Lorriol, Marie et Louise de Coucault, surs, filles de Jacques de Coucault, seigneur d'Estoy,  Paul II de Loriol, fils de Paul 1er , et Madeleine Monnier de Lizy, son épouse, vendirent la terre du Villard,  en  1701, à Jean Claude Dronier grand juge en la terre de Saint-Claude.  Claude Antoine Joseph Dronier, conseiller au parlement de Besançon, fils de cet acquéreur, transmit ce domaine à Jeanne Eugène Dronier de Pra,  sa fille, qui épousa à Morez, en 1749, Louis François Lamartine, chevalier, seigneur de Monceau, près de Mâcon. Les descendants de M. Lamartine l'ont possédé Jusqu'au moment de la  Révolution. Il a été acquis par M. Dumoulin, de Saint-Claude, qui l'a revendu à la famille Groussot, propriétaire actuel.","architecture":"VILLARD,   à l'extrémité méridionale du hameau de Villard, est une ancienne habitation seigneuriale qui n'a de remarquable qu'une tour octogonale datant du XVIe  siècle. Cette maison occupe la place de l'ancien château des sires du Villard.  Il ne reste apparemment comme élément ancien du XVIe siècle que la tourelle contenant l'escalier en vis. Le reste a subi des modifications au cours du XIXe siècle. Dans les années 1960 la tourelle a été amputée de sa toiture  en flèche polygonale  qui a été remplacée par une terrasse. Des ouvertures ont été modifiées  sur le mur gouttereau antérieur et postérieur au cours du XXe siècle. A l'étage de l'édifice se trouve une cheminée dont la plaque est datée  de 1707. L'escalier se trouve dans la tourelle accolée à la face droite, le reste de l'édifice est couvert par un toit à longs pans avec  une croupe à gauche.","habitants":"Pierre de Dortan\r\n        \"","divers":"Château de Villard St-Sauveur","gps":"","images":["../../jctruffet.com/image/image_39/39_Villard_1.jpg"]},"Consult_chateau_formulaireef0c":{"id":"Consult_chateau_formulaireef0c","dept":"39","canton":"Lons-le-Saunier","commune":"L`Etoile","nom":"Villevieux_Etoile","type":"Château","periode":"XV","histoire":"VILLEVIEUX-l'ETOILE;  à l'instar de Margaux qui a son château, figure emblématique de l'appellation \"l'Etoile\" domaine plutôt réputé appartenant à  la famille Vandelle.    Lorigine du château  remonte à la plus haute antiquité. Seigneuriales ou privées, les vignes  ne cessent au cours des âges dattirer lattention. La propriété  acquise par Auguste  Vandelle en 1883, est aujourdhui dirigée par Georges, Béatrice et leurs deux fils.   Le vignoble se compose essentiellement de la colline du Mont Muzard, dont les flancs Est, Sud et Ouest au sous-sol marneux conviennent particulièrement à la vigne.  La propriété  a été acquise en 1883 par Auguste VANDELLE. C'est aujourd'hui, 5 générations plus tard, Alexandre qui a la lourde tâche de perpétuer les traditions familiales.","architecture":"Château : le château de l'Étoile remonte à la plus grande antiquité. Seigneuriales ou privées, les vignes de l'Étoile ne cessent au cours des âges d'attirer l'attention.  Corps de logis en forme de U à deux niveaux toitures en croupes sur les trois corps, cours d'honneur fermée et  tour carrée sur angle extérieur.","habitants":"Auguste  Vandelle\r\n        \"","divers":"Château de Villevieux-Etoile","gps":"","images":["../../jctruffet.com/image/image_39/39_Villevieux_Etoile_1.jpg","../../jctruffet.com/image/image_39/39_Villevieux_Etoile_2.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','39 — Jura'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)showDet(start);
</script></body></html>
