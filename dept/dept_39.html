const FULL={"Consult_chateau_formulaire7adb":{"id":"Consult_chateau_formulaire7adb","dept":"39","canton":"St-Julien","commune":"Andelot-les-St-Amour-Morval","nom":"Andelot","type":"Château","periode":"XIV","histoire":"ANDELOT;  au temps des premiers seigneurs de Coligny qui  portaient les titres de sires de Coligny et du pays du Revermont et descendaient des comtes de Bourgogne. Le plus  célèbre des Coligny  habitait le château, François, premier marquis d'Andelot et frère de l'amiral Gaspard de Coligny, assassiné lors du massacre de la Saint-Barthélemy  en 1572.  Joachim de Coligny fut le dernier descendant.  Sa fille, Anne Louise de Coligny, vendit la terre d'Andelot,  au début du XVIIIe siècle, à Joachim Guyennard. Son fils Gaspard Guyennard se fit confirmer en 1746,  le titre de marquis d'Andelot.   A la Révolution, lors de la Grande Peur,  les paysans envahirent le château  et le brûlèrent. En 1827, le château passa à la famille Viot. Au XIXe siècle il ne restait plus rien du  puissant château féodal avec ses trois portes successives garnies de tours et pont-levis et ses larges fossés séparés par une épaisse muraille. \r\nEn 1924 Ferdinand Lammot Belin et son cousin Pierre du Pont de Nemours, descendants du dernier marquis d'Andelot, rachetèrent le château de leurs ancêtres pour le réparer et le faire revivre en retrouvant les racines de leur mémoire.","architecture":"Andelot, la construction du château remonte au XIIe siècle, il reste du donjon quadrangulaire et le reste du château d'Andelot  les deux tours d'entrées qui encadrent la porte, l'une est ronde, l'autre à droite en forme de fer à cheval servait autrefois de prison, aujourd'hui chambres d'hôtes.","habitants":"Sires de Coligny \r\n        \"","divers":"Le château d'Andelot","gps":"","images":["../../jctruffet.com/image/image_39/39_Andelot_1.jpg","../../jctruffet.com/image/image_39/39_Andelot_2.jpg","../../jctruffet.com/image/image_39/39_Andelot_3.jpg","../../jctruffet.com/image/image_39/39_Andelot_4.jpg","../../jctruffet.com/image/image_39/39_Andelot_5.jpg"]},"Consult_chateau_formulaire03e9":{"id":"Consult_chateau_formulaire03e9","dept":"39","canton":"Arbois","commune":"Arbois","nom":"Arbois_Pecaud","type":"Château","periode":"XIII","histoire":"ARBOIS-PECAUD;  Guillaume de Velfaux qui le vendit à Nicolas Perrenot de Granvelle, ce dernier fit construire le logis au début du XVIe siècle, puis  passa à la famille Pécaud. A la Révolution le château fut vendu comme bien national, en 1826 la ville dArbois le racheta et linstitut des vins du Jura le restaura, non loin du château Pécaud dailleurs, Jusqu'en 1260, Arbois ne fut quune villa, .  En 1674, suite à la conquête de la Franche-Comté par Louis XIV, Arbois cessa dêtre une ville fortifiée, le 13 avril 1834, Arbois se déclare en République en soutien à la révolte des Canuts . Familles nobles arboisiennes, les Gillaboz, les Glanne, les Le Grand, les Lancerot, les Sarron et les Voiturier,  anoblies au XVIe siècle.                                                                                       Tour GLORIETTE, les armées des différents rois de France, de Henri IV à Louis XIV, attaqueront Arbois mais jamais la Tour Gloriette.                                                                                  MONTFORT Au XIIIe siècle, le Chasal, ressemble plutôt à un manoir à proximité des murailles de la ville et de la tour Daguet, furent vendus à Othenin d'Arbois.  Remanié au XVIIe siècle la bâtisse appartenait au XVIIIe siècle à la famille Vigoreux d'Escrilles. L' élégante demeure est maintenant la propriété d'Henri Maire qui, par son vin, a fait connaître Arbois dans le monde entier, transformé en hôtel.","architecture":"Arbois, Pécaud du XVIe siècle, fût presbytère puis école de garçons mais son délabrement a contraint la ville dArbois de construire une école neuve et tour Velfaux du château, tour du XVIe siècle intégrée aujourd'hui dans le château  elle était un des principaux éléments des remparts qui encerclaient Arbois sur une longueur de 1,200 km,  y compris son escalier en vis, façades et toitures du corps de logis et de la tour carrée.                           \r\nTour GLORIETTE,  construite au XIIIe siècle . En 1503 elle sera trés endommagée par une crue de la Cuisance, haute de 17 m, de base carrée de 11 m de côté, la Tour actuelle a été reconstruite au début du XVI e siècle.                                                                    La demeure, dite château Montfort,  du XVIIIe siècle, corps de logis avec la tour Est, de plan carré, au vaste toit en croupe, s'orne,  sur son flanc sud-ouest, d'une tour-escalier octogonale du XVIe siècle, coiffée d'un toit pyramidal surmonté d'une flèche, ressemble plutôt à un manoir, il est rectangulaire et flanqué, en milieu de façade d'une élégante tour polygonale, il possède un seul étage et un haut toit, construction du XVIe siècle. \r\nAutres châteaux Bontemps ( voir article), Bethanie, Chavannes,  De Chaffin, Verreux dit château, tous vouaient à la viticulture, du prieuré,  vestiges de l'enceinte fortifiée du XIII-XVIIIe siècle.","habitants":"Famille Pécauld\r\n        \r\n        \r\n        \"","divers":"Le château Pecaud avec la tour Gloriette, La demeure Montfort, le château de Delort en Verreux, le domaine Séquoia.","gps":"","images":["../../jctruffet.com/image/image_39/39_Arbois_Pecaud_1.jpg","../../jctruffet.com/image/image_39/39_Arbois_Pecaud_2.jpg","../../jctruffet.com/image/image_39/39_Arbois_Pecaud_3.jpg","../../jctruffet.com/image/image_39/39_Arbois_Pecaud_4.jpg","../../jctruffet.com/image/image_39/39_Arbois_Pecaud_5.jpg","../../jctruffet.com/image/image_39/39_Arbois_Pecaud_6.jpg","../../jctruffet.com/image/image_39/39_Arbois_Pecaud_7.jpg","../../jctruffet.com/image/image_39/39_Arbois_Pecaud_8.jpg"]},"Consult_chateau_formulaireeda0":{"id":"Consult_chateau_formulaireeda0","dept":"39","canton":"Arinthod","commune":"Arinthod","nom":"Arinthod","type":"Château","periode":"XV","histoire":"ARINTHOD, remonte à l'époque celtique, mégalithe situé un peu à l'extérieur du village, et en tout cas à l'époque romaine, avec la stèle gallo-romaine découverte lors de travaux dans l'église, et installée sur le mur nord de celle-ci. Le village était fortifié, et adossé à l'enceinte d'un château, détruit au XVe siècle, dont subsiste la chapelle castrale  et les  vestiges des remparts. La tour témoigne de la présence d'une demeure seigneuriale, de la fin du Moyen-Age, \r\n Au XIIIe siècle, Arinthod appartenait à la seigneurie de Jean de Chalon. Au XIVe siècle il fut la résidence de Jean de la Beaume, maréchal de France.","architecture":"Arinthod,  ce château, privé, est très ancien, il aurait en fait été à l'origine en 894  d'un monastère, composé d'un lourd donjon carré aux angles duquel se trouvaient quatre tours avec mâchicoulis.  Ce château a subi des modifications importantes au fil des ans, donjon du XIIIe siècle, bâtiments du XVIe siècle. Dans les années 1950, il fut aménagé en colonie de vacances pour les enfants d'Argenteuil, bâtiment entouré de quatre tours dont une seule subsiste intégralement. Des éléments médiévaux subsistent, des arcades, une fontaine, une église du XIIe siècle.","habitants":"Jean de Chalon\r\n        \"","divers":"Le château d'Arinthod et de Vogna","gps":"","images":["../../jctruffet.com/image/image_39/39_Arinthod_1.jpg","../../jctruffet.com/image/image_39/39_Arinthod_2.jpg"]},"Consult_chateau_formulaire6078":{"id":"Consult_chateau_formulaire6078","dept":"39","canton":"Bletterans","commune":"Arlay","nom":"Arlay","type":"Forteresse","periode":"XI-XIII","histoire":"ARLAY. Au début du XVe siècle Jean III de Chalon-Arlay épouse la princesse Marie des Baux, héritière de la principauté d'Orange et la lignée des Chalon-Arlay,  et au début du XVIe siècle, la famille Chalon-Arlay reconstruit le château. En 1530 Philibert de Châlon-Arlay, baron dArlay, commandant des armées de lempereur germanique Charles Quint en guerre contre le roi François Ier, meurt sans héritier directe à la bataille de Gavinana près de Pavie en Italie. Son neveu René de Nassau  hérite de ses titres et possessions , la reine Beatrix des Pays-Bas qui est encore aujourdhui princesse dOrange de Nassau et baronne dArlay.\r\nSuite à un procès de deux siècles (1530 à 1730) le Roi Louis XV attribut une part de lhéritage au prince dIsenghien Louis de Gand de Mérode de Montmorency et à sa nièce héritière la comtesse de Lauragais Élisabeth-Pauline de Gand. En  1794, , arrêtée, jugée, condamnée et guillotinée à Paris. En 1825, son petit-fils, le prince Pierre d'Arenberg  reprend possession des biens de sa grand-mère quil transmet à ses héritiers, en 1924 à la petite fille de Pierre d'Arenberg la marquise de Voguë, puis à ses petits enfants jusquà ce jour.  À partir de 1960, le comte Renaud de Laguiche, suivi par son fils Alain de Laguiche , exploitent le domaine viticole de leurs ancêtres. Depuis 1960 le comte Renaud de Laguiche, suivi par son fils Alain , exploitent leur domaine viticole.","architecture":"Arlay; au XIe siècle est construit un important château fort de style anglo-saxon sur la colline qui domine Arlay et le château actuel, sur lemplacement d'un ancien oppidum gallo romain de  Girart de Roussillon au IXe siècle, aujourd'hui ruiné , datant du XVe au XVIIIe siècle ;  il reste sur un mamelon une enceinte rectangulaire flanquée de tours rondes et donjon. reconstruit au XIIIe siècle passe au comte  Jean de Chalon gouverneur  et sir de Chalin et d'Arlay. \r\n le château d'Arlay  reste un corps de logis rectangulaire à trois niveaux et attiques,  fronton triangulaire et toit à la mansard  deux ailes en retour de même niveaux, sur les côtés deux pavillons identiques à deux niveaux avec fronton triangulaire ainsi que le couvent des minimes des XVIIe et XVIIIe siècles. Vers 1770, alors quelle vie dans son château de Nozeroy actuellement en ruine dans le haut Jura, elle achète le couvent de lordre des Minimes au pied du château fort dArlay  et en fait sa nouvelle résidence principale.   Dans la ville maison du XVIe siècle, dite La Chevana d'Or, des maisons et fermes allant XVe siècle au XIXe siècle,","habitants":"Comte Renaud de Laguiche\r\n        \"","divers":"Vestiges de la forteresse d'Arlay, et de son nouveau château,  château de Chevagna.","gps":"","images":["../../jctruffet.com/image/image_39/39_Arlay_1.jpg","../../jctruffet.com/image/image_39/39_Arlay_2.jpg","../../jctruffet.com/image/image_39/39_Arlay_3.jpg","../../jctruffet.com/image/image_39/39_Arlay_4.jpg","../../jctruffet.com/image/image_39/39_Arlay_5.jpg","../../jctruffet.com/image/image_39/39_Arlay_6.jpg","../../jctruffet.com/image/image_39/39_Arlay_7.jpg","../../jctruffet.com/image/image_39/39_Arlay_8.jpg"]},"Consult_chateau_formulaire6582":{"id":"Consult_chateau_formulaire6582","dept":"39","canton":"Montbarrey","commune":"Augerans","nom":"Augerans","type":"Château","periode":"XX","histoire":"AUGERANS;  château du XXe siècle à appartenu  à la famille  d'Epenoux puis à des négociants, et a Charles -Emmanuel Jodelet peintre,  transformé aujourd'hui en appartements avec location de salle pour séminaire mariage et colonie de vacances des usines Peugeot etc.","architecture":"Augerans, de construction moderne constitué d'un corps de logis rectangulaire à trois niveaux et attiques, accolé d'une tout carré à cinq niveaux.","habitants":"Famille  d'Epenoux \r\n        \"","divers":"Château d'Augerans","gps":"","images":["../../jctruffet.com/image/image_39/39_Augerans_1.jpg","../../jctruffet.com/image/image_39/39_Augerans_2.jpg","../../jctruffet.com/image/image_39/39_Augerans_3.jpg","../../jctruffet.com/image/image_39/39_Augerans_4.jpg"]},"Consult_chateau_formulairee2ee":{"id":"Consult_chateau_formulairee2ee","dept":"39","canton":"Dole","commune":"Authume","nom":"Authume","type":"Château","periode":"XVII","histoire":"AUTHUME;  bâti sur une terre qui, au Moyen-Age, dépendait de la prévôté de Rochefort et que les Seigneurs d'Auxange vendirent en 1429 à Nicolas Rolin, le  chancelier du duc de Bourgogne Philippe le Bon. Détruit en 1477 par les  troupes du sire de Craon, reconstruit  au XVIIe siècle, il passa par alliance dans  la famille Masson , en 1692, de Marie Bontemps, dame d'Authume, avec  Claude François Masson, conseiller  au parlement de Besançon,  érigé en marquisat en 1750, sous le nom de Masson d'Authume en faveur de Jean Léger Masson,  fut habité par les Masson d'Authume  jusqu'à la fin du XIXe siècle où il fut vendu par fragments  à plusieurs propriétaires qui se le partagèrent. Aujourd'hui fort abîmé, le château d'Authume laisse pourtant encore deviner le très bel édifice classique qu'il fut.                              Le château Fournier, il s'agit de la gentilhommière de Philippe Thérèse,  second fils du marquis Jean Léger de Masson d'Authume. Une très belle demeure située dans un parc avec un petit pavillon de chasse,  un double escalier  conduit à un superbe perron,  appelée à l'époque  le domaine de La Bretenière, nom que  la rue a gardé aujourd'hui.  Ce domaine  adossée à la colline que nous appelions familièrement  le mont qui va jusqu'au bois de la Marsotte, il a appartenu à Jean Nicod dans les années 1835 et fut propriété du notaire dolois Vandevelle à partir de 1844. Il appartient aujourd'hui à la famille Fournier.","architecture":"Authume, imposant château construit sous le règne de Louis XIV, sur le site d'une ancienne forteresse, quadrilatère avec  quatre  corps de logis allongés  à deux niveaux, toits en croupes tours rondes en angles.                                                                     Le château Fournier, corps de logis  à un niveau avec attiques et fronton toiture en croupes.\r\n La légende raconte que Napoléon, encore simple lieutenant en garnison à Auxonne,  rendait visite à l'un de ses professeurs, le chevalier d'Authume.","habitants":"Famille Masson \r\n        \"","divers":"Château d'Anthume et de Fournier","gps":"","images":["../../jctruffet.com/image/image_39/39_Authume_1.jpg","../../jctruffet.com/image/image_39/39_Authume_2.jpg","../../jctruffet.com/image/image_39/39_Authume_3.jpg","../../jctruffet.com/image/image_39/39_Authume_4.jpg","../../jctruffet.com/image/image_39/39_Authume_5.jpg"]},"Consult_chateau_formulaireea7f":{"id":"Consult_chateau_formulaireea7f","dept":"39","canton":"Dole","commune":"Azans","nom":"Azans","type":"Château","periode":"XVIII","histoire":"AZANS;  bâti au XVIIIe siècle, il appartenait avant la Révolution aux Moréal, barons de Commenailles, qui y avaient  constitué une riche collection de médailles et de tableaux.  En 1789, il fut acheté par la famille de Reculot, de vieille noblesse  originaire de Poligny. Nicolas Vincent, Comte de Reculot, fut maire d'Azans  jusqu'à sa mort en 1835. Son fils, Louis Thérèse Emmanuel, fit partie de la garde nationale du Jura en 1814. Le château passa par héritage dans la famille des Valdahon, Gabrielle de Reculot ayant épousé le comte Jules Henri Lebuf de Valdahon. Acquis en  1868  par le marquis Froissard de Bersaillin, il resta dans la famille  jusqu'en 1946, époque de l'après-guerre où un homme d'affaires alsacien, Goguel de Tou, s'en porta acquéreur. Un industriel vosgien André Cuny, venu s'installer  dans la région d'Orchamps, le racheta dans les années 1950.","architecture":"Azans, corps de logis de forme rectangulaire à trois niveaux et attiques, terrasse sur rotonde côté parc, tour carrée en angle, à l'opposée corps de bâtiment carré flanqué de tourelles en encorbellements.","habitants":"Famille de  Commenailles\r\n        \"","divers":"Château d'Azans à Azans et à Dole","gps":"","images":["../../jctruffet.com/image/image_39/39_Azans_1.jpg","../../jctruffet.com/image/image_39/39_Azans_2.jpg","../../jctruffet.com/image/image_39/39_Azans_3.jpg"]},"Consult_chateau_formulairea148":{"id":"Consult_chateau_formulairea148","dept":"39","canton":"Sellières","commune":"Toulouse-le-Château","nom":"Baudin","type":"Château","periode":"XVII","histoire":"BAUDIN; le château est la propriété de la marquise de Labriffe, fille de Monnier directeur des forges de Baudin, par la famille Jobez et Morel, établi vers 1794, le haut fourneau de Baudin se spécialise dans la production de fonte moulée. De dimension modeste, l'usine connaît entre 1827 et 1839 diverses extensions. Sous l'influence du maître de forges Edmond Monnier, sont successivement édifiés une chapelle néo gothique de 1853 à 1854, sur les plans de Narcisse Perrard. Vers 1860, l'usine connaît des difficultés, le haut fourneau est éteint en 1874 puis détruit. La propriétaire actuelle du château est la marquise de Labriffe née Monnier, fille du dernier maître des forges. Aujourd'hui gites de France. Le musée présente au visiteur fourneaux, cuisinières ou pièces de fonderie ornementales produites en ces lieux.","architecture":"Le château de Baudin a été construit entre 1865 et 1882. Cest un château de plaisance,  corps de logis principal flanqué de deux tours carrées, à l'angle sud-ouest un autre corps de logis accosté à une tour carrée, La grille dentrée souvre sur une cour au milieu de laquelle se trouve une fontaine. le bâtiment central est encadré par deux tours carrées.  hauts toits est recouvert dardoises.","habitants":"Marquise de Labriffe\r\n        \"","divers":"Château Baudin avec sa forges","gps":"","images":["../../jctruffet.com/image/image_39/39_Baudin_1.jpg","../../jctruffet.com/image/image_39/39_Baudin_2.jpg","../../jctruffet.com/image/image_39/39_Baudin_3.jpg","../../jctruffet.com/image/image_39/39_Baudin_4.jpg","../../jctruffet.com/image/image_39/39_Baudin_5.jpg"]},"Consult_chateau_formulairead1f":{"id":"Consult_chateau_formulairead1f","dept":"39","canton":"Sellières","commune":"St-Lothain","nom":"Baume","type":"Prieuré","periode":"XV","histoire":"BAUME, à l'origine, au XVe siècle, dit le Prieuré, le château de Baume était une maison seigneuriale des abbés de Baume les  Messieurs. L'édifice est composé d'un sous-sol et un étage carré, gros-oeuvre en calcaire, moellon, enduit partiel   et pierre de taille, toit à longs pans, croupe et demi croupe, couverts de tuiles mécaniques et tuiles plates.","architecture":"Château de Baume des XVe et XVIe siècles, inscrit aux monuments historiques le 7 juillet 1989. Eléments protégés MH, parties XVe siècle et du XVIe siècle de l'aile Sud, ainsi que la cheminée du XVIIe siècle à l'étage, grande cave de l'aile Ouest.","habitants":"Abbés de Baume\r\n        \"","divers":"Prieuré de Baume à st-Lothain","gps":"","images":["../../jctruffet.com/image/image_39/39_Baume_1.jpg","../../jctruffet.com/image/image_39/39_Baume_2.jpg","../../jctruffet.com/image/image_39/39_Baume_3.jpg","../../jctruffet.com/image/image_39/39_Baume_4.jpg"]},"Consult_chateau_formulairea72e":{"id":"Consult_chateau_formulairea72e","dept":"39","canton":"Poligny","commune":"Bersaillin","nom":"Bersaillin","type":"Château","periode":"XIV","histoire":"BERSAILLIN, en 1585, Philippe Froissard, avocat et conseiller au parlement de Dole, achète le château et ses terres, il acquiert le titre de marquis de Bersaillin. La famille Froissard fait édifier une aile pour relier le donjon au corps du château. transformé par Adrien de Vaudrey et son épouse Anne de Vuillafans au début du XVIe siècle.  Le marquis Albert de Froissard fut maire du village au XIXe siècle, il est connu pour son action dans le syndicalisme et dans la mutuelle agricole, les marquis de Bersaillin ont constitué une  importante collection de porcelaines de Chine et de faïences. Par mariage, l'édifice devint propriété des Villeneuve Bargemont à la mort du marquis de Froissard en 1930 et en 1975 donation faite à une congrégation religieuse.","architecture":"Bersaillin;  construit en 1572 et agrandi en 1700, L'édifice rend compte des diverses étapes de sa construction. quadrilatère, autour d'une cour intérieure comporte deux corps de logis, le plus ancien, flanqué de deux tours carrées d'angle, donne sur la cour par une galerie d'arcades Renaissance,  ouvertes au XVIe siècle, rythmées de contreforts,  l'aile en équerre s'étire jusqu'à la tour ronde du vieux donjon, le corps de logis  du XVIIIe siècle à deux niveaux, un rez-de-chaussée aveugle et un étage à six fenêtres à meneaux. A la droite du porche, la chapelle seigneuriale gothique au clocher Renaissance.","habitants":"Adrien de Vaudrey\r\n        \"","divers":"Château de Bersallin","gps":"","images":["../../jctruffet.com/image/image_39/39_Bersaillin_1.jpg","../../jctruffet.com/image/image_39/39_Bersaillin_2.jpg","../../jctruffet.com/image/image_39/39_Bersaillin_3.jpg","../../jctruffet.com/image/image_39/39_Bersaillin_4.jpg"]},"Consult_chateau_formulairec76e":{"id":"Consult_chateau_formulairec76e","dept":"39","canton":"Conliège","commune":"Publy","nom":"Binans_Beauregard","type":"Vestiges","periode":"XII","histoire":"Binans_beauregard PUBLY;  fief des sires de Coligny, emplacement probable d'une villa gallo-romaine proche du lieu dit de « la vie du Puy ». Les premières mentions de Publy et Binans se situent dans des bulles des papes Anastase IV et Adrien IV et mentionnant loppidum et le castrum (château fort) de Binans et celui de Beauregard. Les deux châteaux sont pris et démantelés par les troupes de Louis XI en 1479.\r\nBINANS,  Le château de Binans (hameau qui porte ce nom)  capitule devant les troupes de Henri IV en 1595. Il abrite la population de Conliège pendant le siège de Lons-le-Saunier en 1638, était défendu en temps de guerre par un si grand  nombre d'hommes  que les ennemis osaient rarement l'attaquer. Durant le siège de Lons le  Saunier , les habitants de Conliège sont restés enfermés dans le château ou ils avaient cachés tous les titres  de la communauté villageoise.                                  BEAUREGARD; château-fort construit pour les sires de Coligny, sans doute au Xe siècle, fut démoli en 1668 sur ordre de Louis XIV. La maison-forte disparut sans laisser de traces. De cette forteresse, seul subsiste le donjon  dont l'angle sud-est montre une échauguette. A l'intérieur le mur nord-est abrite le chemin de ronde couvert, trois fenêtres ouvragées et une grande meurtrière sont également bien conservées.","architecture":"Publy, La commune a sur sa superficie deux ruines de châteaux forts, le château de Binans et le château de Beauregard qui permettaient de contrôler la vallée de l'Ain.\r\nSeul le troisième château a été rénové. Celui-ci se dresse au beau milieu du village.\r\nChâteau de Publy de forme rectangulaire à trois niveaux flanqué d'une tour carrée sur flan droit.                                                     Binans;  construit au sommet de la côte de l'Heute, était constitué d'un donjon carré entouré de  murs et de fossés creusés dans le rocher. Il était précédé par une porte flanquée de deux tours et par un pont-levis.  La cour était fermée par une porte avec pont-levis. Une maison-forte avec tour à chacun de ses quatre  angles était située au sud du donjon. Une porte voûtée, fermée par une herse, permettait d'y accéder, trois chemins  rapides conduisaient, l'un au donjon, l'autre au château-fort et le troisième sur la place . Parmi les ruines restantes, on peut voir la salle dite des Dames, au bord  de la falaise. Il subsiste également la partie inférieure du donjon, des éléments de la maison forte et du mur d'enceinte.        Beauregard; ruines du château perché à 660 m, sur un maillon de la côte de l'Heute, se composait d'un gros donjon carré, flanqué d'une tourelle en encorbellement, d'une maison forte et  de dépendances entourées  par une enceinte   de fossés creusés dans le roc.","habitants":"Sires de Coligny\r\n        \"","divers":"Château de Binans à Publy et vestiges de Beauregard","gps":"","images":["../../jctruffet.com/image/image_39/39_Binans_Beauregard_1.jpg","../../jctruffet.com/image/image_39/39_Binans_Beauregard_2.jpg","../../jctruffet.com/image/image_39/39_Binans_Beauregard_3.jpg","../../jctruffet.com/image/image_39/39_Binans_Beauregard_4.jpg","../../jctruffet.com/image/image_39/39_Binans_Beauregard_5.jpg","../../jctruffet.com/image/image_39/39_Binans_Beauregard_6.jpg","../../jctruffet.com/image/image_39/39_Binans_Beauregard_7.jpg"]},"Consult_chateau_formulaire9587":{"id":"Consult_chateau_formulaire9587","dept":"39","canton":"Voiteur","commune":"Domblans","nom":"Blandans_Muyre","type":"Château","periode":"XVI","histoire":"DOMBLANS:  Les Seigneurs de Charrin possédèrent la seigneurie de Domblans jusqu'au XVe siècle, Claude de Vautravers, écuyer,  achète en 1444 la seigneurie de Domblans aux enfants d'Antoine de Toulongeon, chevalier, seigneur de Montrichard.   Philibert de Vautravers,  fit commencer, en 1562, la construction dun beau château à Verges (voir article) et mourut en 1587   sa femme reçut   en août 1595, Henri IV  aurait séjourné quelques jours dans ce château. La fille de Philibert de Vautravers, Renée de Vautravers, se maria à Claude-François de Fouchier, baron de Savoyeux, seigneur de l'Etoile, qui se ruina. En 1625, son fils vendit la seigneurie de Domblans à M. Louis de Grain de Saint-Marsault,  Elisabeth de Grain de Saint-Marsault épousa en 1695 Charles-Guillaume Timonet des Gaudières, lieutenant-colonel d'infanterie, son fils Claude Désiré  vendit en 1817 à M. Chevassus.      BLANDANS, en 1233 fait partie des fiefs du comte de Chalon sous les rois bourguignons, le château de Blandans de l'époque, aujourd'hui rasé, était le chef lieu d'une prévôté en 1446, sur les vestiges d'un édifice plus ancien, l'autorisation de reconstruire le château de Domblans . En 1821,  fusion  des villages de Blandans, Domblans et La Muyre.                                                               MUYRE:  maison forte du XIIe siècle, construite sur des ruines gallo-romaines,  propriété des comtes De Grivel depuis 1624. La restauration du château a été réalisée par le Comte Claude De Grivel (1907-1976), en collaboration avec une équipe de Compagnons pendant 20 ans.","architecture":"Domblans , le château est situé au nord-est du village  près de léglise, il se compose de deux corps de bâtiments formant une équerre, à la pointe du triangle et aux extrémités de ses côtés, sont trois tours circulaires ayant environ sept mètres de diamètre, au sommet intérieur du triangle, se trouve une autre tour renfermant lescalier, au nord de la cour, une tour circulaire isolée, appelée autrefois la prison, avec des corbeaux en pierre qui supportent un colombier carré. Toutes ces tours sont percées de meurtrières. Les fenêtres du château sont géminées à quatre compartiments.  les autres côtés étaient défendus par de profonds fossés de 11 m 50 de largeur, encaissés dans des murs. Au XIVe siècle, la tour comporte un cellier, une salle basse et quatre tourelles. Le XVIe siècle donne au château sa forme actuelle.                                                       Blandans, au XVe siècle, remanié au XIXe siècle et au XXe siècle. L'édifice de plan en U intègre le cellier  et la salle basse voûtée de la tour médiévale.  le corps de bâtiment principal avec ses tours.  Une tour d'escalier en vis dessert le corps de bâtiment principal qui conserve deux tours circulaires sur les angles de l'ancien pignon.  Au XIXe siècle, l'aile nord des communs est développée, en totalité, les façades et les toitures des ailes sud et nord, domaine viticole.                                                                                        Muyre. Maison forte du XIIe siècle, construite sur des ruines gallo-romaines.","habitants":"Claude de Vautravers\r\n        \"","divers":"Château de Domblans, Blandans et de Muyre","gps":"","images":["../../jctruffet.com/image/image_39/39_Blandans_Muyre_1.jpg","../../jctruffet.com/image/image_39/39_Blandans_Muyre_2.jpg","../../jctruffet.com/image/image_39/39_Blandans_Muyre_3.jpg","../../jctruffet.com/image/image_39/39_Blandans_Muyre_4.jpg","../../jctruffet.com/image/image_39/39_Blandans_Muyre_5.jpg"]},"Consult_chateau_formulairea972":{"id":"Consult_chateau_formulairea972","dept":"39","canton":"Arbois","commune":"Arbois","nom":"Bontemps","type":"Château","periode":"XVI","histoire":"BONTEMPS,  saccagé  en 1479 par les troupes du roi de France Louis XI. Les ruines sont vendues par Maximilien de Habsbourg, marié à Marie de Bourgogne, à Pierre Bontemps, chanoine de l'église Notre-Dame, frère de Jehan Bontemps, trésorier général de Bourgogne. En 1510 Le château est habité par Pierre Bontemps qui lui a laissé son nom. Après l'avoir reconstruit, il a ajouté une aile à l'est  en 1792. Restera dans la famille Bontemps jusqu'à la Révolution. Ils sont déclarés émigrés et le château est mis sous séquestre. Il est vendu comme bien national en 1793. Il connaît alors plusieurs acquéreurs. En 1847 mis en vente par le tribunal d'Arbois, il est acheté par l'architecte André Perrard qui le transforme dans le goût du temps. En 1925 Il est la propriété d'Antoine de Grimaldi, banquier à Paris. En 1950 Il est acheté par la famille Cartault qui l'occupe jusqu'en 1989.","architecture":"Bontemps;   au XIIIe siècle siècle Le château fait partie du système de défense de la ville, au  XVIe siècle,  site archéologique, avec les vestiges,  du vieux-château façades et toitures du corps de logis principal, de l' aile Nord et de l' aile Ouest  y compris les galeries sur cour, tour d' escalier, avec les vestiges archéologiques qu' ils peuvent renfermer des murs de soutènement de l' immeuble et du jardin.","habitants":"Maximilien de Habsbourg\r\n        \"","divers":"Château de Bontemps","gps":"","images":["../../jctruffet.com/image/image_39/39_Bontemps_1.jpg","../../jctruffet.com/image/image_39/39_Bontemps_2.jpg","../../jctruffet.com/image/image_39/39_Bontemps_3.jpg","../../jctruffet.com/image/image_39/39_Bontemps_4.jpg"]},"Consult_chateau_formulaire324e":{"id":"Consult_chateau_formulaire324e","dept":"39","canton":"Montmirey-le-Château","commune":"Brans","nom":"Brans","type":"Château","periode":"XVIII","histoire":"BRANS; est cité au XIIe siècle. L'ancien château aurait été établi au lieu dit le Chatelot, il ne reste plus rien de la maison forte que Jean Chalon dit l'Antique avait construite. Situé à proximité, l'édifice actuel, construit au XVIe siècle  par Benoit Charreton trésorier du roi d'Espagne. Adjugée en 1656 par le bailliage de  Dole  à Joachim de Vaux  qui restera dans cette famille jusqu'à la fin  du XVIIIe siècle vendu comme bien national en 1790 à divers propriétaires  dont à la famille de Belon d'Aligny  de 1828 à 1923   qui le remanièrent,  comblèrent les fossés et démolirent les murs crénelés","architecture":"Brans;  situé au centre du village construit au XVIIIe siècle corps de logis principal flanqué de deux ailes en retour d'équerre ,  présentait une forme encore médiévale avec fossés et échauguettes.  Au XVIIIe siècle, ouverture de baies extérieures et suppression de la porte d'entrée avec pont levis. Au  XIXe  siècle, le château est doté d'une tour carrée couronnée de mâchicoulis et de décors intérieurs (deux salles néo-gothiques). Les façades et les toitures de tous les bâtiments, les décors de la salle des gardes et de la salle à manger au rez de chaussée du bâtiment sud du logis, la cours, les jardins, le verger, le parc et le portails.","habitants":"Benoit Charreton \r\n        \"","divers":"Château de Brans","gps":"","images":["../../jctruffet.com/image/image_39/39_Brans_1.jpg","../../jctruffet.com/image/image_39/39_Brans_2.jpg","../../jctruffet.com/image/image_39/39_Brans_3.jpg","../../jctruffet.com/image/image_39/39_Brans_4.jpg","../../jctruffet.com/image/image_39/39_Brans_5.jpg"]},"Consult_chateau_formulaire042c":{"id":"Consult_chateau_formulaire042c","dept":"39","canton":"Clairvaux-les-Lacs","commune":"Fontenu","nom":"Chalain","type":"Vestiges","periode":"XV","histoire":"CHALAIN, cette seigneurie dépendit souvent de celle de Monnet. Plusieurs familles ont porté le nom de Chalain, dont les Moreau de Chalain.  La seigneurie de Chalain, qui outre le lac, incluait les terres de Fontenu, de Doucier et de Marigny a été le fief de diverses familles, avant d'aboutir en 1693 aux Blandin de Chalain, qui étaient également seigneurs de Beauregard, de Blesney et du Mesnois et dont la branche locale s'est éteinte dans les années 1960, mais dont il subsiste diverses branches aujourd'hui, L'ensemble a été alors acquis par le département du Jura. La dernière famille de Chalain subsistante, Blandin de Chalain, ils possédèrent château et le lac jusqu'au année 1948, pour se rapprocher de sa fille qui résidait non loin à la Buchille. Après la dernière guerre le château brûla.","architecture":"Chalain;  au Moyen-Âge, vers le XIIIe siècle, on note l'existence d'un château-relais de chasse dans le fond de la reculée, sur une légère butte. Il reste les ruines de ce bâtiment remanié au cours des siècles principalement aux XVIe et XVIIIe siècles. En 1948,  petit manoir du XVe siècle avec tourelle et chapelle intérieure, a été dévasté par un incendie allumé malencontreusement par des scouts de passage  en août 1948. Subsiste la façade sud  s'avance en saillie une tour octogonale qui contient l'escalier et la remarquable entrée principale.  En ruine au moment du rachat par le département du Jura, le château na été restauré que sommairement, il nen subsiste que les murs.","habitants":"Famille de Moreau de Chalain\r\n        \"","divers":"Château de Chalain avant et après","gps":"","images":["../../jctruffet.com/image/image_39/39_Chalain_1.jpg","../../jctruffet.com/image/image_39/39_Chalain_2.jpg","../../jctruffet.com/image/image_39/39_Chalain_3.jpg","../../jctruffet.com/image/image_39/39_Chalain_4.jpg","../../jctruffet.com/image/image_39/39_Chalain_5.jpg","../../jctruffet.com/image/image_39/39_Chalain_6.jpg"]},"Consult_chateau_formulaire275c":{"id":"Consult_chateau_formulaire275c","dept":"39","canton":"Arbois","commune":"Montigny-les-Arsures","nom":"Champagne_Bancenel","type":"Maison forte","periode":"XVII","histoire":"CHAMPAGNE, Henri Colin, originaire de Pontarlier, premier conseiller et vice-président au parlement de Dole, s'établit à Salins par le mariage qu'il y contracta, avant l'an 1544, avec Nicole de Vers, et y attira ses autres frères. Pierre-Prosper Colin, écuyer, seigneur de Champagne, l'un des descendants de Nicolas Colin, frère d'Henri, épousa à Montigny, en 1697, Claude-Françoise, fille de Gérard de Crécy, seigneur du château de ce lieu, et prit la qualité de seigneur de Montigny, quoiqu'il n'y eût qu'un fief sans justice. Philippe-Emmanuel, son fils, se qualifiait de Montigny-Colin.\r\nBANCENEL, La famille Bancenel possédait deux domaines à Montigny. M. Pierre-Joseph de Bancenel ayant émigré, ses biens furent vendus nationnalement. L'une des maisons, flanquée de tours, était proche du château de M. Boutechoux, l'autre, proche de la maison de M. Besuchet, fut apportée en dot par Mlle Gilliard, de Salins, à M. Bourqueney, frère du président de la cour d'appel de Besançon et parent de M. de Bourqueney, ambassadeur de France à Vienne.\r\nVAUXELLE, avait un fief de mairie qui fut possédé par une famille noble établie à Arbois et connue sous le nom de ce village. Ce fief passa à la famille de Chavirey. Jean de Chavirey, onzième du nom, était seigneur de Vauxelle et d'Ivory sur la fin du XVe siècle. Le château et le domaine appartenu aussi à M. Laurençot d'Arbois, par une alliance.","architecture":"Champagne;  la maison de ce fief du XVe siècle, flanquée d\"une tourelle, sert aujourd'hui de presbytère,                                        Bancenel,  vestiges  du château et manoir du XVIe siècle ensemble de bâtiments en forme de U .                                               Vauxelle, manoir du XVe siècle à deux niveaux flanqué de pavillons sur les côtés.","habitants":"seigneur de Montigny\r\n        \"","divers":"Maison forte de Champagne de Bancenel et de Vauxelle","gps":"","images":["../../jctruffet.com/image/image_39/39_Champagne_Bancenel_1.jpg","../../jctruffet.com/image/image_39/39_Champagne_Bancenel_2.jpg","../../jctruffet.com/image/image_39/39_Champagne_Bancenel_3.jpg","../../jctruffet.com/image/image_39/39_Champagne_Bancenel_4.jpg","../../jctruffet.com/image/image_39/39_Champagne_Bancenel_5.jpg"]},"Consult_chateau_formulaireeac7":{"id":"Consult_chateau_formulaireeac7","dept":"39","canton":"Voiteur","commune":"Voiteur","nom":"Charrin","type":"Château","periode":"XIV","histoire":"CHARRIN; le château sur une petite butte du village de Voiteur au pied du rocher de Château-Chalon, rappelle la  Seigneurie de Charrin, l'une, au Moyen-Age, des plus considérables  du val de Voiteur.  Au XIIIe siècle, la terre de Charrin avait  pour seigneur  Simon de Charrin. Elle passa par  succession aux Dieulefit, seigneurs d'Aumont, puis   par mariage à un bâtard de la famille de Chalon qui prit le nom de Montrichard.   Au XVe siècle elle passa de la famille de Rye à Claude de Vautravers écuyer de Charles le Téméraire. Le château échut aux Ursulines, elles le transformèrent au XIXe siècle en un pensionnat de jeunes filles, cédé en 1950 aux missionnaires  de N-D de la Salette, il est devenu un collège privé.                         Dans la commune le château de Saint-Martin.","architecture":"Charrin,  vaste édifice composé de plusieurs corps de bâtiments  épaulés de tours circulaires ou semi-circulaires percées de  meurtrières et de canonnières. A l'arrière, deux tours cylindriques cantonnent aux angles la façade flanquée au centre d'une autre tour ronde, de nombreuses modifications et la construction d'une Chapelle ont altéré l'aspect de cet immense château, mais  les tourelles et fenêtres à meneaux subsistent, témoins de son passé.      St_MARTIN; château connu dès le XIIIe siècle. Le bâtiment des communs et du logis est prolongé par un jardin régulier. Il reste des traces d'anciens bâtiments et la chapelle , édifice d'influence romane, voûté en berceau brisé avec  baie flamboyante au chevet. Les communs comportent des salles voûtées. Le logis a été remanié au XVIIIe siècle,  et conserve une tour d'escalier en vis avec bretèche surmontée d'un pigeonnier.","habitants":"Famille de Rye\r\n        \"","divers":"Château de Charrin et de Saint-Martin.","gps":"","images":["../../jctruffet.com/image/image_39/39_Charrin_1.jpg","../../jctruffet.com/image/image_39/39_Charrin_2.jpg","../../jctruffet.com/image/image_39/39_Charrin_3.jpg","../../jctruffet.com/image/image_39/39_Charrin_4.jpg","../../jctruffet.com/image/image_39/39_Charrin_5.jpg","../../jctruffet.com/image/image_39/39_Charrin_6.jpg","../../jctruffet.com/image/image_39/39_Charrin_7.jpg","../../jctruffet.com/image/image_39/39_Charrin_8.jpg"]},"Consult_chateau_formulaireb797":{"id":"Consult_chateau_formulaireb797","dept":"39","canton":"Voiteur","commune":"Château-Chalon","nom":"Chateau_Chalon","type":"Abbaye","periode":"VII","histoire":"CHATEAU-CHALON ; en 1156 Frédéric Barberousse épousa Béatrice de Bourgogne dont le château a gardé des traces,le château fort relevait au XIIIe siècle des comtes de Bourgogne il fut détruit en 1595.  Une importante abbaye bénédictine pour femmes abbesses nobles  tel que Guillemette d'Andelot, Marie-Anne de Watteville  a existé à Château-Chalon de l'époque carolingienne à la Révolution. Elle s'est sécularisée au XIIIe siècle pour devenir une abbaye de chanoinesses nobles. Aujourd'hui démolie, elle jouxtait l'église Saint-Pierre du XIIe siècle. La tradition légendaire prétend que ce sont les chanoinesses de cette abbaye qui auraient fait venir de Tokay les plants de vigne qui ont fait la réputation du vignoble.                                                                                      St-MARTIN;  château est connu dès le XIIIe siècle,   ce château est caractéristique d'une   ancienne maison forte du XVIe siècle, en grande partie réaménagée au XVIIIe siècle, corps central et chapelle bâtis  au XVe ou XVIe siècle, avec baies  du XVIIIe siècle ; corps de bâtiment gauche édifié au XVIe ou XVIIe siècle;   corps de bâtiment de droite construit au XIXe siècle. Cette vaste et belle demeure, en grande partie du XIVe siècle a été agrandie au XVIIe et XVIIIe siècles.  Mr et Mme Keller, propriétaire de ce lieu.          A l'opposé de la colline Ménétru les Vignobles, une maison forte du XVe siècle.","architecture":"Château-Chalon; est une petite cité Comtoise au sommet d'un piton rocheux située à  huit kilomètres au Nord de Lons Le Saunier, a conservé les ruines du château-fort du XIIIe siècle, le donjon  était  carré et ses angles englobés dans des tourelles cylindriques, il ne subsiste aujourd'hui qu'une seule tourelle et quelques pans de courtines, vestiges des fortifications  du XIIIe siècle, dont la tour  du XVe siècle,  le  village du XVe siècle suspendu sur une falaise, né du château qui lui a laissé son nom, Abbaye du XVIe-XVIIIe siècle,   la maison du Froid-Pignon, ancienne hôtellerie,  dont la couverture est classée avec  pigeonnier, la demeure de l'abbesse Catherine de Rye et des anciens châtelains de l'abbaye du XVIe-XIXe siècle, La maison de chanoinesse du XVIIIe siècle, au belvédère de la Rochette,                                                      Ménétru les Vignobles, la maison forte relève d'un style du XVe siècle et du XVIe siècles, bâtiments entourant une cour quadrangulaire cantonnée de tours. Quelques modifications aux XVIIe siècle, portail, porte d'entrée, au XVIIIe et XIXe siècles  le balcon métallique. La date  1626 portée par le portail d'entrée correspond sans doute à un remaniement de détail.","habitants":"Guillemette d'Andelot\r\n        \"","divers":"Château-Chalon et ses vestiges et la maison forte de St-Martin","gps":"","images":["../../jctruffet.com/image/image_39/39_Chateau_Chalon_1.jpg","../../jctruffet.com/image/image_39/39_Chateau_Chalon_2.jpg","../../jctruffet.com/image/image_39/39_Chateau_Chalon_3.jpg","../../jctruffet.com/image/image_39/39_Chateau_Chalon_4.jpg","../../jctruffet.com/image/image_39/39_Chateau_Chalon_5.jpg","../../jctruffet.com/image/image_39/39_Chateau_Chalon_6.jpg"]},"Consult_chateau_formulaire6c46":{"id":"Consult_chateau_formulaire6c46","dept":"39","canton":"Lons-le-Saunier","commune":"La Châtelaine","nom":"Chatelaine","type":"Château","periode":"XVII","histoire":"CHATELAINE; le château est fondé par les comtes de Bourgogne. Il est cité pour la première fois en 1572. Mahaut d'Artois y fera plusieurs séjours au début du XIVe siècle. Louis XIV érigea La Châtelaine en seigneurie particulière au profit de Claude-Pierre Marchand qui la légua à sa nièce, épouse de Guérard Gabriel Merceret, dit de Vers, seigneur de Vaudrey. En 1729, Louis XV en  ordonna la vente et Charles Regnault d'Epercy d'Arbois, avocat, s'en rendit acquéreur. A la Révolution il est vendu comme bien national, et passa au début  du XIXe siècle au Comte Marchant de Bannans, noble d'ancien régime, fait chevalier d'Empire à titre militaire en 1809 et appartenant au réseau familial des Vaulchier du Deschaux.","architecture":"Châtelaine;  subsiste les vestiges d'un ancien château du XIIe siècle, le château de la Châtelaine  au XVII-XVIIIe siècle, Il subit les dégradations des troupes de Louis XI et fut ruiné en 1479, c'est une enceinte quadrangulaire de 120 X 160 mètres. Il était protégé naturellement au nord et à louest, restauré vers 1742. Le château a été construit dans un vaste domaine entouré de murailles et de tours, il possédait un donjon et de nombreuses dépendances où logeait une garnison. L'édifice renommé \"Château dArtois\", a été profondément remanié et il est devenue une hostellerie. Deux tours coiffées en pyramide lui confèrent encore un air médiéval.","habitants":"Claude-Pierre Marchand \r\n        \"","divers":"Vestiges et château de Chatelaine.","gps":"","images":["../../jctruffet.com/image/image_39/39_Chatelaine_1.jpg","../../jctruffet.com/image/image_39/39_Chatelaine_2.jpg","../../jctruffet.com/image/image_39/39_Chatelaine_3.jpg","../../jctruffet.com/image/image_39/39_Chatelaine_4.jpg","../../jctruffet.com/image/image_39/39_Chatelaine_5.jpg"]},"Consult_chateau_formulairea503":{"id":"Consult_chateau_formulairea503","dept":"39","canton":"Chaussin","commune":"Chaussin","nom":"Chaussin","type":"Maison forte","periode":"XVIII","histoire":"CHAUSSIN;  en 1222, Simon II de Chaussin prête hommage au duc de Bourgogne pour la forteresse de Tavaux, Henri de Montfaucon, comte de Montbéliard, est alors seigneur de Chaussin qu'il reçut en 1330 de sa mère Mahaut, dame de la Marche et de Chaussin et en tant que fils de Gauthier de Montfaucon. L'armée du duc établit le siège de la forteresse de Chaussin, appartenant  par moitié aux Montfaucon et aux Chalon. En 1364, sur une convention, le roi reconnaît à Marguerite de Bourgogne la moitié de la terre de Chaussin,   le comte de Montbéliard, confirme que ce dernier conserve la moitié de Chaussin  qui devient une terre gérée directement par le duché de Bourgogne. En 1369, par alliance avec Margueritte, fille du comte de Flandre, Philippe le Hardi devient comte de Bourgogne. Henri de Montbéliard cède Chaussin à Marguerite en échange de Clerval et d'autres terres. Ceci est confirmé par une lettre du 12 juillet 1366 de Jehans sire de Montmartin, chevalier, bailli d'aval en comté de Bourgogne.","architecture":"Chaussin,  la ville médiévale comportait un ensemble de fossés en eau très développé et était dominée par le  château édifié sur une motte elle-même entourée de fossés. Le logis et ses communs et dépendances au pied   du côté nord de la motte, sont pour l'essentiel du XVIIIe siècle avec un apport, du début du XIXe siècle, par les  Michalet.  Motte féodale et château du XVIIIe siècle,   le logis en brique garde ses cheminées et quelques boiseries, les communs et dépendances, construits en pan de bois.","habitants":"Gauthier de Montfaucon\r\n        \"","divers":"Maison forte de Chaussin","gps":"","images":["../../jctruffet.com/image/image_39/39_Chaussin_1.jpg"]},"Consult_chateau_formulairec192":{"id":"Consult_chateau_formulairec192","dept":"39","canton":"Les Planches-en-Montagne","commune":"Chaux-des-Crotenay","nom":"Chaux","type":"Vestiges","periode":"XII","histoire":"CHAUX des Crotenay date du XIe siècle à 1673. Il fut construit par la famille de Commercy qui possédait aussi celui de Château-Vilain Les deux sont parmi les derniers à avoir été élevés car en 1301 le duc de Bourgogne avait imposé à Jean de Chalons-Arlay de nen plus construire.\r\n Ce château avait deux rôles important, assurer la protection de la population des alentours, et défendre  la   route de Genève et  du sel.   En 1419, la baronnie passa à la maison de Poupet, originaire de Salins. Ce sera l'âge  d'or du château de la Chaux. L'un des membres les plus illustres  fut Charles de Poupet, plus connu sous le nom  de seigneur de la Chaux. Le château fut démantelé en 1691 sous l'ordre de Louis XIV. Relevé, il fut une deuxième fois détruit en 1793 par le gouverneur de la Révolution.\r\nA ce jour le site du château est une propriété privée mais d'important travaux de sauvegarde sont effectués grâce a l'association archéo-jurasites.","architecture":"Chaux, à l'origine, vers l'an mil, ce devait être un château en bois avant d'être reconstruit en pierre au XIe ou XIIe siècle. Ce château avait deux rôles important, assurer la protection de la population des alentours.\r\nIl était flanqué de trois tours rondes, bâties sur le bord d'un rocher perpendiculaire. Un double fossé régnait à l'opposé. En 1668, la France rend la Franche-Comté à l'Espagne, mais avant de partir Louis XIV fait démolir toutes les forteresses sauf celle de Château-Vilain dont le seigneur a pactisé avec les français.","habitants":"Charles de Poupet\r\n        \"","divers":"Vestiges à la Chaux","gps":"","images":["../../jctruffet.com/image/image_39/39_Chaux_1.jpg","../../jctruffet.com/image/image_39/39_Chaux_2.jpg","../../jctruffet.com/image/image_39/39_Chaux_3.jpg"]},"Consult_chateau_formulaire3fad":{"id":"Consult_chateau_formulaire3fad","dept":"39","canton":"Lons-le-Saunier","commune":"Montigny-les-Arsures","nom":"Chavannes","type":"Château","periode":"XVI","histoire":"CHAVANNES, la famille Boutechoux, formait à la fin du XVe siècle trois branches , dont la seule qui subsiste se fixa à Salins vers 1525,  Jean Boutechoux, secrétaire de Charles Ier, roi d'Espagne  épousa à Salins, en 1526, Claudine, fille de Hugues de Vers et de Marguerite de Nozeroy, et devint par ce mariage possesseur d'un domaine féodal à Montigny. Louis, son fils, écuyer,  revint dans le comté et fut nommé contrôleur de la grande saunerie de Salins. Il épousa, en 1558, Claudine, fille de noble Henri Colin, premier conseiller et vice-président du parlement de Dole. Louis II de Boutechoux, écuyer, né en 1563,   capitaine de cavalerie. Il entra en 1605 comme gentilhomme dans la maison de Philippe-Guillaume de Nassau, prince d'Orange, et mourut à Besançon en 1630, après avoir institué François Boutechoux, son neveu, pour héritier, écuyer, seigneur de Chavannes, né en 1601, s'allia en 1630, avec Marguerite Merceret de Vers, son fils, Jérôme Boutechoux, écuyer, qui épousa en 1660, Jeanne, fille de  Georges La Pie, de Salins, seigneur de Gramans. Charles-Guérard Boutechoux, écuyer, son fils, seigneur de Chavannes et Villette, né en 1682, s'allia en 1712 à Magdeleine de Montrichard, qui le rendit père de Guillaume-Eléonore Boutechoux, prieuré de Lantenans et chanoine de l'église métropolitaine de Besançon, et de Jérôme-François-Eléonore Boutechoux.\r\nEn 1856, M. Frédéric-Guillaume-François, comte de Boutechoux de Chavanes, lieutenant-colonel de cavalerie en retraite, petit-fils et petit-neveu des précédents, possède et habite le domaine de ses ancêtres à Montigny.\r\nActuellement rénové, le château appartient à la famille Boutechoux de Chavanes, présente dès 1525 à Montigny. Les Boutechoux ont été seigneurs de Montigny,  avec les de Crécy, soit seuls de 1777 à 1810.","architecture":"Chavannes;  le château est dans le quartier saint-Laurent. Il se compose de plusieurs corps de bâtiments, d'une tourelle élégante, d'un beau parc. La chapelle de Saint-Laurent qui fut bénite de nouveau en 1700, faisait partie du château. L'entrée s'orne d'une très belle grille en fer forgé, les fenêtres mariées de grilles en encorbellement rappellent le temps où la Franche-Comté était espagnole.   Chavannes, avec ses corps de bâtiment, sa tourelle et sa chapelle, appartient depuis le XVIème siècle à la même famille                                                                                          Le château de Montigny, grande maison forte avec quatre tours et un pont levis, datant du XVe siècle. Aujourd'hui, les douves et le pont levis ont disparu, restent les bâtiments principaux.","habitants":"Famille Boutechoux\r\n        \"","divers":"Château de Chavanes et de Montigny","gps":"","images":["../../jctruffet.com/image/image_39/39_Chavanes_1.jpg","../../jctruffet.com/image/image_39/39_Chavanes_2.jpg","../../jctruffet.com/image/image_39/39_Chavanes_3.jpg","../../jctruffet.com/image/image_39/39_Chavanes_4.jpg"]},"Consult_chateau_formulaire68ad":{"id":"Consult_chateau_formulaire68ad","dept":"39","canton":"Chemin","commune":"Chemin","nom":"Chemin","type":"Vestiges","periode":"","histoire":"CHEMIN,  le village de Chemin, réuni à celui de Beauchemin  par une ordonnance du Roi Charles X , appartient à la plaine du Finage aux marges de la Bresse. Les terres en furent défrichées par les religieux de l'abbaye Saint-Oyan de Joux au XIIe siècle et les premiers seigneurs en furent les sires de Longwy. Un nouvel édifice, bâti au XVIe siècle,  appartenait au XIXe siècle à la famille des Rigollier de Parcey qui le fit passer par alliance dans la famille des comtes de Wall.","architecture":"Chemin, un nouvel édifice, bâti au XVIe siècle, remplace le château fort démantelé par les troupes de Louis XI en  1479, et constitue le château de Chemin, entouré de bâtiments de ferme, le corps de logis couvert d'un grand toit  à croupe et à lucarnes s'élève sur deux niveaux percés de fenêtres géminées à meneaux, il est épaulé, sur le côté  du toit en appentis d'un rajout. Une tour ronde au toit en poivrière marque l'entrée de la cour, sans doute le pigeonnier.","habitants":"Famille des Rigollier de Parcey\r\n        \"","divers":"Chemin hôtel de ville","gps":"","images":["../../jctruffet.com/image/image_39/39_Chemin_1.jpg"]},"Consult_chateau_formulaire6d79":{"id":"Consult_chateau_formulaire6d79","dept":"39","canton":"Montmirey-le-Château","commune":"Chevigny","nom":"Chevigny_Jura","type":"Vestiges","periode":"XII","histoire":"CHEVIGNY, en 1227  le légat pontifical en fit don au duc Othon de Méranie puis passa en 1256 au duc Jean de Chalon l'Antique, ces derniers s'allièrent aux Cicon au début du  XVe siècle, Guy de Cicon chevalier et sire de Chevigny bailly d'Aval en 1369 par alliance passa à la famille de Champdivers au XVe siècle, au Montfort au XVIe siècle à Charles de Montfort gentilhomme du roi d'espagne vend  le fief de Chevigny en 1624 à Lionel Labory de Salans seigneur de Biarne le gardèrent un siècle et fut succédé par plusieurs propriétaires.                                                                  A trois kilomètres le village de Menotey qui conserve  dans ses rues des habitations de style féodales  depuis le Moyen-Age qui ont même l'allure de petit château flanqués de tours meurtrières qui fut la demeure au XVIIIe siècle  de  Joseph-Jean-Philibert d'Orival","architecture":"Chevigny;  dans la vallée de la Borne, vestiges du  château du XIIIe siècle, appelé à l'époque forteresse, enceinte trapézoïdale polygonale  dans laquelle on pénètre  par une tour porte qui commandait un pont-levis, les angles   flanquée de trois  circulaires et d'un donjon carrés tours   détruites en partie et courtines délabrées  entouré d'un fossé, les corps de logis entouraient une cour précédé d'un pont-levis remplacé au XVIIIe siècle par un pont dormant tour quadrangulaire d'entrée à échauguette sur un angle et consoles de hourdage est percée d'une porte  charretière en plein cintre et d'une porte piétonne  surmontée  de rainures du pont-levis, créneaux des murs extérieures de la salle de garde et du corps de logis principal existent toujours, remanié aux cours des siècles, une partie a été utilisé en domaine agricole.","habitants":"Lionel Labory de Salans \r\n        \"","divers":"Vestiges du château de Chevigny","gps":"","images":["../../jctruffet.com/image/image_39/39_Chevigny_Jura_1.jpg","../../jctruffet.com/image/image_39/39_Chevigny_Jura_2.jpg","../../jctruffet.com/image/image_39/39_Chevigny_Jura_3.jpg","../../jctruffet.com/image/image_39/39_Chevigny_Jura_4.jpg","../../jctruffet.com/image/image_39/39_Chevigny_Jura_5.jpg"]},"Consult_chateau_formulairecbff":{"id":"Consult_chateau_formulairecbff","dept":"39","canton":"St-Amour","commune":"Chevreaux","nom":"Chevreaux","type":"Vestiges","periode":"XII","histoire":"CHEVREAUX, en 974, Manassès III, sire de Coligny, fit don des terres de \"Chevrel\" et \"Chastel\" aux moines de Gigny-sur-Suran. Le château est mentionné pour la première fois en 1158 dans une narration des moines de l'Abbaye du Miroir. Il était le siège d'une seigneurie faisant partie à l'origine de la principauté de Coligny ou souveraineté du Revermont. Elle fut possédée par la maison de Coligny de la construction jusqu'en 1332, en particulier par Humbert de Coligny, fondateur de l'Abbaye Notre-Dame du Miroir, puis par Guerric de Coligny. Elle passa ensuite aux seigneurs de Montluel de 1270 à 1332, aux Vienne de 1332 à 1651, puis aux Damas. La seigneurie reçoit le titre de baronnie vers le début du XVIe siècle.","architecture":"Le château et maison forte de Chevreaux, bien revêtus de tours et murailles en bonne défense, ensemble fortifié de remparts  tours rondes et carrées dont-il subsistent une de chaque. En 1637, au cours de la guerre de Dix Ans, le duc de Longueville assiège le château, qui est pris, pillé et saccagé de fond en comble, le donjon qui avait résisté aux coups de canon est détruit à la mine et les fortifications sont démolies. Depuis 1990, le château bénéficie de chantiers de restauration.","habitants":"Humbert de Coligny\r\n        \"","divers":"Vestiges de Chevreaux","gps":"","images":["../../jctruffet.com/image/image_39/39_Chevreaux_1.jpg","../../jctruffet.com/image/image_39/39_Chevreaux_2.jpg","../../jctruffet.com/image/image_39/39_Chevreaux_3.jpg","../../jctruffet.com/image/image_39/39_Chevreaux_4.jpg","../../jctruffet.com/image/image_39/39_Chevreaux_5.jpg"]},"Consult_chateau_formulairef96c":{"id":"Consult_chateau_formulairef96c","dept":"39","canton":"Dole","commune":"Choissey","nom":"Choissey","type":"Château","periode":"XVIII","histoire":"CHOISSEY, du Moyen Âge, Choissey a gardé sa motte féodale. Le seigneur avait le titre de Prévôt.  Le creusement du canal du Rhône au Rhin au début du XIXe siècle, en créant une barrière artificielle, a permis au village ancien de demeurer presque intact jusqu'à aujourd'hui.                                                                             PARTHEY. La seigneurie de Parthey ne dépendait pas de la seigneurie de Choisey mais de la Châtellenie de Dole. A la fin du 19e siècle, Louis Rouzet est chargé de compléter le parc, développer la partie Est du logis en pavillon et élever une chapelle de style néo-gothique.                                                          MENTHON: Ce château élevé au XVIIIe siècle par la famille Richardot contient de nombreux décors créés par le sculpteur Attiret. il passa à la famille de Menthon au début du XIXe siècle par alliance d'Anne Bonnaventure Richardot, fille de pierrre Joseph Désiré  Richardot seigneur de Choisey président de la chambre des comtes de Dole de 1754 à 1771, avec le comte de Balthazard de Menthon capitaine ce cavalerie maréchal des logis   Edifice du début du XVIIIe siècle, avec un jardin axé sur le perron latéral du corps de logis.","architecture":"Choisey comprend trois châteaux. Parthey et de Menthon.\r\nChâteau de Parthey du XIIIe-XVIIIe-XIXe siècle,   le château fort est en partie détruit en 1479, et mentionné inhabitable en 1525. Il aurait été restauré avec tours, murailles, fossés, pont-levis. Au début du XIXe siècle, il présente un corps de logis avec une tour sur l'angle. Menthon ,   édifice du début du XVIIIe siècle, avec un jardin axé sur le perron latéral du corps de logis. Décor de 1770. Parc  du XVIIIe siècle au XIXe siècle. Dans la seconde moitié du XVIIIe siècle,  réorganisation intérieure du logis et déplacement de la chapelle.\r\nMaison des Ursulines de Dole du XVIIIe siècle, actuelle mairie.","habitants":"Comte de Balthazard de Menthon \r\n        \"","divers":"Château de Menthon et de Parthey à Choissey et de la maison des Ursulines","gps":"","images":["../../jctruffet.com/image/image_39/39_Choissey_1.jpg","../../jctruffet.com/image/image_39/39_Choissey_2.jpg","../../jctruffet.com/image/image_39/39_Choissey_3.jpg","../../jctruffet.com/image/image_39/39_Choissey_4.jpg","../../jctruffet.com/image/image_39/39_Choissey_5.jpg","../../jctruffet.com/image/image_39/39_Choissey_6.jpg"]},"Consult_chateau_formulaire93f1":{"id":"Consult_chateau_formulaire93f1","dept":"39","canton":"Villers-Farlay","commune":"Chamblay","nom":"Clairvans","type":"Château","periode":"XIV","histoire":"CLAIRVANS,   d'abord brûlé puis reconstruit sous l'administration de Philippe le Bel en 1301, la seigneurie est passée entre différentes mains. Ses hauts remparts garnis de parapets, de créneaux, de tourelles élégantes et ses quatre pont-levis ont constitué  l'héritage des familles de Vienne, de Grammont et de Salives avant de devenir la propriété des  Saint-Mauris Châtenois en 1820. Ce fut le comte de Saint-Mauris Châtenois qui entreprit de rénover entièrement le monument en 1845, constatant l'usure profonde que lui avait infligé le temps. Après la mort du dernier des comtes de Saint-Mauris, le Château abrita  tantôt une gigantesque ferme dirigée par un riche banquier égyptien de 1914 à 1933, puis par la Marquise de Rosichi, tantôt une maison de santé mise en  place par le Docteur Cartault en 1937, avant que Peugeot ne l'investisse pour y accueillir des colonies de vacances. C'est en 1989 que la famille Vuillemin en fait l'acquisition , et ont entrepris de réaménager la demeure pour ouvrir ses portes à des personnes désireuses d'organiser des banquets ou des séminaires. Château du XIXe siècle  transformé en hôtel restaurant de luxe.","architecture":"Château de Clairvans à Chamblay  du XIV siècle au cur du Val d'Amour en Franche Comté, corps de logis rectangulaire à trois niveaux  deux pavillons saillants aux extrémités formant un U, avec entrée saillante décalé en balcon le premier sur colonnes au deuxième une terrasse, le troisième également  et fronton, deux tours octogonales sur angles à l'opposée à toit pointu, formant un bel ensemble.","habitants":"Comte de Saint-Mauris Châtenois\r\n        \"","divers":"Château de Clairvans","gps":"","images":["../../jctruffet.com/image/image_39/39_Clairvans_1.jpg","../../jctruffet.com/image/image_39/39_Clairvans_2.jpg","../../jctruffet.com/image/image_39/39_Clairvans_3.jpg","../../jctruffet.com/image/image_39/39_Clairvans_4.jpg","../../jctruffet.com/image/image_39/39_Clairvans_5.jpg"]},"Consult_chateau_formulaire920d":{"id":"Consult_chateau_formulaire920d","dept":"39","canton":"Clairvaux-les-Lacs","commune":"Clairvaux-les-Lacs","nom":"Clairvaux_Boissia","type":"Vestiges","periode":"XIII","histoire":"CLAIRVAUX. Les Romains la nommèrent Clara-Vallis, la vallée claire, ce qui donna par la suite Clairvaux. La première trace écrite de Clairvaux-les-Lacs remonte à 1089. Les plus anciens registres de l'état civil datent de 1640. Le village avait un château datant du XIIe siècle, qui fut démantelé vers 1668 après la signature du traité d'Aix-la-Chapelle, un autre château fut construit au XIIIe siècle par les sires de Cuiseaux, bâti à un point stratégique dune croisée des routes de Salins, Lons le Saunier, et Genève,  La demeure fut délaissée  après les pillages de 1637 et un incendie au cours desquels il fut en partie détruit en même temps que le Bourg.               Dans le canton le château de Boissia est une propriété d'une  privée.","architecture":"Clairvaux, tour de l'ancien château du XIIIe-XVe-XVIIe siècle, du château du XIIe siècle, séparé du bourg par un fossé, occupait la pointe nord du plateau,  l'édifice comptait de fortes murailles crénelées, des portes pourvues de puissants ponts levis. Il avait également deux grosses tours rondes, élevées chacune sur cinq étages, qui  flanquaient son corps de logis principal compris entre les deux ailes. Dépendances et  écuries étaient considérables, réparties entre cour dhonneur et basse-cour, par un jardin, une fontaine et un colombier,   il ne reste aujourdhui quune seule tour sur les quatre dorigine, haute tour ronde à trois étages, ouverte de trois fenêtres à pilastres et  frontons triangulaires, coiffée dun toit en poivrière,  La tour a servi, au XIXe siècle, de prison  alors quau  XXe siècle elle servit dhabitation pendant une longue période. Il ne subsiste des murailles que quelques reliefs.                                  Boissia; façades et toiture , tour d'escalier , chapelle , trois cheminées à hotte du corps central , vestiges de piédroits au sud du corps de logis.","habitants":"sires de Cuiseaux,\r\n        \"","divers":"Château de Clairvaux et de Boissia","gps":"","images":["../../jctruffet.com/image/image_39/39_Clairvaux_Boissia_1.jpg","../../jctruffet.com/image/image_39/39_Clairvaux_Boissia_2.jpg","../../jctruffet.com/image/image_39/39_Clairvaux_Boissia_3.jpg","../../jctruffet.com/image/image_39/39_Clairvaux_Boissia_4.jpg","../../jctruffet.com/image/image_39/39_Clairvaux_Boissia_5.jpg"]},"Consult_chateau_formulaireb2c9":{"id":"Consult_chateau_formulaireb2c9","dept":"39","canton":"Chaumergy","commune":"Commenailles","nom":"Commenailles","type":"Château","periode":"XV","histoire":"COMMENAILLES, l'ancien château avait pour seigneurs, à la fin du XVe siècIe, les Fauquier de Poligny, il  reste plus rien du château. Le château actuel l'a remplacé en 1677 pour Nicolas Moréal qui fit ériger en baronnie. Son  fils, le baron Claude-Nicolas Moréal, vendit Commenailles au marquis de Durfort, héritier d'une ancienne maison de l'aristocratie de cour, qui en resta propriétaire jusqu'à la Révolution, tragique pour lui puisqu'il fut guillotiné pendant la Terreur, pendant que les paysans se ruaient sur le château pour y brûler chartes et titres. Le Comte de Faucigny,  époux d'une Durfort, garda le château jusqu'en 1860, acheté par Edmond Monnier, maître des forges de Baudin.                               Dans la commune le château de la Piotière et de Nantilly.","architecture":"Commenailles  c'est une imposante demeure  de plan rectangulaire, épaulée à l'est par un avant-corps, coiffée d'un immense toit en croupe,  édifice corpulent  mais élégant par la sobriété de ses ouvertures, de ses ils-de-buf de part et d'autre de la porte qui ouvre sur le parc menant à l'étang. L'ancien château de Commenailles, construit en briques s'élevait sur une motte artificielle, son emplacement se reconnaît encore près du château moderne. Le château actuel construit en 1677, est entre l'église et le grand étang. Il est entouré d'un vaste parc. Il y avait sur l'étang un moulin autrefois banal, et à coté une tuilerie qui ont été démolis vers 1820.","habitants":"les Fauquier de Poligny\r\n        \"","divers":"Château à Commenailles","gps":"","images":["../../jctruffet.com/image/image_39/39_Commenailles_1.jpg"]},"Consult_chateau_formulaire7a34":{"id":"Consult_chateau_formulaire7a34","dept":"39","canton":"Arinthod","commune":"Cornod","nom":"Cornod","type":"Château","periode":"XIV-XIX","histoire":"CORNOD;   Etienne de Viremont, premier seigneur en 1350 et en  1398  Bonnette de Viremont  laisse Cornod à son fils d'un premier mariage, Jean de Ville, ce dernier sans postérité lègue Cornod  en 1414 au profit de sa sur Isabelle de Ville, alliée à Etienne.  Son fils Claude de Seyturier, seigneur de Cornod, meurt célibataire. En 1439 Pierre de Seyturier, fils d'Etienne. En 1536 Claude de Seyturier. Jean de Seyturier, seigneur de Cornod,  en  1600  à la mort de Gaspard-Pierre de Seyturier au siège de Bourg, sans enfant, c'est son frère, Charles-Emmanuel, qui devient son héritier direct. En 1635 Charles-Emmanuel, baron de Cornod et de Montdidier, seigneur de Vaugrigneuse La Haute, laisse ses biens à plusieurs personnes de la famille. Finalement, après un procès difficile entre les héritiers, Pierre de Seyturier prend possession de la baronnie. En 1637 pendant le procès  Cornod fut sans seigneur  et en 1686  Jean-Claude de Montaigu achète la baronnie. En 1689   Claude-Louise Marie de Seyturier rachète la baronnie et la légua à son petit-fils,  Claude-Marc, le 25 février 1696.  Marc de la Poype, héritier des Seyturier, député de la noblesse en 1790, en 1791 Marc et son fils Gabriel quittent le château pour se réfugier en Suisse à Fribourg,   Le château et les terres de la Poype, déclarés biens nationaux, sont vendus à plusieurs centaines de personnes.  En  1826  Georges Albert, ancien colonel de la Vieille Garde, achète la baronnie.\r\nEn 1876  son fils Édouard Albert vend la baronnie à Louis-Claude Piaton, industriel lyonnais, qui fait des travaux importants de restauration du bâtiment et du parc.  Édouard Marie Sieradzki, depuis 2002, semploie avec passion à redonner  au domaine son lustre dantan.","architecture":"Cornod;  château du XIVe siècle remanié au XVIe et au XIXe siècle. En 1876, les architectes Henri Despierre et Henri Feuga sont chargés de remanier le logis, et de développer les communs et le parc. Près du donjon carré, le logis à deux tours d'angle   et échauguette, est relié à une tour carrée par une galerie.   Il conserve un ensemble de pièces au décor néo gothique, desservies par un escalier monumental, les communs et les dépendances se développent sur plusieurs cours. Le parc à l'est, les falaises avec une grotte et au nord, des terrasses avec une cascade.","habitants":"Famille de Seyturier\r\n        \"","divers":"Château de Cornod","gps":"","images":["../../jctruffet.com/image/image_39/39_Cornod_1.jpg","../../jctruffet.com/image/image_39/39_Cornod_2.jpg","../../jctruffet.com/image/image_39/39_Cornod_3.jpg","../../jctruffet.com/image/image_39/39_Cornod_4.jpg","../../jctruffet.com/image/image_39/39_Cornod_5.jpg","../../jctruffet.com/image/image_39/39_Cornod_6.jpg"]},"Consult_chateau_formulaire42c8":{"id":"Consult_chateau_formulaire42c8","dept":"39","canton":"Lons-le-Saunier","commune":"Cousance","nom":"Cousance","type":"Château","periode":"XVII","histoire":"COUSANCE, le château appartenait à la vaste baronnie de Chevreaux et son château illustrait sa puissance au XIIIe siècle. Sa position, au contact de la plaine et de la montagne, en fit la cible visée de tous les gens de guerre des armée d'invasion, celles de Louis XI en 1477, d'Henri IV en 1595, de Louis XIII en 1637. Murs et tours ne résistèrent pas à tant d'assauts. Dans les années 1660, Claude Damas, gouverneur et lieutenant général au pays des Dombes, époux d'Alexandrine de Vienne héritière de la baronnie de Chevreaux, ne put que tenter la consolidation de ce qui n'avait pas été détruit. Après la Révolution, le château fut tout à fait démoli. Un tanneur et étapier de Lons-le-Saunier, Denis Godefin, acheta le château en 1806. A sa mort, sa sur, Timothée Clerc en hérita. Ce sont  ses descendants  qui l'occupent encore aujourd'hui, fiers de l'histoire des ancêtres de la demeure dont les portraits éclairent les lambris des salons.","architecture":"Cousange, château du XVIIIe siècle, corps de logis rectangulaire, à deux niveaux, toiture en croupe avec fronton en façades, deux niveaux dépendances sur façades côté gauche.","habitants":"Claude Damas\r\n        \"","divers":"Château de Cousance","gps":"","images":["../../jctruffet.com/image/image_39/39_Cousance_1.jpg","../../jctruffet.com/image/image_39/39_Cousance_2.jpg"]},"Consult_chateau_formulaireeae2":{"id":"Consult_chateau_formulaireeae2","dept":"39","canton":"Orgelet","commune":"Cressia","nom":"Cressia","type":"Forteresse","periode":"XIV","histoire":"CRESSIA, Jean de Chalon l'Antique, suzerain de la seigneurie de Cressia, la donna en fief à la maison de Coligny  le sire d'Andelot se qualifiait, en 1250, de seigneur de Cressia. En 1307  Polis de Coligny sire d'Andelot habite le château. Au début du XIVe siècle,  Sires de Coligny, seigneurs de Cressia, que les résistant des bandes de Lacuzon  tenaient pour collaborateurs de l'ennemi. Le château échappa aux destructions de Louis XIII et de Louis XIV  Roger de Rabutin, cousin de Mme De Sévigné y fut envoyé en exil par Louis XIV, il a écrit de nombreuses lettres à Mme De Sévigné depuis Cressia. Au XVIIIe siècle, le château fut vendu à la famille Michaud qui avait émigré à la Révolution. Par la suite le château connut plusieurs propriétaires en particulier Mr De Villeran qui le restaura après lincendie de 1839.","architecture":"Cressia a été construit au début du XIVe siècle. Cétait une forteresse militaire avec donjon, enceintes quadrangulaire trois angles occupés par des tours carrées , le quatrième par le donjon logeable de 14 mètres de côté , il était entouré dun grand fossé,  ont y rentre par une tour porte qui commandait un  pont-levis au milieu de la face est.  Aujourdhui il reste le donjon carré de la face nord et la tour carrée de la face dentrée, dautres éléments sont venus sajouter. Le pont-levis a été remplacé par un pont de pierre.  La tour du guetteur, à moitié détruite en 1850, a été reconstruite au début du XXe siècle.\r\nEn 1944, ce château a été ravagé par les bombardements et un incendie.\r\nEn 1949, une entreprise de construction formée de jeunes, s'installe au château. Une association pilote le projet qui consiste à le  reconstruire. Les tours et les donjons témoignent toujours aujourd'hui de l'importance de cette forteresse médiévale.\r\nCe château,  a abrité un hôpital de lépreux  au XIVe siècle, est à ce jour une école privée.","habitants":"Sires de Coligny\r\n        \"","divers":"Forteresse des Cressia","gps":"","images":["../../jctruffet.com/image/image_39/39_Cressia_1.jpg","../../jctruffet.com/image/image_39/39_Cressia_2.jpg","../../jctruffet.com/image/image_39/39_Cressia_3.jpg","../../jctruffet.com/image/image_39/39_Cressia_4.jpg","../../jctruffet.com/image/image_39/39_Cressia_5.jpg","../../jctruffet.com/image/image_39/39_Cressia_6.jpg","../../jctruffet.com/image/image_39/39_Cressia_7.jpg"]},"Consult_chateau_formulaire1206":{"id":"Consult_chateau_formulaire1206","dept":"39","canton":"Montmirey-le-Château","commune":"Dammartin-Marpain","nom":"Dammartin_Montrambert","type":"Château","periode":"XVII","histoire":"DAMMARTIN; le château, propriété de la famille Mayrot, pillé par les troupes d'Henri IV en 1595, endommagé pendant la guerre de dix ans, fut reconstruit à la fin du XVIIe siècle. En 1771, la terre de Dammartin passa aux Froissard de Broissia par le mariage d'Anne Marie Mayrot avec Marie Charles Hilaire Flavien, marquis de Froissard, seigneur de  Broissia et Neublans.  Au milieu  d'un grand parc abandonné, le château a aujourd'hui l'allure d'une grande bâtisse campagnarde.                                                   MONTRAMBERT mentionné dès 1260, ce château fait partie d'une série de petites forteresses édifiées au Moyen Age dans la vallée de l'Ognon. Le corps de logis a été construit au XVIe siècle. Le marquis de Choiseul en devint propriétaire  au XVIIIe siècle. Ses biens furent confisqués  et vendus comme bien nationaux à la Révolution. Le château fut acheté en 1839 par Paul Grenier, soldat qui deviendra général dempire et sera anobli et passera a Jean Menans, riche industriel et maître de forges, sa famille en est toujours propriétaire.  Les Familles Grenier et Menans ont effectués de nombreuses restaurations  dont il ne reste dorigine que la tour octogonale. La chapelle néo-romane date de 1884.","architecture":"Dammartin;  deux châteaux privés, le château de Dammartin, date, pour l'essentiel du bâtiment, du XVIIe au XVIIIe siècle, il est mitoyen avec l'église du village, fait partie d'une série de petites forteresses édifiées au Moyen-Age dans la vallée de l'Ognon. Le corps de logis a été en partie construit au XVIe siècle. Au début du XIXe siècle, construction d'un bâtiment de communs et de dépendances en U devant le corps de logis. \r\n Château de Montrambert, du XVIe au XIXe siècle, l'imposant château  date du XIXe siècle avec une belle chapelle, quelques parties sont plus anciennes avec des restes d'une ancienne  fortification du Moyen-âge, il est entouré par un parc remarquable.","habitants":"Froissard de Broissia\r\n        \"","divers":"Château de Dammartin et de Montrambert","gps":"","images":["../../jctruffet.com/image/image_39/39_Dammartin_Montrambert_1.jpg","../../jctruffet.com/image/image_39/39_Dammartin_Montrambert_2.jpg","../../jctruffet.com/image/image_39/39_Dammartin_Montrambert_3.jpg","../../jctruffet.com/image/image_39/39_Dammartin_Montrambert_4.jpg"]},"Consult_chateau_formulaireeeaf":{"id":"Consult_chateau_formulaireeeaf","dept":"39","canton":"Dampierre","commune":"Châteauneuf","nom":"Dampierre","type":"Château","periode":"XVII","histoire":"DAMPIERRE; dépendait de la prévôté dOrchamps, mais au Moyen-Age, une famille noble en avait reçu la jouissance à titre héréditaire et en portait le nom. Richard de Dampierre fut un bienfaiteur de labbaye dAcey au XIIe  siècle. Baptisé  fort des Rattes, on lappela  château neuf . Le second est à trois kilomètres du village. Sa formation, comme son nom, sont directement liés à lextraction du minerai de fer présent à cet endroit. Mais aux côtés de ces deux hameaux, la Maison Rouge demeure dans les mémoires. Ancien relais le long de la voie romaine, ce toponyme  Rouge  se rencontre souvent sur les itinéraires pré-romains. Il ny a pas si longtemps, elle était un lieu de rendez-vous des artistes et écrivains de Franche-Comté. Elle a longtemps appartenu à la famille Leconte des Floris. Ancien relais de la voie romaine, ayant appartenu à M. Théophile Bruand, la Maison rouge a souvent été visitée par les écrivains et les artistes du pays, attirés par la bonne et cordiale réception du propriétaire. Plusieurs années auparavant, elle avait été habitée par le jeune et spirituel Xavier Marmier.","architecture":"La commune de Dampierre  se compose du bourg proprement dit de Dampierre, et de deux hameaux qui lui sont rattachés, Châteauneuf, au bord du Doubs en amont, et Les Minerais, situé sur le site des anciennes mines de fer. Le premier, situé à lest, à deux kilomètres du centre du village tient son nom de lancien fort construit au XVe siècle pour protéger le passage du Doubs, après que celui de Fraisans eût été incendié.","habitants":"M. Théophile Bruand\r\n        \"","divers":"Château de Châteauneuf à Dampierre","gps":"","images":["../../jctruffet.com/image/image_39/39_Dampierre_1.jpg"]},"Consult_chateau_formulairec429":{"id":"Consult_chateau_formulairec429","dept":"39","canton":"Chaussin","commune":"Deschaux","nom":"Deschaux","type":"Château","periode":"XV","histoire":"DESCHAUX, au XIVe siècle le fief était la propriété de la famille de Chissey seigneur de Deschaux, au XVIe siècle  Marguerite de Chissey apporte par alliance le fief  à Claude de Gasse seigneur de Rouvrey ce dernier échange en 1536 avec le fief Villiers Robert  détenu par Philippe Vaulchier secrétaire de Charles Quint et greffier en chef du parlement de Dole, qui devient seigneur de Deschaux que font agrandir la maison-forte  du XVIe siècle, puis transformé en château au XVIIe siècle par François-Marie César de Vaulchier qui reçoit le titre de marquis son fils qui sera le dernier marquis Georges Simon, épouse la fille du seigneur de Vaudrey Marie-Charlotte-Félécité Terrier de Montciel, dont le frère sera ministre de l'intérieur en 1792. Les Vaulchier n'émigra pas à la Révolution, seront incarcérés,  relâché suite à une cohabitation pacifique avec les villageois.  Le château est resté dans la famille de Vaulchier jusqu'aux environs des années 1980. Vendu à monsieur Climonet, pour devenir un musée d'automates.","architecture":"Deschaux; le château  du XIIIe siècle remanié au XVe siècle et au XIXe siècle dit,  La tour de Lyoutre ,  s'élève sur deux niveaux couvert d'un toit en croupe, à forte pente et à lucarnes surmontées de fleurons, le  rez de chaussée surélevé et l'étage, de part et d'autre la tourelle de l'avant corps, présentent une belle symétrie de fenêtres rectangulaires couvertes de linteaux galbés et agrémentés d'une agrafe. Restauré par l'architecte Ducat en 1875, il fut encore agrandi tandis qu'un pavillon cossu, à l'entrée du parc, remplaçait la maison de gardien. l'avant-corps central en saillie de chacune des deux façades de l'édifice en brique édifice rectangulaire entouré d'un parc, à deux niveaux avec attiques, flanquée de tourelles carrées qui lui conféraient l'aspect d'un ouvrage de défense.","habitants":"Famille de Chissey \r\n        \"","divers":"Château de Deschaux","gps":"","images":["../../jctruffet.com/image/image_39/39_Deschaux_1.jpg","../../jctruffet.com/image/image_39/39_Deschaux_2.jpg"]},"Consult_chateau_formulairec901":{"id":"Consult_chateau_formulairec901","dept":"39","canton":"Dole","commune":"Dole","nom":"Dole","type":"Château","periode":"XVI","histoire":"DOLE; au XIIe siècle, le comte Renaud III de Bourgogne donne un important essor à la cité en y faisant construire d'importantes murailles En 1386 le duc et comte Philippe II de Bourgogne (Philippe le Hardi) rattache le comté de Bourgogne au duché de Bourgogne par mariage avec la duchesse héritière Marguerite III de Flandre et fait de Dole la capitale officielle du comté.  En 1423 le duc et comte Philippe III de Bourgogne (Philippe le Bon) inaugure l'université de Dole. En 1477 à la suite de la mort de son père le duc Charles le Téméraire à la bataille de Nancy, la duchesse héritière Marie de Bourgogne épouse le futur empereur germanique
