Maximilien Ier du Saint-Empire. En 1479, à la suite de son échec de tentative de reconquête de 1477, le roi Louis XI de France prend la ville de Dole et son château qui sont incendié et rasé avec interdiction de reconstruction. En 1482 Dole est reconstruite à la suite du traité d'Arras et en 1530, lempereur germanique Charles Quint fait reconstruire des bâtiments fortifiés  sur l'emplacement de l'ancien château fort. En 1678 à la suite de la guerre de dix ans, Dole et le comté de Bourgogne sont définitivement rattachés au royaume de France par le roi Louis XIV.                                           A six km au sud  Fourcherans apparu vers l'an mille, la bourgade est dominée par un château féodal bien avant 1300. Son territoire a toujours servi de base d'attaque contre Dole lors des guerres de Louis XI en 1477 et 1479, de Louis XIII en 1636 et de Louis XIV en 1668 et 1674. C'est depuis le château que les rois ou les chefs militaires ont dirigés les assauts contre Dole. Il abrite, durant deux nuits, le Roi Soleil lors du siège de Dole de 1668. Une cité ouvrière de 11 habitations est construite tandis que le maître de forge se fait bâtir une magnifique demeure, aujourd'hui occupée par les bureaux de la Mairie.","architecture":"Le château de Dole est un ancien château fort du XIe siècle dont il ne reste rien, et quelques restes de bâtiments fortifiés du XVIe siècle, à Dole  capitale du comté de Bourgogne au Moyen-Age dans le Jura en Franche-Comté.                                                     Fourcherans;  le château ne doit plus exister.                                  Au nord de Dole, à Sampans le château du Mont-Joly  aujourdhui, modernité en matériaux précieux, a la façade rose, ce palladien avec colonnade à litalienne fut construit au XVIIIe siècle par un avocat dolois avant dappartenir longtemps à une grande famille franc-comtoise. Tombé en ruine, il fut entièrement réhabilité et restauré à la fin des années 1990.","habitants":"Charles Quint\r\n        \"","divers":"Divers bâtiments à Dole tel que Mont-Joli, Crissey etc.","gps":"","images":["../../jctruffet.com/image/image_39/39_Dole_1.jpg","../../jctruffet.com/image/image_39/39_Dole_2.jpg","../../jctruffet.com/image/image_39/39_Dole_3.jpg","../../jctruffet.com/image/image_39/39_Dole_4.jpg","../../jctruffet.com/image/image_39/39_Dole_5.jpg","../../jctruffet.com/image/image_39/39_Dole_6.jpg","../../jctruffet.com/image/image_39/39_Dole_7.jpg","../../jctruffet.com/image/image_39/39_Dole_8.jpg","../../jctruffet.com/image/image_39/39_Dole_9.jpg"]},"Consult_chateau_formulairec5c3-2":{"id":"Consult_chateau_formulairec5c3-2","dept":"39","canton":"Arinthod","commune":"Dramelay","nom":"Dramelay","type":"Vestiges","periode":"XIII","histoire":"DRAMELAY, le premier sire de Dramelay connu est Amédée de Dramelay, en 1044, son petit-fils, Onfroy, seigneur de Dramelay vers 1090 est en relation avec le prieuré clunisien de Romainmotier. Bernard de Dramelay, Grand Maître du Temple en 1152, meurt au siège d'Ascalon en Palestine le 16 août 1153. Hugues de Dramelay est connétable du comté de Bourgogne en 1173. Il est le père de Hugues II, seigneur de Dramelay de 1189 à 1217. En 1240, son fils est chassé du château, pour fait de guerre. Le château devient alors possession du Comte de Chalon. Deux dynasties se sont succéder, Les Dramelay et les Chalon. \r\n En 1248, il est inféodé à Rodolphe de Courtenay, beau-frère de Jean de Chalon. La tour (ou ce qu'il en reste), date de cette époque.\r\n En 1260, Jean de Chalon donne à son fils aîné Hugues ses fiefs et châteaux. Jean II de Chalon-Auxerre est seigneur de Dramelay de 1292 à 1361, puis le site passe à une branche cadette, les seigneurs de Châtel-Belin, et enfin aux Chalon-Arlay, princes d'Orange.\r\n Le château a été détruit par les troupes françaises de Louis XI, lors de la guerre qui opposa la Franche-Comté à la France, après la mort de Charles le Téméraire.","architecture":"DRAMELAY, proche dArinthod, la tour de Dramelay est mentionnée dès le IXe siècle. Ses vestiges actuels rappellent sa période florissante des XIe et XIIIe siècles. Ils sont lobjet de travaux de sauvegarde par lADAPEMONT. Fondé sur un site stratégique  naturel remarquable, le château a été construit au début du XIIIe siècle. Parmi les ruines du site castral, l'élément le mieux conservé est  la tour donjon de plan carré, qui possède encore trois murs de 2,20 m d'épaisseur sur trois niveaux, elle est construite en moellons bruts de moyen appareil.","habitants":"Famille de Dramelay\r\n        \"","divers":"Vestiges de Dramelay","gps":"","images":["../../jctruffet.com/image/image_39/39_Dramelay_1.jpg","../../jctruffet.com/image/image_39/39_Dramelay_2.jpg","../../jctruffet.com/image/image_39/39_Dramelay_3.jpg"]},"Consult_chateau_formulaire1b4c":{"id":"Consult_chateau_formulaire1b4c","dept":"39","canton":"Rochefort-sur-Nenon","commune":"Eclans-Nenon","nom":"Eclans","type":"Château","periode":"XVII","histoire":"ECLANS, le château fut édifié pour Charles Petrey, conseiller au parlement de Dole, qui acheta la terre d'Eclans au  début du XVIIe siècle pour la faire ériger en baronnie en 1674. Sa petite fille Marie Bontemps, en même temps que la seigneurie d'Authume, apporta en dot la baronnie d'Eclans à Claude-François Masson, conseiller au parlement de Besançon. Au XVIIIe siècle, Rodrigue-Thérèse Masson baron d'Eclans, remania le château dans le goût de l'époque. Le dernier seigneur d'Eclans fut  Charles François Masson amateur de chasse à courre,  grand dépensier, il organisait de grandes fêtes dans le château et son parc. Ruiné, il dut vendre le château en 1820, marié à une Terrier de Santans, propriétaire du château  de Cléron.  Le château actuel a été construit par Charles Petrey.","architecture":"Le château des seigneurs dÉclans a été détruit au XVe siècle par les troupes de Louis XI.  Situé dans un immense parc  traversé par un petit cours d'eau, l'édifice est formé d'un corps de logis principal à deux niveaux toitures en croupes frontons sur façades donnant sur cour,  deux bâtiments  en retour d'équerre sur une cour d'honneur. Un beau colombier rond coiffé en poivrière se détache à gauche du portail.","habitants":"Charles Petrey\r\n        \"","divers":"Château d'Eclans","gps":"","images":["../../jctruffet.com/image/image_39/39_Eclans_1.jpg","../../jctruffet.com/image/image_39/39_Eclans_2.jpg","../../jctruffet.com/image/image_39/39_Eclans_3.jpg"]},"Consult_chateau_formulaireadee":{"id":"Consult_chateau_formulaireadee","dept":"39","canton":"Lons-le-Saunier","commune":"Falletans","nom":"Falletans","type":"Château","periode":"XVII","histoire":"FALLETANS, CLOS-GARNIER,  Le dernier sire de Falletans  de la maison de Thiebaud de Falletans connue dès le XIIe siècle, Marie-Nicolas marquis de Felletans comte en  Bavière, chevalier de St-Georges et de St-Louis émigra à la Révolution. En 1842 il engagea un procès contre les Garnier qu'il accusait d'usurpation   du titre de seigneurs de Falletans. Les Garnier, seigneurs de Choisey et de Parthey, anoblis au XVIe siècle, avaient fait carrière au XVIIe siècle  dans la noblesse de robe comtoise avec les charges d'avocat au parlement ou de lieutenant général au bailliage de Dole.  Au XVIIIe siècle, devenus  de gros propriétaires terriens, ils acquirent une partie de la terre de Falletans et se dirent seigneurs de Falletans.  Claude-Eugène-Frédéric de Falletans, officier de cavalerie fut maire de Falletans en 1810 maire de Dole de 1813 à 1816 et conseiller d'arrondissement de 1809 à 1830, c'est son fils Paul-Gabriel qui en 1842 dut s'engager dans le procès qu'il remporte en 1843,  garde le fief jusqu'en 1830, vendu en 1930 à une famille lyonnaise ainsi que le clos-Garnier. Les Garnier possédaient aussi le château dit le petit Falletans qu'is vendirent au XXe siècle.                                                                        Commanderie des  templiers;  on ne connait que peu de choses sur la commanderie de Falletans, mais il semblerait qu'un don fait par le comte de Bourgogne, Renaud III dans les années 1130-1132 soit à l'origine de sa création .  Arrivée en possession des hospitaliers de Saint-Jean en 1312, la commanderie restera occupée jusqu'en 1791 où elle sera vendue comme bien national suite à la Révolution.","architecture":"Falletans, Le clos Garnier domaine clôturé, demeure seigneuriale flanquée sur la façade à un angle une tour portant une girouette, le corps de logis surmonté d'un toit en croupe  et présentant une ordonnance rythmée par l'alternance symétrique de grandes fenêtres. Le petit Falletans demeure également clôturé de style néoclassique, grosse tour octogonale.                                          De l'importante commanderie fortifiée, ceinte d'une muraille et flanquée de tours, il ne reste que les vestiges du bâtiment principal qui sont encore visibles actuellement.","habitants":"Famille Garnier\r\n        \"","divers":"Château de Felletans, de Clos-Garnier, la commanderie des templiers","gps":"","images":["../../jctruffet.com/image/image_39/39_Falletans_1.jpg","../../jctruffet.com/image/image_39/39_Falletans_2.jpg","../../jctruffet.com/image/image_39/39_Falletans_3.jpg"]},"Consult_chateau_formulaire9912":{"id":"Consult_chateau_formulaire9912","dept":"39","canton":"Dampierre","commune":"Fraisans","nom":"Fraisans_Vermot","type":"Manoir","periode":"XVII","histoire":"FRAISANS, appartenait aux comtes de Bourgognes. Anciennes résidences de maîtres de forges. Les plus anciennes demeures sont celles des frères Nardin construites au XVIe siècle,  vient ensuite,  château BRUNET destiné à Jean de Pourcheresse, possesseur des forges de Fraisans depuis 1708 est achevé en 1715, érigé en fief en 1730, vendu comme bien national en 1795. Acquis par Mme de Pourcheresse épouse de Brunet de la Renaudière-Puisaye en 1837, vendu à la commune en 1865 pour le compte des haut-fourneaux, il est transformé en 1968 en maison de retraite.                                                                                            Le Château NARDIN du XVIe siècle, Le petit château est bâti en 1741 pour Jacques-François de Pourcheresse, maître des forges de Fraisans, acheté en 1796 et en 1803 par  André Caron qui le revend en 1934 à Kaiser-Morel.                                                       Château des FORGES, de 1822 à 1825 François Caron  fait bâtir le logement patronal , rebaptisé la GERANCE.  En 1778, Joseph-Antoine Pourcheresse fit ériger Fraisans en  marquisat. A la veille de la Révolution de 1789, Joseph-Antoine de Pourcheresse  se trouvait à la tête  de l'usine la plus considérable  de la province. Après son émigration  en 1790, ses biens furent confisqués et mis en vente.  Les frères Caron, André et Léonard, maîtres de forges pour les Pourcheresse, se portèrent acquéreurs.                         VERMOT, Théodore Caron, maître de forges construit le château sur le rocher du Cheval Blanc, à la place d'un ancien hôtel. L'édifice est rebaptisé château de Vermot, du nom de l'abbé qui le rachète pour y établir une maison de retraite pour prêtres. En 1858, le société des forges l'achète, l'aménage et y établit l'école de garçons.","architecture":"Fraisans; il ne reste plus rien du château fort de Fraisans  détruit en 1477.  Un petit château fut construit dans la commune en 1741    et au sommet de la colline, l'imposant château construit au XIXe siècle est devenu  hôtel de ville , immense bâtisse à plusieurs étages avec balcon supporté par six colonnes d'ordre classique.          Château de Nardin, maison-forte du XVIe siècle flanqué d'une tour ronde.                                                                                   Château de Brunet;  du XVIIIe siècle  corps de logis rectangulaire à deux niveaux et attiques, légère avancée sur le pavillon d'entrée, et balconnet au premier.                                                       Château des Forges,  dit de la Gérance corps de logis rectangulaire à trois niveaux avec balcon soutenu par six colonnes doriques.                  Vermot; construction en 1822-1825, cette magnifique demeure, protégée au titre de monument historique pour   son architecture, depuis 1868 abrite  l'hôtel de ville et sert de logement pour l'instituteur.  A l'intérieur on peut contempler le grand escalier ainsi que de  belles fresques. L'orangerie, en contre bas, complète à l'époque cet imposant ensemble patronal. Les serres et les dépendances sont remplacées en 1858 par un immeuble qui loge les chefs de services de la société des Forges.","habitants":"Dame de Pourcheresse, Théodore Caron\r\n        \"","divers":"Château à Fraisans, petit Château, Brunet, Nardin, des forges dit la Gérance, de Vermot etc.","gps":"","images":["../../jctruffet.com/image/image_39/39_Fraisans_Vermot_1.jpg","../../jctruffet.com/image/image_39/39_Fraisans_Vermot_2.jpg","../../jctruffet.com/image/image_39/39_Fraisans_Vermot_3.jpg","../../jctruffet.com/image/image_39/39_Fraisans_Vermot_4.jpg","../../jctruffet.com/image/image_39/39_Fraisans_Vermot_5.jpg","../../jctruffet.com/image/image_39/39_Fraisans_Vermot_6.jpg","../../jctruffet.com/image/image_39/39_Fraisans_Vermot_7.jpg","../../jctruffet.com/image/image_39/39_Fraisans_Vermot_8.jpg","../../jctruffet.com/image/image_39/39_Fraisans_Vermot_9.jpg"]},"Consult_chateau_formulairec59a":{"id":"Consult_chateau_formulairec59a","dept":"39","canton":"Voiteur","commune":"Frontenay","nom":"Frontenay","type":"Château","periode":"XII","histoire":"FRONTENAY, la première mention de lexistence du château de Frontenay date de 1109, date à laquelle les premiers seigneurs de Frontenay étaient apparentés aux comtes de Bourgogne. Frédéric comte de Frontenay fut le premier seigneur connu en 1132.  Au XIVe siècle, Jean de Chalon, seigneur dArlay, fait construire un énorme donjon flanqué de tours pour protéger la route du sel.  En 1446, le seigneur Louis II de Chalon-Arlay  confie le château à un de ses écuyers, Gauthier de Fallerans qui le transmet à ses descendants jusqu'à ce jour, 500 ans de continuité familiale, aux Visemal, aux Montrichard, et aux Chambert. En 1636 assiégé par le duc de Longueville et  en 1638 le château commandé par le capitaine Flamand soutient le siège contre les français de Louis XIII. Chaque génération veillant amoureusement à embellir et à entretenir les lieux, cela contribue à créer un espace de sécurité et de beauté, comme suspendu hors du temps, toujours habité par ses descendants.","architecture":"Frontenay, construit sur un éperon pour protéger les convois de sel, denrée précieuse depuis le haut Moyen-Age, Frontenay a réussi à passer les siècles avec ses salles voûtées du XIIe siècle et son donjon du XIVe siècle,  construit sur un site archéologique le fossé a été comblé au XVIIIe siècle pour construire les communs. Un corps de bâtiment porte la date de 1773, un autre s'est écroulé en 1946 ou seulement un mur de soutènement a été construit.  Garde laspect d'une forteresse,  vu de la voûte d'entrée, la façade Violet le Duc d'un bâtiment du XVIIIe siècle témoigne qu'un certain art de vivre a succédé à l'art de la guerre. Remanié au XIXe siècle.","habitants":"Comte de Frontenay \r\n        \"","divers":"Château de Frontenay","gps":"","images":["../../jctruffet.com/image/image_39/39_Frontenay_1.jpg","../../jctruffet.com/image/image_39/39_Frontenay_2.jpg","../../jctruffet.com/image/image_39/39_Frontenay_3.jpg","../../jctruffet.com/image/image_39/39_Frontenay_4.jpg","../../jctruffet.com/image/image_39/39_Frontenay_5.jpg","../../jctruffet.com/image/image_39/39_Frontenay_6.jpg","../../jctruffet.com/image/image_39/39_Frontenay_7.jpg"]},"Consult_chateau_formulaire6a01":{"id":"Consult_chateau_formulaire6a01","dept":"39","canton":"Villers-Farlay","commune":"Port-Lesney","nom":"Germigney","type":"Manoir","periode":"XII","histoire":"GERMIGNEY; le château a pris le nom de celui qui l'a fait construire au XVIIIe siècle, le marquis de Germigney. Le village de Port-Lesney  divisé en deux part égales, dépendait de la seigneurie de Vaulgrenant. François de Villers-la-Faye, comte de Vaulgrenant, la vendit au XVIIIe siècle à Jacques-François de Germigney capitaine au régiment du roi, fils de Claude François de Germigney qui en 1740, avait fait ériger ses terres de Germigney et de Rennes en marquisat.      M. de Germigney eut de Mme Denise-Victoire du Chastelier du Mesnil, trois filles,  Françoise-Émilie, née en 1770, épouse de Joseph-Luc-Jean-Baptiste-Hippolyte comte de Maréchal-Vezet ; Bonaventure-Denise-Victoire, épouse de René-Louis-Dominique comte de Gras-Préville, et Agathe-Félicité de Germigney. Ces dames émigrèrent au moment de la Révolution, et leurs biens furent vendus, notamment les ruines du château de Vaugrenans.\r\nMme veuve de Germigney racheta un des châteaux de Port-Lesney le 2 juin 1803. On y remarque l'ancien château de M. de Germigney, qui appartient aujourd'hui à M. Laurençot, ancien officier de marine.   La maison de Mme de Germigney; celle de M. de Dournon, qui appartient à M. Charles Peting de Pagnoz, demeurant à Besançon,  fils de Guillaume de Gilley, seigneur d'Aiglepierre et Andelot, se qualifiait, en 1538, de seigneur de Port et du Châtelay,  et enfin celle de M. Bavilley, maire.\r\nRoland et Véréna Schön, décorateurs de réputation mondiale, ont fait de cette demeure de marquis perdue entre des lacs sauvages,  un \"relais et château\".","architecture":"Germigney, le château, qui à l'origine manoir du XVIIIe siècle entre cour et parc, se compose d'un corps de logis principal flanqué de deux ailes en retour d'équerre. Il s'élève sur deux étages  coiffés de toits à lucarnes. On pénètre dans la cour du château ouverte sur la rue par un portail,  sa grille en fer forgé s'inscrit dans un fronton en chapeau de gendarme reposant sur deux puissants piliers doriques. Le parc avec sa pièce d'eau à nénuphars s'étend sur plusieurs hectares en bord de la Loue. Il existe, au sud du cimetière, une maison féodale flanquée de deux tours, qui appartenait à la famille Portier de Salins.","habitants":"Marquis de Germigney\r\n        \"","divers":"Château de Germigney","gps":"","images":["../../jctruffet.com/image/image_39/39_Germigney_1.jpg","../../jctruffet.com/image/image_39/39_Germigney_2.jpg","../../jctruffet.com/image/image_39/39_Germigney_3.jpg","../../jctruffet.com/image/image_39/39_Germigney_4.jpg","../../jctruffet.com/image/image_39/39_Germigney_5.jpg"]},"Consult_chateau_formulaire3ff8":{"id":"Consult_chateau_formulaire3ff8","dept":"39","canton":"Lons-le-Saunier","commune":"Gevingey","nom":"Gevingey_Courbouzon","type":"Manoir","periode":"XVII","histoire":"GEVINGEY; château construit en 1657 pour Marc de Montaigu, baron de Boutavant,. Le château appartient successivement à la famille Droz des  Villars, qui détient encore le petit château de Chilly le Vignoble, puis à René de Marion de Glatigny qui l'a vendu à  la banque CIC en 1943, date du décès de sa femme, née Richard. La transformation de l'édifice en colonie de  vacances vers 1946  l'a fortement transformé, la grange avec ses parties anciennes  du XVIIe siècle, est devenue  infirmerie et logement de gardien.                                                                                     \r\n A quelques kilomètre au nord le château de  COURBOUZON;  château reconstruit vers 1730,  avec reprise du décor intérieur dans le style Louis XVI. Edifice de plan en grille, avec entrée dans la cour d'honneur par  un portail monumental. Le corps de logis, de plan en L, possède  un décor Louis XVI avec cheminées en marbre, pièces lambrissées. Présence de communs. Dans la cour d'honneur se trouvaient les écuries et la chapelle.","architecture":"Gevingey, le pavillon d'entrée reste le seul élément du XVIIe siècle. Le logis principal a été profondément modifié au XVIIIe siècle, façade occidentale et au XIXe siècle, façade orientale de 1859, de même que l'orangerie dont un bâtiment  est du XVIIIe siècle,  l'autre du XIXe siècle, écurie et battoir remaniés (un bâtiment a été bâti en 1953 et de nombreux rajouts au logis.                         Courbouzon;  corps de logis, en totalité, y compris les décors ; façades et toitures des communs, y compris les façades des anciens communs au sud du corps de logis, terrasses du jardin; murs de clôture et portails.","habitants":"Marc de Montaigu\r\n        \"","divers":"Manoir de Gevingey","gps":"","images":["../../jctruffet.com/image/image_39/39_Gevingey_Courbouzon_1.jpg","../../jctruffet.com/image/image_39/39_Gevingey_Courbouzon_2.jpg","../../jctruffet.com/image/image_39/39_Gevingey_Courbouzon_3.jpg","../../jctruffet.com/image/image_39/39_Gevingey_Courbouzon_4.jpg","../../jctruffet.com/image/image_39/39_Gevingey_Courbouzon_5.jpg","../../jctruffet.com/image/image_39/39_Gevingey_Courbouzon_6.jpg","../../jctruffet.com/image/image_39/39_Gevingey_Courbouzon_7.jpg"]},"Consult_chateau_formulaireb7ce":{"id":"Consult_chateau_formulaireb7ce","dept":"39","canton":"Beaufort","commune":"St-Laurent-des-Roches","nom":"Grusse-Rochelle","type":"Château","periode":"XV","histoire":"GRUSSE, la seigneurie de Grusse fut inféodée par le seigneur de Saint-Laurent-la-Roche, en 1422, à Guillaume de Laubespin, de la maison des sires de lIsle-sous-Saint-Laurent,  de père en fils. Jean de Laubespin. Ces derniers  vendirent Grusse à Philippe-Charles du Champier, chevalier, bailli du Beaujolais. La maison seigneuriale de M. Abriot appartient actuellement à M. Hippolyte Ponsot, qui y fait sa résidence En 1680, Anne-Louise de Rabutin, veuve de ce seigneur, aliéna ce domaine en faveur de François de Velzer, seigneur de Nance, qui le revendit à son tour, en 1696, à  Hugues et Pierre-François Abriot, frères. Pierre-Désiré Abriot, conseiller-maître à la cour des comptes de Dole, fils de Pierre-François, fit don à François-Désiré Abriot, son neveu, fils de Hugues, son frère défunt, et de Barbe-Ignace Bouhélier dAudelange. François-Désiré Abriot de Grusse, émigra en 1791, et ses biens furent vendus comme bien national.  Le château, au bord de la Sonnette, est une belle grosse demeure bâtie sous  l'Empire par Antoine Joseph Secrétan . Il témoigne de l'ascension sociale d'un fils de la République. Né au moulin  de la Rochelle, Antoine Joseph Secrétan s'engagea  dans les bataillons de volontaires en 1792  pour défendre la 1ère République, il continua dans les armées de Bonaparte et devint colonel de la Garde Impériale. Napoléon le décora de la Légion d'honneur en 1804, le  fit colonel et baron d'Empire en 1813. \r\nLe baron Secrétan, incroyant et  non conformiste, organisa minutieusement ses obsèques et souhaita une sépulture  dans sa propriété, ce qui fut accompli en 1837.   M. Colomb dEcotay, acquéreur vers 1835, du domaine de Rochelle, a remplacé lancienne construction par un château moderne très élégant. Au bas du château était un moulin qui appartenait, ainsi que celui de Grusse, au seigneur de lIsle.","architecture":"Château, lancien château de Grusse est ruiné depuis longtemps et na pas laissé de traces.   Le château, de style néoclassique atteste de son appartenance à la nouvelle noblesse d'empire. La demeure au milieu d'un parc, est couverte d'une haute toiture en croupe, un avant-corps fait légèrement saillie sur la façade à chaînage d'angle, rythmée par l'horizontalité de ses bandeaux et  la symétrie de ses fenêtres.                                                             Le château de la Sonnette Grosse demeure construite sous l'empire.                                                                                     Château de Rochelle était considérable, il occupait toute la pente dune montagne, et se composait dun grand corps-de-logis, flanqué de deux tours, et entouré dune ceinture de murailles, défendues par six autres tours. Cette construction a disparu.","habitants":"Guillaume de Laubespin\r\n        \"","divers":"Château de Grusse et de la Sonette","gps":"","images":["../../jctruffet.com/image/image_39/39_Grusse_Rochelle_1.jpg","../../jctruffet.com/image/image_39/39_Grusse_Rochelle_2.jpg"]},"Consult_chateau_formulaireb01a":{"id":"Consult_chateau_formulaireb01a","dept":"39","canton":"Voiteur","commune":"Nevy-sur-Seille","nom":"Guinand","type":"Château","periode":"XVIII","histoire":"GUINAND;  ancien château Darnaud, l'arrière grand-père de mademoiselle Darnaud épouse Guinand  et de son frère, était Général d'Empire. Le fils du Général Darnaud a épousé mademoiselle Chardar dont le père était propriétaire de cette maison, maire de Nevy sur Seille sous Napoléon 1er et directeur des salines de Salin.  Monsieur Chardar avait épousé une petite nièce de l'abbé Chauderlos de Lacros qui était aumônier des abbesses de Chateau-Chalon qui ont inventé le vin jaune. Cette maison a été achetée par un ancêtre de la famille en 1678, un homme de loi nommé Pierre Jacquet.\r\nMonsieur Henri Guinand, actuel propriétaire, est le petit-fils de mademoiselle Darnaud.","architecture":"Guinand; importante bâtisse  du XVIIe siècle, quadrangulaire, corps de logis rectangulaire à deux niveaux, tourelle octogonale en cour intérieure.","habitants":"Général Darnaud \r\n        \"","divers":"Château de Guinand","gps":"","images":["../../jctruffet.com/image/image_39/39_Guinand_1.jpg","../../jctruffet.com/image/image_39/39_Guinand_2.jpg","../../jctruffet.com/image/image_39/39_Guinand_3.jpg","../../jctruffet.com/image/image_39/39_Guinand_4.jpg"]},"Consult_chateau_formulairef4d7":{"id":"Consult_chateau_formulairef4d7","dept":"39","canton":"Morez","commune":"Morez","nom":"Jobez","type":"Château","periode":"XIX","histoire":"JOBEZ, Le château et ses dépendances ont été bâtis dans le premier quart du XIXe siècle pour la famille Jobez, famille de maîtres de forges et négociants en horlogerie, à plusieurs reprises à la tête de la ville de Morez. Claude  Etienne, maire de  1791 à 1796,  son fils avant de se consacrer aux affaires familiales et à la politique, Emmanuel Jobez, qui avait fait ses études à Paris, s'était immergé dans le milieu littéraire parisien. Il y était devenu l'ami de Charles Palissot, écrivain et directeur de la Bibliothèque Mazarine, pour lequel il avait écrit en 1806 un long poème, Epître à M. Palissot. par un habitant du Jura, maire de 1808  à  1825 et député à partir de 1815. L'édifice est l'oeuvre de l'architecte bisontin Denis Philibert Lapret, auteur en 1815-1816, pour la société Claude Jobez d'une demeure patronale aux forges de Syam et choisi par Emmanuel en 1817 pour bâtir la nouvelle église paroissiale de Morez. En août 1819  commence la taille des pierres destinées aux colonnes du porche, initialement prévues en bois.","architecture":"Jobez;  bâtis dans le premier quart du XIXe siècle,  le bâtiment est agrandi par deux corps en retour avant la fin  du XIXe siècle et une conciergerie édifiée à une date non déterminée en remplacement d'un rucher, quadrangulaire à trois  niveaux, tours carrées en angles à toits pyramidales.","habitants":"Claude Jobez \r\n        \"","divers":"Château de Jobez et Monnier","gps":"","images":["../../jctruffet.com/image/image_39/39_Jobez_1.jpg","../../jctruffet.com/image/image_39/39_Jobez_2.jpg"]},"Consult_chateau_formulaireb41b-2":{"id":"Consult_chateau_formulaireb41b-2","dept":"39","canton":"Montbarrey","commune":"Mont-sous-Vaudrey","nom":"Jules_Grevy","type":"Château","periode":"XVII","histoire":"JULES-GREVY; la seigneurie de Mont-sous-Vaudrey était divisée en trois parts au milieu du XIVe siècle. La famille de Byans a régné sur Mont sous Vaudrey jusqu'en 1572. La moitié de la seigneurie avait été confisquée en 1549. Charles Quint la rendit à un cousin de Guyot de Vaudrey. Celui-ci la léguera à son parent  Guillaume de Montront qui la transmit à  son fils Antoine, lequel  y fit bâtir ou restaurer au XVIIe siècle, la demeure appelée Château-Gaillard. En 1773 les paysans  pillèrent  la plupart des châteaux de la région détruisant  les archives. Comme deux des fils Domet avaient émigré en 1791, les biens de cette famille furent confisqués, vendus au profit de l'état  en 1794. Mais elle parvint à garder ou à racheter le Château-Gaillard avec ses dépendances consistant en un parc, un jardin et un petit moulin. Etienne  François Domet habite le château jusqu'en 1820, date à laquelle sa fille unique le vendit au Vicomte de Chavannes.  Il le céda après la guerre de 1870 à Jules Grévy, président de la chambre des députés, son grand-père Nicolas avait acheté le château de la Grangerie en 1794 confisqué sur les Domet. De 1879 à 1887 le cur de la France battait un peu à Mont-sous-Vaudrey au Château-Gaillard, trianon de Monsieur Grévy, président de la République. Au lieu de passer ses vacances à Versailles, Fontainebleau ou Rambouillet, le plus illustre des hommes politiques préféra Mont-sous-Vaudrey, et chaque été le château prenait des airs de Trianon.","architecture":"Jules Gevry, Château-Gaillard appelé maintenant château-Grévy resta la propriété de la famille Wilson jusqu'en 1970. Il a été loué pendant une dizaine d'années avant sa vente à une association de colonies de vacances d'une société de la région parisienne. En juin 1970, il était acheté avec une dizaine d'hectares de parc par l'union départementale des sapeurs pompiers du Jura, la famille Wilson conservant une trentaine\r\nd'hectares,  bâti ou restaurer au XVIIe siècle,  quadrangulaire à deux niveaux toitures en croupes avec attiques sur pavillons extérieurs de l'entrée.","habitants":"Guillaume de Montront\r\n        \"","divers":"Château de Jules Grevy","gps":"","images":["../../jctruffet.com/image/image_39/39_Jules_Grevy_1.jpg","../../jctruffet.com/image/image_39/39_Jules_Grevy_2.jpg"]},"Consult_chateau_formulairec6c1":{"id":"Consult_chateau_formulairec6c1","dept":"39","canton":"Rochefort-sur-Nenon","commune":"Lavans-lès-Doles","nom":"Lavans","type":"Forteresse","periode":"XIII","histoire":"LAVANS; était mentionné dès le XIIIe siècle dans le testament de la comtesse de Bourgogne, Alix de Méranie. Au XVIe siècle, Jean d'Andelot, époux de Jeanne Balay qui le lui avait apporté en dot, en fit sa résidence et en 1588 il  aurait donné asile au célèbre historien Louis Gollut fuyant Dole ravagée par la peste. Au fil des siècles  il passa par mariage à des familles comtoises renommées.","architecture":"Il subsiste du château médiéval la porterie du XIIIe siècle en forme de haute tour carrée à bretèche et à mâchicoulis, percée de deux portes, charretière et piétonne, ornée d'une belle gargouille saillante, flanquée à un angle d'une tour ronde couverte de laves. Le château, aménagé entre 1858 et 1864, s'élève, de l'autre coté d'une cour intérieure.","habitants":"Famille de Jean d'Andelot\r\n        \"","divers":"Forteresse de Lavans","gps":"","images":["../../jctruffet.com/image/image_39/39_Lavans_1.jpg","../../jctruffet.com/image/image_39/39_Lavans_2.jpg","../../jctruffet.com/image/image_39/39_Lavans_3.jpg","../../jctruffet.com/image/image_39/39_Lavans_4.jpg","../../jctruffet.com/image/image_39/39_Lavans_5.jpg"]},"Consult_chateau_formulaire703c":{"id":"Consult_chateau_formulaire703c","dept":"39","canton":"Voiteur","commune":"Lavigny","nom":"Lavigny","type":"Château","periode":"XIX","histoire":"LAVIGNY, en 1252, Lavigny devint membre de la baronnie du Pin. Lavigny est depuis très longtemps un village viticole, château construit en 1876 par l'architecte Roy à l'emplacement d'une ancienne maison de maître dont il subsiste les caves.","architecture":"Château de Lavigny fut construit en 1876 à l'emplacement d'une ancienne maison de maître dont -il subsiste les caves. L'édifice s'ordonne en deux corps de logis formant un plan en L et couverts de toits d'ardoises.\r\n Une grosse tour carrée en pierre de taille et au toit pyramidal se dresse à l'angle d'un bâtiment précédé par la grille  du portail sur la rue. Une tour ronde, au toit en poivrière souligné  par une légère corniche à modillons, sert d'avant  corps central à l'autre bâtiment. Deux élégantes tourelles en brique, elles aussi coiffées d'ardoises en poivrière, en  encorbellement   ornent la façade sur rue du corps de logis principal.","habitants":"Comte de Lavigny\r\n        \"","divers":"Château de Lavigny","gps":"","images":["../../jctruffet.com/image/image_39/39_Lavigny_1.jpg","../../jctruffet.com/image/image_39/39_Lavigny_2.jpg","../../jctruffet.com/image/image_39/39_Lavigny_3.jpg","../../jctruffet.com/image/image_39/39_Lavigny_4.jpg","../../jctruffet.com/image/image_39/39_Lavigny_5.jpg"]},"Consult_chateau_formulaire799b-2":{"id":"Consult_chateau_formulaire799b-2","dept":"39","canton":"Voiteur","commune":"Le Pin","nom":"Le_Pin","type":"Forteresse","periode":"XIII","histoire":"PIN, dit le Pin; était construit entre 1252 à 1260 par Jean de Chalon, comte de Bourgogne  et seigneur d'Arlay, sur les terres de l'abbaye de Baumes les Messieurs. En 1336, pour renforcer la défense, son petit-fils Renaud fait construire une enceinte fortifiée, et le transmet à son gendre Guillaume de Vienne, son fils nommé aussi Guillaume gouverneur du Languedoc le vend en 1444  à Guillaume de Vaudrey  seigneur de Courlaoux. En 1470, suite à l'amélioration des armes d'attaque, les défenses du donjon sont réaménagés, et en 1525, le donjon est à nouveau modifié par le fils de Guillaume de Vaudrey.  Passera  par alliance successsive au baron de Ray en 1596, puis à son gendre  François de Vergy gouverneur de la Bourgogne dont la veuve s'en sépare au profit  de la famille Charreton de Chassey, sieur de Chassey, restera dans cette famille jusqu'en 1705 et par alliance passe à François Froissard de Brossia qui obtient la nomination de baronnie, sa petite-fille épouse le comte  de Jouffroy-Gonsans  jusqu'en 1840, le château est acquit en 1845 par la famille Lavergne, puis aux Trouillot, son successeur, M. Jeandot vend le Pin au Baron  Carlos de Watteville et le léguera à sa mort en 1935 à son cousin le baron Gérard de Watteville qui le possède toujours.","architecture":"Château du Pin du XIIIe siècle,  est l'un des vestiges les mieux conservés de l'architecture militaire du Moyen-Âge, dans le Jura. Le château domine les vallées de la Seille, de la Saône, du Doubs et tout le val de Voiteur.\r\n Le château se compose d'un donjon à peu près carré, d'une cour précédée d'un portail fortifié, et bordée à l'ouest par un grand bâtiment renfermant des caves et des remises, et au nord par les écuries à l'extrémité desquelles se trouve un puit. La basse-cour se trouvait au sud du donjon. L'ensemble est ceinturé par de hauts remparts et par des fossés creusés dans le roc (comblés aujourd'hui). Le château comptait six tours : la grande Tour, la tour du Receveur, la tour de la Grande Salle, la tour des écuries, la tour des Prisons et la tour du Colombier.","habitants":"Jean de Chalon\r\n        \r\n        \"","divers":"Château du Pin","gps":"","images":["../../jctruffet.com/image/image_39/39_Le_Pin_1.jpg","../../jctruffet.com/image/image_39/39_Le_Pin_2.jpg","../../jctruffet.com/image/image_39/39_Le_Pin_3.jpg","../../jctruffet.com/image/image_39/39_Le_Pin_4.jpg","../../jctruffet.com/image/image_39/39_Le_Pin_5.jpg","../../jctruffet.com/image/image_39/39_Le_Pin_6.jpg","../../jctruffet.com/image/image_39/39_Le_Pin_7.jpg","../../jctruffet.com/image/image_39/39_Le_Pin_8.jpg"]},"Consult_chateau_formulaire8ba1":{"id":"Consult_chateau_formulaire8ba1","dept":"39","canton":"Lons-le-Saunier","commune":"Lons-le-Saunier","nom":"Lons_le_Saunier","type":"Vestiges","periode":"XIII","histoire":"LONS le Saunier, L'historique est parallèle avec Arlay  Il y avait un château de Jean III de Chalon-Arlay prince d'orange, à la mort de  Philibert de Chalon-Arlay, brillant capitaine  tombé à Florence à 28 ans, les biens passèrent à son neveu René de Nassau et de succession en succession Philibert de Chalon, prince Philibert de Chalon-Arlay (Lons-le-Saunier 1502 - Florence, Italie 1530) : prince d'Orange ; ancêtre de la reine Beatrix des Pays-Bas. Le château fut détruit, l'hôtel de ville a été construite à la place.             MONTMOROT; le plus ancien membre connu de cette maison est Hugues de Montmorot, cette famille jusqu'en 1298 passa par alliance  aux seigneurs de Joinville. Vers 1304 elle épousait Hugues de Vienne, seigneur de Lons-le-Saunier.  Philippe de Vienne, seigneur de Montmorot, de Ruffey et de Bletterans. Agnès de Joinville, issue du premier mariage, religieuse à l'abbaye de Château-Chalon.                                                                       Dans la commune le château de Pymont et du Pin.","architecture":"Lons le Saunier;  était une ville fortifiée  remparts et fossés et portes démolies en 1716-1758 , le château fort détruit a été remplacé par l'hôtel de ville, tour de l'horloge, théâtre reconstruit en 1901 suite à un incendie et les thermes Ledonia.          MONTMOROT Le premier donjon tour dont il subsiste des vestiges au nord-ouest de la colline fut peut-être édifié au XIe siècle,  une deuxième tour au sud-ouest dont il reste un pan de mur, pourrait dater du XIIe siècle, époque à laquelle furent probablement construites les fortifications du château fort et du bourg dessous.  Le château fort fut plusieurs fois endommagé : en 1336, en 1360, en 1578, en 1595,  les guerres du XVIIe siècle et  la donation par Louis XV  en 1733 des matériaux pour la construction des salines de Montmorot sont à l'origine de la  démolition presque complète de l'édifice.","habitants":"Jean III de Chalon-Arlay\r\n        \"","divers":"Lons le Saunier, motte de Montmorot, Tour, hôtel dieu, Théatre et Mairie","gps":"","images":["../../jctruffet.com/image/image_39/39_Lons_le_Saunier_1.jpg","../../jctruffet.com/image/image_39/39_Lons_le_Saunier_2.jpg","../../jctruffet.com/image/image_39/39_Lons_le_Saunier_3.jpg","../../jctruffet.com/image/image_39/39_Lons_le_Saunier_4.jpg","../../jctruffet.com/image/image_39/39_Lons_le_Saunier_5.jpg","../../jctruffet.com/image/image_39/39_Lons_le_Saunier_6.jpg","../../jctruffet.com/image/image_39/39_Lons_le_Saunier_7.jpg","../../jctruffet.com/image/image_39/39_Lons_le_Saunier_8.jpg"]},"Consult_chateau_formulaireb1ae":{"id":"Consult_chateau_formulaireb1ae","dept":"39","canton":"Moirans-en-Montagne","commune":"Maisod","nom":"Maisod","type":"Manoir","periode":"XVI","histoire":"MAISOD; L'occupation à l'époque préhistorique est attestée par des fouilles et la présence romaine y est vraisemblable. Les traces historiques apparaissent avec le Moyen-Âge, le village et le château médiéval sont détruits par les armées de Louis XI en 1477. Claude Blanchot acheta la seigneurie de Maisod et fit construire en 1565 un nouveau château de petite taille, il est incendié et remanié au cours des siècles comme en 1865 par l'adjonction d'une tourelle ronde à l'initiative  ajoutée par Jean Chrysogone Guige de Champvans. C'est aujourd'hui une propriété privée.\r\nLe poète Lamartine a séjourné dans le château de Maisod durant les Cent-Jours en 1815.","architecture":"Le village de Maisod fut « ruiné » en 1477 ainsi que les deux châteaux (Rousset).  Une haute tour, bâtie sur une roche, fut  ruinée  en 1536 , sur les bords escarpés de lAin, le château de Maisod dresse ses deux tours grises. Cest le type du manoir comtois avec ses mansardes surmontées dune boule de zinc noirci comme on en voit sur les maisons nobles de Lons le Saunier.\r\nEn 1637, la prise de Moirans par De Longeville livrait aux Français le district  tout entier. Le château de Moirans fut  ruiné , celui de Maisod incendié.  On ignore quand il fut reconstruit 1713 et 1779, la maison forte et le château du dit Maisod  flanqué dune tour carrée antique et dune tourelle ronde plus moderne.","habitants":"Claude Blanchot\r\n        \"","divers":"Manoir de Maisod","gps":"","images":["../../jctruffet.com/image/image_39/39_Maisod_1.jpg","../../jctruffet.com/image/image_39/39_Maisod_2.jpg","../../jctruffet.com/image/image_39/39_Maisod_3.jpg"]},"Consult_chateau_formulaire2d8e":{"id":"Consult_chateau_formulaire2d8e","dept":"39","canton":"Lons-le-Saunier","commune":"Montigny","nom":"Mannery","type":"Maison forte","periode":"XIV","histoire":"MANNERY; la famille de Nozeroy possédant un domaine à Montigny. Alexandre de Nozeroy, écuyer, trésorier de la maison de Chalon au commencement du XVe siècle, eut un fils du nom de Louis qui habitait ce fief  de Nozeroy en 1584. Louis laissa deux filles, Marguerite, marié à Louis Girardot, et une autre à Simon de Vernier, écuyer. Louis Girardot eut pour fils Jean Girardot, seigneur de Beauchemin, vice-président au parlement de Dole, intendant des armées de la province de 1636 à 1642, auteur de l'histoire de dix ans de Franche-Comté et de plusieurs autres ouvrages. Ce seigneur habitait très souvent à Montigny. Il y était lorsque le maréchal de Conflans lui envoya un messager pour l'inviter à l'accompagner dans ses expéditions. Ce domaine fut acquis par M. Perrey, de Salins, qui le constitua en dot à sa fille, épouse de M. de Mannery, major au service de France. Mlle de Mannery le donna au général Bachelu, son neveu, dont M. Christian Bachelu hérita. En 1856, il a appartenu à M. Paul Besuchet, ancien ingénieur des construction maritimes. Puis, ce fut la famille Dole qui racheta cette demeure. Actuellement c'est toujours cette famille qui en est propriétaire.","architecture":"Mannery; la maison qui en dépend est flanquée de deux tours. Les murs du bâtiment ont une épaisseur extraordinaire. On croit que c'est dans cette maison que logea le maréchal de Biron, tandis qu'Henri IV occupait le château de Montigny.","habitants":"Alexandre de Nozeroy\r\n        \"","divers":"Maison forte de Mannery","gps":"","images":["../../jctruffet.com/image/image_39/39_Mannery_1.jpg","../../jctruffet.com/image/image_39/39_Mannery_2.jpg","../../jctruffet.com/image/image_39/39_Mannery_3.jpg"]},"Consult_chateau_formulaire59b5":{"id":"Consult_chateau_formulaire59b5","dept":"39","canton":"Arinthod","commune":"Marigna-sur-Valouse","nom":"Marigna","type":"Château","periode":"XIV","histoire":"MARIGNA, en 1278 Poly, Sire de Marigna, reconnaît tenir en fief de Renaud de Bourgogne le château de Marigna.  La Seigneurie de Marigna appartenait aux Châlons Jean lAntique. Les Fauchier, sont sous la vassalité du Seigneur du Balay.  La seigneurie passe ensuite aux mains des Vaulgrineuse, des Salins-Vincelles puis, en 1553, des Balay qui la conserve trois siècles. Le château primitif appartenait à la famille des Chalon et relevait de la forteresse de Montaigu. Mais plus qu'au nom des Chalon c'est à celui des Balay, famille aristocratique de la noblesse provinciale qu'il est associé. Louis XIV, par lettres patentes  du 12 juin 1712, érigea  les terres de Marigna  en marquisat. A la Révolution, Aimé Louis François, seigneur de Marigna et marquis de Balay, combattit sous la bannière royaliste puis émigra. Vendu comme bien national, fut acheté en 1796 par le notaire Oudet de Maynal, homme de paille de la famille Balay, qui le rétrocéda en 1797 à Madame de Balay. Depuis les Chalon, l'édifice a connu beaucoup de remaniements. Transformé au XVIIIe siècle, il est légué au XIXe siècle au comte de Froissard de Broissia.\r\nEn 1944, la propriété est incendiée par les Allemands, elle est à ce jour entièrement restaurée et transformée en chambres d'hôtes.","architecture":"Marigna;  le premier château, dit Haut-Castel, est probablement construit dans le courant du XIe et du XIIe siècle.   Au XIVe siècle, deux chefs routiers occupent la seigneurie et se la partagent. En 1555, construction de la tour ronde dite du Rosay,  toujours existante. L'un prend le Haut-Castel et I'autre construit en face une grande tour carrée et une maison forte sur la motte du Planège.  Le Haut-Castel résiste plusieurs fois aux français au XVe et au XVIe siècle mais il est occupé par surprise en 1668 et 1674 et son aile nord est incendiée. Après la paix de Nimègue 1678, le château peut-être restauré à condition qu'une partie des fortifications soit rasée, les fossés comblés et le pont-levis muré. L'entrée témoigne toujours de la puissance de l'ancienne forteresse, une haute porterie flanquée d'une tour ronde, garde encore les rainures du pont-levis et quelques corbeaux de ses mâchicoulis.","habitants":"Châlons Jean lAntique\r\n        \"","divers":"Château de Marigna","gps":"","images":["../../jctruffet.com/image/image_39/39_Marigna_1.jpg","../../jctruffet.com/image/image_39/39_Marigna_2.jpg","../../jctruffet.com/image/image_39/39_Marigna_3.jpg","../../jctruffet.com/image/image_39/39_Marigna_4.jpg","../../jctruffet.com/image/image_39/39_Marigna_5.jpg","../../jctruffet.com/image/image_39/39_Marigna_6.jpg"]},"Consult_chateau_formulaireda74":{"id":"Consult_chateau_formulaireda74","dept":"39","canton":"Orgelet","commune":"Mérona","nom":"Merona","type":"Forteresse","periode":"XIV","histoire":"MERONA, occupe le sommet dune éminence qui sépare la vallée de Marnézia de celle de Plaisia.  Mérona fut démembré de la Baronnie dOrgelet, pour servir dapanage à un fils naturel de Jean de Chalon-Auxerre qui prit le nom de Mérona. En 1281, Gérard, Sire de Mérona, reconnut tenir en fief de lAbbé de St-Claude, un domaine situé à la Tour du May. Au XIVe siècle, ce fief passa à la  famille Ferroux ou Farod de Marigny. Michel Ferroud le vendit à Louis Morel, qui le donna en dot, en 1525 à Pernette Morel, lune de ses filles, à loccasion de son mariage avec Léonard de la Tour-St-Quentin. Les deux tiers de cette terre furent vendues à Pierre Marmier dOrgelet en 1565. Gabriel de Bérard acheta la totalité de cette seigneurie en 1584 et la laissa à son fils qui la possédait encore en 1619. Elle passa ensuite à la famille Merceret de Salins. Une partie passa en 1744 à M. Pierre François Tissot, conseiller assesseur au bailliage dOrgelet. En 1749, M. Charlot de Princey céda ses droits, à Gérard-François Duprel, de Salins, en échange contre la Seigneurie de Chapois. Charles-Marie Duprel, en 1760 , vendit sa moitié de Mérona à M. Tissot qui possédait déjà le surplus.","architecture":"Le château existant se situe sur l'emplacement de l'ancien château fort détruit par Louis XI.  Mais Mérona n'a pas toujours été un château. En effet, sans doute après sa destruction par Louis XI,  qui détruisit une partie d'Orgelet également, une grande propriété fut construite. Ce n'est qu'à la fin du XIXe siècle que Paul de Mérona fit construire de nombreuses tours, dans un style Renaissance et agrandit la demeure.\r\n L'actuel château a conservé malgré le temps, quelques parties de l'ancien château fort  tel que le pigeonnier, une tour etc.","habitants":"Paul de Mérona\r\n        \r\n        \"","divers":"Forteresse de Meronna","gps":"","images":["../../jctruffet.com/image/image_39/39_Merona_1.jpg","../../jctruffet.com/image/image_39/39_Merona_2.jpg","../../jctruffet.com/image/image_39/39_Merona_3.jpg"]},"Consult_chateau_formulaire56d1":{"id":"Consult_chateau_formulaire56d1","dept":"39","canton":"Conliège","commune":"Mirebel","nom":"Mirebel","type":"Vestiges","periode":"XII","histoire":"MIREBEL, attesté dès le XIIe siècle, l'édifice est le siège d'une seigneurie qui ressort du domaine des comtes de Bourgogne.\r\nLe premier seigneur connu de Mirebel est Gérard Ier de Vienne, En 1280, Jean Ier de Vienne,  l'une des plus puissantes familles du Comté. Henri de Vienne, son petit-fils, résida aussi à Mirebel, de 1364 jusqu'à sa mort  Henri avait deux fils: Gauthier, l'aîné, qui reçu Mirebel dans son héritage et Jean, amiral de France. Gauthier mourut sans enfant vers 1399. Ses biens, et  Mirebel, passèrent à un fils de son frère Jean, puis à un autre Jean de Vienne, sire de Pagny. A la mort de ce Jean de Vienne en 1422, le fief de Mirebel passa aux Chalon-Arlay. En 1479, les armées de Louis XI ruinèrent en partie le château et Louis XI confisqua les biens de Jean de Chalon-Arlay. En 1479, le château est ruiné par les troupes de Louis XV, puis définitivement détruit par celles de Henri IV en 1595  la tour qui restait alors encore debout  servait  de poste de guet. La seigneurie de Mirebel fut restituée, au début du XVIe siècle, à la famille des Princes d'Orange qui devait ensuite devenir, par mariage, Orange-Nassau et régner sur les Pays-Bas comme c'est encore le cas aujourd'hui. Mais le château de Mirebel ne se releva pas de ses ruines. Inoccupé depuis, les vestiges du château a été acheté, en 2002, par la commune de Mirebel aux descendants des Princes d'Orange.","architecture":"Mirebel, l'éperon sur lequel est construit le château comprend trois zones séparées par des fossés;  la zone du château proprement-dit, une zone vide de vestiges  et au nord une zone avec des vestiges qui pourrait être celle d'une  redoute avec tour.\r\nLa zone du château proprement-dit:  Une enceinte, de 1,20 m. d'épaisseur, épousant le contour du premier plateau renferme un ensemble de vestiges. L'accès se faisait au nord, du côté ou le fossé est le plus important, par une porte que commandait un donjon carré de 10 m. de côté et qui devait comporter trois niveaux. Une fenêtre éclaire le second niveau et on y voit encore à ce même étage des latrines sur encorbellement et une archère. Celui-ci pourrait être daté du XIIIe siècle. Au donjon, à une époque plus tardive,  au XVe siècle, a été accolé un logis, comportant de larges ouvertures, auquel on a associé en retour un autre mur, plus large, qui barre le promontoire sur toute sa largeur. Au sud, divers creux et bosses, suggèrent l'emplacement d'anciens   bâtiments.\r\nLa zone nord, et un bâtiment quadrangulaire de 7 m. X 11 m., avec des murs épais de 2,10 m, d'un étage sur plancher.","habitants":"Gérard Ier de Vienne\r\n        \"","divers":"Vestiges de Mirebel","gps":"","images":["../../jctruffet.com/image/image_39/39_Mirebel_1.jpg","../../jctruffet.com/image/image_39/39_Mirebel_2.jpg","../../jctruffet.com/image/image_39/39_Mirebel_3.jpg","../../jctruffet.com/image/image_39/39_Mirebel_4.jpg","../../jctruffet.com/image/image_39/39_Mirebel_5.jpg"]},"Consult_chateau_formulaire3f4b-2":{"id":"Consult_chateau_formulaire3f4b-2","dept":"39","canton":"Lons-le-Saunier","commune":"Moiron","nom":"Moiron","type":"Château","periode":"XV","histoire":"MOIRON, en 1270, Guillaume de Moiron, fils d'Huguenin de Vernantois, reprit en fief de l'abbé de Saint-Oyande-Joux, que tenait de lui le seigneur de la Baume. En 1307, Aimé, fils de Pérard Floras, de Montaigu, déclara tenir en fief de Renaud de Bourgogne, à cause de son château de Montaigu. Amyers ou Amyet de Moiron, reconnut au mois de juin 1330, tenir en fief, d'Alix de Chilly, la garde de Chilly et le tiers de la dîme de Courlans. Jean, fils d'Etienne de Moiron donna, en 1339, quittance à Hugues de Chilly et à Huguette, de la dot de Béatrix de Chilly, son épouse. Le 21 avril 1342, Jean, fils d'Aimé de Moiron, chevalier, reconnut tenir en fief de Philippe de Vienne,  Aimé de Moiron avait laissé deux enfants, Jean et Jeanne, épouse de Pernin du Pin. Jean de Moiron transmit sa fortune à sa fille, qui la porta en dot dans la maison de Montaigu. Fin  du XVIe siècle Pierre de Montaigu, chevalier, seigneur de Moiron. La seigneurie de Moiron resta indivisé entre les deux frères. Ces derniers vendirent, le 19 avril 1545 , à noble Claude Dupré, prévôt de Lons-le-Saunier, Clériadus et Melchior possédèrent  Moiron jusqu'en 1628. En 1700, Jean-Claude, marquis de Montaigu, fils de Cléradius vendit à Nicolas Paret,  M.Adrien Baumal acheta en 1821, le domaine de Moiron.","architecture":"Château de Moiron construit dans la deuxième moitié du XVe siècle pour Huguenin de Montaigu.  Un deuxième manoir fut construit entre 1588 et 1628 pour Melchior de Montaigu, les tours ont été détruites en 1821,  le château a été remanié au XIXe siècle, la chapelle est du XIXe siècle.","habitants":"Aimé de Moyron                                                                          Huguenin de Montaigu\r\n        \"","divers":"Château de Moiron","gps":"","images":["../../jctruffet.com/image/image_39/39_Moiron_1.jpg"]},"Consult_chateau_formulairedfec":{"id":"Consult_chateau_formulairedfec","dept":"39","canton":"Montmirey-le-Château","commune":"Moissey","nom":"Moissey","type":"Maison forte","periode":"XV","histoire":"MOISSEY, au XIVe siècle le fief appartient aux seigneurs de Moissey jusqu'au milieu du XVe siècle puis passa à diverses familles, à la famille de Silley et à Claude I de Chassey et en 1480 ce dernier  vendit le fief aux frères Renard. Au début  du XVIe siècle, Hugues Marmier, sieur de Gastey, président du parlement de Dole, en était le propriétaire. Puis à nouveau endommagé  par les troupes du prince de Condé  en 1636, Claude-François  Moréal, conseiller au parlement de Dole, s'en porta acquéreur en 1645 et son petit fils, Pierre Joseph Moréal, baron\r\nde Commenailles, en fit  sa résidence à la fin du XVIIe siècle. A la veille de la Révolution passa par alliance  par le marquis de Chapuis-Rosières Après la Révolution le château passa à la famille Fraguier. De 1835 à 1905 il y a eu sept propriétaires. La restauration fut entreprise dans les années 1960 par le nouveau propriétaire, le Dr Preney.","architecture":"Moissey, du XIVe siècle il est en forme de parallélogramme. il a quatre tours rondes et une octogonale qui servait de prison, une chapelle, un grand pavillon où étaient les écuries, des granges et des caves, larges et profonds fossés, deux pont-levis. il fut reconstruit au XVIIIe siècle, deux corps de logis à trois niveaux toits en croupe, deux des hautes  tours à toit en poivrières existent encore, un puits et une voûte souterraine, on suppose que c'est une cave. L'édifice conserve encore l'allure d'une puissante forteresse quadrangulaire entourée de douves que les arches d'un petit pont de pierre enjambent à l'ouest vers le village.","habitants":"seigneurs de Moissey\r\n        \"","divers":"maison forte de Moissey","gps":"","images":["../../jctruffet.com/image/image_39/39_Moissey_1.jpg","../../jctruffet.com/image/image_39/39_Moissey_2.jpg","../../jctruffet.com/image/image_39/39_Moissey_3.jpg","../../jctruffet.com/image/image_39/39_Moissey_4.jpg","../../jctruffet.com/image/image_39/39_Moissey_5.jpg","../../jctruffet.com/image/image_39/39_Moissey_6.jpg"]},"Consult_chateau_formulaire80b7":{"id":"Consult_chateau_formulaire80b7","dept":"39","canton":"Champagnole","commune":"Monnet-la-Ville","nom":"Monnet","type":"Château","periode":"XVIII","histoire":"MONNET, grosse demeure du XVIIIe siècle, dit château de la Haye non loin des ruines du vieux château médiéval du fief des Faverney, issu du partage de diverses seigneuries dont celle de Monnet le Roche et de Monnet Montsaugeon. Construite en 1633 par Charles-Louis Moreau, descendant d'Anatole Moreau, acquéreur du fief des Faverney en 1647. En 1865 le château fut vendu au maître de forges Jean Menans et sa fille cadette, Blanche, l'apporta en dot au baron Henri Picot d'Aligny. En 1920 le domaine revint à Catherine d'Aligny, comtesse Roland de Montrichard, il appartient toujours à cette famille, alliée à celle de Warren.","architecture":"Monnet;  ruines d'un château cité au XIe siècle et détruit par les troupes de Louis XI  vers 1479. Ce château a soutenu victorieusement un siège vers 1445 contre les Écorcheurs.\r\n On peut y distinguer une basse-cour précédée d'un double fossé.  Les vestiges de l'enceinte de la basse-cour sont encore visibles. On accède au château par une tour porche dont il reste des soubassements insignifiants, et on débouche sur une petite cour avec à droite les restes d'une tour ronde et à gauche le premier niveau d'un donjon carré. À l'intérieur de celui-ci, il est encore possible d'admirer une belle petite ouverte ogivale avec à droite de celle-ci le conduit rectangulaire des latrines.                                 Le petit château qui prend l'allure d'un édifice rectangulaire massif au milieu d'un grand parc où se dispersent quantités de dépendances fermières. Couvert d'un toit de tuiles à croupe et à lucarnes, ses façades, sur une élévation à deux niveaux, présentent une belle symétrie de fenêtres aux linteaux galbés, soulignées par un bandeau de pierre.","habitants":"Comtesse Catherine d'Aligny de Roland de Montrichard\r\n        \"","divers":"Vestiges de l'ancien château médièval et nouveau château","gps":"","images":["../../jctruffet.com/image/image_39/39_Monnet_1.jpg","../../jctruffet.com/image/image_39/39_Monnet_2.jpg"]},"Consult_chateau_formulaire99e9":{"id":"Consult_chateau_formulaire99e9","dept":"39","canton":"Arinthod","commune":"Aromas","nom":"Mont_Didier","type":"Vestiges","periode":"XIII","histoire":"MONT-DIDIER; construit, entre le Xe et le XIIe siècle pour les sires de Coligny, dans  le massif du Revermont. La première mention du \"castrum Montis Dideri\" date du XIIe siècle. Vraisemblablement ancien site fortifié gaulois lors de l'âge du fer, Mont-Didier s'est ensuite transformé en château féodal au cours du Moyen-Age. Il fut assiégé et détruit à deux reprises, pendant les guerres qui opposèrent la Savoie au Dauphiné dans la période de 1282 à 1355. Siège d'un pouvoir local important, le château va connaître son apogée sous la domination  des ducs de Savoie au XVe siècle, il fut saccagé par les troupes de Louis XI vers 1480. En plein coeur de l'Europe médiévale, l'édifice a été l'enjeu de luttes séculaires  entre la France, la Bourgogne, la Savoie et le St-Empire Romain Germanique qui s'affrontaient pour la domination territoriale. Ces enjeux frontaliers sont d'ailleurs la cause de la chute du château, il fut définitivement détruit par les hommes de Biron et de Henri IV en 1595.","architecture":"L'ancienne forteresse de Mont-Didier a été construite entre le Xe et le XIIe siècle entre les actuels départements de l'Ain et du Jura, dans le massif du Revermont.  La première mention du château date du XIIe siècle : le castrum Montis Dideri. \r\nSans doute ancien site fortifié gaulois lors de l'âge du fer, Montdidier s'est ensuite  transformé en château féodal au cours du Moyen-Age. Siège d'un pouvoir local important.   Quant au village de Mont-Didier, celui-ci sera réinvesti au milieu du XIXe siècle et ce, jusqu'à la seconde guerre mondiale.","habitants":"sires de Coligny\r\n        \"","divers":"Vestiges de Mont-Didier","gps":"","images":["../../jctruffet.com/image/image_39/39_Mont_Didier_1.jpg","../../jctruffet.com/image/image_39/39_Mont_Didier_2.jpg","../../jctruffet.com/image/image_39/39_Mont_Didier_3.jpg"]},"Consult_chateau_formulaire4ee7-2":{"id":"Consult_chateau_formulaire4ee7-2","dept":"39","canton":"St-Julien","commune":"Montfleur","nom":"Montfleur","type":"Manoir","periode":"XIX","histoire":"MONTFLEUR, en 1191, Aymon, prieur de Gigny, inféodait à Etienne II comte dAuxonne le lieu de Montfleur, à charge par lui dy  édifier une forteresse et dy établir une ville franche. Le château était très vaste et comportait un grand nombre de  bâtiments. Des immenses écuries abritaient toute la cavalerie darmes et de chasse des chevaliers et de leur suite. Le destin de la forteresse allait prendre fin en lan 1479, larmée de Louis XI sous le commandement du maréchal des armées Charles 1er dAmboise de Chaumont à la tête de 10 000 hommes qui après avoir saccagé Dôle, va détruire les châteaux du haut pays de Franche comté. Montfleur va résister. Guillaume du Saix prit le commandement de la forteresse et avec de nombreux gentilshommes  opposa résistance aux français. Furieux par tant dobstination, les soldats mirent  le feu et massacrèrent tous les habitants et le château fut entièrement démantelé et ne devait pas se relever de ses ruines.  Le château fut acheté en avril 1870 par Monsieur Jules Boyriven qui était industriel dans la soierie lyonnaise, reconstruit en 1947 et appartient toujours aux descendants de Jules Boyriven, le propriétaire actuel M. Eric Moussard arrière arrière  petit fils de Jean Boyriven sattache à rénover lensemble du domaine, sachant que le parc est de lordre de 7 hectares.","architecture":"Montfleur  Un nouveau château allait naître en 1631, il fût édifié au sommet de la montagne, mais contrairement au châteaufort, au sud du plateau et donc à lemplacement du château actuel. Ce château se composait dun donjon quadrangulaire  très élevé appartenant à un style ogival tertiaire et tout autour se trouvent de nombreuses constructions sans ordre.  Le château subit de nombreuses modifications, il fût agrandi vers le sud et surélevé dun étage pour ce qui concernait les habitations. Par un jour de pluie le 16 avril 1944, vers 13 heures les allemands envahissent la montagne, entourent le château, le pillent et emmènent le bétail. Après 4 heures de pillage, de menaces, dinterrogatoires, le château subit le sort du château fort. Incendié par des plaques de phosphores avec interdiction déteindre le feu. Reconstruit en 1947.  correspondant plus à un grand manoir, il comprend 17 pièces pour lhabitation principale.","habitants":"Jules Boyriven\r\n        \"","divers":"Manoir de Montfleur","gps":"","images":["../../jctruffet.com/image/image_39/39_Montfleur_1.jpg","../../jctruffet.com/image/image_39/39_Montfleur_2.jpg"]},"Consult_chateau_formulaire9530":{"id":"Consult_chateau_formulaire9530","dept":"39","canton":"Lons-le-Saunier","commune":"Montigny-les-Arsures","nom":"Montigny_Arsures","type":"Château","periode":"XV","histoire":"MONTIGNY; Guy Arménier, comte de Montbéliard, reçoit en fief des ducs de Bourgogne un territoire sur lequel il érigea un manoir au début du XVe siècle. Second président du parlement de Paris, il introduira en Franche-Comté des éléments d'architecture militaires étrangers à la région. Les hostilités de la fin du XVe siècle laissèrent dans le château de profonds délabrements, notamment au niveau de la courtine sud, où le pont-levis était établi. Louis de Vauchey, puis Maximilien, son fils, tous deux baillis d'Aval, restaurèrent le château qui passa ensuite entre les mains de la famille Lallemand dont l'un des membres, Jean, fut conseiller de Charles Quint. Par mariage, le château passa en dot en 1641 à Claude-Emmanuel de Crécy, seigneur de Chaumergy. En 1770, Victoire-Aimée de Mornay et Ferdinand-Denis de Crécy, son fils, capitaine de cavalerie au régiment Royal de Normandie, vendirent le château à Jérome Eléonore comte de Boutechoux, seigneur de Chavannes et Villette, qui en fut le dernier seigneur. Il mourut en 1811 ayant laissé le château à son fils Guillaume-Margueritte,  vendu, en 1810, au général et baron Lepin, gouverneur de Dantzig. C'est  en 1916 que Mme Lepin légua le château à son petit-neveu, le comte de Sainte-Marie. Depuis lors, il est en possession de cette famille.                                                                       ARSURES; Le château a été bâti sur un domaine viticole qui faisait partie de labbaye cistercienne de Rosières. Labbaye  et ses vignobles furent vendus comme bien nationaux en 1791. Le comte de Boutechoux acheta le château et les vignobles pour compléter son domaine de Montigny lès Arsures. En 1810, il vendit Montigny et conserva les terres des Arsures. Alexandre de Boutechoux vendit son château de Mont-sous-Vaudrey à Jules Grévy pour entreprendre des modifications et des travaux de restauration et dembellissement dans son château à partir de 1840.","architecture":"Le château de Montigny, Le château a été bâti sur un domaine viticole qui faisait partie de l'abbaye cistercienne de Rosières, comme tout   le territoire des Arsures;  Guy Arménier au XVe siècle , édifia une maison forte comprenant quatre tours isolées avec pont levis, construction de fossés destinés à conduire de l'eau.  Ces fossés devaient avoir huit pieds de haut et quatre pieds de large, Aujourd'hui, les douves et le pont levis ont disparu, restent les bâtiments principaux .  La demeure actuelle s'élève sur deux niveaux et présente un corps de logis principal orienté est-ouest, flanqué de deux bâtiments massifs en équerre dont l'un coiffé en pavillon, s'ouvre au rez-de-chaussé  par des arcades. Deux arches cintrées, au centre du corps de logis, font communiquer la grande cour d'entrée aux belles allées et pelouses avec le parc arrière sur lequel donne la façade nord flanquée d'une tour à toit pyramidal.                                                                  Montigny possède aussi deux châteaux des XIVe et XVIe siècle tel que le château de Bancenel.                                                     \r\n On trouve aussi plusieurs abbayes (Les Capucins, La Boutière).","habitants":"Guy Arménier\r\n        \"","divers":"Château de Montigny,des Arsures  et de Bancenel","gps":"","images":["../../jctruffet.com/image/image_39/39_Montigny_Arsures_1.jpg","../../jctruffet.com/image/image_39/39_Montigny_Arsures_2.jpg","../../jctruffet.com/image/image_39/39_Montigny_Arsures_3.jpg","../../jctruffet.com/image/image_39/39_Montigny_Arsures_4.jpg","../../jctruffet.com/image/image_39/39_Montigny_Arsures_5.jpg","../../jctruffet.com/image/image_39/39_Montigny_Arsures_6.jpg","../../jctruffet.com/image/image_39/39_Montigny_Arsures_7.jpg","../../jctruffet.com/image/image_39/39_Montigny_Arsures_8.jpg"]},"Consult_chateau_formulaire9fb7":{"id":"Consult_chateau_formulaire9fb7","dept":"39","canton":"Montmirey-le-Château","commune":"Montmirey-la-Ville","nom":"Montmirey","type":"Château","periode":"XVIII","histoire":"MONTMIREY,  cité au XIVe siècle en domaine féodal de la seigneurie de Velleguindy,  puis passa par alliance en 1320 au Montmirey et en 1405 toujours par alliance de Béatrix de Sennecy avec Jean de Champdivers, écuyer, passa en 1561 par décision de justice au comte de Salnove qui abandonnera la seigneurie aux Monréal, en 1772, le vicomte de Puy-Montbrun, hérite des dames de Monréal à Claude-François-Xavier Bachelu, conseiller maître aux comptes de Dijon qui fit construire le château. Il fut vendu en 1805 aux Chifflet,  une famille de juristes érudits. C'est le baron Henri Picot d'Aligny gendre de Chifflet qui dans les années 1870-1875 donna au château son aspect actuel. En 1900 naîtra le second fils de Bernard-François-Henri de Menthon et de Marguerite Picot de Moras d'Aligny, François de Menthon futur ministre  du Général de Gaulle et député de Haute-Savoie, le château toujours dans la famille d'Aligny.                                                                 Dans la commune le château de Balançon  et un autre à Thervay.","architecture":"Montmirey;  corps de logis rectangulaire à trois niveaux, toiture en  croupe    deux ailes en équerre à deux niveaux toiture également en croupe côté parc tourelle hexagonale avec balconnet au premier étage avec  porte fenêtre à fronton,   et fenêtre avec chiens assis et fronton  courvés et clochetons sur la toiture également hexagonale.","habitants":"Monsieur François de Menthon\r\n        \"","divers":"Château de Montmirey, de Balançon et de Thervey.","gps":"","images":["../../jctruffet.com/image/image_39/39_Montmirey_1.jpg","../../jctruffet.com/image/image_39/39_Montmirey_2.jpg","../../jctruffet.com/image/image_39/39_Montmirey_3.jpg","../../jctruffet.com/image/image_39/39_Montmirey_4.jpg","../../jctruffet.com/image/image_39/39_Montmirey_5.jpg","../../jctruffet.com/image/image_39/39_Montmirey_6.jpg","../../jctruffet.com/image/image_39/39_Montmirey_7.jpg"]},"Consult_chateau_formulaire63e7":{"id":"Consult_chateau_formulaire63e7","dept":"39","canton":"Champagnole","commune":"Montrond","nom":"Montrond_Jura","type":"Vestiges","periode":"XII","histoire":"Montrond; Otton II, Comte de Bourgogne, voulut réprimer lambition du Comte Etienne de Chalon et des Seigneurs de Vienne, qui comme lui, aspiraient à la couronne. Il décida détablir une forteresse sur la montagne de Montrond qui offrait une défense naturelle. Tombée au pouvoir des troupes de Louis XI en 1479, l'édifice fut démantelé et servit de carrière de pierres.","architecture":"Montrond. A côté un bourg entouré de murs. Le donjon carré, de trois étages, avait 13 m de largeur et recouvrait de profonds souterrains. On ne pouvait entrer  dans ce bourg quen suivant un chemin tortueux qui aboutissait  à un pont-levis jeté sur un fossé creusé dans le roc  et précédant la porterie. Les pentes rapides de la montagne,  un fossé large de 10 mètres et profond de 6 mètres, revêtu extérieurement  dun rempart en terre et en pierre, un mur denceinte élevé, semblaient devoir rendre cette place imprenable, et cependant il nen reste que des vestiges.","habitants":"Comte Etienne de Chalon\r\n        \"","divers":"Vestiges de Montrond","gps":"","images":["../../jctruffet.com/image/image_39/39_Montrond_Jura_1.jpg","../../jctruffet.com/image/image_39/39_Montrond_Jura_2.jpg"]},"Consult_chateau_formulaire3fde":{"id":"Consult_chateau_formulaire3fde","dept":"39","canton":"Orgelet","commune":"Moutonne","nom":"Moutonne","type":"Château","periode":"XVII","histoire":"MOUTONNE; Pierre de Lezay, famille des prévôts du pays de Grandvazux épousa en 1579 Antoinette d'Azuel. Mathieu de Lezay capitaine de cavalerie au service du Roi d'Espagne devient seigneur de Marnézia, au début du XVIIe siècle. En 1721 le régent  Philippe d'Orléans érigea les terres en marquisat sous le nom de Marnézia, Moutonne, Rothenay et Présilly, en faveur de Claude-Hubert de Lezay brigadier  des armées du Roi devient le premier marquis de Marnézia c'est lui qui fit construire le château actuel en 1738. le château loué à monseigneur Chabot évêque réfractaire de Saint-Claude, organisateur de culte clandestin de 1785 à 1791, puis des illustres littéraires y séjournèrent. En 1789 le marquis émigra aux Etats-Unis, leur fille Adrienne épousa le comte Claude de Beauharnais cousin germain de l'impératrice Josephine. De leurs fils Adrien et Albert  tous deux baron et comte d'Empire préfets de Strasbourg et de Lyon, leur petit-fils comte Albert-Antoine de Lezay-Marnézia chambellan de l'impératrice poètes et peintre. Cette famille s'éteignit en 1884 sans héritier.  Ce château a beaucoup souffert par les colonies de vacances avant d'être racheté par un particulier.","architecture":"MOUTONNE, le château médiéval, construit en 1738, ceinturé de murailles flanqué aux angles de tours rondes, avait été démantelé en 1637 par les troupes françaises du duc de Longueville.  Le château,  est situé  au sommet d'un coteau escarpé au pied duquel se serre le village de Moutonne, dominant la vallée de la Valouse,  le château auquel on accède par une belle allée de tilleuls, se présente comme une imposante bâtisse recouverte d'un haut toit à croupe.  Le temps s'en est allé et la splendeur des lieux avec, il reste le charme d'une cour herbue, d'un large escalier de pierres moussues, d'un portail à pilastres sur les entablements duquel s'appuient les larges ailerons d'un fronton galbé, des pans d'une tour polygonale saillante.","habitants":"Claude-Hubert de Lezay                                                                    comte Claude de Beauharnais\r\n        \"","divers":"Château de Moutonne","gps":"","images":["../../jctruffet.com/image/image_39/39_Moutonne_1.jpg","../../jctruffet.com/image/image_39/39_Moutonne_2.jpg","../../jctruffet.com/image/image_39/39_Moutonne_3.jpg"]},"Consult_chateau_formulaire4158-2":{"id":"Consult_chateau_formulaire4158-2","dept":"39","canton":"Montmirey-le-Château","commune":"Mutigney","nom":"Mutigney","type":"Château","periode":"XV","histoire":"MUTIGNEY;  construit  par Herman Vaudrey, seigneur de Mutigney   Le château fut vendu en 1530 à Étienne Le Moyne, conseiller au parlement de Dole. Après le partage de la propriété entre les héritiers Le Moine et Mayrot, le château fut racheté au XVIIIe siècle par François-Marie-Bruno d'Agay à Charles-Léonard-Prosper Mayrot, capitaine de cavalerie, avant la Révolution, par le comte d'Agay. François Mayrot, conseiller au parlement de Dole en 1627, épousa au château Jeanne de Brun Le nouveau seigneur fit ériger la terre de Mutigney en comté en juillet 1766. Au XVIIIe siècle, François Marie D'Agay, avocat général au parlement de Besançon, acheta la co-seigneurie aux familles Mayrot et le Moine. Au XIXe siècle, le château de Mutigney appartenait à M. de  Guillaumeau, marquis de Saint-Souplet, devint propriétaire du château au XIXe siècle. Au XXe siècle, le domaine passa aux mains de la famille Boiteux.","architecture":"Le château de Mutigney fut construit en 1450 . Il comporte au nord un corps principal flanqué de deux tours rondes érigés sur une terrasse dominant la plaine de l'Ognon. Une tour octogonale engagée dans le mur sud ceinture l'escalier qui dessert les étages. Six cheminées gothiques subsistent encore dans le corps de logis. Un second corps avec deux tours carrées lui fait face au sud, délimitant une cour intérieure.\r\nLes bâtiments qui fermaient la cour sur les deux autres faces, très dégradés, ont été éliminés lors de la récente restauration. Le château était défendu par un mur d'enceinte, le côté nord était protégé par les marais.","habitants":"Herman Vaudrey\r\n        \"","divers":"Château de Mutigney","gps":"","images":["../../jctruffet.com/image/image_39/39_Mutigney_1.jpg","../../jctruffet.com/image/image_39/39_Mutigney_2.jpg","../../jctruffet.com/image/image_39/39_Mutigney_3.jpg","../../jctruffet.com/image/image_39/39_Mutigney_4.jpg","../../jctruffet.com/image/image_39/39_Mutigney_5.jpg"]},"Consult_chateau_formulaireacab":{"id":"Consult_chateau_formulaireacab","dept":"39","canton":"St-Amour","commune":"Nanc-les-St-Amour","nom":"Nanc","type":"Maison forte","periode":"XV","histoire":"NANC; au Moyen-Age, la seigneurie était tenue en fief, de la famille suzeraine de Coligny, par les sires de Laubespin qui firent construire une maison forte aux environs de 1450.  Le château, modifié par la  famille Vuillemenot au XVIIIe siècle, cette famille  a habité la demeure de père en fils jusqu'à la mort de Raoul,  il y a quelques   années seulement.   La propriété servait de double residense l'été. L'hiver ses hôtes lui préféraient un hôtel particulier à Saint Amour.","architecture":"NANC,  au Moyen-Age  construction d'une maison forte .  devenu  château,  parallélogramme massif, remanié s'élève sur une petite butte au centre du village, sa façade arrière flanquée de deux tours carrées, se dégage mal des bâtiments de ferme qui l'enserrent et des moellons de ses vieux murs, stigmates des incendies subis au long des guerres, la façade principale au bord de la rue, s'ouvre par une grosse tour ronde percée d'une porte basse en anse de panier, les fenêtres ont perdues leurs  meneaux.","habitants":"Famille Vuillemenot \r\n        \"","divers":"Maison forte de Nanc","gps":"","images":["../../jctruffet.com/image/image_39/39_Nanc_1.jpg","../../jctruffet.com/image/image_39/39_Nanc_2.jpg","../../jctruffet.com/image/image_39/39_Nanc_3.jpg"]},"Consult_chateau_formulaire9a63":{"id":"Consult_chateau_formulaire9a63","dept":"39","canton":"Bletterans","commune":"Nance","nom":"Nance","type":"Château","periode":"XV","histoire":"NANCE;  le premier seigneur connu  est Richard Sire de Montrichard qui vendit cette terre  en 1335 à Jean de Chalon II, Sire dArlay. Il en disposa, en 1350  en faveur de Jean, son fils , connu sous le nom de Jean de Nance, chevalier, et de Clémence de Beaufort, son épouse, Louis et Etienne de Nance.  Ce dernier reprit le fief, en 1409, au nom de Perrin et Étiennette Jouffroy, les enfants,  de Jean de Chalon-Arlay III, Prince dOrange, pour les biens quil avait recueillis dans la succession de Jean de Nance, leur aïeul. Perrin Jouffroy, écuyer, remplit le même devoir en 1425 , épousa Jeanne de Savigny-en-Revermont. Cest en 1651 que Mathieu de Nance reprit  la seigneurie. La famille Jouffroy navait quun simple fief à Nance. Les descendants de Louis de Nance conservèrent cette terre jusquen 1662, époque à laquelle Mathieu de Nance la vendit à François de Velzet, seigneur de Grusse, marié à Adrienne de Tournon. Monsieur de Velzet ne laissa quune fille, Denise, qui partagea, en 1684, la seigneurie de Nance avec Monsieur de Diombes, acquéreur des droits des descendants dEtienne\r\nde Nance. Denise de Velzet étant morte sans postérité, institua sa mère Adrienne de Tournon, pour son héritière universelle. Adrienne de Tournon, veuve et remariée à Alexandre de Godichard, vendit la seigneurie de Nance en 1699 au Comte Louis de Tournon. Ce dernier la revendit en 1702 à Mr Jean Antoine de Linglois. en 1790, Mr de Beaurepaire, lacheta de Claude Antoine Linglois et la laissa à Mme de Bussières sa fille qui la vendit en 1837, à Mr Lannoy. La portion de Mr de Diombes appartenait en 1689 à noble Etienne Pelissonnier, dArlay. Mlle Pelissonnier, dame de Saint Georges, la porta en dot, avant 1718 à Mr Etienne Jacquemet qui la vendit à  François Louis de Vauchier de Grandchamp. Sa fille Claudine Pétronille mariée à Antoine Ferdinand, comte dAmandre en hérita et la laissa à Louis Henri dAmandre.","architecture":"château de Nance situé au bord de la rivière qui, dit-on, abritait sept fermes à lintérieur de son enceinte avant les guerres de Louis XI. Le  petit château  actuel  dépendait  de la vicomté de Bletterans et seigneurie jusquau XIVe siècle le château, situé sur la rive gauche de la Seille a subi une transformation si complète, quil na rien conservé de féodal. Il avait une telle importance quavant les guerres de Louis XI . du château reste un corps de logis rectangulaire à deux niveaux toit en croupes.","habitants":"Famille Jouffroy\r\n        \"","divers":"Château de Nance","gps":"","images":["../../jctruffet.com/image/image_39/39_Nance_1.jpg"]},"Consult_chateau_formulaire1115":{"id":"Consult_chateau_formulaire1115","dept":"39","canton":"Chaussin","commune":"Neublans_Abergement","nom":"Neublans","type":"Château","periode":"XVIII","histoire":"NEUBLANS, cité dès le XIIIe siècle, la maison de Rye possède le château de Neublans. Au XVe siècle, suite aux héritages et partages successifs du vicomté de Neublans, il semble qu'il y ait eu deux châteaux détruits par la suite. En 1535,  François Brion, autrement connu comme l'Amiral Chabot, est propriétaire d'une partie des terres de Neublans. Il y reçoit  François Ier dans son château. De 1610 à 1612, l'assemblée des commissaires chargés de trancher sur la délimitation entre Duché et Comté de Bourgogne siège à Neublans. Le château est en ruines quand le marquis de Froissard en fait lacquisition en 1703. Ses descendants continuèrent les travaux, rêvant de le doubler par une construction symétrique. A la Révolution, le dernier propriétaire sexile et ses biens sont confisqués. Son épouse va le racheter, mais il ne reprendra pas les travaux à son retour à la restauration. Le château est toujours la propriété de la famille du marquis de Broissia.","architecture":"La commune de Neublans présente un intérêt architectural par la présence d'un magnifique château du XVIIIe siècle de style néo-classique. Les toitures et certaines pièces d'écuries sont inscrites à l'inventaire des Monuments Historiques. La Révolution ayant stoppé l'avancement de sa construction, l'aile droite n'a jamais été terminée. Il englobe par ailleurs les restes du précédent château. Aujourd'hui résidence privée. Dominant la plaine du Finage,  corps de logis rectangulaire à quatre niveaux toitures en croupes pavillons d'entrée excentré et saillant avec fronton.","habitants":"Marquis de Froissard\r\n        \"","divers":"Château de Neublans-Abergement","gps":"","images":["../../jctruffet.com/image/image_39/39_Neublans_1.jpg","../../jctruffet.com/image/image_39/39_Neublans_2.jpg","../../jctruffet.com/image/image_39/39_Neublans_3.jpg","../../jctruffet.com/image/image_39/39_Neublans_4.jpg","../../jctruffet.com/image/image_39/39_Neublans_5.jpg","../../jctruffet.com/image/image_39/39_Neublans_6.jpg","../../jctruffet.com/image/image_39/39_Neublans_7.jpg"]},"Consult_chateau_formulaire0657":{"id":"Consult_chateau_formulaire0657","dept":"39","canton":"Nozeroy","commune":"Nozeroy","nom":"Nozeroy","type":"Château","periode":"XIII","histoire":"NOZEROY, fondée par Jean lAntique au XIIIe siècle, Nozeroy est le berceau de lune des familles jurassiennes les plus puissantes du Moyen-Âge, celle des Challon, devenus princes dOrange,  le seigneur Jean Ier de Chalon, cette seigneurie entretiennent une cour brillante, sentoure
