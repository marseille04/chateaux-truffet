bastide viticole, de Bournet viticole de la tour de Plantade  de France et Jaffar Netanj, à Labastide de Levis,  maison de maître du XVIII siècle en pierres blanches du pays, vous en apprécierez durant vos vacances sa douceur de vivre, au milieu dun parc bordé de collines au milieu du vignoble Gaillaçois évoquant la Toscane : Très beau pigeonnier rond fin XVIIIe siècle.","habitants":"France et Jaffar Netanj\r\n        \"","divers":"Le domaine de Plantade eyt de Bournet à Labastide de Levis","gps":"","images":["../../jctruffet.com/image/image_81/81_Labastide_Levis_1.jpg","../../jctruffet.com/image/image_81/81_Labastide_Levis_2.jpg","../../jctruffet.com/image/image_81/81_Labastide_Levis_3.jpg","../../jctruffet.com/image/image_81/81_Labastide_Levis_4.jpg"]},"Consult_chateau_formulaire81c3":{"id":"Consult_chateau_formulaire81c3","dept":"81","canton":"Lagrave","commune":"Florentin","nom":"Labastidié","type":"Château","periode":"XIX","histoire":"LABASTIDIE, est un domaine viticole, qui appartient depuis 1990 aux membres du conseil des échansons de France, une confrérie bachique qui a pour mission la promotion et la défense des appellations dorigine française, aussi bien en France quà létranger. Son siège se situe au musée du vin de Paris.  Au château Labastidié est exposé un des derniers pressoirs à perroquet présent en France comme en témoigne l'inventaire de la direction régionale des affaires culturelles de Bourgogne datant de décembre 2004. \r\nLe vignoble gaillaçois a été planté au siècle d'Auguste par les légions romaines, et développé par les moines de l'abbaye Saint-Michel de Gaillac à partir de l'an 972. Après l'étude et la datation de plusieurs poteries multimillénaires, Roger Dion et Marcel Lachiver, historiens du vin, considèrent tous deux, respectivement en 1959 et en 1988, que \"Gaillac possède l'un des plus anciens vignobles de France\".                                                                                               Blanche pas d'information historique.","architecture":"Le Château Labastidié  ainsi que son ancienne cuverie et ses premiers chais ont été construits au milieu du XIXe siècle. Le pressoir à perroquet fut utilisé de la fin du XVIe jusquà la fin du XIXe siècle environ. Cette machine viticole rare est une pièce monumentale qui appartient à la collection du musée du vin de Paris, conseil des échansons de France. Son siège se situe au musée du vin de Paris. Le château est de plan en U corps de logis rectangulaire à deux niveaux sur rez-de-chaussée et attiques avec ils de buf, fronton triangulaire sur porte d'entrée flanqué de deux pavillons carrées sur les flancs toitures pyramidales.                                                                            Blanche, bâtisse  de plan rectangulaire à deux niveaux avec lucarnes au niveau du toit presque plat.","habitants":"Échansons de France\r\n        \r\n        \"","divers":"Domaine de Labastidié et de la Maison Blanche à Florentin","gps":"","images":["../../jctruffet.com/image/image_81/81_Labastidie_1.jpg","../../jctruffet.com/image/image_81/81_Labastidie_2.jpg","../../jctruffet.com/image/image_81/81_Labastidie_3.jpg"]},"Consult_chateau_formulaire61ad-2":{"id":"Consult_chateau_formulaire61ad-2","dept":"81","canton":"Castres","commune":"Laboulbène","nom":"Laboulbène","type":"Château","periode":"XV-XIX","histoire":"Trois châteaux à Laboulbène dont celui de Laboulbène du XVe siècle  celui de Balluyère et les vestiges de Montpinier à 1 km au nord.                                                                                              LABOULBENE, actuellement hôtel de ville et d'une SCI de monsieur Wehrlin.                                                                                 BALLUYERE   pas d'information historique pour ces deux châteaux.                                                                                              MONTPINIER, relève  de la vicomté de Lautrec. Raymonde de Lautrec, fille de Bertrand 1er de Lautrec et de Contours de La Barthe,  par alliance du 10 novembre 1272  passe aux de Montpinier à Raymond de Brassac. Jusqu'en en 1609, la famille de Brassac possède la seigneurie de Montpinier.  Le baron de Biron attaque le château, en mai 1569, et le démantèle. De nouveau, en 1575, le vicomte de Paulin occupe le château, puis en 1580, l'armée de Turenne l'attaque et le récupère. En 1587, les catholiques le reprennent, mais l'armée du vicomte de Montgomery les chasse. Les deux frères Jean et François de Brassac sont tués tour à tour dans différentes opérations. En 1588, François de Brassac décède. Claudine, sa fille apporte le château de Montpinier en dot à Alexis de Perrin de religion protestante. En 1621, lors de la révolte d'Henri II de Rohan,  une petite garnison commandée par le sieur de Maussan occupe le château. Victoire de Perrin Brassac le  transmet  par son mariage  à Benjamin baron de Lacger. Son père, Alexis vicomte de Perrin Brassac, après avoir combattu lors de la guerre d'indépendance des États-Unis, avait été nommé en poste à Verdun où il s'était fixé par son mariage. Après avoir combattu dans l'armée de Condé, il revient en Lorraine puis retourne à Montpinier. Après son décès, il est enterré dans son église de Mazières. Son nom et son grade se lisent encore sur la dalle funéraire.Le petit-fils d'Alexis, Hippolyte baron de Lacger interrompt plus de six siècles de possession familiale en vendant le château à Ernest Schoelcher, neveu de  Victor Schlcher, qui y vit jusqu'en 1891. Il a appartenu à la famille de Victor Schlcher, promoteur de l'abolition de l'esclavage qui repose au Panthéon comme bienfaiteur de l'humanité.","architecture":"Laboulbène, du XVe siècle quadrilatère à deux niveaux flanqué de  tours rondes en angles à toits presque plats.                                 Balluyère, du XIXe siècle à deux niveaux toit à la mansart. Montpinier,  construit sur un ancien fort pendant les années 1830, il est maintenant dans un état de ruine avancé. On trouve en son centre une petite cour dans un style Renaissance. Il contient aussi une chapelle et ses derniers occupants avaient construit un « salon maure » dans la partie côté jardin. L'entrée est toutefois interdite et dangereuse. De l'autre côté, il surplombe la route qui mène à Lautrec, ou l'on entrevoit les fortifications médiévales et les deux tours carrées dans un écrin de très grands arbres qui poussent au-dedans comme au-dehors de l'édifice, transperçant sols et plafonds. Le site a eu un rôle important pendant les guerres de religion.","habitants":"Famille de Brassac                                                                               Famille de Victor Schlcher,\r\n        \r\n        \"","divers":"Château vestiges de Montpinier, château de la Balluyère et l'hôtel de ville de Laboulbène","gps":"","images":["../../jctruffet.com/image/image_81/81_Laboulbene_1.jpg","../../jctruffet.com/image/image_81/81_Laboulbene_2.jpg","../../jctruffet.com/image/image_81/81_Laboulbene_3.jpg","../../jctruffet.com/image/image_81/81_Laboulbene_4.jpg","../../jctruffet.com/image/image_81/81_Laboulbene_5.jpg","../../jctruffet.com/image/image_81/81_Laboulbene_6.jpg"]},"Consult_chateau_formulaire9f28":{"id":"Consult_chateau_formulaire9f28","dept":"81","canton":"Labruguière","commune":"Labruguière","nom":"Labruguière_Gaix","type":"Château","periode":"XVI-XIX","histoire":"Quatre châteaux à Labruguière dit de Cardaillac du XVI-XVIIe siècle, de Hauterive (voir article), manoir des Causses et de GaÏx du XIXe siècle à Valdurenque.                              LABRUGUIERE, CARDAILLAC,  un château fort est bâti au Xe siècle, servant de noyau à un village. Durant les guerres de religion, Labruguière est pris par Guillot de Ferrières, seigneur protestant local et fait soumission à Henri IV en 1591. Restauré fin XVIe siècle, début XVIIe siècle, le château actuel du XVIIe siècle construit par Louis de Cardaillac le château occupait une partie des remparts. La seigneurie passe par plusieurs familles et donne lieu à un  procès intenté par le marquis du Lac en 1749, le château et la seigneurie de Labruguière passent aux mains de Joseph Dulac qui obtient de l'ériger en marquisat en 1757, La Bruguière prend alors le nom de Dulac. Pendant près de trente ans, le marquis Dulac, père, cherche à imposer aux habitants de Labruguière des droits seigneuriaux en supprimant les anciens privilèges et franchises. Il perd ses procès et la cour des aides de Montpellier le condamne même à rembourser les habitants.   Ayant supprimé les privilèges, il réclamait son dû aux habitants. Un drapier persévérant, Bernard Dougalos, finit par avoir gain de cause en 1777 et le marquis doit remboursé les impôts indûment perçus pendant vingt neuf ans.                  GAÏX  à Valdurenque que nous pouvons admirer aujourd'hui est une splendide construction qui ne doit pas faire oublier le vieux château médiéval qui, jusqu'au début du XIXe siècle, fut le symbole d'une puissante seigneurie: le château de Geccaco (Gaïx) est mentionné dès 1035. Philippe de Montfort attribua la seigneurie de Gaïx ainsi que ses dépendances à Jean de Burlats le Vieux, aujourd'hui propriété du baron de Blay de Gaïx.","architecture":"Labruguière-Cardaillac, le château actuel du XVIIe siècle est une véritable forteresse  par son emplacement est érigé à lextrémité du plateau surélevé, le logis est un long rectangle à la façade légèrement arrondie. Les fenêtres à meneaux sont régulièrement espacées sur deux étages et des lucarnes sous la corniche du toit.  Corps de logis à trois niveaux,   les corbeaux qui la soutiennent donnent lieu à un décor sculpté daccompagnement à l'opposée une tour carrée.  Une tourelle dangle en encorbellement occupe langle du corps de bâtiment principal, les corbeaux qui la soutiennent donnent lieu à un décor sculpté daccompagnement.  Une petite tour ronde en encorbellement  qui prend corps au premier étage et dépasse la toiture d'un étage. Une tour carrée est intégrée au mur pignon et surplombe la toiture en ardoise. La récente restauration donne un air neuf un peu artificiel à l'ensemble.                                      Gaïx,  la demeure présente une façade de villa italienne, un corps de bâtiment à neuf travées au milieu duquel un avant-corps en hémicycle abritant un salon crée une noble animation et une division tripartite de la façade, les trois travées de la rotondes étant flanquée du même nombre de travées sur les ailes de la façade. Coiffée d'une toiture en dôme, la rotonde est de la même hauteur que le logis. Il comporte un rez-de-chaussée surmonté d'un étage de lucarnes carrées, donnant aux travées une noble ordonnance. Les fenêtres ont été remplacées sur la rotonde par de belles portes fenêtres ouvrant sur le perron auquel mène l'escalier à double volée, cette simplicité confère à l'avant corps une noblesse accrue et accentue l'aspect  néo-classique de cette noble demeure.","habitants":"Famille de Guillot de Ferrières                                                          Famille de Louis de Cardaillac                                                                                Baron de Blay de Gaïx\r\n        \r\n        \"","divers":"Château de Labruguière dit de Cardaillac, de Gaix,du Bessous et de Causse.","gps":"","images":["../../jctruffet.com/image/image_81/81_Labruguiere_Gaix_1.jpg","../../jctruffet.com/image/image_81/81_Labruguiere_Gaix_2.jpg","../../jctruffet.com/image/image_81/81_Labruguiere_Gaix_3.jpg","../../jctruffet.com/image/image_81/81_Labruguiere_Gaix_4.jpg","../../jctruffet.com/image/image_81/81_Labruguiere_Gaix_5.jpg","../../jctruffet.com/image/image_81/81_Labruguiere_Gaix_6.jpg"]},"Consult_chateau_formulaired34c":{"id":"Consult_chateau_formulaired34c","dept":"81","canton":"Lacaune","commune":"Lacaze","nom":"Lacaze_Camalières","type":"Château","periode":"XVII-XIX","histoire":"Deux châteaux à Lacaze dont celui de Lacaze du XVIIe siècle et celui de Camalières du XIXe siècle.                                                     LACAZE, de la puissante famille de Bourbon Malauze, Branche bâtarde descendante de Saint-Louis et des d'Albret de Navarre, famille d'Henri IV par sa mère.  Ce fut le cas des Bourbons Malause qui abjurent, aussi bien Henri II de Bourbon Marquis de Malause que son fils Louis. Et ce sera lépouse de ce dernier, Henriette de Durfort Duras, Marquise de Malause, nièce du grand Turenne, qui sera linstigatrice de lhorrible massacre de Saint Jean del Frech lors dune lAssemblée du Désert en 1689, en complicité avec le Baron de Lacrouzette Co-seigneur de Ferrières, huguenot et descendant du fameux chef Calviniste Guilhot de Ferrières.\r\n Donc, Philippe Carayon sieur de La Tour, premier du titre est certainement un riche fabricant et marchand qui bénéficie de la fortune amassée par ses parents et aïeux après 1685, date de leur conversion présumée. En 1695, sur le rôle de la capitation de Camalières on trouve 3 Carayon de cette lignée : Barthélémy, Pierre et Jacques de la classe des marchands                                      CAMALIERES, le château de Camalières dont hérita Henri de Carayon Latour, fils d'Edmond et d'Henriette de Chateaubriand et qui passa par alliance et héritage à la famille de Villeneuve.  Cest par lun des fils dEdmond, Jean Marie Catherine Henri qui épousa Marguerite Jacqueline Adolphine dAlsace dHenin Liétard, Princesse dAlsace que lon retrouve la famille actuellement propriétaire des terres de La tour et Camalières, les de Villeneuve branche dHauterive. En effet, une fille dHenri et de la Princesse dAlsace, Henriette Laure Marie Simone de Carayon Latour épousa Pons Marie Joseph Louis de Villeneuve, issu dune très ancienne famille noble puisque ils avaient déjà trois représentants aux croisades aux côtés de Saint Louis. Ainsi, après deux générations, les Carayon de La Tour à Camalières avaient réussi à asseoir leur lignée et la consolider par de prestigieuses alliances.","architecture":"LACAZE,  bâti sur un méandre du Gijou.  Il avait trois tours, une cour avec un corps de garde et était défendu par des fossés et un pont levis en partie détruit en 1820, il ne reste aujourd'hui une tour du XIIe siècle et la façade donnant sur le Gigou. En 1884, un incendie ravage une grande partie du troisième étage. Le délabrement du château situé au centre du village pousse la mairie à le racheter en 1995. Une première partie de travaux  extérieurs est achevée en 2005 : Reconstruction de l'échauguette, des toits et des murailles. La deuxième partie des travaux restauration intérieure commence en 2011 par l'aménagement du rez-de-chaussée en deux grandes salles d'expositions et spectacles.  En 2014, le sous-sol est aménagé pour créer un amphithéâtre (conférences, théâtre et cinéma). Lors des travaux, les fondements d'une tour du XIIe siècle ont été mis au jour. \r\nCamalières du XIXe siècle avec son clocher singulier et des fresques de Nicolaï Greschny. L'ensemble à trois niveaux flanqué d'une tourelle à toit pointu.","habitants":"Famille de Bourbon Malauze                                                            Famille de Villeneuve\r\n        \r\n        \"","divers":"Château de Lacaze et de Camalières à Lacaze.","gps":"","images":["../../jctruffet.com/image/image_81/81_Lacaze_Camalieres_1.jpg","../../jctruffet.com/image/image_81/81_Lacaze_Camalieres_2.jpg","../../jctruffet.com/image/image_81/81_Lacaze_Camalieres_3.jpg","../../jctruffet.com/image/image_81/81_Lacaze_Camalieres_4.jpg","../../jctruffet.com/image/image_81/81_Lacaze_Camalieres_5.jpg","../../jctruffet.com/image/image_81/81_Lacaze_Camalieres_6.jpg","../../jctruffet.com/image/image_81/81_Lacaze_Camalieres_7.jpg"]},"Consult_chateau_formulaire6b0c":{"id":"Consult_chateau_formulaire6b0c","dept":"81","canton":"Lavaur","commune":"Lacougotte_Cadoul","nom":"Lacougotte_Cadoul","type":"Château","periode":"XV","histoire":"A Lacougotte-Cadoul;    Belaval Xve-XIXe siècles, tour ronde et carrée et château de Gréouces  du XIXe siècle,                                BELAVAL  pas d'information historique                                       GREOUCES   L'actuel château de Gréouces a pris la succession d'un château détruit durant les guerres de Religion pas d'information historique.","architecture":"BELAVAL, le domaine  est un impressionnant ensemble remanié sous Louis XIII mais constitué de divers corps de logis assez homogènes. Outre un puissant logis central ayant fait autrefois office de donjon, on trouve notamment une tour carrée et une tour cylindrique. Si les grandes fenêtres à encadrement de pierre que l'on note sur certaines façades ont été refaites après que le château ait été construit, elles remontent au moins au XVIIIe siècle, si l'on en croit leur robuste appareil de pierre. Les toitures à faible pentes sont soutenues par quatre rangées de génoises.                                        L'actuel château de Gréouces a pris la succession d'un château détruit durant les guerres de Religion. Dans son état actuel, il se présente comme un corps de logis flanqué sur sa façade principale de deux tours crénelées. Gréouces est une curieuse et séduisante invention du XIXe siècle. Les fenêtres de la façade ont été décorées de colonnettes aux curieux entablements portant des motifs évoquant plus l'écriture coufique que les inscriptions médiévales. Les tours ont reçu, comme le logis, des rangées de mâchicoulis et des créneaux percés de curieuses archères d'opérette en forme de curs. Tout aussi fantaisistes que les toitures fuselées des tours, le comble du logis principal affecte la forme d'un toit en carène, surmonté d'un clocheton aux allures de cénotaphe. Les tours elles même, bien que hautes et fines, ont reçu elles aussi des créneaux, véritable défi aux lois de l'architecture.","habitants":"Seigneur locaux\r\n        \"","divers":"Le château de Belaval et le château de Gréouces à Lacougotte-Cadoul","gps":"","images":["../../jctruffet.com/image/image_81/81_Lacougotte_Cadoul_1.jpg","../../jctruffet.com/image/image_81/81_Lacougotte_Cadoul_2.jpg"]},"Consult_chateau_formulaire6052":{"id":"Consult_chateau_formulaire6052","dept":"81","canton":"Labruguière","commune":"Lagardiolle","nom":"Lagardiolle","type":"Château","periode":"XIII","histoire":"deux château à Laguardiolle dont celui de Largadiolle et celui  de Parisot-à Saint-Avit  à quelques kilomètres au nord-Est.                          LAGARDIOLLE, à partir de 1237, l'on trouve les Saïssac seigneurs de Lagardiolle puis, en 1389, un acte du parlement de Toulouse reconnaît à Géraud de Belleserre la possession de Lagardiolle et de Saint-Avit. Quelques années plus tard, au début du XVe siècle, la baronne d'Appelle, sur de feu Géraud, sollicite du parlement de Paris l'annulation de certaines procédures faites par le bailli de Puylaurens et soutient être propriétaire de Lagardiolle et Saint-Avit. Mais à cette époque, la seigneurie de Saint-Avit semble bien être passée entre les mains de Jean de Foix, résidant en Ariège, à  qui succéda Georges de Foix Rabat. Jadis le château était entouré de murailles, durant les guerres de Religion et après le pillage de leur monastère, les religieux de L'Ardorel avaient trouvés refuge à Lagardiolle. Lorsque le château fut assiégé et pris par les troupes de Montgomery en 1587, ils se réfugièrent à La Rode, dans la paroisse de Lempaut. La lignée des Foix-Rabat finit par s'éteindre en 1748, lorsqu'Élisabeth de Foix Rabat légua ses biens à François de Rochechouart, qui vendit la même année le château de Lagardiolle à Jean-Jacques d'Avessens de Moncalm. Jean Roger de Foix, seigneur de Canté, vicomte de Rabat, baron de La Gardiolle, succède en 1622, à son frère Georges, mort au siège de Montauban et il meurt en février 1668, laissant pour successeur le marquis de Foix-Rabat, son fils. C'est en 1748, que Elisabeth de Foix, veuve messire Pierre de Montesquieu lègue ses biens au puissant seigneur François-Charles de Rochechouart, maréchal, comte de Saxe, celui-ci vend la seigneurie de La Gardiolle à messire Jean-Jacques d'Evessens de Saint-Rome, seigneur de Moncalm, Montesquieu et autres places.                                        PARISOT,  l'activité principale du château une SCI de location de logements, dirigée par Broman Marianne   qui occupe le poste de associé-gérant , ainsi que Rukke Elling.","architecture":"Lagardiolle, édifié sur un mamelon, à 225 mètres d'altitude, le château fort avec ses remparts et ses courtines, son pont-levis et ses douves, dominait la ville, ses deux églises et ses murailles.\r\nDu haut de ses tours de garde, il surveillait dans la plaine les les métairies disséminés sur les terres cultivables. Son rôle était alors de défendre et mettre à l'abri les habitants en cas d'éventuels incursions et pillages par les bandes armées, ou en temps de guerre, par les armées régulières, ce qui justifie sans doute le nom de La  Gardiolle. En 1590  Le château est incendié, mais reconstruit le bâtiment servait de poste de garde.","habitants":"Marquis de Foix-Rabat\r\n        \"","divers":"Le château de lagardiolle et de Parisot à Saint-Avit.","gps":"","images":["../../jctruffet.com/image/image_81/81_Lagardiolle_1.jpg","../../jctruffet.com/image/image_81/81_Lagardiolle_2.jpg","../../jctruffet.com/image/image_81/81_Lagardiolle_3.jpg","../../jctruffet.com/image/image_81/81_Lagardiolle_4.jpg","../../jctruffet.com/image/image_81/81_Lagardiolle_5.jpg"]},"Consult_chateau_formulaireecc6":{"id":"Consult_chateau_formulaireecc6","dept":"81","canton":"Lagrave","commune":"Lagrave","nom":"Lagrave","type":"Château","periode":"XII-XIX","histoire":"Deux châteaux à Lagrave dont celui de Lagrave et le château de Tourny les Roses                                                                                          LAGRAVE, la seigneurie  commence à figurer dans l'histoire au milieu du XIIe siècle: elle appartenait au comté de Toulouse et à la vicomté d'Albi. Le château primitif fut l'un des premiers pris par Simon de Montfort. Au XVIe siècle, les environs furent ravagés par les protestants, et le château tomba en 1573 entre leurs mains. L'année suivante, Lagrave fut repris par les catholiques du sergent Combes. À la veille de la Révolution, Pierre-Jacques-Louis de Pujol, baron de Lagrave, émigra en 1793, le contenu du château fut vendu en 1794, la vente des terres intervenant deux ans plus tard. En 1828, l'ex-émigré Pujol, sans postérité, légua le château à sa nièce Catherine de Rosières. Cette dernière épousa le baron Adrien de Gouttes, et le château est resté depuis dans cette famille.                  TOURNY les ROSES  au cur d'un domaine viticole d'exception. Le château de Touny les Roses a été bâti en 1880 sur une ancienne métairie, par le Dr Cassan qui fut maire dAlbi sous le Second Empire.\r\nNotre demeure ainsi que nos jardins, sont répertoriés au Patrimoine . Aujourdhui, chambres dhôtes .","architecture":"Lagrave, pour des raisons liées au sol, le plan du château a été conçu sous la forme d'un triangle, plan qui est parvenu jusqu'à nous, car lorsque le château fut rebâti en 1750, il le fut sur ses vieilles fondations. La tour carrée fut ramenée à sa hauteur actuelle sous la Révolution.                                                                                                                       Tourny les Roses, de plan en U avec un corps de logis rectangulaire à deux niveaux en face centrale,  ailes sur le côté prolongés en équerres  par   des ailes barlong de dépendances avec tours carrées à toits pyramidal.","habitants":"Pierre-jacques-Louis de Pujol\r\n        \"","divers":"Château de Lagrave et de Tourny les Roses.","gps":"","images":["../../jctruffet.com/image/image_81/81_Lagrave_1.jpg","../../jctruffet.com/image/image_81/81_Lagrave_2.jpg","../../jctruffet.com/image/image_81/81_Lagrave_3.jpg","../../jctruffet.com/image/image_81/81_Lagrave_4.jpg","../../jctruffet.com/image/image_81/81_Lagrave_5.jpg"]},"Consult_chateau_formulairee5af":{"id":"Consult_chateau_formulairee5af","dept":"81","canton":"Carmaux","commune":"Saint-Martin Laguepie","nom":"Laguepie","type":"Vestiges","periode":"XII","histoire":"LAGUEPIE, en 1175,  seigneur de La Guèpie, Raymond Bernard. En 1212, Simon de Montfort chargé déradiquer lhérésie cathare attaque le château de La Guèpie, qui est incendié et rasé, ainsi que le village. Sa position stratégique lui permis d'être réédifié. Le comte de Toulouse Raymond VII, devient seigneur de La Guèpie. Par héritage le château revient à sa fille, épouse dAlphonse de Poitiers, frère de Louis IX, qui léchange contre le château de Penne. Bernard de Penne devient seigneur de La Guèpie et débute alors la branche des Penne-Gourdon pour trois siècles environ. La guerre de Cent Ans enflamme le Sud-Ouest, le Viaur devient une frontière entre le royaume de France et dAngleterre. Le traité de Brétigny le remet aux Anglais pour une trentaine dannées. Le 1er août 1592, la ligue catholique du duc de Joyeuse, fait le siège du château. Le château fût à nouveau rasé ainsi que le village. En 1598, lédit de Nantes apporte la paix, et les seigneurs resteront protestants. Cest le frère du baron assassiné qui relève les ruines du château et lui donne son aspect résidentiel  à la fin du XVIe siècle. Au XVIIe siècle, Nicolas de Cambon, premier mari d'Ursule de Malroux, baronne de Laguépie, entreprit d'importantes réparations, son successeur Casimir d'Yzarn de Freyssinet, baron de Laguépie, le transforma en une confortable demeure. En 1792, Laguépie fut anéanti par le feu après avoir été pillé La Révolution sonne la fin du château, il fut pillé par les habitants de la région. Le baron de Freissinet réfugié en Suisse décède en 1796. Héritent alors ses deux fils Casimir et Louis. Casimir revient pour la première fois en 1827, il tient à conserver les ruines du berceau de ses aïeux et fait faire quelques travaux. Son frère Louis, en 1844  vend le château en entier à Raymond Maurel, mais Casimir fait casser la vente et le château est partagé en deux.","architecture":"Le château primitif de Laguépie, construit au début du XIIIe siècle, fut rasé une première fois en 1212 . Reconstruit, . Durant les guerres de Religion, à la suite de nombreux assauts, le château fut finalement pillé et à demi rasé en 1592 . Non content de cela, le redoutable chef des ligueurs fit pendre le baron de Laguépie. Le château fut reconstruit peu de temps après par Jacob, baron de Laguépie. Laguepie construction de l'an X Casimir conserve les ruines, cette partie représente à peu près un quart de la superficie. Lautre partie est vendue. Dans des années 70 des pans de murs tombent, le descendant du baron nétant pas en mesure d'assumer cette charge le donne pour le franc symbolique à la mairie de Saint-Martin-Laguépie, actuellement propriétaire. Cest en 1998 que se crée l'association, dont lambition est de consolider et de préserver les ruines et de donner aux lieux une nouvelle vie. Lédifice est illuminé mais des travaux de consolidation sont nécessaires. En 2003, les travaux sont achevés et en 2006 les premiers visiteurs  sont accueillis dans le château par les bénévoles de l'association.","habitants":"Comte de Toulouse Raymond VII\r\n        \"","divers":"Vestiges du château de Laguepie","gps":"","images":["../../jctruffet.com/image/image_81/81_Laguepie_1.jpg","../../jctruffet.com/image/image_81/81_Laguepie_2.jpg","../../jctruffet.com/image/image_81/81_Laguepie_3.jpg","../../jctruffet.com/image/image_81/81_Laguepie_4.jpg","../../jctruffet.com/image/image_81/81_Laguepie_5.jpg","../../jctruffet.com/image/image_81/81_Laguepie_6.jpg"]},"Consult_chateau_formulairef790-2":{"id":"Consult_chateau_formulairef790-2","dept":"81","canton":"Rabastens","commune":"Larroque","nom":"Larroque_Vère","type":"Château","periode":"XVIII","histoire":"Trois châteaux à Larroque celui de Vère du XVIIIe siècle, de Pont-Bourguet et de la Coste,  pas d'information pour ces deux derniers.                    VERE, construit au XVIIIe, il est à l'origine un pavillon de chasse. Il est ensuite la propriété d'un notaire, maître de Tholozany de la Sesquière. Il aura 3 filles qui ne se marieront pas et hériteront de la propriété qui en plus du château compte aussi diverses fermes et de nombreuses terres et bois sur la commune. Incapable de s'en occuper  elle le laisseront lentement se dégrader.  Longtemps, le château est appelé celui des surs Tholozany. Dans les années 1990, après une longue période d'abandon le château est racheté par Jean-Pierre Cavalade. Ce dernier entreprend de le restaurer,  pour en faire des chambres d'hôtes.\r\nAnecdote Mr de Tholozany souhaitant avoir un fils fit aménager une grotte dans la falaise jusqu'au décès de la dernière fille Françoise un pèlerinage était fait le 15 août qui réunissait tous les Roucanels.","architecture":"Vère;  le bâtiment principal est en L. La propriété possède un jardin à la Française inspiré par Le Nôtre,  en bord de route on peut admirer une magnifique porte qui donnait accès aux écuries.                                Pont-Bourguet de plan rectangulaire à deux niveaux  avec attiques.                                                                Coste  de plan rectangulaire à deux niveaux toit presque plat en croupe avec tour ronde semi-hors uvre en façade à toit plat.","habitants":"Maître de Tholozany de la Sesquiere\r\n        \r\n        \r\n        \"","divers":"Château à Larroque celui de Vère, de Pont Bourget et de la Coste","gps":"","images":["../../jctruffet.com/image/image_81/81_Larroque_Vere_1.jpg","../../jctruffet.com/image/image_81/81_Larroque_Vere_2.jpg","../../jctruffet.com/image/image_81/81_Larroque_Vere_3.jpg","../../jctruffet.com/image/image_81/81_Larroque_Vere_4.jpg","../../jctruffet.com/image/image_81/81_Larroque_Vere_5.jpg","../../jctruffet.com/image/image_81/81_Larroque_Vere_6.jpg","../../jctruffet.com/image/image_81/81_Larroque_Vere_7.jpg"]},"Consult_chateau_formulaire5b03-2":{"id":"Consult_chateau_formulaire5b03-2","dept":"81","canton":"Rabastens","commune":"Montdurausse","nom":"Las_Bordes","type":"Château","periode":"XVII","histoire":"LAS-BORDES, au début du XVIIe siècle, la seigneurie de Montdurausse appartenait à Jean Jacques de Voisins, assassiné de façon mystérieuse en juillet 1606 au Boisredon, près de Salvagnac, laissant un mineur de douze ans prénommé Louis. D'ailleurs, le 10 août de cette même année, fut commencé l'inventaire des biens de \"messire Jean Jacques de Voisins, Vicomte de Monclar, seigneur de Montdurausse, Salvagnac, Lasclottes et autres lieux\".","architecture":"Las-Bordes est un joli pavillon de brique, établi aux confins de la forêt de Sivens et de la Grésigne. La galerie extérieure du rez-de-chaussée est pourvue d'arcades en brique se répétant dans la galerie à l'étage. Une tour carrée de quinze mètres de haut domine l'ensemble, sa partie supérieure a été transformée en pigeonnier, on y accède par un escalier de bois à rampe d'époque Louis XIII. L'intérieur comprend quatre pièces toutes munies de cheminées à arc en anse de panier et l'une d'entre elles porte la date  de 1677. Les armes des ducs d'Arpajon sont gravées sur le claveau de la porte d'entrée. Le château de Las-Bordes reçut le prix Paul-Mérimée des Vieilles Maisons Françaises en 1993.","habitants":"Famille de  Jean Jacques de Voisins\r\n        \"","divers":"Château de las-Bordes à Montdurausse.","gps":"","images":["../../jctruffet.com/image/image_81/81_Las_Bordes_1.jpg","../../jctruffet.com/image/image_81/81_Las_Bordes_2.jpg"]},"Consult_chateau_formulairefb9f":{"id":"Consult_chateau_formulairefb9f","dept":"81","canton":"Lagrave","commune":"Lasgraisse","nom":"Lasgraisse","type":"Château","periode":"XVI","histoire":"Trois châteaux à Lasgraïsse, le castella du XVIe siècle , le manoir du Bouliou et le manoir de la Crébassière pas d'informations historiques.                                                                         CASTELAS, fondé au XIIe siècle, est l'ancienne résidence des seigneurs de Brens et de Lasgraîsses. Le premier propriétaire connu est un nommé Jean Pujol, marchand à Labarthe Vieille, dans la baronnie de Lombers. Le Castelas ne fut pas saisi durant la Révolution, mais vendu en 1803 à Antoine Portal, né à Gaillac, médecin des Rois Louis XVIII et Charles X. Après la mort du baron Portal, ses héritiers vendirent Le Castelas qui changea souvent de mains par la suite, et fut endommagé par un incendie en 1951.                                                                              BOULIOU, l'édifice fut dans l'apanage des seigneurs de Brens et de Lasgraïsses. Les premiers seigneurs de Lasgraïsses habitaient le château situé dans le prolongement des remparts du village, mais ils ne devaient y faire que de rares  séjours, préférant habiter d'autres châteaux plus plaisants et peut-être Bouliou faisait-il partie de ces demeures.","architecture":"Castelas, le château actuel fut bâti au début du XVIe siècle, édifié en brique et pierre de taille, c'est l'une de ces fermes-forteresses comme il en existait beaucoup jadis dans l'Albigeois. Il a été construit sur une éminence et dont il occupe près de 200 mètres carrés, et domine la campagne. La partie orientale du bâtiment semble la seule intacte et le corps de logis presque carré est flanqué de deux tours rondes dont elles fut arasées au niveau du toit et recouvert de tuiles. Une troisième tour, plus petite, sert de pigeonnier.                                                                                                                       Bouliou,  en  l'état actuel, le manoir ne semble pas antérieur au XVe siècle, mais l'on sait que Le Castelas, conservé dans un état du XVIe siècle et voisin de quelques centaines de mètres, fut néanmoins bâti au XIIe siècle. De la Renaissance, on note diverses ouvertures à meneaux. En fait, le donjon primitif fut doublé par une construction de même volume, à une date postérieure au gros uvre primitif.                                                                                                      Crébassière; maison forte avec corps de logis de plan rectangulaire à deux niveaux toit en croupes avec trois tours rondes en façade toit de style asiatique.","habitants":"Famille de Jean Pujol\r\n        \"","divers":"Le castella, le manoir de Bouliou et de la Cébassière à Lasgraisse.","gps":"","images":["../../jctruffet.com/image/image_81/81_Lasgraisse_1.jpg","../../jctruffet.com/image/image_81/81_Lasgraisse_2.jpg","../../jctruffet.com/image/image_81/81_Lasgraisse_3.jpg","../../jctruffet.com/image/image_81/81_Lasgraisse_4.jpg","../../jctruffet.com/image/image_81/81_Lasgraisse_5.jpg"]},"Consult_chateau_formulairec95a":{"id":"Consult_chateau_formulairec95a","dept":"81","canton":"Rabastens","commune":"Gaillac","nom":"Lastours","type":"Château","periode":"XVII-XIX","histoire":"LASTOURS, à Montans la famille  de Calmels, au XVIIe siècle. Reconstruction de Lastours entre 1775 et 1815 par  Jean-André Bourdès, greffier en chef du Parlement de Toulouse et propriétaire terrien. Dirigé Par les Célarié de Belfortés au  XIXe siècle.  Au temps de Désiré Célarié de Belfortés, la propriétaire entre 1832 et 1845  Virginie de Belfortés  a reprise en main du domaine et  fit une grande allée de platanes, le château Lastours respire déjà l'art de vivre, les propriétaires, la famille de Faramond, vignerons récoltants  propose à leurs visiteurs une balade au temps historique.","architecture":"Lastours, domaine agricole et de lhistoire des bâtiments\r\n(du XVIIe siècle jusqu'à la fin du XIXe siècle) vieille demeure du XVIe siècle, remaniée au XVIIIe, sorganise sur un plan rectangulaire déterminant une vaste cour centrale. Le logis en fond de cour, long de 60 mètres se compose dun corps central flanqué de deux corps latéraux plus bas et placés sur le même alignement. Le corps central est couvert par un toit à longs pans et croupes et sélève sur deux étages ouverts par cinq travées sur chaque façade. La façade sud qui ouvre sur le jardin, face au Tarn, sélève sur trois pans coupés. En plein cintre en demi cercle tour mi-hors uvres s'élevant au niveau du toit de l'édifice Le corps latéral ouest abritait principalement des chambres à coucher tandis que dans le corps latéral Est se trouvaient les communs, presque intégralement détruits par un incendie survenu dans les années 1950.","habitants":"Famille de  Célarié de Belfortés                                                                  Famille de François Puilaurens\r\n        \"","divers":"Le château de Lastours à Gaillac","gps":"","images":["../../jctruffet.com/image/image_81/81_Lastours_1.jpg","../../jctruffet.com/image/image_81/81_Lastours_2.jpg","../../jctruffet.com/image/image_81/81_Lastours_3.jpg","../../jctruffet.com/image/image_81/81_Lastours_4.jpg","../../jctruffet.com/image/image_81/81_Lastours_5.jpg"]},"Consult_chateau_formulaire1dc3":{"id":"Consult_chateau_formulaire1dc3","dept":"81","canton":"Saix","commune":"Palleville","nom":"Lastouzeilles","type":"Château","periode":"XIV-XVI","histoire":"LASTOUZEILLES, la construction du château actuel date de la fin du XVe siècle. En 1587, il est pris par les protestants qui s'y retranchent pour résister aux troupes d'Anne de Joyeuse. Une trace de boulet est restée inscrite dans la façade ouest et les écrits n'ont conservé que cet épisode sur le château. Le propriétaire se converti après la révocation de l'Édit de Nantes, non sans avoir fait graver dans un linteau, « malgré moi ». Après la Révolution, il est acheté en 1804 par le capitaine des cuirassiers Jean de Gouttes, soldat durant les guerres napoléoniennes ; les propriétaires  actuels sont de la famille de Baure descendants de la famille Gouttes.","architecture":"Le château de Lastouzeilles est construit au XIV-XVIe siècle restauré au XIXe siècle entièrement en brique roses, à l'exception de quelques parements. Il comporte une tour au nord et deux encadrant la façade au sud. Cette façade se présente sur trois étages et les fenêtres à meneaux révèlent le style Renaissance. Dans le parc, un château d'eau ou pavillon des bains est installé au XIXe siècle pour alimenter en eau les cabinets de toilette. À l'ouest une partie des douves et du mur de clôture est conservée.   Au XIXe siècle, des travaux ont lieu, dont la pose de contreforts destinés à soutenir des murs bâtis sans fondation. L'aspect général n'en est pas modifié. Il a conservé ses oubliettes datant de l'époque où le seigneur avait droit de justice.","habitants":"Famille de Jean de Gouttes,\r\n        \"","divers":"Château de Lastouzeilles à Palleville.","gps":"","images":["../../jctruffet.com/image/image_81/81_Lastouzeilles_1.jpg","../../jctruffet.com/image/image_81/81_Lastouzeilles_2.jpg","../../jctruffet.com/image/image_81/81_Lastouzeilles_3.jpg","../../jctruffet.com/image/image_81/81_Lastouzeilles_4.jpg","../../jctruffet.com/image/image_81/81_Lastouzeilles_5.jpg"]},"Consult_chateau_formulaire2e26":{"id":"Consult_chateau_formulaire2e26","dept":"81","canton":"Sémalens","commune":"Lautrec","nom":"Lautrec","type":"Château","periode":"XV-XIX","histoire":"A Lautrec, huit châteaux dont celui  de Brametourte (voir article), de Malvignol (voir article) et Montcuquet (voir article), de Labadie, des Ormes, des Anges, la  tour d'Aragon , Varagnes  avec Lautrec.                                                                         LAUTREC, cité médiévale, ancienne vicomté, elle est le berceau de la famille Toulouse Lautrec dont le peintre affichiste est lillustre descendant.   Fondée vers 940, la vicomté de Lautrec occupait, entre le Dadou et lAgout,  le premier vicomte de Lautrec fut Sicard, fils de Bernard, lui-même vicomte dAlbigeois, qui partagea ses terres entre ses deux fils. Très vite les riches terroirs du Lautrécois suscitèrent les convoitises des grandes familles de la Chevalerie locale auxquelles le roi de France, Philippe IV le Bel, vint sajouter en 1306, pour une partie. La vicomté devint une mosaïque, un puzzle de seigneuries et de pouvoirs enchevêtrés, aux mains des descendants dIsarn de Lautrec ou des comtes de Foix.                                   ORMES  ce château est un des plus beaux exemples du département de château du XIXe siècle tentant de pasticher l'architecture du XVIIe siècle.                                                       LABADIE chambres d'hôtes.                                                                         Des ANGES pas d'information historique.                                        VARAGNES  Le château dépendait de la seigneurie de Serviés dont le seigneur était dans le dernier quart du XVe siècle Jean de Castelnau, gouverneur de Lombers.                                                  ORMES,  château des Ormes   appartenait au comte Jacques de Foucaud et sa femme Béatrix dAlexandry dOrengiani.\r\nutilisé dans les dépendances du château des Ormes, la métairie de La Phalipié. Henri Dunant (1828-1910) fondateur de la Croix-Rouge. Robert Gamzon, alias Castor, fonde les Éclaireurs Éclaireuses israélites de France (EIF) en 1923. Aujourd'hui propriété de l'APAJH depuis 1976.","architecture":"TOUR-ARAGON, le lieu fut le siège de combats durant les Guerres de Religions, notamment pris par le vicomte de Turenne en 1580; en effet le 21 janvier de cette même année, Turenne avait été nommé gouverneur de Castres et se dirigea bientôt vers Lautrec, c'est alors qu'il prit par capitulation Latour d'Aragon. Lautrec est aujourd'hui classé parmi les plus beaux villages de France  ses remparts et ses champs de pastel,  Lautrec Fondé en 940,  aspect médiéval réhabilité et mis en valeur, les remparts, les fortifications, la tour de guet, les ruelles médiévales et la Collégiale Saint-Rémy du XIVe siècle, son moulin à vent en état de fonctionnement. Le village avec ses rues étroites saccroche à flanc de coteau, en contrebas de la forteresse du vicomte. La communauté sabrite derrière ses remparts et ses fossés. De lenceinte fortifiée, il ne reste aujourdhui plus quune petite partie avec notamment la porte de la Caussade. Le seul nom du quartier de la Brèche dit assez que Lautrec ne fut pas toujours le paisible chef-lieu de canton quil est devenu.                                           Varagnes,  a été en grande partie remanié à des époques récentes, mais conserve tout de même quelques beaux restes dont une belle et massive tour carrée datant du XVIe ou du XVIIe du siècle, coiffée dun toit en pavillon.                                                                                                   Ormes, construit selon un savant jeu de décrochements et rendu pittoresque par l'implantation de fines échauguettes aux toits d'ardoise,ils joue savamment, comme avait si bien su le faire les architectes du temps de Louis XIII, avec le jeu de polychromie donné par la pierre, la brique et l'ardoise. Autour des toits en pavillons viennent s'implanter de belles lucarnes. Afin de rendre plus pittoresque ce morceau d'architecture, des perrons garnis de balustres ont été implantés le long des façades. Même si dans le Tarn le XIXe siècle fut un des siècles où l'on construisit le plus de châteaux, rares sont les chantiers d'une telle ampleur. Le château des Ormes étonne, non seulement par la grande qualité de la réalisation, mais aussi par leurs vastes dimensions.","habitants":"Famille Toulouse Lautrec                                                                   Famille de  Jean de Castelnau\r\n        \"","divers":"A Lautrec, huit châteaux dont celui  de Labadie, des Ormes, des Anges, la  tour d'Aragon , Varagnes .","gps":"","images":["../../jctruffet.com/image/image_81/81_Lautrec_1.jpg","../../jctruffet.com/image/image_81/81_Lautrec_2.jpg","../../jctruffet.com/image/image_81/81_Lautrec_3.jpg","../../jctruffet.com/image/image_81/81_Lautrec_4.jpg","../../jctruffet.com/image/image_81/81_Lautrec_5.jpg","../../jctruffet.com/image/image_81/81_Lautrec_6.jpg","../../jctruffet.com/image/image_81/81_Lautrec_7.jpg","../../jctruffet.com/image/image_81/81_Lautrec_8.jpg","../../jctruffet.com/image/image_81/81_Lautrec_9.jpg"]},"Consult_chateau_formulaire1e0d-2":{"id":"Consult_chateau_formulaire1e0d-2","dept":"81","canton":"Lacaune","commune":"Viane","nom":"Lavalette_Tarn","type":"Château","periode":"XV","histoire":"Plusieurs châteaux à Viane dont celui de Lavalette du XV-XIXe siècle, et au sud  celui de Camalières pas d'information pour ce dernier                                                                                                           LAVALETTE,  le consulat de Viane a été établi en 1304, accompagné par un conseil de dix prudhommes choisis par les habitants et investis par le représentant du seigneur. Il y avait quatre consuls investis pour un an. Les sortants constituaient une liste de huit candidats, quatre issus de la ville et quatre issus de la campagne, cette liste était présentée au seigneur , qui choisissait quatre noms , deux de la ville et deux de la campagne.","architecture":"LAVALETTE, ce beau château se présente sous la forme d'une massive et ancienne construction quadrangulaire cantonnée de tours, trois étant identiques, et la quatrième à la fois plus grosse et plus haute. Ces quatre tours sont engagées dans le logis et dénotent d'une grande ancienneté de construction. Le logis parait ancien, comme le montre son appareil et de robustes croisées de meneaux. Le château est construit dans un appareil schisteux assez frustre, une campagne de restauration du XIXe siècle lui a ôté de son ancienneté, notamment par l'adjonction de détails tels que les corbeaux carrés placés sous les toitures de lauzes en pavillon des tours. Au XVIIIe siècle, une campagne de transformation avait déjà dû être menée, comme le montre les fenêtres mais aussi la porte d'entrée typiquement Louis XV ayant conservé son joli heurtoir.","habitants":"Seigneur locaux\r\n        \"","divers":"Château de Lavalette à Viane","gps":"","images":["../../jctruffet.com/image/image_81/81_Lavalette_Tarn_1.jpg"]},"Consult_chateau_formulaire3696":{"id":"Consult_chateau_formulaire3696","dept":"81","canton":"Lavaur","commune":"Lavaur","nom":"Lavaur","type":"Château","periode":"XVII","histoire":"plusieurs châteaux à Lavaur celui de Bellevue (voir article) de Mirabel du XVIIe siècle, de Reyniès du XVIIe siècle, de Tyr du XIXe siècle,  de Poudéous du XIXe siècle (voir article) et la villa de Castel Florit, au style éclectique qui mélange plusieurs influences historiques, a été construite vers 1910, de Couffinal (voir article suivant), de Roquenaud, de Soules,de Reynies, de St-Sauveur, de Lacamp et bien d'autres qui sont des gîtes dont je n'ai pas d'information.                                                                            LAVAUR, le Plô, site du château de Lavaur aujourd'hui disparu, racheté au roi par les consuls en 1622, est aménagé en promenade publique puis en esplanade dès le XVIIe siècle. La Tour des Rondes. L'un des derniers vestiges des fortifications de la vieille ville. Plusieurs châteaux aux environs de Lavaur.                           MIRABEL-LAVAL,  Pierre Devoisins continua la campagne de travaux amorcée au XVIIe siècle, et devient capitoul en 1749. : une maison est construite au lieu-dit \"Baillet\". On sait que le 15 juillet 1709, Pierre Devoisins, bourgeois de Lavaur et avocat au parlement, acheta à Pierre Candeilh la maison de Vaylet, ou Laval. Pierre Devoisins continua la campagne de travaux amorcée au XVIIe siècle, et devint capitoul en 1749. En 1826. Il appartenait aux héritiers de Guillaume Devoisins de Mirabel.             ROQUENAUD, un château est construit au lieu-dit \"Saint-Eugène\" . Il appartenait à Louis Bermond, de Gaillac.                                  SOULES du XVIIIe siècle, au  milieu XIXe siècle, il appartenait à Jean-Baptiste Lacoste-Bagnères. Françoise Rose Laurence dite Rosine Bermond 1808  mariée le 19 mars 1831 avec Antoine Maximin de Vialar 1809 restera dans cette famille jusqu'en 1901.  Marie-Antoinette de Vialar mariée avec Guillaume Tiersde Bar-Brusley 1825-1901 dont :  Emmanuel Tiers de Bar-Brusley 1856-1935, toujours dans la descendance.","architecture":"Mirabel , construit sur un plan en quadrilatère délimitant une cour fermée. Les angles sont marqués par deux tours octogonales saillantes. Le corps de logis comprend un bâtiment et deux ailes en retour d'équerre. La façade sur terrasse est flanquée de deux tours pavillons en légère saillie. Les ailes sont poursuivies par des dépendances qui ferment le quadrilatère. Celles-ci comprennent l'ancienne cuisine, la chapelle, l'orangerie, les écuries et les remises. Trois portails ont un passage sous arcade surmonté de frontons en accolade, avec corniche sommée de pots à fruits en terre cuite.  Roquenaud, où il apparaît sous la forme d'un plan en U  flanqué de pavillons moins élevés. Sa toiture est caché par une galerie à l'italienne qui lui confère un air néo classique, bien que sans caractère particulier, le château a été édifié à l'extrême fin du XVIIIe siècle ou au début du siècle suivant. a été ensuite amputé de son aile nord-est. Les vastes communs ont été édifiés à la fin du XIXe siècle.                                                                       Roquenaud comprend également de vastes communs construits à la fin du XIXe siècle et est au centre d'un parc à l'anglaise dessiné aux alentours de 1870.  En revanche, le pigeonnier est antérieur.  Château de plan rectangulaire, façade principale ordonnancée à sept travées, toit à longs pans couvert de tuiles creuses,                                           Soules de plan quadrilatère à deux niveaux toit en croupes flanqué de tour carrées en angles.","habitants":"Famille de Pierre Devoisins                                                                  Famille de  Régnier                                                                        Famille de Taffanel de La Jonquière\r\n        \"","divers":"Latour de Lavaur vestiges, le château de Mirabel, de Couffinal, de Roquenaud, de Soules","gps":"","images":["../../jctruffet.com/image/image_81/81_Lavaur_1.jpg","../../jctruffet.com/image/image_81/81_Lavaur_2.jpg","../../jctruffet.com/image/image_81/81_Lavaur_3.jpg","../../jctruffet.com/image/image_81/81_Lavaur_4.jpg","../../jctruffet.com/image/image_81/81_Lavaur_5.jpg","../../jctruffet.com/image/image_81/81_Lavaur_6.jpg","../../jctruffet.com/image/image_81/81_Lavaur_7.jpg","../../jctruffet.com/image/image_81/81_Lavaur_8.jpg","../../jctruffet.com/image/image_81/81_Lavaur_9.jpg"]},"Consult_chateau_formulaire3bdb":{"id":"Consult_chateau_formulaire3bdb","dept":"81","canton":"Lavaur","commune":"Lavaur","nom":"Lavaur_suite","type":"Château","periode":"XV-XVII","histoire":"suite des châteaux de Lavaur, château de Tyr, de Castel-florit du XIXe siècle, de Couffinal,  d'en Piquet, d'en Baylet,  de Fonselade, de Lacamp, de Saint-Sauveur et de la Cadiscie.                                                                                         COUFFINAL; habité par la famille de Laprade viticol pas d'information historique, propriété du département,    création de lécole publique.                                                                                 En PIQUET de la 1ère moitié XIXe siècle ; 2e moitié XIXe siècle\r\nLe toponyme existe déjà à la fin du XVIIIe siècle : une maison est construite au lieu-dit \"Piquet\" Le domaine d'En piquet avait été apporté en dot à la famille Mazas au  XVIIe siècle. Implantée sur le coteau d'un vallon, la demeure a été remaniée dans la première moitié du XIXe siècle par Marcellin Mazas, alors maire de Lavaur, sur le modèle d'un petit château. Le corps de logis a été surélevé et des tours carrées, aux toitures élancées, ajoutées aux angles de l'aile principale.                                                                                 TYR  L'ensemble appartient à ce moment là à Alexandre de Rivals Boussac  le registre des augmentations-diminutions indique une démolition de la maison 1287 en 1850, et une nouvelle construction en 1861 . Cette indication nous donne la date de construction du château actuel et de ses dépendances à l'ouest. En revanche, le pigeonnier est antérieur. Le jardin d'agrément a été réalisé par le paysagiste Castel au milieu XIXe siècle.","architecture":"Le château de Tyr est inscrit au Pré-inventaire des jardins remarquables. Le jardin d'agrément a été réalisé par le paysagiste Castel au milieu XIXe siècle.  Château de plan rectangulaire, façade principale ordonnancée à sept travées, toit à longs pans couvert de tuiles creuses, Le château de Tyr est inscrit au Pré-inventaire des jardins remarquables. Le jardin d'agrément a été réalisé par le paysagiste Castel au milieu XIXe siècle.                                                                                                                 Castel-Florit,  corps de logis rectangulaire à deux niveaux, toit en ardoises, flanqué de deux pavillons en façades toit à l'impérial avec lucarnes sur face avant, accolé sur flan gauche d'une tourelle à toit en poivrière.                                                                              Couffinal    de plan rectangulaire à deux niveaux et attique en oeils de Buf, toit en tuiles en croupe bâtiment accolé en angles de tourelles carrées dépassant légèrement le toit.                                              D'en Piquet   corps de logis de plan en U avec de léger retour d'équerre prolongé par des dépendances à un niveaux, l'ensemble à deux niveaux avec attiques et en façades deux tours carrées à toits pointu à quatre pans.                                                      D'en Baylet  forteresse bâtiment en fond de cours rectangulaire avec tour carrée en angles quadrilatère fermé par une enceinte importante avec porte sur les façades et tours octogonales sur angles à toit presque plats.                                                          Fonselade  corps de logis rectangulaire à deux niveaux et attique flanqué aux extrémités de pavillons rectangulaires à trois niveaux à toits plats, ces pavillons sont flanqués de double bandaux à chaque étages.                                                                          Lacamp  corps de logis rectangulaire à deux niveaux sur soubassements  avec série de lucarnes  sur toits brisées.            St-Sauveur   de plan rectangulaire à deux niveaux et attique sur toit à la mansart accolé de deux pavillons rectangulaires sur les flancs de côté à trois niveaux toit brisés  et pavillon légèrement saillant plein cintre pour la porte d'entrée.","habitants":"Famille Régnier                                                                                 Famille d'Alexandre de Rivals Boussac\r\n        \"","divers":"Château de Tyrde Castel-florit, de Couffinal d'en Piquet, d'en Baylet de Fonselade, de Lacamp, de Saint-Sauveur et de la Cadiscie","gps":"","images":["../../jctruffet.com/image/image_81/81_Lavaur_suite_1.jpg","../../jctruffet.com/image/image_81/81_Lavaur_suite_2.jpg","../../jctruffet.com/image/image_81/81_Lavaur_suite_3.jpg","../../jctruffet.com/image/image_81/81_Lavaur_suite_4.jpg","../../jctruffet.com/image/image_81/81_Lavaur_suite_5.jpg","../../jctruffet.com/image/image_81/81_Lavaur_suite_6.jpg","../../jctruffet.com/image/image_81/81_Lavaur_suite_7.jpg","../../jctruffet.com/image/image_81/81_Lavaur_suite_8.jpg","../../jctruffet.com/image/image_81/81_Lavaur_suite_9.jpg"]},"Consult_chateau_formulaire9252":{"id":"Consult_chateau_formulaire9252","dept":"81","canton":"Saix","commune":"Lempaut","nom":"Lempaut","type":"Château","periode":"XV-XVIII","histoire":"Cinq châteaux à Lempaut, celui de la Bousquétariè du XIXe siècle, celui de Devèze du XV-XVIe siècle deux tours carrées, de Montpeyroux , de Padiès (voir article), celui de la Rode du XVIe siècle, la villa les Pins avec article de Padiès  et les vestiges de Rochefort.                                                          BOUSQUETARIE (la),  au milieu d'une belle nature, le château est un joli morceau d'architecture. Il fut élevé au début du XIXe siècle par les ancêtres des propriétaires actuels, mais aucun document d'archives n'a malheureusement été conservé qui pourrait nous renseigner sur son l'histoire, chambres d'hôtes par la famille Sallier.                                                DEVEZE, au début du XVIIIe siècle il est utilisé par le parti du traditionnel \"repaire seigneurial\" tel que la guerre de cent ans le répandit à travers toute la France, à l'image d'exemple proches du  château de  Padiès. Il appartenait à la famille Rotolp, en effet, en 1737 Geoffroi-Louis de Falguerolles, seigneur de Gandels, né en 1712, épousa Louise de Rotolp de La Devèze, dame de Lempaut et Saint-Germain.                                                                      RODE, ancienne abbaye royale nichée au pied de la montagne noire depuis 1580, le château de La Rode de madame  Violaine Geli.                                                                                                             MONTPEYROUX, ancienne demeure chambres d'hôtes de la famille Sallier.                                                                                                  Villa les PINS Chambres d'hôtes de style italien du XXe siècle de la famille Delbreil, villa des Pins  d'inspiration néo-classique, pas d'information historique.                                                                                 Rochefort, vestiges de l'ancien château de Lempaut pas d'information historique.","architecture":"La Bousquétariè; de profondes interventions menées dans la seconde moitié du XIXe siècle sur les balustrades, les frontons, la galerie le long du toit, les encadrements des fenêtres de la façade arrière et l'occuli des tours. la simplicité du profil général du bâtiment, son plan et la sobriété de son élévation, pourraient trahir une construction plus ancienne, remontant peut-être à la fin du XVIIe ou au début du XVIIIe siècle ainsi le château n'aurait été que modifié au début du XIXe siècle.                                               Devèze, construit au XVe siècle et fortement modifié au siècle suivant, ce beau château apparaît comme une demeure très simple adoptant le parti défensif. Corps de logis rectangulaire à deux étages flanqué de deux tours carrées placées en diagonale,  Sous les plaques d'enduit à moitié effritées apparaît une belle construction de brique.                                                              La Rode,  vieilles demeures authentiques qui ont su garder leur âme et leur charme dantan tout en offrant dans leurs chambres le confort daujourdhui. Dans un cadre hors du temps ! Prieuré cistercien datant de la fin du XVIe siècle, remanié après la Révolution, en maison de maître.                                                Vestiges de Rochefort, construit au XVIe siècle,  apparaît comme une simple demeure ayant adopté le même parti défensif.                                                                                                           PINS, villa des Pins sous lequel est connu plus couramment ce joli petit château, convient beaucoup mieux aux dimensions intimistes de ce beau morceau d'architecture de la fin du XIXe siècle, d'inspiration néo-classique. La façade se compose d'un rez-de-chaussée et d'un étage et comprend sept travées. Les fenêtres des deux niveaux ont été traitées avec une grande simplicité, la seule animation est donnée par les chaînages d'angle de pierre, des chaînages plus larges flanquant la travée centrale. Le haut de ces chaînages de pierre encadrant la travée centrale est enrichie de deux paires de consoles. Le toit est dissimulé derrière une balustre tendant à donner au château un aspect plus urbain.","habitants":"Famille Sallier                                                                                           Famille Rotolp                                                                                Famille Delbreil\r\n        \"","divers":"Vestiges de Rochefort à Lempaut, château de la Bousquetariè, de la Devèze, de Rode, de Monpeyroux et la villa les Pins","gps":"","images":["../../jctruffet.com/image/image_81/81_Lempaut_1.jpg","../../jctruffet.com/image/image_81/81_Lempaut_2.jpg","../../jctruffet.com/image/image_81/81_Lempaut_3.jpg","../../jctruffet.com/image/image_81/81_Lempaut_4.jpg","../../jctruffet.com/image/image_81/81_Lempaut_5.jpg","../../jctruffet.com/image/image_81/81_Lempaut_6.jpg","../../jctruffet.com/image/image_81/81_Lempaut_7.jpg","../../jctruffet.com/image/image_81/81_Lempaut_8.jpg","../../jctruffet.com/image/image_81/81_Lempaut_9.jpg"]},"Consult_chateau_formulairefae3":{"id":"Consult_chateau_formulairefae3","dept":"81","canton":"Rabastens","commune":"Lisle sur le Tarn","nom":"Lisle_sur_Tarn","type":"Château","periode":"XVII","histoire":"Plusieurs châteaux à Lisle sur Tarn, celui de Belbéze (voir article avec Bellevue), celui d'Escabes du XVIIe siècle, de Bellevue (voir article), de Fortis et Lastours(voir article) et de Saurs (voir article).                                                                                    ESCABES, le château d'Escabes a certainement été bâti au cours du XVIIe siècle, selon les caractéristiques de son architecture et la forme des fentes de tir encore en place. La date de 1665 inscrite sur une brique de la tour sud-est pourrait dater la construction du château.  Au XVIIe siècle, il appartenait à la famille de Lantaniac, première famille noble de Lisle. Les transformations importantes des deux corps de logis encadrant la cour dans les dernières décennies du XXe siècle rend difficile leur datation. Mais ils sont antérieurs à l'établissement du cadastre des années 1830 sur lequel ils sont représentés, compte tenu de leur implantation symétrique de part et d'autre de la cour, leur construction au XVIIIe siècle peut être proposée. Le bâtiment situé à l'ouest a été dédoublé à la fin du XIXe siècle et abritent des chais exploités par la cave de Rabastens.","architecture":"Le château d'Escabes a été construit au cours du XVIIe siècle, selon les caractéristiques de son architecture et la forme des fentes de tir encore en place. La date de 1665 inscrite sur une brique de la tour sud-est   date de la construction du château. La transformation importante des deux corps de bâtiment encadrant la cour dans les dernières décennies du XXe siècle rend difficile leur datation. Ils sont cependant antérieurs à l'établissement du cadastre des années 1830 sur lequel ils sont représentés. Le bâtiment de l'ouest a été dédoublé à la fin du XIXe siècle ou au début du XXe siècle. Ces bâtiments sont aujourd'hui des chais exploités par la cave de Rabastens. La façade nord d'inspiration néo-classique et tout l'intérieur du château sont le résultat des transformations que le château a connu après l'incendie survenu en 1989.","habitants":"Famille de Lantaniac\r\n        \"","divers":"Le château d'Escabes.","gps":"","images":["../../jctruffet.com/image/image_81/81_Lisle_sur_Tarn_1.jpg","../../jctruffet.com/image/image_81/81_Lisle_sur_Tarn_2.jpg","../../jctruffet.com/image/image_81/81_Lisle_sur_Tarn_3.jpg","../../jctruffet.com/image/image_81/81_Lisle_sur_Tarn_4.jpg"]},"Consult_chateau_formulaire34d3":{"id":"Consult_chateau_formulaire34d3","dept":"81","canton":"Réalmont","commune":"Lombers","nom":"Lombers","type":"Château","periode":"XVII","histoire":"A Lombers, les vestiges du château sur motte féodale , le manoir d'Aussendes et le château de Fréjefont                                               LOMBERS,  premières mentions du château en 1032 et de la ville en 1045. Lombers était une place forte jusqu'en 1622. En 1165 a lieu à Lombers  la première confrontation entre chrétiens et cathares. Cette rencontre est désignée sous le terme de concile de Lombers, mais devrait plutôt être nommé arbitrage puisque étaient réunis des laïcs (seigneurs et vassaux) et des membres du clergé. Pour contenir l'expansion de l'« hérésie cathare », Guillaume, évêque d'Albi, convoqua un concile en mai 1165 à Lombers alors ville importante de l'Albigeois. De ce concile des archevêques, évêques et abbés du Midi  fut rendu l'arrêt suivant : Moi, Gaucellin, évêque de Lodève, par ordre de l'évêque d'Alby et de ses assesseurs, je juge que ces prétendus bons hommes sont hérétiques, et je condamne la secte d'Olivier (évêque cathare) et de ses compagnons, qui est celle des hérétiques de Lombers, quelque part qu'ils soient, selon l'autorité des Écritures.\r\n Il ne reste que le manoir d'Aussendes  et le château de Fréjepont dont je n'ai pas d'information historique.","architecture":"Le château de Lombers positionné sur le pic, et la ville dans la plaine ont été à plusieurs reprises aux mains de religions différentes. La ville fut brûlée en 1622 par les protestants et les fortifications disparurent. Lorsque Richelieu ordonna la destruction des forteresses féodales, le château fut détruit ainsi que les restes des remparts.                                                                                 Manoir d'Aussendes de plan rectangulaire à deux niveaux avec tours rondes arasées en angles.                                                                Fréjefont de plan en L à deux niveaux  avec en façade deux tours carrées sur angles à trois niveaux toit à quatre pans.","habitants":"Vicomte de Panat\r\n        \"","divers":"Motte féodal de Lombers et sa maquette, le manoir d'Aussendes et de Fréjefont.","gps":"","images":["../../jctruffet.com/image/image_81/81_Lombers_1.jpg","../../jctruffet.com/image/image_81/81_Lombers_2.jpg","../../jctruffet.com/image/image_81/81_Lombers_3.jpg","../../jctruffet.com/image/image_81/81_Lombers_4.jpg","../../jctruffet.com/image/image_81/81_Lombers_5.jpg"]},"Consult_chateau_formulaired261":{"id":"Consult_chateau_formulaired261","dept":"81","canton":"Lagrave","commune":"Cadalen","nom":"Madron","type":"Château","periode":"XIX","histoire":"MADRON, le château porte le nom de la famille s'étant impliqué dans la vie politique de Cadalen au cours des XIXe et XXe siècles: l'on trouve en 1860 au conseil municipal du village un Hercule Durieu de Madron, les initiales enlacées \"D et M\", montrent que la demeure fut bien construite par les Durieu de Madron au moment de leur prospérité.","architecture":"Le château  de Madron  se présente comme un logis long de sept travées et comportant un rez-de-chaussée, un étage et un attique. La façade est flanquée de deux tourelles d'angle de brique, dépassant la toiture du logis et coiffées de combles pointus en ardoise. À la différence de la façade, les tourelles ont été laissées en brique apparente. La travée centrale présente quant à elle un avant-corps en légère saillie, surmonté au-dessus du toit du logis, par un fronton triangulaire. Même si le logis correspond peut-être à un bâtiment plus ancien, il est caractéristique de l'architecture du second empire.","habitants":"Famille de Madron\r\n        \"","divers":"Le château de Madron à Cadalen","gps":"","images":["../../jctruffet.com/image/image_81/81_Madron_1.jpg","../../jctruffet.com/image/image_81/81_Madron_2.jpg"]},"Consult_chateau_formulaireecb4":{"id":"Consult_chateau_formulaireecb4","dept":"81","canton":"Sémalens","commune":"Magrin","nom":"Magrin","type":"Vestiges","periode":"XIII","histoire":"Trois châteaux à Magrin dont celui de Magrin du XIIIe siècle,  et de Rouaix.  MAGRIN, la première trace écrite du château date du 7 août 1224, lorsque le chatelain se met sous la protection du comte de Toulouse Raymond VII. En 1279, un acte notarial attribue sa propriété à la famille Brenguier de Puylaurens. Pendant la guerre de cent ans, une troupe de bandits l'utilise comme base arrière de ses raids de pillage dans les environs. En 1502, il appartient à la famille Corneilhan. Lors des guerres de religion, ses occupants devenus protestants, accueillent Henri de Navarre, futur Henri IV, en 1585. Les traces écrites se font plus rares, mais il est probable qu'il a été vendu comme bien national durant la Révolution. Il fut partiellement incendié comme quelques traces en témoignent, puis fut consolidés, lui permettant de le maintenir un état de conservation. En 1971, il est acheté par M. Rufino, actuel propriétaire qui le restaure,   est devenu musée du pastel.                                         ROUAIX maison forte, pas d'information historique.","architecture":"Magrin est composé de deux groupes de bâtiments. Le premier, en partie ruiné, date du Moyen-Age. Les fondations datent du Xe siècle peut-être à l'emplacement d'une fortification gallo-romaine. L'enceinte rectangulaire était ceinte de remparts aujourd'hui abaissés et de fossés comblés. Une tourelle d'angle et une tour ronde défendaient la courtine dominée par un donjon carré de 10 m de haut. Le second bâtiment date de la Renaissance. Elle a repris une partie des bâtiments médiévaux réhabilités. Les ajouts du XVIIe siècle n'ont pas modifié le style. L'entrée est une porte à double battants à arcade en demi cercle. Des demi colonnes supportent un entablement. Une fenêtre à meneau au premier étage et une fenêtre double au second sont pareillement munies de demi colonnes. Une aile comporte le séchoir à pastel ; à l'étage, de longues fentes dans les murs permettaient à l'air de circuler pour sécher les boulettes de pastel. Quatre des huit grilles de séchage ont été conservées.                                                                       Rouaix, corps de logis rectangulaire à deux niveaux flanqué de pavillon carré à trois niveaux et d'une tourelle à toit à deux pans.","habitants":"Famille Brenguier de Puylaurens\r\n        \"","divers":"Vestiges du château de Magrin, maison forte de Rouaix.","gps":"","images":["../../jctruffet.com/image/image_81/81_Magrin_1.jpg","../../jctruffet.com/image/image_81/81_Magrin_2.jpg","../../jctruffet.com/image/image_81/81_Magrin_3.jpg","../../jctruffet.com/image/image_81/81_Magrin_4.jpg","../../jctruffet.com/image/image_81/81_Magrin_5.jpg","../../jctruffet.com/image/image_81/81_Magrin_6.jpg","../../jctruffet.com/image/image_81/81_Magrin_7.jpg","../../jctruffet.com/image/image_81/81_Magrin_8.jpg"]},"Consult_chateau_formulaired411":{"id":"Consult_chateau_formulaired411","dept":"81","canton":"Albi","commune":"Mailhoc","nom":"Mailhoc","type":"Château","periode":"XIII","histoire":"MAILHOC, co-seigneurie des fils du seigneur de Penne en 1227,  pendant les guerres de religion,  la seigneurie et le château sont aux mains de Philippe de Rabastens, chef protestant qui ravage les environs. Les de Rabatens, religionnaires fort puissants et portant le titre de vicomte de Paulin dans la région du Ségala Albigeois. Puis aux de Daire, famille de notables de Corde.  Il améliore le confort du château qui prend des allures Renaissance. C'est au XIVe siècle puis à la fin du XVe siècle ou au début du XVIe siècle qu'il pris sa forme définitive,  Il passe de main en main au gré des mariages, héritages et ventes et des travaux datés de 1764 sur un linteau, sont effectués. À la Révolution, alors que les propriétaires ont émigré, le château est saccagé. C'est à cette époque que les tours sont raccourcies au niveau des façades. Au XIXe siècle, il restait des morceaux de murs de l'enceinte extérieure.","architecture":"Le quadrilatère est flanqué de quatre tours cylindriques aux toits de tuiles plats. Le château a une allure de maison forte rectangulaire, comme il en fleurissait durant la guerre de Cent Ans dans toutes les régions frontalières entre couronne de France (Albigeois) et couronne d'Angleterre. (Rouergue) Les tours rondes anciennes ont subi trop de travaux ultérieurs pour être datées avec précision. Les trois ailes datent du début du XVIe siècle et  les côtés sont ceux de trois ailes du château et d'un mur sur lequel s'appuie une galerie donnant sur la cour. Un escalier d'honneur dessert l'étage. Les façades sont munies de fenêtres à meneaux. L'ensemble a subi peu de transformations majeures ultérieures. Il y eut des tours rondes et 3 ailes furent construites au début du XVIe siècle, composée de quatre tours à canonnière et arquebusier, archères à rotules, et d'un donjon de plus de vingt mètres de haut. Au XVIe siècle, l'édifice se dota de magnifiques aménagements, fenêtres à meneaux sculptés, galeries, guette appuyée contre le donjon\r\nOn peut voir les tours rondes, rabaissées qui se trouvent à chaque angle et la cage d'escalier rectangulaire, flanquée d'une tourelle, qui dépasse les toits.\r\nLe temps et les épreuves de l'histoire ont fait arasé les tours rondes du château, tandis que les remparts typique du système défensif militaire au XVIe siècle à complètement disparu. Au milieu du XXe siècle, les bastions du rempart et quelques pans de murs d'un mètre de haut étaient encore visible.","habitants":"Famille de Rabastens\r\n        \"","divers":"Château de Mailhoc","gps":"","images":["../../jctruffet.com/image/image_81/81_Mailhoc_1.jpg","../../jctruffet.com/image/image_81/81_Mailhoc_2.jpg","../../jctruffet.com/image/image_81/81_Mailhoc_3.jpg","../../jctruffet.com/image/image_81/81_Mailhoc_4.jpg","../../jctruffet.com/image/image_81/81_Mailhoc_5.jpg","../../jctruffet.com/image/image_81/81_Mailhoc_6.jpg"]},"Consult_chateau_formulairec825":{"id":"Consult_chateau_formulairec825","dept":"81","canton":"Sémalens","commune":"Lautrec","nom":"Malvignol","type":"Forteresse","periode":"XV","histoire":"MALVIGNOL, l'édifice faisait partie de la barrière catholique, avec Soual et Vielmur. La transformation de propriété rurale en maison-forte est sans doute ancienne, datant du XVe siècle, une mention de 1516 qualifiant l'édifice de la tour. Il devait s'agir d'une \"force\", petite localité fortifiée servant de lieu de ralliement aux populations en cas de danger et à la protection des récoltes contre les pillages.","architecture":"Malvignol, le château se présente, comme beaucoup de ses semblables de même époque, en quadrilatère autour d'une cour centrale. L'accès à cette dernière se faisait par un porche démoli. Au sud, le principal corps de logis présente des façades côté plaine et côté cour régulières, un peu austères. La porte d'entrée sur la cour est un bel exemple de style classique du XVIIe siècle. Une tour ronde à droite occupe un angle ; sa hauteur a été ramenée à celle des toitures. Au nord, les bâtiments annexes continent les restes d'une tour carrée. À l'ouest une aile construite au XIXe siècle ferme la cour. L'ensemble comprend le château au sud et la métairie au nord, entourant une cour carrée et des bâtiments annexes; une tour et un pigeonnier. Trois époques de construction se dégagent du bâtiment actuel. Entre 1560 et la fin de ce siècle, la tour oblongue, les infrastructures de la courtine sud et les parties basses de l'aile ouest. Au XVIIe siècle, aménagement du corps de bâtiment principal à l'emplacement de la courtine sud, entre la tour oblongue et l'ancien château ouest. Au début du XIXe siècle, transformation de la façade sud et construction de l'aile en retour ouest de la cour intérieure.\r\nUn jardin en terrasse prolonge la façade sud et masque les caves voûtées.","habitants":"Seigneur local\r\n        \"","divers":"Le château de Malvignol à Lautrec","gps":"","images":["../../jctruffet.com/image/image_81/81_Malvignol_1.jpg","../../jctruffet.com/image/image_81/81_Malvignol_2.jpg","../../jctruffet.com/image/image_81/81_Malvignol_3.jpg","../../jctruffet.com/image/image_81/81_Malvignol_4.jpg"]},"Consult_chateau_formulaire255c":{"id":"Consult_chateau_formulaire255c","dept":"81","canton":"Lavaur","commune":"Marzens","nom":"Marzens","type":"Château","periode":"XIII-XIX","histoire":"deux châteaux à Marzens celui  de Clauzade, de Preignan et la bastide des tourelles                                                                                  MARZENS, lhistoire du lieu remonte à la préhistoire, comme en témoigne un silex taillé il y a semble-t-il 50 000 ans.\r\nSeul vestige du Moyen-Age, la motte féodale de Preignan, où sélève aujourdhui un château du XVIe siècle flanquée dune tour plus ancienne datée du XIIIe Siècle.\r\nDeux châteaux existent encore, le château de Preignan et le château dEn Clauzade.                                                                                  PREIGNAN, existe  déjà  en  1271,  occupé  alors  par  Vital  de Preignan.  le « Mas » fut attribué à la Couronne de France, qui y installa un bayle. Celui-ci eut des difficultés pour  administrer  la  commune  indépendante  de  Preignan,  les  habitants  étant  sans  doute restés  proches  du  comte  de  Toulouse.  Le  «  Mas  »  est  acheté  vers  1502  par  Pierre  Guyot, commerçant  drapier  parisien,  venu  dans  le  Tarn  faire  fortune  avec  le  commerce  du pastel,  Il  y  fonda  une  dynastie  qui  prit  le  titre  de  Seigneur  de  Preignan.   La  famille  Guyot,  à  lapogée  de  sa fortune,  possédait  : à  Preignan:  les  métairies  de  la  Grange,  Cabanès.\r\n CLAUZADE, il fut au XIXe siècle, propriété  de  la  famille  Toulouse-Lautrec  de  1870  à  1979, ce  château  a  été occupé  par  le Comte Bertrand de Toulouse-Lautrec Montfa jusquen 1952, il a ensuite été vendu à lInstitut Vajra-Yogini, Il est aujourdhui un centre important détudes bouddhistes et a accueilli le Dalaï Lama en 1982 et 1993.                                                   Les TOURELLES, construite dans les années 1850, gite de France aujourd'hui par la famille de Cambiaire.","architecture":"Preignan, il  ny  a  pas  beaucoup  de  témoignages  de  lépoque  médiévale,  en  dehors  de cette butte féodale de Preignan au pied de laquelle a été ensuite édifié le \r\nchâteau de Preignan, dont le bâtiment actuel date du XVIe siècle,  la tour ronde mis hors uvres  en pierre est plus ancienne, sans doute  construite  vers  1240, toiture en terrasse dépassant légèrement le bâtiment  haut de deux étages et attiques toitures en croupes.                                                                        Clauzade, corps de logis rectangulaire à deux niveaux et attiques sur toit brisé à la mansart (pavillon légèrement saillant en façade comprenant une porte arrondie avec petite ouverture de chaque côté et il de buf au dessus des fenêtres jumelée au centre également sur toiture ).  Flanqué de chaque côté de pavillon rectangulaire à trois niveaux dont un toit à la mansart , l'autre en terrasse.    Les tourelles de plan rectangulaire en briques rouges et pierres à deux niveaux sur soubassements et attiques flanqué en façades de deux tourelles sur angles en encorbellement.","habitants":"Famille de   Vital  de Preignan.                                                                                   Famille  Toulouse-Lautrec\r\n        \"","divers":"Le château de preignan de Clauzade et la bastides des Tourelles à Marzens.","gps":"","images":["../../jctruffet.com/image/image_81/81_Marzens_1.jpg","../../jctruffet.com/image/image_81/81_Marzens_2.jpg","../../jctruffet.com/image/image_81/81_Marzens_3.jpg","../../jctruffet.com/image/image_81/81_Marzens_4.jpg","../../jctruffet.com/image/image_81/81_Marzens_5.jpg","../../jctruffet.com/image/image_81/81_Marzens_6.jpg","../../jctruffet.com/image/image_81/81_Marzens_7.jpg"]},"Consult_chateau_formulaire667e":{"id":"Consult_chateau_formulaire667e","dept":"81","canton":"Labruguière","commune":"Massaguel","nom":"Massaguel","type":"Château","periode":"XIII","histoire":"MASSAGUEL, le nom de Massaguel apparaît pour la première fois en 1152. par alliance de Pierre de Puylaurens et de Diaz de Faberzan, puis appartient à la famille de Dourgne; En 1226 passe au Rousseau, acheté en 1433 par Hugues de la Roque écuyer   . En 1498 Jean Daucet. Dans la moitié du XVIe siècle par    alliance passera  à  Jean de Lautrec, sa troisième fillle Margueritte  épouse Jacques de Nadal, originaire du Sidobre, Jacques converti au calvinisme en 1563 son frère Jean la Crouzette chefs du parti catholique. Le fils de Jacques, Jean II épouse  le premier mai 1619 Marguerite  de Loubens participe aux guerres de religion, il vit très proche  du prince Henri de Rohan chef général des église
