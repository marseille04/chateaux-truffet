mage/image_81/81_Cuq_5.jpg","../../jctruffet.com/image/image_81/81_Cuq_6.jpg","../../jctruffet.com/image/image_81/81_Cuq_7.jpg","../../jctruffet.com/image/image_81/81_Cuq_8.jpg"]},"Consult_chateau_formulairebfa6":{"id":"Consult_chateau_formulairebfa6","dept":"81","canton":"Lavaur","commune":"Cuq-Toulza","nom":"Cuq_Toulza","type":"Château","periode":"XVI-XIX","histoire":"Quatre châteaux à Cuq-Toulza dont celui de Cuq-Toulza du XVIIe siècle flanqués de tours carrées, celui de Bonnac du XVI -XXe siècle avec tour néo-gothique, celui du Castelet du XIXe siècle à tourelle ronde et de Rogistan du XVII-XIXe siècle.                                                                                                                    CUQ-TOULZA, au mois de juillet 1623, conformément aux ordres du roi, le baron d'Amres se rendit à Cuq pour procéder \"à la démolition et le nettoyage de cette place. Il employa pour cette opération 500 hommes de pied, la destruction fut totale et la ville ne se releva jamais de ses cendres. Les familles qui l'habitaient furent ruinées et certaines se réfugièrent dans les métairies qu'elles possédaient autour de la ville.                                                     BONNAC, situé à l'est du bourg, sur la rive droite du Girou, Bonnac fut forcé en 1625 par le maréchal de Thémines qui fit passer au fil de l'épée tous les défenseurs.                                  CASTELET, a l'allure d'une robuste maison bourgeoise et est doté d'un rez-de-chaussée reposant sur un soubassement, d'un étage et d'un niveau en surcroît sur le toit. Sa façade de cinq travées n'a pas reçu d'autre animation que des chaînages de pierre aux angles et une élégante corniche. Le logis est couvert d'un toit à croupes couvert d'ardoise, le dernier niveau est éclairé par de grandes lucarnes. Le corps de  logis principal est flanqué d'une fine tourelle cylindrique coiffée d'une poivrière.                                                                                                               ROGISTAN de la famille de Lausun.                                                   VERNEDE, élevage de chevaux de sport, AA et SF, pension de chevaux.                                                                                                                Autres châteaux ; Poumel, Montauquier, Massoulard et Scopan, pas d'information historique.","architecture":"BONNAC,  bâtiment composite accolé à un vieux corps de logis d'allure bourgeoise et couvert d'un toit en tuiles, se dresse un étrange manoir présentant peu de parenté avec l'architecture traditionnelle de la région. Un mur pignon s'appuie sur une tour polygonale coiffée d'un toit pointu en pavillon, de l'autre côté de ce corps de logis émerge un haut comble en pavillon.                                       CUQ-TOULZA, le petit château qui a remplacé le vieux château de Cuq-Toulza fut construit à l'emplacement de ce dernier. Il consiste en un logis de bâtiment quadrangulaire dont les deux angles de l'un des côtés sont flanqués de tours carrées ayant conservé leur comble aigu en pavillon. La façade opposée présente en son milieu une autre tour à peu prés similaire, tandis qu'à l'une des extrémités de cette façade, une petite aile portant une échauguette a reçu à l'époque moderne un décor de créneaux, et malgré ses remaniements, le bâtiment conserve un certain nombre d'éléments datant de la reconstruction opérée au XVIIe siècle.                                                        ROGISTAN, demeure de plan classique,  présente un corps de logis carré cantonné de quatre tours légèrement plus hautes et saillantes, formant pavillons. L'élévation principale à cinq travées comporte un rez-de-chaussée, un premier étage de grandes baies et un second présentant de petites fenêtres. Les tours ne présentent qu'une seule travée, mais un niveau supplémentaire de fenêtres, le château aurait été bâti dans la première moitié du XIXe siècle  À moins que pour une raison difficilement compréhensible, on ait, au début du XIXe siècle, rebâti l'édifice sur le même plan et les vieilles bases. Ce domaine conserve également des communs et un pigeonnier intéressant.","habitants":"Maréchal de Thémines                                                                      Famille de Lausun\r\n        \"","divers":"Château de Bonnac, du Castelet, de Rogistan, de Vernède, de Poumel, de Scopan, de Montauquier et de Massoulard à Cup-Toulza.","gps":"","images":["../../jctruffet.com/image/image_81/81_Cuq_Toulza_1.jpg","../../jctruffet.com/image/image_81/81_Cuq_Toulza_2.jpg","../../jctruffet.com/image/image_81/81_Cuq_Toulza_3.jpg","../../jctruffet.com/image/image_81/81_Cuq_Toulza_4.jpg","../../jctruffet.com/image/image_81/81_Cuq_Toulza_5.jpg","../../jctruffet.com/image/image_81/81_Cuq_Toulza_6.jpg","../../jctruffet.com/image/image_81/81_Cuq_Toulza_7.jpg","../../jctruffet.com/image/image_81/81_Cuq_Toulza_8.jpg","../../jctruffet.com/image/image_81/81_Cuq_Toulza_9.jpg"]},"Consult_chateau_formulaire6684":{"id":"Consult_chateau_formulaire6684","dept":"81","canton":"Sémalens","commune":"Damiatte","nom":"Damiatte","type":"Château","periode":"XVI","histoire":"Cinq châteaux à Damiatte celui de Lacapelle du XVIe siècle, de Saint-Paul de la baronne de Scalibert de Saint-Marc, la Combe  et celui de Vergnet .                                                                                       LACAPELLE, après avoir été le domaine du Seigneur De Villeneuve, il a été acheté par la famille Bruguière au début du XIXe siècle. C'est aujourd'hui la sivxième génération qui l'entretient. Pour vous familiariser avec eux, les portraits des ancêtres sont d'ailleurs accrochés dans le salon, gite de France.                 Saint-MARC,  pas d'information   historique                                   SCALIBERT à Teyssode hôtel.                                                                VERGNET, à Viterbe château du XVIIIe siècle, chambres d'hôtes de Brigitte et Pascal.","architecture":"Lacapelle, robuste construction, ce château édifié au XVIe siècle se présente sous la forme d'un logis quadrangulaire couronné d'un toit à deux pentes, et dont la façade présente sur deux travées une légère saillie. Contre ce logis  principal est  venu s'accoler un autre bâtiment  moins élevé, en L, à usage de communs. Lacapelle conserve encore quelques fenêtres à croisée de meneaux.                                                                 Saint-Marc   apparaît comme un vaste bâtiment néo-classique, composé d'une façade à un étage de cinq travées, flanquée de deux ailes saillantes de deux travées et surmontées de pignons formant fronton. Des balustrades courant au-dessus de la corniche, des ferronneries et un jeu de colonnes et de chapiteaux aux formes plutôt lourdes confèrent tout de même un charme certain à cette belle bâtisse du XIXe siècle.                                                          La Combe, de plan en équerre à deux niveaux avec tours carrées en angles intérieur et d'un pavillon carré en retour tout deux toit en ardoises et en poivrière.                                                              Vergnet, de style manoir de plan rectangulaire à deux niveaux et série de lucarnes sur toit brisé à la Mansart prolongé sur l'arrière de petits pavillons de dépendance d'un niveau.","habitants":"Famille Bruguière\r\n        \"","divers":"Le château de la  Combe  de Vergnet de Saint-Marc et le manoir de la Capelle","gps":"","images":["../../jctruffet.com/image/image_81/81_Damiatte_1.jpg","../../jctruffet.com/image/image_81/81_Damiatte_2.jpg","../../jctruffet.com/image/image_81/81_Damiatte_3.jpg","../../jctruffet.com/image/image_81/81_Damiatte_4.jpg","../../jctruffet.com/image/image_81/81_Damiatte_5.jpg","../../jctruffet.com/image/image_81/81_Damiatte_6.jpg","../../jctruffet.com/image/image_81/81_Damiatte_7.jpg","../../jctruffet.com/image/image_81/81_Damiatte_8.jpg"]},"Consult_chateau_formulaire8ba8":{"id":"Consult_chateau_formulaire8ba8","dept":"81","canton":"Castres","commune":"Carbes","nom":"Dor_de_Lastours","type":"Château","periode":"XVII","histoire":"La famille Dor de Lastours est originaire du bourg de Saint-Pons-de-Thomières (Hérault), où l'on trouve sa trace dès le XVIe siècle :En 1550, Antoine Dor est médecin et possède une maison dans la gache de Villeneuve. La filiation de la famille Dor de Lastours est connue à partir de Maître Antoine Dor, notaire royal au début du XVIIe siècle. Au début du XVIIIe siècle, la famille s'établit dans la région de Castres, et prend le nom de Dor de Lastours, après l'achat du domaine de Lastours et de la seigneurie de Carbes. Les liens avec la région Saint-Ponaise restent importants durant tout le XVIIIe siècle, notamment par les alliances familiales : Ainsi Joseph Dor épouse (en troisièmes noces !) Elisabeth Maurel, de Saint-Pons. Son fils Louis Dor de Lastours se marie (en deuxièmes noces) avec Colombe de Bosquat, d'une famille de la petite noblesse Saint-Ponaise. Enfin, sous le Directoire, le petit-fils Joseph Dor de Lastours épouse (en deuxièmes noces) Etiennette de Bene de Barre, fille du ci-devant gouverneur pour le roi de la ville de Saint-Pons. Le personnage le plus étonnant de la famille est sans conteste Joseph Dor de Lastours : Haut magistrat sous l'Ancien Régime, il est farouchement patriote pendant la Révolution et occupe les plus hauts postes de responsabilité du Tarn. Sous l'Empire, il devient maire de Castres et conserve ce poste au début de la Restauration, il termine même député ultra-royaliste.","architecture":"Le château de Lastours est un corps de logis imposant rectangulaire à trois niveaux, haut toit en croupes avec des lucarnes accolé aux angles de tours rondes à toit en poivrières.","habitants":"Famille Dor de Lastours\r\n        \"","divers":"Château de Lastours à Carbes","gps":"","images":["../../jctruffet.com/image/image_81/81_Dor_de_Lastours_1.jpg","../../jctruffet.com/image/image_81/81_Dor_de_Lastours_2.jpg","../../jctruffet.com/image/image_81/81_Dor_de_Lastours_3.jpg"]},"Consult_chateau_formulairedd03":{"id":"Consult_chateau_formulairedd03","dept":"81","canton":"Labruguière","commune":"Dourgne","nom":"Dourgne","type":"Château","periode":"XVI","histoire":"châteaux  de Litmage du XIXe siècle et de Las-Combes                         LIMATGE  Le château de Limatge a été construit au XIXe siècle, postérieurement à 1833.  En 1922, Henri de la Rocque devient propriétaire du château et des ardoisières de Limatge. Il était en cours de réaménagement en 2005.                                                 \r\nA voir dans cette commune de Dourgne lAbbaye dEn Calcat qui accueille dans ses murs les amateurs de retraite spirituelle au sein de la vie des moines. A labbaye scholiastique, les surs bénédictines vous accueillent aussi dans le même esprit.","architecture":"On peut y observer les ruines du château de Castellas, détruit par Simon de Montfort.                                                                                Le château de Las Combes est un exemple assez typique des châteaux construits à l'époque du Second Empire ou immédiatement après et exempts de toute référence à l'architecture traditionnelle locale, hormis en ce qui concerne les matériaux. Avec ses combles brisés percés de lucarnes, le style de Las Combes fait référence à l'architecture classique.                                                                                         Château de Limatge de plan rectangulaire à un niveau sur soubassement avec plein cintre un pavillon saillant  à un niveau et attiques série de lucarnes sur l'ensemble des toits en croupes et en ardoises.","habitants":"Famille d' Henri de la Rocque\r\n        \"","divers":"Château de Litmage et de las-Combes.","gps":"","images":["../../jctruffet.com/image/image_81/81_Dourgne_1.jpg","../../jctruffet.com/image/image_81/81_Dourgne_2.jpg","../../jctruffet.com/image/image_81/81_Dourgne_3.jpg","../../jctruffet.com/image/image_81/81_Dourgne_4.jpg"]},"Consult_chateau_formulaire1685":{"id":"Consult_chateau_formulaire1685","dept":"81","canton":"Albi","commune":"Sainte-Croix","nom":"Durantié","type":"Château","periode":"XIX","histoire":"DURANTIE, la demeure se présente comme un joli petit château du XIXe siècle. Pas d'information historique.","architecture":"Château de Durantié, de plan quadrangulaire, l'édifice se compose d'un soubassement, d'un rez-de-chaussée et d'un étage. Le toit à quatre pentes est dissimulé derrière un attique qui donne à cette demeure une allure de villa. La façade est animée en son centre par trois travées rapprochées, composition soulignée par des bossages en table que l'on retrouve aux angles du bâtiment. Alors qu'une terrasse aux balustrades de ferronnerie court le long du rez-de-chaussée, un balcon théâtralise le corps central du premier étage. Avec sa façade équilibrée et ses hautes fenêtres en arc segment, c'est au XIXe siècle un fort bel écho de l'architecture du XVIIIe siècle arrivé à son point d'équilibre : compromis entre un néo-classicisme encore tempéré et les grâces inimitables du style Louis XV.","habitants":"Famille de Durantié\r\n        \r\n        \"","divers":"Le château de Durantié","gps":"","images":["../../jctruffet.com/image/image_81/81_Durantie_1.jpg","../../jctruffet.com/image/image_81/81_Durantie_2.jpg","../../jctruffet.com/image/image_81/81_Durantie_3.jpg"]},"Consult_chateau_formulaire0c6c":{"id":"Consult_chateau_formulaire0c6c","dept":"81","canton":"Labruguières","commune":"Escoussens","nom":"Escoussens","type":"Vestiges","periode":"XII","histoire":"ESCOUSSENS,  sa construction est accordée en 1185 par le vicomte de Trencavel, Roger II qui linféode au seigneur Raimond de Dourgne, permettant à cette famille un développement conséquent de leur seigneurie, en effet, en 1153, elle acquiert Verdalle et en 1183 Cuq-Toulza. Le comte de Toulouse, Raimond VII, achète en 1231 tous les honneurs de Raimond de Dourgne, et ce quil possède à Escoussens. Par la suite, il concède la seigneurie dEscoussens à Guillaume Fort de Beaufort et Arnaud de Ventenac. Guillaume Fort de Beaufort en deviendra le seul maître rapidement. En 1185, Roger II de Trencavel autorise la construction d'un château pour son vassal : Le seigneur de Dourgne et Puylaurens. En 1209, début de la terrible croisade des Albigeois. Vers 1212, les troupes de Simon de Montfort attaquent et brûlent le château. En 1228, le site est rattaché au Royaume de France. Vers 1239, après l'assassinat de Raymond de Dourgne, le château est donné en fief à Philippe de Montfort.","architecture":"Escoussens, village perché, est dominé par les restes massifs de son château édifié en 1166. Le village fut longtemps une possession des chartreux de Castres : du XIVe siècle à la Révolution. Les bases du château sont anciennes mais qui fut remaniée entre le XVIIe et le XIXe siècle, comme le montrent les façades percées de hautes fenêtres régulières. Une belle tour demeure dans la cour, percée d'une élégante porte en accolade. Le fossé fut comblé en 1742 et, à sa place, fut construit en 1822 le perron actuel. Au XIXe siècle,  un escalier dessert la porte d'entrée. Au XXIe siècle, la visite de l'extérieur est libre et gratuite.","habitants":"Vicomte de Trencavel\r\n        \"","divers":"Vestiges et château d'Escoussens","gps":"","images":["../../jctruffet.com/image/image_81/81_Escoussens_1.jpg","../../jctruffet.com/image/image_81/81_Escoussens_2.jpg","../../jctruffet.com/image/image_81/81_Escoussens_3.jpg","../../jctruffet.com/image/image_81/81_Escoussens_4.jpg"]},"Consult_chateau_formulaire61f4":{"id":"Consult_chateau_formulaire61f4","dept":"81","canton":"Lacaune","commune":"Espèrausses","nom":"Espèrausses","type":"Château","periode":"XIV","histoire":"A Espèrausses le château d'Espérausses du XIV-XVIIe  siècle et à deux kilomètres  à l'est le château de Berlats, pas d'information historique.                                                                              ESPERAUSSES, les seigneurie d'Espérausses appartient successivement aux terres du comte de Toulouse, aux vicomtes d'Albi et de Lautrec puis, en 1300, passa aux Montfort, avant d'être transmis par alliance aux Vendômes, aux Bourbons puis aux d'Armagnac. Malmené par l'histoire, divisé entre trois propriétaires.","architecture":"Espèrausses comporte trois corps de bâtiment, qui se sont développés entre le XIVe et le XVIIe siècle, à partir de la maison-forte d'origine. Le château présente deux façades réunies dans leur alignement par un mur bas, et en retrait par un long corps de logis. Le premier corps de bâtiment se compose d'un logis quadrangulaire flanqué à sa droite d'une tour carrée ayant été sûrement découronnée. La façade présente deux étages de grandes fenêtres à croisée de meneaux très simple. Le deuxième corps de logis de droite a fait l'objet de deux campagnes de construction distinctes comme le montre la trace de reprise sur la façade. Celle-ci est flanqué à droite d'une grosse tour ronde, percée d'une vieille fenêtre à meneau horizontale. A l'autre extrémité de la façade est implantée une échauguette, découronnée comme la tour qui lui est opposée. La partie centrale comportant la tourelle côté village présente en revanche du côté de la barbacane, une entrée monumentale du XVIIe siècle.                                                  Berlats de plan rectangulaire à trois niveaux et attiques,  et accolé d'une tour ronde plein cintre mi-hors uvres à toit arasé d'un pan en prolongement du toit  en croupe de l'édifice.","habitants":"Vicomtes d'Albi\r\n        \r\n        \"","divers":"Château d'Espèrausses et de Berlats","gps":"","images":["../../jctruffet.com/image/image_81/81_Esperausses_1.jpg","../../jctruffet.com/image/image_81/81_Esperausses_2.jpg","../../jctruffet.com/image/image_81/81_Esperausses_3.jpg"]},"Consult_chateau_formulaire0cc3":{"id":"Consult_chateau_formulaire0cc3","dept":"81","canton":"Saix","commune":"Saint-Germain des Prés","nom":"Farinières","type":"Château","periode":"XIX","histoire":"FARINIERES, au siècle des lumières, le château de Farinières appartenait à une famille de Robins : les Solomiac. C'est un des descendants de cette famille, Hercule Solomiac, qui reconstruisit au début de l'Empire la demeure actuelle.  Grâce à une conception bidimensionnelle et graphique de la façade dans laquelle les horizontales donnent à l'ensemble une grande noblesse, l'architecte de Farinières a réussi là l'un des plus beaux bâtiments du premier quart du XIXe siècle conservés dans le département.","architecture":"Le château de style néo-classique se présente sous la forme d'une façade à cinq travées et un seul étage que flanquent deux pavillons latéraux légèrement plus bas. La présence d'un attique surmonté d'une balustrade, de simples chaînages de pierre flanquant les extrémités du logis central et des pavillons latéraux et de pots couronnant chaque extrémité de la façade suffisent à animer cette architecture néo-classique inspirée des villas italiennes construites depuis la Renaissance, et qui ont tant fait école dans bien des pays d'Europe.","habitants":"Famille de Robins\r\n        \r\n        \"","divers":"Le château de Farinières","gps":"","images":["../../jctruffet.com/image/image_81/81_Farinieres_1.jpg","../../jctruffet.com/image/image_81/81_Farinieres_2.jpg","../../jctruffet.com/image/image_81/81_Farinieres_3.jpg"]},"Consult_chateau_formulaired926":{"id":"Consult_chateau_formulaired926","dept":"81","canton":"Lacaune","commune":"Ferrières","nom":"Ferrières_Tarn","type":"Château","periode":"XIII-XVI","histoire":"FERRIERES, les premiers seigneurs connus sont au XIIIe siècle, les Tailhefer, auxquels succédèrent les Frotère, puis par voie d'alliance la puissante famille des Guilhot qui  transforma le château médiéval au XVIe siècle, époque des guerres de Religion, opposant calvinistes et catholiques. Guillaume Guillot se fit remarquer par ses actions d'éclat lors des guerres de religion.  Il fit de Ferrières une des places fortes des Réformés dans la région. Néanmoins, l'un des descendants de Guillaume devint, tout à l'opposé, le persécuteur des protestants. En 1566 l'aînée de ses filles  Marguerite de Guilhot épouse Michel Bayard. En 1689, l'assemblée clandestine des protestants du désert, à Saint-Jean del Frech  fut dispersée par les ordres du baron de La Crouzette, Pierre III de Bayard, arrière-petit-fils de Guilhot. C'est au XVIIIe siècle que le château retrouve une actualité.   Au début du XVIIIe siècle, le château sert de poste royal de surveillance  lors de la révolte des Camisards dans les Cévennes. En 1708, le château est racheté par les Etats du Languedoc, en 1728  prison d'état. Même si les assemblées clandestines des protestants se tenaient encore, il n'était plus question d'emprisonner leurs participants. Les seuls détenus de Ferrières étaient là sur l'ordre du roi. Ordre d'emprisonnement que les familles sollicitaient contre leurs fils un peu trop remuants. Le propriétaire actuel poursuit la tâche de restauration entreprise dès 1920 par la famille d'Olivier de Cèbe.","architecture":"Ferrières, entouré de tours massives, il dissimule dans sa cour la fragile beauté des sculptures de la Renaissance. Le château est d'origine fort ancienne puisque certaines de ses voûtes seraient antérieures au XIe siècle, mais le château prit son aspect actuel dans le courant du XVIe siècle. Il a la forme d'un hexagone irrégulier flanqué à chacun de ses angles d'une tour. En 1793 les révolutionnaires firent démanteler les tours. Seule une partie de la  grande demeure reste encore debout mais par contre, la partie centrale qui servait de logis d'habitation a été épargnée. La première porte en plein cintre passe sous la salle d'armes. La façade principale est ornée d'un riche décor sculpté de la même époque. Des colonnes flanquent l'arc de la porte d'entrée:  aux  angles, un enfant dompte un lion, un second tient un serpent et un troisième combat un dragon, symbolisant à eux trois la force, la prudence et la fertilité.\r\n Ferrières, de l'extérieur, ressemble à une morne forteresse médiévale, encore aujourd'hui. Plusieurs tours extrêmement solides, de forme cylindrique, protègent les angles sensibles de la bâtisse. De  jolies fenêtres à meneaux, parfois partiellement bouchées. Trois fenêtres, dans le style de la Renaissance, sont ornées de têtes d'hommes et de femmes. Dans l'entablement des fenêtres, le visiteur ébloui voit apparaître les têtes de Guillaume Guilhot le seigneur du château, sa femme, Au XVIIIe siècle, les prisonniers étaient conduits dans la cour d'honneur du château, celle où se trouvent les sculptures Renaissance.","habitants":"Famille des Guilhot\r\n        \r\n        \"","divers":"Château de Ferrières","gps":"","images":["../../jctruffet.com/image/image_81/81_Ferrieres_Tarn_1.jpg","../../jctruffet.com/image/image_81/81_Ferrieres_Tarn_2.jpg","../../jctruffet.com/image/image_81/81_Ferrieres_Tarn_3.jpg","../../jctruffet.com/image/image_81/81_Ferrieres_Tarn_4.jpg","../../jctruffet.com/image/image_81/81_Ferrieres_Tarn_5.jpg","../../jctruffet.com/image/image_81/81_Ferrieres_Tarn_6.jpg","../../jctruffet.com/image/image_81/81_Ferrieres_Tarn_7.jpg","../../jctruffet.com/image/image_81/81_Ferrieres_Tarn_8.jpg"]},"Consult_chateau_formulaire40a3":{"id":"Consult_chateau_formulaire40a3","dept":"81","canton":"Sémalens","commune":"Fiac","nom":"Fiac","type":"Château","periode":"XIX","histoire":"Trois châteaux à Fiac, dont celui de Fiac,  du Puech, de Saint-Salvy (voir aricle), de Saint-Anne au nord-Est et l'hôtel de ville dit d'en Bouffils.                                                                                  FIAC en 1208, Simon de Montfort était seigneur de Fiac puis, en 1315, la châtellenie de Fiac fut donnée à Guy de Comminges, fils de Laure de Montfort et de Bertrand III de Comminges, puis récupérée par le roi. Le château médiéval qui se trouvait sur la motte féodale, au lieu dit \"la ville\" fut détruit au début du XVIIe siècle. Le château actuel se trouve en fait édifié à l'extérieur du village primitif. Ce bâtiment passe pour avoir été construit de toutes pièces par la famille de Rivals au XIXe siècle mais en fait, de par la grande simplicité de son allure générale et la sobriété des encadrements des fenêtres, il semble évoquer un bâtiment plus ancien, des XVIIe et XVIIIe siècles, remaniée au XIXe siècle.                                             PUECH c'est dans les archives de ce château que l'on trouve la première mention d'une demeure primitive à la fin du XVIe siècle. Lors du siège de Fiac par Montmorency Damville qui se solda par l'incendie de la ville, le chatelain Vidal de Garrigues, perdit ses archives et sa demeure dans le brasier.                                                                             A quelques kilomètres au nord-Est le château de Saint-Anne à Cabanés pas d'information historique.","architecture":"Le château de Fiac se présente sous la forme d'un logis quadrangulaire dont l'une des façades est flanquée de deux belles tours carrée faisant à peine saillie. Cette façade de cinq travées est composée d'un soubassement, d'un rez-de-chaussée surélevé, d'un étage noble et d'un attique. Les tours comprenant une travée, ont reçu un étage de fenêtres à la place de l'attique, le bâtiment est couvert de toits en pavillons.                                                                           Puech, le château est composé d'un corps de logis central à un étage, flanqué de deux pavillons à deux niveaux faisant très légèrement saillie sur les façades nord et sud, et terminé à chaque extrémité par un corps d'un seul étage en léger retrait. Si la façade nord porte les stigmates de remaniements du début du XIXe siècle, la façade sud nous est parvenue sans la moindre altération, une bouche à feu se distinguant encore dans un mur à l'angle des communs. Le château est largement ouvert sur la plaine et porte la trace d'une architecture néo-classique typique du premier tiers du XIXe siècle. Avec son corps central plus bas et ses pavillons à deux étages.","habitants":"Famille de Rivals                                                                             Famille de Vidal de Garrigues\r\n        \"","divers":"Château de Fiac sur Puech de Saint-Salvy et de Saint-Anne à Cabanès","gps":"","images":["../../jctruffet.com/image/image_81/81_Fiac_1.jpg","../../jctruffet.com/image/image_81/81_Fiac_2.jpg","../../jctruffet.com/image/image_81/81_Fiac_3.jpg","../../jctruffet.com/image/image_81/81_Fiac_4.jpg","../../jctruffet.com/image/image_81/81_Fiac_5.jpg","../../jctruffet.com/image/image_81/81_Fiac_6.jpg","../../jctruffet.com/image/image_81/81_Fiac_7.jpg","../../jctruffet.com/image/image_81/81_Fiac_8.jpg","../../jctruffet.com/image/image_81/81_Fiac_9.jpg"]},"Consult_chateau_formulaire1264":{"id":"Consult_chateau_formulaire1264","dept":"81","canton":"Rabastens","commune":"Lisle sur Tarn","nom":"Fortis(des)","type":"Forteresse","periode":"XIX","histoire":"FORTIS,  en 1831, François Puilaurens famille établie de très longue date à Lisle-sur-Tarn, est propriétaire d'un domaine viticole au hameau des Fortis à la tête duquel se trouvent une grande maison et un chai. L'ancienne maison familiale et le chai attenant sont détruits en 1890, signe que le nouveau château est habitable à cette date.Le successeur de François est son fils, Pierre-Paul Pulaurens qui meurt sans descendance et c'est son frère cadet Antoine Puylaurens qui hérite du domaine en 1865. C'est lui qui entreprend la construction du château. L'héritier d'Antoine est Auguste ou Augustin Puylaurens. En 1887, une \"construction nouvelle\". L'ancienne maison familiale et le chai attenant sont détruits en 1890, signe que le nouveau château est habitable à cette date. Auguste Puylaurens garde le château jusqu'en 1905, au moment où il est vendu à la Société immobilière du Tarn. Le château est ensuite aux mains d'une famille de négociants en vin de Gaillac, les Daviau-Dubousquet. En 1925, Jean Picou en devint propriétaire jusqu'en 1940, date à laquelle il est repris par un homme d'affaire parisien, M. Scharff . En 1959, il devint la propriété d'un couple de Lislois, M. et Mme Hubert Galan\". Depuis 1998, le château est la propriété d'une société hollandaise Art-Arcis.","architecture":"Le château des Fortis a été construit au XIXe siècle. Élevé par un riche propriétaire terrien, le château a été bâti en briques de terre riches en graviers, selon une mise en uvre originale développé dans la plaine du Tarn. Véritable château viticole, le chai occupe toute la partie basse du château alors que les vastes salles dhabitation sont aux étages. Le corps de logis  de plan rectangulaire toit en croupe, les façades nord et sud sont flanquées de quatre tours polygonales repose sur le chai entièrement voûté. Le château est principalement construit à l'aide de matériaux de collecte locale: des briques de terre moulée et des galets. Seule la brique cuite proviendrait de briqueteries locales. Sur les deux façades les entrées saillantes on trouve un décor de colonnes en pierre supportant un fronton semi-circulaire en brique.","habitants":"Famille de François Puilaurens\r\n        \"","divers":"Forteresse des Fortis à Lisle sur Tarn","gps":"","images":["../../jctruffet.com/image/image_81/81_Fortis(des)_1.jpg","../../jctruffet.com/image/image_81/81_Fortis(des)_2.jpg","../../jctruffet.com/image/image_81/81_Fortis(des)_3.jpg","../../jctruffet.com/image/image_81/81_Fortis(des)_4.jpg"]},"Consult_chateau_formulaire6096":{"id":"Consult_chateau_formulaire6096","dept":"81","canton":"Gaillac","commune":"Gaillac","nom":"Gaillac","type":"Château","periode":"XVII-XX","histoire":"Quatre châteaux à Gaillac, celui de  Durand-Delga du XIXe siècle, celui de Rhodes, celui Ste-Cécile d'Aves du XVII-XIX siècle et de Pierre de Brens en Ville  du XVe siècle.                                     DURAND DELGA,  Adrien Durand, bourgeois, décida d'édifier un château vers 1880. En fait, les Durand étaient les héritiers d'une tradition familiale d'obédience napoléonienne, Adrien était le petit neveu unique des trois frères Delga qui moururent sur les champs de bataille de l'Empire, non sans que deux d'entre eux soient faits barons auparavant. Le château dut être achevé aux alentours de 1895 mais il fut en partie détruit à la fin de la seconde guerre mondiale par un incendie causé par un court-circuit. Il dut alors être vendu à l'union vinicole coopérative dont le siège était voisin, puis revendu par la suite.                                                                                     PIERRE DE BRENS, construit du XIIIe et au XV e siècle par la famille de Brens, comme résidence urbaine, il est un témoin d'architecture Renaissance dans la région toulousaine. Après des mésententes familiales religieuses et d'autres péripéties, il devient prison  de 1828 à 1850, puis loge maçonnique, orphéon, syndicat d'initiative, musée temporaire. Enfin actuellement il abrite les archives au 1er étage et l'orchestre philharmonique au rez-de-chaussée.                                                                                  RHODES, sur les premiers coteaux du vignoble millénaire de Gaillac, la famille Lépine exploite autour du château de Rhodes une vingtaine d'hectares de vignes dans un cadre idyllique rappelant certains paysages de Toscane.                                              STE-CECILE d'AVES, la propriété appartenait à Jean-Joseph Baljalade, son fils Jean-Jospeh poursuit l'affaire familiale dans la première moitié du XX e siècle et investit à Gaillac,  le domaine viticole fut acquis par la suite par la famille Ordioni au milieu du siècle et changea à nouveau de propriétaires. Quelques travaux d'embellissement furent alors menés à la fin du XXe siècle et au début du XXIe siècle.","architecture":"Durand-Felga; ce château de plan rectangulaire du XIXe siècle a été édifié dans deux tons de briques différentes et un style évoquant vaguement la Renaissance, il est assorti de perrons et d'un avant corps sur les façades latérales  est flanqué de tourelles d'angles. Il est divisé en un entresol, un rez-de-chaussée surélevé, un premier étage et étage de combles à lucarnes, prises dans le toit en croupes d'ardoise. La façade postérieure ne présente, quant à elle, pas d'intérêt mais jouit encore d'un joli jardin.                                                   Sainte-Cécile d'Aves, construit au XVIIe siècle puis agrandi au XVIIIe siècle, était accompagné en 1828, de bâtiments agricoles établis autour d'une cour. Un long bâtiment annexe, de  la fin de la décennie 1870 est un ensemble constitué de trois corps de bâtiments agricoles principalement dédiés à l'activité vinicole autour d'une cour en avant de laquelle s'élève un château présentant sa façade principale au sud sur le parc.  Il s'agit néanmoins d'un ensemble cohérent associant les bâtiments agricoles établis sur un plan rationnel et la demeure du maître des lieux.                                                                                                          Hôtel Brens, hôtel particulier construit à la fin du XVe siècle tout en briques, les encadrements des portes et fenêtres sont en  pierre, avec fenêtres à meneaux, mâchicoulis et gargouilles du XIIIe et XVe siècle, prison de Gaillac en son temps. Abrite les archives municipales.                                                                               Rhodes,  corps de logis a trois niveaux et attiques, rectangulaire avec avancée sur l'avant comme à l'arrière, mais celle de l'avant est accolée de tourelles sur angles intérieurs à toits pointus. L'édifice possède un toit en croupes.","habitants":"Famille Ordioni                                                                                 Famille  Adrien Durand                                                                         Famille de Brens                                                                          Famille Lépine\r\n        \"","divers":"Château de Durand-Delga, de Rhodes, de Sainte-Cécile d'Aves  de Bonette, du Cayla, du maréchal Joffre, de Tauziè et l'hôtel de Pierre de Brens","gps":"","images":["../../jctruffet.com/image/image_81/81_Gaillac_1.jpg","../../jctruffet.com/image/image_81/81_Gaillac_2.jpg","../../jctruffet.com/image/image_81/81_Gaillac_3.jpg","../../jctruffet.com/image/image_81/81_Gaillac_4.jpg","../../jctruffet.com/image/image_81/81_Gaillac_5.jpg","../../jctruffet.com/image/image_81/81_Gaillac_6.jpg","../../jctruffet.com/image/image_81/81_Gaillac_7.jpg","../../jctruffet.com/image/image_81/81_Gaillac_8.jpg","../../jctruffet.com/image/image_81/81_Gaillac_9.jpg"]},"Consult_chateau_formulairea496":{"id":"Consult_chateau_formulairea496","dept":"81","canton":"Gaillac","commune":"Gaillac","nom":"Gaillac_Foucaud","type":"Château","periode":"XVII","histoire":"FOUCAUD,  en 1637 Jacques de Foucaud d'Alzon est l'initiateur de la construction de ce château au XVIIe siècle conseillé au parlement de Toulouse. À partir de 1658, il y associe son frère Arnaud. En 1722, il entre dans la famille d'Huteau par mariage. Le château est parfois appelé château d'Huteau. Toujours par mariage, il entre en 1870 dans la famille de Puységur. Le fils, Arnaud de Puységur, est le propriétaire qui vendit la demeure à la mairie de Gaillac en 1903.  Depuis 1936 il abrite le musée des beaux-arts, momentanément déplacé au musée Philadelphe Thomas durant l'occupation pour servir d'hôpital aux Allemands.","architecture":"Château du XVIIe siècle, son plan est inspiré de la villa d'Este. Son style classique s'adapte bien à la brique rouge locale.  De plan rectangulaire flanqué à chaque extrémité de deux pavillons de même forme disposés de façon transversale. Construit en briques claires, orné de quelques  moulures qui soulignent les différents niveaux, la travée centrale est sommée côté ouest  et Est  par un fronton semi-circulaire. La façade orientale une porte d'entrée principale fait alterner à intervalles réguliers trumeaux et ouvertures. Un double perron avec porte d'entrée encadrée de fines colonnes  supportant la corniche la façade occidentale les terrasses superposées reliés par des jeux  de balustrades et des escaliers. Au nord du château, se situe une vaste surface plane, parcourue d'allées séparant des zones engazonnées dont certaines arborées. Au bord de la rue Dom Vaysette, un bâtiment en arc de cercle, les anciennes écuries du début du XIXe siècle, respectent le style classique par les frontons de style palladien. Il abrite une crèche depuis les années 1990. Au sud du château, entre celui-ci et les berges du Tarn, des terrasses agrémentées de bassins et d'escaliers ont été aménagées.\r\nPlus récemment, le jardin qui a été conçu par le Nôtre, a été agrandi à l'ouest par une roseraie.","habitants":"Famille D'Huteau\r\n        \"","divers":"Le château de Foucaud à Gaillac","gps":"","images":["../../jctruffet.com/image/image_81/81_Gaillac_Foucaud_1.jpg","../../jctruffet.com/image/image_81/81_Gaillac_Foucaud_2.jpg","../../jctruffet.com/image/image_81/81_Gaillac_Foucaud_3.jpg"]},"Consult_chateau_formulaire817d":{"id":"Consult_chateau_formulaire817d","dept":"81","canton":"Albi","commune":"Le Sequestre","nom":"Gardie","type":"Château","periode":"XVI-XVII","histoire":"GARDIE, jouissant d'une vue magnifique sur la vallée du Tarn et Albi,en 1543 : Les domaines de Saliès et du Séquestre sont détachés de la couronne et inféodés au sieur d'Escarlhan, marchand à Albi, pour former une seule seigneurie.  Pendant plus de deux siècles de 1570 à 1770 la seigneurie appartient aux « De Fonvieille » famille toulousaine de souche et composée de viguiers albigeois.  Cette famille a pris une part active durant les guerres de religion au côté des catholiques, et en particulier au siège de Montauban.","architecture":"La Gardie est un élégant édifice du XVIe siècle. À la différence des bâtiments de la plaine bâtis avec des briques pétries à partir des alluvions du Tarn, ce château, situé sur une éminence calcaire, a pu être élevé en pierre. Le corps de bâtiment principal affecte pratiquement la forme d'un carré et sur le côté gauche de la façade principale est accolée une tour carrée plus haute que le logis. Le corps principal ainsi que la tour sont couverts d'une toiture de tuiles à quatre pentes. Bien qu'étant bouchées, plusieurs fenêtres ont conservés leur disposition primitive et toujours sur la façade latérale gauche, on remarque trois fenêtres à meneaux horizontales, disposées de manière régulière. Sur la façade regardant vers la vallée existe toujours une fenêtre à croisée de meneaux. La cour précédant l'édifice est fermée sur trois côtés par des bâtiments de commun, et l'accès à cette cour se fait par un joli portail du XVIIe siècle en anse de panier, encadré de pilastres doriques et surmonté d'un fronton triangulaire.","habitants":"Seigneur local\r\n        \"","divers":"Le château de Gardie à le Sequestre","gps":"","images":["../../jctruffet.com/image/image_81/81_Gardie_1.jpg","../../jctruffet.com/image/image_81/81_Gardie_2.jpg","../../jctruffet.com/image/image_81/81_Gardie_3.jpg"]},"Consult_chateau_formulairedc0b":{"id":"Consult_chateau_formulairedc0b","dept":"81","canton":"Saix","commune":"Garrevaques","nom":"Garrevaques","type":"Château","periode":"XIX","histoire":"Deux châteaux à Garrevaques, celui de Garrevaques  du XIXe siècle,  celui de Gandels du XVIIe siècle                                       GARREVAQUES, le château était, à cette époque, la propriété d'un seigneur catholique réputé pour mener la vie dure aux pasteurs, qui se rendait à l'académie protestante de Puylaurens. Après les guerres de religion et par l'effet des alliances, les propriétaires prirent la religion réformée, et la famille du comte de Gineste-Najac apparaît à ce moment-là. Pendant la Révolution Française le château fut incendié puis vers 1800 il fut reconstruit après le retour de la paix sous le Consulat. Pendant huit mois un état major allemand occupa les lieux entraînant dégradations et mutilations. Cependant une fois de plus le malheur fut surmonté. Toujours dans la descendance c'est la XVIe génération qui a conservé et restauré cette demeure familiale. Aujourd'hui chambres d'hôtes par la famille Combes.                                                GANDELS,  la seigneurie de Gandels appartenait avec la justice haute, moyenne et basse, à l'abbaye de Soréze, qui la bailla en arrière fief le 28 juillet 1600 à Antoine de Thuile. Françoise de Thuile épousa le 13 juin 1610  et lui apporta Gandels en dot. On rencontre ensuite comme seigneur de Gandels, Jean d'Andrieu, capitaine au régiment de Champagne en 1649.","architecture":"Garrevaques du XIXe siècle est situé dans la vallée du Sor,  destiné à protéger la population du village, le château a été construit en 1460. Orné de quatre tours et d'un toit en tuiles canal, entouré de fosses et d'un mur d'enceinte, il avait l'aspect d'une grande bâtisse. Entièrement remanié au XIXe siècle après avoir été détruit par un incendie au cours de la Révolution, l'édifice présente trois travées à deux niveaux un étage de combles éclairé  par des lucarnes sommé de frontons  triangulaires avec rangée de faux mâchicoulis.  Rez-de-chaussée à terrasse surélevée accès par deux rampes, la corps de logis rectangulaire coiffé d'un toit en pavillon ainsi que les tours polygonales aux toits pointus à pans multiples, en façade une tour plein cintre et à l'arrière les tours son aux angles.                                                                                Gandels, le château se présente comme un corps de logis flanqué à gauche d'une tour cylindrique et des communs. Cet édifice de fondation ancienne présente cinq travées en façade et se compose d'un rez de chaussée et de deux étages. L'animation est donnée par un avant corps surmonté d'un fronton équilatéral percé d'un il-de-buf. Mais cette travée n'a pas été établie dans l'axe de la façade car l'on note trois travées à gauche et une seule à droite alors qu'il y avait assez de place pour en établir deux. Cette implantation asymétrique sur un bâtiment auquel on semble avoir tenté de donner une dimension classique, milite pour une ancienneté de l'actuel château. À l'arrière est établie une tour carrée, le château présente encore beaucoup de charme, au milieu des beaux arbres de son parc.","habitants":"Famille du Comte de Gineste-Najac                                                   Famille de Jean d'Andrieu\r\n        \"","divers":"Château de Guarrevaques et de Gandels.","gps":"","images":["../../jctruffet.com/image/image_81/81_Garrevaques_1.jpg","../../jctruffet.com/image/image_81/81_Garrevaques_2.jpg","../../jctruffet.com/image/image_81/81_Garrevaques_3.jpg","../../jctruffet.com/image/image_81/81_Garrevaques_4.jpg","../../jctruffet.com/image/image_81/81_Garrevaques_5.jpg"]},"Consult_chateau_formulairecd7f":{"id":"Consult_chateau_formulairecd7f","dept":"81","canton":"Saint-Sulpice la Pointe","commune":"Garrigues","nom":"Garrigues","type":"Château","periode":"XVI","histoire":"A Garrigues et ses environs plusieurs châteaux celui de Lagassiè, celui de Las-Bordes à Montdurauce du XVIIe siècle avec tours et  celui de Sieurac.   Lagassier utilisé par une association pour  scéances culturelles.  Pour les autres  châteaux    je n'ai pas d'information historique.","architecture":"Garrigues à Lagassiè édifice possédant un corps de logis rectangulaire de trois niveaux, flanqué de tours rondes en façade toiture style chapeau chinois avec mâchicoulis et petit pavillon rectangulaire sur l'arrière l'ensemble couvert en tuiles presque plats.                                                                                                 Las-Bordes de plan rectangulaire à deux niveaux toit en croupe accolé de trois tours carrées en angles  dont une à toit presque plat.                                                                                           Sieurac quadrilatère à quatre niveaux   flanqué de tours carrées sur l'arrière du bâtiments à toits quatre pans et deux tourelles en  façade sur angles avec pavillon d'entré saillant  plein cintre avec fronton triangulaire.","habitants":"Seigneurs locaux\r\n        \"","divers":"Les châteaux d'Enjaux, de Lagassiè, de Las Bordes et de Sieurac à la Garrigues.","gps":"","images":["../../jctruffet.com/image/image_81/81_Garrigues_1.jpg","../../jctruffet.com/image/image_81/81_Garrigues_2.jpg","../../jctruffet.com/image/image_81/81_Garrigues_3.jpg","../../jctruffet.com/image/image_81/81_Garrigues_4.jpg","../../jctruffet.com/image/image_81/81_Garrigues_5.jpg","../../jctruffet.com/image/image_81/81_Garrigues_6.jpg","../../jctruffet.com/image/image_81/81_Garrigues_7.jpg"]},"Consult_chateau_formulaire2514":{"id":"Consult_chateau_formulaire2514","dept":"81","canton":"Carmaux","commune":"Crespinet","nom":"Gautherie","type":"Château","periode":"XVII","histoire":"GAUTHERIE; Charles de Berne de 1620  à  1659  fut le premier \"sieur de la Gautherie\" de la famille de Berne de Cussac. Du XVIe au XVIIIe siècle, la famille De Berne de Cussac était propriétaire du château. En 1817, le château de la Gautherie, appartenait à monsieur Falgayrac Joseph, revient à Charlotte de Berne qui le vendit le 25 octobre 1863 à monsieur Palasi. En 1914, monsieur Palasi vendit à maître Malphettes qui était notaire à Albi. En 1974, monsieur Fournials achète le château. Un locataire y installa un restaurant qui fit faillite en 1977.  En 1978, lassociation Béthanie lacheta avec ce qui reste de la propriété, environ six hectares. En 1979, un centre de vacances pour enfants y est installé. C'est le début de la rénovation du château. En 1982, une maison de retraite ouvre ses portes à la place du centre de vacances. La capacité d'accueil est augmentée avec la construction de six pavillons annexes. En 2004, la maison de retraite est déplacée sur la commune de Sérénac. En 2006, la SCI , la châtelaine Moune et son fils acquiert le domaine, qui est placé, quelque temps après, sous le contrôle d'un mandataire judiciaire et ce, jusqu'en 2013. Laissé à l'abandon, le château fut pillé et vandalisé à plusieurs reprises. En janvier 2014, la famille  Debah acquiert le domaine. D'importants travaux de rénovation sont en cours.","architecture":"Gautherie, construit au XVIe siècle, est remanié au cours des siècles, mais remontant pour l'essentiel au XVIIe siècle,  le château de la Gautherie est un édifice quadrangulaire flanqué de deux ailes perpendiculaires se terminant par des tours carrées. Les tours présentent une toiture en pavillon en ardoise tandis que le logis est coiffé d'une toiture en croupes, également d'ardoise. L'accès se fait en haut du perron par une belle porte classique. La façade arrière présente une ordonnance plus régulière et le corps de logis est ici flanqué de pavillons sans étage et couronnés de terrasses.   Remanié au cours des siècles, mais remontant pour l'essentiel au XVIIe siècle.","habitants":"Famille De Berne de Cussac\r\n        \"","divers":"Château de la Gautherie","gps":"","images":["../../jctruffet.com/image/image_81/81_Gautherie_1.jpg","../../jctruffet.com/image/image_81/81_Gautherie_2.jpg","../../jctruffet.com/image/image_81/81_Gautherie_3.jpg"]},"Consult_chateau_formulairea79a":{"id":"Consult_chateau_formulairea79a","dept":"81","canton":"Valence d","commune":"Cadix","nom":"Gaycre","type":"Manoir","periode":"XVIII","histoire":"GAYCRE, vers 1300, Guillaume-Raymond de Rocadel, coseigneur de Trébas, était seigneur de Larroque et Gaycre. Les biens des d'Armagnac furent confisqués par le roi, et de Rocadel vendit les seigneuries de Trébas et de Gaycre à un certain Jean-Louis d'Ax.","architecture":"Juché sur une butte le château de Gaycre domine la vallée du Tarn, le château est une construction de schiste présentant une singularité dans le jeu de volumes de sa toiture: le toit du donjon est cantonné de petits combles en pavillon à la pente marquée et amortis par des épis de faîtage. Il se compose d'un logis rectangulaire dont le pignon vient d'un côté s'appuyer contre une tour carrée ayant certainement fait office de donjon, l'autre extrémité est flanquée sur une de ses façades d'un corps de bâtiment. Malgré son allure atypique lui donnant la physionomie d'un château de montagne et son air fort ancien, Gaycre a dû être remanié au XVIIIe siècle. Il conserve un beau décor intérieur constitué par de superbes cheminées et des plafonds à la française.","habitants":"Famille de Guillaume-Raymond de Rocadel\r\n        \"","divers":"Le manoir de Gaycre à Cadix","gps":"","images":["../../jctruffet.com/image/image_81/81_Gaycre_1.jpg"]},"Consult_chateau_formulaire2298":{"id":"Consult_chateau_formulaire2298","dept":"81","canton":"Saint-Sulpice la Pointe","commune":"Giroussens","nom":"Giroussens","type":"Château","periode":"XVII","histoire":"Quatre châteaux à Giroussens,  celui de Belbéze du XVIIe siècle, de Cathalo du XIXe siècle, de Montel, de  Saint-Sulpice et de Bourdoncles                                                                                GIROUSSENS, le château originel, le Pech Mascou est construit au XIIIe siècle. En 1437, le château était une prison royale mais il est incendié par les protestants en 1562.\r\nBELBEZE, est construit en 1640 par Jean Flotes, grand maître des eaux et forêts à Toulouse. Il est cédé à Jean Dalbi en 1660, avocat en parlement. À la Révolution, vendu comme bien national.  Pendant le Moyen-Age, la population se déplace dans un castrum sur la falaise à 80 m de hauteur. Il est mentionné à partir de 1156. Plus au nord, un château, le Pech Mascou, est construit sur les bords de l'Agout au XIIIe siècle. Le seigneur Amalric de Lautrec érige Giroussens en bastide. Dès lors une ville se développe et prospère à l'abri de remparts. L'église Saint-Salvy est reconstruite à la fin du XIVe siècle. Entre 1330 et 1356, Gui de Comminges, seigneur de la basse terre d'Albigeois, réside à Giroussens. Il est le chef d'une bande de brigands et vit de vols et pillages de la région. En 1381, le comte de Foix-Béarn, Gaston Fébus va vaincre ces pillards dans la plaine d'Albi. À la mort du comte, Giroussens rentre dans le domaine de Charles VI. Puis la ville passe à Mathieu de Foix-Graillis par Charles VII en 1425. Sous Charles VIII, le domaine retourne à la couronne royale. Mais Louis XIV cède la seigneurie à François de Gélas, vicomte de Lautrec et marquis d'Ambres, en 1695, il restera dans sa descendance jusqu'à la Révolution.                                                                                     Du château de Cathalo, de Montel et du manoir de Saint-Sulpice pas d'information historique.","architecture":"Belbéze; de plan carré avec quatre tours de  trois niveaux couvertes d'un toit en pyramide avec lucarnes sur face avant, le corps de logis à deux niveaux de plan carrée toit en croupes.                                                                                                             Cathalo, corps de logis à deux niveaux et attiques à cinq travées, accès au rez-de-chaussée avec terrasses par  un escalier. Flanqué de deux tours carrées  à trois niveaux,  toit crénelée en terrasses                                                                                   Montels corps de logis de plan carrées à deux niveaux  accès sur  la terrasse par escalier, toiture en croupe avec lucarnes et au centre en façade un chien assis,  l'édifice est flanqué de deux échauguettes ronde sur encorbellement  à toit très pointu.                                                                                                                    Manoir de Saint-Sulpice  de plan rectangulaire à trois niveaux, pavillon d'entrée en saillit pour l'entrée un niveau surmonté d'un autre pavillon d'une travée surmonté d'un balcon et fronton redondant. Les faces de côtés sont terminées  par deux frontons parallèles triangulaires.","habitants":"Gui de Comminges,                                                                                  Famille de François de Gélas\r\n        \"","divers":"Le château de Belbéze, de Cathalo, de Montel, de Saint-Sulpice et de Bourboncles à Giroussens.","gps":"","images":["../../jctruffet.com/image/image_81/81_Giroussens_1.jpg","../../jctruffet.com/image/image_81/81_Giroussens_2.jpg","../../jctruffet.com/image/image_81/81_Giroussens_3.jpg","../../jctruffet.com/image/image_81/81_Giroussens_4.jpg","../../jctruffet.com/image/image_81/81_Giroussens_5.jpg","../../jctruffet.com/image/image_81/81_Giroussens_6.jpg"]},"Consult_chateau_formulaire6d75-2":{"id":"Consult_chateau_formulaire6d75-2","dept":"81","canton":"Albi","commune":"Albi","nom":"Go_Lapérouse","type":"Château","periode":"XVI","histoire":"Deux châteaux à Albi de la famille de Lapérouse,  Go du XVIe siècle et Lapérouse du XVIIe siècle.                                                       GO en 1339, appartenait à l'évêque d'Albi, Pictavin. Au siècle suivant, à Louis 1er d'Amboise, puis passe à son neveu, à Louis II d'Amboise, et en 1613 à Claude de Galaup, ancêtre du navigateur Galaup de Lapérouse ou naquit  Jean-François de Galaup, le 23 août 1741 et grandit dans la maison paternelle.  Il est le fils de Victor-Joseph de Galaup et de Marguerite de Rességuier.  Les héritiers de cette famille sont toujours propriétaires,  Il utilise ses émoluments d'officier de Marine pour racheter la totalité de la presqu'île du Gô qu'il lègue à ses surs.  La famille de Galaup est noble depuis le milieu du XVIe siècle. Elle sest enrichie et a été anoblie à la période faste de la culture et de la commercialisation du pastel. Le père de Lapérouse, Victor-Joseph de Galaup, était lui-même consul.   Le promis étant le navigateur Jean-François Galaup de Lapérouse. Ils étaient conviés au château du Gô, par l'association Lapérouse Albi, dont la vice-présidente, Marie-Christine Pestel,  le château voisin du Gô, maison natale de Jean-François Galaup de Lapérouse, reste dans le patrimoine familial des Pestel, descendants d'une branche collatérale du célèbre navigateur.                                                                               LAPEROUSE, le principal pouvoir administratif et spirituel est celui de lArchevêque qui est, jusquen 1747, pendant l enfance de Lapérouse, Monseigneur de Castries. Ce dernier avait accueilli à Albi son neveu, orphelin très jeune, qui deviendra ministre de la marine et des colonies. Sa sur Jacquette a épousé un Dalmas. Les Dalmas  sétablirent dans lAveyron, puis se dispersèrent en France et même aux États-Unis. Sa jeune sur Victoire a épousé Bernard-Louis de Barthès, dont les enfants restèrent pour lessentiel dans le Languedoc. Lune de ses descendantes possèdent actuellement le château du Gô, maison natale du marin. La statue monumentale en bronze au centre ville date de 1853. Depuis 1988 le musée Lapérouse sur la rive droite du Tarn, dans un très joli cadre intérieur et extérieur, permet de présenter en permanence des souvenirs de lexplorateur ainsi que de nombreux vestiges recueillis à Vanikoro.","architecture":"Le Gô, le hameau est propriété de l'évêque d'Albi. Une des habitations est fortifiée au moment des guerres de Religion. Petit château de style Renaissance en briques, s'organise autour d'une cour intérieure bâtie au XVIIe siècle. Un escalier en bois en est le dernier vestige.  Go  s'organise autour d'une cour en U, fermée sur le quatrième côté par un mur bas percé d'une porte cochère. L'édifice qui nous est parvenu en grande partie dans son état d'origine conserve des portes à accolade d'un style tardif et des meneaux très simples. L'ensemble du bâtiment a été traité dans le style rustique et de bon aloi qui sied à une \"maison des champs\". La cour étant orientée au nord la partie la plus ancienne est l'aile sud avec l'escalier à vis, l'aile Est datant bien du XVIIe siècle, et l'aile ouest aurait été refaite au XIXe siècle pour conserver ce plan régulier.","habitants":"Famille de  Victor-Joseph de Galaup et de Jean-François Galaup de Lapérouse,\r\n        \r\n        \"","divers":"Château de Go et de Lapérouse à Albi.","gps":"","images":["../../jctruffet.com/image/image_81/81_Go_Laperouse_1.jpg","../../jctruffet.com/image/image_81/81_Go_Laperouse_2.jpg","../../jctruffet.com/image/image_81/81_Go_Laperouse_3.jpg","../../jctruffet.com/image/image_81/81_Go_Laperouse_4.jpg","../../jctruffet.com/image/image_81/81_Go_Laperouse_5.jpg"]},"Consult_chateau_formulaire2d15-2":{"id":"Consult_chateau_formulaire2d15-2","dept":"81","canton":"Réalmont","commune":"Teillet","nom":"Grandval","type":"Vestiges","periode":"XIV","histoire":"Trois châteaux à Teillet dont celui de Grandval, de Lalgarie et de Plégades.                                                                                             GRANDVAL  de 1425 à 1450 Bernard de Caudières seigneur de Bécazoul. En 1556 Sébastien de Caudières seigneur de Grandval. En 1587 Antoine de Roquefeuil, baron de Grandval. 1706 Antoine de Fréjeville et Isabeau de Bernard de Caudières. En 1722 Jean Bernard. En 1746 Henri Jean Nicolas, puis  Gau de Fréjeville. En 1810  Charles de Fréjeville général d'empire. En 1837 Hyppolyte de Charamol baron. En 1846 Jean baptiste de Solignac baron. En 1900 au comte de Montfa  Raymond de Toulouse Lautrec.  Il a été édifié au XVe siècle à la demande des vicomtes de Paulin par Bernard de Caudières, seigneur de Bézacoul, et a été restauré sous le Premier Empire par le général de Fréjeville.   Henri de Frégeville, marquis de Grandval, de 1748 à 1805, général de division et législateur, plusieurs illustres personnages y ont demeuré jusqu'au XX e siècle.  Charles de Frégeville, de 1762 à 1841, militaire et homme politique français du premier Empire, général de division et grand officier de la Légion d'honneur. En juin 1944, un groupe de résistants s'y installe. Le matin du 21 juin 1944, les allemands menés par le lieutenant Fritcher incendient le château.","architecture":"Grandval;  construit au milieu du XVe siècle à la demande des vicomtes de Paulin, puis reconstruit au XVIIIe siècle par Jean Bernard,  les plus anciennes traces de l'existence de ce château remonterait en l'an 1478. Le château qui avant la deuxième guerre mondiale était une magnifique résidence soigneusement meublée, fut ensuite une cachette pour la FFI durant la guerre. Il fut ensuite incendié par les allemands durant une opération contre le maquis. Toute la décoration intérieure et les toitures furent détruites. Laissé ensuite à l'abandon le château fut lamentablement pillé puis engloutit par la construction du barrage de Razisse. Aujourd'hui le château présente des ruines plus ou moins apparentes selon la saison,  Incendié en juin 1944 par les allemands, le château fut ensuite noyé par les eaux du barrage en 1954 ou 1956.","habitants":"Famille de  Henri de Frégeville\r\n        \"","divers":"Vestiges du château de Grandval et le château de Lalgarie et  de Plégades à Teillet","gps":"","images":["../../jctruffet.com/image/image_81/81_Grandval_1.jpg","../../jctruffet.com/image/image_81/81_Grandval_2.jpg","../../jctruffet.com/image/image_81/81_Grandval_3.jpg","../../jctruffet.com/image/image_81/81_Grandval_4.jpg","../../jctruffet.com/image/image_81/81_Grandval_5.jpg","../../jctruffet.com/image/image_81/81_Grandval_6.jpg","../../jctruffet.com/image/image_81/81_Grandval_7.jpg","../../jctruffet.com/image/image_81/81_Grandval_8.jpg"]},"Consult_chateau_formulaire4785":{"id":"Consult_chateau_formulaire4785","dept":"81","canton":"Carmaux","commune":"Penne","nom":"Granier","type":"Manoir","periode":"XV","histoire":"GRANIER  manoir à Penne, étant donné sa situation,  a dut être mêlé aux tourments de la seigneurie de Penne dont sa terre dépendait. Les premiers seigneurs de Penne furent d'abord au début du XIIe siècle les vassaux des vicomtes de Béziers,  avant de se ranger, au milieu du même siècle,  sous la bannière des comtes de Toulouse. De 1143 à 1202,  les noms des différents seigneurs sont conservés dans le cartulaire de la commanderie de Vaour. En  1229, par le traité de Paris, Raymond VII de Toulouse livra Penne au roi de France. De 1334 à 1351, les environs eurent à subir plusieurs assauts aussi bien des routiers que des anglais, une époque plus récente, quand Penne fut livré aux protestants en 1568; l'armée de Philippe de Rabastens attaqua Penne la catholique et la saccagea. Il y a fort à parier   que le manoir n'échappa pas à cette flambée de violence.","architecture":"Aujourd'hui le manoir de Granier date d'une époque plus récente, mais sa tour et une partie des vieux murs connurent  les guerres de religion. Ayant vu sa tour découronnée  au  moment de la Révolution, Granier n'est pas sans rappeler le charme rustique du manoir proche de Périlhac. De plan en L à deux niveaux et attiques  flanquait d'une tour ronde à toit en terrasse.","habitants":"Seigneurie de Penne\r\n        \"","divers":"Le manoir de Granier à Penne","gps":"","images":["../../jctruffet.com/image/image_81/81_Granier_1.jpg","../../jctruffet.com/image/image_81/81_Granier_2.jpg","../../jctruffet.com/image/image_81/81_Granier_3.jpg"]},"Consult_chateau_formulairef51b":{"id":"Consult_chateau_formulairef51b","dept":"81","canton":"Graulhet","commune":"Graulhet","nom":"Graulhet","type":"Château","periode":"XV-XIX","histoire":"Plusieurs châteaux à Graulhet, de Lézignac du XVIIIe  siècle, de Crins du XIXe siècle et de la Bousquetarie du XIXe siècle.                                                         LEZIGNAC, petite place-forte, le village s'est construit sur un éperon rocheux surplombant le Dadou autour d'un château féodal aujourd'hui disparu. En 1166 la seigneurie de Graulhet passe entre les mains des puissants comtes de Toulouse. Un nouveau château de Lézignac fut construit qui fut la demeure d'été des abbés de candeil  en 1774 et fut vendu à la  Révolution à Maury de Graulhet.\r\nCRINS,  Crins appartient aux seigneurs de Graulhet avant de passer aux comtes d'Aubijoux dont il devint la maison de campagne. Les d'Amboise d'Aubijoux devinrent seigneurs de Graulhet au XV e siècle, date à laquelle l'évêque Louis 1er d'Amboise avait marié son frère Hugues à Madeleine d'Armagnac.   Molière semble pouvoir être attaché à Crins grâce à la personne de François d'Amboise Aubijoux, entré dans l'histoire à la suite de la défaite de Castelnaudary en 1632. En effet sous la protection de Gaston d'Orléans, la noblesse du Languedoc ne tarda pas à tenir le haut du pavé du Marais et c'est dans ces salons parisiens que Molière put rencontrer d'Aubijoux.          BOUSQUETARIE pas d'information historique.","architecture":"Graulhet dit le moulin de la ville, corps de logis rectangulaire au bord  du Verdassou, de quatre étages toit à deux pans flanqué  au sud de deux tourelles à niveaux du toit, toitures style asiatique.              Lézignac; corps de logis rectangulaire à huit travées à deux niveaux sur soubassement  toit brisé en croupe, flanqué   d'un donjon carré sur un angle à toit pointu quatre pans dépassant l'ensemble et   à l'opposé pavillon carré  base du deuxième donjon  toit en terrasse accolé à ce dernier un petit pavillon d'un étage à toit en tuiles à deux pans, sur ce côté de la façade plein cintre une échauguettes en encorbellement à toit pointu.                                         Crins; la façade principale que l'on peut admirer aujourd'hui ouvrait sur un parc désormais disparu. Outre sa chapelle, de belles salles, un escalier à vis et les armes des d'Aubijoux, le château a conservé du côté du Dadou, ses caves voûtées qui supportent une terrasse. Bien qu'il présente beaucoup d'allure avec sa façade en pierre sculptée, le château de Crins a été remanié au XIXe siècle et l'on serait bien en peine de retrouver en s'y promenant les fantômes du grand siècle. Lézignac;  Le château et son moulin aux structures du XIIe siècle embellies par un riche marchand pastelier est un modèle de la Renaissance languedocienne. La demeure fut remaniée aux XVe, XVIe et XVIIIe siècles, il est un témoin de l'époque prospère de la culture du pastel dans la région.       Bousquetarié, manoir à deux niveaux en L avec pavillon carrée sur angle intérieur,  modifié au cours des ans, je pense par un incendie qui explique la disparition du toit.","habitants":"Seigneurie de Penne et famille de François d'Amboise Aubijoux\r\n        \r\n        \r\n        \"","divers":"le château de de Lézignac, de Crins et de la Bousquetarié à Graulhet.","gps":"","images":["../../jctruffet.com/image/image_81/81_Graulhet_1.jpg","../../jctruffet.com/image/image_81/81_Graulhet_2.jpg","../../jctruffet.com/image/image_81/81_Graulhet_3.jpg","../../jctruffet.com/image/image_81/81_Graulhet_4.jpg","../../jctruffet.com/image/image_81/81_Graulhet_5.jpg","../../jctruffet.com/image/image_81/81_Graulhet_6.jpg","../../jctruffet.com/image/image_81/81_Graulhet_7.jpg","../../jctruffet.com/image/image_81/81_Graulhet_8.jpg"]},"Consult_chateau_formulaire36bf":{"id":"Consult_chateau_formulaire36bf","dept":"81","canton":"Puylaurens","commune":"Lescout","nom":"Gua_Lescout","type":"Chartreuse","periode":"XVII","histoire":"GUA, au XIIe siècle Arnaud, sire du Gua, était vassal des puissants Trencavel, mais l'absence de tout document ne permet pas de retrouver mention du Gua avant le XVe siècle  seulement qu'il appartenait à la famille du Puy qui ces derniers Arnaud du Puy entra par alliance dans le château de Montpeyraux et sa descendance restera jusqu'au XIXe siècle. En 1728, l'héritière Marie-Thérése de Ménard-Villemur est son époux Timoléon de Bonnemain, conseiller au parlement de Toulouse, fit bâtir une maison de campagne en accord avec la vie aimable du siècle des lumières. Trois ans après le début des travaux, le château était reconstruit. Le fils de Timoléon de Bonnemain hérita de la demeure, la Révolution venue, le château survécut à la tourmente mais en 1860, la famille Pistre de Bonnemain dut vendre la propriété à Félix Carrade, ancêtres des propriétaires actuels. Le premier document décrivant le château donne une description complète des bâtiments parvenus jusqu'à nous pratiquement intacts ; construit en brique et en moellons de grès et de style Louis XIII, Le Gua est un charmant exemple de ces aimables maisons des champs telles que les aimait l'ancienne France.","architecture":"GUA; le château est pris en 1574 par les protestants. Pillé et brûlé, il ne retrouve son lustre qu'après 1645 et les travaux qui sont menés.  L'architecte Isaac Rouch était un adjoint de Pierre-Paul Riquet, constructeur du Canal du Midi. En 1728, une reconstruction est en discontinuité puisque l'actuel château ne reprend pas l'ancien édifice, mais est construit à côté avec une partie des matériaux de réemploi. Ce château-là est celui que l'on peut voir actuellement sans modification majeure.  Le château est construit en brique foraine et grès ; il forme un quadrilatère d'architecture classique enfermant une cour. Le logis principal avec rez-de-chaussée surélevé accès, par un escalier du perron, le grenier sous comble éclairé par des occulis, toit en croupes, six grandes fenêtres rectangulaires  et porte d'entrée sommée d'un fronton, ressemble à une chartreuse de plein pied, flanqué de deux ailes plus basses, de part et d'autre de la cour. Un logis est flanqué de deux ailes de communs plus basses en retour. Si l'extérieur est d'un grand classicisme, l'intérieur reflète cet état d'esprit et une série de belles pièces en enfilade fait de cette demeure un magnifique exemple d'équilibre. Le quatrième côté est clos d'un mur bas surmonté d'une grille et s'ouvre sur la route grâce à un portail.","habitants":"Timoléon de Bonnemain\r\n        \"","divers":"Château du Gua à Lescout","gps":"","images":["../../jctruffet.com/image/image_81/81_Gua_Lescout_1.jpg","../../jctruffet.com/image/image_81/81_Gua_Lescout_2.jpg"]},"Consult_chateau_formulaire7523":{"id":"Consult_chateau_formulaire7523","dept":"81","canton":"Sémalens","commune":"Guitalens d","nom":"Guitalens","type":"Château","periode":"XII-XIX","histoire":"Trois châteaux à Guitalens celui de Guitalens dit château Haut du XVIIe siècle, château Bas et celui de Lalbarède du XIXe siècle.                                                                                                               GUITALENS, un château primitif fut construit au XIIe siècle pour garder le gué qui donna son nom au lieu: Gué du Talion. Le château appartient  aux Dupuy, aux Bérails, aux Voisins. En 1586, il fut pris par les huguenots. A partir de 1761 le château passe à la famille de Taffanel de La Jonquière. Après les temps troublés de la Révolution durant lesquels le château avait été vendu comme bien d'émigré, il fut racheté sous l'Empire par Clément-Joseph de La Jonquière. Il échut en 1881 au vicomte Albert de La Jonquière, qui fit démolir le château ancien, devenu pas trop vétuste, et reconstruire une demeure au goût du jour par un élève de Viollet-le-Duc, Florent. D'une grande homogénéité dans son aspect, de style néogothique. Château Bas utilisé pour différents commerces et sci.                                  LALBAREDE, pas d'information historique.","architecture":"Le Château-Haut a été remanié au XVIIe siècle et a fait l'objet de restauration cinq siècles plus tard. A la fin du XIXe siècle, l'édifice a été entièrement reconstruit dans un style néogothique lors de travaux supervisés par un élève de Viollet le Duc. Les douves, le portail daté du XVIIe siècle ainsi que le pigeonnier du château lui valent d'être inscrit en 1991 aux monuments historiques. D'une grande homogénéité dans son aspect, de style néogothique, est juché sur une terrasse surplombant l'Agout à l'est. Les trois autres flancs sont entourés de douves et les murs sont rythmés par des piliers à boules du XVIIe siècle. Deux ponts enjambent ces douves et permettent d'accéder aux cours du château. Le plan en L, corps de logis à trois niveaux avec tour donjon a quatre niveaux et tour d'escalier en angle intérieur  servant de porte d'entrée crénelée avec toit à quatre pans, l'aile comporte deux échauguettes doublé en encorbellement l'ensemble crénelées tours rondes à l'arrière, une cour intérieure orientée au sud, qui se prolonge par un parterre de buis à la Française. Le parc à l'anglaise se développe à l'ouest et au midi et conserve un beau pigeonnier de type castrais.                                 Lalbarède est situé en face du  château de Guitalens, de l'autre côté de l'Agout. La demeure se présente sous la forme d'un logis bas, flanqué de deux ailes plus élevées, construit certainement aux alentours de 1850, mais conservant encore dans son extrême sobriété beaucoup des inflexions de l'architecture néo-classique. Les longues façades sont simplement soulignées par des bandeaux. Une galerie coiffe le sommet du logis, masquant la toiture, afin d'accentuer la froideur néo-classique du château, ressemblant plus à une villa de Crimée qu'aux rustiques châteaux du Tarn.","habitants":"Famille de Taffanel de La Jonquière\r\n        \"","divers":"Le château de l'Albaréde dit du bas, et celui du Haut, de Guitalens dit  de Jonquières","gps":"","images":["../../jctruffet.com/image/image_81/81_Guitalens_1.jpg","../../jctruffet.com/image/image_81/81_Guitalens_2.jpg","../../jctruffet.com/image/image_81/81_Guitalens_3.jpg","../../jctruffet.com/image/image_81/81_Guitalens_4.jpg","../../jctruffet.com/image/image_81/81_Guitalens_5.jpg","../../jctruffet.com/image/image_81/81_Guitalens_6.jpg","../../jctruffet.com/image/image_81/81_Guitalens_7.jpg","../../jctruffet.com/image/image_81/81_Guitalens_8.jpg","../../jctruffet.com/image/image_81/81_Guitalens_9.jpg"]},"Consult_chateau_formulairedd7d":{"id":"Consult_chateau_formulairedd7d","dept":"81","canton":"Labruguière","commune":"Labruguière","nom":"Hauterive_Tarn","type":"Château","periode":"XIII","histoire":"HAUTERIVE, fief inféodé au XIIIe siècle par Philippe de Montfort, comte de Castres pour la famille Hautpoul, puis passa par alliance en 1586 à la fille de Sébastien de Hautpoul avec Louis de Cayres  seigneurs d'Entraigues, deviendra baron d'Hauterive. Le domaine passera ensuite aux Calvière, aux Clermont-Lodève, puis aux Valady. Au XVIIIe siècle le marquis de Valady  le cède à  Jean-Joseph-Marie de Villeneuve, capitaine au régiment de Bourbon et gardera le domaine avec sa famille et ses cinq enfants jusqu'à la Révolution, malgré sa présidence en 1788 à l'assemblée de la noblesse de Saint-Pons sera incarcéré et mourra en 1800. le domaine est restitué à ses enfants.","architecture":"Hauterive,  ancienne forteresse médiévale du XIIIe siècle, remaniée au XVI-XVIIe siècles, entourée de douves présente de belles façades. Possédait initialement  quatre corps de logis trois subsistent  à deux niveaux avec série d'occulus flanqué de tours carrées et rondes massives sur l'extérieur.","habitants":"Marquis  Jean-Joseph-Marie de Villeneuve\r\n        \"","divers":"Château d'Hauterive à Labruguière","gps":"","images":["../../jctruffet.com/image/image_81/81_Hauterive_Tarn_1.jpg","../../jctruffet.com/image/image_81/81_Hauterive_Tarn_2.jpg","../../jctruffet.com/image/image_81/81_Hauterive_Tarn_3.jpg","../../jctruffet.com/image/image_81/81_Hauterive_Tarn_4.jpg"]},"Consult_chateau_formulaire8642":{"id":"Consult_chateau_formulaire8642","dept":"81","canton":"Sémalens","commune":"Jonquières","nom":"Jonquières_Tarn","type":"Château","periode":"XIII-XIX","histoire":"Plusieurs châteaux à Jonquières dont celui de Jonquières, de Braconnac XII-XIXe siècle, de Castelpers , de la Barthie, de Dumes et de Lacan.                                                           JONQUIERES,  un château très ancien s'élevait jadis à l'emplacement de l'actuel château et fut une première fois reconstruit en 1670, avant de céder la place en 1900 au château actuel, bâti pour la famille de Taffanel de La Jonquières, qui posséda dans la région de nombreux châteaux. Le toponyme existe déjà à la fin du XVIIIe siècle : une paroisse avec château est représentée au lieu-dit \"Jonquières\" . Il appartenait au général comte Henri Félix de Pélissier. Celui-ci a presque totalement disparu avec la construction du château actuel au tout début du XX e siècle par le comte de Pélissier, avec le concours de M. Florent, architecte à Carcassonne, qui a aussi construit le château du vicomte de La Jonquières à Guitalens.                                   BRACONNAC, le château primitif aurait été construit au XIIe siècle. Braconnac semble avoir traversé la croisade des Albigeois sans grand dommage, tout comme la guerre de Cent Ans. En 1470 la seigneurie appartenait à Fortanier d'Aure, gouverneur de la vicomté de Lautrec pour Jean de Foix, qui l'autorisa, en 1620, à fortifier son château. En 1635, Jeanne d'Aure épousa Guérin de Foucaud, appartenant à une branches cadettes des Foucaud, sous le nom de Foucaud d'Alzon, sénéchal de la ville et du comté de Castres. La propriété demeura dans cette famille jusqu'à la Révolution. En 1942, le château devient une colonie de vacances, pour devenir une maison pour handicapés.\r\nDUMES Le toponyme existe déjà à la fin du XVIIIe siècle : une demeure est construite au lieu-dit \"Adeume\". D'après les états de section de 1828, le propriétaire était Marius Devoisins-Lavernière, maire de Lavaur et conseiller général du Tarn. Il possédait à ce moment là de nombreuses terres dans la boucle de l'Agout : le domaine d'En Dumes et les métairies de Séga, Fieuzet, Fontorbe et Pernaviale. Le château a été reconstruit dès les années 1820.                                                                                                                          Castelpers; la Barthie  et Lacan pas d'information historique.","architecture":"La Barthie, corps de logis rectangulaire à deux niveaux flanqué sur les extrémités de la façade de tour carrée à toit presque plats avec occulus au niveau du toit.                                                                        Castelpers  de plan carré à deux niveaux toits en croupe et en tuiles chien assis sur façade d'entrée flanqués de tours carrées en angles avec toit à quatre pans dont une à toit réduit.                                               Lacan de plan quadrangulaire flanqué de pavillon en angles de différentes travées, le corps central  à trois travées et à deux étages.                                                                                                                   Jonquières, l'édifice semble plus proche de l'ambiance des romans de Walter Scott que de la paisible vie que menaient jadis les hobereaux de la campagne tarnaise. Outre l'appareil de pierre rien n'a été négligé pour donner à ce château l'aspect d'une forteresse, même si, paradoxalement, ses façades sont entièrement percées de rangées de hautes fenêtres. On retrouve au couronnement une rangée de puissants créneaux supportés par des mâchicoulis et percés d'archères. Tours rondes, carrées, échauguettes à toiture en poivrière: rien n'a été ménagé afin de donner à cette maison l'apparence d'une demeure médiévale. Comme pour mieux théâtraliser ce morceau d'architecture encore néo-gothique, c'est par un haut escalier que l'on accède à la porte d'entrée. Recouvert de végétation, la Jonquières donne à s'y méprendre l'impression d'un manoir écossais qui aurait été transporté comme par magie dans nos campagnes.","habitants":"Famille de Guérin de Foucaud\r\n        \r\n        \"","divers":"Plusieurs châteaux à Jonquières dont celui de Jonquières, de Braconnac, de Castelpers, de la Barthie, de Dumes et de Lacan.","gps":"","images":["../../jctruffet.com/image/image_81/81_Jonquieres_Tarn_1.jpg","../../jctruffet.com/image/image_81/81_Jonquieres_Tarn_2.jpg","../../jctruffet.com/image/image_81/81_Jonquieres_Tarn_3.jpg","../../jctruffet.com/image/image_81/81_Jonquieres_Tarn_4.jpg","../../jctruffet.com/image/image_81/81_Jonquieres_Tarn_5.jpg","../../jctruffet.com/image/image_81/81_Jonquieres_Tarn_6.jpg","../../jctruffet.com/image/image_81/81_Jonquieres_Tarn_7.jpg","../../jctruffet.com/image/image_81/81_Jonquieres_Tarn_8.jpg","../../jctruffet.com/image/image_81/81_Jonquieres_Tarn_9.jpg"]},"Consult_chateau_formulaireed9b":{"id":"Consult_chateau_formulaireed9b","dept":"81","canton":"Carmaux","commune":"Labarthe-Bleys","nom":"Labarthe","type":"Maison forte","periode":"XIII","histoire":"LABARTHE, la famille d'Albière, dont les membres sont dits seigneurs de Vieux et de Labarthe, apparaît dans le cartulaire de la commanderie de Vaour. Au XVIIe siècle le château passa dans la famille de La Prune et des aménagements furent effectués, notamment la grande salle du premier étage avec son plafond à la Française, la cheminée monumentale de stuc et les fenêtres à meneaux de la façade Est. La famille La Prune y demeurera jusqu'en 1810. M. et Mme Pierre Chatelus de Vialar l'ont achetés en 1991 pour lui rendre toute sa beauté.","architecture":"Labarthe était à l'origine une forteresse du XIIIe siècle conçue sous la forme d'un donjon quadrangulaire qui à l'époque, devait être plus élevé et correspondre en hauteur à la tour contenant l'escalier à vis. De cette époque restent encore l'escalier à vis de la tour et les portes ogivales intérieures remises en valeur par des travaux de restauration. Si le château continua d'être entretenu pendant le XVIIIe siècle, la transformation en ferme au siècle suivant eut la conséquence de dégrader un édifice conçu pour être noblement habité.","habitants":"Famille de La Prune\r\n        \r\n        \"","divers":"La maison forte de Labarthe à Labarthe-Bley.","gps":"","images":["../../jctruffet.com/image/image_81/81_Labarthe_1.jpg","../../jctruffet.com/image/image_81/81_Labarthe_2.jpg","../../jctruffet.com/image/image_81/81_Labarthe_3.jpg"]},"Consult_chateau_formulairec9f8":{"id":"Consult_chateau_formulairec9f8","dept":"81","canton":"Lagrave","commune":"Labastide de Levis","nom":"Labastide_Levis","type":"château","periode":"XVIII","histoire":"LABASTIDE, château viticole, de Bournet de la tour de Plantade  de France et Jaffar Netanj, à Labastide de Levis,  Pas d'information historique.","architecture":"Chateaux de La
