const FULL={"Consult_chateau_formulaire2a57":{"id":"Consult_chateau_formulaire2a57","dept":"81","canton":"Lavaur","commune":"Aguts","nom":"Aguts","type":"Forteresse","periode":"XV","histoire":"AGUTS, la seigneurie  appartenait à la maison Rigaud de Vaudreuil au XVIe siècle. En 1554 François de Rigaud dénombra le château dAguts avec justice haute, moyenne et basse, une albergue de 30 sols sur la communauté du lieu. Rigaud de Vaudreuil mourut sans héritiers ainsi que ses frères Jacques et Giscard ce qui entraîna laliénation de la seigneurie dAguts en faveur de Marc Antoine dAvessens, seigneur de Saint Rome au XVIIe siècle. Cette famille conserva la seigneurie dAguts jusquen 1789. Les seigneurs de Montgey conservèrent une petite partie d'Aguts. En 1713, la seigneurie fut partagé entre Jean Julien de Lauzil et Antoine de Rivenc. Marie de Juin fille de Jeanne Marie de Rivenc laissa sa part peu avant la Révolution à Noble de Perredon. En 1789, Noble de Perredon avait Aguts et Mouzens, le château et lentière juridiction haute, moyenne et basse sur ses terres dénombrées au début par Antoinette Dupuy. En 1793 le château est mis sous séquestre et restitué en 1800 à la famille d'Avessens.","architecture":"Forteresse médiévale, elle fût transformée en un château aménagé au XVIIIe siècle : douves, beau porche d'entrée, magnifiques terrasses. L'occupation du site est ancienne sur le sommet de ce monticule dominant la plaine de Revel, mais sa situation un peu à l'écart des routes principales lui permet d'échapper aux conflits que sont la croisade des Albigeois ou la guerre de cent ans. Occupé plusieurs années par les protestants, il est incendié durant les guerres de religion. Les aménagements visant à privilégier le confort au détriment de l'aspect défensif ont conduit à créer une promenade entre château et douves dotées de balustrades. De son ancien rôle de fortification,un ensemble de corps de bâtiments formant un quadrilatère doté de tours aux angles et les douves maçonnées et des soubassement en pierre dont la taille est différente. Un pont de pierre franchit ce fossé, ayant remplacé l'ancien pont levis. L'entrée se fait par un porche encadré de pilastres et surmonté d'un fronton en arc de cercle. Un couloir voûté percé de meurtrières conduit à la cour centrale. Cette cour est cernée de bâtiments qui s'ouvraient autrefois vers l'intérieur. Les façades de quarante mètres de côté sont jointes par quatre tours carrées qui dépassent à peine de la perspective, que ce soit en épaisseur ou en hauteur. La porte d'entrée dans la cour donne sur un escalier hélicoïdal qui conduit à l'unique étage.","habitants":"Famille de François de Rigaud\r\n        \r\n        \r\n        \"","divers":"Château d'Aguts","gps":"","images":["../../jctruffet.com/image/image_81/81_Aguts_1.jpg","../../jctruffet.com/image/image_81/81_Aguts_2.jpg","../../jctruffet.com/image/image_81/81_Aguts_3.jpg","../../jctruffet.com/image/image_81/81_Aguts_4.jpg","../../jctruffet.com/image/image_81/81_Aguts_5.jpg","../../jctruffet.com/image/image_81/81_Aguts_6.jpg"]},"Consult_chateau_formulairefbaf":{"id":"Consult_chateau_formulairefbaf","dept":"81","canton":"Mazamet","commune":"Aiguefonde","nom":"Aiguefonde_Tarn","type":"Château","periode":"XVII","histoire":"AIGUEFONDE, au XIIIe siècle le seigneur d'Aiguefonde était Isarn Bonhomme, appartenant à la branche cadette des seigneurs d'Hautpoul. Isarn accorda en 1277 des bois et des terres aux habitants d'Aiguefonde et, en 1295, ces droits furent confirmés par son fils.   Aux alentours de 1615, on trouve en tant que seigneur d'Aiguefonde, Josué Alba, huguenot, marié à une Madaillan. Les enfants de ces derniers vendirent le château en 1622 aux d'Espérandieu. Au XIXe siècle, le dernier seigneur d'Aiguefonde mourut sans enfant et légua le château à son petit-neveu, Charles-Louis-Jacques d'Espérandieu, dernier du nom. Aiguefonde changea plusieurs fois de mains et, en 1919, fut acheté par le vicomte de Taffanel de La Jonquière avant de changer à nouveau plusieurs fois de mains à partir des années quatre-vingt. Un de ces nouveaux propriétaires, laissant le parc à l'abandon, vendit les plus belles cheminées du château. \r\nDes travaux de restauration importants débutèrent avec son nouveau propriétaire, M. de Vilder, ainsi Aiguefonde retrouve peu à peu son faste d'antan.","architecture":"Le château actuel remonte dans ses parties les plus anciennes au XIVe siècle, il présente un plan en U qui remonte à la reconstruction de 1595, avec en fond de cour le corps de logis principal et deux ailes en retour. La façade d'entrée est formée, au centre d'un portique de pierre, constitué de trois arcs en anse de panier reposant sur des piliers. Au nord de l'aile nord-ouest se trouve une grosse tour ronde, L'aile sud-est, beaucoup plus régulière que l'aile opposée, se prolonge au-delà du corps de logis principal jusqu'au petit bâtiment à l'ouest. Du côté de l'entrée l'élévation présente un rez-de-chaussée sur cave semi enterrée et un premier étage surmonté d'un grenier éclairé par des occulis. L'on trouve la même élévation sur l'aile nord-ouest, mais en revanche deux niveaux sur l'aile sud-ouest: l'étage noble, de plain-pied et au-dessus un comble à occulis. L'unité entre toutes les façades est donnée par les occulis et les fenêtres cintrées du XVIIIe siècle, toutes identiques.","habitants":"Famille d'Espérandieu\r\n        \r\n        \"","divers":"Le château d'Aiguefonde","gps":"","images":["../../jctruffet.com/image/image_81/81_Aiguefonde_Tarn_1.jpg","../../jctruffet.com/image/image_81/81_Aiguefonde_Tarn_2.jpg","../../jctruffet.com/image/image_81/81_Aiguefonde_Tarn_3.jpg"]},"Consult_chateau_formulairec50c":{"id":"Consult_chateau_formulairec50c","dept":"81","canton":"Albi","commune":"Albi","nom":"Albi","type":"Château","periode":"XV-XVIII","histoire":"Cinq châteaux à Albi, celui de Cantespeau  du XV-XVII siècle (voir article), celui de Fonlabour du XVIIIe siècle abrite aujourd'hui un lycée, celui de Gô du XVI-XVIIe siècle (voir article),  château de Lasbordes du XVIIIe siècle club housse de golf et manoir de Lasbordes du XVII-XIXe siècle le Bellevue  et le palais de la Berbie (voir article).                                                        FONLABOUR, à partir de son plus ancien bâtiment : le château, qui abrite aujourd'hui le CDI. Les élèves se sont plus particulièrement intéressés à la période de 1948 à 1966, durant laquelle l'Ecole d'enseignement ménager agricole du Tarn a occupé ce bâtiment. Puis, l'école a cédé la place en 1966 au collège et au lycée. Pas d'information historique.                                    LABORDES, en 1563, lors de la première mention concernant le domaine, la terre dénommée alors \"Pruines\" appartenait à un chanoine du chapitre de Sainte-Cécile d'Albi, de la famille toulousaine des Barassy, il légua la propriété à sa sur, dont le fils la légua à ses neveux d'Aussaguel, négociants albigeois. Le château fut bâti à la fin du grand siècle par Raymond d'Aussaguel dans un style noble que rend plus aimable l'emploi de la chaude brique de la région.                                                                   Manoir de Lasbordes, façades et toitures   escalier intérieur avec sa rampe à balustres , ancien grenier, séchoir à pastel., avec deux pigeonniers.   Le bâtiment de la caisse d'épargne néo-renaissance fut inauguré en 1913, c'est l'architecte départemental Léon Daures, natif de Mazamet, qui l'a conçu. Il est imposant et rassurant, construit en brique et pierre blanche.  Les ouvertures et la modénature sont un parfait rappel de la Renaissance. Les frontons, les fenêtres à meneaux, les mansardes sur le toit en ardoise sont typiques et il y a même une balustre en haut du toit.","architecture":"Fonlabour  se présente comme un long bâtiment à un étage surmonté d'un attique et pourvu d'une travée centrale représentant la seule animation de cette façade régulière. Au rez-de-chaussée, cette travée présente, de chaque côté de la porte, un bossage en table et, à l'étage, de fins pilastres surmontés de chapiteaux corinthiens. La fenêtre de cette travée a reçu un fronton en segment de cercle. De même, au niveau de l'attique, un il-de-buf remplace, sur la travée centrale, les fenêtres carrées courant sous le toit. Un fronton couronne le toit, venant interrompre la monotonie de cette longue horizontale. Au XVIIIe siècle la demeure bâtie en brique,   ce beau bâtiment porte les stigmates de mauvais travaux effectués au XIXe siècle, dont le  balcon vaguement néo-gothique du premier étage ainsi que la porte et le lugubre enduit de façade, constituent les principaux éléments. Sur la façade arrière, une grosse tour engagée s'arrêtant à hauteur de la toiture atteste d'une origine du château bien antérieure aux affligeants travaux de la fin du siècle passé.                                                                  Le Gô s'organise autour d'une cour en U, fermée sur le quatrième côté par un mur bas percé d'une porte cochère, son état d'origine conserve des portes à accolade d'un style tardif et des meneaux très simples. L'ensemble du bâtiment a été traité dans le style rustique et de bon aloi qui sied à une \"maison des champs\". La cour étant orientée au nord la partie la plus ancienne est l'aile sud avec l'escalier à vis, l'aile Est datant bien du XVIIe siècle, et l'aile ouest aurait été refaite au XIXe siècle pour conserver ce plan régulier.   Labordes, corps de logis simple dont les salles prennent le jour sur deux façades présentant neuf travées d'ouvertures, il est édifié sur un plan rectangulaire et orné d'un corps central non saillant.  Les fenêtres, encore traitées à meneaux malgré l'époque de la construction, ont été remaniées au XIXe siècle. Le pavillon central coiffé d'un belvédère à fronton semi-circulaire souligné par une corniche, seul élément décoratif de la façade. De belles cheminées anciennes décorent encore l'intérieur du château.","habitants":"Famille de Raymond d'Aussaguel\r\n        \r\n        \"","divers":"Divers châteaux à Albi celui de Fonlabour, de Lasbordes, du Go, de Bellevue, la Berbie et maison renaissance;","gps":"","images":["../../jctruffet.com/image/image_81/81_Albi_1.jpg","../../jctruffet.com/image/image_81/81_Albi_2.jpg","../../jctruffet.com/image/image_81/81_Albi_3.jpg","../../jctruffet.com/image/image_81/81_Albi_4.jpg","../../jctruffet.com/image/image_81/81_Albi_5.jpg","../../jctruffet.com/image/image_81/81_Albi_6.jpg","../../jctruffet.com/image/image_81/81_Albi_7.jpg","../../jctruffet.com/image/image_81/81_Albi_8.jpg"]},"Consult_chateau_formulairebb1a":{"id":"Consult_chateau_formulairebb1a","dept":"81","canton":"Rabastens","commune":"Alos","nom":"Alos_Tarn","type":"Château","periode":"XIV","histoire":"ALOS,  appartenait aux XIIIe et XIVe siècles aux Penne, puis aux Rabastens, vicomtes de Paulin. Cette seigneurie royale était en 1450 à Béringuier, fils de Pierre III d'Aymeric, seigneur d'Alos, c'est probablement par voie d'alliance qu'il parvint à un cadet de la Maison de Tonnac, en 1524. Au début du siècle des lumières, les Bayne de Rouyre héritèrent de la propriété et y restèrent jusqu'au XIXe siècle. C'est par le biais d'une alliance avec une fllle de la maison de Bayne que le domaine passa à la famille de Ligondès et c'est le marquis de Ligondès qui sauva Alos de la ruine.","architecture":"Alos, demeure magnifique avec son appareil de pierre blanche, ses grosses tours et ses rangées de mâchicoulis, ce bâtiment est caractéristique des maisons fortifiées construites au cours du XVe siècle dans la région. Le château est flanqué d'une tour carrée à l'ouest, et d'une autre tour ronde à l'est du bâtiment. Bien qu'Alos ait été remanié aux XVIe et XVIIe siècles, il conserve sur ses façades est et nord une suite de mâchicoulis lui conférant toujours un air martial.","habitants":"Famille de Ligondès\r\n        \r\n        \"","divers":"Château d'Alos","gps":"","images":["../../jctruffet.com/image/image_81/81_Alos_Tarn_1.jpg","../../jctruffet.com/image/image_81/81_Alos_Tarn_2.jpg","../../jctruffet.com/image/image_81/81_Alos_Tarn_3.jpg","../../jctruffet.com/image/image_81/81_Alos_Tarn_4.jpg"]},"Consult_chateau_formulaire7bb3":{"id":"Consult_chateau_formulaire7bb3","dept":"81","canton":"Réalmont","commune":"Ambialet","nom":"Ambialet","type":"Château","periode":"XIV-XIX","histoire":"AMBIALET le Bas : avant la Révolution, c'était le siège de la vicomté ; deux bacs assuraient les communications en direction de Valence et Courris jusqu'à la construction des ponts après 1900. La porte de l'holmière protège le village des crues du Tarn. Un sentier à travers les maisons conduit à l'église Saint-Gilles, édifice gothique incendié en 1568, restauré en 1994-1995 et utilisé comme lieu d'expositions. Au sommet de la presqu'île s'élève le prieuré, un monastère, et son église romane du XIe siècle.\r\nAMBIALET le Haut : siège administratif de la commune dominé par les ruines du château seigneurial « le Castella », auquel on accède par un sentier qui vous conduira ensuite à Saint-Raphaël  d'où l'on peut admirer un panorama exceptionnel. Au XIIe siècle, le site fortifié est possession de Bernard Atton II, vicomte  d'Albi et d'Ambialet et Raymond Béranger, comte de Barcelone. En 1118 Bernard Atton lègue ses biens à son frère Raymond. En 1136, le vicomte  d'Albi et de Béziers Roger de Trencavel accorde une charte aux habitants d'Ambialet.  En 1209, débute la terrible croisade des Albigeois. En 1210, les troupes de Simon de Montfort attaquent et prennent le château. En 1218, le site est rattaché au Royaume de France par Amory de Montfort. En 1229, le château est donné en fief à Philippe de Montfort. En 1388, le site est acheté par Béranger, baron de Castelpers. Au début du XVe siècle, durant la guerre de 100 ans, le château est pris par les Anglais. Entre 1563 et 1568, le château est occupé par les Huguenots durant les guerres de Religion.  En 1762, Ambialet appartient au baron de L'Hormet. Il sera le dernier châtelain. Ambialet a été une des deux vicomtés de l'Albigeois, dont l'origine est le siège d'une viguerie carolingienne. L'autre était la vicomté de Lautrec.  Petit château en partie démoli au milieu du XIXe siècle, il appartenait à un rameau de la famille Del Puech.","architecture":"Cette  fortification n'était pas gigantesque, appelé, le Castella, c'est un ancien château fort qui figure dans les armoiries de la ville mais sa superficie me fait penser qu'il n'était pas qu'un simple  château de garde. Le rocher est dominant de cette ruine, mais les détails sont nombreux prouvant une construction humaine : Par exemple ces marches creusées dans la roche qui nous invitent à monter.\r\nles marches ont disparues et le secret du donjon ne me sera pas révélé.  spectacle magnifique sur le Tarn.\r\nEntièrement ruiné, sa plateforme en hauteur se voit encore à l'entrée de la boucle du Tarn où se trouve le prieuré. Il a existé avant ce château, appelé Châteauneuf dans les anciens documents  dans un traité de paix de 1142, un château vieux qui appartenait aux comtes de Toulouse. Il était le siège de la vicomté.   Petit château en partie démoli au milieu du XIXe siècle, il appartenait à un rameau de la famille Del Puech. La centrale électrique est représenté par un petit manoir du Xxe siècles.","habitants":"Famille Del Puech\r\n        \r\n        \"","divers":"A Ambialet les ruines du Barri , le prieuré le château et la centrale eélectrique.","gps":"","images":["../../jctruffet.com/image/image_81/81_Ambialet_1.jpg","../../jctruffet.com/image/image_81/81_Ambialet_2.jpg","../../jctruffet.com/image/image_81/81_Ambialet_3.jpg","../../jctruffet.com/image/image_81/81_Ambialet_4.jpg","../../jctruffet.com/image/image_81/81_Ambialet_5.jpg","../../jctruffet.com/image/image_81/81_Ambialet_6.jpg","../../jctruffet.com/image/image_81/81_Ambialet_7.jpg"]},"Consult_chateau_formulaire09e8":{"id":"Consult_chateau_formulaire09e8","dept":"81","canton":"Lavaur","commune":"Ambres","nom":"Ambres_Roudezie","type":"Forteresse","periode":"XV","histoire":"le château d'Ambres dit de Roudezie faisait partie des domaines de la puissante vicomté de Lautrec. Les aléas des successions et des procès le firent tomber en 1386 dans les mains du Comte de Foix. Le fougueux Comte de Foix , Gaston Phébus, entreprit de reconstruire le château d'Ambres C'est pourtant au roi de France Charles VI, que ce seigneur despotique, qui avait tué de ses propres mains, dans une crise de colère, son unique fils légitime, fit donation du château.De Brunissende, la dernière des Lautrec, le château passa aux Gélas, dont un des ancêtres avait épousé une descendante de la Hire, compagnon de Jeanne d'Arc. \tLes Gélas, devenus marquis d'Ambres,   L'un deux, François de Gélas, quitta le service de Louis XIV pour ne pas donner du Monseigneur à Louvois. Les deux derniers Gélas d'Ambres, ses fils (Hector-Louis et Daniel-François) eurent la même prestigieuse destinée. Le premier, siégeant aux Etats du Languedoc, reçut en son hôtel toulousain le Duc de Richelieu. Le second, guerroyant de champ de bataille en champ de bataille jusqu'à Maastricht dans l'armée de Maurice de Saxe, est devenu ambassadeur, et la ville de Genève qu'il avait contribué à pacifier, frappa en 1738 une médaille à son effigie représentant au revers la Valeur, la Prudence et l'Equitté. La tourmente révolutionnaire devait emporter, et le château d'Ambres, et la vie de ses derniers barons. Condamnés à mort, le Duc de Mouchy, presque octogénaire, et son épouse furent guillotinés le 27 juin 1794 et leurs corps jetés dans la fosse commune du jardin de Picpus à Paris.\r\nAvant de mourir, le dernier des barons d'Ambres eut ce mot magnifique : « A quinze ans j'ai monté l'assaut pour mon Roi, à quatre-vingts je vais monter à l'échafaud pour mon Dieu, mes amis je ne suis pas à plaindre ».","architecture":"Château  de Roudezie à Ambres plus forteresse que château, corps de logis rectangulaire à plusieurs niveaux flanqué de tours carrées et rondes à mâchicoulis.","habitants":"Famille de Gélas\r\n        \r\n        \"","divers":"Château de la Roudezie à Ambres","gps":"","images":["../../jctruffet.com/image/image_81/81_Ambres_Roudezie_1.jpg"]},"Consult_chateau_formulaire3a0d":{"id":"Consult_chateau_formulaire3a0d","dept":"81","canton":"Anglès","commune":"Anglès_du_Tarn","nom":"Anglès_Tarn","type":"Château","periode":"XV","histoire":"Plusieurs châteaux à Anglès du Tarn, de Boutaric, de Campan du XIe-XVIIe siècle (voir article ), de Cors, de Ginestous, de Larembergue, de Lasfaillades et de Redondet du XVI-XIXe siècle.                                 BOUTARIC; pas d'information historique.                     CORS, le domaine est une donation de madame Nonez-Lopez à une association qui s'occupe de l'enfance. Cette propriété est rentrée dans le patrimoine de l'AEP en 2000. Le projet se présente en trois volets sur 6 ans en faisant travailler les artisans locaux et en partenariat avec les collectivités locales. Le volet social avec l'organisation de séjour pour les enfants. Le second volet est la formation en partenariat avec le lycée forestier du haut Languedoc et le lycée du bois et de l'ameublement de Revel. Le troisième volet est touristique avec l'organisation de classe verte et de séminaires.                                                  GINESTOUS pas d'information historique. LAREMBERQUE en société de Jacques François pas d'autre information.                                                REDONDET   En 1567, le lieutenant du vicomte de Paulin, chef des protestants, était Jacques de La Roque, propriétaire du Redondet. Durant tout le XVIIIe siècle, on continue de rencontrer au Redondet, les La Roque, né en 1770, Paul de La Roque d'Oulès suivit les autres officiers de son régiment en émigration, tandis que son propre frère  Jean-Louis  se rangea aux côtés des républicains. En 1832, on trouve Paul de La Roque d'Oulès, qui en fait était rentré très vite de son émigration et avait vécu caché durant les heures sombres de la Terreur.                                            LASFAILLADES est un village qui a son chef-lieu au hameau du Bouisset. Là, se trouvent la mairie, le cimetière et l'église dédiée à Notre-Dame des Neiges devenue paroisse le 17 septembre 1877. répartis en plusieurs hameaux ou lieux-dits , la communauté dépendait de la sénéchaussée et du diocèse de Castres.A l'origine, la municipalité faisait partie du canton de Brassac mais en 1846, elle passe au canton d'Anglès. L'orthographe de la commune a évolué au fil des ans : Lasfaillades, Les Feuillades, Les Faillades pour ne conserver que la première appellation de nos jours. C'est le pays de la montagne, des forêts et de l'eau vive avec le lac des Saints-Peyres qui se trouve à proximité. La verdure et la fraîcheur mettent une note de calme et de bien-être.","architecture":"A Anglès l'ancienne porte de la ville dite le Portail Bas, construite au XVIIe siècle a été inscrite monument historique le 19 octobre 1927.\r\nLe château de Campan dont la fondation date du XIe siècle. Il présente une façade sud embellie au XVIIe siècle. Il est inscrit au monument historique par arrêté du 17 mai 1961.                                                             Cors,  la réfection de la toiture du  XVIe siècle du château pour le mettre hors eau, le nettoyage des abords des bâtiments par les élèves du lycée forestier et la réhabilitation de l'ancienne bergerie en structure d'accueil, une salle commune, à l'étage les sanitaires et plus tard une salle de conférences et de projection. Les autres bâtiments seront presque tous conservés comme la maison du gardien qui accueillera par la suite un couple assurant l'entretien et le gardiennage du site. Cette façade se compose d'un pavillon central non saillant flanqué d'ailes latérales plus basses et à gauche de cette solide composition vient s'appuyer une imposante tour carrée de la même hauteur que le pavillon central. A gauche de cette tour  d'autres  corps de bâtiment. Bien qu'une grande partie des différents corps de logis du Redondet soit de fondation très ancienne, notamment la grosse tour carrée, il est évident qu'il a reçu des remaniements et trouvé son ordonnance régulière aux XVIIIe et XIXe siècles.","habitants":"Madame Nonez-Lopez                                          Famille de Paul de La Roque d'Oulès \r\n        \r\n        \r\n        \"","divers":"A Anglès, plusieurs châteaux, de Boutaric, de Campan , de Cors, de Ginestous, de Larembergue, de Lasfaillades et de Redondet.","gps":"","images":["../../jctruffet.com/image/image_81/81_Angles_Tarn_1.jpg","../../jctruffet.com/image/image_81/81_Angles_Tarn_2.jpg","../../jctruffet.com/image/image_81/81_Angles_Tarn_3.jpg","../../jctruffet.com/image/image_81/81_Angles_Tarn_4.jpg","../../jctruffet.com/image/image_81/81_Angles_Tarn_5.jpg","../../jctruffet.com/image/image_81/81_Angles_Tarn_6.jpg","../../jctruffet.com/image/image_81/81_Angles_Tarn_7.jpg"]},"Consult_chateau_formulaire24cb":{"id":"Consult_chateau_formulaire24cb","dept":"81","canton":"Saïx","commune":"Appelle","nom":"Appelle","type":"Château","periode":"XVI","histoire":"A Appelle le château d'Appelle et à quelques kilomètres au nord le château de Bertre et de Lacroisille dont je n'ai pas d'information historique por ces deux derniers. Le village d'Appelle est né à l'ombre de ce château qui nous est parvenu très remanié, il ne fut guère épargné au moment des guerres de Religion, il fut pillé, incendié et démoli. Au château vécut pendant plusieurs siècles la famille de Gineste, très influente dans la région jusqu'à la fin du XIXe siècle, la demeure est toujours en possession  de ses descendants, la famille de Larambergue, qui à partir du milieu des années 1980 entreprit des travaux afin de sauver la maison familiale.","architecture":"Austère façade donnant sur une cour fermée, le château conserve néanmoins beaucoup de charme et, une fois passée la grille au motif de fer forgé, l'on découvre au fond, sur une façade, un beau portail de la Renaissance, reconstruit sur les ruines laissées par les événements de 1587, on découvre sur le côté droit du rez-de-chaussée une fenêtre à meneaux. La porte portant la marque de la Renaissance présente un certain nombre d'analogies avec celle de l'ancienne faculté de théologie protestante de Puylaurens.            Lacroisille, manoir rectangulaire à deux niveaux avec tour à toit en poivrière.","habitants":"Famille de Larambergue\r\n        \r\n        \"","divers":"A Appelle le château d'Appelle de Bertre  et de Lacroizille","gps":"","images":["../../jctruffet.com/image/image_81/81_Appelle_1.jpg","../../jctruffet.com/image/image_81/81_Appelle_2.jpg","../../jctruffet.com/image/image_81/81_Appelle_3.jpg"]},"Consult_chateau_formulaire8cf1":{"id":"Consult_chateau_formulaire8cf1","dept":"81","canton":"Réalmont","commune":"Arifat","nom":"Arifat","type":"Château","periode":"XIII","histoire":"ARIFAT, le nom Arifat aurait plusieurs origines. Tout dabord Arifat viendrait dun nom germanique « Arefastus » ou « Erfast » qui aurait donné Arifadès ou le lieu sacré des génies. Arifat, viendrait aussi de larabe, signifiant demeure sur un rocher. Situé sur un rocher très abrupt, le château remonte au XIIIe siècle et dut être construit par les Soubiran, famille connue en Albigeois car Amblard Soubiran était sénéchal en 1218 et Jean de Soubiran fût grand prieur de Malte à Toulouse. Cette seigneurie appartient au Roi de France, aux Soubiran jusqu'en 1763 et passe ensuite aux Villeneuve.  Le dernier prêtre ayant exercé à Notre Dame de Ruffis était Denis Rols. Ce prêtre était également prêtre de la succursale de Blaucau, et c'est ainsi qu'il signait des documents de famille. Il est né sur la commune de Murat au lieu dit le Plos en 1757, décédé en ce même lieu en 1816. Il était propriétaire de terres sur la commune de Cabannes et barre. En 1914, une école voit le jour au château dans un local annexe. Le château et les terres sont vendus en 1925 à lagriculteur Louis Chamayou. En octobre 1926, lécole est transférée dans le château, loué par la commune. Elle fermera en septembre 1961. En 1979 le château est cédé à André Conrad, racheté ensuite par la mairie en 2001.","architecture":"Ce château est aujourd'hui en grand danger, corps de logis rectangulaire à trois niveaux toit en croupes, actuellement Moulin Mage commune de Murat lieu où on retrouve la trace de ses ancêtres déjà au VIIe siècle.","habitants":"Famille d'Amblard Soubiran\r\n        \r\n        \"","divers":"Le château d'Arifat","gps":"","images":["../../jctruffet.com/image/image_81/81_Arifat_1.jpg","../../jctruffet.com/image/image_81/81_Arifat_2.jpg"]},"Consult_chateau_formulaire7a82":{"id":"Consult_chateau_formulaire7a82","dept":"81","canton":"Castres","commune":"St_Hippolytede Lagriffoul","nom":"Arifat_Tarn","type":"Château","periode":"XVI","histoire":"ARIFAT, dès le XIe siècle, Arifat permettait, de par sa situation dominante, de veiller sur la route qui longeait la rive droite de la Durenque, la seigneurie d'Arifat relevait des comtes de Castres et portait alors le nom d'Agriffoul et la paroisse dont dépend encore le château porte le nom de Saint-Hippolyte de Lagriffoul. Dans les premières années du XIIe siècle, le vicomte Trencavel reçut l'hommage pour le château, situé à une lieue de Castres. Au début des guerres de Religion, le château fut brûlé le 14 avril 1574 par les catholiques. Lorsqu'en 1577 Guillaume de Genibrousse reconstruisit son château.","architecture":"Reconstruisit  au XVIe siècle , il conserva la partie des murailles encore debout, la demeure cessa d'être une place forte et demeura définitivement privée de courtines, de tours, et de tous ses moyens de défense. Aujourd'hui, le château, à la longue façade classique, ouvre sur une belle terrasse donnant sur le jardin. Croisées à meneaux et bouches à feu sont encore là pour attester de sa longue histoire.","habitants":"Guillaume de Genibrousse\r\n        \r\n        \"","divers":"le château d'Arifat à saint-Hippolyte de Lagriffoul","gps":"","images":["../../jctruffet.com/image/image_81/81_Arifat_Tarn_1.jpg"]},"Consult_chateau_formulaire368a":{"id":"Consult_chateau_formulaire368a","dept":"81","canton":"Lagrave","commune":"Aussac","nom":"Aussac_Tarn","type":"Château","periode":"XIII","histoire":"AUSSAC, au XIIIe siècle, ce sont les Montfort qui étaient seigneurs d'Aussac en octobre 1257, Philippe de Montfort céda la moitié du village avec le château au Chapitre d'Albi, puis cédant en juin de l'année suivante l'autre moitié à Pierre, vicomte de Lautrec. Le roi possédait également sur Aussac quelques droits seigneuriaux et les co-seigneurs, quant à eux, nommaient un juge pour chaque moitié de la seigneurie. Le chapitre de Sainte-Cécile-d'Albi conserva jusqu'à la Révolution sa moitié de seigneurie et la part des Lautrec d'Ambres, puissants seigneurs, passa au XVIIe siècle à Jacques de Morlas, il est mentionné dans un acte de 1641, co-seigneur du château. La propriété passa au sieur des Landes de Saint-Palais qui est mentionné comme seigneur en 1722. Ses descendants prirent alors le nom de la terre d'Aussac qu'ils conservèrent jusqu'en 1790.","architecture":"À l'heure actuelle, le vieux château d'Aussac apparaît remanié et altéré, mais il conserve plusieurs belles tours rondes qui devaient être jadis plus élevées.","habitants":"Famille de Jacques de Morlas,\r\n        \r\n        \"","divers":"Château d'Aussac","gps":"","images":["../../jctruffet.com/image/image_81/81_Aussac_Tarn_1.jpg","../../jctruffet.com/image/image_81/81_Aussac_Tarn_2.jpg","../../jctruffet.com/image/image_81/81_Aussac_Tarn_3.jpg"]},"Consult_chateau_formulairec70d":{"id":"Consult_chateau_formulairec70d","dept":"81","canton":"Mazamet","commune":"Aussillon","nom":"Aussillon","type":"Château","periode":"XVI","histoire":"Plusieurs châteaux à Aussillon celui des Durand,  du Bez, Thoré du XIXe siècle, Falgalarié et  de Vabre        THORE, demeure construite pour l'industriel Armand Puech par l'architecte J. Pheulpin, en 1893-1894, inspirée du modèle proposé par Viollet-le-Duc.   FALGALARIE pas d'information historique  sert à des expositions culturelles. Accueille le conservatoire de Musique, antenne Aussillon-Mazamet du conservatoire de Musique et de Danse du Tarn.                                   Pas d'information historique pour les châteaux du Bez, des Durand et de Vabre.","architecture":"Falgalarié, conçu par Armand Puech, industriel du textile dans la région de Mazamet, cet ensemble architectural et paysager célèbre de l'eau qu'il a du apprendre à maîtriser pour son usine texitel et qui l'amène à inventer un procédé de filtration breveté en 1890 et adopté par la suite dans le monde entier.   Château de la Falgarié lieu culturel.                               Thoré, demeure construite pour l'industriel Armand Puech par l'architecte J. Pheulpin, en 1893-1894, inspirée du modèle proposé par Viollet-le-Duc dans son histoire d'une maison, éditée en 1873. corps de logis de plan rectangulaire à trois niveaux flanqué d'un pavillon en saillit d'entrée, avec balcon au deuxième étage toit à fronton avec mini-échauguettes sur la base du toit, deux tours rondes sur l'arrière du bâtiment toit en poivrière, pavillon sur flanc droit à deux niveaux.  Le château offre un confort rare en son temps : eau potable et électricité, produites sur place, à tous les étages. Le décor porté d'origine a été conservé.     Bez, maison forte de plan en L à trois niveaux accolée d'une échauguette en encorbellement    et fenêtre à meneaux                                                                        Vabre de plan rectangulaire à deux niveaux et lucarnes n sur toit à la mansard.","habitants":"Famille Armand Puech\r\n        \r\n        \"","divers":"A Aussillon le château des Durand, de Falgalariè, de Thoré, de Vabre et le manoir de Bez.","gps":"","images":["../../jctruffet.com/image/image_81/81_Aussillon_1.jpg","../../jctruffet.com/image/image_81/81_Aussillon_2.jpg","../../jctruffet.com/image/imag mages":["../../jctruffet.com/image/image_81/81_Bancalie_1.jpg","../../jctruffet.com/image/image_81/81_Bancalie_2.jpg"]},"Consult_chateau_formulaired2da":{"id":"Consult_chateau_formulaired2da","dept":"81","canton":"Rabastens","commune":"Beauvais-sur-Tescou","nom":"Beauvais_Tescou","type":"Château","periode":"XIV","histoire":"BEAUVAIS sur TESCOU, le nom de Beauvais-Sur-Tescou vient de l'évêque de Beauvais Jean de Marigny, lieutenant du roi en Languedoc. Après la fondation de 1342, le Roi et quatre seigneurs locaux devinrent co-seigneurs de Beauvais. Le château passa au XVe siècle à la famille Léonard mais à la suite d'une succession en 1503, commença un long procès entre héritiers et co-seigneurs divers, puis l'on vit passer tour à tour au château les familles Deymier, de Plagnolles, et enfin Antoine de Lapierre qui parvint à réunir tout le patrimoine des Léonard. Il appartient à la famille Pongés dont le grand père était notaire à Villemur, en 1730 une cloche fut fondue à Beauvais avec cette inscription « Saint Pierre, priez pour nous ! Cloche de Beauvais » Parrain : Noble Jean de Maichens, seigneur ; Marraine, dame Marie de Moustand, son épouse.","architecture":"le château de Beauvais est un vaste édifice rectangulaire, flanqué aux angles de quatre tourelles, deux rondes et deux carrées. Elles sont dune hauteur de 46 mètres au milieu de la cour du château qui a plus de 200 mètres carrés, le château dont les parties les plus anciennes datent du XIVe siècle présente un logis rectangulaire coiffé d'un toit à quatre pentes. La façade sur cour est flanquée de deux hautes tours carrées. La façade postérieure présente à son extrémité gauche une tour de même hauteur que celle de la façade principale, découronnée, mais ronde et flanquée d'une tourelle plus élevée, elle présente deux autres tours engagées, l'une circulaire et l'autre carrée, arasées au niveau de la toiture du logis et une ronde surmontée d'une autre plus petite.","habitants":"Famille Pongés\r\n        \r\n        \"","divers":"Château de Beauvais sur Tescou","gps":"","images":["../../jctruffet.com/image/image_81/81_Beauvais_Tescou_1.jpg","../../jctruffet.com/image/image_81/81_Beauvais_Tescou_2.jpg","../../jctruffet.com/image/image_81/81_Beauvais_Tescou_3.jpg"]},"Consult_chateau_formulaired901":{"id":"Consult_chateau_formulaired901","dept":"81","canton":"Lavaur","commune":"Belcastel","nom":"Belcastel_Tarn","type":"Château","periode":"XVI-XIX","histoire":"BELCASTEL, létymologie est là pour nous rappeler que Belcastel vient de Bel (beau) et de castel (petite place fortifiée) en souvenir du temps où en 1221 (Philippe Auguste le vainqueur de Bouvines régnant) on signalait en ces lieux la présence dun château -fort.  Il ne reste aucun vestige du château primitif, détruit lors des guerres de religion entre protestants et catholiques, guerres qui furent aussi acharnées et calamiteuses que la répression du catharisme aux siècles précédents. Mais Belcastel mérite encore son appellation grâce au château qui fut bâti à la fin du IIe Empire à peu de distance de lancien pour les Lacoste, barons de Belcastel depuis le XVIIIe siècle, et dont le descendant devait épouser au XXe siècle une descendante de Désirée Clary, épouse de Bernadotte, maréchal de France sous lEmpire et roi de Suède.","architecture":"A Belcastel une église composée dans sa partie la plus ancienne dune tour donjon en pierre de grès grises. Les murs ont une épaisseur qui avoisine des deux mètres. La tour est ornée de deux gargouilles et dun chemin de ronde. Du haut de ses vingt-deux mètres huit siècles dhistoire nous contemplent. Une tourelle dangle contenant lescalier à vis accompagne le clocher. La cloche principale qui porte les armes des seigneurs de Belcastel et deux médaillons représentant la Vierge et lenfant et une crucifixion date de 1518 (François 1er étant roi de France) ce qui en fait lune des cloches les plus anciennes du département du Tarn. Le château fut construit à la fin du second Empire et se compose d'un corps principal d'un étage sur rez-de-chaussée surélevé, coiffé d'un toit à la Mansart. Cette partie du château emprunte vaguement son style à l'architecture classique, il est flanqué d'un côté d'une haute tour polygonale à pans coupés, coiffée en poivrière et de l'autre d'un pavillon du même esprit.","habitants":"Seigneur de Belcastel\r\n        \r\n        \"","divers":"Le village de Belcastel et son château","gps":"","images":["../../jctruffet.com/image/image_81/81_Belcastel_Tarn_1.jpg","../../jctruffet.com/image/image_81/81_Belcastel_Tarn_2.jpg"]},"Consult_chateau_formulaire0278":{"id":"Consult_chateau_formulaire0278","dept":"81","canton":"Rabastens","commune":"Lisle sur Tarn","nom":"Bellevue_Belbéze","type":"Château","periode":"XVII","histoire":"BELLEVUE  Au début du XIIIe siècle, le château appartenait à Béranger et Gautier de Saint-Jean, qui le cédèrent en 1248 au comte Raymond VII de Toulouse. La seigneurie passa ensuite à Alfonse de Poitiers puis au roi Jean, qui en fit la résidence des sénéchaux de Toulouse: c'est le sénéchal Regnaut d'Aubigny qui le reçut en cadeau du roi. Il fut ensuite la Résidence occasionnelle du duc de Berry. En 1636, la demeure fut vendue à un parlementaire célèbre, le président Desplats. On trouve à la fin du XVIIe siècle le président du Puget, sa famille y habitera jusqu'à la fin du XVIIe siècle et le domaine passa par héritage aux Puységur. La présence de parlementaires toulousains en cette seigneurie s'explique par la proximité que présentait Lisle, désireux de posséder à la fois une campagne agréable et une terre censée asseoir à la fois leur position économique et leur position sociale. Situé aux portes de Lisle, le château fut rebâti au XIXe siècle pour les Puységur et occupe l'emplacement d'un château antérieur.                  BELBEZE, en 1558, on trouve noble Pierre de Nogaret mentionné en 1530 comme capitaine du château-prison. Nogaret possédait une maison près de la porte de la cité, celle-ci ayant été détruire en 1562 suite à un incendie, Nogaret bâti le château situé à l'écart du centre du village. En 1664, le château avait été acquis par Jean d'Albis, avocat à Buzet, et c'est lui qui reconstruisit le château tel qu'on peut encore le découvrir de nos jours.","architecture":"Le petit château de Bellevue de style néoclassique et de construction homogène a très probablement été construit à l'extrême fin du XVIIIe siècle et au tout début du XIXe siècle. Malgré la sobriété extérieure des façades, il conserve des aménagements intérieurs qui témoignent du statut prestigieux des occupants : poêle en faïence, cave à vin, chambres à alcôves avec garde-robe et chambre de domestique, encore dans le goût du XVIIIe siècle.                                                                              Le château de Belbéze  est un beau bâtiment carré du XVIIe siècle, cantonné de tours. Particulièrement mis en valeur sur un terre plein, il présente une physionomie à la fois simple et très séduisante, avec ses belles tours à deux étages coiffées de toits en pavillon, aux combles animés par de jolis lucarnes à fronton triangulaire. L'unique animation de ses façades, un réseau de corniches et bandeaux de brique répond aux encadrements des fenêtres et souligne les étages, conserve des traces de la demeure antérieure malgré sa reconstruction sous Louis XIV.","habitants":"Famille des Puységur\r\n        \r\n        \r\n        \"","divers":"Château de Bellevue et de Belbéze à Lisle sur Tarn","gps":"","images":["../../jctruffet.com/image/image_81/81_Bellevue_Belbeze_1.jpg","../../jctruffet.com/image/image_81/81_Bellevue_Belbeze_2.jpg","../../jctruffet.com/image/image_81/81_Bellevue_Belbeze_3.jpg","../../jctruffet.com/image/image_81/81_Bellevue_Belbeze_4.jpg","../../jctruffet.com/image/image_81/81_Bellevue_Belbeze_5.jpg"]},"Consult_chateau_formulaire1edb":{"id":"Consult_chateau_formulaire1edb","dept":"81","canton":"Lavaur","commune":"Lavaur","nom":"Bellevue_lavaur","type":"Château","periode":"XVIII","histoire":"BELLEVUE, La paroisse de Pibres existe déjà à la fin du XVIIIe siècle, Il apparaît sur le plan cadastral napoléonien de 1826. Il appartenait à Auguste Bessery, juge de paix . Il possédait également la ferme  et la tuilerie  voisines. Le registre des augmentations-diminutions indique la reconstruction des dépendances en 1843, et celle du château en 1881. Le château a ensuite appartenu à la fin du XIXe siècle à la famille de Saint-Salvy, propriétaire d'un hôtel particulier au 21 rue de la Mairie à Lavaur.  Léopold Malphettes  était patron de l'usine de ciment de Ranteil, d'où l'utilisation du béton, position qui lui avait permis de se payer cette petite folie architecturale. Son fils Jacques et ses enfants ont dirigé après lui l'entreprise jusqu'en 1974, la petite fille de Léopold Malphettes  Olivia Malphettes, est une des héritières du château de Bellevue.","architecture":"Bellevue,  Incluse dans la façade, une pierre gravée de l'année 1685 fait illusion. Elle a été récupérée de l'ancien château de Bellevue démoli et reconstruit. La nouvelle mouture, en béton recouvert d'un parement, est de 1933.  De plan rectangulaire à deux niveaux sur soubassement et attique deux pavillons saillants sur les côtés à toits plat en terrasse.","habitants":"Famille de Saint-Salvy\r\n        \r\n        \r\n        \"","divers":"Le château de Bellevue à Lavaur","gps":"","images":["../../jctruffet.com/image/image_81/81_Bellevue_Lavaur_1.jpg","../../jctruffet.com/image/image_81/81_Bellevue_Lavaur_2.jpg","../../jctruffet.com/image/image_81/81_Bellevue_Lavaur_3.jpg","../../jctruffet.com/image/image_81/81_Bellevue_Lavaur_4.jpg"]},"Consult_chateau_formulairedeba":{"id":"Consult_chateau_formulairedeba","dept":"81","canton":"Mazamet","commune":"Noailhac","nom":"Beloterie","type":"Château","periode":"XIX","histoire":"BELOTERIE, au Moyen-Age, la famille de Boissezon est propriétaire de la plupart des domaines de la paroisse, telle La Beloterie. Appartenant à la famille dArrazat au XVIe siècle, ce château de La Beloterie a sans doute été à l'origine un pavillon de chasse. Au XVIIe siècle, le prince de Condé venu assiéger Brassac y est hébergé. Le 21 mai 1695, Joseph Barbara épouse Marie dArrazat et, depuis cette époque, le domaine reste dans la famille Barbara de la Beloterie de Boisséson, originaire de castres a été anoblie par la charge de capitoul de Toulouse en 1703 .  Au XVIIIe siècle, trois membres de cette famille dirigent successivement l'administration royale de l'ancien comté de Castres par l'exercice de la charge de subdélégué de l'Intendant du Languedoc. Durant la Révolution Française certains de ses membres s'exilent en Russie et ne reviendront en France qu'au milieu du XIXe siècle. De cette famille sont issus des avocats, des magistrats, des officiers, un capitoul de la ville de Toulouse, des subdélégués de l'Intendant du Languedoc, deux généraux de l'armée russe dont l'un ancien maréchal de camp français, un diplomate, une grande-maîtresse à la cour de la reine de Bavière, un membre du conseil constitutionnel. Le 21 mai 1695, Joseph Barbara épouse Marie dArrazat et, depuis cette époque, le domaine reste dans la famille Barbara de la Beloterie. Appartenant à la famille dArrazat, \r\nAu XVIIe siècle, le prince de Condé venu assiéger Brassac y est hébergé.     Roqueperlic  L'entreprise madame  Ellen Schapp, est installée à Noailhac.","architecture":"Cet édifice du XIXe siècle est accompagné dun ensemble de bâtiments utilitaires dont larchitecture est soignée avec chaînes dangles, encadrements et corniche, en granit avec des péristyle dorique. Le château est une sobre construction présentant un aspect que l'on peut dater du deuxième quart du XIXe siècle et qui n'est pas sans rappeler les travaux menés dans la région par l'architecte Laffon. En son centre on peut voir un beau motif de serlienne, surmontant un péristyle dorique d'une grande noblesse. La demeure est accompagnée de bâtiments utilitaires dont larchitecture est soignée avec chaînes dangles, encadrements et corniche en granit, ce château a sans doute était à lorigine, un pavillon de chasse.","habitants":"Famille Barbara de Labelotterie de Boisséson\r\n        \"","divers":"Château de la Beloterie à Noailhac","gps":"","images":["../../jctruffet.com/image/image_81/81_Beloterie_1.jpg","../../jctruffet.com/image/image_81/81_Beloterie_2.jpg","../../jctruffet.com/image/image_81/81_Beloterie_3.jpg"]},"Consult_chateau_formulairefa04":{"id":"Consult_chateau_formulairefa04","dept":"81","canton":"Albi","commune":"Albi","nom":"Berbie_Albi","type":"Palais Episcopal","periode":"XIII","histoire":"La BERBIE palais épiscopal, a été édifié à partir du XIIIe  siècle avant l'édification du Palais des Papes dAvignon. C'est l'un des plus vieux châteaux de France et l'un des mieux conservés, dans un cadre exceptionnel du musée Toulouse-Lautrec, le palais est aussi très apprécié pour ses jardins à la Française et ses remarquables points de vue sur le Tarn ou en contre plongée sur la cathédrale, sa voisine.  Ménagé au XIIIe siècle pour ses parties les plus anciennes, notamment la tour Magne, le palais de la Berbie était la résidence des évêques d'Albi. Il fut modifié au tournant des XVe et XVIe siècles par l'évêque d'alors, Louis d'Amboise, qui le dota d'un vaste corps de logis entre cour et jardin.  A la mort de Toulouse-Lautrec,  la comtesse d'Adèle, sa mère et son cousin Gabriel Tapié de Céleyran font don à la ville en 1905  pour y fut installé le musée, qui devint en 1922, le musée Toulouse-Lautrec. Même s'il a de riches collections d'art ancien, c'est évidemment son regroupement de plus de 3000 uvres du peintre albigeois qui font l'intérêt exceptionnel de ce musée.","architecture":"Dans la seconde moitié du XIIIe siècle, construction du palais de la Berbie; véritable forteresse, cette architecture médiévale,  sorganise autour dune cour dhonneur et dun donjon de cinquante mètres de haut, flanqué aux quatre angles de tours, dont trois pleines avec des murs  de sept mètres d'épaisseur à la base. La tour Magne, formée des tours Sainte-Catherine et Saint-Michel du XIIIe siècle  forment un bloc unique ou les évêques firent leur appartements,  bien conservé, est étroitement liée à la visite des collections du musée : salles voûtées d'origine médiévales, pavements médiévaux. Une passerelle permet aux visiteurs de voir les pavements restaurés. La grande salle de la Tour Magne est dédiée à lhistoire du palais.  Cette imposante forteresse est  l'expression de la puissance temporelle et spirituelle des évêques d'Albi qui l'ont édifiée. Initialement, la bâtisse s'organise notamment autour d'une salle féodale accolée à la tour Saint-Michel destinée au tribunal et aux prisons ecclésiastiques. Au XVIIe  siècle, les fortifications vont tomber : un portail s'ouvre sur la ville vers le quai Choiseul qui descend vers le Pont-vieux. Des galeries, des grands salons, une bibliothèque, des terrasses vont agrémenter l'ensemble. Un jardin à la Française, dominé par un chemin de ronde, va remplacer la place darmes.","habitants":"Les Papes dAvignon\r\n        \"","divers":"Le palais épiscopal de la Berbie à Albi","gps":"","images":["../../jctruffet.com/image/image_81/81_Berbie_Albi_1.jpg","../../jctruffet.com/image/image_81/81_Berbie_Albi_2.jpg","../../jctruffet.com/image/image_81/81_Berbie_Albi_3.jpg","../../jctruffet.com/image/image_81/81_Berbie_Albi_4.jpg","../../jctruffet.com/image/image_81/81_Berbie_Albi_5.jpg","../../jctruffet.com/image/image_81/81_Berbie_Albi_6.jpg","../../jctruffet.com/image/image_81/81_Berbie_Albi_7.jpg","../../jctruffet.com/image/image_81/81_Berbie_Albi_8.jpg","../../jctruffet.com/image/image_81/81_Berbie_Albi_9.jpg"]},"Consult_chateau_formulaire406e":{"id":"Consult_chateau_formulaire406e","dept":"81","canton":"Saïx","commune":"Blan","nom":"Blan_Tarn","type":"Château","periode":"","histoire":"Trois châteaux à Blan dont celui de Blan, de Dournès et celui de Lamothe et à deux kilomètres au sud Ouest le château de Burg à Poudis, pas d'information historique.                                        BLAN; est redevenu commune en absorbant Lamothe, par ordonnance du 15 août 1827. Blan faisait partie de la gaule romaine. Quelques personnages importants sont nés où ont habités la commune : Lamiral Jaurès, frère de Jean Jaurès dont les beaux parents, les Duprat, ont construit une maison dhabitation qui est située à Blan chemin de Lamothe.\r\nLe général, comte de Las Cases, qui a écrit le mémorial de Sainte-Hélène, est né au lieu dit « Las Cases » en 1766  est décédé en 1842. Elisa Lemonnier, née à Sorèze en 1805 et épouse de Charles Lemonnier, professeur de philosophie à lécole de Sorèze. En 1862, elle créa la première école denseignement professionnel pour les femmes à Blan. La réussite fut telle que dautres établissements ouvrirent leurs portes. Les époux Lemonnier résidèrent  à Blan, dans la propriété de Montpinier.\r\nCommunautés de Blan, Dournès et Lamothe. Les communes de Lamothe et Dournès, créées en 1790, sont  supprimées et rattachées à Blan par ordonnance du 15 août 1827.","architecture":"Blan; de construction  rectangulaire à un niveau accolé d'un donjon carré.                                                                                            Dournès   de plan rectangulaire à deux niveaux et lucarnes sur toit en ardoise brisé à la Mansart.                                                                                 Lamothe de plan rectangulaire à deux niveaux avec série de lucarnes sur toit en croupe la bâtisse est accolée à deux tours carrées toit en poivrière et d'un pavillon rectangulaire sur la partie droite servant de terrasse au premier étage.                                                   Château de  Burg à Poudis commune à 2 km de construction récente à deux niveaux fronton important sur façade.","habitants":"Amiral Jaurès                \r\n\r\n        \"","divers":"Château de Blan, de Dournes, de Lamothe à Blan","gps":"","images":["../../jctruffet.com/image/image_81/81_Blan_Tarn_1.jpg","../../jctruffet.com/image/image_81/81_Blan_Tarn_2.jpg","../../jctruffet.com/image/image_81/81_Blan_Tarn_3.jpg","../../jctruffet.com/image/image_81/81_Blan_Tarn_4.jpg","../../jctruffet.com/image/image_81/81_Blan_Tarn_5.jpg","../../jctruffet.com/image/image_81/81_Blan_Tarn_6.jpg","../../jctruffet.com/image/image_81/81_Blan_Tarn_7.jpg"]},"Consult_chateau_formulairec97f":{"id":"Consult_chateau_formulairec97f","dept":"81","canton":"Carmeaux","commune":"Bournazel","nom":"Boisse_Bournazel","type":"Château","periode":"XV-XX","histoire":"BOISSE, on ne peut parler de Boisse sans évoquer les Dalès, qui longtemps en furent seigneurs. La famille Dalès, puis d'Alès a donné de 1612 à 1724 cinq maîtres des eaux et forêts pyrénéens. Cette famille languedocienne de souche, descendant des Anduze, seigneurs d'Alès et La Voulte au XIIIe siècle, s'installa de bonne heure dans l'Albigeois, puis plus tard à Cordes. La branche mère, installée à Saliès et Albi, contracta en fait deux alliances dans la région de Cordes aux XV  et XVIe siècles et un des membres de la famille vint habiter Cordes.","architecture":"Ce petit château  de Boisse du XV  et XVIe siècles est situé sur le bord ouest d'un promontoire. Sa façade se présente à l'est et il se compose d'un corps de logis unique. Une tour circulaire fait saillie au milieu de la façade et la porte d'entrée s'ouvre au pied de cette tour avec comme décor un bandeau surmonté d'un écu dont les armoiries ont été martelées. Cette porte est protégée au-dessus par une meurtrière en forme de croix et à droite et à gauche par deux autres meurtrières.","habitants":"Famille Dalès\r\n        \"","divers":"Château de la Boisse  à Bournazel","gps":"","images":["../../jctruffet.com/image/image_81/81_Boisse_Bournazel_1.jpg","../../jctruffet.com/image/image_81/81_Boisse_Bournazel_2.jpg","../../jctruffet.com/image/image_81/81_Boisse_Bournazel_3.jpg","../../jctruffet.com/image/image_81/81_Boisse_Bournazel_4.jpg"]},"Consult_chateau_formulaireb01c-2":{"id":"Consult_chateau_formulaireb01c-2","dept":"81","canton":"Lagrave","commune":"Senouillac","nom":"Bonnette","type":"Château","periode":"XV","histoire":"BONNETTE, le château de la Bonnette était une fortification avancée et dépendait du  château de Mauriac. Le château appartenait à Pierre de Fronte, juge d'Albigeois, de 1504  à 1514. En 1523, il est mentionné que sa veuve, Jeanne de Castelnau habite à la Bonnette. Le château reste dans cette famille car il est fait mention de Vidal, puis Hugues  Delfron comme seigneur de la Bonnette. Tombé en 1575 entre les mains des protestants, le château fut reconquis aussitôt après par le parti catholique. Au début du XVIIe siècle, la seigneurie de la Bonnette passe aux mains de la famille de Paulo qui y fait cultiver le pastel. Le château de la Bonnette présente un certain nombre de traits que nous lui connaissons comme les deux tours de pigeonnier.","architecture":"Le château est constitué de quatre ailes disposées autour d'une cour rectangulaire. Les ailes nord et sud mesurent environ 23 m de longueur, et les ailes Est et ouest environ 25 m. L'aile ouest est plus élevée que les trois autres ailes. La tour polygonale, abritant l'escalier demi-hors-uvre, fait saillie à l'ouest de la cour. Deux tours circulaires occupent les angles Est du château et encadrent la façade orientale dont la partie centrale est ornée par un fronton à redents. Cette façade est précédée par une autre cour, fermée à l'est par une grille portée par un mur-bahut. La grille est flanquée au nord et au sud par deux tours recouvertes par un toit conique en ardoises taillées en écailles de poissons, qui abritent deux pigeonniers. Au nord de la cour se trouve l'écurie dont le bâtiment se prolonge vers l'est au-delà de la tour pour abriter le chai. L'ensemble du château est bâti en maçonnerie enduite. Les deux tours qui encadrent l'élévation Est sont sommées par une génoise à quatre rangs.","habitants":"Famille d'Hugues del From\r\n        \"","divers":"Château de Bonnette à Senouillac","gps":"","images":["../../jctruffet.com/image/image_81/81_Bonnette_1.jpg","../../jctruffet.com/image/image_81/81_Bonnette_2.jpg","../../jctruffet.com/image/image_81/81_Bonnette_3.jpg","../../jctruffet.com/image/image_81/81_Bonnette_4.jpg"]},"Consult_chateau_formulaire643c":{"id":"Consult_chateau_formulaire643c","dept":"81","canton":"Réalmont","commune":"Ambialet","nom":"Bonneval_Ambialet","type":"Vestiges","periode":"XVII","histoire":"BONNEVAL; vestiges  du XVIIe siècle. On peut citer les vestiges de la forteresse des vicomtes d'Albi ainsi qu'un prieuré qui abrite le remarquable sanctuaire roman de Notre-Dame de la Voûte, bâti au XIe siècle, ce qui en fait un des plus anciens du département. Il fut fondé par des moines bénédictins de Saint Victor de Marseille. Lors de la Croisade contre les Albigeois, Simon de Montfort s'empara d'Ambialet et y convoqua en 1210 le comte de Toulouse, Raymond VI. Vingt ans plus tard, le Traité de Meaux fit passer ce fief dans la seigneurie de Castres attribuée à la famille de Montfort, avant de rejoindre la Couronne de France à la mort d'Alphonse de Poitiers en 1271. Dévasté par les Anglais durant la guerre de cent ans, le château fut pris  par les Huguenots de Réalmont, en 1563 et 1568. Au milieu du XVIIIe siècle, la famille de Castelpers qui avait acquis Ambialet à la fin du XIVe siècle la céda au baron de Lormet qui la conserva jusqu'à la Révolution.","architecture":"Bonneval, vestiges du château du XVIe siècle incendié en 1940.   Château dAmbialet, dit  le Castella, cest un ancien château fort qui figure dans les armoiries de la ville. Entièrement ruiné, sa plateforme en hauteur se voit encore à lentrée de la boucle du Tarn où se trouve le prieuré, derrière léglise qui est lancienne chapelle castrale. Il a existé avant ce château, appelé Châteauneuf dans les anciens document (dans un traité de paix de 1142), un château-vieux qui appartenait aux comtes de Toulouse.\r\nIl était le siège de la vicomté.","habitants":"Famille de Castelpers\r\n        \r\n        \"","divers":"Vestiges du château de Bonneval à Ambialet","gps":"","images":["../../jctruffet.com/image/image_81/81_Bonneval_Ambialet_1.jpg","../../jctruffet.com/image/image_81/81_Bonneval_Ambialet_2.jpg","../../jctruffet.com/image/image_81/81_Bonneval_Ambialet_3.jpg","../../jctruffet.com/image/image_81/81_Bonneval_Ambialet_4.jpg","../../jctruffet.com/image/image_81/81_Bonneval_Ambialet_5.jpg","../../jctruffet.com/image/image_81/81_Bonneval_Ambialet_6.jpg"]},"Consult_chateau_formulairef1ee":{"id":"Consult_chateau_formulairef1ee","dept":"81","canton":"Semalens","commune":"Lautrec","nom":"Brametourte","type":"Château","periode":"XI","histoire":"BRAMETOURTE, le château de Brametourte, la tranquillité de cette ancienne demeure des vicomtes de Lautrec contredit son passé turbulent. Le château a enduré la ferveur religieuse des cathares, lOrdre des Templiers au Moyen-Age, ainsi que les guerres de religion.  Le château appartenait au seigneur d'Ambres. En 1474 il était entre les mains de Pierre Dupuy, fils d'Antoine Dupuy, seigneur de Cabrilles et de Montcuquet. Alexis Dupuy le posséda  de 1502 à 1532, on trouve en 1595, année pendant laquelle le duc de Ventadour occupa le château, Gabriel de Capriol, seigneur de Montcuquet. Le lieu fut le siège de combats pendant les guerres de Religion, notamment pris par Turenne le 29 août 1580.","architecture":"Le château  bâti au XIe siècle, a été restauré de fond en comble de façon traditionnelle. Assiégé pendant le XVIe siècle, il est alors tombé dans un état de délabrement pour ensuite être oublié. Figé dans le temps. Ainsi, Brametourte est devenu un symbole de sociabilité et un endroit propice pour mener une vie saine à lintérieur dun vieux domaine naturel. Le château présente un plan carré, on découvre encore deux tours, l'une cylindrique et l'autre carrée. La porte d'entrée en ogive est défendue à gauche par une tour carrée avec tourelle et à droite par une tour circulaire, au premier étage de laquelle est une fenêtre ogivale trilobée appartenant autrefois à la chapelle. L'accès à la cour du château se fait par une belle porte aux délicats claveaux de pierre. Brametourte conserve une cheminée monumentale et un vestibule voûté en ogives.","habitants":"Famille  Pierre Dupuy\r\n        \"","divers":"Château de Brametourte","gps":"","images":["../../jctruffet.com/image/image_81/81_Brametourte_1.jpg","../../jctruffet.com/image/image_81/81_Brametourte_2.jpg","../../jctruffet.com/image/image_81/81_Brametourte_3.jpg","../../jctruffet.com/image/image_81/81_Brametourte_4.jpg"]},"Consult_chateau_formulaire3a82":{"id":"Consult_chateau_formulaire3a82","dept":"81","canton":"Gaillac","commune":"Brens","nom":"Brens_Bourelie","type":"Château","periode":"XV","histoire":"Deux château à Brens celui de la Bourelie et le domaine  de Brens (viticole).                                                                                                 BRENS,  la famille de Combettes, installée en Albigeois au XV e siècle, connaît une évolution notable avec Roch Combettes, juge en chef du pays albigeois à la fin du XVIe siècle. Lhôtel des Combettes-Labourélie à Gaillac et le château de Labourélie à Brens, situés sur le pays vignoble Gaillaçois, bastides et Val Dadou, sont les propriétés dune famille du vignoble de Gaillac. Guillaume Combettes acquit la seigneurie et baronnie de Brens et de Puybérol en 1642,  la famille de Combettes fait construire au début du XVIIe siècle un hôtel particulier à Gaillac, puis investit à la campagne. Elle y élève un petit château installé au centre dun domaine agricole. La période de prospérité de la deuxième moitié du XVIIIe siècle se traduisit par la reconstruction du château peu de temps avant la Révolution. Le programme des perrons et des menuiseries fut semble-t-il mené plus tard, dans la décennie 1840, au moment où la reconstruction des communs bordant la cour est entreprise et la chapelle est reconstruite. L'activité de ce chantier de construction, ambitieux, est mené sur le long terme et dans un esprit de continuité par Pierre-Marie-Joseph Casimir puis par son fils François Raymond Louis de Combettes. Au milieu du XIXe siècle, avec la prospérité revenue grâce à lactivité vinicole, il se pare de dépendances élevées sur des dimensions exceptionnelles. Elles présentent en avant du château, sur lallée principale bordée de vignes, le chai et le cuvier, attributs indéniables dun château viticole.","architecture":"Château de la Bourélie à Brens, les Combettes se séparent de la baronnie en 1645 et entreprend la construction d'un petit château à la Bourélie en 1647. Ce dernier possédait un portail couronné de créneaux au nord, une tour à l'est et une tourelle d'escalier en vis à l'ouest. Au rez-de-chaussée, se trouvaient le chai et la salle basse, la salle était au premier étage ainsi que les chambres et antichambres qui se répartissaient aussi au deuxième étage. Il se déduit de la mention \"nouvelle construction\" pour quatre bâtiments. La dernière tranche de travaux est achevée en 1882, lorsqu'il est déclaré que le grand bâtiment occidental  de 1827 est détruit. La demeure du château est actuellement en très mauvais état, la toiture et les niveaux de plancher se sont effondrés.","habitants":"Famille de Pierre Marie Joseph Casimir\r\n        \r\n        \"","divers":"Château et domaine de la Bourelie à Brens","gps":"","images":["../../jctruffet.com/image/image_81/81_Brens_Bourelie_1.jpg","../../jctruffet.com/image/image_81/81_Brens_Bourelie_2.jpg","../../jctruffet.com/image/image_81/81_Brens_Bourelie_3.jpg","../../jctruffet.com/image/image_81/81_Brens_Bourelie_4.jpg","../../jctruffet.com/image/image_81/81_Brens_Bourelie_5.jpg"]},"Consult_chateau_formulairedb32":{"id":"Consult_chateau_formulairedb32","dept":"81","canton":"Graulhet","commune":"Briatexte","nom":"Briatexte","type":"Château","periode":"XV-XIX","histoire":"A Briatexte le château de Montalivet,  et le château de Poujoulat à Saint-Gauzens.                                                               BRIATEXTE,  bastide fondée en 1287 par Simon de Briseteste, sénéchal de Carcassonne, pour le compte du roi Philippe le Bel, à l'emplacement du village cathare des Tourelles, rasé par les troupes de Simon de Montfort, en 1212. Cette nouvelle bastide devait contrecarrer sa voisine de Saint-Gauzens. Briatexte est une implantation royale réussie. Son plan, inclus dans un rectangle, affiche une évidence toute géométrique. Les quatre côtés de la place génèrent les rues principales délimitant des îlots d'importances variables. Les plus grands sont recoupés par des \"carreyrous\". Fortifiée au XIVe siècle, Briatexte tombe dans la tourmente des guerres de religion. Les habitants, convertis au protestantisme, en firent un véritable bastion, que ne fera céder aucune attaque. C'était la demeure de messire de Montalivet, consul protestant de la ville au début du XVIIe siècle. Lors de la première rébellion huguenote, en 1622, les troupes catholique de César duc de Vendôme puissantes mettent le siège devant Briatexte après avoir pris et brûlé Lombez. La place, était commandée par le capitaine Faucon, qu'Henri de Bourbon, marquis de Malauze le chef des protestants de la région, Grace aux renforts et à la poudre fournis par le marquis de Malauze, le capitaine Faucon soutint le siège durant un mois et repoussa cinq assauts. Malauze se tenait, en soutien, à Saint-Paul-de-Damiatte.                                                                 POUJOULAT pas d'information historique.","architecture":"Briatexte, bastide,  les encadrements des baies et les larges arcs plein-cintres du rez-de-chaussée appareillés en pierre, forment un vibrant contraste avec la brique, aujourd'hui l'église se dresse à l'extérieur des anciennes fortifications, et le Dadou reste le dernier fossé défensif de la ville. Depuis le pont, s'offre à vous une vue pittoresque sur le moulin-pigeonnier. Les encadrements des baies et les larges arcs plein-cintres du rez-de-chaussée appareillés en pierre, forment un vibrant contraste avec la brique.   Revenue à la religion officielle après la révocation de l'édit de Nantes, la bastide vit ses fortifications rasées en 1629, puis son temple détruit en 1685.                                                                                       Poujoulat; rectangulaire de deux niveaux et attiques  toit en croupes sur corps de logis  avec tours carrées en saillie  en angles.","habitants":"Messire de Montalivet\r\n        \"","divers":"Le château de Montalivet de Poujalat à Saint-Gauzens et le moulins de Saint-Pierre.","gps":"","images":["../../jctruffet.com/image/image_81/81_Briatexte_1.jpg","../../jctruffet.com/image/image_81/81_Briatexte_2.jpg","../../jctruffet.com/image/image_81/81_Briatexte_3.jpg","../../jctruffet.com/image/image_81/81_Briatexte_4.jpg","../../jctruffet.com/image/image_81/81_Briatexte_5.jpg"]},"Consult_chateau_formulaire54e3":{"id":"Consult_chateau_formulaire54e3","dept":"81","canton":"Albi","commune":"Marssac sur Tarn","nom":"Buc","type":"Château","periode":"XVII","histoire":"BUC, occupant un château du XVIIe siècle,   Afin de faire revivre le domaine familial, Brigitte Lesage na pas hésité à quitter lAlsace pour le Tarn. Proche dAlbi et de Gaillac, il sétend sur 15 hectares de prés et de bois au milieu desquels fut construit le château au XVIIe siècle, restauré ensuite au XIXe siècle.  Brigitte Lesage, ancienne internationale de volley-ball, prolongera par mille anecdotes, comme celle de son arrière-grand-père qui connaissait le père de Toulouse-Lautrec.  Et puis des séjours et des circuits thématiques (brame du cerf, stages de transformation du canard, vins de Gaillac, pigeonniers, dont celui superbe du domaine). Un lieu unique au pays de Jean Jaurès. Chambres d'hôtes.","architecture":"Il faut franchir la porte pour en découvrir les vrais charmes : un incroyable salon voûté en briques du XVIIe siècle, Restauré ensuite au XIXe, se constitue d'un corps de logis rectangulaire à deux niveaux  avec une lucarne centrale des deux façades, accolés d'une tour polygonale avec toit pointu à cône polygonal. Prolongé sur les flancs  de  côté d'un édifice d'un niveau et deux travées  à toit plats.","habitants":"Madame Brigitte Lesage\r\n        \"","divers":"Château du Buc à Marssac sur Tarn","gps":"","images":["../../jctruffet.com/image/image_81/81_Buc_1.jpg","../../jctruffet.com/image/image_81/81_Buc_2.jpg","../../jctruffet.com/image/image_81/81_Buc_3.jpg","../../jctruffet.com/image/image_81/81_Buc_4.jpg","../../jctruffet.com/image/image_81/81_Buc_5.jpg"]},"Consult_chateau_formulaire3bc0":{"id":"Consult_chateau_formulaire3bc0","dept":"81","canton":"Castres","commune":"Burlats","nom":"Burlats_Carla","type":"Château","periode":"XIV-XIX","histoire":"Trois châteaux à Burlats celui de Burlats du XIV-XXe siècle hôtel restaurant, celui d'Adélaïde et celui de Carla du XVI-XIXe siècles siège de Pierre Fabre. BURLATS, au XIVe siècle, les Montbrun étaient détenteurs des deux tiers de la seigneurie. Un acte de 1354 précise que ce dernier a été rédigé à Burlats, dans le château des Montbrun. Dans le même temps, les héritiers des Montfort les Comminges possédaient le troisième tiers de la seigneurie. Les constructions eurent à souffrir des guerres civiles du XVIe siècle, mais les dommages les plus graves furent causés en 1627 par les troupes de Rohan. Le château fut restauré vers 1620 par la famille de Grandis qui avait acquis une partie de la seigneurie de Burlats en 1595. La demeure passa ensuite à la famille de Bayard, qui en 1675 possédait Ferrières. Des vestiges de la demeure des Montbrun subsistent au deuxième étage du logis central: une porte donnant accès à la tour est surmontée d'un arc en accolade du XIVe siècle. La tour est plus ancienne que le reste du bâtiment et les travaux menés sous le règne de Louis XIII consistèrent probablement en la reconstruction partielle du château antérieur, édifié par les Castelpers ou même plus tôt par les Montbrun.                                                    CARLA, remonte à la seconde moitié du XIXe siècle, des fouilles ont révélé des restes datant du XVIe siècle, il n'est donc pas impossible qu'un bâtiment primitif ait existé prés du château actuel. A l'époque de la construction, le domaine appartenait à M. Roux, fils d'un procureur du roi. La propriété passa en 1874 à la famille Fau, famille protestante qui avait fait fortune dans la boulangerie, puis développa un goût prononcé pour la musique, montant même à Castres un quatuor de Stradivarius.                                          Le pavillon ADELAIDE une maison romane du XIIe siècle. Elle n'a  jamais été habitée par la vicomtesse d'Albi.","architecture":"Le pavillon d'Adélaïde à Burlats, une maison romane du XIIe siècle. La qualité de cette maison vient des cinq grandes fenêtres romanes géminées du second étage qui éclairaient une pièce unique. Longueur de la face sud : 15,30 m Longueur de la face nord : 15 m  Largeur : 8,40 m. Le bâtiment avait trois niveaux à l'origine. Le premier niveau était à l'origine entièrement aveugle. Le deuxième niveau avait de petites ouvertures qui devaient servir à la défense de la maison. Le troisième niveau devait être celui de l'habitat et était aveugle du côté Est et nord d'où soufflent les vents les plus froids. Il comporte cinq baies, quatre au sud et une à l'ouest.                                                                                           Le château de Burlats situé à l'ouest de la collégiale, présente un plan en U.   Des vestiges de la demeure des Montbrun subsistent au deuxième étage du logis central: une porte donnant accès à la tour est surmontée d'un arc en accolade du XIVe siècle. La tour est plus ancienne que le reste du bâtiment et les travaux menés sous le règne de Louis XIII consistèrent à la reconstruction partielle du château antérieur, édifié par les Castelpers ou même plus tôt par les Montbrun.Le château du XVIIe siècle conserve une tour du XIVe siècle dit la tour de la Bistoure, Elle est une des quatre portes de l'enceinte de la place forte convoitée par Huguenots et Catholiques lors des guerres de religion.\r\nLe château Carla du XVIIe siècle est aujourd'hui un hôtel, le Castel de Burlats. D'une grande simplicité de conception, très élégant, le château se présente sous la forme d'un corps central de trois travées, flanqué d'ailes légèrement saillantes de deux travées, présentant la même élévation que le corps central. La seule animation de cette façade aux horizontales soulignées par des bandeaux et des corniches, réside dans le portique dorique marquant l'entrée. Cet élégant morceau d'architecture classique suffit à ennoblir la façade, qui n'est pas sans rappeler certains édifices néo-classiques élevés dans la région quelques décennies plus tôt.","habitants":"Famille de Grandis                                                                            Famille Fau\r\n        \"","divers":"Le château de Burlats, de Carla et le pavillon d'Adélaïde","gps":"","images":["../../jctruffet.com/image/image_81/81_Burlats_Carla_1.jpg","../../jctruffet.com/image/image_81/81_Burlats_Carla_2.jpg","../../jctruffet.com/image/image_81/81_Burlats_Carla_3.jpg","../../jctruffet.com/image/image_81/81_Burlats_Carla_4.jpg","../../jctruffet.com/image/image_81/81_Burlats_Carla_5.jpg","../../jctruffet.com/image/image_81/81_Burlats_Carla_6.jpg","../../jctruffet.com/image/image_81/81_Burlats_Carla_7.jpg"]},"Consult_chateau_formulaire5bf6":{"id":"Consult_chateau_formulaire5bf6","dept":"81","canton":"Carmaux","commune":"Les Cabannes","nom":"Cabannes","type":"Château","periode":"XV","histoire":"deux châteaux à les Cabannes, celui de Carjac du XV-XXe siècles et celui de Malbosc du XVe siècle avec tours rondes.                                                     CABANNES, à lorigine, le village des Cabannes était le lieu dhabitation des ouvriers carriers qui exploitaient les carrières du Garissou, nom donné à la roche calcaire dolomitique extraite ici. Cette carrière fournissait une grande partie de la matière première ayant servi à lédification de Cordes. Plus tard, ce furent les tanneurs travaillant à Cordes qui sy installèrent. Actuellement, le centre historique du village abrite un riche patrimoine architectural : léglise Saint-Antoine, la Tour Sarrasine, anciennement rattachée au château de Cajarc, ayant appartenu au marquis de Saint-Félix, la place du même nom et ses demeures typiques et la croix en fer forgé du XIVe siècle.                                                                                                                          CARJAC, comme la plupart des manoirs du Cordais, il date du début du XVI siècle. Il est construit sur le flanc dune colline, dominant la vallée du Cérou, sur un ancien château du XIII siècle. Il sagit du château dit \" des Corrompis \". En 1544, le seigneur Paul de Cajarc lui donna son nom. Situé non loin de léglise St Antoine, sa terrasse  est bordée de deux constructions en belles pierres calcaires du pays, porte renaissance où les armoiries ont été rasées par la Révolution, bel escalier à vis. La partie actuelle la plus ancienne du château conserve de belles fenêtres à croisées de meneaux de la fin du XVe siècle. Il a subi au cours des ans des remaniements qui nont nui en rien à sa beauté. Il semble navoir eu comme occupants que les familles de Cajarc, de St Félix de Mauremon (né en 1793 ) et actuellement, la famille Galaup-Dorchies.                                                                                MALBOSC, ce manoir est connu depuis 1432 L'on sait que la famille Delhom ou de L'Holm devint de Malbosc par le mariage avec l'héritière du lieu, en 1497,  madame de Vaure de Molinier, les Molinier étant les premiers seigneurs connus de Malbosc. En 1544, Paul de Cajarc était seigneur du château de Corrompis.","architecture":"Malbosc, ce manoir est connu depuis 1432 sous le nom de Fortalicium et mentionné en 1523 en tant que castrum. Cest un très joli exemple des manoirs rustiques conservés aux alentours de Cordes, ensemble de constructions sur les côtés  d'une cour rectangulaire, avec, dans une tour  dominante, un escalier en vis. La porte d'entrée est défendue par un encorbellement à mâchicoulis. Quatre meurtrières sont percées dans ce mur, 2 en face et 2 de chaque côté. Au-dessous des premières est encastrée une pierre carrée sur laquelle sont gravées les armoiries, (au centre de l'écu un lion puis un croissant  à dextre une sorte de bourdon de pèlerin ou de crosse) et la date  de 1629.  Cette tour est isolée et il pourrait s'agir d'une tour à signaux d'un ancien château aujourd'hui disparu. La tour de section carrée dispose d'une salle voûtée d'arête au rez-de-chaussée, dont l'accès était autrefois uniquement par un trou dans la voûte. L'entrée se situait à quatre mètres de hauteur au premier étage. Le dernier étage est tronqué.\r\nLa construction est en pierre de schiste que l'ont trouve localement en abondance grâce aux carrières de Corrompis. Elle ressemble beaucoup à la tour-donjon de Salles, citée à une dizaine de kilomètres.","habitants":"Famille Galaup-Dorchies                                                                     Famille Delhom\r\n        \r\n        \"","divers":"La tour à Cabannes  la maison forte de Carjac et  le château de Malbosc.","gps":"","images":["../../jctruffet.com/image/image_81/81_Cabannes_1.jpg","../../jctruffet.com/image/image_81/81_Cabannes_2.jpg","../../jctruffet.com/image/image_81/81_Cabannes_3.jpg","../../jctruffet.com/image/image_81/81_Cabannes_4.jpg","../../jctruffet.com/image/image_81/81_Cabannes_5.jpg","../../jctruffet.com/image/image_81/81_Cabannes_6.jpg"]},"Consult_chateau_formulaire8e7c":{"id":"Consult_chateau_formulaire8e7c","dept":"81","canton":"Albi","commune":"Cagnac-les-Mines","nom":"Cagnac","type":"Château","periode":"XVII","histoire":"CAGNAC, la seigneurie de Cagnac, qui faisait partie de Castelnau-de-Lévis et qui en a été détaché en 1833 pour faire partie de la commune de Saint-Sernin-lès-Mailhoc, nom qui sera remplacé par celui de Cagnac-les-Mines. La seigneurie appartient depuis Pons Delpuech, jusqu'au XVIIIe siècle aux Del Puech. Pons est le premier seigneur connu des Del Puech de la branche des seigneur de Canhac, coseigneur de La Bastide-Lévis, seigneur de Carmaux. En 1260 et 1288, Guillaume, le fils de Pons Bernard se signale en cédant la portion de dîme de Saint-Dalmaze qu'il possède au profit du chapitre Sainte-Cécile d'Albi,  passe ensuite à la famille de Roquefeuil le 17 mai 1696 par le mariage de Charlotte Dupuy, nièce d'Isabeau Dupuy, dame de Cagnac avec Charles de Roquefeuil, seigneur de La Crouzette. C'est le troisième enfant du couple, Antoine de Roquefeuil, qui va hériter à la mort de son père Charles, du titre de seigneur de Cagnac jusqu'à son décès, enterré 6 août 1736, dans le cimetière voisin de Sainte-Martianne. C'est le dernier seigneur de Cagnac.","architecture":"Le château de Cagnac  était, autrefois,entouré de vieilles maisons, sur un mamelon dont la hauteur n'a rien d'intimidant. Son donjon, paraît-il, faisait concurrence à celui de Castelnau-de-Lévis et dut s'abaisser devant son rival ; mainte querelle de seigneurs alertait les paysans. De ce château et de ce vieux Cagnac la pioche des démolisseurs, il n'y a pas extrêmement longtemps, eut raison. Il n'en reste pas pierre sur pierre, de conception rectangulaire.  Le nouveau quadrilatère avec des corps de logis à deux niveaux  flanqués de tourelles en angles.","habitants":"Famille de Charles de Roquefeuil.\r\n        \"","divers":"Le hameau de Cagnac les Mines","gps":"","images":["../../jctruffet.com/image/image_81/81_Cagnac_1.jpg","../../jctruffet.com/image/image_81/81_Cagnac_2.jpg","../../jctruffet.com/image/image_81/81_Cagnac_3.jpg"]},"Consult_chateau_formulaire8adc":{"id":"Consult_chateau_formulaire8adc","dept":"81","canton":"Rabastens","commune":"Cahuzac-sur-Vère","nom":"Cahuzac_Vère","type":"Château","periode":"XV-XVI","histoire":"trois châteaux à Cahuzac sur Vère, celui de la Salettes  du XV-XVIe siècles  avec tours circulaires,celui de Larroze du XIXe siècle chambres d'hôtes.  Et de Porthos.                                  SALETTES, Le domaine passa ainsi dans la sous branche des seigneurs de Puechmignon, seconde maison des Lautrec. Le château resta durant le XVe siècle la propriété des Lautrec. Au XVIe siècle, Hugues III de Toulouse-Lautrec négocia toute une partie de la seigneurie de Salettes à Pierre dHautpoul, conseiller au parlement de Toulouse. Sa famille, issue de Mazamet, chassée par Simon de Montfort, émigra à Rennes-Les-Bains. Par son acquisition, Pierre dHautpoul fut le fondateur de la branche des Hautpoul-Salettes. Le futur général dEmpire Jean-Joseph-Ange d'Hautpoul naquit dans le château en 1754. En 1885, la famille dHautpoul vendit le château de Salettes, qui passa ensuite dans les mains de différents propriétaires. En novembre 1994, Roger Paul Le Net achète pour la qualité de son terroir les vignes de Salettes avec le château alors en ruines. En décidant de créer un hôtel restaurant, il a voulu retrouver la structure dorigine et lallier au design de notre temps. Ainsi souvre en juillet 1999 une nouvelle page de lhistoire du château. Le château de Salettes dresse ses tours et son mur denceinte, au beau milieu de ses vignes. Bâtisse de caractère et de charme, datant des XIIIe et XV e siècles, le château de Salettes fut la demeure de la branche cadette des Toulouse-Lautrec puis de la famille dHautpoul.                                                                                                      LARROZE chambre d'hôtes de la famille  Noblet.                             PORTHOS et La-VERE du XVIIIe siècle, ancien pavillons de chasse, pas d'information historique aujourd'hui chambres d'hôtes de Jean Pierre Cavalade.","architecture":"Salettes, il d
