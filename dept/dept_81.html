En 1223, durant la croisade des albigeois, Amaury de Montfort se rend maître du château. Il est repris par les hérétiques peu de temps après. En 1229, lors de la signature du traité de Meaux, le comte du Toulouse est prié de remettre le château au pouvoir royal. En 1243, un nouveau traité réclame encore Penne à Raymond VII. Mais Olivier et Bernard de Penne ne s'inclinent pas face au pouvoir. Ils se soumettent finalement à Alphonse de Poitiers, devenu comte de Toulouse, qui confirme les privilèges des habitants de Penne. Il fait aménager le château et fait déménager les archives de son comté. En 1271, à sa mort, Penne est réuni au domaine de la Couronne. En 1365, un capitaine gascon du nom de Mongat, agissant pour les anglais, prend Penne. En 1374, Penne est repris par les Français délivré par Du Guesclin. En 1384, les anglais reprennent le village et le conservent jusqu'en 1451. Le château est démantelé en 1586, et laissé à l'abandon pendant 420 ans, en 1732 la baronnie possession du maréchal de Belle-Ile et le vend à Guillaume d'Ouvrier qui le gardera jusqu'à la Révolution qui le consacre  à la fin définitive du rôle défensif de la forteresse. Jusqu'à l'acquisition au début des années 80 par Me Breuil, avocat, puis en 2006 par un architecte, monsieur Axel Letellier.","architecture":"Penne, une basse-cour est située sur le côté sud du château. On peut encore observer un châtelet au sud-ouest, bien conservé avec ses deux tours. La première, circulaire, date du XIIIe siècle et la seconde, plus grosse, date du XIVe siècle. Le châtelet a inspiré la porte Narbonnaise de l'enceinte de Carcassonne. Il est défendu par une tour d'éperon et une tour circulaire. Le châtelet renferme deux joyaux médiévaux, un assommoir de trois mètres par trois et au rez-de-chaussée de la tour ronde, une salle d'archères à la maçonnerie presque intacte. Le donjon, qui domine l'ensemble des constructions, est entouré d'une enceinte irrégulière percée d'archères. De nos jours, il subsiste quelques restes de l'enceinte fortifiée. Le bâti représente 3500 m², au XVIIIe siècle sert de prison.","habitants":"Guillaume d'Ouvrier\r\n        \"","divers":"Vestiges du château de Penne","gps":"","images":["../../jctruffet.com/image/image_81/81_Penne_1.jpg","../../jctruffet.com/image/image_81/81_Penne_2.jpg","../../jctruffet.com/image/image_81/81_Penne_3.jpg","../../jctruffet.com/image/image_81/81_Penne_4.jpg","../../jctruffet.com/image/image_81/81_Penne_5.jpg","../../jctruffet.com/image/image_81/81_Penne_6.jpg","../../jctruffet.com/image/image_81/81_Penne_7.jpg"]},"Consult_chateau_formulairea952":{"id":"Consult_chateau_formulairea952","dept":"81","canton":"Lavaur","commune":"Lavaur","nom":"Poudéous","type":"Château","periode":"XIX","histoire":"POUDEOUS, jusqu'au XIXe siècle s'élevait à l'emplacement du château de Poudéous un plus ancien qui avait été au XVIIIe siècle, propriété d'une des branches de la puissante famille de Rivals. C'est madame Daguilhon Lasselve qui le fit reconstruire  après la démolition de l'ancien, elle n'avait pas eu d'architecte, elle en avait fait le plan, en avait réglé non seulement l'extérieur, mais aussi l'ordonnance intérieure, la succession de la salle à manger, des salons et de tous les appartements.","architecture":"Poudéous Le toponyme existe déjà à la fin du XVIIIe siècle : une paroisse avec château est signalée au lieu-dit \"Poudeux\" . Poudéous, château de plan rectangulaire, construit sur un soubassement et auquel on accède par des perrons. La façade donnant sur le parc est flanquée de deux hautes tours polygonales à deux étages, surmontées de hautes toitures également polygonales. Les façades comptent sept travées, tandis que les façades latérales n'en comportent que quatre. La beauté de cette remarquable architecture de style Second Empire tient à l'effet de polychromie donné par les matériaux.","habitants":"Famille de Daguilhon Lasselve\r\n        \r\n        \"","divers":"Château de Poudéous  à Lavaur","gps":"","images":["../../jctruffet.com/image/image_81/81_Poudeous_1.jpg","../../jctruffet.com/image/image_81/81_Poudeous_2.jpg","../../jctruffet.com/image/image_81/81_Poudeous_3.jpg","../../jctruffet.com/image/image_81/81_Poudeous_4.jpg"]},"Consult_chateau_formulaire4ce6":{"id":"Consult_chateau_formulaire4ce6","dept":"81","canton":"Réalmont","commune":"Poulan-Pouzols","nom":"Poulan","type":"Maison forte","periode":"XV-XX","histoire":"POULAN, célèbre durant les guerres de Religion qui coïncident avec les premières mentions conservées faisant état du château, il fut occupé à cette époque par les protestants. Le premier document attestant l'existence du château remonte à 1598, date à laquelle le capitaine Puech s'en empara et fit prisonnier le seigneur de Poulan.","architecture":"la maison forte dite château de Poulan est édifié sur des bases du XIIe siècle, mais il date dans son état actuel de la fin du XVe siècle.  Il possède un grand corps de logis à deux étages construit solidement en moellons bien appareillés, protégé par une tour défensive où se trouve l'entrée et dont un côté fait face à la campagne et l'autre à la cour. L'entrée est située dans une tour accolée à la façade de ce qui était jadis la cour intérieure, cette tour abritant l'escalier à vis. La porte d'entrée fait face à la tour défensive présentant de ce côté une meurtrière. Le rez-de-chaussée était éclairé par des fenêtres sur la cour intérieure alors que les étages prenaient au contraire la lumière sur deux côtés. Le château possède à lest et à louest deux tours qui furent abaissées, pendant la Révolution, à la hauteur des toitures. Il est formé dun grand corps de logis sur deux étages. Les murs du logis ont une épaisseur denviron mètre. La tour défensive est située face à lentrée, elle permettait de protéger le château : dun côté elle donnait sur la cour et sur lautre sur la campagne.","habitants":"seigneur de Poulan.\r\n        \"","divers":"La maison forte de Poulan à Poulan Pouzols","gps":"","images":["../../jctruffet.com/image/image_81/81_Poulan_1.jpg","../../jctruffet.com/image/image_81/81_Poulan_2.jpg","../../jctruffet.com/image/image_81/81_Poulan_3.jpg"]},"Consult_chateau_formulaire2729":{"id":"Consult_chateau_formulaire2729","dept":"81","canton":"Sémalens","commune":"Prades","nom":"Prades_Parayre","type":"Maison forte","periode":"XVI","histoire":"Deux châteaux à Prades, celui d'en Parayre et celui des Tours.                                                                                                                     DE-PARAYRE,  son histoire est intimement liée à celle de la famille de Clauzade dont la lignée commença avec Arnaud, ses descendants devinrent propriétaires du domaine vers 1680. Jacques de Clauzade bâtit vers 1800 l'extension constituant l'aile Est. Il a été vendu en 1862 à monsieur Fourgassié qui, passionné d'agriculture, transforma profondément le château et ses dépendances pour lui donner l'aspect d'un grand domaine agricole du XIXe siècle qu'on lui connaît aujourd'hui. Il fit agrandir le corps de logis principal en construisant une aile ouest, mais aussi une deuxième tour à l'est placée symétriquement par rapport à la première. Il transmit par alliance le domaine à la famille de Juge de Montespieu. Il est depuis resté dans la descendance  est entretenu et restauré avec talent par ses propriétaires.                                                            Des TOURS,  au XVIe siècle le pastel fit la fortune de grands propriétaires fonciers et de nombreux châteaux virent le jour ou s'embellirent comme le château de Tours.  Mais ce siècle fut également celui des guerres de Religion, Prades et les alentours n'échappèrent pas au lot commun.","architecture":"De Parayre,  en 1583  une maison-forte rectangulaire flanquée d'une tour carrée,  possède des dépendances pour lui donner l'aspect d'un grand domaine agricole du XIXe siècle qu'on lui connaît aujourd'hui. Le corps de logis principal fut agrandit en construisant une aile ouest, mais aussi une deuxième tour à l'est placée symétriquement par rapport à la première.              PRADES, château des TOURS  d'origine du XIIIe siècle, détruit lors de croisade contre les Albigeois. Le 17 septembre 1628, il fut pris par Condé. Corps de logis XVIIe siècle, plafonds et enduits peints, imposant portail du XVIIe. Façade arrière du XVe siècle. Nombreux vestiges du Moyen-Age (rempart, bases de tours, etc. ). Plusieurs silos à grains du Moyen-Age.   Aujourd'hui l'entrée de la propriété se fait par un imposant portail du XVIIe siècle l'édifice possède un corps de bâtiment de la même époque, à l'intérieur, plafonds et enduits peints. La façade postérieure date du XVe siècle.","habitants":"Famille de Clauzade\r\n        \"","divers":"Château d'en Parayre et des Tours à Prades.","gps":"","images":["../../jctruffet.com/image/image_81/81_Prades_Parayre_1.jpg","../../jctruffet.com/image/image_81/81_Prades_Parayre_2.jpg","../../jctruffet.com/image/image_81/81_Prades_Parayre_3.jpg"]},"Consult_chateau_formulaire797d":{"id":"Consult_chateau_formulaire797d","dept":"81","canton":"Sémalens","commune":"Brousse","nom":"Puechassaut","type":"Château","periode":"XVI-XX","histoire":"PUECHASSAUT,  Jean de Capriol possesseur de la terre de Puéchassaut fit édifier le château par François Dumoulin, maître maçon, le 8 mars 1557, devenant fondateur de la branche des Capriol Puéchassaut. Le château devait avoir aux angles trois tours circulaires à l'extérieur et carrées à l'intérieur, munies d'une petite fenêtre et de meurtrières à chaque étage. Pendant la Révolution, un descendant de Jean de Capriol ayant émigré, le château fut confisqué puis finalement restitué en mauvais état. Le dernier seigneur de Puéchassaut, Pierre-Gaspard de Capriol mourut en 1809. Par la suite, le château passa à divers propriétaires.","architecture":"Château de Puéchassault du XVIe siècle avec quatre tours rondes, fortement remanié, il présente une belle façade symétrique de cinq travées flanquée de deux hautes tours rondes coiffées de toits plats en tuiles, tandis que le bâtiment a reçu un comble en pavillon recouvert d'ardoise. La façade dont le premier niveau est couronné d'un attique n'a reçu aucune animation, si ce n'est les bandeaux soulignant les étages. Venant compléter le panorama de ce beau domaine, on découvre d'un côté du bâtiment de vastes communs et de l'autre un vieux pigeonnier.","habitants":"Famille de  Jean de Capriol\r\n        \"","divers":"Château de Puechassaut à Brousse.","gps":"","images":["../../jctruffet.com/image/image_81/81_Puechassaut_1.jpg","../../jctruffet.com/image/image_81/81_Puechassaut_2.jpg","../../jctruffet.com/image/image_81/81_Puechassaut_3.jpg"]},"Consult_chateau_formulaire8924":{"id":"Consult_chateau_formulaire8924","dept":"81","canton":"Sémalens","commune":"Puycalvel","nom":"Puycalvel","type":"Château","periode":"XV-XVI","histoire":"PUYCALVEL, le château est l'un des plus anciens du Lautrécois. Il appartenait au XIIIe siècle, sous la suzeraineté des vicomtes, à la famille Sicard. On trouve comme seigneur de Puycalvel en 1410, dame Marguerite de Châteauverdun. En 1750, la seigneurie a changé de famille puisque le seigneur de Puycalvel est Jean de Verdiguier de La Salle. Puis Puycalvel changea plusieurs fois de mains après la Révolution.","architecture":"Puycalvel, du XVe et XVIe siècles, le château actuel vaut par sa position et par sa tourelle prenant naissance sur une console de pierre de taille et terminée en pointe à cinq mètres au dessus de la toiture. Le château conserve également une porte en ogive, un couloir fermé autrefois par une herse et dont les côtés sont percés de deux rangs de larges meurtrières, ainsi qu'une cour entourée d'une galerie voûtée.","habitants":"Famille de Jean de Verdiguier de La Salle\r\n        \"","divers":"Château de Puycalvel","gps":"","images":["../../jctruffet.com/image/image_81/81_Puycalvel_1.jpg","../../jctruffet.com/image/image_81/81_Puycalvel_2.jpg","../../jctruffet.com/image/image_81/81_Puycalvel_3.jpg","../../jctruffet.com/image/image_81/81_Puycalvel_4.jpg"]},"Consult_chateau_formulaire7377":{"id":"Consult_chateau_formulaire7377","dept":"81","canton":"Rabastens","commune":"Puycelsi","nom":"Puycelsi","type":"Forteresse","periode":"X","histoire":"le patrimoine de Puycelsi se compose  des remparts de la ville, de la maison du Gouverneur, du château de Terride (voir article)et de Larroque.                                                                             PUYCELCI, la ville est fondée au Xe siècle par les moines bénédictins de l'abbaye d'Aurillac, à proximité d'un ancien site préhistorique. Le comte de Toulouse en était en partie seigneur à la fin du XIIe siècle et acquiert de nouveaux droits en 1224 Alphonse de Poitiers devient le seul seigneur et le château revient au roi de France qui y installe un châtelain. Lieu convoité, elle subit plusieurs sièges, en particulier par Simon de Montfort durant la croisade des Albigeois (1211-1213). Le château fut démantelé à l'occasion du traité de Meaux en 1229, et ses ruines furent déblayées en 1830  pour aménager la place actuelle du Grand Saint-Roch.\r\nLa ville fut aussi assiégée par les pastoureaux en 1320 et par les Anglais en 1386 (guerre de Cent Ans). Elle ne fut jamais prise de force. En 1791, les localités et paroisses de Saint-Nazaire-de-Larroque, de Saint-Martin-d'Urbens et de Notre-Dame-de-Mespe sont détachées du territoire de Puycelsi pour former la commune de Larroque. Le village, chef-lieu de commune,\r\n GOUVERNEUR, pas d'information historique.","architecture":"PUYCELSI, remparts du XIVe siècle. Système de défense unique qui résidait en un couloir étroit entre deux portes  qui courent sur 800 mètres à la période médiévale faisait le tour de la ville. La porte de lIrissou possède un double système de défense. Elle se trouve à proximité de la tour de la prison ; le tout surplombe les lices. Le château fort édifié à la pointe  sud-ouest des remparts démoli après le traité de Paris en 1229 restera en ruines jusqu'en 1830. cette architecture  militaire complété par les tours surmontant chacune des deux portes romanes de l'Irissou.\r\nChâteau des capitaines-Gouverneurs du XVe siècle.\r\nChapelle Saint-James dite « des templiers ».\r\nNombreuses maisons des XVe et XVIe siècles dont la mairie.","habitants":"Alphonse de Poitiers\r\n        \"","divers":"Fortifications du village de Puycelsi;, château du Gouverneur et de Larroque.","gps":"","images":["../../jctruffet.com/image/image_81/81_Puycelsi_1.jpg","../../jctruffet.com/image/image_81/81_Puycelsi_2.jpg","../../jctruffet.com/image/image_81/81_Puycelsi_3.jpg","../../jctruffet.com/image/image_81/81_Puycelsi_4.jpg","../../jctruffet.com/image/image_81/81_Puycelsi_5.jpg","../../jctruffet.com/image/image_81/81_Puycelsi_6.jpg","../../jctruffet.com/image/image_81/81_Puycelsi_7.jpg","../../jctruffet.com/image/image_81/81_Puycelsi_8.jpg","../../jctruffet.com/image/image_81/81_Puycelsi_9.jpg"]},"Consult_chateau_formulaire026f":{"id":"Consult_chateau_formulaire026f","dept":"81","canton":"Albi","commune":"Puygouzon","nom":"Puygouzon","type":"Château-vestiges","periode":"XI-XIX","histoire":"Deux châteaux à Puygouzon dont le Montsalvy vestiges  et celui de Creyssens.                                                                         PUYGOUZON, le château de Montsalvy, dont il ne subsiste que des pans de murs, a appartenu aux chanoines du chapitre de St Salvy, seigneurs de Montsalvy. Son histoire fut mouvementée. En 1294, le prieur Abric y fut assassiné. En 1333 il y eut un vol retentissant. La sentence du tribunal fut «trompetée», le voleur condamné et pendu. À proximité, les chanoines possédaient une garenne, un lieu de chasse. Un lieu-dit porte encore aujourd'hui le nom de La Garenne. Pendant la guerre de cent ans, Albi redoutait l'arrivée des Anglais. Dès qu'une rumeur les annonçait du côté de Puech de Gozon, on envoyait de nuit, deux jeunes gens pour s'en assurer. Cette expédition périlleuse leur rapportait trois sous chacun. Le château, jugé alors hors d'état de résister aux envahisseurs, fut démantelé. Les commissaires du roi obligèrent les habitants de Montsalvy à se mettre à l'abri à Albi et leur demandèrent de les aider à «clôturer la ville». Ce qu'ils refusèrent. Un procès s'en suivit. Il dura deux ans. La forteresse fut restaurée au siècle suivant et joua un rôle pendant les guerres de religion. Le château devint le théâtre sanglant d'escarmouches entre protestants et catholiques.                                                                                                        CREYSSENS de style  néo-renaissance, a appartenu  de 1689 à 1889 à la famille Féral , Isidore Féral adjoint au maire de Toulouse, membre du conseil général de la Haute-Garonne vend en 1889  à Jean-François Gisclard docteur, sa fille Marie-Lucie épouse Alban Rossignol meurt en 1950, Anne Rossignol veuve habite le château.","architecture":"Vestiges et ruines de deux châteaux celui de Puygouzon et de Mont-Salvy. Le capitaine catholique Teyssier accourut et chassa de Bages de Montsalvy . Le château redevient catholique en 1584. Le conseil de guerre de «La Ligue» siégeant à Albi signifia alors au chapitre de St Salvy sa volonté de mettre en place un système de protection du château. Les chanoines suggèrent au conseil de solliciter «ceux qui avaient des biens dans la Seigneurie», indiquant qu'ils étaient prêts à contribuer aux dépenses et que si l'on voulait démanteler le fort, ils y consentaient. Ce qui fut fait. En 1595, les habitants de Montsalvy se rallièrent à Henri IV. Grâce à l'Edit de Nantes, la liberté de culte s'installe. À sa révocation, par crainte de soulèvements, les habitants des contrées protestantes sont désarmés. Ceux de Montsalvy remettent leurs armes à Philippe Meut, alors consul de Montsalvy.                                                 Creyssens,  de style  néo-renaissance château dit de la belle époque avec ses belles fenêtres à meneaux, ses tourelles et sa toiture coiffée d'Ardoise et de lucarnes à fronton. Le rez-de-chaussée et le premier étage datent de la fin  du XVIIIe siècle, remanié au XIXe siècle rajout d'un deuxième étage et des poivrières.","habitants":"Famille Féral\r\n        \"","divers":"Château de Montsalvy à Puygouzon et le château de Creyssens.","gps":"","images":["../../jctruffet.com/image/image_81/81_Puygouzon_1.jpg","../../jctruffet.com/image/image_81/81_Puygouzon_2.jpg","../../jctruffet.com/image/image_81/81_Puygouzon_3.jpg","../../jctruffet.com/image/image_81/81_Puygouzon_4.jpg"]},"Consult_chateau_formulaire395c":{"id":"Consult_chateau_formulaire395c","dept":"81","canton":"Puylaurens","commune":"Puylaurens","nom":"Puylaurens","type":"Château","periode":"XIIIXVI","histoire":"Cinq châteaux à Puylaurens celui de Puylaurens  du XIIIe siècle, de Caudeval du XVIe siècle, d'En-Pinel , de Mirabel, d'Orcières et de Saint-Loup.                                                             PUYLAURENS, en 1202, naissance de Guillaume de Puylaurens, a été confiée aux corvées cathares sur ordre de Saint-Louis, dont les parents Blanche de Castille et Louis VIII auraient séjourné à Puylaurens. En ce début du  XIIIe siècle, le château est occupé par Sicard, vassal de Raymond comte  de Toulouse.  En 1209, début de la croisade des Albigeois. Vers 1210 , Sicard, seigneur de Puylaurens, rejoint le comte de Toulouse. Simon de Monfort devient le seigneur du château. En juillet 1464, par ses lettres patentes, le roi Louis XI de 1423 à 1483 autorisa trois foires annuelles par an, en confirmant les privilèges de la ville attribuées par ses prédécesseurs.   Vers 1220, Sicard récupère son château.                                                                                      CAUDEVAL, il appartient  à plusieurs familles.  Après les temps troublés de la Révolution durant lesquels le château avait été vendu comme bien démigré, il fut racheté sous lempire par Clément-Joseph de la Jonquière. Il échut en 1881 au vicomte Albert de la Jonquière, qui fit démolir le château ancien devenu trop vétuste et reconstruit une demeure au goût du jour par un élève de Viollet le duc, Florent.                                                                                       D'En-PINEL transformé en hôtel restautant par monsieur Piguié.                                                                                                          MIRABEL, ORCIERES et ST-LOUP pas d'information historique.","architecture":"PUYLAURENS, l'édification du château Cap de Castel, dont la fin de construction date de 1258,  bâtiment de briques  est situé à la tête du village  et a servi les intérêts convergents de Rome et de Paris dans la répression des Cathares. Deux fonctions parallèles, politique et religieuse, lui étaient assignées : Chapelle et prison du village. Il est aujourd'hui intégré à l'hôtel qui porte son nom.                                                                         CAUDEVAL, fut construit au XIIe siècle, est juché sur une terrasse surplombant lAgoût à lest. Les trois autres flancs sont entourés de douves et les murs sont rythmés par des piliers à boules du XVIIe siècle. Deux ponts enjambes ces douves et permettent daccéder aux cours du château, deux tours rondes, cet édifice est une construction ancienne, mais les travaux menés pour le restaurer au XIXe siècle. Le corps de logis, est construit dans un petit appareil ou se mêle la brique et présentant un étage de colombages garni de brique, mais toutes les fenêtres ont été redistribuées et le toit à été remplacé au XIXe siècle par un comble brisé d'ardoise sous lequel courent de petites consoles. C'est sur les deux tours, garnies de créneaux à l'époque moderne, que l'on trouve les traces d'ouvertures anciennes, notamment une belle petite fenêtre en accolade et, au hasard, sur les murs, on rencontre de jolis morceaux de sculpture tels que les deux personnages portant un écu.                                                                                        MIRABEL   reconstruit en 1810 sur les ruines d'une forteresse du Moyen-Age, les bâtiments ont été rénovés entre 1990 et 1993. Dans les bâtiments principaux tout a été reconstruit jusqu'aux murs dans un standard de très haute qualité.","habitants":"Famille Sicard                                                                                                 Famille de  Clément-Joseph de la Jonquière\r\n        \"","divers":"Château de Puylaurens  du XIIIe siècle, de Caudeval du XVIe siècle, d'En-Pinel , de Mirabel, d'Orcières et de Saint-Loup.","gps":"","images":["../../jctruffet.com/image/image_81/81_Puylaurens_1.jpg","../../jctruffet.com/image/image_81/81_Puylaurens_2.jpg","../../jctruffet.com/image/image_81/81_Puylaurens_3.jpg","../../jctruffet.com/image/image_81/81_Puylaurens_4.jpg","../../jctruffet.com/image/image_81/81_Puylaurens_5.jpg","../../jctruffet.com/image/image_81/81_Puylaurens_6.jpg","../../jctruffet.com/image/image_81/81_Puylaurens_7.jpg","../../jctruffet.com/image/image_81/81_Puylaurens_8.jpg","../../jctruffet.com/image/image_81/81_Puylaurens_9.jpg"]},"Consult_chateau_formulaireb001":{"id":"Consult_chateau_formulaireb001","dept":"81","canton":"Rabastens","commune":"Rabastens","nom":"Rabastens","type":"Forteresse","periode":"XVI-XVII","histoire":"Sept châteaux à Rabastens  celui de Saint-Géry (voir article) celui de Castagne du XVIe siècle; de Foncoussière, de Lacaze du XVIIe siècle, de Mézens et l'hôtel de Roland.   Hôtel de ville, ancien prieuré. Tourelle du XVIe siècle. Musée du pays Rabastinois : installé dans l'hôtel particulier du XVIIe siècle de la famille La Fite de Pelleporc de Gourdas. Le Pigeonnier, situé à la sortie de la ville, le long de la route de Saurs. Entouré d'un parc, l'endroit est généralement appelé le Pigo. Hôtel de la Castagne (actuelle école libre Puységur).  Ancien hôtel particulier du comte Louis Pierre de Chastenet de Puységur.\r\n ROLLAND .Simon Rolland, commerçant venant de Gaillac l'acheta en 1575 et ses descendants confièrent, en1871, la tâche de le rénover, l'agrandir et le décorer à l'architecte toulousain Germain Dutour, élève de Viollet le Duc. \r\n CASTAGNE date dans ses parties les plus anciennes du XVIe siècle, mais fut en grande partie remanié au XVIIIe siècle. Il fut lié de prés à l'histoire souvent belliqueuse de Rabastens et, après la bataille de Castelnaudary, Montmorency blessé s'y retira.                                                                                                                     Pas d'information historique pour les autres.","architecture":"Castagne date dans ses parties les plus anciennes du XVIe siècle, mais fut en grande partie remanié au XVIIIe siècle. Le portail d'entrée du château apparaît comme un beau morceau d'architecture et un exemple de sobriété classique allié au beau jeu de polychromie brique-pierre, même s'il est curieusement coincé dans le fond d'une rue. L'originalité de cette construction verticale réside dans les curieux pilastres composés de chaînages alternant brique et pierre, surmontés de chapiteaux doriques. La façade donnant sur le Tarn est une construction très haute, dénuée de style et flanquée de contreforts. À l'intérieur ne demeurent que quelques restes de l'ancien château mais on peut se rendre compte de la grande sobriété de l'architecture.                                                                      Hôtel de Rolland, château  du XVe siècle est construit à cet endroit un fortin crénelé doté d'une tour de même hauteur, également décorée de mâchicoulis et de créneaux. Il constitue le corps central de l'immeuble, constitué de créneaux sur les 4 immeubles composant l'ensemble, ajouta deux  échauguettes et une tourelle et remplaça la porte d'entrée par un portail monumental à l'ouest, surmonté d'une tour carrée.  Fortin crénelé avec une tour, agrandi en 1575, puis aux XVIIe et XVIIIe siècles. Logis restauré et entièrement redécoré au XIXe siècle, dans l'esprit néo-gothique, par l'architecte Louis Dutour. Cet édifice représente un exemple de région de l'évolution d'une construction urbaine noble entre le XVe et le XIXe siècle.","habitants":"Famille La Fite de Pelleporc de Gourdas\r\n        \"","divers":"Château Rolland, de Castagne, de Foncoussière, de Lacaze, de Mézens et des Tourelles.","gps":"","images":["../../jctruffet.com/image/image_81/81_Rabastens_1.jpg","../../jctruffet.com/image/image_81/81_Rabastens_2.jpg","../../jctruffet.com/image/image_81/81_Rabastens_3.jpg","../../jctruffet.com/image/image_81/81_Rabastens_4.jpg","../../jctruffet.com/image/image_81/81_Rabastens_5.jpg","../../jctruffet.com/image/image_81/81_Rabastens_6.jpg","../../jctruffet.com/image/image_81/81_Rabastens_7.jpg","../../jctruffet.com/image/image_81/81_Rabastens_8.jpg","../../jctruffet.com/image/image_81/81_Rabastens_9.jpg"]},"Consult_chateau_formulairede2f":{"id":"Consult_chateau_formulairede2f","dept":"81","canton":"Dourgne","commune":"Arfons","nom":"Ramondens","type":"Château","periode":"XIX","histoire":"RAMONDENS, Propriété, en son temps, du célèbre Pierre Paul Riquet, le domaine de Ramondens fût un témoin privilégié du temps passé. vers 1170, sans doute par les bandes dun seigneur local. Elle est reconstruite après la guerre contre les Albigeois, en 1236. Au XIVe siècle, la communauté se maintient tant bien que mal par sa production de viande et de lait. Par malheur, Arfons est ravagée par les Anglais vers 1350. \r\nA lépoque moderne, les conditions de vie saméliorent. De grandes et belles maisons sont construites, dont la « Chartreuse », belle bâtisse qui date sans doute, à vue de nez, du XVIIe ou du XVIIIe siècle. De la même époque,une belle Vierge, quon peut voir au coin dune maison, protégée par une grille de fer  joliment ouvragée.","architecture":"Ramondens, au pied de la montagne Noire et au beau milieu de sombres forêts, se cache le château de Ramondens. Au XIXe siècle, une source se trouvait près du château. On lappelait la Sagne Canine, et elle avait la vertu de rendre féconde les femmes qui buvaient de son eau. Château de plan rectangulaire à trois niveaux  avec série de lucarnes sur toits brisé à la Mansart, l'édifice est flanqué d'un donjon carré à mâchicoulis et crénelé et d'échauguettes en encorbellement sur les angles de la façade.","habitants":"Famille Pierre Paul Riquet\r\n        \"","divers":"Le château de Ramondens","gps":"","images":["../../jctruffet.com/image/image_81/81_Ramondens_1.jpg","../../jctruffet.com/image/image_81/81_Ramondens_2.jpg","../../jctruffet.com/image/image_81/81_Ramondens_3.jpg","../../jctruffet.com/image/image_81/81_Ramondens_4.jpg"]},"Consult_chateau_formulaire292d":{"id":"Consult_chateau_formulaire292d","dept":"81","canton":"Réalmont","commune":"Rayssac","nom":"Rayssac_Tarn","type":"Château","periode":"XVII","histoire":"Rayssac et ses environs; château du Bousquet, du Sénégats, à Saint-Pierre de Trivisy, pas d'information pour ces châteaux.                             RAYSSAC,  le château est une agréable demeure de style Henri IV, construit au XVIIe siècle en remplacement d'un autre édifice détruit pendant les guerres de religion. La famille de Bayne, originaire d'Arles, vint s'installer en 1242 à Escroux lors du mariage de l'un de ses membres avec l'héritière de la seigneurie d'Escroux. Un Bayne abjura la religion réformée peu de temps avant la révocation de l'Édit Nantes. Au moment de la Révolution, cette famille connue pour ses opinions ultras et craignant des représailles, quitta Gaillac pour aller s'installer à Rayssac. Le personnage le plus célèbre de cette famille est Louise de Bayne, petite fille du dernier seigneur de Rayssac. Elle fut l'amie d'Eugénie de Guérin, qui aurait bien voulu lui faire épouser son frère adoré, Maurice, merveilleux poète, mort beaucoup trop jeune, à 29 ans. Louise qui avait rejeté la demande du jeune homme mourut quant à elle à l'âge de 30 ans château de Rayssac, construit au XVIIe siècle : il appartenait à Louise de Bayne, amie et correspondante de Eugénie de Guérin.                                                                                      St-PIERRE de TRIVISY, en 1789, la communauté porte le nom de Sénégats ou Sénégats-et-Trivisy; elle appartient à la sénéchaussée de Castres. Sur le plan religieux, elle appartient au diocèse de Castres.","architecture":"Le château du XVIIe siècle de Rayssac,  construit en remplacement de celui du Castelas, détruit pendant les guerres de religion à la suite de la trahison d'un domestique, il est bâti en pierres noires du pays badigeonnées de chaux et possède un toit d'ardoises. Extérieurement, aucun cachet artistique. Comme la plupart des châteaux de la région, c'est une lourde bâtisse faite pour défier les hivers et les siècles. Les ouvertures sont encadrées de feuillage. Au-dessus de la porte, une pierre, usée par le temps, devait porter les armes de la famille : un lion de sinople armé et lampassé d'argent surmonté d'un lambel chargé de trois tourteaux de gueule. A l'intérieur, le rez-de-chaussée et les deux étages, conçus sur un plan unique, comprennent une grande galerie par laquelle on accède aux divers appartements de la maison.","habitants":"Famille de Louise de Bayne\r\n        \"","divers":"Rayssac et ses environs; château du Bousquet, du Sénégats, à Saint-Pierre de Trivisy, pas d'information pour ces châteaux.","gps":"","images":["../../jctruffet.com/image/image_81/81_Rayssac_Tarn_1.jpg","../../jctruffet.com/image/image_81/81_Rayssac_Tarn_2.jpg","../../jctruffet.com/image/image_81/81_Rayssac_Tarn_3.jpg","../../jctruffet.com/image/image_81/81_Rayssac_Tarn_4.jpg","../../jctruffet.com/image/image_81/81_Rayssac_Tarn_5.jpg"]},"Consult_chateau_formulairec479":{"id":"Consult_chateau_formulairec479","dept":"81","canton":"Mazamet","commune":"Albine","nom":"Ribaute_Tarn","type":"Château","periode":"XVIII","histoire":"RIBAUTE, Pierre, sieur de Sabazan eut un fils, Jean, sieur de Ribeaute, gouverneur du château de Lespinassière , épousa en janvier 1580  Marie Glaize, dont il eut un fils, Jean, maire perpétuel de Saint-Amans épousa le 11 avril 1627, Suzanne de Guibbal. De ce mariage naquirent quatre enfants, François, Marie,  Thérèse,  Françoise, cette dernière épouse  Maynadier deux enfants, Jeanne et Anne qui  épouse Guillaume de Raynaud de Pesseplane, trois enfants  Isabeau,  Joseph , Jean sieur de la Ribeaute, fit construire en 1719, le château actuel de Ribeaute, il épousa Elisabeth de Campan, dont il eut quatre enfants Jean, Elisabeth,qui épouse, en 1718, Clément de Cazes, conseiller à la cour du parlement de Toulouse,deux enfants Clément Jean de Cazes , conseiller au parlement, marié avec Marguerite Victoire d'Espanés, Jean Paul de Cazes, conseiller au parlement, marié avec Antoinette Charlotte Adélaïde Delsuc de Cassaignes, Victoire-Antoinette de Cazes , mariée avec Paul-César-André-Guilhaume Bourguignon de Saint-Martin; Dominique ; et François, capitaine de cavalerie, époux d'Angélique Carlier, Le mariage est célébré à Saint-Pons-de-Thomières en mai 1742 en présence de M. de Carlier chanoine  Angélique de Carlier est fille de Charles de Carlier et d'Anne d'Auvigny de Montigny.  Mort sans enfant. Il est inhumé le 13 juillet 1745 dans l'église d'Albine. Dame Angélique de Carelier, veuve de Messire François de Flottes, est décédée le 3 septembre 1780 à La Ribaute.","architecture":"Ribaute corps de logis rectangulaire à deux niveaux et attiques  toit en croupes, flanqué de quatre tourelles rondes  en angles.","habitants":"Famille de Ribaute Pierre\r\n        \"","divers":"Château de Ribaute à Albine.","gps":"","images":["../../jctruffet.com/image/image_81/81_Ribaute_Tarn_1.jpg","../../jctruffet.com/image/image_81/81_Ribaute_Tarn_2.jpg","../../jctruffet.com/image/image_81/81_Ribaute_Tarn_3.jpg"]},"Consult_chateau_formulairecf1f":{"id":"Consult_chateau_formulairecf1f","dept":"81","canton":"Gaillac","commune":"Rivières","nom":"Rivières","type":"Château","periode":"XVI","histoire":"RIVIERES, la famille d'Hébrail, originaire de Gaillac, possédait la seigneurie de Rivières dès 1313 et la conserva jusqu'à la fin du XVIe siècle. Le château, incendié par les catholiques, fut reconstruit à la fin du XVIe siècle. A cette époque. A.d'Hébrail, baron de Rivières, n'eut qu'une fille, Anne, qui épousa François de Cheverry, seigneur de Montréal en Lauragais. En 1640, le cadastre et le compoix de la baronnie mentionnent Michel de Cheverry comme seigneur et baron de Rivières. Michel Seconde de Cheverry légua le château en 1696 à Claude Deplas, seigneur de Salgues, et son fils Charles le céda en 1730 à noble Jean Séré, ancien capitoul, dont les descendants prirent le nom de la terre de Rivières. C'est au château que naquit le général de génie Séré de Rivières, créateur de la ligne de forts en 1914 qui arrêta l'avance allemande. Les Séré de  Rivières grande famille dont beaucoup de personne sont voué à l'armée encore de nos jours. Château de Rivières- Propriété du Baron Marc Charles Edmond de Rivières,","architecture":"Reconstruit à la fin du XVIe siècle et remanié par la suite, le château de Rivières est situé au bord du Tarn. Outre un bel escalier, il a conservé plusieurs ouvertures anciennes.","habitants":"Famille d'Hébrail                                                                                           Baron Marc Charles Edmond de Rivières\r\n        \r\n        \"","divers":"Château de Rivières","gps":"","images":["../../jctruffet.com/image/image_81/81_Rivieres_1.jpg","../../jctruffet.com/image/image_81/81_Rivieres_2.jpg"]},"Consult_chateau_formulairebdec":{"id":"Consult_chateau_formulairebdec","dept":"81","canton":"Réalmont","commune":"Roumégoux","nom":"Ronel","type":"Château","periode":"XVIII","histoire":"RONEL, le château de Ronel a été repris il y a une dizaine d'années par un couple de Grenoblois qui y a aménagé des chambres d'hôtes de prestige. L'établissement venait de faire l'objet d'un article élogieux dans le Figaro Magazine et les réservations étaient très importantes pour l'été.","architecture":"C'est la foudre qui est à l'origine de l'incendie du château de Ronel à Roumégoux. Le château a été fortement endommagé. Le nouveau château de Ronel restera dans la lignée de son prédécesseur, en conservant larchitecture dorigine et son esprit naturel, il proposera des matériaux bio sourcés comme le chanvre. Au vu des travaux, il possède toutes les qualités nécessaires pour vivre un avenir prometteur.","habitants":"Famille Gay\r\n        \"","divers":"Château de Ronel à RoumégouX","gps":"","images":["../../jctruffet.com/image/image_81/81_Ronel_1.jpg","../../jctruffet.com/image/image_81/81_Ronel_2.jpg","../../jctruffet.com/image/image_81/81_Ronel_3.jpg","../../jctruffet.com/image/image_81/81_Ronel_4.jpg","../../jctruffet.com/image/image_81/81_Ronel_5.jpg"]},"Consult_chateau_formulaire104f":{"id":"Consult_chateau_formulaire104f","dept":"81","canton":"Rabastens","commune":"Roquemaure","nom":"Roquemaure_Tarn","type":"Château","periode":"XIV-XVIII","histoire":"RAUQUEMAURE,  une baronnie  qui dépendait de la vicomté de Villemur. Le seigneur temporel est le baron de Roquemaure. La dîme est partagée entre Mgr lEvêque, le chapitre Saint-Martin de Montauban, le chapitre Saint-Etienne de Toulouse et larchiprêtre de Roquemaure. Fut donné par le comte de Toulouse au vicomte de Bruniquel.    Bertrand de Bruniquel tenait le château de Roquemaure en 1389 dénombrement de Roquemaure par le comte de Comminges au  roi,  le 8 mars 1393,  les libertés, coutumes et privilèges  accordés par les prédécesseurs sont confirmés aux vasseaux, Roquemaure est réuni à la couronne avec les domaines de la maison de Comminges au milieu du XVe siècle et rattaché à la judicature de Villelongue.  En 1540 et 1554 Jean Deymier, conseiller au parlement dénombre Roquemaure au parlement de Toulouse avec la justice haute. En 1540 Jean de Roquemaure dénombre au roi. La seigneurie est rentrée  dans le domaine royal. Inféodée ensuite, la seigneurie est hommagée en 1674 par Guillaume Déjean, conseiller au parlement de Toulouse, et Guillaume Daurens, co-seigneurs, et en 1675, par le même Déjean et Catherine de Rességuier, veuve sans doute de Daurens. Guillaume Déjean devient possesseur de lentière baronnie que son fils vend à Boyer de Castanet, marquis de Tauriac le 19 février 1718. Les Boyer de Castanet de Tauriac conserveront cette possession jusquà la Révolution.","architecture":"Un vieux château. : lancien castrum. Le fort comprenait des fossés qui  sont disparus, entourant le château de tous côtés.\r\nVers la fin du XIVe siècle, il est occupé par les routiers, sans doute avant leur défaite sous les murs de Rabastens en 1380  Elie Rossignol. La charte dorigine a été enlevée par les routiers. Ruiné et pillé il est relevé , il redevient florissant sous  la protection du seigneur de Bruniquel,  et confirme en 1395 les privilèges de ses habitants afin de repeupler le village.","habitants":"Famille de Boyer de Castanet de Tauriac\r\n        \"","divers":"Château de Roquemaure de Plaisance  à Roquemaure","gps":"","images":["../../jctruffet.com/image/image_81/81_Roquemaure_Tarn_1.jpg","../../jctruffet.com/image/image_81/81_Roquemaure_Tarn_2.jpg","../../jctruffet.com/image/image_81/81_Roquemaure_Tarn_3.jpg"]},"Consult_chateau_formulaire1a5b":{"id":"Consult_chateau_formulaire1a5b","dept":"81","canton":"Carmaux","commune":"Marnaves","nom":"Roquereine","type":"Forteresse","periode":"XIV-XVI","histoire":"ROQUEREINE, en 1260, la famille de Vindrac avait reçu ce fief du comte de Toulouse en 1281, l'on trouve comme propriétaire de Roquereine Raymond de Vindrac, qui était lié par contrat avec la bastide de Cordes, Roquereine représentant pour la cité une importante défense avancée pour la vallée du Cérou. Dés 1345, l'on trouve trace d'une maison-forte. Le château tient son second nom plus récent de la \"Prune\" du nom du capitaine de la ville de Cordes en poste en cette place peu de temps après les guerres de Religion. Le château fut acquis et remanié par le peintre russe André Lanskoy, alors qu'il avait été abîmé par ses précédents propriétaire.","architecture":"le château de Roquereine du XIV-XVIe siècle, au nord demeurent les restes de bâtiments fortifiés et de remparts crénelés formant enceinte. Le donjon est abaissé au niveau des courtines. Mis en valeur par une exceptionnelle situation, le site vaut autant par l'imposante majesté de la bâtisse que par l'articulation des différents volumes du château.","habitants":"peintre russe André Lanskoy\r\n        \"","divers":"Château de Roquereine","gps":"","images":["../../jctruffet.com/image/image_81/81_Roquereine_1.jpg"]},"Consult_chateau_formulaire0e94":{"id":"Consult_chateau_formulaire0e94","dept":"81","canton":"Lavaur","commune":"Roquevidal","nom":"Roquevidal","type":"Forteresse","periode":"XIV-XVI","histoire":"ROQUEVIDAL, l'histoire de cette belle demeure et de sa seigneurie n'ait pas très connu pour les époques les plus reculées, les sources les plus anciennes ne remontent qu'en 1487, Girardin de Sans et coseigneur de Roquevidal. Véritable petite forteresse remontant au XIIIe siècle, elle fut le théâtre de violents combats pendant les guerres de Religions en 1575. La garnison installée là par le duc de Joyeuse fut massacrée par les protestants en 1587. Quelques années plus tard, le vicomte de Lautrec et neveu de Joyeuse, Louis de Voisins, pris le château et vengea la garnison catholique. La paix revenue passe à la famille de Brail s'installe à la fin du XVIe siècle qui se dernier Jean de Brail et son épouse Louise Dupuy en 1685 à la révocation de l'édit de Nantes  quitte la France pour l'Angleterre. Roquevidal revient à son fils  César de Brail et au XVIIe siècle la seigneurie passe à la famille de Labarthe originaire de Castres. En 1739 le château est tenu par Claude de Thomas de Labarthe seigneur du Cup et de Roquevidal colonel de régiment de grenadiers royaux et gouverneur de Castres. Vendu comme bien national à la Révolution  transformé en bâtiment agricole et en 1966 acquit par la famille Perrin et entreprend son sauvetage. Aujourd'hui propriété de monsieur Saricassapian.","architecture":"Le château de Roquevidal : véritable petite forteresse, est un élégant manoir des XIIIe et XIVe siècles, de forme rectangulaire et flanqué de quatre tours rondes aux angles. Sans enceinte mais avec fossés. Des fenêtres à meneaux encadrées de colonnettes du XVIe siècle et une échauguette  centrale décorent la façade sud. Construit en calcaire et grès. La façade principale est richement ornée de croisées Renaissance. Au centre, la porte d'entrée est surmontée de deux fenêtres. Au premier étage, deux grandes baies à croisées possèdent des piédroits formés de colonnes ioniennes engagées. L'édifice allie force et élégance.","habitants":"Famille de Labarthe\r\n        \r\n        \"","divers":"Château de Roquevidal","gps":"","images":["../../jctruffet.com/image/image_81/81_Roquevidal_1.jpg","../../jctruffet.com/image/image_81/81_Roquevidal_2.jpg","../../jctruffet.com/image/image_81/81_Roquevidal_3.jpg","../../jctruffet.com/image/image_81/81_Roquevidal_4.jpg","../../jctruffet.com/image/image_81/81_Roquevidal_5.jpg"]},"Consult_chateau_formulaire640a":{"id":"Consult_chateau_formulaire640a","dept":"81","canton":"Carmaux","commune":"Rosières","nom":"Rosières_Tarn","type":"Château","periode":"XIV-XIX","histoire":"ROSIERES, au XIIIe siècle, un domaine noble existait au lieu dit Les Escoulins, et le château du village devait être la résidence principale du seigneur. La seigneurie dépendit d'abord de la seigneurie de Monestiès. Au XIVe siècle, le château émerge un peu de l'ombre et apparaît dans les comptes consulaires d'Albi. Le bâtiment fut fortifié avant le traité de Brétigny en 1360. Il fut particulièrement éprouvé durant la Révolution, vers 1789 il fut pillé et incendié et une partie de ses tours fut détruite par une bande de brigands.","architecture":"Château dominant le Cérou, d'origine du XIIIe siècle : aujourd'hui, après tous ces aléas, on peut encore admirer sa face sud avec les deux tours épargnées, une partie de la face Est, ainsi que les traces au sol des deux ailes disparues. Le rez-de-chaussée conserve au sud-ouest une vieille cuisine avec une voûte de pierre en berceau de grande dimension qui pourrait être un témoignage du château primitif du XIIe siècle. Cette pièce conserve une cheminée flanquée de son four restes remaniés et en partie dénaturés, deux tours sur quatre. Souterrain du Colombié long de 15 m avec voûte ogivale.\r\n Eglise reconstruite en haut du village, avec le concours de la famille Solages (armoiries), un peu au-dessous, croix de carrefour en pierre sculptée au XVIe siècle; peintures de Nicolas Greschny.","habitants":"Seigneurie de Monestiès\r\n        \r\n        \"","divers":"Château de Rosières","gps":"","images":["../../jctruffet.com/image/image_81/81_Rosieres_Tarn_1.jpg","../../jctruffet.com/image/image_81/81_Rosieres_Tarn_2.jpg","../../jctruffet.com/image/image_81/81_Rosieres_Tarn_3.jpg","../../jctruffet.com/image/image_81/81_Rosieres_Tarn_4.jpg"]},"Consult_chateau_formulaire3a02":{"id":"Consult_chateau_formulaire3a02","dept":"81","canton":"Albi","commune":"Maussans","nom":"Rouffiac","type":"Château","periode":"XIV-XIX","histoire":"A Rouffiac le château de Rouffiac de Bovila et la Bastidé Blanche.                                                                                                        ROUFFIAC, en 1355, lors de linvasion anglaise, comme le château de Rouffiac ne pouvait être mis en état de défense, les commissaires ordonnèrent aux habitants de se retirer à Albi et le firent démanteler. Au XVIe siècle, la seigneurie de Maussans  et de Rouffiac est titrée en Baronnie, en 1572, lévêque Philippe Rudolphi la mit en vente et elle fut adjugée à un marchand dAlbi le sieur de Nucpes à plusieurs membres de la famille ont occupé les plus hautes charges au parlement de Toulouse. Cest en 1622 que lévêque dAlbi demanda au Roi de venir délivrer lAlbigeois des ravages des  rebelles de Réalmont, Lombers et Briatexte, et le 11 juin les consuls se réunirent à Rouffiac avec les députés du diocèse. En 1633, la démolition du château de Lombers est décidée et la commune de Maussans devra y participer. Le baron de Rouffiac  Louis de  Nupces qui mourut dune chute de cheval à Albi fut enterré dans léglise de Rouffiac en 1651. En 1723, Marie de Nupces veuve de Georges-Jules de Roquebouillac en rendait hommage et ses descendants ont possédé la baronnie jusquen 1790, cest ensuite le marquis Antoine-Paulin de Solages qui fut seigneur de Rouffiac-Maussans.                                                       Pas d'information historique pour la Bastidiè Blanche.","architecture":"Les châteaux à Roufiac sont de construction récentes du XIXe siècle. Aujourdhui, après tous ces plus ou moins nobles seigneurs, cest lécole du village qui est abritée dans ce qui demeure le dernier vestige à peine tangible du château de Rouffiac: un corps de logis totalement remanié appuyé contre une haute tour ronde ayant perdu son couronnement.Alors quen 1826,  près du château, dont il ne restait quune tour.                                                           Bovila  chambres d'hôtes de Pascal Pieron.                                          La Bastidiè Blanche est un bâtiment du XXe siècle rectangulaire à deux niveaux et lucarnes sur toits presque plats. Une avancée saillante sur façade d'entrée entraînant au premier étage un balcon sur la longueur du bâtiment avec couverture au premier étage par deux piliers et toitures en tuiles.","habitants":"Marquis Antoine-Paulin de Solages\r\n        \"","divers":"A Rouffiac le château de Rouffiac de Bovila et la Bastidé Blanche.","gps":"","images":["../../jctruffet.com/image/image_81/81_Rouffiac_1.jpg","../../jctruffet.com/image/image_81/81_Rouffiac_2.jpg","../../jctruffet.com/image/image_81/81_Rouffiac_3.jpg","../../jctruffet.com/image/image_81/81_Rouffiac_4.jpg"]},"Consult_chateau_formulairee2d3":{"id":"Consult_chateau_formulairee2d3","dept":"81","canton":"Albi","commune":"Marssac sur tarn","nom":"Sabatayrenc","type":"Château","periode":"XIX","histoire":"SABATAYRENC, la société Rouge Chantal, Monique est situé au chäteau de Sabatayrenc à Terssac. Elle a été crée le 22/01/2013 et est immatriculée au registre du commerce et des sociétés.","architecture":"Jolie petit château du XIXe siècle quadrangulaire  à trois niveaux, toit en croupes presque plat, flanqué de tour polygonales en angles avec terrasses.","habitants":"Rouge Chantal\r\n        \"","divers":"Château de Sabatayrenc à Marssac sur Tarn.","gps":"","images":["../../jctruffet.com/image/image_81/81_Sabatayrenc_1.jpg","../../jctruffet.com/image/image_81/81_Sabatayrenc_2.jpg"]},"Consult_chateau_formulairec48b-2":{"id":"Consult_chateau_formulairec48b-2","dept":"81","canton":"Albi","commune":"Saliès","nom":"Saliès","type":"Château","periode":"XVII","histoire":"SALIES, appartenait autrefois à la famille de Fonvieille qui, sous l'ancien régime, possédait la charge héréditaire de viguier d'Albi. La maison eut son heure de gloire à l'époque où Antoinette de Salvan de Saliès, châtelaine du lieu tenait un salon qui la fit connaître jusqu'à Paris sous le joli nom de Viguière d'Albi. Elle écrivit de plaisants poèmes dont certains furent rédigés en langue d'oc mais également et surtout, un mince roman qui fit à l'époque fureur et se nommait la comtesse d'Yssembourg. La dalle funéraire de la Viguière se trouve dans la chapelle seigneuriale du château. En 1777, la seigneurie passa au marquis de Bancalis d'Aragon.\r\n La partie la plus ancienne du château de Saliès remonte au XVIIe siècle mais  fut remanié au XVIIIe et au début du XIXe siècle.","architecture":"La partie la plus ancienne du château de Saliès remonte au XVIIe siècle mais il fut remanié au XVIIIe et au début du XIXe siècle. Corps de logis rectangulaire à deux niveaux accolé de chaque côté de pavillons carrés à trois niveaux à toit presque plats, des dépendances barlong  sur la partie arrière à deux niveaux avec pigeonnier.","habitants":"Famille de Fonvieille                                                                         Marquis de Bancalis d'Aragon.\r\n        \r\n        \"","divers":"Le château de Saliès","gps":"","images":["../../jctruffet.com/image/image_81/81_Salies_1.jpg","../../jctruffet.com/image/image_81/81_Salies_2.jpg","../../jctruffet.com/image/image_81/81_Salies_3.jpg","../../jctruffet.com/image/image_81/81_Salies_4.jpg","../../jctruffet.com/image/image_81/81_Salies_5.jpg"]},"Consult_chateau_formulaire58b0":{"id":"Consult_chateau_formulaire58b0","dept":"81","canton":"Albi","commune":"Salvagnac","nom":"Salvagnac","type":"Château-fort","periode":"XIII","histoire":"Deux châteaux à Salvagnac dont celui de Salvagnac et celui de Naïs.                                                                                                           SALVAGNAC, en 1209, Raimond VI donne à son frère Baudoin une part de lhéritage quil avait reçu de Raimond V son père, à savoir la vicomté de Bruniquel et la seigneurie de Salvagnac ; ce qui explique quau printemps 1211, Baudoin ayant pactisé avec Simon de Montfort, Salvagnac passe sous lautorité de ce dernier qui avait engagé une campagne pour semparer des fiefs des comtes de Toulouse situés sur la rive droite du Tarn. A la fin de lété 1211, Baudoin est chassé de Salvagnac et Raimond VI récupère son fief.  Par la suite, Raimond VI fait en 1220 des donations aux Bénédictins de Saint-Michel de Gaillac qui fondent un prieuré à Salvagnac, très certainement pour surveiller les domaines quils y possédaient. Enfin, le 4 décembre 1224, Raimond VII vient dans le château de Salvagnac pour conclure le mariage de son frère naturel Bertrand avec Comtoresse, fille de Mainfroi de Rabastens. Et ce même jour, il fait donation à Bertrand des vicomtés de Bruniquel et de Monclar ainsi que de la seigneurie de Salvagnac. Ses terres vont demeurer dans la descendance de Bertrand jusquen 1629, année de la mort dAnne de Monclar dont le fils Louis avait été tué en 1622 au siège de Tonneins. On peut donc admettre que Salvagnac a appartenu à la maison de Toulouse pendant plus de six siècles. En 1587, l'amiral Anne de Joyeuse prend Salvagnac durant les guerres de religion, mais les dégâts durent être mineurs puisqu'en 1609, le château fait partie d'un testament. Il fut modifié en 1720 et acheté par la famille de Chastenet de Puységur en 1788.                                                                                             NAÏS Brigitte Hellin  maison de maître du XIXe et ses dépendances. Labellisé Gîtes de France depuis 2008.","architecture":"Le château domine le haut du village, au sommet d'une colline. Il a gardé la forme en fer à cheval qui date probablement de sa construction initiale. Les deux tours médiévales, de part et d'autre de la cour, témoignent que l'édifice a été remanié. Au XIXe siècle, la façade ouest et refaite et alignée et les entrées des caves enterrées. Les fossés ont été comblés par les décombres des remparts,  l'aile gauche date du XIXe siècle  est restée sans restauration. Les ailes centrales et de droite des années 1720, sont de style classique. Les façades sont soulignées par des moulures à chaque étage. Elles sont bien mises en valeur par une restauration récente.                                                                          Naïs de plan en équerre avec une dépendance à deux niveaux le corps de logis principal à deux niveaux également avec attiques toit en croupes.","habitants":"Famille de Chastenet de Puységur\r\n        \"","divers":"Château de Salvagnac et de Naïs","gps":"","images":["../../jctruffet.com/image/image_81/81_Salvagnac_1.jpg","../../jctruffet.com/image/image_81/81_Salvagnac_2.jpg","../../jctruffet.com/image/image_81/81_Salvagnac_3.jpg","../../jctruffet.com/image/image_81/81_Salvagnac_4.jpg","../../jctruffet.com/image/image_81/81_Salvagnac_5.jpg"]},"Consult_chateau_formulaire552e":{"id":"Consult_chateau_formulaire552e","dept":"81","canton":"Carmaux","commune":"Souel","nom":"Sargnac","type":"Château","periode":"XIV","histoire":"SARGNAC, avant la Révolution, le château de Sarniac appartient à la puissante famille de Roquefort, mais l'essentiel de son histoire est lié à celle de la seigneurie et du château de Noailles.\r\n La société EARL DE SARGNAC a son siège social à Souel . Et hôtel de luxe, on activité est classée dans la catégorie agriculture et pêche.  Son dirigeant est M Alexandre Olivier Vincent ECHE.","architecture":"Sargnac, en surplomb sur un vallon et se détachant au milieu des bois, le château présente une silhouette à la fois impressionnante et séduisante qui n'est pas sans rappeler la solide architecture de son voisin le château de Noailles, construit à la même époque. Parmi de beaux restes, château de Sargnac conserve en particulier une belle tour carrée. Forteresse en plan d'équerre avec des corps de logis à trois niveaux flanqué d'une tour carrée à cinq niveaux toit à quatre pans presque plat.","habitants":"Famille de Roquefort\r\n        \"","divers":"Château de Sargnac","gps":"","images":["../../jctruffet.com/image/image_81/81_Sargnac_1.jpg","../../jctruffet.com/image/image_81/81_Sargnac_2.jpg","../../jctruffet.com/image/image_81/81_Sargnac_3.jpg","../../jctruffet.com/image/image_81/81_Sargnac_4.jpg","../../jctruffet.com/image/image_81/81_Sargnac_5.jpg"]},"Consult_chateau_formulaired02d-2":{"id":"Consult_chateau_formulaired02d-2","dept":"81","canton":"Rabastens","commune":"Lisle-sur-Tarn","nom":"Saurs","type":"Château","periode":"XIX","histoire":"SAURS, la famille Gineste est établie au hameau de Saurs depuis le début du XVIe siècle. Le château a remplacé la \"maison Gineste\" qui se trouvait à quelques dizaines de mètres à l'est du château. Celui-ci a été construit à partir de 1848 par Eliezer Gineste, avocat et propriétaire terrien. L'essentiel du gros-uvre a été terminé en 1851 et les aménagements intérieurs ont été effectués entre 1851 et 1854. L'architecte qui a présidé les travaux est un certain Miquel, de Gaillac. La plupart des artisans qui ont uvré à sa construction viennent de Lisle-sur-Tarn ou de Gaillac. Seuls quelques décors spécifiques, comme les éléments de terre cuite situés en façade proviennent des ateliers toulousains de Virebent, Galy et Giscard. Le cuvier indépendant et les écuries ont été construits à la fin des années 1870 et au tout début des années 1880. Le grand escalier a été reconstruit dans le courant du XXe siècle. Le château est entouré d'un vaste parc délimité par le chemin Toulze où les pins parasols ont atteint leur pleine maturité. Mais l'essentiel des aménagements du parc est récent.","architecture":"Le château de Saurs, de style néoclassique, a été construit sous la Seconde République .Le château était à la tête d'un domaine de polyculture de 140 hectares en 1892, à la mort d'Eliezer. Construit à flanc de colline, le château est élevé sur un premier niveau voûté a demi enterré et entièrement dévolu à l'activité vinicole. La façade principale au sud est ainsi rehaussée par un niveau supplémentaire et  précédé d'un escalier à double révolution et elle est encore embellie par un vaste perron et une colonnade en pierre. Directement au nord du château se trouve le cuvier construit à la fin des années 1870 auquel sont accolées les écuries de selle et une petite forge. Un vaste parc, aux essences variées, entoure le château.","habitants":"Famille Gineste\r\n        \"","divers":"Château de Saurs à Lisle sur Tarn","gps":"","images":["../../jctruffet.com/image/image_81/81_Saurs_1.jpg","../../jctruffet.com/image/image_81/81_Saurs_2.jpg","../../jctruffet.com/image/image_81/81_Saurs_3.jpg","../../jctruffet.com/image/image_81/81_Saurs_4.jpg"]},"Consult_chateau_formulaire7bf5-2":{"id":"Consult_chateau_formulaire7bf5-2","dept":"81","canton":"Mazamet","commune":"Sauveterre","nom":"Sauveterre_Tarn","type":"Forteresse","periode":"XVI-XIX","histoire":"SAUVETERRE, les premiers seigneurs de Sauveterre connus sont Roger de Vintrou et Bertrand Raymond de Durfort qui possèdent à part égale la terre de Sauveterre en 1330. Il semble ensuite que Roger de Vintrou maria sa fille Gieullianne avec Raymond de Durfort pour réunir la seigneurie. En 1419, Jausion de Vintrou, dame de Sauveterre épouse Arnulphe de Marla, seigneur de Neuville en Picardie. Sa fille épouse Nicolas de Electis. La seigneurie reste dans cette famille pour trois générations : Jean de Electis, Guilhaume et un autre Guilhaume. Ce dernier, avec sa soeur Jehanne, vend la terre à Laurens et Guilhaume d'Auxilhon, en 1452. Le château fort est brûlé lors de la croisade des Albigeois au début du XIIIe siècle. Des moines créés à nouveau un foyer de peuplement avec une sauveté qui a donné son nom au lieu. Le château actuel est construit, au XVIe siècle par la famille Auxilhon. La famille d'Auxilhon conserve le château pendant plus de cinq siècles ; Les propriétaires actuels sont toujours les descendants de ces fondateurs, durant la Révolution, lorsque les propriétaires émigrent. Le château, confisqué et pillé, est rendu aux propriétaires lors de la Restauration. Maximilien de Gayraud de Lasserre d'Auxilhon est né en 1764. Orphelin à l'âge de 16 ans, il bénéficie de l'aide de son oncle Jean Etienne d'Auxilhon. Maximilien épouse Marie Pauline de Pins en 1818. C'est lui et son épouse qui font restaurer le château à partir de 1819 par le comte Charles de Millau, architecte et propriétaire du château voisin de Saint-Amans-Valtoret. En 1826, les travaux en sont à la décoration intérieure. Maximilien meurt en 1835. Le comte de Millau transforme  le logis.","architecture":"Le château de Sauveterrre est a nouveau abîmé durant les guerres de religion, puis durant la Révolution, lorsque les propriétaires émigrent. Le château, confisqué et pillé, est rendu aux propriétaires lors de la Restauration. Le corps de logis construit au sud-ouest de la cour pourrait avoir été édifié à la fin du XVe siècle. La tour ouest conserve des canonnières à la française qui peuvent être datées de cette période. Le plan général du corps  de logis rectangulaire flanqué de deux tours rondes aux angles appartient aussi à cette période. Le bâtiment principal de quarante mètres date de la Renaissance, mais façades et aménagement intérieur ont été remaniés : un escalier néoclassique et des peintures en trompe-lil. Deux tours encadrent la façade côté extérieur et une petite tour du château ancien a été transformée en pigeonnier dans le parc. Une corniche crénelée soutient la toiture.  De très importants travaux sont exécutés entre 1818 et 1825, sous la direction de l'architecte Bernard Charles, Il ouvrent les deux grandes façades au nord et au sud, agrandi le logis vers l'est pour installer l'escalier de service derrière le pan coupé et aménage le portail d'entrée situé entre le logis et l'église.","habitants":"Famille d'Auxilhon\r\n        \r\n        \"","divers":"Château de Sauveterre","gps":"","images":["../../jctruffet.com/image/image_81/81_Sauveterre_1.jpg","../../jctruffet.com/image/image_81/81_Sauveterre_2.jpg","../../jctruffet.com/image/image_81/81_Sauveterre_3.jpg","../../jctruffet.com/image/image_81/81_Sauveterre_4.jpg","../../jctruffet.com/image/image_81/81_Sauveterre_5.jpg","../../jctruffet.com/image/image_81/81_Sauveterre_6.jpg"]},"Consult_chateau_formulairea488":{"id":"Consult_chateau_formulairea488","dept":"81","canton":"Sémalens","commune":"Saint-Paul Cap de Joux","nom":"Scalibert","type":"Château","periode":"XIX","histoire":"deux châteaux à Saint-Paul de Joux dont celui de Scalibert du XIXe siècle et la maison forte de Bousquetié.                  SCALIBERT   En 1588 le seigneur de Scalibert, Jacques Dupuy était protestant et son château fut  détruit à l'issue des batailles qui divisèrent catholiques et huguenots jusqu'au début des années 1630. Après une campagne de reconstruction, en 1740, le château comportait un étage couvert de tuiles. Cette demeure resta longtemps dans la famille de Clauzade, en 1747, Rose de Clauzade de Scalibert épousa son cousin germain Joseph Clauzade de Mazieux, châtelain de Riols. Au XIXe siècle, Arnaud de Clauzade épousa la riche Mlle de Saint-Maur et c'est grâce à elle que furent réalisés d'importants travaux.  Après la mort de Zoé de Scalibert le château passa ensuite à son filleul pour être finalement vendu en 1965.","architecture":"Scalibert, vers 1850 furent ajoutés le second étage et les toitures d'ardoises qui le couronnent. Composé d'un corps de bâtiment allongé flanqué de deux pavillons massifs et saillants, Scalibert a fière allure avec ses hautes combles et ses lucarnes à fronton triangulaire. Vers 1860 fut édifiée la chapelle de style néo-gothique pourvue d'une élégante flèche.                                                  Bousquetié maison forte de plan rectangulaire à deux niveaux flanquée d'une tour ronde toit en poivrières.","habitants":"Famille de Clauzade\r\n        \"","divers":"Château de Scalibert et de la Bouquetiè à Saint-Paul de Joux","gps":"","images":["../../jctruffet.com/image/image_81/81_Scalibert_1.jpg","../../jctruffet.com/image/image_81/81_Scalibert_2.jpg","../../jctruffet.com/image/image_81/81_Scalibert_3.jpg","../../jctruffet.com/image/image_81/81_Scalibert_4.jpg","../../jctruffet.com/image/image_81/81_Scalibert_5.jpg"]},"Consult_chateau_formulairebbcd":{"id":"Consult_chateau_formulairebbcd","dept":"81","canton":"Lavaur","commune":"Maurens-Scopont","nom":"Scopont","type":"Château","periode":"XVIII-XIX","histoire":"SCOPONT, le site de Scopont est un lieu tragique de la croisade des Albigeois. Le château construit de pierres de réemploi issues d'une ancienne abbaye détruite lors du passage de l'armée de Simon IV de Montfort et un charnier a récemment été découvert avec de squelettes portant l'anneau de cuivre des parfaits, religieux cathares. L'existence d'un château sur le site est à nouveau mentionnée qu'en 1423. Guillaume de Joyeuse, lieutenant général en Languedoc, est chargé de lutter contre les protestants pendant les guerres de religion. En 1575, il prend le château d'« Escopont » et fait honneur à sa promesse en laissant la vie sauve à la garnison. Au XVIIIe siècle, le château est profondément remanié par ses propriétaires qu'une fausse mais tenace rumeur dit être Étienne-François de Choiseul. Plusieurs fois vendu à des propriétaires qui en prennent peu soin, le château est racheté presque à l'état de ruines pour être restauré.","architecture":"Le château  de Scopont est rectangulaire. Au nord, une vaste terrasse inclut les douves alors que la façade sud est tournée vers la vallée, encadrée de deux petites tours rondes à toit en ardoise pointu. Quelques meurtrières rappellent le passé militaire de l'édifice.\r\nÀ l'intérieur, le passé est présent dans les caves du XVIe siècle. Dans les étages, un escalier, des décors de stuc et des cheminées témoignent du confort apporté au fil des rénovations. Dans le parc, un pavillon néo-gothique a été construit au XIXe siècle avec des pierres de réemploi, en particulier des éléments venant du couvent des Carmes et du couvent des Jacobins de Toulouse et des pierres tombales locales. Avant même que n'existe le château de Scopont, se trouvait au Moyen-Age sur ce site une abbaye fortifiée dont les restes comprenant chapiteaux, colonnes et pierres tombales furent réutilisés pour décorer le charmant pavillon troubadour que l'on peut admirer dans le parc. Aujourd'hui Scopont présente une façade nord précédée d'une terrasse à balustre de pierre entourant des douves, et tournée vers la grille d'entrée du château. Au sud, le château présente une élégante façade à deux étages surmontée d'un attique et flanqué de deux tours rondes à haute toiture en poivrière. Sur cette façade comme sur les autres sont visibles des meurtrières montrant le caractère fortifié de l'ancien château. Des caves et un sous sol du XVIe siècle accessible depuis le côté sud, témoignent encore de cette histoire. La façade sud est placée en contrebas par rapport à celle du nord, et précédée d'une terrasse. Les façades latérales sont elles aussi bordées de douves. Des aménagements pratiqués à cette époque demeurent un bel escalier et de nombreuses décorations de stuc.","habitants":"Guillaume de Joyeuse\r\n        \"","divers":"Le château de Scopont à Maurens -Scopont.","gps":"","images":["../../jctruffet.com/image/image_81/81_Scopont_1.jpg","../../jctruffet.com/image/image_81/81_Scopont_2.jpg"]},"Consult_chateau_formulairea7e7":{"id":"Consult_chateau_formulairea7e7","dept":"81","canton":"Saix","commune":"Saix","nom":"Sendrone","type":"Château","periode":"XVII-XVIII","histoire":"SENDRONE,  si l'état actuel du château de Sendrone est celui qui existait vers 1740, ce domaine est plus ancien, puisque déjà, en 1652, on voit le sieur de Sendrone aux prises avec la force publique en la personne du consul Fournès. Mais ce n'est pas en raison d'épisodes importants de notre histoire que cette demeure présente un intérêt, mais bien plutôt grâce à l'intégrité de son harmonie, restée intacte depuis le XVIIe siècle.","architecture":"La façade sur la cour d'honneur et les toitures du bâtiment municipal; la cage d'escalier avec sa ferronnerie, ses portes et son décor peint, le couloir du premier étage où ce décor se prolonge; le salon et la salle à manger avec leur décor de boiseries et de bois doré; les cheminées de marbre du salon, d'une chambre au premier étage et de deux pièces au rez-de-chaussée; les grilles en fer forgé situées à l'entrée du château ainsi que le pigeonnier son tous des éléments protégés.","habitants":"Sieur de Sendrone\r\n        \"","divers":"Château de Sandronne à Saix","gps":"","images":["../../jctruffet.com/image/image_81/81_Sendrone_1.jpg","../../jctruffet.com/image/image_81/81_Sendrone_2.jpg","../../jctruffet.com/image/image_81/81_Sendrone_3.jpg","../../jctruffet.com/image/image_81/81_Sendrone_4.jpg"]},"Consult_chateau_formulaire5129":{"id":"Consult_chateau_formulaire5129","dept":"81","canton":"Lagrave","commune":"Senouillac","nom":"Senouillac","type":"Château","periode":"XIV-XIX","histoire":"quatre châteaux à Senouillac celui de Linardié, de la Bonette du XVI-XIXe siècle (voir article) de Mauriac  du XV-XIXe siècle (voir article) et de Saint-Martial du XIVe siècle.                                  LINARDIE, Manaud de Clergue est mentionné comme seigneur de Linardié dans un document judicaire daté de 1402. Dans le compois de 1672, François de Clergue est possesseur de La Linardié, et une maison dans le hameau. La famille de Clergue,  resta propriétaire du château jusqu'en 1823. A cette date, Félix-Joseph-François de Rességuier vendit la propriété, dont il avait hérité de sa grand-mère Marie-Anne de Clergue, à Abraham Mercadier, négociant à Senouillac. Sa descendante, madame Birot l'a légué à sa mort à la commune de Senouillac, à laquelle la ville de Gaillac s'est substitué pour transformer le lieu en une galerie d'art contemporain.                                                                      St-MARTIAL L'édifice mitoyen de la parcelle 800 est la propriété de Maurel, cultivateur à Saint-Martial.    Le château et les terres appartiennent  aux familles de Combettes  de Pitray, Grayssaguel et enfin Tricon.","architecture":"Linardié, l'édifice a été transformé au cours de son histoire, il reste à l'intérieur, dans la partie sud-ouest, des ouvertures anciennes, une cheminée monumentale et l'escalier à vis. Les ouvertures extérieures ont été en revanche largement repercées aux XVIIIe et XIXe siècle.                                                                                      Saint-Martial, cette petite forteresse présente l'avantage de ne pas avoir subi de grosses transformations, on a simplement ouvert une porte et des fenêtres. Saint-Martial présente deux corps de logis séparés par une cour intérieure. Le bâtiment principal est un rectangle flanqué de deux tours aux angles extérieurs, une troisième tour accolée au milieu de la façade servait de cage à l'escalier. Des fenêtres à meneaux simples ou doubles ornées de moulures éclairent le rez-de-chaussée du côté cour et les deux façades aux étages. Des meurtrières pour armes à feu existaient dans les trois tours. Au début du XXe siècle, on recensait dans la demeure des peintures ornant les plafonds, panneaux de portes et dessus de cheminée. Le deuxième corps de logis comporte un rez-de-chaussée qui servit aussi de logis d'habitation d'autrefois. Il est flanqué d'une tour défensive avec meurtrière.","habitants":"famille de Clergue\r\n        \"","divers":"Le château de Linardié et de Saint-Martial à Senouillac","gps":"","images":["../../jctruffet.com/image/image_81/81_Senouillac_1.jpg","../../jctruffet.com/image/image_81/81_Senouillac_2.jpg","../../jctruffet.com/image/image_81/81_Senouillac_3.jpg","../../jctruffet.com/image/image_81/81_Senouillac_4.jpg","../../jctruffet.com/image/image_81/81_Senouillac_5.jpg","../../jctruffet.com/image/image_81/81_Senouillac_6.jpg","../../jctruffet.com/image/image_81/81_Senouillac_7.jpg","../../jctruffet.com/image/image_81/81_Senouillac_8.jpg"]},"Consult_chateau_formulairee782":{"id":"Consult_chateau_formulairee782","dept":"81","canton":"Lagrave","commune":"Labessière-Candeil","nom":"Serres_Tarn","type":"Château","periode":"XV-XVI","histoire":"SERRES, à Labessière Candeil, médiéval du XIIIe siècle construit par les moines cisterciens dans un parc de trois hectares. La tour nord de Serres fut bâtie à la fin du XVe siècle, au cours des travaux d'achèvement du château, pour l'abbé Guillaume IV de Boisset. Durant les guerres de religion, le village de Labessière est pris par les protestants, mais le château de Serres reste inviolé. L'abbé Guillaume de Boisset enrichit l'habitation pour la rendre plus confortable : larges fenêtres à meneau. À la Révolution, le château est vendu comme bien national par les révolutionnaires à la suite du décret des biens du clergé mis à la disposition de la Nation. Il devient une ferme et d'importantes modifications ont lieu au XIXe siècle. Après cette période, le château est racheté par les actuels propriétaires qui se sont fixé la tâche de lui rendre son lustre d'antan.","architecture":"Château de Serres à conservé ses deux tours qui sont les vestiges du site fortifié. La plus grosse abrite la chapelle dont les murs sont entièrement ornés de peintures. Elle est située au dernier étage et desservie par un escalier à vis. Les caves voûtées sont un exemple des capacités de stockage des récoltes que constituait le château. Il reste deux canonnières et des traces de meurtrières obturées. La demeure possède de nombreux éléments architecturaux, dont une chapelle au dernier étage de la tour nord, celle-ci possède de magnifiques fresques murales, remontant au XVe siècle Il devient la résidence principale des abbés, mais un siècle plus tard, perd son rôle central. Il est utilisé comme une grange cistercienne : de nombreux bâtiments agricoles existent à l'époque, dont il ne reste qu'une partie. Lors d'un procès, en 1731, entraîne un état des lieux des bâtiments confirmant le délabrement qui entraîne des travaux de réduction des risques à défaut de restauration, par raccourcissement d'une tour, démolition d'une autre et remplissage des douves.","habitants":"Abbé Guillaume de Boisset\r\n        \r\n        \r\n        \"","divers":"Château de Serres à Labessière Candeil","gps":"","images":["../../jctruffet.com/image/image_81/81_Serres_Tarn_1.jpg","../../jctruffet.com/image/image_81/81_Serres_Tarn_2.jpg","../../jctruffet.com/image/image_81/81_Serres_Tarn_3.jpg","../../jctruffet.com/image/image_81/81_Serres_Tarn_4.jpg"]},"Consult_chateau_formulaire19fb":{"id":"Consult_chateau_formulaire19fb","dept":"81","canton":"Sémalens","commune":"Serviès","nom":"Serviès","type":"Château","periode":"XVI-XX","histoire":"SERVIES,  Serviès était autrefois une seigneurie dont le seigneur était dans le dernier quart du XVe siècle, époque ou fut construit le château, Jean de Castelnau, gouverneur de Lombers. Son fils ou petit-fils Antoine-Vital de Castelnau, co-seigneur de Cuq et de Serviès, fut capitaine du château de Lombers, puis lui succéda son frère Guy. Pierre de Castelnau-Serviès s'étant fait chevalier de Malte, en 1623 il légua sa seigneurie à sa nièce.","architecture":"Le château de Serviès   du XVIe siècle présente un corps de logis dont les ouvertures ne sont pas antérieures au XVIIIe siècle et flanqué d'une massive tour circulaire dont la toiture a été arasée, certainement pendant la Révolution. Cette tour est construite dans un matériau composite blocs de pierre bien appareillés, petit appareil, lits de brique, qui montre que le bâtiment a dû subir beaucoup de remaniements depuis le XVIe siècle. L'intérieur conserve un escalier et une cheminée du temps de Louis XIII.","habitants":"Famille de  Pierre de Castelnau-Serviès\r\n        \r\n        \"","divers":"Château de Serviès","gps":"","images":["../../jctruffet.com/image/image_81/81_Servies_1.jpg","../../jctruffet.com/image/image_81/81_Servies_2.jpg","../../jctruffet.com/image/image_81/81_Servies_3.jpg"]},"Consult_chateau_formulaire529f":{"id":"Consult_chateau_formulaire529f","dept":"81","canton":"Labruguière","commune":"Sorézes","nom":"Sorézes","type":"Château","periode":"XV-XIX","histoire":"Plusieurs châteaux à Sorézes  dont celui de Sorézes, la tour  de Cammazes,  de Vigouroux, Vestiges de Roquefort, château de Granges Veille et le manoir de Jacournassy.                        ROQUERFORT, le domaine de Beaufort constituait une dépendance de l'abbaye de Sorézes. Le petit château a été construit dans le dernier quart du XIXe siècle, pour la famille Lacger. Plusieurs blocs sculptés ont été remployés dans la construction du château. La plupart d'entre eux peuvent être identifiés comme des modillons romans, provenant très  de l'abbaye médiévale de Sorézes. Les montants du portail d'accès au parc pourraient aussi constituer des blocs en remploi, dont la provenance est inconnue.                                                                    Hôtel Abbaya, école de Sorézes est imprégné de XIIe siècles de lhistoire de France. Pas d'autres information historique.                       JACOURNASSY, manoir dit de la ferme datant de la seconde moitié du XVIIIe siècle. Pas d'information historique.                     VIGOUROUX, le château a été construit en 1889 par Alfred Darles,                                                                                                                   Granges veilles.","architecture":"Sorézes, Hôtel Abbaya école de Sorézes  classé monument historique,. \r\n Roquefort    Vestige d'un castrum bas médiéval, dit la tour du diable On accède alors à la partie basse du château comportant les vestiges dune dizaine de réduits des habitations . Enfin, on montre à la tour elle-même, le donjon, qui sélève à langle nord-est dun monticule. Elle comporte plusieurs étages : une pièce carré autrefois voûtée, et dont un des murs a été éventré. Dans le sol de cette salle, une trappe souvre qui donne accès à une salle souterraine. Sans doute, ces deux salles étaient-elles des cachots, tandis quau troisième niveau de la tour sélevait le logis seigneurial.                                                                                Jacournassy   manoir dit de la ferme datant de la seconde moitié du XIXe siècle.  Elle se composait de deux corps de bâtiments parallèles.  Probablement en même temps que la maison de maître qui lui est associée.                                                                                   Vigouroux ce dont témoigne le registre des augmentations du cadastre. Les écuries ont pu être construites un peu plus tard, peut-être au tout début du 20e siècle, à l'emplacement d'un bâtiment plus ancien représenté sur le cadastre de 1833.","habitants":"Famille Lacger\r\n        \r\n        \"","divers":"Plusieurs châteaux à Sorézes  dont celui de Sorézes, la tour  de Cammazes,  de Vigouroux, Vestiges de Roquefort, château de Granges Veille et le manoir de Jacournassy.","gps":"","images":["../../jctruffet.com/image/image_81/81_Sorezes_1.jpg","../../jctruffet.com/image/image_81/81_Sorezes_2.jpg","../../jctruffet.com/image/image_81/81_Sorezes_3.jpg","../../jctruffet.com/image/image_81/81_Sorezes_4.jpg","../../jctruffet.com/image/image_81/81_Sorezes_5.jpg","../../jctruffet.com/image/image_81/81_Sorezes_6.jpg","../../jctruffet.com/image/image_81/81_Sorezes_7.jpg","../../jctruffet.com/image/image_81/81_Sorezes_8.jpg"]},"Consult_chateau_formulaire972f":{"id":"Consult_chateau_formulaire972f","dept":"81","canton":"le pastel","commune":"Soual","nom":"Soual","type":"Château","periode":"XV-XVI","histoire":"Soual possède deux châteaux celui de Lasserré et celui de Lavergne  je n'ai pas d'information historique.                                                       SOUAL ancien village fortifié en rotonde, où demeurent quelques traces des portes (lieux-dits : Barry et ancien moulin du Sor).","architecture":"Lavergne  de plan quadrangulaire à deux niveaux et attiques toit en croupe flanqué aux extrémités de tourelles.                                             Lassérré de plan en U corps de logis à trois niveaux, flanqué en façade de deux tours rondes dont celle de droite à toit plat.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château de Lavergne et de Lassérré à Soual.","gps":"","images":["../../jctruffet.com/image/image_81/81_Soual_1.jpg","../../jctruffet.com/image/image_81/81_Soual_2.jpg"]},"Consult_chateau_formulaire0cc6":{"id":"Consult_chateau_formulaire0cc6","dept":"81","canton":"Mazamet","commune":"St_Amans_soult","nom":"Soult_Berg","type":"Château","periode":"XIX","histoire":"SOULT,  Jean-de-Dieu Soult est né en 1769 à Saint-Amans La Bastide. Il sengagea dans larmée Française à lâge de 16 ans. Il fût nommé capitaine en 1793 à la suite dune action déclat. En 1794 fût une année très bénéfique pour lui puisquil obtint  les grades de chef de bataillon, d
