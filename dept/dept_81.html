omine la vallée de la Sodrome et fait face au château de Mauriac, dresse ses tours et son mur denceinte, au beau milieu de ses vignes, bâtisse de caractère et de charme, datant des XIIIe et XVe siècles,  Les premières constructions datent du XIIIe siècle.   Ce petit ensemble médiéval, devenu un hôtel.                                                    Larroze de plan en U, les corps de logis à un niveau avec rangée d'oeils de buf et lucarnes sur façade intérieure, tour sur angle extérieur.                                                                                                                    Porthos, manoir à deux niveaux  et lucarnes sur toit brisé flanqué sur angle d'une tour carrée à trois niveaux toit à quatre pans en poivrière.                                                                                             La Vère de plan en U à deux niveaux avec pavillons sur angles et pavillon d'entrée légèrement saillant avec toit à fronton triangulaire.","habitants":"Famille de Pierre dHautpoul                                                                 Laroze M. et Mme Noblet\r\n        \r\n        \"","divers":"Le château de Cahuzac, de Vère, de la Salettes , de Larroze et de Porthos.","gps":"","images":["../../jctruffet.com/image/image_81/81_Cahuzac_Vere_1.jpg","../../jctruffet.com/image/image_81/81_Cahuzac_Vere_2.jpg","../../jctruffet.com/image/image_81/81_Cahuzac_Vere_3.jpg","../../jctruffet.com/image/image_81/81_Cahuzac_Vere_4.jpg","../../jctruffet.com/image/image_81/81_Cahuzac_Vere_5.jpg","../../jctruffet.com/image/image_81/81_Cahuzac_Vere_6.jpg","../../jctruffet.com/image/image_81/81_Cahuzac_Vere_7.jpg","../../jctruffet.com/image/image_81/81_Cahuzac_Vere_8.jpg","../../jctruffet.com/image/image_81/81_Cahuzac_Vere_9.jpg"]},"Consult_chateau_formulaire7845":{"id":"Consult_chateau_formulaire7845","dept":"81","canton":"Lacaune","commune":"Lacaune","nom":"Calmels","type":"Château","periode":"XIX","histoire":"CALMELS, le château a été reconstruit au XIXe siècle par son propriétaire, Gabriel de Naurois, maire de Lacaune, sur les vestiges d'un château médiéval et dans un style néogothique. Le château abrite désormais l'école de musique, les bureaux de la chambre d'agriculture et une salle de réception municipale. Les deuxième et troisième étages sont utilisés comme gîte.","architecture":"Le château  de Calmels, de plan en équerre,  la tour, primitivement crénelée, a été couverte par la suite par un toit conique en ardoise. Un pavillon plus bas d'un étage a été ajouté derrière la tour, dans le prolongement du corps de logis principal  à trois niveaux à cinq travées avec lucarne sur chacune, accolé d'un autre corps de logis en équerre, d'une tour ronde crénelée à toit en poivrière à l'opposé, l'ensemble est prolongé par une aile à deux niveaux avec lucarnes toiture à la Mansart.\r\nDans le parc du château se trouve les pierres provenant des croisées d'une maison, située autrefois à l'angle des rues Antoine-Cambon et de l'Esplanade.","habitants":"Famille de Gabriel de Naurois\r\n        \"","divers":"Le château de Calmels","gps":"","images":["../../jctruffet.com/image/image_81/81_Calmels_1.jpg","../../jctruffet.com/image/image_81/81_Calmels_2.jpg","../../jctruffet.com/image/image_81/81_Calmels_3.jpg","../../jctruffet.com/image/image_81/81_Calmels_4.jpg","../../jctruffet.com/image/image_81/81_Calmels_5.jpg"]},"Consult_chateau_formulaire104b":{"id":"Consult_chateau_formulaire104b","dept":"81","canton":"Saix","commune":"Cambounet sur le Sor","nom":"Cambounet_Sor","type":"Château","periode":"XVI   XIX","histoire":"Deux châteaux à Cambounet sur le Sor, celui de La Serre  du  XVIe siècle chambres d'hôtes et celui de Fontguitard, et à trois kilomètres au sud le manoir de Soual (pas d'information historique)                        SERRE, en 1569 à cette époque,  la guerre de religion ensanglantait le pays larmée de Gontaud de Biron, fit le siège de Brassac, et layant pris dassaut, la plupart des habitants furent tués, dont Catherine de Narbonne et quasi tous les meubles, effets et documents du château furent pillés, brûlés et jetés à la rivière Agoût. La dite Catherine de Narbonne, habitant la seigneurie de La Serre, était lépouse veuve du noble Jean de La Palu. Après la mort de Catherine de Narbonne, son époux, Saint Lavy de Fiteria, en deuxième noce en 1556, devient le nouveau propriétaire en 1594, après un procès gagné contre Jean Sébastien Roquefort de Salles, époux de la demoiselle de la Palu, seule du nom, qui revendiquait la seigneurie. Le nouveau propriétaire, Saint-Lavy de Fiteria fit aménager dans laile sud du château, la chapelle de Saint-Antoine de La Serre. En 1621, Gillo de Juillard, héritier de Saint Lavy de Fiteria devint propriétaire et le vendit à son tour en 1664 à Gorge de Villeneuve, mais ce dernier ne pouvant faire face, le vendit en 1658 à Jean dAlibie. De 1658 à 1804, cette seigneurie demeura de père en fils, Jean 1674, Jaques 1709, la propriété de la famille dAlibie pour passer dans la famille de Lamouzie en 1804 et par alliance, aux de Limairac 1867. Jacqueline de Limairac, ses neveux Chantal et Guy Berthoumieux loccupent à ce jour et poursuivent la restauration.                                          FONTGUITARD, pas d'information historique.        SOUAL, Pas d'information historique.","architecture":"Le château de la  Serre  est très ancien, mais les écrits ne remontent pas au-delà de 1569.  Son pillage et la destruction de ses archives font disparaître celles de la Serre qui appartient au même propriétaire. En 1675, un document signale qu'à l'époque la bâtisse comporte 5 tours, une basse-cour et un pigeonnier. Le château change de propriétaire à plusieurs reprises au gré des ventes. Le château Renaissance se reconnaît à ses fenêtres à meneau ou à la porte de l'escalier encadré de pilastres et surmonté d'un énorme linteau. Le bâtiment se présente en deux ailes perpendiculaires. Deux tours rondes médiévales encadrent les façades et l'angle intérieur est occupé par une tour polygonale en briques. La construction est en pierre avec pierres de taille aux angles et encadrement. Les toitures mêlent tuiles et ardoises.                                   Fontguitard,  dans son parc de 3 hectares, dont une frontière se situe sur la rivière du Sor, ce château du XIXe siècle est idéalement situé pour des vacances paisibles dans un cadre privilégié et calme, tout en étant une base formidable pour découvrir la diversité et la multitude d'activités. Un corps de logis central à cinq travées à deux niveaux et lucarnes, accolé de chaque côté d'un pavillon à trois niveaux toit à quatre pans, prolongé sur l'arrière par des dépendances barlong.      Soual, corps de logis carré à quatre travées avec série d'oculus toit en croupes deux tourelles aux angles de la façade toitures en poivrières.","habitants":"Catherine de Narbonne\r\n        \r\n        \"","divers":"Le château  de la Serre, de la Sor et de Fontguitar, le manoir de Soual.","gps":"","images":["../../jctruffet.com/image/image_81/81_Cambounet_Sor_1.jpg","../../jctruffet.com/image/image_81/81_Cambounet_Sor_2.jpg","../../jctruffet.com/image/image_81/81_Cambounet_Sor_3.jpg","../../jctruffet.com/image/image_81/81_Cambounet_Sor_4.jpg","../../jctruffet.com/image/image_81/81_Cambounet_Sor_5.jpg","../../jctruffet.com/image/image_81/81_Cambounet_Sor_6.jpg","../../jctruffet.com/image/image_81/81_Cambounet_Sor_7.jpg","../../jctruffet.com/image/image_81/81_Cambounet_Sor_8.jpg","../../jctruffet.com/image/image_81/81_Cambounet_Sor_9.jpg"]},"Consult_chateau_formulairef23a":{"id":"Consult_chateau_formulairef23a","dept":"81","canton":"Rabastens","commune":"Campagnac","nom":"Campagnac","type":"Maison forte","periode":"X-XV","histoire":"CAMPAGNAC, la seigneurie de Campagnac est mentionnée dès le Xe siècle. Elle appartient aux comtes de Toulouse puis au roi, à la suite de la campagne de Simon de Montfort. Par la suite, Campagnac fut cédé aux Rabastens par les descendants de ce dernier. En 1587 lorsque Campagnac fut pris par les catholiques, ils l'offrirent à l'évêque d'Albi contre l'assurance que l'ordre serait bien assuré, ainsi les troupes royales ne l'occupèrent pas, mais comme les protestants fomentaient des troubles, en août 1592 le duc de Joyeuse, gouverneur du Languedoc, commanda finalement la destruction du château, mais l'ordre ne fut pas exécuté. Après la famille de Rabastens, la seigneurie passa dans les mains de la famille de Vignes, puis, au milieu du XVIIIe siècle, on trouve le marquis de Puylaroque, seigneur de Campagnac.","architecture":"Aujourd'hui le château de Campagnac  devenu maison forte apparaît bien plus comme amputé d'une partie de ses bâtiments d'origine  ce qui lui confère encore beaucoup d'authenticité. Parmi ses beaux vestiges, le manoir conserve une belle tour dont le haut dût être arasé durant la Révolution.","habitants":"Famille de Rabastens\r\n        \"","divers":"La maison forte de Campagnac","gps":"","images":["../../jctruffet.com/image/image_81/81_Campagnac_1.jpg","../../jctruffet.com/image/image_81/81_Campagnac_2.jpg"]},"Consult_chateau_formulaire78c6":{"id":"Consult_chateau_formulaire78c6","dept":"81","canton":"Lacaune","commune":"Anglés","nom":"Campan","type":"Château","periode":"XI-XV","histoire":"CAMPAN, le fondateur de la seigneurie de Campan reste inconnu. Sa position dominante lui confère un poste de vigie sur la vallée du Thoré. Le premier seigneur de Campan est Guillaume de Citou. Il y réside vers le milieu du XVIe siècle. Son fils Jean Philippe laisse une fille, marquise de Citou, qui épouse Guillaume de Saix, famille originaire de Carcassonne, résidant au château de Paulignan dans l'Aude. Le château demeure environ un siècle dans la famille de Saix de Campan, puis par le jeu des alliances, il passe à la famille de Bedos originaire de Puylaurens, un des héritiers, Jean Gaston se fait appeler seigneur de Campan. La lignée des seigneurs de Campan s'éteint avec la disparition de Lucie Dominique de Bedos de Campan qui meurt à Puylaurens à la fin du XIXe siècle.","architecture":"Le domaine  de Campan se compose d'un château fortifié et d'une ferme. Les bâtiments se composent d'une tour ronde contenant un escalier à vis ; d'un bâtiment carré couvert en pavillon ; à l'est, d'un bâtiment flanqué d'une tour ronde en encorbellement ; de constructions résidentielles séparées l'une de l'autre par un mur épais et sans liaison, également flanquées d'une tour en encorbellement à l'angle ; au sud, d'une tour barlongue abritant le grand escalier, portant dans l'angle nord-est une tourelle en encorbellement.   L'édifice est bâti au XIe siècle, il est constitué d'un château fort flanqué de trois tours rectangulaires reliées par une épaisse muraille. Au XV e siècle, pour compléter l'appareil défensif, une tour ronde avec archères et mâchicoulis est rajoutée à l'angle Nord Ouest. Au XVIe siècle, les campagnes de construction se poursuivent avec la transformation de la cour intérieure en un bâtiment couvert qui forme l'essentiel de la demeure seigneuriale. Au XVIIe siècle, une campagne d'embellissement lui apporte sa façade actuelle et une tour avec échauguette à l'angle Sud-Est.","habitants":"Famille de Guillaume de Citou\r\n        \"","divers":"Le château de Campan à Anglès","gps":"","images":["../../jctruffet.com/image/image_81/81_Campan_1.jpg","../../jctruffet.com/image/image_81/81_Campan_2.jpg","../../jctruffet.com/image/image_81/81_Campan_3.jpg","../../jctruffet.com/image/image_81/81_Campan_4.jpg","../../jctruffet.com/image/image_81/81_Campan_5.jpg"]},"Consult_chateau_formulairee764":{"id":"Consult_chateau_formulairee764","dept":"81","canton":"Albi","commune":"Albi","nom":"Cantespau","type":"Château","periode":"XVII","histoire":"CANTESPAU, l'édifice a très certainement été construit par la famille Delecouls, famille consulaire d'Albi qui constitua aux XVIIe et XVIIIe siècles un important domaine foncier dans les alentours. On sait qu'en 1746, Jean-Pierre Delecouls aménage une chapelle dans l'une des tours, et engage un chapelain. Peu après cette date, la famille fait l'acquisition de l'important domaine voisin de Lévizac. Le château resta dans la descendance des Delecouls jusqu'en 1878. Il est alors vendu à une famille d'Albi.\r\nRacheté par une société HLM en 1969, le château est fermé et livré au pillage. En 1984, il est rétrocédé à la ville d'Albi dans le cadre de la création de la zone d'activité commerciale de Cantespau.  Revendu à un particulier en 2006, des travaux de réhabilitations sont programmés.","architecture":"Cantespau, le bâtiment actuel a été plusieurs fois remanié. Bâtis en brique, les façades sont percées d'ouvertures modernes du XVIIIe siècle qui remplacent d'anciennes fenêtres à meneau, encore visibles sur le \"donjon\" et sur les façades arrières. Deux tours cantonnent la façade principale. Leur sommet est orné d'une belle corniche.  L'escalier est  construit sur plan rectangulaire, ses entrées sont marquées des voûtes à arcs en plein cintre.","habitants":"Famille Delecouls\r\n        \"","divers":"Château de Cantespau à Albi","gps":"","images":["../../jctruffet.com/image/image_81/81_Cantespau_1.jpg","../../jctruffet.com/image/image_81/81_Cantespau_2.jpg","../../jctruffet.com/image/image_81/81_Cantespau_3.jpg","../../jctruffet.com/image/image_81/81_Cantespau_4.jpg","../../jctruffet.com/image/image_81/81_Cantespau_5.jpg"]},"Consult_chateau_formulaireb644":{"id":"Consult_chateau_formulaireb644","dept":"81","canton":"Carmaux","commune":"Carmaux","nom":"Carmaux","type":"Château","periode":"XVII","histoire":"A Carmaux le château de Soulages et à quelques kilomètres à l'Est le château de  Cadapau à Saint-Jean de Marcel.                                               CARMAUX Jean-Baptiste de Ciron, conseiller, puis président au parlement de Toulouse de 1674 à 1724, achète la seigneurie de Carmaux.  Sa fille apporte une partie de la seigneurie en dot, par son mariage en 1724 avec François Paul de Solages. Antoine Paulin de Solages, fils des précédents sera dans la famille de Solages le dernier à prendre ce titre de courtoisie de \"marquis de Carmaux\". Le dernier frère d'Antoine Paulin, Gabriel de Solages a réussi à accroître l'importance de l'entreprise.  Après lincendie du château, Ludovic de Solages agrandit la maison du directeur des mines, il fait construire un chalet, quil transforme par la suite par un pavillon perpendiculaire. Ainsi, le bureau du directeur part sinstaller à Carmaux, tandis que les anciens bureaux des mines sont transférés au quartier de la Tour de Carmaux. Il fait également construire la maison du gardien. Il vend la société des mines de Carmaux un terrain de plusieurs hectares, afin de permettre la construction de la centrale électrique et le parc du pré-grand (1923).                              CADAPAU, au XVIIIe siècle, une noble famille, les Teyssier de Cadapau qui portaient le titre d'écuyer, possédaient cette propriété. Ses membres y vivaient grâce aux revenus de leurs domaines, mais aussi à la faveur de pensions dispensées par le roi. L'on trouve en 1623 la désignation comme collecteur de la chapelle des Gayrals, à Saint-Affrique d'Albi, noble Claude de Teyssier de Silhac. En 1693, c'est Alphonse de Teyssier qui meurt à l'âge de 65 ans. Vers 1696, l'on voit naître les enfants successifs d'Antoine de Teyssier de Cadapau et de Marie de Clergue de La Boissonade. Vers 1737, naissent ceux de Bernard de Teyssier de Cadapau, ancien capitaine pensionné au régiment de Cambraisis. En 1767, à Moularés, Jean-François de Teyssier de Silhac, écuyer, garde du corps du Roy, fils de Bertrand de Teyssier, ancien capitaine du régiment du Maine épousait Marie Anne Rouvellat, fille d'un bourgeois de la Selve. Sous le règne de Louis XVI vivait à Cadapau, Antoine-Bernard de Teyssier, conseiller auditeur à la cour des comptes de Montpellier.","architecture":"Soulages; Il fut construit en 1755 par Gabriel de Solages dit « le Chevalier » fondateur des mines de Carmaux, et transformé en un imposant château par son arrière-petit-fils Achille pendant la Restauration (1814-1830), il fut entièrement détruit par un incendie le 1er avril 1895, destruction survenue dans des circonstances peu connues. Il reste aujourdhui quelques vestiges du château dorigine tel que : Un élément darchitecture, corbeau ou clé de voûte, représentant un soleil dans un blason, symbole de la famille de Solages, Un balcon dapparat en pierre de taille transformé en banc,  Les caves voûtées de lancien château  comblées avec les pierres de celui-ci. Un escalier monumental, long de 120 m de large et de 4 m, permet daccéder à la cité et facilite la communication entre les usines et les puits, et conduit au parc du pré-grand. \r\nCadapeau, de plan rectangulaire.","habitants":"Famille de  François Paul de Solages\r\n        \"","divers":"Château de Soulages et de Cadapau à St-Jean de Marcel","gps":"","images":["../../jctruffet.com/image/image_81/81_Carmaux_1.jpg","../../jctruffet.com/image/image_81/81_Carmaux_2.jpg","../../jctruffet.com/image/image_81/81_Carmaux_3.jpg","../../jctruffet.com/image/image_81/81_Carmaux_4.jpg"]},"Consult_chateau_formulairee3bb":{"id":"Consult_chateau_formulairee3bb","dept":"81","canton":"Lagrave","commune":"Lasgraisses","nom":"Castela","type":"Château","periode":"XVI","histoire":"CASTELA, fondé au XIIe siècle, Le Castela est l'ancienne résidence des seigneurs de Brens et de Lasgraisses. Le premier propriétaire connu est un nommé Jean Pujol, marchand à Labarthe Vieille, dans la baronnie de Lombers. Le Castela ne fut pas saisi durant la Révolution, mais vendu en 1803 à Antoine Portal, né à Gaillac, médecin des rois Louis XVIII et Charles X. Après la mort du baron Portal, ses héritiers vendirent Le Castela qui changea souvent de mains,  marquis Taffanel de la Jonquières, marin et gouverneur du Canada.","architecture":"Château composite du Castela sur bases gothiques.  fut endommagé par un incendie en 1951. Le château actuel fut bâti au début du XVIe siècle, édifié en brique et pierre de taille, c'est l'une de ces fermes-forteresses comme il en existait beaucoup jadis dans l'Albigeois. Il a été construit sur une éminence et dont il occupe près de 200 mètres carrés, et domine la campagne. La partie orientale du bâtiment semble la seule intacte et le corps de logis presque carré est flanqué de deux tours rondes dont le faîte fut arasé au niveau du toit et recouvert de tuiles. Une troisième tour, plus petite, sert de pigeonnier.","habitants":"Marquis Taffanel de la Jonquière,\r\n        \"","divers":"Château du Castela à Lasgraisses","gps":"","images":["../../jctruffet.com/image/image_81/81_Castela_1.jpg","../../jctruffet.com/image/image_81/81_Castela_2.jpg","../../jctruffet.com/image/image_81/81_Castela_3.jpg","../../jctruffet.com/image/image_81/81_Castela_4.jpg"]},"Consult_chateau_formulaireb0db":{"id":"Consult_chateau_formulaireb0db","dept":"81","canton":"Lacaune-Brassac","commune":"Castelnau de Brassac","nom":"Castelnau_Brassac","type":"Château","periode":"XIX","histoire":"Trois châteaux à Brassac celui de Belfortes du XIIIe-XIXe siècle et celui de Brassac de Castelnau du XVII-XXe siècle devenu maison commune et le  château de la Barbazanie aux environs de Brassac.                                                                                         BRASSAC Bonnéry,  subsiste un pont médiéval et deux châteaux.\r\nBrassac de Belfortés a absorbé Brassac-de-Castelnau entre 1790 et 1794. La commune fusionnée a pris le nom de Brassac. La ville se développe au XIXe siècle grâce au textile. Il figure en 1371 dans le dénombrement que fit Catherine de Vendôme de la lignée des Comtes de Castres. Guilhaume Imbert était à cette époque Seigneur de Brassac de Castelnau (rive droite), tandis que Brassac de Belfortès était au nombre des possessions d'Amblard de Soubiran. Cette dernière famille fut une des plus importante avec celle de La Palu et des de Juge dans l'histoire de Brassac.\r\nAu moment des guerres de religions, elle fournit d'importantes personnalités protestantes du Castrais. En 1476, lorsque Boffile de Juge fut substitué à Jacques d'Armagnac par Louis XI, nous voyons apparaître les délégués des Seigneurs de Brassac de Castelnau et de Belfortès au couvent des Jacobins de Castres pour prêter serment à leur nouveau suzerain. La période de 1555 à 1610 fut essentiellement troublée par les rivalités religieuses. La tolérance n'était admise d'aucun côté et notre région en fut particulièrement affectée. Les luttes civiles commencèrent vers 1561 et durèrent toutes la moitié du XVIe siècle jusqu'au début de XVIIe siècle. Une paix relative s'installa ensuite.   En 1824 est fondé à Oulias, sur le territoire la commune de Castelnau-de-Brassac, un couvent de l'institut des surs de Saint-Joseph. Elles y tiendront une école de filles, pensionnat et école d'enseignement ménagers. Les dernières surs quitteront les lieux en 1992.  Louis Cavaillès (mécanicien de Jean Mermoz), né à Castelnau-de-Brassac. Louis-Abel Fontenai de Bonafous, dit abbé de Fontenay (1736-1806), journaliste et compilateur, né à Castelnau-de-Brassac.                                          BARBAZANIE,  la famille des Corbière de Valès possédait le château de la Barbazanie au début du XIXe siècle.","architecture":"Brassac mène sa vie tranquille et saine en pleine nature.  Sur chaque rive un château médiéval a résisté au temps. De plan rectangulaire à trois  niveaux  et attiques, flanqué  d'une  tour ronde à toit pointu dont une arasée, Si vous allez faire un tour au musée du protestantisme de Ferrières, vous retracerez toute cette histoire des guerres de religions qui reste aujourdhui  intimement liée à celle du Tarn. De l'autre côté du pont le château de Brassac de  Castelnau de plan barlong  une dizaine de travées à deux niveaux sur un soubassement pris dans la rivière ainsi que les deux tours rondes, un toit en poivrières l'autre arasée.                                                               Barbazanie; de plan rectangulaire à huit travées de trois niveaux, toit en croupe avec lucarnes, deux tourelles carrées accolées aux angles en façade toit en poivrières à quatre pans, plein cintre en façade un pavillon en saillit avec balcon et fronton triangulaire,  présente une belle façade régulière de onze travées se composant d'un corps de logis central rectangulaire flanqué de tours carrée présentant une seule travée et couronnées d'un toit en pavillon. Le centre de la façade présente un avant-corps de trois travées qui en marque l'axe. Cet avant-corps présente au niveau des combles un attique surmonté d'un fronton triangulaire auquel répondent les lucarnes rythmant l'axe central des travées réparties de part et d'autre de l'avant corps. Il en découle un jeu de volumes qui, conjugué au subtil réseau de bandeaux soulignant les étages et les travées de la façade, donnent à cette architecture, restaurée au XIXe siècle, une intéressante animation.","habitants":"Famille des Corbière de Valès\r\n        \"","divers":"Le château de la Marquise, de Belfortes, de Brassac hôtel de Ville et le château Barbazanie","gps":"","images":["../../jctruffet.com/image/image_81/81_Castelnau_Brassac_1.jpg","../../jctruffet.com/image/image_81/81_Castelnau_Brassac_2.jpg","../../jctruffet.com/image/image_81/81_Castelnau_Brassac_3.jpg","../../jctruffet.com/image/image_81/81_Castelnau_Brassac_4.jpg","../../jctruffet.com/image/image_81/81_Castelnau_Brassac_5.jpg","../../jctruffet.com/image/image_81/81_Castelnau_Brassac_6.jpg","../../jctruffet.com/image/image_81/81_Castelnau_Brassac_7.jpg"]},"Consult_chateau_formulairee730":{"id":"Consult_chateau_formulairee730","dept":"81","canton":"Albi","commune":"Castelnau de Levis","nom":"Castelnau_Levis","type":"Forteresse","periode":"XIII","histoire":"CASTELNAU, construit en 1222 par Raymond VII comte de Toulouse et en  1235 par Sicard Alaman, puissant vassal du comte de Toulouse Raymond VII; il représentait un bastion avancé des possessions toulousaines face à la royauté. nommé « puy de Bonnafous », le château sera longtemps appelé Castelnau-de-Bonnafous, avant que la famille de Lévis n'en hérite et lui donne son nom. En 1480, la seigneurie devient la possession de Hugues d' Amboise, baron d' Aubijoux. Cette seigneurie restera dans la famille d' Amboise jusqu'au XVIIe siècle. Le petit fils d' Hugues, Louis d'Amboise d'Aubijoux, comte d'Aubijoux et baron de Castelnau-de Bonnafous, restaurera, et habitera régulièrement le château, très caractéristique, avec sa tour de 40 mètres de hauteur. La salle d' armes du château fut décorée par ses soins , parmi lesquelles on remarquait le portrait du comte d'Aubijoux, et celui du roi.","architecture":"De l'ancien château de Castelnau, construit sur un piton rocheux il ne subsiste que quelques ruines dont une tour de guet dominant la vallée du Tarn et la ville d'Albi. Une restauration partielle depuis le début des années 1980 permet de situer les murs de l'enceinte haute. De l'enceinte basse, ne subsiste qu'une porte fortifiée. La tour, haute de 35 mètres, se compose d'une tour demi-circulaire à laquelle est adossée une tour carrée. Elle comporte trois étages voûtés. Chacun d'eux montre des traces d'un plancher disparu qui doublait le nombre d'étages. Il doit son piteux état à son rôle de carrière au cours des XIXe et XXe siècles.","habitants":"Famille de Sicard Alaman,\r\n        \"","divers":"Vestiges du château de Levis avec sa tour de guet.","gps":"","images":["../../jctruffet.com/image/image_81/81_Castelnau_Levis_1.jpg","../../jctruffet.com/image/image_81/81_Castelnau_Levis_2.jpg","../../jctruffet.com/image/image_81/81_Castelnau_Levis_3.jpg","../../jctruffet.com/image/image_81/81_Castelnau_Levis_4.jpg","../../jctruffet.com/image/image_81/81_Castelnau_Levis_5.jpg","../../jctruffet.com/image/image_81/81_Castelnau_Levis_6.jpg"]},"Consult_chateau_formulaire2bfd":{"id":"Consult_chateau_formulaire2bfd","dept":"81","canton":"Rabastens","commune":"Castelnau de Montmiral","nom":"Castelnau_Montmiral","type":"Bastide","periode":"XIII-XVI","histoire":"A Castelnau de Montmiral ; le château de Corduriès du XVI-XVIIe siècle , de Meyrargues du XVI-XVIIe siècles et la Bastide.                                                           La BASTIDE albigeoise est fondée en 1222 par Raymond VII, comte de Toulouse. Son nom primitif est \"Castellum Novum Montis Mirabilis\" ; le diminutif de \"Montmiral\" a été communément utilisé dans les actes officiels, y compris au XIXe siècle dans l'état civil de la commune.\r\nPendant la Guerre de Cent Ans, les Anglais, conduits par le prince Noir, envahissent l'Albigeois en 1345. Ceux-ci se retireront sans oser attaquer la ville. Pendant les Guerres de religion, Castelnau-de-Montmiral n'adhère jamais au protestantisme et accueille les catholiques de Gaillac, qui ont été chassés de la ville par les protestants majoritaires. En janvier 1587, une attaque du capitaine protestant Bruniquel est repoussée. Selon la légende, une femme revenant de puiser l'eau à la fontaine du Théron aurait donné l'alerte, contraignant les assaillants à une retraite précipitée. Louis XIII est passé à Castelnau de Montmiral le 24 juin 1622, logé dans la maison de \"Tonnac\". C'est également le lieu d'habitation de la célèbre famille Privat.                                                           CORDURIES, pas d'information historique.                                                        MEYRARGUES,  en 1453 fief des seigneurs d'Albiers, puis passa au XVIe siècle à la famille de Tonnac-Villeneuve qui le conservera jusqu'au  XX e siècle, transformé en ferme puis longtemps abandonné devient en 1980 à la famille de Geddes qui le  restaure.","architecture":"Castelnau de Montmirail est une cité médiévale dominant fièrement la vallée du Tarn, justifie cette impression de forteresse imprenable. Le charme typique des façades, sa place aux arcades et son pilori témoignent dune histoire et dun patrimoine encore très présents.   Corduriès, présente de nos jours un aspect à la fois bien entretenu et resté apparemment inchangé, avec ses dispositions des XVIe et XVIIe siècles. L'on découvre un logis à deux étages en avant duquel s'inscrit décentrée vers la gauche une grosse tour d'escalier carrée. Malgré des traces de reprise, le château présente un appareil homogène et les angles du bâtiment ont reçu de beaux chaînages. Les croisées de meneaux, simples, présentent toutes la même physionomie et la principale animation de cette façade réside dans la porte s'ouvrant à droite de la tour. Coiffée d'un fronton curviligne, cette porte a reçu un décor de pilastres ioniques dont l'originalité ne traduit plus celui de la Renaissance, mais l'art maniériste. La verticalité des pilastres se trouve interrompue par un coupage en bossages entre lesquels viennent s'insérer des entrelacs. Par son aspect à la fois massif et aimable, ce château est tout à fait représentatif des manoirs de la région édifiés ou le plus souvent remaniés à l'aube du grand siècle.                          Mayrargues  demeure fortifiée de la renaissance en pierre corps de logis rectangulaire, élevé sur un rez-de-chaussée  et de deux étages, le second sur encorbellement comporte une partie ajoutée formant chemin de ronde  et une partie pleine appareillée en torchis avec pans de bois. A l'est une tour pentagonale engagée et à l'angle sud-ouest une tour ronde arasée. A l'angle nord s'élevait une échauguette équipée d'une meurtrière. La façade sur cour est éclairée par sept croisées, décentrée la porte d'entrée tranche par sa   décoration raffinée  elle s'encadre entre des piédroits terminées par des pilastres à chapiteaux  ioniques soutenant une corniches laquelle est surmonté d'un fronton triangulaire percé d'un il-de-buf ovale.","habitants":"Famille Privat                                                                           Famille de Tonnac-Villeneuve\r\n        \"","divers":"La bastide de Castelnau avec porte, le château de Conduries et le château de Meyrargues.","gps":"","images":["../../jctruffet.com/image/image_81/81_Castelnau_Montmiral_1.jpg","../../jctruffet.com/image/image_81/81_Castelnau_Montmiral_2.jpg","../../jctruffet.com/image/image_81/81_Castelnau_Montmiral_3.jpg","../../jctruffet.com/image/image_81/81_Castelnau_Montmiral_4.jpg","../../jctruffet.com/image/image_81/81_Castelnau_Montmiral_5.jpg","../../jctruffet.com/image/image_81/81_Castelnau_Montmiral_6.jpg","../../jctruffet.com/image/image_81/81_Castelnau_Montmiral_7.jpg","../../jctruffet.com/image/image_81/81_Castelnau_Montmiral_8.jpg"]},"Consult_chateau_formulaireb298":{"id":"Consult_chateau_formulaireb298","dept":"81","canton":"Castres","commune":"Castres","nom":"Castres_chateaux","type":"Château","periode":"XVI","histoire":"Plusieurs châteaux à Castres ; celui de Fédariè,  de Caussade, de Causse (voir article), du Clots, de Gourjade, de Hauterives, de Lastours, le castelets et la tour des couvents des cordonniers                                                      HAUTERIVES, manoir féodal sur les bords du Thoré, à la façade ornée de six écussons taillés dans la pierre et auxquels sajouta celui de la famille de Villeneuve, aujourd'hui toujours propriétaire.                                                  CLOT, chambres dhôtes spacieuses et tables dhôtes au bord de la rivière lagout, dans un château du XIII et XVe siècle, aux portes de Castres, gîtes de France et Charmance.                                                                                          GOURJADE,   possession jusqu'à une date récente de la famille de Boissezon,  Gourjade et son parc sont aujourd'hui intégrés dans un golf club et espace de loisirs appartenant à la ville de Castres.                                               LASTOURS,  Joseph Dor  né en 1685, fils de maître Louis Dor, fait carrière dans l'administration militaire, en tant que commissaire des guerres. Le 2 juin 1717, il épouse, à Castres, Marie Dupuy. Après l'achat à la famille de Fregeville du domaine de Lastours, il prend le nom de Dor de Lastours. Louis Dor de Lastours est décédé le 3 avril 1802 à Castres  Le personnage le plus étonnant de la famille est sans conteste Joseph Dor de Lastours , haut magistrat sous l'ancien régime, il est farouchement patriote pendant la Révolution. Sous l'Empire, il devient maire de Castres et conserve ce poste au début de la Restauration. Il termine même député ultra-royaliste Joseph Dor de Lastours \"propriétaire, ancien député du Tarn, officier de la Légion d'Honneur, décédé le 21 décembre 1845 à Castres.                                                                                         Pas d'information sur les autres châteaux cité.  A 10 kilomètres à l'ouest  à Fréjeville le château de Teulétiè.","architecture":"HAUTERIVES, manoir féodal sur les bords du Thoré, était flanqué de quatre tours, il ne reste aujourd'hui qu'une tour entouré d'eau,  la tour ronde isolée au sud-ouest, la tour nord-ouest et la salle basse de l'aile Est, les douves, les ponts d'accès, les portails et le parc du château.\r\nle CLOTS, dominant son village, magnifique château sur plan en U, XVIe-XVIIIe siècle, d'une riche histoire, entièrement restauré, d'un décor raffiné et épuré. Remarquable escalier d'honneur et cinq pièces de réception.                                                                                            GOURJADE est une curieuse bâtisse en U pourvue d'un étage de style néo-gothique, surmonté d'un attique que vient coiffer un pavillon carré émergeant des combles et coiffé d'un toit en pavillon. L'élévation principale comporte 5 travées, les ailes en retour étant percées d'une travée de fenêtres identiques. A été amplement remaniée au début du XIXe siècle, mais le château est de fondation beaucoup plus ancienne, comme le montre la façade à pans de bois et encorbellement et la belle échauguette d'angle. En revanche, la fabrique dans le parc, atteste des travaux du XIXe siècle. Ajoutant au pittoresque de cette aimable demeure s'ouvrant sur une belle pelouse, un petit corps de logis secondaire s'appuie sur le flanc du logis principal, présentant une jolie échauguette d'angle.                                                                                LASTOURS est une curieuse et séduisante demeure du XIXe siècle empruntant à divers styles pour donner un résultat qui est loin d'être dénué de charme. On note en particulier une façade flanquée de tours rondes et coiffée d'un impressionnant toit aux allures flamandes, cette impression est confirmée par la présence au premier étage d'une galerie ponctuée d'arcs en anse de panier. Au rez-de-chaussée l'édicule marquant l'entrée de la demeure rappelle les fantaisies de l'architecture anglaise éclectique du siècle dernier. Ce bel édifice s'harmonise parfaitement de par ses matériaux et ses couleurs à la belle nature environnante.","habitants":"Famille de Boissezon                                                                     Famille de Fregeville\r\n        \"","divers":"Le château de Baudricourt,  de Lagarrigue, de Lastoure, du Hauterives, des Clots, d'Albarède, de Baluyères, de Caussade et  de Courjade.","gps":"","images":["../../jctruffet.com/image/image_81/81_Castres_chateaux_1.jpg","../../jctruffet.com/image/image_81/81_Castres_chateaux_2.jpg","../../jctruffet.com/image/image_81/81_Castres_chateaux_3.jpg","../../jctruffet.com/image/image_81/81_Castres_chateaux_4.jpg","../../jctruffet.com/image/image_81/81_Castres_chateaux_5.jpg","../../jctruffet.com/image/image_81/81_Castres_chateaux_6.jpg","../../jctruffet.com/image/image_81/81_Castres_chateaux_7.jpg","../../jctruffet.com/image/image_81/81_Castres_chateaux_8.jpg","../../jctruffet.com/image/image_81/81_Castres_chateaux_9.jpg"]},"Consult_chateau_formulaireb37a":{"id":"Consult_chateau_formulaireb37a","dept":"81","canton":"Castres","commune":"Castres","nom":"Castres_Hotel","type":"Hôtel","periode":"XVI-XVII","histoire":"La ville possède quelques hôtels particuliers du XVIe et XVIIe siècles, dont l'hôtel de Nayrac, datant de la Renaissance dit de Oulès.                                                                                         L'hôtel de VIVIES a été construit par monseigneur de Rozel, avocat à la chambre de l'Édit. Ce premier élément affiche le rang du propriétaire. Il est surmonté par un panneau sculpté qui portait les armes de la famille. En entrant, le visiteur était accueilli par une croisée centrale  ouvrant sur un balcon à balustre. La porte d'entrée de l'hôtel, décalée dans l'angle à gauche, est précédée par un perron : la cour se devait de ménager la plus grande disponibilité aux cavaliers et véhicules hippomobiles. L'escalier, noyau de l'édifice.                                                                                                              Hôtel de PONCET  Bâti au XVIIe siècle, cet hôtel a appartenu au grand-père maternel du maréchal Jean-Louis de Ligonnier. Né à Castres en 1680, ce dernier s'expatrie en 1697 à la suite de la révocation de l'édit de Nantes en 1685. Il mène toute sa carrière dans l'armée anglaise et termine feld-maréchal. Il meurt en 1770, comblé d'honneurs, aux côtés des rois et hommes célèbres d'Angleterre.                                                                                Hôtel Jean LEROY, l'emblème du pouvoir Lorsque Castres devint le siège de la Chambre de l'Édit en 1595, elle attira de nombreuses personnalités nommées par le Roi ou représentant tel parti. Leur autorité se devait d'être incontestée et leur demeure devait être représentative de ce pouvoir.  Cette inscription latine, au-dessus de la porte d'entrée de l'hôtel Jean Leroy, a deux traductions possibles. L'une édifiante : «Le ciel et non la terre». L'autre, plus libertine, au sens du XVIIe siècle « Pas seulement le ciel».                                                                                                                                                  Hôtel Jean OULES dit de Nayrac Sous Henri IV, l'installation du Tribunal de la Chambre de l'Édit et l'arrivée de nombreux magistrats ainsi que le développement économique de cette époque permirent la construction de quelques-uns des édifices majeurs de la ville. L'hôtel Oulès C'est le sieur Oulès, déjà propriétaire d'une très belle maison à l'angle des rues Sabaterie et Camille-Rabaud, qui décida d'acquérir trois lots mitoyens de maisons qui s'élevaient sur la rue droite de Frédéric-Thomas vers 1635.","architecture":"Hôtel Jean Oulès dit de Nayrac Sous Henri IV, l'installation du Tribunal de la Chambre de l'Édit,  Le dessin, les proportions et l'emplacement des baies à croisillons de la porte d'honneur et la tourelle à encorbellement rythment harmonieusement la façade des trois ailes. Les percements sont encadrés de pierre et de tableaux en brique apparente. L'oculus du portail est utilisé comme point de fuite  est donc traité suivant un style très dépouillé, plus issu de l'influence de l'architecture Louis XIII, dans l'esprit de l'architecture toulousaine  en alliant très largement brique et pierre. La partie sud constituait laile des appartements avec une cour intérieure et un puits alors que dans la partie nord se trouvait la boutique.                 VIVIES  La construction classique de l'hôtel s'ordonne autour de la cour d'entrée ouverte sur la rue par un grand portail.  Un très bel escalier droit dessert tous les étages et se retrouve au centre de l'édifice. Chaque porte est finement soulignée par des moulures discrètes. Cette cage d'escalier est une véritable tour carrée sur laquelle viennent se harper perpendiculairement les ailes. Ce principe a permis qu'une loggia soit aménagée dans le dernier étage, elle fut remaniée ultérieurement mais a gardé sa précieuse balustrade à galerie ouverte. Un escalier aménagé dans un angle. Une tourelle à encorbellement, traitée en briques dans le style de la Renaissance dit Toulousaine, protège le petit escalier et donne à la façade du midi une allure particulière. Les façades sont ajourées de baies à croisillons dont les pilastres latéraux sont terminés par un chapiteau.                                                                                                                         Hôtel Leroy, édifié au début du XVIIe siècle, cet hôtel frappe par sa tourelle d'angle en encorbellement et à cul-de-lampe fait en briques, et dont les fenêtres à meneaux ont un encadrement en pierre. Cet appareillage de briques et pierres montre à la fois l'inspiration de l'architecture toulousaine et du XVIIe siècle. Une devise à double sens L'hôtel conserve sur la rue une porte à fronton à rouleaux encadrant une devise caractéristique de cette période.","habitants":"Viviès; Monseigneur de Rozel                                        Poncet;maréchal Jean-Louis de Ligonnier                                  Leroy; Jean Leroy                                                                     Oulés;Jean Oulés\r\n        \"","divers":"Divers châteaux-Hôtels dans Castres","gps":"","images":["../../jctruffet.com/image/image_81/81_Castres_Hotel_1.jpg","../../jctruffet.com/image/image_81/81_Castres_Hotel_2.jpg","../../jctruffet.com/image/image_81/81_Castres_Hotel_3.jpg","../../jctruffet.com/image/image_81/81_Castres_Hotel_4.jpg","../../jctruffet.com/image/image_81/81_Castres_Hotel_5.jpg","../../jctruffet.com/image/image_81/81_Castres_Hotel_6.jpg","../../jctruffet.com/image/image_81/81_Castres_Hotel_7.jpg"]},"Consult_chateau_formulairef3ce":{"id":"Consult_chateau_formulairef3ce","dept":"81","canton":"Castres","commune":"Castres","nom":"Castres_Patrimoine","type":"Château","periode":"XVIII","histoire":"CASTRES, magnifique chartreuse XVIIIe siècle, un jardin d'hiver et son parc d'essences tricentenaires. Le château de Castres, propriété du baron Poitevin, plusieurs familles se succèdent jusqu'en 1916 lorsque José Rodrigue-Lalande ingénieur nologue et son épouse Brigitte eurent le coup de foudre pour ce domaine. Possibilité de découvrir également par la même occasion les vins de l'appellation Pessac-Léognan de notre autre propriété                                                                                      le château Roche-Lalande. Pour un moment de partage convivial et technique par les propriétaires, avec ou sans rendez-vous, adapté à vos attentes et selon votre temps. Notre crédo: le respect de l'environnement, l'originalité et une qualité toujours croissante.                                                     Castres est une ancienne abbaye de l'ordre de Saint-Benoit, située au diocèse d'Albi, dépendante de Saint-Victor de Marseille, à laquelle le corps de Saint-Vincent avait été apporté en 955. Bertrand en était moine et abbé en 1317, lorsque le pape Jean XXII originaire de Cahors l'érigea en évêché  du 9 juin de cette année.                                                            TOUR des cordonniers, Isabelle de France, sur de Saint Louis, a fait inscrire sur le caveau qu'elle fit construire pour son amie Armoise de Lautrec. Construit à l'origine à l'extérieur de la cité castraise, l'agrandissement des remparts de la ville vers 1373-1380 le place alors à l'intérieur, en bordure de l'enceinte.\r\nCastres est prise par les protestants en 1562 dont la région est un haut lieu de la réforme. Le couvent est détruit en 1574 puis reconstruit en 1634, avant d'être finalement vendu à la Révolution en 1791.","architecture":"L'hôtel de ville occupe l'ancien palais épiscopal, conçu au XVIIe siècle par le célèbre architecte Jules Hardouin-Mansart (l'architecte de Versailles), et terminé par le Jardin de l'Évêché conçus par Le Nôtre (concepteur des jardins de Versailles). Près du palais, la tour Saint-Benoît, d'architecture romane, est le seul vestige de la vieille abbaye bénédictine. Transformé en hôtel de ville, il accueil le musée Goya.\r\nTour des Cordeliers, cet ancien couvent fut détruit sous l'Ancien Régime. La construction du couvent est estimée dater de la première moitié du XIIIe siècle, entre la fondation de l'ordre en 1227 et 1252. Il ne reste que la chapelle et l'ancienne Tour actuellement englobée dans les bâtiments du collège Jean-Jaurès.","habitants":"Famille de  José Rodrigue-Lalande\r\n        \"","divers":"Divers édifices patrimoniales à Castres.","gps":"","images":["../../jctruffet.com/image/image_81/81_Castres_Patrimoine_1.jpg","../../jctruffet.com/image/image_81/81_Castres_Patrimoine_2.jpg","../../jctruffet.com/image/image_81/81_Castres_Patrimoine_3.jpg","../../jctruffet.com/image/image_81/81_Castres_Patrimoine_4.jpg","../../jctruffet.com/image/image_81/81_Castres_Patrimoine_5.jpg","../../jctruffet.com/image/image_81/81_Castres_Patrimoine_6.jpg","../../jctruffet.com/image/image_81/81_Castres_Patrimoine_7.jpg","../../jctruffet.com/image/image_81/81_Castres_Patrimoine_8.jpg","../../jctruffet.com/image/image_81/81_Castres_Patrimoine_9.jpg"]},"Consult_chateau_formulaire4605":{"id":"Consult_chateau_formulaire4605","dept":"81","canton":"Castres","commune":"Castres","nom":"Causse","type":"Château","periode":"XIX","histoire":"CAUSSE Le château du Causse, construit au XIXe siècle, Pas d'information historique.","architecture":"CAUSSE, construit au XIXe siècle, présente sur l'une de ses façades une débauche de décrochements, murs à pignons, lucarnes à fronton, tours polygonales. L'on n'en finirait pas de citer les éléments vaguement néo-Renaissance ou néo-gothiques dont on s'est plu à décorer cette maison.  Deux tours polygonales encadrent une originale construction consistant en un rez de chaussée composé d'un arc en anse de panier qui réalise une sorte de loggia devant la façade, tandis qu'à l'étage, la largeur de cette loggia est occupée par trois arcs, aussi en anse de panier, retombant sur des colonnes. En fait, au rez-de-chaussée, cette loggia ouvre à gauche sur un perron d'accès dont la marquise a reçu un dessin art nouveau. Les parties hautes sont en ardoise, et les tours sont coiffées de toitures polygonales comme elles, tandis que le logis central a reçu un toit en pavillon.","habitants":"\"","divers":"Château de Causse à Castres","gps":"","images":["../../jctruffet.com/image/image_81/81_Causse_1.jpg","../../jctruffet.com/image/image_81/81_Causse_2.jpg"]},"Consult_chateau_formulaire03ba":{"id":"Consult_chateau_formulaire03ba","dept":"81","canton":"Rabastens","commune":"Andillac","nom":"Cayla","type":"gentilhommière","periode":"XV","histoire":"CAYLA, au XVe siècle la famille de Guérin prend possession du domaine,  gentilhommière typique du Languedoc, Joseph Guérrin dut émigrer en 1790 pendant sept ans fit retour en 1797 épouse  Gertrude Fontanille et aura quatre enfants ; Erembert, Eugénie, Marie et Maurice, devient la demeure natale de deux écrivains de la période romantique : Eugénie (1805-1848) et Maurice (1810-1839) de Guerin. Il témoigne dune tradition littéraire familiale dans une atmosphère rurale du XIXe siècle.  \r\nAu XX e siècle devient la propriété du conseil général du Tarn. Le bâtiment a été transformé en château-musée consacré à Maurice de Guérin et à sa sur Eugénie de Guérin, à la littérature et à la peinture.","architecture":"À l'origine, Cayla est un relais de chasse  qui fut construit au XVe siècle à cet emplacement. Long corps de logis flanqué d'une tour du XVIe siècle. Après divers remaniements aux XVIIIe siècle et XIXe siècle, le château fut transformé en gentilhommière dans la première moitié du XIXe siècle.","habitants":"Famille de  Maurice de Guérin\r\n        \"","divers":"Gentilhommière du Cayla à Andillac","gps":"","images":["../../jctruffet.com/image/image_81/81_Cayla_1.jpg","../../jctruffet.com/image/image_81/81_Cayla_2.jpg","../../jctruffet.com/image/image_81/81_Cayla_3.jpg","../../jctruffet.com/image/image_81/81_Cayla_4.jpg"]},"Consult_chateau_formulaire901d":{"id":"Consult_chateau_formulaire901d","dept":"81","canton":"Mazamet","commune":"Rouairoux","nom":"Caylus","type":"Château","periode":"XV","histoire":"Trois châteaux , celui de Caylus au sud de Rouairoux, plus au sud celui de Kerlo à Lacabarède et celui de Lespines à Labastide-Rouairoux.                                                                                  CAYLUS,  ce château cache un enracinement profond dans l'histoire du terroir: la baronnie de Caylus qui, du XVe au XVIIIe siècle ne fut jamais vendu. Longtemps Caylus fut marqué par la présence de la famille de Bernon; déjà dans la première moitié du XVe siècle Nicolas de Bernon était seigneur de Rouairoux, il acheta pour son fils Jean, l'Office Royal de Forestier de la ville d'Anglès. Le dernier marquis de Caylus mourut sans postérité en 1845. Au XIXe siècle, la propriété passa entre les mains des Poumeyrac de Masredon, puis de divers propriétaires.                                                                      ESPINES, le 15 août 1780 est née Ursule Claire Marie Suzanne Boulade  de Citon, née au château d'Espine et baptisée le 20/08 fille de Pierre Gabriel seigneur d'Espine et de Ursule de  Raynaud de Roquefeuil- son parrain: Boulade Guilhaume Bertrand chanoine d'Espine, et sa marraine: De Raynaud de Pesseplane Angélique.                                                                       KERLO, Maurice Poumayrac (1708-1787) est le fils cadet de Jean Pierre Poumayrac et Anne Sabrier. En 1736, il épouse Marguerite d'Alquier, originaire des environs de Labastide-Rouairoux. Celle-ci reçoit en dot le domaine de La Feuillade (actuelle commune des Verreries-de-Moussans) et Maurice se fait désormais appeler Poumayrac de La Feuillade.","architecture":"Caylus, situé face à la montagne noire et proche de la forêt d'Espine, bien qu'un peu à l'écart du village Caylus est le centre historique de Rouairoux. Vu du parc, le château présente un aspect à la fois robuste et aimable et beaucoup de son charme tient à la façon dont s'articulent ses volumes: un massif corps de logis vient s'appuyer d'un côté sur l'angle d'une tour carrée, et en retour du corps principal, une aile étroite et plus basse se termine par une petite tour circulaire refaite et agrémentée au XIXe siècle de faux mâchicoulis. De larges fenêtres percées longtemps après la construction du château atténuent ce que les façades pourraient avoir de trop austère.                                                                      Espines de plan rectangulaire à deux niveaux et attiques flanqué de deux pavillons carrées aux angles de la façade toit à l'impérial.                                                                                                              Kerlo; quadrilatère à deux niveaux pavillon saillant de trois travées avec échauguettes en encorbellement sur les  angles.","habitants":"Famille de Bernon\r\n        \"","divers":"Château de Caylus, de l'Espines, le Pradel à Rouairoux et de Kerlo à Lacabarède.","gps":"","images":["../../jctruffet.com/image/image_81/81_Caylus_1.jpg","../../jctruffet.com/image/image_81/81_Caylus_2.jpg","../../jctruffet.com/image/image_81/81_Caylus_3.jpg","../../jctruffet.com/image/image_81/81_Caylus_4.jpg","../../jctruffet.com/image/image_81/81_Caylus_5.jpg","../../jctruffet.com/image/image_81/81_Caylus_6.jpg","../../jctruffet.com/image/image_81/81_Caylus_7.jpg"]},"Consult_chateau_formulaireeef2":{"id":"Consult_chateau_formulaireeef2","dept":"81","canton":"Carmaux","commune":"Livers-Cazelles","nom":"Cazelles","type":"Château","periode":"XV","histoire":"CAZELLES à Livers Cazelles. A la suite d'une vente consentie en 1395 par Pierre de Rabastens, Vicomte de Paulin, Cazelles appartient dans la seconde moitié du XIVe siècle à M. Molinier de Rozet, grand argentier du duc de Berry, qui laissa le château à ses neveux.  Cazelles était à l'origine une dépendance du chapitre de Cordes, au XVIe siècle, à la suite de l'alliance de Jeanne de Vézian-Castelpers avec le Rouergat François de Roquefeuil, Livers entra dans la famille de ce dernier. En 1724, le château et ses dépendances furent vendus à un notable de Monestiès. Cazelles qui n'avait pas été vendu comme bien national à la Révolution, fut transformé en exploitation agricole après 1798. Ses nouveaux propriétaires se sont employés à lui redonner tout son lustre d'antan. Le château de Cazelles impressionne par sa grosse tour carrée.","architecture":"Château de Cazelles,  édifié au XVe siècle, Livers était un poste avancé pour assurer la protection de Cordes. Il présente une belle façade blanche sur le vallon, flanquée à gauche d'une grosse tour carrée du XVe siècle, du haut de laquelle on distingue Cordes   Le château de Cazelles impressionne par sa grosse tour carrée surmontée d'un hourd faisant saillie sur les quatre faces et qui représentait la principale défense du château, représentant une défense avancée pour Cordes. Cette tour, dont les bases peuvent probablement être datées du XIIIe siècle, fait l'angle d'une cour intérieure, les bâtiments d'habitation disposés en équerre forment les deux côtés opposés. Elle est reliée à droite au corps de logis par un mur portant une galerie et la faisant communiquer avec le second étage, situé à peine à une lieue et qui malgré ses deux larges fenêtres, a dû servir de donjon avant de devenir pigeonnier. Cette façade prolongée vers le nord présente deux étages comportant chacun neuf fenêtres. Du côté de l'ouest, le château est en équerre sur une belle cour intérieure dans laquelle son premier étage est longé par une galerie portée par des colonnes. Supportée par des arcs en plein cintre la galerie est constituée d'un garde corps de pierre surmonté de colonnes à chapiteau sculpté de feuilles d'acanthe, les bâtiments d'habitation disposés en équerre forment les deux côtés opposés. Elle est reliée à droite au corps de logis par un mur portant une galerie et la faisant communiquer avec le second étage.","habitants":"Famille de M. Molinier de Rozet,\r\n        \r\n        \"","divers":"Château avec tour de Cazelles à Livers.","gps":"","images":["../../jctruffet.com/image/image_81/81_Cazelles_1.jpg","../../jctruffet.com/image/image_81/81_Cazelles_2.jpg","../../jctruffet.com/image/image_81/81_Cazelles_3.jpg","../../jctruffet.com/image/image_81/81_Cazelles_4.jpg","../../jctruffet.com/image/image_81/81_Cazelles_5.jpg","../../jctruffet.com/image/image_81/81_Cazelles_6.jpg","../../jctruffet.com/image/image_81/81_Cazelles_7.jpg","../../jctruffet.com/image/image_81/81_Cazelles_8.jpg"]},"Consult_chateau_formulaire3409":{"id":"Consult_chateau_formulaire3409","dept":"81","canton":"Lagrave","commune":"Cestayrols","nom":"Cestayrols","type":"Forteresse","periode":"XII","histoire":"CESTAYROLS, la forme du village de Cestayrols, en escargot sappelle un « castrum » en latin « castra », camp fortifié militaire chez les Romains qui désigne au Moyen-Age, un village blotti au pied de la forteresse du Xe et XIe siècle. A la fin du XIIe siècle, la région appartient à la maison Alaman.  Le premier connu est Doat Alaman, fondateur de la bastide de Labastide-de-Lévis. Ce gestionnaire a travaillé au service du comte de Toulouse Raymond. Il meurt vers 1234 et ses deux fils se partagent le domaine. Sicard obtient le sud, le long du Tarn, et Doat, dit le Jeune obtient le nord regroupant les communes actuelles de Cestayrols, Fayssac, Villeneuve-sur-Vère. Doat II meurt jeune, sa succession se faisant en 1261. Doat III Alaman de Villeneuve hérite de l'est et le cadet, Sicard,  devient le seigneur des territoires de Cestayrols, Fayssac, Noailles et des terres sur Cordes. Il prend le nom du château qu'il se fait construire au lieudit Durfort. Ses descendants Raymond puis Doat en héritent.  Marie-Cécile et Alain Monestié, vigneron récoltant, vous invitent à découvrir \"château Moussens\", propriété familiale depuis des générations de 1650, située au cur du vignoble millénaire de Gaillac,                                                                                                                 LACROUX pas d'information historique.","architecture":"Cestayrols,  un village blotti au pied de la forteresse du Xe et XIe siècle. La porte basse du village, donnant sur la place des douves,  à mâchicoulis du XVe siècle. Construction défensive, très étroite en ogive et pourvue dun important mâchicoulis, elle est coiffée dun corps de garde désormais partiellement ruiné. Certaines demeures du village dont la façade extérieure était autrefois aveugle, formaient la ligne des remparts. Ces fortifications édifiées au XIIIe, furent complétées à la même époque par de profonds fossés Elles ont des croisés à montants sculptés, et lune delles, une fenêtre romane à deux baies géminées. Des ouvertures en ogives et en accolade se voient aussi dans lintérieur du village. La porte haute semble avoir disparu à la fin du XIVe siècle. Elle se situait à lentrée de la rue de léglise.                                                                                             Maisons avec des fenêtres géminées ou à meneaux et des linteaux en ogive.                                                                                                                            Lacroux maison forte rectangulaire à deux niveaux avec tour carrée à toit en poivrière quatre pans.","habitants":"Damoiseau de Durfort\r\n        \"","divers":"Château de Cestayrols et maison forte de Lacroux.","gps":"","images":["../../jctruffet.com/image/image_81/81_Cestayrols_1.jpg","../../jctruffet.com/image/image_81/81_Cestayrols_2.jpg","../../jctruffet.com/image/image_81/81_Cestayrols_3.jpg"]},"Consult_chateau_formulairee171":{"id":"Consult_chateau_formulairee171","dept":"81","canton":"Lavaur","commune":"Marzens","nom":"Clauzade","type":"Château","periode":"XVIII","histoire":"CLAUZADE, le château de Clauzade appartient jusqu'à une date récente aux Toulouse-Lautrec, s'il a été partiellement dénaturé, il conserve encore néanmoins un certain intérêt.  La famille de Clauzade de Mazieux furent les propriétaires de Riols et de Teyssode jusqu'en 1960.    La municipalité acquiert un hôtel particulier construit à la fin du XVIIIe siècle. Cet hôtel, d'après les états de section de 1828, appartenait à Arnaud de Clauzade de Riols, juge de paix à Saint-Paul. Il possède en plus de l'hôtel particulier un jardin, deux bâtiments, et la maison voisine avec sa cour et un bâtiment annexe. La vente est passée le 16 mars 1838, entre Jean-Antoine Audouy, maire de Lavaur, et Arnaud Pierre Clauzade de Mazieux, propriétaire domicilié à Teyssode, agissant en son nom et comme procureur de son frère Arnaud Gabriel Adolphe, juge au tribunal de première instance d'Auch. L'aménagement est confié à l'architecte communal Jean-Joseph Debar. Dans les premières années, l'édifice accueille le tribunal civil, le prétoire, la mairie et la sous-préfecture.\r\nDurant l'été 2011, la mairie a déménagé dans l'ancien palais de justice. Aujourd'hui centre d'études et de méditation du bouddhisme tibétain.\r\nCette association loi 1901 ou assimilé fondée en 1980,  autres organisations fonctionnant par adhésion volontaire.","architecture":"Clauzade, le bâtiment doit dater dans son plan général du début du XVIIIe siècle. Ce joli château affecte une silhouette un peu inhabituelle pour la région: il se présente sous la forme d'un corps de logis flanqué de deux ailes formant saillie. Il a reçu une division tripartite, présentant un avant-corps légèrement saillant, comportant une fenêtre flanquée de deux ils-de-buf. Ce corps central est flanquée de deux travées de fenêtres. Alors que l'élévation ne présente sur le logis qu'un rez-de-chaussée, un étage, des fenêtres sur les combles brisés, les ailes formant pavillon ont un étage de plus et étaient à l'origine pourvue de toitures similaires. La façade arrière, plus sobre, ne présente pas d'avant corps en saillie, étant marquée par trois lucarnes ayant reçu un traitement plus soigné, avec fronton triangulaire. La forme des fenêtres du premier étage du rez-de-chaussée trahit une construction du XVIIIe siècle mais  réhabilitée au XIXe siècle.","habitants":"Famille de Toulouse-Lautrec.\r\n        \r\n        \"","divers":"Château  et l'hotel de Clauzazde.","gps":"","images":["../../jctruffet.com/image/image_81/81_Clauzade_1.jpg","../../jctruffet.com/image/image_81/81_Clauzade_2.jpg","../../jctruffet.com/image/image_81/81_Clauzade_3.jpg"]},"Consult_chateau_formulairea186-2":{"id":"Consult_chateau_formulairea186-2","dept":"81","canton":"Carmaux","commune":"Amarens","nom":"Clayrac","type":"Château","periode":"XIV","histoire":"CLAYRAC, de la famille de  Philippe-Joseph de Roquefeuil-Cahuzac en juillet 1715.\r\nChâteau de Clairac St-Pierre-de-Franceille, Amarens, \r\nClément de Clairac, frère de l'épouse.","architecture":"Clayrac, la partie la plus ancienne du château est sûrement du XIVe siècle, mais le bâtiment a été agrandi à une date plus récente. Sur la façade du corps de logis principal se dresse une tour destinée à abriter l'escalier desservant les niveaux supérieurs. Cette entrée, se trouvant dans une tour accolée au milieu de la façade, est tout à fait typique de beaucoup de châteaux construits à la même époque dans la région. Cette tour, qui conserve une belle porte en accolade, une fenêtre à meneaux horizontaux et à mi-hauteur une fenêtre également en accolade, a été arasée certainement pendant la Révolution et a hélas été remontée dans sa partie supérieure. La façade conserve les traces de diverses ouvertures jadis certainement à croisillons et transformées par la suite en fenêtres plus petites. Au rez-de-chaussée, à droite de la façade principale, on note des arcades qui devaient donner accès aux écuries. Le logis se continue par un corps de bâtiment moins élevé, dont l'angle de la façade arrière comporte une tour aujourd'hui tronquée portant une fenêtre à meneau horizontale.","habitants":"Famille de  Philippe-Joseph de Roquefeuil-Cahuzac\r\n        \"","divers":"Château de Clayrac à Amarens","gps":"","images":["../../jctruffet.com/image/image_81/81_Clayrac_1.jpg","../../jctruffet.com/image/image_81/81_Clayrac_2.jpg","../../jctruffet.com/image/image_81/81_Clayrac_3.jpg","../../jctruffet.com/image/image_81/81_Clayrac_4.jpg"]},"Consult_chateau_formulairec8bf":{"id":"Consult_chateau_formulairec8bf","dept":"81","canton":"Carmaux","commune":"Combefa","nom":"Combefa","type":"Vestiges","periode":"XIII","histoire":"COMBEFA  Vers 1270, Monseigneur Bernard de Combret, évêque dAlbi, fait construire un château fortifié. Cest la résidence de campagne des évêques. A la fin du XVe siècle, le château est remanié. En 1490, Louis 1er dAmboise, évêque dAlbi passe commande dun statuaire pour lautel de la nouvelle chapelle du château épiscopal de Combefa. Cet ensemble de 20 sculptures polychromes « unique au monde » superpose trois épisodes de la vie du Christ : Crucifixion, Déploration, Mise au tombeau. Au début du XVIIIe siècle, les évêques délaissent le vieux château de Combefa et préfèrent le luxe et le confort du Petit Lude à Albi. De plus ils le laissent à labandon tout comme les statues. Heureusement les habitants de Monestiés ont pu, avec laccord de lAbbé Choiseul, en 1774 prendre les statues grâce à 14 charrettes tirées par des bufs pour les mettre à labri dans la Chapelle St Jacques de Monestiés. Plus tard, sous limpulsion du Cardinal de Bernis, le château est dépouillé de ses pierres qui serviront pour les nombreux bâtiments et monuments dont les quais de Choiseul à Albi.","architecture":"Les belles sculptures de la fin du XVe siècle nous montrent l'importance de cette résidence épiscopale, tout en étant les derniers témoignages de la richesse et de la puissance des évêques d'Albi. Aujourd'hui, ce château est un tas de pierres envahi par la végétation où dominent des pans de murailles et quelques vestiges de tours médiévales délabrées. L'historien albigeois Gérard Alquier retracera au cours de la conférence l'histoire de ce lieu emblématique. Il fera resurgir la mémoire des pierres pour nous conter l'importance et le rôle de ce château qui a connu une histoire si mouvementée et si riche.","habitants":"Abbé Choiseul\r\n        \"","divers":"Vestiges de Combefa","gps":"","images":["../../jctruffet.com/image/image_81/81_Combefa_1.jpg","../../jctruffet.com/image/image_81/81_Combefa_2.jpg"]},"Consult_chateau_formulaire45fc":{"id":"Consult_chateau_formulaire45fc","dept":"81","canton":"Carmaux","commune":"Cordes sur Ciel","nom":"Cordes_Chateaux","type":"Château","periode":"XV","histoire":"Quatre  châteaux à Cordes sur Ciel; celui de Lestar du XVIIIe siècle, d'Aurifat du XIIIe siècle, de Laborde, le Grand Fauconnier et le château de Noailles à quelques kilomètres au sud.                                                                                                                   LESTAR   a appartenu aux Cazilhac, seigneurs de Milhars et de sNoailles. Le premier des Cazilhac a être possessioné dans la région fut Raymond de Cazilhac, d'une famille du Haut-Quercy. Ces Cazilhac étaient aussi seigneurs de Noailles, l'un de ses membres les plus célèbres se dressa contre l'évêque d'Albi, promu par le chapitre de Sainte-Cécile d'Albi, il disputa le siège épiscopal à Robert Dauphin élu par le pape, les armes à la main, de 1435 à 1462. Les Cazilhac conservèrent leurs fiefs jusqu'à la fin du XVIIe siècle, puis la plus grande partie de leurs biens passa par les femmes aux  Genevois. Le château a été reconstruit au XVIIIe siècle pour la famille d'Alayrac.                                                     LABORDE  les nouveaux propriétaires Stéphanie et Olivier Douzals. Le château de Laborde vous accueille dans un parc de trois hectares avec jardins à la française et allées bordées de buis au pied de la cité médiévale                                                          AURIFAT est une bâtisse avec une belle tour de garde du XIIIe siècle transformée en chambres d'hôtes par Dennis et Patricia Thornley. Pas d'informations historiques pour les autres.                                NOAILLES, maison forte transformé en hôtel par la famille de Claire Prouhet.","architecture":"Lestar, s'il ne présente aucun caractère particulier, il a le mérite d'être caractéristique de l'architecture de cette époque, avec sa façade animée simplement par un léger ressaut et son toit à la Mansard où s'ouvrent des lucarnes à fronton triangulaire.                      La maison du Grand Fauconnier est une maison gothique . Elle est classée monument historique depuis 1875. Les artisans installés dans la nouvelle ville profitent de l'essor économique dû à une longue période de paix. Les familles s'enrichissent et d'artisanes, deviennent bourgeoises et marchandes. Ces familles décident alors de montrer leur richesse en signe de puissance et commence la construction de maisons gothiques. Ces bâtisses à architecture voisine réunissent atelier, entrepôt et magasin au rez-de-chaussée, habitation au premier étage et greniers au second étage. Une cour et des bâtiments annexes occupent l'arrière de la construction. Ces demeures confortables sont bâties entre la fin du XIIIe siècle et le milieu du XIVe siècle. Cette durée relativement courte donne une unité architecturale à la bastide, lui valant le surnom de « Cité aux Cent Ogives ». Son âge d'or dure du XIVe siècle au XVIe siècle avec un maximum de 5 500 habitants.","habitants":"Famille de  Raymond de Cazilhac                                                     Famille d' Olivier Douzals\r\n        \"","divers":"Chasteau de Lestar, de Laborde, d'Aurifat, de Noailles et du Grand Fauconnier à Cordes sur Ciel","gps":"","images":["../../jctruffet.com/image/image_81/81_Cordes_Chateaux_1.jpg","../../jctruffet.com/image/image_81/81_Cordes_Chateaux_2.jpg","../../jctruffet.com/image/image_81/81_Cordes_Chateaux_3.jpg","../../jctruffet.com/image/image_81/81_Cordes_Chateaux_4.jpg","../../jctruffet.com/image/image_81/81_Cordes_Chateaux_5.jpg","../../jctruffet.com/image/image_81/81_Cordes_Chateaux_6.jpg","../../jctruffet.com/image/image_81/81_Cordes_Chateaux_7.jpg","../../jctruffet.com/image/image_81/81_Cordes_Chateaux_8.jpg","../../jctruffet.com/image/image_81/81_Cordes_Chateaux_9.jpg"]},"Consult_chateau_formulairefc4d":{"id":"Consult_chateau_formulairefc4d","dept":"81","canton":"Carmaux","commune":"Cordes-sur -Ciel","nom":"Cordes_Patrimoine","type":"Château","periode":"XVIII","histoire":"CORDES SUR CIEL, village sur un piton rocheux du Puech de Mortagne abrite la cité médiévale. Fondée par le comte de Toulouse Raymond VII en 1222.  au XVe siècle, la richesse en signe de puissance et commence la construction de maisons gothiques.   Elle est attaquée le 9 septembre 1568 par le baron de Paulin ; elle repousse lassaut du vicomte Peyrole de Bruniquel, dans la nuit du 22 au 23 mai 1574. Prosper Mérimée, alors chargé par Napoléon III détablir un inventaire du patrimoine architectural français, il  la visita. La cité séveilla à nouveau à partir du milieu du XXe siècle, lorsque des artistes la redécouvrirent. Albert Camus, après lavoir visité dans les années 1950, disait « A Cordes, tout est beau, même le regret ». La cité est officiellement devenue « Cordes-sur-Ciel » en 1993. Cordes, fidèle à « l'Église de Dieu » bien après le bûcher de Montségur en 1244, résista à lInquisition jusquen 1312, date de sa soumission officielle à lÉglise catholique romaine. Les guerres de religions de la fin du XVIe siècle occasionnent peu de dommages à Cordes : elle est attaquée le 9 septembre 1568 par le baron de Paulin ; elle repousse lassaut du vicomte Peyrole de Bruniquel, dans la nuit du 22 au 23 mai 1574.","architecture":"Cordes sur Ciel,   village fortifié ont entre par la porte des Ormeaux encadré de deux tours circulaires prolongée par un rempart à créneaux,  et la porte du vainqueur, la porte de l'horloge du XIVe siècle, Barbacane, construite au XIVe siècle, la porte du Planol sur deuxième enceinte, la maison du Grand-Veneur, du Grand-écuyer et du Grand Fauconnier, ces bâtisses à architecture voisine réunissent atelier, entrepôt et magasin au rez-de-chaussée, habitation au premier étage et greniers au second étage. Une cour et des bâtiments annexes occupent l'arrière de la construction. Ces demeures confortables sont bâties entre la fin du XIIIe siècle et le milieu du XIVe siècle. Cette durée relativement courte donne une unité architecturale à la bastide, lui valant le surnom de « Cité aux Cent Ogives ». Son âge d'or dure du XIVe siècle au XVIe siècle.","habitants":"Albert Camus\"","divers":"Patrimoine de la ville de Cordes sur Ciel, portes, remparts et maisons Renaissances.","gps":"","images":["../../jctruffet.com/image/image_81/81_Cordes_Patrimoine_1.jpg","../../jctruffet.com/image/image_81/81_Cordes_Patrimoine_2.jpg","../../jctruffet.com/image/image_81/81_Cordes_Patrimoine_3.jpg","../../jctruffet.com/image/image_81/81_Cordes_Patrimoine_4.jpg","../../jctruffet.com/image/image_81/81_Cordes_Patrimoine_5.jpg","../../jctruffet.com/image/image_81/81_Cordes_Patrimoine_6.jpg","../../jctruffet.com/image/image_81/81_Cordes_Patrimoine_7.jpg","../../jctruffet.com/image/image_81/81_Cordes_Patrimoine_8.jpg","../../jctruffet.com/image/image_81/81_Cordes_Patrimoine_9.jpg"]},"Consult_chateau_formulaire6659":{"id":"Consult_chateau_formulaire6659","dept":"81","canton":"Saint-Sulpice la Pointe","commune":"Couffouleux","nom":"Couffouleux","type":"Château","periode":"XIX","histoire":"Dans la commune de Couffouleux le château de Souques et le manoir de Mayssou du XVIIIe siècle  chambres d'hôtes de la famille Sylver.                                                                                       SOUQUES,  les André installés à Rabastens, dans l'Albigeois, anoblis avec le titre de baron au XIXe siècle, par Louis XVIII. Le souvenir de cette branche familiale est conservé au château de La Souque, bâti par le baron Armand d'André, deuxième du nom. Leur anoblissement  récent, ces André prétendaient descendre de la famille des capitouls d'André de Servolles, qui leur était tout à fait étrangère, mais dont ils avaient adopté les armoiries et orné leur château du portrait d'Arnaud André, capitoul en 1627.  Leurs descendants, les Garnier des Garets sont toujours présents à Trèbes, au domaine de Saint-Julien-du-Prieuré.  Félix d'André, instituteur à Azilhanet, receveur buraliste des contributions indirectes officier d'académie en 1869, chevalier de la Légion d'honneur en 1870. Frédéric d'André, instituteur à Cesseras, marié en 1830, à Cesseras, avec Monique Berlan,  Anne fut justement la fille unique du baron et de la baronne d'André, héritière. De son mariage avec le vicomte Louis de Carné-Marcein, naquirent trois enfants : Olivier, qui fit carrière dans les armes, il devint  général, Colette, épouse du marquis de Villeneuve, Guyonne, mariée au comte Hervé de Guerdavid, qui fut maire de Couffouleux durant plus de 40 ans et conseiller général du Tarn. Ce dernier couple occupa le château de 1946 à 1971, les propriétaires suivants étant Philippe Clermont jusqu'en 1983, Robert Jammes jusqu'en 1989, Christian Hess jusqu'en 1997, puis le Gersois Jean-Paul Saint-Criq.","architecture":"La Souque, la construction de cette demeure classique, en briques, pierre et ardoises, dura de 1881 à 1884, une aile supplémentaire ayant été édifiée au début du XXe siècle. Une architecture « grand siècle », que l'on croise plutôt sur les terres picardes de l'enfance du baron. Le 21 juin 2002, un violent incendie dévasta la toiture et les 7 chambres du premier étage. Le bâtiment est en cours de restauration, les ardoises ayant cédé la place au zinc.  La Souque paraît copiée sur les châteaux d'époque de style Louis XIII et Louis XIV, en ce qui concerne le plan et la polychromie donnée par l'alliance de la brique, de la pierre et de l'ardoise. Il présente une belle façade symétrique à un étage. Le corps de logis central est flanqué sur les côtés de deux pavillons en retrait coiffés de toits en pavillon. Il est souligné au centre par un pavillon carré saillant de deux étages, alors que le reste des façades ne présente qu'un étage, surmonté d'un toit d'ardoise en carène. Le château est bâti en brique tandis que les encadrements de fenêtres et les angles des différents pavillons sont rythmés par des assises alternées de brique et de pierre. Les belles lucarnes à fronton triangulaire des combles sont un bon exemple de l'architecture éclectique développée sous le Second Empire.                Mayssou, manoir de plan rectangulaire à deux niveaux et attiques flanqué de deux pavillons carrées aux angles.","habitants":"Famille de Jean-Paul Saint-Criq\r\n        \"","divers":"A Couffouleux le château de Souques et le manoir de Mayssou et de Saint-Sulpice.","gps":"","images":["../../jctruffet.com/image/image_81/81_Couffouleux_1.jpg","../../jctruffet.com/image/image_81/81_Couffouleux_2.jpg","../../jctruffet.com/image/image_81/81_Couffouleux_3.jpg","../../jctruffet.com/image/image_81/81_Couffouleux_4.jpg","../../jctruffet.com/image/image_81/81_Couffouleux_5.jpg"]},"Consult_chateau_formulairee5f1-2":{"id":"Consult_chateau_formulairee5f1-2","dept":"81","canton":"Carmaux","commune":"Crespinet","nom":"Crespinet","type":"Château","periode":"XV","histoire":"Deux châteaux  à Crespinet  celui de Farguettes et celui de la Gautherie  ( voir article).                                                          FARGUETTES, la première famille  est la famille Gasc. Leurs descendants resteront seigneurs dArthès jusquà la Révolution Française. En 1434, Guilhem Gasc,  en 1540 et 1543 Guillaume de Valéry, abbé de la Colombe achète le château des Farguettes.   Entre 1545 et 1556, la seigneurie et le château passent à Pierre de Valéry, quelques années après, on retrouve Jean de Rotolp, avocat,  à sa mort, en 1598, son fils Abel, avocat à la chambre de lédit lui succède. Abel meurt en 1614, son fils Antoine lui succède, en 1622, il hérite des Farguettes à la mort de Jean, son frère aîné, son fils Abel de Rotolp, seigneur de la Devèze, célèbre pasteur , épouse Marie-Marguerite de Ligonier,  son fils Louis épouse une autre Marie-Marguerite de Ligonier, sur du maréchal Ligonier, ce dernier sexile. Il participe à différentes batailles, il est nommé en 1757  Fied-maréchal  et commandant en chef des forces du Roi dAngleterre. Vient ensuite Jean Louis son fils puis à sa fille Louise, épouse de Gaudefroy-Louis de Falguerolles, seigneur de Burlats. Cette dernière revend presque aussitôt les Farguettes à madame dAndré de David en 1751.  le 24 septembre 1785 par lachat au vicomte de Bernis, maître de camp, gentilhomme de monsieur, frère du Roi, du droit de haute Justice pour les Farguettes et Crespinet.   Le nouveau acquéreur, suite à la vente aux enchères, fut labbé François Cammas, jusquau 2 avril 1877, date du décès de Victor-Alexandre Cammas. Le légataire universel de ce dernier fut maître Baptiste Auguste Georges de Lapanouse, notaire à Albi. Diverses alliances matrimoniales avaient uni les deux familles si bien que maître Lapanouse était proche parent de Victor-Alexandre Cammas. Les Farguettes restèrent dans la famille de Lapanouse jusquau 30 mai 1909 date à laquelle le domaine fut vendu. Depuis, plusieurs propriétaires se sont succédé.","architecture":"Farguettes une croix de pierre et une chapelle, toutes deux du XVe siècle. La plus ancienne description du château que lon connaisse, en létat actuel des recherches, date de 1672. Laspect extérieur des bâtiments a peu changé : on trouve toujours lesplanade devant lentrée du château, trois tours rondes, les fossés, ainsi que des galeries de bois sur un des côtés de la cour. Cette construction témoigne de limportance de cette forteresse dans le passé, sans oublier les moyens de défense quétait la présence danciennes galeries sur lesquelles est assis le château et qui permettaient la fuite en cas de danger. La tradition locale veut quon ait pu mener les chevaux au Tarn, sans jamais emprunter lair libre (un souterrain, dit-on, menait au plateau).\r\nLe portail dentrée, défendu par les archères de la  tour, est surmonté dune clé ornée dun écusson qui a été abîmé à la Révolution :  La cour du château, de dimension réduite présente une remarquable porte avec chambranles et linteau sculptés. Elle souvre sur un escalier hélicoïdal en bonne pierre du pays.","habitants":"Famille Gasc.\r\n        \"","divers":"Châteaux des  Farguettes à Crespinet","gps":"","images":["../../jctruffet.com/image/image_81/81_Crespinet_1.jpg","../../jctruffet.com/image/image_81/81_Crespinet_2.jpg"]},"Consult_chateau_formulaire5286":{"id":"Consult_chateau_formulaire5286","dept":"81","canton":"Sémalens","commune":"Cuq","nom":"Cuq","type":"Château","periode":"XVI","histoire":"CUQ , la seigneurie appartient de 1365 à 1664 aux Capri-Capriol. À cette dernière date, Jean de Capriol n'ayant que des filles, donna son aînée en mariage à Guillaume de Passemar. Néanmoins, depuis le XVIe siècle, la seigneurie était démembrée avec les Castelnau: en effet un arrêt du parlement de Toulouse avait à l'époque réglé les droits seigneuriaux respectifs d'Alexandre de Capriol et de Pierre de Castelnau.","architecture":"Le château de Cuq primitif datant du XIIe siècle fut incendié en 1568 par les protestants mais l'ensemble avec sa belle porte d'entrée fut reconstruit sous Henri IV et Richelieu fit abaisser les tours. Sur les tours de très belles fenêtres de la Renaissance à meneau horizontal. La partie la plus ancienne de l'édifice se trouve à l'ouest où l'on peut encore voir une tour de guet aux ouvertures en plein cintre, un fossé ainsi qu'un retranchement qui couvrent également la partie nord. L'intérieur de la cour abrite une porte gothique décorée de motifs végétaux. Le XVIIIe siècle s'employa à rendre la demeure plus aimable en la dotant d'une terrasse et en perçant dans la façade de larges fenêtres.","habitants":"Famille de Capri Capriol\r\n        \"","divers":"Château de Cup","gps":"","images":["../../jctruffet.com/image/image_81/81_Cuq_1.jpg","../../jctruffet.com/image/image_81/81_Cuq_2.jpg","../../jctruffet.com/image/image_81/81_Cuq_3.jpg","../../jctruffet.com/image/image_81/81_Cuq_4.jpg","../../jctruffet.com/i
