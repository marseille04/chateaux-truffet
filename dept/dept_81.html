e colonel et de général de brigade, Il intègre la première promotion des maréchaux en 1804. 1806 : Le Baron Gary, préfet proposa la réunion des deux villages se trouvant de part et dautre du Thoré. Mais les deux municipalités sy opposèrent . En 1808, il passe en Espagne où il fût opposé à Wellington. Il se rallia après une courte disgrâce au nouveau gouvernement et accepta dès 1814 le poste de ministre de la guerre mais il sest fait retirer ce titre peu de jours avant le 20 mars 1815.  Il a été contraint à lexil au retour des Bourbons et ne pût rentrer en France quen 1819.  En 1847, il se vit contraint par son état de santé, à abandonner ses fonctions et reçut du roi Louis-Philippe, en quittant le pouvoir de titre de maréchal général, titre que navait porté avant lui que Turenne, Villards et le maréchal de Saxe. Soult était surtout un grand tacticien. Après la victoire dAusterlitz, Napoléon le proclama  premier manuvrier de lEurope.  En 1851 : le 3 décembre, la ville de La Bastide de Saint-Amans prit définitivement le nom de Saint-Amans-Soult en reconnaissance à ce grand soldat et homme dEtat que fut le Maréchal Jean-de-Dieu Soult originaire de la commune. En 1939-1945 : des résistants prennent le maquis et se rencontrent dans le château du maréchal Soult afin d'organiser la lutte face à l'envahisseur nazi. Il fût mis à la tête du 4ème corps de la grande armée.                                                                                           A Soult le château de Rieussequel pas d'information historique aujourd'hui une ferme a pu être construite dans la seconde moitié du XIXe siècle. Gite de France.","architecture":"Soult-Berg , Berg était le nom de lépouse du maréchal fût construit en 1827,  très vite la nouvelle cité sentoura de remparts et fut communément désignée sous le nom de Saint-Amans vilamendre  par opposition au Saint-Amans primitif quon qualifia de villa mage. Dès la création de Saint-Amans vilamendre le roi agit en maître et seigneur absolu sur cette ville, qui fût une des places fortes du Languedoc. Toutefois elle sera rebâtie 100 ans plus tard sous son vocable actuel de « Notre Dame de lAssomption ». Le clocher de léglise du XIIIe siècle a été conservé, il est un bon exemple de larchitecture régionale de cette époque. Ces artisans ont laissé sur le territoire de la commune un précieux témoignage de leurs activités. En effet, plusieurs fours verriers datant du XVIIe siècle sont encore visibles. Des travaux de restauration de ce précieux et rare patrimoine ont débuté en 2002 et se poursuivent grâce au concours des partenaires locaux.  Si le style Empire domine, le château témoigne des différents styles marquants du début du XIXe siècle.","habitants":"Famille de  Jean-de-Dieu Soult\r\n        \"","divers":"Le château de Soult-Berg et le domaine de Rieussequel.","gps":"","images":["../../jctruffet.com/image/image_81/81_Soult_Berg_1.jpg","../../jctruffet.com/image/image_81/81_Soult_Berg_2.jpg","../../jctruffet.com/image/image_81/81_Soult_Berg_3.jpg"]},"Consult_chateau_formulaire7874":{"id":"Consult_chateau_formulaire7874","dept":"81","canton":"Mazamet","commune":"Saint-Amans Valtoret","nom":"St_Amans_Valtoret","type":"Château","periode":"XVII-XVIII","histoire":"St-AMANS, le fief appartient à une famille protestante et pendant les guerres de religion, en 1587, son propriétaire, Guillaume de Génibrousse, doit quitter les lieux en pleine nuit pour échapper aux hommes de Jean Flotte de Sabasan, catholique et ennemi personnel. Le château est pillé.\r\nAu centre du village, on découvre l'ancien château pris et pillé en 1587 par Jean de Flotte de Sabasan, ligueur rigoureux, ennemi de Guillaume de Genibrouse, seigneur du lieu.","architecture":"Château de Saint-Amans, l'élément le plus ancien est le portail d'entrée sur la cour. Des pilastres à chapiteaux ioniques portent un fronton en arc de cercle. Des travaux importants ont jalonné les siècles suivant, et même une refonte complète au XIXe siècle, faisant du château fortifié une demeure confortable tenant plus de l'hôtel particulier que d'un site défensif. Le château a été reconstruit et remanié au siècle dernier.  La bâtisse mesure 28 mètres et se présente sous la forme de deux tours carrées encadrant une aile. La façade sud est régulière et symétrique. La porte d'entrée est au centre, flanquée de trois fenêtres de part et d'autre. Au premier et second étages, les fenêtres sont alignées sur celles du rez-de-chaussée et sur la porte. La façade nord présente plus de traces de ce que fut un château à but défensif.\r\nLe château appartient à la commune qui y abrite des associations. La visite de l'extérieur et des abords est libre.","habitants":"Famille de Guillaume de Génibrousse\r\n        \r\n        \"","divers":"Château de Saint-Amans","gps":"","images":["../../jctruffet.com/image/image_81/81_St_Amans_Valtoret_1.jpg","../../jctruffet.com/image/image_81/81_St_Amans_Valtoret_2.jpg","../../jctruffet.com/image/image_81/81_St_Amans_Valtoret_3.jpg","../../jctruffet.com/image/image_81/81_St_Amans_Valtoret_4.jpg","../../jctruffet.com/image/image_81/81_St_Amans_Valtoret_5.jpg"]},"Consult_chateau_formulaire10d7":{"id":"Consult_chateau_formulaire10d7","dept":"81","canton":"Réalmont","commune":"Saint-André","nom":"St_André_Tarn","type":"Château","periode":"XV","histoire":"Saint-ANDRE n'échappa pas aux guerres de religion, époque ou son seigneur Sébastien de Corbière, régent de l'évêque d'Albi, Philippe de Rodolphis, y entretenait une petite garde. Il appartient par la suite aux Passemar de Capriol, dont les descendants y demeurèrent jusqu'aux années 1950. Les armes des Passemar se voient sur un écu placé dans le chur de l'église, autrefois chapelle du château. posé en surplomb au-dessus du ravin dominant le Tarn, visible à des lieues à la ronde, le château occupe la partie extrême de la colline qui porte le village. Edifié au XVe siècle, il demeure malgré les remaniements du XVIIe siècle.                                                                  MONTUS, dans la zone d'appellation contrôlée du Madiranais, ce chai déjà construit en 1813, dépend du domaine du château de Montus. Propriétaire Alain Brumont est viticulteur.","architecture":"le château de Saint-André, édifié au XVe siècle, il demeure malgré les remaniements du XVIIe siècle. Le corps de logis rectangulaire est cantonné de quatre tours circulaires à la couverture d'ardoises haute et pointue et orné sur deux façades de lucarnes sculptées où se mêlent les styles gothique et Renaissance. Il constitue le troisième côté de la cour de la ferme le plus ancien, de plan rectangulaire, protégé au nord par un remblai et construit en galets avec chaîne d'angle en pierre, à toiture en croupe ; la façade sud offre un ordonnancement à deux travées de part et d'autre du grand portail.                                                                                                                   Montus, de plan en équerre, il constitue le troisième côté de la cour de la ferme le plus ancien, de plan rectangulaire, protégé au nord par un remblai, construit en galets avec chaîne d'angle en pierre, à toiture en croupe, la façade sud offre un ordonnancement à 2 travées de part et d'autre du grand portail. Au début des années 1990, le bâtiment a été restauré, et s'appuyant sur la partie nord de l'édifice, un bâtiment en terrasse reliant le nouveau chai a été construit, sa charpente en bois à 15 fermes a été restaurée, deux pièces de bois sans doute de réemploi portent deux dates, une du milieu du XVIe siècle, l'autre du début du XVIIe siècle. L'intérieur du chai est occupé par onze cuves en inox.","habitants":"Famille de Passemar de Capriol\r\n        \r\n        \"","divers":"Château de Saint-André et de Montus","gps":"","images":["../../jctruffet.com/image/image_81/81_St_Andre_Tarn_1.jpg","../../jctruffet.com/image/image_81/81_St_Andre_Tarn_2.jpg","../../jctruffet.com/image/image_81/81_St_Andre_Tarn_3.jpg","../../jctruffet.com/image/image_81/81_St_Andre_Tarn_4.jpg","../../jctruffet.com/image/image_81/81_St_Andre_Tarn_5.jpg","../../jctruffet.com/image/image_81/81_St_Andre_Tarn_6.html","../../jctruffet.com/image/image_81/81_St_Andre_Tarn_7.jpg"]},"Consult_chateau_formulairedd2a-2":{"id":"Consult_chateau_formulairedd2a-2","dept":"81","canton":"Labruguières","commune":"Saint-Amancet","nom":"St_Chameaux","type":"Château","periode":"XIV","histoire":"St-CHAMEAUX,   le château de Saint-Chameaux aurait appartenu à Sicard de Roquefort au début du XIVe siècle. La date de 1321 aurait figuré sur un des linteaux de porte du château. A partir de 1515, la famille de Villepassans est propriétaire de la seigneurie et du château. Il appartient aux Faure de Villepassans au XVIIe siècle. En 1768, Rose de Couderc de Turin, veuve de Claude de Faure, ancien propriétaire, possède en plus du château, un moulin, une tuilerie et six métairies. Au XIXe siècle, Saint-Chameaux passe dans la branche des de Faure de Saint-Mauric, et à cette époque, il a connu une restauration importante. Le maréchal Franchet dEspérey y mourut en 1942.","architecture":"ST_Chameaux,  le château a connu une restauration importante au 19e siècle.Le château présente un corps de logis quadrangulaire cantonné de tours. Les deux tours de la façade principale sont carrées et ne dépassent pas en hauteur la toiture du logis. Elle font légèrement saillie et sont surmontées de toits en pavillon d'ardoise, tout comme les deux tours rondes à l'arrière, le logis est couvert d'une toiture en tuiles correspondant à une disposition ancienne. L'embellissement lié au XIXe siècle est une frise de petits mâchicoulis courant sous la toiture.","habitants":"Famille de Villepassans\r\n        \"","divers":"Château de Saint-Chameaux.","gps":"","images":["../../jctruffet.com/image/image_81/81_St_Chameaux_1.jpg","../../jctruffet.com/image/image_81/81_St_Chameaux_2.jpg","../../jctruffet.com/image/image_81/81_St_Chameaux_3.jpg"]},"Consult_chateau_formulairec482":{"id":"Consult_chateau_formulairec482","dept":"81","canton":"Carmaux","commune":"Saint-Grégoire","nom":"St_Grégoire","type":"Château","periode":"XV-XX","histoire":"A Saint-Grégoire,  labastide Vassals est devenue Cussac. CUSSAC, la famille seigneuriale des Vassals construit le premier château à Cussac.  Le château doit remonter au milieu du XVe siècle car l'on sait qu'en 1439, lors du passage à Albi du dauphin de France fils de Charles VII, qui allait devenir bientôt Louis XI, le seigneur de Labastide des Vassals et d'Arthés, nommé Gasc, demanda l'autorisation de fortifier ses domaines. Le château fut détruit, sous les assauts du Prince Noir et de Rodrigue de Villaudrant, durant la guerre de cent ans, lors d'une incursion anglaise en 1430. Il était la propriété du sire de Gasc seigneur de Labastide Vassals et proche allié de la puissante seigneurie d'Ambialet et des Trencavel. Le sire de Gasc essaya bien, neuf ans plus tard en 1439, lors de la visite à Albi du dauphin et futur Louis XI, de lever des fonds pour sa reconstruction, mais celui-ci refusa. On trouve les Berne aux châtelains des Farguettes. La Révolution surpris les Berne en leur château, mais ils n'en souffrirent pas . Les Gasc firent alliance avec les Lemosi, et une de leur fille, Marguerite, épousa Antoine de Berne et lui apporta le domaine de Cussac vers 1570. C'est à partir de cette date que l'on trouve durant une longue période à Cussac de cette famille  qui prospéra longtemps à Saint-Grégoire et dans les environs.  Ils restèrent en possession de Cussac jusqu'à ce qu'une héritière du nom le transmit par mariage aux Tholozany, qui le vendirent à la même génération. De nos jour, de manière plus prosaïque, le château fut transformé en ferme.","architecture":"CUSSAC, construit après la destruction de Labastide Vassals par les descendants du sire de Gasc à la fin du XVe siècle, ce château d'inspiration plutôt Renaissance surplombe encore de nos jours la vallée du Tarn, dont il ne reste que le donjon du XIIIe siècle car il fut détruit. Autrefois, à l'époque des comtes de Toulouse et des Trencavel, Saint-Grégoire faisait partie de ce que l'on appelait \"Ambialadès\", et qui s'étendait sur la rive droite du Tarn jusqu'à Sérénac, Padiès, Andouque, le nord du Tarn jusqu'à Monestiés. Outre cette disposition remontant au XVe siècle, après la défaite des Anglais, l'édifice est paré des grâces de la Renaissance, avec une très belle fenêtre à meneau horizontale surmontant une vieille bouche à feu. L'on note également sur la façade des fenêtres à croisée de meneaux. La façade ne parait pas avoir trop changé depuis l'époque de la construction mais le château devait être autrefois plus impressionnant avec ses deux étages de fenêtres à meneaux. Il fut remanié à différentes époques; à l'intérieur une belle porte du XVIIe siècle en plein cintre flanquée de pilastres doriques. De nos jours les ruines de Labastide Vassals surplombent toujours le Lézert de son piédestal.","habitants":"Seigneur de Labastide des Vassals\r\n        \r\n        \"","divers":"Château de Saint-Grégoire","gps":"","images":["../../jctruffet.com/image/image_81/81_St_Gregoire_1.jpg","../../jctruffet.com/image/image_81/81_St_Gregoire_2.jpg","../../jctruffet.com/image/image_81/81_St_Gregoire_3.jpg","../../jctruffet.com/image/image_81/81_St_Gregoire_4.jpg"]},"Consult_chateau_formulaire4d3b":{"id":"Consult_chateau_formulaire4d3b","dept":"81","canton":"Rabastens","commune":"Rabastens","nom":"St_Géry","type":"Château","periode":"XIV-XV","histoire":"SAINT-GERY, au XIIIe siècle à la famille de Rabastens, acquit en 1321 par Jean de Fonti, saisi en 1349 par Philippe le Bel, puis acquit à une vente au enchères par Antoine de Baulat seigneur de Pratneyrou.  Un héritier du domaine sert Richelieu comme agent et homme de confiance.  Passa par alliance d'Antoinette de Baulat de Baulac  avec Georges de Laroque-Bouillac, sa descendance Clément de Laroque-Bouillac propriétaire du lieu reçu  le ministre-cardinal  en 1629 . En 1716, Gilles de Laroque-Bouillac vendit le château à Jacques Demazel, la famille ruinée le revend en 1728 à Jean-Jacques de Rey conseiller au parlement de Toulouse entreprend des travaux poursuivis par son fils Clément : Ce dernier meurt guillotiné à Paris et est enseveli dans la fosse commune du cimetière de Picpus. Exécuté sans prononciation de sentence, ses biens sont rendus à sa famille et le château échappe aux pillages et destructions. Le fils de Clément Jean-Jacques de Rey après des période troublé sera député  du Tarn et conseiller d'état sous la Restauration. L'une de ses filles épousa en 1827  Edward O'Byrne Irlandais   qui sont toujours les descendants de Saint-Géry.","architecture":"Forteresse médiévale, quadrangulaire  transformé en château dont la construction est entreprise dès le XIIIe siècle et qui sera remanié et agrandi au XVIIe et XVIIIe siècle, domine une boucle du Tarn, comprend trois corps de logis disposés en carré autour de la cour. Le quatrième côté est ouvert sur une avant-cour encadrée de bâtiments annexes. Cette avant-cour offre une vaste esplanade qui met en valeur la façade classique du XVIIIe siècle et l'entrée de la cour marquée par deux sphinx en bord de deux murets. Façade classique dans la cour sur l'aile centrale doublée, comblement des douves. Sur la façade sud, une tour couronnée de mâchicoulis perdure du château du XIVe siècle, comme la chapelle peinte. La façade ouest donne sur une terrasse dominant la rivière. Elle présente une unité de style remarquable de sa construction au XVIIe siècle. Antoine de Baulat qui entame la construction des plus anciennes parties encore existantes. Seule une pierre aux armes des Rabastens témoigne du bâtiment originel.","habitants":"Famille de Laroque-Bouillac\r\n        \r\n        \"","divers":"Château de Saint-Géry à Rabastens","gps":"","images":["../../jctruffet.com/image/image_81/81_St_Gery_1.jpg","../../jctruffet.com/image/image_81/81_St_Gery_2.jpg","../../jctruffet.com/image/image_81/81_St_Gery_3.jpg","../../jctruffet.com/image/image_81/81_St_Gery_4.jpg","../../jctruffet.com/image/image_81/81_St_Gery_5.jpg","../../jctruffet.com/image/image_81/81_St_Gery_6.jpg","../../jctruffet.com/image/image_81/81_St_Gery_7.jpg","../../jctruffet.com/image/image_81/81_St_Gery_8.jpg","../../jctruffet.com/image/image_81/81_St_Gery_9.jpg"]},"Consult_chateau_formulaire8edc":{"id":"Consult_chateau_formulaire8edc","dept":"81","canton":"Réalmont","commune":"Saint-Lieux Lafenasse","nom":"St_Lieux_Lafenasse","type":"Château","periode":"XI-XVI","histoire":"Plusieurs châteaux à Saint-Lieux Lafenasse dont celui  de Corneillan  et celui de Saint-Lieux.                                                       FORT, au XIe siècle, Le Fort était un ouvrage défensif. Au XIVe siècle, au cours de la guerre de cent ans, il était tombé aux mains de deux capitaines routiers: Joachim de Roant et son fidèle lieutenant, Louis Sorbier. Au cours des guerres de religion, et lors des troubles du début du XVIIe siècle, Le Fort fut démantelé par le baron de Lescure. Il revint aux Lafon de remettre sur pied le domaine et à la fin du XVIIe siècle, le co-seigneur de Saint-Lieux avec  monsieur de Villeneuve était sire Jean Antoine de Lafon, résidant à Lafabrié. Vers 1850 le château fut reconstruit dans le style \"Gothique troubadour\" par le docteur Espinasse.  Une demoiselle Espinasse épousa Charles de Corneillan dont un membre de la famille Antoine-Tristan de Corneillan eut une brillante carrière militaire sous la Révolution et l'Empire. Le Fort passa en 1948 à la famille de Laissardière.","architecture":"Composé d'un corps de logis allongé flanqué de deux pavillons massifs, le Fort a fière allure avec ses hautes combles et ses lucarnes à fronton triangulaire. Comme pour rappeler la dimension guerrière du site en des époques plus reculées, l'architecte a fait courir tout autour du Fort un motif denticulé évoquant des mâchicoulis.                                                                    FORT, le Fort était un ouvrage défensif. Vers 1850 le château fut reconstruit dans le style \"Gothique troubadour\" par le Dr Espinasse. Composé d'un corps de logis allongé flanqué de deux pavillons massifs, le Fort a fière allure avec ses hauts combles et ses lucarnes à fronton triangulaire, comme pour rappeler la dimension guerrière du site en des époques plus reculées, l'architecte a fait courir tout autour du Fort un motif denticulé évoquant des mâchicoulis.","habitants":"Famille Antoine-Tristan de Corneillan\r\n        \"","divers":"Château de Saint-Lieux Lafenasse","gps":"","images":["../../jctruffet.com/image/image_81/81_St_Lieux_Lafenasse_1.jpg","../../jctruffet.com/image/image_81/81_St_Lieux_Lafenasse_2.jpg","../../jctruffet.com/image/image_81/81_St_Lieux_Lafenasse_3.jpg"]},"Consult_chateau_formulaire4081":{"id":"Consult_chateau_formulaire4081","dept":"81","canton":"Saint Sulpice la Pointe","commune":"Saint-Lieux de Lavaur","nom":"St_Lieux_Lavaur","type":"Château","periode":"XVI-XIX","histoire":"Deux châteaux à Saint-Lieux de Lavaur celui de Cambards du XVI-XIX siècle et de Montels du XIXe siècle, et Cathalo  Giroussens à 1 km à l'Est.                                                                  CAMBARDS, au XVIe siècle, le domaine fut constitué par un marchand  du nom de Bernard Cambard. La propriété passa à la fin du XVIe siècle aux Audoy, qui comptait dans ses rangs des gentilshommes verriers de Grésigne. Ils conserveront Cambards jusqu'en 1905, date à laquelle le château fut acheté par Joseph Izar marié à Marie Vayre. Les Izar eurent une fille, Germaine. Le couple décédé en 1938, Germaine Izar, mariée à Aimé de Bertrant Pibrac, médecin, hérita de la propriété. En 2001, on y trouve Emanuel Fonvielle et Madjid Mouhoubi, qui exploitèrent le château en chambre dhôtes dans le réseau châteaux et hôtels.                                                                             MONTELS, Perdu dans son parc, le château présente un très bel exemple de ces demeures bâties dans le Tarn par la bourgeoisie et la noblesse du XIXe siècle et reprenant sans la moindre cohérence de style des éléments de l'architecture d'Ancien Régime.                                                                                          CATHALO-Giroussens Pas d'information historique.","architecture":"CATHALO, demeure du XIXe siècle composé d'un corps de bâtiment de cinq travées flanqué de deux tours carrées à peine saillantes. L'élévation comprend un rez-de-chaussée, un étage et un attique, les tours crénelées comportent deux étages et dépassent largement la hauteur du logis. Outre cet amusant motif de hauts créneaux et mâchicoulis couronnant les tours, la façade du corps central, coiffée d'un toit en pavillon, a reçu pour seule animation deux fins pilastres s'élevant jusqu'à la corniche du toit, marquant la travée centrale. Seuls de légers bandeaux soulignent les étages.                                                                            CAMBARDS  à fait l'objet d'une importante restauration à notre époque, le logis central doit dater du XVIIe siècle, ce que tendraient à confirmer les grosses tours rondes ainsi qu'une tour carrée surmontée d'un toit à la béarnaise.                       MONTELS, beau petit château de la deuxième moitié du XIXe siècle présentant sur sa façade principale de jolis échauguettes d'angle fines et rondes, surmontées d'une haute toiture en poivrière. Cette façade est précédée par un perron à double volée. Coiffée d'un toit en pavillon en ardoise, le bâtiment est édifié en brique et pierre, les trois matériaux créant un joli effet de polychromie. La pierre a été réservée aux élégants bandeaux soulignant le toit et l'étage, et à des bossages en table soulignant les angles, mais aussi la travée centrale d'une jolie façade arrière à cinq travées présentant sous les combles une belle lucarne à fronton triangulaire flanqué d'acrotères en forme de boules animant l'axe central de la façade. Les travées flanquant cette lucarne sont couronnées au niveau des combles par des lucarnes plus petites au fronton en plein cintre. Venant renforcer l'axe donné par une lucarne en pierre, un balcon s'ouvre sur la fenêtre centrale du premier étage.","habitants":"Famille d'Audoy\r\n        \"","divers":"Château de Cambards de Montelset de Cathalo.","gps":"","images":["../../jctruffet.com/image/image_81/81_St_Lieux_Lavaur_1.jpg","../../jctruffet.com/image/image_81/81_St_Lieux_Lavaur_2.jpg","../../jctruffet.com/image/image_81/81_St_Lieux_Lavaur_3.jpg"]},"Consult_chateau_formulairef619":{"id":"Consult_chateau_formulairef619","dept":"81","canton":"Carmeaux","commune":"St_Marcel_Campes","nom":"St_Marcel_Campes","type":"Maison forte","periode":"XVI","histoire":"Quatre  châteaux à Saint-Marcel-Campes château d'Aniès de la Bistoule chambres d'hôtes, de la Cazelle et de Fourés. Pas d'information historique pour ces  châteaux.","architecture":"le château  d'Aniès  date du XVIe siècle, il se dit que déjà Simon de Montfort en son temps dirigeait le siège de Saint-Marcel sur lequel on a vue depuis ce lieu. Aniés se présente comme un corps de logis à deux étages, sa face présente en son milieu une tour circulaire faisant office de cage d'escalier et au pied de laquelle s'ouvre la porte d'entrée. Une seconde tour s'élève à l'angle nord-est, la tour ronde d'escalier ne présente guère que des ouvertures défensives, percée de meurtrières pour armes à feu. La porte d'entrée est encadrée de deux meurtrières. La tour d'angle nord-est est également percée de meurtrières permettant de faire feu sur les trois cotés. Sur les côtés sud et nord s'ouvraient de grandes fenêtres à croisillon qui furent bouchées et une bretèche au second étage de la façade nord. L'intérieur conserve son escalier à vis et un mur de refend correspondant à l'axe de la tour qui divise le château en deux parties. Un grand fossé sur le côté nord entourait autrefois le château et ses dépendances.                                             La Bistoule corps de logis rectangulaire à trois niveaux avec sur prolongement une tour carrée à toits en poivrières quatre pans.                                                                                                                  Fourés, corps de logis rectangulaire à trois niveaux avec lucarnes sur toit en ardoise, flanqué de pavillons rectangulaires aux extrémités.  Gazelle, de plan rectangulaire à trois niveaux, toits en croupes peu élevé accolé de chaque côté de pavillons d'une travée en retrait avec terrasse au niveau du deuxième étage, et balcon sur porte d'entrée.","habitants":"Seigneur d'Aniès\r\n        \"","divers":"Saint-Marcel-Campes château d'Aniès de la Bistoule  de la Cazelle et de Fourés","gps":"","images":["../../jctruffet.com/image/image_81/81_St_Marcel_Campes_1.jpg","../../jctruffet.com/image/image_81/81_St_Marcel_Campes_2.jpg","../../jctruffet.com/image/image_81/81_St_Marcel_Campes_3.jpg","../../jctruffet.com/image/image_81/81_St_Marcel_Campes_4.jpg","../../jctruffet.com/image/image_81/81_St_Marcel_Campes_5.jpg","../../jctruffet.com/image/image_81/81_St_Marcel_Campes_6.jpg"]},"Consult_chateau_formulaire47ec":{"id":"Consult_chateau_formulaire47ec","dept":"81","canton":"Sémalens","commune":"Fiac","nom":"St_Salvy_Fiac","type":"Château","periode":"XVI-XIX","histoire":"SAINT-SALVY  depuis le XVIe siècle l'histoire du château est étroitement liée à celle de la famille Bourdoncle de Saint-Salvy. Remontant au XIIIe siècle, cette famille est originaire d'Ambres. Possédant de vastes domaines autour de Fiac dès le XVe siècle, par alliance de Cathetrine de Gorse en 1597 avec Jean de Bourdoncle, deviennent sous Henri IV, seigneurs de Saint-Salvy. A la Renaissance, ils étaient hommes de loi, et jusqu'à la Révolution, ils siégèrent à Castres dans les rangs de la noblesse. Aujourd'hui toujours dans cette famille  qui exploite le domaine  groupement foncier agricole est active depuis 36 ans, elle est spécialisée dans le secteur d'activité de la culture de céréales.","architecture":"Château de Saint Salvy a Fiac  est une élégante construction de plan rectangulaire, tout en hauteur flanquée de deux tours carrées. Il comporte deux pièces par niveau, auxquelles viennent s'ajouter deux petites pièces d'accès. Il a été surélevé au XIXe siècle afin de gagner un étage, et coiffé à cette époque d'un haut comble sur lequel se détachent des lucarnes en croupe recouvertes de tuiles Il est séparé des communs qui l'entourent au nord et à l'est, l'un d'eux est flanqué d'un beau pigeonnier carré. L'autre, très sobre et percée de petites ouvertures, abrite d'anciennes écuries et une très belle salle voûtée. La chapelle fut reconstruite au début du XVIIIe siècle et domine le château, la date de 1718 gravée sur la voûte du porche indique le remaniement du bâtiment.","habitants":"Famille Bourdoncle de Saint-Salvy\r\n        \"","divers":"Château de Saint-Salvy à Fiac","gps":"","images":["../../jctruffet.com/image/image_81/81_St_Salvy_Fiac_1.jpg","../../jctruffet.com/image/image_81/81_St_Salvy_Fiac_2.jpg","../../jctruffet.com/image/image_81/81_St_Salvy_Fiac_3.jpg","../../jctruffet.com/image/image_81/81_St_Salvy_Fiac_4.jpg"]},"Consult_chateau_formulaire3f29-2":{"id":"Consult_chateau_formulaire3f29-2","dept":"81","canton":"Saint-Sulpice","commune":"Saint-Sulpice","nom":"St_Sulpice_Castela","type":"Vestiges château","periode":"XV","histoire":"Trois châteaux à Saint-Sulpice, celui de Castela vestiges, de Lavalière de Cambards et d'un autre dont je n'ai pas le nom.                             CASTELA, cest Sicard dAlaman, seigneur de Saint-Sulpice, ministre et ami du Comte de Toulouse Raymond VII qui est à lorigine de la reconstruction en 1240. Au XVe siècle vers 1418  La mère de Jeanne , Eléonore de Comminges se marie avec Jean De Boulogne, elle décide très vite de le quitter et part s'installer en Espagne, en prenant soin de laisser sa fille à Gaston Fébus. C'est lui qui récupère le château de Saint-Sulpice» assure Elisabeth. Le temps passe. À 11 ans, Jeanne est mariée à un homme de 50 ans, Jean de Berry, 26 ans de vie commune, un deuil puis un remariage avec Georges de la Trémoille, escroc notoire, qui va la dépouiller. C'est là que notre souterrain va devenir objet de toutes les supputations. Tout est organisé pour accueillir 100 à 140 personnes. Il y avait même un pont-levis à l'intérieur qui ne se levait qu'après que le gardien ait entendu le mot de passe. C'est à cette époque que Jeanne, ruinée par son mari , décide de devenir faussaire et de frapper sa propre monnaie pour récupérer une partie de sa fortune.» Malheureusement pour elle, sa nouvelle vie remonte jusqu'aux oreilles de Charles VII, qui malgré son amitié pour la duchesse, décide de l'arrêter de lui faire subir le supplice réservé aux faussaires, le supplice de la marmite et de mourir ébouillantée. Elle réussit à prendre la fuite avant l'arrivée des soldats du roi. Jeanne part se cacher chez un ami dans le château de Roquecourbe. Elle y décédera deux mois plus tard.  Six siècle plus tard, c'est l'énigme du château du Castela. Jeanne de Boulogne a-t-elle laissé un trésor, en quittant précipitamment Saint-Sulpice pour échapper à la colère du roi Charles VII. Avouons qu'en tant que femme, je ne serais jamais partie sur les routes, où fourmillent de multiples bandes de bandits, avec des caisses remplies de monnaies d'or admet Elisabeth.","architecture":"Castela, élevé sur une motte castrale, le château, véritable forteresse, servait de logement au bayle et aux consuls de la ville. Lieu de garnison, il comprenait des salles darmes, un chemin de rond, un donjon.  Après les guerres de religion et leurs dégâts, il ne reste aujourdhui que certains remparts et contreforts ainsi que les ruines dune chapelle qui fut construite à lintérieur du château en 1275. Ce remarquable souterrain refuge aménagé, offre aux amateurs de sensations, un endroit mystérieux et riche en histoire. Cet ouvrage témoigne de la vie au Moyen-âge quand, en période de danger, les habitants allaient se réfugier dans des souterrains. \r\nSon état de conservation est  exceptionnel. Dans le souterrain, on vous contera l'aventure de la duchesse du Berry, Jeanne de Boulogne.  Creusé dans la motte castrale, au dessous du château, il est long de 142 m. Ouvert au milieu du Moyen-Age pour abriter les habitants du village, il deviendra au XIIIe siècle un entrepôt pour les seigneurs du château. Les voûtes de ses galeries sont encore en parfait état, et lon peut  découvrir des salles à vivre, des silos, des points deau aménagés, des niches à lampes.                                                                                                          Lavalière de plan rectangulaire à trois niveaux.","habitants":"Famille de  Jean De Boulogne\r\n        \"","divers":"à Saint-Sulpice  vestiges  de Castela, de Lavalière de Cambards.","gps":"","images":["../../jctruffet.com/image/image_81/81_St_Sulpice_Castela_1.jpg","../../jctruffet.com/image/image_81/81_St_Sulpice_Castela_2.jpg","../../jctruffet.com/image/image_81/81_St_Sulpice_Castela_3.jpg","../../jctruffet.com/image/image_81/81_St_Sulpice_Castela_4.jpg","../../jctruffet.com/image/image_81/81_St_Sulpice_Castela_5.jpg","../../jctruffet.com/image/image_81/81_St_Sulpice_Castela_6.jpg","../../jctruffet.com/image/image_81/81_St_Sulpice_Castela_7.jpg","../../jctruffet.com/image/image_81/81_St_Sulpice_Castela_8.jpg","../../jctruffet.com/image/image_81/81_St_Sulpice_Castela_9.jpg"]},"Consult_chateau_formulaire828a":{"id":"Consult_chateau_formulaire828a","dept":"81","canton":"Rabastens","commune":"Saint-Urcisse","nom":"St_Urcisse","type":"Château","periode":"XVIII","histoire":"ST-URCISSE, le château témoigne de contacts étroits et fréquents avec le milieu parisien et montre une belle mise en uvre du XVIIIe siècle. Sa décoration intérieure a été préservée malgré des aménagements mineurs du XIXe siècle. Entre 1804 et 1818, le parc connaît une restructuration d'envergure menée par Michel de Corneillan, en trois parties\r\nune à la française, une autre à l'anglaise et une troisiéme exotique. Les arbres sont plantés en harmonie avec des fabriques comme le banc de Jany, la salle de danse, la fontaine et  le bassin. Entre 1858 et 1863 seront créés une orangerie et un bassin sur la terrasse basse et les allées modifiées.","architecture":"Le château fort de Saint-Urcisse s'étendait dans la partie méridionale du bourg. Son donjon, appelé la \" Salle-Court \" et constitué de trois voûtes superposées, se dressait sur l'actuel rocher de la Vierge et dominait ainsi les maisons du village et la vallée de l'Hère. Un souterrain le reliait au \"Portal Souteyra\" et sans doute également au château del Roc; dernièrement, lors de travaux de voirie, un souterrain voûté a en effet été mis à jour entre la maison Vigouroux de Rouby et l'église. Jusquà nos jours, le quartier du Fort a conservé son appellation Le château occupait l'emplacement des jardins situés au pied du rocher où de nombreuses pierres de construction servent encore pour édifier les murs de clôture. En 1850, on pouvait encore voir en cet endroit un frêne vivace,  l'arbre de la liberté  planté en 1792. Le donjon du fort a été rasé vers 1666, à la suite de la condamnation par contumace du marquis de Beaufort-Canilhac, seigneur de Saint-Urcisse, prononcée lors des grands jours d'Auvergne tenus à Clermont. Du fort, il ne subsiste plus que la tour carrée datant du XIII ou XIVe siècle. Moins haute qu'à sa construction, cette tour de granit est néanmoins assez bien préservée et conserve sur les côtés, les meurtrières servant aux archers. Un chemin de ronde reliait cette tour à la maison Péret où s'élevait anciennement une poivrière.","habitants":"Famille de  Michel de Corneillan,\r\n        \"","divers":"la salle cour  à saint-Urcisse et son château","gps":"","images":["../../jctruffet.com/image/image_81/81_St_Urcisse_1.jpg","../../jctruffet.com/image/image_81/81_St_Urcisse_2.jpg","../../jctruffet.com/image/image_81/81_St_Urcisse_3.jpg","../../jctruffet.com/image/image_81/81_St_Urcisse_4.jpg"]},"Consult_chateau_formulaire34a5":{"id":"Consult_chateau_formulaire34a5","dept":"81","canton":"Carmaux","commune":"Le Ségur","nom":"Ségur","type":"Château","periode":"XIII-XVI_XIX","histoire":"Trois châteaux à Ségur dont celui de Ségur  du XIIIe siècle celui de Lichardié du XIXe siècle et la maison Mercadier.     BASTIDETTE, en 1475, Guillaume de Monestiés est le seigneur du château de la Bastidette avec son fils Jean de Monestiés qui apparaît dans les écrits comme écuyer, seigneur de la Bastide-Béquillou. En 1641, noble Jacques de La Bouirié apparaît comme seigneur de La Bastidette.                                                                                            Pas d'information historique pour le château de Lichardié et de la demeure de Mercadier.","architecture":"La  Bastidette la partie la plus ancienne de la demeure se compose d'un donjon dépourvu d'ouvertures à l'exception d'une fenêtre à croisillon de meneaux. Accolée à ce donjon, une tour carrée également dépourvue de fenêtres le domine de plusieurs mètres. Cette construction est caractéristique des tours bâties au XIIIe siècle dans le Sud-Ouest, construite sur plan carré ou rectangulaire et dépourvue de voûte. La Bastidette conserve un bel escalier à vis et de belles portes en arc brisé, pour certaines antérieures au XVe siècle. Sur l'autre flanc du donjon, un corps de logis en équerre. Le bâtiment est une petite partie de la demeure d'origine qui a été remanié.                                                                                                                  La demeure Mercadier du XIXe siècle de plan rectangulaire à deux niveaux   toits en croupes en ardoises.","habitants":"Noble Jacques de La Bouirié\r\n        \r\n        \"","divers":"Trois châteaux à Ségur dont celui de Ségur   celui de Lichardié et la maison Mercadier.","gps":"","images":["../../jctruffet.com/image/image_81/81_Segur_1.jpg","../../jctruffet.com/image/image_81/81_Segur_2.jpg","../../jctruffet.com/image/image_81/81_Segur_3.jpg"]},"Consult_chateau_formulaire59b8":{"id":"Consult_chateau_formulaire59b8","dept":"81","canton":"Lavaur","commune":"Massac-Séran","nom":"Séran","type":"Château","periode":"XVIII-XX","histoire":"SERAN, ce château ayant était incendié en 2014, la solidarité a été exemplaire : les trois familles ont été relogées dans les 4 appartements que compte ce château transformé il y a 8 ans en appartements. pas d'information historique, Aujourdhui le château est géré par un syndic de copropriété. Depuis 7 ans, toutes les personnes lié à ce château ont mis la main à la pâte, pour rénover et aménager. dans ce petit village on se démenait pour trouver des habitations à ces trois familles qui ont vu leur rêve partir en fumée madame Yuko Saruwoitary est installée à Massac Seran.","architecture":"Le château de Séran du XVIII-XXe siècle apparaît comme un sobre bâtiment rectangulaire à un seul étage côté parc mais présentant au contraire sur la cour un étage supplémentaire formant attique. L'un des éléments les plus caractéristiques réside dans la présence d'un belvédère émergeant des toitures, disposition que l'on retrouve dans différentes demeures de Midi-Pyrénées, notamment le château de Larra, près de Toulouse. Son charme réside également dans les nombreux bâtiments agricoles groupés autour du château et lui donnant un peu l'aspect d'une villa italienne. Si la demeure peut être datée sans trop d'hésitation du XVIIIe siècle, il va sans dire qu'une grande partie de son aspect actuel correspond à des modifications apportées au cours du siècle suivant.","habitants":"Seigneur locaux\r\n        \r\n        \"","divers":"Château de Séran et d'Arnaude  à Massac-Séran","gps":"","images":["../../jctruffet.com/image/image_81/81_Seran_1.jpg","../../jctruffet.com/image/image_81/81_Seran_2.jpg","../../jctruffet.com/image/image_81/81_Seran_3.jpg"]},"Consult_chateau_formulaire83c0":{"id":"Consult_chateau_formulaire83c0","dept":"81","canton":"Rabastens","commune":"Tauriac","nom":"Tauriac","type":"Château","periode":"XVIII- XIX","histoire":"TAURIAC, de la famille de Boyer par Anne de Castanet de Tauriac, héritière de la branche aînée des Castanet, par mariage en 1664. Le 27 octobre 1606, le duc de Lesdiguières déclare navoir rien à prétendre sur le tiers qui avait fait lobjet du contrat de 1501, annulé par un arrêt du Parlement de Toulouse, et cède les 2/3 de la baronnie  au profit du vicomte de villemur sur la communauté de Tauriac à Antoine de Castanet, père de Jean-Honoré.  Anne de Castanet, à la mort de son frère François mort sans postérité, hérite de la seigneurie de Castanet et de la baronnie de Tauriac, dont dépendait le tiers de la seigneurie de Beauvais. Elle les transmit à son fils François de Boyer de Lacoste-Mailhac, auquel le titre de marquis de Tauriac est attribué  à François et ses frères accroissent les domaines de la famille de Boyer, tous réunis sous la tête de Louis Joseph Eugène, il est nommé : chevalier, marquis de Tauriac, lieutenant du roi en la Province de Rouergue , tout comme François et antérieurement Antoine de Castanet, vicomte de Montclar, baron de Roquemaure et d'autres lieux environnant  et Saint-Urcisse. Amédée Sevène, op.Succession de Louis Joseph Eugène de Castanet, marquis de Tauriac, décédé à Toulouse en 1803, laissant une veuve et 3 enfants, Victor Amédée Xavier  Sylvestre Charles Marie de Boyer Tauriac,  Dorothée Augustine Eugénie Hypolite de Tauriac épouse de Michel Marguerite François Louis Imbert de Corneillan, lun et lautre habitant de Toulouse et Emilie Eugénie  Dieudonné Suzanne Henriette Charlotte de Boyer Tauriac épouse de François Nicolas de Merets capitaine demeurant à Lepizig. La comtesse Prosper de Bertier née de Boyer de Tauriac et fille du marquis de Tauriac ancien député au corps législatif est  au château de Bonrepos.","architecture":"Restauré au XIXe siècle, mais de construction antérieure et reconstruit apparemment pendant le XVIIIe siècle, Tauriac se présente comme un long bâtiment rectangulaire d'un seul étage à sept travées. De part et d'autre de la longue façade sont implantés deux pavillons en légère saillie. La seule animation de la façade sont les bandeaux verticaux de brique encadrant la porte. Au niveau du couronnement, l'animation est donnée par un fronton en demi cercle, pris dans l'attique aveugle courant le long des toitures et tendant, en dissimulant celles-ci, à donner à Tauriac l'aspect d'une villa italienne. La façade postérieure présente la même disposition de sept travées est flanquée de deux avant-corps en très légère saillie et eux-mêmes marqués aux angles par les beaux chaînages de brique. La différence réside dans la présence d'une tour engagée ronde animant la travée centrale.","habitants":"Famille de Boyer\r\n        \r\n        \"","divers":"Le château de Tauriac","gps":"","images":["../../jctruffet.com/image/image_81/81_Tauriac_1.jpg","../../jctruffet.com/image/image_81/81_Tauriac_2.jpg","../../jctruffet.com/image/image_81/81_Tauriac_3.jpg","../../jctruffet.com/image/image_81/81_Tauriac_4.jpg","../../jctruffet.com/image/image_81/81_Tauriac_5.jpg","../../jctruffet.com/image/image_81/81_Tauriac_6.jpg"]},"Consult_chateau_formulaireb608-2":{"id":"Consult_chateau_formulaireb608-2","dept":"81","canton":"Rabastens","commune":"Puycelsi","nom":"Terride","type":"Château","periode":"XVIIXIX","histoire":"TERRIDE, à l'origine, Terride était un relais de chasse au milieu d'une propriété forestière, où la famille de Terride pratiquait la chasse à cour. Pour les remercier de leur participation active pendant les croisades, Saint-Louis leur octroie le droit de devenir maîtres verriers, art qu'ils pratiquèrent jusqu'à la Révolution dans la forêt de la Grésigne. Ce n'est que dans les années 60 que son activité s'oriente principalement vers la viticulture. En 1996, Jean-Paul et Solange David issus d'une vieille famille de vignerons Gaillacois, eurent un vrai coup de cur pour ce domaine. Depuis 10 ans, accompagnés de leurs enfants Alix et Xavier, ils n'ont de cesse de restaurer le château et de remettre en état le vignoble. La famille David, vignerons depuis cinq générations.","architecture":"Le Château de Terride   par une famille de verriers.  Cette belle bâtisse en pierre construite entre le XVIIe et le XIXe siècle semble sêtre échouée au milieu des bois. Encadré de forêts et de vignes, le château est une demeure des champs dune sobriété et dun classicisme remarquable. Ce n'est que dans les années 60 quil devient un vignoble. Village médiéval, fortifié, construit sur un rocher dominant la rivière de la Vère, au Moyen-Age les remparts étaient flanqués de deux tours et percés de portes fortifiées, et à lintérieur du village se trouvait le château des Gouverneurs, la chapelle Saint Roch, les maisons du XVIe siècle.","habitants":"Famille de Terride\r\n        \"","divers":"Le château de Terride à Puycelsi.","gps":"","images":["../../jctruffet.com/image/image_81/81_Terride_1.jpg","../../jctruffet.com/image/image_81/81_Terride_2.jpg","../../jctruffet.com/image/image_81/81_Terride_3.jpg","../../jctruffet.com/image/image_81/81_Terride_4.jpg","../../jctruffet.com/image/image_81/81_Terride_5.jpg","../../jctruffet.com/image/image_81/81_Terride_6.jpg"]},"Consult_chateau_formulaire8a7d":{"id":"Consult_chateau_formulaire8a7d","dept":"81","canton":"Sémalens","commune":"Teyssode","nom":"Teyssode","type":"Château","periode":"XVII","histoire":"Plusieurs châteaux à Teyssode  dont celui de Cadiscie, de Tenèze du XVIIIe siècle, de Riols du XVII siècle, de  Enroque   et de Rateyrens .                                                                                      CADISCIE, élegante demeure du XVIII siecle Chambres d'hôtes.            TENEZE   pas d'information historique                                                  RIOLS, c'est Arnaud Clauzade-Garrouste, greffier du diocèse, capitoul de Toulouse, qui fit bâtir le château actuel vers 1680. De son mariage naquirent onze enfants, Riols passa à son fils Jean, capitaine au régiment de Bassigny. Par la suite et ce jusqu'à une période très récente, le château de Riols resta dans la famille de Clauzade.   Dit aussi château de Ratayrens, un violent incendie s'est déclaré dans une maison d'habitation d'une centaine de mètres carrés, sur trois niveaux dite :  Le château, située au lieu-dit   Ratayrens.","architecture":"Cadiscie;  de plan en U à deux niveaux avec tour carrée  en entrée.                                                                                                          Enroque;  quadrangulaire à corps de logis rectangulaire à un niveau  et rangée d'oeils de buf  toit à deux pans en tuiles accolé de chaque côté du bâtiment de pavillons carrées  toit à quatre pans.                                                                                                 Riols; est une belle demeure de brique dont la façade arrière s'ouvrant sur une prairie présente beaucoup de charme: deux tours carrées à hautes toitures viennent cantonner une façade à cinq travées dont le premier étage est surmonté d'une attique. La cour est fermée par des dépendances et une tour dont la partie supérieure a servi de pigeonnier. Le château a conservé la plus grande partie de son décor d'origine comprenant non seulement un grand escalier à double volée, mais également de belles cheminées de brique et des plafonds à la française.                                      Ratayrens; manoir sur terrasse  de deux niveaux avec rangée de fenêtres supérieures en arcades et lucarnes sur façades avant.","habitants":"Famille de Clauzade\r\n        \"","divers":"A Teyssode  château de Cadiscie, de Tenèze,  de Riols, d'Enroque   et de Rateyrens.","gps":"","images":["../../jctruffet.com/image/image_81/81_Teyssode_1.jpg","../../jctruffet.com/image/image_81/81_Teyssode_2.jpg","../../jctruffet.com/image/image_81/81_Teyssode_3.jpg","../../jctruffet.com/image/image_81/81_Teyssode_4.jpg","../../jctruffet.com/image/image_81/81_Teyssode_5.jpg","../../jctruffet.com/image/image_81/81_Teyssode_6.jpg","../../jctruffet.com/image/image_81/81_Teyssode_7.jpg"]},"Consult_chateau_formulairef3c9":{"id":"Consult_chateau_formulairef3c9","dept":"81","canton":"Carmaux","commune":"Pampelonne","nom":"Thuriès","type":"Vestiges Château for","periode":"XIII","histoire":"THURIES, vestiges du site médiéval du château de Thuriès est situé à proximité de Pampelonne, au cur de la vallée du Viaur, sur un éperon rocheux dominant le barrage. Aujourd'hui, il ne reste qu'une tour de la forteresse du XIIIe siècle, édifiée dans une boucle du Viaur. Les origines de Thuriès remontent aux débuts de la féodalité, on trouve les premières traces du château dans le cartulaire des Alamon du XIIIe siècle. Sicard Alamon  lègue la seigneurie et le village de Thuriès à son fils Sicard Alamon. L'édifice fut pris par surprise par les anglais en 1380, pendant la guerre de cent ans, les consuls d'Albi n'arrivèrent pas à les déloger, et ce n'est que cinq ans plus tard qu'ils évacuèrent les lieux après avoir régulièrement rançonné la région. On ne sait pas ce que devint Thuriès après cette date, mais la liste des châtelains indique qu'il était encore habité aux XVe et XVIe siècles. Il aurait été démantelé sur ordre de Richelieu qui fit de même pour toutes les forteresses de la province.","architecture":"Dans le paysage des gorges du Viaur, près de Pampelonne, se dresse les vestiges, austère et majestueux, le donjon du château de Thuriès. Les origines de ce château se perdent dans la nuit des temps. Il n'a pas été possible de retrouver un seul écrit mentionnant sa construction. Celle-ci doit remonter aux débuts de la féodalité. En 1275, un château et un village existaient donc. Des actes antérieurs, nous font penser que ce village n'était pas situé sur l'emplacement actuel de Pampelonne, mais plutôt sur le versant de la vallée à proximité du château, il n'en reste aucune trace.","habitants":"Famille de Sicard Alamon\r\n        \r\n        \"","divers":"Vestiges du château de Thuriès à Pampelonne.","gps":"","images":["../../jctruffet.com/image/image_81/81_Thuries_1.jpg","../../jctruffet.com/image/image_81/81_Thuries_2.jpg","../../jctruffet.com/image/image_81/81_Thuries_3.jpg"]},"Consult_chateau_formulaire94e2":{"id":"Consult_chateau_formulaire94e2","dept":"81","canton":"Labruguières","commune":"Verdalle","nom":"Touscayrat","type":"Château","periode":"XVI-XIX","histoire":"TOUSCAYRAT, le domaine est ancien; il fut donné aux chartreux de Saïx par Centulie de Brettes, qui le tenait de son frère Bérengier, Raymond Saysse, était lui-même le fondateur de la chartreuse. Appartient depuis le début du XVIe siècle aux seigneurs d'Escoussens, les chartreux. A la Révolution, ce bien a été mis en vente et acheté par la famille Nérac de Ferrières. En 1833, la briqueterie fait partie du domaine mais en 1882, le domaine est aux mains de la famille Martin négociants. En 1897, la propriété est détenue par la famille de Périgny, après alliance matrimoniale. C'est dans la dernière décennie du XIXe siècle  que le château actuel est construit. Lors d'une nouvelle vente, les biens sont séparés. Les terres, la ferme et le château sont rachetés par le bon sauveur d'Albi pour envoyer les malades en convalescence en 1939. Le château a servi aux réfugiés des différentes communautés religieuses jusqu'à la fin de la guerre. L'hôpital d'Albi ayant été réquisitionné par les allemands en 1945, cet endroit a accueilli les patients les plus calmes. Par la suite, à la demande de la population, un centre ménager agricole a ouvert. En 1950, il s'agit d'une école pour la formation agricole des cadres de l'enseignement, le château faisait office de classes. Le Bon Sauveur d'Albi a pu racheter en 1952 la ferme et l'exploitation agricole. Dans les années 1970, le château a abrité une maison de retraite. Actuellement la communauté religieuse du Bon Sauveur abrite six surs et accueille des surs en retraite.","architecture":"Touscayrat, le bâtiment se présente comme une masse compacte présentant trois façades hautes et peu larges en décrochement les unes par rapport aux autres. La première où se trouve l'entrée est composée d'un rez-de-chaussée protégé par une marquise en fer forgé. Au-dessus d'une curieuse composition rappelant le gothique anglais, le toit est caché derrière une rangée de créneaux sur mâchicoulis. Une deuxième façade en retrait est composée de mâchicoulis surmontés de petites arcades de brique, tandis que deux fenêtres à simple meneau décorent le premier et le second étage. Enfin, en retrait, une façade large comme la première et continuant la rangée de mâchicoulis à arcades de brique comporte deux fenêtres simples au rez-de-chaussée et deux à l'étage. À l'angle, une échauguette partant un peu au-dessus du sol et dépassant la toiture en terrasse.","habitants":"Famille Nérac de Ferrières                                                                        Famille de Périgny\r\n        \"","divers":"Le château de Touscayrat à Verdalle.","gps":"","images":["../../jctruffet.com/image/image_81/81_Touscayrat_1.jpg","../../jctruffet.com/image/image_81/81_Touscayrat_2.jpg","../../jctruffet.com/image/image_81/81_Touscayrat_3.jpg","../../jctruffet.com/image/image_81/81_Touscayrat_4.jpg","../../jctruffet.com/image/image_81/81_Touscayrat_5.jpg","../../jctruffet.com/image/image_81/81_Touscayrat_6.jpg"]},"Consult_chateau_formulaire71b1":{"id":"Consult_chateau_formulaire71b1","dept":"81","canton":"Lavaur","commune":"La Bastide St-Georges","nom":"Travet","type":"Château","periode":"XVII","histoire":"TRAVET, au XVIIe siècle, le Travet fut la résidence de la noble famille de Pagès, dont l'ancêtre, Jean de Pagès, seigneur de Beaufort, accompagna Louis VII en Outre-Mer en 1147. C'est une branche cadette de ces Beaufort qui donna les seigneurs du Travet. Les Pagès se maintiennent au Travet jusque sous Louis XV. A la fin du XIXe siècle et au début du suivant, Le Travet appartient à la famille de Cambiaires, puis aux Lafon, aux Gentil Baichis, qui vendirent le château à un entrepreneur qui y installa une usine de vêtements. M.Gros, propriétaire.","architecture":"Avant sa fin, la plus grande partie du château s'est effondrée dans l'Agout le 20 janvier 1955, Le Travet présentait une façade difficile à dater mais qui semblait avoir été aménagée dans le courant du XVIIe siècle, deux ailes en retour se terminaient par les tours carrées existant encore et donnaient sûrement à ce plan en U beaucoup de majesté et d'allure.","habitants":"Famille de Pagès\r\n        \"","divers":"Le donjon deu château de Travet","gps":"","images":["../../jctruffet.com/image/image_81/81_Travet_1.jpg","../../jctruffet.com/image/image_81/81_Travet_2.jpg"]},"Consult_chateau_formulaire1a74":{"id":"Consult_chateau_formulaire1a74","dept":"81","canton":"Réalmont","commune":"Curvalle","nom":"Trébas","type":"Château","periode":"XVI","histoire":"TREBAS, vers 1300, Guillaume-Raymond de Rocadel était seigneur de Larroque et Gaycre et co-seigneur de Trébas. Les biens des d'Armagnac ayant été confisqués par le roi, ce dernier vendit la seigneurie de Trébas à un certain Jean Louis d'Ax, noble qui fit bâtir une première maison fortifiée à l'endroit où se trouve le château actuel. La vicomté de Trébas appartenait en 1465 à Armand d'Ax, seigneur de Trébas. Elle passa ensuite à la maison de Lévis, des ducs de Ventadour, qui la revendit en 1632 à messire Antoine de Gaillardy, chanoine d'Albi, elle passa en 1645 à noble Joseph d'Adhémar, seigneur de Treinhes.  Au début du XVe siècle, Marie de Bourbon, sur de Jacques de Bourbon, roi de Hongrie, Naples et Jérusalem, resta plusieurs années prisonnière de Jean de Beyne  dans la tour du château de Curvalle.  Revenons au passé tumultueux de Plaisance et Curvalle, plus précisément au XVIIe siècle. Le baron Durand de Sénégas épouse l'héritière du château de Curvalle et en devient ainsi le seigneur ; puis en 1608, il achète la ville et le château de Plaisance au seigneur de Panat, protestant comme lui. Mais il a des prétentions et demande des droits seigneuriaux aux habitants, lesquels en avaient été affranchis. Ceux-ci refusent de payer, soutenus par le seigneur François de Nogaret, du château voisin de La Bastide Teulat. Ils sont soumis alors à de nombreuses exactions, meurtres et pillages. L'affaire est portée devant le tribunal des grands jours . En 1665 le seigneur Durand de Sénégas est condamné : ses biens seront rasés et il sera décapité sur la place St- Blaise. C'est ainsi que la tour de Curvalle et le château de Plaisance furent détruits en ces années 1665-1666. Désormais les consuls dirigeront le bourg  jusqu'en 1790.","architecture":"TREBAS, Le château présente un bel aspect avec sa façade flanquée à gauche d'une grosse tour ronde et une autre tour au milieu de la façade abritant l'escalier. Alors que les fenêtres de façades ont été refaites , celles des tours ont conservé de beaux éléments anciens, notamment celles de la tour d'escalier qui présentent encore des meneaux horizontaux, ainsi que la porte du XVIe siècle menant à l'escalier à vis en pierre. Les toitures sont couvertes de Lauzes.  La ville  de Curvalle  sest développé autour des bases médiévales et des fortifications ,  dont il reste encore trois portes  à la fin du XVIIIe et au début du XIXe siècles, dans le haut du village, le vieux bourg, au dimension modeste, fait  parti de Curvalle avant la création de la bastide de Plaisance ; constitué de rues concentriques, il était entouré de remparts. Aujourd'hui, il nous reste les deux portes d'accès et le « balat » fossé qui bordait le rempart. Près de la deuxième porte se dresse la croix St-Eutrope, du XVIe siècle, en forme de raquette, elle présente sur la face antérieure un christ en croix, sculpté en relief ; sur la face postérieure une niche contenait  une statue de la Vierge.","habitants":"Baron Durand de Sénégas\r\n        \r\n        \"","divers":"Château de Trébas à Curvalle","gps":"","images":["../../jctruffet.com/image/image_81/81_Trebas_1.jpg","../../jctruffet.com/image/image_81/81_Trebas_2.jpg","../../jctruffet.com/image/image_81/81_Trebas_3.jpg","../../jctruffet.com/image/image_81/81_Trebas_4.jpg","../../jctruffet.com/image/image_81/81_Trebas_5.jpg"]},"Consult_chateau_formulaire041a":{"id":"Consult_chateau_formulaire041a","dept":"81","canton":"Carmaux","commune":"Trévien","nom":"Trévien","type":"Château","periode":"XV","histoire":"TREVIEN, en 1440, Gabriel de Monestiés était seigneur de Trévien, la seigneurie était alors comprise dans la baronnie de Monestiés et ses seigneurs étaient vassaux de lévêque dAlbi. En 1596, le château passe à la famille de Castelpers par le mariage de Yolande de Monestiés. Les Castelpers prirent le titre de baron puis marquis de Trévien, cest à cette époque que vécut le célèbre capitaine protestant Bertrand de Castelpers. Guillaume de Castelpers, vicomte dAmbialet et marquis de Trévien en 1708, épousa Jacquette de Paulo, héritière de la terre de Saint-Hippolyte. En 1787, la baronnie appartenait à M. de Chastenet, vicomte de Puységur et Rabastens, qui fut maréchal de camps des armées du roi.","architecture":"Edifié en moellons et pierres et couverts dardoises, Trévien fut bâti en plusieurs étapes. Le château se présente comme un quadrilatère à un rez-de-chaussée et deux étages, flanqué à chaque angle dune tour ronde. Une tour cylindrique, accolée au milieu de la façade Est, abrite un escalier à vis, la porte est surmontée dun blason.","habitants":"Famille de Castelpers\r\n        \r\n        \"","divers":"Château de Trévien","gps":"","images":["../../jctruffet.com/image/image_81/81_Trevien_1.jpg","../../jctruffet.com/image/image_81/81_Trevien_2.jpg","../../jctruffet.com/image/image_81/81_Trevien_3.jpg","../../jctruffet.com/image/image_81/81_Trevien_4.jpg","../../jctruffet.com/image/image_81/81_Trevien_5.jpg"]},"Consult_chateau_formulairef30b":{"id":"Consult_chateau_formulairef30b","dept":"81","canton":"Carmaux","commune":"Vaour","nom":"Vaour","type":"Vestiges","periode":"XII","histoire":"VAOUR, la commanderie fut fondée en 1140 lorsque les chevaliers de Penne firent don d'un terrain à Pierre Humbert.\r\n On dénombrait seulement une dizaine de chevaliers, le reste s'était établi dans diverses dépendances de la région telles que: Montricoux, Cahors, Lacapelle-Livron. les chevaliers templiers étaient exonérés de droits et taxes seigneuriales en échange de leur protection envers la population locale.\r\n Le pouvoir de la commanderie s'étendait sur sept cantons et jusque dans le Quercy. Cette influence s'est mise en place grâce aux dons des religieux de Septfonds et de la Chancelade ainsi qu'à ceux du comte de Toulouse. Il n'existe que peu de documents sur la vie à Vaour. En 1303, alors que le conflit qui oppose Philippe le Bel au pape Boniface VIII est à son paroxysme, Bernard de la Roche, commandeur de Vaour, figure dans un acte où les prélats et les ecclésiastiques des sénéchaussées de Beaucaire, Carcassonne et Rodez prennent le parti du roi de France. Cet acte fut rédigé le 25 juillet à Montpellier. Après la dissolution de l'ordre du Temple la commanderie et tous ses biens sont dévolus à l'ordre de Saint-Jean de Jérusalem qui la gardera jusqu'à la Révolution Française.","architecture":"Le château de la commanderie de Vaour, \"la maison\" comme l'appelaient les Templiers, se situe sur une butte ancienne ou se pratiquaient  des rites en rapport avec l'eau comme en témoigne la découverte d'une dalle à rigole.\r\n L'enceinte entourant les bâtiments forme un trapèze. Le portail principal de la maison est orné d'une pierre armoriée datant de 1618. Une première cour s'ouvre sur la grange du château. Un niveau en contrebas par lequel on accède par un plan incliné permettait laccès des chevaux. Le donjon du château haut de 20 mètres abritait la chapelle au rez-de-chaussée. On remarque dans la partie haute, une couronne de \"corbeaux\", et des platines qui servaient autrefois de supports pour des hourds à mâchicoulis. Une tour octogonale dessert les appartements et notamment celui du commandeur situé au premier étage. Une bâtisse adjacente à la chapelle, en constitue la nef et remplaça léglise du village au milieu du XVIIe siècle, à la suite de son incendie. Le haut du donjon, originalement plat fut surmonté d'un toit et d'une guérite ornée d'une croix de pierre. Un coté du donjon s'ouvrait par un portique sur le cimetière des chevaliers. Les seigneurs alentours à la suite des dons qu'ils faisaient à l'ordre, obtenaient le privilège d'y être inhumés. C'est par-là que les villageois accédaient à la chapelle. L'arrière de la grange est soutenu par neufs contreforts de taille imposante. La surface totale de la commanderie était de 2500 m² dont 1100 m² pour les bâtiments.","habitants":"Bernard de la Roche\r\n        \"","divers":"Château de la commanderie de Vaour","gps":"","images":["../../jctruffet.com/image/image_81/81_Vaour_1.jpg","../../jctruffet.com/image/image_81/81_Vaour_2.jpg","../../jctruffet.com/image/image_81/81_Vaour_3.jpg","../../jctruffet.com/image/image_81/81_Vaour_4.jpg","../../jctruffet.com/image/image_81/81_Vaour_5.jpg"]},"Consult_chateau_formulairec1ed":{"id":"Consult_chateau_formulairec1ed","dept":"81","canton":"Labruguières","commune":"Verdalle","nom":"Verdalle","type":"Château","periode":"XVII","histoire":"Trois châteaux à Verdalle dont celui de Verdalle du XVII-XIXe siècle,  de Massaguel du XIII-XVIIIe siècle  à 1 km au sud (voir article) et de Touscayrat (voir article).                                             VERDALLE, au XVIIe siècle le château n'est plus mentionné dans le fort de Verdalle. Le seigneur de Loubens, seigneur de Verdalle, projette alors de construire une nouvelle résidence en bordure du noyau primitif du village. C'est en effet la dame Guilhamettes de Graves et de Sérignan, dame de Loubens et de Verdalle, qui fait édifier le château de Verdalle au tout début du XVIIe siècle.  La famille d'Auberjon acquiert le château en 1908 et en 1957, Mlle d'Auberjon lègue le château à la congrégation des surs de la Croix de Lavaur qui s'y installe et aménage une chapelle dans la partie sud-est. Jean-Claude Izard, peintre-verrier et sculpteur installé à Sorèze, réalise en 1966 trois vitraux en dalle de verre ainsi que le tabernacle en bronze et le dallage. Le château est propriété du diocèse depuis le début des années 1990.","architecture":"Verdalle, qui fait édifier le château de Verdalle au tout début du XVIIe siècle. Elle passe en 1606 un contrat avec les maîtres charpentiers Vidal Blanc et Mathieu Roussignol pour la couverture du château, la constitution des étages, les menuiseries. En 1608, elle passe un bail avec le maître maçon Pierre Augé de Revel pour percer des ouvertures et effectuer des aménagements intérieurs tels que le pavement, les cheminées. Les caractéristiques constructives du bâti et l'escalier intérieur en pierre à deux volées droites sont tout à fait caractéristiques des constructions de la première moitié du XVIIe siècle, ainsi que la demi-croisée d'origine, obturée, de grande dimension et dépourvue de moulures, sur l'élévation nord de la tour nord-est. Les pièces en enfilade du rez-de-chaussée révèlent un aménagement du XVIIIe siècle. Après la Révolution française, la construction des dépendances est entreprise, à l'est de la cour.","habitants":"Famille d'Auberjon\r\n        \"","divers":"Le château de Verdalle.","gps":"","images":["../../jctruffet.com/image/image_81/81_Verdalle_1.jpg","../../jctruffet.com/image/image_81/81_Verdalle_2.jpg"]},"Consult_chateau_formulairefbbd":{"id":"Consult_chateau_formulairefbbd","dept":"81","canton":"Rabastens","commune":"Le Verdier","nom":"Verdier_Coste","type":"Château","periode":"XII","histoire":"La COSTE à le Verdier, semblable au château de la belle au bois dormant dans l'état d'abandon dans lequel il se présente, La Coste est un véritable petit joyau qui semble nous être parvenu pratiquement intact depuis le XVe siècle. Mentionné dans les archives depuis le XVIe siècle, le château de la Coste n'est qu'une partie de ce qu'il était à l'origine. Son histoire fut liée très longtemps à la famille de Tholozany, ayant donné à Toulouse nombre de capitouls et de parlementaires. Le château ne fut vendue que très récemment par les descendants à des anglais ayant entrepris quelques travaux restés sans suite.","architecture":"La Coste de plan rectangulaire à deux niveaux avec tour ronde hors-uvre en façade à toit plat.","habitants":"famille de Tholozany,\r\n        \"","divers":"Château de la Coste à Verdier","gps":"","images":["../../jctruffet.com/image/image_81/81_Verdier_Coste_1.jpg","../../jctruffet.com/image/image_81/81_Verdier_Coste_2.jpg","../../jctruffet.com/image/image_81/81_Verdier_Coste_3.jpg"]},"Consult_chateau_formulaire21a1":{"id":"Consult_chateau_formulaire21a1","dept":"81","canton":"Sémalens","commune":"Viterbe","nom":"Vergnet","type":"Château","periode":"XVII","histoire":"deux châteaux à Viterbe celui du Vergnet et une bâtisse style maison bourgeoise dit aussi château de Vergnet.                              VERGNET, chambre d'hôtes, les propriétaires actuels  Brigitte et Pascal ont transformé ce domaine avec goût, en un lieu propice à la détente. Pas d'information sur l'autre bâtisse.","architecture":"De plan quadrangulaire à deux niveaux flanqué de tours carrées aux angles.","habitants":"\"","divers":"Château de Vergnet à Viterbe.","gps":"","images":["../../jctruffet.com/image/image_81/81_Vergnet_1.jpg","../../jctruffet.com/image/image_81/81_Vergnet_2.jpg"]},"Consult_chateau_formulaire907f":{"id":"Consult_chateau_formulaire907f","dept":"81","canton":"Carmaux","commune":"Carmaux","nom":"Verrerie_Carmaux","type":"Château","periode":"XII","histoire":"VERRERIE, la seigneurie de Carmaux relevait depuis le XIIe siècle de la châtellenie de Castelnau-de-Bonefous. En 1229, le château de Carmaux est un fief militaire de la baronnie de Monestiès. Il relève des évêques d'Albi. La seigneurie de Carmaux appartenait à la famille Delpuech, seigneur de Cagnac,  puis au XVe siècle à Géraud Hébrard, seigneur de Saint-Félix, puis à ses descendants jusqu'à Hercule d'Hébrard, fils du viguier de Najac. Au début du XVIe siècle, la seigneurie est revenue à Sébastien Delpuech, seigneur de Cagnac jusqu'en 1696. Jean-Baptiste de Ciron, conseiller, puis président au parlement de Toulouse de 1674 à 1724, achète la seigneurie de Carmaux. Déjà vers 1550, son aïeul Jean de Ciron, marchand. Le fils de Jean-Baptiste, Jean-Baptiste II, est anobli par sa charge de président à Mortier, et s'intitule seigneur-marquis de Carmaux. Sa fille apporte une partie de la seigneurie en dot, par son mariage en 1724 avec François Paul de Solages, et à sa famille qui rachète le complément  la terre de Carmaux. Antoine Paulin de Solages, fils des précédents sera dans la famille de Solages le dernier à prendre ce titre de courtoisie de \"marquis de Carmaux\". Gabriel de Solages a réussi à accroître l'importance de l'entreprise et contourner les difficultés de transport, en recourant au charbon de Carmaux, et en consommant sur place la plus grande partie de ses produits : il fit construire une verrerie à bouteilles pour laquelle il sollicita une concession, accordée par arrêt du Conseil d'État du 2 mai 1752. La première verrerie de Carmaux fut inaugurée le 2 mai 1754 par Gabriel de Solages, dans son domaine de Blaye.","architecture":"Le château de la verrerie comportent deux bâtiments un rectangulaire l'autre carré  disposé en équerre  à deux niveaux toit en croupe.                                                                                                   La Verrerie Sainte-Clotilde comptait 300 ouvriers en 1880. À la suite de différents processus de mécanisation et à l'achat de cinq nouveaux fours Siemens, elle comptait 800 employés en 1887 qui travaillaient alors au rythme des 3 × 8. La production atteignit 30 000 bouteilles par jour. La crise du phylloxéra et la mécanisation portant atteinte au travail et aux salaires des verriers, ces derniers créèrent la chambre syndicale des verriers de Carmaux en 1890.","habitants":"Famille de  François Paul de Solages\r\n        \"","divers":"Château de la Verrerie et la verrerie Sainte-Clotide à Carmaux","gps":"","images":["../../jctruffet.com/image/image_81/81_Verrerie_Carmaux_1.jpg","../../jctruffet.com/image/image_81/81_Verrerie_Carmaux_2.jpg","../../jctruffet.com/image/image_81/81_Verrerie_Carmaux_3.jpg","../../jctruffet.com/image/image_81/81_Verrerie_Carmaux_4.jpg","../../jctruffet.com/image/image_81/81_Verrerie_Carmaux_5.jpg"]},"Consult_chateau_formulairedcc5":{"id":"Consult_chateau_formulairedcc5","dept":"81","canton":"Sémalens","commune":"Vielmur sur Agouts","nom":"Vielmur_Agouts","type":"Château","periode":"XIII-XVII-XIX","histoire":"Plusieurs châteaux à Vielmur sur Agouts, du Pigné, des Granges,  de Lauze du XVIIe siècle et de Bosquets du XVIII-XIX siècle, La Tour des Lautrec, En Motte   et de Cup( voir article).                                                                                                                  BOSQUETS,  pas d'information historique  Logis de France.  GRANGES,  pas d'information historique .                                              La TOUR des LAUTREC, construite au XIIIe siècle fait partie de l'ancienne abbaye bénédictine Notre-Dame de la Sagne fondée par la famille des Lautrec au Xie siècle. Au rez-de-chaussée, la salle dite «des enfeus» compte des arcades et les fouilles ont pu confirmer qu'elle recelait aussi des sépultures. Mélanie Chaillou indique : «On est toujours dans le domaine des hypothèses mais les différentes strates du sous-sol démontrent bien l'usage qui était fait du lieu.» \r\n LAUZE  Thierry et Colette Sabin proposent la location d'une chambre d'hôtes pour deux personnes au château de La Lauze. Pas d'information historique pour En Motte et Cup.","architecture":"Bosquet;  il est aménagé dans une gentilhommière du XVIIIe siècle, spacieuse et confortable,  parc à la française,  puisse apparaître comme une demeure construite de toutes pièces au XIXe siècle, il se peut que la sobre façade à un étage et les deux tours rondes datent du XVIIIe siècle. C'est à cette campagne que reviendraient évidemment les modillons courant au haut de la façade, comme les corbeaux placés sous les toitures d'ardoise des tours et la toiture en comble brisé couronnant le premier étage.                                                                                                  La Lauze, elle déploie une longue et basse façade ne comportant qu'un étage de petites fenêtres. Ce corps de logis  est flanqué à chaque angle d'une tour carrée. Ces tours ont été percées d'ouvertures classiques. Les tours semblent remonter au XVIIe siècle.                                                                                            Tour de Lautrec, cet édifice accolé à l'église de Vielmur sur Agout  qui a subi les outrages du temps et des multiples restructurations au fil des ans, voire des siècles, intrigue toujours.                                                                                                        Granges, le château se présente sous la forme d'un beau logis rectangulaire posé sur un soubassement et auquel on accède par un perron. La façade, à un seul étage, identique dans ses dispositions au rez de chaussée, est composée de sept travées. D'une grande pureté néo-classique, le décor se compose de pilastres à chapiteaux doriques que l'on retrouve identiques de par et d'autre de la travée centrale et aux extrémités de la façade, au rez-de-chaussée comme au premier étage. Un large bandeau sépare le rez-de-chaussée du premier étage et, alors qu'un fronton triangulaire supporté par deux consoles décore la porte d'entrée, la fenêtre centrale du premier étage a reçu un entablement plat, l'autre décor de cette belle façade est le fronton triangulaire couronnant la travée centrale et souligné de modillons, tout comme la corniche courant le long de la façade.","habitants":"Famille des Lautrec\r\n        \"","divers":"Châteaux à Vielmur sur Agouts, du Pigné, des Granges,  de Lauze  et de Bosquets.","gps":"","images":["../../jctruffet.com/image/image_81/81_Vielmur_Agouts_1.jpg","../../jctruffet.com/image/image_81/81_Vielmur_Agouts_2.jpg","../../jctruffet.com/image/image_81/81_Vielmur_Agouts_3.jpg","../../jctruffet.com/image/image_81/81_Vielmur_Agouts_4.jpg","../../jctruffet.com/image/image_81/81_Vielmur_Agouts_5.jpg"]},"Consult_chateau_formulaire6218-2":{"id":"Consult_chateau_formulaire6218-2","dept":"81","canton":"Saïx","commune":"Viviers les Montagnes","nom":"Viviers_Montagne","type":"Château","periode":"XVI-XIX","histoire":"Cinq châteaux à Viviers les Montagnes dont celui de Viviers  du XVI-XIXe siècle, de Groupiac du XIXe siècle, de Troupiac du XIXe siècle, de Sabartarié et de Arifat, (voir article).                           GROUPIAC, le château a été construit vers 1840 par l'architecte Jean-Pierre Laffon, commandité par Armand de Vergeron, sous-préfet de Castres.                                                             TROUPIAC, ce beau château néo-classique fut construit aux alentours de 1840 pour la famille d'Armand de Vergeron, en ce temps-là sous-préfet de Castres.                                                     VIVIERS, en 1339, Philippe VI autorise les habitants à se partager les parcelles et fortifier le site. Les remparts comportaient huit tours, constituant une forteresse redoutée du Haut-Languedoc, à la frontière des diocèses de Lavaur et Castres. Plusieurs seigneurs locaux furent tour à tour propriétaires du château, chacun modifiant selon l'époque et le style : tour d'artillerie ou ouverture de fenêtres Renaissance.  Le premier château est attesté dans une bulle du pape Clément IV en 1267. Le château sera intégré à la constuction du nouveau fort construit en haut de la bastide, après la signature dun paréage en 1339, entre le Roi Philippe VI de Valois et les co-seigneurs du lieu, les héritiers des Vintrou. Cette Bastide comprenait le fort  grand quadrilatère de 100 m de côté avec tours, fossés, deux ponts-levis et la partie basse dite la ville, le tout entouré de murailles. L'édifice appartenait à  Antoine de Martin seigneur de Roquecourbe. Il fut avec son fils Antoine lun des chefs du parti catholique de la région. Pendant les Guerres de Religion, Viviers eut à subir quatre sièges de 1565 à 1590. Aux XVIIe et XVIIIe siècles, on perça les murs du château de grandes fenêtres. De 1820 à 1850 de grands travaux de restauration vont donner au château son aspect actuel.                                                                                                Sabartarié pas d'information historique.","architecture":"Troupiac, le château, rectangulaire de style néoclassique, offre deux façades différentes en raison de la pente du terrain. L'une offre 7 travées de porte-fenêtres donnant sur le jardin. Elles sont surmontées d'autant de grandes fenêtres. De l'autre coté, trois portes et trois lucarnes donnent sur le parc. Au-dessus, sept travées de fenêtres à linteau en arc de cercle et au-dessus, sept autre fenêtres rectangulaires. Des deux côtés, une corniche soutient la toiture et intègre sept séries de trois petites lucarnes éclairant les combles. Ce qui frappe lorsqu'on le découvre c'est son homogénéité, en effet sa façade principale présente sept travées à trois niveaux et l'on retrouve une partie similaire sur la façade sud. Sur un soubassement fait de trois portes s'ouvrent des grandes fenêtres en plein cintre.    Viviers,  du château initial en fer à cheval, la partie centrale est conservée, avec de larges ouvertures néo-classiques. L'aile orientale a été abaissée ainsi que la tour ronde accolée en contre-bas.   Après quatre sièges pendant les guerres de religion, le château est totalement remanié, une parties des sculptures antérieures a été retrouvées lors de fouilles au XIXe siècle et ornent le parc. Au début du XIXe siècle, l'architecte toulousain, Jean-Pierre Laffon agrandit les ouvertures et en fait un château néo-classique sans modifier la structure initiale. Le mur de la cour est supprimé au profit des jardins.                      Groupiac, le château a été construit vers 1840,  s'il est  récent ne repose pas sur un château fort médiéval, le site est occupé depuis très longtemps puisque des vestiges souterrains datent de l'époque gallo-romaine,   de plan en V , avec deux corps de logis rectangulaire de trois niveaux dont celui de l'arrière terminé par des créneaux, un pavillon carré sur angle à trois niveaux toit en croupe presque plats.","habitants":"Seigneurs locaux\r\n        \"","divers":"A Viviers les Montagnes dont celui de Viviers , de Groupiac , de Troupiac et  de Sabartarié.","gps":"","images":["../../jctruffet.com/image/image_81/81_Viviers_Montagne_1.jpg","../../jctruffet.com/image/image_81/81_Viviers_Montagne_2.jpg","../../jctruffet.com/image/image_81/81_Viviers_Montagne_3.jpg","../../jctruffet.com/image/image_81/81_Viviers_Montagne_4.jpg","../../jctruffet.com/image/image_81/81_Viviers_Montagne_5.jpg","../../jctruffet.com/image/image_81/81_Viviers_Montagne_6.jpg"]},"Consult_chateau_formulaire8278":{"id":"Consult_chateau_formulaire8278","dept":"81","canton":"Lavaur","commune":"Veilhes","nom":"Vénac_Veilhes","type":"Château","periode":"XV","histoire":"VENAC, le premier acte connu mentionnant une maison forte de Vénac, date de 1444, du nom de la Salle, à l'emplacement du château actuel. De 1444 à 1627, le fief resta indivis entre deux familles, l'alliance de Jean de Bousquet d'Aure et de Jeanne de Villeneuve. Après l'acquisition de la pleine seigneurie en 1627, les Bousquet continuèrent les travaux de modernisation de la maison commencés dès 1550. En 1715 le château entra par alliance dans la famille de La Tour Saint-Paulet puis, en 1737, encore par alliance dans la famille de Guibert.","architecture":"les Guibert modifièrent la vieille demeure créant deux niveaux d'habitation et ouvrant dans la façade sud-est de grandes fenêtres au goût du jour. Vénac est donc de fondation ancienne mais a subit au début du XXe siècle, des travaux visant surtout à sa préservation; furent refaits entièrement la charpente et la tour sud-est très délabrée. Dans le même temps les tours furent surélevées d'un étage, les aménagements intérieurs repensés et un bel escalier de marbre reconstruit à neuf. Aujourd'hui, ce sont toujours les descendants des Guibert qui par leurs soins attentifs veillent à la préservation de cette aimable demeure.","habitants":"Famille de La Tour Saint Paulet\r\n        \r\n        \"","divers":"Château de Vénac à Veilhes","gps":"","images":["../../jctruffet.com/image/image_81/81_Venac_Veilhes_1.jpg"]},"Consult_chateau_formulaire6c39":{"id":"Consult_chateau_formulaire6c39","dept":"81","canton":"Sémalens","commune":"Vénés","nom":"Vénés","type":"Forteresse","periode":"XII","histoire":"VENES, au XVIe siècle l'évêque de Cahors Saint-Didier était le seigneur de Vénès, cette terre dépendait des vicomtes de Lautrec. La Révolution entraîna la confiscation du domaine, faute d'entretien, Vénès était en partie en ruines dès le XVIIIe siècle. Acheté en 1820 par la famille Borrel, l'édifice fut restauré dans l'esprit néo-gothique.","architecture":"Le Château de Vénès date du XIIe siècle. Il a été rénové pour offrir le gîte aux vacanciers de passage dans le Tarn. Il est idéalement placé entre Albi et Castres, deux sites riches en sites culturels. Dans cette bastide au style féodal se cachent deux grandes salles aménagées pour vos réceptions ou séminaires : la salle des Gardes et la salle Montgomery. Elles peuvent répondre à tous les besoins. Hormis ces pièces, le château abrite quatre chambres d'hôtes et un gîte certifié par Clévacances.  Les restaurations ont fait disparaître une partie des locaux mais en ont conservé les parties principales dans lesquelles le château fut aménagé en conservant un caractère féodal qui é
