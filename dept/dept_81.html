s, Jean meurt en 1649, le château reste la propriété des Nadal jusqu'en 1649, le dernier de cette famille sans postérité fait don de tout ses biens à son neveu Jean-François de Saint-Jean, fils de Louis de Nadal  et de Thimoléon de Saint-Jean. Famille de la noblesse militaire qui possède la Baronnie de Moussoulens. Le fils de Jean-François, Alexandre de Saint-Jean de Thurin épouse Anne Duthil et en 1768 le fils d'Alexandre, Jean-François vend la seigneurie de Massaguel aux sieurs  Jean-Jacques et Jean Fabre père et fils aîné négociants à Dourgne. Jean Fabre de Massaguel épouse Marie de Pagan mène une vie de terrien ils eurent huit enfants. Après la Révolution Jean et son fils Jean-Jacques  sont emprisonnés pour un an et retrouvent leurs biens à la sortie. Toujours dans la famille Fabre.","architecture":"Massaguel, médiéval du XIIIe siècle, qui a pris la suite du château de Contrast ruiné par Simon de Montfort lors des affrontements survenus au cours de la croisade des Albigeois. Au cours des XVIIe et XVIIIe siècles il a été réaménagé. Le château semble avoir comporté deux enceintes. De la première il ne subsiste qu'une tour en partie arasée de 12 mètres de haut. La porte d'entrée dans la cour intérieure du château perce cette enceinte parc un arc en plein cercle surmonté de pilastre du XVIIe siècle. Dans l'axe du portail se trouve la façade principale. Celui-ci, de forme carrée, est flanqué de trois tours circulaires. Les tours ont été arasées mais s'élèvent à plus de 18 mètres. La façade principale est percée d'ouvertures, réalisée au XVIIIe siècle, remplaçant les fenêtres à meneaux. Au second étage se trouve deux fenêtres Renaissance. Un corridor traverse de part en part le château.  Dans l'axe du portail se trouve la façade principale. Celle-ci a une forme carrée est  flanquée de trois tours rondes. Elles étaient quatre à lorigine mais une a été détruite.","habitants":"Famille de Pierre de Puylaurens\r\n        \"","divers":"Le château de Massaguel.","gps":"","images":["../../jctruffet.com/image/image_81/81_Massaguel_1.jpg","../../jctruffet.com/image/image_81/81_Massaguel_2.jpg","../../jctruffet.com/image/image_81/81_Massaguel_3.jpg","../../jctruffet.com/image/image_81/81_Massaguel_4.jpg"]},"Consult_chateau_formulairee6ab":{"id":"Consult_chateau_formulairee6ab","dept":"81","canton":"Lacaune","commune":"Masnau-Massuguiès","nom":"Massuguiès","type":"Château","periode":"XIV","histoire":"MASSUGUIES,  en 1392, Pierre Aymeric, archevêque de Bourges et évêque d'Albi achète à Guillaume de Rabastens le lieu et château de Massuguiès. Au XVe siècle, la famille d'Aymeric, seigneurs de Massuguiès,  en 1571, Françoise d'Aymeric, seule héritière, épouse François de Caumont qui le lègue en 1596 à son fils aîné, Jean. Celui-ci, très endetté, vend une première fois en 1605 avec un pacte de rachat la place de Massuguiès au sieur de Vezians. Il la rachète en 1606 pour la céder  le 31 octobre 1606 à Jean de Lacger.  Son fils Hercule était un précieux qui vivait à la cour, sa sur, épouse d'un Toulouse Lautrec de Saint-Germier fait don en 1667 de la seigneurie à son gendre, Pierre de Carlotti. Les  Carlotti seraient une famille patricienne de Vérone, qui s'installa en France au XVIe siècle. Les descendants de Pierre, baron de Cestayrols et du Cayla, seigneur de Massuguiès, conservèrent le domaine jusqu'en 1850.","architecture":"Du premier château fort  de Massaguiès construit à la fin du XIVe siècle. Ils interviennent peu sur l'édifice ; on ne peut leur attribuer le décor que de deux éléments : les stucs rocaille et la cheminée Louis XVI au premier étage a gardé du château initial du XIVe siècle, le plan quadrangulaire et deux tours carrées. Deux tours rondes et les trois corps de logis datent du XVIIe siècle. Les tours occupent les angles du château et la cour est fermée par un mur sur le quatrième côté. Des meurtrières dans les tours rappellent le rôle militaire de l'ancien château. La tour nord, plus imposante, laisse à penser qu'elle fut le donjon. Le long des façades sud et ouest se trouvent des restes des anciennes douves. Les murs sont enduits en décor de fausse pierre et les toitures sont en ardoise.\r\nLa porte d'entrée garde les traces d'un ancien pont-levis. Les façades sont largement ouvertes par des fenêtres à meneaux.","habitants":"Famille d'Aymeric\r\n        \r\n        \"","divers":"Château de Massuguiès.","gps":"","images":["../../jctruffet.com/image/image_81/81_Massuguies_1.jpg","../../jctruffet.com/image/image_81/81_Massuguies_2.jpg","../../jctruffet.com/image/image_81/81_Massuguies_3.jpg","../../jctruffet.com/image/image_81/81_Massuguies_4.jpg"]},"Consult_chateau_formulairedd38":{"id":"Consult_chateau_formulairedd38","dept":"81","canton":"Lagrave","commune":"Senouillac","nom":"Mauriac_Tarn","type":"Forteresse","periode":"XIII","histoire":"MAURIAC, du XIII siècle,  il a été créé par Guiraudus de Mauriaco, un templier, et a été rénové grâce au peintre Bistes et sa famille. Transmis par le comte d'Armagnac  à Philippe-Jean de Rabastens vicomte de Paulin en 1419. Bertrand de Rabastens grand chef protestant fortifie et agrandie l'édifice en 1545.  les Rabastens vicomte de Paulin propriétaire de la seigneurie  de Mailhoc, de Castayrols et  général  des troupes  de Saint-Pons, de Castres et d'Albi. En 1616 mort du dernier des Rabastens. Mauriac sert de résidence aux conseillers du parlement de Toulouse, échappe au démantèlement de la Révolution, par manque de moyens de la commune. Passe aux Saint-Félix, puis aux Tapié de Céleyran.  Le château de Pradals construit par Philippe, le frère de Bertrand de Rabastens, neut pas la même chance, mais offre encore de grandes similitudes avec Mauriac. Appartient depuis les années 1960 au peintre Bernard Bistes, maître d'ouvrage de sa rénovation. L'artiste utilise les salles pour exposer ses peintures.","architecture":"Mauriac, le château est fondé au XIIIe siècle  la construction de ce château des Templiers se poursuit au XIVe siècle, puis est embelli par l'enrichissement de ses propriétaires grâce à la culture du pastel du pays de Cocagne.  L'édifice à hautes murailles défensives une élégance inspirée de l'architecture  Renaissance, dotée de hourds, de meurtrières pour arquebuses, de mâchicoulis  de tours crénelées   et d'un pont-levis. Trois corps de logis dissymétriques autour de  la cour intérieure carrée fait une surface de 400 m²  forment un quadrilatère  fermé de 20 mètres de côté et comprend huit fenêtres à meneaux. Sa façade longue de 50 mètres  s'ouvre en son milieu par une porte voûtée  ou se trouvait autrefois le pont-levis, aux minces tours qui l'encadrent répondent deux grosses tours d'angles de dix mètres de diamètre surmontée de mâchicoulis ou repose la toiture. Lors des Guerres de religions, au XVIe siècle, le chemin de ronde du château est partiellement détruit par les catholiques.","habitants":"Famille de  Philippe-Jean de Rabastens\r\n        \"","divers":"La forteresse de Mauriac à Senouillac.","gps":"","images":["../../jctruffet.com/image/image_81/81_Mauriac_Tarn_1.jpg","../../jctruffet.com/image/image_81/81_Mauriac_Tarn_2.jpg","../../jctruffet.com/image/image_81/81_Mauriac_Tarn_3.jpg","../../jctruffet.com/image/image_81/81_Mauriac_Tarn_4.jpg","../../jctruffet.com/image/image_81/81_Mauriac_Tarn_5.jpg","../../jctruffet.com/image/image_81/81_Mauriac_Tarn_6.jpg"]},"Consult_chateau_formulaire6b28":{"id":"Consult_chateau_formulaire6b28","dept":"81","canton":"Mazamet","commune":"Mazamet","nom":"Mazamet","type":"Vestiges","periode":"XI-XIX","histoire":"Sept châteaux à Mazamet dont celui de Mazamet , les vestiges de Hautpoul, château de Lagoutine, de Lapeyrouse, de Thoré et des Durand viticulteur.                                                                    HAUTPOUL, en été l'office de tourisme organise des visites nocturnes avec des flambeaux du village perché médiéval. Berceau historique des Mazamet, le château primitif dHautpoul serait dorigine Wisigothique et ce serait Ataulf , le premier roi Wisigoth qui aurait crée la forteresse dHautpoul en 413. Mais , on connaît mieux Pierre-Raymond comme fondateur dHautpoul. Il a fait reconstruire le château et améliorer les défenses de la cité Saint-Pierre dHautpoul. Ainsi Hautpoul est cité dès 1084. Mais cest lors de la croisade contre les albigeois, que Simon de Montfort attaquera en avril 1212 la forteresse dHautpoul défendue par Izarn, son seigneur. La cité prise dassaut, il fera démanteler le château et lincendiera. On reparlera encore de ce château lors des guerres de religion, ce qui suppose quil a été restauré. En effet, en 1560, la réforme sinstallera dans la région et Mazamet sera placé sous lautorité dun catholique Sabastien dHautpoul. Les protestants libéreront la ville et le gouverneur se réfugiera dans la forteresse dHautpoul. En 1574, les protestants reprendront le château.  Les frères Rozet seront nommés administrateurs , Jacques pour Mazamet et Robert pour Hautpoul. Mars 1589 verra les catholiques redevenir les maîtres temporairement dHautpoul avant den être chassés par les protestants courant mai. La période médiévale terminée, le château tombera en abandon. Il faudra attendre les années 1993-2000 pour que la commune de Mazamet achète et réhabilite les vestiges du château.          Pas d'information historique pour les autres châteaux .                                                THORE Demeure construite pour l'industriel  par l'architecte J. Pheulpin, en 1893-1894, inspirée du modèle proposé par Viollet-le-Duc dans son histoire d'une maison, éditée en 1873.                                                                                                 LAGOUTINE,  construit dans les années 1810 pour Auguste Joseph Marie Bosviel de Lagoutine de Lapeyrouse (1774-1823). Au début du Xxe siècle, Henri, Henri Jamme de Lagoutine, vendit les terrains, Cette famille de négociants qui compte plusieurs maires de Mazamet avait été anoblie au début du XVIIIe siècle.","architecture":"Mazamet, ancien castrum du XIe siècle et refuge cathare, vestiges des châteaux et des fortifications, artisanat du bois et du jouet, panorama et points de vue exceptionnel.                                             Hautpoul, forteresse dHautpoul en 413   reconstruction  du château   en 1084, démantelé et incendié en 1212, puis restauré, reprit en 1574  et tombera en abandon.                                                     Lagoutine, au milieu d'un parc qu'une végétation sauvage a envahi. Car c'est une évidence, ce magnifique ensemble architectural est aujourd'hui à l'abandon. Le parc n'est pas entretenu depuis longtemps mais surtout le bâtiment a été squatté, vandalisé et dégradé. Cette situation posait d'incontestables problèmes de sécurité et d'insalubrité. La mairie de Mazamet a donc fait murer les accès du bâtiment pour éviter une occupation sauvage et empêcher d'autres dégradations. Ce bâtiment est une copropriété. Mais l'un des copropriétaires est désormais injoignable et rien ne peut se faire sans son accord.                                                                                                              Lapeyrouse manoir du XIXe siècle  à deux niveaux sur soubassements et lucarnes sur des toits impériaux, les corps de logis en forme de T  accolé d'un pavillon carré                                     Thoré  Le château offre un confort rare en son temps . Le décor porté d'origine a été conservé.                                                                   Lagoutine, cette construction, qui sélève devant vous, est luvre du Comte de Milhau qui fut également larchitecte des châteaux de Saint-Amans Valtoret et de Sauveterre construit dans les années 1810 sur un immense domaine à la sortie de la ville. Le domaine a été progressivement loti dans les années 1910-1930 au moment où la ville connaissait une grande phase de prospérité avec le développement de l'industrie du délainage. Sur les parcelles loties ont été édifiées d'importantes maisons pour les industriels de la place ainsi que le jardin public et la gare.","habitants":"Les frères Rozet                                                                             Famille d'Armand Puech                                                                     Famille d'Auguste Joseph Marie Bosviel de Lagoutine de Lapeyrouse\r\n        \"","divers":"Les vestiges de Hautpoul, le château de Durand, de Lagoutine, de Lapérouse et de Thoré à Mazamet.","gps":"","images":["../../jctruffet.com/image/image_81/81_Mazamet_1.jpg","../../jctruffet.com/image/image_81/81_Mazamet_2.jpg","../../jctruffet.com/image/image_81/81_Mazamet_3.jpg","../../jctruffet.com/image/image_81/81_Mazamet_4.jpg","../../jctruffet.com/image/image_81/81_Mazamet_5.jpg","../../jctruffet.com/image/image_81/81_Mazamet_6.jpg","../../jctruffet.com/image/image_81/81_Mazamet_7.jpg","../../jctruffet.com/image/image_81/81_Mazamet_8.jpg"]},"Consult_chateau_formulaire6e97":{"id":"Consult_chateau_formulaire6e97","dept":"81","canton":"Rabastens","commune":"Mezens","nom":"Mezens","type":"Forteresse","periode":"XVII-XIX","histoire":"MEZENS, lemplacement de ce château était stratégique car il marquait la limite entre le Toulousain et lAlbigeois, château fort élevé au XIIIe siècle par le cardinal Pilfort de Rabastens son neveu  Pierre-Raymond qui s'illustra pendant la guerre de cent ans, le bon sénéchal Galaud de Panassac furent seigneurs de Mézens. En 1568 château construit par les seigneurs de Rabastens,  Bertrand de Rabastens chef des huguenots en fit son fief qui passa par héritage à François de la Valette. En 1619 Jean de Gineste juge mage de Toulouse acquiert le château et le transforme. En 1808, Gabriel-Hyppolyte de Solages achète le château qui, depuis lors, est resté dans cette famille.","architecture":"Mézens, construction quadrangulaire massive d'allure sarrasine autour d'une cour centrale de 50 mètres de côté cinq tours plus un donjon au milieu de la façade est de 25 m de haut avec créneaux et mâchicoulis en assure la défense. Tour au milieu de la façade sud et quatre petites tours d'angle carrées. Deux cours intérieures. Les corps de logis à deux niveaux avec rangée d'ils de bufs donnant sur l'extérieur. Pont-levis supprimé en 1747. le château fut en grande partie incendié durant les guerres de religions mais les murs de la cour intérieure et les vastes toitures furent rebâties, des ouvertures furent percées dans les murailles extérieures. La demeure fut au cours du temps à plusieurs reprises modifiée, mais elle conserve de façons étonnantes les traces du passé.","habitants":"Famille de François de la Valette\r\n        \r\n        \"","divers":"Forteresse de Mezens","gps":"","images":["../../jctruffet.com/image/image_81/81_Mezens_1.jpg","../../jctruffet.com/image/image_81/81_Mezens_2.jpg","../../jctruffet.com/image/image_81/81_Mezens_3.jpg","../../jctruffet.com/image/image_81/81_Mezens_4.jpg"]},"Consult_chateau_formulaire965e":{"id":"Consult_chateau_formulaire965e","dept":"81","canton":"Carmaux","commune":"Milhars","nom":"Milhars","type":"Château","periode":"XVII","histoire":"MILHARS, la seigneurie de Milhars est attestée au XIIIe siècle et, en 1260, le comte de Toulouse Raymond VII donna Milhars à son vassal Géraud de Casaubon.  Après la reconstruction du château par les Cazilhac, la seigneurie  fut érigée en marquisat en 1653.  Construit en 1631, Milhars a remplacé un château plus ancien qui avait été ruiné durant la guerre contre les Anglais et qui fut détruit au XVIe siècle, Charles de Cazillac-Cessac fait reconstruire le château en promontoire entouré d'un vaste parc. La baronnie puis le marquisat de Milhars était une possession de rapport et de titre, ne justifiant pas la construction d'une forteresse ni d'une bastide. Durant la Révolution le dernier seigneur de Milhars alla finir au fond de la sinistre fosse du charnier de Picpus. Revendu deux fois, il fut habité à partir de 1920 par un écrivain puis les propriétaires successifs ont entretenus cette belle maison.","architecture":"Milhars est un point de défense pour contrôler l'entrée des vallées du Cérou et du Bonnan. Le bourg castral s'organise en constructions en escargot bâtie sur un éperon rocheux en contrebas d'un château féodal dont on trouve des traces vers 1200, au début du XVIIe siècle le château s'effondra en partie.\r\nSurnommé le \"village des murs\" en raison des pittoresques vestiges de son riche passé : Remparts, mur d'enceinte avec ses arcs de décharge, portes fortifiées, foirail, ruelles tortueuses, vieilles maisons du \"maçon\", du \"notaire\", vous pourrez admirer l'extérieur du château, monument historique  et les dépendances du seigneur : Anciennes écuries, ancienne orangerie, four banal, pigeonniers, moulin sur le Cérou.   Fait rare, on sait le nom du maître maçon ayant uvré à Milhars en 1631: Oradus, de Toulouse. Il conserve un superbe vestibule flanqué de deux niches et pavé d'une mosaïque de cailloux noirs sur fond gris,  motif que l'on retrouve sur la rampe du très bel escalier. Il conserve encore quatre tours abaissées au niveau des toitures. Les restes des Milhars sont d'un grand intérêt, en particulier la belle porte d'entrée. Devenu bien communal, le château devint école et mairie avant d'être vendu à un particulier qui fit de regrettables démolitions.","habitants":"Famille de Charles de Cazillac-Cessac\r\n        \"","divers":"Château de Milhars","gps":"","images":["../../jctruffet.com/image/image_81/81_Milhars_1.jpg","../../jctruffet.com/image/image_81/81_Milhars_2.jpg","../../jctruffet.com/image/image_81/81_Milhars_3.jpg","../../jctruffet.com/image/image_81/81_Milhars_4.jpg","../../jctruffet.com/image/image_81/81_Milhars_5.jpg","../../jctruffet.com/image/image_81/81_Milhars_6.jpg","../../jctruffet.com/image/image_81/81_Milhars_7.jpg"]},"Consult_chateau_formulairec405":{"id":"Consult_chateau_formulairec405","dept":"81","canton":"Carmaux","commune":"Monestiès","nom":"Monestiès","type":"Château","periode":"XIV-XIX","histoire":"Deux châteaux à Monestiès celui dit de Candèze et celui de Saint-Hippolyte du XIV-XIXe siècle.                                                       St-HIPPOLYTE,  l'occupation du site de Monestiès doit être très ancienne, si l'on sait qu'une voie romaine passait jadis tout à côté du domaine. La première référence concernant le château remonte à 1313, date du testament de Mabelia de Najac, veuve de Pons de Monestiès, de Saint Hippolyte. Durant les deux siècles suivants, l'on trouve en la seigneurie de Saint Hippolyte les Paulin de Monestiès et les Mirabel, en outre co-seigneurs de Monestiès. Aménagements réalisés par le baron Decaze. Le site de Saint-Hippolyte est fréquenté depuis très longtemps, une ancienne voie romaine traversant le domaine.  Pendant les guerres de religion, en 1595, le château est assiégé et pris aux catholiques par Anne de Lévis, duc de Ventadour. Le château change plusieurs fois de famille, sa position excentrée des grandes routes le faisant parfois délaisser par des propriétaires qui ne l'habitent qu'occasionnellement.","architecture":"Monestiès plus maison forte que château flanqué de tours rondes.  Les conséquences du traité de Paris  qui suivit  la croisade contre les Albigeois, firent que  lévêque dAlbi fut nommé vicomte avec des droits reconnus sur Monestiés. En 1282, le roi lui accordé les droits de haute, moyenne et basse justice de la baronnie de Monestiès.\r\nLe château fait partie des anciennes fortifications. Plusieurs éléments montrent lancienneté de ce château : les fenêtres à meneaux simple, une tourelle à encorbellement recouverte dun toit de lauzes de forme conique, la tourelle ronde plus élevée qui dépasse de la tour carrée.                                                     St-Hippolyte,  le château, quadrangulaire, à l'intérieur duquel se trouve une église. La seigneurie, mentionnée depuis le XIVe siècle, a subi des modifications au début du XVIIe siècle et au XIXe siècle, qui donnent un aspect plus accueillant et moins austère au lieu. Est un quadrilatère dont les angles sont occupés par des tours et le centre par une cour intérieure. La façade orientale est un simple mur sur lequel s'appuie une galerie, les trois autres côtés sont le logis au sud, des dépendances à l'ouest et une chapelle au nord.\r\nSi la régularité de la façade et de la taille des fenêtres plaident pour une origine unique, un examen plus attentif révèle des traces de fenêtres géminées ou de fenêtres à meneaux auxquelles des restaurateurs ont supprimés le pilier central. Quelques meurtrières et canonnières rappellent toujours le passé défensif de l'ouvrage.","habitants":"Famille de  Paulin de Monestiés\r\n        \r\n        \"","divers":"Château de Monestiès dit de Candèze et  de saint-Hippolyte.","gps":"","images":["../../jctruffet.com/image/image_81/81_Monesties_1.jpg","../../jctruffet.com/image/image_81/81_Monesties_2.jpg","../../jctruffet.com/image/image_81/81_Monesties_3.jpg","../../jctruffet.com/image/image_81/81_Monesties_4.jpg","../../jctruffet.com/image/image_81/81_Monesties_5.jpg","../../jctruffet.com/image/image_81/81_Monesties_6.jpg","../../jctruffet.com/image/image_81/81_Monesties_7.jpg","../../jctruffet.com/image/image_81/81_Monesties_8.jpg","../../jctruffet.com/image/image_81/81_Monesties_9.jpg"]},"Consult_chateau_formulairec1f0":{"id":"Consult_chateau_formulairec1f0","dept":"81","canton":"Lacaune","commune":"Lamontélariè","nom":"Monségou","type":"Château","periode":"XV","histoire":"MONSEGOU, au XVIe siècle, Mgr Dupin archevêque de Toulouse, faisait venir de cette terre le gibier qui garnissait sa table, mais c'est une autre ressource qui fit un temps la prospérité de Monségou. Le pourtour du Sidobre est un sol très riche en minerai et  dès l'époque des forges gallo-romaines, ce terroir connut une tradition du travail du fer. En fait le site connut son véritable essor au XVIIIe siècle, époque où une Mlle Duc de Monségou épousa M. de Pins : les forges entrèrent dans cette famille et, en 1751, Marie-Claude de Pins relança ces forges mais mit 15 ans à trouver un filon de bonne qualité. Après la Révolution, Jean-Jacques Vieu, de Castres, fut le dernier maître de forge.","architecture":"Monségou,   dès l'origine, le château fut construit près d'une source captée par une belle fontaine. Le château, construit au XVe siècle, se dresse au bord de l'Agout, en contrebas de la route montant de la Raviège à Brassac. Impressionnant autant par la rigueur de son architecture que par son élancement, il conserve un magnifique motif héraldique sculpté: sur un fond de cuir se détache un blason surmonté d'un heaume sur lequel l'on voit les trois chats  qui figuraient sur les armes de la famille du duc de Monségou.","habitants":"Famille duc de Monségou\r\n        \r\n        \"","divers":"Château de Monségou à Lamontélarié","gps":"","images":["../../jctruffet.com/image/image_81/81_Monsegou_1.jpg","../../jctruffet.com/image/image_81/81_Monsegou_2.jpg"]},"Consult_chateau_formulaire3969":{"id":"Consult_chateau_formulaire3969","dept":"81","canton":"Sémalens","commune":"Lautrec","nom":"Montcuquet","type":"Forteresse","periode":"XV-XVII","histoire":"MONTCUQUET  appartenait au seigneur d'Ambres, Pierre Dupuy, seigneur de Cabrilles et de Montcuquet en 1451. Alain Dupuy le posséda de 1502 à 1532. On trouve en 1595 un Gabriel de Capriol, seigneur de Montcuquet. Entre temps en 1575, fut le théâtre d'événements liés aux guerres de Religion endeuillant la région. En 1686, Montcuquet appartenait à Louis de Ligonier, seigneur de Montcuquet, mari de Louise de Poncet. Le 29 janvier 1689 naissait Louis Godefroy de Ligonier, fils des précédents. Plus tard, Anne de Ligonier-Montcuquet épousa Pierre de Gervain de Roquepiquet, baron de Vertheuil. Le château resta dans la descendance des Gervain jusqu'en 1854, date à laquelle la famille Vène devient propriétaire de Montcuquet pour le conserver jusqu'à l'époque contemporaine. Aujourd'hui chambres d'hôtes.","architecture":"Construit au XVe siècle sur une butte, Montcuquet conserve une belle cour intérieure. Sur le mur de la porte d'entrée, une sculpture représentant une femme à la colombe. Le château présente des bâtiments répartis autour d'une cour et conserve encore deux grosses tours. Deux corps de logis en L à quatre niveaux.","habitants":"Famille de   Louis de Ligonier\r\n        \"","divers":"Forteresse de Montcuquet à Lautrec","gps":"","images":["../../jctruffet.com/image/image_81/81_Montcuquet_1.jpg","../../jctruffet.com/image/image_81/81_Montcuquet_2.jpg","../../jctruffet.com/image/image_81/81_Montcuquet_3.jpg","../../jctruffet.com/image/image_81/81_Montcuquet_4.jpg","../../jctruffet.com/image/image_81/81_Montcuquet_5.jpg","../../jctruffet.com/image/image_81/81_Montcuquet_6.jpg"]},"Consult_chateau_formulaireccd5":{"id":"Consult_chateau_formulaireccd5","dept":"81","canton":"Réalmont","commune":"Montdragon","nom":"Montdragon","type":"Château","periode":"XIV-XX","histoire":"Plusieurs châteaux à Montdragon dont celui de Montdragon, de Dournes chambres d'hôtes  au nord-Est  le château de la Boutarié.                                                                                                      MONTDRAGON  château de Montdragon  subit au XIIIe s les assauts de Simon de Monfort avant d'être ravagé pendant les guerres de religion. Malgré tout, le village a conservé une place à arcades et son vieux château d'origine médiévale.    Raimond le 1er, comte de Rouergue, marquis de Gothie, laissa par son testament en 961, à son fils Raimond le château de \"Dargon\". On peut reconnaître dans cette dénomination le château primitif de Montdragon. Celui-ci était un démembrement de la seigneurie de Lombers. Le château n'a joué aucun rôle pendant la croisade contre les Albigeois ni durant la guerre contre les Anglais, mais pendant ce dernier affrontement, le village et le château eurent beaucoup à souffrir de la violence des temps. Rentrée dans le domaine du Roi, la baronnie fut aliénée en 1596 en faveur de la famille de Castelpers. À la fin du XVIIe siècle, Louis XIV vendit le domaine à Pierre Batignes, sieur de Lagrèze, mentionné comme seigneur de Montdragon en 1689 et 1695. Lui succédèrent ses deux filles, mariées au marquis du Bosc et au vicomte de Varagne. La fille du marquis du Bosc, la marquise de Valady, hérita de la propriété.","architecture":"Montdragon,   subit au XIIIe s les assauts de Simon de Monfort avant d'être ravagé pendant les guerres de religion. Malgré tout, le village a conservé une pittoresque place à arcades et son vieux château d'origine médiéval. De plan en U avec deux tours arasées  hors uvre aux angles de façades.  Depuis la Renaissance le château a été largement détruit puis remanié, mais il conserve quelques traces de son importance passée, notamment une fine tour ronde en partie arasée.                                                                Dournes du XIXe siècle, de plan rectangulaire à deux niveaux avec lucarnes sur toit brisé.                                                                       La Boutarié, corps de logis rectangulaire à deux niveaux accolé de deux tours carrées à trois niveaux et toit à quatre pans.","habitants":"Famille de Castelpers\r\n        \"","divers":"Le château de Montdragon de la Boutarié et de la Dournes","gps":"","images":["../../jctruffet.com/image/image_81/81_Montdragon_1.jpg","../../jctruffet.com/image/image_81/81_Montdragon_2.jpg","../../jctruffet.com/image/image_81/81_Montdragon_3.jpg","../../jctruffet.com/image/image_81/81_Montdragon_4.jpg","../../jctruffet.com/image/image_81/81_Montdragon_5.jpg","../../jctruffet.com/image/image_81/81_Montdragon_6.jpg","../../jctruffet.com/image/image_81/81_Montdragon_7.jpg"]},"Consult_chateau_formulaireb5e4-2":{"id":"Consult_chateau_formulaireb5e4-2","dept":"81","canton":"Castres","commune":"Navès","nom":"Montespieu","type":"Forteresse","periode":"XII-XVI","histoire":"MONTESPIEU, au XIIe siècle la seigneurie  appartenait à l'origine aux chevaliers de Caudière, attestés dès le début du XIIIe siècle puis, à la fin du siècle suivant passa à la famille Huc.  L'on sait par la suite qu'aux alentours de 1508, le château primitif, mal localisé par les documents et distant du château actuel d'à peu près une lieue était en ruines. Le château actuel fut construit aux alentours de 1510 par Pierre III d'Huc et ses fils agrandirent le domaine, puis la seigneurie passa par alliance au Padiès seigneur de saint-Martin , puis à Jean de la Barre qui hérite du domaine. A la mort de Jean de Padiès en 1570 le légue à son cousin Jean de Nadal seigneur de Lacrouzette  Le 23 janvier 1590, Marguerite de Sales, la veuve de Jean de Nadal, dont le vicomte et le baron de Montfa avaient épousé deux filles, Renée et Anne, fut prise dans un traquenard et assassinée à trois lieues de Montespieu avec une de ses filles et une servante par un de ses serviteurs. Le 19 juillet 1591, il se produisit une échauffourée entre le vicomte et le baron de Montfa et les habitants de Labruguière qui soupçonnaient les Toulouse-Lautrec de faire partie de la Ligne. Montmorency fit emprisonner les deux seigneurs un court moment mais il les libéra bientôt et le vicomte se retira à Montespieu. Dans ce contexte trouble de guerre, les incidents de ce type étaient monnaie courante. En janvier de l'année suivante, un soldat de Labruguière ayant été maltraité par le vicomte de Montfa, obtint un ordre de Montmorency, prit une petite troupe et alla prendre d'assaut le château de Montespieu. Cependant, le vicomte put lui échapper. Enfin, en cette même année 1592, Montespieu fut à nouveau pillé et incendié.Le 23 mai 1600, Montespieu fut acquis par Abel de Suc, président réformé de la chambre de l'édit de Castres, passera aux Scorbiac et en 1680 achat par Antoine de Juge , cette famille protestante le conserva ainsi que le domaine jusqu'en 1964 date de la mort d'Henriette de Juge de Montespieu.  Il est actuellement utilisé pour l'organisation de mariages et d'événements divers.","architecture":"Le château de Montespieu est une forteresse néo-médiévale situé à Navès. Construit sur des bases remontant au XIIe siècle, il fut entièrement reconstruit au XVIe siècle, remanié au XVIIe siècle puis restauré en 1900. Le château de Montespieu est un vaste rectangle qui présente les caractéristiques d'une forteresse néo-médiévale, s'ordonne autour d'une grande cour intérieure de forme rectangulaire bordés sur trois de ses côtés par des corps de bâtiments, fermée au nord par un mur de clôture dans lequel s'ouvre une poterne crénelées, entouré de fossés aujourd'hui  comblés,  il est flanqué de sept tours, trois au corps de logis principal et quatre aux pavillons d'angles du quadrilatère. Flanquant l'aile Est, une de ces tours dont la haute toiture pyramidale dépasse la hauteur des bâtiments. A l'ouest deux tours rondes sont percées de bouche à feu. Conserve une allure défensive mais la cour inférieure présente un aspect plus  convivial, avec de grandes fenêtres à meneaux qui éclairent la façade. Par la suite, un acte en date du 17 septembre 1664 indique les réparations à effectuer au château ainsi qu'une description détaillée de la bâtisse : les fossés sont indiqués, ainsi que le pigeonnier et l'entrée est signalée au levant. La Révolution entraîna à Montespieu quelques dommages puisque les créneaux furent arasés, Paul de Juge entreprit de restaurer le château à la fin du siècle dernier.","habitants":"Famille d'Antoine de Juge de Montespieu\r\n        \"","divers":"Forteresse de Montespieu à Navès","gps":"","images":["../../jctruffet.com/image/image_81/81_Montespieu_1.jpg","../../jctruffet.com/image/image_81/81_Montespieu_2.jpg","../../jctruffet.com/image/image_81/81_Montespieu_3.jpg","../../jctruffet.com/image/image_81/81_Montespieu_4.jpg"]},"Consult_chateau_formulaire0039":{"id":"Consult_chateau_formulaire0039","dept":"81","canton":"Castres","commune":"St-Jean de Vals Roquecourte","nom":"Montfa","type":"Vestiges","periode":"XVI","histoire":"MONTFA, château de Roquecourbe  au XIIIe siècle, Baudoin de Toulouse épouse Alix de Lautrec. Cet acte fonde la famille Toulouse Lautrec. En 1255, le château de Montfa est cité. Au XIVe siècle, il appartient aux Arpajon. Au XVe siècle, il est la possession de la famille de Foix. Durant ce siècle, la famille Toulouse-Lautrec le récupère. Au milieu du XVIe siècle, après un long procès contre sa belle sur Isabeau de Lescure, François II Baron de Montfa le récupère.  En 1564, le seigneur Pierre de Lautrec capitule à condition que le château ne soit pas démoli pourtant Gontaud de Biron capitaine des protestants du pays albigeois commence à démolir  après l'avoir occupé. Durant les guerres de religion,  en 1569 François II voit mourir son fil aîné de 10 ans et perd son château contre les protestants.  En 1580 à la fin de la septième guerre de religion il est repris par le vicomte de Turennes. A partir de 1591, plusieurs combats et altercations opposent le duc de Montmorency et le baron de Montfa. En 1595, le duc de Ventadour, gendre du duc de Momtmorency, emmène le duc de Montfa et sa femme au château de Vénès pour y être emprisonnés. En 1762, Joseph Constantin de Montfa possède le château, prit le nom de comte de Toulouse-Lautrec. En 1791, les révolutionnaires chassent le comte de Toulouse-Lautrec.","architecture":"Vers 1570, une parti du château est démoli puis reconstruit.\r\n En 1580, le vicomte de Turenne attaque le château et le détruit partiellement. En cette fin du XIXe siècle, le château est pillé, pierres et ornement sont arrachés et vendus.  Au XIXe siècle, Alphonse de Toulouse-Lautrec  affirme que le château est en ruine, les terres rapportent peu et qu'il doit être vendu. Il ne reste que des murs  avec en angles tours rondes et échauguettes en encorbellement.","habitants":"Famille d'Alphonse de Toulouse-Lautrec\r\n        \"","divers":"Vestiges du château de Roquecourte la Montfa à St-Jean de Vals","gps":"","images":["../../jctruffet.com/image/image_81/81_Montfa_1.jpg","../../jctruffet.com/image/image_81/81_Montfa_2.jpg"]},"Consult_chateau_formulaire45c3":{"id":"Consult_chateau_formulaire45c3","dept":"81","canton":"Rabastens","commune":"Montgaillard","nom":"Montgaillard","type":"Château","periode":"XVIII","histoire":"MONTGAILLARD, pas d'information historique.","architecture":"le château de Montgaillard  sûrement de fondation ancienne, château d'origine médiévale, entouré d'un parc, sur la motte féodale dominant le village. La tour ronde est du XIIe siècle et correspond au premier corps de bâtiments sur deux niveaux. La tour carrée date du XIVe siècle, le château a encore connu des extensions aux XVIe et XVIIe siècles. Longtemps délaissé, sa restauration a commencé dans la deuxième partie du XXe siècle.  Apparaît en fait comme un ensemble composite où des bâtiments de communs plus récents et d'ailleurs bien restaurés, viennent gêner la lisibilité de ce qui devait être un joli domaine. On distingue deux parties: d'une part un logis à un seul étage du XVIIIe siècle, flanqué d'une tour carrée dépassant légèrement la toiture, coiffée d'un toit en pavillon, et, à l'extrémité, à la suite d'un corps de bâtiments de communs, un second corps de logis construit dans un curieux appareil mélangeant moellons et appareil de brique, il possède un étage surmonté de fenêtres sous comble, les niveaux sont soulignés par de fins bandeaux de brique. Ce bâtiment est flanqué d'une belle tourelle circulaire et élevée, coiffée d'un toit aigu à pans.  Cette tour faisait office de pigeonnier mais, vu la qualité de cette architecture, il s'agissait d'une noble demeure. Au-dessus de la porte on découvre un claveau portant la date de 1473, utilisé en remploi ou s'il est plus récent que la date qu'il porte, pouvant rappeler la date de fondation du bâtiment primitif.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château de Montgaillard","gps":"","images":["../../jctruffet.com/image/image_81/81_Montgaillard_1.jpg","../../jctruffet.com/image/image_81/81_Montgaillard_2.jpg"]},"Consult_chateau_formulaire7515":{"id":"Consult_chateau_formulaire7515","dept":"81","canton":"Lavaur","commune":"Montgey","nom":"Montgey_Tarn","type":"Forteresse","periode":"XII-XVI","histoire":"Deux châteaux à Montgey celui de Montgey et celui de Lerestang pas d'information historique.                                                       MONTGEY,  le château appartenait au seigneur Jourdain de Roquefort, seigneur de Montgey, de Roquefort et de Durfort, issu d'une importante famille  alliée aux Trencavel vicomtes d'Albi et autres dont la famille avait montré des affinités avec la doctrine cathare. Après le combat, Simon de Montfort prit et détruisit le château et le village, mais le château fut reconstruit par la suite. En 1435 Montgey est vendu à Hugues de la Baylié seigneur de Roumens et ensuite par alliance aux d'Auriol baron d'Esplas et de Salesses et revendut aux Albouy et en 1625 puis revendu au  à Charles de Franc seigneur de Cahuzac capitaine des garde  du corps du cardinal de Richelieu. La seigneurie passe en marquisat et les de Franc  vu l'ampleur de ses domaines et achat devient marquis de Montgey. Passe par alliance  en 1770 à Jeanne-Louise de Franc qui épouse Joseph de Lacoste baron de Belcastel et  la descendance conservera le château jusqu'en 1945 date de la vente à Eliane Lamy et depuis 1971 la famille de Pierre de Bouyssou en sont propriétaire.","architecture":"Les fortifications de Montgey comprennent une première enceinte bastionnée soutenant des terrasses. Le château lui-même est un quadrilatère autour d'une cour centrale. Un des murs est convexe. Du château primitif restent entre les tours de l'ouest, des murs du XIIe siècle, de près de trois mètres d'épaisseur. Construit sur plan bastionné et ceinturé de vastes terrasses, le château est composé de quatre corps de bâtiments disposés autour d'une cour et flanqués de trois tours carrées et d'une tour polygonale. Le château est protégé du côté sud par des tourelles, et présente de nombreuses bouches à feu, pour la plupart de la fin du XVIe siècle. Des aménagements importants ont eu lieu à la Renaissance : ouverture de fenêtres à meneau, portails ornés de pilastres et frontons, cheminée dans la grande salle et une promenade remplace les lieux d'exercice sur les terrasses. Les travaux s'étalent sur les XVIe siècle et XVIIe siècle mais en conservant le style initial.                                                                               Lerestang de plan rectangulaire à deux niveaux et attiques, toit en croupes.","habitants":"Famille des de Franc\r\n        \"","divers":"Château de Montgeyet de Lerestang","gps":"","images":["../../jctruffet.com/image/image_81/81_Montgey_Tarn_1.jpg","../../jctruffet.com/image/image_81/81_Montgey_Tarn_2.jpg","../../jctruffet.com/image/image_81/81_Montgey_Tarn_3.jpg","../../jctruffet.com/image/image_81/81_Montgey_Tarn_4.jpg","../../jctruffet.com/image/image_81/81_Montgey_Tarn_5.jpg","../../jctruffet.com/image/image_81/81_Montgey_Tarn_6.jpg","../../jctruffet.com/image/image_81/81_Montgey_Tarn_7.jpg"]},"Consult_chateau_formulairee115":{"id":"Consult_chateau_formulairee115","dept":"81","canton":"Mazamet","commune":"Pont de Larn","nom":"Montledier","type":"Château","periode":"XII","histoire":"MONTLEDIER, vers le Xe siècle, les seigneurs de la Villette firent construire le château de Montlédier, cité au XIIe siècle comme possession de Simon de Laurac.  En 1562,  le seigneur de La Vilette emprisonne Claude d'Oraison, évêque de Castres. Au moment de la Réforme,  Sous Louis XVI, le château entra dans la famille du Lac de La Clauze qui le vendit en 1885 aux Cormouls Oulès industriels à Mazamet.   En 1885, le site est possession de la famille Cormouls-Oulès.   Au XXIe siècle, hôtel restaurant de charme de Jim Mc Conway.","architecture":"Montlédier, Le château présente au sud ouest deux grosses tours datant du XIIIe siècle. Durant 2 siècles, les fortifications sont améliorées Le rez-de-chaussée qui a conservé un fort beau plafond voûté qui devait servir autrefois de salle de garde. Aujourd'hui, malgré des remaniements et des restaurations, il présente, avec ses bâtiments répartis autour d'une cour, une construction massive dont les pièces sont regroupées et disposées en hauteur à l'abri des tours. En fait, la sévérité du matériau employé et celle, géométrique, des volumes de l'édifice, concourent à donner à Montlédier un air de sévérité que viennent renforcer l'absence d'ouvertures sur l'extérieur et le robuste crénelage de la tour ronde, le plus impressionnant réside peut-être dans la puissante tour carrée aux façades aveugles.  Au pied du château fut établit un pont unique qui traversait la rivière de l'Arn. De part et d'autre du pont, deux moulins s'établirent. Ce lieu de passage favorisa le trafic et bientôt des habitations se construisirent.","habitants":"Famille du Lac de La Clauze\r\n        \"","divers":"Château de Montledier à Pont de Larn","gps":"","images":["../../jctruffet.com/image/image_81/81_Montledier_1.jpg","../../jctruffet.com/image/image_81/81_Montledier_2.jpg","../../jctruffet.com/image/image_81/81_Montledier_3.jpg","../../jctruffet.com/image/image_81/81_Montledier_4.jpg","../../jctruffet.com/image/image_81/81_Montledier_5.jpg","../../jctruffet.com/image/image_81/81_Montledier_6.jpg"]},"Consult_chateau_formulairefa89":{"id":"Consult_chateau_formulairefa89","dept":"81","canton":"Réalmont","commune":"Montredon-Labessonnié","nom":"Montredon-Labessonnié","type":"Château","periode":"XVI-XIX","histoire":"quatre châteaux à Montredon-Labessonnié, celui de Castelfranc du XVIe siècle et celui de Fournials du XIXe siècle, de Bouyrols, de  Jaladié et de la Sigourre (aujourd'hui école).               CASTELFRANC, l'ancien château a appartenu à Guillaume le Nautonnier, géographe du roi Henri IV.  En 1835, le chevalier de Solages le reconstruit en bordure de l'esplanade qui comportait l'ancien château, en faisant de nombreux réemplois de morceaux d'architecture ou de sculpture provenant d'édifices toulousains. La famille de Solages le fit remanier en 1835. et le transmirent par héritage à la famille de Pierre de Bernis.                                                                                       FOURNIALS, fut construit en 1870 par Louis Abel Gaches, descendant d'une très vieille famille protestante de la montagne. Louis Abel avait d'ailleurs parmi ses ancêtres un certain Philippe Gaches, prédicateur au désert qui fut condamné aux galères où il mourut en 1759, et au siècle des Lumières, les Gaches furent fermiers généraux, marins et officiers.                                                                                                       Bouyrols, Jaladié et la Sigourre pas d'information historique.","architecture":"Castelfranc, le château a appartenu au géographe du roi Henri IV, Guillaume de Nautonnier, qui y fit construire un observatoire astronomique, le plus ancien de France. De cette époque ne subsiste que le Belvédère, construit en 1610. C'est une construction comportant un bâtiment rectangulaire (écurie) cantonné d'une tour carrée (observatoire). Une galerie extérieure en bois ceinture le dernier étage sur le principe du hourdage des fortifications médiévales.  Le château lui-même fut pillé et détruit en 1628. Sa reconstruction partielle fut bloquée en 1654. Le château et ses annexes (orangerie, chapelle) sont disposés en L.\r\nFournials, le château se présente comme une construction très simple de style Second Empire, composée d'un corps central de cinq travées, et deux étages sur un rez-de-chaussée surélevé, ce corps central étant flanqué de deux tourelles cylindriques. Par une disposition curieuse, la génoise des toits se prolonge sur le pourtour des tours, mais celles-ci s'élèvent encore au-dessus, coiffées de toitures en poivrière. La façade n'a reçu aucune animation et seul le beau balcon de la fenêtre centrale du premier étage et le perron associé à cette austère demeure un peu de grâce.                                                                                           Bouyrols, corps de logis de plan rectangulaire à deux niveaux sur soubassement, toiture en croupe, flanqué sur une aile un pavillon carré avec terrasse sur le deuxième étage et à l'opposé une tourelle à toit en poivrière et Jaladie de plan carré à deux niveaux avec lucarnes sur toit brisé, flanqué de tours carrés  sur les angles à toit pointu à quatre pans.","habitants":"Famille de Guillaume le Nautonnier\r\n        \r\n        \"","divers":"Château de Castelfranc avec l('observatoire, de Fournials, de Bouyrols de Jaladié et de La Sigourre à Montredon Labessonnié.","gps":"","images":["../../jctruffet.com/image/image_81/81_Montredon_Labessonnie_1.jpg","../../jctruffet.com/image/image_81/81_Montredon_Labessonnie_2.jpg","../../jctruffet.com/image/image_81/81_Montredon_Labessonnie_3.jpg","../../jctruffet.com/image/image_81/81_Montredon_Labessonnie_4.jpg","../../jctruffet.com/image/image_81/81_Montredon_Labessonnie_5.jpg","../../jctruffet.com/image/image_81/81_Montredon_Labessonnie_6.jpg","../../jctruffet.com/image/image_81/81_Montredon_Labessonnie_7.jpg","../../jctruffet.com/image/image_81/81_Montredon_Labessonnie_8.jpg","../../jctruffet.com/image/image_81/81_Montredon_Labessonnie_9.jpg"]},"Consult_chateau_formulaire0a11":{"id":"Consult_chateau_formulaire0a11","dept":"81","canton":"Rabastens","commune":"Montvalen","nom":"Montvalen","type":"Château","periode":"XIX","histoire":"MONTVALEN, était un fief protestant depuis 1581, et où une bataille se tint même au lieu-dit \"Lou-Camp-de-Las-Armos\" en 1624 ! Un siècle plus tard, en 1720, Charles Louis Auguste Fouquet, duc de Gisors, marquis de Belle-Isle, vicomte de Villemur, baron de Penne, de Lézignan et de Castelnau-de-Montmirail, seigneur de Puylaurens et de Bisy, céda les seigneuries de Montvalen et du Born, en faveur du marquis de Tauriac, qui, dès ce moment, nomma les officiers de justice et établit les consuls. La seigneurie, devint un fief de la baronnie de Tauriac, tenu par la maison de Castanet. En 1754, l'héritier, Louis Joseph Eugène de Boyer de Castanet , marquis de Tauriacet de Montvalen, vicomte de Monclar, baron de Roquemaure, seigneur de Castanet, de Lacoste et de Saint-Urcisse, co-seigneur de Bondogoux, dénombra toutes ces terres et consenti, un partage des terres de Montvalen en co-seigneurie de Montvalen, au profit du fils de Jean II, Jean III Frayssines, sieur de Pierrot, des Gasquets et de La Rivière. Un deuxième dénombrement eu lieu en 1784  La transmission du nom \" de Montvalen\" en fut donc irrégulière  Jean VI Frayssines de Montvalen, co-seigneur de Montvalen  l'aîné de sa branche en 1790, dut en effet y renoncer pour lui et sa descendance. Ce fait historique est à l'origine de l'histoire de cette famille, laquelle fut profondément bouleversée.  De Pierre 1er Frayssines de Latour, sieur de Latour, est issue la branche cadette qui s'installa à Montvalen, des laboureurs-bourgeois dont le premier auteur était Guillaume II Frayssines, sieur de La Rivière, un protestant qui y établi sa famille afin d'échapper aux guerres de religions mais aussi et surtout par héritage de la sieurie de Montvalen, donné à la mort de sa mère, Bertrande de Montvalen, vers 1640. Sa lignée est subsistante encore aujourd'hui.","architecture":"Le château de Montvalen du XIX dans un style néo-classique se présente comme un vaste bâtiment quadrangulaire aux allures de grande villa, construite sur un soubassement et comportant un rez-de-chaussée, un étage et  attique. Alors que les fenêtres régulièrement distribuées n'ont reçu aucun décor, l'accent a été mis sur la travée centrale, délimitée par de fins pilastres que l'on retrouve aux angles, créant avec les bandeaux soulignant les étages, une animation néo-classique. Le rez-de-chaussée a reçu une porte en demi cintre dont l'arc utilise un appareil de pierre blonde créant un effet de polychromie avec la brique dont est entièrement bâtie la maison. De même, au premier étage, l'on trouve une porte fenêtre plus étroite, ouvrant sur un balcon. Au niveau de l'attique, les fenêtres carrées des travées latérales sont remplacées par une ouverture en plein cintre. L'accès à la terrasse précédant cet édifice se fait par un escalier à volées divergentes et le plan subtil de l'escalier comme les arbres encadrant la façade, vient tempérer ce que cette très simple architecture pourrait avoir de rébarbatif.","habitants":"Jean VI Frayssines de Montvalen\r\n        \"","divers":"Le château de Montvalen","gps":"","images":["../../jctruffet.com/image/image_81/81_Montvalen_1.jpg","../../jctruffet.com/image/image_81/81_Montvalen_2.jpg"]},"Consult_chateau_formulaire15ef":{"id":"Consult_chateau_formulaire15ef","dept":"81","canton":"Sémalens","commune":"Carbes","nom":"Montvert","type":"Château","periode":"XIV","histoire":"MONTVERT, l'occupation du site est fort ancienne si l'on en croit le puits funéraire gallo romain découvert en 1968 dans un champ bordant le château. Le château primitif date du XIIIe siècle, et en 1592, il appartenait au chevalier de La Mote. Montvert était au XVIIe siècle à la famille Dulac de Montvert, qui occupa une place importante dans l'histoire locale. Jean Melchior Marie, comte Dulac de Montvert, fut à deux reprises maire de Carbes. Ses filles vendirent une partie du domaine en 1874.","architecture":"Montvert, la bâtisse féodale du XIIIe siècle était à l'origine flanquée de quatre tours de prés de 20 m de haut, l'ensemble formant un quadrilatère entourant une cour carrée contenant un puits creusé dans le roc. Placé sur une éminence au bout d'un long chemin qui lui donne un aspect pittoresque, restauré au XVIIIe siècle par les Dulac, il se présente de nos jours comme un sobre bâtiment en U autour d'une cour. Il n'a conservé que deux tours des quatre primitives, une ronde au sud et une carrée à l'ouest.","habitants":"Famille Dulac de Montvert,\r\n        \"","divers":"Le château de Montvert","gps":"","images":["../../jctruffet.com/image/image_81/81_Montvert_1.jpg"]},"Consult_chateau_formulaireb1df":{"id":"Consult_chateau_formulaireb1df","dept":"81","canton":"Carmaux","commune":"Moularés","nom":"Moularés","type":"Château","periode":"XVI-XIX","histoire":"quatre châteaux à Moularés celui de Théron, de Vergnet du XIXe siècle  de Poutac  du XVIe siècle  et de Pouzes-Andouques.                         THERON , POUTAC, VERGNET  pas d'information historique pour ces trois châteaux. A quelques kilomètres au sud le château de Pouzes et d'Andouque à Grespin                                                      POUZES, le domaine était en 1875 la propriété de la mère du peintre de Toulouse Lautrec.                                                           ANDOUQUE, la commune tire son nom d'un ancien château situé sur l'actuelle commune de Crespin  d'Andouque, qui perd la partie de son territoire située au nord du Cérou, par la loi du 17 juillet. Le château d'Andouque est un donjon qui remonte au XIe siècle . Nul ne sait s'il a reçu d'autres modifications au cours du temps.","architecture":"Poutac,  le beau château Poutac à Moularés a l'avantage de présenter une très belle architecture antérieure au XVIe siècle qui n'a pratiquement jamais été remaniée. Particulièrement empreint de charme sous la patine que lui ont conféré les siècles, ce château, au centre d'un vaste parc, se présente sous la forme d'un beau logis quadrangulaire flanqué de hautes tours circulaires coiffées de toits en poivrière.                                                                         Vergnet, édifié au XIXe siècle, est un vaste bâtiment quadrangulaire aux allures de grande villa néo-classique, bâtie sur un soubassement et comportant un rez-de-chaussée, un étage et un attique. Les fenêtres régulièrement distribuées ont reçu un encadrement de brique. L'accent a été mis sur la mise en valeur des 3 travées centrales, séparées des travées latérales par de fins bossages en table que l'on retrouve aux angles, ces derniers créant, avec les bandeaux soulignant les étages, une animation néo-classique. Le rez-de-chaussée possède une porte à arc en segment de cercle toute simple. L'accès à la terrasse précédant cette demeure se fait par un bel escalier à volées divergentes puis convergentes et le plan subtil de ce bel escalier vient tempérer ce que cette architecture pourrait avoir de rébarbatif.                            Théron de plan rectangulaire à deux niveaux toiture d'ardoises en croupes flanqué de tours rondes sur angles à toitures en poivrières.                                                              Pouzes,  corps de logis central à deux niveaux et lucarnes sur toits  à deux pans flanqué de chaque côté sur façade de deux tours carrées à toit pointu à quatre pans.                                      Andouque, est un donjon qui remonte au XIe siècle . Nul ne sait s'il a reçu d'autres modifications au cours du temps. il ne reste qu'une tour, dans une boucle de l'Andouquette, au creux de la vallée, au Nord de Ligots. Le château se trouve sur la commune de Crespin.","habitants":"Seigneurs locaux Famille de Toulouse de Lautrec\r\n        \r\n        \"","divers":"quatre châteaux à Moularés celui de Théron, de Vergnet du XIXe siècle  de Poutac  du XVIe siècle  et de Pouzes-Andouques","gps":"","images":["../../jctruffet.com/image/image_81/81_Moulares_1.jpg","../../jctruffet.com/image/image_81/81_Moulares_2.jpg","../../jctruffet.com/image/image_81/81_Moulares_3.jpg","../../jctruffet.com/image/image_81/81_Moulares_4.jpg","../../jctruffet.com/image/image_81/81_Moulares_5.jpg","../../jctruffet.com/image/image_81/81_Moulares_6.jpg"]},"Consult_chateau_formulairecd18":{"id":"Consult_chateau_formulairecd18","dept":"81","canton":"Carmaux","commune":"Mouzieys-Panens","nom":"Mouzieys","type":"Château","periode":"XIV","histoire":"MOUZIEYS, le château du XV-XIXe siècle aujourd'hui hôtel de ville,  au XVe siècle appartenait au comte de Toulouse Raymond VI, puis à Guillaume de Cadolhe qui le donna à sa fille Laure, épouse de Sicard d'Alaman, puis il passa à Alphonse de Poitiers, comte de Toulouse. Le château devient étroit entre le milieu du Xve siècle et le début du XVIIe siècle,  Malgré le silence des sources, il est probable que la seigneurie de Mouzieys se soit constituée à partir d'une fortification rapidement reprise en main par le pouvoir comtal puis royal. Le roi céda ensuite la seigneurie à la famille de Penne de Cestayrols. Pons de Penne la vendit le 29 avril 1502 au chapitre de Sainte-Cécile d'Albi. En 1786, le seigneur de Mouzieys était Jacques-Victor de Genton, baron de Villefranche.","architecture":"Mouzieys,   château, construit au XIIIe siècle et remanié au XVIIIe siècle. Édifié à l'aplomb d'une butte, il est accessible par une rampe menant autrefois à une barbacane, qui laisse imaginer ce que devait être l'assaut d'une telle forteresse. Il présente une imposante façade dont la partie inférieure, légèrement talutée, conserve un grand arc muré. A l'angle droit de la façade, une tour ronde engagée dont la toiture a été arasée, mais conserve une fenêtre à croisée de meneau, hélas murée. Mouzieys présente encore beaucoup de noblesse, et surtout de force, dans son gros appareil à la fois soigneusement disposé et rustique. Si les structures initiales ont disparu, certaines maçonneries servant de murs de soutènement se rattachent à une construction antérieure au milieu du Xve siècle qui a été largement remaniée au XVIIe siècle. La base du mur sud-ouest du corps de logis, correspondant au niveau de soubassement de l'édifice actuel, révèle un appareil régulier formé de petits moellons bien équarris qui pourrait dater du XIIIe ou du XIVe siècle. On peut donc supposer que la formation ou le développement de l'habitat groupé est lié à la présence de ce pôle castral, même s'il n'a jamais été englobé à l'intérieur d'une enceinte collective pouvant justifier l'appellation de \"castrum\".","habitants":"Famille de   Jacques-Victor de Genton,\r\n        \"","divers":"Le château de Mouzieys Panens","gps":"","images":["../../jctruffet.com/image/image_81/81_Mouzieys_1.jpg","../../jctruffet.com/image/image_81/81_Mouzieys_2.jpg","../../jctruffet.com/image/image_81/81_Mouzieys_3.jpg","../../jctruffet.com/image/image_81/81_Mouzieys_4.jpg","../../jctruffet.com/image/image_81/81_Mouzieys_5.jpg","../../jctruffet.com/image/image_81/81_Mouzieys_6.jpg","../../jctruffet.com/image/image_81/81_Mouzieys_7.jpg"]},"Consult_chateau_formulaire3eb9":{"id":"Consult_chateau_formulaire3eb9","dept":"81","canton":"Lacaune","commune":"Murat-sur-Vébres","nom":"Murat_Vébres","type":"Vestiges","periode":"XV","histoire":"Deux vestiges de châteaux à Murat sur Vébres celui de Canac et celui de Boissezon dit Masviel                                                   MURAT-CANAC,  date de construction  du XVe siècle approximative,  Il daterait  de 1588, une époque fortement troublée dans la montagne tarnaise par les guerres de religion. Guillaume de Génibrouse avait donc préféré déposer ses dernières volontés ailleurs, chez son cousin du château de Grandval aujourd'hui noyé dans le barrage de Rassize, près de Teillet.  S'il reste encore beaucoup d'inconnues sur l'histoire de ces murs, une donnée paraît aujourd'hui certaine : extirpés de la végétation il y a moins de dix ans, ces vestiges sont désormais promis à un avenir à long terme.                  BOISSEZON avant la Révolution, la communauté dhabitants portait le nom de Boissezon de Masviel, dans la sénéchaussée de Castres. Aux de lEstendard succèdent au début du XVe siècle, une branche cadette  de Peyrusse-le-Roc et de La Caze (Rouergue), un lignage qui avec leurs biens de Lombers sont des mieux dotés dans le comté de Castres. Ils adhéreront très tôt à la religion réformée et participeront  aux guerres de religion. Antoine après la prise de Castres en sera lun des gouverneurs. Son fils Pierre, participera à nombre de combats dans le Castrais ou sur des champs de bataille plus éloignés. Lieutenant du comte de Montgomery il participera  à la reddition du fort de Nages. Tué lors dun siège, la seigneurie de Boissezon revient à sa sur Aldonce qui avait épousé en 1575 Guillaume de Génibrouse seigneur de Saint-Amans. Le premier Génibrouse seigneur de Boissezon et Murat décède en 1593 dans son château de Canac.","architecture":"vestiges des deux châteaux de Murat-Canacet de  Boissezon, était un exemple rare en Midi-Pyrénées d'une demeure d'agrément Renaissance sans modification ultérieure, ou  résidèrent du temps d'Henri IV les seigneurs de la communauté de Boissezon de Masviel, aujourd'hui Murat-sur-Vèbre.\r\nDominant le hameau de Canac d'une centaine de mètres, le site préservé offre un large panorama sur la haute vallée du Dourdou, sur les anciens chemins retrouvés, permet d'atteindre les vestiges.","habitants":"Guillaume de Génibrouse\r\n        \r\n        \"","divers":"Deux vestiges de châteaux à Murat sur Vébres celui de Canac et celui de Boissezon dit Masviel","gps":"","images":["../../jctruffet.com/image/image_81/81_Murat_Vebres_1.jpg","../../jctruffet.com/image/image_81/81_Murat_Vebres_2.jpg","../../jctruffet.com/image/image_81/81_Murat_Vebres_3.jpg","../../jctruffet.com/image/image_81/81_Murat_Vebres_4.jpg","../../jctruffet.com/image/image_81/81_Murat_Vebres_5.jpg","../../jctruffet.com/image/image_81/81_Murat_Vebres_6.jpg"]},"Consult_chateau_formulaire78bd":{"id":"Consult_chateau_formulaire78bd","dept":"81","canton":"Lacaune","commune":"Barre","nom":"Muratel_Gos","type":"Château","periode":"XVI","histoire":"deux châteaux à Barre celui de Muratel du XIII et XXe siècle et celui de Gos devenu couvent.                     MURATEL, la plus ancienne mention de Muratel est contenue dans une charte du cartulaire de l'abbaye de Sylvanès, datée de l'an 1155, Muratel appartenait à Arnaud du Pont. En 1557, il était à Louis de Cabanes qui le céda avec le droit de haute, moyenne et basse justice à la famille Barrau qui devaient le garder durant plus de trois siècles, devenant par là les Barrau de Muratel. Au cours du XIXe siècle le château fut vendu par les Barrau pour passer par la suite entre les mains de diverses familles. Entre 1925 et 1930, il fut à nouveau vendu et morcelé entre divers propriétaires de Barre qui se partagèrent les diverses parties de ce domaine.","architecture":"Muratel, même si le château ne dispose pas de dispositifs de défenses élaborés, son nom dans lequel on retrouve la racine Murat, souligne la présence fort ancienne de hauts murs. Il se présente comme une grande bâtisse carrée dont les murs épais de plus d'un mètre lui donnent l'aspect d'une grande demeure fortifiée. A la Renaissance, ces murs ont été percés de belles fenêtres, mais celles du rez-de-chaussée, hautes et étroites, ont été encore conçues dans une optique défensive, le logis est cantonné de poivrières en surplomb arasées au niveau de la toiture. .       GOS, quadrangulaire à deux niveaux et attiques flanqués de pavillons carrés en angles, l'ensemble à toits plats.","habitants":"Famille Barrau de Muratel\r\n        \r\n        \"","divers":"Château de Gos et de Muratel  à Barre.","gps":"","images":["../../jctruffet.com/image/image_81/81_Muratel_Gos_1.jpg","../../jctruffet.com/image/image_81/81_Muratel_Gos_2.jpg","../../jctruffet.com/image/image_81/81_Muratel_Gos_3.jpg"]},"Consult_chateau_formulairef469":{"id":"Consult_chateau_formulairef469","dept":"81","canton":"Lacaune","commune":"Nages","nom":"Nages","type":"Château","periode":"XIV","histoire":"NAGES, le château a été construit pendant la guerre de Cent Ans pour se protéger des attaques du Prince Noir Edward Plantagenet dit Édouard de Woodstock Brackembury dans les années 1356. Le comte de Montgomery l'occupa durant les guerres de religion. En 1586,  a été investi par les troupes protestantes commandées par le duc de Montgomery. Après quelques coups de canon, la garnison se rendait et fut exécutée au lieu-dit Martinoles. Léglise paroissiale Saint-Martin a été détruite lors de ces événements. À la suite de quoi, léglise castrale Saint-Victor a été agrandie et a fait fonction déglise paroissiale. Une des tours du château a été transformée en clocher. Pendant la Révolution, le comte de Thézan na pas émigré. Ses biens nont pas été saisis. Le château, les fermes de Roucan et Trédos sont devenus propriétés de sa fille, la princesse de Mérode. La fille de cette dernière, duchesse de Lévis Mirepoix, lui a succédé. Les Lévis Mirepoix ont vendu leurs propriétés de Nages après la Première Guerre mondiale. Depuis quelques années, une restauration des vestiges du château est en cours, réalisée par des propriétaires privés et le centre de recherche du patrimoine de Rieumontagné qui a acquis deux tours.","architecture":"Nages,  la porte dentrée du château est depuis lété 2006 surmontée dune copie du blason dun des comtes de Thézan-Poujol. Donjon carré à mâchicoulis et toit à quatre pans , après une totale et parfaite réfection extérieure, laménagement intérieur dune salle du rez-de-chaussée sest dotée dune splendide cheminée. Cette cheminée a été récupérée dans les ruines dun château des environs de Lacaune.","habitants":"Comtes de Thézan\r\n        \"","divers":"Château de Nages et sa tour","gps":"","images":["../../jctruffet.com/image/image_81/81_Nages_1.jpg","../../jctruffet.com/image/image_81/81_Nages_2.jpg","../../jctruffet.com/image/image_81/81_Nages_3.jpg","../../jctruffet.com/image/image_81/81_Nages_4.jpg","../../jctruffet.com/image/image_81/81_Nages_5.jpg","../../jctruffet.com/image/image_81/81_Nages_6.jpg"]},"Consult_chateau_formulaire1b85":{"id":"Consult_chateau_formulaire1b85","dept":"81","canton":"Castres","commune":"Navés","nom":"Navés","type":"Château","periode":"XIV-XIX","histoire":"Cinq châteaux à Navès dont celui de Navès du XVIIe siècle, de Montespieu (voir artcle),  Lostange du XVI-XVIIIe siècle, Donjon de la Tour du XIXe siècle, manoir de Puech_Bertou du XIV-XXe siècles et de Vaudricourt. Pas d'information historique.                      NAVES, situé sur les bords du Thoré. Depuis le XVIII siècle il est la propriété de la famille Lacger. De nombreux membres de cette famille jouèrent un rôle important dans ladministration de Navès et de la région. En 1275 trois frères, Tourenne, bourgeois de Castres, achètent la seigneurie de Navès. Laîné sinstalle au sud et cest lui qui fait construire le château Tourenne. Les deux autres prirent le nord de la seigneurie avec le château de Navès et Barginac. Démantelé à la fin des guerres de religion le château de Tourenne a été transformé en exploitation agricole.                                               TOUR (la) à NAVES, dit donjon de la tour Léonard au XIIIe siècle, le site apparaît parmi les possessions de l'abbaye de Castres et y demeure sans qu'intervienne un partage jusqu'en 1324.                                                                                                     LOSTANGE, construit en 1586 il a appartenu à la famille Lostange-Bécher puis à la famille De Bonne. Il a été fortement remanié au XVIII et XX siècle. Sy trouve actuellement lAPAJH avec lInstitut Médico-Educatif.   Aujourd'hui pour colonie de vacances.                                                                                                       PUECH-BERTOU,  au XVII et XVIII siècle il était la résidence de la famille De Falc magistrats et gens de guerre, à cette époque le fief comprenait également Blima. Il fut racheté au XIX siècle par le petit séminaire de Castres qui le revendit en 1840 à la famille Dougados-Calhire.","architecture":"Navès . Cétait un fort de première importance. Au Moyen Age son rôle stratégique était indéniable car il contrôlait le franchissement, autant par le pont que par les gués, du Thoré. Le château actuel daterait du XVII siècle, Des bâtiments de la « Métairie de Navès » située tout proche seraient ceux de léglise de lancien prieuré bénédictin datant également de cette période.   Donjon de la Tour Léonard.\r\nLA TOUR, les restes dune dizaine de mètres de haut dune tour imposante avec des murs de 1 m 50 dépaisseur. Sa construction remonte au XI ou XII siècle. Elle aurait servi de tour à signaux depuis les guerres de religion et plus tard avec sa plate-forme à plus de 15 mètres de hauteur elle aurait fait partie du système de défense du château de La TOUR. Au premier étage, côté sud, une fenêtre en croisée laisserait à penser, quà une certaine époque, elle ait pu servir dhabitation.   La construction de cette Tour s'inscrit dans le mouvement de fortification qu'à connu le Pays Castrais à la suite de l'expédition du prince de Galles, et se poursuivant durant la guerre de Cent Ans. Le système de défense présente des meurtrières, ne possédant pas de chambre de tir, et permettant une efficace défense par tir croisé. La Tour aurait donc bien été réaménagée aux alentours de 1600.                                 Puech-Bertou, cette ferme est un ancien manoir dont lépaisseur des murailles laisse supposer quil a pu jouer dans le passé un rôle défensif, possède une grosse circulaire tour abritant un bel escalier en vis.                                                                                     Vaudricourt, corps de logis en équerre à deux niveaux avec pavillon en angles et lucarnes sur toit brisé e ardoise, tour ronde à toit en poivrières sur l'arrière du Bâtiment.","habitants":"Famille Lacger                                                                                   Famille Dougados-Calhire\r\n        \r\n        \"","divers":"Château de Navés, de Lostange, de la Tour et de Puech Berthou.","gps":"","images":["../../jctruffet.com/image/image_81/81_Naves_1.jpg","../../jctruffet.com/image/image_81/81_Naves_2.jpg","../../jctruffet.com/image/image_81/81_Naves_3.jpg"]},"Consult_chateau_formulairea107":{"id":"Consult_chateau_formulairea107","dept":"81","canton":"Mazamet","commune":"Noailhac","nom":"Noailhac","type":"Château","periode":"XVI_XIX","histoire":"Quatre châteaux à Noailhac celui de Roqueperlic chambre d'hôte,  de la Beloterie du XIXe siècle (voir article), de Brénas, de Poussarié.                                                                                             NOAILHAC, au Moyen-Age, un chemin de Saint-Jacques de Compostelle traverse la paroisse de Notre-Dame sur la commune de Boissezon, qui porte le nom de léglise et du hameau qui sy trouvent. La famille de Boissézon est alors propriétaire de la plupart des châteaux et domaines afférents de la paroisse, tels La Beloterie, La Gineste, Roqueperlic et La Poussarié.  Un premier projet de constitution de commune, élaboré de  1887 à 1902, reçoit lavis défavorable du conseil dEtat. En 1927, passant outre cet avis, le gouvernement présente le projet de loi. Le 14 mars 1928, Noailhac est érigée en commune aux dépens de Boissezon, passant alors du canton de Mazamet à celui de Labruguière. \r\nROQUEPERLIC, chambres d'hôtes les propriétaires Ellen et Matthy\r\n BRENAS et POUSSARIE, pas d'information historique.","architecture":"Brénas corps de logis en équerre à deux niveaux avec sur la partie sud un donjon carré toit à quatre pans avec fronton triangulaire.                                                                                                Poussarié de plan quadrangulaire  à deux niveaux  toit en croupe et lucarnes sur corps de logis central sur façades d'entrée avec pavillon saillant et balcon sur porte d'entrée , deux tours carrées à toit pointu à l'impérial. Escaliers  à double révolution donnant accès au rez-de-chaussée surélevé.                                              Roqueperlic, manoir à deux niveaux  toit à deux pans avec lucarnes en chien assis et tour octogonale à toit en poivrières. Doté d'un jardin et d'une terrasse.","habitants":"Famille de Boisséson\r\n        \"","divers":"Château de Brenas;,  de la Pousariè et de Roqueperlic à Noailhac.","gps":"","images":["../../jctruffet.com/image/image_81/81_Noailhac_1.jpg","../../jctruffet.com/image/image_81/81_Noailhac_2.jpg","../../jctruffet.com/image/image_81/81_Noailhac_3.jpg","../../jctruffet.com/image/image_81/81_Noailhac_4.jpg","../../jctruffet.com/image/image_81/81_Noailhac_5.jpg"]},"Consult_chateau_formulairea973":{"id":"Consult_chateau_formulairea973","dept":"81","canton":"Puylaurens","commune":"Lempaut","nom":"Padiès","type":"Château","periode":"XVII","histoire":"PADIES,   les propriétaires enrichis par la culture et le commerce du pastel en font une demeure confortable. Pendant les guerres de religion qui font rage dans le Languedoc, le seigneur catholique est dépossédé de son fief mis à sac en 1577. Il ne le récupère qu'en 1612. Des travaux importants sont effectués qui le rendent plus confortable au détriment de l'aspect défensif, suppression de la seconde enceinte à bastions rectangulaires. Il quitte la famille Padiès au début du XIXe siècle pour la famille Fabre et change plusieurs fois de propriétaires dont Joseph de Villèle, avant d'être vendu dans les années 1830 à la famille Piel, aujourd'hui à la famille Fabre.","architecture":"Le château de Padies  est construit en brique foraine pour les murs et pierre pour les encadrement et décoration. Il se présente sous la forme d'un rectangle doté de deux tours rondes aux angles diagonaux. Les ouvertures sont des fenêtres à meneau et la porte est de style Renaissance : pilastres corinthiens, et fronton ouvragé qui a porté les armes de la famille Padiès.\r\nLarchitecture unique du château le fait se confondre avec un hôtel toulousain particulier, mais transposé à la campagne.  Détruit partiellement il fut reconstruit  en 1620 à la Renaissance et présente aujourdhui une très belle façade superbement restaurée. Il a donc évolué au fil des siècles tout en conservant un aspect massif avec ses imposantes tours de défenses.\r\nLe château de Padiès est surtout connu pour sa façade Renaissance considérée comme lune des plus belles du Tarn et même de la région.  À cette époque, les toitures à forte pente et tours coniques ont été remplacées par une toiture plate. Les propriétaires ont entamé une restauration au tournant du troisième millénaire.   Le château est issu d'un petit château fort médiéval typique dans la région des nombreux points de défense établis durant la guerre de Cent Ans en zone frontalière entre la couronne anglaise (Rouergue) et la couronne française (Albigeois).","habitants":"Famille Padiès\r\n        \r\n        \"","divers":"Château de Padiès à Lempaut.","gps":"","images":["../../jctruffet.com/image/image_81/81_Padies_1.jpg","../../jctruffet.com/image/image_81/81_Padies_2.jpg","../../jctruffet.com/image/image_81/81_Padies_3.jpg"]},"Consult_chateau_formulaireacd7":{"id":"Consult_chateau_formulaireacd7","dept":"81","canton":"Saix","commune":"Palleville","nom":"Palleville_Tarn","type":"Château","periode":"XVII","histoire":"plusieurs châteaux à Palleville ;  dont celui de Palleville du XVIIe siècle, de Lastouzeilles du XVe siècle (voir article).                            PALLEVILLE,  Renaud de Bary et Philippe d'Adhémar  Palleville a été créé par Charte de Franchise par Aymeric de Roquefort en 1252, sous le règne de Louis IX, soit avant Revel fondé en 1342 par Philippe VI de Valois. En 1606, sous le règne d'Henri IV , Jeanne de Roquefort, seigneuresse de Vesins, en Garrevaques et autres lieux a vendu à Jean de Terson la place et seigneurie de Palleville. Cette famille était protestante et originaire de Puylaurens. Cet achat portait sur le premier château de Palleville qualifié de « démoly » sur le lieu de Saint- Martin où se trouvait aussi la première église de Palleville. Les archives ayant été brûlées à la Révolution, il y a lieu de penser que le château actuel a été bâti à cette époque ou au début du règne de Louis XIII. Ce château était un fort, percé de meurtrières au rez-de-chaussée, le logis du seigneur à l'étage. Il est à penser que les terres étaient importantes dont la Landelle et la métairie de Sarda. Après la Révolution, le château a sans doute été laissé à l'abandon. Vers les années 1880, il a été restauré, perdant tout cachet d'ancienneté, par Isidore de Terson de Palleville, qui vivait à Revel, là ou se trouve actuellement l'école de la Providence.","architecture":"Palleville, avec son corps de logis central flanqué de tours carrées, Palleville adopte la disposition de nombre de châteaux du Tarn bâtis à la charnière des XVIIe et XVIIIe siècles. Mais il suffit d'un examen superficiel pour se rendre compte des modifications apportées à la fin du XIXe siècle, telles que le rhabillage du haut des tours ou la présence d'un toit à deux pentes sur le logis, remplaçant certainement la toiture antérieure à quatre pentes. La distribution des fenêtres est tout à fait classique, mais ces dernières ont dû elles aussi voir leurs encadrements repris à l'époque moderne. En dehors du plan classique, l'élément intéressant de ce château réside dans la travée centrale en légère saillie, composée au rez-de-chaussée d'une porte classique à bossages surmontée d'une large corniche, et au niveau de la toiture d'une belle lucarne flanquée d'élégantes consoles. A part les murs dont l'épaisseur peut atteindre 1 m 10, il ne reste pratiquement rien de l'ancien fort, qualifié à sa construction de « fort novel ». On peut encore voir une partie des caves voûtées et une partie des anciennes douves. Les faux créneaux actuels sont inspirés des anciens, selon une évocation sur toile peinte qui se trouve dans un château voisin.","habitants":"Famille d' Isidore de Terson de Palleville\r\n        \"","divers":"Château de Palleville, de Grandhels, de la Mothe et de Dournes","gps":"","images":["../../jctruffet.com/image/image_81/81_Palleville_Tarn_1.jpg","../../jctruffet.com/image/image_81/81_Palleville_Tarn_2.jpg","../../jctruffet.com/image/image_81/81_Palleville_Tarn_3.jpg","../../jctruffet.com/image/image_81/81_Palleville_Tarn_4.jpg"]},"Consult_chateau_formulairea2fa":{"id":"Consult_chateau_formulairea2fa","dept":"81","canton":"Réalmont","commune":"Paulinet","nom":"Paulin","type":"Château","periode":"XIII-XVIII","histoire":"PAULIN, Juché sur son nid daigle le château veille sur la seigneurie de Paulin, lune des plus anciennes et des plus importantes du Languedoc. Au XIe siècle, le fief de Paulin dépend du Vicomte de Lautrec. Au XIIIe siècle, Guillaume de Paulin prend parti pour lhérésie des Albigeois. Ses biens sont confisqués et attribués aux Lautrec qui prennent en 1225 le titre de barons de Paulin. En 1288, la baronnie de Paulin possède 32 seigneurs vassaux et sétend de Lafenasse à la vallée du Tarn et aux sources du Dadou. En 1327, Paulin passe entre les mains des Rabastens et devient une vicomté. A partir de 1337, la guerre de cent ans amène des mercenaires Anglais mettant à sac la vicomté. En 1389, Guillaume de Rabastens, vicomte de Paulin, sallie au comte de Foix, pour résister au roi de France. Le vicomte de Paulin, marquis de Rabastens est tué à Rasisse  par le baron Règnes. Après la mort du dernier marquis de Rabastens, vicomte de Paulin, en 1606, le château et la vicomté de Paulin passèrent par héritage à la famille Carrion de Nisas. Sa veuve, Madeleine de Vignolles, qui a hérité de la demeure, se remarie en 1626 avec Charles de Latour-Gouvernet. Des contestations de successions font quen 1682 le château de Paulin était complètement ruiné, au XXe siècle, il est la propriété des familles Gillet et Belaut jusquen 1979, Dumoussaud et depuis 1986 à M. James Buchanan à qui lon doit la restauration intégrale du site.","architecture":"Paulin, siège principal d'une des plus importantes seigneuries du Languedoc ; grande construction fortifiée, remontant au Xe siècle. ce château dominant toutes les hauteurs qui l'environnent, bâti sur un rocher et en partie adossé au roc lui-même, qui l'abrite au couchant et lui sert de bouclier, il a ses murs perpendiculaires au rocher, lui-même à la rivière d'0ulas, sur les bords de laquelle il s'élève à plus de 100 mètres de hauteur. Le fort, abordable seulement d'un côté, était défendu par des rochers servant d'avant-garde et favorisant la première résistance. Sur les autres côtés, le rocher qui lui sert d'assiette accompagne ses murs jusqu'à la toiture. Les pans de muraille à découvert sont crénelés ; restes considérables ; deux tours en parties ruinées. A l'intérieur, salle de grande dimension , cuisine creusée dans le roc, grand escalier en coquille et en pierre, fenêtres cruciformes en pierre de taille élégamment sculptée. Sur une des cheminées, on voit encore sculpté un lion (les Rabastens, portaient un lion dans leurs armes).\r\nAu-dessous du château, prison taillée dans le roc, éclairée par une simple lucarne, où l'on arrive par un sentier obscur et étroit, descendant à pic, dont les abords inspirent un véritable sentiment d'effroi.","habitants":"Familles Charles de Latour de Gouvernet.\r\n        \"","divers":"Château de Paulin à Paulinet","gps":"","images":["../../jctruffet.com/image/image_81/81_Paulin_1.jpg","../../jctruffet.com/image/image_81/81_Paulin_2.jpg","../../jctruffet.com/image/image_81/81_Paulin_3.jpg","../../jctruffet.com/image/image_81/81_Paulin_4.jpg","../../jctruffet.com/image/image_81/81_Paulin_5.jpg"]},"Consult_chateau_formulaire78fb":{"id":"Consult_chateau_formulaire78fb","dept":"81","canton":"Carmaux","commune":"Penne","nom":"Penne","type":"Vestiges château fort","periode":"XI","histoire":"A Penne le châteaufort  de Penne et le manoir de Granier (voir article ).                                                                                               PENNE, en 1109, Penne est érigé en fief par le vicomte d'Albi. Mais les premiers seigneurs étaient les vassaux des comtes de Béziers puis comte de Toulouse. Vers 1140, les Templiers ont des biens dans la châtellenie de Penne, mais il est sûr que les seigneurs le possédant étaient liés au Temple. Le castrum est conquis, vers 1176, par les comtes de Toulouse sur les Trencavel. En 1208, Simon de Montfort est chargé d'éradiquer l'hérésie cathare.
