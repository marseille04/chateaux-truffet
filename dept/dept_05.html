const FULL={"Consult_chateau_formulaireba15":{"id":"Consult_chateau_formulaireba15","dept":"05","canton":"St-Bonnet","commune":"Ancelle","nom":"Ancelle","type":"Vestiges","periode":"XIII","histoire":"ANCELLE: au VIIIe siècle fief des seigneurs des Abbon, puis passa sous l'autorité de l'abbaye de la Novalèse en 739, au XIe siècle le pays est conquit  par le comte de Provence  qui confia la seigneurie aux Alleaume de Faudon,  dont les descendants s'installèrent autour de la tour Saint-Philippe à 1700 mètres d'altitude, le village de Faudon fut abandonné au XIIIe au profit d'Ancelle  et au XVe siècle les seigneurs de l'époque les Hugues vendirent aux Rambeau  marquis de Furmeyer qui vendit la Bâtie Saint-Romain au seigneur d'Avançon, acheté en 1442 par Philibert de Betiaux pour investir dans le château d'Ancelle qu'il fit construire, et où fut né Antoine Rambaud de Furmeyer en 1521 ( Antoine de Rambaud était de tout les affrontements qui ensanglantèrent le Dauphiné, fut gouverneur de la Montagne lieutenant général fut assassiné à Gap en 1565).                                   EN 1600 Jean Antoine d'Yses fut seigneur d'Ancelle jusqu'à la Révolution. Aujourd'hui le château a disparu mais le village a gardé le nom de Château d'Ancelle bien que ce dernier fut déplacé.                                Le Marquis d'Hugues fut le dernier seigneur d'Ancelle.","architecture":"Ancelle; vestiges des murailles  du château des Hugues du XIVe siècle, château des Orcières appelé Provencal et Lombard, ruines du château au vieux village de Taudon.","habitants":"Marquis d'Hugues\"","divers":"Vestiges féodals","gps":"","images":["../../jctruffet.com/image/image_05/05_Ancelle_1.jpg","../../jctruffet.com/image/image_05/05_Ancelle_2.jpg","../../jctruffet.com/image/image_05/05_Ancelle_3.jpg","../../jctruffet.com/image/image_05/05_Ancelle_4.jpg","../../jctruffet.com/image/image_05/05_Ancelle_5.jpg"]},"Consult_chateau_formulaire4d58":{"id":"Consult_chateau_formulaire4d58","dept":"05","canton":"Briançon","commune":"L`Argentière-la-Bessée","nom":"Argentiere","type":"Vestiges","periode":"XIV","histoire":"ARGENTIERE; au XIIe siècle fondé par les seigneur d'Oulx, puis passa aux Rame.   En 1155 le Dauphin se fit concéder par l'empereur Frédéric Ier de Barberousse les mines d'Argent  et c'est là que furent prit, à partir du XIe siècle les limites du Briançonnais et de l'Embrunais à l'époque des comtes de Forcalquier Guillaume II qui  en 1202 confié au Dauphin Guigue André en gage de mariage du dauphin et de la petite fille du comte. Le château fut habité par un châtelain et un autre château fut édifié dans la vallée avec donjon appelé château Saint-Jean. Au XIVe siècle la famille Auruce fit bâtir le troisième château de l'Argentière auprès de la chapelle St-Jean. Le château de Rame fut acheté par la communauté dont les habitants s'empressèrent de le démolir et se partagèrent les terrains, il ne reste que la tour d'angle. Au XIVe siècle une muraille appelé le\" mur du Barry\" fut construite  de trois cents mètres de long sur un mètre cinquante de haut avec trois tours crénelées par la milice des Escarton du Briançonnais  et en rive gauche un autre remparts de cinq cent mètres de long aujourd'hui ruiné.","architecture":"Argentière; vestige du Château  encore visible, ce château dit seigneurial était entourait d'une enceinte flanqué de plusieurs tours rondes, l'ensemble détruit au XVIIe siècle une maison carrée à été construite à la place  du mur du Barry.","habitants":"comtes de Forcalquier                Famille Auruce\"","divers":"Vestiges du château Saint-Jean et du mur du Barry","gps":"","images":["../../jctruffet.com/image/image_05/05_Argentiere_1.jpg","../../jctruffet.com/image/image_05/05_Argentiere_2.jpg","../../jctruffet.com/image/image_05/05_Argentiere_3.jpg","../../jctruffet.com/image/image_05/05_Argentiere_4.jpg","../../jctruffet.com/image/image_05/05_Argentiere_5.jpg","../../jctruffet.com/image/image_05/05_Argentiere_6.jpg"]},"Consult_chateau_formulai ruit à Aspremont date du VIIIe siècle  plusieurs fois détruit puis rebâtit au cours des siècles.                                  Au XIIIe siècle fief de Raymond de Rostaing seigneur d'Aspremont et le seigneur Ludovic Marquesan qui le construisit au XVIII e siècle détruit à la Révolution, les propriétaires le comte d'Estienne de Saint-Jean refusa de le relever trop onéreux.","architecture":"Château construit au XVIII e siècle sur l'emplacement d'un ancien qui fut plusieurs fois détruit  mais ce dernier fut détruit à la Révolution, du château il ne subsiste que quelques pans de murs.","habitants":"Comte d'Estienne de Saint-Jean\"","divers":"Vestiges du château d'Aspremont","gps":"","images":["../../jctruffet.com/image/image_05/05_Aspremont_1.jpg","../../jctruffet.com/image/image_05/05_Aspremont_2.jpg","../../jctruffet.com/image/image_05/05_Aspremont_3.jpg"]},"Consult_chateau_formulaire40b7":{"id":"Consult_chateau_formulaire40b7","dept":"05","canton":"Aspres-sur-Buëch","commune":"Aspres-sur-Buëch","nom":"Aspres_Buech","type":"Vestiges","periode":"XII","histoire":"ASPRES sur Buech:  Sur la rivière du Buech à 750m d'altitude, le site fut occupé depuis la néolithique d'un oppidum gaulois, puis camp Romain, le bourg est construit autour d'une butte surmontée par la tour de l'horloge, était la propriété des comtes de Die et rétrocédé aux Aix-Artaud de Montauban au XIIe siècle.","architecture":"Aspres sur Buech; oppidum Gaulois sur la montagne des Eygoux, le village d'Aspres construit en forme d'escargot autour d'une butte surmontée de la tour de l'horloge et vestiges d'une construction du XII-XIIIe siècle  à l'entrée de la grotte de la Tune à Agnielles.","habitants":"Famille d'Artaud de Montauban\r\n        \"","divers":"Vestiges et façade du château","gps":"","images":["../../jctruffet.com/image/image_05/05_Aspres_Buech_1.jpg","../../jctruffet.com/image/image_05/05_Aspres_Buech_2.jpg","../../jctruffet.com/image/image_05/05_Aspres_Buech_3.jpg","../../jctruffet.com/image/image_05/05_Aspres_Buech_4.jpg","../../jctruffet.com/image/image_05/05_Aspres_Buech_5.jpg"]},"Consult_chateau_formulaire02c5":{"id":"Consult_chateau_formulaire02c5","dept":"05","canton":"St-Firmin","commune":"Aspres-les-Corps","nom":"Aspres_les_Corps","type":"Château","periode":"XIV","histoire":"ASPRES-les-CORPS; construit par la seigneurie  d'Aspres dont le dernier seigneur propriétaire en 1493 fut Jean d'Aspres  qui ce dernier vend la seigneurie à la famille d'Alauzon qui était déjà seigneur de Roussieu puis passa aux de Reinard par alliance en 1589, cette seigneurie fut vendue en 1780 à Joseph Escalier, petit bourgeois de Champoléon et négociant à Lyon en 1784,  son fils devenu maire d'Aspres et colonel de la garde nationale, administrateur des Hautes-Alpes par le directoire garda le château jusqu'en 1831.                Dans ce château fut accueillit en 1814 le comte d'Arbois futur roi Charles, accueillit également le 5 mars 1815 Napoléon 1er au retour de l'ile d'Elbe et le pape Pie XII en 1817. Le nouveau propriétaire Monsieur Reynaud  transmet  le château à sa fille madame Romanet en 1882, sera de nouveau vendu à monsieur Eymard  qui le passe par alliance au Gonin pharmacien à Corps, leur fille épousera le docteur Perron qui  le conservera jusqu'en 1945 le vendit à la société des moteurs Baudoin de Marseille pour des colonies de vacances. Aujourd'hui monsieur Charpentier l'utilise en hôtel restaurant de luxe depuis 1991 après l'avoir bien restauré.","architecture":"Aspres les Corps; Château construit en 1220 sur des fondations d'un château détruit du XIe siècle; corps de logis rectangulaire flanqué au départ de quatre tours rondes en angles, en a gardé deux en façade, remanié au XVIIe siècle de style Louis XIII.","habitants":"Famille d'Aspres\"","divers":"Château d'Aspres les Corps","gps":"","images":["../../jctruffet.com/image/image_05/05_Aspres_les_Corps_1.jpg"]},"Consult_chateau_formulaire7157":{"id":"Consult_chateau_formulaire7157","dept":"05","canton":"Bria _3.jpg","../../jctruffet.com/image/image_05/05_Batie_Montsaleon_4.jpg","../../jctruffet.com/image/image_05/05_Batie_Montsaleon_5.jpg"]},"Consult_chateau_formulaire0923":{"id":"Consult_chateau_formulaire0923","dept":"05","canton":"Bâtie-Neuve","commune":"Bâtie-Neuve","nom":"Batie_Neuve","type":"Maison forte","periode":"XIII","histoire":"BATIE-NEUVE; château des évêques de Gap , Guillaume de Gières 1119-1120,   Guillaume d'Esclapon 1219-1225  et remanié par l'évêque Laugier de Sapor  au XVe siècle, de 1527 à 1568 l'évêque de Clermont en fait sa résidence, passa ensuite en 1573 à l'évêque Pierre  Paparin de Chaumont 1572-1600, fait ensuite partie du fief des Rambaud,  dont en 1640 Alexandre de Bonne cousin des Rambeau  et à François Roger d'Hostun vicomte de Tallard et à François de Neuville-Villeroy. En 1720  les Neuville le vendirent à Mathieu de Louvat, et Catherine de Louvat épousa César d'Agoult dont les fils gardèrent le château jusqu'à la Révolution, ce dernier sera vendu comme bien national, acquis par Jean-Etienne Arnaud cultivateur qui l'utilisera en habitations diverses  et transformera quelques parties qui sera utilisé par la commune, mais menaçant l'écroulement par manque d'entretien il dut en démolir une grande partie  qui se terminera en 1897 aujourd'hui base d'une tour utilisé pour salle des fêtes.","architecture":"Batie Neuve; village fortifié et château sur une butte, servait de défense Gapençaise  enceinte quadrangulaire flanquée de quatre tours rondes, une cinquième plus haute qui faisait office de donjon du XIIIe siècle,  reconstruit au  XVe siècle et au début du XVIe siècle puis endommagé par les guerres.","habitants":"Evêques de Gap\"","divers":"Vestige de la maison forte","gps":"","images":["../../jctruffet.com/image/image_05/05_Batie_Neuve_1.jpg","../../jctruffet.com/image/image_05/05_Batie_Neuve_2.jpg","../../jctruffet.com/image/image_05/05_Batie_Neuve_3.jpg"]},"Consult_chateau_formulaire7c51":{"id":"Consult_chateau_formulaire7c51","dept":"05","canton":"Bâtie-Neuve","commune":"La Batie-Vieille","nom":"Batie_Vieille","type":"Vestiges","periode":"XIII","histoire":"BATIE-VIEILLE; au XIIe siècle fief des évêques de Gap, qui y firent construire une fortification, au XIIIe siècle passa à la famille Faudon, vassal du comte de Forcalquier qui fit construire sur la colline d'en face une autre fortification qui fut détruit par les évêques de Gap.  En 1517 le château des évêques  subit une attaque des troupes du maréchal André qui incendièrent le château, en 1996 des travaux de réabilitation de la tour.","architecture":"Batie-Vieille;  sur une hauteur voisine du village vestiges d'un donjon carré du XIIe siècle, ce château possédait une tour carré  sur trois côtés  et une circulaire sur le quatrième côté.","habitants":"Famille Faudon\"","divers":"Vestiges","gps":"","images":["../../jctruffet.com/image/image_05/05_Batie_Vieille_1.jpg","../../jctruffet.com/image/image_05/05_Batie_Vieille_2.jpg","../../jctruffet.com/image/image_05/05_Batie_Vieille_3.jpg","../../jctruffet.com/image/image_05/05_Batie_Vieille_4.jpg"]},"Consult_chateau_formulairea4f1":{"id":"Consult_chateau_formulairea4f1","dept":"05","canton":"Aspres-sur-Buëch","commune":"Aspres-sur-Buëch","nom":"Beaume_Arnaud","type":"Maison forte","periode":"XVI","histoire":"BEAUME des Arnauds; au XIIIe siècle fief des seigneurs d'Agoult,  au XIVe siècle Isnard d'Agoult y fonda une chapelle, le fief fut vendu en 1575 à Jean Perdrix, puis passa à Jean Pilon en 1594 et racheté  par Georges de Bonnivard-Mazet. Cadran solaire du col de Cabre, hommage  au baron Ladoucette, préfet des Hautes-Alpes  sous Napoléon Ier qui le classa monument historique.","architecture":"Beaume; village dominé par deux bâtisses qui possèdent des motifs architecturaux du XIV-XVe siècle appelé tour de \"Beauvais\" avec tour carrée partie la plus ancienne  et \"Tournelle\"  type maison forte pour l'une avec tour ronde et vestiges de remparts et d'un ancien château ruiné.","habitants":"Seigneurs d'Agoult\"","divers":"Maison forte","gps":"","images":["../../jctruffet.com/image/image_05/05_Beaume_Arnaud_1.jpg","../../jctruffet.com/image/image_05/05_Beaume_Arnaud_2.jpg"]},"Consult_chateau_formulaire7d9b":{"id":"Consult_chateau_formulaire7d9b","dept":"05","canton":"Briançon","commune":"Briançon","nom":"Briancon","type":"Fort","periode":"XIII","histoire":"BRIANCON; une des plus hautes villes d'Europe, ancienne capitale des Brigiani, au XIe siècle, ces hauts lieux appartenaient aux Guigues et devenu capitale  des Escartons qui en 1343  par la transaction au Dauphin Humbert II qui donna une charte sur cinquante et une communes voisines( République des Escartons).                              Rattaché à la France en 1349.           Les seigneurs étaient les châtelains. Briançon fut transformé en place forte vue les passages stratégiques des Alpes, citadelle sur  la Durance, entre le Piémont le Dauphiné et la Provence.     Au XIVe siècle cité militaire des Alpes; fortifications par Vauban  ainsi que l'église Notre-Dame de 1693 à 1722.","architecture":"Briancon; ancienne capitale des Escartons au XIVe siècle, puis cité militaire  des Alpes dont l'enceinte inachevée fut complété par Vauban en 1692 par des porte Pignerol, colombier, Dauphine et Embrun, poudrière des Cordeliers et son enceinte et porte de la Durance. La Redoute au-dessus de la ville qui fut terminé par  le maréchal de Berwick en 1710. La cité fut détruite par un incendie accidentel au XVIIe siècle l'enceinte fut élargit.                                Du château de Briançon il ne reste aujourd'hui  que de rares vestiges, donjon carré de 8m 40 de côté et des murs arasés au niveau du sol et des ruines de deux bâtiments situés à la base de l'escalier et une tour érigé sur les bords de la rivière pour défendre le passage.","habitants":"Humbert II  et Vauban\"","divers":"Porte de la citadelle et de Pignerol","gps":"","images":["../../jctruffet.com/image/image_05/05_Briancon_1.jpg","../../jctruffet.com/image/image_05/05_Briancon_2.jpg","../../jctruffet.com/image/image_05/05_Briancon_3.jpg","../../jctruffet.com/image/image_05/05_Briancon_4.jpg","../../jctruffet.com/image/image_05/05_Briancon_5.jpg","../../jctruffet.com/image/image_05/05_Briancon_6.jpg"]},"Consult_chateau_formulaire9bee":{"id":"Consult_chateau_formulaire9bee","dept":"05","canton":"Rosans","commune":"Bruis","nom":"Bruis","type":"Vestiges","periode":"XII","histoire":"BRUIS; au Xe siècle lieu occupé par les Sarrasins, puis placé sous la tutelle du monastère de l'Ile Barbe, les Mévouillon deviennent  vassaux de l'abbé et en deviennent seigneurs en arrière fief en 1242, puis hommagé à l'abbaye en 1251 gérait par Montalin du Bruis jusqu'à la fin du XIIIe siècle.                    En 1256  Montalin du Bruis ce petit seigneur connut par ses ambitions avec Jordan de Rosans et le dragonnet de Montauban assiégeaient le Castrum de Rosans afin de le délivrer de son usurpateur; délivré par l'intervention diplomatique de l' évêque de Gap,  en 1317  passa aux mains du Dauphin d'où l'abandon des lieux qui tombèrent en ruine.","architecture":"Bruis; dans ce village qui nacquit au XVe siècle possédait une grosse bâtisse à tours rondes elle fut rasée par les guerres de religion.                   Sur la butte abrupt une tour base d'un donjon quadrangulaire  haut de 15 mètres du XIIe siècle encore à trois niveaux avec trace de cheminée.                   Un autre château fut construit en 1669 signalé par une tour ronde d'angle, simple corps de logis à étage  deux ailes de bâtiment en communs cour fermière par un mur en retour.","habitants":"Famille de Montalin du Bruis\"","divers":"vestiges de la tour et manoir","gps":"","images":["../../jctruffet.com/image/image_05/05_Bruis_1.jpg","../../jctruffet.com/image/image_05/05_Bruis_2.jpg","../../jctruffet.com/image/image_05/05_Bruis_3.jpg"]},"Consult_chateau_formulaire9553":{"id":"Consult_chateau_formulaire9553","dept":"05","canton":"Gap","commune":"Gap","nom":"Charance","type":"Château","periode":"XVIII","histoire":"CHARANCE; au X-XIIe siècle fief des Leydet Arnoux vicomte de Gap, une légende veut qu'il lesta  un prélat et le mutila, Leydet le lendemain mourut écrasé par une poutre.                                 Résidence des évêques de Gap ( le prélat inhumé trente ans plus tard sa blessure coulé toujours).                        En 1135  la propriété passa au chevalier Pierre de Charance, des propriétaires se succédèrent  jusqu'en 1309, cette propriété qui possédait un château fort  avec tours et fossés des comtes de Provence à cette époque fut vendu ou récupéré par les évêques de Gap suite a l'acte de \"François-Philibert dit cadet de Charance\" qui ouvrit le 5 Janvier 1577 la porte Saint-Arey les troupes de Lesdiguières; les évêques de Gap  le conserveront jusqu'à la Révolution, mais délaissé au XVe siècle puis transformé en ferme puis saccagé pendant les guerres de religion et en 1692 incendié en même temps que Gap par Victor Amédée duc de Savoie.                                   Au XVIIIe siècle les évêques de Gap font reconstruire le nouveau château qu'ils gardèrent jusqu'à la Révolution vendu aux anchéres en 1791 Au XIXe siècle plusieurs propriétaires se succèderont.  Auguste Brochier receveur général des finances l'acheta et agrandit le domaine par des achats de fermes voisines, puis passa à la famille Pelissier qui ces derniers vendirent en 1973  à la mairie de Gap, qui y installe le siège du parc national des Ecrins et dans  les écuries en conservatoire botanique national alpin en 1992.","architecture":"Charance; de ce château médiéval avec tours et fossés, ruinés , remplacé au XVIIIe siècle  par un château de forme rectangulaire à trois niveaux, toitures en croupes de style alpin,  parc et  jardins.","habitants":"Evéques de Gap\"","divers":"Château de Charance","gps":"","images":["../../jctruffet.com/image/image_05/05_Charance_1.jpg","../../jctruffet.com/image/image_05/05_Charance_2.jpg","../../jctruffet.com/image/image_05/05_Charance_3.jpg","../../jctruffet.com/image/image_05/05_Charance_4.jpg"]},"Consult_chateau_formulaire8a19":{"id":"Consult_chateau_formulaire8a19","dept":"05","canton":"Aiguilles","commune":"Queyrras","nom":"Chateau_Queyrras","type":"Château","periode":"XIII","histoire":"CHATEAU-QUEYRAS; fort construit au XIIIe siècle à 1411 mètres d'altitude, propriété au XIIIe siècle des dauphins, ce poste frontière fut prit par le duc de Lesdiguières en 1587,  en 1633 le fort est menacé de destruction par Louis XIII,  en 1643 Louis XIV voulant garder ce poste garde frontière fit une  tournée dans cette région avec l'ingénieur Sébastien le Pestre de Vauban envisage la fortification de ce lieu  qui de 1690 à 1720 un  remaniement  de  fortifications par des  enceintes avancées avec bastions. En 1790 un magasin de poudre  et batteries d'artilleries supplémentaires y fut construit et des chambres sous Louis Philippe pour les garnisons.","architecture":"Chateau-Queyrras, A l'origine sur un rocher qui domine à 1411 mètres d'altitude sur les gorges du Guil subsiste un poste de garde frontière, un ancien château avec un  donjon médiéval carré haut de 16 mètres à trois niveaux couronné de mâchicoulis, cantonné de tours, corps de logis rectangulaire attenant.  Menacé de démantellement en 1633 suite aux combats du duc de Lesdiguières. Remanié en 1700 rajout de fortifications pour en faire un poste de garde frontière.","habitants":"Duc de Lesdiguières                      Sébastien le Pestre de Vauban\"","divers":"Fort Queyras","gps":"","images":["../../jctruffet.com/image/image_05/05_Chateau_Queyras_1.jpg","../../jctruffet.com/image/image_05/05_Chateau_Queyras_2.jpg","../../jctruffet.com/image/image_05/05_Chateau_Queyras_3.jpg","../../jctruffet.com/image/image_05/05_Chateau_Queyras_4.jpg","../../jctruffet.com/image/image_05/05_Chateau_Queyras_5.jpg","../../jctruffet.com/image/image_05/05_Chateau_Queyras_6.jpg"]},"Consult_chateau_formulaire3cb6":{"id":"Consult_chateau_formulaire3cb6","dept":"05","canton":"Ribiers","commune":"Châteauneuf-de-Chabre","nom":"Chateauneuf_Chabre","type":"Vestiges","periode":"XII","histoire":"CHATEAUNEUF de Chabre, juché sur un des contreforts de la montagne de Chabre, à 716 mètres  d'altitude  face à la forteresse de Mison servait à contrôler les gorges de la Méouge, le village s'abritait jusqu'au siècle dernier en contrebat du donjon. Ce fief faisait partie de l'héritage de Bertrand de Mison transmit à sa fille  Galburge de Mévouillon en 1248.","architecture":"Chateauneut de Chabre, il ne reste que les vestiges d'une tour du château forteresse à 716 m d'altitude.","habitants":"Famille Bertrand de Mison\"","divers":"Vestiges","gps":"","images":["../../jctruffet.com/image/image_05/05_Chateauneuf_Chabre_1.jpg","../../jctruffet.com/image/image_05/05_Chateauneuf_Chabre_2.jpg","../../jctruffet.com/image/image_05/05_Chateauneuf_Chabre_3.jpg"]},"Consult_chateau_formulaired939":{"id":"Consult_chateau_formulaired939","dept":"05","canton":"Embrun","commune":"Embrun","nom":"Embrun","type":"Tour","periode":"XII","histoire":"EMBRUN; capitale des Caturiges, puis des Civitas sous le nom  d'Ebrodumensium. Cité dés le début de nôtre ère, en 360  Saint-Marcellin fonda un siège par un archevêché qui durera jusqu'à la Révolution, les archevêques eurent le titres de prince, ils firent construire la tour Embrune dite tour \"Brune\" reflet du pouvoir épiscopal, ils avaient  le droit de battre monnaie furent les seigneurs de la ville  et de l'Embrunais, la vallée de la Fréssinière en 1137 premier seigneur la famille de Rame conjointement avec les dauphins héritiers des comtes d'Embrun  en 1247 qui eux possédaient un palais fortifié au XIVe siècle; fut rattaché à la France en 1589 converti plus tard en citadelle puis démoli par Louis XIII en 1629  pris et rançonné par Lesdiguières et par le duc de Savoie en 1692, la citadelle fut déclassé en 1872.                      Les templiers possédaient une maison à Embrun.                                  Dans la commune château de Baratier; fief des Baratier et des Verdun, tour de l'ancienne maison forte de Verdun du XIIe siècle.","architecture":"Embrun: du  palais fortifié au XIVe siècle il ne reste plus rien, sinon prés de l'église une tour dite \"tour Brune\", ancien donjon carré  du château des archevêques du XIIe siècle, couronné à mâchicoulis qui a servit de prison avant la Révolution, d'arsenal  et de salle du trésor, au XIXe siècle comme citerne d'eau et de prison de nouveau.            Baratier tour englobé aujourd'hui dans les constructions modernes.","habitants":"Evêques d'Embrun\"","divers":"Tour d'Embrun et palais","gps":"","images":["../../jctruffet.com/image/image_05/05_Embrun_1.jpg","../../jctruffet.com/image/image_05/05_Embrun_2.jpg","../../jctruffet.com/image/image_05/05_Embrun_3.jpg","../../jctruffet.com/image/image_05/05_Embrun_4.jpg","../../jctruffet.com/image/image_05/05_Embrun_5.jpg","../../jctruffet.com/image/image_05/05_Embrun_6.jpg"]},"Consult_chateau_formulaireb128":{"id":"Consult_chateau_formulaireb128","dept":"05","canton":"Briançon","commune":"Briançon","nom":"Fort_Briancon","type":"Fort","periode":"XVIII","histoire":"FORT-BRIANCON; au XIVe siècle cité militaire  des Alpes; rattachée à la France en 1349, fortifications par l'ingénieur  Sébastien le Pestre de Vauban de 1693 à 1722 avec l'assistance des ingénieurs conseils Mr Delabat Mr  Nègre Mr Tardif et à la disparition  du comte de Vauban, Claude François Bidal marquis et maréchal d'Asfeld qui construisit en plus le pont appelé \"Asfeld\"  pour passage militaire. Plusieurs forts ont été créé au XVIIIe siècle pour la protection de Briançon et le contrôle des passages  tout en fermant la route des troupes du comté de Savoie et se protéger mutuellement,  le plus haut le fort de l'Infernet à 2380 m édifié protégé le fort des Ville qui a pour origine des mines d'argent , Têtes qui ce dernier protéger la vallée de Fontanil  et de fort Christiana du XVIIIe siècle. Le fort de la croix de Bretagne à 2016 m construit en 1876 à 2016 m protège Briançon et la vallée de la Cervière et le fort   Ramdouillet ,Salettes, de la communication, Anjou, Dauphin, de Lousette, de Gourdans, des trois têtes de l'infernet et la Redoute du Point du Jour.","architecture":"Briancon: Plusieurs forts ont été créé au XVIIIe siècle pour la protection de Briançon Fort de l'infernet, des têtes, Croix de Bretagne, Randouillet, Anjou, Point du jour tous ont plus ou moins le style de Vauban  bâtiment central carré ou rectangulaires à deux ou quatre étages avec des toitures pyramidales certains couvert en béton, protégés par une première enceinte avec bastion en angles et autres enceintes style Vauban ceci pour la plupart  sur un mamelon rocheux.","habitants":"Ingénieur  Sébastien le Pestre de Vauban\"","divers":"Divers forts l'Infernet, christiana, Croix de Bretagne, Randouillet etc","gps":"","images":["../../jctruffet.com/image/image_05/05_Fort_Briancon_1.jpg","../../jctruffet.com/image/image_05/05_Fort_Briancon_2.jpg","../../jctruffet.com/image/image_05/05_Fort_Briancon_3.jpg","../../jctruffet.com/image/image_05/05_Fort_Briancon_4.jpg","../../jctruffet.com/image/image_05/05_Fort_Briancon_5.jpg","../../jctruffet.com/image/image_05/05_Fort_Briancon_6.jpg","../../jctruffet.com/image/image_05/05_Fort_Briancon_7.jpg","../../jctruffet.com/image/image_05/05_Fort_Briancon_8.jpg"]},"Consult_chateau_formulairef7fd":{"id":"Consult_chateau_formulairef7fd","dept":"05","canton":"Veynes","commune":"Furmeyer","nom":"Furmeyer","type":"Vestiges","periode":"XIII","histoire":"FURMEYER; fief  des Rambaud  dont le premier André Rambaud  1438-1503 descendance jusqu'en 1868 par Ernest de Rambaud qui épousa Margueritte de Clerc de Pouligny. Cette grande famille fut les seigneurs de Montgardin et d'Ancelle deviennent seigneur de Furmeyer en 1525 Jaynonne de Montron par Gulis II  d'où le nom de Capitaine  de Rambaud de Guelis  fils d'écuyer de Louis XII, fit des campagnes d'Italie et cousin de François de Bonne futur duc de Lesdiguières propriétaire en 1504 de Faudon, de la Rochette, Gap et la Bâtie Neuve. Son fils  Antoine Rambaud de Furmeyer, ce dernier est né au château d'Ancelle en 1541 gouverneur de la Montagne lieutenant général a participé à tous les affrontements sanglants du Dauphiné des guerres de religion et fut assassiné à Gap en 1565.","architecture":"Furmeyer; petite ville qui surplombe le Buech en 1525 les Rambaud rajoute à cette seigneurie  Montgardin et Ancelle.","habitants":"Famuille d'Antoine Rambaud de Furmeyer\"","divers":"","gps":"","images":["../../jctruffet.com/image/image_05/05_Furmeyer_1.jpg"]},"Consult_chateau_formulaire8006":{"id":"Consult_chateau_formulaire8006","dept":"05","canton":"Gap","commune":"Gap","nom":"Gap","type":"Château","periode":"XVI","histoire":"GAP; faisait partie du territoire des Voconces. Un évêché fut tardé, au IV siècle par Saint-Dimitrius, les évêques furent seigneurs temporel avec titre de comte jusqu'au XVIe siècle.              La population s'accroit considérablement pendant le XIIIe et  XIVe siècle.       Au Moyen-Age Gap était sous la domination des Templiers qui possédaient une commanderie et la maison de Gap.         Au XVIe siècle, période sombre, guerre de religion et étrangère comme celle de la ligue des Augsbourg,  le peuple de Gap était catholique leur voisin François de Bonne gouverneur du Dauphiné  1598 à 1626  chef huguenot (duc de Lesdiguières) décida d'attaquer la ville qui était a ce moment la  protégé par vingt tours.      Dans la nuit du 3 janvier 1577 \"François-Philibert dit cadet de Charance\" lui ouvre la porte Saint-Arey les troupes de Lesdiguières et les soudards du duc de Savoie massacrèrent la population et incendièrent la ville la cathédrale et les couvents. Ceci ne fit pas changer l'optique des gapençais restèrent toujours catholiques, puis de nouveau attaqué et pillé  et incendié par les troupes savoyardes de Victor Amédée II. En 1790 la Province du Dauphiné partagé en trois départements, Gap devient la préfecture des Hautes Alpes et en 1802 le Baron Charles-François de Ladoucette est nommé préfet.                             Dans la commune château de Fontreyne du XIXe siècle, manoir de Kapados construit en 1882-1900 style orientale  par Clémént Aubert directeur des chemins de fer du nord de l'Espagne et château d'Olive de Crespon au quartier Villard Robert avec beau parc et jardin.                    Château de Barles XIXe siècle et Aucos.","architecture":"Gap: Ville qui était fortifié, enceinte  avec vingt tours au XV-XVIe siècle et plusieurs portes, devenue place forte par Lesdiguières rasée par Richelieu, il ne reste que trés peu de vestiges de remparts et de tours, une tour de guet au hameau de Tourronde, vestiges du château de Mentoyer du XIV-XVIe siècle, vestiges du château de la terrasse du XIVe siècle Tour de guet XVe siècle au hameau de la Tourronde.\r\nVestiges du château Manteyer XIVe, XVIe et XVIIe siècles.\r\nVestiges du château de La Terrasse XIVe siècle.\r\nChâteau de Fontreyne XIXe siècle.\r\nManoir de Kapados: \r\nChâteaux Charance.","habitants":"Famille de François-Philibert dit cadet de Charance\"","divers":"Manoir de Charance et de Kapados","gps":"","images":["../../jctruffet.com/image/image_05/05_Gap_1.jpg","../../jctruffet.com/image/image_05/05_Gap_2.jpg","../../jctruffet.com/image/image_05/05_Gap_3.jpg"]},"Consult_chateau_formulaire3057":{"id":"Consult_chateau_formulaire3057","dept":"05","canton":"Guillestre","commune":"Guillestre","nom":"Guillestre","type":"Vestiges","periode":"XIII","histoire":"GUILLESTRE; ville fondée par les habitants de Rama (la roche de Rama)  et de l'abbaye de Saint-André de Villeneuve les Avignon qui possédait un prieuré, ancienne place forte et fief au XIIe siècle  Situé au centre du parc du Queyras, dans une zone de passage par les armées,  la ville s'organisait autour du château des archevêques, seigneur d'Embrun qui comprenait Risoul et Ceillac qui dépendait de l'abbaye de Saint-André, ces seigneurs archevêques habitaient dans le château qui surplombait la ville.  Pour défendre le passage Guillestre s'est munit de garnisons d'où l'importance militaire de cette ville.","architecture":"Guillestre; il ne reste plus rien du château  sinon la tour de garde d'Eygliers et la tour des plantations et  vestige de rempart du XIVe siècle, une porte du Saint-Esprit, Sainte-Catherine, Saint-Louis et Saint-Jean ces deux dernières du XVIe siècle et maisons anciennes dans le village du XVIe siècle, des vestiges d'enceintes médiévales sont encore visibles ainsi que des portes d'accès à la ville. Vestiges du château du XIIIe siècle  avec tour d'Eygliers.","habitants":"archevêques seigneur d'Embrun \"","divers":"Vestiges des remparts","gps":"","images":["../../jctruffet.com/image/image_05/05_Guillestre_1.jpg","../../jctruffet.com/image/image_05/05_Guillestre_2.jpg","../../jctruffet.com/image/image_05/05_Guillestre_3.jpg"]},"Consult_chateau_formulairef288":{"id":"Consult_chateau_formulairef288","dept":"05","canton":"St-Firmin","commune":"Chauffayer","nom":"Herbeys_Chauffayer","type":"Manoir","periode":"XVII","histoire":"HERBEYS; manoir construit au XVIIe siècle par la famille de Louis François d'Herbeys créateur d'un canal portant son nom sur le plateau d'Aubessagne (légende des Matagots) puis fut le fief de Jean de Falcon qui en était le seigneur.         Acheté dernièrement par le chef cuisinier Monsieur Dellas restaurateur à Corps qui en fait un restaurant de Luxe.","architecture":"Herbeys; manoir construit au XVIIe siècle  remanié  en maison bourgeoise, toiture en croupe style alpin  et tourelles en façades  rajoutées.","habitants":"Louis-François d'Herbeys\"","divers":"Manoir d'Herbeys","gps":"","images":["../../jctruffet.com/image/image_05/05_Herbeys_Chaufayer_1.jpg","../../jctruffet.com/image/image_05/05_Herbeys_Chaufayer_2.jpg","../../jctruffet.com/image/image_05/05_Herbeys_Chaufayer_3.jpg"]},"Consult_chateau_formulaire92de":{"id":"Consult_chateau_formulaire92de","dept":"05","canton":"Orpierre","commune":"Lagrand","nom":"Lagrand","type":"Vestiges","periode":"XVIII","histoire":"LAGRAND; au Moyen-Age,un prieuré fut fondé dépendait  d'un monastère Italien  d'Aquapendante , puis en 1365 de Cluny, la papauté étant à Avignon, Lagrand devient une étape pour les écclésiastiques, les guerres de religion entraîna la destruction en 1390 par Raymond de Turenne.                      Manoir de la famille Hugues construit en 1768 où est installé la mairie, le prieuré fut relevé au XVII par Louis de Simiane abbé jusqu'à la Révolution.","architecture":"Lagrand; grande bâtisse à trois niveaux  et face de l'église la grande bâtisse vestiges du Prieuré.","habitants":"Famille de Louis de Simiane\"","divers":"Vestiges du château","gps":"","images":["../../jctruffet.com/image/image_05/05_Lagrand_1.jpg","../../jctruffet.com/image/image_05/05_Lagrand_2.jpg","../../jctruffet.com/image/image_05/05_Lagrand_3.jpg"]},"Consult_chateau_formulaire2aa9":{"id":"Consult_chateau_formulaire2aa9","dept":"05","canton":"Gap","commune":"Laragne-Montéglin","nom":"Laragne_Montgelin","type":"Château","periode":"XVII","histoire":"LARAGNE-Montgelin; au XIIe siècle fief des Mévouillon.                      Laragne la création de la ville remonte au XVe siècle fief des seigneurs  d'Hostun  et des Sassenage et a Gaspard de Perrinet ( protestant)  qui possédait une vaste demeure qui après l'édit de Nantes  connurent une période  d'abandon avant d'être morcelés en habitations particulières  et la commune racheta le château pour le réabiliter.             Un nouveau château dans  la première moitié du XVIIe siècle  par l'architecte Guillaume Lemoine musée dans les caves.","architecture":"Laragne-Montgelin;   château  de Laragne du XVIIe siècle de Gaspard Perrinet corps de logis flanqués de quatre pavillons, construit sur trente ans par l'architecte Guillaume le Moyne ; musée dans les caves réaménagés du château.","habitants":"Famille de  Gaspard de Perrinet\"","divers":"Divers châteaux","gps":"","images":["../../jctruffet.com/image/image_05/05_Laragne_Monteglin_1.jpg","../../jctruffet.com/image/image_05/05_Laragne_Monteglin_2.jpg","../../jctruffet.com/image/image_05/05_Laragne_Monteglin_3.jpg","../../jctruffet.com/image/image_05/05_Laragne_Monteglin_4.jpg"]},"Consult_chateau_formulaire29c7":{"id":"Consult_chateau_formulaire29c7","dept":"05","canton":"St-Bonnet","commune":"Glaizil","nom":"Lesdiguieres_Glaizil","type":"Vestiges","periode":"XVII","histoire":"LESDIGUIERES; François de Bonne est né à Saint-Bonnet en Champsaur, fils de notaire devient seigneur de cette vallée et cette seigneurie lui permit de devenir duc de Lesdiguières, dont il acquit le titre  en 1576 et l'histoire est liée à celle du protestantisme dans le Dauphiné; le jour de sa naissance en Avril 1543 Saint-Bonnet fut incendié ce qui  obligea cette famille d'aller habité au Glaizil (nord du département), Huguenots fut par HenriI IV lieutenant général des armées du Piémont de la Savoie et Dauphiné militaire chef protestant à 30 ans son pouvoir reconnu  grâce aux exploits, chef militaire hors pair et intransigeant l'on ammené à posséder plusieurs châteaux, celui du Glaizil qu'il fit construire en 1571 et celui de Vizille et autres, il était bâtisseur également ponts, routes etc.. Gouverneur du Dauphiné.            Fut converti au catholicisme par Louis XIII à la fin de sa vie et fut nommé connétable  de France et chevalier du Saint-Esprit, le duc meurt à Valence en 1626 à l'âge de 83 ans; il eu deux filles avec sa femme Claudine de Béranger  qui ces dernières épousèrent successivement  Charles de Créquy de Blanchefort pour une question de descendance.                 Le château de Vizille subit en 1690 les assauts  des mercenaires du duc de Savoie qui l'incendièrent, les vestiges furent rachetés au XXI par le conseil général de L'Isère et les confie à une association \"ami du château de Lesdiguières\"  pour le restaurer.         Le tombeau  du Connétable et de sa famille furent transféré au château de Sassenage.","architecture":"Lesdiguières ce château qui était aussi grandiose que celui de Vizille, il n'en reste que des vestiges, construit en 1571 à 1580 130 m de long et 65 m de large, était composé de six tours avec pont-levis la chapelle fut construite en 1604. Le  château fut incendié en 1690  subit les assauts du temps est cours de rénovation par les bâtiments de France","habitants":"François de Bonne duc de Lesdiguières\"","divers":"Vestiges du château","gps":"","images":["../../jctruffet.com/image/image_05/05_Lesdiguieres_Glaizil_1.jpg","../../jctruffet.com/image/image_05/05_Lesdiguieres_Glaizil_2.jpg","../../jctruffet.com/image/image_05/05_Lesdiguieres_Glaizil_3.jpg","../../jctruffet.com/image/image_05/05_Lesdiguieres_Glaizil_4.jpg","../../jctruffet.com/image/image_05/05_Lesdiguieres_Glaizil_5.jpg","../../jctruffet.com/image/image_05/05_Lesdiguieres_Glaizil_6.jpg","../../jctruffet.com/image/image_05/05_Lesdiguieres_Glaizil_7.jpg","../../jctruffet.com/image/image_05/05_Lesdiguieres_Glaizil_8.jpg","../../jctruffet.com/image/image_05/05_Lesdiguieres_Glaizil_9.jpg"]},"Consult_chateau_formulaire46a3":{"id":"Consult_chateau_formulaire46a3","dept":"05","canton":"Gap","commune":"Manteyer","nom":"Manteyer","type":"Château","periode":"XVI","histoire":"MANTEYER; de la famille Auger depuis le XIIIe siècle jusqu'au XVe siècle dont Rolland sieur de Monteyer diplomate au XIIIe siècle.                          Des descendants connus dont  Marie-Barthélémy-Georges de Monteyer  né à Gap en 1867 son père Marie-Félix-Henri Pinet de Monteyer époux de Marie-Augustine Mouls  archiviste à Gap demeure à Monteyer rédacteur de Journaux il s'éteint le 24 janvier 1948 dans son château.","architecture":"Manteyer; château construit au XIVe siècle, bâtiment rectangulaire flanqué de deux tours rondes rattachés à un bâtiment plus petit avec galerie reposant sur de grandes arcades plein cintre escalier dans une tourelle et tour découronnée.","habitants":"Famille Auger \"","divers":"Château de Manteyer","gps":"","images":["../../jctruffet.com/image/image_05/05_Manteyer_1.jpg"]},"Consult_chateau_formulaireb9de":{"id":"Consult_chateau_formulaireb9de","dept":"05","canton":"Guillestre","commune":"Guillestre","nom":"Mont_Dauphin","type":"Fort","periode":"XVII","histoire":"MONT-DAUPHIN; place forte des Alpes destinée à verrouiller les accès des vallées de la Haute-Durance et du Guil, malgré l' alliance de la Savoie qui s'est joint à  l'Angleterre et l'Autriche  en 1692  envahirent le Queyras et dévastèrent la vallée de la Durance.     Sur demande de Louis XIV de construire une nouvelle place forte ceci a été fait  par l'ingénieur François le Pestre de Vauban en 1692,  ce dernier a conçu un projet de ville royale complète civile est militaire. En 1815 la garnison est réduite à un bataillon, puis en 1900 la garnison se limite à deux compagnies  de chasseurs alpins.                    Touché par les bombardements en 1940 incendié et une partie occupé par les allemands et les italiens créant beaucoup de détériorations sur le peu de bâtiments en état sont prêtés aux réfugiés Hongrois en 1956 aprés l'insurection de Budapest et en 1962 les pieds noirs y sont hébergés.                                En 1965 la place forte est déclassé et inscrit à l'Unesco.                    Aujourd'hui bases militaire musée etc.","architecture":"Mont-Dauphin; place forte des Alpes ensemble militaire à 1050 m d'altitude au dessus du confluent de la Durance et du Guil, citadelle remanié par Vauban puis au XVIIIe et XIXe siècle, est resté intact de l'architecture militaire de Louis XIV  avec caserne Rochambeau, l'arsenal abrite le musée Vauban.","habitants":"François le Pestre de Vauban \"","divers":"Fort Vauban","gps":"","images":["../../jctruffet.com/image/image_05/05_Mont_Dauphin_1.jpg","../../jctruffet.com/image/image_05/05_Mont_Dauphin_2.jpg","../../jctruffet.com/image/image_05/05_Mont_Dauphin_3.jpg","../../jctruffet.com/image/image_05/05_Mont_Dauphin_4.jpg","..
