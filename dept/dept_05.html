jeté du haut d'une colline dans un tonneau clouté.           Après le château servit de cure ou décéda en 1842 le prêtre de Sigoyer Jean-Thomas Astier.                          Propriété actuelle de l'architecte Paul Wagner qui le restaure.","architecture":"Montgardin; Château du XVIe siècle deux tours rondes dont une entière l'autre possède que le premier étage , en cours de rénovation depuis une trentaine d'année.","habitants":"Paul Wagner\"","divers":"maison forte de Montgardin","gps":"","images":["../../jctruffet.com/image/image_05/05_Montgardin_1.jpg","../../jctruffet.com/image/image_05/05_Montgardin_2.jpg","../../jctruffet.com/image/image_05/05_Montgardin_3.jpg"]},"Consult_chateau_formulaireee28":{"id":"Consult_chateau_formulaireee28","dept":"05","canton":"Rosans","commune":"Montjay","nom":"Montjay","type":"Vestiges","periode":"XVII","histoire":"MONTJAY: MontJanus existait avant le Xe siècle , fief des Mévouillons perdu au profit du Dauphin en 1317 puis récupérer  en 1397 et gardé jusqu'en 1520 à cette date François d'Agoult seigneur de Chanousse acquit Montjay y fit construire le château appelé Vaucluse et la famille le conserva jusqu'à la Révolution.      En 1737 Thomas d'Agoult seigneur de Montjay fut victime d'un assassinat commis dans des circonstances horribles qui donna lieu à un émouvant procès criminel.                               Le fief  de Chanousse appartient jusqu'au 2 septembre 1317 à la famille des barons de Mévouillons puis au dauphin comme tous les fief du Dauphiné à cette époque.","architecture":"Montjay; château Vaucluse du Moyen-Age remanié au XVIIe siècle, grand corps de logis flanqué d'une tour ronde renfermant l'escalier,  reste quelques vestiges de remparts","habitants":"François d'Agoult seigneur de Chanousse \"","divers":"Motte féodale","gps":"","images":["../../jctruffet.com/image/image_05/05_Montjay_1.jpg","../../jctruffet.com/image/image_05/05_Montjay_2.jpg"]},"Consult_chateau_formulaireb0d6":{"id":"Consult_chateau_formulaireb0d6","dept":"05","canton":"Veynes","commune":"Montmaur","nom":"Montmaur","type":"Château","periode":"XIV","histoire":"MONTMAUR; cité au XIe siècle  de la famille d'Aix d'Artaud de Montauban qui fit édifier une forteresse en hauteur pour contrôler le passage, cette seigneurie devient une grande baronnie puissante du Dauphiné qui firent construire au XIVe siècle le château féodal de  Montmaur, par alliance  la Baronnie passe aux de la Flotte de Montauban en 1550, troisième baronnie du Dauphiné une des plus anciennes et plus puissantes Jean de la Flotte chef protestant sera tué en 1569  à la bataille de Moncontour, son fils Balthazar remanie le château dans le style renaissance.                       En 1662 la dernière des de la Flotte de la Frédière vend la baronnie à la Famille d'Agoult qui passera par alliance aux Tremollet de Montpezat qui vendirent le château en 1774 à François de Vachon de Belmont, marquis de Belmont.             Ce château sera vendu en 1825 à la famille de Taxis de Poët puis passera par alliance  aux Pinet de Montayer, toujours par alliance à  Xavier Blanc qui fut avocat député et sénateur des Hautes-Alpes, restera dans cette famille jusqu'en 1930 et vendu en 1941. \r\nLe château de Montmaur fut un lieu de résistance pendant la Seconde Guerre mondiale. Il accueillit Antoine Mauduit ancien officier qui le transforme  en un centre d'accueil et base arrière du maquis du Dévoluy, il y reçu François Mitterand.                                Fut la propriété de la famille Laurens Depuis 1979 lAssociation des Amis de Montmaur participe à la vie du château.","architecture":"Montmaur; le village est dominé par les ruines d'un château  du XIe siècle, un premier château fut construit au XIVe siècle dans un style féodal avec échauguettes et remparts, remanié au XVIe siècle dans le style renaissance avec quatre tours d'angles dont il en subsiste deux.","habitants":"Famille de Jean de la Flotte de la Frédière\"","divers":"Château de Montmaur","gps":"","images":["../../jctruffet.com/image/image_05/05_Montmaur_1.jpg","../../jctruffet.com/image/image_05/05_Montmaur_2.jpg","../../jctruffet.com/image/image_05/05_Montmaur_3.jpg","../../jctruffet.com/image/image_05/05_Montmaur_4.jpg","../../jctruffet.com/image/image_05/05_Montmaur_5.jpg","../../jctruffet.com/image/image_05/05_Montmaur_6.jpg"]},"Consult_chateau_formulaire27c7":{"id":"Consult_chateau_formulaire27c7","dept":"05","canton":"Serres","commune":"Montmorin","nom":"Montmorin","type":"Maison forte","periode":"XVI","histoire":"MONTMORIN; doit son nom aux Maures qui l'occupèrent au XIIe siècle château du XIVe siècle style maison forte  construit par Bernard Fazy de la Roche les Arnaud. Au bas du village résidence seigneuriale convertie en auberge, fut la maison natale de Philis  de la Tour du Pin de la Charce  (libératrice du Dauphiné) qui servit l'état au moment de l'invasion des Alpes par le duc de Savoie en 1692.      Montmorin; berceau de la famille de Jean Moulin.","architecture":"Montmorin; le village a deux châteaux un au haut du bourg château du XIVe siècle style maison forte a été incendié en 1572 reconstruit en 1577, lors des guerres de religion bâtisse carrée à deux niveaux deux tours rondes;  l'autre dans le bas du bourg du XVIIe siècle.","habitants":"Philis de la Charce\"","divers":"Maison forte de Montmorin","gps":"","images":["../../jctruffet.com/image/image_05/05_Montmorin_1.jpg"]},"Consult_chateau_formulaire43ad":{"id":"Consult_chateau_formulaire43ad","dept":"05","canton":"Orcières","commune":"St-Jean-St-Nicolas","nom":"Montorcier-Pregentil","type":"Manoir","periode":"XVI","histoire":"MONTORCIER; au hameau  de Pont du Fossés le dernier dauphin Humbert II  fit de Montorcier une résidence seigneuriale  somptueuse, le dauphin Louis II (futur Louis XI)  fils de Charles VII faisait régulièrement étape à Montorsier. François de Bonne ramena le Champsaur  au Dauphiné et le pacifia malgré  les contacts de Victor Amédée II de Savoie. En 1500 les Rambaud  d'Ancelle  co-seigneurs de Veynes leur fils Don-Guelis  fut récompensé par François Ier  pour actes de bravoures, lui fit don d'une bonne somme d'argent qui lui permit d'acquérir  plusieurs seigneuries dont  Montorsier  et deviendra seigneur à part entière de Furmeyer en 1565.    Au XVIe siècle à l'abandon du château les seigneurs s'installèrent au château du Rival devenant leur résidence, puis le domaine du Rival fut racheté par les seigneurs de Serres  en 1750 par Henry Montcheny Bonnabel d'Orcières, une de ces descendantes épousait en 1805 Pierre Julien baille de Champoléon qui devenait propriétaire du château Rival et ce dernier acheta également le château de Prégentil aux de Gril, ce château existe au XIVe siècle, en 1339 le dauphin propriétaire à l'époque en fait don à son serviteur Etienne Roux, en 1541à noble Arnaud puis acheté par un notaire Honoré de Serres, en 1593 par le duc de Lesdiguières et en 1674 Nicolas de Gril seigneur de St-Michel de Chaillot l'acheta, toujours dans la descendance.","architecture":"Montorsier-Prégentil au hameau du Pont du Fossés sur un mamelon fut construit le château de Montorcier dont-il ne reste certainement plus rien, sinon quelques ruines dans le voisinage du hameau l'ancien château de Progentil bâtisse rectangulaire à deux niveaux les tours crénelées ont disparues malgré sont remaniement du XVIe siècle.","habitants":"Famille de Don Gillis de Rambaud \"","divers":"Château st Nicolas et de Rivol","gps":"","images":["../../jctruffet.com/image/image_05/05_Montorsier_Pregentil_1.jpg","../../jctruffet.com/image/image_05/05_Montorsier_Pregentil_2.jpg","../../jctruffet.com/image/image_05/05_Montorsier_Pregentil_3.jpg"]},"Consult_chateau_formulaire6a1e":{"id":"Consult_chateau_formulaire6a1e","dept":"05","canton":"Orpierre","commune":"Orpierre","nom":"Orpierre","type":"Vestiges","periode":"XIV","histoire":"ORPIERRE; Vaupierre puis Vorpierre et en 1177 devient Orpierre; village médiéval , fief des barons de Mévouillon qui le vendirent au Dauphin qui ce dernier le donna à Guillaume de Taulignan, puis revendu en 1298. Au XIVe siècle Humbert II céda Orpierre et Trescléoux à Jean de Chalons en 1334. En 1530 mort du dernier des seigneurs de Chalons, seigneur d'Orange Philibert passa à son neveu puis de ce dernier à son cousin Guillaume d'Orange dit le\" taciturne\" qui en fit le siège des princes d'Orange, Stathouder de Hollande  ce qui influença le protestantisme  qui entraina en 1623 la destruction de la citadelle, à la mort de Guillaume III d'Orange  en 1702 le comté passa à la famille de Conti qui le céda peu de temps après à la France, il y eu un seigneur François-René de Taxis du Poët, époux d'une Duclaux de Bésignan une famille de  châtelain d'Orpierre du XVI-XVII, les Autard de Bagard l'un d'eux fut connétable de Guillaume III d'Angleterre. En 1715 par le traité d'Utrecht la baronnie intègre le domaine royale.","architecture":"Orpierre; à l'origine une tour au Xe siècle transformé en château fort au XIVe siècle, enceintes avec trois portes,  porte du Levant, du Rochas et d'Eyguières,  la demeure seigneuriale est au centre appelé \"maison des princes\"  rabaissé reconnaissable à sa tour ronde du XIVe siècle, quelques vestiges du château de Jean de Chalons, base de tour et morceau de muraille.","habitants":"Jean de Chalons\"","divers":"Vestiges et château","gps":"","images":["../../jctruffet.com/image/image_05/05_Orpierre_1.jpg","../../jctruffet.com/image/image_05/05_Orpierre_2.jpg","../../jctruffet.com/image/image_05/05_Orpierre_3.jpg","../../jctruffet.com/image/image_05/05_Orpierre_4.jpg","../../jctruffet.com/image/image_05/05_Orpierre_5.jpg"]},"Consult_chateau_formulaire764a":{"id":"Consult_chateau_formulaire764a","dept":"05","canton":"Embrun","commune":"Crots","nom":"Picomtal_Crots","type":"Château","periode":"XVI","histoire":"PICOMTAL; au XIe siècle fief des Embrun seigneurs laics archevêques qui fondèrent la seigneurie des Crottes.   Au XIIIe siècle remplacèrent leur demeure en bois par un fort appelé\" tour Boniface\" et au XIVe siècle se transforma en château que Martin de la Vilette hérita en 1507 il dut le remanié mais en 1692 il fut incendié par les ducs de Savoie. Reconstruit,  passa ensuite aux Rame et ensuite à la famille de Ravel dans cette descendance  l'abbé Ravel le cède en 1769 à Joseph Collon ancien officier  et en 1792 la propriété est acquise par Jean François Cassy, bailly royal d'Embrun, commissaire des guerres du gouvernement révolutionnaire. La famille Berthe  acheta le château et le remania, fut vendu en adjudication en 1876 à Joseph Roman ancien avocat maire des Crottes qui donna au château l'apparence actuelle, à sa mort en 1924 le château passa à la famille  Roman Amat qui le gardèrent jusqu'en 1998 date à laquelle il fut acheté par Jacques et Sharon Peureux.","architecture":"Picomtal; un grand corps de logis rectangulaire à trois niveaux cantonné de trois tours rondes du XIVe siècle. La tour Boniface qui date du XII-XIIIe siècle ce château  fut remanié en 1507 dans un style renaissance et remanié aux cours des ans.","habitants":"Famille Martin de la Vilette Famille D'Amat\"","divers":"Château de Picomtal à Crots","gps":"","images":["../../jctruffet.com/image/image_05/05_Picomtal_Crots_1.jpg","../../jctruffet.com/image/image_05/05_Picomtal_Crots_2.jpg","../../jctruffet.com/image/image_05/05_Picomtal_Crots_3.jpg","../../jctruffet.com/image/image_05/05_Picomtal_Crots_4.jpg","../../jctruffet.com/image/image_05/05_Picomtal_Crots_5.jpg","../../jctruffet.com/image/image_05/05_Picomtal_Crots_6.jpg"]},"Consult_chateau_formulaire6064":{"id":"Consult_chateau_formulaire6064","dept":"05","canton":"Ribiers","commune":"Ribiers","nom":"Ribiers","type":"Vestiges","periode":"XII","histoire":"RIBIERS; au  Xe siècle un conflit éclata entre Ribiers et le Poêt pour une question de bornage entre ces deux villages, échafourés sanglantes avec procès interminable; village qui devenait important par l'implantation de l'abbaye de Saint-André de Villeneuve  qui construisit un château à 961 mètres d'altitude, passa aux Chalais et aux Hospitaliers de Saint-Jean de Jérusalem.  Fief des Mévouillon  au XIIe siècle Bertrand de Mévouillon seigneur du Barret conservera cette seigneurie jusqu'au XVe siècle.","architecture":"Ribiers; il y avait quatre châteaux au Moyen-Age, un à l'emplacement du village, un à Saint-Estève  un à Creyssint et le dernier à Château-Giraud,  trois disparurent, resta le château du village,  château de Saint-Etienne mais disparait également, il ne reste que quelques vestiges d'enceinte du village et une tour ronde (rabaissée).","habitants":"Bertrand de Mévouillon \"","divers":"Vestiges du château","gps":"","images":["../../jctruffet.com/image/image_05/05_Ribiers_1.jpg","../../jctruffet.com/image/image_05/05_Ribiers_2.jpg"]},"Consult_chateau_formulairea888":{"id":"Consult_chateau_formulairea888","dept":"05","canton":"Rosans","commune":"Rosans","nom":"Rosans","type":"Vestiges","periode":"XIV","histoire":"ROSANS; fief occupé par les Sarrasins du IX au Xe siècle. Au XIIIe siècle les Mévouillon et les Mautauban détenaient le château, les fortifications furent construites dés le XIIe siècle.          En 1251 fut l'objet d'une tractation entre le dauphin et Raymond de Mévouillon, ils le restituèrent à Montalin du Bruis.                      En 1256  Jordans de Rosans et Dragonnet de Montauban qui décidèrent de récupérer la seigneurie de Rosans assiégeant le château de Montalin du Bruis,  La guerre prit fin en 1294 lors du traité entreprit par les dauphins du viennois et l'évêque de Gap avec Montalin du Bruis et le dernier héritier des Montauban Adhémar de Monteil, Rosans fut la capitale régionale avec un prieuré Saint-André actuellement Saint-André de Rosans au XIVe siècle cette ville s'entoura d'une enceinte avec deux donjons massifs qui fut le château du XVe siècle de Lesdiguières François de Bonne.                                 Raymond de Turenne s'empara de la ville  et en 1574 par Montbrun pour les guerres de religion.                            La seigneurie passa au XVIIe siècle aux Dysse.","architecture":"Rosans; cette ville s'entoura d'une enceinte avec deux donjons massifs qui fut un château du XVe siècle, donjon carré du XIIIe siècle dite \"tour sarrasine\" de quinze mètres de haut, édifié au XVe siècle remanié au XVIIIe siècle, les fortifications furent détruites  au XVIIIe siècle ainsi que les deux donjons. On pénètre dans le bourg médiéval fortifié par plusieurs portes, dont la principale, où se voit encore l'emplacement de la herse, jouxte le château Lesdiguières, dernier connétable de France.","habitants":"Famille de Jordan de Rosans\"","divers":"patrimoine de Rosans","gps":"","images":["../../jctruffet.com/image/image_05/05_Rosans_1.jpg","../../jctruffet.com/image/image_05/05_Rosans_2.jpg","../../jctruffet.com/image/image_05/05_Rosans_3.jpg","../../jctruffet.com/image/image_05/05_Rosans_4.jpg","../../jctruffet.com/image/image_05/05_Rosans_5.jpg"]},"Consult_chateau_formulaire4451":{"id":"Consult_chateau_formulaire4451","dept":"05","canton":"Chorges","commune":"Rousset","nom":"Rousset_Rochebrune","type":"Manoir","periode":"XII","histoire":"ROUSSET; le fief des Rosset ou Rousset au XI-XIIe siècle, seigneurs et co-seigneurs de Savine seigneurs à part entière au XVe siècle de la famille de Rousset, cette famille avait un lien de parenté avec le comte de Forcalquier et le comte de Provence portait les mêmes armes que ses princes, la croix de Toulouse. Ils gardèrent la seigneurie jusqu'en 1550 par la descendance de Rousset et des villages voisins Rochebrune , Prunières, Hauterives, Espinasse, Orcières,  Ancelle et Montorsier . Cette famille termina dans le château de Prunières jusqu'en 1692 et retourne au château de Rousset toujours dans la descendance.         Rochebrune; village de Bréziers dépendait de l'évêché d'Embrun.","architecture":"ROUSSET; il y avait au Moyen-Age un château dont   il ne reste plus de vestige, la grande bâtisse transformée en habitation était un ancien château seigneurial. Le château de Prunières fut détruit en 1692 par le duc de Savoie.","habitants":"Famille de Rousset\"","divers":"Manoir de Rousset","gps":"","images":["../../jctruffet.com/image/image_05/05_Rousset_Rochebrune_1.jpg","../../jctruffet.com/image/image_05/05_Rousset_Rochebrune_2.jpg","../../jctruffet.com/image/image_05/05_Rousset_Rochebrune_3.jpg"]},"Consult_chateau_formulaire6149":{"id":"Consult_chateau_formulaire6149","dept":"05","canton":"Veynes","commune":"Le Saix","nom":"Saix_Clausonne","type":"Vestiges","periode":"XV","histoire":"SAIX; au XIIe siècle le premier château  fut donné par le  baron Reynier de Val d'Oze  à un vassal qui en fera l'une des plus importante seigneurie du Val d'Oze, au XVe siècle cette seigneurie passe à la famille de Gruel qui la gardera jusqu'en 1770 dont un descendant chevalier fut tué à la bataille de Verneuil en 1424 son fils sera président au parlement  du Dauphiné à Grenoble. La famille de Gruel fera reconstruire une bâtisse  au XVIe siècle sur le haut du village.           En 1185 l'Ordre de Chalais construit l'abbaye de Clausonne, enfermée au centre des collines du Mont-Aujour.","architecture":"Saix; il ne reste presque plus rien de  la citadelle, bases de tours rondes  et pans  de remparts, donjon du XI-XIIe siècle ensemble quadrangulaire qui se dressait encore au XVIe siècle, ces ruines servirent de carrière pour construire le village suite à sa destruction en 1573 par les guerres de religion (Montbrun et Lesdiguières) ainsi que l'abbaye de Clausonne.","habitants":"Famille de Gruel\"","divers":"Vestiges de l'Abbaye de Clausonne","gps":"","images":["../../jctruffet.com/image/image_05/05_Saix_Clausonne_1.jpg","../../jctruffet.com/image/image_05/05_Saix_Clausonne_2.jpg","../../jctruffet.com/image/image_05/05_Saix_Clausonne_3.jpg","../../jctruffet.com/image/image_05/05_Saix_Clausonne_4.jpg","../../jctruffet.com/image/image_05/05_Saix_Clausonne_5.jpg"]},"Consult_chateau_formulaire40df":{"id":"Consult_chateau_formulaire40df","dept":"05","canton":"Orpierre","commune":"Saléon","nom":"Saleon_Eyguians","type":"Vestiges","periode":"XV","histoire":"SALEON; au Moyen-Age, \"castrum saléonis\" en 1390 sous le nom de Celéoni, appartenait à la puissante baronnie des Mévouillon, puis passa a Armand de Grisail en 1435 et à Lentelme de Bonne 1560, ce dernier est mentionné vers 1491 comme prieur de Saléon, en 1597 Robert David de la Maison Ferrus des Achards,  seigneur de Sainte Colombe de Saléon  vend à Daniel d'Arnaud qui se dernier la revend en 1602 à Jean Falcon sieur d'Herbeys par alliance passera à Florant de Renard conseillé du roi cèderont en 1640 Saléon au seigneur François d'Yse, évêque de Rodez, dans cette famille  jusqu' à la Révolution. Eyguians; du XI-XIIe siècle dépendait de la seigneurie de Mévouillon, seigneurs  de l'Arzeliers, ces derniers y firent construire les remparts, le village pris le nom de Eyguians qu'en 1666 le château fut habité en 1920 par la famille Chauvet.","architecture":"Saléon, vestiges du château  du XIVe siècle transformé en ferme il reste une cave voutée supportée par un pilier du XIe siècle armorie des Mévouillon. Eyguians le château seigneuriale transformé en ferme.","habitants":"Baronnie des Mévouillon\"","divers":"Vestiges","gps":"","images":["../../jctruffet.com/image/image_05/05_Saleon_Eyguians_1.jpg"]},"Consult_chateau_formulairedc89":{"id":"Consult_chateau_formulairedc89","dept":"05","canton":"Serres","commune":"Savournon","nom":"Savournon","type":"Vestiges","periode":"XII","histoire":"SAVOURNON; au XIe siècle les seigneurs de Savournon étaient de la famille d'Agoult dont le premier, Rostaing en 1200, ensuite les sires Augier en 1377 et  Bersac jusqu'au XVIe siècle, le seigneur de la Val-d'Oze au dernier des d'Agoult \"Raymond\". Le connétable Lesdiguières acquit à Hugues de l'Here la seigneurie en 1589. Le dernier seigneur de Savournon fut Gabriel de Rastel de Rocheblave, fils de Jean-Joseph qui eut vingt et un enfants qui durent émigrés à la Révolution, il y eut; Philippe officier, député canadien, marchand de fourrures, Simon est mort en Louisiane, Ambroise mort au Canada, Issidore mort au Sénégal, Paul mort en Louisiane, Thomas mort aux Indes, Joseph et Alexandre tué au siège de Villefrance et paul Gabriel mort à Saint-Domingue.","architecture":"Savournon; au XIIe siècle situé sur une voie romaine de Monestier d'Allemont à la Bâtie Mont-Saléon, au sommet du Rocher était construit le château de l'Aigle dont  il ne reste que les ruines du donjon, et ruines d'un autre château de la Buissière du XIIIe siècle.          Dans la plaine château des Rocheblave du XVIIIe siècle.","habitants":"Famille de Rastel de Rocheblave\"","divers":"Motte féodale et vestiges","gps":"","images":["../../jctruffet.com/image/image_05/05_Savournon_1.jpg","../../jctruffet.com/image/image_05/05_Savournon_2.jpg","../../jctruffet.com/image/image_05/05_Savournon_3.jpg","../../jctruffet.com/image/image_05/05_Savournon_4.jpg","../../jctruffet.com/image/image_05/05_Savournon_5.jpg"]},"Consult_chateau_formulairef61d":{"id":"Consult_chateau_formulairef61d","dept":"05","canton":"Serres","commune":"Serres","nom":"Serres_05","type":"Vestiges","periode":"XIII","histoire":"SERRES; au Moyen-Age la cité repris vie par l'arrivé des moines du Lerins qui durent se fortifier enceinte et tours, elle devient une cité commerciale entre juifs et Lombards.                       Au XIIIe siècle,  fief des Mévouillons, en 1285 Bertrand  de Mévouillon, seigneur de Serres et de Mison, fils  de Mison et de demoiselle Calburge donna libertés et franchises, puis aux comtes de Provence du royaume d'Arles, passa au dauphin en 1317, en 1337 Serres reçut  le bailliage par le Dauphin qui était à Upaix, le Dauphin  possédait une maison de bailly, petite forteresse que gouvernait un châtelain; retrait du bailliage en 1512 par Louis II.                             Serres au XVIe siècle était une place de sûreté pour les protestants. François de Bonne en 1576 achète la seigneurie possession des lieux se fait construire une maison, à la façade renaissance aujourd'hui mairie.                      Un peu au sud le donjon de Montrond ruiné du XIIe siècle à 821m d'altitude quadrilatère de 8,17 x 7,92 m de 10 m de haut en 1209 Guigues de Montrond en 1292 Philippe de Laveno racheta ce château pour le rendre au dauphin. Dans le canton au village Epine une maison forte.","architecture":"Serres, village fortifié a gardé en vestiges ses  remparts et tours (tours de Molend et de Portalet) et  ses portes , la Saint-Claude au nord qui était la principale,  la porte Sainte-Catherine à l'ouest  et la porte d'Eyguières encore visible ont été conçut en 1309 lors de l'installation des papes à Avignon.      La maison du connétable Lesdiguières présente une façade renaissance et un riche décor intérieur, autour d'un puits de lumière.                         Epine: Maison forte et des remparts autour du bourg du XIII e siècle,  le village a été détruit pendant les guerres de religion par Dupuis-Montbrun, remonté au XVIIe siècle et démantelé au XVIIIe siècle. Le château dans le village a été remplacé par un moulin à vent de 1800, subsiste trois portes fortifiés.         A Montrond vestiges d'un donjon carré du XIIe siècle comportant une porte romane.","habitants":"Famille de Bertrand de Mévouillons\"","divers":"Vestiges de portes et de tours dans la ville, façade du château et vestiges de la tour de Montrond","gps":"","images":["../../jctruffet.com/image/image_05/05_Serres_05_1.jpg","../../jctruffet.com/image/image_05/05_Serres_05_2.jpg","../../jctruffet.com/image/image_05/05_Serres_05_3.jpg","../../jctruffet.com/image/image_05/05_Serres_05_4.jpg","../../jctruffet.com/image/image_05/05_Serres_05_5.jpg","../../jctruffet.com/image/image_05/05_Serres_05_6.jpg"]},"Consult_chateau_formulairec91a":{"id":"Consult_chateau_formulairec91a","dept":"05","canton":"Serres","commune":"Sigottier","nom":"Sigottier","type":"Maison forte","periode":"XV","histoire":"SIGOTTIER; Cigotier en 1240, Sigottier en 1515. Au XIIe siècle faisait partie de la seigneurie des Mévouillon passa au XIIIe siècle en plusieurs co-seigneuries jusqu'au XVIe siècle. Tel que les Bertrand de 1247 à 1263, les Galgurge de 1263 à 1267, les d'Amorosio qui  l'a reçoit du Dauphin de 1330 à 1387; aux de Beaume, Louis de Roux racheta les co-seigneuries en 1564,  Léotard racheta la part de Louis de Pontis et celle des Roux en 1661 et revend les co-seigneuries a Ennemond Moret  en 1670. Les co-seigneuries étant ralliés, racheté par les de la Pierre  et ce fut la dernière fille d'Achille qui par alliance passa la seigneurie à Jacques de la Flotte et repassa aux Raymond de 1718 à 1803.","architecture":"Sigottier; du premier château il ne reste plus rien le deuxième dont la tour servait de guet pour le passage transformé en ferme.","habitants":"Jacques de la Flotte\"","divers":"Manoir","gps":"","images":["../../jctruffet.com/image/image_05/05_Sigottier_1.jpg"]},"Consult_chateau_formulaire011e":{"id":"Consult_chateau_formulaire011e","dept":"05","canton":"Tallard","commune":"Sigoyer","nom":"Sigoyer","type":"Vestiges","periode":"XIII","histoire":"SIGOYER; dépendait de l'Abbaye de Chardavon, ancienne possession des évêques de Gap.                         La famille de Roux fut seigneur et co-seigneur de Sigoyer jusqu'en 1667, puis érigé en marquisat en 1719 avec Beynes et en 1792 à Pierre Laidet. Le comte Jean-Jacques de Gruel était seigneur à la Révolution a préféré s'enfuir et émigré alors que la comtesse née Caritat de Condorcet est restée au château jusqu'à sa mort. Après la Révolution le seigneur était Dominique-Jacques-Christophe de Bernardy marquis de Sigoyer, chevalier de l'ordre de Saint-Louis et compagnon de Lafayette, la famille de Bernardy gardère le château jusqu'en 1871.","architecture":"Sigoyer; ruines importantes du XIIe siècle de l'ancien château des seigneurs de Sigoyer entouré d'enceinte circulaire formant terrasse  et corps de logis contourné de tours du XIVe siècle. Bien qu'il fut endommagé par les guerres de religion et à la Révolution une partie est habitable mais privé.","habitants":"Famille de Roux\"","divers":"Vestiges et château","gps":"","images":["../../jctruffet.com/image/image_05/05_Sigoyer_1.jpg","../../jctruffet.com/image/image_05/05_Sigoyer_2.jpg","../../jctruffet.com/image/image_05/05_Sigoyer_3.jpg","../../jctruffet.com/image/image_05/05_Sigoyer_4.jpg","../../jctruffet.com/image/image_05/05_Sigoyer_5.jpg","../../jctruffet.com/image/image_05/05_Sigoyer_6.jpg","../../jctruffet.com/image/image_05/05_Sigoyer_7.jpg","../../jctruffet.com/image/image_05/05_Sigoyer_8.jpg"]},"Consult_chateau_formulaire4398-2":{"id":"Consult_chateau_formulaire4398-2","dept":"05","canton":"Rosans","commune":"St-André-de-Rosans","nom":"St_Andre_Rosans","type":"Vestiges","periode":"X","histoire":"St-ANDRE de Rosans; au IXe siècle fief de la puissante famille des Barons de Mévouillon qui fondèrent un prieuré bénédictins.  Au Xe siècle Clerc Richaud seigneur du fief, son fils Roncelin de Lunel fit une donation à l'église pour édifié un prieuré, la gestion fut confiée a l'abbaye de Cluny qui construisit le prieuré le plus important de la région, mais il eut que cinq à six moines, puis tomba à l'abandon au XVe siècle.         Le fief passa aux Montauban. Fut la capitale régionale avec le  prieuré Saint-André le fief dépendait  de Rosans, le château le plus peuplé et le plus taxé, mais subit le dégât des guerres de religion.                               En 1873 François Gros lieutenant châtelain.","architecture":"Saint-André de Rosans château construit au XIIIe siècle sur l'emplacement d'une grande villa.  Lors des guerres de religion au XVIe siècle Dupuy-Montbrun incendie le prieuré.                      Le village fut fortifié, vestiges  d'enceinte et de la porte Ayguière et porte du château qui est transformé en châmbres d'hôtes.","habitants":"Roncelin de Lunel\"","divers":"Vestiges du prieuré et château","gps":"","images":["../../jctruffet.com/image/image_05/05_St_Andre_Rosans_1.jpg","../../jctruffet.com/image/image_05/05_St_Andre_Rosans_2.jpg","../../jctruffet.com/image/image_05/05_St_Andre_Rosans_3.jpg","../../jctruffet.com/image/image_05/05_St_Andre_Rosans_4.jpg","../../jctruffet.com/image/image_05/05_St_Andre_Rosans_5.jpg"]},"Consult_chateau_formulaire9fc4":{"id":"Consult_chateau_formulaire9fc4","dept":"05","canton":"St-Bonnet","commune":"St-Bonnet","nom":"St_Bonnet_Champsaur","type":"Vestiges","periode":"XIV","histoire":"ST-BONNET;  du Xe au XIe siècle fief du Dauphin,  un châtelain fut installé en 1611 est ce dernier  fortifia le village qui perdit tour est rempart au XVIe siècle.                                 La famille de Bonne acheta les droits du Dauphin au début du XIVe siècle et fut propriétaire  de tout le domaine delphinal au XVIe siècle, en 1611 lorsque fut créé le duché de Lesdiguières Saint-Bonnet en devient la capitale.           Dans la commune la maison forte de Daillon était la propriété de Vincent Vial seigneur de Daillon transformé en ferme à la Révolution.                   BARTHELEMY; maison du XVIe siècle de la noblesse  transformé en ferme.","architecture":"St-Bonnet; des fortifications il ne reste plus rien sinon une tour ronde du château accolée aux diverses constructions, maison natale de Lesdiguières (poste).    Dans la commune une maison forte du XIIIe siècle reconstruite au XVIIe siècle avec deux corps de logis en équerre, dont un  reconstruit en 1867  avec une tour ronde et une tour carrée aux extrémités Barthélémy; maison forte   avec corps de logis  à deux étages et tour centrale (escaliers).","habitants":"Famille De Bonne\"","divers":"Maison forte avec tour.","gps":"","images":["../../jctruffet.com/image/image_05/05_St_Bonnet_Champsaur_1.jpg","../../jctruffet.com/image/image_05/05_St_Bonnet_Champsaur_2.jpg","../../jctruffet.com/image/image_05/05_St_Bonnet_Champsaur_3.jpg","../../jctruffet.com/image/image_05/05_St_Bonnet_Champsaur_4.jpg"]},"Consult_chateau_formulaire4994":{"id":"Consult_chateau_formulaire4994","dept":"05","canton":"St-Firmin","commune":"St-Firmin","nom":"St_Firmin","type":"Vestiges","periode":"XII","histoire":"ST-FIRMIN; Construit en 1376 pour protéger la population contre les mercenaires qui ravageaient le pays sur demande de Du Guesclin et du gouverneur du Dauphiné Charles seigneur de Bouville, qui entraîna un procès de sept ans entre Pierre d'Ambel et Jean de la Gravière tous deux  religieux  de la paroisse de Saint-Firmin.                             En 1891 Saint-Firmin vit naître le colonel Jacques Roux  du 4e RTT, il fut tué lors de la prise du belvédère de la bataille de Casino en Janvier 1944.","architecture":"St_Firmin; du château construit au XIVe siècle sur une esplanade rocheuse sur laquelle il ne reste  que des vestiges, la tour du donjon à quatre étages, une tour de guet existé à l'opposée et des courtines encore apparentes, ce château paraît avoir été détruit bien avant la Révolution, il a était construit en face du château de Lesdiguières de l'autre côté du Drac, il devait y avoir des passages souterrains à l'époque. Une association locale a entrepris des travaux de sauvegarde des ruines.","habitants":"Pierre d'Ambel\"","divers":"Vestiges du château de Saint-Firmin.","gps":"","images":["../../jctruffet.com/image/image_05/05_St_Firmin_1.jpg","../../jctruffet.com/image/image_05/05_St_Firmin_2.jpg","../../jctruffet.com/image/image_05/05_St_Firmin_3.jpg","../../jctruffet.com/image/image_05/05_St_Firmin_4.jpg","../../jctruffet.com/image/image_05/05_St_Firmin_5.jpg","../../jctruffet.com/image/image_05/05_St_Firmin_6.jpg","../../jctruffet.com/image/image_05/05_St_Firmin_7.jpg","../../jctruffet.com/image/image_05/05_St_Firmin_8.jpg"]},"Consult_chateau_formulaire1d9b":{"id":"Consult_chateau_formulaire1d9b","dept":"05","canton":"St-Bonnet","commune":"St-Léger-les-Mélézes","nom":"St_Leger_Melezes","type":"Château","periode":"XV","histoire":"ST_LEGER les Mélèzes; appelé au départ le Serre ou fut édifié le premier château par les moines de Saint-André de Rosans, ces derniers avaient fondés le prieuré filiale de Cluny le fief passa aux évêques seigneurs et en 1250 au dauphin.  Un château fut construit par la famille Faudon au XVe siècle sur les bases d'une maison forte,  une enceinte fut construite par Salomon de Serre évêque de Gap puis passa à  la famille Brochier  en 1801 passa à monseigneur de Sixt évêque de Narbonne et acquit et réaménagé en 1877 par la famille Lavalette.","architecture":"Saint-Léger les Mélézes corps de logis  tours rondes à toits pointus délimitant la propriété.","habitants":"Famille Faudon\"","divers":"Manoir de St-Leger","gps":"","images":["../../jctruffet.com/image/image_05/05_St_Leger_Melezes_1.jpg","../../jctruffet.com/image/image_05/05_St_Leger_Melezes_2.jpg","../../jctruffet.com/image/image_05/05_St_Leger_Melezes_3.jpg","../../jctruffet.com/image/image_05/05_St_Leger_Melezes_4.jpg"]},"Consult_chateau_formulaire9d9e":{"id":"Consult_chateau_formulaire9d9e","dept":"05","canton":"Rosans","commune":"Ste-Marie-Rosans","nom":"Ste_Marie_Rosans","type":"Maison forte","periode":"XVI","histoire":"Ste-MARIE de Rosans; le fief au Xe siècle appartenait a la famille de Rosans, la tenait  des  Mévouillon fut hommagé en 1251 à l'abbé de l'Ile Barbe.           Le premier castrum fut vendu en 1305, la région fut annexé au Dauhiné, en 1317, puis remanié  en 1579 par un Sainte-Marie compagnon de Lesdiguières, la résidence seigneuriale passa aux de Flotte, puis aux Rivière, en 1600 Jean André d'Yse achète la seigneurie de Rosans qu'il gardera jusqu'à la Révolution.      Transformé en ferme.","architecture":"Ste-Marie de Rosans, résidence seigneuriale,  un donjon quadrangulaire  du XIIe siècle 10m de côté 15m de haut réduit à 6m, corps de logis de plan en U cour avec porte cochère flanqué d'une tour circulaire percée de canonnières à la base seul tour restante sur quatre.   Un long mur et son porche surmontait de mâchicoulis.","habitants":"Famille de Flotte                        Famille d'Yse\"","divers":"Vestiges","gps":"","images":["../../jctruffet.com/image/image_05/05_Ste_Marie_Rosans_1.jpg","../../jctruffet.com/image/image_05/05_Ste_Marie_Rosans_2.jpg"]},"Consult_chateau_formulaire7880":{"id":"Consult_chateau_formulaire7880","dept":"05","canton":"Gap","commune":"Tallard","nom":"Tallard","type":"Vestiges","periode":"XIV","histoire":"TALLARD: Bourg médiévale; Fief des princes d'Orange au XIe siècle y firent construire un premier château qui ces derniers  cédèrent en 1215 Tallard aux chevaliers de Saint-Jean de Jérusalem, il ne reste plus rien du premier château.   Au XIVe siècle  Arnaud de Trians seigneur de Tallard neveu du pape Jean XXII fit construire le château, Anne, l'arrière  petite fille  d'Arnaud de Trians  épouse en 1408 Antoine de Sassenage qui sera retransmit par alliance par la fille aux de Clermont, Anne de Husson comtesse de Tonnerre qui donna naissance à la maison Clermont-Tonnerre, et c'est à Bernardin de Clermont en 1480  que l'on doit la construction du château.                 Après les guerres de religion  la seigneurie passe à Etienne de Bonne d'Auriac commandant de la ville de Gap,  Antoine Rambaud gouverne la place forte de Tallard; Etienne chassé par son cousin  François de Bonne se réfugie à Tallard en 1577 qui finit par récupérer le château en 1589 et en 1600 Etienne acquit le château et passe par alliance à Roger d'Hostun sénéchal de Lyon, son fils Camille d'Hostun duc de Tallard en 1703 reçoit le bâton de maréchal de France et en 1692 le château sera incendié par les troupes du duc de Savoie et passera par héritage  à Françoise  de Sassenage et sa fille  Marguerite de Béranger   qui le laisseront à l'abandon.                 Pillé à la Révolution et les vestiges seront acquis  en 1897 par Monsieur Joseph Roman qui entreprit la restauration et sera poursuivit par le comte Gaspard de Clermont-Tonerre qui racheta le château en 1926 poursuivra jusqu'en 1957 date de l'acquisition par la commune.                           Dans la commune château de la Garenne du XII-XIVe siècle fortifié sur un éperon  et château de la Croix.","architecture":"Tallard: château sur un éperon dominant la Durance style médiévale fortifié du XIV-XVIe siècle, enceinte cantonnée de tours écrêtés circulaires et une  tour carrée dite \"de prison\" ou l'on accède au trois cours par un porche d'entrée en plein cintre flanqués de deux tours rondes, l'enceinte avec tours circulaires  abrite une vaste cour intérieure corps de logis et un logis seigneuriale.                            La chapelle  façade de style gothique.","habitants":"Famille de Bernardin de Clermont\"","divers":"Vestiges du château sur motte","gps":"","images":["../../jctruffet.com/image/image_05/05_Tallard_1.jpg","../../jctruffet.com/image/image_05/05_Tallard_2.jpg","../../jctruffet.com/image/image_05/05_Tallard_3.jpg","../../jctruffet.com/image/image_05/05_Tallard_4.jpg","../../jctruffet.com/image/image_05/05_Tallard_5.jpg","../../jctruffet.com/image/image_05/05_Tallard_6.jpg","../../jctruffet.com/image/image_05/05_Tallard_7.jpg","../../jctruffet.com/image/image_05/05_Tallard_8.jpg"]},"Consult_chateau_formulairea73c-2":{"id":"Consult_chateau_formulairea73c-2","dept":"05","canton":"Veynes","commune":"Montmaur","nom":"Terrail_Montmaur","type":"Château","periode":"XIII","histoire":"TERRAIL; berceau de   famille du Terrail de noblesse militaire, venue de la Bâtie-Monsaléon attribué aux chevalier de François Ier  \"Bayard\" appelé aussi le seigneur du Terrail.                    lieu de  Pierre-Alexis Ponçon du Terrail  écrivain.","architecture":"Château composé d'un corps central  de bâtiment  encadré d'un donjon crénelé et d'une petite tour ronde.","habitants":"Chevalier Bayard \"","divers":"Château de Terrail","gps":"","images":["../../jctruffet.com/image/image_05/05_Terrail_Montmaur_1.jpg"]},"Consult_chateau_formulaireb9bc":{"id":"Consult_chateau_formulaireb9bc","dept":"05","canton":"Laragne-Montéglin","commune":"Upaix","nom":"Upaix","type":"Vestiges","periode":"XVII","histoire":"UPAIX; chef lieu du Bailliage pour le Gapençais, mais en 1337 le dauphin le transfera à Serres Le château fut la propriété de la famille  Amat dans les années 1650, Jacques Amat seigneur d'Upaix originaire de Catalogne arrivé dans la suite  des comtes de Barcelone il fut aussi gouverneur du château Dauphin, conseillé d'état ordinaire, trésorier général, secrétaire et maître d'hôtel de Louis XIII fait construire le château de Concis au Poët non loin d'Upaix dont il venait d'acheter la seigneurie.","architecture":"Upaix; village perché avec belle vue sur la vallée de la Durance et du Buëch, Porche d'entrée de la demeure seigneuriale du XIVe siècle en forme d'arc brisé font partie du château.","habitants":"famille  Amat \"","divers":"Vestiges féodals","gps":"","images":["../../jctruffet.com/image/image_05/05_Upaix_1.jpg","../../jctruffet.com/image/image_05/05_Upaix_2.jpg","../../jctruffet.com/image/image_05/05_Upaix_3.jpg","../../jctruffet.com/image/image_05/05_Upaix_4.jpg"]},"Consult_chateau_formulairefbf5":{"id":"Consult_chateau_formulairefbf5","dept":"05","canton":"Laragne-Montéglin","commune":"Ventavon","nom":"Ventavon","type":"Vestiges","periode":"XIV","histoire":"VENTAVON: Au Moyen-Age fief des seigneurs de Chardavon, puis trois familles sont étroitement liées à ce lieu : les Moustiers, les Agoult et les Oraison.    Jacques Rambaud de Furmeyer  et co-seigneur de Montgardin qui avait épousé à Ventavon Louise de Moustiers (1540-1607). La fille de Charles de Moustiers, Suzanne, en 1590, épouse Jacques de Morges. Cest leur fils, Jean Balthazar, qui héritera du château. Il devint Gouverneur de Tallard en 1562. Il perdit, le 8 mai 1573, la bataille de la Batie-Mont-Saleon contre Montbrun et Lesdiguères et mourut en 1585 après avoir pris part à une foule de combat, mais sans descendance.  Barthélemy Tournu achète Ventavon en 1745. Son dernier descendant, Edouard, 1780  1789, est le dernier à vivre en permanence  dans sa demeure seigneuriale. Ses descendants, les Tournu de Ventavon, illustrèrent le Dauphiné par leur conduite et leur valeur. La famille de monsieur Guignard en prend possession en 1925 lors d'une vente aux enchères, arrière-grand-mère de Jérôme Poiret, actuel propriétaire.","architecture":"Ventavon; Château du XVe  très remanié, ancienne demeure féodale (hôtel  du XVIIe siècle) avec très belle porte  et portail style Louis XIII avec fronton triangulaire s'ouvrant sur le village.","habitants":"monsieur Guignard\"","divers":"Château de Ventavon","gps":"","images":["../../jctruffet.com/image/image_05/05_Ventavon_1.jpg","../../jctruffet.com/image/image_05/05_Ventavon_2.jpg","../../jctruffet.com/image/image_05/05_Ventavon_3.jpg"]},"Consult_chateau_formulaire9fe7-2":{"id":"Consult_chateau_formulaire9fe7-2","dept":"05","canton":"Veynes","commune":"Veynes","nom":"Veynes","type":"Château","periode":"XII","histoire":"VEYNES: Les de Veynes qui donnèrent leur nom au village au XIe siècle en furent les seigneurs par alliance et descendance jusqu'à la Révolution. Il y eu quatre branches celle qui garda la ville de Veynes s'appelait les de  Veynes, une deuxième toujours à Veynes mais qui s'appelait les de Vilette d'où le nom du château la troisième branche s'appela de Châteauvieux ,un hameau voisin et la quatrième l'Echaréne nom de la tour construite au XIIe siècle. La seigneurie de Veynes fit plusieurs achats aux cours des siècles la seigneurie de Chichiliane vers 1400, la seigneurie du Prayet en 1629 la seigneurie de Bourg les Valence (26) et de l'Isle Adam (78).             En 1121 Boson seigneur de Veynes 1297 Hugues seigneur d'Upaix et de Veynes 1324 Guillaume établi en Grésivaudan, 1376 Guillaume dit le forestier seigneur de Veynes et de Chichiliane par son épouse Catherine de Roux. En 1410 Isnard fils de Guillaume  seigneur de Chichiliane.      En 1465 Melchior, fut tué à Montléry.    En 1513 Jean seigneur de Veynes et de Chichiliane.                            En 1567 Louis son fils doyen du Chapitre de Valence.                              En 1626 Abel seigneur de toutes les seigneuries et capitaine des chevaux légers.                                 En 1638 Charles fils d'Abel doyen chapitre de Valence.                     En 1645 à son fils Pierre-Louis.        En 1695 son fils Claude érigea Bourg les Valence en marquisat.                   En 1750 Louis jean-Baptiste son fils  vend les terres de Veynes à Charles de Révillasc; les seigneuries aboutissent par alliance aux Maugiron, aux Sassenage, marquis de Béranger et Bourg-les-Valence à la ville en 1798 et à la descendance de Jean du plan de Sièyes.","architecture":"Veynes; vestiges de remparts, ruine d'une tour carré  dit de la Bastionne ou de l'Echaréne du XIIe siècle; Le château de Révillasc remanié deux portes en accolade Les maisons des communs ancien hôtel particulier du XVIIIe siècle était la propriété des Révillasc-Colonne, puis au marquis de Brimard devient maison d'école fut en 1970 la propriété d'Adrien Ruelle et écomusée en 1999 et château d'Aiguebelle.  Ancien château de Vilette du XVIe siècle avec porte gothique et tour ronde (Mairie).","habitants":"Les seigneurs de Veynes,               les seigneurs de Vilette\"","divers":"Patrimoine de Veynes","gps":"","images":["../../jctruffet.com/image/image_05/05_Veynes_1.jpg","../../jctruffet.com/image/image_05/05_Veynes_2.jpg","../../jctruffet.com/image/image_05/05_Veynes_3.jpg"]},"Consult_chateau_formulaire23de":{"id":"Consult_chateau_formulaire23de","dept":"05","canton":"Barcillonnette","commune":"Vitrolles","nom":"Vitrolles (05)","type":"Vestiges","periode":"XII","histoire":"VITROLLES; dépendait au XVe siècle de l'Abbaye de Chardavon de Saint-Geniez. Puis fut la propriété d'une grande noblesse de Provence, Eugène-François-Auguste d'Arnaud baron de Vitrolles qui n'acquit dans ce château en 1774 était membre du collège électoral des Hautes-Alpes, il fut nommé baron de l'empire en 1812,  puis ambassadeur ministre d'état et grand officier de la légion d'honneur, son fils Oswald conseiller général des Hautes-Alpes marié à melle d'Arbaud Jouques en 1831, Oswald décéda en 1876 à Tournon (07).","architecture":"Vitrolles; le château seigneurial en ruines sur un mamellon voisin du village on le nomme \"Châtelard\"  comprenait deux parties, une ancienne tour carrée sur le point culminant de la colline du XIIe siècle et l'autre partie corps du bâtiment qui fait saillir extérieurement sur la façade une tour ronde à chaque angles.","habitants":"Abbaye de Chardavon\"","divers":"Vestiges de l'Abbaye","gps":"","images":["../../jctruffet.com/image/image_05/05_Vitrolles_1.jpg","../../jctruffet.com/image/image_05/05_Vitrolles_2.jpg","../../jctruffet.com/image/image_05/05_Vitrolles_3.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','05 — Hautes-Alpes'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)showDet(start);
</script></body></html>
