lençon. La princesse de Talmont est seigneur du château. Son mari, chef de l'armée vendéenne au Mans, fut condamné à mort et guillotiné le 8 pluviose (27 janvier 1794), devant son château de Laval. En 1862 la propriété appartient à la famille Blondel-Gonichon. En 1901 la demeure est acquise par M. Maurice Meunier du Houssoy, gendre du général de Boisdeffre. Le château est aujourd'hui la propriété de la famille Le Barbier. Gîtes.                                                                                  RAGOTIERE, c'est un ancien château construit au XVIIIe siècle. C'est devenu un excellent hôtel-restaurant, de style Renaissance.","habitants":"famille de Landemont\r\n        \r\n        \"","divers":"A  Vaux voir Arches  grav- 8-9 Auvour grav-7.       Ragotière  grav- 5-6-   Yvré Vaux  grav-1-2-3-4-                                              GPS : 48° 00' 54\" Nord et 0° 16' 02\" Est","gps":"48° 00' 54\" Nord et 0° 16' 02\" Est","images":["../../jctruffet.com/image/image_72/72_Vaux_Yvr%c3%a9_1.jpg","../../jctruffet.com/image/image_72/72_Vaux_Yvr%c3%a9_2.jpg","../../jctruffet.com/image/image_72/72_Vaux_Yvr%c3%a9_3.jpg","../../jctruffet.com/image/image_72/72_Vaux_Yvr%c3%a9_4.jpg","../../jctruffet.com/image/image_72/72_Vaux_Yvr%c3%a9_5.jpg","../../jctruffet.com/image/image_72/72_Vaux_Yvr%c3%a9_6.jpg","../../jctruffet.com/image/image_72/72_Vaux_Yvr%c3%a9_7.jpg","../../jctruffet.com/image/image_72/72_Vaux_Yvr%c3%a9_8.jpg","../../jctruffet.com/image/image_72/72_Vaux_Yvr%c3%a9_9.jpg"]},"Consult_chateau_formulaire6d66":{"id":"Consult_chateau_formulaire6d66","dept":"72","canton":"Le Lude","commune":"Luché-Pringé,","nom":"Venevelles","type":"Château","periode":"XV-XVII","histoire":"VENEVELLES, au XIIe siècle, un Guillaume de Vernecelles est nommé dans les vassaux de Courcelles. En 1239, Guillaume et Jean de Vernecelles sont vassaux d'Oizé et de Mayet. La famille d'Espaigne n'apparaît à Venevelles qu'à la fin du XIIIe siècle avec un certain Herbert d'Espaigne seigneur d'Aunay, Vénévelles et Coullaines. Cette famille est originaire de Saint-Gervais-en-Belin à 25 km au nord de Luché. En 1403, Venevelles relève de l'hébergement de Passau. Pendant tout le XVe siècle, le seigneur de Venevelles est aussi seigneur d'Aunay et des Roches. En 1572, Geoffroy fils de Jean II d'Espaigne achète le fief de Coullaines à François II de Dureil (famille de sa mère). Durant tout le XVIe siècle, la famille d'Espaigne s'implante dans les environs. L'un des fils de Lazare Ier, Lazare II demeure à Coullaines. Au XVIIe siècle, Henri d'Espaigne est gentilhomme de la chambre du roi (Louis XIII) en 1638, et il se marie à Suzanne Le Vasseur-Cogners en 1643. En 1640, il avait hérité d'un domaine de près de cinquante fermes. Il meurt en 1656. Norbert Dufourcq (1988) pense que ce sont Henri et Suzanne qui agrandissent et modernisent le château de Venevelles. Les d'Espaigne appartiennent à la religion prétendue réformée. Le 6 germinal an VII, Venevelles séquestré comme bien national est vendu à un certain Jouanneau puis racheté par Alexendrine-Thérèse, comtesse de Venevelles le 3 germinal an X. La famille d'Espaigne ne parvient pas à conserver ses biens qui sont peu à peu vendus. Enfin Venevelles est vendu à Armand Constant Lebaigue vers 1812.","architecture":"HAYES le VICOMTE    La construction du manoir des Hayes-le-Vicomté date des XVIe, XVIIe et XVIIIe siècles.                                                                                                                       VENEVELLES, de la fin du XVe siècle, il ne reste que le volume du logis principal et la chapelle bénie en 1503. Le corps de logis principal construit ou reconstruit à la fin du XVe siècle forme un L ponctué de deux tourelles circulaires situées à chaque extrémité. La plate forme quadrangulaire flanquées de pavillons carrés peut dater de la fin de XVIe siècle ou du début du XVIIe siècle. L'ensemble de la plate forme fossoyée du logis, de la chapelle et de la ferme régularisée et flanquée de quatre pavillons carrés et dissemblables, pourrait être de la fin du XVIe siècle ou tout début XVIIe siècle avec la construction des communs au nord de la cour. Le petit portail au fronton interrompu qui communique avec le jardin présente les anagrammes de Henri d'Espaigne et Suzanne Levasseur. L'escalier actuel à deux volées droites en pierre avec rampe en fer forgé date du début du XVIIIe siècle. L'ensemble du décor intérieur fut modifié au début du XVIIIe siècle : plafond du premier étage surélevé, lambris et cheminées remaniés. Un petit pavillon est accolé à la façade sud du logis et donne sur un petit jardin privé. Un moulin situé en amont sur la rivière de l'Aulne, permet de réguler le cours et maintenir le niveau des douves. Aujourd'hui, la plateforme du château et des communs est occupée par une cour et les communs sont dissimulés par un groupe de séquoïas, protégés MH : l'ensemble des bâtiments et des sols du manoir ; l'ensemble délimité à l'Est, au Sud et à l'Ouest par les douves, au Nord par les bâtiments de ferme : inscription par arrêté du 21 janvier 1963.","habitants":"Venevelles; famille d'Espaigne \r\n        \"","divers":"deux châteaux à luché-Pringé le Venevelles et la Haies le Vicomte.                                                                                          Haies GPS : 47° 42' 8,43\" Nord et 0° 6' 33\" Est","gps":"47° 42' 8,43\" Nord et 0° 6' 33\" Est","images":["../../jctruffet.com/image/image_72/72_Venevelles_1.jpg","../../jctruffet.com/image/image_72/72_Venevelles_2.jpg"]},"Consult_chateau_formulairec3fc":{"id":"Consult_chateau_formulairec3fc","dept":"72","canton":"Loué","commune":"Poillé sur Vègre,","nom":"Verdelles","type":"Forteresse","periode":"XV-","histoire":"VERDELLES, château bâti à la fin du XVe siècle, achevé en 1490.Il appartenait à la famille Le Clerc de Juigné. Il lui sera confisqué à la Révolution.  En 1494, Colas Le Clerc de Juigné \"faisant état de preuves exhibées et enregistrées, il lui est permis de faire les dits édifices comme bon lui semblerait\". Jacques Le Clerc de Juigné épouse Juliette de Machecoul en 1659 et en 1664, leur fils Samuel naît à Verdelles. Vers 1680, les Juigné abandonnent leur demeure de Verdelles pour le château de Juigné. Alors, Verdelles restera délaissé et mal entretenu, servant épisodiquement à abriter des fermiers. L'édifice est vendu comme bien national à Mr de La Guérinière en 1792. Il passe entre diverses mains, soit par héritage, soit par achat. Il devient propriété de la famille Coutard, jusqu'en 1976 où il est racheté par Yves Chamberland qui entreprend sa restauration.  Propriété de monsieur Coutard.\r\nÉléments protégés MH : le château de Verdelles en totalité : classement par arrêté du 26 juin 1922.","architecture":"VERDELLES, la construction du château de Verdelles date de 1490 à 1494.   Il lui sera confisqué à la Révolution Il est construit en brique et pierre, de plan rectangulaire, cantonné de quatre tourelles d'angles deux rectangulaires et deux polygonales. Les deux tours carrées servaient à la défense, elles ont conservé leur chemin de ronde à mâchicoulis et créneaux. A l'intérieur, toutes les cheminées à médaillons sont conservées  Dès 1976, des travaux importants pour la restauration du château seront entrepris. Le logis est flanqué de 4 tours carrées, toutes différentes. Le fruit de ces importantes restaurations sera récompensé, en 2003, par l'obtention du Prix des Vieilles Maisons Françaises. Au cur de la Vallée de la Vègre, le château de Verdelles est un M.H. insolite. Le Domaine de dix hectares a été reboisé depuis de 8000 arbres. Bien que privé, il est ouvert au Public et se visite. Les visites du château sont organisées par lAssociation du Patrimoine dAsnières-sur-Vègre. Le château propose des chambres dhôtes et vous accueille pour louer ses salles pour vos réceptions.","habitants":"Famille Le Clerc de Juigné.\r\n        \"","divers":"Verdelles GPS : 47° 54' 01\" Nord, 0° 14' 50\" Ouest","gps":"47° 54' 01\" Nord, 0° 14' 50\" Ouest","images":["../../jctruffet.com/image/image_72/72_Verdelles_1.jpg","../../jctruffet.com/image/image_72/72_Verdelles_2.jpg","../../jctruffet.com/image/image_72/72_Verdelles_3.jpg","../../jctruffet.com/image/image_72/72_Verdelles_4.jpg","../../jctruffet.com/image/image_72/72_Verdelles_5.jpg"]},"Consult_chateau_formulaire2363":{"id":"Consult_chateau_formulaire2363","dept":"72","canton":"La Suze-sur-Sarthe","commune":"Louplande","nom":"Villaines_72","type":"Château","periode":"XVII","histoire":"VILLAINES, édifié au milieu du XVIIe siècle sur les ruines dun château du moyen âge datant du XIIe siècle, le château de Villaines na pas connu de modification ou dajout depuis cette date. Epargné pendant la Révolution, il changea de nom sous lEmpire pour prendre celui de son nouveau propriétaire en 1776, le marquis dAux, qui lavait acheté au dernier représentant de la famille Gaignon qui possédait la terre de Villaines depuis quatre siècles. Au XIXe siècle, le château dAux redevînt le château de Villaines, à loccasion dune nouvelle cession au comte de Gramedo. A la fin de la première guerre mondiale, larmée américaine installa à Villaines le centre de formation des aumôniers militaires. Occupé dès 1940 par les troupes allemandes, Villaines conserve sur sa façade des traces visibles des combats de la libération de juillet 1944. propriété de monsieur Pozdawa Godweski.","architecture":"VILLAINES, la construction du château de Villaines date du XVIIe siècle. Il se situe à 15 ms du Mans, de style classique, est édifié au XVIIe siècle sur les ruines d'une ancienne forteresse du XIIe siècle. La terre de Villaines fut acquise en 1776 par le marquis d'Aux alors qu'elle appartenait auparavant à la famille de Gaignon. Le château pris alors le nom de son nouveau propriétaire avant de redevenir le château de Villaines à la fin du XIXe siècle. Pendant la première Guerre Mondiale, le château de Villaines était un centre de formation pour les aumôniers militaires de l'armée américaine. Il fut occupé par les troupes allemandes, dès 1940, au cours de la seconde guerre mondiale. Son jardin est classé Jardin Remarquable. Mr et Mme Forissier sont les propriétaires du château de Villaines. Éléments protégés MH : les façades et les toitures ; l'escalier avec sa rampe en fer forgé ; les douves avec leur pont et la fuie : inscription par arrêté du 13 septembre 1984.","habitants":"famille Gaignon\r\n        \"","divers":"Vilaines GPS : 47° 55' 38\" Nord et 0° 00' 59\" Est 0","gps":"47° 55' 38\" Nord et 0° 00' 59\" Est 0","images":["../../jctruffet.com/image/image_72/72_Villaines_72_1.jpg","../../jctruffet.com/image/image_72/72_Villaines_72_2.jpg","../../jctruffet.com/image/image_72/72_Villaines_72_3.jpg","../../jctruffet.com/image/image_72/72_Villaines_72_4.jpg"]},"Consult_chateau_formulaire2b01":{"id":"Consult_chateau_formulaire2b01","dept":"72","canton":"Loué","commune":"Viré-en-Champagne","nom":"Viré_Champagne","type":"Château","periode":"XII-XV-XIX","histoire":"VIRE, en 1491 Pierre de Courthardy  acquiert la seigneurie  et commence la transformation du château tel quil apparaît encore aujourdhui.  Les Grands hommes : Bertrand Du Guesclin, Pierre de Courthardy, Germain Pilon, Louis XIII, Steve Mc Queen. La Forteresse bâtie en 1090, fut transformée en château Renaissance à la fin du XVe siècle.  Après Hiérosme de la Vayrie  Viré passe à la famille Piau qui conserve le domaine jusqu'en 1631 date de la saisie et de sa vente à Guichard d'Eageant premier président  à la cour des comptes du Dauphiné. Après le décès de François d'Eageant, fils de Guichard en 1657 la seigneurie reste en indivise entre deux  héritières, Christine de Salvaing épouse de Charles de Sassenage et Catherine d'Eangent alliè à Etienne Roux conseiller du roi et en 1720 lorsque le marquis de Sassenage descendant de Charles devient le seul seigneur de Viré,  Vendu en 1747 au Périer de la Girardière passe en héritage  à la famille Vasse et Maulny et cédé en 1768  à Gabriel Chenon du Boullay dernier seigneur de Viré et avocat au présidial du Mans 1791 décède sans héritiers directe laisse le  Viré à  Anne Davy épouse de Florent Chantelou puis par alliance à Jean-François Renou dont le fils Jean-Marie Florent Renou  sera  maire de Viré pendant quarante trois ans. A son décès, le châteaux passe à ses deux filles  Victor-Louise Esnault et Marie-Cécile Esnault mariè à Ernest Launay en 1873, le château est resté dans la descendance des Launay jusqu'en 1990, aujourd'hui à monsieur Gilles Guichemer.","architecture":"VIRE,  cette forteresse du XIIe siècle a été l'une des toutes premières à être transformée en château Renaissance dès la fin du XVe siècle, sous le règne de Charles VIII  construction du donjon,  Les Maitres d'Oeuvre sont Marie-Louis Vérité et Georges Darcy.  Le château de Viré est positionné sur un promontoire rocheux qui domine le Treulon, est une ancienne forteresse du XIIe siècle, qui fut remaniée dès la fin du XVe siècle pour en faire un château de style Renaissance. En 1370, la veille de la Bataille de Pontvallain, Bertrand  Du Guesclin et son armée séjournèrent au château de Viré. Evolution du site de la forteresse médiévale (1090) au château Renaissance et les petites modifications du XIXe siècle. Le porche de style italien attribué à Germain Pilon. Dune facture différente du reste de la construction, le portique qui soutenait à l'origine la bascule du pont-levis se compose dun arc entre piles, en plein cintre à lintérieur, segmentaire à l'extérieur, portant un entablement horizontal à niche centrale carrée, et dun fronton interrompu à pointes latérales sur lequel on pouvait encore lire au début du XXe siècle la devise \"sine macula\". Lédicule au sommet, ouvert sur ses quatre faces, est surmonté dun dôme quadrangulaire soutenu par quatre arcs en plein cintre sur colonnes. Terrasses sur la façade ouest. Salle de gardes dotée de voûtes soutenues par des arcs de pierre prenant appui sur un pilier central.  Le château est inscrit aux M.H. depuis le 24/04/1989 et classé aux M.H. depuis le 22/07/1991.  -Éléments protégés MH : le château, la chapelle, les tracés reconnus des jardins : inscription par arrêté du 24 avril 1989. Le portail d'entrée : classement par arrêté du 22 juillet 1991.","habitants":"Famille Vasse-Maulny \r\n        \"","divers":"Vire GPS : 47° 58' 40\" Nord, 0° 17' 49\" Ouest","gps":"47° 58' 40\" Nord, 0° 17' 49\" Ouest","images":["../../jctruffet.com/image/image_72/72_Vir%c3%a9_Champagne_1.jpg","../../jctruffet.com/image/image_72/72_Vir%c3%a9_Champagne_2.jpg","../../jctruffet.com/image/image_72/72_Vir%c3%a9_Champagne_3.jpg","../../jctruffet.com/image/image_72/72_Vir%c3%a9_Champagne_4.jpg","../../jctruffet.com/image/image_72/72_Vir%c3%a9_Champagne_5.jpg","../../jctruffet.com/image/image_72/72_Vir%c3%a9_Champagne_6.jpg"]},"Consult_chateau_formulaire28fc":{"id":"Consult_chateau_formulaire28fc","dept":"72","canton":"Vouzon","commune":"Vouzon","nom":"Vouzon_Chesnay","type":"Château","periode":"XVI-XIX","histoire":"A Vouzon le château de Chenay, Corvier, de Ruets, de Grillière.                                                                                  CHENAY   La seigneurie de paroisse, annexée au château, fut possédée pendant tout le XVIe siècle par la famille de Caradeux ou Caradeuc; elle le fut depuis 1600, par celle de Hardas, jusqu'en 1697, que Pierre Paillard de Beauséjour, trésorier de France à Alençon, l'acheta de Léonor du Hardas, et ajouta le nom de Chenay au sien. La maison qu'on appelle toujours le château de Chenay, appartient encore à la famille du même nom. En 1668 et 1680, Bené de Hardas, chevalier, seigneur de Courtilloles, rend aveu par son procureur, pour les fiefs d'Ancinnes, Chenay et la Chevallerie, dans le Saosnois. Peu éloigné du bourg, au nord, le château, édifié au XVIIIe siècle, est une demeure bourgeoise de construction ordinaire, dans une position charmante, d'ou on apperçoit les nombreuses sinuosités que décrit la rivière.                                                         GRILLIERE,   M. Baillif. Succédant au siège de la seigneurie de Cansles, le château de la Grillère fut construit au XVIe siècle, et remanié au XIXe siècle. Il eut pour propriétaires François de Beauharnais, lieutenant général du bailliage d'Orléans au XVIIe siècle, ancêtre maternel de Napoléon III ; le comte de Choiseul-Gouffier, ambassadeur de France à Constantinople à la veille de la Révolution ; l'empereur Napoléon III de 1852 à 1870.                     RHUET,  fut construit à la toute fin du XIXe siècle par un riche Parisien. Tour à tour, la propriété a été lieu de villégiature, puis refuge et école d'enfants juifs en route pour Israël, Post cure sénatoriale, centre de reclassement professionnel et enfin centre de rééducation professionnelle. Le directeur du centre, Stéphane Lacombe, avec Eloïse Sourdeval, psychologue.","architecture":"CORVIER, ce château de style Louis XIII, situé à proximité de lautoroute A71 et de Lamotte Beuvron (ville dorigine des soeurs Tatin et de la tarte Tatin), vous accueillera dans ses salons lumineux et ses chambres chez lhabitant aménagées avec gout. aujourd'hui chambre  d'hôtes,   depuis 1930 à Elizade.                                                                                                                                                                                                                          GRILLIERE, situé au milieu d'un vaste domaine, entouré de bois et d'eau, ce beau château du XVIe siècle est entièrement construit en briques roses. Il a conservé son aspect d'origine et ses poutres anciennes. Jeanne d'Arc, allant de Gien à Blois, y coucha le 2 mars 1429. Cette demeure a été la propriété de la famille de Beauharnais, très attaché au souvenir de sa grand-mère Joséphine, Napoléon III qui n'avait pu obtenir le château de la Ferté Beauharnais acquit le château de la Grillaire (sous un prête nom). Et même si l'Empereur y séjourne rarement, il entreprendra de nombreux travaux en Sologne et l'idée de creuser des canaux sera reprise et concrétisée par l'Empereur, et ainsi le canal de la Sauldre verra le jour, qui permit, outre le drainage, d'amener de la Marne un mélange de calcaire, de sable et d'argile, pour amender le sol infertile de cette Région. Ensuite viennent les tentatives de création de fermes Impériales avec l'innovation d'un système d'irrigation. Napoléon III décide de mettre sur pied le corps des Ponts et chaussées.","habitants":"Chenay ;  famille de Caradeux                                                       Grillière;  famille de Beauharnais et empereur Napoléon III \r\n        \r\n        \"","divers":"A Vouzon le château de Chesnay grav-4-5, Corvier grav-2-6, de Ruets grav 1-2-3, de Grillière grav-7.","gps":"","images":["../../jctruffet.com/image/image_72/72_Vouzon_Chesnay_1.jpg","../../jctruffet.com/image/image_72/72_Vouzon_Chesnay_2.jpg","../../jctruffet.com/image/image_72/72_Vouzon_Chesnay_3.jpg","../../jctruffet.com/image/image_72/72_Vouzon_Chesnay_4.jpg","../../jctruffet.com/image/image_72/72_Vouzon_Chesnay_5.jpg","../../jctruffet.com/image/image_72/72_Vouzon_Chesnay_6.jpg","../../jctruffet.com/image/image_72/72_Vouzon_Chesnay_7.jpg","../../jctruffet.com/image/image_72/72_Vouzon_Chesnay_8.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','72 — Sarthe'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
