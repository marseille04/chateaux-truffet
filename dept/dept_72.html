const FULL={"Consult_chateau_formulaired175":{"id":"Consult_chateau_formulaired175","dept":"72","canton":"La Fléche","commune":"Coulongé","nom":"Aiguebelles_Coulongé","type":"Château","periode":"XVII","histoire":"AIGUEBELLES, le fief ainsi que le domaine d'Aiguebelles sont tenus du roi à cause de la baronnie de Château-du-Loir par les religieux de l'abbaye Saint-Vincent du Mans. Aiguebelles est le siège d'une châtellenie. En 1829, l'édifice appartenait à M. Lherbette, maire de Coulongé. Il figure sur le premier cadastre de 1813. En 1850, le bâtiment a été complètement remanié par son successeur, M. de Batine. et  Emilie Adèle Monden-Genevraye et  G Niel.","architecture":"AIGUEBELLES,  à la fin du XVIIIe siècle, le domaine comprenait les métairies de la Hellerie, de Courcelles, du moulin de Chenon, de la Grastière, des Aiguebelles, de l'Epinay, de la Cadorière, du lieu du Bourg, de la Gillardière, du bordage de la Fontaine, d'une maison et jardin au bourg. Le corps de logis en rez-de-chaussée est flanqué de deux hauts pavillons symétriques. Le tout est entre cour et jardin et bordé de longues douves. L'organisation des espaces n'est plus très lisible aujourd'hui. Les communs sont  dissimulées par des haies. Les espaces compartimentés du domaine d'Ancien Régime est effacé pour laisser la place à un site de villégiature.","habitants":"Famille de M. Lherbette\r\n        \"","divers":"A Coulongé le château d'Aiguebelles;    Grav -1 à 4              Gps 47° 41' 22\" nord, 0° 12' 08\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_Aiguebelles_Coulong%c3%a9_1.jpg","../../jctruffet.com/image/image_72/72_Aiguebelles_Coulong%c3%a9_2.jpg","../../jctruffet.com/image/image_72/72_Aiguebelles_Coulong%c3%a9_3.jpg","../../jctruffet.com/image/image_72/72_Aiguebelles_Coulong%c3%a9_4.jpg"]},"Consult_chateau_formulaire38ac":{"id":"Consult_chateau_formulaire38ac","dept":"72","canton":"Mamers","commune":"Allieres-Beauvoir","nom":"Allières_Beauvoir","type":"Château","periode":"XII-XIV-XVII","histoire":"ALLIERES-BEAUVOIR, situé à 260 mètres d'altitude, à l'orée sud de la Forêt de Perseigne, il jouit d'un panorama assez exceptionnel. . La famille dAillières, toujours présente dans le village, se distingue par la continuité des engagements politiques, militaires et religieux depuis 1668, sous le règne de Louis XIV où eut lieu le mariage entre Judith Le Vasseur, dame dAillières, et Abraham Caillard de la Monnerie, militaire au service de Mazarin. La mairie de cette commune fut tenue de façon quasi ininterrompue par cette famille de 1809 à 2014.","architecture":"ALLIERES-BEAUVOIR, la construction du château d'Allières date du XIIe au XIVe siècle et  reconstruit au XVIIe siècle à l'emplacement d'une forteresse détruite par les Anglais, au cours de la guerre de cent ans. Le château a été agrandi et restauré à la fin du XIXe, avec son corps de bâtiment central entouré de deux ailes, ses deux pavillons d'entrée, ses écuries datant de 1640 abritant des boxes pour chevaux et des remises pour les voitures ainsi que son orangerie du XVIIIe siècle à l'extérieur du parc  ce château avait une vocation guerrière autrefois.   Situé dans larrondissement de Mamers et proche dAlençon ce château du XVIIe siècle  Agrandi et remanié au XIXe siècle, le château d'Allières-Beauvoir se situe à 260 m daltitude et jouit dun panorama exceptionnel.","habitants":"famille dAillières\r\n        \r\n        \r\n        \"","divers":"Château d'Allières de Beauvoir,   grav de 1 à 4                                                                  Gps 48° 24' 18\" nord, 0° 19' 31\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_Alli%c3%a8res_Beauvoir_1.jpg","../../jctruffet.com/image/image_72/72_Alli%c3%a8res_Beauvoir_2.jpg","../../jctruffet.com/image/image_72/72_Alli%c3%a8res_Beauvoir_3.jpg","../../jctruffet.com/image/image_72/72_Alli%c3%a8res_Beauvoir_4.jpg"]},"Consult_chateau_formulaire49c8":{"id":"Consult_chateau_formulaire49c8","dept":"72","canton":"Loué","commune":"Amné","nom":"Amné","type":"Manoir","periode":"XV-XVI","histoire":"Deux châteaux à Amné celui de Danière et de Milon.                             DANIERE, le manoir est de style Renaissance, cette maison seigneuriale du XVe siècle fut modifiée au début du XVIe siècle avec un jardin en terrasse,  Danière est un petit manoir d'une seigneurie rurale, composé d'un corps de logis simple qui présente un décor architectural de transition entre le gothique flamboyant et la première Renaissance. Une cheminée se réfère au modèle florentin dont l'origine remonte à Verrochio et Léonard de Vinci.   C'est une maison seigneuriale qui date de la 1ère moitié du XVe siècle. Il est de style Renaissance. Le corps de logis présente un intéressant décor architectural de transition entre le gothique flamboyant et la première Renaissance. Le manoir de la Danière est un manoir Renaissance été sauvé de l'oubli,  est inscrit aux M.H. depuis le 5/09/2003 pour les éléments de décor extérieur de la travée du XVIe siècle et l'intégralité de la pièce où se trouve la cheminée.","architecture":"MILON, le logis a été construit de 1539 à 1543 et possède une statue de Saint Avertin dans lun des murs (une copie du XIXe siècle est située dans léglise de Saint Martin. De l'ancien château, il ne subsiste que quelques corps de dépendances du XVIIe siècle. La seigneurie de paroisse d'Amné est annexée au château de Milon qui appartenait en 1775 à la famille de Broc et en 1789 à celle de Biré.","habitants":"Danière; Léonard de Vinci.                                                Milon; famille de Broc \r\n        \"","divers":"Deux châteaux à Amné celui de Danière et de Milon.                         Danière grav-1-2                                                                                GPS : 48° 03' 15\" Nord et 0° 01' 48\" Ouest                                                         Milon grav_3                                                                                       GPS : 48° 03' 15\" Nord, 0° 01' 48\" Ouest","gps":"48° 03' 15\" Nord et 0° 01' 48\" Ouest","images":["../../jctruffet.com/image/image_72/72_Amn%c3%a9_1.jpg","../../jctruffet.com/image/image_72/72_Amn%c3%a9_2.jpg","../../jctruffet.com/image/image_72/72_Amn%c3%a9_3.jpg"]},"Consult_chateau_formulaire55f9":{"id":"Consult_chateau_formulaire55f9","dept":"72","canton":"Savigné-l","commune":"Ardenay sur Mérize","nom":"Ardenay","type":"Château","periode":"XVIII-XIX","histoire":"ARDENAY, château d'Ardenay, des XVIIIe et XIXe siècles, inscrit au titre des monuments historiques en 1982, où Patrick Gentil possède une collection de trophées de chasse.  Henri Marie Roger De Macé de Gastines de Dommaigne. Aujourd'hui chambres d'hôtes.","architecture":"ARDENAY, remanié en 1752, 1766 et 1813, le château a été construit sur les fondations d'une demeure féodale (vestiges), entouré de douves, il est précédé d'une cour en partie pavée où se voit un puits du XVIIe siècle. L'édifice principal, est un vaste quadrilatère flanqué d'une tourelle Renaissance à encorbellement sur le côté, de deux tours carrées à l'arrière et de deux pavillons en ailes ajoutés par la suite. Au XIXe siècle, des lucarnes avec des sculptures ont été ajoutées. Caves voûtées, sur lesquelles s'élèvent le corps central du château et la chapelle attenante. Jardin à la française dessiné par Soufflot, actuellement reconstitué, il replace en situation larchitecture sobre du château. Les décors intérieurs de la fin du XVIIIe siècle témoignent avec élégance du même esprit de sobriété. Étang et canaux bordant la forêt.","habitants":"Marie Roger De Macé de Gastines \r\n        \"","divers":"Château d'Ardenay  grav 1 à 3                                                         Gps 7° 59' 42\" nord, 0° 25' 29\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_Ardenay_1.jpg","../../jctruffet.com/image/image_72/72_Ardenay_2.jpg","../../jctruffet.com/image/image_72/72_Ardenay_3.jpg"]},"Consult_chateau_formulaire4175":{"id":"Consult_chateau_formulaire4175","dept":"72","canton":"La Flèche","commune":"La Flèche","nom":"Arthuisière","type":"Château","periode":"XVI-XVII-XIX","histoire":"Trois châteaux à la flêche celui d'Arthussière, la Poisonnière et Yvandeau.                                                                                                    ARTHUISIERE, au nord est de La Flèche, se dresse le château de l'Arthuisière, ancienne châtellenie et seigneurie, où la tradition veut que saint-Louis ait séjourné plusieurs jours en 1230. De son coteau, la vue s'étend sur La Flèche et la vallée du Loir. Au XVe siècle, l'Arthuisière est aux mains de la famille de Maridort, au XVIe siècle à messire Olivier de Maridort et à sa fille, Françoise de Maridort, popularisée par A. Dumas dans \"La Dame de Montsoreau\". Olivier de Maridort est connu par l'assassinat de son oncle. Ensuite la propriété passa successivement aux Maillé en 1632, à Louis de Bourbon, duc d'Enghien, grand Prince de Condé et sa descendance dont Mlle de Sens, puis de Charolais qui céda son domaine en 1734 aux Jésuites de La Flèche, suivis en 1776, des Doctrinaires. En 1792, le domaine appartenait à Auguste Mersenne de Mansigné.                                                                                                                                                                                                          YVANDEAU, le château dYvandeau a été vraisemblablement construit à la fin du XVIIe siècle ou au début du XVIIIe siècle. C'est là, après Reims, que David Hume s'installe au  château d'Yvandeau de 1735 à 1737. Il fréquente le collège de La Flèche, rédige le Traité de la nature humaine, puis retourne à Londres en 1737 pour éditer l'ouvrage.","architecture":"POISONNIERE, figurant sur le plan cadastral de 1826, le logis fut entièrement remanié vers 1838 et 1840. L'aile de communs fut également remaniée vers cette époque. Vers 1895, le logis fut augmenté de son aile droite et surélevé d'un étage, le logis se compose d'un corps central flanqué de deux pavillons à deux étages carrés et un étage de comble, distribués par un escalier tournant à retours avec jour et un escalier en vis. Couverte d'un toit en pavillon, la tour où est inscrit cet escalier est appareillée en calcaire taillé. L'aile de communs est appareillée en moellon enduit avec chaînes en brique et pierre. Contre la partie centrale de cette aile, est adossé un corps couvert en pavillon brisé appareillée en calcaire avec brique en remplissage. à  deux étages carrés ; étage de comble , escalier dans-oeuvre : escalier tournant à retours avec jour, en charpente ; escalier hors-oeuvre : escalier en vis avec jour, en charpente ; escalier dans-oeuvre : escalier tournant à retours sans jour, en charpente    gros-oeuvre : calcaire ; grès ; silex ; appareil mixte ; brique ; pierre de taille ; moellon ; moellon sans chaîne en pierre de taille; pierre avec brique en remplissage ; enduit couverture  toit à longs pans ; pignon couvert ; croupe ; toit en pavillon ; toit brisé en pavillon couvert en ardoise.","habitants":"Arthusière; famille d' Auguste Mersenne de Mansigné.                            Poissonnière; seigneur local\r\n        \"","divers":"Trois châteaux à la Flêche celui d'Arthusière grav -1-2-3, la Poisonnière-grav-4 et Yvandeau grav -5.                                            La flèche  gps 47° 41' 59\" nord, 0° 04' 34\" ouest","gps":"","images":["../../jctruffet.com/image/image_72/72_Arthuisi%c3%a8re_1.jpg","../../jctruffet.com/image/image_72/72_Arthuisi%c3%a8re_2.jpg","../../jctruffet.com/image/image_72/72_Arthuisi%c3%a8re_3.jpg","../../jctruffet.com/image/image_72/72_Arthuisi%c3%a8re_4.jpg","../../jctruffet.com/image/image_72/72_Arthuisi%c3%a8re_5.jpg"]},"Consult_chateau_formulaire76eb":{"id":"Consult_chateau_formulaire76eb","dept":"72","canton":"Mamers","commune":"Arçonnay","nom":"Arçonnay","type":"Château","periode":"XVIII-XIX","histoire":"Trois châteaux à Arçonnay la Chevallerie, Maleffre et Frene.                                                                                CHEVALERIE,  appartenait à la maison de Paulmier de Bouillon. La paroisse possédait d'autres fiefs, tels que le Bois-Margot et la Chevallerie, a été édifié au XVIIIe siècle. C'était la résidence de chasse de Jean-Baptiste Bourguignon d'Anville, nommé premier géographe du Roi Louis XV en 1773. Marie-Thérèse Bourguignon d'Anville prend le voile en 1755. Après les massacres de septembre 1792, elle se réfugie à la Chevallerie avec Jeanne-Marie Label, une autre religieuse. Au début du XIXe siècle, Nicolas Jacques Augustin Hébert de Hautéclair, suite à son mariage avec Marie-Sophie Bourguignon d'Anville devient sieur de la Chevallerie. Au XXe siècle, la propriété appartenait à M. de la Billardière de Cerisay.  Jean-Baptiste Bourguignon d'Anville (1697-1782), était géographe du roi Louis XV, membre de l'Académie des inscriptions et belles lettres. était sa résidence de chasse et conserve dans sa cour d'honneur une belle statue de Jean-Baptiste d'Anville.                                                                                               MALEFFRE, la seigneurie de paroisse, attachée à la terre et château de Maleffre, appartenait à la maison Paulmier du Bouillon. La paroisse possédait plusieurs autres fiefs, tels que la Chevallerie et Bois Margot. En 1786, partage de la seigneurie de Maleffre par Jacques Claude Le Paulmier entre ses trois fils puis rachat par Mathieu Amable Le Paulmier du quart du domaine de Maleffre, saisi sur son frère Antoine, émigré en 1796. Le château de Maleffre, en partie ruiné, appartenait à M. le Vicomte d'Epuisay, qui avait épousé une demoiselle du Bouillon Il appartient à Mr Alain Chesnais.","architecture":"CHEVALERIE, la seigneurie de paroisse, attachée à la terre et château de Maleffre  possède un beau parc doté d'un jardin d'agrément. Dans la cour d'honneur une statue du géographe d'Anville avec un attribut professionnel . Des statues et des bustes de femmes sur piédestaux sont répartis dans le jardin. La statue de Cérès est placée dans une niche droite encadrée par un chambranle à bossages et surmontée d'un fronton, l'ensemble est encadré par un mur concave se terminant par des colonnes à bossage un sur deux et surmontées d'un vase décoratif de jardin                                                                                                                              FRENE, le château du Frêne est une belle demeure qui date du XVIIIe siècle, entourée d'un site magnifique. Sa terrasse classée se prolonge par un parc qui s'ouvre sur un bois et une forêt. Monument historique (ISMH).                                                                                                                 MALEFFRE, autrefois Maleffre était un château fortifié, entouré de douves, qui sans doute, était très ancien et justifiait l'étymologie du nom de la commune qui veut dire palais, château fortifié. Le château actuel a été reconstruit au XIXe siècle, mais on peut encore voir les ruines de l'ancien château féodal.","habitants":"Chevallerie; Jean-Baptiste Bourguignon d'Anville                            Maleffre;Famille de Jacques Claude Le Paulmier\r\n        \"","divers":"Trois châteaux à Arçonnay la Chevalerie grav 1-2, Maleffre grav 4 et Frene grav 3.                                                     Chevallerie GPS : 48° 23' 44\" Nord et 0° 05' 11\" Est                                     Frêne GPS : 48° 23' 49,3\" Nord 0° 05' 19,4\" Est                                           Maleffre . GPS : 48° 23' 44\" Nord et 0° 05' 11\" Est","gps":"48° 23' 44\" Nord et 0° 05' 11\" Est","images":["../../jctruffet.com/image/image_72/72_Ar%c3%a7onnay_1.jpg","../../jctruffet.com/image/image_72/72_Ar%c3%a7onnay_2.jpg","../../jctruffet.com/image/image_72/72_Ar%c3%a7onnay_3.jpg","../../jctruffet.com/image/image_72/72_Ar%c3%a7onnay_4.jpg"]},"Consult_chateau_formulairee734":{"id":"Consult_chateau_formulairee734","dept":"72","canton":"Sablé-sur-Sarthe","commune":"Asnières-sur-Vègre","nom":"Asnières_Vègre","type":"Château","periode":"XIII-XV-XVII","histoire":"Trois châteaux à Asnières  dont Moulins-Vieux, Cour et Claies. MOULINS VIEUX, partie centrale du logis construite au XVIIe siècle. Logis remanié au XVIIIe siècle, après 1761: extensions latérales, intérieur, menuiserie, peinture, sculpture, chapelle Notre-Dame. Jardin paysager au XVIIIe siècle. Ajout d'un corps en retour d'équerre à la fin du XVIIIe ou début XIXe siècle. Vers 1840, corps de logis remanié par l'architecte Lachèse, élévation antérieure du corps central, intérieur: menuiserie, escaliers, cuisine, monogramme. Armoiries réalisées par le sculpteur Cottereau, du Mans, vers 1901. Colombier du XVIIe siècle, détruit au XVIIIe siècle. Communs, écuries, orangerie, portail avec ferronnerie, jardin paysager (en partie sur le site de la motte du manoir voisin de l'Onglée Renaut, détruit, et le jardin régulier sont construits au XVIIIe siècle, après 1761, dessiné par un élève de André Le Nôtre avec une longue allée de tilleuls. Vieux colombier. Vivier sur la Vègre et glacière datent du XIXe siècle. Le château est inscrit aux M.H. depuis 1989.","architecture":"COUR, la construction du Manoir de la Cour date de la fin du XIIIe siècle.  compte, parmi les rares édifices civils, non-fortifiés, construits, à cette période, servait également de demeure pour les seigneurs du Moyen Age. Le Manoir possède tout un ensemble de peintures murales de grande qualité, encore visibles, aujourdhui au 1er étage. Après 20ans de campagnes de restauration amorcées en 1995, accompagnées de recherches archéologiques qui ont considérablement enrichis les connaissances sur ce site, les travaux du nouvel aménagement ont pu débuter en 2013. Le Manoir de la Cour vous propose une exposition interactive et diverses animations pour la famille dont le programme épouvante pour 2018.                                                                                                                            CLAIES, date de 1480. Le logis remonte à la fin du XVe début du XVIe siècle, qui a subi de lourdes mutilations dans les années 1930, a été restauré depuis, à partir d'éléments d'origine, réemployés et remontés. Le manoir des Claies est inscrit aux M.H. depuis le 23/05/1996. Il est ouvert au Public. Le manoir des Claies vous propose ses chambres d'Hôtes, qui a subi de lourdes mutilations dans les années 1930.                                                                                                                                         Le LOGIS édifice construit au XIIIe siècle, dont le rez-de-chaussée est doté de trois portes aux arêtes chanfreinées, et à l'étage de trois fenêtres aux meneaux en croix, avec une tourelle à cinq pans agrémentée d'une porte encadrée par une haute accolade et renfermant un escalier à vis, comprenant un corps de bâtiment principal flanqué de deux pavillons carrés percés de meurtrières et, attenant au pigeonnier (tour ronde sur quatre étages) de 600 boulins, une cave sous l'un des pavillons carrés et une grange à laquelle on accède par une large porte ornée d'un décor en dents de loup sculptée, au sommet de l'arc, une fleur stylisée à quatre pétales ou une croix de Malte.","habitants":"seigneurs locaux\r\n        \r\n        \"","divers":"Trois châteaux à Asnières  dont Moulins-Vieux grav-5-6-7-8, Cour gra-2-3 -4 et Claies grav 1.","gps":"","images":["../../jctruffet.com/image/image_72/72_Asni%c3%a8res_V%c3%a8gre_1.jpg","../../jctruffet.com/image/image_72/72_Asni%c3%a8res_V%c3%a8gre_2.jpg","../../jctruffet.com/image/image_72/72_Asni%c3%a8res_V%c3%a8gre_3.jpg","../../jctruffet.com/image/image_72/72_Asni%c3%a8res_V%c3%a8gre_4.jpg","../../jctruffet.com/image/image_72/72_Asni%c3%a8res_V%c3%a8gre_5.jpg","../../jctruffet.com/image/image_72/72_Asni%c3%a8res_V%c3%a8gre_6.jpg","../../jctruffet.com/image/image_72/72_Asni%c3%a8res_V%c3%a8gre_7.jpg","../../jctruffet.com/image/image_72/72_Asni%c3%a8res_V%c3%a8gre_8.jpg"]},"Consult_chateau_formulairea98a":{"id":"Consult_chateau_formulairea98a","dept":"72","canton":"Sillé-le-Guillaume","commune":"Assé le Riboul","nom":"Assé_le_Riboul","type":"Vestiges châteaux","periode":"XII-XVIII-XIX","histoire":"Quatre châteaux  à  Assé le Riboul dont celui d'Assay , Moze  et du vieux Lavardin et le château de Trochet.                                               ASSE le RIBOUL, on trouve la mention d'un Hubert Riboulé et de Gloriande, son épouse, qui vivaient de 1085 à 1097; et celle d'un Foulques Riboulé et Hubert, son fils, seigneurs d'Assé, vers 1118. Foulques contribua à la dotation de l'abbaye de Beaulieu qui fut fondée en 1120. Le roi Philippe Auguste acquit le château d'Assé et la forêt de Bourse, par échange contre la baronnie d'Ecouché, située près d'Argentan. Il réunit cette acquisition au Comté d'Alençon. Assé-le-Riboul était compris dans la mouvance de La Flèche, comme on le voit par un aveu fait en 1414 par le duc d'Alençon au duc d'Anjou, pour sa baronnie de La Flèche.                                                                                    MOZE, la seigneurie de la paroisse appartenait, lors de la Révolution, à la maison de Tessé, comme étant alors une dépendance de la baronnie de Lavardin, à laquelle elle fut réunie en 1561. A cette époque le château de Mozé appartenait à Blachardon de Mozé, commissaire des guerres à Assé le Riboul. L'actuel château de Mozé a été construit au XVIIIe siècle, il possède de belles portes sculptées, un perron et une entrée à fronton. Au XIXe siècle, installation d'une éolienne Bollée.","architecture":"ASSE le RIBOUL, le château d'Assé, situé au sud du bourg et y attenant, à mi-côté, et commandant le passage de la Longuève, nommé le Gué-d'Assé, était vaste, construit sur une butte de terre de rapport. Détruit en majeur partie, il subsiste des murs assez considérables et fort élevés; une porte de forme légèrement ogive, une croisée carrée, partagée en croix, dans une partie qu'on dit avoir été la chapelle, des vestiges d'ouvertures tréflées, etc. Son style d'architecture paraît indiquer qu'il fut construit vers le XIe ou XIIe siècle.                                                                                                            A 1 KM au au sud à Tronchet château; TRONCHET, le château du Tronchet est construit pour le marquis de Perrochel dans le dernier quart du XVIIIe siècle, de 1777 à 1783, par l'architecte Desprès, du Mans. Abandonné pendant la Révolution, le château est restauré en 1834. Situé en Sarthe dans les Pays de la Loire, le château du Tronchet est dans notre famille depuis 1899.Éléments protégés MH : le château avec ses communs, le parc avec ses fabriques : inscription par arrêté du 31 juillet 1997                                                                                                                          VIEUX-LAVARDIN, site fortifié dès le XIIe siècle, composé de trois mottes successives et d'une courtine polygonale. Château-fort construit au XIIe ou XIIIe siècle et rebâti dans les années 1470 (logis construit après 1471). Situé à lest de Poncé sur Loir, l'édifice était conçu avec une triple enceinte. Il domine la vallée par plus de 40 mètres de hauteur. Il fut détruit en partie au XVe siècle.Éléments protégés MH : le château, ainsi que les courtines, les mottes et les fossés et contrevallations : inscription par arrêté du 28 février 1995.","habitants":"Mozé; famille de Blachardon de Mozé,\r\n        \"","divers":"quatre châteaux  à  Assé le Riboul dont celui d'Assay grav -1-2-3-4, Moze  et du vieux Lavardin-7-8 et le château de Trochet grav-5-6                                                                              Gps 48° 11' 41\" nord, 0° 05' 14\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_Ass%c3%a9_le_Riboul_1.jpg","../../jctruffet.com/image/image_72/72_Ass%c3%a9_le_Riboul_2.jpg","../../jctruffet.com/image/image_72/72_Ass%c3%a9_le_Riboul_3.jpg","../../jctruffet.com/image/image_72/72_Ass%c3%a9_le_Riboul_4.jpg","../../jctruffet.com/image/image_72/72_Ass%c3%a9_le_Riboul_5.jpg","../../jctruffet.com/image/image_72/72_Ass%c3%a9_le_Riboul_6.jpg","../../jctruffet.com/image/image_72/72_Ass%c3%a9_le_Riboul_7.jpg","../../jctruffet.com/image/image_72/72_Ass%c3%a9_le_Riboul_8.jpg"]},"Consult_chateau_formulaireb715":{"id":"Consult_chateau_formulaireb715","dept":"72","canton":"Le Lude","commune":"Aubigné-Racan","nom":"Aubigné_Racan","type":"Château","periode":"XIV-XVII","histoire":"Deux châteaux à Aubigné-Racan dont Champmarin et de Bosse.                                                                                CHAMPMARIN, date des XVe, XVIe, XVIIe et XXe siècles. La terre de Champmarin est mentionnée dès le XIe siècle. Le manoir appartenait à Mathurin de Vendômois au début du XVIe siècle. Après sa mort, sa veuve se remaria avec Louis de Bueil. Elle eut avec lui, son fils Honorat de Bueil de Racan, en 1589, né au Manoir de Champmarin. C'était la maison natale du poète Racan. L'édifice est partiellement inscrit aux M.H. depuis le 2/12/1978.                                                                                                  BOSSE,  Bossé aurait appartenu au XIVe siècle à la famille de Germaincourt puis à la famille de Garguesalle. En 1553, René de Garguesalle rend aveu au comte du Lude. En 1628, Jean de Laubespin, abbé de Notre-Dame de Vaas, est seigneur de Bossé et en 1682, Jacques-Honoré puis Charles de Barentin, aussi abbé de Vaas. Au XVIIIe siècle, Bossé est successivement à Pierre-Henri de Bonnetat d'Etival de Saint-Germain d'Arcé, puis à Pierre-René du Mazis qui vend en 1743, à Pierre de Sarcé dont la fille épouse Emile de Baglion. La galerie pourrait avoir été bâtie autour de 1610 par la famille de René de Garguesalle qui demeure alors à Brouassin, commune de Mansigné. Le portail monumental, profondément remanié au XIXe siècle, lui est contemporain : il devait être précédé d'un pont-levis au-dessus d'un fossé sec aujourd'hui comblé.","architecture":"BOSSE Le fort dénivelé du site n'était pas propice à l'implantation d'un grand jardin. Pourtant on peut supposer l'existence, au pied du logis et au sud de la cour, de deux jardins potagers. Le jardin clos, situé au nord, était cantonné d'un colombier. Entre 1813 et 1850, un parc paysager à l'anglaise est venu remodeler le terrain et modifier tous les cheminements. Le colombier-pigeonnier isolé au milieu d'une pelouse, est aménagé comme une fabrique de jardin. Le seigneur de Bossé avait fondé, dans l'église paroissiale d'Aubigné, une chapelle Saint-Jacques avec un petit fief attenant qui disparaît en 1683. Le logis  en L paraît dater de la fin du XVe siècle ou du tout début du XVIe siècle, est implanté au nord d'une terrasse qui délimite une cour exposée ainsi au sud et protégée par un haut mur percé d'un portail monumental.  le logis de plan en L est distribué par une tourelle d'escalier demi-hors-oeuvre placée dans l'angle. La branche du L, perpendiculaire au coteau, se prolonge par des communs construits au XIXe siècle ornés de lucarnes de la première Renaissance provenant d'une maison placée au chevet de l'église d'Aubigné. Le couronnement de ces deux lucarnes a été restauré et simplifié en un simple fronton. L'autre branche du L se prolonge par une galerie supportée par un portique voûté d'ogives. La couverture de cette galerie est galbée. Aujourd'hui le portique est fermé et transformé en chapelle depuis le XIXe siècle, et la galerie est divisée pour former un appartement. Les baies du premier étage sont flanquées de pilastres qui supportent une corniche à modillons. Elles ont été agrandies vers le bas probablement au XVIIIe siècle. Le logis fut très remanié d'abord au XVIIIe siècle puis au XIXe siècle.","habitants":"Champmarin; Mathurin de Vendômois                                          Bosse ; famille de Pierre-René du Mazis \r\n        \r\n        \"","divers":"Deux châteaux à Aubigné-Racan dont Champmarin grav-3-4  et de Bosse. grav 1-2                                                                       GPS : 47° 41' 27\" Nord et 0° 16' 04\" Est                                                       Champmarin GPS : 47° 41' 41\" Nord et 0° 16' 50\" Est","gps":"47° 41' 27\" Nord et 0° 16' 04\" Est","images":["../../jctruffet.com/image/image_72/72_Aubign%c3%a9_Racan_1.jpg","../../jctruffet.com/image/image_72/72_Aubign%c3%a9_Racan_2.jpg","../../jctruffet.com/image/image_72/72_Aubign%c3%a9_Racan_3.jpg","../../jctruffet.com/image/image_72/72_Aubign%c3%a9_Racan_4.jpg"]},"Consult_chateau_formulaire29a1":{"id":"Consult_chateau_formulaire29a1","dept":"72","canton":"Savigné-l","commune":"Torcé en Vallée","nom":"Aulnays_Torcé","type":"Château","periode":"XI-XVI","histoire":"AULNAYS  le château aurait appartenu successivement à Jean Taschel, Chevalier, seigneur des Aulnays en 1279, à Vincent le Vayer, sieur du Ridray et des Aulnays en 1480, à Jean Levayer, sieur des Aulnays et de la Timmonière en 1487, à Jehanne Pyerriau , veuve de feu Guillaume de Rochefort, dame des Aulnois en 1502, et à René de Thieslin , écuyer, seigneur de Plessis en Saint-Célerin en 1639.   En 2015, le château des Aulnais a été racheté par un propriétaire privé, pour le rénover, en vue d'en faire un gîte et un lieu de séminaires et de concerts musicaux.","architecture":"AULNAYS, le site du château des Aulnays semble trouver son origine au XIe Siècle et aurait été construit par Alberic de Montmorency, premier connétable de France. De ce bâtiment, il ne reste rien de visible. Le bâtiment actuel date de la fin du XVIe siècle et comprenait une aile disparue avant 1800. On trouve la description suivante datant de la fin du XVIIe siècle : un grand corps de logis, composé dun grand pavillon couvert dardoises, une grande masure de pierre y joignant où il parait y avoir eu un bâtiment; au bout de laquelle masure il y a une chambre servant de boulangerie, et une chambre à côté, le tout couvert de bardeaux. La cour et jardin, le tout entouré de douves et fossés remplis deau. Droit de fuye à Pigeon.","habitants":"Famille de Vincent le Vayer\r\n        \"","divers":"Aulnays  grav-1-2                                                                              GPS : 48° 07' 09,43\"Nord et 0° 23' 05,82\" Est","gps":"48° 07' 09,43\"Nord et 0° 23' 05,82\" Est","images":["../../jctruffet.com/image/image_72/72_Aulnays_Torc%c3%a9_1.jpg","../../jctruffet.com/image/image_72/72_Aulnays_Torc%c3%a9_2.jpg"]},"Consult_chateau_formulairee591":{"id":"Consult_chateau_formulairee591","dept":"72","canton":"Loué","commune":"Avessé","nom":"Avessé","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux à Avessé dont Martigné et Prousterie.                     MARTIGNE, château construit du XVe au XVIIe siècle. Deux bâtiments parallèles avec leurs hauts pignons, le premier du XVe siècle, le second du XVIe siècle, avec quelques archères et meurtrières et encadrés de pavillons carrés à chaque extrémité. Fenêtres et lucarnes à frontons percées dans la façade donnant sur le parc. A l'intérieur un  vestibule où des peintures de lambris en trompe l'il du XVIIe siècle ont été mises à jour. Anciennes bâtisses de communs.   Éléments protégés MH : le château de Martigné en totalité : inscription par arrêté du 19 novembre 1990.","architecture":"PROUSTERIE, construction du logis et d'une partie des communs (ancienne \"maison manable\" limite XVe siècle XVIe siècle. Tour rectangulaire limite XVIe-XVIIe siècle, pour la famille du Crochet. Au XVIIIe siècle, construction des parties agricoles. Partie droite du logis et façade antérieure quatrième quart XVIIIe siècle pour la famille Gondouin. Remaniement du logis et des communs au XIXe siècle. Orangerie après 1826. Remaniement de la remise, cellier, étable à vaches, logement et étable à chevaux en 1845. Construction de la grange en 1898.\r\nÉtages : sous-sol ; un étage carré ; étage de comble ; étage en surcroît\r\nEscaliers : escalier intérieur ; escalier demi-hors-oeuvre ; escalier tournant à retours avec jour; escalier dans-oeuvre ; escalier droit  : calcaire ; moellon ; enduit ; brique ; pan de bois ; appareil mixte,  toit à longs pans ; pignon découvert ; croupe ; noue ; appentis ; toit conique en ardoise ; tuile plate ; tuile mécanique.","habitants":"Prousterie;  famille du Crochet\r\n        \"","divers":"Deux châteaux à Avessé dont Martigné grav de 1à 4 et Prousterie grav-5-6.                                                                         .Gps 47° 57' 17\" nord, 0° 15' 03\" ouest","gps":"","images":["../../jctruffet.com/image/image_72/72_Avess%c3%a9_1.jpg","../../jctruffet.com/image/image_72/72_Avess%c3%a9_2.jpg","../../jctruffet.com/image/image_72/72_Avess%c3%a9_3.jpg","../../jctruffet.com/image/image_72/72_Avess%c3%a9_4.jpg","../../jctruffet.com/image/image_72/72_Avess%c3%a9_5.jpg","../../jctruffet.com/image/image_72/72_Avess%c3%a9_6.jpg"]},"Consult_chateau_formulaire6c1a":{"id":"Consult_chateau_formulaire6c1a","dept":"72","canton":"Sablé-sur-Sarthe","commune":"Avoise","nom":"Avoise","type":"Château","periode":"XV-XVIII","histoire":"Trois  châteaux à Avoise dont Dobert, Perrine  et St-Michel.  \r\n  DOBERT,  resté dans la même famille depuis la fin du XVe siècle, son importance apparait  au XVIIIe siècle pris un aspect classique par l'initiative Alexandrine de Bastrard de Fontenay. Le village s'est développé en longueur, au pied d'un coteau sur la Sarthe, du XVe au XVIIIe siècle, à partir d'une motte du Xe au XIIIe siècle, au confluent de la Sarthe. A partir d'un édifice des XVe et XVIIe siècles, reconstruction du château au milieu du XVIIIe siècle. Quelques communs datent début du XIXe siècle. Une longue allée plantée dessert le château entre deux communs. Derrière le commun nord, se trouvent des bâtiments de ferme (colombier, grange, étable). Le château, de plan rectangulaire, est cantonné de tours rectangulaires étroites façade sur cour, et de deux ailes identiques façade sur jardin. La disposition interne du château a été habillée au XIXe siècle et seules subsistent quelques menuiseries du XVIIIe siècle. La chapelle  est construite ou remaniée vers 1851, date portée; logement agricole du XVIe ou XVIIe siècle ; remanié aux XVIIIe et XIXe siècles ; orangerie et noria datent du XVIIIe siècle; communs, moulin, colombier, parties agricoles sont construits avant 1828 et remaniés au XIXe siècle, date portée 1833 ; jardin paysager réalisé au XIXe siècle ; aqueduc remanié vers 1840, daté par source, puis au début du XXe siècle. , Madame Hélène du Peyroux, location chambres d'hôtes de charme.","architecture":"DOBERT  pour les façades et toitures du château et des communs, les douves, l'aqueduc avec son système d'irrigation et l'allée plantée qui l'accompagne depuis l'est. Le château fait l'objet d'une inscription depuis le 24 juillet 1989.                                                                                                      PERRINE, le manoir de la Perrine de Cry fut reconstruit après la guerre de Cent Ans et agrandi au XVIe siècle. Saisi pendant la Révolution, il fut réuni en 1829 au domaine du château de Dobert.  Le manoir de la Perrine de Cry, inscrit par arrêté le 22 novembre 1993   La Vieille Tour, édifice fortifié inscrit par arrêté le 6 janvier 1926.                                                                                                                                                       SAINT-MICHEL, le village s'est développé en longueur, au pied d'un coteau sur la Sarthe, du XVe au XVIIIe siècle, à partir d'une motte du Xe au XIIIe siècle, au confluent de la Sarthe et du ruisseau des deux fonds et autour de l'église construite au moyen âge. Château-fort construit au XIIe ou XIIIe siècle, détruit en 1370. Le 29 octobre 1439, par lettres du Roi René de Sicile, duc d'Anjou et comte du Maine, permission avait été donnée de rebâtir le château de Pescheseul avec fosses, ponts levis, bastions, boulevards, canons et autres armes à repousser et assaillir pour le service du Roi. Château avec échauguette, enceinte et douves reconstruit pour Jean de Champagne par Jean Masneret et René Guitton entre 1483 et 1549. Détruit partiellement puis reconstruit; élévations, toit polygonal pour Tessier de la motte par l'architecte Moutier vers 1833. Partiellement remanié pour la comtesse de Breuil par l'architecte Pascal Vérité en 1908. Jardin paysager réalisé par André Leroy vers 1833, chapelle Saint-Michel et corps de passage sculpté élevés vers 1882. Orangerie et serres bâties vers 1884. Échauguette couverte d'un toit conique. Tours sur les angles du Logis couvertes de toits coniques, logis partiellement couvert d'un toit polygonal, corps de passage couvert en pavillon, chapelle voûtée d'ogives.","habitants":"St-Michel Famille Jean de Champagne\r\n        \"","divers":"Deux châteaux à Avoise dont Dobert grav 1-à-4,  Perrine  grav-5_6 et St-Michel grav-7.                                                                                 Dobert GPS : 47° 52' 25\" Nord, 0° 14' 07\" Ouest","gps":"47° 52' 25\" Nord, 0° 14' 07\" Ouest","images":["../../jctruffet.com/image/image_72/72_Avoise_1.jpg","../../jctruffet.com/image/image_72/72_Avoise_2.jpg","../../jctruffet.com/image/image_72/72_Avoise_3.jpg","../../jctruffet.com/image/image_72/72_Avoise_4.jpg","../../jctruffet.com/image/image_72/72_Avoise_5.jpg","../../jctruffet.com/image/image_72/72_Avoise_6.jpg","../../jctruffet.com/image/image_72/72_Avoise_7.jpg"]},"Consult_chateau_formulaireaf77":{"id":"Consult_chateau_formulaireaf77","dept":"72","canton":"Bonnétable","commune":"Ballon","nom":"Ballon","type":"Château-fort","periode":"XIII-XV-","histoire":"BALLON, il faut attendre la fin de la guerre de cent Ans pour que Ballon soit définitivement rattaché à la France.    A la fin du XVe siècle restauré par Jacques de Surgères; l'importance de ce type de forteresse a été réduite avec l'artillerie. Ballon joue à nouveau un rôle important pendant les guerres de religion. Henry IV y couche lors de sa reconquête de l'ouest. Au XVIe siècle Jacques d'Yverse acquéreur de la seigneurie renforce les défenses et remanies les façades du donjon donnant sur la cour, à la Renaissance, époque où les demeures comme les esprits s'ouvrent sur le monde extérieur. lui succèdent dans  la veuve  d'Artus de Cossé maréchal de France, puis passe à la famiille de Lusignan   de Saint-Gellais  et au XVIIIe siècle au au marquis de Vassé. en 1762 à Jean- François le Vayer de la Davière qui entreprend une démolition partielle  du château, mais décède deux ans plus tard sans pouvoir reconstruire. A la Révolution  sa soeur la comtesse de Sourches fait combler les fossés et abattre deux tours, subsiste le donjon qui appartient à Jean Guéroult toujours dans cette famille par  Madame Suzanne Babey-Gueroult, Le 21 juillet 1789, appelé \"Le jeudi noir\" une foule ameutée par les rumeurs d'arrivée de brigands, s'empare de Monsieur Cureau et de son gendre. Conduits au château, ils furent tués, l'un au premier étage, et l'autre dans les douves et leurs têtes au bout d'une pique, promenées dans Ballon.  Les assassins furent repris, l'un d'eux subit le supplice de la roue.","architecture":"BALLON, Du haut de la motte féodale, construite sur un éperon rocheux, on découvre un point de vue panoramique exceptionnel sur le Parc Maine-Normandie et le pays saôsnois.  Construction du château primitif au XIe siècle par Guillaume de Bellême, Ballon, surnommé la \"Porte du Maine\" a été du XIe au XIIIe siècle l'enjeu de nombreuses batailles entre Anglo-Normands et Français. construit sur un éperon  était entouré d'une puissante enceinte rectangulaire cernée par de large fossés. Le donjon a conservé ses courtines  qui relient un châtelet d'entrée et son pont-levis, la grosse tour poudrière découronnée et le donjon, cette tour en fer à cheval dont les murs de deux mètres d'épaisseur est équipée au XVIe siècle  d'une galerie supérieur sur mâchicoulis et fenêtres à meneaux côté cour, château de Ballon est une ancienne forteresse, de style médiévale, devenu un château.. Le jardin est classé Jardin remarquable. Pour les amoureux dHistoire, parmi les plus illustres personnages qui y ont séjourné on trouve le Roi Henri IV. Le donjon est entouré de jardins médiévaux et classés « jardins remarquables » le château  est reconnu aux M.H. depuis 1923.","habitants":"Famille ; Jacques d'Yverse \r\n        \"","divers":"Gravure de 1 à 6   Ballon  48° 10' 44\" nord, 0° 13' 59\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_Ballon_1.jpg","../../jctruffet.com/image/image_72/72_Ballon_2.jpg","../../jctruffet.com/image/image_72/72_Ballon_3.jpg","../../jctruffet.com/image/image_72/72_Ballon_4.jpg","../../jctruffet.com/image/image_72/72_Ballon_5.jpg"]},"Consult_chateau_formulaireabc2":{"id":"Consult_chateau_formulaireabc2","dept":"72","canton":"Loué","commune":"Pirmil","nom":"Balluère","type":"Château","periode":"XIV-XVI","histoire":"Deux châteaux à Pirmil, Balluère et Chéneru.                                                                                         BALLUERE,  Bertrand du Guesclin y tint garnison en 1361, défendant ce lieu avec acharnement contre Jean de Montfort, duc de Bretagne, qui avait fait alliance avec le roi dAngleterre. Cette aile fût construite par Mathurin de Launay, sa famille occupa la Balluère durant 240 ans. La Balluère passa entre les mains de la famille de Lamboul (1710), qui la conserva jusque vers 1850 après une interruption durant la révolution. En 1792 passe à un officier de la marine Charles-Pierre Morel deux ans plus tard confisqué vendu comme bien national par adjudication. Propriété  d'Ambroise le Divin notaire à Chantenay puis à M. Laporché notaire, puis les Hubert en 1887 qui  la conserveront jusqu'en 1926.  puis le cèderont à M. Raskins industriel belge, en 1930.  Durant la seconde moitié du XIXe siècle, le château passa entre de nombreuses mains avant dêtre laissé à labandon. Repris en 1923 par Mme Buvelot, antiquaire, qui procéda à dimportant travaux de restauration et créa le remarquable jardin topiaire à la française. De 1936 à 1966, La Balluère devint la propriété de la famille de la Taille-Trétinville et depuis lors celle de monsieur et madame Martin qui poursuivent avec amour et passion la restauration de ce bel édifice.","architecture":"BALLUERE,  le château de la Balluère est bâti sur un coteau, qui domine la route de Pirmil à Noyen-sur-Sarthe. Le château se compose dun corps de logis en pierre, une aile date du XIVe siècle, lautre étant du XVe siècle. La partie la plus ancienne, tenant lieu à lorigine de maison-forte, devînt à lépoque féodale une véritable petite forteresse, qui avec ses douves et ses oubliettes, joua un certain rôle pendant la guerre de succession de Bretagne et la guerre de Cent Ans.  Au XVe, les douves furent comblées, les remparts abattus, la Balluère devint un édifice seigneurial complété en 1470 par une aile sensiblement perpendiculaire, flanquée en son milieu dune imposante tour hors-oeuvre à toit pyramidal, chevauché par une belle lucarne à galbe sculpté. La base octogonale logeant un escalier,de cette tour, flanquée d'une tourelle, elle est reliée à la partie haute, de plan carrée par des encorbellements à boudins de pierre. Les façades et les toitures du château de La Balluère sont inscrites au titre des M.H. depuis le 28.12.1984. Le château de la Balluère propose des visites au Public et des séjours de luxe.                                                                                                                            CHENERU, peu connus du public, cachés au milieu d'un petit bois, se dressent tout au bout du chemin, les ruines de cet ancien château et de sa chapelle, qui se dressent au milieu d'une clairière. Ce château de Cheneru fut souvent remanié. La légende raconte que le grand connétable de France B. du Guesclin et le bon roi Henry IV y seraient venus.","habitants":"Famille de Lamboul \r\n        \"","divers":"Deux châteaux à Pirmil, Balluère grav 1-2 et Chéneru grav 3-4.                                                                                                                   GPS : 47° 53' 55\" Est et 0° 66' 27\" Ouest                                                                Cheneru GPS : 47° 55' 39,1\" Nord et 0° 06' 02,1\" Ouest","gps":"47° 53' 55\" Est et 0° 66' 27\" Ouest","images":["../../jctruffet.com/image/image_72/72_Ballu%c3%a8re_1.jpg","../../jctruffet.com/image/image_72/72_Ballu%c3%a8re_2.jpg","../../jctruffet.com/image/image_72/72_Ballu%c3%a8re_3.jpg","../../jctruffet.com/image/image_72/72_Ballu%c3%a8re_4.jpg"]},"Consult_chateau_formulaire7cec":{"id":"Consult_chateau_formulaire7cec","dept":"72","canton":"La Fléche","commune":"Bazouges sur le Loir","nom":"Barbée","type":"Château","periode":"XV-XVII","histoire":"BARBEE, Sainte-château se trouvait sur l'île qui barre le cours du Loir à quelque cinq cents mètres à l'ouest du château actuel. Il est certain en revanche qu'un édifice précédent, dont certaines parties dataient du XVe siècle ou du début du XVIe et d'autres du XVIIe siècle. Le château de la Barbée devint la propriété de François de La Bouillerie, homme politique français. Il appartient encore aujourd'hui à ses descendants directs. Le château de la Barbée est inscrit au M.H. depuis 1991.","architecture":"BARBEE, l'édifice actuel fut construit à quelque distance au XVIIIe siècle, entraînant la destruction du précédent, à l'exclusion de trois tourelles, d'une partie des douves et des corps de communs au sud, qui datent du XVIIe siècle. L'architecte serait le Fléchois Prosper Simon, auteur en 1790 d'un projet non réalisé pour le château de la Bouillerie à Crosmières. Bordant le jardin, une orangerie s'élève le long des douves au nord du logis. De cette campagne de reconstruction date la chapelle sainte Barbe et la glacière. Vers 1824, les architectes parisiens Abel Lahure et Adrien Lusson augmentèrent la face ouest de deux ailes en pavillon et d'un fronton curieusement orné d'une horloge monumentale. De cette campagne, datent aussi les communs au nord du logis.                                                                                   Inscription par arrêté du 28 octobre 1991, la construction du château de la Barbée date de la fin du XVe, XVIIe, XVIIIe siècle. Le château fut remanié au début du XIXe siècle. C'est un château de style Néo-Classique. Un logis précédent, dont la construction datait des XVe et XVIIe siècles, était implanté sur la terrasse qui prolonge à l'ouest le logis actuel. Ce bâtiment, aujourd'hui détruit, était entouré de douves alimentées par la rivière, le long desquelles s'élevaient de petites tours.  Vers 1824, les architectes parisiens Abel Lahure et Adrien-Louis Lusson augmentèrent la face ouest de deux ailes en pavillon et d'un fronton orné d'une horloge monumentale.","habitants":"Famille de  François de La Bouillerie\r\n        \r\n        \"","divers":"A Bazouges sur le Loir le château de Barbée","gps":"","images":["../../jctruffet.com/image/image_72/72_Barb%c3%a9e_1.jpg","../../jctruffet.com/image/image_72/72_Barb%c3%a9e_2.jpg","../../jctruffet.com/image/image_72/72_Barb%c3%a9e_3.jpg"]},"Consult_chateau_formulairee87a":{"id":"Consult_chateau_formulairee87a","dept":"72","canton":"Saint-Calais","commune":"Conflans-sur-Anille","nom":"Barre_Vanssay","type":"Château","periode":"XIV-XVII","histoire":"La BARRE, la famille Vanssay arrive à Vancé au IXe siècle et y restera pendant prés de cinq siècles.   à la fin du XIVe siècle l''édifice passe à la famille Chouët. La Barre rentre dans la famille de Vanssay en 1404 par le mariage de Jean de Vanssay avec Marie Chouët.  Est mentionné dès le XIVe siècle appartenant à la famille Bellanger, et par alliance retour à la famille de Vanssay, Le nom du château tire son origine du fait que c'était un lieu de justice et de péage. Au XVIe siècle, Marin de Vanssay fait agrandir et fortifier sa demeure avec l'autorisation du Duc de Mayenne, puis par Henri IV. Une aile est ajoutée au XVIIIe siècle et l'intérieur est refait à la même époque. A la Révolution, Au XIXe siècle, les Vanssay suivent Napoléon jusqu'en Russie,  le château reste dans cette famille par l'arrière petite fille Marguerite qui hérite épouse un Vanssay de la branche Saint-Denis  qui est aujourd'hui à la tête du domaine transformé en chambres d'hôtes.","architecture":"La BARRE,  à l'origine un petit manoir flanquée d'une tour d'escalier subit alors une restauration partielle, mettant un terme à des siècles de modifications architecturales. le logis  est agrandi à la droite de  la tour d'escalier une aile en avancée terminée sur la façade ouest par un pignon à redents et enfermé dans une enceinte à éperon  flanquée de tours dans laquelle s'élèvent une chapelle des écuries et une galerie, l'entrée de cette enceinte qui fait de la Barre une véritable forteresse défendu par un pont-levis. Au XVIIe siècle le logis est prolongé vers le nord par une aile classique dont le comble est éclairé par des oeils-de-Boeuf  au XIXe siècle deux tourelles sont accolées  sur la façade.  Quatre jardins, italien, japonais, américain, et inca, une fontaine et une roseraie pour flâner dans une nature rêvée. Ainsi, c'est dans une demeure, toujours entretenue et toujours aimée que vous vous rendez, l'histoire du lieu et de la famille étant enlacée depuis des siècles.    Blotti dans un parc privé de 40 ha,  ce château élégant, qui reste dans la Famille depuis 1404, offre des chambres magnifiques et luxueuses aux très beaux tissus déditeurs et un mobilier du XVIIIe, avec tout le confort moderne.","habitants":"Famille de Vanssay\r\n        \r\n        \r\n        \"","divers":"Gravure de 1 è 4   Barre                                                                  GPS : 47° 56° 50\" Nord, 0° 44' 43\" Est","gps":"47° 56° 50\" Nord, 0° 44' 43\" Est","images":["../../jctruffet.com/image/image_72/72_Barre_Vanssay_1.jpg","../../jctruffet.com/image/image_72/72_Barre_Vanssay_2.jpg","../../jctruffet.com/image/image_72/72_Barre_Vanssay_3.jpg","../../jctruffet.com/image/image_72/72_Barre_Vanssay_4.jpg"]},"Consult_chateau_formulaire80ac":{"id":"Consult_chateau_formulaire80ac","dept":"72","canton":"La Flèche","commune":"Bazouges sur loir","nom":"Bazouges","type":"Forteresse","periode":"XIII-XVI","histoire":"BAZOUGES, en 1414, le duc d'Alençon faisant aveu au duc d'Anjou pour sa baronnie de la Flèche comprend dans ledit aveu les seigneuries de Bazouges et de la Barbée.En 1422  Marguerite de Champagne fait installer une chapelle, puis les Lorges aux Durfort Au début du XVIe siècle, transaction entre demoiselle Jacquette du Pié-du-Fou (de la maison de Durtal), veuve de messire Joachim Girard, seigneur de Bazouges, et messire Jean de Belleville, seigneur de Belleville, en 1634  Guy  Alphonse de Durfort vend le domaine à Philippe de la Vairie.  Vers 1668, Gédéon l'Enfant, chevalier, sieur du Bois Moreau, et Suzanne Poitevin, son épouse, font aveu des châteaux terre et seigneurie de Bazouges délaissés. Les Arnac cèdent le château et la seigneurie en 1720  à Damien Fontaine. après saisie  acquis par la famille Aumont qui le perdirent à la Révolution  transforme l'édifice en demeure seigneuriale au XVIIIe siècle.  En 1910 Adrien Mithouard achète le château, il s'est transmis  par succession et appartient aujourd'hui à la famille de François Serrand.","architecture":"BAZOUGES,  au XIe siècle du château primitif, il ne subsiste que des vestiges datant du XIIIe ou du XIVe siècle qui se trouvent dans les communs actuels. Le châtelet date du dernier quart du XVe siècle, vers 1485, date à laquelle le seigneur de Bazouges fut autorisé à reconstruire le pont-levis. Le château est remanié aux XVe et XVIe siècles, sur autorisation de Louis XI. Dans la tour sud, distribuée par une vis hors oeuvre, se trouve la chapelle couverte d'une voûte d'ogives et des salons du XVIIIe siècle. La partie du logis datant du XVIIe siècle est couverte par un toit en pavillon. Elle est distribuée par une vis inscrite dans une tour hors-oeuvre couverte d'un toit polygonal. La partie du logis datant du XVIIIe siècle est couverte par un toit à longs pans brisés. Enfin, la partie datant du XIXe siècle est coiffée par un toit à pignons découverts. Tout proche de la tour, le moulin est coiffé d'un toit à pignon couvert.              Dans le prolongement du châtelet, un corps de logis, distribué par une tour d'escalier hors-oeuvre, datant du XVe siècle, fut remanié aux XVIIe et XVIIIe siècles sur l'ancienne courtine. Le jardin régulier, au nord du logis, date du XVIIIe siècle. A l'extrémité de ce corps de logis, un corps en retour d'équerre fut construit à la mode néo-gothique vers 1878. Les communs furent remaniés au XIXe siècle, et le moulin, reconstruit en partie vers 1868. Composé de tours jumelées dont l'une est coiffée d'un toit conique et l'autre de croupes rondes, le châtelet est défendu par des mâchicoulis appareillés en calcaire taillé.","habitants":"Demoiselle Jacquette du Pié-du-Fou\r\n        \"","divers":"Bazouges   GPS : 47° 40' 41,99\" Nord, 0° 10' 54,01\" Ouest","gps":"47° 40' 41,99\" Nord, 0° 10' 54,01\" Ouest","images":["../../jctruffet.com/image/image_72/72_Bazouges_1.jpg","../../jctruffet.com/image/image_72/72_Bazouges_2.jpg","../../jctruffet.com/image/image_72/72_Bazouges_3.jpg","../../jctruffet.com/image/image_72/72_Bazouges_4.jpg"]},"Consult_chateau_formulaire4160":{"id":"Consult_chateau_formulaire4160","dept":"72","canton":"La Flèche","commune":"Bazouges sur le Loir","nom":"Bazouges_III","type":"Château","periode":"XV-XVII-XIX","histoire":"Trois châteaux à Bazouches dans cet article; fontaines  et Marigné.                                                                                                           FONTAINES, l'édifice tire son nom d'une fontaine, remaniée au XIXe siècle (paroi, décor), située à peu de distance au nord du logis, au pied du coteau. Le corps central du logis qui constitue le vestige d'un ensemble primitif en équerre autrefois plus étendu, correspond à la partie remaniée vers 1837, il est flanqué à l'ouest par un pavillon construit vers 1865 et à l'est par un autre pavillon élevé vers 1900, en lieu et place d'une orangerie du XVIIIe siècle. Dans la cour, se trouve également une étable-remise datant du XVe siècle. Au sud de cet ensemble, est implanté un corps de communs comprenant un logement, datant du XVIIe siècle et remanié au XIXe siècle. Le logis et l'étable-remise sont implantés dans une cour rectangulaire délimitée par des douves qu'alimentent les eaux du Ruisseau-de-Fontaines. Le logis possède un sous-sol, un rez-de-chaussée surélevé, un étage carré et un étage de comble distribués par un escalier tournant à retours avec jour. Le corps central est couvert par un toit en croupe, l'aile occidentale par un toit brisé en pavillon et l'aile orientale par un toit brisé en croupe. Seule, l'aile orientale est appareillée en calcaire taillé. L'étable-grange est coiffée d'un toit à pignon et d'un appentis massé. Le corps de communs est couvert d'un toit à pignon couvert, à l'exception du logement, qui présente un étage carré distribué par un escalier à retours sans jour et qui est coiffé d'un toit en pavillon. La bordure de la fontaine est consolidée par une paroi en maçonnerie.","architecture":"MARIGNE, le logis fut construit en 1647 par les maîtres maçons. Les élévations furent remaniées au XVIIIe siècle : baies, ferronnerie. Datant du XVIIe siècle, l'escalier fut déplacé à l'intérieur du logis au XVIIIe siècle. Le corps prolongeant le logis à l'ouest fut entièrement remanié au XIXe siècle. Mentionnée au XVIIIe siècle, la chapelle fut probablement reconstruite dans la première moitié du XIXe. Le parc fut dessiné en 1883 par l'architecte paysagiste parisien E. Busigny. Le logis se compose d'un corps principal couvert d'un toit en croupe, présentant un sous-sol, un rez-de-chaussée surélevé, un étage carré et un étage de comble distribués par un escalier en charpente. Il est prolongé vers l'ouest par un corps en rez-de-chaussée coiffé par un toit à pignon couvert. Les parties agricoles sont composées d'une remise, dont les baies et les chaînes d'angle sont appareillées en brique et calcaire taillé en alternance, et d'une écurie-grange construite en équerre avec un corps en pavillon dans l'angle.","habitants":"Barbée; Famille  François de La Bouillerie\r\n        \r\n        \"","divers":"Trois châteaux à Bazouches; Fontaines  grav-1-2,  et Marigné grav- 4 . Boisardière grav-3                                                              Bazouches GPS : 47° 40' 41,99\" Nord, 0° 10' 54,01\" Ouest","gps":"47° 40' 41,99\" Nord, 0° 10' 54,01\" Ouest","images":["../../jctruffet.com/image/image_72/72_Bazouges_III_1.jpg","../../jctruffet.com/image/image_72/72_Bazouges_III_2.jpg","../../jctruffet.com/image/image_72/72_Bazouges_III_3.jpg","../../jctruffet.com/image/image_72/72_Bazouges_III_4.jpg"]},"Consult_chateau_formulaire5940":{"id":"Consult_chateau_formulaire5940","dept":"72","canton":"La Flèche","commune":"Bazouges sur le Loir","nom":"Bazouges_sur_Loir","type":"Château","periode":"XV-XVII","histoire":"Deux château à Bazouges dans cet article, Ambrières et Cailleret.                                                                        AMBRIERES, de fondation ancienne, le village de Bazouges s'est constitué autour de son église priorale fondée par l'abbaye Saint-Serge d'Angers. Il se trouve à la limite des anciens comtés du Maine et de l'Anjou, ce qui explique la présence d'un château fort, construit sur la rive droite du Loir. Les maisons datent pour l'essentiel des XVe, XVIIe, XVIIIe et XIXe siècles. Toutefois, le village a surtout connu une certaine ampleur à l'époque médiévale. Le château d'Ambrières fut entièrement remanié à partir du premier quart du XIXe siècle. Bâtie à flanc de coteau, la glacière dont la porte porte la date 1738, en constitue le seul vestige ancien. Le logis fut augmenté vers 1876 d'une aile orientale, époque à laquelle furent reconstruites les parties agricoles. Le logis est composé d'un corps principal couvert en croupe, à un étage carré et un étage de comble distribués par un escalier inscrit dans une tour dans oeuvre coiffée d'un toit polygonal. Ce corps est flanqué à l'ouest par un pavillon, également à un étage carré et un étage de comble et couvert en croupe. Il est flanqué à l'est par l'orangerie en rez-de-chaussée et couverte en croupe, la chapelle est couverte par un toit en croupe ronde. Les communs sont coiffés de toits à pignon couvert.","architecture":"CAILLEBERT, il ne s'est guère développé ensuite et fut supplanté par la ville de La Flèche. Seules modifications notables au XIXe siècle, la construction de la mairie, en lieu et place d'anciennes dépendances du presbytère, et la construction d'un pont en 1858, qui a entraîné l'abandon de l'ancien bac reliant les deux rives. Le château de Caillebert a été construit ou remanié au XVIIIe siècle. Le logis fut en grande partie remanié dans la première moitié du XIXe siècle. Le corps de dépendances fut probablement remanié vers le milieu du XIXe siècle. Le logis, à un étage carré et un étage de comble distribués par deux escaliers en charpente, se compose d'un corps principal recouvert par un toit en croupe, flanqué de deux ailes couvertes d'un toit en croupe brisée. Le corps de dépendances est également couvert par un toit en croupe.  élévation ordonnancée     à un étage carré ; étage de comble\r\n escalier dans oeuvre ; escalier tournant à retours avec jour ; en charpente\r\ngros oeuvre : calcaire ; grès ; silex ; appareil mixte ; moellon ; enduit  toit à longs pans ; croupe ; toit à longs pans brisés ; croupe  Couverture en ardoise.","habitants":"Seigneurs locaux\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Deux château à Bazouges Ambrières grav-1-2 et Cailleret grav 3-4.                                                                                            GPS : 47° 40' 41,99\" Nord, 0° 10' 54,01\" Ouest","gps":"47° 40' 41,99\" Nord, 0° 10' 54,01\" Ouest","images":["../../jctruffet.com/image/image_72/72_Bazouges_sur_Loir_1.jpg","../../jctruffet.com/image/image_72/72_Bazouges_sur_Loir_2.jpg","../../jctruffet.com/image/image_72/72_Bazouges_sur_Loir_3.jpg"]},"Consult_chateau_formulaire499c":{"id":"Consult_chateau_formulaire499c","dept":"72","canton":"La Ferté-Bernard","commune":"Villaines-la-Gonais","nom":"Beauchamp_Villaines","type":"Château","periode":"XVII","histoire":"BEAUCHAMP, construction du corps de logis du 1er château détruit début 1er quart XVIIe siècle pour Regnault Rouillet. Construction du pavillon postérieur droit du logis (chapelle) et du colombier dans la première moitié du XVIIe siècle. Construction du pavillon antérieur droit du logis, d'écuries, d'une grange et d'un colombier dans la troisième quart du XVIIe siècle. Remaniement du logis, construction de communs en 1682 et 1683 par Garaniau, architecte, Noël et Pierre Pesche, maîtres maçons, Yves et Joseph Jouin, charpentiers, pour André de Rouillet. Agrandissement des communs au début du deuxième quart du XIXe siècle pour André Richer de Beauchamp. \r\nles propriétaire succéssifs Emmanuel Beauchamp de Monthéard\r\n et   Emmanuel Jean Philbert Richer de Beauchamp  et  Charles Scheil","architecture":"BEAUCHAMP, agrandissement des communs au début du deuxième quart du XIXe siècle pour André Richer de Beauchamp. Construction du second château en 1867 (date portée). de style Renaissance avec dépendances. Dans le parc, on trouve les communs, le jardin, l'écurie, une grange, un colombier et une ferme.","habitants":"Famille de Regnault Rouillet\r\n        \r\n        \"","divers":"Château de Beauchamp à Villaines                                                     gps 48° 08' 10\" nord, 0° 36' 06\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_Beauchamp_Villaines_1.jpg","../../jctruffet.com/image/image_72/72_Beauchamp_Villaines_2.jpg","../../jctruffet.com/image/image_72/72_Beauchamp_Villaines_3.jpg"]},"Consult_chateau_formulaire447c":{"id":"Consult_chateau_formulaire447c","dept":"72","canton":"Sablé-sur-Sarthe","commune":"Solesmes","nom":"Beaucé_Fillon","type":"Château","periode":"XIV-XV-XVII","histoire":"BEAUCE, du Xe ou XIe siècle  prieuré, fondé en 1010. La seigneurie de paroisse de Solesme était un des domaines de la première maison de Sablé, dans les Xe et XIe siècles. Elle passa, de Raoul Ier de Beaumont, qui la tenait de son second mariage avec une héritière de cette maison, à l'un de ses fils, nommé aussi Raoul, de qui l'acheta Geoffroi, frère de père de celui-ci, qui tenait de sa mère, également, la seigneurie de Sablé. Geoffroi et ses successeurs, en fondant et dotant un prieure a Solesme, comprirent, dans cette dotation, le fief seigneurial de paroisse, que le prieuré parait avoir toujours possédé depuis. Il appartient à l'homme politique François Fillon et sa femme Penelope depuis 1993, et a connu un retentissement médiatique pendant la campagne pour les primaires de la droite et du centre de 2016, puis un regain dintérêt au cours de l'affaire Fillon7 en février 2017. Il a été perquisitionné le 3 mars 2017 par des enquêteurs de lOffice central de lutte contre la corruption et les infractions financières et fiscales pour déterminer le montant du patrimoine immobilier de François Fillon.","architecture":"BEAUCE, fut construit au XIVe ou XVe siècle avec une chapelle à pignons découverts du XIXe siècle. Il fut plusieurs fois remanié ou agrandi. Il se situe au bord de la rivière du même nom. Il est recensé à l'Inventaire général du patrimoine culturel français depuis 1990, mais il n'est ni inscrit ni classé monument historique. Le Manoir et ses bâtiments attenants (chapelle, colombier, chenil, écuries) sont entourés d'un domaine. Le Manoir de Beaucé a été acquis en 1984. Château construit au XIVe siècle, la tour surplombant les vieux communs construite aux XVIe et XVIIe siècles, l'aile en retour, les trois pavillons et la chapelle datent du XVIIIe siècle. Communs avec escalier tournant construits dans la deuxième moitié XVIIe siècle. Colombier et abri de pêche construit avant 1828 et remanié au XIXe siècle. Jardin paysager aménagé vers 1829. Logis partiellement couvert de toits en pavillon; tour couverte d'un toit conique.","habitants":"Famille de François Charles Armand Fillon  \r\n        \"","divers":"Beaucé  GPS : 47° 50' 59\" Nord, 0° 15' 01\" Ouest","gps":"47° 50' 59\" Nord, 0° 15' 01\" Ouest","images":["../../jctruffet.com/image/image_72/72_Beauc%c3%a9_Fillon_1.jpg","../../jctruffet.com/image/image_72/72_Beauc%c3%a9_Fillon_2.jpg","../../jctruffet.com/image/image_72/72_Beauc%c3%a9_Fillon_3.jpg","../../jctruffet.com/image/image_72/72_Beauc%c3%a9_Fillon_4.jpg"]},"Consult_chateau_formulaire2374":{"id":"Consult_chateau_formulaire2374","dept":"72","canton":"Château-du-Loir","commune":"Beaumont-sur-Dême","nom":"Beaumont_sur_Dème","type":"Manoir","periode":"XV-XVIII","histoire":"quatre châteaux à Beaumont sur Dème, la Borde, la Hayes, Fresne et la Marcelière.                                                                                                    La BORDE, entre dans la famille de Beaumont par le mariage de Jules Bonnin de la Bonninière, comte de Beaumont, fils du marquis de la Chartre avec Rose Préau de la Baraudière qui en avait hérité de son oncle, le chevalier Jacques Huet d'Artigné. Gustave de Beaumont, né au château le 16 février 1802, épouse la petite-fille de Lafayette  procureur du roi au tribunal de première instance de Versailles le 22 février 1826. Opposé au coup d'État du 2 décembre 1851, Gustave de Beaumont fit partie comme Tocqueville, des députés arrêtés le 2 décembre 1851 à la Mairie du Xe arrondissement où ils s'étaient réunis, après avoir été expulsés manu militari du Palais-Bourbon, pour protester contre le coup de force de Louis-Napoléon Bonaparte. Conduit au fort du Mont-valérien, il fut libéré au bout de quelques jours et à sa sortie de prison il se retire au château de la Borde ou il finit ses jours.  Borde, construit au XVIIIe siècle en tuffeau et recouvert d'ardoise, entre dans la famille de Beaumont par le mariage de Jules Bonnin de la Bonninière, comte de Beaumont, fils du marquis de la Chartre avec Rose Préau de la Baraudière qui en avait hérité de son oncle, le chevalier Jacques Huet d'Artigné .                                                                                                                    HAYES, seigneurie de la famille de BERZIAU vers 1600. Appartenait à M. Bonnin de la Bonninière de Beaumont(la Ronce), vers 1830.                                                                                                        FRESNE, en 1835 appartenait à M. Busson, de Courdemanche.                                                                                                 La MARCELIERE construit par Henry de Berziau sous le règne de Henri IV.  Henry Hurozius de Berziau, fondateur du château La Marcellière, époux de Claude Tragin de Cohardon.","architecture":"La BORDE, le château de la Borde, construit au XVIIIe siècle en tuffeau et recouvert d'ardoise.                                                                                                    FRESNES-SAVARY, ce château du Fresnes-Savary, construit en calcaire aux XVe et XVIIe siècles, de style gothique flamboyant, possède une belle façade Renaissance recouverte d'ardoise. C'était la demeure de la famille Bonnin de La Bonninière de Beaumont, Marquis et Comtes de Beaumont-la-Ronce, Marquis de la Chartre-sur-Loir, pairs de France, seigneurs des Châteliers, Beauvais, Le Fresne-Savary, Fontenay et Châtillon.","habitants":"Borde; Famille de  Jules Bonnin de la Bonninière,                         Fresnes ; famille Bonnin de La Bonninière de Beaumont\r\n        \r\n        \r\n        \"","divers":"quatre châteaux à Beaumont sur Déme, la Borde grav -1-2-3-4, la Hayes, Fresne et la Marcelière.                Beaumont                                                                                       gps 47° 41' 40\" nord, 0° 34' 09\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_Beaumont_sur_D%c3%a8me_1.jpg","../../jctruffet.com/image/image_72/72_Beaumont_sur_D%c3%a8me_2.jpg","../../jctruffet.com/image/image_72/72_Beaumont_sur_D%c3%a8me_3.jpg","../../jctruffet.com/image/image_72/72_Beaumont_sur_D%c3%a8me_4.jpg","../../jctruffet.com/image/image_72/72_Beaumont_sur_D%c3%a8me_5.jpg","../../jctruffet.com/image/image_72/72_Beaumont_sur_D%c3%a8me_6.jpg"]},"Consult_chateau_formulairefe48":{"id":"Consult_chateau_formulairefe48","dept":"72","canton":"Sillé-le-Guillaume","commune":"Beaumont sur Sarthe","nom":"Beaumont_sur_Sarthe","type":"Vestiges fort","periode":"XI XIII","histoire":"BEAUMONT sur Sarthe, il est de style Roman. Le seigneur de Beaumont initial fut Raoul, vicomte du Mans, mort en 1061. Ses successeurs eurent souvent à lutter contre Guillaume le Bâtard, qui, pendant l'espace de quatorze ans, de 1070 à 1084, prit la ville jusqu'à cinq fois. Enfin, le vicomte Hubert, fut assez heureux pour forcer le redoutable conquérant de l'Angleterre à entrer de façon pacifique. les Vicomtes de Beaumont se sont tous prénommés Raoul, pendant près de 10 ans, jusquà lavènement de Hubert en 1067 et quil ne leur était attribué aucun numéro dordre. Les historiens saccordent à dater notre château du XIe siècle. Pour les uns, il serait de vers lan 1000, uvre du Vicomte Raoul II car, gendre de Yves de Creil, ancien grand maître des Balistes de France, et beau-frère de Guillaume de Bellême, tous deux fort habiles dans lart de construire des places fortes. On suppose quil utilisa leurs compétences pour édifier les défenses de Beaumont et de Fresnay et en faire de véritables villes-fortes. Pour dautres il serait de la fin du XIe, hypothèse la plus difficile à retenir. En effet, il appartient à la famille des premiers donjons en pierres de forme rectangulaire ou carrée. Devenu la propriété de la commune depuis la Révolution, le vieux château fut mis en adjudication le 7 juillet 1901 et acheté par Mr FLorentin qui fit restaurer les vieilles murailles et les contreforts qui menaçaient de sécrouler, faisait édifier, sur les épais remparts, de fausses ruines et construisant, dans la cour ouverte sur la vallée de la Sarthe, un pavillon de style Renaissance du XVIe siècle.","architecture":"A un kilomètre au nord à Juillé  le Vieux château; Cet édifice gallo-romain heptagonal a été classé aux M.H.depuis le 8/12/1988. Il fait partie du Vieux Château, qui, lui, a été inscrit aux M.H. depuis le 6/06/2016. En 2018, la Mairie y a emménagé après une importante restauration.        BEAUMONT SUR SARTHE, les ruines du château attestent la grandeur passée et l'importance de la cité défendue par une enceinte fortifiée et qui eut à subir de nombreux sièges, Guillaume le Bâtard s'en empare vers 1064; Geoffroi d'Anjou brûle la ville défendue par le vicomte Roscelin en 1135 ; le Comte de Richemont la prend en 1412, les Anglais en 1417 et 1433 ; en 1562, les Huguenots, se retirant du Mans vers Alençon, enfoncent les portes de la ville, tuent, brulent l'église et les halles.  Le château qui domine, avec son donjon du XIIe siècle, le cours de la Sarthe, a conservé sa partie inférieure, celle-ci a la forme d'un parallélogramme dont ne restent que les murs, renforcés aux angles de solides contreforts en grès d'un bel appareil qui ont pu être ajoutés après coup, de même que la tour ronde et étroite qui s'élève du côté de la ville. Mais l'endroit le plus pittoresque reste le vieux château dominant les toits de tuiles de la ville et la rivière au pied de celle-ci que traverse un vieux pont bas ayant conservé ses arches de pierre.Éléments protégés MH : les restes du château de Beaumont sur Sarthe : inscription par arrêté du 6 janvier 1927.                                                         BUSONNIERES les seigneurs qui ont été propriétaires\r\n    François René Amelot de Barat\r\n    Jean Baptiste Gaston Joseph René Marie D'Arlanges","habitants":"Guillaume le Bâtard\r\n        \"","divers":"Beaumont-sur-Sarthe la Busonnière grav-1-2-3 de Fresne -grav-4-5 et vestiges grav-6-7-8.                                           GPS : 48° 13' 26,4\" Nord, 0° 07' 40,44\" Est                                                    Juillé GPS : 48° 14' 40\" Nord, 0° 07' 19\" Est","gps":"48° 13' 26,4\" Nord, 0° 07' 40,44\" Est","images":["../../jctruffet.com/image/image_72/72_Beaumont_sur_Sarthe_1.jpg","../../jctruffet.com/image/image_72/72_Beaumont_sur_Sarthe_2.jpg","../../jctruffet.com/image/image_72/72_Beaumont_sur_Sarthe_3.jpg","../../jctruffet.com/image/image_72/72_Beaumont_sur_Sarthe_4.jpg","../../jctruffet.com/image/image_72/72_Beaumont_sur_Sarthe_5.jpg","../../jctruffet.com/image/image_72/72_Beaumont_sur_Sarthe_6.jpg","../../jctruffet.com/image/image_72/72_Beaumont_sur_Sarthe_7.jpg","../../jctruffet.com/image/image_72/72_Beaumont_sur_Sarthe_8.jpg"]},"Consult_chateau_formulaire7328":{"id":"Consult_chateau_formulaire7328","dept":"72","canton":"La Suze-sur-Sarthe","commune":"Chemiré-le-Gaudin","nom":"Belle_Fille","type":"Château","periode":"XV-XVII","histoire":"BELLE-FILLE, édifié au XVe siècle, par les Courthardy  Pierre de Courthardy avocat général  premier président au parlement de Paris . En 1567 passe a Philibert le Vayer seigneur de Lignerolles gentilhomme du duc d'Anjou,  dont la veuve acquerra du baron de Pirmil la  seigneurie de Chémiré pour réunir son fief. Catherine le Vayer l'apporte en dot à René II du Bellay   baron de la Flotte-Hauterive. Leur fille , Renée épouse en 1608  Charles marquis de Hautefort, comte de Montignac leur fille Marie de Hautefort sera aimée de Louis XIII avant d'épouser le maréchal Schomberg le domaine passe à son frère Gilles de Hautefort,  dans sa descendance jusqu'en 1733 et sera vendu à Nicolas Nepveu  seigneur de la Motte ancien officier chevalier de Saint-Louis.  Le manoir restera dans cette famille jusqu'en 1843 date du décès  de son dernier représentant  sans postérité, sera acquis  par la famille Beunaiche de la Corbière passera ensuite aux Sacré posseseur  du château de la Sauvagère puis par alliance, aux Longueval marquis d'Haraucourt et en 1938 acquis par M. Lucien Trouvé qui transmet la propriété à sa fille madame Pierre Migault et à ses enfants.","architecture":"BELLE-FILLE, la construction  date du XIe, XVe au XVIIe siècle, Belle-fille possède des fenêtres à meneaux, une tour octogonale et une porte Renaissance en roussard et pierre blanche, remanié aux XVIIe et XIXe siècle. Le portail, à arcade en pierre blanche et roussard et donnant sur la cour d'honneur formant terrasse, comporte, au-dessus de l'entrée, deux panneaux de pierre calcaire sculptés d'armoiries. Le corps de logis principal possède une tourelle polygonale et est prolongé par un corps de bâtiment du XVIIIe siècle. Le Pigeonnier date du XVIIe siècle. Le château de Belle-fille est connu par sa légende de Damase (seigneur d'Asnières) et de Damegeros (sa nièce). Sont inscrits aux M.H. les façades , ses toitures, son portail d'entrée, le pigeonnier et les communs, depuis le 11/04/1973.","habitants":"Belle-fille, Famille de Courthardy                       \r\n        \"","divers":"Belle Fille   grav 1-à-4                                                                       GPS : 47° 56' 15,51\" Nord et 0° 1' 3,17\" Ouest","gps":"47° 56' 15,51\" Nord et 0° 1' 3,17\" Ouest","images":["../../jctruffet.com/image/image_72/72_Belle_Fille_1.jpg","../../jctruffet.com/image/image_72/72_Belle_Fille_2.jpg","../../jctruffet.com/image/image_72/72_Belle_Fille_3.jpg","../../jctruffet.com/image/image_72/72_Belle_Fille_4.jpg"]},"Consult_chateau_formulairea008":{"id":"Consult_chateau_formulairea008","dept":"72","canton":"Savigné-l","commune":"Saint-Célerin","nom":"Bois_Doublé","type":"Château","periode":"XVII","histoire":"BOIS DOUBLE,  Bois Doublé est aujourd'hui l'un des plus élégant château de la Sarthe, propriété de la communauté de communes des Brières. Bâti en 1625 par Étienne Godefroy, compagnon d'armes du Maréchal de Lavardin, fidèle partisan du roi Henri IV. Dès 1902, le Baron Lucien Leret d'Aubigny, propriétaire du domaine, entreprend la restauration des lieux. L'édifice adopte le style Renaissance, ajoutant au milieu du bâtiment une tourelle. A l'intérieur du château, des  peintures consacrées aux faits d'armes du Maréchal de Lavardin et des scènes évoquant les batailles d'Henri IV. Deux salles sont principalement consacrées à ces travaux de peinture : la grande salle dite salle des batailles ainsi que les murs de la chapelle. D'autres tableaux, sont visibles dans l'actuelle salle à manger et la chambre d'apparat, cheminée du XVe siècle, avec au-dessus un portrait du maréchal Beaumanoir de Lavardin à cheval. Colombier du XVe siècle.","architecture":"BOIS DOUBLE, fut construit en 1625, pour Étienne Godefroy, compagnon d'armes du Maréchal de Lavardin, fidèle partisan du roi Henri IV. Il fut décoré par un peintre d'Amiens, Adam Tardieu. Dès 1902, le Baron Lucien Leret d'Aubigny, propriétaire des lieux, entreprit sa restauration. Il adopta le style Renaissance, ajoutant au milieu du bâtiment, une magnifique tourelle. Les peintures consacrées aux faits d'armes du Maréchal de Lavardin méritent l'attention des artistes, des archéologues et des amateurs. Deux salles sont principalement consacrées à ces travaux de peinture : la grande salle dite « des batailles » ainsi que les murs de la chapelle. D'autres tableaux, moins intéressants, sont visibles dans l'actuelle salle à manger et la chambre d'apparat. Bois Doublé est aujourd'hui l'un des plus élégant château de la Sarthe et la propriété de la communauté de communes des Brières. Sur le parc de 22 Ha, on trouve de belles dépendances et un pigeonnier notable du XVIe siècle. Il existe 3 châteaux sur la commune à découvrir : le château de Passay, le château de Chanteloup et le château Bois-Doublé.","habitants":"Étienne Godefroy et  le Baron Lucien Leret d'Aubigny\r\n        \"","divers":"Bois-Doublé. GPS : 48° 06' 28\" Nord, 0° 21' 08\" Est","gps":"48° 06' 28\" Nord, 0° 21' 08\" Est","images":["../../jctruffet.com/image/image_72/72_Bois_Doubl%c3%a9_1.jpg","../../jctruffet.com/image/image_72/72_Bois_Doubl%c3%a9_2.jpg","../../jctruffet.com/image/image_72/72_Bois_Doubl%c3%a9_3.jpg","../../jctruffet.com/image/image_72/72_Bois_Doubl%c3%a9_4.jpg","../../jctruffet.com/image/image_72/72_Bois_Doubl%c3%a9_5.jpg"]},"Consult_chateau_formulairef2c0":{"id":"Consult_chateau_formulairef2c0","dept":"72","canton":"Bonnétable","commune":"Bonnétable","nom":"Bonnétable","type":"Château","periode":"XV-XVIII","histoire":"BONNETABLE, en 1478  Jean d'Harcourt, entreprend la construction du château, les travaux ne sont pas terminés à sa mort en 1487. Ses successeurs les font poursuivre. Aux d'Harcourt succèdent à Bonnétable, par alliances, les Coesme, puis les Bourbon-Soissons, jusqu'au début du XVIIIe siècle. En 1621, Louis XIII est reçu au château de Bonnétable par Anne de Montafié, comtesse de Bourbon-Soissons. Au XVIIIe siècle, le château, passé par alliance aux d'Albert de Luynes, n'est plus que rarement habité et perd ses douves, qui sont comblées. Sous la Révolution, le château de Bonnetable appartient à Louis Joseph Charles Amable d'Albert de Luynes, 6e duc de Luynes (1748-1807), qui n'émigre pas. Resté en sa possession, le domaine de Bonnétable se transmet à sa fille, Pauline Hortense d'Albert de Luynes, duchesse de Montmorency par son mariage avec le Duc Mathieu, morte à Bonnétable en 1858. Vers 1880, le château, échoit à son petit-fils, Sosthène II de La Rochefoucauld, duc de Doudeauville, fils d'Élisabeth-Hélène de Montmorency-Laval et de Sosthène Ier de La Rochefoucauld-Doudeauville, qui charge l'architecte Henri Parent (1819-1895),  toujours dans la famille des Doudeauville.","architecture":"BONNETABLE, occupé par les Anglais en 1420-1422, pendant la guerre de Cent Ans, le château de Bonnétable, alors siège d'une ch
