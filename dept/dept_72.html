âtellenie, est ruiné. Par lettres données en juillet 1472, Louis XI autorise Jean d'Harcourt à faire rétablir le château de Bonnétable. La construction de cette nouvelle demeure débute en 1476. Mathurin Delandelle en est le maître d'uvre. Le marché passé alors pour cette reconstruction prévoit un édifice de 110 pieds carrés, avec une grosse tour à chaque angle, deux grosses tours flanquant un porche d'entrée voûté, avec son accumulation de tourelles , de lucarnes, de clochetons , de mâchicoulis et de fenêtres. Bonnétable est le type même du \"château de la Loire\" tel que l'imaginait le romantisme architectural du Second Empire, une chapelle de 40 pieds de long sur 24 pieds de large, couverte en ardoises d'Angers, des murs avec mâchicoulis en pierre de taille,  d'une importante campagne de rénovation. Les façades de l'édifice sont rhabillées dans un style néo-gothique, avec, en particulier, le percement de nombreuses ouvertures, l'ajout de tourelles, de bow-windows et de perrons. Pour le décor intérieur, l'architecte fait appel à des artisans décorateurs et peintres venus de la ville du Mans.","habitants":"Famille d'Harcourt\r\n        \"","divers":"Château de Bonnétable   GPS : 48° 10' 37\" Nord, 0° 24' 58\" Est","gps":"48° 10' 37\" Nord, 0° 24' 58\" Est","images":["../../jctruffet.com/image/image_72/72_Bonn%c3%a9table_1.jpg","../../jctruffet.com/image/image_72/72_Bonn%c3%a9table_2.jpg","../../jctruffet.com/image/image_72/72_Bonn%c3%a9table_3.jpg","../../jctruffet.com/image/image_72/72_Bonn%c3%a9table_4.jpg","../../jctruffet.com/image/image_72/72_Bonn%c3%a9table_5.jpg","../../jctruffet.com/image/image_72/72_Bonn%c3%a9table_6.jpg","../../jctruffet.com/image/image_72/72_Bonn%c3%a9table_7.jpg","../../jctruffet.com/image/image_72/72_Bonn%c3%a9table_8.jpg"]},"Consult_chateau_formulaire1e3b":{"id":"Consult_chateau_formulaire1e3b","dept":"72","canton":"Loué","commune":"Amné en champagne","nom":"Bordeaux_72","type":"Château","periode":"XVIII","histoire":"Deux châteaux à Amné, Borde et des Bordeaux.                                  BORDE construit au XVIIIe siècle en tuffeau et recouvert d'ardoise, entre dans la famille de Beaumont par le mariage de Jules Bonnin de la Bonninière, comte de Beaumont, fils du marquis de la Chartre avec Rose Préau de la Baraudière qui en avait hérité de son oncle, le chevalier Jacques Huet d'Artigné. Gustave de Beaumont, né au château le 16 février 1802, épouse la petite-fille de Lafayette et est Procureur du roi au tribunal de première instance de Versailles le 22 février 1826. Opposé au coup d'État du 2 décembre 1851, Gustave de Beaumont fit partie comme Tocqueville, des députés arrêtés le 2 décembre 1851 à la Mairie du Xe arrondissement où ils s'étaient réunis, après avoir été expulsés manu militari du Palais-Bourbon, pour protester contre le coup de force de Louis-Napoléon Bonaparte. Conduit au fort du Mont-Valérien, il fut libéré au bout de quelques jours et à sa sortie de prison il se retire au château de la Borde ou il finit ses jours.","architecture":"Des BORDEAUX   son nom provient du mot \"borde\", qui signifie chaumière. Commencé en 1751, sa construction de forme rectangulaire est terminée à chaque extrémité par deux petits pavillons, contenant chacun, un escalier, avec au centre de la façade, une légère avancée, coiffée dun fronton rectangulaire, avec les armes de la famille du marquis Du Bois de Courceriers. Il possède un toit à la Mansart, des boiseries et 29 trumeaux classés, qui agrémentent la cheminée (scènes galantes, jeux, oiseaux, lavandières, mythologie grivoise). La chapelle date de 1699 dans les communs qui bordent la cour, fermée par des grilles en fer forgé. Toutes les ouvertures sont ornées dune agrafe dun dessin différent dinspiration rocaille. L'édifice est inscrit aux M.H. le 28/12/1984 pour les façades et toitures du château, des communs, des bâtiments de ferme, de la porterie, l'escalier principal du château avec sa rampe en fer forgé, les douves. Le château des Bordeaux appartient depuis à une société privée. Le château des Bordeaux est fermé au Public. Il existe 2 châteaux sur la commune à découvrir et 1 manoir : le château des Bordeaux, le château de Milon, le manoir de la Danière.","habitants":"Famille du marquis Du Bois de Courceriers\r\n        \"","divers":"Deux châteaux à Amné, Borde et des Bordeaux.                                      Bordeaux PS : 48° 01' 30\" Nord et 0° 03' 16\" Ouest","gps":"","images":["../../jctruffet.com/image/image_72/72_Bordeaux_72_1.jpg","../../jctruffet.com/image/image_72/72_Bordeaux_72_2.jpg","../../jctruffet.com/image/image_72/72_Bordeaux_72_3.jpg"]},"Consult_chateau_formulaire993e":{"id":"Consult_chateau_formulaire993e","dept":"72","canton":"La flèche","commune":"Crosmières","nom":"Bouillerie","type":"Château","periode":"XVII","histoire":"BOUILLERIE, Siège d'une seigneurie ancienne,, la composition régulière du milieu du XVIIe siècle  mais d'autres, dans les années 1882-1883, ont bouleversé la régularité du bâti. Depuis lors, les remaniements des intérieurs se sont succédé avec régularité. Seules ont conservé aujourd'hui un caractère d'authenticité la grande allée de tilleuls menant à une fabrique de style néo-classique.  ont été propriétaire  Alphonse Sébastien Louis Roullet de la Bouillerie.   vers 1810, l'architecte Adrien Lusson, probablement épaulé par Abel Lahure, son maître parisien d'alors dont la signature figure sur quelques pièces d'archives, entreprend le remaniement de l'aile sud qui relie le corps à l'ancienne aile de communs. Les Lusson est également l'auteur de plusieurs projets pour le parc, dont il subsiste notamment une fabrique à l'extrémité ouest de celui-ci, élevée après 1825 suivant des plans élaborés dans le premier quart du siècle. Vers 1816, il construisit la chapelle, dédiée à saint Blaise, qui se trouvait initialement dans l'aile nord du logis.","architecture":"BOUILLERIE,   implantée à l'ouest du parc, la motte de la Baudinière constituait sans doute au moyen âge le site primitif du château. Le logis actuel conserve, dans son aile méridionale qui correspond probablement à un ancien corps de communs, une cheminée datant du XVe ou du XVIe siècle. Le corps central du logis fut construit ou reconstruit au XVIIe siècle.  En 1882, l'architecte angevin Ernest Dainville, bientôt remplacé par son assistant René Chauveau, entreprit la reconstruction totale de l'aile nord. En 1883, le parc fut redessiné par l'architecte paysagiste parisien E. Busigny, le logis consiste en un corps central couvert par un toit en croupe. Il est flanqué au sud par une aile couverte en croupe, elle-même prolongée par une aile en retour d'équerre, également couverte en croupe. L'aile nord de Dainville consiste en quatre corps juxtaposés, couverts en croupe ou en pavillon, où se trouve l'escalier en maçonnerie. Le corps central et l'aile nord présentent un étage carré et un étage de comble, l'aile sud un étage carré et l'aile sud en retour d'équerre un rez-de-chaussée et un étage de comble. De plan circulaire, le jardin est couvert  par un toit en terrasse. La chapelle est coiffée d'un toit à pignons découverts.","habitants":"Seigneur local  Les Lusson\r\n        \"","divers":"Bouillerie GPS : 47° 44' 51\" Nord, 0° 09' 02\" Ouest","gps":"47° 44' 51\" Nord, 0° 09' 02\" Ouest","images":["../../jctruffet.com/image/image_72/72_Bouillerie_1.jpg","../../jctruffet.com/image/image_72/72_Bouillerie_2.jpg"]},"Consult_chateau_formulaire51ea":{"id":"Consult_chateau_formulaire51ea","dept":"72","canton":"Saint-Calais","commune":"Bouloire","nom":"Bouloire","type":"Manoir","periode":"XV-XVI","histoire":"BOULOIRE, le château primitif est détruit lors des invasions normandes du IXe siècle, il est reconstruit au XIIe siècle. Durant l'occupation du Maine par les Anglais, à partir de 1428, \"ledit château estoit  cheu en main de femme, laquelle le délaissa sans provision de garde, les habitants du pays d'ilec environ alèrent audit chasteau et le abatirent\".                                                                                                                                                                   A cinq kilomètres au sud à Saint-Mars de Locquenay le château de CHESNAYE, les plans de Siméon Garangeau, architecte de Louis XV, qui réalisa, entre autres, les fortifications de Saint-Malo datent de 1685. Cette petite seigneurie rurale fut construite pour Charles Bailly, conseiller au grand conseil du roi, en 1686. Ce dernier aurait inspiré le décapant poète Scarron pour lun de ses personnages ainsi que sa belle mère, caricaturée sous les traits de Madame Bouvillon. propriétaire  depuis 1987 de Patricia et Jean-Gabriel Pichon et à un kilomètre à l'ouest  à Volnay le château de POIX pas d'information historique.","architecture":"BOULOIRE, la construction date des XVe et XVIe siècles.  Il appartient à la commune, est ouvert au public et se visite. L'édifice actuel est bâti en 1466 par François de Lesparvez, seigneur de Bouloire, après que Louis XI lui est accordé \"faculté de le faire rénover et d'y faire de grosses tours, boulevards, canonnières, mâchicoulis, pont-levis et autres grandes fortifications par le moyen desquelles le  dict chasteau soit bien deffensable\". Il ne subsiste aujourdhui que lancien logis principal qui limite la place dans sa partie nord. La commune a fait procéder à sa restauration tout en respectant les plans et descriptifs datant de la fin du XVIIe siècle. Cest ainsi que la salle du rez-de-chaussée a pu retrouver son lustre dantan et que la cave située sous lédifice a pu être rouverte, permettant de dégager un joli petit caveau situé dans laxe de lescalier de pierre de la tour principale. Le château de Bouloire a été inscrit aux M.H. le 6/01/1926.                                                                                                       CHESNAYE, le château fut peu modifié au XVIIIe siècle. Il conserve un riche décor de ces deux époques : sols en terre cuite, lambris. Le château peut être en partie visité lors des journées du Patrimoine. Dirigez-vous sur la route du Grand-Lucé et arrêtez-vous au niveau du lavoir pour voir sa belle façade. inscrit au titre des M.H. depuis le 7 août 1997                                                                                             POIX, de plan rectangulaire à deux niveaux à trois travées toit en ardoises en croupes.","habitants":"Famille de François de Lesparvez\r\n        \"","divers":"Deux châteaux à Bouloire  celui de Bouloire et de la Chesnaye Bouloire  grav 1-2                                                      Bouloire GPS : 47° 58' 23\" Nord, 0° 33' 21\" Est                                               Chesnaye grav 4-5                                                                          gps   47° 55' 46\" nord, 0° 29' 06\" est                                                   Volnay  grav-3                                                                                         gps 47° 55' 56'' Nord  00° 28' 03'' Est","gps":"47° 58' 23\" Nord, 0° 33' 21\" Est","images":["../../jctruffet.com/image/image_72/72_Bouloire_1.jpg","../../jctruffet.com/image/image_72/72_Bouloire_2.jpg","../../jctruffet.com/image/image_72/72_Bouloire_3.jpg","../../jctruffet.com/image/image_72/72_Bouloire_4.jpg","../../jctruffet.com/image/image_72/72_Bouloire_5.jpg"]},"Consult_chateau_formulaire3492":{"id":"Consult_chateau_formulaire3492","dept":"72","canton":"La Ferté-Bernard","commune":"Beillé","nom":"Bresteau","type":"Château","periode":"XV","histoire":"BRESTEAU, c'est en 1080 que l'on trouve la première référence à la famille Brêteau, avec la mention de Herbert Papillon comme témoin d'une convention. En 1496, la vicomté de Bréteau appartient à Mathurin de Saint Mars, seigneur de Saint Georges du Rosay et de Céton qui reçoit l'aveu de Hervé de Chahannay, seigneur de la Chevrolière. En 1606, Nicolas de Laval Bois Dauphin, maréchal de France, fait aveu des comté et terre seigneuriale de Brestau. Pierre Dominique Bérard de  Bonnière.","architecture":"BRESTEAU; à l'origine, Brêteau fait partie des maisons fortes dites à enclos unique. La date de construction de la demeure est estimée à la fin du XIVe ou au début du XVe siècle. Cette maison seigneuriale, de plan très simple, avec une seule cour fossoyée, possède des bâtiments annexes. La seigneurie de paroisse de Beillé, annexée au château de Brêteau, relève en partie du bailliage de La Bosse. La paroisse de Beillé compose l'un des 22 fiefs appartenant aux seigneurs de Brêteau de Lombron. Le château de Bresteau se dresse dans la vallée fertile de la rivière de l'Huisne.","habitants":"Famille de Mathurin de Saint Mars,\r\n        \"","divers":"Bresteau  grav-1 à 5.                                                                         GPS : 48° 04' 58\" Nord, 0° 30' 49\" Est","gps":"48° 04' 58\" Nord, 0° 30' 49\" Est","images":["../../jctruffet.com/image/image_72/72_Bresteau_1.jpg","../../jctruffet.com/image/image_72/72_Bresteau_2.jpg","../../jctruffet.com/image/image_72/72_Bresteau_3.jpg","../../jctruffet.com/image/image_72/72_Bresteau_4.jpg","../../jctruffet.com/image/image_72/72_Bresteau_5.jpg"]},"Consult_chateau_formulaire2fb0":{"id":"Consult_chateau_formulaire2fb0","dept":"72","canton":"Loué","commune":"Brulon","nom":"Brulon","type":"Château","periode":"XVIII-XIX","histoire":"Trois châteaux à Brulon, Bellevue, l'Enclos et Vert.                             BELLEVUE, la maison bourgeoise dite le château de Bellevue fut construite à partir de 1902 pour Gauthier directeur des parfums Bourjois (avec un J comme joie). Le jardin est un parc composé d'une collection d'arbres rares constituée par le propriétaire actuel.                                                                                             L'ENCLOS, sa construction date de 1870 dans le style Second Empire, se situe sur les hauteurs de Brulon. Il est entouré dun parc de 3 Ha, clos de murs, dun Jardin à la Française et de très beaux arbres dont un Séquoia Gigantea mesurant plus de 40 mètres de hauteur. Un mini-parc animalier vous attend avec ses lamas, ses chèvres naines et un âne miniature. Le château de l'Enclos vous propose aussi ses chambres d'hôtes.","architecture":"VERT , la construction du château de Vert date du XIXe siècle. La destruction en 1774 et les fouilles réalisées en 1983 sur la motte castrale révèlent l'ancienneté de l'occupation du site. Une occupation celte et romaine est retrouvée avec mise au jour d'un mur gallo-romain, lui succède une vaste nécropole mérovingienne dont cent cinquante sarcophages en pierre de falun sont mis au jour au XVIIIe siècle. Au haut Moyen Âge, la motte castrale devient le siège d'un château avec développement de deux agglomérations, une autour du château médiéval détruit par son propriétaire en 1774 et l'autre autour de l'église romane et son prieuré. Les deux pôles et les douves autour de la motte sont visibles sur le cadastre de 1826, les douves sont finalement comblées en 1960. Au XVIIIe siècle, un nouveau château y est reconstruit et c'est de là que Claude Chappe réalise sa première expérience publique de communication à distance entre Brûlon et Parcé le 2 mars 1791 avec l'aide de ses 4 frères. L'expérience consiste à placer deux cadrans mobiles dotés d'aiguilles et de chiffres, appelés par lui, tachygraphe initialement, avant d'adopter en 1992, le mot plus adapté de télégraphe, qui sera installés respectivement dans son village natal de Brûlon et le village de Parcé-sur-Sarthe distant de 14 km. L'expérience, envoyer un message dans chaque sens, est réussie et authentifiée par un compte rendu officiel. Claude Chappe put, grace à ces preuves de fonctionnement, se rendre à Paris pour promouvoir son invention auprès de l'Assemblée législative avec le soutien de son frère Ignace Chappe, député et de Joseph Lakanal. Vous pourrez louer les salles du château de Vert pour vos réceptions privées ou y loger dans les chambres d'hôtes.","habitants":"Bellevue;Famille de M Gauthier                                 Vert; Claude Chappe\"","divers":"Trois châteaux à Brulon, Bellevue grav-1, l'Enclos grav-4-5 et Vert grav 2-3.                                                     Brulon GPS : 47° 58' 02\" Nord, 0° 14' 01\" Ouest                                                        Vert GPS : 47° 58' 02\" Nord, 0° 14' 01\" Ouest","gps":"47° 58' 02\" Nord, 0° 14' 01\" Ouest","images":["../../jctruffet.com/image/image_72/72_Brulon_1.jpg","../../jctruffet.com/image/image_72/72_Brulon_2.jpg","../../jctruffet.com/image/image_72/72_Brulon_3.jpg","../../jctruffet.com/image/image_72/72_Brulon_4.jpg","../../jctruffet.com/image/image_72/72_Brulon_5.jpg"]},"Consult_chateau_formulairea09b":{"id":"Consult_chateau_formulairea09b","dept":"72","canton":"Le Lude","commune":"La Bruère sur Loir","nom":"Bruère_II","type":"Château","periode":"XV-","histoire":"Deux châteaux à Bruère Grand et petit Perray.                                   GRAND-PERRAY, au XIIIe siècle, les seigneurs portaient le nom de Herbertus ou Herbert. En 1363, Geoffroy de Verneil obtient la haute justice sur ses fiefs du Grand-Perray. Dans l'état actuel des connaissances, il est difficile de reconnaître les traces d'un édifice antérieur au XVe siècle et rasé pendant la guerre de Cent ans. La première mention connue est en 1422 lorsqu'un certain Pierre de Verneil donne le Grand-Perray à sa fille Anne lors de son mariage avec André III d'Averton. Une chapelle est fondée en 1446. Le Grand-Perray reste dans la famille Averton jusqu'en 1635. Jean II d'Averton épousa Marguerite de Laval soeur de Guy de Laval. Jean III d'Averton épouse Françoise d'O. En 1532, le Grand-Perray est à l'ainé de leur fils Mathieu. En 1635, François de Rouville, comte de Clinchamp, est propriétaire du Grand-Perray qu'il vend (en même temps que Chavigny à Lerné en Touraine). Henri de Daillon hérite du Grand-Perray en 1662 qu'il vend à Réméré en 1665 au comte de Roquelaure qui le cède au marquis d'Effiat. Le 29 avril 1720, Angélique d'Escoubleau de Sourdis, veuve de François Colbert et nièce du marquis d'Effiat, vend le domaine à Pierre Henry de Bonnetat d'Estival. En 1728, le domaine est acheté par Jean Aymard de Nicolaÿ, marquis de Goussainville. Son fils, Aymard Jean de Nicolaÿ, vend le domaine en 1772 à Jacques François de Jussy qui le revend en 1778 à Jean Denis de Pujol, baron de la Grave et Louise Eléonore d'Orvaulx son épouse. Le domaine est vendu à la chandelle au Châtelet de Paris en 1793. Benoît Charles Vergnaud négociant à Orléans est acquéreur. Il passe en suite à la famille Serpin-Dugué qui le gardera jusqu'en 1924. En 1934, le château est à la famille Desmarais qui le cède à la famille Thibaud.","architecture":"GRAND-PERRAY, le château se compose de plusieurs plateformes fossoyées accompagnées d'un circuit complexe de drainage. L'ensemble des bâtiments se répartit, d'une part dans une avant-cour qui sert de basse cour portant le nom de Basse loge du Grand-Perray et, d'autre part dans les vestiges d'un grand château implanté sur une plateforme fossoyée. Les traces les plus anciennes du château semblent dater du XVe siècle correspondant à la première mention d'un seigneur au Grand-Perray. Cette demeure cantonnée d'au moins deux tours est bâtie sur un des côtés d'une plate-forme quadrangulaire entourée de douves. Il est difficile de fixer avec précision l'entrée de ce premier château. Dans la succession des propriétaires au XVIIe siècle, il est difficile d'imaginer un embélisseur du lieu. Pourtant il semble que l'ensemble fut réaménagé : la nouvelle chapelle placée à l'extérieur de la plate-forme médiévale paraît dater des années 1690. Il s'agit probablement d'un déplacement de la chapelle primitive en même temps que l'agrandissement de la plateforme du château vers le nord (pour assainir la base des murs) et la création d'un jardin d'agrément dans l'axe du logis. Les façades du logis sont alors remaniée.                                                                                                                 PETIT-PERRAY, la construction  date de la fin du XVIIIe siècle. Les éléments protégé aux M.H. sont : le jardin, les douves, la cour, l'enclos, le pavillon, le portail, la clôture. Sachez qu'il existe à Vaast, pas moins de 7 châteaux à découvrir ! Le château du Petit Perray,  et ses 4 pavillons ainsi que la grille et le portail de clôture font l'objet d'une inscription aux M.H. depuis le 28/04/1993.","habitants":"François de Rouville, comte de Clinchamp\r\n        \r\n        \"","divers":"Deux châteaux dans cet article  à Bruère Grand-Perray grav 1-2 et Petit-Perray Grav 3-4-5                                                                 GPS : 47° 39' 22,1\" Nord, 0° 20' 55,58\" Est                                            GPS : 47° 39' 12,63\" Nord et 0° 21' 42,66\" Est                                         Petit perray GPS : 47° 39' 21\" Nord et 0° 19' 17\" Est","gps":"47° 39' 22,1\" Nord, 0° 20' 55,58\" Est","images":["../../jctruffet.com/image/image_72/72_Bru%c3%a8re_II_1.jpg","../../jctruffet.com/image/image_72/72_Bru%c3%a8re_II_2.jpg","../../jctruffet.com/image/image_72/72_Bru%c3%a8re_II_3.jpg","../../jctruffet.com/image/image_72/72_Bru%c3%a8re_II_4.jpg","../../jctruffet.com/image/image_72/72_Bru%c3%a8re_II_5.jpg"]},"Consult_chateau_formulaire1ada":{"id":"Consult_chateau_formulaire1ada","dept":"72","canton":"Le lude","commune":"Bruère sur Loir","nom":"Bruère_sur_Loir","type":"Château","periode":"XIV-XVIII","histoire":"Deux châteaux à la Bruère la Gagnerie et la Maison-Rouge.  Grand et petit  Perray article suivant.                                                                                                            GAGNERIE,  c'est à partir du début XVIIe siècle. Le domaine fut revendu de nombreuses fois, ses seigneurs furent, jusqu'en 1762, les familles de Marans. Louis Joseph de Vanssay de Marans, fils de Louise Marguerite et de Charles de Vanssay, chevalier et seigneur de la Rouandière, qui en était propriétaire au plus tard depuis 1736, vendra la Gagnerie à Maître Louis Joubert, notaire royal au Mans. Celui-ci revendra le domaine en 1766 à Gervais François Philoche, marchand, époux de Renée Brebion. M. Philoche conservera la Gagnerie au moins jusqu'en 1786 et sa famille y demeurera jusqu'au début du XIXe siècle. La demeure actuelle a été construite au début du XIXe siècle, elle appartenait en 1840 à Jacques Damoiseau qui entreprit de gros travaux. En 1914, la propriété est à M. Castellan qui conservera le château durant deux ans, jusqu'à sa revente à Eugène Saladin en 1916.                                                                                        La MAISON ROUGE  est situé à La Bruère-sur-Loir, l'ancien château, détruit en 1862 par Augustin de Jourdan de Savonnières, fut reconstruit à la fin du XIXe siècle.  Château de la Maison Rouge aurait été bâti à la fin du Moyen Age sur un terrain dépendant du Grand-Perray. Le premier propriétaire connu est Antoine du Rougé en 1554. Charles de Savonnières épouse Françoise du Rougé et devient seigneur de la Maison Rouge de 1621 à 1688. Les Savonnières restent propriétaires de la Maison Rouge jusqu'en 1955. Le vieux château aurait été complètement remanié entre 1813 et 1846 : logis transformé et chapelle entièrement construite à l'est.","architecture":"GAGNERIE,  Le nouveau château est un logis de plan massé avec un rez-de-chaussée surélevé. Les trois travées centrales marquent le perron de la porte d'entrée. L'aspect monumental est renforcé par une surélévation d'un étage. Le pavillon central renferme l'escalier dans oeuvre dont les repos rythment la travée centrale postérieure. Il semblerait que la maison construite sous la Monarchie de Juillet soit un logis à 7 travées côté cour et 5 travées côté jardin. A la fin du siècle, on agrandit la maison en construisant un étage au-dessus des trois travées centrales et on remonte la corniche à balustrade et la toiture, au-dessus.                                                 MAISON ROUGE Ce dernier château aurait été à son tour démoli après 1862. Un dessin daté de 1862, représente une demeure du XVIIe siècle probablement agrandie au XVIIIe siècle. Le château fut reconstruit par Augustin, comte de Jourdan de Savonnières dans le style néo-Louis XIII brique et pierre. Il séjournait alors au château de la Gagnerie.L'ancien château était situé au nord d'une cour quadrangulaire cantonnée de tourelles. Un vaste jardin s'étendait au nord du logis vers le ruisseau. Des communs sont placés de part et d'autre. Un premier remaniement réalisé entre 1813 et 1846 décloisonne tous les espaces et un parc paysager est tracé englobant les tourelles isolées dans la végétation. Le logis est alors allongé et une chapelle extérieure est construite, reliée par un passage couvert. Certains communs sont toujours présents aux abords du logis et de la nouvelle chapelle. A l'ouest on crée un jardin potager utilitaire clos de murs partiellement encore conservés. Vers 1862, ce logis aurait été à son tour démoli pour un nouveau château de style néo-Louis XIII dont on ignore le nom de l'architecte. Le choix de la brique rouge en remplissage doit être lié au toponyme. Cette nouvelle demeure est en rez-de-chaussée surélevé. A ce moment là, tous les bâtiments anciens annexes sont démolis et de nouveaux communs sont construits autour d'une cour fermée, à l'ouest. A l'est, des écuries en fer-à-cheval sont bâties.","habitants":"Gagnerie ;familles de Marans                                                            Maison Rouge; Vicomte Jacques de Jourdan de Savonnières\r\n        \r\n        \"","divers":"Deux châteaux à la Bruère Gps  47° 39' 05\" nord, 0° 20' 56\" est.                                                                                                        la Gagnerie grav 1-2   et la Maison-Rouge grav 3-4                                       Gps.47° 39' 13\" nord, 0° 21' 43\" est                                             Gagnerie gps 47° 38' 19,17\" N, 0° 22' 02,79\" E","gps":"","images":["../../jctruffet.com/image/image_72/72_Bru%c3%a8re_sur_Loir_1.jpg","../../jctruffet.com/image/image_72/72_Bru%c3%a8re_sur_Loir_2.jpg","../../jctruffet.com/image/image_72/72_Bru%c3%a8re_sur_Loir_3.jpg","../../jctruffet.com/image/image_72/72_Bru%c3%a8re_sur_Loir_4.jpg"]},"Consult_chateau_formulaireeb26":{"id":"Consult_chateau_formulaireeb26","dept":"72","canton":"Changé","commune":"Changé","nom":"Buzardière","type":"Château","periode":"XVI-XVIII","histoire":"BUZARDIERE, après la guerre de Cent Ans, vers 1453, Guyon de Clinchamp entreprit la construction du château. Il fut agrandi et modifié jusqu'au XVIIIe siècle. La chapelle fut édifiée en 1520. Henriette-Julie de Castelnau, comtesse de Murat, née à Brest en 1670, romancière, conteuse, femme de lettres française est morte le 29 septembre 1716 au château de la Buzardière. Entré par mariage dans la famille de Nicolay qui habitait le château de Montfort le Rotrou, l'édifice ne fut pas habité et fit office de rendez vous de chasse dont eurent raison les intempéries. La chapelle et le logis sont aujourd'hui restaurés.","architecture":"BUZARDIERE, sa construction date du XVe au XVIIIe siècle. Le château de la Buzardière est composé de hauts pignons et tourelles, avec son porche défendu par des échauguettes. Il fut agrandi, au XVIe siècle, avec un pavillon carré massif. Sa chapelle date du début du XVIe siècle, éclairée de hautes baies au remplage flamboyant.Le château se situe sur la DD 145. Le château de la Buzardière est en ruines. C'est un Domaine privé que l'on aperçoit de l'extérieur. Le  château de la Buzardière est inscrit aux M.H. depuis le 13 avril 1928.","habitants":"Buzardière; Famille de Guyon de Clinchamp\"","divers":"Château de la Buzardière                            GPS : 47°58'28\" Nord et 0°20'59\" Est.","gps":"47°58'28\" Nord et 0°20'59\" Est.","images":["../../jctruffet.com/image/image_72/72_Buzardi%c3%a8re_1.jpg","../../jctruffet.com/image/image_72/72_Buzardi%c3%a8re_2.jpg","../../jctruffet.com/image/image_72/72_Buzardi%c3%a8re_3.jpg","../../jctruffet.com/image/image_72/72_Buzardi%c3%a8re_4.jpg"]},"Consult_chateau_formulairef18e":{"id":"Consult_chateau_formulairef18e","dept":"72","canton":"La Fléche","commune":"la Flèche","nom":"Carmes_Flèche","type":"Château-fort","periode":"XI-XVI-XIX","histoire":"FLECHE, château dit des Carmes. En 1539. A la fin du XVIe siècle, le château était considéré en mauvais état. Devenu propriété royale après l'accession au trône de Henri IV, qui avait hérité de son père la seigneurie de La Flèche, le château fut donné par Louis XIII aux carmes de la ville dans le premier tiers du XVIIe siècle. La chapelle, qui était jusqu'alors desservie par le clergé de Saint-Thomas, fut agrandie vers 1621. Les baies du coeur datent du XVIIe siècle.  Celui-ci démarra en 1661 la construction du cloître qui fut continué en 1667 par le maître charpentier fléchois Antoine Roux. Vers 1692, furent élevés de nouveaux bâtiments  par le maître tailleur de pierre fléchois Julien Ameillau et le maître charpentier fléchois René Millet, peut-être également suivant les plans de Cesvet.\r\nVendu comme bien national, l'édifice fut converti en hôtel, ce qui entraîna certains remaniements. La construction du pavillon méridional dans la seconde moitié du XIXe siècle transforma en U le plan du logis, dont l'intérieur fut également renouvelé. Certaines galeries du cloître furent transformées en orangerie. La grosse tour, dont, seule, la partie nord fut conservée, fut rhabillée à la mode néo-gothique dans le dernier quart du siècle : pignons découverts, voûtes d'ogives, décor sculpté. La ville acheta l'édifice en 1909 et convertit le logis en mairie. Le musée et la bibliothèque municipale furent installés dans la chapelle, ce qui entraîna la transformation de ses élévations.","architecture":"FLECHE, la construction du château fort, vers le milieu du XIe siècle,  La grosse tour, qui s'élevait sur la première arche de l'ancien pont, correspond peut-être au remaniement mentionné dans la seconde moitié du XVe siècle. A l'est du château, l'ancien \" parc des carmes \" qui jouxte les anciens jardins du château de la Varenne, aménagés au XVIIe siècle, fut remanié par Dandalle, architecte paysager de la ville d'Angers.\r\nIl occupe deux îlots séparés par des canaux qu'alimente la rivière. Sur l'îlot méridional, dans la basse-cour, se trouvaient le logis et la grosse tour construite sur la première arche de l'ancien pont. Le logis possède un étage carré et un étage de comble. Les pignons du corps principal sont découverts, ses ailes sont couvertes en pavillon. Il est distribué par un escalier tournant en maçonnerie et une vis en charpente. Le rez-de-chaussée est également accessible par un escalier extérieur qui rachète la différence de niveau de la cour, sur sa face orientale. Le toit de la grosse tour, qui possède deux étages carrés et un étage de comble distribués par un escalier tournant à retours sans jour, sont également à pignons découvert. Deux tourelles en encorbellement sur sa face méridionale sont couvertes de toits coniques. Couverte d'un toit à longs pans à pignon couvert et d'une croupe ronde, la chapelle possédait initialement un seul vaisseau. Le cloître dont les galeries est et ouest enjambent le bras du Loir séparant les deux cours, relie la chapelle et le logis. Les nouveaux bâtiments administratifs sont implantés dans l'angle sud-est de la cour. aujourd'hui hôtel de ville. En 1919, un incendie détruisit en grande partie le cloître et le logis qui, seul, fut reconstruit en 1926-1927 . Par la suite, les bureaux de la mairie furent aménagés dans la chapelle. En 1991, de nouveaux bâtiments administratifs furent élevés dans l'angle sud-est de la cour, suivant un projet qui intégrait les ruines du cloître.","habitants":"Seigneur local\r\n        \r\n        \"","divers":"Château des Carmes grav-1 à 3 ; tour Bénéhard grav 4                                     GPS : 47° 41' 45\" Nord et 0° 04' 29\" Ouest","gps":"47° 41' 45\" Nord et 0° 04' 29\" Ouest","images":["../../jctruffet.com/image/image_72/72_Carmes_Fl%c3%a8che_1.jpg","../../jctruffet.com/image/image_72/72_Carmes_Fl%c3%a8che_2.jpg","../../jctruffet.com/image/image_72/72_Carmes_Fl%c3%a8che_3.jpg","../../jctruffet.com/image/image_72/72_Carmes_Fl%c3%a8che_4.jpg"]},"Consult_chateau_formulaire963d":{"id":"Consult_chateau_formulaire963d","dept":"72","canton":"Château-du-Loir","commune":"Chahaignes,","nom":"Chahaignes","type":"Château","periode":"XV-XVI-XIX","histoire":"Trois châteaux à Chahaignes, Benehard, Haut-Rasne et la Jaille. BENEHARD, le château de Bénéhard, du début de la Renaissance, est construit en tuffeau, situé loin du village de Chahaignes, De nombreux communs des XVe et XVIe siècles sont visibles au nord et à l'ouest, formant cour. La grande tour adossée au coteau, dans cette cour, date du début du XVIIIe. Le four à pain et la buée du XVIe siècle creusés dans la roche sont également en état de fonctionnement. il sadosse à la colline. Il fut élevé aux XVIe et XVIIe siècles à la place de lancienne forteresse qui défendait la vallée de la Veuve, affluent du Loir, durant la guerre de Cent ans. On peut voir ses fenêtres Renaissance presque toutes moulurées. Il possède également un grand portail avec entrée charretière et une petite porte ferrée. Toiture dardoises à forte pente. Dans lune des grandes caves creusées dans le coteau en tuffeau, derrière le château, un pressoir monumental en bois de type romain, à vis latérale et datant sans doute du XVe siècle, a été restauré en 1991 par le Syndicat dInitiative, il est complet et en état de marche. L'ensemble a conservé l'aspect authentique de l'architecture des XVIe et XVIIe siècles. L'élément remarquable du domaine est sa façade typique de l'architecture du début de la Renaissance, en tuffeau. Éléments protégés MH : l'ensemble du château, y compris le pavillon du XVIIe siècle, les communs et les jardins avec leurs clôtures, les portes, les degrés et les dépendances : classement par arrêté du 11 août 1987.","architecture":"HAUT RASNE  Il s'agit d'un château construit par le maître d'oeuvre Lemoine, dans le quatrième quart du XIXe siècle, dans le style néo-gothique avec une petite tour circulaire au bout de la terrasse, une grande cave donnant sur un cloître et une décoration extérieure de type médiéval : lancettes, vitraux, moulures et ogives. Éléments protégés MH : le château du Haut Rasné en totalité : inscription par arrêté du 21 décembre 1984.                                                                                                            LA JAILLE, au milieu du XIe siècle apparaît le nom de La Jaille; Wido de Jailla. Les membres de cette famille furent de très grands personnages et remplirent d'importantes fonctions auprès des princes de la Maison d'Anjou. De 1649 à 1750, la famille de Maillé, de la branche des  de Bénéhart, seront seigneurs de La Jaille; ensuite les Chartier de Coussay vers 1775. La propriété est vendue en 1794 à M. Hardyau, elle passa ensuite à son petit fils, le marquis de Maisonneuve, avant l'actuel détenteur de la demeure, M. Paul Mallon, qui a su faire de La Jaille un lieu plein de charme. Le château aurait été bâti à l'époque de Catherine de Médicis par le sieur de La Jaille dont le portrait au crayon se trouve au musée de Boston. L'édifice est un grand massif de pierre, bien proportionné, qui s'ouvre au sud par une porte encadrée de deux fenêtres, tandis que cinq hautes fenêtres éclairent le premier étage; une corniche à modillons soutient le toit à quatre pentes où s'ouvrent une lucarne à fronton triangulaire et deux mansardes.Éléments protégés MH : les façades et les toitures du château : inscription par arrêté du 3 mai 1966.","habitants":"Famille de Maillé\r\n        \"","divers":"Trois châteaux à Chahaignes, Benehard   grav 1-2-3, Haut-Rasne grav 4-5 et la Jaille grav 6-7 et Chenardière grav-8 .                                               Bénéhard  GPS : 47° 45' 58,68\" Nord, 0° 31' 56,05\" Est                            Haut rasné GPS : 47° 44' 48\" Nord, 0° 31' 15\" Est                                             Jaille   GPS : 47° 44' 40\" Nord, 0° 30' 57\" Est","gps":"47° 45' 58,68\" Nord, 0° 31' 56,05\" Est","images":["../../jctruffet.com/image/image_72/72_Chahaignes_1.jpg","../../jctruffet.com/image/image_72/72_Chahaignes_2.jpg","../../jctruffet.com/image/image_72/72_Chahaignes_3.jpg","../../jctruffet.com/image/image_72/72_Chahaignes_4.jpg","../../jctruffet.com/image/image_72/72_Chahaignes_5.jpg","../../jctruffet.com/image/image_72/72_Chahaignes_6.jpg","../../jctruffet.com/image/image_72/72_Chahaignes_7.jpg","../../jctruffet.com/image/image_72/72_Chahaignes_8.jpg"]},"Consult_chateau_formulaire581c":{"id":"Consult_chateau_formulaire581c","dept":"72","canton":"La Fléche","commune":"La Chapelle-d","nom":"Chapelle_Aligné","type":"Château","periode":"XV-XVII","histoire":"Trois châteaux à la Chapelle d'Aligné dont Aligné, Coulon et la Gringuenières.                                                                                                  ALIGNE, la construction du Manoir  date du XV siècle. Il est composé d'un logis Renaissance et des communs entourés de douves, d'une tour hexagonale avec un escalier à vis se trouvant au Nord du bâtiment principal, d'un auvent couvert d'ardoises qui protège l'entrée principale. Ses 4 fenêtres du rez-de-chaussée sont protégées par des grilles en fer forgé. La cheminée de la salle du rez-de-chaussée est de taille monumentale avec des corps de moulures aux arêtes vives et des motifs  de la hotte. La chapelle seigneuriale date du XVe siècle, les ouvertures néo-gothiques ayant été faites en 1936.                                                                                                  COULON, le logis fut construit autour de 1500 au-dessus d'un souterrain-refuge médiéval. Ses élévations néo-gothiques sont consécutives à un remaniement vers 1858. De la vis primitive, il ne fut conservé que la tour hors-oeuvre. On a également conservé une belle cheminée du XVe siècle au rez-de-chaussée. Les communs furent probablement remaniés au cours de cette campagne, de même que furent construites les parties agricoles. Dans le premier quart du XXe siècle, fut bâtie à l'emplacement de la chapelle l'aile droite du logis, à l'imitation de l'aile gauche. Le logis consiste en corps central en T, flanqué de deux ailes en rez-de-chaussée et à un étage de comble. Le corps principal présente un étage carré et un étage de comble distribués par un escalier tournant et une vis hors-oeuvre en charpente. Les toits du logis principal sont à pignon découvert. La tour hors-oeuvre sur la face antérieure est couverte d'un toit polygonal, celle qui flanque le corps postérieur d'un toit conique. Logis, communs et logement de la ferme sont appareillés en moellon enduit avec chaînes d'angle en calcaire taillé.","architecture":"GRINGUENIERES, d'origine certainement médiévale (quelques vestiges l'attestent dans le sous-sol) , le logis fut peut-être reconstruit quelque temps après l'achat du domaine en 1657. De cette campagne, dateraient le corps antérieur central et les ailes, ainsi que l'escalier et certains vantaux. Il fut profondément remanié au XVIIIe siècle : élévations, doublement du corps central sur sa face postérieure, pavillon dans le parc, chapelle portant la date 1713, cheminées, lambris, décor peint et sculpté. Le parc paysager fut en partie démembré dans le courant du XIXe siècle. La chapelle fut détruite vers 1990. Le logis primitif se compose d'un corps central flanqué d'ailes couvertes par des toits en croupe. Le corps doublant en profondeur le corps principal est couvert par un toit brisé en croupe. Les baies du bâtiment sont appareillées en calcaire taillé à bossage harpé. Le pavillon est couvert d'un toit en pavillon, de même que l'était la chapelle avant la destruction récente de sa charpente. Devant le château, le puits est couvert d'un toit conique. Communs coiffées de toits en croupe et d'un toit à longs pans brisés.Le logis se compose d'un corps central flanqué de deux gros pavillons latéraux, donnant à l'ensemble une forme en « H ». Un second corps, placé à l'arrière, entre les branches du « H », est ajouté à la fin du XVIIe siècle. Éléments protégés MH : les façades et les toitures du bâtiment principal, ainsi que le décor du salon et l'escalier : inscription par arrêté du 14 juin 1994.                                                                                    VAUGUION  SOC  société civile d'exploitation agricole société civile d'exploitation agricole est active depuis 29 ans. recense 1 établissement et le dernier événement notable de cette entreprise date du 29-10-2018.\r\nAndré Raulin est gérant de l'entreprise.","habitants":"Seigneurs locaux\r\n        \"","divers":"Trois châteaux à la Chapelle d'Aligné dont Aligné  grav-1, Coulon grav 4-5-6-,  la Gringuenières grav-7-8  et Vauguion grav -2-3.                                                                                     Manoir d'Aligné GPS : 47° 45' 37\" Nord, 0° 15' 03\" Ouest                           Gringuignieres GPS : 47° 43' 45,98\" Nord, 0° 13' 10,99\" Ouest","gps":"47° 45' 37\" Nord, 0° 15' 03\" Ouest","images":["../../jctruffet.com/image/image_72/72_Chapelle_Align%c3%a9_1.jpg","../../jctruffet.com/image/image_72/72_Chapelle_Align%c3%a9_2.jpg","../../jctruffet.com/image/image_72/72_Chapelle_Align%c3%a9_3.jpg","../../jctruffet.com/image/image_72/72_Chapelle_Align%c3%a9_4.jpg","../../jctruffet.com/image/image_72/72_Chapelle_Align%c3%a9_5.jpg","../../jctruffet.com/image/image_72/72_Chapelle_Align%c3%a9_6.jpg","../../jctruffet.com/image/image_72/72_Chapelle_Align%c3%a9_7.jpg","../../jctruffet.com/image/image_72/72_Chapelle_Align%c3%a9_8.jpg"]},"Consult_chateau_formulaire0ea0":{"id":"Consult_chateau_formulaire0ea0","dept":"72","canton":"Le Lude","commune":"La Chapelle-aux-Choux","nom":"Chapelle_aux_Choux","type":"Château","periode":"XV-XVII-XIX","histoire":"Trois châteaux à la Chapelle aux Choux dont la Chataigneraie, Perray et Vaux au Choux.                                                                                   CHATAIGNERAIE,  ce château fut construit ex-nihilo à partir de 1880 dans le parc de Vauduchou, par l'architecte angevin Dessauze pour Henri Boutrais, époux de Marie Potry  héritière de Vauduchou. Henri Boutrais était le fils de Eugène Boutrais, Président de la cour d'appel d'Angers. Par mariage, le château passe ensuite à M. de Beauvais qui épouse Geneviève Potry, et enfin à M. Graffin qui épouse Antoinette Gendron. La maison de La Châtaigneraie, revendue plusieurs fois, est aujourd'hui complètement restaurée et le parc paysager modifié : un escalier monumental descend dans de nouveaux jardins ornés de statues et de vases.                                                                                                               VAU du CHOUX, la seigneurie de paroisse était un membre du comté du Lude, comme vassal de la châtellenie de la Motte-sous-le-Lude. Les différents fiefs de cette paroisse étaient le Perray, près et au sud du Bourg, construit à la fin du XVe siècle, qui appartenait au sieur Corbin du Mans; la Giraudière, avec chapelle, à l'ouest du même bourg, à Mme de Mainville; Nuillé, au nord, aussi avec chapelle; la Fosse, à l'ouest; le Vau-du-Chou, peu au-dessus du Perray. Vauduchou appartient vers 1776 au chevalier de la Houssaye. En 1829, au chevalier de Malherbe, puis aux Potry avant de devenir une dépendance du nouveau château de la Châtaigneraie. Dans son dernier état, Vauduchou ressemblait à une maison néo-classique à fronton qui fut probablement construite ou remaniée entre 1812 et 1845.","architecture":"PERRAY,  historique idem jusqu'en 1657 que du Val du Choux, Des aveux de 1657 et 1679 établissent, comme relevant du comté du Lude, la dame Renée Jacques de la Heurelière, veuve de Jean le Jeay, sieur de la Giraudière. Le site sur lequel est implanté ce château est sur le flanc nord du coteau de la rive gauche du Loir. Il se divise en deux espaces distincts avec leur propre entrée : la basse-cour et le château. Le logis placé le plus au nord ménage un espace ensoleillé pour la cour sur laquelle il donne. Le logis principal pourrait dater de la première moitié du XVIe siècle. Il est en rez-de-chaussée sur la cour avec un escalier dans oeuvre situé à l'arrière. Un pavillon cantonne l'angle sud-ouest de la cour.","habitants":"Chataigneraie; Famille Henri Boutrais,                                        Vau au Choux; famille Corbin du Mans                                        Perray; de Jean le Jeay\r\n        \"","divers":"Trois châteaux à la Chapelle aux Choux dont la Chataigneraie grav 3-4-5-6, Aubenière grav 2,   Pernay  grav-7-8   et  Vaux grav-1 .                                                                                           Chapelle aux Choux-GPS : 47° 37' 54\" Nord et 0° 13' 51\" Est                             Chataigneraie GPS : 47° 37' 28,45\" Nord, 0° 13' 49,2\" Est","gps":"47° 37' 54\" Nord et 0° 13' 51\" Est","images":["../../jctruffet.com/image/image_72/72_Chapelle_aux_Choux_1.jpg","../../jctruffet.com/image/image_72/72_Chapelle_aux_Choux_2.jpg","../../jctruffet.com/image/image_72/72_Chapelle_aux_Choux_3.jpg","../../jctruffet.com/image/image_72/72_Chapelle_aux_Choux_4.jpg","../../jctruffet.com/image/image_72/72_Chapelle_aux_Choux_5.jpg","../../jctruffet.com/image/image_72/72_Chapelle_aux_Choux_6.jpg","../../jctruffet.com/image/image_72/72_Chapelle_aux_Choux_7.jpg","../../jctruffet.com/image/image_72/72_Chapelle_aux_Choux_8.jpg"]},"Consult_chateau_formulaire663d":{"id":"Consult_chateau_formulaire663d","dept":"72","canton":"Ecommoy","commune":"St Biez en Belin","nom":"Chardonneux","type":"Manoir","periode":"XIX","histoire":"CHARDONNEUX, possédé avant la Révolution par la famille Rivault.  Le 26 Messidor de lan 4 (soit le 4 juin 1795) le sieur Rivault revend Chardonneux au dénommé Coindon qui la recède 5 ans plus tard, soit le 1er  de lAn 9 (22 septembre 1800) à Charles Leprince Claircigny, négociant.Le 16 septembre 1808 Julien-Charles Leprince Claircigny cède à René Benjamin Marie Desmares,  Riche négociant au Mans, très probablement franc-maçon avant la Révolution car de 1802 à 1805, il est membre de la loge Moria à lOrient du Mans, second surveillant de 1802 à 1808 et maître des cérémonies en 1807 et 1808, rose Croix en 1802. Il sera à nouveau membre de la loge et du Chapitre le 10 juin 1831.René Desmares décède en 1835, laissant pour veuve Louise Texier sa nièce, laquelle se remarie le 9 décembre de la même année avec le Général Baron Pierre Dejean. Louise Texier, Baronne Dejean est née le 19 janvier 1785 dans le Maine et Loire. De son premier mariage avec R-B-Desmares, elle hérite dune fortune considérable dont le Château de Chardonneux.  Louise Texier, Baronne Dejean fut surnommée la bienfaitrice de Saint Biez en Belin.   En 1844, nayant pas denfant, elle vend en viager Chardonneux au Comte Adrien de Mailly, marquis de Nesle et son épouse Madame Henriette de Lonlay de Villepail. La Baronne seteint à Tours le 9 mars 1864.Il nest pas surprenant que la Baronne Dejean soit liée aux Mailly. Au décès dAdrien de Mailly à son château de la Roche, le 1er juillet 1878, il laisse pour héritière sa veuve Henriette de Lonlay.","architecture":"CHARDONNEUX,   le 23 décembre 1880, Henriette de Lonlay fait donation à Madame La Princesse de Lucinge sa fille, de la terre de Chardonneux  Les Faucigny Lucinge vont habiter cette propriété et feront construire en 1882, dans le parc le « nouveau château » plus grand. de style néo classique Le petit manoir devint alors le pavillon de chasse. A leur décès, Chardonneux passe en héritage à leur fils unique Jean-Baptiste Aymon de Faucigny Lucinge, époux de Carolyne Foster, de nationalité américaine. Ensemble ils habiteront Chardonneux jusquau décès du Prince Aymon. Il décède dans la commune le 1er août 1922, laissant son épouse comme légataire universelle. Carolyne Foster décède à son tour, sans enfant, le 2 décembre 1936 à Providence aux USA. La propriété est alors revendue par son neveu Ruben Foster, domicilié également à Providence, héritier du Domaine, à Monsieur Clovis Lebled, grand-père des actuels propriétaires jusquen 1937.","habitants":"Les Faucigny Lucinge\r\n        \"","divers":"Château de Chardonneux à Biez  en Belin                                    Gps   47° 49' 19\" nord, 0° 14' 09\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_Chardonneux_1.jpg","../../jctruffet.com/image/image_72/72_Chardonneux_2.jpg","../../jctruffet.com/image/image_72/72_Chardonneux_3.jpg"]},"Consult_chateau_formulairee0eb":{"id":"Consult_chateau_formulairee0eb","dept":"72","canton":"Château-du-Loir","commune":"Château-du-Loir,","nom":"Chateau_du_Loir","type":"Châteay","periode":"XIV-XVII","histoire":"Deux châteaux à Château du Loir, le logis Graslin, Coémont et Riablay.                                                                                                           LOGIS-GRASLIN, le logis Graslin a été construit du début du XVIIe siècle. Il fut bâti pour Massue, conseiller du roi Henri IV et son procureur sur la sénéchaussée de Château-du-Loir. La famille Graslin, qui donne son nom au logis, est liée à la famille Massue par une alliance contractée au début du XIXe siècle entre la dernière représentante de la lignée Massue et Louis-François de Graslin, chevalier des Ordres Royaux de la Légion dhonneur et de Charles III dEspagne. L'époque de la construction de l'édifice, sous le règne dHenri IV, a imprégné tous les détails de la structure du bâtiment : les chaînages marqués, entourant chaque baie, comme dans une construction mariant les briques à la pierre; les bandeaux sobres qui courent autour du bâtiment; les corniches, qui accusent les lignes de force principales de lédifice. A lintérieur on trouve un escalier monumental et au plus haut de celui-ci, une porte flanquée de beaux pilastres et couronnée par un angle.\r\nÉléments protégés MH : les façades et les toitures et l'escalier intérieur : inscription par arrêté du 18 février 1971.","architecture":"RIABLAY, le Manoir du Riablay a été construit à la fin du XIVe siècle. Il fut restauré de 1960 et 1970 et se situe rue Saint Jean à Château-sur-Loir. Henri IV y séjourna en 1589, lorsqu'il vint de Vendôme, pour assiéger la ville du Mans avec ses troupes. Le château possède 2 étages avec une tour hexagonale rehaussée d'une lanterne de style Renaissance. La porte d'entrée est surmontée d'une accolade gothique reposant sur des gnomes. Sur les murs extérieurs, on aperçoit des chevronières ornées d'animaux sculptés. Le Manoir de Riablay est inscrit partiellement aux M.H. le 21/07/1966, pour ses façades et ses toitures.","habitants":"Logis-graslinfamille Graslin\r\n        \"","divers":"Deux châteaux à Château du Loir grav-1-2, Coémont grav-5 et Riablay  grav 3-4. Logis-Graslin grav-7  et Chevalerie grav-6                                                                                               GPS : 47° 41' 43\" Nord, 0° 25' 10\" Est                                                                Riablay GPS : 47° 41' 43\" Nord, 0° 25' 04\" Est","gps":"47° 41' 43\" Nord, 0° 25' 10\" Est","images":["../../jctruffet.com/image/image_72/72_Chateau_du_Loir_1.jpg","../../jctruffet.com/image/image_72/72_Chateau_du_Loir_2.jpg","../../jctruffet.com/image/image_72/72_Chateau_du_Loir_3.jpg","../../jctruffet.com/image/image_72/72_Chateau_du_Loir_4.jpg","../../jctruffet.com/image/image_72/72_Chateau_du_Loir_5.jpg","../../jctruffet.com/image/image_72/72_Chateau_du_Loir_6.jpg","../../jctruffet.com/image/image_72/72_Chateau_du_Loir_7.jpg"]},"Consult_chateau_formulaired4c8":{"id":"Consult_chateau_formulaired4c8","dept":"72","canton":"Château-du-Loir","commune":"Courdemanche","nom":"Chenuère","type":"Château","periode":"XV","histoire":"A Courdemanche château de  Chenuère, de Davilière et maison de Clermont                                                                                                 CHENUERE, la première mention de La Chenuère apparaît en 1398 dans un aveu de Jean de Vendôme à Catherine, comtesse de Vendôme. En octobre 1675, Louvois, ministre du roi Louis XIV, achète La Chesnuère. Au XIXe siècle, la propriété passe à la famille de Cessac, et aujourd'hui elle est aux mains du comte et de la comtesse de Reinach Cessac.                                                                              Maison des CLERMONT manoir du XVe siècle. Maison des Clermont, seigneurs de Saint-Georges, qui était composée de deux pièces avec cheminée au rez-de-chaussée, une cuisine et une salle basse, et deux chambres avec cheminée au premier étage avec un cabinet et une garde-robe. À côté se situaient une boulangerie avec un four banal et une écurie. \r\nDAVILIERE : dit la Grande Maison, fin du XIVe - début du XVe siècle. Probablement lancien manoir seigneurial des Clermont Gallerande avant la construction du nouveau logis au centre du village. Ce manoir resta dans le domaine des seigneurs de Saint-Georges et servait dhôtel de justice au XVIIIe siècle. Une fontaine deau vive, qui alimente le lavoir municipal construit en 1901, est située en contrebas de lhabitation. Dans la ferme attenante au manoir fut retrouvé au XIXe siècle enfoui sous terre un trésor de plus de 13 000 médailles datant des empereurs gaulois du IIIe siècle.","architecture":"CHENUERE, le château est un ancien bâtiment fortifié avec cinq tours garnies de meurtrières à couleuvrines et d'oubliettes Il se compose d'un corps de logis qui a reçu transversalement un autre corps légèrement plus allongé vers le sud, le premier est flanqué vers l'est de deux grosses tours rondes, trapues et épaisses, percées de petites fenêtres, et pour celle du nord, de meurtrières. Le deuxième corps de logis perpendiculaire, possède également une tour et des meurtrières. Dans l'angle rentrant formé par les deux corps de bâtiments, une tour plus haute, a été aménagée avec perron, porte d'entrée, fenêtres et lucarne. Vers l'étang, la façade haute de trois étages, dont deux à larges fenêtres, surmontés de deux lucarnes à gâbles ornés. Un haut surplomb, au-dessus des eaux de l'étang, allonge la perspective du château au milieu d'une verdure d'arbres.","habitants":"famille de Cessac\r\n        \"","divers":"A St-Georges château de Chenuère grav 1 à 4 et  de Davilière grav-5.                                                                                   St-Georges  47° 50' 29\" nord, 0° 34' 59\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_Chenu%c3%a8re_1.jpg","../../jctruffet.com/image/image_72/72_Chenu%c3%a8re_2.jpg","../../jctruffet.com/image/image_72/72_Chenu%c3%a8re_3.jpg","../../jctruffet.com/image/image_72/72_Chenu%c3%a8re_4.jpg","../../jctruffet.com/image/image_72/72_Chenu%c3%a8re_5.jpg"]},"Consult_chateau_formulaire550e":{"id":"Consult_chateau_formulaire550e","dept":"72","canton":"Le Lude","commune":"Coulongé","nom":"Cherbon","type":"Château","periode":"XVI-XIX","histoire":"CHERBON, on sait peu de chose sur le château avant la Révolution. Il semble qu'il y ait eu un manoir avec un jardin quadrangulaire clos de murs et cantonné de deux tourelles probablement limite XVIe siècle-XVIIe siècle. En 1814, Jean-Marie Belloeuvre de Cherbon vend la terre et domaine de Cherbon à Guy Urbain Guillotin Dubignon demeurant à Angers. A sa mort en 1834, Dubignon lègue ses biens à Urbain Fidèle Thouin son neveu. En 1838, Thouin vend Cherbon à Michel Blot demeurant à La Flèche. Michel Blot vend le domaine en 1850 à Edouard Pageot. Néanmoins, sur le cadastre de 1846,                                                     Dans la commune le château des Aiguebelles, du XIXe siècle. et la\r\nMaison seigneuriale de la Picoterie, du XVe siècle.","architecture":"CHERBON  le château est remanié, le parc agricole, les communs et la métairie de la Bougrie. Entre 1811 et 1834, Dubignon fait des transformations, le logis est conservé et agrandi. Il est placé au carrefour d'allées convergentes et reliées aux nouveaux communs, au potager et aux métairies avoisinantes. Les tourelles sont enfouies dans des bouquets d'arbres. Les aménagements intérieurs du château notamment le salon doivent être l'oeuvre de Pageot: la cheminée en bois est une évocation du vin avec grappes de raisin, feuilles de vigne et vis de pressoir.","habitants":"Jean-Marie Belloeuvre de Cherbon \r\n        \"","divers":"Cherbon  gps 47° 41' 22\" nord, 0° 12' 08\" est  grav-1 à 3","gps":"","images":["../../jctruffet.com/image/image_72/72_Cherbon_1.jpg","../../jctruffet.com/image/image_72/72_Cherbon_2.jpg","../../jctruffet.com/image/image_72/72_Cherbon_3.jpg"]},"Consult_chateau_formulaire67d5":{"id":"Consult_chateau_formulaire67d5","dept":"72","canton":"Bonnétable","commune":"Saint-Pavace","nom":"Chène_de_Cur","type":"Château","periode":"XVIII","histoire":"CHENE DE CUR,   le château et les communs sont construits au XVIIIe siècle pour Nicolas Jacques Boucher, receveur des tailles au Mans, peut-être par larchitecte Garangeau. Les décors intérieurs ont été remaniés au cours du XIXe siècle, en conservant toutefois lescalier et sa rampe en fer forgé. fut habiter par   Emile Edmond Edouard Ogier d'Ivry et de  Gérauld Rosalie Ogier de Vanssay.","architecture":"CHENE DE CUR,  aménagé dans une aile indépendante du château de Chêne de Coeur, le gîte bénéficie des avantages de la campagne, au coeur d'un site classé d'une centaine d'hectares longeant pour partie la rivière Sarthe ainsi que de la proximité du Mans. Il se compose au RDC d'un vaste salon avec entrée, cuisine, salle à manger et WC. L'étage comprend 4 chambres chacune avec son cabinet de toilette. Éléments protégés MH : les façades et les toitures de lensemble du bâti (logis, communs, chenils) ; le grand escalier du logis avec son garde-corps en fer forgé ; le pédiluve, le jardin avec son escalier et ses murs de clôture, les allées et la perspective verte: inscription par arrêté du 23 septembre 2016, gîtes de France.","habitants":"Nicolas Jacques Boucher\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Chêne au Cur à St-Pavace   Gps  48° 02' 18\" nord, 0° 11' 16\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_Ch%c3%a8ne_de_Coeur_1.jpg","../../jctruffet.com/image/image_72/72_Ch%c3%a8ne_de_Coeur_2.jpg","../../jctruffet.com/image/image_72/72_Ch%c3%a8ne_de_Coeur_3.jpg"]},"Consult_chateau_formulaire9030":{"id":"Consult_chateau_formulaire9030","dept":"72","canton":"Le Lude","commune":"Chenu","nom":"Chérigny","type":"Château","periode":"XVII","histoire":"CHERIGNY, édifie au début du XVIIe siècle  Le domaine de Chérigny appartenait au début du XVIIIe siècle à Jean-Baptiste de Malchault et Geneviève Rouillé. En 1740, il est acheté par Henry de Cherbon. En 1797, il passe par mariage à M. de La Rue du Can. Les héritiers le vendent en 1828 à Antoine Pierre Piscatory. En 1828, la terre de Chérigny est composée du château et de sa réserve (75 hectares environ), des métairies de la Basse-cour, de la Sicaudière, de la Roulinerie, des Pallis (disparue), du Buisson (disparue), de la Fredonnière, de la Grande Houlaie (disparue), du Maurier, du Theil, des closeries de Souchet, de la Bourdinière, de la Tremblaye ou de la Petite Houlaye, de Trompe-Souris et de la métairie de Beauvais, (410 ha environ). En 1786, le plan terrier du domaine présente un petit château entre cour et jardin, adjacent à une basse-cour de forme irrégulière flanquée de tourelles, acquis  par le baron Piscatory au XIXe siècle dont le fils fut un des libérateurs de la Grèce. Archéologue il rapporta de nombreux souvenirs qui voisinent avec ceux du général Foy dont il avait épousé la fille. En 1915 le logis est agrandi par l'architecte Henri Dardant avec l'adjonction d'une nouvelle cuisine et d'une entrée sur la façade postérieure. Les bâtiments de la basse-cour sont modernisés par l'architecte Emile Fouquet, propriété du vicomte  Foy.","architecture":"CHERIGNY, l'architecte tourangeau Louis Morel dessine de nouveaux massifs, peut-être avant la Première Guerre mondiale. Ce château est au centre d'une composition régulière balisée par des douves sèches ou en eau très bien dessinées sur le cadastre de 1812. Ces douves délimitent une plateforme fossoyée quadrangulaire qui enferme le logis et le jardin. Un axe de composition nord-sud traverse la demeure et se prolonge au-delà. Des avenues, allées et perspectives convergent vers cette plate-forme. La demeure reste modeste. Jusqu'au milieu du XIXe siècle, le logis est entre cour et jardin et l'entrée de la cour est face à la porte d'entrée du château. L'aménagement du végétal évolue peu à peu, le jardin régulier est transformé en forme paysagère dont les arbres jeunes sont suggérés sur le dessin de 1836. En 1916, le paysagiste Louis Decorges fait les relevés d'un parc paysager aux allées rondes où une pergola rectiligne ferme l'espace. Louis Decorges fils va remettre de la régularité et de la géométrie dans les deux projets de jardins mixtes présentés en 1916.","habitants":"Jean-Baptiste de Malchault\r\n        \"","divers":"Château de Chérigny                                                                   Chenu 47° 36' 47\" nord, 0° 20' 14\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_Ch%c3%a9rigny_1.jpg","../../jctruffet.com/image/image_72/72_Ch%c3%a9rigny_2.jpg"]},"Consult_chateau_formulaire1607":{"id":"Consult_chateau_formulaire1607","dept":"72","canton":"La Ferté-Bernard","commune":"Tuffé","nom":"Chéronne","type":"Château","periode":"XV","histoire":"Trois  châteaux à Tuffé ; Chéronne; la Ramé et Launay.                                      CHERONNE, dès le XIVe siècle le site de Chéronne existe dans une vallée partiellement inondée, comme en atteste le chartrier du fief de Chéronne qui remontent à 1475. Le plus ancien bâtiment existant, est le logis-porte. Construit vers 1490, c'est probablement le premier château à avoir été habité. Au XVIe siècle débute la construction du château lui-même avec ce qui constitue actuellement l'aile Ouest. On y trouve toutes les caractéristiques des bâtiments de l'époque, tour massive, escalier hélicoïdal, chemin de ronde, crochets du pont-levis, fenêtres Renaissance, meurtrières.. Depuis 400 ans le château a été transmis uniquement par succession, et le plus souvent par des femmes, les dames de Chéronne qui ont donné une âme à cette maison, cinq chambres d'hôtes,  propriétaire  le comte de  Villesbrunne.","architecture":"CHERONNE avec sont entrée fortifiée du XVe siècle ses corps de logis cantonnés de Tourelles. Le Château de Chéronne est de style Médiéval.  Le château n'était alors qu'un bâtiment rectiligne orienté nord-sud, perpendiculaire au logis porte. Au XVIIe siècle, le château prend la forme d'un quadrilatère entouré de douves. A Chéronne, on ajoute une deuxième rangée de douves sur trois des côtés. A la Révolution, la chapelle de l'aile ouest est saccagée. A la fin du XIXe siècle, les douves sont comblées, il en subsiste un vestige à l'entrée. L'aile dans laquelle se trouve la chapelle, endommagée, et les tours attenantes sont démolies. Les matériaux et les boiseries sont récupérées pour la restauration du château. Au début du XXe siècle, la façade Sud est restaurée dans un style \"néo-Renaissance\" fiers de ses Futaies et de sa belle pièce d'eau Il vous est proposé la location de salles pour vos évènements dans un cadre magnifique (mariages, séminaires, évènements familiaux etc.). Le Château de Chéronne possède aussi un très beau parc à l'anglaise.","habitants":"les dames de Chéronne\r\n        \"","divers":"Trois  châteaux à Tuffé ; Chéronne grav 1-2-3-4 ; la Ramé grav-5   et Launay  grav-6                                                            Cheronne  GPS : 48° 06' 48\" Nord et 0° 30' 52\" Est                                              Tuffé 48° 06' 48\" nord, 0° 30' 52\" est","gps":"48° 06' 48\" Nord et 0° 30' 52\" Est","images":["../../jctruffet.com/image/image_72/72_Ch%c3%a9ronne_1.jpg","../../jctruffet.com/image/image_72/72_Ch%c3%a9ronne_2.jpg","../../jctruffet.com/image/image_72/72_Ch%c3%a9ronne_3.jpg","../../jctruffet.com/image/image_72/72_Ch%c3%a9ronne_4.jpg","../../jctruffet.com/image/image_72/72_Ch%c3%a9ronne_5.jpg","../../jctruffet.com/image/image_72/72_Ch%c3%a9ronne_6.jpg"]},"Consult_chateau_formulaire0687":{"id":"Consult_chateau_formulaire0687","dept":"72","canton":"Saint-Calais","commune":"Cogners","nom":"Cogners","type":"Château","periode":"XVI","histoire":"COGNERS,  d'abord propriété de la famille Le Vasseur, une des plus puissantes familles protestantes du Maine, le château de Cogners a été vendu en 1762 à la famille de Musset : le jeune Alfred de Musset vint d'ailleurs y passer ses vacances chez son parrain, Louis. Il a également reçu la visite de Gabrielle d'Astrées.  vendu en 1832 à un cousin des Musset, le futur général Hennet de Goudel est resté depuis dans cette famille.","architecture":"MONTREUIL LE HENRI, à  trois kilomètre à l'est cette demeure était au XIe siècle un château-fort qui fut transformé au XVIIIe siècle en une belle résidence d'agrément. Dominant le Court, nom évocateur du ruisseau local, le château a été restauré aux XVIIe et XVIIIe siècles. Le large fossé appelé la Grande Douve entoure le terre-plein de l'ancienne motte féodale ou s'élève la forteresse. L'élément remarquable est sa porte et à l'intérieur son décor Renaissance.\r\nÉléments protégés MH : le château de Montreuil-le-Henri : inscription par arrêté du 3 juin 1986.                                                                                                            COGNERS, édifice de style Louis XII, en pierres blanches et briques roses, rebâti au XVIe siècle. Grosse tour ovoïde soulignée de modillons et suivie d'un corps de bâtiment Renaissance avec ses fenêtres à meneaux. Tour circulaire terminant la façade sud et dans la cour d'honneur, une tour polygonale supportant un lanternon sur un petit dôme à avec ses belles façades   en pierres blanches et briques roses, rebâti au XVIe siècle. Grosse tour ovoïde  coiffées de toits d'ardoise   soulignée de modillons et suivie d'un corps de bâtiment Renaissance avec ses fenêtres à meneaux. Tour circulaire terminant la   façade sud et dans la cour d'honneur, une tour polygonale supportant un lanternon sur un petit dôme à côtes.","habitants":"famille de Musset\r\n        \"","divers":"Cogners grav 1-2-3-    Montreuil le Henri- grav 4                                             Gps 47° 52' 05\" nord, 0° 39' 32\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_Cogners_1.jpg","../../jctruffet.com/image/image_72/72_Cogners_2.jpg","../../jctruffet.com/image/image_72/72_Cogners_3.jpg","../../jctruffet.com/image/image_72/72_Cogners_4.jpg"]},"Consult_chateau_formulairebb1f":{"id":"Consult_chateau_formulairebb1f","dept":"72","canton":"Le Mans","commune":"Le Mans","nom":"Comtes_Maine_Mans","type":"Palais","periode":"XII-XV-XVIII","histoire":"COMTES du MAINE, ruines du donjon : XIIe siècle, XVe siècle. Restes des tours et courtines : XIVe siècle. En 1472, après la guerre de Cent Ans, le palais des Comtes du Maine n'était plus qu'une ruine. Au milieu du XVIIIe siècle, construction de deux bâtiments neufs en retour d'équerre. De l'ancien palais, seul demeure aujourd'hui le Gros Pilier.","architecture":"COMTES du MAINE, la construction du Palais  date du XIIe au XVe siècle. L'édifice fut bâti par Hugues 1er entre 970 et 1015 contre une muraille gallo-romaine. Le Palais des Comtes du Maine fut la demeure de Geoffroy Plantagenêt de la dynastie éponyme. Il est aussi dénommé le Palais royal Plantagenêt par l'Office de Tourisme. Il se situe au Mans, au cur de la cité médiévale du vieux Mans. Aujourd'hui,le Palais des Comtes du Maine est le siège de la municipalité du Mans, le bureau du maire étant la pièce où est né Henri II, futur roi d'Angleterre. Le Palais comprend aussi une chapelle palatine devenue la Collégiale Saint-Pierre-la-Cour.  Éléments protégés MH : les restes des tours et courtines entre la place du château et la rue Robert Triger, ruines du donjon dit du Gros Pilier : inscription par arrêté du 19 mars 1945,  hôtel de ville.","habitants":"de Geoffroy Plantagenêt\r\n        \r\n        \"","divers":"Comtes du maine GPS : 48° 00' 27\" Nord, 0° 11' 51\" Est","gps":"48° 00' 27\" Nord, 0° 11' 51\" Est","images":["../../jctruffet.com/image/image_72/72_Comtes_Maine_Mans_1.jpg"]},"Consult_chateau_formulairecea6":{"id":"Consult_chateau_formulairecea6","dept":"72","canton":"Saint-Calais","commune":"Coudrecieux","nom":"Condrecieux","type":"Château","periode":"XV-XVI","histoire":"A Condrecieux, le château des Loges, du XVIe siècle. Julien-Rémy Pesche indique la présence de fortifications gallo romaines, en réutilisation d'un site gaulois. Au demeurant, le nom de \"Loges\" (loiges) confirme la présence de fortification (tour ou château).\r\nLe château de la Pierre, du XVIe au XIXe siècle.\r\nLe manoir de la Cour, du XVIe siècle, Logo monument historique Inscrit MH                                                                                                                   LA PIERRE, les premières bases du château actuel furent construites en 1589 par François de La Vove. En 1634, Louis de La Vove vend La Pierre à son cousin, M. de Loisel, à sa mort en 1635, sensuit une longue période de succession. Philippe Le Gras, comte du Luart, hérite de La Pierre en 1840 où il fit des travaux de remise en état, le château avait été saccagé pendant la Révolution. Après avoir épousé Léopoldine de Broyes, il sy installe en 1842. Philippe du Luart  Il a deux filles, lune meurt en bas âge et lautre, Elisabeth, épouse en 1863 Cyprien de Pontoi, marquis de Pontcarré et comte de Pontoi. En 1904 . En 1939, mariage de Thérèse, fille unique de Louis de Pontoi et de Charlotte Hegman avec le comte René de Montalembert. En 2004, suite au décès du comte et de la comtesse de Montalembert, installation au château de la Pierre de leur fils cadet Frédéric, en 2005.","architecture":"COUR, la construction de la Cour date du XVe et XVIe siècle. C'est un Manoir seigneurial du début du XVIe siècle, d'aspect très médiéval dans sa conception. Il a conservé une cheminée de style Renaissance monumentale et sa charpente d'origine. Il est inscrit aux M.H. depuis le 26/08/2005. Le Manoir de la Cour est privé, fermé au Public.                                                                                                 LA PIERRE  les premières bases du château actuel furent construites en 1589.  Philippe du Luart fera ajouter quatre tours par larchitecte Delarue. En 1862, il entreprend la construction des écuries. En 1904, la comtesse de Pontoi entreprend la construction de la véranda sur la façade ouest du château et la bibliothèque sur la façade est afin de relier les tours entre elles. Entre 1925 et 1935, suppression du jardin à langlaise et aménagement des jardins à la française actuels daprès un dessin de Duchêne le célèbre paysagiste.","habitants":"La pierre;  François de La Vove                                   \r\n        \r\n        \"","divers":"A Condrecieux   château de la Pierre grav-1-2-3   manoir de la Cour grav  4-5-6,                                                                           Cour GPS : 47° 59' 33\" Nord, 0° 37' 48\" Est                                                                La pierre GPS : 47° 59' 33\" Nord et 0° 37' 48\" Est","gps":"47° 59' 33\" Nord, 0° 37' 48\" Est","images":["../../jctruffet.com/image/image_72/72_Condrecieux_1.jpg","../../jctruffet.com/image/image_72/72_Condrecieux_2.jpg","../../jctruffet.com/image/image_72/72_Condrecieux_3.jpg","../../jctruffet.com/image/image_72/72_Condrecieux_4.jpg","../../jctruffet.com/image/image_72/72_Condrecieux_5.jpg","../../jctruffet.com/image/image_72/72_Condrecieux_6.jpg"]},"Consult_chateau_formulaireb0b2":{"id":"Consult_chateau_formulaireb0b2","dept":"72","canton":"Château-du-Loir","commune":"Beaumont-Pied-de-Buf","nom":"Couetterie","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux à Beaumont-Pied de Boeuf dont la Couetterie et le manoir de la Faverie.                                                                           COUETTERIE, le fief et la seigneurie de la Couetterie sont attestés au XVe siècle. En 1445, Guillaume de Couette est dit seigneur de la Couetterie. Au XVIIe siècle, le domaine passe par alliance à la famille de Vanssay. En 1698, Nicolas de Vanssay, chevalier, seigneur de la Couetterie, de Courcillon, de Riablay, Luceau, etc. Il demeure au château. En 1714, sa fille Marie-Louise de Vanssay épouse Isaac Renouard, seigneur de la Porte et de la Madeleine. En 1785, Gaspard-Armand de la Porte, seigneur de Courcillon et de Beaumont, épouse Catherine-Louise Cottin de la Thuillerie. En 1793, Marie Cottin, femme séparée de biens de Louis Guéroult de Freuville, émigré, demande mainlevée du séquestre de la terre de la Couetterie et de sa dépendance, située à Beaumont. En 1819, la Couetterie appartient à la famille Guéroust de Freuville. Le domaine compte alors la ferme en contrebas du château, BeauRegard, la Fredonnière, Biou, Beauglant, le moulin de Gué-Gilet et le moulin des Salles. En 1848, Marie-Pierre-Louis Guéroust de Freuville est maire de la commune. Vers 1870, le domaine passe aux mains d'Henri de la Porte. La Couetterie appartient au comte de La Porte aux Loups au début du XXe siècle. Le corps principal du logis a été rehaussé pour créer un étage en 1870  par la famille de La Porte aux Loups, qui timbre les travées centrales de ses armoiries, portées par un homme sauvage et un lion, surmontées de la couronne comtale. Des têtes de loups sculptées ornent les clés des lucarnes. Les dépendances et la ferme ont été reconstruites à partir du XVIIIe siècle.","architecture":"COUETTERIE, le plan cadastral de 1819 figure une grande composition régulière axée nord-ouest sud-est. Une grande allée avec contre-allées mène à la cour du château de plan en U.  Le château a été en grande partie reconstruit au XVIIIe siècle ; l'aile sud-ouest peut-être même plus récente peut avoir été rebâtie sur une grande pièce ancienne du XVe ou XVIe siècle, l'aile nord-est conserve un escalier du XVIIe siècle. Le corps principal du logis a été rehaussé pour créer un étage, Une allée secondaire est perpendiculaire à l'entrée. Toute cette disposition est cassée au XIXe siècle par la création d'un parc paysager. L'accès principal contourne le parc pour arriver au château par le sud-ouest. Le logis est composé d'un corps de logis central à un étage carré flanqué de deux pavillons, qui assurent les communications verticales. Le corps central compte sept travées ordonnancées, côté cour et côté jardin. Il est coiffé d'un toit à deux pans, avec une croupe seulement du côté sud-ouest. A l'intérieur, un escalier d'honneur relie le rez-de-chaussée au premier étage. Les deux pavillons sont très différents. Le pavillon nord-ouest, sans décor, à un étage carré, conserve un escalier à balustres du XVIIe siècle. Il est couvert d'un toit à longs pans à croupes. Il ne dépasse du corps central que du côté jardin. Le pavillon sud-ouest, chaîné de bossages lisses, à un étage carré et un étage de comble, est couvert d'un toit dit à la Mansart. Il forme une barre de T avec le corps central .                                                                                Manoir de la FAVERIE du XVIIe siècle, inscrit au titre des M.H.depuis 1926.","habitants":"famille de Vanssay\r\n        \"","divers":"Deux châteaux à Beaumont-Pied de Boeuf dont la Couetterie grav 1-2-3 et le manoir de la Faverie grav-4.                                       Beaumont gps 47° 41' 40\" nord, 0° 34' 09\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_Couetterie_1.jpg","../../jctruffet.com/image/image_72/72_Couetterie_2.jpg","../../jctruffet.com/image/image_72/72_Couetterie_3.jpg","../../jctruffet.com/image/image_72/72_Couetterie_4.jpg"]},"Consult_chateau_formulairea7b1":{"id":"Consult_chateau_formulairea7b1","dept":"72","canton":"Loué","commune":"Coulans sur Gée","nom":"Coulans_Gée","type":"Château","periode":"XVIII","histoire":"COULANS, le château date pour l'essentiel de la moitié du XVIIIe siècle, avec quelques ajouts postérieurs vers la fin du XIXe siècle. Il est question de Coulans depuis le début du XIIIe siècle : sa position, sur une colline tournée vers l'ouest, en fait une place forte que tiennent ses seigneurs, baronnie dépendant du comté de Sillé le Guillaume. Au XVIIe siècle, la baronnie de Coulans devient la propriété de la famille Champagne puis, à partir de1687, des Pasquier, qui le garderont dans leur descendance directement ou indirectement jusqu'à nos jours, les Pasquier sont une famille de robe originaire de la Brie. Le duc de Pasquier dernier chancelier  de France y vécut au siècle dernier La chapelle fut bâtie par Etienne Pasquier. Pendant la Révolution, Coulans ne fut pas vendu comme Bien National. Etienne Pasquier, fils de Denis, guillotiné en 1794, remarqué par Napoléon qui le nomma préfet de Police de Paris en 1809. Puis, il servit Louis XVIII comme ministre. Louis-Philippe le nomma Chancelier, puis le titra duc. Il est mort en 1862, sans enfant, ayant adopté son petit neveu, Gaston d'Audiffret, premier Président du Sénat de la IIIe République. Pendant la seconde guerre mondiale, Coulans fut épargné, en grande partie pour avoir abrité des collections du Louvre.","architecture":"COULANS la construction du château de Coulans date du XVIIIe siècle offre  plusieurs corps de bâtiments en retour d'équerre, La terre de Coulans, siège d'une ancienne baronnie dépendant du comté de la Suze, appartenait à la famille de Champagne au XVIIe siècle. Le château et ses dépendances sont disposés en équerre et occupent deux des côtés d'un vaste terre-plein maçonné limité par de vastes douves en eau. Le corps de logis présente une large façade prolongée par deux ailes basses dont l'une rejoint les dépendances. Ses éléments protégés sont les façades et les toitures qui sont inscrits aux M.H. le 10 avril 1980.                                                Manoir de la Courteille du XVIIe siècle  de  P Lescop.","habitants":"famille Champagne\r\n        \r\n        \r\n        \"","divers":"Coulans Grav-1-2-3-4      Courteille grav-5-6                                                            GPS : 48° 00' 51\" Nord, 0° 01' 35\" Est","gps":"48° 00' 51\" Nord, 0° 01' 35\" Est","images":["../../jctruffet.com/image/image_72/72_Coulans_G%c3%a9e_1.jpg","../../jctruffet.com/image/image_72/72_Coulans_G%c3%a9e_2.jpg","../../jctruffet.com/image/image_72/72_Coulans_G%c3%a9e_3.jpg","../../jctruffet.com/image/image_72/72_Coulans_G%c3%a9e_4.jpg","../../jctruffet.com/image/image_72/72_Coulans_G%c3%a9e_5.jpg"]},"Consult_chateau_formulaire87d7":{"id":"Consult_chateau_formulaire87d7","dept":"72","canton":"Le Lude","commune":"Dissé-sous-le-Lude","nom":"Cour_de_Broc","type":"Château","periode":"XVII","histoire":"A Dissé sous le Lude le château de Lorrière ou Laurière, seconde moitié du XVe siècle, restauré et agrandi de 1865 à 1875 selon les plans d'Ernest Dainville, puis remanié de 1922 à 1939, inscrit au titre des M.H. en 2001.\r\nLe château du Mortier, du Moyen Âge, du XVIe ou du  XVIIe et du XIXe siècles.                                                                                                                    COUR de BROC, de la fin du Moyen Âge et du XVIIe siècle. il appartenait à la famille de Broc qui tenait son nom de la paroisse limitrophe située dans le Maine-et-Loire. Vendu comme bien national, le domaine fut dépecé; pièce jointe le 12 thermidor an II de la République française: le lieu de la Cour de Broc provenant de son fils ainé émigré tel qu'en jouit à titre de ferme le citoyen Doriset pour sept années qui expieront au premier 1796.","architecture":"COUR de BROC, le lo
