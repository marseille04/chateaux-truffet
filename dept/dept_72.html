ndaient aveu aux comtes du Lude pour leur terre de Mervé. Cette terre est reliée à celle de Gallerande jusqu'en 1711, date à laquelle Charles-Léonor de Clermont vend le château de Mervé à Henry Fontaine de la Crochinière, inspecteur général des fermes au pays d'Anjou, qui en prend le nom. Mis à sac durant la Révolution, il est abandonné au début du XVIIIe siècle. Le château est reconstruit entre 1811 et 1846. Le siége local de l'organisation Todt se situait au château de Mervé vers 1941.Éléments protégés MH : le moulin de Mervé : inscription par arrêté du 22 décembre 1927.                                                                                                 Le Manoir de PRINGE est l'ancien presbytère, qui jouxte l'église de Pringé.","habitants":"Gallerande; Famille de Clermont-Gallerande                   Merve; Charles-Léonor de Clermont\r\n        \"","divers":"A Luché-Pringé le château de Gallérande grav-1 et le manoir de Merve grav-2-3, de Pringé .                                                  Gallerande GPS : 47° 42' 45,85\" Nord et 0° 2' 17,5\" Est                                                    Pringé GPS : 47° 42' 43,03\" Nord et 0° 2' 51,9\" Est","gps":"47° 42' 45,85\" Nord et 0° 2' 17,5\" Est","images":["../../jctruffet.com/image/image_72/72_Gallerande_1.jpg","../../jctruffet.com/image/image_72/72_Gallerande_2.jpg","../../jctruffet.com/image/image_72/72_Gallerande_3.jpg"]},"Consult_chateau_formulairebda8":{"id":"Consult_chateau_formulairebda8","dept":"72","canton":"Saint-Calais","commune":"Besse en Braye","nom":"Gavolerie","type":"Château","periode":"XVII","histoire":"GAVOLERIE, c'est en 1659 que Gilles Renard, jardinier du roi Louis XIII, fit construire ici une abbaye fréquentée par des moines camaldules, un ordre très austère. Il faut dire que le gentilhomme bessé en avait eu une vie plutôt dissolue. En 1793, les bâtiments du monastère furent abattus pour ériger l'actuel manoir à l'emplacement de l'ancienne église. L'endroit respire la sérénité. Les communs des religieux ont été aménagés en un gîte d'une capacité de 4 personnes. Il existe aussi plusieurs châteaux à découvrir sur la commune : Château de Courchet, Château de la Massuère, et le Château de la Gavolerie qui est un ancien couvent. Isabelle et Stéphane Martin, propriétaires du domaine,  Le manoir de la Gavolerie vous accueille dans son gite d'hotes.","architecture":"GAVOLERIE, Nous apprécions la visite de parcs paysagers ouverts au public à l'année. Il nous a paru naturel de faire de même une fois par an.  Il y a un petit bois, certains arbres sont plusieurs fois centenaires. Le potager familial disposé en carrés est cultivé sans pesticide ni herbicide. Dans le verger, les terrasses fleuries ainsi que les prairies valent le coup d'oeil. 168 tilleuls bicentenaires ont été plantés et répartis en 3 allées. Ils sont taillés en « tête-de-chat », tous les 3 ou 4 ans.","habitants":"Famille de Gilles Renard\r\n        \"","divers":"A Besse en Braye le château de la Gavolerie                                    GPS : 47° 50' 02\" Nord et 0° 44' 58\" Est","gps":"47° 50' 02\" Nord et 0° 44' 58\" Est","images":["../../jctruffet.com/image/image_72/72_Gavolerie_1.jpg","../../jctruffet.com/image/image_72/72_Gavolerie_2.jpg","../../jctruffet.com/image/image_72/72_Gavolerie_3.jpg"]},"Consult_chateau_formulaire2473-2":{"id":"Consult_chateau_formulaire2473-2","dept":"72","canton":"Le Lude","commune":"Aubigné-Racan","nom":"Genevraie","type":"Château","periode":"XV-XIX","histoire":"GENEVRAIE,  Genevraie appartenait au XVe siècle aux Baïf. En 1538, Marthe de Baïf, fille de Julien est dame de Genevraie et épouse de Geoffroy de Chemens. En 1647, Madeleine de Savonnières, veuve en seconde noce de René de Chauméjean, marquis de Fourille, est dame de Genevraie. En 1664, elle vend au duc du Lude qui cède ensuite aux dames religieuses  Notre Dame de La Flèche. Ces dernières revendent à Joseph Moriceau qui rend aveu au comte du Lude, en 1703. A la fin du XVIIIe siècle, Genevraie apparaît comme un domaine rural possédé par la famille Monden. Après la Révolution, il appartient à M. Mondin ou Monden, président du tribunal de Baugé. A cette époque, une grosse maison était placée perpendiculairement à la falaise de tuffeau creusée de dépendances troglodytiques. Un autre petit bâtiment de plan carré est appuyé sur le coteau face à l'entrée de la cour.","architecture":"GENEVRAIE, a la fin du XIXe siècle, le logis est allongé vers la vallée d'une sorte de pavillon en brique recouvert d'un enduit fausse brique et flanqué d'une tourelle en brique avec un jeu de damiers brique et pierre dans la partie basse, cet agrandissement serait dû aux entrepreneurs Marteau et Pigé. La tourelle est coiffée d'une sorte de toit à l'impériale avec un lanternon. Cette tourelle ne renferme pas l'escalier et se rapproche d'une tourelle de dimension semblable construite vers 1895 par l'architecte Nénot au château de Baudry. En 1703, l'aveu rendu au comte du Lude décrit un corps de logis, avec caves, pressoirs, cour, jardins et issues et une maison de métayer avec granges, étables, cours et jardins, terres labourables, prés, pâtures et vignes, contenant le tout cent arpents environ. Aujourd'hui, la maison se compose d'un vestibule traversant placé au centre du premier logis. L'escalier dans-oeuvre tournant en bois, passe devant une travée de baie. Le pavillon ajouté à la fin du XIXe siècle renferme un salon donnant sur le paysage. La cuisine placée à l'autre extrémité donne sur une courette encerclée de dépendances troglodytiques. Les modifications et agrandissements du XIXe siècle, en brique, de style Louis XIII, ne sont pas sans faire penser au château de Chauméjean, berceau du marquisat de Fourille.","habitants":"famille Monden\r\n        \"","divers":"Château de Genevraie à Aubigné-Racan","gps":"","images":["../../jctruffet.com/image/image_72/72_Genevraie_1.jpg","../../jctruffet.com/image/image_72/72_Genevraie_2.jpg","../../jctruffet.com/image/image_72/72_Genevraie_3.jpg"]},"Consult_chateau_formulairea320":{"id":"Consult_chateau_formulairea320","dept":"72","canton":"Château-du-Loir","commune":"L","nom":"Gidonnière","type":"Château","periode":"XVI-XVII","histoire":"GIDONNIERE, linvasion anglaise ne viendra pas contrarier la fortune du seigneur de la Gidonnière, tout au contraire et il mourra en 1497 propriétaire dun fort bel héritage que se partageront ses neveux et nièces. Ce sont les enfants de Marguerite du Breuil, sur du prélat, mariée à Guillaume Fremière, bourgeois dAngers, qui reçoivent la Gidonnière. Les Lhommois verront alors leur seigneurie passer des Fremière aux Pitard, puis à la famille Courtoux en 1562. Lascension conjointe de la famille de Courtoux et celle de Lhomme dans la société du XVIIe siècle continue par la grâce du roi de France qui, en 1667, érige la baronnie de La Chartre en marquisat dont la Gidonnière devient le château attitré. Puis, par mariage ou succession, le marquisat passe de la famille de Courtoux à celles des Pellerin de Gauville, et des Bonnin de la Boninière, lesquels détiennent aussi le marquisat de Beaumont-la-Ronce. Si le marquis Anne Claude Boninière de Beaumont est effrayé par la Révolution et préfère émigrer, son fils André semble mener la nouvelle commune de Lhomme en main de maître.  Avec le Premier Empire, la Gidonnière va quitter le patrimoine ancestral dont elle faisait partie depuis le XIVe siècle. Le château sera vendu en 1813 au baron Malouët, ancien Constituant, monarchiste constitutionnel affirmé, baron de l'Empire, ministre de la Marine du roi Louis XVIII. En ce XIXe siècle, une autre famille, également connue de lHistoire entrera dans celle de Lhomme, la famille Colonna-Walewski. Avec Cécile Rose Leconte de Nonant de Piercourt qui achète la Gidonnière en 1817,","architecture":"GIDONNIERE, il présente sa principale façade au midi et jouit dune vue étendue et admirable sur la plus belle vallée du département , le château proprement dit est un bâtiment rectangulaire construit sous le règne de Louis XIII, élevé sur caves, dun étage sur la cour d'honneur et de deux étages sur les jardins, avec comble très élevé qui renferme un étage carré, éclairé par des lucarnes meneaux avec frontons, construites en pierre de taille ; chaque façade présente à chaque étage quatre fenêtres. On arrive au château par une avenue plantée de beaux marronniers où se trouve un jardin dagrément dont les deux tiers environ sont plantés en bosquets. À louest du verger et au midi de la charmille sétend un bois de taillis. Le château est un bâtiment rectangulaire construit sous le règne de Louis XIII, élevé sur caves, d'un étage sur la cour d'honneur, et de deux étages sur les jardins.","habitants":"Famille de Courtoux\r\n        \"","divers":"A l'Homme, château de la Gidonnière","gps":"","images":["../../jctruffet.com/image/image_72/72_Gidonni%c3%a8re_1.jpg","../../jctruffet.com/image/image_72/72_Gidonni%c3%a8re_2.jpg","../../jctruffet.com/image/image_72/72_Gidonni%c3%a8re_3.jpg"]},"Consult_chateau_formulaire83b6":{"id":"Consult_chateau_formulaire83b6","dept":"72","canton":"Le Mans","commune":"Le Mans","nom":"Grabatoire","type":"Château","periode":"XVI","histoire":"GRABATOIRE; des membres du Chapitre Saint-Julien du Mans,  dun ancien hôpital qui l'y aurait précédé, sa construction, étirée sur plus de vingt ans, pu enfin s'achever grâce à une transaction survenue le 30 décembre 1542 entre Anselme Taron  comme héritier de son oncle, le chanoine Jacques de Courthardy et le chapitre appelé à couvrir la grande majorité des frais, n'en acquit la pleine propriété que l'année suivante, sans y apporter les lucarnes prévues : celles-ci ne furent ajoutées qu'en 1906. Dès son achèvement cette maison coloniale, fut habité par le chanoine M. de Quincé. En 1562, après la mise à sac de la cathédrale par les protestants, y fut établi une salle capitulaire. En 1567, les greniers du bâtiment servirent à amasser le grain pour le ravitaillement de la ville. En 1572, ce fut au tour, Anselme Taron, de venir sy installer. Mais il fut vite remplacé par Étienne Roy qui y mourut en 1579. En 1585, la ville fut  le nouveau locataire du bâtiment. En 1612, le maréchal de Lavardin y reçut le jeune Louis XIII et sa mère Marie de Médicis, de passage dans la ville.  Durant cette période, le Grabatoire fut séparé en deux parties : le fond de la cour, habité par le chanoine Fay, et le pavillon du Grabatoire où demeure Jean-Charles de la Briffe-Ponsan. Le 13 août 1791, la partie occupée par le chanoine Fay fut vendue comme bien national  à un notaire du Mans, Guy-Jean-François Martigné. Le pavillon fut finalement acheté par le même notaire, le 7 novembre 1791, sans pour autant que ses locataires religieux en fussent chassés. Le 24 septembre 1794, il céda lédifice au chanoine Fay, qui en fit rapidement don en 1795 à François Lambert, un proche parent, ancien avocat au siège présidial.","architecture":"GRABATOIRE restait cependant un logis inachevé, les dissensions nées durant sa construction ayant empêché la réalisation des lucarnes[citation nécessaire]. Lorsque labbé Bruneau acquit lédifice en 1895, il fit ériger deux lucarnes à croisée et de petits clochetons à la naissance du toit de la grosse tourelle. En même temps, fut appuyé au grand pignon nord, un appentis terminé en terrasse[citation nécessaire]. L'ensemble fut restauré en 1906 et 1907 et les enduits anciens, dont ceux en fausse-coupe de pierre du XVIe siècle, malheureusement, furent remplacés par un rejointoiement \"rustique\" contraire à l'esprit origine de ce bel hôtel urbain. La restauration de 2014 a rétabli, sous la maîtrise duvre de l'Architecte du Patrimoine Laurent Cohin, sa vêture d'enduit conforme aux dispositions primitives. La maison est composée dun grand pavillon à deux étages, prolongé vers louest par une aile moins élevée et terminée par un pignon aux rampants assisés. En retour d'équerre vers le nord, un corps de bâtiment moins important, au toit moins élevé, possède aussi des pignons découverts aux rampants assisés. Deux tourelles polygonales renferment les escaliers desservant les étages de cette double habitation. La façade du pavillon est percée de trois fenêtres superposées. La même disposition règne sur la façade en retour sur la cour. Celle-ci possède cependant deux ouvertures latérales en plus, celle du 1er étage date de la fin du XVIe siècle, alors que celle du second est contemporaine des travaux de restauration au début du XXe siècle. À lorigine toutes les fenêtres étaient recoupées par des croisées en pierre. Toutes disparues au XVIIIe siècle à une époque où la lumière était particulièrement recherchée, ont été restituées lors des travaux du début du XXe siècle.","habitants":"le maréchal de Lavardin\r\n        \"","divers":"Au Mans château de Grabatoire.","gps":"","images":["../../jctruffet.com/image/image_72/72_Grabatoire_1.jpg","../../jctruffet.com/image/image_72/72_Grabatoire_2.jpg","../../jctruffet.com/image/image_72/72_Grabatoire_3.jpg"]},"Consult_chateau_formulaireda63":{"id":"Consult_chateau_formulaireda63","dept":"72","canton":"Château-du-Loir","commune":"Le Grand-Lucé","nom":"Grand_Lucé","type":"Château","periode":"XIII-XVIII","histoire":"GRAND-LUCE, au XIIIe siècle  les sires de Lucé construisent un château de Pierre,  en 1281 la familles d'Eschelles acquiert le château et par alliance Marie d'Eschelles le transmet à Briégaud de Coësmes un descendant  François de Coësmes fait rebâtir un château vers 1455 suite à la visite du roi Louis XI le petit fils Charles obtient le titre  en 1539  de baronnie. Lucé se transmet par les femmes à François de Bourbon prince de Conti époux en secondes noces de Jeanne de Coësmes sa fille née du premier mariage Anne de Montafié se marie avec Charles de Bourbon comte de Soissons. En 1701 Philippe de Courcillon  marquis Dangeau l'achète                                                         en 1718 la baronnie est acquise par les Pineau de Viennay, Jacques deuxième du nom  lié par alliance aux Lalive de Bellegarde, qui fait de 1759 à 1764 démolition du château est construction de la nouvelle demeure, son fils Jacques  troisième du nom s'éteint en 1774 laissant le domaine à sa soeur aînée Louise qui s'éteint en 1806 sans alliance légua Lucé à un neveu le marquis d'Argence passe à sa descendance Margueritte d'Argence baronne de Vavasseur cèdent  en 1919  le château  au vicomte Georges d'Avenel, sa fille la princesse Eric de Broglie s'en défait en 1941. Devenu en 1948 centre médical géré par la fondation Georges Coulon et en 1987 pris en charge par le conseil général qui l'acquiert en 2003 , le château de Lucé a été vendu à un décorateur américain, Timothy Corrigan de Los Angeles. Celui-ci le transforma depuis en un véritable écrin « du siècle des lumières ».","architecture":"GRAND-LUCE, date du XVIIIe siècle, est construit en 1760 par l'architecte M. de Bayeux, entre le bourg et un grand parc.  L'ensemble est composé de trois parties distinctes sa façade d'entrée est animée par un avant corps sommé d'un fronton aux armes de spineau Viennay et des Lalive de Bellegarde et de deux ailes en légère saillie  aux angles marquées par des chaines à refends, la façade opposée, rectiligne, ne possède qu'un avant corps central surmonté d'un fronton orné d'un profil de femme. Grand toit à la Mansart éclairés par des lucarnes : les communs, groupés autour d'une cour de ferme, le château construit entre la cour d'honneur séparée de la Petite Place du bourg par un mur de plan centré percé d'un grand portail et le parc. Toutes ces constructions sont en pierre de taille et coiffées de combles en ardoise. A l'intérieur, restent quelques belles cheminées et des boiseries anciennes. Les jardins, reconstitués et ouverts au public, puisent leur inspiration dans les textes du XVIIIe  À la fin de la seconde guerre mondiale, le château est transformé en hôpital militaire pour les Alliés, avant que l'armée américaine cède le château à la ville pour créer un sanatorium. Devenu propriété du Conseil Général de la Sarthe, Les jardins à la française avec ses broderies, ses chambres de verdures et son jardin exotique, sont délimités par un escalier qui donne accès au potager. Plus loin, la vue s'ouvre sur le parc paysager avec son miroir d'eau. Le parc forestier s'étend sur 17 hectares. Éléments protégés MH : le château, y compris son portail, les communs en hémicycle, , ainsi que son parc : inscription par arrêté du 3 mars 1998.","habitants":"Famille des Pineau de Viennay,\r\n        \"","divers":"Château de Grand-Lucé  à Courbuon;                                                  GPS : 47° 51' 51\" Nord et 0° 28' 07\" Est","gps":"47° 51' 51\" Nord et 0° 28' 07\" Est","images":["../../jctruffet.com/image/image_72/72_Grand_Luc%c3%a9_1.jpg","../../jctruffet.com/image/image_72/72_Grand_Luc%c3%a9_2.jpg","../../jctruffet.com/image/image_72/72_Grand_Luc%c3%a9_3.jpg","../../jctruffet.com/image/image_72/72_Grand_Luc%c3%a9_4.jpg"]},"Consult_chateau_formulaire7c76":{"id":"Consult_chateau_formulaire7c76","dept":"72","canton":"Le Lude","commune":"Luché-Pringé","nom":"Grifferie_Luché","type":"Châteazu","periode":"XVII","histoire":"La GRIFFERIE. En 1457, Geoffroy du Bouchet, écuyer, seigneur de Passau, rend hommage pour la Grifferie. Jean de Bouchet, fils du précédent, vend tous ses biens en 1484 à sa soeur Guyonne du Bouchet. En 1486, Guyonne revend à Jacques de la Chevrière son beau-frère. Dans la première moitié du XVIe siècle, noble homme Louis de la Chevrié est sieur de la Grifferie près du Lude. En 1567, Pierre de la Chevrière est sieur de la Grifferie et archer de la compagnie de M. de Chavigny. En 1577, René Rousseau est sieur de la Grifferie. En 1632, Jean Couëtte écuyer sieur de la Grifferie et Jacques Couëtte sieur de la Roche de Vaas, écuyer vendent à Françoise Espinay veuve de défunt Guy Jacques vivant, seigneur sieur de la Heurelière, demeurant à la ville du Lude.\r\nLa terre, fief, seigneurie de la Grifferie composée de maison seigneuriale, cour, chapelle, fuye, jardins, terres, les métairies de Coustau, de l'Hommeau, la petite Grifferie et la Gaubruère. En 1668, la Grifferie appartient à François Jacques de la Hurelière qui donne la Grifferie à son neveu Henri Jacques de la Hurelière. En 1711, Henri Madelon de Jacques est chevalier seigneur de la Borde et de la Grifferie. En 1722, sa fille Marie-Anne Madeleine de Jacques de la Borde épouse Charles Vincent Barin marquis de la Galissonnière. En 1774, La Grifferie est un château bâti à la moderne composé de cinq fiefs : La Courante, le Breil, la Grue, Frémillonnière, et la Bourse-Grisière. En 1775, les Barin de la Galissonnière vendent la Grifferie à Jean-Baptiste-Marie Pihéry de Sivré, écuyer, trésorier des finances à Tours. Il meurt en 1817 et la Grifferie passe à sa nièce Marie Augustine Pihéry de Sivré veuve de François-Joseph marquis de Foucault. Les Foucault se succèdent au XIXe siècle. En 1883, Gustave de Foucault vend la Grifferie à Adrien Trophime Percheron de Monchy.","architecture":"LA GRIFFERIE, datent pour l'essentiel du XVIIe siècle même si les propriétaires rapportent qu'il existerait, au centre de la cour, une cave voûtée d'ogives, vestiges d'un logis médiéval. Le parti de composition de l'ensemble château et dépendances connu depuis au moins les années 1673, présente une telle symétrie qu'il est difficile de ne pas envisager une seule campagne de construction ou reconstruction. Le logis simple placé entre cour et jardin est flanqué de deux pavillons. L'escalier primitif aurait été placé au centre. Au nord, deux ailes en retour bordent la cour séparée de la basse cour par un mur ou une grille. La basse cour ou avant-cour se déploie en fer-à-cheval. A la fin du XVIIIe siècle, le château adopte le style néo-classique et les jardins placés entre le logis et le Loir sont remaniés. Les pavillons du logis sont élargis, le comble est transformé en étage-attique et une balustrade couronne l'ensemble.Le logis se compose alors de trois parties réunies par un portique sur chaque face. Il peut maintenant communiquer avec ses ailes en retour, l'escalier central est démoli et remplacé par deux escaliers latéraux et le centre de l'édifice est devenu un vaste et haut salon de réception. En 1776, la chapelle est transférée dans le pavillon de la cour, et la vieille chapelle est démolie pour dégager la vue sur le Loir. Le logis donne directement sur la grande terrasse qui se prolonge par les deux petites terrasses dites des Ormeaux et des Amandiers. Au bas de la pente, des douves limitent un jardin bas. Une orangerie est construite à l'ouest du château. Entre 1811 et 1846, le nouveau jardin s'étend vers l'est, jusqu'au chemin qui va à l'abreuvoir. Vers 1840, un parc paysager est dessiné par l'architecte paysagiste Lebotteux du Mans. A partir de 1883, l'architecte Paul Déchard redonne au logis son aspect du XVIIe siècle en enlevant la balustrade et en faisant réapparaître les toits en croupe et pavillons.","habitants":"Famille de François Jacques de la Hurelière \r\n        \r\n        \"","divers":"A Luché-Pringé le château de la Grifferie                                                 GPS : 47° 40' 40\" Nord et 0° 0' 19\" Est","gps":"47° 40' 40\" Nord et 0° 0' 19\" Est","images":["../../jctruffet.com/image/image_72/72_Grifferie_Luch%c3%a9_1.jpg","../../jctruffet.com/image/image_72/72_Grifferie_Luch%c3%a9_2.jpg","../../jctruffet.com/image/image_72/72_Grifferie_Luch%c3%a9_3.jpg","../../jctruffet.com/image/image_72/72_Grifferie_Luch%c3%a9_4.jpg"]},"Consult_chateau_formulairebe76":{"id":"Consult_chateau_formulairebe76","dept":"72","canton":"Le Mans","commune":"Trangé","nom":"Groirie_Trangé","type":"Château","periode":"XVI-XVIII","histoire":"La GROIRIE, le château  au XVIIe siècle est surélevé par Louis-François de la Rivière époux de Madelaine de Lomblon. Pousset de Montauban compose sa promenade  du sieur de Montauban à la Goirie. Les la Rivière possesseur d'inombrables  seigneuries net du château de Bouchet  s'attache à la Groirie et le transforme. Les la Rivière les deux fils de Louis de Rancé mouront, l'un à la bataille de Ramilliès en 1706, l'autre en 1715 suite à ses blessures de la bataille de Malplaquet, la Groirie, avec tous les biens de la famille passe à Louise  Madeleine-Joseph-Marie  de la Rivière qui avait épousé en1704 Joseph de Mailly et en  1720 passe à la famille de Samson François de Samson lieutenant général au siège  présidial au Mans et maire de la ville. Alexandre-Paul-Louis de Samson succède à son père dans ses Charges. La Groirie  renoue  avec les fastes de l'époque des de  la Rivière devient un centre d'une société choisie. Alexandre-Paul Samson remanie les façades et flanque le corps de logis de deux pavillons à une travées. A sa mort en 1764, sa veuve Marie-Françoise le rouge agissant pour ses fils héritiers dont l'un des fils hérite   sera officier au régiment de Penthièvre sa descendance s'éteindra en 1836 le domaine passe par alliance à la famille Enlart  de Grandval, puis par succession aux la Vingtrie.","architecture":"La GROIRIE, le château de la Groirie a été construit en 1540, agrandi aux XVIIe et XVIIIe siècles,  d proportions modestes, corps de logis rectangulaire à deux niveaux  avec un toit brisé à la Mansart donna l'aspect   qu'on lui connait aujourd'hui avec sept travées  dans lesquelles s'encadrent  de grandes fenêtres à petits-bois,  et, dans le parc, une chapelle à coupole de forme octogonale à l'extérieur et circulaire à l'intérieur et supportant un lanternon. Boiseries classées et escalier à rampe de fer forgé. A l'orée du parc, cadran solaire bâti en 1635, uvre d'un moine bénédictin, donnant l'heure aux quatre points cardinaux par un jeu d'ombres sculptées, polyèdre sur les faces duquel sont sculptés des Livres en guise de cadran et sur lequel on peut lire les jours de la semaine. Bâtiments annexes (le pigeonnier, les dépendances, l'orangerie...). Pelouses cernées de hautes futaies aux arbres séculaires. Le château et ou son orangerie peuvent être loués.  Il comporte les communs, l'écurie, la chapelle, le pigeonnier, l'escalier, la salle à manger, le salon, l'élévation, la rampe d'appui et sa décoration intérieure. Son cadran solaire, racheté par le Conseil Général en 2005, a été transféré dans le parc de l'abbaye de l'Epau à Yvré-l'Evêque. Le château de la Groirie est inscrit aux M.H. depuis 1974. Vous pourrez visiter le parc et les jardin du château de la Groirie.\r\nÉléments protégés MH : les façades et les toitures du château, des communs, des écuries et de la chapelle polygonale ; l'escalier avec sa rampe en fer forgé ; la salle à manger et les deux salons du rez-de-chaussée avec leur décor ; la fuye: inscription par arrêté du 3 mai 1974.","habitants":"Louise  Madeleine-Joseph-Marie  de la Rivière\r\n        \"","divers":"A trangé le château de la Groirie                                                  GPS : 48° 01' 41\" Nord et 0° 07' 30\" Est","gps":"48° 01' 41\" Nord et 0° 07' 30\" Est","images":["../../jctruffet.com/image/image_72/72_Groirie_Trang%c3%a9_1.jpg","../../jctruffet.com/image/image_72/72_Groirie_Trang%c3%a9_2.jpg","../../jctruffet.com/image/image_72/72_Groirie_Trang%c3%a9_3.jpg","../../jctruffet.com/image/image_72/72_Groirie_Trang%c3%a9_4.jpg"]},"Consult_chateau_formulaire9596":{"id":"Consult_chateau_formulaire9596","dept":"72","canton":"La Suze-sur-Sarthe","commune":"Fillé-sur-Sarthe","nom":"Gros_Chesnay","type":"Château","periode":"XVII","histoire":"GROS CHESNAY, le château, édifié au XVIIe siècle pour Jean Le Boindre, représente l'archétype de la maison de plaisance. L'édifice fut terminé vers 1650 puisqu'on y exécute les travaux de maçonnerie de la corniche et des lucarnes. En avril 1653, Jean Le Boindre est exilé par le cardinal Mazarin pour avoir été proche des Frondeurs. Il doit quitter Paris, mais est autorisé à séjourner dans sa résidence du Gros Chesnay. Il forme alors un territoire homogène; c'est ainsi que se font des achats de vignes qu'il fait arracher pour y faire une \"prée\" proche de son château.","architecture":"GROS CHESNAY, en 1679, il fait procéder à l'allongement de l'allée du château. A l'intérieur, décors du début du XVIIIe siècle. Jardin baroque de la seconde moitié du XVIIe siècle. Ils ont acquis une certaine célébrité avec l'arrivée d'Alain Passard, chef étoilé du restaurant l'Arpège à Paris, il a créé au Gros Chesnay un jardin biologique qui approvisionne son restaurant.  Éléments protégés MH : tous les bâtiments ou vestiges de bâtiments visibles ou actuellement enfouis (logis, pavillons, écurie, pigeonnier, restes de l'ancienne galerie, murs séparant les cours avec leurs portails, murs de clôture du potager ) ; la totalité des jardins avec les murs de soutènement des allées en terrasse et des berges des canaux : inscription par arrêté du 2 juin 2003.","habitants":", Jean Le Boindre\r\n        \"","divers":"A Fillé-sur-Sarthe le château de Gros-Chesnay;                            GPS : 47° 53' 39\" Nord et 0° 06' 38\" Est","gps":"47° 53' 39\" Nord et 0° 06' 38\" Est","images":["../../jctruffet.com/image/image_72/72_Gros_Chesnay_1.jpg","../../jctruffet.com/image/image_72/72_Gros_Chesnay_2.jpg"]},"Consult_chateau_formulairee7bf":{"id":"Consult_chateau_formulairee7bf","dept":"72","canton":"La Ferté-Bernard","commune":"Cherré","nom":"Haut_Buisson","type":"Manoir","periode":"XIX","histoire":"HAUT-BUISSON , en 1889, le prince Albert I de Monaco (arrière-grand-père du prince Rainier) épouse en secondes noces à Paris la duchesse de Richelieu. Née en 1858 à la Nouvelle-Orléans, Alice Heine est la fille dun riche banquier parisien. En 1875, elle épouse Armand Chapelle de Jumilhac, 7ème duc de Richelieu avec qui elle a deux enfants : Armand et Odile qui décèderont sans postérité. Veuve en 1880, elle se remaria avec le prince souverain de Monaco mais le couple finit par se séparer en 1902.   Et Gabriel Louis Pringué de se remémorer un déjeuner de juillet 1913 auquel assistaient lady de Grey, la princesse Amédée de Broglie, Pierre Loti et la duchesse de Camastra.   Jusqu'en 1926, le domaine appartenait à la Princesse Alice de Monaco, qui fut une grande bienfaitrice de Cherré. Elle épousa en seconde noce le Prince Albert Ier de Monaco, le célèbre océanographe. Une plaque apposée en mairie honore aujourd'hui sa mémoire tout en témoignant de la reconnaissance de la commune. Jusqu'en 1926, la propriété appartenait à la Princesse Alice de Monaco, grande bienfaitrice de Cherré. Elle épousa en seconde noce le Prince Albert Ier de Monaco. Corps de bâtiment construit en 1847 par François Hippolyte Destailleur pour Armand Chapelle de Jumilhac.","architecture":"HAUT-BUISSON, le dernier seigneur de La Ferté Bernard, le marquis de Jumilhac, descendant de Richelieu, fait bâtir ce château au XIXe siècle.  duc de Richelieu. Première pierre des communs posée par Armand et Odile de Richelieu en 1881 (date portée sur les communs) L'ensemble de la propriété fut léguée aux Universités de Paris afin de créer une station de biologie végétale. Les Thèmes de l'institution : Botanique générale, Jardin et ses serres. Il est appelé depuis : le Centre de Conservation du Patrimoine naturel de Cherré - Musée national. Seule la partie boisée du domaine est ouverte au public à des fins de promenade pédestre uniquement et seuls les sentiers balisés peuvent être empruntés. Il date de 1847. Le marquis de Jumilhac, qui fut le dernier seigneur de La Ferté Bernard, descendant de Richelieu, fit construire le château du Haut-Buisson, au XIXe siècle.","habitants":"la Princesse Alice de Monaco\r\n        \"","divers":"A Cherré le château de Haut-Buisson,                                                     GPS : 48° 10' 21\" Nord, 0° 39' 30\" Est","gps":"48° 10' 21\" Nord, 0° 39' 30\" Est","images":["../../jctruffet.com/image/image_72/72_Haut_Buisson_1.jpg","../../jctruffet.com/image/image_72/72_Haut_Buisson_2.jpg"]},"Consult_chateau_formulaireb93d":{"id":"Consult_chateau_formulaireb93d","dept":"72","canton":"Bonnétable","commune":"Nogent-le-Bernard","nom":"Haut_Eclair","type":"Manoir","periode":"XVI","histoire":"HAUT-ECLAIR, le château de Haut Eclair, de la fin du XVIe, remanié au XIXe siècles, est affecté à une école de filles en 1897. Il possède une échauguette de la fin du XVIe siècle, la base de la tourelle étant sculptée de motifs floraux, un pigeonnier circulaire de 1611, dont le rez-de-chaussée sert de cave et de salle de garde et l'étage abritant 800 boulins et dont la charpente est en rayure aujourd'hui école.                                                                                         A la fin du XIXe, le château est vendu à Georges Delante, maire de la commune qui offre à la mairie la possibilité de le racheter à un prix avantageux pour y installer lécole publique de filles qui sera des années plus tard transformée en école maternelle.","architecture":"HAUT-ECLAIR, datant de la fin du XVIe siècle, aurait été bâti, daprès certaines hypothèses, à lemplacement dun ancien édifice médiéval. Lors de la Révolution, Haut Eclair est le théâtre dactions de chouannerie menées par les filles de Sallet qui étaient considérées comme les \" héroïnes et les amazones de lancienne chouannerie \". En 2004, suite au transfert de lécole, la communauté de Communes prend la compétence pour gérer le site. Des travaux sont alors entrepris afin de réhabiliter les lieux. La première phase des travaux sest achevée en 2009 permettant au château daccueillir à nouveau de nombreuses personnes et retrouver le faste des fêtes dautrefois lors de somptueuses réceptions.\r\nRécemment, la dernière phase de travaux a permis de restaurer le pigeonnier. De forme circulaire, il abrite 2 niveaux. Il porte linscription 1611 sur la porte. Le premier niveau servait de salle de garde. Percés de meurtrières, cétait un lieu de surveillance et de refuge. A létage, on peut y voir 800 boulins.","habitants":"Georges Delante,\r\n        \"","divers":"A  Nogent-le-Bernard le château de Haut- Eclair","gps":"","images":["../../jctruffet.com/image/image_72/72_Haut_Eclair_1.jpg"]},"Consult_chateau_formulairedcc3":{"id":"Consult_chateau_formulairedcc3","dept":"72","canton":"La Suze-sur-Sarthe","commune":"St-Jean du Bois","nom":"Houssaye_72","type":"Château","periode":"XVI-XVIII","histoire":"HOUSSAYE, il se situe à 5kms de Suze et à 25 kms du Mans, dans la Vallée de la Sarthe. En 1479, il est fait mention des Terres de la Houssaye. Il date du XVe, XVIIe et XVIIIe siècle. Le château de la Houssaye est de style troubadour. Jehan Samson, écuyer de Cuisine, reconnaît tenir le château de son seigneur Charles IV, comte du Maine et Duc dAnjou (1436-1484), 100 arpents de cette terre. En 1684, le château de la Houssaye est offert en dot, par Anne-Antoinette Leprêtre, dame de la chapelle de Raison, à son mari et cousin Jacques 1er, seigneur de Gaignon de Villaines en Louplande. Le château sera revendu plusieurs fois. Puis, le château de la Houssaye fut racheté, en 1704, par Mr Sauquaire, officier de la maison du Roi. Martial Sauquaire-Souligné en héritera en 1789. Ce dernier, homme détat, ex membre de la Convention, complote à la Houssaye contre la Royauté avec la complicité de Goyet, Benjamin Constant et Lafayette, député de la Sarthe. Ayant échoué, il doit sexpatrier en Angleterre, en août 1823, pour échapper à une condamnation à mort. Son cousin, Alfonse Léon de Chamillart, marquis de la Suze, page de Louis XVIII, fait lacquisition du château, lagrandit de deux pavillons flanqués de 4 tours rondes. Le château de la Houssaye est devenu depuis une belle demeure bâtie sur un coteau qui domine de vastes étangs et la large vallée de la Sarthe. En 1881, victoire de Chamillart en devient propriétaire. après son décès prématuré, son époux, Harscouët de St Georges retourne dans sa maison familiale de Nantes et revendra le château au comte de Bonvouloir, en 1919.","architecture":"HOUSSAYE en 1958, La comtesse de Bonvouloir le revend à la communauté de commune. Lactuel propriétaire le rachète en 2000. Aujourd'hui, le château de la Houssaye vous propose ses chambres d'hôtes et son mobilier d'époque, un spa hydromassant, chauffé à 36 degrés, avec luminothérapie et fontaine, réservé à l'usage exclusif de votre chambre, un héliport,etc. Au Second Empire, de nombreux arbres furent plantés autour du château : des Tilleuls, un Sequoia, des cèdres du Liban, des chênes verts, des Pins parasol et un liquidambar.","habitants":"Famille de  Jehan Samson et  de Mr Sauquaire\r\n        \"","divers":"A  St-Jean du Bois château de la Houssaye ;                                       GPS : 47° 52' 9,15\" Nord, 0° 2' 44\" Ouest","gps":"47° 52' 9,15\" Nord, 0° 2' 44\" Ouest","images":["../../jctruffet.com/image/image_72/72_Houssaye_72_1.jpg","../../jctruffet.com/image/image_72/72_Houssaye_72_2.jpg","../../jctruffet.com/image/image_72/72_Houssaye_72_3.jpg"]},"Consult_chateau_formulaire3dbc":{"id":"Consult_chateau_formulaire3dbc","dept":"72","canton":"Loué","commune":"Joué en charnie","nom":"Joué_Charnie","type":"Château","periode":"XVI-XVII","histoire":"JOUE,  cette  famille  succéda  à la  famille  Leclerc ( Christophe Leclerc sieur de la Créspinière) qui occupa les lieux jusquà la fin du XVe siècle , Dans la même période avant 1400 nous avons  Gilles  de  Neufvillette   qui  épouse Catherine   de   la   Motte   demeurant   à Lhommois et prend ainsi vers 1420 possession du château de lHommois. Vers  la  moitié  du  XVIe siècle la famille de Neufvillette séteint après le remariage de  Françoise  de  Neufvillette  en  1585  et grâce  à  une  alliance  en  date  de  1569 avec  messire  Jean  de  Biars  ,  le  château de  lHommois  devient la  propriété  de  la famille de Biars. A  savoir  que  cet  antique  château  fut remplacé  par  une  demeure  bourgeoise encore existante à ce jour.  Ensuite plusieurs occupants se succédèrent à l'Hommois, à ce jour la propriétaire étant madame Marie Louise De Jerphanion épouse d'André De Jerphanion et fille de Hubert Panon Desbassayns de Richemont.  Pour ce qui est du manoir de Beaumont, il est difficile de savoir à quelle époque il fut  construit.  Nous  savons  quau  XVIIe siècle  la  famille  de  lIsle  se  sépare  de Beaumont et le vend le 3 décembre 1668 à  la famille  Nouet  qui  occupera  cette  demeure jusquen 1754. Cette  dernière  sera  remplacée  par  la  famille Chenon du Boulay dont lun des fils fût nommé sénéchal de Champagne.","architecture":"Manoir de BEAUMONT  Les façades et toitures du manoir, des communs et du pavillon d'entrée, les quatre cheminées du manoir et celle du pavillon d'entrée sont inscrites au titre des monuments historiques le 20 avril 1980. campagnard du XV au XVIIIe siècle  Le corps de logis principal remonte à la fin du XIVe siècle, comme en témoignent plusieurs éléments architecturaux : jambages des fenêtres, restes des enduits d'origine, chevêtres des cheminées anciennes. Côté jardin, une tourelle du XVe siècle abrite un bel escalier en chêne. La cour intérieure, bordée de bâtiments d'exploitation et fermée par un ancien pigeonnier du XVe siècle, garde un aspect, sinon militaire, du moins défensif. Le manoir a été remanié au tout début du XVIIIe siècle : ajout d'un pavillon au Sud et d'une chapelle au Nord, modification des ouvertures dans le goût du jour, transformation des cheminées intérieures dans le style de la Régence.  Le manoir a été marqué notamment par l'ascension sociale de la famille Chenon du Boulay à la fin du XVIIe siècle, puis par le bref passage de la célèbre Marthe Richard et de son mari Henri Richer, avant la guerre de 1914.  F  Louise, Marie-Josèphe d'Ozouville Trémignon en a été propriétaire.","habitants":"Famille de Neufvillette\r\n        \r\n        \"","divers":"A Joué en Charnie le château de Joué grav-6 Hommois grav 1 et le manoir de Beaumont grav 3-4 et de Haute-Fresnaye  grav-2 à Neuvillette en Charnie grav-5","gps":"","images":["../../jctruffet.com/image/image_72/72_Jou%c3%a9_Charnie_1.jpg","../../jctruffet.com/image/image_72/72_Jou%c3%a9_Charnie_2.jpg","../../jctruffet.com/image/image_72/72_Jou%c3%a9_Charnie_3.jpg","../../jctruffet.com/image/image_72/72_Jou%c3%a9_Charnie_4.jpg","../../jctruffet.com/image/image_72/72_Jou%c3%a9_Charnie_5.jpg","../../jctruffet.com/image/image_72/72_Jou%c3%a9_Charnie_6.jpg"]},"Consult_chateau_formulaire38ba":{"id":"Consult_chateau_formulaire38ba","dept":"72","canton":"Sablé-sur-Sarthe","commune":"Juigné sur Sarthe,","nom":"Juigné_Vrigné","type":"Château","periode":"XV-XVIII-XX","histoire":"Deux châteaux à Juigné sur Sarthe dont Juigné, Guyonnière, et Vrigne.                                                                                                                              JUIGNE,  donation faite par le comte et la comtesse de Juigné de la jouissance d'une maison et dépendances pour servir à une école de charité dans la commune de Juigné. La construction du château de Juigné date du XVIIe au XXe siècle, avec son parc.                                                                                                         VRIGNE, est une construction du dernier quart du XVe siècle, édifiée pour Pierre Jarry, un proche du Roi René d'Anjou. Au cours des siècles, cette grande bâtisse aura plusieurs usages et servira notamment d'exploitation agricole au XVIIIe siècle. Un premier logis avec motte pouvant dater du Xe au XIIIe siècle a été détruit à une époque indéterminée. Le manoir de Vrigné actuel a été construit entre 1493 et 1528 par Pierre Jarry, fils du maître de la chambre des comptes du Roi René dAnjou, qui avait acheté le vieux bâtiment et quelques terres alentours pour la somme de 522 écus dor. Vrigné est un bâtiment en U avec un corps central, deux ailes en retour d'équerre et une tour descalier hors duvre. Un plan simple et très classique mais avec énormément dharmonie et délégance. D'après des sources, la chapelle construite vers 1530 est détruite entre 1791 et 1828. Les parties agricoles construites avant 1828, et remaniées au XIXe siècle, après cette date; vivier sur la Sarthe au moyen âge. Tourelle hors-oeuvre couverte d'un toit polygonal. Utilisé comme métairie depuis le XVIIIe siècle, le manoir sétait lentement dégradé mais en 1995 Jean et Benita de Durfort, se sont lancés dans la restauration de ce bâtiment.","architecture":"Le château de la Thibaudière inscrit au titre des M.H. en 2005.\r\nLe château de la Guyonnière, racheté par la commune en 1982, devenu un centre de loisirs.                                                                                                         JUIGNE,  village implanté sur un éperon délimité par la Sarthe et le ruisseau de la Bouchardière, traversé par la route Sablé-Le Mans. Il se développe du XVe au XVIIIe siècle autour de l'église du XIIe siècle, entourée du cimetière et du prieuré. L'agglomération est bordée par le château de Juigné et son parc du XVIIe siècle. Un décret, daté de Varsovie le 6 janvier 1807. Une ordonnance du Roi, du 28 novembre 1821, autorise l'acceptation de la donation faite Logis entièrement remanié au début du XVIIe siècle, corps en retour d'équerre détruit vers 1832, daté par source, remaniement des élévations et de la structure interne entre 1918 et 1940, daté par source. Au XIXe siècle ajout du portail en ferronnerie et réalisation du jardin. Le logement de gardien et corps de dépendances comprenant orangerie, écurie, remise sont construits au XIXe siècle. Dans la première moitié du XXe siècle, réalisation du jardin régulier avec miroir d'eau  C'est un château qui fut plusieurs fois remanié. Il possède de belles façades de style classique et un beau parc, et sa chapelle. Le château de Juigné est recensé à l'inventaire général du patrimoine culturel avec son parc et sa chapelle.                                                                                                 VRIGNE, corps de logis principal du manoir de Vrigné est entouré de deux ailes plus courtes placées en équerre. Ses façades présentent des encadrements de portes et de fenêtres en pierres de taille blanches, ainsi qu'une somptueuse tour d'escalier polygonale hors d'uvre.","habitants":"Juigné; comte de Juigné,                                                           Vrigné; Pierre Jarry,\r\n        \"","divers":"à Juigné sur Sarthe dont Juigné grav-6, Guyonnière grav-1-2-3, et Vrigné grav 4-5.                                                               GPS : 47° 51' 49\" Nord et 0° 17' 14\" Ouest","gps":"47° 51' 49\" Nord et 0° 17' 14\" Ouest","images":["../../jctruffet.com/image/image_72/72_Juign%c3%a9_Vrign%c3%a9_1.jpg","../../jctruffet.com/image/image_72/72_Juign%c3%a9_Vrign%c3%a9_2.jpg","../../jctruffet.com/image/image_72/72_Juign%c3%a9_Vrign%c3%a9_3.jpg","../../jctruffet.com/image/image_72/72_Juign%c3%a9_Vrign%c3%a9_4.jpg","../../jctruffet.com/image/image_72/72_Juign%c3%a9_Vrign%c3%a9_5.jpg","../../jctruffet.com/image/image_72/72_Juign%c3%a9_Vrign%c3%a9_6.jpg"]},"Consult_chateau_formulaire6ba0-2":{"id":"Consult_chateau_formulaire6ba0-2","dept":"72","canton":"Le Mans","commune":"Lassay","nom":"Lassay","type":"Château","periode":"XIII-XV-XVI","histoire":"LASSAY, cette seigneurie s'est constituée au début du XVIe siècle par la réunion de quatre domaines :La seigneurie Saint-Michel qui était la propriété d'une famille éponyme au XIIe siècle. En 1222 un certain René de Saint-Michel assiste aux obsèques du sénéchal Guillaume des Roches à l'abbaye de Bonlieu.  La seigneurie de Passavant, qui ne comporte qu'un ensemble de droits et rentes sans domaine foncier exception faite de la Passavandière, dont le seigneur est Gervais de Lacey au début du XIVe siècle. Elle relevait du marquisat de Vibraye.  La seigneurie de l'abbaye du Gué, composée d'un ensemble de terres qui furent données à l'abbé de l'abbaye de l'Épau, qui les rétrocèdent à Lassay moyennant une rente perpétuelle. C'est au cours des XVe et XVIe siècles que ces quatre seigneuries furent réunies par des achats successifs des familles de La Raite, Nocé, Picart.En 1779, la seigneurie est estimée à une surface de 580 hectares. Elle possède le droit de haute, moyenne et basse justice évoquée par le nom des tours du château, les droits banaux, de poids et de mesures. Mr de Crochard, époux de Melle de Lonlay l'aînée. Mr Beauvais de Saint-Paul, époux de Mlle Lonlay la jeune, chansonnier, auteur d'une histoire de la ville de Montdoubleau, qui démembre la terre de Lassay en 1822.\r\nLéon Bertaux jusqu'à sa mort en 1915, et son épouse Hélène Bertaux de 1897 à 1909. Les héritiers vendent à Ernest-Louis Legros  magistrat à Bar-le-Duc et Victor-Léon Legros médecin au Mans de 1915 à  Thierry et Sandrine Dusonchet depuis 2001. Ils reçurent en 2008 le prix Belles demeures de France pour l'ensemble de leurs travaux de restauration. La famille de Joséphine Charlotte Hélène Pilate ont été propriétaire.","architecture":"LASSAY, la première mention de cette place forte remonte au XIIIe siècle. Cette seigneurie s'est constituée au début du XVIe siècle par la réunion de quatre domaines :La seigneurie Saint-Michel qui était la propriété d'une famille éponyme au XIIe siècle Ensemble de bâtiments, logis et communs construits sur des douves en eau, qu'alimente la Nogue, avec des vestiges de fortifications de la fin du XVe siècle, début XVIe siècle. La courtine est surmontée d'un chemin de ronde avec aux angles, deux tours rondes portant les noms de Justice et Audience, et une carrée comportant un toit en pavillon, avec une chapelle construite sur la courtine Est, que protégeait l'ancien étang. Le logis actuel fut reconstruit au XVIIIe siècle, les armoiries des Lonlay effacées sous la Révolution furent restaurées au XXIe siècle. La charpente entièrement restaurée en 2007.     La basse-cour comprend un petit colombier dit ici une fuie, possédant cinq cents trous de boulins à moitié en ruines, restaurés par les Dusonchet. Une ferme et un moulin à deux roues sur le ruisseau de La Nogue qui furent revendus en 1911.  Pavillon de chasse.","habitants":"Familles de La Raite, Nocé, Picart\r\n        \"","divers":"Lassay; gps 48° 01' 32\" nord, 0° 33' 33\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_Lassay_1.jpg","../../jctruffet.com/image/image_72/72_Lassay_2.jpg","../../jctruffet.com/image/image_72/72_Lassay_3.jpg","../../jctruffet.com/image/image_72/72_Lassay_4.jpg"]},"Consult_chateau_formulaire23a5":{"id":"Consult_chateau_formulaire23a5","dept":"72","canton":"Savigné-l","commune":"Lombron","nom":"Launay_Lombron","type":"Château","periode":"Xv-XVIII","histoire":"LAUNAY, du XVe siècle et du XVIIIe siècle qui a été entièrement restauré. Il est aussi connu comme le château de la Grande Maison. chambres d'hôtes dans le château.  Le propriétaire en était Pierre de Bernay, juriste et homme de confiance de Charles de Couesmes, seigneur de Lucé, combattant de Ravenne et de Marignan. Ce dernier fut, hélas, un soudard débauché et sans scrupule; il était l'époux de Jeanne D'Harcourt fille des châtelains de Bonnétable; celle-ci qui n'était âgée que de seize ans mourut de la peste lors de la Toussaint de 1523; nous pouvons admirer son image dans le grand vitrail de la Crucifixion en l'église de Torcé. Sa jeune sur Gabrielle, espiègle et hardie, n'avait eu aucun mal à se faire remarquer de son beau-frère; avec la complicité de Pierre  de Bernay et de quelques servantes, elle résolut de jouer l'aventure d'un enlèvement.Tous s'étaient enfuis à Metz, terre d'Empire où le connétable de Bourbon traître à son roi, leur offrit l'hospitalité. En Mars, Charles De Couesmes et ses complices étaient condamnés à avoir la tête tranchée. Mais ils étaient loin; seule Gabrielle, facilement interceptée fut ramenée entre les mains de sa mère et astreinte à la réclusion au couvent de la Délivrande en Normandie. Cependant en 1525, après le désastre de Pavie, Louise De Savoie, mère de François Ier et régente, qui ne pouvait guère se passer des services d'un rude soldat tel que Charles De Couesmes lui accordait des lettres de rémission; il put ainsi rentrer dans le Maine et faire valider son mariage avec Gabrielle, le pape Clément VII leur ayant accordé les dispenses nécessaires. Aujourd'hui, le château est la propriété de Madame et Monsieur Mac Kee, chambres d'hôtes.","architecture":"LAUNAY, le château de Launay est un château historique du XVe et du XVIIIe siècle, qui a été complètement rénové. Son architecture de la Renaissance est typique de beaucoup de châteaux de la région Loire. On le connaît aussi sous le nom du château de la Grande Maison. La propriété a de beaux chemins bordés d'arbres, un verger et un étang. Le château est entouré de douves. Un pont en pierre traverse les douves et on y trouve aussi un pavillon et un pigeonnier. De la terrasse, on peut admirer la vue sur les douves et l'étang, La péninsule entre les douves et l'étang est l'endroit idéal pour se détendre, l'étang foisonne de poissons et accueille une importante variété d'oiseaux aquatiques. La propriété comporte aussi des sentiers bordés de tilleuls parfumés, et d'un verger composé de diverses sortes d'arbres fruitiers, les sentiers situés sur le domaine traversent des pâturages et des bois et rejoignent d'autres sentiers tout aussi bien marqués dans la campagne alentour.","habitants":"Louise De Savoie\r\n        \"","divers":"Launay GPS : 47° 42' 48,89\" Nord et 0° 1' 33,7\" Est","gps":"47° 42' 48,89\" Nord et 0° 1' 33,7\" Est","images":["../../jctruffet.com/image/image_72/72_Launay_Lombron_1.jpg","../../jctruffet.com/image/image_72/72_Launay_Lombron_2.jpg","../../jctruffet.com/image/image_72/72_Launay_Lombron_3.jpg","../../jctruffet.com/image/image_72/72_Launay_Lombron_4.jpg"]},"Consult_chateau_formulaire2022-2":{"id":"Consult_chateau_formulaire2022-2","dept":"72","canton":"Savigné-l","commune":"Lombron","nom":"Lauresse","type":"Château","periode":"XVI-XVII","histoire":"LAURESSE, en 1371 Alain de Taillecoul seigneur de Lauresse et de Brusson devient propriétaire en épousant Bertranne, au XVe siècle passe par alliance aux Taillement et au XVIe siècle  le domaine revient  à Jacques d'Avaugour seigneur de Courtalain, époux de Catherine de la Beaume. En 1553 Jacqueline d'Avaugour épouse Pierre de Montmorency baron de Fosseux qui transmettra  à l'un de leurs  fils à Pierre capitaine. De son second mariage avec Suzeanne de Rieux, aura plusieurs enfants avec Pierre chambellan du prince de Condé  qui épouse en 1628  Louise de Lomblon mais Pierre décède en 1668 et le château n'est pas  terminée. En 1698 Charles du Liscouet achète le domaine, sénéchal du maine son épouse Marguerite de Gennes. A leur mort, le domaine échoit à un neveu Jacques le Coustelier marquis de Saint-Pater s'éteint en 1738 le domaine revient à son petit cousin par les Gennes  Jacques Pineau de Viennay qui ce dernier meurt en 1764 et Lauresse est dévolu par partage à sa fille Marie-Jacquette, épouse  de Jean François Levesque de Vouziers à son décès en 1789, laisse qu'une fille qui  épouse  son cousin Claude-François d'Argence. En 1806 le domaine est cédé à Martin Guillouard, négociant, passe ensuite par héritage à son fils Alexandre et à sa fille Marie-Désirée, épouse d'Eugène de Langlois négociant. En 1864 madame Langlois reste seule en possession de Lauresse s'en défait au profit d'Ambrois Lorette ancien préfet, acquis en 1877 par le baron Rey, à sa mort en 1916 passe à sa nièce madame de Loynes du Houlay, vivra à Lauresse jusqu'en 1959 léguant à sa nièce Mme d'Hébray de Pouzals, née Nicole de Loynes. Aujourd'hui propriété de M. Marcel-Pierre Cléach sénateur de la Sarthe.","architecture":"LAURESSE, demeure du milieu du XVIIe siècle, d'architecture classique  corps de logis flanqué de deux pavillons carrés. Le manoir d'origine, bâti au XIe siècle, a été détruit lors des invasions normandes. Château reconstruit à la fin du XVIIe siècle. Elévation à deux niveaux sur un soubassement en pierre de taille,  viennent s'accoler  deux pavillons bas à une travée, les angles et les baies étant soulignés d'un appareillage de briques roses. Nouveauté de l'art de la polychromie, combinant le rose de la brique, le blanc de la pierre et le noir de l'ardoise. Les toits brisés supportent en leur centre un lanternon aveugle et une série de lucarnes en oeil-de-boeuf et des lucarnes à fronton sur les avant corps latéraux. C'est M. le comte d'Hebray de Pouzals qui, dans les années 1960, confiant la direction des travaux à l'architecte Vincent Fay, restaura entièrement le château, l'aménagea avec le confort moderne, remit en état le parc, les charmilles et les parterres . Les façades et les toitures du château et ses deux pavillons d'entrée sur la cour d'honneur sont inscrits au titre des M.H. depuis le 2 mars 1970.","habitants":"Famille de Charles du Liscouet\r\n        \"","divers":"Lauresse  GPS : 48° 04' 23\" Nord, 0° 25' 43\" Est","gps":"48° 04' 23\" Nord, 0° 25' 43\" Est","images":["../../jctruffet.com/image/image_72/72_Lauresse_1.jpg","../../jctruffet.com/image/image_72/72_Lauresse_2.jpg"]},"Consult_chateau_formulairec741":{"id":"Consult_chateau_formulairec741","dept":"72","canton":"Château-du-Loir","commune":"Lavenay","nom":"Lavenay","type":"Château","periode":"XVI-XIX","histoire":"Trois châteaux à Lavenay , la Flotte, Chapelle-Gaugain  et Sainte-Croix.                                                                                                                           La FLOTTE, le château est implanté sur le coteau nord de la Vallée du Loir, au lieu dit Pont de Braye, près du confluent de la Braye et du Loir. Château du  XVIe siècle, restauré au XIXe siècle, dû à Jean Du Bellay qui abrita Marie de Hautefort, maîtresse de Louis XII, éloignée par Richelieu. Il a appartenu à la famille Du Bellay de 1400 à 1650. Une des deux tours de la façade nord flanquant la porte d'entrée, de style Renaissance, portant les armes de la famille Du Bellay, trois fleurs de lis, la chapelle qui lui fait face portant les armes de la Rochebousseau, aigle à deux têtes.                                                                                     A un kilomètre au nord ouest le château de la CHAPELLE-GAUGAIN La famille de Ronsard s'installe à la Chapelle-Gaugain dès le XVe siècle. Ecuyer d'écurie à la cour de Louis XI, Glivier de Ronsard préfère résider dans sa demeure de La Chapelle Gaugain. L'actuel château est construit au XVIe siècle par son descendant, Louis Ier, homme de confiance de François Ier. Le poète, Pierre de Ronsard, fils de Louis, ne l'habite guère préférant une autre demeure de la famille, le château de la Poissonnière à La Flèche.                                                                                           STE-CROIX  manoir du XVe siècle : siège de la chapellenie du même nom, vendu comme bien national à la révolution, il accueille au XIXe siècle une communauté des surs dEvron qui ouvrent une école pour filles dans un bâtiment annexe.","architecture":"La FLOTTE, il a été reconstruit à la Renaissance et fortement repris au XIXe siècle. Au Moyen-Age, c'était le siège dune seigneurie importante. Son domaine comprenait Sougé et Couture-sur-Loir. Il a appartenu à la famille Du Bellay de 1400 à 1650 et l'une des deux tours de la façade Nord porte les armes de la famille alors que l'autre porte l'aigle à deux têtes des Rochebousseau. Marie de Hautefort, fille de Renée du Bellay dame de la Flotte et de Charles de Hautefort, qui fut la maîtresse du roi Louis XIII et amie du poète Scarron, fut exilée au château. Le Château de la Flotte appartient actuellement au Comte et Comtesse Antoine Le Bègue de Germiny. Il n'est pas inscrit aux M.H.","habitants":"famille Du Bellay                                                                           Chapelle Gaugain; Glivier de Ronsard                                                La flotte; Charles de Hautefort\r\n        \"","divers":"Trois châteaux à Lavenay , la Flotte grav 3-4 -5, Chapelle-Gaugain grav 1-2  et Sainte-Croix grav 6.  La flotte                                   GPS : 47° 46' 19\" Nord, 0° 40' 38\" Est","gps":"47° 46' 19\" Nord, 0° 40' 38\" Est","images":["../../jctruffet.com/image/image_72/72_Lavenay_1.jpg","../../jctruffet.com/image/image_72/72_Lavenay_2.jpg","../../jctruffet.com/image/image_72/72_Lavenay_3.jpg","../../jctruffet.com/image/image_72/72_Lavenay_4.jpg","../../jctruffet.com/image/image_72/72_Lavenay_5.jpg","../../jctruffet.com/image/image_72/72_Lavenay_6.jpg"]},"Consult_chateau_formulaire1b9f":{"id":"Consult_chateau_formulaire1b9f","dept":"72","canton":"Le Lude","commune":"Dissé-sous-le-Lude","nom":"Lorrière","type":"Château","periode":"XV-XVII","histoire":"LORRIERE, il est alors la propriété d'un certain Aymar de Bueil qui le vend en 1489 à René du Mesnil qui vraisemblablement fait construire un nouveau logis avec une tourelle d'escalier demi-hors-oeuvre. Par mariage, le château passe à René de Rougé, gouverneur du Lude et à Marguerite Le Court de la Bellière. En 1675, Pierre II du Rougé et Avoye de Chérité vendent Lorière à Marie Viette, veuve de Pierre Monden. En 1835, Lorière échoue par alliance à Henri Bernard comte de la Frégeolière qui décide d'agrandir le manoir familial. En 1864-65, l'architecte Ernest Dainville propose plusieurs projets et réalise les transformations. Après la Première Guerre mondiale, le comte Renaud Bernard de la Frégeolière confie à l'architecte blésois A. Lafargue la modernisation des intérieurs. En même temps, l'architecte paysagiste Jules Vacherot remodèle les jardins situés au nord du logis dans un style historiciste.","architecture":"LORRIERE .Un logis de la fin du XVe siècle semble avoir été construit à côté ou dans le prolongement d'un vieux château dont il reste quelques vestiges dans les soubassements des terrasses et les pans de murs écorchés placés derrière. La reconstitution de l'histoire des bâtiments est difficile en l'absence de documents anciens. Il semble que le visiteur arrivait depuis la vieille route qui longeait la rive droite de la Marconne. La forme du parcellaire révélée par le premier cadastre rend compte d'un site déjà régularisé autour de bâtiments désordonnés de plan fermé. A la fin du XVe siècle, la construction du petit logis avec tourelle d'escalier extérieure présent sur le plan de 1812 paraît avoir été déterminante dans cet aménagement, l'ensemble de la nouvelle composition étant parallèle au tracé général de la rivière. A cette époque ou plutôt durant les guerres de religion, la terrasse sur laquelle est implantée la demeure est entourée de murs de fortification peu épais constitués de petits moellons. On peut imaginer deux petites tours carrées en forme de bastions aux angles nord-ouest et nord-est. A l'est, la fortification soutient la terrasse : une tourelle placée dans l'angle avec l'actuel portail d'entrée peut faire le pendant avec celle placée dans l'angle des communs , ancienne demeure Vers 1925, les dessins de Jules Vacherot furent réalisés dans une perspective perpendiculaire à l'axe de l'entrée de la cour et de la rivière. Les fortifications abattues au nord donnent de l'ampleur à l'espace recomposé pour mettre en valeur l'arrivée par l'allée qui longe la rive gauche de la rivière. Un court de tennis est aménagé avec une cabane. Les ifs taillés en topiaire peuvent abriter une salle de verdure.\r\nÉléments protégés MH : en totalité le corps de bâtiment agrandi par Dainville, la chapelle, la fuie ; les façades et les toitures des autres bâtiments tels qu'ils figurent sur le plan de 1848 annexé à l'arrêté ; le jardin et les murs de soutènement : inscription par arrêté du 3 décembre 2001,","habitants":"Famille de René du Mesnil\r\n        \"","divers":"GPS : 47° 35' 14,39\" Nord, 0° 8' 34,64\" Est","gps":"47° 35' 14,39\" Nord, 0° 8' 34,64\" Est","images":["../../jctruffet.com/image/image_72/72_Lorri%c3%a8re_1.jpg","../../jctruffet.com/image/image_72/72_Lorri%c3%a8re_2.jpg","../../jctruffet.com/image/image_72/72_Lorri%c3%a8re_3.jpg"]},"Consult_chateau_formulaire15e5":{"id":"Consult_chateau_formulaire15e5","dept":"72","canton":"Mamers","commune":"Louzes","nom":"Louzes","type":"Château","periode":"XVI","histoire":"Deux châteaux à Louzes dont celui de Louzes, de Tournerie et de la Gastine.                                                                                                                                   TOURNERIE, ce château, au nord-est du bourg fut construit au XVIe siècle. Henri IV y coucha plusieurs fois, lorsqu'il vint en 1589 pendant le siège d'Alençon dirigé par de Hertré. Vers 1592, par lettres patentes de juillet, Henri IV érigea la tere et seigneurie de la Tournerie en Châtellenie mouvante de Beaumont, en faveur de René de Saint-Denis, seigneur de Hertré, gouverneur d'Alençon, que le Roi fit lieutenant au bailliage d'Alençon et à qui il donna une portion de la forêt de Perseigne et l'abbaye du même nom. En 1632, Jean-Alexandre Sévin, conseiller au parlement, rend aveu de la terre et châtellenie de la Tournerie acquise de Hercule François, comte de Boiron, ensemble des fiefs et seigneuries de Louzes, Roullée, Saint Thomas et Saint Rémy de Plain, situés aux comté de Beaumont. En 1690 La Tournerie appartenait à Jean-Baptiste Jariel, conseiller à la cour des Aides.","architecture":"LOUZES, château de la Gastine : manoir constitué d'un bâtiment Renaissance (ayant encore une fenêtre à meneaux), d'un corps de logis 1900 (rabaissé dans les années 1950) et de la chapelle Notre-Dame-de-Pitié, datant du XIXe siècle. Le propriétaire en a fait descendre le clocher il y a quelques années.\r\nGASTINE   corps de logis à deux niveaux retour en équerre par deux corps de logis dans le même style.                                                                                                                            TOURNERIE, du XVIe siècle, corps de logis rectangulaire entre deux pavillons rectangulaires également à deux niveaux toits en croupes recouvert d'ardoise.","habitants":"Tournerie; famille de  Hercule François\r\n        \"","divers":"à Louzes dont celui de Louze grav-1, de Tournerie  grav-2-3  et de la Gastine grav 4-5.","gps":"","images":["../../jctruffet.com/image/image_72/72_Louzes_1.jpg","../../jctruffet.com/image/image_72/72_Louzes_2.jpg","../../jctruffet.com/image/image_72/72_Louzes_3.jpg","../../jctruffet.com/image/image_72/72_Louzes_4.jpg","../../jctruffet.com/image/image_72/72_Louzes_5.jpg"]},"Consult_chateau_formulaire3e35":{"id":"Consult_chateau_formulaire3e35","dept":"72","canton":"Loué","commune":"Loué","nom":"Loué","type":"Château","periode":"XIV-XV-XVII","histoire":"Deux châteaux à Loué, Coulennes et   L'Isle.                                             COULENNES, . Le château de Coulennes est bâti dans le fond de la vallée de la Vègre, date du XVe siècle. Héritiers de Marthe Poussin, dame de Juigné et de Coulennes en 1329, les Le Clerc possédèrent la seigneurie de Coulennes durant 4 siècles.","architecture":"L'ISLE A deux kilométres au sud-Est, le château de l'Isle sous Brûlon a été construit à la fin du XIVe ou au début du XVe siècle, n'est connu que par une rémission de 1385, un compte de fabrique de 1426 et de rares aveux donnant une description des lieux en ruine au XVe siècle. La rémission fut donnée par Charles VI en faveur de Guillaume de Mathefelon, seigneur de l'Isle, qui avait servi le Roi de France et ses prédécesseurs, en la compagnie du sieur de Craon et lieutenant de Charles V en Anjou, Touraine et Maine. Vers 1420, c'est la grande époque du château mais également celle de l'invasion anglaise et de l'occupation de ses murs par les ennemis d'alors, de faux français, qui y tenaient garnison. Le château fut attribué à Lancelot de L'Isle, chevalier, puis quelques autres seigneurs suivront, ensuite les Daillon apparaîtront, mais le château était ruiné depuis le départ des Anglais.                                                                              COULENNES, il est composé d'un long corps de logis seulement élevé d'un rez-de-chaussée sur le côté d'un terre-plein quadrangulaire entouré de larges douves. Château de fin XVIIe siècle avec un toit présentant des oculi ornés dépis dodécaèdres, une chapelle érigée en 1647 dotée dune porte dentrée encadrée par deux pilastres avec chapiteaux de feuilles dacanthe et des culots, supports fixés dans le mur de chaque côté de lautel représentant une coquille renversée ou un aigle aux ailes déployées, deux échauguettes du XVIe siècle, des communs, un porche, un puits du Moyen-Age surmonté dune archère implanté dans la cuisine médiévale du château. Lentrée conserve un aspect médiéval et défensif avec haut mur, douves et archères. Combles éclairés par des oeils de Boeuf. Éléments protégés MH : les façades et les toitures du château et du pavillon carré ; la chapelle en totalité ; les douves avec leurs murs et leurs tourelles d'angle : inscription par arrêté du 12 septembre 1977.","habitants":"Coulaines ; famille de Marthe Poussin                                                   L'isle ; de Guillaume de Mathefelon\r\n        \"","divers":"Coulennes  GPS : 48° 00' 35\" Nord et 0° 07' 47\" Ouest","gps":"48° 00' 35\" Nord et 0° 07' 47\" Ouest","images":["../../jctruffet.com/image/image_72/72_Lou%c3%a9_1.jpg","../../jctruffet.com/image/image_72/72_Lou%c3%a9_2.jpg","../../jctruffet.com/image/image_72/72_Lou%c3%a9_3.jpg","../../jctruffet.com/image/image_72/72_Lou%c3%a9_4.jpg"]},"Consult_chateau_formulaire6387":{"id":"Consult_chateau_formulaire6387","dept":"72","canton":"La Ferté-Bernard","commune":"Le Luart","nom":"Luart","type":"Château","periode":"XIX","histoire":"LE-LUART, le château actuel a été construit vers 1845, par l'architecte Delarue et Eugène Landron le maître de l'oeuvre. La famille est sur ces terres, depuis 1235, confie Roland du Luart. Le nouveau château du Luart possède aussi une orangerie. Le château du Luart est du XIXe siècle. Il est inscrit aux M.H. depuis le 24/04/1989, avec son orangerie et sa chapelle.    Aménagé en centre équestre","architecture":"LE-LUART, construit en pierre de taille, c'est un vaste rectangle avec de hautes tours rondes aux toits aigus. Escalier monumental donnant accès à l'avant-corps de la façade principale. Corps de bâtiment cerné de mâchicoulis simulés et percé de fenêtres encadrées de pilastres, le premier étage est précédé d'un balcon, l'attique supportant un toit à terrasse faîtière. Pigeonnier à redents et orangerie de 1866-1869, couverte d'un toit en croupe et ouvrant sur l'extérieur par sept baies couvertes d'un arc surbaissé. Le pavillon d'entrée est de style néo-gothique. Parc entourant un bassin circulaire. Près de l'étang, chapelle et vestiges de l'ancien château. Éléments protégés MH : les façades et les toitures du château ; les communs ; l'orangerie ; la chapelle : inscription par arrêté du 24 avril 1989.","habitants":"Roland du Luart\r\n        \"","divers":"GPS : 48° 03' 56,02\" Nord et 0° 34' 40,01 Est","gps":"48° 03' 56,02\" Nord et 0° 34' 40,01 Est","images":["../../jctruffet.com/image/image_72/72_Luart_1.jpg","../../jctruffet.com/image/image_72/72_Luart_2.jpg","../../jctruffet.com/image/image_72/72_Luart_3.jpg"]},"Consult_chateau_formulaire8c6a":{"id":"Consult_chateau_formulaire8c6a","dept":"72","canton":"Le Lude","commune":"Le Lude","nom":"Lude","type":"Forteresse","periode":"XV-XVIII","histoire":"LE LUDE, Gilles de Rais, le légendaire Barbe Bleue, livre un combat victorieux avant de rejoindre Jeanne d'Arc à Orléans. A la fin du XVe siècle, le chambellan de Louis XI Jehan de Daillon, prend possession du domaine du Lude, il transforme la forteresse en une élégante demeure de plaisance en style gothique et Louis XVI  que ses descendants embelliront durant deux siècles.  Le château reçoit alors des hôtes illustres : Henri IV, Louis XIII et la marquise de Sévigné. en 1675 Henri de Daillon  fut créé duc du Lude. Passa à la duchesse Eléonore de Bouillé, à leur mort le duché passa à un neveu au duc de Roquelaure et par alliance au duc de Rohan-Chabot  qui vendit le Lude en 1751 à Joseph-Julien  Du Velaër, chef du conseil de la compagnie des Indes. le légua à sa nièce, la marquise de la Vieuville, dont la fille épousa le marquis de Talhouët édifie l'aile de style Louis XVI, elle défend le château pendant la Révolution. Ses descendants, les Talhouët Roy, entreprendront tout au long du XIXe siècle de vastes travaux de restauration. Depuis 250 ans dans la même famille, le château du Lude est la propriété du comte et de la comtesse Louis-Jean de Nicolay aujourd'hui,  la comtesse de Nicolay née S.A.I. et R.  la princesse Maria-Pia  d'Orléans-Bragance en est aujourd'hui propriétaire,   ceux-ci poursuivent la tradition de restauration et d'embellissement.","architecture":"LE LUDE, la forteresse d'origine est édifiée du Xe au XVe siècle, sur les rives du Loir, afin de défendre l'Anjou contre les incursions des Normands, puis des Anglais pendant la guerre de Cent Ans. La construction du château du Lude date du XVIIIe siècle, il est de style renaissance. On leur doit la belle façade Renaissance de style italien et la cour d'honneur aux plaques de marbre.ce superbe château surplombe la rive droite du Loir. Le Parc et le Jardin d'agrément du château du Lude, datent du XIXe siècle. Ils sont l'uvre de l'architecte paysagiste André Édouard.  Le château du Lude est donc fascinant à la fois par son style architectural unique et par la diversité de ce quil y a à y voir.  Éléments protégés MH :  la façade François Ier et l'oratoire : classement par arrêté du 27 février 1928. Le château, ainsi que son système fortifié d'éperon et de douves, les maçonneries et balustrades des terrasses et les murs de clôture du parc. La richesse et la diversité des styles qui caractérisent le château se retrouvent dans la décoration intérieure et son mobilier la totalité des communs (dont les deux pavillons d'entrée ou porteries) : inscription par arrêté du 28 octobre 1992. Le tympan hydraulique avec sa roue motrice dans son abri et le canal d'irrigation correspondant : inscription par arrêté du 7 février 2012.","habitants":"Jehan de Daillon et les les Talhouët Roy\r\n        \"","divers":"Le Lude GPS : 47° 38' 51\" Nord et 0° 09' \"32\" Est","gps":"47° 38' 51\" Nord et 0° 09' \"32\" Est","images":["../../jctruffet.com/image/image_72/72_Lude_1.jpg","../../jctruffet.com/image/image_72/72_Lude_2.jpg","../../jctruffet.com/image/image_72/72_Lude_3.jpg","../../jctruffet.com/image/image_72/72_Lude_4.jpg","../../jctruffet.com/image/image_72/72_Lude_5.jpg"]},"Consult_chateau_formulaireac3a":{"id":"Consult_chateau_formulaireac3a","dept":"72","canton":"La Suze-sur-Sarthe","commune":"Malicorne sur sarthe","nom":"Malicorne","type":"Château","periode":"XVIII-XIX","histoire":"MALICORNE, construit au XIe siècle par la famille Gaudin  En 1368, le château de Malicorne tombe aux mains de Robert Knolles, puis est repris aux Anglais, en 1425, par Ambroise de Loré.  passe à la famille de Chaource en 1609. Jean de Chaource dernier de ce nom lègue Malicorne à ses parents  les Beaumanoir-Lavardin, cinq ans plus tard  Jean de Beaumanoir-Lavardin, maréchal de France  reçoit au château Louis XIII âgée de treize ans et la reine mère  Marie de Médicis. Au XVIIe siècle Henri-Charles de Beaumanoir marquis de Lavardin acceuille à plusieurs reprises  Madame de Sévigné. Sa fille Marie-Charlotte de Beaumanoir épouse en 1694 le marquis de la Châtre-Nançay lui apportant le domaine en dot, et le garderont jusqu'en 1780 que leur successeur, le comte de Choiseul-Praslin qui fait détruire une grande partie de l'édifice. En 1799 Quartier du Général des chouans de la région.  Au XVIIe siècle,  le château de Malicorne deviendra la propriété des Beaumanoir-Lavardin qui en font le centre d'une vie sociale brillante. Au début du XIXe siècle monsieur Cherouvrier, propriétaire fait reconstruire un nouvel édifice. Conservant une tour isolée, deux tours d'angles qu'il relie par un corps de Logis de facture classique couvert d'un comble brisé avec une aile en équerre. En 1896   sera racheté  par M. Guiller-Perron et son épouse  née Caroline-Philippine  Oudinot, fille d'un second mariage du Maréchal d'Empire leurs neveu hérite  passe par héritage aux marquis de Vessins. toujours  dans cette famille.","architecture":"MALICORNE, fondée au XIIe siècle, l'ancienne forteresse de Malicorne, avait pour rôle de défendre les portes du Maine. En 1368, le château de Malicorne tombe aux mains de Robert Knolles, puis est repris aux Anglais, en 1425, par Ambroise de Loré. Au XVIIe siècle A partir de la Renaissance,  devient un lieu de rendez-vous prisé par les plus grands du Royaume. Détruit peu après la Révolution pour des problèmes dentretien, le château actuel est rebâti sur des principes et des proportions radicalement différents au début du XIXe siècle, à côté des vestiges précédents que réutilise en partie un rendez-vous de chasse. Edifié selon un plan en T (façade encadrée de deux tours rondes donnant sur la Sarthe, branche perpendiculaire) le château présente une architecture très proche de lesprit du XVIIIe siècle où sont privilégiées les ordonnances régulières peu moulurées à grandes fenêtres et sur laile en équerre, quelques motifs comme des frontons courbes brisés par des lucarnes à linteaux courbes et consoles. Marbre du sol et de l'escalier provenant des carrières de Sablé sur Sarthe et Solesmes. Le château de Malicorne est de style néo-classique, actuel fut bâti, à la fin du XVIIIe siècle, sur les ruines de l'ancienne bâtisse médiévale.  Éléments protégés MH : les façades et les toitures du château et du pavillon d'entrée, l'ensemble des pièces du rez-de-chaussée du château,  inscription par arrêté du 22 avril 1986.","habitants":"famille Gaudin et Jean de Beaumanoir-Lavardin   Madame de Sévigné.\r\n        \"","divers":"GPS : 47° 48' 48\" Nord et 0° 05' 26\" Est","gps":"47° 48' 48\" Nord et 0° 05' 26\" Est","images":["../../jctruffet.com/image/image_72/72_Malicorne_1.jpg","../../jctruffet.com/image/image_72/72_Malicorne_2.jpg","../../jctruffet.com/image/image_72/72_Malicorne_3.jpg","../../jctruffet.com/image/image_72/72_Malicorne_4.jpg"]},"Consult_chateau_formulaire807c":{"id":"Consult_chateau_formulaire807c","dept":"72","canton":"Mamers","commune":"Mamers","nom":"Mamers","type":"Château","periode":"XVII-XIX","histoire":"A Mamers plusieurs châteaux dont la plupart sont  transformés en chambre d'hôtes je n'ai malheureusement pas d'historique.                                                                                             BELMAR,  Cétait en 1998, je rencontrais madame De Beaumont (comtesse de son ancien état). cétait une de mes fidèles clientes. Celle-ci fort sympathique était âgée de 92 ans. Dans la conversationLe but est de produire et de créer des vins à forte densité aromatique, très élaboré, et dans une finalité essentiellement hautement qualitative et rare. Comment  Par lachat il est le vignoble de Saint-Longis, recréé par Sidonie Grasset et Grégory Russel.                                                                                                             COUR du BOIS chambres d'hôtes ,MADRIGAL ,NAUVAY;  JULIE  tous chambres d'hôtes.                                                                                            BOIS HEBERT à  St-Longis était la propriéte de Andéol Seurat  de la Boulaye, chambres d'hôtes également.","architecture":"Mamers et saint-LongisTous les châteaux sont du XVIII au XVe siècle.                                                                            BELMAR, manoir dont le corps de logis en équerre par les dépendances à deux niveaux, prononcé sur le corps de logis principale par une série de lucarnes à fronton triangulaire sur comble à toit brisés, l'ensemble recouvert d'Ardoises.                                                                                                                         COUR du BOIS, de plan en U à deux niveaux corps de logis rectangulaire entre deux pavillons accolées de prolongement à deux niveaux également toit en croupe pour l'ensemble recouvert d'ardoises.                                                                                                                    JULIE construction d'un niveau sur soubassement en équerre , avec lucarnes sur combles toits en croupes recouvert d'ardoises.                                                            MADRIGAL, jolie petit manoir de deux niveaux sur soubassement, corps de logis à trois travées  avec lucarrnes à  oeil de boeuf, l'édifice est flanquée sur les flancs d'une tour carrée  à toit trés pointus et à l'opposée d'un pavillon carré de  niveau inférieure ainsi que le côté parc deux pavillons carrées.                                                                                                                                     NAUVAY, château  de style Napoléon III trois niveaux sur soubassement lucarnes à frontons arrondie sur combles brisés  deux pavillons accolées à l'édifice un carré sur l'angle droit l'autre sur angle gauche façades de forme polygonales.","habitants":"Belmar; madame De Beaumont                                                Bois-Hebert ; Andéol Seurat  de la Boulaye  \r\n        \r\n        \"","divers":"Château de Mamers; le Belmar grav 1, le Cour du bois grav 2-3-4 Julien grav-5, le Madrigal grav 6-7-8, et  Nauvay grav 9.                                                                                                                Gps 48° 20' 58\" nord, 0° 22' 10\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_Mamers_1.jpg","../../jctruffet.com/image/image_72/72_Mamers_2.jpg","../../jctruffet.com/image/image_72/72_Mamers_3.jpg","../../jctruffet.com/image/image_72/72_Mamers_4.jpg","../../jctruffet.com/image/image_72/72_Mamers_5.jpg","../../jctruffet.com/image/image_72/72_Mamers_6.jpg","../../jctruffet.com/image/image_72/72_Mamers_7.jpg","../../jctruffet.com/image/image_72/72_Mamers_8.jpg","../../jctruffet.com/image/image_72/72_Mamers_9.jpg"]},"Consult_chateau_formulaireab26":{"id":"Consult_chateau_formulaireab26","dept":"72","canton":"Le Mans","commune":"Le Mans","nom":"Mans","type":"Château","periode":"XII-XV-XVIII","histoire":"Patrimoine du Mans                                                                                               LE-MANS Le château fut bâti par Guillaume le Conquérant. C'est en 1063, juste après sa conquête, que Guillaume Le Conquérant décide de construire en deux temps, un édifice capable non seulement de contenir les Manceaux, mais aussi de protéger l'entrée nord de la ville, extrêmement vulnérable. D'abord, et dans un premier temps parce qu'il n'a guère le temps de s'attarder dans la ville, il fait bâtir une haute tour dite tour Orbrindelle. Cette tour, aussi dite Grosse tour s'appuyait sur la muraille romaine nord, devenue décrépite avec le temps. Elle fut bâtie selon le modèle normand commun. Elle jouera un rôle important dans les guerres qui surviendront dans et autour de  la cité tout au long du Moyen Âge. La tour est disposée à l'est de la cathédrale et se constitue même d'un grand camp retranché. Ce camp, dit camp retranché du Mont Barbet, ne subsistera que jusqu'en 1138. Le château sera ensuite construit à partir de cette tour primaire. La grosse fut conservée en tant que prison, et les prisonniers traversaient souvent la ville pour se rendre jusqu'au palais comtal. Le système de fortification du château et notamment l'achèvement de la porte défensive se situe aux alentours de 1425, au moment du siège de la ville. En 1475, la grosse tour ne possède pas moins de trois ponts levis pour la protéger.","architecture":"LE MANS, Jusqu'au XVIe siècle, les fortifications de l'évêché (situé au sud de la Cathédrale) et du château seront très bien entretenues, ce qui sera une dépense faramineuse de la part du chapitre du Mans. En février 1617, le comte d'Auvergne s'en va lui-même au Mans pour ordonner la démolition du château. Les matériaux déblayés sont vendus au profit de la ville ou bien servent à rebâtir des lieux sa
