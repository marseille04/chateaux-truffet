gis tel qu'il se présente aujourd'hui est une demeure du début du XVIIe siècle à la façade ordonnancée. Les traces d'une construction plus anciennes apparaissent sous l'enduit  Le dit Lieu consiste dans une maison de maître composée au rez-de-chaussée de trois chambres de plein pied à cheminée et une cuisine vers le milieu et un vestibule dans lequel est un escalier en bois qui conduit dans quatre chambres et les greniers qui règnent sur le tout; en fasse est une petite terrasse, des latrines, et au perron pour descendre dans la basse cour, à l'extrémité de laquelle sont deux tourelles une à chaque coin; et dans la basse cour est une chapelle attenante qui ne forme qu'un seul bâtiment. Les espaces divisés et hiérarchisés qui appartenaient à la composition régulière classique ont été ouverts au XIXe siècle.","habitants":"Famille de Broc \r\n        \r\n        \"","divers":"Dissé sous le Lude le château  de la Cour de Broc grav-4,  de Lorrière grav 1-2,  du Mortier grav_3","gps":"","images":["../../jctruffet.com/image/image_72/72_Cour_de_Broc_1.jpg","../../jctruffet.com/image/image_72/72_Cour_de_Broc_2.jpg","../../jctruffet.com/image/image_72/72_Cour_de_Broc_3.jpg","../../jctruffet.com/image/image_72/72_Cour_de_Broc_4.jpg"]},"Consult_chateau_formulaire4cb0":{"id":"Consult_chateau_formulaire4cb0","dept":"72","canton":"Mamers","commune":"Saint-Rémy des Monts,","nom":"Cour_du_Bois","type":"Château","periode":"XVI","histoire":"COUR DU BOIS, cette demeure succède à un château primitif du XVIe siècle, dont il reste quelques traces. La date de 1570 se trouve ainsi gravée sur l'une des vieilles lucarnes du grenier.","architecture":"COUR DU BOIS,  l'aménagement entre 1828 et 1830 d'un pavillon neuf situé sur la gauche du vieux bâtiment entraîne plusieurs changements rendus nécessaires notamment sur le côté de la façade, comme le laisse penser la transposition de plusieurs pierres des fondations. Quelques années plus tard, en 1856, le château est entièrement restauré par le baron de Reizet et depuis cette date l'édifice n'a pas subi de transformation notable et a conservé une partie de son mobilier. La Cour du Bois ne semble pas être une très ancienne seigneurie. Il est probable qu'elle soit originellement la cour de justice des seigneuries de Contres en Vairais, de Bois Pezart, dont elle fait primitivement partie.","habitants":"baron de Reizet \r\n        \"","divers":"château de la Cour du Bois à St Rémy des Monts","gps":"","images":["../../jctruffet.com/image/image_72/72_Cour_du_Bois_1.jpg","../../jctruffet.com/image/image_72/72_Cour_du_Bois_2.jpg","../../jctruffet.com/image/image_72/72_Cour_du_Bois_3.jpg"]},"Consult_chateau_formulaire3ede":{"id":"Consult_chateau_formulaire3ede","dept":"72","canton":"La Fléche","commune":"Courcelles-la-Forêt","nom":"Courcelles_Forèt","type":"Château","periode":"XV-XVII","histoire":"Deux châteaux à Courcelles, Vadré  et Baudour.                                               VADRE, la famille de Chamillard, originaire de Normandie, ne commença à être connue dans le Maine que vers 1709. M. de Chamillard, marquis de la Suze, paire de France, fait construire le château actuel, attenant à la forêt de Vadré, appelée aussi forêt de Courcelles. L'édifice est remarquable par l'étendue de ses bâtiments, les sculptures du dôme de l'escalier et du fronton du côté des jardins. Dans les jardins et son parc, distribué à l'anglaise, on trouve plusieurs fabriques et pavillons. L'édifice se compose d'un corps central à deux étages, avec quatre tourelles flanquant les angles, et deux pavillons latéraux entre lesquels s'étire un portique. En 1860, le fils d'Alfred de la Suze qui vient d'hériter de la propriété, fait démolir partiellement la façade sud et la reconstruit avec des galeries superposées, entre deux tours plus grosses et autour d'un pavillon central.","architecture":"BAUDOUR La construction du manoir de Baudour date du XVe siècle.                                                                                 VADRE, est un château dont la construction  date du XVIIe siècle, ainsi que son parc et ses dépendances. Le château de Vadré est privé, fermé au Public.","habitants":"M. de Chamillard, marquis de la Suze\r\n        \"","divers":"Deux châteaux à Courcelles vieux château de Courcelle grav-1, Vadré grav 2-3 et Baudour Grav -4.  Baudour                GPS : 47° 46' 52,45\" Nord, 0° 0' 54,58\" Ouest                                   Vadré  GPS : 47° 47' 1,43\" Nord, 0° 0' 7,53\" Est","gps":"47° 46' 52,45\" Nord, 0° 0' 54,58\" Ouest","images":["../../jctruffet.com/image/image_72/72_Courcelles_For%c3%a8t_1.jpg","../../jctruffet.com/image/image_72/72_Courcelles_For%c3%a8t_2.jpg","../../jctruffet.com/image/image_72/72_Courcelles_For%c3%a8t_3.jpg","../../jctruffet.com/image/image_72/72_Courcelles_For%c3%a8t_4.jpg"]},"Consult_chateau_formulairede39":{"id":"Consult_chateau_formulairede39","dept":"72","canton":"Bonnétable","commune":"Courcival","nom":"Courcival","type":"Château","periode":"XV-XVII","histoire":"COURCIVAL, la famille de Baigneux est présente dès la première moitié du XVe siècle à Courcival, relevant au XVIe siècle de la baronnie du Saosnois. Un premier logis seigneurial est mentionné en 1521, jouxtant le cimetière paroissial.  Le château actuel, construit au sud du site ancien, est peut-être édifié pour Pierre de Baigneux entre la fin du XVIe siècle et 1629, date à laquelle est partiellement décrite la maison seigneuriale composée d'une grande salle, deux chambres basses dont l'une sur la cuisine. Le château est achevé pour René de Baigneux, fils de Pierre. De nombreux éléments de chambranles chanfreinés provenant probablement du château précédent sont réemployés dans les encadrements de baies de l'aile ouest. Les acquisitions de terres que René de Baigneux pratique au même moment peuvent correspondre à l'aménagement des dehors : si les jardins et bosquets ne sont mentionnés qu'en 1730, en 1835 le plan cadastral montre le lien entre le parc et le château, placé à l'intersection des deux avenues perpendiculaires structurant le parc, l'avenue nord-sud formant l'axe de composition du château. De la distribution d'origine du logis subsistent la cuisine située dans l'étage de soubassement de l'aile ouest, et probablement l'escalier rejeté à gauche du vestibule central. Un remaniement intervient avant 1755, qui fait disparaître la chapelle et touche la distribution du logis : le salon mentionné correspond au salon du rez-de-chaussée du corps central. A la campagne de travaux du dernier tiers du XVIIIe siècle se rattachent probablement les extensions vers le nord des ailes en retour et la surélévation de l'aile Est.","architecture":"COURCIVAL, suite- d'après la description de 1798, on peut situer à l'ouest l'appartement de Jacques de Baigneux, à l'est celui de sa femme, muni d'un cabinet de bain qui est certainement celui conservé au rez-de-chaussée de l'aile Est. La tradition orale situe à l'étage de cette aile est une chapelle, du fait de l'existence d'une voûte en plâtre sur lattis masquée par les plafonds des chambres, mais cette voûte peut aussi correspondre au théâtre que la description de 1798 semble situer à cet étage. Enfin, le nom de jardin neuf donné sur le plan cadastral de 1835 au jardin bordant l'est du château pourrait signaler une création ou reprise contemporaine des travaux de l'aile Est. Les travaux menés par Ponce-Thimoléon Stellaye de Baigneux entre 1830 et 1871 affectent l'ensemble du château. Pour le logis, il s'agit de la reprise des élévations de l'aile ouest qui a effacé les deux campagnes de construction de ce corps de logis.  Le corps central est restauré, comme l'indiquent les chambranles à crossettes des portes d'accès au vestibule et les armoiries des lucarnes de la travée centrale. Cette restauration, dont l'ampleur reste à préciser, porte également sur la distribution du logis : pour le corps central, elle concerne au moins l'escalier dont le décor est également refait (présence des armoiries des Baigneux Vanssay). Dans l'aile est un nouvel appartement est créé au rez-de-chaussée, comprenant salle à manger et salon mais en conservant le cabinet de bain, l'étage est replafonné et divisé en chambres. Un calorifère assurant le chauffage de l'ensemble est installé au rez-de-chaussée de la tour ouest du logis. A l'extérieur, l'escalier d'accès au logis et le mur de soutènement de la terrasse sont reconstruits. La basse-cour est également restructurée, suite à l'incendie du bâtiment ouest.","habitants":"famille de Baigneux\r\n        \"","divers":"Château de Courcival                                                                    GPS : 48° 13' 36,08\" Nord et 0° 23' 42,07\" Est","gps":"48° 13' 36,08\" Nord et 0° 23' 42,07\" Est","images":["../../jctruffet.com/image/image_72/72_Courcival_1.jpg","../../jctruffet.com/image/image_72/72_Courcival_2.jpg","../../jctruffet.com/image/image_72/72_Courcival_3.jpg","../../jctruffet.com/image/image_72/72_Courcival_4.jpg","../../jctruffet.com/image/image_72/72_Courcival_5.jpg"]},"Consult_chateau_formulaire0307":{"id":"Consult_chateau_formulaire0307","dept":"72","canton":"Sillé-le-Guillaume","commune":"Rouez en Champagne","nom":"Courmenant","type":"Château","periode":"XI-XV-XIX","histoire":"COURMENANT, à la fin du VIIIe siècle, les Normands et Bretons menaçaient le pays du Maine. Dès cette époque, Roland (preux), neveu de Charlemagne, qui devait périr à la bataille de Roncevaux, était commis à la garde de la frontière ; il eut pour successeur son gendre Eginard Wido ou Guido. Charles le Chauve renouvela les prescriptions de Charlemagne et lors de son séjour au Mans, vers 867, il ordonna la construction du donjon de Courmenant qui, par sa situation, au milieu dun groupe de chemins et sur le bord dun marais, formant un obstacle du côté de lOuest, répondait aux conditions du programme. Le château de Cournemant n'est pas inscrit ni classé aux M.H.","architecture":"COURMENANT, le début de la construction du donjon date du 867. La construction du château de Courmenant s'est faite en 5 époques : aux IXe, XIe, XIVe, XVe et XIXe siècles. Le Château se dresse sur le versant Ouest dune côte ravinée, au bas de laquelle roule la petite rivière de Vègre, qui arrose de vastes prairies, jadis occupées par un marais, dont la profondeur dépassait 2 mètres. Ce marais qui sétendait au Nord et au Nord-Ouest, entre les rochers, se rétrécissait au Sud, au gué des Aubiers, où un barrage fut créé. Il suffisait de faire gonfler les eaux, afin de rendre la forteresse inabordable, de ce côté. Sur les 3 autres faces, le Donjon était entouré de fossés secs, profonds de 6 à 7 mètres.","habitants":"Seigneur local\r\n        \"","divers":"GPS : 48° 08' 33\" Nord et 0° 08' 32\" Ouest","gps":"48° 08' 33\" Nord et 0° 08' 32\" Ouest","images":["../../jctruffet.com/image/image_72/72_Courmenant_1.jpg","../../jctruffet.com/image/image_72/72_Courmenant_2.jpg","../../jctruffet.com/image/image_72/72_Courmenant_3.jpg","../../jctruffet.com/image/image_72/72_Courmenant_4.jpg"]},"Consult_chateau_formulaire5fd7":{"id":"Consult_chateau_formulaire5fd7","dept":"72","canton":"Saint-Calais","commune":"Saint-Jean-des-Echelles","nom":"Courtangis","type":"Château","periode":"XV-","histoire":"COURTANGIS, au XVe siècle apparaît la famille de Saint-Père, de Tours et du Mans; des aveux de 1480 et 1484 nous montrent Jean de Saint-Père, seigneur de Courtangis. Qui Passe au XVIIe siècle aux d'Avaugour de Bretagne; Anne, dame de Courtangis (1676-1720) vend sa terre en 1719, à Jean René de Poisy. Courtangis fut revendu à M. Franchet, bisaïeul maternel du colonel Gasselin, l'un des derniers propriétaires dans l'entre-deux-guerres de notre vieux manoir et de sa terre.","architecture":"COURTANGIS, très proche du bourg de Courgenard, est l'un des plus jolis manoirs de la région sud de La Ferté-Bernard, avec sa haute façade de la fin du Moyen-Age dressée au-dessus de vieux communs à toits de tuile, d'une pièce d'eau charmante, de jardins verts et se détachant sur un fond de bois. Dès le début du XIIIe siècle, le Chapitre de la cathédrale du Mans aliène cette terre entre les mains de la famille Ahene.","habitants":"Famille de Saint-Père\r\n        \"","divers":"Château de Courtangis","gps":"","images":["../../jctruffet.com/image/image_72/72_Courtangis_1.jpg","../../jctruffet.com/image/image_72/72_Courtangis_2.jpg"]},"Consult_chateau_formulaire3b18":{"id":"Consult_chateau_formulaire3b18","dept":"72","canton":"Saint-Calais","commune":"Bessé-sur-Braye","nom":"Courtanvaux","type":"Château","periode":"XV-XVI-XVII","histoire":"Deux châteaux à Bessé sur Braye dont Courtanvaux et Boelle.                                                                            COURTANVAUX, date de 1455 acquisition et construction  du château  par Jacque de Berziau qui décède en 1518 son épouse Françoise de Berziau en hérite et épouse Antoine de Souvré : Gilles de Souvré gouverneur du dauphin le futur Louis XIII, maréchal de France en 1615. Anne de Souvré  fille unique de Gilles de Souvré épouse Michel le Tellier marquis de Louvois. ministre de Louis XIV cet famille  le conserveront  jusqu'en 1781, date  de mariage de Louise le Tellier de Montmirail avec Elisabeth-Pierre de Montesquiou-Fezenac le nouveau châtelain. Après la mort du comte de Montesquiou en 1834 et celle de la Comtesse l'année suivante, Courtanvaux  passe à leur fils Anatole, ce dernier officier de Napoléon qui l'accompagna à l'ile d'Elbe, à l'extinction du dernier de la descendance en 1964. le château passe dans la branche  ainée de la famille de Montesquiou qui le possède toujours.                                                                                                              BOELLE, seigneurie de paroisses, familles de Bessé, puis de Vendosmoys, rattachée à la seigneurie de Courtanvaux (1586) par Gilles de Souvré, maréchal de France, marquis de Courtanvaux.\r\nCentre industriel dès le XVIIIe cotonnades en 1736 et moulin à papier en 1824  et autres; château de la Massuère, des XVIIe et XIXe siècles.   Manoir de la Gavolerie, ancien couvent.\r\nChâteau de Courchet pas d'infos pour ces derniers.","architecture":"COURTANVAUX, c'est un ancien chateau-fort, de style Renaissance, de style médiéval et Renaissance est édifié  au XVe siècle par les Berziau,     Important ensemble Renaissance italienne avec des constructions des XVe XVIe et XVIIe siècles, des transformations ayant été effectuées au XIXe siècle, le château de Courtanvaux fut restauré peu après la Révolution par le comte de Montesquiou ;  Il s'agit d'une des plus importantes constructions gothiques de France qui recèle de nombreuses particularités surprenantes. C'est par cet édifice, mélange de grâce et de prestance que vous pénètrerez dans un domaine enchanteur et découvrirez la façade monumentale du grand château. Le parc à l'anglaise fait face au grand château alors que la cour intérieure abrite un élégant jardin à la française. L'ensemble du parc est accessible gratuitement toute l'année. La poterne d'entrée d'époque Renaissance est inscrit aux M.H. depuis 1948. la façade à trois niveaux est percée de fenêtres à meneaux. Sa cour intérieure est accessible par une porte d'entrée Renaissance, flanquée de deux tourelles rondes, sculptées avec arabesques et entrelacs que surmontent des dômes à lanternons. Tourelle à pans avec des chaînages d'angle en calcaire et chapelle castrale dédiée à Notre Dame de Lorette dotée d'un beau portail néo-gothique. Poterne et colombier du XVIe siècle. Portail aux lions en calcaire et fer forgé datant de 1874. Propriété de la commune de Bessé-sur-Braye depuis 1978.","habitants":"Courtanvaux; Famille de Jacque de Berziau  et le comte de Montesquiou                                                                               Boelle; famille de Bessé,\r\n        \"","divers":"Deux châteaux à Bessé sur Braye, Boelle grav-8.  Courtanvaux  grav 1-à 7.                                                                           Courtanvaux GPS : 47° 48' 55,03\" Nord, 0° 44' 51,92\" Est                       Néarby  GPS : 47° 50' 02\" Nord et 0° 44' 58\" Est","gps":"47° 48' 55,03\" Nord, 0° 44' 51,92\" Est","images":["../../jctruffet.com/image/image_72/72_Courtanvaux_1.jpg","../../jctruffet.com/image/image_72/72_Courtanvaux_2.jpg","../../jctruffet.com/image/image_72/72_Courtanvaux_3.jpg","../../jctruffet.com/image/image_72/72_Courtanvaux_4.jpg","../../jctruffet.com/image/image_72/72_Courtanvaux_5.jpg","../../jctruffet.com/image/image_72/72_Courtanvaux_6.jpg","../../jctruffet.com/image/image_72/72_Courtanvaux_7.jpg","../../jctruffet.com/image/image_72/72_Courtanvaux_8.jpg"]},"Consult_chateau_formulairebc6f":{"id":"Consult_chateau_formulairebc6f","dept":"72","canton":"Mamers","commune":"Saint-Rigomer des Bois","nom":"Courtilloles","type":"Château","periode":"XVI","histoire":"COURTILLOLES, a été édifié sur les ruines dun ancien château « haut-justicier ». En effet, la seigneurie de paroisse était annexée au château de Courtilloles auquel était adjoint un fief ayant haute, moyenne et basse justice, relevant de la baronnie du Saosnois. au XIe siècle  de la seigneurie de le Groux, par Messire Gilles Le Groux, puis successivement par Guillaume Le Prieur,  en 1453 la famille de Tucé, par alliance échoit en 1529 à  la famille de Bertrand de Karadreux, Jacques de Karadeux dernier du nom le lègue à son épouse, Margueritte de Bouillé qui convole en 1595 avec Martin du Hardas avant dêtre adjugée par décret à Monsieur Pierre Chausson  sieur des Orgeries  qui l'achète en 1717. Son fils, président au Présidial dAlençon, fit construire le nouvel édifice, sous la direction de larchitecte Manceau Cochard  fit raser les ruines du château. Précédé dune large esplanade, limitée par danciennes douves, dominant la Vallée de la Sarthe.  Le château  jouit dun panorama exceptionnel sur la forêt dEcouves et la plaine dAlençon. Inscrit aux M.H.en 1964, racheté en 1994.","architecture":"COURTILLOLES, le portail d'entrée en fer forgé date du XVIIIe siècle. L'aile ouest est construite en 1865. Le château  jouit dun panorama exceptionnel sur la forêt dEcouves et la plaine dAlençon, le château de Courtilloles et ses dépendances ont fait lobjet d'une vaste campagne de restauration, grâce au château construit, dans le style Louis XVI, au XVIIIe siècle (1754-1763, ajouts en 1780-1789) par la famille de Courtilloles qui en est toujours propriétaire. Plan rectangulaire, avec un pavillon bas à chaque extrémité dont les toits sont masqués en partie par des balustres, avec ses pavillons jumeaux à lanternon de la cour d'honneur dont l'un abrite une chapelle, le corps de logis, le péristyle sur la cour précédé d'un perron droit et couronné d'un balcon à balustrade, l'aile ouest à été construite en 1865, l'avant corps arrondi donnant sur le parc est en légère saillie, surmonté d'un fronton curviligne au tympan armorié et abritant un salon en rotonde doté d'un parquet à motif rayonnant et de peintures symbolisant les saisons. Le portail d'entrée en fer forgé date du XVIIIe siècle. Le château jouit d'un panorama exceptionnel sur la Forêt de Perseigne et la Plaine d'Alençon.","habitants":"Famille de Bertrand de Karadreux\r\n        \"","divers":"Château de Ccourtlloles  GPS : 48° 22' 53\" Nord, 0° 09' 06\" Est","gps":"48° 22' 53\" Nord, 0° 09' 06\" Est","images":["../../jctruffet.com/image/image_72/72_Courtilloles_1.jpg","../../jctruffet.com/image/image_72/72_Courtilloles_2.jpg","../../jctruffet.com/image/image_72/72_Courtilloles_3.jpg","../../jctruffet.com/image/image_72/72_Courtilloles_4.jpg"]},"Consult_chateau_formulaire003d":{"id":"Consult_chateau_formulaire003d","dept":"72","canton":"La Fléche","commune":"Crosmieres","nom":"Crosmières_72","type":"Château","periode":"XVII-XVIII","histoire":"trois  châteaux à Crosmières dont la Bouillerie  la Motte-Lubin et Potardière.                                                                                                      La BOUILLERIE  construit entre le XVIIe et le XIXe siècle, ses murs appartiennent à la même famille depuis 200 ans.                                                                                                                            La MOTTE-LUBIN, le logis fut construit en 1659-1660 sous la direction des maîtres maçons fléchois Jean Delahaie et Florimond Pinard, ainsi que du maître charpentier fléchois, Antoine Roux. L'édifice fut acquis au début du XVIIIe siècle par Joseph Le Royer qui fit bâtir une chapelle, bénie en 1718 et dédiée à Saint-Joseph en l'honneur de son aïeul, Jérôme Le Royer de la Dauversière, fondateur de l'ordre des hospitalières de Saint Joseph de la Flèche. Dans la deuxième moitié du XIXe siècle, les élévations du logis furent considérablement remaniées et la chapelle reconstruite à un emplacement différent de la précédente. Les parties agricoles furent également remaniées vers 1848. Un puits mû par une éolienne métallique, oeuvre du fondeur Manceau Ernest Bollée, fut aménagé dans le parc dans la seconde moitié du XIXe siècle. Le logis consiste en un corps central couvert en croupe flanqué de deux pavillons couverts par un toit en pavillon. Il possède un sous-sol, un étage carré et un étage de comble distribués par un escalier en charpente. Les parties agricoles sont en rez-de-chaussée. Elles sont couvertes en tuile plate, à la différence du logis, couvert en ardoise. La chapelle est coiffée d'un toit à pignons découverts.","architecture":"BOUILLERIE Siège d'une seigneurie ancienne,, la composition régulière du milieu du XVIIe siècle  mais d'autres, dans les années 1882-1883, ont bouleversé la régularité du bâti. Depuis lors, les remaniements des intérieurs se sont succédé avec régularité. Seules ont conservé aujourd'hui un caractère d'authenticité la grande allée de tilleuls menant à une fabrique de style néo-classique.  ont été propriétaire  Alphonse Sébastien Louis Roullet de la Bouillerie.                                                                          POTARDIERE, mentionné dès le XIVe siècle, l'édifice conserve un pigeonnier pouvant dater du XVIIe siècle, ainsi que l'aile ouest du logis, bâtie à la fin du XVIIIe ou au début du XIX siècle. Le logis fut en grande partie reconstruit et considérablement augmenté entre 1850 et 1852. Dédiée à saint Hubert, une nouvelle chapelle fut élevée dans le parc vers 1857, en remplacement de l'ancienne, probablement détruite au cours de la campagne précédente. Les communs et les parties agricoles furent remaniés ou construits dans la seconde moitié du XIXe siècle. L'aile ouest du logis, à un étage carré distribué par une vis en charpente sans jour inscrit dans une tour couverte par un toit conique, est coiffé d'un toit à pignon couvert. Un corps secondaire la prolonge à l'ouest couvert d'une croupe polygonale. La partie orientale du logis consiste en un corps principal flanqué de deux ailes, tous couverts en croupe. La chapelle est coiffée d'un toit à pignon découvert et d'une croupe polygonale. Les communs sont couverts en tuile plate et ardoise.    Chambres d'hôtes de charme. A proximité des châteaux de la Loire, la Potardière, maison de famille construite dans la tradition angevine du XVIIIe siècle vous offre 12 hectares de parc et de bois, dans une région riche en patrimoines culturels, à proximité de 3 golfs. Le Haras de la Potardière, château-hôtel.","habitants":"Motte; Famille de  Joseph Le Royer                                  Potardière; Famille de la Potardière\r\n        \"","divers":"trois  châteaux à Crosmières dont la Bouillerie  grav 3                  la Motte-Lubin et Potardière grav 1-2.","gps":"","images":["../../jctruffet.com/image/image_72/72_Crosmi%c3%a8res_72_1.jpg","../../jctruffet.com/image/image_72/72_Crosmi%c3%a8res_72_2.jpg","../../jctruffet.com/image/image_72/72_Crosmi%c3%a8res_72_3.jpg"]},"Consult_chateau_formulairef825":{"id":"Consult_chateau_formulairef825","dept":"72","canton":"La Fléche","commune":"Clermont-Créans","nom":"Créans","type":"Château","periode":"XIII-XV","histoire":"Deux châteaux à Créans dont; Créans  et Oyre.                          CREANS, les parties les plus anciennes du bâtiment consistent en une tour, encore munie d'archères, dont la construction remonte au XIIe ou au XIIIe siècle. Le châtelet fut remanié vers 1474, date à laquelle René Fresneau, seigneur de Créans, fut autorisé à renforcer les défenses de l'édifice. Au cours de la campagne de travaux, la tour fut partagée en deux niveaux séparés par une coupole et convertie en colombier. Les canonnières du châtelet datent sans doute de la fin du XVIe siècle. En 1734, le château fut acheté par les jésuites de la Flèche qui, peu après, rebâtirent le logis. Le châtelet fut restauré dans le premier quart du XXe siècle par l'architecte Henri Laffillée. La plupart du décor sculpté date de cette campagne, à l'exception, peut-être, des mascarons du passage couvert, qui pourraient constituer un vestige du décor du XVe siècle. L'édifice comprend le châtelet, le logis et la tour-colombier, tous trois implantés sur une plateforme fossoyée de plan rectangulaire, aménagée en bordure du Loir et dont les fossés sont alimentés par les eaux de la rivière. Le logis se compose d'un corps central, à deux étage carrés distribués par un escalier tournant, prolongé par deux ailes. Les trois corps sont couverts de toits en croupe. Le châtelet, qui comprend un étage carré et un étage de comble distribués par une vis hors-oeuvre, est coiffé de toits à pignon couvert et découvert. La vis est inscrite dans une tourelle coiffée d'un toit polygonal. Le châtelet abrite un passage couvert par une voûte en berceau segmentaire. La tour est coiffée d'un toit conique. Son premier niveau est couvert par une coupole.","architecture":"OYRE, de sa construction au XVe siècle, le logis conserve le plan de sa partie ouest et sa tour d'escalier sur l'angle nord-ouest. Le pavillon, adossé à la face antérieure, date peut-être du XVIIe siècle, de même que le toit en croupe du logis. Les parties agricoles furent remaniées ou construites vers 1780 époque à laquelle l'aménagement intérieur du logis fut remanié, les élévations de celui-ci furent à nouveau remaniées vers 1891, Sa construction a démarré en 1407 avec le corps principal. Deux noms reviennent régulièrement, à savoir Hardouin des Roches (seigneur des Bans) et René Ferdinand de Chaubry respectivement pour la construction du lieu et pour les plans du jardin. Le Château d'Oyré servira de cadre idéal pour vos mariages, époque qui correspond à la construction de la chapelle Sainte Barbe dans le parc. Jardin régulier et parc datent sans doute du XVIIIe siècle L'édifice est implanté entre un jardin régulier et un parc. Le corps de logis principal est couvert par un toit en croupe, le pavillon antérieur par un toit en pavillon et la tour d'escalier par un toit polygonal. La chapelle est coiffée d'un toit à pignons découverts. Elle est flanquée d'un corps couvert en appentis massé contenant une vis en charpente.","habitants":"Créans:  René Fresneau                                                               Oyre;  Hardouin des Roches \r\n        \"","divers":"Deux châteaux à Créans dont; Créans grav-1-2-3  et Oyre grav 4-5.                                                                                       Créans  PS : 47° 43' 05\" Nord, 0° 00' 54\" Ouest                                                  Oyre  GPS : 47° 43' 16,07\" Nord, 0° 01' 58,05\" Ouest","gps":"47° 43' 16,07\" Nord, 0° 01' 58,05\" Ouest","images":["../../jctruffet.com/image/image_72/72_Cr%c3%a9ans_1.jpg","../../jctruffet.com/image/image_72/72_Cr%c3%a9ans_2.jpg","../../jctruffet.com/image/image_72/72_Cr%c3%a9ans_3.jpg","../../jctruffet.com/image/image_72/72_Cr%c3%a9ans_4.jpg","../../jctruffet.com/image/image_72/72_Cr%c3%a9ans_5.jpg"]},"Consult_chateau_formulaireb793":{"id":"Consult_chateau_formulaireb793","dept":"72","canton":"Mamers","commune":"Dangeul","nom":"Dangeul","type":"Château","periode":"XIX","histoire":"DANGEUL, il fut élevé en 1848 par l'architecte Delarue, du Mans, pour la comtesse Françoise de Gallwey, il comporte deux tours rondes sur la façade d'entrée et, deux tourelles en briques sur celles de la terrasse, d'où nous bénéficions d'un magnifique panorama, sur toute la plaine, et en particulier Nouans, René et Thoigné. centre équestre, équitation de loisirs, de compétition.","architecture":"DANGEUL, il ne subsiste plus rien de l'ancien château, si ce n'est les communs. Ils comprennent de nombreux bâtiments, dont la maison de maître, située le plus à l'Ouest et orientée Est-Ouest. Des jardins se sont implantés au Sud-Ouest des communs. Les communs sont désormais utilisés par un club d'équitation. L'habitation principale qui est la plus à l'ouest, est bâtie sur une vieille cave voûtée comportant une grande porte bouchée, qui a pu être le départ d'un souterrain partant vers le Nord. D'après Monsieur Epineau, qui est l'ancien gardien du château de Dangeul, des restes de douves qui bordaient la route de René, furent bouchés par ses soins avec la terre de l'ancien cimetière de Saint Martin, vers 1960. Le château actuel est à près de 200 m à l'Ouest des communs.","habitants":"la comtesse Françoise de Gallwey\r\n        \"","divers":"château Danguel","gps":"","images":["../../jctruffet.com/image/image_72/72_Dangeul_1.jpg","../../jctruffet.com/image/image_72/72_Dangeul_2.jpg","../../jctruffet.com/image/image_72/72_Dangeul_3.jpg"]},"Consult_chateau_formulairecf6f":{"id":"Consult_chateau_formulairecf6f","dept":"72","canton":"La Ferté-Bernard","commune":"Dehault","nom":"Dehault","type":"Manoir","periode":"XV-XVI","histoire":"DEHAULT, le manoir a été construit entre 1504 et 1508 par Richard Lemoyne, secrétaire de Louis XII. En 1647 la propriété est acquise par Jean-Baptiste Boësset, seigneur de Villedieu, surintendant de la musique de chambre de Louis XIV et anobli en 1664. Il a été remanié au XVIIIe siècle.  Seuls, les extérieurs du Château de Dehault se visitent. Le Château de Dehault est inscrit aux M.H. depuis 1981. Il appartenait à l'un des surintendants de la musique de Louis XIV. Aujourd'hui, ll est la propriété de Monsieur Roland de Marmies.","architecture":"DEHAULT, sa construction date du XVe au XVIIe siècle. Propriété privée, les extérieurs et le pigeonnier peuvent être visités   Il a été remanié au XVIIIe siècle. Le bâtiment conserve l'aspect général des manoirs de la fin du Moyen Age dans le Maine avec sa tour d'escalier octogonale en milieu de façade, son chartrier, sa boulangerie, son four à pain et son espace de commodités  Aux côtés du bâtiment se trouve l'ancienne tour de défense transformée en pigeonnier en 1609, date indiquée sur la pierre surmontant l'accès à l'actuel pigeonnier, 1 100 cases constituent le mur intérieur flanqué de meurtrières. Le château de Dehault conserve le caractère des manoirs de la fin du Moyen-Age dans le Maine : tour d'escalier octogonale au centre de la façade, chartier, tour de défense transformée en pigeonnier.    Éléments protégés MH : les façades et les toitures du château, du pavillon Nord et de celui des anciennes latrines ; dans le château l'escalier à vis, le grand salon et son décor, la cheminée de la chambre du premier étage et son trumeau ; le colombier et le portail d'accès au parc : inscription par arrêté du 29 décembre 1981.","habitants":"Famille de Richard Lemoyne\r\n        \r\n        \"","divers":"Cxhâteau de Dehault                                                                                GPS : 48° 12' 29,63\" Nord, 0° 34' 15,41\" Est","gps":"48° 12' 29,63\" Nord, 0° 34' 15,41\" Est","images":["../../jctruffet.com/image/image_72/72_Dehault_1.jpg"]},"Consult_chateau_formulaire3194":{"id":"Consult_chateau_formulaire3194","dept":"72","canton":"Château-du-Loir","commune":"Dissay sous Courcillon","nom":"Dissay_Courcillon","type":"Château","periode":"XIV-XV","histoire":"A Dissay sous Courcillon  le château de Courcillon Dissay, de Joliverie   de la Cour et de Vernay.                                                                                                               DISSAY, château de Courcillon des XIe, XIVe, XIIe et XIXe siècles qui jusqu'au XIXe siècle conservait ses quatre rondes et grosses tours ses murs d'enceinte contreforts fossés et pont-levis. Dans la cour, un escalier mène au souterrain qui dessert les différentes tours. La salle des gardes conserve ses poutres et solives et sa cheminée du XVe siècle. Au cours du XIVe siècle les seigneurs de Bueil restaurent le château. Ces éléments défensifs furent démolis vers 1840. Le premier seigneur de Courcillon est Hato de Curcellon en 1071. Louis XI y serait resté plusieurs mois. Vestiges du château de Vernay du XIIIe siècle. Première mention en 1250, une grande partie démolie en 1804. La famille de Rancher est propriétaire du château du XVIe au XVIIIe siècle. M. Graslin, consul de France en Espagne rachète la demeure au début du XIXe siècle.Seigneurie de Vernay. Manoir de Bonlieu construit à l'emplacement de l'abbaye. Transformé en hôtel restaurant par la famille Colla.\r\nJOLIVERIE manoir construit en 1834.\r\nLA COUR,   maison  de justice construite vers 1480, la forteresse en mauvais état est restaurée au XIVe siècle. Le village est construit autour de l'ensemble religieux que constituent l'église et le prieuré.    Le bâtiment actuel est une composition de différentes époques du XIIe, XVIIe et XXe siècle.","architecture":"COURCILLON du XIXe siècle conservait ses quatre rondes et grosses tours ses murs d'enceinte contreforts fossés et pont-levis. Dans la cour, un escalier mène au souterrain qui dessert les différentes tours. La salle des gardes conserve ses poutres et solives et sa cheminée du XVe siècle. Au cours du XIVe siècle les seigneurs de Bueil restaurent le château. Ces éléments défensifs furent démolis vers 1840. Le premier seigneur de Courcillon est Hato de Curcellon en 1071. Louis XI y serait resté plusieurs mois.\r\n Vestiges du château de VERNAY du XIIIe siècle. Première mention en 1250, une grande partie démolie en 1804. La famille de Rancher est propriétaire du château du XVIe au XVIIIe siècle. M. Graslin, consul de France en Espagne rachète la demeure au début du XIXe siècle.              DISSAY, dès le IXe siècle, les évêques du Mans possèdent déjà une maison épiscopale Villam quam Disiacum nominant ultra fluvium Ledum dedit. Prieuré-cure dépendant de Beaulieu, les curés de Dissay sont des chanoines réguliers de l'ordre de Saint-Augustin. Le prieuré doit vraisemblablement sa construction aux seigneurs de Courcillon. L'un d'eux fit don de la chapelle Saint-Jean bâtie sous le château de Courcillon, en redevance : Les prieurs doivent donner tous les ans aux seigneurs de Courcillon et de présenter la veille de la Saint-Jean, douze chandelles de cire ou faire chaque semaine trois messes basses. Le premier prieur connu est Fr. Jean de Feninen 1404. Après la séparation de l'Église et de l'État, le prieuré est repris par la commune et le revient en 1926 à M. Paillier puis à M. Prouty, américain.                                                                                                              Le prieuré est construit au XIe siècle par les seigneurs de Courcillon. Il devient propriété de la commune en 1905 après la loi de séparation des Églises et de l'État, puis est vendu à un citoyen américain en 1928.   Prieuré du XIIe siècle, inscrit au titre des M.H. en 1984.","habitants":"seigneurs de Bueil \r\n        \r\n        \"","divers":"A Dissay sous Courcillon  le château de Dissay sous courcillon grav  -1 à 4, de Joliverie  et de la Cour et de Vernay grav-5-6.                                                                                              Dissay Gps 47° 39' 55\" nord, 0° 28' 24\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_Dissay_Courcillon_1.jpg","../../jctruffet.com/image/image_72/72_Dissay_Courcillon_2.jpg","../../jctruffet.com/image/image_72/72_Dissay_Courcillon_3.jpg","../../jctruffet.com/image/image_72/72_Dissay_Courcillon_4.jpg","../../jctruffet.com/image/image_72/72_Dissay_Courcillon_5.jpg","../../jctruffet.com/image/image_72/72_Dissay_Courcillon_6.jpg"]},"Consult_chateau_formulaire6a92":{"id":"Consult_chateau_formulaire6a92","dept":"72","canton":"Ecommoy","commune":"Ecommoy","nom":"Ecommoy","type":"Château","periode":"XV-XVII-XIX","histoire":"Six châteaux  à Ecommoy; dont Ecommoy, Fontenaille, Grande Maison, Bezonnais et Soleil.                                                                 ECOMMOY;   château de Fontenaille, ancien couvent de Béthanie, du XVIIe siècle, partiellement inscrit au titre des M.H. en 1943. Château de Bezonnais. Château Rouge, encore appelé « la Tombelle ». Château de la Boissière. Grande Maison, probablement du XVe siècle, ancienne demeure dépendant du château de Fontenailles ou d'un seigneur de Mulsanne. Restaurée, elle accueille désormais une maison médicale.                                                                                                    BEZONNAIS, autrefois le château de Bezonnais était une résidence fortifiée avec enceinte crénelée, tours, herse, douves et pont-levis. Seule une tour reste de nos jours. Restauré en 1804, le château remonte au XVe siècle. Ses propriétaires sont tous connus depuis 1424. Aujourd'hui, c'est une résidence pleine de charme. Dans le cadre champêtre de ce château avec ses douves en eau, son île, ses prairies et ses bois sur 15 hectares, gîtes et chambres d'hôtes                                                                                                              SOLEIL, le château du Soleil a été construit en 1853, sur le bord de la grande route du Mans à Tours, pour M. Henri Boullard, riche propriétaire foncier d'Ecommoy. Le bâtiment est composé d'une suite de trois pavillons accolés, décorés dans le style du gothique, à la manière du règne de Louis XII dans la vallée de la Loire. Les baies en tiers point au rez-de-chaussée, avec leurs menuiseries caractéristiques, qui imitent les lancettes des fenêtres d'églises gothiques, les fenêtres surmontées d'une accolade au premier étage, les pilastres à panneaux dans les angles et autour de l'avant-corps central, et la frise d'arcatures sous la corniche, présentent un style gothique de transition.","architecture":"FONTENAILLES, au sud-est du bourg, une allée bordée d'arbres mène de la grande place au château de Fontenailles, seigneurie érigée en marquisat au XVIIIe siécle, auparavant dans la mouvance des seigneurs de Belin et d'Averton. Le château de nos jours très réduit puisqu'il ne subsiste que l'aile gauche. Il faisait 100 pieds de long et avait été construit à partir de 1665, par Paul Fréart de Chantelou, mécène et amateur d'art. L'aile droite et la partie centrale furent détruites au cours du XIXe siècle, dans des circonstances restées très mystérieuses. Les deux pavillons d'entrée possèdent des frontons sculptés par Bartélémy de Melo. Éléments protégés MH : les deux pavillons jumeaux du XVIIe siècle élevés en bordure des douves et dépendant du couvent: inscription par arrêté du 31 mai 1943.                                                                                                                                        La GRANDE  MAISON : la construction remonte sans doute au XVe siècle. Elle fut habitée par les seigneurs de Fontenailles, puis devint une métairie.\r\nEn 1829, La Grande Maison fut donné aux Soeurs de la congrégation dEvron, y fondant un pensionnat déducation de jeunes filles et une maison de charité. Elle abrite de nos jours la maison médicale.","habitants":"Ecommoy seigneur de Mulsanne.                                                Soleil;  M. Henri Boullard,\r\n        \"","divers":"Six châteaux  à Ecommoy; dont Ecommoy, Fontenaille grav 2-3, Grande Maison grav-6, Bezonnais grav-1 et Soleil grav 4-5.  Bezonnais                                                                                      GPS : 47° 49' 42\" Nord, 0° 16' 23\" Est","gps":"47° 49' 42\" Nord, 0° 16' 23\" Est","images":["../../jctruffet.com/image/image_72/72_Ecommoy_1.jpg","../../jctruffet.com/image/image_72/72_Ecommoy_2.jpg","../../jctruffet.com/image/image_72/72_Ecommoy_3.jpg","../../jctruffet.com/image/image_72/72_Ecommoy_4.jpg","../../jctruffet.com/image/image_72/72_Ecommoy_5.jpg","../../jctruffet.com/image/image_72/72_Ecommoy_6.jpg"]},"Consult_chateau_formulaire930a":{"id":"Consult_chateau_formulaire930a","dept":"72","canton":"Loué","commune":"La Quinte","nom":"Eporcé","type":"Château","periode":"XVII","histoire":"EPORCE, en plein bocage Sarthois et à seulement 15 Km à l'ouest du Mans, le château d'Eporcé est une élégante demeure élevée au XVIIe siècle au cur d'un magnifique parc aux multiples facettes et d'un jardin potager. On appréciera la fraîcheur du quinconce dont le sol au printemps se couvre de jacinthes et en automne de cyclamens. En faisant le tour des douves on peut entrevoir les poissons qui s'y prélassent. Éléments protégés MH : les façades et les toitures du château ; les quatre pièces du rez-de-chaussée avec leurs décors; la chapelle ; la fuie et les douves : inscription par arrêté du 14 décembre 1989, location chambres d'hôtes.","architecture":"EPORCE,  date du XVIIe siècle. Le château d'Eporcé possède un clocheton à la chapelle au dessus du bosquet, l'élévation et les toits du château, et surtout sa raison d'être: le colombier lui aussi avec un clocheton; à sa droite l'extrémité des communs. Des chambres d'hôtes sont proposées en location ainsi que la location du château pour des mariages. En plein bocage sarthois et à seulement 15 Km à l'ouest du Mans, le château d'Eporcé est une élégante demeure du XVII° siècle au cur d'un très beau parc. Nous accueillons en toutes saisons des manifestations à caractère familial, dans des salles spécialement aménagées à cet effet, avec possibilité d'extension dans le parc à la belle saison.","habitants":"Rémy de Scitivaux et son épouse,\r\n        \"","divers":"Château d'Eporcé                                                                            gps 48° 02' 50,84\" nord, 0° 01' 53,11\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_Eporc%c3%a9_1.jpg","../../jctruffet.com/image/image_72/72_Eporc%c3%a9_2.jpg","../../jctruffet.com/image/image_72/72_Eporc%c3%a9_3.jpg"]},"Consult_chateau_formulairef92f":{"id":"Consult_chateau_formulairef92f","dept":"72","canton":"Château-du-Loir","commune":"Saint Vincent du Lorouer","nom":"Etangs_Archevèque","type":"Château","periode":"XVI","histoire":"ETANG-ARCHEVEQUE, le lieu-dit doit son nom aux étangs artificiels créés en 1038 par Gervais, évêque du Mans, seigneur de Château-du-Loir. La seigneurie des Étangs daterait de cette époque. La maison des Etangs est citée en 1285. La seigneurie aurait été transmise par alliance des familles Ribole à Courcillon puis au début du XVe siècle à la famille de Fromentières. Un aveu mentionne Amaury de Fromentières en 1406, seigneur des Étangs, à cause de sa femme Loyse de Courcillon. En 1518 Olivier de Fromentières est écuyer, seigneur des Etangs. La famille de Fromentières possédait également jusqu'au XVIIe siècle le lieu seigneurial de la Moinerie à Jupilles. En 1718, les Étangs-l'Archevêque sont acquis par Louis-Jacob Des Hayes, écuyer, colonel d'infanterie. Il est seigneur des Etangs-l'Archevêque, de la Joliverie, de Clairaunay, etc. Les possessions du domaine dans la paroisse s'étendent à la Goussière, Champrond, la Roche, les Fourneaux, la Ratelière, le Petit et le grand Vaubouillé, les Chênes, le Moulin de Vaubouillé, la Chevalerie, la Borde, la Boudeterie, la Lamberdière, les Peloisières, les Etangs. En 1800, l'affiche d'une vente à l'encan indique que le domaine compte les métairies des Étangs, de la Coutière, de la Lamberdière, la  propriété nue de la métairie de la Boudeterie et petit lieu nommé la Charterie. Le château est alors acheté par un cultivateur de Pruillé-l'Éguillé.","architecture":"ETANG-ARCHEVEQUE, le château des Étangs-l'Archevêque se compose aujourd'hui d'un corps de logis en L et de quelques bâtiments de dépendances agricoles dissociés. D'après l'ancien cadastre, le colombier et une partie de la ferme ont disparu. Seul le bâtiment de la grange-étable est conservé. Aujourd'hui, le logis est constitué d'éléments d'architecture qui ne paraissent pas remonter au-delà du XVIe siècle (avec une interrogation sur le sous-sol voûté ). Ce constat oblige à imaginer un éventuel déplacement de site, puisque le lieu seigneurial est mentionné depuis le XIe siècle. La composition de la demeure construite ou reconstruite à la fin du XVIe siècle, vers 1590, est encore attestée par l'escalier droit rampe sur rampe, en pierre, et un fragment d'aile doté d'une cheminée au rez-de-chaussée et au premier étage. En façade sur cour, on retrouve les vestiges d'une corniche à modillons alternés avec des ardoises formant une bichromie originale. Le logis fut complété ou modifié au début du XVIIe siècle par la construction d'un pavillon orné d'une corniche à denticules. Ce pavillon est équipé d'un étonnant escalier tournant en bois permettant l'accès au comble depuis le premier étage. La rampe de cet escalier est ornée de balustres épais et symétriques, courants au début du XVIIe siècle. Son montage ou remontage à cet emplacement autonomise l'accès aux combles, comme si le logis avait été séparé en deux parties distinctes à un moment donné. De 1732 à 1742, à la suite d'un changement de propriétaire, se déroule un important chantier. Il plaque une aile perpendiculairement au grand escalier de pierre. Cette aile percée de huit travées de baies sur la façade (côté jardin) est atypique : le rez-de-chaussée, avec des pièces en enfilade, est autonome, tandis que l'étage est divisé par un long couloir (côté cour) desservant quatre appartements.","habitants":"évêque du Mans et familles Ribole\r\n        \r\n        \"","divers":"château de l'Etang de l'archevêque","gps":"","images":["../../jctruffet.com/image/image_72/72_Etangs_Archev%c3%a8ques_1.jpg","../../jctruffet.com/image/image_72/72_Etangs_Archev%c3%a8ques_2.jpg"]},"Consult_chateau_formulaireef94":{"id":"Consult_chateau_formulaireef94","dept":"72","canton":"Le Lude","commune":"Mansigné","nom":"Fay_Mansigné","type":"Château","periode":"XVI-XVIII","histoire":"Six châteaux à Mansigné; l'Auberdière, la Costière, La Livaudière, la Masserie, de Morier et de Vandoeuvres. Manoir de la Guyardière.\r\nChâteau de Fay (ruines), du XVe siècle, en partie démoli au XIXe siècle.                                                                                                AUBERDIERE, le château de l'Auberdière, en pierre et ardoise, a été construit semble-t-il sous Louis XVI comme semble lindiquer sa toiture à la Mansart. Il fut construit pour M. Desgraviers, marchand au Mans, témoin de la bourgeoisie commerçante prospère du XVIe siècle, ce manoir, en pierre et ardoise.                                                                                                         MASSERIE, les ruines actuelles sont les derniers vestiges dune maison-forte, encore en parfait état en 1847. Ce bâtiment possédait une chapelle dédiée à Saint Claude. Elle fut fondée par Guillaume de Champlais et son épouse Françoise Briard en 1533 et fut probablement désaffectée dès 1839. Le château de la Masserie, la chapelle et les jardins furent détruits entre 1860 et 1867.\r\nchâteau de la Masserie 72550 Fay, propriété privée, ne se visite pas, vestiges. Penchien  et Costhières Pas d'info                                   PENCHIEN,  château du XIXe siècle appelé aussi Costière.","architecture":"VANDOEUVRES, sans doute implanté à lemplacement dune ancienne villa gallo romaine, le château de Vandoeuvres faisait partie, au XIe et XIIe siècle de trois seigneuries (avec les Broussins et La Masserie). Pendant la révolution française, les bois de Vandoeuvres sont le lieu de combats entre Chouans et Républicains (tombeau commémoratif dans les bois). Au XVIIe siècle, Vandoeuvres appartient à la baronnerie de Pirmil et à la famille de Champlais, puis de celle des Vayer, jusquau XIXe siècle. Le château possède un fruitier du XVIIIe siècle ainsi quune chapelle construite aux XVe et XVIIe siècles. en lieu et place de l'ancienne motte féodale.  Famille de  'Agoult ,  de  Victor Marie Joseph Anatole De Loregeril.                                Le château de la LIVAUDIERE, est intéressant par sa construction typique du XVIII e siècle.\r\nLe manoir du MORIER réalisé en pierre enduite de tuffeau et ardoise, la maison bourgeoise du Morier est un témoignage du fait que la commune de Fay était très courtisée par la bourgeoisie mancelle au XVIIIe siècle. Elle fut construite par M. Drouard, avec plantations en allées.","habitants":"azuberdière;   M. Desgraviers                                                                                   Livaudière;                                                                                                 Vandoeuvres;  famille de Champlais                          \r\n        \"","divers":"ix châteaux à Mansigné grav 4-5; l'Auberdière grav-1 , la Costière grav 6, La Livaudière grav 2-3, la Masserie, de Morier et de Vandoeuvres grav 7-8. Manoir de la Guyardière grav-9.                                                                                                   Mansigné gps 47° 44' 50\" nord, 0° 08' 06\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_Fay_Mansign%c3%a9_1.jpg","../../jctruffet.com/image/image_72/72_Fay_Mansign%c3%a9_2.jpg","../../jctruffet.com/image/image_72/72_Fay_Mansign%c3%a9_3.jpg","../../jctruffet.com/image/image_72/72_Fay_Mansign%c3%a9_4.jpg","../../jctruffet.com/image/image_72/72_Fay_Mansign%c3%a9_5.jpg","../../jctruffet.com/image/image_72/72_Fay_Mansign%c3%a9_6.jpg","../../jctruffet.com/image/image_72/72_Fay_Mansign%c3%a9_7.jpg","../../jctruffet.com/image/image_72/72_Fay_Mansign%c3%a9_8.jpg","../../jctruffet.com/image/image_72/72_Fay_Mansign%c3%a9_9.jpg"]},"Consult_chateau_formulaire4063":{"id":"Consult_chateau_formulaire4063","dept":"72","canton":"La Ferté-Bernard","commune":"La Ferté_Bernard","nom":"Ferté_Bernard","type":"Forteresse","periode":"XII-XVIII","histoire":"Six châteaux à la Ferté dont celui de la Ferté-Bernard, du Muids, de Courtangle, du Haut-Buisson, de la Pélice, de Souvigné et le Vieux -château, mis à par la Ferté pas d'information pour ses châteaux.                                                                                                                 FERTE-BERNARD, la cité Fertoise tient son nom de deux mots \"La Ferté\" (qui vient du latin & veut dire \"fermeté\" et par extension forteresse) et \"Bernard\" :nom de famille des premiers seigneurs qui habitèrent la ville (vers 1060). La ville est née entre deux bras de l'Huisne par la volonté de l'évêque du Mans, vers l'an 995. L'essor de la ville a été à son apogée vers 1480 et pendant tout le XVIe siècle. C'est lorsque la famille de Guise prit possession de la seigneurie que l'architecture et l'économie devinrent des atouts pour La Ferté-Bernard. Forteresse médiévale dont il ne subsiste que les communs ainsi qu'un certain nombre de tours et de remparts du XVIIIe siècle. Le dernier siège de la ville, mené en 1590 par le prince Conti, lieutenant général de Henri IV, a d'ailleurs laissé une trace de projectile sur l'une des deux tours. La Porte Saint Julien, appelée Porte de la Ville, fut construite sous Louis XI. Elle est un témoignage de l'architecture militaire du Moyen-Âge. Construite sur un bras de l'Huisne, avec ses deux tours circulaires avec toits en poivrière reliées par un pavillon central carré et dotées de mâchicoulis et canonnières, elle est protégée par un fossé alimenté par l'Huisne. Le bâtiment a abrité l'hôtel de ville de 1704 à 1907, et accueille un musée des costumes sarthois. Les trésors architecturaux de la ville de La Ferté Bernard sont nombreux.","architecture":"FERTE-BERNARD, fondé vers 1023 par Avesgaud, évêque du Mans et fils du comte du Perche, a subi bien des avaries au fil du temps. Forteresse d'abord construite de terre et de bois, le château est ensuite reconstruit en pierre avant d'être en grande partie détruit sur les ordres de Charles VI suite à la trahison de son seigneur Pierre de Craon en 1392. Aujourd'hui, il reste 2 tours, des murs et une partie du logis très remanié au fil des siècles et dorénavant divisé en appartements privés.  Tout commence au XIe siècle quand un certain Avesgaud de Bellême décide de construire un château. Bâti en 1027, il est lune des traces les plus anciennes de la commune. Aujourdhui il nen reste que des vestiges. Au XIe, la population est encore peu nombreuse. Cest principalement au XIVe quelle se développe lorsquune famille de Seigneurs appelée Bernard sétablit. De cette famille, il reste Saint-Lyphard. Cette chapelle romane servait dentrepôt à la Révolution française. En 1980, elle a été redécouverte et restaurée par la municipalité. On doit aussi à la grande famille Bernard une partie du nom de la ville. Quant au mot Ferté, il proviendrait du latin Fermitas qui signifie Forteresses. Détruite au fil des siècles, La Ferté-Bernard était entièrement fortifiée au Moyen-Âge.  Puis la Porte de Ville Saint-Julien, la dernière debout et conservée, a été une étape. Reconstruite vers 1450, elle avait un rôle défensif. Sur la façade, on peut voir les entailles qui sont des traces des deux ponts-levis, pour les charrettes et les hommes. En haut, au niveau des créneaux, on perçoit les mâchicoulis qui servaient à renverser eau bouillante ou poix. Sur les tours, près des fenêtres on aperçoit les meurtrières. « Cette architecture suscitait la terreur à lépoque ».Il ne reste quune partie des bâtiments, tours et remparts.","habitants":"Famille Bernard\r\n        \"","divers":"Six châteaux à la Ferté dont celui de la Ferté-Bernard grav-1-2-3-, du Muids grav- 8 , de Courtangle grav-5, du Haut-Buisson grav-6, de la Pélice grav-7, de Souvigné grav -4 et le haut-Buisson  grav-8                                                           Ferté, 48° 11' 15\" nord, 0° 39' 19\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_Fert%c3%a9_Bernard_1.jpg","../../jctruffet.com/image/image_72/72_Fert%c3%a9_Bernard_2.jpg","../../jctruffet.com/image/image_72/72_Fert%c3%a9_Bernard_3.jpg","../../jctruffet.com/image/image_72/72_Fert%c3%a9_Bernard_4.jpg","../../jctruffet.com/image/image_72/72_Fert%c3%a9_Bernard_5.jpg","../../jctruffet.com/image/image_72/72_Fert%c3%a9_Bernard_6.jpg","../../jctruffet.com/image/image_72/72_Fert%c3%a9_Bernard_7.jpg","../../jctruffet.com/image/image_72/72_Fert%c3%a9_Bernard_8.jpg"]},"Consult_chateau_formulairebaf6":{"id":"Consult_chateau_formulairebaf6","dept":"72","canton":"La Flèche","commune":"La Flèche","nom":"Flèche","type":"Château","periode":"XVI-XIX","histoire":"A la Flèche une dizaine de châteaux dont je n'ai pas d'informations mis à part Bouchevreau , Doussay et Prytanée-National.                                                     .  BOUCHEVREAU, reconstruit vers 1854, puis remanié à deux reprises vers 1866  et vers 1871, le logis a conservé quelques vestiges datant du XVIIIe siècle notamment le fronton triangulaire d'un ancien avant-corps dans le comble. Les communs datent du XIXe siècle. Le logis se compose d'un corps central flanqué de deux ailes couvertes de toits en croupe. Il est flanqué de deux corps latéraux, à gauche un corps couvert d'un toit polygonal et appareillé en calcaire taillé, à droite un corps également appareillé en calcaire taillé et couvert d'un toit en terrasse, élévation ordonnancée Étages : sous-sol  un étage carré et étage de comble Escaliers , escalier tournant à retours avec jour, escalier dans-oeuvre ; escalier tournant à retours sans jour  en charpente   en : calcaire ; grès ; silex ; appareil mixte ; moellon ; pierre de taille. toit à longs pans ; pignon couvert ; croupe  terrasse ; toit polygonal , couvert d'ardoise.                                                                                                              PRYTANEE NATIONAL, il représente un des 6 lycées de la défense française. En 1603, le roi Henri IV cède son « Château-Neuf » de La Flèche, une importante maison de famille que sa grand-mère Françoise d'Alençon avait fait bâtir, en 1540, pour y établir le Collège royal Henri-le-Grand. Le roi en confie la création aux Jésuites. Devenu le « Prytanée militaire » en 1808, sous l'impulsion de l'empereur Napoléon Ier, il abrite aujourd'hui dans ses murs l'un des 6 Lycées Militaires de France, appelés les Lycées de la Défense, depuis 2006. L'ensemble des bâtiments du Prytanée sont classés aux M.H. depuis 1919.","architecture":"DOUSSAY, Jules de Lamandé, son fils, pris personnellement la direction du domaine et s'adonna tout à la fois aux affaires publiques. On connaît sa rude bataille pour tenter d'éviter l'annexion de Sainte-Colombe à La Flèche.Sa fille Marie-Adèle-Alphonsine épousa le 7 juin 1870 Gilles-Louis de Maupeou, VIIe comte d'Ableiges, ingénieur du Génie maritime (1841-1925). L'un de leurs fils, Alphonse (1872-1953), officier de cavalerie, est l'aïeul de la branche fléchoise des Maupeou et de cent quinze arrière-petits-enfants .Son petit-fils, Henri, dirigea l'exploitation de Doussay .  Mentionné dès le XVIIe siècle, l'édifice fut considérablement remanié dans le dernier quart du XVIIIe siècle. La chapelle fut probablement également construite à cette époque. Un avant corps fut adossé à la face postérieure du logis vers 1828. Les communs furent remaniés au XIXe siècle. Parties constituantes: cour, parties agricoles, logement, fabrique de jardin  escalier dans-oeuvre ; escalier tournant à retours avec jour ; en charpente\r\nGros-oeuvre: calcaire; grès; silex; appareil mixte; moellon; moellon sans chaîne en pierre de taille; enduit toit à longs pans ; pignon couvert ; croupe en ardoise .                                                                                         PRYTANEE NATIONAL, d'architecture classique, le Prytanée a la forme de 2 grandes cours successives que domine l'imposante stature de l'église Saint-Louis, dont la construction a débuté, en 1607. Les travaux ont suivi un plan élaboré par Louis Métezeau, architecte du roi de France, avec des cours en enfilade, à peu près de même grandeur. L'église fut achevée en 1621 et l'ensemble des travaux s'acheva en 1655 par la construction de la porte d'honneur, avec sur le fronton, le buste du roi Henri IV.","habitants":"Bouchevreau;                                                                              Prytannée; Françoise d'Alençon                                                     Doussay  Jules de Lamandé                              \r\n        \r\n        \"","divers":"A la Flèche une dizaine de châteaux Rochevreau grav-1-2, Doussay--4-5 et Prytanée-National grav-3.                                                  Prytannée GPS : 47° 42' 10\" Nord, 0° 04' 36\" Ouest","gps":"47° 42' 10\" Nord, 0° 04' 36\" Ouest","images":["../../jctruffet.com/image/image_72/72_Fl%c3%a8che_1.jpg","../../jctruffet.com/image/image_72/72_Fl%c3%a8che_2.jpg","../../jctruffet.com/image/image_72/72_Fl%c3%a8che_3.jpg","../../jctruffet.com/image/image_72/72_Fl%c3%a8che_4.jpg","../../jctruffet.com/image/image_72/72_Fl%c3%a8che_5.jpg","../../jctruffet.com/image/image_72/72_Fl%c3%a8che_6.jpg"]},"Consult_chateau_formulairec338":{"id":"Consult_chateau_formulairec338","dept":"72","canton":"La Flèche","commune":"La Flèche","nom":"Flèche_II","type":"Château","periode":"XVII","histoire":"Deux châteaux dans cet article Grand-Ruigné et Notre Dame des Champs.                                                                                                           NOTRE DAME DES CHAMPS, le véritable démarrage de la ville fut assuré avec la construction, vers le milieu du XIe siècle, du château fort, dans un méandre du Loir, à quelque distance à l'est : celui-ci avait à charge de surveiller la frontière entre Maine et Anjou et de contrôler le franchissement du Loir, dont il commandait directement le pont. Cette implantation s'est accompagnée de la fondation au début du XIIe siècle du prieuré Saint-Thomas, confié à l'abbaye Saint-Aubin d'Angers. Dès cette époque, la ville était en partie desservie par le trafic fluvial qui aboutissait au Port-Luneau, aménagé près du château à l'ouest. Le logis du château de Notre-Dame-des-Champs comprend un corps primitif probablement construit au XVIIe siècle. Vers 1893, il fut considérablement remanié et augmenté d'une aile. Les communs furent également remaniés à cette époque. Le corps primitif du logis Est est en rez-de-chaussée avec un étage de comble distribué par un escalier dans oeuvre. Il est couvert par un toit brisé en croupe. L'aile ajoutée présente un étage carré et un étage de comble, distribués par un second escalier dans oeuvre. Elle est couverte d'un toit en croupe. Les ailes de communs sont en rez de chaussée et coiffées de toits à pignon couvert.","architecture":"GRAND-RUIGNE, même historique que le château Nôtre Dame des Champs.  Dès cette époque, la ville était en partie desservie par le trafic fluvial qui aboutissait au Port-Luneau, aménagé près du château à l'ouest. Le château du Grand-Ruigné est mentionné au moins dès le XVIIe siècle, le logis fut considérablement remanié à la fin du XVIIIe ou au début du XIXe siècle. L'édifice se compose d'un étage carré et d'un étage de comble, le gros-oeuvre en calcaire, grès, silex, appareil mixte, moellon sans chaîne en pierre de taille, élévation ordonnancée, surmontée de toit à longs pans ; croupe et noue, recouverts d'ardoise. Dans le parc, bâtiments agricoles et fabrique de jardin.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Bethéte à la fléche grav 1 hôtel de ville-3 grand ruigné-grav -4              GPS : 47° 42' 10\" Nord, 0° 04' 36\" Ouest","gps":"47° 42' 10\" Nord, 0° 04' 36\" Ouest","images":["../../jctruffet.com/image/image_72/72_Fl%c3%a8che_II_1.jpg","../../jctruffet.com/image/image_72/72_Fl%c3%a8che_II_2.jpg","../../jctruffet.com/image/image_72/72_Fl%c3%a8che_II_3.jpg","../../jctruffet.com/image/image_72/72_Fl%c3%a8che_II_4.jpg"]},"Consult_chateau_formulaire40c9":{"id":"Consult_chateau_formulaire40c9","dept":"72","canton":"Château-du-Loir","commune":"Flée","nom":"Flée","type":"Château","periode":"XVII-XIX","histoire":"A Flée  le  château d'Ourne, des XIe, XVIIIe et XIXe siècles (voir article).\r\nLe château de la Motte-Thibergeau date du XVIIe siècle.\r\nLe château de Malitourne du XIXe siècle.\r\nLe château de la Chevalerie, des XIXe et XXe siècles.                       MALITOURNE, le château de Malitourne, situé à deux kilomètres à l'est du bourg, appartenait à Geuffroin le Vavasseur au début du XVe siècle, serviteur de la duchesse d'Anjou et à la dame Robine sa femme. L'actuel château a été construit au XVIIe siècle, et modifié ensuite au XVIIIe siècle. Une lettre signée Thibergeau, adressée de Solesme à Jacques Hercule Massue, seigneur de Malitourne, lui demandant de lui céder le droit de co-seigneur de Flée qu'il a acquis en 1701. Le 18 septembre 1703, Jacques-Hercule Massue cède au seigneur de Thibergeau, tous les droits d'échange et droits honorifiques qui lui ont été vendus et accordés par les édits et déclarations du roi. Au XIXe siècle, la propriété appartient à Gustave de Graslin marié à Isabelle del Mago puis elle passe à son frère Adolphe-Hercule de Graslin marié à Cécile-Marie- Eugénie de Rorthays.","architecture":"MOTTE-THIBERGEAU, la terre de la Motte Thibergeau appartient aux Thibergeau, vieille famille du Maine dont la présence est attestée dès 1296 à La Motte, où dix générations se succèdent jusquà Louis IV Thibergeau. Celui-ci épouse en 1675 Gabrielle-Françoise Brûlart de Sillery, nièce de La Rochefoucauld. En 1720, la propriété passa à Alexandre-Bertrand Pallu du Ruau, marié à Anne-Marie-Angélique-Françoise de La Porte, sur dun fermier général. Trois ans plus tard le château est la propriété de Philippe Néricault Destouches, comédien, auteur dramatique et homme politique français. Une fois installé à Fortoiseau, Destouches vend La Motte Thibergeau à Casimir de Thibergeau, descendant de la branche cadette de la famille, qui reprend par là possession du domaine de ses ancêtres. Le château de la Motte Thibergeau est situé à la sortie du bourg sur la route de Chahaignes, cette imposante demeure, ancienne résidence du XVIIe siècle, modifiée au siècle dernier, possède une belle façade renaissance.","habitants":"Malitourne; Geuffroin le Vavasseur                                                      Motte, Famille Thibergeau\r\n        \"","divers":"A Flée  le  château d'Ourne grav-2, la Motte-Thibergeau grav-3,  Malitourne grav-4 et la Chevalerie grav -1.                                                            Malitourne GPS : 47° 43' 58\" Nord et 0° 27' 11\" Est                                  Ourne  GPS : 47° 43' 58\" Nord et 0° 27' 11\" Est                                                  Motte Thibergera 47° 44' 09,87\" N, 0° 27' 32,71\" E","gps":"47° 43' 58\" Nord et 0° 27' 11\" Est","images":["../../jctruffet.com/image/image_72/72_Fl%c3%a9e_1.jpg","../../jctruffet.com/image/image_72/72_Fl%c3%a9e_2.jpg","../../jctruffet.com/image/image_72/72_Fl%c3%a9e_3.jpg","../../jctruffet.com/image/image_72/72_Fl%c3%a9e_4.jpg"]},"Consult_chateau_formulairecfca":{"id":"Consult_chateau_formulairecfca","dept":"72","canton":"Le Lude","commune":"Chenu","nom":"Forgeais","type":"Château","periode":"XVI-XIX","histoire":"FORGEAIS,  les origines du château de Forgeais restent mystérieuses. Il faut noter son emplacement le long d'un ruisseau qui marque plus ou moins les limites entre l'Anjou et la Touraine. Comme d'autres sites médiévaux voisins .La Courante à Luché et la Roche à Saint-Germain-d'Arcé), l'implantation du logis est liée à celle d'un moulin à eau. Il reste peu de chose sinon un édifice de plan massé bordé d'un fossé sec à l'arrière. Les plus anciens témoignages manuscrits sur Forgeais font état d'une famille du Juglard, au moins depuis début du XVIIe siècle. Le domaine en indivision est vendu en 1835 à Louis Jules Rousseau et à son épouse Madame de Maupas, en 1849 à un certain Rey puis à Maheux et enfin en 1930 à M. Budan de Russé.","architecture":"FORGEAIS, le château actuel est le résultat de profonds remaniements. De la petite forteresse construite sur une plate-forme fossoyée, il ne reste que les vestiges d'une tour probablement médiévale, flanquée d'un bastion du XVIe siècle lui-même tronqué. Un logis dont on ne peut pas définir le plan masse fut sûrement mis au goût du jour au début du XVIIe siècle (baies arrières). Une première façade de style XVIIIe siècle ou néo-classique fut édifiée à la fin du XVIIIe siècle et en partie complétée ou refaite vers 1897. Même si l'escalier en bois dans oeuvre est à l'emplacement de la bonne travée de baies, il n'est plus celui d'origine. Les communs et la ferme ont été très remaniés, démolis et reconstruits. La ferme jadis concentrée au nord du logis tournait autour du colombier carré. Il est difficile de fixer avec exactitude l'emplacement de la chapelle Sainte-Barbe. Elle pouvait être à l'ouest du pigeonnier où un petit bâtiment renferme encore quatre culots dans les angles auraient pu supporter une fausse voûte. Les communs furent rebâtis au milieu du XIXe siècle. La ferme fut repoussée vers l'est au-delà de la grange : la maison et les étables ont été bâties dans le deuxième quart du XIXe siècle. Le bâtiment des communs avec des chaînages de brique, placé entre le colombier et la chapelle, est construit dans la deuxième moitié du XIXe siècle.","habitants":"famille du Juglard\r\n        \"","divers":"Château de Forgeais à Chenu","gps":"","images":["../../jctruffet.com/image/image_72/72_Forgeais_1.jpg"]},"Consult_chateau_formulaire6cd9":{"id":"Consult_chateau_formulaire6cd9","dept":"72","canton":"Bonnétable","commune":"Souligné sous Ballon","nom":"Freslonnière","type":"Château","periode":"XVII-XVIII","histoire":"FRESLONNIERE, la seigneurerie de La Freslonnière, propriété de la famille Maridort, était une châtellerie, composée des seigneuries de Courceboeufs et de Saint-Rémy -des-Bois. Cette famille serait venue dAngleterre et issue de la famille de Maldoc, vivant à Londres en 1346, dont lun deux, aurait été avec Edouard, roi dAngleterre, et le prince de Galles, à la bataille de Crécy. Le plus ancien membre connu de cette famille est Jacques de Maridort, marié en 1370 avec Marie Françoise Becquet, dame des Epinais à Souligné. Elle est fille unique de Guillaume Becquet, seigneur de Vaux, de château-Sénéchal et de lAthuisière, conseiller et maître dhôtel de la reine de Sicile. Françoise de Maridort née en 1554, épousa Jean de Coesmes, seigneur de Lucé et de Bonnétable, le 13 décembre 1573 après le contrat de mariage, La Freslonnière passa dans cette famille. En 1699, le château est vendu à Marie-Suzanne Guyhou, femme de chambre de la marquise de Sourches. Elle est la fille de Robert Guyou , agent des affaires de la comtesse de Montsoreau. Marie-Suzanne Guyhou est lépouse en biens séparés de Paul Poisson de Bourvallais, secrétaire du roi. ensuite elle est acquise le 19 août 1735 par Michel Coupart de la Blotterie., propriété de M. et Mme Després depuis 1981, l'édifice a été entièrement restauré.","architecture":"FRESLONNIERE, le nouveau château est construit, de 1701 à 1707, sur les fondations de lancien dont il subsiste une partie du pignon Nord-Est. Elle fait également reconstruire la chapelle Saint-Jacques, mais cette dernière tombera assez rapidement en ruines, et sera démolie. En 1725, La Freslonnière appartient aux héritiers de Marie-Suzanne Guyhou,  Une visite est commencée à partir du 13 octobre 1732 et se termine le 2 janvier 1733 pour examiner et estimer lensemble du domaine qui est constitué à Souligné sous Ballon du château de La Freslonnière, la Basse-Cour, la métairie du Jardin, de la Motte, les lieux de Livet, des Noyers, de Château Gaillard, du Colombier, de La Ponticière et des Landes, le moulin de LAunay, la maison de La Bourgeoiserie, la métairie de La Planche, la métairie de La Roche du milieu, la métairie de LAnge Marie, la métairie de Courtéan, la métairie des Epinais, la métairie du Mesnil.","habitants":"Famille Maridort\r\n        \r\n        \"","divers":"a Souligné sous Ballon château de la  Freslonnière","gps":"","images":["../../jctruffet.com/image/image_72/72_Freslonni%c3%a8re_1.jpg","../../jctruffet.com/image/image_72/72_Freslonni%c3%a8re_2.jpg","../../jctruffet.com/image/image_72/72_Freslonni%c3%a8re_3.jpg","../../jctruffet.com/image/image_72/72_Freslonni%c3%a8re_4.jpg"]},"Consult_chateau_formulaire11ec":{"id":"Consult_chateau_formulaire11ec","dept":"72","canton":"Sillé-le-Guillaume","commune":"Fresnay sur Sarthe","nom":"Fresnay_Sarthe","type":"Vestige-Château","periode":"IX-XV-XVI","histoire":"Trois châteaux à Fresnay sur Sarthe dont Fresney, Echenay et Cerisay.                                                                                                                     FRESNEY, au XIe siècle  à la famille de Beaumont seigneur de Fresnay en 1356 les anglais s'emparent de la forteresse, Hugues II de Beaumont se retire dans son château de Sainte Suzanne et reprendra possession de Fresnay en 1360 mais sera reprit par les anglais  jusqu'en 1450   repris par jean II duc d'Alençon et par le connétable de Richemont, le duché de Beaumont de Françoise d'Alençon épouse de Charles de Bourbon duc de Vendôme et la première titulaire en 1543. Antoine de Beaumont époux de Jeanne  d'Albret, reine de Navarre. En 1589 René de  de Saint-Denis de Hertré s'empare du château au nom d'henri IV, en 1592 recevra pour prix de ses services la baronnie de Fresnay réunie en 1607 avec l'ensemble du duché de Beaumont au domaine de la Couronne, le château tombe progressivement en ruine, la porte d'entée abrite aujourd'hui un musée de Coiffes cette  porte  fortifié  permet d'accéder à la ville.","architecture":"FRESNEY, enceinte du IXe siècle, des éléments y subsistant tels la porte, les traces du donjon sur le mur nord (appareillage de pierres de chevrons), l'ancien grenier à sel qui abrite actuellement la salle Georges Durans, les restes de deux tours de guet sur la partie nord, les bases de la salle des gardes sur la proue du rocher, une petite poterne murée qui donnait accès au pont, la chapelle Saint-Nicolas au sud et une porte à herse sous le chemin de ronde. La poterne constitue la partie la mieux conservée de l'ancienne forteresse, formée de deux tours rondes flanquées de meurtrières réunies par un bâtiment qui abritait la herse et la machinerie du pont-levis dans les tours d'entrée. lLe donjon rectangulaire était une salle, un corps de logis plus élevé que les autres bâtiments et les murs plus épais. Le château a servi de prison puis de logement des gardes et abrite le musée des coiffes. Ses oubliettes au rez-de-chaussée peuvent être visitées en même temps que le musée des coiffes.Éléments protégés MH : le château de Fresnay : inscription par arrêté du 9 décembre 1926.                                                                                                    A cinq kilomètres au nord à Assé la Boisne le château  d'Echenay.   ECHENAY, la construction du manoir date du XVe et XVIe siècle. Le manoir de l'Echenay est inscrit aux M.H. depuis 1969,  et le château   CERISAY,  a été construit au Moyen-Âge, de larges ouvertures sont percées à la Renaissance dans le bâtiment d'origine et modification de la charpente afin de créer des toitures élancées. Une nouvelle chapelle réalisée par l'architecte Vérité, remplace au XIXe siècle celle d'origine. Seuls subsistent de la période médiévale les douves, une tour sur la façade nord, la salle des gardes, en cave voûtée avec un cachot, un escalier à vis ainsi qu'une poterne d'entrée avec son pont-levis.","habitants":"Fresnay; famille de Beaumont\r\n        \r\n        \"","divers":"Trois châteaux à Fresnay sur Sarthe dont Fresney grav 1-2-3, Echenay  grav -4 et Cerisay grav-6.                                                                       GPS : 48° 16' 54\" Nord et 0° 01' 04\" Est                                                                     Echenay GPS : 48° 19' 18\" Nord, 0° 00' 23\" Ouest","gps":"48° 16' 54\" Nord et 0° 01' 04\" Est","images":["../../jctruffet.com/image/image_72/72_Fresnay_Sarthe_1.jpg","../../jctruffet.com/image/image_72/72_Fresnay_Sarthe_2.jpg","../../jctruffet.com/image/image_72/72_Fresnay_Sarthe_3.jpg","../../jctruffet.com/image/image_72/72_Fresnay_Sarthe_4.jpg","../../jctruffet.com/image/image_72/72_Fresnay_Sarthe_5.jpg","../../jctruffet.com/image/image_72/72_Fresnay_Sarthe_6.jpg","../../jctruffet.com/image/image_72/72_Fresnay_Sarthe_7.jpg"]},"Consult_chateau_formulaire26ac":{"id":"Consult_chateau_formulaire26ac","dept":"72","canton":"Mamers","commune":"Contilly","nom":"Frébourg","type":"Château","periode":"XIV-XVI-XIX","histoire":"FREBOURG, une branche de la famille De Frébourg s'établit en Poitou et modifia son blason de la façon suivante «d or au chevron de gueules à trois étoiles de sable, deux en chef, une en pointe, au chef d argent chargé d une aigle de sable\".  Antoine de Frébourg, un des membres de cette branche, fut nommé à la direction de l'arsenal de Poitiers par le duc De Guise, en 1569, lors du siège de cette ville par les protestants. Le duc De Guise lui donna l 'intendance des armements du royaume pour les grands secours que Antoine De Frébourg avait amené à l'armée catholique.\r\nIl épousa à Saumur Demoiselle Julienne De Balery dont il eut deux fils. Charles, l'ainé, devint lieutenant du duc de Mayenne.\r\nCette famille fut disgraciée après le massacre des De Guise au château de Blois le 23 décembre 1588. C'est avec la disparition, le 12 octobre 1841 à Alençon, de Joseph Louis Vincent De Frébourg que cette famille s éteint. Sa fille Hyacinthe-Iseulle-Henriette épouse Théodore De Fromont de Bouialle et son fils Joseph Louis décède vers 1827 sans descendance.  Branches principales :  La  famille Guédé,  la famille Vadé, la Famille Benel, et la famille Boulay.  Le château actuel a été construit vraisemblablement au XIXe siècle pour Joseph Louis Vincent de Frébourg, seigneur de Frebourg, officier au régiment de Navarre, et maire de Contilly.","architecture":"FRÉBOURG,  château de Frébourg du XIXe siècle, tours médiévales, est situé à trois kilomètres au nord-est du village. Ses tours ont appartenu à un autre bâtiment construit en 1312, sur les ruines d'une ancienne forteresse élevée, lors de l'invasion de la Neustrie et pays voisins, par un chef qui lui avait donné le nom de \"Frey Bourg\", qui signifie château libre. La chapelle de Saint Hubert, placée dans une de ses tours, que l'on a abattue, possédait une clé nommée la Clé de Saint Hubert. Cet instrument, préservait de la rage, les personnes sur lesquelles il était appliqué dit-on.","habitants":"Famille  d'Antoine de Frébourg,\r\n        \"","divers":"A Contilly château de Frébourg ;                                                     Gps 48° 24' 03\" nord, 0° 22' 09\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_Fr%c3%a9bourg_1.jpg","../../jctruffet.com/image/image_72/72_Fr%c3%a9bourg_2.jpg","../../jctruffet.com/image/image_72/72_Fr%c3%a9bourg_3.jpg","../../jctruffet.com/image/image_72/72_Fr%c3%a9bourg_4.jpg"]},"Consult_chateau_formulaireda6f":{"id":"Consult_chateau_formulaireda6f","dept":"72","canton":"Le Lude","commune":"Luché-Pringé","nom":"Gallerande","type":"Château","periode":"XIV-XV-XIX","histoire":"A Luché-Pringé le château de Gallérande et le manoir de Merve, de Venevelles (voir article) de Pringé.                                                                                                         GALLERANDE, le premier seigneur connu, en 1173, est Garin de Galaranda auquel succède avant 1180 Hugo de Galaranda. Gallerande fut pris par les Anglais.  puis Hamelin de Galaranda, en 1239. Lhéritière de ces 3 seigneurs épousera Robin II de Clermont, qui était son voisin. Au XIVe siècle, Mervé devient la propriété de la famille de Clermont-Gallerande, à la suite du mariage de l'héritière des seigneurs de Mervé avec Jean II de Clermont-Gallerande. Au XVe siècle, Louis de Clermont entreprend la construction du château.  En 1576, la terre de Gallerande est érigée en marquisat pour Georges Ier de Clermont-Gallerande.  Ce couple fut à lorigine de la Famille de Clermont-Gallerande qui conservera le château de Gallerande jusquà la Révolution. Louis II de Clermont-Gallerande fera transformer la forteresse en une belle maison dhabitation. La Famille de Sarcé le rachètera en 1822 dont descend la Famille de Ruillé qui appartenait à l'Ordre de Malte. Au décès de la Comtesse de Ruillé, il fut légué à cet ordre, puis revendu à un américain. En 1576, la terre de Gallerande est érigée en marquisat pour Georges Ier de Clermont-Gallerande. En 1822, le château de Gallerande est vendu à la famille de Sarcé. En 1985, Anne de la Planche de Ruillé, meurt en léguant la propriété à l'Ordre de Malte.","architecture":"GALLERANDE,  c'était une forteresse défensive édifiée au XIe siècle. Une pierre tombale le représente dans léglise de Luché. A cette époque le château est remanié avec de vastes fenêtres à meneaux percées dans les épaisses murailles, des mâchicoulis simulés plus décoratifs que défensifs, des tours, des toitures coniques et des chemins de ronde couverts. Ancienne forteresse transformée en résidence de plaisir à la Renaissance. Donjon octogonal dans l'angle formé par le corps de bâtiment en équerre, couronné de trompes supportant un toit pyramidal sur plan carré                                                                                         MERVE  Les origines de Mervé remontent au Moyen Âge, à l'époque où le  Un moulin fortifié est construit au cours du XVe siècle sur la rive gauche du Loir, à proximité du château-fort. Dès 1467, les seigneurs de Mervé re
