res du château, à l'exclusion de celles du bâtiment des communs accolés à l'ouest ; l'oratoire au rez-de-chaussée de la tour nord-ouest ; les caves voutées et les pièces en sous-sol : inscription par arrêté du 27 juin 1984., se composait d'un très joli château, jardins, bosquets, parc, bois d'agrément, garennes, vergers, vignes et prairies, le tout d'une contenance de 34 hectares 65 ares, dont 20 hectares de prairies, faisait les réserves du propriétaire; des bois, contenant 45 hectares, des fermes de Roches, de Migeloup, du Vivier, de la Tuilerie et de la Cour, contenant ensemble 93 hectares de bonnes terres labourables et 13 hectares de pré.","habitants":"Seigneurs locaux\r\n        \"","divers":"le château des Roches à  Sceaux-sur-Huisne","gps":"","images":["../../jctruffet.com/image/image_72/72_Roches_Sceaux_1.jpg","../../jctruffet.com/image/image_72/72_Roches_Sceaux_2.jpg","../../jctruffet.com/image/image_72/72_Roches_Sceaux_3.jpg"]},"Consult_chateau_formulaire4176":{"id":"Consult_chateau_formulaire4176","dept":"72","canton":"Ecommoy","commune":"Marigné-Laillé","nom":"Ronceray_Pilletiere","type":"Château","periode":"XV-XVII-XIX","histoire":"A 10 Kilomètres à l'Est à Jupilles le château de Pilletière.              RONCERAY, propriété de Jules Dinaux des Arcy au début du XIXe siècle,  le 30 juillet 1752, le pape Benoît XIV accorde la translation des reliques de saint Spéciaux, martyr, et de saintes Simplicie et Probe, martyres, à l'église de Marigné-Laillé à condition qu'on ne pourra faire des offices de mémoire, mais seulement les exposer à la vénération.  Louis Jousse était le premier maire de Marigné (1792) ; il est né à la Gilardière (maison qui existait encore en 1955) et est mort en 1814 à 79 ans, veuf.    La maison de Jeanne d'Arc ou la maison des Anglais : d'après les habitants cette maison aurait été bâtie pendant la guerre de Cent Ans. La pucelle d'Orléans y aurait séjourné lors de la guerre qu'elle menait contre les Anglais. La certitude est que cette maison est un ancien relais postal. Cette maison a conservé son perron (double escalier), de plus le lieu-dit s'appelait le Grand Perron avant qu'il n'obtienne un numéro.                                                                              PILLETIERE,  était un fief qui s'étendait sur les paroisses de Jupilles et de Thoiré. En 1341 Jeanin Pillet rend aveu pour l'hébergement de la Pilletière. Fronton triangulaire portant notamment les initiales entrelacées C et F pour Charles Henri Chadrin et son épouse Marie Théodore Mélanie Frechot.","architecture":"PILLETIERE, le  château peut dater du tout début du XVIIe siècle, cantonné de petits pavillons bastionnés. Il a été agrandi et profondément remanié sous le Directoire et au milieu du XIXe siècle. Le château a été construit sur un plateau surplombant la vallée du Dinan, stratégiquement à mi-chemin sur la route de Château-du-Loir au Grand-Lucé. Il est composé d'un logis bastionné de plan massé. Un jardin clos type potager s'étendait derrière. Il est aujourd'hui au centre d'un petit parc paysager. Le logis fut régularisé au XIXe siècle : l'aile en retour fut supprimée et une petite tourelle fut accolée au centre de la façade postérieure. La façade antérieure sur cour fut monumentalisée par l'ajout vers 1848 d'un avant-corps central couvert d'un fronton triangulaire portant notamment les initiales entrelacées C et F, et deux canons d'artillerie avec leurs munitions. La distribution intérieure du logis avec la multiplication des escaliers témoigne des bouleversements successifs.\r\nRONCERAY,  le château du Ronceray fait l'objet d'une importante restauration en 1847 par le célèbre architecte Manceau Pierre Félix Delarue. Ainsi des tours cylindriques sont ajoutées dans les angles et une tour polygonale au milieu de la façade. Tous les encadrements de baies son réalisés dans le style du XVe siècle, à la façon des fenêtres du château de la Flotte. Ajout de créneaux et d'un petit balcon décoré d'une balustrade à remplages sur la grosse tour circulaire.","habitants":"Famille de Louis Jousse \r\n        \r\n        \r\n        \"","divers":"Ronceray  gps   47° 49' 08\" nord, 0° 20' 23\" est                                                A 10 kilomètres à l'Est à Jupilles le château de Pilletiére,","gps":"","images":["../../jctruffet.com/image/image_72/72_Ronceray_Pilleti%c3%a8re_1.jpg","../../jctruffet.com/image/image_72/72_Ronceray_Pilleti%c3%a8re_2.jpg","../../jctruffet.com/image/image_72/72_Ronceray_Pilleti%c3%a8re_3.jpg","../../jctruffet.com/image/image_72/72_Ronceray_Pilleti%c3%a8re_4.jpg"]},"Consult_chateau_formulaire1fd2":{"id":"Consult_chateau_formulaire1fd2","dept":"72","canton":"Suze sur sarthe","commune":"Roézé sur Sarthe","nom":"Roézé_Mondan","type":"Château","periode":"XV-XVI-XVIII","histoire":"BEUNECHE, la Beunèche est un manoir de la fin du XVe début XVIe siècle, de Renaissance italienne, construit par la famille de Jalesnes.  \r\n Le nom de La Bunayche, terre et moulin, apparait au XIIe siècle. De 1451 à 1661, le manoir sera aux mains des Jalesnes puis il passe aux Le Boindre, famille de magistrats, et y restera jusqu'en 1759; Daniel de Beauvais achète le manoir voisin du Gros Chesnay et son fils reçoit le manoir de la Beunêche, qui restera dans cette famille pendant tout le XIXe siècle avant de passer par héritage aux Fromont de Bouaille.  Le manoir a été construit pour Claude de Jalesnes et son épouse Renée de Vandomois, avant la construction du moulin qui, lui date de 1553. Le manoir de la Beunêche est classé au titre des M.H. le 24/04/1950.                                                                                                             A cinq kilomètres àu sud est à Guécélard MONDAN, la seigneurie de paroisse était annexée à la terre de Mondan, suivant l'aveu rendu en 1342, au baron de Château-du-Loir, par Jean Prel sire de Mondan. Cette terre appartenait à M. le marquis de Broc. Mondan est ravagé le 16 Septembre 1380 par l'armée anglaise. Reconstruit, il apparaît que ce corps de logis a remplacé une construction plus ancienne, vraisemblablement celle démantelée durant la tourmente révolutionnaire. En effet, le château actuel, propriété des Tanneurs de la Suze, date des XVIIIe et XIXe siècles.","architecture":"BEUNECHE, ce manoir de la Renaissance italienne, élevé au XVIe siècle, se compose d'un corps de logis principal avec une tour à l'angle sud est et des tourelles au nord, la Beunêche dresse sa belle façade au sud, elle est ornée de deux séries de fenêtres à croisée, surmontées de lucarnes à fronton triangulaire, à baies géminées dont la décoration s'est peu à peu effacée. A quelque cent mètres au-delà du manoir, un site enchanteur, dont bien des peintres s'inspirèrent, recèle le vieux moulin de la Beunêche qui plonge et replonge sa roue lente dans les eaux calmes de la Sarthe ; le site a perdu tous ses arbres et, avec eux, une partie de son charme et de son enchantement.                                                                                                            MONDAN, plus maison que château,  corps de logis à deux niveaux ; toit à deux pans , accolé  d'une dépendance d'un niveau, la propriété fait 6 ha avec une piscine couverte et chauffée sur place. Maison principale comportant 4 chambres d'hôtes. La rivière la Sarthe longe l'arrière de la propriété","habitants":"famille de Jalesnes. Mondan Marquis de Broc\r\n        \r\n        \r\n        \"","divers":"Deux châteaux à  Roézé; Beunèche grav 1 à 6 et Mondan                                                                                                                                                     Buneche GPS : 47° 52' 46\" Nord, 0° 06' 16\" Est","gps":"47° 52' 46\" Nord, 0° 06' 16\" Est","images":["../../jctruffet.com/image/image_72/72_Ro%c3%a9z%c3%a9_Mondan_1.jpg","../../jctruffet.com/image/image_72/72_Ro%c3%a9z%c3%a9_Mondan_2.jpg","../../jctruffet.com/image/image_72/72_Ro%c3%a9z%c3%a9_Mondan_3.jpg","../../jctruffet.com/image/image_72/72_Ro%c3%a9z%c3%a9_Mondan_4.jpg","../../jctruffet.com/image/image_72/72_Ro%c3%a9z%c3%a9_Mondan_5.jpg","../../jctruffet.com/image/image_72/72_Ro%c3%a9z%c3%a9_Mondan_6.jpg","../../jctruffet.com/image/image_72/72_Ro%c3%a9z%c3%a9_Mondan_7.jpg","../../jctruffet.com/image/image_72/72_Ro%c3%a9z%c3%a9_Mondan_8.jpg","../../jctruffet.com/image/image_72/72_Ro%c3%a9z%c3%a9_Mondan_9.jpg"]},"Consult_chateau_formulaireae52-2":{"id":"Consult_chateau_formulaireae52-2","dept":"72","canton":"Sablé-sur-Sarthe","commune":"Sablé-sur-Sarthe","nom":"Sablé_sur_Sarthe","type":"Château","periode":"XV-XVII","histoire":"Plusieurs châteaux à Sablé sur Sarthe dont Sablé, manoir Giraudet, de Villeneuve, la Martinière,  et de Guivon. Pas d'info pour ces trois derniers.                                                                                                                      SABLE,  au XIe siècle appartient à la maison de Beaumont au XVe siècle  passe aux ducs d'Anjou. et à Louis XI héritier du dernier duc vendu à la maison de Lorraine, la baronnie est cédée en 1593 par Charles de Lorraine duc de Mayenne maréchal de France obtiendra  en 1502 l'érection de Sablé en marquisat son fils épousera Madeleine Souvré , fille de Gilles , marquis de Courtanvaux, maréchal de France, nouveau logis bâti entre 1715 et 1750 par l'architecte Desgots pour Jean-Baptiste Colbert de Torcy, marquis de Sablé,  Jean-Baptiste Colbert de Torcy, ministre des Affaires étrangères de Louis XIV, achète le château de Sablé en 1711. Au XIXe siècle Sablé passera par alliance  aux La Porte de Ryantz, puis  passe ensuite brièvement dans les biens de la famille de Rougé.  Au lendemain de la guerre de 1780 le duc de Chaulnes  acquiert le domaine et le restaure,  Acheté par la famille Williot en 1918, le château est transformé en manufacture de chicorée en 1921. La société Williot fils, fabricants de chicorée dans ses deux manufactures à Poix-du-Nord et à Sablé-sur-Sarthe, développe son activité et sa marque Chicorée Williot sous la direction de Michel Williot, acquis par la ville de Sablé  en 1978. Aujourd'hui centre technique de conservation des documents.                                                                       GUAUTRET, Il fut construit de 1515 à 1750. Un château-fort dont il ne reste que des vestiges est attesté dès le Xe siècle. Le logis qui avait été reconstruit au XVe ou au XVIe siècle a lui aussi été détruit. C'est devenu le Centre Technique de la Banque National de France.","architecture":"SABLE sur SARTHE, château fort mentionné aux Xe et XIe siècles dont ne subsiste que des vestiges. Logis reconstruit au XVe ou XVIe siècle, détruit. Dans la première moitié du XVIIe siècle, corps postérieur hors-oeuvre,   Des travaux de rénovation commencent en 1715 et se poursuivent jusqu'en 1728, mais ce n'est qu'en 1741 qu'est achevée la décoration intérieure. Remaniement du logis pour le duc de Chaulnes par l'architecte Lafenestre en 1870, escalier tournant à retours orné de ferronnerie, vestibule, salons. Garenne mentionnée au XIVe siècle sur les communes de Sablé et Courtillers, actuellement en vestiges    Destruction partielle vers 1773 de l'enceinte datant du XIIIe ou XIVe siècle. Jardin régulier, bassin réalisés entre 1715 et 1750, au 3ème quart XIXe siècle, jardin en partie détruit et converti en jardin paysager avec portail en ferronnerie. En 1919 l'édifice est converti en manufacture de chicorée.  Son parc sont classés aux M.H. depuis 1983. L'architecte du château de Sablé-sur-Sarthe est Mr Desgots, est devenu le Centre Technique .  Éléments protégés MH : les façades et les toitures des communs : inscription par arrêté du 16 octobre 1983.","habitants":"Sablé;Famille de Jean-Baptiste Colbert de Torcy et  famille de Rougé\r\n        \r\n        \r\n        \"","divers":"Plusieurs châteaux à Sablé sur Sarthe dont Sablé grav 1-2-3, manoir Giraudet grav-5, de Villeneuve gracv-6, la Martinière grav 7,  et de Guivon grav_4.               .                                                     Sablé GPS : 47° 50' 17\" Nord, 0° 19' 58\" Ouest","gps":"47° 50' 17\" Nord, 0° 19' 58\" Ouest","images":["../../jctruffet.com/image/image_72/72_Sabl%c3%a9_sur_Sarthe_1.jpg","../../jctruffet.com/image/image_72/72_Sabl%c3%a9_sur_Sarthe_2.jpg","../../jctruffet.com/image/image_72/72_Sabl%c3%a9_sur_Sarthe_3.jpg","../../jctruffet.com/image/image_72/72_Sabl%c3%a9_sur_Sarthe_4.jpg","../../jctruffet.com/image/image_72/72_Sabl%c3%a9_sur_Sarthe_5.jpg","../../jctruffet.com/image/image_72/72_Sabl%c3%a9_sur_Sarthe_6.jpg","../../jctruffet.com/image/image_72/72_Sabl%c3%a9_sur_Sarthe_7.jpg"]},"Consult_chateau_formulaire195f":{"id":"Consult_chateau_formulaire195f","dept":"72","canton":"Changé","commune":"Saint-Mars-Outille","nom":"Sargé_Segrais_St_Mars","type":"Château","periode":"XVII-XVIII","histoire":"A Sargé, le château de Grammont, du XVIIIe siècle, et vestiges du prieuré de Grandmont, du XIIe siècle, en Bercé.   Château (ancien) de la Fontaine à Outillé, dont il ne reste aujourd'hui que quelques bâtiments des communs et un pigeonnier. Le château avait été reconstruit aux XVIIe et XVIIIe siècles.   La Blanchardière du XVIIe-XIXe siècles d'Octave à d'Yzeux.                                                                                                                       SEGRAIS en 1940, le château de la Blanchardière est occupé par les troupes allemandes  et le général Dollmann commandant de la VIIe armée. Ce dernier y fait construire un blockhaus en 1943. Il assure la défense de la Bretagne et de la Normandie jusquen 1944. Il est notamment responsable de la prévention dune invasion alliée en zone occupée. Ses bureaux sont aux Mutuelles du Mans rue Chanzy. Fin 2006, le château de Segrais a été racheté par l'association NKT-IKBU et abrite maintenant un centre de méditation bouddhiste de la nouvelle tradition Kadampa. Dans la salle de méditation principale, de grandes statues des principaux bouddhas de cette tradition sont présentes : Bouddha Shakyamouni, Tara Verte, Avalokiteshvara à quatre bras, Djé Tsongkhapa et ses fils, Dorjé Shougdèn et ses 5 lignées. Les statues de Tara Verte et de Avalokiteshvara à 4 bras ont été fabriquées au studio d'art du centre mère de la tradition en Angleterre et ont été peintes et décorées à la feuille d'or au Centre de Méditation Kadampa France.","architecture":"SEGRAIS Sur des fondations dun château féodal antérieur au Xe siècle, le château actuel a été reconstruit à la fin du XVIIIe siècle ; Les hauts bâtiments sont vastes et sobres avec le corps de logis principal orienté est-ouest, la cour et son entrée étant à loccident.\r\nLun des pavillons en redents du XVIIIe a été conservé dans langle nord-est de ce bel ensemble architectural aux pierres blanches. Des douves, ou larges fossés remplis deau, ceinturent en rectangle : bâtiments, terrasses et jardins.  Le château de Segrais, situé sur la commune de Saint Mars d'Outillé, au sud du Mans en Sarthe est un monument du XVIIIe siècle. Bâti sur le radier d'une ancienne citadelle féodale du XVe siècle, le château de Segrais. Les édifices élevés sont spacieux et épurés. Le corps de logis central est orienté en est-ouest, la cour et son entrée sont elles exposées à louest. Un seul et unique pavillon d'origine a été sauvegardé du côté nord-est de cette magnifique uvre architecturale aux belles pierres blanches. Les douves, remplies deau, présentent une forme rectangulaire qui entourent les bâtiments, terrasses et jardins. Une chapelle voûtée en lambris de bois cachent des bouts confinés de lattes moulurées. En renfoncement, un beau et raffiné retable classé en marbre gris présente des sculptures témoignant d'une scène d'époque. Autrefois, maison de repos, l'activité des lieux a été transférée sur la ville du Mans.                                                                                                                      SAINT MICHEL, à  Sargé les le Mans, Au début du XIXe siècle, sur une terre sans fief nommée la Fouasserie, M. Bayard de la Vingterie, fils de l'ancien lieutenant criminel au bailliage de Belesme, fait construire un château. Après avoir été vendu plusieurs fois, celui-ci reçoit en 1895 un nouveau propriétaire, le maquis de Prunelé, qui fait construire une chapelle privée et donne le nom de Villa Saint-Michel à la propriété. En 1911, le pape Pie X autorise la célébration des messes dans la chapelle privée.","habitants":"Segrais; Bouddha Shakyamouni,                                                      ST-Michel; M. Bayard de la Vingterie\r\n        \r\n        \r\n        \"","divers":"Sargé 48° 02' 01\" nord, 0° 14' 25\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_Segrais_St_Mars_1.jpg","../../jctruffet.com/image/image_72/72_Segrais_St_Mars_2.jpg"]},"Consult_chateau_formulaire9c6b":{"id":"Consult_chateau_formulaire9c6b","dept":"72","canton":"La Fléche","commune":"Chemiré le Gaudin","nom":"Sauvagère","type":"Château","periode":"XVII-XIX","histoire":"Deux châteaux à Chémiré le Gaudin dont la Sauvagère et le Manoir de Préau. Belle-fille voir article.                                                                                                   SAUVAGERE est construit au XVIIe siècle pour Charles Le Vayer. La terre est citée pour la première fois au début du XIIIe siècle, l'édifice appartenait à Nicolas du Désert. Au décès de Guillaume du Désert, petit-fils de Nicolas, la propriété passe à Jean Didon et Guillaume Goupil. Puis par mariage, il appartient à Martin Talluet vers 1450. En 1561, une période faste commence pour la demeure acquise par Charles le Vayer, sieur de la Timonière, ii fait édifier le portail dhonneur qui joue sur lalternance des pierres sombres de roussard et du calcaire clair de Bernay. C'est Pierre le Vayer qui réalise l'aile actuelle, les quatre lucarnes du deuxième étage de la partie centrale de l'édifice et les lanternons sur les deux tours de la cour dhonneur. En 1691, la propriété passe dans la famille de Seguin, il est ensuite vendu en 1716 à François de Maurepas qui le revend vers 1735 à Bon de Jupilles, la décoration du salon date de cette époque avec les cheminées. Puis la Sauvagère est léguée en 1968, à lHôpital de Sablé. En 2006, le château a été vendu aux enchères publiques par lHôpital à M. J-F Coué.","architecture":"SAUVAGERE, c'est un ancien château fort. Le château de la Sauvagère fut construit, au XVIIe siècle pour Charles Le Vayer, puis au XVIIIe et XIXe siècle. Le château la Sauvagère est devenu la propriété de l'hôpital de Sablé (centre de repos), avec son portail dont la construction en bossage fait alterner les pierres de roussard et les pierres blanches.Cest Charles Le Vayer avec son épouse Françoise Dagues qui fait construire le portail dhonneur et, probablement, la grande allée qui va rejoindre la route du Mans. Ce portail, classé M.H. , joue sur lalternance des pierres sombres de roussard et du calcaire clair de Bernay. On retrouve ce type de décor sur la porte dentrée de la Maison ainsi que sur la porte de lautre façade. Cest aussi de cette époque que date un écusson de pierre au-dessus de la fenêtre représentant les armes des Le Vayer. Le portail du château de la Sauvagère est inscrit aux M.H. depuis 1928.                                                                                                                                      Manoir du Préau.","habitants":"Famille de Charles le Vayer\r\n        \r\n        \"","divers":"Deux châteaux à Chémiré le Gaudin dont la Sauvagère et le Manoir de Préau                                                                     Sauvagère GPS : 47° 55' 51\" Nord et 0° 00' 32\" Ouest                                             Préau","gps":"47° 55' 51\" Nord et 0° 00' 32\" Ouest","images":["../../jctruffet.com/image/image_72/72_Sauvag%c3%a8re_1.jpg","../../jctruffet.com/image/image_72/72_Sauvag%c3%a8re_2.jpg","../../jctruffet.com/image/image_72/72_Sauvag%c3%a8re_3.jpg","../../jctruffet.com/image/image_72/72_Sauvag%c3%a8re_4.jpg","../../jctruffet.com/image/image_72/72_Sauvag%c3%a8re_5.jpg","../../jctruffet.com/image/image_72/72_Sauvag%c3%a8re_6.jpg"]},"Consult_chateau_formulaire527f":{"id":"Consult_chateau_formulaire527f","dept":"72","canton":"Sillé-le-Guillaume","commune":"Sillé le Guillaume","nom":"Sillé_le_Guillaume","type":"Forteresse","periode":"XI-XVII","histoire":"SILLE le GUILLAUME, la forteresse  fut assiégée par les Manceaux puis prise par Guillaume Le Conquérant. A la fin du XIVe siècle, les armées anglaises ravagent les provinces. Sillé-le-Guillaume tombe. Au XVe, elle est reprise puis reperdue au profit des Anglais, confortée par sa victoire à Azincourt en 1415,  en  1425 démantèlement du château sur ordre de Salidsbury. En  1466  Bertrand de Beauvau  sénéchal d'Anjou reconstruit le château;  par alliances successives le château échoit   à la fin du XVIe siècle à Charles de Cossé-Brissac maréchal de France, puis le duc de la Meilleraye devient propriétaire et acquis en 1684 par le roi en personne Louis XIV et y installe sa fille la princesse de Conti  les maîtres successifs les ducs de la Vallière  et de Chatillon, seuls les ducs d'Uzès organisent une chasse à courre après la Révolution, Le château de Sillé-le-Guillaume servit de lycée, au XIXe siècle avant d'être racheté par la commune de Sillé-Le-Guillaume. attribué à la commune avec des campagnes de Restauration, aujourd'hui siège des services municipaux. Éléments protégés MH : le château de Sillé le Guillaume en totalité : classement par liste de 1889.","architecture":"SILLE le GUILLAUME, la  construction du château de Sillé le Guillaume date du XIe au XVIIe siècle. C'est un château fort de style Moyen-Age central. Son propriétaire initial était le Baron de Sillé qui avait fait du château, une place forte. Le château quadrilatère  cantonné de  4 tours  à mâchicoulis couronnées de toitures coniques, trois de ces tours sont reliées  par deux longs corps de Logis de construction plus tardive XVIe-XVIIe siècle  sur le front sud-ouest  protégé par une ancienne barbacane  défendant un châtelet d'entrée à mâchicoulis  dans lequel un porche s'encadre  entre deux  tours jumelles la tour de gauche est accolée à une porte piétonne surmontée d'une herse autrefois desservie par un pont-levis.  Un donjon de taille imposante coiffé de mâchicoulis  de 38m de haut pour une circonférence de 14 mètres , ainsi que d'un logis. Enfin, Ambroise de Loré, âme de la résistance à l'Anglais dans le Maine, délivre la ville au milieu du XVe siècle. L'une des quatre tours du bâtiment. La place forte, étant proche de la Bretagne et de la Normandie, a été le théâtre de nombreuses batailles, dont les assauts de Guillaume le Conquérant ou de l'armée anglaise durant la guerre de Cent Ans. D'ailleurs de ce donjon, que le général Chanzy assista en janvier 1871, à l'un des derniers combats de l'armée de la Loire.  Elle sera prise et reprise plusieurs fois par chacune des parties. Endommagée, elle est renforcée au XVe siècle par le baron mais l'arrivée de la poudre à canon va rendre cette restauration inutile. Au XVIe et XVIIe siècle, elle est rendue plus habitable par ses occupants.  De nouvelles ailes construites aux XVIe et XVIIe siècles lui donnèrent un aspect plus résidentiel et plus pacifique.","habitants":"Maréchal de France Charles de Cossé-Brissac \r\n        \"","divers":"GPS : 48° 11' 06,17\" Nord, 0° 07' 34,41\" Ouest","gps":"48° 11' 06,17\" Nord, 0° 07' 34,41\" Ouest","images":["../../jctruffet.com/image/image_72/72_Sill%c3%a9_le_Guillaume_1.jpg","../../jctruffet.com/image/image_72/72_Sill%c3%a9_le_Guillaume_2.jpg","../../jctruffet.com/image/image_72/72_Sill%c3%a9_le_Guillaume_3.jpg","../../jctruffet.com/image/image_72/72_Sill%c3%a9_le_Guillaume_4.jpg","../../jctruffet.com/image/image_72/72_Sill%c3%a9_le_Guillaume_5.jpg","../../jctruffet.com/image/image_72/72_Sill%c3%a9_le_Guillaume_6.jpg","../../jctruffet.com/image/image_72/72_Sill%c3%a9_le_Guillaume_7.jpg","../../jctruffet.com/image/image_72/72_Sill%c3%a9_le_Guillaume_8.jpg"]},"Consult_chateau_formulairef993":{"id":"Consult_chateau_formulairef993","dept":"72","canton":"Savigné-l","commune":"Sillé-le-Philippe","nom":"Sillé_le_Philippe","type":"Château","periode":"XVI-XIX","histoire":"Il existe 4 châteaux sur la commune à découvrir :  Passay,  Chanteloup  Bois-Doublé et Boisrier de M. de Vanoise.                       PASSAY, le château de Passai ou Passay, situé sur le bord de la Vive-Parance, qui l'embellit de ses eaux, parait avoir été construit à deux époques différentes, dont la plus ancienne, ne remonte pas au-delà du XVIe siècle. Il n'a rien de remarquable dans sa construction, que ses mansardes coupant le toit, et ses deux pavillons formant avant-corps, aux deux extrémités de sa façade principale, à toits élevés et pointus, qui paraissent de style de la Renaissance. Ce bâtiment est agréablement situé au milieu d'un bois de haute futaie, bien percé, avec d'innombrables plantations de peupliers, dues sans doute aux deux derniers possesseurs.La construction du château date du XVIIe siècle. Le Décor sculpté de la façade a été restauré, en 1907, par le sculpteur  A. Cottereau. Le château de Passay est inscrit aux M.H. depuis le 12/07/1993, pour ses façades, les toitures , les douves et le pavillon.                                                                                                                    BOIS-DOUBLE, construit en 1625 par Étienne Godefroy, compagnon d'armes du maréchal de Lavardin, fidèle partisan du roi Henri IV, est décoré par un peintre d'Amiens, Adam Tardieu. Dès 1902, le baron Lucien Leret d'Aubigny, propriétaire des lieux, en entreprend la restauration. Il adopte le style Renaissance, ajoutant au milieu du bâtiment une magnifique tourelle. Les peintures consacrées aux faits d'armes du maréchal de Lavardin méritent l'attention des artistes, des archéologues et des amateurs.","architecture":"CHANTELOUP, il est bâti par Madame Marie-Louise Comtesse Ogier née Eynaud en 1814, son mari Jean-Louis Comte Ogier meurt en 1811; elle y habita jusqu'en 1831 puis devient la propriété du vicomte Achille Ogier puis de son fils Vicomte Alfred Ogier jusqu'en 1857 où le château est vendu et décède à Paris en 1876  .Depuis 2020, il appartient à Valérie et Benoit Dores. magnifique bâtiment du XVe siècle.                                                                                                                            A cinq kilomètres au Nord à Beaufay le château du Plessis.                         PLESSIS, la seigneurie de paroisse était un membre de celle de Bonnétable et appartenait à la maison de Luynes à l'époque de la Révolution. Il s'y trouvait plusieurs fiefs dont la châtellenie de Saint-Cher était le principal ; la Loge, le Plessis, la Huperie, les Landes et La Patrière. La terre du Plessis appartenait à la famille de Thieslin dont les membres possédaient également le château d'Aulnais à Torcé. Le 26 septembre 1677, fut inhumé à Torcé René de Thieslin, écuyer, seigneur du Plessis, seigneur des Aulnais, agé de 70 ans. Le château du Plessis situé à Beaufay a été construit en 1689.       \r\nÉléments protégés MH : les façades et les toitures du château et des pavillons détachés en façade sur cour et les douves: inscription par arrêté du 12 juillet 1993.","habitants":"Passay ; A. Cottereau.                                                              Plessis, famille de Thieslin                                                        Bois-Doublé; Étienne Godefroy                                         Chanteloup; Jean-Louis Comte Ogier \r\n        \"","divers":"Il existe 4 châteaux sur la commune à découvrir :  Passay grav-5 -6,  Chanteloup grav 3- 4,  Bois-Doublé grav-1 et Boisrier grav-2 de M. de Vanoise. Plessis-Bouffé grav-7 Passey GPS : 48° 06' 06\" Nord, 0° 22' 05\" Est                                                Sillé 48° 06' 28\" nord, 0° 21' 08\" est","gps":"48° 06' 06\" Nord, 0° 22' 05\" Est","images":["../../jctruffet.com/image/image_72/72_Sill%c3%a9_le_Philippe_1.jpg","../../jctruffet.com/image/image_72/72_Sill%c3%a9_le_Philippe_2.jpg","../../jctruffet.com/image/image_72/72_Sill%c3%a9_le_Philippe_3.jpg","../../jctruffet.com/image/image_72/72_Sill%c3%a9_le_Philippe_4.jpg","../../jctruffet.com/image/image_72/72_Sill%c3%a9_le_Philippe_5.jpg","../../jctruffet.com/image/image_72/72_Sill%c3%a9_le_Philippe_6.jpg","../../jctruffet.com/image/image_72/72_Sill%c3%a9_le_Philippe_7.jpg"]},"Consult_chateau_formulaired497":{"id":"Consult_chateau_formulaired497","dept":"72","canton":"Mamers","commune":"St-Aignan","nom":"St_Aignan_72","type":"Château","periode":"XVII","histoire":"SAINT-AIGNAN,   malgré une vie plus austère l'hiver, Éric de Vilmarest aime la vie dans son château de Saint-Aignan, classé M.H.  Il y vit en famille depuis presque vingt-cinq ans.Le Château de Saint-Aignan appartient aujourd'hui à la Famille de Vilmarest qui en a fait son habitation. Il a été inscrit aux M.H. le 12/09/1988.\r\nÉléments protégés MH : les grands tracés du parc ; le pré du jardin ; les douves ; le verger ; le jardin ; l'étang ; le jardin anglais ; le parc et la cour d'honneur : inscription par arrêté du 12 septembre 1988. Le château : classement par arrêté du 7 février 1994. Propriété de Mme Anne Claire de Vilmarest,","architecture":"Saint-AIGNAN, incendié durant les guerres de Religion, le château fut reconstruit en 1680. En extrémité de façade, tour d'angle du XVIe siècle, coiffée d'un dôme. Escalier d'honneur en pierre du XVIIe siècle  Le pavillon central porte un toit à l'impériale surmonté d'un lanternon. Hautes fenêtres au premier niveau sur un entresol voûté. Toits à longs pans avec lucarnes aux frontons curvilignes, ceux du centre étant ornés d'acrotères. Le château est situé à une vingtaine de mètres de la basse-cour.    Premier logis des XVe-XVIe siècles, grand logis principal à pavillon central du XVIIe siècle, pavillon Est et réaménagement de la moitié Est au XVIIIe siècle, aménagement des parterres, jardins et parc à la fin du XVIIIe siècle. Cest sur les ruines dun ancien château forteresse du XIIe siècle que fut érigé  le château de Saint-Aignan, fut reconstruit au XVIIe siècle sur les fondations d'un ancien château fort médiéval. Pendant les guerres de religions lancien château fut incendié et ne subsiste aujourdhui quune tour dangle et les douves. Le château de Saint-Aignan et les terrains compris à l'intérieur des douves ont été classés par arrêté aux M.H. du 7/02/1994. Cest une propriété privée qui se visite ; vous prendrez plaisir à voir, en particulier, à lintérieur lescalier dhonneur en pierre et à lextérieur les jardins et le plan deau. L'actuel château a été construit à partir du XVIIe siècle.  Il est formé d'un grand et long bâtiment rectangulaire avec, en son centre, un pavillon carré surmonté d'un belvédère, d'où un bel escalier de pierres qui dessert l'étage noble.","habitants":"Famille de Vilmarest \r\n        \"","divers":"GPS : 48° 12' 42\" Nord 0° 20' 29\" Est","gps":"48° 12' 42\" Nord 0° 20' 29\" Est","images":["../../jctruffet.com/image/image_72/72_St_Aignan_72_1.jpg","../../jctruffet.com/image/image_72/72_St_Aignan_72_2.jpg","../../jctruffet.com/image/image_72/72_St_Aignan_72_3.jpg","../../jctruffet.com/image/image_72/72_St_Aignan_72_4.jpg"]},"Consult_chateau_formulaire6971-2":{"id":"Consult_chateau_formulaire6971-2","dept":"72","canton":"Sillé-le-Guillaume","commune":"Saint-Aubin-de-Locquenay","nom":"St_Aubin_Locquenay","type":"Forteresse","periode":"XVIII","histoire":"Deux châteaux à Saint-Aubin de  Loquenay dont celui de St-Aubin et celui de Perrochel.                                                                                                    PERROCHEL, le château actuel est dû à René-François-Hortense de Perrochel, né à Saint-Aubin le 28 aoüt 1748; il entreprit sa construction vers la fin de 1784 sur la propriété de l'ancien château de Saint Aubin. Mais la Révolution ne lui laissa pas le temps de l'achever; il dut renoncer à construire le second étage. C'est néanmoins un imposant édifice, un peu trop régulier peut-être dans le style de la fin du XVIIIe siècle, terminé par deux pavillons à ses extrémités, avec treize fenêtres sur la façade et cinq sur les côtés; au-dessus d'un sous-sol, on atteint le rez-de-chaussée par des perrons à doubles rampes. En 1900, le vicomte Amblard de Noailles aménagea l'intérieur en y créant des grands salons, un cabinet de travail, une bibliothèque, qui abritent des uvres d'art et des souvenirs historiques de l'illustre famille de Noailles, complétés par ceux des Caumont-La-Force, M. le duc de La Force, membre de l'Académie française, ayant fait depuis quelques années sa résidence habituelle au château de Perrochel à Saint-Aubin-de-Locquenay.","architecture":"St-AUBIN de LOCQUENAY, vestiges, la terre de Saint-Aubin relevait de la vicomté de Beaumont par la baronnie de Fresnay. Les Boisyvon, connus dès le XIVe siècle, possédèrent la seigneurie du XVe au XVIIe siècle; Le 21 novembre 1660, Jacques Maudet, sieur du Verger et de Guiberne, achetait la terre de Jean de Barat; il était en 1677, maréchal général des logis du roi; sa femme, Anne de Langlée, mourut en septembre 1679 ; leur fils, Jacques Maudet, maréchal-général des camps et armées du roi, épouse en 1687 Marie-Françoise Menjot de Champfleur, mais il meurt à Saint-Aubin le 3 août 1698. Leur fille unique, Marie-Anne-Françoise de Maudet, épouse le 20 mars 1710, dans la chapelle du château, Étienne-Louis-François de Perrochel, chevalier, écuyer, brigadier des armées du roi d'Espagne et enseigne de ses gardes du corps. De l'ancien château de Saint-Aubin, il ne subsiste, à quelque cent cinquante mètres du château de Perrochel, que les communs bâtis autour d'une vaste cour; le corps de logis principal s'élevait un peu en arrière au fond d'une cour d'honneur; au début du XVIIIe siècle, l'évêque du Mans en visite, pouvait y recevoir le gîte avec toute sa suite.   \r\nÉléments protégés MH : les façades et les toitures du château de: inscription par arrêté du 15 mai 1974.","habitants":"vicomte Amblard de Noailles\r\n        \r\n        \r\n        \r\n        \"","divers":"à Saint-Aubin de  Loquenay dont celui de St-Aubin gra-4  et celui de Perrochel grav 1-23.                                                     St-Aubin gps    48° 16' 12\" nord, 0° 01' 25\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_St_Aubin_Locquenay_1.jpg","../../jctruffet.com/image/image_72/72_St_Aubin_Locquenay_2.jpg","../../jctruffet.com/image/image_72/72_St_Aubin_Locquenay_3.jpg","../../jctruffet.com/image/image_72/72_St_Aubin_Locquenay_4.jpg"]},"Consult_chateau_formulaired25f":{"id":"Consult_chateau_formulaired25f","dept":"72","canton":"Le Lude","commune":"Saint Germain d","nom":"St_Germain_d","type":"Château","periode":"XIII","histoire":"AMENON, sur le chemin de la Chapelle-aux-Choux, ce château était possédé, il y a quelques années, par Mme Roulleau d'Amanon, il appartient actuellement à M. Mesnet de la Cour, maire de La Chapelle. L'édifice est un vieux castel, construit sur le revers d'un coteau qui domine le cours du Loir, et plus particulièrement la vallée de la Fare. On ignore l'époque exacte de la construction de cette demeure qu'on voit figurer dans les titres du XIe siècle. C'est un château flanqué de tourelles engagées et d'un donjon, sa façade principale parait être un ouvrage réalisé vers le XIIIe siècle; la tour qui sert de cage d'escalier, à pans coupés, et sa chapelle du style gothique, semblent datés du XVe siècle. Cette tour était auparavant surmontée d'une flèche de quinze mètres de hauteur. . Durant la guerre de 1939-1944, le propriétaire M. Moral meurt en déportation, Madame Moral vend Aménon en 1961 à la ville de Tremblay-lès-Gonesse.                                                                                     CHAUDRUE propriété de Jacques Amelot de la Rousilhe                                                                                            ETIVAL, ce vaste domaine médiéval est placé sur la rive gauche de la Fare. Au XVIIe siècle construction d'un nouveau logis légèrement plus à l'est, agrandi et régularisé dans les années 1660. L'ensemble est reconstruit et complété par une avant-cour suivant le projet de l'architecte Charles Cesvet. Les dispositions actuelles appartiennent, pour l'essentiel, à cette campagne de travaux. Avant 1812, le logis fut simplifié et les distributions intérieures modifiées. Un parc d'agrément fut dessiné entre 1811 et 1845.","architecture":"A l'Ouest de St Germain d'Arcé, à 4 Km au nord du château d'Amenon, un Dolmen important avec menhir couché.  Sur la droite : Chambon, manoir avec chapelle. La GUERINIERE ancien château flanqué de 4 tours avec chapelle en ruines, La Perrière, Etival avec chapelle, colombier, le moulin de la Ronce en dépendait.                                                                                    CHAUDRUE propriété de Jacques Amelot de la Rousilhe                                           ETIVAL,  le logis se trouve au centre d'une composition axée : une longue avenue de plusieurs centaines de mètres de long conduit au portail de l'avant cour des écuries et des communs, puis au deuxième portail de la cour du château (flanqué de deux petits pavillons dont l'un sert de chapelle) puis au logis, et au jardin situé à l'arrière. Face au pignon ouest de la demeure se trouvait le potager divisé en carré avec pigeonnier. Aujourd'hui, la porte centrale du logis donne dans un vestibule qui mène à l'escalier. Autrefois, et probablement dans le premier état, l'escalier était en pierre rampe sur rampe et faisait une avancée sur la façade postérieure. Seule l'amorce de la première volée est conservée aujourd'hui.                                                                                                                              Les ROCHES, en face Amenon, sur le bord de la Fare, La Goumnaudière sur le coteau de la rive droite de la Fare, tout près d'Etival. La Morinette sur la rive gauche de la Fare, CHAUDRUE, La Chaise, Amenon sur la route de la Chapelle aux Choux, flanqué de tourelles engagées et  d'un donjon, sa façade principale paraît être du XIIIe siècle, sa tour et sa chapelle de style gothique sont du XVe siècle.","habitants":"Famille  M. Mesnet de la Cour\r\n        \r\n        \r\n        \"","divers":"A St Germain d'Arcé le château d'Amenon grav-1-2-3-4-5-6-7-8  de Chaudrue-9,  d'Etival  et des Roches                                                       Gps         47° 37' 22\" nord, 0° 17' 29\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_St_Germain_Arc%c3%a9_1.jpg","../../jctruffet.com/image/image_72/72_St_Germain_Arc%c3%a9_2.jpg","../../jctruffet.com/image/image_72/72_St_Germain_Arc%c3%a9_3.jpg","../../jctruffet.com/image/image_72/72_St_Germain_Arc%c3%a9_4.jpg","../../jctruffet.com/image/image_72/72_St_Germain_Arc%c3%a9_5.jpg","../../jctruffet.com/image/image_72/72_St_Germain_Arc%c3%a9_6.jpg","../../jctruffet.com/image/image_72/72_St_Germain_Arc%c3%a9_7.jpg","../../jctruffet.com/image/image_72/72_St_Germain_Arc%c3%a9_8.jpg","../../jctruffet.com/image/image_72/72_St_Germain_Arc%c3%a9_9.jpg"]},"Consult_chateau_formulairee47f":{"id":"Consult_chateau_formulairee47f","dept":"72","canton":"Savigné-l","commune":"Saint-Mars-la-Brière","nom":"St_Mars_Brière","type":"Château","periode":"XV-XVIII","histoire":"St-MARS la BRIERE, la seigneurie de la paroisse est annexée au château de Saint-Mars, celui-ci, dont les origines remontent à l'époque médiévale, est possédé par de puissantes familles : Le château de Saint-Mars-la-Brière appartenait, au XVIe siècle, à la Maison Laval Bois-dauphin puis, au XVIIIe siècle, à la famille Bailly.","architecture":"St-MARS la BRIERE,  date des XVe et XVIIIe siècles, ancien manoir médiéval remanié dans les années 1760, l'édifice se compose d'un grand corps de logis flanqué de deux tours avec une pièce voûtée du XVe siècle, cour au-devant, orangerie, communs, métairie, deux petites tours encadrant la cour d'honneur dont l'une est transformée en pigeonnier. Grand salon à décor de lambris XVIIIe siècle avec cheminée de marbre et trumeaux représentant les saisons, gypserie. Important chartrier conservé au château (XVIe-XIXe siècles).\r\nÉléments protégés MH : les façades et les toitures ; le salon et la salle à manger ; les deux tours et les deux bâtiments de communs : inscription par arrêté du 9 juillet 2001.","habitants":"Famille de Bailly\r\n        \r\n        \r\n        \"","divers":"GPS : 48° 01' 45\" Nord, 0° 22' 22\" Est","gps":"48° 01' 45\" Nord, 0° 22' 22\" Est","images":["../../jctruffet.com/image/image_72/72_St_Mars_Bri%c3%a8re_1.jpg","../../jctruffet.com/image/image_72/72_St_Mars_Bri%c3%a8re_2.jpg"]},"Consult_chateau_formulaire236a":{"id":"Consult_chateau_formulaire236a","dept":"72","canton":"Mamers","commune":"Saint Paterne","nom":"St_Paterne","type":"Château","periode":"XVII","histoire":"SAINT-PATERNE, la seigneurie d'Ozée au XIIe siècle passa aux Samson branche bâtard  des comtes d'Alençon de saint-Paterne passent  au XVe siècle aux le Coustelier qui construisirent le château en 1590 Henri IV y séjourna et bat  les troupes de ligue d'Ivry. Au XVIIIe siècle saisi par décret sur la famille le Coustelier  adjugé à un sieur de Gennes procureur de la sénéchaussée du Mans qui le revend à M. Pineau seigneur de Lucé, son fils lui succèdent aliènent le domaine en 1773 au profit de Thomas René Poullain de Martenai brigadier des armées du roi prendra le titre de comte de St-Paterne le château endommagé en 1792 par une troupe d'émeutiers venue d'Alençon sera restauré par la famille Poullain. En 1889 achat du domaine par Emile Cormaille de Valibray docteur en droit et avocat son épouse Maria Lantaigne aura comme successeur leur fils Emmanuel de Valbray marié en 1919 à Thérése de Lauriston-Boubers . Appartient aujourd'hui à Charles-Henry de  Valbray qui l'ont transformé en chambres d'hôtes.                                                                       CHEVAIN, la seigneurie de paroisse appartenait à la famille du Plessis lors de la Révolution. Madame du Hameau, issue de cette famille possédait le château au XXe siècle. En 1658 et 1666, Christophe de Vallée, chevalier, seigneur de Fyé, vicomte de Champfleur, et Renée Pilloys, son épouse, rendent aveu pour la terre seigneuriale de Chevain et du Petit-Bois. De 1690 à 1697, Jacob de Vallée, écuyer, relève la terre et seigneurie de Tournerie, paroisse de Louze. La famille de Vallée possédait cette terre plus d'un siècle avant ces époques, puisqu'un René de Vallée, seigneur de Chevain, épousa une fille de Jacques II du Bois, sieur de Macquillé, marié en 1552.","architecture":"SAINT-PATERNE, c'est un château de style Renaissance. Il a abrité les amours du roi Henri IV de France. Le mobilier du château de Saint-Paterne date du XVIIe siècle se compose d'un corps de logis principal. catonné d'un pavillon qui flanque à l'autre extrémité une aile en retour d'équerre soudé au corps de logis par un pavillon. Tour hexagonale en façade hors oeuvres  abritant un escalier. Baies à l'étage  sur cour sommées d'un fronton triangulaire. le corps de logis est couvert d'un toit en croupe et les pavillons de toitures pyramidales. Le château de Saint Paterne se situe dans un vaste parc, entouré de superbes chênes centenaires. Les Anglo-Saxons raffolent de la vie de château à la française. « Ils réservent pratiquement un an à l'avance. Charles-Henry et Ségolène de Valbray seront vos hôtes. Le château, ouvert de mars à décembre et qui affiche complet tout l'été, vit essentiellement grâce à internet. Le Château de Saint-Paterne est depuis un Hôtel de classe 3 étoiles.                                                            CHEVAIN, situé dans le bourg, le château de Chevain est une belle maison moderne précédée d'un joli parterre; un petit étang y est contigu et en dépend. Près de cette propriété on peut voir le beau moulin à eau du Chevain, datant de la fin du XVIIIe début du XIXe siècle, est resté en activité jusquen 1984.","habitants":"Chevain ; famille du Plessis                                                                St-Paterne; famille le Coustelier\r\n        \"","divers":"St-paterne GPS : 48° 24' 56\" Nord 0° 06' 41\" Est","gps":"48° 24' 56\" Nord 0° 06' 41\" Est","images":["../../jctruffet.com/image/image_72/72_St_Paterne_1.jpg","../../jctruffet.com/image/image_72/72_St_Paterne_2.jpg","../../jctruffet.com/image/image_72/72_St_Paterne_3.jpg","../../jctruffet.com/image/image_72/72_St_Paterne_4.jpg"]},"Consult_chateau_formulairede18":{"id":"Consult_chateau_formulairede18","dept":"72","canton":"Loué","commune":"Saint Symphorien","nom":"St_Symphorien_72","type":"Palais","periode":"XVIII","histoire":"SOURCHES, en 1702, pour le Marquis de Sourches, grand prévost de France et prévost de l'hôtel du Roi, dont la belle fille, la duchesse de Tourzel, gouvernante des enfants de Louis XVI, fut l'héritière et l'occupante la plus célèbre du château. Après avoir appartenu à la marquise de Tourzel, belle-fille du marquis de Sourches, gouvernante des enfants de France à partir de juillet 1789, qui prit part à la fuite à Varennes et fut incarcérée, en août 1792, à la Tour du Temple avec la famille royale, sous la Révolution française, le château est passé par héritage à la maison de Pérusse des Cars en 1845. Au pied du château, longue esplanade, ourlée d'une balustrade et de profondes douves sèches. Mobilier pillé par sa dernière propriétaire, une japonaise partie sans laisser d'adresse.  . Dans les années 1980, le château a fait partie des neuf domaines acquis par la société japonaise Nippon Sangyoo Kabushiki Kaisha, en même temps que Louveciennes, Rosny-sur-Seine, Millemont, etc. Cette société fit scandale en laissant ces châteaux à l'abandon et, dans certains cas, en les dépouillant de leur mobilier et de leurs décors historiques.                                                                                                    \r\nMONT-PORCHER, près de la forêt de Charnie ce manoir fut une forteresse habitée par Geoffroy de Montporcher puis devenu manoir appartenant à du Guesclin, elle devint un prieuré de l'ordre des chartreux , puis une ferme fortifiée appartenant aux Des Cars.","architecture":"SOURCHES à PRECIGNE, le château de Sourches à st-Symphorien, parfait exemple de l'architecture néo classique, a été construit entre 1763 et 1786 par l'architecte Manceau Pradel sur un plan de Gabriel de l'Estrade, au centre d'un parc dessiné par Hardouin Mansard en 1702, pour le Marquis de Sourches, les façades et toitures du château, ainsi que sa cour d'honneur, ses douves et sa chapelle sont classé aux M.H. depuis le 11/04/1947.  Rachetés en 2001 par la famille de Foucaud, le château et le parc ont été immédiatement rouverts au Public, et d'importants travaux de restauration y ont été entrepris avec l'aide de l'État, de la Région et du Département.De nombreuses manifestations culturelles et sportives y sont organisées en permanence, fête de la chasse, le 1er dimanche de Juillet, comices agricoles, théâtre, cinéma, concert, conférences. Fin 2013, le château de Sourches a accueilli le tournage du film Francofonia réalisé par le cinéaste russe Alexandre Sokourov. \r\nÉléments protégés MH : les façades et les toitures ; la cour d'honneur ; les douves ; la chapelle ; le parc et les perspectives: classement par arrêté du 11 avril 1947.","habitants":"Marquis de Sourches\r\n        \r\n        \"","divers":"Deux châtreaux à st-Symphorien Sourches grav 1-2-3-4 et Mont Porcher grav-5.                                                                      Gps 8° 04' 53\" nord, 0° 06' 08\" ouest","gps":"","images":["../../jctruffet.com/image/image_72/72_St_Symphorien_1.jpg","../../jctruffet.com/image/image_72/72_St_Symphorien_2.jpg","../../jctruffet.com/image/image_72/72_St_Symphorien_3.jpg","../../jctruffet.com/image/image_72/72_St_Symphorien_4.jpg","../../jctruffet.com/image/image_72/72_St_Symphorien_5.jpg"]},"Consult_chateau_formulairee34d":{"id":"Consult_chateau_formulairee34d","dept":"72","canton":"La Suze-sur-Sarthe","commune":"Suze sur  Sarthe","nom":"Suze_sur_Sarthe","type":"Château","periode":"Xv-XVI","histoire":"La SUZE, ancien château fort construit aux XIe et XVe siècles. Ce château qui défendait le passage de la Sarthe a été assiégé deux fois par Geoffroy Plantagenêt, a abrité en septembre 1200 Jean sans Terre, Roi dAngleterre ainsi que le Roi de France Philippe VI de Valois. Il appartint à Gilles de Retz, doù le nom du château de Barbe Bleue. Au XVe siècle, Gilles de Retz aurait séjourné dans le château, vers 1439. Compagnon de Jehanne des Armoises, quil faisait passer pour Jeanne dArc ressuscitée, il essayait de reprendre Le Mans. Ruiné par des dépenses insensées, il voulait retrouver des richesses. De ses victimes (200 furent sacrifiées), on trouva 49 crânes dans les souterrains du château quil habitait à cette époque. Condamné à mort en 1440, son histoire a donné légende à Barbe Bleue. En 1890, le château appartient à monsieur de Chamillard, marquis de la Suze. Au début du XXe siècle, il a abrité lécole libre de la Suze. Les actuels propriétaires lont entièrement restauré, les fenêtres en croix sont les éléments remarquables de cette demeure.Aujourdhui les restes du château de La Suze ont été restaurés mais le site nest pas ouvert aux visites. On peut voir une partie datant du XVe siècle caractérisée par un toit à forte pente et des fenêtres à meneaux. Les bases de ce bâtiment sont plus anciennes.                                                                                                   FUYE, la construction du château de la Fuye date du XVIe siècle il est inscrit aux M.H. depuis 1965.","architecture":"BARBE BLEUE ou vieux châteaux,  construit sur une motte castrale, le « vieux château » du XIe-XVe siècles est également surnommé « château de Barbe-Bleue » en raison d'une tradition relative à Gilles de Rais, cet ancien compagnon d'armes de Jeanne d'Arc aurait séjourné dans le château et enfoui dans les latrines les restes de ses jeunes victimes. Cependant, il semble que cette légende possède d'une confusion   commise entre le château de La Suze-sur-Sarthe et l'hôtel de La Suze autrefois sis dans la paroisse Notre-Dame à Nantes. Aujourd'hui disparu, cet hôtel nantais a appartenu à Jean de Craon, seigneur de La Suze, grand-père maternel de Gilles de Rais. Postérieurement au décès de Craon en 1432, la seigneurie de La Suze passa à René, frère cadet de Gilles de Rais, tandis que le nom de La Suze demeurait associé à l'hôtel nantais. Celui-ci devint la propriété de Gilles de Rais, qui en fit le théâtre de certains de ses crimes, d'après les pièces de ses procès.","habitants":"La Suze et vieux château; famille de Gilles de Retz ou Rais\r\n        \r\n        \"","divers":"GPS : 47° 53' 29,96\" Nord et 0° 01' 35,7\" E                                                       Fuye  GPS : 47° 53' 37,28\" Nord, 0° 01' 35,4\" Est","gps":"47° 53' 29,96\" Nord et 0° 01' 35,7\" E","images":["../../jctruffet.com/image/image_72/72_Suze_sur_Sarthe_1.jpg","../../jctruffet.com/image/image_72/72_Suze_sur_Sarthe_2.jpg","../../jctruffet.com/image/image_72/72_Suze_sur_Sarthe_3.jpg"]},"Consult_chateau_formulaire6327":{"id":"Consult_chateau_formulaire6327","dept":"72","canton":"Saint-Calais","commune":"Sémur en Vallon","nom":"Sémur_Vallon","type":"Château","periode":"XVI, XVII-XIX","histoire":"SEMUR,  la partie centrale a été bâtie sous Louis XI entre 1460 et 1470, par la famille Le Sirier. Le charme intérieur et extérieur de cette propriété est dû au goût exquis quavait Béatrix de Vibraye, marquise de Reverseaux, qui avait racheté le château aux descendants du duc d'Aumont. Son vu était que le comte et la comtesse Henri de Vibraye puissent y résider toute lannée, ce qui est bien le cas aujourdhui.","architecture":"SEMUR, château du XVe siècle, remanié aux XVIe, XVIIe et XIXe siècles, avec ses anciennes douves asséchées franchies par une poterne basse à deux petites tours, accessible par un ancien pont-levis et donnant sur une cour. Le château de Semur est composé dun corps central prolongé au nord par un donjon carré, et de deux ailes, corps de bâtiment central à fronton triangulaire, encadré par des pavillons symétriques à toits pointus, précédés de tours rondes aux toits à lanternons superposés. Sur l'autre face, haute tour à poivrière. Jardin, potager et verger du début du XVIIIe siècle.La partie ouest se compose dune aile terminée par une tour et une chapelle, le tout construit  au XVIIe siècle, de même que les petites tours dentrée.  Laile est, copie de l'aile ouest, a été construite au XIXe siècle par le duc dAumont. Ce dernier y a placé ses armes, de même que sur la girouette du donjon. Le château de Semur est entouré de fossés secs dont il ne faut pas oublier la grosse tour, sans doute aussi ancienne que la partie centrale.  Éléments protégés MH : le château en totalité : inscription par arrêté du 22 décembre 1927.","habitants":"famille Le Sirier\r\n        \r\n        \"","divers":"GPS : 48° 01' 25,44\" Nord, 0° 39' 22,81\" Est","gps":"48° 01' 25,44\" Nord, 0° 39' 22,81\" Est","images":["../../jctruffet.com/image/image_72/72_S%c3%a9mur_Vallon_1.jpg","../../jctruffet.com/image/image_72/72_S%c3%a9mur_Vallon_2.jpg","../../jctruffet.com/image/image_72/72_S%c3%a9mur_Vallon_3.jpg","../../jctruffet.com/image/image_72/72_S%c3%a9mur_Vallon_4.jpg","../../jctruffet.com/image/image_72/72_S%c3%a9mur_Vallon_5.jpg","../../jctruffet.com/image/image_72/72_S%c3%a9mur_Vallon_6.jpg"]},"Consult_chateau_formulaire6fd0":{"id":"Consult_chateau_formulaire6fd0","dept":"72","canton":"Sillé-le-Guillaume","commune":"Doucelles","nom":"Sérillac_Doucelles","type":"Château","periode":"XIV-XVIII","histoire":"SERILLAC, la seigneurie de paroisse paraît avoir été porté par les seigneurs de cette paroisse du XIe au XIVe siècle. Vers 1755, Suzanne Aubert était dame de Courteille; un de ses fils avait le titre de seigneur de Doucelles. Le château de Courteille étant devenu la résidence des comtes de Sérillac, quoique le chef-lieu de ce comté, érigé en 1653, en faveur de Jean III de Faudoas, fut Chérancé, ce château prit le nom de Sérillac, sous lequel il a toujours été connu depuis. Situé à trois kilomètres au nord-est du bourg, Sérillac est une belle maison reconstruite à la moderne, accompagnée de douves, de jardins, d'avenues, etc. Le château appartenait encore à la famille Faudoas, originaire de Guyenne, dont une branche se fixa dans le Maine en 1512. La maison de Faudoas, tire son nom d'un bourg et d'une baronnie du diocèse de Toulouse puis de celui de Montauban, après l'érection de cet évêché. Cette maison était l'une des plus distinguées de la Guyenne, par son antiquité, ses alliances, et ses emplois militaires, remplis par ses membres.Le premier château médiéval est construit au XIIIe s. sur une motte féodale, qui laisse penser quune position défensive existait préalablement. Le château doit subir les effets dévastateurs des guerres de religion, comme le village de La Sauvetat, sauveté établie au XIe siècle. Un capitaine de Sérillac, originaire de ce château et neveu de Blaise de Monluc, est tué dans une embuscade à Montepulciano, en Toscane2.À la Renaissance, la forteresse est aménagée en demeure de campagne. Dans un des contes de Gascogne recueillis par Jean-François Bladé, Le bâtard, le héros est amoureux de la fille dun noble qui demeurait au château de Sérillac.","architecture":"SERILLAC, le bâtiment principal se situe à lextrémité ouest de léperon rocheux. Pour y accéder, on trouve dabord à lest un castelet (châtelet), long bâtiment quadrangulaire, formant portique, avec un porche voûté du XVIIe siècle, puis une cour dhonneur bordée au sud par des communs. Deux ailes, probablement des tours médiévales arasées, encadrent une cour étroite à laquelle on accède par quelques marches. Les bâtiments sont couverts de toits de tuiles et des génoises à trois rangs courent à la jonction des murs et des toits. Le bâtiment médiéval central sest vu adjoindre une façade de style classique, avec une porte dentrée sommée dun fronton curviligne portant la date de 1744. Laile sud a  bénéficié des aménagements du XVIIIe siècle, des décors de gypseries et des plafonds à la française.","habitants":"Famille Faudoas\r\n        \"","divers":"Doucelles gps 47° 49' 08\" nord, 0° 20' 23\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_S%c3%a9rillac_Doucelles_1.jpg","../../jctruffet.com/image/image_72/72_S%c3%a9rillac_Doucelles_2.jpg"]},"Consult_chateau_formulairee8f8":{"id":"Consult_chateau_formulairee8f8","dept":"72","canton":"Bonnétable","commune":"Teillé","nom":"Teillé","type":"Château","periode":"XVIII","histoire":"La CRUCHE,  le château de la Cruche, construit à la fin du XVIIIe ou au début du début XIXe siècle, est situé au nord du bourg, appartenait, dès 1538, à la famille de Kaérbout anciennement d'Escarbot, par une mauvaise orthographe de ce nom breton, ainsi que l'avait reconnu le savant généalogiste d'Hozier, issu de Jean de Kaërbout vivant en 1500, laquelle prétendait à la seigneurie de Teille et posséda celles de la Cruche, Bois-Mauclerc, Courléon et Gemasse. Ce fut Jehan de Kaërbout, qui par son mariage avec Guillemette de l'Espervier, devint le seigneur de la terre de Gémasse, que Lancelot de Kaërbout fit ériger, plus tard, en baronnie, prenant alors le titre de baron de Gémasse, seigneur de Couléon. Ce fut probablement lui aussi qui fit placer les armes de sa maison sur les vitraux de la chapelle gothique du château de Gémasse. Jean-Anselme de Kaërbout assiste à l'assemblée de la noblesse du Maine en 1789. Le vieux château de la Cruche a été remplacé par la demeure actuelle, à laquelle conduit une avenue, partant du côté gauche de la route de Ballon à Beaumont. Au XXe siècle elle appartenait à Mme de Mesenge, fille de M. Anselme, baron de Kaërbout.","architecture":"BOISCLAIREAU  Henry Jean Wladimir Villedieu de Torcy, marquis de Torcy 1858-1910 de  H. Marie Aimé Augustin Pierre Villedieu de Torcy,  comte de Torcy 1879-1916 Marié en 1911, Paris VIII, avec Jeanne Henriette Marie Thérèse Foy 1885-1979.","habitants":"famille de Kaérbout\r\n        \"","divers":"Boisclairveau grav 1-2-3   chevenier Grav 4-5   Cruche-grav-6                            Gps 48° 10' 54\" nord, 0° 11' 17\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_Teill%c3%a9_1.jpg","../../jctruffet.com/image/image_72/72_Teill%c3%a9_2.jpg","../../jctruffet.com/image/image_72/72_Teill%c3%a9_3.jpg","../../jctruffet.com/image/image_72/72_Teill%c3%a9_4.jpg","../../jctruffet.com/image/image_72/72_Teill%c3%a9_5.jpg","../../jctruffet.com/image/image_72/72_Teill%c3%a9_6.jpg"]},"Consult_chateau_formulaire4953":{"id":"Consult_chateau_formulaire4953","dept":"72","canton":"Ecommoy","commune":"St-Mars l","nom":"Teloché_St_Mars","type":"Château","periode":"XV-XVIII","histoire":"A 4 kilomètres au sud -Est à St-Mars d'Outillé le château  de Segrais                                                                           SEGRAIS, ses nouveaux propriétaires ont magnifiquement entretenu le lieu et offrent à leurs hôtes des séances de bien-être, méditation ou conférences. A la fin de 2006, le château de Segrais a été racheté par l'association NKT-IKBU et abrite depuis, le centre de méditation bouddhiste Kadampa. Dans la salle de méditation principale, de grandes statues des principaux bouddhas de cette tradition sont présentes : Bouddha Shakyamouni, Tara Verte, Avalokiteshvara à quatre bras, Djé Tsongkhapa et ses fils, Dorjé Shougdèn et ses 5 lignées. Les statues de Tara Verte et de Avalokiteshvara à 4 bras ont été fabriquées au studio d'art du centre mère de la tradition, en Angleterre et ont été peintes et décorées à la feuille d'or au Centre de Méditation Kadampa en France, aujourd'hui entre les mains d'une association bouddhiste.","architecture":"SEGRAIS, il a été reconstruit sur les fondations dun ancien château féodal, sur le radier d'une ancienne citadelle féodale du XVe siècle. Le château de Segrais actuel a été reconstruit à la fin du XVIIIe siècle. Le corps de logis central est orienté en est-ouest, la cour et son entrée sont elles exposées à louest. Un seul et unique pavillon d'origine a été sauvegardé du côté Nord-Est de cette magnifique uvre architecturale aux belles pierres blanches. Les douves, remplies deau, présentent une forme rectangulaire qui entourent les  bâtiments, terrasses et jardins. Une chapelle voûtée en lambris de bois cachent des bouts confinés de lattes moulurées. En renfoncement, un beau et raffiné retable classé en marbre gris présente des sculptures témoignant d'une scène d'époque. Autrefois, maison de repos, l'activité des lieux a été transférée sur la ville du Mans. Ses nouveaux propriétaires ont magnifiquement entretenu le lieu et offrent à leurs hôtes des séances de bien-être, méditation ou conférences. RANCHER,  a Téloché  Au IXe ou Xe siècle, Le Rancher était une seigneurie importante du Bélinois. Le château-fort, démantelé sous Richelieu, possédait deux tours, était fortifié et entouré de fossés et de douves. Au début du XVIIIe siècle, le Rancher appartenait à Louis-Elisabeth de la Vergne de Tressan, académicien, réputé pour ses adaptations du moyen-age. Durant la Révolution, l'édifice appartenait à la Famille de Gauvain jusquen 1870. Le château passa à la congrégation des Frères des Ecoles Chrétiennes, en 1875, qui réalisèrent dimportants travaux et ouvrirent en 1875 un noviciat et un juvénat. Pendant les deux guerres mondiales, l'édifice sert d'hôpital et accueille des soldats blessés. En 1973, le château abrite une maison de retraite pour religieux.","habitants":"Bouddha Shakyamouni,\r\n        \r\n        \r\n        \"","divers":"Saint-Mars grav-1- 2-3                 Segrais grav 4-5-6 GPS : 47° 52' 10,88\" Nord, 0° 18' 57,7\" Est","gps":"47° 52' 10,88\" Nord, 0° 18' 57,7\" Est","images":["../../jctruffet.com/image/image_72/72_Teloch%c3%a9_St_Mars_1.jpg","../../jctruffet.com/image/image_72/72_Teloch%c3%a9_St_Mars_2.jpg","../../jctruffet.com/image/image_72/72_Teloch%c3%a9_St_Mars_3.jpg","../../jctruffet.com/image/image_72/72_Teloch%c3%a9_St_Mars_4.jpg","../../jctruffet.com/image/image_72/72_Teloch%c3%a9_St_Mars_5.jpg","../../jctruffet.com/image/image_72/72_Teloch%c3%a9_St_Mars_6.jpg","../../jctruffet.com/image/image_72/72_Teloch%c3%a9_St_Mars_7.jpg"]},"Consult_chateau_formulairec4ff":{"id":"Consult_chateau_formulairec4ff","dept":"72","canton":"Le Lude","commune":"Vaas","nom":"Vaas","type":"Château","periode":"XVI-XVIII","histoire":"A Vaas  Huit châteaux sont érigés sur le territoire de la commune :\r\n;  Lassy, ou de Bas Moriers,  la Brosserie, la Roche, et son parc « agricole et paysager » dessiné par le comte Paul de Lavenne de Choulot, de Mazoüet, de la Fuye du XVIe siècle, et de Petit-Perray.                                                                                                     PETIT PERRAY, la famille de Boizard vécut dans ce château: François De Boizard, écuyer, Sieur de Villegraton demeurait au château du Petit-Perray en Vaas en novembre 1654. Il avait épousé en 1re noce : Gabrielle d'Espagne dont il eut une fille Jacqueline De Boisard (née en 1651, décédée le 17 avril 1709 à Martigny-sur-l'Ante  mariée le 21 mai 1677 à Sainte-Trinité-de-Falaise (Calvados) avec Charles Thibout de la Fresnaye, Sieur de Longuemare en 1644-1694. Ce couple eut comme descendance à Martigny-sur-l'Ante dont Charles David Charles Thibout de la Fresnae, Sieur du Cammorice (1689-1715) qui épousera le 8 mars 1707 aux Loges-Saulces Jacqueline Grancher (arrière-grands-parents du Docteur Victor Thibout de la Fresnaye qui déposa le brevet du caoutchouc dans les textiles. Une rue porte son nom à Caen)\r\nIl épousa en 2e noce le 3 août 1658 au Mans, Madelaine Guilleu, fille d'honorable Gédéon Guilleu, Sieur de launay et de Madeleine Péan. De ce couple naquirent 2 filles: Madeleine Angélique, demoiselle de Villegraton qui épousa Pierre Daupeley.\r\n    Agnès qui entra au monastère de la Fontaine-Saint-Martin le 8 décembre 1667 et mourut en 1710.  François De Boizard était fils de Jacques De Boizard, Sieur de Villegraton (mort avant 1658) et de Jacqueline De la Barre, famille originaire d'Anjou. Cette famille portait d'azur aux 3 piliers d'or.","architecture":"PETIT PERRAY, le château du Petit-Perray, de la fin XVIIIe siècle, partiellement inscrit au titre des M.H. le 28 avril 1993 Le château du Petit-Perray, date du 4ème quart du XVIIIe siècle. Il est partiellement inscrit au titre des monuments historiques le 28/04/1993. Le Château de Vaas ou Château du Petit-Perray Il existe 7 châteaux sur la commune de Vaas à découvrir: le Château de Lassy, ou de Bas Moriers, le Château de la Brosserie, le Château la Renaudière, le Château de Gagnerie, le Château de la Roche et son parc « agricole et paysager » fut dessiné par le Comte Paul de Lavenne de Choulot, le Château de Mazoüet. Château du Bas Morier.","habitants":"Petit perray ;famille de Boizard\r\n        \"","divers":"a Vaas le château du Petit-Perray  grav 1-2-3-le bas Morier  grav-4                                                                                                 GPS : 47° 40' 12\" Nord et 0° 18' 47\" Est","gps":"47° 40' 12\" Nord et 0° 18' 47\" Est","images":["../../jctruffet.com/image/image_72/72_Vaas_1.jpg","../../jctruffet.com/image/image_72/72_Vaas_2.jpg","../../jctruffet.com/image/image_72/72_Vaas_3.jpg","../../jctruffet.com/image/image_72/72_Vaas_4.jpg"]},"Consult_chateau_formulaire4b88":{"id":"Consult_chateau_formulaire4b88","dept":"72","canton":"Mamers","commune":"St Rémy du Val","nom":"Val_Pineau","type":"Château","periode":"XIII-XV-XVIII","histoire":"Du VAL; au début du XIIIe siècle, le château est le siège d'une seigneurie appartenant au forestier du Comte d'Alençon, Odon Cotinel. Le château du Val est reconstruit par la famille Clinchamps au XVe siècle, après la guerre de Cent Ans. A cette époque, il ne comprend qu'un corps de logis, couvert d'un comble à deux versants, pourvu de pignons élevés. Chacune des extrémités du bâtiment possède sa particularité architecturale, avec d'un côté, une tourelle d'escalier, et de l'autre, une tour d'angle et un pavillon. C'est à partir de ces deux éléments que le château du Val est agrandi au XVIIIe siècle par le marquis de Viennay, qui fait bâtir les deux ailes de la demeure actuelle.","architecture":"Château du VAL PINEAU , dans un parc boisé, construit par la famille Clinchamps au XVe siècle, remanié et agrandi par les marquis Pineau de Viennay au XVIIIe siècle. Devenu propriété de la famille Vienne en 1957, le parc du château abrita un zoo pendant plusieurs années. Pigeonnier.\r\nManoir dit Logis de Moullins, des XIIIe, XIVe, XVe et XVIe siècles, inscrit au titre des M.H. en 1926.\r\nManoir de Clichemore, du XVe au XVIIIe siècles.","habitants":"Comte d'Alençon, Odon Cotinel                                                      Val Pineau;  famille Clinchamps\r\n        \"","divers":"A St Rémy du Val le château de Val-Pineau","gps":"","images":["../../jctruffet.com/image/image_72/72_Val_Pineau_1.jpg","../../jctruffet.com/image/image_72/72_Val_Pineau_2.jpg","../../jctruffet.com/image/image_72/72_Val_Pineau_3.jpg"]},"Consult_chateau_formulairebaff":{"id":"Consult_chateau_formulairebaff","dept":"72","canton":"Loué","commune":"Vallon-sur-Gée","nom":"Vallon_sur_Gée","type":"Château","periode":"XV-XIX","histoire":"GRANGE-MOREAU, la propriété appartient à Mme de Montesson, qui a fait construire vers 1842, à l'emplacement de l'ancien manoir, un château dans le style Renaissance, et le parc est redessiné. La chapelle porte la date de 1846. L'essentiel du décor est concentré sur l'axe central, inspiré de la Renaissance telle qu'elle a été réalisée dans les châteaux du Val de Loire. Il existe plusieurs châteaux sur la commune à découvrir : le Château de Fontenaille, ancien couvent de Béthanie, du XVIIe siècle, partiellement inscrit aux M.H. en 1943, le Château de Bezonnais, le château Rouge appelé « la Tombelle », le château de la Boissière, et la Grande Maison, probablement du XVe siècle, ancienne demeure dépendant du château de Fontenailles ou d'un seigneur de Mulsanne. Restaurée, elle accueille désormais une maison médicale.","architecture":"la GRANGE MOREAU, c'est au milieu du XIXe siècle, que le chateau de la Grange-Moreau qui appartient à Mme de Montesson, sera bâti en 1842, à l'emplacement d'un ancien manoir, un nouveau château dans le style Renaissance. La chapelle porte la date de 1846. Le Château est composé d'un avant-corps central avec une toiture plus élevée, deux tours circulaires dans les angles sur la façade arrière, deux tours polygonales autour de l'avant corps central de la façade principale et des tourelles en encorbellement, dans les angles de la façade. L'essentiel du décor est concentré sur l'axe central, inspiré de la Renaissance telle qu'elle a été réalisée dans les Châteaux du Val de Loire, avec des pilastres à panneaux et des allèges ornés de motifs géométriques ou d'arabesques. Sur l'axe médian des façades et des pignons, on voit des fenêtres à meneaux et des traverses. Ce décor de style moyenâgeux est fait de faux mâchicoulis et de créneaux, en haut des tours et des tourelles. Le parc du château sera redessiné.                                                                                                                         PETIT BERU  est un manoir bâti à Vallon-sur-Gée, Il date du XVe siècle. Le manoir du Petit-Béru fut reconstruit vers 1490 pour Pierre de Champagne, Seigneur de Vallon, sur les restes d'une ancienne demeure fortifiée, ruinée par les Anglais au cours de la guerre de Cent Ans. Le Manoir du Petit-Béru est inscrit et classé aux M.H. le 29/11/1976, avec ses façades, ses toitures, deux cheminées, l'escalier intérieur et les dépendances formant la cour.","habitants":"Grange Moreau; Mme de Montesson                                                       Petit-Béru;r Pierre de Champagne\r\n        \r\n        \"","divers":"Vallon-sur-Gée  château  de Guiberne grav 3-4  de la Grange-Moreau grav-5   et Petit Béru grav 1 .                                                        GPS : 47° 57' 46\" Nord 0° 04' 06\" Ouest                                                               Petit beru GPS : 47° 58' 24,25\" Nord, 0° 04' 31,41\" Ouest","gps":"47° 57' 46\" Nord 0° 04' 06\" Ouest","images":["../../jctruffet.com/image/image_72/72_Vallon_sur_G%c3%a9e_1.jpg","../../jctruffet.com/image/image_72/72_Vallon_sur_G%c3%a9e_2.jpg","../../jctruffet.com/image/image_72/72_Vallon_sur_G%c3%a9e_3.jpg","../../jctruffet.com/image/image_72/72_Vallon_sur_G%c3%a9e_4.jpg"]},"Consult_chateau_formulaired917":{"id":"Consult_chateau_formulaired917","dept":"72","canton":"Loué","commune":"Vallon sur Gee","nom":"Vallon_sur_Gée_II","type":"Château","periode":"XVI-XX","histoire":"le Château de Passay, le Château de Chanteloup et Guiberne.                                                                                                     CHANTELOUP,  il fut bâti pour Madame Marie-Louise Comtesse Ogier née Eynaud en 1814, son mari Jean-Louis Comte Ogier meurt en 1811; elle y habita jusqu'en 1831 puis devient la propriété du Vicomte Achille Ogier puis de son fils Vicomte Alfred Ogier jusqu'en 1857 où le château fut vendu et décéda à Paris, en 1876. Depuis 2020, il appartient à Valérie et Benoit Dores. Le domaine de Chanteloup est un camping 5 étoiles, avec emplacements et gîtes, dans les dépendances du château ou dans lOrangerie, magnifique bâtiment du XVe siècle. Le Château de Chanteloup propose des glampings et cinq hébergements de qualité dans des bâtiments anciens : la Grande et la Petite Orangerie, Le Grand et le Petit Appartements de la Ferme, et lAppartement du Commun. Les glampings, cest la nouvelle tendance du tourisme de plein air. Ecolo-chic, ce nouveau mode de tourisme concilie confort et nature, confort et rusticité, glamour et camping. Il existe 3 châteaux sur la commune à découvrir : le Château de Passay, le Château de Chanteloup et le château Bois-doublé.","architecture":"CHANTELOUP, sa construction date de 1914. Le Château de Chanteloup a été inscrit aux M.H. le 19/11/1990 ainsi que les communs, la tour et l'escalier.                                                                                                                           GUIBERNE, la construction du Manoir de Guiberne date de la 2ème moitié du XVIe et 1ère moitié du XVII siècle. Mentionné dès 1578, le Manoir de Guiberne a été restauré et complété, en 1645, de nouveaux bâtiments de communs, pavillons d'angle édifiés sur la plate-forme fossoyée et d'un jardin. Les douves sont recreusées et rectifiées. Les pavillons d'angle présentent des façades ornées d'éléments sculptés (corniches aux motifs de feuillages, pilastres ioniques, éléments de fronton) fins et ouvragés. Inhabité depuis le début du 18ème siècle, le manoir a préservé ses aménagements réalisés, entre 1645 et 1651, lui conférant ainsi une authenticité certaine entretenue par l'absence de travaux de restauration depuis la fin du XIXe siècle. Il est inscrit aux M.H. depuis le 24/11/2011.","habitants":"Madame Marie-Louise Comtesse Ogier                                   Guiberne: \r\n        \r\n        \"","divers":"le Château de Passay, le Château de Chanteloup grav-1 .     Guiberne grav 2                                                                              Chanteloup  GPS : 48° 06' 23\" Nord, 0° 20' 28\" Ouest","gps":"48° 06' 23\" Nord, 0° 20' 28\" Ouest","images":["../../jctruffet.com/image/image_72/72_Vallon_sur_G%c3%a9e_II_1.jpg","../../jctruffet.com/image/image_72/72_Vallon_sur_G%c3%a9e_II_2.jpg"]},"Consult_chateau_formulairebb4d-2":{"id":"Consult_chateau_formulairebb4d-2","dept":"72","canton":"La Suze-sur-Sarthe","commune":"Fercé sur Sarthe","nom":"Vaulogé_Rousson","type":"Château","periode":"XV-XVII","histoire":"Deux châteaux à Vaulogé celui de Vaulogé et de Rousson.\r\nVAULOGE  Les premiers seigneurs de Vaulogé semblent être venus de Normandie, possédé par cette famille jusquau début du XVIIe, les Vahais propriétaire par alliance,  En 1793 il passa à la famille Picot de Pontaubray et prit le nom Picot de Vaulougé au début du XIXe siècle selon le vu dun des héritiers du domaine. En 1904, Renée-Thérèse, lun des membres de la famille Renée-Thérése Picot de Vaulogé épousa le prince de Carini et depuis cette époque la propriété était aux mains des descendants de ce dernier.                                                                        Éléments protégés MH : les éléments bâtis constitutifs du château, à savoir : l'ancien logis  avec en particulier, la cheminée sculptée de 1514 ; la partie conservée des murs de l'enceinte ; les douves en eau ou comblées ; les façades et les toitures des remises, des écuries et des moulins ; les chapelles Saint-Henri et Saint-Roch : inscription par arrêté du 23 juin 1992.","architecture":"VAULOGE, au début du XVe siècle, au cur d'une petite vallée serpentée par la rivière Gée, Jean III de Vaulogé fit bâtir le château, deux corps de logis en équerre, défendu depuis le début du XVIIe siècle par de larges douves alimentées par les bras de la rivière et par des murailles crénelées. Lentrée seffectuait par louest au moyen dun portail précédé dun pont-levis. Le corps de logis central de 1831 rez-de-chaussée surélevé, un étage carré et un étage logé dans un comble à quatre pans  que chevauche une lucarne  de Style  néogothique, avec deux tours circulaires aux toits en poivrière sous une ligne de consoles imitant des mâchicoulis, fut réalisé par l'architecte Delarue. Moulin contigu alimenté par la Gée et chapelle Saint Roch sur la partie droite de l'esplanade. La partie actuelle de l'enceinte date probablement du XIVe siècle, la partie nouvelle du début du XIXe siècle. Protégée par une tour du XVe siècle, dont la base est à huit pans supporte, grâce à un encorbellement, une fine tourelle.                                                                                                                          ROUSSON, le manoir de Rousson fut construit à la fin du XVe siècle, pour la famille de Champagne, qui l'utilisait comme dépendance, de son Château de Pescheseul. Les parties agricoles furent remaniées au XVIIIe siècle. Le Manoir de Rousson est situé dans un méandre de la Sarthe, près d'un bras mort de la rivière. Il est composé d'un corps de logis simple, flanqué d'une tourelle d'escalier polygonale et accompagné de dépendances, en retour d'équerre. Les façades et toitures du corps de logis avec sa tour, la cheminée du salon au rez-de-chaussée, les 3 cheminées au 1er étage et celle de la tour sont inscrits aux M.H. depuis le 30/05/1984.","habitants":"Vaulogé; famille Picot de Pontaubray                                              Rousson; famille de Champagne,\r\n        \"","divers":"Deux châteaux à vaulogé celui de Vaulogé grav 1-2-3-4 et de Rousson grav_5.                                                                                  Rousson GPS : 47° 51' 37,51\" Nord, 0° 16' 21,5\" Ouest                              Vauloge  GPS : 47° 53' 32\" Nord, 0° 02' 58\" Ouest","gps":"47° 51' 37,51\" Nord, 0° 16' 21,5\" Ouest","images":["../../jctruffet.com/image/image_72/72_Vaulog%c3%a9_Rousson_1.jpg","../../jctruffet.com/image/image_72/72_Vaulog%c3%a9_Rousson_2.jpg","../../jctruffet.com/image/image_72/72_Vaulog%c3%a9_Rousson_3.jpg","../../jctruffet.com/image/image_72/72_Vaulog%c3%a9_Rousson_4.jpg","../../jctruffet.com/image/image_72/72_Vaulog%c3%a9_Rousson_5.jpg"]},"Consult_chateau_formulaire24ba-3":{"id":"Consult_chateau_formulaire24ba-3","dept":"72","canton":"Changé","commune":"Yvré l","nom":"Vaux_Yvré","type":"Château","periode":"XIV-XVII","histoire":"VAUX, on trouve le nom de Vaux dans un aveu de lÉvêque du Mans au Roi de France en 1394, le fief est alors aux mains de Guillaume Becquet, chevalier, sire de Vaux. La commune doit son surnom au droit dhébergement, c'est-à-dire à lhospitalité, dû aux Évêques du Mans par leurs vassaux de leur fief dYvré. Au XVIIe siècle, la terre de Vaux est qualifiée de baronnie. Elle appartient jusquau 1er Empire à la famille de Landemont, époque à laquelle elle est vendue à Monsieur Crépon, sous prétexte de rajeunir et dembellir l'édifice, il fit détruire tout ce qui donnait aux constructions la cachet de lépoque à laquelle elles avaient été élevées. Il fit construire un pont qui, enjambant la route dYvré à Savigné, joignant les bois aux jardins. En 1857, la comtesse Da Porto, née de Nicolaÿ fait lachat du domaine. La propriété passe ensuite aux mains de la famille Caillaux et à Monsieur Benoist de Nivenheim en 1920.                                                                                    ARCHES Raymond Bouriaten été le propriétaire.","architecture":"ARCHES,  de plan rectangulaire à trois niveaux toit à la Mansard en dégradés au deuxième étages  série de lucarnes sur les flancs,  la partie central du deuxième étages de trois travées  avec une  lucarnes centrale sur le toit brisé.                                                                                                 AUVOUR  De plan en U   à deux niveaux toit à la Mansard   et tourelle sur flan intérieure , ailes de droite à un niveaux .                                                                                                 VAUX, à Gesnes le Gandelin  Le premier château fut démoli entre 1830 et 1840 et les communs détruits par un incendie vers 1865. Le château actuel a été reconstruit au XIXe siècle  est situé sur une éminence, à deux kilomètres au sud-est du bourg. C'est un bâtiment de construction moderne, à deux étages et mansardes, avec une enceinte de murs. Le premier seigneur de vaux connu est Guillaume de Jupilles au XIIIe siècle. En 1525, René de Silly est seigneur de Vaux, Saint Victeur, chambellan du Roi, bailli et gouverneur d'A
