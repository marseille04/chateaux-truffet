ints. Pendant plus de vingt ans, le terrain deviendra la plus grande carrière de la ville. Les pierres sont utilisées pour tout et n'importe quoi. On en retrouvera de nombreuses utilisées comme matériaux de construction dans l'Hôtel-Dieu de Coëffort ou dans le palais comtal. Aujourd'hui encore, la place du château, située derrière la Place Saint-Michel et la cathédrale, est restée intacte et est conservée ainsi par le service municipal, afin de se souvenir de l'édifice monumental qui trônait à l'extrémité nord de la vieille cité depuis le XIe siècle. Le château du Mans était constitué d'une tour de cinq étages dont le sommet était orné de mâchicoulis. Les vestiges du château sont protégés au titre des monuments historiques : classement par arrêté du 9 janvier 1930 pour les restes du donjon, inscription par arrêté du 19 mars 1945 pour les vestiges des tours et courtines.                                                 Saint MICHEL, à  Sargé les le Mans, Au début du XIXe siècle, sur une terre sans fief nommée la Fouasserie, M. Bayard de la Vingterie, fils de l'ancien lieutenant criminel au bailliage de Belesme, fait construire un château. Après avoir été vendu plusieurs fois, celui-ci reçoit en 1895 un nouveau propriétaire, le maquis de Prunelé, qui fait construire une chapelle privée et donne le nom de Villa Saint-Michel à la propriété. En 1911, le pape Pie X autorise la célébration des messes dans la chapelle privée.","habitants":"le Mans Guillaume le Conquérant                                                              St-Michel; M. Bayard de la Vingterie                 \r\n        \r\n        \"","divers":"Patrimoine du Mans  rempart tour évêché grav-5  et divers manoirs et châteaux  grav 8-9                                                     Gps 8° 00' 27\" N, 0° 11' 51\" E","gps":"","images":["../../jctruffet.com/image/image_72/72_Mans_le_1.jpg","../../jctruffet.com/image/image_72/72_Mans_le_2.jpg","../../jctruffet.com/image/image_72/72_Mans_le_3.jpg","../../jctruffet.com/image/image_72/72_Mans_le_4.jpg","../../jctruffet.com/image/image_72/72_Mans_le_5.jpg","../../jctruffet.com/image/image_72/72_Mans_le_6.jpg","../../jctruffet.com/image/image_72/72_Mans_le_7.jpg","../../jctruffet.com/image/image_72/72_Mans_le_8.jpg","../../jctruffet.com/image/image_72/72_Mans_le_9.jpg"]},"Consult_chateau_formulaire9e34":{"id":"Consult_chateau_formulaire9e34","dept":"72","canton":"Château-du-Loir","commune":"Marçon","nom":"Marcon","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux à Marçon la Marcelière et de la Poille. MARCELLIERE, construction du château en 1586 par Henry de Berziau, écuyer, chevalier, chancelier de la reine de Navarre, sieur de la Marsillière, ami intime de Sully ministre du roi Henri IV. Le manoir comprend, dans une enceinte fermée de murs, deux bâtiments disposés en équerre sur une cour intérieure, éclairés par des hautes fenêtres à meneaux fermée par une porte voûtée qui permet d'accéder par un escalier en pierre, aux terrasses inférieures. Une façade construite en tuffeau, éclairée par de hautes fenêtres à croisillons, date du XVIe siècle, et des fenêtres cintrées, plus étroites, du XVIIe siècle. Face à la porte d'entrée, une galerie à colonnes carrées s'ouvrant sur la cour intérieure. Dans l'angle, une tour carrée. Fenêtres à meneaux. Grandes cheminées Renaissance à l'intérieur. De longues galeries souterraines creusées dans le tuffeau. La grange, qui existe encore, est remarquable par son élévation : C'était un temple protestant construit par Henry de Berziau sous le règne de Henri IV.  Henry Hurozius de Berziau, fondateur du château La Marcellière, époux de Claude Tragin de Cohardon.   il appartient actuellement à la vicomtesse Pierre de Bon.","architecture":"POILLE, en mars 1593, après l'abjuration d'Henri IV, un détachement de l'armée royale conduit par de Rocq et Chevalier et dont faisaient partie les capitaines Sablières et la Pointe vont attaquer Pierre de Malherbe dans son château de Poillé, ou s'étaient retirés les habitants des campagnes environnantes, avec leurs meubles et leurs bestiaux, il est forcé de capituler et de se rendre prisonnier aux assaillants. Adam François Bonaventure de Malherbe, issu de Pierre et de Magdeleine de Montausier, était, en 1789, seigneur de Marçon, et avait comparu en cette qualité à l'assemblée des trois ordres, à Tours. Ses fiefs de Poillé, Bois-Maron, Villeneuve ainsi que celui de la Jaille et autres, relevaient de celui de Marçon, dont la haute justice était sous l'hommage de la baronnie de Saint-Christophe en Touraine. Situé près et à l'est du bourg de Marçon, auquel il est en quelque sorte lié par une avenue, le château de Poillé, près duquel se trouve un manoir, anciennement fortifié, appelé la Roche de Poillé, appartenait à M. Joseph-Charles-Louis de Malherbe qui en a hérité de son père, et l'a fait reconstruire en moderne en 1804.                                                                                                                             Éléments protégés MH : les façades et les toitures du château et du pavillon d'entrée ; les pièces du rez-de-chaussée du château; la grille d'entrée et le parc : inscription par arrêté du 19 décembre 1985.","habitants":"Marcellière; Henry de Berziau                                                       Poillé; M. Joseph-Charles-Louis de Malherbe\r\n        \r\n        \"","divers":"Trois  châteaux à Marçon la Marcelière grav 1-2-3 ,  de la Poillé grav 5-6  et de la  Parrerie  grav -4 .                                      Gps 47° 42' 34\" nord, 0° 30' 41\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_Marcon_1.jpg","../../jctruffet.com/image/image_72/72_Marcon_2.jpg","../../jctruffet.com/image/image_72/72_Marcon_3.jpg","../../jctruffet.com/image/image_72/72_Marcon_4.jpg","../../jctruffet.com/image/image_72/72_Marcon_5.jpg","../../jctruffet.com/image/image_72/72_Marcon_6.jpg"]},"Consult_chateau_formulairea8de":{"id":"Consult_chateau_formulairea8de","dept":"72","canton":"Le Lude","commune":"La Fontaine-Saint-Martin","nom":"Maurier","type":"Manoir","periode":"XVII","histoire":"MAURIER, le château est bâti, par Pierre-Félix Delarue, le propriétaire initial du château du Maurier était François-Théodore Latouche, Maire de La Flèche. Le Château du Maurier est construit dans le style néo-Renaissance. La charpente de la grange a été édifiée dans un style, inspiré par Philibert Delorme. Le Château du Maurier et ses dépendances (l'Orangerie, les communs et le pavillon de jardin) font l'objet d'une inscription aux M.H. depuis 1992.","architecture":"MAURIER, à l'emplacement d'un ancien manoir du début du XVIIe siècle, construction d'un nouveau château par l'architecte Pierre Félix Delarue en 1860. L'architecture s'inspire de la période Renaissance. Charpente de la grange à la Philibert de l'Orme, communs de 1860, une statue de Henri IV dans le vestibule et, dans l'escalier, un vitrail représentant les armoiries des six propriétaires depuis 1522. La construction du château du Maurier date du XVIe et XIXe siècle.  Éléments protégés MH : le château et ses dépendances ; l'orangerie ; les communs, avec la charpente de la grange et le pavillon de jardin du XVIe siècle : inscription par arrêté du 29 septembre 1992.","habitants":"Maurier;  François-Théodore Latouche\r\n        \"","divers":"Maurier  GPS : 47° 47' 29,94\" Nord, 0° 02' 55,29\" Est","gps":"47° 47' 29,94\" Nord, 0° 02' 55,29\" Est","images":["../../jctruffet.com/image/image_72/72_Maurier_1.jpg","../../jctruffet.com/image/image_72/72_Maurier_2.jpg"]},"Consult_chateau_formulaire9377":{"id":"Consult_chateau_formulaire9377","dept":"72","canton":"Le Lude","commune":"Mayet","nom":"Mayét","type":"Forteresse","periode":"XV-XVIII","histoire":"Deux châteaux à Mayet le fort des Salles et le château de Mayet.                                                                                          FORT des SALLES,  le vieux château du Fort des Salles dresse toujours sa haute et élégante silhouette du XVe siècle près de la sortie orientale du bourg de Mayet. Les murs avec tous leurs redents de défense plus ou moins étroits et élancés sont encore intacts; mais les pièces intérieures, l'escalier, les toitures sont en grandes ruines, hélas ! et semblent abandonnés à tous les maraudeurs comme à tous les vents. Mais sa haute stature dressée au-dessus des vieilles douves envahies de végétation nous reste bien sympathique; ses tourelles, ses traces de pont-levis, ses mâchicoulis nous demeurent un important témoignage des châteaux fortifiés de la fin du Moyen-Age. Forteresse bâtie fin XIVe siècle. Donjon du Moyen-Âge qui remplaça le château-fort détruit pendant la guerre de Cent Ans, la base tronquée de l'ancienne tour primitive étant encore visible à hauteur du premier étage, sur les murs de pierre blanche, restes du dispositif de défense, mâchicoulis et brèche latérale. Escalier hélicoïdal avec inscriptions 1603. L'édifice est délaissé au XVIe siècle et finit par être ruiné. Un nouveau château est construit au XVIIIe siècle. Le corps de bâtiment, qui s'apparente à une demeure bourgeoise, est flanqué d'une tour couronnée d'une balustrade aveugle. Propriété de la noblesse locale jusqu'en 1879, il tomba dans des mains roturières et se dégrada lentement. Le nom de Salles provient probablement du saxon sali, dont le sens ancien signifie construction formée d'une grande pièce. En effet, le donjon comporte trois étages abritant chacun une pièce, il est le dernier Fort vestige d'un fort relativement important à l'époque médiévale, il était entouré de douves et équipé d'un pont-levis. Éléments protégés MH : la tour du château : inscription par arrêté du 23 mai 1927. La poterne : classement par arrêté du 21 décembre 1984.","architecture":"A quatre kilomètres au sud Est  à Verneuil le Chétif le château de MANGE  . La construction  date des XIe et XIXe siècles. Le château du Mangé a été restauré, entièrement. Il est devenu un gite de séjour.                                                                    MAYET   Le château de Mayet, siège d'une ancienne châtellenie se trouve à 1.200 mètres à l'est du centre du bourg, dans un petit vallon et près d'un étang ; il devait, très anciennement, se trouver sur la hauteur au nord de ce vallon, au village de Saint-Nicolas : en effet, la motte féodale se devine encore auprès de l' ancienne chapelle désaffectée ; le château dut être ruiné sous Charles VI ou Charles VII ; ses dépendances, halles, prisons, justice existaient encore en 1775, à ce village de Saint-Nicolas ; on y voyait aussi les logements des officiers de justice. Le château actuel de Mayet occupe la place du château et du Fort-des-Salles ; ce fut une habitation de grande importance, le fort des Salles, qui, aux mains d'Hélie de La Flèche, eut à subir dès juillet 1099 un siège de Guillaume Le Roux, roi d'Angleterre, qui ne put s'en emparer. Les premiers seigneurs de Mayet appartient à la Maison de Château-du-Loir, puis aux comtes du Maine, aux Plantagenet. Guillaume des Roches leur succéda, et sa descendance, dont, au XIVe siècle, les comtes de Dreux.","habitants":"Seigneurs des Salles                                                                       Mayet; Guillaume des Roches \r\n        \r\n        \"","divers":"Fort la salles grav 1-2                                                                     GPS : 47° 45' 31,24\" Nord et 0° 17' 28,48\" Est                                                Mangé  grav-3_4                                                                                     GPS : 47° 43' 30,57\" Nord, 0° 18' 42,45\" Est","gps":"47° 45' 31,24\" Nord et 0° 17' 28,48\" Est","images":["../../jctruffet.com/image/image_72/72_May%c3%a9t_1.jpg","../../jctruffet.com/image/image_72/72_May%c3%a9t_2.jpg","../../jctruffet.com/image/image_72/72_May%c3%a9t_3.jpg","../../jctruffet.com/image/image_72/72_May%c3%a9t_4.jpg"]},"Consult_chateau_formulaire4223":{"id":"Consult_chateau_formulaire4223","dept":"72","canton":"Loué","commune":"Crannes-en-Champagne","nom":"Mirail_72","type":"Manoir","periode":"XVI","histoire":"MIRAIL, le château, construit au début du XIe siècle, avait pour fonction de garder lancienne voie reliant Le Mans à Rennes. Détruit pendant la guerre de cent ans, il est construit au début du XVIe siècle par la volonté de Catherine de Couesmes, abbesse de Saint Julien du Pré au couvent des Bénédictines du Mans. L'édifice est conçu par Sarlio architecte italien, selon les principes en vogue à la Renaissance. A la fin du XIXe siècle, les bâtiments en mauvais état sont vendus à un industriel du Mans, son fils les restaure et crée un jardin. Cest en 1987, que Thibault et Isabelle de Reimpré en font lacquisition et décident de réaliser un nouveau jardin.","architecture":"MIRAIL, il est structuré par un axe principal et unit une tradition française à un esprit anglais. Des topiaires de buis et d'if ornent la perspective et des scènes diverses. Des chambres closes protègent des mixed borders de plantes vivaces et d'arbustes à fleurs. Près de 300 rosiers constituent une collection de variétés anciennes. Les propriétaires ont su en faire un lieu d'équilibre et de plénitude propice à la rêverie et à la sérénité.","habitants":"Catherine de Couesmes,\r\n        \"","divers":"Château de Mirail à  Crannes-en-Champagne","gps":"","images":["../../jctruffet.com/image/image_72/72_Mirail_72_1.jpg","../../jctruffet.com/image/image_72/72_Mirail_72_2.jpg","../../jctruffet.com/image/image_72/72_Mirail_72_3.jpg"]},"Consult_chateau_formulaire5845":{"id":"Consult_chateau_formulaire5845","dept":"72","canton":"Mamers","commune":"Monhoudou","nom":"Monhoudou","type":"Château","periode":"XVIIIe  XIXe siècles.","histoire":"MONHOUDOU  dit aussi Courbomer,  construit prés d'une ancienne plate-forme fortifiée, avec passage des fameux \"fossés Robert\". L'aspect de la demeure actuelle date des XVIIIe et XIXe siècles, Charles Alexandre Le Bouyer ayant commencé les travaux de transformation en 1707. C'est lui qui fit démolir le mur d'enceinte, l'ancien colombier, boucher les fossés et fit bâtir une arche à l'endroit du pont-levis, à côté se trouvait la chapelle Sainte-Anne et la fontaine dédiée à Saint-Hélier. La statue de Saint-Hélier se retrouve dans l'oratoire du parc du château de Courbomer. Propriété familiale depuis 1625.  Chambres d'hôtes  de Michel vicomte  de Monhoudou.","architecture":"MONHOUDOU, la construction du château actuel date des XVIIIe et XIXe siècles. de plan rectangulaire de deux niveaux  accolés de deux pavillons à droite comme à gauche de même niveau, flanqué sur angles de Tourelles  ultra fines en encorbellement toit en poivrières. Tour ronde sur la face arrière, toit en poivrière. Avant corps d'entrée légèrement saillant avec encadrement à imitation piliers grecs à chapiteau et sommet d'une lucarnes gothique à pinacle.  Le presbytère, jusqu'en 1775, date des XVIe-XVIIe siècles.  Les fossés de Robert II de Bellême (que quelques auteurs identifient à Robert le Diable) sont encore visibles. Robert II de Bellême décide au XIe siècle de relier entre eux ses châteaux par une fortification continue qui est visible à Monhoudou. Le château de Monhoudou est inscrit aux M.H.","habitants":"Charles Alexandre Le Bouyer \r\n        \"","divers":"Château de Monhoudou                                                                         GPS : 48° 17' 12\" Nord, 0° 19' 31\" Est","gps":"48° 17' 12\" Nord, 0° 19' 31\" Est","images":["../../jctruffet.com/image/image_72/72_Monhoudou_1.jpg","../../jctruffet.com/image/image_72/72_Monhoudou_2.jpg","../../jctruffet.com/image/image_72/72_Monhoudou_3.jpg","../../jctruffet.com/image/image_72/72_Monhoudou_4.jpg"]},"Consult_chateau_formulaire82fb":{"id":"Consult_chateau_formulaire82fb","dept":"72","canton":"Le Lude","commune":"Oizé","nom":"Montaupin","type":"Château","periode":"XVIII","histoire":"MONTAUPIN, château de Montaupin , aux termes d'une décision en date du 21/03/2019, l'associée unique, après avoir entendu le rapport du liquidateur, a approuvé le compte définitif de liquidation, déchargé Mme Marie-Paule David, de son mandat de liquidateur, lui a donné quitus de sa gestion et prononcé la clôture de la liquidation à compter du 21/03/2019. Les comptes de liquidation seront déposés au greffe du Tribunal de commerce du Mans, en annexe au RCS, le Liquidateur.","architecture":"MONTAUPIN, entre la Flèche et le Mans dans un joli château de la  fin du XVIII, corps de logis de plan rectangulaire à cinq  travées deux niveaux et  lucarnes sur chien assis sur combles, accolées de part et autres de pavillons rectangulaires saillant et d'une tour ronde mi-Hors oeuvres côté parc. Entouré d'un hectare de verdure, nous vous proposons 5 chambres d'hôtes spacieuses avec sanitaires indépendants.","habitants":"Responsable local\r\n        \"","divers":"Gps  47° 48' 22,96\" N, 0° 06' 29,15\" E","gps":"","images":["../../jctruffet.com/image/image_72/72_Montaupin_1.jpg","../../jctruffet.com/image/image_72/72_Montaupin_2.jpg","../../jctruffet.com/image/image_72/72_Montaupin_3.jpg","../../jctruffet.com/image/image_72/72_Montaupin_4.jpg","../../jctruffet.com/image/image_72/72_Montaupin_5.jpg"]},"Consult_chateau_formulairee83a":{"id":"Consult_chateau_formulairee83a","dept":"72","canton":"La Ferté-Bernard","commune":"La Bosse","nom":"Montdragon_Bosse","type":"Château","periode":"XVII-XIX","histoire":"MONTDRAGON, dès le XIIe siècle le nom de Mont-Dragon est connu et durant tout le XIIIe siècle, au XIVe siècle on trouve des seigneurs de ce nom. En 1747 apparaît la famille de Lonlay de Villepail, comme seigneurs de Mondragon, dont Nicolas, en 1789. Par le mariage de la fille de M. de Lonlay de Villepail avec le comte de Mailly, la propriété entra en 1830 dans la famille des Mailly-Nesle, aux mains desquels elle restera jusqu'au XXe siècle. La comtesse Arnoldine de Mailly devait laisser le domaine de Mondragon à son neveu M. de Mailly, marié à Mlle de La Rochefoucauld, qui, peu après, revendait la propriété à M. Alexandre Yvon, de Bonnétable, l'actuel propriétaire du domaine.","architecture":"MONTDRAGON, en lisière de forêt de Bonnétable, le château présente sa longue masse au sein d'un site romantique; des douves l'entourent; sa façade principale, ouverte vers une cour d'honneur, fut restaurée en 1840. A l'opposé, les murs baignent dans les eaux des fossés. A l'un des angles du quadrilatère, une tourelle étroite, tandis qu'à un autre angle une grosse et large tour a reçu la chapelle.","habitants":"famille de Lonlay de Villepail,\r\n        \"","divers":"Gps 48° 10' 12\" nord, 0° 31' 34\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_Montdragon_Bosse_1.jpg","../../jctruffet.com/image/image_72/72_Montdragon_Bosse_2.jpg","../../jctruffet.com/image/image_72/72_Montdragon_Bosse_3.jpg","../../jctruffet.com/image/image_72/72_Montdragon_Bosse_4.jpg"]},"Consult_chateau_formulaire8ed6":{"id":"Consult_chateau_formulaire8ed6","dept":"72","canton":"La Suze-sur-Sarthe","commune":"Parigné-le-Pôlin","nom":"Montertreau","type":"Château","periode":"XIX","histoire":"MONTERTREAU, la constrution  date du XIXe siècle. Un vieux château existait déjà au XVIIe siècle, Montertreau est acquis par Joséphine-Rose de la Thébaudière, célibataire âgée de vingt ans, en 1800, d'un sieur Fresneau. Cette dernière épousa, en novembre 1802, Charles Lepaige.  En 1844, la famille Lepaige, souhaite habiter une demeure plus confortable et fait construire l'actuel logis disposé de manière perpendiculaire à l'ancien château; ce dernier, inutilisé, sera détruit au début du XXe siècle. Au décès d'Amélie Lepaige, sans héritier direct, la propriété est vendue le 18 mai 1875 à un industriel sarthois passionné de botanique, Alfred Pellier. Ce dernier est primé en 1862 pour l'obtention d'une nouvelle clématite  pellierii, puis en 1863 pour sa collection de fougères. Il est membre de la société centrale d'horticulture de France. Passionné par les penstemons, il leur consacre un article en 1873 dans l'Illustration horticole, revue de botanique dont le rédacteur en chef est Édouard André. C'est tout naturellement, qu'après avoir acquis Montertreau et désireux d'en faire redessiner les jardins, il fait appel au célèbre paysagiste avec lequel il est fréquemment en contact. Le parc de Montertreau est donc le fruit de la rencontre de deux passionnés, et c'est peut-être une des raisons qui font considérer, par Édouard André lui-même, le parc de Montertreau comme un modèle.","architecture":"Monterteau suite . Alfred Pellier ne jouira pas longtemps de son parc et meurt en juillet 1879. En 1934, la famille Decoux décide d'importants travaux d'aménagement intérieurs et fait réaliser des mosaïques dans le style art-déco. Face aux menaces de réquisition de bois, le ministère de l'équipement classe le domaine de Montertreau au titre des sites par arrêté du 26 avril 1946. Il est classé partiellement en 2012 et inscrit aux M.H. en 2011.                                                                                                          Le château de Montertreau est bâti à flanc de colline, au milieu d'un parc boisé dominant la plaine du Bélinois. L'architecte en est Pierre-Felix Delarue vers 1840.  Il s'agit d'un petit édifice à trois travées sur deux niveaux et un niveau de combles éclairé par des lucarnes. Compte tenu du fort dénivelé, le vestibule est en rez-de-cour et le sous-sol est de plain-pied avec la terrasse dominant le parc. Les allusions au gothique finissant sont assez discrètes : encadrements de baies, lucarnes et, sur la façade nord, des tourelles en encorbellement aux angles des pavillons bas, encadrant le corps de logis principal et fausse tour polygonale, demi-hors-d'uvre, au milieu de la façade. Le paysage est entièrement composé en fonction de cet édifice posé au bord de son promontoire, dominant la plaine s'écoulant vers l'horizon, dont E. André dit « qu'elle ne manque pas de grandeur ».","habitants":"Famille Lepaige\r\n        \"","divers":"Montertreau                                                                                           GPS : 47° 50' 50,64\" Nord, 0° 07' 49,08\" Est","gps":"47° 50' 50,64\" Nord, 0° 07' 49,08\" Est","images":["../../jctruffet.com/image/image_72/72_Montertreau_1.jpg","../../jctruffet.com/image/image_72/72_Montertreau_2.jpg","../../jctruffet.com/image/image_72/72_Montertreau_3.jpg"]},"Consult_chateau_formulaire5baf":{"id":"Consult_chateau_formulaire5baf","dept":"72","canton":"Loué","commune":"Auvers-Sous-Montfaucon","nom":"Montfaucon_72","type":"Tour Vestiges","periode":"XVII","histoire":"MONTFAUCON,  la seigneurie de paroisse était annexée à la terre et au château de Montfaucon, appartenant à la maison d'Assé, l'une des plus anciennes en noblesse de la province. La branche de cette maison, surnommée de Montfaucon, était issue à ce qu'on croit d'Aubris Riboule, l'ainé des trois seigneurs de ce nom, qui allèrent en Terre-Sainte, sous les ordres de Geoffroi de Bouillon. Geoffroi, fils de Hubert II d'Assé épousa, en 1340, Agnès Duguesclin. Il s'attacha avec la meilleure partie de la Noblesse de l'Anjou et du Maine a Louis II, duc d'Anjou, comte du Maine, roi de Naples et de Sicile. Charles II d'Assé, qui vivait à la fin du XVIIe siècle, est le premier de cette branche à qui l'on voit prendre le titre de marquis de Montfaucon. Ce château, vendu en 1810, avait été restauré par M de Médavi; construit dans une position charmante, de belles avenues l'entouraient et conduisaient dans le bourg et dans le bois de Beaulieu.","architecture":"MONTFAUCON,  Charles II d'Assé, qui vivait à la fin du XVIIe siècle, est le premier de cette branche à qui l'on voit prendre le titre de marquis de Montfaucon. Il ne reste plus que les pavillons et les écuries du château de Montfaucon, situé sur une élévation au sud du bourg, et dont le propriétaire actuel a fait deux fermes.","habitants":"marquis de Montfaucon\r\n        \r\n        \"","divers":"Gps 48° 00' 22\" nord, 0° 04' 14\" ouest","gps":"","images":["../../jctruffet.com/image/image_72/72_Montfaucon_72_1.jpg","../../jctruffet.com/image/image_72/72_Montfaucon_72_2.jpg","../../jctruffet.com/image/image_72/72_Montfaucon_72_3.jpg"]},"Consult_chateau_formulaired5ce":{"id":"Consult_chateau_formulaired5ce","dept":"72","canton":"Savigné-l","commune":"Montfort le Gesnois","nom":"Montfort_Gesnois","type":"forteresse","periode":"XVII","histoire":"MONTFORT LE GESNOIS, au XIe siècle, Montfort était coiffé dune forteresse qui appartenait au seigneur Hugues de Gesnes. Le château de Montfort appartient actuellement à la famille de Nicolaÿ qui ouvre les portes du parc du château pour les journées du patrimoine. Le château  est de style italien. Le château domine le bourg perché sur une butte bordant la prairie de l'Huisne.","architecture":"MONTFORT LE GESNOIS. Au début du XIXe siècle, vers 1820, lancienne forteresse féodale fait place au château actuel. Cet édifice néo-classique est de nouveau remanié à la fin du second Empire, agrandi et doté de hauts combles. Le parc paysager est redessiné en 1860 par l'architecte paysagiste Varé et comprend une orangeraie.","habitants":"seigneur Hugues de Gesnes.\r\n        \"","divers":"Montfort  GPS : 48° 02' 54\" Nord et 0° 25' 06\" Est","gps":"48° 02' 54\" Nord et 0° 25' 06\" Est","images":["../../jctruffet.com/image/image_72/72_Montfort_Gesnois_1.jpg","../../jctruffet.com/image/image_72/72_Montfort_Gesnois_2.jpg","../../jctruffet.com/image/image_72/72_Montfort_Gesnois_3.jpg","../../jctruffet.com/image/image_72/72_Montfort_Gesnois_4.jpg"]},"Consult_chateau_formulaire5ec0":{"id":"Consult_chateau_formulaire5ec0","dept":"72","canton":"Bonnétable","commune":"Neuville-sur-Sarthe","nom":"Monthéard","type":"Château","periode":"XVIII","histoire":"MONTHEARD, fut possédé par MM. Richer de Monthéard, père et fils, successivement présidents au siège présidial du Mans; ensuite par M. de Biré, à cause de la demoiselle de Fontenay, fille d'une demoiselle de Monthéard. La propriété passera à M. Félix Daniel de Vauguyon, membre de la chambre des députés.","architecture":"MONTHEARD, la seigneurie de paroisse était annexée à la terre de Monthéard, peut-être Mont-Léard, laquelle on qualifiait du nom de baronnie, titre qu'aucun acte d'érection ne paraît justifier. Cette seigneurie relevait du temporel de l'évêché du Mans et de sa baronnie. Le château de Monthéard, avec chapelle, situé sur la rive droite de la Sarthe, à un kilomètre au nord-est du bourg de Neuville. La construction de l'actuel château de Monthéard date du début du XVIIIe siècle.","habitants":"MM. Richer de Monthéard,\r\n        \"","divers":"Gps 48° 04' 33\" nord, 0° 11' 27\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_Month%c3%a9ard_1.jpg","../../jctruffet.com/image/image_72/72_Month%c3%a9ard_2.jpg","../../jctruffet.com/image/image_72/72_Month%c3%a9ard_3.jpg","../../jctruffet.com/image/image_72/72_Month%c3%a9ard_4.jpg"]},"Consult_chateau_formulaire5fec":{"id":"Consult_chateau_formulaire5fec","dept":"72","canton":"Mamers","commune":"Villeneuve-en-Perseigne","nom":"Montigny_72","type":"Château","periode":"XVIII","histoire":"MONTIGNY, château de la première moitié du XVIIIe siècle, entouré d'une ancienne chapelle, le bâtiment central en avancée et surélevé par rapport aux deux ailes est orné à l'arrière d'un fronton sculpté aux armes des Boullemer ( propriétaires depuis 1686 ). Une terrasse a été rajoutée en 1918. Les deux pavillons de chaque côté du château sont caractéristiques du XVIIe siècle. La fuie, avec ses murs en pierre recouverts d'enduits, est surmontée d'un clocheton en ardoise, elle conserve, à l'intérieur, les boulins qui accueillaient les pigeons. Haras de 1890 en forme de fer à cheval avec leurs boxes d'origine, une partie des bâtiments abrite la mairie.","architecture":"MONTIGNY, construit vers 1730, le château de Montigny est une bonne illustration du style classique avec un corps central et deux ailes. Autour du château se trouve une ancienne chapelle avec un presbytère attenant et un pigeonnier. A la fin du XIXe siècle. fut construit un haras toujours en activité de nos jours. Le Haras est alimenté en eau par un forage de 100 m de profondeur et une pompe actionnée par un moteur monocylindre fonctionnant au gazogène. La construction du château date du XVIIIe siècle. Il est de style Classique. Dans le parc du Château de Montigny se trouve une ancienne chapelle, un presbytère et un pigeonnier. Le château de Montigny s'est doté au XIXe siècle aussi d'un haras qui  est alimenté  en eau par un forage de 100 mètres de profondeur, propriétaire monsieur Antoine Favier.","habitants":"Famille des Boullemer\r\n        \"","divers":"Gps 48° 26' 52\" nord, 0° 15' 12\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_Montigny_72_1.jpg","../../jctruffet.com/image/image_72/72_Montigny_72_2.jpg"]},"Consult_chateau_formulaireb498":{"id":"Consult_chateau_formulaireb498","dept":"72","canton":"Saint-Calais","commune":"Montmirail","nom":"Montmirail_72","type":"Forteresse","periode":"XV-XVIII","histoire":"MONTMIRAIL, du XI au XVe siècle possession des Gouêt, en 1164 incendié par Richard Coeur de Lion,  à  la fin du XVe siècle.  Le château relevé de ses ruines passe à partir du XVe siècle entre les mains des Nevers, les Châtillons, les Valois d'Alençon, les Bourgogne\r\navant d'échoir à Jeanne de Bar épouse de Louis de Luxembourg- Saint-Pol, après l'exécution de ce dernier Montmirail revient à Charles d'Anjou, comte du Maine qui reconstruit le château actuel. Ce dernier mourra en 1481. Le château passa aux la Baulme et aux Perrault qui le vendirent au prince de Conti; la princesse de Conti  fille légitimée de Louis XIV et Melle de la Vallière y résida parfois, à la fin du XVIIe siècle vendu à Louis-Armand de Bourbon prince de conti qui venait d'épouser mademoiselle de Blois  veuve en 1685 âgé de 19 ans possède de nombreuses résidences dans le Maine s'attache à Montmirail à le transformer en résidence d'agrément. En 1719 se défait du domaine au profit de Michel Havet de Neuilly marquis de Neuilly, président au parlement de Paris, lègue à sa mort  à ses neveux, puis par héritage passe aux Boisguilbert, puis aux Fayet marquis et la marquise de Fayet ont hérité  en 1969, actuel propriétaire.","architecture":"MONTMIRAIL, du XVe siècle aux allures de forteresse médiévale, transformé au XVIIIe siècle. Lieu de rencontres entre les rois de France, d'Angleterre et Thomas Beckett en 1169. Salles d'armes souterraines du XVe siècle. Quatre périodes de construction a la fin du XIe-fin XIIe siècle, ne reste que le site de la motte féodale. A la- fin XIVe-XVe siècle : reconstruction partielle du château  premier tiers du XVIe siècle: construction de la tour octogonale. Au XVIIIe siècle, aménagement des pièces de réception et réalisation des jardins et du parc. Séjour de Thomas Becket. En 1994, Bertrand de Buffévent a racheté le château de Montmirail. Aujourd'hui, le chateau est mis en vente : A vendre : château des XVe, XVIIIe et XIXe ayant accueilli les rois de France et dAngleterre, vue magnifique à 360°C, 1 200 m2 habitables, joli parc de 3,23 ha. Après plusieurs années de réflexion, les propriétaires du château de Montmirail ont décidé de franchir le cap et de vendre leur extraordinaire demeure. « Cest un crève-cur », confie Bertrand de Buffévent, qui a repris le château en 1994 avec sa femme. « La charge est devenue écrasante entre les salaires, les impôts, les taxes, etc. , comme les restaurateurs et les organisateurs des Journées médiévales, espère que les prochains propriétaires ne fermeront pas les grilles du château au Public. « Nous avons travaillé très dur pour obtenir notre label Petite cité de caractère, qui attire du monde, indique-t-il. Si le Château fermait, nous serions certainement déclassés.  Éléments protégés MH : les façades et les toitures ; les deux pièces du XVIIIe siècle, ornées de boiseries: inscription par arrêté du 15 juin 1964. L'ensemble du bâti, avec le parc et les jardins : inscription par arrêté du 8 novembre 1995. Le parc ; le bâtiment de la ferme des Plantes ; l'ensemble du bâti de la métairie dite de la Reine Bouvière : inscription par arrêté du 15 mai 1996.","habitants":"Charles d'Anjou, comte du Maine\r\n        \"","divers":"Montmirail  GPS : 48° 6' 11,99\" Nord et 0° 47' 25,01\" Est","gps":"48° 6' 11,99\" Nord et 0° 47' 25,01\" Est","images":["../../jctruffet.com/image/image_72/72_Montmirail_72_1.jpg","../../jctruffet.com/image/image_72/72_Montmirail_72_2.jpg","../../jctruffet.com/image/image_72/72_Montmirail_72_3.jpg","../../jctruffet.com/image/image_72/72_Montmirail_72_4.jpg","../../jctruffet.com/image/image_72/72_Montmirail_72_5.jpg","../../jctruffet.com/image/image_72/72_Montmirail_72_6.jpg"]},"Consult_chateau_formulaireab3c":{"id":"Consult_chateau_formulaireab3c","dept":"72","canton":"Le Lude","commune":"Dissé-sous-le-Lude","nom":"Mortier","type":"Château","periode":"XVI-XVIII","histoire":"MORTIER, une enceinte fortifiée des Mortiers est signalée dès le XIIe siècle. En 1456, Etienne de Lorière, frère d'Hubert, seigneur de Lorière, est propriétaire des Mortiers. En 1515, les Mortiers passent à Julien de Lorière, puis en 1567 à Urbin Fouquet, en 1672 à Pierre de Rougé qui vend à Hamelin, notaire au Lude. En 1727, le Mortier était la propriété de André Fontaine et Marie Maulluis son épouse. A cette époque, un procès-verbal de visite  rend compte d'un logis avec métairie dans une cour fermée par un porche. Le domaine du Mortier était assez vaste et comprenait 42 lieux et métairies qui s'étendent sur les communes de Chigné, Broc, Noyant, Dénezé et Chalonnes dans le Maine-et-Loire. L'ensemble des bâtiments dont l'implantation pouvait remonter au Moyen-Age, a dû être remanié au XVIe ou XVIIe siècle pour être entièrement modifié une seconde fois, entre 1811 et 1845, et une troisième fois vers 1896 par les Puységur, pour lui donner son aspect actuel. Le Mortier est un domaine rural très important au début du XVIIIe siècle.","architecture":"MORTIER, la demeure principale est composée de trois chambres basses avec deux cabinets à l'ouest et de trois chambres hautes avec deux cabinets à l'étage. L'entrée principale est un perron couvert dessiné en 1811. En 1845, les dépendances de la ferme à l'exception de la maison du métayer sont en partie démolies et le logis est agrandi. Une esplanade paysagère s'ouvre devant la demeure. Au sud-est, l'ancienne cour est redessinée en demie lune ponctuée d'un portail. L'axe de la composition s'étire également vers le sud-est et un potager clos est aménagé le long. Le potager est composé de douze carrés de jardins avec un bassin au centre relié, d'une part, à la route de Noyant par un chemin rectiligne, et d'autre part à une petite pièce d'eau. Toute cette organisation est aujourd'hui modifiée. Le nouveau logis est isolé au centre de la composition paysagère et les communs reconstruits s'accompagnent d'une pièce d'eau et d'une île occupée par une fabrique.","habitants":"Famille des Lorière\r\n        \r\n        \"","divers":"Gps 47° 36' 32\" nord, 0° 09' 18\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_Mortier_1.jpg","../../jctruffet.com/image/image_72/72_Mortier_2.jpg","../../jctruffet.com/image/image_72/72_Mortier_3.jpg"]},"Consult_chateau_formulairec4d0":{"id":"Consult_chateau_formulairec4d0","dept":"72","canton":"Château-du-Loir","commune":"Nogent sur Loir","nom":"Motte_Nogent","type":"Château","periode":"XVI","histoire":"La MOTTE, la seigneurie de paroisse, annexée à la terre de la Motte, était qualifiée du titre de baronnie; sa juridiction relevait du présidial du Mans. Catherine, fille de Louis de Champagne, comte de la Suze et de Magdeleine de Melun-Nonnanville, qui la tenait probablement du chef de sa mère, la porta en mariage à Amauri Goyon II, comte de Plouer, etc., marquis de la Moussaye, lequel mourut en 1626. Son troisième fils, François Goyon, lieutenant général des armées du Roi, mort gouverneur de Stenay, parait l'avoir possédée puisqu'il porta le titre de baron de Nogent. Elle passa ensuite a son neveu, Henri Goyon, second fils d'Amauri III, marquis de La Moussaye, baron de Nogent sur Loir, qui vivait en 1674. La Motte fut possédée par la famille des Rancher, seigneurs de la terre de Verneil en Dissay sous Courcillon.","architecture":"La MOTTE, le château de la Motte, qui paraît s'être appelé aussi la Motte du Parc, et avoir reçu son nom du merc féodal, situé au sud-est du bourg, sur la rive droite du ruisseau de Mézières, est un édifice à deux ailes, avec pavillon carré, accompagné d'une tour ronde à son angle occidental, et d'une autre tourelle hexagonale, au nord. Il est entouré de jardins, d'avenues et pièces d'eau.","habitants":"Amauri Goyon II\r\n        \"","divers":"Gps 47° 40' 08\" nord, 0° 23' 48\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_Motte_Nogent_1.jpg","../../jctruffet.com/image/image_72/72_Motte_Nogent_2.jpg","../../jctruffet.com/image/image_72/72_Motte_Nogent_3.jpg","../../jctruffet.com/image/image_72/72_Motte_Nogent_4.jpg"]},"Consult_chateau_formulaired6bf":{"id":"Consult_chateau_formulaired6bf","dept":"72","canton":"Sillé-le-Guillaume","commune":"Moulins le Carbonnel","nom":"Moulins_Carbonnel","type":"Château","periode":"XVI","histoire":"MOULINS de CARBONNEL, les premiers seigneurs de Moulins sont mentionnés dès la fin du XIe siècle, dont la famille Carbonnel connue au XIIe siècle. On trouve en 1158, Henri Carbonnel au nombre des manceaux qui se croisèrent pour la Terre Sainte avec Geoffroi IV de Mayenne. Le 4 novembre 1467, un Carbonnel était du coté du duc d'Alençon et des princes qui entrèrent renforcer la garnison d'Alençon sous les ordres de Jean de Laval neveu maréchal de Lohéac. Le château actuel remonte vraisemblablement au XVIe siècle mais de nombreux remaniements ont été réalisés au cours des siècles suivants.Le 4 novembre 1467, un Carbonnel était du coté du duc d'Alençon et des princes qui entrèrent renforcer la garnison d'Alençon sous les ordres de Jean de Laval neveu maréchal de Lohéac.","architecture":"MOULINS de CARBONNEL, le château actuel remonte vraisemblablement au XVIe siècle mais de nombreux remaniements ont été réalisés au cours des siècles suivants. Construction du logis de plan rectangulaire à deux niveaux, arcades des fenêtres à fronton triangulaire du deuxième niveaux à ras les combles et lucarnes centrales, toit en croupes couvert d'ardoises . Dépendances droite et gauches de même style formant la cour d'honneur.","habitants":"Jean de Laval\r\n        \"","divers":"Gps 48° 22' 24\" nord, 0° 01' 23\" ouest","gps":"","images":["../../jctruffet.com/image/image_72/72_Moulins_Carbonnel_1.jpg","../../jctruffet.com/image/image_72/72_Moulins_Carbonnel_2.jpg","../../jctruffet.com/image/image_72/72_Moulins_Carbonnel_3.jpg","../../jctruffet.com/image/image_72/72_Moulins_Carbonnel_4.jpg"]},"Consult_chateau_formulaire1252":{"id":"Consult_chateau_formulaire1252","dept":"72","canton":"Mamers","commune":"Saint Rémy du Val","nom":"Moullins_St_Rémy_Val","type":"Manoir","periode":"XV-XVI","histoire":"MOULLINS,  l'histoire connue commence en 995 avec l'arrivée d'une communauté de onze moines et d'un prieur. Ils sont envoyés par l'abbé Gauzbert de l'abbaye Saint-Pierre de la Couture. Le développement du prieuré amènera la construction de la grande salle d'apparat à nef et bas-côtés que l'on date des années 1300-13401. Lors de la guerre de Cent Ans, l'armée d'invasion d'Henri V, ou les bandes l'accompagnant, mit fin au développement du prieuré en octobre 1417, en pillant puis brûlant l'ensemble des bâtiments.\r\nIl faudra attendre la fin du XVe siècle pour que de nouveaux bâtiments soient construits : un logis seigneurial et la chapelle Sainte-Catherine. À la Révolution le domaine sera morcelé. Les bâtiments changeront d'affectation et seront dégradés. Il faudra attendre la fin du XXe siècle pour qu'une restauration de qualité soit entreprise par les nouveaux propriétaire, acquis par la famille de Philippe Fabre en 1983.","architecture":"MOULINS, ensemble unique de l'architecture des XIVe, XVe et XVIe siècles comprenant un logis abbatial (1500-1510), une chapelle castrale (1500-1527) et un manoir halle (1300-1340). Après 27 années de restauration minutieuses, la visite comprend d'une part les extérieurs et le rez-de-chaussée du logis, la chapelle et le manoir halle. Depuis deux ans les travaux concernent la restauration du manoir halle plus ancien (1300-1340) incendié par l'armée anglaise en 1417. Il s'agit d'une immense salle de réception, à l'origine de 360 m² sur 15 mètres de haut. Le seul autre exemple connu dans le Maine, de cette envergure, est le manoir-halle des Comtes du Maine au Mans (Palais Comtal).                                                                                                                                   Le grand prieuré  fut édifier au Xe siècle\r\nÉléments protégés MH : les restes du manoir dit le Logis du Moulin ou Basse Cour du Moulin : inscription par arrêté du 9 décembre 1926.","habitants":"famille de Philippe Fabre \r\n        \r\n        \"","divers":"Gps 48° 20' 59\" nord, 0° 15' 17\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_Moulins_St_R%c3%a9my_Val_1.jpg","../../jctruffet.com/image/image_72/72_Moulins_St_R%c3%a9my_Val_2.jpg","../../jctruffet.com/image/image_72/72_Moulins_St_R%c3%a9my_Val_3.jpg","../../jctruffet.com/image/image_72/72_Moulins_St_R%c3%a9my_Val_4.jpg"]},"Consult_chateau_formulaired660":{"id":"Consult_chateau_formulaired660","dept":"72","canton":"Château-du-Loir","commune":"Flée","nom":"Ourne_Flée","type":"Château","periode":"XVIII-XIX","histoire":"OURNE  Ourne est une des 182 métairies fondée par Aldric, évêque du Mans, vers 839. C'est Aldric qui fait construire près de la métairie un château important avec des fossés, un mur d'enceinte, deux tours carrées. La seigneurie d'Ourne qui rend foi et hommage à son suzerain reçoit en retour des droits \"d'usaige\" sur la forêt de Bersay et des droits de passage et de pacage pour les porcs, les chevaux, les bufs, les chèvres, les moutons paissent dans les belles prairies des vallées du Dinan et du Loir. Au début du XlVe siècle, Ourne appartient aux seigneurs de Bueil. A l'église paroissiale Saint Pierre, ils ont juxtaposé une belle collégiale destinée à regrouper les tombeaux de la famille. Les Bueil ont été souvent des capitaines courageux. Quatre Bueil s'illustreront pendant la guerre de cent ans; deux furent des compagnons de Jeanne d'Arc. Hubert de Vendômois hérita d'Ourne par son mariage avec une demoiselle de Bueil. En 1452, Robert de Montulais, gendre de Jean de Vendômois, est seigneur du fief d'Ourne dont les assises se tenaient parfois au presbytère de Sainte-Cécile.","architecture":"OURNE  Vincent Leblanc, grand audiencier de France, achète Ourne en 1720. En 1736, il revend Ourne à un membre éminent de la noblesse du Maine, J-B. Lemaçon de Trèves, chevalier de l'ordre de Saint Louis, colonel du régiment de cavalerie de Bourgogne, propriétaire du château de Vouvray également. Pendant la révolution, Ourne appartient successivement à M. Designé, le17 messidor de l'an II, à M. Vergniaud le 26 frimaire de l'an III, négociant à Orléans, en 1806 à Pierre Voisin de Château du Loir. M. Edmond Voisin devient propriétaire d'Ourne en 1835. Il agrandit le domaine, achète la ferme de la Haraudière, la Richardière, des vignes, des bois... Il fait construire une partie de la maison de maître. Le général Cavaignac achète Ourne en 1855. Il fait construire les communs, aménage le parc, fait tracer des allées dans les bois, et fait construire un pont sur le ruisseau entre le château et la ferme. If meurt en 1857. Sa veuve fait reconstruire le vieux moulin. M. Godefroy Cavaignac, député, continue les aménagements du château. Ourne demeure la propriété de la famille Cavaignac.                                                                          Ourne est une des 182 métairies fondée par Aldric, évêque du Mans, vers 839. C'est Aldric qui fait construire près de la métairie un château important avec des fossés, un mur d'enceinte, deux tours carrées.","habitants":"Général Cavaignac\r\n        \"","divers":"Gps 47° 43' 58\" nord, 0° 27' 11\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_Ourne_Fl%c3%a9e_1.jpg","../../jctruffet.com/image/image_72/72_Ourne_Fl%c3%a9e_2.jpg"]},"Consult_chateau_formulairedbcd":{"id":"Consult_chateau_formulairedbcd","dept":"72","canton":"Changé","commune":"Parigné-L","nom":"Parigné_L","type":"Château","periode":"XV-XIX-XX","histoire":"Trois châteaux à Parigné-L'Evêque , Montbraye, Haut Bois et Vaudère.                                                                                                      MONTBRAYE, situé à 12 kms, au Sud-Est du Mans, construit en 1900 et récemment rénové, le château de Montbraye vous accueille dans un cadre chaleureux et raffiné, à Parigne-l'Evêque, le château de Montbraye est devenu un gîte d'hôtes et loue les salles du château.  A deux kilomètres au sud -Est à Brette le Bains le château de Haut Bois.                                                                                                                       HAUT-BOIS, le château de Haut-Bois pourrait remonter à la fin du XVe siècle. Ce bâtiment revint au département en 1945 et sert, pendant deux ans, de centre d'accueil et de convalescence aux réfugiés des camps de concentration nazis. En 1948, une école ménagère ouvrit dans les bâtiments et c'est en 1978 que l'établissement fut transformé en  lycée d'enseignement professionnel agricole. Par la suite de nouveaux bâtiments ont été construits sur la propriété du château du Haut-Bois.","architecture":"VAUDERE, la construction du château de la Vaudère date du XIXe siècle. Construit au début du XIXe siècle, le château tient son nom de son premier propriétaire dont l'épouse était la célèbre femme de lettres, Jane de la Vaudère. L'Orangerie, achevée d'être entièrement rénovée en 2010, vous ouvre ses portes. La salle de réception d'une extrême modularité peut accueillir de 20 à 250 personnes assises et s'accommode à tous types de réception : mariages, séminaires, événements circuit, réunions de famille, soirées dansantes.","habitants":"Famille de la Vaudère.\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Trois châteaux à Parigné-L'Evêque , Montbraye grav 1, Haut Bois grav-5 et Vaudère grav 2-3-4.                                                             GPS : 47° 56' 11\" Nord, 0° 21' 52\" Est                                                               Vaudère GPS : 47° 56' 11\" Nord, 0° 21' 52\" Est","gps":"47° 56' 11\" Nord, 0° 21' 52\" Est","images":["../../jctruffet.com/image/image_72/72_Parign%c3%a9_1.jpg","../../jctruffet.com/image/image_72/72_Parign%c3%a9_2.jpg","../../jctruffet.com/image/image_72/72_Parign%c3%a9_3.jpg","../../jctruffet.com/image/image_72/72_Parign%c3%a9_4.jpg","../../jctruffet.com/image/image_72/72_Parign%c3%a9_5.jpg"]},"Consult_chateau_formulaire876e":{"id":"Consult_chateau_formulaire876e","dept":"72","canton":"Le Lude","commune":"Chenu","nom":"Paty_Chenu","type":"Château","periode":"XVI-XVIII","histoire":"PATY, la démolition des communs après 1845 correspond à un retournement de la composition d'ensemble du site. Il est difficile de savoir si ces aménagements sont dus à Mme Vergnon décédée en 1864 ou à son fils M. Traxler. L'entrée par le bourg fut privilégiée et un parc paysager fut planté. Les nouveaux communs et la ferme sont repoussés près de la route pour dégager l'accès à la plate-forme. Un nouveau pont est bâti et une terrasse aménagée au-dessus des douves devant le grand salon. A proximité du potager, des petites maisons de la fin du XVe siècle témoignent de la reconstruction du domaine après la guerre de Cent Ans.","architecture":"PATY; la forme globale de l'édifice avec son plan en L cantonné de tourelles est le vestige d'une maison de campagne de la fin du Moyen-Age dont les ouvrages de défense se réduisent à la protection des douves. Le château du Paty est un logis probablement du XVIe siècle très remanié. La distribution intérieure de la maison fut remaniée au XVIIIe siècle avec la construction d'un nouvel escalier dans oeuvre et l'aménagement de salons. Les communs placés immédiatement au nord de la plate-forme sur le cadastre de 1812 se répartissent autour d'une cour fermée où l'on peut supposer la présence d'une grange importante. Ces communs ont leur entrée propre par la route de Saint-Germain-d'Arcé. Le château est bâti sur l'angle d'une plate-forme fossoyée traitée comme un étang alimenté par le ruisseau du Paty. Celui-ci longe les jardins du bourg et le potager du château pour alimenter l'étang des douves. Deux déversoirs placés dans la chaussée de l'étang restituent l'eau dans le lit du ruisseau en évacuant le trop plein notamment dans le bief du moulin. Il semble qu'il n'y ait jamais eu qu'un pont pour accéder à la plate-forme par le sud et une passerelle pour relier le logis directement aux jardins situés au nord, du côté des communs. Il est à noter qu'il n'y a aucun accès direct depuis le bourg avant la fin du XIXe siècle. Le logis est aujourd'hui un bâtiment en L avec un escalier dans oeuvre du XVIIIe siècle, placé à la jonction des deux ailes. Il pourrait remplacer une tourelle d'escalier demi hors oeuvre jadis placée dans l'angle.  Éléments protégés MH : les façades et les toitures, le portail d'accès et le pont sur les douves qui l'accompagne : inscription par arrêté du 8 novembre 1977.","habitants":"Famille de  Mme Vergnon\r\n        \"","divers":"Gps 47° 36' 40\" nord, 0° 20' 07\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_Paty_Chenu_1.jpg","../../jctruffet.com/image/image_72/72_Paty_Chenu_2.jpg","../../jctruffet.com/image/image_72/72_Paty_Chenu_3.jpg"]},"Consult_chateau_formulaire8564":{"id":"Consult_chateau_formulaire8564","dept":"72","canton":"La Suze-sur-Sarthe","commune":"Parigné le Pôlin,","nom":"PerraIs","type":"Château","periode":"XVII-XVIII","histoire":"PERRAIS, le domaine est entré dans les possessions de la famille de Broc par une alliance en 1450 avec la famille de Saint-Benoît. Sébastien de Broc fixe sa résidence sur la terre des Perrais au début du XVIIe siècle, et fait construire vers 1630 l'aile est de l'actuel château en l'adossant à une tour du XVe siècle. Au XVIIIe siècle, Michel-Armand de Broc, premier marquis du nom, fait édifier le grand corps de logis principal avec sa façade sur la cour d'honneur.\r\nÀ la fin du XIXe siècle, le dernier marquis, Thibaut de Broc, marié à Berthe Worms de Romilly, une riche héritière, fait exécuter d'importants travaux avec l'ajout du pavillon ouest et des arcades qui bordent la cour d'honneur par l'architecte Sanson. Le paysagiste Achille Duchêne crée les parterres des terrasses et le parc à la française. Les dépendances sont agrandies ; la marquise de Broc y installe un hôpital pendant la Première Guerre mondiale. Le roi d'Espagne, Alphonse XIII se porte acquéreur, en 1931, mais renonce aussitôt à son projet en raison de la situation politique dans son royaume. Le château des Perrais est brièvement occupé par les Allemands en 1940 puis en 1944-45 par les Américains, qui y installent une école de déminage. En 1946, la vicomtesse de Lantivy offre son domaine à l'Évêché, lequel le transforme pour accueillir l'Institution Saint-Michel des Perrais, établissement d'enseignement catholique privé. Mgr Grente avait pour ambition de créer un internat moderne, loin des villes, pour former les élites futures de la France.  L'Institution Saint-Michel des Perrais cesse ses fonctions en juillet 2015. Un vétérinaire nantais s'en porte acquéreur en avril 2017 pour en faire sa résidence.","architecture":"PERRAIS,  château construit au XVIIe siècle, avec une importante galerie de portraits. La cour d'honneur est bordée à l'est par une aile au toit à une pente portant des lucarnes alternées. Un chaînage de pierre souligne les ouvertures, aux croisées à petit bois. Trois tours rondes à l'est et au nord, le corps de logis principal du XVIIIe siècle avec un avant-corps en légère avancée, en bossage de tuffeau et dominé par un fronton présentant un tympan sculpté des armes des Broc, encadrées de trophées guerriers. A l'ouest, la cour d'honneur est fermée par un pavillon carré et des arcades surbaissées, uvre de l'architecte P.E. Sanson. Communs des XVIIIe et XIXe siècles à partir des deux pavillons des extrémités sud. Parc de 1900, dessiné par A. Duchêne, comportant des statues copiant celles de Versailles. Au nord, vaste terrasse dominant la vallée. Les façades et toitures du château  y compris l'aile du XIXe siècle, et celles des ailes des communs, l'escalier avec sa cage, les pièces suivantes du rez-de-chaussée avec leur décor : la salle à manger, la bibliothèque, le grand-salon, la chapelle font l'objet d'une inscription aux M.H.depuis le 21 décembre 1984. Éléments protégés MH : les façades et les toitures du château, y compris l'aile du XIXe siècle, et celles des ailes des communs; l'escalier avec sa cage, la chapelle : inscription par arrêté du 21 décembre 1984.","habitants":"famille de Broc\r\n        \"","divers":"Gps 47° 50' 53\" nord, 0° 06' 36\" est","gps":"","images":["../../jctruffet.com/image/image_72/72_Perrais_1.jpg","../../jctruffet.com/image/image_72/72_Perrais_2.jpg","../../jctruffet.com/image/image_72/72_Perrais_3.jpg","../../jctruffet.com/image/image_72/72_Perrais_4.jpg"]},"Consult_chateau_formulairef92a":{"id":"Consult_chateau_formulairef92a","dept":"72","canton":"La Suze-sur-Sarthe","commune":"Voivre les le Mans","nom":"Perrière_Voivre","type":"Château","periode":"XIII-XVIII","histoire":"PERRIERE, c'est un manoir de type anglo-saxon. Le Manoir de la Perrière a été construit, avant XIIIe siècle, par un seigneur rural, un chevalier. Le manoir de La Perrière, a été construit au milieu dune exploitation agricole. Lactivité laitière actuelle du propriétaire pérennise cette situation exceptionnelle. La famille noble des Champagnes, seigneurs de La Suze, pourrait être à l'origine des Célébrations calvinistes. Le Manoir, précieux témoignage de l'architecture médiévale d'inspiration anglo-saxonne reconnaissable par ses trois nefs accolées, antérieures à la guerre de cent ans, qui se présente sous la forme d'une grande salle de plain-pied sous charpente apparente avec des ailes en appentis contenant les annexes. La charpente actuelle, datée du XVIIIe siècle, pourrait avoir été édifiée après les destructions qui accompagnèrent la Révocation de l'Edit de Nantes en 1698. Chaque nef était chauffée par une cheminée. Leurs vestiges dans les murs gouttereaux les montrent alignées et de mêmes dimensions (3,05 m de largeur). Désaffecté de sa fonction agricole.","architecture":"PERRIERE,   nécessite depuis des travaux urgents pour la réparation de sa charpente et de sa couverture et, d'autre part, pour la réalisation de quelques aménagements pour en faciliter l'accès. L'association pour l'Étude du Patrimoine Sarthois et l'Association pour la sauvegarde du manoir de La Perrière, sont habilitées à recevoir des dons pour des recherches sur le patrimoine sarthois en vue de publication et dexposition, et l'étude, la consolidation, protection et mise en valeur du manoir. Elles se sont mobilisées depuis plusieurs années en faveur de ce site. Elles ont lancé un appel au mécénat privé et au mécénat d'entreprise en application de la Loi française sur le mécénat.","habitants":"Famille des Champagnes\r\n        \r\n        \"","divers":"GPS : 47° 55' 04\" Nord, 0° 02' 41\" Est","gps":"47° 55' 04\" Nord, 0° 02' 41\" Est","images":["../../jctruffet.com/image/image_72/72_Perri%c3%a8re_Voivre_1.jpg","../../jctruffet.com/image/image_72/72_Perri%c3%a8re_Voivre_2.jpg","../../jctruffet.com/image/image_72/72_Perri%c3%a8re_Voivre_3.jpg","../../jctruffet.com/image/image_72/72_Perri%c3%a8re_Voivre_4.jpg","../../jctruffet.com/image/image_72/72_Perri%c3%a8re_Voivre_5.jpg"]},"Consult_chateau_formulaired0d0":{"id":"Consult_chateau_formulaired0d0","dept":"72","canton":"Savigné-l","commune":"Le Breil sur Mérize","nom":"Pescheray","type":"Château","periode":"XVI-XIX","histoire":"PESCHERAY, château construit du XVe au XIXe siècle, le perron monumental remplaçant l'ancien pont-levis. Le pigeonnier du XVIe siècle est lun des plus grands de France, il compte 2.000 niches. Donjon de plan pentagonal. En 1995, lAssociation des Cités du Secours Catholique prend en charge le domaine de Pescheray, qui a pour vocation  dapporter aux personnes souffrant d'exclusion le témoignage de la solidarité, grâce à une réinsertion sociale, notamment par une action sur lemploi, le logement, la santé et la formation professionnelle. Le parc est un véritable écrin de verdure pour un château du XVIe siècle.  La partie la moins connue du site est un domaine seigneurial édifié à partir du XVIe siècle et qui a sans cesse été agrandi et remanié au fil du temps. Le Domaine comporte un château dont les parties encore visibles aujourd'hui ont été construites entre le XVIe et le XIXe siècle. Il est entouré de nombreux bâtiments tels qu'un logis porte et un pigeonnier monumental du XVIe siècle, une immense grange, une ancienne orangerie, une chapelle néo-gothique et une fabrique du XIXe siècle.Depuis 1967, le Domaine de Pescheray appartient, suite à une donation, au Secours Catholique, qui y a développé des oeuvres sociales. Il permet à 70 personnes handicapées d'être en situation de travail dans des conditions adaptées à leurs capacités.","architecture":"Dans la commune voisine Soulitré,  Château de Brusson.\r\nChâteau de la Roche Breslay (1458), pas d'information pour ce dernier.                                                             BRUSSON, fut d'abord un lieu de chasse dépendant du Grand Lucé, puis agrandi sous Louis XVI. L'architecture très pure et typique, donne cette beauté classique et douce du XVIIIe siècle. Demeure accompagnée de jardins et de prairies, ayant appartenu aux familles d'Avaugour et de Montmorency-Fosseux, puis acquise par la famille de Rivau au XIXe siècle. Louis de Rivau fut maire de la commune de Soulitré pendant 40 ans  chambres d'hôtes et location salles réceptions.","habitants":"Secours Catholique                                                                            Brusson; famille d'Avaugour \r\n        \r\n        \"","divers":"Pecheray grav de1 à 5                                                                                          GPS : 48° 00' 37\" Nord et O° 28' 38\"\r\nDans la commune voisine Soulitré le château  Château de Brusson   grav 6-7 .","gps":"48° 00' 37\" Nord et O° 28' 38\"","images":["../../jctruffet.com/image/image_72/72_Pescheray_1.jpg","../../jctruffet.com/image/image_72/72_Pescheray_2.jpg","../../jctruffet.com/image/image_72/72_Pescheray_3.jpg","../../jctruffet.com/image/image_72/72_Pescheray_4.jpg","../../jctruffet.com/image/image_72/72_Pescheray_5.jpg","../../jctruffet.com/image/image_72/72_Pescheray_6.jpg","../../jctruffet.com/image/image_72/72_Pescheray_7.jpg"]},"Consult_chateau_formulaire6473":{"id":"Consult_chateau_formulaire6473","dept":"72","canton":"Sablé-sur-Sarthe","commune":"Avoise_Paré","nom":"Pescheseul","type":"Château","periode":"XVI-XVII","histoire":"PESCHESEUL, les Champagne sont propriétaires de Parcé en 1100 et de Pescheseul en 1220. Geoffroy IV de Champagne, gouverneur d'Angers sous Jean sans Terre vers 1206, en devient le premier Seigneur. Ses descendants sont Jehan I, Jehan II, Jehan III et Jehan IV qui épousera Marie de Sillé, c'est Pierre 1er, frère de Jean IV, qui hérite au milieu du XVe de la Sirerie.  Son petit-fils Pierre II va lui succéder. Fin 1571, quinze jours durant, Jean V reçoit à Pescheseul le roi Charles IX son cousin, la reine mère Catherine de Médicis et leur cour. À son décès, il est enterré dans «l'enfeu des Seigneurs de Pescheseul à l'église de Parcé». C'est sa petite-fille Philippe de Champagne qui hérite de Pescheseul. Elle épouse Gilbert du Puy du Fou, Prince de Pescheseul, qui sert dans les troupes de la Ligue au XVIIIe siècle Philippe de Champagne s'est remariée avec le baron de Couthenaud. Il la maltraite et elle doit s'enfuir de Pescheseul pour le château du Puy du Fou puis celui de Sablé. C'est son fils René du Puy du Fou qui va reprendre les propriétés de Pescheseul, de Parcé et d'Avoise. Il meurt en 1642 et son fils Gabriel qui a épousé Magdelaine de Bellièvre, reprend Pescheseul. Leur fille, Madeleine du Puy du Fou de Champagne, princesse de Pescheseul, épouse en 1657 Gaston-Jean-Baptiste de Lévis et de Lomagne, marquis de Mirepoix Charles-Vincent Barrin fils de Jacques-François précédent propriétaire, est conseiller puis président honoraire du Parlement de Rennes, cède Pescheseul à son fils, Charles Joseph, qui le cède à son tour au sien, Augustin-Félix-Elisabeth né en 1742.","architecture":"PESCHESEUL; en 1789 Augustin, seigneur de la Sirerie et principauté de Pescheseul, Il rentre en France en 1801 devient député de la Sarthe, remarqué et estimé par Napoléon qui lappelle «Amiral» en souvenir de son oncle lAmiral Barrin de la Galissonière (1693-1756) qui les vendentà M.et MmeTessierde La Motte, d'Angers  C'est la nièce de Mme Tessierde La Motte, Anne Joubert, qui hérite de Pescheseul en 1830. Elle épouse Charles Dupin Pescheseul va revenir à leur fille, la marquise Charlotte de Lentilhac. À la mort de Charlotte de Lentilhac en 1907, sa nièce            Yolande du Hamel de Breuil hérite de Pescheseu. A sa mort en 1940, Yolande du Hamel de Breuil laisse la propriété de Pescheseul par testament à son filleul, fils aîné de sa sur, François, vicomte de Ponton d'Amécourt. Les cinq enfants de Marguerite et Bruno de Ponton d'Amécourt sont aujourd'hui propriétaires de Pescheseul.","habitants":"Famille des Champagnes et de Charles Dupin Pescheseul \r\n        \"","divers":"GPS : 47° 52' 25\" Nord, 0° 14' 07\" Ouest","gps":"47° 52' 25\" Nord, 0° 14' 07\" Ouest","images":["../../jctruffet.com/image/image_72/72_Pescheseul_1.jpg","../../jctruffet.com/image/image_72/72_Pescheseul_2.jpg","../../jctruffet.com/image/image_72/72_Pescheseul_3.jpg"]},"Consult_chateau_formulaire8a24":{"id":"Consult_chateau_formulaire8a24","dept":"72","canton":"Ecommoy","commune":"Saint-Ouen-en-Belin","nom":"Poissonnière","type":"Maison forte","periode":"XIV-XV","histoire":"POISSONNIERE, ancien fief seigneurial de la paroisse de Saint-Ouen-en-Belin, la Poissonnière semble, au XIV e siècle, appartenir à la famille Cordeau, et passe, par le mariage de Jeanne Cordeau avec Olivier 1er Moreau, en 1393, dans la famille Moreau. Logis et terres resteront dans cette famille pendant près de quatre siècles.\r\nLe Manoir de la Poissonnière est un château bâti au lieu-dit La Poissonnière, La construction du manoir date du XVe siècle. Le manoir de la Poissonnière est classé aux M.H. depuis 1977.Après une longue période d'abandon au XXe siècle, le manoir fut racheté il y a une dizaine d'années par ses actuels propriétaires qui  le restaurent.","architecture":"POISSONNIERE, maison forte protégée par des marais et entourée de douves en eau, elle ne prendra son aspect actuel quau XVe siècle. Ce manoir joint à une façade caractéristique de cette période, avec sa tour descalier polygonale hors uvre, ses fenêtres à meneaux alignées avec des lucarnes à hauts gâbles, a conservé sa distribution intérieure avec sa décoration dorigine (cheminées à nervures prismatiques, portes à accolades et fleurons), permettant ainsi dapprécier le cadre de vie dun petit seigneur de la fin du Moyen-Age. La chapelle accolée au bâtiment principal, elle aussi gothique flamboyante, possède encore quelques peintures murales.\r\nÉléments protégés MH : le manoir de la Poissonnière en totalité : classement par arrêté du 9 novembre 1977. Entouré dune vaste basse-cour et de ses douves, la bâtisse est caractéristique des manoirs sarthois des XVe et XVIe siècles et présente lattrait davoir conservé sa disposition intérieure dorigine, permettant ainsi dapprécier le cadre de vie dun petit seigneur de la fin du Moyen Age.","habitants":"famille Moreau\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"GPS : 47° 50' 23\" Nord et 0° 12' 16\" Est.","gps":"47° 50' 23\" Nord et 0° 12' 16\" Est.","images":["../../jctruffet.com/image/image_72/72_Poissonni%c3%a8re_1.jpg","../../jctruffet.com/image/image_72/72_Poissonni%c3%a8re_2.jpg","../../jctruffet.com/image/image_72/72_Poissonni%c3%a8re_3.jpg"]},"Consult_chateau_formulaire7778":{"id":"Consult_chateau_formulaire7778","dept":"72","canton":"Château-du-Loir","commune":"Poncé sur le Loir","nom":"Poncé","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux à Poncé dont celui de Poncé et de Volonière.                                                                            PONCE,  son propriétaire initial était Jean de Chambray qui en avait fait sa réidence. Construit pour Jean V de Chambray vers 1542,  En 1662 passe par les femmes à la famille de Thiville. Poncé est resté dans la même famille jusqu'en 1895.  En 1924 le château est laissé à l'abandon depuis 1985 par son propriétaire le comte de Partz et racheté par Charles Latron docteur au Mans. aujourd'hui les communs de Poncé abritent un remarquable musée ethenographique et Folklorique.                                                                                                                                                    VOLONIERE, situé au centre de Poncé-sur-Loir, petite citée de caractère de tradition artisanale, cet ancien prieuré a été entièrement restauré. Une grande partie du château de la Volonière est troglodytique et offre un espace médiéval avec une belle salle des gardes, la magnifique chapelle est d'architecture \"primitif gothique Plantagenet\". Un parc de trois hectares, très fleuri, fait l'objet de soins constants.  Chambres d'hôtes  de Brigitte Briquelin.","architecture":"PONCE, il s'agit d'un des plus beaux témoins de la première Renaissance du Val-de-Loire. Construit pour Jean de Chambray vers 1542 dans la lignée du château d'Azay le Rideau. Accompagné de jardins en terrasse qui existaient en 1775, restauré au début du XXe siècle. Un musée d'art et de traditions populaires a été installé dans les communs du XVIIIe siècle, remaniés au XIXe siècle, colombier du XVIIe ou XVIIIe siècle avec 1800 niches et ses échelles tournantes. Terrasse Caroline édifiée en 1830. Très beaux jardins à la française, charmille, terrasse avec des tilleuls, jardin intimiste, labyrinthe ont permis de faire classer ce parc en \"jardin remarquable\". Le labyrinthe de charmille datant de la Renaissance a été préservé. Un décor néogothique brique et pierre de plus de 30 m de haut est élevé en 1830 contre le coteau pour l'isoler du village. Deux hauts pavillons encadraient, autrefois, symétriquement, la tour d'escalier. Le pavillon Est, a disparu au cours du XVIIIe siècle et fut remplacé en 1804 par un bâtiment sans caractère, qui présente l'avantage de suggérer les volumes d'origine du château. La pièce maitresse du château de Poncé est son escalier sculpté qui date de la construction du château et ne fut jamais retouché. Sur 6 voûtes successives, les plafonds sont sculptés de près de 160 caissons tous différents au motifs végétaux, mythologiques, bibliques et héraldiques.","habitants":"Famille de Jean de Chambray                                                                  famille de Thiville\r\n        \"","divers":"Deux châteaux à Poncé dont celui de Poncé grav de 1 à 6 et de Volonière grav -7-8.                                                                  Poncé 47° 45' 45\" Nord et 0° 39' 32\" Est                                                        Ville GPS : 47° 45' 02\" Nord, 0° 37' 14\" Est","gps":"47° 45' 02\" Nord, 0° 37' 14\" Est","images":["../../jctruffet.com/image/image_72/72_Ponc%c3%a9_1.jpg","../../jctruffet.com/image/image_72/72_Ponc%c3%a9_2.jpg","../../jctruffet.com/image/image_72/72_Ponc%c3%a9_3.jpg","../../jctruffet.com/image/image_72/72_Ponc%c3%a9_4.jpg","../../jctruffet.com/image/image_72/72_Ponc%c3%a9_5.jpg","../../jctruffet.com/image/image_72/72_Ponc%c3%a9_6.jpg","../../jctruffet.com/image/image_72/72_Ponc%c3%a9_7.jpg","../../jctruffet.com/image/image_72/72_Ponc%c3%a9_8.jpg"]},"Consult_chateau_formulaire6cfc":{"id":"Consult_chateau_formulaire6cfc","dept":"72","canton":"Sablé-sur-Sarthe","commune":"Précigné","nom":"Précigné","type":"Château","periode":"XIX-XX","histoire":"deux châteaux à Précigné , Bois-Dauphin et St-Jean-Baptiste.                                                                                    BOIS-DAUPHIN, au centre d'un immense parc, de près d'une lieue de périphérie, se détachant sur de grandes prairies et de hautes futaies, se dresse le grand château de Bois Dauphin, dû à Alain comte de Rougé, qui fut fort longtemps maire de Précigné et conseiller général de la Sarthe: il fut le grand restaurateur du château actuel qui se présente avec grande allure. De la belle habitation de la fin du XVe siècle bâtie par les Laval-Bois-Dauphin, il ne reste que l'entrée et le bel escalier. Le comte Alain de Rougé mourut en 1936; le nom de la famille de Rougé est connu parmi les égyptologues : Etienne de Rougé en effet fut professeur au collège de France et membre de l'Institut. Simone de Rougé, fille d'Alain, a épousé en 1923 le baron Robert d'Ussel. L'histoire de lancienne terre et du château de Bois Dauphin se mêle fortement à celle de Précigné même et aussi à celle de la ville voisine de Sablé. Il faudrait de longues pages pour énumérer tous les faits dus aux Sablé, seigneurs de Précigné, aux des Roches, aux Craon, aux Beauvau, aux Montmorency Laval, barons de Précigné et seigneurs de Bois Dauphin.                                                                                                                       St-JEAN-BAPTISTE, premier logis construit au XIIIe ou XIVe siècle. Deuxième logis, écuries, entrepôt agricole et enclos construits au XVe ou XVIe siècle. Chapelle Saint Jean-Baptiste ornée de sculpture réalisée en 1499. Galerie et escalier tournant à retours sans jour ornée de sculpture construits dans la 1ère moitié du XVIe siècle, date 1540 portée dans l'escalier. Destruction de la demeure à l'exception de l'escalier, la chapelle et de l'entrepôt entre 1710 et 1828, et construction du troisième logis.","architecture":"BOIS-DAUPHIN, La majeure partie des bâtiments sont du XIXe et XXe siècle. La Seigneurie de Bois Dauphin appartenait, au Moyen Age, à une puissance famille de la région, les Laval Bois Dauphin. Le train de vie somptueux de cette Famille permit le développement du bourg de Précigné. La Reine Mère Marie de Médicis, Veuve dHenry IV et mère de Louis XIII, se rendit au baptême dHenry de Laval Bois Dauphin, second petit-fils du Maréchal. Il ne subsiste du vaste château Renaissance, aujourdhui, que son entrée, lescalier principal et la chapelle. Le château de Bois-Dauphin fut ensuite racheté par Les Colbert qui le délaissèrent pour le château de Sablé. Il reste quelques éléments de style Renaissance, dont la chapelle Saint Jean-Baptiste. Le château de Bois-Dauphin a appartenu aux Montmorency-Laval, aux Servien et aux Colbert.                       St-JEAN-BAPTISTE, extension du logis vers 1865. Remaniements de la structure intérieure, de la charpente et des élévations ornées de sculpture dans le 1er quart XXe siècle (1919 date portée sur élévation droite). Parties agricoles remaniées au XIXe siècle. Parc partiellement réaménagé par l'architecte-paysagiste Chevalier vers 1886.\r\nPremier logis à un sous-sol et un étage de comble, tour hors-oeuvre couverte en toit conique ; deuxième logis à un étage carré et un étage de comble, escalier en vis hors-oeuvre dans l'angle, couvert en pavillon, échauguette couverte d'un toit conique, salles avec voûtes à cantons ; escalier de la galerie couverte en pavillon ; chapelle à fausse voûte ; 3e logis à élévations ordonnancées, partiellement couvert en terrasse, en pavillon ; tourelle hors-oeuvre couverte d'un dôme sur le grenier.","habitants":"Famille d' Alain comte de Rougé  et  les Laval Bois Dauphin\r\n        \r\n        \"","divers":"deux châteaux à Précigné , Bois-Dauphin  grav de 1 à 54  et St-Jean-Baptiste grav 5-6.                                                                                  Bois dsauphin                                                                                   GPS : 47° 45' 58\" Nord, 0° 19' 24\" Ouest","gps":"47° 45' 58\" Nord, 0° 19' 24\" Ouest","images":["../../jctruffet.com/image/image_72/72_Pr%c3%a9cign%c3%a9_1.jpg","../../jctruffet.com/image/image_72/72_Pr%c3%a9cign%c3%a9_2.jpg","../../jctruffet.com/image/image_72/72_Pr%c3%a9cign%c3%a9_3.jpg","../../jctruffet.com/image/image_72/72_Pr%c3%a9cign%c3%a9_4.jpg","../../jctruffet.com/image/image_72/72_Pr%c3%a9cign%c3%a9_5.jpg","../../jctruffet.com/image/image_72/72_Pr%c3%a9cign%c3%a9_6.jpg"]},"Consult_chateau_formulairef8da":{"id":"Consult_chateau_formulairef8da","dept":"72","canton":"Loué","commune":"Neuvy en Champagne","nom":"Renaudière","type":"Château","periode":"XV-XVII","histoire":"La RENAUDIERE, la chapelle Saint Louis a été reconstruite en 1842. Elle vient d'être restaurée par son nouveau propriétaire. La cloche se nomme Adrienne, du nom de son ancienne propriétaire. Les vitraux sont de 1842. Pierre de Mascutiaux et son épouse, propriétaires des lieux depuis trois générations.","architecture":"La RENAUDIERE, le château a été construit principalement aux XVe et XVIIe siècles, et au 2ème quart du XIXe siècle. Le pavillon d'angle a été construit en 1638. Le château La Renaudière a été remanié entre 1830 et 1842. Deux tours rondes on été rajoutées, deux tourelles ainsi que de nombreuses fenêtres de style néo-gothique. Les lucarnes ont été refaites. Le haut du pavillon fait 25 mètres. domine le village de Saint-Julien, et de nombreux étangs. Remanié entre 1830 et 1842, construction de deux tours rondes, deux tourelles et ajout de nombreuses fenêtres, le pavillon d'angle ayant été construit en 1638. Calme et espace se dégagent de ce charmant domaine, beau parc à l'anglaise vallonné. Éléments protégés MH : les façades et les toitures du château et de la chapelle : inscription par arrêté du 29 novembre 1991.","habitants":"Famille dePierre de Mascutiaux sa \r\n        \"","divers":"GPS : 47° 40' 12\" Nord et 0° 18' 47\" Est","gps":"47° 40' 12\" Nord et 0° 18' 47\" Est","images":["../../jctruffet.com/image/image_72/72_Renaudi%c3%a8re_1.jpg","../../jctruffet.com/image/image_72/72_Renaudi%c3%a8re_2.jpg"]},"Consult_chateau_formulaire8ba2":{"id":"Consult_chateau_formulaire8ba2","dept":"72","canton":"le Lude","commune":"Requeil","nom":"Roche_Mailly","type":"Château","periode":"XVIII-XIX","histoire":"ROCHE-MAILLY, le domaine de La Roche entra, au début du XVIIIe siècle, dans une très ancienne famille noble, celle des de Mailly, berceau de grands serviteurs du roi. Ce mariage fit entrer la Roche de Vaux dans la maison de Mailly.  La seigneurie de la Roche de Vaux appartenait au Moyen Âge à la famille de La Chevrière, qui la conserva jusqu'à Marguerite de La Chevrière, mariée en 1622 avec Louis de Champlais, seigneur de Courcelles, puis avec Jean Baptiste Louis de Beaumanoir, Baron de Lavardin. En 1668, Marguerite de La Chevrière vendit la Roche à François de La Rivière, écuyer, seigneur de la Groirie, conseiller au parlement de Metz. La fille de celui-ci, Louise Madeleine Josephe Marie de La Rivière, épousa en 1701 Joseph de Mailly, marquis d'Hauourt. En effet, ce manoir ayant besoin de très grandes réparations,. La Roche Mailly appartient actuellement à Monsieur le Marquis Guy de Mailly-Nesles.","architecture":"ROCHE-MAILLY, il date du XIXe siècle. C'est un château de style Troubadour. Sa construction a débuté au XIXe siècle.  Le Château de la Roche-Mailly, autrefois nommé la Roche de Vaux, M. de Mailly a préféré le détruire pour le remplacer par un autre d'un genre gothique; demeure de plan rectangulaire avec deux pavillons carrés aux deux angles à l'ouest, et deux tours rondes aux angles de la façade Est. Ce château possède une belle terrasse qui descend dans les jardins, s'étendant en amphithéâtre sur le penchant de la colline qu'il couronne. Le château est accompagné de beaux communs, et d'un parc enclos de murs, renfermant outre les jardins des allées et avenues, un bois taillis, des champs ainsi que des plantations d'arbres fut entièrement reconstruit de 1836 à 1842 par l'architecte manceau Delarue, pour Adrien, comte de Mailly Nesle, et prit alors son nom actuel. Le Château de la Roche-Mailly a été classé aux M.H. depuis 1975. Il fut reconstruit intégralement au XIXe siècle par l'architecte Manceau Delarue. Ses façades sont d'inspiration gothique. Le corps de logis et les ailes en retour sont cantonnés par des tours cylindriques ou quadrangulaires. Les façades et toitures du château sont inscrites aux M.H. depuis le 29/10/1976.","habitants":"Famille de  M. de Mailly\r\n        \"","divers":"Roche Mailly GPS : 47° 47' 20,45\" Nord et 0° 10' 32,78\" Est","gps":"47° 47' 20,45\" Nord et 0° 10' 32,78\" Est","images":["../../jctruffet.com/image/image_72/72_Roche_Mailly_1.jpg","../../jctruffet.com/image/image_72/72_Roche_Mailly_2.jpg","../../jctruffet.com/image/image_72/72_Roche_Mailly_3.jpg"]},"Consult_chateau_formulairea941":{"id":"Consult_chateau_formulairea941","dept":"72","canton":"Sablé-sur-Sarthe","commune":"Souvigné-sur-Sarthe","nom":"Roche_Talbot","type":"Château","periode":"XV-XVI-XVIII","histoire":"ROCHE TALBOT, forteresse relevant directement du comte du Maine au XIIIe siècle. Logis construit au XVe ou XVIe siècle,  Cest ici que René dAlençon, comte du Perche, fut arrêté par ordre de Louis XI, en 1481. Cest ici aussi que Charles VIII vint, au mois daoût 1488, attendre la conclusion du traité qui devait mettre fin à la guerre de Bretagne. En 1823, le nouveau propriétaire, Edouard Le Monnier de Lorière, restaure le château. Son petit-fils le marquis de Beauchesne, construit la tour et laile en équerre en néo-gothique avec larchitecte Pascal Vérité de 1900 à 1906","architecture":"ROCHE TALBOT,  ce château a joué à plusieurs reprises, dans lhistorie de la région de lOuest, un rôle important. Ruiné une première fois par la guerre et relevé au XIIIe siècle, il était, dès 1319, le centre dune grande terre seigneuriale, attendre la conclusion du traité qui devait mettre fin à la guerre de Bretagne, remaniement d'élévation, construction de la tour sur l'angle et de celle dans l'angle, voûte d'ogive ornée de sculpture à la fin du XIXe siècle, reconstruction partielle du corps en retour d'équerre au début du premier quart du XXe siècle. Clôture, chapelle et colombier détruits après 1779. Construction des parties agricoles et aménagement du jardin paysager à la fin du XIXe siècle. Tour sur l'angle couverte d'un toit conique, tour dans l'angle à toit polygonal, auvent voûte d'ogives dans l'angle.","habitants":"Famille de   Edouard Le Monnier de Lorière\r\n        \"","divers":"Gps  47° 49' 36\" nord, 0° 23' 19\" ouest","gps":"","images":["../../jctruffet.com/image/image_72/72_Roche_Talbot_1.jpg","../../jctruffet.com/image/image_72/72_Roche_Talbot_2.jpg","../../jctruffet.com/image/image_72/72_Roche_Talbot_3.jpg","../../jctruffet.com/image/image_72/72_Roche_Talbot_4.jpg"]},"Consult_chateau_formulairea6d7":{"id":"Consult_chateau_formulairea6d7","dept":"72","canton":"La Ferté-Bernard","commune":"Sceaux-sur-Huisne","nom":"Roches_Sceaux","type":"Château","periode":"XVIII","histoire":"LES ROCHES, le château des Roches a été construit à la fin du XVIIIe siècle. Lors d'une vente de la propriété en 1836, la terre des Roches, située sur les communes de Sceaux, Duneau et Vouvray sur l'Huisne.","architecture":"LES ROCHES,  éléments protégés MH : les façades et les toitu
