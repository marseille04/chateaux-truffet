e, granges, étables à chevaux, clos tout à lentour, fermé de fossé et pont levis. Le lieu restera fortifié par nécessité jusquau début du XVIIe siècle, en des temps où la guerre civile religieuse et le brigandage rendaient les campagnes peu sûres. Même si le corps de logis principal a été remanié au XVIIIe siècle, il reste de lancien château les deux tourelles dangles, dont lune abrite un pigeonnier. Le château est restauré depuis 2005 par M. et Mme Royer qui accueillent le public dans cinq chambres dhôtes.","architecture":"CHAVAUDON, date du 1er quart du XXe siècle (1913). L'architecte était Hector Guimard, qui a donné les élévations du château, l'édifice présente 4 façades différentes, en brique, pierre, béton et ciment. A l'intérieur, la disposition d'origine est rationnelle et met un accent particulier sur l'hygiène. Le Château de Chavaudon a conservé des éléments de décors de style Art-Nouveau, comme les garde-corps ou l'entrée en grès bleu turquoise. Le Château de Chavaudon est inscrit partiellement aux M.H. depuis le 27.02.2014.","habitants":"Chavaudon; architecte Hector Guimard                             Mothe; M. et Mme Royer\r\n        \r\n        \"","divers":"Marcilly la Mothe grav 1-2-3                                          Chavaudon   grav 4-5                                                                           GPS : 48° 19' 19\" Nord, 3° 37' 38\" Est","gps":"48° 19' 19\" Nord, 3° 37' 38\" Est","images":["../image/image_10/10_Marcilly_le_Hayer_1.jpg","../image/image_10/10_Marcilly_le_Hayer_2.jpg","../image/image_10/10_Marcilly_le_Hayer_3.jpg","../image/image_10/10_Marcilly_le_Hayer_4.jpg","../image/image_10/10_Marcilly_le_Hayer_5.jpg"]},"Consult_chateau_formulairee427":{"id":"Consult_chateau_formulairee427","dept":"10","canton":"Vendeuvre-sur-Barse","commune":"Rouilly_Saint-Loup","nom":"Menois","type":"Château","periode":"XV","histoire":"MENOIS, le château de Menois a obtenu quelques mois de sursis. La demeure devait être détruite. Un réseau social s'est alors mobilisé pour sauver le site. La bâtisse appartient à la ville de Troyes. La municipalité a finalement décidé de rencontrer à l'automne les porteurs de ce projet pour empêcher sa disparition, au conseil municipal de Troyes, le sort du château de Menois sera scellé. La municipalité doit approuver la cession d'une partie du domaine à un investisseur privé. Après de nombreux rebondissements, le château de Menois situé à Rouilly-Saint-Loup, dans l'Aube sera sauvé. Ce lundi soir (4/07/2016) le conseil municipal de Troyes devrait approuver la cession dune partie du manoir au groupe Colibri France. Loffre de cet investisseur privé porte sur une surface de 311 116 m2  avec un projet de réhabilitation du château de Menois, en un site hôtelier haut de gamme. Une autre partie de loffre concerne laccueil de loisirs déjà existant : 15 214 m2.","architecture":"MENOIS, le domaine composé de 85 hectares était propriété de la municipalité troyenne depuis 1966. En Juin 2015, la Ville de Rouilly-Saint-Loup prévoyait la destruction du château de Menois, tombé en très mauvais état mais un réseau social se mobilisa pour sauver le site. Un an après, une grande partie du parc et le château de Menois furent rachetés et remis en état.","habitants":"Inconnu\r\n        \"","divers":"Menois  GPS : 48° 15' 48\" Nord, 4° 09' 04\" Est","gps":"48° 15' 48\" Nord, 4° 09' 04\" Est","images":["../image/image_10/10_Menois_1.jpg"]},"Consult_chateau_formulairef640":{"id":"Consult_chateau_formulairef640","dept":"10","canton":"Vendeuvre-sur-Barse","commune":"Montaulin","nom":"Montabert","type":"Château","periode":"XVII","histoire":"MONTABERT, vous pourrez y louer des salles. Au cur d'un superbe parc forestier de plus d'une dizaine d'hectares se dresse la magnifique bâtisse du château de Montabert. A quelques kilomètres de Troyes, découvrez le cadre de rêve que vous offre cette bâtisse d'époque pour la célébration de votre mariage de rêves dans des conditions de bien-être et de confort optimales. Le château de Montabert vous donne accès à son incroyable parc verdoyant pour la mise en place d'un cocktail ou vin d'honneur à l'allure chic et raffinée.","architecture":"MONTABERT, manoir de 1862 composé d'un ensemble  de plan rectangulaire à deux étages sur soubassement  toit en croupes couvert d'ardoise  côté façade avant corps de style oriental recouvert de carrelage ou peint , tour d'entrée  dépassant  le bâtiment  terrasse au sommet de cette dernière, rajout d'un abri de jardin sur flanc gauche ,un chapiteau sera implanté dans le parc du domaine, entièrement vitré, il pourra accueillir jusqu'à 150 personnes assises avec une vue sensationnelle sur le reste du parc. Le château de Montabert vous offre plusieurs possibilités d'hébergement pour vous et vos proches. Vous savourerez un mariage merveilleux dans ce cadre de choix.","habitants":"Famille de Montabert\r\n        \"","divers":"Montabert GPS : 48° 15' 14\" Nord, 4° 11' 46\" Est","gps":"48° 15' 14\" Nord, 4° 11' 46\" Est","images":["../image/image_10/10_Montabert_1.jpg","../image/image_10/10_Montabert_2.jpg"]},"Consult_chateau_formulairef5f9":{"id":"Consult_chateau_formulairef5f9","dept":"10","canton":"Vendeuvre-sur-Barse","commune":"Montreuil sur Barse","nom":"Montreuil_Barse","type":"Manoir","periode":"XVI","histoire":"MONTREUIL, l e manoir de Montreuil-sur-Barse dit à damier champenois est une uvre de Dominique le Florentin, architecte de renom du XVIe siècle. Construit selon les canons architecturaux de lépoque, il est caractéristique des logis et demeures troyennes d'alors. Édifié en brique et en craie, dont les quatre fenêtres à meneaux, dotées de grilles et de croisées de pierre, se détachent sur une maçonnerie originale, faite de briques et de pierres appareillées en chevrons. Il conserve sa tourelle descalier en vis, plusieurs cheminées datées de 1565 et les armoiries de Mgr François de Dinteville, dont un vitrail de léglise de Thennelières rappelle les traits. Depuis trente ans, son propriétaire, architecte du patrimoine, sattache à le restaurer ainsi que ses dépendances, la tourelle-pigeonnier, il a également créé un jardin à la place dun bâtiment aujourdhui disparu. Dans les années à venir, le projet de restauration vise la maison du XVIe siècle, mais aussi les dépendances comme le porche et lannexe, afin de devenir un lieu complètement ouvert au public. En effet, lobjectif de cette bâtisse sera daccueillir un musée de village interactif et une maison du patrimoine (Relais du Patrimoine) pour trouver au sein de celui-ci un lieu regroupant toutes les activités patrimoniales du département et les restaurations déjà réalisées.","architecture":"MONTREUIL, L'édifice est dans un état de péril imminent, pour les toitures dune part et les dépendances côté Sud d'autre part, qui seffondrent contre la propriété voisine. Il a déjà connu des campagnes de restauration en 1999 et 2005, pour la façade Est et la tourelle-pigeonnier. Des infiltrations deau sont présentes et la charpente se trouve actuellement étayée et frettée pour éviter lamplification des dégradations dans lattente dune restauration. L'état de la toiture ne cessant de se dégrader (des tuiles tombent sur la voie publique régulièrement), le maire envisage de prendre un arrêté de péril. La fin des travaux devrait intervenir en 2023.","habitants":"de Mgr François de Dinteville\r\n        \"","divers":"Montreuil GPS : 48° 13' 32\" Nord, 4° 17' 43\" Est","gps":"48° 13' 32\" Nord, 4° 17' 43\" Est","images":["../image/image_10/10_Montreuil_Barse_1.jpg","../image/image_10/10_Montreuil_Barse_2.jpg"]},"Consult_chateau_formulaireca2f":{"id":"Consult_chateau_formulaireca2f","dept":"10","canton":"Bar-sur-Seine","commune":"Rumilly lès Vaudes","nom":"Mothe_Rumilly","type":"Domaine-Château","periode":"XVI-XVIII","histoire":"MOTHE, Jean de Gand, seigneur de La Mothe-Rumilly, figure avec sa femme et ses sept enfants sur un vitrail de la splendide église. Il possédait de lautre côté de la rivière \"une mothe entourée de fossés pleins deau, en laquelle a maison, grange et colombier\". Entre 1586 et 1618, cest Etienne fils de Jean de Gand, qui demeure au château. Il sy marie avec Claude de Richebourg, fille de Pierre de Richebourg, seigneur de Pouan et de Courcelles, maître dhôtel ordinaire du Roi, et dAnne de Balavoyne. Pierre, fils dEtienne, hérite du château et du titre de seigneur de la Motte-Rumilly. Ses deux surs se partagent avec lui le domaine et les charges. Charlotte qui épouse Antoine dArfillères seigneur de la Cour Saint-Fal  le vendra par la suite à Louis Piot seigneur de Beauvais, et Anne dont le mari Jehan de Regnard est capitaine des bois et forêts de la baronnie de Maraye. Les fils Pierre, Charles et Georges de Regnard héritent de tous les ennuis attachés à la succession.  Malgré bien des artifices de procédure, la séparation de biens entre Pierre et sa femme Marie Rousselet, la vente par Pierre et Charles à Georges, de leurs droits sur la maison seigneuriale de la Motte-Rumilly, le 24 octobre 1668, ce dernier ne peut éviter la saisie.  De ce château de La Mothe subsistent les deux tours, lune cylindrique, lautre de plan carré, flanquant le corps de logis reconstruit au XVIIIe siècle par la famille Paillot de Montabert. Le domaine de la Mothe appartient ensuite à M. Hippolyte Sourdat, puis devient la propriété de M. Louis Vachette, industriel à Troyes, puis a sa famille. En 2017, le château de la Mothe est acheté par une famille anglaise qui souhaite faire partager à ses hôtes lart de vivre à la française.","architecture":"TOURELLES, sa construction date du XVIe siècle. Demeure fortifiée à lorigine comme en témoignent ses 4 tourelles dangle percées de canonnières, proche de la « grange aux dîmes, elle fut la résidence administrative des représentants du roi de France, gérant le domaine, en son nom et en celui de lAbbé de Molesme, tous deux seigneurs sur la terre de Rumilly. Parmi ces délégués du pouvoir, fut le sénéchal de Champagne Louis II d'Orléans (1384), le futur Louis XII ; ses armes mutilées ornent la porte nord du manoir et le cheminée est du rez-de-chaussée. Cest Pierre Pion, riche boucher troyen qui, vers 1530, a donné sa touche personnelle au bâtiment, avant quaprès sa mort, François II de Vienne, abbé de Molesme, en fasse décorer les manteaux des quatre cheminées. Déclaré bien national à la Révolution, il échut aux Labille de la Rocatelle (un domaine sur le territoire de Rumilly). La commune lacquiert en 1902 pour y installer la mairie et lécole des garçons. En 1947, les deux classes qui y avaient trouvé asile le quittent pour intégrer un groupe scolaire tout neuf. Le manoir des Tourelles reste aujourdhui mairie officielle de Rumilly et le rez-de-chaussée a été aménagé en salle de réception. Le souvenir des compagnons qui ont contribué à la construction et à la rénovation du manoir plane de manière évidente et constante à lextérieur et à lintérieur de lédifice : trois caveaux en sous-sol, en hommage aux trois fondateurs du compagnonnage, colonne aux spires inversées, images du chien et du loup, du renard tenant en sa gueule une poule, erreur dans la composition dune plaque de cheminée. Tout est à voir dans ce manoir, le seul édifice rural du département classé XVIe siècle, et conservé dans son intégrité.","habitants":"Mothe Famille de  Jean de Gand, et la  famille Paillot de Montabert\r\n        \"","divers":"Tourelles grav 6  GPS : 48° 08' 46,58\" Nord, 4° 13' 06,5\" Est","gps":"48° 08' 46,58\" Nord, 4° 13' 06,5\" Est","images":["../image/image_10/10_Mothe_Rumilly_1.jpg","../image/image_10/10_Mothe_Rumilly_2.jpg","../image/image_10/10_Mothe_Rumilly_3.jpg","../image/image_10/10_Mothe_Rumilly_4.jpg","../image/image_10/10_Mothe_Rumilly_5.jpg","../image/image_10/10_Mothe_Rumilly_6.jpg"]},"Consult_chateau_formulaire29e4":{"id":"Consult_chateau_formulaire29e4","dept":"10","canton":"Nogent-sur-Seine","commune":"Motte-Tilly","nom":"Motte_Tilly","type":"Château","periode":"XIV-XV-XVII","histoire":"MOTTE-TILLY , En 1366, Marie de Châteauvillain, baronne de Baye, fille de Jean de Trainel, chambellan du Roi et panetier de France, échangea avec Guillaume de Melun, archevêque de Sens, la forteresse de La Motte de Tilly sur Seine. En 1423, Charles VII fit don de la seigneurie à Jean de Puligny, le garde de ses coffres et joyaux, et en 1470, Louis XI la donna à Jean Raguier, son chambellan. Acquis en 1492 par Alexandre dElbène, le domaine devint en 1662 la propriété du duc de Bournonville, gouverneur de Paris, qui mourut en son château de La Motte-Tilly  en 1693. La fille dAmbroise de Bournonville épousa le duc de Noailles, ministre des Affaires étrangères, qui obtint en 1712 lérection de la terre en comté. Le 24 mai 1748, grâce aux bons offices dOrry de Fulvy, labbé Terray et son frère Pierre, vicomte de Rozières, acquirent la terre de La Motte-Tilly,  labbé Terray  conseiller au parlement de Paris, puis contrôleur général des Finances en 1769, il devint ministre d'État et, avec Maupeou et dAiguillon, membre du célèbre triumvirat qui tenta de réformer lEtat dans les dernières années du règne de Louis XV (1771-1774). Le neveu du célèbre peintre. Mort en 1778, labbé Terray fut inhumé à La Motte-Tilly sous un monument sculpté par Félix Lecomte (1780). Antoine-Jean, son neveu, fit redessiner le parc dans le goût paysager. la superbe demeure qu'il se fit élever nous est parvenue pratiquement intacte. Un précieux plan au rez-de-chaussée du château de La Motte-Tilly qui se construit près de Nogent-sur-Seine en 1755 François-Nicolas Lancret, le neveu du célèbre peintre.  Le mobilier du château, déclaré Bien national, fit en janvier 1795 lobjet dune vente considérable. Deux ans plus tard, Claude-Hippolyte Terray reprit possession du domaine et y emmena sa jeune épouse, née Morel-Vindé.","architecture":"MOTTE-TILLY,  En 1910, le comte Gérard de Rohan-Chabot, duc de Ravèse, descendsant des Terray,  racheta le domaine aux héritiers de son oncle, le vicomte de Narcillac, et se consacra à la restauration du château et du parc tel quils se trouvaient au XVIIIe siècle. Après sa mort, en 1964, la marquise de Maillé, sa fille, historienne de l'art, présidente de la Sauvegarde de lArt français, acheva les travaux intérieurs avec le concours de larchitecte Claude Hodanger et du décorateur Victor Grandpierre, et réunit une superbe collection de meubles, de tableaux et dobjets dart. En 1972, elle légua le château à la C.N.M.H.S., avec le millier d'hectares du domaine et une importante dotation, en exprimant le souhait quil soit ouvert à la visite sans perdre son caractère de demeure habitée, le château comprend un corps principal couvert dun grand toit à croupes devant lequel se profile, au-dessus de lavant-corps central, un comble en pavillon rappelant ceux des ailes latérales. De part et dautre se détachent les arcades de murs-écrans restaurés vers 1912, harmonieusement incurvés jusquà deux pavillons dont lun abrite la chapelle. Deux corps de bâtiments, abattus après le passage des cosaques, encadraient à lorigine la cour dhonneur: le premier fermait la cour des dépendances, le second, sur la droite.","habitants":"Famille du  duc de Noailles et  labbé Terray\r\n        \"","divers":"Motte-Tilly  GPS : 48° 28' 02\" Nord, 3°25'53\" Est","gps":"48° 28' 02\" Nord, 3°25'53\" Est","images":["../image/image_10/10_Motte_Tilly_1.jpg","../image/image_10/10_Motte_Tilly_2.jpg","../image/image_10/10_Motte_Tilly_3.jpg"]},"Consult_chateau_formulaire2adf":{"id":"Consult_chateau_formulaire2adf","dept":"10","canton":"Bar-sur-Seine","commune":"Mussy sur-seine","nom":"Mussy","type":"Château","periode":"XVIII","histoire":"MUSSY même si la ville avait des fossés en 1153, il n'est pas cité de château, en 1232 il y a un châtelain à Mussy qui devait être installé en un château. Au cours de la guerre de Cent Ans le château est le siège de plusieurs combats  en mai 1431, le château tenu par les Anglais est repris par Charles VII , en  juin 1433 le duc de Bourgogne y met le siège et prend la ville , en décembre 1440 prise par Alexandre Bâtard de Bourbon , en 1474 les Bourguignons tiennent la ville et Claude Dinteville en était le gouverneur. Le 24 avril 1617, un incendie ravageait le château, l'évêque Zamet fait citer la femme du receveur alors présente, le château servait de garnison aux troupes du roi de lieu de stockage des deniers de l'État ce qui valu une remise pour huit années pour ces décimes dues. en 1750 le château était la propriété de Gabrielle de Mussy épouse du comte Vallin, c'est en temps que seigneur tenant sa terre du roi que la comtesse de Vallin régnait sur la Tour-du-Pin, la Bâtie et Dièmoz.                                                                                  Château des tertres hôtel restaurant.","architecture":"MUSSY,  un mémoire de 1735 nous le présente près de la collégiale, entouré  de fossés et d'eau et une place était devant les deux corps de bâtiment flanqués de deux ailes en briques et pierres blanches et couvert d'ardoises. Il avait un jardin donnant sur la Seine. Il était vide de tous meubles en 1724, eut des réparations en 1773 faites par l'architecte Antoine et la réception faite par François Buron nous en donne une description, le rez-de-chaussée fait à neuf n'avait pas de décoration. Saisi comme bien national, il fut vendu  avec obligation d'en démolir les bâtiments. Ce fut fait pour partie mais furent conservés des bâtiments servant de grange, la chapelle qui servait encore de cuisine en 1866 et la chambre à coucher de l'évêque et sa bibliothèque furent transformés en mairie.","habitants":"Famille du comte Vallin\r\n        \"","divers":"Mussy gps 47° 58' 40\" nord, 4° 29' 52\" est","gps":"","images":["../image/image_10/10_Mussy_1.jpg","../image/image_10/10_Mussy_2.jpg","../image/image_10/10_Mussy_3.jpg","../image/image_10/10_Mussy_4.jpg"]},"Consult_chateau_formulaire263b":{"id":"Consult_chateau_formulaire263b","dept":"10","canton":"Nogent sur Seine","commune":"Nogent sur seine","nom":"Nogent_sur_Seine","type":"Manoir","periode":"XVI","histoire":"NOGENT; le Pavillon Henri IV semble exister depuis toujours. La tradition orale situe la construction de cette maison vers 1530. Les recherches effectuées lors de sa restauration en 2000 retiennent la seconde moitié du XVIe siècle. A cette époque, Henri IV se préparait à reconquérir le Royaume de France. Transmise au cours des siècles et entretenue par la tradition nogentaise, l'histoire de ce pavillon rejoindrait d'ailleurs celle du « bon roi Henri ». Selon la légende, cette demeure aurait même accueilli les amours, plus ou moins secrètes, d'Henri IV et de la belle Gabrielle d'Estrée. Chaque année le Pavillon Henri IV offre un programme d'expositions très diversifiées avec la participation des associations et des artistes locaux.","architecture":"PAVILLON HENRI IV, Espace d'expositions temporaires et élément incontournable du patrimoine Nogentais, le Pavillon Henri IV semble exister depuis toujours. Différentes études sur ce bâtiment à pans de bois situeraient sa construction vers le milieu du XVIe siècle. Colportée et entretenue par la tradition nogentaise, lhistoire de ce pavillon rejoindrait celle de ce roi qui, de passage à Nogent-sur-Seine, y aurait séjourné. Chaque année, le Pavillon Henri IV offre un programme très diversifié avec les associations et les artistes locaux.","habitants":"Henri IV\r\n        \r\n        \"","divers":"Nogent 48° 29' 35\" nord, 3° 30' 09\" est                                                                    Henry-IV 48° 29' 52\" nord, 3° 29' 54\" est","gps":"","images":["../image/image_10/10_Nogent_sur_Seine_1.jpg","../image/image_10/10_Nogent_sur_Seine_2.jpg"]},"Consult_chateau_formulaire77d6":{"id":"Consult_chateau_formulaire77d6","dept":"10","canton":"Nogent-sur-Seine","commune":"Ferreux-Quincey","nom":"Paraclet","type":"Château","periode":"XVI-XVIII","histoire":"PARACLET, en 1129, le théologien Abélard quitta le lieu où il était venu chercher paix et solitude, sous la protection du comte de Champagne. Sur son invitation, Héloïse vint y fonder une abbaye dédiée à l'Esprit Saint,  quelle dirigea jusquà sa mort, en 1163. Des bâtiments conventuels, vendus à lencan en 1792, incendiés et finalement abattus, seul subsiste lancien logis de labbesse. Cette demeure aux lignes simples doit son charme aux légères irrégularités de son ordonnance et à l'harmonie de ses matériaux: chaînes de grès, encadrements de briques soulignant les travées, enduit ocré et tuiles de belle couleur. Une ardoise gravée porte les armes de la famille La Rochefoucauld dont six représentantes furent abbesses du Paraclet, de la fin du XVIe siècle à la Révolution. La date de 1686 qui les accompagne doit correspondre à une complète restauration à partir déléments préexistants, comme le confirme la présence dans laile en retour dune cuisine voûtée darêtes, munie dun puits. Érigé à lépoque romantique, un petit obélisque signale l'emplacement du sanctuaire, au-dessus du caveau où reposaient Héloïse et Abélard, avant le transfert de leurs restes dans le musée d'Alexandre Lenoir, puis au Père Lachaise. Dans la ferme voisine, signalée par des tours dangle rondes, le cellier des moines pourrait remonter au XIIe siècle. Le comédien Boutet de Monvel fit aménager le logis abbatial, puis le céda au général Pajol qui sillustra avec ses cavaliers aux ponts de Montereau, en 1814. Le baron Walckenaer, qui racheta le domaine en 1835, était le fils de Charles-Athanase Walckenaer, dorigine hollandaise, polytechnicien à la création de lÉcole et membre de lInstitut, aïeul de lactuel propriétaire.","architecture":"FERREUX   dit du Paraclet, garde le souvenir de Napoléon qui logea le soir du 6 février 1814. Citée dès le XIIe siècle, la famille de Ferreux possédait là une maison seigneuriale assise sur la rivière. Démembrée au XVe siècle, puis réunie sous Henri IV par Jérôme Angenoust, conseiller au parlement de Paris, la seigneurie échut par alliance à Simon Vigor, conseiller au Grand Conseil, puis à François Belot, trésorier de lExtraordinaire des Guerres. Encore entouré de fossés et muni dun pont-levis en 1679, le château dut être reconstruit à la fin du XVIIe siècle par Claude Belot, marquis de Ferreux, maître des Comptes. Remanié au début du XIXe siècle, après le passage des Alliés, il présente des façades en moellons enduits, chaînes et encadrements de briques, sous des toits de tuiles. Vendu vers 1920, un moment abandonné et maladroitement réparé , en 1922 était à Mme de Saint-Georges Damé. il a été acquis en 1968 par le vicomte Marcel Chéreil de La Rivière qui a entrepris d'importants travaux, tant à lintérieur quaux abords: création dune cour pavée, dun jardin de buis et de parterres à la française.","habitants":"Famille de La Rochefoucauld \r\n        \"","divers":"Ferreux gps 48° 28' 01\" nord, 3° 34' 11\" est","gps":"","images":["../image/image_10/10_Paraclet_1.jpg","../image/image_10/10_Paraclet_2.jpg","../image/image_10/10_Paraclet_3.jpg","../image/image_10/10_Paraclet_4.jpg"]},"Consult_chateau_formulaire5e5d":{"id":"Consult_chateau_formulaire5e5d","dept":"10","canton":"Creney-près-Troyes","commune":"Plancy l","nom":"Plancy_Abbaye","type":"Château","periode":"XI-XV-XVII","histoire":"PLANCY-ABBAYE, mentionné dès la fin du XIe siècle, le \"castrum quod vocatur Planciacum\" surveillait un gué de lAube. Il donna son nom à lune des plus importantes familles de Champagne, qui séteignit en 1396 avec Louis de Plancy, tué lors de la malheureuse croisade de Nicopolis. A Geoffroy de La Croix, acquéreur en 1502, succéda à la fin du siècle Claude de La Croix, qui demeura fidèle au roi lors de la Ligue et mourut en 1609 en son château de Plancy. Saisie en 1654, la baronnie fut adjugée au secrétaire d'Etat Henri de Guénégaud, baron de Saint-Just, qui obtint deux ans plus tard son érection en marquisat. Ce puissant personnage fit drainer les terres, construire routes et ponts, dota le chapitre de chanoines, mais ne fit pas transformer le château. Mentionnées dans lacte dadjudication, la maison du château seigneurial, ses chapelles et dépendances, le tout fermé de murailles, tours, pont-levis,  figurent en 1714 dans lacte de vente à Jean Moreau, contrôleur général de la grande Chancellerie, et à nouveau en 1764, dans celui de la vente au profit de Claude Godard dAucour, ancien maire de Langres et ancêtre du marquis de Bonardi, actuel propriétaire.","architecture":"PLANCY ABBAYE, autres pièces mentionnent lexistence dun pavillon dentrée détaché, abritant un passage voûté, et précisent que, si le château est fort petit, celui de Saint-Just est depuis les Guénégaud le séjour ordinaire des seigneurs. Les Godard dAucour, marquis de Plancy, nen font pas moins reconstruire le corps dhabitation. Privé de sa chapelle lors de la Révolution, le domaine échoit au cadet, Adrien, qui épouse Sophie Lebrun, la fille du troisième consul, devenu archi trésorier de lEmpire et duc de Plaisance. Nommé en 1810 préfet de Seine-et-Marne, le comte de Plancy reçoit lempereur, le 19 mars 1814, dans une demeure dévastée, privée de ses parquets et de ses boiseries à la suite du passage des cosaques. Très sobre, le corps de logis en pierre crayeuse, simple en profondeur, sappuie sur un pavillon polygonal élevé sur les fondations de deux des quatre tours qui cantonnaient louvrage médiéval. Agrandies lors dune restauration, au début du siècle, les terrasses qui lentourent dominent au nord les parterres de buis créés sur les plans de Duchêne à lemplacement de lancien bayle, toujours délimité par des dépendances et des douves en eau. Au sud, elles donnent sur le parc paysager dessiné dans la vallée, ponctué détangs et de canaux et traversé par des levées de terre plantées de superbes platanes. Près de lentrée, la maison des chapelains rappelle le chapitre fondé au XIe siècle par les seigneurs de Plancy et supprimé à la Révolution.","habitants":"Famille d'Henri de Guénégaud\r\n        \"","divers":"Plancy  48° 34' 15\" nord, 3° 58' 09\" est","gps":"","images":["../image/image_10/10_Plancy_Abbaye_1.jpg","../image/image_10/10_Plancy_Abbaye_2.jpg","../image/image_10/10_Plancy_Abbaye_3.jpg"]},"Consult_chateau_formulaire7bef":{"id":"Consult_chateau_formulaire7bef","dept":"10","canton":"Vendeuvre-sur-Barse","commune":"Fresnoy-le-Château","nom":"Plessis_Fresnoy","type":"Château","periode":"XIV-XVIII","histoire":"PLESSIS, Les premiers seigneurs de Fresnoy sont connus par un acte d'échange de Gautier de Fresnoy avec l'abbaye de Larrivour vers 1140. Le dernier seigneur connu était Pierre Piot connu depuis le XIVe siècle, le château actuel est dû à Louis Sébastien Grundler, comte et général d'Empire. Les travaux commencent en 1833, et l'aile des communs, qui s'ajoute au plan en U initial, est achevée en 1844. La tuilerie du Plessis, faisant partie du domaine du château, est antérieure à 1835. Une machine à vapeur y est introduite à une date inconnue, et un logement y est construit à la fin de la première guerre mondiale. Cessation d'activité milieu XXe siècle. Éléments protégés MH : le logis, le bâtiment de communs au sud du logis, l'orangerie, les douves, le pigeonnier, le pont, le mur et les grilles d'entrée, l'ensemble du parc avec ses aménagements : inscription par arrêté du 8 octobre 2001.","architecture":"FRESNOY le CHÂTEAU du Plessis. L'architecte était Dufour. La construction du château de Plessis date de 1833 au 1844, et l'aile des communs, qui s'ajoute au plan en U initial, est achevée en 1844. Au cours du XVIIIe siècle, une basse-cour est construite, la double enceinte de douves est réduite, et un grand parc avec jardin à la française s'étend à l'arrière du château. La grille d'entrée est posée en 1836. L'angle nord du parc est décoré d'un monticule formant \"escargot\", présent dans les parcs du XVIIIe siècle.                                                                                                                    RENAULT, les premiers seigneurs de Fresnoy sont connus par un acte d'échange de Gautier de Fresnoy avec l'abbaye de Larrivour vers 1140. Le dernier seigneur connu était Pierre Piot, lieutenant du roi à Troyes. En 1789, le village était de l'intendance et de la généralité de Châlons, de l'élection et du bailliage de Troyes, ainsi que du bailliage ducal d'Aumont. e château du Renaullt situé à Fresnoy-le-Château est une agréable demeure construite au XVIIe siècle, accompagnée de piliers et de dépendances en colombage, qui appartint au XIXe siècle à la famille de Joybert, puis à lancêtre de son actuel propriétaire, M. Henri Hoppenot.","habitants":"Famille de Louis Sébastien Grundler\r\n        \"","divers":"Fresnoy grav_1                                                                           GPS : 48° 13' 19,21\" Nord, 4° 13' 31,02\" Est                                                   Renault grav_2                                                                                         GPS : 48° 12' 37\" Nord, 4° 13' 30\" Est","gps":"48° 13' 19,21\" Nord, 4° 13' 31,02\" Est","images":["../image/image_10/10_Plessis_Fresnoy_1.jpg","../image/image_10/10_Plessis_Fresnoy_2.jpg"]},"Consult_chateau_formulaireb27a-2":{"id":"Consult_chateau_formulaireb27a-2","dept":"10","canton":"Bar-sur-Seine","commune":"Polisy","nom":"Polisy","type":"Maison-forte","periode":"XIV-XVI","histoire":"POLISY, maison-forte existant depuis le XIVe siècle, réaménagée et en partie rebâtie entre 1537 et 1555. En 1537, Jean de Dinteville, ambassadeur de François Ier en Angleterre, se retire à Poligny qu'il aménage. Les travaux débutent par la basse cour, comme le rappelle l'inscription de l'ancienne entrée. Ils sont terminés en 1544, comme le précise une autre inscription dans les caves du château. On remarque la façade d'entrée qui offre à l'étage supérieur une composition des années 1540 dans l'esprit de Serlio, où des baies rectangulaires alternent avec des niches. A l'intérieur, il subsiste des solives peintes et le décor peint d'une cheminée représentant une allégorie de la justice et de la chasteté, qui accompagnait un magnifique pavement de faïence vernissée daté de 1545. Jean de Dinteville mourut dans son château en octobre 1554, des suites dune longue et pénible maladie. Dans la chapelle privée attenante à léglise paroissiale quil avait fait auparavant restaurer et où avaient été inhumés tous ses aïeux, on na pas retrouvé la trace de sa tombe. Après sa mort, le château de Polisy passa aux mains dune nièce, et bientôt devint la propriété de la famille Choiseul, qui, au XVIIIe siècle le transforma intérieurement, en créant des pièces plus basses que celles du XVIe siècle et en les décorant de lambris. Une nouvelle entrée avec un perron et des pavillons en saillie est aménagée entre 1777 et 1842. L'extension néo XVIIIe, au Nord du corps de logis, date des années 1903-1908 et marque la fin des transformations du château.","architecture":"POLISY,   Jean de Dinteville a habité le Château de Polisy. Il est connu pour être un des deux ambassadeurs du tableau d'Hans Holbein le Jeune, peint en 1533, à Londres. Cette maison-forte existe depuis le XIVe siècle, réaménagée et en partie reconstruite entre 1537 et 1555. En 1537, Jean de Dinteville,  se retire à Poligny qu'il aménage. Les travaux débutent par la basse-cour. Cette dernière est composée d'une aile d'entrée, d'une grange, des anciennes écuries et d'un logement indépendant. L'aile d'entrée comprend le passage, le puits, l'ancienne laiterie et le cellier. La grange et les écuries sont ruinées. Dans les années 1830, elle est complétée par une nouvelle dépendance qui offre une serlienne. Le château de Polisy fut endommagé par un incendie, en 1992. Sa façade sur cour fait face à la chapelle seigneuriale qui s'ouvre par une grande baie sur le choeur de l'église. Le château de Polisy est inscrit aux M.H. depuis 8/10/2011. Il appartient à une S.C.I. Le château de Polisy est en cours de rénovation.","habitants":"Famille de Jean de Dinteville et la famille Choiseul\r\n        \"","divers":"Polisy  GPS : 48° 03' 47\" Nord, 4° 22' 55,2\" Est","gps":"48° 03' 47\" Nord, 4° 22' 55,2\" Est","images":["../image/image_10/10_Polisy_1.jpg","../image/image_10/10_Polisy_2.jpg"]},"Consult_chateau_formulaireaa7d":{"id":"Consult_chateau_formulaireaa7d","dept":"10","canton":"Nogent-sur-Seine","commune":"Pont sur Seine","nom":"Pont_sur_Seine","type":"Château","periode":"XVII","histoire":"PONT SUR SEINE,  en 1623, le duc de Nemours cède le Pont au roi Louis XIII, qui l'échange en 1629 à Marguerite de Guise princesse de Conti, qui lègue en 1631 à sa mère Catherine de Clèves et à ses deux frères,  Charles duc de Guise et Claude duc de Chevreuse. Les Guise vendent dès 1632 à Claude Bouthillier de Chavigny, surintendant des finances, qui construit le château; ses descendants seront titrés marquis de Pont. Claude Bouthillier commence la construction du château, brique et pierre, sur les dessins de Pierre Le Muet. En 1773, Pont est vendu à l'archevêque de Bordeaux, Ferdinand Maximilien Mériadec de Rohan. En 1775, le cardinal de Rohan vend Pont à François Xavier de Saxe, comte de Lusace. Ayant choisi de vivre à la Cour de France, il sinstalle à Pont, y fait faire de grands travaux et y réunit une très riche collection de porcelaines de Saxe. La Révolution le force à revenir en Allemagne. En lan VI, Xavier de Saxe est déclaré émigré et ses propriétés biens nationaux. Le 8 thermidor an XIII, Pont est acheté par Napoléon pour sa mère, Letizia Ramolino. Ce qui valut au château dêtre incendié sur ordre du prince royal de Würtemberg lors de la Campagne de France en 1814. En 1821, les ruines de Pont sont achetées par Casimir Perier qui entreprend la construction dun château. Son fils Auguste, Victor,  Au XIXe siècle le château appartient à son fils Jean-Paul, Pierre Casimir Périer, qui détient le record du mandat de président de la République française le plus court. Après sa mort il est habité par sa fille, Mme Sommier jusqu'en 1968. Du château de Claude Bouthillier et de Xavier de Saxe ne restent que les communs et, dans la cour, le colombier et lancien abreuvoir.","architecture":"PONT SUR SEINE, le château actuel, avec sa cour et ses arcades, son bassin, demeure assez atypique. Espérons qu'il pourra s'ouvrir davantage au public car le portail, sur la nationale, n'en révèle nullement la valeur. L'intérieur possède de nombreux objets dart conservés par les amateurs quétaient les Casimir-Périer, iI fait construire les deux pavillons de brique reliés par une galerie qui, avec les communs forment le château actuel.","habitants":"Famille de Xavier de Saxe et de  Casimir Perier\r\n        \"","divers":"Pont de seine gps 48° 30' 39 nord, 3° 35' 44 est","gps":"","images":["../image/image_10/10_Pont_sur_Seine_1.jpg","../image/image_10/10_Pont_sur_Seine_2.jpg","../image/image_10/10_Pont_sur_Seine_3.jpg"]},"Consult_chateau_formulaire24ff":{"id":"Consult_chateau_formulaire24ff","dept":"10","canton":"Romilly-sur-Seine","commune":"Mazières la Grande Paroisse","nom":"Poussey","type":"Forteresse","periode":"XIV-XVIII","histoire":"POUSSEY, du  XIVe au XVIIIe siècle,appartenait aux Sires de Poussey. Il servait d'habitation seigneuriale et de défense. Le Domaine de Poussey avait un moulin, des bois, une maison seigneuriale avec quatre tours et un pont-levis et un mur qui entourait le Château de Poussey. Il était cité dès 914. Il formait une des baronnies de La Crosse. Les barons de Poussey étaient nombreux : Milon de Raigni en 1172, Milon II en 1205, Maison de Mesgrigny au XVIIe siècle, Louis II Le Peletier de Rosambo, de 1761 à 1791, Le Noir de Balay, 1791, Jean-Louis Bayle, mort le 29/02/1830 et Patris de Breuil, au milieu du XXe siècle.","architecture":"POUSSEY, en 1908, à 150 mètres environ de l'emplacement de l'ancien château, sont découverts des squelettes d'hommes, le tout recouvert de 60 cm de terre à peine. Les corps avaient été jetés dans la fosse sans précaution, comme avec précipitation, car une des têtes se trouvait, entre les jambes, même près des pieds.","habitants":"Les barons de Poussey\r\n        \"","divers":"Poussey GPS : 48° 30' 53\" Nord, 3° 47' 40\" Est","gps":"48° 30' 53\" Nord, 3° 47' 40\" Est","images":["../image/image_10/10_Poussey_1.jpg","../image/image_10/10_Poussey_2.jpg","../image/image_10/10_Poussey_3.jpg","../image/image_10/10_Poussey_4.jpg","../image/image_10/10_Poussey_5.jpg"]},"Consult_chateau_formulaire409a":{"id":"Consult_chateau_formulaire409a","dept":"10","canton":"Saint-Lyé","commune":"Pouy sur Vanne","nom":"Pouy_sur_Vanne","type":"Château","periode":"XVII","histoire":"POUY sur Vannes,  élevé vers 1145. Il présente le rare  privilège dunir larchitecture de deux grandes époques : le Moyen-Age et le début du XVIIe siècle. Deux familles, les Saint Blaise et les Le Bascle dArgenteuil étaient co-seigneurs de Pouy. A la fin du XVe siècle, le château, pillé et incendié à plusieurs reprises, nétait plus que ruines. Cest Hector II de Saint Blaise qui fut le constructeur au début du XVIIe siècle, du beau toit et de sa charpente qui existent toujours. Louis de Saint Blaise continua luvre de réunification de Pouy. A Louis, succéda François le Bascle  dArgenteuil, lieutenant colonel de cavalerie en 1688. A son fils Jean-Louis échurent les plus grands honneurs puisque le 14 septembre 1716 quil fut nommé lieutenant général des Provinces de Champagne et de Brie, et Gouverneur de Troyes. Sa mort survint au château de Pouy en 1758. Au XIXe siècle, le château de Pouy et les 750 hectares de terres fut la propriété de plusieurs grands agriculteurs dont les derniers, M. et Mme Laproste en devinrent propriétaires en 1896. Ils sont les grands parents de Mme de la Noë, qui mariée en 1920 à un officier de marine, neut pas denfant. Et cest ainsi quà sa mort, en 1971, Madame de La Noë lègue le château de Pouy et ses terres à la Société dEntraide des Membres de la Légion dHonneur. Au moment du don, le château et ses annexes méritent des réparations, mais les terres représentent encore plus de 600 hectares, dont 250 hectares de forêts. Après quarante années aux mains de la société d'entraide des membres de la Légion d'honneur, le château de Pouy-sur-Vannes change de mains. Ce bien est  la propriété de Juan Pablo Molyneux, un architecte d'origine chilienne installé à Paris et à New York.","architecture":"POUY, diplômé en architecture classique de l'École des Beaux-Arts de Paris, le nouveau propriétaire a un studio dont la réputation dépasse largement les frontières de l'Hexagone. L'architecte a lancé un vaste chantier de rénovation. Un escalier en verre serait aménagé pour conduire aux étages. Et la salle Empereur du premier étage, qui pouvait accueillir 150 personnes, serait transformée en deux chambres-suites. Siège de la Société dEntraide des Membres de la Légion dHonneur. En 2015, après 40 années aux mains de la société d'entraide des membres de la Légion d'honneur, le Château de Pouy-sur-Vannes a changé de propriétaire, Juan Pablo Molyneux diplômé en architecture classique de l'École des Beaux-Arts de Paris, le nouveau propriétaire a un studio dont la réputation dépasse largement les frontières de l'Hexagone. De nombreuses réalisations ont été conduites par ses équipes auprès d'institutionnels et de privés. L'architecte a lancé un vaste chantier de rénovation. Un escalier en verre serait aménagé pour conduire aux étages.  Par ailleurs, dans l'ancienne bergerie, une piscine est en cours de construction. Le château de Pouy-sur-Vannes appartient à une société privée, fermé au Public. Le château de Pouy-sur-Vannes est inscrit aux M.H. partiellement depuis le 11/08/1969 pour ses façades et toitures.","habitants":"Hector II de Saint Blaise\r\n        \"","divers":"Pouy  GPS : 48° 18' 10\" Nord, 3° 35' 27\" Est","gps":"48° 18' 10\" Nord, 3° 35' 27\" Est","images":["../image/image_10/10_Pouy_sur_Vannes_1.jpg","../image/image_10/10_Pouy_sur_Vannes_2.jpg"]},"Consult_chateau_formulaire1394":{"id":"Consult_chateau_formulaire1394","dept":"10","canton":"Les Riceys","commune":"Les Riceys","nom":"Ricey_Bas","type":"Château","periode":"XV","histoire":"RICEY- BAS,  Nicolas Rolin fit construire un nouveau château sur cette terre qui lui avait été donnée par le duc de Bourgogne.. Il fut dévasté à plusieurs reprises et ne fut plus habité. Le Chancelier Rolin acquiert le château de Ricey  vers le XVe siècle.  Marie d'Amboise qui était la tenant. C'est à Anne de Laval que l'une des tours doit son nom. Le du fief fit modifier le château, en 1450, et les deux tours, Lessentiel des travaux entrepris se font entre le XVIe-XVIIIe siècle. Elle fit construire une nouvelle tour de 12 mètres de diamètre, en 1506, ainsi qu'une galerie.  En 1710 devenait la propriété de Jean- Baptiste de Pomereu, la bâtisse à souffert à la Révolution, ses tours à l'exception une furent démolies, après la tourmente le château fut vendu au baron de Taisne de Raymonval, toujours propriétaire aujourd'hui. Le château noccupait quune partie de lîlot formé par la Laigne et le bief où se trouvaient trois moulins en ruines à la fin du XVIe siècle et qui étaient incorporés au parc par André Baron en 1674. Le parc du château de Ricey-Bas se découvre dès lentrée des Riceys, avec un grand portail de pierre et un long mur orné de vases Médicis. Le parc que lon découvre aujourdhui a peut-être été simplifié dans son plan, mais il conserve le schéma qui existait au XVIIIe siècle, cest à dire que le grand parc classique coexiste avec la forteresse médiévale.  La Seigneurie devint un marquisat en 1659 pour Louis Vignier.  Le château de Riceys-Bas a été inscrit aux M.H. en 1967 et classé, en 1979 et 1985.   Le jardin et le parc de Ricey-Bas est axé sur le grand vestibule placé à la charnière des bâtiments médiévaux et de laile du XVIIIe siècle.","architecture":"TAISNE  Les intérieurs du château ne se visitent pas à lexception du Cellier du XIIe siècle, de la grande cuisine et des salles de réception aménagées dans des dépendances, dont la salle du four à pain. Robert 1er, seigneur des Riceys fit bâtir les premières fondations en 1086. Entouré de deux bras de la Laignes, le château de Taisne, classé M.H., est lun des plus anciens de la région. Transformé par les familles qui sy sont succéder, il ne cesse de renaître pour devenir un lieu de vie qui se découvre en toute simplicité, Charles et Ségolène vous proposent une nouvelle manière de visiter et vous offrent la possibilité de profiter dun moment unique dans un cadre exceptionnel. Goûter aux jardins, sentier pédagogique autour de leau ou simple balade, prenez le temps de savourer cet endroit magnifique.                                                                                                         St-LOUIS, le château Saint-Louis est privé, fermé au Public. Appartenant au fief Saint-Louis, le château Entre-Deux-Eaux est dit entouré de fossés en 1520. Il était au centre des possessions de l'abbaye de Molesme dans le village ce qui a induit des rivalités fortes entre les moines et les seigneurs de St-Louis.  Une construction du XVIIIe siècle le remplace et forme un U. Sa façade néo-classique est régulière avec neuf fenêtres et sur deux niveaux.                                                                                                                                   CLOS-St-ROCK, construit dans la deuxième moitié du XVIIIe siècle, est inscrit à l'inventaire supplémentaire des M.H. par arrêté du 26 août 1988. pour ses façades et ses toitures, l'escalier avec sa rampe en fer forgé et autres éléments du décor du  XVIIIe siècle, ses caves et son portail d'entrée.","habitants":"Famille de Jean- Baptiste de Pomereu\r\n        \"","divers":"Ricey-Bas grav 1-2                                                                                 GPS : 48° 0' 18\" Nord, 4° 22' 13\" Est                                                          St-Louis grav 5-6                                                                             GPS : 47° 59' 32\" nord, 4° 22' 04\" Est                                                                 Taisne grav -4                                                                                    GPS : 48° 22' 48\" Nord, 4° 22' 51\" Est                                                            Clos st Rock grav 5-6","gps":"48° 0' 18\" Nord, 4° 22' 13\" Est","images":["../image/image_10/10_Ricey_Bas_1.jpg","../image/image_10/10_Ricey_Bas_2.jpg","../image/image_10/10_Ricey_Bas_3.jpg","../image/image_10/10_Ricey_Bas_4.jpg","../image/image_10/10_Ricey_Bas_5.jpg","../image/image_10/10_Ricey_Bas_6.jpg"]},"Consult_chateau_formulaire8e12":{"id":"Consult_chateau_formulaire8e12","dept":"10","canton":"Romily sur Seine","commune":"Romily sur Seine","nom":"Romilly_Seine","type":"Château","periode":"XVIII","histoire":"SELLIERES, Il sagit du logis de lancienne abbaye cistercienne, fille de Pontigny fondée en 1167 dans les marais de la Seine, incendiée en 1567 par les huguenots et rebâtie à partir de 1759. Cest dans léglise quen 1778, labbé Alexandre Mignot fit discrètement inhumer le corps de son oncle Voltaire, auquel lÉglise avait refusé une sépulture chrétienne.                                                                              BARBANTHALL  Le château sur la route de Marcilly se trouvait proche dun haras de chevaux de course. Pas d'historique.","architecture":"SELLIERES, il ne reste aujourdhui que l'ancien palais abbatial (château), une aile de communs en retour et, un peu plus loin, au-delà de ce qui a été la cour, la ferme au bord de létang. L'édifice est un long bâtiment de grès, composé dun rez-de-chaussée et dun premier étage surmonté dun grand comble coupé au centre par un vaste fronton. Neuf fenêtres souvrent sur la façade située du côté du nord. Du côté opposé sur le jardin, se trouvent, à chaque extrémité du bâtiment, les ailes ou avant-corps. Usage de la brique comme matériau décoratif que lon retrouve sur les arcs des linteaux de fenêtres et portes, ainsi que dans la scansion des niveaux et des travées matérialisées par lalignement des baies. Le long toit de tuiles plates, à croupes, est rythmé à sa base par 5 lucarnes côté est, 2 seulement côté ouest, de part et dautres du fronton. Fortement remaniée, en façade orientale surtout, laile des communs, visiblement contemporaine du palais, ne présente pas de caractéristiques particulières. Il en est de même pour le moulin abbatial (XVIIIe siècle) situé un peu plus en amont sur la rivière de Sellières.Façades et toitures du logis abbatial ; fondations de l'ancienne abbaye détruite : inscription par arrêté du 26 août 1988.                                                                                                    BARBANTHALL   de plan rectangulaire,  à deux niveaux sur soubassement et lucarnes dans combles, pavillons latéraux légèrement saillants, l'ensemble à toit coupés.","habitants":"labbé Alexandre Mignot\r\n        \"","divers":"Romilly   gps  48° 31' 55\" nord, 3° 41' 16\" est                                Sellieres grav_1                                                                  Barbanthall grav 2-3","gps":"","images":["../image/image_10/10_Romilly_Seine_1.jpg","../image/image_10/10_Romilly_Seine_2.jpg","../image/image_10/10_Romilly_Seine_3.jpg"]},"Consult_chateau_formulairef440":{"id":"Consult_chateau_formulairef440","dept":"10","canton":"Bar-sur-Aube","commune":"Rosières-près-Troyes","nom":"Rosières_Aube","type":"Manoir","periode":"XVI","histoire":"ROSIERES, devait exister en 1201, il appartenait à Guillaume 1er de Rosières qui était vassal du compte de Troyes. A sa mort en 1249 et jusquen 1252, cest son fils, Thibaud III qui reprit la seigneurie avec pour coseigneurs ses frères Guillaume II et Thomas de Rosières. En 1448, il passa dans la famille de Verdun, la petite fille dEtienne le Peuvrier aussi appelé Etienne de Verdun, descendant lui même de Pierre de Verdun, épousa Le pelé, écuyer demeurant à Troyes, qui à lépoque était détenteur de \"la Motte de Rosières\". En 1521, le château subit une modification, François 1er alors Roi de France déclare la seigneurie franc alleu avec droit de haute et basse justice et établissement dun pont-levis levant et baissant avec chaînes de fer. A la fin du XVIe siècle, la seigneurie échut par alliance à Adrien de Pétremol, trésorier de lExtraordinaire des Guerres, puis intendant des Finances et président de la chambre des Comptes de Champagne, qui donna au château sa configuration actuelle. Cest lui qui fit entreprendre la reconstruction du corps de logis, comme le confirme le marché passé le 3 juillet 1585 avec un carrier de Polisy, portant sur le transport à Rosières de 200 blocs de pierre de Polisot. Acquis en 1615 par Vincent Le Marguenat, le domaine fut adjugé en 1656, à Samuel Guichon, receveur général et payeur des rentes de la ville de Paris. Pierre Guichon, son fils, devint trésorier général des fortifications. Quant à Marie, sa fille, elle épousa en 1672 Charles Perrault, contrôleur général des bâtiments et jardins de Sa Majesté, qui écrivit à Rosières, sinon ses célèbres Contes, une ode à lAcadémie française célébrant le climat où la Seine nest encore qu'un humble ruisseau (1690).","architecture":"ROSIERES, le Puget, grand bailli de Troyes, le château échut en 1766 à Louis-Nicolas Berthelin. Entouré dun parc boisé traversé de canaux, ce pittoresque édifice, aujourdhui propriété de M. Pierre Pomez, présente lintérêt davoir conservé, sur son terre-plein rectangulaire entouré de douves, la juxtaposition traditionnelle des bâtiments dexploitation agricole et des bâtiments seigneuriaux. Lallée daccès traverse un intéressant pavillon, celui de Claude Perrault, orné de hautes chaînes de pierre appareillées à refends et de consoles rappelant les mâchicoulis. En dépit de profonds remaniements, le logis a conservé de grandes lucarnes Renaissance en pierre et un pavillon abritant la chapelle. A droite se développe une longue aile du XVIIIe siècle, dotée dune suite darcades et dun fronton armorié; à gauche, au-delà du colombier polygonal, se succèdent danciens bâtiments agricoles, flanqués, comme les logis, de pavillons dangle en saillie sur les douves.\r\nÉléments protégés MH : le château de Rosières en totalité : inscription par arrêté du 16 juin 1926.","habitants":"Famille Adrien de Pétremol,\r\n        \"","divers":"Rosières  GPS : 48° 15' 38,37\" Nord 4° 04' 44,5\" Est","gps":"48° 15' 38,37\" Nord 4° 04' 44,5\" Est","images":["../image/image_10/10_Rosi%c3%a8res_Aube_1.jpg","../image/image_10/10_Rosi%c3%a8res_Aube_2.jpg","../image/image_10/10_Rosi%c3%a8res_Aube_3.jpg","../image/image_10/10_Rosi%c3%a8res_Aube_4.jpg","../image/image_10/10_Rosi%c3%a8res_Aube_5.jpg"]},"Consult_chateau_formulairec46e":{"id":"Consult_chateau_formulairec46e","dept":"10","canton":"Bar-sur-Seine","commune":"Rumilly lès Vaudes","nom":"Rumilly_Vaudes","type":"Château","periode":"XVI-XVIII","histoire":"MONTCEAUX La seigneurie dépendait en 1250 de l'abbaye de Molesme et du comte de Champagne ; le fief relevait de L'Isle et il n'est pas assuré que les Montceaux étaient seigneurs de Montceaux avant 1249.  Le château est cité dès 1398, en face de l'église et avait un fossé circulaire. Le château actuel est construit entre 1853 et 54 pour M. Ernest Louis Patrice de Feu de La Mothe. Il était louvetier sur le secteur. Le château a brûlé en 1910 et son propriétaire, M. Bordas-Laribe le fit reconstruire.   En 1789, le village était de l'intendance et de la généralité de Châlons, de l'élection et du bailliage de Troyes.                                                                                                                TOURELLES , à la deux k.m environ un quart de lieue du grant chemin y a un chasteau tout neuf nomé Remilly, fort beau\". Racheté par labbé de Molesmes après la mort de Pierre Pion, survenue en 1539, le manoir demeura jusquà la Révolution aux religieux qui, dit-on, y auraient logé en 1685 le père Quesnel, suspect de jansénisme. Il a été acquis en 1902 par la commune. La seconde fenêtre, au contraire, est nettement Renaissance, comme le sont les chapiteaux de la galerie sud, sculptés de fort élégantes figures dangelots dansants, et reposant sur des colonnes de pierre torsadées. A lintérieur, quatre salles ont conservé leurs cheminées de pierre monumentales, ornées de rinceaux, darabesques, de la salamandre de François Ier et de médaillons entourant des bustes laurés, à lantique. En dépit des mutilations révolutionnaires, on peut encore identifier les armes de Pierre Pion et de sa femme Jeanne Festuot, riches marchands troyens, et celles d'Antoine de Vienne, abbé de Molesmes. Pierre Pion, qui apparaît sur un vitrail du transept de la cathédrale de Troyes.","architecture":"MONTCEAUX , les Vaudes a deux K.M. au nord ouest. Le château accueille, dans ses murs, un Centre Médico-Educatif, en 2019. Le Château de Montceaux-les-Vaudes est privé, fermé au Public.                                                                                                                       TOURELLES . Le manoir des Tourelles reste aujourdhui mairie officielle de Rumilly et le rez-de-chaussée a été aménagé en salle de réception.  construit sur plan rectangulaire et cantonné de tourelles cylindriques en forte saillie, le logis possède au nord la traditionnelle tour descalier polygonale, flanquée dune vis secondaire logée dans une tourelle brique et pierre en encorbellement. Il ne serait que lexpression dun modèle fréquent à la fin du Moyen Age sil navait conservé, sur chacune de ses deux façades, une double galerie de charpente abritée par le prolongement du grand comble. Au pittoresque de ces fragiles ouvrages de bois, il ajoute loriginalité dun décor sculpté mêlant gothique et Renaissance. Les deux portes et la première fenêtre de lescalier appartiennent encore au Moyen Age.Le souvenir des Compagnons qui ont contribué à la construction et à la rénovation du manoir plane de manière évidente et constante à lextérieur et à lintérieur de lédifice : trois caveaux en sous-sol, en hommage aux trois fondateurs du compagnonnage, colonne aux spires inversées, images du chien et du loup, du renard tenant en sa gueule une poule, erreur dans la composition dune plaque de cheminée. Tout est à voir dans ce manoir, le seul édifice rural du département classé XVIe siècle, et conservé dans son intégrité. Il est classé aux M.H. La Mairie est installée dans les murs du château des Tourelles. \r\nÉléments protégés MH : le manoir des Tourelles en totalité : classement par arrêté du 22 mai 1903.","habitants":"Tourelles; Pierre Pion    Montceaux:\r\n        \"","divers":"Montceaux  grav-1- GPS : 48° 09' 37,8\" Nord, 4° 09' 43,2\" Est                 Tourelles    grav-2                                                                               GPS : 48° 08' 46,58\" Nord, 4° 13' 06,5\" Est","gps":"48° 09' 37,8\" Nord, 4° 09' 43,2\" Est                 Tourell","images":["../image/image_10/10_Rumilly_Vaudes_1.jpg","../image/image_10/10_Rumilly_Vaudes_2.jpg","../image/image_10/10_Rumilly_Vaudes_3.jpg"]},"Consult_chateau_formulaire676a":{"id":"Consult_chateau_formulaire676a","dept":"10","canton":"Les Riceys","commune":"Saint-Pouange","nom":"Souleaux","type":"Château","periode":"XVIII","histoire":"SOULEAUX, à Saint-Pouange, était le siège dun ancien fief relevant de Villebertin, possession de Jacques de Roffey, lieutenant général au bailliage de Troyes, vers 1500. Jean de Mesgrigny, qui lacheta en 1663, était gouverneur de Besançon et collaborateur de Vauban. Après la mort en 1723 de François de Mesgrigny, ingénieur des armées du Roi, Antoine Le Vert, changeur royal à Troyes, acquit le domaine. Ses héritiers le vendirent en 1790, à Nicolas Vernier dont le fils Alphonse fut sous Louis-Philippe député de l Aube.","architecture":"SOULEAUX,  Le château figure sur un plan de 1771, précédé dune large cour bordée de dépendances et entourée de douves. Cest une importante demeure qui doit ses sobres façades de pierre crayeuse et son ample toit à faible pente à une campagne de restauration, sinon de reconstruction, menée à la fin du XVIIIe siècle ou au début du XIXe siècle.","habitants":"Famille de  François de Mesgrigny\r\n        \"","divers":"","gps":"","images":["../image/image_10/10_Souleaux_1.jpg"]},"Consult_chateau_formulaire2935":{"id":"Consult_chateau_formulaire2935","dept":"10","canton":"Vendeuvre-sur-Barse","commune":"Verrières","nom":"St_Aventin","type":"Château","periode":"XIX","histoire":"ST-AVENTIN, ce château a remplacé en 1840 lancien château de Saint-Aventin. Le propriétaire qui la fait édifier, est un certain Billy Deheurles. Le château de Saint-Aventin saffirme dans un style néo-classique. Le riche comte Stroganoff, issu de la Russie tsariste, y vécut vers 1900.","architecture":"ST-AVENTIN, Le château semble avoir un train de vie luxueux pendant toute cette période.  Devant le château, une grande pelouse entourée de deux allées bordées darbres apparaît. Les allées et pelouses principales ont conservé leurs tracés ; des arbres plus que centenaires demeurent et agrémentent lensemble de la propriété. Lovale de lallée sablée qui cerne limmense tapis de la pelouse, conduit jusquau pied de la sobre demeure encadrée darbres séculaires. Les parterres fleuris des jardins étaient sans cesse renouvelés au gré des fantaisies de leurs maîtres. Selon lancien plan, le parc à la française était composé de quatre pièces entourées dallées; de part et dautre de celui-ci, se trouvaient deux vergers et un jardin potager.\r\nÉléments protégés MH : les façades et les toitures du château ; l'écrin de verdure entourant le château : inscription par arrêté du 28 juin 1995.","habitants":"Famille de  Billy Deheurles\r\n        \"","divers":"St-Aventin   GPS : 48° 13' 12\" Nord, 4° 09' 48\" Est","gps":"48° 13' 12\" Nord, 4° 09' 48\" Est","images":["../image/image_10/10_St_Aventin_1.jpg"]},"Consult_chateau_formulaireba49":{"id":"Consult_chateau_formulaireba49","dept":"10","canton":"Aix-en-Othe","commune":"St-Benoît sur Vannes","nom":"St_Benoît_Vannes","type":"Château","periode":"XVII","histoire":"SAINT-BENOIT, situé dans la vallée, près du tracé de lancienne voie romaine de Sens à Troyes, le village doit son nom à labbaye de Saint-Benoît sur Loire qui le reçut de lévêque de Troyes, au XIe siècle. Le château occupe un terre-plein délimité par une double ceinture de larges fossés, près du cours de la Vanne et du long bief qui alimente le moulin. Incendié en 1594 par les ligueurs de Troyes et reconstruit vers 1615 par Joseph de Vienne, ancien compagnon d'Henri IV, On attribue cette élégante architecture à Antoine Guerry des Essarts ou à sa fille Louise de Saint-Marcel. Lieutenant général au bailliage de Chaumont, Antoine Guerry des Essarts avait épousé en 1538 Guillemette Le Genevois, soeur de lévêque de Noyon, puis Jeanne dAverly, dame de Saint-Benoist. Vendu après la mort de M. Jean Buxtorf, descendant de la famille de Longueau qui acheta le domaine en 1651, le château a été acquis par M. Jean Bertrand qui a entrepris d'importants travaux, avec le concours des M.H.","architecture":"St_BENOIT, le corps d'habitation a conservé beaucoup de caractère, avec ses étroits pavillons dangle, ses hauts combles à forte pente et ses lucarnes classiques en pierre sculptée. Son ordonnance souffre, en revanche, des remaniements opérés au XIXe siècle, sensibles dans les encadrements des baies, repris en briques, et dans le complet rhabillage de la façade sur cour, agrandie dannexes latérales. Mais cest le grand pavillon dentrée qui fait l'originalité du château. Sur les angles extérieurs, délégantes trompes portent des tourelles de pierre formées dun faisceau détroits cylindres, dont le profil ondulant évoque celui des piliers de lultime période flamboyante. Au-dessus de larcade charretière, reprise en briques, et du logement des bras de lancien pont-levis, trois consoles supportaient une bretèche, à la base du comble.  Restauré au cours dune première étape, le beau colombier polygonal allie à la puissance de sa silhouette la légèreté dun double clocheton en charpente.  Éléments protégés MH : les façades et les toitures du château et des communs, la porterie, les douves et les vannes, le pigeonnier : inscription par arrêté du 13 septembre 1984.   Le château de Saint-Benoit est une propriété de 100 ha, avec une bâtisse principale remaniée à différentes périodes de l'histoire. Il est protégé par des douves qui entourent la partie principale du château et fermé par un pont-levis. Il a été complétement rénové par son actuel propriétaire. Le pavillon d'entrée, le corps du logis, et ses diverses dépendances ainsi que le magnifique colombier octogonal qui allie à la puissance de sa silhouette la légèreté d'un double clocheton en charpente ont repris toute la force et la beauté d'antan.","habitants":"Famille, Antoine Guerry des Essarts\r\n        \r\n        \r\n        \r\n        \"","divers":"St-Benoit   GPS : 48° 13' 55\" Nord, 3° 40' 19\" Est.","gps":"48° 13' 55\" Nord, 3° 40' 19\" Est.","images":["../image/image_10/10_St_Beno%c3%aet_Vannes_1.jpg","../image/image_10/10_St_Beno%c3%aet_Vannes_2.jpg","../image/image_10/10_St_Beno%c3%aet_Vannes_3.jpg"]},"Consult_chateau_formulaire889a":{"id":"Consult_chateau_formulaire889a","dept":"10","canton":"Aix-en-Othe","commune":"Estissac","nom":"St_Liebault_Estissac","type":"Château","periode":"XV-XVII","histoire":"ESTISSAC, le château est reconstruit, à la fin XVe siècle, sur l'emplacement d'un ancien château fort. Il est complètement détruit en 1793. Parmi son mobilier, on peut noter : un tableau du chancelier Sèguier par Lebrun, un portrait du cardinal Coislin par Largillière, un portrait du maréchal de Nangis par Rigaud et deux portraits de La Rochefoucault,  Le chancelier Pierre Sèguier y continuait les embellissements. Il restait dans la famille jusqu'à Camboust, évêque de Metz et sa parente Marie-Henriette d'Alloigny qui l'habitait avec son fils Louis Armand François, duc d'Estissac. François Alexandre Frédéric, duc de Liancourt et d'Estissac émigre en 1792. Le château est alors saisi par les autorités locales en 1793. Le mobilier fut vendu la même année et les uvres d'art transportées dans ce qui devient le musée des Beaux-Arts de Troyes. Le château lui-même est transformé en fabrique de salpêtre pour les armées, qui fonctionne de 1794 à 1795. En 1795, le château est vendu à Laurent Laguoguey, marchand de bois à Armentières, qui le fait détruire pour revendre les matériaux de construction                                                                                           SAINT-LIEBAULT,  son mobilier est composé d'un tableau du Chancelier Sèguier par Lebrun, un portrait du Cardinal Coislin par Largillière, un portrait du Maréchal de Nangis par Rigaud et deux portraits de La Rochefoucault, l'un en abbé et l'autre en Cardinal et qui se trouvait à Rome. Une description en fut faite par le Procureur fiscal Jean Chobert, en 1630.  François XII-Alexandre-Frédéric, fut Duc de Liancourt puis Duc de La Rochefoucauld, (1747-1827), Pierre Sèguier, Ministre de Louis XIII, fut le Seigneur de Villemaur et d'Estissac.","architecture":"SAINT-LIEBAULT. au premier étage, après l'escalier d'honneur, se trouvait une chambre aux tableaux et à côté, la chapelle. Une autre était à fleur de lys et l'autre représentait la vie de Marie Stuart sur les murs. Au second étage se trouvait une pièce au trésor et une autre où se logeait le mécanisme de l'horlogerie du pavillon.Une plaque de marbre noir apposée sur l'église d'Estissac rappelle le combat héroïque de Jean Verger sur la louve de Villadin son mobilier est composé d'un tableau du Chancelier Sèguier par Lebrun, un portrait du cardinal Coislin par Largillière, un portrait du Maréchal de Nangis par Rigaud et 2 portraits de La Rochefoucault, l'un en abbé et l'autre en Cardinal et qui se trouvait à Rome. Une description en fut faite par le Procureur fiscal Jean Chobert, en 1630.  François XII-Alexandre-Frédéric, fut Duc de Liancourt puis Duc de La Rochefoucauld, (1747-1827), Pierre Sèguier, Ministre de Louis XIII, fut le Seigneur de Villemaur et d'Estissac.                                                                                                                  ESTISSAC, est composé de deux pavillons centraux de deux niveaux avec lucarnes sur combles avec au centre un pavillon à trois niveaux, toits en dôme, et aux extrémités pavillons carrés à trois niveaux avec lucarnes sur combles à toits pointus. En 1789, le village était de l'intendance et de la généralité de Châlons, de l'élection et du bailliage de Troyes. Au cours de la Révolution française, la commune porta provisoirement les noms de Lyébault-sur-Vanne et de Val-Libre.  Une communauté protestante relativement nombreuse a existé à Estissac et dans ses environs, sous l'Ancien Régime et au XIXe siècle. La commune d'Estissac était d'ailleurs dotée d'un temple protestant au XIXe siècle. Pour plus de détails sur lhistoire dEstissac, voir plus bas via la rubrique liens externes .","habitants":"Jean Verger                                                                                 Laurent Laguoguey,\r\n        \r\n        \"","divers":"Estissac GPS : 48° 16' 12\" Nord, 3° 48' 24\" Est","gps":"48° 16' 12\" Nord, 3° 48' 24\" Est","images":["../image/image_10/10_St_Liebault_Estissac_1.jpg","../image/image_10/10_St_Liebault_Estissac_2.jpg"]},"Consult_chateau_formulaire9b98":{"id":"Consult_chateau_formulaire9b98","dept":"10","canton":"Bar-sur-Seine","commune":"Saint-Parres-les vaudes","nom":"St_Parres_Vaudes","type":"Château","periode":"XVI","histoire":"St-PARRES LES VAUDES, en 1580, Philippe Le Marguenat, contrôleur ordinaire des guerres, épousa Marie Le Peleterat qui lui apporta la moitié de Saint-Parres. Vendue en 1761 par Madeleine. Le Marguenat, la terre fut acquise peu après par Jean-Baptiste de La Chapelle, aïeul de lactuel propriétaire, M. Bernard de La Hamayde. Cest à Jean-Baptiste de La Chapelle, qui racheta en 1786 au duc dAumont la seconde partie de la seigneurie, que lon attribue la reconstruction du corps de logis.","architecture":"St-PARRES LES VAUDES,  le petit château de Saint-Parres-les-Vaudes, sur la grande route de Troyes, est une belle demeure dagréables proportions qui succéda au XVIIIe siècle à un bâtiment dorigine médiévale, comportant motte et fossé.","habitants":"Famille le Marguenat\r\n        \"","divers":"GPS : 48° 18' 22\" Nord, 4° 06' 49\" Est","gps":"48° 18' 22\" Nord, 4° 06' 49\" Est","images":["../image/image_10/10_St_Parres_Vaudes_1.jpg","../image/image_10/10_St_Parres_Vaudes_2.jpg","../image/image_10/10_St_Parres_Vaudes_3.jpg"]},"Consult_chateau_formulaire5b86":{"id":"Consult_chateau_formulaire5b86","dept":"10","canton":"Creney-près-Troyes","commune":"Sainte-Maure","nom":"Ste_Maure","type":"Château","periode":"XVI-XVIII-XIX","histoire":"SAINTE-MAURE, construit au-dessus de la vallée, le château de Sainte-Maure résulte, dans son état actuel, de la reconstruction vers 1840 par le comte de Chavaudon. Privé en 1909 des ailes qui lencadraient, il a conservé, en revanche, un pavillon latéral abritant une grande figure dAtlas en stuc, remplaçant, dit-on, un original provenant de Villacerf. Passé par alliance aux Faucigny-Lucinge, acquis en 1944 par lévêché de Troyes, le domaine est devenu le siège dune école dagriculture. Le précédent château avait été élevé à partir de 1696 par la marquise dEsnon, sur les plans de Maillet, chanoine de Troyes. Pierre de Chavaudon, lieutenant général au bailliage, lavait acquis vers 1712. Son petit-fils, président à la chambre des Comptes, lavait agrandi dailes élevées sur les plans de Contant dIvry (1764), et lavait accompagné de jardins dessinés par Moisy. En 1766, un visiteur le jugeait joli, très régulier, bien annoncé, en très belle vue, bâti à la moderne et meublé avec goût.  Lycée agricole privé.                           Le domaine de Vermoise a finalisé son projet de chambres dhôtes et vous permet de prolonger votre journée exceptionnelle au sein de chambres charmantes et confortables.","architecture":"SAINTE-MAURE, un bâtiment du parc montre qu'une construction existait déjà au XVIe siècle.  Le château de Sainte-Maure  est de style Louis XIV, les ailes du bâtiment ont été rasées au début du XXe siècle. Le château des Cours ou château de Sainte-Maure fut rebâti en 1696, sur des plans de Louis Mallet. Les ailes de Constant datent de 1768 et les jardins de M. Moisy. Ces jardins ont requis la destruction de quelques maisons de Charley. Les dites maisons étaient le château de Charley, cité jusqu'en 1762. Une rotonde octogonale située à l'avant du château abrite une statue d'Atlas, soutenant le monde. Le château de Sainte-Maure devenu la propriété de la famille Chavaudon, fut racheté en 1944 par l'évêché, qui y fit installer une école d'Agriculture.","habitants":"Famille de Pierre de Chavaudon\r\n        \"","divers":"St Maure GPS : 48° 20' 43\" Nord, 4° 03' 44\" Est                                                             Vermoise GPS : 48° 21' 45,22\" Nord, 4° 02' 19,2\" Est","gps":"48° 20' 43\" Nord, 4° 03' 44\" Est","images":["../image/image_10/10_Ste_Maure_1.jpg","../image/image_10/10_Ste_Maure_2.jpg","../image/image_10/10_Ste_Maure_3.jpg","../image/image_10/10_Ste_Maure_4.jpg"]},"Consult_chateau_formulaire41b4":{"id":"Consult_chateau_formulaire41b4","dept":"10","canton":"Troyes","commune":"Sainte-Savine","nom":"Ste_Savine","type":"Château","periode":"XIX","histoire":"Ste SAVINE   Le centre Culturel Art-Déco est un ancien hôtel de ville, bâti à Sainte-Savine.   La construction de cet ancien hôtel de ville date de 1932. Cet édifice imposant, unique et remarquable, est de style \"Art Déco\". Ce lieu abrite une grande salle de spectacle, à l'esthétique typique des années 30. D'importants travaux de réhabilitation ont été réalisés en 2015 et 2016, lui rendant son éclat d'antan et la remise aux normes actuelles. Les architectes furent Hugot et Roger.","architecture":"Ste SAVINE, cet édifice a été construit de 1932 à 1935 en remplacement d'un bâtiment plus petit. Le bâtiment s'intègre dans l'aménagement d'une parcelle qui comprend un hôtel des postes et un commissariat de police, construit en même temps que l'hôtel de ville et par les mêmes architectes, Hugot et Roger. L'hôtel de ville présente un dessin géométrique inspiré par le style Art Déco. L'utilisation du béton et l'importance donnée aux éléments décoratifs en fer forgé, se veut représentative de l'architecture d'avant-garde de l'époque. Cet ancien Hôtel de Ville a été inscrit aux M.H. depuis le 30/10/2007.","habitants":"architectes Hugot et Roger\r\n        \"","divers":"Ste -Savine GPS : 48° 17' 41,11\" Nord, 4° 03' 35,87\" Est","gps":"48° 17' 41,11\" Nord, 4° 03' 35,87\" Est","images":["../image/image_10/10_Ste_Savine_1.jpg","../image/image_10/10_Ste_Savine_2.jpg"]},"Consult_chateau_formulaire5596":{"id":"Consult_chateau_formulaire5596","dept":"10","canton":"Les Riceys","commune":"Praslin","nom":"Tanlay_Noyers","type":"Château","periode":"XVI-XVII","histoire":"TANLAY,  est de style Renaissance. Il a appartenu à la Famille de l'Amiral de Coligny puis au Surintendant des Finances : Michel Particelli dÉmery, un proche de Mazarin. La terre de Tanlay et sa forteresse, appartiendront à la Maison des Courtenay, du XIIIe au XIVe siècle. Puis il deviendra la propriété des Marquis de Tanlay, à la fin du XVIIe siècle. Au début du XVIe siècle, va commencer la construction d'un nouveau château, sur les fondations de l'ancienne forteresse. En 1533, le Château de Tanlay échoit à Louise de Montmorency, sur du Connétable Anne de Montmorency et Veuve du Maréchal Gaspard de Coligny. C'est son plus jeune fils, François de Coligny d'Andelot, qui fait entreprendre la construction du grand château, de 1550 à 1568 et le petit château , dès 1558. Il reçut le soutien financier de son frère, Gaspard de Coligny. Durant les guerres de religion, son frère Gaspard, Amiral de Coligny, choisit le château de Tanlay pour réunir les chefs protestants. Louis Ier de Condé y séjourna,souvent, son château de Noyers étant voisin de Tanlay. En 1569, François d'Andelot décède, laissant le projet inachevé. Son gendre Jacques Chabot, marquis de Mirebeau et fils de Philippe Chabot, fait poursuive les travaux avec la Tour de la Ligue, la Tour Coligny et fait achever le petit château (1610). En 1635, la seigneurie va passer à Claude Vignier, premier président au Parlement de Metz. En 1642, il revendit Tanlay à un proche de Mazarin : le Surintendant des finances, Michel Particelli d'Émery. Celui-ci charge l'architecte Pierre Le Muet d'achever les travaux. Entre 1642 et 1650, il fit élever l'aile droite du bâtiment, selon un plan symétrique en U qui encadre la cour d'honneur.","architecture":"TANLAY,  Il travaille sur les façades du corps de logis principal et sur la décoration des appartements. Face au château, il fait bâtir des communs, dans un style classique et régulier. Des travaux importants seront menés dans le parc, afin d'aménager un canal et d'entourer le château de Tanlay, par des douves. Après 1650 le gendre de Particelli, Phelypeaux de la Vrillière, recueille le château de Tanlay, érigé en 1671, en marquisat, en sa faveur par Louis XIV. En 1704, son petit-fils revendit Tanlay à Jean Thévenin, gouverneur de Saint-Denis. Le château appartient encore à ses descendants. En 1963, le Château de Tanlay servit de lieu de tournage, pour le premier volet de la saga \"Angélique, Marquise des anges\" (avec Michèle Mercier et Robert Hossein). Dans le film, il devient la demeure du Comte de Peyrac, époux d'Angélique. Le 20/12/1994, le château de Tanlay et plusieurs éléments de son environnement sont classés aux M.H. Depuis 1998, le Centre d'Art de l'Yonne organise ses expositions dans les communs du château.. Le Château de Tanlay est un monument privé, ouvert à la visite, et au Public. Il est classé aux M.H.(1927, 1994, pour le Parc et le château).                                                                                                                        NOYERS, monument historique du XVIe XVIIe  siècle avec vestiges mégalithiques. Façade orientée au soleil levant ; de part et dautre de lescalier : deux grandes pièces au rez-de-chaussée, deux autres à létage. Les aménagements défensifs dantan : deux tourelles dangle à encorbellement munies de petites bouches à feu, présence sur chaque façade dune bretèche centrale surplombant la porte dentrée et pouvant également servir dassommoir, douves successives et grosses tours de défense.","habitants":"Marquis de Tanlay                                                                  Gaspard, Amiral de Coligny\r\n        \"","divers":"Tanlay-grav-1Praslin GPS : 48° 02' 50\" Nord, 4° 12' 00\" Est                      Noyers grav-2 Tanlay  GPS : 48° 28' 02\" Nord, 3°25'53\" Est","gps":"48° 02' 50\" Nord, 4° 12' 00\" Est                      Noyers","images":["../image/image_10/10_Tanlay_Noyers_1.jpg","../image/image_10/10_Tanlay_Noyers_2.jpg"]},"Consult_chateau_formulairec5ed-2":{"id":"Consult_chateau_formulairec5ed-2","dept":"10","canton":"Troyes","commune":"Troyes","nom":"Troyes","type":"Château","periode":"XVIII-XIX","histoire":"VAULUISANT musée  l'hôtel de Vauluisant fait lobjet dun classement au titre des monuments historiques depuis le 21 décembre 19041. Il occupe le site d'un bâtiment qui appartenait à l'abbaye de Notre-Dame de Vauluisant au XIIe siècle. Le bâtiment a brûlé lors de l'incendie de 1524 et c'est Antoine Hennequin, receveur des tailles, qui est à l'origine de l'immeuble actuel. Le corps gauche du bâtiment est dû à la famille de Mesgrigny, Jean seigneur de Marcilly est à l'origine du départ depuis la tourelle en 1624 et François la partie qui continue le précédent. Cette aile est terminée en 1688.Rénové en 1863 par le Cercle troyen, il est acquis par la municipalité en 1932 qui en fait une annexe du musée Saint-Loup et affecté aux arts décoratifs. C'est en 1959 qu'il recevait sa dénomination actuelle. Il fut rénové entre 1950 et 1953 pour l'intérieur puis entre 1954 et 1957 pour les parties classées par les Monuments historiques. L'entrée se fait par un porche monumental qui est un arc en plein cintre surmonté d'une corniche en oméga ; pour donner sur une cour avec une façade Renaissance encadrée par deux tours. Le bâtiment est accessible par un  grand escalier en fer à cheval.","architecture":"ST-PARRES aux Tertres  banlieue de Troyes à l'ouest. Cet édifice construit au XVIIIe siècle, est dans la même famille depuis cinq générations. C'est un château fort. Cité en 1716, le château de Foissy était fermé de murs avec 8 arpent de vergers.  Il avait deux grands bâtiments d'habitation, une tour de 10 mètres  de diamètre, un colombier, le château de Foissy a été inscrit aux M.H. partiellement en 1979 Éléments protégés MH : les façades et toitures du château et de ses dépendances : inscription par arrêté du 2 novembre 1979.","habitants":"Antoine Hennequin                                                                          famille de Mesgrigny\r\n        \r\n        \r\n        \"","divers":"Terray grav-2                                                              Vauluisant grav 3 -4                                                                             St-Parres grav-5","gps":"","images":["../image/image_10/10_Troyes_2_1.jpg","../image/image_10/10_Troyes_2_2.jpg","../image/image_10/10_Troyes_2_3.jpg","../image/image_10/10_Troyes_2_4.jpg","../image/image_10/10_Troyes_2_5.jpg"]},"Consult_chateau_formulaire9f64":{"id":"Consult_chateau_formulaire9f64","dept":"10","canton":"Troyes","commune":"Troyes","nom":"Troyes_2","type":"Château","periode":"XII-XVIII-XIX","histoire":"TROYES  La Militaire Association troyenne, familièrement connue sous le nom de MAT, est une association de collectionneurs pour la remise en valeur du passé militaire, créée en 1986 par son président fondateur Bruno Tabare. La collection comporte 65 véhicules presque tous en état de marche dont 44 blindés, ayant tous un rapport proche ou très proche avec le monde militaire.                                                                              Au nord de Troyes à st-Lye  château des EVEQUES,  est attesté dés 1180 et est connu pour le mariage du roi Louis X le Hutin avec Clémence de Hongrie, sa seconde épouse, du 31 juillet au 3 août 1315. En 1372, Jean Braque, l'évêque assurait le roi Charles X que son château pouvait accueillir les habitants du village et ceux à 2 lieues à la ronde. Le roi demanda à son Bailli de s'assurer que les habitants s'acquittaient bien, de leur droit de garde, au château, en contre-partie. Le Bâtard de Bourbon logea au château des Evêques avec 75 chevaux le 18/10/1349. Le château des Evêques de Troyes fut remanié, au XVIe siècle, par Odard Hennequin. Le pigeonnier date du XVIe siècle. Les bâtiments actuels sont de la fin XVIIe siècle ou du début du XVIIIe siècle. Le château des Evêques de Troyes est inscrit aux M.H. depuis 1933.                       .","architecture":"Hôtel de MAUROY  c'est un hôtel particulier construit en 1550, sur des terrains abandonnés après le grand incendie de 1524, il fut transformé en un hôtel particulier au XVIIIe siècle, par Jean de Mauroy, seigneur de Colasverdey, écuyer, contrôleur des tailles et aides du royaume, échevin de Troyes. Avec son époux, Louise De Pleur demandèrent par testament qu'il devienne un orphelinat ; l'orphelinat de la Trinité accueillait des enfants à qui l'on apprenait à faire des « bas de tricots ». Il accueillait des enfants dès 1582 et la chapelle était inaugurée en 1584 par Claude de Baufremont ; il était dirigé par les frères de l'Hôpital de la Rédemption de Paris. En tant qu'édifice dédié à la bienfaisance, il ne fut pas vendu lors de la Révolution mais versé a
