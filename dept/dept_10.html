u patrimoine des hôpitaux. Les enfants furent transportés au Petit-st-Nicolas. Au XIXe siècle, il fut vendu et devint un bal public, un estaminet, un atelier de draperies, une administration militaire, puis enfin siège d'un journal local. La maison de lOutil et de la Pensée Ouvrière est devenue le plus grand Musée d'outils de façonnage au monde. Elle présente une importante collection de 11 000 outils de façonnage à main (bois, fer, cuir, pierre) des XVIIe, XVIIIe et XIXe siècle, scénographié dans 65 vitrines.","habitants":"Famille de Jean Braque\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Troyes GPS : 48° 17' 51\" Nord, 4° 04' 27\" Est                                                                  Chat des évêques grav-1GPS : 48° 21' 41\" Nord, 4° 00' 25\" Est                                                                                                          Hôtel maurois GPS : 48° 17' 40,56\" Nord, 4° 04' 23,88\" Est                        chateau de Foissy   grav 4-5","gps":"48° 17' 51\" Nord, 4° 04' 27\" Est","images":["../image/image_10/10_Troyes_1.jpg","../image/image_10/10_Troyes_2.jpg","../image/image_10/10_Troyes_3.jpg","../image/image_10/10_Troyes_4.jpg","../image/image_10/10_Troyes_5.jpg","../image/image_10/10_Troyes_6.jpg"]},"Consult_chateau_formulaireb325":{"id":"Consult_chateau_formulaireb325","dept":"10","canton":"Les Riceys","commune":"Turgy","nom":"Turgy","type":"Château","periode":"XVII","histoire":"TURGY, il est cité en 877  lors de la cession par Charles le Chauve de bien du Pagus de Tonnerre à Baudri et en particulier la fontaine Aurore et la chapelle Saint-Lou. Il en est la propriété depuis les 1990. Le fief relevait d'Ervy et avait aussi comme seigneur l'abbaye bénédictine Saint-Michel de Tonnerre.  Il est cité, dans l'inventaire de Charles de Valois, Marquis de Mursay, pour ses boiseries du XVIIIe et qu'il appartenait au Duc de Crillon. Le château de Turgy se situe en hauteur du village. Des fêtes sont organisées, chaque année, pour les enfants. Le château de Turgy n'est pas inscrit ni classé aux M.H.","architecture":"TURGY, l'abbaye possédait surtout des bois. La construction du château de Turgy date du XVIIe siècle. Le château de Turgy, situé au centre du village, est un manoir construit du XVIe et XVIIe siècle. En 1789, le village de Turgy relevait de l'intendance et de la généralité de Paris, de l'élection de Saint-Florentin et du bailliage de Troyes. Le château de Turgy comporte  un donjon du XVe siècle.","habitants":"Duc de Crillon\r\n        \"","divers":"TurgyGPS : 48° 01' 29\" Nord, 4° 02' 36\" Est","gps":"48° 01' 29\" Nord, 4° 02' 36\" Est","images":["../image/image_10/10_Turgy_1.jpg"]},"Consult_chateau_formulairef792":{"id":"Consult_chateau_formulairef792","dept":"10","canton":"Les Riceys","commune":"Vanlay","nom":"Vanlay","type":"Château","periode":"XV-XVI","histoire":"VANLAY, siège de lune des deux seigneuries de Vanlay, le château appartenait en 1362 à Jean de Dinteville, seigneur de Polisy. On en attribue la reconstruction à Gaucher de Dinteville, lun des dix enfants de Claude de Dinteville qui fut surintendant des Finances de Charles le Téméraire et mourut en 1477 à Nancy, au côté du duc. Capitaine de Bar-sur-Seine et gentilhomme de la chambre du duc dOrléans Gauthier de Dinnteville fut inhumé à Vanlay en 1528, de même que le dernier de ses fils, également prénommé Gaucher, qui sexila à Venise en 1538. Réintégré dans ses charges à lavènement dHenri II, ce dernier mourut en 1550 et sa veuve, Louise de Coligny dut continuer à habiter Vanlay où lon peut toujours lire ses armes, sculptées dans la pierre. Leur fille unique, Marguerite, épousa son cousin Joachim, baron de Dinteville et lieutenant général au gouvernement de Champagne, qui mourut en 1607, sans postérité, en son château de Dinteville. Acquit en 1646 par Michel Particelli dEmery, surintendant des Finances et seigneur de Tanlay, en Bourgogne, la terre de Vanlay échut en 1705 aux Thévenin, puis aux La Tour du Pin et aux Bernis-Calvière. Cité au XVIIe siècle comme une motte fermée de fossés, murailles et pont-levis, tenant à la rivière de Vanlay, Il appartient à Mme Petitean.","architecture":"VANLAY,  une première motte close de fossés et le closeau devant la dite motte contenant environs deux arpents est citée dès 1390 au lieu-dit Vaudrey. Il est très difficile de déterminer le lieu exact parmi les deux fiefs de Vaudrey. Un manoir a été construit par Gauthier de Dinnteville, capitaine de Bar-sur-Seine. En 1550, le château est cité assis au bois Bureau ou borbereau. Il consiste en une motte fermée de fossés murailles et pont-levis. et en 1829 sont cités les deux châteaux du marquis de Vanlay. L'édifice est inscrit au titre des monuments historiques en 19691. le château consiste en un pavillon d'habitation carré, abritant plusieurs cheminées de pierre, flanqué dune aile et dune tour dangle cylindrique, munie de meurtrières.","habitants":"Famille de Gauthier de Dinnteville\r\n        \"","divers":"Vanlay GPS : 48° 01' 27\" Nord, 4° 00' 42\" Est","gps":"48° 01' 27\" Nord, 4° 00' 42\" Est","images":["../image/image_10/10_Vanlay_1.jpg","../image/image_10/10_Vanlay_2.jpg"]},"Consult_chateau_formulaire1617":{"id":"Consult_chateau_formulaire1617","dept":"10","canton":"Bar-sur-Seine","commune":"Vault-Tanlay","nom":"Vault_de_Lugny","type":"Château","periode":"XV-XVI","histoire":"VAULT de LUGNY dit de Tanlay.  Il date du début du XVe siècle. Le château de Vault-de-Lugny fut démantelé en 1478 mais il sera reconstruit à la fin du XVIe siècle. Une première motte close de fossés et le clôseau devant la dite motte contenant environs deux arpents est citée, dès 1390, au lieu-dit Vaudrey. Il est très difficile de déterminer le lieu exact parmi les deux fiefs de Vaudrey. Un manoir a été construit par Gauthier de Dinnteville, capitaine de Bar-sur-Seine.","architecture":"VAULT de LUGNY , en 1550, le château de Vault-de-Lugny est cité  au bois Bureau ou borbereau. Il consiste en une motte fermée de fossés murailles et pont-levis et, en 1829, sont cités les 2 châteaux du Marquis de Vanlay. Le château de Vault-de-Lugny a été inscrit aux M.H. en 1969. Bordé d'un large fossé empli d'eau, le château de Vault-de-Lugny est devenu depuis, un très bel hôtel de luxe.","habitants":"Famille de  Gauthier de Dinnteville\r\n        \r\n        \"","divers":"Vault  GPS : 48° 01' 26,67\" Nord, 4° 00' 41,97\" Est","gps":"48° 01' 26,67\" Nord, 4° 00' 41,97\" Est","images":["../image/image_10/10_Vault_de_Lugny_1.jpg","../image/image_10/10_Vault_de_Lugny_2.jpg"]},"Consult_chateau_formulaire9e37":{"id":"Consult_chateau_formulaire9e37","dept":"10","canton":"Bar-sur-Seine","commune":"Fouchères","nom":"Vaux_Aube","type":"Château","periode":"XVI-XVII","histoire":"VAUX ,  Jean II dAubeterre au XVIe siècle, acheta les seigneuries de Fouchères et de Vaux, était le fils de Pierre dAubeterre, négociant à Troyes, et de Jeannette de Mesgrigny, fille dun président au bailliage de la ville. Dans les années 1630, Jean dAubeterre, lun de ses successeurs, habite à Vaux une maison seigneuriale fermée de murailles et de fossés. Cest dans cette demeure, dont un acte de 1680 signale le très mauvais état, que meurt en 1693 son fils Jean-Baptiste. Jacques dAubeterre qui hérite alors du domaine, est capitaine de cavalerie et beau-frère de Joseph-Antoine Hennequin, ancien ambassadeur à Venise, qui fait bâtir Charmont. En 1715, il obtient lérection en comté de sa terre de Vaux, réunie à la châtellenie de Jully-le-Châtel, et lorsquen 1720, un incendie ravage le château, népargnant que la chapelle, il en décide la reconstruction, comme en témoigne un marché de couverture daté de 1723. Les travaux excèdent ses possibilités financières car lors de sa mort, trois ans plus tard, ses créanciers imposent un bail judiciaire du domaine. Son fils Jean-Jacques, comte de Jully, est chambellan de lempereur Charles VII, puis capitaine des gardes de l'électeur de Bavière. Il ne réside que rarement en Champagne et, vers 1750, cède le domaine à son beau-frère, Claude-Joseph de La Rue, comte de Mareilles, qui fait achever les travaux. En 1760, le marquis de Montmort, lieutenant général des armées du Roi, achète Vaux et Jully. Saisi après sa mort, survenue en 1795, le domaine revient finalement à sa petite-fille, Adélaïde Mony. Charles-Emile de Maupas qui, en 1855, achète Vaux aux héritiers des Mony, est un ami intime de Napoléon III et lun des principaux acteurs du coup dÉtat du 2 décembre. Préfet de Police de Paris, puis ambassadeur à Naples et préfet des Bouches-du-Rhône, il mène grand train à Vaux où il se retire après la chute de lEmpire et meurt en 1888. À sa fille Mme de Fontenay, succède sa petite-fille, la comtesse de Ponton dAmécourt.","architecture":"VAUX, lors de son rachat par M. Philippe Vallery-Radot qui fait procéder aux travaux conservatoires les plus urgents, fait dégager le parc paysager et aménager lun des corps de dépendances pour accueillir un établissement de lAssociation parisienne pour l'Éducation de lEnfance inadaptée. Délaissé à partir de 1934, abandonné depuis loccupation, le château est dans un état critique en 1971.  Ce site grandiose et solitaire saccorde parfaitement avec le caractère de cet imposant édifice, alliant à des proportions superbes un soin particulier dans la mise en oeuvre. A la qualité de larchitecture répond celle des sculptures de lavant-corps. Au-dessus de lentrée, le masque dHercule revêtu de la peau du lion de Némée symbolise la force. A la naissance du toit, des groupes denfants couronnent une balustrade aveugle, de part et dautre des armoiries monumentales de Maupas, encadrées de chevaux. Sur le parc, les clés sont également historiées et les balustrades chargées de trophées militaires. Gravement éprouvé par un long abandon, cet exceptionnel édifice, lun des plus remarquables de Champagne, avec ceux de La Motte-Tilly et de Brienne, est dans un état quasi désespéré: les lucarnes seffondrent, les toitures et les planchers percent. Les travaux conservatoires effectués au milieu du XXe siècle à limitiative de M. Vallery-Radot; une couverture provisoire, ont temporairement interrompu le processus de dégradation. Ils ne rendent que plus souhaitable la restauration plusieurs fois envisagée dune demeure conçue par lun des plus grands architectes du XVIIe siècle et parvenue intacte jusquà nous, dans son ordonnance comme dans son environnement.","habitants":"Famille de  Jacques dAubeterre\r\n        \r\n        \"","divers":"Vaux GPS : 48° 07' 29\" Nord, 4° 15' 44\" Est                                                              Fouchères_Grav 5","gps":"48° 07' 29\" Nord, 4° 15' 44\" Est","images":["../image/image_10/10_Vaux_Aube_1.jpg","../image/image_10/10_Vaux_Aube_2.jpg","../image/image_10/10_Vaux_Aube_3.jpg","../image/image_10/10_Vaux_Aube_4.jpg","../image/image_10/10_Vaux_Aube_5.jpg"]},"Consult_chateau_formulairecef1":{"id":"Consult_chateau_formulairecef1","dept":"10","canton":"Vendeuvre-sur-Barse","commune":"Vendeuvre-sur-Barse","nom":"Vendeuvre_Barse","type":"Forteresse","periode":"XV-XVII-XIX","histoire":"VENDEUVRE SUR BARSE  Dès 1107, la famille de Vendeuvre posséda un château fort. Passée à MIIes  de Noyers, maréchal et bouteiller de France, puis au XVe siècle aux Mello, la baronnie de Vendeuvre, lune des plus anciennes de Champagne, échut au XVIIe siècle à Henri de Luxembourg, duc de Piney et prince de Tingry, puis à ses deux filles qui la vendirent en 1638. Lacquéreur, Jean VIII de Mesgrigny, conseiller détat, obtint en 1644 son érection en marquisat. Son fils Jean IX, vicomte de Troyes, intendant de Champagne, puis premier président au parlement de Provence et conseiller d'état, fit reconstruire le corps de logis. Un aveu rendu en 1603 par François de Luxembourg décrivait le château comme flanqué de tours, avec parc fermé de murailles, très coûteux à entretenir. Dans un second aveu, daté de 1656, Jean IX de Mesgrigny se montre plus explicite. Il fait état du château et forteresse, avec double pont-levis, consistant: la haute cour en un grand corps de logis et grand escalier ; un donjon et grosse tour ancienne, chapelle, tours, écuries, la basse cour, fermée de fossés, consistant en un logement. Héritier des Mesgrigny, Claude-Léon Bouthillier de Chavigny, vend le domaine en 1752 à Gabriel Pavée de Provenchères, aïeul de Guillaume Pavée de Vendeuvre (1779-1870) qui présidera sous Louis-Philippe le conseil général de l Aube.","architecture":"VENDEUVRE SUR BARSE, fortement remanié au XIXe siècle, le château se compose essentiellement dun grand logis dallure massive, élevé au XVIIe siècle mais réutilisant largement des maçonneries antérieures. La façade darrivée, au nord, présente lordonnance caractéristique de lépoque Louis XII, avec ses fenêtres groupées au centre, sa corniche à modillons et ses lucarnes au fronton chargé de boules. La façade sud, en revanche, doit la rareté de ses ouvertures à l'épaisseur de ses murs, hérités, comme ceux du pignon ouest, de la forteresse médiévale. Flanquée dun côté dune forte tour quadrangulaire, de lautre dune échauguette ajoutée au XIXe siècle, elle donne sur des terrasses dominant une grande esplanade gazonnée, traversée par la Barse qui prend sa source sous le château même. Double en profondeur, le corps de logis abrite un grand escalier de pierre, aux volées droites appuyées sur des arcades rampantes, orné de bas-reliefs néoclassiques de Simart (1806-1857). Depuis plusieurs années, en juillet, les Amis du château organisent au pied des terrasses des spectacles historiques son et lumière.","habitants":"Famille de Claude-Léon Bouthillier de Chavigny\r\n        \"","divers":"Vendeuvre sur Barse GPS : 48° 14' 13,77\" Nord, 4° 28' 20,68\" Est.","gps":"48° 14' 13,77\" Nord, 4° 28' 20,68\" Est.","images":["../image/image_10/10_Vendeuvre_Barse_1.jpg","../image/image_10/10_Vendeuvre_Barse_2.jpg","../image/image_10/10_Vendeuvre_Barse_3.jpg"]},"Consult_chateau_formulaire3acb":{"id":"Consult_chateau_formulaire3acb","dept":"10","canton":"Creney-près-Troyes","commune":"Ste Maure","nom":"Vermoise_10","type":"Château","periode":"XVI","histoire":"VERMOISE,  Laurent de Moulinet, seigneur de Vermoise, participa en 1493 à lassemblée de la noblesse chargée de rédiger la coutume de Troyes. On attribue à Noël Coiffard, qui fut maire de Troyes en 1534, la reconstruction de \"lhostel seigneurial, décrit en 1577 comme un grand corps de maison en pierre avec un pavillon au bout\". Louis Huez acquit la seigneurie en 1651 et son petit-fils Louis-Claude, lieutenant général au bailliage, abandonna le vieux château vers 1750 pour un nouveau logis. C'est le centre d'une seigneurie qui dépendait du Saint-Sépulcre puis de Villacerf de la mairie royale de Grande-Rivière.  Louis Claude Huez, habitat le pavillon qu'il avait fait bâtir en 1750 : le Pavillon de la Charme.  Nicolas Huez fit tracer le parc à lemplacement des vignes. L'édifice est inscrit au titre des monuments historiques en 1977,  Le domaine de Vermoise a finalisé son projet de chambres dhôtes et vous permet de prolonger votre journée exceptionnelle au sein de chambres charmantes et confortables.","architecture":"VERMOISE, du château, situé au bord du plateau, au-dessus de la vallée de la Seine, subsiste un pavillon dentrée portant la date de 1509. Les contreforts qui encadrent lancien passage charretier, condamné lors du rehaussement de la route, portent deux pittoresques échauguettes dont les fenêtres ont conservé leurs solides grilles de protection, dit pavillon de la charme, qui disparut au XIXe siècle. Au lendemain de la Révolution,  Il reste du château du XVIe siècle la porte d'entrée et ses deux poivrières et son attribuée à Noêl Coiffart, maire de Troyes. Il s'agit d'un parc à la Française dessiné par l'artiste troyen Maurice Marinot, qui comprend des charmilles, une terrasse en bois dominant, la rivière, de belles allées, des cerisiers et une belle grange champenoise dont la charpente et la toiture ont été totalement remaniées et remises en valeur, les pans de bois apparents habillés de chanvre laissent place à de grandes baies vitrées ouvrant sur le parc. Il reste peu de choses de lancien château; un mur denceinte qui relie quelques tours et la magnifique porte dentrée. En 1936, les descendants de Nicolas Huez cédèrent le domaine au Docteur Mérat qui dut procéder à une complète restauration.","habitants":"Famille de Louis-Claude Huez \r\n        \r\n        \"","divers":"Vermoise GPS : 48° 21' 45,22\" Nord, 4° 02' 19,2\" Est","gps":"48° 21' 45,22\" Nord, 4° 02' 19,2\" Est","images":["../image/image_10/10_Vermoise_10_1.jpg","../image/image_10/10_Vermoise_10_2.jpg","../image/image_10/10_Vermoise_10_3.jpg","../image/image_10/10_Vermoise_10_4.jpg","../image/image_10/10_Vermoise_10_5.jpg"]},"Consult_chateau_formulairee6b3-2":{"id":"Consult_chateau_formulairee6b3-2","dept":"10","canton":"Vendeuvre-sur-Barse","commune":"Moussey","nom":"Villebertin","type":"Château","periode":"XVII-XVIII","histoire":"VILLEBERTIN, possession au XIIIe siècle de lillustre famille de Villehardouin, la terre de Villebertin appartint au XVIe siècle aux Luillier: Eustache en 1524, maître des Comptes à Paris, et son épouse Marie Coeur; puis leur fils Jean, président des Comptes, et leur petit-fils Nicolas, qui la vendit vers 1580 à Eustache de Mesgrigny, président du parlement séant à Châlons. Nicolas de Mesgrigny, baron de Villebertin, maréchal de camp, habitait le château de Villebertin vers 1668. Son fils Jacques-Louis, comte de Villebertin, lieutenant général des armées du Roi et gouverneur de Tournai, épousa en 1680 la fille aînée de Vauban. Il préféra Aunay en Bourgogne et laissa le domaine à son frère Jérôme, abbé de Moiremont. Son neveu Pierre-François, marquis de Mesgrigny, grand bailli d'épée de Troyes, dut faire reconstruire le château après son mariage avec Marie-Anne Le Febvre de Saint-Benoît en 1741. Bien que certaines sources lui attribuent la date de 1776, lédifice semble bien figurer sur un plan du domaine levé en 1748. Il échut à la fille du marquis de Mesgrigny, député de lAube sous Louis-Philippe, qui épousa le comte du Parc. Acheté par Pierre Jonquet, qui avait créé une société.","architecture":"VILLEBERTIN  abrite aujourd'hui les bureaux de la Compagnie Lesaffre International. Bâti au pied de la colline, sur une terrasse dominant le parc tracé dans la vallée de lHozain, le corps de logis doit son allure massive à sa grande profondeur et à l'importance de son ample comble à la Mansart. Parmi les dépendances, les écuries se signalent par la présence de têtes de chevaux sculptées, malheureusement dégradées au cours de l'Occupation.","habitants":"FamillePierre-François, marquis de Mesgrigny\r\n        \"","divers":"Villebertin  gps 48° 12' 54\" nord, 4° 05' 44\" est","gps":"","images":["../image/image_10/10_Villebertin_1.jpg"]},"Consult_chateau_formulairebde2":{"id":"Consult_chateau_formulairebde2","dept":"10","canton":"Les Riceys","commune":"Villemereuil","nom":"Villemereuil","type":"Château","periode":"XVII","histoire":"VILLEMEREUIL, possession au XIIIe siècle de la famille chevaleresque de ce nom, la terre de Villemereuil appartint au XIVe siècle aux Dinteville puis aux Foissy qui, au début du XVIe siècle obtinrent l'autorisation de doter leur château d'un pont-levis. Claude V Molé, acquéreur du domaine en 1656, appartenait à la branche ainée d'une importante famille de négociants Troyens dont la branche cadette s'illustra au parlement de Paris et au gouvernement; seigneur de Villy, maitre d'hôtel ordinaire du Roi, il épousa la fille de Jérome de Mesgrigny, seigneur de Villebertin.  Dans les années 1675-1695, Pierre-Francois Molé, capitaine au régiment de Navarre en fit sa résidence habituelle. Jean-Jérome Molé, Lieutenant des Maréchaux de France en Champagne, mourut sans postérité en 1727, laissant ainsi le château à sa femme Françoise Thomassin. Par héritages successifs, le domaine échut à Nicolas de Corberon, Président au conseil supérieur d'Alsace, à l'abbé de Corberon son frère et à Marie Béatrice Dupré d'Houville qui se fixa à Chasseneuil et le vendit en 1776. L'acquéreur, Nicolas Bonamy, ancien directeur général des fermes à Lyon, est l'ancètre d'Eugéne Bonamy de Villemereuil, qui présida le Conseil Général au milieu du XIXe siècle, et du propriétaire actuel, Gérard Bonamy de Villemereuil actuel maire qui y est résident avec sa famille.","architecture":"VILLEMEREUIL, c'est à lui  Jérome de Mesgrigny  qu'il faut attribuer la reconstruction du château dont l'inventaire, dressé après sa mort en 1660, donne d'intéressantes précisions. L'édifice est situé à l'écart, au milieu de bois et d'un grand parc. Du château de Foissy subsistent deux jolis pavillons en craie, baignés par l'eau des fossés, dont l'un est flanqué d'une tourelle. La demeure actuelle, en retrait, Jean-Jérome Molé l'a construite en brique en style Louis XIII.","habitants":"Jérome de Mesgrigny\r\n        \r\n        \"","divers":"Villemereuil GPS : 48° 12' 12,68\" Nord, 4° 05' 6,96\" Est","gps":"48° 12' 12,68\" Nord, 4° 05' 6,96\" Est","images":["../image/image_10/10_Villemereuil_1.jpg","../image/image_10/10_Villemereuil_2.jpg","../image/image_10/10_Villemereuil_3.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','10 — Aube'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
