 de Bar sur Aube. Le château fut reconstruit vers 1640 pour Louis Yardin, gentilhomme de la chambre du roi et gouverneur de la ville. Le château est cité lors de sa vente en 1697 comme un grand corps d'habitation, double en profondeur, Nicolas Yardin le vendit à Jacques de Lux de Ventelet, lieutenant colonel de cavalerie, et Antoinette de Balidart, descendante de Pierre de Froidvaux. Le château d'Ailleville resta dans cette famille jusqu'à la Révolution. Dans le parc on peut admirer un beau pigeonnier circulaire. Le château d'Ailleville aurait accueilli l'Empereur Napoléon Ier en route pour Brienne-le-Château. Il fut dominé par les familles nobles d'Ailleville, de Jaucourt, de Yardin, de Choiseul et de Lux de Ventelet.","architecture":"AILLEVILLE, sa construction date du XVIIe siècle. Le fief était mentionné, en 1172, avec un Pierre d'Ailleville. De forme carrée, le château  possède 2 étages. Il est flanqué de tours d'angle carrées. En 1698, il était décrit comme un grand corps de logis double avec ses 4 pavillons. Agrémenté d'un beau parc, le château d'Ailleville est entouré des reste de fossés. L'intérieur  a été décoré, par Constantin Menisser, au XIXe siècle, il  possède aussi un imposant colombier.","habitants":"Famille de   Jacques de Lux de Ventelet\r\n        \"","divers":"Alleville, GPS : 48° 15' 05\" Nord, 4° 40' 54\" Est","gps":"48° 15' 05\" Nord, 4° 40' 54\" Est","images":["../image/image_10/10_Ailleville_1.jpg"]},"Consult_chateau_formulaire06f3":{"id":"Consult_chateau_formulaire06f3","dept":"10","canton":"Arcis sur Aube","commune":"Arcis sur Aube","nom":"Arcis_sur_Aube","type":"Château","periode":"XVIII","histoire":"ARCIS sur AUBE; un aveu rendu en 1667 fait état des places et mottes sur lesquels étaient construits le chastel, donjon et maison-forte dudit Arcyes; en laquelle y voit de beaux et somptueux ediffices, portes, portaulx, cuisines, estables, tours, tourelles,  lesquels murailles et grands fossez ont esté ruinés, maison bruslée, pendant les guerres et troubles survenus en ce royaume et commencés en lan 1588. Pierre Grassin qui, en 1721, fit élever le château actuel sur cet emplacement, appartenait a une famille de robe originaire de Sens. Devenu sous la Régence directeur général des monnaies de France, il mourut sans postérité. Le domaine passa au fermier général Barthélemy Thoinard, puis a la marquise de Collandre et, sous Louis XVI, au marquis de Labriffe. Danton naquit en 1759 a Arcis, ou son père était procureur au bailliage, dans la maison située rue de Paris. Il y revint souvent pendant la Révolution et racheta des terres. Le 20 mars 1814, Napoléon établit son quartier général dans le château, mais dut se replier le lendemain devant Schwarzenberg et ses 90.000 autrichiens. Le comte Armand, diplomate et conseiller général de lAube, habita le château au siècle dernier. M. Albert Dupré, industriel à Romilly, lui succéda avant la dernière guerre. Évoqué par Balzac dans le comté dArcis, la ville en  fit l'acquisition en 1948.","architecture":"ARCIS sur AUBE,  cest une demeure de proportions modestes, élevée dun rez-de-chaussée en pierre appareillée et dun étage sous comble à la Mansart. Sur lancienne place darmes, les deux tours, plus ou moins découronnées, qui encadrent la grille, remontent à lancien château. La porte souvre dans un petit avant-corps marqué par un ressaut dans la toiture, restauré après la suppression de lattique et du fronton. Plus intéressante, la façade nord donne sur une terrasse, au-dessus du cours tumultueux de lAube, malheureusement dissimulé par la végétation. Élevé de deux niveaux sous un grand fronton triangulaire, lavant-corps souvre au rez-de-chaussée par trois grandes baies en plein cintre. On appréciera la qualité des masques sculptés sur les clés, et celle des ferronneries des deux perrons, analogues à celles de lescalier d'honneur. Cette façade est criblée d'impacts de boulets de canon, vestiges de l'époque napoléonienne. Le château d'Arcy-le-Ponsard abrite dans ses murs la mairie   est inscrit aux M.H. depuis 1983.","habitants":"Famille du  fermier général Barthélemy Thoinard\r\n        \"","divers":"Arcis  sur  Aube GPS : 48° 32' 16\" Nord, 4° 08' 37\" Est","gps":"48° 32' 16\" Nord, 4° 08' 37\" Est","images":["../image/image_10/10_Arcis_sur_Aube_1.jpg","../image/image_10/10_Arcis_sur_Aube_2.jpg","../image/image_10/10_Arcis_sur_Aube_3.jpg","../image/image_10/10_Arcis_sur_Aube_4.jpg"]},"Consult_chateau_formulaireab35-2":{"id":"Consult_chateau_formulaireab35-2","dept":"10","canton":"Bar-sur-Aube","commune":"Arrentières","nom":"Arrentières","type":"Château","periode":"XIII-XV_XVIII","histoire":"ARRENTIERES, le château est une construction d'origine médiévale, qui pourrait remonter au XIIIe siècle. Certains auteurs font des comtes de Champagne les premiers seigneurs d'Arrentières. En 1371, la comtesse Yolande de Bar est détenue au château sur ordre de Charles V.  L'enceinte occupe un espace de 80 mètres sur 45 mètres.","architecture":"ARRENTIERES, le démantèlement des défenses, dont le donjon, a eu lieu au XVIIe siècle sur ordre de Richelieu. La tour intégrée au logis et l'autre tour, transformée en pigeonnier, ont échappé à cette destruction de par, suppose-t-on, leur changement de fonction. Les deux tours circulaires et le corps de bâtiment dans leur gros-oeuvre, datent du XVe siècle. La terrasse du château surplombe la vallée. Laccès à la terrasse se fait par une très belle allée couverte. Il existait de larges douves qui furent comblées au début du XIXe siècle. Le château est entouré darbres, sauf au sud qui est occupé par une grande prairie. Lallée de tilleuls, longue de 250 mètres, est toujours en place.L'enceinte occupe un espace de 80 mètres sur 45 mètres.   Une mise en valeur du site est envisagée par le propriétaire pour la réalisation dun jardin castral, un aménagement jardiné dans le fossé Est, un labyrinthe dans le fossé Nord, la remise en état des allées de la prairie avec des plantations darbres et la remise en état des douves.  L'une des tours a été réhabilitée en pigeonnier et l'autre sert de base à une bâtisse carrée du XVIIIe. Il subsiste des fossés et tours du XIIIe siècle, deux tours et une salle souterraine du XVe siècle. Le logis et ses tours datent du Moyen-Age. Son fossé, ses courtines, ses salles souterraines qui bordent la courtine, la tour pigeonnier, les façades, les toitures du corps de logis et de la Tour Est sont inscrits au M.H. depuis 1994.","habitants":"Comtes de Champagne \r\n        \r\n        \"","divers":"Arrentières  GPS : 48° 15' 36\" Nord, 4° 44' 38\" Est","gps":"48° 15' 36\" Nord, 4° 44' 38\" Est","images":["../image/image_10/10_Arrenti%c3%a8res_1.jpg","../image/image_10/10_Arrenti%c3%a8res_2.jpg","../image/image_10/10_Arrenti%c3%a8res_3.jpg","../image/image_10/10_Arrenti%c3%a8res_4.jpg","../image/image_10/10_Arrenti%c3%a8res_5.jpg"]},"Consult_chateau_formulairedc85":{"id":"Consult_chateau_formulairedc85","dept":"10","canton":"Bar-sur-Aube","commune":"Bar sur aube","nom":"Bar_sur_Aube","type":"Château","periode":"XII-XVIII-XIX","histoire":"Quatre châteaux dans cet article; Jard-Tassin, la Ferté , Val de seine et Lignol.                                                                                                                 JARD-TASSIN   Le château du Jard est une demeure classique bâtie à la fin du XVIIIe siècle. Après la Révolution, qui sans dommage pour l'édifice, la ville de Bar-sur-Aube fut le théâtre dune bataille entre Napoléon et les armées coalisées ; ces dernières la pillèrent et établirent leur QG dans le château. Il a abrité de grandes figures historiques, en effet, le tsar Alexandre et le roi Frédéric Guillaume de Prusse y résidèrent en février mars 1814. En 1915, à la veille de la bataille de la Marne, le général Joffre y demeura du 1er au 5 septembre, qui, à cette époque appartenait à M. Maurice Tassin, avocat à Paris. Vers la fin de la deuxième Guerre Mondiale, le château fut le théâtre dune prise dotages. En Août 1944 des notables de la ville furent en effet détenus dans le château par les troupes SS. Ils ne virent leur libération que grâce à larrivée des troupes américaines qui libérèrent Bar sur Aube en 1944.                                                                                                    la FERTE gîtes de France .                                                                                                                                                         VAL de SEINE, ce château, \"brique et pierre\" construit au XIXe siècle, est une ancienne demeure bourgeoise ayant appartenu à la famille Trumet de Fontarce.","architecture":"LIGNOL, à cinq K.M. à l'Est   le château Lignol a été construit aux XIIe et XVIe siècles, très bien restauré au XIXe siècle, il présente une magnifique façade Renaissance cantonnée de deux tours rondes. Dans le parc se trouve un pigeonnier circulaire et un miroir deau qui magnifie le site.. \r\nA voir dans cette commune, l'église qui possède un retable en pierre peinte du XVIe siècle dans le croisillon sud et neuf panneaux retraçant la vie de Saint Bernard dans le croisillon nord. Dans le cimetière, la tombe du Comte de Rochechouard, colonel du Tsar Alexandre Ier.                                       VAL de SEINE  L'édifice abrite aujourdhui un centre médical, les intérieurs ne sont pas visitables. Le parc quant à lui, est ouvert au public, il entoure le château de verdure et procure dagréables promenades ; des jeux de plein air font la joie des enfants ; des tables et des bancs permettent le pique nique en famille. A voir également dans cette commune, au centre du bourg le château de Bar-sur-Seine datant du XIIIe siècle.","habitants":"Jard à la famille  M. Maurice Tassin                                              Val  de seine   Famille Trumet de Fontarce.                               Lignol Comte de Rochechouard\r\n        \r\n        \r\n        \"","divers":"Quatre châteaux; Jard-Tassin grav 1-2-, la Ferté grav 3-4 , Val de seine et Lignol grav 5-6-7.  Gps 48° 14' 00\" nord, 4° 42' 20\" est","gps":"","images":["../image/image_10/10_Bar_sur_Aube_1.jpg","../image/image_10/10_Bar_sur_Aube_2.jpg","../image/image_10/10_Bar_sur_Aube_3.jpg","../image/image_10/10_Bar_sur_Aube_4.jpg","../image/image_10/10_Bar_sur_Aube_5.jpg","../image/image_10/10_Bar_sur_Aube_6.jpg","../image/image_10/10_Bar_sur_Aube_7.jpg"]},"Consult_chateau_formulaire448c":{"id":"Consult_chateau_formulaire448c","dept":"10","canton":"Bar-sur-Seine","commune":"Bar-sur-Seine","nom":"Bar_sur_Seine","type":"vestiges","periode":"XIII-XVII-XIX","histoire":"BAR-SUR SEINE  les premiers documents concernant une forteresse datent du IXe siècle. Les vestiges du château sont un ensemble fortifié vestige d'un château fort médiéval détruit au XVIIe siècle. Au XIe siècle le duché de Bourgogne comprend Bar-sur-Seine comme premier comté sous Milon Ier, et le 17 août 1219 mort de Milon IV aux croisades, il passe aux mains des comtes de Champagne dont Henri III le Gros en 1273. Bar-sur-Seine passe le 14 août 1284 aux mains du Roi de France par le mariage de Jeanne de Navarre (née à Bar-sur-Seine) à Philippe IV le Bel. Le 21 mai 1420 le traité de Troyes cède Bar-sur-Seine aux ducs de Bourgogne. Les puissants ducs y firent des travaux dès lannée de leur entrée en possession, on rechaussait le mur du donjon, devant la poterne, depuis la tour carrée jusques aux murs de la ville. Le 5 janvier 1477, mort du duc de Bourgogne, Charles le Téméraire, Bar-sur-Seine revient donc à la couronne de France. A la fin du XVIe siècle, il fut à nouveau le théâtre de luttes entre ligueurs et protestants qui déchiraient alors cruellement la France. Au mois davril 1594, les ligueurs qui étaient redevenus maîtres de la ville, et aussi du château, firent une forte et épaisse muraille autour du gros rempart situé sur le devant du château. Les habitants profitent du désordre politique provoqué par les guerres de religion et détruisent le château. Le 3 octobre 1596, le roi permit aux habitants dachever la démolition.                                                                     VAL SUR SEINE, cette ancienne demeure Bourgeoise  abrite aujourdhui différentes associations, les intérieurs ne se visitent donc pas. Le parc quant à lui, est libre daccès, il entoure le château de verdure et procure dagréables promenades .","architecture":"BAR-SUR SEINE, les puissants ducs y firent des travaux dès lannée de leur entrée en possession, on rechaussait le mur du donjon, devant la poterne, depuis la tour carrée jusques aux murs de la ville. Le 5 janvier 1477, mort du duc de Bourgogne, Charles le Téméraire, Bar-sur-Seine revient donc à la couronne de France. A la fin du XVIe siècle, il fut à nouveau le théâtre de luttes entre ligueurs et protestants qui déchiraient alors cruellement la France. Au mois davril 1594, les ligueurs qui étaient redevenus maîtres de la ville, et aussi du château, firent une forte et épaisse muraille autour du gros rempart situé sur le devant du château. Les habitants profitent du désordre politique provoqué par les guerres de religion et détruisent le château. Le 3 octobre 1596, le roi permit aux habitants dachever la démolition moyennant 1500 écus. Le 9 mars 1597, Jacob de Benezin, capitaine du château, le rendit moyennant 500 écus aux habitants de la ville qui le démolirent. Aujourd'hui seules subsistent la tour du Lion et la salle des gardes voûtée jadis surmontée du donjon. Inscription par arrêté du 7 mai 1982.                                                                                                                     La Porte de Chatillon est à Bar-sur-Seine, la construction date du XVIIe siècle. Elle est la propriété de la commune. La Porte de Chatillon est inscrite aux M.H. depuis 1926.\r\nVILLENEUVE. Sa construction date de 1874. C'est un ensemble composé d'une maison de maître, d'un pigeonnier, d'une serre et d'une grange, construits vers le milieu du XIXe siècle, dans le goût italianisant et constituant le domaine du directeur de l'ancienne papeterie. Le château de Villeneuve est inscrit aux M.H. depuis 1994.","habitants":"Seigneurs locaux\r\n        \"","divers":"Bar sur Seine   grav-1-2 , GPS : 48° 06' 48\" Nord, 4° 22' 21\" Est                                                                                                   Val sur Seine grav 5-6                                                                  La Porte Chatillon  grav-3, GPS : 48° 06' 32,1\" Nord, 4° 22' 30,4\" Est                                                                                      Villeneuve grav-4,  GPS : 48° 05' 45,6\" Nord, 4° 22' 46,8\" Est","gps":"48° 06' 48\" Nord, 4° 22' 21\" Est","images":["../image/image_10/10_Bar_sur_Seine_1.jpg","../image/image_10/10_Bar_sur_Seine_2.jpg","../image/image_10/10_Bar_sur_Seine_3.jpg","../image/image_10/10_Bar_sur_Seine_4.jpg","../image/image_10/10_Bar_sur_Seine_5.jpg","../image/image_10/10_Bar_sur_Seine_6.jpg"]},"Consult_chateau_formulaireebae":{"id":"Consult_chateau_formulaireebae","dept":"10","canton":"Saint-Lyé","commune":"Barberey-Saint-Sulpice","nom":"Barberey_st_Sulpice","type":"Châteazu","periode":"XV-XVII","histoire":"BARBEREY, siège dune seigneurie ayant appartenu à la famille du Chastel au XIIIe siècle, puis à Guillaume du Plessis, bail de Troyes en 1360, la maison forte de Barberey  entra par alliance à la fin du XVe siècle dans la famille de Choiseul-Praslin. En 1596, Charles de Choiseul, lieutenant général de Champagne et futur maréchal de France, Charles  de Praslin se défait de Barbery deux ans après son mariage, la vendit en 1596 à Louis Le Mairat, seigneur de Droupt-Saint-Basle, négociant en bonneterie et maire de Troyes, fit aussitôt rétablir fossés et ponts-levis et réparer les dommages causés par les reîtres qui avaient dévasté la région en 1576. , le fils cadet de lacquéreur, fut un puissant personnage qui siégea au grand conseil  dÉtat et au conseil privé. Cest lui qui, en 1626, fit entreprendre la construction du château actuel, en la motte où d'ancienneté était la maison seigneuriale. Dans un aveu rendu à la fin de lannée précédente, il mentionnait en effet une motte, fermée de vieux fossés et  de haies, en dedans de laquelle était un corps de logis de pierre, couvert de tuiles, en ruine et qui ne fut jamais parfait (achevé), accompagné dun colombier, a été loeuvre du docteur Bernard Cuny qui en poursuit la mise en valeur avec autant d'attention que de goût.  Le vieux logis a survécu sur le côté de la cour, converti en dépendances mais toujours muni de ses tourelles de défense avec postes de tir dirigés vers les douves. À Jean II Le Mairat, conseiller au parlement de Paris en 1690, succéda sa soeur Anne Le Fèvre dEstrelles, puis son neveu François Feydeau, maître des requêtes de lhôtel du Roi. En 1720, Claude Le Roy, avocat au parlement de Paris, acheta le château quun hôte décrivait en 1766 comme bien bâti en briques dans un goût ancien, mais dune architecture noble et régulière, avec des appartements commodes et bien distribués.","architecture":"BARBEREY,  lors de la Révolution, André-François Janson de Saint-Parres, fils dElisabeth Le Roy, est présumé émigré. Déclaré Bien national, le domaine est démembré, mais le château, adjugé à un entrepreneur de charpente, échappe à la démolition. Claude-Louis Bruslé, qui le rachète en 1803, devient sous lEmpire baron de Valsuzenay et préfet de l Aube, fonction qu'il retrouve sous Louis XVIII. Une nouvelle vente, en 1888, entraîne le morcellement du domaine, bientôt reconstitué par larchitecte Louis Mony, maire de Troyes et président du conseil général, auquel succède en 1917 Ernest Belleuvre dont la fille est héritière  était au bord de la ruine en 1962, lorsque M. Pierre Scapula, architecte décorateur, le sauva de la destruction, monsieur Lebocey  à vendu Le château en 1964 à M. Bernard Cuny actuel propriétaire.   Sa complète restauration, menée sur 20 ans avec le concours des Monuments historiques, il sagit là dune demeure de dimensions humaines, exceptionnelle par lexcellence de ses proportions, l'originalité de sa conception et le degré délaboration de son décor qui la rattachent aux courants les plus modernes de lépoque Louis XII. Deux ailes en légère saillie, plus élevées dun étage et coiffées de très hauts combles, encadrent le corps principal. Aux extrémités de la façade sur les douves viennent en outre saccoler deux minces pavillons dangle aux fenêtres étroites, qui accentuent la verticalité de la composition.","habitants":"Famille de Jean Le Mairat\r\n        \"","divers":"Barberey  GPS : 48° 20' 14,97\" Nord, 4° 02' 15,45\" Est","gps":"48° 20' 14,97\" Nord, 4° 02' 15,45\" Est","images":["../image/image_10/10_Barberey_St_Sulpice_1.jpg","../image/image_10/10_Barberey_St_Sulpice_2.jpg","../image/image_10/10_Barberey_St_Sulpice_3.jpg"]},"Consult_chateau_formulaire2e79":{"id":"Consult_chateau_formulaire2e79","dept":"10","canton":"Bar-sur-Aube","commune":"Bligny","nom":"Bligny","type":"Château","periode":"XVIII-XIX","histoire":"BLIGNY, cette propriété, La châtellenie se composait de Bligny, Belroy, les Cabots, le Pré-Bannois et une partie de Bossancourt en 1553  qui domine le village, est bâtie sur les bases dun château féodal, par le marquis de Dampierre pair de France, qui avait fait lacquisition du domaine en 1773, afin de sadonner à la chasse aux loups. La porte principale, provenant de lancien château féodal démoli en 1770, est de style Louis XIII avec ses fines décorations sculpturales de raisins et de pampres. Il fut la propriété, au XVIIIe siècle, des Dinteville puis, par succession,. Le marquis de Dampierre, propriétaire de la verrerie de Bligny, habitait le château du lieu, au cur du village. En 1871 le marquis de Dampierre perd son fils, tué au front, puis le phylloxera sonne le glas du vignoble de Bligny. Sa reconstitution commence au début du XIXe siècle, quand il revint au baron de Cachard. Cest Louis XVIII qui la anobli et la gratifié de son titre. Le baron de Cachard donne au domaine son essor viticole, et il décide dy créer un important vignoble, ce qui lui a valu le surnom de \"Gentilhomme Vigneron\". En 1930, le vignoble sétend sur 44 ha. Après la guerre, la propriété est rachetée par un Tourangeau, M. Lefèvre qui souhaite compléter sa gamme de mousseux par un champagne. Le projet naboutit pas, la propriété est morcelée. En 1952, la famille Lorin rachète le vignoble en plusieurs lots et replante la vigne en 1954, lieu d'exception pour lorganisation de repas ou dîners dansants. La demeure, visitable, réunit autour de son fief un remarquable patrimoine historique et architectural. Ultérieurement, c'est l'homme politique Jean-Marie Le Pen qui fut propriétaire du château et des vignobles adjacents en tant qu'héritier d'Hubert Lambert.","architecture":"BLIGNY  est une construction issue d'un château fort médiéval et chef lieu de châtellenie de la commune éponyme, est toujours habité mais peut être visité.  de plan carré pour le corps de logis à trois niveaux sur soubassement , accolé d'une tour carrée et retour en équerre d'une aile à deux niveaux avec tourelle du XIXe siècle accolées, toits en poivrière. On y découvre un écomusée avec sa collection de machines et d'outils champenois utilisés au siècle dernier. Cet écomusée est installé dans des caves imposantes. Ses salons abritent plus de 1000 flûtes de champagne. Vous aurez l'occasion de découvrir, aussi, un film qui vous présentera le vignoble, avec ses techniques de production et comment est élaboré le champagne. Au terme de votre visite, une dégustation vous sera proposée pour vous faire apprécier la qualité de ce nectar, célèbre dans le monde entier.","habitants":"le  Baron de Cachard  et Jean-Marie Le Pen\r\n        \"","divers":"Bligny GPS : 48° 10' 21\" Nord, 4° 37' 02\" Est","gps":"48° 10' 21\" Nord, 4° 37' 02\" Est","images":["../image/image_10/10_Bligny_1.jpg","../image/image_10/10_Bligny_2.jpg","../image/image_10/10_Bligny_3.jpg","../image/image_10/10_Bligny_4.jpg"]},"Consult_chateau_formulairef8fb":{"id":"Consult_chateau_formulairef8fb","dept":"10","canton":"Vendeuvre-sur-Barse","commune":"Bossancourt","nom":"Bossancourt","type":"Château","periode":"XVII","histoire":"BOSSANCOURT, possession des Jaucourt au XIIIe siècle, la seigneurie de Bossancourt échut au début du XVIe à Pierre Le Genevois, baron de Blaigny, avocat du Roi à Chaumont, puis à son fils Gabriel, évêque de Noyon et pair de France, et enfin à Charlotte Le Genevois qui épousa Hercule de Chastellux, vicomte dAvallon. Elevé sur lemplacement dune demeure médiévale, le château est loeuvre de Philippe-Louis, comte de Beauvoir, puis marquis de Chastellux, petit-fils du chancelier dAguesseau, qui le fit construire entre 1758, date de lattribution du domaine à son profit, et 1767, date de sa vente à François Marcel de Bossancourt et Madeleine Jacobé de Vienne. Devenu vers 1920 propriété de la famille de Touchet, il vient dêtre acquis par M. et Mme Gérard Richalley.","architecture":"BOSSANCOURT, le corps de logis et les pavillons qui lencadrent, larges, profonds et couverts de combles à pente modérée, présentent de sobres façades en moellons enduits et chaînes de pierre appareillée, donnant sur le parc paysager tracé dans la vallée de l Aube. A proximité du château subsistent de nombreuses et intéressantes dépendances: pressoir du XVIIIe siècle, écuries, pigeonnier et lavoir. Moulin à farine présumé remonter au deuxième quart du XIXe siècle et dépendant anciennement du château de Bossancourt, a été converti en usine génératrice d'énergie et conserve ses installations, notamment une turbine hydraulique, le système de levage et l'armoire électrique. Éléments protégés MH : le portail d'entrée, les façades et les toitures du château, ainsi que la cheminée de la cuisine, le pressoir et le pigeonnier, les façades et les toitures du moulin, du lavoir et des écuries : inscription par arrêté du 19 février 1982.","habitants":"Famille de François Marcel de Bossancourt\r\n        \"","divers":"Bossancourt, GPS : 48° 16' 57\" Nord, 4° 36' 02\" Est","gps":"48° 16' 57\" Nord, 4° 36' 02\" Est","images":["../image/image_10/10_Bossancourt_1.jpg","../image/image_10/10_Bossancourt_2.jpg"]},"Consult_chateau_formulairee663":{"id":"Consult_chateau_formulairee663","dept":"10","canton":"Brienne-le-Château","commune":"Piney","nom":"Brantigny","type":"Château","periode":"XVIII","histoire":"BRANTIGNY  on en attribue la construction du château à François, marquis des Réaulx, conseiller au parlement de Paris en 1701, ou à son fils René-François (1751). Possession des Brienne, puis des La Vieuville et des Molé, le domaine avait été acquis en 1656 par René des Réaulx, maréchal de camp. Il demeura dans sa famille jusquen 1890, date de sa vente par la comtesse Edouard de Bardon de Ségonzac, née des Réaulx. Vendu puis loué, occupé par les Allemands durant la Seconde Guerre Mondiale et abandonné ensuite,  il trouve sa stabilité avec la Famille Prodhomme-Collignon en 1950 qui lui redonne vie. Le château vous propose des chambres d'hôtes. 3 belles et grandes chambres ont été récemment aménagées à létage de cette importante maison de famille. Nathalie et Gildas Collignon.","architecture":"BRANTIGNY,   à  quinze kilomètres à louest de Brienne, près de Piney, le château de Brantigny est une grande demeure classique en pierre, accompagnée d'importantes dépendances ajoutées au XVIIIe siècle et de bâtiments agricoles dominés par un pigeonnier en colombage. Datant du XVIIIe siècle, le bâtiment principal, avec sa longue façade et ses deux pavillons latéraux, vous séduira par son charme classique et imposant. Un fronton en pierre calcaire sculpté indique la possession du domaine par la famille noble des Réaultx à lépoque. Le château de Brantigny tel quil est, aujourdhui, fut construit par François Des Réaulx, vers 1740, sur lemplacement dune imposante maison fortifiée, il traversa les grands faits historiques sans trop de heurts : révolution, guerres Napoléoniennes, incendie. Cest dans la continuité et le respect de ce patrimoine historique que la 2ème génération uvre, aujourdhui, pour sauvegarder ce lieu enchanteur.","habitants":"Famille de René des Réaulx\r\n        \"","divers":"Brantigny, GPS : 48° 22' 29,3\" Nord, 4° 21' 36,0\" Est","gps":"48° 22' 29,3\" Nord, 4° 21' 36,0\" Est","images":["../image/image_10/10_Brantigny_1.jpg","../image/image_10/10_Brantigny_2.jpg"]},"Consult_chateau_formulairebea6":{"id":"Consult_chateau_formulairebea6","dept":"10","canton":"Brienne-le-Château","commune":"Brienne  le château","nom":"Brienne","type":"Château","periode":"XVIII","histoire":"BRIENNE, le dernier Brienne, tué en 1356 à Poitiers, séteignit lune des plus illustres familles de Champagne. Dans la première moitié du XVIIe siècle, Henri de Luxembourg, duc de Piney et prince de Tingry, hérita du comté  avec, précision d' un aveu de 1636, un donjon où il y a une grosse tour de pierre, une chapelle et une grande cour. En 1640, ses deux filles le vendirent à Henri-Auguste de Loménie, comte de Montbron, secrétaire des commandements du Roi, puis ministre détat en 1666, père de Louis-Henri de Loménie qui épousa Henriette Bouthillier de Chavigny. Le château devait être en fort mauvais état au XVIIIe siècle, labbé de Loménie, son hôte, choisit de faire carrière dans le clergé. Réputé athée, il nen devint pas moins archevêque de Toulouse, puis cardinal-archevêque de Sens. Son frère Louis épousa la petite-fille de Perrinet de Jars, lun des plus riches financiers de lépoque, et tous deux décidèrent en 1770 la reconstruction complète du château. Trois années furent nécessaires pour démolir les anciens bâtiments, araser la colline et créer les terrasses où séleva la nouvelle demeure, immense et somptueuse, bâtie sur les plans de Jean-Louis Fontaine, directeur des ouvrages du prince de Conti et oncle de celui qui allait devenir, avec Percier, larchitecte officiel de lEmpire. Inauguré le 25 août 1778, le château connut pendant une dizaine dannées une période brillante, ponctuée de chasses et de fêtes dignes de léclat et de la magnificence de la maison dun prince. En 1793 décès d'Etienne de Loménie de Brienne,en 1812 après la mort de la marquise le château passe  à sa belle fille remariée à M. de Montbreton en 1852 rachat du château par le prince de Baufremont qui le garderont jusqu'en 1933.                                      MUSEE NAPOLEON Au crépuscule de sa vie, au moment de la rédaction de son testament, il n'oublia pas Brienne et lui légua une coquette somme pour sa reconstruction. Le Musée Napoléon est situé dans l'ancienne école militaire de Brienne. Napoléon a commencé sa formation dans ces lieux.","architecture":"BRIENNE, le 29 janvier 1814, au pied de la colline saccagée par les Alliés, Napoléon réussit à empêcher les Prussiens de Blücher de rejoindre larmée autrichienne de Schwarzenberg. Il retrouvait Brienne où il avait passé cinq ans, de 1779 à 1784, dans lécole militaire créée à la fin du règne de Louis XV. En 1826, le duc dOrléans, futur Louis- Philippe, chercha une demeure pour sa sur.  En 1933, une nouvelle vente, cette fois à un marchand de biens, entraîne lentière dispersion du mobilier, des souvenirs historiques et du décor intérieur. Très éprouvé par lhébergement de prisonniers, à lissue de la guerre, puis par un abandon prolongé, le château ne doit son salut quà sa transformation en centre psychothérapie. Précédée dune grandiose cour dhonneur encadrée de pavillons isolés et immenses, communiquant avec le corps par des souterrains, cette majestueuse demeure sorganise à partir dun avant-corps chargé dun fronton et dun important toit à limpériale. Aux extrémités, délégantes travées incurvées relient les courtes ailes au corps principal. Lélévation présente une disposition originale, analogue à celle du palais des Rohan, à Saverne, au-dessus des hautes fenêtres du rez-de-chaussée, sous le cordon qui sépare de létage principal, viennent sinsérer les petites baies rectangulaires dun entresol. Dans lavant-corps central, sur la cour, ces percements font place à des tableaux sculptés en bas-reliefs, représentant des jeux denfants daprès Clodion. Les pièces de réception ont perdu leur somptueuse décoration Louis XVI, faite de stucs peints à limitation du marbre. Le cardinal et son frère ny avaient pas réuni de collections de tableaux, mais y avaient créé un cabinet d'histoire naturelle, une bibliothèque riche et nombreuse et un cabinet de physique                                 .MUSEE NAPOLEON . Découvrez l'ancienne École militaire où le jeune Bonaparte a suivi sa formation durant cinq années, de 1779 à 1784 et où il s'est forgé le caractère de l'Empereur qu'il deviendra. Resté très attaché aux lieux de son enfance, il revient à Brienne deux fois, en 1805, au faste de l'Empire, et en 1814, pour la Campagne de France","habitants":"Famille de Henri-Auguste de Loménie\r\n        \"","divers":"Brienne grav 1 à 4                                                                       GPS : 48° 23' 30\" Nord, 4° 31' 14\" Est                                                                  Musée Napoléon_grav 5","gps":"48° 23' 30\" Nord, 4° 31' 14\" Est","images":["../image/image_10/10_Brienne_1.jpg","../image/image_10/10_Brienne_2.jpg","../image/image_10/10_Brienne_3.jpg","../image/image_10/10_Brienne_4.jpg","../image/image_10/10_Brienne_5.jpg"]},"Consult_chateau_formulaireda8a":{"id":"Consult_chateau_formulaireda8a","dept":"10","canton":"Aix-en-Othe","commune":"Bucey en  Orthe","nom":"Bucey_Roises","type":"Château","periode":"XVIII","histoire":"BUCEY EN ORTHE, comme seigneurs de Bucey on trouve Garnier, Manassès de Bucey en 1173, Lige de Villemaur en 1180, Milet en 1217, en 1230 Gui de Bucey, Lige du comte de Champagne, Ithier de Bucey, Alise ou Adélaïde de Villemaur en 1242, Jean de Bucey en 1243, Jean-Abraham et Pierre-Abraham en 1378 et 1382, Marguerite dAnglure, Dale de Chennegy en 1396. La famille des Fontenay, seigneurs de Saint-Liébaut au XVe siècle : Jean de Die, Louise de Madeil, mariée à Odard de Rossey puis à Adérale de la Rouere, dont on voit lépitaphe avec celle de son épouse dans léglise de Bucey. La terre passe ensuite dans la famille de le Courtois anoblie par Charles VI. En 1396, cette famille, originaire de Bourgogne, sétablit à Troyes, où elle a occupé les premières charges. Mademoiselle Le Courtois, fille de Pierre, conseiller au parlement, a porté la terre de Bucey dans la maison de Mesgrigny, par son mariage avec M. le comte de Villebertain, qui la remise à son gendre le Marquis des Réault. Dernier seigneur de Bucey, il la céda en 1829, à M. Fleurigny du Yheil qui la revend à M. Costel, notaire à Estissac. Son fils, Président du Tribunal Civil de Troyes, la transmet à son cousin Charles Douyne, de Bucey qui en hérita et exploita le domaine.","architecture":"BUCEY  l'édifice se présente comme un quadrilatère entouré de fossés partiellement en eau. Un premier château existait à l'est de l'église. Un pavillon central, en saillie, servait d'entrée. Deux tours carrées cantonnent les extrémités, la façade sur cour a été profondément altérée par les travaux des XVIIIe et XIXe siècles.  Ce type de château est très courant en Champagne, entre la fin du XVIe et le début du XVIIe siècle.  Éléments protégés MH : les façades et les toitures des bâtiments (logis et bâtiments de communs entourant la cour), et le fossé avec son arrivée d'eau : inscription par arrêté du 12 janvier 2005.  Un pavillon central, en saillie, servait d'entrée. Les portes piétonnes et charretières ont été bouchées pour permettre l'extension du logis.  Des travaux aux XVIIIe et XIXe siècles abimèrent sa façade sur cour, qui est entourée de plusieurs bâtiments, dont un pigeonnier. Les façades, le logis, les toitures des bâtiments ainsi que le fossé avec son arrivée d'eau, sont inscrits aux M.H. depuis le 12/01/2005.                                                                                                                                                     ROISES, la construction du château des Roises date du XVIe siècle. construit à la fin du XVIe siècle par Louis de Madeil, il fut rapidement privé de sa fonction résidentielle. Comme à Droupt-Saint-Basle, la cour intérieure ne manque pas détonner par ses dimensions. Délimitée par des segments de murailles et par de grands bâtiment agricoles, elle permettait de mettre le  bétail et les récoltes à labri des bandes armées. Longtemps délaissé, le château des Roises fait depuis plusieurs années lobjet dune restauration attentive.","habitants":"Famille de Bucey\r\n        \"","divers":"Bucey  grav 1-2                                                                                              GPS : 48° 15' 48\" Nord, 3° 51' 40\" Est                                                                  Roises grav 3                                                                                     GPS : 48° 15' 36\" Nord, 3° 51' 54\" Est","gps":"48° 15' 48\" Nord, 3° 51' 40\" Est","images":["../image/image_10/10_Bucey_Roises_1.jpg","../image/image_10/10_Bucey_Roises_2.jpg","../image/image_10/10_Bucey_Roises_3.jpg"]},"Consult_chateau_formulaireee63":{"id":"Consult_chateau_formulaireee63","dept":"10","canton":"Bar-sur-Seine","commune":"Chacenay","nom":"Chacenay","type":"Forteresse","periode":"XI-XV-XIX","histoire":"CHACENAY,  remonte au Xe siècle et est situé au coeur de la Champagne, il offre une perspicacité fascinante de la France médiévale. Une de ses propriétaires du moyen-âge, Alix de Chacenay prit larmure de son père pour aller se battre aux Croisades. En 1474, le Donjon, dont la propriétaire, Jeanne de Choiseul, suit le parti de Charles le Téméraire, est assiégé, pris dassaut et en partie ruiné par Léger de Dinteville, au nom de Louis XI. On le relève de ses ruines, mais les tours Sainte Parisse restent à labandon, car dès cette époque les seigneurs cessent dy habiter. Le rétablissement du château est dailleurs assez lent: en 1503, on le dit encore en ruine. Galas de Salazar fait faire quelques réparations qui sont sans doute peu importantes, car, en 1545, on continue à dire quil est en ruine. Les Dinteville, qui ont acquis la baronnie en 1551 y font de sérieuses réparations.\r\nEn 1725, le propriétaire est M. de Poncher. Certaines circonstances scandaleuses de la conduite de son épouse amènent de vives querelles entre eux. Le mari lui abandonna ladministration de Chacenay. Mme de Poncher fit réunir les habitants du pays, et leur signifia quils avaient à lui payer ses droits seigneuriaux et que, sils ne se conformaient pas à sa demande, elle recourrait aux moyens rigoureux. Ne voulant pas accorder de délai aux habitants, les terres furent confisquées à son profit. La châtelaine fit réparer et embellir son château, relever la nef de la chapelle et construire un auditoire. A son décès, son neveu M. de Plancy hérita de Chacenay. Cétait un homme bon, généreux et charitable. Pendant la Révolution, M. de Plancy fut déclaré suspect, arrêté et jeté dans les cachots de Troyes, mais heureusement, il échappa au couteau révolutionnaire en sévadant de sa prison.","architecture":"CHACENAY, M. de Plancy  mourut dans son château de Chacenay en 1806. Son héritier direct, M. Armand-François Bertherand, décéda en 1851, regretté par tous les habitants de Chacenay, dont il avait été le soutien et le bienfaiteur. La restauration entreprise par ses héritiers MM. Edmond et Arthur Bertherand dura six ans, de 1852 à 1858. Le Donjon proprement dit ne fut pas rétabli, mais on a réparé lancienne porte du midi avec son pont-levis. Le corps de logis fut remis complètement à neuf.\r\nLe château doit sa magnifique restauration aux illustres architectes du XIXe siècle, Jean-Baptiste Lassus et Eugène Viollet-le-Duc, les maîtres duvre de Notre Dame de Paris. Dès larrivée, lambiance est au Moyen-Age avec un beau pont-levis flanqué de deux tours anciennes.  En 1988, Panos et Lina Pervanas, tombés sous le charme du château, sont devenus maîtres des lieux pour restituer à cette belle demeure ses lettres de noblesses.     Éléments protégés MH : la porte fortifiée : inscription par arrêté du 20 septembre 1926. Les courtines subsistantes, les sols circonscrits par les fossés délimitant l'emplacement de l'ancien château : inscription par arrêté du 7 décembre 198. Le château, la chapelle, le puits, le pont d'accès avec ses deux tours, les fossés : classement par arrêté du 6 décembre 1990.","habitants":"Famille d'Alix de Chacenay\r\n        \"","divers":"Chacenay, GPS : 48° 06' 48\" Nord, 4° 31' 47\" Est","gps":"48° 06' 48\" Nord, 4° 31' 47\" Est","images":["../image/image_10/10_Chacenay_1.jpg","../image/image_10/10_Chacenay_2.jpg","../image/image_10/10_Chacenay_3.jpg"]},"Consult_chateau_formulairee39d":{"id":"Consult_chateau_formulairee39d","dept":"10","canton":"Bar-sur-Aube","commune":"Chaise","nom":"Chaise_10","type":"Château","periode":"XVII-XVIII","histoire":"CHAISE, le château de la Chaise fut édifié, pour la Famille de Compiègne, vers 1860. Le bâtiment est constitué de pans de bois recouverts imitant un pan de bois décoratif. Des lambrequins soulignent les pignons des toitures et la partie centrale est pourvue dune galerie en bois, pittoresque. Ce type de construction sapparente aux « chalets » dont la mode en France commença vers 1840 et devint très répandue, sous Napoléon III.","architecture":"CHAISE, Le bâtiment est constitué de pans de bois recouverts dun décor de plâtre polychrome imitant un pan de bois décoratif. Des lambrequins soulignent les pignons des toitures et la partie centrale est pourvue dune galerie en bois, pittoresque, la construction du château de la Chaise fut achevée, en 1864. Les communs ont été construits vers 1885. L'ensemble possédait un décor polychrome, de style du XIXe siècle, par son architecture pittoresque, issue de la découverte de l'architecture traditionnelle française et étrangère. A l'intérieur de la partie centrale, se trouve une grande salle lambrissée, un escalier en bois à balustres, une salle du 1er étage avec sa cheminée en marbre. A l'extérieur, se trouve une façade Sud, flanquée d'une double galerie. Le château de la Chaise est inscrit aux M.H. depuis le 14/03/2000.","habitants":"Chaise, Famille de Compiègne,\r\n        \"","divers":"Chaise GPS : 48° 21' 46\" Nord, 4° 39' 40\" Est","gps":"48° 21' 46\" Nord, 4° 39' 40\" Est","images":["../image/image_10/10_Chaise_10_1.jpg","../image/image_10/10_Chaise_10_2.jpg"]},"Consult_chateau_formulaireeeac":{"id":"Consult_chateau_formulaireeeac","dept":"10","canton":"Bar-sur-Aube","commune":"Champignol- lez-Mondeville","nom":"Champignol_Mondeville","type":"Touir","periode":"XIII","histoire":"LE CHAMPIGNOL-LEZ-MONDEVILLE, cette ancienne maison seigneuriale fut construite au XIIIe siècle. La tour est, aujourd'hui, le seul vestige d'une ancienne demeure seigneuriale datant du XIIIe siècle. Elle se composait également d'un logis ainsi que d'une grange.","architecture":"LE CHAMPIGNOL-LEZ-MONDEVILLE, la tour est bâtie sur un plan carré et sa construction en pierre de taille et en moellons équarris, ainsi que le décor de sa porte d'entrée et ses ouvertures exiguës, s'accordent avec les créations architecturales des premières décennies du XIIIe siècle. Cette tour comporte deux étages indépendants et l'on présume qu'un escalier extérieur en bois permettait l'accès à la porte de l'étage. A l'étage, des latrines subsistent encore. Cet édifice ne devait vraisemblablement pas servir d'habitation mais plutôt comme lieu de justice. Les archives attestent que la tour fut utilisée pour servir de geôle seigneuriale sous l'ancien régime. Son aspect peu amène renforçait la puissance de l'abbaye de Clairvaux à cette période. Enfin, elle se distingue comme seule construction médiévale à ce jour préservée des anciennes demeures seigneuriales de l'abbaye. Il ne subsiste, en 2014, que sa Tour inscrite aux M.H. depuis 2010.","habitants":"Seigneurs locaux\r\n        \"","divers":"Champignol,   GPS : 48° 08' 25\" Nord, 4° 40' 32\" Est","gps":"48° 08' 25\" Nord, 4° 40' 32\" Est","images":["../image/image_10/10_Champignol_Mondeville_1.jpg","../image/image_10/10_Champignol_Mondeville_2.jpg"]},"Consult_chateau_formulaireb580":{"id":"Consult_chateau_formulaireb580","dept":"10","canton":"Les Riceys","commune":"Chaource","nom":"Chaource","type":"Château","periode":"XVII- XIX","histoire":"CHAOURCE, il était appelé La maison rouge, vendue aux Cordeliers, dit la CORDELIERE,  en 1591, Guillaume Hennequin de Vaubercey et sa deuxième épouse Catherine Mauroy, devinrent les tous premiers propriétaires de ce domaine qui revint ensuite à leur fille, Catherine Hennequin et à son époux, Sébastien de la Ruelle, gentilhomme de la grande Fauconnerie du Roi. Nicolas Parent, né à Chaource le 24 juin 1744, avocat du roi à Troyes le reçut en héritage. En 1780, il fit construire un château qu'il baptisa la Cordelière, celui que l'on nomme actuellement la petite Cordelière, Il mourut guillotiné sous la Terreur, le 4 février 1794. Sa soeur, Françoise, mourut ainsi que sa fille, en août 1802. En 1833, le fils de cette dernière, Frédéric Louis Micheau, devint le nouveau propriétaire de la Cordelière. Il fut conseiller général, chevalier de Malte et nommé Comte Micheau de Chassy par le Grand Duc de Toscane. En 1852, le domaine revint à sa fille Aurélie-Louise qui épousa le Comte Gabriel Chandon de Briailles, propriétaire des vins de Champagne Moët et Chandon. Ils eurent deux fils : René né en 1853 et Frédéric en 1858 au XVIIe siècle et appartenait aux Moines Fanciscains, appelées les Cordeliers. Sa construction date de 1896 à 1900, pour le vicompte Chandon de Briailles. Le chateau de Chaource est de style Gothique et Louis XII., en 1931, où fut enterrée la famille Chandon de Briailles. Le projet et les dessins du château sont dus à M. R. Sauger, architecte en chef de la ville de Paris, et la construction à M. Emile Riché, entrepreneur à Troyes. Depuis, le Golf de Troyes-La Cordelière déroule son beau parcours sur 50 hectares de verdure, de bois et de vallons, en lisière de la forêt dAumont et tout près de Chaource et de sa célèbre mise au tombeau. Le golfeur découvre avec plaisir un parcours varié de 18 trous, parmi les plus beaux de lEst de la France homologué pour 6124 mètres. Il apprécie la sévérité de ses obstacles naturels, la beauté de ses arbres centenaires et la douceur de ses pièces deau.","architecture":"CORDELIERE, le château est actuellement la propriété d'une société qui a transformé le parc en un terrain de golf: reconnu comme l'un des plus beaux de France. Le château, de style gothique et Louis XII, est composé d'un rez-de-chaussée et un premier étage éclairés de vastes fenêtres. On accède au rez-de-chaussée par un majestueux perron. Trois pavillons forment saillie sur chacune des deux façades. Au rez-de-chaussée un cabinet de travail avec cheminée au bois sculpté, une salle de billard Empire, un petit salon et un autre salon mais plus vaste et de style Louis XVI. Une première salle à manger et modeste de proportions, que rehaussent de somptueuses tapisseries, et, accédant dans le grand salon, la salle à manger pour réception. Cette pièce est la plus élégante du château, dominée par un plafond à chevrons apparents, ornés de dorures sur fond bleu et de boiseries sculptées sur ses murs. Une cheminée monumentale en marbre blanc, à bas-reliefs et à mascarons sculptés est copie exacte de celle qui se trouve dans la salle des Doges aux Pricuriaties de Venise. Au premier étage se trouvent les chambres. Au pied du château, une chapelle a été élevée en 1931 où est enterrée la famille Chandon de Briailles.                                                                                                   BANDE,  le manoir de la Bande, est le témoignage de ces manoirs de l'Ancien Régime, dont l'allure est celle d'une importante exploitation agricole. Au XIXe siècle, il appartenait à la Famille Damoiseau de la Bande, dont un membre, Ludovic. C'était une ancienne maison seigneuriale déjà signalée en 1196. A cette date, Gauthier de Maligny en fit don à l'abbaye de Quincy (Yonne). La seigneurie fut vendue à la famille de Vitel au début du XVIe siècle puis passa par héritage dans le Patrimoine des de Damoiseau. À la fin du XIXe siècle, Ludovic de Damoiseau, Maire de Chaource, de 1884 à 1896, vendit la propriété au vicomte Chandon de Briailles. On ignore à quelle date fut construit le Manoir de la Bande. La chapelle Saint-Laurent, attenante, fut bénie solennellement le 8/08/1757. En face du Manoir de la Bande, à droite de la route qui mène à Saint-Florentin, se situait la Ferme de la Petite Bande, démolie, à la fin du XIXe siècle.","habitants":"Chaource  Famille Chandon de Briailles                                   Bande Famille Damoiseau \r\n        \"","divers":"Chaource, GPS : 48° 03' 34\" Nord, 4° 08' 20\" Est                                                            Bande grav-4   GPS : 48° 03' 34\" Nord, 4° 08' 20\" Est                                                         Cordelière    grav -1-2-3                                                                    GPS : 48° 04' 11\" Nord, 4° 09' 50\" Est","gps":"48° 03' 34\" Nord, 4° 08' 20\" Est","images":["../image/image_10/10_Chaource_1.jpg","../image/image_10/10_Chaource_2.jpg","../image/image_10/10_Chaource_3.jpg","../image/image_10/10_Chaource_4.jpg"]},"Consult_chateau_formulaire2ea2":{"id":"Consult_chateau_formulaire2ea2","dept":"10","canton":"Arcis-sur-Aube","commune":"Charmont sous Barbuise","nom":"Charmont_Barbuise","type":"Château","periode":"XIV-XV-XVIII","histoire":"CHARMONT SOUS BARBUISE, dès 1233, la forte maison de Colaverdey (du nom de la famille qui la possédait)  fut ruinée en 1423 par les Anglais du régent de Bedford, et vendue vers 1445 par Jean de Poitiers, chambellan du duc de Bourgogne, à Jean Mauroy, bailli d'Arcis, futur lieutenant général au bailliage de Troyes. En 1534, Michelet Mauroy, monnayeur de Troyes, hérite d'une motte où se trouvait le château, fermé de fossés,  en ruine. Il fit rebâtir le logis seigneurial et obtient en 1555 l'autorisation d'y établir un pont-levis. En 1646 François Mauroy légua Colaverdey aux Hennequin. En 1669, par des lettres patentes du roi Louis XIV datées de Versailles à Louis François Hennequin, seigneur de Charmont et de  Collaverdey, le nom de Collaverdey est remplacé par celui de Charmont. Le dernier château fut construit par Joseph-Aimé Hennequin en 1725. Il fut vendu en 1898 à Madame Riencourt de Longpré. C'est en 1733, que Joseph Antoine Hennequin, Baron de Charmont, Ambassadeur à Venise, fit reconstruire le château de Charmont, tel qu'il est, aujourd'hui. Sa fille, la marquise de La Palun revendit le château de Charmont à Nicolas de Maizières, ancien caissier général de l'hôtel des Fermes, qui fit poser la grille, en 1767. A Pierre de la Huproye, acquéreur en 1782, succéda Antoine de la Huproye, futur député de l'Aube, qui revint en 1800 à Charmont. En 1898, Mr de Rouvray céda le domaine à Mme Riencourt de Longpré. Les propriétaires actuels sont Mr et Mme Robin.","architecture":"CHARMONT SOUS BARBUISE, mentionnée dès 1233, la forte maison de Colaverdey. Il fait reconstruire le logis seigneurial et obtient l'autorisation en 1555. On y accède par une belle grille en fer forgé et une allée couverte. Le château, en belle pierre, couvert de tuiles plates, est de style classique, de plan rectangulaire à trois niveaux avec série de lucarnes sur combles. Coté parterre, il surplombe un bras de la Barbuise avec un superbe parc entouré de fossés.. En 2003, le château fut repris à l'abandon par les actuels propriétaires.  Éléments protégés MH : les façades et les toitures du bâtiment des anciennes écuries : inscription par arrêté du 3 novembre 1988.","habitants":"Famille de François Mauroy \r\n        \"","divers":"Charmont    GPS : 48° 24' 45\" Nord, 4° 10' 09\" Est","gps":"48° 24' 45\" Nord, 4° 10' 09\" Est","images":["../image/image_10/10_Charmont_Barbuise_1.jpg"]},"Consult_chateau_formulaire621c":{"id":"Consult_chateau_formulaire621c","dept":"10","canton":"Brienne-le-Château","commune":"Rosnay l","nom":"Comtes_Rosnay","type":"Château","periode":"X-XVIII","histoire":"COMTES de ROSNAY,  le premier comte de Rosnay connu était Adson, cité en 968, dans une donation faite à l'abbaye de Montier-en-Der. Puis Isembard et Isembard II vers 1035 où l'Evêque de Troyes, Ménard donne aux chanoines du château l'église Notre-Dame à Rosnay. La seigneurie passa en 1139 au comte de Troyes et devint l'apanage de Henri qui la rattachait au comté en devenant comte de Champagne en 1314. Elle passera ensuite à la couronne de France et fit partie du comté de Vertus avec Moymer et la Ferté-sur-Aube en 1361 pour Isabelle de France puis, par elle dans la famille Visconti. Valentine Visconti (1368-1408) comtesse de Vertus se marie avec Louis d'Orléans, le comté passait alors à la famille d'Orléans.  Elle était le siège d'une prévôté qui disparu en 1636 pour être réunie au bailliage qui fut créé en 1361. Pour la première fois ce château était ouvert au public.","architecture":"ROSNAY, sa construction date de 1610. C'était une ancienne forteresse autrefois, devenu un château fort. Au Xe siècle, le château se trouvait à l'emplacement de l'église, qui en constituait la basse cour. La construction du château date de 1610. Rosnay était le siège d'une chastellenie qui regroupait une centaine de fiefs, elle fut modifié avec la réunion au comté de Vertus et se trouvait en grande partie dans la Marne actuelle. Le comté de Rosnay  fut détaché de celui de Vertus, en 1602, lorsqu'il fut vendu, pour solder une créance de Odet d'Avaugour à François de Luxembourg (Duc de Piney). En 1700, la Famille Piney-Luxembourg vendait à Gédéon Berbier du Metz-le-Comté, Famille qui s'éteignait en 1839.  C'est un bâtiment qui date de 1905, qui est la propriété d'un antiquaire, le mobilier a été mis en vente en 2013. Le château possédait des colonnes massives, de lourds chapiteaux et des ogives larges de style roman. Il était entouré de douves en eau. Le château des comtes de Rosnay est resté fortifié jusqu'au XVIe siècle. Les derniers restes de ses murailles ont disparu à la Révolution.. Il n'est pas inscrit aux M.H. Parfaitement entretenu,   Le château : il dut exister dès les premiers comtes et se trouvait sur la motte qui avait 23 m à sa base et 10 m à son sommet. Il fut occupé par les Anglais en 1358 et par les Français en 1361. Le comté de Vertus l'a signalé comme « bonne tour ». Il est dans les mains de Henry VI en 1424 et sur l'aveu de 1636 est cité  forteresse fermée de terrasse et de profonds fossés ; de la rivière de Voire avec pont levis. Dans l'enclos est la motte seigneuriale.","habitants":"Famille Visconti, et  la Famille  d'Orléans\r\n        \"","divers":"Comtes de Rosnay GPS : 48° 27' 37\" Nord, 4° 30' 16\" Est                                        Roches GPS : 48° 27' 33,84\" Nord, 4° 30' 12,96\" Est","gps":"48° 27' 37\" Nord, 4° 30' 16\" Est","images":["../image/image_10/10_Comtes_Rosnay_1.jpg","../image/image_10/10_Comtes_Rosnay_2.jpg"]},"Consult_chateau_formulaireec9e":{"id":"Consult_chateau_formulaireec9e","dept":"10","canton":"Saint-André-les-Vergers","commune":"St_Germain","nom":"Courcelles_St_Germain","type":"Château","periode":"XV-XVI-XVIII","histoire":"COURCELLES , en 1563, François Mauroy, prévôt de Troyes, acquit la terre de Courcelles des moines de Moutier-la-Celle qui la possédaient depuis le Moyen-Age. Après sa mort en 1572, sa veuve Anne Bazin épousa Nicolas de Hault, maire de Troyes, qui fit reconstruire le corps de logis mais, dès 1601, céda le domaine à Nicolas Largentier, baron de Chapelaine. Les caves voûtées, la maçonnerie des gros murs et la cheminée de la cuisine remontent à cette campagne de travaux. Etienne Le Marguenat, acquéreur de Courcelles en 1610, fit une brillante carrière dans les finances royales. Trésorier de France, puis général des Finances de Champagne, il devint en 1637 maître des Comptes à Paris. Sa fille Anne épousa le marquis de Lambert de Saint-Bris, gouverneur de Luxembourg. Devenue veuve en 1686, elle se fixa à Paris, dans lhôtel de Nevers où, jusquà sa mort en 1733, elle anima lun des plus célèbres salons littéraires de lépoque, qui réunit entre autres Fontenelle, labbé de Choisy, Crébillon, Montesquieu, le jeune Marivaux et la duchesse du Maine. Vendu dès 1709 à Jacques Corps, marchand troyen, le domaine de Courcelles devint en 1785 la propriété des demoiselles Guélon. Cest alors que vint sajouter face au logis un pavillon servant de logement aux fermiers, près de la chapelle aujourdhui disparue. Propriété des Comtes de Launay.","architecture":"COURCELLES, plusieurs fois vendu au cours du XIXe siècle, le domaine de Courcelles, réduit à une vingtaine d'hectares, devint en 1942 la propriété de M. Georges Babeau, descendant de Henri-Antoine Matagrin qui lavait racheté en 1805 aux demoiselles Guélon. Restauré vers 1830, le corps dhabitation conserve le caractère et le charme des demeures de la fin de lAncien Régime. Aux extrémités de son grand comble pointent deux pavillons carrés, entièrement couverts dardoise. Il fait face au logement de service élevé à la fin du XVIIIe siècle, remarquablement conservé comme en témoigne la qualité de ses menuiseries dorigine.","habitants":"Famille de  Mauroy et de  jacques Corps \r\n        \"","divers":"château ce Courcelles à st-Germain","gps":"","images":["../image/image_10/10_Courcelles_St_Germain_1.jpg"]},"Consult_chateau_formulaire694a":{"id":"Consult_chateau_formulaire694a","dept":"10","canton":"Les Riceys","commune":"les loges Margueron","nom":"Crogny","type":"Château","periode":"XVII","histoire":"CROGNY   En 1960, le Château de Crogny et son parc d'une superficie de 20 ha, furent rachetés par lÉtat et après transformations, ont été convertis en une école de sylviculture, ouvrant en septembre 1963. Cette école était destinée à former 50 gardes forestiers devenus agents techniques de lAdministration des Eaux et Forêts par an en 2 ans, vêtus de luniforme vert, dès leur formation. Il sagissait de délocaliser la formation des gardes forestiers initialement installée dans le Loiret. Le premier directeur de cette école de sylviculture fut Mr Degos.","architecture":"CROGNY;  cette école disposait déjà dune forêt attenante de 135 ha. Elle appartenait à la région et était gérée par lONF (Organisation Nationale des Forêt) pour lexercice des travaux pratiques. Ce Lycée forestier créé en 1960, a été perçu comme un apport intéressant par la commune, mais il sest vite avéré que les 2 structures vivaient, côte à côte, sans guère se fréquenter. Aujourd'hui, de nombreuses formations y ont été créées. Le Château de Crogny accueille dans ses murs le Lycée Forestier, depuis 1960.","habitants":"Mr Degos.\r\n        \"","divers":"Crogny GPS : 48° 05' 15\" Nord, 4° 06' 37\" Est","gps":"48° 05' 15\" Nord, 4° 06' 37\" Est","images":["../image/image_10/10_Crogny_1.jpg","../image/image_10/10_Crogny_2.jpg"]},"Consult_chateau_formulaire6396-2":{"id":"Consult_chateau_formulaire6396-2","dept":"10","canton":"Arcis-sur-Aube","commune":"Dampierre","nom":"Dampierre_Aube","type":"Château","periode":"XVII","histoire":"DAMPIERRE, la terre  a donné son nom à lune des plus illustres familles de Champagne. Thibaut de Moëlain, seigneur de Dampierre à la fin du XI siècle, était le gendre de Milon le Grand, le redoutable seigneur de Montihéry. En 1223, Guillaume de Dampierre, connétable de Champagne, épousa Marguerite de Flandre. Son fils aîné, Guy, hérita du comté de Flandre, tandis que Jean, seigneur de Dampierre et de Saint-Dizier, lui succéda dans ses charges en Champagne. En 1305, le mariage de Marguerite de Dampierre fit entrer la châtellenie dans la maison de Châtillon. Le donjon de Dampierre, certainement le plus puissant de la région, occupait une grande motte artificielle isolée par des douves. Ses murs étaient faits de craie, à l'exception de la base, épaisse de quatre mètres, dit-on, et parementée en grès. En 1420, après la mort de lamiral de Châtillon, tué à Azincourt, le sieur de Cottebrune, maréchal de Bourgogne, obtint 200 livres des habitants de Troyes pour déloger du château les partisans du futur Charles VII et rendre la place au seigneur de Chauvigny. En 1469, Marguerite de Châtillon, héritière de la baronnie de Dampierre, épousa Philippe de Lannoy, aïeul de Pierre de Lannoy dont léglise paroissiale abrite le gisant en armure. Loys Picot, qui fut pendant 32 ans premier président à la cour des Aides, acquit en 1526 la baronnie dont, en 1649, Eustache Picot obtint l'érection en marquisat. François Picot de Dampierre fit reconstruire le château vers 1660 sur des plans attribués à François Mansart, et vers 1745, Pierre Picot de Dampierre, capitaine des chasses et des plaisirs du Roi, fit renouveler le décor des appartements. À la fin du XVIIIe siècle, Auguste Picot de Dampierre eut une carrière originale.","architecture":"DAMPIERRE,  Auguste Picot  il succéda à Dumouriez à la tête des armées du Nord et trouva la mort en 1793, au siège de Valenciennes. Son fils Charles, futur pair de France sous la Restauration, fit abattre le grand donjon, ruiné par un incendie. En son absence, le 23 février 1814, le tsar Alexandre logeait à Dampierre avec Schwarzenberg, lorsque Nesselrode apporta des dépêches adressées à Napoléon, interceptées par les russes. Le désarroi qu'y exprimaient limpératrice Marie-Louise et le duc de Rovigo le détermina à marcher sur Paris sans plus tarder. A la mort du dernier Picot de Dampierre, commandant des mobiles de l Aube, tué en 1870 au siège de Bagneux, le domaine échut aux La Rochefoucauld-Estissac qui sen défirent en 1907. Lacquéreur fit à grands frais compléter la décoration intérieure. Il fit raser les dépendances et remplacer le parc à langlaise tracé au XIXe siècle par des parterres de broderie, dessinés devant les façades et sur des terrasses latérales.  Le château a conservé un pittoresque châtelet de la fin du Moyen-Age, de plan quadrangulaire, cantonné de tourelles rondes percées de canonnières basses. Quant au corps de logis, isolé depuis la disparition des dépendances qui encadraient la cour dhonneur, il doit son caractère à la sobriété de ses façades de pierre blanche et au profil de son grand comble à la Mansart,  important pour un bâtiment simple en profondeur. À lintérieur, le vestibule donne sur un grand escalier de pierre dont le premier palier correspond à une suite de pièces surélevées en raison de la présence des voûtes darêtes de lancienne cuisine, en demi sous-sol. Sa remarquable rampe de pierre sculptée porte le chiffre de François Picot, marquis de Dampierre, et de Madeleine Gargam, fille dun intendant des Finances, qui durent faire reconstruire le château après leur mariage, célébré en 1653. Précédé dune longue allée, dune grille et dun saut-de-loup, le corps de logis devait être encadré sur la cour de pavillons aux angles arrondis.","habitants":"Guillaume de Dampierre\r\n        \"","divers":"Dampierre GPS : 48° 33' 04\" Nord, 4° 21' 52\" est","gps":"48° 33' 04\" Nord, 4° 21' 52\" est","images":["../image/image_10/10_Dampierre_Aube_1.jpg","../image/image_10/10_Dampierre_Aube_2.jpg","../image/image_10/10_Dampierre_Aube_3.jpg"]},"Consult_chateau_formulairef3c3":{"id":"Consult_chateau_formulairef3c3","dept":"10","canton":"Brienne-le-Château","commune":"Dosches","nom":"Dosches","type":"Manoir","periode":"XVII","histoire":"DOSCHES, dans le bourg de Dosches se dressait un château féodal. Il est décrit en 1399 comme la motte de Dosche, close de foussez, ensemble de maisons,  un colombier de terre, couvert de tuiles. Il fut entièrement reconstruit au XVIIe siècle, proche de l'église au pied de la motte, tout en conservant son aspect premier, avec un donjon, un colombier et de larges fossés. Avant la Révolution, la seigneurie de Dosches était la propriété de M. de Saint-Etienne. Le château passa dans les biens de la famille de Veillart, originaire de Normandie. La demeure fut ensuite la propriété des de Navelet, puis celle des de Chavaudon de Sainte Maure et de Chavaudon de Troyes. Le comte de Chavaudon vendit la propriété en 1829 à René-Alexandre Tallon, puis en 1874 elle passa à Ernest Tallon.","architecture":"DOSCHES  C'était autrefois un ancien château féodal qui fut entièrement reconstruit au XVIIe siècle. Il a conservé son donjon, son colombier et ses fossés. Une nouvelle fois, le château de Dosches changea de mains, de plan rectangulaire à deux niveaux toit en croupes  couvert de tuiles.","habitants":"Famille de Veillar\r\n        \"","divers":"Dosches  GPS: 48° 19' 18\" Nord, 4° 15' 02\" Est","gps":"48° 19' 18\" Nord, 4° 15' 02\" Est","images":["../image/image_10/10_Dosches_1.jpg","../image/image_10/10_Dosches_2.jpg"]},"Consult_chateau_formulaire70ff":{"id":"Consult_chateau_formulaire70ff","dept":"10","canton":"Creney-près-Troyes","commune":"Droupt Saint Basle","nom":"Droupt","type":"Château","periode":"XVI-XVII","histoire":"DROUPT   des premiers propriétaires de la seigneurie de Droupt-Saint-Basle sont les Chanoines de Vincennes. Au XVIe siècle, Louis le Mairat négociant et futur maire de Troyes, reprend la seigneurie par un contrat d'échange avec les chanoines. En 1586, il obtient du roi Henri III les lettres patentes l'autorisant à entourer sa demeure de murs et de fossés avec pont-levis. De cette époque datent les deux poternes, les tours d'angle, la double rangée de douves et les murs des communs. Le 28 juin 1714, la famille Guillaume de Chavaudon obtient une sentence lui adjugeant la seigneurie de Droupt par droit de retrait lignage. Durant la Révolution, le château et l'ensemble des biens seront confisqués, mais la famille réussit à récupérer une partie des biens et elle conservera la demeure pendant deux siècles. La dernière descendante, la marquise Guillaume de Chavaudon, meurt sans héritier en 1974. Alors le patrimoine du château est dispersé et sa destruction est même envisagée en 1983. A cette date, les propriétaires actuels monsieur et madame Paupe  famille de notaire à Troyes se portent acquéreurs et se lancent dans la restauration de la demeure.","architecture":"DROUPT, le château est composé d'une basse-cour avec deux ailes en retour d'équerre et un corps de logis encore entouré de ses douves, lui-même constitué de deux ailes en retour d'équerre. Ces deux ailes du logis se terminent par de petites tours rectangulaires percées d'ouvertures de tir. L'entrée dans la basse-cour et le logis se fait par un pavillon central percé d'une porte charretière et d'une porte piétonne. Dans la seconde moitié du XVIIIe siècle, les douves de la basse-cour ont été supprimées, la moitié du corps de logis a été reconstruite et transformée en demeure de plaisance. Vers 1830, d'autres modifications ont été apportées, en particulier à l'aile des remises. En 1905, l'architecte Chauvet construit un jardin d'hiver couvert en terrasse et ajoute à l'entourage des baies du reste du logis XVIIIe un décor de guirlande de feuillages en plâtre néo-XVIIIe siècle . A l'intérieur, les décors XVIIIe et début XIXe siècle sont conservés (lambris, cheminées, mosaïques, escaliers).Des dessins réalisés sur les murs par des soldats allemands au cours de la Seconde guerre mondiale, alors que l'édifice servait d'hôpital, sont encore visibles.\r\nÉléments protégés MH : l'ensemble des façades et des toitures, y compris celles de l'aile de la basse-cour, mais à l'exception de la galerie XIXe siècle accolée à la façade sur cour de l'aile nord-est du château, le décor lambrissé et les cheminées de cinq pièces du XVIIIe siècle : grand salon Louis XVI, petit salon, les deux pièces lambrissées du premier étage et le petit cabinet de la tour Est les deux enceintes de douves : inscription par arrêté du 3 août 1987. Les communs : pigeonnier, glacière, grange située entre le pigeonnier et l'aile d'entrée, écurie (aile nord-est de la cour) : inscription par arrêté du 25 février 1993.","habitants":"Famille de  Louis le Mairat\r\n        \"","divers":"Château de Droupt","gps":"","images":["../image/image_10/10_Droupt_1.jpg","../image/image_10/10_Droupt_2.jpg","../image/image_10/10_Droupt_3.jpg","../image/image_10/10_Droupt_4.jpg","../image/image_10/10_Droupt_5.jpg","../image/image_10/10_Droupt_6.jpg","../image/image_10/10_Droupt_7.jpg","../image/image_10/10_Droupt_8.jpg"]},"Consult_chateau_formulaire7c07":{"id":"Consult_chateau_formulaire7c07","dept":"10","canton":"Bar-sur-Aube","commune":"Eclance","nom":"Eclance","type":"Manoir","periode":"XIII-XVIII","histoire":"ECLANCE, une famille chevaleresque portant le nom d'Eclance est attestée aux XIIe et XIIIe siècles et le fief relevait de celui de Jaucourt. Il appartint aux XIVe et XVe siècles aux Choiseul Aigremont, puis passa par les femmes à Jean d'Anneville, bailli de Bar-le-Duc, qui en octobre 1512, obtint de Louis XII des lettres patentes l'autorisant à fortifier son château. Celui-ci est partagé entre une belle demeure du XVIIIe siècle et une aile droite qui est un corps de ferme. Depuis le XIIIe siècle, la spécialité locale était le fromage. La comtesse de Champagne envoyait les fromages d'Éclance à la cour de Philippe Auguste en 1217.   Le château d'Éclance à la sortie vers Trannes est partagé entre le logis et une aile droite qui est un corps de ferme. Le deuxième, plus modeste, est lui aussi partagé entre une demeure seigneuriale et un corps de ferme. A noter que le château d'Eclance à été détruit par un incendie en Janvier 2014. L'ensemble de la charpente à été refaite en charpente traditionnelle.\r\nÉléments protégés MH : le portail d'entrée avec sa grille et la rampe d'escalier en fer forgé : inscription par arrêté du 19 mars 1982","architecture":"ECLANCE, la particularité d'Eclance est qu'il y a 2 châteaux dans le village : tous les deux sont coupés en deux. Le château dit d'Eclance se situe à la sortie vers Trannes. Il est partagé entre une belle demeure seigneuriale du XVIIIe siècle et, une aile droite qui est un corps de ferme. Le second, plus modeste, est partagé, entre une demeure seigneuriale et un corps de ferme. Le Château d'Eclance est privé, fermé au Public. Le château d'Eclance est inscrit aux M.H. depuis 1981 et inscrit aux M.H. en 1911.","habitants":"Famille de Jean d'Anneville,\r\n        \"","divers":"Eclance  GPS : 48° 18' 28\" Nord, 4° 38' 00\" Est","gps":"48° 18' 28\" Nord, 4° 38' 00\" Est","images":["../image/image_10/10_Eclance_1.jpg","../image/image_10/10_Eclance_2.jpg","../image/image_10/10_Eclance_3.jpg","../image/image_10/10_Eclance_4.jpg"]},"Consult_chateau_formulairecd0d":{"id":"Consult_chateau_formulairecd0d","dept":"10","canton":"Aix-en-Othe","commune":"Ervy le châtel","nom":"Ervy_le_Châtel","type":"Château-porte","periode":"XVI-XVII-XIX","histoire":"Trois châteaux dans cet article celui d'Evry, la porte St-Nicolas et Chamoy à 15 Kilomètres au nord est.                                                                                                            EVRY LE CHATEL, connu en 1143 par un hommage du comte de Champagne au duc de Bourgogne, le fief avait aussi comme seigneur la famille d'Ervy, Leterius dans le dernier quart du XIe siècle. Mais à partir de Henri le Libéral les comtes de Champagne avaient toute la seigneurie. Ervy avait deux foires dès 1220, l'une à la Saint-Remi et l'autre appelée Sainte-Croix lors de la Saints-Pierre-et-Paul. Elles furent augmentées à quatre au XVIIe siècle et tenaient marché les mercredis et samedis.  Bouilly et Ervy-le-Chatel Jusqu'à la Révolution, Ervy est de l'intendance et la généralité de Paris, de l'élection de Saint-Florentin et du bailliage de Troyes, puis Étienne-Catherine Baillot, originaire d'Ervy, joue un rôle important comme député de Troyes aux États généraux de 1789 (devenus Assemblée constituante en juin 1789), puis sur le plan local.  En février 1949 fut installé proche de la gare le premier passage à niveau automatique de France. La ligne, qui reliait Troyes, n'est plus en service et le passage à niveau a été supprimé.                                                                                             A  15 Kilomètres au nord est le château de  CHAMOY était autrefois une maison forte, construite au XIIIe siècle, a été remanié, au XVIe siècle, car c'est de cette date que remonte la porte monumentale qui subsiste. Un remaniement des bâtiments fut fait, de 1680 à 1690, à la demande de Louis Rousseau, seigneur de la Lombardière.","architecture":"St-NICOLAS, château la Porte Saint-Nicolas est une porte de ville, bâtie à l'entrée de la ville, à Ervy-le-Châtel, dans le département de l'Aube, en région Grand-Est, en France. Elle est de style Médiéval. La Porte Saint-Nicolas a été construite au XVIe siècle. Elle porte le nom d'une petite statuette, située au centre de la porte. C'est la seule porte médiévale restant encore debout dans l'Aube. Un passage pour les piétons et une route passent sous la Porte Saint-Nicolas. Elle permettait de pénétrer dans la ville. Les Tours de la Porte Saint-Nicolas ont été reconstruites, en 1837. La Tour Nord était une ancienne prison de passage. Le pont-levis a été remplacé par un pont en pierre. La Porte Saint-Nicolas est inscrite aux M.H. depuis 1926.                                                                                                          CHAMOY, le château de Chamoy actuel a été construit, de 1828 à 1830. Il possède un parc remarquable, avait une chapelle sous le vocable des Saints Cosme et Damien. Les titres du seigneur furent brûlés, en place publique, lors de la Révolution. Les documents de la chapelle étaient gardé à l'église paroissiale et avaient des enluminures présentées.","habitants":"famille d'Ervy\r\n        \r\n        \r\n        \"","divers":"St-Nicolas grav-1-2                                                                            GPS : 48° 02' 28,86\" Nord, 3° 54' 44,92\" Est                          48° 02' 30\" nord, 3° 54' 43 est                                                                                   Chamoy grav_3 GPS : 48° 07' 08\" Nord, 3° 58' 15\" Est","gps":"48° 02' 28,86\" Nord, 3° 54' 44,92\" Est","images":["../image/image_10/10_Evry_le_Ch%c3%a2tel_1.jpg","../image/image_10/10_Evry_le_Ch%c3%a2tel_2.jpg","../image/image_10/10_Evry_le_Ch%c3%a2tel_3.jpg"]},"Consult_chateau_formulaire82d5":{"id":"Consult_chateau_formulaire82d5","dept":"10","canton":"","commune":"Fresnoy le château","nom":"Fresnoy_Plessis","type":"Château","periode":"XIX","histoire":"FRESNOY, les premiers seigneurs de Fresnoy sont connus par un acte d'échange de Gautier de Fresnoy avec l'abbaye de Larrivour vers 1140. Le dernier seigneur connu était Pierre Piot, lieutenant du roi à Troyes. L'architecte était Dufour. La construction du Château de Plessis date de 1833 au 1844. En 1789, le village était de l'intendance et de la généralité de Châlons, de l'élection et du bailliage de Troyes, ainsi que du bailliage ducal d'Aumont. Connu depuis le XIVe siècle, le château actuel est dû à Louis Sébastien Grundler, comte et général d'Empire.","architecture":"FRESNOY  Les travaux commencent en 1833 et l'aile des communs, qui s'ajoute au plan en U initial, est achevée en 1844. Au cours du XVIIIe siècle, une basse-cour est construite, la double enceinte de douves est réduite, et un grand parc avec jardin à la française s'étend à l'arrière du château. La grille d'entrée est posée en 1836. L'angle nord du parc est décoré d'un monticule formant \"escargot, présent dans les parcs du XVIIIe siècle.","habitants":"Louis Sébastien Grundler,\r\n        \"","divers":"GPS : 48° 13' 31\" Nord, 4° 13' 31,02\" Est","gps":"48° 13' 31\" Nord, 4° 13' 31,02\" Est","images":["../image/image_10/10_Fresnoy_Plessis_1.jpg","../image/image_10/10_Fresnoy_Plessis_2.jpg"]},"Consult_chateau_formulaire637d":{"id":"Consult_chateau_formulaire637d","dept":"10","canton":"Bar-sur-Aube","commune":"Fuligny","nom":"Fuligny","type":"Château","periode":"XVIII","histoire":"FULIGNY, reconstruction du château de Fuligny au XVIIIe siècle sur un site ancien. Au XIXe siècle, la propriété se composait d'un pont, de deux pavillons d'entrée, d'un pigeonnier et des dépendances. Le château fut démoli en 1988. Le pigeonnier est le bâtiment le plus important restant au sud de l'entrée.","architecture":"FULIGNY c'est un château fort. La construction du château de Fuligny date du XVIIIe siècle. Il est inscrit aux M.H. depuis 2003. De plan circulaire, en moellons enduits, exceptés le cordon séparant les deux niveaux et les encadrements de baies en grès. L'ensemble est coiffé d'une toiture en poivrière recouverte de tuiles plates, surmontée d'un lanternon. A l'intérieur, le niveau inférieur est isolé du reste de l'édifice par une voûte d'arête. Le pigeonnier est contemporain de la reconstruction du château au XVIIIe siècle.Éléments protégés MH : le colombier et le portail d'entrée avec ses trophées : inscription par arrêté du 26 novembre 2003.","habitants":"Famille des Fuligny\r\n        \r\n        \r\n        \"","divers":"Fuligny   GPS : 48° 19' 51\" Nord, 4° 42' 13\" Est.","gps":"48° 19' 51\" Nord, 4° 42' 13\" Est.","images":["../image/image_10/10_Fuligny_10_1.jpg","../image/image_10/10_Fuligny_10_2.jpg"]},"Consult_chateau_formulaire5ce7":{"id":"Consult_chateau_formulaire5ce7","dept":"10","canton":"Bar-sur-Seine","commune":"Essoyes","nom":"Hériot","type":"Château","periode":"XVIII","histoire":"HERIOT,  Zacharie Olympe Hériot, né à Essoyes le 5 juin 1833, embrassa la carrière des armes, servit dans linfanterie de ligne et termina sa carrière interrompue par les morts de son frère et de sa mère. Il achète en 1890 une propriété à Essoyes et fait édifier entre 1890 et 1892 un château. Il est élu Maire dEssoyes le 15 mai 1892 et Conseiller Général le 12 Février 1893. Élections sans lendemain puisquil démissionne des deux mandats en 1894. Il mourut le 22 juillet 1899 et, le 27 décembre, le château fut attribué à sa veuve qui y revint de temps en temps, avec sa fille, Virginie Hériot, qui devint une sportive de renommée mondiale, sintéressant en premier lieu à la navigation. Madame veuve Hériot, devenue après son remariage, Madame Roger Douine, assura par sa contribution généreuse la continuité de lécole libre dEssoyes de 1903 à 1923. Pendant la guerre 1914-1918, elle ouvrit sa propriété et la mit à la disposition de lautorité militaire. Celle-ci en fit une annexe de lhôpital des Jacobins de Troyes. La propriété fut fermée à la fin de la guerre. Le 30 décembre 1929, M. Davidson, banquier à Dallas, ancien officier de larmée américaine, ayant servi en France pendant la guerre précédente, en fit lacquisition. Il fut mis en faillite. Le château, saisi, fut acquis par la commune dEssoyes le 6 juillet 1936. En septembre 1939, lorphelinat Audiffred de Troyes sy installa jusquà lexode de juin 1940. Puis, ce fut un cantonnement de prisonniers français jusquà leur départ pour lAllemagne en décembre de la même année. Quelques soldats allemands sy trouvaient en août 1944, mais ils se firent conduire à Chaumont et ce fut la fin de loccupation militaire du château.","architecture":"HERIOT  ensuite, vint lheure des réfections importantes qui simposaient en vue dy installer les classes dans la partie gauche, la perception et les logements dans la partie droite. Les travaux furent longs, mais le résultat fut heureux. Le parc permit la pratique du football et autres sports, sa pelouse et ses allées ombragées attirèrent bien des visiteurs. Dans la cour il y a un très beau puits dont la margelle circulaire, d'un seul bloc de pierre blanche, est surmontée d'une belle ferronnerie couronnée par une statue féminine, Thètis, déesse des eaux. Cette dernière tient sous son bras droit un vase duquel l'eau devait s'écouler. Le puits a été condamné et un massif de fleurs vient en agrémenter l'intérieur..                                                 ESSOYES,  la seigneurie dEssoyes, située entre Molesme et Clairvaux, fut la propriété de la Famille Sommièvre jusquà la Révolution. Lancien château, acheté et agrandi par Olympe Hériot à la fin du XIXe siècle, a été racheté par la commune en 1936. Dans la partie gauche, l'Ecole a été installée ; dans la partie droite, la Perception. Aujourd'hui, c'est devenu la Mairie d'Essoyes.","habitants":"Hériot Famille de Zacharie Olympe Hériot                          Essoyes  Famille Sommièvre\r\n        \r\n        \"","divers":"Essoyes 48° 02' 59\" nord, 4° 30' 30\" est    48° 06' 54\" nord, 4° 22' 32\" est","gps":"","images":["../image/image_10/10_H%c3%a9riot_Essoyes_1.jpg","../image/image_10/10_H%c3%a9riot_Essoyes_2.jpg"]},"Consult_chateau_formulaire70f1":{"id":"Consult_chateau_formulaire70f1","dept":"10","canton":"Saint-Lyé","commune":"Marcilly le Hayer","nom":"Marcilly_le_Hayer","type":"Château","periode":"XV-XIX","histoire":"Deux châteaux dans cet article; Chavaudon et la Mothe.       CHAVAUDON, construit en 1913 par larchitecte Hector Guimard, qui a donné les élévations du château, lédifice présente quatre façades différentes en brique, pierre, béton et ciment. A lintérieur, la disposition dorigine est rationnelle et met un accent particulier sur lhygiène. La demeure conserve quelques éléments de décor de style Art-Nouveau, comme les garde-corps ou lentrée en grès bleu turquoise. Éléments protégés MH : le château en totalité, les façades et les toitures des communs (l'ancienne écurie-garage, le lavoir, le chenil et la maison du gardien), le portail d'entrée avec sa grille et le parc : inscription par arrêté du 27 février 2014.                                                               la MOTHE, en 1362, la présence dune maison close de vieux fossés est attestée sur ce lieu. En 1502, le dénombrement de Guillaume de la Motte, mort à plus de cent ans, nous offre cette description : maison à deux étages, colombier à pied, bretèch
