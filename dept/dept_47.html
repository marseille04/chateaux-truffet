rs, le prieur, le Roi de France et les familles du Fossat de Noailhan et de Madaillan Le plus ancien connu est Amanieu de Noailhan qui rend hommage à Simon de Montfort pour sa terre de Sainte-Livrade. Le 23 septembre 1340 Béraud de Noailhan seigneur de Sainte-Livrade reçois ses gages pour lui et sa compagnie de gens d'armes lors des guerres de Gascogne. A la fin de la guerre de cent ans la seigneurie appartient en indivis au prieur de Sainte-Livrade et au baron de Montpezat qui s'en partagent les différents revenus à l'exception de la justice qui appartient tout entière au Baron de Montpezat. En 1599 le roi Henri IV érigea en duché pairie la baronnie d'Aiguillon avec les terres de Montpezat, Dolmayrac. La juridiction de Sainte Livrade fut englobée dans le Duché d'Aiguillon.","architecture":"Le château : La Tour du Roy du XIIe siècle : survivance d'une enceinte édifiée par Richard Cur de Lion, il occupait l'angle nord ouest de l'enceinte de la ville, la tour est le dernier vestige de cette forteresse. La tour carrée cantonnées de contreforts sur les trois cotés extérieur qui montent jusqu'au niveau du second étage où se trouve le chemin de ronde porté par des arcs bandés entre les contreforts. Elle comprend quatre niveaux. Le rez-de-chaussée voûté sur croisée d'arête est éclairé par deux petites fenêtres. On y accédait par une trappe à partir du premier étage. Tour construite à la fin du XIIIe ou au début du XIVe siècle sur le rempart de la ville : malgré son appellation de Tour du Roy, il doit sagir de la maison-forte dun seigneur du coin, protégeant l'agglomération. Elle devient prison communale à la Révolution.\r\nLe 1er niveau est aveugle, le 1er étage est accessible par un escalier extérieur droit. La pièce est voûtée dogives en brique, la porte donne sur le chemin de ronde de la ville. Le 2e étage est desservi par un escalier taillé dans lépaisseur des murs nord et ouest. Le 3e étage est éclairé par 4 fenêtres.","habitants":"Richard Cur de Lion\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"La Tour du Roy à Ste Livrade grav 1 à 3, Bergoni 4, Rojas 5,","gps":"","images":["../../jctruffet.com/image/image_47/47_Ste_Livrade_47_1.jpg","../../jctruffet.com/image/image_47/47_Ste_Livrade_47_2.jpg","../../jctruffet.com/image/image_47/47_Ste_Livrade_47_3.jpg","../../jctruffet.com/image/image_47/47_Ste_Livrade_47_4.jpg","../../jctruffet.com/image/image_47/47_Ste_Livrade_47_5.jpg","../../jctruffet.com/image/image_47/47_Ste_Livrade_47_6.jpg"]},"Consult_chateau_formulaire0b07":{"id":"Consult_chateau_formulaire0b07","dept":"47","canton":"Nérac","commune":"Nérac","nom":"Tasta","type":"Forteresse","periode":"XIII","histoire":"TASTA, demeure citée en 1309, selon Samazeuilh, dans une donation du domaine du Tasta par Amanieu d'Albret à Amadon Delart, bourgeois de Nérac.  De la fin du XVe siècle jusqu'au début du XVIIe siècle, il appartient à Barrau du Tasta, aux Cortion, aux Cauquabannes, à Geysse, à Vigonnes, avant d'être racheté par Abimélech de Madrouet. Découverte d'une nécropole mérovingienne au XIXe siècle dans le bois au nord du château.","architecture":"Tastat, la tour carrée et la tour ronde paraissent dater de la fin du XIIIe ou du XIVe siècle, mais un dernier niveau a été supprimé. Le château est appelé salle du Tasta au  XVIe siècle. Rénové au XVIe siècle : construction du colombier, d'un mur de refend dans la tour carrée, d'une tourelle d'angle, ouverture de la porte et de fenêtres. Pillé en 1621 et pendant la Fronde. Destruction d'une tour à la Révolution. Au XIXe siècle, construction des pièces au sud, du corps de bâtiment entre les 2 tours, des créneaux, restauration et aménagements intérieurs. Dépendances des XVIIIe et XIXe siècles   construction des pièces au sud, des créneaux, du corps de logis entre les deux tours, restauration et aménagements intérieurs. Le colombier et les tourelles sont couverts de toits coniques en tuiles plates ; les autres toitures sont dissimulées par les créneaux.","habitants":"Amanieu d'Albret \r\n        \r\n        \"","divers":"Château de Tasta à Nérac","gps":"","images":["../../jctruffet.com/image/image_47/47_Tasta_1.jpg","../../jctruffet.com/image/image_47/47_Tasta_2.jpg","../../jctruffet.com/image/image_47/47_Tasta_3.jpg","../../jctruffet.com/image/image_47/47_Tasta_4.jpg","../../jctruffet.com/image/image_47/47_Tasta_5.jpg"]},"Consult_chateau_formulairea2ea":{"id":"Consult_chateau_formulairea2ea","dept":"47","canton":"Sainte Livrade sur Lot","commune":"Temples sur Lot","nom":"Temples_Lot","type":"Commanderie","periode":"XIV","histoire":"Commaderie de TEMPLES sur LOT, Rainford 1er, seigneur de Montpezat, est à lorigine de la fondation de la Commanderie du Temple de Breuil à la fin du XIIe siècle. Au cours du XIVe siècle, après larrestation des Templiers et la dissolution de cet ordre, se fonde le village qui devient lieu de repos pour les pèlerins mais aussi pour les gens de guerre et point de contrôle du commerce fluvial. Après la guerre de 100 ans, la commanderie fut reconstruite en briques Toulousaines. De là, surviennent les guerres de religion qui éprouveront le domaine du Temple de Breuil. En 1789, la Révolution mettra fin au rôle historique de la commanderie. Actuellement est un lieu daccueil (restaurant, bar...). Sans oublier sa base nautique au bord du Lot et son jardin des nénuphars Latour Marliac.\r\nA temple sur lot un autre château celui de Bouffereille  Cet édifice correspond pourtant tout à fait à lesprit du XIXe siècle, époque de sa construction. Ce siècle, en effet, se plaît à mélanger les styles et les influences pour recréer une version idéalisée de certaines périodes de lHistoire.","architecture":"Le Temple s/Lot : au cours du XIVe siècle, après larrestation des Templiers et la dissolution de cet ordre, se fonde le village qui devient lieu de repos pour les pèlerins mais aussi pour les gens de guerre et point de contrôle du commerce fluvial. Agrémenté d'un superbe jardin de nénuphars, le village conserve une commanderie de l'ordre des Templiers du XIIe siècle en pierres et briques roses, flanquée de tours rondes ou carrées.                                                            Bouffereille, le lieu-dit n'apparaît pas sur la carte de Cassini, mais deux bâtiments et un vivier figurent sur le cadastre de 1836. Les dépendances ont été construites à la fin du XIXe siècle : la ferme avec le logis et la grange-étable, le chai, la porcherie surmontée d'un poulailler et un bâtiment de stockage. Le château a été remanié et augmenté de deux tours à la même époque. Il possède un plan habituel avec couloir central ; il est flanqué de deux tours d'angles en façade, couvertes de toits coniques. Vaste grange à charpente moisée.","habitants":"Les Templiers\r\n        \r\n        \"","divers":"Le temple château à Temple sur Lot et château de Bouffereille grav 6","gps":"","images":["../../jctruffet.com/image/image_47/47_Temples_Lot_1.jpg","../../jctruffet.com/image/image_47/47_Temples_Lot_2.jpg","../../jctruffet.com/image/image_47/47_Temples_Lot_3.jpg","../../jctruffet.com/image/image_47/47_Temples_Lot_4.jpg","../../jctruffet.com/image/image_47/47_Temples_Lot_5.jpg","../../jctruffet.com/image/image_47/47_Temples_Lot_6.jpg"]},"Consult_chateau_formulaire8364":{"id":"Consult_chateau_formulaire8364","dept":"47","canton":"Duras","commune":"Loubés-Bernac","nom":"Theobon","type":"Château","periode":"XV-XVI","histoire":"THEOBON, les Rochefort de Saint-Angel étaient huguenots. Charles Bordeaux (ou Charles III) a fait célébrer le culte protestant dans le château. Il a épousé le 21 février 1664, Marie Nompar de Caumont, fille de François de Caumont, marquis de Castelmoron, petite fille du duc de La Force, Jacques Nompar de Caumont, dont il a une fille Marie Guyonne de Rochefort-Théobon, dame d'honneur de la duchesse de Berry qui s'est mariée, en 1704, Louis de Pons, seigneur de Saint-Maurice, Saussignac, Cazeneuve, maître de la Garde-Robe du duc de Berry. Le culte protestant est interdit dans le château en 1684. Ayant refusé d'abjurer, il a été enfermé à la Bastille et sa femme mise au couvent. Il s'est remarié le 15 septembre 1695 avec Marie Antoinette de Pons Saint-Maurice, sur de Louis de Pons Saint-Maurice, dont il a eu deux filles, Marie, sans alliance, et Marie Guyonne de Rochefort-Théobon qui s'est mariée avec Daniel-Marie Anne de Talleyrand-Périgord.\r\nLe château passa dans la famille de Talleyrand-Périgord dit le marquis de Talleyrand, comte de Grignols, baron de Beauville. Leur fils, Gabriel-Marie de Talleyrand-Périgord, vendit le château, en 1783, au sieur Brie de Teysson, capitaine au régiment d'Artois, chevalier de Saint-Louis. Une de ses filles en hérita, mariée à M. Albert, elle le transmit à son fils, A. Albert de Théobon. Aujourd'hui le propriétaire est monsieur André Marcheix.","architecture":"Theobon le château s'organise autour d'une grande cour rectangulaire. Le corps de logis principal se trouvait au sud. Il a un étage  mais en avait  deux à l'origine. Une terrasse a été élevée contre la façade sud. Un escalier à deux rampes permet d'accéder au parc. La façade présente plusieurs types de fenêtres qui pourrait montrer qu'il y a eu plusieurs campagnes de construction. La porte centrale côté nord est entourée d'une moulure torique et encadrée de deux pilastres simples et semble avoir été réalisée après coup. Les plafonds de bois de l'escalier portent des restes de peintures : chute d'Icare, Phaéton précipité du char du soleil. Des peintures sont aussi visibles dans la grande salle et dans le boudoir. La rampe d'escalier est un bel exemple de ferronnerie du XVIIIe siècle. Des salons ont reçu des boiseries au cours du  XVIIIe siècle.\r\nLe château comprend deux ailes en retour  d'équerre, à l'est et à l'ouest. L'aile Est avait une tour à son extrémité nord selon la tradition. L'aile ouest a un pavillon en son milieu où s'ouvre la porte d'entrée. Les deux rainures montrent que l'entrée du château se faisait par un pont-levis. La cour est ouverte au nord et forme une terrasse, mais un petit bâtiment situé à l'angle nord-ouest semble montrer qu'il devait y avoir une galerie mais qui n'a pas dû être achevée avant d'être démolie.","habitants":"Famille Jacques Nompar de Caumont\r\n        \r\n        \"","divers":"Château de Théobon à Loubés-Bernac","gps":"","images":["../../jctruffet.com/image/image_47/47_Theobon_1.jpg","../../jctruffet.com/image/image_47/47_Theobon_2.jpg","../../jctruffet.com/image/image_47/47_Theobon_3.jpg","../../jctruffet.com/image/image_47/47_Theobon_4.jpg","../../jctruffet.com/image/image_47/47_Theobon_5.jpg"]},"Consult_chateau_formulairedd3e":{"id":"Consult_chateau_formulairedd3e","dept":"47","canton":"Aiguillon","commune":"Bourran","nom":"Tour_de_Rance","type":"Château","periode":"XVI","histoire":"TOUR des RANCE, le domaine de la Tour de Rance faisait partie du temporel de l'abbaye de Clairac. Il a été aliéné en 1574 par Henri d'Angoulême, abbé commendataire. Le domaine est devenu la propriété de Guillaume de Ranse, écuyer, seigneur de Plaisance et secrétaire d'Henri de Navarre puis conseiller du roi Henri IV, contrôleur général des domaines de Navarre et d'Albret, et auditeur de la chambre des comptes de Nérac.\r\nLa famille de Gripières en est devenue propriétaire en 1660 et l'a conservé jusqu'en 1830.    Le pigeonnier est contemporain de la construction du logis. Il possède le même type de charpente que le pavillon d'escalier.\r\nLe domaine a été acquis en 1945 par l'INRA qui a modifié les dépendances agricoles. Le pigeonnier a été inscrit au titre des M.H le 31 décembre 1993.","architecture":"La Tour de Rance, le logis a été reconstruit au XVIIe siècle,  par la famille de Gripières, avec un corps de pavillon central abritant un escalier rampe sur rampe à deux volées avec sa charpente à rayures avec goussets cintrés. Les dispositions et décors intérieurs ont été remaniés au XIXe et XXe siècles. Pigeonnier de plan hexagonal reposant sur six colonnes dont la protection contre la sauvagine par des « capels » en forme de rondelles. Il a été réalisé en brique et enduit. Son toit polygonal est couvert de tuiles creuses et comporte des chien-assis pour l'entrée des pigeons. Au sommet a été placé un clocheton terminé par un petit épi de faîtage avec des grilles d'envol pour les pigeons.","habitants":"Famille de Guillaume de Ranse\r\n        \r\n        \"","divers":"Château de la Tour de Rance à Bourran","gps":"","images":["../../jctruffet.com/image/image_47/47_Tour_de_Rance_1.jpg","../../jctruffet.com/image/image_47/47_Tour_de_Rance_2.jpg"]},"Consult_chateau_formulaire2b24":{"id":"Consult_chateau_formulaire2b24","dept":"47","canton":"Fumel","commune":"Tournon d","nom":"Tournon_Agenais","type":"Bastide-Manoir","periode":"XIII","histoire":"A Tournon d'Agenais le château  de Tournon, de Lamothe (voir article suivant), du Foulou, de Garoussel et  les maisons et le Beffroi.                                       TOURNON-AGENAIS, un oppidum celte et place gallo-romaine de commerce, la bastide royale est fondée en 1271 par Philippe III fils du roi Saint-Louis. En pleine  guerre des Albigeois en 1212 à la suite de laquelle le vainqueur des Albigeois, Amaury de Montfort donne à l'évêque dAgen la maison de l'Abescat. Pendant la guerre de cent Ans, la ville changea souvent de mains.\r\nLes protestants rasent l'église catholique en 1580 puis celle-ci est remplacée par l'Abescat. Le couvent des récollets est bâti au XVIIe siècle sur les ruines de l'ancien château de Tournon, afin de faire revivre la religion catholique après le départ des protestants. Au cours de la période de la convention nationale (1792-1795), la commune porta le nom révolutionnaire de Tournon-la-Montagne. Le 3 juillet 1944, 1 500 hommes de la Panzer-agrenadier division \"das Gepent\" venant de Cahors et se dirigeant vers Villeneuve-sur-Lot, font feu sur les quelques maquisards présents place du Foirail. Les opérations de représailles contre les résistants et la population civile durèrent 6 heures, durant lesquelles plusieurs personnes furent, torturées et tuées par les Allemands. De nombreuses maisons furent pillées, mises à sac et quelques-unes incendiées. Cet événement est connu sous le nom de sac de Tournon-d'Agenais.","architecture":"De son riche passé subsistent plusieurs témoignages architecturaux comme : le beffroi et son horloge lunaire, la Maison du XIIIe siècle   la salle de l'Abescat.\r\n château de Lamothe d'Anthé à Tournon d'Agenais   L'aile nord du corps de logis semble d'époque médiévale: la porte de cave, en arc brisé à chambranle arrondi et une porte du rez-de-chaussée, en arc brisé chanfreiné, sont datables du début du XIVe siècle. à l'ancien corps de logis modernisé et agrandi, est greffé un nouveau corps de logis à l'est, doté d'une chapelle. Au XVIIe siècle, est édifiée une nouvelle porte d'entrée à la chapelle, devenu propriété de la famille d'Arlan au XVIIIe siècle, les portes-fenêtres du rez de chaussée sur l'élévation nord sont percées à la limite des XVIIIe et XIXe siècles. A la fin du XIXe siècle, l'aile ouest est reconstruite, flanquée d'une tour crénelée, réunie à l'aile Est par un mur fermant la cour.","habitants":"Amaury de Montfort     \r\n        \r\n        \"","divers":"Patrimoine de Tournon d'Agenais","gps":"","images":["../../jctruffet.com/image/image_47/47_Tournon_Agenais_1.jpg","../../jctruffet.com/image/image_47/47_Tournon_Agenais_2.jpg","../../jctruffet.com/image/image_47/47_Tournon_Agenais_3.jpg","../../jctruffet.com/image/image_47/47_Tournon_Agenais_4.jpg","../../jctruffet.com/image/image_47/47_Tournon_Agenais_5.jpg"]},"Consult_chateau_formulaire4802-2":{"id":"Consult_chateau_formulaire4802-2","dept":"47","canton":"Fumel","commune":"Tournon d","nom":"Tournon_Agenais_II","type":"Château","periode":"XIV","histoire":"TOURNON AGENAIS, château de Lamothe d'Anthé à Tournon d'Agenais   La paroisse de Saint-André-de-Carabaisse, sur laquelle est établie le manoir, est détenue par la famille d'Anthé au XIIe siècle ; la dîme en est restituée par les frères Raymond de Roquebrune d'Anthé à l'évêque d'Agen au XIIIe siècle.A la fin de la guerre de Cent Ans, il entre dans les possessions des Lustrac, par le mariage de Jeanne de Durfort avec Arnaud, dit Naudonet de Lustrac, écuyer de l'écurie royale. C'est pour cette famille que l'édifice est transformé entre la fin du XVe siècle et le début du XVIe siècle: Au XVIIe siècle, est édifiée une nouvelle porte d'entrée à la chapelle, pour Renaud de Guiscard, acquéreur du manoir en 1600, avant qu'il ne passe dans les possessions de la famille de Carbonnières en 1625.Devenu propriété de la famille d'Arlan au XVIIIe siècle                                          CAZIDEROQUE  à quelques kilomètres à l'ouest, mentionné en 1259, en coseigneurie entre les frères E. de Fumel et B. de Montesquieu, qu'ils tiennent vraisemblablement de l'abbaye d'Eysses, détentrice de droits que la paroisse. Assiégé par les partisans du roi de France en 1436, il est pris et rasé par le vicomte de Lomagne en 1441. Il ne subsiste plus aujourd'hui au sommet du pech ayant servi d'assiette à l'ancien castrum que quelques vestiges, dont un puits isolé. Au château culture de Safran.                                           FOULOU, gites de charme de Katherine Wemaere du XVIe siècle situé à 3km de Tournon d'Agenais implanté au milieu d'un parc de cinq hectares, offre à ses hôtes des séjours de repos.                 GAROUSEL, pas d'informatrion historique","architecture":"château de Lamothe d'Anthé à Tournon d'Agenais   L'aile nord du corps de logis semble d'époque médiévale: la porte de cave, en arc brisé à chambranle arrondi et une porte du rez-de-chaussée, en arc brisé chanfreiné, sont datables du début du XIVe siècle. à l'ancien corps de logis modernisé et agrandi, est greffé un nouveau corps de logis à l'est, doté d'une chapelle. Au XVIIe siècle, est édifiée une nouvelle porte d'entrée à la chapelle. Devenu propriété de la famille d'Arlan au XVIIIe siècle, les portes-fenêtres du rez de chaussée sur l'élévation nord sont percées à la limite des XVIIIe et XIXe siècles. A la fin du XIXe siècle, l'aile ouest est reconstruite, flanquée d'une tour crénelée, réunie à l'aile Est par un mur fermant la cour.                               Le château de Cazideroque date du XIIIe siècle. Situé sur un vaste plateau classé Natura 2000, Mais le \"Castel\" a subi de nombreux remaniements aux cours des siècles, et son aspect actuel est issu des modifications apportées aux bâtiments à la fin du XIXe siècle.\r\nLe Foulou de plan en U ,  corps de logis à deux niveaux flanqué sur angles de tourelles et une tour centrale plein cintre avec    échauguettes au niveau du toit impérial posé sur mâchicoulis.                                Garoussel de plan en U corps de logis à deux niveaux encadré de deux pavillons rectangulaires à quatre niveaux toit à quatre pans et retour en équerre sur les côtés  de dépendances.","habitants":"famille de Carbonnières\r\n        \"","divers":"Château de Cazideroques grav 1-2, Lamothe grav 4, le Foulou grav 5, le Garroussel grav 5-6.","gps":"","images":["../../jctruffet.com/image/image_47/47_Tournon_Agenais_II_1.jpg","../../jctruffet.com/image/image_47/47_Tournon_Agenais_II_2.jpg","../../jctruffet.com/image/image_47/47_Tournon_Agenais_II_3.jpg","../../jctruffet.com/image/image_47/47_Tournon_Agenais_II_4.jpg","../../jctruffet.com/image/image_47/47_Tournon_Agenais_II_5.jpg","../../jctruffet.com/image/image_47/47_Tournon_Agenais_II_6.jpg","../../jctruffet.com/image/image_47/47_Tournon_Agenais_II_7.jpg"]},"Consult_chateau_formulairea482":{"id":"Consult_chateau_formulairea482","dept":"47","canton":"Lavardac","commune":"Feugarolles","nom":"Trenquelleon","type":"Château","periode":"XIII-XVIII","histoire":"TRENQUELLEON, cette barronnie est passé de successions en successions par  alliances, en 1313, un autre Bernard Trenquelléon de Lomagne, fils et petit-fils d'Othon de Lomagne a épousé Allemane de Cazenove. Daniel du Broqua , baron de Trenquelléon, a épousé Sérène de Rabar, fille de Pierre de Rabar, écuyer, seigneur de Cerveaud et de Montgré. La baronnie est acquise en 1595 par François de Labroue qui passa par alliance à Joseph du Broqua, écuyer, fils aîné du précédent, baron de Trenquelléon, veuf d'Olympe du Puy en 1694, mort en 1703, laissant une fille unique : Anne du Broqua, baronne de Trenquelléon, mariée  à noble Jean François de La Peyre, écuyer, seigneur de La Lanne, et en 1708 avec François de Batz, chevalier, né en 1670, devenu baron de Trenquelléon par son mariage, Charles de Batz, chevalier, seigneur baron de Trenquelléon, né en 1712, marié  en 1738 avec Catherine de Lustrac, et  en 1750, avec Marie Catherine Élisabeth de Malide, fille du comte de Malide et nièce du marquis de La Rochefoucauld, Charles de Batz, né en 1754, a été seigneur baron de Trenquelléon, mort en 1815. Il s'est marié en 1787 avec Marie Ursule Caroline, fille de Bernard Joseph, comte de Peyronnec de Saint-Chamarand, Adèle de Batz de Trenquelléon, Charles Polycarpe de Batz, baron de Trenquelléon, né en 1792, marié en 1813 avec Adèle Sérène de Sevin de Ségougnac, Charles Joseph de Batz, né le 19 mars 1815, baron de Trenquelléon, Léopold Stanislas Joseph Chrisostome de Batz de Trenquelléon, né le 30 juillet 1816, maire de Feugarolles. La dernière représentante de la famille de Batz de Trenquelléon, Charlotte (1873-1939), épouse Bélisaire Albigés. Le château passe à leur fille Hélène, épouse Christian de Bentzmann, puis à Ghislaine de Bentzmann, épouse Batiste, puis à Nicole Batiste, épouse Dousseau de Bazignan. Leur fille Pauline  a épousé un homme politique Bruno Le Maire en 1998. Propriétaire aujourd'hui la famille de Bentzmann.","architecture":"Trenquelléon est un manoir construit au XIIIe siècle sur une motte, composé d'une tour de garde encore visible aujourd'hui derrière la château actuel. Cet édifice permettait de surveiller toute la vallée de cet endroit. Il faudra attendre le XVIIIe siècle pour voir apparaître sur les ruines de ce manoir le château actuel, édifié entre 1750 et 1771. Son caractère versaillais est unique dans la province de Gascogne. Un pavillon central   coiffé d'un petit fronton posé au dessus de la porte d'entrée, sur une belle terrasse un escalier en fer à cheval qui relie  la cour d'honneur, le long bâtiment sans étages, au toit de tuile  en faible pente, se termine à chacune de ses extrémités par un pavillon couvert d'un énorme toit en d'ardoise à la mansart mais avec un galbe arrondie en dôme.  Le château est un M.H, qui appartient à la famille de Charles Battiste, notre ancien et fervent secrétaire général de la FNASSEM disparu il y a 1 an et qui nous avait déjà alerté du projet.","habitants":"Famille de  Daniel du Broqua \r\n        \r\n        \"","divers":"Château de Trenquélléon et de salles grav 5 à Feugarolles","gps":"","images":["../../jctruffet.com/image/image_47/47_Trenquelleon_1.jpg","../../jctruffet.com/image/image_47/47_Trenquelleon_2.jpg","../../jctruffet.com/image/image_47/47_Trenquelleon_3.jpg","../../jctruffet.com/image/image_47/47_Trenquelleon_4.jpg","../../jctruffet.com/image/image_47/47_Trenquelleon_5.jpg"]},"Consult_chateau_formulaire9b4f":{"id":"Consult_chateau_formulaire9b4f","dept":"47","canton":"Fumel","commune":"Trentels","nom":"Trentels","type":"Château","periode":"XV-XVI","histoire":"Plusieurs châteaux à Trentels dont celui  de  la Chapelle, de Roques,  Laval  (voir article) des Ondes  et Lustrac avec son Moulins (voir article) de Rigoulières (voir article).                                              CHAPELLE, la construction du château est à placer dans un contexte de migration de grandes familles vers lAgenais au XVe siècle,  La première mention du château napparaît pourtant quen 1532, date à laquelle un certain Antoine de Pontajou est désigné sous le titre de « sieur de Lachapelle-Trentels ». Il est toutefois probable quil ait été élevé à lemplacement dun édifice plus ancien. \r\nROQUES, construit au XVIe siècle. Il est inscrit aux M.H en 1982.   \r\nONDES, les éléments bâtis subsistant ne paraissent pas antérieurs à la fin du XVe siècle. Aux XVIe et XVIIe siècles, la seigneurie est détenue par la famille de Lagoutte de Lapoujade, pour laquelle le manoir est agrandi et remanié. En 1693, vendu par François de Lagoutte, il est acquis par Gratien de Roussanes, famille issue des environs de Clairac qui le conserve jusqu'à la fin de l'Ancien Régime.   il est construit ou reconstruit au XVe siècle avec le moulin sur le Fon Goudal. Il est lié à l'écluse éponyme. Ne subsiste de l'édifice que le corps de logis, les autres parties ayant été détruites au XIXe siècle pour la construction d'une route et de la voie ferrée.","architecture":"Chapelle, ces familles venant surtout du Quercy ou de Rouergue commandent un nombre important de constructions de repaires nobles comme cest ici le cas de style maison forte, daprès le type dappareil employé dans la construction et les détails architecturaux, la construction se situe entre le XVe et le XVIe siècle, la présence de sculptures aux entrées du château témoigne de limportance de la famille qui fait construire cette demeure à cette époque.     Roques manoir bâti sur un promontoire, au-dessus de la plaine du Lot. La partie ouest est construite sur un plan carré. S'y accole à l'est un bâtiment, peut-être plus récent et remanié, l'édifice conserve de nombreux éléments anciens : fenêtres à meneaux ; logette à fronton triangulaire et échauguette sur la façade ouest.                                                                              Ondes,  le procès verbal d'estimation de la propriété durant la Révolution présente un édifice de trois étages, avec cour,  le plan cadastral de 1830 montre un ensemble de bâtiments attenants construits sur une cour en U.  De l'ancien manoir dominant le cours du Lot, seul subsiste le logis, il forme un corps rectangulaire de deux étages, flanqué de deux corps de logis quadrangulaires adossés aux extrémités des élévations antérieures et postérieures.","habitants":"Antoine de Pontajou                                                    Famille de Lagoutte de Lapoujade\r\n        \r\n        \"","divers":"Château de la Chapelle grav 1, des Ondes grav 2, et de Bon-Etat gran 4 à Trentels","gps":"","images":["../../jctruffet.com/image/image_47/47_Trentels_1.jpg","../../jctruffet.com/image/image_47/47_Trentels_2.jpg","../../jctruffet.com/image/image_47/47_Trentels_3.jpg"]},"Consult_chateau_formulaired75f":{"id":"Consult_chateau_formulaired75f","dept":"47","canton":"Fumel","commune":"Thézac","nom":"Trichot_Gabertie","type":"Château","periode":"XVI","histoire":"TRICHOT, les travaux sont  réalisés par Jean de Guilhem qui appartenait à une famille protestante bien positionné dans les environs de Tournon-d'Agenais.  Dans la même période les dépendances sont modifiées. La dépendance intégrée à l'enceinte porte la date de 1734 sur une pierre du portail. Durant la deuxième moitié du XVIIIe siècle, le manoir devient la propriété de la famille de Montpezat de Poussou, branche cadette de la famille de Montpezat. Le portail Nord-Ouest portant la date de 1886 est un remploi. La métairie a été construite dans le courant du XIXe siècle. Le château a été inscrit au M.H le 19 décembre 1996.                                                                                GABERTIE, manoir construit à la fin du XVIe ou au début du XVIIe siècle, pour la famille protestante des Guilhem, d'une noblesse de robe bien implantée dans les environs de Tournon. Un testament de 1690 mentionne La Gabertie, alias la Sabelle, dans les possessions de Jean de Guilhem et de son épouse Sara de Lard. Le manoir passe au début du XVIIIe siècle à Abraham de Faure, conseiller du Roi et lieutenant général de police de Tournon.","architecture":"Trichot, un premier corps de logis est construit dans la deuxième moitié du XVIe siècle ou au début du XVIIe siècle. En 1677, un nouveau corps abritant l'escalier est construit contre le premier corps de logis ainsi qu'un mur de clôture (date gravée sur l'agrafe de la porte et dans un cartouche du portail). Les travaux sont réalisés par Jean de Guilhem. Ce corps de bâtiment est agrandi durant la première moitié du XVIIIe siècle.                                                         GABERTIE,  construit aux XVe-XVIe siècles, le manoir de la Gabertie, est un ensemble architectural dun très réel intérêt, un puits est creusé dans la cour, le mur de margelle est reconstruit et des ouvertures sont percées, éléments protégés MH: le logis formé de deux ailes, le sol de la cour et les vestiges de sa clôture, le puits et le four, les façades et les toitures des communs et de la métairie, le puits de 22 m dans la cour,  il conserve une certaine austérité et une allure franchement défensive, inscription au M.H  par arrêté du 28 octobre 1996.","habitants":"Famille de Montpezat                                                 Famille de Jean de Guilhem\r\n        \r\n        \"","divers":"Château de Trichot et Gabertie et de Thézac grv 7.","gps":"","images":["../../jctruffet.com/image/image_47/47_Trichot_Gabertie_1.jpg","../../jctruffet.com/image/image_47/47_Trichot_Gabertie_2.jpg","../../jctruffet.com/image/image_47/47_Trichot_Gabertie_3.jpg","../../jctruffet.com/image/image_47/47_Trichot_Gabertie_4.jpg","../../jctruffet.com/image/image_47/47_Trichot_Gabertie_5.jpg","../../jctruffet.com/image/image_47/47_Trichot_Gabertie_6.jpg","../../jctruffet.com/image/image_47/47_Trichot_Gabertie_7.jpg"]},"Consult_chateau_formulaire87a1":{"id":"Consult_chateau_formulaire87a1","dept":"47","canton":"Tonneins","commune":"Verteuil d","nom":"Verteuil","type":"Château","periode":"XIII-XVII","histoire":"VERTEUIL dit des vallons, plusieurs documents attestent des différents propriétaires du château, les plus anciens documents remontant à 1259. À cette époque, il est la propriété de la famille des Caumont, avant dêtre celle des Pins. En 1286, ce sont les Guilhem-Raimond qui leur succèdent, puis la famille dAlbret à partir de 1390. La première mention du \"castrum\" de Verteuil date de 1259. À cette date il est réparti entre plusieurs coseigneurs appartenant aux familles de Caumont et de Pins. Le château primitif était un château sur motte autour duquel s'est développé le village. La seigneurie appartenait aux d'Albret en 1390. Il est sorti en ruine de la guerre de Cent Ans. La seigneurie est donnée à Arnaud de Caumont, seigneur de Lauzun, en 1460. Celui-ci a donné la maison noble de Roquepiquet en 1470 à Mathurin de Gervain. La tour heptagonale voûtée d'ogives située au nord-ouest, reliée à une courtine, date de la fin du XVe siècle.","architecture":"Verteuil, mentionné pour la première fois en 1259,Le château primitif sur motte, détenu par les Albret depuis 1390, est en ruine au sortir de la guerre de Cent Ans, Le bourg de Verteuil s'est développé au Moyen Age autour du château médiéval qui appartient à la famille de Caumont et qui fut remplacé au  XVIIe siècle par le château actuel, partiellement ruiné. Le corps de logis principal, au sud-est avec une aile ruinée en retour déquerre au nord  a été construit à la fin du XVIe siècle ou au début du XVIIe siècle. Le corps ouest a été remanié vers 1839, date dun devis établi par Sarrazi afin dinstaller une école dans cette partie du château. Bâti en pierre de taille de tuf, il forme grossièrement un triangle, dont la base serait constituée par le corps de logis sud-est et le sommet par la tour nord-ouest.L'ensemble du bâtiment a  était abandonné en 1996.  rebaptisée château des Vallons et transformée en hôtel.Le château a été inscrit au titre des M.H le 10 janvier 1996. Le château des Vallons est partiellement classé M.H.","habitants":"Famille de Caumont\r\n        \r\n        \"","divers":"Château de Verteuil","gps":"","images":["../../jctruffet.com/image/image_47/47_Verteuil_1.jpg","../../jctruffet.com/image/image_47/47_Verteuil_2.jpg","../../jctruffet.com/image/image_47/47_Verteuil_3.jpg","../../jctruffet.com/image/image_47/47_Verteuil_4.jpg"]},"Consult_chateau_formulairef80c":{"id":"Consult_chateau_formulairef80c","dept":"47","canton":"Lavardac","commune":"Vianne","nom":"Vianne","type":"Bastide","periode":"XV-XVIII","histoire":"A Vianne bastide avec le château de La Roche et de Naudet                                                                          VIANNE, sous Louis XIV, en 1651, Vianne fut cédée au duc de Bouillon, Frédéric-Maurice de la Tour d'Auvergne, vicomte de Turenne, prince étranger, ce qui lui permettra d'être une des très rares bastides à n'avoir pas eu ses fortifications détruites. À la Révolution, la commune de Vianne regroupe les paroisses de Notre-Dame de Vianne et de Sainte-Marthe. Entre 1839 et 1853, se construit un pont-canal, au-dessus de la Baïse en pierre de taille du Quercy.  Cette « tour du Moulin » a perdu ses créneaux, cest la seule porte qui est découronnée, mais sa structure est intacte, et une large feuillure nous apprend quelle était munie dune grosse herse, comme les trois autres, et dune très grosse porte dont les gonds sont encore visibles. \r\n Manoir de LAROCHE, en 1604, dans le répertoire de Lacapère, Lagrange est mentionnée comme annexe de Sainte-Marthe En 1790, l'église Sainte-Marthe étant en ruine, la paroisse est transférée dans la chapelle de Lagrange. Le château devient la propriété de l'écrivain Marcel Prévost, qui y mourut en 1941.  L'ancien logis manorial est restauré à cette occasion, avec un toit en terrasse au sud, un décor troubadour dans la pièce nord à l'étage, et la réfection des ouvertures. Corps de bâtiment néo classique couvert en terrasse.        NAUDET pas d'information historique.","architecture":"Château de la ROCHE de la fin du XVe ou du début du XVIe siècle, constitué de deux pièces par étage desservies par un escalier à vis hors-oeuvre dans une tour flanquant la façade. La tour d'escalier est percée d'arbalétrières. Construction d'un logis neuf face à l'ancien au XVIIIe siècle. Dépendances de la cour ouest bâties après 1837. Au début du XXe siècle, un corps de bâtiment est bâti à l'Est face à la Baïse, dans un style néo-classique que soulignent l'emploi d'une pierre blanche en parement, la composition surmontée d'un attique, de décor de balustres et de guirlandes. Le logis daterait du XVIe siècle, mais il a été en partie reconstruit au XXe siècle.                                       NAUDET, un édifice à cour fermée figure sur le plan cadastral de 1837. Seule l'aile nord a été partiellement conservée, les ailes ouest et sud ont été détruites et l'aile Est reconstruite: malgré le remaniement de toutes les ouvertures, l'aile nord possède des élévations en pierre de taille et une tour d'angle qui pourraient remonter au XVIe siècle et indiquer une ancienne maison-forte. Le pigeonnier, restauré récemment, a été construit au XVIe ou au XVIIe siècle. L'aile orientale a été édifiée au début du XXe siècle, avec une galerie sur cour inspirée des galeries de la Renaissance, comme celle du château de Nérac. Les dépendances agricoles bâtis à la fin du XIXe siècle situées en face de Naudet, au bord de la route, étaient  celles du château. Elévation sur cour de l'aile nord et tour nord-ouest en pierre de taille, les autres élévations sont en moellons. Pigeonnier polygonal en pan de bois avec hourdis en brique, couvert d'un toit en pavillon.","habitants":"Frédéric-Maurice de la Tour d'Auvergne               Ecrivain Marcel Prévost\r\n        \r\n        \"","divers":"Remparts de Vianne  le château de La Roche grav de 4 à 8 et la porte du Moulin grav 9","gps":"","images":["../../jctruffet.com/image/image_47/47_Vianne_1.jpg","../../jctruffet.com/image/image_47/47_Vianne_2.jpg","../../jctruffet.com/image/image_47/47_Vianne_3.jpg","../../jctruffet.com/image/image_47/47_Vianne_4.jpg","../../jctruffet.com/image/image_47/47_Vianne_5.jpg","../../jctruffet.com/image/image_47/47_Vianne_6.jpg","../../jctruffet.com/image/image_47/47_Vianne_7.jpg","../../jctruffet.com/image/image_47/47_Vianne_8.jpg","../../jctruffet.com/image/image_47/47_Vianne_9.jpg"]},"Consult_chateau_formulaire7bf8":{"id":"Consult_chateau_formulaire7bf8","dept":"47","canton":"Casteljaloux","commune":"Villefranche du Queyran","nom":"Villefranche_Queyran","type":"Château","periode":"XV","histoire":"Villefranche-du-Queyran, cette bastide du XIIIe siècle, se blottit dans la vallée de l´Ourbise, petite rivière où l'on pêche la truite et qui sépare la cité des communes voisines. Elle est l´une des 18 Villefranche de France, mais pas la plus petite. Les flâneurs y découvriront le château ancien rendez-vous de chasse d'Henri IV, le vert galant aujourd'hui propriété privée, les restes des remparts, la halle, les maisons à colombages, .            A 10 kilomètres au nord-est le château de Morin du XIXe siècle à Puch d'Agenais chambres d'hôtes.","architecture":"Villefranche, tour de garde, vestiges du château du XIIIe  Les premiers donjons sont construits en bois et positionnés sur une butte afin de dominer les environs. Mais le château de bois sest révélé très rapidement trop fragile pour résister aux attaques. Les châteaux forts sont donc dorénavant bâtis en pierre.","habitants":"Henri IV\r\n        \r\n        \"","divers":"Château de Villefranche de Queyran et le château Morin à Puch d'Agenais grav 5","gps":"","images":["../../jctruffet.com/image/image_47/47_Villefranche_Queyran_1.jpg","../../jctruffet.com/image/image_47/47_Villefranche_Queyran_2.jpg","../../jctruffet.com/image/image_47/47_Villefranche_Queyran_3.jpg","../../jctruffet.com/image/image_47/47_Villefranche_Queyran_4.jpg","../../jctruffet.com/image/image_47/47_Villefranche_Queyran_5.jpg"]},"Consult_chateau_formulaired586":{"id":"Consult_chateau_formulaired586","dept":"47","canton":"Villeneuve sur Lot","commune":"Villeneuve sur lot","nom":"Villeneuve_Lot","type":"Château","periode":"XII-XV","histoire":"Trois châteaux à Villeneuve sur Lot celui Lamothe (voitr article) Sylvestrie et Rogé                                SYLVESTRIE Sur le rebord du plateau dominant la vallée de Cambes est une maison noble édifiée au XIIIe siècle et remaniée au tournant des XVe et XVIe siècles. En 1492, Pierre d'Hébrard fit hommage au Baron de Pujols, Renaud de Saint-Chamans alors Sénéchal des Landes, de cette maison noble qui devient par la suite propriété de Jean de la Fabrie en 1597,L'hommage de la maison noble de la Sylvestrie fut rendu le 27 août 1764 par François de la Fabrie à François de Gombaut, Baron de Pujols.     fermé par une cour médiévale, le château de la Sylvestrie est un bâtiment en L formé de deux logis disposés en retour d'équerre, appuyés contre l'enceinte. Sur rendez-vous et seulement en haute saison, venez découvrir l'escalier à vis rajouté au XVe siècle, ainsi que quelques beaux exemples de sols et de plafonds anciens.","architecture":"SYLVESTRIE est un bâtiment en L fermé par une cour médiévale, dont la construction s'étage entre le XIIe et XVe siècle. Jean de la Fabrie acquit la Sylvestrie en 1597. Celle-ci resta dans la famille jusqu'au XIXe siècle.                                           VILLENEUVE, le château est doté d'une cour intérieure, de meurtrières, fenêtres à meneau, escalier d'époque en colimaçon et d'une salle voûtée, les parties les plus anciennes datent du XVIe et XVIIIe siècle.","habitants":"Famille de Pierre d'Hébrard\r\n        \r\n        \"","divers":"Château de la Sylvestrie grav 4 et de Massanes grav 5 à Villeneuve sur Lot","gps":"","images":["../../jctruffet.com/image/image_47/47_Villeneuve_lot_1.jpg","../../jctruffet.com/image/image_47/47_Villeneuve_lot_2.jpg","../../jctruffet.com/image/image_47/47_Villeneuve_lot_3.jpg","../../jctruffet.com/image/image_47/47_Villeneuve_lot_4.jpg","../../jctruffet.com/image/image_47/47_Villeneuve_lot_5.jpg","../../jctruffet.com/image/image_47/47_Villeneuve_lot_6.jpg","../../jctruffet.com/image/image_47/47_Villeneuve_lot_7.jpg"]},"Consult_chateau_formulairedf2e":{"id":"Consult_chateau_formulairedf2e","dept":"47","canton":"Lannes","commune":"Villeneuve de Mézin","nom":"Villeneuve_Mezin","type":"Vestiges","periode":"XII","histoire":"VILLENEUVE de MEZIN    Castrum mentionné en 1287, tenu par Bertrand de Grauhet. Il est intégré à la défense de la ville par sa situation à l'angle sud-ouest, le logis est une construction du XVIe siècle sur un bâti médiéval; une tourelle dotée de canonnières surveille l'angle extérieur ; la pièce principale ou salle, se trouvait à l'étage, ouvert par des croisées.  A la fin du XVIe siècle, le château appartient à Jean de Noaillan. Le puits carré est daté de 1673. A la Révolution, lorsque Villeneuve de Mézin est vendu comme bien de l'émigré Noaillan de Villeneuve, l'édifice est réduit au rez-de-chaussée, faute d'entretien de l'étage.","architecture":"Villeneuve l'édifice date de la fin du XIIe ou du XIIIe siècle ; il est construit à l'intérieur des fortifications du castrum de Villeneuve de Mézin mentionné en 1259. A la fin du Moyen Age, de nouvelles salles hautes sont édifiées au-dessus des premières, avec chemin de ronde, créneaux et hourds, la ligne de trous de boulins en atteste. Seuls subsistent les murs bâtis sur le rempart. A la fin du XVIe ou au début du XVIIe siècle, la nef est voûtée, prenant une partie de la hauteur de la 1ère salle haute, et un 2ème vaisseau est construit au sud de la nef, les voûtes de cette dernière sont peintes au XVIIe siècle.","habitants":"Bertrand de Grauhet\r\n        \r\n        \"","divers":"Vestiges du château de  Villeneuve de Mézin","gps":"","images":["../../jctruffet.com/image/image_47/47_Villeneuve_Mezin_1.jpg","../../jctruffet.com/image/image_47/47_Villeneuve_Mezin_2.jpg","../../jctruffet.com/image/image_47/47_Villeneuve_Mezin_3.jpg"]},"Consult_chateau_formulairedd65":{"id":"Consult_chateau_formulairedd65","dept":"47","canton":"Monflanquin","commune":"Villeréal","nom":"Villereal","type":"Château","periode":"XVI","histoire":"trois châteaux à Villeréal celui de Rayet  et celui de Fontrives à Rives et celui de Ricard tous les trois chambres d'hôtes et camping                                VILLEREAL Cette « ville royale » est anglaise pendant la guerre de Cent Ans. Elle a changé plusieurs fois de suzeraineté entre 1279 et 1453.\r\nEn avril 1569, la bastide est prise et des habitants sont massacrés par un groupe de protestants venant de Bergerac. Le 25 octobre 1572, pendant les guerres de religion, la ville est prise par les protestants. Ils incendient l'église. La voûte s'effondre, elle est remplacée par un plafond lambrissé.\r\nEntre 1651 et 1652, pendant la Fronde, le marquis de Biron décide de faire occuper la bastide par une garnison de six compagnies de soldats qui saccagèrent la contrée. \r\nFONRIVES vous serez au pays des bastides, des castels, des manoirs et des forteresses, là où lart de vivre et la gastronomie règnent en maître. A lombre dun majestueux château de la renaissance, vous trouverez tout ce quil faut pour passer des vacances inoubliables,","architecture":"FONRIVES  Camping, parc d'attraction.           JOUAUDOU pas d'information      RAYET des chambres d'hôtes  vous accueillent dans un manoir du XVIIe siècle.                                                                   RICARD du XIXe siècle  chambres d'hôtes.","habitants":"Born, seigneur Jean de Dufort \r\n        \r\n        \"","divers":"Château de Fonrives grav 1 à 3, de Jouaudou  grav 4, de Rayet grav 5-6 et Ricard grav 7 à Villeréal","gps":"","images":["../../jctruffet.com/image/image_47/47_Villereal_1.jpg","../../jctruffet.com/image/image_47/47_Villereal_2.jpg","../../jctruffet.com/image/image_47/47_Villereal_3.jpg","../../jctruffet.com/image/image_47/47_Villereal_4.jpg","../../jctruffet.com/image/image_47/47_Villereal_5.jpg","../../jctruffet.com/image/image_47/47_Villereal_6.jpg","../../jctruffet.com/image/image_47/47_Villereal_7.jpg"]},"Consult_chateau_formulaire9cd3":{"id":"Consult_chateau_formulaire9cd3","dept":"47","canton":"Marmande","commune":"Virazeil","nom":"Virazeil","type":"Château","periode":"XV-XIX","histoire":"Trois châteaux celui de Virazeil, de Mathias et de Termes.                                                                      VIRAZEIL, la seigneurie a d'abord appartenu aux Caumont, ensuite  à la famille de Foix, En 1567 elle est la propriété de Françoise de Coulonges, veuve de Guillaume Le Comte, baron de La Tresne, second président au parlement de Bordeaux, puis à Jean de Belrieu après son mariage avec Marguerite Le Comte. En 1715, Catherine de Belrieu a apporté en dot le château à son mari, Henri d'Augeard, ou Daugeard, président du parlement de Bordeaux. Il est aujourd'hui attribué à Étienne Laclotte qui a construit l'hôtel des Daugeard à Bordeaux.  Le château est vendu en 1823 par le vicomte de Gervaise, gendre de M. Daugeard, à Félix-Alexandre d'Auber, second marquis de Peyrelongue. Les Auber ont élevé l'orangerie après 1823. En 1940 le colonel André d'Auber, cinquième marquis de Peyrelongue, a vendu le château à des acquereurs qui ont emporté la bibliothèque, l'argenterie, les statues.  En 1962, l'ensemble est vendu à la Ligue pour l'adaptation du diminué physique au travail. Cette nouvelle affectation a nécessité de nombreuses transformations intérieures pour les handicapés et l'édification de deux bâtiments symétriques de trois niveaux de part et d'autre de la cour d'arrivée. Le château a été inscrit monument historique le 4 mars 1964.  Il est à présent un ensemble de dispositifs encadré par l'organisation de L'ADAPT du Lot-et-Garonne, avec également un Centre de Rééducation Professionnelle (CRP) accessible aux personnes bénéficiant du statut de travailleur handicapé (RQTH).\r\nMATHIAS  et TERMES tous deux chambres d'hôtes.","architecture":"Virazeil au XVe siècle elle est passée aux Pellegrue. Ils ont construit au XVIe siècle le logis primitif présentant des éléments gothiques flamboyants placé sur une petite butte avec une basse cour, les communs et la chapelle, de plan rectangulaire à deux niveaux, fronton sur pavillon légèrement saillant de trois travées, autre fronton sur  les côtés, toit en croupe avec série de lucarnes recouvert d'ardoise et grandes cheminées. Le château que l'on peut voir de la route a été construit entre 1770 et 1774 pour Jacques Daugeard, par l'architecte Victor Louis, est actuellement un centre de rééducation.","habitants":"Famille de Françoise de Coulonges\r\n        \r\n        \"","divers":"Château de Virazeil 1et2, des Thermes 3 et de Mathias 4","gps":"","images":["../../jctruffet.com/image/image_47/47_Virazeil_1.jpg","../../jctruffet.com/image/image_47/47_Virazeil_2.jpg","../../jctruffet.com/image/image_47/47_Virazeil_3.jpg","../../jctruffet.com/image/image_47/47_Virazeil_4.jpg","../../jctruffet.com/image/image_47/47_Virazeil_5.jpg"]},"Consult_chateau_formulaire2117":{"id":"Consult_chateau_formulaire2117","dept":"47","canton":"Lavardac","commune":"Xaintrailles","nom":"Xaintrailles","type":"Forteresse","periode":"XIII","histoire":"XAINTRAILLES; le premier château est mentionné en 1259 comme tenu par trois co-seigneurs tous de la famille de Xaintrailles.  Jean Poton de Xaintrailles, compagnon de Jeanne d'Arc, mort en 1461, puis ses successeurs Bernard de Lamothe, et Antoine de Chamborel, gouverneurs de Casteljaloux,  En 1570  le château passe à la famille de Montesquiou, ensuite par mariage dans la famille de Lau de Lusignan en 1724. Vers 1780 Armand de Lau, marquis de Lusignan, qui à épousé Gabrielle de Montesquiou de Xaintrailles, fait combler les fossés et aménager un accès par l'ouest.  le dernier des Lusignan Armand-François-Maximilien s'éteint en 1844 sa veuve Madeleine Josephine d'Aymah de Châteaurenard décédée en 1863 engagent d'importantes restaurations par Viollet-le-Duc dans le style médiévales et en 1863 pour la première fois de son histoire le château est vendu.","architecture":"La construction du château de Xaintrailles date du XIIe siècle. C'est un manoir de style Médiéval. Il a été construit au début du XIIIe siècle. Il reste la basse-cour médiévale, le donjon et les talus des murs sud et ouest. les successeurs firent réaliser des constructions au XVe siècle : deux tours et le corps de logis nord. Au XVIe siècle, les tourelles sur trompe en éventail de l'élévation sud et des fossés et un pont-levis sont rajoutés et mentionnés en 1539.  En 1824, les pièces Nord-Est s'effondrent. En 1843, le donjon est partiellement restauré sur le projet de Gustave Bourières, architecte du département. La partie la plus ancienne du château est le donjon du XIIIe siècle percé de fenêtres au XVe siècle. Le corps de logis nord du XVe siècle comporte un étage carré et deux étages de comble et un toit en croupe et à longs pans couvert de tuiles plates. Il possède comme le donjon, un escalier hors-d'uvre. Le bâtiment sud d'un étage et combles et tourelles est réaménagé (cuisines). L'aile ouest est encadrée de deux tours. L'escalier en U et le vestibule ont été aménagés au XVIIIe siècle.   Le château de Xaintrailles est classé aux M.H. depuis 1840 .","habitants":"Famille de Xaintrailles\r\n        \r\n        \"","divers":"Château de Xaintrailles.","gps":"","images":["../../jctruffet.com/image/image_47/47_Xaintrailles_1.jpg","../../jctruffet.com/image/image_47/47_Xaintrailles_2.jpg","../../jctruffet.com/image/image_47/47_Xaintrailles_3.jpg","../../jctruffet.com/image/image_47/47_Xaintrailles_4.jpg","../../jctruffet.com/image/image_47/47_Xaintrailles_5.jpg","../../jctruffet.com/image/image_47/47_Xaintrailles_6.jpg","../../jctruffet.com/image/image_47/47_Xaintrailles_7.jpg","../../jctruffet.com/image/image_47/47_Xaintrailles_8.jpg","../../jctruffet.com/image/image_47/47_Xaintrailles_9.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','47 — Lot-et-Garonne'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)showDet(start);
</script></body></html>
