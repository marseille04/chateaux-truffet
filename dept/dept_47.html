cor fait d'arcades en plein cintre, rythmées de pilastres cannelés à chapiteaux corinthiens. Commun sud daté de 1825. Pigeonnier de plan carré sur arcades. De l'ancien jardin qui s'étendait à l'est, subsiste un bassin circulaire. Le ruisseau est enjambé par deux ponts en brique.","habitants":"Jean Charles du Cauzé de Nazelle \r\n        \r\n        \"","divers":"Chaâteau de Nazelles à Caudecoste","gps":"","images":["../../jctruffet.com/image/image_47/47_Nazelles_1.jpg"]},"Consult_chateau_formulairefcae":{"id":"Consult_chateau_formulairefcae","dept":"47","canton":"Nérac","commune":"Nérac","nom":"Nerac_Chateau","type":"Château","periode":"XV-XVI","histoire":"A Nérac, châteaux de Cazal du Bosc, le Doazan, le Frandat, l'hotel de Birac,le Vert-Galand et les vestiges de Nazaret.                                                                        Cinq châteaux à Nérac celui d'Henri IV; de Bournac, de Tastat  de Lagrange Morepos  et de Séguinot (voir article pour ces cinq)                                         FRANDAT est maintenant une aventure familiale. Laetitia et Mickaël Le Biavant, deuxième génération installée depuis 2008, proposent leurs productions en Floc de Gascogne.                                                     NAZARET Vestiges du  XIIIe siècle, le château de Nazareth sélève sur les bords de la Baïse, à Nérac. Il est situé sur un site défensif doù lon peut correspondre par signaux avec le château dEspiens et la tour de Barbaste.Lédifice est construit entre 1259 et 1287 par les Albret, seigneurs de ce castrum autour duquel sest formé une agglomération.","architecture":"CAZAL du BOSC, dans le rôle des impositions de 1611, le Cazau du Bosq, propriété de Birac, est dit en forme de tour: on peut supposer l'existence d'une maison forte ; la fontaine ornée d'un mufle de lion évoque la fontaine Saint Jean à Nérac; à la fin du XVIIIe ou début du XIXe siècle, construction du corps de logis oriental et remaniements de l'élévation ouest avec modification de la toiture et des ouvertures; construction de l'aile nord cantonnée d'une tour, avant 1813, date du cadastre ; construction de l'aile sud en pendant au cours du XIXe siècle, donnant à l'édifice l'ampleur d'un château ;les toitures en pavillon ont gardé des girouettes métalliques, élévation Est en pierre de taille; tours couvertes en tuiles plates; tours orientales couvertes de toits coniques, tours occidentales et corps de logis central de toits en pavillon, ailes latérales de croupes.","habitants":"Bernard de Bournac                                                       Amadon Delart,\r\n        \r\n        \"","divers":"Plusieurs châteaux à Nèrac celui du Bosc grav 3, de Douazan grav 4 -5, Frandat 6, Birac 7 et St-Martin 9.","gps":"","images":["../../jctruffet.com/image/image_47/47_Nerac_Chateau_1.jpg","../../jctruffet.com/image/image_47/47_Nerac_Chateau_2.jpg","../../jctruffet.com/image/image_47/47_Nerac_Chateau_3.jpg","../../jctruffet.com/image/image_47/47_Nerac_Chateau_4.jpg","../../jctruffet.com/image/image_47/47_Nerac_Chateau_5.jpg","../../jctruffet.com/image/image_47/47_Nerac_Chateau_6.jpg","../../jctruffet.com/image/image_47/47_Nerac_Chateau_7.jpg","../../jctruffet.com/image/image_47/47_Nerac_Chateau_8.jpg","../../jctruffet.com/image/image_47/47_Nerac_Chateau_9.jpg"]},"Consult_chateau_formulaire0d6e":{"id":"Consult_chateau_formulaire0d6e","dept":"47","canton":"Nérac","commune":"Nérac","nom":"Nerac_Henri_IV","type":"Forteresse","periode":"XIV","histoire":"NERAC-HENRY-IV: une demeure seigneuriale, appartenant à Arsieu d'Olbion, est mentionnée en 1088 ; un château est tenu par Amanieu VI d'Albret en 1259 , fut le centre d'une cour brillante, en 1530 Jeanne dAlbret, fille de Marguerite dAngoulême et de Navarre (sur de François 1er ) et de Henri dAlbret, épouse dAntoine de Bourbon, a de la sympathie pour la Réforme et Luther. En 1560, dans la cathédrale de Pau, elle fait profession de foi et la religion réformée devient la religion officielle dans ses états et possessions. En 1572, elle sinstalle à Nérac avec son fils Henri (futur Henri IV). Duplessis Mornay, chef protestant, rejoint Henri de Navarre dont il devient le conseiller et lambassadeur. Théodore de Béac, invité par le roi, prêche dans léglise St Nicolas et écrit à Calvin « les choses vont de mieux en mieux ». Cest lapogée de la Réforme Pacifique. Pas de persécutions armées, car lAlbret et le Béarn sont sous lautorité du roi de Navarre. En 1572 une deuxième Marguerite de Valois allait enrichir  la notoriété du lieu, la fille d'Henri II et de Catherine de Médicis qui épousa  le futur  Henri IV est entra dans l'histoire sous le nom de la reine Margot elle s'installa en 1576 à Nérac et en 1589 : Henri IV, roi de Navarre, devient roi de France et quitte Nérac. La Maison des Conférences où furent négociés vers 1580 les préalables de l'Edit de Nantes. Ce magnifique édifice menace ruine, mais la municipalité vient de décider de le réhabiliter (fin 2006). aujourd'hui abrite deux musées celui de l'archéologique et celui à la famille d'Albret.","architecture":"Nérac, l'édifice est reconstruit entre le XIVe et la fin du XVIe siècle, au moment de l'apogée de la famille d'Albret, sur un plan quadrangulaire, l'aile est construite peu après dans la 1ère moitié du XVIe siècle, aile sud de la 2e moitié du XVIe siècle, en 1584 notamment, sous le règne d'Henri III de Navarre ; la chambre de l'édit de Guyenne et la chambre des comptes y sont logées ; en 1783, l'aile orientale est en ruines ; le château est démantelé sous la Révolution, seul reste l'aile nord ; en 1867, la municipalité décide d'y installer l'hôtel de ville : Eugène Viollet le Duc dessine un projet de restauration avec construction d'un nouveau corps de bâtiment derrière l'aile existante, projet non réalisé faute de financements ; en 1924, expropriation des occupants du château, démolition du bâti dans la cour, restauration de la charpente, de la couverture, de la façade et de l'intérieur sous la direction de l'architecte Poutaraud, restaurations plus ponctuelles sous la direction de Mastorakis, architecte en chef des M.H en 1968.","habitants":"Amanieu VI d'Albret \r\n        \r\n        \"","divers":"Château d'Henry-IV à Nérac et la mairie grav 6.","gps":"","images":["../../jctruffet.com/image/image_47/47_Nerac_Henri_IV_1.jpg","../../jctruffet.com/image/image_47/47_Nerac_Henri_IV_2.jpg","../../jctruffet.com/image/image_47/47_Nerac_Henri_IV_3.jpg","../../jctruffet.com/image/image_47/47_Nerac_Henri_IV_4.jpg","../../jctruffet.com/image/image_47/47_Nerac_Henri_IV_5.jpg","../../jctruffet.com/image/image_47/47_Nerac_Henri_IV_6.jpg"]},"Consult_chateau_formulaire2e3c":{"id":"Consult_chateau_formulaire2e3c","dept":"47","canton":"Penne d","commune":"Penne d","nom":"Noaillac","type":"Forteresse","periode":"XV","histoire":"NOAILLAC,  du XVe siècle, est une co-seigneurie par les familles de Bonal et de Latour. Charles de Montpezat est seigneur de la terre de Noaillac. Il a rendu hommage au roi le 20 août 1472 des châteaux et châtellenie de Montpezat, Linias, Aiguillon, Pressas, Dolmayrac et terre de Noaillac avec ses appartenances dans la juridiction de Penne. Sa sur, Esther de Montpezat, mariée à Hélie de Bonal, en hérite à sa mort. Son fils, Jean de Bonal, est seigneur de Noaillac, Bonal-la-Roquette et la Tour de Lascombes. Yon de Bonal rend hommage au roi François Ier le 5 avril 1540 pour ses terres de Noaillac, Bonal-la-Roquette et LaTour de Lascombes. En 1572, Antoine de Latour vend le château à Antoine de Ladugie. Sa fille unique, Catherine de Latour, se marie en 1587 avec le capitaine huguenot Jean de Vivans, fils de Geoffroy de Vivans. La seconde résidence est délaissée et des travaux importants sont faits dans la première résidence à la fin du XVIe siècle et les premières décennies du XVIIe siècle. Leur fils, Pierre de Vivans, marié avec Marie Daussy, meurt avant 1656. Leur fille, Anne de Vivans de Noaillac, s'est mariée en 1656 avec Jean de Vivans, sieur de Launay, décédé en 1691, sans descendance. Henri de Vivans, son frère, brigadier de cavalerie, sieur de Launay, de Saint-Christau, seigneur de Noaillac est marquis de Vivans. Il s'est marié en 1655 avec Suzanne de Capvert, décédée en 1704. Leur fils Jean de Vivans, lieutenant général des armées du roi, est marquis de Noaillac, mort en 1719. Il est marié à Louis de Meuves (1701-1752) dont il a une fille, Suzanne-Marie de Vivans, marquise de Noaillac, mariée en 1722 avec Pierre-Antoine de Jaucourt (1687-1780), marquis de Chantôme. La seigneurie de Noaillac est érigée en marquisat en 1696. Le 13 septembre 1776, Bernard Dedieu, Ecuyer, conseiller secrétaire du Roy, contrôleur en la chancellerie près de la cour des Aides de Guyenne, seigneur de la baronnie de Samazan, acheta le château à Armand de Jaucourt. Décédé en 1788 à Saint-Domingue. Il fut la propriété de Dedieu de Sémazan-Pouyleton et aujourd'hui à Gérard de Louvigny..","architecture":"Noaillac,  l'emplacement a dû connaître une occupation très ancienne, et peut-être avoir un bourg médiéval. A l'ouest, une première enceinte barrait le plateau en s'appuyant sur l'écurie actuelle. Devant la façade nord, une seconde cour était délimitée par un mur tiré entre les deux tours carrées du nord faisant saillie. Le château présente une masse à deux niveaux, couverte d'un toit brisé en tuiles. Un donjon ancien, du XIIIe siècle, constitue le noyau central. Une salle voûtée plein cintre est accolée au nord, au pied du donjon. Elle a sans doute été complétée au XVIIe siècle d'un étage. A l'extrémité nord-ouest de ce bâtiment une tour carrée a été bâtie en hors-oeuvre pour surveiller l'ancienne entrée. A l'est une seconde tour carrée complète ce premier dispositif. A la Renaissance, une tour hexagonale est créée dans l'angle formé par la saillie des bâtiments pour loger un escalier à vis. A l'est, s'appuyant contre le donjon, est élevé un corps de bâtiment qui s'ouvrait sur la terrasse. Au sud et à l'ouest, la construction contourne l'ancien donjon et comporte des pièces à plafond à solives apparentes. Plus au nord se trouve la chapelle castrale. Un bâtiment couvert de tuiles canal fait suite à l'église et s'appuie sur deux tours rondes. Une tour carrée avec des pièces intérieures primitivement en coupoles ferme la première enceinte au nord ouest. En contrebas, un pigeonnier rectangulaire en pans de bois et briques, construit sur huit colonnes en pierre. A l'ouest, les anciennes écuries ferment l'esplanade.","habitants":"Famille de Charles de Montpezat \r\n        \r\n        \r\n        \"","divers":"Château de Noaillac","gps":"","images":["../../jctruffet.com/image/image_47/47_Noaillac_1.jpg","../../jctruffet.com/image/image_47/47_Noaillac_2.jpg","../../jctruffet.com/image/image_47/47_Noaillac_3.jpg","../../jctruffet.com/image/image_47/47_Noaillac_4.jpg"]},"Consult_chateau_formulairee687-2":{"id":"Consult_chateau_formulairee687-2","dept":"47","canton":"Duras","commune":"Pardaillan","nom":"Pardaillan_47","type":"Château","periode":"XVI","histoire":"PARDAILLAN, noble de Pardaillan, épouse le 28 juillet 1568 Geoffroy dAulède, écuyer, seigneur de Castelmoron, fils de Pierre dAulède, écuyer, seigneur du Cros et de Castelmoron et de Jeanne de Millac. Cest ainsi que la maison noble de Pardaillan entre par alliance dans la puissante famille des dAulède. De naissance en naissance, Pardaillan reste entre les mains des DAulède, jusquà la Révolution. Pendant ce temps et de mariage en mariage, Pardaillan « sétoffe » et participe modestement à lhistoire.  En effet, Geoffroy DAulède, veuf, se remarie le 13 janvier 1585 avec Jacquette de Lestonnac, nièce de Montaigne et sur de Jeanne connue sous le nom de « Vénérable mère de Lestonnac », marquise de Monferrand de Landiras, veuve, elle fonde à Bordeaux en 1608, lordre des religieuses Filles de Notre Dame qui existe toujours. En 1826, le pape Léon XII prononcera sa béatification. Pardaillan est alors vendu comme bien national le 4 juin 1794. Les bâtiments et 34 journaux de terres  à Auguste Decazes Jeune agriculteur et sans doute ancien fermier de Pardaillan. Il passe ensuite aux mains des Lacaze par contrat de mariage le 3 mars 1802, entre Mr François Vincent Lacaze  et madame Catherine Decaze, fille de Pierre-François, Président du Tribunal de 1ére Instance de Libourne. Le château entre par mariage dans la famille d'Aulède qui en sera chassée à la Révolution. En 1862 de grands travaux de modernisation donnent à Pardaillan son aspect actuel, en 1909 début de l'aventure Roquefeuil à Pardaillan, Anthony de Roquefeuil et Jeanne du Perrier de Larsan achètent la propriété aux héritiers de M. Albert Lacaze.","architecture":"En 1862,  cest à cette époque quEugène Lacaze décide dentreprendre les grands travaux de modernisation du XIXe siècle : Suppression de la cour fermée et des communs, démolition de la tour descalier, transformation de la plupart des ouvertures, adjonction de deux corps de bâtiments, nouveaux emménagements intérieurs, la forme des toits, les rampants décorés et quelques ouvertures gardent encore les caractères du XVe siècle.\r\nCes  grands travaux de modernisation donnent à Pardaillan son aspect actuel.\r\nLes héritiers de Mr Albert Lacaze et malgré une dernière modification architecturale et à la mode de lépoque, remplaça les tuiles plates par des ardoises. Pardaillan garde toujours son caractère noble et accueillant, et surtout sa vocation viticole que les Roquefeuil semploient depuis trois générations à perpétuer le mieux possible.","habitants":"noble de Pardaillan\r\n        \r\n        \r\n        \"","divers":"Château de Pardaillan","gps":"","images":["../../jctruffet.com/image/image_47/47_Pardaillan_47_1.jpg","../../jctruffet.com/image/image_47/47_Pardaillan_47_2.jpg"]},"Consult_chateau_formulaireeff3":{"id":"Consult_chateau_formulaireeff3","dept":"47","canton":"Agen","commune":"Boé","nom":"Pelissier_Bezat","type":"Château","periode":"XV","histoire":"PELISSIER, madame Daisy Delettre, actuelle propriétaire de ce domaine, a bien voulu nous donner quelques précisions relatives aux origines de cette motte. Ces renseignements viennent compléter ceux fournis par la monographie de Pierre Louis Alezay.  Au XVe siècle, la famille de Godailh en est seigneur. Au XVIe siècle, Pélissier est acheté par le juge Mage Jacques de Sévin. Hermard de Sévin, son petit-fils, entreprend en 1583 la construction du château actuel autour de l'ancienne maison forte. La famille De Sévin conservera Pélissier jusqu'en 1709, date à laquelle il passe aux mains d'Antoine Muraille.\" Pierre Louis Alezay nous précise ensuite que Pélissier fut vendu successivement en 1791 à Mme de Longeval, puis aux Rangouses, banquiers agenais du début du XIXe siècle qui, à la suite de mauvaises affaires cédèrent le domaine au trésorier payeur général d'Agen, M. Pernot de Fontenay. En 1844, Pélissier appartient à Michel Pomarède et vers 1860 les frères Aunac, banquiers connus sur la place d'Agen, prennent possession du domaine. Légué à Mme Amblard-Delettre, il est actuellement la propriété de Mme Daisy Delettre, sa fille.","architecture":"Pélissier était un domaine agricole sur lequel une petite maison forte fut construite au XIVe siècle, pour surveiller la Garonne en aval du gué, corps de logis rectangulaire à deux niveaux accolé d'une tour hexagonal à quatre niveaux crénelées avec des  bâtiment en retour d'équerre.","habitants":"Famille de Godailh \r\n        \r\n        \r\n        \"","divers":"Château de Pelissier","gps":"","images":["../../jctruffet.com/image/image_47/47_Pelissier_Bezat_1.jpg","../../jctruffet.com/image/image_47/47_Pelissier_Bezat_2.jpg"]},"Consult_chateau_formulaireb055":{"id":"Consult_chateau_formulaireb055","dept":"47","canton":"Penne d","commune":"Penne d","nom":"Penne_Agenais","type":"Bastide","periode":"XII","histoire":"A Penne d'Agenais le château de Noaillac (voir article)  PENNE-AGENAIS, bastide, en 1154, laccession au trône dHenri Plantagenet, second époux dAliénor dAquitaine, fit passer toute la province sous domination anglaise. Pendant toute la guerre de Cent Ans, Penne sera tantôt française, tantôt anglaise. En 1373, les Anglais incendièrent la ville avant de labandonner à Duguesclin qui lassiégeait depuis trois mois. Érigée en place protestante au milieu du XVIe siècle, Penne fut le théâtre daffrontements entre catholiques et huguenots. Le plus sanglant eut lieu en 1562. Après 99 jours de siège, le chef de larmée catholique Blaise de Montluc sempara de la place occupée par les protestants. Une partie des défenseurs furent égorgés et jetés dans les puits. Cest au XVIe et XVIIe siècle que la peste sévit dans la région de Penne. En 1653, afin dobtenir lenrayement de lépidémie, les habitants de Penne sengagèrent à reconstruire léglise de Notre-Dame de Peyragude et à sy rendre en procession le 15 août de chaque année. À Penne, la Révolution permet une évolution économique et sociale tout à la faveur du peuple et de la bourgeoisie. Avant 1806, Penne absorbe pas moins de treize communes éphémères : Allemans, Ladignac, Laval, Magnac, Mondoulens, Port-de-Penne, Sainte-Foy, Saint-Léger, Saint-Marcel, Saint-Martin, Saint-Sylvestre-sur-Lot, Tremons et Trentels. En 1839, l'ancienne commune de Trentels reprend son indépendance et élargit son territoire en récupérant ceux de Ladignac et Laval. En 1852, Saint-Sylvestre-sur-Lot redevient à son tour indépendante.","architecture":"Il existe plusieurs monuments à découvrir à Penne-d'Agenais : La Porte de la Ville date du XIIIe siècle de Jean Terraud  et la vieille maison contiguë , du XIVe siècle sont les éléments classées inscription par arrêté du 24 juillet 1929. La Porte de Ferracap dont le nom vient du voisinage du Gibet du XIIIe siècle et dont les éléments classées sont Porte de Ferracap et Porte de Ricard : inscription par arrêté du 20 juin 1950\r\nLa Porte de Ricard le nom évoque Richard coeur de Lion. La Tour d'Escoute  du XIVe siècle et dont les éléments classées sont Les façades et les toitures : inscription par arrêté du 10 janvier 1964. Les Ruines du château Richard Cur de Lion","habitants":"Henri Plantagenet\r\n        \r\n        \"","divers":"Les porte de la bastide grav de 1 à 5, et divers châteaux à Penne d'Agenais Ferié grav 8 et vestiges de Perregude grav 9","gps":"","images":["../../jctruffet.com/image/image_47/47_Penne_Agenais_1.jpg","../../jctruffet.com/image/image_47/47_Penne_Agenais_2.jpg","../../jctruffet.com/image/image_47/47_Penne_Agenais_3.jpg","../../jctruffet.com/image/image_47/47_Penne_Agenais_4.jpg","../../jctruffet.com/image/image_47/47_Penne_Agenais_5.jpg","../../jctruffet.com/image/image_47/47_Penne_Agenais_6.jpg","../../jctruffet.com/image/image_47/47_Penne_Agenais_7.jpg","../../jctruffet.com/image/image_47/47_Penne_Agenais_8.jpg","../../jctruffet.com/image/image_47/47_Penne_Agenais_9.jpg"]},"Consult_chateau_formulaire9792":{"id":"Consult_chateau_formulaire9792","dept":"47","canton":"Fumel","commune":"Montayral","nom":"Perricard","type":"Château","periode":"XV-XVI","histoire":"PERRICARD, les premiers seigneurs connus de Perricard sont les Raffin, Pierre de Raffin, damoiseau, est qualifié de seigneur de Perricard, vers 1400, marié en secondes noces, en 1420, avec Catherine de Cuzorn.  Du premier mariage de Pierre de Raffin avec Carlie de La Malterre, sont nés plusieurs enfants, dont Amanieu de Raffin, seigneur de Perricard et d'Hauterive, marié à Bernarde de Parazoles, dont il eut un fils, Armand Ier de Raffin, lui-même marié en 1477 à Jeanne de la Tour de Reyniès, sur aînée de Florette de La Tour, fille de Jacques de la Tour, seigneur de Reyniès et de Puycalvary, et d'Antoinette de Grimoard, dame de Puycalvary, qui a amené la terre de Puycalvary dans la famille Raffin. En 1600  Le château de Perricard est mis en vente, acheté par Anne de Bezolles  elle décida plus prudent de se marier en secondes noces avec N. de Chayrieix, seigneur de Boisse, Le second mari d'Anne de Bezolles étant mort, elle s'est remariée avec Jean du Lac, seigneur de La Pérède, vers 1611, elle eut un fils, Mathieu Paul du Lac de La Pérède, qui  hérita  à la mort de son père.  Anne de Bezolles a transmis ses biens à sa petite-fille. Monseigneur Claude Joli, évêque d'Agen, a visité le château le 9 septembre 1667. François de Salignac, en accord avec sa femme, Anne du Lac de La Parède, a vendu peu après la seigneurie de Perricard à François de Bosredon, seigneur de Bajon.  second fils de Jean de la Goutte, comte de Cours, et de Paule de Bezolles, et lui a apporté la seigneurie de Perricard Henri de la Goutte, seigneur de La Poujade, marquis de Perricard, a épousé sa cousine, haute et puissante dame, Paule de la Goutte, Charles de Montalembert avait reçu la seigneurie de Perricard. par un acte passé le 27 novembre 1779, il a vendu la seigneurie à messire François de La Fabrie de la Sylvestrie, N'ayant pas eu d'enfants, il a transmis ses biens à son neveu, Louis-Jean-Marie-Henri de Neymet. Le 7 avril 1837, Henri de Neymet a vendu à François de Laffargue qui l'a partagé avec son fils qui la vendu en 1868 la partie orientale à Louis Moussac.","architecture":"Pérricard Le plan général du château était un bâtiment quadrangulaire avec quatre corps de logis autour d'une cour intérieure flanqué de tours.  La construction a commencé à la fin du XVe siècle ou au début du XVIe siècle par Armand Ier de Raffin. La tour rectangulaire sud-est est la partie la plus ancienne et devait faire partie d'une maison-forte médiévale. Une inscription, aujourd'hui disparue, donnait la date de 1565, et attribuait la fin de la construction du château à Antoine de Raffin, en particulier la réalisation de la grosse tour sud-ouest et le riche décor visible autour des fenêtres  bâtons écotés, rosaces, fleurs de lys, et de la porte principale. C'est une réalisation d'un atelier cadurcien.\r\nAnne de Bezolles a fait construire dans l'aile orientale la chapelle du château, vers 1610. Une description a été faite dans le rapport de visite faite après le passage de l'évêque d'Agen Claude Joli, en 1667.\r\nAprès l'achat du château par François de Laffargue, il est transformé en exploitation agricole et divisé en deux propriétés. L'aile Est agrandie est convertie en grange-étable en 1861. L'aile ouest est en partie ruinée, elle a été dotée d'une nouvelle façade au cours de la seconde moitié du XIXe siècle pour permettre sa transformation en ferme. L'aile sud est la mieux conservée avec la grande cuisine, des chambres à l'étage dont une avec un plafond peint et deux cheminées monumentales. Le château de Perricard a été inscrit au M.H le 22 février 1927.","habitants":"Famille de Pierre de Raffin\r\n        \r\n        \"","divers":"Château de Pérricard à Montayral","gps":"","images":["../../jctruffet.com/image/image_47/47_Perricard_1.jpg","../../jctruffet.com/image/image_47/47_Perricard_2.jpg","../../jctruffet.com/image/image_47/47_Perricard_3.jpg","../../jctruffet.com/image/image_47/47_Perricard_4.jpg","../../jctruffet.com/image/image_47/47_Perricard_5.jpg","../../jctruffet.com/image/image_47/47_Perricard_6.jpg"]},"Consult_chateau_formulaire0ef4-2":{"id":"Consult_chateau_formulaire0ef4-2","dept":"47","canton":"Tonneins","commune":"Laparade","nom":"Peyreguilhot","type":"Château","periode":"XVIII","histoire":"PEYREGUILHOT, les archives conservent un acte de 1716 mentionnant la dette dun paysan envers un certain Pierre Chopis de Labruyère demeurant dans cette maison de maître. Si la date de construction du château reste inconnue, ce document permet denvisager une date antérieure à 1716. Parmi ces annexes, plusieurs sont bâties en 1856,  pour le nouveau propriétaire, Gabriel de Labruyère, Conseiller Général du canton de Tonneins. En 1906, larchitecte Édouard Payen place deux pavillons légèrement en avancée à chaque extrémité de la demeure. Cette disposition et la présence de dépendances agricoles sont typiques de larchitecture noble dans le Lot-et-Garonne aux XVIIIe et XIXe siècles. aujourd'hui hôtel restaurant de Sonia Badie,","architecture":"Le château de Peyreguilhot sélève à Laparade, sur les coteaux de la vallée du Lot, est un domaine constitué du logis et de ses dépendances comprenant notamment un pigeonnier, une grange ou encore un chai. Parmi ces annexes, plusieurs sont bâties en 1856,   Il prend place au milieu dun domaine organisé entre logis et dépendances agricoles, remaniés et agrandis aux XIXe et XXe siècles. Ancienne grange du domaine avec de superbes murs en pierres et ses poutres apparentes, la salle des Tilleuls.","habitants":"Pierre Chopis de Labruyère\r\n        \r\n        \"","divers":"Château de Peyreguillot à Laparade","gps":"","images":["../../jctruffet.com/image/image_47/47_Peyreguilhot_1.jpg","../../jctruffet.com/image/image_47/47_Peyreguilhot_2.jpg","../../jctruffet.com/image/image_47/47_Peyreguilhot_3.jpg","../../jctruffet.com/image/image_47/47_Peyreguilhot_4.jpg"]},"Consult_chateau_formulaire23b9-2":{"id":"Consult_chateau_formulaire23b9-2","dept":"47","canton":"Casteljaloux","commune":"Bastide-Castel-Amouroux","nom":"Plantey_47","type":"Château","periode":"XVIII","histoire":"PLANTEY, le château du Plantey est un château bâti au lieu-dit Plantey, au nord-ouest de Labastide-Castel-Amouroux  a été construit au XIXe siècle, dans le style néo-médiéval. il est commencé par la famille De Peysserier et est terminé par le baron De Sigalas avant 1900. La famille de Sigalas est une famille noble importante en Aquitaine, qui possède à cette époque une villa à Sainte Bazeille et le château de la Placière. Plantey aujourdhui  hôtel  de monsieur et madame Marc et Florence de  Franqueville.","architecture":"Le château  de Plantey est un exemple de larchitecture éclectique du XIXe siècle, une demeure bâtie entre la fin du XVIIIe siècle et la fin du XIXe siècle. Le château adopte le goût historique  du XIXe siècle. Cest en effet une époque marquée en architecture par un retour aux styles du passé et un regard sur les styles du monde: on se tourne vers un vocabulaire architectural mêlant les influences ou, au contraire, sattachant à un mouvement, Antiquité par exemple, ou à un pays . Le château se situe dans le style néo médiéval: en témoignent notamment la tour octogonale avec meurtrières et mâchicoulis ou la croix de pierre dressée au sommet du pignon triangulaire de lun des corps de bâtiment.","habitants":"Famille de Peysserier \r\n        \r\n        \"","divers":"Château de Plantey à Castel Amouroux","gps":"","images":["../../jctruffet.com/image/image_47/47_Plantey_47_1.jpg","../../jctruffet.com/image/image_47/47_Plantey_47_2.jpg","../../jctruffet.com/image/image_47/47_Plantey_47_3.jpg","../../jctruffet.com/image/image_47/47_Plantey_47_4.jpg"]},"Consult_chateau_formulaire4b46":{"id":"Consult_chateau_formulaire4b46","dept":"47","canton":"Agen","commune":"Bon-Encontre","nom":"Pleineselve","type":"Château","periode":"XII","histoire":"PLEINESELVE est situé sur la commune de Bon-Encontre château de Plèneselve du XIIe siècle, Martine et Rodolphe de Biolley sont heureux de vous accueillir dans leur gîtes.","architecture":"Le château de Pleineselve est bâti sur un petit promontoire au commencement du vallon de Saint Denis. Ce n'est pas un simple manoir, mais un véritable château-fort avec enceinte, tours et donjon, fossés et pont-levis. Lors de sa construction, une forêt immense couvrait le pays, ombrageant les combes profondes et le sommet des coteaux. C'est en plein bois, comme son nom l'indique, que les fondements de Pleineselve furent jetés, Plena silva. Au XIIIe siècle, Plèneselve se composait d'une enceinte et d'une grosse tour carrée élevée sur un rocher isolé du côté du midi, le plus faible de la position. Il reste quelques vestiges de l'enceinte qui complétait au XIIIe siècle le château de Plèineselve, mais cela ne permet pas de soupçonner sa forme ni son étendue. Depuis le début, la villa de Plèneselve est une maison d'exploitation agricole. D'abord entourée d'une palissade, la villa de Plèineselve devint au XIIe siècle une véritable forteresse puis un château fort.","habitants":"Famille de Rodolphe de Biolley\r\n        \r\n        \"","divers":"Château de Pleineselve à Bon-Encontre","gps":"","images":["../../jctruffet.com/image/image_47/47_Pleineselve_1.jpg","../../jctruffet.com/image/image_47/47_Pleineselve_2.jpg","../../jctruffet.com/image/image_47/47_Pleineselve_3.jpg","../../jctruffet.com/image/image_47/47_Pleineselve_4.jpg","../../jctruffet.com/image/image_47/47_Pleineselve_5.jpg"]},"Consult_chateau_formulaireaf18":{"id":"Consult_chateau_formulaireaf18","dept":"47","canton":"Nérac","commune":"Poudenas","nom":"Poudenas","type":"Forteresse","periode":"XIII-XVII","histoire":"POUDENAS, construit au XIIIe siècle par les seigneurs de Poudenas vassaux d'Edouard 1er Plantagenet, duc d'Aquitaine et Roi d'Angleterre et fief de Raymond Trincavel vicomte de Béziers,  l'ancienne résidence des seigneurs de Poudenas, pris et repris successivement par les français et par les anglais le château est rendu en 1369 à Jean II baron de Podenas, Gaston de Podenas deux siècle plus tard s'éteint sans héritier direct, ses biens échoient à une nièce de sa femme Françoise de Canbios, qui épouse Jean de Bouzet de Roquépine page à la cour d'Henri III et issu d'une famille originaire du Bordelais, Jean de Bouzet nommé sous gouverneur de la province et ses descendants qui portes plusieurs parties à l'édifice de 1660 à 1686 une série de bâtiments d'époques. Au XVIIIe siècle le château passe aux Narbonne-Pelet, puis au  comte de Digeon qui en hérita de sa mère en 1770 et le légue à une de ses nièces marquise de Virieu qui le légua à sa fille Stéphanie   de Virieu cette dernière meurt fort agée en 1872, en 1880 ses héritiers vu l'importance des travaux le cèdent  à une branche cadette de la famille de Poudenas celle la même qui avait fait construire la château primitif installée depuis plusieurs années à Gênes. A la mort d'Odon de Poudenas en 1891, le château revient à l'un de ses cousins, Jean de Nadaillac toujours dans cette famille,  c'est aujourd'hui un gîte de prestige, ou détente ou réceptions se passeront à merveille.","architecture":"Poudenas, construit au XIIIe siècle, l'ancienne résidence des seigneurs de Poudenas, fut très modifié au XVIIe siècle : ouvertures des fenêtres et surtout création d'une longue terrasse supportée par de belles arcades. Le résultat, bien qu'assez surprenant dans cette région, est très réussi et évoque les architectures méridionales. Fortification militaire jusqu'au XVIe siècle, le château est alors décoré de fenêtres à meneaux, qui ouvrent le donjon au nord et au midi. Cent ans plus tard, un remaniement complet orne la cour intérieure de deux terrasses soutenues chacune par quatre arcades, et la grande façade d'une triple galerie rappelant une villa italienne et son paysage. transformé au XVIIe en palais italien agrémenté d'un beau parc de 10 hectares Le monument fait lobjet dun classement au titre des M.H depuis le 22 août 1984 pour ses façades et ses toitures du donjon et des bâtiments entourant la cour principale, sa façade Sud avec sa galerie et ses terrasses et sa toiture correspondante, sa terrasse devant la façade du château, son escalier de pierre à mur d'échiffre et à volées droites, sa cheminée du grand salon et de la salle de réception et son mur d'enceinte. Il est également inscrit depuis le 26 mai 1952 pour le reste de ses façades et ses toitures.","habitants":"Famille de  Gaston de Podenas \r\n        \r\n        \"","divers":"Château de Poudenas","gps":"","images":["../../jctruffet.com/image/image_47/47_Poudenas_1.jpg","../../jctruffet.com/image/image_47/47_Poudenas_2.jpg","../../jctruffet.com/image/image_47/47_Poudenas_3.jpg","../../jctruffet.com/image/image_47/47_Poudenas_4.jpg","../../jctruffet.com/image/image_47/47_Poudenas_5.jpg"]},"Consult_chateau_formulaire9c6a":{"id":"Consult_chateau_formulaire9c6a","dept":"47","canton":"Agen","commune":"Lafox","nom":"Prades_Lafox","type":"Château","periode":"XV","histoire":"PRADES, famille de Cortète à la fin du XVe siècle et reste dans cette famille jusqu'en 1685 avec Martial de Cortète né en 1450 de son vivant lieutenant général du sénéchal d'Agenais et de Gascogne, de son mariage avec Anne de la Duguie plusieurs enfants. En 1608 mariage de François de Cortète avec Jeanne de Caumont petite fille du côté paternel de Bernard de Cortète François de Cortète meurt en 1665, malgré les quatre enfants  l'héritière est Marie de Cortète, fille de Jean-Jacques de Cortète et de Marie Diane de Burin, se marie le 8 juillet 1685, au château de Prades, avec Bernard Daurée (1656-1733), écuyer, fils de Philippe Daurée, seigneur de La Mothe Daurée, avocat au parlement, et de Marguerite de Faure. Le 21 avril 1698, Bernard Daurée, seigneur de La Mothe et de Prades, fait inscrire ses armes pour l'Armorial général de France. Il est lieutenant général d'épée au présidial d'Agen le 3 décembre 1704. De ce mariage sont nés quatre garçons et cinq filles : Philippe Daurée, né le 11 avril 1686. Il est lieutenant au régiment de Clairefontaine en 1706 avant d'être réformé. Il s'est marié en 1720 avec Marie-Madeleine de Ricard de Villenouvette. Il est mort le 26 mars 1745.Le manoir est resté dans la famille Daurée jusqu'au milieu du XXe siècle puis le domaine est transmis par les femmes. L'actuelle propriétaire, à partir de 2001 Brigitte de Larrard, est une descendante en ligne directe de Bernard de Cortète ont entrepris d'importants travaux de remise en valeur avec le concours de la DRAC . Ils ont été coordonnés par l'architecte Axel Letellier. Propriétaire aujourd'hui de monsieur Gabriel Herier et madame Hérier née Dourée de Prades.\r\nLe manoir a été inscrit au titre des M.H le 5 mars 1959.","architecture":"Prades, en 1521, Bernard de Cortète fait construire le manoir pour protéger son domaine des pillards venus du Quercy. Achevé en 1523, le manoir diffère de son état actuel; le logis seigneurial comprenait deux étages, surmontés d'un toit élevé et pointu abritant des chambres basses. La cour était entourée d'une enceinte crénelée, percée de meurtrières et bornée à l'est par deux tours carrées. Le manoir actuel forme un quadrilatère avec ses dépendances. Le corps de logis principal, celui du XVIe siècle en occupe toute la face occidentale. Il est terminé, à ses angles, par quatre tourelles rondes, deux de plain-pied et deux en encorbellement. Une tourelle hexagonale adossée à la face Est, sert de cage d'escalier. Le manoir est précédé, à l'est, d'une cour refaite aux XVIIe et XVIIIe siècles, mais qui existait dès les débuts. Elle était entourée d'un mur crénelé, percé de meurtrières. Le parapet devait être muni d'un chemin de ronde qui communiquait avec le bâtiment principal.","habitants":"Famille de Cortète \r\n        \r\n        \"","divers":"Château de Prades à Lafox","gps":"","images":["../../jctruffet.com/image/image_47/47_Prades_Lafox_1.jpg","../../jctruffet.com/image/image_47/47_Prades_Lafox_2.jpg","../../jctruffet.com/image/image_47/47_Prades_Lafox_3.jpg","../../jctruffet.com/image/image_47/47_Prades_Lafox_4.jpg","../../jctruffet.com/image/image_47/47_Prades_Lafox_5.jpg","../../jctruffet.com/image/image_47/47_Prades_Lafox_6.jpg","../../jctruffet.com/image/image_47/47_Prades_Lafox_7.jpg"]},"Consult_chateau_formulaire86f7":{"id":"Consult_chateau_formulaire86f7","dept":"47","canton":"Aiguillon","commune":"Prayssas","nom":"Prayssas_Chateau","type":"Château","periode":"XVI","histoire":"Deux  châteaux à Prayssas, celui de Prayssas, de Goulet et à quelques kilomètres au nord-ouest à Lacépède un château pas d'information historique.","architecture":"Goulet, Le manoir, dont la construction remonterait vers le début du XVIe siècle, a été remanié au fil des siècles. Au XVIIe siècle, le corps de logis est agrandi en profondeur du côté est. Une nouvelle façade est alors construite contre lancienne. Elle présente deux arcades en plein cintre au rez-de-chaussée soutenant une galerie à létage ainsi qu'un pigeonnier carré dans lextrémité sud. Le manoir du Goulet comprend également des dépendances agricoles du XVIIIe et XIXe siècle, qui forment une cour. Cette cour reste en effet lélément central qui distribue les différents bâtiments du domaine en suivant la tradition classique de la maison de maître. La cour était autrefois fermée par un portail dont il subsiste des traces darrachement.                                                                 Prayssas, ce château datant du XIIIe siècle, est constitué d'une grande salle de réception en rez-de-chaussée sur 117 m² et d'un logement de type 4 comprenant une cuisine équipée, un grand séjour de 48 m², deux chambres et deux salles d'eau, le tout sur environ 246 m² de surface habitable. Un jardin de 1349 m² environ permet de profiter de la position dominante de ce bien sur la vallée.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Vestiges à Prayssas grav 1-2, de Bordeneuve grav 4, de Goulet grav 5 et 6, et de Lacépéde grav 7 et 8.","gps":"","images":["../../jctruffet.com/image/image_47/47_Prayssas_Chateau_1.jpg","../../jctruffet.com/image/image_47/47_Prayssas_Chateau_2.jpg","../../jctruffet.com/image/image_47/47_Prayssas_Chateau_3.jpg","../../jctruffet.com/image/image_47/47_Prayssas_Chateau_4.jpg","../../jctruffet.com/image/image_47/47_Prayssas_Chateau_5.jpg","../../jctruffet.com/image/image_47/47_Prayssas_Chateau_6.jpg","../../jctruffet.com/image/image_47/47_Prayssas_Chateau_7.jpg","../../jctruffet.com/image/image_47/47_Prayssas_Chateau_8.jpg"]},"Consult_chateau_formulaire448a":{"id":"Consult_chateau_formulaire448a","dept":"47","canton":"Pujols","commune":"Pujols","nom":"Pujols","type":"Vestiges","periode":"XIII","histoire":"A cinq kilomètres au sud à Ste-Colombe de Villeneuve château de Carty Bas dont je n'ai pas d'information.     PUJOLS, il semblerait quun premier château fort existait déjà au XIIIe siècle ; il assura la défense du site contre les sièges des Normands et des seigneurs voisins. Un second château fut construit un peu plus tard afin de se défendre contre les Anglais , la guerre de Cent ans de 1337 à 1453). la porte du clocher Saint-Nicolas, celle des Anglais et laccès anciennement porte de la Lère. Au cours de lhistoire, cet emplacement exceptionnel a été très prisé.  Peu à peu, ces fortifications prirent une telle ampleur quau XIIe siècle, une puissante forteresse séleva sur Pujols. Raymond VI, comte de Toulouse, fit de Pujols un « boulevard des cathares » mais le traité de Meaux de 1229 ordonna la destruction de la cité. Ce nest quà la fin du XIIIe siècle que le Baron Jean de Pujols put reconstruire une nouvelle place forte dont on peut admirer encore aujourdhui certains vestiges. À partir de 1829, le château et les remparts sont démolis peu à peu. Les pierres sont réutilisées pour remanier une ancienne maison de redressement qui devait devenir lactuelle centrale de détention dEysses.","architecture":"Pujols est reconstruit pour protéger le bourg à lest où le relief peu escarpé le rendait plus vulnérable. De forme rectangulaire, il était flanqué de quatre tours et de hautes murailles. Il a été en partie détruit au XIXe siècle. Les pierres du château ainsi que des remparts sont vendus alors aux entrepreneurs locaux pour la construction de la centrale dEysses. On peut encore observer aujourdhui quelques vestiges du château, notamment la tour nord-Est. Anciennes portes des remparts  Les fortifications entouraient le bourg. On compte encore trois accès dont deux portes actuellement .  La cité médiévale de Pujols, perchée à plus de 180 m daltitude, domine la bastide de Villeneuve-sur-Lot qui étale ses briques rouges au soleil et offre un magnifique point de vue de près de 30 km sur la Vallée du Lot. Lancienne place forte albigeoise a traversé les siècles et les guerres en conservant son caractère médiéval : vestiges des enceintes et du château, portes fortifiées. Outre le charme de sa halle et de ses maisons aux façades blanches ou à colombages, le village senorgueillit davoir deux édifices religieux : léglise Saint-Nicolas et léglise Sainte-Foy. Encore ornée de ses peintures murales du XVIe siècle, celle-ci accueille aujourd'hui des expositions en été, au cur du village classé parmi « Les Plus Beaux Villages de France ».","habitants":"Baron Jean de Pujols\r\n        \r\n        \"","divers":"Remparts de Pujols grav de 1 à 6,château de Carty-Bas de 7 à 8.","gps":"","images":["../../jctruffet.com/image/image_47/47_Pujols_1.jpg","../../jctruffet.com/image/image_47/47_Pujols_2.jpg","../../jctruffet.com/image/image_47/47_Pujols_3.jpg","../../jctruffet.com/image/image_47/47_Pujols_4.jpg","../../jctruffet.com/image/image_47/47_Pujols_5.jpg","../../jctruffet.com/image/image_47/47_Pujols_6.jpg","../../jctruffet.com/image/image_47/47_Pujols_7.jpg","../../jctruffet.com/image/image_47/47_Pujols_8.jpg","../../jctruffet.com/image/image_47/47_Pujols_9.jpg"]},"Consult_chateau_formulairefd03":{"id":"Consult_chateau_formulairefd03","dept":"47","canton":"Penne d","commune":"Dausse","nom":"Puycalvary","type":"Château","periode":"XVI","histoire":"PUYCALVARY, Armand de Raffin, cinquième fils de Pierre de Raffin et de Catherine de Cuzorn, est devenu le seigneur de Puycalvary par son mariage en 1477 avec Jeanne de la Tour de Reyniès, fille de Jacques de la Tour, seigneur de Reyniès et de Puycalvary. La branche aînée des Raffin était seigneur du château de Perricard. Le château est passé dans la famille de Lusignan de Saint-Gelais après le mariage d'Antoinette de Raffin, dame de Puycalvary. Gilles de Lusignan fait foi et hommage au roi Louis XIII pour son château de Puycalvary le 25 avril 1631. De ses premières noces il a eu Marie Magdelaine de Lusignan de Saint-Gelais, dame de Puycalvary, mariée avec Henri François, marquis de Vassé. Elle a vendu le château de Puycalvary en 1660 . De ses deuxièmes noces, il a eu Anne Armande de Lusignan de Saint-Gelais, mariée à Charles III, duc de Créqui, prince puis duc de Poix, pair de France. En 1696 est la propriété des Guiscard depuis 1660, se voit élevé en comté pour Louis de Guiscard. Le fils aîné de Louis de Guiscard, Arnaud-Louis de Cadrieu, a racheté la part de son frère cadet. Il est marié avec Marie-Louise de Sésergues dont il a eu quatre filles, dont Foy de Cadrieu qui s'est mariée avec son cousin Jean-Louis Arnaud de Guiscard. De ce mariage, une seule fille a survécu, mariée au comte de Durfort-Boissière. de cette union est né un fils qui a émigré en 1789.  celui-ci n'a pas été saisi à la Révolution. Une tour carrée sert de clocher, coiffée en pyramide.Le château a peu souffert pendant la Révolution. Le château est acheté en 1815 par Pierre-Philippe-Marie Souilhagon de Bruet, ancien conseiller au Parlement de Bordeaux. Sa fille Catherine-Jeanne-Françoise-Adèle Souilhagon de Bruet s'y marie en 1811 avec François-Antoine-Lambert de Lalis. La famille l'a gardé jusquau XXe siècle, a été inscrit au titre des M.H en 1925","architecture":"Puycalvary,du bâtiment originel subsiste une tour quadrangulaire tronquée, attenante à un corps moins élevé, séparés du plateau par un profond fossé. Le château moderne, reconstruit au début du XVIe siècle pour le sénéchal d'Agenais Antoine de Raffin, a  occupé toute l'espace de l'ancienne basse-cour et rejeté les maisons villageoises au-delà de l'enceinte, sur les pentes du versant sud du \"pech\"; c'est dans ce secteur, au pied de l'enceinte, que la chapelle castrale fut édifiée. Le nouveau château comporte trois ailes organisées sur une cour intérieure carrée ; l'aile sud, ouvre côté cour par des arcades à arêtes vives. Des modifications furent apportées durant le XVIIe siècle; une échauguette est greffée à l'aile ouest et une loggia est adossée à l'aile Est. Le percement de la porte sur la terrasse sud, précédée d'un escalier, appartient à des travaux du XVIIIe siècle. Des réaménagements intérieurs sont réalisés à cette époque, dont le décor en bois de l'oratoire dans la tour nord-ouest. A la Révolution, la sculpture du fronton de la tour d'escalier et celle de quelques fenêtres sont bûchées. Le domaine est vendu en 1815 à Pierre Souilhagon de Bruet, ancien conseiller au Parlement de Bordeaux. C'est  pour lui que le portail d'accès extérieur a été édifié. Le cadastre de 1830 montre des bâtiments adossés à l'aile sud dont ne subsistent plus que des fours et un puits isolé au milieu de la terrasse. L'ensemble a été restauré durant le quatrième quart du XXe siècle.","habitants":"Famille de Lusignan de Saint-Gelais \r\n        \r\n        \"","divers":"Château de Puycalvary à Dausse","gps":"","images":["../../jctruffet.com/image/image_47/47_Puycalvary_1.jpg","../../jctruffet.com/image/image_47/47_Puycalvary_2.jpg","../../jctruffet.com/image/image_47/47_Puycalvary_3.jpg","../../jctruffet.com/image/image_47/47_Puycalvary_4.jpg","../../jctruffet.com/image/image_47/47_Puycalvary_5.jpg","../../jctruffet.com/image/image_47/47_Puycalvary_6.jpg"]},"Consult_chateau_formulaire6747-2":{"id":"Consult_chateau_formulaire6747-2","dept":"47","canton":"Duras","commune":"Saint-Astier","nom":"Puychagut","type":"Vestiges","periode":"XI","histoire":"Château de Labattut ruine de Puychagut        LABATTUT  a cinq kilomètres à l'ouest  cette demeure de charme vous accueille dans un authentique château du XIVe siècle.                                         PUYCHAGUT   Terrier de la seigneurie de Puychagut pour François de Pierre Buffière capitaine de Puychagut, souldan de Preyssac, et Catherine de Ségur son épouse, précède lexistence de la commune de Saint-Astier. Au Moyen-Âge, cette forteresse imprenable résiste aux assauts de ses ennemis avant que le roi de France, Louis XI, ne décide de sa destruction. La forteresse de Puychagut est construite au XIe siècle sur une butte escarpée dans un but défensif. Elle donne naissance au captalat de Puychagut, dont le premier captal (chef militaire) est Drogo, en 1086, connu pour être un personnage particulièrement brutal. Le captalat comprend les hameaux de Loubès, Uffer, Théobon, Bernac, Montaillac, Malromé, Saint-Nazaire, Saint-Astier, Saint-Léger et Villeneuve. Tous ces villages appartiennent à la vicomté de Bézaume qui prend fin en 1292.","architecture":"Château de Puychagut : ruines du château du XIIe et XIIIe siècles détruit à la fin de la guerre de Cent Ans.","habitants":"François de Pierrebuffière \r\n        \r\n        \"","divers":"Motte féodale de Puychagut et château de Labatut","gps":"","images":["../../jctruffet.com/image/image_47/47_Puychagut_1.jpg","../../jctruffet.com/image/image_47/47_Puychagut_2.jpg"]},"Consult_chateau_formulaireac5a":{"id":"Consult_chateau_formulaireac5a","dept":"47","canton":"Agen","commune":"Puymirol","nom":"Puymirol","type":"Château","periode":"XII-XV","histoire":"PUYMIROL, dominant la vallée de la Séoune sur un éperon rocheux à 15km à l'est d'Agen, la bastide de Puymirol fut fondée en 1246 par Raymond VII, comte de Toulouse. A l'est, l'entrée par la porte de la Citadelle et remarquer au passage le puits récemment restauré. Faites une halte sur le foirail qui accueille toutes les manifestations importantes du village et offre un panorama incomparable sur la vallée.                       PECH-REDON, construit vers 1480 par Vincent Bilhonis, vicaire général de l'évêché d'Agen.      TAYRAC, le château de Tayrac, sur la commune de Puymirol, est le siège, au Moyen Âge, dune seigneurie qui est situé dans la plaine du Séoune, sur lancienne paroisse de Fraysses, rattachée sous lAncien Régime à la juridiction de Puymirol. Il est le siège, dès le XIe siècle, dune seigneurie, celle de Tayrac (Tayrac est aujourdhui une commune indépendante).","architecture":"Pech-Redon, témoin régional essentiel de la transition entre le Moyen Age et la Renaissance. Construit vers 1480 par Vincent Bilhonis, vicaire général de l'évêché d'Agen, la demeure, juchée sur une colline, comporte divers bâtiments disposés autour d'une cour fermée. Le corps de bâtiment conserve, à l'intérieur, des éléments très intéressants (salles voûtées...).   Puymirol Des remparts construits ou restaurés en 1283 par le gendre de Raymond VII, Alphonse de Poitiers et démolis sous Louis XIV, il subsiste quelques fractions appliquées, çà et là, dans le vide des rochers. De la citadelle, élevée à l'est pour défendre le point le plus accessible, il n'y a plus que l'emplacement d'où l'on découvre une vue superbe. Dans la ville, un certain nombre de maisons qui ont des arcatures en cintre brisé, remontant peut-être au XIIIe siècle, voisinent avec d'autres, fort belles, des XVe,  XVIe et  XVIIe siècles.","habitants":"Alphonse de Poitiers \r\n        \r\n        \"","divers":"Château de Tayrac à Puymerol.","gps":"","images":["../../jctruffet.com/image/image_47/47_Puymirol_1.jpg","../../jctruffet.com/image/image_47/47_Puymirol_2.jpg","../../jctruffet.com/image/image_47/47_Puymirol_3.jpg","../../jctruffet.com/image/image_47/47_Puymirol_4.jpg"]},"Consult_chateau_formulaired8d2-2":{"id":"Consult_chateau_formulaired8d2-2","dept":"47","canton":"Aiguillon","commune":"Laugnac","nom":"Quissac","type":"Château","periode":"XIV","histoire":"Trois châteaux à Quissac celui de Quissac , de Laugnac pas d'information et de Priézuré  gîtes de France pour ce dernier.                                               QUISSAC, le château, voisin de l'église de Quissac, est installé en bas de pente sur une terrasse dominant le ruisseau de la Masse.  Le bâtiment devient possession des Montpezat en même temps que la Seigneurie de Laugnac. Il semble que ce soit un des membres de la famille, Charles, qui en fit don, en 1470, à Jean de Preyssas, pour qui le logis accoté d'une tour d'escalier hors-oeuvre au centre de l'élévation nord-ouest paraît avoir été construit avant 1487; seuls subsistent les murs et une cheminée du rez-de-chaussée. Le manoir, entré en possession des Malvin de Montazet qui le conserveront jusquà la Révolution, suite au mariage de Jeanne de Prayssas avec François-Charles de Malvin en 1570, est remanié intérieurement et extérieurement vers le milieu du XVIIIe siècle pour Antoine Malvin de Montazet. En 1793, outre le logis et un jardin d'agrément, les parties agricoles comprennent des granges, une écurie et un cuvier, sur un domaine comprenant quatre métairies et deux moulins. Démolition de la tour, remplacée par un perron, construction d'un étage supplémentaire pour M. Chéri Amblard vers 1855.","architecture":"Quissac est un château bâti, à Laugnac, au XVe siècle, sur la pente sud de la Vallée de la Masse. Il a été remanié au milieu du XVIIIe siècle. Des traces archéologiques de lépoque romaine ont été retrouvées, près de celle-ci. Lédifice actuel trouve son origine dans les ruines dune villa romaine.","habitants":"Famille de Malvin de Montazet \r\n        \r\n        \"","divers":"Château de Quissac grav 1 à 3, de Priezuré grav 4 et Laugnac_5","gps":"","images":["../../jctruffet.com/image/image_47/47_Quissac_1.jpg","../../jctruffet.com/image/image_47/47_Quissac_2.jpg","../../jctruffet.com/image/image_47/47_Quissac_3.jpg","../../jctruffet.com/image/image_47/47_Quissac_4.jpg","../../jctruffet.com/image/image_47/47_Quissac_5.jpg"]},"Consult_chateau_formulaireff6b":{"id":"Consult_chateau_formulaireff6b","dept":"47","canton":"Nérac","commune":"Réaup_Lisse","nom":"Reaup_Lisse","type":"Château","periode":"XVII","histoire":"Trois château à Lisse  celui de Lisse, Caderoue ( voir article) , Ste catherine,  Conques et Réaup  (voir article suivant)                                                                             LISSE, de 1259 à1287, le castrum est tenu par plusieurs parçonniers, dont Filartigues. Acquis par Louis Viton qui fait réaliser d'importants travaux vers 1880-1882 dates portées, peut-être par L. Dubarry de Lassalle auteur de l'église de Lisse Les armoiries et le monogramme de Louis Viton marquent les restaurations du XIXe siècle.","architecture":"LISSE, un bâtiment tour est adossé à la chapelle à l'ouest: une archivolte permet de dater celui-ci au plus tard du XIVe siècle. La chapelle est agrandie au XVIe siècle sur le bâti de la tour médiévale, et ouverte au XVIIe siècle vers l'extérieur pour servir d'édifice paroissial. Au XVIIe siècle, le logis est remanié et augmenté: des croisées, une porte surmontée d'un médaillon à cuirs, peut être l'escalier, un plafond peint à la française témoignent du bâti du XVIIe siècle. Les vestiges d'un village fortifié sont visibles sur la 1ère terrasse au sud du château. Dans le parc, un moulin à deux meules peut dater du XVIIe siècle, devenu fabrique de jardin, restauration des élévations, tour et tourelle d'angle, portail encadré de tours, pièces Est; chaque pièce reçoit un décor de style différent, médiéval, classique ou rocaille.  Aujourd'hui restaurant monsieur Endre Rosjo.","habitants":"Chapelle Louis Viton \r\n        \r\n        \"","divers":"Château de Lisse à Réaup-Lisse","gps":"","images":["../../jctruffet.com/image/image_47/47_Reaup_Lisse_1.jpg","../../jctruffet.com/image/image_47/47_Reaup_Lisse_2.jpg","../../jctruffet.com/image/image_47/47_Reaup_Lisse_3.jpg","../../jctruffet.com/image/image_47/47_Reaup_Lisse_4.jpg","../../jctruffet.com/image/image_47/47_Reaup_Lisse_5.jpg","../../jctruffet.com/image/image_47/47_Reaup_Lisse_6.jpg","../../jctruffet.com/image/image_47/47_Reaup_Lisse_7.jpg","../../jctruffet.com/image/image_47/47_Reaup_Lisse_8.jpg"]},"Consult_chateau_formulaired822":{"id":"Consult_chateau_formulaired822","dept":"47","canton":"Nérac","commune":"Réaup-Lisse","nom":"Reaup_Lisse_II","type":"Manoir","periode":"XV-XVI","histoire":"CONQUES appartient à Jean Sargasset, avocat,  durant le 2e quart du XIXe siècle, d'importants travaux commandés sans doute par Joseph de Tartas transforment l'ancien manoir en maison de maître.      MONTESQUIEU, site dominant la vallée du Cieuse, est mentionné au XIVe siècle avec Losse comme seigneurie tenue par Arnaud Guilhem de Monlezun. En 1547, Anne de Monlézun épouse Louis de Lustrac. Le fief appartient aux Lustrac , écuyers, seigneurs de Losse et Montesqieu, jusqu'en 1751, puis passe par mariage aux Vigier, seigneurs de Réaup, comme l'indique une porte murée au 1er étage. Au XVIIe siècle, la demeure appartient, à un ministre protestant, Hélie de Ferrand. Propriété de la famille d'Estrac, Cap-Lisse passe par mariage en 1779 à Jean-François de la Barrière, issu d'une famille d'avocats.                       Ste-CATHERINE, les chartreux de Bordeaux fondent à Sainte-Catherine , sur les bords de la Gélise,   un castrum est mentionné en 1287, tenu par le seigneur de Réaup. En 1667-1668, François de Narbonne possède la maison noble de Réaup,  celle-ci est constituée d'un château avec basse-cour et colombier ; c'est l'un des plus grands domaines de la juridiction de Mézin. La travée avec porte en plein cintre à clef pendante encadrée de pilastres semble être le seul vestige du XIIe siècle. Dans la 1ère moitié du XVIIIe siècle, il appartient aux Mazelières, puis passe à Paul de Vigier, fils du premier mariage de Marianne de Mazelières. Les dépendances datent de la fin du XVIIIe siècle. Le château a été reconstruit au début du XXe siècle pour les Vigier.","architecture":"CONQUES, le logis, desservi par un escalier  sur rampe à balustres, date  du XVIIe siècle, ainsi que le pigeonnier (mentionné en 1672) et certains éléments comme la galerie sur cour.                               MONTESQUIEU, le lieu-dit Caplisse, une partie du corps de logis et la tour d'escalier polygonale attenante au nord-est peuvent dater du XVIe siècle ; le logis se prolongeait  à l'est de la tour, comme l'indique une porte murée au 1er étage. Le logis a été augmenté vers l'ouest avant 1834, date du cadastre, dès le XVIIe siècle, avec une tour d'angle au sud-ouest. Au XIXe siècle, les parties agricoles sont reconstruites, les fenêtres refaites et une tour édifiée au sud-est.  Certains murs du logis ont pu être bâtis au Moyen-Age vu leur épaisseur, mais les élévations, la tourelle à canonnières sur l'angle, l'escalier à balustres, ainsi que le portail et la tour carrée à l'angle de la cour datent du XVe siècle. Les parties agricoles datent du XIXe siècle, et sont partiellement en ruine . Les bâtiments ont abrité des colonies de vacances et ont été fortement remaniés au XXe siècle, notamment le logis. Ste-CATHERINE prieuré du Moyen-âge rénové au XVIIe siècle et avant 1834. un prieuré séculier auquel est rattaché un vaste domaine. La date de fondation du prieuré de Sainte-Catherine nest pas connue mais remonte à lépoque médiévale. La découverte dun chapiteau sculpté danimaux fabuleux dont le style se rapproche de lart du XIIe siècle, voire du début du XIIIe siècle, atteste de son existence dès le XIIe siècle, au moins pour la chapelle.","habitants":"Arnaud Guilhem de Monlezun                              Famille des Mazelières\r\n        \r\n        \"","divers":"Château de Ste-Catherine grav 1, Conques 2 et 3, de Lamothe grav 4 et 5.","gps":"","images":["../../jctruffet.com/image/image_47/47_Reaup_Lisse_II_1.jpg","../../jctruffet.com/image/image_47/47_Reaup_Lisse_II_2.jpg","../../jctruffet.com/image/image_47/47_Reaup_Lisse_II_3.jpg","../../jctruffet.com/image/image_47/47_Reaup_Lisse_II_4.jpg","../../jctruffet.com/image/image_47/47_Reaup_Lisse_II_5.jpg"]},"Consult_chateau_formulairec4ac":{"id":"Consult_chateau_formulairec4ac","dept":"47","canton":"Fumel","commune":"Courbiac","nom":"Rodie","type":"Château","periode":"XVI","histoire":"RODIE , autrefois, demeure du gouverneur du Quercy qui sest enfui à la Révolution française, il fut racheté par un maréchal ferrant, puis par un couple dartistes espagnols, qui après leur divorce furent contraints de quitter le château. Tellement conquis par le charme des lieux lors dune visite effectuée par hasard en vacances, et bien que dépourvu de tout espoir dachat, Paul se démena pour retrouver cet endroit et le montrer à sa femme au moins une fois. Mais voilà quun concours de circonstance leur permis dacquérir cette magnifique bâtisse ! Ils en font aujourdhui un bien précieux à leurs yeux quils sattachent à faire vivre dans le respect de son histoire. aujourd'hui gîtes de France de Paul et Philippa Hecquet.","architecture":"Forteresse médiévale du XIIIe et XVe siècle, édifice complexe par sa conception, de plan en équerre, le corps de logis rectangulaire  retour en équerre par un bâtiment sur arcade et  galerie pour rejoindre un corps de bâtiment carré retour par des dépendances  sur l'intérieur jusquà un mur fermant la cour au corps de logis et  accolé sur un angle d'une tour ronde et à l'opposé retour en équerre pour accéder au donjon à toit plat.","habitants":"Famille de Paul et Philippa Hecquet\r\n        \r\n        \"","divers":"Château de Rodié à Courbiac","gps":"","images":["../../jctruffet.com/image/image_47/47_Rodie_1.jpg","../../jctruffet.com/image/image_47/47_Rodie_2.jpg","../../jctruffet.com/image/image_47/47_Rodie_3.jpg","../../jctruffet.com/image/image_47/47_Rodie_4.jpg","../../jctruffet.com/image/image_47/47_Rodie_5.jpg","../../jctruffet.com/image/image_47/47_Rodie_6.jpg","../../jctruffet.com/image/image_47/47_Rodie_7.jpg","../../jctruffet.com/image/image_47/47_Rodie_8.jpg","../../jctruffet.com/image/image_47/47_Rodie_9.jpg"]},"Consult_chateau_formulaire7cc6":{"id":"Consult_chateau_formulaire7cc6","dept":"47","canton":"Ste-Livrade sur Lot","commune":"Monclar","nom":"Rodier_Seiglal","type":"Château","periode":"XVII-XIX","histoire":"Deux châteaux à Monclar celui de Rodier et de Seiglal.                                                                        RODIER La famille du Puy de Rodié est connue depuis le XVIIe siècle. En 1632, Joachim du Puy, écuyer, marié à Jeanne de Vallier. De ce mariage sont nés François du Puy, sieur du Rodier, Pierre du Puy, sieur de La Nauze, et Jean-Jacques du Puy, sieur de Vallier. Cette année Jeanne de Vallier nomme Pierre du Puy, avocat au parlement de Bordeaux pour son procureur pour faciliter le mariage de son second fils, Pierre du Puy, avec Isabeau de Floissac. Jean-Jacques du Puy, sieur de Vallier, épouse en 1647 Antoinette de Floissac, fille de feu Gabriel de Floissac, de son vivant notaire royal, et d'Antoinette Arnaud, de Cancon. François du Puy, sieur du Rodier, épouse en 1657 Judith Fournier, de Monclar. En 1693, Jean-Claude du Puy , écuyer, sieur de La Nauze, produit des lettres royales lui donnant provision de maire perpétuel de Monclar, après la création de cette charge. Le château a dû être construit au milieu du XVIIIe siècle d'après sa structure, commune à cette époque en Agenais,  par Renaud du Puy. Le château est construit au moment du mariage de Pierre de Montalembert, seigneur de Trépadou, au château du Rodiè, le 7 août 1777, fils de feu François de Montalembert, seigneur de Catus, et de dame Marie Rose de La Brunie, neveu de Jean-François de La Brunie, seigneur d'Escoute, avec Marie Thérèse de Barrail, fille de feu Jean de Barrail, seigneur engagiste de la ville et juridiction de Monclar, neveu de Jean de Barrail nommé vice-amiral de France en 1753, mort en 1762, et de Marguerite du Puy, dame du Rodié, habitante du château du Rodié.\r\nLe château dans sa totalité a été inscrit M.H le 23 avril 2007.","architecture":"RODIER édifice du XVIIIe siècle bâti selon un plan en U, le logis étant cantonné au nord de deux ailes de communs en retour d'équerre. Le plan du rez-de-chaussée est en double profondeur pour les pièces centrales qui jouent un rôle de distribution, et en triple profondeur pour les extrémités.   Le bâtiment est implanté à mi pente, sur le versant sud d'un coteau dominant la vallée du Tolzac. Entièrement construit en brique enduite et de plan symétrique, il se compose d'un corps de logis rectangulaire d'un étage carré, de sept travées sur cour et neuf sur l'élévation sud, pour 5 travées en profondeur, couvert d'un toit à croupes en tuiles creuses. Le plan du rez-de-chaussée est en double profondeur pour les pièces centrales qui jouent un rôle de distribution, et en triple profondeur pour les extrémités. Les communs sont constitués de deux ailes en décalage au nord, formant retours d'équerre sur cour.                                                                   SEIGLAL, construit à la fin du XIXe siècle, il est en accord avec lesprit de lépoque qui, mélangeant les styles et les influences, cherche à recréer un passé idéalisé. Le parti pris architectural se démarque dans la campagne de Monclar, bâti selon un plan en L  avec une tourelle polygonale, située dans un angle, est inspirée de la Renaissance. Au nord-est se trouve un corps pavillonnaire à deux étages. Le château de Seiglal est situé au milieu dun vaste parc agrémenté dun lac.","habitants":"Pierre de Montalembert\r\n        \r\n        \"","divers":"Château de Rodier à Monclar et manoir de Seiglal","gps":"","images":["../../jctruffet.com/image/image_47/47_Rodier_Seiglal_1.jpg","../../jctruffet.com/image/image_47/47_Rodier_Seiglal_2.jpg","../../jctruffet.com/image/image_47/47_Rodier_Seiglal_3.jpg","../../jctruffet.com/image/image_47/47_Rodier_Seiglal_4.jpg"]},"Consult_chateau_formulairef2fd-2":{"id":"Consult_chateau_formulairef2fd-2","dept":"47","canton":"Villeneuve sur Lot","commune":"Villeneuve sur Lot","nom":"Roge","type":"Château","periode":"XV-XIX","histoire":"ROGE, au début du XIXe siècle, un certain Joseph de Bourran dont le monogramme est inscrit sur la grille du jardin, transforme le château,  c'est une belle propriété léguée à la ville dans les années 1960 qui reçoit aujourdhui un petit aérodrome et un centre de loisirs dans un cadre superbe.","architecture":"le château de Roge lui avait la charge de surveiller le passage sur le Lot : superbement fortifié au Moyen-Age avec une enceinte en pierre de taille avec douves en eau, pont levis, protégeant une maison-forte en brique sans doute du XVe siècle. Le logis est agrandi à l'ouest au début du XVIe siècle. Un étage supplémentaire sur les deux parties du logis et une tour d'angle ronde munie de canonnières sont ajoutés au XVIIe siècle, époque où des croisées ont été ouvertes, donnant sur le Lot. Le fossé occidental est supprimé après 1767. Au début du XIXe siècle, Joseph de Bourran  fait fermer la terrasse est par une aile de dépendances au sud, et construit un petit pont sur le fossé, aménage la tour défensive nord-est et fait percer de nouvelles fenêtres. Un ensemble de dépendances est bâti dans la 2e moitié du XIXe siècle sur l'arrière. Tout cela fait de ce site, ouvert au public pour ce qui est des extérieurs, un merveilleux endroit de promenade où sajoute aux immeubles de caractère une impressionnante collection darbres gigantesques, chênes, cèdres du Liban, magnolias, et précédant le fossé vers lest, une mystérieuse « charmille » essentiellement composée de tilleuls ! Je ne vous dis pas le parfum en ce printemps.","habitants":"Joseph de Bourran\r\n        \r\n        \"","divers":"Château de Rogé à Villeneuve sur lot","gps":"","images":["../../jctruffet.com/image/image_47/47_Roge_1.jpg","../../jctruffet.com/image/image_47/47_Roge_2.jpg","../../jctruffet.com/image/image_47/47_Roge_3.jpg","../../jctruffet.com/image/image_47/47_Roge_4.jpg","../../jctruffet.com/image/image_47/47_Roge_5.jpg","../../jctruffet.com/image/image_47/47_Roge_6.jpg","../../jctruffet.com/image/image_47/47_Roge_7.jpg","../../jctruffet.com/image/image_47/47_Roge_8.jpg"]},"Consult_chateau_formulaire75b1":{"id":"Consult_chateau_formulaire75b1","dept":"47","canton":"Fumel","commune":"Sauveterre de Lémance","nom":"Rois_Ducs","type":"Forteresse","periode":"XIII","histoire":"ROIS-DUCS, forteresse royale édifiée pour Edouard Ier Plantagenêt durant le 4e quart du XIIIe siècle, dans la bailie de Tournon, sur un éperon verrouillant la vallée de la Lémance, afin de mettre en défense l'est de l'Agenais face au Quercy français.  De la famille des Pestilhac. Elle est pour la première fois mentionnée comme castrum en 1289, dans la grande ordonnance sur l'administration de l'Agenais. Elle est remise en état après la guerre de Gascogne en 1305, la couverture des tours est terminée par le maître maçon Guillaume de Genève. Assiégée et prise par les troupes françaises lors de la guerre de Saint-Sardos, la forteresse est reconquise en 1348 par Edouard III qui la cède à Bernard de Durfort. Elle est occupée en 1432, par les troupes de Charles VII. Devenue résidence seigneuriale à la fin du Moyen Age et détenue par la famille de Losses de Saint-Astier à l'époque moderne, Au XVe siècle passe à la famille de Sermet, la forteresse sera habitée  par plusieurs familles seigneuriales avant d'être en partie incendiée à la Révolution. Sauvé au XXe siècle par l'aviateur Jean Mermoz dont sa mort prématurée interrompt la restauration.","architecture":"Le château des Rois Ducs est brûlé en l789. 200 ans d'abandon ont donné place à 20 ans de restauration soigneuse et authentique. Ensemble castral construit sur un éperon rocheux, barré par un large fossé défendu par une courtine basse. Dans une enceinte quadrangulaire la  forteresse de plan trapézoïdal flanquée de trois tours semi-circulaires sur les angles ouest, Est et nord. Le donjon massif à l'est comporte une salle inférieure couverte d'une coupole à pans, et une salle haute voûtée d'ogives à six quartiers. Un escalier à vis dessert la plateforme sommitale. Une courtine percée d'archères cruciformes la relie aux autres tours, leur rez-de-chaussée est voûté d'ogives à six quartiers, un escalier à vis dessert une salle non voûtée à l'étage, le logis primitif adossé à la courtine nord, qui conserve une baie jumelée, a été reconstruit, le logement seigneurial de la fin du Moyen-Age, ruiné, appuyé à la courtine sud, comporte un étage desservi par un escalier hors-oeuvre à vis. Les 20 années de restauration permettent de retrouver son ambiance moyenâgeuse, en particulier dans ses salles voûtées et son jardin médiéval. Vous remarquerez également les réserves d'eau datant de l'époque gallo-romaine ou encore le donjon, qui fut l'habitation du Roi de France en 1284. un nouveau corps de logis est édifié du côté sud de la cour à la fin du XVe ou au  début du XVIe siècle.","habitants":"Famille de l'aviateur Jean Mermoz\r\n        \r\n        \"","divers":"Château des Rois Ducs à Sauveterre sur Lémance","gps":"","images":["../../jctruffet.com/image/image_47/47_Rois_Ducs_1.jpg","../../jctruffet.com/image/image_47/47_Rois_Ducs_2.jpg","../../jctruffet.com/image/image_47/47_Rois_Ducs_3.jpg","../../jctruffet.com/image/image_47/47_Rois_Ducs_4.jpg","../../jctruffet.com/image/image_47/47_Rois_Ducs_5.jpg","../../jctruffet.com/image/image_47/47_Rois_Ducs_6.jpg","../../jctruffet.com/image/image_47/47_Rois_Ducs_7.jpg","../../jctruffet.com/image/image_47/47_Rois_Ducs_8.jpg"]},"Consult_chateau_formulairec3a5":{"id":"Consult_chateau_formulairec3a5","dept":"47","canton":"Monflanquin","commune":"Monflanquin","nom":"Roquefere_47","type":"Château","periode":"XIV","histoire":"ROQUEFERE, Édouard Ier, le cède à son sénéchal de lAgenais, Jean de Grailly par un acte passé à York en 1280. Le château est resté entre ses descendants jusquà la fin de la guerre de cent-Ans : Dans cette famille par succession et alliance jusqu'en 1495 passe à  Jean de Chaussade, seigneur de Roquefère, marié à Françoise de Lanne, fille de Jean, baron de La Roche-Chalais, et d'Anne Bouchard d'Aubeterre. Le château est vendu en 1604 à Jean de Sarrau de Boynet (mort en 1628) et à son fils, Jean de Sarrau (mort en 1643), Françoise de Lanne a racheté le château aux Jean de Sarrau, père et fils, en 1608. Elle a vendu le château en 1609 à sa fille après l'avoir disjoint du château de Calonges, Anne de Chaussade, dame de Roquefère, mariée à Joseph de La Mothe, baron de Lherm. Elle transmet le château à son fils, Bernard de Chaussade de La Mothe, qui lègue le château à sa fille, Anne de Chaussade de La Mothe, dame de Roquefère, mariée à Jean II de Rochefort, marquis de Théobon. Jean II de Rochefort, avec son père Charles II de Rochefort, il a  transmis à son fils, Charles de Rochefort (1645-1680) qui lègue le château à sa fille, Marie-Guyonne de Rochefort, mariée à Louis Pons. C'est la dernière héritiére des Grailly-Foix. Elle vend le château à Jean Fournyé-Gorre, apothicaire.Jean Fournyé-Gorre est décédé avant 1727. Il transmet le château à son fils, Pierre Fournier de Saint-Amans, médecin du duc d'Orléans. Pierre Fournier de Saint-Amans lègue le château à son cousin, Jean Fournier de Saint-Amans (mort en 1780), marié à Élisabeth de Bérail. Ce dernier le lègue à son beau-frère, Charles Raymond de Bérail en 1781. Par la suite, le château est passé aux Chasserel puis à la famille d'Anglars par le mariage de Thérèse de Chasserel (1846-1901) à Maxime d'Anglars (1845-1911).","architecture":"Roquefère solidement fortifié, le château commandait les voies d'accès de Monflanquin à Castillonès et Villeréal. Trois corps de logis en équerre sont placés à l'extrémité sud du plateau, le quatrième côté étant constitué par la tour d'entrée. Trois tours le protégeaient. Au nord la tour donnant accès à la cour intérieure, portail renforcé de barres, coulissant dans le mur, avec meurtrières et passage de herse. Une tour ronde au sud ouest et une tour carrée au sud-est. Dans la cour, l'angle rentrant formé par les corps de logis Est et Sud, est occupé par une tour octogonale. Sur le rebord du plateau se trouve une tour ronde, transformée plus tard en pigeonnier (1300 alvéoles). Le bâtiment sud conserve, au premier étage, une salle avec un plafond peint du XVIIIe siècle, le bâtiment Est conserve sur sa façade extérieure une série de créneaux, bordés à l'intérieur d'un chemin de ronde.","habitants":"Famille de de Chaussade\r\n        \r\n        \"","divers":"Château de Roquefère à Monflanquin","gps":"","images":["../../jctruffet.com/image/image_47/47_Roquefere_47_1.jpg","../../jctruffet.com/image/image_47/47_Roquefere_47_2.jpg","../../jctruffet.com/image/image_47/47_Roquefere_47_3.jpg","../../jctruffet.com/image/image_47/47_Roquefere_47_4.jpg","../../jctruffet.com/image/image_47/47_Roquefere_47_5.jpg","../../jctruffet.com/image/image_47/47_Roquefere_47_6.jpg"]},"Consult_chateau_formulairea1e4":{"id":"Consult_chateau_formulairea1e4","dept":"47","canton":"Colayrac Saint-Cirq","commune":"Roquefort","nom":"Roquefort_47","type":"Forteresse","periode":"XIII-XIV","histoire":"A Roquefort le château de Caudouin du XVIIIe siècle.   ROQUEFORT en 1562, Jeanne d'Albret, reine de Navarre, et vicomtesse de Bruilhois, vend à pacte de rachat perpétuel à Jean II de Secondat (1515-1599), seigneur de Roques, les seigneuries de Roquefort, Sérignac, Montesquieu, Ségougnac, Plaichac, Goulard et Cuqc ces sept terres avaient été  confisquées à Pierre de Secondat, père dudit Jean. Le château est alors en ruines. Henri de Bourbon, roi de Navarre, constate dans un acte de 1576 la cession du 30/10/1562. Par le même acte, il vend, cède, et transporte à perpétuité audit Jean de Secondat la faculté de rachat . Gaston de Secondat  1625-1693, petit-fils de Jean II de Secondat, seigneur de Roques et La Fleyte, baron de Roquefort, est tenu sur les fonts baptismaux par Gaston d'Orléans, frère du roi Louis XIII, et Sérène de Durfort, mariée à Charles Ier de Montpezat. La fille de Montesquieu, Denise de Secondat (1727-1800), a été mariée par son père à un cousin, Geoffroy de Secondat de Roquefort de Roques (1702-1774), petit-fils de Gaston de Secondat. Le mariage a eu lieu à Clairac le 25 mars 1745. Le marié avait 42 ans, et la mariée, 24 ans de moins. Denise, veuve en 1774, a habité à Agen, dans l'hôtel des Secondat de Roques. La famille a conservé le château jusqu'à la fin du XVIIIe siècle.  Monument commémoratif de Françounette sur le Placié. Cest dans cette petite commune quest née la légende de Françounette qui vécut au XVIIe siècle. Le célèbre poète occitan agenais Jasmin écrivit un poème sur cette jeune femme considérée comme une sorcière. Cest une histoire qui mêle forces mystiques et histoire damour.","architecture":"ROQUEFORT fut édifié au XIIIe ou au début du XIVe siècle. Cette forteresse a conservé sa tour-salle, lessentiel de son enceinte et des bâtiments réutilisés à lépoque classique. Il fut en partie démantelé durant la guerre de Cent Ans. Il était en ruines en 1562 lorsque Jeanne dAlbret le donna à la famille de Secondat qui le conserva jusquà la fin du XVIIIe siècle. Il fut remanié au XVIe siècle dans le tumulte des guerres de religion. Il a une triple enceinte qui englobe pour l'extrémité d'un coteau. La tour carrée semble avoir été réduite de la moitié de sa hauteur. On voit dans les courtines une large brèche, bouchée grossièrement avec des briques. Il est possible que Roquefort ait été pris et été démantelé peu après sa construction. De lépoque antique demeure la villa gallo-romaine de Sourdignan qui, était une habitation de grande ampleur, dotée de tout le luxe  et notamment de thermes.  Depuis la fin du XIIIe siècle il domine le bourg de Roquefort. Ce quil en reste : sur une belle motte féodale une bonne partie de lenceinte castrale, des bâtiments réutilisés en habitat depuis les années 1600, aujourdhui gite de luxe, et une grosse tour carrée qui devait être le donjon.                                 CAUDOIN, Le parc dattractions Walibi dynamise la commune et ses alentours et fait de Roquefort un pôle prépondérant du tourisme lot-et-garonnais.","habitants":"Geoffroy de Secondat de Roquefort de Roques\r\n        \r\n        \"","divers":"Vestiges du château de Roquefort et château de Caudoin.","gps":"","images":["../../jctruffet.com/image/image_47/47_Roquefort_47_1.jpg","../../jctruffet.com/image/image_47/47_Roquefort_47_2.jpg","../../jctruffet.com/image/image_47/47_Roquefort_47_3.jpg","../../jctruffet.com/image/image_47/47_Roquefort_47_4.jpg","../../jctruffet.com/image/image_47/47_Roquefort_47_5.jpg","../../jctruffet.com/image/image_47/47_Roquefort_47_6.jpg","../../jctruffet.com/image/image_47/47_Roquefort_47_7.jpg"]},"Consult_chateau_formulairecf3b":{"id":"Consult_chateau_formulairecf3b","dept":"47","canton":"Beaugeas-Cancon","commune":"Roquegautier","nom":"Roquegautier","type":"Château","periode":"XV","histoire":"MOULINET, Marie de Valens fait don de la maison noble de Moulinet  à sa fille Marguerite  en 1577, Marie de Verdun, épouse de feu Charles de Montferrand, seigneur de Cancon, donne à sa fille Marguerite la \"maison noble et le château\" de Moulinet et ses appartenances démembrées de l'ancienne seigneurie de Valens. L'ancien château de Moulinet comportait un pavillon quadrangulaire auquel était accolé un donjon, incorporés dans le nouveau logis construit en 1708, le comte de Vaillac doit se résoudre à vendre ses biens et le château, après l'acquisition de la seigneurie par Joseph Philippe François de Mathieu, conseiller du Roi au parlement de Bordeaux.  Vers 1840, restauration du logis pour Ernest Cazet fils.                           ROQUEGAUTIER, chambres et table dhôtes de la famille Vrech dans un manoir du XVe siècle avec piscine. Six siècles d'histoire, le château a été construit  par Jehan de Boyssonnade. Il est alors situé dans l'ancienne paroisse de Saint Etienne de Monibal. La seigneurie de Roquegautier (Roche de Gautier  et  Roque-Gautier à des époques différentes) reste dans la famille des de Boyssonnade jusqu'au début du XVIIe siècle ou la famille des \"de Bourgoin\" en prend possession, puis c'est ensuite au tour de la famille des \"de Galaup\" d'en être résidant.","architecture":"Chateau du Moulinet village voisin. Vers 1690 à 1708, une partie des terres du village actuel et le château sont la propriété du Comte de Vaillac, Gouverneur de Bordeaux qui n'y habite pas, en revanche son frère le Vicomte de Vaillac mène une vie dissolue au chateau de Moulinet et commet tant d'exactions dans la région qu'il est condamné à mort le 10 Avril 1680 à Bordeaux et décapité le lendemain. Les dépendances comprennent des écuries et un corps de passage daté 1717, surmonté par une salle équipée d'une cheminée monumentale (démontée et remontée dans l'actuel logis).  Logis en équerre sur cour, élévation postérieure de cinq travées, toit en croupe brisée, ardoises sur le brisis.                                              L'Architecture  de Roquegautier dans   sa construction, comportait neuf tours. Il a été reconstruit au XVIIIe siècle  pour ne conserver que trois tours et agrandir les dépendances.   A la fin du XIXe siècle de nombreuses modifications lui sont apportées: modification des ouvertures, portes et fenêtres, et élévation d'une galerie extérieure sur la façade principale  ainsi qu'une tour octogonale.","habitants":"Joseph Philippe François de Mathieu,                     Famille des de Boyssonnade \r\n        \r\n        \"","divers":"Château de Roquegautier er du Moulinet gravure 8","gps":"","images":["../../jctruffet.com/image/image_47/47_Roquegautier_1.jpg","../../jctruffet.com/image/image_47/47_Roquegautier_2.jpg","../../jctruffet.com/image/image_47/47_Roquegautier_3.jpg","../../jctruffet.com/image/image_47/47_Roquegautier_4.jpg","../../jctruffet.com/image/image_47/47_Roquegautier_5.jpg","../../jctruffet.com/image/image_47/47_Roquegautier_6.jpg","../../jctruffet.com/image/image_47/47_Roquegautier_7.jpg","../../jctruffet.com/image/image_47/47_Roquegautier_8.jpg","../../jctruffet.com/image/image_47/47_Roquegautier_9.jpg"]},"Consult_chateau_formulaireab3d":{"id":"Consult_chateau_formulaireab3d","dept":"47","canton":"Tonneins","commune":"Verteuil d","nom":"Roquepiquet","type":"Château","periode":"XVI","histoire":"ROQUEPIQUET, en 1470 Arnaud de Caumont, seigneur de Verteuil, donne par acte d'arrentement la maison noble ou repaire de Roquepiquet avec tous les biens en dépendant à Mathurin de Gervain, damoiseau originaire du Poitou, à charge pour lui d'y résider et de l'améliorer. Le système défensif date des guerres de Religion, avant 1584, à l'initiative de Gabriel de Gervain. La construction de la chapelle funéraire serait due à Jean de Gervain. Jean Gabriel Émile de Ge
