que points cardinaux. Les autres rues entrecoupées de ruelles se terminaient en cul-de-sac et nont été ouvertes à la circulation quaprès 1836. Le long de ces murailles et en dehors courraient  de larges fossés, qui rendaient difficile lentrée de la ville.  La Bastide de Damazan fut nommée à son origine Castrum-Comitale (Château -Comtal) pour rappeler quelle avait été construite sous linspiration et par  ordre du Comte de Poitiers, son suzerain, frère de St Louis Roi de France. Sa fondation date de 1259. Objet de la rivalité franco-anglaise lors de la guerre de cent ans, elle fut prise et reprise en plusieurs occasions et eut à souffrir plus tard des luttes religieuses. Au château Comtal, situé à langle de la rue Maurice Dupuy et de la rue du magasin des tabacs, se trouvait la résidence du gouverneur militaire nommé par le comte de Poitiers, puis par le Roi. La garnison en occupait les dépendances.\r\nAu XVIIIe siècle, les Mothes, seigneurs de Lompian qui possédaient leur résidence dété à « Pichet », achetèrent le vieux château Comtal pour en faire leur résidence urbaine. En 1832, le magasin des tabacs fut installé au château Comtal. Lhabitation fut entièrement bouleversée.","architecture":"Bastide de Damazan, la place centrale  entourée de maisons à cornières, dont quelques-unes conservent encore leurs murs en torchis et colombages. La restauration du pavage de la place en 1998 a permis de rebâtir le puits qui alimentait jadis la ville en eau et la construction de la fontaine côté nord de la place. Les façades ont été repeintes en 2001, retrouvant des couleurs variées, comme au Moyen-Âge. Hôtel de ville : édifié vers 1818 au centre de la place à cornières au-dessus de la halle et son escalier du XIVe siècle.\r\nChâteau comtal  : à lorigine résidence du gouverneur militaire nommé par le roi, il fut ensuite occupé par le magasin des tabacs à partir de 1832 ; en partie détruit par le feu en 1989, il est aujourdhui en cours de restauration. Pour dangle et un reste de remparts boulevard du Midi et boulevard du Général-de-Gaulle.\r\nEsplanade des Promenades : construite en 1863 sur les anciens fossés, avec pigeonnier cylindrique de type « hune », ancienne école des filles construite en 1885 longeant le côté nord des promenades (transformée en « hôtel des associations ») et monument aux morts.  Château de Muges pas d'information.\r\nChâteau de LABARTHE du XIVe siècle construit sur une motte artificielle, entre Damazan et Monheurt.","habitants":"Maréchal Blaise de Montluc                                 Famille Breton de Grelle  \r\n        \r\n        \"","divers":"Château de Damazan grav 1 à 3, de Bagnorgues 4, de Boffet 5, de Cazala 6, de Labarthe 7, de Marin 8 et de Grenier 9.","gps":"","images":["../../jctruffet.com/image/image_47/47_Damazan_1.jpg","../../jctruffet.com/image/image_47/47_Damazan_2.jpg","../../jctruffet.com/image/image_47/47_Damazan_3.jpg","../../jctruffet.com/image/image_47/47_Damazan_4.jpg","../../jctruffet.com/image/image_47/47_Damazan_5.jpg","../../jctruffet.com/image/image_47/47_Damazan_6.jpg","../../jctruffet.com/image/image_47/47_Damazan_7.jpg","../../jctruffet.com/image/image_47/47_Damazan_8.jpg","../../jctruffet.com/image/image_47/47_Damazan_9.jpg"]},"Consult_chateau_formulaire1a79-2":{"id":"Consult_chateau_formulaire1a79-2","dept":"47","canton":"Ste-Livrade sur Lot","commune":"Dolmayrac","nom":"Dolmayrac","type":"Château-Tour","periode":"XIII","histoire":"Deux châteaux à Dolmayrac celui de Dolmayrac et de Laval                                                                     DOLMAYRAC, est citée comme castrum en 1271.  La tour de Dolmayrac est un vestige des remparts qui protégeaient la ville. Elle a été construite à la fin du XIIIe siècle ou au début du  XIVe siècle, face au plateau, le point le plus faible de la défense du village. Les anciens remparts allaient de la tour au château situé à la pointe de l'éperon sur lequel est établi le village. Du château subsistent les vestiges de deux tours. Le château est déjà en ruines au  XVIIIe siècle. Au  XVe et XVIe siècle la seigneurie de Dolmayrac appartenait à la famille de Montpezat avant de faire partie du duché d'Aiguillon. Le cadastre de 1836 montre que des vestiges des remparts étaient encore présents contre la tour. En 1856 la commune a projeté d'acheter la tour pour en faire la mairie. Elle est achetée en 1859. Des travaux d'aménagement sont adjugés en 1860. La porte d'entrée actuelle doit dater de ces travaux.                                                         LAVAL, au XVIIIe siècle, le domaine appartient aux Gripière de Moncroc et comporte quatre métairies, un moulin à vent et un moulin à eau. Le moulin à vent est élevé selon le type courant dans la région. Il complétait l'activité du moulin sur la Bausse. En 1836, la propriété est achetée par Jean Baptiste Vallès, juge de paix à Sainte Livrade. On doit à cette famille lagrandissement et la rénovation de la demeure. En 1878, le château de Laval passe à Marie Charles Vallès, négociant à Sainte-Livrade.","architecture":"En 1271, Dolmayrac était déjà citée comme castrum. Il ne reste depuis que la Tour de Dolmayrac comme vestige des anciens remparts qui protégeaient la ville. Sa construction date de la fin du XIIIe siècle ou au début du XIVe siècle. Positionné face au plateau, c'était le point le plus faible de la défense du village. Les anciens remparts allaient de la tour au château situé à la pointe de l'éperon sur lequel est établi le village. De l'ancien château, il ne reste que les vestiges de deux tours. Le château de Dolmayrac était déjà en ruines au XVIIIe siècle. Le cadastre de 1836 dévoile des vestiges des remparts encore présents contre la tour. En 1856, la commune avait le projet d'acheter la tour pour en faire la mairie. le projet sera abandonné. La Tour sera achetée en 1859. Des travaux d'aménagement sont adjugés en 1860. La porte d'entrée actuelle doit dater de ces travaux. Le château de Dolmayrac est inscrit aux monuments historiques, depuis 1927.                                            LAVAL,  une maison forte est bâtie dans la seconde moitié du XVe siècle, comprenant un corps de logis et une tour. Dans la deuxième moitié du XVIe siècle, la tour reçoit un escalier rampe sur rampe, et le logis une cheminée par niveau. Un corps de bâtiment sud-est, avec fours et dépendances en soubassement, est remanié dans la deuxième moitié du XVIIe siècle, il ouvre au rez-de-chaussée par une porte à pilastres et fronton sous bretèche.","habitants":"Famille de Montpezat                                                  Famille de Gripière de Moncroc \r\n        \r\n        \r\n        \r\n        \"","divers":"Tour du château de Dolmayrac et château de Laval","gps":"","images":["../../jctruffet.com/image/image_47/47_Dolmayrac_1.jpg","../../jctruffet.com/image/image_47/47_Dolmayrac_2.jpg","../../jctruffet.com/image/image_47/47_Dolmayrac_3.jpg","../../jctruffet.com/image/image_47/47_Dolmayrac_4.jpg"]},"Consult_chateau_formulaire0b94":{"id":"Consult_chateau_formulaire0b94","dept":"47","canton":"Casteljaloux","commune":"Durance","nom":"Durance","type":"Château","periode":"XIII-XVII","histoire":"DURANCE, le prieuré de Durance est l'ancien prieuré Saint-Étienne-de-la-Grange, datant de la première moitié du XIIIe siècle, dépendait de l'abbaye de Saint-Jean-de-Castelle. \r\nLe château Henri IV : actuellement propriété privée, est un ancien relais de chasse d'Henri III de Navarre (futur Henri IV, roi de France).\r\nUne ancienne porte du XIIIe siècle au sud de la bastide                                                                          Prieuré de Lagrange, imposant prieuré de Jean-Pierre et Aline Fourteau.","architecture":"Durance, en pleine forêt landaise, cette bastide fondée tardivement en 1320 par Edouard II d'Angleterre apparaît inachevée. Elle fut pourtant un rendez-vous de chasse des rois de Navarre comme en témoigne les restes du château Henri IV. Elle présente un intérêt architectural pour ses maisons non restaurées, une maison à pans de bois et encorbellement construite dit-on, pour Sully, l'ancien Prieuré de la Grange et les voûtes du XVe siècle de la chapelle, abbaye prémontré. Contre une chapelle gothique, un corps de bâtiment flanqué d'une tourelle polygonale renfermant un escalier à vis contenait les pièces d'habitation. Dans la chapelle, un ensemble de peintures murales du XIVe siècle couvre les murs et le voûtes. Des remaniements ont été effectués aux XVIe et XVIIe siècles tour d'escalier, portes, fenêtres.","habitants":"Henri III-Henri IV\r\n        \r\n        \"","divers":"Porte de la bastide le château de Durance et le prieurè grav 5 et 6.","gps":"","images":["../../jctruffet.com/image/image_47/47_Durance_1.jpg","../../jctruffet.com/image/image_47/47_Durance_2.jpg","../../jctruffet.com/image/image_47/47_Durance_3.jpg","../../jctruffet.com/image/image_47/47_Durance_4.jpg","../../jctruffet.com/image/image_47/47_Durance_5.jpg","../../jctruffet.com/image/image_47/47_Durance_6.jpg"]},"Consult_chateau_formulaire049a":{"id":"Consult_chateau_formulaire049a","dept":"47","canton":"Duras","commune":"Duras","nom":"Duras","type":"Forteresse","periode":"XII-XIV","histoire":"DURAS, le premier château fut construit en 1137 sur un éperon rocheux par Guillaume Amanieu vicomte de Besaume, de Benauges et de Gabardan.\r\nAu début du XIVe Gaillard de Goth hérite de Duras, frère du premier pape français, Clément V, il bénéficie alors de l'argent pontifical pour transformer son château en une forteresse imprenable. Situé dans une zone territoriale stratégique lors de la guerre de Cent-Ans les Durfort ont su tirer leur épingle du jeu au gré des alliances et des avantages financiers, tantôt avec la France tantôt avec l'Angleterre. La fin de la guerre à Castillon la bataille aurait pu inaugurer une aire de paix, il n'en est rien ! Les Durfort au XVIe siècle rejoignent le parti protestant s'opposant ainsi au roi de France qui ne laissera pas cette infamie passer : Blaise de Montluc assiège le château en 1562. La famille éprouvée décide alors de rentrer dans le rang et en contrepartie obtient le titre de comte. Leur ascension ne s'arrêtera pas là : comte puis marquis et enfin par faveur de Louis XIV, en 1689, duc et pair de France. Par un mariage avec Arnaud de Durfort, Marquèse de Goth apporte en dot la seigneurie de Duras et c'est ainsi que la famille de Durfort devient Durfort-Duras et possèdera le château jusqu'en 1819.  Partiellement détruit à la Révolution Française et usé par le temps, le château fait retour à la famille de Durfort en 1807. Sous la Restauration, Amédée-Bretagne-Malode Durfort sixième duc de Duras nommé maréchal de camp et Pair de France, son épouse la célèbre  duchesse de Duras née Claire de Kersaint tient sous la restauration un brillant salon, vendu par les héritiers des Durfort à connu de nombreuses vicissitudes avant d'être acquis par  la commune à la fin des années 1964. aujourd'hui musée d'histoire et d'ethnographie locales.","architecture":"Initialement érigé au XIIe siècle, Le château est un concentré de l'architecture militaire et d'agrément. En passant de la citadelle féodale à la forteresse médiévale, puis à la demeure de style Renaissance. le château de Duras est transformé au XIVe siècle en une forteresse imprenable, elle perd son aspect défensif et devient une superbe demeure de plaisance, avec ses écuries, ses jardins réguliers, sa salle de réception (salle des trois Maréchaux). Le corps principal est un quadrilatère flanqué de quatre tours rondes aux angles. Sur le soubassement gothique furent montés deux corps de logis au sud et au nord d'une cour intérieure et deux galeries superposées en relient les deux niveaux. Dominant la vallée du Dropt, après des siècles de conflits et de guerres sur ses terres le château, dès le XVIIe-XVIIIe connait de profonds bouleversements architecturaux, il devient ainsi une magnifique villa aristocratique agrémentée de jardins à la française, très à la mode à cette époque. le château de Duras est un lieu chargé d'histoire. Avec la cour intérieure et les balcons, coursières uniques en France, vous allez plonger dans le monde raffiné de l'aristocratie. Pillé et partiellement détruit à la Révolution, il est acheté et restauré par les habitants dans les années 1960.","habitants":"Famille des Durfort                                                   Duchesse de Duras\r\n        \r\n        \"","divers":"La tour de l'horloge et le château de Duras","gps":"","images":["../../jctruffet.com/image/image_47/47_Duras_1.jpg","../../jctruffet.com/image/image_47/47_Duras_2.jpg","../../jctruffet.com/image/image_47/47_Duras_3.jpg","../../jctruffet.com/image/image_47/47_Duras_4.jpg","../../jctruffet.com/image/image_47/47_Duras_5.jpg","../../jctruffet.com/image/image_47/47_Duras_6.jpg","../../jctruffet.com/image/image_47/47_Duras_7.jpg","../../jctruffet.com/image/image_47/47_Duras_8.jpg"]},"Consult_chateau_formulaire36d6":{"id":"Consult_chateau_formulaire36d6","dept":"47","canton":"Nérac","commune":"Lamontjoie","nom":"Escalup_Bax","type":"Forteresse","periode":"XIV-XVIII","histoire":"A cinq kilomètres au nord ouest à Nomdieu le château d Bax.                                                                      ESCALUP, de la famille dEscalup,Au début du XVe siècle, la famille d'Escalup possédait un grand domaine dans la juridiction de Lamontjoie, le château passa à celle des Malvin, qui y apporte des modifications au  XVIIe siècle. Au XVIIIe siècle, sont édifiées diverses dépendances. À la Révolution, les bâtiments ne sont plus habités, la toiture s'est effondrée et les terres sont réunies avec celles de la propriété des Ferbos-Magnos.  C'est un témoin intéressant des maisons fortes gasconnes du Moyen Age, situé alors aux confins des possessions anglaises et françaises.  Le château fut édifié par la famille dEscalup, dont il a conservé le nom. Il est parfois considéré comme une  tour-salle, la différence entre la salle et le « château gascon » étant parfois difficile à établir.  A la Révolution, les bâtiments, qualifiés de vieille tour et petit manoir, ne sont plus habités : les terres ont été réunies au domaine de Ferbos-Magnos, comme celles du château de Marin. Depuis 2005 le château racheté est en cours de restauration.  Il est inscrit au titre des monuments historiques en 1999.  BAX La famille de Bax est mentionnée au milieu du XIIIe siècle,  il a appartenut à Pierre de Guehes, chevalier, à Bernard de la Beyrie en 1254 et à Michel de l'Isle seigneur de saint-Aignan en 1409 Bax passe  aux du Faur, puis à Pierre de Toulouse co-seigneur de Bax et à la famille de Cas de st-Barthelemy qui le possèdent toujours.","architecture":"Maison-forte du XIIIe siècle, remaniée au XVIIe siècle,  cest un corps de bâtiment rectangulaire, accoté dune seule tour peu saillante et qui fut arasée à la hauteur du bâtiment principal. Les défenses consistent en un fossé, le couronnement crénelé du logis et la tour qui protégeait l'entrée, constituée d'une tour carrée et d'un corps de logis ou tour-salle et édifiée au XIVe siècle.   La tour était en mauvais état à la Révolution, et la toiture du logis s'est effondrée au début du XXe siècle. Elle comporte actuellement quatre niveaux,  les deux premiers niveaux percés de jours étroits semblent affectés au stockage, le troisième percé de grandes ouvertures dont les arrières voussures paraissent d'origine et possédant une cheminée, est un niveau d'habitation, le quatrième possédait des latrines; un pilier central soutient le plancher du troisième niveau ; la tour, dotée de grandes fenêtres et de cheminées, a été arasée à la hauteur du corps de logis ; l'accès au logis se faisait par deux portes en arc brisé au sud flanquées par la tour; des galeries extérieures en bois existaient au nord et à l'ouest où restent des lignes de corbeaux, la fenêtre Nord du mur Est a été remaniée au XVIe siècle, croisées du quatrième niveau, cheminées contre le mur ouest, division en pièces ou appartements.\r\nBAX à lorigine de la construction dun château, dominant le petit Auvignon dans la commune du Nomdieu. En pierre de taille pourrait dater de la fin du Moyen-âge. Le château de Bax se présente sous la forme dun bâtiment rectangulaire avec une tour dangle et un autre corps de bâtiment. Un mur divise le corps de logis principal en deux pièces qui sont desservies par un escalier. Il comprend une enceinte avec une tour dangle au sud, une tour ronde sur la façade ouest, de dépendances autour de léglise. Des travaux ont été exécutés vers le XVe et le XVIe siècle et au XIXe siècle. Une partie du bâtiment principal a brûlé au milieu du XXe siècle.","habitants":"Famille dEscalup\r\n        \r\n        \r\n        \"","divers":"Château d'Escalup et le château de Bax grav 5 et 6 et de Lamontjoie grav 7","gps":"","images":["../../jctruffet.com/image/image_47/47_Escalup_Bax_1.jpg","../../jctruffet.com/image/image_47/47_Escalup_Bax_2.jpg","../../jctruffet.com/image/image_47/47_Escalup_Bax_3.jpg","../../jctruffet.com/image/image_47/47_Escalup_Bax_4.jpg","../../jctruffet.com/image/image_47/47_Escalup_Bax_5.jpg","../../jctruffet.com/image/image_47/47_Escalup_Bax_6.jpg"]},"Consult_chateau_formulairea503-2":{"id":"Consult_chateau_formulairea503-2","dept":"47","canton":"Penne d","commune":"Penne d","nom":"Escoute_Tour","type":"Tour","periode":"XV","histoire":"ESCOUTE, le barrage ou \"payssière\" de Lestaque sur le Lot a dû être reconstruit en 1308. Il est mentionné en 1311 dans une enquête faite par Guillaume Cazes, juge d'Agen, à la demande du roi d'Angleterre. Il fait partie des onze barrages qui ont été construits sur le Lot à la fin du XIIIe siècle à la demande du roi d'Angleterre dans le bailliage de Penne. Pour accaparer les droits de péage, les seigneurs des environs ont fait construire à proximité des édifices fortifiés. Il est connu au XVe siècle sous le nom d'Escoute. Il est alors la possession des familles de Lustrac et de Laduguie. Elle a peut-être été reconstruite par Jean de Laduguie, qualifié de « sieur de la Tour de Lestanch » en 1482. La seigneurie d'Escoute est détenue par la famille Labrunie. Les Labrunie d'Escoute sont cités dès le  XVIIe siècle. Ils ont dû faire construire le logis qui flanque la tour. La tour a été percée d'une porte au rez-de-chaussée en 1776, d'après la date gravée sur son agrafe. Le logis a été agrandi  pour Pierre de Montalembert, neveu de Jean-François de La Brunie, seigneur d'Escoute, qui semble avoir hérité de la maison noble après 1777, date de son mariage au château du Rodier avec Marie Thérèse de Barrail. La propriété est alors détenue par les frères Bonnefoux de Penne.","architecture":"Comme pour d'autres sites de barrages sur le Lot, une tour seigneuriale a été construite à proximité pour en assurer le contrôle. La tour d'Escoute actuelle date de la 2e moitié du XVe siècle  Le logis a été agrandi et une aile en retours d'équerre a été construite,  On trouve une description de la maison noble dans le procès-verbal de saisi révolutionnaire de ses biens. Elle est décrite comme une « maison de quatre chambres en haut, deux antichambres et corridor, cuisine en bas, cave, chay et écurie, jardin, charmille et ormière ». Les dispositions de cette maison ont peu changé par rapport à ce qu'on peut voir sur le plan cadastral de 1830.","habitants":"Famille de Lustrac et de Jean de Laduguie\r\n        \r\n        \r\n        \"","divers":"Tour d'Escoute","gps":"","images":["../../jctruffet.com/image/image_47/47_Escoute_Tour_1.jpg"]},"Consult_chateau_formulairec0f5":{"id":"Consult_chateau_formulairec0f5","dept":"47","canton":"Nérac","commune":"Espiens","nom":"Espiens","type":"Tour","periode":"XIII","histoire":"Deux châteaux à Espiens la tour et Mazelières (Voir article)                                                                 ESPIENS, Édouard Ier, roi d'Angleterre, seigneur d'Irlande, duc de Guyenne depuis le 20 novembre 1272, chargé par lettres patentes faites à Monflanquin le 12 novembre 1286  Bertrand-Raymond de Campagne, son sénéchal d'Agenais, chevalier, Bernard de Saint-Loup, et Bernard de Martin, citoyens et juges d'Agen, de recevoir en son nom, comme seigneur d'Agenais, les reconnaissances de fiefs que les prélats, barons, chevaliers, damoiseaux, communautés tiennent de lui en Agenais et Condomois.  Le 17 novembre 1286, Bertrand de Galard, damoiseau, seigneur d'Espiens, fils de Pierre de Galard, reconnaît devant ces commissaires et en présence de Fort Aner de Cazenove, chevalier, ancien maire de Bordeaux et sénéchal de Guyenne, Jean Costelh et Fortin Sanche de Vidailhac tenir dudit roi, seigneur d'Agenais, la moitié du château d'Espiens. Le 14 novembre, Pierre d'Auvignon, damoiseau, Gailhard de La Roche et Guillaume Raymond de Nazareth ont reconnu devant les mêmes commissaires tenir l'autre moitié du château, à savoir Pierre d'Auvignon le quart, et les deux autres, le huitième. Bertrand de Galard meurt en 1401 sans héritiers.  Aux XVe et XVIe siècles le château appartient à la famille de Pardaillan, en 1556 il est la propriété du duc d'Albret et aux carmélites de l'Incarnation à Paris. Le 26 juillet 1663, Paul de Mazelières a acquis la terre et la seigneurie d'Espiens en toute justice de Godefroy Maurice de La Tour d'Auvergne, duc de Bouillon, vicomte de Turenne, duc d'Albret et de Château-Thierry, comte d'Auvergne, d'Évreux, du Bas-Armagnac et de Nègrepelisse. Il fait construire le château de Mazelières, sur la route d'Espiens. La famille a conservé la seigneurie jusqu'au XVIIIe siècle.","architecture":"Espiens, le château avait été construit à la fin du XIIIe siècle, de plan quadrangulaire flanqué de tours d'angles carrées, ce fut un superbe château du XIIIe siècle. Ce quil en reste aujourdhui : une grosse tour à demi effondrée au fond de la cour de récréation de lécole communale. Le reste de la forteresse a servi de base pour lédification des maisons du village.\r\nCette tour servait dentrée à ce gros château carré cantonné de quatre tours et flanqué de deux tours, une nord ouest et celle-ci sud est. Elle a conservé sa porte en arc brisé et la fente où descendait la herse.  La tour d'Espiens a été achetée en 1891 par la commune d'Espiens car elle se trouvait sur la parcelle du terrain sur laquelle a été construite la mairie école. La tour est demeurée intacte sur une grande partie de sa hauteur, mais un pan de mur s'est effondré dans les années 1975. Les autres tours ont été partiellement conservées et ont été intégrées dans des bâtiments. Le château a été inscrit au titre des M.H le 22 février 1926.                                                                                   ARCONQUES  à Espiens Sur le territoire dEspiens, un peu à lécart du bourg, se dresse le château dArconques au milieu de son domaine boisé. Perché sur une colline, il bénéficie dun superbe panorama et surplombe le ruisseau du Galaup. Un château primitif existe probablement dès le XIIe siècle, mais une reconstruction intervient au début du XVIe siècle, à Fonctions Militaire,  édifices château fort construction du XVIe siècle remanié au  XIXe siècle.","habitants":"Famille de Bertrand de Galard\r\n        \r\n        \"","divers":"La tour d'Espiens et le château d'Arconques grav 3 4 5","gps":"","images":["../../jctruffet.com/image/image_47/47_Espiens_1.jpg","../../jctruffet.com/image/image_47/47_Espiens_2.jpg","../../jctruffet.com/image/image_47/47_Espiens_3.jpg","../../jctruffet.com/image/image_47/47_Espiens_4.jpg","../../jctruffet.com/image/image_47/47_Espiens_5.jpg"]},"Consult_chateau_formulaire2165":{"id":"Consult_chateau_formulaire2165","dept":"47","canton":"Astaffort","commune":"Fals","nom":"Fals","type":"Château","periode":"XV","histoire":"A Fals château de Fals et de Cavagnac pas d'info c'est deux derniers sont des hôtels  et à quelques kilomètres au sud  à Astafford le château de Pe de Casse dont je n'ai pas d'information.                      FALS, Jean de Comère, seigneur de Fals et de Pis, s'est marié en deuxième noces avec Domengue d'Esparbès, dame de Pis. Elle a fait son testament le 9 avril 1555 faisant de Jean d'Esparbès, fils de Pierre d'Esparbès, seigneur de Belloc dans le diocèse d'Auch, son héritier universel. Béraud d'Esparbès, fils aîné de Pierre d'Esparbès, s'était marié en 1553 avec Françoise de Comère, fille de Jean de Comère, et son héritière universelle par le testament de 1552. Silvestre d'Esparbès de Lussan du Gout, baron de Lamotte-Bardigues, seigneur de Fals, capitaine puis gouverneur d'Auvillar, conseiller au parlement de Toulouse en 1667. Son petit-fils, Michel d'Esparbès de Lussan du Gout est appelé le comte de Lussan. La seigneurie de Fals est restée dans la famille d'Esparbès jusqu'au XVIIIe siècle.","architecture":"Fals,  le château a été fondé à une date inconnue.  les parties les plus anciennes remonteraient au XIIe siècle. La fin de sa construction datent du XVIIIe siècle. Quelques vestiges des substructions du château médiéval subsistent dans le sous-sol de l'aile droite du château, les façades, les toitures et la décoration du XVIIIe siècle du salon et de la salle à manger ont été inscrites aux M.H.le 23/04/1953. Le corps de logis rectangulaire à deux niveaux et attiques , deux pavillons saillants sur les extrémités, toit sur l'ensemble en croupes.                                     Pe de Casse bâtisse imposante  de plan rectangulaire à trois niveaux accolé  sur flan gauche d'une tourelle ronde à mâchicoulis.","habitants":"Famille d'Esparbès\r\n        \r\n        \r\n        \"","divers":"Château de Fals et de Cavagnac grav 3, Pe de Casse grav 4.","gps":"","images":["../../jctruffet.com/image/image_47/47_Fals_1.jpg","../../jctruffet.com/image/image_47/47_Fals_2.jpg","../../jctruffet.com/image/image_47/47_Fals_3.jpg","../../jctruffet.com/image/image_47/47_Fals_4.jpg"]},"Consult_chateau_formulaire424a":{"id":"Consult_chateau_formulaire424a","dept":"47","canton":"Penne d","commune":"La Croix-Blanche","nom":"Fauguerolles","type":"Donjon","periode":"XIII","histoire":"A la Croix Blanche, le château de  Bernou  de 1780,  chambre d'hôtes de Sophie et Jean-Pascal Michez, et  le donjon de Fauguerolles.                                         DONJON-FAUGUEROLLES, le château a été édifié par une famille qui tenait le fief en coseigneurerie. En 1259, les frères Arnaud et Gaufred rendent hommage pour le castrum de Falgairolas. Il est confisqué quelques années plus tard par le roi d'Angleterre qui le donne à Guillaume Montravel. Le castrum devait être à l'origine un village fortifié. La seigneurie de Fauguerolles a été divisée entre plusieurs coseigneurs : les Fauguerolles, les Durfort, les Montpezat-Laugnac, les Sarrau-d'Arasse, les Chazeron, les Rovignan, les Monfabès, les Leguet, les Du Bernet, les d'Esparbès de Carbonneau, les de Nort, les de Galibert, les Hugon de Latour, les de Raigniac. La tour se dresse à quelques mètres du village de Fauguerolles et n'a pas dû faire partie du castrum. Elle a dû être modifiée ensuite pour la rendre habitable, à une période où vivait Jean de Monfabès au château de Fauguerolles (1376), à moins qu'il s'agisse de Bertrand de Fauguerolles qui  y vivait en même temps. Au début du XVIIIe siècle, il ne doit plus rester que la tour, car, lorsque les biens du comte de Laugnac sont saisis, en 1715, les juges des requêtes du palais de Paris ont commandé de faire des travaux de réparation dans différents biens saisis, dont Fauguerolles. Le devis des travaux à réaliser fait par les sieurs Pierre Richefort, Jean Dubenqua et Michel Martin, maçon, charpentier et couvreur, permet de se rendre compte qu'il n'y avait déjà plus de planchers et qu'elle est couverte d'une toiture à pavillon. Il existait encore une chapelle à côté qui devait être dédiée à Notre-Dame. Au  XIXe siècle, la vieille tour a appartenu à la famille de Galibert.","architecture":"Fauguerolles, bien qu'il n'y ait aucun document concernant la construction de la tour, son architecture semble la dater de la fin du XIIIe siècle ou du début du XIVe siècle. Ella a dû être modifiée ensuite pour la rendre habitable, La plus grande partie de l'enceinte et des constructions qui complétaient ce petit logis ont dû disparaître après 1592 car, à cette date, la garnison a été prévenue de se tenir sur ses gardes.  Le château a été inscrit au titre des monuments historiques en 1950. Le château de Fauguerolles consiste en une tour quadrangulaire de trois étages non voûtées. Deux de ses angles sont renforcés par des contreforts. La porte d'entrée du rez-de-chaussée est à cintre brisé côté nord. La salle du rez-de-chaussée n'est éclairée que par la porte et deux meurtrières. Les dimensions en plan intérieurs sont de 6,40 m. par 7,50 m. L'épaisseur des murs est de 1,20 m. On ne voit plus l'accès au premier étage, peut-être par un escalier en bois ou par le château qui a disparu. Seul le premier étage devait être habitable. Le deuxième et troisième étages n'ont rien de remarquable. On peut voir que la tour a été reliée à un autre bâtiment du côté opposé aux contreforts. Une fenêtre géminée a  été refaite au XVe siècle. Le donjon de Fauguerolles a reçu le prix demeures et châteaux du soleil de l'association Vieilles Maisons fFançaises, en 1989.                                         Manoir de BERNOU de plan rectangulaire à trois niveaux toit en croupes couvert de tuiles, légère avancée d'une travée sur les deux façades.","habitants":"Frères Arnaud et Gaufred\r\n        \r\n        \"","divers":"Donjon de Fauguerolles le manoir de Bernou grav 4 et  5 et le donjon de la Croix Blanche grav 5 et château des Vignerons grav 6","gps":"","images":["../../jctruffet.com/image/image_47/47_Fauguerolles_1.jpg","../../jctruffet.com/image/image_47/47_Fauguerolles_2.jpg","../../jctruffet.com/image/image_47/47_Fauguerolles_3.jpg","../../jctruffet.com/image/image_47/47_Fauguerolles_4.jpg","../../jctruffet.com/image/image_47/47_Fauguerolles_5.jpg","../../jctruffet.com/image/image_47/47_Fauguerolles_6.jpg"]},"Consult_chateau_formulairea207":{"id":"Consult_chateau_formulairea207","dept":"47","canton":"Villeneuve sur Lot","commune":"Bias","nom":"Favols_Bias","type":"Château","periode":"XIII-XIV","histoire":"A Bias le château de Senelles (voir article) et de Favols.                                                                       FAVOLS, les Favols  constituaient une importante famille féodale au XIIIe siècle. En 1250 on trouve mention d'un \"Bertrandu de Favols\" sur la charte d'acre, pendant la croisade de Saint Louis,  cette famille est citée dans les hommages rendus au comte de Toulouse en 1259.  Les Favols ont été seigneurs de Cours, Dolmayrac, Lamaurelle et Pépinès. Affaiblis par la guerre de cent-ans abandonnèrent le château en 1430. Il est racheté et habité par les Durfort jusqu'à la fin de la guerre de cent ans, puis est échangé avec le seigneur de Montratier en 1456. Bertrand de Gervain de Roquepiquet est marié avec Françoise de Montratier, fille d'Antoine de Montratier, seigneur de Favols, en 1526, et en devient propriétaire. En 1540 il devient la propriété de la famille Deshoms qui  sont restés seigneurs de Favols jusqu'en 1835, le dernier propriétaire de la famille, Jean-Baptiste Deshoms, a vendu le château à un négociant de Villeneuve-sur-Lot, le sieur Robin, qui le revend en 1862 au sieur Barlus. Le château est passé aux propriétaires actuels par héritage. Monsieur Barlus arrière grand-père de madame Escande propriétaire. Le château a été inscrit au titre des M.H  le 28 décembre 1981.","architecture":"La construction du château actuel dans ses parties les plus anciennes date de la fin du XIIIe siècle ou du début du XIVe siècle. Le château est un quadrilatère avec quatre tours d'angle dont trois subsistent.   Au XVIe siècle, une croisée moulurée est ouverte dans le corps de logis sur la cour. Au XVIIIe siècle de grandes baies été ont percées. L'aile ouest a été reconstruite un peu plus à l'ouest que la précédente. Le château n'a pas trop subi de dégâts pendant la Révolution.    Il reste trois tours et un corps de bâtiment de l'époque Médiévale, l'autre partie date de la fin du XVIIe siècle, construite en partie par les démolitions d'une tour et d'une courtine, et d'autre part, par les restes du prieuré de \"Rybérolle\" de l'ordre de Grandmont.","habitants":"Famille de Bertrand de Gervan de Roquepiquet\r\n        \r\n        \"","divers":"Château de Favols à  Bias","gps":"","images":["../../jctruffet.com/image/image_47/47_Favols_Bias_1.jpg","../../jctruffet.com/image/image_47/47_Favols_Bias_2.jpg","../../jctruffet.com/image/image_47/47_Favols_Bias_3.jpg","../../jctruffet.com/image/image_47/47_Favols_Bias_4.jpg","../../jctruffet.com/image/image_47/47_Favols_Bias_5.jpg"]},"Consult_chateau_formulaire5ee9":{"id":"Consult_chateau_formulaire5ee9","dept":"47","canton":"Penne d","commune":"Saint-Sylvestre sur Lot","nom":"Ferrassou","type":"Château","periode":"XIII-XIV","histoire":"FERRASSOU, c'est à proximité d'une digue construite sur le Lot à la fin du XIIIe siècle, dite de Lamothe Dessous, qu'une maison-forte fut élevée pour la famille de Pélissier, bourgeois de Penne et seigneurs péagers, l'histoire des propriétaires du château n'est connue que depuis le XVe siècle avec Jean de Laduguie. L'ostal e tor apelat de Ferrasso  est ensuite acheté en 1476 à Jean de Podio Extremo. Le château actuel a dû être reconstruit à cette époque. En 1490 le château appartient à Antoine Ier de Lustrac. La tour ronde a dû être construite par Antoine II de Lustrac, peut-être à l'occasion du mariage de sa fille, Marguerite, avec le maréchal de Saint-André, en 1544. Le château appartient à les Masparrault, famille de magistrats bordelais, du premier tiers du XVIIe siècle à la Révolution. Au moment de la Révolution la tour ronde est décapitée comme symbole seigneurial.   Blaise de Lapeyrière, propriétaire du château en 1812, a entrepris une de ses dernières campagnes de travaux.","architecture":"les seigneurs des environs ont fait construire à proximité des édifices fortifiés, la famille Pélissier, bourgeois de Penne comme seigneurs péagers. Ils ont dû faire construire une maison forte dont on doit avoir des éléments dans les fondations du château actuel.  La tour carrée possédant un magnifique escalier à vis à noyau hélicoïdal et voûte en palmier dont les nervures retombent sur des culs-de-lampe de style gothique doit dater de cette époque. La tour ronde éclairée par trois fenêtres à meneaux de style Renaissance doit dater des années 1530-1540. D'importants travaux d'agrandissements sont effectués : le corps de logis est doublé en profondeur et une aile en retour est construite au nord, comportant notamment un corps d'entrée, des galeries superposées, des communs flanqués de deux tourelles ont  été construits dans la première moitié du XVIe siècle, une tourelle dominant le Lot porterait la date 1658, la tour ronde et la tour carrée ont été classées aux M.H ont été inscrites, les deux protections datant du 11 avril 1973.","habitants":"FamillePélissier                                                               \r\nAntoine Ier de Lustrac                                                Famille des Masparrault\r\n        \r\n        \"","divers":"Château de Ferrassou et de Cabrés grav 5","gps":"","images":["../../jctruffet.com/image/image_47/47_Ferrassou_1.jpg","../../jctruffet.com/image/image_47/47_Ferrassou_2.jpg","../../jctruffet.com/image/image_47/47_Ferrassou_3.jpg","../../jctruffet.com/image/image_47/47_Ferrassou_4.jpg","../../jctruffet.com/image/image_47/47_Ferrassou_5.jpg"]},"Consult_chateau_formulaire6e07":{"id":"Consult_chateau_formulaire6e07","dept":"47","canton":"Tonneins","commune":"Tonneins","nom":"Ferron","type":"Château","periode":"XVI-XIX","histoire":"FERRON, construit au XIXe siècle à lemplacement dun édifice plus ancien, sur la commune de Tonneins, présente les caractéristiques des demeures de lépoque. Au Moyen-Âge il est situé sur la paroisse de Sainte-Quitterie-de-Magnon. Vers  1550, le domaine, alors appelé fief de Bonnaire, appartient à la famille de Beaupuy, légué par le seigneur de Tonneins-Dessous.\r\nAu cours des siècles, divers propriétaires se succèdent. Au début du XVIIe siècle, le fief est donné à la famille de Ferron, nom que le domaine a gardé. Il passe ensuite à la famille de Laguo avant dentrer en possession des Silvestre. Ils le conservent de 1705 jusquau début du XXe siècle. C'est Louis Alexandre Rosalie Silvestre de Ferron, qui décide de la démolition de la maison forte du XVIe siècle et de la construction dune nouvelle demeure, de style néogothique. Le château est bâti en 1840 par larchitecte bordelais Jean-Baptiste Lafargue. En 1943, le château de Ferron est occupé par le siège du commandement départemental de la milice française et devenu le refuge des miliciens et de leur famille. Il abrite au sous-sol des résistants qui ont été fait prisonniers. Le 9 août 1944, il est bombardé par laviation alliée,  les résistants s'échappent.","architecture":"Château de Ferron, construit au XIXe siècle à lemplacement dun édifice plus ancien, cest une grosse maison bourgeoise à lallure médiévale, ensuite il a été un hôtel-restaurant, puis a servi de centre de loisirs pour l'Amicale Laïque. Aujourd'hui, il est à l'abandon et attend de nouveaux projets.  Une carte postale du début du XXe siècle donne l'aspect du château avant la disparition d'un corps de logis de style néo-gothique placé en retour sur l'élévation antérieure, détruit par le bombardement d'août 1944. La remise, l'écurie et la grange semblent contemporaines de la construction du nouveau château. L'édifice est composé de plusieurs corps de bâtiment juxtaposés. Deux tours polygonales couvertes de toitures polygonales flanquent les angles sud-ouest et nord-est. Une tour ronde couverte par un toit conique occupe l'angle sud-est. Le bâtiment est construit en pierres calcaires de moyen appareil. Laile nord-est, en retour sur la façade principale, a disparu et na pas été relevée.","habitants":"Famille de Beaupuy                                                 Louis Alexandre Rosalie Silvestre de Ferron\r\n        \r\n        \"","divers":"Château de Ferron à Tonneins","gps":"","images":["../../jctruffet.com/image/image_47/47_Ferron_1.jpg","../../jctruffet.com/image/image_47/47_Ferron_2.jpg","../../jctruffet.com/image/image_47/47_Ferron_3.jpg","../../jctruffet.com/image/image_47/47_Ferron_4.jpg"]},"Consult_chateau_formulaire8755":{"id":"Consult_chateau_formulaire8755","dept":"47","canton":"Nérac","commune":"Fieux","nom":"Fieux_Lot_G","type":"Manoir","periode":"XVII","histoire":"FIEUX, castrum mentionné en 1286 : il est tenu par plusieurs membres de la famille d'Altigiis (Autièges) Adolphe-Joseph de Mondenard, ancien député né à Fieux le 26 janvier 1839, fit son droit et participa à la plupart des petits journaux de la rive gauche vers la fin de l'Empire. Après le 4 septembre 1870, il dirigea le Réveil du Lot et Garonne, fonda en 1878 la Constitution et en 1880 l'Indépendant. Il fut conseiller général pour le canton de Francescas, il fut inscrit sur la liste républicaine du département du Lot-et-Garonne aux élections du 4 octobre 1885 et fut élu au scrutin de ballottage. Il ne s'est plus ensuite représenté. M. Adolphe-Joseph de Mondenard a publié des Études sur l'Ancien Régime, la féodalité en Agénois en 1789 et Manuscrit d'un curé de campagne (1879).   En 1839, la commune acquiert la partie nord du château pour établir l'école et la mairie. En 1867, elle acquiert la partie sud, pour réaménager le logement de l'instituteur et la mairie.","architecture":"Le château de Fieux présente le plan d'un château gascon, cantonné d'une tour ronde et d'une tour carrée   crénelée  à mâchicoulis idem pour la tour ronde,  corps de logis rectangulaire à deux niveaux toits en croupes avec mâchicoulis. Il date sans doute de la fin du XIIIe ou du XIVe siècle. Des travaux ont été effectués au XVe siècle. Le château est divisé et vendu en 1810. En 1879, la commune entame la restauration du château, les travaux sont réalisés par Vidal, entrepreneur à Moncaut, sous la direction de Teulère architecte de l'arrondissement. Reprise de l'angle nord-ouest, du couronnement des murs avec ajout de 132 consoles, réfection du perron, de la charpente, de la couverture, les tuiles sont remplacées par de l'ardoise des Pyrénées, suppression des cloisons en pan de bois et torchis, ouvertures de six fenêtres. En 1902, la nouvelle école de filles occupe une pièce du château.","habitants":"Adolphe-Joseph de Mondenard\r\n        \r\n        \"","divers":"Château de Fieux","gps":"","images":["../../jctruffet.com/image/image_47/47_Fieux_L_G_1.jpg","../../jctruffet.com/image/image_47/47_Fieux_L_G_2.jpg"]},"Consult_chateau_formulaired852":{"id":"Consult_chateau_formulaired852","dept":"47","canton":"Penne d","commune":"Castella","nom":"Fontirou","type":"Vestiges","periode":"XII-XV","histoire":"FONTIROU, cette seignerie appartenait alors à Armand de Fauguerolles et à son frère, Gaufred. Au XVe siècle, une branche de la famille de Cours est installée à Fontirou. Par le testament d'Antoine de Cours, curé et co-seigneur de Lamaurelle, nous savons qu'en 1514 le seigneur de Fontirou était Bernard de Cours. en 1526, Robert de Godailh, receveur des tailles et trésorier du domaine d'Agenais, est qualifié de seigneur de Fontirou. En 1526, Robert de Godailh s'est marié avec Gillette de Sevin, fille du juge mage de l'Agenais. Il a été aussi consul d'Agen en 1538. Le 14 décembre 1564, Diane de Poitiers a vendu le château de Fontirou à Jehan et Loys de Godailh, propriété de Pons de Godailh, conseiller au présidial d'Agen. Ce dernier mort sans postérité, ses biens sont passés à son frère, Loys de Godailh, conseiller au présidial d'Agen. De son second mariage avec Constance de Durfort, il eut une fille, Marie de Godailh, qui s'est mariée le 5 septembre 1593 avec Pierre de Latour, et lui a apporté la seigneurie de Fontirou. De ce mariage, Pierre de Latour a eu deux fils, Pierre et Gratien. Gratien de Latour, conseiller à la cour des aides, est tué au cours d'une révolte contre la gabelle, en 1635. Son frère Pierre, seigneur de Fontirou, marié à Marie Gabrielle de Sevin, est consul d'Agen 1671. Il meurt en 1694. Le fils aîné de Pierre de Latour se prénomme lui aussi Pierre. Il s'est marié en 1710  avec Marie de Gadès. Il a été plusieurs fois consul d'Agen. Il a eu trois enfants, Géraud, Marie et Marguerite. Géraud de Latour est mort sans postérité le 10 mai 1753. Le château de Fontirou est passé à sa sur Marguerite, mariée à Armand de Sevin. La famille de Sevin a conservé le château jusqu'en 1861.","architecture":"Fontirou,  il ne reste plus que la tour de ce château du XIIIe siècle qui était composé dun corps de logis rectangulaire et de deux tours carrées puis au XVIe siècle, dune enceinte munie de quatre tours rondes. Le donjon de Fontirou a été entouré d'une enceinte avec des tours rondes, construite à la hâte au moment des guerres de religion, ainsi que des bâtiments de service. Au XVIIe siècle, la famille de Latour voulant rendre le donjon habitable y a aménagé de grandes fenêtres à meneaux croisés sur la face sud et une cheminée au premier étage. Le château a été abandonné au début du XIXe siècle. Le cadastre de 1820 en montre tous les éléments existant à cette date. La plus grande partie des bâtiments ont ensuite disparu, à l'exception du donjon. L'ensemble des vestiges du château a été inscrit aux M.H le 30 mai 1990.","habitants":"Famille de Jehan et Loys de Godailh\r\n        \r\n        \"","divers":"Vestiges du château de Fontirou.","gps":"","images":["../../jctruffet.com/image/image_47/47_Fontirou_1.jpg","../../jctruffet.com/image/image_47/47_Fontirou_2.jpg","../../jctruffet.com/image/image_47/47_Fontirou_3.jpg"]},"Consult_chateau_formulaire2047":{"id":"Consult_chateau_formulaire2047","dept":"47","canton":"Agen","commune":"Foulayronnes","nom":"Foulayronnes","type":"Château","periode":"XV","histoire":"A Foulayronnes et au environ le château de Monbran, Talives, Artigues et Arasse, ainsi que des maisons-fortes, Guillot, le Cujula et Vérone.                      MONBRAN  château en 1217, qui devint la résidence d'été des évêques d'Agen. Transformé en sanatorium au début du siècle, le château est désormais un centre de convalescence, Il a appartenu aux de Nozières, aux de Godail puis à la famille de Sevin qui en possédait 17 entre Agen et Port-Sainte-Marie. Mme de Roll Montpellier, héritière de la famille de Sevin, et son époux en ont fait don à la commune en 1997.     ARASSE,  le site du château dArasse est localisé vers La Croix Blanche, a des origines anciennes et aurait appartenu à la famille de Montpezat au XVIe siècle, mais a été largement remanié au cours des siècles suivants, et jusquà nos jours  par les propriétaires successifs. Il aurait servi de relais de St-Jacques, puis de lieu de villégiature pour les officiers de la garnison dAgen. Il est ceint en façade dune clôture de meules anciennes en pierre. A lintérieur, ont été préservés 3 silos à grain souterrains.                                                 À TALIVES, Pas d'information historique pour ce château, ni pour Artigues et les maisons fortes, le Moulin de Talives, propriété municipale par don de la famille de Roll Montpellier.","architecture":"Arasse, la terrasse, dont la partie Est est classée, offre une vue très vaste vers le sud, un peu occultée par des arbres. Elle est  portée par un remarquable mur de soutènement en pierre taillée, et bordée dun garde-corps à balustres. Le mur de soutènement daterait du début du XIXe siècle, la date de 1836 étant gravée dans une niche du mur. Un escalier part de la terrasse, et mène par un pittoresque passage souterrain ménagé dans le mur, à un chemin situé en contrebas, mais surélevé sur un mur de soutènement également en pierre taillée,                                                             Talives, du XVe siècle, remanié au  XVIIIe siècle, ce  château construit au XVe siècle est à lorigine conçu pour la défense, il est remanié au XVIIIe siècle afin de le rendre plus confortable. Le château est composé dune tour centrale et de trois corps de bâtiments. Leffondrement du mur de soutènement, dû aux pluies abondantes, a nécessité des travaux de consolidation urgents car le corps de bâtiment est assis sur une terrasse. On peut noter que sa façade date de lépoque à laquelle il est utilisé comme résidence secondaire.","habitants":"Famille de Nozières                                                        Famille de Montpezat \r\n        \r\n        \"","divers":"Château d'Arasse grav 1, de Monbran grav 2 et 3, de Talives 4 et 5 à Foulayronnes","gps":"","images":["../../jctruffet.com/image/image_47/47_Foulayronnes_1.jpg","../../jctruffet.com/image/image_47/47_Foulayronnes_2.jpg","../../jctruffet.com/image/image_47/47_Foulayronnes_3.jpg","../../jctruffet.com/image/image_47/47_Foulayronnes_4.jpg","../../jctruffet.com/image/image_47/47_Foulayronnes_5.jpg"]},"Consult_chateau_formulaire5e16":{"id":"Consult_chateau_formulaire5e16","dept":"47","canton":"Nérac","commune":"Fréchou","nom":"Frechou","type":"Château-Tour","periode":"XIII-XVI","histoire":"Trois châteaux à Fréchou dont celui de Fréchou, de Laclotte, de Mauriet, et la tour d'Asquet pas d'information historique des trois derniers châteaux.      FRECHOU, le castrum du Fréchou est cité en 1259. Il est tenu par la famille de Cazenove. Les deux tours datent de cette époque. Alain de Montpezat s'est marié en secondes noces par contrat du 4 novembre 1536 avec Françoise de Gua, dame du Fréchou. En 1539 il rend hommage pour les seigneuries de Thouars, Le Fréchou, Savignac et Saint-Julien. Alain de Montpezat avait fait de son fils aîné son héritier universel au contrat de mariage avec Françoise de Gua, mais celui-ci étant devenu protestant, il a institué son second fils, François de Montpezat, son légataire universel. Alain de Montpezat est mort en 1561. Le frère d'Alain de Montpezat, Antoine, avait eu de son mariage avec Françoise de Verdun deux enfants, dont Jean de Montpezat. Ce dernier est mort à Naples en 1558 en faisant de son cousin François de Montpezat son héritier. François de Montpezat a donc aussi hérité de la seigneurie de Laugnac mais il a peu séjourné au château de Laugnac. François de Laugnac a surtout séjourné au château du Fréchou. François de Montpezat est baron de Laugnac, gouverneur de l'Agenais en 1569. Il a fait édifier le pavillon hors-uvre abritant l'escalier rampe sur rampe, l'aile ouest et le pavillon d'entrée donnant accès à la cour depuis le village.La tour a été inscrite au titre des monument historique le 26 mai 1952. En mauvais état au XXe siècle, le château a été restauré à partir des années 1970 par Michel et Aline Taulet.","architecture":"FRECHOU, le château médiéval consistait en un corps de logis sur quatre niveaux flanqué de deux tours rondes. C'est un exemple de château gascon. Le dernier étage a depuis disparu et n'a pas été reconstruit lors de la restauration. L'aile ouest est un ajout plus tardif. Des modifications sont déjà apportées au XVe siècle percement de fenêtres à meneaux. La tour de l'escalier et le pavillon d'entrée ont été ajoutés dans les années 1560 dans le style de la Renaissance italienne. Le périmètre du château comprend aussi l'écurie médiévale depuis remodelée en orangerie, une tour-colombier et un petit bâtiment médiéval à la destination incertaine.                                                ASQUET, ancienne Tour de garde du XIIIe siècle, est une vaste bâtisse de 400m2 sur 2 niveaux. Ses murs épais vous protégeront des grosses chaleurs et ses grandes cheminées dépoque vous permettront de passer de belles soirées au coin du feu!  Chambres d'hôtes                                                                               LACLOTTE du XIIIe,  sélève à flanc de colline, dans les bois. Cette situation privilégiée a sans doute incité linstallation, dès le Moyen-Âge, dun poste de surveillance, comme il en existe de nombreux autour dAgen, détruit en 1944, Il date du XIVe siècle. Il comprend une tour, un bâtiment principal, une enceinte et une grange. Les éléments défensifs du mur d'enceinte bretèche et meurtrières datent du XVIe siècle. Un logement secondaire et des dépendances existaient en 1970.                                                        Château de MAURIET du XIXe siècle, il comprend un corps de logis avec une tour abritant l'escalier au sud et de deux tours au nord.","habitants":"Famille de Cazenove                                            Famille de François de Montpezat\r\n        \r\n        \"","divers":"Château de Fréchou et la tour d'Asquet Grav de 6 à 8 et porte de la ville","gps":"","images":["../../jctruffet.com/image/image_47/47_Frechou_1.jpg","../../jctruffet.com/image/image_47/47_Frechou_2.jpg","../../jctruffet.com/image/image_47/47_Frechou_3.jpg","../../jctruffet.com/image/image_47/47_Frechou_4.jpg","../../jctruffet.com/image/image_47/47_Frechou_5.jpg","../../jctruffet.com/image/image_47/47_Frechou_6.jpg","../../jctruffet.com/image/image_47/47_Frechou_7.jpg","../../jctruffet.com/image/image_47/47_Frechou_8.jpg","../../jctruffet.com/image/image_47/47_Frechou_9.jpg"]},"Consult_chateau_formulaire1719":{"id":"Consult_chateau_formulaire1719","dept":"47","canton":"Aiguillon","commune":"Frégimont","nom":"Fregimont","type":"Château","periode":"XVIII","histoire":"FREGIMONT, un premier château est cité au XIIe siècle, prise de possession du roi de France sur les seigneuries du comte de Toulouse, en 1271, après la mort d'Alphonse de Poitiers et de Jeanne, comtesse de Toulouse, sans postérité. La seigneurie de Frégimont appartient aux Montpezat quand Amanieu de Montpezat s'en empare en 1418. À la fin du XVIIe siècle, elle devient la propriété de la famille de Lusignan. En 1769 la seigneurie est achetée par Jean-Pierre Villatte de Lagrave, avocat et notable Bordelais. Jean-Pierre Villatte est marié à Louise de Secondat, petite fille de Montesquieu.  Vers 1775 le châtelain fit construire le nouveau château.  Le 30 mars 1846, Jean-François Louis Secondat de Montesquieu a vendu le château à la commune qui en fait le siège de la mairie et de l'école primaire. Une restauration est conduite par l'architecte Léopold Payen, en 1898, les travaux étant réalisés par Jean Dangas, maçon à Bazens. En 1899, il y a un changement d'affectation des salles, la réfection de l'escalier, des plafonds et de la toiture. Le château a été inscrit au titre aux M.H le 23 septembre 2008.","architecture":"Le château est décrit en ruine, comportant encore une tour servant de prison, une grange, des écuries, chai, four, puits et basse-cour, entourés de murs et fossés. Il y fait construire, vers 1775, le logis actuel après destruction du vieux château, par un architecte ou un ingénieur agenais.  Une restauration du bâtiment est conduite par l'architecte Léopold Payen en 1898, travaux réalisés par Jean Dangas, maçon à Bazens : changement d'affectation des salles, réfection de l'escalier, des plafonds et de la toiture. Aujourd'hui, le château abrite la mairie, la salle des fêtes, l'école et la cantine scolaire. Les dépendances du château (communs) sont détenus par des propriétaires privés, à usage d'habitation. Le château est bâti sur un plan rectangulaire axé longitudinalement est-ouest. Ses élévations antérieures et postérieures  présentent un avant-corps central d'une travée, surmontée d'un fronton, cantonné de deux ailes à quatre travées d'ouvertures. Le premier niveau d'habitation est à double profondeur. Certains intérieurs ont conservés leurs boiseries comme l'ancienne salle à manger devenu secrétariat.","habitants":"Famille de Jean-Pierre Villatte de Lagrave\r\n        \r\n        \"","divers":"Château de Fregimont","gps":"","images":["../../jctruffet.com/image/image_47/47_Fregimont_1.jpg","../../jctruffet.com/image/image_47/47_Fregimont_2.jpg"]},"Consult_chateau_formulairee990":{"id":"Consult_chateau_formulairee990","dept":"47","canton":"Miramont de guyenne","commune":"Roumagne","nom":"Fremauret","type":"Maison forte","periode":"XII-XIV","histoire":"FREMAURET, la ville de Roumagne abrite le château de Frémauret. Il sagit dun ancien moulin fortifié du XIIe siècle lié à une maison forte médiévale.\r\nCette demeure appartient à une branche de la puissante famille des Ricard de Montplaisir. Au XIIIe siècle, ce moulin-château abritait des chevaliers de Malte qui résistent aux Albigeois, aujourd'hui chambres d'hôtes.  La seconde partie de celle-ci a été réédifiée à la Renaissance.  En 1848, une extension a été réalisée entre la maison noble et le moulin qui a fonctionné jusqu'en 1860.","architecture":"Bâtiments, édifices moulin à eau de fonctions militaire\r\ndu XIIe siècle, le bâtiment,  corps de logis de  style château fort   du XIVe siècle,  remanié au XVIe siècle et en 1848. Aujourd'hui le corps de logis   de lactuel château de Frémauret comprend encore une partie fortifiée du XIIe siècle, des mâchicoulis et une tour ronde du XIVe siècle. Le pont-levis est remplacé au XVIe siècle par une portion de muraille reliant le donjon  et la deuxième partie de ce château est réédifiée à la Renaissance. Au XIXe siècle, on construit une extension entre la maison noble et le moulin. Du moulin proprement dit, il ne reste aujourdhui que quelques vestiges. Les murs en pierre de taille et la toiture en tuiles plates sont quant à eux en très bon état. Le château de Frémauret est une très belle et imposante demeure agrémentée dun jardin. Aujourd'hui  l'édifice possède un  corps de logis de plan rectangulaire à trois niveaux avec  mâchicoulis et créneau recouverts par un toit en croupes flanqués d'échauguettes en encorbellement sur les angles.","habitants":"Famille des Ricard de Montplaisir\r\n        \r\n        \"","divers":"Château de Frémauret à Roumagne","gps":"","images":["../../jctruffet.com/image/image_47/47_Fremauret_1.jpg","../../jctruffet.com/image/image_47/47_Fremauret_2.jpg","../../jctruffet.com/image/image_47/47_Fremauret_3.jpg","../../jctruffet.com/image/image_47/47_Fremauret_4.jpg"]},"Consult_chateau_formulaire7adc":{"id":"Consult_chateau_formulaire7adc","dept":"47","canton":"Penne d","commune":"Frespech","nom":"Frespech","type":"Bastide fortifiée","periode":"XIII","histoire":"FRESPECH, le 18 mai 1354, le comte d'Armagnac met le siège devant Frespech qui n'a pas dû résister longtemps.  Frespech est resté anglais jusqu'en 1453. Les Montferrand ont adapté l'enceinte et le château à l'usage des armes à feu, couleuvrines et arquebuses Jean de Montferrand est seigneur de Frespech entre 1435 et 1442. Bertrand IV de Montferrand est seigneur de Frespech entre 1435 et 1474. Il a été conseiller et chambellan du duc de Guyenne. Il a été marié à Jeanne de Luxe.   En 1594, Frespech est devenu la propriété de François de Montferrand, vicomte de Foncaude, baron de Cancon. Il est mort à l'âge de 89 ans, le 20 juillet 1625. De son mariage avec Claire de Pellegrue, fille du seigneur de Casseneuil, il a eu plusieurs enfants  François qui a hérité de Cancon et Frespech. Il s'est marié le 27 octobre 1626 avec Jacquette de Beauxoncles qui était veuve de François de Voisins. Il n'y a pas eu d'enfants de ce mariage, mais Jacquette de Beauxoncles a eu deux filles de son premier mariage, dont : Marie-Félicie de Voisins (1622-1672) qui s'est mariée avec Jean-Paul de Gourdon de Genouillac, comte de Vaillac.La seigneurie est achetée en 1681 par le duc de Roquelaure. Le 2 septembre 1707, celui-ci la vend à Messire Jean de Raigniac, doyen des conseillers du roi et magistrats présidiaux d'Agenais. Les Raigniac ont été seigneurs de Frespech jusqu'à la Révolution. Le dernier seigneur de Frespech, Gaston-Jean-Baptiste-Joseph de Raigniac, conseiller grand audiencier au parlement de Bordeaux est condamné à mort par le tribunal révolutionnaire de Bordeaux le 28 juin 1794 et exécuté aussitôt. Le château est mis en vente  le  25 mai 1794. Les habitants de Frespech qui étaient en procès avec les Raigniac ont accueilli avec joie la fin des privilèges. Le château a été acheté par monsieur Durand de Carabelles, maire de Frespech.","architecture":"Des anciennes fortifications qui entouraient la ville, il ne reste que des vestiges présentant un intérêt historique. La porte d'honneur, située près de l'ancien château, est en plein cintre avec arrière voussure en arc surbaissé. A l'angle de l'ancien château se trouve une échauguette en encorbellement. Cette échauguette, dominant la cour d'honneur, est munie de plusieurs rangées de meurtrières permettant aux assiégés de tirer sur les ennemis qui auraient réussi à entrer dans la cour. L'arc de la porte de la barbacane est en tiers point, l'intérieur étant voûté en berceau. Un escalier en pierre donne accès à la courtine. La niche du garde couleuvrinier et la meurtrière de la coulevrine sont intactes. Remparts, chemin de ronde, tour avec vue sur une partie de la vallée et un moulin. Vers 1848 le maire du village, qui voulait un bel escalier chez lui, fit démolir l'escalier monumental en pierre qui était situé dans le donjon. Ce démantèlement a entraîné la chute du « dôme du château qui sélevait au milieu de lédifice ». Le château a été inscrit au titre des M.H le 9 juin 1925.","habitants":"Amanieu de Madaillan                                                    Famille de  Jean de Montferrand\r\n        \r\n        \"","divers":"Château et porte de Frespech","gps":"","images":["../../jctruffet.com/image/image_47/47_Frespech_1.jpg","../../jctruffet.com/image/image_47/47_Frespech_2.jpg","../../jctruffet.com/image/image_47/47_Frespech_3.jpg","../../jctruffet.com/image/image_47/47_Frespech_4.jpg","../../jctruffet.com/image/image_47/47_Frespech_5.jpg","../../jctruffet.com/image/image_47/47_Frespech_6.jpg","../../jctruffet.com/image/image_47/47_Frespech_7.jpg","../../jctruffet.com/image/image_47/47_Frespech_8.jpg","../../jctruffet.com/image/image_47/47_Frespech_9.jpg"]},"Consult_chateau_formulaire665c":{"id":"Consult_chateau_formulaire665c","dept":"47","canton":"Fumel","commune":"Fumel","nom":"Fumel","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux à Fumel celui de Fumel et celui de Condezaygue.                                                           FUMEL, un donjon a été construit au XIIe siècle caractérisé. La famille de Fumel fait partie de l'entourage des comtes de Toulouse, en 1259, le fief et le château étaient partagés entre huit coseigneurs appartenant aux familles de Fumel, de Montesquieu et de Durfort. Ils ont rendus hommage pour ce château à Alphonse de Poitiers. Son successeur, François II de Fumel, marié en 1578 à Jeanne de Caumont-Lauzun. Il a été capitaine des gardes de la porte du roi. Il a été tué à Coutras en 1587. Ayant peu séjourné en Agenais, il est peu probable qu'il y ait eu un développement de la construction du château. Charles de Fumel a obtenu du roi Henri IV la nomination de la baronnie en vicomté. François-Joseph de Fumel (vers 1655-1688) remanie le château dans la seconde moitié du XVIIe siècle. Le château devient la propriété de la famille Langsdorff après le décès de Laure de Fumel en 1813, mariée à Frédéric Guillaume de Langdorff (1771-1829) le 9 novembre 1801 a fait réaménagé le château par l'architecte Léopold Payen. Le couronnement de la façade antérieure par une balustrade en 1882. Léopold Payen restaure le portail de la basse-cour vers 1900. Le château est acheté par la municipalité de Fumel en 1951. Depuis les années 1960 le château de Fumel abrite la mairie. Le château a été inscrit au titre des M.H le 16 février 1951.        Château de Condezaygues la famille de Fumel semble avoir toujours eu la seigneurie de Condezaygues. En 1259, les deux frères Esquieu de Fumel et B. de Montesquieu, chevaliers, rendaient hommage au Comte de Toulouse de tout ce quils possédaient à Fumel et à Monségur, En 1652, Condezaygues fut touché par les troubles consécutifs à lassassinat du seigneur de Fumel par de nombreux habitants de ses terres.","architecture":"Fumel le château médiéval a disparu sous celui construit au XVIe siècle. Le projet initial consistait à construire un château avec des logis disposés suivant un plan en H avec deux cours en terrasses. Chacune des ailes devaient se terminer par un pavillon rectangulaire. L'aile centrale du château devait être la barre du H. Certaines dispositions du pavillon nord-est et de détails de bossages vermiculés peuvent rapprochés de ceux du château de Lanquais, mais aussi du pavillon d'angle du château de Vallery construit par Pierre Lescot. On peut retrouver des éléments du donjon du XIIe siècle et du logis du XVe siècle dans les structures de l'aile centrale.  La façade de l'aile centrale côté cour d'honneur ou jardin a été recomposée au XVIIe et XVIIIe siècles. Le rez-de-chaussée est masqué par les voûtes et les arcades d'un portique du XVIIe siècle. Jean-Georges de Fumel (1721-1788) a sollicité l'architecte Jean-Baptiste Chaussard pour des conseils sur le changement de la distribution et l'augmentation du château et faire à neuf un jardin à partir de 1763. Un bail concerne des travaux à faire sur l'élévation du pavillon nord et la construction d'un nouvel appartement dans l'aile est 1771-1772.  Seulement quatre des pavillons prévus ont été édifiés. L'aile sud-est se termine sur le pavillon sud. Initialement, elle avait un étage supplémentaire mais qui a été dérasé pour la mettre au niveau de la terrasse. L'aile sud-ouest n'a pas été réalisée.     Condezaygues   de plan rectangulaire deux niveaux et attiques flanqué en façades et en angles de tours carrées toit à quatre pans.","habitants":"Famille de Fumel \r\n        \r\n        \"","divers":"Château de Fumel grav de 1 à 5 de Condezaygues de 6 à 7.","gps":"","images":["../../jctruffet.com/image/image_47/47_Fumel_1.jpg","../../jctruffet.com/image/image_47/47_Fumel_2.jpg","../../jctruffet.com/image/image_47/47_Fumel_3.jpg","../../jctruffet.com/image/image_47/47_Fumel_4.jpg","../../jctruffet.com/image/image_47/47_Fumel_5.jpg","../../jctruffet.com/image/image_47/47_Fumel_6.jpg","../../jctruffet.com/image/image_47/47_Fumel_7.jpg"]},"Consult_chateau_formulaireaadb":{"id":"Consult_chateau_formulaireaadb","dept":"47","canton":"Marmande","commune":"Gaujac","nom":"Gaujac_Cantecort","type":"Château","periode":"XV-XVIII","histoire":"GAUJAC, cité entre 1259 et 1279, usurpé fin XIIIe siècle par Augier de la Motte, fortifié après 1310 pour Amanieu de Noailhan, reconstruit avec des parties agricoles au XVIIe ou XVIIIe siècle pour les Noailhan de Buzet, puis les Maurin.                                     CANTECORT, au lieu-dit Cantecort, restauré après abandon en 1970 par le propriétaire actuel. Le château de Cantecort a été construit au XVe siècle pour les Albret, seigneurs de Gaujac depuis le début du XIVe siècle. Cest dans la seconde moitié du XIXe siècle quapparaissent les de Cantecort, famille de négociants, qui ont donné le nom actuel de lédifice. Ils font appel à un ingénieur qui transforme le château en ferme modèle avec adjonctions de cours, au nord et au sud, décuries et même aménagement dun puits et dune glacière. Les Brezetz, propriétaires à la fin du XIXe siècle, sont surtout à lorigine de la construction de lorangerie. Elle est achetée par la famille Dubroca et restaurée dans les années 1970, fait aujourdhui partie dun domaine réservé à la production de kiwis. Élevé au milieu dun parc, il fait face au château de Marcellus, sur le coteau.","architecture":"Gaujac ruiné au XIXe siècle et remplacé par une ferme au début du XIXe siècle, pas d'images.             Cantecort  d'origine du XVe siècle, reconstruit au  XVIIIe siècle, réaménagé et agrandi au XIXe siècle par les sieurs de Cantecort et restauré après abandon en 1970 Sa place stratégique lui permet de servir de poste de péage contrôlant le trafic sur la Garonne.\r\nBâti sur un plan carré régulier, il est composé dun logis, ouvert sur une cour. Cependant, le changement de propriétaires entraîne une série de transformations du bâtiment. Ainsi, pour la famille Paris, il est reconstruit, dans la seconde moitié du XVIIIe siècle. Il obéit, néanmoins, à un plan similaire à lédifice de départ sont surtout à lorigine de la construction de lorangerie. La ferme est ensuite abandonnée au milieu du XXe siècle.","habitants":"Famille Dubroca                                                      Famille Paris\r\n        \r\n        \"","divers":"Château de Gaujac et Cantecort","gps":"","images":["../../jctruffet.com/image/image_47/47_Gaujac_Cantecort_1.jpg","../../jctruffet.com/image/image_47/47_Gaujac_Cantecort_2.jpg","../../jctruffet.com/image/image_47/47_Gaujac_Cantecort_3.jpg","../../jctruffet.com/image/image_47/47_Gaujac_Cantecort_4.jpg","../../jctruffet.com/image/image_47/47_Gaujac_Cantecort_5.jpg"]},"Consult_chateau_formulairedbf6":{"id":"Consult_chateau_formulairedbf6","dept":"47","canton":"Monflanquin","commune":"Gavaudun","nom":"Gavaudun","type":"Vestiges","periode":"XII-XV","histoire":"GAVAUDUN, en 1324,  à Amstang de Baleinx, seigneur. Le 25 octobre 1398 Bernard de Durfort est qualifié de seigneur de Gavaudun. Trente ans plus tard,  passe dans la famille de Lustrac. En 1430, Arnaud de Lustrac, connu sous le nom de Naudonnet, passe ensuite à son fils, Bertrand, mort en 1524 sans postérité, puis à Antoine II de Lustrac, marié à Françoise de Pompadour. Veuve du maréchal de Saint-André depuis 1562, Marguerite de Lustrac a épousé Geoffroy de Caumont en 1568 au château de Gavaudun Marguerite a alors résidé dans ses châteaux de l'Agenais, Lustrac, Gavaudun, Caumont et ne revint plus à la cour. Son mari est assassiné en 1574. Elle est alors enceinte et donne naissance à sa fille, Anne de Caumont, le 10 juin 1574, au château de Gavaudun.   Anne de Caumont s'est mariée en 1595 avec François d'Orléans, comte de Saint-Pol, frère du duc de Longueville. Marguerite de Lustrac est morte en 1595 au château des Milandes. Pierre d'Auray.  Dans son contrat de mariage signé en 1669, René d'Auray, fils de Jean-Baptiste, est qualifié de marquis de Gavaudun. La terre de Gavaudun est ensuite passée à Jacques-Armand d'Auray, héritier de sa grand-mère, Françoise de Souillac. Le 30 juillet 1686,  Gavaudun est acheté par le marquis Armand Ier de Belsunce. en 1720. Le troisième, Antonin, meurt à Sainte en 1712. L'héritier des seigneuries de Born, Castelmoron et Gavaudun, a été Charles-Gabriel.  Louis-Antonin a hérité de tous les biens de la famille de Belsunce. Il est encore qualifié de baron de Gavaudun en 1779. Il a émigré à Londres à la Révolution où il est mort en 1796. Il a dû vendre la terre et seigneurie de Gavaudun à la famille de Fumel peu avant la Révolution dont on sait qu'elle en est propriétaire en l'an II quand les biens de Philibert de Fumel-Monségur, émigré en 1792, sont saisis.","architecture":"Le château de Gavaudun  existait en 1169 quand pour en chasser des brigands ou des hérétiques, l'évêque de Périgueux, Jean d'Assida, l'a assiégé, pris et démoli d'après le Gallia Christiana. Le château a dû être reconstruit peu après. Il fut construit entre le XIIe et le  XIIIe siècle, sur le principal axe de circulation entre le Périgord et lAgenais.  Un premier château érigé au XIe siècle fut assiégé et détruit  par l'évêque de Périgueux en 1165. Sur ses fondations, Gavaudun fut reconstruit au XIIIe siècle : un bloc de 300 m de long et de 40 m de hauteur s'avance, promontoire massif et longiligne, au milieu de la vallée de la Lède qu'il coupe en deux fractions presque égales. Inaccessible de toutes parts, sauf le côté nord où fut creusée une tranchée, le château-fort était une position forte dans une vallée reliant l'Agenais au Périgord.\r\nCette forteresse a  appartenu aux plus grandes familles du sud-ouest et a joué un rôle déterminant durant la guerre de Cent Ans et les guerres de religion. L'originalité du château réside dans son adaptation au site, son fonctionnement et la conception défensive de son donjon de ses six étages,  son donjon mesure 25 m de haut et se compose de 5 étages.   Il a été vendu plusieurs fois entre 1795 et 1796. Le château est en grande partie détruit en 1796. Il a été acheté par la commune de Gavaudun vers la fin 1796.","habitants":"Famille de Gavaudun                                                     Famille de Lustrac                                                   Famille de  Jacques-Armand d'Auray\r\n        \r\n        \r\n        \"","divers":"Vestiges et tour de Gavaudun","gps":"","images":["../../jctruffet.com/image/image_47/47_Gavaudun_1.jpg","../../jctruffet.com/image/image_47/47_Gavaudun_2.jpg","../../jctruffet.com/image/image_47/47_Gavaudun_3.jpg","../../jctruffet.com/image/image_47/47_Gavaudun_4.jpg","../../jctruffet.com/image/image_47/47_Gavaudun_5.jpg","../../jctruffet.com/image/image_47/47_Gavaudun_6.jpg","../../jctruffet.com/image/image_47/47_Gavaudun_7.jpg","../../jctruffet.com/image/image_47/47_Gavaudun_8.jpg"]},"Consult_chateau_formulaire7781":{"id":"Consult_chateau_formulaire7781","dept":"47","canton":"Marmande","commune":"Gontaud-Nogaret","nom":"Gontaud_Chateau","type":"Château","periode":"XVIII","histoire":"A Gontaud-Nogaret plusieurs châteaux celui de Gontaud voir article , de Lafitte, de Bistauzac,  d'Escage, de Laubesc, de Marés et la maison de Jaudon, pas d'information et d'image pour ses châteaux mis à part Gontaud.                                  ESCAGES, Plusieurs édifices remarquables se trouvent sur le territoire de Gontaud-de-Nogaret, notamment le château dEscages, bâti à lextrême fin du XIXe siècle, probablement à la place dun édifice plus ancien. En effet, une cheminée du XVIIe siècle, placée dans le vestibule du château, soutient cette hypothèse. Le logis est complètement reconstruit en 1898 pour M. Campagne, mari dune descendante des chevaliers dEscages, une vieille famille agenaise.    LAFFITE, Le château de Nogaret, important bâtiment qui marque le paysage de Gontaud-de-Nogaret, est le fruit dun important remaniement, au cours du XIXe siècle.  De la première construction du château, au XVIIIe siècle, subsiste une partie, située à larrière de la façade principale, au nord. Lédifice est remanié dans la seconde moitié du XIXe siècle, notamment dans sa partie sud, qui souvre sur lallée daccès au château.","architecture":"Roche-Marais  de plan rectangulaire à deux niveaux  flanqué d'une tour carré.                                         BISTORAC corps de logis rectangulaire à deux niveaux  toit à la Mansard  château ou maison noble dont la construction parait remonter pour le gros-oeuvre au début du XVIIe siècle. La date gravée à la clef de l'arc du corps de passage est difficilement lisible: \"1600\". Mentionné comme fief sur la carte de Belleyme sous le nom le Marais, fief de la famille Bacalans. L'ensemble des bâtiments a été l'objet d'une restauration radicale dans les années 1970. GONTAUD-ROC de plan rectangulaire à deux niveaux  flanqué d'une tour carré.","habitants":"Famille de M.Campagne                                      Famille Bacalans.\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Duivers château  à Gontaud de Nogaret, château hôtel grav 1,  D'escage grav 2, de Bistorac grav 3, du Roc grav 4  de holiday home hôtel grav 5  et de Lafitte grav 6.","gps":"","images":["../../jctruffet.com/image/image_47/47_Gontaud_Chateau_1.jpg","../../jctruffet.com/image/image_47/47_Gontaud_Chateau_2.jpg","../../jctruffet.com/image/image_47/47_Gontaud_Chateau_3.jpg","../../jctruffet.com/image/image_47/47_Gontaud_Chateau_4.jpg","../../jctruffet.com/image/image_47/47_Gontaud_Chateau_5.jpg","../../jctruffet.com/image/image_47/47_Gontaud_Chateau_6.jpg"]},"Consult_chateau_formulairee373":{"id":"Consult_chateau_formulairee373","dept":"47","canton":"Marmande","commune":"Gontaud de Nogaret","nom":"Gontaud_Nogaret","type":"Château","periode":"XVI","histoire":"A Gontaud-Nogaret plusieurs châteaux celui de Gontaud, de Lafitte, de Bistauzac,  d'Escage, de Laubesc, de Marés et la maison de Jaudon, pas d'information et d'image pour ses châteaux mis à part Gontaud.                                                                         GONTAUD, en 1495  lécuyer Jean de Melet sest vu accorder par le roi Charles VII la faculté de racheter le  castel et seigneurie de Gontaud  qui avaient été vendus  à Catherine dAnglade et son fils Jean de Verdun. Cest donc entre 1473 et 1495 que fut construit cet édifice. Pendant les guerres de religion, le 13 juillet 1580, le maréchal Armand de Gontaud, baron de Biron, à la tête de larmée catholique, attaque Gontaud qui est aux mains des protestants. Le château sera la seule maison épargnée par ce pillage et lincendie du village. En effet, il appartient alors à un noble catholique : Jean de Montferrand, baron de Cancon, héritier des Verdun. Le lendemain, le château sera occupé par les soldats catholiques. Pendant les troubles de la Fronde, le 4 décembre 1652, Gontaud sera à nouveau assiégé et pillé par deux régiments de cavalerie et dinfanterie du marquis de Biron. Là encore, le château du seigneur de Montferrand sera épargné par larmée de Condé mais pour payer cette grâce le comptable de la communauté devra donner aux assiégeants 20 boisseaux dAvoine et neuf dorge. Après les Montferrand, cest la famille Luppe dArblade qui possédera le château en 1661 puis Timothée de Bacalan en 1694 qui y fera effectuer les premières réparations connues. Puis ce sera messire Jean Pellet. Le 2 octobre 1793, les biens de la famille Pellet seront saisis et le château de Gontaud sera adjugé aux enchères publiques à la citoyenne Marguerite Degalz, veuve Martineau. Le château restera la propriété de la famille Martineau jusquau 6 mai 1914, date à laquelle il sera vendu à monsieur Armand de Gontaud-Biron, marquis de Gontaud et de Saint-Blancard.","architecture":"GONTAUD, le château manque alors cruellement dentretien et le 5 janvier 1949 la petite tour du côté nord sécroule sur la rue, entraînant avec elle la moitié du corps de logis,  comprend deux grandes salles et une petite tour, qui se répètent sur trois niveaux. L'escalier à vis dessert les deux salles. Deux escaliers à vis en échauguettes partent des tours, au dernier étage, pour atteindre les combles de ces deux tours. Il reste quelques menuiseries d'époque avec ferrures, et des carrelages en terre cuite. L'édifice est signalé en 1662 comme étant en ruine et les habitants l'utilisaient comme carrière de pierre. Le château aurait été épargné vers 1579 lors de la destruction de la ville par le maréchal de Biron, catholique. Le château seigneurial reconstruit au XVIe siècle pour les Montferrand,  À partir de 1955 de nombreux propriétaires se sont succédés sans engager de grands travaux. Un travail de restauration des parties existantes a été entrepris depuis 1997 par de nouveaux propriétaires. En 2007, la moitié du corps de logis, écroulée en 1949, a été reconstruit par des entreprises locales.                                                  GONTAUD-ROC de plan rectangulaire à deux niveaux  flanqué d'une tour carré.                           BISTAURAC corps de logis rectangulaire à deux niveaux  toit à la Mansard .","habitants":"Maréchal Armand de Gontaud                                        Famille Luppe dArblade\r\n        \r\n        \r\n        \"","divers":"Château de Gontaud de Nogaret","gps":"","images":["../../jctruffet.com/image/image_47/47_Gontaud_Nogaret_1.jpg","../../jctruffet.com/image/image_47/47_Gontaud_Nogaret_2.jpg","../../jctruffet.com/image/image_47/47_Gontaud_Nogaret_3.jpg","../../jctruffet.com/image/image_47/47_Gontaud_Nogaret_4.jpg","../../jctruffet.com/image/image_47/47_Gontaud_Nogaret_5.jpg","../../jctruffet.com/image/image_47/47_Gontaud_Nogaret_6.jpg"]},"Consult_chateau_formulaireac88":{"id":"Consult_chateau_formulaireac88","dept":"47","canton":"Duras","commune":"Baleyssagues","nom":"Grave_Bechade","type":"Château","periode":"XVIII","histoire":"GRAVE BECHADE, lorsqu'il fit construire son château à Baleyssagues, en 1860, à quelques encablures de Duras, le préfet Abdon Béchade était resté très attaché aux paysages où il était né. Grand commis de la République de la seconde moitié du XIXe siècle, maire de la commune et conseiller du canton, il imagina un havre de paix où il aimait venir se ressourcer.   Aujourd'hui chambres d'hôtes de Virginie Gouault et société civile  en activité depuis 30 ans. elle est spécialisée dans le secteur d'activité de la culture de la vigne. Société, établissement actif et le dernier événement notable de cette entreprise du 27-01-2016. Thierry Engasser en est gérant.","architecture":"La Grave-Béchade  est un  magnifique pavillon de chasse du XVIIIe siècle, situé à la croisée de la Dordogne, du Lot et Garonne et de la Gironde, corps de logis principal de plan d'équerre à deux niveaux  et lucarnes sur un toit à deux pans et en croupe sur la partie façade accolé d'un pavillon d'une travée avec fronton, en angle intérieur, une tour rectangulaire à toit en ardoise à l'impériale.","habitants":"préfet Abdon Béchade\r\n        \r\n        \"","divers":"Château de Grave-Béchade à Baleyssagues","gps":"","images":["../../jctruffet.com/image/image_47/47_Grave_Bechade_1.jpg","../../jctruffet.com/image/image_47/47_Grave_Bechade_2.jpg","../../jctruffet.com/image/image_47/47_Grave_Bechade_3.jpg","../../jctruffet.com/image/image_47/47_Grave_Bechade_4.jpg"]},"Consult_chateau_formulaire6c58":{"id":"Consult_chateau_formulaire6c58","dept":"47","canton":"Lavardac","commune":"Pompiey","nom":"Guillery","type":"Château","periode":"XVIII","histoire":"GUILLERY, le château de Guillery serait construit en 1789 pour le baron Dudevant, beau-père de George Sand qui y fait dailleurs plusieurs séjours vers 1825, avant la séparation davec son mari intervenue en 1831.\r\nGeorges Sand à vécu au château de Guillery au début du  XIXe siècle. A 18 ans, en 1822, elle épousa Casimir Dudevant, qui était le fils du Baron Dudevant, un capitaine de caval
