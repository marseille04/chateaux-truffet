rvain (1816-1896) a été maire de Verteuil-en-Agenais en 1864, conseiller général du Lot-et-Garonne et a résidé au château de Roquepiquet. N'ayant pas de postérité, il a légué le château à son neveu Pierre Henri Gabriel de Gervain (1870-1911). Ce dernier était marié en 1900 à Henriette Cruse (1878-1979) décédée au château de Roquepiquet. Le château a été transmis à sa fille et son gendre, Maurice Harlé (1899-1988). Une deuxième campagne est dessinée dès 1866 par l'artiste archéologue Léo Drouyn. Elle n'est entreprise qu'au début du XXe siècle, à la demande de Pierre de Gervain, par l'architecte Lucien Dubarry de Lassalle avec la construction de la tour carrée sud-ouest et de la terrasse sud, l'harmonisation des façades et la réalisation du décor intérieur. On peut voir la date de 1908 sur la tourelle sud. Le château a été inscrit au titre des M.H le 16 septembre 19976","architecture":"Il est implanté sur une terrasse en bordure du ruisseau de Tolzac, à 1500 mètres à l'est du village. Il semble déserté au sortir de la guerre de Cent ans, Les XIXe et XXe siècles saffirment comme une période de renouvellements dans de nombreux domaines. Les constructions et reconstructions sont importantes et dautant plus visibles que les styles et parfois lampleur des projets rompent avec les réalisations antérieures.     Un devis de 1739 réalisé par le chevalier de Roquepiquet, ingénieur du roi, prévoit des aménagements intérieurs et extérieurs afin \"de rendre la maison commode et les dehors gracieux\". Il est difficile de savoir si le projet a été réalisé, car seule la chambre dite de Madame de Gervain, au rez-de-chaussée comporte encore un décor du XVIIIe siècle. D'importantes campagnes de restaurations conduites à partir du milieu du XIXe siècle, on donné au château son allure néo-gothique.  Le développement industriel est lexemple le plus cité, le plus attendu, mais nen est quun élément. Les ouvrages dart, parfois spectaculaires, liés à lamélioration des transports, les monuments publics qui sélèvent dans les villes, les églises et les temples convertis au néomédiéval y participent fortement. Et il faut y inclure également les fermes et les simples maisons des villes et des champs.  Le parc et les jardins avec orangerie et serre ont été recomposés par les architectes paysagistes Denis et Eugène Bühler en 1857 et Édouard André en 1902-1904.","habitants":"Pierre Henri Gabriel de Gervain\r\n        \r\n        \"","divers":"Château de la Rochepiquet","gps":"","images":["../../jctruffet.com/image/image_47/47_Roquepiquet_1.jpg","../../jctruffet.com/image/image_47/47_Roquepiquet_2.jpg","../../jctruffet.com/image/image_47/47_Roquepiquet_3.jpg","../../jctruffet.com/image/image_47/47_Roquepiquet_4.jpg","../../jctruffet.com/image/image_47/47_Roquepiquet_5.jpg","../../jctruffet.com/image/image_47/47_Roquepiquet_6.jpg"]},"Consult_chateau_formulairedcc6":{"id":"Consult_chateau_formulairedcc6","dept":"47","canton":"Casteljaloux","commune":"Ruffiac","nom":"Ruffiac","type":"Château","periode":"XV","histoire":"Deux châteaux à Ruffiac celui de Bachac (voir article) et celui de Hautelande à Antagnac.                  HAUTELANDE Antagnac  est la réhabilitation dun prieuré du XVe siècle. Le prieuré de Ruffiac est construit par une communauté religieuse placée sous le patronage de saint Laurent. Laurent de Rome devenu Saint Laurent, serait né vers 210 en Espagne. Désigné comme le premier des 7 diacres de lÉglise romaine, il aurait notamment été chargé de garder son trésor. La légende raconte que peu avant sa mort en 248, il aurait déposé à Huesca le Saint-Calice. Durant la Révolution, les vestiges du prieuré, dont une chapelle, sont confisqués par lÉtat puis vendus. Lancien prieuré de Ruffiac est aujourdhui un hôtel de standing, ancienne demeure cléricale transformé depuis le XIVe siècle   en hôtel depuis 15 ans.","architecture":"Ruffiac, de plan rectangulaire à deux niveaux,  fronton plein cintre de la façade sur la travée d'entrée en légère saillie  l'édifice est flanqué de deux tours carrées aux angles avec fenêtres géminées à toits presque plats.","habitants":"Famille de Bastard\r\n        \r\n        \"","divers":"Château de Hautelande et de Ruffiac","gps":"","images":["../../jctruffet.com/image/image_47/47_Ruffiac_1.jpg","../../jctruffet.com/image/image_47/47_Ruffiac_2.jpg","../../jctruffet.com/image/image_47/47_Ruffiac_3.jpg","../../jctruffet.com/image/image_47/47_Ruffiac_4.jpg","../../jctruffet.com/image/image_47/47_Ruffiac_5.jpg"]},"Consult_chateau_formulaire32af":{"id":"Consult_chateau_formulaire32af","dept":"47","canton":"Nerac","commune":"Feugarolles","nom":"Salles_Feugarolles","type":"Château","periode":"XVIII","histoire":"SALLES,  En 1461, Charles II d'Albret concède la maison noble de Salles à Le Sage, de la même façon qu'il concède le château de Gueyze ou Brazalem deux ans plus tard. A la fin du XVIIIe siècle, il appartient toujours à la famille Le Sage. Une chapelle existait au château en 1784. Au milieu du XIXe, le château passe par mariage aux Batz de Trenqueléon. Henri de Batz est un vigneron indépendant. Ne soyez pas surpris si le nom de Batz ne vous est pas inconnu : Charles de Batz est passé à la postérité sous le nom de d'Artagnan, Henri est son arrière petit-neveu.  A Feugarolles, le vignoble du château de Salles est implanté au coeur de l'appellation de Buzet. Les chais du château vous sont ouverts. Le château de Salles du XVIIIe siècle, au coeur de son beau parc, jouxte la propriété viticole de 5 ha. Propriétaire Henry de Batz de Trenquéleon.","architecture":"Salles, château, édifice du XVIIIe siècle bâti sur l'emplacement d'un château plus ancien, probablement médiéval. Il est entouré d'un parc du 5 hectares, est une demeure noble et une chapelle en ruine sont figurées au lieu dit \"Salles\" sur la carte de Cassini au milieu du XVIIIe siècle. Le château actuel a sans doute été édifié dans la première moitié du XVIIIe siècle sur l'emplacement d'un ancien château, dont le toponyme suggère une origine médiévale.  L'importance des chais et du pressoir à vin encadrant la cour sur deux côtés désignent la vigne comme principale ressource du domaine. Remanié à la fin du XIXe siècle: la toiture en ardoise, les lucarnes du comble et les écuries datent de ces travaux.","habitants":"Charles de Batz \r\n        \r\n        \"","divers":"Château de La Salles à Feugarolles","gps":"","images":["../../jctruffet.com/image/image_47/47_Salles_Feugarolles_1.jpg","../../jctruffet.com/image/image_47/47_Salles_Feugarolles_2.jpg","../../jctruffet.com/image/image_47/47_Salles_Feugarolles_3.jpg"]},"Consult_chateau_formulaire80fc":{"id":"Consult_chateau_formulaire80fc","dept":"47","canton":"Marmande","commune":"Samazan","nom":"Samazan_Padriac","type":"Château","periode":"XVI","histoire":"Trois châteaux à Samazan celui de Samazan,  Cantet, Pomeyrs dit de Pardiac et la maison d'Henri IV.  SAMAZAN, le château de Samazan est construit sur une butte. Il aurait été élevé à la fois pour veiller sur la Loutrange, pays auquel la seigneurie de Samazan est rattachée, et pour servir de château de péage sur le fleuve.  Il   est situé à l'extrémité nord de la Seigneurie, plus près de Montpouillan que de Samazan. Il fut la propriété des Caumont et des Albret, puis, de nouveau, les Caumont en reprirent possession avant qu'il ne revienne aux d'Albret !  Au XVIe siècle les Albret en sont toujours les propriétaires, puis il passe aux mains des De Lart, De Brassay, D'Antras, Sacriste de Malvirade et enfin les Dedieu de Samazan au XVIIIe siècle.                                                             CANTET, à l'extrémité sud de la Seigneurie, a  eut pour vocation première, un rôle de \"péage de terre\", la seigneurie de Samazan ne donnant pas sur la Garonne. Sa construction date du XVIe siècle, et les premiers habitants en furent les De Comarque avant de devenir la propriété des De Dons, des Pomiers et pour finir des Lançon de Lostière, qui en sont toujours propriétaires. Chambres d'hôtes de Jean-Bernard de la Raiterie                                                                   POMEYRS ou PARDRIAC , qui fut un temps propriété des Pomyers alliés aux Dedieu, par alliance  avant d'être reconverti en maison de retraite.    Il appartient aux Dedieu de Samazan et par voie d'héritage revient aux Merle de Massoneau; Marie Thérèse Josèphe Dedieu ayant épousé en 1880, Simon Merle de Massonneau d'Aiguillon.   De la fin du XIXe siècle jusquà 1963, date de sa mise en vente, le château appartient à la famille de Pontac.  En 1973, une association achète le château de Pomyers et aménage les locaux en maison de retraite. Racheté par le propriétaire actuel en 1987, il est redevenu résidence privée pour personnes âgées.","architecture":"Le château de Samazan est bâti au XIIIe ou XIVe siècle. Il sagit dune maison forte, telle quil en existe tout le long de la Garonne pour surveiller le fleuve. Ce premier édifice aurait été reconstruit au XVIe siècle et remanié au XIXe siècle. Durant cette période, les propriétaires se succèdent. Comme bon nombre de villages dans notre région, Samazan a lui aussi sa maison d'Henri IV ! il s'agit ici d'une métairie située sur la vieille route qui va de Marmande à Casteljaloux, en passant par Samazan                                                   Le château de Pardiac ou château de Pomyers, construit sur la commune de Samazan est un imposant édifice. Il est le fruit dune reconstruction, au XIXe siècle,  Cest pour la famille de Pomyers que le nouveau château est édifié dans le courant du XIXe siècle. Il accuse linfluence du néoclassicisme, très en vogue au XIXe siècle. Le château est implanté au centre dun parc. Il comprend un corps de logis principal, de plan rectangulaire. Il est flanqué, sur sa façade principale, de deux tours dangle quadrangulaires, et, à larrière, de dépendances organisées autour dune cour. Linfluence néoclassique se lit dans la régularité du plan, la symétrie de larchitecture et les motifs ornementaux utilisés sur la façade principale : fronton triangulaire, colonnes, jeu davancées et de retraits, frise, modillons, balustrades, appareil en ressaut. aujourd'hui Ehpad.\r\nCantet de plan en d'équerre à deux niveaux les corps de logis en U avec en mi-hors oeuvres une tour à toit brisés et donjon sur la longiditudinale du bâtiment qui possède un corps d'entrée à deux niveaux.","habitants":"Famille des Albret                                                     Famille des Pomyers\r\n        \r\n        \"","divers":"Château de Samazan grav 1, de Padriac grav 2 à 4 et Cantet 5 et 6","gps":"","images":["../../jctruffet.com/image/image_47/47_Samazan_Padriac_1.jpg","../../jctruffet.com/image/image_47/47_Samazan_Padriac_2.jpg","../../jctruffet.com/image/image_47/47_Samazan_Padriac_3.jpg","../../jctruffet.com/image/image_47/47_Samazan_Padriac_4.jpg","../../jctruffet.com/image/image_47/47_Samazan_Padriac_5.jpg","../../jctruffet.com/image/image_47/47_Samazan_Padriac_6.jpg"]},"Consult_chateau_formulaire8160":{"id":"Consult_chateau_formulaire8160","dept":"47","canton":"Penne d","commune":"Castella","nom":"Savignac_Castella","type":"Vestiges","periode":"XIII","histoire":"SAVIGNAC, lacte le plus ancien mentionnant « Castella » date de 1259 et cite le château de Savignac. car il a en effet été détruit en 1418 par les habitants dAgen lors des combats avec les Anglais. De hautes personnalités sont liées à lhistoire du village : le pape Clément V séjourne au château de Savignac et Diane de Poitiers est propriétaire de la tour de Fontirou. Au XVIe siècle, le Château de Savignac appartenait à la famille de Montpezat.","architecture":"Savignac, au milieu du XIIIe siècle, cest lun des plus grands châteaux forts de lAgenais, aujourdhui il nen reste que des ruines.Il ne reste plus que la tour de ce château du XIIIe siècle qui était composé dun corps de logis rectangulaire et de deux tours carrées puis au XVIe siècle, dune enceinte munie de quatre tours rondes. C'était l'un des plus puissants châteaux de l'Agenais au XIIIe siècle. Ses ruines sont encore imposantes aujourdhui. Le pape Clément V fut un habitué des lieux.","habitants":"Diane de Poitiers\r\n        \r\n        \"","divers":"Vestiges  du Château de Savignac","gps":"","images":["../../jctruffet.com/image/image_47/47_Savignac_Castella_1.jpg","../../jctruffet.com/image/image_47/47_Savignac_Castella_2.jpg"]},"Consult_chateau_formulaired213":{"id":"Consult_chateau_formulaired213","dept":"47","canton":"Monflanquin","commune":"Saint-Eutrope de Born","nom":"Scandaillac","type":"Château","periode":"XV","histoire":"SCANDAILLAC, à Saint-Eutrope, du XIIIe siècle, remanié au XVIe siècle et transformé aujourd'hui en chambre d'hôtes de Philippe Ceri.\r\nBORN, le château de Born, datant du XVe siècle, fortement remanié et restauré. Pendant la guerre de cent ans Monflanquin avait déjà eu comme voisins les Durfort, installés à Gavaudun. La bastide en retrouve le voisinage en   1595 quand une branche des Durfort sinstalle au château de Born. En effet à cette date Jean II du Maine, seigneur de Scandaillac, épouse Antoinette de Durfort soeur de Jean de Durfort de Baujamon ; les deux beaux-frères vont échanger à cette occasion leurs baronnies : Jean de Durfort   sinstalle au château de Born. En 1602, « le puissant seigneur messire Jean de Durfort étant à présent au lieu et château noble de Bellabre confesse et avoue tenir en hommage lige et fidélité sans aucune charge ni redevance quelconque du Roy de sa chastelnye de Monflanquin.","architecture":"Le nom Scandaillac indique qu'à l'époque romaine il y avait  un castrum candilla sur la colline qui surveillait une des routes romaines de la région de  Born. Pendant l'époque médiévale, Scandaillac fut agrandi et aménagé comme château fort, donjon, murs, douves et pont-levis. La chapelle à côté de l'ancienne porte, a au moins 500 ans et  la partie la plus ancienne encore existante. Elle fut érigée au XIIe siècle et servait de salle de garde. Le château date du XIIIe siècle, il était entouré de larges fossés et construit sur un emplacement quadrangulaire. Quatre corps de logis flanqués de tours aux angles et reliés entre eux, abritaient une cour intérieure. Au Nord, les murs étaient d'une épaisseur de plusieurs mètres et deux tours carrées sur les angles, une tour carrée au centre défendaient la porte autrefois munie d'une herse. A la Renaissance, on refit deux corps de logis. A la fin du XVIe siècle on décora la cour intérieure par une galerie composée d'un premier étage percé de cinq fenêtres à meneaux.                                                                           BORN   au sud ouest  Saint-Eutrope-de-Born conserve de son riche passé médiéval, le château de Born, qui date du XIIe siècle, est bâti sur un plan rectangulaire avec des tours carrées aux angles. À la fin du XVIe siècle, le château appartient au puissant seigneur Jean de Dufort qui possède un vaste domaine entre basses-cours, grange, écuries, vignes, pigeonnier, jardins, prés et bois.","habitants":"Familld de  Jean II du Maine\r\n        \r\n        \"","divers":"Château de Scandaillac et le château de Born grav de 5 à 7. à Saint-Eutrope de Born.","gps":"","images":["../../jctruffet.com/image/image_47/47_Scandaillac_1.jpg","../../jctruffet.com/image/image_47/47_Scandaillac_2.jpg","../../jctruffet.com/image/image_47/47_Scandaillac_3.jpg","../../jctruffet.com/image/image_47/47_Scandaillac_4.jpg","../../jctruffet.com/image/image_47/47_Scandaillac_5.jpg","../../jctruffet.com/image/image_47/47_Scandaillac_6.jpg","../../jctruffet.com/image/image_47/47_Scandaillac_7.jpg"]},"Consult_chateau_formulairea9b5":{"id":"Consult_chateau_formulairea9b5","dept":"47","canton":"Montflanquin","commune":"Monflanquin","nom":"Secretary","type":"Château","periode":"XVII","histoire":"SECRETARY; La famille Passelaygue a été anoblie en 1655, Louis Gabriel de Passelaygue, sieur de Beaupuy est né vers 1730 à Monflanquin du mariage de Passelaygue seigneur de Secrétary et de Marie Courd de Thomazeau. Le 15 Mai 1785, le vicomte de Damas,  gouverneur de la Guadeloupe puis de la Martinique, en remplacement du marquis de Bouille, nomme Passelaygue - commandant en second depuis1781 -  gouverneur par intérim de la Dominique,  de retour au pays, Passelaygue n'est donc pas un cas unique. Il est représentatif d'un mouvement assez large pour avoir laissé des traces dans l'imaginaire local du moment. D'ailleurs, à Monflanquin même, il y a le Maréchal de Camps Cuérin de Lachaize qui a assisté à cinq batailles navales dans les parages des Antilles et à presque toutes les affaires de terre qui signalèrent les armes françaises en Amérique. A la prise de la Dominique, sous les yeux du Duc de Bouille, il se distingue à la tête d'une compagnie d'élite ce qui lui vaut la Croix de Saint Louis.","architecture":"Secrétary à Boudy de Beauregard de plan en U avec corps de logis rectangulaire à deux niveaux et attiques entre deux donjons carrés toit à quatre pans côté entré  prolongé en retour d'équerre de deux bâtiments à deux niveaux reliant un mur formant la cour d'honneur.","habitants":"Famille Passelaygue\r\n        \r\n        \"","divers":"Chateau de Secrétary à Monflanquin","gps":"","images":["../../jctruffet.com/image/image_47/47_Secretary_1.jpg","../../jctruffet.com/image/image_47/47_Secretary_2.jpg","../../jctruffet.com/image/image_47/47_Secretary_3.jpg","../../jctruffet.com/image/image_47/47_Secretary_4.jpg"]},"Consult_chateau_formulaire5f44-2":{"id":"Consult_chateau_formulaire5f44-2","dept":"47","canton":"Nérac","commune":"Nérac","nom":"Seguinot_Nerac","type":"Château","periode":"XVI","histoire":"SEGUINOT,  dit maison de Luther : Selon une tradition, Henri IV aurait donné Séguinot à Lanoue dit Bras de Fer. Mis à sac en 1652, selon Samazeuilh. Démantelé à la Révolution, avec notamment la suppression des créneaux sur les murs fermant la cour. Divisé en plusieurs propriétés à la fin du XIXe siècle, l'ancien logis a été abandonné et plusieurs logements ont été aménagés dans les dépendances.","architecture":"Vieille demeure fortifiée, Séguinot est une petite agglomération constituée par son château et ses dépendances diverses. Elle se présente aux regards sous la forme dun carré dune cinquantaine de mètres de côté, complètement fermé par les constructions, hauts et solides bâtiments de pierres massif  et puissant. Château de Séguinot composé de 4 ailes, et cantonné de 4 tours d'angle carrées. Les corps de bâtiments les plus anciens se situent à l'est, tour carrée, partie du corps de logis, tour dans l'angle de la cour abritant sans doute un escalier à vis : ils ont été construits au XVIe siècle. La principale campagne de construction date du 4e quart du XVIe siècle : l'aile nord-est dominant la Baïse, le pavillon abritant l'escalier rampe sur rampe où est inscrite la date de 1593, la tour nord cantonnée d'une tourelle montant du fond, l'élévation sud-est avec un passage couvert dont l'accès est surmonté d'une bretèche datent de cette époque. Les façades sur cour des corps de bâtiment nord et nord-est présentent le même décor de double bandeau, le logis ouvrait par un portique de 6 arcades, et sans doute une galerie à l'étage. Les bâtiments nord-ouest et sud-ouest, où se trouvaient les dépendances, ont été remaniés.","habitants":"maison de Luther\r\n        \r\n        \r\n        \"","divers":"Château de Séguinot à Nérac","gps":"","images":["../../jctruffet.com/image/image_47/47_Seguinot_Nerac_1.jpg","../../jctruffet.com/image/image_47/47_Seguinot_Nerac_2.jpg","../../jctruffet.com/image/image_47/47_Seguinot_Nerac_3.jpg"]},"Consult_chateau_formulairea937":{"id":"Consult_chateau_formulairea937","dept":"47","canton":"Casteljaloux","commune":"la Réunion","nom":"Sendat","type":"Forteresse","periode":"XVI","histoire":"SENDAT   En 1622, Jean-Charles de Montesquiou, baron du Sendat,  Jean I de Morin, conseiller en la Chambre de Guyenne depuis le 23 juillet 1600, marié à Catherine de Madronet du Tasta.  Jean II de Morin, conseiller au parlement de Bordeaux,  Jean III de Morin, baron du Sendat, marié, le 26 janvier 1703, avec Henriette de Gascq, et mort le 19 mars 1753, a pour arrière petit-fils M. Edmond de Morin, baron du Sendat, conseiller général du département du Lot-et-Garonne. Ce Jean III, présent  le 23 juin 1703, était fils de Jean Benjamin de Morin, baron du Sendat, lieutenant au régiment de Turenne ; petit-fils de Jean II de Morin, conseiller au parlement de Bordeaux, et de Jeanne de Gascq; et arrière petit-fils de Jean I de Morin, conseiller au même parlement depuis le 23 juillet 1600. Ce dernier avait, en outre, de son mariage avec Catherine de Madronet du Tasta, deux autres fils nommés François, et conseillers audit parlement de Bordeaux. L'ainé de ces trois frères conseillers, François de Morin, baron du Sendat, était, en outre, gouverneur du duché d'Albret. Il eut l'honneur de recevoir au château du Sendat, le 22 juin 1660, le duc de Bouillon et le maréchal de Turenne .\r\nJean Henri de Morin marié le 23 février 1767 avec Marguerite de Gervain de Roquepiquet, Pierre Barthélemy de Morin (1768-30 novembre 1850), marié en 1802 avec Charlotte de Gervain de Roquepiquet, conseiller général du département, Henri-Léon Edmond de Morin, baron du Sendat, né à Casteljaloux le 9 octobre 1807, mort au château du Sendat le 7 juin 1870. Le château passe par héritage à Mme Vatin-Pérignon, légataire de la barone du Sendat. Elle le vend en 1923 à M. Maubourguet. Sa fille, Éliette Maubourguet  s'est mariée avec Jacques Lemoine, fondateur du journal Sud Ouest. Toujours dans cette famille.","architecture":"château du Sendat à La Réunion première construction d'une maison forte au XIe siècle,  reconstruction partielle au XVIe siècle l'édifice mélange  d'un château fort sur les fronts nord et sud avec des tours circulaires à mâchicoulis  et bordent une cour intérieure ouverte à l'est et fermée à l'ouest par un bâtiment du XVIIe siècle. Cette aile est cantonnée par deux pavillons avec côté cour un avant-corps central. Une galerie à étage borde le front nord. Le style néo-gothique du XIXe siècle est très présent. Vestiges d'un édifice de la fin du Moyen-Age et d'un château du XVIIe siècle, fortement restauré par Félix Duban au milieu du XIXe siècle. Le décor et le mobilier font partie intégrante du château. Du château médiéval a été conservée une partie des fronts ouest et Est, avec leurs tours circulaires, bordant une cour intérieure limitée au nord par un édifice du XVIIe siècle.","habitants":"Jean-Charles de Montesquiou\r\n        \r\n        \"","divers":"Château de Sendat à la Réunion","gps":"","images":["../../jctruffet.com/image/image_47/47_Sendat_1.jpg","../../jctruffet.com/image/image_47/47_Sendat_2.jpg","../../jctruffet.com/image/image_47/47_Sendat_3.jpg","../../jctruffet.com/image/image_47/47_Sendat_4.jpg","../../jctruffet.com/image/image_47/47_Sendat_5.jpg","../../jctruffet.com/image/image_47/47_Sendat_6.jpg","../../jctruffet.com/image/image_47/47_Sendat_7.jpg","../../jctruffet.com/image/image_47/47_Sendat_8.jpg"]},"Consult_chateau_formulairee0bb":{"id":"Consult_chateau_formulairee0bb","dept":"47","canton":"Villeneuve sur Lot","commune":"Bias","nom":"Senelles","type":"Château","periode":"XVII","histoire":"SENELLES,  né le 9 Juillet 1820 à Senelles et décédé en 1906, Louis-Léon de Brondeau fut officier de santé de la faculté de Montpellier, docteur en médecine et en chirurgie de la Faculté de Glessen en Allemagne. Il s'est marié à Julie Marie-Louise de Rigaudie Saint-Marc; ils n'eurent aucun enfant.  Homme cultivé, intelligent et riche, Léon de Brondeau essaya sa vie durant d'appliquer ses qualités et ses moyens dans les domaines politiques, agricoles, culturels et philanthropiques. Amateur d'art, il collectionne des céramiques, des sculptures en bronze et des peintures. Dans les années 1880, il décide d'orner les murs extérieurs de céramiques selon un plan  cohérent et symétrique, créant ainsi une oeuvre originale et unique.   L'origine et les styles des céramiques sont variés, non seulement la production française est bien représentée (Limoges, Marte Tolosane, Nevers, Quimper, Rouen, Saint Amans, Vieillard), mais on peut aussi noter la présence de pièces anglaises, suédoises, chinoises et japonaises.  Une des pièces maîtresses est le grand panneau du célèbre céramiste Théodore Deck, peint par Eugène Gluck, représentant Urania, muse de l'astronomie.  Enfin, l'autre particularité de Senelles est la décoration de l'escalier intérieur. Léon de Brondeau  a collé sur ces murs des caricatures et dessins provenant de revues de la fin du XIXe siècle.","architecture":"Ancien petit château du XVIIe siècle dont les tourelles ont été rasées au niveau des toitures. Des faïences, des porcelaines anciennes et modernes, des plats, des panneaux ont été incrustés en très grande quantité sur les quatre façades extérieures de cette habitation, qui est aujourd'hui une des curiosités artistiques du pays.","habitants":"Famille de de Rigaudie Saint-Marc;\r\n        \r\n        \"","divers":"Château de Senelles à Bias","gps":"","images":["../../jctruffet.com/image/image_47/47_Senelles_1.jpg"]},"Consult_chateau_formulairebafb":{"id":"Consult_chateau_formulairebafb","dept":"47","canton":"Colayrac Saint-Cirq","commune":"Sérignac sur Garonne","nom":"Serignac_Garonne","type":"Manoir","periode":"XV-XVII","histoire":"La commune de Sérignac-sur-Garonne compte deux autres manoirs, celui de Rozières et celui de Jouanisson pas d'information pour ce dernier.      \r\nROZIERES, manoir est une belle demeure de Sérignac-sur-Garonne dont la construction est fort ancienne. \r\nUne autre maison est à signaler sur la commune de Sérignac, le manoir de MENJOULAN, autrefois adossé à l'enceinte de l'église.  Au Moyen Âge, un manoir est l'habitation d'un propriétaire de fief, noble ou non, qui ne possède pas de droits seigneuriaux. L'habitation n'est, quelquefois, qu'une maison peu étendue, entourée de murs avec jardin. Le plus souvent, il s'agit d'une agglomération de bâtiments agricoles, avec un logis principal pour l'habitation du propriétaire.    SERIGNAC, en 1273, les seigneurs Gaston VII, vicomte de Béarn, et Gaillard, abbé de Figeac, fondent une bastide française à l'emplacement du village pour résister aux Anglais. Plus tard, la bastide sera rattachée au domaine royal d'Henri IV.","architecture":"MENJOULAN, a partir du XIVe siècle ils s'agrandissent essayant de ressembler aux châteaux. Comme ils ne sont toujours pas pourvus d'un système de défense, les guerres des XVe et XVIe siècles en détruisent un grand nombre. Après le XVIIe siècle, ce sont des habitations de maître au centre d'une exploitation agricole. Ce manoir est construit dans ce contexte, entre le XVIIe siècle et le XIXe siècle. \r\nROZIERES, manoir est situé sur un coteau, au sud de Sérignac. Si les documents manquent pour connaître son histoire, l'étude de son architecture laisse supposer qu'il a peut-être servi de maison forte durant le Moyen Âge. En témoignent l'épaisseur de ses murs et sa tour massive. Ce type d'édifice se rencontre partout en Agenais et plus largement dans le Sud-Ouest : en ces temps troublés, les propriétaires s'enferment dans des maisons pourvues d'un système défensif plus ou moins développé. Ces maisons sont plus tard transformées en châteaux ou manoirs plus confortables. \r\nLe manoir actuel comprend un logis d'habitation et des dépendances. Le logis d'habitation est une sorte de chartreuse:  il possède de grandes salles dont les plafonds sont soutenus par des solives apparentes, dont les cheminées sont sculptées dans le goût de l'antique et dont les boiseries ornées de délicates fleurs de lys et de coquillages. La demeure est bâtie sur de larges souterrains. Il est ainsi probable qu'ils aient servi de caves pour le stockage des vivres, voire d'abris en cas de troubles. Il existe d'ailleurs, à proximité du château, des grottes, peut\"être d'anciens refuges.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Château de Sérignac, de Rozières et de Menjoulan","gps":"","images":["../../jctruffet.com/image/image_47/47_Serignac_Garonne_1.jpg","../../jctruffet.com/image/image_47/47_Serignac_Garonne_2.jpg","../../jctruffet.com/image/image_47/47_Serignac_Garonne_3.jpg"]},"Consult_chateau_formulaire5c9f":{"id":"Consult_chateau_formulaire5c9f","dept":"47","canton":"Lauzun","commune":"Sérignac-Péboudou","nom":"Serignac_Peboudou","type":"Château","periode":"XVI-XVIII","histoire":"Château autour de SERIGNAC-PEBOUDOU, le château de Gardeleau à Ségalas, , château à Douzains, le château des Tourelles à St-Colomb de Lauzun, le château de Monveil à Ségalas et autre châteaux à Ségalas, le manoir à Lalanduse. Pas d'information histortique pour ses châteaux.   MONVIEL, une motte atteste loccupation du site au Moyen-Âge. Au XIVe siècle, le château appartient aux seigneurs de Madaillan qui possèdent également le château de Cancon situé à proximité. Le site joue un rôle déterminant lors de la guerre de Cent Ans, puis lors des guerres de Religion. Le site castral, dominant la vallée du ruisseau de Tolzac de Verteuil, paraît occupé dès le Moyen-Age par un habitat fortifié  un certain Pons Amanieu de Madaillan est qualifié seigneur de Monviel en 1326 et d'après L. Massip, Amanieu de Madaillan, seigneur de Cancon, reçoit en 1346 la terre et forteresse de Monviel des mains du duc de Normandie. Au XVIe siècle, Monviel est la propriété de Gabriel Nompar de Caumont avant de passer dans les possessions de Bertrand de Vassal de la Tourrette par mariage. Le château est reconstruit durant la première moitié du XVIIe siècle pour Jean-Louis de Vassal de la Tourrette, écuyer, seigneur de Monviel, gouverneur d'Aiguillon.","architecture":"DOUZAINS, corps de logis central  à deux niveaux toit semi-croupe flanqué aux extrémitées de pavillons carrées toit à quatre pans.                                  GARDELEAU propose une maison de vacances de style médiéval du XVe siècle corps de logis carré à trois niveaux flanqué de tours circulaires aux angles, l'édifice est ceinturé de mâchicoulis et créneaux toits pointus  recouverts en tuiles.                                LALANDUSE, corps de logis de plan rectangulaire  à deux niveaux toit à deux pans.                            SEGALAS  de plan en U deux corps de logis un à un niveau avec lucarnes sur un toit brisé , l'autre à trois niveaux toit à la Mansard avec une lucarne par côté  et l'ensemble est accolé d'une tour    carrée recouvert de tuiles.                                                                               TOURELLE à Ste-Colombe, corps de logis rectangulaire à trois niveaux toit en croupe, accolé sur la gauche d'une grosse tour ronde à cinq niveaux, toit presque plat, à l'opposée tour carrée de trois niveaux, toit à quatre pans, l'ensemble est recouvert de tuiles.    MONVIEL, destruction de l'aile gauche et d'un portail monumental à la fin du XIXe siècle. Le château est reconstruit durant la première moitié du XVIIe siècle. Restauration et transformation du château en hôtel de luxe durant le quatrième quart du XXe siècle.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Château  de Sérignac grav 1et 2  de la Tourelle à Ste-Colombe grav 3, de Douzains grav 4, de Gardeleau grav 5 de Monveil grav 6 et 7 de Ségalas grav 8 et de Lalanduse grav 9, à Sérignac-Péboudou.","gps":"","images":["../../jctruffet.com/image/image_47/47_Serignac_Peboudou_1.jpg","../../jctruffet.com/image/image_47/47_Serignac_Peboudou_2.jpg","../../jctruffet.com/image/image_47/47_Serignac_Peboudou_3.jpg","../../jctruffet.com/image/image_47/47_Serignac_Peboudou_4.jpg","../../jctruffet.com/image/image_47/47_Serignac_Peboudou_5.jpg","../../jctruffet.com/image/image_47/47_Serignac_Peboudou_6.jpg","../../jctruffet.com/image/image_47/47_Serignac_Peboudou_7.jpg","../../jctruffet.com/image/image_47/47_Serignac_Peboudou_8.jpg","../../jctruffet.com/image/image_47/47_Serignac_Peboudou_9.jpg"]},"Consult_chateau_formulairee9e8":{"id":"Consult_chateau_formulairee9e8","dept":"47","canton":"Tonneins","commune":"Castelmoron sur Lot","nom":"Solar_Castelmoron","type":"Château","periode":"XIII-XIV","histoire":"SOLAR, la famille de Castelmoron est propriétaire du castrum en 1259. Leur résidence,  le château implanté sur une terrasse dominant le cours du Lot, fut démantelé en 1345 lors de la prise de la place par le seigneur de Montpezat. En 1840, le vieux château est acheté par Félix Solar et entièrement transformé dans le goût mauresque, c'est un patron de presse d'origine portugaise, Félix Solar, qui fit restaurer le château qui porte son nom, inspiré de l'Alhambra de Grenade.  Au XVIe siècle, Castelmoron devient un des foyers calvinistes de l'Agenais.  Natif de Castelmoron et fils d'une famille d'origine portugaise venue s'installer dans la ville, après les révolutions de Saint-Domingue, il transmet par testament l'édifice à sa veuve en 1870. Son architecture nouvelle, comprenant de nombreuses structures en bois (galerie et balcons) prenait son inspiration dans l'Alhambra de Grenade et la mosquée de Cordoue, imitant en cela le casino mauresque d'Arcachon. Le «Château Solar» sera acheté par la municipalité en 1902 et deviendra l'Hôtel de ville.","architecture":"Solar, dans l'état actuel du bâti, il n'est pas possible de restituer les dispositions de la résidence primitive : la partie basse du mur nord, récemment dépiquée, présente une maçonnerie de moellons calcaires équarris et une porte en arc brisé chanfreinée datant de la fin du Moyen-Age; des portes chanfreinées subsistent au 3ème étage. Le bâtiment figure sur le cadastre napoléonien adossé à des habitations et à l'ancien temple alignés sur la Grande-Rue, organisé selon un plan en L encadrant une terrasse au sud. Des travaux de réparations sont effectués sous la conduite de l'architecte Gaston Rapin en 1921 ; de cette époque date la suppression de la plus grande partie des ouvrages de menuiserie de la façade sud. De nouveaux aménagements sont réalisés vers 1980. Les bâtiments actuels sont établis en partie sur les structures de l'ancien édifice, le corps principal de deux étages comporte une tour quadrangulaire dans-oeuvre de trois étages à l'angle sud-est. Une tourelle polygonale au milieu de l'élévation nord est attenante à un avant-corps en rez-de-chaussée. L'aile ouest en retours d'équerre est en rez-de-chaussée. Sur la façade sud, trois niveaux de galerie dans un renfoncement témoignent de l'habillage en menuiserie qui comprenait autrefois des oriels et une galerie haute. Un belvédère domine la toiture à longs pans couverte de tuiles creuses. Les cheminées et des éléments décoratifs, plafonds peints et baies outrepassées, subsistent à l'intérieur.","habitants":"Famille de Castelmoron  Famille de Felix Solar\r\n        \r\n        \"","divers":"Château du Solar à Castelmoron","gps":"","images":["../../jctruffet.com/image/image_47/47_Solar_Castelmoron_1.jpg","../../jctruffet.com/image/image_47/47_Solar_Castelmoron_2.jpg","../../jctruffet.com/image/image_47/47_Solar_Castelmoron_3.jpg","../../jctruffet.com/image/image_47/47_Solar_Castelmoron_4.jpg"]},"Consult_chateau_formulaire5957-2":{"id":"Consult_chateau_formulaire5957-2","dept":"47","canton":"Duras","commune":"Soumensac","nom":"Soumensac","type":"Bastide","periode":"XII-XV","histoire":"SOUMENSAC,  Richard Cur de Lion, le fils aîné dAliénor fait fortifier de nombreuses cités, il fait reconstruire La Réole, bâtir Marmande qui devient sa résidence préférée. Pendant tout le XIVe et jusqu'au milieu du XVe siècle qui voit le départ des anglais après la défaite de ceux-ci à Castillon en 1453, Soumensac se trouve juste sur la frontière entre les anglais et les français. C'est une période de troubles durant laquelle le village change plusieurs fois d'allégeance sans que cela modifie la pauvreté du peuple pour qui les guerres sont des temps de misère : les soldats des deux camps massacrent sans retenu et saccagent les champs. Le village \"appartient\" aux familles de Bouville et de Pellegrue pour qui le château est un refuge militaire pour leurs combats aux alentours. Pour parachever la constitution de Soumensac, au XVIIIe, les Geneste font construire le château actuel.","architecture":"Soumensac, au XIIe siècle, il commençait à être construit en pierre,  la tour ronde Sud-Ouest des remparts . La construction des fortifications de Soumensac dont on peut voir les restes sur les promenades date de cette époque ainsi que l'église romane dont les façades sud forment le coin des remparts de la ville forte à cet endroit, des fenêtres étroites bouchées, aux allures de meurtrières, sont encore visibles de la cour de l'école sans doute postérieures.  il était susceptible de subir des assauts au moyen de catapultes donc sa forme était arrondie. L'entrée du Pont Levis se situait à droite de cette tour quand on la regarde. Le lieu-dit en a gardé la trace  \"le bout du pont\" lit-on sur les vieux cadastres. Les pentes de sortie ont été préservées. Elles conduisent à la poterne le long des murailles et non pas perpendiculairement à la porte pour empêcher l'usage d'un bélier. Une tour ronde à l'angle sud-ouest a été conservée.  Pendant les guerres de religions, de nombreux combats ont lieu autour de Soumensac, notamment en 1569.   Il y a dorénavant \"deux villes closes de murailles et toutes deux contiguës appelées l'une ville haute, l'autre ville basse de Soumensac.  Une dernière trace du château-fort est signalée sous le Premier Empire : il sert de garnison aux troupes venues rétablir l'ordre contre les chauffeurs qui sévissaient dans les campagnes. Depuis, il ne subsiste que les remparts des soubassements dans la partie ouest du village.","habitants":"Famille des Geneste\r\n        \r\n        \"","divers":"Château de Soumensac","gps":"","images":["../../jctruffet.com/image/image_47/47_Soumensac_1.jpg","../../jctruffet.com/image/image_47/47_Soumensac_2.jpg","../../jctruffet.com/image/image_47/47_Soumensac_3.jpg","../../jctruffet.com/image/image_47/47_Soumensac_4.jpg","../../jctruffet.com/image/image_47/47_Soumensac_5.jpg"]},"Consult_chateau_formulaire6891":{"id":"Consult_chateau_formulaire6891","dept":"47","canton":"Villeneuve sur Lot","commune":"Saint-Antoine de Ficalba","nom":"St_Antoine_Ficalba","type":"Vestiges-Tour","periode":"XII-","histoire":"Deux châteaux à St-ANTOINE  de Ficalba celui de Puech-Lambert  et la Tour Péchon.                    PUECH-LAMBER, un édifice du XVIe siècle ne subsistent que quelques vestiges : porte de la cave, appareil du mur nord du logis. Puech Lambert pourrait être identifié avec Pellembert, domaine de la famille noble de Bap au XVIIe siècle. Il est reconstruit en quasi-totalité dans la seconde moitié du XVIIIe siècle, peut-être pour un membre de la famille Ménoire, qui a donné plusieurs consuls à Villeneuve-sur-Lot. Louis Ménoire, colonel d'artillerie, en est propriétaire en 1816. La grange-étable figure sur le plan cadastral de 1811.  \r\nTOUR PECHON, maison forte du XIIe siècle ayant appartenu aux Fourcès, famille aujourd'hui dans le Gers, puis aux Antré de Lusignan. Durant les guerres de Religion, les propriétaires y entretenaient une petite garnison. À ce jour, il ne reste qu'une tour, propriété privée qui ne se visite pas.  La maison forte du Péchon flanquée d'un donjon a été construite au XIIIe siècle jusqu'au XIVe siècle. La maison forte est en ruine.\r\nUn logis a été construit juste devant l'ancien au XVIIIe ou XIXe siècle.\r\nLe donjon a été inscrit au titre des M.H le 20 juin 1950.","architecture":"Manoir e de Puech Lambert l'édifice construit autour d'une cour, dont le logis de cinq travées occupe l'aile nord, les dépendances l'aile ouest, l'aile sud qui comportait une chapelle étant en ruine. Pigeonnier carré isolé couvert en tuiles plates. Escalier sous lambris de recouvrement à voussures.                  Manoir de la tour de Péchon, un grand bâtiment rectangulaire flanqué d'une tour sur l'angle nord-est figure sur le plan cadastral de 1811 : la maison-forte est constituée d'un grand corps de logis en ruine, comprenant une grande salle à l'étage, et d'une tour qui conserve cinq niveaux avec portes en arc brisé et fenêtre trilobée, datable de la fin du XIIIe siècle ou du début du XIVe siècle. Un nouveau logis a été construit devant les ruines de la maison-forte au XVIIIe siècle ou XIXe siècle. La partie arrière du logis est devenue une cour, très endommagée par un incendie dans les années 1960.","habitants":"Famille de Guillaume Vacquié                              Colonel  Louis Ménoire    \r\n        \"","divers":"Château de la Tour-Péchon grav 1 à 4 et de Puech Lambert grav 5 à St-Antoine de Ficalba.","gps":"","images":["../../jctruffet.com/image/image_47/47_St_Antoine_Ficalba_1.jpg","../../jctruffet.com/image/image_47/47_St_Antoine_Ficalba_2.jpg","../../jctruffet.com/image/image_47/47_St_Antoine_Ficalba_3.jpg","../../jctruffet.com/image/image_47/47_St_Antoine_Ficalba_4.jpg","../../jctruffet.com/image/image_47/47_St_Antoine_Ficalba_5.jpg"]},"Consult_chateau_formulaired9d3":{"id":"Consult_chateau_formulaired9d3","dept":"47","canton":"Nérac","commune":"Francescas","nom":"St_Barthelemy_47","type":"Bastide","periode":"XIII","histoire":"Saint-BARTHELEMY, en 1286, un castrum est mentionné, tenu par l'abbé de Condom et le roi de France. Le village s'est formé autour de l'église, de la demeure de l'abbé de Condom et du marché (place du Centre) ; il s'est développé progressivement, avec quelques îlots au nord-est présentant une division en parcelles régulières de la fin du Moyen-Age.\r\nLa part de l'évêque de Condom est vendue aux enchères en 1576, et rachetée en 1582 par le seigneur de Lasserre, Jean Paul d'Esparbes de Lussan,","architecture":"La demeure  de Saint-Barthélémy  se trouvait près de la porte de Larque au sud, succédant à l'ancienne maison épiscopale. L'agglomération était enfermée dans des fortifications, cernées de douves, et ouvrait par quatre portes de Bordeaux, du Puits, de Larque, Neuve ou de Ligardes, une citadelle est mentionnée dans la ville à la fin du XVIe siècle. Deux maisons-fortes sont détruites en 1590 pour la sécurité des habitants. Du milieu du XVIe siècle à 1621, vu la situation de Francescas au cur des luttes religieuses, les murailles sont constamment réparées. La porte de Larque est reconstruite durant le premier quart du XVIIe siècle. Le pavage des rues et l'alignement figurent dans les décisions municipales du milieu du XVIIe siècle. Vers 1660, la porte de Bordeaux tombe en ruine ; dans les années 1770-1780, les fortifications, qui ne servent plus, sont définitivement démolies, et une autre porte est détruite. Un certain nombre de maisons ont été reconstruites dans la seconde moitié du XVIIIe et au début du  XIXe siècle ; l'extension du village s'est faite le long des routes, notamment au nord et à l'est.","habitants":"Jean Paul d'Esparbes de Lussan\r\n        \r\n        \"","divers":"Vestiges du Château dans la bastide","gps":"","images":["../../jctruffet.com/image/image_47/47_St_Barthelemy_47_1.jpg"]},"Consult_chateau_formulaire4ef3":{"id":"Consult_chateau_formulaire4ef3","dept":"47","canton":"Château","commune":"Sainte-Bazeille","nom":"St_Bazeille","type":"Château","periode":"XIX","histoire":"Sainte-Bazeille plusieurs châteaux,  dont Château-Rouge, de Lalanne, les Péricots, La Placière  et Rougeix.                                                                            ST-BAZEILLE, dont le passé est particulièrement riche en événements, porte le nom dune jeune fille, Basilia, qui fut, daprès la légende, martyrisée sur son sol au IVe siècle. Le site de Sainte-Bazeille fut occupé dès la préhistoire. Au début du Moyen-âge, elle forma, avec Lamothe-Landerron, une seigneurie qui tirait ses revenus de ses riches terres et des droits de péage sur le fleuve. La seigneurie de Sainte-Bazeille possession de la maison d'Albret va alors suivre les péripéties de l'histoire de l'Albret. Il est resté dans cette famille jusqu'à la Révolution, démunie de fortifications, elle fut, en 1586, soumise à un rude siège durant lequel Sully figura parmi ses défenseurs. En 1651, Louis XIV donna le duché dAlbret aux ducs de Bouillon qui devinrent les nouveaux seigneurs de Sainte-Bazeille.\r\n CHÂTEAU-ROUGE, dit les Aumonts, belle demeure du XIXe siècle au cur d'un domaine de 3 ha en Aquitaine, chambres d'hôtes de Sandrine Ginhac.  PLACIERE construit au XIXe siècle par la famille Douet. Il est aujourdhui la propriété de la commune et abrite la bibliothèque municipale.\r\nLALANNE, résidence du gouverneur sous Louis XIV puis du général de Bentzmann, héros des campagnes de Crimée et dAfrique, actuellement propriété privée.","architecture":"Château-Rouge, rénové en 2015, de plan rectangulaire à deux niveaux,  toit en croupe  pavillon saillant sur la gauche à deux niveaux, dépendance en retour d'équerre en façade fermant la cour d'honneur sur le côté gauche se terminant par une tour carrée à toit à quatre pans, le château offre un cadre à la fois moderne, confortable et authentique à vos rendez-vous professionnels.                                                 Placière de plan rectangulaire de trois niveaux  ceinture de mâchicoulis même sur les deux pavillons d'entrées saillants raccordés par des balcons, lucarnes sur  toit recouvert d'ardoises.                                        Lalanne manoir dont le corps de logis à deux niveaux sur soubassement, accolé d'une tourelle carrée à toit à quatre pans très pointu.                                              Péricots de plan rectangulaire à deux niveaux flanqué en façade de deux tours carrées en façade à toits à quatre pans pointus.","habitants":"Ducs de Bouillon \r\n        \r\n        \"","divers":"A St-Bazeille le château de Lallane grav 1 à 3 de la Placiere 4, Château-Rouge de  5 à 7 et de Péricot 8.","gps":"","images":["../../jctruffet.com/image/image_47/47_St_Bazeille_1.jpg","../../jctruffet.com/image/image_47/47_St_Bazeille_2.jpg","../../jctruffet.com/image/image_47/47_St_Bazeille_3.jpg","../../jctruffet.com/image/image_47/47_St_Bazeille_4.jpg","../../jctruffet.com/image/image_47/47_St_Bazeille_5.jpg","../../jctruffet.com/image/image_47/47_St_Bazeille_6.jpg","../../jctruffet.com/image/image_47/47_St_Bazeille_7.jpg","../../jctruffet.com/image/image_47/47_St_Bazeille_8.jpg","../../jctruffet.com/image/image_47/47_St_Bazeille_9.jpg"]},"Consult_chateau_formulaire9f4c":{"id":"Consult_chateau_formulaire9f4c","dept":"47","canton":"Layrac","commune":"Sauveterre St-Denis","nom":"St_Denis","type":"Chartreuse","periode":"XIX","histoire":"St-DENIS, le 7 février 1762, dame Marie Catherine de Becquey, veuve de Dominique de Bastard, chevalier, seigneur de Saint-Denis-sur-Garonne, des Iles-Chrétiennes et du Bosq, grand-maître des eaux et forêts de France, est inhumée sous son banc dans l'église de Sauveterre-Saint-Denis par le père Soureil, en présence de Bernard Merle et de Martin Pouyaut, laboureurs.\r\nSon fils, Jean de Bastard-Saint-Denis, capitaine dans le régiment de Guyenne infanterie et chevalier de l'Ordre de Saint-Louis, est également inhumé dans l'église le 23 février 1767.  Le château de Sauveterre-Saint-Denis, tel que nous pouvons le voir aujourdhui, est une restauration du XIXe siècle réalisée dans le style du XVIIIe siècle.","architecture":"Le château de Saint-Denis, Le bâtiment se présente sous la forme dun corps de logis central oblong encadré par deux pavillons. Le logis possède un toit à la Mansart, cest à dire à deux pentes brisées ( invention attribuée à François Mansart dans la première moitié du XVIIe siècle), dans sa forme actuelle, est une chartreuse édifiée au cours du XIXe siècle. Elle s'inspire très précisément d'une précédente chartreuse du XVIIIe siècle, ayant dû être abandonnée par ses occupants. Cette dernière se situait en effet à quelques dizaines de mètres du site actuel, mais à un niveau plus bas, ce qui la rendait vulnérable aux crues de la Garonne toute proche. Le bâtiment se présente sous la forme dun corps de logis central à un niveau couvert par une toiture à la Mansart, percée de mansardes, encadré par deux pavillons à deux niveaux. Les communs, qui comprennent une orangerie, sont organisés sur une cour en U ouverte à louest. Ils sont antérieurs à la reconstruction du château. Le parc se développe principalement au sud-ouest du château, mais il comprend une pelouse dégagée au nord et il sétire à louest vers le village sous forme dun triangle. Cest dans cet angle nord-ouest, en bord de route que se trouve lentrée principale.","habitants":"Famille de Dominique de Bastard\r\n        \r\n        \"","divers":"Château de Saint-Denis à Sauveterre  Saint-Denis","gps":"","images":["../../jctruffet.com/image/image_47/47_St_Denis_1.jpg","../../jctruffet.com/image/image_47/47_St_Denis_2.jpg","../../jctruffet.com/image/image_47/47_St_Denis_3.jpg"]},"Consult_chateau_formulaire879c":{"id":"Consult_chateau_formulaire879c","dept":"47","canton":"Damazan","commune":"Saint-Leger","nom":"St_Leger_47","type":"Château","periode":"XIV-XVII","histoire":"Deux châteaux à saint-Léger celui de Mirail, celui de Longuetille  et de Bourbon  qui doit son nom au roi Louis XIIII   qui l'habitat en 1621 et ou il assista au siège de Monheurt où périt son ami le duc de Luynes propriété de monsieur Jacques  Amblard.            MIRAIL,  le château du Mirail (privé), résidence des anciens seigneurs des Du Casse du Mirail, fut construit à la suite des guerres de religion. Il fut modifié au cours des siècles à plusieurs reprises pour offrir un lieu de résidence adapté et confortable.\r\nLONGUETILLE, le château de Longuetille  présente à la fois des caractères d'architecture médiévale. Louis XIII et le duc de Luynes y logèrent pendant le siège de Monheurt, en 1621, et le connétable y mourut le 15 décembre 1621. Propriété de la famille du Puy au XVIIe siècle, il devient propriété de celle des Bridiez de Villemor, en 1629 lors du mariage de Catherine du Puy avec Arnaud Bridiez de Villemor.","architecture":"Mirail Il est indiqué sur la carte de Belleyme dressée en 1762-1763 comme une maison noble. Le plan du cadastre de 1824 montre un ensemble de bâtiments presque identiques à ceux d'aujourd'hui, à l'exception d'un bâtiment fermant la cour au nord. Le logis semble en partie limite XVIII-XIXe siècle, modifié probablement au milieu XIXe comme les parties agricoles ; l'orangerie est limité au XXe siècle.     Longuetille est une maison forte du XVIe siècle,  un peu remaniée dans la 1re moitié du XVIIe siècle,  présente à la fois des caractères d'architecture médiévale, des traces de l'ancien pont-levis, ancien donjon et fossés encore visibles par endroits mais également des caractères de style Renaissance tels que fenêtres et cheminées.\r\n D'importantes transformations architecturales sont faites au XVIIIe : élargissement des ouvertures sur les élévations sud et Est, adjonction des parties agricoles formant cour, construction d'un pigeonnier carré et une glacière plus tardive, au XIXe peut-être.","habitants":"Seigneurs des Du Casse du Mirai                               Famille de Arnaud Bridiez de Villemor\r\n        \r\n        \"","divers":"A Saint-Leger le château du Grenier grav 1, de Lemirail de 2 à 5, de Longuetille de 6 à 8.","gps":"","images":["../../jctruffet.com/image/image_47/47_St_Leger_47_1.jpg","../../jctruffet.com/image/image_47/47_St_Leger_47_2.jpg","../../jctruffet.com/image/image_47/47_St_Leger_47_3.jpg","../../jctruffet.com/image/image_47/47_St_Leger_47_4.jpg","../../jctruffet.com/image/image_47/47_St_Leger_47_5.jpg","../../jctruffet.com/image/image_47/47_St_Leger_47_6.jpg","../../jctruffet.com/image/image_47/47_St_Leger_47_7.jpg","../../jctruffet.com/image/image_47/47_St_Leger_47_8.jpg","../../jctruffet.com/image/image_47/47_St_Leger_47_9.jpg"]},"Consult_chateau_formulaire4106":{"id":"Consult_chateau_formulaire4106","dept":"47","canton":"Penne d","commune":"Saint-Maurin","nom":"St_Maurin","type":"Château abbatial","periode":"XIII-XVII","histoire":"Saint-MAURIN, château abbatial, lhistoire de labbaye de Saint-Maurin est jalonnée de pillages, de destructions et de restaurations, passa dès 1452 entre les mains de seigneurs laïcs, la date exacte de sa fondation nous est inconnue, on sait cependant que les bâtiments sont en ruines au début du XIe siècle, conséquence des luttes féodales. Le château  est construit par Bertrand de Lustrac, son successeur, Jean, fait quant à lui restaurer le monastère et le cloître. Les huguenots pillent labbaye à plusieurs reprises et en 1561 ils la brûlent, son état nécessite alors une restauration qui débute en 1600 mais qui ne devient effective quen 1645 lorsquelle passe à la congrégation de Saint-Maurin. La Révolution transforme labbaye en carrière de pierres en 1796, tandis que son abbé, qui refuse dabandonner ses privilèges, senfuit à Bordeaux où il est reconnu puis guillotiné. La municipalité rachète les vestiges de labbaye, en 1978 pour la sauver. Léglise abbatiale nest conservée quen partie ; la nef est rasée et des maisons de particuliers occupent le transept. Jules Gernez lachète en 1938.","architecture":"Le noyau primitif, donjon et logis des XIVe-XVe siècles, s'agrandit au XVIe siècle avec la construction d'un pavillon-chapelle et d'une enceinte contre laquelle vinrent s'appuyer divers bâtiments érigés ou reconstruits du XVIIe au XIXe siècle. Ce moulin, qui conserve extérieurement son aspect de maison-forte, est un édifice ceint de douves et se compose de divers bâtiments disposés autour d'une cour.  Le croisillon du bras méridional est voûté en berceau, le clocher est, par contre, encore intact. Composée de deux travées, la partie droite du chur est voûtée en berceau brisé basé sur des arcs doubleaux que soutiennent des colonnes dont lun des arcs représente le martyre de saint Maurin.\r\nLe cloître, situé au nord de léglise et à lEst du château abbatial, est en grande partie en ruines. Des deux étages qui ont existé, il ne reste plus que quelques arcades au premier étages. Quelques consoles supportant les ogives subsistent encore. Une charpente transversale sur des modillons recouvre le cloître supérieur non voûté. Le réfectoire qui existe encore, est voûté de croisées dogives décorées des armoiries des Lustrac. Il ne reste par ailleurs que des traces de la chapelle et des jardins. Le donjon du château comporte un escalier à vis, une cheminée et des caves voûtées qui hébergent le musée \"Mémoire dun village\". Eléments protégés MH: les restes de l'abbaye et Les 4 travées du cloître : classement par arrêté du 9 septembre 1908.","habitants":"Bertrand de Lustrac\r\n        \r\n        \"","divers":"Château et vestiges à Saint-Maurin","gps":"","images":["../../jctruffet.com/image/image_47/47_St_Maurin_1.jpg","../../jctruffet.com/image/image_47/47_St_Maurin_2.jpg","../../jctruffet.com/image/image_47/47_St_Maurin_3.jpg","../../jctruffet.com/image/image_47/47_St_Maurin_4.jpg","../../jctruffet.com/image/image_47/47_St_Maurin_5.jpg","../../jctruffet.com/image/image_47/47_St_Maurin_6.jpg","../../jctruffet.com/image/image_47/47_St_Maurin_7.jpg","../../jctruffet.com/image/image_47/47_St_Maurin_8.jpg"]},"Consult_chateau_formulaire3682":{"id":"Consult_chateau_formulaire3682","dept":"47","canton":"Sainte-Livrade sur Lot","commune":"Saint-Pastour","nom":"St_Pastour","type":"Vestiges","periode":"XIII","histoire":"A saint-Pastour le château  de St-Pastour le Manoir de Cabirol (voir article) et le château de Fabry  et St-Paul le vieux à Beaugeas à 5 km au nord.                             ST-PASTOUR, la bastide de Saint-Pastour a été fondée par Alphonse de Poitiers en 1259. Le roi d'Angleterre Édouard Ier, duc d'Aquitaine devient suzerain de l'Agenais par le traité d'Amiens, en 1279. La défense de Saint-Pastour, à la limite du XIIIe siècle-XIVe siècle a d'abord été assurée par son site. Le traité de Paris de 1229 a prévu le mariage de l'héritière du comté de Toulouse, Jeanne de Toulouse avec un fils du roi de France, Alphonse de Poitiers. La bastide de Saint-Pastour a été fondé en 1259 par Alphonse de Poitiers. Le 7 avril 1289, le roi Édouard Ier accorde une charte de coutumes à la ville de Saint-Pastour. L'insécurité et les combats entre les troupes du roi de France et du roi d'Angleterre va entraîner la construction d'une enceinte pour protéger la bastide entre la fin du XIIIe siècle et le début du XIVe siècle. Un château a dû être construit pour protéger l'angle nord-ouest de l'enceinte. Il subsiste une porte de cette enceinte. La ville est encore favorable au roi d'Angleterre en 1315, mais elle lutte contre ces derniers à partir des années 1350. Le château de Saint-Pastour est implanté à l'angle nord-ouest de l'enceinte. Celle-ci a été construite après 1350. Les murs du château ou maison forte qui se trouvent contre l'enceinte sont contemporains de sa construction.  Les percements qu'on peut voir sur la rue du château ne sont pas antérieurs à la fin du XVe siècle. Les éléments défensifs, comme les canonnières, ont dû être réalisés pendant les guerres de religion.\r\nFABRY et St-PAUL le VIEUX  à Beaugeas  5 km au nord pas d'information historique.","architecture":"St-PASTOUR, le château appartient à une grande famille sous laquelle est placée la seigneurie, la demeure étant une sorte de châtelet situé à Saint Pastour. Si certaines parties de lélévation sont datées du Moyen-Âge, dautres comme les percements, datent au XVe siècle, il sagit daménagements peut-être contemporains de linvasion de lAquitaine par les Anglais en 1412. Les guerres de Religion sont la cause de linstallation, entre autres, de canonnières. Cet élément de larchitecture défensive est caractéristique de cette période de trouble.\r\nDe plan rectangulaire, la maison est dotée de plusieurs tours. Ces agencements sont conçus afin de pouvoir parer aux attaques. Aujourdhui, l'édifice présente un mauvais état de conservation, le second étage ayant été supprimé vestiges  l'édifice est ruiné depuis longtemps. Le deuxième étage a disparu à une date inconnue. Le château a été inscrit au titre des M.H en 30 mai 1990                                                                  A quelques kilomètres au nord à Beaugas le château de  ST-PAUL le VIEUX, pas d'information historique  de plan quadrilatère flanqué de grosses tours carrées et rondes sur l'avant.                                                FABRY deux corps de logis de plan en T un à deux niveaux l'autre à un niveau et attiques   accolé par une tour-donjon carré à deux niveaux à toit à quatre pans très pointu.","habitants":"Alphonse de Poitiers\r\n        \r\n        \"","divers":"Vestiges et remparts de St-Pastour, château de Fabry grav 7, St-Paul le Vieux grav 8.","gps":"","images":["../../jctruffet.com/image/image_47/47_St_Pastour_1.jpg","../../jctruffet.com/image/image_47/47_St_Pastour_2.jpg","../../jctruffet.com/image/image_47/47_St_Pastour_3.jpg","../../jctruffet.com/image/image_47/47_St_Pastour_4.jpg","../../jctruffet.com/image/image_47/47_St_Pastour_5.jpg","../../jctruffet.com/image/image_47/47_St_Pastour_6.jpg","../../jctruffet.com/image/image_47/47_St_Pastour_7.jpg","../../jctruffet.com/image/image_47/47_St_Pastour_8.jpg"]},"Consult_chateau_formulaire5f14":{"id":"Consult_chateau_formulaire5f14","dept":"47","canton":"Mézin","commune":"Sos-Meylan","nom":"St_Pau","type":"Château","periode":"XV","histoire":"Dans la commune de Sos le château de Gueyze      Saint-PAU,  dépendait de la seigneurie de Sos, que Guy du Faur de Pibrac cède à Henri III de Navarre en 1579. En 1586, le château passe à André de Saint-Estèphe, puis à la famille de Caubios, pour Renaud de Frère, époux d'Hélène de Caubios qui a hérité du château en 1625; la tour sud-ouest et les pigeonniers encadrant le portail à l'est paraissent contemporains ; des colonnes prises dans la maçonnerie des dépendances du XIXe siècle proviennent peut-être d'une galerie. En 1747,Jean Christosome Boileau. Claude de Mestivier et de Cap grand-Mothes acquéreur du domaine, y développe la culture de la vigne. Le château est acheté par Cap grand-Mothes en 1868, qui le transforme en une école d'agriculture. L'école y demeure jusqu'en 1927.","architecture":"La construction date du XVe siècle, il a été remanié au XVIe siècle jusquau XVIIe siècle, le château de Saint-Pau est construit sur un socle rocheux au milieu dun domaine forestier. Il a avant tout un rôle défensif, doù son positionnement stratégique.  Le logis, en équerre, semble dater de la fin du XVIe siècle : il présente des traces de croisées, de bretèches, un escalier rampe sur rampe et une cheminée à corniches moulurées. L'aile ouest est agrandie au sud vers 1634, date sur les cheminées. Le château de Saint-Pau est fermé au Public.","habitants":"Guy du Faur de Pibrac\r\n        \r\n        \"","divers":"Château de Saint-Pau et de Gueyze à Sos grav 8","gps":"","images":["../../jctruffet.com/image/image_47/47_St_Pau_1.jpg","../../jctruffet.com/image/image_47/47_St_Pau_2.jpg","../../jctruffet.com/image/image_47/47_St_Pau_3.jpg","../../jctruffet.com/image/image_47/47_St_Pau_4.jpg","../../jctruffet.com/image/image_47/47_St_Pau_5.jpg","../../jctruffet.com/image/image_47/47_St_Pau_6.jpg","../../jctruffet.com/image/image_47/47_St_Pau_7.jpg","../../jctruffet.com/image/image_47/47_St_Pau_8.jpg"]},"Consult_chateau_formulaire0108":{"id":"Consult_chateau_formulaire0108","dept":"47","canton":"Layrac","commune":"Saint-Nicolas de  la Balerme","nom":"St_Philip","type":"Château","periode":"XV","histoire":"Saint-PHILIP, il appartenait à la famille de Dampierre,on en trouve une trace dans les archives nationales en ces termes: \"Aymar de Dampierre fut mêlé à l'expédition de Marie-Caroline, duchesse de Berry. Débarquée en Provence en avril 1832 et déçue par l'échec de sa tentative de soulèvement des villes du midi de la France, la duchesse voulut, en dépit de tous les avis contraires, gagner la Vendée. Les Dampierre se partagent entre leurs châteaux de Plassac (Charente-Maritime), du Vignau-en-Marsan (Landes) et du Saumon-en-Gascogne (Lot-et-Garonne), Marie-Caroline de Berry se rendit d'abord au Saumon, mais constatant l'absence des Dampierre, elle se rendit au château de Saint-Philip, à Saint-Nicolas de La Balerme (Lot-et-Garonne), chez Guy de Dampierre (1773-1862), cousin du marquis Aymar, afin de savoir où joindre ce dernier\". Acheté à la famille de Dampierre dans les années 1960 par Rose et Pierre Gardeil après leur succès à l'Auberge des Bouviers à Lectoure, il devient alors un château hôtel restaurant réputé, célèbre notamment pour son canard à l'orange et son canard aux pêches. Fermé durant quelques années, il fut racheté en 2006 et rouvert en mars 2008 par Nadine Laroque.","architecture":"Le château Saint-Philip, du XVe siècle, construit sur le modèle des castels gascons, avec corps de logis et pavillon coiffé dun toit pointu, fut modernisé et agrandi avant la première guerre mondiale. Le toit du pavillon fut remplacé par une terrasse et un second pavillon, également avec terrasse, pour ajouté plus de symétrie à un ensemble qui a fort belle allure, et qui occupe une situation privilégiée et non inondable sur la rive gauche de la Garonne.","habitants":"Famille de Dampierre\r\n        \r\n        \"","divers":"Château Ssaint-Philip à St-Nicolas de Balerme","gps":"","images":["../../jctruffet.com/image/image_47/47_St_Philip_1.jpg","../../jctruffet.com/image/image_47/47_St_Philip_2.jpg","../../jctruffet.com/image/image_47/47_St_Philip_3.jpg"]},"Consult_chateau_formulairecb0e":{"id":"Consult_chateau_formulairecb0e","dept":"47","canton":"Miramont de Guyenne","commune":"Saint-Quentin du Dropt","nom":"St_Quentin_Dropt","type":"château","periode":"XV-XVII","histoire":"ST-QUENTIN, le bourg et les terres de Saint-Quentin-du-Dropt appartenaient dans le passé aux grandes familles seigneuriales de la région, un premier château existait déjà au XIVe siècle dont il ne reste que l'importante tour circulaire. L'actuel château a été construit en grande partie aux  XVIIe et XVIIIe siècles. L'église de Saint-Quentin date du  XVe siècle et se située au cur du cimetière local. La rivière le Dropt, marque la limite sud de la commune.\r\nLe château de Saint-Quentin, situé à 500 mètres du bourg de Saint-Quentin-du-Dropt, date de la Renaissance. Il possède un somptueux décor intérieur datant du XVIIIe siècle. Le château de Saint-Quentin est construit au XVIe siècle par les Bigot, puissante famille seigneuriale possédant en plus de Saint-Quentin, La Motte, Castillonnès et Valette.                   A quatre kilomètres à l'Est à Cavarc le château Bardout  dont je n'ai pas d'informations.","architecture":"Le château de Saint-Quentin est une ancienne place forte, remaniée aux XVIIe et XVIIIe siècles. Lensemble parfaitement conservé et entretenu est dune belle harmonie. Tout autour se développe un parc magnifique, riche darbres centenaires aux essences variées. Un peu à lécart une ferme, dun style très typique apporte à ce paysage une touche paysanne ». (extrait du rapport préalable à la protection du site-août 1982).                                   Bardout de plan en  U  à trois niveaux  flanqué du côté gauche d'un donjon à mâchicoulis toit à quatre pans pointu, la bâtisse est recouverte de tuiles avec  lucarnes, deux retours en équerre sur la partie cour à un niveau à toit brisés.","habitants":"Famille des Bigot\r\n        \r\n        \"","divers":"Château des Saint-Quentin du Dropt","gps":"","images":["../../jctruffet.com/image/image_47/47_St_Quentin_Dropt_1.jpg","../../jctruffet.com/image/image_47/47_St_Quentin_Dropt_2.jpg","../../jctruffet.com/image/image_47/47_St_Quentin_Dropt_3.jpg","../../jctruffet.com/image/image_47/47_St_Quentin_Dropt_4.jpg","../../jctruffet.com/image/image_47/47_St_Quentin_Dropt_5.jpg","../../jctruffet.com/image/image_47/47_St_Quentin_Dropt_6.jpg"]},"Consult_chateau_formulaire5e9b-2":{"id":"Consult_chateau_formulaire5e9b-2","dept":"47","canton":"Tonneins","commune":"Lafitte sur Lot","nom":"St_Sauveur_Lafitte","type":"Châterau","periode":"XV","histoire":"ST-SAUVEUR   Un petit logis de style Renaissance, des fresques décoraient l'intérieur d'une pièce du premier étage et la hotte de la cheminée  d'inspiration italienne. Par leur style, elles ont dû être peintes après 1506-1510 car la Sainte-Anne peinte dans l'adoration des mages rappelle le tableau la Vierge, l'enfant Jésus et Sainte-Anne de Léonard de Vinci. Les fresques ont dû être badigeonnées quand le village est devenu protestant, vers 1560. Le château devait être occupé par une famille protestante. Le château n'est cité qu'au XIIe siècle quand il sert de cantonnement pour les dragons envoyés contre les protestants. En 1955, mise au jour de peintures murales.\r\nLe logis Renaissance avec sa tour d'escalier a été inscrit au titre des M.H le 13 janvier 2000.","architecture":"St-Sauveur, au centre du village de Lafitte sur Lot le château, petit logis Renaissance de plan rectangulaire, l'étage est desservi par une tour d'escalier polygonale à demi hors-uvre a été construit dans la première moitié du XVIe siècle. Corps de bâtiment juxtaposés. Un autre corps de logis a été ajouté dans le prolongement principal de plan rectangulaire du XVIe siècle comprend un étage carré et un étage de comble couvert par des tuiles plates. Une fenêtre à traverses et meneaux (mouluration prismatique) s'ouvre au premier étage. Un pigeonnier lui est adossé au sud avec un toit en pavillon recouvert de tuiles plates. Ce logis de plan rectangulaire comprend une élévation ordonnancée de trois travées. En 1955, mise au jour de peintures murales d'inspiration italianisante .","habitants":"Seigneur local\r\n        \r\n        \"","divers":"Château de Saint-Sauveur Lafitte","gps":"","images":["../../jctruffet.com/image/image_47/47_St_Sauveur_Lafitte_1.jpg","../../jctruffet.com/image/image_47/47_St_Sauveur_Lafitte_2.jpg"]},"Consult_chateau_formulaire1eaf":{"id":"Consult_chateau_formulaire1eaf","dept":"47","canton":"Villeneuve sur Lot","commune":"La Sauvetat sur Léde","nom":"St_Sulpice_Sauvetat","type":"Château","periode":"XVII","histoire":"St-SULPICE, est un château construit au XVIIe siècle,  au XIXe siècle  le  château a appartenu à la famille de La Borie du XVIIe siècle au XXe siècle.  construit au XVIIe siècle et dont le portail porte la date de 1621. Jean-François de Laborie ou La Borie (1760-1843), seigneur de Saint-Sulpice, marié en 1786 à Marie-Julie Josèphe de Raffin, fille du marquis d'Hauterive, baron de Laroque-Timbaut, a été maire de Villeneuve-sur-Lot entre 1800 et 1813.  La famille de La Borie a été très attachée au Premier Empire. Dans le salon de musique, Le décor en stuc célèbre le Premier Empire avec un aigle impérial, un masque de Napoléon et une allusion à l'Aiglon. Le château de Saint-Sulpice vous accueille et vous propose ses chambres d'hôtes. Le château a été inscrit  au M.H le 4 octobre 2007","architecture":"Le château est composé de corps de logis disposés en T. La partie la plus ancienne est le corps de logis orienté nord-sud, avec sa cour intérieure, et une tour de défense à son extrémité nord, construit au XVIIe siècle et dont le portail porte la date de 1621. Au début du XIXe siècle, un second corps de logis est construit, perpendiculaire au premier, à son extrémité sud. Il est de style néo-classique avec un avant-corps à fronton. Le rez-de-chaussée a un décor stuqué de dessus de porte évoquant la vie à la campagne avec ses travaux et ses loisirs.","habitants":"Famille La Borie\r\n        \r\n        \"","divers":"Château de Saint-Sulpice la Sauvetat","gps":"","images":["../../jctruffet.com/image/image_47/47_St_Sulpice_Sauvetat_1.jpg","../../jctruffet.com/image/image_47/47_St_Sulpice_Sauvetat_2.jpg","../../jctruffet.com/image/image_47/47_St_Sulpice_Sauvetat_3.jpg"]},"Consult_chateau_formulaire0f34":{"id":"Consult_chateau_formulaire0f34","dept":"47","canton":"Pennes d","commune":"Saint-Sylvestre sur Lot","nom":"St_Sylvestre_47","type":"Château","periode":"XV-XVII","histoire":"Deux château à saint-Sylvestre ce lui de st- Sylvestre et de Cadres, de Lalande (voir article) et de Rigoulières.                                                                  CADRES,  Antoine de Rayssac se fait édifier un habitat seigneurial dans la paroisse de Saint-Aignan, auquel il donne le nom de Cadrès. Au début du XVIe siècle, les Reyssac sont bien implantés dans les environs de Saint-Sylvestre : ils disposent en particulier de droits sur le passage du Lot, que François de Reyssac vend en 1515. L'ancien manoir, détenu au moins depuis la première moitié du XVIIe siècle et jusqu'à la fin de l'Ancien Régime par la famille d'Hébrard, n'est connu que par le plan cadastral de 1830 .  Le manoir est totalement reconstruit vers 1885 pour le villeneuvois Léopold Mouysset, dont le monogramme figure sur un écu et sur les épis de faîtages ; le maître d'oeuvre de la reconstruction est inconnu, mais il pourrait s'agir de Lucien Dubarry de Lassalle, auteur de plusieurs réalisations néogothiques en Agenais. Un accès plus aisé est ménagé et une nouvelle dépendance est édifiée en remplacement des anciennes au début du  XXe siècle, alors que le parc est planté d'essences variées. Le domaine est acquis dans l'Entre-deux-Guerres par Robert, comte de la Myre-Mory, député du Lot-et-Garonne, tué au combat en 1940                                                             RIGOULIERES, le site est établi à la fin du XIIIe siècle, détenue par la famille de Paga.  Antejeac de Lustrac en 1372  payé pour \"emparer et fortifier\" le lieu de Rigoulières, construits entre le XVe siècle et le XVIIe siècle pour la famille Delard de Rigoulières. Un escalier à vis a pris place dans la tour, peut-être au XVe siècle ; François Delard reçoit l'autorisation d'avoir une chapelle privée durant la deuxième moitié du XVIIe siècle. Une peinture monumentale sur une cheminée commémore l'échec des troupes du comte d'Harcourt, venues assiéger   Villeneuve-sur-Lot en 1652.","architecture":"CADRES   La butte occupée dès avant la 2e moitié du XVe siècle, époque où Antoine de Rayssac se fait édifier un habitat seigneurial dans la paroisse de Saint-Aignan, auquel il donne le nom de Cadrès, identique à celui de son repaire natal en Rouergue. Au début du XVIe siècle, les Reyssac sont bien implantés dans les environs de Saint-Sylvestre : ils disposent en particulier de droits sur le passage du Lot, que François de Reyssac vend en 1515. L'ancien manoir, détenu au moins depuis la première moitié du XVIIe siècle et jusqu'à la fin de l'Ancien Régime par la famille d'Hébrard, n'est connu que par le plan cadastral de 1830 : il se compose d'un ensemble de bâtiments attenants couronnant le sommet du \"pech\" dont il épouse les contours, abritant une cour à l'est. Un bâtiment d'exploitation figure à l'ouest, ainsi qu'un pigeonnier isolé sur piles à l'est, dépendances encore visibles sur une carte postale de la fin du XIXe ou du début du XXe siècle                                            RIGOULIERES construits entre le XVe siècle et le XVIIe siècle. Un escalier à vis a pris place dans la tour, peut-être au XVe siècle. Rigoulières, la partie la plus ancienne du manoir est une tour quadrangulaire en brique, datable du XIVe siècle par sa baie géminée ornée de figures animales. La tour constitue comme d'autres sites castraux situés sur le bord du Lot, un enjeu stratégique lors des troubles liés à la guerre de Cent Ans :  La maison-forte a été par la suite sertie dans un ensemble de corps de logis et de dépendances.","habitants":"Cadres Antoine de Rayssac                                            Famille de Paga\r\n        \r\n        \r\n        \"","divers":"Château de Cadrés grav de 1 à 5 et de la Rigoulière de 6 à 9 à Saint-Sylvestre","gps":"","images":["../../jctruffet.com/image/image_47/47_St_Sylvestre_47_1.jpg","../../jctruffet.com/image/image_47/47_St_Sylvestre_47_2.jpg","../../jctruffet.com/image/image_47/47_St_Sylvestre_47_3.jpg","../../jctruffet.com/image/image_47/47_St_Sylvestre_47_4.jpg","../../jctruffet.com/image/image_47/47_St_Sylvestre_47_5.jpg","../../jctruffet.com/image/image_47/47_St_Sylvestre_47_6.jpg","../../jctruffet.com/image/image_47/47_St_Sylvestre_47_7.jpg","../../jctruffet.com/image/image_47/47_St_Sylvestre_47_8.jpg","../../jctruffet.com/image/image_47/47_St_Sylvestre_47_9.jpg"]},"Consult_chateau_formulaire386c":{"id":"Consult_chateau_formulaire386c","dept":"47","canton":"Fumel","commune":"Saint-Vite","nom":"St_Vite","type":"Rochers","periode":"XVI","histoire":"Château de Lapoujade du XVIe siècle classé M.H en 2007. Demeure de notable ou château les Rochers, Monbeau  à st-Georges.                                       ROCHERS,Le domaine de Bonhomme, lieu-dit figurant sur la carte de Belleyme et sur le cadastre napoléonien, est acquit en 1882 par Edmond Tardieu, fils d'un riche négociant du Havre. L'ancienne maison est démolie en 1884, remplacée par un castel néogothique édifié en 1886, appelé \"château des Rochers\";   acquis par la commune de Saint-Vite en 1981. Il a été rénové entre 1990 et 1997. Les emprunts contractés pour l'achat et la réhabilitation du château viennent de s'éteindre. En 30 ans, 4 maires et 70 conseillers municipaux « se sont inquiétés de son devenir sans aboutir à une utilisation pérenne ». On se souvient des péripéties de 2002 et des complications pour récupérer un château devenu entre-temps hôtel-restaurant. D'autres pistes avaient été suivies : création d'un musée, d'une maison de retraite ou encore de locaux pour la CCFL. Plus près de nous, cet été, le dynamisme et l'implication des bénévoles de « Carrefour d'animations » ont permis d'ouvrir le château au public pendant trois mois. \r\nLe fustier  château pigeonnier                              LAPOUJADE, en 1372, à la demande du duc d'Anjou, le château a été mis en défense par Raymond de la Pugeade, dans la seconde moitié du XVe siècle un escalier à vis est construit dans la cour. Au XVIe siècle  la maison forte appartient alors à la famille La Goutte, seigneurs de La Poujade dont deux membres furent secrétaires à la cour. Elle est agrandie pendant la première moitié du  XVIe siècle. Une galerie de style Renaissance est construite sur la cour,  pour Jean de La Goutte, secrétaire du Roi. Le château a été inscrit au titre des M.H le 19 juin 2007.                                  MONBEAU est construit au XVe siècle. Il sagit sans doute dun repaire établi sur un pech qui domine la vallée de Lagrane et au-delà la vallée du Lot. Au début du XVIe siècle, lensemble appartient à la famille de Lavayssières.","architecture":"château des Rochers; a été construit en 1886, La métairie est reconstruite ou remaniée en 1889, d'après la date gravée sur une arcade charretière. La demeure est implantée sur une terrasse calcaire dominant le cours du Lot. L'édifice est conçu comme un pastiche de l'architecture seigneuriale de la fin du Moyen-Age, avec ses 2 corps en L à toits pentus avec lucarnes articulés sur une tour circulaire élancée. Les murs sont enduits et les toitures en ardoise. L'étage est desservi par un escalier intérieur tournant à retour avec jour, dont la rampe de bois est richement sculptée. Maison de maître du XIXe siècle, plan en T, tour circulaire, porte décorée, fenêtres avec larmiers, escalier avec rampe sculptée, vitrail, parc devenu jardin public. Lentrée se fait par une tour dont la porte est décorée dun galbe fleuronné. A lintérieur, un splendide escalier sculpté ainsi que des vitraux signés des peintres verriers Etienne et Mouilleron.\r\nLe fustier corps de logis rectangulaire à trois niveaux entre deux tours carrées dit pigeonnier accolé à des dépendances.\r\nLapoujade,  petite maison-forte médiévale qui contrôlait un gué et un moulin, l'édifice est construit autour d'une cour intérieure accessible par le corps de passage d'une ancienne tour porte, le corps  du logis primitif a conservé au premier étage, une salle avec sa cheminée gothique et une baie géminée. Les faveurs royales leur permirent de mettre l'édifice au goût du jour avec notamment dans la cour intérieure, une galerie ouverte  reposant sur un portique.         Monbeau le château  est constitué dune tour défensive. Celle-ci est, au cours des siècles, augmentée de divers corps de logis et dépendances permettant notamment à la population de vivre au contact des seigneurs.","habitants":"Edmond Tardieu\r\n        \r\n        \"","divers":"Château de Fustier grav 1, de Lapoujade  2,  de Monbeau 3 et de St-Vite de 4 à 7.","gps":"","images":["../../jctruffet.com/image/image_47/47_St_Vite_1.jpg","../../jctruffet.com/image/image_47/47_St_Vite_2.jpg","../../jctruffet.com/image/image_47/47_St_Vite_3.jpg","../../jctruffet.com/image/image_47/47_St_Vite_4.jpg","../../jctruffet.com/image/image_47/47_St_Vite_5.jpg","../../jctruffet.com/image/image_47/47_St_Vite_6.jpg","../../jctruffet.com/image/image_47/47_St_Vite_7.jpg"]},"Consult_chateau_formulairefc4b":{"id":"Consult_chateau_formulairefc4b","dept":"47","canton":"Sainte- Livrade sur Lot","commune":"Sainte- Livrade sur Lot","nom":"Ste_Livrade_47","type":"Forteresse-Tour","periode":"XII","histoire":"STE-LIVRADE, la Tour du Roy,Selon les sources, la tour serait le reste d'un château et  une tour de l'enceinte de la ville. La Tour du Roy du XIIe siècle : survivance d'une enceinte édifiée par Richard Cur de Lion.  Le baron de Madaillan tenait la ville de Sainte-Livrade en paréage avec le roi. Les historiens y ont vu plus  une maison forte construite par un seigneur des environs à proximité des remparts de la ville à la fin du XIIIe siècle ou au début du XIVe siècle pour participer à sa défense. Le site de Madaillan étant passé à la famille du Fossat d'Aiguillon, Sainte-Livrade a fait partie de leurs biens, puis de leurs héritiers. A la Révolution, la tour est devenue la propriété de la commune. La Tour du Roy a été inscrite aux M.H. le 16/07/1925. La seigneurie suivant, les époques, était partagée entre plusieurs parçonnie
