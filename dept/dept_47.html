"47","canton":"Lavardac","commune":"Brusch","nom":"Brusch","type":"Bastide","periode":"XIII","histoire":"BRUSCH, la première trace écrite faisant mention de Brughs est un acte de reconnaissance dhommage féodal dArnaud Garsie du Fossat à Raymond comte de Toulouse en 1249, pour le castrum de Bruch. Le bourg est dirigé par une famille seigneuriale dominante, les du Fossat, de qui dépendent plusieurs familles de chevaliers et de paysans. On suppose quaux alentours du premier tiers du XIIIe siècle, la motte castrale devenant insuffisante, les seigneurs bruchois ont opté pour la construction dun castrum.  Le 16 novembre 1286, Raymond Bernard du Fossat, prieur du Mas dAgenais, agissant pour son neuve Gautier du Fossat, fait hommage du castrum de Bruch au roi dAngleterre : duc de Guyenne et comte dAgenais.  Aux alentours de 1300, le bourg passe sous la domination de la famille des seigneurs de Lamothe. Vers 1400, Bertrand de Lamothe, seigneur de Bruch, est attaqué et fait prisonnier par Jean de Ferreol, son cousin et seigneur de Tonneins. Au  XVIe siècle, toute la région est agitée par de violents affrontement entre catholiques et protestants. Les consuls agenais ont fait appel au roi de France, qui leur a envoyé Blaise de Montluc.","architecture":"Dès le XIIIe siècle, Bruch est donc décrit comme un castrum : cest une agglomération fortifiée qui sert de refuge en cas dattaque. Les remparts séparent le monde rural des paysans, des bourgeois. La défense est renforcée par de profonds fossés alimentés par lAuvignon. De plan orthogonal ou à damier,  les rues étroites se croisent à angle droit en formant des petits îlots dhabitations. Le centre du castrum est occupé par la place et la halle, cest un lieu de rencontre et déchanges marchands. Les métiers sont rassemblés par rues et quartier des tisserands, des bouchers. Le rez-de-chaussée est généralement réservé aux boutiques, et le haut aux habitations. On aperçoit encore dans le bourg des maisons caractéristiques du Moyen Âge  à encorbellement (le premier étage dépasse sur la rue, pour gagner de la place) et à pans de bois en torchis. Elles datent principalement du XVe et XVIe siècles.","habitants":"Arnaud Garsie du Fossat \r\n        \r\n        \r\n        \"","divers":"Porte et tour de Brusch","gps":"","images":["../../jctruffet.com/image/image_47/47_Bruch_1.jpg","../../jctruffet.com/image/image_47/47_Bruch_2.jpg","../../jctruffet.com/image/image_47/47_Bruch_3.jpg"]},"Consult_chateau_formulaire3adc":{"id":"Consult_chateau_formulaire3adc","dept":"47","canton":"Lavardac","commune":"Buzet sur Baïse","nom":"Buzet_Baise","type":"Château","periode":"XIV","histoire":"BUZET sur BAISE,  fondé au XIe siècle par Sanche Guillaume, duc de Gascogne, plusieurs familles se succèdent au sein de ce castrum , voire se répartissent le château en coseigneureries. En 1286 le castrum est partagé entre Guillaume Raymond IV de Pins, Aymeric de Savignac et Bernard de Rovignan. En 1286, Guillaume Raymond IV de Pins, sire de Taillebourg près de Marmande, seigneur de Moncrabeau, de Mazeret près de Mézin, de Calignac, reconnaît tenir du roi d'Angleterre, Édouard Ier la moitié, par indivision, du château de Buzet. Bernard d'Albret, seigneur de Sainte-Bazeille, acquiert le château au début du XIVe siècle. En 1445, Charles d'Albret échange la terre de Buzet contre la seigneurie de Sainte-Maure avec Louis de Noaillan, seigneur du Fréchou. Odon ou Odet de Noaillan est seigneur de Buzet en 1482 au moment du mariage de sa fille Marie de Noaillan avec Louis II de Lard, seigneur de Birac, sénéchal de Castres. En 1506, le mariage de Béatrix de Noaillan avec Antoine de Grossoles de Flamarens appartenant à des familles de co-seigneurs de Buzet, la totalité de la seigneurie de Buzet est entrée dans la famille de Grossoles de Flamarens. Le château a ensuite appartenu aux familles de Beaumont par le mariage de Jeanne Madeleine Joséphine de Grossolles avec Christophe, comte de Beaumont, puis, après le mariage, en 1852, de leur fille, Françoise Pauline Marie de Beaumont du Repaire (1833-1915), avec Alfred Louis Marie, comte de Noailles (1825-1895). Marie Olivier Alexis, comte de Noailles, est né en 1853 et mort à Buzet en 1929. Amblard, vicomte de Noailles est né au château en 1856 est mort en 1926. La vente du château par Alexis de Lacroix-Laval est réalisée en 1930 aux consorts Giovanni Kröss. Le château a été acheté en 1981 par le docteur Demangeat et son épouse.","architecture":"Château de Buzet est pillé et incendié par les Anglais en 1293-1294.  reconstruit peu après sur les substructures du XIe siècle, le corps de logis  de plan rectangulaire à quatre niveaux toit à deux pans. La tour octogonale mi-hors oeuvre d'escalier à vis et les deux tours d'angles doivent dater de la première moitié du XVIe siècle. l'édifice possède deux pavillons en retour d'équerre d'un niveau. La décoration du château est modifiée au XVIIe siècle avec la création de décors peints. Nouveaux percements dans la façade nord, modification de l'accès à l'escalier et construction de deux salles encadrant la terrasse sud. Plusieurs plafonds de chambres sont peints d'emblèmes ou symboles cryptés qui ont été tirés de l'ouvrage d'un érudit italien du milieu du XVIe siècle.  Les façades et les toitures du château, avec, au rez-de-chaussée les cheminées , la salle à manger et la salle de compagnie, les façades et toitures des communs, la tour ronde située au milieu du parc, les vestiges architecturaux du parc, ainsi que le portique à colonnes ont été inscrits au titre des M.H en 1989 et les plafonds peints des chambres du premier étage ont été classés au titre des M.H en 1991","habitants":"Famille de Bernard d'Albret\r\n        \r\n        \"","divers":"Château de Buzet sur Baïse","gps":"","images":["../../jctruffet.com/image/image_47/47_Buzet_Baise_1.jpg","../../jctruffet.com/image/image_47/47_Buzet_Baise_2.jpg","../../jctruffet.com/image/image_47/47_Buzet_Baise_3.jpg","../../jctruffet.com/image/image_47/47_Buzet_Baise_4.jpg","../../jctruffet.com/image/image_47/47_Buzet_Baise_5.jpg","../../jctruffet.com/image/image_47/47_Buzet_Baise_6.jpg","../../jctruffet.com/image/image_47/47_Buzet_Baise_7.jpg"]},"Consult_chateau_formulairee484":{"id":"Consult_chateau_formulairee484","dept":"47","canton":"Lavardac","commune":"Buzet sur Baïse","nom":"Buzet_Chateau","type":"Château","periode":"XIX","histoire":"Château viticol à BUZET; de Coustet, Bouchet viticole , Bougigues viticole, Gache  société civile d'exploitation agricole est active depuis 25 ans par James Royer Dupré.\r\nla Tuque viticole, Balesta, Patient, Tauzia,  la Croix,  de Gueyze, du PIIs, de Padère, de Larché, de Mazelières, de Tournemine, de Guillambois, de Caraud, de Ste-Marthe, La Hitte, la Pastorale, de Ribeau, de Prada. ces édifices appelé château son  des bâtiments viticoles  de construction du XIXe siècle, certains sont définis par des articles suivant, pas d'informations  avec la possibilité que certains ont disparus.                                                                     Dans la commune le château de Coustet chambres d'hôtes de la famille Gelix.","architecture":"Plusieurs châteaux à Buzet dont celui de Salles dont la construction classique de la région du Lot et Garonne date du XVII au XXe siècle.","habitants":"Viticulteurs\r\n        \r\n        \"","divers":"Château de Coustet grav 1 et 2, Gache grav 3 et 4","gps":"","images":["../../jctruffet.com/image/image_47/47_Buzet_Chateau_1.jpg","../../jctruffet.com/image/image_47/47_Buzet_Chateau_2.jpg","../../jctruffet.com/image/image_47/47_Buzet_Chateau_3.jpg","../../jctruffet.com/image/image_47/47_Buzet_Chateau_4.jpg"]},"Consult_chateau_formulaire6db9":{"id":"Consult_chateau_formulaire6db9","dept":"47","canton":"Ste-Livrade sur Lot","commune":"Saint-Pastour","nom":"Cabirol","type":"Château","periode":"XIII-XVI","histoire":"CABIROL, on ne connaît pas l'origine du nom de Cabirol donné au manoir. La bastide a été fondée entre 1250 et 1259 par Alphonse de Poitiers.  Le manoir Cabirol est le résultat de la réunion de deux maisons au  XVIe siècle par un noble de la région. Le manoir comprend des vestiges d'une construction de la seconde moitié du XIIIe siècle.  L'histoire et la destination ancienne de cet édifice sont inconnues, mais il s'agit probablement d'un hôtel aménagé pour un noble local au XVIe siècle, Le manoir a été inscrit au titre des M.H le 30 mai 1990","architecture":"Au cur de la petite bastide étirée douest en est sur son étroite butte, l'élévation sur rue présente au rez-de-chaussée une arcade accotée d'une porte en arc brisé murées, et à l'étage les vestiges d'un bandeau d'appui, qui semblent les vestiges d'une maison de la seconde moitié du XIIIe siècle. Elle a été associée à la maison voisine, du XVe siècle d'après la croisée, et remaniée pour constituer un hôtel patricien au XVIe siècle (porte, croisées). Les percements sur l'élévation latérale droite datent du XVIIIe siècle. D'après des traces d'arrachement, une partie de la demeure, sur l'arrière, a été supprimée à une date indéterminée. Des cheminées et un escalier intérieur en pierre ont été démontés et vendus à des récupérateurs durant la deuxième moitié du XXe siècle. Lentrée donne au nord, directement sur la rue axiale, face à une minuscule halle. Certains éléments de la façade voûte murée, bandeau. permettent destimer une origine du XIIIe siècle. La petite figurine sculptée dans la pierre dangle serait-elle Jeanne dArc dont la rue porte le nom.","habitants":"Alphonse de Poitiers\r\n        \r\n        \"","divers":"Château de Cabirol à Saint-Pastour","gps":"","images":["../../jctruffet.com/image/image_47/47_Cabirol_1.jpg","../../jctruffet.com/image/image_47/47_Cabirol_2.jpg","../../jctruffet.com/image/image_47/47_Cabirol_3.jpg"]},"Consult_chateau_formulaire7fba":{"id":"Consult_chateau_formulaire7fba","dept":"47","canton":"Miramont de Guyenne","commune":"Cahuzac","nom":"Cahuzac_L_G","type":"Château","periode":"XIII","histoire":"CAHUZAC, le château fort de Cahuzac est au sommet dune colline, permettant ainsi dassurer une large surveillance de la vallée du Dropt, il date de la première moitié du XIVe siècle, mais les premières fondations semblent remonter au XIIIe siècle par la famille de Caumont. Au début du XVIe siècle, la seigneurie appartient aux Estissac puis, le château est au ducs de La Rochefoucauld au XVIIe siècle. En 1771, la duchesse de la Rochefoucauld donne la chapelle du château à la paroisse qui devient alors léglise Saint-Martin.  il fut vendu au début du XIXe siècle à la famille de Bony, acquis ensuite par la famille de Carbonnier, puis par la famille de Montbron. Le château est propriété de la famille Delpit depuis 1925.  À travers les siècles, des personnages illustres fréquentèrent le château : Rabelais, Henri de Navarre, le duc de La Rochefoucaud.","architecture":"Le château de Cahuzac fut édifié à partir du XIIIe siècle et fut précédé par une fortification en bois.  A lépoque de sa construction, le château est constitué dune enceinte de soixante-cinq mètres de long. Percée de trente cinq meurtrières, elle est cantonnée de tourelles dangle carrées. La fortification était destinée à protéger la vallée du Dropt, voie dinvasion ; le château se retrouva engagé dans les conflits de la guerre de Cent Ans (dans le camp anglais) puis dans les guerres de religion du côté des protestants ; pendant ces périodes, il abrita près de 150 hommes darmes. Le château se situe à la pointe ouest du village actuel de Cahuzac, sur un éperon rocheux dominant la vallée du Dropt. Le village était situé près du cimetière autour de son église, démolie au  XVIIIe siècle. La plupart des maisons du « vieux Cahuzac » furent édifiées sur les ruines dune partie du château dans les années 1660/1680 (quelques maisons portent au-dessus de la porte dentrée la date de leur construction). De lensemble castral, il reste quelques vestiges, dont celui de deux tours dangle, une partie du logis, un bâtiment du XVIIe siècle situé dans le village et la chapelle, car une partie du village, construite au XVIIe siècle, faisait partie du château.","habitants":"Famille de Caumont\r\n        \r\n        \"","divers":"Château de Cahuzac","gps":"","images":["../../jctruffet.com/image/image_47/47_Cahuzac_L_G_1.jpg","../../jctruffet.com/image/image_47/47_Cahuzac_L_G_2.jpg","../../jctruffet.com/image/image_47/47_Cahuzac_L_G_3.jpg","../../jctruffet.com/image/image_47/47_Cahuzac_L_G_4.jpg"]},"Consult_chateau_formulaire31d9":{"id":"Consult_chateau_formulaire31d9","dept":"47","canton":"Casteljaloux","commune":"Calonges","nom":"Calonges","type":"Château","periode":"XVI","histoire":"CALONGES, depuis 1489, jusqu'en  1510, Jacques Ier de Chaussade s'intitule conseiller au parlement de Bordeaux, seigneur de Calonges en Condomois et de Roquefère en Agenais. Son fils Jacques II de Chaussade est procureur du roi Henri Ier de Navarre. Il a épousé en première noce Anne de Pompadour, puis en seconde noce Quitterie de Castelnau. Il fait son testament en 1543. Jean de Chaussade est son fils né du second mariage. Il est baron de Calonges, Lanau, Roquefère, et autres places, marié à Françoise de Lanne Jacques III de Chaussade, baron de Calonges, qui construisit le château  mais pour Jean-Pierre Babelon, la parenté avec le château de Lasserre, La marquise de Calonges a vendu la terre et le château le 19 août 1758 par la famille de Bougy à Antoine Paul Jacques de Quelen de Stuer (ou Stuart) de Caussade (1702-1776), comte de La Vauguyon, prince de Carency, marquis de Saint-Mégrin. Les seigneuries de Calonges, Tonneins-Dessus et Tonneins-Dessous sont élevées en duché-pairie de La Vauguyon par lettres-patentes du 25 août 1758. Le duc de La Vauguyon était du parti du duc d'Aiguillon. Il est mort à Versailles le 4 février 1772.  Le château est revenu à son fils Paul-François de Quelen de Stuer de Caussade. Il a été ambassadeur de France à La Haye, entre 1776 et 1784, puis à Madrid en 1785. Rappelé au début de la Révolution car nommé ministre des Affaires étrangères, il a préféré rester à Madrid jusqu'en 1795 d'où il partit pour rejoindre Louis XVIII. Il ne revint en France qu'en 1805. Nommé pair de France à la Restauration, il a siégé à la Chambre des pairs au palais du Luxembourg jusqu'en 1822. Il est mort en 1828.","architecture":"Un château cité en 1286, était une forteresse, reconstruit à partir de 1593, devrait plutôt placer le début de la construction dans les années 1590.  Le château comprend deux ailes en équerre. Il est resté inachevé, l'aile de gauche n'a pas été construite. Le château a été construit en brique avec des fenêtres à grandes croisées cernées de bossage de pierre taillés en pointe de diamant. Il a servi comme maître de camp d'un régiment d'infanterie du roi en Hollande, en 1635. Il est mort  vers 1649. L'édifice actuel est un bâtiment rectangulaire flanqué, à chaque extrémité, de deux pavillons carrés. Une aile perpendiculaire s'élève au nord de la façade postérieure, le château est construit sur une terrasse trapézoïdale dont l'accès se fait par deux poternes. A l'extrémité Est des communs se trouve l'ancien temple protestant. Le corps de logis est en briques et les encadrements des baies font alterner brique et pierre blanche. La porte d'entrée, en plein cintre, est encadrée de bossages alternativement nus et vermiculés. Les pièces du premier étage ont conservé des plafonds peints à petits caissons, et des frises de bois sculpté. Le château, en bon état, est saisi comme bien d'émigré en 1792, vendu comme bien national à la Révolution le 27 octobre 1794 pour une mise en vente. Il a finalement été acheté après plusieurs enchérissements  par M. Grenier aîné, de Clairac. Le second étage du corps de logis du château a été partiellement démoli vers 1818 pour le transformer en séchoir à tabac. Le château a été classé au titre des M.H en 1959.","habitants":"Jacques Ier de Chaussade \r\n        \r\n        \"","divers":"Château de Calonges","gps":"","images":["../../jctruffet.com/image/image_47/47_Calonges_1.jpg","../../jctruffet.com/image/image_47/47_Calonges_2.jpg","../../jctruffet.com/image/image_47/47_Calonges_3.jpg","../../jctruffet.com/image/image_47/47_Calonges_4.jpg","../../jctruffet.com/image/image_47/47_Calonges_5.jpg","../../jctruffet.com/image/image_47/47_Calonges_6.jpg"]},"Consult_chateau_formulairecb83":{"id":"Consult_chateau_formulairecb83","dept":"47","canton":"Agen","commune":"Pont du Casse","nom":"Cambes","type":"Château","periode":"XV","histoire":"CAMBES  est une maison dhôtes entièrement rénovée ayant su conserver son caractère et authenticité dantan. Il vous accueille dans son domaine du XVe siècle. Il a été rénové en demeure dhôtes afin de vous offrir, vous qui venez de tout horizon, un havre de repos dans cette petite bourgade de Pont-du-Casse.","architecture":"Le Château de Cambes a été construit vers 1547, avec tour carrée  crénelée à mâchicoulis, accolé à un corps de logis rectangulaire à deux niveaux avec pavillon inférieur en prolongement de chaque côté  à deux niveaux également  et des dépendances en retour d'équerre à l'opposé, à l'entrée flanquées de deux bâtiments rectangulaires dont le côté entrée de forme arrondie relie l'un à l'autre par un porche avec ouverture en dessous.","habitants":"Seigneur local\r\n        \r\n        \"","divers":"Château de Cambes et de Castellery grav 8, à Pont du Casse","gps":"","images":["../../jctruffet.com/image/image_47/47_Cambes_1.jpg","../../jctruffet.com/image/image_47/47_Cambes_2.jpg","../../jctruffet.com/image/image_47/47_Cambes_3.jpg","../../jctruffet.com/image/image_47/47_Cambes_4.jpg","../../jctruffet.com/image/image_47/47_Cambes_5.jpg","../../jctruffet.com/image/image_47/47_Cambes_6.jpg","../../jctruffet.com/image/image_47/47_Cambes_7.jpg"]},"Consult_chateau_formulairea29f":{"id":"Consult_chateau_formulairea29f","dept":"47","canton":"Montfalquin","commune":"Lacaussade","nom":"Canabazes","type":"Château","periode":"XV","histoire":"CANABAZES, le château construit pour la plus grande partie entre le XIVe et XVe siècle est passé par héritage à la famille de Lustrac au XVIe siècle. La famille de Lustrac a donné son nom au château de Lustrac sur le Lot. La branche de Lustrac de Canabazès est issue d'Antoine Ier de Lustrac. La famille de Lustrac, dite « de Canabazès », y a habité pendant quatre siècles.\r\nEn 1791, Henri Ignace de Lustrac de Canabazès (1773-1859) émigre et combat comme noble à cheval dans l'armée des princes. Le château est entré au domaine foncier de l'ordre de la Légion d'honneur en 1804. Il est revenu dans le patrimoine de la famille de Lustrac en 1811. Ses biens sont saisis comme biens d'émigré en 1795. Henri Ignace de Lustrac de Canabazès vend le château à la famille de Bertrand de Crozefon alors émigrée en Allemagne, à laquelle il était apparenté, par l'intermédiaire de la famille de Toucheboeuf de Beaumont.  À son retour, François-Joseph de Bertrand de Crozefon (1770-1858) fait réparer le château. Les propriétaires actuels, descendants des Crozefon.","architecture":"Canabazès, quelques ajouts ont été faits au cours des siècles, notamment au XVIe siècle, des bouches à feu et des ouvertures. La majeure partie, corps de bâtiment principal, charpente et tours, ainsi que l'enceinte fortifiée, a cependant été conservée. En 1813, le château a été modifié, par l'ajout d'une nouvelle façade côté sud devant l'ancienne  pour y loger un vestibule.  Les seigneurs de Canabazès de la famille de Lustrac étaient enterrés dans la chapelle de Saint-Pardoux. Cette chapelle dépendait de Lacaussade, anciennement Saint-Pierre de Galsiade, mais il ne reste que quelques murs de nos jours (ruine), les bases des murs et le chur, sont probablement carolingiens. Les fonts baptismaux sont conservés à Canabazès. Les propriétaires actuels, descendants des Crozefon y font dire des messes régulièrement.","habitants":"Famille de Lustrac\r\n        \r\n        \"","divers":"Château de Canabazès à Lacaussade","gps":"","images":["../../jctruffet.com/image/image_47/47_Canabazes_1.jpg","../../jctruffet.com/image/image_47/47_Canabazes_2.jpg","../../jctruffet.com/image/image_47/47_Canabazes_3.jpg","../../jctruffet.com/image/image_47/47_Canabazes_4.jpg","../../jctruffet.com/image/image_47/47_Canabazes_5.jpg"]},"Consult_chateau_formulairee5f3":{"id":"Consult_chateau_formulairee5f3","dept":"47","canton":"Montfalquin","commune":"Cancon","nom":"Cancon","type":"Vestiges","periode":"XIII","histoire":"CANCON, du XIe siècle. Au début du XIIIe siècle, Cancon appartenait aux Madaillan et son premier seigneur connu serait Pons-Amanieu. Le seigneur de Cancon répondit à l'appel d'Édouard II qui avait demandé à ses vassaux de Guyenne de le seconder durant les Guerres d'indépendance de l'Écosse. Un des descendants de Pons-Amadieu parti en 1345 guerroyer avec le roi de France, apprit que son fief était attaqué par les Anglais. Il apprit aussi un peu plus tard que c'est son épouse, revêtue d'une tenue de chevalier, qui conduisit les quelques hommes qui restaient au château et mit la troupe britannique en fuite. Cancon avait sa Jeanne d'Arc.  Le château et le village subirent les affres de la guerre, accompagnées de famines et de disette (1348). Ainsi, le château et le territoire furent donc entre les mains des Armagnacs. Ce n'est qu'en 1492 que les Gascons furent délogés mais le château subit les conséquences de ces bagarres : il fut  détruit. Il fallut 20 ans (de 1500 à 1520) pour le rebâtir en partie. En 1555.Au  XVIe siècle le protestantisme ne pénétra guère dans les remparts de Cancon. En juin 1652, la peste fit son apparition à Cancon dans une ville surpeuplée. En quelques mois, on enregistra plus de cent décès. La peste éloigna de Cancon les Frondeurs (de la Fronde) ainsi que les troupes royales. Après la Révolution de 1789, on avait élu la première municipalité révolutionnaire avec Antoine Courborieu, premier maire.","architecture":"Le plus ancien est sans doute le château dont il ne reste que la base d'une tour et dautres murs débarrassés de la végétation qui y poussait au début des années 2000. Il est situé au sommet de la colline où est flanquée le village et on y a un point de vue sur les habitations et la campagne environnante. .                                              .","habitants":"Cancon seigneurie des Madaillan \r\n        \r\n        \"","divers":"Vestiges d'une base de tour et bâtisse ancienne.","gps":"","images":["../../jctruffet.com/image/image_47/47_Cancon_1.jpg","../../jctruffet.com/image/image_47/47_Cancon_2.jpg"]},"Consult_chateau_formulaired2bc":{"id":"Consult_chateau_formulaired2bc","dept":"47","canton":"Castillonnès","commune":"Cavarc","nom":"Canterane","type":"Château","periode":"XIX","histoire":"CANTERANE, Charles Guillaume de Béraud, baron de Canterane, de Cavarc, de Capy et d'autres lieux, Chevalier de la légion d'honneur, né en 1772 , décédé en 1836 à lâge de 64 ans, lieutenant  au Royal Roussillon-Cavalerie, marié avec Marie Bonnaventure de Baillet, née en 1775, décédée en 1841 à lâge de 66 ans. Arthur de Bidéran 1831-1890. Françoise Louise Adrienne de Bidéran 1832-1904  mariée le 24 février 1854, avec Philippe Edgar Arnauld de Nanclas, baron de Nanclas 1822-1867. Arthur de Bidéran 1834-1904. Marie Françoise de Bidéran 1836-1904. Charles Marie Albéric de Bidéran, baron de Béraud-Canteranne 1838-1893  marié le 27 mai 1867, Lamagistère, avec Marie Josèphe Jeanne Constance Orliac de la Bastide, baronne de Béraud de Bidéran-Canteranne 1846-1907 dont  Marie Charles Gustave de Bidéran, du Cause 1868-1869. Jean Marie Guillaume de Bidéran, du Cause 1870-1888. François Martial Henri de Bidéran, baron de Béraud de Bidéran-Canteranne 1872-1907 marié le 3 juillet 1899, château de Lastours, Espalais, avec Marguerite de Saint-Exupéry 1880-1956 dont Jacques de Bidéran, marquis de Bidéran 1900; Marie Charles de Bidéran, du Cause 1879.  Marie-Anne de Béraud de Canteranne 1796-1859 mariée en 1821 avec Charles de Lard de Rigoulières 1795-1860 . Marthe Camille Céleste de Béraud 1810-1889 mariée le 19 juillet 1830, au château de Canteranne, Carvac, avec Louis Marie Gustave de Bidéran, chevalier 1799-1879.","architecture":"Canterane quadrangulaire avec en façade un corps de logis rectangulaire à deux niveaux  pavillon saillant plein cintre avec toit surélevé et série de lucarnes sur l'ensemble des corps de logis accolé de pavillons en angles un carré et une tour ronde crénelés avec toit en poivrières sur la gauche de la façade et sur l'arrière donjon (tour carrée).","habitants":"Louis Marie Gustave de Bidéran\r\n        \r\n        \"","divers":"Château de Canteranne à Cavarc","gps":"","images":["../../jctruffet.com/image/image_47/47_Canterane_1.jpg","../../jctruffet.com/image/image_47/47_Canterane_2.jpg","../../jctruffet.com/image/image_47/47_Canterane_3.jpg"]},"Consult_chateau_formulairef509":{"id":"Consult_chateau_formulairef509","dept":"47","canton":"Casteljaloux","commune":"Allons","nom":"Capchicot","type":"Maison forte","periode":"XVI","histoire":"CAPCHICOT, cette maison forte servit de rendez-vous de chasse au roi de Navarre au cours de son séjour à Nérac de 1577 à 1587. elle joua également un rôle d'étape pour Henri de Navarre et ses agents comme le précisent les lettres d'anoblissement du maître des lieux par Henri IV en 1597. Capchicot servit aussi de gîte pour le maréchal de Praslin et Bassompierre, colonel-général des Suisses, lors de la campagne de 1620 menée par Louis XIII. En 1646, le seigneur de Capchicot et son fils furent assassinés par le gendre du seigneur d'Allons dans une querelle de préséance. Peu après, au cours de la Fronde, une unité de l'armée de Condé fit de Capchicot son repaire pour rançonner les environs de Casteljaloux, puis pilla le logis et incendia les communs. Les seigneurs de Capchicot s'installèrent alors dans leur château d'Aillas mais conservèrent Capchicot jusqu'en 1880. Les percements du rez-de-chaussée ont été largement modifiés.","architecture":"Capchicot La maison-forte  est un petit manoir du XVIe siècle, il est composé dun seul corps de logis rectangulaire avec fenêtres à meneaux au 1er étage, flanqué de deux tourelles ; lune au centre de la façade, elle fait office de tour escalier et dentrée, lautre à un angle. Toutes deux présentent un grand nombre darchères et de bouches à feu. Sur la tour centrale, au dessus de la porte dentrée subsiste les corbeaux dune ancienne échauguette.","habitants":"Henri de Navarre \r\n        \r\n        \"","divers":"Château de Capchicot à Allons","gps":"","images":["../../jctruffet.com/image/image_47/47_Capchicot_1.jpg","../../jctruffet.com/image/image_47/47_Capchicot_2.jpg","../../jctruffet.com/image/image_47/47_Capchicot_3.jpg","../../jctruffet.com/image/image_47/47_Capchicot_4.jpg"]},"Consult_chateau_formulaire10c1":{"id":"Consult_chateau_formulaire10c1","dept":"47","canton":"Casteljaloux","commune":"Beauziac","nom":"Carnine_Beauziac","type":"Château","periode":"XVII","histoire":"CARNINE, en 1721, à noble Bernard du Casse. En février 1732, naît  Pierre-Henri de Brocas  et de Jeanne du Casse leur fils aîné, messire François de Brocas. Plus-tard, écuyer, sieur de La Nauze, François de Brocas fut institué héritier général et universel de Jeanne du Casse, sa mère, Le 9 août 1758, il sest marié à Jeanne-Antoinette du Casse du Mirail, héritière de la maison noble de Mons ou Carnine, fille de noble Bernard du Casse, sieur de Mirail, et de dame Élisabeth de Joly dEsclarens, habitants de Casteljaloux, en la paroisse de Saint-Raphaël.  En 1814, par alliance de  Pierre-Henry de Brocas, fils de messire François de Brocas sieur de La Nauze et de Jeanne-Antoinette du Casse du Mirail, 9e de la lignée, il est décédé au château de Carnine le 21 janvier 1824. Leur 3e enfant, François-Vosy Brocas de la Nauze, écuyer, était en 1846 chef des nom et armes de sa maison, habitant au château de Carnine. François-Vosy Brocas de la Nauze sest marié à Mathilde-Marie-Françoise de Villespassans de Faure. Ils ont eu trois enfants, le premier noble Guillaume-François-de LÎle de Brocas de La Nauze est né au château de Carnine le 31 octobre 1849. Le troisième, une fille, Antoinette-Marie-Félicie de Brocas de La Nauze née le 29 août 1852. Bernard de Brocas, dune génération postérieure datant du début du XXe siècle, sans descendance, a légué la propriété à Henri de Roquemaurel, son cousin germain dancienne noblesse auvergnate, toujours dans la famille.","architecture":"CARNINE Le château, datant du XVIIIe siècle, se situe au cur dune clairière du hameau de Tren, est constitué dun corps central encadré par deux pavillons. Laxe central de la façade est constitué par un gable fini en épi de faîtage. Au vu de cette architecture régulière associée aux gables, on peut estimer sa période de construction entre les XVIIe et XVIIIe siècles.","habitants":"Famille de Bernard du Casse                                          Henri de La Tour d'Auvergne          \r\n        \r\n        \"","divers":"Le château de Carnine à Beauziac","gps":"","images":["../../jctruffet.com/image/image_47/47_Carnine_Beauziac_1.jpg","../../jctruffet.com/image/image_47/47_Carnine_Beauziac_2.jpg","../../jctruffet.com/image/image_47/47_Carnine_Beauziac_3.jpg","../../jctruffet.com/image/image_47/47_Carnine_Beauziac_4.jpg"]},"Consult_chateau_formulaire0700":{"id":"Consult_chateau_formulaire0700","dept":"47","canton":"Sainte-Livrade sur Lot","commune":"Casseneuil","nom":"Casseneuil","type":"Château-Vestiges","periode":"XII","histoire":"A Casseneuil  trois châteaux pas d'information historique  et vestiges.   \r\nCASSENEUIL,  durant la croisade contre les Albigeois, Casseneuil comprenait de nombreux cathares, a subi plusieurs sièges, et un premier bûcher y fut édifié en 1209. A cette date le premier siège fut levé suite à un différent entre les chefs croisés. Le chef de la campagne militaire, le comte Guy II d'Auvergne ayant eu des droits et de l'argent de la part de la ville se refusa de l'assiéger, et l'archevêque de Bordeaux quant à lui voulait prendre la forteresse cathare. Un accord fut passé avec la cité, cette dernière se verrait libérée si les cathares abjuraient leur foi, un grand nombre refusa ce qui déboucha à l'édification de bûchers. S'étant à nouveau rangée du côté des Albigeois, la cité fut la cible d'un siège mené par Simon de Montfort en 1214. Malgré une résistance tenace des défenseurs sous la direction d'Hugues de Rovignan, frère de l'évêque d'Agen, la cité tomba après 8 semaines et fut pillée, massacrée et enfin démantelée par le traité de Meaux-Paris. Charlemagne aurait fait construire une maison sur le Peyche Neyrat pour y laisser sa femme enceinte qui accoucha de leur fils (Grégoire), durant quelques semaines puis retournèrent à Paris.","architecture":"Casseneuil, les remparts de la bastide sont encore apparent sur les bords de la Lède et un beau manoir ainsi que la médiathéque, le château a servi à se protéger des invasions ennemies. Il a été en partie détruit, puis reconstruit vers 1900, il a été occupé par des surs. En 1952, le père de Don Orion (congrégation italienne) y a fondé une école, puis les lieux ont été occupés par lInstitution Saint-Pierre jusquà juin dernier, élu local et membre du conseil dadministration de linstitution. La bâtisse, occupée par le collège, a été entretenue au fil du temps, cest un bâtiment sain, aménagé en établissement scolaire. Depuis quun nouveau collège a été construit, cet édifice est vide, et se pose la question de son devenir, explique-t-il. Linstitution na pas vocation immobilière.","habitants":"Hugues de Rovignan\r\n        \r\n        \"","divers":"Vestiges de remparts et manoir à Casseneuil","gps":"","images":["../../jctruffet.com/image/image_47/47_Casseneuil_1.jpg","../../jctruffet.com/image/image_47/47_Casseneuil_2.jpg","../../jctruffet.com/image/image_47/47_Casseneuil_3.jpg","../../jctruffet.com/image/image_47/47_Casseneuil_4.jpg","../../jctruffet.com/image/image_47/47_Casseneuil_5.jpg"]},"Consult_chateau_formulaire4a27":{"id":"Consult_chateau_formulaire4a27","dept":"47","canton":"Puymirol","commune":"Castelculier","nom":"Castelculier","type":"Château","periode":"XVI","histoire":"A Castelculier, le château de Castelculier,  de Laclotte, de Sévelotte et  Saint-Amans qui fut habité par Jean Florimond Boudon de Saint-Amans, célèbre botaniste du XIXe siècle. Pas d'information historique pour ces trois derniers.                                                CASTELCULIER, ruines du château fort de Castelculier, du XIIIe siècle, détruit par les armées de Louis XIII.  Château de Saint-Amans, ancienne demeure de Jean Florimond Boudon de Saint-Amans  qui fut habité par Jean Florimond, célèbre botaniste du XIXe siècle. Non loin de Saint-Amans se trouvent aussi les ruines du château de Laclotte, bâtisse érigée par Jean-Baptiste de Chaudordy dans les années 1820 sur les ruines dune tour datant du Moyen-Âge,  servait de maquis à la résistance sous loccupation allemande. Le site a dabord servi de zone de parachutage. Un important dépôt darmes y fut ensuite constitué par trois membres du réseau Victoire : Maurice Jacob, Paul Blasy et Élie Moulia. Ces derniers sont arrêtés sur place le samedi 21 août 1943 par le chef du SD dAgen Stotz, en présence de Johann Freidrich Zorn, son successeur en 1944 (ceci en conséquence de larrestation par la gendarmerie de La Réole le 16 août 1943 de ladjudant Fernand Gaucher, qui, remis aussitôt entre les mains du SD dAgen, avait avoué lexistence de dépôts darmes à Marmande et Laclotte). Il s'ensuivit maintes arrestations, notamment sur la zone de Monségur, lextinction du réseau en Lot-et-Garonne, puis en Gironde, zone  non occupée. Un réseau renaît sur Agen en février 1944, sous les initiatives dAlfred Streiff, alias Fred, et de labbé Pierre Frischman, pour devenir le bataillon dAgen au sein du Corps Franc Pommiès. À la veille du débarquement, le château de Laclotte redevient le poste de commandement provisoire de la compagnie Fred Streiff. Le château est pris dassaut le 7 juin 1944 par la 2e division SS Das Reich des Waffen-SS, sous la conduite de la Gestapo dAgen.","architecture":"SERVELOTTE  construit au XVIIIe siècle, est très représentatif de lidéal architectural de lépoque. incendié cest la châtelaine qui a mis le feu avant de quitter lédifice en flammes.  29/08/2016   à quelques kilomètres au nord à Castelculier le château de Sévelotte, aujourd'hui chambre d'hôtes. Vestiges de la villa gallo-romaine de Lamarque, aujourdhui appelée Villascopia.                                                                         LACLOTTE, reconstruction au XIXe siècle, destruction en 1944, sur la commune de Castelculier, est surtout connu pour avoir été un lieu de résistance durant la Seconde Guerre mondiale. Le château sélève à flanc de colline, dans les bois. Cette situation privilégiée a sans doute incité linstallation, dès le Moyen Âge, dun poste de surveillance, comme il en existe de nombreux autour dAgen.","habitants":"Jean Florimond\r\n        \r\n        \"","divers":"Château de Laclotte grav 1et 2, et de Servelotte  grav 3 et 4 à Castelculier.","gps":"","images":["../../jctruffet.com/image/image_47/47_Castelculier_1.jpg","../../jctruffet.com/image/image_47/47_Castelculier_2.jpg","../../jctruffet.com/image/image_47/47_Castelculier_3.jpg","../../jctruffet.com/image/image_47/47_Castelculier_4.jpg"]},"Consult_chateau_formulaired7c0":{"id":"Consult_chateau_formulaired7c0","dept":"47","canton":"Nérac","commune":"Casteljaloux","nom":"Casteljaloux","type":"Château","periode":"XVI","histoire":"A casteljaloux , le château de Lacaze (voir article), de la Roque, d'Archambaud-Vièryes, la maison du Roy,  et de Neuffonds. Pas d'information historique pour ces derniers.                                                                        CASTELJALOUX, la construction en est attribuée à Henri de La Tour d'Auvergne, vicomte de Turenne, gouverneur de la ville au XVIe siècle. Entre les XIe et XVIe siècles, Casteljaloux et ses environs sont la propriété des seigneurs d'Albret. Ils y possèdent un château dont le futur Henri IV fit un rendez-vous de chasse. Agrippa d'Aubigné y fut notamment blessé.\r\nLes Albret font de la ville la place forte du protestantisme, confrontée aux guerres de religion. En 1685, lédit de Fontainebleau de Louis XIV révoquant l'édit de Nantes de 1598 qui avait reconnu la liberté de culte des protestants, contraint beaucoup de ceux-ci à lexil.  Henri IV y aurait séjourné de 1681 à 1682, Louis XIII y a logé en 1621 au cours d'une tournée d'inspection de son royaume et Louis XIV y aurait fait halte en 1660, sur la route de Saint-Jean-de-Luz pour son mariage espagnol.    La Maison du ROY: actuellement office du tourisme, nommé ainsi grâce aux séjours de Louis XIII et Louis XIV. Vous y trouverez des expositions régulières, et une superbe cheminée.","architecture":"Casteljaloux date du XVIe siècle et doit son nom aux invités prestigieux y ayant séjourné.  L'édifice abrite aujourd'hui l'office de tourisme de la ville et  inscrit au titre des monuments historiques par arrêté du 21 mars 1983 pour ses façades et ses toitures.  Les Remparts: fortifications datant du XIVe siècle, abaissées maintes fois pour diverses raisons. Aujourd'hui on peut encore voir les vestiges de ces fortifications, mises en valeur par la municipalité.                                                      La Roque, construit sur les fondations d'un ancien prieuré datant du XIVe siècle, entièrement rénové.     Maison du roy  du XVIe siècle, la demeure nommée suite aux séjours supposés de Louis XIII et de Louis XIV, abrite aujourd'hui  des expositions régulières accueillent le public dans une salle où se trouve une superbe cheminée ;  Ce monument n'est pas visitable.\r\nNeuffonds, de plan en U  à deux niveaux, couverture de l'ensemble en croupe.","habitants":"Jacques Vieille et Ghislaine Portalis \r\n        \r\n        \"","divers":"Les châteaux de Casteljaloux de 1 à 7 de Neuffonds grav_8 et la maison du Roy grav 9.","gps":"","images":["../../jctruffet.com/image/image_47/47_Casteljaloux_1.jpg","../../jctruffet.com/image/image_47/47_Casteljaloux_2.jpg","../../jctruffet.com/image/image_47/47_Casteljaloux_3.jpg","../../jctruffet.com/image/image_47/47_Casteljaloux_4.jpg","../../jctruffet.com/image/image_47/47_Casteljaloux_5.jpg","../../jctruffet.com/image/image_47/47_Casteljaloux_6.jpg","../../jctruffet.com/image/image_47/47_Casteljaloux_7.jpg","../../jctruffet.com/image/image_47/47_Casteljaloux_8.jpg","../../jctruffet.com/image/image_47/47_Casteljaloux_9.jpg"]},"Consult_chateau_formulairee842":{"id":"Consult_chateau_formulairee842","dept":"47","canton":"Villeneuve sur Lot","commune":"Castelnaud de Gratecambe","nom":"Castelnaud_Gratecambe","type":"Château","periode":"XV-XVII","histoire":"A  4 kilomètres à l'ouest à Sénezelle un château, Boulbéne et Merguet                                              CASTELNAUD-de-Gratecambe est une bastide est une ancienne bastide de Guyenne, fondée au XIIIe siècle  dont la fondation est attribuée à Alphonse de Poitiers. Celui-ci est à lorigine dune cinquantaine de bastides édifiées dans la région entre 1256 et 1270. La ville a beaucoup souffert des guerres de Religion. Il ne subsiste quune maison à pan de bois datant du XVIe siècle ou du XVIIe siècle. Le reste du patrimoine bâti date de la fin du XVIIIe siècle et du début du XIXe siècle. Au XIXe siècle, la ville devient trop étroite pour lactivité du bourg et lindustrie naissante. Son développement se poursuit ainsi vers louest, où sont construites mairie et école.    La fondation dune bastide demande la rédaction dun acte notarié qui fait intervenir le fondateur, le propriétaire des lieux  un dénommé Gratecambe en loccurrence qui prévoit les modalités de répartition des revenus et réglemente les droits et devoirs des habitants.","architecture":"Beaucoup de maisons anciennes sont transformées en fabriques de pruneaux, production essentielle de lAgenais au début du XXe siècle. Puis, face à lindustrialisation, elles sont peu à peu abandonnées.    BOULBENE  maison de maître à la Boulbène est en fait une ancienne dépendance agricole réaménagée au cours du XIXe siècle.\r\nLa dépendance agricole primitive date de 1819. Elle se compose à lépoque dune grange, dune étable et dun pigeonnier. Celui-ci, de forme carrée et dressé sur piles, est construit indépendamment de lensemble à lextrême fin du XIXe siècle. Il comporte notamment un grenier dit \"garde-pile\".      \r\nMERGUET, au lieu-dit \"Merguet\" se trouve un manoir dont la construction remonte, pour les parties les plus anciennes, au XVIe siècle. Le manoir comporte un corps de logis principal et des dépendances agricoles. Le logis, construit en moellons, est flanqué dune tour circulaire coiffée dun toit conique de tuiles plates. Seule la tour et une partie du logis subsistent.        SENEZELLES, plus manoir que château de plan carré à deux niveaux, toit brisé à la Marsard avec lucarne sur angle, au coeur du parc du château, les anciennes dépendances ont été aménagées. En pleine campagne, tout pour être en famille.","habitants":"Famille de Gratecambe\r\n        \r\n        \"","divers":"Château de Gratecambe  grav 1, de Boulbéne grav 2 de Merguet grav 3 et 4  et de Senezelles 5 et 6,","gps":"","images":["../../jctruffet.com/image/image_47/47_Castelnaud_Gratecambe_1.jpg","../../jctruffet.com/image/image_47/47_Castelnaud_Gratecambe_2.jpg","../../jctruffet.com/image/image_47/47_Castelnaud_Gratecambe_3.jpg","../../jctruffet.com/image/image_47/47_Castelnaud_Gratecambe_4.jpg","../../jctruffet.com/image/image_47/47_Castelnaud_Gratecambe_5.jpg","../../jctruffet.com/image/image_47/47_Castelnaud_Gratecambe_6.jpg"]},"Consult_chateau_formulaireb387":{"id":"Consult_chateau_formulaireb387","dept":"47","canton":"Agen","commune":"Bon-Encontre","nom":"Castelnoubel","type":"Château-fort","periode":"XIV","histoire":"CASTELNOUBEL, le 29 août 1351, Charles le Mauvais, roi de Navarre, lieutenant a donné à Arnaud de Durfort la juridiction haute et basse à Bajamont et Castelnoubel,  Arnaud de Durfort était mort en 1360. Son fils, Arnaud hérita de ses biens. En 1372 on trouve un Jean de Durfort seigneur qui mourut sans héritier mâle, On trouve ensuite Jean de Durfort, surnommé le Roux, frère de Rainfroid et fils d'Arnaud de Durfort hérite du château. Le 27 juillet 1419 il est écuyer d'écurie du roi. Il occupe encore cette fonction en 1423, le fils de Rainfroid de Durfort, frère de Jean, Bertrand de Durfort se dit seigneur. Bertrand marié à Judith de Lautrey eut deux fils. Étienne de Durfort hérita des seigneuries de Castelnoubel et Mérens. Le 9 juillet 1535, Alain de Durfort a signé son contrat de mariage avec Françoise de Montal. Alain de Durfort entreprit alors ses châteaux de Lafox et de Castelnoubel.  Castelnoubel à Jeanne d'Antin par un arrêt à la fin du XVIe siècle. Elle ne garda pas le château longtemps car elle l'a vendu le 9 octobre 1608 à messire Arnaud de Gasq, en 1619, Jacob de Secondat a pris le titre de seigneur de Castelnoubel. Le fils aîné, Jean-Baptiste-Gaston de Secondat est son héritier universel. La seigneurie va se trouver partagée entre quatre membres de la famille Pascault de Poléon.  Elle fut rachetée par Louis-Auguste Pascault de Poléon.  Le château est vendu en 1817 à Pierre Loubat,  puis à  monsieur des Écherolle a sa mort à Paris le 31 juillet 1865 le château est alors passé entre les mains de ses enfants, et finalement la part de la comtesse Hélène des Écherolles, à sa mort  le château de Castelnoubel passa à sa nièce, mademoiselle de Leygonier qui s'est mariée avec monsieur Pardo, d'une famille originaire du Vénézuela. propriété de la famille de Pardode Leygonier.","architecture":"Le promontoire sur lequel a été élevé le château de Castelnoubel a été occupé depuis le Xe ou XIe siècle. La construction du château actuel a commencé à la fin du  XIIIe siècle. Peut-être a-t-il succédé à un castrum avec des palissades en bois bordant les falaises. Il ne reste à peu près rien de ce château du XIIIe siècle qui a été remplacé par celui construit à partir du XIVe siècle.   Le château fort  qui à la forme d'un trapèze flanqué de tours aux angles, comprend une enceinte de remparts renforcée aux angles par quatre grosses tours rondes avec archères et trous de couleuvrines, la vaste galerie voûtée à double étage qui borde une façe de la cour intérieure, le grand escalier. La base de la construction s'appuie sur le rocher. Un pont-levis enjambe le fossé naturel. Un corps de logis barlong éclairé par des fenêtres à meneaux, se trouve sur la façade d'entrée. L'accès se fait par une porte centrale donnant sur une galerie à deux étages sur croisées d'ogives formant cloître, ornée au premier étage de boiseries du XVe siècle. Au nord, tourelle en encorbellement du XVe siècle.Des aménagements néogothiques ont été faits au XIXe siècle.","habitants":"famille de Marmande\r\n        \r\n        \"","divers":"Château de Castelnoubel à Bon-Encontre","gps":"","images":["../../jctruffet.com/image/image_47/47_Castelnoubel_1.jpg","../../jctruffet.com/image/image_47/47_Castelnoubel_2.jpg","../../jctruffet.com/image/image_47/47_Castelnoubel_3.jpg","../../jctruffet.com/image/image_47/47_Castelnoubel_4.jpg","../../jctruffet.com/image/image_47/47_Castelnoubel_5.jpg"]},"Consult_chateau_formulaire1ac7":{"id":"Consult_chateau_formulaire1ac7","dept":"47","canton":"Miramont de Guyenne","commune":"Castillonnès","nom":"Castillonnes","type":"Château","periode":"XIII-XVI","histoire":"CASTILLONNES, fut fondée en 1259 par Alphone de Poitiers en paréage avec l'Abbaye de Cadouin,l'abbaye de Grand-Mauroux a prospéré jusqu'au XIVe siècle, puis ses bâtiments ont été détruits au cours des guerres de religion. \r\nL'acte de paréage fondant la bastide a été signé le 10 septembre 1259 par Élie, abbé de Cadouin,  les frères Bertrand et Arnaud de Mons cédant le tiers, et le sénéchal d'Agenais, Guillaume de Bagnols, à la demande du comte de Toulouse, Alphonse de Poitiers. Castillonnès devient le siège d'une baylie agenaise en 1269. En 1318, Édouard II d'Angleterre, duc d'Aquitaine, confirme les coutumes et annexe la ville à la Couronne, comme la plupart des principaux bourgs de l'Agenais. Il fait fortifier le bourg de Castillonnès entre 1312 et 1315. La commune doit construire les murs,  les portes. En 1368, le Prince Noir confirme les coutumes. La charte est renouvelée par Louis d'Anjou en 1372 avec huit concessions nouvelles, confirmée par Charles V en 1373, puis par François Ier. Une nouvelle charte octroyant de nouveaux privilèges est signée par Louis d'Anjou en 1377 à Bergerac, confirmée par Charles VIII en 1483. Les chartes de coutumes sont confirmées par Henri II, en 1548, et Henri, roi de Navarre, gouverneur de Guyenne, en octobre 1576.","architecture":"A Castillonnés, vestiges de la maison abbatiale du XIIIe siècle construite par les moines de Cadouin, vestiges de remparts, portes du XIVe siècle. Castillonnés son bâti présente une homogénéité remarquable et des points d'intérêt comme le château \"du Perrier\", des pontets  avec passerelles couvertes entre deux maisons, des hôtels particuliers du XVIIIe siècle, une église abritant un retable baroque et une halle du XXe siècle avec une échauguette en poivrière de style \"troubadour\". En 1209, les vicomtes de Castillon font don de leur château fort à labbaye de Cadouin, installée plus loin dans la forêt près des berges du Dropt. En 1785, à son emplacement, est aménagé une promenade, reconvertie à la Révolution en place publique portant le même nom que lévénement historique.  Les derniers vestiges quil reste du château sont les ruines dune grosse tour carrée qui domine le chemin des Cordiers.","habitants":"Famille dAbzac\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Vestiges de u château primitif de Castillonnes et la porte du Valet et le château.","gps":"","images":["../../jctruffet.com/image/image_47/47_Castillonn%c3%a8s_1.jpg","../../jctruffet.com/image/image_47/47_Castillonn%c3%a8s_2.jpg","../../jctruffet.com/image/image_47/47_Castillonn%c3%a8s_3.jpg","../../jctruffet.com/image/image_47/47_Castillonn%c3%a8s_4.jpg","../../jctruffet.com/image/image_47/47_Castillonn%c3%a8s_5.jpg","../../jctruffet.com/image/image_47/47_Castillonn%c3%a8s_6.jpg","../../jctruffet.com/image/image_47/47_Castillonn%c3%a8s_7.jpg"]},"Consult_chateau_formulaire5a4b":{"id":"Consult_chateau_formulaire5a4b","dept":"47","canton":"Miramont de Guyenne","commune":"Castillonnès","nom":"Castillonnes_Chateau","type":"Château","periode":"XVII-XIX","histoire":"A Castillonnés  plusieurs châteaux;  celui de Balet, de la Bastide,   de Chambon,  de Lamothe,  de Servelaure, de Saint-Quentin,   hôtel de Montauriol, de Thomazeau.                                                                    BALET ou BALAY, le château de Balet à Castillonnès appartient dès le XVIIe siècle à la puissante famille dAbzac, qui possède également le château de Servelaure dans la même commune, reconstruction du XIIe siècle. Le terrain sur lequel est construit ce château fait dabord partie de la paroisse de Pompiac.  SERVELAURE  reconstruction : Fin du XIXe siècle   THOMAZEAU, famille aristocratique de créoles enrichis par la culture et le négoce de la canne à sucre en Martinique. L'édifice témoigne les goûts raffinés d'une petite noblesse provinciale cosmopolite au cours du siècle des Lumières, ce qui exclut toute trace de féodalité encré très présente dans la région.   Pas  d'informations pour les autres châteaux possible que certains ont disparus.","architecture":"CASTILLONNES, hôtel  Thomazeau bâti vers 1770 sur les ruines d'un château médiéval, composé d'un corps de logis et de deux ailes de communs en retour d'équerre cantonnant une cour fermée par une grille en fer forgé.                                                              BALET, l'édifice a été bâti par les De Cours de  Ballet,  imposant par ces trois corps de logis à deux niveaux en équerre flanqué en façade de deux tours rondes toit en poivrières,  dallure très néo-classique, a en fait été édifié dès 1880. Il comprend dans un même espace, les   bâtiments dhabitation et la ferme. La partie « noble » a été traitée sous forme de chartreuse, avec un toit à la Mansard.  Elle sadosse à une tour plus ancienne, unique trace visible du château dautrefois. Elle souvre sur une terrasse doù lon découvre un superbe panorama. La ferme contiguë a été réalisée suivant le même thème architectural. Elle sordonne  autour dune cour carrée, où lon accède de chaque côté par un porche, il comprend deux corps de ferme et une partie des terres qui leur sont rattachées.  LA BASTIDE, imposant par son donjon  servant de corps de logis accolé de pavillons carrés et rectangulaire prolongé par de grandes dépendances. SERVELAURE  reconstruction  fin du XIXe siècle                                                                               A Castillonnès , de Chambon de st-Quentin et le Montauriol hôtel.","habitants":"Famille dAbzac\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"A Castillonnés;  le château de Balet grav 1 et 2, la Bastide  grav 3, de Chambon grav 4, de Lamothe grav 5, de Montauriol grav 6, de Servelaure grav 7, de Thomazeau grv 8 et le château de Saint-Quentin grav 9.","gps":"","images":["../../jctruffet.com/image/image_47/47_Castillonn%c3%a8s_Chateau_1.jpg","../../jctruffet.com/image/image_47/47_Castillonn%c3%a8s_Chateau_2.jpg","../../jctruffet.com/image/image_47/47_Castillonn%c3%a8s_Chateau_3.jpg","../../jctruffet.com/image/image_47/47_Castillonn%c3%a8s_Chateau_4.jpg","../../jctruffet.com/image/image_47/47_Castillonn%c3%a8s_Chateau_5.jpg","../../jctruffet.com/image/image_47/47_Castillonn%c3%a8s_Chateau_6.jpg","../../jctruffet.com/image/image_47/47_Castillonn%c3%a8s_Chateau_7.jpg","../../jctruffet.com/image/image_47/47_Castillonn%c3%a8s_Chateau_8.jpg","../../jctruffet.com/image/image_47/47_Castillonn%c3%a8s_Chateau_9.jpg"]},"Consult_chateau_formulaire8183":{"id":"Consult_chateau_formulaire8183","dept":"47","canton":"Nérac","commune":"Réaup-Lisse","nom":"Cauderoue","type":"Château","periode":"XII-XV","histoire":"CAUDEROUE  château gascon datant du XIIe siècle,  Il nest pas question du château de Cauderoue dans les hommages rendus par les Sires dAlbret au seigneur dAgenais, mais bien de la terre de Sezerouse et cest aussi de la paroisse de ce nom quil est fait mention dans la donation consentie en 1309 à Delart comme étant celle où se trouvait située la maison du noble du Tasta. Le seigneur de Cauderoue dépendait également de cette paroisse. Bertrand de Bezolles en était le seigneur en 1538.  Parmi ceux qui vendirent le Tasta à Pierre Courtion, seigneur de Douazan, vers lan 1560, figure une Jeanne de Bezolles, mère dune Françoise de Barrau. Dès 1556, on voit Antoine de Bourbon et Jeanne dAlbret adresser à monsieur de Cauderoue une lettre par laquelle il lui demande ses deux neveux : le garçon pour en faire un page du Roi, et la fille, une fille dhonneur de la Reine. Manoir du XVe siècle chambres d'hôtes.","architecture":"Cauderoue le château antique appartenant au citoyen Bezolles, divers restes de pierres attachés au mur, des tracés de fossés, des mur dentrée et de clôture, qui annoncent un château fortifié, un pavillon excédant le corps de logis, une guérite aux anses, triste constat archéologique,  Il nest pas une de leur indication qui ne contienne une erreur grossière, ses propriétaires madame et monsieur Jacques Bridet.","habitants":"Famille de  Bertrand de Bezolles\r\n        \r\n        \"","divers":"Château de Cauderoue","gps":"","images":["../../jctruffet.com/image/image_47/47_Cauderoue_1.jpg","../../jctruffet.com/image/image_47/47_Cauderoue_2.jpg","../../jctruffet.com/image/image_47/47_Cauderoue_3.jpg","../../jctruffet.com/image/image_47/47_Cauderoue_4.jpg","../../jctruffet.com/image/image_47/47_Cauderoue_5.jpg","../../jctruffet.com/image/image_47/47_Cauderoue_6.jpg","../../jctruffet.com/image/image_47/47_Cauderoue_7.jpg","../../jctruffet.com/image/image_47/47_Cauderoue_8.jpg","../../jctruffet.com/image/image_47/47_Cauderoue_9.jpg"]},"Consult_chateau_formulaireaadd":{"id":"Consult_chateau_formulaireaadd","dept":"47","canton":"Penne d","commune":"Cauzac","nom":"Cauzac","type":"Château","periode":"XV","histoire":"A Cauzac le château de Cauzac et de Moncuquet.    CAUZAC, ce château remonte au XIIIe siècle. Il a appartenu à la famille de Thoiras,  Balthazar de Thoiras, un des capitaines des Ligueurs de l'Agenais. Balthazar de Thoiras s'est marié le 19 novembre 1576 avec Marie de Gout dont il a eu trois enfants, puis s'est remarié le 5 août 1587 avec Armoise de Lomagne, dame de Las Treilles, François de Thoiras a épousé avant 1621 Jeanne de Galard de Béarn de Brassac, sans postérité. Il est mort en 1634.  Jeanne de Galard, héritière universelle de son mari a transmis ses biens à un de ses parents, Marc de Cugnac, sieur de Pauliac. Il est entré en possession du château de Cauzac en 1644. Il était maréchal de camp des armées du roi. Il est mort le 26 avril 1678, sans postérité.  Jeanne de Galard, héritière universelle de son mari a transmis ses biens à un de ses parents, Marc de Cugnac, sieur de Pauliac. Il est entré en possession du château de Cauzac en 1644. Il était maréchal de camp des armées du roi. Il est mort le 26 avril 1678, sans postérité. Le domaine passa à  Louis-Alain de Verduzan, il a épousé le 4 février 1685  Marguerite de Raymond dont il a eu trois filles.   Marie de Verduzan, seconde fille du couple, s'est mariée en avril 1723 avec Henry d'Aymar de Châteaurenard, et a reçu en héritage le château de Cauzac.  Le château  est alors resté dans la famille des comtes de Châteaurenard. Louis Joseph d'Aymar d'Alby (1725-1791), comte de Châteaurenard, a été élu député aux États-Généraux de 1789. Il était marié avec Gabrielle de Chevigné  Henri d'Aymar d'Alby, comte de Châteauneuf  marié en 1813 avec Sophie de Villeneuve Bargemon, Jean Augustin Christohe Joseph d'Aymar d'Alby, comte de Châteaurenard. Pierre François Frédéric d'Aymar, marquis de Châteauneuf , marié en 1860 avec Mathilde Marie de Suffren, qui ont eu cinq enfants, dont : Henry d'Aymar de Châteauneuf , marié en 1892 avec Bertrande de Béchet. Le château est resté dans la famille de Châteaurenard après la Révolution.","architecture":"CAUZAC a été laissé en mauvais état au XVIIe siècle. Il est redécoré et réaménagé au  XVIIIe siècle.  Le château a subi d'importantes modifications au XIXe siècle pour le rendre habitable, avec de nouvelles fenêtres et abaissement de la toiture.\r\nL'ensemble du château et son parc ont été inscrits monument historique le 28 décembre 1995. MONCUQUET du XIIe siècle, son histoire est rattachée à celle de la Sauvetat.  aujourd'hui SCI de biens immobiliers de la famille Coulaud","habitants":"Famille de Thoiras\r\n        \r\n        \"","divers":"Château de Cauzac grav 1 à 3 et Moncuquet grav 4 et 5.","gps":"","images":["../../jctruffet.com/image/image_47/47_Cauzac_1.jpg","../../jctruffet.com/image/image_47/47_Cauzac_2.jpg","../../jctruffet.com/image/image_47/47_Cauzac_3.jpg","../../jctruffet.com/image/image_47/47_Cauzac_4.jpg","../../jctruffet.com/image/image_47/47_Cauzac_5.jpg"]},"Consult_chateau_formulaire0340":{"id":"Consult_chateau_formulaire0340","dept":"47","canton":"Agen","commune":"Agen","nom":"Chapelet_Tour","type":"Tour","periode":"XII-XIV","histoire":"TOUR du CHAPELET, le nom de la tour vient de celui du couvent du Chapelet dans lequel elle s'est trouvée englobée à la fondation du couvent des Dominicaines, le 28 février 1585. La tradition veut que la tour ait alors servi de clocher à leur chapelle. Le couvent a été démantelé à la Révolution. Elle a servi dentrepôt de salpêtre en 1795, de magasin de fourrages jusqu'en 1814. En 1815, la municipalité a décidé d'en faire une prison correctionnelle. En 1818, la tour est devenue le siège d'une école d'enseignement mutuel. En 1822, tout l'ancien couvent est vendu en de nombreux lots. Elle est devenue une annexe de la maison du no 3 rue François-Arago. Longtemps abandonnée, la tour a été rénovée en 2000 pour recevoir l'agence darchitecture de Stéphane Thouin La tour a été inscrite au titre des M.H en 1950","architecture":"La tour du Chapelet a fait partie de la première enceinte d'Agen. On peut encore voir qu'elle est rattachée du côté ouest à un pan de muraille construit en vieil appareil, seul reste de la première enceinte, antérieure au XIIIe siècle. Elle est carrée, bâtie en moyen appareil, avec des murs de 1,25 m d'épaisseur. Une salle basse, d'une hauteur totale de 6 m, est voûtée en berceau légèrement brisé, et percée d'ouvertures en plein-cintre. Cette salle base a été divisée en deux par un plancher permettant l'accès à partir de l'escalier extérieur. Ce plancher a créé une cave. Au premier étage on voit une fenêtre géminée avec une colonnette en marbre blanc dans sa partie supérieure. La tour comprend trois étages, les deux derniers ayant été construits en brique. La partie supérieure a dû être réaménagée au XIVe siècle, probablement après la réalisation de la nouvelle enceinte.","habitants":"\"","divers":"La Tour du Chapelet à Agen","gps":"","images":["../../jctruffet.com/image/image_47/47_Chapelet_Tour_1.jpg"]},"Consult_chateau_formulairea472":{"id":"Consult_chateau_formulairea472","dept":"47","canton":"Tonneins","commune":"Clairac","nom":"Clairac","type":"Château","periode":"XVI-XIX","histoire":"Plusieurs manoirs à Clairac celui de Caussinat, de Barry, de Bire-Boy, de Buscailles, de Dimeuil, de Larrouy (voir article), de Marith, de Roche , le manoir de Vivens et Moncaubet,  sur liste suivante.                Manoir de Clairac dit de DIMEUIL a peut-être été construite au XVe siècle, a été la maison de Pierre Lartigue (prêtre tué en 1792). Ses parents, Jacques Lartigue qui a épousé Marie Salomon du Vaqué en 1727, possèdent 6 métairies et 3 maisons à Clairac.     CAUSSINAT, propriété agricole qui appartient à la même famille depuis trois générations, Aimé et Gisèle Massias cultivent leur bonheur dans la vallée du Lot, aujourd'hui chambres d'hôtes  de Gisèle et Aimé Massias du XVIIe siècle\r\nBUSCAILLES, exemple remarquable  d'un petit manoir probablement construit au XVIe siècle, description Le corps de logis principal est construit selon un plan rectangulaire. Une tour polygonale contenant l'escalier est adossée à un long côté. De part et d'autre de la tour des fenêtres ont conservé traverses et meneaux à moulures prismatiques.","architecture":"Manoir de Clairac dit de DIMEUIL  C'est alors un petit manoir fortifié entouré d'importants bâtiments agricoles et des logements des domestiques. De grandes fenêtres à meneaux, obturées par de fines grisailles coupées en losange s'ouvrent vers le confluent gardé par le Pech de Berre. Près du portail du manoir se dresse le colombier. Autour des murs crénelés, des plates-bandes parsemées de fleurs\". Cette description correspond à la maison actuelle, le corps de logis de plan rectangulaire construit en moellon de calcaire avec enduit partiel. Le toit à longs pans et croupes est couvert de tuiles creuses. Des fenêtres conservent des meneaux et des traverses plates. Une porte s'ouvrant vers la vallée est protégée par une bretèche supportée par 3 consoles en pierre construite au niveau de l'étage en surcroît, plan  rectangulaire régulier.","habitants":"Famille de Caussinat                                                                 Pierre Lartigue \r\n        \r\n        \r\n        \r\n        \"","divers":"Château à Clairac  de Marrith grav 1-2 du Barry grav 3, Caussinat grav 4 et 5 et de Buscailles","gps":"","images":["../../jctruffet.com/image/image_47/47_Clairac_1.jpg","../../jctruffet.com/image/image_47/47_Clairac_2.jpg","../../jctruffet.com/image/image_47/47_Clairac_3.jpg","../../jctruffet.com/image/image_47/47_Clairac_4.jpg","../../jctruffet.com/image/image_47/47_Clairac_5.jpg"]},"Consult_chateau_formulaire2eb1":{"id":"Consult_chateau_formulaire2eb1","dept":"47","canton":"Tonneins","commune":"Clairac","nom":"Clairac_II","type":"Château","periode":"XVI-XIX","histoire":"MARITHE, un Timothée de Bacalan habitait à Clairac en Agenais au château Mirtille en 1770. Le château actuel a été construit dans la 2e moitié du XIXe siècle. Un monogramme (L.L.C.) est gravé sur la façade. Une tourelle de pigeonnier en brique a été construite au XXe siècle sur un bâtiment annexe au château. Elle repose sur un culot mouluré qui est en remploi ou le vestige d'une construction ancienne puisque ces bâtiments annexes ont été fortement remaniés.       MONCAUBET, la partie postérieure de la demeure (1 étage carré, 2 tours rondes) restaurée récemment, est probablement la partie plus ancienne. Le corps de bâtiment antérieur (1 étage carré, 1 étage de comble, tour polygonale) date de la 2e moitié du XIXe siècle. description Demeure composée de 2 corps de bâtiment accolés. Le corps antérieur construit en moellon de calcaire enduit est couvert par un toit à longs pans brisés en ardoise. Il comprend 1 étage carré et un étage de comble éclairé par des lucarnes à fronton triangulaire. A l'angle Est, une tour polygonale est construite en pierre de moyen appareil. Toit polygonal couvert d'ardoise.                                         ROCHE, le domaine de Laroche est détenu par la famille de Bonnegarde sous l'Ancien Régime.  Le domaine ayant été acquis au début du XIXe siècle par la famille clairaquaise des Delpech, puis par la famille Dubosc. Un cimetière familial enclos est aujourd'hui encore entretenu par la famille Sipière et Parmentier, propriétaire actuel.                                                     VIVENS, François Labat de Vivens est né dans cette demeure en 1697.","architecture":"ROCHES  L'édifice originel, du XVIe ou du XVIIe siècle, a subi des transformations et des adjonctions au cours des siècles, ce qui donne à l'ensemble du logis en particulier un aspect à la fois imposant (une tour carrée et deux tours rondes) mais aussi composite sur le plan chronologique description Le logis est composé d'un corps de bâtiment de plan rectangulaire de 3 niveaux d'élévation couvert par un toit à longs pans et croupe. Ce corps de logis est flanqué à droite de l'élévation antérieure d'un pavillon de plan carré à 3 niveaux. A l'angle gauche, une tour circulaire est couverte d'un toit conique. Une autre tour circulaire est adossée sur la partie droite de l'élévation postérieure. L'ensemble du logis principal est couvert de tuiles plates. Des communs couverts de tuiles creuses prolongent le corps de logis principal vers le nord-ouest.                                                                                 Vivens, les éléments décoratifs des lucarnes passantes de la cour intérieure, le couronnement de la porte d'entrée donnant sur cette même cour amènent à dater l'ensemble  du XVIIe siècle. A l'est, une fabrique date du XIXe siècle, les corps de logis forment une cour fermée par une clôture demi-circulaire en maçonnerie, les toits oblong et croupes sont couverts de tuiles creuses. L'étage de comble au-dessus de l'aile sud est éclairé par des lucarnes passantes orné de fronton sculptés. La porte d'entrée principale est située sur l'aile ouest de la cour. Elle est surmontée par un fronton triangulaire brisé. Un oculus est percé au centre. Deux polyèdres encadrent le fronton.","habitants":"Famille de Bonnegarde                                        Famille de  Delpech    \r\nFrançois Labat de Vivens\r\n        \r\n        \r\n        \"","divers":"Château de Clairac_II de Marithe, de Moncaubet  et de Vivens, celui de la Roches grav 2 et 3","gps":"","images":["../../jctruffet.com/image/image_47/47_Clairac_II_1.jpg","../../jctruffet.com/image/image_47/47_Clairac_II_2.jpg","../../jctruffet.com/image/image_47/47_Clairac_II_3.jpg"]},"Consult_chateau_formulaire7217":{"id":"Consult_chateau_formulaire7217","dept":"47","canton":"Aiguillon","commune":"Clermont-Dessous","nom":"Clermont_Dessous","type":"Vestiges","periode":"XII-XV","histoire":"CLERMONT-DESSOUS. le château dit du Bousquet et la seigneurie ont appartenu  aux familles de la Mothe de Pardaillan de Gondrin, puis au siècle suivant le premier duc d'Antin, fils légitimé de Louis XIV et Mme de Montespan  au XIIe siècle, les Lamothe, seigneurs de Bruch, au XIVe siècle, Ferrand, Malvezin de Lassale en 1425, les Benquet, Péticlo, Monorgon, Rémefa, Yzalguier en 1451,  à partir de 1564 , Jean II de Secondat (1515-1599), seigneur de Montesquieu. Le co-seigneur Jacques Yzalguier, seigneur, baron de Clermont et de Clermont-le-Fort, a marié le 20 octobre 1526 une de ses filles, Antoinette, à Blaise de Monluc à l'église de Clermont.  Maximilien de Narbonne, seigneur de Talairan,  s'est marié en 1579 à Isabeau de Cours, fille de Jean de Cours, dame de Clermont près de Port-Sainte-Marie; leur fils fut Jean de Narbonne, seigneur de Clermont, lui-même marié à Anne Bouchard d'Aubeterre, d'où Louis de Narbonne-Lara (1635-1705), dit \"le comte de Clermont\", seigneur de Montfort et Combebonnet qui eut de son mariage avec Madeleine de Souillac d'Azerac, Marie-Anne de Narbonne-Lara, dame de Clermont et de Combebonnet, mariée en 1701 avec Jacques-Gabriel Chapt, comte de Rastignac, en 1705 la seigneurie entre dans la famille Chapt de Rastignac; Jacques-Gabriel Chapt de Rastignac est mort sans postérité en 1755, son épouse était morte en 1703. a transmis tous ses biens à sa sur Jeanne, marquise de Gaubert, Zénaïde-Sabine de Chapt de Rastignac, marquise de Rastignac, arrière-petite-fille de Pierre Louis Chapt, et fille unique de Pierre Jean Julie Chapt, marquis de Rastignac, et de Françoise Charlotte Ernestine de La Rochefoucaul-Doudeauville, mariée en 1817 avec François XII Marie-Auguste-Émilien de La Rochefoucauld, prince de Marcillac puis duc de Liancourt.","architecture":"Clermont-Dessous,  le logis a été remanié au XVe siècle par un co-seigneur, peut-être Lérôme-Patrice de Monorgon, co-seigneur mort en 1506, ou Jacques Yzalguier. Un second corps de logis a été construit au Nord, à la fin du XVe siècle ou au début du XVIe siècle; les façades d'anciennes maisons, notamment au village de Saint-Médard et au hameau de Bessou, ont conservé des fenêtres à meneaux pouvant dater de cette époque. Le château, tombé en ruine au  XIXe siècle, puis partiellement restauré, est inscrit au titre des monuments historiques le 20 juin 1950.     le château de Rastignac (24), demeure de style néo-palladien qui aurait servi de modèle au palais présidentiel américain.                                                   Le manoir à deux tourelles  en possession de la famille de Redon-Monplaisir de la Chapelle sous l'Ancien Régime (noble Marc-Antoine de Redon-Monplaisir, écuyer, chevalier de Saint-Louis, est maire de Port-Sainte-Marie en 1811) , à la tête d'un important domaine agricole implanté dans la vallée de la Garonne.","habitants":"Famille de la Mothe de Pardaillan                         Lérôme-Patrice de Monorgon,                             Famille de Redon-Monplaisir\r\n        \r\n        \"","divers":"Vestiges du château du Bousquet à Clermont-Dessous","gps":"","images":["../../jctruffet.com/image/image_47/47_Clermont_Dessous_1.jpg","../../jctruffet.com/image/image_47/47_Clermont_Dessous_2.jpg","../../jctruffet.com/image/image_47/47_Clermont_Dessous_3.jpg","../../jctruffet.com/image/image_47/47_Clermont_Dessous_4.jpg","../../jctruffet.com/image/image_47/47_Clermont_Dessous_5.jpg","../../jctruffet.com/image/image_47/47_Clermont_Dessous_6.jpg","../../jctruffet.com/image/image_47/47_Clermont_Dessous_7.jpg","../../jctruffet.com/image/image_47/47_Clermont_Dessous_8.jpg"]},"Consult_chateau_formulaire2b1b":{"id":"Consult_chateau_formulaire2b1b","dept":"47","canton":"Layrac","commune":"Clermont-Soubiran","nom":"Clermont_Soubiran","type":"Château","periode":"XIII","histoire":"CLERMONT-SOUBIRAN, le château appartenait aux Durfort dès le XIe siècle. Les Durfort étaient des grands seigneurs du comté de Toulouse dès le XIe siècle. On trouve un Bernard de Durfort, surnommé Gratapala, possesseur de la terre de Clermont en Agenais et probablement origine des différentes branches des Durfort en Agenais. Bernard de Durfort, seigneur de Clermont en 1091, et son frère Guillaume sont cités dans l'acte de restitution de l'abbaye Saint-Martin-du-Puy à l'abbé et aux religieux de la Grâce, en 1093, par Bertrand de Durfort, auprès de Narbonne. Il affranchit de tous droits Matfredus, abbé de Saint-Maurin en Agenois, de tous les droits pendant le marché de Clermont. En 1262, Raimond-Bernard de Durfort, conjointement avec le baron Arnaud de Durfort, à l'origine de la branche des Durfort-Duras, accordent des coutumes aux vassaux de son château de Clermont-Soubiran. Dans l'acte d'hommage rendu à l'évêque d'Agen en 1263 est cité le château de Clermont-Dessus. La tradition voulait qu'à chaque entrée à Agen du nouvel évêque, il était transporté dans une chaise entre la collégiale Saint-Caprais et la cathédrale Saint-Étienne par les nobles seigneurs de Clermont-Dessus, du Fossat, de Beauville, de Madaillan et de Fumel.","architecture":"Le château est sur un soubassement ancien pouvant être antérieur au  XIIe siècle et comprenant le donjon, l'escalier et la salle dite des gardes. La salle des gardes présente des voûtes datant de la fin du XVIIe siècle ou du début du XVIIIe siècle. Sur la terrasse sud, le château se présente comme un gros bloc de bâtiment dans lequel a été ajouté, au XVIIIe siècle, un ensemble d'appartements sur trois niveaux. Le donjon est devenu la cage d'un grand escalier.\r\nLe château a été inscrit au titre des M.H  le 25 mai 1960.","habitants":"Famille de Bernard de Durfort\r\n        \r\n        \"","divers":"Le château de Clermont de Soubiran avec ses remparts","gps":"","images":["../../jctruffet.com/image/image_47/47_Clermont_Soubiran_1.jpg","../../jctruffet.com/image/image_47/47_Clermont_Soubiran_2.jpg","../../jctruffet.com/image/image_47/47_Clermont_Soubiran_3.jpg","../../jctruffet.com/image/image_47/47_Clermont_Soubiran_4.jpg"]},"Consult_chateau_formulaire3dc2":{"id":"Consult_chateau_formulaire3dc2","dept":"47","canton":"Penne d","commune":"Engayrac","nom":"Combebonnet","type":"Château","periode":"XIII-XV","histoire":"Dans la commune le château de Combebonnet et à Beauville au nord celui de Galaup chambres d'hôtes de la famille Bevilaigne.                                     COMBEBONNET Louis de Beauville de 1445 à 1484, fils de Pons de Beauville de 1410 à 1472, seigneur de Castelsagrat, est de Combebonnet. Castelbonnet appartient à Pons de Beauville en 1450. Puis Robert de Beauville de 1457 à 1514 qui de son mariage avec Hélène d'Escode a une fille, Jeanne de Beauville, dame de Combebonnet en 1508, qui s'est mariée avec Jean de Narbonne, seigneur de Saint-Thibéry mort en 1557. De cette union est né Gabriel de Narbonne ( 1525-1590) d'un premier mariage et Catherine de Narbonne, d'un second. Gabriel de Narbonne, seigneur de Salelles et de Combebonnet, s'est marié avec Germaine de Sèvre dont il a eu Paule de Narbonne, héritière de son père. Cette dernière s'est mariée avec Jean de Narbonne et de Lomagne, marquis de Fimarcon qui ont eu quatre enfants. Maximilien de Narbonne est seigneur de Talairan, de Combebonnet et de Montlau, marié à Isabeau de Cours, dame de Clermont près de Port-Sainte-Marie, qui ont eu Jean de Narbonne, seigneur de Clermont, de Combebonnet et de Montlau, lui-même marié à Anne Bouchard d'Aubeterre, d'où Louis de Narbonne (1635-1705), dit le comte de Clermont, seigneur de Montfort et Combebonnet qui a eu, de son mariage avec Madeleine de Souillac d'Azerac, Marie-Anne de Narbonne, dame de Clermont. Elle s'est mariée en avril 1702 avec Jean-Gabriel Chapt, comte de Rastignac, baron de Luzech, reçu page du roi en sa grande écurie en 1693, frère de Louis-Jacques Chapt de Rastignac, archevêque de Tours. Il est mort sans postérité en 1755, son épouse était morte en 1703.","architecture":"Le château primitif, assez petit, avait la forme d'un triangle rectangle, dont les angles Est et ouest étaient surmontés d'échauguettes en porte-à-faux, deux de ces côtés étaient bâtis sur un enrochement qui augmentait ses défenses, le troisième côté était le point faible, face au plateau. Le constructeur avait prévu d'augmenter ses défenses en donnant la possibilité de monter un hourdage en bois pour protéger la base du rempart. Ce petit château doit dater du XIIIe siècle. Puis on a ajouté une tour carrée à l'angle nord armée de meurtrières en croix pattée. Ce type de meurtrière apparaît dans les châteaux gascons au XIIIe siècle.\r\nLe château a été agrandi et remanié à la fin du XVe siècle ou au début du  XVIe siècle. Dans l'angle sud-ouest a été aménagé un escalier à vis  dont les marches  sont en bois. C'est probablement à cette époque qu'ont été édifiées la chapelle et l'enceinte pour protéger les quelques maisons blotties près du château.\r\nAu XVIIe siècle le château a été encore agrandi du côté nord et il a pris son aspect actuel. On a construit deux portails en plein cintre donnant accès à la cour et ornés de colonnes. Au fond de la cour, le portail de l'écurie porte la date de 1643. À l'ouest, à quelques pas du château se trouve une chapelle à chevet plat de quatre travées, voûtées de croisées d'ogives. Des fauteurs de troubles dans le pays, en 1790, ont menacé de brûler le château. Le château a été inscrit au titre des monuments historiques en 1964 et le donjon est classé en 1988.","habitants":"Famille de  Louis de Beauville                                      Famille Bevilaigne\r\n        \r\n        \"","divers":"A Combebonnet celui de Combebonnet grav de 1 à 4, de Galaup- Beauville grav 5 et 6.","gps":"","images":["../../jctruffet.com/image/image_47/47_Combebonnet_1.jpg","../../jctruffet.com/image/image_47/47_Combebonnet_2.jpg","../../jctruffet.com/image/image_47/47_Combebonnet_3.jpg","../../jctruffet.com/image/image_47/47_Combebonnet_4.jpg","../../jctruffet.com/image/image_47/47_Combebonnet_5.jpg","../../jctruffet.com/image/image_47/47_Combebonnet_6.jpg"]},"Consult_chateau_formulaire2a4a":{"id":"Consult_chateau_formulaire2a4a","dept":"47","canton":"Villeneuve sur Lot","commune":"Cuzorn","nom":"Cuzorn","type":"Vestiges","periode":"XIII-XV","histoire":"CUZORN, surplombé par une masse rocheuse. Pour se faire, ils ont réussi à construire, au XIIIe siècle tours, courtines. Castrum dépendant de la baylie de Tournon en 1271, entre les mains dune dizaine de co-seigneurs. Le château assiégé fut rasé en 1442 par le sénéchal du Quercy. Reconstruction durant la 2e moitié du XVe siècle dune tour et du logis seigneurial. En 1790, le fermier de la seigneurie de Cuzorn est Pierre Lamarque Il habite le château depuis quelques années et son bail a été renouvelé en 1788. De nouveau détruit partiellement en 1794. Les deux surs Bellecombe ont réussi à conserver la propriété des terres jusqu'au Directoire. Elles les cèdent en viager le 2 juillet 1798 au cadet de leurs neveux, Jean Baptiste Frontin, habitant de Layrac. dans cette famille jusqu'au dernier Pierre Guillaume Frontin meurt à Tonneins le 16 novembre 1823. Sa veuve va conserver la métairie mais le château ne l'intéresse pas. Elle vend le 25 octobre 1829 à Jean Sican fils, forgeron à Cuzorn, ce qui reste du château. Jean Sican revend le château à Henri Sérougne le 6 août 1843.  Dans un acte passé le 6 mars 1866, la Congrégation des Filles de Jésus de Vaylats ont acheté ce qui restait du château.  Le château est acheté en 1953 par Georges Rastel, préfet honoraire, trésorier payeur général de la Manche. Georges Rastel et sa famille y ont fait des travaux importants pour transformer le site.  Le château a été acheté en 1995 par Thierry Delrieu. Les ruines proprement dites du château sont devenues la propriété de la commune en 1996. La château a été inscrit au titre des M.H en 1950.","architecture":"Un village de fond de vallée surplombé par une masse rocheuse soigneusement aménagée en éperon barré par nos ancêtres pour contrôler le secteur. Pour se faire, ils ont réussi à construire sur ces rochers, au XIIIe siècle tours, courtines.  Un invraisemblable puits à deux niveaux de puisage. Détruit partiellement en 1794. Le petit village tranquille sest implanté après, au pied de ces ruines, utilisant lénergie de La Lémance. Ce sont les ruines du château reconstruit en 1603 puis démantelé sous la Révolution que les visiteurs peuvent encore admirer aujourd'hui, notamment la fameuse tour hexagonale dite tour de Nérac. C'est parce que sa démolition risquait d'endommager les maisons en contrebas que cette tour subsiste toujours aujourd'hui.  \r\nReste encore cependant une énigme à solutionner ; le livre ne perce pas le secret du nom de Cuzorn dont personne n'a encore trouvé l'origine. Cuzorn n'a pas encore livré tous ses mystères.","habitants":"Famille de  Pierre Lamarque\r\n        \r\n        \"","divers":"Vestiges du château de Curzon","gps":"","images":["../../jctruffet.com/image/image_47/47_Cuzorn_1.jpg","../../jctruffet.com/image/image_47/47_Cuzorn_2.jpg","../../jctruffet.com/image/image_47/47_Cuzorn_3.jpg","../../jctruffet.com/image/image_47/47_Cuzorn_4.jpg","../../jctruffet.com/image/image_47/47_Cuzorn_5.jpg"]},"Consult_chateau_formulairea7a8":{"id":"Consult_chateau_formulairea7a8","dept":"47","canton":"Lavardac","commune":"Damazan","nom":"Damazan","type":"Château","periode":"XIV-XVI","histoire":"Trois châteaux à Damazan celui de Bagnoque, de Boffet, de Damazan, des Muges (voir article)et de Labarthe du XIVe siècle, ancienne résidence du Maréchal Blaise de Montluc, et au sud-est à deux kilomètres à St-Léger le manoir de Grenier gîtes de France de la famille Breton de Grelle.              DAMAZAN  Damazan nétait pas une bastide ordinaire  mais une forteresse. Tout autour du château Comtal sélevait une enceinte de murailles ou remparts, qui navait que 4 ouvertures, une vers cha
