 par l'architecte bordelais Gustave Alaux (1816-1882) sur les indications d'Eugène Viollet-le-Duc avec ajouts de créneaux et de hourds.  Il est entouré de deux tours rondes à but décoratif et non défensif. Lune delle est néanmoins surmontée de créneaux et de mâchicoulis. Pas d'information historique pour les châteaux de Layrac de Lagravade de Mages et de Cavagnac.","architecture":"Goulens, L'édifice se compose d'un corps de logis rectangulaire à pignon aigu, doté dune superbe charpente flanqué au sud de deux grosses tours rondes et au nord d'une tour octogonale contenant un escalier à vis. Les trois tours ont été décapitées à la Révolution. Deux de ces tours ont été reconstruites en 1878, lors de la restauration réalisée par Allaux disciple de Viollet-le-Duc. La façade sud, avec ses fenêtres à meneaux et la porte d'entrée, n'a pas été retouchée. Des communs sont établis au nord et déterminent une cour intérieure. Sur les bâtiments Est de ces communs, une ancienne porte défensive, pourvue d'une bretèche, a été transformée en pigeonnier à colombage. A l'intérieur, un vestibule donne sur deux grandes pièces, la salle à manger avec un plafond à caissons et le salon avec sa cheminée et ses murs recouverts au-dessus des boiseries des peintures sur toile représentant des scènes de chasse dans un style moyenâgeux.\r\nLe château a été inscrit au titre des M.H le 21 septembre 1921.                                                             Layrac, du XIIe siècle, sagit dune tour à créneaux peut-être contemporaine de lédification du château de Layrac, mais plus probablement, construite lors des remaniements du XVe siècle. La tour fait partie du système défensif du château. En effet, pendant les guerres de Religion, virulentes dans la région, Layrac est une place forte protestante relativement importante qui suscite des convoitises.","habitants":"Famille de Goulens                                               Famille Barbier de La Serre\r\n        \r\n        \"","divers":"Château de Layrac, de Goulens grav 4 et 5, de Cavagnac grav 6 de Mages grav 7 et 8 e Bajolles grav 9.","gps":"","images":["../../jctruffet.com/image/image_47/47_Layrac_1.jpg","../../jctruffet.com/image/image_47/47_Layrac_2.jpg","../../jctruffet.com/image/image_47/47_Layrac_3.jpg","../../jctruffet.com/image/image_47/47_Layrac_4.jpg","../../jctruffet.com/image/image_47/47_Layrac_5.jpg","../../jctruffet.com/image/image_47/47_Layrac_6.jpg","../../jctruffet.com/image/image_47/47_Layrac_7.jpg","../../jctruffet.com/image/image_47/47_Layrac_8.jpg","../../jctruffet.com/image/image_47/47_Layrac_9.jpg"]},"Consult_chateau_formulairefcc4":{"id":"Consult_chateau_formulairefcc4","dept":"47","canton":"Nérac","commune":"Moncrabeau","nom":"Lescout_La_Hitte","type":"Château","periode":"XIV-XVIII","histoire":"LA-HITTE Au cur du vignoble de Buzet, dans la cour à arcades d'une chartreuse du XVIIIe siècle , le château la Hitte vous accueille dans un bâtiment viticole restauré ouvrant sur une terrasse couverte avec vue sur les vignes. L'hébergement a été aménagé dans la première maison de La Hitte datant du XVIe siècle devenue un chai à la construction de la chartreuse dans les années 1770.                             LESCOUT, l'ancien château de Lescout, qui aurait appartenu à la famille d'Aux de Lescout, a été démoli par Mongommery en 1569. La reconstruction du château a été réalisée dans le dernier tiers du XVIe siècle, pour Jean de Mathisson, seigneur de la maison noble de Lescout, secrétaire d'Henri III de Navarre et avocat au parlement.\r\nVilla romaine de Bapteste, classée au titre des M.H en 1875, domaine de Lescout gites de Cécile et Michel Furlan.","architecture":"LA-HITTE, maintenant les bâtiments agricoles ont déménagé hors des murs de la cour et vous pourrez profiter du charme minéral des vieilles pierres. De l'autre côté de la chartreuse le jardin clos de murets en pierres sera une alternative verdoyante et ombragée pour vos réceptions. Ces différentes possibilités s'offrent à vous pour donner un inimitable cachet.    LESCOUT , les dépendances ont été remaniées et augmentées d'une grange ou chai au sud dans la première moitié du XIXe siècle. Deux ailes en retour du bâtiment figurant sur les plans cadastraux de 1808 et 1842 ont disparu. Le corps de logis sud, ruiné, a été en partie reconstruit au milieu du XXe siècle. La cour rectangulaire est fermée à l'ouest par des dépendances, à l'est par le logis, au sud et au nord par des murs; elle était divisée par un fossé entre deux pavillons séparant la cour du logis de la basse cour. Le logis est composé d'un corps pavillonnaire au nord, avec un toit en tuile plate partiellement couvert de voûtes d'arêtes au rez de chaussée et à l'étage de soubassement, et d'une aile au sud abritant l'escalier et des pièces reconstruites. Pigeonnier polygonal.","habitants":"Famille de Ladevèze de Charrin                             Famille de Laverny                                                    Famille d'Aux de Lescout\r\n        \r\n        \"","divers":"Château de la Hitte et de Lescout","gps":"","images":["../../jctruffet.com/image/image_47/47_Lescout_La_Hitte_1.jpg","../../jctruffet.com/image/image_47/47_Lescout_La_Hitte_2.jpg"]},"Consult_chateau_formulaire07c0":{"id":"Consult_chateau_formulaire07c0","dept":"47","canton":"Aiguillon","commune":"Aiguillon","nom":"Lunac_Ranse","type":"Château","periode":"XIII-XVI","histoire":"Deux châteaux à Lunac celui de Lunac et celui de Ranse.                                                                          LUNAC,  la construction du château Lunac date du XIIIe, XVe et XVIe siècle. Castrum mentionné au XIIIe siècle en possession des seigneurs de Lunac, dont l'habitat aristocratique,  est implanté sur les ruines du vicus antique . Le château passe au XVe siècle dans les possessions des Montpezat, seigneurs d'Aiguillon, puis dans celles des Malvin de Montazet au début du XVIe siècle, à l'occasion du mariage de Jeanne de Montpezat avec Charles de Malvin, gouverneur de la ville mort en 1530. La seigneurie est vendue à Antoine du Gasquet en 1739, qui la laisse à sa nièce Marguerite Dorothée Nebout de Riberot, fille du lieutenant général de la sénéchaussée d'Aiguillon, avant de la transmettre à son tour à la famille Merle de Massonneau, jusqu'à sa vente en 1884. aujourd'hui à Henri le Moine.                                                         RANSE,  domaine en possession des de Ranse, ancienne famille patricienne gasconne, peut-être depuis la deuxième moitié du XVIe siècle, époque où Guillaume de Ranse acquiert le domaine dit de la Tour de Rance à Bourran,  château du XIXe siècle.","architecture":"LUNAC,  le mur du Ravelin est une fortification récente de la ville érigé à l'est du bourg au XVe siècle. Ce mur était destiné à la protection du secteur est, une partie de l'actuel \"quartier du Lot\", après qu'un des bras du Lot qui passait au bas d'Aiguillon, se fut retiré. Ce mur était flanqué de deux tours à ses extrémités. L'une d'entre elles, à l'extrémité sud du mur, a servi d'assise pour l'édification de la sénéchaussée d'Aiguillon au XVIIIe siècle. Le château Lunac qui occupe l'angle nord-ouest de l'enceinte de la ville du XIIe siècle, se compose de deux parties distinctes, construites au XIIIe siècle et remaniées par la suite : un corps de logis avec tour d'escalier circulaire côté cour (adjonction de la fin du XVe siècle ou du début du XVIe siècle) qui s'articulait sur une aile en retour d'équerre détruite après 1826 ; les anciens communs, réparés à la fin du  XVe siècle. La plupart des ouvertures sur cour ont été remaniées aux XVIIIe et XIXe siècles.                                                           Ranse, Les constructions actuelles, organisées sur une cour fermée, ne semblent  pas antérieures au milieu du XVIIe siècle, en particulier le portail d'accès à la cour et le pigeonnier sur l'angle sud-ouest. Le logis qui occupe la partie  nord-ouest de l'ensemble, présente de grandes arcades, dont plusieurs ont été murées.\r\n La construction d'une tour circulaire d'escalier dans l'angle nord-est se fera au XIXe siècle. Les parties agricoles et des logements qui ferment la cour sur trois côtés. Une glacière construite à l'ouest à l'écart des enclos à une date indéterminée complète l'équipement domestique du manoir.","habitants":"Famille des Malvin de Montazet                                    Famille de Guillaume de Ranse\r\n        \r\n        \"","divers":"Château de Lunac et de Ranse à Aiguillon","gps":"","images":["../../jctruffet.com/image/image_47/47_Lunac_Ranse_1.jpg","../../jctruffet.com/image/image_47/47_Lunac_Ranse_2.jpg","../../jctruffet.com/image/image_47/47_Lunac_Ranse_3.jpg","../../jctruffet.com/image/image_47/47_Lunac_Ranse_4.jpg","../../jctruffet.com/image/image_47/47_Lunac_Ranse_5.jpg","../../jctruffet.com/image/image_47/47_Lunac_Ranse_6.jpg","../../jctruffet.com/image/image_47/47_Lunac_Ranse_7.jpg","../../jctruffet.com/image/image_47/47_Lunac_Ranse_8.jpg"]},"Consult_chateau_formulaire1596":{"id":"Consult_chateau_formulaire1596","dept":"47","canton":"Aiguillon","commune":"Madaillan","nom":"Madaillan","type":"Tour-Vestiges","periode":"XIII-XIV","histoire":"A Madaillan le château de Madaillan, le manoir de Boissonade et de Monplaisir,    pas d'images pour ces deux derniers.                                                        MADAILLAN, il fut construit de 1285 à 1289, édifié pour de puissants et nobles Agenais, les du Fossat Raymond-Bernard du Fossat, évêque d'Agen. Des agrandissements datent de la fin du XIVe siècle. En 1405 le château passe par alliance à la famille de Montpezat, succèdent Alain de Foix, puis les Honorat de Savoie qui conservent la forteresse jusqu'en 1580. Durant les guerres de Religion, le château de Madaillan servant de camp retranché aux protestants, est assiégé par Blaise de Monluc, en janvier 1575. Mais, mal équipé, Monluc est obligé de lever le siège devant l'arrivée du protestant Guy de Montferrand, seigneur de Langoiran, venu secourir les assiégés. resté Longtemps abandonné il  a commencé à être restauré au XIXe siècle par le nouveau propriétaire Jules Bourousse de Laffore, au XXe siècle monsieur Van de Wiele font recouvrir la salle haute et aujourd'hui, il est habité par monsieur Jacques Aurein.  BOISSONNADE, possède un pigeonnier-porche qui date de 1677. Le logis fut très remanié en 1785.      MONPLAISIR est un manoir bâti à Madaillan, il est construit au début du XVIIe siècle et a été très modifié depuis.","architecture":"Le château de Madaillan qui domine les petites vallées des ruisseaux de Bourbon et de Saysset, est séparé du plateau à l'est par un large fossé, ce château partagé entre une partie presque ruiné et une tour de plan carrée à quatre niveaux crénelés  sous un toit à quatre pans presque plats, on pense qu'il fut construit vers 1285-1289, édifiée pour de puissants et nobles Agenais les du Fossat dont les armoiries sont sculptées sur la cheminée du rez-de-chaussée de la grosse tour. Des agrandissements datent de la fin du  XIVe siècle.  Longtemps abandonné, le château a commencé à être restauré au XIXe. Aujourd'hui, il est habité et se visite.","habitants":"Famille de Montpezat \r\n        \r\n        \"","divers":"Vestiges et tour du château de Madaillan","gps":"","images":["../../jctruffet.com/image/image_47/47_Madaillan_1.jpg","../../jctruffet.com/image/image_47/47_Madaillan_2.jpg","../../jctruffet.com/image/image_47/47_Madaillan_3.jpg","../../jctruffet.com/image/image_47/47_Madaillan_4.jpg","../../jctruffet.com/image/image_47/47_Madaillan_5.jpg","../../jctruffet.com/image/image_47/47_Madaillan_6.jpg","../../jctruffet.com/image/image_47/47_Madaillan_7.jpg","../../jctruffet.com/image/image_47/47_Madaillan_8.jpg"]},"Consult_chateau_formulairef8d8":{"id":"Consult_chateau_formulairef8d8","dept":"47","canton":"Casteljaloux","commune":"Grézet-Cavagnan","nom":"Malvirade","type":"Château","periode":"XV","histoire":"MALVIRADE, en 1311, à la demande du roi d'Angleterre une enquête est faite sur les barrages par Guillaume Cazes, juge d'Agen. Pour accaparer les droits de péage, les seigneurs des environs ont fait construire à proximité des édifices fortifiés. Le roi ne récupérera jamais tous ses droits sur ces barrages. La guerre de Saint-Sardos puis la guerre de cent -ans va rendre les possesseurs de ces tours de précieux alliés, pour l'un ou l'autre adversaire. En 1372, à la demande du duc d'Anjou, la maison forte appartient alors à la famille La Goutte, seigneurs de La Poujade, mis en défense par Raymond de la Pugeade. Un siècle plus tard, Malvirade sera une des maisons d'Henry de Navarre et vivra les huit guerres de religion.  Après la guerre de cent-ans Malvirade est inféodé par la famille d'Albret à Pierre de Sacriste qui entreprenne la construction du château tel qu'il est aujourd'hui, mais endommagé à la Révolution restauré au XIXe siècle par le baron de la Valette, passe à la famille de Fumel jusqu'en 1950.  Le château appartient depuis 1990, à Joël et Françoise Cuvillier qui le transforme en chambres d'hôtes et séminaires. Le château de Malvirade est inscrit aux M.H. depuis 1995.","architecture":"Malvirade, a l'origine, il n'y avait qu'une tour, construite sur ordre d'Aliénor d'Aquitaine face aux falaises des Roques-Gardillou, il se présente comme un corps de logis dont la façade donnant sur la cour d'honneur  s'encadre entre un gros pavillon et une tour carrée elle même adossée à une  tour plus importante en pierre au premier niveau et en brique au-dessus, isolée par un fossé d'une enceinte en brique, et précédée d'un pont-levis. Dans la seconde moitié du XVe siècle, un escalier à vis est construit dans la cour, il n'y avait qu'une tour. L'ensemble des bâtisses sera érigé ou renové  témoin de la première Renaissance.  Le château  a subi plusieurs agrandissements et d'aménagements successifs en limite de ses territoires guyennais. Elle est agrandie pendant la première moitié du XVIe siècle. Une galerie de style Renaissance est construite sur la cour, probablement pour Jean de La Goutte, secrétaire du Roi. Le deuxième étage est tronqué et les percements sont modifiés au XIXe siècle. Une grange-étable est construite sur l'arrière du château. Son aspect actuel, dans un style versaillais et l'aménagement de Jardins à la Française après le comblement de ses douves, qui datent du XVIIe siècle. Au XVIIe siècle une aile est revisitée et des jardins à la française voient le jour.","habitants":"Famille La Goutte\r\n        \r\n        \"","divers":"Château de Malvirade","gps":"","images":["../../jctruffet.com/image/image_47/47_Malvirade_1.jpg","../../jctruffet.com/image/image_47/47_Malvirade_2.jpg","../../jctruffet.com/image/image_47/47_Malvirade_3.jpg","../../jctruffet.com/image/image_47/47_Malvirade_4.jpg","../../jctruffet.com/image/image_47/47_Malvirade_5.jpg","../../jctruffet.com/image/image_47/47_Malvirade_6.jpg","../../jctruffet.com/image/image_47/47_Malvirade_7.jpg","../../jctruffet.com/image/image_47/47_Malvirade_8.jpg"]},"Consult_chateau_formulaireff1b-2":{"id":"Consult_chateau_formulaireff1b-2","dept":"47","canton":"Marmande","commune":"Marcellus","nom":"Marcellus","type":"Château","periode":"XVI","histoire":"Deux châteaux à Marcellus celui de Marcellus, de Cucumont, de Longeville  et Bouynot à une dizaine de kilomètres à l'ouest à Saint-Sauveur de Meilhan,  pas d'information historique pour ces derniers.      MARCELLUS, un premier château a été édifié sur le site au  XIVe siècle, peut-être par la famille d'Albret qui possède la seigneurie depuis 1383.\r\nEn 1581 Henri de Navarre vend le château-fort à Aymeric de Gasq, conseiller au parlement de Bordeaux, que la famille conserve jusqu'au début du XVIIIe siècle. Le château est alors reconstruit à la limite entre le XVIe siècle et le XVIIe siècle. Au début du XVIIIe siècle le château devient la propriété de la famille Demartin du Tyrac  de Marcellus. En 1773, Richard-François Bonfin, architecte de Bordeaux, a dressé les plans et le devis pour le comte André Joseph de Martin du Tyrac (1745-1789), mari de Suzanne Angélique de Piis-Beauséjour qui avait désiré construire un château à cet endroit. Il a surveillé les travaux commencés en octobre 1773 par le maître-maçon Joseph Cazade dit Jolycur. Les travaux ont été terminés en octobre 1775, après avoir détruit l'ancien château sauf les étages en soubassement. Marcellus devient ensuite la propriété d'une branche de la famille de Chérade de Montbron à la suite de l'union de Louise de Martin du Tyrac de Marcellus, fille de Paul, comte de Marcellus avec Louis-Jean-Henri de Chérade de Montbron. Il est de nos jour la propriété de la SCI du château de Marcellus.                           COCUMONT la Seigneurie  appartenant aux seigneurs de Mauvezin puis à la famille de Gasq.","architecture":"Le château actuel de Marcellus a quatre pavillons cantonnés, et les vestiges d'une plate-forme, dessiné par l'architecte Dufart de Bordeaux, forme un plan en U avec le logis et deux pavillons à un étage carré. En 1772, les deux pavillons septentrionaux en demi hors uvre sont reliés par une terrasse soutenue par des arcades.  La ferme a également un plan régulier en U en face de laquelle des écuries et un château d'eau viennent refermer la cour. Le bâtiment est en pierres de taille et le toit à long pans est composé de tuiles. Le nouveau château a été construit en réemployant des matériaux, avec une clôture autour des anciens pavillons qui ont été transformés, l'un en chapelle, l'autre en bibliothèque. Les peintures du XVIIIe siècle sont un travail du peintre Joseph Antoine et sont achevées en 1775. Le château, les pavillons d'entrée, les communs ont été inscrits aux M.H le 29 août 1986.  COCUMONT,  Bastide créée en 1255 par les Anglais.    Deux châteaux celui des Baron et celui de Bouynot à six kilomètres au nord ouest à Saint-Sauveur transformé en chambres d'hôtes.","habitants":"Famille Demartin du Tyrac  de Marcellus            Cocumont de la famille de Gasq        \r\n        \r\n        \"","divers":"Châyeau de Marcellus, de Cocumont grav 6 et 7 et de Bouynot grav 8","gps":"","images":["../../jctruffet.com/image/image_47/47_Marcellus_1.jpg","../../jctruffet.com/image/image_47/47_Marcellus_2.jpg","../../jctruffet.com/image/image_47/47_Marcellus_3.jpg","../../jctruffet.com/image/image_47/47_Marcellus_4.jpg","../../jctruffet.com/image/image_47/47_Marcellus_5.jpg","../../jctruffet.com/image/image_47/47_Marcellus_6.jpg","../../jctruffet.com/image/image_47/47_Marcellus_7.jpg","../../jctruffet.com/image/image_47/47_Marcellus_8.jpg"]},"Consult_chateau_formulairedf44":{"id":"Consult_chateau_formulairedf44","dept":"47","canton":"Marmande","commune":"Marmande","nom":"Marmande_47","type":"Bastide","periode":"XII-XIV","histoire":"MARMANDE, au départ simple château, devient une ville, quand Richard Cur de Lion lui octroie en 1182, une charte de coutumes et de privilèges. Les cinq siècles qui suivirent, placèrent Marmande au cur des tourmentes de l'histoire : croisade contre les Cathares, guerre de cent ans, peste et guerres de religion. Cette petite tour est un ancien poste de guet sur les remparts fermant vers le sud la vieille ville, en surplomb du lit de dame Garonne, sur ce chemin de ronde du Caillou. Les substructures de la tour sont probablement un saillant de l'enceinte du XIVe siècle ; elle parait dater dans ses parties hautes du XVIIIe siècle. Ici on la nommerait aussi tour Henri I,   Marmande porte sur son blason trois lys, hommage du roi de France à la fidélité de la ville pour s'être toujours refusée aux anglais.","architecture":"Malgré son histoire tumultueuse, la cité a conservé les vestiges d'une histoire quasi millénaire. Ainsi entre le XVIIe et le XVIIIe siècle, Marmande voit éclore une quantité de couvents, qui lui vaut le surnom de Marmande la Sainte. Des édifices religieux construits à cette époque, il reste notamment la chapelle de Saint Benoît, un édifice baroque qui faisait partie du couvent des Bénédictines et qui propose un plafond aux motifs exubérants en contraste avec le classicisme d'une sobre façade. Dernier vestige des fortifications de la cité médiévale, la Tour du passeur abritait le préposé qui guettait les voyageurs désireux de franchir le fleuve. L'église de style anglo-normand Notre-Dame de Marmande, fut bâtie entre le XIIIe et le XVe siècle et restaurée de nombreuses fois au cours des siècles suivants. Créé en 1950, le jardin du cloître est aménagé en jardin classique d'art topiaire et s'inspire de ceux du jardin du château de Langeais.","habitants":"Seigneur local\r\n        \r\n        \"","divers":"Patrimoine de Marmande","gps":"","images":["../../jctruffet.com/image/image_47/47_Marmande_47_1.jpg","../../jctruffet.com/image/image_47/47_Marmande_47_2.jpg","../../jctruffet.com/image/image_47/47_Marmande_47_3.jpg","../../jctruffet.com/image/image_47/47_Marmande_47_4.jpg","../../jctruffet.com/image/image_47/47_Marmande_47_5.jpg","../../jctruffet.com/image/image_47/47_Marmande_47_6.jpg"]},"Consult_chateau_formulaire14a1":{"id":"Consult_chateau_formulaire14a1","dept":"47","canton":"Nérac","commune":"Espeins","nom":"Mazelieres","type":"Château","periode":"XVII","histoire":"MAZELIERES, en 1675, Paul de Mazelières, gouverneur d'Albret, achète le fief d'Espiens au duc de Bouillon et fait élever ce château, propriété de la famille de Mazelières jusqu'à la Révolution, le château est acheté en 1837 par la famille Jauge à laquelle vont succéder, au XXe siècle, différents propriétaires. Devenu  château viticole du XVII siècle  est placé au centre d'une région chargée d'histoire, à 10 km de Nérac où se situe le château d'Henry IV Roi de Navarre. Niché au cur du vignoble de Buzet, à la lisière du terroir d'Armagnac, le château de Mazelières offre à l'appellation Buzet  l'un de ses vins les plus prestigieux, médaillé d'or en 2007 et placé dans le top 10 de l'appellation.","architecture":"Château Viticole du XVII siècle érigé en terre de Gascogne, le château de Mazelières est placé au centre d'une région chargée d'histoire, à 10 km de Nérac où se situe le château d'Henry IV Roi de Navarre. Niché au cur du vignoble de Buzet, à la lisière du terroir d'Armagnac.Depuis 1991 le dernier propriétaire a entrepris une restauration du bâtiment en redonnant aux pièces du rez de chaussée leur volume d'origine mais a modifié l'étage de comble; percement d'oculus sur la façade sud de l'aile nord et d'une fenêtre carrée à l'étage supérieur du pavillon central, l'entrée de la charpente a été rehaussé. Le corps de logis principal, situé sur l'aile nord, est composé d'un bâtiment rectangulaire divisé par trois pavillons, placés au centre et à chaque extrémité de l'aile, et par deux tours en pavillons placées sur la façade sud de l'aile nord, les quatre ailes forment une cour fermée; au centre de l'aile sud, l'accès au château se fait par le pigeonnier porche ; toit en pavillon et en tuiles plates pour le pigeonnier et les tours.","habitants":"Famille de Mazelières Famille Jauge\r\n        \r\n        \"","divers":"Château de Mazelières","gps":"","images":["../../jctruffet.com/image/image_47/47_Mazelieres_1.jpg","../../jctruffet.com/image/image_47/47_Mazelieres_2.jpg","../../jctruffet.com/image/image_47/47_Mazelieres_3.jpg","../../jctruffet.com/image/image_47/47_Mazelieres_4.jpg","../../jctruffet.com/image/image_47/47_Mazelieres_5.jpg","../../jctruffet.com/image/image_47/47_Mazelieres_6.jpg"]},"Consult_chateau_formulaire81a9":{"id":"Consult_chateau_formulaire81a9","dept":"47","canton":"marmande","commune":"Miramont de Guyenne","nom":"Miramont_Guyenne","type":"Château","periode":"XIII","histoire":"Plusieurs châteaux à Miramont, celui de Miramont, de Bouilhaguet, de Lescaut et vestiges du châtelet de Jeanne d'Albret.                                                    MIRAMONT de Lauzun, c'est sous l'administration d'Alphonse de Poitiers, frère de Saint Louis, que Miramont connut une des périodes les plus fastes de son histoire. Redevenue anglaise en 1259, Miramont était, déjà à cette époque, une bourgade paisible et industrielle. Durant la guerre de cent Ans, la ville fut plusieurs fois dévastée et ses habitants se dispersèrent dans la campagne voisine. En 1453, lorsque les Français eurent reconquis la Guyenne, Miramont se releva peu à peu de ses ruines et en 1494 Charles VIII rétablit son ancien statut de bastide et autorisa l'élection de deux consuls chargés de lever et répartir l'impôt.","architecture":"Comme beaucoup de bastides de la région, Miramont  a un plan en damier. Elle forme un quadrilatère pratiquement parfait et ses quatre rues principales se coupent aux quatre coins de la place centrale à arcades qui abritaient les étalages des marchands du Moyen Âge. Une place carrée et bordée d'arcades, les cornières, en occupait le centre. Là se trouvait la halle dont le premier étage servait de maison commune. Les rues se coupaient à angle droit et le mur d'enceinte, garni de tours carrées, était protégé par un fossé. Une bastide (de l'occitan bastida) est le nom désignant trois à cinq cents villes neuves, fondées majoritairement dans le sud-ouest de la France entre 1222 et 1373. Entre la croisade des Albigeois et la guerre de Cent Ans, ces fondations répondent à un certain nombre de caractéristiques communes d'ordre politique, économique et architectural, correspondant à un essor urbain exceptionnel en Europe à cette époque.    Bouilhaguet, corps de logis de plan en équerre à deux niveaux toits en croupe avec série de lucarnes  et pavillon carré sur angle arrière à trois niveaux toit à quatre pans à l'impérial.","habitants":"Alphonse de Poitiers\r\n        \r\n        \"","divers":"L'Hotel de ville le château de Miramont de Boulhaguet grav 6 et de Lescaut grav 7 et 8.","gps":"","images":["../../jctruffet.com/image/image_47/47_Miramont_Guyenne_1.jpg","../../jctruffet.com/image/image_47/47_Miramont_Guyenne_2.jpg","../../jctruffet.com/image/image_47/47_Miramont_Guyenne_3.jpg","../../jctruffet.com/image/image_47/47_Miramont_Guyenne_4.jpg","../../jctruffet.com/image/image_47/47_Miramont_Guyenne_5.jpg","../../jctruffet.com/image/image_47/47_Miramont_Guyenne_6.jpg","../../jctruffet.com/image/image_47/47_Miramont_Guyenne_7.jpg","../../jctruffet.com/image/image_47/47_Miramont_Guyenne_8.jpg"]},"Consult_chateau_formulaire080c":{"id":"Consult_chateau_formulaire080c","dept":"47","canton":"Villeneuve sur Lot","commune":"Saint-Pierre de Caubel","nom":"Missandre","type":"Manoir","periode":"XV","histoire":"MISSANDRE, Cette ancienne Seigneurerie des comtes de Missandre date du XVe Siècle.  La très noble et ancienne famille des comtes de Missandre était originaire de \"Comte\"près de Montastruc. Au XVIe siècle, Jean de Missandre, écuyer, sieur de Pécaubel, vint s'établir au château de Missandre, alors paroisse et juridiction de St-Pastour.  La descendance du Comte vécut à Missandre jusqu'en juillet de l'an 1996. Pierre et Annie-Paule Pigeard reprirent alors cette propriété qui avait subi les outrages du temps, pour la faire revivre avec passion.                                     Manoir de PECAUBEL du XVIIe siècle ; est une propriété privée.\r\nChâteau de CAUSSADE du XVIe siècle ; est une propriété privée.  Les Béchon de Caussade, originaire d'Auvergne, sont attestés dans la paroisse au XVIIe siècle, avec le mariage en 1655 de Bertrand de Béchon, premier du nom, seigneur de Caussade, capitaine, et de Marguerite de Chemillac.              PINEL-HAUTERIVE, Avant 1240, Raymond Bernard de Rovignan possède des droits sur Galapian, Lusignan et Hauterive. En 1240, sa veuve, Studia, donne à lévêque dAgen toutes les dîmes quavait son mari sur Lusignan et Hauterive. En 1461, Hauterive figurait parmi les nombreuses possessions de Poton de Xaintrailles. Mais sa configuration actuelle a été confiée en 1623 par le comte Godefroy d'Agenais à l'intendant Philippe Jimenoise, prieur du couvent des Augustins de Sainte-Livrade-sur-Lot. Son travail bien que peu apprécié remporta tout de même un franc succès auprès des Licopodes. À noter qu'il fut aidé dans cette tâche par Émilie de Lacombe, duchesse de Brive-la-Gaillarde, qui faisait partie de la famille du seigneur de Sainte-Livrade-sur-Lot. Philippe Jimenoise décédera quelques années plus tard  de la peste décimant une grande partie du village.","architecture":"CAUSSADE du XVIe siècle également  une propriété privée.  Les constructions actuelles ne paraissent pas antérieures à l'époque moderne. Au XVIIIe siècle le manoir est décrit formant un corps de logis avec deux tours, \"assorti par toutes les commodités et agréments possibles\"; de nombreuses métairies et dépendances, dont un moulin voisin et une tuilerie à Francoulon, complètent alors le domaine. Le plan cadastral de 1837 montre pour le logis des dispositions identiques à celles actuelles.\r\nMISSANDRE Au début du XVIIe siècle, le corps de logis reste très discret ; deux ailes, à lest et à louest, lui sont adjointes au milieu du siècle. Les dessous dune partie de l'édifice sont occupés par une cave et un comble à surcroît court sous les toits. Les ouvertures en demi-cercle ne sont rajoutées quau XVIIIe siècle. Dépendance agricole bâtie à la fin du XVIIIe siècle ou début du XIXe siècle et placée près de laile ouest de la maison de maître. Le château forme un plan en U autour dune cour clôturée par un portail. \r\nPINEL HAUTERIVE, Pécaubel du XVIIe siècle  des vestiges témoignent de la présence romaine et du saccage du village par les huguenots.","habitants":"Poton de Xaintrailles\r\n        \r\n        \"","divers":"Château de Missandre","gps":"","images":["../../jctruffet.com/image/image_47/47_Missandre_1.jpg","../../jctruffet.com/image/image_47/47_Missandre_2.jpg","../../jctruffet.com/image/image_47/47_Missandre_3.jpg","../../jctruffet.com/image/image_47/47_Missandre_4.jpg","../../jctruffet.com/image/image_47/47_Missandre_5.jpg"]},"Consult_chateau_formulaire384c":{"id":"Consult_chateau_formulaire384c","dept":"47","canton":"Casteljaloux","commune":"Leyritz-Moncassin","nom":"Moncassin","type":"Château","periode":"XV-XIX","histoire":"MONCASSIN, le château de Moncassin est à l'origine une demeure féodale fortifiée. En 1287, il devient la propriété de plusieurs co-seigneurs. Un lointain comte de Foix, puis des rois de Navarre jusqu'à la Révolution. La forteresse devient la propriété de Guillaume de Pins, puis celle d'Arnaud de Lupiac, époux d'une demoiselle de Pins. En 1494, c'est Gailhard de Montlezun qui l'occupe, ainsi que sa famille, jusqu'à la fin de l'Ancien Régime, avec le comte d'Artagnan de 1645 à 1725 mousquetaire et maréchal de France. Le château fort est agrandi et encore fortifié par cette famille, mais disparaît dans un incendie en 1865, reconstruit en 1868  fait aujourdhui office de gîte Bacchus et de chambres dhôtes. Vincent, un passionné de vin, concrétise son rêve en cultivant les 8,5 ha de vignes qui ceinturent la demeure avec la complicité dun nologue réputé du Bordelais. Aujourd'hui chambres d'hôtes de Vincent Delmotte.","architecture":"Dévasté par un incendie en 1870, le château et le chai furent reconstruits. le château, qui fut reconstruit style Renaissance sous Napoléon III, abrite des chambres dhôtes à limage de lépoque. Elles vous attendent dans un décor élégant et simple. Elles sauront vous offrir un confort haut de gamme tout en surplombant un magnifique jardin arboré. Vous pourrez aussi choisir la suite aux airs coloniaux agrémentée de couleurs exotiques ou le gîte aménagé dans une tour féodale.En 1868, la reconstruction du château est effectuée dans le style Renaissance pour s'achever en 1872. Il ne reste de lancien château que des remparts qui délimitent la cour intérieure du château actuel, une tour carrée et deux entrées principales. Situé sur un point culminant du département, le château, autrefois demeure féodale fortifiée et siège dune co-seigneurie puissante.","habitants":"Gailhard de Montlezun\r\n        \r\n        \"","divers":"Château de Moncassin","gps":"","images":["../../jctruffet.com/image/image_47/47_Moncassin_1.jpg","../../jctruffet.com/image/image_47/47_Moncassin_2.jpg","../../jctruffet.com/image/image_47/47_Moncassin_3.jpg","../../jctruffet.com/image/image_47/47_Moncassin_4.jpg","../../jctruffet.com/image/image_47/47_Moncassin_5.jpg","../../jctruffet.com/image/image_47/47_Moncassin_6.jpg"]},"Consult_chateau_formulaire4058-2":{"id":"Consult_chateau_formulaire4058-2","dept":"47","canton":"Nérac","commune":"Moncrabeau","nom":"Moncrabeau","type":"Château","periode":"XVII","histoire":"A Moncrabeau, château de Lahitte (voir article); Pomarède maison forte de Charrin.                     POMAREDE, exemple rare de château gascon des XVII et XVIIIe siècles, il raconte, au fil des générations, le parcours dune famille et les travaux des champs de ce coin de Gascogne. Lhistoire de cette famille de gentilshommes issue de Gimont dans le Gers au sein de lArmagnac, convertie au protestantisme au milieu du XVIe siècle, sécrit avec celle de la guerre entre catholiques et Huguenots. La famille paie un lourd tribut à ces affrontements, et quitte lArmagnac pour trouver refuge à Montauban près dautres familles protestantes. Cest en 1681 que le château de Pomarède entre dans la famille d'Etienne Dupré, écuyer  qui connaîtra bien dautres désagréments, notamment au moment de la Révolution qui la prive de ses biens. Le château reviendra dans le giron familial au début du XIXe siècle. Pomarède a été construit aux XVIIe et XVIIIe siècles. Vendu comme bien national en 1793, il fut racheté au milieu du XIXe siècle par P. Dupré de Pomarède. Il appartient à cette même famille depuis douze générations. C'est le propriétaire des lieux en personne qui vous accompagne dans la visite de ce château inscrit à l'Inventaire supplémentaire des M.H. Il sait montrer les charmes de Pomarède et raconter l'histoire de cette demeure gasconne entourée dun parc aux arbres centenaires.               M.F CHARRIN e domaine de Charrin est acheté à Roger de Benque par Jean de la Devèze en 1534, selon un dénombrement de 1729. La maison-forte est rénovée dans la 2e moitié du XVIe siècle, pour Pierre de la Devèze, et surtout pour son fils, Dominique de la Devèze, gentilhomme servant la reine de Navarre (1582) , conseiller et trésorier du royaume de Navarre (1590) ;","architecture":"POMAREDE, construction des dépendances nord abritant chais et pressoir en 1717, construction du logis durant le premier quart du XVIIIe siècle (dates portées 1724 et 1725), les dépendances sud et le colombier datent du dernier quart du XVIIIe siècle. Aménagement du chemin et des deux pavillons d'entrée à la fin du XVIIIe ou au début du XIXe, à la suite de l'aménagement de la route de Bordeaux à Auch dans les années 1770. Un projet de restauration a été dessiné par Léon Drouyn en 1883 pour l'élévation ouest : seule la tour d'angle sud-ouest sera réalisée, la crise du phyloxera ayant réduit les revenus du domaine. Reconstruction à la fin du XIXe siècle de la remise au sud du logis et du logement en pendant. Le corps de Logis principal se distingue par une façade à l'italienne parfaitement symétrique par rapport à la porte d'entrée principale. De plus il y a un pigeonnier-tour indépendant caractéristique de la     Maison forte de CHARRIN,  du XIVe ou du début du XVe siècle, rectangulaire, de 4 niveaux, située sur une plate-forme bordée de talus et de fossés, la maison-forte est percée de nouvelles ouvertures, et augmentée d'un corps de bâtiment au nord donnant accès au logis ; le logis est entouré d'une enceinte protégeant les dépendances, avec tours d'angles rondes à l'ouest (la tour sud-ouest figurant sur le cadastre de 1808 est démolie avant 1842) , pavillon d'entrée, chapelle dans un pavillon au sud-est ; le logis aurait été abaissé.","habitants":"Famille  d'Etienne Dupré de Pomarède\r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Pomaréde grav de 1 à 4 et Charrin 5 et 6 à Moncabeau","gps":"","images":["../../jctruffet.com/image/image_47/47_Moncrabeau_Pomarede_1.jpg","../../jctruffet.com/image/image_47/47_Moncrabeau_Pomarede_2.jpg","../../jctruffet.com/image/image_47/47_Moncrabeau_Pomarede_3.jpg","../../jctruffet.com/image/image_47/47_Moncrabeau_Pomarede_4.jpg","../../jctruffet.com/image/image_47/47_Moncrabeau_Pomarede_5.jpg","../../jctruffet.com/image/image_47/47_Moncrabeau_Pomarede_6.jpg"]},"Consult_chateau_formulaire9de5":{"id":"Consult_chateau_formulaire9de5","dept":"47","canton":"Monflanquin","commune":"Monflanquin","nom":"Monflanquin","type":"Château","periode":"XV","histoire":"MONTFLANQUIN; le château de Roquefère (voir article) et de Martel.  En 1252, Guillaume Amanieu, seigneur de Calviac, cède la montagne de Monflanquin à Alphonse de Poitiers. Ce dernier y fonde une bastide du XIIIe siècle.  En 1256, Alphonse de Poitiers commence la fondation de la bastide. En 1269, la charte de fondation est confirmée. À la mort d'Alphonse de Poitiers après son épouse, Jeanne de Toulouse, fille de Raymond VII, sans héritier, ses terres entrent dans le domaine royal de Philippe III. En 1279, Monflanquin devient un des douze bailliages de l'Agenais. L'archevêque de Bordeaux, Bertrand de Got, rend visite à la ville en 1304. Il est élu pape l'année suivante sous le nom de Clément V. La bastide étant passée dans la mouvance anglaise, le roi Édouard III confirme les privilèges de la ville en 1318. En 1374, les habitants de Monflanquin aident l'armée du roi de France qui se dirige vers Tonneins pour chasser les Anglais de l'Agenais. Le 31 août 1574, Guy de Montferrand, seigneur de Langoiran, gouverneur du Périgord \"pour ceux de la religion réformée\" et Geoffroy de Vivans prirent avec leurs 2000 hommes la ville et firent prisonniers 125 gentilshommes. Monflanquin fut chef-lieu de district de 1790 à 1795. La maison dite du Prince Noir située sur la place des Arcades, fut construite au XIVe siècle. Le prince Noir, qui a battu le roi Jean II le Bon à la bataille de Poitiers, y aurait séjourné.                                    MARTEL de la famille de Marchand de Védrines  a assigné en justice le notaire et les nouveaux propriétaires, ses volets rouges avaient rouverts courant 2009. Cétait le château des reclus de Monflanquin, pièce maîtresse du patrimoine de la famille de Védrines dilapidé dans lombre dun présumé gourou, Thierry Tilly, aujourdhui écroué.","architecture":"la Bastide de MONFLANQUIN située à quatre kilomètres vers l'ouest. Le château a été restauré avec grand soin afin de préserver son identité et son histoire.                                                                              MARTEL   la bâtisse vieille de 400 ans sétait trouvée de nouveaux habitants depuis peu. La voilà rattrapée par son histoire : les Védrine tentent de faire annuler sa vente. Ils ont assigné devant le tribunal de grande instance dAgen un notaire du Tarn-et-Garonne et les deux propriétaires qui leur ont succédé.","habitants":"Famille de Guy de Montferrand                                Famille de Marchand de Vedrine \r\n        \r\n        \"","divers":"Bastide de Monflanquin  de la Chartreuse grav  2 et Martel grav 3 à 5.","gps":"","images":["../../jctruffet.com/image/image_47/47_Monflanquin_1.jpg","../../jctruffet.com/image/image_47/47_Monflanquin_2.jpg","../../jctruffet.com/image/image_47/47_Monflanquin_3.jpg","../../jctruffet.com/image/image_47/47_Monflanquin_4.jpg","../../jctruffet.com/image/image_47/47_Monflanquin_5.jpg"]},"Consult_chateau_formulaire2cc9":{"id":"Consult_chateau_formulaire2cc9","dept":"47","canton":"Monflanquin","commune":"Monflanquin","nom":"Monflanquin_Chateau","type":"Château","periode":"XVI-XVIII","histoire":"A Monflanquin plusieurs châteaux celui de Monflanquin et martel(voir article),  Labordes,  Ladausse,, Rousset, Barrayre et Cambes(pas d'information pour certain   article).                   LABOR   DES camping naturiste                         LACAUSSADE, sélève un château du même nom, aux allures de chartreuse, construit au XVIIe siècle. Le château de Lacaussade, datant du XVIIe siècle, a été restauré à lépoque moderne. Il offre un grand pavillon carré et une terrasse entourée de balustres.         LADAUSSE, chambres d'hôtes de  Éric et Diane Anthonissen","architecture":"Le château de Labordes                                      LADAUSSE,  le château Ladausse, majestueuse bâtisse construite aux XVIe et XVIIe siècles est situé au sommet d'une colline, entouré de cinq hectares de bois et prairies, offrant tranquillité et vues spectaculaires sur les environs, y compris la Bastide de Monflanquin située à quatre kilomètres vers l'ouest.","habitants":"Famille de Marchand de Vedrines  \r\n        \r\n        \"","divers":"les châteaux au environ de Mondflanquin Cambes grav 1, Ladause de 2 à 5 Rousset grav 6, Rastouillac grav 7","gps":"","images":["../../jctruffet.com/image/image_47/47_Monflanquin_Chateau_1.jpg","../../jctruffet.com/image/image_47/47_Monflanquin_Chateau_2.jpg","../../jctruffet.com/image/image_47/47_Monflanquin_Chateau_3.jpg","../../jctruffet.com/image/image_47/47_Monflanquin_Chateau_4.jpg","../../jctruffet.com/image/image_47/47_Monflanquin_Chateau_5.jpg","../../jctruffet.com/image/image_47/47_Monflanquin_Chateau_6.jpg","../../jctruffet.com/image/image_47/47_Monflanquin_Chateau_7.jpg","../../jctruffet.com/image/image_47/47_Monflanquin_Chateau_8.jpg"]},"Consult_chateau_formulaireee65":{"id":"Consult_chateau_formulaireee65","dept":"47","canton":"Lavardac","commune":"Mongaillard","nom":"Mongaillard_47","type":"Vestiges","periode":"XIII","histoire":"MONGAILLARD, il est alors tenu par 3 co-seigneurs, les Astafford, les Padern et les Gontaud, avant d'être acquis par Jourdain de l'Isle en 1275. A la fin du XIIIe siècle, des maisons et airials occupent l'espace fortifié. Place forte anglaise du roi Duc dAquitaine, Montgaillard devint ensuite seigneurie des Albret.   Ces formes sont visibles depuis le XIIIe siècle dans les constructions du Sud-Ouest comme dans la tour de Barbastre. Vianne de Gontaut-Biron, fille de Vital de Gontaut qui avait prêté serment de fidélité au roi Louis IX en 1243 est en possession du château de Mongaillard. Elle a donné la partie du fief de Mongaillard qu'elle possédait à son neveu, Jourdain de l'Isle, en 1275. Vianne de Gontaut-Biron est morte le 21 février 1281 dans une petite maison qu'elle s'était faite construire dans le couvent des Dominicains de Condom dont elle avait financé l'édification en 1261. En 1287, il rend hommage pour le château de Mongaillard au roi d'Angleterre Édouard Ier. À cette époque, le fief de Mongaillard est partagé avec Bernard de Saint-Loup, Antoine de Pouy et Guillaume-Arnaud de Padern, mais seul Jourdain de l'Isle doit le service d'ost pour Mongaillard.","architecture":"Mongaillard s'est développé auprès du château construit à la fin du XIIe ou au début du XIIIe siècle. Il s'agit d'une paroisse détachée de celle de Calézun et dont l' église a été édifiée dans un angle du village, comme un élément des fortifications. Lenceinte du village était alors à porte unique. Ce castrum est mentionné en 1259 : le château a une structure romane homogène.  A la fin du XIIIe siècle, le seigneur rendait hommage au roi d'Angleterre. La forteresse comprenait un mur d'enceinte polygonal enserrant le village, dont les murailles avaient une épaisseur de 1,50m et une hauteur de 8 à 10 m. L'ensemble des vestiges subsistants remonte  à la fin du XIIe ou au début du XIIIe siècle. Ils comprennent un fragment important du donjon avec l'arrachement de son escalier à vis et deux salles voûtées superposées, et un pan de mur de l'ancien corps de logis comportant les traces de deux étages avec leurs fenêtres autrefois géminées.Village médiéval fortifié, cette place forte anglaise était une position stratégique pendant la guerre de 100 ans. Jusqu'en 1284 il avait en dépendances les terres de l'actuelle commune de la Bastide de Vianne. Il reste de cette période quelques vestiges des remparts, une porte fortifiée et l'église du XIIIe siècle également.  Le château a été inscrit M.H le 7 janvier 1926.","habitants":"Famille de Vital de Gontaut\r\n        \r\n        \"","divers":"Vestiges du château de Mongaillard","gps":"","images":["../../jctruffet.com/image/image_47/47_Mongaillard_47_1.jpg","../../jctruffet.com/image/image_47/47_Mongaillard_47_2.jpg","../../jctruffet.com/image/image_47/47_Mongaillard_47_3.jpg","../../jctruffet.com/image/image_47/47_Mongaillard_47_4.jpg","../../jctruffet.com/image/image_47/47_Mongaillard_47_5.jpg","../../jctruffet.com/image/image_47/47_Mongaillard_47_6.jpg","../../jctruffet.com/image/image_47/47_Mongaillard_47_7.jpg"]},"Consult_chateau_formulaire744f":{"id":"Consult_chateau_formulaire744f","dept":"47","canton":"Colayrac Saint-Cirq","commune":"Estillac","nom":"Monluc_Estillac","type":"Château","periode":"XIII-XV","histoire":"MONLUC, dit d'Estillac  le château dont les éléments les plus anciens datent du XIIIe siècle appartenait à la famille d'Autièges, puis aux Mondenard,et au XVIe siècle  appartient à Blaise de Monluc et à ses frères et surs par héritage de ses oncles en 1544 auxquels il a racheté. Blaise Monluc sy retira en 1575 pour écrire ses commentaires mais il mourut en 1577 à Condom dont son fils était évêque, et il a été enterré dans la cathédrale.  Isabeau de Beauville reçut par testament l'usufruit d'Estillac à condition qu'elle ne se remaria pas, ce qu'elle fit en 1579, convolant avec François de Pérusse des Cars. Le château passe alors  à un petit fils du maréchal Blaise de Monluc, puis après sa mort survenue au siège d'Ardres en 1596, à sa fille Suzanne, mariée avec Antoine de Lauzières, marquis de Thermines. Après le décès de Suzanne l'héritière est Jeanne de Monluc apporte par alliance le château  à Charles d'Escoubeau marquis de Sourdis et d'Alluys  par le jeu des alliances le château passe aux de Marans,  aux Montaudoin puis les Brondeau d'Urtières, aux Laroche, aux Flaujac et  en 1787 aux Boisséron, depuis le château est resté par les femmes dans la même famille.","architecture":"le château de Monluc a un plan trapézoïdal très fermé donnant à la cour intérieure un plan presque triangulaire. Dominé  par une tour carrée et enclose  entre deux hauts corps de bâtiment conserve encore une allure médiévale.  Les ailes et les bastions sud et est reprennent un plan qui a été introduit par les ingénieurs militaires italiens et dont on peut voir la première mise en pratique en France. Construction du château par la famille d'Estillac, au XVe siècle élévation de la tour carrée, au XVIe siècle édification du corps de logis Renaissance   De ses guerres en Italie il a rapporté la construction bastionnée. Il entreprend,  en 1570  de modifier le château pour le mettre en défense pendant les troubles des guerres de religion. Il a augmenté les défenses du château en ajoutant des bastions protégeant lentrée. Les défenses de lentrée comme les parties hautes du bastion Est ont dû être démolies en 1793.","habitants":"Famille d'Autièges\r\n        \r\n        \"","divers":"Ancienne abbaye de Monluc grav de 1 à 8 et Manoir hôtel","gps":"","images":["../../jctruffet.com/image/image_47/47_Monluc_Estillac_1.jpg","../../jctruffet.com/image/image_47/47_Monluc_Estillac_2.jpg","../../jctruffet.com/image/image_47/47_Monluc_Estillac_3.jpg","../../jctruffet.com/image/image_47/47_Monluc_Estillac_4.jpg","../../jctruffet.com/image/image_47/47_Monluc_Estillac_5.jpg","../../jctruffet.com/image/image_47/47_Monluc_Estillac_6.jpg","../../jctruffet.com/image/image_47/47_Monluc_Estillac_7.jpg","../../jctruffet.com/image/image_47/47_Monluc_Estillac_8.jpg","../../jctruffet.com/image/image_47/47_Monluc_Estillac_9.jpg"]},"Consult_chateau_formulaire2b61":{"id":"Consult_chateau_formulaire2b61","dept":"47","canton":"Fumel","commune":"Monsempron-Libos","nom":"Monsempron","type":"Château","periode":"XV","histoire":"Chateau PRIEURAL, vers la fin du XVe siècle le prieur en profite alors pour remettre au goût du jour les baies de létage (résidence du prieur). \r\nLes grandes fenêtres à meneaux gothiques encore visibles prennent la place des fenêtres géminées vieilles de deux siècles. Au cours de la Révolution une partie du bâtiment est mise en vente et achetée par un maçon qui la transforme en carrière. La presque totalité des dépendances et laile Ouest sont détruites peu à peu. Tout au long du XIXe siècle laile Est reste le presbytère, propriété de la commune.","architecture":"le château prieural, appuyé contre léglise de Monsempron-Libos a tout dabord été un monastère, agrandi par les moines au XIIe et XIIIe siècles avant dêtre transformé au XVe siècle en château prieural avec louverture de fenêtres à meneaux de style Renaissance quercynoise. Restauré par la municipalité, la presque totalité des dépendances et laile Ouest sont détruites peu à peu. Tout au long du XIXe siècle laile Est reste le presbytère, propriété de la commune. Laile Nord, conservée, et les anciennes dépendances, reconstruites, changent plusieurs fois de propriétaires et finissent par être transformées en école pour jeunes filles. Après la séparation de lEglise et de lEtat en 1905 lécole ferme ses portes et, rachetée par le prêtre de la paroisse, devient le presbytère.  Laile Est  toujours propriété de la commune  est transformée en appartements.  Depuis 1989, la commune, ayant racheté le presbytère, est propriétaire de lensemble du château prieural (à lexception des dépendances).","habitants":"Prieur locaux\r\n        \r\n        \"","divers":"Le château Prieural de Monsempron","gps":"","images":["../../jctruffet.com/image/image_47/47_Monsempron_1.jpg","../../jctruffet.com/image/image_47/47_Monsempron_2.jpg","../../jctruffet.com/image/image_47/47_Monsempron_3.jpg","../../jctruffet.com/image/image_47/47_Monsempron_4.jpg","../../jctruffet.com/image/image_47/47_Monsempron_5.jpg","../../jctruffet.com/image/image_47/47_Monsempron_6.jpg"]},"Consult_chateau_formulaire0726-2":{"id":"Consult_chateau_formulaire0726-2","dept":"47","canton":"Nérac","commune":"Montagnac sur Auvignon","nom":"Montagnac","type":"Château","periode":"XVI-XIX","histoire":"deux châteaux à Montagnac celui de Peyrecave et de Saint-Loup.                                                               MONTAGNAC,en 1278 ancienne bastide faisant partie du Brulhois. Le territoire, qui dépendait du diocèse de Condom, était partagé entre plusieurs seigneuries. Le village s'est formé autour de l'église paroissiale, entourée de fortifications et défendue au sud-est par un château, mentionné en 1275. Montagnac est érigé en baronnie en 1442. En 1580, la ville est prise par Biron : l'église a souffert des guerres de religion. Une partie des demeures date du XVIe et du début du XVIIe siècle et les fortifications sont réparées à plusieurs reprises au cours du XVIIe siècle. Lors de la Fronde, nombre de maisons sont détruites. Le clocher de l'église, situé au centre du village, était un point dobservation. Sa flèche de 18 mètres de haut a été détruite par la foudre en 1782. Une période de prospérité commence au XVIIIe siècle, si bien qu'au début du XIXe siècle, la reconstruction ou la modernisation d'une grande partie des demeures du village a lieu. En 1805, la porte d'Agen qui menaçait ruine est détruite.                                          PEYRECAVE  acquis en 1841 par Henry Lacoste, négociant à Paris.                                                  SAINt-LOUP, pendant des siècles, la bâtisse et son point de vue ont eu un intérêt militaire : «On est sur un site gallo-romain et je suis presque certain que nous sommes ici dans l'ancienne cour carrée d'un château fort», explique Arnaud de Mentque, en accueillant le visiteur sur sa propriété. «Avec le temps et les guerres, Saint-Loup a été démoli et reconstruit, et aujourd'hui, le château est un modèle typique de château gascon.»\r\nChambres d'hôtes de madame Danièle Denard.","architecture":"Vestiges du château et enceinte du village.\r\nChâteau de Peyrecave, les travaux de reconstruction au milieu du XIXe siècle, corps de logis rectangulaire à deux niveaux fronton central en façade sur trois travées saillantes, toit presque plat.\r\nChâteau de Saint-Loup du XIXe siècle : de plan rectangulaire à deux niveaux et attiques toit en croupes prolongé de chaque côtés longitudinalement par des bâtiment de deux niveaux, accolé a des pavillons carrés de trois niveaux complété aux extrémités par des tourelles toit en poivrières. Bâti sur des vestiges médiévaux. Aujourd'hui accessible pour un séjour en gîte ou en chambres d'hôtes, Saint-Loup est également un monument historique. Plusieurs éléments y sont notables : un colombier à arcades est situé dans le parc ;  un pan de mur de construction romaine a été découvert dans le château. Il y avait également un lit de ciment contre le mur, où se trouvait une mosaïque, dont un fragment de cubes blancs et bleus a été retrouvé. Des colonnes en marbre rouge des Pyrénées ont également été retrouvées dans ce même lieu.","habitants":"Famille Henry Lacoste                                                     Madame Danièl Denard\r\n        \r\n        \"","divers":"Peyrecave grav 1 et 2, St-Loup de 3 à 9  à Montagnac","gps":"","images":["../../jctruffet.com/image/image_47/47_Montagnac_1.jpg","../../jctruffet.com/image/image_47/47_Montagnac_2.jpg","../../jctruffet.com/image/image_47/47_Montagnac_3.jpg","../../jctruffet.com/image/image_47/47_Montagnac_4.jpg","../../jctruffet.com/image/image_47/47_Montagnac_5.jpg","../../jctruffet.com/image/image_47/47_Montagnac_6.jpg","../../jctruffet.com/image/image_47/47_Montagnac_7.jpg","../../jctruffet.com/image/image_47/47_Montagnac_8.jpg","../../jctruffet.com/image/image_47/47_Montagnac_9.jpg"]},"Consult_chateau_formulaire4584":{"id":"Consult_chateau_formulaire4584","dept":"47","canton":"Sainte-Livrade sur Lot","commune":"Montastruc","nom":"Montastruc_47","type":"Château","periode":"XV","histoire":"MONTASTRUC, après la guerre de cent ans et jusqu'à la Révolution, la seigneurie de Montastruc  va appartenir à la famille Grossoles, Jean sera le baron de Montastruc sera aussi seigneur de Flammarens dans le Gers. Un de ses descendants sera seigneur de Buzet. Il épouse le 29 mai 1466 au château de Lauzun Anne d'Abzac de la Douze, huitième fille du Seigneur d'Abzac.\r\nLe père de Jean, Bernard de Grossoles avait été chancelier du comte d'Armagnac, un des meilleurs chefs de guerre des Rois de France. \r\nEn 1651, toute l'Aquitaine s'est soulevée. Antoine de Grossolles baron de Montastruc, marquis de Flammarens, seigneur de Buzet, se bat à Paris dans les rangs de l'armée du prince de Condé. Il trouve la mort en juillet 1652 au combat du Faubourg Saint-Antoine. Cette même année, le capitaine Demestre participe avec sa compagnie a la défense de Villeneuve assiégée par les troupes royales commandées par Henri de Lorraine, comte d'Harcourt.  A Montastruc  la famille Demestre habite au lieu dit Vergnassade. Pendant près de 200 ans chacune de ses générations aura participé aux guerres de la France. Le dernier des Demestre, Jean, colonel d'un régiment d'infanterie, participa à la guerre d'indépendance des États Unis (1775-1782). Il mourut maire de Montastruc en 1812. Montastruc doit supporter l'occupation par les troupes royales, monsieur de Lidon, seigneur de Savignac, nous rapporte la misère qui s'en est suivie : il faut loger et nourrir les troupes et les chevaux, il faut aussi répondre aux contributions financières, aux réquisitions et aux corvées exigées par le comte d'Harcourt.","architecture":"le nom de Montastruc signifie la colline fortifiée. Mons strutus, la colline bâtie. Sur le sommet aplani où est établi le bourg il y avait, jadis, un château fort entouré de remparts qui dominaient de très haut et de larges fossés complétant la défense.\r\nLa destruction a été si totale qu'il est impossible de rétablir, même par l'imagination, la silhouette de cette forteresse.                                                                    Château de Saint-Léger sous l'ancien régime, le chef lieu de la paroisse était Saint-Pierre de la croix et l'on contait plusieurs autres églises sur son territoire : Saint-Léger, Saint-Jean de Savignac, Saint- Étienne de Périllac et Saint-Georges. Au château de Saint-Léger, les anciennes constructions comprenaient un corps de logis flanqué de deux tours, l'une ronde, l'autre carrée. Le reste de l'édifice appartenait à une restauration moderne. Cet ensemble a été partiellement démolit au début du siècle : ce qui en restait était, alors, la propriété de la vieille famille des Lavayssières.","habitants":"Famille de  Bernard de Grossoles\r\n        \"","divers":"Château de Montastruc","gps":"","images":["../../jctruffet.com/image/image_47/47_Montastruc_1.jpg","../../jctruffet.com/image/image_47/47_Montastruc_2.jpg"]},"Consult_chateau_formulaire5398":{"id":"Consult_chateau_formulaire5398","dept":"47","canton":"Villeneuve sur Lot","commune":"Montauriol","nom":"Montauriol_47","type":"Château","periode":"XVI","histoire":"Le village de Montauriol était entouré par 2 châteaux, deux aujourd'hui le Montfort.                               MONTAURIOL, en 1286, Drouin dAunair, prieur de St Jean de Montauriol et Jean de Grailly, sénéchal dAquitaine, agissant au nom dEdouard 1er, Roi dAngleterre, transigèrent au sujet de la justice de la ville et banlieue de Montauriol. Le 20 juin 1321 Vidimus et confirmation par Edward II d'un réglement fait entre le Sénéchal d'Aquitaine et l'abbé de Ste Croix de Bordeaux sur le prieuré de Montauriol.  Il est aussi fait mention à plusieurs reprises de ce prieuré dans les lettres des Papes dAvignon. Le 14 juillet 1310 par le pape Clément V. Le 12 juin 1318 par le Pape Jean XXII. Le16 février 1339 Le pape Benoit XII confère le Prieuré de Montauriol à Bernard, cardinal prêtre\r\nMONTFORT Le 27 mai 1943 se réunit le premier Conseil national de la Résistance présidé par Jean Moulin, dans le but d'unifier les différents mouvements de Résistance intérieure qui s'étaient spontanément constitués en France depuis la défaite et l'appel du 18 juin 1940, du général De Gaulle. Au niveau des départements, il en découle la création des CDL (comités départementaux de libération) et des CCL, comités locaux de libération au niveau des cantons.","architecture":"MONTFORT sur une petite colline, au lieu dit les Mouthes, grande maison de maître qui surplombe la campagne, malheureusement abandonné de nos jours.  Une plaque apposée sur le mur de la Mairie nous apprend que  \"Dans la commune de Montauriol, au château de Montfort, fut créé le 29 avril 1944, le comité Départemental de la Libération, Trait d'union de la Résistance\"\r\n Le château de Menaux au lieu dit Menaux et dont il ne reste rien.","habitants":"Jean Moulin\r\n        \"","divers":"Château de Montfort à Montauriol","gps":"","images":["../../jctruffet.com/image/image_47/47_Montauriol_1.jpg"]},"Consult_chateau_formulaire46c5":{"id":"Consult_chateau_formulaire46c5","dept":"47","canton":"Fumel","commune":"Montayral","nom":"Montayral","type":"Maison forte","periode":"XV","histoire":"MONTAYRAL-ST-VITE à deux kilomètres, les quatre châteaux de Ladhuie, Cézerac, Perricard pour  ces deux voir article) Cézerac,  Montayral, Ramet et Salomon,                                                             MONTAYRAL ,  au Moyen Âge, le territoire de Montayral sétend sur trois paroisses. On y retrouve celle de Saint-Germain de Montayral et de Marie-Madeleine de Cézérac dans la vallée ainsi que la paroisse Saint-Martin de Mazières sur les coteaux.  Lactivité économique est liée à linstallation de barrages et de moulins sur le Lot. Ils sont exploités par des seigneurs locaux qui sinstallent dans des maisons fortes. Après la Révolution, les hameaux qui jalonnent le territoire sont regroupés dans la commune de Montayral. À la fin du XIXe siècle, Montayral se dote dun chef-lieu sur le site de Pellery, cest à cet emplacement que les locaux de la mairie sont transférés dans les années 1930. Trente ans plus tard, la commune se modernise et sagrandit grâce à la construction dun nouveau secteur urbain. Cependant, il montre également limage dun centre urbain moderne grâce à laménagement de sa ville neuve dans les années 1960.                                               SALOMON Les seigneurs de Salomon sont mentionnés pour la première fois dans un contrat de mariage du début du XVIe siècle                    CEZERAC offrit un refuge au capitaine huguenot Geoffroy de Vivant après la défaite de Libos en 1574. La maison noble est détenue par la famille de La Borie au XVIIe siècle, pour laquelle le logis est agrandi. Un plan de la vallée du Lot de 1767 montre un bâtiment composé de trois corps articulés en U côté Lot. Possession de Brons Cézerac à la fin de l'Ancien Régime, estimé comme bien national sous la Révolution.  le manoir, propriété dun couple de riches Britanniques, Jane Masters et Antony Blakey. En 2010 un incendie qui a détruit le plus gros du château et dévasté une tour datant du Xe siècle.","architecture":"Les seigneurs de SALOMON décident de la construction dune maison noble sur leur fief au XVIe siècle. Composé de bâtiments formant une cour intérieure et de tours défensives,  Au vu dune inscription, leur château est  construit en 1596. Il est composé dune tour quadrangulaire couronnée de mâchicoulis et de créneaux. Un corps de logis sur deux niveaux lui est peut-être accolé à la même époque.                                                                            RAMET, le \"château\"  alias de Rauret, au XIXe siècle, le domaine est en possession de la famille de Lamartinie.  Les constructions actuelles, organisées sur une cour fermée, semblent dater des XVIIe et XVIIIe siècles. Un portail  en arc déprimé orné d'un quadrilobe donne accès à la cour. Le logis est composé de deux ailes en équerre, et d'un  pavillon sur l'une des extrémités. Le corps principal est ajouré  d'une galerie sur colonnes à l'étage. Les murs sont  en moellon calcaire et les toitures à croupes couvertes de tuiles creuses.                                                         CEZERAC De l'ancien repaire seigneurial de Cézérac subsiste deux corps de logis en équerre flanqué d'une tour construite à la limite des XVe et XVIe siècles. Un corps pavillonnaire possède 2 fenêtres ornées d'un décor caractéristique des ornements quercynois, le domaine se compose du château, bâti à la fin du XVe et au début du XVIe siècle auquel il existe encore une tour, des créneaux. L'édifice a été encore augmenté en 1853 pour Jean Baptiste Martié,  la tour circulaire couverte d'un toit conique occupe l'angle nord du corps de logis rectangulaire, d'un étage carré. Sa toiture mansardée est couverte de tuiles plates sur le brisis. Le second corps de logis adossé au précédent, en rez-de-chaussée et comble à surcroît couvert d'un toit à croupes, comporte trois travées.","habitants":"Seigneur de Salomon \r\n        \r\n        \"","divers":"Le château de Cézérac grav 1 et 2 et de Salomon grav 3 et 4 à Montayral","gps":"","images":["../../jctruffet.com/image/image_47/47_Montayral_1.jpg","../../jctruffet.com/image/image_47/47_Montayral_2.jpg","../../jctruffet.com/image/image_47/47_Montayral_3.jpg","../../jctruffet.com/image/image_47/47_Montayral_4.jpg"]},"Consult_chateau_formulairee542":{"id":"Consult_chateau_formulairee542","dept":"47","canton":"Fumel","commune":"Saint-Georges","nom":"Montbeau","type":"Château","periode":"XV","histoire":"MONTBEAU Comme partout dans la région, Le château de Montbeau est construit  au XVe siècle. Il sagit sans doute dun repaire établi sur un pech qui domine la vallée de Lagrane et au-delà la vallée du Lot. Cette situation permet den contrôler le passage. Au début du XVIe siècle, lensemble appartient à la famille de Lavayssières.","architecture":"le château de Montbeau est primitivement constitué dune tour défensive. Celle-ci est, au cours des siècles, augmentée de divers corps de logis et dépendances permettant notamment à la population de vivre au contact des seigneurs.","habitants":"Famille de Lavayssières\r\n        \r\n        \"","divers":"Château de Montbeau","gps":"","images":["../../jctruffet.com/image/image_47/47_Montbeau_1.jpg","../../jctruffet.com/image/image_47/47_Montbeau_2.jpg"]},"Consult_chateau_formulaire2138-2":{"id":"Consult_chateau_formulaire2138-2","dept":"47","canton":"Lavardac","commune":"Montesquieu","nom":"Montesquieu_47","type":"Maison forte","periode":"XV","histoire":"MONTESQUIEU, vicomté, après avoir appartenu aux seigneurs de Xantrailles, passa en 1555, aux mains des rois de Navarre. Les rois de France, après Henri IV, seront vicomtes du Bruilhois jusqu'en 1789. Les Coutumes de Montesquieu datent de 1349. Le village  a donné son nom à l'écrivain Montesquieu. de 1689 à 1755, plus exactement Charles Louis de Secondat de Montesquieu, est issu d'une grande famille Agenaise, les Secondat, originaires du Berry, qui se sont installés au XVe siècle en Agenais, puis au service des Albret. C'est Jeanne d'Albret, reine de Navarre et vicomtesse de Bruilhois, qui, « pour ses bons et loyaux services », vend à pacte de rachat perpétuel les sept terres et seigneuries de Roquefort, Sérignac, Montesquieu, Ségougnac, Plaichac, Goulard et Cuq, situées en Bruilhois, à Jean de Secondat, seigneur de Roques, le 30 octobre 1562. Dans un acte du 19 décembre 1576, Henri III de Navarre constate la cession faite le 30 octobre 1562 par sa mère de ses terres et ses  seigneuries  à condition de rachat perpétuel, sous condition de foi et hommage, et décide de vendre, céder et transporter à perpétuité audit Jean de Secondat, seigneur de Roques, ladite faculté de rachat réservée par la reine Jeanne d'Albret, sa mère, ensemble tous et chacun les autres droits et devoirs seigneuriaux lui appartenant. Le roi se réserve les foi et hommage. Et c'est Henri IV qui, en février 1606, érige en baronnie les terres de Montesquieu, pour Jacob, fils de Jean. Celui-ci, seigneur baron de Montesquieu, n'est autre que l'arrière-grand-père de l'illustre Montesquieu.","architecture":"Le château de Montesquieu, construit à l'époque féodale, sur un éperon rocheux dominant la vallée de la Garonne, rappelle par son plan général, celui de Bonaguil : il a la forme de nef ancrée sur les rochers, domine la route par sa proue et s'étend à l'arrière sur le plateau. Au cours des siècles, le château de Montesquieu a connu l'occupation des Anglais, les pillages, les guerres de religion.  Château de Montesquieu, dont il ne reste plus aujourd'hui que les remparts, percés de trois portes, le logis du corps de garde, un puits authentique très profond. Du temps du philosophe Montesquieu, le château était déjà en mauvais état, et celui-ci venait plutôt en sa propriété du Sahuc, en bord de Garonne.","habitants":"Jean de Secondat\r\n        \r\n        \"","divers":"Château de Montesquieu","gps":"","images":["../../jctruffet.com/image/image_47/47_Montesquieu_47_1.jpg","../../jctruffet.com/image/image_47/47_Montesquieu_47_2.jpg","../../jctruffet.com/image/image_47/47_Montesquieu_47_3.jpg","../../jctruffet.com/image/image_47/47_Montesquieu_47_4.jpg"]},"Consult_chateau_formulaireceee-2":{"id":"Consult_chateau_formulaireceee-2","dept":"47","canton":"Duras","commune":"Monteton","nom":"Monteton","type":"Château","periode":"XVI","histoire":"MONTETON; la seigneurie de Monteton est passée à la famille Digeon par le mariage en 1623 de Jeanne de Béraud, dame de Monteton, avec Charles de Digeon, sieur de Peyrières. Cette branche des Digeon porte désormais le nom de Digeon de Monteton. La famille Digeon a été seigneur d'Autramat, de Monteton, de Péchalvet. Au moment de la Révolution existait Jean-Jacques Digeon de Monteton, marié à Suzanne de Narbonne-Pelet, dont est né Philippe, colonel au moment de la Révolution, puis député du Lot-et-Garonne à partir de 1815. Il a fait édifier la statue d'Henri IV à Nérac. Les Digeon de Monteton l'ont construit au XVIIe siècle. La famille était protestante. L'architecture témoigne de la vie des familles protestantes converties par nécessité après la révocation de l'Édit de Nantes en 1685 avec la présence d'un pont-levis pour garder l'entrée du château. Une partie de la famille a quitté la France pour la Prusse où elle est devenue la branche allemande de la famille, les Digeon von Monteton. Ainsi la veuve de Pierre de Digeon, la dame Anne de Briquemaux, qui a l'usufruit de ses biens, dont la seigneurie, qui est saisie, et son beau-frère, Henry Digeon de Peyrières, demande qu'elle lui soit transmise. À la suite de sa sortie du royaume, il est fait de même pour les biens de M. Digeon de Boisverdun. Les Digeon de Monteton ont conservé le château jusqu'à l'extinction de cette famille en 1835. Le château passe par héritage à Léopold de Gervain qui a fait restaurer le château de Lasserre où il a résidé. Le château a été laissé à l'abandon au  XXe siècle. Restauré partiellement, il a été transformé en auberge. Inscrit au M.H le 8 février 2008.","architecture":"château de Monteton  construit au XVIIe siècle sur une éminence selon un plan en U. Un corps de logis formé d'un corps central à vocation de passage vers la cour intérieure, est cantonné de deux ailes d'habitation. L'ensemble est édifié sur un niveau de soubassement accueillant la cuisine, la boulangerie et les réserves. Des communs sont adossés à un mur d'enceinte au nord. Ce château est abandonné au cours du XXe siècle, l'aile Est est utilisée comme carrière de pierres. Le corps de logis central conserve des traces de pont-levis à flèches et des meurtrières, marques de noblesse et nécessité défensive pour des catholiques de façade restés protestants après 1685.","habitants":"Digeon de Monteton\r\n        \r\n        \"","divers":"Vestiges du Château de Monteton","gps":"","images":["../../jctruffet.com/image/image_47/47_Monteton_1.jpg","../../jctruffet.com/image/image_47/47_Monteton_2.jpg","../../jctruffet.com/image/image_47/47_Monteton_3.jpg","../../jctruffet.com/image/image_47/47_Monteton_4.jpg","../../jctruffet.com/image/image_47/47_Monteton_5.jpg","../../jctruffet.com/image/image_47/47_Monteton_6.jpg"]},"Consult_chateau_formulaireae28":{"id":"Consult_chateau_formulaireae28","dept":"47","canton":"Marmande","commune":"Montignac de Lauzun","nom":"Montignac_Lauzun","type":"Château","periode":"XVII","histoire":"MONTIGNAC, Montignac-de-Lauzun a vu s'édifier des châteaux, des gentilhommières et de grandes demeures dont la beauté discrète peut être observée de l'extérieur car il s'agit de demeures privées au détour de routes et chemins, ainsi que d'anciennes granges à la remarquable architecture de bois  et une génération récente d'élégantes cabanes perchées. Dès le XVIe siècle le château de Lescaut est un relais de chasse qui a vu s'ajouter au XIe siècle un péristyle original évoquant la Louisiane.","architecture":"Montignac , ainsi que d'anciennes granges à la remarquable architecture de bois  et une génération récente d'élégantes cabanes perchée                            Les principaux  Lescaut, les Chênes de madame Gay","habitants":"Seigneur locaux\r\n        \r\n        \"","divers":"Plusieurs châteaux à Montignac-sur-Lauzun, de Lescaut grav 3 et 4 et les Chênes grav 9.","gps":"","images":["../../jctruffet.com/image/image_47/47_Montignac_Lauzun_1.jpg","../../jctruffet.com/image/image_47/47_Montignac_Lauzun_2.jpg","../../jctruffet.com/image/image_47/47_Montignac_Lauzun_3.jpg","../../jctruffet.com/image/image_47/47_Montignac_Lauzun_4.jpg","../../jctruffet.com/image/image_47/47_Montignac_Lauzun_5.jpg","../../jctruffet.com/image/image_47/47_Montignac_Lauzun_6.jpg","../../jctruffet.com/image/image_47/47_Montignac_Lauzun_7.jpg","../../jctruffet.com/image/image_47/47_Montignac_Lauzun_8.jpg","../../jctruffet.com/image/image_47/47_Montignac_Lauzun_9.jpg"]},"Consult_chateau_formulaire7108":{"id":"Consult_chateau_formulaire7108","dept":"47","canton":"Lavardac","commune":"Damazan","nom":"Muges","type":"Château","periode":"XVIII","histoire":"MUGES,  fut bâti par l'architecte bordelais Victor Louis. En 1830 Un riche négociant anglais, Jacques Abraham Henry Dunlop, l'acquit avant de devenir maire de Damazan en 1836. Il fut désavoué par son conseil quatre ans plus tard pour avoir voulu imposer un ministre du culte protestant sur la commune. Avec son épouse écossaise, Suzanne Dunlop, il repose dans un imposant tombeau de pierre au fond du parc. Devenu la propriété de la famille de la banque Courtois par la suite, le château fut la demeure d'un certain Henry Courtois. En 1999 La propriété fut racheté par Gérard et Béatrice Doussau de Bazignan qui sont toujours les propriétaires.","architecture":"Muges Le logis forme, avec ses communs, un plan en U, le corps central est cantonné de deux pavillons. L'élévation antérieure du logis montre un avant-corps central en légère saillie où est disposée la porte d'entrée. Une partie des décors du XVIIIe siècle, lambris, menuiseries, cheminées, escalier d'honneur avec une rampe en fer forgé, est conservée. L'ancien potager-fruitier et l'orangerie occupent la partie ouest du domaine. Un parc a été planté devant la façade nord du château. Une large perspective centrale encadrée de bosquets au sein desquels se retrouvent les éléments d'un parcours d'eau, une garenne et des tombes. Eléments protégés MH : logis avec les communs en retour d'équerre et leur cour intérieure ; ancienne orangerie parc paysager avec les aménagements hydrauliques et les tombes familiales qu'il contient; pigeonnier du commun oriental: inscription par arrêté du 8 décembre 2008.","habitants":"Henry Courtois\r\n        \r\n        \r\n        \"","divers":"Château de Muges à Damazan","gps":"","images":["../../jctruffet.com/image/image_47/47_Muges_1.jpg","../../jctruffet.com/image/image_47/47_Muges_2.jpg"]},"Consult_chateau_formulaire0992":{"id":"Consult_chateau_formulaire0992","dept":"47","canton":"Lavardac","commune":"Vianne","nom":"Naudet","type":"Château","periode":"XVI","histoire":"NAUDET château du XVIe siècle. Aujourd'hui société civile immobilière en activité depuis 16 ans gérant de Yury Sazonov.","architecture":"Naudet, un édifice à cour fermée figure sur le plan cadastral de 1837. Seule l'aile nord a été partiellement conservée, les ailes ouest et sud ont été détruites et l'aile est reconstruite: malgré le remaniement de toutes les ouvertures, l'aile nord possède des élévations en pierre de taille et une tour d'angle qui pourraient remonter au XVIe siècle et indiquer une ancienne maison-forte. Le pigeonnier, restauré récemment, a été construit au XVIe ou au XVIIe siècle. L'aile orientale a été édifiée au début du XXe siècle, avec une galerie sur cour inspirée des galeries de la Renaissance, comme celle du château de Nérac. Les dépendances agricoles bâtis à la fin du XIXe siècle situées en face de Naudet, au bord de la route, étaient  celles du château. Elévation sur cour de l'aile nord et tour nord-ouest en pierre de taille, les autres élévations sont en moellon. Pigeonnier polygonal en pan de bois avec hourdis en brique, couvert d'un toit en pavillon.","habitants":"seigneur d'époque\r\n        \r\n        \"","divers":"Château de Naudet à Vianne","gps":"","images":["../../jctruffet.com/image/image_47/47_Naudet_1.jpg","../../jctruffet.com/image/image_47/47_Naudet_2.jpg"]},"Consult_chateau_formulaireffcf":{"id":"Consult_chateau_formulaireffcf","dept":"47","canton":"Nérac","commune":"Nérac","nom":"Nazareth","type":"vestiges","periode":"XII","histoire":"NAZARETH dit le donjon Amanieu dAlbret en fit hommage, dès lan 1286 au roi dAngleterre, seigneur dAgenais.   Au XIIIe siècle, le château de Nazareth sélève sur les bords de la Baïse, à Nérac. Il est situé sur un site défensif doù lon peut correspondre par signaux avec le château dEspiens et la tour de Barbaste. Dans les années 1530 et suivantes, sous linfluence de Jeanne d'Albret, la population de Nérac se convertit au protestantisme, pour être entièrement huguenote au début des guerres de religion. Après Angoulême, Calvin séjourne à Nérac en avril 1534 où il rencontre Jacques Lefèvre d'Étaples avant de rendre visite à Gérard Roussel, abbé de Clairac, et de résigner ses bénéfices le 4 mai 1534.  Lédifice est probablement construit entre 1259 et 1287 par les Albret, seigneurs de ce castrum autour duquel sest formé une agglomération.","architecture":"Selon Gardelles, le château de Nazareth aurait été construit entre 1259 et 1287, par les Albret, sur un site défensif. Château de plan carré auquel l'escalier parait ajouté postérieurement; l'agglomération s'est formée autour du château; une porte fortifiée et des remparts dont il ne subsiste aucun vestige apparaissent sur des dessins de 1836; l'église, implantée à une date inconnue, est tombée de vétusté avant 1777 ; chef lieu de commune jusqu'en 1827. La construction essentielle est une tour, sans voûte, dont deux étages munis de cheminées subsistent. Elle a 9 m sur 7 en uvre et des murs de 1,9 m dépaisseur et domine lemplacement du fossé. Elle est flanquée par un bâtiment plus étroit et de même hauteur, munie darchères assez larges, en arc brisé, ouvertes dans des niches en plein cintre, largement ébrasées.  A proximité des substructions de murailles nous indiquent lemplacement dune tour carrée.  Archères de grande taille, trois sur le flanc sud, au niveau du 1er étage,","habitants":"Les Templiers\r\n        \r\n        \"","divers":"Vestiges du château de Nazareth à Nérac","gps":"","images":["../../jctruffet.com/image/image_47/47_Nazareth_1.jpg","../../jctruffet.com/image/image_47/47_Nazareth_2.jpg","../../jctruffet.com/image/image_47/47_Nazareth_3.jpg","../../jctruffet.com/image/image_47/47_Nazareth_4.jpg","../../jctruffet.com/image/image_47/47_Nazareth_5.jpg","../../jctruffet.com/image/image_47/47_Nazareth_6.jpg","../../jctruffet.com/image/image_47/47_Nazareth_7.jpg"]},"Consult_chateau_formulaire2305":{"id":"Consult_chateau_formulaire2305","dept":"47","canton":"Layrac","commune":"Caudecoste","nom":"Nazelles","type":"Château","periode":"XIII-XVI","histoire":"NAZELLES se trouve sur l'ancien fief des du Cauzé de Nazelle. Il a été construit d'après la tradition locale à la fin du XIIIe siècle par Jean Charles du Cauzé de Nazelle qui a dénoncé en 1674   la conspiration du chevalier de Rohan. Il a été nommé lieutenant des maréchaux de France pour la province de Guyenne. Un autre Jean-Charles du Cauzé de Nazelle, écuyer, sieur de Lille arrière grand-oncle du premier marquis du Cauzé de Nazelle, titre donné en 1753 par Louis XV à Louis-Charles-Victor du Cauzé de Nazelle, avait été marié le 20 juin 1654 avec noble Jeanne-Antoinette de La Brunetière, dame de Castelvieilh, dont le château est situé près de Feugarolles. Le commun sud a été ajouté en 1825. Jeanne Debat-Ponsan, née le 30 juillet 1879 à Paris et morte le 13 septembre 1929 à Parnay, est l'une des premières femmes médecin françaises du XIXe siècle. Elle est la fille aînée du peintre Édouard Debat-Ponsan, et la sur de l'architecte Jacques Debat-Ponsan. Elle avait hérité du château par son père.\r\nLes façades et les toitures du château, le pigeonnier, la grande allée divisée en deux parties par la voie communale no 10, avec les quatre piliers de ses anciens portails ont été inscrits M.H le 24 mars 1997.","architecture":"Bastide du XIIIe siècle, Caudecoste conserve de sa riche histoire de nombreux vestiges de maisons à pans de bois, la place des Cornières avec ses passages couverts, des remparts.                                                Château de Nazelles, demeure édifiée à la fin du XVIIe siècle. Le château se compose d'un corps de logis cantonné de pavillons. Le décor de l'édifice est simple, conformément aux règles architecturales de la fin du XVIIe siècle. La porte d'entrée est entourée de deux pilastres de faible saillie. Ces pilastres soutiennent un entablement dorique surmonté, à l'origine, d'un fronton circulaire. Les pavillons disposent chacun de deux lucarnes à fronton triangulaire. Le vestibule a conservé son dé
