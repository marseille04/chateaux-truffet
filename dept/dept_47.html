erie. Celui-ci avait fait construire le château de Guillery, après avoir dû prendre sa retraite, suite à des blessures de guerre. Pendant son séjour à Guillery, Georges Sand faisait de grandes balades à cheval. Cest cette passion des chevaux qua également madame dArmancourt. Son arrière-grand-père a racheté le château en 1880. La mère de madame dArmancourt fut la première femme à monter à califourchon lors dun concours à Paris dans les années 1926-1927. Ce qui à lépoque était mal vu, car les femmes navaient pas le droit de mettre des pantalons. Elles montaient en amazone en robes. Madame d'Armancourt est la propriétaire actuelle du château de Guillery, elle y a quasiment toujours vécu, mais elle a fait ses études à Paris. Aujourdhui, cela fait 30 ans quelle y vit, depuis quelle est à la retraite. Il y a toujours eu des chevaux au château. Actuellement, le château de Guillery abrite le centre équestre « Côté Poney ».","architecture":"Un corps de logis central y est flanqué de deux ailes symétriques ajoutées au XIXe siècle en rez-de-chaussée. Les dépendances sud sont précédées par deux pavillons couverts de tuiles plates. Deux colonnes supportent le balcon central à balustre du premier étage. Des écuries et des dépendances agricoles complètent lensemble. Larchitecture densemble de cette demeure est représentative des maisons de notables de lépoque.","habitants":"Famille du  baron Dudevant\r\n        \r\n        \"","divers":"Château de Guillery","gps":"","images":["../../jctruffet.com/image/image_47/47_Guillery_1.jpg","../../jctruffet.com/image/image_47/47_Guillery_2.jpg"]},"Consult_chateau_formulairecb70":{"id":"Consult_chateau_formulairecb70","dept":"47","canton":"Villeneuve sur Lot","commune":"Hautefage la Tour","nom":"Hautefage","type":"Château","periode":"XV","histoire":"A Hautefage la tour épiscopale, le château de Lamassas et Pépinès pas d'information.            HAUTEFAGE, la  Tour d'Hautefage, aussi appelée château épiscopal, du  XIVe siècle dont le dernier niveau contenait un château d'eau. La tour a été construite par les évêques d'Agen d'origine italienne, Léonardo della Rovere et Antonio della Rovere. La tour a été conçue pour servir de résidence aux évêques d'Agen. Le domaine appartient à cette famille depuis la fin du XVe siècle. Entre 1487 et 1538, deux évêques dAgen, Léonardo et Antonio della Rovere, sinstallent à Hautefage et y font édifier une tour. La construction n'a probablement pas été terminée.           LAMASSAS, Jean-Girard Lacuée, comte de Cessac, né au château de Lamassas près de Hautefage-la-Tour dans l'arrondissement d'Agen  le 4 novembre 1752 et mort à Paris le 18 juin 1841, est un homme militaire et politique français, ministre de la guerre sous Napoléon et pair de France.","architecture":"Hautefage les armoiries de la famille italienne della Rovere sculptées à plusieurs endroits de la tour constituent la base du décor du château. Ce décor est complété par des bustes, des animaux, des anges ainsi que des ornements géométriques qui attestent de la richesse de ses propriétaires. Dès le  XVIIe siècle, la tour a servi de clocher à l'église Notre-Dame située en contre-bas. Dans la seconde moitié du  XIXe siècle, elle est considérée comme semi-ruinée. Des travaux de restauration sont entrepris à partir de 1888 en lui donnant la forme actuelle avec une balustrade, les contreforts d'angle surmontés de pinacle et la couverture conique en ardoise. La tour est transformée en château d'eau en 1957 en plaçant un réservoir en béton armé au troisième étage. Le réservoir est abandonné dès 1974. Des chutes de pierres en 2007 entraînent des travaux de restauration. La couverture a été refaite. Le réservoir d'eau a été cassé en 2013 et un plancher a été restitué. Les cloches ont été replacées au troisième étage. Les planchers doivent être réaménagés en même temps que les différents niveaux de la tour. Classée M.H en mai 1883.     Château de Lamassas : édifié au XVIIIe siècle par la famille Lacuée, c'est le lieu de naissance de Jean-Girard Lacuée comte de Cessac. Une arcade cintrée ouvre sur un vaste espace donnant accès au château et à ses dépendances. Les constructions sont en pierre de taille et moellon calcaire. Les dépendances comprennent un pigeonnier à toit en pavillon couvert de tuile plate et une voûte en berceau en partie basse. Un perron forgé garni de volutes, feuilles et monogrammes deux L entrelacés donne accès à la maison. La couverture en tuile canal se termine par une génoise à deux rangées.","habitants":"Leonardo della Rovere                                         Famille de Jean-Girard Lacuée\r\n        \r\n        \"","divers":"La tour d'Hautefage et le Château de Lamassas","gps":"","images":["../../jctruffet.com/image/image_47/47_Hautefage_1.jpg","../../jctruffet.com/image/image_47/47_Hautefage_2.jpg","../../jctruffet.com/image/image_47/47_Hautefage_3.jpg","../../jctruffet.com/image/image_47/47_Hautefage_4.jpg"]},"Consult_chateau_formulairecb5a":{"id":"Consult_chateau_formulairecb5a","dept":"47","canton":"Miramont de Guyenne","commune":"Bourgougnagne","nom":"Jolibert","type":"Château","periode":"XVII","histoire":"A Bourgougnane le château de Jolibert et le manoir de la grande Lande pas d'information pour ce dernier.   JOLIBERT, abrite la première maison familiale rurale d'Europe, qui fut initialement créée dans la commune de Ségalas. fondée en 1935 par l'abbé Pierre-Joseph Granereau. Aujourd'hui chambre d'hôtes.\r\nGRANDE-LANDE manoir avec sa chapelle datant du XVIe siècle ; ce domaine est une dépendance du château de Lauzun mais aussi une réserve de chasse du roi Henri IV. pas d'image","architecture":"Jolibert Sur la commune de Bourgougnague, prend le nom du lieu-dit où il se situe. Lédifice actuel, de style  Renaissance XVIe siècle jusquà 1598, entouré dun parc ombragé de 4 hectares, trouve son origine dans une construction datant de 1780, avec, sans doute linfluence du style néoclassique de lépoque. Cette bâtisse de 1780 est cependant victime dun incendie. Elle est donc fortement remaniée par la suite. Le château est bâti sur les fondements dune ancienne demeure datant de la période 1500-1550. Il est alors habité par une famille de notables de la région, les Manin, dorigine italienne, arrivés en France sous François Ier.","habitants":"Famille Jolibert\r\n        \r\n        \"","divers":"Château de Jolibert","gps":"","images":["../../jctruffet.com/image/image_47/47_Jolibert_1.jpg","../../jctruffet.com/image/image_47/47_Jolibert_2.jpg"]},"Consult_chateau_formulairecfa8":{"id":"Consult_chateau_formulairecfa8","dept":"47","canton":"Penne d","commune":"Massels","nom":"Lacam_Massels","type":"Château","periode":"XVI","histoire":"LACAM sur la porte des écuries du château de Lacam, on peut encore voir la date de début de sa construction en 1679. Il sagit en fait dune reconstruction en lieu et place dun premier manoir de style architectural moins militaire.\r\nUne maison de Lacam existe déjà avant le XVIIe siècle, non loin de la Tancanne. Cest en 1679 que Coderc de Lacam obtient de Jean-François de Gourdon de Genouillac lautorisation de détruire ce premier édifice et den construire un autre.","architecture":"Le château de Lacam est un édifice reconstruit de 1682 à 1695, date inscrite sur la porte de l'aile Est, par Jean-Claude Coderc de Lacam avec l'autorisation de son suzerain le baron de Frespech. Ce château, bâti sur un éperon, se compose d'un corps central et de deux ailes en retour d'équerre fermant avec les communs une cour intérieure. La grande salle du château a conservé sa cheminée d'origine. C'est dans cette pièce qu'est exposé le portrait à cheval de Coderc de Lacam, capitaine de chevau-légers. On dispose avec Lacam d'un témoin référencé des modes de construire pour l'architecture castrale de la fin du XVIIe siècle.","habitants":"Jean-Claude Coderc de Lacam\r\n        \r\n        \"","divers":"Château de Lacam à Massels","gps":"","images":["../../jctruffet.com/image/image_47/47_Lacam_Massels_1.jpg","../../jctruffet.com/image/image_47/47_Lacam_Massels_2.jpg"]},"Consult_chateau_formulairef297":{"id":"Consult_chateau_formulairef297","dept":"47","canton":"Villeneuve sur Lot","commune":"Saint-Avit","nom":"Lacapelle_Biron","type":"Château","periode":"XVII","histoire":"LACAPELLE-BIRON Le nom même de Lacapelle, ainsi que la mention en 1259 dune \"capella\" proche de Saint-Avit, semblent indiquer lexistence, au XIIIe siècle, sur le site actuel de Lacapelle-Biron, dune chapelle à défaut dun village portant ce nom. La construction dun château (dont subsistent de rares vestiges) dut en outre attirer une population soucieuse de sa protection. Au début du XVIIe siècle, \"La Chapelle\" est de fait une seigneurie, détenue par la famille de Carbonnières. Après la décapitation en 1602 de Charles de Gontaud-Biron, maréchal de France qui a trahi Henry IV, certains de ses proches, parmi lesquels Jean-Charles de Carbonnières, mettent au point en 1605 une nouvelle conspiration, dans le château de Lacapelle. Le roi ayant eu vent de laffaire, \"est definit que les chasteaux de Montfort, Giverzac, Tayac, Calvayrac et la Chapelle-Biron seront razés, mais laccord du vicomte de Turene fait avec le roy, portant abolition des crimes commis par les sieurs desdites places arresta ces ruines\" (une partie du château subsiste en effet jusquà un incendie en 1908).","architecture":"Alors que lensemble de la vallée forme une gorge étroite, la route souvre soudain sur un espace plus vaste et lumineux. Cest là, dominant la Lède-rivière qui donne son nom à la vallée-que surgit le site médiéval de Saint-Avit. Situé à lextrême Nord-Est du Lot-et-Garonne, le village de Saint-Avit dépend de la commune de Lacapelle-Biron.  En 1986, la commune de Lacapelle-Biron achète une maison en ruines près de léglise.Lidée naît alors de faire à Saint-Avit, un musée consacré à Bernard Palissy et à la céramique.Une association \"Les Amis du Musée Bernard Palissy\" est créée en 1990. Elle est chargée de gérer, danimer le futur musée, Une politique culturelle est définie par lassociation et la commune de Lacapelle-Biron : faire de cette structure un lieu vivant, consacré à la céramique ancienne et contemporaine.\r\nLa maison en ruines est restaurée. La première tranche du musée (deux salles) est opérationnelle en 1992.","habitants":"Bernard Palissy\r\n        \r\n        \"","divers":"Château de Lacapelle Biron dont le musée de Bernard Palissy grav 3.","gps":"","images":["../../jctruffet.com/image/image_47/47_Lacapelle_Biron_1.jpg","../../jctruffet.com/image/image_47/47_Lacapelle_Biron_2.jpg","../../jctruffet.com/image/image_47/47_Lacapelle_Biron_3.jpg"]},"Consult_chateau_formulairec649":{"id":"Consult_chateau_formulairec649","dept":"47","canton":"Bouglon","commune":"La Bastide-Castel-Amouroux","nom":"Lacaze","type":"Château","periode":"XVI","histoire":"LACAZE  Le château a appartenu à la famille Boutet de La Caze, appelée à partir du XVIIIe siècle, Boutet de Lacaze, notables protestants de Casteljaloux. François Boutet de La Caze a été lieutenant général du siège de Casteljaloux, charge qu'il avait acheté en 1680. À la suite de la révocation de l'Édit de Nantes, François Boutet de Lacaze a été arrêté avec son beau-frère, Augier de Massilos, et tous deux ont été enfermés au Château-Trompette, puis à la Bastille. La maison de La Caze a été partiellement démolie, le cimetière des aïeux de la famille profané. Leurs biens ont été saisis. François Boutet de Lacaze a été libéré plusieurs années plus tard et a retrouvé le château qu'il a restauré où il a mené une vie retirée. En 1895, l'architecte bordelais Louis Garros a remanié l'aile nord en créant un pavillon abritant une chapelle et a supprimé l'aile sud. En même temps, le paysagiste Eugène Bülher a réaménagé le parc.  Le château a été inscrit M.H le 27 mars 2008. Acheté en 1998 en piteux état, a été rénové dans les  règles de l'art.","architecture":"Le château de Lacaze, le cadre paysager de cette demeure est remarquable par son parc. La demeure a perdu sa composition d'origine en U du XVIIe siècle, dont il reste le grand corps central et l'aile nord des communs profondément remaniée au XIXe siècle. \r\nLe logis est bâti au XVIIe siècle selon un plan traditionnel en U, avec deux ailes en retour d'équerre, tandis que le corps principal est cantonné de deux pavillons. Le plan intérieur est en simple profondeur et organisé autour d'un vestibule central. À la suite de la révocation de l'Édit de Nantes, le château fût alors en partie démoli.  En 1895, l'architecte bordelais Louis Michel Garros remanie l'aile nord qu'il ponctue d'un pavillon abritant une chapelle et supprime l'aile sud. Parallèlement le paysagiste Bülher réaménage le parc tout en conservant une grande partie des éléments anciens. Castel Amoros, nom ancien de Labastide-Castel-Amouroux.","habitants":"lieutenant général François Boutet de La Caze \r\n        \r\n        \"","divers":"Château de Lacaze à la Bastide-Castel-Amouroux","gps":"","images":["../../jctruffet.com/image/image_47/47_Lacaze_1.jpg","../../jctruffet.com/image/image_47/47_Lacaze_2.jpg","../../jctruffet.com/image/image_47/47_Lacaze_3.jpg"]},"Consult_chateau_formulaire845e":{"id":"Consult_chateau_formulaire845e","dept":"47","canton":"Aiguillon","commune":"Aiguillon","nom":"Lacaze_Aiguillon","type":"Château","periode":"XVII","histoire":"LACAZE, construit au début du XVIIe siècle, le Domaine Lacaze s'étend sur 23 hectares.Une grille admirable prolongeant la grande allée rappelle la splendeur de son histoire, construite  pour Jean Teulon. En 1774, Pierre Valette, serrurier bordelais (1734-1784) exécute deux portails pour le château d'Aiguillon, sous la direction de Pierre Mollié, architecte de Barsac (Gironde) et maître d'uvre du château ducal d'Aiguillon. Le château est implanté dans la vallée du Lot, au cur d' un domaine agricole qui regroupa jusqu'à 11 métairies en 1832. Jean Teulon, négociant bordelais achète le château de Lacaze, et y installe ces grilles au début du XIXe siècle. L'écu du fronton porte son monogramme JT.   Aujourd'hui chambres d'hôtes.","architecture":"château de Lacaze-Aiguillon les bâtiments sont conçus sur le principe d'une exploitation modèle : le logis et les parties agricoles sont organisés symétriquement sur une cour en U, fermée par une grille et un portail en ferronnerie provenant du  château d'Aiguillon. Le corps de logis est flanqué de deux ailes latérales, construites en 1872.  Le château est implanté dans la vallée du Lot, au cur d'un domaine agricole qui regroupa jusqu'à onze métairies en 1832. Une grille admirable prolongeant la grande allée rappelle la splendeur de son histoire. Construit au début du XVIIe siècle,  c'est à l'origine une maison de Maître, dinspiration rustique \"à lItalienne\".  Après la disparition de Pierre Valette, les portails seront achevés en 1788 par Rodoloze, serrurier d'Aiguillon. Complètement rénovée depuis peu, vous serez séduit par le charme de cette demeure. Vous pourrez profiter de son parc majestueux.","habitants":"Famille de   Jean Teulon\r\n        \r\n        \"","divers":"Château de Lacaze à Aiguillon","gps":"","images":["../../jctruffet.com/image/image_47/47_Lacaze_Aiguillon_1.jpg","../../jctruffet.com/image/image_47/47_Lacaze_Aiguillon_2.jpg","../../jctruffet.com/image/image_47/47_Lacaze_Aiguillon_3.jpg","../../jctruffet.com/image/image_47/47_Lacaze_Aiguillon_4.jpg"]},"Consult_chateau_formulaire3668":{"id":"Consult_chateau_formulaire3668","dept":"47","canton":"Fumel","commune":"Montayral","nom":"Ladhuie","type":"Château","periode":"XV","histoire":"LADHUIE, en 1311, à la demande du roi d'Angleterre une enquête est faite sur les barrages à Guillaume Cazes, juge d'Agen. Pour accaparer les droits de péage, les seigneurs des environs ont fait construire à proximité des édifices fortifiés. La tour d'Orgueil s'appuie sur un de ces barrages. Le château a alors été construit pour contrôler le barrage et prélever des droits de passage. Pendant la guerre de Cent Ans, en 1424, la tour d'Orgueil appelée aussi de Ladhuie ou de Laduguie, est prise par Lancelot de la Barthe du parti anglais. Elle est reprise par Naudonnet de Lustrac qui combat pour le roi de France. D'après Gilles Séraphin, la tour de Ladhuie est remplacée à la fin du XVe siècle par un manoir, peut-être pour Armand de Laduguie mentionné entre 1502 et 1506. Armand de Laduguie a été marié à Jeanne de Lustrac, fille d'Antoine Ier de Lustrac. Un second corps de logis est édifié contre l'ancienne construction à la limite des  XVIe-XVIIe siècles, probablement pour la famille de Lagoutte. En 1695, les documents notariés citent Jacques de La Goutte, seigneur du Buscon, habitant son château de La Duguie, frère de François de La Goutte, seigneur de Lapoujade à Saint-Vite. Le logis est agrandi pendant la première moitié du XVIIe siècle. Le château est saisi au début de la Révolution comme bien de l'émigré Brous Cézerac. Il est vendu le 24 thermidor An II à Jean Maydieu. Le château a été inscrit M.H  le 20 juin 1950.   Le site est une propriété privée, entièrement close.","architecture":"Le site  de Ladhuie a été construit par les Templiers au XIIIe siècle,  est de forme linéaire,  présentant un élargissement au niveau de lentrée principale, au droit du château.  De plan rectangulaire, présentant trois niveaux, un corps de bâtiment en retour d'équerre plus un comble très élevé. Il se prolonge par une aile en retour, côté ouest, le long de la rivière. Il est daté du XVe et XVIe siècle, il a fait lobjet de restaurations récentes. Côté ouest, lespace est entouré de bâtiments, plus ou moins restaurés. Le long du bâtiment parallèle à la rive, en cours de restauration en 2010. Au droit du château, lespace est resserré, bordé par un bassin  de forme rectangulaire, orienté au sud, et marqué par le volume de 4 platanes en port libre ne présentant pas de traces de tailles sévères.   Le cadastre napoléonien (1831) représente le château avec un plan en U, ouvert vers le sud, et un bâtiment  qui nexiste plus, au devant du château, côté ouest. Le bassin est représenté. Lorganisation parcellaire laisse penser à  une composition de parc sur le côté est, avec des terrains rectangulaires qui se développent au devant de la façade du château. Restaurations du XVIe et XVIIe siècle.  Il renferme de grandes salles aux plafonds élevés, avec des cheminées du XVIIe siècle en pierre. Fenêtres géminées romanes à chapiteaux sculptés. Dans la salle-à-manger, une source jaillit dans le roc. Petite chapelle voûtée.","habitants":"Famille d'Armand de Laduguie\r\n        \r\n        \"","divers":"Château de Ladhuie à Montayral","gps":"","images":["../../jctruffet.com/image/image_47/47_Ladhuie_1.jpg","../../jctruffet.com/image/image_47/47_Ladhuie_2.jpg","../../jctruffet.com/image/image_47/47_Ladhuie_3.jpg"]},"Consult_chateau_formulairea947-2":{"id":"Consult_chateau_formulairea947-2","dept":"47","canton":"Ste-Livrade sur Lot","commune":"Villebramar","nom":"Lafaurie","type":"Château","periode":"XVI","histoire":"LAFAURIE,  peut-être édifié pour Mathieu Paul Bousquet de Lafaurie, avocat, décédé avant 1684. A la fin du XVIIIe siècle, le domaine passe à une branche des Ferrand, seigneurs de Mauvezin, suite au mariage de Marie Ragot de Lespinasse, fille de Marie de Bousquet, avec le chevalier Jean de Ferrand. Le manoir, demeuré en leur possession après la Révolution, est remanié pour Jacques et Jean de Ferrand durant la deuxième moitié du XIXe siècle: un logement puis une chapelle sont construits vers 1854; une partie de l'ancien corps de logis, sur cour, est reconstruite en 1860, prolongé d'une travée et flanqué d'une tour et de tourelles d'escalier en 1877. A la fin du XIXe siècle la vocation prunicole de l'exploitation est renforcée par la construction d'une métairie dotée d'équipements quasi industriels destinés à la cuisson et au conditionnement des pruneaux ; victime de la crise, cette activité a cessé dans l'entre-deux-guerres. Jean Besse, propriétaire du domaine à la suite de son père Guillaume Besse, entre 1849 et 1891.","architecture":"Lafaurie le manoir est implanté contre un escarpement rocheux délimitant une terrasse en retrait de la vallée du Petit Tolzac.  le noyau ancien du château comporte une tour quadrangulaire du XVIe siècle contre laquelle a été accolé un corps de bâtiment au XVIIe siècle.  Il se compose d'un corps de logis en L articulé sur une tour hors-oeuvre sur l'angle nord-est, et de dépendances sur cour. La tour quadrangulaire de deux étages, assise sur un socle rocheux, est bâtie en pierre de taille de tuf ; elle est couronnée de mâchicoulis et créneaux et couverte d'un toit pyramidal en ardoise. La partie ancienne du logis, attenant à la tour, est en moellon enduit. Son niveau de soubassement est percé d'une série de jours, et le rez-de-chaussée surélevé ouvre de plain-pied sur la cour ; un étage de comble est aménagé sous le toit à croupe brisé en tuiles plate et creuse. Le corps principal d'un étage sur soubassement est en pierre de taille de tuf, à bossage continu côté cour ; il est couvert d'un toit à longs pans à forte pente en tuile plate. La tour carré demi-hors-oeuvre sur l'angle sud-ouest, de trois étages, est couverte d'un toit pavillonnaire ; les tourelles rondes d'escaliers en vis encadrant la façade sur cour sont coiffées d'un toit conique en ardoise.","habitants":"Mathieu Paul Bousquet de Lafaurie\r\n        \r\n        \"","divers":"Château de Lafaurie à Villebramar","gps":"","images":["../../jctruffet.com/image/image_47/47_Lafaurie_1.jpg","../../jctruffet.com/image/image_47/47_Lafaurie_2.jpg","../../jctruffet.com/image/image_47/47_Lafaurie_3.jpg","../../jctruffet.com/image/image_47/47_Lafaurie_4.jpg","../../jctruffet.com/image/image_47/47_Lafaurie_5.jpg","../../jctruffet.com/image/image_47/47_Lafaurie_6.jpg"]},"Consult_chateau_formulaire81be":{"id":"Consult_chateau_formulaire81be","dept":"47","canton":"Layrac","commune":"Lafox","nom":"Lafox","type":"Château","periode":"XV","histoire":"LAFOX, est un château bâti à Lafox,Lafox, qui se trouve sur la Séoune au confluent avec le ruisseau la Gaule, non loin de Saint-Pierre-de-Gaubert. Le donjon est la partie la plus ancienne et date du Moyen Age. La première mention du château date de 1239. Les Durfort ont acheté le château en 1477. Après la guerre de Cent Ans, au XVe siècle, le Château de Lafox a été reconstruit. Il a été réaménagé au XVIe siècle. Alain de Durfort a fait construire la chapelle et une partie du logis après 1535. Son tombeau qui se trouvait dans la chapelle a été transporté au musée d'Agen. Charles IX a séjourné au château en 1564. Certaines fenêtres ont été murées. Le château de Lafox est classé aux M.H. depuis 1951, il a été restauré par Didier de Flaujac qui a été récompensé, en 2002, du Prix des Vieilles Maisons Françaises.","architecture":"Château de Lafox,  le donjon est la partie la plus ancienne et date du Moyen Âge. La première mention du château date de 1239.  Après la guerre de Cent Ans, au  XVe siècle, le château a été reconstruit, à deux niveaux  dans un style oblong, il a été réaménagé au XVIe siècle. On remarquera certaines fenêtres à meneaux  murées. Il a été classé au titre des M.H en 1951.","habitants":"Famille d'Alain de Durfort\r\n        \r\n        \"","divers":"Château de Lafox","gps":"","images":["../../jctruffet.com/image/image_47/47_Lafox_1.jpg","../../jctruffet.com/image/image_47/47_Lafox_2.jpg","../../jctruffet.com/image/image_47/47_Lafox_3.jpg","../../jctruffet.com/image/image_47/47_Lafox_4.jpg","../../jctruffet.com/image/image_47/47_Lafox_5.jpg","../../jctruffet.com/image/image_47/47_Lafox_6.jpg"]},"Consult_chateau_formulairef981":{"id":"Consult_chateau_formulairef981","dept":"47","canton":"Tonneins","commune":"Grateloup-Saint-Gayrand","nom":"Lagarde_Grateloup","type":"Château","periode":"XV-XVII","histoire":"LAGARDE,   en 1624, Jacques de Bruet, appartenant à une famille protestante et ancien gouverneur de Tonneins-Dessus, obtient l'autorisation de bâtir une maison noble dans le village de Lagarde. Le logis et les communs sont peut-être achevés en 1630, d'après une inscription figurant sur une fontaine à une centaine de mètres à l'est; \"au mois de décembre 1630 noble Jacques de Bruet écuyer seigneur de Lagarde a fait bâtir ces fontaines\". En 1722, possession de la famille de Grossolles de Flamarens, Lagarde est acheté après la Révolution par M. de Gelas ; l'aile nord, non figurée sur le cadastre de 1832, était ruinée, il est ensuite acheté en 1847 par un négociant bordelais, Martin Flouch, qui fait entreprendre une campagne de restauration en 1853 sous la direction de A. Lamothe.  Paul Flouch fils de Martin reçoit Lagarde en cadeau lors de son mariage avec Elise Faure.   Aujourd'hui résidence secondaire de la famille Faure-Lespinasse.","architecture":"Lagarde, au sud-est, le moulin sur le ruisseau du Rose a été restauré à la fin du XIXe siècle. Le château occupe une terrasse en bas de  la pente. Un fossé isole les bâtiments organisés sur une cour fermée, accessible à l'est par un corps de passage  fortifié, coiffé d'un toit à l'impériale. De part et d'autre les communs comprenant logement, remise et écurie flanqués de corps pavillonnaires (pigeonniers) sur les angles, sont reliés au logis par un mur autrefois crénelé; édifié en brique, en rez-de-chaussée surélevé sur un niveau de soubassement, il est formé d'un corps central de trois travées simple en profondeur, encadré symétriquement par deux ailes peu saillantes en retours d'équerre. Les toits à croupes sont couvert de tuiles plates. De gros travaux sont réalisés tant à l'extérieur qu'à l'intérieur donnant au château sa silhouette actuelle : à cette époque les douves sont comblées, le pont-levis supprimé, l'aile nord construite ou reconstruite. Le parc est dessiné sous sa forme anglaise. Les parties agricoles en moellon et le moulin en brique, sont couverts de tuiles creuses.  La métairie avec grange-étable au sud-est, est complétée en 1876 par un chai et un cuvier.","habitants":"Noble Jacques de Bruet\r\n        \r\n        \r\n        \"","divers":"Château de Lagarde à Grateloup","gps":"","images":["../../jctruffet.com/image/image_47/47_Lagarde_Grateloup_1.jpg","../../jctruffet.com/image/image_47/47_Lagarde_Grateloup_2.jpg","../../jctruffet.com/image/image_47/47_Lagarde_Grateloup_3.jpg","../../jctruffet.com/image/image_47/47_Lagarde_Grateloup_4.jpg","../../jctruffet.com/image/image_47/47_Lagarde_Grateloup_5.jpg"]},"Consult_chateau_formulaire73fe":{"id":"Consult_chateau_formulaire73fe","dept":"47","canton":"Mas d","commune":"Lagruère","nom":"Lagrande_Barriere","type":"Château","periode":"XV","histoire":"La grande Barrière, Il a été construit entre 1490 et 1551, au bord de la Garonne à «Lamarque», entre Tonneins et Lagruère, par Pierre de la Barrière. \r\nLa famille Walker, originaire de Hanbury en Angleterre,  a racheté le château en 2006. Elle mène petit à petit sa restauration depuis son installation dans la noble demeure en 2008.","architecture":"Le château de la grande Barrière possède trois tours dangle rondes, un corps central de trois niveaux, et en angle central une tour polygonale de quatre niveaux à toit pointu, une partie ancienne datant du XVIe siècle et une tour de style Renaissance.","habitants":"Famille de pierre de la Barrière\r\n        \r\n        \"","divers":"Château de Lagrande Barrière à Lagruère","gps":"","images":["../../jctruffet.com/image/image_47/47_Lagrande_Barriere_1.jpg","../../jctruffet.com/image/image_47/47_Lagrande_Barriere_2.jpg","../../jctruffet.com/image/image_47/47_Lagrande_Barriere_3.jpg"]},"Consult_chateau_formulaire05ad":{"id":"Consult_chateau_formulaire05ad","dept":"47","canton":"Nérac","commune":"Nérac","nom":"Lagrange_Monrepos","type":"Maison-forte","periode":"XV","histoire":"LAGRANGE-MONREPOS, durant la Renaissance, l'installation de la cour de Navarre à Nérac à entraîné la construction ou la rénovation de riches demeures destinées à l'entourage de la famille d'Albret. C'est ainsi que, vers 1550, le château de Lagrange-Monrepos qui aurait été construit ou rénové par Henri Ier d'Albret (Henri II de Navarre) et offert à sa maîtresse, Marianne Alespée, Pierre Alespée est seigneur de Lagrange. La propriété est restée dans la famille Alespée jusquau début du XVIe siècle, moment où ils sen dessaisissent pour une raison inconnue. En 1630 le manoir est acquit par la famille de Isaac de Jausselin époux de Marthe de Brassay. Au XVIIe siècle se succèdent Jean-Paul de Brassay de Jausselin époux de  Marie-Anne de Melet et à son fils appelé également jean-Paul qui en 1760 rend hommage pour ses biens aux héritiers  du duché  d'Albret. Une partie  vendue comme bien national à la Révolution. La famille de Brassey émmigre laissant la garde de Lagrange à sa soeur Marie dont les biens seront racheté en sous mains par des anciens propriétaires. Henri Raymond de Brassay retrouve son domaine presque intact à son retour d'émigration et s'éteint à Lagrange en 1822 sans postérité, le domaine passe à une branche cadette et par héritage à la famille de Guyonnet  de Montbalen, aujourd'hui propriété de monsieur Hermeling. Il a été inscrit M.H le 30 mai 1990 puis classé le 19 septembre 1991.","architecture":"Lagrange-Monrepos, l'aspect militaire de l'édifice est caractérisé par les six tours qui sélèvent autour du logis. Les meurtrières des tours d'angle de la cour ont été maintenues pour faciliter l'usage des armes à feu en cette époque de guerres de religion. De grandes croisées en pierre à encadrements moulurés et frontons ouvrent lhabitation sur la cour et vers la Baïse. Une vaste cour est clôturée et bordée par l'habitation et les communs. Le château primitif est constitué par un grand corps de logis rectangulaire, flanqué sur sa façade nord de deux tours. Une grosse tour ronde a été bâtie à quatre mètres de la façade sud, à laquelle elle est reliée par un haut mur percé d'une porte encadrée de pilastres portant un fronton triangulaire. Cette porte donnait primitivement accès à une petite cour carrée disparue. Les fenêtres à meneaux sont surmontées d'un fronton triangulaire et sont ornées d'un ove elliptique convexe présenté dans un cuir. La porte d'entrée du château présente un entablement à métopes et triglyphes. La grande salle du premier étage conserve une cheminée monumentale polychromée et des peintures. Le château, l'escalier d'entrée sa tour ronde et la fontaine sont classés ainsi que les dépendances les tours et les murs d'enceinte ainsi que le pigeonnier et son mécanisme. Caractérisé par ses multiples tours, le manoir principal comprend de très beaux salons de réception.","habitants":"famille d'Albret\r\n        \r\n        \"","divers":"Château de Lagrange-Monrepos à Nérac","gps":"","images":["../../jctruffet.com/image/image_47/47_Lagrange_Monrepos_1.jpg","../../jctruffet.com/image/image_47/47_Lagrange_Monrepos_2.jpg","../../jctruffet.com/image/image_47/47_Lagrange_Monrepos_3.jpg","../../jctruffet.com/image/image_47/47_Lagrange_Monrepos_4.jpg","../../jctruffet.com/image/image_47/47_Lagrange_Monrepos_5.jpg","../../jctruffet.com/image/image_47/47_Lagrange_Monrepos_6.jpg","../../jctruffet.com/image/image_47/47_Lagrange_Monrepos_7.jpg"]},"Consult_chateau_formulaire65cf":{"id":"Consult_chateau_formulaire65cf","dept":"47","canton":"Layrac","commune":"Layrac","nom":"Lagravade","type":"Manoir","periode":"XIX","histoire":"LAGRAVADE, le château de Lagravade est situé dans la région verte d'Aquitaine entre Bordeaux et Toulouse. En 2009, les propriétaires ont acquis le château datant du XIXe siècle. Pendant 5 générations c'était la demeure de la famille Bouet qui les a assistés avec la rénovation du château qui se trouve aujourd'hui dans sa splendeur d'antan. Les travaux ont duré 2 ans pour devenir de magnifiques chambres d'hôtes.\r\nDepuis juin 2014, Nathalie Magnin, David Vanorbeek, Zamira et Mirte habitent dans le château.","architecture":"A Layrac, ce manoir du XIXe, propose 4 chambres de luxe, rénové dans un style baroque et artistique. A l'entrée du village, blotti dans un écrin de verdure de 2 ha, et à l'ombre des cèdres centenaires, ce domaine vous enchantera. Vous y découvrirez de beaux volumes et une décoration réussie avec des touches de modernité, toujours en restant dans le plus profond respect du lieu. Le parc du château présente les nombreuses uvres d'art monumentales de votre hôte David Vanorbeek, sculpteur professionnel, et à l'intérieur du château, vous trouverez les oeuvres  \"textiles\" de son épouse Nathalie.","habitants":"Famille Bouet\r\n        \r\n        \"","divers":"Château de Lagravade à Layrac","gps":"","images":["../../jctruffet.com/image/image_47/47_Lagravade_1.jpg","../../jctruffet.com/image/image_47/47_Lagravade_2.jpg","../../jctruffet.com/image/image_47/47_Lagravade_3.jpg"]},"Consult_chateau_formulaire77b3":{"id":"Consult_chateau_formulaire77b3","dept":"47","canton":"Lavardac","commune":"Lavardac","nom":"Lahitte","type":"Château","periode":"XVII","histoire":"Au cur du vignoble de Buzet, dans la cour à arcades d'une chartreuse du XVIIIe siècle, le Château la Hitte vous accueille dans un bâtiment viticole restauré ouvrant sur une terrasse couverte avec vue sur les vignes. Géré par Lionel et Pascale Déprez.","architecture":"La HITTE, possède un corps de logis rectangulaire à un niveau avec fronton triangulaire en façade, toit en croupe, le corps est accolé à deux tours carrées à deux niveaux avec toit à quatre pans. Les bâtiments qui entourent la cour en gardent la trace. La salle de réception a été rénovée dans une ancienne étable par la suite transformée en garage et en logement. L'hébergement a été aménagé dans la première maison de La Hitte datant du XVIe siècle devenue un chai à la construction de la chartreuse dans les années 1770. Maintenant les bâtiments agricoles ont déménagé hors des murs de la cour et vous pourrez profiter du charme minéral des vieilles pierres.","habitants":"Famille Deprez\r\n        \r\n        \"","divers":"Le château de La Hitte à Lavardac","gps":"","images":["../../jctruffet.com/image/image_47/47_Lahitte_1.jpg","../../jctruffet.com/image/image_47/47_Lahitte_2.jpg","../../jctruffet.com/image/image_47/47_Lahitte_3.jpg","../../jctruffet.com/image/image_47/47_Lahitte_4.jpg","../../jctruffet.com/image/image_47/47_Lahitte_5.jpg"]},"Consult_chateau_formulairee31a":{"id":"Consult_chateau_formulairee31a","dept":"47","canton":"Penne d","commune":"Saint-Sylvestre sur Lot","nom":"Lalande","type":"Château","periode":"XVI","histoire":"LALANDE,  détenu par Henri de Bourran, du château de Roger à Villeneuve-sur-Lot. Vers le milieu du 19e siècle, le domaine passe par mariage dans les biens des Dordaygue,  Lensemble est restauré en 1992, avant dêtre aménagé en hôtel de luxe. Mais en 2008, la société qui exploite lensemble est placée en liquidation et le domaine est laissé à labandon. Un nouveau souffle est insufflé au château par Philippe Ginestet, enfant du pays, dirigeant fondateur du groupe de distribution GiFi. Il rachète le domaine en 2011 et décide avec son ami et architecte Jacques Bru de créer un complexe hôtelier unique au monde. Plusieurs mois de travaux sont nécessaires pour mettre en uvre ce projet architectural audacieux, et ainsi donner naissance à ce lieu dexception, le château Lalande a pris des couleurs. Lhôtel du Stelsia, qui compte 32 chambres, ouvrira ses portes le 27 juin.","architecture":"Lalande construit au Moyen-Âge, Du manoir originel de la fin du Moyen Age subsiste une partie du corps de logis flanqué d'une tour d'angle circulaire, en calcaire. Ce bâtiment est agrandi en tuf, peut-être au XVIe ou au début du XVIIe siècle, et complété par de nouvelles constructions, dont subsiste encore la tour nord-ouest. Le domaine détenu jusqu'au début du XVIIIe siècle par une famille d'avocat, les Douzon de Lalande, passe entre les mains des Ferrand de Lalande avant 1736, qui entreprennent des réaménagements : les percements du logis sont en particulier entièrement repris vers le milieu du XVIIIe siècle, avec de grandes fenêtres en arc segmentaire (une ouverture du rez-de-chaussée est datée 1768, le château est réaménagé aux XVI et XVIIe siècles ; au milieu du XVIIIe siècle, les huisseries des portes et des fenêtres sont entièrement refaites ; de nouvelles dépendances sont construites au XIXe siècle ; enfin, lensemble est restauré en 1992 avant dêtre aménagé en hôtel de luxe.  initialement ferme fortifiée, la bâtisse a évolué au fil de ses propriétaires successifs. Au XVIIIe siècle, les fenêtres sont également repercées en arc. Au XIXe siècle, le domaine passe par mariage dans les biens des Dordaygue, pour qui un corps de logis est édifié au sud. Lensemble est restauré en 1992, avant dêtre aménagé en hôtel de luxe.","habitants":"Famille des Dordaygue\r\n        \r\n        \"","divers":"Château de Lalande à Saint-Sylvestre sur Lot","gps":"","images":["../../jctruffet.com/image/image_47/47_Lalande_1.jpg","../../jctruffet.com/image/image_47/47_Lalande_2.jpg","../../jctruffet.com/image/image_47/47_Lalande_3.jpg","../../jctruffet.com/image/image_47/47_Lalande_4.jpg","../../jctruffet.com/image/image_47/47_Lalande_5.jpg"]},"Consult_chateau_formulaire12da":{"id":"Consult_chateau_formulaire12da","dept":"47","canton":"Miramont de Guyenne","commune":"Ferrensac","nom":"Lamothe_Ferransac","type":"Château","periode":"XV","histoire":"LAMOTHE est dans la même famille depuis le XVe siècle, au milieu de son écrin de verdure, il est situé au coeur du pays des bastides et de la gastronomie.  La tradition orale voudrait que la tour circulaire du château ait été construite en lan mil, mais elle est certainement moins ancienne.\r\nLe premier château est recensé parmi les biens dArnaud Alphéry en 1492. Le nom de Lamothe peut avoir des origines différentes. Dune part, Lamothe est souvent utilisé pour évoquer un ancien château féodal érigé sur un tertre. Pourtant, lédifice dont il est ici question se trouve sur un terrain plat. Il est alors possible que lorigine de son nom vienne de son propriétaire autrefois surnommé \"Seigneur de La Mote\". Il fait référence à la Mote Guérie, berceau de la famille des Alphéry situé à Saint-Dizier. En 1609, le dernier descendant de la lignée mâle séteint. Le château passe alors entre les mains de la famille Belcastel. Au XVIIIe siècle, il est rebâti pour devenir le manoir que lon connaît. Lordonnance des ouvertures de sa façade sur cour rappelle celle des chartreuses du canton comme à Douzains et Cavarc. Comme dans larchitecture des chartreuses, le nouveau château se compose dun logis flanqué de deux ailes carrées en avant-corps. Des éléments de lancien château ont été conservés comme la grosse tour circulaire précédemment évoquée. En 1841, lensemble de la propriété abrite jusquà vingt-trois personnes.  Aujourd'hui chambres d'hôtes  Marc et Ségolène vous y accueilleront en amis. Ils vous aideront dans la découverte de cette merveilleuse région.","architecture":"LAMOTHE FERRANSAC , au milieu de son écrin de verdure, construit au XVe siècle, corps de logis rectangulaire à deux niveaux toit en croupe, accolé sur ses flan de deux pavillons rectangulaire à deux niveaux  toit en croupe, prolongé sur l'arrière par un corps de logis de trois niveaux l'ensemble est recouvert de tuiles, au XVIIIe siècle construction de la tour, la légende raconte que la tour circulaire du château  à Ferransac date de lan mil.","habitants":"Famille dArnaud Alphéry \r\n        \r\n        \"","divers":"Château de Lamothe à Ferransac","gps":"","images":["../../jctruffet.com/image/image_47/47_Lamothe_Ferransac_1.jpg","../../jctruffet.com/image/image_47/47_Lamothe_Ferransac_2.jpg"]},"Consult_chateau_formulairee72b":{"id":"Consult_chateau_formulairee72b","dept":"47","canton":"Villeneuve sur Lot","commune":"Villeneuve sur Lot","nom":"Lamothe_Villeneuve","type":"Château","periode":"XVIII","histoire":"LAMOTHE, Le château a été construit par Jean-Joseph de Fumel, marquis de Fumel-Monségur, baron de Montaigu, qui a épousé le 21 novembre 1753 Marie-Anne d'Abzac. Les plans du château construit à la fin du XVIIIe siècle, sont attribués par Louis Hautecur à Victor Louis. Comme l'indique une inscription sur le fronton de la façade (« 1787, le marquis de Fumel-Montaigu et Marie-Anne d'Abzac sa femme »), le château a été offert par Jean-Joseph, marquis de Fumel, à son épouse Marie Anne d'Abzac. La construction du château a été commencée en 1780 et jamais terminée. Elle a été arrêtée par la Révolution. Le château a été divisé entre plusieurs propriétaires au début du XIXe siècle. Le domaine est acquis par Georges Leygues en 1912. Il fait remettre en état le parc. Le château a servi d'hôpital militaire pendant la Première Guerre mondiale. Entre 1937 et 1940, le château a été transformé en centre d'hébergement pour les enfants espagnols. Il passe ensuite par héritage aux Raphaël-Leygues. Le monument fait lobjet dune inscription au titre des M.H depuis le 19 mars 1971.","architecture":"LAMOTHE, un château sur motte contrôlait les passages sur le Lot au Moyen-Age. Une tour quadrangulaire de quatre niveaux est représentée sur un dessin du XVIe siècle. Le pigeonnier sur piles peut dater du XVIe ou du début du XVIIe siècle, selon l'inscription portée au fronton (repeinte). Le balcon est terminé avec une ferronnerie, au milieu du XXe siècle. L'élévation sur le parc présente trois avant corps, avec fronton central. Un corridor longitudinal distribue les pièces d'habitation au sud. Le pigeonnier, sur une motte au bord du Lot, est carré sur piles à capels en pierres plates, et pan de bois en petites croix hourdés en brique. Devant le château, un espace gazonné bordé de deux allées de platanes s'étend jusqu'à un saut de loup avec un bassin circulaire central. Le château est un bâtiment rectangulaire, comportant un avant-corps central à trois fenêtres avec un balcon surmonté d'un fronton triangulaire, et deux corps latéraux avec des fenêtres en arc de cercle au rez-de-chaussée.                                                                          À l'entrée du parc se dresse une ancienne motte féodale sur laquelle avait été construite une tour rectangulaire pour surveiller le passage sur le Lot. Il n'en reste plus qu'un monticule de terre surmonté d'un colombier.","habitants":"Famille de  Victor Louis\r\n        \r\n        \"","divers":"Château de Lamothe à Villeneuve sur Lot","gps":"","images":["../../jctruffet.com/image/image_47/47_Lamothe_Villeneuve_1.jpg","../../jctruffet.com/image/image_47/47_Lamothe_Villeneuve_2.jpg","../../jctruffet.com/image/image_47/47_Lamothe_Villeneuve_3.jpg","../../jctruffet.com/image/image_47/47_Lamothe_Villeneuve_4.jpg","../../jctruffet.com/image/image_47/47_Lamothe_Villeneuve_5.jpg"]},"Consult_chateau_formulairedf8f":{"id":"Consult_chateau_formulairedf8f","dept":"47","canton":"Casteljaloux","commune":"Sainte-Marthe","nom":"Lanauze","type":"Château","periode":"XVIII","histoire":"LANAUZE Lanauze, construit de 1751 à 1754 sur l'emplacement d'une habitation antérieure. Le château appartient à la famille de Seré de Lanauze depuis sa construction. Sa façade et ses toitures sont inscrites à l'inventaire des M.H depuis le 8 juin 1978.","architecture":"LANAUZE,  château construit de 1751 à 1754 sur l'emplacement d'une habitation antérieure. Un corps central à trois niveaux, couvert d'un toit brisé, et est flanqué de chaque côté de deux ailes basses couvertes d'un toit à grandes croupes. A l'est et à l'ouest des communs terminés par deux pigeonniers enserrent une cour fermée de grilles. Au centre, l'entrée est surmontée d'un fronton pignon percé d'une baie plein cintre. Cette entrée sud est agrémentée de deux pilastres. Les baies des bâtiments centraux sont en plein cintre; celles des bâtiments latéraux sont ouvertes sous un arc en anse de panier. Un bandeau limite un attique percé d'oeils-de-boeuf et de lucarnes à frontons. L'ensemble est bâti sur lit de briques, renforcés pour les chaînages et les décors, de pierre.  Sa façade et ses toitures sont inscrites à l'inventaire des M.H  depuis le 8 juin 1978.","habitants":"Famille de Seré de Lanauze\r\n        \r\n        \"","divers":"Château de Lanauze à Sainte-Marthe","gps":"","images":["../../jctruffet.com/image/image_47/47_Lanauze_1.jpg","../../jctruffet.com/image/image_47/47_Lanauze_2.jpg","../../jctruffet.com/image/image_47/47_Lanauze_3.jpg","../../jctruffet.com/image/image_47/47_Lanauze_4.jpg","../../jctruffet.com/image/image_47/47_Lanauze_5.jpg"]},"Consult_chateau_formulairee600":{"id":"Consult_chateau_formulairee600","dept":"47","canton":"Nérac","commune":"Lannes","nom":"Lannes_II","type":"Château","periode":"","histoire":"LAGRANGERIE, dans cet ancien monastère transformé en château au XVIIe siècle, que 2 frères et leurs épouses vous accueillent pour vous présenter ce haut lieu de la production dArmagnac, de Floc de Gascogne et de Pruneaux dAgen. Racheté par un armateur Bordelais en 1730, puis par leur arrière-grand-père sur un coup de cur, Antoine et Robert font de ce château exceptionnel un bien précieux quils ne cessent de rénover année après année en restant fidèle à son histoire. A travers une architecture exceptionnelle et des vestiges étonnants. Propriété de madame de Langalerie.                                            ROUMAT, manoir, situé à lentrée de Lannes, il possède une tour à ouvertures à meneaux.               SALLES, c'est une construction datée du XIIIe siècle. Deux ailes voûtées aux toits pentus encadrent un corps central orné douvertures à meneaux.             TRIGNAN Au lieu-dit de Trignan, à Mézin, subsiste un château du XVe siècle, propriété de la famille de Mélignan jusquau XIXe siècle","architecture":"LAGRANGRERIE  était autrefois un prieuré  qui fût construit par les moines de lordre des Prémontrés au XIIe siècle.   Ancienne abbaye de Prémontrés bâtie au XIIIe siècle. La chapelle a perdu ses voûtes. Le porche est en plein cintre à quatre arcatures reposant sur des colonnettes à feuilles d'acanthe. Une tour en forme de losange repose sur deux trompes et une autre, en encorbellement, soutenu par un contrefort, encadrent le porche. Le logis d'habitation est composée d'un corps de logis barlong, encadré par deux pavillons carrés coiffés en pyramide. Le porche de la maison et celui de la cour datent du XVIIe siècle. La partie du bâtiment touchant à la chapelle paraît dater du XVIe siècle.                                                                            TRIGNAN, la première mention du lieu de Trignan apparaît en 1286 mais le château est reconstruit à la fin du Moyen Âge, au XVe siècle, en un corps de bâtiment quadrangulaire cantonné de quatre tours rondes.","habitants":"\"","divers":"A Lannes le château de Lagrangerie grav 1 et 2,  Trignan grav 3, autres châteaux grav 4 et 5, le vieux château grav 6 et le château de Lassalle grav 7 -8 et 9.","gps":"","images":["../../jctruffet.com/image/image_47/47_Lannes_II_1.jpg","../../jctruffet.com/image/image_47/47_Lannes_II_2.jpg","../../jctruffet.com/image/image_47/47_Lannes_II_3.jpg","../../jctruffet.com/image/image_47/47_Lannes_II_4.jpg","../../jctruffet.com/image/image_47/47_Lannes_II_5.jpg","../../jctruffet.com/image/image_47/47_Lannes_II_6.jpg","../../jctruffet.com/image/image_47/47_Lannes_II_7.jpg","../../jctruffet.com/image/image_47/47_Lannes_II_8.jpg","../../jctruffet.com/image/image_47/47_Lannes_II_9.jpg"]},"Consult_chateau_formulaire2ad9":{"id":"Consult_chateau_formulaire2ad9","dept":"47","canton":"Nérac","commune":"Lannes","nom":"Lannes_Mezin","type":"Château","periode":"","histoire":"Plusieurs châteaux à Lannes, Dauzac, Lagrangerie (voir article suivant). Loupillon Roumat, Bégué, Parron, la Salle et Trignan( voir article suivant pour ces deux derniers). \r\nAUZAC, à la fin du XIXe siècle, elle est acquise avec le domaine du Lion d'Or par Hourteillan, négociant en vin et armagnac, qui baptise sa demeure de BEGUE, situé au bord de la route de Mézin, sa massive construction en pierre de taille souvre sur une cour dominée par une tour à toit pentu. Mézin  et sa société du nom de château d'Auzac.                                                                     LOUPILLON, à la fin de son septennat en 1913, Armand Fallières se retire dans son domaine de Loupillon, une propriété viticole familiale proche de Mézin, dont il vantait les vignes et fruits à lElysée. Il y finira ses jours jusquen 1932. En 1938, Mézin honore la mémoire de sa personnalité la plus illustre en inaugurant une statue de bronze représentant lancien Président de la République. Ce monument attira les foudres du gouvernement de Vichy qui le fit détruire en 1942. Il a depuis été remplacé par un buste en 1957.    PARRON   Au XVe siècle, une famille de Barrau y est mentionnée.  À partir du XVIe siècle, elle s'élève dans la hiérarchie nobiliaire.  Une autre branche s'établit en Comminges et une autre d'abord au Danemark puis dans le Nord de la France. En 1788, les Barrau vendent le château de Parron à la famille de Castillon qui à son tour le transmettra à la famille de Saint-Exupéry. La famille de Barrau (de Parron) s'est éteinte à la fin du XVIIIe siècle.","architecture":"AUZAC   maison forte construite sur un site qui contrôle un méandre de l'Osse. L'édifice est constitué d'une tour quadrangulaire et d'un corps de logis rectangulaire,  la tour en pierre de taille, dont les deux niveaux conservés n'ont presque pas d'ouvertures,  date du XIVe siècle,  la salle présente une cheminée ornée de moulures de la fin du XVe siècle ou du début du XVIe siècle.   Les étables ont été adossées au logis au XIXe siècle, sous un appentis sur l'arrière, selon une disposition fréquente dans la région. La tour a été abaissée à une époque indéterminée. Dépendances en ruines.                                                                     BEGUE, situé au bord de la route de Mézin, sa massive construction en pierre de taille souvre sur une cour dominée par une tour à toit pentu. La première époque de construction remonte au Moyen-Âge, construction successives allant du XIVe siècle au XIXe siècle, comme en témoignent les assises inférieures dans laile est du logis. Au XVIe siècle, le bâtiment est doublé en profondeur comme lindiquent la croisée et la demi-croisée chanfreinées au sud-est.        PARRON,, a une construction primitive qui remonte  au XIIe siècle, mais qui a été  remanié au XVIe siècle, des fenêtres style Renaissance à meneaux qui orne la cour intérieure de colonnades. Des restes de fortifications et de douves témoignent de limportance dune grosse forteresse dominée de 7 tours (4 sont encore visibles). Remanié au XIXe siècle,  les colonnades et les meneaux ont disparu.","habitants":"Famille Barrau pour Perron\r\n        \r\n        \"","divers":"A Lannes Dauzac grav 1, de Loupillon grav 2 et 3,  Bégué grav 4, et Parron grav 5-6-7.","gps":"","images":["../../jctruffet.com/image/image_47/47_Lannes_Mezin_1.jpg","../../jctruffet.com/image/image_47/47_Lannes_Mezin_2.jpg","../../jctruffet.com/image/image_47/47_Lannes_Mezin_3.jpg","../../jctruffet.com/image/image_47/47_Lannes_Mezin_4.jpg","../../jctruffet.com/image/image_47/47_Lannes_Mezin_5.jpg","../../jctruffet.com/image/image_47/47_Lannes_Mezin_6.jpg","../../jctruffet.com/image/image_47/47_Lannes_Mezin_7.jpg","../../jctruffet.com/image/image_47/47_Lannes_Mezin_8.jpg"]},"Consult_chateau_formulaire3041":{"id":"Consult_chateau_formulaire3041","dept":"47","canton":"Colayrac Saint-Cirq","commune":"Brimont-Laplume","nom":"Laplume","type":"Château","periode":"XVIII","histoire":"LAPLUME bastide fortifiés avec rempart et château de Lassalle-Brimont et un manoir au lieu dit de Pouzergues.                                                                     Le site de Laplume a été occupé dès lAntiquité. Au haut Moyen Âge, des habitations sont construites autour dune nécropole mérovingienne, la commune  sest déplacée aux XIIIe et XIVe siècles sur un éperon rocheux. vestiges des remparts et portes.      LASSALLE,  quand Napoléon 1er offrit le château au général de Lassalle, Catherine et Cédric François allaient redonner une vie nouvelle à cette magnifique bâtisse devenue hôtel, Vous avez le produit, nous avons l'écrin» propose avec un sourire enchanteur Catherine, née en Belgique, captivée par la région et par Cédric, son mari issu d'école hôtelière.","architecture":"Lassallle Brimont est une belle demeure du XVIIIe siècle, installée au milieu d'un parc de 8 hectares, de plan en U, trois corps de logis à deux niveaux, l'ensemble toits en croupe couvert de  tuiles. Dépendances en face de l'édifice dans le même style de plan en U et entre deux une tour ou pigeonnier carré.","habitants":"Général de Lassalle\r\n        \r\n        \"","divers":"Remparts de Laplume et son château grav 3, le château de Lassalle-Brimont grav 4-5-6 et le manoir de Pouzergues grav 7.","gps":"","images":["../../jctruffet.com/image/image_47/47_Laplume_1.jpg","../../jctruffet.com/image/image_47/47_Laplume_2.jpg","../../jctruffet.com/image/image_47/47_Laplume_3.jpg","../../jctruffet.com/image/image_47/47_Laplume_4.jpg","../../jctruffet.com/image/image_47/47_Laplume_5.jpg","../../jctruffet.com/image/image_47/47_Laplume_6.jpg","../../jctruffet.com/image/image_47/47_Laplume_7.jpg"]},"Consult_chateau_formulaire9e25":{"id":"Consult_chateau_formulaire9e25","dept":"47","canton":"Agen","commune":"Laroque-timbaut","nom":"Laroque_Timbault","type":"Patrimoine","periode":"XIII-XV","histoire":"A Laroque-Timbaut le château de laroque, de Roland.   La ROQUE-TIMBAUT, est cité pour la première fois en 1271. Il sert de refuge en cas de conflits pour la population alentour grâce à sa situation privilégiée, sur un éperon escarpé. Actuellement, il ne reste que des vestiges de cette forteresse médiévale, démolie bien avant la Révolution. Le dernier seigneur des lieux nétant pas très apprécié, la population sest vengée en détruisant sa demeure.  Le château fort et le donjon : le château est cité dans un acte de 1271. En 1272, les seigneurs agissant chacun en raison de leur droit sur un quart de cette seigneurie, donnèrent des coutumes. Les plus puissants furent sans aucun doute les Durfort. Il fut détruit bien avant la Révolution, par la faute du dernier seigneur de Laroque, Raffin d'Hauterive. C'est la population qui entreprit la démolition par vengeance. Il ne reste que le donjon, voué au XIXe et au début du XXe siècle à une réserve d'eau. Il desservait les bornes fontaines, situées à chaque coin de rue du bourg. Cette citerne était alimentée par des pompes, actionnées par une grande roue.","architecture":"Laroque-Timbaut, les Remparts et la Porte du Traître: en 1418, par la porte de Cordoue, les Anglais s'emparèrent du château par trahison. Le lendemain, le traître fut pendu à cette porte, par ces mêmes Anglais. Ils furent chassés peu de temps après par le Seigneur de Montpezat. Et l'on pourrait rajouter, en plus, l'église du Bourg, le calvaire, l'église Saint-Pierre-d'Orival, l'église de Norpech ou la grande roue.","habitants":"Famille des Durfort               \r\n        \r\n        \"","divers":"Le château de Laroque Timbault avec sa porte, vestiges et Mairie et le château Roland grav 8","gps":"","images":["../../jctruffet.com/image/image_47/47_Laroque_Timbault_1.jpg","../../jctruffet.com/image/image_47/47_Laroque_Timbault_2.jpg","../../jctruffet.com/image/image_47/47_Laroque_Timbault_3.jpg","../../jctruffet.com/image/image_47/47_Laroque_Timbault_4.jpg","../../jctruffet.com/image/image_47/47_Laroque_Timbault_5.jpg","../../jctruffet.com/image/image_47/47_Laroque_Timbault_6.jpg","../../jctruffet.com/image/image_47/47_Laroque_Timbault_7.jpg","../../jctruffet.com/image/image_47/47_Laroque_Timbault_8.jpg"]},"Consult_chateau_formulaire996d":{"id":"Consult_chateau_formulaire996d","dept":"47","canton":"Tonneins","commune":"Clairac","nom":"Larrouy","type":"Château","periode":"XVIII","histoire":"LARROUY,  a été édifié au XVIIIe siècle, en 1821 montre un bâtiment en U et le plan régulier des allées des jardins situés au nord et à l'ouest du château, aujourd'hui en société de loisir en nom collectif sous la responsabilité du gérant Jean Berger. Aujourd'hui société de loisir.","architecture":"Larouy le château de plan en U est composé de plusieurs corps de bâtiment juxtaposés. L'ensemble est construit selon un plan rectangulaire à 3 niveaux d'élévation avec lucarnes sur le brisis. Le soubassement est en pierre calcaire de moyen appareil. Les 2 étages carrés sont en moellon couvert d'un enduit. Les différentes toitures (toits en pavillon, toits brisés en pavillon) sont couvertes d'ardoise. L'élévation antérieure comprend 5 travées, 2 pavillons sont en légère saillie sur les côtés. Un escalier à 2 volées droites d'une dizaine de degrés donne accès à la porte en plein-cintre située sur la travée centrale. La porte est couronnée par un fronton interrompu. Au-dessus, une baie comprend traverses et meneaux, elle est couronnée par un fronton en plein-cintre contenant un monogramme.","habitants":"gérant Jean Berger\r\n        \r\n        \"","divers":"Château de Larrouy à Clairac","gps":"","images":["../../jctruffet.com/image/image_47/47_Larrouy_1.jpg","../../jctruffet.com/image/image_47/47_Larrouy_2.jpg","../../jctruffet.com/image/image_47/47_Larrouy_3.jpg","../../jctruffet.com/image/image_47/47_Larrouy_4.jpg","../../jctruffet.com/image/image_47/47_Larrouy_5.jpg"]},"Consult_chateau_formulaire1bbf":{"id":"Consult_chateau_formulaire1bbf","dept":"47","canton":"Nérac","commune":"Calignac","nom":"Lassalle_Calignac","type":"Château","periode":"XVI-XVIII","histoire":"Cinq châteaux à  Calignac dont celui de Cadéran, de Calignac, de Caubéos, de Lassalle, de Mons  et de Barbe.                                                                                CALIGNAC,  à la fin du  XIIIe siècle, un castrum est attesté. En 1362, il dépend de la maison d'Albret. Au début du XVIIe siècle, le village de Calignac, entouré de fortifications, est accessible par trois portes,   possède aussi cinq châteaux privés témoignant de la richesse du patrimoine et de lhistoire de la commune. \r\nLe château de Cardéran, pas d'information historique.                                                                         Le château de CAUBEOS, société civile est en activité depuis 4 ans. Implantée à Calignac elle est spécialisée dans le secteur d'activité de la location de terrains et d'autres biens immobiliers, et sa tour dangle carrée, sa cour intérieure et son pigeonnier circulaire.   Puis  le château de BARBE ou Barthes.","architecture":"CARDERAN, avec pigeonnier dont la construction remonte au XIXe siècle et pourvu non loin dun pigeonnier sur piliers du XVIIe siècle surmonté dun campanile.\r\nChâteau de LASSALLE avec chapelle du XIIe siècle, inscrit au titre des M.H en 2010. Lassalle, est doté dun corps de logis, dun escalier de pierre, et dune cour intérieure permettant daccueillir les équipages au temps dHenri IV.                                                     Manoir de MONS dit de Menlan des XVIIe et XIXe siècles,   construit sur des vestiges gallos romains, possède une cour carrée et deux tours dangles aussi appelé château de Menlan, offre un beau panorama sur la commune voisine de Montagnac-sur-Auvignon. Construit sous Henri IV, le château est rebâti au XVIIe siècle sur des ruines datant de lépoque romaine, comme en témoignent les vestiges de colonnes découvertes dans les dépendances. Une pierre sculptée, retrouvée avec des armoiries en partie effacées et la date de 1616, tend à confirmer la date de reconstruction. Le domaine comprend une cour carrée, des pigeonniers et un corps de logis à deux étages avec deux ailes de dépendances formant un plan en U. Des aménagements sont effectués au XIXe siècle. Il sagit de travaux de restauration et de la construction de dépendances.\r\nMaison noble du Grand Bourdieu à Caubéos, qui pourrait remonter au  XVIe siècle.","habitants":"Seigneurs locaux et Famille d'Albret\r\n        \r\n        \"","divers":"Château de Lasalle-Calignac, de Cardéran grav 4 et de Mons grav 6 et 7.","gps":"","images":["../../jctruffet.com/image/image_47/47_Lassalle_Calignac_1.jpg","../../jctruffet.com/image/image_47/47_Lassalle_Calignac_2.jpg","../../jctruffet.com/image/image_47/47_Lassalle_Calignac_3.jpg","../../jctruffet.com/image/image_47/47_Lassalle_Calignac_4.jpg","../../jctruffet.com/image/image_47/47_Lassalle_Calignac_5.jpg","../../jctruffet.com/image/image_47/47_Lassalle_Calignac_6.jpg","../../jctruffet.com/image/image_47/47_Lassalle_Calignac_7.jpg","../../jctruffet.com/image/image_47/47_Lassalle_Calignac_8.jpg"]},"Consult_chateau_formulaire8336":{"id":"Consult_chateau_formulaire8336","dept":"47","canton":"Nérac","commune":"Lasserre","nom":"Lasserre_47","type":"Château","periode":"XIII-XVI","histoire":"LASSERRE, castrum mentionné en 1259. L'édifice médiéval, dit La Salle, se trouvait au sud, dominant la vallée de la Baïse. Il est rebâti entre 1595 et 1602 pour Jean Paul d'Esparbès de Lussan, sénéchal d'Agenais et de Condomois, alors propriétaire de Lasserre par son mariage en 1570 avec Catherine Bernarde de Montagut, dame de La Serre  épouse  Jean-Louis d'Esparbès maréchal de France. Paul Vaudoyer  travaille en 1609 sur le château de La Chapelle-sous-Crécy. Le château est vendu en 1752, à la comtesse de Narbonne-Pelet qui épousa  Jean-Jacques de Digeon de Monteton  et par successions aux Gervain, le comte de Digeon de Monteton en fait une ferme modèle avec Jean-Jacques Digeon de Monteton, comte de Monteton, en 1754. Celui-ci conservera le château jusqu'à l'extinction de cette famille en 1835, après le décès de Philippe Digeon de Monteton, le château ira, par héritage, à Léopold de Gervain qui fit restaurer le château où il réside . A partir de 1851, il est restauré par Jules-François Lafargue, architecte à Bordeaux, et Lucien Dubary de Lassale pour Léopold de Gervain , le domaine est passé aux Pourtalès qui le possède toujours.","architecture":"Le château était alors couvert et le seigneur du lieu a choisi un sculpteur pour construire rapidement les trois cheminées monumentales placées dans les trois plus grandes salles pour rendre le château habitable. Marin de Lavallée architecte à Paris, a réalisé les plans et surveillé la construction de 1595 à 1597, avec Balthazar Delly, maître maçon de Marsal , le contrat de 1596 précise que le pavillon, l'appartement, les deux salles superposées, les chais et le pressoir sont couverts, le décor, l'aménagement d'appartements dans la tour médiévale sont commandés, mais une galerie prévue au-dessus des chais n'a pas été réalisée. Le chantier est repris en 1598 par Paul Vaudoyer maître maçon et tailleur de pierre à Paris. La chapelle est datée de 1625. Le château de Lasserre a été inscrit aux M.H. le 7 janvier 1926. la tour est démolie et les chais reçoivent une nouvelle façade plus régulière. L'édifice est distribué autour d'une cour au fond de laquelle est le logis, prolongé par le chai, la cour est cantonnée de quatre tours, entourée de fossés, accessible par un corps d'entrée.","habitants":"Jean Paul d'Esparbès de Lussan\r\n        \r\n        \"","divers":"Château de Lasserre","gps":"","images":["../../jctruffet.com/image/image_47/47_Lasserre_47_1.jpg","../../jctruffet.com/image/image_47/47_Lasserre_47_2.jpg","../../jctruffet.com/image/image_47/47_Lasserre_47_3.jpg","../../jctruffet.com/image/image_47/47_Lasserre_47_4.jpg","../../jctruffet.com/image/image_47/47_Lasserre_47_5.jpg"]},"Consult_chateau_formulaire7e67":{"id":"Consult_chateau_formulaire7e67","dept":"47","canton":"Aiguillon","commune":"Laugnac","nom":"Laugnac","type":"Château-Tour","periode":"XIII-XVI","histoire":"A Laugnac le château de Laugnac et de Quissac du XVe siècle (Voir Article)                                        LAUGNAC, le second fils d'Alain de Montpezat, et son héritier universel, François de Montpezat, marié à Nicole de Livron, terminera la reconstruction du château. Il va recevoir l'évêque d'Agen Janus Frégose, Blaise de Monluc.   En 1576 le château est de nouveau aux mains des protestants. Après la mort de François II de Montpezat, fils de François, tué aux combats de Briquemont.  La paix revenue, le château a été remis en état par Honorat de Montpezat, frère de François II de Montpezat, premier comte de Laugnac. Le château a été peu visité par Charles Ier de Montpezat, fils d'Honorat, surtout après son mariage avec  Serène de Durfort de Bajamont, le 17 avril 1618, qui lui a apporté le château de Lafox, les seigneuries de Bajamont et de Faugarolles. L'abandon du château est devenu définitif quand Charles Ier de Montpezat passe une transaction, en 1662, avec François de La Roche Fontenilles à la suite de son mariage avec Marguerite-Gabrielle de Montpezat. Cette transaction portait sur les terres autour du château. Pendant les troubles de la Fronde, Charles Ier de Montpezat, comte de Laugnac, est auprès du duc de Candale, maréchal de camp des armées du roi.  Puis son fils, François III de Montpezat, comte de Laugnac, baron de Frégimont et de Faugarolles, seigneur de Fréchou, Lafox, marié avec Marie de Lalanne, comtesse de Villandraut, d'où Charles II de Montpezat, marié avec Gilberte-Charlotte-Françoise de Monestay de Chazeron, dernier héritier mâle, mort en 1694. Les Monestay-Chazeron ont hérité en 1694 du château de Laugnac avec les biens et titres des Montpezat-Laugnac.","architecture":"LAUGNAC, la tour de Laugnac est un donjon carré, dernier vestige du château fort de Laugnac du XIIIe siècle, rebâti au XVe siècle ou remanié au XVIe siècle, qui se dresse sur la commune de Laugnac. En août 1728, la foudre tombe sur le château faisant une brèche de 9,75 mètres de largeur sur 5,85 mètres de hauteur dans la façade est, avec des dégâts à l'intérieur. La dégradation lente du château va commencer à partir de 1790. On ne sait pas si  toutes les réparations  ont été faites car le château n'est plus habité.   La tour fait lobjet dune inscription au titre des M.H  par arrêté du 20 juin 1950","habitants":"Famille de Montpezat     \r\n        \r\n        \"","divers":"La tour de Laugnac","gps":"","images":["../../jctruffet.com/image/image_47/47_Laugnac_1.jpg","../../jctruffet.com/image/image_47/47_Laugnac_2.jpg","../../jctruffet.com/image/image_47/47_Laugnac_3.jpg"]},"Consult_chateau_formulaire6505":{"id":"Consult_chateau_formulaire6505","dept":"47","canton":"Miramont de Guyenne","commune":"Lauzun","nom":"Lauquerie","type":"Forteresse","periode":"XIV-XVI","histoire":"LAUQUERIE, le château de Lauquerie fut érigé au XIVe siècle en temps que forteresse pour défendre les portes de la Dordogne. Longtemps bastion des Templiers, il fut le témoin de nombreuses batailles qui le détruisirent  à plusieurs reprises.   Les Armoiries que lon y retrouve remontent à François de Longueval, fidèle écuyer dHenri IV. C'est pour ses bons et loyaux services qu'Henri IV l'anoblit par lettre le 26 Juin 1603 et lui offrit le château avec les terres alentours. Il devint alors Sire de Longueval, de la Font-del-Nègre, de Locqueris, de la Lande, de Villars, de Villepart.   En 1766, cest un autre membre de cette même famille originaire du Périgord qui acquit le domaine  messire Jean de Longueval, chevalier, devenu de ce fait « seigneur de Locquerie ». Les heures noires de La Révolution Française (1789) eurent raison du château qui, endommagé, fut abandonné. L'empreinte de son existence durant le siècle suivant, reste pour l'instant une énigme. Elle est lobjet de nos recherches actuelles. Et peu à peu le voile se soulève. Le château fut acheté, dans les années 1885, par la famille Lajaunie, qui en resta propriétaire pendant plus d'un siècle. Un Américain acheta le château il y a plus de 20 ans et fit entreprendre dénormes travaux de rénovations, pour en faire un « hôtel-restaurant 4 étoiles ».  Son activité ne dura pas très longtemps et il dû le revendre. Il fut administré à un couple dAméricains qui lutilisèrent depuis lors comme résidence secondaire, ny séjournant quune fois par an en été. Aujourdhui, de retour entre les mains dune famille Française, le château de Lauquerie -Patrimoine de la Belle Aquitaine, livre sa noblesse et son histoire au fil des jours.","architecture":"Lauquerie, son architecture montre bien les différentes modifications qui lui furent apportées au cours des  XVIe et  XVIIIe siècles. De plan en U par des dépendances oblongues, le corps de logis principal de plan rectangulaire à deux niveaux  flanqué plein cintre en façade intérieure d'une tour polygonale et deux tours carrée à l'arrière sur les angles, toit en croupe, le deuxième corps de logis sur dépendances à deux niveaux à toits brisés avec séries de lucarnes, l'ensemble de la bâtisse est couverte de tuiles.","habitants":"Famille de François de Longueval\r\n        \r\n        \"","divers":"Château de la Lauquerie à Lauzun","gps":"","images":["../../jctruffet.com/image/image_47/47_Lauquerie_1.jpg","../../jctruffet.com/image/image_47/47_Lauquerie_2.jpg","../../jctruffet.com/image/image_47/47_Lauquerie_3.jpg","../../jctruffet.com/image/image_47/47_Lauquerie_4.jpg"]},"Consult_chateau_formulaireed47":{"id":"Consult_chateau_formulaireed47","dept":"47","canton":"Villeneuve sur Lot","commune":"Laussou","nom":"Laussou_Barayre","type":"Château","periode":"XVII","histoire":"A Lausssou, le château de Barayre, de Boinet (Voir Article) et au nord à Dévillac le château Bertrand pas d'information pour ce dernier.                                  BARAYRE  est situé au lieu dit Envals.  Au XIIe siècle, un prieuré est mentionné à Envals ainsi quune église. À cette période, le pouvoir des religieux égale limportance de celui des seigneurs fonciers. Ils assurent comme eux la protection des populations. Lépoque est en effet troublée, la région se trouvant à la frontière de lAgenais et du Périgord lors des conflits entre Français et Anglais.","architecture":"Barayre, Le château est un bel édifice construit au XVe siècle avec des murs épais en pierre avec de lourdes portes et des parquets en chêne d'origine. Un vieux puits dans la cour parle des jours enfuis. En quelques mots, c'est un magnifique bâtiment jouissant d'une réelle aura et entouré de 20 hectares de prairies.    Château Bertrand, corps de lois  de plan rectangulaire à deux niveaux, attiques au premier étage  deux tours carrées au extrémités à deux niveaux toits à quatre pans avec lucarnes, couvert de tuiles.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Château de Barayre à Laussou et le château Bertrand grav 5.","gps":"","images":["../../jctruffet.com/image/image_47/47_Laussou_Barayre_1.jpg","../../jctruffet.com/image/image_47/47_Laussou_Barayre_2.jpg","../../jctruffet.com/image/image_47/47_Laussou_Barayre_3.jpg","../../jctruffet.com/image/image_47/47_Laussou_Barayre_4.jpg","../../jctruffet.com/image/image_47/47_Laussou_Barayre_5.jpg"]},"Consult_chateau_formulaire92a8":{"id":"Consult_chateau_formulaire92a8","dept":"47","canton":"Miramont de Guyenne","commune":"Lauzun","nom":"Lauzun","type":"Château","periode":"XII","histoire":"Deux châteaux à Lauzun celui de Lauzun et de la Lauquerie (Voir article) LAUZUN,  en 1259 Bégon de Caumont et ses frères, Anissant et Guiscard,  on sait que leur père, Nompar de Caumont, était seigneur de Lauzun.  Mais on sait que Pierre de Gontaut rend hommage au roi Philippe le Bel pour ses châteaux de Biron, Gontaut et Lauzun en 1294 et ils ont été plusieurs fois qualifiés de seigneurs de Lauzun entre la fin du XIIIe siècle et le milieu du XIVe siècle. Peut-être y a-t-il eu une co-seigneurerie à cette époque. Lauzun est devenu une baronnie au XIVe siècle. Pendant les guerres de religion la branche aînée des Caumont, les Caumont-La-Force, est devenue protestante, tandis que la branche cadette, les Caumont-Lauzun est restée catholique. Le 4 août 1565, François de Caumont accueille le roi Charles IX, avec Catherine de Médicis et la cour. La baronnie est érigée en comté en 1570 mais François de Caumont meurt peu après.  C'est son fils, Gabriel-Nompar de Caumont, qui entreprend en 1576 la construction de l'aile au-dessus des fossés des remparts de près de 60 m de long. En 1576, le château reçoit le roi Henri de Navarre. La seigneurie est érigée en duché en 1692. Le duché de Lauzun est passé aux Gontaut-Biron en 1723, à la mort d'Antonin Nompar de Caumont qui le transmet à sa nièce Marie-Antoinette, mariée à Charles-Armand de Gontaut-Biron maréchal de France en 1734 qui a été le dernier duc de Lauzun et a été guillotiné en 1793 et n'a eu d'autre héritier que son père, Charles Antoine de Gontaut, qui lui avait transmis le duché et qui est mort en 1798. Le château a alors été mis en vente et a été acheté en 1807 par Jean-Nicolas Becquey-Beaupré qui fait démolir le donjon et les derniers vestiges de l'enceinte. Il est de nouveau vendu en 1837 à Auguste Charrié et acheté par le comte de Folchi de Lattre et en 1990 par M. et Mme Pierre Baron, ils ont décidé de la mettre en vente en 2014.","architecture":"Lauzun, la porte de la chapelle a été remplacé par une porte monumentale encadrée de colonnes corinthiennes de marbre et des niches, surmontée d'un fronton. L'aile est recouverte d'une toiture en forte pente avec une charpente en carène servant de grenier, garnie à la base de lucarnes. La partie résidentielle du château est étendue au XVIIe siècle par doublement à l'ouest du vieux corps de logis par un corps de bâtiment divisé en salles voûtées en briques. Ce nouveau bâtiment est appelé \"grottes\" dans description du château de 1784. Le corps de logis médiéval est allongé d'une pièce pour porter cette aile à la même longueur que l'aile Renaissance. La cour trapézoïdale qui était limitée par les deux ailes et le péristyle était pavée. Au nord de la cour a été construit un bâtiment appelé le \"Dôme\" reliant l'aile Renaissance au bâtiment médiéval près de la tour où étaient placées les cuisines. La cour est remblayée et le péristyle est détruit avant 1784  en ne conservant que quelques colonnes. Des escaliers son construits, un en avant du dôme et un second devant la chapelle Renaissance.\r\n Le château a été classé M.H  le 1er mai 1923 et l'ensemble des façades et des toitures le 1er octobre 1963                                                                             Manoir des TOURELLES à St-Colomb transformé en chambres d'hôtes.","habitants":"Famille des Caumont lauzun\r\n        \r\n        \"","divers":"Château de Lauzun et des Tourelles à Saint-Colomb grav 8.","gps":"","images":["../../jctruffet.com/image/image_47/47_Lauzun_1.jpg","../../jctruffet.com/image/image_47/47_Lauzun_2.jpg","../../jctruffet.com/image/image_47/47_Lauzun_3.jpg","../../jctruffet.com/image/image_47/47_Lauzun_4.jpg","../../jctruffet.com/image/image_47/47_Lauzun_5.jpg","../../jctruffet.com/image/image_47/47_Lauzun_6.jpg","../../jctruffet.com/image/image_47/47_Lauzun_7.jpg","../../jctruffet.com/image/image_47/47_Lauzun_8.jpg"]},"Consult_chateau_formulaire483c":{"id":"Consult_chateau_formulaire483c","dept":"47","canton":"Fumel","commune":"Trentels","nom":"Laval_Lustrac","type":"Château-Moulins","periode":"XIII-XIV","histoire":"LAVAL-LUSTRAC, sur un site castral a peut être existé sur le bord du Lot, il fut réactivé à la fin du XIIIe siècle par la construction du barrage et moulin par Foulques de Lustrac, seigneur éponyme, établi dans une tour chevaleresque dont une baie trilobée et une baie jumelée sont caractéristiques du tournant des XIIIe et XIVe siècles. C'est entre la fin du XVe siècle et le milieu du XVIe siècle, que le château pris ses dispositions actuelles : un ensemble de corps de logis et de dépendances plutôt hétérogènes. Une fenêtre à meneau du rez-de-chaussée sur l'élévation nord, à moulures croisées, témoigne des travaux qui furent alors effectués. Le château, détenu au début du XVIIe par la famille de Masparraut puis revendu à M. Lespinette le Mayrat, est acquis en 1649 par Jonathan de Garrisson, greffe au bureau des finances de Montauban et conseiller secrétaire du roi, qui fit, semble-t-il, réaliser quelques réaménagements. A la fin du XVIIe siècle, le domaine passe, par mariage, dans les biens de la famille de Scorbiac qui le conserve en ligne directe jusqu'à la Révolution.      LAVAL, la résidence seigneuriale, caractérisée par une tour-salle, est au XVe siècle à la famille de Valens, seigneurs de Casseneuil. En 1469, François de Valens cède le château par échange à Bernard d'Albert. Laval passe dans la famille d'Albert lors du rachat effectué par François d'Albert de Laval en 1766. Durant la révolution, le domaine saisi à Joseph d'Albert de Laval, comprend un château à trois étages. Il est vendu en 1796 à Pierre François Paul Delcy, négociant à Villeneuve, qui fait reconstruire ou remanier les ailes latérales, avec des encadrements de brique. Le château a été inscrit M.H  le 19 novembre 1976.","architecture":"La construction dun château sur le site de Mont-Nareisse à la fin du XIIIe siècle est contemporaine de celle dun moulin sur le Lot en contrebas. Elle répond au désir de Foulques de Lustrac de contrôler le passage sur le fleuve, et de défendre le moulin et les réserves dun magasin proche.\r\nLe château de Lustrac consiste dans la première moitié du XIVe siècle en une tour de garde, comme on en voit dans toute la région sur les rives du Lot. Dans le quatrième quart du XIVe siècle, cette tour primitive est agrandie à la demande du duc dAnjou, désireux de fortifier le front agenais contre les Anglais. Mais cest surtout avec les adjonctions des XVe et XVIe siècles que le château de Lustrac prend laspect que lon connaît. Deux corps de logis rectangulaires viennent alors sarticuler à louest et au nord autour dune cour intérieure presque carrée. Ils sont entourés de murailles en pierre et brique, flanquées sur leurs angles de tours quadrangulaires. Lancien donjon constitue désormais la tour sud-ouest de lensemble.    Moulin de Lustrac sur le Lot et château de Lustrac. Ces deux ouvrages datent de la période du XIIIe siècle au XIVe siècle et sont inscrits à l'inventaire des M.H en 1988. Le site lui-même a fait l'objet d'une décision de protection en 1982.","habitants":"Foulques de Lustrac\r\n        \r\n        \"","divers":"Château et moulins de Lustrac à Trentels","gps":"","images":["../../jctruffet.com/image/image_47/47_Laval_Lustrac_1.jpg","../../jctruffet.com/image/image_47/47_Laval_Lustrac_2.jpg","../../jctruffet.com/image/image_47/47_Laval_Lustrac_3.jpg","../../jctruffet.com/image/image_47/47_Laval_Lustrac_4.jpg","../../jctruffet.com/image/image_47/47_Laval_Lustrac_5.jpg","../../jctruffet.com/image/image_47/47_Laval_Lustrac_6.jpg","../../jctruffet.com/image/image_47/47_Laval_Lustrac_7.jpg","../../jctruffet.com/image/image_47/47_Laval_Lustrac_8.jpg","../../jctruffet.com/image/image_47/47_Laval_Lustrac_9.jpg"]},"Consult_chateau_formulaired477":{"id":"Consult_chateau_formulaired477","dept":"47","canton":"Layrac","commune":"Layrac","nom":"Layrac","type":"Château","periode":"XV-XVII","histoire":"quatre châteaux à Layrac celui de Goulens, de Layrac et celui de Lagravade (voir article) datant du XIXe siècle, de Mages.  Cavagnac, manoir de la fin du XVIIIe siècle chambres d'hôtes de Karine Danaborga.   GOULENS  La seigneurie a appartenu au  XVIIIe siècle à la famille de Goulens et lui a donné son nom. La famille Carbonneau leur a succédé soit à l'ordre de l'abbaye de Fontevrault, ou aux deux.  Le château a été construit au XVIe siècle. Claude II Barbier de La Serre (vers 1636-1699), conseiller du roi à la cour des Aides de Guienne, a acheté le château, terre et seigneurie de Goulens par arrêt du parlement de Toulouse le 31 août 1689. Il y décédé le 30 septembre 1699. Le château est resté dans la propriété de la famille Barbier de La Serre. Le manoir a subi des destructions à la Révolution. Les trois tours, deux rondes et une octogonale, ont été décapitées. Les signes féodaux sont démolis. Deux de ces tours sont reconstruites vers 1878
