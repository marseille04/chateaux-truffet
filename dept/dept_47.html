const FULL={"Consult_chateau_formulairefa96":{"id":"Consult_chateau_formulairefa96","dept":"47","canton":"Agen","commune":"Agen","nom":"Agen","type":"Château","periode":"XIV-XVI","histoire":"Plusieurs châteaux à Agen, le musée des Beaux-Arts, autres dont je n'ai pas d'informations et la tour du Chapelet ( voir article).                                          AGEN, musée des Beaux-Arts ancienne forteresse féodale du XIIe siècle, aménagé dans quatre des plus mirifiques hôtels particuliers de la ville d'Estrades,Vaurs, Monluc et Vergés. Les coutumes sont accordées aux habitants de la châtellenie par acte authentique en 1278 par noble homme Séguy de Gasques-Chevalier, à qui l'on doit aujourd'hui le doublement et la surélévation des murs percés de meurtrières, d'archères, et de bouches à feu. Au cours de l'occupation de la région par les anglais, le Prince Noir tente de s'emparer de cette forteresse réputée imprenable et de ses souterrains creusés par le fameux Naudonnet de Lustrac. Simon de Montfort, avant d'investir la cité de Carcassonne, fait  le siège du château. Les plus grandes familles du royaume se concurrencent à l'envie de posséder ce fief.       HUTOT de la Tour hôtel particulier Hutot de Latour que l'on peut apercevoir du Gravier, de style languedocien érigé en brique rose entre 1753 et 1755. La superbe bâtisse fut construite par un ancien Receveur des Tailles qui avait fait fortune.                                      JACOBINS  à seulement 500 mètres des rives de la Garonne, l'Hôtel Château des Jacobins, un ancien hôtel particulier du XIXe siècle,","architecture":"LHôtel de ville occupe lancien présidial (Palais de Justice) édifié en 1666 sur lemplacement du château médiéval de Monrevel, poste de défense avancée près de la vieille enceinte. Il présente une pureté de lignes dans le respect des règles antiques déquilibre, reprises par le classicisme : symétrie de la façade, fronton triangulaire, frises.                                               Beaux arts, poste d'honneur d'avant-garde qui concédait de droit à son possesseur le titre de \" Marquis ou défenseur des marches du Royaume de France \". la tour du Chapelet vestige de la première enceinte de la ville fin début du XIIIe siècle  englobé dans un pâté de maisons, elle présente une ouverture géminée. Tour de la poudre rue Beauville dans l'enceinte du XIVe siècle.                                            Hôtel Hutot de Latour est situé au coeur de la ville dAgen à toute proximité de la promenade du Gravier sur la Garonne et des commerces de centre ville. L'Hôtel Hutot de Latour a été édifié en 1753 et demeure classé Monument Historique depuis 1954 en qui concerne les façades, les toitures, l'escalier principal, les terrasses, le grand salon, le bibliothèque et le salon de musique.","habitants":"Noble Homme Séguy de Gasques-Chevalier\r\n        \r\n        \r\n        \"","divers":"Musée des Beaux-Arts à Agen gravure de 1 à 3, Hôtel de Hutot Latour grav-7, des Jacobins grav-6, la maison du Sénéchal grav-7, la préfecture grav-9 et divers châteaux","gps":"","images":["../../jctruffet.com/image/image_47/47_Agen_1.jpg","../../jctruffet.com/image/image_47/47_Agen_2.jpg","../../jctruffet.com/image/image_47/47_Agen_3.jpg","../../jctruffet.com/image/image_47/47_Agen_4.jpg","../../jctruffet.com/image/image_47/47_Agen_5.jpg","../../jctruffet.com/image/image_47/47_Agen_6.jpg","../../jctruffet.com/image/image_47/47_Agen_7.jpg","../../jctruffet.com/image/image_47/47_Agen_8.jpg","../../jctruffet.com/image/image_47/47_Agen_9.jpg"]},"Consult_chateau_formulaire26f7":{"id":"Consult_chateau_formulaire26f7","dept":"47","canton":"Agen","commune":"Agen","nom":"Agen_Patrimoine","type":"Patrimoine","periode":"XII-XVI","histoire":"La ville d'Agen s'est en effet notablement agrandie au cours du Moyen Âge : elle atteint désormais 60 hectares, était une cité prospère et peuplée (peut-être 10 000 habitants alors que Toulouse en comptait moins de 40 000) vivant en particulier des activités liées à la Garonne : commerce, pêche, minoterie. Cependant, bien que la ville n'ait pas trop souffert directement des terribles affrontements de la guerre de Cent-Ans  elle y a même gagné un peu plus d'autonomie, elle a subi les conséquences des ravages des contrées environnantes. De plus, au XIVe et XVe siècles connurent la terrible épidémie de peste noire aggravée par des intempéries nombreuses et dévastatrices. La Garonne en particulier frappa par des crues meurtrières.   Agen, cité catholique et rivale de Nérac, capitale politique et intellectuelle des Réformés, fut à plusieurs reprises occupée et pillée par les troupes protestantes durant cette période dramatique. Elle abritera quelque temps la reine Marguerite de Valois, dite reine Margot.                     Le théâtre Ducourneau est un théâtre à l'italienne, uvre de Guillaume Tronchet achevée en 1906.","architecture":"la ville d'Agen  possède des hôtels particuliers des riches familles nobles ou bourgeoises enrichies dans l'activité commerçante et textile. Ce n'est qu'à la fin du siècle dernier  que fut bâti le magnifique palais épiscopal devenu par la suite siège de la préfecture. Agen est à cette époque une ville manufacturière spécialisée dans la toile à voile mais aussi les draps, cordes et tissus divers. La ville sort de plus en plus de ses remparts.                                                                Tour du Chapelet, située dans le voisinage immédiat de la cathédrale Saint-Caprais, cette tour est le dernier vestige de la deuxième enceinte d'Agen, construite au XIIIe siècle, elle fut incorporée au XVIe siècle dans le couvent du Chapelet, auquel elle servit de campanile. Le couvent fut rasé après la Révolution Française et cette tour servit de prison à partir de 1815.\r\nÀ peu près carrée, bâtie en pierres de moyen appareil, elle comprend une vaste salle voûtée en berceau, surmontée de trois étages ajourés de fenêtres géminées et de fenêtres à meneaux.\r\nLongtemps laissée à l'abandon, elle a été restaurée et abrite aujourd'hui un cabinet d'architecture.","habitants":"Reine Marguerite de Valois\r\n        \r\n        \"","divers":"Divers châteaux à Agen et théatre grav 7, Lagravade grav 8 et 9.","gps":"","images":["../../jctruffet.com/image/image_47/47_Agen_Patrimoine_1.jpg","../../jctruffet.com/image/image_47/47_Agen_Patrimoine_2.jpg","../../jctruffet.com/image/image_47/47_Agen_Patrimoine_3.jpg","../../jctruffet.com/image/image_47/47_Agen_Patrimoine_4.jpg","../../jctruffet.com/image/image_47/47_Agen_Patrimoine_5.jpg","../../jctruffet.com/image/image_47/47_Agen_Patrimoine_6.jpg","../../jctruffet.com/image/image_47/47_Agen_Patrimoine_7.jpg","../../jctruffet.com/image/image_47/47_Agen_Patrimoine_8.jpg"]},"Consult_chateau_formulaireb7a3":{"id":"Consult_chateau_formulaireb7a3","dept":"47","canton":"Miramont de Guyenne","commune":"Agnac","nom":"Agnac","type":"Château","periode":"XVI-XVIII","histoire":"Deux châteaux à Agnac, celui de Pechalbet,  de  Piles  et le manoir Bout du Pont.                                              AGNAC, pour l'origine du nom d'Agnac, il y a trois hypothèses:   Agnac viendrait du nom d'un propriétaire romain, Annius.  Agnac viendrait du latin \"Agni Aqua\" signifiant \"l'eau de l'agneau\". Agnac viendrait du sanscrit \"Agni\" désignant la divinité du feu. \"Agni Agara\" est le lieu où l'on conserve le feu sacré.\r\nLa commune d'Agnac est formée par la réunion de deux paroisses qui étaient avant le concordat signé le 15 juillet 1801 : Agnac du diocèse de Sarlat  et Iffour  du diocèse d'Agen. C'est sur la commune d'Agnac que fut construite la gare de La Sauvetat-du-Dropt, qui, entre 1886 et 1953, connut une certaine animation puisque trois trains desservaient quotidiennement dans les deux sens Bordeaux, Marmande et Bergerac. Les Impudents, roman paru en 1943, dans lequel Marguerite Duras évoque le Lot-et-Garonne, relate ce passé ferroviaire.","architecture":"Bout du Pont est une bâtisse rectangulaire à deux niveaux avec lucarnes sur un toit en tuiles en croupes accolé de chaque côté de bâtiment de dépendances dont un en équerre.                                                    De Pile, manoir de deux niveaux sur soubassement, de plan rectangulaire avec en partie centrale un pavillon saillant plein cintre  prolongé sur toit d'une superbe lucarne centrale avec fronton et toit en croupe en ardoise, lucarnes sur le pourtour.                             Pechalbet, deux corps de logis rectangulaire le principal à deux niveaux à toits en croupe  brisés avec lucarnes, le deuxième bâtiment presque en équerre est accolé d'une tour ronde en angle.","habitants":"Marguerite Duras\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Le château du Bout du Pont grav-1 et 2, de Pile-grav 3,  et Pechalbet grav 4 et 5 à Agnac.","gps":"","images":["../../jctruffet.com/image/image_47/47_Agnac_1.jpg","../../jctruffet.com/image/image_47/47_Agnac_2.jpg","../../jctruffet.com/image/image_47/47_Agnac_3.jpg","../../jctruffet.com/image/image_47/47_Agnac_4.jpg","../../jctruffet.com/image/image_47/47_Agnac_5.jpg"]},"Consult_chateau_formulaire2790":{"id":"Consult_chateau_formulaire2790","dept":"47","canton":"Aiguillon","commune":"Aiguillon","nom":"Aiguillon","type":"Château","periode":"XVI-XVIII","histoire":"Deux châteaux à Aiguillon celui d'Aiguillon et celui de Lunac et de Ranse ( voir article)  et Lacaze (voir Article)AIGUILLON,  Henri IV l'érige en duché en août 1599. Henri de Lorraine est tué en 1621 au siège de Montauban. Le duché d'Aiguillon est resté dans la famille de Lorraine jusqu'à la mort de Ferdinand de Mayenne. La seigneurie réintégré à la couronne, Louis XIII la donne à son favori, Antoine de Laage, seigneur de Puylaurens, qui meurt sans postérité en 1635. Richelieu achète le duché d'Aiguillon en 1637 et en fait cadeau à sa nièce Marie-Madeleine de Vignerot, veuve du marquis de Combalet. Le duché d'Aiguillon passe ensuite à sa nièce Thérèse de Vignerot du Plessis. Le titre de duc d'Aiguillon s'éteint à sa mort, en 1704. La seigneurie revient à son neveu Louis de Vignerot du Plessis, marquis de Richelieu, puis à sa mort, en 1730 à Armand-Louis de Vignerot du Plessis commanditaire du château. Le titre de duc d'Aiguillon est rétabli en 1731. Le duché d'Aiguillon passe ensuite à son fils, en 1750, le constructeur du château actuel. Cet architecte a aussi construit l'évêché d'Agen, qui a été la préfecture du Lot-et-Garonne avant un incendie, en 1904.  Acquis par la commune, le château est restauré en 1964-1966 par Jean Payen. Il est affecté depuis au lycée Stendhal.","architecture":"Aiguillon, un château avec cour dhonneur et avant-cour doffices ouvrant sur la campagne par des perspectives. La construction du corps central et laménagement des abords séchelonnent de 1773 à 1777. Sur les élévations principales, les frontons néoclassiques sculptés dallégories des Arts et des Sciences. Laile nord, symétrique de l'aile sud, na jamais été édifiée. La dernière campagne de travaux, de 1778 à 1780, a porté sur la construction du pavillon de la Comédie au sud, en symétrie avec les communs. Les vestiges du château Du Fossat qui se trouvaient à l'emplacement de l'aile nord non réalisée sont démolies dans le premier quart du XIXe siècle.    Le château devient un magasin des tabacs en 1852, alors que pavillons, grilles et portails sont vendus. La commune d'Aiguillon demande le classement du château au titre des monuments historiques en 1922 en indiquant que les façades sont intactes mais que les aménagements intérieurs ont subi de nombreuses mutilations.     et le domaine d'Agnac de plan en u est une bâtisse rectangulaire de deux niveaux toit en croupes flanqué de deux tours carrées aux angles de la façade et plein cintre à l'arrière donnant sur cour une tour polygonal  l'ensemble est prolongé par des dépendances de  un niveau en équerre fermant la cour.","habitants":"Famille de Louis de Vignerot du Plessis\r\n        \r\n        \"","divers":"Le château d'Aiguillon","gps":"","images":["../../jctruffet.com/image/image_47/47_Aiguillon_1.jpg","../../jctruffet.com/image/image_47/47_Aiguillon_2.jpg","../../jctruffet.com/image/image_47/47_Aiguillon_3.jpg"]},"Consult_chateau_formulaireb015":{"id":"Consult_chateau_formulaireb015","dept":"47","canton":"Miramont sur Guyenne","commune":"Allemans_du_Dropt","nom":"Allemans","type":"Château","periode":"XVII","histoire":"ALLEMANS, la famille de Goth est une des plus puissantes de Guyenne du XIIIe au XIVe siècle. Bertrand de Goth a prévu dans son testament que sa fille Régine soit son héritière universelle mais avec une clause de substitution dans le cas où elle décéderait sans héritier. Bertrand de Goth est mort en 1324. Sa fille Régine de Goth est mariée au comte d'Armagnac Jean Ier. Régine de Goth meurt sans héritier en 1325. Il va s'ensuivre une période de contestations d'héritage entre le comte d'Armagnac et les héritiers prévus dans la substitution. En 1336, le château est la propriété d'un neveu, Bernard de Lamotte. Au XVe siècle, le château est la propriété de la famille Ricard, famille de notaires habitant le château de Frémauret, à Roumagne. Pierre de Ricard étant mort sans enfants, sa veuve Jeanne de Bouilhaguet épouse le 18 décembre 1575 au château d'Allemans Jean de Vaucocour, écuyer. Il passe ensuite à la famille des Cars, puis à la famille de Sansac, originaire de la Saintonge venue s'installer à Allemans en 1654, qui l'a conservé jusqu'à la Révolution.   La tour du château a été inscrite au titre des M.H en 1984.","architecture":"Le château primitif a été construit au XIIIe siècle. Il subsiste une de ses tours d'angle qui est ronde à la base, octogonale dans sa partie supérieure avec une coupole nervurée, ruiné à la Révolution et démoli suite à son état de dégradation, se situait à l'est de l'édifice actuel. Seule l'aile ouest fut épargnée. Cette aile a dû être construite au XVIe ou au début du XVIIe siècle à lemplacement dune ancienne forteresse médiévale.. On peut voir des fenêtres à meneaux et une porte à linteau de cet ancien édifice. Ce corps de logis a été remanié en lui adjoignant deux pavillons situés de part et d'autre du corps central. Des remaniements lui donnèrent un caractère plus monumental,   témoignant de l'ancien édifice. L'une des tours qui étaient autrefois accrochées à chaque angle du bâtiment primitif, subsiste,  corps de logis rectangulaire à deux niveaux toits brisé avec lucarnes flanqué de deux pavillons aux extrémités toits à la Mansart, transformations du XVIe au XVIIe siècle.","habitants":"Famille Ricard                                                       Famille de Sansac\r\n        \r\n        \"","divers":"Le château d'Allemans et la tour féodal à Allemans sur Dropt","gps":"","images":["../../jctruffet.com/image/image_47/47_Allemans_1.jpg","../../jctruffet.com/image/image_47/47_Allemans_2.jpg","../../jctruffet.com/image/image_47/47_Allemans_3.jpg"]},"Consult_chateau_formulaire9c84":{"id":"Consult_chateau_formulaire9c84","dept":"47","canton":"Sainte-Livrade sur Lot","commune":"Allez et  Cazeneuve","nom":"Allez_Cazeneuve","type":"Château","periode":"XIII-XVII","histoire":"Le château de Tombebouc, château fort du XIIIe- XVIe siècle, Le Manoir de Suquet du XIVe siècle et de Touzeau.\r\nTOMBEBOUC, le château était lié à la baronnie de Pujols. À la fin de la guerre de Cent Ans, il aurait servi de repaire à une bande de brigands pouvant atteindre la ville d'Agen, il a été repris par les Cieutat. Le gouvernement de Vichy a créé des groupements de travailleurs étrangers. Il  en existe  dans le Lot-et-Garonne, dont un seul réservé aux Juifs, appelés par l'administration locale « Palestiniens », le 308e GPTE (groupement palestinien de travailleurs étrangers). D'abord basé Agen, il est installé au château de Tombebouc entre mars 1941 et le 1er septembre 1942, date de sa fermeture. Le 5 août 1942, le préfet du Lot-et-Garonne a reçu l'ordre de transférer les Juifs, après le 1er janvier 1936. Ils sont d'abord regroupés au château de Tombebouc. Les 85 Palestiniens du château de Tombebouc sont déportés.            SUQUET, pas d'information historique.                           Le Château de TOUZEAU est un château bâti à Allez-et-Cazeneuve, pas d'information historique. est un manoir quadrilatère avec pavillons carrées en angles.","architecture":"Château- fort de Tombebouc du  XIIIe siècle et surtout du XVIe siècle de plan quadrangulaire, tours d'angle circulaires, le donjon rectangulaire date de la fin du  XIIIe siècle ou du début du XIVe siècle. La tour est protégée par une enceinte avec un fossé du côté du plateau construits à la même période. Le corps de logis nord avec sa grande salle a été édifié au  XVIe siècle. Les quatre tours d'angles cantonnant l'enceinte extérieure, munies de canonnières, ont été construites en même temps. L'escalier du donjon a été aménagé à la fin du XVIe ou au début du  XVIIe siècle. Des aménagements ont été réalisés au  XIXe siècle.     SUQUET,  édifice indiqué comme maison noble  sous le nom de Tuquet. Le gros oeuvre du logis peut dater du Moyen-Age : une grande baie murée sur la vallée témoigne d'une modification des niveaux dans un bâti conservé. Ce remaniement est intervenu lors de l'importante campagne de rénovation de la fin du XVe ou du début du XVIe siècle: porte à accolade de l'escalier à vis demi hors oeuvre, grande salle de l'étage ouvrant par des croisées chanfreinées. Au sud, la cour était ouverte vers un jardin jusqu'à un vivier, figurant sur le cadastre de 1836. Les ailes Est et ouest ont été remaniées au tournant des XVIIIe et XIXe siècles . Manoir composé d'une cour fermée de 4 ailes de bâtiments : logis au nord dominant la vallée, pigeonnier-porche et écuries à l'est, chai et logement à l'ouest. Pigeonnier couvert d'un toit en pavillon en tuile plate. Le château a été inscrit au  M.H le 9 février 2009.","habitants":"Baronnie de Pujols et seigneurs locaux\r\n        \r\n        \"","divers":"Le château de Allez et Cazeneuve, de Suquet grav-2  de Tombebouc grav 3 et 4 et de Touzeau grav_5","gps":"","images":["../../jctruffet.com/image/image_47/47_Allez_Cazeneuve_1.jpg","../../jctruffet.com/image/image_47/47_Allez_Cazeneuve_2.jpg","../../jctruffet.com/image/image_47/47_Allez_Cazeneuve_3.jpg","../../jctruffet.com/image/image_47/47_Allez_Cazeneuve_4.jpg","../../jctruffet.com/image/image_47/47_Allez_Cazeneuve_5.jpg"]},"Consult_chateau_formulairef78e":{"id":"Consult_chateau_formulairef78e","dept":"47","canton":"Casteljaloux","commune":"Allons","nom":"Allons_Tourneuve","type":"Maison forte","periode":"XV","histoire":"ALLONS, située sur le passage d'une voie romaine, rendez-vous de chasse d'Henri IV. Un drame sanglant se déroula au XVIIe siècle au château d'Allons, entre trois familles seigneuriales. En 1646, la lutte acharnée de deux familles seigneuriales pour la concession d'un titre de sépulture et de banc (privilège attribuant à perpétuité un banc de l'église à une famille) va jusqu'à la fin d'un quadruple assassinat dans l'église et le cimetière à l'encontre du seigneur de Capchicot, son fils et leurs valets.                                                    LUXURGUEY, le logis de la maison noble de Luxurguey, à environ 6 km au sud-ouest du bourg est inscrite au titre des M.H depuis 1993. et le château de TOURNEUVE un château atypique, une sorte de maison forte plutôt, avec une tour dite « en garluche » et qui date du XIV siècle - la garluche est cette pierre des Landes, constituée de sable aggloméré","architecture":"La maison forte de Capchicot, dite aussi château de Capchicot, La maison forte qui  a été construite au XVIe siècle et au début du XVIIe siècle. L'édifice est inscrit au titre des M.H en 1998   située à environ 3 km au sud-est du bourg, a été inscrite au titre des monuments historiques en 1998 ; une légende locale court sur le charbonnier de Capchicot exempté de droits d'entrée de ville par Henri de Navarre qu'il abrita et nourrit alors qu'il s'était égaré lors dune partie de chasse.\r\nLa maison noble de Luxurguey est une maison forte. Son nom serait originellement orthographié \"Luc suriguey\", cest-à-dire \"le bois aux mulots\" appelés \"sourigues\" en gascon. Les maisons nobles construites au XVIIe siècle dans cette région sont fréquemment fortifiées. Les campagnes sont effectivement peu sûres et les passages militaires fréquents, or les troupes fussent-elles du roi de France pratiquent pillages, incendies et autres la maison noble de Luxurguey, à environ 6 km au sud-ouest du bourg est inscrite au titre des monuments historiques depuis 1993.                                                                                  Maison forte de Tourneuve et de Luxurguey avec un  corps de logis rectangulaire à deux niveaux accolés en angles de tours rondes et carrées.","habitants":"Henri IV et Famille de Capchicot,\r\n        \r\n        \"","divers":"Le château d'Allons et de Tourneuve","gps":"","images":["../../jctruffet.com/image/image_47/47_Allons_Tourneuve_1.jpg","../../jctruffet.com/image/image_47/47_Allons_Tourneuve_2.jpg"]},"Consult_chateau_formulaire4a1a":{"id":"Consult_chateau_formulaire4a1a","dept":"47","canton":"Agen","commune":"Allot-Boé","nom":"Allot_Boe","type":"Château","periode":"XVII","histoire":"ALLOT,  la Mothe d'Allot de la famille d'Hallot propriétaire des lieux depuis la fin du XVIe siècle qui donna son nom à cette mothe. A la fin du XVIIIe siècle, le château devint la propriété de Chrysostôme de Sévin, seigneur de Ganet et de Ségougnac, qui fut maire d'Agen sous Napoléon Ier. On sait qu'en 1880 ce lieu fut remanié et restauré par son propriétaire monsieur Chaudordy, ancien député qui fut aussi ambassadeur en Suisse, en Espagne et en Russie. Claude d'Hallot  trésorier général pour lAgenais et le condomois. Son fils Laurent fut Colonel et Ambassadeur du Duc de Savoie auprès du roi dAngleterre. A la fin du XVIIIe siècle, le château devint la propriété de Chrysostôme de Sévin, seigneur de Ganet et de Ségougnac, qui fut maire d'Agen sous Napoléon Ier. On sait qu'en 1880 ce lieu fut remanié et restauré par son propriétaire monsieur Chaudordy, ancien député qui fut aussi ambassadeur en Suisse, en Espagne et en Russie . Aujourd'hui hôtel restaurant, Christine Lavigne, vient d'ouvrir, dans la partie centrale du château, son restaurant, joliment baptisé « La Table d'Allot ».","architecture":"Allot-Boe, ce château de Boé appartient à lorigine aux Lamothe-Bézat. Cest au départ une motte fortifiée autour de laquelle un fossé est creusé.la superbe bâtisse du XVIIe siècle veille sur une vingtaine d'hectares arborés. Malgré des transformations effectuées au cours des siècles, on peut encore voir une des deux entrées du bâtiment de quatre mètres sur six mètres, alternant briques et pierres. Dune hauteur de quinze mètres il se compose de trois niveaux. Le corps de logis principal est quant à lui en forme de E, de vingt mètres sur dix mètres. Ce château, à lorigine très ancienne, pouvait accueillir tous les villageois en cas dattaque","habitants":"Famille de Claude dHallot\r\n        \r\n        \r\n        \r\n        \"","divers":"Château d'Allot et de Boé","gps":"","images":["../../jctruffet.com/image/image_47/47_Allot_Bo%c3%a9_1.jpg","../../jctruffet.com/image/image_47/47_Allot_Bo%c3%a9_2.jpg","../../jctruffet.com/image/image_47/47_Allot_Bo%c3%a9_3.jpg","../../jctruffet.com/image/image_47/47_Allot_Bo%c3%a9_4.jpg","../../jctruffet.com/image/image_47/47_Allot_Bo%c3%a9_5.jpg","../../jctruffet.com/image/image_47/47_Allot_Bo%c3%a9_6.jpg"]},"Consult_chateau_formulaire45e4":{"id":"Consult_chateau_formulaire45e4","dept":"47","canton":"Lavardac","commune":"Ambrus","nom":"Ambrus","type":"Château-fort","periode":"XII-XVI","histoire":"AMBRUS,  est un ancien château fort médiéval. Il se situe au lieu-dit Le Parc. cité dans l'hommage fait en 1259 par quatre co-seigneurs. Un tiers des terres appartenait à Bertrand de Xaintrailles, un autre tiers à Raymond Bertrand de Gelas, un sixième à Raymond Guillaume de Vidalhac et un autre sixième à une personne dont on ignore lidentité. Il en est de même dans l'hommage de 1279. Le 12 avril 1286, Sénébrun de Xaintrailles a reçu du roi d'Angleterre, tous ses droits sur les châteaux de Xaintrailles, d'Ambrus et de Villeton. Le château a appartenu aux familles de Pins ou Piis, de Feugas, de Pardaillan, de Ferron. Vital de Loupiac, Sénébrun de Xaintrailles, Guilhaume de Vidailhac, Raymond Bernard de Gélas puis Pothon de Xaintrailles, au XVe siècle, ont été seigneurs d'Ambrus. Au moment des hommages de 1259 et 1279, le château ne devait comprendre qu'une tour, ou donjon, de section 6 x 6,60 mètres de côté, et de trois étages, avec une petite enceinte de courtines.    Le donjon est découronné à la Révolution. Le château dAmbrus est construit selon un plan rectangulaire. La cour intérieure est à peu près carrée. Une tour carrée ou donjon, se trouve au centre du corps de logis. Le château d'Ambrus a été inscrit aux M.H.en 1988.","architecture":"Au moment des hommages de 1259 et 1279 le château ne devait comprendre qu'une tour, ou donjon de trois étages, avec une petite enceinte de courtines. La présence d'une archère en croix pattée ou à étrier à double visée horizontale, dans la partie supérieure de la tour montre que ces éléments ont été ajoutés. Un logis en L a été construit au nord de la tour avec une tour d'angle et une enceinte au XVe siècle. L'entrée, au nord-ouest, par un châtelet avec bretèche peut dater de la fin du  XVIe siècle. Au XVIIIe siècle, un logis avec des dépendances agricoles ont fermé la cour.A l'exception de la guerre de Cent Ans, l'édifice ne semble pas avoir souffert des événements de l'histoire régionale. Un donjon carré domine l'ensemble des constructions où se retrouvent des éléments des anciennes fortifications médiévales, tours, archères, échauguettes. Des bâtiments s'appuient de part et d'autre de la tour centrale et sont soudés sur la façade ouest par une longue salle à deux niveaux formant deux grandes galeries. Les communs déterminent avec les murs d'enceinte une cour carrée dont l'accès est défendu, à l'ouest, par un châtelet d'entrée avec bretèche. Un logis en L a été construit au nord de la tour avec une tour d'angle et une enceinte au XVe siècle. L'entrée, au nord-ouest peut dater de la fin du XVIe siècle.  A la Révolution, le donjon fut découronné.\r\nLe donjon est découronné à la Révolution.","habitants":"Famille de Pothon de Xaintrailles\r\n        \r\n        \"","divers":"Château fort d'Ambrus","gps":"","images":["../../jctruffet.com/image/image_47/47_Ambrus_1.jpg","../../jctruffet.com/image/image_47/47_Ambrus_2.jpg"]},"Consult_chateau_formulairedafe":{"id":"Consult_chateau_formulairedafe","dept":"47","canton":"Nérac","commune":"Andiran","nom":"Andiran","type":"Château","periode":"XIII-XV","histoire":"Trois châteaux à Andiran celui d'Andiran, d'Hordosse et de    Andiran, pas d'information historique.      HORDOSSE,  Il fut la résidence de Salluste du Bartas, poète et gentilhomme de la cour de Navarre, à Nérac. Avec ses immenses pièces et hauts plafonds, meublés avec goût, le premier étage de la partie principale du château et la tour abritent les chambres d'hôtes. Un peu à l'écart, l'ancien logement du gardien a été agencé en gîte et une terrasse privée au bord de la rivière. Un tennis, une piscine et le parc boisé attenant offrent d'autres possibilités de détente, de balades dans un calme tout bucolique aujourd'hui chambres d'hôtes\r\nHOURTON, Maison de maître pas d'information.","architecture":"ANDIRAN, château de plan triangulaire,   corps de logis à deux et trois niveaux  fenêtres à meneaux toits à deux pans avec tour d'escalier polygonal   sur angle intérieur.                                                                      HORDOSSE La tour du XIIIe siècle fait partie des fortifications originales. Il a été reconstruit, dans sa plus grande partie, à la fin du XVe siècle et restauré à la fin du XIXe. La tour, dont il subsiste aujourd'hui des traces de l'enceinte médiévale, fut rénovée avec courtine et créneaux. La tour crénelée du XVe siècle, faisant partie des fortifications originales borde la partie principale du château datant du XVIIIe siècle, avec ses immenses pièces et hauts plafonds à trois niveaux toits en ardoises en croupes avec lucarnes et pavillon saillant plein cintre en façades.          HOURTON, maison de maître avec sur une façade des ouvertures à arcades géantes, de plan rectangulaire avec arcades en façades  du deuxième étages  toit en croupes et pavillons carrées avec terrasses accolé à la façade.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Château d'Andiran de 1 à 3 de Hordosse de 4 à 6 et Hourton grav 7.","gps":"","images":["../../jctruffet.com/image/image_47/47_Andiran_1.jpg","../../jctruffet.com/image/image_47/47_Andiran_2.jpg","../../jctruffet.com/image/image_47/47_Andiran_3.jpg","../../jctruffet.com/image/image_47/47_Andiran_4.jpg","../../jctruffet.com/image/image_47/47_Andiran_5.jpg","../../jctruffet.com/image/image_47/47_Andiran_6.jpg","../../jctruffet.com/image/image_47/47_Andiran_7.jpg"]},"Consult_chateau_formulaire0f32":{"id":"Consult_chateau_formulaire0f32","dept":"47","canton":"Marmande","commune":"Fauguerolles","nom":"Arago","type":"Forteresse","periode":"XVIII-XIX","histoire":"ARAGO, un escalier en bois du château dArago, dans la commune de Fauguerolles, porte la date de 1778. Tout porte à croire que lédifice primitif a dû être bâti à cette époque. De celui-ci, il ne reste aucune trace, puisquil est reconstruit, au milieu du XIXe siècle, par Emmanuel dArago, qui a laissé son nom au bâtiment. Fils de François dArago, figure célèbre de physique et dastronomie, à cette époque, il décide de rendre hommage à son père en faisant reconstruire cette demeure. Il y ajoute, notamment, la tour dobservation.  Elly et Serge Denervaud ont entrepris la restauration de ce château original au style néo-mauresque. Découvrez une architecture qui n'a quasiment plus de représentants en France, à la fin de la première moitié du XIXe siècle, cet ensemble fut habillé, mis à la mode en quelque sorte, par les Renol-Faget ou par François Arago. Sil surprend dans ce contexte géographique, le style choisi est relativement  courant à cette époque,  retour vers le Moyen Âge. Le style néogothique est  apparu dès la fin du XVIIIe siècle en Angleterre, et cest avec la Restauration quil va trouver son apogée  en France : il permet doublier liconoclasme de la Révolution et la longue parenthèse impériale ; laFrance retrouve ses racines chrétiennes, et donc gothiques, voire renaissantes.","architecture":"Arago construit aux alentours de 1780, le château prend sa forme actuelle au milieu du XIXe siècle et fait partie de la dot de Catherine Faget de Raynolds lors de son mariage en 1850 avec François Victor Emmanuel Arago, le célèbre physicien. La transformation extérieure des bâtiments en styles néo-mauresque et néo-gothique combinés donne alors au château son cachet inimitable. En cette époque férue de médiavalisme et d'orientalisme, de tels habillages ne sont pas rares, mais la plupart n'ont pas survécu à la mode. La tour octogonale est devenue l'emblème de la laiterie Arago, une entreprise artisanale d'agro-alimentaire créée par la famille Gautier, devenue propriétaire du château après la Seconde Guerre Mondiale. L'activité sur place a cessé en 1987.","habitants":"François Victor Emmanuel Arago\r\n        \r\n        \"","divers":"Le château d'Arago à Fauguerolles","gps":"","images":["../../jctruffet.com/image/image_47/47_Arago_1.jpg","../../jctruffet.com/image/image_47/47_Arago_2.jpg","../../jctruffet.com/image/image_47/47_Arago_3.jpg","../../jctruffet.com/image/image_47/47_Arago_4.jpg","../../jctruffet.com/image/image_47/47_Arago_5.jpg","../../jctruffet.com/image/image_47/47_Arago_6.jpg"]},"Consult_chateau_formulaire0f21":{"id":"Consult_chateau_formulaire0f21","dept":"47","canton":"Colayrac Saint-Cirq","commune":"Aubiac","nom":"Aubiac","type":"Château","periode":"XV-XIX","histoire":"AUBIAC, selon les manuels dhistoire, le château était occupé au milieu du XIVe siècle par les seigneurs de Galard avant de devenir propriété de la famille Lart au début du XVIe et de la famille Narbonne-Lara vers la fin. En 1763, le comte Louis de Narbonne-Lara, ministre de la guerre de Louis XVI et futur aide de camp de Napoléon 1er, construit le château actuel sur les murs de lancienne seigneurie.  Au milieu du XIXe siècle, le château est au cur de lactivité agricole du village. Une vingtaine de métayers exploitent ses nombreuses terres qui sétendent jusquà Laplume. Ce vaste et fertile domaine agricole appartient alors à la famille dArcimoles, originaire du département du Lot, dont les descendants sont toujours aujourdhui propriétaires.  Jusquà la moitié du XXe siècle, le château a été un domaine viticole. Mes ancêtres vendaient la production de vin dans les hôpitaux à Bordeaux, mais le grand froid de 1956 a tout grillé », explique Fabrice Marraud, qui gère la partie commerciale du château, ouverte depuis 1999. Aujourd'hui chambres d'hôtes Fabrice et Evelyne Marraud vous accueillent chaleureusement toute l'année. Soirée au coin du feu ou grand événement professionnel, le château d'Aubiac est devenu un lieu de rencontre et de fête à la hauteur de vos attentes.","architecture":"En 1784, le manoir fut reconstruit dans sa forme actuelle après avoir été détruit par un incendie.Quand au sortir dAgen, on plonge sur Aubiac après avoir vaincu les premiers coteaux du Bruilhois, sa silhouette cossue soffre à vous, majestueusement dissimulée entre les toitures du village et le feuillage des arbres. Pour partie reconverti en espace de réceptions, le château dAubiac vouvoie encore aujourdhui, dans un tête à tête de haute tenue architecturale,  le premier château était une forteresse autour de cette église. Certaines parties des remparts, qui ont bravement résisté aux attaques du temps, sont encore visibles.","habitants":"Famille Narbonne-Lara \r\n        \r\n        \"","divers":"Château d'Aubiac","gps":"","images":["../../jctruffet.com/image/image_47/47_Aubiac_1.jpg","../../jctruffet.com/image/image_47/47_Aubiac_2.jpg","../../jctruffet.com/image/image_47/47_Aubiac_3.jpg","../../jctruffet.com/image/image_47/47_Aubiac_4.jpg","../../jctruffet.com/image/image_47/47_Aubiac_5.jpg","../../jctruffet.com/image/image_47/47_Aubiac_6.jpg","../../jctruffet.com/image/image_47/47_Aubiac_7.jpg"]},"Consult_chateau_formulaire0cde":{"id":"Consult_chateau_formulaire0cde","dept":"47","canton":"Casteljaloux","commune":"Fargues sur Ourbise","nom":"Avance_Tour","type":"Tour","periode":"XIII","histoire":"A Avance la commandereie et lre château de Terrefort  AVANCE, la commanderie d'hospitaliers dite la \"Tour d'Avance\" est citée pour la première fois dans un compromis concernant des terres entre de commandeur de Nomdieu, Augier de Montlezun, et la noble dame Viane de Gontaut agissant au nom du chevalier Élie de Castilhon, son mari. La commanderie a été  construite au début du XIIIe siècle. Un commandeur de Saint-Martin d'Avance est cité en 1477 et 1483. Le moulin de la Tour d'Avance est cité une première fois en 1481. Devenue commanderie à la fin du XVe siècle, elle est redevenue un membre de la commanderie d'Argentens entre 1539 et 1639. En 1549, elle est située à la limite du parc de chasse des Albret à Durance. Antoine de Bourbon a étendu le parc de chasse jusqu'à la Tour d'Avance en conservant la propriété au commandeur.   Ancien relais de chasse et de rendez-vous galants du roi Henri IV de France, surnommé aussi le Vert Galant  Henri de Navarre y venait souvent chasser. On peut noter qu'en 1603 le moulin d'Avance dépend du commandeur d'Argentens. En 1627, il n'y a plus qu'un seul commandeur à la tête de Cours, Argentens et Saint-Martin d'Avance. En 1627-1628 la maison de la Tour d'Avance a été brûlée pour empêcher les voleurs de s'y retirer. En 1627, frère Joseph d'Amalric d'Esclangon, commandeur de Cours, d'Argentens et de la Tour d'Avance, a donné  le fief à Pierre Duluc, avocat au parlement de Bordeaux, le moulin de Bernède. Le chevalier Jacques de Pichon devient commandeur de Saint-Martin d'Avance.  Aujourd'hui chambre d'hôtes.","architecture":"Le donjon renforçait un angle de l'enceinte de la commanderie. C'est un bâtiment rectangulaire de quatre étages dont le dernier a dû être construit à une période plus récente. Une tour ronde placée à un angle sert d'escalier à vis pour desservir les étages. Les étages sont éclairés par des fenêtres percées à une période postérieure.   \r\n Dans un état de 1737, on trouve une description de la Tour :   le château dit de la Tour d'Avance possède  chambre au premier étage carrelée, chambre au troisième étage, trois ouvertures de muraille bouchées.  Les biens d'Avance sont de nouveau rattachés à la commanderie d'Argentens en 1643. Les dernières réparations de la Tour d'Avance sont documentées en 1737.                                                    Terrefort est un bâtiment quadrangulaire au centre d'une cour cantonnée de quatre tours (dont deux disparues) reliées par une enceinte ; les tours et le logis, qui dataient peut être de la fin du Moyen-Age, ont été fortement remaniés aux XVIIIe et XIXe siècles, avec réfection de toutes les ouvertures. Sur l'élévation ouest du logis, une chapelle semble avoir été ajoutée à la fin du XIXe siècle. L'édifice est entouré d'un mur en moellon d'environ trois mètres, qui retient une levée de terre sur l'étage de soubassement ; à l'est, le mur marque une courbe forme qui presque un cercle. L'ensemble des bâtiments agricoles, en moellon et à toit à longs pans, ferment le château au nord et à l'ouest. Logis couvert en croupe, tours à toits coniques.","habitants":"Augier de Montlezun\r\n        \r\n        \"","divers":"La tour du château d'Avance et le château de Terrefort grav 6 et 7","gps":"","images":["../../jctruffet.com/image/image_47/47_Avance_Tour_1.jpg","../../jctruffet.com/image/image_47/47_Avance_Tour_2.jpg","../../jctruffet.com/image/image_47/47_Avance_Tour_3.jpg","../../jctruffet.com/image/image_47/47_Avance_Tour_4.jpg","../../jctruffet.com/image/image_47/47_Avance_Tour_5.jpg","../../jctruffet.com/image/image_47/47_Avance_Tour_6.jpg","../../jctruffet.com/image/image_47/47_Avance_Tour_7.jpg"]},"Consult_chateau_formulaire3f11":{"id":"Consult_chateau_formulaire3f11","dept":"47","canton":"Marmande","commune":"Ruffiac","nom":"Bachac","type":"Château","periode":"XVIII","histoire":"BACHAC,  Les terres, ou on peut admirer actuellement ce château, étaient, entre le XIIe et le XIVe siècle, propriété dune commanderie templière se trouvant sur la colline de la commune de Bouglon, ces terres, ainsi que léglise de Bachac, le bourg de Figuès, et léglise Saint-Christophe dEsquerdes sont devenues la propriété de la famille de Brocas, mais le château na été construit que plus tard, vers le XVIIIe siècle, sur ce que cétait la maison d'Antoine de Brocas, lieutenant et conseilleur du roi et ami dHenri IV. Plus tard, en 1850, les nouveaux propriétaires, la famille de Bastard, lont restauré, il est devenu une propriété privée, après avoir été utilisé comme hôtel de luxe, pendant quelques années. Le 19 avril 1883, Jean-François-Auguste, cinquième comte de Bastard d'Estang, décède au château de Bachac à lâge de 91 ans. Né le 1er décembre 1792 en tant que 4e fils de Jean IX de Bastard dEstang et de Marie-Élizabeth de Villeneuve-Lévis.\r\nLe 22 mai 1856, il épouse Marie Savary de Lancosme, fille de Louis Adolphe Charles Alphonse comte de Lancosme et de Henriette Cécile dAndlau. Le couple réside au château de Bachac, alternant avec Paris.","architecture":"Le château de Bachac, le domaine sur lequel sélève la bâtisse est, aux XIIe et XIIIe siècles, sous le commandement des Templiers, et ce jusquà la suppression de lordre au début du XIVe siècle   Le château ne sera construit qu'au XVIIIe siècle. En 1850, la famille de Bastard, devenus les nouveaux propriétaires vont le faire restaurer. Le château de Bachac devient durant quelques années un hôtel de luxe","habitants":"Famille de Brocas\r\n        \r\n        \"","divers":"Le château de Bachac à Ruffiac","gps":"","images":["../../jctruffet.com/image/image_47/47_Bachac_1.jpg","../../jctruffet.com/image/image_47/47_Bachac_2.jpg","../../jctruffet.com/image/image_47/47_Bachac_3.jpg","../../jctruffet.com/image/image_47/47_Bachac_4.jpg","../../jctruffet.com/image/image_47/47_Bachac_5.jpg"]},"Consult_chateau_formulaire97da":{"id":"Consult_chateau_formulaire97da","dept":"47","canton":"Lavardac","commune":"Barbaste","nom":"Barbaste","type":"Château_moulin","periode":"XIII","histoire":"BARBASTE, Tour du Moulin On trouve le nom de Barbaste dès 1259 sous la graphie « Barbasta »,  Le château moulin a été construit  par les moines de Citeaux entre 1180 et 1220,  en 1308 Arnaud de Bordes et Guillaume de Lavardac cédèrent le moulin à Amanieu VII  d'Albret  ancêtre du roi Henri IV qui en devient ensuite propriétaire.  Carbon du Faulong qui a été intendant des chasses du roi de Navarre Henri III et commandant des tours de Barbaste en 1588. Le château a été divisé en deux propriétés en 1841. La partie sud du château a été donnée en 1879 au bureau de bienfaisance de Barbaste et abrite aujourd'hui la poste. La partie nord a brûlé en 1933. Les deux ailes de dépendances perpendiculaires au logis et formant une cour en U à l'ouest comme on le voit sur le cadastre de 1837 ont été détruites. Le château a été inscrit au titre des monuments historiques le 12 septembre 1977.","architecture":"Le moulin se trouve à l'extrémité nord-ouest de la commune de Nérac, au contact des communes de Lavardac et Barbaste. Il a permis de contrôler les passages sur le pont de Barbaste qui se situe à 20 m en aval de la plus haute tour du moulin. Ce pont existait déjà en 1259 car il est cité dans l'hommage Ysarn de Sainte-Marise au comte de Toulouse pour toutes les terres qu'il possédait en Agenais.  Le moulin a un aspect sévère. fortifié  de plan carré. Il est cantonné de quatre tours crénelées d'inégale d'hauteurs également de plan carré.  Le moulin se compose de six étages au-dessus de l'étage des roues du moulin hauteur des tours : 29 mètres pour la plus haute, 26 mètres et 27 mètres pour les autres.","habitants":"Roi Henri IV                                                        Bertrand de Bezolles\r\n        \r\n        \"","divers":"Le moulin de Barbaste","gps":"","images":["../../jctruffet.com/image/image_47/47_Barbaste_1.jpg","../../jctruffet.com/image/image_47/47_Barbaste_2.jpg","../../jctruffet.com/image/image_47/47_Barbaste_3.jpg","../../jctruffet.com/image/image_47/47_Barbaste_4.jpg","../../jctruffet.com/image/image_47/47_Barbaste_5.jpg","../../jctruffet.com/image/image_47/47_Barbaste_6.jpg"]},"Consult_chateau_formulaire2cff":{"id":"Consult_chateau_formulaire2cff","dept":"47","canton":"Aiguillon","commune":"Bazens","nom":"Bazens","type":"Vestiges","periode":"XII","histoire":"BAZENS, des seigneurs  sont cités dans la seconde moitié du XIIIe siècle, mais dès cette époque les évêques d'Agen semblent avoir des droits sur la seigneurie, qui  est reconstruit par les Della Rovere, évêques d'Agen, pour en faire leur résidence d'été : Leonardo Grosso della Rovère, évêque d'Agen entre 1487 et 1519, et Marc-Antoine de La Rovère, évêque entre 1519 et 1538. Le château aurait été construit par un architecte de Limoges nommé Villars. Le cardinal Jean de Lorraine leur succède jusqu'en 1550. Le château est donné en usufruit par le cardinal de Lorraine à Costanza Rangoni (1495 1567), veuve de Césare Fregoso (Rome, vers 1500 -1541), ambassadeur de François Ier auprès de la Sérénissime République de Venise, assassiné le 3 juillet 1541 par des gens à la solde de Charles-Quint. Matteo Bandello suit en France la famille de Césare Fregoso, son protecteur entre 1538 et 1541, après son assassinat. Il a été curé de Cabalsault près d'Agen. Il est nommé évêque en août 1550 par Henri II. Il a alors choisi d'habiter le château de Bazens, qui est transformé en logis de plaisance dans le style de la Renaissance. Matteo Bandello y a écrit la plupart de ses nouvelles. Matteo Bandello s'est démis de son évêché  durant l'année 1555, en faveur de Janus Frégose ( 1531-1586), fils cadet de Césare. Cependant il a continué d'habiter à Bazens où il est mort en 1561. Par la suite, les évêques d'Agen ont abandonné leur résidence d'été de Bazens pour s'installer au château de Monbran. En 1726, Mgr Hébert a obtenu l'autorisation de faire démolir le château de Bazens qui tombait en ruines. Il n'en subsiste que l'aile Nord du château avec sa tour-escalier. Le château a été inscrit au titre des M.H en 1935.","architecture":"Bazens, le château, dont il ne subsiste plus que l'aile nord, est adossée à l'église, bâti à la fin du XVe siècle pour le cardinal Léonard della Rovère,  construction de la tour d'escalier en 1494. Autorisation concédée à l'évêque de démolir le château qui menaçait de tomber, ruiné en 1726. Dans l'estimation des biens de l'évêque à Bazens en 1791, mention d'écuries, servant de chai avec pressoir et cuvier et d'une pièce de terre contenant un pigeonnier et un puits, le plan d'ensemble rectangulaire à deux niveaux sur soubassement s'organisait sur une cour fermée, les ailes étant articulées dans l'angle par une tour d'escalier heptogonale hors-oeuvre de six niveaux. Actuellement peu à peu restauré et remis en valeur grâce à un maire actif.","habitants":"Evêque de La Rovère\r\n        \r\n        \"","divers":"Château de Bazens","gps":"","images":["../../jctruffet.com/image/image_47/47_Bazens_1.jpg","../../jctruffet.com/image/image_47/47_Bazens_2.jpg","../../jctruffet.com/image/image_47/47_Bazens_3.jpg","../../jctruffet.com/image/image_47/47_Bazens_4.jpg","../../jctruffet.com/image/image_47/47_Bazens_5.jpg"]},"Consult_chateau_formulaired7c3":{"id":"Consult_chateau_formulaired7c3","dept":"47","canton":"Marmande","commune":"Beaupuy","nom":"Beaupuy","type":"Château","periode":"XVI","histoire":"Plusieurs châteaux à Beaupuy celui de Beaupuy, de Beauvallon, à quelques kilomètres à l'Est à Sainte-Bazeille le Château-Rouge du XIXe siècle transformé en chambres d'hôtes (voir article) et à deux km au nord trois châteaux à Castelnau sur Gupie, le Palard, le Deymiet et le manoir de Laurette.                        BEAUPUY est une paroisse de Marmande et présente la particularité de dépendre du diocèse de Bazas. Son histoire remonte aux temps préhistoriques, En 1100, le cartulaire de l'abbaye bénédictine de La Réole  fait mention d'une église dédiée à Saint-Vincent. En 1263, on relève l'existence de vignobles. En 1317, par sentence du sénéchal d'Aquitaine, Beaupuy est partagé entre les habitants de Marmande et ceux de Castelnau à la suite de la répétition d'incidents relatifs à l'attribution des terres. En février 1790, Beaupuy  est érigé en commune indépendante. Pierre Boisvert en est le premier maire. Le 24 décembre 1791, celui ci démissionne en raison de son âge et de sa mauvaise vue. En fait, le motif profond est son opposition à la destitution de l'abbé Mouchet, curé de la paroisse, qui a refusé de prêter serment. Il est réélu maire le 02 décembre 1792. Le 20 novembre 1793, il est à nouveau destitué et incarcéré à Marmande.\r\nPendant son incarcération, un arrêté de son remplaçant ordonne au nom de l' égalité la démolition jusqu'au niveau des combles de la tour du château.","architecture":"La mairie de Beaupuy est une maison noble du XVIe siècle remaniée aux XVIIe et XVIIIe siècles, propriété de la famille Boisvert qui donna son premier maire, et rachetée par la commune au début des années 1980. Une ancienne tour, dite tour d'Aspe, s'élève à peu de distance du centre du bourg. Il projette un château avec cour dhonneur et avant-cour doffices ouvrant sur la campagne par des perspectives. La construction du corps central et laménagement des abords séchelonnent de 1773 à 1777. Sur les élévations principales, les frontons néoclassiques.  Au pied du village de Beaupuy, lélégance du château de Beauvallon se démarque du paysage. Lédifice, bâti à la fin du XVIe siècle, est agrandi pour la famille qui lui a laissé son nom vers 1730, grosse demeure bourgeoise, de style de la Renaissance, parti pris architectural très en vogue dans la région au XVIe siècle : en témoignent les fenêtres à meneaux encore visibles au rez-de-chaussée.","habitants":"Pierre Boisvert \r\n        \r\n        \"","divers":"A Beaupuy le château  grav de 1 à 4, la tour d'Aspé  grav 5 de la comtesse grav  6, Beauvallon grav 7, à Castelnau sur Gupie grav 8 et 9.","gps":"","images":["../../jctruffet.com/image/image_47/47_Beaupuy_1.jpg","../../jctruffet.com/image/image_47/47_Beaupuy_2.jpg","../../jctruffet.com/image/image_47/47_Beaupuy_3.jpg","../../jctruffet.com/image/image_47/47_Beaupuy_4.jpg","../../jctruffet.com/image/image_47/47_Beaupuy_5.jpg","../../jctruffet.com/image/image_47/47_Beaupuy_6.jpg","../../jctruffet.com/image/image_47/47_Beaupuy_7.jpg","../../jctruffet.com/image/image_47/47_Beaupuy_8.jpg","../../jctruffet.com/image/image_47/47_Beaupuy_9.jpg"]},"Consult_chateau_formulaire23bd":{"id":"Consult_chateau_formulaire23bd","dept":"47","canton":"Penne d","commune":"Beauville","nom":"Beauville","type":"Château","periode":"XIII-XVI","histoire":"Deux châteaux à Beauville celui de Beauville et le manoir de Massanes.                                            BEAUVILLE,  le château du XVIe siècle avait plan en T mais une des ailes a été détruite. François de Beauville mène en 1574 la défense du château contre les protestants;  ancien château fort ayant appartenu à la famille de Boville, alliée à celle du maréchal de Montluc et à celle de lévêque d'Autun, Talleyrand-Périgord. Sans descendance, les Boville lèguent le bâtiment au département qui y installe six familles de gendarmes de 1865 à 1976. Le château a appartenu aux Talleyrand au XVIIe et XVIIIe siècles.   Le Château de Beauville est classé aux M.H. depuis 2006. \r\nMALHERBES du XVIIIe siècle  pas d'informations historiques.                                                                         MASSANES, au lieu-dit Massanes, qui se trouve entre les villes de Beauville et Bourg-de-Visa, on peut apercevoir un château, aux allures de maison forte, présente plusieurs corps de logis réunis par une tour octogonale qui contient un escalier à vis.","architecture":"BEAUVILLE, une aile du château a été abattue donnant à lensemble une forme de L. Les mâchicoulis sont encore visibles par endroits et quelques fenêtres très en hauteur à double meneau ont été bouchées. Le château est constitué d'un logis de la fin du XVIe siècle qui présente une aile en retour dont les fondations et les soubassements datent de l'ancien château daté de la fin du XIIIe siècle. Lépaisseur des murs, la qualité des pierres, le raffinement de leur taille, démontrent lutilisation douvriers tailleurs de pierres et darchitectes géomètres particulièrement compétents.\r\nSi les fondations et les soubassements du château de Beauville datent de la fin du XIIIe siècle, la moitié du bâtiment a été construite au XVIe siècle comme en témoignent les fenêtres à meneaux  alors que la porte d'entrée et les cheminée en pierre de taille sont d'architecture de style Renaissance.  le travail raffiné de la taille dune pierre de qualité.  La partie du bâtiment qui date du XVIe siècle est ornée de fenêtres à meneaux. Larchitecture renaissance est aussi présente dans la porte dentrée et les cheminées. Enfin, une aile du bâtiment a été reconstruite au XIXe siècle.                                                                                 MALHERBES, est tant et si bien remanié au XVIIIe siècle, que son époque de construction ne peut plus être certainement déterminée. Le corps de logis rectangulaire à un étage possède des combles aménagés troués de lucarnes à fronton triangulaire. La façade est quant à elle percée de fenêtres à meneaux. MASSANES  on peut apercevoir un château aux allures de maison forte, présente plusieurs corps de logis réunis par une tour octogonale qui contient un escalier à vis.","habitants":"Famille de Boville Famille de Talleyrand\r\n        \r\n        \"","divers":"Château de Beauville grav de 1 à 6, de Malherbes grav 7, de Massanes 8 et 9.","gps":"","images":["../../jctruffet.com/image/image_47/47_Beauville_1.jpg","../../jctruffet.com/image/image_47/47_Beauville_2.jpg","../../jctruffet.com/image/image_47/47_Beauville_3.jpg","../../jctruffet.com/image/image_47/47_Beauville_4.jpg","../../jctruffet.com/image/image_47/47_Beauville_5.jpg","../../jctruffet.com/image/image_47/47_Beauville_6.jpg","../../jctruffet.com/image/image_47/47_Beauville_7.jpg","../../jctruffet.com/image/image_47/47_Beauville_8.jpg","../../jctruffet.com/image/image_47/47_Beauville_9.jpg"]},"Consult_chateau_formulairef82a":{"id":"Consult_chateau_formulairef82a","dept":"47","canton":"Marmande","commune":"Birac sur Trec","nom":"Birac_sur_Trec","type":"Château","periode":"XII-XVI","histoire":"Trois châteaux à Birac celui de Birac sur Trec, de Cessac et celui  de Minors.                                          BIRAC,  vers l'an 1294, Anissant de Pins qualifié de noble et puissant baron,  chevalier, sire de Taillebourg, , seigneur marié avec Régine de Goth,  Il est mort avant le 20 novembre 1388. Après la mort de sa petite-fille, Claire de Pins, tous ses biens sont passés à la famille d'Albret-Verteuil.   Le château de Birac fut reconstruit dans la première moitié du XVIe siècle par la famille de Lard.  La seigneurie de Birac est saisie en 1715 aux Narbonne. Elle est achetée le 23 août 1719 par André d'Allenet. Léonard Guillaume de Brivazac (1705-1782), conseiller du roi en la grand-chambre du parlement de Bordeaux, et baron de Birac en Agenois. Ce titre lui venait de sa mère, Adelaïde d'Allenet (1675-1760), sur et héritière d'André d'Allenet, mariée en 1701 à Gabriel de Brivazac (1672-1708). La seigneurie de Birac est saisie comme terre d'émigré en 1792 et les biens vendus en 1794. Ils sont partiellement rachetés en 1805 par Léon de Brivazac (1774-1860) qui avait participé à l'expédition de Quiberon et était rentré en France en 1802.    Château de Birac à Bourdieu, inscrit au titre des monuments historiques.                                                                 CESSAC Au XIXe siècle, le goût pour les habitations aristocratiques du siècle précédent perdure, pas d'informations historique.                                               MINORS  Le château de Minors à Birac-sur-Trec aurait été construit au cours du XIXe siècle pour Léon de Brivazac, en partie avec les pierres de lancien château-fort.    Léon de Brivazac est le dernier seigneur de Birac. Lensemble de ses biens lui a été confisqué lors de la Révolution. À son retour dexil au début du XIXe siècle, il décide de racheter ses biens, avec laide de son fils. En 1849, il est propriétaire de nombreuses terres sur la commune de Birac, dont des terres aux lieux-dits Vieux château et Minors.","architecture":"Le castrum de Birac est cité pour la première fois en 1259   est déjà une ruine au début du XXe siècle. Les ruines du château en totalité, ainsi que son sous-sol, l'ancien pigeonnier de son ancienne métairie ont été inscrits aux M.H. le 9-12-1993. Aujourd'hui, il sert d'enclos pour les chevaux.                                   Minors construit avec les pierres de l'ancien château fort.                                                                                   Le château de Cessac, sur la commune de Birac-sur-Trec, est probablement construit par un riche bourgeois, désireux de posséder une telle demeure. Le domaine de Cessac est situé à la sortie du village de Birac. Il date du troisième quart du XIXe siècle, comme en témoigne la date de 1868, portée sur lune des cheminées du rez-de-chaussée. Les habitations aristocratiques obéissent à une organisation particulière, des pièces en enfilade et des salons dapparat au rez-de-chaussée, un étage réservé aux appartements des maîtres de maison et un étage supérieur réservé aux chambres des domestiques, sous les toits avec une tourelle crénelée.","habitants":"seigneur Léon de Brivazac \r\n        \r\n        \"","divers":"Vestiges du château de Birac sur Trec grav 1, de Minors grav 2 et de Cessac grav 3.","gps":"","images":["../../jctruffet.com/image/image_47/47_Birac_Sur_Trec_1.jpg","../../jctruffet.com/image/image_47/47_Birac_Sur_Trec_2.jpg","../../jctruffet.com/image/image_47/47_Birac_Sur_Trec_3.jpg"]},"Consult_chateau_formulaire6c37":{"id":"Consult_chateau_formulaire6c37","dept":"47","canton":"Fumel","commune":"Blanquefort sur Briolance","nom":"Blanquefort","type":"Forteresse","periode":"XIII","histoire":"BLANQUEFORT,   le castrum avait deux co-seigneurs : Huc Ier de Pujols et Bertrand de Fumel. Huc II de Pujols, fils de Huc Ier de Pujols était marié à Antea de Fumel, fille de Bertrand de Fumel. La totalité des parts du castrum appartenaient à Huc II de Fumel. Antérieurement, l'enquête permet de savoir que le castrum avait été la propriété en 1245 de Guillaume-Esclamar de Fumel, père de Bertrand, ou plus probablement, Esquieu de Fumel, son grand-père. À la date de 1287, le château de Blanquefort est la propriété de la famille de Pujols. On retrouve un Huc de Pujols, seigneur de Blanquefort, capitaine du château de Sauveterre-la-Lémance, entre 1352 et 1356. Il a été sénéchal de Quercy en 1350 et du Périgord en 1360. Avant la signature du traité de Brétigny, il s'était lié aux comtes d'Armagnac en devenant un soutien de la cause du roi de France en Agenais. Après 1360 et le traité de Brétigny les Pujols vont s'installer dans le Rouergue. Ils vont alors prendre le nom de Roquefeuil après le mariage de Jean de Pujols-Blanquefort avec l'héritière de la maison de Roquefeuil. En 1463, Gaston de Gontaud, seigneur de Biron, réside à Blanquefort. Les Roquefeuil reviennent sur leurs terres en Agenais à la fin de la guerre de Cent Ans. En 1477, Bérenger de Roquefeuil, seigneur de Blanquefort, est à la cour de Louis XI. La fortune de Béranger va lui permettre de remettre en état le castrum qui devait être abandonné depuis près d'un siècle et d'entreprendre la construction du château de Bonaguil.","architecture":"Blanquefort  Les études archéologiques ont montré que le château comprenait deux parties au  XIIIe siècle, le donjon, qui devait appartenir aux Pujols, et une tour carrée tenue par la famille de Fumel. Elles ont dû être réunies et réaménagées après 1287. La grosse tour ronde a dû être construite à la fin du XVe siècle par Bérenger de Roquefeuil en même temps qu'un quadrilatère de constructions qui sont maintenant nivelées et remblayées pour servir de terrasse. Au cours de la 1re moitié du XVIIe siècle, le château a été aménagé pour en faire une résidence en construisant l'aile nord.  En 1880, le château devenu propriété de la commune a été transformé pour y installer l'école des garçons au rez-de-chaussée ainsi que la mairie. L'école a été désaffectée en 1960 et le château vendu à des particuliers. Le château est inscrit au titre des M.H par arrêté du 15 mai 2008                                      Manoir Latour de La Sauvetat-de-Blanquefort","habitants":"Famille de Pujols\r\n        \r\n        \"","divers":"Château fort de Blanquefort sur Biolance","gps":"","images":["../../jctruffet.com/image/image_47/47_Blanquefort_1.jpg","../../jctruffet.com/image/image_47/47_Blanquefort_2.jpg","../../jctruffet.com/image/image_47/47_Blanquefort_3.jpg","../../jctruffet.com/image/image_47/47_Blanquefort_4.jpg","../../jctruffet.com/image/image_47/47_Blanquefort_5.jpg","../../jctruffet.com/image/image_47/47_Blanquefort_6.jpg","../../jctruffet.com/image/image_47/47_Blanquefort_7.jpg"]},"Consult_chateau_formulairec35f":{"id":"Consult_chateau_formulairec35f","dept":"47","canton":"Monflanquin","commune":"Laussou","nom":"Boinet","type":"Château","periode":"XVI","histoire":"BOINET, en effet, cette famille  propriétaire de courte durée, I604-I608, de la seigneurie de Roquefère  prête hommage  à Henri IV en 1606. Mais surtout, Jean de Boynet, premier du prénom au XVIIe siècle, sieur de Boynet et de Bessis, premier consul de Monflanquin en 1610, est anobli  pour service rendu à l'Etat, en 1614. Les portes de la Noblesse de Robe viennent de lui être ouvertes, dans un mouvement ascensionnel assez largement répandu en Aquitaine du XVI- XVIIe siècle.  La famille Sarrau, le château de Boynet sont représentatifs d'un phénomène d'ensemble. Cette ascension Jean \"premier\" la consolide, en 1624,  par l'achat de la terre noble de Gibel à Pierre Madaillan; il est dès lors sieur de Boynet, de Bessis et Gibel.\r\n L'achat de charges, l'acquisition de terres nobles, la recherche de mariages en milieu noble; le cursus de l'ascension vers la noblesse est rempli.\r\nClaude Sarrau, sieur de Boynet où il est né en 1603  pourvu comme son frère Jean \"troisième\" d'une charge de Conseiller, Il est conseiller au Parlement de Normandie de 1627 à 1636, puis devient conseiller du Roi, charge quil exerce jusquen 1640, date à laquelle il retourne en Normandie, il meurt le 30 mai 1651. Ses petits fils suivent sa voie et fondent lAcadémie des Sciences, des Belles Lettres et des Arts de Bordeaux en 1712, académie qui est encore active de nos jours. Les Sarrau ont du mal à faire admettre les droits liés à leur nouvelle condition. La Jurade veille, et s'appuie dans sa résistance sur l'adage qui veut qu'il n'y ait en Guyenne \" Nul Seigneur sans titre.","architecture":"Le château de Boinet de plan d'équerre avec un corps de logis rectangulaire à deux niveaux toit en tuiles en croupe avec lucarnes flanqué sur angle intérieur d'une tour ronde toit en poivrière prolongement du bâtiment formant l'équerre à deux niveaux avec tour carrés en bout et à l'autre extrémité accolé au corps de logis le donjon rectangulaire à trois niveaux toit en tuiles en croupe.","habitants":"Famille Sarrau de Boinet\r\n        \r\n        \"","divers":"Le château de Boinet à Laussou","gps":"","images":["../../jctruffet.com/image/image_47/47_Boinet_1.jpg","../../jctruffet.com/image/image_47/47_Boinet_2.jpg","../../jctruffet.com/image/image_47/47_Boinet_3.jpg","../../jctruffet.com/image/image_47/47_Boinet_4.jpg","../../jctruffet.com/image/image_47/47_Boinet_5.jpg","../../jctruffet.com/image/image_47/47_Boinet_6.jpg","../../jctruffet.com/image/image_47/47_Boinet_7.jpg"]},"Consult_chateau_formulaire2c49":{"id":"Consult_chateau_formulaire2c49","dept":"47","canton":"Villeneuve sur Lot","commune":"Tombeboeuf","nom":"Boisverdun","type":"Château","periode":"XIX","histoire":"Deux château à Tombeboeuf celui de Lafaurie (voir article) et de Boisverdun.                                                BOISVERDUN, une maison noble existe peut-être à Boisverdun depuis la fin du Moyen Age, dont le seigneur huguenot est mentionné en 1575 pour avoir emporté les cloches de l'église de Tombeboeuf. Le fief est en possession de la famille de Digeon au XVIIe siècle, puis passe à la famille d'Estutt de Solminiac. La demeure actuelle est construite pour le vicomte Albert Gustave Adolphe de Richemont, député-maire et membre du conseil général, durant le deuxième quart du XIXe siècle.","architecture":"La bâtisse de Boisverdun  construite dans la première moitié du XIXe siècle par le Comte Gustave de Richemont, sur lemplacement dun rendez-vous de chasse du XVIIe siècle, cette demeure familiale de style néo palladien (influence italienne) a toujours appartenu à la famille. Réaménagé durant la moitié du XIXe siècle par le Vicomte de Richemont, Outre la demeure et son parc avec un ancien moulin à vent sur motte, le domaine comporte, au XIXe siècle, des métairies et une tuilerie dans la commune de Tombeboeuf. L'édifice, de plan symétrique sur une cour en U, est inspiré de modèles palladiens. Le logis se compose d'un corps central d'un étage et de sept travées ordonnancées, avec un avant-corps sur l'élévation Est, ouvrant vers le parc. Il est encadré par deux ailes saillantes en rez-de-chaussée, délimitant une terrasse à l'ouest.","habitants":"vicomte Albert Gustave Adolphe de Richemont\r\n        \r\n        \"","divers":"Château de Boisverdun à Tombeboeuf","gps":"","images":["../../jctruffet.com/image/image_47/47_Boisverdun_1.jpg","../../jctruffet.com/image/image_47/47_Boisverdun_2.jpg","../../jctruffet.com/image/image_47/47_Boisverdun_3.jpg"]},"Consult_chateau_formulaire791c":{"id":"Consult_chateau_formulaire791c","dept":"47","canton":"Villeneuve sur Lot","commune":"Saint-Front sur Lémance","nom":"Bonaguil","type":"Forteresse","periode":"XI-XIII-XVI","histoire":"BONAGUIL, le 11 novembre 1380, Jean de Fumel-Pujols, baron de Blanquefort, épouse Jeanne Catherine de Roquefeuil. Leur fils Antoine hérite. Le fils de ce dernier, Jean de Roquefeuil épouse Isabeau de Peyre. Le couple aura neuf enfants, dont Bérenger qui naît en 1448 au château de Flaugnac. Jean et son épouse résident épisodiquement à Bonaguil.  Des quatre fils sur neuf enfants de Jean, cest le troisième, Bérenger, surnommé Bringon, qui survit aux autres et hérite en 1483, de tous les biens de ses parents. Auparavant, Bérenger a fréquenté la cour du roi de France Louis XI où son père l'avait fait entrer comme page. En 1477, il épouse Anne du Tournel au château royal d'Amboise. Et c'est vers 1495 que Bérenger va s'installer à Bonaguil dont il fait sa résidence principale, Bérenger meurt en 1530  Charles, le fils de Bérenger de Roquefeuil dilapide pour sa belle épouse Blanche de Lettes de Montpezat la fortune de son père, et ses fils Honorat et Antoine héritent dune fortune bien amoindrie. Endetté, Antoine doit remettre au sire de Pardhaillan la forteresse en 1618, avant de pouvoir la racheter quelques années plus tard. Son fils Antoine-Alexandre est marquis, mais laisse à sa seule fille Marie-Gilberte, un château en mauvais état et des coffres vides. Mariée dès la mort de son père le 9 juillet 1639 (à treize ans) au marquis de Coligny-Saligny, elle se remarie en 1655 avec Claude-Yves de Tourzel, marquis dAllègre, dont elle a une fille qui épouse Seignelay, ministre de la famille de Colbert. En 1761 il est vendu à la famille de Fumel, Marguerite de Fumel le transforme en résidences jusqu'à sa mort en 1788. Confisqué à la Révolution pour être démantelé et en 1799 Jean -Antoine Troupel-Lagrave l'acquiert. Racheté en 1860 par la commune de Fumel qui le fait classer au M.H","architecture":"Le château de Bonaguil, intègre les dernières améliorations dans la construction des châteaux forts, mais la barbacane qui en protège l'entrée annonce les transformations qui vont être nécessaires pour résister à l'artillerie qui passait à la fin du XVe siècle des boulets de pierre aux boulets de fonte. Sa construction débute au XIIIe siècle, puis il est repris à la fin du XVe siècle et au début du XVIe siècle par le baron Bérenger de Roquefeuil qui lui ajoute tous les perfectionnements défensifs du Moyen-Âge finissant. Il intègre à partir de 1480 les derniers perfectionnements de la défense au moyen de lartillerie tant pour utiliser celle-ci que pour s'en prémunir : imposante barbacane couvrant l'accès au château, canonnières par dizaines tant dans les tours que dans les courtines, chambres de tir casematées voûtées  à l'abri des boulets adverses et permettant des feux bas et rasants, « moineau » casematé interdisant toute circulation au fond du grand fossé, terrasses d'artillerie étagées au pied du corps de place qui constituent autant d'enceintes successives à forcer, à son achèvement vers 1510, il apparaît cependant obsolète, même s'ils conservent quelques dispositifs défensifs, sont peu à peu transformées en résidences d'agrément par abattage d'une partie des tours et des courtines afin de les ouvrir sur la lumière et la campagne. Hormis la perte de ses charpentes pendant la Révolution française, le château de Bonaguil est aujourd'hui dans un bon état de conservation. Il n'eut jamais à subir d'attaque et fut habité jusqu'à la Révolution.","habitants":"Famille de   Jean de Fumel-Pujols\r\n        \r\n        \"","divers":"Château de Bonaguil  à Saint-Front sur Lémance","gps":"","images":["../../jctruffet.com/image/image_47/47_Bonaguil_1.jpg","../../jctruffet.com/image/image_47/47_Bonaguil_2.jpg","../../jctruffet.com/image/image_47/47_Bonaguil_3.jpg","../../jctruffet.com/image/image_47/47_Bonaguil_4.jpg","../../jctruffet.com/image/image_47/47_Bonaguil_5.jpg","../../jctruffet.com/image/image_47/47_Bonaguil_6.jpg","../../jctruffet.com/image/image_47/47_Bonaguil_7.jpg","../../jctruffet.com/image/image_47/47_Bonaguil_8.jpg","../../jctruffet.com/image/image_47/47_Bonaguil_9.jpg"]},"Consult_chateau_formulaire223a":{"id":"Consult_chateau_formulaire223a","dept":"47","canton":"Fumel","commune":"Masquières","nom":"Bosc_Masquieres","type":"Château","periode":"XVI","histoire":"BOSC, de l'ancien repaire de la famille de Bosc, subsiste une tour quadrangulaire au nord-ouest, datable du XVIe siècle. La résidence, passée dans les biens de la famille Laduguie vers le milieu du XVIe, paraît complétée par un corps de bâtiment et une deuxième tour, peut-être dès le XVIIe siècle. L'ensemble est intégré dans l'ambitieux programme de reconstruction du château mis en oeuvre par la famille de Lisleferme, après l'acquisition de la seigneurie en 1765 c'est durant le 3e quart du siècle, pour Pierre Romain Nicolas de Lisleferme, parlementaire, protestant bordelais, appartenant au milieu des négociants, que le château est agrandi et symétrisé. Le cadastre de 1831 montre que le château est au centre d'un important domaine viticole, propriété des Lisleferme jusqu'au milieu du XXe siècle. Des aménagements ont été réalisés dans l'après guerre pour héberger une colonie de vacances pour le personnel du Comptoir d'Escompte.","architecture":"Le château du Bosc est établi sur le rebord nord-ouest d'un plateau calcaire, à proximité de la route de Cahors. De l'ancien repaire de la famille de Bosc, subsiste une tour quadrangulaire au nord-ouest, datable du XVIe siècle. La résidence, passée dans les biens de la famille Laduguie vers le milieu du XVIe, paraît complétée par un corps de bâtiment et une deuxième tour, peut-être dès le XVIIe siècle. Le château présente, sur la façade principale, un corps de logis barlong à toiture à la Mansard, encadré de deux pavillons coiffés en pyramide. La première partie de la cour d'honneur est rehaussée par rapport au reste, et limitée par une balustrade Louis XIV. A droite, la chapelle du XVIIe siècle. Dans la partie centrale se trouve un pavillon à pans qui pourrait dater du VIe siècle. Les soubassements du château sont antérieurs à la construction. Les caves voûtées sont les témoins du château primitif qui devait remonter au XIVe siècle.","habitants":"Famille de Bosc\r\n        \r\n        \"","divers":"Château du Bosc à Masquières","gps":"","images":["../../jctruffet.com/image/image_47/47_Bosc_Masquieres_1.jpg","../../jctruffet.com/image/image_47/47_Bosc_Masquieres_2.jpg","../../jctruffet.com/image/image_47/47_Bosc_Masquieres_3.jpg","../../jctruffet.com/image/image_47/47_Bosc_Masquieres_4.jpg","../../jctruffet.com/image/image_47/47_Bosc_Masquieres_5.jpg"]},"Consult_chateau_formulaire2e61":{"id":"Consult_chateau_formulaire2e61","dept":"47","canton":"Marmande","commune":"Bouglon","nom":"Bouglon","type":"Tour","periode":"XIII-XVI","histoire":"BOUGLON, château dit d'Argenton, à l'origine, le village était établi au flanc des collines qui surplombent la plaine de l'Avance au sud-est du territoire communal et le château seigneurial implanté sur le plus haut sommet de la région, au sud-ouest du village. Près dudit château, se trouvait une commanderie templière dépendant de celle majeure de Cours (près de Grignols) qui devint hospitalière au début du XIIIe siècle.\r\nAvec le temps, les villageois vinrent habiter au plus près de ces deux édifices et ce hameau devint le bourg principal tandis que l'ancien village devenait un écart sous le vocable de Bouglon-Vieux. La seigneurie fut partagée, entre les XIIIe et XVIe siècles, plus ou moins alternativement, par les familles de Caumont et d'Albret.","architecture":"Du château seigneurial du XIIIe siècle, ne subsiste qu'une tourelle à mâchicoulis aujourd'hui intégrée dans les bâtiments de l'école communale.","habitants":"Familles de Caumont et d'Albret\r\n        \r\n        \"","divers":"Tour du château de Bouglon.","gps":"","images":["../../jctruffet.com/image/image_47/47_Bouglon_1.jpg","../../jctruffet.com/image/image_47/47_Bouglon_2.jpg"]},"Consult_chateau_formulaire7b36-2":{"id":"Consult_chateau_formulaire7b36-2","dept":"47","canton":"Nerac","commune":"Bournac","nom":"Bournac","type":"Château","periode":"XV","histoire":"BOURNAC, le château se situe dans la toute proche périphérie de Nérac, en bordure de la Baïse. Une seigneurie a existé au Moyen Age, un certain Bernard de Bournac est prieur de la commanderie d' Argentens en 1361, fût le fief d' Estienne de Vignolles dit La Hire, compagnon de Jeanne d'Arc au début du XVe siècle. En 1488, il appartient à Gabiot de Veyssier. Lors du siège de Nérac en 1581, le château est incendié par Biron, il a sans doute été reconstruit peu après, soit pour Gabiot de Veyssier, gentilhomme à la cour d' Albret et conseiller au parlement, époux de Suzanne Le Venier, soit pour Vincent de Pédesclaux, anobli par Henri IV en 1590, et dont le testament en 1597 mentionne la propriété du Bournac.  Démantelé en 1621,  Propriété des Mazelières à partir de 1738, puis des Galard au début du XIXe siècle.","architecture":"Bournac, de plan en U avec une entrée côté parc par un départ de tour sur un niveau avec support balconé à mächicoulis, donna sur le corps de logis central de deux niveaux toit en tuiles en croupes avec lucarnes, prolongé de chaque côtés de bâtiments à deux niveaux avec retour en équerre et tour carré en bout, de petites tourelles carrées au angles  de la façade. De cette époque date le corps de bâtiment central, le pigeonnier, l' enceinte fermant la cour, une partie des dépendances et le jardin en terrasses descendant vers la Baïse, avec la fontaine. Nombreuses défenses, bouche à feu, meurtrière. Eléments fortifiés , tour à l' angle sud-ouest, porte cochère surmontée d' une bretèche. Importants travaux au début du XXe siècle : décor intérieur, escalier, terrasses, corps de bâtiment entre le logis central et le logement du gardien. Colombier détruit.","habitants":"Bernard de Bournac\r\n        \r\n        \"","divers":"Château de Bournac","gps":"","images":["../../jctruffet.com/image/image_47/47_Bournac_1.jpg","../../jctruffet.com/image/image_47/47_Bournac_2.jpg","../../jctruffet.com/image/image_47/47_Bournac_3.jpg","../../jctruffet.com/image/image_47/47_Bournac_4.jpg","../../jctruffet.com/image/image_47/47_Bournac_5.jpg","../../jctruffet.com/image/image_47/47_Bournac_6.jpg","../../jctruffet.com/image/image_47/47_Bournac_7.jpg","../../jctruffet.com/image/image_47/47_Bournac_8.jpg"]},"Consult_chateau_formulairec030":{"id":"Consult_chateau_formulairec030","dept":"47","canton":"Agen","commune":"Boé","nom":"Boé_Allot","type":"Château","periode":"XIII-XVII","histoire":"A Boé le château  de la Mothe Bézat, la Couronne, de Bailles , St-Marcel, la Tour Laccassagne, Pélissier (voir article)                                                    COURONNE, aujourd'hui, \"la Couronne\" permet d'identifier tout un quartier de Boé.\r\n BAILLES, château avec   tourelles  L'origine du nom semble être le \"Bayle\", magistrat fermier des droits de justice, plus tard lieutenant du sénéchal. Ce personnage, représentant du seigneur dans la commune, était chargé de fonctions administratives et juridiques. Le Bayle venait volontiers passer la belle saison en ce lieu. A la Révolution tous ses biens furent vendus comme biens nationaux.\r\nSt-MARCEL, en 1730 ce lieu était la propriété des Secondat, une famille noble qui s'était établie en Agenais vers 1550 , L'un des descendants, Godefroy-Jean de Secondat baron de Roquefort devient le maire de Boé en 1813. Sa fille Marie Françoise, baronne de Longeon, lui succéda à la tête de la propriété à sa mort en 1825.  passa à son neveu De Secondat de Montesquieu de la Brède, qui garda le château une trentaine d'années. Aujourd'hui Hôtel.                LACCASSAGNE  la tour se trouvait dans la paroisse Saint-Sulpice de Boé. Ce château est situé entre l'antique voie romaine d'Aginum à Tolosa et le canal latéral à la Garonne, est le seul vestige témoignant de limportante activité maritime du port de Boé sur la Garonne au Moyen Âge, et jusquau début du XIXe siècle. Le nom de Lacassagne est lié à deux sites à Boé :                                                                                 LAMOTTES BEZAT, ce château de Boé appartient à lorigine aux Lamothe-Bézat.","architecture":"La COURONNE, le centre de ce quartier est formé par une grosse bâtisse portant le nom de \"Château de La Couronne\". Si le peuplement de \"La Couronne\" est lointain, le château n'a rien de très ancien. Il n'a surtout rien à voir avec une quelconque origine royale. L'éthymologie de \"La Couronne\" reste encore bien mystérieuse.                                                                     BAILLES, se remarque par ses deux tours circulaires qui surveillent de loin le cours de la Garonne tour du Bayle  qui s'élevait en ce lieu situé à quelques centaines de mètres du village de Boé-Bourg.            La Tour Laccassagne, tour maîtresse de type maison forte, construite sur une motte artificielle, en bordure de la Garonne. Létude des éléments darchitecture, réalisée par Hades, situe sa construction dans la seconde moitié du XIVe siècle ou au début du XVe siècle. Des aménagements de défense lui sont ajoutés pendant la Guerre de 100 ans, puis ils sont renforcés à lépoque moderne (XVIe-XVIIe)\r\nLAMOTE-BEZAT, cest au départ une motte fortifiée autour de laquelle un fossé est creusé. Malgré des transformations effectuées au cours des siècles, on peut encore voir une des deux entrées du bâtiment de quatre mètres sur six mètres, alternant briques et pierres. Dune hauteur de quinze mètres il se compose de trois niveaux. Le corps de logis principal est quant à lui en forme de E, de vingt mètres sur dix mètres. Ce château, à lorigine très ancienne, pouvait accueillir tous les villageois en cas dattaque.                              La Tour de LACASSAGNE fut mentionnée pour la première fois en 1639, dans un acte de procédure qui la décrivait de façon sommaire \"une grande tour carrée édifiée de pierres et briques avec une basse-cour.       SAINT-MARCEL, ce majestueux château est doté de tourelles. il date du XIIe siècle, époque où elle protégeait le gué de Lécussan, lieu le plus propice à la traversée du fleuve. Depuis, les vestiges subsistent aujourd'hui. Ce fut une superbe demeure, quelques aménagements intérieurs dont les restes d'une cheminée monumentale en témoignent.","habitants":"Famille d'Hallot                                                     Famille de Baille                                                          \r\nLaccassagne, famille des de Secondat\r\n        \r\n        \r\n        \r\n        \"","divers":"A Boé le château de la Couronne grav 1, Bailles grav 2, Lamothe grav 3, Bezat grav 4, Lacassagne grav 5 et 6, St-Marcel grav 7 à 9.","gps":"","images":["../../jctruffet.com/image/image_47/47_Bo%c3%a9_Allot_1.jpg","../../jctruffet.com/image/image_47/47_Bo%c3%a9_Allot_2.jpg","../../jctruffet.com/image/image_47/47_Bo%c3%a9_Allot_3.jpg","../../jctruffet.com/image/image_47/47_Bo%c3%a9_Allot_4.jpg","../../jctruffet.com/image/image_47/47_Bo%c3%a9_Allot_5.jpg","../../jctruffet.com/image/image_47/47_Bo%c3%a9_Allot_6.jpg","../../jctruffet.com/image/image_47/47_Bo%c3%a9_Allot_7.jpg","../../jctruffet.com/image/image_47/47_Bo%c3%a9_Allot_8.jpg","../../jctruffet.com/image/image_47/47_Bo%c3%a9_Allot_9.jpg"]},"Consult_chateau_formulairec67a":{"id":"Consult_chateau_formulairec67a","dept":
