e droit en forme de fer à cheval, faisant cour entre eux, un seul étage, les ouvertures allongées correspondent exactement,un bandeau léger coupe la façade en deux parties, celui-ci se continue sur les deux ailes. Le logis droit est similaire à celui de gauche, cependant, le rez-de-chaussée possède une fenêtre de plus. La Révolution ne laissa pas indemne le château. Des Sans-culottes de Meymac et de sa région s'en prirent aux deux tours du XVe siècle et les démolirent presque complètement.","habitants":"Famille de Louis de Soudeilles \r\n        \"","divers":"Deux châteaux à Darnets Fontmartin gr 1 et Lieuteret.","gps":"","images":["../image/image_19/19_Darnets_1.jpg","../image/image_19/19_Darnets_2.jpg","../image/image_19/19_Darnets_3.jpg","../image/image_19/19_Darnets_4.jpg","../image/image_19/19_Darnets_5.jpg","../image/image_19/19_Darnets_6.jpg"]},"Consult_chateau_formulaire8b10":{"id":"Consult_chateau_formulaire8b10","dept":"19","canton":"Allassac","commune":"Donzenac","nom":"Donzenac","type":"Château","periode":"XIII","histoire":"DONZENAC, la baronnie de Donzenac changeait de mains assez souvent. Se succédèrent les Malemort, les Turenne, les Comborn, les Ventadour.  Géraud de Ventadour vend la seigneurie à Jean de Berry en 1389. C'est à ce moment que la ville atteignit son expansion maximale. Puis, Jeanne de Boulogne, veuve de Jean de Berry, transféra Donzenac à sa fille Louise née de son mariage avec Georges de la Trémoille. Louise se maria avec Bertrand VI de La Tour d'Auvergne, comte d'Auvergne. La seigneurie fut donnée à Catherine de Médicis par sa tante Anne de la Tour. Elle conserva la ville jusqu'en 1572 quand elle revendit la seigneurie à Gilbert de Lévis de Ventadour. Geoffroy de Vivans  pille  la ville le 9 juillet 1577. En 1694, Anne Geneviève de Lévis, fille du duc de Ventadour, se maria avec Hercule Mériadec de Rohan-Soubise, prince de Rohan et de Soubise, transmettant la seigneurie de la ville. Donzenac resta dans cette famille jusqu'à la Révolution. Le roi Louis XI s'arrêta à Donzenac le 28 juin 1463.\r\nCatherine de Médicis fut dame de Donzenac quelle tenait de son oncle Jean Stuart, duc dAlbanie.","architecture":"DONZENAC, de siècle en siècle, le quartier du château sagrandissait et les remparts étaient repoussés jusquau niveau actuel de la rue du Tour de Ville et de la rue du Docteur Laubie pour les quartiers bas. Le quartier du château, Donzenac, gros bourg autrefois fortifié, garde encore son aspect médiéval avec ses hauts murs, ruelles étroites et tortueuses qui reviennent toutes au quartier de l'Église.    Rempart du quartier nord de Donzenac dit du Puy Broc (Puy Supérieur), avec son chemin de garde encore discernable.  Dès le XIIIe siècle et même avant, la ville à létroit dans lenceinte fortifiée du  château  sest développée vers le nord créant ainsi le quartier du Puy Broc.  En arpentant les rues tortueuses de Donzenac, sur le point culminant du plus vieux quartier du village, le château des barons de Donzenac et peut être bien aussi la plus ancienne habitation de la ville. Sa façade fut restaurée à la Renaissance et le château mainte fois remanié  sur le point culminant du plus vieux quartier de Donzenac. Autour de lui, de nombreuses maisons témoignent également de cette période médiévale.","habitants":"Catherine de Médicis \r\n        \"","divers":"Château de Donzenac","gps":"","images":["../image/image_19/19_Donzenac_1.jpg","../image/image_19/19_Donzenac_2.jpg","../image/image_19/19_Donzenac_3.jpg"]},"Consult_chateau_formulaired5f6":{"id":"Consult_chateau_formulaired5f6","dept":"19","canton":"Beynat","commune":"Sioniac","nom":"Doumazac","type":"Château","periode":"XIII-XVII","histoire":"DOUMAZAC, près du ruisseau Pals ou où avait lieu le passage de la vallée de Beaulieu vers la montagne de Sionac et Leyssac, au bord d'un étang, on a bâti au XIIIe siècle, une tour repaire sur plan carré. Les seigneurs d'Estresse y ajoutent au XVIe siècle une aile luxueuse avec un escalier à la romaine. Ils y ont leur rendez-vous de chasse, et y logent leurs cadets. Au XVIIe siècle, le seigneur est Messire Arnaud d'Estresse. Le propriétaire au XVIIIe siècle, est le marquis Joseph-Louis de Roquet d'Estresse. Au milieu du XXe siècle, le château de Doumazac appartenait à M. Rozée d'Infreville.","architecture":"DOUMAZAC, château du XIV-XVIe siècles escalier à la romaine   Le Près du ruisseau Palsou où avait lieu le passage de la vallée de Beaulieu vers la montagne de Sionac et Leyssac, au bord d'un étang, on a bâti au XIIIe siècle, une tour repaire sur plan carré. Les seigneurs d'Esttesse y ajoutent au XVIe siècle une aile luxueuse avec un escalier à la romaine. Ils y ont leur rendez-vous de chasse, et y logent leurs cadets. Au XVIIe siècle, le seigneur est Messire Arnaud d'Estresse. Le propriétaire au XVIIIe siècle, est le marquis Joseph-Louis de Roquet d'Estresse. Au milieu du XXe siècle,","habitants":"Messire Arnaud d'Estresse\r\n        \"","divers":"Château de Doumazac à Sionac","gps":"","images":["../image/image_19/19_Doumazac_1.jpg","../image/image_19/19_Doumazac_2.jpg","../image/image_19/19_Doumazac_3.jpg"]},"Consult_chateau_formulaire513a":{"id":"Consult_chateau_formulaire513a","dept":"19","canton":"Beynat","commune":"Astaillac","nom":"Estresse_19","type":"Château","periode":"XV-XIX","histoire":"D'ESTRESSE,  date du XVe au XIXe siècle. C'est un château de style Médiéval. Rodolphe, duc de Bourgogne, repoussa les Normands en 931 lors de la bataille d'Estresse, qui eut lieu sur le domaine du château. Son propriétaire initial était la famille Roquet.  Il fut ensuite racheté et restauré par la famille Lescure. Le château d'Estresse est depuis dans la famille Lescure jusqu'à aujourd'hui. Le propriétaire actuel, Jean-Noël Lescure, agriculteur corrézien, le fait visiter lors des Journées du Patrimoine (septembre).","architecture":"D'ESTRESSE,  le château subira des modifications importantes, au début du XXe siècle, bâti en terrasse, suivant un plan rectangulaire, le château possède un corps de logis entre deux pavillons rectangulaires et accolée d'une tourelle  circulaire, avec ses bretèches dont une sur angle, tourelle coiffée en poivrière et son échauguette carrée  à l'angle de son logis. Le bâtiment est soutenu par un imposant mur médiéval de 200 mètres de long et de 8 mètres de haut, les pieds dans l'eau. Son parc fleuri comprend deux ifs millénaires, qui font 35 mètres d'envergure, et 8 mètres de circonférence.  A la fin de la Guerre de 1914-1918, le château d'Estresse sera abondonné, en ruine. Dans la tour carrée du château, se trouve la salle du roi Eudes.","habitants":"famille Lescure\r\n        \"","divers":"ESTRESSE GPS : 44° 57' 14,48\" Nord, 1° 51' 3,41\" Est","gps":"44° 57' 14,48\" Nord, 1° 51' 3,41\" Est","images":["../image/image_19/19_Estresse_19_1.jpg","../image/image_19/19_Estresse_19_2.jpg","../image/image_19/19_Estresse_19_3.jpg","../image/image_19/19_Estresse_19_4.jpg"]},"Consult_chateau_formulairef22d":{"id":"Consult_chateau_formulairef22d","dept":"19","canton":"Naves","commune":"Favars","nom":"Favars_19","type":"Château","periode":"XIII-XVII","histoire":"FAVARS, ce château date du XIIIe siècle, mais l'essentiel date des remaniements du XVIII au XIXe siècle, suite aux avanies dues à l'histoire.  Au XVIIIe siècle, le château est la propriété de Jean-Baptiste de Merigonde, baron de Saint-Hilaire, Favars et Penacors, absent lors de la Révolution. Un incendie se déclare en 1791. Le château est restauré au XIXe siècle, notamment la tour de guet du XIIIe siècle.","architecture":"FAVARS, ruines de l'ancien château ; tour du XIIe siècle.\r\nchâteau du XVIIe siècle,  le 24 janvier 1790, démolition de la digue de Lachamp et pêchèrent le poisson en signe de révolte contre les seigneurs. Malgré les protestations du propriétaire qui ne peut empêcher le cours des événements de cette révolutions, l'édifice est incendié et les propriétaires émigrent. Le château de Favars est incendié en 1791, mais sera reconstruit au XIXe siècle. La tour du XIIIe siècle a été restaurée près des bâtiments annexes. Cette tour de guet et de défense circulaire possède une tourelle d'escalier sur cul-de-lampe pour accéder à la terrasse. Deux salles intérieures voûtées en arcs de cloître. Les mâchicoulis sur corbeaux furent également restaurés.\r\nÉléments protégés MH : la tour de guet et de défense : inscription par arrêté du 22 août 1949.","habitants":"Famille de  Jean-Baptiste de Merigonde\r\n        \"","divers":"Château de Favars","gps":"","images":["../image/image_19/19_Favars_19_1.jpg","../image/image_19/19_Favars_19_2.jpg","../image/image_19/19_Favars_19_3.jpg","../image/image_19/19_Favars_19_4.jpg","../image/image_19/19_Favars_19_5.jpg"]},"Consult_chateau_formulaire212e":{"id":"Consult_chateau_formulaire212e","dept":"19","canton":"Uzerche","commune":"Benayes","nom":"Forsac","type":"Château","periode":"XVI-XIX","histoire":"Benayes trois châteaux, Forsac, Puymalie, La Vergne.  FORSAC, est un château du Limousin  dont les premières traces de construction remontent au XIIIe siècle. Sa construction date du XVIe au XIXe siècle. Son propriétaire initial était la famille Jauhnac de Forsac. On connaît en 1333 un Adhémar, seigneur de Salles et Forsac. Au XIV siècle s'installe la lignée des Jounhac puis des de La Baume jusqu'en 1780, A cette date le château est acheté par les Beaupoil de St-Aulaire qui le revendront en 1784 au Parel d'Espérut  conseiller général du canton  de Lubersac; sa petite fille Lucie-Louise de Burguet de Chaufaille épousera en 1830 Théodore Chérade de Montbron. Le propriétaire actuel du château de Forsac est la famille de Montbron.                                                             PUYMALIE,  du XV-XVIIIe siècle tour circulaire   il semble que les Cotet soient les premiers seigneurs de Puy Malie. Ils se disaient aussi seigneurs de Benayes. Leurs succédèrent par mariage les de l'Isle Jourdain de Combarel. Le château fût acheté par le Sr La Maze au Plaisant de Bouchiat député aux EG de Bordeaux. Jean de Mergey le rachète en 1588. Il sera  attaqué l'année suivante par le vicomte de Pompadour qui le détruira en partie. Il ne reste qu'une tour aujourd'hui. Puis reviendront les Plaisant de Bouchiat  puis les Joussineau du Tourdonnet jusqu'en 1902 date à laquelle il est acheté par Mr. Betoulle, maire de Limoges qui le gardera jusqu'en 1940.","architecture":"FORSAC L'architecture  connaitra des modifications importantes au cours du XVIe siècle et du XIXe siècle,  vieux de près de 900 ans, et chargé d'histoire. Le château  sert actuellement de logements, d'exploitation agricole, de chasse, d'événements et de réceptions. Corps de logis rectangulaire à deux niveaux avec lucarnes sur combles sur toit en croupes, flanqué en façade sur la droite d'une tour circulaire à trois niveaux toit en  poivrière et sur flanc gauche d'une tour carrée à trois niveaux, les toits  reposent sur des mâchicoulis. PUYMALIE du XV-XVIIIe siècle tour circulaire.","habitants":"Famille Jauhnac de Forsac\r\n        \"","divers":"Benayes possède dans sa paroisse trois châteaux, Forsac, Puymalie, La Vergne.                                   Forsac GPS : 45° 31' 15\" Nord et 1° 28' 49\" Est","gps":"45° 31' 15\" Nord et 1° 28' 49\" Est","images":["../image/image_19/19_Forsac_1.jpg","../image/image_19/19_Forsac_2.jpg","../image/image_19/19_Forsac_3.jpg"]},"Consult_chateau_formulairef276":{"id":"Consult_chateau_formulairef276","dept":"19","canton":"Naves","commune":"Gimel les Cascades","nom":"Gimel","type":"Vestiges-Châteaux","periode":"XIV-XVIII","histoire":"GIMEL, le châteaux de Gimel et de la Roche Haute du XIVe siècle quelque kilomètre au nord est le château féodal de Saint-Priest de Gimel du XVIII-XIXe siècle.  (voir article)                                                              GIMEL, le titre de vicomte disparaît cependant avec lhommage fait par Raynaud de Gimel au vicomte de Turenne (en 1264) et est troqué contre celui plus modeste de baron. Dès la seconde moitié du XIIIe siècle, les Maumont possèdent le château-haut ; dés lors les alliances entre les Gimel et les Maumont sont fréquentes. La dualité des châteaux et de la seigneurie dura jusquà la fin du XVe siècle, avec la vente, en 1493 du château de la Roche Haute à Gabriel de Gimel, seigneur du château-bas. Après cet achat, on peut penser que le château-bas, déjà en mauvais état, a été abandonné ; dautant plus quà cette date, il n'y aura plus là de seigneur de Gimel, car le château échoit à une héritière : Gaspare, fille de François, mariée à un seigneur de Lavaur. Les vestiges, sauvées par leur dernier propriétaire, ont été donnés à la commune en 2004.","architecture":"Vestiges du château  de la ROCHE HAUTE, c'est à la fin du XVe siècle est acheté par le seigneur de Gimel, propriétaire du château de la Roche Basse. C'est la fin des deux seigneuries à Gimel.\r\nLa prise de position des barons de Gimel en faveur de la Ligue va conduire à la ruine du château : assiégé par l'armée royale en 1594, François de Gimel capitule; puis reprend le château en 1595. Nouveau siège, nouvelle défaite, et cette fois le château est en partie détruit. Il ne reste que des ruines du château dit de La Roche Haute surplombant le bourg ; il fut le théâtre en 1594 d'un siège de l'armée royale contre le seigneur de Gimel qui dut se rendre. Le château fut démoli à cette occasion.","habitants":"Raynaud de Gimel \r\n        \r\n        \"","divers":"Vestiges de Gimel gr 1 à 6 et le château  Charlu Gr7- 8","gps":"","images":["../image/image_19/19_Gimel_1.jpg","../image/image_19/19_Gimel_2.jpg","../image/image_19/19_Gimel_3.jpg","../image/image_19/19_Gimel_4.jpg","../image/image_19/19_Gimel_5.jpg","../image/image_19/19_Gimel_6.jpg","../image/image_19/19_Gimel_7.jpg","../image/image_19/19_Gimel_8.jpg"]},"Consult_chateau_formulaire8940":{"id":"Consult_chateau_formulaire8940","dept":"19","canton":"Argentat","commune":"Goulles","nom":"Goulles_Carbonnières","type":"Vestiges","periode":"XI-XIII","histoire":"GOULES-CARBONNIERES, du XI-XIIIe siècles, leur présence montre lexistence de deux familles distinctes sur le rocher : les Carbonnières et les Montal. Les deux Tours seront vendues au XIIIe siècle à Bertrand de Sermur et au seigneur de Surclam. \r\nCharles de Carbonnières, chevalier, seigneur de Jayac, Archiniac, fait chevalier de l'ordre du Roi, par Brevet du 14 Septembre 1570, dont S. M. lui fit donner avis le 30 du même mois par M. de Périgord, son cousin, est dénommé dans un passeport du mois d'Avril 1577, donné à Nerac par le Roi de Navarre, gouverneur et lieutenant-général pour le Roi en Guyenne, par lequel ce prince ordonne de laisser passer les Sieurs de Jayac (Charles de Carbonnières) et de Montmeije, accompagnés de leurs gens, armes, chevaux et bagages, s'en allant aux noces des filles du seigneur de Biron, grand-maître et général de l'artillerie de France. Ce passeport est signé Henri, et, plus bas, de Mazelières, et scellé des armes de Navarre. Ce prince lui écrivit de Montauban le 19 Août 1578, la lettre dont la teneur suit, et dont la souscription est à monsieur de Jayac, chevalier de l'Ordre du Roi.  AUYERE manoir du XVI-XVIIIe siècle avec tours circulaire pas d'information.","architecture":"CARBONNIERES, les deux tours actuelles se dressent à une distance de 20 mètres environ lune de lautre ; bâties en gros blocs de granit soigneusement appareillés et régulièrement assisés, elles sont dénuées de tout contrefort et sont bien ancrées sur la roche affleurante. De forme carrée, elles datent du XIIIe et du XVe siècles. Leur hauteur dorigine pouvait atteindre 20 à 25 m, aujourdhui elle est de 18 m.  Au XVe siècle, les deux Tours seront abandonnées et ne serviront plus alors que de refuge temporaire. Les armes des Carbonnières sont au musée de Versailles : « dargent à trois bandes dazur accompagné de 8 charbons de sables allumés en gueule et posés sur les branches 1-3 et 3-1 » blason de la commune. La tour sud appelée la Bistorg (qui signifie en biais) était un passage obligé et avait donc une vocation défensive. La tour Nord a été construite après 1359 et a subi des remaniements pour accroître le confort de ses occupants. Plus massive et dune austère grandeur, elle avait une vocation essentiellement résidentielle.","habitants":"Charles de Carbonnières\r\n        \"","divers":"Vestiges des tours de Carbonnières et manoir d'Auyères à Goulles gr 6","gps":"","images":["../image/image_19/19_Goulles_Carbonni%c3%a8res_1.jpg","../image/image_19/19_Goulles_Carbonni%c3%a8res_2.jpg","../image/image_19/19_Goulles_Carbonni%c3%a8res_3.jpg","../image/image_19/19_Goulles_Carbonni%c3%a8res_4.jpg","../image/image_19/19_Goulles_Carbonni%c3%a8res_5.jpg","../image/image_19/19_Goulles_Carbonni%c3%a8res_6.jpg"]},"Consult_chateau_formulairef184":{"id":"Consult_chateau_formulairef184","dept":"19","canton":"Malemort sur Corrèze","commune":"Ussac","nom":"Griffolet","type":"Château","periode":"XVII","histoire":"GRIFFOLET, la famille Griffolet, dont la seigneurie était représentée par un « losange dor et dazur » possédait un château avec une chapelle domestique. Cette noble famille offrit sa châtellerie du Griffolet à lévêque de Limoges le 26 janvier 1624. Les Griffolet comptent  dans leur descendance un\r\ncapitaine des Chasses en Limousin (1660), un capitaine dinfanterie au régiment de champagne (1669), un lieutenant-colonel dans le régiment de Cosnac aux chevaux légers ainsi quun maître de chambre des ambassadeurs ordinaires et extraordinaires à la cour de Rome. Cette famille avait de hautes alliances comme les familles Bar, Sahuguet, Cosnac, DEscorailles.                                                LE-CLOUP, Pierre Juyé, notaire à Tulle est seigneur au Cloup à la fin du XVe siècle. Il a épousé Marguerite de Selve, sur du premier président du parlement de Paris. Son fils, Antoine Juyé de Dioudelle sera fait, en 1515, seigneur de la Marque et chambellan du roi François 1er. Il a épousé Michelle Vialle, cousine de monsieur Thomas Bohier (constructeur de Chenonceau), et d'Antoine Duprat, chancelier de France (constructeur de Nantouillet). Ils feront construire la maison appelée plus tard maison de Loyac, à Tulle. Au XIXe siècle, le château appartenait à un préfet de Strasbourg en disgrâce, M. Chopin d'Arnonville.","architecture":"GRIFFOLET, chateau du XV-XXe siècle La première maison-forte fut détruite de plan rectangulaire à deux niveaux sur soubassement toit en croupe avec lucarnes accolé aux extrémitées d'une tour ronde et une carrée à toit pointus.                                              Le château du Cloup construit au XVIIIe siècle.","habitants":"Famille Griffolet\r\n        \"","divers":"château de Griffolet à Ussac","gps":"","images":["../image/image_19/19_Griffolet_1.jpg","../image/image_19/19_Griffolet_2.jpg","../image/image_19/19_Griffolet_3.jpg"]},"Consult_chateau_formulairec2b8":{"id":"Consult_chateau_formulairec2b8","dept":"19","canton":"Uzerche","commune":"Salon la Tour","nom":"Grènerie","type":"Château","periode":"XV","histoire":"A Salon la Tour le château de la Grenerie, du Pin ( voir article) de la Fraysse du XVe siècle et la tour.                La GRENERIE Il fut construit au milieu du XVe siècle, vers 1450, par la famille de Lesbolières, originaire de Masseret. Il fut acheté en 1518 par une famille bretonne, les Beaupoil de Saint-Aulaire qui acheva et agrandit la demeure. Jean de Beaupoil maître d'hôtel du roi François Ier. François-Joseph de Beaupoil de st-Aulaire membre de l'accadémie française, son fils Louis époux d'une fille de la marquise de Lambert est mort en 1709 au combat en Alsace, le domaine passe à  sa petite fille Eulalie qui épouse en 1725 Anne-Pierre comte de Beuvron futur duc d'Harcourt qui ce dernier cède les domaines de la Grènerie et des Meilhards en 1774 à Pierre Ardant de Bréjou, une famille de négociants de Limoges, par succession aux Babou des Places. Au XIXe siècle aux Veyvialle les héritiers le cèdent au baron de Rolland de Blomac. En 1870 c'est le baron Rolland de Blomac qui le restaura, après une période de reventes successives, sans grand entretien, depuis 1953 appartient aux Charpentier.  En 2002, Thor Johanness en tombe amoureux du château de la Grènerie. Il l'achète et le restaure du sol au plafond. Il possédait aussi deux domaines dans le Lot, dont un avec un vignoble du côté de Fumel.                                                           PIN du XII-XXe siècle avec tours et étang.","architecture":"GRENERIE construit au XVe siècle sur une terrasse qui domine, du côté nord, une petite vallée où se trouve un étang de 3 ha. Achevé et agrandit au XVIe sièclel le château qui est une résidence privée,  un corps central de plan rectangulaire relié à la chapelle de style flamboyant et elle-même cantonnée de deux tours par un bâtiment intermédiaire, d'élévation moindre que celle du corps de logis qui lui a quatre tours aux angles, après une période de reventes successives, sans grand entretien. La façade sud d'entrée et les tours ont été restaurées au XIXe siècle avec portes et fenêtres dans le style néo-gothique, mâchicoulis et chemin de ronde. Les murs sont en moellons de grès. Château et dépendances, jardin, parc et bassin sur la route sont inscrits sur l'inventaire supplémentaire des M.H. en 1992.","habitants":"Famille de Beaupoil de Saint-Aulaire\r\n        \"","divers":"Château de la Grènerie à Salon la tour","gps":"","images":["../image/image_19/19_Gr%c3%a8nerie_1.jpg","../image/image_19/19_Gr%c3%a8nerie_2.jpg","../image/image_19/19_Gr%c3%a8nerie_3.jpg","../image/image_19/19_Gr%c3%a8nerie_4.jpg","../image/image_19/19_Gr%c3%a8nerie_5.jpg","../image/image_19/19_Gr%c3%a8nerie_6.jpg","../image/image_19/19_Gr%c3%a8nerie_7.jpg","../image/image_19/19_Gr%c3%a8nerie_8.jpg"]},"Consult_chateau_formulaire7598":{"id":"Consult_chateau_formulaire7598","dept":"19","canton":"Uzerche","commune":"Montgibaud","nom":"Joubertie","type":"Manoir","periode":"XII-XIII","histoire":"JAUBERTIE à Montgibaud, aux XIe, XIIe et XIIIe siècles les membres de l'antique famille de Breno et les chevaliers du castrum firent de nombreux dons à l'abbaye de Vigeois (créé par les Bré) et à l'abbaye d'Aureil. Une riche famille d'alleutiers  les Las Rasas  firent au XIe siècle d'importants dons de terres à l'abbaye d'Aureil. Umberga Las Rasas donna de nombreuses manses et borderies dépendant de sa villa de Selumnac située non loin de Bré et où se trouve sa maison (domus). Ce don est important, on peut supposer que la dame Umberga se fit moniale et que ce don constitua sa dot. Son frère Petrus compléta ce don en donnant tout ce qui reste de son alleu depuis le pont de Bré sur la voie Lemovicina jusqu'à la Nouaille. La même année Stephanus Las Rasas donna par amour pour sa fille Pétronille future servante de Dieu, sa borderie de La Nouaille. La villa Selumnac et toutes les terres données se trouvaient dans la paroisse de Meuzac. La villa Selumnac se situait près du pont de Bré, elle est devenue le lieu-dit de Sauvignat situé sur les rives de la Boucheuse. Les Las Rasas dont la villa jouxtait le castrum de Bré n'étaient pas des milites, bien positionnés en terres, ils semblent plutôt être leurs égaux.","architecture":"JOUBERTIE, ce château offre un joli point d'intérêt dans notre paysage. Il est le berceau et la possession de la famille de Montgibaud dont plusieurs générations se sont succédées durant le XVIIe siècle. Le château passe ensuite dans la famille des Burguet par le mariage en 1696 d'Isabeau de Montgibaud avec Pierre Burguet, seigneur de Cherchaud jusqu'à  la fin du XIXe siècle. Il est aujourd'hui en cours de rénovation et ne se visite pas.                                                                 Chateau de Lortholary manoir de style oblong à deux niveaux avec série de lucarnes sur toit brisé flanqué au centre d'une tour carrée mi saillantes de trois niveaux toit à quatre pans.","habitants":"Famille de Montgibaud                                                    Famille des Las Rasas\r\n        \"","divers":"Château de la Joubertie gr 1-2 et manoir de Lortholary à Montgibaud gr 3-4","gps":"","images":["../image/image_19/19_Joubertie_1.jpg","../image/image_19/19_Joubertie_2.jpg","../image/image_19/19_Joubertie_3.jpg","../image/image_19/19_Joubertie_4.jpg"]},"Consult_chateau_formulaire8bdc-2":{"id":"Consult_chateau_formulaire8bdc-2","dept":"19","canton":"Objat","commune":"Juillac","nom":"Juillac","type":"Château","periode":"XIII-XVIII","histoire":"A Juillac le château de Beaufort , de Chabrignac   du XVIe siècle avec tours rondes ( voir article), et le manoir de Miracles du XIII-XVIIIe siècles ( voir article) et le château de Piquets du XVI-XVIIe siècles avec tours.                                                                    BEAUFORT,  \"Juillac avait donc deux seigneuries de la Salle et Beaufort ayant chacune son domaine et son château respectif. Celui de Beaufort, dont les ruines appropriées servent à loger la gendarmerie  actuellement des logements s'appellait Beaufort-lez-Juillac. C'était une forteresse imposante défendue par des tours qui de dressaient aux quatre angles des bâtiments formant un vaste quadrilatère. Elle commandait la contrée vers le sud-ouest.\r\nDétruit pendant la guerre de Cent-ans, il fut restauré par un cardinal de Beaufort dont les armes et le chapeau cardinalice se voyaient encore, il y a quelques années.\r\nLa Révolution ne trouva que des ruines : Citoyens, écrivaient en 1793, les officiers municipaux en réponse à la lettre du Directoire les invitant à détruire des demeures féodales, nous n'avons, dans l'étendue de notre commune ni vieux ni modernes châteaux.","architecture":"La SALLE, le château de Peyrusse des Cars appelé \"Château de la Salle\" protégeait le bourg. Il est diffcile de dire à qu'elle époque il fut construit,  dans sa construction primitive, est sûrement le contemporain de la lutte soutenue par le duc Waïffre contre les envahisseurs du nord. Il lutta pendant 9 ans, de 759 à 768, contre Pépin le Bref. Comme toutes les places de ces temps reculés, le château de la Salle se composait seulement d'un donjon et d'une enceinte fortifiée. En 1730, il était complètement ruiné et M. Hervy, curé de Juillac, fit l'acquisition des bâtiments et du jardin pour y construire le presbytère.\r\nA cette époque les habitants de la paroisse devaient fournir le logement de leur curé, mais M. Hervy songea, en  1736, à faire construire un presbytère et il demanda à l'intendant d'imposer les habitants pour les dépenses que nécessiterait cette construction. Ceux-çi protestèrent avec énergie.\r\nLe curé mourut en 1759. Mais ses successeurs persistèrent et ils eurent gain de cause puisque en 1777, l'intendant de Limoges, ordonna la construction de la cure sur les débris de l'ancien château. Notre pauvre paroisse dut s'imposer fortement et contribuer en outre, par la corvée en nature, à l'édification du presbytère.","habitants":"Famille de Beaufort\r\n        \"","divers":"A Juillac le château de Beaufort gr-1, de Chabrignac gr  2-3-4-   et le château de Piquets gr-5 les salles grav 6","gps":"","images":["../image/image_19/19_Juillac_1.jpg","../image/image_19/19_Juillac_2.jpg","../image/image_19/19_Juillac_3.jpg","../image/image_19/19_Juillac_4.jpg","../image/image_19/19_Juillac_5.jpg"]},"Consult_chateau_formulairec92f":{"id":"Consult_chateau_formulairec92f","dept":"19","canton":"ste-Fortunade","commune":"Lagarde-Enval","nom":"Lagarde_Enval","type":"Château","periode":"XIV-XV","histoire":"LAGARDE-ENVAL, aux temps féodaux, le seigneur de Lagarde, seul propriétaire des terres, hommage aux Ventadour. A la fin du XIVe siècle, les coseigneurs du village se multiplient, ils sont marchands et magistrats de Tulle, anoblis, et certains hommages se font aux vicomtes de Turenne, et d'autres aux Ventadour. Les seigneurs de Lagarde, après de brillantes alliances, partent vers l'Auvergne et vendent l'édifice à la famille de Lauthonie chassés de leur château de Lafarge, à Sainte-Fortunade, par un incendie. Mais cette famille est ruinée par la Révolution, et en 1830, une famille alliée, les Ambert de Serillac, venue de Curemonte, achète le château.","architecture":"Lagarde-Enval, Vers le XVe siècle, le château était une place forte. Cest au XVIIe siècle que la tour Ouest et le corps principal furent construits par la famille de Lauthonie, complétés en 1764 par la tour Est, bâtie par monsieur de Chaunac qui avait épousé une demoiselle de Lauthonie. Cette famille, alliée deux ou trois générations auparavant aux dAmbert de Sérilhac, vendit le château et ses dépendances à ces derniers, en 1828. Sur la tour Est du château, on peut admirer une pierre sculptée représentant les blasons des familles de Lauthonie et dAmbert de Sérilhac.","habitants":"Famille de Lauthonie\r\n        \"","divers":"Château de lagarde d'Enval de Maclatour gr-6 et d'Albussac gr-7","gps":"","images":["../image/image_19/19_Lagarde_Enval_1.jpg","../image/image_19/19_Lagarde_Enval_2.jpg","../image/image_19/19_Lagarde_Enval_3.jpg","../image/image_19/19_Lagarde_Enval_4.jpg","../image/image_19/19_Lagarde_Enval_5.jpg","../image/image_19/19_Lagarde_Enval_6.jpg","../image/image_19/19_Lagarde_Enval_7.jpg"]},"Consult_chateau_formulaireb9e9-2":{"id":"Consult_chateau_formulaireb9e9-2","dept":"19","canton":"Seilhac","commune":"Lagraulière","nom":"Lagraulière","type":"Manoir","periode":"XIII-XIX","histoire":"Deux châteaux à Lagraulière celui de Blanchefort et de Bellefond.                                                                        BLANCHEFORT, construit  au XIIIe siècle par Archambaud IV, Vicomte de Comborn,    Assalit IX de Comborn donne en 1219 le fief à son dernier petit-fils, Assalit, qui en prend le nom. Au XVe siècle, Guy d'Aubusson, grand Maître de l'Ordre de Saint-Jean-de-Jérusalem, est propriétaire du domaine de Blanchefort. Au XVIIe siècle, le château passe à Antoine de Bonneval, sénéchal et gouverneur du Bas Limousin. En 1780, la demeure est à la famille Maynard de Chabannes. C'est à cette époque que M. François Meynard de Chabannes fit restaurer le vieux logis, Joseph François, président de la cour criminelle d'Uzerche, succède à son père.  \r\nPropriété actuelle d'une personne privée.  BELLEFOND, hâteau de Bellefond est un superbe, et imposant, château en pierre authentique datant du XIIIe siècle, compléter avec une porte cochère, et les tours.","architecture":"BLANCHEFORT, construit  au XIIIe siècle   Au cur de la mystérieuse forêt de Blanchefort, sur l'ancienne route d'Uzerche à Tulle, deux grosses tours se mirent dans un étang qui devait alimenter les fossés. Vestiges de murs d'enceinte et vestiges du grand donjon   M. François Meynard de Chabannes fit restaurer le vieux logis et fit construire le corps de logis actuel.    Vestiges de murs d'enceinte et vestiges du grand donjon .                                                                  BELLEFOND il comportait quatre étages, laissé à l'abandon au XVIIe siècle de grosses tours circulaires et les murs d'enceinte sont  en ruine. Au début du XIXe siècle il est  reconstruit sur deux étages seulement.","habitants":"Archambaud IV, Vicomte de Comborn\r\n        \r\n        \"","divers":"Château de blanchefort, de Bellefond gr 1à 4 à Lagraulière","gps":"","images":["../image/image_19/19_Lagrauli%c3%a8re_1.jpg","../image/image_19/19_Lagrauli%c3%a8re_2.jpg","../image/image_19/19_Lagrauli%c3%a8re_3.jpg","../image/image_19/19_Lagrauli%c3%a8re_4.jpg","../image/image_19/19_Lagrauli%c3%a8re_5.jpg","../image/image_19/19_Lagrauli%c3%a8re_6.jpg","../image/image_19/19_Lagrauli%c3%a8re_7.jpg"]},"Consult_chateau_formulaire7b4b":{"id":"Consult_chateau_formulaire7b4b","dept":"19","canton":"Ste-Fortunade","commune":"Laguenne","nom":"Laguenne","type":"Château","periode":"XV","histoire":"SALVANIE, en 1991 la propriété a été vendue à Mme Sauneron-Duroux, nièce de M. Meynard qui avait un projet en collaboration avec le restaurant « St Etienne » à Aubazine mais ce projet n'a pu aboutir pour des raisons familiales.                            SALVANIE  à Laguenne à cinq kilomètres au sud le château racheté par la commune en cours de restauration                                                   CHAMBON pas d'information.","architecture":"La propriété a continué à se dégrader et malgré de nombreux courriers suite aux plaintes des riverains et aux risques encourrus par les usagers des chemins ruraux des Allées à proximité de la propriété, aucune intervention n'est intervenue. Monsieur le Maire a décidé de mettre en uvre en 2009 la procédure de péril imminent à l'encontre de Mme Sauneron-Duroux et a saisi le Président du Tribunal Administratif afin qu'il nomme un expert pour examiner\r\n les bâtiments et dresser constat de l'état de la propriété.","habitants":"Mme Sauneron-Duroux\r\n        \"","divers":"Château de la Salvanie et de Chambon gr 7 à Laguenne","gps":"","images":["../image/image_19/19_Laguenne_1.jpg","../image/image_19/19_Laguenne_2.jpg","../image/image_19/19_Laguenne_3.jpg","../image/image_19/19_Laguenne_4.jpg","../image/image_19/19_Laguenne_5.jpg","../image/image_19/19_Laguenne_6.jpg","../image/image_19/19_Laguenne_7.jpg"]},"Consult_chateau_formulairef4e9":{"id":"Consult_chateau_formulairef4e9","dept":"19","canton":"Beynat","commune":"Lanteuil","nom":"Lanteuil","type":"Château","periode":"XV-XVI","histoire":"Plusieurs châteaux à Lanteuil  celui de Lanteuil de Boudie de la Miraudie, de Beauregard et de la Praderie.                                                                          BOUDIE  ayant appartenu à la famille Corrèze de la Colombière.\r\nLANTEUIL, des XVe et XVIe siècles.  \r\nMIRAUDIE.  de madame Toulzac. Le château fut la propriété des familles de Lavergne,  puis Juglards de la Maraudie.La façade nord a été reconstruite par les soins de Madame Toulzac, puis Juglards de la Maraudie. Vers 1800, le château est à madame Virginie de Froidefond, fille de Guillaume de Froidefond (château de Brignac) et de mademoiselle de Lavech, épouse de M. de Juglards. Sa soeur, Léontine de Froidefond épouse  M. Toulzac, fils d'un maire de Brive la Gaillarde.\r\nChâteau de Saint-Alban (ou d'Oriol).   Maison des Foucault à Lanteuil appartenait à la châtellenie de Turenne. Les plus anciens seigneurs de Lanteuil connus sont les Faucault (Folcoald-Faucald) quon trouve dans les cartulaires de la région dès le XIe siècle. Cette famille est citée comme seigneur de Lanteuil en 1338 et en 1471.","architecture":"MIRAUDIE :  dont la façade sud sorne dune remarquable tour du XVe siècle, qui s'orne d'une tour bâtie au XVe siècle ornée d'une porte blasonnée aux armes des Lavergne de la Miraudie.La façade nord a été reconstruite.\r\nBOUDIE :  du XVIIIe siècle   inscrit au titre des M.H. depuis 1987   tourelles en échauguettes.  .\r\nPRADERIE, très ancien prieuré dOriol. \r\nFOUCAULT, les bâtiments, forment un quadrilatère avec une cour intérieure centrale.  Le bâtiment du XVe siècle au sud-ouest, longé par la rivière la Vianne, a une intéressante façade sud-ouest, avec ses baies à arcs en accolades géminés et un pignon sud-est amorti dune souche de cheminée à boules sur piédouches. La tour carré descalier a des baies aux moulurations du XVe siècle. Sa porte sur cour a un linteau orné dun écu au lion dressé, armes des Faucal. Le bâtiment situé à droite renferme le porche dentrée à larc brisé au très bel appareil. Sa façade nord-ouest sur cour a, au premier étage, une galerie sur voûte en arc surbaissé, intéressantes lucarnes Renaissance au fronton en coquille dont une porte les armes de Foucault, le blason est devenu celui de la commune.","habitants":"Famille Corrèze de la Colombière\r\n        \"","divers":"Plusieurs châteaux à Lanteuil gr-1-2-3  celui de Lanteuil de Boudie de la Miraudie gr-4-5, de Beauregard  gr-1-2 et de la Praderie_8.","gps":"","images":["../image/image_19/19_Lanteuil_1.jpg","../image/image_19/19_Lanteuil_2.jpg","../image/image_19/19_Lanteuil_3.jpg","../image/image_19/19_Lanteuil_4.jpg","../image/image_19/19_Lanteuil_5.jpg","../image/image_19/19_Lanteuil_6.jpg","../image/image_19/19_Lanteuil_7.jpg","../image/image_19/19_Lanteuil_8.jpg"]},"Consult_chateau_formulaire47f1":{"id":"Consult_chateau_formulaire47f1","dept":"19","canton":"Egletons","commune":"St-Merd de Lapleau","nom":"Lapleau","type":"Château","periode":"XI- XVII","histoire":"Trois châteaux à Lapleau dont celui de Lapleau de Lestrange et de Rouby.                                             LAPLEAU  du XVII-XIXe siècles.  Au Xe siècle, Lapleau relevait de la Baronnie de La Roche Canillac laquelle faisait partie de la Vicomté de Turenne.            LESTRANGE, au nord du lieu-dit Laborie, fut bâti au XIe siècle, sur un promontoire rocheux surplombant la Luzège, par une vieille famille de chevaliers. Jusquau XVIIIe siècle, cette famille a marqué lhistoire de Lapleau. Les de Lestrange ont fourni nombre de dignitaires royaux ou religieux. Pendant la Guerre de 100 ans (vers 1350) Geoffroy « Tête Noire », mercenaire breton qui combattait pour les anglais, sempara du château de Lestrange, après s'être emparé de celui de Ventadour. La plupart des descendants de cette famille ont vécu loin de Lapleau, à la cour, au Puy-en-Velay, etc. \r\nCet éloignement a conduit à la dégradation de leur domaine lapleauçois. La gentilhommière du XVIe siècle fut une maison d'habitation des Badets de Burg. Elle est flanquée d'une tour à bretèche et d'une échauguette. \r\nROUBY  du XVIIe siècle. du XVIIe siècle fut une maison d'habitation des Badets de Burg.  Hippolyte Rouby (1860-1920), ancien maire, conseiller général, député et sénateur. Élie Rouby (1894-1970), fils du précédent, résistant, ancien maire, ancien président du conseil général de la Corrèze. En 1763, un Grenier épousa une Françoise Despers de la Borderie. Le père de celle-ci vint habiter à Lapleau et y fit bâtir le château « Rouby ».","architecture":"LAPLEAU  de plan rectangulaire à deux niveaux avec lucarnes sur combles, toitures en lauzes.             RUBY  est flanquée d'une tour à bretèche et d'une échauguette. Elle est le siège de la communauté de communes de Ventadour, plutôt maison forte de fin du XVIe siècle, son toit en lauze est classé. Elle a eu abrité la poste et la gendarmerie. La gentilhommière a été construite en 1663. Deux tours, elle appartenait à un noble de naissance. Elle abrite le siège de la communauté des communes de Ventadour. Les façades et la toiture en lauze sont classées aux M.H, par arrêté du 7 février 1975.                                 LESTRANGE du XI -XVIIIe siècles il ne reste qu'une colline boisée avec un point de vue sur les gorges de la Luzège, sur la vieille église de Saint-Pantaléon-de-Lapleau. Les pierres du château ont été récupérées par les habitants pour construire leurs demeures et diverses dépendances. Leur château était en partie démoli en 1774. Les pierres du château étant alors récupérées par les habitants des villages alentours pour construire leurs propres maisons .","habitants":"Famille de Lestrange et famille de Rouby\r\n        \"","divers":"Trois châteaux à Lapleau dont celui de Lapleau manoir de Mr Bardet gr-2 de Lestrange gr-1 et de Rouby","gps":"","images":["../image/image_19/19_Lapleau_1.jpg","../image/image_19/19_Lapleau_2.jpg","../image/image_19/19_Lapleau_3.jpg","../image/image_19/19_Lapleau_4.jpg","../image/image_19/19_Lapleau_5.jpg"]},"Consult_chateau_formulairedf74":{"id":"Consult_chateau_formulairedf74","dept":"19","canton":"Argentat","commune":"Hautefage","nom":"Laveyrie","type":"Château","periode":"XV-XVIII","histoire":"LAVEYRIE, les seigneurs de Laveyrie appartenaient à la vicomté de Turenne et possédaient les terres nobles de Tillinac, de la Cabterie et du Puy-Farges, pour lesquelles ils devaient à chaque mouvance, un fer de lance doré au vicomte de Turenne. En 1428, Jean de Laveyrie était abbé de Hautefage. La filiation régulière de la famille est établie à partir de Bernard de Laveyrie, qui fit son testament en 1628, marié à Isabeau du Bac. Jean Gabriel de Laveyrie, garde du corps, fut assassiné en 1791, à l'âge de 23 ans, à Villate près de Touniens (Lot et Garonne). Alliances avec de Gresset, de Gimel, de Grafeuille, de Miremont, Audubert, et de Vialette. Le château fut rebâti au XVIIe siècle, après l'incendie par les huguenots en 1579.","architecture":"LAVEYRIE, château du XV-XVIIIe siècles flanqué de tourelles polygonales et portes, suivant le style régional limousin; le corps de logis est flanqué d'avant-corps au sud et de six tours polygonales au nord. La toiture de lauzes comporte des lucarnes superposées. Il reste des vestiges de la construction primitive; portes sculptées de cordelières et d'animaux. C'est un édifice souterrain (le toit est au niveau du sol) construit en pierre avec grand soin et dont l'entrée en chicane débouche sur une petite pièce couverte à l'origine par des lauzes.  Une deuxième pièce attenante à la première est voûtée et possède des meurtrières, cette construction est interprétée comme un poste de garde pour le château.                                                    GRAFEUILLE manoir pas d'information de plan d'équerre à deux niveaux accolé de deux tourelles carrées sur flanc gauche et d'une tour carrée  en retour d'équerre sur flanc opposée; toiture en croupes en lauzes.","habitants":"Famille de Laveyrie\r\n        \"","divers":"Château de Laveyrie gr-1 et manoir de Grafeuille gr 3-4  à Hautefage","gps":"","images":["../image/image_19/19_Laveyrie_1.jpg","../image/image_19/19_Laveyrie_2.jpg","../image/image_19/19_Laveyrie_3.jpg","../image/image_19/19_Laveyrie_4.jpg","../image/image_19/19_Laveyrie_5.jpg"]},"Consult_chateau_formulaire0d23":{"id":"Consult_chateau_formulaire0d23","dept":"19","canton":"Bort les orgues","commune":"Liginiac","nom":"Liginiac_Laveix","type":"Château","periode":"XV-XVIII","histoire":"A trois kilomètres au nord de Liginiac  le château  de;                                                                               LAVEIX commune de Saint-Etienne-la-Geneste construit  à partir de 1615, constitué de deux terrasses et bordée par la rivière l' Artaude . Il est aujourd'hui propriété privée. Sont inscrites à l'inventaire supplémentaire des M.H depuis le 30 mars 1979 : les façades et les toitures, l'escalier intérieur, la salle sud-ouest avec son décor et les deux cheminées en pierre de la salle nord-est au 1er étage.                                La BASTIDE du XVII-XIXe siècle tours et porte armoriée, hôtel de Ville.                                                  SAINT-FELIX est un château bâti à Liginiac, Il appartenait à la famille Masson de Saint-Félix. La construction du château de Saint-Félix date du XIVe siècle. C'est devenu la mairie de Liginiac.                       \r\nMAREGES,  c'est un château privé,  sa propriétaire est Hélène de Belinay vous propose ses chambres d'hôtes.","architecture":"LAVEIX du XVIIe siècle, de plan rectangulaire, édifié à partie de 1615, le château est composé autour d'une cage d'escalier rectangulaire et flanqué de trois tours carrées, une au centre devant l'escalier, les deux autres saillantes aux extrémités. La silhouette de l'ensemble est uniquement animée par les volumes et toitures. L'intérieur montre un escalier à volées droites ouvrant sur des arcades. La salle sud-ouest, au-dessus du salon, est partiellement lambrissée et couverte d'un plafond à la française.     Façades et toitures ; escalier intérieur ; salle Sud-Ouest avec son décor et les deux cheminées en pierre de la salle Nord-Est au premier étage : inscription par arrêté du 30 mars 1979                                                                    MAREGES,  du XV-XXe siècles  de plan rectangulaire  à deux niveaux avec série de lucarnes sur combles sur toits à deux pans, quatres tours circulaires de différentes dimensions  à toit en poivrières transformé en chambres d'hôtes","habitants":"Famille Masson de Saint-Félix.\r\n        \"","divers":"Trois châteaux à Liginiac, Laveix , St-Félix et Marèges.        St-Félix gr-7_8_9   GPS : 45° 24' 57,93\" Nord et 2° 19' 54,1\" Est                           Maréges gr de 1-6   GPS : 45° 24' 59\" Nord 2° 20' 03\" Est","gps":"45° 24' 57,93\" Nord et 2° 19' 54,1\" Est","images":["../image/image_19/19_Liginiac_Laveix_1.jpg","../image/image_19/19_Liginiac_Laveix_2.jpg","../image/image_19/19_Liginiac_Laveix_3.jpg","../image/image_19/19_Liginiac_Laveix_4.jpg","../image/image_19/19_Liginiac_Laveix_5.jpg","../image/image_19/19_Liginiac_Laveix_6.jpg","../image/image_19/19_Liginiac_Laveix_7.jpg","../image/image_19/19_Liginiac_Laveix_8.jpg","../image/image_19/19_Liginiac_Laveix_9.jpg"]},"Consult_chateau_formulaireccdb":{"id":"Consult_chateau_formulaireccdb","dept":"19","canton":"Beynat","commune":"Ligneyrac","nom":"Ligneyrac","type":"Château","periode":"XV-XVI-XVII","histoire":"Trois châteaux à Ligneyrac, celui de Puch, la Rue,  et des Roberts, plus au sud  à Chauffour le château de monsieur Moure                                                 LIGNEYRAC,  en 1265 le château appartient à la famille Robert, devenue \"Robert de Ligneyrac\" cardinal en 1342, évêque de Lisieux, d'Arras et Archevêque de Sens en 1378; Bertrand Robert de Ligneyrac, évêque de Montauban en 1380; Charles Robert, seigneur de Ligneyrac qui fut chargé par Henri II de la convocation du ban et de la cotisation de la noblesse du Limousin; Françoise Robert de Ligneyrac qui épousa François de Plas de Curemonte et qui fut la grand-mère de la duchesse de Fontanges, éphémère et dernière favorite de Louis XIV; François Robert de Ligneyrac, lieutenant du roi dans la haute Auvergne en 1587 , c'est lui qui enleva la reine de Navarre au château d'Agen pour la conduire à Cariât. Le 14 mars 1590 c'est encore lui qui apporta à Henri IV la soumission du duc de Mayenne. Le château fut alors partiellement détruit en représailles de ses prises de positions. Les Robert de Ligneyrac se partagèrent entre Ligneyrac et Pleaux près d'Aurillac où il firent élever un nouveau château dont ils étaient co-seigneurs. La famille s'éteignit avec Joseph Louis Robert de Ligneyrac créé duc de Caylus en 1783 et Pair de France en 1814.                            PEUCH,  du XV-XVIe siècle,  seigneurs, les de Fieux de La Bleyie, puis par alliance les Crozat. En 1721, François Dufaure, écuyer, demeurant à Turennes, s'y installe. Henri-Pierre Noël Dufaure est gouverneur pour le roi, de la ville d'Argentat; Pierre Dufaure  de la garde du Roi.  Le château est acheté en 1940 par Gabriel Marcel.","architecture":"PEUCH, constitué d'un corps de logis rectangulaire avec une tour d'escalier preque au centre de la façade principale alors que le reste du bâtiment est en calcire de Ligneyrac, la tour abrite un escalier à vis  en grés de Collonges la rouge, escalier à vis dans la tourelle du premier étage toutes les baies de la façade sont moulurées.                                                                        RUE, date des XVIe et XVIIe siècles se  dresse ses quatre fines tourelles en surplomb du village voisin de Saillac et dun horizon qui sétend jusquaux monts du Cantal. En 1801, un bâtiment lui a été adjoint vers le nord, à l'angle nord-est,  inscrit au titre des M.H., le 30 mars 1965 pour ses façades et toitures, Le logis rectangulaire est encadré par quatre échauguettes. Au nord-est, la façade nord est masquée partiellement par le bâtiment érigé en 1801, inscrit depuis 1998. \r\nROBERTS.  Adhémar Robert, cardinal du XIVe siècle, né au château des Roberts.","habitants":"Famille Robert,                                                          Famille de Gabriel Marcel\r\n        \"","divers":"Trois châteaux à Ligneyrac,  vestiges de la tour gr-1 celui de  Puch, gr-4 à 6    la Rue gr-2-3 et des Roberts  de Chauffour  gr-7","gps":"","images":["../image/image_19/19_Ligneyrac_1.jpg","../image/image_19/19_Ligneyrac_2.jpg","../image/image_19/19_Ligneyrac_3.jpg","../image/image_19/19_Ligneyrac_4.jpg","../image/image_19/19_Ligneyrac_5.jpg","../image/image_19/19_Ligneyrac_6.jpg","../image/image_19/19_Ligneyrac_7.jpg"]},"Consult_chateau_formulaire6cd1":{"id":"Consult_chateau_formulaire6cd1","dept":"19","canton":"St-Pantaléon de Larche","commune":"Lissac sur Couze","nom":"Lissac","type":"Château","periode":"XIII-XIV","histoire":"A Lissac deux châteaux : de Laporte, de Mauriolles.                                                                         LISSAC du XIIIe, XVe et XVIIIe siècles situé dans le bourg : ce château appartenait à l'origine à la famille De Lissac.   La paroisse relevant de la châtellenie de Turenne, le château fut hommagé aux vicomtes dès 1350. La paroisse de Lissac connut dans son histoire les troubles religieux du XVIe siècle et en 1576 y étaient massées les troupes du vicomte de Turenne (400 chevaux et 3000 hommes) en attendant dassiéger la ville de Brive. chambres d'hôtes par Catherine Meyjonade.                                                  LA PORTE, construit au XIIIe et XVIIIe siècle par la famille de la porte de Lissac.  La famille de Laporte est connue depuis Joubert de Laporte, moine de l'abbaye de Dalon au XIIe siècle. MAURIOLES du XIIe au XIVe siècleau Lissac passa aux Laporte de Lissac du XIVe à 1618 , au de Léonard  de 1615 à 1738,  de Lépinay   de Brusly  à partir de 1817 qui appartenait en indivision aux deux fils de Robert de Thévenard (1890-1937), Maurice et Yves, tous les deux décédés. Côté Maurice, c'est sa fille Béatrice épouse Fontana qui a gardé la moitié ; côté Yves,  je ne sais pas si les deux fils sont restés propriétaires ou pas\".","architecture":"LISSAC les XIIIe, XVe et XVIIIe siècles. La salle de garde, rien que par sa taille, le style rococo illustre bien lancrage du château dans le XVIIIe siècle avec tours de défense.                                                                LAPORTE  possède une vieille tour demi-ronde datant du Xe siècle la salle des gardes du XIIe siècle, du XV-XIXe siècles, à proximité du village, le château a gardé sa tour d'escalier du XVe siècle flanquée d'une tourelle accolée contre un corps de logis. A l'intérieur de la demeure, les belles cheminées de pierre attestent de la richesse des anciens propriétaires. A travers les siècles, les de Laporte sont écuyers, officiers, au service du Vicomte de Turenne. Au XVIIIe siècle, Joseph de Laporte achète la seigneurie de Lissac en co-propriété avec les seigneurs de Mauriolles et de Puymège qui lui cèdent bientôt leurs droits sur les terres de Lissac. Les de Laporte quittent leur castel pour aller habiter le château de Lissac. Joseph Louis de Laporte établit au XIXe siède une papeterie au moulin de Lissac ainsi qu'une filature avec tissage de laine. Claude-Louis de Laporte fut maire de Lissac de 1854 à 1870.\r\nMAURIOLLES du XVIe et XVIIe siècles   deux pavillons classés aux M.H. depuis 2004.","habitants":"famille De Lissac                                                    Famille de Lépinay    de Brusly                             Famille  de Charles de Lasteyrie                               famille de la Porte de Lissac\r\n        \"","divers":"A Lissac trois châteaux : château de Laporte gr-1-5,  de Mauriolles gr-6 .","gps":"","images":["../image/image_19/19_Lissac_1.jpg","../image/image_19/19_Lissac_2.jpg","../image/image_19/19_Lissac_3.jpg","../image/image_19/19_Lissac_4.jpg","../image/image_19/19_Lissac_5.jpg","../image/image_19/19_Lissac_6.jpg"]},"Consult_chateau_formulaire57bc-2":{"id":"Consult_chateau_formulaire57bc-2","dept":"19","canton":"Seilhac","commune":"Le-Lonzac","nom":"Lonzac_Boissy","type":"Château","periode":"XVII","histoire":"Plusieurs châteaux à Le Lonzac celui de Boissy, de Bordas, de Pommier, de Verdier et de monsieur Mounier,  mis à part Boissy pas d'information pour les autres, et à quelques kilomètres à l'ouest le château du Verdier ancienne demeure des comtes de Saint-Marsault, il ne reste qu'une tour.  Le château du Mons, dit Eburye  autrefois rendez-vous de chasse, vient d'être restauré par ses propriétaires.                     BOISSY  Gabriel Boissy, originaire du Lonzac (1879-1949), journaliste à l'Intransigeant, resté célèbre pour son idée de la flamme sur la tombe du soldat inconnu.","architecture":"BOISSY, le château de Boissy a été construit dans la première moitié du XVIIe siècle; il fut partiellement remanié en façade principale au XIXe siècle : reprise des ouvertures des premier et deuxième niveaux. Tourelle en surplomb sur angle ; lucarne quillée. Château de plan régulier composé d'un sous-sol, de deux étages carrés et un étage de comble. Le gros-oeuvre en granite et moellon. Elévation à travées surmontée d'un toit conique et croupe, couverts d'ardoise, de plan régulier composé d'un sous-sol, de deux étages carrés et un étage de comble. Le gros-oeuvre en granite et moellon  et échauguettes. Elévation à travées surmontée d'un toit conique et croupe, couverts d'ardoise, il fut partiellement remanié en façade principale au XIXe siècle : reprise des ouvertures des premier et deuxième niveaux. Tourelle en surplomb sur angle ; lucarne quillée.                                                                                        POMMIER du XVIII-XXe siècle, château construit vers 1490, selon une date accompagnant un blason peint, seul subsiste l' escalier, voûte d'ogives ; reconstruit et augmenté d' un corps de logis vers 1798, selon la date accompagnant l'autre blason peint ; travaux divers vers 1909 : dépendances reconstruites, toiture du logis et tour reprises , chapelle détruite à date inconnue.                                                                 VERDIER, le corps de logis de plan rectangulaire à deux niveaux toits en croupe, flanqué sur angle arrière gauche d'une tour ronde à toit en poivrière, une autre tour identique sur côté droit intercalé par un petit corps de logis  lui aussi accolée d'une tourelle extra-fine avec toit en poivrières  également.","habitants":"monsieur Mounier\r\n        \"","divers":"Plusieurs châteaux à le Lonzac celui de Boissy gr-de 1 à 4, de Bordas gr-5 , de pommier gr-7, de Verdier gr-6 et de monsieur Mounier gr-8. Eburye gr-9.","gps":"","images":["../image/image_19/19_Lonzac_Boissy_1.jpg","../image/image_19/19_Lonzac_Boissy_2.jpg","../image/image_19/19_Lonzac_Boissy_3.jpg","../image/image_19/19_Lonzac_Boissy_4.jpg","../image/image_19/19_Lonzac_Boissy_5.jpg","../image/image_19/19_Lonzac_Boissy_6.jpg","../image/image_19/19_Lonzac_Boissy_7.jpg","../image/image_19/19_Lonzac_Boissy_8.jpg","../image/image_19/19_Lonzac_Boissy_9.jpg"]},"Consult_chateau_formulairefb32":{"id":"Consult_chateau_formulairefb32","dept":"19","canton":"Objat","commune":"Louignac","nom":"Louignac","type":"Château","periode":"XIV-XV","histoire":"LOMS, le premier seigneur connu est Hélie de Villac au XIVe siècle. Cette famille s'est alliée en 1400 avec la famille de Royère venue du Haut Limousin. Celle-ci est partagée entre le château de Peyreaux à Lardin et celui de Loms. On y rencontre d'illustres personnages : l'un d'eux, en 1379, est gentilhomme d'honneur du Pape Grégoire XI; un autre, écuyer de Louis XI. En 1799, le marquis Jean de Royère est écuyer du roi de Prusse, devient directeur de l'école et du haras de Strasbourg.  ses nouveaux propriétaires, M. et Mme Rousseau.                                                                           Le château de SAFRAN de la Source blanche voisin de Loms, notre Ami Serge Marcilly en est le propriétaire, qui a un rapport avec la culture du safran ?.","architecture":"Le château de Loms  était devenu invisible depuis des années tant les ronces en masquaient la vue mais de nouveau on l'aperçoit de la route du Temple-d'Ayen. Grâce à ses nouveaux propriétaires, M. et Mme Rousseau, il est possible de distinguer le plan de ce qui fut un château-fort de plaine tracé sur un quadrilatère flanqué aux angles de grosses tours circulaires, entouré d'un fossé. Le logis actuel a été construit au XVe siècle, sur les structures du XIVe siècle et a conservé une tour d'escalier flanquée d'une échauguette et des cheminées blasonnées aux armes des Royère..","habitants":"le marquis Jean de Royère\r\n        \"","divers":"Château de Loms  à Louignac, safran gr 1-2","gps":"","images":["../image/image_19/19_Louignac_1.jpg","../image/image_19/19_Louignac_2.jpg","../image/image_19/19_Louignac_3.jpg","../image/image_19/19_Louignac_4.jpg","../image/image_19/19_Louignac_5.jpg"]},"Consult_chateau_formulaire54fd":{"id":"Consult_chateau_formulaire54fd","dept":"19","canton":"Uzerche","commune":"Lubersac","nom":"Lubersac","type":"Château","periode":"XV-XVII","histoire":"Au nord de Lubersac à Montgibaud le château de la Joubertie pas d'information historique( voir article).   La Fragne du XVIII-XXe siècle, et de Verdier .           LUBERSAC dit\"du Verdier \" se situe à la sortie de Lubersac, sur la route de Pompadour. Ce château fut le premier construit sur la motte du Verdier au XVe siècle. Il demeura dans la famille de Lubersac jusqu'en 1725, date à laquelle la dernière héritière, Madame de Chasseneuil, va vendre le domaine à Martial de la Combe, qui le cédera à son tour, 30 ans plus tard à la famille de Lubersac de Savignac. Avec l'extinction de cette branche, le domaine est légué en 1830, à Ernest de Chabrignac. C'est lui qui, en 1840, va entreprendre une importante restauration                                       FRAGNE, la famille bourgeoise de La Fragne a fait construire cette demeure au XVIIe siècle, L'édifice appartenait au milieu du XXe siècle à M. Reynaud. Le château de La Fragne a été restauré très récemment pour des chambres d'hôtes.","architecture":"LUBERSAC-VERDIER   du XV-XIXe siècle, Ernest de Chabrignac en 1840, va entreprendre une importante restauration, lui donnant l'apparence élégante qu'on lui connaît aujourd'hui. La restauration est l'uvre de l'architecte Mugnier, dont le fils n'est autre que le fameux abbé Arthur Mugnier. De nos jours, il ne reste du château féodal que le groupe des tours  rondes au sud et la tour carrée au nord. Sur l'entrée des deux tours rondes (au nord et au sud) on peut voir le blason des Lubersac (un loup passant). En contrebas du château du Verdier coule la fontaine Saint-Yrieix, connue comme « bonne fontaine » depuis le XIVe siècle. Le parc du château ainsi que 3 salles sont ouverts aux visites du public.                                  FRAGNE demeure au XVIIe siècle, est composé d'un corps de logis épaulé d'une tour circulaire et d'une tour carrée. Quelques éléments sculptés. L'édifice appartenait au milieu du XXe siècle à M. Reynaud.","habitants":"Famille de Lubersac de Savignac.                      Famille de M. Reynaud\r\n        \r\n        \"","divers":"le château de la Joubertie La Fragne du XVIII-XXe siècle gr-5-6-7, de Prédévaux  gr-8 et de Verdier gr-1 à 4 .                     Lubersac GPS : 45° 26' 34\" Nord, 1° 24' 14\" Est","gps":"45° 26' 34\" Nord, 1° 24' 14\" Est","images":["../image/image_19/19_Lubersac_1.jpg","../image/image_19/19_Lubersac_2.jpg","../image/image_19/19_Lubersac_3.jpg","../image/image_19/19_Lubersac_4.jpg","../image/image_19/19_Lubersac_5.jpg","../image/image_19/19_Lubersac_6.jpg","../image/image_19/19_Lubersac_7.jpg","../image/image_19/19_Lubersac_8.jpg"]},"Consult_chateau_formulaire6f55":{"id":"Consult_chateau_formulaire6f55","dept":"19","canton":"Malemort sur Corrèze","commune":"Malemort sur Corrèze","nom":"Malemort_Corrèze","type":"Château","periode":"XII-XV-XVII","histoire":"A Malemort en Corrèze le château de Malemort, de Bréniges, de Puymaret et le château de Jayle du XII-XIXe siècles.                                                       MALEMORT, en 1180, le château de Malemort est pris par les Brabançons commandés par Mercadier, seigneurs de Malemort  Jaubert de Malemort fut seigneur de Cornil. Eymery de Palisse fut seigneur de Malemort de 1340 à 1398.     \r\nBRENIGES, la construction dune usine destinée à la production de tissus de gaze et de mouchoirs de soie après 1760, marquent le début dun certain renouveau économique.                                                         PUYMARET,  les Romains séjournent, puis les barons de Malemort plantent une tour de surveillance. Au XVe siècle, les seigneurs les Chapoulie de Bar, sy installent. Au XVIIe siècle, la famille Sahuguet clAmarzit, y réside après le mariage de Jacques avec Mlle Marie Dumas de Neuville. Propriété de Jacques Gilbert, président au tribunal de Brive, baron dEspagnac, gouverneur des Invalides,  puis Couderc, avocat et Jean II, marquis de Corn. Le château occupe une position stratégique sur un éperon au débouché de la Corrèze, sur la plaine de Brive la Gaillarde.","architecture":"MALEMORT du XIIe siècle  les vestiges de l'ancien castrum de Malemort, nommé domaine de Montemart, sont inscrits au titre des M.H le 13 août 2012.\r\nBRENIGES, du XIIIe siècle, les deux tours subsistantes du château de Breniges sont inscrites au titre des M.H. le 16 août 1956.\r\nPUYMARET, du XIIIe siècle  de style troubadour est inscrit au titre des M.H. le 4 mai 2000,  occupe une position stratégique sur un éperon  sur la plaine de Brive la Gaillarde. Il subsiste tout un ensemble de bâtiments du XIIIe siècle (tour carrée de l'oratoire, bâtiment central renfermant la citerne, après un incendie en 1793, le château est relevé au XIXe siècle avec intégration des bâtiments subsistants. Un grand corps de bâtiment est construit dans le style troubadour. Réfection des ailes Sud et Est après un incendie en 1984.  il est reconstruit au XIXe siècle. Il est inscrit au titre des M.H. depuis le 4 mai 2000.","habitants":"Eymery de Palisse                                                           Famille Sahuguet clAmarzit\r\n        \"","divers":"A Malemort en Corrèze  vestiges de Montmart gr-1, Malemort gr 3-4, de Bréniges gr-2, de Puymaret gr 5-6 et de Jayle, de Sérignac.","gps":"","images":["../image/image_19/19_Malemort_corr%c3%a8ze_1.jpg","../image/image_19/19_Malemort_corr%c3%a8ze_2.jpg","../image/image_19/19_Malemort_corr%c3%a8ze_3.jpg","../image/image_19/19_Malemort_corr%c3%a8ze_4.jpg","../image/image_19/19_Malemort_corr%c3%a8ze_5.jpg","../image/image_19/19_Malemort_corr%c3%a8ze_6.jpg"]},"Consult_chateau_formulaire36de":{"id":"Consult_chateau_formulaire36de","dept":"19","canton":"Egletons","commune":"Marcillac la Croisille","nom":"Marcillac_Corrèze","type":"Château","periode":"XIV","histoire":"MARCILLAC, les curés rendent hommage à Ventadour. Des chevaliers de Marcillac existent depuis longtemps mais ils sont remplacés par des Rageaud dès le XIIIe siècle, Faucher au XIVe siècle, de Lestranges de Lapleau seigneurs de St-Yrieix également comme le précédent, au XVe siècle, les Sédières avec Pierre, chevalier de l'ordre du Roi, en 1581, toujours en hommage à Ventadour. Un de ses héritiers vend les pierres du château du bourg en 1704 car il est en ruine et \"éboulé\". Les Soudeilles puis les Lentilhac continuent puis les Monié de Basdeville, les Ribardière de Monestier, les Lamore de Lamirande qui l'achètent avec titre, château et terres . Il y aura eu 6 familles différentes en 1 seul siècle. Aux Bouyeure en 1850. En 1154 sont évoqués les chevaliers de Marcillac.","architecture":"Le \"château Bouyeure\" du XVIIIe siècle est une bâtisse de Marcillac la Croisille dont aucun dépliant touristique ne parle. On ne trouve rien sur la construction et l'origine de ce magnifique domaine, de plan rectangulaire à deux niveaux et lucarnes sur comble à toit brisé se terminant au sommet plein cintre d'une tour carrée avec  clocheton imposant.","habitants":"Famille des Rageaud\r\n        \"","divers":"Château de Marcillac","gps":"","images":["../image/image_19/19_Marcillac_Corr%c3%a8ze_1.jpg","../image/image_19/19_Marcillac_Corr%c3%a8ze_2.jpg","../image/image_19/19_Marcillac_Corr%c3%a8ze_3.jpg","../image/image_19/19_Marcillac_Corr%c3%a8ze_4.jpg"]},"Consult_chateau_formulaire1505":{"id":"Consult_chateau_formulaire1505","dept":"19","canton":"Uzerche","commune":"Masseret","nom":"Masseret","type":"Château","periode":"XV-XVI","histoire":"MASSERET, comme les châtellenies de Chervix , la châtellenie relevait de la vicomté de Limoges son destin fut lié à la famille des vicomtes de Limoges et avec le mariage de Marie de Limoges dernière vicomtesse avec Arthur II de Bretagne passa dans la maison de Bretagne, puis de Penthièvre, d'Albret et de Bourbon. Alain d'Albret (1440-1522) épousa en 1470 Françoise de Bretagne de la Maison de Blois. Un procès l'opposa à sa belle-sur , mademoiselle de Montrésor. Alain d'Albret fit un recensement complet de ses possessions de la vicomté de Limoges. Dans la réponse que lui font les officiciers de la châtellenie de Masseret, on peut lire ; La Tour « Quant aux bâtiments de la place, est vray, que au temps du décés de feu Guillaume de Bretagne ( sans doute Guillaume de Chatillon Blois père de Françoise de Blois-Bretagne -(1345-1404) avait en ladite place une tour carrée, de pierre neuve, de pauvre éddifice, vieille et ancienne etc. Au pied de la tour, y avait une salle avec que deux petites chambres.\r\nRABAUD,   du XVIe siècle avec tour d'escalier..","architecture":"MASSERET, la Tour était donc en partie ruinée dès le XVe siècle. Alain d'Albret ne la reconstruisit pas. La tour d'orientation. Bien que d'aspect moyenâgeux, a été bâtie en 1954 et sert de château d'eau. Elle se trouve à l'emplacement de l'ancien château féodal qui, au sommet de la colline permettait de surveiller les passages entre Limoges et Brive. Avant la construction de la tour, un majestueux hêtre, planté aux alentours de 1792 rappelait symboliquement l'ancien château. Il fut foudroyé le 4 février 1946.                                 RABAUD, construit au début du XVIe siècle, ce château possède une tour centrée sur sa façade,  illustre un type d'architecture caractéristique de la région, avec une distribution intérieure lisible de l'extérieur. D'après son décor architectural, il peut être daté du début du XVIe siècle. L'édifice présente un plan rectangulaire avec une tour d'escalier centrale circulaire en hors-oeuvre et, sur l'autre façade, deux tourelles en échauguette découronnées. Un bâtiment abrite les dépendances et le four. Les alvéoles de la fuie sont creusées dans le mur-pignon d'un bâtiment de dépendances. Là ont vécu les seigneurs de Lur dès le XIe siècle (leurs armes sont marquées sous les voûtes de l'église).\r\nÉléments protégés MH : les façades et les toitures du château : inscription par arrêté du 7 novembre 1990.","habitants":"Famille d'Alain d'Albret \r\n        \"","divers":"Chateau de Masseret et de Rabaud","gps":"","images":["../image/image_19/19_Masseret_1.jpg","../image/image_19/19_Masseret_2.jpg","../image/image_19/19_Masseret_3.jpg","../image/image_19/19_Masseret_4.jpg","../image/image_19/19_Masseret_5.jpg"]},"Consult_chateau_formulairee91a":{"id":"Consult_chateau_formulairee91a","dept":"19","canton":"Seilhac","commune":"Saint-Hilaire les Courbes","nom":"Mazoreix","type":"Château","periode":"XIX-XX","histoire":"MAZOREIX, la seigneurie du village dépendait des seigneurs de Treignac qui furent Comborn, Pompadour et Boisse. Une famille de nobles magistrats de Treignac, les Grandchamp de Cueille ont transporté à Saint-Hilaire-les-Courbes les pierres de leur hôtel particulier de Treignac. Après la Révolution, de retour d'émigration, l'un d'eux a été proviseur du collège de Treignac et un autre a pris en charge les intérêts du marquis de Boisse, seigneur de La Farge et de Treignac. Ils avaient eu de belles alliances avec les de Fenis, de Gourdon, de Meilhards. La propriété appartient à M. Grandcbamp des Raux.","architecture":"MAZOREIX,  château du XIX-XXe siècles avec remplois d'éléments d'architecture d'époque antérieure du XVIIe siècle   possède des lucarnes à boules, semblables à celles du château de Tarnac et de Bity, de plan en équerre à trois niveaux avec tour carrée et porche d'entrée sur l'autre face, La demeure possède un très beau parc boisé. Au milieu du XXe siècle.","habitants":"Famille de M. Grandcbamp des Raux\r\n        \"","divers":"Château de Mazoreix à Saint-Hilaire les Courbes","gps":"","images":["../image/image_19/19_Mazoreix_1.jpg","../image/image_19/19_Mazoreix_2.jpg"]},"Consult_chateau_formulairef4d6":{"id":"Consult_chateau_formulairef4d6","dept":"19","canton":"Uzerche","commune":"Meilhards","nom":"Meilhards","type":"Château","periode":"XVI-XIX","histoire":"MEILHARDS, château du XVI-XIX siècles, Philippe de Meillards, né en 1590, devient un fameux militaire, maréchal de camp et conseiller d'Etat; sa terre est érigée en marquisat. Après sa mort, sa veuve éplorée fait construire dans l'église de Meilhards un mausolée de pierre sculptée aux armes des époux Meillards et Salagnac: les deux écussons sont entourés d'un cordon en forme de chaîne au bas duquel pend une croix ancrée. Au XVIe siècle, le château appartient à M. Ardant de La Grenerie, connu pour sa générosité: il nourrit les indigents de Limoges lors de la peste. En 1775, Mlle de Meillards épouse M. Barbou des Places, d'une famille anoblie en 1600, ayant fait partie des premiers imprimeurs français à Lyon.\r\n Actuellement la propriété appartient à un descendant de M. Barbou des Places.                                             Manoir de LACHAUD   de Marie-Astrid  du XV-XVIe siècle entièrement rénové il y a 3 ans.","architecture":"Meilhards, le château primitif a été incendié en 1781. Il reste les communs et des salles voûtées. Une demeure a été reconstruite sur les lieux au XIXe siècle, qui conserve et abrite les reliques de l'ancienne demeure; un portrait de Philippe de Meillards et celui de Ardant de La Grenerie.                                        Lachaud manoir du XV-XVIe siècle flanqué de belles tourelles.","habitants":"Famille de Meilhards et de M. Ardant de La Grenerie,\r\n        \"","divers":"Château de Lachauds et de Meilhads gr- 1-2","gps":"","images":["../image/image_19/19_Meilhards_1.jpg","../image/image_19/19_Meilhards_2.jpg","../image/image_19/19_Meilhards_3.jpg","../image/image_19/19_Meilhards_4.jpg"]},"Consult_chateau_formulaire3435":{"id":"Consult_chateau_formulaire3435","dept":"19","canton":"Meymac","commune":"Meymac","nom":"Meymac","type":"Château","periode":"XVII-XIX","histoire":"Trois châteaux à Meymac celui de Meymac, de Jassonneix  de Sarazin et celui des moines de Laroze.   A dix KM au sud ouest à  Davignac  deux châteaux celui  de Lamazière, et de Laroze.               DAVIGNAC Le château actuel du XVe siècle, propriété privée. Il fut résidence d'été des Ventadour au début du XIVe siècle.                                                               \r\nJASSONNEIX du XVII-XXe siècles pas d'information historique.                                                                        Le château des moines LAROSE, en 1878, Jean Gaye-Bordas, négociant en vin, acheta le terrain contigu à l'abbaye et y fit construire une maison à tourelles de style néo-médiéval.\r\nMEYMAC,  En 1265, Eble VII de Ventadour octroie aux habitants une charte de franchises. Meymac devient une ville protégée par des remparts. En 1379, la cité est pillée par Geoffroy Tête Noire et sa bande de routiers. En 1633, la peste décime la population, la ville ne retrouvera plus jamais son prestige passé.","architecture":"MEYMAC, rue Saint-Pierre, vieille maison à pans de bois et « turgotière », nom donné aux lieux de la région auxquels s'intéressa Turgot, lorsqu'il fut intendant à la généralité de Limoges. Rue de Lachenal. Ancien canal avec moulins, maison à tour du XVIIe siècle. L'hôtel de ville. Situé sur l'emplacement de l'ancien château où, en l'an 1795, cinq personnes furent guillotinées, il a été reconstruit en 1932 après l'incendie du précédent bâtiment. Le beffroi. Tour de guet de l'ancienne fortification du XVe siècle. Meymac, il en est un qui laissa un souvenir particulièrement fort dans lesprit de ses habitants. Il sagit de Jean-Gaye Bordas dit « barlet » qui fit construire le château des Moine-Larose, 1ère construction à tourelles de la ville Audy dit le château est une maison construite en 1900 avec une tour crénelée et toit en poivrière.                          DAVIGNAC  est le résultat de plusieurs remaniements d'une construction du XVe siècle effectués au XVIIIe siècle et au XIXe siècle.  Au Moyen Âge, Davignac constituait un bourg important dont le château constituait un chef lieu de châtellenie.  Aujourd'hui une  SCI du château de Davignac, société civile immobilière est en activité depuis 25 ans. elle est spécialisée dans le secteur d'activité de la location de terrains et d'autres biens immobiliers. Flanqué de deux tours.","habitants":"Famille de  Jean Gaye-Bordas\r\n        \"","divers":"Meymac châteaux à Meymac celui de Meymac, de la neige daudy gr-1 du Cloup gr-2 de Jassonneix-gr-5 et celui des moines de Laroze gr-3.   A dix KM au sud ouest à  Davignac  gr_4 deux châteaux celui  de Lamazière gr-6.  Sarrazin gr-7","gps":"","images":["../image/image_19/19_Meymac_1.jpg","../image/image_19/19_Meymac_2.jpg","../image/image_19/19_Meymac_3.jpg","../image/image_19/19_Meymac_4.jpg","../image/image_19/19_Meymac_5.jpg","../image/image_19/19_Meymac_6.jpg","../image/image_19/19_Meymac_7.jpg"]},"Consult_chateau_formulaire5548":{"id":"Consult_chateau_formulaire5548","dept":"19","canton":"Beynat","commune":"Meyssac","nom":"Meyssac","type":"Château","periode":"XIII-XV-XVI","histoire":"plusieurs châteaux à Meyssac dont celui de Meyssac,  de Breuil de Pierre-Taillade, Marsac le manoir de Brunie  et à deux KM au nord à Lagleygeolle le château de Theil.\r\nMEYSSAC,   jusquen 1738, le castrum de Meyssac appartenait à la vicomté de Turenne. La famille de Touchebuf en fut longtemps les seigneur                  MARSAC,  gîtes d'hôtes 5 Epis  Clarisse et Mehdi, tombés amoureux du château en 2010, qui se sont lancés dans une aventure florissante. l'établissement mêle art de la Renaissance et design contemporain.                                                     PIERRETAILLADE, la famille de Termes avec l'écartelure par alliance des Estresses, au XVIIe siècle,  avait succédé à celle des Beaumont de Pierretaillade qui possédait ce lieu dès le XIVe siècle.\r\nBRUNIE, manoir du XVIIIe siècle chambres d'hôtes Saint-Bazile de Meyssac.                                    THEIL,  du XVIe siècle, après avoir admiré l'architecture des pierres rouges établie sur les modèles des castels de Collonges la Rouge, le premier seigneur connu est Raymond d'Orlhac en 1410, seigneur de La Meschaussée et du Pescher, époux de Marguerite de Noailles, dame de La Meschaussée. En 1515, le château appartient à Etienne de Solier, juge de Meyssac. Le Theil est acquis au XVIIe siècle par de Fenis lieutenant général au siège royal de Tulle. La propriété passe, au XVIIIe siècle, à Gédéon Andrieu, procureur de la vicomté de Turenne.","architecture":"MEYSSAC, des fortifications ainsi quun fossé furent construits afin de protéger les habitants des pillards. Trois portes en permettaient laccès : à lest, la porte de Voussée  ; au sud, la porte Grande ; et enfin la porte de lAuvitrie, située au nord. Au XVIIIe siècle, les ruines de ces murailles, devenues inutiles et gênantes, furent détruites                                                             MARSAC du XIII-XVIIe siècles : restes du mur d'enceinte et de l'ancien donjon ; logis Renaissance.                                                      PIERRETAILLADE du XIII-XVe siècles : tour, vestiges de chapelle, corps de logis. est une lourde bâtisse du XVe siècle, bâtie à flanc de coteau,flanquée d'une tour carrée unique survivante des trois d'origine. deux ailes en retour d'équerre. La façade a été reconstruite en supprimant une aile.   Le château a subi d'importantes modifications architecturales, les restaurations ont conduit à démolir d'importants vestiges. En revanche,  l'environnement paysager a conservé son parcellaire ancien, encore préservé de constructions dans son axe sud, avec les murs et les alignements d'arbres qui structurent le site. Le château est en bon état et les abords bien entretenus.","habitants":"Meyssac,famille de ure":"MIRACLES est une modeste résidence campagnarde reconstruite au XVIe siècle sur des fondations médiévales du XIIIe siècle. Une grande partie des percements a été modifiée au XVIIIe siècle. L'élément le plus intéressant est l'échauguette ronde à l'angle sud-est, reposant sur un culot à cinq ressauts moulurés. La façade nord a conservé la base moulurée de la souche de son ancienne tourelle d'angle. Elle a reçu les mêmes moulurations que la souche de l'autre tourelle, mais disposées différemment.                                                                  Vestiges Beaufort  \"Juillac avait donc deux seigneuries de la Salle et Beaufort ayant chacune son domaine et son château respectif. Celui de Beaufort, dont les ruines appropriées servent à loger la gendarmerie s'appellait Beaufort-lez-Juillac. C'était une forteresse imposante défendue par des tours qui se dressaient aux quatre angles des bâtiments formant un vaste quadrilatère. Elle commandait la contrée vers le sud-ouest. Détruit pendant la guerre de cent-ans, il fut restauré par un cardinal de Beaufort dont les armes et le chapeau cardinalice se voyaient encore, il y a quelques années.","habitants":"Famille de Julhac\r\n        \"","divers":"Château de Miracles à Juillac","gps":"","images":["../image/image_19/19_Miracles_1.jpg","../image/image_19/19_Miracles_2.jpg","../image/image_19/19_Miracles_3.jpg"]},"Consult_chateau_formulaire18de":{"id":"Consult_chateau_formulaire18de","dept":"19","canton":"Argentat","commune":"Viam","nom":"Monceaux_Viam","type":"Vestiges","periode":"XIII-XVI","histoire":"MONCEAUX,  il désignait ici un site fortifié de hauteur. L'étroite vallée où se trouve le bourg est en effet dominée par le Puy-du-Tour où ont été mis au jour d'importants vestiges d'une enceinte du second âge du fer, qui contrôlait le franchissement de la Dordogne par un très ancien itinéraire de long parcours entre Armorique et Méditerranée. Les fouilles entreprises sur le site du Puy-du-Tour ont révélé que ces structures proto-historiques appartenaient à un oppidum pourvu d'une fortification de type murus gallicus et dont l'occupation s'est échelonnée de la période du Néolithique jusqu'à la fin du Ier siècle av. J.-C.  Le premier élément du toponyme est obscur. Au cours du Moyen-Âge, le nom, dont le sens n'était plus compris, a subi l'attraction de l'occitan moncel, Monceu  passa en 1442 des seigneurs de Murat à la famille Comte qui fit construire le château en 1582 date sur linteau de porte et le posséda jusqu'en 1897. \r\nVIAM, près du village de Monceaux, les vestiges dun château occupent un promontoire dominant la Vézère. En 1514, un Laurent de Monceaux était curé de Viam. Au milieu du XIVe siècle, le château de Monceaux, propriété du seigneur de Murat de Tarnac, est vendu à la famille Comte, bourgeois de Treignac, anoblis par la suite. À la fin du XVIIe siècle, Les armoiries de Pierre Comte, sieur du Monceaux de Viam, se blasonnent ainsi : d'argent à un arbre de sinople.","architecture":"VIAM Vestiges du château de Viam, il y eut une chapelle domestique attestée au XVIIIe siècle (ruinée). les deux tours carrées flanquant la façade nord, se sont effondrées. Un blason au dessus de la porte d'entrée représentait sans doute les armes de la famille Comte : d'argent, à un arbre de sinople, posé sur une terrasse du même  et chargé d'une colombe d'argent. Epoque : 4e quart du XVIe siècle\r\nAnnée de construction : 1582.","habitants":"famille Comte\r\n        \"","divers":"Vestiges et château  à Viam","gps":"","images":["../image/image_19/19_Monceaux_Viam_1.jpg","../image/image_19/19_Monceaux_Viam_2.jpg","../image/image_19/19_Monceaux_Viam_3.jpg","../image/image_19/19_Monceaux_Viam_4.jpg","../image/image_19/19_Monceaux_Viam_5.jpg","../image/image_19/19_Monceaux_Viam_6.jpg"]},"Consult_chateau_formulaire0a6c":{"id":"Consult_chateau_formulaire0a6c","dept":"19","canton":"Egletons","commune":"Montaignac-Saint-Hippolyte","nom":"Montaignac","type":"Forteresse","periode":"XVI","histo
