La cité est traversée par la Vézère et ses deux affluents la Loyre et le ruisseau de La Besse serpentant dans des gorges granitiques. Que ce soit pour restaurer ou pour forger, Pascal Lavaud ne cache pas son amour du métal. Il en a fait sa passion pour les lames son métier, qui lui permet aujourdhui dexposer environ 600 objets, nés de sa forge et de sa patience. On retrouve l'une des tours   du XIIe siècle qui a survécu,  tour donjon dernier vestige d'une  enceinte fortifiée du château ayant appartenu au seigneur Archambaud de Comborn.","architecture":"ALLASSAC  dit manoir des tours , inscrit au titre des M.H., a été construit au XVIe siècle et remanié au XVIIIe avec le rehaussement des plafonds et le percement de nombreuses fenêtres coté jardin. Il se dresse dans lancien faubourg de la Font Saint-Martin qui sest développé le long de lancienne route dAllassac à Donzenac. Sa construction a nécessité le déplacement du ruisseau de la Grande-Fontaine ainsi quun important drainage du terrain.\r\nLédifice, doté de deux tours, comportait à lorigine deux corps de logis. Laile nord qui donnait sur la rue a été démolie pour des raisons de sécurité.\r\nSauvé de la ruine par la commune dAllassac qui en a fait lacquisition dans les années 1990, le « Manoir des Tours » abrite aujourdhui le siège du pays dart et dhistoire \"Vézère Ardoise\" ainsi quune des dernières taillanderies de France. C'est une tour de guet et de défense ronde sur un socle carré présentant deux salles, ouvertures en meurtrières, petites échauguettes sur la face nord-ouest, avec des corbeaux au sommet indiquant la présence de mâchicoulis disparus.\"  La tour a une hauteur de 30 mètres. Classée M.H le 22 août 1949.","habitants":"Seigneur Archambaud de Comborn\r\n        \"","divers":"Manoir   grav 1 et 2 et tour de guet grav 3","gps":"","images":["../image/image_19/19_Allassac_1.jpg","../image/image_19/19_Allassac_2.jpg","../image/image_19/19_Allassac_3.jpg"]},"Consult_chateau_formulairecca8":{"id":"Consult_chateau_formulairecca8","dept":"19","canton":"Meymac","commune":"Ambrugeat","nom":"Ambrugeat","type":"Manoir-Tour","periode":"XV-XVII","histoire":"AMBRUGEAT, château dit de Combressol, en 1436  Pierre de Coux est curé prieur d'Ambrugeat, en 1453  le roi Charles VII fait renforcer le château, en 1502  Huges de Beynette fonde une vicairerie à l'autel de la Vierge et une communauté de quinze prêtres est installée à Beynat d'Ambrugeat, en 1554  François Granier est prieur, en 1592 : le roi Henri IV reçoit le soutien du seigneur d'Ambrugeat, en 1598  des recherches sont effectuées sur les titres de noblesse d'Ambrugeat, en 1599  Murat Antoine est curé d'Ambrugeat, en 1647 , Gilbert du Boucheron vend les cens rentes justices haute et basse et moyenne du village de Besse d'Ambrugeat.","architecture":"AMBURGEAT   Château-fort détruit, attesté dès le XIIe siècle. En 1444, Jacques de Valon obtient de Charles VII la permission de fortifier le château dAmbrugeat, avec tourelles d'angle. La famille de Valon porte le nom de Boucheron dAmbrugeat. \r\n Lun deux fut un fidèle compagnon du roi Henri IV qui disait de lui: \"dAmbrugeat mest venu joindre avec tous les siens, châteaux en croupe, si il eut pu\". Le chevalier François Darche fut seigneur dAmbrugeat. Le château fut reconstruit dès le XVIe siècle ; remanié au début du XVIIe siècle dans ses parties hautes; restauré avec adjonction d'ouvertures au XIXe siècle; et reconstruction d'étable au XIXe siècle. L'ensemble était constitué d'un logement, d'une grange, et de parties fortifiées.  Etages , un sous-sol; deux étages carrés; un étage de comble. en granite; pierre de taille; moellon,  couverture en  croupe, toit à longs pans coiffés d'ardoise et de tuile mécanique, il s'agit en réalité d'une ferme fortifiée en 1448 par Charles VII.","habitants":"Gilbert du  Boucheron dAmbrugeat\r\n        \"","divers":"Château d'Ambrugeat","gps":"","images":["../image/image_19/19_Ambrugeat_1.jpg","../image/image_19/19_Ambrugeat_2.jpg"]},"Consult_chateau_formulaire0f22":{"id":"Consult_chateau_formulaire0f22","dept":"19","canton":"Bort les orgues","commune":"Sainte-Marie Lapanouze","nom":"Anglars_Ste_Marie","type":"Château","periode":"XIV","histoire":"ANGLARS, ce château rappelle limportance stratégique de cette seigneurie au bord de la Dordogne et proche dUssel. Le premier seigneur connu est Hugues Ier d'Anglars au XIVe siècle. Galienne d'Anglars épouse Georges d'Ussel. Les deux familles se partagent la baronnie d'Anglars et la seigneurie d'Ussel. Une identité de famille porte la seigneurie au XVIe siècle à Henri de la Croix de Castries, décédé jeune, en laissant à son fils aîné le soin de continuer la branche des de Castries. Son fils cadet hérite du titre de baron d'Anglars, coseigneur d'Ussel. Ces titres sont portés par sa descendance jusqu'à la Révolution. Un marquis de Castries est secrétaire d'Etat à la Marine et un autre est maire de la Roche Peyroux. En 1900, achat du château par M. l'Ebraly. Aujourdhui, le comité d'entreprise de la RATP possède à proximité une colonie de vacances.","architecture":"ANGLARS, surplombe la Dordogne et se trouve visible de loin. Il comporte un donjon carré et une tour circulaire.   le château est construit sur une falaise qui domine les gorges de l'Artaude. La tour carrée, avec unre porte en tiers-point, blasonnée, a du être édifiée au XIVe siècle. On l'a ouverte de fenêtres moulurées à l'époque de la Renaissance. Le corps de logis a conservé les mâchicoulis qui devaient supporter le chemin de ronde.","habitants":"Henri de la Croix de Castries\r\n        \"","divers":"le château d'Anglars à Sainte-Marie-Lapanouze","gps":"","images":["../image/image_19/19_Anglars_Ste_Marie_1.jpg"]},"Consult_chateau_formulaire70ed":{"id":"Consult_chateau_formulaire70ed","dept":"19","canton":"Argentat","commune":"Argentat","nom":"Argentat","type":"Château","periode":"XVI-XVIII","histoire":"Plusieurs châteaux à Argentat celui du Bac, de Gibanel  la maison de Filhol et le manoir de l'Eyrial, de Raz, et à 10 km au sud le  château de la Chapelle St-Gèraud.                                                                            ARGENTAT, se trouve  la maison natale du général Delmas.                                                                           BAC, pas d'information historique                                                                              GIBANEL,  cité dès le XIe siècle, château du XIII-XVIIe siècle transformé en camping 4 étoiles. Argentat est une seigneurie représentée par Ebrard de Saint-Martial et les Laroche qui se dernier vendit ses droits à Pierre de Saint-Martial en 1327, ce dernier fut nommé en 1432 maréchal de la cour pontificale d'Avignon, devient le neveu du pontife en épousant en 1343 Dauphine Roger de Beaufort, le frère de Pierre Guy sera  en 1405 seigneur de Gibanel, succédait en 1431 par les Maumont en 1450 Marguerite de Maumont épouse François de Combarel, toujours dans cette famille. Transformé en hôtel et gîtes.\r\nFILIIOL, la maison Filliol du XVIe siècle, ancien relais de poste\r\nEYRIAL, manoir de 1457 remanié par le baron de Pestels .avec tour carrées et sur la partie supérieure en colombages   toit quatre pans.                                                                                                        RAZ, spécialisée dans le secteur d'activité de la location de terrains et d'autres biens immobiliers par Franck Nyman. de plan rectangulaire à deux niveaux avec lucarnes sur combles  et tour rondes en façades toits en poivrières.                                 CHAPELLE de St-GERAUD, château du XIIIe-XVe siècles avec deux tours circulaires.","architecture":"BAC, du  XVI-XVIIe siècle est composé d'un corps de logis principal allongé, au nord, où ressort deux constructions dont l'une à tourelle et prolongé à l'ouest par un petit bâtiment au toit à clocheton partie supérieure de l'angle Nord-Est est posée, en encorbellement, une tourelle carrée. Dans l'angle formé à l'ouest par ce corps de logis ainsi que le corps principal, fait saillie une tourelle circulaire. A droite de cette tour un second logis fait saillie sur le même côté nord du corps de logis principal, et prolongeant à l'Ouest le grand corps de logis, se trouve une construction de même largeur mais de plan carré.  Deux tourelles s'ajoutent aux quatre parties de cette construction. Un corps de logis carré dont la façade est dans le prolongement de la façade orientale du corps de logis principal. Une bretèche posée sur deux corbeaux à trois quarts-de-rond superposés fait saillie au côté Ouest.  \r\nGIBANEL  le domaine est dominé par un superbe château dont les fondations remontent au XIIIe siècle. Transformé au cours du XVIIe siècle, il se compose dun corps de logis flanqué de deux hautes tours médiévales  carrées, toitures en Pavillon, encadrant le corps de logis reconstuit au XVIIe siècle. Rénové, la forteresse accueille aujourdhui le bar du camping. A l'arrière une tour carrée d'escalier hors oeuvre\r\nLa CHAPELLE st-Géraud de plan rectangulaire à deux niveaux avec aux extrémités deux tours circulaires toitures de l'ensemble en tuiles.","habitants":"Gibanel; Famille de Maumont                                         Eyrial; baron de Pestels\r\n        \"","divers":"Plusieurs châteaux à Argentat celui du Bac grav 1 à 4, de Gibanel grav 7, la maison  de Filhol et le manoir de l'Eyrial grav 9grav 8, de Raz  et le château de la Chapelle de Saint-Gèraud grav 5 et 6 . Bac  GPS : 45° 05' 39\" Nord, 1° 56' 19","gps":"45° 05' 39\" Nord, 1° 56' 19","images":["../image/image_19/19_Argentat_1.jpg","../image/image_19/19_Argentat_2.jpg","../image/image_19/19_Argentat_3.jpg","../image/image_19/19_Argentat_4.jpg","../image/image_19/19_Argentat_5.jpg","../image/image_19/19_Argentat_6.jpg","../image/image_19/19_Argentat_7.jpg","../image/image_19/19_Argentat_8.jpg","../image/image_19/19_Argentat_9.jpg"]},"Consult_chateau_formulaire3d0c":{"id":"Consult_chateau_formulaire3d0c","dept":"19","canton":"Yssandon","commune":"Ayen","nom":"Ayen","type":"Château","periode":"XVI","histoire":"Deux châteaux à Ayen celui de Chabroulie et de Razat de monsieur Christopher Hipkins, affaire personnelle exploitant agricole est en activité depuis 14 ans.                                                                                AYEN,  en 1137, Ayen, comme toute l'Aquitaine, est réuni au royaume de France par le mariage d'Aliénor et de Louis VII, mais après le divorce d'Aliénor, elle passe sous domination anglaise.\r\nCHABROULIE, la seigneurie appartient à Jean d'Armagnac, duc de Nemours (décapité par ordre de Louis XI, en 1477), puis à Pierre de Bourbon et à Charles Rohan de Gié, fils de Pierre de Gié, maréchal de France. Les Monfrabuf s'installent sur la propriété au début du XVIe siècle. Alliés avec la famille de Lubersac, ils font construire le château. Jean de Monfrabuf passe son contrat de mariage avec Mlle de Rollignac en 1581 au château de La Chabroulie.","architecture":"CHABROULIE  du XV-XXe siècle tour carrée et grosses tours rondes et fenêtres à meneaux. Selon la mode du pays du Bas-Limousin, le château féodal fut construit à flanc de coteau. Les murs d'enceinte et la tour primitive, édifiée dans la cour d'honneur, témoignent encore de l'importance de la seigneurie qui connut les assauts anglais et les ruines causées par les guerres de religion, château de trois étages, un corps de logis flanqué d'une tour ronde et d'une tour carrée, ornée de lucarnes sculptées.                      RAZAT, de plan rectangulaire à deux niveaux toit en croupe avec sur l'angle arrière gauche une finition au niveau du toit d'une tour ronde ou une tour  arrasée et en façade avant plein cintre une tour carrée à trois niveaux toit à quatre pans.","habitants":"Razat, monsieur Christopher Hipkins.                             Ayen,  Jean Ier de Comborn.\r\n        \"","divers":"Deux châteaux à Ayen dont vestiges tour grav 1 et 2 celui de Chabroulie grav 3 à 6, de Razat grav 7","gps":"","images":["../image/image_19/19_Ayen_1.jpg","../image/image_19/19_Ayen_2.jpg","../image/image_19/19_Ayen_3.jpg","../image/image_19/19_Ayen_4.jpg","../image/image_19/19_Ayen_5.jpg","../image/image_19/19_Ayen_6.jpg","../image/image_19/19_Ayen_7.jpg","../image/image_19/19_Ayen_8.jpg"]},"Consult_chateau_formulaired8a4":{"id":"Consult_chateau_formulaired8a4","dept":"19","canton":"Bort les orgues","commune":"Saint-Fréjoux","nom":"Bazaneix","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux à St-Fréjoux, Bazaneix et la Chabanne du XIV siècle.                                                     BAZANEIX, en 1335  Etienne d'Aix, seigneur du Bazaneix, puis de Eymeric d'Aix seigneur jusqu'en 1375. Jean de la Peyssarie lui succéda par alliance jusqu'en 1414, date à laquelle son gendre, Robert de Ligneyrac deveint le nouveau seigneur du lieu.  Passa en 1691 à la Maison de Soudeilles qui le vendit en 1777 à Jean Antoine d'Amarzit de la Serre. Sous la Révolution, il passa aux mains de la famille de La Chapelle : Jean Baptiste puis Pierre Joseph y résidèrent. Elisabeth Séroux de Bienville, née Desjardin, liée à la famille, l'acquit en 1874. Son époux Pierre Séroux de Bienville  le restaura en 1876 et apposa ses armes au-dessus de la porte d'entrée.  Ils eurent deux enfants : Marie-Jeanne Aimée qui épousa le 11 décembre 1899 Pierre d'Amarzit, fils d'Adrien et de Clotilde Blanche de La Celle, dont il eurent une fille Suzanne  qui épousa le 16 février 1925, Christophe de Beaumont-Beynac,  qu'elle a quitté pour un roturier, laissant le château à l'abandon, et en 1999 madame Véronique Geoffroy l'acheta et le rénova.                      CHABANNE  a été construit au XVIe siècle, a appartenu aux Ventadour jusquau XVIIe siècle. Ou a résidé une famille bourgeoise originaire d'Ussel : les Bonnet. Au XVIe siècle, Antoine Bonnet est consul d'Ussel. Le 7 septembre 1693,  est lieutenant général du sénéchal de la ville d'Ussel, investi des fonctions de maire perpétuel. Le 5 avril 1794, Bonnet de la Chabanne, arrêté comme complice d'émigration, est décapité, à Tulle.","architecture":"BAZANEIX  est un vieux château du XVe siècle réhaussé de ses tours et entouré d'un fossé d'eau vive qui le défendait au Moyen-Âge.  La réfection de la charpente a été effectuée, et la toiture recouverte dardoises comme auparavant et dans le respect des règles. Les douves ont été débroussaillées, curées et, la place forte retrouve une certaine allure, jusquà la girouette qui a été restaurée et dorée à la feuille. Avec sa toiture neuve, le bâtiment est hors d'eau. Mais le domaine est abandonné, et il tombe en ruines. Pourtant, depuis 1999, des efforts importants ont été faits pour le faire revivre, provenant du site.  Depuis, le domaine s'est à nouveau endormi.                                 CHABANNE  a été construit au XVIe siècle, a appartenu aux Ventadour jusquau XVIIe siècle. Dans cette demeure de style classique a résidé une famille bourgeoise originaire d'Ussel.  Ce château a été  remanié.  Il fut ensuite propriété de la famille Bonnet anoblie par Louis XIV. Curieusement ce château en impose plus de loin que de près avec ses deux tours carrées. Aujourd'hui il ressemble plus à une gentilhommière qu'à autre chose.","habitants":"Bazaneix, Famille de La Chapelle.                            Chabanne, Famille de Bonnet.\r\n        \"","divers":"Deux châteaux à St-Fréjoux, Bazaneix grav 1 à 5  et Chabanne grav 6","gps":"","images":["../image/image_19/19_Bazaneix_1.jpg","../image/image_19/19_Bazaneix_2.jpg","../image/image_19/19_Bazaneix_3.jpg","../image/image_19/19_Bazaneix_4.jpg","../image/image_19/19_Bazaneix_5.jpg","../image/image_19/19_Bazaneix_6.jpg"]},"Consult_chateau_formulaire6d13-2":{"id":"Consult_chateau_formulaire6d13-2","dept":"19","canton":"Beynat","commune":"Bilhac","nom":"Bilhac","type":"Château","periode":"XVII","histoire":"BILHAC,   Hélie de Leymonie détient en 1459, de ses aïeux, des lettres de noblesse, vieilles de cent ans, et joint à son titre de seigneur de Bilhac celui de consul de Beaulieu. Il est temps, pour lui, de faire bâtir la haute tour signifiant la puissance seigneuriale. Sur le troisième étage de sa tour, il fait poser des canonnières, et au moment où il faut y accrocher les mâchicoulis, le vicomte de Turenne, suzerain tout puissant, lui interdit de fortifier sa demeure. Hélie se soumet et n'a plus qu'à formuler une demande au vicomte pour terminer sa toiture. Le vicomte lui concède ce droit selon une formule écrite en bonne et due forme, devant témoins, à condition de démolir les canonnières déjà construites. Au XIX siècle, modification des toitures et des ouvertures, à cette époque il appartenait à M. Bonneval, maire de Bilhac.","architecture":"BILHAC du XVII-XIX e siècles, au milieu du village, la tour qui causa tant de déboires à Hélie de Leymonie. Le château actuel, adossé à la tour, fut construit sur le plan traditionnel du XVIIe siècle : un corps de logis flanqué de deux tours carrées. Au XIX siècle, modification des toitures et des ouvertures, à cette époque il appartenait à M. Bonneval, maire de Bilhac.","habitants":"Monsieur Bonneval\r\n        \"","divers":"Château de Bilhac","gps":"","images":["../image/image_19/19_Bilhac_1.jpg"]},"Consult_chateau_formulaire60a9":{"id":"Consult_chateau_formulaire60a9","dept":"19","canton":"Egletons","commune":"Sarran","nom":"Bity_Sarran","type":"Château","periode":"XVII","histoire":"BITY, ce château du XVIIe siècle brûla en 1579 lors des guerres de Religion, et fut reconstruit par Pierre Dupuy, conseiller au Présidial de Tulle. Sa famille le conserva jusqu'en 1746 quand Roch Dupuy, seigneur-curé de Darazac, qui le tenait de son frère François Dupuy, seigneur de Bity, le légua à son neveu Jean Gabriel Martin La Selve, écuyer, procureur de 1739 à 1762, « nommé et anobli le 16 mai 1749 par charge de conseiller, secrétaire du roi près le parlement de Bordeaux, pour services entièrement satisfaisants comme conseiller procureur du roi en la prévôté générale de la maréchaussée du Limousin, et de ceux de son père durant 60 ans ». La famille de Selve l'aurait conservé jusqu'en 1843 avant de s'installer au château de la Gâne. Léon Trotsky y aurait séjourné, d'après une rumeur persistante, de juillet 1933 à juin 1935, hébergé par William-Noël Lucas-Shadwell, ancien colonel de l'armée britannique, membre des services secrets britanniques et archéologue, qui en était propriétaire à l'époque. Durant la seconde guerre mondiale, le château de Bity abrita des résistants puis fut transformé en hôpital.  Le château fut racheté le 3 mars 1969 par le couple Chirac.","architecture":"BITY, le château, qui avait brûlé en 1579, a été reconstruit au début du XVIIe siècle. Le corps de logis rectangulaire est flanqué d'une tour carrée avec échauguette sur cul-de-lampe à chaque angle.\r\nDeux pavillons du XVIIIe siècle bordent la cour en terrasse laquelle donne accès au jardin.","habitants":"La famille Dupuy et le couple Jacques Chirac\r\n        \"","divers":"Château de Bity à Sarran","gps":"","images":["../image/image_19/19_Bity_Sarran_1.jpg","../image/image_19/19_Bity_Sarran_2.jpg","../image/image_19/19_Bity_Sarran_3.jpg"]},"Consult_chateau_formulaire8e74":{"id":"Consult_chateau_formulaire8e74","dept":"19","canton":"Argentat","commune":"Boulieu-sur-Dordogne","nom":"Boulieu_Dordogne","type":"Château","periode":"XV-XVIII","histoire":"Plusieurs châteaux à Boulieu sur Dordogne,  à  Altillac le château de Bras,  du Doux  de Sugarde, de Majorie et à deux km au nord ouest à Beaulieu le château de la Grèze à 5 km et au nord à  Brivezac .                         BRAS  pas d'information historique.                       DOUX   est construit de 1904à 1906 par Jean-Louis Pascal. A servit d'hôtel de luxe, et aujourd'hui ADEP association d'entraides des polios et handicapés   crée par André Dessertine.                                                MAJORIE, du XVII XIXe siècle pas d'information historique.                                                                  SUGARDE, du XVI-XIXe siècle avec deux tourelles  pas d'information historique.  \r\nGREZE à Brivezac, château du XVIIIe siècle en vallée de  la Dordogne Corrézienne, Lancienne Vicomté de Turenne au cur de laquelle se situe le château de La Grèze possède un des patrimoines les plus riches de France avec de nombreux sites classés M.H., aujourd'hui chambres d'hôtes.                                  MONTAL il a était bâti par une femme, Jeanne de Balsac. La commande est lancée l'année de la construction du château de Chambord, en 1519, et les travaux débutent l'année suivante. Le parallèle entre les deux n'est pas anodin : Montal est en effet un élégant exemple d'architecture de la première Renaissance, chose unique dans la région.","architecture":"BRAS, du XV-XIXe siècle échauguettes et touurelle d'escalier.                                                                 DOUX fut influencé par le style utilisé à Deauville, construit dans le style de Xaintrie, il servit d'hôtel de luxe. Il fut construit sur le haut d'un vallon, dévoilant un panorama superbe. À l'intérieur, les boiseries sont de style Art-Nouveau. Des registres différents sont utilisés pour ses ouvertures : des fenêtres simples, une grande baie cintrée à croisillons de pierre, une fenêtre à croisée, des lucarnes rampantes, passantes ou à la capucine.  est composé de matériaux locaux qui lui donnent un air régional : en pierres de couleurs variées et un toit de lauzes.                                          GREZE de plan rectangulaire à deux niveaux avec lucarnes sur un toit brisé  en tuiles avant corps légérement saillant sur  trois travées recouvert d'un fronton triangulaire avec occulus central .                      MONTAL, de plan en U à deux niveaux avec lucarnes et tour carrée sur angle central avec tourelle accolée sur la partie extérieure flanquée aux extrémitées  de tours rondes toit en poivrières.","habitants":"DOUX, Jean-Louis Pascal.                                     MONTAL, Jeanne de Balsac\r\n        \"","divers":"Plusieurs châteaux à Boulieu sur Dordogne  Altillac grav 1 à 2    Montal grav d 5 à 8  à 1km au sud-Est  A  Altillac le château de Bras,  du Doux  de Sugarde, de Majorie et à deux kM nord ouest à Beaulieu le château de la Grèze à 5 km au nord à  Brivezac . Doux GPS : 44° 58' 40\" Nord et 1° 50' 48\" Est","gps":"44° 58' 40\" Nord et 1° 50' 48\" Est","images":["../image/image_19/19_Boulieu_Dordogne_1.jpg","../image/image_19/19_Boulieu_Dordogne_2.jpg","../image/image_19/19_Boulieu_Dordogne_3.jpg","../image/image_19/19_Boulieu_Dordogne_4.jpg","../image/image_19/19_Boulieu_Dordogne_5.jpg","../image/image_19/19_Boulieu_Dordogne_6.jpg","../image/image_19/19_Boulieu_Dordogne_7.jpg","../image/image_19/19_Boulieu_Dordogne_8.jpg","../image/image_19/19_Boulieu_Dordogne_9.jpg"]},"Consult_chateau_formulaireabf7":{"id":"Consult_chateau_formulaireabf7","dept":"19","canton":"Objat","commune":"Brignac la Plaine","nom":"Brignac","type":"Château","periode":"XV-XIX","histoire":"BRIGNAC, en limite de Brignac-la-Plaine, le château de la Choisne du XIXe siècle, transformé en EHPAD, est sur Mansac ; sa chapelle et le bâtiment moderne sont sur Brignac-la-Plaine.                                    TOUR du Chambon logements indépendants dans la section de la tour d'une maison de maître rénovée, datant des années 1850","architecture":"BRIGNAC du XV-XIXe siècles au centre du bourg de plan rectangulaire à deux niveaux  entre deux tours carrées sur les angles. Idem pour la tour de Chambon à deux niveaux rectangulaire avec lucarnes sur toit brisés flanqué de tours carrées.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château de Brignac et  la Tour de Chambon grav 2","gps":"","images":["../image/image_19/19_Brignac_1.jpg","../image/image_19/19_Brignac_2.jpg"]},"Consult_chateau_formulairef324":{"id":"Consult_chateau_formulairef324","dept":"19","canton":"Brive la Gaillarde","commune":"Brive la Gaillarde","nom":"Brive_la_Gaillarde","type":"Château","periode":"XV-XVII-XIX","histoire":"Plusieurs châteaux à Brive-la-Galliarde  celui de Bassaler, d'Enval, de Lacan, de Lacamp, Puymège, Puymaret, Labastille,  Malecroix, et de la Pigeonnie.  dont certains je n'ai pas d'information historique.     \r\nLACAN, son dernier propriétaire, le docteur Charles Guieu l'a légué à la commune à son décès. Celle-ci l'a revendu à un groupe sous le nom de \"L'Envie\", ce fut un temps un hôtel-restaurant haut de gamme. Mis en liquidation judiciaire en janvier 2013, il a repris son activité un an plus tard, avec un nouveau propriétaire et selon un nouveau concept. Aujourd'hui  hôtel restaurant de monsieur Gauze.\r\n PUYMEGE du XIIIe siècle à la Révolution appartenait  aux st-Viance et du XVI-XIXe siècle   appartenait à une branche de la famille de Chauveron et, depuis la mort d'Antoine de Chauveron en 2014, il appartient à ses trois filles. ce château avait été offert par un certain Jean-Baptiste Blanchard (Ayen 2 mai 1787 - Brive 1871), avoué, à sa fille Catherine Amélie (1827-1912) qui avait épousé son aïeul Henri de Chauveron.","architecture":"ENVAL   du XV-XXe siècles                                           BRIVES  cet ancien relais de chasse de style Renaissance jouit d' un cadre remarquable, dans un pittoresque petit village aux confins de la Dordogne.      LACAN,  du XI-XXe siècles, bâti à Brive-la-Gaillarde, il surplomb le centre-ville de Brive. Les origines du château  remontent au XIe et XII e siècles. Il apparaît comme une des demeures emblématiques de la cité Gaillarde. Aujourd'hui, c'est devenu un hôtel de charme.                                                                             PUYMEGE, bâtiment d'entrée du XVIe siècle avec sa tour carré accolé d'une tourelle , corps de logis du XVIIe siècle avec ses deux ailes en retour , bâtiment des dépendances à arcades du XIXe siècle.        MALECROIX du XVI-XIXe siècles.                                La PIGEONNIE du XIXe siècle.","habitants":"Personnalité de la commune\r\n        \"","divers":"Plusieurs châteaux à Brive-la-Galliarde  celui de Bassaler grav 1, d'Enval, Lacamp, Puymège; Labastille,  Malecroix grav 8, de la Pigeonnie.      Brives GPS : 45° 09' 30\" Nord, 1° 31' 55\" Est","gps":"45° 09' 30\" Nord, 1° 31' 55\" Est","images":["../image/image_19/19_Brive_la_Gaillarde_1.jpg","../image/image_19/19_Brive_la_Gaillarde_2.jpg","../image/image_19/19_Brive_la_Gaillarde_3.jpg","../image/image_19/19_Brive_la_Gaillarde_4.jpg","../image/image_19/19_Brive_la_Gaillarde_5.jpg","../image/image_19/19_Brive_la_Gaillarde_6.jpg","../image/image_19/19_Brive_la_Gaillarde_7.jpg","../image/image_19/19_Brive_la_Gaillarde_8.jpg"]},"Consult_chateau_formulaire0e6c":{"id":"Consult_chateau_formulaire0e6c","dept":"19","canton":"Gaillarde","commune":"Brive la Gaillarde","nom":"Brive_Patrimoine","type":"Patrimoine","periode":"XV-XVII","histoire":"BRIVE, au XIe siècle,  située à la jonction des vicomtés de Limoges, de Comborn et de Turenne, avait pour seigneur l'évêque de Limoges. Les barons de Malemort possédaient des droits justiciers à Brive. De  la collégiale Saint-Martin, un de ses prieurs, Hélie de Malemort, fut archevêque de Bordeaux entre 1188 et 1207.  la ville a résistée à un siège mené par des bandes mercenaires payées par le vicomte de Limoges et le vicomte de Turenne.                           TOUR DES ECHEVINS, la maison a été habitée par Antoine Delbos, sieur du Bousquet, conseiller au grand conseil du roi par provisions du 28 mars 1787 (baptisé le 10 septembre 1753, avocat en Parlement; nommé conseiller, il exerce jusqu'en 1791). Il est le père de Joseph Antoine Nicolas Dubousquet-Laborderie (1793-1864), sous-préfet de Brive en 1830, élu député de la Corrèze le 23 avril 1848.                                        LABENCHE, musée  a appartenu aux familles de Calvimont, Dumas, Sabruguet-Damarzid. Louis XIII y résida pendant sa visite à Brive. L'hôtel a été acheté en 1829 par l'évêque de Tulle pour y installer un petit séminaire vers 1850. Il est ensuite devenu propriété de la ville de Brive-la-Gaillarde en 1906. \r\n CAVAIGNAC, les surs clarisses ont été ruinées par la faillite de Law. En 1760 elles sont réunies aux bénédictines de Bonnesaigne dont le monastère se trouvait à Combressol, près de Meymac.                 RENAUDIE, il est nommé d'après la dame Renaudie pour qui il a été construit. L'immeuble remplace une maison à pan de bois qui s'était partiellement effondrée en 1883. Sa façade et sa toiture sont inscrites aux M.H.depuis le 4 mars 2002.","architecture":"BRIVE, la ville qui s'étendait sur trois hectares, était protégée par une enceinte percée de quatre portes. À partir du XIIe siècle, se développèrent des faubourgs hors des murs, de part et d'autre des voies d'accès. Mais la ville ne comportait pas de château car sa protection était assurée par les seigneurs de Malemort et les vicomtes de Turenne.                                   ECHEVINS, au XIXe siècle, les façades sur la rue des Échevins, les places Charles-de-Gaulle et Latreille (rue du Lieutenant-Colonel-Farro) sont modifiées. Le mur entre la tour et la maison voisine qui menaçait de s'effondrer est refait en 1840. La tour d'escalier, rue des Échevins, est restaurée en 1921 . Une partie de la décoration a alors été refaite. La porte donnant sur cette rue a été percée à cette époque. L'édifice est classé au titre des M.H. sur liste en 1889.\r\nLABENCHE, l'hôtel comprend deux parties. La plus ancienne est la partie sud, constituée de deux ailes en retour d'équerre sur des galeries avec arcades en plein cintre donnant sur la cour d'honneur. Les façades sur cette cour sont les plus décorées avec de grandes fenêtres Renaissance et des bustes d'hommes et de femmes sortant de fausses baies au-dessus et au-dessous. Les lucarnes sont ouvragées.                    CAVAIGNAC, le bâtiment existant fut édifié après les guerres de Religion, sous le règne de Louis XIII. Il est composé de deux corps de bâtiment à angle droit, avec une tour ronde d'escalier à la jonction. La galerie basse dont on voit les trois arcatures permettait d'accéder au cloître. Ce bâtiment était le logement de la mère supérieure. Un jardin était adossé aux fossés de la ville.","habitants":"Les barons de Malemort                                               Antoine Delbos                                                              Familles de Calvimont\r\n        \"","divers":"La tour des Echevins grav 1, Cavaignac grav 2, Musée de  Labenche, La Rénaudie grav 3 patrimoine de Brive la Gaillarde","gps":"","images":["../image/image_19/19_Brive_Patrimoine_1.jpg","../image/image_19/19_Brive_Patrimoine_2.jpg","../image/image_19/19_Brive_Patrimoine_3.jpg","../image/image_19/19_Brive_Patrimoine_4.jpg","../image/image_19/19_Brive_Patrimoine_5.jpg","../image/image_19/19_Brive_Patrimoine_6.jpg"]},"Consult_chateau_formulaire1a97":{"id":"Consult_chateau_formulaire1a97","dept":"19","canton":"St-Pantaléon de Larche","commune":"Cublac","nom":"Cabane","type":"Château","periode":"XVII","histoire":"CABANE le château initial de La Cabane aurait, dit-on, été construit en 1669 et habité par les familles de Dalmay et de Malededent.  Là, plus tard, avait prospéré pendant 40 ans,  jusqu'au début des années 1900, un établissement d'enseignement géré par les Frères Maristes. En 1904 ils en avaient été chassés. Les immenses bâtiments construits peu à peu au cours des temps avaient été mis en vente à bas prix au Tribunal de Brive par le gouvernement, en 1903. Un marchand de biens s'en était porté acquéreur. Bientôt embarrassé de son acquisition, il ne cherchait qu'à retirer au plus tôt quelques bénéfices de son opération. C'est alors que l'abbé Breton se proposa; pour concrétiser l'achat, il constitua une société immobilière.\r\n Une autre version existe : bien que chassés de Lacabanne, les frères Maristes auraient été encore propriétaires du domaine, et ce sont eux qui l'auraient cédé à la société immobilière de l'abbé Breton.\r\n Quoiqu'il en soit, peu de temps après, l'affaire sera conclue, et le 6 octobre 1907, le Petit Séminaire de Brive put se transporter sur les hauteurs ensoleillées de Lacabanne, sous le nom dÉcole Bossuet.","architecture":"CABANE, grande bâtisse quadrangulaire transformé en séminaire, de trois niveaux avec pavillons central légèrement saillant  avec fronton triangulaire et deux autres pavillons saillants aux extémitées.","habitants":"Familles de Dalmay \r\n        \"","divers":"Château de Cabane à Cublac","gps":"","images":["../image/image_19/19_Cabane_1.jpg","../image/image_19/19_Cabane_2.jpg","../image/image_19/19_Cabane_3.jpg"]},"Consult_chateau_formulaire3c25":{"id":"Consult_chateau_formulaire3c25","dept":"19","canton":"Malemort sur Corrèze","commune":"Varetz","nom":"Castel_Novel","type":"Château","periode":"XIV","histoire":"CASTEL-NOVEL, il appartient assez longtemps aux ducs de Bretagne jusqu'en 1365. Puis le château tombe aux mains des Anglais jusqu'en 1380. La vicomté de Limoges et de Penthièvre en Bretagne récupère le château et le fortifie jusqu'en 1444. On y trouve alors les nouveaux propriétaires, les Beaupoil de Saint-Aulaire. Les prochains propriétaires sont issus de la grande famille des d'Albret. En fin de l'année 1500, le château revient en héritage à la famille d'Aubusson de la Feuillade qui possède Castel Novel durant plus de 300 ans jusqu'en 1844. En 1876, c'est Henry de Jouvenel des Ursins qui devient propriétaire du château. Il a deux fils Bertrand 1903-1987 et Renaud, enfant naturel, 1907-1982. Ces deux hommes laissent le château à l'abandon. En 1912, Henry de Jouvenel se marie avec l'écrivain Colette, ils ont une fille nommée Colette, Renée, surnommée Bel Gazou. transformé en hôtel En 1956, Renaud de Jouvenel vend le château à Raymond et Yvette Parveaux. Ils y font d'énormes travaux de remise en état de cet édifice. C'est ensuite Albert, le fils, qui prend la succession de son père et c'est aujourd'hui sa fille Sophie qui gère le luxueux complexe hôtelier étoilé.","architecture":"CASTEL-NOVEL, du XIII-XIVe siècles établi sur une motte castrale originelle, entre la Loyre et la Vézère,  Les spécialistes datent la construction de ce Castel Novel, château féodal de surveillance du territoire, bâti sur un rocher, vers les années 1100. On n'en trouve les origines nominales des occupants qu'à partir de 1289, avec  tourelles et galeries. Il est construit en grès rouge lie de vin, couleur de la pierre du village de Varetz. Déjà au XIIe siècle, il est fait mention de Castel Novel.  Remanié au XIXe siècle dont la façade fut refaite au XVIIIe siècle comporte à l'ouest une tour qui était le donjon défensif du  XIIIe siècle et un corps de logis central du XIVe siècle les créneaux de la tour ont été remplacé par des tourelles et une galerie avec balustre à litalienne à été rajoutée  Ce château fut racheté par l'actuel propriétaire qui en a fait un hôtel Relais et Châteaux.","habitants":"Famille des Beaupoil de Saint-Aulaire.\r\n        \"","divers":"Château de Castel-Novel à Varetz","gps":"","images":["../image/image_19/19_Castel_Novel_1.jpg","../image/image_19/19_Castel_Novel_2.jpg","../image/image_19/19_Castel_Novel_3.jpg","../image/image_19/19_Castel_Novel_4.jpg","../image/image_19/19_Castel_Novel_5.jpg","../image/image_19/19_Castel_Novel_6.jpg"]},"Consult_chateau_formulairedb9b":{"id":"Consult_chateau_formulairedb9b","dept":"19","canton":"Argentat","commune":"Saint-Privat","nom":"Cautine","type":"Château","periode":"XVII","histoire":"Deux châteaux à Saint-Privat  celui de Cautine  et de Malesse.                                                                  CAUTINE, Ruth Phillips ouvre les portes de son château de Cautine, le samedi 28 février, pour présenter son projet d'éco-château coopératif, chambres d'hôtes mis en vente pour le royaume Unis par une tombola de 11 euros comme le révèle le site du Daily Mail, la propriétaire des lieux reversera 5% de la mise totale à la St Petroc's Society, une association d'aide aux sans-abri. Avec le reste de la somme récoltée, elle financera la construction de logements en kit pouvant être assemblés en une semaine et livrés pour moins de 10% du prix moyen d'une maison outre-Manche. Quant au chanceux gagnant, il deviendra le propriétaire de ce manoir meublé du XVIIe siècle. Le lieu est actuellement converti en maison d'hôtes de 9 chambres.  Et les bonnes nouvelles ne s'arrêtent pas là. \"L'ensemble sera livré clefs en main avec jardinier et gardien, mais aussi la promesse de factures d'entretien payées pour une période d'un an\".     MALESSE du XIII-XIXe siècle  appartenait aux XIIIe et XIVe siècles à la famille de Malesse et Veyrac coseigneurs de Merle. L'édifice passe par alliance au XVe siècle aux de Roffignac puis ventes successives à Jean Vigier de Neuville, évêque de Lavaur et à François de Semailles. En 1576, il est occupé par les Huguenots. Au XVIe siècle, la propriété est aux Noailles jusqu'à la Révolutlon.","architecture":"CAUTINE  manoir du XVIIe siècle de plan en U à deux niveaux avec une tour  carrée plein cintre en façade avec toit quatre pans l'ensemble recouvert de tuiles.      MALESSE du XIII-XIXe siècle avec grosse tour circulaire   Le château dépendait de la vicomté de Turenne. Le château féodal devait être entouré de fossés alimentés par les trois étangs de Merle, de Brousse et de Courbel (étangs qui ont donné lieu à des contestations au XIVe siècle entre les Malesse et les Saint Chamans). \r\n Les incendies allumés à l'époque des guerres de religion ont ruiné les bâtiments. Il subsiste une tour circulaire du XIIIe siècle dans laquelle des fenêtres ont été ouvertes à la fin du XVe siècle. Les bâtiments annexes ont été rebâtis au XIXe siècle.","habitants":"Ruth Phillipe                                                                famille de Malesse \r\n        \"","divers":"Château de Cautines et de Malesse à st-Privat","gps":"","images":["../image/image_19/19_Cautine_1.jpg","../image/image_19/19_Cautine_2.jpg","../image/image_19/19_Cautine_3.jpg","../image/image_19/19_Cautine_4.jpg","../image/image_19/19_Cautine_5.jpg"]},"Consult_chateau_formulaire817c":{"id":"Consult_chateau_formulaire817c","dept":"19","canton":"Egletons","commune":"Chabrignac-Juillac","nom":"Chabrignac","type":"Château","periode":"XIV","histoire":"CHABRIGNAC, à Juillac Il semble qu'au XIVe siècle Chabrignac se rattache au nom des Geouffre. Au siècle suivant, les Hélie de Chabrignac en étaient seigneurs, François II de Lubersac ayant épousé Jeanne d'Hélie de Collonges, son beau-frère Charles Hélie fut obligé, pour s'acquitter de sa dette entière à son égard, de lui céder à perpétuité la terre et la seigneurie de Chabrignac avec haute, moyenne et basse justice. François de Lubersac rendit hommage au Roi le 25 février 1583 pour sa seigneurie et fit dresser le terrier de Chabrignac l'année suivante ; on voit, dit la généalogie de sa famille, qu'il fit de nombreuses acquisitions en 1582, 1588 et 1596. Au XVIIIe siècle, la branche de Lubersac de Chabrignac fut illustrée par Jean Joseph de Lubersac, né le 10 avril 1740 qui deveint en particulier évêque de Chartres, aumônier de madame Sophie de France puis du Roi. En 1828, le château et les terres furent vendu par le neveu du prélat au comte de la Besse, originaire d'Auvergne. Leur fille, Rose et son époux Jean Arondeau de la Rigaudie de Marcillac la Croze, sont morts à 2 jours lun de lautre, en 1788, veille de la Révolution. Leur fils, Jean Arrondeau fut arrêté en 1793. Peu avant, il avait vendu son château et ses biens à son beau-frère Pierre Seignolles dune riche famille dhommes de loi de Dampniat, époux de Marianne Arrondeau. De nos jours, le domaine appartient à la famille Peyrode.","architecture":"CHABRIGNAC, masse imposante des vestiges et sinistre au-dessus de sa terrasse défendue de fossés, avec une grosse tour éventrée, entourée à lest de 3 tourelles. que suivent dautres ruines. Une habitation relativement moderne les accompagne au nord, construite tant bien que mal sur lancien portail dentrée. L'édifice  du XVIe siècle est de plan rectangulaire. Il possède de beaux volumes avec, en façade Est, une tour carrée d'escalier hors-oeuvre et, en façade ouest, deux tours ronds sur les angles et deux tourelles dans les angles intérieurs entre les tours et la façade du corps de logis. Les deux tours et les deux tourelles de cette façade sont disposées en une harmonieuse symétrie. Les cinq tours ont un chemin de ronde avec mâchicoulis aux corbeaux moulurés de plusieurs quarts-de-rond. La tour carrée a une toiture en pavillon, les tours rondes sont coiffées de toits en poivrière et les tourelles ont une couverture en poivrière en essences de châtaignier alors que le reste du château est couvert d'ardoise. Les façades Est et Ouest ont trois niveaux de fenêtres à meneaux et traverses. A l'intérieur, on peut remarquer l'escalier en vis, habillé de bois vers 1850 dans la tour carrée.","habitants":"Famille de Jean Arondeau \r\n        \"","divers":"Chabrignac  GPS : 45° 19' 02\" Nord, 1° 20' 29\" Est","gps":"45° 19' 02\" Nord, 1° 20' 29\" Est","images":["../image/image_19/19_Chabrignac_1.jpg","../image/image_19/19_Chabrignac_2.jpg","../image/image_19/19_Chabrignac_3.jpg","../image/image_19/19_Chabrignac_4.jpg","../image/image_19/19_Chabrignac_5.jpg"]},"Consult_chateau_formulaire87d5":{"id":"Consult_chateau_formulaire87d5","dept":"19","canton":"Naves","commune":"Saint-Germain les Vergnes","nom":"Chadebec_Chauvel","type":"Château","periode":"XIV-XIX","histoire":"Deux châteaux à Saint-Germain les Vergnes  Chadebec, Chauvel et un château  à deux Km à St-Méxant.                                                                         CHADEBEC, la terre de Chadebec, comme une bonne partie de la paroisse de Saint-Germain-les-Vergnes, a appartenu au Moyen-Age à la seigneurie de Favars. Le domaine passa dans la famille de Miremont en 1483 et, au début du XVIIe siècle, dans celle des Miremont qui la conservera au-delà de la Révolution. Le château et le parc ont été rebâtis au XIXe siècle par Marsillon, ingénieur à Paris, qui a mis sa propriété au goût du jour. Il a fait appel à plusieurs architectes et paysagistes qui lui ont remis des projets de plans aquarellés conservés au château. Le parc a été restauré en 1877-1878.                                            CHAUVEL, après les Comborn, on trouve les Roflignac, seigneurs de Chauvel. Au XVIe siècle le château passe aux Rochefort devenus ensuite \"La Roche-Chauvel\", puis les Lafagerdye de Saint-Germain. Au milieu du XXe siècle, la propriété appartenait à la famille Juillet, de Saint-Lager.","architecture":"CHADEBEC, comme une bonne partie de la paroisse de Saint-Germain-les-Vergnes aux abords du château, toutes les allées aux courbes douces ont pour point de départ ce bâtiment; elles délimitent de larges espaces de pelouses, judicieusement plantés d'arbres isolés ou de bosquets d'essences rares. Le jardin potager forme un quadrilatère qui semblait divisé en quatre compartiments. La rivière anglaise au cours sinueux ceinture l'ensemble du parc du sud-est au nord-ouest. Deux fabriques, le poulailler et la glacière, complètent l'ensemble.                                                                       CHAUVEL du XIII-XIXe siècle avec grosse tout ronde sur la route qui arrive de Donzenac, avant d'aborder le village de Saint-Germain-les-Vergnes, on aperçoit l'ancien château, haut bâti, sur un massif de granite dont la position stratégique servait aux vicomtes de Comborn comme lieu de surveillance au carrefour des routes de Tulle et de Brive. Sur une terrasse bordée par les anciennes murailles fortifiées s'élève une grosse tour datant du XIIIe siècle, flanquée de bâtiments plus récents. Il dut y avoir des souterrains reliant le château haut et le château bas.","habitants":"Famille de Miremont                                                        Famille de  Roflignac\r\n        \"","divers":"Château de Chadebec et de Chauvel à St-Germain les Vergnes et château de saint Méxant","gps":"","images":["../image/image_19/19_Chadebec_Chauvel_1.jpg","../image/image_19/19_Chadebec_Chauvel_2.jpg","../image/image_19/19_Chadebec_Chauvel_3.jpg","../image/image_19/19_Chadebec_Chauvel_4.jpg","../image/image_19/19_Chadebec_Chauvel_5.jpg","../image/image_19/19_Chadebec_Chauvel_6.jpg","../image/image_19/19_Chadebec_Chauvel_7.jpg"]},"Consult_chateau_formulaire7b80":{"id":"Consult_chateau_formulaire7b80","dept":"19","canton":"Seilhac-Monédières","commune":"Chamberet","nom":"Chamberet_Lafarge","type":"Château","periode":"XVII","histoire":"CHAMBERET-LAFARGE    La famille de Boisse posséda La Farge du Moyen-Age jusqu'à la Révolution. André de Boisse, chevalier croisé, acquit en 1237 une rente sur les terres de Lafarge. Le château fut reconstruit de 1620 à 1666. Le marquis Stanislas de Boisse est le dernier seigneur qui ait habité La Farge. Il émigra en 1789. Le domaine fut acheté en 1881 par M. Talamon, négociant à Paris.","architecture":"CHAMBERET, édifice construit dans la 2e moitié du XVIe siècle et dans le 1er quart du XVIIe siècle ; il dut être partiellement endommagé par l'incendie du bourg en 1590 ; travaux de restauration par l'architecte Bardon à la fin du XIXe siècle, époque à laquelle il fait office de presbytère ; on lui adjoint alors un ancien logis qui sert de dépendance, croix maltaise sculptée sur le mur de clôture.  Il restaura le château et, pour le jardin, fit appel à Edouard André, célèbre paysagiste. On peut distinguer un jardin structuré en terrasse mettant en valeur la façade du château et le parc paysager qui agrémente la colline jusqu'à l'étang au sud-ouest. L'ordonnance paysagère de la terrasse principale du château est construite sur des structures du XVIIe siècle révélées par le grand canal rectangulaire à l'est qui ouvre sur un vaste paysage champêtre puis sur la chaîne des Monédières. Le parc paysager est constitué d'une large pelouse délimitée par des masses arborescentes variées. Puis un cheminement en sous-bois conduit par des allées courbes à l'étang en contrebas.","habitants":"Marquis Stanislas de Boisse\r\n        \"","divers":"Château de Lafarge à Chamberet et Charengeau grav 6","gps":"","images":["../image/image_19/19_Chamberet_Lafarge_1.jpg","../image/image_19/19_Chamberet_Lafarge_2.jpg","../image/image_19/19_Chamberet_Lafarge_3.jpg","../image/image_19/19_Chamberet_Lafarge_4.jpg","../image/image_19/19_Chamberet_Lafarge_5.jpg","../image/image_19/19_Chamberet_Lafarge_6.jpg"]},"Consult_chateau_formulairea49b":{"id":"Consult_chateau_formulairea49b","dept":"19","canton":"Seilhac-Monédières","commune":"Chamboulive","nom":"Chamboulive","type":"Château","periode":"XV-XVII","histoire":"Deux châteaux à Chamboulive, celui de Chamboulive dit de Gourdon et de  la Faurie et à 10 km au sud ouest le château de La Cote à St-Jal  parfois appelé château de Chassagne, du nom de la famille qui donna trois maires à la commune.               CHAMBOULIVE, au haut Moyen-Âge, Chamboulive est le siège d'un petit pays du Limousin, une très ancienne division territoriale de la cité des Lémovices, dune vicairie, circonscription administrative et judiciaire et dune paroisse sous le vocable des saints Côme et Damien, médecins syriaques. On connaît, dès le XIe siècle, lexistence de seigneurs particuliers, les Comtors. La seigneurie appartient ensuite aux Comborn, à leurs successeurs et, avant 1789, aux Lastic-Saint-Jal. Cest de Chamboulive que serait originaire, au XIVe siècle, dom Jean Birelle, général de lOrdre des Chartreux, proposé à la mort du pape Clément VI pour le trône pontifical. On lui préfère celui qui devient Innocent VI.","architecture":"Château de la FAURIE du XV-XVIIe siècles, accolée d'une tour carrée à créneaux et mâchicoulis  entre le corps de logis et la tour une tourelle à toit en poivrière et belle porte de style gothique.                           Château de GOURDON de plan rectangulaire à deux niveaux avec lucarnes sur toits en croupes  flanqué sur angles de la façade de tours rondes toits en poivrières et une à l'écart dans le même style.                           Manoir de la Côte St-Jal de plan carrée avec  pavillon en façades à deux niveaux sur soubassement lucarnes sur combles.","habitants":"Famille des Lastic-Saint-Jal\r\n        \"","divers":"Deux châteaux à Chamboulive dit de Gourdon grav 1-3 grav 4-5, de la Cote, de la Faurie gr 6_8 et de la Chaize gr-9","gps":"","images":["../image/image_19/19_Chamboulive_1.jpg","../image/image_19/19_Chamboulive_2.jpg","../image/image_19/19_Chamboulive_3.jpg","../image/image_19/19_Chamboulive_4.jpg","../image/image_19/19_Chamboulive_5.jpg","../image/image_19/19_Chamboulive_6.jpg","../image/image_19/19_Chamboulive_7.jpg","../image/image_19/19_Chamboulive_8.jpg","../image/image_19/19_Chamboulive_9.jpg"]},"Consult_chateau_formulaired9a0":{"id":"Consult_chateau_formulaired9a0","dept":"19","canton":"Naves","commune":"Poissac","nom":"Chameyrat","type":"Château","periode":"XVI","histoire":"CHAMEYRAT,  est le seul témoin qui reste de lappartenance de la paroisse à la vicomté des Turenne de 1230 à 1738. A travers le temps, il a gardé le nom de « Château des Turenne ».  Aux environs du Xe siècle, la paroisse de Chameyrat appartient à labbaye de Beaulieu. Sous prétexte de la protéger, les seigneurs de Malemort sy installent et l enlèvent à Beaulieu. En 1230, Allemande de Malemort épouse un cadet de la famille de Turenne qui  à la mort de son frère aîné devient vicomte de Turenne. Chameyrat  entre alors dans la vicomté  où elle restera jusquen 1738, date à laquelle le duc de Bouillon, dernier vicomte, vend son domaine au roi Louis XV. La Vicomté  de Turenne sétendait sur une partie du Quercy où elle comptait 48 paroisses.              SUDRIE, la famille Sudre venue de Cahors vers 1248, s'installe à Laguenne et achète des terres qui prennent leur nom. Guillaume Sudre, cardinal, évêque d'Ostie, doyen du sacré collège, en est propriétaire de 1307 à 1373. Sa nièce épouse Claude du Prat qui sera l'arrière-tante  de Michelle Vialle, commanditaire de la maison Loyac à Tulle. Ensuite la  Sudrie passe par alliance aux Cyautard. Au XVIIe siècle, achat de la demeure par les Loyac bourgeois de Tulle. La propriété passe au XIXe siècle aux de Meynard. Il ne subsiste rien de l'ancien château qui devait être assez important pour comprendre une chapelle domestique au XVIIe siècle. Le château a été bâti en 1840 dans un style classique du XVIIIe siècle sur le mamelon qui surplombe la vallée de la Corrèze et tous les environs deTulle.","architecture":"CHAMEYRAT,  du XVIe siècle Le château est alors composé dun rez-de-chaussée, surmonté dun étage, grands corps de bâtiment auquel sont attenantes à droite et à gauche deux tours renfermant les escaliers du château : la tour de droite carrée, la tour de gauche ronde. Daprès labbé Chèze,  cette dernière, crénelée, était couverte dune charpente et dun toit conique qui en 1905 fut remplacé par un ouvrage en ciment lescalier de pierre qui est à lintérieur desservait laile septentrionale qui a disparu et a été remplacée par une grange construite en 1915. Sur lemplacement de cette grange était peut-être une cuisine, des restes dun four avec des cendres y ont été trouvés. Un escalier en pierre conduit à une cave voûtée qui existe toujours. Actuellement, lescalier hélicoïdal en pierre de la tour ronde dessert le rez-de-chaussée, le 1er étage et le grenier du corps de bâtiment. La tour carrée qui desservait la partie droite a été démolie dans les années 1950. Cette partie droite, restée propriété privée, comporte une cheminée imposante en rez-de-chaussée. Actuellement, la partie gauche du bâtiment se compose de vastes salles à plafonds formés de poutrelles menuisées avec goût. Elle possède une cheminée aussi imposante que celle de la partie privée, traces d'enceinte fortifiée.","habitants":"Famille de Turenne\r\n        \"","divers":"Château de Chameyrat à Poissac et Hugo-Masselon gr 4","gps":"","images":["../image/image_19/19_Chameyrat_1.jpg","../image/image_19/19_Chameyrat_2.jpg","../image/image_19/19_Chameyrat_3.jpg","../image/image_19/19_Chameyrat_4.jpg"]},"Consult_chateau_formulairee24b":{"id":"Consult_chateau_formulairee24b","dept":"19","canton":"Seilhac","commune":"l","nom":"Chassagne_Lacelle","type":"Manoir","periode":"XVII","histoire":"A deux kilomètres au sud-est à Lacelle château de Lacelle.                                                            CHASSAGNE, manoir  du XVII-XIXe siècle,  famille Pichard d'Eymoutiers.  Logis principal construit au XVIIe siècle ; réaménagé et agrandi vers 1779, date inscrite sur un pignon  au nord, augmenté au XVIIe siècle d'un autre corps de bâtiment au sud.","architecture":"CHASSAGNE, château construit  au XVIIe siècle ; détruit à une date inconnue, seules subsistent des dépendances : logement daté de 1630 sur son linteau de cheminée, four à pain et grange-étable du XVIIe siècle ; linteau déposé portant un blason daté de  1674 ; une vasque de l'ancien bassin du château a été déplacée dans la cour de Lafarge à Chamberet.","habitants":"Famille Pichard d'Eymoutiers\r\n        \"","divers":"Manoir de chassagne Lanede gr-4 et Masmoury gr-5","gps":"","images":["../image/image_19/19_Chassagne_Lacelle_1.jpg","../image/image_19/19_Chassagne_Lacelle_2.jpg","../image/image_19/19_Chassagne_Lacelle_3.jpg","../image/image_19/19_Chassagne_Lacelle_4.jpg","../image/image_19/19_Chassagne_Lacelle_5.jpg"]},"Consult_chateau_formulaireffa7":{"id":"Consult_chateau_formulaireffa7","dept":"19","canton":"Beynat","commune":"Collonges la Rouge","nom":"Collonges_Rouge","type":"Château","periode":"XVI","histoire":"Six châteaux dans cet article sur Collonges la Rouge. Beauverie, Friac, Martret, Benge, Beauregard, Breuil et  Maussac, Vassinhac (voir article).           COLLONGES traverse les guerres de religion, de manière relativement pacifique, puisque les deux nefs de l'église sont utilisées alternativement pour le culte catholique et le culte protestant. Après les guerres de religion, la reconstruction du patrimoine de la petite noblesse coïncide avec la montée en puissance de la vicomté. Cest à cette époque que sélèvent les nobles logis des officiers de la vicomté « cité aux vingt-cinq tours ». Il est connu dès le VIIIe siècle par un don du comte de Limoges de l'église de la paroisse au monastère de Charroux.        \r\n FRIAC appelé aussi l'ancien hôtel du Friac ou l'hôtel de Beaurival, sa construction date du XVe siècle. C'est une bâtisse moderne flanquée de 2 grosses tours à 3 étages, avec quelques consoles d'anciens mâchicoulis et quelques restes de fenêtres, est classé aux M.H. depuis le 17/12/1926.                                         MARTRET, datent du XVIe au XIXe siècle. Cette demeure noble  a deux corps. Le château possède une tourelle d'angle en poivrière, un escalier et une terrasse avec une balustrade, de style Louis XIII. La lucarne date du XVIe siècle. Le château du Martret est classé aux M.H. le 28/05/1951. \r\nMAUSSAC, Pierre de Maussac, écuyer, possède la demeure en 1601, puis Jacques de Maussac.  Depuis 1856, le Castel  appartient à la famille de l'actuelle propriétaire.","architecture":"BENGE, l'édifice comprend deux parties bien distinctes. Un corps de bâtiments comprenant le château à tourelle du XVIe siècle et une aile du XVIIe ou XVIIIe couverte d'un comble à la Mansard ; un bâtiment de communs dans la cour intérieure. Vestiges de corbeaux d'anciens mâchicoulis. Ce château est un exemple caractéristique des demeures dont les propriétaires devaient assurer leur sécurité par des ouvrages de défense. \r\nBEAUVIRIE, manoir qui date du XVIe siècle et inscrit aux M.H.  tour couvertes en lauzes.\r\n MAUSSAC  date des XVe et XVIe siècles. C'est une Gentilhommière avec une tour de forme carrée du XVIIe siècle, flanquée d'une tourelle couverte par un comble en pavillon orné d'une lucarne à pilastres et fronton et flanquée, sur un angle, d'une tourelle en grès rouge couverte en poivrière. Cette tourelle est supportée par des assises en encorbellement et les étages sont séparés par des bandeaux moulurés. L'accès se fait par un portail du XVIIe siècle orné de pilastres et d'un fronton aigu, et coiffé d'une toiture rustique en forme d'auvent, est inscrit comme M.H. depuis le 17/12/1926.                                     BEAUREGARD date du XVe siècle. Il est inscrit aux M.H. depuis le 17/12/1926. . \r\n BREUIL pas d'information historique.","habitants":"Officiers de la vicomté \r\n        \"","divers":"Six châteaux sur Collonges la Rouge. Beauverie gr-1, Beaurival gr-2,  Friac, Martret gra-3-4, Benge gr-5-6, Beauregard, Breuil et  Maussac gr-7,                        Beauverie  GPS : 45° 03' 40\" Nord, 1° 39' 18\" Est     Martret   GPS : 45° 03' 40\" Nord, 1° 39' 18\" Est     Maussac GPS : 45° 03' 40\" Nord, 1° 39' 18\" Est.  Beauregard    GPS : 45° 03' 40\" Nord, 1° 39' 18\" Est.    Breuil GPS : 45° 03' 40\" Nord, 1° 39' 18\" Est","gps":"45° 03' 40\" Nord, 1° 39' 18\" Est     Martret   GPS : 45° 03'","images":["../image/image_19/19_Collonges_Rouge_1.jpg","../image/image_19/19_Collonges_Rouge_2.jpg","../image/image_19/19_Collonges_Rouge_3.jpg","../image/image_19/19_Collonges_Rouge_4.jpg","../image/image_19/19_Collonges_Rouge_5.jpg","../image/image_19/19_Collonges_Rouge_6.jpg","../image/image_19/19_Collonges_Rouge_7.jpg","../image/image_19/19_Collonges_Rouge_8.jpg","../image/image_19/19_Collonges_Rouge_9.jpg"]},"Consult_chateau_formulaire52b9":{"id":"Consult_chateau_formulaire52b9","dept":"19","canton":"Allassac","commune":"Orgnac sur Vézère","nom":"Comborn","type":"Forteresse","periode":"X-XII-XV","histoire":"COMBORN, était un ancien oppidum au IXe siècle, puis deveint le berceau de la famille de Comborn au Xe siècle, et des vicomtes de Limoges aux XIIe et XIIIe siècles. Les seigneurs de cette forteresse: du  XIIIe siècle sur un éperon, des méandres de la Vézère, sur la rive droite de la rivière. L'une des plus anciennes et puissantes Vicomté du Limousin, célèbre par la lignée des Archambaud, dont Archambaud 1er surnommé \"la jambe pourrie\" s'illustra par sa violence et ses conquêtes territoriales.  Archambaud 1er, « le Boucher », vicomte de Comborn et de Turenne, fut le fondateur de la dynastie; Archambaud III fit massacrer plusieurs moines de l'abbaye de Tulle en 1070.\r\nPour se faire pardonner leurs turpitudes, les Comborn furent fondateurs ou grands bienfaiteurs d'abbayes. Archambaud VI de Comborn, son épouse Guicharde de Beaujeu fut chantée par les troubadours. La dynastie des Comborn s'éteignit précocement.  Les Lasteyrie, qui l'ont acheté en 1649, font reconstruire, en 1735, un castel à l'emplacement d'une partie du château ; c'est par ce castel que l'on pénètre aujourd'hui sur le site de Comborn.","architecture":"COMBORN,  subsiste des vestiges de la forteresse féodale en un logis du XVIIIe siècle. Dès le XVe siècle, le château est à l'abandon. En 1558, il est vendu aux Pompadour. Ce qui en reste brûle dans un incendie XVIe siècle, il reste la tour de guet du XVe siècle, la crypte, les ruines de la chapelle dun mur d'enceinte. La restauration du château de Comborn est en cours. Le château est inscrit aux M.H. depuis 1985","habitants":"Famille de Comborn\r\n        \"","divers":"Forteresse de Conborn. GPS : 45° 19' 23\" Nord, 1° 28' 26\" Est","gps":"45° 19' 23\" Nord, 1° 28' 26\" Est","images":["../image/image_19/19_Comborn_1.jpg","../image/image_19/19_Comborn_2.jpg","../image/image_19/19_Comborn_3.jpg","../image/image_19/19_Comborn_4.jpg","../image/image_19/19_Comborn_5.jpg","../image/image_19/19_Comborn_6.jpg","../image/image_19/19_Comborn_7.jpg"]},"Consult_chateau_formulaire32ab":{"id":"Consult_chateau_formulaire32ab","dept":"19","canton":"Uzerche","commune":"Condat sur Ganaveix","nom":"Condat_Ganaveix","type":"Château","periode":"XIV-XVIII","histoire":"a Condat Canaveix deux châteaux dont celui de Faugeras et  de Vernejoux.                                   CONDAT, les implantations seigneuriales y sont nombreuses mais de faible importance. Citons les Chenet au XIIIe siècle, les Lubersac XIIIe siècle, les Lesbolière, les Léris, les Latour, les Chavailles et surtout au XVIIIe siècle les Green-de-Saint-Marsault.\r\nFAUGERAS, en 1582, Pierre de Chavailles, lieutenant général à la sénéchaussée dUzerche est seigneur du lieu.\r\nCest au XVIIIe siècle. que la famille Green de Saint-Marsault, le vicomte François-Germain sera le 1er maire de Condat rachète le château aux de Chavailles. En 1789, la demeure est très délabrée, et finalement, elle est vendue en 1791 à la famille Delort qui le fait rebâtir (3 maires de Condat sont issus de cette famille).   Ces dépendances et parc accueillent  actuellement des personnes adultes handicapées         VERNEJOUX, appartenait en 1367 à Foucaut de La Tour, époux de Aloisa de Moulceone. Au XVe siècle, les hommages se font à Eymeri de la Tour domicilié à Salon la Tour, puis à Alain d'Albret. Au XVIIe siècle, Antoinette de la Tour épouse Henri Green de Saint-Marsault. En 1708, Louis Charles de Gibanel est seigneur de Vernejoux. Françoise Green de Saint-Marsault est la dernière abbesse de l'abbaye de Bonnesagne en 1780.","architecture":"FAUGERAS château du XVIIIe siècle,  cette structure sur plan en T  à deux niveaux dont le corps de logis en façade est prit entre deux tours carrées à trois niveaux toit à quatre pans. Faugeras est mentionné dans les cartulaires dUzerche et de Vigeois en 977 et vers 996-1020. En latin populaire, Faugeras filic-arias signifie ensemble de fougères.                                         VERNEJOUX, manoir du XVe siècle de plan carré à trois niveaux avec lucarnes sur comble, le corps de logis flanqué d'une tour ronde à trois niveaux également, au milieu des bois, fut un ancien repaire noble.","habitants":"Faugeras; famille Green de Saint-Marsault       Vernejoux;  Foucaut de La Tour\r\n        \"","divers":"Deux châteaux à Condat-Ganaveix; Faugeras gr-1-2-3-4 et Vernejoux gr-5-6","gps":"","images":["../image/image_19/19_Condat_Ganaveix_1.jpg","../image/image_19/19_Condat_Ganaveix_2.jpg","../image/image_19/19_Condat_Ganaveix_3.jpg","../image/image_19/19_Condat_Ganaveix_4.jpg","../image/image_19/19_Condat_Ganaveix_5.jpg","../image/image_19/19_Condat_Ganaveix_6.jpg"]},"Consult_chateau_formulairef72a":{"id":"Consult_chateau_formulairef72a","dept":"19","canton":"Sainte Fortunade","commune":"Cornil en Corrèze","nom":"Cornil","type":"Vestiges","periode":"XII-XV","histoire":"CORNIL, vestiges du XIVe siècle est une ancienne chevalerie distinguée. Elle parait être originaire du Limousin et avoir formé des établissements dans la vicomté de Turenne, dès le XIIe siècle. Pierre de Cornil fut l'un des onze nobles qui assistèrent, en 1143, à la sépulture de Boson II, vicomte de Turenne. Raimond de Cornil, fut archidiacre puis évêque de Cahors de 1280 à 1293. Importante famille, les Cornil participent aux premières Croisades. Jaubert de Malemort, marié à Aude, fille de Bernard II de Ventadour et de Marguerite de Beaumont fut seigneur de Cornil. Marguerite de Beaumont était la fille de Robert de Brienne, vicomte de Beaumont, qui était le petit-fils de Jean de Brienne, roi de Jérusalem, et de Bérengère de Castille.  En 1440, Jean de Toucheboeuf épousa en secondes noces Jeanne de Cornil. Ils quittèrent le Limousin pour s'établir en Quercy, au château de Clermont qui deveint le siège de sa maison et dont elle a pris le surnom. En 1595, pendant les guerres de religion une troupe de ligueurs s'empare de Cornil après l'avoir assiégé.  La maison de Cornil s'éteignit en 1541 par le mariage de Françoise de Cornil avec Gilbert Durfort, qui forma la branche de Prouilhac-de Roquenadelh, éteinte en 1648   À la Révolution, une grande partie sud du territoire de la paroisse de Cornil en a été détachée pour former la commune d'Aubazines.","architecture":"deux châteaux à Cornil  dont les vestiges de Cornilet,  le manoir  de Chapoulie.                                           Chapoulie (chapelle primitive), près de l'église, fut partiellement détruit pendant la Révolution mais madame de Bar étant bienveillante envers les Cornilois, en particulier en les soignant, ceux-ci ménagèrent le site qui fut surtout détruit par la suite en servant de carrière, et un autre château situé près de l'église sur un escarpement rocheux appelé le château haut, mais aussi appelé « Sucquet », dont il ne reste qu'une tour en ruines, et qui est inscrit au titre des M.H.","habitants":"Famille de Cornil\r\n        \r\n        \r\n        \"","divers":"Vestiges de Cornil et le château de Chapoulie","gps":"","images":["../image/image_19/19_Cornil_1.jpg","../image/image_19/19_Cornil_2.jpg","../image/image_19/19_Cornil_3.jpg","../image/image_19/19_Cornil_4.jpg","../image/image_19/19_Cornil_5.jpg","../image/image_19/19_Cornil_6.jpg"]},"Consult_chateau_formulaire7b1c":{"id":"Consult_chateau_formulaire7b1c","dept":"19","canton":"Naves","commune":"Corrèze et environ","nom":"Corrèze_Chaumeil","type":"Château","periode":"XV-XVII","histoire":"A Corrèze, quatre châteaux le Bech,  le Chaumeil et le Veyers, le Mazeau et la Seniorie \"mercure\"musée pour lesquel je n'est pas d'information historique.                MANOIR de CHAUMEIL  dit de Chastagnol du XV-XIX en Corrèze, chambres d'hôtes.                            BECH,  Marguerite de Fenis du Tourondel épouse, en 1668, François d'Albier, sieur du Bech. Il est procureur d'office de la baronnie de Corrèze. Ils font construire le château, leur descendance occupe de hautes fonctions bourgeoises à Tulle. La propriété passe par alliance, en 1777, à la famille Meynard de la Farge, puis à la famille de Braquilanges (Tiburce épouse Jeanne-Aline de Meynard), Le château du Bech, incendié vers 1900, a été reconsttuit depuis.\r\n VEYERS  Du XV-XVIe siècle- Veyers, ou Viers, seigneurie occupée en 1410 par le chevalier du nom. Veyers relevait à l'époque de Maumont et agissait pour les Ventadour. Il changea de propriétaire, fut ruiné par un incendie en 1594.  Les seigneurs hommageaient à la maison de Maumont à l'origine. Guillaume de Maruc, avocat d'une famille de Tulle, achète Veyers en 1652. A la suite d'alliance, la seigneurie passe à Pierre de Lescot, conseiller du Roi à Brive, puis à Charles de Maledent de La Cabane.  Mais Viers était primitivement de la paroisse d'Orliac et le village fut rattaché à Corrèze.","architecture":"MANOIR de CHAUMEIL  dit de Castagnol du XV-XIX à Corrèze, à 700 m d'altitude au coeur du Massif des Monédières, le château est situé dans un parc boisé de 16 hectares qui abrite de nombreux daims. La terrasse offre une vue panoramique sur le village de Chaumeil et les pays environnants.                               SENIORIE-Mercure  pensionnat du XIXe siècle situé dans le centre-ville, à proximité du musée Jacques Chirac et du château de Sédières.                                BECH du XVIII-XXe siècle avec ses quatre tours rondes.                                                                           VEYERS du XV-XVIe siècle flanque d'une tour carrée d'escalier et de deux tours rondes,  deux élégantes échauguettes sont ouvertes de brétèches. A la suite de cet incendie, le château de Veyers est restauré et embelli de portes sculptées ornées de frontons à pinacles.","habitants":"BEC;  Famille de François d'Albier,                                 VEYERS; Famille de Maumont\r\n        \"","divers":"A Corrèze quatre châteaux, Chastagnol gr-1 à 4, le Bech,  le Chaumeil gr 5-6 et la Seniorie gr-7","gps":"","images":["../image/image_19/19_Corr%c3%a8ze_Chaumeil_1.jpg","../image/image_19/19_Corr%c3%a8ze_Chaumeil_2.jpg","../image/image_19/19_Corr%c3%a8ze_Chaumeil_3.jpg","../image/image_19/19_Corr%c3%a8ze_Chaumeil_4.jpg","../image/image_19/19_Corr%c3%a8ze_Chaumeil_5.jpg","../image/image_19/19_Corr%c3%a8ze_Chaumeil_6.jpg","../image/image_19/19_Corr%c3%a8ze_Chaumeil_7.jpg","../image/image_19/19_Corr%c3%a8ze_Chaumeil_8.jpg"]},"Consult_chateau_formulaire93e0":{"id":"Consult_chateau_formulaire93e0","dept":"19","canton":"Brive la Gaillarde","commune":"Cosnac","nom":"Cosnac","type":"Château","periode":"X-XVI","histoire":"COSNAC, à la fin du Xe siècle la seigneurie Cosnac  en 1352, Bertrand de Cosnac,  obtient le chapeau de cardinal, nonce du pape Clément VI en tant que trésorier de l'église participe à la construction du Palais des Papes à Avignon.   Tout au long de leur histoire familiale, les Cosnac ont notamment donné de nombreux dignitaires à l'Église ce qui faisait dire à Saint-Simon : « dans cette famille on est évêque de père en fils ».  Au XVe siècle passe en marquisat. En 1530, Louis, en tant que premier écuyer de la reine et gentilhomme de François Ier, accompagne à Madrid le vicomte de Turenne (François de la Tour) pour signer le contrat de mariage entre François Ier et la sur de Charles Quint, En 1660  Daniel de Cosnac prononce le sermon de mariage de Louis XIV et de Marie-Thérèse d'Autriche, en 1697 l'héritière du château  Louise , fille de François de Cosnac  épouse le prince  des Pays-Bas et Espagnol,   Franz d'Egmont n'auront pas d'enfant,  en 1717 à la mort de l'héritière le chateau revient au Pignatelli, et Cosnac branche de Cosnac-Turenne Gabriel-Honré de Cosnac, fils de Jean seigneur de  d'Espeyruc épouse la veuve du président Duret et firent agrandir le château d'un nouveau corps de logis. Passe par succéssion aux Chalup et la demeure reste inoccupée à partir des années de 1960 en cours de restauration et inscrit au M.H. en 1987.    Aujourd'hui transformé en Ehpad.","architecture":"COSNAC, élégant édifice d'architecture classique, le corps principal du château bâti en pierre rouge et ocre élevé sur quatre niveaux, dont un soubassement, et comble avec lucarnes, il comporte sur ses deux façades  principales une travée centrale ornée de chaînes d'angles à bossages et couronne par un fronton, du centre du toit à la Mansart emmerge le sommet de la tour rectangulaire d'escalier date du XVe siècle, au nord s'élève un corps de bâtiment perpendiculaire, de même  élévation  que le  corps principal, il s'ordonne autour d'un avant corps  à trois travées surmonté d'un fronton triangulaire.  Le château est encore rénové par la famille au début du 1720  jusqu'en 1767 comme l'atteste des marques au charbon de bois sur un linteau de cheminée retrouvées lors des restaurations en 2001. L'aile nord, entre sobriété des lignes, respect des proportions entre comble et façade en faible saillie, au milieu du XIXe siècle. L'actuel parc du château recélait quelques années auparavant d'essences végétales agglomérées par la famille.","habitants":"Famille de  François de Cosnac \r\n        \"","divers":"Château de Cosnac","gps":"","images":["../image/image_19/19_Cosnac_1.jpg","../image/image_19/19_Cosnac_2.jpg","../image/image_19/19_Cosnac_3.jpg","../image/image_19/19_Cosnac_4.jpg","../image/image_19/19_Cosnac_5.jpg"]},"Consult_chateau_formulaire549a":{"id":"Consult_chateau_formulaire549a","dept":"19","canton":"St-Pantaléon de Larche","commune":"Chasteaux","nom":"Couzage","type":"Vestiges-Tour","periode":"XIII-XIV-XIX","histoire":"Trois châteaux à Chasteaux celui de Couzage, de Grandmont et celui de Chauzanel  du XIXe siècle style du XVIIIe siècle, et à deux kilomètres au sud château à Chartier-Ferrière.                                                          COUZAGE, du XIII-XIVe siècle d'après la typologie de ses ouvertures en arc brisé, il daterait de l'époque gothique, probablement du XIIIe siècle. A cette époque, en 1245, cette seigneurie appartenait au vicomte de Turenne. En 1659, par le jeu des alliances, il devient la propriété de la famille de La Rochefoucauld. En 1792, le château fut placé sous séquestre comme bien d'émigrés et vendu comme bien national en 1795.                                         GRANDMONT-BAS, propriété privée datant de fin XIXe début XXe siècle.  Ce château a appartenu à Charles de Lasteyrie qui fut ministre des finances  dans le gouvernement de Raymond Poincaré. Les jardins du château figurent à lInventaire général du patrimoine culturel depuis le 3 mars 2003.       CHARTRIER-FERRIERE, un château privé avec ses deux tours rondes est situé à proximité de léglise de Chartrier, pas d'information historique.","architecture":"COUZAGE, les vestiges du château , malgré leurs tailles importantes sont en état de ruines avancés. Ils s'organisent selon un plan rectangulaire et comportent une tour carrée, une chapelle, un corps de logis, une tour ronde avec escalier à vis, une autre tour carrée avec trace de mâchicoulis, des murailles.  A l'écart de l'ensemble principal, côté Est, une tourelle ronde basse se dévoile au fil d'un sentier en sous-bois. Le donjon (tour carrée) détone par son état de préservation. Construit entièrement en pierre de taille sur une hauteur de près de 20m et de 7m de côté, il a bénéficié  d'une restauration dans les années 1990.     GRANDMONT-BAS bâtisse imposante  de plan rectangulaire à quatre niveaux avec lucarnes sur comble dans la partie gauche sur pavillon saillant à toits brisé.                                                             CHAUZANEL de plan d'équerre à deux niveaux à toits brisés.","habitants":"Famille de La Rochefoucauld                               Grandmont; Charles de Lasteyrie\r\n        \"","divers":"Trois châteaux à Chasteaux celui de Couzage vestige gr-1-7, de Grandmont-Bas gr-9 et celui de Chauzanel gr-8","gps":"","images":["../image/image_19/19_Couzage_1.jpg","../image/image_19/19_Couzage_2.jpg","../image/image_19/19_Couzage_3.jpg","../image/image_19/19_Couzage_4.jpg","../image/image_19/19_Couzage_5.jpg","../image/image_19/19_Couzage_6.jpg","../image/image_19/19_Couzage_7.jpg","../image/image_19/19_Couzage_8.jpg","../image/image_19/19_Couzage_9.jpg"]},"Consult_chateau_formulaire34fd":{"id":"Consult_chateau_formulaire34fd","dept":"19","canton":"Beynat","commune":"Curemonte","nom":"Curemonte","type":"Château","periode":"XIV-XVII","histoire":"Plusieurs châteaux à Curemonte  du XIVe siècle celui  de Johannie, de Plas  et de St-Hilaire .      CUREMONTE, le premiers seigneurs cité au XIe siècle, le château-fort de Saint-Hilaire, il  a appartenut aux \"de Saint-Hilaire\", puis aux \"Aymard de Lostanges\" et au XVIe siècle passa à Gabriel de Cardaillac et à son épouse Anne de Plas, cette famille héritera des biens des Cardaillac. en 1830 les héritiers de Plas se défont des biens qu'il possédait à Curemonte vendu à la famille Dunoyer de Ségonzac intérressée par les terres, se succèdent le docteur Delord puis à son fils et en 1912 à Robert de Jouvenel,  ce dernier n'est autre que le frère cadet d'Henri le second mari de Colette lequel posséde Varetz le château de Castel-Novel,  à la mort des Jouvenel, Colette vend les châteaux aux Rochepierre et en 1972 passe aux Cantegreil.                    JOHANNIE bâtie au XIVe siècle, par les Jean. Jean en latin se dit Johannes, donc « château des Jean »,  dès le XIIIe siècle. On trouve trace de Hugues de la Johannie, damoiseau de Curemonte en 1405, qui rend hommage au vicomte de Turenne. Puis, la demeure est achetée par Sieur Lebrun. Il en dote sa fille qui épouse Pierre de Vassal en 1460. Mais les Vassal ont des dettes et ne peuvent entretenir cette maison, la demeure tombe alors en ruine. Au XVIe siècle, le château de la Johannie passe, par mariage, aux mains des Dambert puis à celle des Plas","architecture":"PLAS et de ST-HILAIRE , l'ouvrage défensif est reconstruit au XIV-XVe siècles le st-Hilaire  et en 1543 Jean de Plas construisit son château proche de 6 à 7 mètres. Situé près de l'entrée est formé de tour ronde et deux tours carrées, c'est une co-seigneurie, avec deux châteaux construits dans la même enceinte, Le château-fort de Saint-Hilaire,   posés en plein coeur des Vallées de la Sourdaire et du Maumont, le village de Curemonte s'étire sur un promontoire rocheux.  il date du XIIIe et XVIIe siècle, Un bâtiment rectangulaire a été ajouté au XVIIe siècle. La porte d'entrée est surmonté d'un cartouche aux armes de la famille de Plas et encadrée de pilastres à bossages. Les châteaux  réunis à l'intérieur d'une même enceinte, montent la garde de ce petit bourg médiéval,  une enceinte basse commune qui était gérée dans le cadre d'une co-seigneurie, le château de Plas est classé aux M.H. depuis 1991                                         JOHANNIE, en 1971, la demeure est à nouveau restaurée de style féodal. Revendue en 1987, elle ne cesse d'être entretenue sous la houlette de l'architecte des bâtiments historiques. Cette maison se compose de deux bâtiments en équerre. La tour carrée d'escalier située à la jonction des deux corps abrite l'escalier à vis qui dessert les deux bâtiments, sa façade, son toit, l'escalier à vis et ses quatre cheminées ont été inscrits à l'inventaire supplémentaires des M.H. le 22 novembre 1981.","habitants":"PLAS, Famille de Jean de Plas                                   ST-HILAIRE, au St-Hilaire                                   JOHANNIE, Sieur Lebrun\r\n        \"","divers":"Plusieurs châteaux à Curemonte  du XIVe siècle celui  de Johannie gr 4, de Plas gr-5 et de St-Hilaire gr-5    GPS : 45° 00' 00,25\" Nord, 1° 44' 33,88\" Est Plas st-Hilaire GPS : 45° 00' 04\" Nord et 1° 44' 34\" Est","gps":"45° 00' 00,25\" Nord, 1° 44' 33,88\" Est Plas st-Hilaire GPS :","images":["../image/image_19/19_Curemonte_1.jpg","../image/image_19/19_Curemonte_2.jpg","../image/image_19/19_Curemonte_3.jpg","../image/image_19/19_Curemonte_4.jpg","../image/image_19/19_Curemonte_5.jpg","../image/image_19/19_Curemonte_6.jpg"]},"Consult_chateau_formulaire3de1":{"id":"Consult_chateau_formulaire3de1","dept":"19","canton":"Meymac","commune":"Darnets","nom":"Darnets","type":"Château","periode":"XV-XVI-XVII","histoire":"Deux châteaux à Darnets Fontmartin et Lieuteret.          FONTMARTIN,  château reconstruit au 4e quart du XVIe siècle par la famille des Chassaing seigneurs de Fontmartin   jusqu'en 1586,                         LIEUTERET, au XIVe siècle, cette demeure fut possessionnée par les Liouteyres, alias Lieuteret. Plus tard, elle passa aux Paulemarde qui eurent des charges dans la province. Ils étaient alliés notamment à Agnès Sorel, la maîtresse de Charles VII. La dernière de la branche, Renée, se maria en 1520 avec son voisin Louis de Soudeilles, seigneur dudit lieu.  C'est par cette alliance que les Soudeilles s'implantèrent au Lieuteret et s'y perpétuèrent jusqu'à la veille de la Révolution (1785). Le château fut transformé au goût du jour à la Renaissance, vers 1540. Au XVIIe siècle, peu après 1632, Anne de Soudeilles, capitaine des gardes du duc de Montmorrency, gouverneur du Languedoc, reçoivent le titre de marquis. La duchesse de Montmorrency, Marie-Félice des Ursins, petite-nièce du pape Sixte-Quint était à la tête d'une immense fortune Henri II de Montmorrency, maréchal de France, avait été décapité à Toulouse le 4 octobre 1632, devant la statue du roi Henri IV son parrain. Son héritier Louis-François de Paul de Soudeilles était baron de Druys en Nivernais, par sa femme. Sa fortune était fort obérée; il céda son château et ses terres de Corrèze, le 8 juillet 1785, à Raymond de Maynard de Maumont. Cette dernière famille s'est alliée en 1838 à la maison de Vaublanc, d'origine bourguignonne, qui la possède actuellement.","architecture":"FONTMARTIN, du XV-XIXe siècles Chapelle du XVe siècle ; reprise au XIXe siècle, d'après les armoiries sur porte de la tour d'escalier ; agrandissements du corps de logis au XVIIe et au XIXe siècles.                 LIEUTERET, le château fut transformé au goût du jour à la Renaissance, vers 1540. Au XVIIe siècle, peu après 1632, Anne de Soudeilles,  fit raser une partie du manoir à l'exception de deux tours reliées entre elles par un mur à créneaux. La demeure qu'il fit bâtir est un pur style de l'époque. C'est celle que nous avons devant nos yeux, avec ses deux pavillons carrés. Construction massive avec ses hauts toits fort inclinés, avec au centre un clocheton bulbeux, elle se compose de trois corps de logis se joignant à angl
