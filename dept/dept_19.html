da l'un des membres illustres de cette famille, le général Jean-Baptiste Materre ( 1772-1843) dont la dépouille repose dans le cimetière. Dorothée et Jean-Luc de Corbier vous proposent trois chambres d'hôtes classées.","architecture":"Le château, datant du XVIIIe siècle, édifice oblong  à deux niveaux à huit travées avec pavillons sur flanc droit et gauche à deux niveaux et lucarnes sur toit à quatre pans avec prolongement sur l'arrière pour dépendances.","habitants":"Famille de Corbier\r\n        \"","divers":"Château  de St-Martin de Sepert","gps":"","images":["../image/image_19/19_St_Martin_Sepert_1.jpg"]},"Consult_chateau_formulairec7e3":{"id":"Consult_chateau_formulairec7e3","dept":"19","canton":"St-Pantaléon de Larche","commune":"Saint-Pantaléon de Larche","nom":"St_Pantaléon_de_Larche","type":"Château","periode":"XVII","histoire":"Deux châteaux à Saint-Pantaléon, Cramier et Larches.                                                                  CRAMIER,  propriétaire  Bernard de Lavalette. À 87 ans, cet ancien publicitaire à la retraite possède le château de Cramier, datant du XVe siècle, situé sur le territoire de la commune de Saint-Pantaléon-de-Larche en Corrèze. En 1969, il rachète cette propriété partie intégrante du patrimoine familial des de Lavalette depuis 1764.   Lavarde   Jean-Baptiste Théodore Latreille de Lavarde (1805-1883), petit neveu du précédent maire , de 1830 à 1858. Cest sous sa magistrature que fut construit le premier pont, grace à une participation  des utilisateurs. Jean-Baptiste Louis Gustave Latreille de Lavarde (1834-1905), fils du précédent maire, de 1858 à 1864 et de 1870 à 1893. Le docteur Raoul Blusson était un descendant de Raymond Latreille de Lavarde, le plus jeune fils de lémigré, qui habitait à la Chatonie et qui avait épousé une demoiselle Conchard de Vermeil (elle même soeur dun maire de Saint-Pantaléon).","architecture":"Le château de Cramier : ce château du XVIIe siècle est inscrit pour ses façades et toitures depuis 1991 au titre des M.H. Il possède un parc arboré sur les bords de la Vézère. Une partie des bâtiments sert à lélevage de volailles, une autre est en ruines.Le nouveau propriétaire restaure les 900 m2 du logis principal, remet en état les trois corps de ferme et transforme les 16 hectares de prés en un superbe parc aux essences darbres rares.  Le châtelain ne cache pas que conserver une demeure comme la sienne reste un luxe. \r\nLe château de Lavarde, XVIIe siècle Lavarde, Larches Les bâtiments actuels sont construits selon un plan rectangulaire enclosant une grande cour de ferme. Le corps de logis à sa façade à lEst, vers la Vallée de la Vézère ; il a un étage de chambres mansardées surmontées dun grand grenier sur toute sa surface.","habitants":"Famille de Cramier\r\n        \r\n        \"","divers":"Deux châteaux à saint-Pantaléon, Cramier gr 1-2 et Larches gr 3.","gps":"","images":["../image/image_19/19_St_Pantal%c3%a9on_de_Larche_1.jpg","../image/image_19/19_St_Pantal%c3%a9on_de_Larche_2.jpg","../image/image_19/19_St_Pantal%c3%a9on_de_Larche_3.jpg"]},"Consult_chateau_formulairea595":{"id":"Consult_chateau_formulairea595","dept":"19","canton":"Ste-Fortunade","commune":"Saint-Priest de Gimel","nom":"St_Priest_Gimel","type":"Château","periode":"XVII","histoire":"ST-PRIEST, la seigneurie et le château de St-Priest possession des Gimel qui firent construire un premier château qui passa dans la famille des Sédières dont le fief est de Clergeoux. Gimel passe  au XVIIe siècle  à la famille de Lantillac, en 1643 Philiberte de Sédières  épouse François de Lantillac  qui lui apporte  en dot St-Priest, au début du XVIIIe siècle est acquis  par François de Rabanide  anobli trésorier de France.  En 1727 construction du château  de style régence sur une hauteur dominant la vallée de la Montane. Par alliance la nièce de François de Rabanide fait entrer la famille Valon à Saint-Priest importante famille qui possédait sous l'ancien régime le château  d'Ambrugeat, au XIXe siècle le comte  de Valon député de la Corrèze  maire de Tulle  et agronome réputé developpe le domaine, son fils ainé Alexis  épouse la fille du baron Delessert préfet de police de Paris et propriétaire du château de Sédières, lui succède à Saint-Priest  mais meurt noyé dans l'étang de Ruffaud  en 1851, le domaine échoit à son frère Léon  de Valon époux d'Apollonie de la Rochelambert, député et conseiller général de l'Eure. Cette lignée se termine en 1887 et sa femme en 1904.  En 1912 leur fils René de Valon qui réside au château de  Rosay vend St-Priest à monsieur  Delpeuch député de la Corrèze, en 1924 le château est acquis par Albert de Geouffre de la Pradelle qui possédait le château de Chabrignac sous l'ancien régime, toujours dans la famille de la Pradelle.","architecture":"Château construit  en 1727 de plan massé comporte un rez-de-chaussée surélevée, un étage carré et un étage de comble, il comporte sur la façade principale au sud-ouest un avant corps à trois travées amorti d'un large fronton triangulaire la façade au nord-est au revers reproduit la même ordonance, caractéristique du style, Régence, les séparations entre les niveaux sont soulignés par des  cordons moulurés et une importante corniche court à la base du toit, l'édifice a changé au XXe siècle la forme du toit était au paravant à la Mansard.","habitants":"Famille de  Lantillac\r\n        \"","divers":"Château de St-Priest de Gimel","gps":"","images":["../image/image_19/19_St_Priest_Gimel_1.jpg","../image/image_19/19_St_Priest_Gimel_2.jpg","../image/image_19/19_St_Priest_Gimel_3.jpg"]},"Consult_chateau_formulaire9511":{"id":"Consult_chateau_formulaire9511","dept":"19","canton":"Objat","commune":"Saint Robert","nom":"St_Robert","type":"Château","periode":"XIV-XVI","histoire":"SAINT-ROBERT; château Beauroire, d'Aragon, Pavillon de Noailles, et la demeure Verneuil attenante à la porte de la ville datant du XIIe siècle. Le château est la propriété des Verneuil depuis 1471. Il est donné aux Noailles en 1695 et vendu aux d'Armazits.\r\nEn contrebas du village se trouve le lieu-dit de Saint-Maurice qui abrite une fontaine miraculeuse faisant l'objet d'un pèlerinage annuel le 15 août.\r\nLes châteaux Beauroire et dAragon, le Pavillon de Noailles, construit sous Louis XII et qui fut la propriété de la famile Rocher dont le fils écrivit le roman \"Jules et Jim\" à Saint-Robert, la maison Seguin, la maison Verneuil, la chapelle du château Verneuil, le bâtiment monastique, plus ancien édifice de la commune et datant du XIIe siècle, les échoppes médiévales.\r\nNOAILLES, demeure seigneuriale fortifiée, construite sous Louis XII.\r\nARAGON, demeure du XIVe siècle, repaire noble dAragon provenant de la femme du comte de Noailles Jeanne Germaine dEspagne, issue de la famille royale de Castille.","architecture":"ARMAZITS, propriété des Verneuil depuis 1471.  Donnée aux Noailles en 1695, puis vendue aux dAmarzit en lan IV (1796).\r\n  BEAUROIRE, château  du XIV-XIXe siècle.  Les de Beauroire,  sallièrent aux Calvimont et devinrent co-seigneurs de Saint-Robert.                                    NOAILLES, au début du XVIe siècle, il devient pavillon de chasse de la famille de Noailles. Remanié au début du XXe siècle dans le style Louis XIII.                         SENZOLES, ancien hôtel noble datant de la fin du XVIe siècle par sieur Du Burg. Cet édifice est intéressant par ses fenêtres ornées de cubes tronqués, ses meurtrières rondes ou allongées.         SEGUIN, maison noble amputée et remaniée au XIXe siècle autour dun escalier du XVIIe siècle.              VERNEUIL château du XVe siècle situé à l'ouest de la vieille ville de Saint-Robert, offre un style assez massif et austère sur sa partie Sud-Ouest. Cette construction d'environ 30 mètres de longueur. L'une de ses particularité qu'il formait avec l'ancienne porte fortifiée de la ville ( au milieu sur cette photographie ) un ensemble de défense. Une chapelle annexe fut construite au XVIe siècle. La partie Sud présente un style plus varié.","habitants":"Famille de Verneuil\r\n        \r\n        \"","divers":"Saint-Robert ; château Beauroire gr 2-3, d'Aragon gr-1, Pavillon de Noaillesgr 8, et la demeure Verneuil gr-4 -5  Seguin gr -6-7","gps":"","images":["../image/image_19/19_St_Robert_1.jpg","../image/image_19/19_St_Robert_2.jpg","../image/image_19/19_St_Robert_3.jpg","../image/image_19/19_St_Robert_4.jpg","../image/image_19/19_St_Robert_5.jpg","../image/image_19/19_St_Robert_6.jpg","../image/image_19/19_St_Robert_7.jpg","../image/image_19/19_St_Robert_8.jpg","../image/image_19/19_St_Robert_9.jpg"]},"Consult_chateau_formulaire584e-2":{"id":"Consult_chateau_formulaire584e-2","dept":"19","canton":"Meymac","commune":"Saint-Rémy","nom":"St_Rémy_Corrèze","type":"Château","periode":"XVII","histoire":"MIRANBEL-MADIALET-GASTINE. le chanoine Poulbrière désigne les Mirambel comme une branche cadette de la famille des seigneurs de Saint-Rémy, une paroisse proche de Sornac , dans la montagne limousine. Ces Mirambel avaient pour patronyme La Chassagne. Les Mirambel, de petite noblesse, étaient, eux aussi, dorigine chevaleresque, moins ancienne que les Chanac.","architecture":"Madialet   château du XVII-XIXe siècles tourelles et lucarnes.                                                                          Mirambel chateau du XIII-XVIIe siècles, donjon,  fossé et jardin. Au début du XX e siècle, Poulbrière écrit quil y avait encore au village de Mirambel, dans la commune de Saint-Rémy,  une ruine féodale, à la lisière de la forêt dIolet, dont la sépare la rivière de la Liège  et qui était « une importante châtellenie» . « depuis peu La tour s'est écroulée» .","habitants":"Famille de Mirandel\r\n        \r\n        \r\n        \"","divers":"Manoir de Madialet à St Rémy","gps":"","images":["../image/image_19/19_St_R%c3%a9my_Corr%c3%a8ze_1.jpg","../image/image_19/19_St_R%c3%a9my_Corr%c3%a8ze_2.jpg"]},"Consult_chateau_formulaire5e6e-2":{"id":"Consult_chateau_formulaire5e6e-2","dept":"19","canton":"Bort les Orgues","commune":"Saint-Victour","nom":"St_Victour","type":"Château","periode":"XV","histoire":"Saint-VICTOUR, la seigneurie appartient en 1326 à la famille d'Anglars (branche des maisons d'Ussel, Ventadour, Comborn). En 1532, le château est à Antoine d'Anglards, seigneur de Saint Victour et de Margerides. Françoise d'Anglards porte la seigneurie par mariage, à Jacques 1er de Seneterre en 1575, chevalier de l'Ordre du Roi. Jacques II de Seneterre épouse Marguerite de Bauves. L'abbé Gabriel de Fénis, prévôt de la cathédrale de Tulle, achète le château en 1726 pour son neveu Jean-Martial, ami de Lafayette, son fils René tente d'arracher Louis XVI à l'échafaud. Par alliance le château passe à Antoine de Chazettes de Bargues, colonel de la garde nationale à Ussel sous la Restauration. En 1921, Marguerite Chazettes de Bargues épouse Henry de Sambucy de Sorgue, directeur du vigueirat de Saint-Rémy de Provence.","architecture":"St-VICTOUR château du XVe siècle avec tour circulaire Le château se compose d'un bâtiment épaulé d'un pavillon carré; portes en ogives. Un autre bâtiment, flanqué de deux tours circulaires découronnées à la Révolution, qui vit les étangs convertits en pacage, les digues détruites et le pillage du château. A l'intérieur, belles cheminées.","habitants":"Famille d'Anglars\r\n        \"","divers":"Château de Saint-Victour","gps":"","images":["../image/image_19/19_St_Victour_1.jpg","../image/image_19/19_St_Victour_2.jpg"]},"Consult_chateau_formulaire0137":{"id":"Consult_chateau_formulaire0137","dept":"19","canton":"Ste-Fortunade","commune":"Sainte-Fortunade","nom":"Ste_Fortunade","type":"Château","periode":"XV","histoire":"Deux châteaux à sainte-Fortunade celui de Ste Fortunade et de la Morguie.                                          Sainte-FORTUNADE  Au début du XVe siècle, Lorigine du nom de la bourgade remonte sûrement à 1560, quand Catherine Fouchier de Sainte-Fortunade épouse Bonnaventure de Souries de Lavaur. Ce dernier est originaire du village de Lavaur dEspagnac. La famille de Lavaur de Sainte-Fortunade comporta de puissants seigneurs.  Cette famille offrit au royaume, un secrétaire du roi trésorier général au XVIIIe siècle, des chanoines et un chevalier de Malte. Pendant la guerre de 1870, trois officiers supérieurs occupèrent des rôles clés au sein de larmée française. La famille de Lavaur de Sainte-Fortunade sest séparée de son château dans les années 1950. Sous la Révolution Française, pour suivre un décret de la convention, la commune change de nom pour Fortunade. Le château de sainte-Fortunade du XVe siècle a été édifié par la famille des comtes de Lavaur de Sainte-Fortunade qui le possédaient encore jusqu'aux environs de 1950. Aujourd'hui, propriété de la commune.                     MORGUIE de MGR Berthaud, atteint par la vieillesse, monseigneur Berteaud démissionne le 3 Septembre 1878. Il meurt peu de temps après, le 2 Mai 1879, alors quil est retiré au « château de la Morguie », lune des résidences des évêques de Tulle.","architecture":"Le château de Sainte-Fortunade du XVe siècle Le château Comtal est édifié sur le promontoire dune ancienne motte féodale bien visible depuis la ruelle du « Barry-Bas ».\r\nUne forte tour ronde de quatre niveaux couronnée de mâchicoulis est la partie la plus ancienne avec le logis attenant de louest qui a perdu sa galerie défensive. Au XVe siécle fût adjointe laile rectangulaire flanqué de deux échauguettes et la tour qui encage lescalier à vis aux marches basses permettant à un animal bâté de les gravir. Lintérieur très restauré aux XVIIIe et XIXe siècles garde des pièces monumentales aux plafonds à la française et volumes majestueux. Les cheminées de marbre du XIXe aux blasons sculptés dissimulent et remplacent celles des siècles précédents. La tour escalier présente des encadrements de fenêtres ouvragés avec aussi des éléments de remploi et le blason des comtes orne son entrée.Le château, propriété communale depuis 1952, abrite les services de la mairie et des salles dexposition et de réunions.\r\nMORGUIE, du XVIIe siècle est partiellement inscrit depuis 1985, un petit manoir situé sur le territoire de la ommune de Sainte-Fortunade.","habitants":"Ste Fortunade Famille de Lavaur de Sainte-Fortunade  MORGUIE de MGR Berthaud \r\n        \"","divers":"Deux châteaux à Sainte-Fortunade gr 1-5 celui de Ste Fortunade et de la Morguie gr -7-8.","gps":"","images":["../image/image_19/19_Ste_Fortunade_1.jpg","../image/image_19/19_Ste_Fortunade_2.jpg","../image/image_19/19_Ste_Fortunade_3.jpg","../image/image_19/19_Ste_Fortunade_4.jpg","../image/image_19/19_Ste_Fortunade_5.jpg","../image/image_19/19_Ste_Fortunade_6.jpg","../image/image_19/19_Ste_Fortunade_7.jpg","../image/image_19/19_Ste_Fortunade_8.jpg","../image/image_19/19_Ste_Fortunade_9.jpg"]},"Consult_chateau_formulaire7bb3-2":{"id":"Consult_chateau_formulaire7bb3-2","dept":"19","canton":"ste-Fortunade","commune":"Clergoux","nom":"Sédières","type":"Château","periode":"XV-XVI","histoire":"SEDIERES,  bâti à Clergoux,  sa construction par la famille de Sédières date du XVe au XVIe siècle,  porte la date de 1535. Il appartient aujourd'hui au conseil général. Le château de Sédières organise, chaque année, le Festival de Sédières, de Juin à Septembre, il demeurera, au cours des siècles suivants, à peu près tel que l'avait transformé Dominique de Sédières .","architecture":"SEDIERES, l'ensemble en U, Un bâtiment qui abrite l'entrée, de moindre importance, lui est accolé perpendiculairement. De forme de fer à cheval irrégulier, avec un corps de logis principal de deux étages et un troisième mansardé, flanqué à un angle d'une tour rectangulaire surélevée l'ancien donjon. Au rez-de-chaussée, la voûte en forme de anse de panier est ornée de clefs pendantes finement sculptées : sur l'une d'elle se lit encore, à moitié détruit, le blason des Boutier, seigneurs de Sédières (« d'azur au chevron d'or, accompagné de trois palmes de même »). Un large escalier de pierre, à la romaine, entre les grandes salles et les cuisines situées au rez-de-chaussée du donjon, permet d'accéder au premier étage. Les pièces y donnent, côté cour, sur une galerie reproduite également à l'étage supérieur. L'ensemble est orné de tourelles sur culot sculpté, de fenêtres à meneaux et croisillons, de pilastres et de linteaux sculptés de style Renaissance, une grande salle présente des nervures à arc en anse de panier et grande cheminée du XVIe siècle. Le porche d'accès de l'ancien pont-levis est situé dans une aile du château de Sedières,","habitants":"Famille de Sédières\r\n        \"","divers":"Château de Sédières à Clergoux,                          Sédière  GPS : 45° 17' 30\" Nord, 1° 56' 59\" Est","gps":"45° 17' 30\" Nord, 1° 56' 59\" Est","images":["../image/image_19/19_S%c3%a9di%c3%a8res_1.jpg","../image/image_19/19_S%c3%a9di%c3%a8res_2.jpg","../image/image_19/19_S%c3%a9di%c3%a8res_3.jpg","../image/image_19/19_S%c3%a9di%c3%a8res_4.jpg","../image/image_19/19_S%c3%a9di%c3%a8res_5.jpg","../image/image_19/19_S%c3%a9di%c3%a8res_6.jpg","../image/image_19/19_S%c3%a9di%c3%a8res_7.jpg","../image/image_19/19_S%c3%a9di%c3%a8res_8.jpg","../image/image_19/19_S%c3%a9di%c3%a8res_9.jpg"]},"Consult_chateau_formulaire23b8":{"id":"Consult_chateau_formulaire23b8","dept":"19","canton":"Objat","commune":"Ségonzac","nom":"Ségonzac","type":"Château","periode":"XV-XVIII","histoire":"Trois châteaux à Ségonzac le château de Ségonzac, de Puy-Val et Tireloubie.                            SEGONZAC,  c'est une possession des Vigiers, des la Faye et des Bardon de Segonzac, élevée en baronnie en 1623. On y remarque de nombreux réaménagements du début du XXe siècle, château classique. \r\n PUY-VAL,  construit en 1760 par un disciple de Victor-Louis un fronton aux armes de la famille Beaurayre de Villac qui  le fit construire, à été vendu à la Révolution comme bien national à un ancêtre du propriétaire actuel. \r\n TIRELOUBIE, du XIXe siècle chambre d'hôte et centre équestre.  A été bâti en 1880 sur une conception architecturale du XVIIIe siècle, par la famille Gignoux, l'aïeul avait été architecte du pont d'Iéna à Paris. Les murs internes sont décorés de peintures décoratives signées H.-P. Perrault, élève de Perrault et de Richemont. Aujourd'hui la Tireloubie propose des stages d'équitation à cheval et à poney dans un domaine de 85 hectares.","architecture":"PUY-VAL, du XV-XVIIIe siècle deux pavillons portail,  demeure construite en 1760, encore intacte extérieurement, à l'exception de quelques baies murées. Elle se compose d'un corps de logis avec avant-corps central et deux petites ailes en retour. Côté entrée un escalier en fer à cheval précède une terrasse. Côté opposé se trouve un fronton Les communs qui le flanquent à l'ouest sont de la même époque. Le château est entouré d'un parc paysager. L'intérieur présente un ensemble de pièces ayant conservé leur décor d'époque avec quelques remaniements du XIXe siècle. En dehors de ce château du XVIIIe  siècle, il existe un vieux château des XVe-XVIe siècles avec tour d'escalier hors-oeuvre, une chapelle du XVIIe siècle avec voûtement sur croisées d'ogives, deux pavillons isolés du XVIIIe siècle. Eléments protégés M.H : les façades et les toitures et l'escalier intérieur du vieux château, les façades et les toitures du château et des deux pavillons du XVIIIe siècle. L'ancien portail, l'escalier intérieur avec sa rampe en fer forgé et les pièces suivantes avec leur décors: au rez-de-chaussée : bibliothèque, billard, salon, petit bureau. Au premier étage : la chambre de maître avec son alcôve.        TIRELOUBIE, les murs internes sont décorés de peintures décoratives signées H.-P. Perrault, élève de Perrault et de Richemont.","habitants":"Famille Beaurayre de Villac                                     Famille Gignoux\r\n        \"","divers":"Trois châteaux à Ségonzac le château de Ségonzac gr 4 -5-6, de Puy-Val gr 1 à 3 et Tireloubie gr 7-8.","gps":"","images":["../image/image_19/19_S%c3%a9gonzac_1.jpg","../image/image_19/19_S%c3%a9gonzac_2.jpg","../image/image_19/19_S%c3%a9gonzac_3.jpg","../image/image_19/19_S%c3%a9gonzac_4.jpg","../image/image_19/19_S%c3%a9gonzac_5.jpg","../image/image_19/19_S%c3%a9gonzac_6.jpg","../image/image_19/19_S%c3%a9gonzac_7.jpg","../image/image_19/19_S%c3%a9gonzac_8.jpg"]},"Consult_chateau_formulaire75a1":{"id":"Consult_chateau_formulaire75a1","dept":"19","canton":"Uzerche","commune":"Ségur le Château","nom":"Ségur_Corrèze","type":"Vestiges","periode":"XII-XV","histoire":"SEGUR; berceau des ancêtres d'Henri IV.   l'édification d'un château par les vicomtes de Limoges du XII au XVe siècle lui donne sa vocation de place forte.  Les comtes de Périgord avaient obtenu du roi Philippe VI, en 1343, le droit de tenir un tribunal de premier appel. Cette « cour des appeaux » jugeait en premier appel entre les justices ordinaires seigneuriales et le Parlement de Bordeaux. En 1468, la vicomté de Limoges passe par alliance aux Albret, en la personne dAlain dAlbret, trisaïeul dHenri IV. En 1582, François de Pérusse, comte des Cars, achète la seigneurie de Ségur. La famille Pérusse avait déjà acheté un grand nombre de maisons et dhôtels au siècle précédent avant dacheter le château et la seigneurie. Les Pérusse restèrent seigneurs de Ségur jusquen 1643, époque à laquelle lensemble de leurs territoires passèrent à la famille de Hautefort. Mais, la vicomté de Limoges avait été rattachée en 1607 à la Couronne après lavènement dHenri IV au trône de France. Depuis lors, le rayonnement et le dynamisme de la cité se réduisirent sensiblement. En 1750, la cour des appeaux fut supprimée par un édit du roi ; ainsi les familles bourgeoises quittèrent peu à peu Ségur entraînant ainsi le déclin de lactivité économique. En 1795, le château fut acheté aux Hautefort par lancien fermier, Gabriel Dumas-Lavareille, de la famille qui devient maire de Ségur. Aujourd'hui Patrick le Cerf en est propriétaire.","architecture":"Le chateau du XIIe siècle reste  d'une imposante forteresse à double enceinte le donjon en ruine au XVe siècle une grande bâtisse fut construite sur l'emplacement du château. Aujourd'hui inscrite sur la liste des plus beaux villages de France, cette cité médiévale pleine de charme a vraiment de quoi séduire les promeneurs amoureux de vieilles pierres. Un ensemble des plus pittoresques, avec sa paisible rivière, ses maisons anciennes et son château fort perché, fièrement campé sur un éperon rocheux, ce dernier conserve d'imposants vestiges du XIIe siècle. En contrebas, les vieilles demeures à colombages et à tourelles des XVe, XVIe et XVIIe siècles  tel la maison Fébrer  du XVe siècle témoignent de l'époque faste que connut le village par le passé. La maison Henri IV aux fenêtres à meneaux, la maison Boyer à pans de bois et encorbellement ou encore la tour Saint-Laurent en sont quelques remarquables exemples.\r\nLes ruines du château de Ségur, dont la chapelle est classée M.H. depuis 1840, le reste du château étant inscrit depuis 2005. Le château de Ségur se compose de deux parties : le château vicomtal, l'enclos aristocratique.","habitants":"Famille de François de Pérusse\r\n        \r\n        \"","divers":"Vestiges de Ségur                 Ségur GPS : 45° 25' 49\" Nord, 1° 18' 17\" Est","gps":"45° 25' 49\" Nord, 1° 18' 17\" Est","images":["../image/image_19/19_S%c3%a9gur_Corr%c3%a8ze_1.jpg","../image/image_19/19_S%c3%a9gur_Corr%c3%a8ze_2.jpg","../image/image_19/19_S%c3%a9gur_Corr%c3%a8ze_3.jpg","../image/image_19/19_S%c3%a9gur_Corr%c3%a8ze_4.jpg","../image/image_19/19_S%c3%a9gur_Corr%c3%a8ze_5.jpg","../image/image_19/19_S%c3%a9gur_Corr%c3%a8ze_6.jpg","../image/image_19/19_S%c3%a9gur_Corr%c3%a8ze_7.jpg","../image/image_19/19_S%c3%a9gur_Corr%c3%a8ze_8.jpg","../image/image_19/19_S%c3%a9gur_Corr%c3%a8ze_9.jpg"]},"Consult_chateau_formulaire833c":{"id":"Consult_chateau_formulaire833c","dept":"19","canton":"Meymac","commune":"Tarnac","nom":"Tarnac","type":"Château","periode":"XVII","histoire":"TARNAC,  châtellenie en la possession des Comborn en 1299, puis à la famille d'Aubert de 1356 à 1407, passe aux Bourbon Carency en 1451, vendu à la famille Beaupoil vers 1465, passe à la famille Lagrange de 1644 à 1789, enfin à la famille Souris de Reignac, par alliance aux Lagrange vers 1811 ; ne subsiste plus que le site en ruines au sommet du Puy Murat. Charles de Crémiers et Odile Lecointre, fille d'Étienne Lecointre qui a restauré le château de Tarnac au cours des années 1970.","architecture":"TARNAC, édifice du XVIIe siècle ; dépendances du XVIIIe et XIXe siècles ; daté 1768, sur linteau de grange ; à 500 m au nord-ouest du village","habitants":"Famille Souris de Reignac\r\n        \r\n        \"","divers":"Château de Tarnac","gps":"","images":["../image/image_19/19_Tarnac_1.jpg","../image/image_19/19_Tarnac_2.jpg","../image/image_19/19_Tarnac_3.jpg"]},"Consult_chateau_formulairebe84":{"id":"Consult_chateau_formulairebe84","dept":"19","canton":"Argentat","commune":"St-Geniez-ô-Merle","nom":"Tour_de_Merle","type":"Vestiges","periode":"XIII","histoire":"TOUR de MERLE, l'origine du site remonte à 1219. Une famille éponyme est attestée dès la fin du XIe siècle. Sept familles de seigneurs vont cohabiter ou se succéder à Merle, ce qui en fait un des sites majeurs de la co-seigneurie. Plusieurs tours de plan carré sont érigées sur le même site afin d'éviter à chaque famille de se disperser et de s'affaiblir. C'est ainsi que s'étagèrent sur cette presqu'île les seigneurs de Merle, Veyrac, Pesteils, Cafolenc, Carbonnières, Noailles, Saint Bauzile, d'Alboy. Au XIVe siècle, Merle comprend sept maisons fortes, deux chapelles et un village, possédés en indivision par sept seigneurs des familles de Merle, de Carbonnières, de Veyrac, et de Pestels. Pendant la guerre de Cent Ans, les Anglais prennent une tour et un château en 1371, puis doivent les restituer. Les calvinistes prennent la place et y installent une garnison en 1574 ; ils en sont chassés deux ans plus tard par les co-seigneurs. Cependant le site est abandonné par ces derniers qui préfèrent vivre dans des lieux plus agréables et surtout plus accessibles.","architecture":"La TOUR de MERLE il ne reste que des vestiges de ce castrum, réunion de maisons fortes se composant de sept châteaux groupés en trois ensembles surmontant le village de vingt cinq maisons environ, qui datent du XIVe siècle ou avant. Existent encore : les piles ruinées de la maison de la garde du pont, l'emplacement du pont-levis de Veilhan, la tour de Noailles et la tour de Pestel. La maison de Fulcon de Merle est attestée en 1365 et il subsiste les emplacements de la maison dite de Veilhan et de la seconde chapelle Sainte-Anne bâtie en 1674, ainsi que les vestiges des tours donnés comme étant celles du commandeur, prieur de Saint-Léger et de Saint-Bauzire.","habitants":"Famille de Merle\r\n        \"","divers":"Vestiges de la tour de Merle à Saint-Geniez-O-Mer,   GPS : 45° 03' 51,12\" Nord 2° 04' 28,92\" Est","gps":"45° 03' 51,12\" Nord 2° 04' 28,92\" Est","images":["../image/image_19/19_Tour_de_Merle_1.jpg","../image/image_19/19_Tour_de_Merle_2.jpg","../image/image_19/19_Tour_de_Merle_3.jpg","../image/image_19/19_Tour_de_Merle_4.jpg","../image/image_19/19_Tour_de_Merle_5.jpg","../image/image_19/19_Tour_de_Merle_6.jpg","../image/image_19/19_Tour_de_Merle_7.jpg","../image/image_19/19_Tour_de_Merle_8.jpg","../image/image_19/19_Tour_de_Merle_9.jpg"]},"Consult_chateau_formulairea532":{"id":"Consult_chateau_formulairea532","dept":"19","canton":"Séilhac","commune":"Treignac","nom":"Treignac","type":"Château","periode":"XV-XVI-XVII","histoire":"quatres châteaux à Treignac, Boisse ,  Veyrrière, Couderc et Monteil et Grand-Champs chambres d'hôtes.                                                                           TREIGNAC, à la Révolution, le château est entièrement détruit, non à cause de la Révolution mais avant tout à la suite de l'abandon par les seigneurs .\r\nBOISSE; manoir du XVII-XXe siècle devenu un lieu associatif Les Leynia de La Jarrige appartiennent à de vieilles familles du Limousin et d'Auvergne. Le père de Jean et de Louis est percepteur des contributions directes à Chamboulive, puis à Treignac. Il épouse à Treignac Jeanne Marie Jacqueline Forest de Faye le 29 mai 1871, née au château,  le 26 mai 1849, elle apporte en dot la propriété de Boisse avec son château, le moulin et d'importantes dépendances avec leurs terres. Jean Leynia de La Jarrige, l'auteur des carnets, naît à Chamboulive le 18 septembre 1875 et devient médecin otorhinolaryngologiste à Paris. Il épouse, le 11 juin 1904, Adrienne des Mazis, (1882  1934) et décède à Treignac le 10 janvier 1951               VEYRRIERE  chambres d'hôtes,                                    Chateau fort de Couderc du XVe siècle.         MONTEIL, manoir du XVII-XXe siècle.","architecture":"TREIGNAC  est bâti vers l'an 1000 sur un énorme piton rocheux, presque inaccessible, dans une boucle de la Vézère dénommée la presqu'île. C'est alors que naquit la ville murée, dont il reste la porte Chabirande. Les remparts sont détruits au début du XIXe siècle. La ville est gouvernée par quatre consuls. Ayant subi plusieurs mises à sac au moment des guerres seigneuriales (notamment par Rodrigue de Villandrando en 1438, d'où une nouvelle charte) et des guerres de religion lors du XVIe siècle, la ville est reconstruite à partir de la Renaissance, mais il ne reste avant tout que des maisons des XVIIe siècle, XVIIIe et XIXe siècles.","habitants":"Famille des Boisse\r\n        \"","divers":"quatre châteaux à Treignac, Boisse gr-1 ,  Veyrrière gr-4, Couderc et Monteil et Grand-Champs gr 2 chambre d'hôte.","gps":"","images":["../image/image_19/19_Treignac_1.jpg","../image/image_19/19_Treignac_2.jpg","../image/image_19/19_Treignac_3.jpg","../image/image_19/19_Treignac_4.jpg"]},"Consult_chateau_formulaire7e7d":{"id":"Consult_chateau_formulaire7e7d","dept":"19","canton":"Beynat","commune":"Tudeils","nom":"Tudeils","type":"Château","periode":"XV","histoire":"TUDEILS, au Moyen-Âge, plusieurs familles s'intitulent seigneurs de Tudeils :  en 1190 et 1204, Etienne de Tudeils, en 1415 Bertrand de Tudeils puis son fils Jean et sa fille Anne de Tudeils s'allie avec François d'Antissac au XVIe siècle, période de la construction du château actuel ; par différentes alliances, le château passe à la famille Green de Saint-Marsaud, Au XVe siècle, alliance avec les Saint-Marsaud qui possèdent un hôtel à Tulle et rendent hommage au vicomte de Turenne. Henry, Charles ou Jean-Jacques, vicomtes du Verdier d'Eyburie en Limousin. Ce dernier vend en 1718 à la famille de Gimel ;\r\nen 1365, le puissant chevalier Ademar d'Aigrefeuille de Gramat s'intitule seigneur de Tudeils et Lafon;  de 1415 à 1427, les Pierre Aymar de Lostanges, père et fils, reconnaissent des biens à Tudeils, le Mas de la Coste, le Chassan ou Chassaing, de même noble Hugues de Jean de Curemonte, fils de Pierre et petit-fils de Raymond en 1454. Au XIIIe siècle la seigneurie appartenait à Etienne de Tudeil.  En 1718, Charles de Saint-Marsaud vend le château à François de Gimel. La propriété passe au XIXe siècle à la famille de La Salvanie venue de Laguenne.","architecture":"TUDEILS, au XVe siècle, alliance  avec les Saint-Marsaud qui possèdent un hôtel à Tulle et rendent hommage au Vicomte de Turenne. Près de la route qui descend de Tudeils à Beaulieu, le château est édifié à flanc de coteau, il n'a plus la fière allure d'autrefois, disparition du donjon à cinq étages et de ses tours d'angle. Seule une courtine soutient la terrasse qui surveille la vallée. Une tour d'escalier, érigée au XVe siècle ouverte d'une porte blasonnée, est accolée au corps de logis dont les parures internes sont faites de boiseries du XVIIe siècle. Près de la route qui descend de Tudeils à Beaulieu, le château est édifié au  XV-XVIIe siècle à flanc de coteau, il n'a plus la fière allure d'autrefois, disparition du donjon à cinq étages et de ses tours d'angle.","habitants":"Famille de Tudeils\r\n        \"","divers":"Château de Tudeils","gps":"","images":["../image/image_19/19_Tudeils_1.jpg","../image/image_19/19_Tudeils_2.jpg"]},"Consult_chateau_formulaire389a":{"id":"Consult_chateau_formulaire389a","dept":"19","canton":"Tulle","commune":"Tulle","nom":"Tulle","type":"Château","periode":"XV-XVI","histoire":"Plusieurs châteaux à Tulle  celui de Tulle préfecture, Poissac, Loyac.                                                       TULLE est le chef-lieu du département de la Corrèze et abrite le siège du conseil général ainsi que la préfecture.  Furent reçus à déjeuner et invités à coucher au château, en 1895 Félix Faure, en 1913 et 1923 Raymond Poincaré, en 1942 le maréchal Pétain, en 1962 Charles De Gaulle et en 1982 François Mitterrand. Jacques Chirac fut accueilli à maintes reprises, mais aussi Edith Piaf, Simone Veil, Gaston Deferre, Jacques Delors et ce jour du 26 novembre 1967, Guerman Titov, le cosmonaute soviétique.          POISSAC  Les seigneurs de Poissac ont possédé la charge héréditaire de président du présidial de Tulle depuis la fondation de celui-ci, en mars 1636. Leur noblesse était connue depuis l'an 1333, mais leur terre ne fut érigée en baronnie qu'en 1770 pour Etienne de Jaucen de Poissac président du présidial de Tulle, conseiller au parlement de Bordeaux depuis 1755. Aux élections pour les états généraux, les petits hobereaux désignent le baron de Jaucen de Poissac contre le duc de Noailles.\r\nLOYAC  appelée autrefois maison de l'abbé,  du XVIe siècle; c'est l'édifice civil le plus remarquable de Tulle. Façade sur la place classée comme la maison et son intérieur sont inscrits comme M.H.","architecture":"TULLE,  préfecture, entreprise en 1864, la construction du château ne s'acheva qu'en 1880. Cet édifice, en briques et pierres de taille, s'inspire de la grande tradition de l'architecture Louis XIII, ce qui est très inhabituel en Limousin. De hauts toits d'ardoises coiffent la bâtisse. L'hôtel de la préfecture se décompose en trois corps représentant les trois arrondissements du département de la Corrèze : Tulle au centre, et Brive et Ussel de chaque côté. Chaque corps de bâtiment porte en son fronton les armes des différents chefs-lieux. Protégeant l'horloge, deux femmes, oeuvres du sculpteur Eugène Pierre Lefebvre, semblent regarder le temps passer, sans rides.                                                                          POISSAC, devant l'ancien manoir du XVe siècle, on a élevé le château situé au sommet de la \"Côte de Poissac\" à la sortie de Tulle, sur le plan classique du Bas-Limousin du XVIIe siècle, le château est composé d'un corps de logis flanqué de deux avant-corps. Il dépendait de la châtellenie de Chameyrat. La famille Béral avait installé là une brasserie aux XIXe et XXe siècles.","habitants":"Famille de Poissac\r\n        \"","divers":"plusieurs châteaux à Tulle  celui de Tulle prefecture, Poissac gr-4, Loyac","gps":"","images":["../image/image_19/19_Tulle_1.jpg","../image/image_19/19_Tulle_2.jpg","../image/image_19/19_Tulle_3.jpg","../image/image_19/19_Tulle_4.jpg"]},"Consult_chateau_formulaire4c30":{"id":"Consult_chateau_formulaire4c30","dept":"19","canton":"St-Pantaléon de Larche","commune":"Turenne","nom":"Turenne","type":"Vestiges-Forteresse","periode":"X-XII-XV","histoire":"TURENNE,  vers l'an 1000 apparut la lignée des Comborn-Turenne. Ils fondent une dynastie de Vicomtes qui se maintient à Turenne jusqu'au début du XIVe siècle. Au XIIe siècle, Raymond II acquiert des terres en Quercy au delà de la Dordogne. La vicomté compte alors sept villes et une centaine de paroisses. Après les Comborn, vinrent les Comminges au XIVe siècle, puis les Roger de Beaufort durant la guerre de cent ans. Parents de deux Papes d'Avignon, Clément VI et Grégoire XI, ils mettent la vicomté sous leur protection.  Les seigneurs de la Tour d'Auvergne leur succèdent de 1444 à 1738. D'Henry Ier de la Tour est né le célèbre maréchal de Turenne, fils cadet inhumé aux Invalides (1611-1675). De l'ascendant que lui donne sa positon géographique, la vicomté tire de substantiels avantages. Ces privilèges furent accordés par les rois d'Angleterre et de France. Le vicomte lève des troupes, bat monnaie, anoblit ses fidèles serviteurs, et ne dépend que du Roi. Ses sujets ne paient pas l'impôt du roi, ne logent pas ses soldats, et s'assemblent chaque années pour voter des subsides à leur vicomte. Jusqu'au rachat du domaine par le roi Louis XV en 1738 la vicomté était ce que l'on appelle aujourd'hui un paradis fiscal, pratiquement autonome de l'autorité des Rois de France, possédant même le droit de réunir des États. Ces libertés suscitent l'envie de leurs voisins et le dépit des fonctionnaires royaux. Ne dit-on pas \" fier comme un viscomtin.","architecture":"La Tour César, seul vestige du XIIIe siècle, témoigne de ces temps féodaux, le rez de chaussée du donjon du XIIIe siècle. Il serait antérieur à la tour de César. \r\nAutrefois le château occupait entièrement la plate-forme au sommet de la butte. Entouré d'un mur d'enceinte crénelé, percé de meutrières, il s'appuyait sur plusieurs tours. Les deux tours qui subsistent- au nord, la tour ronde, dite \"Tour de César » servait d'observatoire ;  au sud, la tour quadrangulaire, dite Tour du Trésor, ou de l'Horloge ou du donjon, défendait l'entrée du château. Entre les deux tours s'étendait un vaste corps de logis détruit au XVIIIe siècle qui fut somptueux,  le château est au centre d'un système de défense constitué de postes de guet contrôlant ce que lui cachent les plateaux et les collines. Ils se dressent à Nazareth, à Linoire et à la Gardelle, D'autre part, Henri de la Tour, au début des guerres de Religion, a entouré la forteresse médiévale d'une enceinte destinée à la protéger des progrès de l'artillerie. En témoignent la Tour du Calvaire et le bastion de Magal. Après la démolition du château, les habitants du bourg ont employés les pierres sculptées qui en provenaient, pour décorer leurs maisons. Il faut lever le nez et se tordre le cou pour apercevoir, ici une tête romane, là une porte de style flamboyant, ou au dessus d'une fenêtre, un fragment d'une pierre tombale.","habitants":"Famille de Beaufort\r\n        \"","divers":"Vestiges de Turenne","gps":"","images":["../image/image_19/19_Turenne_1.jpg","../image/image_19/19_Turenne_2.jpg","../image/image_19/19_Turenne_3.jpg","../image/image_19/19_Turenne_4.jpg","../image/image_19/19_Turenne_5.jpg","../image/image_19/19_Turenne_6.jpg","../image/image_19/19_Turenne_7.jpg","../image/image_19/19_Turenne_8.jpg","../image/image_19/19_Turenne_9.jpg"]},"Consult_chateau_formulaire8e88":{"id":"Consult_chateau_formulaire8e88","dept":"19","canton":"St-Pantaléon de Larche","commune":"Turenne","nom":"Turenne_Chateaux","type":"Château","periode":"XV-XVIII","histoire":"Plusieurs châteaux à Turenne, dont celui de Turenne  de Coutinard de Chabannes et la tour de l'Horloge. Maison Livet du XVe siècle. Maison Duché du XVIe siècle. Maison Cheyroux du XVe siècle. La maison des Chanoines. Château de Linoire du XVe siècle. Chateau de la Pérouse du XVIIIe siècle  parmi les plus beau de France,   maison Vachon, demeure des consuls de Turenne au XVIe siècle.                   LINOIRE  bâti à Turenne. La construction date du XVe siècle. Le château de Linoire est inscrit pour une partie aux M.H. et classé pour l'autre aux M.H. Ancienne maison forte qui dépendait de la vicomté de Turenne dès le XIVe siècle, servant de poste de surveillance vers la vallée de la Dordogne. En 1522, une vicairie est fondée, desservie par un prêtre résidant. La chapelle daterait de cette époque. En 1738, la vicomté est vendue à la couronne, la seigneurie passe sous autorité royale et décline rapidement. \r\n La Tour de l'HORLOGE  appelée aussi la Tour du Trésor. Elle appartient à l'Etat et à  une personne privée.  La Tour de l'Horloge est classée aux M.H. depuis 1840 et 1890. Maison des Chanoines hôtel tenue par la famille Cheyroux.","architecture":"TURENNE  Le château comprend un corps de bâtiment en deux parties accolées de hauteur inégale, flanquées à l'est, de part et d'autre, de deux tours dissemblables. Sur la façade sud, tour hexagonale dont la porte d'accès est ornée d'un chambranle à double mouluration avec un arc en accolade se prolongeant sur les piédroits jusqu'à une base buticulaire. La tour conserve, dans sa partie supérieure, des vestiges de mâchicoulis. A l'intérieur, grand escalier à vis en grès rose de Collonges, et blanc, couvert d'une calotte en pierre. Sur la façade nord, une tour circulaire surplombe le ravin. Le bâtiment le moins élevé servait autrefois de pressoir puis, au XIXe siècle, de bergerie.                                  La Tour de l'HORLOGE  appelée aussi la Tour du Trésor est un château bâti sur un massif rocheux, qui s'élève au-dessus du bourg. Il date du XIIIe et XIVe siècle. Il n'en reste plus qu'une tour ronde appelée la \"Tour de César\", ainsi qu'un donjon rectangulaire connu sous le nom de Tour de l'Horloge ou du Trésor, tous deux reliés par une maçonnerie.\r\nCOURTINARD du XIX-XXe siècles Transformé en hôtel.                                                                              La maison des CHANOINES  hôtel de charme située au coeur du site prestigieux de Turenne, est une demeure du XVIe siècle avec tout ce que cela implique porte d'entrée sculptée de style gothique flamboyant, fenêtre à meneaux, escalier à vis, gargouille.","habitants":"de la vicomté de Turenne \r\n        \"","divers":"Châteaux de Coutinard gr 9 de Linoire Gr 4-5-6  des Péeouse gr-8 des Chanoines gr 7 et tour de l'horloge. Vachon gr-1  Chabanne gr 3  Turenne  GPS : 45° 03' 15\" Nord 1° 34' 57\" Est     L'Horloge  GPS : 45° 03' 15\" Nord 1° 34' 57\" Est","gps":"45° 03' 15\" Nord 1° 34' 57\" Est     L'Horloge  GPS : 45° 03'","images":["../image/image_19/19_Turenne_Chateaux_1.jpg","../image/image_19/19_Turenne_Chateaux_2.jpg","../image/image_19/19_Turenne_Chateaux_3.jpg","../image/image_19/19_Turenne_Chateaux_4.jpg","../image/image_19/19_Turenne_Chateaux_5.jpg","../image/image_19/19_Turenne_Chateaux_6.jpg","../image/image_19/19_Turenne_Chateaux_7.jpg","../image/image_19/19_Turenne_Chateaux_8.jpg","../image/image_19/19_Turenne_Chateaux_9.jpg"]},"Consult_chateau_formulairebb25":{"id":"Consult_chateau_formulairebb25","dept":"19","canton":"Ussel","commune":"Ussel","nom":"Ussel","type":"Château","periode":"XV-XVII","histoire":"à Ussel le château du Theil, des Ventadours, de la Borde de Devezy-Ebraly de Diègue, des Salles, et de la Mothe à la Tourette d'Ussel ( voir article).             USSEL et ses alentours de l'époque ont vu fleurir plusieurs châteaux. Hormis celui des Ventadours dont il ne reste que quelques traces, le château du Theil En 1885, il fut acheté par l'évêché pour y installer l'ancien collège.           \r\nLESPINASSE, La Tourette, ou la Petite Tour, était protégée par les donjons de deux châteaux, la Mothe et Lespinasse. Leurs châtelains avaient perçu le fort potentiel que représentait pour eux la Sarsonne. Descendant de Millevaches en forte pente, celle-ci fut canalisée pour alimenter les moulins et asseoir ainsi la puissance de leurs propriétaires. Le château était au XIVe siècle aux Andrieu, puis aux Soudeilles. Au XVIIIe siècle, il échoit à Martin Meynard de Lafarge par mariage avec Jeanne de Bar de Delpeyroux de Lespinasse, par succession il passa aux familles de Fontanges, de Selve, de Flayhac et Malengue. THEIL le premier seigneur connu est Raymond d'Orlhac en 1410, seigneur de La Meschaussée et du Pescher, époux de Marguerite de Noailles, dame de La Meschaussée. En 1515, le château appartient à Etienne de Solier, juge de Meyssac. Le Theil est acquis au XVIIe siècle par de Fenis lieutenant général au siège royal de Tulle. La propriété passe, au XVIIIe siècle, à Gédéon Andrieu, procureur de la vicomté de Turenne","architecture":"La BORDE date du XVe siècle fut remanié au XVIIe siècle aujourd'hui hôtel de charmes. \r\nl'EBRALY est un château bâti à Saint-Dezery-Ussel, date du XVe siècle.                                                                LESPINASSE est un château bâti à La Tourette-Ussel,  sa construction a débuté au XVe et s'est achevée au XVIIe siècle. Le château de Lespinasse est composé d'une tour de six étages construite au XIVe siècle, une chapelle également du XIVe siècle marquée de l'écu des Malengue de Lespinasse, les constructeurs de la demeure. On pénètre dans la cour après le passage d'une porte fortifiée, surmontée d'un logis défensif mâchicoulé et percé d'archères, on découvre un corps de logis reconstruit au XVIIe siècle.                                                                             MOTHE  est un château bâti à Ussel, la construction du château  date du XIVe au XVIe siècle, attesté en 1314, a été remanié au XVe siècle. Il a été restauré aux XVIIIe et XIXe siècles. Ses courtines ont disparu, le temps a déposé de nombreuses marques dans la pierre. Dans l'enchevêtrement formé par le grand corps de logis, l'ancien donjon, la tour ronde, la tour carrée, on peut voir les bretèches et une fenêtre qui date du XVe siècle.                                                   SALLES est un château bâtis à Ussel,  La construction  date du XVIIe siècle.                                                                     THEIL  du XV-XIXe siècle est un château bâti à Ussel, la construction  date du XVe siècle. Après avoir admiré l'architecture des pierres rouges établie sur les modèles des castels de Collonges la Rouge, demandez aux pierres de vous parler; les écus blasonnés sur le linteau de la porte vous raconteront leur histoire;","habitants":"Familles de Fontanges, de Selve, de Flayhac et Malengue.    \r\n        \r\n        \r\n        \"","divers":"Borde   GPS : 45° 32' 56\" Nord 2° 18' 36\" Est.       La Mothe  GPS : 45° 32' 56\" Nord 2° 18' 36\" Est        Theil  GPS : 45° 32' 56\" Nord 2° 18' 36\" Est gr-6","gps":"45° 32' 56\" Nord 2° 18' 36\" Est.       La Mothe  GPS : 45° 3","images":["../image/image_19/19_Ussel_1.jpg","../image/image_19/19_Ussel_2.jpg","../image/image_19/19_Ussel_3.jpg","../image/image_19/19_Ussel_4.jpg","../image/image_19/19_Ussel_5.jpg","../image/image_19/19_Ussel_6.jpg","../image/image_19/19_Ussel_7.jpg","../image/image_19/19_Ussel_8.jpg","../image/image_19/19_Ussel_9.jpg"]},"Consult_chateau_formulaire90e4":{"id":"Consult_chateau_formulaire90e4","dept":"19","canton":"Uzerche","commune":"Uzerche","nom":"Uzerche","type":"Château","periode":"XV-XVII","histoire":"A Uzerches château de Becharie, de Maubec,  de Pontier, de Tayac et de Puy Grolier, dont la plupart je n'ai pas d'information historique.\r\nBECHARIE appelé aussi l'hôtel de Clédat se distingue en son intérieur, par un ensemble de fresques réalisées par Michel et Antoine Cibille, deux artistes corréziens originaires de Darnets. propriété de la commune.\r\nPONTIER construit au XVIe siècle par la famille Pontier remanié au XVIIe siècles maintenant hôtel des Besse du Peyrat: il fut la demeure des consuls de la ville dUzerche et présente deux tours en poivrière. Martial Besse du Peyrat fut lieutenant particulier auprès du sénéchal en 1722. Une de ses descendantes épousa Jean Pontier, également lieutenant particulier en 1777, est inscrit aux M.H.depuis 1932  Tour du Prince Noir en totalité : inscription  complété par arrêté du 28 février 2013.       TAYAC du XVIe siècle, inscrite à l'inventaire des M.H.   tourelle en poivrière et tour.                                             Maison Boyer Chammard  du XVIIe siècle, inscrite à l'inventaire des M.H.93 : fut la demeure des Clary de Saint-Angel. Elle devient en 1741 la propriété de Jean-François Chevallier. La maison fut la propriété des Besse de la Noaille au XVIIIe siècle. Cette demeure construite au XVIIe siècle appartenait aux Gauthier,  Elle se distingue par une tour en poivrière et une autre tour carrée, la porte de la tour carrée porte un écusson rappelant la légende des armes d'Uzerche.","architecture":"BECHARIE du XVe siècle, classé à l'inventaire des M.H. en 1907 : doté d'une architecture harmonieuse illustrée par ses belles toitures, le château Bécharie (ou hôtel de Clédat), est formé d'un ensemble de bâtiments aux moellons apparents. La Porte Bécharie est la seule porte subsistante des 3 portes de l'enceinte qui ceinturait la ville d'Uzerche. Les façades et la porte de la ville appelée la porte Barrachaude ainsi que diverses parties ont été classées par les M.H. en 1907 et 1987.                                                     PUY GROLIER  du XVI-XIXe siècle  élégantes tourelles.                                                                              MAUBEC  du XVIII-XIXe Siècle.  En 1792, le château a été incendié et fut reconstruit, au XIXe siècle.\r\nPONTIER, construit sur l'emplacement de l'oustal Besse du Peyrat, façades sur cour, escalier intérieur, cheminée monumentale sont du XVIe siècle. Des lambris ont été ajoutés au XVIIe siècle. Le bâtiment est constitué par un corps de logis rectangulaire flanqué, du côté de la Vézère, de deux tourelles circulaires d'angle. Un bâtiment rectangulaire en hors-oeuvre abrite l'escalier à double volée. La tour sud a une voûte en coupole faite de moëllons.  Aujourd'hui siège de la sénéchaussée.","habitants":"Famille Pontier\r\n        \r\n        \r\n        \"","divers":"A Uzerches le château  de Becharie gr-1,de Maubec gr 2-3,  de Pontier gr 4, de Tayac et de Puy Grolier Coordonnées par GPS : 45° 25' 32\" Nord, 1° 33' 51\" Est   Tour du prince noir GPS : 45° 25' 25,92\" Nord, 1° 33' 47,37\" Est","gps":"45° 25' 32\" Nord, 1° 33' 51\" Est   Tour du prince noir GPS :","images":["../image/image_19/19_Uzerche_1.jpg","../image/image_19/19_Uzerche_2.jpg","../image/image_19/19_Uzerche_3.jpg","../image/image_19/19_Uzerche_4.jpg","../image/image_19/19_Uzerche_5.jpg","../image/image_19/19_Uzerche_6.jpg","../image/image_19/19_Uzerche_7.jpg"]},"Consult_chateau_formulairefd18":{"id":"Consult_chateau_formulairefd18","dept":"19","canton":"Beynat","commune":"Collonges la rouges","nom":"Vassinhac","type":"Château","periode":"XVI","histoire":"VASSINHAC, construit en 1583, le castel de Vassinhac porte le nom des Vassinhac, seigneurs de Collonges, gouverneurs de la vicomté de Turenne. Collonges la Rouge. Si belle et séduisante, cette commune doit son surnom de « la Rouge » à la particularité du matériau avec lequel elle est construite, un grès rouge, contenant 2,6% doxyde de fer. Fait unique, le sol sur lequel est bâti le village est blanc. Cest dont dans une carrière avoisinante, toujours en activité, que les maçons de la Renaissance, tout comme avant, ceux du Moyen-âge, ont été extraire cette pierre au rouge intense. Elle a, par sa couleur, comme rubéfiée, donné ce cachet extraordinaire, à cet ensemble de demeures uniques et romantiques.","architecture":"Ce bel ensemble rue de la Garde, date du XVIe, une tour est millésimée 1583. Tout en grès rouge, le castel est une vaste demeure surmontée de deux tours hexagonales et d'une tourelle en poivrière. Des mâchicoulis et des meurtrières témoignent du caractère défensif de l'ensemble. Depuis 1932, le castel est classé M.H.  Deux tourelles en poivrière flanquent les angles de la façade sur rue. Elles sont surmontées d'un encorbellement mouluré.\r\nLes couvertures sont en grosses ardoises brutes du pays, le très beau château de « Vassinhac » avec sa tourelle dangle en poivrière, son corps de logis massif protégé par deux tours hexagonales, ses belles et hautes cheminées surmontent un haut toit à 2 pentes mansardé, couvert dardoises qui ont la particularité, dans ce pays, pour épouser létroitesse des sommets de toitures, daller en se rétrécissant, elles augmentent ainsi leffet de perspective qui rend les toits encore plus hauts quils ne sont. Des « Capucines » sorte de « fenestrous » permettent daérer et éclairer les combles. Des fenêtres à meneaux complètent le décor romantique de ce castel qui fait face à léglise St-Pierre de Collonges la Rouge.","habitants":"Famille de Vassinhac\r\n        \"","divers":"Vassilhac GPS : 45° 3' 35,28\" Nord, 1° 39' 18,72\" Est","gps":"45° 3' 35,28\" Nord, 1° 39' 18,72\" Est","images":["../image/image_19/19_Vassinhac_1.jpg","../image/image_19/19_Vassinhac_2.jpg","../image/image_19/19_Vassinhac_3.jpg","../image/image_19/19_Vassinhac_4.jpg","../image/image_19/19_Vassinhac_5.jpg","../image/image_19/19_Vassinhac_6.jpg"]},"Consult_chateau_formulaire69a1":{"id":"Consult_chateau_formulaire69a1","dept":"19","canton":"Egletons","commune":"Moustier de Ventadour","nom":"Ventadour","type":"Vestiges","periode":"XII","histoire":"VENTADOUR, vicomte de Ventadour, a vécu dans ce château et le troubadour Bernard de Ventadour y est né. De vicomté jusqu'en 1350, elle fut transformée en comté par Philippe de Valois, puis en Duché-Pairie en 1578. Elle appartient ainsi, successivement, à la « première race » des Ventadour, issu de la ligne de Comborn, jusqu'en 1472, date du mariage de la dernière héritière avec Louis de Lévis, baron de la Voulte. Après les Lévis-Ventadour, le fief échut, encore par mariage, aux Rohan ; et des Rohan-Soubises-Ventadour, passa aux Condé, qui s'en désintéressèrent. Vendu comme bien national, le château devint la proie des démolisseurs, surtout lorsqu'il fut acquis, à la Restauration, par un marchand de matériaux du nom de Pertuis du Gay. Il fut ensuite la propriété du duc de Lévis-Mirepoix qui le céda en 1988 à la commune de Moustier-Ventadour pour 1 Franc symbolique avec l'obligation de l'aménager pour permettre les visites guidées et libres en son sein. Classé site inscrit en 1946, le site déjà fort dégradé nécessitait des travaux important de sauvegarde. Ce n'est qu'en 1965 que furent entrepris à la fois quelques travaux de consolidation et des fouilles pour tenter de reconstituer l'ampleur de la forteresse d'autrefois.","architecture":"VENTADOUR, le château fort construit au XIIe siècle, remanié  au cours de plusieurs campagnes de construction et de reconstruction s'échelonnant pour l'essentiel du XIIIe au XIVe siècles, commandait la vicomté de Ventadour dont les capitales étaient Égletons, Ussel et Meymac. Par sa situation et sa formidable défense, le château semblait imprenable. Il fut cependant pris par trahison et, onze années durant, il resta aux mains de Geoffroy Tête-Noire pendant la guerre de cent ans. À l'époque de la Renaissance, les comtes abandonnèrent la forteresse, trop austère, pour s'installer à Ussel dans un élégant hôtel.  Vendu comme bien national,  le site déjà fort dégradé nécessitait des travaux importants de sauvegarde. Ce n'est qu'en 1965 que furent entrepris à la fois quelques travaux de consolidation et des fouilles pour tenter de reconstituer l'ampleur de la forteresse d'autrefois. Les fouilles poursuivies jusque dans les années 1980 ont permis de préciser les contours d'un certain nombre de salles à l'intérieur de l'enceinte et de mettre au jour plusieurs décors importants du logis seigneurial. Des campagnes de fouilles ont été conduites en 2003 (courtine nord-est), en 2004 et 2005 (barbacane, tour) avec des consolidations. Le château de Ventadour est en ruines,  De nouvelles campagnes de fouilles sont prévues d'ici les prochaines années.","habitants":"Famille des Ventadour\r\n        \"","divers":"Ventadour  GPS : 45° 23' 31,92\" Nord 2° 07' 0,12\" Est","gps":"45° 23' 31,92\" Nord 2° 07' 0,12\" Est","images":["../image/image_19/19_Ventadour_1.jpg","../image/image_19/19_Ventadour_2.jpg","../image/image_19/19_Ventadour_3.jpg","../image/image_19/19_Ventadour_4.jpg","../image/image_19/19_Ventadour_5.jpg","../image/image_19/19_Ventadour_6.jpg","../image/image_19/19_Ventadour_7.jpg","../image/image_19/19_Ventadour_8.jpg","../image/image_19/19_Ventadour_9.jpg"]},"Consult_chateau_formulaire5c3b-2":{"id":"Consult_chateau_formulaire5c3b-2","dept":"19","canton":"Uzerche","commune":"Saint-Ybard","nom":"Vernouille","type":"Château","periode":"XVI","histoire":"VERNOUILLE, les Pérusse, seigneurs de Saint-Bonnet les Rivière, Juillac, Allassac et Saint-Ybard, sont de grands seigneurs en l'an 1000, et possèdent déjà la Vernouille qui restera dans cette famille pendant des siècles. En 1350, le château est à Arnoul de Pérusse, époux de Marie de la Rivière, puis de Souveraine de Pompadour. En 1709, Bertrand fait héritier son neveu, Jean Descubes de Verliaguet. Au XIXe siècle, l'héritière se marie avec M. La Roche Sengesse, vice président du tribunal civil de Tulle, auteur d'une monographie de la commune.","architecture":"Vernouille, construit aux XVIe et XIXe siècles,  Entre Salon-la-Tour et Saint-Ybard, le vieux château bâti par les Pérusse était d'égale importance à celui de Garabuf dont il ne reste que des vestiges. La Vernouille comprenait cinq tours, d'énormes corps de logis flanqués de tours carrées. Près de l'étang où poussent les arbres (origine du mot la Vernouille: Vern en Celte), il reste encore deux tours rondes et deux tours carrées. Des portes ogivales blasonnées aux armes des des Car.  Loin de l'agitation citadine, véritable havre de paix dans une nature intacte et verdoyante de 70 Ha.","habitants":"Famille de  la Pérusse\r\n        \"","divers":"Château de Vernouille à saint-Ybard","gps":"","images":["../image/image_19/19_Vernouille_1.jpg","../image/image_19/19_Vernouille_2.jpg","../image/image_19/19_Vernouille_3.jpg","../image/image_19/19_Vernouille_4.jpg","../image/image_19/19_Vernouille_5.jpg"]},"Consult_chateau_formulaire9f65":{"id":"Consult_chateau_formulaire9f65","dept":"19","canton":"Allassac","commune":"Vigeois","nom":"Vigeois","type":"Château","periode":"XVI-XIX","histoire":"Deux châteaux à le Vigeois celui de Nauches et celui de Repaire.                                                                 NAUCHES du XVe-XIXe siècles, près de la puissante abbaye de Vigeois, un nombre respectable de magistrats sont chargés de régler les conflits entre les bénédictins d'Uzerche, les commerçants qui s'occupent des mines de fer et les laboureurs. Les membres de la famille de Nauche, établis au village de Naucha, ont des charges de juges et d'avocats. Ils sont prêtres à Vigeois. Au XVIIe siècle un édit de Louis XIV donne des lettres de noblesse à Jehan de Nauche pour ses vertus, ses mérites et bonnes qualités. François de Nauche est conseiller d'honneur au présidial de Brive au XVIIe siècle. Au XVIIIe siècle, Charles de Lamase, lieutenant général de la sénéchaussée d'Uzerche, conseiller secrétaire du roi, possède la Nauche parmi ses 30 domaines, il y nomme les juges.                                                 REPAIRE, le château du Repaire fut remanié à la fin du XIXe siècle. Ouvert sur terrasse et parc paysager. Les réceptions ont lieu dans les salons du rez-de-chaussée, découvrer le château du Repaire afin de faire de votre événement un moment inoubliable. Les réceptions ont lieu sur les terrasses et dans les salons du rez-de-chaussée, avec une pièce réservée au traiteur.","architecture":"NAUCHES du XV-XIX e siècles,   élevé au XVe siècle, sur un plan classique d'un corps de logis cantonné de tours, le château de la Nauche a gardé ses tours circulaires. La porte d'entrée est décorée de motifs sculptés en forme de ciboires et de crosses sans doute en l'honneur de Léonard de Nauche, archiprêtre de Vigeois en 1610.\r\nREPAIRE fut remanié à la fin du XIXe siècle. Ouvert sur terrasse et parc paysager.","habitants":"Famille de Nauche\r\n        \"","divers":"châteaux de Nauches gr 1-2 et de Repaire à Vigeois","gps":"","images":["../image/image_19/19_Vigeois_1.jpg","../image/image_19/19_Vigeois_2.jpg","../image/image_19/19_Vigeois_3.jpg","../image/image_19/19_Vigeois_4.jpg","../image/image_19/19_Vigeois_5.jpg","../image/image_19/19_Vigeois_6.jpg","../image/image_19/19_Vigeois_7.jpg","../image/image_19/19_Vigeois_8.jpg","../image/image_19/19_Vigeois_9.jpg"]},"Consult_chateau_formulairedca6":{"id":"Consult_chateau_formulairedca6","dept":"19","canton":"Objat","commune":"Yssandon","nom":"Yssandon","type":"Vestiges","periode":"XII-XVI","histoire":"A Yssandon  deux châteaux de Chalard du XVIIIe siècle  et la Tour du Puy (ruines).                               Au Moyen-Âge, les sires d'Yssandon, vassaux du comte de Limoges, font édifier un château régnant sur la région. Démantelé lors de la guerre de cent ans, il n'en reste plus au XVe siècle que la tour actuelle. Les vestiges de la tour du Puy d'Yssandon sont classés au titre des M.H. depuis 1963.","architecture":"Au sommet du Puy d'Yssandon, à l'entrée du petit village perché à 360 mètres d'altitude, la silhouette d'une tour se dessine. Ce site est très tôt connu pour sa situation défensive stratégique : un oppidum gaulois y aurait existé et Pépin le Bref y affronte Waïfre le duc d'Aquitaine au VIIIe siècle. Mais cette tour encore imposante et le dernier vestige d'un château médiéval qui est détruit pendant la guerre de cent ans au XVIe siècle. Aujourd'hui des tables de pique-nique permettent aux visiteurs de faire une halte en profitant d'un paysage de buttes et des beaux panoramas sur les alentours du Puy. Voici le dernier vestige de ce qui fût le château d'Yssandon, situé au sommet du Puy d'Yssandon ( 353 mètres de hauteur ). Les traces de ce château remonte dès le VIe siècle.","habitants":"les sires d'Yssandon\r\n        \"","divers":"Vestiges du Château d'Yssandon","gps":"","images":["../image/image_19/19_Yssandon_1.jpg","../image/image_19/19_Yssandon_2.jpg","../image/image_19/19_Yssandon_3.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','19 — Corrèze'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
