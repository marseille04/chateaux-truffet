ire":"MONTAIGNAC, à partir du XVIe siècle, la seigneurie vit différentes familles se succéder à la tête de la paroisse, par alliance, puis la seigneurie fut rachetée notamment par Me Pierre de Lestang, juge de Maumont le 31 mars 1618. La famille de Lestang qui avait la seigneurie à la Besse, village de la paroisse, fit alliance avec les Gain de Montagnac.\r\nMontagnac représente une seigneurie plus illustre que celle de la Besse. Le château est situé sur l'ancienne voie romaine de Bordeaux à Lyon et la route nationale qui l'a remplacée.\r\nEn 1796, le château fut acheté par Claude César Braquilanges habitant Mortegoutte commune du Doustre Lespinasse. (sous la Révolution, la paroisse de Saint-Hippolyte avait été débaptisée.) Il fut racheté en 1879 par l'Amiral de Montagnac, ex ministre de la Marine, qui en confia la reconstruction à un architecte de Tulle, Bardon. Ce fut le même qui changea le nom de Montagnac en celui de Montaignac.\r\nPropriété de la commune.","architecture":"MONTAIGNAC du XIXe sièxle, le  château fort attesté au Moyen-Age en grande partie détruit ; château reconstruit dans la 2e moitié du XVIe siècle, détruit ; aménagements intérieurs et extérieurs vers 1648 : cheminée, statues pour le parc ; édifice reconstruit en 1879 par F. Bardon, architecte, avec remploi des structures de l'ancienne tour carrée, de cheminées et d'anciens encadrements de baies ; armes du reconstructeur de l'édifice, l'amiral de Montaignac, sur lambris, parement et cheminée, accompagnées de la devise : profide propatria.","habitants":"Famille de Lestang\r\n        \"","divers":"Château de Montaignac à Saint-Hippolyte","gps":"","images":["../image/image_19/19_Montaignac_1.jpg","../image/image_19/19_Montaignac_2.jpg","../image/image_19/19_Montaignac_3.jpg"]},"Consult_chateau_formulaire4308":{"id":"Consult_chateau_formulaire4308","dept":"19","canton":"Egletons","commune":"La Chapelle-Spinasse","nom":"Mortegoutte","type":"Château","periode":"XVI","histoire":"MORTEGOUTTE  André-Marie-Achille Vernin, comte d'Aigrepont, châtelain de Mortegeoutte  et du Moulin-Neuf  ; veuf sans postérité; mort après 1898; avait épousé Gabrielle-Caroline de Braquilanges, née en 1841, morte en son château de Moulin-Neuf le 1er octobre 1908, à 61 ans, sans postérité ; aînée des deux filles de Gabriel de Braquilanges, maire de Saint-Hippolyte, vice-président du Comice agricole de la Corrèze.\r\nLa famille limousine de Braquilanges, titulaire de la seigneurie de Mortegoutte, était établie au XVIe siècle dans la paroisse de Chapelle-Spinasse . Ses armoiries ornent une des 4 chapelles de l'église Notre-Dame-de-la-Nativité.","architecture":"Le château de Mortegoutte date du XVIe siècle. Résidence privée, constitué de deux édifice presque identique a deux niveaux un avec toit en croupes et tour ronde  en façade, l'autre toit en deux pans plus dépendances que château.","habitants":"Famille limousine de Braquilanges\r\n        \"","divers":"Château de Moretegoutte à la Chapelle-Spinasse","gps":"","images":["../image/image_19/19_Mortegoutte_1.jpg","../image/image_19/19_Mortegoutte_2.jpg"]},"Consult_chateau_formulaire9848":{"id":"Consult_chateau_formulaire9848","dept":"19","canton":"Ussel","commune":"Tourette d","nom":"Mothe_Ussel","type":"Château","periode":"XII-XIV-XVIII","histoire":"La MOTHE, ce château est attesté depuis le XIIe-XIVe siècle. Il a appartenu au seigneur de la Mothe, vassal du duc de Ventadour. C'était un petit château de guet. \r\nAu XVe siècle, Guillaume, seigneur de La Brosse, seigneur de Saint-Pardoux et de la Gane, fait son testament à Meymac avant de partir au siège d'Orléans en 1428. Puis aux siècles suivants passent les de La Mothe alliés aux d'Anglards, les de Meilhards et de Vailh.   Ce château à appartenu à la famille de Castrie et à la famille de Fontange. D'héritage en héritage, il a appartenu à une vieille demoiselle qui l'a donné à une colonie de vacances de la banque. Il a été dégradé et les propriétaires actuels le restaurent petit à petit.","architecture":"La MOTHE, le château de la Mothe, attesté en 1314, remanié au XVe siècles, a été restauré aux XVIIIe et XIXe siècles. Les courtines ont disparu, la succession des siècles a laissé des marques dans la pierre.  façades et toitures de la tour rectangulaire ainsi que l'escalier à vis en bois ; la cheminée gothique au premier étage et les pièces suivantes avec leur décor : inscription par arrêté du 18 décembre 1980  \r\nchâteau des XIVe et XVe siècles, remanié au XVIIIe et surtout XIXe siècle. Il est entouré de vestiges de douves et d'une enceinte circulaire. Une tour rectangulaire à trois niveaux est imbriquée dans un corps de logis également rectangulaire, à un étage flanqué d'une tour ronde et d'une tour carrée. Un perron en hémicycle précède la tour d'escalier carrée, adossée à la façade sud de l'ancien donjon. L'élément le plus ancien en est l'ancienne tour rectangulaire qui a conservé, à l'extérieur, ses baies moulurées du XVe siècle, et deux bretèches sur la face nord. L'intérieur montre un escalier à vis en bois et une cheminée au premier étage. Boiseries néo-gothiques. Cheminée néo-gothique au rez-de-chaussée du corps de logis. Boiserie Louis XIII, cheminée et plafond Louis XVI au premier étage.  \r\n Dans l'enchevêtrement formé par le grand corps de logis, l'ancien donjon, la tour ronde, la tour carrée, on aperçoit les bretèches et une fenêtre du XVe siècle.","habitants":"Famille de Castrie\r\n        \"","divers":"Château de la Mothe à la Tourette d'Ussel","gps":"","images":["../image/image_19/19_Mothe_Ussel_1.jpg","../image/image_19/19_Mothe_Ussel_2.jpg","../image/image_19/19_Mothe_Ussel_3.jpg"]},"Consult_chateau_formulaire585d":{"id":"Consult_chateau_formulaire585d","dept":"19","canton":"Naves","commune":"Naves","nom":"Naves_Corrèze","type":"Château","periode":"XVI-XVII","histoire":"Trois châteaux à Naves celui de Bach, de Césarin et de Chaunac.                                                              BACH, le château de Bach inscrit par arrêté du 4 octobre 1993  Magistrat de formation, procureur général près la cour d'appel d'Aix-en-Provence au terme de sa carrière en 1879, Gustave Clément-Simon (1833-1909), propriétaire du château de Bach à Naves, La section des familles contient des dossiers essentiels d'archives des familles Baluze, de Comborn, Fénis, Maruc, Meynard, Montfrebeuf, de Pompadour,  de Roffignac, de Saint-Priest et de La Salvanie.    Bach, ancienne résidence de la famille Fenis de Laprade. En effet, quand M. Clément Simon achète le château du Bach à Ernest-Martial-Fenis de Laprade, il a terminé sa carrière de magistrat qui l'a emmené à Tulle, Auch, Toulouse et Aix.                                CESARIN  du XI-XIXe siècle cantonné de deux grosses tours.  H René Hippolyte Vidalin 1881-1918  marié avec Marcelle Faubert  dont  H Roger Vidalin 1907-1970  H Pierre Vidalin  1909- marié en 1943 avec Antoinette Garas dont : Chaunac du XVII-XIXe siècles.","architecture":"Bach: du XVI-XVIIe siècle   Le portail d'entrée du XVIIe siècle provient de l'ancien collège des Jésuites de Tulle. Vestiges d'un cloître gothique du XIVe siècle dans le parc. Style néo-gothique, Louis XIII, le château est bien significatif du goût éclectique d'un érudit de la fin du XIXe siècle. Il transforme la demeure, élève un oratoire et se consacre aux recherches historiques limousines. Sa collection d'archives ainsi que sa bibliothèque une grande partie  à été donné aux archives de Tulle, permettent aux historiens modernes de trouver de précieux documents pour leur recherches.","habitants":"Famille Fenis de Laprade                                              Famille Vidalin\r\n        \"","divers":"Trois châteaux à Naves celui de Bach gr 1-2-3, de Césarin gr 4et de Chaunac","gps":"","images":["../image/image_19/19_Naves_Corr%c3%a8ze_1.jpg","../image/image_19/19_Naves_Corr%c3%a8ze_2.jpg","../image/image_19/19_Naves_Corr%c3%a8ze_3.jpg","../image/image_19/19_Naves_Corr%c3%a8ze_4.jpg","../image/image_19/19_Naves_Corr%c3%a8ze_5.jpg"]},"Consult_chateau_formulaire2145":{"id":"Consult_chateau_formulaire2145","dept":"19","canton":"Bort les Orgues","commune":"Neuvic","nom":"Neuvic_Ussel","type":"Château","periode":"XV-XVIII","histoire":"Trois châteaux à Neuvic dont celui de la famille des d'Ussel, Le Mialeret et le Chambon, trois tours anciennes dans cette ville.                                           NEUVIC d'USSEL, parc créé vers 1817 par Jean-Hyacinthe d'Ussel aussi appelé Alfred d'Ussel. Jean-Hyacinthe sinstalle à Neuvic en 1834. Marié en 1840 à Claire Esquirou de Parieu, ses deux fils, Philibert et Paul y naquirent. Maire de Neuvic de 1851 à 1857, il fut également conseiller général du canton. Sous son impulsion, la ferme-école des Plaines, domaine important lui appartenant, verra le jour en 1849. Il en fut le directeur jusquà sa mort. Philibert, ses diplômes de Polytechnique et des Ponts et Chaussées en poche, participa à la mise en place du chemin de fer sous le Second Empire. Après la guerre de 1870, il épousa Marguerite Darcel. Jacques, polytechnicien, devient lhéritier du domaine à la mort de son frère Jean tué dans les premiers jours de la guerre de 14-18. Marié à Henriette dAligny en 1903, ils auront six enfants. Guillaume, fils aîné de Jacques, devient officier à sa sortie de Saint Cyr et épouse Yvonne de Galard Terraube. Il participe à la bataille de France. Patrick, (1940-2005) ingénieur, homme de convictions et de traditions, se passionne très vite pour cette propriété. Béatrix, de son mariage en 1967 avec Patrick dUssel, sont nés quatre enfants : deux filles Marguerite et Galienne, deux fils, Guillaume et Arnaud. Elle assure aujourdhui la gestion du domaine de Neuvic","architecture":"MIALERET,  en 1597. Plus tard, en 1893 le château actuel est construit par Raoul Calary, dans un mélange de styles médiéval, romantique et même néo-gothique. En 1966, le Mialaret est un centre de colonies de vacances pour les enfants, et en 1988 il devient officiellement un village de vacances.   Au cours de l'été 1944, le château abrita des prisonniers allemands et fut le siège des interrogatoires de certains collaborateurs.   En 2001, il devient la propriété de M. Eege Klop, qui au fil des années, a tout rénové. Lobjectif était de conserver tous les bâtiments de caractère, et de préserver la nature omniprésente afin doffrir des vacances inoubliables à tous.  aujourd'hui un hôtel restaurant, cette demeure appartenait à la femme du maréchal de Lattre de Tassigny.                   NEUVIC,  à la fin du XVIIIe siècle, un décret royal ordonne la vente de lenceinte, devenue inutile. Trois portes sont alors mentionnées : la porte de léglise, la porte de la ville et la porte de la grange. Il ne reste aujourdhui aucune trace de lenceinte ni de ces portes. La tour de lOffice de tourisme (appelée Tour des 5 pierres) nest pas un vestige de lancienne fortification mais la tour descalier dune ancienne maison.                                                                    CHAMBON date du XIVe siècle avec une chapelle du XVe siècle. La tour Saint-Mexant du XVIe siècle, classée M.H. depuis 1972.","habitants":"Famille d'Ussel\r\n        \"","divers":"Trois châteaux à Neuvic dont celui de la famille des d'Ussel gr 3-4-5, Le Mialeret gr 1-2,  le Chambon et les tour veillant","gps":"","images":["../image/image_19/19_Neuvic_Ussel_1.jpg","../image/image_19/19_Neuvic_Ussel_2.jpg","../image/image_19/19_Neuvic_Ussel_3.jpg","../image/image_19/19_Neuvic_Ussel_4.jpg","../image/image_19/19_Neuvic_Ussel_5.jpg","../image/image_19/19_Neuvic_Ussel_6.jpg","../image/image_19/19_Neuvic_Ussel_7.jpg","../image/image_19/19_Neuvic_Ussel_8.jpg"]},"Consult_chateau_formulaireca51":{"id":"Consult_chateau_formulaireca51","dept":"19","canton":"Beynat","commune":"Noaillac","nom":"Noaillac_Corrèze","type":"Château","periode":"XV-XVII","histoire":"Trois châteaux à Noaillac celui de Chabrignac (Voir Article), de Lacoste et de Lon.                                       La COSTE, construit au XVe siècle, formait un ensemble fortifié avec léglise. La tourelle du flanc sud de lédifice religieux était peut-être défensive. Le château était accolé au flanc nord de léglise. Il survécut aux guerres de religion et connut des campagnes de travaux aux XVIIe et XVIIIe siècles. Abandonné par ses propriétaires, il tomba en ruines, ruines encore présentes au début du XXe siècle, mais inexistantes.  Le château de Chabrignac, aujourd'hui en ruines, était la propriété de la famille de Geoffre depuis l'époque des Croisades.                                  LON date de 1650. Dès 1370 on y trouve les La Beylie. Les Andrieu leur succèdent,  puis les Arliguie, famille de notaires royaux. En 1665, Isaac dArliguie est nommé trésorier du vicomte de Turenne.\r\nNOAILHAC, les seigneurs de Noailhac rendaient hommage au Vicomte de Turenne. Les Noailles restèrent propriétaires du domaine de Noailhac jusquen 1835. Jean de Noailles fut le dernier de la famille à être enterré dans léglise en 1425. Dès 1370 on y trouve les La Beylie. Les Andrieu leur succèdent,  puis les Arliguie, famille de notaires royaux. En 1665, Isaac dArliguie est nommé trésorier du vicomte de Turenne.  Jean dArliguie, notaire, décédé en 1669 lègue par testament 60 livres dor pour faire le tabernacle sculpté qui se trouve dans léglise, réalisé par les Tournié de Gourdon.","architecture":"LACOSTE du XV-XVIIIe siècles.  Les façades, les toitures et des communs et lescalier à vis, sont inscrits au titre des M.H. depuis le 16 mai 1972. Le château primitif, entouré de fossés, était constitué de bâtiments rectangulaires flanqués de quatre tours dont lune était du XIVe siècle et les autres du  XVe.  Il a été remanié au XVII et XVIIIe siècles. Une des tours a maintenant disparu. On accède à une cour intérieure bordée dun bâtiment allongé, par un large portail à larc en anse de panier. Le corps de logis comporte une remarquable charpente en carène de bateau.   À La Coste se sont succédés les Maschat, puis les Salignac-Fénelon et les Certain de La Meschaussée, dont Pierre-Gaspard né en 1767, a été maire de Noailhac de 1813 à 1830. appartient aujourdhui à lartiste céramiste Vigreyos   \r\nLON, pendant la révolution de 1789, Noailhac subit quelques destructions : le château de Chabrignac, ainsi que quelques éléments du château de La Coste et de léglise. Le château de Lon avec ses pavillons carrés, sa tourelle en poivrière, ses fenêtres à meneaux et sa haute toiture dardoises, sera reconstruit en 1650 dans sa forme  actuelle","habitants":"Famille de Geoffre                                                   Famille d'Isaac dArliguie\r\n        \"","divers":"Trois châteaux à Noaillac , de Lacoste gr 1 à 4  et de Lon gr 5 à 7","gps":"","images":["../image/image_19/19_Noailhac_Corr%c3%a8ze_1.jpg","../image/image_19/19_Noailhac_Corr%c3%a8ze_2.jpg","../image/image_19/19_Noailhac_Corr%c3%a8ze_3.jpg","../image/image_19/19_Noailhac_Corr%c3%a8ze_4.jpg","../image/image_19/19_Noailhac_Corr%c3%a8ze_5.jpg","../image/image_19/19_Noailhac_Corr%c3%a8ze_6.jpg","../image/image_19/19_Noailhac_Corr%c3%a8ze_7.jpg","../image/image_19/19_Noailhac_Corr%c3%a8ze_8.jpg"]},"Consult_chateau_formulaire1843":{"id":"Consult_chateau_formulaire1843","dept":"19","canton":"St-Pantaléon de Larche","commune":"Noailles","nom":"Noailles","type":"Château","periode":"XV-XVI-XIX","histoire":"Deux châteaux à Noailles dont celui de Noailles et de la Fage.                                                                   NOAILLES, le château du bourg, du début du XVe siècle, est à lemplacement du fort médiéval, de style renaissance il se compose dun corps central flanqué de deux tours rectangulaires, celle de Lignérac et celle de Noailles. Lorsquau XVIIe siècle, les duc de Noailles sont appelés à de hautes fonctions à Paris, la tour Est (Noailles) devient la résidence des chanoines du chapitre. \r\n La FAGE,  ils logèrent le chapitre dans leur première résidence.  La paroisse faisait partie de la vicomté de Turenne.  Dans ce lieu unique vous attend une équipe chaleureuse au service d'un traiteur de qualité. Julie et Mathieu Gorse au milieu d'un paysage vallonné et verdoyant, se trouve le château dont lhistoire est liée à lune des plus grandes familles de laristocratie française et classé M.H.","architecture":"FAGE le domaine de la Fage est une salle de réception implantée au sud de la Corrèze, de ce château, cétait une brillante construction de la famille de Noailles au cours dune période des plus artistiques et des plus fécondes de notre histoire, le XVIe siècle il ne reste que les communs,  situé au sud de la commune. Séjour de plaisance dabord, ce fut peut-être le pied à terre de ses membres.                              NOAILLES château situé sur la commune de Noailles au sud de  Brive, est lié à l'histoire des célèbres ducs de Noailles, de style Renaissance a été construit au XIVe siècle, Incendié en 1789 puis réhabilité, au XIXe siècle par Alexis de Noailles. Situé au sein d'un parc, il se compose d'un corps central flanqué de deux tours rectangulaires à machicoulis: celle de Lignérac et celle de Noailles. Sur sa façade, on peut admirer des fenêtres surmontées de pinacles, décorées par des anges en médaillons portant les armes des Noailles, dites \"de gueule à bande d'or\".","habitants":"Famille d'Alexis de Noailles\r\n        \"","divers":"Deux château à Noailles dont celui de Noailles gr 1 à 5 et de la Fage  gr 6","gps":"","images":["../image/image_19/19_Noailles_1.jpg","../image/image_19/19_Noailles_2.jpg","../image/image_19/19_Noailles_3.jpg","../image/image_19/19_Noailles_4.jpg","../image/image_19/19_Noailles_5.jpg","../image/image_19/19_Noailles_6.jpg","../image/image_19/19_Noailles_7.jpg"]},"Consult_chateau_formulaire26e3":{"id":"Consult_chateau_formulaire26e3","dept":"19","canton":"Beynat","commune":"Nonards","nom":"Nonards_Arnac","type":"Château","periode":"XV-XIX","histoire":"MOULIN d'ARNAC, au XIVe siècle, Armand, nommé bailli de Martel par le vicomte de Turenne, n'a aucune postérité de ses trois enfants : Bernard, troubadour; Raymond, évêque; Marie, prieure du Coiroux. Gérald de Cornil, seigneur du Moulin d'Arnac, est l'héritier. Au XVe siècle, son fils Guy, épouse Marguerite Foucher de Sainte-Fortunade. Sa fille Jeanne, épouse Pierre de Ceppes d'Astaillac, sans doute, ont-ils fait la commande de la cheminée timbrée à leurs armes, place de la Batidolle. En 1798, la propriété est à Alexis Planchard de Cussac, gendre de Dominique Montclar, parent de M. Auguié. En 1813, le domaine passe à M. Clare de Peyrissac, seigneur de Billac, En 1875, M. Brunie achète le château à moitié avec son frère P.G. Brunie, ancien préfet apostolique de l'Inde française et président d'honneur de l'Institut d'Afrique.","architecture":"MOULIN d'ARNAC du XV-XIXe siècle cantonné de tours rondes  Sur des fondations plus anciennes, on a élevé au XVe siècle, un château de plan classique, corps de logis à trois niveaux à toit brisé avec tours rondes toit en poivrière . Plus tard, on a ajouté un important bâtiment orné d'arcades. Dans le parc coule le ruisseau qui alimentait les roues du moulin d'Arnac.","habitants":"Famille de Gérald de Cornil\r\n        \"","divers":"Château de Nonards-Arnac dit moulins d'Aarnac","gps":"","images":["../image/image_19/19_Nonards_Arnac_1.jpg","../image/image_19/19_Nonards_Arnac_2.jpg","../image/image_19/19_Nonards_Arnac_3.jpg","../image/image_19/19_Nonards_Arnac_4.jpg","../image/image_19/19_Nonards_Arnac_5.jpg"]},"Consult_chateau_formulairebedf":{"id":"Consult_chateau_formulairebedf","dept":"19","canton":"Naves","commune":"Orliac sur Bar","nom":"Orliac_Lafarge","type":"Château","periode":"XVII-XIX","histoire":"LAFARGE la seigneurie appartenait à la famille Vialle, venue habiter Brive la Gaillarde  Un général et un avocat d'affaires comme ancêtres. La propriété de Lafarge appartenait au milieu du XXe siècle à monsieur Sterck. Aujourd'hui, ce sont Sandrine Dickel et Jérôme Sellier, frère et soeur, qui ont pour rôle d'entretenir ce bien avec l'aide des autres membres de la famille. Ces citadins ne résident pas en Corrèze.\r\nA quelques kilomètres au nord à Saint-Salvadour le château de GENTE de monsieur Dellemaire et de Muller.","architecture":"LAFARGE du XVII-XIXe siècles, perdu au milieu des forêts dans un petit coin d'Orliac de Bar, d'abord maison bourgeoise corrézienne du début du XVIIe siècle , cette demeure s'est transformée, au fil des générations, en un magnifique manoir.  Au corps de logis construit au XVIIe siècle; de deux niveaux sur soubassement avec lucarnes sur comble entre deux tours l'une carrée, l'autre en tourelle à toit pointu, on a ajouté deux ailes au XIXe siècle. Le domaine possède un vaste parc paysager créé à la fin du XIXe siècle, aménagé sur la colline surplombant le bourg d'Orliac-de-Bar et la vallée de la Corrèze.","habitants":"famille Vialle\r\n        \"","divers":"Deux châteaux à Orliac  celui de Lafarge gr 1 à 3 et de Gente gr-5","gps":"","images":["../image/image_19/19_Orliac_Lafarge_1.jpg","../image/image_19/19_Orliac_Lafarge_2.jpg","../image/image_19/19_Orliac_Lafarge_3.jpg","../image/image_19/19_Orliac_Lafarge_4.jpg","../image/image_19/19_Orliac_Lafarge_5.jpg"]},"Consult_chateau_formulaire5eaf":{"id":"Consult_chateau_formulaire5eaf","dept":"19","canton":"Ste-Fortunade","commune":"St-Pardoux la Croisille","nom":"Pebeyre","type":"Château","periode":"XV","histoire":"PEBEYRE  acquit en 1308, par Pierre Echamélie,  Jean Arnaud de Pebeyre leur fils qui fut anobli par Louis XI en 1467.  Jean Arnaud de Pebeyre laissa une fille, Louise, mariée à Guillaume de la Majorie qui hérita du domaine. Cest sa descendance par lintermédiaire de Arnaud de la Majorie qui vendit le château à la famille de Lespinasse le 25 novembre 1651 : noble Joseph de Lespinasse, seigneur du Pouget-Pignol en la commune dEspagnac, conseiller du Roi et lieutenant assesseur en élection de Tulle, écuyer, acquiert la terre ou seigneurerie de Pebeyre de noble Arnaud de la Majorie. En 1756, Jean-François de Lespinasse, à la mort de son père Joseph, hérite du château du fief de Pebeyre. En 1792, Jean-Joseph de Lespinasse alors propriétaire du château et émigré se fit confisquer ses biens tandis que sa femme et ses cinq enfants étaient incarcérés à la prison de Tulle. Sa sur parvient à sauver le château qu'elle récupéra vide suite à de nombreux pillages. Transmit au sein de la famille de génération en génération en passant par Charles de Lespinasse de Pebeyre, préfet de la Lozère, puis son fils Roger, son petit fils Guy. Avec ce dernier mort en 1913, séteignit le nom de Lespinasse. A ce jour le château appartient à la famille Faure de Pebeyre dont le lien avec la famille de Lespinasse remonte à Odette, sur de Guy, dernier porteur du nom. Odette qui était la veuve de M. André Faure de Montgolfier.","architecture":"PEBEYRE a l'originalité de présenter un corps de logis formé de deux ailes à deux niveaux avec lucarnes du XVe siècle avec une large tour d'escalier polygonale encastré dans l'angle de ses deux ailes disposées en équerre. L'aile à droite de la tour possède à l'angle arrière d'une tourelle en échauguette carrée reposant sur corbeaux.\r\n Deux corps de logis disposés en équerre et fermés par une aile côté Ouest. La partie centrale couverte à la Mansard sur sa partie Ouest, comprend un mur de retour possédant deux ouvertures arrondies plein-cintre et terminé par une charmante tour carrée. Le corps de logis Est comprend plusieurs pièces d'habitation et possède une tour en échauguette carrée reposant sur des corbeaux de pierre sculptés. A langle intérieur des deux corps de logis, une tour polygonale, abritant un escalier à vis et sur laquelle trône un magnifique cadran solaire, harmonise larchitecture de la bâtisse. L'intérieur de cet ensemble délimite une terrasse dont l'accès côté parc s'effectue par un escalier en pierre encadré de quatre pilastres.","habitants":"Famille de Jean Arnaud de Pebeyre \r\n        \"","divers":"Château de Pebeyre à Saint-Pardoux","gps":"","images":["../image/image_19/19_Pebeyre_1.jpg","../image/image_19/19_Pebeyre_2.jpg","../image/image_19/19_Pebeyre_3.jpg","../image/image_19/19_Pebeyre_4.jpg","../image/image_19/19_Pebeyre_5.jpg"]},"Consult_chateau_formulaire0a5a":{"id":"Consult_chateau_formulaire0a5a","dept":"19","canton":"Objat","commune":"Perpezac-le-Blanc","nom":"Perpezac_Blanc","type":"Château","periode":"XVI-XVII-XIX","histoire":"Deux châteaux à Perpezac le Blanc celui du Bois-Noir et du Puy.                                                                        BOIS-NOIR demeure construite en 1860 ; appartenait en 1900 au colonel Guerhard, transformé en chambres d'hôtes.\r\nPUY :  Entièrement refait au cours du XIXe siècle par sa propriétaire. Mademoiselle Caroline Green de Saint-Marsault, a fait édifier cette demeure, au cours du XIXe siècle. Après avoir appartenu à la famille Leinekügel-Lecoq , puis à la famille Giraud, il est aujourd'hui la propriété de monsieur Plazenet. A voir aussi, de l'autre côté de la colline, le château de Loms, authentique château fort, ayant appartenu pendant plusieurs siècles aux De Royère                       CLUZEAU: propriété de la famille De Bar au XVIe siècle, rasé par arrêté du 6 février 1667 .","architecture":"Bois noir, de plan rectangulaire à deux niveaux avec petites lucarnes sur combles accolé de deux pavillons saillants de dimensions différentes  toit pointus.   PUY  : de style Louis XIII, blotti à flanc de colline et dominant le bourg. Entièrement refait au cours du XIXe siècle par sa propriétaire. Corps de logis de plan rectangulaire à deux niveaux  et lucarnes sur combles flanqué sur façade  droite d'une tour carrée à toit pointu quatre pans côté entrée deux tourelles une ronde et une carrée sur l'arrière flanc opposé une tour ronde  crénelée tour de guet. Ce château possède un pavillon d'entrée à deux niveaux avec tourelles et porche à bretèches","habitants":"colonel Guerhard                                                        Famille Giraud\r\n        \r\n        \"","divers":"Deux châteaux à Perpezac le Blanc  gr 3 celui du Bois-Noir gr 4 et du Puy gr 5 à 8.","gps":"","images":["../image/image_19/19_Perpezac_Blanc_1.jpg","../image/image_19/19_Perpezac_Blanc_2.jpg","../image/image_19/19_Perpezac_Blanc_3.jpg","../image/image_19/19_Perpezac_Blanc_4.jpg","../image/image_19/19_Perpezac_Blanc_5.jpg","../image/image_19/19_Perpezac_Blanc_6.jpg","../image/image_19/19_Perpezac_Blanc_7.jpg","../image/image_19/19_Perpezac_Blanc_8.jpg"]},"Consult_chateau_formulaire5943":{"id":"Consult_chateau_formulaire5943","dept":"19","canton":"Bort les orgues","commune":"Sarroux-Saint-Julien","nom":"Pierrefitte","type":"Château","periode":"XV","histoire":"PIERREFITTE, en 1370, Dauphine de Lestrange épouse Roger-Hugues de Bort dans la commune de Poussanges en Creuse. Les Bort est une très ancienne famille chevaleresque, plusieurs ont été chevaliers des ordres du Roi. Ils ont participé à la quatrième croisade, ont fondé le monastère de Bort, et livré de nombreux chevaliers de l'Ordre du Temple, ayant témoigné lors du fameux procès intenté à l'Ordre par Philippe le Bel. Les Lestrange, quant à eux, possèdent de très anciens droits seigneuriaux en Marche et en Limousin, et en 1370, Dauphine compte parmi ses frères trois dignitaires ecclésiastique éminents , lui-même neveu de Clément VI, pape Limousin qui avait promis d'installer dans sa province \"un rosier qui fleurirait à jamais\". Pendant plus de 300 ans, dix générations de la famille de Bort vont se succéder au château de Pierrefitte. Vendu en 1822, puis racheté par Éléonore Clara Meul de la Motte qui épousa monsieur de Bailleul, marquis de Croissanville en 1830, celui-ci mourra en 1839, Éléonore épouse deux ans après Henri-Louis de Tournemire descendant d'une vieille famille installée sous le nom de Tornamira en Haute-Auvergne à l'époque gallo-romaine.  En 1861 s'éteindra le dernier descendant de la famille. La famille de Tournemire en est le propriétaire depuis le XIXe siècle.  Le château est finalement inscrit au titre des M.H. en 1927.","architecture":"PIERREFITTE, corps de logis rectangulaire de trois niveaux est rytmé par les quatre tours rondes coiffées d'un toit en poivrières qui encadrent la tour ronde d'escalier situé au centre d'une de ses façades.  Ces cinq tours donnent au château de puissants et harmonieux volumes, la tour d'escalier possède une porte aux piedroits d'origines moulurés de trois tores entre des cavets. L'arc brisé qui les surmonte, avec au tympan les armes des Bort, est plus récent, mais au moins antérieur à la Révolution. On trouve de part et d'autre, au second étage, deux fenêtres à meneaux moulurés d'un cavet comme toutes les autres baies, donnant une unité à l'ensemble.","habitants":"Famille de Bort\r\n        \"","divers":"Château de Pierrefitte à Sarroux Saint-Julien","gps":"","images":["../image/image_19/19_Pierrefitte_1.jpg","../image/image_19/19_Pierrefitte_2.jpg","../image/image_19/19_Pierrefitte_3.jpg","../image/image_19/19_Pierrefitte_4.jpg"]},"Consult_chateau_formulairef13e":{"id":"Consult_chateau_formulairef13e","dept":"19","canton":"Uzerche","commune":"Salon-la-Tour","nom":"Pin_Corrèze","type":"Château","periode":"XIV","histoire":"PIN, d'après le cartulaire d'Uzerche, le repaire du Py appartenait dès le XIIe siècle aux Bouchiats, originaires de Saint-Merd et dépendait de la vicomté de Limoges, ils s'allièrent aux Comborn. Au XVe siècle, le château est acheté par l'évêque de Tulle, Guillaume de Combarel pour ses neveux. Par alliance, il passe à la famille du Breuil du Fraysse, et en 1556, il appartient aux Carbonnières de la Capelle Biron. Avant la Révolution, il est acheté par les Bouillac. En 1843, Auguste, comte de Cosnac de la branche des Cosnac de Beynat, mousquetaire du roi, aide de camp du général, marquis de Guillaumanches du Bocage, conseiller général de Beynat, propriétaire du château de Sabeau, à Beynat, achète le château. Son fils, Gabriel-Jules, écrivain et maire de Salon la Tour, époux d'Aline d'Arnouville lui succède et après celui-ci, Adhémar, marquis de Cosnac, puis Elie, comte de Cosnac et ses fils. Aujourd'hui, l'actuel propriétaire est M. le comte René de Cosnac, fils d'Elie.","architecture":"PIN, l'actuel château  a bel allure au milieu des prairies et des futaies de chêne. Il surplombe un grand étang séculaire. L'édifice primitif incendié en 1550, est restauré et embelli par les Carbonnières qui avaient participé aux guerres d'Italie, qui y ajoutent une aile italienne. Une ancienne gravure montre le plan en équerre, les trois tours ouvertes de bretèches et les échauguettes. Gabriel-Jules de Cosnac, né en 1819, après avoir fait de brillantes études de droit, débute une carrière d'avocat. En 1860, il fait restaurer le château devenu vétuste en s'inspirant sans doute de gravure. En 1906, le château de nouveau incendié est reconstruit sur les murailles d'après les anciennes élévations. Seule, la tour crénelée et l'aile Italienne ont disparu. Sur les murs, les armes sculptées de Bouchiat; des têtes de pierre couronnées qui seraient, pense le comte de Cosnac, des portraits des Plantagenet, vicomtes de Limoges et seigneurs de Salon. La grille de la cour en fer forgé, provient des forges de La Grénerie.","habitants":"Famille du Breuil du Fraysse\r\n        \"","divers":"Château du Pin à Salon la Tour","gps":"","images":["../image/image_19/19_Pin_Corr%c3%a8ze_1.jpg","../image/image_19/19_Pin_Corr%c3%a8ze_2.jpg"]},"Consult_chateau_formulaire5745":{"id":"Consult_chateau_formulaire5745","dept":"19","canton":"St-Pantaléon de Larche","commune":"Saint-Cernin de Larches","nom":"Pommiers_19","type":"Château","periode":"XV","histoire":"POMMIERS, les seigneurs qui l'habitaient, simples écuyers, Gabrielle de Pommiers avait épousé Germain du Fraysse, de la famille des du Breuil de Beausoleil et c'est par ce mariage que furent introduits à Pommiers les seigneurs de Beausoleil qui ajoutèrent à leur titre celui de seigneurs de Pommiers. Ce mariage est révélé par un contrat concernant la rente due sur le moulin de Saint Cernin et passé au château de Pommiers le 13 janvier 1646. Marguerite du Fraysse est décédée à Pommiers le 25 juillet 1678 . Léonard du Fraysse, né le 20 février 1689. En 1720 devenu capitaine d'artillerie signait \"Le chevalier de Beausoleil\" . Il était monté d'un degré dans l'ordre de la noblesse le titre de chevalier n'était pas héréditaire mais tout à fait personnel. II mourut à Pommiers le 3 février 1774 à l'âge de 85 ans .Marie Aymé du Fraysse, née en 1712, mentionnée comme  fille aînée et héritière du seigneur du Fraysse, passa à Charles Louis du Fraysse. Sa femme, Marguerite de Fontanges lui survécut pendant près de vingt années. Devint alors héritier son cousin messire Léonard Dumas, seigneur de Daignac, périgourdin, décédé en 1781. A partir de cette époque, cette demeure resta inhabitée par ses propriétaires et tomba dans le délabrement le plus complet. Elle appartient aux familles: aux  Duroy de Chaumareix, de monsieur Devillegoureix, depuis 1969, il appartient à madame Lacombe Mauranges.","architecture":"POMMIERS, c'est une vieille demeure seigneuriale, siège d'un ancien fief hommagé au vicomte de Turenne en 1459  ,1609 et 1696. Surplombant de plus de 170 mètres une boucle de la Couze qu'envahit la végétation, jouissant d'une vue admirable, le château de Pommiers vit le jour à la fin du Moyen-Age au XIVe siècle. En six siècles ont patiné ses pierres, il n'a subi que peu de modifications avec ses murs de près de 1,50 m d'épaisseur, ses grosses tours d'angles, ses créneaux, ses mâchicoulis et reste un témoignage des siècles passés. Une grande terrasse borde la façade au-dessus de la vallée. Le très bel escalier de la tour principale, \"escalier à noyau plein \" (avec marches en pierre, d'une seule pièce) permet l'accès à l'étage.","habitants":"Famille des du Breuil de Beausoleil\r\n        \"","divers":"Château de Pommiers à St-Cernin de Larches","gps":"","images":["../image/image_19/19_Pommiers_19_1.jpg","../image/image_19/19_Pommiers_19_2.jpg","../image/image_19/19_Pommiers_19_3.jpg"]},"Consult_chateau_formulaire5ac6":{"id":"Consult_chateau_formulaire5ac6","dept":"19","canton":"Uzerche","commune":"Arnac-Pompadour","nom":"Pompadour","type":"Château","periode":"XVII","histoire":"POMPADOUR, se dresse un château bâti en 1026 par les seigneurs de Lastours, vicomtes de Pompadour. Passé au XIIIe siècle à la famille Hélie de Pompadour (venue des Hélie de Ségur, chevaliers de la familia castrale ou châtelains de Ségur au nom du vicomte de Ségur et de Limoges), il fut  agrandi au cours du XVe siècle, au moment de l'apogée de la maison Hélie de Pompadour, à la suite de l'héritage de la puissante vicomté de Comborn. La vicomté fut ensuite élevée au rang de marquisat. Après l'extinction de la famille au début du XVIIIe siècle, l'héritage, comprenant le château, les terres et le titre, fit l'objet d'une longue bataille judiciaire entre le prince de Conti et le marquis de La Vallière. en 1745 finalement aucun des deux n'obtient gain de cause puisque Louis XV préempta le château au nom de la Couronne. Il en fit presque aussitôt don à sa favorite, Mme d'Etiolles, qui prit dès lors le titre de marquise de Pompadour.  Cest sous linitiative de la favorite du roi, que fut crée un haras privé en 1751. le château eu divers propriétaires le ministre Choiseul, Bonaparte devenu propriété du haras au XVIIe siècle, le château est habité par le personnel, le directeur du haras national de Pompadour de 1870 à 2004.","architecture":"POMPADOUR, une forteresse à l'origine bâti à Arnac-Pompadour sur lancien site gallo-romain Arnac. Son architecture irrégulière témoigne de son histoire tumultueuse. Au cours de lhistoire, la forteresse devait encore être en partie détruite lors de la Révolution, survivre à un incendie au XIXe siècle avant dabriter un haras national, dès 1872.  La partie la plus fragile lors d'une attaque est l'entrée d'un château. Celle-ci a fait l'objet de quelques attentions.  Il y a d'abord une \"sorte de fossé\" précédent le bâtiment. Qui s'enjambe grâce à un solide pont fixe cimenté. Puis, de chaque coté, d'imposantes tours rondes avec des bouches à feu dissuasives. La porte comporte les classiques ouvertures doubles avec au dessus les fentes des flèches  de 2 ponts-levis. La fenêtre au dessus devait être une bretèche, reconvertie récemment en ouverture de confort. Le sas d'entrée a perdu son \"agressivité\" car il est dépourvu de herse, double porte, assommoir. Le corps de garde est devenu le guichet. les bâtiments  sont un compromis entre confort et efficacité défensive. Les impressionnantes tours rondes coiffées encadrent  de hautes courtines  ne comportant aucun angle mort. L'élégant chemin de ronde est équipé de mâchicoulis et de fentes de tir pour arme à feu.","habitants":"Hélie de Pompadour   Mme d'Etiolles marquise de Pompadour.\r\n        \"","divers":"Château haras de pompadour  à    Arnac  GPS : 45° 23' 49,81\" Nord, 1° 22' 41,38\" Est","gps":"45° 23' 49,81\" Nord, 1° 22' 41,38\" Est","images":["../image/image_19/19_Pompadour_1.jpg","../image/image_19/19_Pompadour_2.jpg","../image/image_19/19_Pompadour_3.jpg","../image/image_19/19_Pompadour_4.jpg","../image/image_19/19_Pompadour_5.jpg","../image/image_19/19_Pompadour_6.jpg","../image/image_19/19_Pompadour_7.jpg"]},"Consult_chateau_formulaire77cd":{"id":"Consult_chateau_formulaire77cd","dept":"19","canton":"Ste-Fortunade","commune":"Pandrignes-Espagnac","nom":"Puy_du_Val","type":"Château","periode":"XIV-XVI","histoire":"PUY du VAL,  en 1339, Guy de Puy de Val épouse Hélis de La Jugie nièce du pape Clément VI. En 1371, Guy, dans son testament, demande la fondation d'une chapelle au château de Puy de Val. En 1615, alliances avec les Cosnac, puis avec les Pompadour, et les Monstier-Mérinville. En 1647, Henri de Saint-Martial de Puy de Val est aumônier du roi. Achat de la propriété en 1776, par François Darche, conseiller au parlement de Bordeaux, victime de la Terreur, il est exécuté le 4 avril 1794 ; son fils avait émigré. Depuis 1850, la demeure est habitée par la famille d'historiens et d'archéologues régionaux, les Fages.\r\nLa ROCHETTE, ce château, dépendant de la seigneurie de la Roche-Canillac, pourrait dater du XIIIe siècle car en 1292, la famille  Aimoin possédait la seigneurie avec  un certain Albert de la Rochette. Ils eurent pour successeur les Chautard et  François Chautard se qualifiait «seigneur de Pandrignes en même temps que celui de la Rochette».  En 1670, le château se trouvait en bail à un voiturier de Laguenne, paroisse où la maison de la Rochette possédait la maison du cardinal Sudre puis par Jean- Joseph de Chabannes , lieutenant-général de la maréchaussée de Tulle. Au XVIIIe siècle, il devint propriété des seigneurs des Borderies de Vernéjoux dEspagnac qui transmirent aux Marigny, leurs héritiers. Il fut ensuite acheté par les La Bissière puis transmis par mariage à maitre Loubignac, avocat à Tulle. En 1923, la bâtisse fut rachetée par la famille Massoulier et cest Florence Alvy, nièce de Auguste Massoulier qui occupa les lieux, quelques années avant que le château ne soit vendu aux actuels  Jean et Annie Lanot , les nouveaux propriétaires des lieux.","architecture":"PUY du VAL, une masse de bâtiments et de tours domine les vallées, de la construction primitive dont il ne reste qu'une grosse tour dont les créneaux étaient encore intacts au début du XIXe siècle. Les modifications faites aux XVe et XVIe siècles, comportent les embellissements habituels ; adjonction de bâtiments, de tours carrées, aménagement d'une cour intérieure fermée par une galerie à arcades datée de 1572.                                                                          La ROCHETTE  le château  issu d'un fief appartenant autrefois à Espagnac et devenu baronnie. Il était bâti sur un versant qui domine la vallée de la St-Bonnette et l'ancienne construction était inachevée avant sa destruction,  Un castel a été reconstruit sur les vestiges de l'ancien. Accès par le Coudert d'Espagnac.","habitants":"Famille de Puy du Val\r\n        \"","divers":"Château de Puy de val et de la Rochette gr 5 à  Pandrignes-Espagnac","gps":"","images":["../image/image_19/19_Puy_de_Val_1.jpg","../image/image_19/19_Puy_de_Val_2.jpg","../image/image_19/19_Puy_de_Val_3.jpg","../image/image_19/19_Puy_de_Val_4.jpg","../image/image_19/19_Puy_de_Val_5.jpg"]},"Consult_chateau_formulairea166":{"id":"Consult_chateau_formulairea166","dept":"19","canton":"Beynat","commune":"Queyssac les Vignes","nom":"Queyssac","type":"Vestiges-tour","periode":"XIII","histoire":"QUEYSSAC, au Moyen-Âge, Queyssac appartient à la vicairie civile du Puy d'Arnac et à la vicomté de Turenne. La châtellenie de Queyssac est créée au profit d'Olivier de Bort après la guerre de cent ans par démembrement de celle de Curemonte. \r\nLa famille de Corn, entrée à Queyssac par alliance avec les Veyrac, va y rester jusqu'au XIXe siècle. La commune a pris les armes de cette famille originaire du Quercy. \r\nQueyssac est devenu Queyssac-les-Vignes en 1929 sans doute pour qu'on ne la confonde plus avec son homonyme périgourdin. Gabriel Gleize fut maire de Queyssac de 1904 à 1956 et conseiller général du canton de Beaulieu de 1913 à 1956.","architecture":"Le château fort qui contrôlait cet itinéraire devait ressembler à son voisin de Curemonte.  Une position défensive privilégiée qui justifie le siège de cette petite place forte dépendante des Turenne jusquau XIIIe siècle.  Ce château du moyen-age a été rebâti par Astorg De Corn au XVIe siècle  chevalier, seigneur châtelain de Queyssac, d'Anglars et de Puymerle, époux de Jeanne de Vayrac, dame de Queyssac.","habitants":"Famille de Corn,\r\n        \"","divers":"Vestiges tour de Queyssac les Vignes","gps":"","images":["../image/image_19/19_Queyssac_1.jpg","../image/image_19/19_Queyssac_2.jpg"]},"Consult_chateau_formulaired1d1":{"id":"Consult_chateau_formulaired1d1","dept":"19","canton":"Argentat","commune":"Saint-Bonnet les Tours de Merle","nom":"Rieu_Corrèze","type":"Château","periode":"XV-XVI","histoire":"RIEU château du Rieu est situé sur la commune de  St-Bonnet les Tours de Merle en Corrèze, il domine la vallée de la Maronne à 2 km des Tours de Merle. Cité en maison forte en 1270 fief des Pestels en 1480 Louis de Pestels devient seul seigneur du lieu, en 1484 Guy IV de Pestels fait don à son fils puiné Louis la chatellenie de  de Merle dont relève Rieu. A Louis de Pestels en 1523 succédent à son fils puis son petit fils Claude, l'époux d'Hélène de Reilhac, le petit fils Claude II s'éteint sans laissé de postérité masculine le Rieu passe  en 1671 à l'une de ses filles épouse  de Jean de Caissac sieur de Cabannes au décés de se dernier en 1750  le château passe  à un neveu André de Méallet de Fargues, vendu comme bien national à la Révolution. le Rieu est acquis en 1803 par le colonel Rivière, par héritage le domaine  passe aux Meilhac de Vert. Le Rieu vendu une première fois en 1903 passe par plusieurs mains avant d'être acquis  par la famille Brugnon.","architecture":"RIEU, du XVI-XXe siècle au milieu d'une enceinte, dont le mur couronné d'une galerie crénelée est percé d'un portail que surmonte la bretèche et est flanqué à ses extrémitées de deux grosses tours rondes  dont une abrite la chapelle et échauguette. Son origine remonte au XIIe siècle, le château actuel  dont le corps de logis est cantonné à l'angle nord d'une grosse tour ronde du XIIIe siècle aujourd'hui découronnée. Les étages de plan carré, s'élèvent sur un sous sol voûté, le corps de logis flanqué sur ses deux façades  principales d'échauguettes sur cul-de-lampe  dont une seul subsiste, la plus remarquable, la tour d'escalier qui occupe le centre de la façade sur cour, tour hexagonal qui s'ouvre sur un  portail Renaissance couronné de mâchicoulis, l'ensemble  couvert de lauzes date du XVIe siècle le château a été inscrit sur l'inventaire supplémentaire des M.H. en 1931.","habitants":"Famille Brugnon\r\n        \"","divers":"Château de Rieu à Saint-Bonnet les Tours de Merle","gps":"","images":["../image/image_19/19_Rieu_Corr%c3%a8ze_1.jpg","../image/image_19/19_Rieu_Corr%c3%a8ze_2.jpg","../image/image_19/19_Rieu_Corr%c3%a8ze_3.jpg","../image/image_19/19_Rieu_Corr%c3%a8ze_4.jpg","../image/image_19/19_Rieu_Corr%c3%a8ze_5.jpg","../image/image_19/19_Rieu_Corr%c3%a8ze_6.jpg"]},"Consult_chateau_formulairec723":{"id":"Consult_chateau_formulairec723","dept":"19","canton":"Argentat","commune":"Rilhac-Xaintrie","nom":"Rilhac_Xaintrie","type":"Château","periode":"XV-XVI","histoire":"RILHAC-XANTRIE, château de Rilhac Xaintrie ouvre ses portes après 14 ans de travaux destinés à lui restituer son aspect et ses distributions du XVe siècle, au temps où les seigneurs de Rilhac en étaient propriétaires de ce lieu unique chargé d'histoire, jusqu'au XVIIe siècle.  Le château, daté des XVe et XVIe siècles, le bâtiment du XIXe siècle qui le jouxte nest pas protégé,  il a retrouvé son aspect du XVe siècle.","architecture":"RILHAC, sa construction aurait débuté au XIVe siècle, puis il a été remanié et embelli au début du XVIe siècle dans le style gothique. Le château est composé d'un grand corps de logis, d'une tour d'escalier en vis sur cour en façade sud et d'une grosse tour ronde dans l'angle nord ouest. Un édifice remarquable vient d'ouvrir ses portes au public après  être resté dans l'oubli.  Au XIXe siècle un incendie ravage l'aile et la chapelle et il fut de nouveau restauré. Un long abandon au XXe siècle, et le voici  de nouveau restauré et classé   M.H. C'est grâce aux architectes et artisans des bâtiments de France, qu'il a retrouvé son cachet d'antan. Meublé depuis peu, on peut remarquer une superbe cuisine, une grande cheminée, ornée de son manteau arqué, ainsi qu'un potager en pierre permettant de conserver les plats au chaud. l'authenticité de cette restauration est impressionnante on retrouve un plafond dit \" à la Française\" une épaisseur de murs de 2 m permet une isolation importante, un escalier à vis, en spirale en pierre conduit  sous les toits ou l'on découvre  cette superbe charpente reproduisant à l'identique le savoir faire des artisans d'aujourd'hui et d'autrefois dans le respect des gestes et des traditions.","habitants":"\"","divers":"Château de Rilhac à Xaintrie","gps":"","images":["../image/image_19/19_Rilhac_Xaintrie_1.jpg","../image/image_19/19_Rilhac_Xaintrie_2.jpg","../image/image_19/19_Rilhac_Xaintrie_3.jpg","../image/image_19/19_Rilhac_Xaintrie_4.jpg","../image/image_19/19_Rilhac_Xaintrie_5.jpg"]},"Consult_chateau_formulaire3763-2":{"id":"Consult_chateau_formulaire3763-2","dept":"19","canton":"Uzerche","commune":"Beyssac","nom":"Rivière_Beyssac","type":"Château","periode":"XV-XX","histoire":"RIVIERE, au XIIIe siècle, sous la suzeraineté des vicomtes de Turenne, le mas appartient au damoiseau Pierre de Lubersac, puis il passe aux de Livron, seigneurs de La Rivière. Agnès de Livron épouse Adémat de La Rivière, camérier du Pape Innocent VI. La famille après avoir figuré à la cour Pontificale, ne veut plus rendre hommage aux seigneurs de Pompadour. Le château de La Rivière est racheté au XVe siècle par Arnolphe de Pompadour parent de l'évêque, Geoffroy de Pompadour. La seigneurie suit alors le sort des Pompadour avec la continuité d'un haras.","architecture":"chateau du XV-XXe siècle. A la Révolution, le château de la Rivière est livré à la pioche des démolisseurs. Le château a été construit au XIVe siècle sur un plan classique; courtine et tours élevées autour d'une cour d'honneur. Il devait être entourée de fossés. Il ne subsiste du château que quatre tours aux murs épais et aveugles, on a ouvert les murs au XVe siècle pour y loger des fenêtres et des portes sculptées. La chapelle a été récemment restaurée.","habitants":"Famille d'Arnolphe de Pompadour\r\n        \"","divers":"Château de Rivière à Beyssac","gps":"","images":["../image/image_19/19_Rivi%c3%a8re_Beyssac_1.jpg","../image/image_19/19_Rivi%c3%a8re_Beyssac_2.jpg","../image/image_19/19_Rivi%c3%a8re_Beyssac_3.jpg","../image/image_19/19_Rivi%c3%a8re_Beyssac_4.jpg","../image/image_19/19_Rivi%c3%a8re_Beyssac_5.jpg"]},"Consult_chateau_formulaire4566":{"id":"Consult_chateau_formulaire4566","dept":"19","canton":"Ste-Fortunade","commune":"Roche-Canillac","nom":"Roche_Canillac","type":"Château","periode":"XVI","histoire":"BEAUFORT, le village fut le siège de la baronnie des  de la Roche puis celui des  Canillac. Connue depuis le IXe siècle, la Roche Basse était une petite chapelle dépendant de Gumont avec son château qui dominait le ravin où coule le Doustre. Le château féodal de la Roche en Lemouzi contrôlait le passage vers la vallée de la Dordogne. Détruit au XIIe siècle par les anglais, le château est reconstruit plus haut, à la Roche Haute, par le seigneur Gérald de La Roche. Au XVIe siècle, la baronnie des de La Roche na plus dhéritier mâle et cest donc Jeanne, une soeur du dernier descendant, qui fit passer lhéritage des terres à son époux, Jean de Beaufort, Vicomte de Lamothe-Canillac. Cette famille régna jusquà la Révolution, et ajouta son illustre nom à la localité qui devient La Roche-Canillac en 1774.    Attila Caligula d'Ysengrin, baron de La Roche Canilhac et suzerain des terres et personnes en dépendant, confirmons messire Christian Auguste Bichot, dict Crillus Charlerin d'Ysengrin comme notre vassal et seigneur d'Espagnac pour sa grande noblesse d'âme et de sang, ainsi que pour préserver les liens qui unissent nos rameaux familiaux.","architecture":"Château de Beaufort du XVe, restauré au XIXe par Viollet-le-Duc.  Roche-Basse, site classé M.H. depuis 1983, est un bourg médiéval à flanc de colline qui sarticule au pied de la Tour de Canillac, seul vestige de lancien château. Le village reste authentique notamment grâce à la présence des «courrijoux», étroits sentiers qui permettaient à lépoque daccéder aux cultures agricoles en terrasses et de relier les habitations.","habitants":"Baron de La Roche Canilhac\r\n        \"","divers":"Château de la Roche Canillac","gps":"","images":["../image/image_19/19_Roche_Canillac_1.jpg","../image/image_19/19_Roche_Canillac_2.jpg","../image/image_19/19_Roche_Canillac_3.jpg","../image/image_19/19_Roche_Canillac_4.jpg","../image/image_19/19_Roche_Canillac_5.jpg","../image/image_19/19_Roche_Canillac_6.jpg"]},"Consult_chateau_formulaire9716":{"id":"Consult_chateau_formulaire9716","dept":"19","canton":"Meymac","commune":"Sornac","nom":"Rochefort","type":"Château","periode":"XV","histoire":"ROCHEFORT,  est  bâti à Sornac. Il se situe sur le plateau de Millevaches. La baronnie de Rochefort, qui fut l'une des plus grosses châtellenies des Comborn, appartient ensuite aux Pompadour, aux Chauveau de Balesme, puis aux Farges de Sirieyx. La chapelle de Rochefort qui existait déjà au XVIe siècle abrite le caveau de la famille Chauveau de Balesme de Rochefort, est un château privé.","architecture":"ROCHEFORT, bâti sur un éperon rocheux,  date du XIII-XVII-XIXe siècles. Il a été reconstruit après 1620 à l'emplacement d'une grosse tour, devenue inhabitable. Vous pouvez l'admirer de l'extérieur ainsi que sa chapelle.","habitants":"Famille Chauveau de Balesme\r\n        \"","divers":"Château de Rochefort à Sornac                                      Rochefort GPS : 45° 40' 05\" Nord 2° 11' 39\" Est","gps":"45° 40' 05\" Nord 2° 11' 39\" Est","images":["../image/image_19/19_Rochefort_Sornac_1.jpg","../image/image_19/19_Rochefort_Sornac_2.jpg","../image/image_19/19_Rochefort_Sornac_3.jpg"]},"Consult_chateau_formulaire5146-2":{"id":"Consult_chateau_formulaire5146-2","dept":"19","canton":"Egletons","commune":"Rosiers d","nom":"Rosiers_Egletons","type":"Château","periode":"XV-XVII","histoire":"A Rosiers-d'Egletons le château-fort de Maumond, le manoir   de Seugnac du XVI-XVIIe seicles, le manoir de Crespel et le manoir de Vitrac sur Montane.    MAUMONT,  En 1345, Jean, seigneur de Maumont, marié avec Marie Faure accordé par Guillaume II Roger de Beaufort, frère du pape Clément VI. En 1361, Bertrand Maumont prêta serment à Jean Chandos, connétable de Guyenne, représentant du roi d'Angleterre Edouard III. Il livra son château à Lancastre en 1373. En représaille, le Roi Charles V lui confisqua tous ses biens, mais il les lui rendit l'année suivante, à la suite d'interventions puissantes. Charles, seigneur de Maumont, épousa le 2 décembre 1500  Anne de Bourdeilles, soeur du père de Brantôme. Sa fille Charlotte fut une des dames d'honneur de la reine Eléonore, la seconde épouse de François Ier. Jean de Maumont accompagna en 1530 le vicomte de Turenne à Madrid pour signer le contrat de mariage de François Ier avec Eléonore, soeur de Charles Quint.  La famille doit son anoblissement au comportement d'un ancêtre du XIIe siècle si l'on en croit l'histoire comtée dans les chroniques de Geoffroy de Vigeois,  ancienne résidence des familles de Fontanges, de Meynard, Vienot de Vaublanc.  A l'heure actuelle, le château appartient aux héritiers de Lafarge de Villeneuve qui l'ont acheté en 1904, à la famille Filhoutant .   SEUGNAC, le hameau fut la propriété des moines d'Aubazine du XIIe jusqu'à la fin du XVe siècle. A cette époque, il fut acheté par la famille Chabrerie qui entreprit la construction du manoir en 1585.","architecture":"MAUMONT, château-fort attesté au Moyen-Age, reconstruit en grande partie au XVe siècle ; Sur les soubassements du XIIIe et XIVe siècle, s'est élevé au XVe siècle un corps de logis flanqué d'un donjon avec un chemin de ronde et une porte ogivale avec sculptée l'écu des Maumont.  Le bâtiment carré, à l'angle nord, a une tourelle avec échauguette. La façade sud présente une bretèche en encorbellement, dresse ses tours et tourelles au sommet d'une colline qui domine la rivière du Doustre.  Restauré dans les années 1900, avec adjonction d'une aile au sud et réfection des toitures. La tour carrée d'escalier, du XVe siècle, a de belles ouvertures sculptées avec arcs en accolade. Elle possède un chemin de ronde à créneaux au-dessus des mâchicoulis. Les fenêtres remaniées au XVIe et l'aile sud ajoutée à la fin du XIXe siècle.   SEUGNAC, la tour d'escalier en est la partie la plus intéressante, avec sa porte d'entrée à chambranle en quart de rond. Le linteau est orné d'un arc en accolade souligné de diverses moulurations. A l'intérieur, cheminées, dont l'une porte un décor de pans de bois moulurés. Sur la droite du manoir des XVIe et XVIIe siècles, se trouve un bâtiment récent datant de 1968-1970.","habitants":"Familles de Fontanges                                              Famille Chabrerie \r\n        \"","divers":"A Rosiers-d'Egletons le château-fort de Maumont gr 1-5  et le manoir   de Seugnac gr 7  et le manoir de Crespel gr 6","gps":"","images":["../image/image_19/19_Rosiers_Egletons_1.jpg","../image/image_19/19_Rosiers_Egletons_2.jpg","../image/image_19/19_Rosiers_Egletons_3.jpg","../image/image_19/19_Rosiers_Egletons_4.jpg","../image/image_19/19_Rosiers_Egletons_5.jpg","../image/image_19/19_Rosiers_Egletons_6.jpg","../image/image_19/19_Rosiers_Egletons_7.jpg","../image/image_19/19_Rosiers_Egletons_8.jpg"]},"Consult_chateau_formulairef208":{"id":"Consult_chateau_formulairef208","dept":"19","canton":"Bort les Orgues","commune":"Lamazière-Basse","nom":"Rousille_Lamazière","type":"Château","periode":"XVI-XX","histoire":"LAMAZIERE,  première partie du XIXe siècle, monsieur Hopkins, un anglais amateur de chevaux fait construire cette demeure.\r\nEn 1892 monsieur Lamazière Hyppolyte, horloger à Paris et nouveau propriétaire depuis 1885 fait construire les échauguettes aux angles qui donnent au bâtiment sont aspect château.\r\nROUSILLE  du XXe siècle, la famille de Scorailles possédait dans la paroisse de Lamazière-Basse, la seigneurie et le château de Roussille du XIVe au début du XVIIe siècle, aujourd'hui disparu et remplacé par un château du XXe siècle. Ou Vécut La duchesse de Fontanges (1661-1681), descendante de la famille de Scorailles seigneurie de Roussille. Raoul Calary de Lamazière, (1879-1932, fils aîné d'Émile Calary de Lamazière, châtelain de Roussille, député de la gauche républicaine sous la République.\r\nSimonne Calary de Lamazière, (1906-2003), descendante de la famille Calary, originaire de Lamazière-Basse, épouse du maréchal de Lattre de Tassigny (1889-1952).","architecture":"LAMAZIERE, en 1909, la bâtisse est amputée pour permettre les ouvertures d'une avenue et du marché. De 2012 à 2014 destiné à devenir un lieu incontournable de Cormeilles-en-Parisis, le château Lamazière est entièrement rénové. Le rez-de-chaussée abritera un pub-restaurant avec terrasse extérieure. Le premier étage accueillera une salle dexposition.                                                                     ROUSILLE de plan rectangulaire à deux niveaux avec série de lucarne sur comble avec toit brisés pavillon d'entrée saillant sur cour intérieure avec toit de pavillon impérial.","habitants":"Monsieur Hopkins\r\n        \r\n        \"","divers":"Château de Rousille  à Lamazière","gps":"","images":["../image/image_19/19_Roussille_Lamazi%c3%a8re_1.jpg","../image/image_19/19_Roussille_Lamazi%c3%a8re_2.jpg","../image/image_19/19_Roussille_Lamazi%c3%a8re_3.jpg"]},"Consult_chateau_formulaire7efb-2":{"id":"Consult_chateau_formulaire7efb-2","dept":"19","canton":"Juillac","commune":"Le Saillant","nom":"Saillant","type":"Château","periode":"XV-XVII","histoire":"Trois châteaux à Saillant celui de Lasteyrie, Saillant et de Brudie.                                                            SAILLANT, le château de Mirabeau ou  Saillant, côté Voutezac,   M. et Mme Paul de Lasteyrie du Saillant. Le château de Lasteyrie  datant du XIXe siècle, côté Allassac.\r\nA Objat, château de  la Brudie  sur la commune de Voutezac.                                                                        MIRABEAU-SAILLANT, L'origine du château remonte au XIII et XIVe siècles.  en 1378 Guy de Lasteyrie l'acquis en 1320 au Vicomte de Comborn.  Au XVIIe siècle, la famille fut connue comme de Lasteyrie du Saillant de Comborn et Antoine de Lasteyrie, marquis du Saillant fut nommé par lettre patente grand Sénéchal du Limousin. Les Lasteyrie devinrent vicomtes de Comborn, marquis du Saillant et d'Objat. C'est la XXIe génération de la même famille qui est actuellement propriétaire du château du Saillant. Depuis 1970, Guy de Lasteyrie du Saillant s'est attaché à restaurer le parc et le jardin , celui-ci a reçu le label «jardin remarquable» en 2004.                   LASTEYRIE, a été habité par Charles de Lasteyrie, ministre des finances sous le gouvernement de Raymond Poincaré.   Charles-Philibert de Lasteyrie du Saillant (1759-1849), fondateur du château de Lasteyrie.  Robert Charles de Lasteyrie du Saillant (1849-1921) est un historien, archiviste et homme politique.  Le comte Guy de Lasteyrie du Saillant (1923-1999) , chevalier de la légion d'Honneur, et son épouse, Isabelle Giscard d'Estaing, chevalier de la légion d'Honneur, fondateurs du Festival de la Vézère en 1981, Gonzague Saint Bris 1948-2017, écrivain et journaliste, se marie en 1979 au château du Saillant avec Clémence de Lasteyrie de Saillant.","architecture":"Mirabeau saillant,  du château primitif subsiste un bâtiment rectangulaire proche du carré, ainsi que des mâchicoulis. Vestiges d'architecture militaire au sous-sol et toiture à la Mansard.  Le château , construit au XVe siècle,  fut remanié au XVIIe siècle, à l'emplacement d'une vaste forteresse (qui comptait soi-disant 17 tours) se présente aujourd'hui comme une puissante architecture de plan carré, restaurée aux XVIIIe siècle et XIXe siècle, entourée d'eau sur trois côtés par les douves, et par les eaux de la Vézère. La composition classique des jardins en parterres réguliers, ponctués de topiaires, devient paysagère aux abords de la rivière. Aujourd'hui plus maison forte que château constituée dun grand logis rectangulaire à deux niveaux couronné de mâchicoulis, recoiffé à la Mansard et percé de lucarnes au XVIII siècle.Date de protection M.H. en 1979 et 1997.\r\nLASTEYRIE  Il est situé sur la partie du Saillant rattachée à la commune d'Allassac, sur la rive gauche de la Vézère, à gauche de la petite route qui monte vers le Saillant-Vieux. A ne pas confondre avec la château de Lasteyrie (ou de Gramont-bas), qui se trouve sur la commune de Lissac, à la limite de Brive, en bordure de la route départementale 59, et qui a été habité par Charles de Lasteyrie, ministre des finances sous le gouvernement de Raymond Poincaré.","habitants":"M. et Mme Paul de Lasteyrie du Saillant.\r\n        \"","divers":"Troisq châteaux à Saillant celui de Lasteyrie gr 1-2, Saillant-Mirabeau gr 3-4 et de Brudie-Objat gr  5-6.","gps":"","images":["../image/image_19/19_Saillant_1.jpg","../image/image_19/19_Saillant_2.jpg","../image/image_19/19_Saillant_3.jpg","../image/image_19/19_Saillant_4.jpg","../image/image_19/19_Saillant_5.jpg","../image/image_19/19_Saillant_6.jpg"]},"Consult_chateau_formulairec949-2":{"id":"Consult_chateau_formulairec949-2","dept":"19","canton":"Uzerche","commune":"Salon la Tour","nom":"Salon_la_Tour","type":"Château-Tour","periode":"XII-XV-XVII","histoire":"A Salon la Tour le château de la Grenerie (voir article), du Pin (Voir article), la tour Vicomtale du XIIe siècle,  Tour, reste d'une ancienne forteresse ayant appartenu aux vicomtes de Limoges et détruite par Richard Cur de Lion,  et château du Fraysset.                       SALON, ces seigneuries sont dans la fondalité directe du Vicomte de Limoges. A appartenu aux de la Tour dès le XIIe siècle, cependant, Salon n'est pas ou n'est plus une châtellenie au XVe siècle. Elle est rattachée à la châtellenie de Masseret.  Alain d'Albret, époux de Françoise de Châtillon, maison de Blois-Bretagne, héritière de la Vicomté de Limoges, est en procès avec sa belle-sur madame de Montrésor. Ce procès donne lieu à un recensement dans la vicomté des châtellenies et des domaines relevant de la propriété du vicomte et aussi de tous les revenus dont les droits de justice, cens, fours banaux, etc. \r\n  FRAYSSET  château construit par Pierre du Breuil en 1430 .","architecture":"Au cur du village de Salon la Tour, qui prit le nom de la tour en référence à cette dernière se dresse un imposant donjon du XIe siècle en bois, bâti sur une motte féodale brulé par les barbares vers 1200 et reconstruite en pierre en 1250 et servit de tour de guet de 8,80 de côté et  45 mètres de haut. De belles demeures limousines sont venues se blottir aux pieds de cette tour protectrice. Non loin de là, la maison forte du Freysset, du XVe siècle, présente un plan rectangulaire avec une tour saillante d'escalier en façade.","habitants":"Famille d'Alain d'Albret                                          Famille Pierre du Breuil\r\n        \"","divers":"A Salon la tour le château la tour Vicomtale .  Tour, reste d'une ancienne forteresse  et château du Fraysset gr 4","gps":"","images":["../image/image_19/19_Salon_la_Tour_1.jpg","../image/image_19/19_Salon_la_Tour_2.jpg","../image/image_19/19_Salon_la_Tour_3.jpg","../image/image_19/19_Salon_la_Tour_4.jpg"]},"Consult_chateau_formulairec8a4-2":{"id":"Consult_chateau_formulairec8a4-2","dept":"19","canton":"Seilhac","commune":"Seilhac","nom":"Seilhac","type":"Château","periode":"XVII","histoire":"SEILHAC, une châtellenie existait dès le début du XIIe siècle Le nom de « Seilhac » vient de lassociation du nom dun homme Sailus, propriétaire dun domaine agricole. La formation du nom de la commune est antérieure au VIe siècle. Sa position au carrefour de vieux chemins donna au bourg son essor. \r\nEn 1784, Turgot, alors intendant du Limousin, établit la route reliant Paris au centre de la France. Grâce à linfluence du marquis de Seilhac, cette route passa par la ville du même nom. En 1790, le rang du bourg est confirmé et reçoit le chef-lieu du canton. Victor de Seilhac fut au siècle dernier un historien de talent.","architecture":"SEILHAC, la tour a dû être bâtie fin XIIIe ou début XIVe siècle. Durant les guerres de Religion, en 1586, le château fut démoli, puis reconstruit. Pendant la Révolution, il fut dévasté en 1792, puis exploité comme carrière de pierres. Si le rez-de-chaussée conserve des structures médiévales et la tour sud une coupole médiévale, les autres parties de l'édifice furent rhabillées au début du XIXe siècle dans un style Renaissance pour la façade au sud-ouest et XIXe siècle pour la façade sud-est, la tour Est polygonale avec des ouvertures Renaissance et la porte Est cantonnée de pilastres avec chapiteaux et corniches moulurés. Au-dessus de la corniche sont sculptés des chapiteaux ornés de volutes, le chemin de ronde et les mâchicoulis. A l'ouest de la tour et prenant appui sur le mur, une tour en échauguette abritant un escalier à vis qui menait à l'ancien chemin de ronde. La tour sud est voûtée, au rez-de-chaussée, d'une coupole médiévale. L'escalier à double révolution a été construit après la première guerre mondiale. Éléments protégés MH : les façades et les toitures du château, du pavillon d'entrée, de l'orangerie et du pavillon cruciforme: inscription par arrêté du 24 mai 1991, propriété d'une personne privée, inscription sur l'inventaire supplémentaire des M.H.en 1991, non visitable. L'ensemble formé par le château, le parc et leurs abords a été classé parmi les sites pittoresques en 1955.","habitants":"Marquis de Seilhac\r\n        \"","divers":"Bournazel gr 5 moustier ventadour gr 6                   Seilhac GPS : 45° 21' 58\" Nord, 1° 42' 41\" Est","gps":"45° 21' 58\" Nord, 1° 42' 41\" Est","images":["../image/image_19/19_Seilhac_1.jpg","../image/image_19/19_Seilhac_2.jpg","../image/image_19/19_Seilhac_3.jpg","../image/image_19/19_Seilhac_4.jpg","../image/image_19/19_Seilhac_5.jpg","../image/image_19/19_Seilhac_6.jpg"]},"Consult_chateau_formulairebd42":{"id":"Consult_chateau_formulairebd42","dept":"19","canton":"Argentat","commune":"St_Chamant","nom":"Soulage","type":"Château","periode":"XIII-XIX","histoire":"St-CHAMAND -SOULAGE Le château est situé dans la vallée de la Souvigne qui appartenait à la Vicomté de Turenne. Les  Maffre, originaires d'Argentat, devinrent seigneurs de Soulages au XVe siècle.","architecture":"SOULAGE du XIII-XIXe siècles L'édifice, ancien poste de surveillance de la vallée, il comporte deux corps de bâtiments articulés autour d'une haute et élégante tour octogonale d'escalier du XVe siècle qui a conservé son couronnement avec chemin de ronde et mâchicoulis. Celle-ci présente sous l'arc en accolade de sa porte d'entrée des écus sculptés aux armes des seigneurs de soulage. Le corps de logis sud, d'allure renaissance est flanqué d'une tourelle à échauguette à culot mouluré. Sur la terrasse sud, à l'écart de l'habitation, une ancienne chapelle s'abrite sous un toit que couronne un pavillon en charpente. Elle est de plan carré et s'appuie sur deux piliers de bois, en avancée sur la vallée, on perçoit la silhouette du château et ses lourdes toitures de lauze. Du château de Saint-Chamant ne subsistent plus que les vestiges d'une tour du XIIIe siècle, inscrite en 2014 au titre des M.H.","habitants":"Famille des  Maffre\r\n        \"","divers":"Château de Soulage à St-Chamant","gps":"","images":["../image/image_19/19_Soulage_1.jpg","../image/image_19/19_Soulage_2.jpg","../image/image_19/19_Soulage_3.jpg","../image/image_19/19_Soulage_4.jpg","../image/image_19/19_Soulage_5.jpg"]},"Consult_chateau_formulaire9dcd":{"id":"Consult_chateau_formulaire9dcd","dept":"19","canton":"Meymac","commune":"Saint-Angel","nom":"St_Angel","type":"Château","periode":"XVI-XIX","histoire":"ST-ANGEL,  le village doit son nom au prieuré fondé au VIIIe siècle et dédié à saint-Michel des Anges. Ce fut une place occupée par les Anglais pendant la guerre de cent Ans : la fin de l'occupation fut marquée par l'incendie du prieuré en 1375.  En 1793, Saint-Fréjoux-le-Mineur fusionne avec Saint-Angel. Pour suivre un décret de la convention, elle change de nom pour Angel-la-Montagne. La brigade Jesser y passa durant la seconde guerre mondiale.  Le château  du XVI-XIXe siècle de style du XVIIIe siècle.","architecture":"Le prieuré de Saint-Michel-des-Anges, ancienne dépendance de labbaye bénédictine de Charroux, fut reconstruit après la guerre de cent ans et rattaché au XVIIe siècle à la congrégation de Saint-Maur. Amputé dune partie de ses bâtiments, il a conservé son église, son presbytère à tour ronde couronnée de mâchicoulis et une aile abritant une salle capitulaire, prieuré Saint-Michel-des-Anges d'origine XIIe siècle, reconstruit aux XVe et XVIIe siècles. Avec l'église fortifiée et les bâtiments conventuels, la tour ronde du presbytère forment un ensemble harmonieux et imposant. Il reste encore des objets liturgiques et statues des XVIIe et XVIIIe siècles. Des vierges en bois polychrome ont été récemment volées.","habitants":"\"","divers":"Château-prieuré de Saint-Angel","gps":"","images":["../image/image_19/19_St_Angel_1.jpg","../image/image_19/19_St_Angel_2.jpg","../image/image_19/19_St_Angel_3.jpg","../image/image_19/19_St_Angel_4.jpg"]},"Consult_chateau_formulairee343-2":{"id":"Consult_chateau_formulairee343-2","dept":"19","canton":"Naves","commune":"Saint-Augustin","nom":"St_Augustin","type":"Château","periode":"XVII","histoire":"A Saint-Augustin le château de Tourondel et de Beyssac.                                                               TOURONDEL, dit le château de Leymarie, sur la route de Tulle, près du village de Sarlat.  Il connut une histoire mouvementée. En 1599, les \" ennemis du roi \" l'auraient incendié avec ses papiers et ses titres, et la dame du lieu, Marguerite de Gimel, aurait trouvé la mort dans ce siège. C'étaient les De Bar qui l'occupaient alors. Par alliance, en 1648, Catherine De Bar le porta aux Fénis qui l'eurent aux XVIIe, XVIIIe et XIXe siècles.  Le dernier Fénis, qui eut le Tourondel, s'en est titré comte en prétendant même au titre de duc de Rohan-Ventadour que lui interdirent les tribunaux. Est-ce lui qui fit sculpter les armes des Ventadour. En tous cas, la présence des armes au Tourondel, ne peut guère s'expliquer autrement que par une fantaisie de Fénis. C'est sept ans avant sa mort que le château passa aux comte de Beyssac. Le château de Beyssac,  la famille Comte qui l'a possédé depuis le XVe siècle fut anoblie ou maintenue dans la noblesse par lettres patentes de 1677.\r\n Les Comtes étaient des bourgeois originaires de Treignac.","architecture":"Le château du Tourondel est un château  du XIV-XVIe siècles bâti à Saint-Augustin.  Flanque de deux tours carrées et une tour ronde.  On dit que près du château en était un autre, appelé la TOUR, antérieur à 1430 et qui était peut être le primitif.\r\nLe château de Beyssac a été détruit pendant l'incendie des Monédières, puis reconstruit par la famille La Jaurie.  Dans ce château, qui sert actuellement de colonie de vacances à l'armée, se trouve une plaque foyère aux armes d'une famille inconnue.","habitants":"Famille de Fénis\r\n        \"","divers":"A Saint Augustin le château de Tourondel et de Beyssac gr 5-6-7.    Tourondel GPS : 45° 25' 30\" Nord 1° 50' 19\" Est","gps":"45° 25' 30\" Nord 1° 50' 19\" Est","images":["../image/image_19/19_St_Augustin_1.jpg","../image/image_19/19_St_Augustin_2.jpg","../image/image_19/19_St_Augustin_3.jpg","../image/image_19/19_St_Augustin_4.jpg","../image/image_19/19_St_Augustin_5.jpg","../image/image_19/19_St_Augustin_6.jpg","../image/image_19/19_St_Augustin_7.jpg"]},"Consult_chateau_formulaire499a":{"id":"Consult_chateau_formulaire499a","dept":"19","canton":"Objat","commune":"Saint-Cyr la Roche","nom":"St_Cyr_la_Roche","type":"Château","periode":"XVI-XIX","histoire":"ST-CYR, la plus ancienne mention de Saint-Cyr date de sa prise sur les Anglais au XIVe siècle. C'est une baronnie appartenant aux marquis de Pompadour au XVIe siècle (in-quarto dans les armoiries de Saint Cyr). Pendant la Révolution, la commune s'appellera Aubepeyre. Le manoir qui jouxte l'église appartient aux Pompadour qui étaient barons de Saint-Cyr. Il fut vendu par Jean III en 1656 à Jean Pascarel de Laplace, un ancêtre de l'actuelle propriétaire.","architecture":"Au Moyen-Âge, le village de Saint-Cyr comprenait un château en son centre et deux maisons fortes protégeant les entrées au sud (côtoyant l'église) et à l'est (côtoyant la chapelle). La tour carrée du XIVe siècle a été ouverte au XVIe siècle à la fin des guerres de religion. Au sommet existe un petit oratoire et les traces d'un escalier supérieur.  \r\nL'enceinte a été agrandie probablement au moment des guerres de religion pour protéger l'entrée de l'église par une meurtrière.  Certaines meurtrières sont protégées par des redents curvilignes pour détourner les projectiles des assaillants. L'entrée principale ancienne (traces d'une herse) se trouvait autrefois entre les deux tours (se flanquant mutuellement), pour protéger l'entrée sud du village. Un bâtiment neuf y fut construit en 1743. L'agencement des pièces, des traces anciennes d'incendie et la présence de meurtrières intérieures prouvent que la maison principale a été construite sur de plus anciens bâtiments.","habitants":"Marquis de Pompadour\r\n        \"","divers":"Château de saint-Cyr la Roche","gps":"","images":["../image/image_19/19_St_Cyr_la_Roche_1.jpg","../image/image_19/19_St_Cyr_la_Roche_2.jpg","../image/image_19/19_St_Cyr_la_Roche_3.jpg","../image/image_19/19_St_Cyr_la_Roche_4.jpg","../image/image_19/19_St_Cyr_la_Roche_5.jpg"]},"Consult_chateau_formulaire660c":{"id":"Consult_chateau_formulaire660c","dept":"19","canton":"Bort les Orgues","commune":"Saint-Exupéry les Roches","nom":"St_Exupéry_les_Roches","type":"Château","periode":"XV-XVII","histoire":"Ruines féodales des châteaux forts de Charlus-le-Pailhoux  du XIIIe siècle et de Charlus-Chabanne surplombant les gorges de la Diège.\r\nGANNE, le moulin de la Bessette ruiné est attesté qu'il a été fondé en 1286 par Pierre-André de la Ganne.  C'est un château fort du XVe siècle, remaniements aux XVe-XVIIe-XVIIIe-et XIXe siècles, comprenant des terrasses et une chapelle du XVIIIe siècle décorée avec des peintures et des boiseries du XIXe siècle. Louis Paul de Selves fit l'acquisition de ce château en 1804. le château et reprend le flambeau toujours dans la famille de Guy de Selve qui en à hérité en 1965.\r\nMARTINET du XVIIe siècle.Il a été inscrit à linventaire supplémentaire des M.H. le 26 décembre 1980","architecture":"GANNE, est imprégné des huit générations qui s'y sont succédé.  À chaque descendant, sa part de restauration et sa petite touche pour rénover les lieux. Ainsi, une tour du XVe abrite une petite chapelle de 1610 qui fut décorée au XIXe de boiseries et de peintures. En son coeur, des vitraux de 1880 réalisés à Tours, une pieta du XVIIIe et des émaux de Limoges. Un brassage temporel et géographique qui se poursuit dans la cour. « Nous ne sommes pas à Versailles, mais il y a beaucoup de petits détails remarquables, comme ces fenêtres Renaissance ou encore cette chartreuse bâtie à la fin du XVIIIe ». Une cour fermée qui accueille un donjon avec sa tour de l'escalier datant du XVe siècle et dont l'ensemble a été revisité par les différentes générations de propriétaires. Partant d'une bâtisse de défense, l'un d'entre eux a créé des ouvertures sur l'extérieur et l'intérieur offrant un nouveau visage, plus accueillant, la tour ronde qui abrite une chapelle couverte d'une voûte à nervures rayonnantes daterait de la fin du XVe ou du début du XVIe siècle. Elle est flanquée d'une tourelle enfermant un escalier à vis. Le logis rectangulaire de trois étages est flanqué d'une tourelle d'escalier carrée. L'aile plus basse a été construite au XVIIIe siècle. Une autre aile décorée de tourelles et de fenêtres néo-gothiques relie la tour et le corps de logis et date du XIXe siècle.","habitants":"Famille De Selve de Sarran \r\n        \"","divers":"Château de St-Exupéry Les Roches.                              La Ganes  GPS : 45° 29' 41\" Nord et 2° 22' 26\" Est gr-3","gps":"45° 29' 41\" Nord et 2° 22' 26\" Est gr-3","images":["../image/image_19/19_St_Exup%c3%a9ry_les_Roches_1.jpg","../image/image_19/19_St_Exup%c3%a9ry_les_Roches_2.jpg","../image/image_19/19_St_Exup%c3%a9ry_les_Roches_3.jpg"]},"Consult_chateau_formulairead6b":{"id":"Consult_chateau_formulairead6b","dept":"19","canton":"St-Pantaléon de Larche","commune":"St_Germain_Lavolps","nom":"St_Germain_Lavolps","type":"Château","periode":"XV-XVII","histoire":"ST-GERMAIN de LAVOLPS, Saint-Germain-Lavolps était un fief de la famille de Rochefort Châteauvert. Le château de Saint-Germain, sis à Saint-Germain Lavolps est mentionné au XVe siècle.  En 1522, à l'occasion du mariage de Charlotte de Rochefort-Châteauvert avec Jean d'Ussel, cette propriété, ainsi que la baronnie de Châteauvert, passa dans la famille d'Ussel. Cette dernière conserve la terre de Saint-Germain jusqu'en 1661.  Le 23 octobre 1661, Gilbert d'Ussel vendit à Antoine de Labarre de Lafeuillade.  C'est  Antoine de Labarre qui fit construire l'édifice actuel. Son fils, Martin de Labarre, qui était officier de la maison du Roi en qualité de \"Lieutenant de la Grande Fauconnerie de France au second vol pour Milan\" lui succéda. Le fils de Martin, François de Labarre, écuyer, n'eut pas d'héritier mâle, et sa fille unique, Marguerite, épousa le 12 février 1741 Joseph Lachaze, qui était originaire d'Auvergne.  La famille Lachaze, plus tard appelée Lachaze de Saint-Germain, va conserver la terre de Saint-Germain jusqu'en 1891, date à laquelle Edgard Lachaze de Saint-Germain se verra contraint (dette de jeu) de vendre la propriété, qui était alors constituée de 1.000 hectares, du château et de plusieurs fermes. Propriété de la famille Thil.","architecture":"Château bâti à Saint Germain-Lavolps  et  a été reconstruit à la fin du XVIIe au XIXe siècle. Avec tours carrées. Le château est en mauvais état, privé et fermé au public. \r\n  A partir de là, la  propriété va être rapidement morcelée, et l'édifice actuel transformé en ferme, en débit de boissons et en réfectoire scolaire. Son état menacant ruine il sera définitivement abandonné en 1970, avant d'être repris en novembre 1990. En 1993, la délégation corrézienne des VMF lui attribue le prix Sauvegarde du Patrimoine Corrézien et en 1999 il obtient le label Patrimoine Historique.","habitants":"Famille de Rochefort-Châteauvert\r\n        \"","divers":"St-Germain de Lavolps GPS : 45° 36' 51\" Nord 2° 12' 24\" Est","gps":"45° 36' 51\" Nord 2° 12' 24\" Est","images":["../image/image_19/19_St_Germain_Lavolps_1.jpg","../image/image_19/19_St_Germain_Lavolps_2.jpg","../image/image_19/19_St_Germain_Lavolps_3.jpg"]},"Consult_chateau_formulairec7b1":{"id":"Consult_chateau_formulairec7b1","dept":"19","canton":"Argentat","commune":"St-Julien au bois","nom":"St_Julien_au_Bois","type":"Château","periode":"XIX-XX","histoire":"BOIS, offrant une vue sur la montagne, le gîte chateau le Bois propose une maison de vacances individuelle dotée d'une terrasse et d'un jardin avec une piscine extérieure ouverte en saison à Saint-Julien-aux-Bois. Aujourd'hui hôtel restaurant et hôtel de ville.","architecture":"château Bois du XIX-XXe siècles de plan rectangulaire flanqué de tours carrées   à deux niveaux et lucarnes sur un toit recouvert de tuiles et toit en bulbe sur les tours carrées.","habitants":"personnages locaux\r\n        \"","divers":"Château à Saint-Julien du Bois","gps":"","images":["../image/image_19/19_St_Julien_au_Bois_1.jpg","../image/image_19/19_St_Julien_au_Bois_2.jpg","../image/image_19/19_St_Julien_au_Bois_3.jpg","../image/image_19/19_St_Julien_au_Bois_4.jpg"]},"Consult_chateau_formulairee3bd":{"id":"Consult_chateau_formulairee3bd","dept":"19","canton":"Uzerche","commune":"Saint-Martin-Sepert","nom":"St_Martin_Sepert","type":"Château","periode":"XVIII","histoire":"St-MARTIN-Sepert,  les armes de la famille Materre comme effigie officielle de la commune dans laquelle rési
