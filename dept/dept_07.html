t aplatit. Rochemure de ce château perché, il ne reste que des pans de murs.","habitants":"famille de Jacques de Chambaud  \r\nfamille de René de la Tour-Gouvernet  \r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Fontreal_1.jpg","../../jctruffet.com/image/image_07/07_Fontreal_2.jpg","../../jctruffet.com/image/image_07/07_Fontreal_3.jpg"]},"Consult_chateau_formulaire661f":{"id":"Consult_chateau_formulaire661f","dept":"07","canton":"Antraigues","commune":"Genestelle","nom":"Genestelle","type":"Vestiges","periode":"XII","histoire":"Craux: cité en 1160, par les seigneurs d'Ucel, resta dans la famille jusqu'en 1550 (seigneurie combative par des croisades et guerres de religion) quand noble René d'Ucel  épousa une Voguë, mais les guerres de religion obligèrent ce seigneur à quitter le château pour leur hôtel à Aubenas. Puis à Alexandre de Trémolet seigneur de Craux et co-seigneur de Montagut, il avait épousé en 1570 Marie de Pouzols de la Tour-Poisac, cette famille resta dans cette seigneurie jusqu'à Louis-Annet-Marie du Trémolet de Lacheysserie seigneur de Craux fut le dernier seigneur en 1764, qui avait épousé Anne Berion de Beaurepaire dont ils eurent sept enfants.\r\nEn 1750 le domaine passa à  Raymond de Mourmoiron, marquis de Modène, leur ménage s'étend défait vendirent le château  à Christophe de Sauzet de Fabrias, conseiller à la cour de Montpellier, ces derniers maintiennent le château qui traversa la Révolution sans problème. \r\nAu XIXe siècle jean-Antoine de Sauzet de Fabrias aura que deux filles  Valentine et Madeleine de Fabrias qui héritèrent, mais restées célibataires décédèrent en 1944.\r\nLe château fut acquit par le général Laval qui ne l'occupe pas, le laissa se dégrader, et le château fut classé monument historique en 1980 loué à une association par les propriétaires, et fut racheté en 1994  par la commune de Genestelle. \r\nLe dauphin, le futur Roi Louis XI y aurait séjourné.                        Conchis; cette seigneurie était tenue au XIVe siècle par la famille de Del Masoier: Au XVe siècle Pons alias  Chalabrueysse et c'est cette famille qui fit construire le manoir au XVIe siècle par Benoit Chalabrueysse  sieur de Galimard habité Conchis en 1650, cette famille se répandit dans diverses seigneuries encore vivantes au XIXe siècle. Aujourd'hui propriété de monsieur Pierre Sabot.","architecture":"Craux; composé d'un  corps de logis quadrangulaire  solidement contrebuté par trois grosses  tours cylindriques. Une quatrième servait de tour de guet Mutilé par des vandales, une association a pour mission de le restaurer.          Conchis; corps de logis carré à deux niveaux avec tour ronde accolée sur la partie Est.","habitants":"famille de René D'Ucel \r\nfamille Trémolet \r\nfamille de Christophe de Sauzet de Fabrias\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Craux_1.jpg","../../jctruffet.com/image/image_07/07_Craux_2.jpg","../../jctruffet.com/image/image_07/07_Craux_3.jpg","../../jctruffet.com/image/image_07/07_Craux_4.jpg","../../jctruffet.com/image/image_07/07_Craux_5.jpg","../../jctruffet.com/image/image_07/07_Craux_6.jpg","../../jctruffet.com/image/image_07/07_Craux_7.jpg"]},"Consult_chateau_formulairebb7b":{"id":"Consult_chateau_formulairebb7b","dept":"07","canton":"Annonay","commune":"Vanosc","nom":"Gerlande-Rivoire","type":"Château","periode":"XVIII","histoire":"Gerlande: en 1414 Poncet ou Pons de Gerlande en rendit hommage à Guillaume de Tournon, seigneur d'Ay, passa par mariage à Artaud de Fay marquis de Gerlande en 1757 qui l'a conservé jusqu'à la Révolution, mais le 8 décembre 1729, par imprudence il fut réduit en cendres. \r\nLe nouveau château a été construit à côté de l'ancien par Mr Marcelin Rouveure député de l'Ardèche vers 1865. Aujourd'hui acquis par un groupement de propriétaires.                         La RIVOIRE: cité au XIIIe siècle par Martin de de la Rivoire-Demoiseau en 1275, resta dans la famille jusqu'en 1713, acquis par Méraut Pichon, secrétaire du roi, il eu deux filles; Marie-Charlotte, Joséphine de la Rivoire en hérita et se maria à Michel de Missy sans enfant remariée en 1780 à Marie-Joseph, comte de Gain de Montagnac et le château resta dans la famille jusqu'à la Révolution. Ensuite Vachon de Lestra, conseiller général de l'Ardèche y résida, passa ensuite à madame veuve Bonnot.","architecture":"Gerlande; le château de Gerlande comprend un coquet édifice datant du XIXe siècle et servant de centre de vacances ainsi que les vestiges d'une maison forte médiévale aujourd'hui château moderne, reconstruit après l'incendie dans un style moderne \"plaisance\" à deux étages flanqué d'une tour ronde.                               Rivoire; bâtie sur les ruines d'une ancienne forteresse, cette demeure est composé d'un corps de logis. Le château de la Rivoire fut entièrement reconstruit au XVIIIe siècle. Surmonté d'un fronton triangulaire, le corps du bâtiment central est encadré par deux ailes percées d'arcades. Une grosse tour médiévale reste intégrée au mur d'enceinte du domaine, le bâtiment central accosté de deux ailes basses percées d'arcades plein cintre, avant corps massif.","habitants":"Famille Poncet\r\nFamille de Fay de Gerlande\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Gerlande_1.jpg","../../jctruffet.com/image/image_07/07_Gerlande_2.jpg","../../jctruffet.com/image/image_07/07_Gerlande_3.jpg","../../jctruffet.com/image/image_07/07_Gerlande_4.jpg"]},"Consult_chateau_formulaire9010":{"id":"Consult_chateau_formulaire9010","dept":"07","canton":"Largentière","commune":"Rocher","nom":"Gigord_Cedres","type":"Château","periode":"XVIII","histoire":"Gigord, un Michel de Gigord écuyer seigneur du Vignal lieutenant de la vicomté de Joyeuse en 1534 marié à Jeanne Barthélémy eurent trois enfants; Michel fit carrière militaire capitaine sous les ordres de Guillaume de Balzac et deux filles Marguerite et Louise, un Raymond de Gigord seigneur écuyer, juge mage et lieutenant général du Duché de Joyeuse en 1582.","architecture":"Gigord dit des Cèdres; corps de logis quadrangulaire à deux étages et attique, flanqué d'échauguettes en angles, transformé aujourd'hui en centre médical appelé \"les Cèdres\"","habitants":"Famille Rocher\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Gigord_Cedres_1.jpg","../../jctruffet.com/image/image_07/07_Gigord_Cedres_2.jpg"]},"Consult_chateau_formulairef62d":{"id":"Consult_chateau_formulairef62d","dept":"07","canton":"Lamastre","commune":"Gilhoc-sur-Ormèze","nom":"Gilhoc_sur_Ormeze","type":"Manoir","periode":"XV-XVII","histoire":"Dans la commune de Gilhoc plusieurs châteaux dont le premier celui de SOLIGNAC; du XIe au XIVe siècle le château appartenait aux seigneurs de Solignac, en 1187 Pierre de Solignac, en 1190 Aymon de Solignac, en 1215 Arnauld de Solignac, en 1300 Aymon de Solignac, en 1375 Guillaume de Solignac qui en rend hommage à Louis de Poitiers, comte du Valentinois. \r\nDOL: Au féodal dépendait des seigneurs Fay-Solignac, Louis-Charles de Fay-Solignac fils de Claude de Fay-Solignac et de dame Magdeleine de Combe-Lacour de Montréal représentante d'une branche cadette détachée de la précédente au commencement du XVIe siècle qui jusque la eut sa résidence au château de Dol et qui comme son aîné avait fourni  aux armées royales un grand nombre de vaillants capitaines  puis passa aux Montgiraud. Au XVIe siècle les seigneurs de Fay-Solignac firent construire un autre Château au-dessus appelé \"Château du Bosc\" car leur château tomba en ruine suite aux guerres de religion.                             BOSCS: En 1600 Pierre de Boscs qui embrassa une carrière militaire anoblie, acquit la seigneurie des Fay-Solignac, puis à François de Beaumont marquis de Brison, baron de l'Argentière, devenu comte de Boscs, son petit-fils François-Denis-Auguste de Grimoard de Beauvoir du Roure de Beaumont Brison, marquis de Brison, comte de Boscs et Baron de l'Argentière et des états du Vivarais, le 29 Mars 1783 vendit ses biens à messire Louis Charles de Fay Solignac, baron de Montréal et seigneur de Dol, puis au Baron de Framond par alliance. \r\nCe château fut investit par les camisards en 1709.                                  BESSIN: Le 6 septembre 1578, dans la maison forte du Bessin, en salle basse du dit lieu, le noble Antoine de Vernoux, écuyer, seigneur du Bessin et du Monestier, dictait son testament.","architecture":"Solignac; de ce château il ne reste que deux pans de murs, l'un correspondant à un donjon, l'autre à un angle de corps de logis.                                Dol: Aujourd'hui apparaît encore les tours rondes et les fenêtres à meneaux, transformé en ferme.                     Boscs; construction classique des châteaux du Vivarais, corps de logis rectangulaire à trois étages flanqué de deux grosses tours rondes arasées et de tourelles sur la partie arrière, très remanié .                           Bessin:  Manoir quadrangulaire à deux étages flanqué de  tourelles en angles et d'un fronton arrondi sculpté, l'ensemble construit au XVIIe siècle.","habitants":"Bessin: famille d'Antoine de Vernoux   Dol: Famille de Fay-Solignac\r\n        \"","divers":"Gilhoc-sur-Orméze, les vestiges de Solignac, le manoir de Dol, le château du Boscs et le château du Bessins.","gps":"","images":["../../jctruffet.com/image/image_07/07_Gilhoc_sur_Ormeze_1.jpg","../../jctruffet.com/image/image_07/07_Gilhoc_sur_Ormeze_2.jpg","../../jctruffet.com/image/image_07/07_Gilhoc_sur_Ormeze_3.jpg","../../jctruffet.com/image/image_07/07_Gilhoc_sur_Ormeze_4.jpg","../../jctruffet.com/image/image_07/07_Gilhoc_sur_Ormeze_5.jpg","../../jctruffet.com/image/image_07/07_Gilhoc_sur_Ormeze_6.jpg","../../jctruffet.com/image/image_07/07_Gilhoc_sur_Ormeze_7.jpg","../../jctruffet.com/image/image_07/07_Gilhoc_sur_Ormeze_8.jpg","../../jctruffet.com/image/image_07/07_Gilhoc_sur_Ormeze_9.jpg"]},"Consult_chateau_formulaire7315":{"id":"Consult_chateau_formulaire7315","dept":"07","canton":"Annonay","commune":"St-Clair","nom":"Gourdan (07)","type":"Château","periode":"XVIII","histoire":"Gourdan: cette terre était déjà seigneurie au XVe siècle par la famille Peloux qui habitait le domaine depuis le XIIe siècle puisqu'un Guy de Peloux chevalier était cité.                   Le château fut construit en 1577 sur l'emplacement d'une ancienne bâtisse par Bernardin du Peloux, en 1597 Nicolas du Peloux seigneur, puis Marguerite du Peloux, héritière de sa maison, porta, en 1605, ses biens à Louis de Voguë. Pendant sept générations, les descendants de Louis de Voguë et de Marguerite du Peloux conservèrent la seigneurie de Gourdan.    Jean-Felix de Voguë, sans héritier direct transmet le domaine à un de ses petits fils encore mineur Eugéne, qui permettra de passer la Révolution sans heurt, et Eugéne de Voguë reprit possession de ses bien en 1802,  Eugéne-Melchior, vicomte de Voguë, membre de L'académie française et de l'académie impériale des sciences de St-Pétersbourg, ancien député de l'Ardéche, en fut le dernier propriétaire, vendit Gourdan à Mme Augustine Roux, en 1869, revendu à Joseph Ribes en 1907 et à Mr Guy Bechetoille en 1943 .\r\n Monsieur Patrice Caillet l'acquit en 1987.","architecture":"Archi-type de l'architecture  du château à la Française du XVIIIe siècle, il a conservé des édifices antérieurs une tour et une aile avec une chapelle. La façade sur jardin adopte la partie avant-corps central surmonté d'un  fronton triangulaire .","habitants":"famille de Margueritte du Pelloux  \r\nfamille de Louis de Voguë\r\nMonsieur Patrice Caillet\r\n        \"","divers":"\"","gps":"","images":["../../jctruffet.com/image/image_07/07_Gourdan_1.jpg","../../jctruffet.com/image/image_07/07_Gourdan_2.jpg","../../jctruffet.com/image/image_07/07_Gourdan_3.jpg"]},"Consult_chateau_formulairefe0d":{"id":"Consult_chateau_formulairefe0d","dept":"07","canton":"Chomérac","commune":"St-Lager-de-Bressac","nom":"Granoux","type":"Manoir","periode":"XVI","histoire":"GRANOUX: en 1513, Giraud de Bézaudier venant du Limousin s'installe à Granoux, Seigneur de St-Lager, qui construisit en 1584 le château  à François d'Annet de la Pimpie, en 1690 et en 1789 à Jean Baptiste de la Pimpie de Granoux, lieutenant des maréchaux de France, mourut sans postérité. \r\nLe 5 Mai 1782 le château passa à Alfred d'Hilaire de Joviac, fils de Jean Antoine d'Hilaire de Joviac. Alfred; conseillé général de l'Ardèche, dont la fille fut mariée en 1860 à Hélion de la Guéronnière, fils  du conseiller d'état; et en 1866, à Albert du Chaffaut, chef d'escadron au 14e d'Artillerie.          FONTBLACHERE: Ancien fief des  comtes de Poitiers Valentinois. Au XVIe siècle aux de Bezaugier, seigneurs de Granoux et bailli de La Voulte. Famille Chambaud 1650; Scipion Chambaud de Fontblachères  seigneur du lieu, la famille de Chambaud qui  s'éteignit en 1731 et  Gabriel François de Sampigny d'Issoncourt, passa aux de Pimpie, qui furent également seigneur de St-Lager de Granoux et bailli de La Voulte et cela jusqu'à la Révolution.","architecture":"Granoux; ce château fut construit avec des tours crénelées et des fortifications qui furent détruites sur demande du roi, mais reconstruit plus simplement.  \r\nDans un parc, corps de logis en équerre, a trois étages flanqué de tourelles crénelées.                            Fontblachère; de forme quadrangulaire à deux étages  flanqué de deux tours carrées sur la partie Ouest, toit aplanis en tuiles provençales.","habitants":"famille de Giraud de Bezaudier\r\nfamille d'Antoine de la Pimpie\r\n        \"","divers":"Château de Loubier","gps":"","images":["../../jctruffet.com/image/image_07/07_Granoux_1.jpg","../../jctruffet.com/image/image_07/07_Granoux_2.jpg","../../jctruffet.com/image/image_07/07_Granoux_3.jpg"]},"Consult_chateau_formulaire0532-2":{"id":"Consult_chateau_formulaire0532-2","dept":"07","canton":"Joyeuse","commune":"Grospierres","nom":"Grospierres","type":"Vestiges","periode":"X_XI","histoire":"Chastelas-Grospierres:  mentionné au XIe siècle, l'évêque de Viviers, Nicolas, suzerain de Dalmace de Grospierres, l'avait remis en 1193 à Raymond V de Toulouse, passa aux Lagorce en 1405 puis aux d'Apchier en 1408. François d'Apchier vendit alors, en 1546, la seigneurie de Grospierres au vicomte de jean de Joyeuse, puis aux de la Gorce, aux Rohan-Soubise, puis aux Beaumefort. \r\nEn 1591 le château fut envahie.  \r\nLes guerres de religion ont détruit village et château, et en 1703 par les camisards qui terminèrent la démolition. Dans la commune deux châteaux.          BOURNET: cette aimable demeure a gardé le nom de l'ancien fief dés le XVIe siècle par la famille Allamel de Bournet de Grospierres notaire à Largentière en 1487.\r\nA la Révolution Jean-Louis d'Allamel de Bournet fut fusillé, son ainé garde les terres de Gropierres, le fis cadet Joseph-Guillaume-Louis d'Allamel, écuyer épouse le 19 juin 1801 Olympe de Barruel en temps que seigneur de Bournet Valoubières et Sauvages, émigre et récupère les terres à l'an VI. Cette famille, une des plus distinguée du Vivarais, Marie-Arséne d'Allamel de  Bournet a été maire de Grospierres durant trente ans, la fortune de son épouse, Cécile Pavin de Lafarge lui avait permis de transformer la gentilhommière en  château, l'ancien a été détruit en 1703. Monsieur Arsène de Bournet décédé en 1933 le château est repris  par son fils Edouard, marié le 30 Mars 1911, à mademoiselle Jeanne de Dalmas, dont il a plusieurs enfants. SELVE; au XIIIe siècle aux frontière du royaume de France fut ensuite relais de Chasse des ducs de Joyeuse, passa dans la descendance de la seigneurie de Grospierre et de Rochepierre, après la destruction du Castellas, noble Isaac-Michel de la Selve de Fain, se fit construire le château de la Selve au XVe siècle et en 1667 il était toujours dans la famille de la Selve par André-Guy, lié aux Rohan Soubise; fut transformé en domaine viticole et gîtes de France en 2002 par Benoit Chazallon.","architecture":"Du Chastellas il ne reste à peu prés plus rien sinon des vestiges du village autour de ce dernier.Vestiges de pans de murs. Bournet; demeure du XIXe siècle, corps de logis, deux étages percés de grandes baies plus un attique à il de boeuf, rectangulaire flanquée de tours et tourelles rondes a toitures en poivrières en tuiles vernissées.               Selve; bien qu'envahit par les protestants de Lagorce en 1598 ce château n'a pas subit de dégât. Château quadrangulaire de trois étages flanqué de tours rondes en angles, l'ensemble à toits plats.","habitants":"Seigneurs de Grospierres\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Chastelas_Grospierres_1.jpg","../../jctruffet.com/image/image_07/07_Chastelas_Grospierres_2.jpg","../../jctruffet.com/image/image_07/07_Chastelas_Grospierres_3.jpg","../../jctruffet.com/image/image_07/07_Chastelas_Grospierres_4.jpg","../../jctruffet.com/image/image_07/07_Chastelas_Grospierres_5.jpg","../../jctruffet.com/image/image_07/07_Chastelas_Grospierres_6.jpg","../../jctruffet.com/image/image_07/07_Chastelas_Grospierres_7.jpg"]},"Consult_chateau_formulaire05c8":{"id":"Consult_chateau_formulaire05c8","dept":"07","canton":"Satillieu","commune":"St-Romain-d`AY","nom":"Grottier","type":"Maison forte","periode":"XIV","histoire":"Grottier: au XVIe siècle Bérard de Maclas  marquis propriétaire du château de Griottier qui avait épousé Emma de Solier qui laissa que des filles, madame Copin de Miribel de Ruolz et de Gaillard. Au XVIIIe siècle Jean Louis Dusolier, commandant dans l'armée royal chevalier de l'ordre militaire de Saint-Louis, seigneur du Sage et du Griottier. Aujourd'hui est la propriété des de Montgolfier.","architecture":"Trois corps de logis en forme de U, deux gros donjons rectangulaires en angles à quatre étages, l'ensemble fermé par une porte flanquée de tourelles sur les angles de la façade.","habitants":"Famille de Montgolfier\r\n        \"","divers":"Maison forte de Griottier","gps":"","images":["../../jctruffet.com/image/image_07/07_St_Romain_d_Ay_1.jpg","../../jctruffet.com/image/image_07/07_St_Romain_d_Ay_2.jpg","../../jctruffet.com/image/image_07/07_St_Romain_d_Ay_3.jpg","../../jctruffet.com/image/image_07/07_St_Romain_d_Ay_4.jpg"]},"Consult_chateau_formulaireb0b7":{"id":"Consult_chateau_formulaireb0b7","dept":"07","canton":"Lamastre","commune":"Grozon","nom":"Grozon","type":"Manoir","periode":"XVI","histoire":"GROZON: les terres et château de Garauzon, aujourd'hui Grozon avait été acquise, en 1390 par Louis de Poitiers , Comte du Valentinois pour Raoul de Lestrange; son petit fils Guy seigneur de Lestrange et de Boulogne conseiller et chambellan de Louis XI, épousa, en 1430 Jeanne de Joyeuse, il eut plusieurs enfants dont Louis, Seigneur de Grozon qui épousa en 1503 Jeanne de Saint-Didier, qui fut la lignée des Lestranges seigneur de  Grozon, les biens passèrent aux de Beaudiner de Romanet, par le mariage de Catherine-Claudine de Lestrange fille héritière de Grozon avec Charles-Antoine de Romanet, baron de Beaudiner qui habitèrent au château de la Faurie en 1743. Puis fin XVIIIe siècle aux Baudiné, en 1923 Raoul Giraud qui en fut le propriétaire, et le légua à son neveu Jacques Vernet.              Aujourd'hui, toujours dans la descendance de la famille Vernet.                 Dans la commune le château de Soubeyran; au XVe siècle les Soubeyran se divisa en deux branches, une dite de Montgiraud, l'autre de Soubeyran, fondée par Jean, mort en 1502. Elles sont actuellement représentées, et elles se divisèrent à leur tour en deux autres branches: La branche cadette, dite du Clos demeura à Soubeyran jusqu'en 1838, puis rachetée en 1906 par l'arrière petit-fils d' Alfred de Soubeyran, ingénieur en chef des mines.\r\nAujourd'hui le château appartient à la fédération des oeuvres laïques de Privas.","architecture":"Grozon; construction imposante du manoir  de la fin du moyen Age, pavillons carrées et échauguettes. Soubeyran; corps de logis quadrangulaire à quatre étages flanqué de tours rondes crénelées  en façade et échauguettes en coin.","habitants":"Famille de Guichard de Clérieux \r\nFamille Vernet\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Grozon_1.jpg","../../jctruffet.com/image/image_07/07_Grozon_2.jpg","../../jctruffet.com/image/image_07/07_Grozon_3.jpg","../../jctruffet.com/image/image_07/07_Grozon_4.jpg"]},"Consult_chateau_formulaired74d":{"id":"Consult_chateau_formulaired74d","dept":"07","canton":"Bourg-St-Andéol","commune":"Larnas","nom":"Imbours-Larnas","type":"Vestiges","periode":"XVII","histoire":"Imbours: ce château fut appelé aussi du Bourg fut habité au XVIIe siècle par les seigneurs du Bourg  et de Larnas, était un petit fief très ancien relevant de l'évêché de Viviers ayant appartenu à la grande famille de Balazuc, elle devient la propriété de la famille de Merle de Lagorce.                                Ce domaine a été acheté par l'union mutualistes  \" Loisirs Vacances\" est transformé en un important complexe touristique.","architecture":"De l'origine du château il reste la tour carré et le corps de logis très remanié.","habitants":"Famille Merle de Lagorce\r\n        \"","divers":"Vestiges du Château Imbours","gps":"","images":["../../jctruffet.com/image/image_07/07_Imbours_1.jpg","../../jctruffet.com/image/image_07/07_Imbours_2.jpg"]},"Consult_chateau_formulairebbfa":{"id":"Consult_chateau_formulairebbfa","dept":"07","canton":"Tournon","commune":"Secheras","nom":"Izerand-Secheras","type":"Vestiges","periode":"XII","histoire":"Izerand: au XIIIe siècle le château était la propriété des seigneurs d'Izerand, passa par alliance au Baron de Tournon, mariage avec Blanche d'Izerand en 1356. \r\nEn 1585 fut pillé par le chef du parti Huguenot \"le capitaine Clavel\". Passa en 1644 aux Levis Ventadour, puis aux Rohan-Soubise et vendu aux seigneuries d'Arras et de Plats en juillet 1785 à Charles de Rohan seigneur de Monteils.","architecture":"De ce château pillé et brûlé en 1785  il ne reste que d'importants vestiges.","habitants":"famille de Blanche d'Izerand\r\nfamille de Charles de Rohan\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Iserand_1.jpg","../../jctruffet.com/image/image_07/07_Iserand_2.jpg","../../jctruffet.com/image/image_07/07_Iserand_3.jpg","../../jctruffet.com/image/image_07/07_Iserand_4.jpg","../../jctruffet.com/image/image_07/07_Iserand_5.jpg"]},"Consult_chateau_formulaire5a74":{"id":"Consult_chateau_formulaire5a74","dept":"07","canton":"Thueyts","commune":"Jaujac","nom":"Jaujac","type":"Vestiges","periode":"XI","histoire":"CHASTELAS; le château au XIIIe siècle appartenait aux seigneurs de Chastellas, au XVe siècle, aux Roches en Reignier, puis les Levis, au XVIe siècle aux Balazuc et les de Castrevieille et au XVIIIe siècle aux Antraigues.\r\nMais le château fut détruit au XVIe siècle.                                  Dans le village de Jaujac le château de CASTREVIEILLE: Edifié au XIVe siècle par la seigneurie de Pierre de Castrevieille, après plusieurs générations passa par alliance aux seigneurs de Montvallat, en 1685 au prince d'Harcourt, puis aux mains des de Launey, comte d'Antraigues et fut vendu comme bien national à la Révolution. Acquit par la municipalité pour des colonies de vacances.                     BRUGET; noble Jean de Monteil par alliance avec Alix de Bruget en 1398, leurs descendances se termina dans la famille des de La Fare et des Meyras de la Roquette, ensuite en 1610 aux de la Tour et aux Delauney (comte d'Entraigues) ce dernier vendit le château en 1780 à Aimé Monteil de Jaujac.\r\nAujourd'hui une société immobilière en est propriétaire.                       ROCHEMURE; cité en 1500 dans la famille de Florit: Amicie de Florit de la Tour de Clamouze en épousant Victor Charles de Fages dit comte de Rochemure député de l'Ardèche fit construire sous l'empire une ferme fortifiée, ce domaine  est le siège du parc régional des monts d'Ardèche (PNR) ancien domaine agricole dont le directeur actuel est monsieur Xavier-Bernard Sens.","architecture":"Chastelas; de ce château féodal du Xe siècle il ne reste qu'un pan de mur du donjon construit au XIIe siècle.        Castrevieille;  grosse bâtisse quadrangulaire à deux étages et un attique séparé du reste par un cordon mouluré flanquée de deux tours  cylindriques, pavillon central saillant sur façade.                             Bruget; Puissante bâtisse quadrangulaire renaissance  de quatre étages flanquée de trois grosses tours arasées, deux rondes et une carrée, fenêtres à meneaux, les corbeaux de mâchicoulis, restes d'échauguette, font un bel ensemble du XVe siècle.                      Rochemure; bâtiment en forme de  U à deux étages et attique flanqué plein cintre de façade d'un donjon munit d'échauguettes en angles.","habitants":"famille de Jaucelin de Castrevieille\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Chastellas_Jaujac_1.jpg","../../jctruffet.com/image/image_07/07_Chastellas_Jaujac_2.jpg","../../jctruffet.com/image/image_07/07_Chastellas_Jaujac_3.jpg","../../jctruffet.com/image/image_07/07_Chastellas_Jaujac_4.jpg","../../jctruffet.com/image/image_07/07_Chastellas_Jaujac_5.jpg","../../jctruffet.com/image/image_07/07_Chastellas_Jaujac_6.jpg","../../jctruffet.com/image/image_07/07_Chastellas_Jaujac_7.jpg","../../jctruffet.com/image/image_07/07_Chastellas_Jaujac_8.jpg","../../jctruffet.com/image/image_07/07_Chastellas_Jaujac_9.jpg"]},"Consult_chateau_formulaire2568":{"id":"Consult_chateau_formulaire2568","dept":"07","canton":"Largentière","commune":"Joannas","nom":"Joannas","type":"Château","periode":"XIV","histoire":"JOANNAS:En 1198, une Alix de Joannas épouse de Folquet de Rocles teste par devant notaire. En 1208, Guérin de Joannas  signe la convention de Jaujac, la famille de Joannas sest éteinte en 1535 avec la mort de Pons de Joannas, dont la sur entre dans la famille de la Balme de Plassian qui hérite de la Seigneurie de Suze. En 1540 Françoise de la  Balme épouse Antoine de Fay-Peyraud, qui devint  ainsi Seigneur de Joannas. En 1603, le fils dAntoine vendit sa  \r\nseigneurie de Joannas à Guillaume de Balazuc de Montréal. au XIVe siècle, fief de Pons de Joannas, , puis passa aux Marcha de Saint Pierreville.           LOGERES; au départ les seigneurs étaient les de Borne puis une famille originaire de Saint-Julien de Fontaine en Lozére et suite à une maladie, les Marcou de Fontaine achetèrent le domaine. Jean de Fontaine héritier en 1450,  en 1623 Anne de Borne était seigneur de Logères en 1793 toujours dans la descendance par Jean-François de Fontaine de Logères officier d'infanterie  a épousé Charlotte de la Bastide, cette maison  toujours représentée par  Marc de Fontaine de Logères en 1880. Au XIXe siècle propriété de la Comtesse de Fontaine.","architecture":"Joannas; Le château na pas été démantelé par faits de guerre, ou sous la Révolution. La démolition dune des tourelles carrées et des 2 piliers soutenant les échauguettes ainsi  que la démolition de la plus grande partie du gros donjon au niveau des toitures, ont été exécutés, peut être mais peu probable, sur lordre de Richelieu, ou plus probable, ruinés par la population.  grosse bâtisse quadrangulaire, un donjon occupe l'angle nord Ouest. \r\nCe château  aurait perdu  sa grâce en même temps que ses tours, par contre l'intérieur surprend par sa beauté et son élégance dans une cour renaissance à arcades.                            Logères; construit au XVIe siècle ,  de construction quadrangulaire  à  trois  étages  flanqué  d'un donjon en façade  plein centre  garni à chaque angles d'échauguettes.\r\nAujourd'hui la parti Ouest est utilisé pour la mairie et la partie Nord par un restaurant.","habitants":"famille de Pons de Joannas  \r\nfamille de Guillaume de Montrerol\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Joannas_1.jpg","../../jctruffet.com/image/image_07/07_Joannas_2.jpg","../../jctruffet.com/image/image_07/07_Joannas_3.jpg"]},"Consult_chateau_formulaire0fda":{"id":"Consult_chateau_formulaire0fda","dept":"07","canton":"Joyeuse","commune":"Joyeuse","nom":"Joyeuse","type":"Château","periode":"XII","histoire":"Joyeuse: on trouvait au XIIe siècle divers co-seigneurs dont les Luc, puis à la puissante famille d'Anduze, fut transmis en dot par Vierne d'Anduze à Guignon de Châteauneuf-Randon; leur fils Dragonnet prit le nom des armes de Joyeuse, Randon de Joyeuse fut gouverneur du Dauphiné en 1422, cette famille reste jusqu'en 1714. Passa par héritage aux Lorraine-Guise, puis aux Rohan-Soubise et acquis en 1786 par les Voguë avec les droits honorifiques, confisqué en 1792 comme bien national, il devient la propriété de la ville, pendant la période révolutionnaire le bâtiment fut utilisé comme prison et comme recette des impôts, depuis 1830, il abrite la mairie.        Dans la ville, la Recluse; au XIIIe siècle, il y avait une porte nommée porte de la Recluse, une Récluse y aurait vécu de la charité publique dans une prison volontaire perpétuellement close,  début du siècle il y avait des fêtes organisées par les habitants de la Récluse.","architecture":"JOYEUSE; le château perdit ses tours d'enceinte et remparts, de style renaissance, vaste, grand corps de logis  central avec tourelles d'escalier, et aux extrémités, deux ailes en avancement formant pavillons. \r\nUtilisé comme école en 1830 et depuis abrite la mairie.                       La Récluse, quartier de la ville dont la place à l'Ouest se termine la grande rue et doit son nom à la tour.  \r\nLa place était le faubourg de Joyeuse  à l'extérieur des remparts dont le seul vestige est la Tour.","habitants":"Famille Dragonnet     \r\nFamille Rohan-Soubise      \r\nfamille Voguë\r\n        \r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Joyeuse_1.jpg","../../jctruffet.com/image/image_07/07_Joyeuse_2.jpg","../../jctruffet.com/image/image_07/07_Joyeuse_3.jpg","../../jctruffet.com/image/image_07/07_Joyeuse_4.jpg","../../jctruffet.com/image/image_07/07_Joyeuse_5.jpg","../../jctruffet.com/image/image_07/07_Joyeuse_6.jpg"]},"Consult_chateau_formulairefbf9":{"id":"Consult_chateau_formulairefbf9","dept":"07","canton":"Joyeuse","commune":"Labeaume","nom":"Labeaume","type":"Vestiges","periode":"XIII","histoire":"Labeaume: on trouvait au XIIe siècle divers co-seigneurs dont les Sampzon. \r\nEn 1247 on connaît un Raymond de la Baulne, début XIVe siècle toujours divers co-seigneurs dont le principal étant Dragonnet de Châteauneuf seigneur de Joyeuse, Pierre de Naves. Au XVIIIe siècle fief des Rohans Soubise. Vendu en 1787 aux Montravel.","architecture":"Du château ne subsiste  que les vestiges du donjon quadrangulaire dit \" la Tourasse\" du XIIIe siècle.","habitants":"Famille de Raymond de Baulne \r\nFamille Dragonnet de Joyeuse\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Labeaume_1.jpg","../../jctruffet.com/image/image_07/07_Labeaume_2.jpg"]},"Consult_chateau_formulaireb03e":{"id":"Consult_chateau_formulaireb03e","dept":"07","canton":"Viviers","commune":"Viviers","nom":"Lafarge-Viviers","type":"Château","periode":"XVIII","histoire":"Lafarge: Baltazard-Aymar de Monteil, marquis de Durfort, héritier de Charles de Lafarge, conseiller du roi, vend le 29 Avril 1749 à Claude François Pavin de Lafarge, receveur des gabelles au Teil, 3 mai 1749 Claude Pavin baille à ferme à Atienne Arnchaud, laboureur, l'ile de Lafarge, se réservant la partie orientale du château la montagne Saint-Victor, y créa l'une des plus importantes usines à chaux de France.                    Sainte-Concorde: édifice construit en 1864 pour Edouard Pavin de Lafarge, maison de maître avec chapelle privée, orangerie etc.\r\nEdouard Pavin de Lafarge industriel.","architecture":"Château mentionné  en 1749, puis remanié en 1805, une partie des communs brûle en 1874 et reconstruit en 1875.\r\nIl en reste un corps de logis rectangulaire de trois étages et d'une tour carrée .\r\nUn peu plus au sud un autre château des  de Lafarge appelé \"Verchaüs\" fut construit au XIXe siècle.              Ste-Concorde; édifice construit en 1864 pour Edouard Pavin de Lafarge, maison de maître avec chapelle privée, orangerie etc.","habitants":"famille de Baltazard Aymar  \r\nfamille de François Pavin de Lafarge\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Lafarge_1.jpg","../../jctruffet.com/image/image_07/07_Lafarge_2.jpg","../../jctruffet.com/image/image_07/07_Lafarge_3.jpg","../../jctruffet.com/image/image_07/07_Lafarge_4.jpg","../../jctruffet.com/image/image_07/07_Lafarge_5.jpg"]},"Consult_chateau_formulaire1989":{"id":"Consult_chateau_formulaire1989","dept":"07","canton":"Vallon-Pont-d`Arc","commune":"Lagorce","nom":"Lagorce","type":"Vestiges","periode":"XII","histoire":"Lagorce: en 1240 on connaissait un Dalmas de Lagorce, en 1257, Giraud de Lagorce qui rendait hommage pour son château au comté du Valentinois. Au XVe siècle, les Apchier étaient seigneurs et à la suite du mariage de Anne de Lagorce et de Béraud de Châteauneuf de Randon  baron en 1408,  la seigneurie fut vendue en 1581 au capitaine Mathieu Merle qui devenait le fief de la Baronnie de Chalencon. Erigé en comté pour François de la Beaume en 1610 et  en 1789 aux Merle de Lagorce qui par suite de destruction habitèrent au château de Vallon-Pont-d'Arc.","architecture":"Du château il ne reste  plus rien des ruines au nord-ouest du village, une porte beffroi à l'entrée de ce dernier.","habitants":"Famille Merle de Lagorce\r\n        \"","divers":"Vestiges de remparts (porte)","gps":"","images":["../../jctruffet.com/image/image_07/07_Lagorce_1.jpg","../../jctruffet.com/image/image_07/07_Lagorce_2.jpg"]},"Consult_chateau_formulaire1591":{"id":"Consult_chateau_formulaire1591","dept":"07","canton":"Lamastre","commune":"Lamastre","nom":"Lamastre","type":"Vestiges","periode":"XI","histoire":"Lamastre: le château dit \"le Peychelard\" \r\n, il y avait une famille de la Mastre, qui dut s'éteindre en 1227, lorsque Aigline de la Mastre épousa Géranton de Fay de Capteuil, troubadour. Le château passa ensuite aux mains de la famille de Joyeuse.\r\nEn 1603 François de Meyres achète la seigneurie de la Mastre au duc de Bourbon Montpensier époux d'Henriette de Joyeuse  et la revende  à Claude de la Gruterie.\r\nAu XVIIIe siècle ce qui restait de ce dernier, était aux mains des Maisonseule. Le dernier seigneur de Lamastre fut le Marquis de Grollier, qui participa à l'insurrection de Lyon et fut fusillé le 26 décembre 1793.","architecture":"Le château de Lamastre, la ruine féodale qui domine la ville de Lamastre date du Xe siècle, il comprenait une haute-cour, une basse-cour et une tour maîtresse, et  c'est peut-être ce donjon même qui est à l'origine du nom de la Mastre  qui viendrait du latin \"magistra, tour maîtresse\". se trouvait sur un promontoire rocheux dominant le Doux et de deux de ses affluents, aujourd'hui de ce château il ne reste  que des pans de murs  du donjon.","habitants":"famille d'Aigline de la Mastre \r\nFamille de Fay de Capdeuil  \r\nMarquis de  Grollier\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Lamastre_1.jpg","../../jctruffet.com/image/image_07/07_Lamastre_2.jpg","../../jctruffet.com/image/image_07/07_Lamastre_3.jpg"]},"Consult_chateau_formulaireb967":{"id":"Consult_chateau_formulaireb967","dept":"07","canton":"Largentière","commune":"Largentière","nom":"Largentiere","type":"Château","periode":"XV","histoire":"Largentière tire son nom des mines de plomb argentifères déjà exploitées par les romains, puis du Xe siècle au XVe siècle par les comtes de Toulouse et évêques du Viviers.  En 1146 l'empereur germanique Conrad accorde à la cité le droit de \" battre monnaie \", ce qui permit l'essor de Largentière.\r\nAu XIIe siècle Raymond VI, qui fit construire le premier donjon appelé \"Tour Argentière\", qui sera détruite  en 1816.  La fille de Raymond VII, ayant épousé un prince de sang, les rois de France succédèrent aux droits des comtes de Toulouse sur le Vivarais,  Raymond VI  comte de Toulouse en rend hommage aux évêques du Viviers pour l'obtention des mines de plomb argentifère de la région, Largentière devient une propriété épiscopale qui prendra une forme défensive avec deux tours jumelles pour protéger le château qui ce dernier servit a entreposer la production et les gardes,  restera dans le domaine des évêques de Viviers. En 1307, Philippe le Bel établit sa suzeraineté, en 1320, la ville de Largentière passa sous la juridiction royale. Pendant les guerres de religion le château joua un grand rôle, ce dernier fut prit en 1552 par Victor de Combas et repris par les catholiques sous le commandement de Guillaume de Balazuc.  Ce château devient une charge très lourde pour les évêques se décidèrent a le vendre et  c'est  en 1730, que l'évêque François Renaud de Villeneuve le vendit au marquis François de Beauvoir de Roure de Brison, le château et la baronnie de L'Argentière. Pendant la Révolution servit de tribunal et de prison. Récupéré en 1802 par ses héritiers qui le loue au département avant de le céder en 1845 à la commune pour y créer un hôpital jusqu'en 1995. Aujourd'hui musée.","architecture":"Le premier donjon \"tour Argentière\" construit au XIIe siècle, au XVe siècle le château fut agrandit par Jean de Montchenu qui le couronne de mâchicoulis et en 1510 Monseigneur Claude de Tournon  donne une nouvelle enceinte de remparts à la ville, qui réunit trois forteresses; la tour carrée, le donjon, et les deux tours rondes, mais la grosse tour ronde détruite en 1816. Remanié au XVIIe siècle par le marquis de Beauvoir de Roure  de Brison et touche finale en 1845 pour y créer l'hôpital.\r\nDans la ville , vestiges de remparts, tour encastrée dans l'église, porte des Tauriers, portes des Récollets du XVIe siècle.","habitants":"Claude de Tournon  \r\nComte de Toulouse  \r\nFamille de François de Beauvoir\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Largentiere_1.jpg","../../jctruffet.com/image/image_07/07_Largentiere_2.jpg","../../jctruffet.com/image/image_07/07_Largentiere_3.jpg","../../jctruffet.com/image/image_07/07_Largentiere_4.jpg","../../jctruffet.com/image/image_07/07_Largentiere_5.jpg","../../jctruffet.com/image/image_07/07_Largentiere_6.jpg"]},"Consult_chateau_formulairea2d6":{"id":"Consult_chateau_formulairea2d6","dept":"07","canton":"Viviers","commune":"Le Teil","nom":"Le-Teil_Joviac","type":"Château","periode":"X","histoire":"Le TEIL: les premiers seigneurs  furent les évêques de Viviers de 877 à 1300 ou l'évêque Aldebert de Payre vendit le château à Guillaume de Donzére qui le garda deux ans puis le revendit à Giraud Adhémar, qui le céda ensuite à son frère Hugues Adhémar seigneur du Teil, en 1423,  il fut acheté par Pierre de Montargnes allié avec les Lauberge, par la suite le château fut cédé aux Hilaire de Joviac, dernier seigneur du Teil.    JOVIAC: ce château fut construit en 1632 par Jacques d'Hilaire, remanié en 1660 par François d'Hilaire. Le marquis de Joviac, général Jean Antoine d'Hilaire de Joviac qui avait épousé  Françoise de Moreton de Chabrillan, fille du lieutenant du roi en Bas-Dauphiné, le 19 Octobre 1791 émigra; le château fut mis en vente, les frères et surs du marquis demeurant à Montélimar protégèrent les biens de la famille, et rachetèrent les terres. Jean Blache cordonnier et Baptiste Richard maçon  racheta le château. Le marquis rentra pour mourir en 1801, il avait un fils Hyacinthe  d'Hilaire de Joviac qui habitait à Montélimar jusqu'en 1840 reçut une somme importante de Charles X du milliard des émigrés; récupéra le château est mourut en 1852, son fils Alfred d'Hilaire de Joviac n'habitat pas au château se fut une de ses filles qui épousa le Vicomte de Beaupré qui en hérita, elle décéda en 1907 et c'est monsieur Masson qui l'acheta et en 1985 le château devient la propriété de Françoise et Gérard Conac.","architecture":"Le Teil; ce château fort était entouré de murs épais à pans coupés. Au Nord il était garanti par un large fossé flanqué de redoutes et de terrassements, le château se composait de deux grands corps de bâtiments reliés ensemble par des constructions qui en formaient les dépendances ; d'un côté il était garanti par des fossés et de l'autre part un rocher à pic. Il fut fortifié au XIVe siècle, la grosse tour de 13m par 11m avec des murs épais de 4 m dont il reste encore les assises, au Sud des restes de château, à proximité de l'ancienne poudrière, dont on voit encore les pans de murs , il ne reste qu'une tour restaurée transformée en habitation ( privée). En 1634 l'édifice fut détruit sur ordre de Richelieu, il ne fut jamais reconstruit.                            Joviac. construit a partir de 1597, au moment des guerres de religion, transformé en chapelle puis terminé fin XVIIe siècle, entouré de remparts avec communs à l'extérieur; corps de logis quadrangulaire à deux niveaux flanquait de tours rondes en angles.\r\nUn système hydraulique fut installé par le marquis de Joviac au XVIIe siècle avec barrage en amont, conduites, aqueduc et citernes.","habitants":"Famille de Guillaume de Donzere     famille de Hugues Adhemar  \r\nFamille de Pierre de Montargnes    famille d'Hilaire de Joviac\r\n        \"","divers":"Château et vestiges au Teil château de Joviac","gps":"","images":["../../jctruffet.com/image/image_07/07_Teil_le_1.jpg","../../jctruffet.com/image/image_07/07_Teil_le_2.jpg","../../jctruffet.com/image/image_07/07_Teil_le_3.jpg","../../jctruffet.com/image/image_07/07_Teil_le_4.jpg","../../jctruffet.com/image/image_07/07_Teil_le_5.jpg","../../jctruffet.com/image/image_07/07_Teil_le_6.jpg"]},"Consult_chateau_formulairead1c":{"id":"Consult_chateau_formulairead1c","dept":"07","canton":"Tournon","commune":"Lemps","nom":"Lemps","type":"Manoir","periode":"XIX","histoire":"LEMPS; en 1458 Jean d'Arconcieu dit \"Ribery\" bailli de Tournon  en 1480 prit le nom de la Prunerie d'Arconcieu seigneur de Lemps cette seigneurie resta dans cette famille  jusqu'en  1640 à la mort de son petit fils sans postérité.  La seigneurie se partageait entre les de Parchas de Bergéde et de J. de Pélisson principal au collège de Tournon. Mais le titre se continue toujours par Auguste de Lemps seigneur de la Touvière.   CHAVAGNAC: Famille importante d'origine d'Auvergne. Au XVIe siècle les seigneurs de Chavagnac en étaient possesseurs et était la ferme du château d'Izerand,(commune de Sécheras) depuis 1997 logis de France.                                PRAROND; le château de Prarond fut construit en 1550 par noble Dalmas de Lyonneton sieur du Chières, capitaine, son fils capitaine également, sa descendance forma la branche de la Gruterie, le dernier des Lyonneton Jean mort en 1669  qui avait épousé Catherine de Boulieu de Charlieu laissa deux filles Suzanne et Lucrèce; Suzanne  héritière  porta tous les biens en 1664 à Jacques du Peloux, toujours dans la descendance.                        CINTRES (commune voisine de Cheminas)en 1500 Antoine II de Galberts des Fonts possède le domaine des Blo au mandement de Charmes et de Cintrés,  Il épousa Marguerite Gilbert de Verdun est eurent  deux enfants, et en 1690 Antoine de Sénovert hérita du domaine de Cintrés.","architecture":"Lemps, corps de Logis quadrangulaire à deux niveaux avec attiques de construction du XIXe siècle.            Chavagnac; dans un style directoire avec corps de ferme du XVIIIe siècle.   Prarond; maison forte (ensemble fermée comprenant tours rondes et carrées) du XVIe siècle.                             Cintrés, de cette seigneurie il ne reste de la maison forte un corps de logis rectangulaire à trois niveaux qui n'a rien de féodal.","habitants":"Famille D'Arconcieu\r\n        \"","divers":"Château de Lemps, de Chavagnac et de Prarond et de Cintrés","gps":"","images":["../../jctruffet.com/image/image_07/07_Lemps_1.jpg","../../jctruffet.com/image/image_07/07_Lemps_2.jpg","../../jctruffet.com/image/image_07/07_Lemps_3.jpg","../../jctruffet.com/image/image_07/07_Lemps_4.jpg","../../jctruffet.com/image/image_07/07_Lemps_5.jpg","../../jctruffet.com/image/image_07/07_Lemps_6.jpg"]},"Consult_chateau_formulaire14dd":{"id":"Consult_chateau_formulaire14dd","dept":"07","canton":"Privas","commune":"Lyas","nom":"Liviers-Lyas","type":"Château","periode":"XIV","histoire":"En 1328, Pons de Rostaing rendit hommage pour son fief de Liviers, au comte de Valentinois. Pierre, son fils, rendit, en 1354 hommage au même comte pour son fief de Liviers et les Censes qu'il avait à St-Pierre-la-Roche.\r\nPierre Testa, en 1486, en faveur d'Antoine, son fils aîné, en 1489 à Pons Guilhon de Rochessauve en 1571 à Jean de Mars de Liviers. \r\nA la fin du XVIIe siècle Jean du Faure, seigneur de Fougerolles et de Buriane. \r\nEn décembre 1780 M. Barthélémy de Rosiers mourut dans ce château dont il était propriétaire. Passa à monsieur Granger Veyron et aujourd'hui chambres d'hôtes par Jean-Luc et Marie-Jo Humbert.","architecture":"Du premier château  du XI-XIIe siècle 300 m plus bas il ne reste qu'un tas de pierres, il servait de tour de guet pour Privas.\r\nLe château actuel du XV-XVIe siècle est massif constitué d'un corps de logis de deux étages qui était dominé  par une tour de guet carrée, aujourd'hui la tour détériorée il ne reste  que le bâtiment en équerre flanquée d'une tour ronde et de deux tourelles Est, Ouest.","habitants":"Famille Pons de Rostaing \r\n Famille Mars de Liviers\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Liviers_1.jpg","../../jctruffet.com/image/image_07/07_Liviers_2.jpg"]},"Consult_chateau_formulaire96aa":{"id":"Consult_chateau_formulaire96aa","dept":"07","canton":"Valgorge","commune":"Loubaresse","nom":"Loubaresse","type":"Vestiges","periode":"XII","histoire":"Loubaresse: le premier seigneur connu est Charles de la Fare, marquis de la Fare  Montclar, qui devient par le mariage avec Jacqueline de Borne de Laugères seigneur de Loubaresse et autres,  cette famille s'éteignit par Pierre de Borne en 1727 sa fille épousa en 1673 Guillaume de Saint-Etienne qui  reprit le nom de Borne de Laugères  comte de Grimoard de Beauvoir de Roure en sera  le dernier seigneur.","architecture":"Le seul vestige du château est le clocher de l'église actuellement à créneau et mâchicoulis.","habitants":"Famille de la Fare\r\n        \"","divers":"Loubaresse","gps":"","images":["../../jctruffet.com/image/image_07/07_Loubaresse_1.jpg","../../jctruffet.com/image/image_07/07_Loubaresse_2.jpg"]},"Consult_chateau_formulairedbb2":{"id":"Consult_chateau_formulairedbb2","dept":"07","canton":"Satillieu","commune":"Symphorien-de-Mahun","nom":"Mahun-Hermuzieres","type":"Vestiges","periode":"XI","histoire":"Mahun: cité au XIe siècle par Aymon fils de Blimondis de Malduno,au XIe siècle fut né Hugues de Pagan Mahun ou Payns (1118-1136) premier grand maître et fondateur officiel de l'ordre du Temple,\"les Templiers\" puis au seigneur  Raymond Pagan ( Prieur de Veyrines. Au XIVe siècle les Briand de Retourtour, au XVe siècle aux seigneurs de Tournon, puis aux Levis-Ventadour et au XVIIe siècle aux Faure de Saint-Sylvestre. Aux XVIIIe siècle aux de Satillieu.             HERMUZIERES: Claude de L'Hermuzières épousa Guillaume de Baud châtelain à Palhiarés en 1575 dont ils eurent trois enfants. En 1700 Pierre Bernardin de l'Hermuzières épousa Jeanne Marie Pichon de Faugéres et en 1785 Antoine de l'Hermuzières épouse  Thérése de Véron fille de noble François de Saint-Julien.","architecture":"De ce château appelé \"Mahun le Vieux ou Man le Vert\"  qui était construit au Xe siècle, fut détruit est reconstruit aux XIe siècle. Le château fut détruit par les bourguignons après le traité de Troyes  en 1430, ou les seigneurs allèrent construire le château de Satillieu. \r\nDu château de Mahun, il ne reste q'un pan de mur d'un petit donjon sur une plate-forme rocheuse à 850m d'altitude.  Hermuzières; du corps de logis principal largement remanié il reste en façade la base des échauguettes et sur la partie Est le donjon carré.","habitants":"Famille de Hugues de Pagan-Mahun\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Mahun_1.jpg","../../jctruffet.com/image/image_07/07_Mahun_2.jpg"]},"Consult_chateau_formulaire908b":{"id":"Consult_chateau_formulaire908b","dept":"07","canton":"Lamastre","commune":"St-Basile","nom":"Maisonseule","type":"Manoir","periode":"XIII","histoire":"Maisonseule: au XIIIe siècle  la famille de Sahune qui prendra le nom  d'Asseyne  firent la construction d'un donjon \"dit donjon de Saint-Louis\" pour la surveillance de la vallée,il occupe la partie nord-ouest de l'ensemble actuel.  \r\nAu XVe siècle un Baltazar d'Asseyme seigneur de Maisonseule, épouse Françoise de Pierregourde leur fille Phélise apporte le domaine en alliance de Maisonseule  à  la famille de la Gruterie, Guillaume  de la Gruterie seigneur de Chassagnes et bailly du comté de Joyeuse devient aussi seigneur  de Maisonseule, son fils Jean de la Gruterie épouse en 1610 Judith fille de Paule de Chambaud, baronne de Privas, Claudine de Maisonseule hérite et mourut célibataire.\r\nEn 1739 l'héritage échue chez Louise de Chevrier, fille de Jeanne qui épousa Gaspard de Grollier, leur fils Pierre-Louis-Gilbert de Grollier sera  dernier seigneur de Lamastre et de Maisonseule qui périt fusillé à Lyon en 1794. \r\nA la Révolution les biens de Grollier furent saisies mais pas vendus, cédé à un ancien officier des guerres d'Italie, et un dénommé Dorel qui le revendit à l'abbé Fustier en 1816 pour en faire un séminaire diocésain jusqu'en 1828  traverse une période d'abandon puis racheté par la famille Gaillard en 1859  après avoir changé deux fois de mains acquis en 1990 par Yves Lecoquière Du Bois de la Vigerie, dit \"Yves Lecoq\" sous son nom d'artiste.","architecture":"Maisonseule, robuste maison forte pourvue au XIIIe siècle en premier d'un donjon, qui servait de poste d'observation entre Rhône et Velay, construit au XIVe siècle d'une courtine flanquée de tours d'angles,  puis un quatrième côté qui enserre une cour intérieure, modifié renaissance, les quatre tours rondes ont été arasées.","habitants":"Famille d'Alexandre de Maisonseule. \r\nfamille de Gaspard de Grollier \r\nYves Lecoquière du Bois de la Vigerie \"dit Lecoq\".\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Maisonseule_1.jpg","../../jctruffet.com/image/image_07/07_Maisonseule_2.jpg","../../jctruffet.com/image/image_07/07_Maisonseule_3.jpg","../../jctruffet.com/image/image_07/07_Maisonseule_4.jpg"]},"Consult_chateau_formulaire8e2c":{"id":"Consult_chateau_formulaire8e2c","dept":"07","canton":"Villeneuve-de-Berg","commune":"Mirabel","nom":"Mirabel","type":"Vestiges","periode":"XII","histoire":"Mirabel: au XIIe-XIIIe siècle dépendait de la famille de Don, puis aux d'Arlempes, aux Lagorce aux d'Apchier et passait au XVe siècle aux Attard. En juin 1628, Mirabel est assiégé par l'armée de Montmorency, plusieurs milliers d'hommes à pied et quatre canons.  Louis d'Arlempes, fort de ses quatre cent défenseurs, refuse de se laisser acheter, Mirabel passe pour imprenable. \r\nMais il doit capituler après plusieurs jours de siège, démantelés en même temps que l'enceinte du village.\r\n Les deux châteaux  furent détruit l'un appartenait  aux de Flotte des Attards  l'autre aux d'Arlempes. La seigneurie fut gérer par les Barruel, seigneur de Saint-Pons-Bavas jusqu'à la Révolution. Dans la commune la ferme fortifié d'Olivier de Serres le \"Pradel\". En 1539 son père premier consul de Villeneuve de Berg et recteur de l'hôpital, acheta le domaine du Pradel qui est dominé par la forteresse de Mirabel, ce domaine une ferme expérimentale dont Olivier est le premier a pratiquer la culture par l'utilisation de L'assolement (alternance de culture sur le même terrain). Olivier décéda en 1619 à l'âge de 80 ans et en 1628 les guerres de religion entraînent la destruction du bâtiment qui fut reconstruit par son fils  Daniel de Serres sieur du Pradel, le domaine passa à madame Watré de Saint-Andéol et à son décès en 1930 le comte Malzamet en hérita en fit une école  qui sera racheté en son ensemble par l'office de l'agriculture de l'Ardèche.","architecture":"Forteresse du XIIe siècle, reconstruit après le passage des routiers en 1400. Suite au combat de 1628 il ne resta que la tour dite \"Sarrazine\" qui fut consolidé en 1970. Elle servit de carrières de pierres.\r\n Aujourd'hui il reste que des vestiges et la tour.\r\nLe Pradel; il ne reste plus grand chose du château, il apparaît une échauguette en angle d'un bâtiment rectangulaire bien remanié.","habitants":"Famille Attard    \r\nFamille d'Arlempes\r\nFamille d'Olivier de Serres\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Mirabel_1.jpg","../../jctruffet.com/image/image_07/07_Mirabel_2.jpg","../../jctruffet.com/image/image_07/07_Mirabel_3.jpg","../../jctruffet.com/image/image_07/07_Mirabel_4.jpg","../../jctruffet.com/image/image_07/07_Mirabel_5.jpg"]},"Consult_chateau_formulaire0726":{"id":"Consult_chateau_formulaire0726","dept":"07","canton":"Annonay","commune":"Monestier","nom":"Monestier","type":"Vestiges","periode":"XV","histoire":"Monestier: fief de la baronnie d'Annonay, dépendait du mandement de Vocance, a appartenu au XVIIe siècle aux Rivoire de la Tourette, puis aux Pichon ce dernier Méraud Pichon conseiller-secrétaire du roi acquit la maison de la Rivoire de la Tourette et la baronnie de Vocance, aux XVIIIe siècle aux de Lolme.","architecture":"De sa position de belvédère sur la vallée de la Vocance,  on peut voir la tour ronde du château dernier vestige.","habitants":"Famille  Rivoire de la Tourette\r\n        \"","divers":"Vestiges du château (tour)","gps":"","images":["../../jctruffet.com/image/image_07/07_Monestier_1.jpg","../../jctruffet.com/image/image_07/07_Monestier_2.jpg"]},"Consult_chateau_formulairefe98":{"id":"Consult_chateau_formulairefe98","dept":"07","canton":"St-Pierreville","commune":"St-Sauveur-de-Montagut","nom":"Montagut-St-Sauveur","type":"Vestiges","periode":"XII","histoire":"Montagut: au XIIe siècle, fief des de la Roche en Régnier, Guigue de la Roche acheta toutes les dépendances à Giraud Bastet, seigneur de Crussol, en 1280 hommage à Aymar de Poitiers, bien que le château fut démoli pendant les guerres de religion le fief passa au XVIIe siècle aux Levis Ventadour, puis aux Rohan Soubise et au XVIIIe siècle aux de la Tour-Maubourg.","architecture":"Aujourd'hui vestiges d'un modeste donjon de plan carré  et ruine d'un bâtiment dont le rez-de-chaussée était voûté.","habitants":"Famille de la Roche en Regnier  \r\nFamille de Rohan-Soubise\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Montagut_1.jpg","../../jctruffet.com/image/image_07/07_Montagut_2.jpg"]},"Consult_chateau_formulairef4e6":{"id":"Consult_chateau_formulairef4e6","dept":"07","canton":"Thueyts","commune":"Mayres","nom":"Montlaur_Mayres","type":"Vestiges","periode":"XIII","histoire":"Montlaur-Mayres: faisait partie également des domaines de la Roche en Régnier, au XIVe siècle aux Montlaur Maubec, fin du XVIe siècle aux Montlaur Modéne et de 1716 à 1789 aux de Voguë, mais le château fut détruit bien auparavant par les guerres de religion et les routiers.","architecture":"Il ne reste que des vestiges du château féodal de la famille des Montlaur       (donjon ruiné du XII ).\r\n A la fin du XIIe siècle droit de péage, la chapelle Saint-Médard reconstruite au XVIIIe siècle.","habitants":"Famille de la Roche en Regnier  \r\nFamille Montlaur-Maubec\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Montlaur_Mayres_1.jpg","../../jctruffet.com/image/image_07/07_Montlaur_Mayres_2.jpg"]},"Consult_chateau_formulaire6123":{"id":"Consult_chateau_formulaire6123","dept":"07","canton":"Montpezat-sous-Bauzon","commune":"Montpezat-sous-Bauzon","nom":"Montpezat sous Bauzon","type":"Vestiges","periode":"XII","histoire":"Montpezat, fief des Montlaur-Montpezat, un terrier dressé en 1300 pour Pons de Montlaur, seigneur d'Aubenas et  seigneur dominant de Montpezat originaire de Coucouron.\r\nLe château disparaît en 1453.            Au XVIIIe siècle le fief appartenait aux Chanaleilles, ensuite aux du Villard,et aux comtes de Peyre.          Pourcheyrolles: Construit au milieu du XIVe siècle par le cardinal Pierre Flandin.\r\nIl fut détruit en partie en 1584 par la bande de Latronchére, il était encore habité au XVIIe siècle par la famille Fages de Chaulnes par le mariage de Anne-Marie Flandin en 1760.","architecture":"Château  détruit pendant les guerres de religion, il ne reste qu'un pan de mur et quelques traces de remparts, il reste également des bâtiments de dépendance qui fut habités à l'époque.  \r\nAprès la destruction du château on peut remarquer de belles fenêtres à meneaux du XVe siècle.                      Pourcheyrolles; maintenant  encore, les ruines gardent fières allures sur leur vertigineux promontoire.","habitants":"famille de Pons de Montlaur\r\nFamille Chanaleilles\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Montlaur_Montpezat_1.jpg","../../jctruffet.com/image/image_07/07_Montlaur_Montpezat_2.jpg","../../jctruffet.com/image/image_07/07_Montlaur_Montpezat_3.jpg","../../jctruffet.com/image/image_07/07_Montlaur_Montpezat_4.jpg","../../jctruffet.com/image/image_07/07_Montlaur_Montpezat_5.jpg"]},"Consult_chateau_formulaire0485-3":{"id":"Consult_chateau_formulaire0485-3","dept":"07","canton":"Largentière","commune":"Montreal","nom":"Montreal (07)","type":"Château","periode":"XII","histoire":"Montréal: ce village possède deux donjons quadrangulaires massifs du XIIe siècle, par Burnon, évêque de Viviers et passa ensuite à plusieurs seigneurs, à lorigine il y en avait trois, construits par un seigneur qui avait trois filles, une tour pour chacune (légende), la plus petite disparue en 1743, elle sappelait tour de Chanaleilles, une deuxième haute de 20 mètres appelée la tour Rompue dés le XVIIe siècle, et la troisième nommée la Tourasse de 30 mètres, de 25 mètres aujourdhui sans les créneaux, épaisseur des murs de 2 mètres 30. Ces tours  sont pour la défense, percées de meurtrières et de fenêtres en hauteur, balcons suspendus, grand escalier, chemins de ronde.\r\nCes tours étaient le fleuron de la couronne centrale de Largentière, fêtes médiévales tout lété, une tour se visite lautre est privée.\r\nLe château construit au XVe siècle qui est adossé à la  plus grande tour a subit des modifications aux fils des ans, et était en 1206 la propriété de Guige de Châteauneuf, qui passa ensuite au comte de Toulouse Raymond VI qui gérait et surveillait  à lépoque les mines dargent de la région, puis passa à Pierre de Vernon.\r\nAu XIVe siècle, après des conflits religieux, Montréal fut longtemps la possession des Balazuc, Jean de Balazuc  seigneur et chef catholique qui le remania, et son fils Guillaume tout deux se distinguèrent, Guillaume sous le nom de seigneur de Sanilhac épousa  Françoise de Beauvoir de Roure qui eut un fils Jean et une fille Anne, cette dernière épousa Merle de la Gorce, ils neurent quune fille qui épousa Gabriel de Hautefort, marquis de Lestrange et devint seigneur de Montréal, en 1769 Charlotte de Lestrange, héritière épouse son cousin Urbain de Merle de la Gorce.\r\nAprès  passa en 1775 aux Beaumont-Brison jusqu'à la révolution.\r\nEnsuite à la famille Payan et a Fernand de Rochemure. En 1998  monsieur Fenestrier acquit une tour et le château, lautre tour appartient à la commune.\r\nEn 1794,le château abritait une usine de salpêtre.","architecture":"Forteresse construite au XIIe siècle, remanié au XVIe siècle.\r\nUne petite tour à disparue en 1600,  elle était haute de 12 mètres dît \" tours rompue\", une autre dans le château vieux haute de 22  mètres et la dernière dans le château neuf haute de 23 mètres, toutes trois carrées et entourées de bâtiment de défense.  \r\nAujourd'hui il n'en reste que deux ,  la \"grande tour\" et la tour \" Tourasse\".","habitants":"Famille de Hautefort de Lestrange Famille de Beauvoir de Roure\r\n        \r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Montreal_1.jpg","../../jctruffet.com/image/image_07/07_Montreal_2.jpg","../../jctruffet.com/image/image_07/07_Montreal_3.jpg"]},"Consult_chateau_formulaire454e-2":{"id":"Consult_chateau_formulaire454e-2","dept":"07","canton":"Thueyts","commune":"Prades","nom":"Montseveny-Prades","type":"Château","periode":"XV","histoire":"Montseveny: ancien fief des Roche en Reignier, passa au XVIIIe siècle aux de Choissinet et aux seigneur d'Antraigues les de Launay.                           Depuis 1600 la famille de Vincenty pour Gilbert Vincenti, officier au service du seigneur de Ventadour. Le logis d'origine est doublé au cours du XVIIIe siècle ou au début du XIXe siècle ainsi que  les communs dont une partie remonte au XVIIe siècle. et en 1738 Gabriel de Vincenty en était le seigneur et baron de Sceautres et en 1838 Joseph  Gabriel-Gustave de Vincenti de Montseveny épousa Marie-Coralie-Rose de Seguin de Cabassole.","architecture":"Corps de logis rectangulaire flanqué d'une grosse  tour ronde et de deux échauguettes  découronnées  et une courtine en équerre, bâtiment fort remanié, maison forte  dont l'architecture résidentielle  pourvue d'attributs défensifs  a évolué en maison de plaisance ou de ferme. L'intérieur conserve une cheminée d'origine et  peut-être un plafond à la française.","habitants":"Seigneur de la Roche en Reygnier\r\n        \"","divers":"Maison forte de Montseveny","gps":"","images":["../../jctruffet.com/image/image_07/07_Montseverny_1.jpg"]},"Consult_chateau_formulaire6ce4":{"id":"Consult_chateau_formulaire6ce4","dept":"07","canton":"Largentière","commune":"Chassiers","nom":"Motte-Vernarde-Chassiers","type":"Château","periode":"XVI","histoire":"D'abord possession de l'évêque de Viviers, puis de la famille de Chassiers.\r\nLa famille Chalendar possédait la seigneurie depuis les années 1350, Jacques de Chalendar épousa Jeanette de Chassiers. Aymé de Chalendar seigneur de la Motte , du Mezelet, cinquième descendant de Jacques épouse Marguerite de la Motte, fille du seigneur Degras. En 1568 son château fut pillé et incendié par les protestants.   Reconstruit par Pierre (fils de Guillaume) de Chalandar de la Motte, qui le  vendit en 1634 à Monsieur Rivière et racheté de nouveau par la Motte en 1635. Les Lavernade: nom de la première famille qui format trois branches, dont une originaire de Thueyts, seigneur du Martinent puis de la Lavernade, le premier seigneur de Lavernade était les Pellier, famille de notaire. Le château fut rachetait par Michel de  Mazade à Jean Baptiste de Flotte, donataire d'Anne de Lavernade en 1650. La famille des Mazade furent qualifiés de seigneurs de Lavernade jusqu'à la mort de Louis-Augustin de Mazade, en 1807, laissant une fille Adélaïde-Félicité, qui épousa en 1798, René Ladreyt de la Charrière, décédé en 1845.","architecture":"La Motte; du château initial, il reste les tours d'angles à créneaux, meurtrières et mâchicoulis. \r\nEn 1568 pillé et incendié il est reconstruit, corps central, présentant un bel édifice régulier, le château offre aujourd'hui l'aspect d'une demeure de plaisance.                               La Vernade; de cette maison forte, il en ressort une grosse tour ronde à canonnières accolée à un corps de logis rectangulaire à deux étages il abrite aujourd'hui la mairie.","habitants":"Guillaume de Chalendar\r\nFamille de la Motte \r\n        \r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Motte_Chassiers_1.jpg","../../jctruffet.com/image/image_07/07_Motte_Chassiers_2.jpg","../../jctruffet.com/image/image_07/07_Motte_Chassiers_3.jpg","../../jctruffet.com/image/image_07/07_Motte_Chassiers_4.jpg","../../jctruffet.com/image/image_07/07_Motte_Chassiers_5.jpg"]},"Consult_chateau_formulaire88ef":{"id":"Consult_chateau_formulaire88ef","dept":"07","canton":"Cheylard","commune":"Accons","nom":"Motte_Accons","type":"Maison forte","periode":"XV","histoire":"Motte Accons: construit en 1400 de style maison forte par les Bayle de la Motte seigneurs de Brion; Jean de la Motte en devient propriétaire en 1635, puis vendu à Françis Cérice de Voguë, le revend aux Bozas et en 1818 à Mademoiselle de Baye qui elle le revend à Philibert Chauveau, qui le revend vers 1919 à Monsieur Joseph Saléon Terras (Maire conseiller général du Cheylard) le château toujours dans la famille.","architecture":"Le château de la Motte a été un modèle d'architecture militaire du XV et XVIe siècle. il fut en partie incendié en 1944.\r\nIl a même été utilisé comme référence dans un traité d'histoire de l'architecture militaire au début du XXe siècle; flanqué de trois tours rondes, avec tourelle d'escalier dans la cour, courtines, bretèches et échauguettes, constituent des exemples de défenses.","habitants":"famille de Jean de la Motte \r\nfamille de Joseph Saleon Terras\r\n        \r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Motte_Accons_1.jpg","../../jctruffet.com/image/image_07/07_Motte_Accons_2.jpg","../../jctruffet.com/image/image_07/07_Motte_Accons_3.jpg","../../jctruffet.com/image/image_07/07_Motte_Accons_4.jpg","../../jctruffet.com/image/image_07/07_Motte_Accons_5.jpg","../../jctruffet.com/image/image_07/07_Motte_Accons_6.jpg"]},"Consult_chateau_formulaire27ed":{"id":"Consult_chateau_formulaire27ed","dept":"07","canton":"Les Vans","commune":"Naves","nom":"Naves","type":"Vestiges","periode":"XI","histoire":"Naves: le premier seigneur connu Gaucelin de Naves signalé en 1197, en 1226 un Pierre de Naves, cette famille  était propriétaire de la seigneurie de Mirandol et de la Garde-Guerrin en Gévaudan. Cette seigneurie qui était encore en 1594, s'allia à de nombreuses familles du Vivarais, elle fondit par alliance avec les Borne, Claude de Naves avec Claude de Borne, leur fils Annet de Borne fut seigneur de Mirandol et coseigneur de Naves, passa ensuite à Bertrand de Malbosc, aux de Chambonnas, et aux comte de Roure (etc), il y eut en tout vingt deux co-seigneurs qui se succédèrent jusqu'au XVIIIe siècle.","architecture":"Le château a été détruit en 1632,  il ne reste en vestiges qu'un petit donjon quadrangulaire de 8 m. de haut, les murs de 1,5 m. d'épaisseur.","habitants":"Famille de Bertrand de Malbosc  \r\nfamille d'Annet de Borne \r\nfamille du comte de  Roure\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Naves_1.jpg","../../jctruffet.com/image/image_07/07_Naves_2.jpg","../../jctruffet.com/image/image_07/07_Naves_3.jpg"]},"Consult_chateau_formulaire9704":{"id":"Consult_chateau_formulaire9704","dept":"07","canton":"Bourg-St-Andéol","commune":"Bourg-St-Andéol","nom":"Nicolay_tour","type":"Tour","periode":"XV","histoire":"Tour de Nicolay: les Nicolay durent leur fortune au commerce de la draperie, à Bourg-Saint-Andéol dont le premier apparaît en 1386, un fils Ahoult était consul en 1414, le fils de ce dernier fut le principal fondateur du couvent des Récollets, aujourd'hui hôpital. Jean Nicolay,  fils d'Aimé d'Ahoult coseigneur du Bourg-Saint-Andéol et de Saint-Marcel, seigneur de Cousignac, Bel, Frémigères et les Méas, bailli de Bourg-St-Andéol et de Pierrelatte décédé en 1496, avait entreprit la construction de l'hôtel de la famille, mais c'est son fils Jean II qui agrandit et embellit cette demeure, suite à un voyage en Italie avec Louis XII, il fut nommé grand chevalier du Royaume jusqu'en 1503, puis devint président de la chambre des comptes  de Paris, Antoine Nicolay son fils abandonne Bourg-St-Andéol pour s'installer à Paris; cette demeure restera dans sa famille jusqu'en 1588.
