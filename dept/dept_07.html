Montmorency, puis en 1650 aux Levis-Ventadour  de 1700 à 1789  aux Rohan-Soubise.","architecture":"Le château qui se trouvait au-dessus du village à l'état de ruines,  a été construit par les dauphins du viennois comte d'Albon il a été détruit sur ordre du roi en 1574.","habitants":"Famille Ventadour\r\n        \"","divers":"Vestiges du château","gps":"","images":["../../jctruffet.com/image/image_07/07_Serrieres_1.jpg"]},"Consult_chateau_formulaire644b":{"id":"Consult_chateau_formulaire644b","dept":"07","canton":"Vernoux","commune":"Silhac","nom":"Silhac-Colans","type":"Manoir","periode":"XV","histoire":"COLANS:  Cité dés le XIIe siècle.       Le premier seigneur connu est Arnaud de Colans Damoiseau en 1283, au XVIe siècle la maison de Poitiers fut suzeraine du fief des Colans, en 1394, noble Artaud de Collans était capitaine de Chalencon, institué dans cette fonction par dame Hélide de Beaufort, sur du pape Clément VI, veuve du comte de Valentinois, Aymar IV. passa ensuite dans les mains de la famille de Lauberge, aux Barjac, en 1394, , veuve du comte de Valentinois, Aymar IV. aux Chambaud, aux d'Indy, aux Delgo de Besses, puis à monsieur d'Angles, qui vendit le domaine au comité d'entreprise de Saint-Gobain. En 1981 Mr Blanc racheta la propriété et la vendit en 1989 aux Engelhard-Jouvencel         HAUTVILLAR: Cité en 1175 par Hugues de Hautvillar, dans la famille jusqu'en 1468 ou Claude de Hautvillar en rendait hommage aux comtes de Valentinois ainsi qu'au châpitre de Saint-Bernard de Romans.\r\nIl appartenait au triptyque médiéval qui avec la Tourette et Vaussèche défendaient les arrières de Chalencon. Au XVIIe siècle passa dans la famille des Châteauneuf de Randon, aux d'Apchier de Vabres, dans la descendance jusqu'en 1797 à Antoine-Paul-Augustin Falcon de Longevialle.\r\nFait historique: Gabrielle de Hauvillard mourut comme une sainte; les paroisses de Largentière et de Chassiers se disputèrent le corps en 1706 et furent sur le point d'en venir aux armes. Elle fut ensevelie la nuit en toute discrétion. \r\nAujourd'hui monsieur Félix Laurent en est le propriétaire.                    VAUGERON: Il est signalé qu'au XVIIIe siècle la seigneurie appartenait au de Bard, mais \"Vogeron\"  à Just Henri Morel, médecin appelait  monsieur de Vaugeron, frère du pasteur de la Pise, réfugié en Suisse en 1683; sa fille unique a épousé Scipion de Mercure de Rochessauve, ancien officier, frère de Suzanne de Rochessauve, épouse d'Etienne de Glo de l'Horme.  Il receuille, à Vaugeron, sa nièce Catherine de  Glo qui épousera plus tard le pasteur Pierot, leur fils Issac s'installerat à Vaugeron, et fut maire de Vernoux. Il eut une fille qui épousa Jacques Chalamet du Serpoulet, cinq enfants dont l'un hérita de Vaugeron.","architecture":"Colans; Maison forte  de deux étages, cité au XIIIe siècle, remanié, flanquée de deux hautes  tours rondes à toits plats.                              Hautvillar; Maison forte  de type ardéchois, du XVIe siècle gros corps de logis très massif, deux hautes tours rondes dotées d'un petit donjon carré sur la face Nord.                  Vaugeron; Manoir dont une partie date du XVIe siècle, les écuries du XVIIIe siècle et les restes du XIXe siècle.","habitants":"Famille Arnaud de Colans\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Colans_1.jpg","../../jctruffet.com/image/image_07/07_Colans_2.jpg","../../jctruffet.com/image/image_07/07_Colans_3.jpg","../../jctruffet.com/image/image_07/07_Colans_4.jpg","../../jctruffet.com/image/image_07/07_Colans_5.jpg","../../jctruffet.com/image/image_07/07_Colans_6.jpg","../../jctruffet.com/image/image_07/07_Colans_7.jpg","../../jctruffet.com/image/image_07/07_Colans_8.jpg","../../jctruffet.com/image/image_07/07_Colans_9.jpg"]},"Consult_chateau_formulaire01b3":{"id":"Consult_chateau_formulaire01b3","dept":"07","canton":"St-Péray","commune":"Soyons","nom":"Soyons","type":"Vestiges","periode":"XIII","histoire":"Soyons: En 1095 la jeune Iseult du Béage atteint d'une éruption cutanée, déclaré lépreuse et enfermée dans la tour par son oncle après le départ de son père et de son cousin Arthur de Bermond, délivrée à leur retour et mariage à Valence (légende).  Occupé par le seigneur de Brison, chef protestant. Il est assiégé par le prince de Condé qui brûla la ville et abattis les deux tours du château en 1628. \r\nL'année suivante les protestants reconstruisirent les tours et édifièrent un rempart bastionné, à la suite de cela Louis XIII donne l'ordre de tout détruire, une tour est restée.","architecture":"De ce château il ne reste qu'une tour carrée est penchée, unique vestige des fortifications médiévales au plateau de Malpas. Son inclinaison est due à la destruction du village par les troupes royales en 1629","habitants":"Seigneurs de Brison\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Soyons_1.jpg","../../jctruffet.com/image/image_07/07_Soyons_2.jpg","../../jctruffet.com/image/image_07/07_Soyons_3.jpg"]},"Consult_chateau_formulaire144e":{"id":"Consult_chateau_formulaire144e","dept":"07","canton":"Annonay","commune":"St-Cyr","nom":"St-Cyr-Pinee-Soras","type":"Château","periode":"XVI","histoire":"Pinée: ce domaine qui fut acheté à François de Laurencin, en 1593 par Claude  de Barberon  homme de loi à Annonay, eut deux enfants avec Marguerite de Losme, son fils Jean qui   succéda aux biens et prit le titre de seigneur de Fontanes, et sa fille qui épousa Jean Lombard qui continua la lignée des Lombard de Mars.  En 1623 Anne Caron  de Lombard fut héritière, son fils Jean Lombard de Barberon sieur de Fontanes anobli en 1643 récupéra tout les biens, sans postérité se fut son frère Jean  mais sans successeur, le fils de Laurent Combe hérite, Jean-François Combe de Barberon seigneur de Fontanes qui récupéra les biens  en 1750, il épousa Jury de l'Etra dont il eut  neuf enfants,   aujourd'hui, ( privée).                             Dans la commune de Saint-Cyr le château de  SORAS: construit en 1619 par Claude Barberon, et jean de Soras, acquis à Siméon Veyre en 1672, vieille famille qui possédait le fief depuis 1480. Claude Barberon  secrétaire du roi au parlement de Pau.\r\nLa maison noble de la Récluzière entra dans la famille de Soras. \r\nLes domaines de Pinées et de Fontanes, vinrent se joindre  pour encadrer comme jadis Soras.\r\nJean François Combe de Barberon, en 1750 seigneur de Soras.  Depuis Siméon Veyre, seigneur de Soras, ses descendants directs, à travers trois siècles en restent détendeurs, monsieur Louis de Soras est actuellement propriétaire du fief érigé pour noble de Barberon, et intégralement reconstitué entre ses mains, et a de nombreuses alliances locales ; les Montchal, Albert Fournat d'Ay et de Brézenaud, et la Lombardière de Canson en 1658. \r\nToujours dans la famille de Soras.","architecture":"Pinée; Construit au XVIe siècle;   quadrangulaire transformé en domaine agricole.                             Soras; deux domaines dans un, forme un bel ensemble de deux corps de logis rectangulaires  flanqués de tours rondes et carrées.","habitants":"Famille de Barthélémy Veyre de Soras\r\n        \"","divers":"Château de Pinée et de Soras","gps":"","images":["../../jctruffet.com/image/image_07/07_Pinee_1.jpg","../../jctruffet.com/image/image_07/07_Pinee_2.jpg","../../jctruffet.com/image/image_07/07_Pinee_3.jpg","../../jctruffet.com/image/image_07/07_Pinee_4.jpg"]},"Consult_chateau_formulaire3088":{"id":"Consult_chateau_formulaire3088","dept":"07","canton":"St-Agrève","commune":"St-Agrève","nom":"St_Agrève","type":"Manoir","periode":"XIV","histoire":"CLAVIERES: en 1359, était le fief d'un de Clavière originaire du Gévaudan ou de l'Auvergne; Il resta dans cette famille jusqu'au XVIIIe Siècle.  En 1775 il passa aux mains d'un Bollon de Clavière. \r\nEn 1900 le propriétaire en était Mr Frachon époux d'une demoiselle Bollon. \r\nA ce jour, il appartient à une société civile et immobilière de Clavière. DEVESSET: Au Moyen-Age, était la principale commanderie d'Auvergne, elle fut fondée au XIe siècle par le comte Aymar du Valentinois qui en confia la charge aux templiers, auquels succédèrent en 1164, les Hospitaliers de Saint-Jean de Jérusalem. \r\nLa commanderie avait pour siège une puissante forteresse détruite en 1428 par une bande de routiers, elle fut reconstruite vers 1472 et abandonné à la Révolution, elle brûla en 1838.          LACOUR: Les seigneurs les plus anciens étaient les Fay, puis les comtes de Poitiers-Valentinois, en 1239 Aymon de Poitiers en fit hommage aux comtes de Toulouse, en 1327 les de Polignac et les Mastre étaient co-seigneurs, vers 1450 aux St-Jeurre, en 1532 au Truchet, en 1592 les d'Asseyme puis les Maisonseule jusqu'en 1668. Alexandre de la Gruterie seigneur de Maisonseule fit construire en partie le château. Le marquis de Grollier, époux de Claudine de Maisonseule en fut propriétaire jusqu'en 1765, et le marquis du Bourg jusqu'en 1793. Devenu bien national, il fut acheté par Mr Fournet qui le vendit à Mr Freydier, puis les Lafont, passa à son gendre Mr Chevalier qui le guarda jusqu'en 1955, puis vendu aux Mollières. Aujourd'hui centre équestre.             Le GRAIL: Depuis le XVe siècle dans la famille de Talode, il y eu Pierre, Claude et Bernard écuyer, sieur du Grail, puis passa à Claude-Bernard de Champagne, sieur du Grail condamné par défaut en 1698. Cette famille existe toujours par la continuité de Joseph de Bernard de Talode du Grail en 1861 qui a épousé Thérèse de la Farge,  naquirent cinq enfants.","architecture":"Clavières; bâtiment carré a deux étages et attique avec deux tours rondes à toits en poivrière.                            Devesset; le château , ceint de hautes murailles, comportait trois tours plus une guérite reprenant la forme d'une tour; aujourd'hui il ne reste qu'une tour ronde à deux étages toit en poivrière et d'un bâtiment rectangulaire assez restreint.                                Lacour; Edifice de plan massif flanqué de deux grosses tours, il constitue le point fort d'un quadrilatère de hautes murailles renforcées d'échauguettes d'angles,le donjon fut  construit en 1592.                                     Grail; Maison forte médiévale, corps de bâtiment rectangulaire arborant bretèche et échauguettes, abrite aujourd'hui un hôtel restaurant.","habitants":"famille Bollon de Clavières\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Clavieres_1.jpg","../../jctruffet.com/image/image_07/07_Clavieres_2.jpg","../../jctruffet.com/image/image_07/07_Clavieres_3.jpg","../../jctruffet.com/image/image_07/07_Clavieres_4.jpg","../../jctruffet.com/image/image_07/07_Clavieres_5.jpg","../../jctruffet.com/image/image_07/07_Clavieres_6.jpg"]},"Consult_chateau_formulaire20cf":{"id":"Consult_chateau_formulaire20cf","dept":"07","canton":"Satillieu","commune":"St-Alban d`Ay","nom":"St_Alban_d`AY","type":"Château","periode":"XV","histoire":"Pierregrosse: au XVe siècle, appartenait au fief de Gonon de Pierregrosse, et en 1520 passa à Pons Deschamps qui épousa Pierrette de Clarette de Pierregrosse dont-il eut quatre enfants. Just Deschamps, qui sera seigneur de Pierregrosse en 1631 épousa en 1579 Florence Fournier, fille de Pierre seigneur de Brogieux les Annonay. Puis passa à Nicolas Deschamps en 1610. Just-Antoine Deschamps de Montbel seigneur de Pierregrosse et de Montbel épousa en en1686 Jeanne-Marie de Romanet. Jean Baptiste Deschamps de Pierregrosse, capitaine au régiment de Beauvoisis infanterie, sieur de Cros en 1743 meurt sans postérité au château de Pierregrosse.                             Un fils de Just Deschamps reçoit en héritage Pierregrosse, passa à son fils Louis écuyer épousa Antoinette de la Franchière de Girodon.\r\nLouis-César de Romanet de Lestrange de Beaudiner, marquis de Lestrange général de brigade épousa en 1778 Anne-Louise de Chastillon, leur fils Jean-Antoine-Louis, comte de Romanet et de Lestrange habitait au château de Pierregrosse et épousa Hortense de Tournon-Simiane en 1811, dont deux filles, Nous pensons que cette maison est restée dans cette famille  à monsieur Louis de Mars qui en est le propriétaire (descendant).\r\nLe comte Blégier de Pierregrosse archéologue faisait partie de cette maison.                                   LA FAURIE: Ce château a été la propriété des Granjon, Blaise Granjon notaire fit construire le château de la Faurie en 1611.  Jean  Granjon fils de Blaise qu'il eu avec Jeanne Bouchette en deuxième mariage, ce dernier eut  deux fils Pierre et François,  qui créeront deux branches, Pierre châtelain de Beaudiné et juge à Pailharès et de Saint-Alban son fils Nicolas épousa en 1678   Ursule Renat, Nicolas châtelain de Saint-Alban eut un fils qui mourut à Lyon en 1751 ses fils  n'eurent pas de descendance, sa fille Madeleine épousa en 1761 Vital Tavernier, notaire royal de Satillieu. François le frère de Pierre avocat à Annonay, de son deuxième mariage il eut des filles et un fils Nicolas en qui s'éteignit la postérité. Ces familles se sont toujours investies dans la vie locale avec des magistrats et conseillers généraux; surtout dans la famille de Lestrange; Louis de Lestrange 1802-1831, Louis-Charles-Théodore de Romanet marquis de Lestrange 1843-1953 conseiller général, Louis-Charles-Césarde Romanet marquis de Lestrange 1855-1871, Audouin de Romanet marquis de Lestrange conseiller général 1907-1927 et Henri de Romanet de Lestrange 1936-1945. Il avait un cousin germain Antoine de Saint-Exupéry, fils de Marie de Fonscolombe nièce d'Audoin de Romanet marquis de Lestrange et cousine de Catherine de Lestrange épouse de Colas des Francs et mère du docteur Olivier Colas des Francs propriétaire actuel des lieux et de Jean de Saint-Exupéry Antoine avant de prendre les airs venait en vacances à la Faurie.                     RIEUX: C'est la famille Faure et Fabry en 1420 qui construisirent le château, passa aux Tournon seigneur de Pierregrosse en 1620, puis à Jean-Antoine de Serres, capitaine de cavalerie en 1765.\r\nCaroline Genève de Brezy hérita en 1812, puis par mariage passa aux Chèze. Théophile Chèze, maire de Serrières et conseiller général sauve le château des pillards en 1789, puis passa à Charles Vachon de Lestra qui en hérita après la mort de sa grand-mère madame Chèze en 1885. Madame le Harivel du Rocher sa nièce qui en était propriétaire au début du siècle, passa à Madame Pidoire.","architecture":"Pierregrosse; corps de logis quadrangulaire à deux étages et attique, tour  ronde  sur la partie arrière.      La Faurie; ce château du XVIIe siècle  a un corps de logis rectangulaire à trois niveaux flanqué en façade d'un pavillon saillant avec fronton.                 Rieux; bâtisse du XVe siècle  composée de trois corps de logis de trois étages en équerre, le plus ancien est encore flanqué d'un donjon quadrangulaire, d'une grosse tour ronde en façade un donjon  carré sur flan gauche et grosse tour cylindrique à l'arrière, également munit d'une échauguette, cet ensemble montre qu'il  a été construit successivement, Remanié en 1860.","habitants":"Famille de Gonon de Pierregrosse  \r\nFamille de Fournier de Brogieux\r\nFamille Deschamps  \r\nFamille Romanet\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Pierregrosse_1.jpg","../../jctruffet.com/image/image_07/07_Pierregrosse_2.jpg","../../jctruffet.com/image/image_07/07_Pierregrosse_3.jpg","../../jctruffet.com/image/image_07/07_Pierregrosse_4.jpg"]},"Consult_chateau_formulaire8c33":{"id":"Consult_chateau_formulaire8c33","dept":"07","canton":"St-Félicien","commune":"St-Félicien","nom":"St_Felicien","type":"Vestiges","periode":"X","histoire":"Rochefort: dépendait aux Xe siècle à la collégiale de Saint-Barnard de Romans, puis à Artaud, seigneur d'Argental, au XIe siècle. Au XIIIe siècle  appartenait à Odon de Retourtour, et à Josserand  de Saint-Didier,  en 1275 aux Montlaur,  en 1370 aux Châteauneuf  Joyeuse,  en 1525 aux Montmorin, plus tard , il passait successivement aux d'Audoyer,  aux de Bron,  aux d'Espinal,  aux Ginestou,  aux du Bourg et au XVIIe siècle faisait partie du marquisat de Bosas.           Dans la commune de Saint-Félicien le château de ROSIERES: Construit au XIIe siècle par les seigneurs de Rochefort, puis les Mallet de la Tour, ils le vendirent aux Dragonnet de Burine, passa par alliance aux Reboulet seigneur de Ruisas, puis toujours par alliance passa au baron Charles Antoine de Romanet dont le fils ainé maréchal des armées du Roi.\r\nJosephine de Pleyné marié en 1812 à Joseph Charré de la Valette habitait au château.  \r\nLe château fut vendu à monsieur Louis de Lavalette dont il est resté plus d'un siècle et termina chez monsieur Garnier (privé).","architecture":"De ce château construit au Xe siècle il ne reste que la base du donjon quadrangulaire de 8 m. par 6 m. sur les hauteurs de Saint-Félicien.\r\nDétruit pendant les guerres de religion. Rosières; corps de logis quadrangulaire  flanqué de tours rondes à toits plats.","habitants":"Famille d'Odon de Retourtour \r\nfamille d'Alexandre de St-Didier\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Rochefort_1.jpg","../../jctruffet.com/image/image_07/07_Rochefort_2.jpg","../../jctruffet.com/image/image_07/07_Rochefort_3.jpg","../../jctruffet.com/image/image_07/07_Rochefort_4.jpg","../../jctruffet.com/image/image_07/07_Rochefort_5.jpg"]},"Consult_chateau_formulaireddac":{"id":"Consult_chateau_formulaireddac","dept":"07","canton":"Villeneuve-de-Berg","commune":"St-Jean-le-Centenier","nom":"St_Jean_le_Centenier","type":"Château","periode":"XIII","histoire":"Saint-Jean le Centenier appartenait au XIVe siècle aux de Montaud, puis aux d'Angerés par alliance en 1638 aux Moreton de Chabrillan. Le petit-fils de Charles-Jacques Aymar-Henri de Morethon, seigneur de Saint-jean le Centenier, comte de Chabrillan, lieutenant des armées du roi, capitaine des gardes en 1770,  il épousa sa cousine germaine Bathilde-Madeleine-Félicité de Verdelhan des Fourneils. Dans cette ville un autre château du XIXe siècle  \"les Plagnes\" de la famille Vincent, puis à la famille Reynaudie.","architecture":"Saint-Jean-le-Centenier; ce château  dans le hameau très XV-XVIe siècle, corps de logis rectangulaire à deux étages à toits presque plats  en tuiles provençales, petites ouvertures, flanqué d'une tourelle accolée en angles et d'une tour ronde dans le parc.                    Les Plagnes: construit en 1877, belle demeure renaissance avec quatre échauguettes en encorbellements.","habitants":"Famille de Montaud                 Famille Morethon de Chabrillan       Famille Vincent, les Plagnes\"","divers":"Manoir féodal dans village.          Manoir des Plagnes","gps":"","images":["../../jctruffet.com/image/image_07/07_St_Jean_le_Centenier_1.jpg","../../jctruffet.com/image/image_07/07_St_Jean_le_Centenier_2.jpg","../../jctruffet.com/image/image_07/07_St_Jean_le_Centenier_3.jpg"]},"Consult_chateau_formulaire274b-2":{"id":"Consult_chateau_formulaire274b-2","dept":"07","canton":"Chomérac","commune":"St-Julien-de-St-Alban","nom":"St_Julien_de_St_Alban","type":"Vestiges","periode":"XI","histoire":"Saint-Julien de Saint-Alban: au XIIIe siècle Aymar de Poitiers, comte de Valentinois reprend son fief au Comte de Toulouse Raymond VII.\r\nLe château envahit par les catholiques en 1627, et démoli en 1629 par Rohan. Manoir de Blanchon accolé à l'usine  de verre à soie à l'origine.                        Cellier: au féodal, Saint-Fortunat (commune voisine) ancienne terre des comtes de Poitiers Valentinois. Au XVIe siècle aux seigneurs de Presles, puis aux de la Tourette.","architecture":"St-Julien de St-Alban; dominant la vallée de l'Ouvéze, un château féodal, il ne reste qu'un pan de mur d'une tourelle.    Manoir de Blanchon  corps de logis rectangulaire à fronton et angle arrondie.                             Dans la commune voisine, une maison forte appelé \"le Cellier\" corps de logis  rectangulaire à trois étages flanqué de deux tours rondes à  toit conique aplanit.","habitants":"Aymar de Poitiers \r\nRaymond VII comte de  Toulouse\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_St_Julien_de_St_Alban_1.jpg","../../jctruffet.com/image/image_07/07_St_Julien_de_St_Alban_2.jpg","../../jctruffet.com/image/image_07/07_St_Julien_de_St_Alban_3.jpg","../../jctruffet.com/image/image_07/07_St_Julien_de_St_Alban_4.jpg","../../jctruffet.com/image/image_07/07_St_Julien_de_St_Alban_5.jpg"]},"Consult_chateau_formulaire86a1":{"id":"Consult_chateau_formulaire86a1","dept":"07","canton":"St-Etienne-de-Lugdarès","commune":"St-Laurent-les-Bains","nom":"St_Laurent_les_Bains","type":"Vestiges","periode":"IX","histoire":"Saint-Laurent les Bains: vers 1330 un fief seigneurial de Franc Guillaume de Randon vassal des seigneurs des Roches-en-Reignier possédait les lieux; passa ensuite aux de Luc, puis aux Montlaur, fin XVIe siècle aux de Polignac par alliance. \r\nA partir de 1644 toujours par alliance aux de la Motte, au XVIIIe siècle aux de la Motte Chalendar. Le dernier seigneur du fief fut Christophe de la Motte (arrière-petit-fils). En 1782, il vendit ses droits à un bourgeois de Langogne.","architecture":"Au XVIe siècle le bourg était fortifié avec une tour datant du Xe siècle, appelé jadis Nitrense, elle a été reconstruite  en 1997.","habitants":"Famille de Guillaume de Randon\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_St_Laurent_les_Bains_1.jpg"]},"Consult_chateau_formulaire33ca":{"id":"Consult_chateau_formulaire33ca","dept":"07","canton":"Villeneuve-de-Berg","commune":"St-Laurent-sous-Coiron","nom":"St_Laurent_sous_Coiron","type":"Vestiges","periode":"XII","histoire":"Saint-Laurent sous Coiron: le château appartenait au XIIe siècle à l'évêque du Puy, au XIIIe siècle aux Montlaur, vers 1440 aux seigneur d'Ucel, puis à de nombreux co-seigneurs, parmi lesquels l'abbesse de Villedieu.","architecture":"Le village de Saint-Laurent-sous-Coiron est perché sur un plateau basaltique sur le rebord sud-est du massif du Coiron. Sa situation privilégiée offre une remarquable vue sur Mirabel, facilement reconnaissable à sa haute tour carrée du XIIIe siècle. Autrefois ceinturé dun rempart dont il reste quelques éléments architecturaux, le village est dominé par les vestiges du château et, en contrebas, par léglise paroissiale qui a intégré un joli portail roman.","habitants":"Etienne évêque du Puy                 famille de Guy de Montlaur\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_St_Laurent_sous_Coiron_1.jpg","../../jctruffet.com/image/image_07/07_St_Laurent_sous_Coiron_2.jpg","../../jctruffet.com/image/image_07/07_St_Laurent_sous_Coiron_3.jpg","../../jctruffet.com/image/image_07/07_St_Laurent_sous_Coiron_4.jpg","../../jctruffet.com/image/image_07/07_St_Laurent_sous_Coiron_5.jpg"]},"Consult_chateau_formulairea45d":{"id":"Consult_chateau_formulairea45d","dept":"07","canton":"Bourg-St-Andéol","commune":"St-Marcel-d`Ardèche","nom":"St_Marcel_d_Ardeche","type":"Château","periode":"XII","histoire":"Saint-Marcel d'Ardèche: au XIIe siècle, Raymond , comte de Toulouse avait des droits sur le château de Saint-Marcel, au XIIIe siècle, propriété des évêques de Viviers, puis passa a des  co-seigneurs qui firent fortifier la ville par des remparts et tours, en 1380 un Pierre de Saint-Marcel au XIVe siècle et au XVIe siècle aux marquis de Bernis dont le propriétaire du château au XVIIe siècle est le frère du cardinal issue de  Bertrand et Catherine de Bernis qui donna par sa descendance le cardinal de Bernis, ministre du roi Louis XV, qui fit construire un vaste château qui sera démoli à la Révolution et reconstruit au XIXe siècle avec le retour temporaire des Bernis.  \r\nEn 1751 le domaine de Bernis sera érigé en marquisat au Bénéfice de Charles et de Pierre de Blou. \r\n Aujourd'hui dans la descendance des Harcourt.                            BERNIS: Ancienne seigneurie des Bernis, échue à Bertrand par son mariage en 1595 avec Catherine de Bernis qui donne par descendance le cardinal de Bernis, ministre du Roi Louis XV. \r\nAujourd'hui toujours dans la descendance de la famille des Harcourt.","architecture":"Dans le village se trouve le château des Bernis construction du XVIIIe siècle assez simple avec de  belles   proportions,  un  corps  de  logis rectangulaire, avec fronton  imposant et deux ailes saillantes. les remparts furent également détruits. \r\nDans la commune un manoir transformé en un centre d'observation et de rééducation. \r\nDu château reste une tour de 8,90 m par 6,35m à trois étages.","habitants":"Evêques de Viviers                    Cardinal de Bernis\r\n        \r\n        \"","divers":"Château (hôpital) et de Bernis et vestige d'une tour.","gps":"","images":["../../jctruffet.com/image/image_07/07_St_Marcel_d_Ardeche_1.jpg","../../jctruffet.com/image/image_07/07_St_Marcel_d_Ardeche_2.jpg","../../jctruffet.com/image/image_07/07_St_Marcel_d_Ardeche_3.jpg","../../jctruffet.com/image/image_07/07_St_Marcel_d_Ardeche_4.jpg","../../jctruffet.com/image/image_07/07_St_Marcel_d_Ardeche_5.jpg","../../jctruffet.com/image/image_07/07_St_Marcel_d_Ardeche_6.jpg"]},"Consult_chateau_formulaire8cd8":{"id":"Consult_chateau_formulaire8cd8","dept":"07","canton":"La Voulte-sur-Rhône","commune":"St-Georges-les-Bains","nom":"St_Marcel_de_Crussol","type":"Vestiges","periode":"X","histoire":"Saint-Marcel de Crussol: Giraud Bastet seigneur au XIIe siècle en été propriétaire jusqu'en 1328 et en rendit hommage au comte de Valentinois  (Poitiers) et en fit retour au seigneur de Crussol au XVe siècle le château  tiraillé entre deux châtelains de Crussol et de Pierregourde, puis passé à la seigneurie d'Uzés sous le contrôle des seigneurs ducs de Crussol.            Dans la commune le château de Saint-Georges les Bains:  Famille du Forez du fief des d'Azieu et de Pomeys dans la paroisse de Saint-Thomas la Garde près de Montbrison; Marguerite Martin du Pomeys, née en 1770, héritière  épouse Joseph Toussaint Anselme et ces dans cette famille que démarra le fief de Saint-Georges les Bains; Joseph-Marie-Georges Anselme de Pomeys naquit à Saint-Georges et épousa en 1883 Marthe-Géorgine de Jussieu.","architecture":"St Marcel de Crussol; imposantes ruines d'un vaste Castrum, au sommet du relief ruines du château (pans de murs et murs d'enceinte en contrebas).              St-Georges les Bains; ce grand bâtiment rectangulaire appelé aussi \"Château\" construit à l'emplacement d'un château pour soins médicaux du fait des piscines d'eau  calcalino-sulfureuse qui furent fermées  par le premier préfet de l'Ardèche qui trouva cela décadent.    Aujourd'hui transformé en maison de retraite.","habitants":"Famille d'Aymar de Poitiers    \r\nFamille de Giraud de Pierregourde  \r\n        \"","divers":"Vestiges de pans de murs sur la colline et château de Crussol et château de St-Georges les Bains","gps":"","images":["../../jctruffet.com/image/image_07/07_St_Marcel_les_Crussol_1.jpg","../../jctruffet.com/image/image_07/07_St_Marcel_les_Crussol_2.jpg","../../jctruffet.com/image/image_07/07_St_Marcel_les_Crussol_3.jpg"]},"Consult_chateau_formulaireef52":{"id":"Consult_chateau_formulaireef52","dept":"07","canton":"Cheylard","commune":"St-Martin-de-Valamas","nom":"St_Martin de Valamas","type":"Château","periode":"XVI","histoire":"La VARENNE: au centre de st-Martin de Valamas, au XIIIe siècle le château appartenait aux  seigneurs de Châteauneuf de Rochebonne, au XIVe siècle aux seigneurs de Varenne et des Rosières, et au XVIe siècle aux seigneurs  d'Audoyer, conseiller du roi au parlement du Dauphiné,  au XVIIe siècle Pierre Audeyer seigneur du Cros et de Montbel, vend à noble Jacques Jullien sieur du Fraisse.  En 1779, le 10 Juin , la propriété passe à noble Issac Joseph Blanc de Loire, avocat au parlement de Toulouse qui épousa Marie Julienne de Julien de Lavarenne. En  1870 la Varenne fut vendue à madame Faure de Chambarlhac, et après incendié, la famille Poncet à réaménagé le château.                              LAVIS; en 1625 habité par la famille Riou. \r\nLa fille unique de son descendant maître Laurent Riou, notaire royal à Saint-Martin, épousera en 1727 Joseph Abrial. Dix générations se succédèrent à Lavis. La famille Abrial a joué un rôle important dans l'histoire de la commune de Saint-Martin. Jean-Pierre Abrial     (1791-1857) se vit confier le commandement de la force cantonale pour s'opposer à la troupe des Autrichiens dans la région. (propriété privée).      NEYLY; construit au XIXe siècle par Philippe-Charles-Uldéric Carle. \r\nIl fut appelé \"Villa Carle\", par son propriétaire (1849-1925) notaire dans cette commune jusqu'en 1876. \r\nAcquis par la famille d'Abrigeon en 1939, qui le possède toujours.","architecture":"La Varenne; La tour accolée a un corps de bâtiment faisait partie du château qui a était détruit par un incendie le 16 décembre 1908, reste la façade avec tour.\r\nLavis; en 1736 fut construit le corps de logis quadrilatère avec la tour ronde sur façade Ouest. En 1898 fut construite les deux tours  carrées à mâchicoulis  sur la partie Nord.                     Neyly; Cette bâtisse appelé \" Villa Carle \" possédait à l'origine des toitures en tuiles de zinc en formes de tronc de pyramide, remplacées par des toitures en tuiles, la tour ronde également réduite.","habitants":"Famille de Joseph Abrial  \r\nFamille de Jean Pierre Abrial\r\n        \r\n        \r\n        \r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_St_Martin_de_Valamas_1.jpg","../../jctruffet.com/image/image_07/07_St_Martin_de_Valamas_2.jpg","../../jctruffet.com/image/image_07/07_St_Martin_de_Valamas_3.jpg"]},"Consult_chateau_formulaire9a39":{"id":"Consult_chateau_formulaire9a39","dept":"07","canton":"Bourg-St-Andéol","commune":"St-Montan","nom":"St_Montan","type":"Vestiges","periode":"XII","histoire":"Saint-Montant: premier seigneur connu Guillaume du Pont passa ensuite a beaucoup de co-seigneurs qui sont les Balazuc, les St-Montan, les Serrescudier, les Arlempes de Mirabel, les Gilles, les Marroan, les Châteauneuf et les Fayen.  \r\nDe 1250 les seigneurs sont Guillaume de Naves et à Geoffroy de Châteauneuf qui le gardèrent jusqu'en 1544 puis passa aux Fayn jusqu'en 1611 et par les  de Montagues, puis par les Vesc, en 1694 par Claude de Benoit.\r\nRemanié plusieurs fois et détruit par les guerres de religion.             CHARNEVE: la famille de Bazalgette qui s'était établit en Grésivaudan lors de leur venu  d'Espagne, s'installèrent à Bourg-Saint-Andéol dans un hôtel particulier (hôtel Nicolay) puis au château de Charnève qui fut apporté par Jeanne de Forlivio à Martin de Bazalgette, ce domaine ayant appartenu aux Maroan qui était seigneur du lieu. Martin prit le nom de seigneur de Charnève, le fils de Martin s'allia à la famille de Bernis, ils eurent deux fils qui s'allièrent un aux La Fare et l'autre aux Braban, par ces alliances cette famille s'apparentait aux Surville, aux Malleval, aux Tavernol de Barrés, aux Falcon du Clos et aux de Vesc.          Plusieurs membres eurent des fonctions dans la ville de Bourg-Saint-Andéol;  Martin de Bazalgette consul en 1718, et Joseph en 1762, d'autres eurent des carrières militaires, dont un Martin capitaine au régiment de Massillan. \r\nLe dernier membre fut Jacques-Alphonse frère de Martin  à sa mort sans postérité laissa Charnève à son cousin monsieur de Bernardy de Carpentras.","architecture":"Château primitif du XIIe siècle, donjon du XII  ruiné au XIVe siècle. \r\nChâteau supérieur construit au XIVe siècle ainsi que les remparts du bourg. Aujourd'hui du château il ne reste que des vestiges de l'ensemble détruit pendant les guerres de religion, une association des \" amis de Saint-Montan \"  a entrepris la restauration du château et des remparts.                            Charnève: Corps de logis rectangulaire à trois étages , chiens assis  et pavillon rectangulaire sur façade ouest, l'ensemble dans un style louis XVI.","habitants":"famille de Geoffroy de Châteauneuf      famille Claude de Benoit\r\n        \"","divers":"Vestiges de Saint-Montan","gps":"","images":["../../jctruffet.com/image/image_07/07_St_Montan_1.jpg","../../jctruffet.com/image/image_07/07_St_Montan_2.jpg","../../jctruffet.com/image/image_07/07_St_Montan_3.jpg","../../jctruffet.com/image/image_07/07_St_Montan_4.jpg","../../jctruffet.com/image/image_07/07_St_Montan_5.jpg","../../jctruffet.com/image/image_07/07_St_Montan_6.jpg","../../jctruffet.com/image/image_07/07_St_Montan_7.jpg"]},"Consult_chateau_formulaire2905":{"id":"Consult_chateau_formulaire2905","dept":"07","canton":"St-Pierreville","commune":"St-Pierreville","nom":"St_Pierreville","type":"Manoir","periode":"XVI","histoire":"Sibleyras: en 1464 appartient à Guillaume de Sibleyras, puis de la Boissière, en 1571 à noble Jean de la Croix seigneur de Sibleyras, Jean de Sibleyras dernier du nom hérite, Anne-Françoise sa fille, héritière, épouse en 1714 Scipion de Vocance seigneur de la tour de Poinsac, dont la fille et héritière, Suzanne de Vocance épouse de Marquet rendit en 1782 Sibleyras à monsieur Marze, riche bourgeois de St-Pierreville. \r\nMonsieur Marze, en 1789 fut député au Tiers-Etats, monsieur André Marze       (descendant) céda en 1894 à monsieur Borne industriel de la soie, toujours dans la famille.                       Les PRAS: Au XIIe siècle Jarenton possédait le domaine des Pras. \r\nAu XVe siècle fief de la famille Loye seigneur de Pras et notaire à Saint-Pierreville, en 1501 Philibert de Burine hérite. \r\nEn 1540 Jacques de Burine, maria son fils Gilbert avec Suzanne du Saignard, sans enfant, laissa la propriété à son frère Christophe, ensuite a Pierre  Bourdier( capitaine huguenot commandant du château du Cheylard en 1570) par mariage avec Marie de Burine en 1593, puis par alliance avec Suzanne de Bourdier en 1614 le domaine passa à Pierre Marcha qui entretient le château mais le vendra pour payer ses dettes. \r\nEn 1789, Etienne Gigord fut propriétaire et dernier seigneur des Pras.           Le château fut vendu à monsieur Chazalet en 1810.","architecture":"Sibleyras; maison forte a deux étages et attique de forme rectangulaire flanqué d'une tour carrée sur cour et tour ronde sur la partie opposée.                   Pras; La maison forte des Pras n'est aujourd'hui qu'une ferme accolée à deux tours rondes arasées.","habitants":"Famille de Guillaume de Sibleyras \r\nFamille André Marze      \r\nMonsieur Borne\r\n        \r\n        \r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Sibleyras_1.jpg","../../jctruffet.com/image/image_07/07_Sibleyras_2.jpg","../../jctruffet.com/image/image_07/07_Sibleyras_3.jpg"]},"Consult_chateau_formulaire52cb":{"id":"Consult_chateau_formulaire52cb","dept":"07","canton":"Villeneuve-de-Berg","commune":"St-Pons","nom":"St_Pons","type":"Château","periode":"XVI","histoire":"Saint-Pons: fief de Raymond de Barwel   (transformé en Barruel)  seigneurs de Saint-Pons-Mirabel au XIIIe siècle, qui avait épousé N. de Rochessauve puis en fit donation à son neveu Pierre de Rochessauve, en 1658 Louis-Antoine de Barruel seigneur de Saint-Pons, en 1707 à Antoine-Louis de Saint-Pons, en 1733 à Louis-Antoine Barruel de Saint-Pons deuxième du nom écuyer seigneur de Chaix  et de Saint-Pons né en 1733 mort en 1811 lieutenant du roi en la sénéchaussée de Villeneuve de Berg présida en 1789 à la réunion des états généraux. Il épousa en 1768 Anne-Mure de Larnage  de la maison-forte de Harpieu, de ce mariage sont né Louis Antoine, Joseph-Camille, branche qui s'établie à Grignan et qui hérita par la suite Saint-Pons et en trois Olympe de Barruel, marié le 19 juin 1801 à joseph-Guillaume-Louis Dalamel écuyer seigneur de Bournet, Valoubiéres et Sauvages.","architecture":"Du château primitif  - Vestiges d'ancien château et de remparts. Une enceinte médiévale ornée de petites tours au nord entourait ications sont assez récentes, une porte massive des remparts surmonté d'un fronton triangulaire, bâtiment avec fenêtres à meneaux, hautes cheminées et toitures pointues ne peuvent être antérieures au XVIe et XVIIe siècle.  En 1820 y fut accolé au nord un second bâtiment néo-classique.                             Bret; Construction très remanié  de la maison forte du XIVe siècle, s'est transformé en petit manoir, tour carrée  et façade du XVIIIe siècle.","habitants":"famille de Teste Ferrand de la Motte\r\n        \r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Beauregard_1.jpg","../../jctruffet.com/image/image_07/07_Beauregard_2.jpg","../../jctruffet.com/image/image_07/07_Beauregard_3.jpg","../../jctruffet.com/image/image_07/07_Beauregard_4.jpg"]},"Consult_chateau_formulaire606a-2":{"id":"Consult_chateau_formulaire606a-2","dept":"07","canton":"Bourg-St-Andéol","commune":"St-Remèze","nom":"St_Remeze","type":"Maison forte","periode":"XIII","histoire":"Saint-Remèze a appartenu à la baronnie de Balazuc. Au XIVe siècle appartenait aux seigneurs de Châteauneuf (Guillaume de Châteauneuf de Randon), vendu aux Barjac en 1434 et vendu au XVIe siècle à Bermond de Combas et en 1620 aux Baron Antoine de Roure, à François de Lorraine et à son fils d'Harcourt, aux Voguë passa ensuite au comte Fayen de Rochepierre, aux de Rochemure. Fin XVIIIe siècle au marquis de Saint-Remèze.\r\nA la Révolution le château fut partagé et vendu par les habitants du village, aujourd'hui propriété de la commune (école).","architecture":"Le château de Saint-Reméze, est une maison cossue seigneuriale du XVIIe siècle, la première tour date du temps des croisades, après avoir abrité une génération de seigneurs, à la Révolution de 1789, vestiges d'une tour médiévale carrée avec porte d'accés.  \r\nRemanié intégré dans le village sert aujourd'hui d'école","habitants":"Seignieurs de Châteauneuf    \r\nComte de Roure      \r\nComte de Rochepierre\r\n\r\n        \r\n        \"","divers":"Château de Saint-Reméze et manoir de Gaud au bord de l'Ardéche","gps":"","images":["../../jctruffet.com/image/image_07/07_St_Remeze_1.jpg","../../jctruffet.com/image/image_07/07_St_Remeze_2.jpg"]},"Consult_chateau_formulaire7f35":{"id":"Consult_chateau_formulaire7f35","dept":"07","canton":"Satillieu","commune":"St-Romain-d`Ay","nom":"St_Romain_d_Ay","type":"Château","periode":"XII","histoire":"St-Romain-d'Ay: la terre appartenait en 1206 à Aymard de Roussillon, en 1284 Joserand d'Ay (Artaud II de Roussillon) propriétaire d'Ay ainsi que Arnaud d'Yserand, puis au Beaudiné comte du Forez  et par alliance aux Roussillon, aux Bressieu et a Jacques de Tournon  en 1398, et cela pendant deux cent cinquante ans, jusqu'à la mort de Just- Louis de Tournon tué au siège de Philisbourg en 1644; ( une chapelle fut élevée).\r\nPierre Piquet fut commandant du château au XVIe siècle\r\nPasse ensuite aux Ventadour puis à la famille de Turenne, aux Faure, Alexis de Faure marquis de Satillieu  vendit en 1753 à  Barthélemy II, de Fournat Baron d'Ay et autres, seigneur de Brézenaud, puis à la famille de la Chavas, et en 1805 aux de la Rochette.\r\nNôtre dame d'Ay; en 1952 les frères Jésuites quittent les lieux et repris en 1982 par une association des amis de Notre-Dame d'Ay. Aujourd'hui propriété  de l'évéché de Viviers.                 Dans la commune le château de Plantier: A l'origine cette famille sort de Dornas et part leur activité d'homme de loi, un personnage de cette famille acquit le domaine du Plantier et prirent le titre de seigneur; le domaine fut vendu à Antoine Fourel seigneur du Plantier, docteur en droit, lieutenant de la juridiction de Saint-Alban d'Ay et juge, il avait épousé Isabeau de Roussillon qui fut veuve en 1648. Passa en 1700  à Alexandre de la Chavas seigneur de Col qui épousa Anne de Fourel.               BRENIEU: Au XIVe siècle ce domaine appartenait aux Damoiseaux, aux Tivoley, aux Rochette, aux  Dubois et Giry de Perrost. Propriété des Fournat par alliance avec les Chomel de Valgelat. Jean Fournat de Chomel, seigneur de Brénieu, une de ses filles épousa  Louis Paret, le domaine passa à la famille Arthur Paret qui en sont toujours propriétaire.","architecture":"Nôtre-Dame d'AY; trois corps de logis  en granit  à deux étages quadrangulaires appelé donjon de la grange, donjon de la tour et  donjon de la résidence, remanié et  protégé par une enceinte encore bien visible.                                  Plantier; château quadrangulaire à trois niveaux flanqué de deux grosses tours carrées en façade.                      Brénieu; corps de logis rectangulaire a trois étages, de construction moderne,  reconstruit sur l'emplacement d'un ancien château.","habitants":"Famille du comte de Tournon\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_St_Romain_d_Ay_1.jpg","../../jctruffet.com/image/image_07/07_St_Romain_d_Ay_2.jpg","../../jctruffet.com/image/image_07/07_St_Romain_d_Ay_3.jpg","../../jctruffet.com/image/image_07/07_St_Romain_d_Ay_4.jpg"]},"Consult_chateau_formulaire5a71":{"id":"Consult_chateau_formulaire5a71","dept":"07","canton":"St-Péray","commune":"St-Sylvestre","nom":"St_Sylvestre","type":"Manoir","periode":"XVIII","histoire":"Saint-Sylvestre: appartenait au XVe siècle  aux seigneurs de Crussol, puis à Alexis de Faure,  marquis de Saint-Sylvestre, Louis de Faure seigneur de Saint-Sylvestre, marquis de Satillieu chevalier commandeur de l'ordre de Saint-Louis gouverneur de la ville de Briançon, Louis de Faure de Saint-Sylvestre , lieutenant des armées du roi, idem comme le précédent et passa les pouvoirs en 1698 à son neveu Alexis de Faure de Satillieu. En 1770 vendu à Jean Boutaud.","architecture":"Remanié, la façade du château ressemble à un manoir du XVIIIe siècle la partie arrière plus ancienne.","habitants":"Seigneur de Crussol\r\n        \"","divers":"Manoir de St-Sylvestre","gps":"","images":["../../jctruffet.com/image/image_07/07_St_Sylvestre_1.jpg"]},"Consult_chateau_formulaire1d30-3":{"id":"Consult_chateau_formulaire1d30-3","dept":"07","canton":"Viviers","commune":"St-Thomés","nom":"St_Thomes","type":"Château","periode":"XVI","histoire":"Saint-Thomés: le château remonte au XIIIe siècle était au départ partagé par plusieurs co-seigneurs, et a partir de 1475 par alliance d'Antoine de Lauberge et de Louise de Mortagues, le château n'a q'un seul seigneur, en 1499  échoit à Aymar de Vesc, seigneur du Teil, et cela jusqu'au mariage de Françoise de Vesc avec Guillaume d'Hautefort de Lestrange en 1648. \r\nLes de Vesc ayant soutenu le duc d'Orléans dans sa révolte contre le roi en 1632, le château est démantelé, en 1635, remit en état par le seigneur d'Hautefort. \r\nUn nouveau seigneur, par alliance Christian de la Garde de Chambonnas,  puis vendu en 1660-1777 aux Mercoyrol de Beaulieu, qui en sont toujours propriétaire.                     Chatelas Saint-Thomés: Il est désigné comme maison claustrale en 1615 et aurait abrité le percepteur du chapitre de Viviers, co-seigneur de Saint-Thomés.","architecture":"St-Thomés; corps de logis quadrangulaire  dont la façade Est flanquée de deux tours rondes arasées.                         Chastellas; Vestiges du château dont il reste un bâtiment,  extrêmement remanié au cours des siècles.","habitants":"Famille  de  Vesc                        famille Christian de Lagarde            famille de Mercoyrol de Beaulieu\r\n        \"","divers":"Château de Saint-Thomés et le Chatellas","gps":"","images":["../../jctruffet.com/image/image_07/07_St_Thomes_1.jpg","../../jctruffet.com/image/image_07/07_St_Thomes_2.jpg","../../jctruffet.com/image/image_07/07_St_Thomes_3.jpg","../../jctruffet.com/image/image_07/07_St_Thomes_4.jpg"]},"Consult_chateau_formulaireb4f1":{"id":"Consult_chateau_formulaireb4f1","dept":"07","canton":"St-Félicien","commune":"St-Victor","nom":"St_Victor","type":"Maison forte","periode":"XVI","histoire":"Chirols:
