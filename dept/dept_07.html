dauphin Humbert en rend hommage à Philippe le Bel et en 1296 Allix fille d'Humbert qui épousa Jean  du Forez,  la châtellenie royale de Rochebloine et de Pailharez fut une enclave du Forez en Vivarais.  Les Beaudiner furent châtelains en 1338, puis passa par alliance aux Géranton de Sahune  et en 1450 Jean-Baptiste Henry, capitaine du roi, capitaine châtelain de Rochebloine et Pailharez , qui est toujours dans cette famille en 1600 par leur fils Claude Henrys, sieur de Varagnes qui épousa en 1632 Louise de Lestranges, et sur ordre du duc de Nemours les revenus de la  châtellenie de Rochebloine et Pailharez furent transmisent au seigneur Jean de Romanet, marquis de Lestrange.                   En 1772 à noble Jean-François de Reboulet d'Archenesche, baron de Rochebloine et Pailharez mais habitait au château du Besset  à Saint-Romain de Lerps.","architecture":"Bel Air; Corps de logis de forme carré flanqué sur une partie de tours rondes , et dépendances                       Rochebloine; En ruines depuis le XVIe siècle, il ne reste plus que les vestiges d'une seule tour .              Il y aurait un souterrain reliant Rochebloine et le château de Bel-Air. à tours rondes.","habitants":"Famille de Meyres, de Gaillard et de Rioufol\r\n        \"","divers":"Maison forte de Bel-Air et vestiges du château de Rochebloine.","gps":"","images":["../../jctruffet.com/image/image_07/07_Bel_Air_1.jpg","../../jctruffet.com/image/image_07/07_Bel_Air_2.jpg","../../jctruffet.com/image/image_07/07_Bel_Air_3.jpg","../../jctruffet.com/image/image_07/07_Bel_Air_4.jpg"]},"Consult_chateau_formulaire2ed0":{"id":"Consult_chateau_formulaire2ed0","dept":"07","canton":"Bourg-St-Andéol","commune":"Bourg-St-Andéol","nom":"Palais_Eveques","type":"Palais","periode":"XVI","histoire":"Palais des évêques:  Bourg-St-Andéol entre dans la possession des évêques au IXe siècle, le palais des évêques est fondé sur le rocher Saint-Michel, site de l'ancien castrum dépendant des sires de Mondragon,  devient la résidence privée des évêques de Viviers, seigneurs dominants de Bourg-Saint-Andéol, dés le milieu du XIIIe siècle. Au début du XVIe siècle le premier  évêque seigneur Claude de Tournon, prince de Donzère, remanie le palais en style renaissance. Ce dernier décéda en 1542 à Donzére; ses successeurs Charles de Tournon 1542 à 1550: Simon de Maillé-Brézé 1552 à 1554: Jacques Marie Sala de 1554 à 1560:  Alexandre Farnèse ( Cardinal) de 1560 à 1565:  Eucher de San-Utali de 1565 à 1571:  Pierre d'Uré de 1571 à 1572: Louis François de la  Baume de Suze, évêque de Viviers à l'âge de 17 Ans, l'enrichit de décors somptueux de 1621 à 1690 . Charles Antoine de la Garde de Chambonas de 1690 à 1713. Martin de Ratabon de 1713 à 1723. Etienne de Joseph de la Fare Montclar 1723. François Renaud de Villeneuve Forcalqueret de 1723 à 1748. A la Révolution en 1794 l'ancien séminaire servit de local municipal racheté en 1826 par l'évêque de Viviers. Le palais abrite une école séminariste jusqu'en 1852 puis racheté en 1854 par les religieuses de la présentation de Marie pour y installer une école privée et depuis l'an 2000 acquit par Jacques Lextreyt pour le transformer en habitations.","architecture":"Corps de logis rectangulaire de trois étages sur une assise, flanqué de deux pavillons en saillit dont un modernisé  aux extrémités, façade ornée d'encorbellements et de gargouilles.","habitants":"Claude de Tournon (évêque)\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Palais_Eveques_1.jpg","../../jctruffet.com/image/image_07/07_Palais_Eveques_2.jpg","../../jctruffet.com/image/image_07/07_Palais_Eveques_3.jpg"]},"Consult_chateau_formulaireb782":{"id":"Consult_chateau_formulaireb782","dept":"07","canton":"Rochemaure","commune":"St-Martin-l`Inferieur","nom":"Pampelone-Perrier","type":"Château","periode":"XIII","histoire":"Pampelone: ce fief appartenait à un Jean de Pampelonne au XIe siècle, puis passa aux comtes de Toulouse, passa à Aymard de Poitiers comtes de Valentinois, qui le donna à Astorgs de Geis par alliance à la famille de Guyon qui le possédèrent jusqu'en 1540, passa dans la famille des Guyon seigneur de Pampelone et du Barry qui le gardèrent jusqu'à la Révolution et au de-là. En 1789, les Pampelone, dont une partie de la famille se réfugia dans leur ferme de Monoprat et y était encore en 1796, Marie-Victoire de Pampelone et son mari Jean-Jacques-Gabriel Vibaud de la Tour et leurs enfants et Antoine Guyon de L'Arzelier.                           A Pampelone restait la veuve de Jacques-Joseph de Pampelone mort en 1789, restée avec ses deux enfants en bas âge (5 et 10 ans). Puis par alliance passa aux de Guyon dont l'aîné des fils, le baron Joseph de Guyon de Geys de Pampelone ancien conseiller général du canton de Rochemaure, meurt en 1875. Sa fille Stéphanie qui a épousé, en 1873 le comte Gabriel de Grille d'Estoublon hérite du château. Ce dernier toujours dans la lignée des Pampelone.                   Le château Perrier résidence d'été des Pampelonne.","architecture":"Pampelonne; le château fut épargné en reconnaissance de la fidélité au roi des seigneurs de Pampelonne mais subit des dégâts au début des guerres de religion, incendié par les Huguenots, la partie incendié n'a jamais était reconstruite, réparé et épargné par Richelieu  en 1629,  les tours d'angles crénelées à cette époque dépassaient largement la toiture,  elles furent démolies et ramenées à la hauteur du toit sous la Révolution, malgré tout il reste une  masse imposante sur la vallée du Lavezon.","habitants":"Famille d'Astorg de Geis  \r\nfamille d'Edmond de Guyon  \r\nFamille d'Henri de Pampelonne\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Pampelone_1.jpg","../../jctruffet.com/image/image_07/07_Pampelone_2.jpg"]},"Consult_chateau_formulaireafae":{"id":"Consult_chateau_formulaireafae","dept":"07","canton":"Serrières","commune":"Peaugres","nom":"Peaugres","type":"Maison forte","periode":"XV","histoire":"PEAUGRES; Etait un ancien fief des seigneurs d'Annonay qui se retranchèrent ensuite au pouvoir des prieurs des Célestins.                              Dans la commune de Peaugres: MONTANET: Construit en 1910 par la famille Ribes, inachevé il le revendit après la guerre de 14-18, à Louis Périlhou qui le revendit en 1973 au comte de la Panouse. Ce dernier en fit un centre animalier appelé aujourd'hui le safari de Peaugres.                                MURES; Jean de Vauzelles vend en 1480 à monsieur Baronnat qui restera dans leur famille jusqu'en 1626, les Annonay le récupérèrent et la vendirent aux Fraix de Fignon. En 1898 la famille de la Fayolle de Mars en prit possession.                                                                                MACLAN: Cette seigneurie fut acheté par Claude de Villars en 1632 à Gabriel de Fay. Claude était seigneur également d'Oriol et de Sarras et Révirand en 1650  François-Marie Delabaud de Bérard  Baron de Maclas, même famille de la seigneurie du Griottier.","architecture":"Maclan; corps de logis en équerre à deux niveaux  de style renaissance avec un quart de  tour d'escalier dans l'angle. Montanet; construit au XXe siècle;  manoir de style plaisance à deux étages, tour carrée et hexagonale à toits pointus.                              Mures; corps de logis rectangulaire à deux étages flanqué de deux ailes.","habitants":"Famille Baron de Maclas\r\n        \"","divers":"Manoir de Maclan, de Montanet, de Mures et de la Solitude.","gps":"","images":["../../jctruffet.com/image/image_07/07_Maclan_1.jpg","../../jctruffet.com/image/image_07/07_Maclan_2.jpg","../../jctruffet.com/image/image_07/07_Maclan_3.jpg","../../jctruffet.com/image/image_07/07_Maclan_4.jpg","../../jctruffet.com/image/image_07/07_Maclan_5.jpg"]},"Consult_chateau_formulaire6971":{"id":"Consult_chateau_formulaire6971","dept":"07","canton":"Serrières","commune":"Peyraud","nom":"Peyraud","type":"Château","periode":"XIII","histoire":"Peyraud était un château fort du Xe siècle, appartenait à la famille du Colombier, avait comme mission péage sur le Rhône, il fut rasé en 1350 sur ordre de Jean le Bon, vendu  à la famille de Fay;  Guillaume de Fay bailli du Forez, le fit reconstruire  et fut détruit à nouveau sous Charles IV le 3 mai 1574, lors des guerres de religion.\r\nIl fut reconstruit en 1710 par la marquise de Saint-Priest (descendante des Fay) en demeure de plaisance.\r\nCette famille Fay-Peyraud fut très importante et possédait d'énormes biens dans la province du Languedoc, cette famille s'est éteinte au milieu du XVIIIe siècle en la personne de Marie Jeanne de Fay, marquise de Peyraud, marié, en 1716, à Messire Denis-Emmanuel de Guignard, vicomte de Saint-Priest.\r\nIl eut divers propriétaires, au XVIe siècle les de Montchal, puis aux St-Priest, aux de Fay et ensuite à Pierre Crottier de Chambonnas, passa ensuite aux de Barjac par le mariage de Louise-Charlotte née en 1812, avec monsieur de Barjac. \r\nAcheté en 1918 par monsieur Steinbach-Rattier.","architecture":"Reconstruit au XVIIIe siècle sur le même site de style plaisance sur une terrasse au-dessus du Rhône  en forme de U côté entrée  à trois étages, toiture peu inclinée, côté parc tour ronde saillante sur la partie centrale..","habitants":"Famille de Peyraud  \r\nFamille de François de Fay \r\nfamille de Monsieur de Barjac\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Peyraud_1.jpg","../../jctruffet.com/image/image_07/07_Peyraud_2.jpg","../../jctruffet.com/image/image_07/07_Peyraud_3.jpg"]},"Consult_chateau_formulairee044":{"id":"Consult_chateau_formulairee044","dept":"07","canton":"La Voulte-sur-Rhône","commune":"Gilhac et Bruzac","nom":"Pierregourde","type":"Vestiges","periode":"XIII","histoire":"Pierregourde: l'existence de Pierregourde est du début du XIIIe siècle dont les seigneurs détenaient cette terre des seigneurs de la Voulte, puis passa aux Poitiers par alliance de  Philippa de Fay dame de la Voulte et femme d'Aymar de Poitiers, comte de valentinois. \r\nLouis de Marette, seigneur de Pierregourde décéda aux conflits des Huguenots en 1569. La famille de Pierregourde prit parti pour la réforme, et Claudine de Pierregourde, héritière du nom et de la terre, épousa en 1572 le capitaine protestant François de Barjac. \r\nLe château fut détruit par ordre de Richelieu en 1630, afin d'éviter qu'il ne devînt pour les protestants un refuge commode. Les seigneurs de Pierregourde s'éteignirent dans les Maugiron, maréchal de camp des armées du roi. \r\nAu XVIIIe siècle il y avait une petite communauté de paysans, à la Révolution fut rattaché à Gilhac et Bruzac.","architecture":"vestiges,  ruines importantes, pans de murs du donjon et divers bâtiments.","habitants":"Famille de Claudine de Pierregourde \r\nfamille de François de Barjac\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Pierregourde_1.jpg","../../jctruffet.com/image/image_07/07_Pierregourde_2.jpg","../../jctruffet.com/image/image_07/07_Pierregourde_3.jpg"]},"Consult_chateau_formulairefee7":{"id":"Consult_chateau_formulairefee7","dept":"07","canton":"Annonay","commune":"Davézieux","nom":"Pin_Davezieux","type":"Manoir","periode":"XIX","histoire":"PIN à Davézieux: en 1790 le territoire des Pin appartint à Joseph de Montgolfier, en 1832 vendu à son gendre Alexandre-Nicolas de Roux, sa petite fille Alexandrine-Anne épouse Etienne Barou de la Lombardière de Canson. \r\nLa propriété passe dans les mains de Laurent de Montgolfier qui a sa mort en 1883, sa fille Blanche hérite, cette dernière a épousé Adolphe Mignot en 1876, en 1904, Marie Mignot ( fille de Blanche et d'Adolphe) a épousé Jean Frachon (1879-1949), elle hérite de la propriété où naissent ses cinq enfants dont Xavier 1907-1996 qui à la mort de ses parents deviendra propriétaire, et Joseph (1919-1992) qui rejoindra les compagnons de la chanson.                                  PUY-Davezieux: Claude du Puy qui avait obtenu son titre de noblesse en 1755, secrétaire du roi, propriétaire des Béchetoille, propriété  racheté aux Chomel de Varagnes, que ces derniers possédaient depuis 1700 et en 1754 en fit  don à Jean-François Régis et en 1780, ce dernier le cède à son père Camille Toussant Chomel, en 1800 Camille  l'échange avec André Béchetoille contre les trois quart  du domaine de Béchetoille en Saône et Loire. André Béchetoille 1757-1822 famille de négociants à Annonay, jusqu'en 1918 ou le domaine passa à son neveu Françis ce dernier avait épousé Thérése Seguin. Le Puy a été acheté par André Franc 1885-1955 dont la fille épousa Marc Béchetoille fils de Francis.            Ste-EMILIE: en 1790, propriété de  Jacques  de la Lombardière de Canson et d'Etienne de Montgolfier,  en  1846 à  Louis Ayme fils du baron de Lamberthy  qui épousa Jeanne Sophie de Canson.     En 1817 Henri-Daniel d'Ayme dépose avec son cousin Pierre  François Montgolfier le brevet de l'invention du bateau à vapeur. Son fils Alexandre-Dorothée-Maurice, député en 1839, vend la propriété qui  s'appelé Chabetout à l'époque à son cousin Louis de Canson  ce dernier y habitera avec Gabrielle de la Majorie de Soursac en 1847,  et à la mort de son père en 1859 achète le château des Célestins, et vend son domaine à Léon Rostaing.  En 1848 Louis de Canson, maire de Davézieux  jusqu'en 1879. Léon de Rostaing qui épousa Emilie de Montgolfier en 1865 prendra la direction des usines de papeteries Vidalon et sera président du tribunal de commerce d'Annonay.       En 1980 la propriété est morcelée pour diverses constructions.","architecture":"PIN;  Maison de maître à deux étages de forme rectangulaire toiture à la Mansard.                                 PUY: Bâtiment de construction moderne.   Ste-Emilie: Bâtisse imposante rectangulaire à trois étages avec toits à la Mansard pavillon inférieur saillant côté parc.","habitants":"Famille de Joseph de Montgolfier  \r\nfamille de Monsieur Jean Frachon\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Pin_Davezieux_1.jpg","../../jctruffet.com/image/image_07/07_Pin_Davezieux_2.jpg","../../jctruffet.com/image/image_07/07_Pin_Davezieux_3.jpg","../../jctruffet.com/image/image_07/07_Pin_Davezieux_4.jpg"]},"Consult_chateau_formulairefb5b":{"id":"Consult_chateau_formulairefb5b","dept":"07","canton":"Thueyts","commune":"Fabras","nom":"Pin_Fabras","type":"Manoir","periode":"XVI","histoire":"Les Chanaleilles, dont le blason D'or, à trois lévriers de sable,colletés d'argent courant l'un sur l'autre)figure sur une des portes du château,y demeurent jusqu'au début du XVIIIe siècle. La demeure est ensuite vendue aux Gardon de Boulogne, puis à l'abbé Labro, curé du village de Fabras. À la Révolution, l'abbé Labro prête serment à la République puis devient Consul du village. Il sera assassiné dans son château en 1802. Le château et ses terres sont alors partagés lors d'une vente, avant d'être réunifiés au début du XXe siècle par la famille Boissin. Devenu une ferme, le domaine est racheté en 1957 par la peintre Colette Bonzo (1917-1967) et son mari le Docteur Elie Bontzolakis.","architecture":"Des structures initiales du XIIe siècle, sont seulement visibles au début du XVIIIe siècle une petite tour de garde, ainsi que les fondations de salles en rez-de-chaussée. En 1591, durant les Guerres de Religion, l'édifice, bâti sur trois niveaux, est flanqué de quatre tours et surmonté en son centre par une autre tour. Un pigeonnier et de vastes écuries ferment la basse-cour. Depuis le XVIIIe siècle, ne subsistent que trois tours, le pigeonnier et les écuries furent a contrario partiellement détruites, la tour centrale fut englobée dans le corps de bâtiment. La façade sud est ornée de deux belles portes, l'une, en accolade (XVe siècle), surmontée des blasons des Chanaleilles et des Montlaur, ouvre sur les anciennes cuisines (1591-1592),voûte en berceau et vaste cheminée à voussure ;\r\nl'autre, d'époque Renaissance, avec piliers et fronton brisé repris du goût de l'antique, ouvre sur une tour avec escalier à vis desservant le rez-de-chaussée et les deux étages.","habitants":"Famille de Chanalaies  \r\nfamille de Colette de Monjeau\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Pin_Fabras_1.jpg","../../jctruffet.com/image/image_07/07_Pin_Fabras_2.jpg","../../jctruffet.com/image/image_07/07_Pin_Fabras_3.jpg"]},"Consult_chateau_formulaire3262":{"id":"Consult_chateau_formulaire3262","dept":"07","canton":"Tournon","commune":"Plats","nom":"Plats-Suzeux","type":"Gentilhommière","periode":"XVI","histoire":"PLATS; depuis 1170 à Odon Ier, seigneur de Tournon  resta dans le fief jusqu'au XVIIIe siècle  que ces derniers  n'habitèrent pas les lieux, puis fut vendu aux Rohant-Soubise, passa ensuite aux de Monteil, le château fut détruit en 1600 il ne reste qu'une tour.   SUZEUX: Cette branche fut crée  au XVe siècle par Guillaume de Robiac, Bernard  de Robiac de Suzeux  seigneur du lieu, châtelain de la ville de Tournon; mort en 1622  il avait épousé en 1566  Galberte de Robiac  héritière et faisait partie de l'autre branche de cette maison dont ils  eurent cinq enfants. Jacques de Robiac de Suzeux seigneur  de Suzeux à sa mort en 1660 nomme sa fille Jeanne de Robiac de Suzeux héritière, marié à Jacques de l'Espinasse sieur de Landéal, puis toujours par alliance passa au Tardivon aux de Raymond et aux de Chazotte. Le château passa ensuite à la famille Maisonnasse, puis à monsieur de Glo de Besses, et aujourd'hui à la famille Kipgen.","architecture":"Plats; il ne reste qu'une tour ronde du château détruit en 1600.              Suzeux; bâtiment  renaissance accolé à des parties qui semblent plus anciennes et de deux tours, une ronde et une carrée.","habitants":"famille de Bernard de Robiac\r\n        \"","divers":"Tours de Plats  et gentilhommière de Suzeux","gps":"","images":["../../jctruffet.com/image/image_07/07_Suzeux_1.jpg","../../jctruffet.com/image/image_07/07_Suzeux_2.jpg"]},"Consult_chateau_formulaire2881":{"id":"Consult_chateau_formulaire2881","dept":"07","canton":"Privas","commune":"Privas","nom":"Privas-Vaneilles","type":"Vestiges","periode":"XV","histoire":"Privas était au féodal la propriété des comtes de Toulouse, et passa aux comtes de Poitiers Valentinois dont Diane qui en hérita de son frère Guillaume en 1548 y laissa des traces  et sa fille aînée qui épousa Robert de Lamarck obtient la seigneurie de Privas et la revendit au chef protestant Jacques de Chambaud, premier seigneur de la ville qui la passa à son gendre René de la Tour- Gouvernet suzerain calviniste de Privas.           Pendant les guerres de religion Privas joua un grand rôle et fut un rempart de la réforme, elle fut concédée par Henri IV aux protestants en 1598   (édit de Nantes).  Le mariage de Paule de Chambaud  fille du chef huguenot Jacques de Chambaud et  veuve du seigneur de Privas  le baron de la Tour Gouvernet,  épouse Claude de Hautefort  de Lestrange seigneur de Boulogne, chef des catholiques, ceci ranima en 1629  les querelles religieuses, un siège fut établit par Louis XIII et Richelieu commandant André de Montbrun et le duc de Montmorency avec 20000 hommes afin de détruire le château, les remparts et le fort du petit Tournon et les habitants furent massacrés. Le château ne fut pas reconstruit rasé en 1650 et après la révocation de l'édit de Nantes beaucoup  de  paysans abjurèrent et d'autres partirent en exil.                       Dans la commune voisine  de Coux beaucoup de gens s'exilèrent dans les grottes fortifiées de la Jobernie dont il reste quelques traces.                           VANEILLES: à Alissas; David de Bénéfice de Cheylus, sieur de Vaneilles  en 1600, fils d'Alexandre  et de Claudine de Forbin, qui épousa Sarah de Combes, fille de Pierre Combes écuyer,  leur fils Alexandre épousa en 1646 Gilberte Conches et leur fils René-François seigneur de Vaneilles épousa en 1691 Olympe de Vesc fille de noble Mary de Vesc seigneur de Bimar et de Loriol,  de cette union naquit René-Alexandre de Bénéfice seigneur de Vaneilles dont cette famille possédait plusieurs seigneuries qui furent vendues à divers personnages nobles, Jean de la Chava et à François de Mercure de Rochessauve et en 1782  Jean Guerrin les racheta, et en 1786 racheta également la baronnie de Privas  et de Boulogne qui appartenait à messire Marie-Charles-César de Fay, Marquis de la Tour-Maubourg. Jean Antoine de Vaneilles fils de Jean Guerrin était à la fin du XVIIIe siècle,  procureur fondé de Charles-César de Fay; marquis de la Tour-Maubourg, baron de Privas et de Boulogne.","architecture":"Privas: du château  il ne reste plus rien, il a été reconstruit une chapelle du couvent Saint-Charles des Récollets en 1665. Le fort appelé le petit Tournon sur la motte fortifié est transformé en palais seigneurial fut détruit en 1630 et rasé en 1650 il ne fut  pas reconstruit, il ne reste que la porte de Diane de Poitiers  de l'époque ( tour d'escalier). La Jobernie quelques traces de murs avec bretèche à l'entré des grottes troglodytes.                              Vaneilles; de ce château de Vaneilles il reste d'apparent qu'une tour ronde qui était reliée il y a peu de temps encore a un corps de logis rectangulaire à trois étages.","habitants":"Diane de Poitiers Jacques de Chambaud    René de la Tour Gouvernet\r\n        \r\n        \"","divers":"Tour de Diane de Poitiers et grottes de la Joberny et tour de Vaneilles à Alissas","gps":"","images":["../../jctruffet.com/image/image_07/07_Privas_1.jpg","../../jctruffet.com/image/image_07/07_Privas_2.jpg","../../jctruffet.com/image/image_07/07_Privas_3.jpg","../../jctruffet.com/image/image_07/07_Privas_4.jpg","../../jctruffet.com/image/image_07/07_Privas_5.jpg","../../jctruffet.com/image/image_07/07_Privas_6.jpg","../../jctruffet.com/image/image_07/07_Privas_7.jpg"]},"Consult_chateau_formulaire04bb":{"id":"Consult_chateau_formulaire04bb","dept":"07","canton":"Annonay","commune":"Vernosc","nom":"Pugnee Pigneu","type":"Maison forte","periode":"XVI","histoire":"Pugnée-Pigneu:  la famille de Boiron (Boyronys) possédait au XVIe siècle la terre de Pigneu que Marguerite Boyron porta par alliance le domaine à Jacques Le More seigneur de Lothoire et conseiller au présidial de Valence en 1635,  en 1700 passa par alliance à Barthélémy Léore seigneur de Pignieu bailli d'Annonay puis à Jean Jacques Barthélémy le More de Pignieu seigneur de la Clotte chevalier et bailli d'Annonay et la famille garda le domaine jusqu'en 1825.","architecture":"Maison forte flanquée de deux tours rondes corps de logis rectangulaire, transformé aujourd'hui en exploitation agricole.","habitants":"Famille de More de l'Hotoire\r\n        \"","divers":"Maison forte de Pugnée","gps":"","images":["../../jctruffet.com/image/image_07/07_Pugnee_Pigneu_1.jpg","../../jctruffet.com/image/image_07/07_Pugnee_Pigneu_2.jpg"]},"Consult_chateau_formulaire2ec8":{"id":"Consult_chateau_formulaire2ec8","dept":"07","canton":"Satillieu","commune":"Quintenas","nom":"Quintenas","type":"Maison forte","periode":"XV- XVI","histoire":"Quintenas: beau manoir dan le village. En 1520 Pons des Champs, lieutenant de la juridiction d'Ay, châtelain de Quintenas. La seigneurie appartenait en 1550 à François de Salles Baron de Valissieux. Pierre Boyronis greffier et notaire fut châtelain de Quintenas juge de d'Ay, Seray et Mahun.  Le fils d'Antoine Piquet (administrateur hospitalier d'Annonay) Jacques, juge du marquisat d'Annonay  était châtelain à Quintenas en 1600, ce dernier avait épousé Marie Bollioud.  Charles-Joseph-Dominique sieur de L'Hotoire mourut au château de Quintenas en 1724 et la seigneurie d'Ay à Saint-Romain d'Ay de Quintenas et Saint-Alban d'Ay  passa à Alexis de Faure marquis de Satillieu qu'il  revendit à Alexandre de Chave de la Chavas et à Barthélémy Fournat de Matre.                                     Dans la commune le château de BREZENAUD: Cité en 1003 par la famille d'Albert d'Ay, les Beaudiné, les Roussillon, aux Bressieu, aux Tournon, aux Bastide. Gilbert de Bothéon seigneur de Brézenaud épousa en 1460 Marige de Fay-Gerlande eurent deux enfants Jacques qui mourut sans postérité et Claudine qui épousa en 1513 François du Peloux seigneur de Gourdan, puis par alliance aux Sagnard, aux du Faure et vendu à Alexandre de Chaves et à Barthélémy-Fournat de Matré le 23 juillet 1753, ce dernier mourut en 1774 ( le plus riche propriétaire du Vivarais ) ce fut son neveu Jean Fournat qui hérita, après tout ses changements le château restera dans cette famille jusqu'au XIXe siècle.                   Monsieur Fournat de Brézenaud fut inspecteur général de l'agriculture , chevalier de la légion d'Honneur. \r\nAcquis par la famille Ribes qui le possède toujours.  \r\nAu château de PEYRON en 1447 la première famille portait son nom , en 1639 Imbert de Batonnat, écuyer seigneur du Peyron qui modifièrent leur nom en Baronnat et cette famille garda le domaine jusqu'en 1680. Puis par alliance passa en 1830 aux de Goys et  à  Jean Goys possédait le domaine, ce dernier était marié à Louise de  Bozas.                             L'HOTOIRE: En 1464 un Gouyn, paysan se disait noble locataire des terres d'un prieuré, quelques années après Charles Goyn et  Jean Goyn de L'Hotoire sont propriétaires des lieux, cette famille s'éteignit en 1597 par la personne de Justine Goyn. \r\nEn 1623 l'Hotoire appartenait aux le More, Jean de L'Hotoire de Quintenas fut condamné par défaut de titre de noblesse reprit par Jacques le More en 1730 passa à la famille De Dienne, puis au XIXe siècle  à la famille de Lacheysserie, ensuite en 1920  divisé et c'est en 1969 que monsieur Malartre parvient a racheter l'ensemble. \r\nC'est dans ces lieux que fut signé le traité de l'Hotoire en 1573.","architecture":"Quintenas: aujourd'hui il ne reste plus rien du château féodal qui fut brûlé en 1574 au grand déplaisir de la comtesse de Tournon, qui pendant l'été faisait ses délices de cette magnifique demeure. il y a dans ce village un manoir dans lequel certains seigneurs y vécurent.    Peyron : Dans ce domaine grosse bâtisse de forme rectangulaire à trois étages  transformé en exploitation agricole et habitation qui fût peut-être la suite du château.                          Brézenaud; bâtiment quadrangulaire à trois étages, flanqué de dépendances  presque égale au corps de logis, qui forme un grand ensemble transformé en exploitation agricole.                L'Hotoire souffrit des guerres civiles, ensemble de corps de logis flanqué de tours carrées et hexagonales renfermant l'escalier.","habitants":"Peyron: Famille Jean Ier Goys     Quintenas: Famille de Pierre Boyronis\r\n        \"","divers":"Manoir de Quintenas\r\nChâteau du Peyron.                                                                        Maison forte de Brézenaud et de l'Hotoire","gps":"","images":["../../jctruffet.com/image/image_07/07_Quintenas_1.jpg","../../jctruffet.com/image/image_07/07_Quintenas_2.jpg","../../jctruffet.com/image/image_07/07_Quintenas_3.jpg","../../jctruffet.com/image/image_07/07_Quintenas_4.jpg","../../jctruffet.com/image/image_07/07_Quintenas_5.jpg","../../jctruffet.com/image/image_07/07_Quintenas_6.jpg"]},"Consult_chateau_formulairecd4a-2":{"id":"Consult_chateau_formulairecd4a-2","dept":"07","canton":"Lamastre","commune":"Lamastre","nom":"Retourtour","type":"Vestiges","periode":"XI","histoire":"Retourtour:  au XIe siècle Pierre de Retortorio, au XIIe siècle, Hugues de Retourtour vend à Estienne Isnel. \r\nEn 1247 partage effectué par Armand de Retourtour des terres et seigneurie entre ses deux fils Maurice et Briand. \r\nFin XIII e siècle Odéon et Armand de Retourtour reconnaissent tenir du fief d'Odéon, seigneur de Tournon et hommage rendu à Aymar de Poitiers, comte de Valentinois. \r\nEn 1327 Raymbaude de Mahun, femme d'Odon seigneur de Beauchastel et tutrice de ses enfants rend hommage à Guillaume seigneur de Tournon. \r\nEn 1456 Jacques Rouveyrance, de Macheville, vend à Pierre Monier de Retourtour qui le garda à travers sa descendance jusqu'en 1545 qui passa à Etienne de Challan conseiller du roi, puis passa en 1600 à Anne des Prés puis à son frère François, mit pour héritier Henri de la Salle. La baronnie de Retourtour est vendue en 1618 à messire François de Chanaleilles sieur du Vergier, en épousant sa cousine Geneviève de Chanaleilles, François Christophe de Meyres propriétaire de Desaignes va devenir baron de Retourtour.\r\nLe château fut détruit en partie par les guerres de religion en 1662.\r\nAujourd'hui la commune en est proprétaire.","architecture":"Il ne reste que des ruines du château féodal qui avait trois tours, un fossé avait été creusé pour assurer sa défense au Sud et un chemin de ronde dont on voit encore quelques corbeaux, date de la fin du Moyen-Age,  mais le donjon date du XIIIe siècle.","habitants":"famille d'Armand de Retourtour\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Retourtour_1.jpg","../../jctruffet.com/image/image_07/07_Retourtour_2.jpg"]},"Consult_chateau_formulaire4e52-2":{"id":"Consult_chateau_formulaire4e52-2","dept":"07","canton":"St-Martin-de-Valamas","commune":"St-Martin-de-Valamas","nom":"Rochebonne","type":"Vestiges","periode":"XI","histoire":"ROCHEBONNE. vers l'an mille une co-seigneurie fit construire le donjon du XIe siècle pour surveiller la vallée et une partie basse du XIIIe siècle pour une résidence seigneuriale jusqu'en 1560. Le premier seigneur connu était Pons de Brion, puis au XIIe siècle à Guillaume de Châteauneuf et Gératon de Lamastre, au XIVe siècle le seigneur de Rochebonne était Charles François de Châteauneuf. \r\nLe château joua un rôle militaire important au cours des guerres de religion, ce dernier fut pris par le chef protestant Lacroix en 1577, puis fut pillé et détruit en 1595 de nouveau par les Huguenots. Alors que le cite est en ruine, en 1725 Louis-Joseph de Châteauneuf, comte et chanoine de Saint-Jean de Lyon hérita, et en 1743,  Rochebonne est vendu à Jean-Henri Blanc de Molines qui fit des travaux mais la bâtisse fut anéantis quelques années plus tard par la foudre.\r\nLa famille Garnier de Labaryre hérite en 1957. Aujourd'hui une association tente de maintenir le reste.","architecture":"Rochebonne:  construit vers l'an mille par une co-seigneurie pour surveiller la vallée il était composé d'un donjon au XIe siècle et une partie basse du XIIIe siècle pour une résidence seigneuriale de quelques dépendances entourées d'une enceinte, aujourd'hui seul subsiste ce donjon et à ses pieds les ruines du château et des murs d'enceinte que les amis de Rochebonne essaient de sauver.","habitants":"Famille de Pons de Brion  \r\nfamille de Charles François de Châteauneuf\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Rochebonne_1.jpg","../../jctruffet.com/image/image_07/07_Rochebonne_2.jpg","../../jctruffet.com/image/image_07/07_Rochebonne_3.jpg"]},"Consult_chateau_formulaireb8cc":{"id":"Consult_chateau_formulaireb8cc","dept":"07","canton":"Villeneuve-de-Berg","commune":"Rochecolombe","nom":"Rochecolombe_Villeneuve","type":"Vestiges","periode":"X","histoire":"Rochecolombe-Villeneuve: en 1169 Calburge et son fils Hugues d'Ucel rendent hommage à Raymond V comte de Toulouse pour le castre d'Ucel et de Rochecolombe avec toutes les fortifications. \r\nEn 1234 Aldebert de Voguë et co-seigneur  de Rochecolombe et  propriétaire. \r\nEn 1252 Arnaud de Voguë seigneur de Rochecolombe achète tous les biens en 1265, fait une donation à Jean de Pousols du Devés de Fabregoules, en 1311 reconnaissance des habitants de Rochecolombe en faveur du noble Voguë. En 1552 à la mort de Jean de Voguë son fils Guillaume en 1602 précédé de douze générations de chevaliers qui ferait remonter au XIIIe siècle à l'origine de la famille, Baltazar le petit fils de Guillaume  fut même chevalier de l'ordre de Saint-Jean-de-Jérusalem.","architecture":"L'élément le plus ancien du château de Rochecolombe était un petit donjon hexagonal. \r\nAujourd'hui quelques vestiges du château, mais importants  vestiges au niveau du village pittoresque fortifié.","habitants":"famille Hugues d'Ucel  \r\nFamille de Voguë\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Rochecolombe_Villeneuve_1.jpg","../../jctruffet.com/image/image_07/07_Rochecolombe_Villeneuve_2.jpg","../../jctruffet.com/image/image_07/07_Rochecolombe_Villeneuve_3.jpg","../../jctruffet.com/image/image_07/07_Rochecolombe_Villeneuve_4.jpg"]},"Consult_chateau_formulaire5f9c":{"id":"Consult_chateau_formulaire5f9c","dept":"07","canton":"Rochemaure","commune":"Rochemaure","nom":"Rochemaure","type":"Vestiges","periode":"XII","histoire":"Rochemaure: la forteresse bâti au XIIe siècle par François Lambert Adhémar de Monteil, dépendant des seigneurs de la Voulte  et Aymon Adhémar de Monteil construisit le donjon en 1150 pour combattre la croisade des Albigeois,  passa à la famille d'Anduze au XVe siècle, Louis d'Anduze seigneur de la Voulte agrandit et renforce Rochemaure qui avait perdu son rôle militaire, puis par alliance Rochemaure passe  àux  Levis-Ventadour, au XVIe siècle a été assiégé par les catholiques (1591) puis par les protestants (1621) entraînant de sérieux dégâts, depuis tomba dans l'oubli. En 1598 le nouveau gouverneur Jacques d'Hilaire préfère construire le château de Joviac pour y habiter, abandonné le nid d'aigles de Rochemaure, son fils fut également gouverneur revint à Rochemaure jusqu'à sa mort en 1630, et en 1694 Anne-Geneviève de Lévis-Ventadour épouse Hercule de Rohan, leur petit-fils, le maréchal de Soubise (1694-1784) vend la toiture du château ce qui entraîna la ruine de ce dernier,  passa au Garnier des Hières (1784-1912) puis en 1912  fut acheté par le Baron de Massin de Miraval ses descendants  vendirent les ruines à la commune pour un franc symbolique en  1974 qui essaie de le maintenir.","architecture":"Rochemaure; forteresse surplombant la vallée du Rhône construite en pierres basaltiques au XIIe siècle, il fut rajouté à la première tour un ensemble castral comprenant le château proprement dit ainsi qu'une enceinte fortifiée englobant la totalité du village. \r\nL'ensemble du système fortifié descendait vers le Rhône.  \r\nOccupé jusqu'en  1630, il entreprend sa lente dégradation et au XVIIIe siècle accéléré par la destruction de sa toiture.\r\nIl reste de cette forteresse le donjon, des vestiges du château, des remparts à créneaux flanqués de tours entourant la ville, et des portes fortifiées.","habitants":"Famille d'Adhémar de Monteil  \r\nfamille de Levis de Ventadour\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Rochemaure_1.jpg","../../jctruffet.com/image/image_07/07_Rochemaure_2.jpg","../../jctruffet.com/image/image_07/07_Rochemaure_3.jpg","../../jctruffet.com/image/image_07/07_Rochemaure_4.jpg","../../jctruffet.com/image/image_07/07_Rochemaure_5.jpg","../../jctruffet.com/image/image_07/07_Rochemaure_6.jpg","../../jctruffet.com/image/image_07/07_Rochemaure_7.jpg","../../jctruffet.com/image/image_07/07_Rochemaure_8.jpg"]},"Consult_chateau_formulaire75d3":{"id":"Consult_chateau_formulaire75d3","dept":"07","canton":"Chomérac","commune":"Rochessauve","nom":"Rochessauve","type":"Manoir","periode":"XII","histoire":"Rochessauve: maison forte citée au XII- XIIIe siècle, construit par Audebert de Barrés. \r\nA appartenu au Comte de Valentinois Aymar de Poitiers, seigneur de Rochessauve, puis en 1301 passa au chapitre du Viviers.  Les Rochessauve en furent propriétaires jusqu'au XVIIe siècle, passa ensuite aux Mercure, au XVIIIe aux Rohan-Soubise.                    Aujourd'hui logis de France.","architecture":"Il reste du château des éléments de corps de logis et d'une tour ronde qui donne l'aspect d'une maison forte.","habitants":"Famille d'Audebert de Barrés\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Rochessauve_1.jpg","../../jctruffet.com/image/image_07/07_Rochessauve_2.jpg","../../jctruffet.com/image/image_07/07_Rochessauve_3.jpg","../../jctruffet.com/image/image_07/07_Rochessauve_4.jpg"]},"Consult_chateau_formulairebfaf":{"id":"Consult_chateau_formulairebfaf","dept":"07","canton":"Annonay","commune":"Roiffieux","nom":"Roiffieux_Brogieux","type":"Château","periode":"XVII","histoire":"BROGLIEUX: au XIIIe siècle appartenait aux Beaudiner de Saint-André des Effangeas, qui le vendirent en 1270 à Aymar de Roussillon seigneur d'Annonay, en 1600 Pierre de Fournier, écuyer et seigneur de Broglieux , en 1607 aux Ventadour, puis a Pierre  de Serres frère de l'évêque du Puy.\r\nAcquit en 1624 par Gabriel Bollioud, fils de Pierre Bollioud de la Grange     ( receveur général du clergé) et lieutenant principal du bailliage de Brognieux. Gabriel décéda en 1680, \r\nJean Bollioud (conseiller du roi) reprit jusqu'au descendant en 1735, Pierre Marie Christophe Bollioud, député au conseil des cinq cent sous la directoire et sénateur en 1799, c'est à cette époque que les travaux commencèrent, le domaine resta dans la famille en changeant souvent de nom. Monsieur de la Tour-Varan établit la branche de Tarttara au château de Broglieux, dernière de la famille Anne-Pierette-Marie Bollioud, elle avait épousé Jean-Marie Vercanson en 1837.\r\nEn 1909 Anne Morel épouse de Bruno Detrange pris la charge du domaine.  Dans la commune château de la GARDE: Construit de toutes pièces à partir de 1914 par un industriel monsieur Allizon qui fut maire de Roiffieux de 1925 à 1945, à la place d'un château qui a appartenu à Jean Mathieu Besson.                           MURES-Roiffieux: Fut en 1447 à la première famille et en 1626 noble Jean de Baronnat sieur de la Mure fut succédait par Antoine de Baronnat en 1680  dont le nom s'était modifié et cette dernière passa aux Frais de Figon, puis aux XVIIIe siècle aux Figon de Montregard.                       PASTRE:  Claude Boirayon, maire de Roiffieux en 1852, marié sans descendance légua la propriété à sa cousine Marguerite Pastré, Marcelle Pastré, fille de Marguerite, fut la dernière résidente.","architecture":"Broglieux; sur des bases d'ancienne construction du XVIe siècle, une tour ronde le confirme, un bâtiment rectangulaire fut élevé, deux étages avec attique  et fronton plein cintre. la Garde; Du XXe siècle de style plaisance, corps de logis à trois étages avancé en saillie, toiture à deux pans flanqué sur la partie nord  d'une forte  tour carré  Mure-Roiffieux; on observe un reste de vieille muraille éventrée d'une largeur de 1,20m. Ce château existe : grande bâtisse rectangulaire de 20 m. sur 25 m.de côté, sur un angle arrondie, une façade actuelle a conservée à peu prés sa hauteur d'origine.","habitants":"Famille de Jean  Bollioud\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Brogieux_1.jpg","../../jctruffet.com/image/image_07/07_Brogieux_2.jpg","../../jctruffet.com/image/image_07/07_Brogieux_3.jpg","../../jctruffet.com/image/image_07/07_Brogieux_4.jpg","../../jctruffet.com/image/image_07/07_Brogieux_5.jpg","../../jctruffet.com/image/image_07/07_Brogieux_6.jpg","../../jctruffet.com/image/image_07/07_Brogieux_7.jpg"]},"Consult_chateau_formulaireeefc":{"id":"Consult_chateau_formulaireeefc","dept":"07","canton":"Vallon-Pont-d`Arc","commune":"Labastide-de-Virac","nom":"Roure-Virac","type":"Château","periode":"XV","histoire":"Labastide de Virac \"Roure: pris son nom  de Pierre de Roure au XVe siècle.   \r\ncitée à cette époque appartenait au prieuré de Pont-Saint-Esprit, acquise en 1565 par Philippe Sautel (riche marchand protestant de Barjac) entreprend la construction du château en pleine guerre de religion ce qui explique ses défensives.\r\nA la mort de Claude Sautel sa fille Jeanne, épouse Pierre de Beauvoir de Roure, leur fils Claude accueil en 1628 le duc de Rohan chef militaire protestant, l'édit  signé en 1629 met fin à de nouveaux conflits mais doit subir comme tout les châteaux huguenots le démantèlement, et aura comme beaucoup d'autres les tours arasées.              Le comte de Roure se convertit au catholicisme en 1685.                    Le château subit en 1702 la révolte des camisards. \r\nJacques de Beauvoir de Roure décède sans postérité en 1724  le château revient à un cousin Pierre-Scipion de Grimoard-Beauvoir, marquis de Roure lieutenant du roi en Languedoc, la famille  n'habitat  plus  à Labastide,  passa la Révolution sans problème resta dans cette famille jusqu'en 1825 et finisse par le vendre à la famille Pradier puis passa au Lascombe qui en sont toujours propriétaire.","architecture":"Ce château construit en pleine révolution avait prit une forme défensive à  quatre étages avec deux  tours à créneaux  échauguettes, etc...   les hautes tours du château furent rasées, condamnées à porter les \"toits de l'infamie\" et remparts démolis. \r\nReste malgré tout une bâtisse quadrangulaire  imposante avec deux tours arasées.","habitants":"famille de Grimoard de Beauvoir  \r\nFamille Pradier\r\n        \r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Roure_1.jpg","../../jctruffet.com/image/image_07/07_Roure_2.jpg","../../jctruffet.com/image/image_07/07_Roure_3.jpg","../../jctruffet.com/image/image_07/07_Roure_4.jpg"]},"Consult_chateau_formulairea76f":{"id":"Consult_chateau_formulairea76f","dept":"07","canton":"Ruoms","commune":"Ruoms","nom":"Ruoms","type":"Bourg fortifié","periode":"X","histoire":"Ruoms: vers le Xe siècle était à l'origine la propriété d'un certain Seguin, lequel fit en 990 don de son domaine aux moines bénédictins de l'ordre de Cluny: Ruoms a été pendant 800 ans un prieuré de l'ordre de Cluny, le prieur était le seigneur de la paroisse sur laquelle il exerçait des droits seigneuriaux jusqu'en 1789. \r\nLe  premier prieur était Pons Léotade. Les remparts de la ville furent construits entre 1337 et 1453, comprenaient  sept tours rondes identiques, et de deux tours carrées servant d'accès au bourg médiéval. \r\nLes biens du prieuré, terre et bâtiment furent vendu en 1791.","architecture":"Des sept tours, six subsistent, formaient un quadrilatère de plus de cent mètres de côté, elles englobent l'enceinte du prieuré du côté Nord d'aspect irrégulier, dont une tour a été détruite en 1853, les tours surmontant les deux portes ont également disparues.","habitants":"Les prieurs de Cluny\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Ruoms_1.jpg","../../jctruffet.com/image/image_07/07_Ruoms_2.jpg","../../jctruffet.com/image/image_07/07_Ruoms_3.jpg","../../jctruffet.com/image/image_07/07_Ruoms_4.jpg","../../jctruffet.com/image/image_07/07_Ruoms_5.jpg"]},"Consult_chateau_formulaire6e60":{"id":"Consult_chateau_formulaire6e60","dept":"07","canton":"Tournon","commune":"Sarras","nom":"Révirand-Sarras","type":"Vestiges","periode":"XIII","histoire":"Révirand: au XIIIe siècle; Hugues de Lagorce qui avait épousé Alice de Révirand reconnait  être possesseur de ces lieux  et en rendit hommage au comte du Forez. Fief des dauphins du Viennois. Au XVe siècle aux Montchal et aux  Chalancon: Christophe de Chalancon vicomte de Châteauclos hérita les seigneuries  des Polignac au XVIe siècle,  ces seigneuries furent  acquises au XVe siècle de François et Simon Buisson, en rendirent hommage en 1570 à la comtesse de Tournon Claude de la Tour de Turenne pour ses terres. Balthazard de Chalancon seigneur de Sarras et de Révirand. En 1650 Claude Villars baron de Maclas était seigneur de Sarras et Révirand.                             SARRAS: Au féodal, le château appartenait aux Pagan,  ces derniers semblent avoir été les premiers seigneurs. \r\nAu milieu du XIVe siècle, Sarras était  possédé par les Retourtour, vers 1420  aux de Brion, puis successivement  aux Montchal,  aux du Buisson et  aux de Chalancon. \r\nAu début du XVIIIe siècle  aux de Moras, puis aux Faure et aux seigneurs de Polgue à la fin du XVIIIe siècle. Transformé en habitations populaires, en 2010 vendu à la commune de Sarras.","architecture":"Le château de Révirand était construit sur l'emplacement d'un fort d'observation romain sur la motte féodale et avait la même fonction pour surveiller le passage du Rhône et du port de Silon, il reste quelques traces de vestiges du château. Sarras; le château construit au XIe siècle a été détruit pendant les guerres de religion, reconstruit vers 1580, il en reste trois tours et quelques traces extérieures  sur le corps de logis remanié et transformé en habitations.","habitants":"famille d'Hugues de Lagorce \r\nFamille de Chalancon\r\n        \"","divers":"Motte féodale et château féodal à Sarras","gps":"","images":["../../jctruffet.com/image/image_07/07_Revirand_1.jpg","../../jctruffet.com/image/image_07/07_Revirand_2.jpg","../../jctruffet.com/image/image_07/07_Revirand_3.jpg"]},"Consult_chateau_formulaire4a06":{"id":"Consult_chateau_formulaire4a06","dept":"07","canton":"St-Agrève","commune":"St-André-en-Vivarais","nom":"Saint-André en Vivarais","type":"Manoir","periode":"XIX","histoire":"Montivert: cité en 1352, de Guillaume de Bastet qui en fait don à Hugues de Bronac, châtelain de Montivers, passa ensuite aux Iserand de Chanelosc, puis aux Montaignac, au Montagner, à Antoine de Viré de Liron ( frères de Gabrielle).\r\nAmicie de Monthivers ( fille unique ) épousa en 1841 Antoine-Louis, comte de la Croix Laval. \r\nLe château fut vendu en 1983 à monsieur Dittli.                              BAUME; fut une dépendance de la commanderie de Devesset demeure des Templiers et des hospitalliers (XIIe siècle), fut la propriété de Julien de Ronchal que sa descendance  l'habita jusqu'au début du XIXe siècle, puis passa à la famille Mounier de Saint-Bonnet le Froid. Monsieur Lizon docteur vétérinaire  de Paris l'acquit, le rénova et a conservé l'aspect du XVIe siècle, aujourd'hui madame Veuve Lizon  en est toujours propriétaire.           BOURLATIER:  ancienne baronnie  qui appartenait au seigneur de Saint-Martial de Bourlatier et en 1543 Louis de Lestrange seigneur de Bourlatier de Saint-Martial et de Fourchades cède aux Chartreux de Bonnefoy tous ses droits,  puis construisirent une maison forte sur l'emplacement du château de Fourchades. En 1609, la métairie de Bourlatier est cédée à Marie de Lestrange en mauvais état. En 1630 Claude de Hautefort-Lestrange, nouveau baron de Boulogne projette en résidence secondaire un petit château  à la place de la maison forte,  mais  c'est Charles de Saint-Nectaire époux  de Marie de Hautefort qui termina les travaux, après la mort de Saint-Nectaire en 1667  la succession fut difficile entre les six enfants  Henri l'ainé hérita, mais fut assassiné et se fut  Charles-Louis-César de Fay-Gerlande-Lestrange en 1724 qui le succéda et à partir de cette période   le domaine subit des pillages  et  le  manque d'entretien entraîna la destruction  du château, à  sa mort tous ses biens passèrent à messire Claude Florimont de Fay de Cise, le château en ruine avant 1739 fut détruit en 1793, les granges maintenues et  en 1800  Claude de Ronchal en était propriétaire seigneur de la Baume.","architecture":"Montivert; le château de style néo- renaissance,  deux étages sur rez-de-chaussée  flanqué de deux tours rondes sur façade Sud et échauguettes en angles côté Nord et sur pavillon d'entrée,  l'ensemble à toits poivrières, l'édifice actuel a remplacé, au milieu du XIX e siècle une maison forte  qui avait été remanié au XVIIe siècle.                Baume; bâtisse rectangulaire flanquée d'une importante tour ronde           Bourlatier; il ne reste plus rien du château qui était implanté sur les ruines  du château de Fourchades situé au nord de St-Andéol de Fourchades à proximité de l'actuelle ferme de Trafourchades.  Aujourd'hui enfouit sous la RN 535 à 1400 m d'altitude, le  bâtiment  \"la grange neuve\" de la ferme fut aménagé par Claude de Lestrange en 1640.","habitants":"Famille de Guillaume de Bastet  \r\nfamille du comte de la Croix-laval\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Montivert_1.jpg","../../jctruffet.com/image/image_07/07_Montivert_2.jpg","../../jctruffet.com/image/image_07/07_Montivert_3.jpg","../../jctruffet.com/image/image_07/07_Montivert_4.jpg"]},"Consult_chateau_formulaired95d":{"id":"Consult_chateau_formulaired95d","dept":"07","canton":"Satillieu","commune":"Satillieu","nom":"Satillieu-Seurey","type":"Château","periode":"XVI","histoire":"Seurey; les premiers seigneurs étaient Aymon Pagan 1290, Guygonnet de Seurey 1295 et en 1305 Alazie de Clermont veuve d'Aymon Pagan et tutrice de Jean Pagan qui deviendra seigneur, puis en 1363 a Briand de Retourtour, passe ensuite aux Levis-Ventadour et en 1691 fut constitué en  baronnie par les de  Faure de Saint-Sylvestre.                              Le château de Satillieu: Construit sur les hauteurs de la cité, le château féodal revient, avec la seigneurie de Mahun, aux Tournon à la fin du XIVe siècle.\r\nles seigneurs de Tournon agrandirent et embellirent l'édifice où ils demeuraient pendant la saison estivale. \r\nEn 1644, à la mort de Just-Louis II de Tournon, le château passa aux Levis-Ventadour pour un siècle. \r\nIl appartient ensuite, en 1780 à Abbé de Pampelonne marquis de Satillieu jusqu'en 1793 et passa aux Faure de Saint-Sylvestre, élevé au rang de marquis de Satillieu. \r\nLe dernier d'entre eux, Charles-Antoine, prit une part active à la Révolution en devenant député aux états généraux du Vivarais. \r\nEn 1848, la commune racheta le château afin d'en faire la mairie et le presbytère.","architecture":"Seurey; du château à 884 mètres d'altitude du XI et XIIe siècle abandonné  au XVe siècle,  il ne reste que des ruines montrant l'emplacement du donjon et du corps de bâtiment et courtines.                             Satillieu; ce château féodal possède un corps de logis quadrangulaire de trois étages flanqué de tours carrées en angles.","habitants":"Famille du seigneur Pagan\r\n        \"","divers":"","gps":"","image
