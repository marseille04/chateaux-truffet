const FULL={"Consult_chateau_formulaire8a49":{"id":"Consult_chateau_formulaire8a49","dept":"07","canton":"St-Péray","commune":"Alboussière","nom":"Alboussière","type":"Maison forte","periode":"XV","histoire":"A Alboussière le château de Barjac, de Croizat (voir Article) et le château de Cachard (voir article) et les maisons fortes de Tardivon et de l'Arzalier.      BARJAC, maison forte construite au XVIe siècle, style renaissance par le seigneur Jean de Barjac. François de Barjac en 1562 capitaine des protestants, privée.                      La maison forte de Tardivon, les armes de cette famille anoblie en 1506, représentent la tour crénelée d'argent, maçonnée et ajourée de sable accolée de deux fleurs de lys, chargée de trois diamants, elle est attribuée à André de Tardivon, lieutenant du juge royal en 1533.","architecture":"Barjac; bâtiment flanqué de deux tours rondes sur la partie centrale, l'une à l'Est l'autre à l'Ouest, le corps de logis est plus récent et en état, la partie Nord est en partie détruite.     Tardivon; ce manoir du XVI  siècle par la construction en  moellons et des fenêtres à meneaux, donjon carré.","habitants":"Barjac; famille des seigneurs de Barjac. Tardivon; famille de  Tardivon.\r\n        \"","divers":"Maison forte de Barjac, de Tardivon et de l'Arzalier.","gps":"","images":["../../jctruffet.com/image/image_07/07_Barjac_1.jpg","../../jctruffet.com/image/image_07/07_Barjac_2.jpg","../../jctruffet.com/image/image_07/07_Barjac_3.jpg","../../jctruffet.com/image/image_07/07_Barjac_4.jpg","../../jctruffet.com/image/image_07/07_Barjac_5.jpg"]},"Consult_chateau_formulaire3402":{"id":"Consult_chateau_formulaire3402","dept":"07","canton":"Serrières","commune":"Andance","nom":"Andance","type":"Vestiges","periode":"XI","histoire":"A Andance le château de Blacieu à Talancieux et les vestiges de la Sarrazinières.                                           ANDANCE: au XIIIe siècle, appartenait à la seigneurie de Thorrenc, puis les Montchal  au XVe siècle, la moitié du port était au prieur, l'autre aux Canson de Vocance. Ceux-ci  vendirent leurs parts en 1542 et à A. Gamon, vers 1622.   la seigneurie passait  aux Barberon,  puis successivement aux de Saint-Chamond, et aux de Serres. En 1719  la baronnie appartenait aux Saint-Priest, vendue à Jean Marie Desfrançois de l'Olme.                                             BLACIEU; pas d'information.                                      SARRAZINIERES; vestiges romaines, support de dix mètres sur sept, hauteur huit mètres à l'origine  de douze sur huit mètres, prévu pour supporter une statue romaine donnant sur le Rhône.","architecture":"Andance; vestiges de la base de la tour ronde sur le port, tour d'enceinte aujourd'hui arasée. Il existait des souterrains que certains Andançois ont pu visiter,  reliaient toutes les tours entre elles, ainsi que l'église.  Dominant la vallée le château de Blacieu à Talencieux.","habitants":"Famille de Montchal\r\n        \"","divers":"Reste d'une tour à Andance.\r\nChâteau de Blacieu.                                                                         Support dit sarrazinières.","gps":"","images":["../../jctruffet.com/image/image_07/07_Andance_1.jpg","../../jctruffet.com/image/image_07/07_Andance_2.jpg","../../jctruffet.com/image/image_07/07_Andance_3.jpg","../../jctruffet.com/image/image_07/07_Andance_4.jpg"]},"Consult_chateau_formulaire3a40":{"id":"Consult_chateau_formulaire3a40","dept":"07","canton":"Annonay","commune":"Annonay","nom":"Annonay","type":"Vestiges","periode":"XII","histoire":"A Annonay plusieurs manoirs en plus de son château; la Tune, le Rébaulon, Mircouly, d'Olagne, le Grand-Murier,le Déomas et le Colombier et Varagnes.                                 ANNONAY: La seigneurie apparaissait en 1117, mais fut reprise en fief dès 1230 par le dauphin André, comte de Vienne et d'Albon et aux Roussillon en 1271, et  constituèrent jusqu'au  XIVe siècle une baronnie. Le château fut le siège de la viguerie et, à partir de 1565, d'une cour de Baillagère en remplacement de celle de Boucieu le Roi. Les familles suivantes se succédèrent à la seigneurie d'Annonay: d'abord le Dauphin qui venait de recevoir l'investiture de la ville, les comtes de Forez, puis la grande famille des Roussillon. Par alliance, en 1464, aux Villars de Thoire, puis toujours par alliance à Philippe de Levis de la Roche; et par cession en 1473 aux bourbons d'Auvergne. En 1582 Gilbert de Levis redevient seigneur d'Annonay, en 1597 Marclaud la Motte chevalier du roi bailli et gouverneur de la Ville et de la baronnie, puis par alliance, en 1694, passe au Rohan Soubise, et en 1753, passe à la famille de Condé.                                  MIRCOULY: Michel Béchetoille né en 1560; parmi leurs alliances, citons les Chabert, Peyron, Les Garets d'Ars, Contamin, Mignot, Seguin, Des François de Lolme, Montgolfier, Sauvage de St-Marc, etc Le château toujours dans la descendance.                                            PASTRE: Claude Boirayon, maire de Roiffieux en 1852, marié sans descendance légua la propriété à sa cousine Marguerite Pastré, Marcelle Pastré, fille de Marguerite, fut la dernière résidante. \r\n VARAGNES: Dés le XIIe siècle, appartenait à Martin  Chomel de Varagnes seigneur, puis Antoine d'Henris pris le titre de seigneur de Varagnes par alliance avec Marguerite de Chomel de Varagnes. La famille d'Henris garda plusieurs générations le titre de seigneur de Varagnes sans pour autant y habiter, ils étaient châtelain de Rochebloine et Palhairés.                Les Chomel gardèrent les terres et la maison forte jusqu'à la fin du XVIIIe siècle où elle échut à sieur Jean Chomel curé de Charnas en 1750, puis passa , a  la famille Barjon qui contracta plusieurs alliances  avec des familles nobles de ces quartiers au cours du XVIIIe siècle.","architecture":"le château fort dominait la ville construit au XIIe siècle sur les ruines d'un castrum gallo romain a été incendié en 1894 et démoli en 1967.\r\nLa ville été fortifiée avec sept portes. Seul vestige la tour des martyrs et quelques pans de murs des remparts.\r\nDans la ville et aux environs d'autres manoirs dont je n'ai aucune information tel que Beaumarais, Olagne, la Tune, Ribaulon; construction classique du XIXe siècle par les industriels.                                                                        Mircouly; château  de style plaisance de forme quadrangulaire de deux étages flanqué de deux tours rondes  à toits en poivrières  et d'échauguettes.    Varagnes; Maison forte, ensemble important de plusieurs corps de logis à plusieurs niveaux  largement remanié.","habitants":"Famille de Villars de Thoire\r\n\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Annonay_1.jpg","../../jctruffet.com/image/image_07/07_Annonay_2.jpg","../../jctruffet.com/image/image_07/07_Annonay_3.jpg","../../jctruffet.com/image/image_07/07_Annonay_4.jpg","../../jctruffet.com/image/image_07/07_Annonay_5.jpg","../../jctruffet.com/image/image_07/07_Annonay_6.jpg","../../jctruffet.com/image/image_07/07_Annonay_7.jpg","../../jctruffet.com/image/image_07/07_Annonay_8.jpg","../../jctruffet.com/image/image_07/07_Annonay_9.jpg"]},"Consult_chateau_formulaire19e3":{"id":"Consult_chateau_formulaire19e3","dept":"07","canton":"Privas","commune":"Antraigues-sur-Volane","nom":"Antraigues","type":"Vestiges","periode":"XII","histoire":"Antraigues et les vestiges d'Asperjoc.   ANTRAIGUES: en 1288, Brusul cardinal de Solignac, rend hommage à Aymar de Poitiers, comte du valentinois, pour le fief d'Antraigues que Raymond d'Antraigues, son beau-père, avait acquis de Rostaing d'Ucel, puis passa aux  de Goy,  dés le XIIIe siècle aux  de Cayre, Albert de Cayre s'allia à la maison de Lestrange en 1384. \r\nValentin de Chanaleilles rendit hommage à  Godefroy de Cayres qui en rendit hommage à Pons de Montlaur  et ensuite en 1601 aux de Launay; Henri de Launay, comte d'Antraigues, député de Villeneuve de Berg aux états généraux de 1789. Grande famille qui garda le château jusqu'à la Révolution.              ASPERJOC; En 1290 appartenait au seigneur de Lagorce, qui en rendit hommage  à l'évêque de Viviers  par noble Godefroy de Cayres et en 1320 au seigneur de Luc  Guillaume de Randon, ce dernier vend le fief aux Guigues. Au XVe siècle plusieurs coseigneurs dont les de  Cayres, puis aux Montlaur, aux levis-Lautrec et au XVIIIe siècle aux  de Launey seigneur d'Antraigues.","architecture":"Antraigues; le château, après avoir été habité par les de Launay de cette  forteresse  devenu une simple maison de campagne. La tour féodale fut vendue aux enchères,  transformée aujourd'hui en clocher, le château fut détruit dans la nuit du 29 au 30 Mars 1792.             Asperjoc, vestiges sur motte féodale.","habitants":"famille de Godefroy de Cayres\r\nfamille de Henri de Launay\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Antraigues_1.jpg","../../jctruffet.com/image/image_07/07_Antraigues_2.jpg"]},"Consult_chateau_formulaire2225":{"id":"Consult_chateau_formulaire2225","dept":"07","canton":"Viviers","commune":"Alba","nom":"Aps_Alba","type":"Château","periode":"XIV","histoire":"A Alba château et vestiges du château féodal de la Roche.                      APS-ALBA: en Ardèche méridionale, cité Gallo-Romaine, au sud du Coiron,( massif volcanique) porte le nom de la cité des Helviens de l'Empereur Auguste d'Alba. Le château portait encore en 1903 le nom d'APS par la seigneurie d'Aps qui le possédait dejà depuis le XIe siècle.\r\nLa famille d'Aps, avec Ermengard, seigneur d'Aps fit édifier un donjon carré au XIIe siècle, la baronnie est tenue par la famille des Deux-Chiens, où (Douchanet) originaire du Gévaudan, en 1287, la niéce de Pons des Deux-Chiens apporte la baronnie à Giraud Adhémar, seigneur de Montélimar, comte de Grignan. \r\nEn 1558 Louis Adhémar meurt sans enfant, ses biens passa à sa soeur Blanche, épouse de Gaspard de Castellane, le fils de cette dernière, Louis vend Aps à Françoise de Levis, comtesse de Suze; Georges de la Baume de Suze qui obtint la nomination en  comté en 1614, passa à son fils Timoléon, ce dernier meurt par accident trois ans plus tard et en 1663 au décés de sa veuve Catherine de Polignac, le château revient à des cousins lointains qui le  vendent à Joachim de Montagut, seigneur de Plauzat et le gardèrent jusqu'à la Révolution. En 1789 Joachim Louis-Charles part en émigration dès le début des troubles. \r\nLe château fut pillé en partie incendié, vendu comme bien national, partagé en sept propriétaires.\r\nAcquis à la fin du XIXe siècle par monsieur Barthélémy Gaillard  qui commença sa restauration, après son décès le château passe dans diverses familles, qui l'ouvrent à des manifestations pendant l'été.                                                  ROCHE, bâti par les évêques de Viviers au XIe siècle, Géraud d'Ucel le céda à Jocerand de Saint-Romain, au XIVe siècle le fief appartenait au seigneur de Fourchades, puis aux seigneurs d'Aps.","architecture":"Alba; de style féodal, renaissance, carré en basalte noir, formé de quatre tours rondes et d'un donjon en ruine. \r\nAu XIe siècle existait déjà un donjon à l'initiative des évêques de Viviers.\r\n En 1620 le château est édifié par Georges de la Beaume de Suze sur les vestiges du château médiéval renaissance, auquel son apporté le corps de logis en forme de U. \r\nAprès l'incendie, il ne reste que la partie Est du château  et un pan de mur sur la partie Nord se prolongeant  jusqu'aux vestiges de la tour Ouest.  Roche; vestiges du château; il ne reste que quelques traces  du donjon sur le rocher appelé \"roc Saint-Jean\",  l'enceinte comportait à l'origine sept tours et trois portes, dont on peut encore distinguer plusieurs vestiges.","habitants":"famille de Georges de la Baume  \r\nfamille de Joachim de Montagut \r\nfamille de Barthélémy Gaillard                                      Roches; Evêques de Viviers\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Aps_Alba_1.jpg","../../jctruffet.com/image/image_07/07_Aps_Alba_2.jpg","../../jctruffet.com/image/image_07/07_Aps_Alba_3.jpg","../../jctruffet.com/image/image_07/07_Aps_Alba_4.jpg","../../jctruffet.com/image/image_07/07_Aps_Alba_5.jpg","../../jctruffet.com/image/image_07/07_Aps_Alba_6.jpg","../../jctruffet.com/image/image_07/07_Aps_Alba_7.jpg"]},"Consult_chateau_formulaire3c7c":{"id":"Consult_chateau_formulaire3c7c","dept":"07","canton":"St-Martin-de-Valamas","commune":"Arcens","nom":"Arcens","type":"Manoir","periode":"XIV","histoire":"Arcens, ce manoir dit de saint-Laurent, appartenait au XVe siècle aux seigneurs de Brion, puis au XVIIe siècle à la famille de Crussol, puis au duc d'Aiguillon. La dernière seigneurie  d'Arcens appartenait au duc d'Aiguillon,  en 1779 par l'intermédiaire de Tournachon, conseiller du roi, Emmmanuel-Arnaud Duplessis Richelieu duc d'Aiguillon,  pair de France seul héritier de sa mère Anne Charlotte de Crussol duchesse d'Aiguillon, inféodé et transporte le titre de bail à fief franc et noble, à messire Claude-Julien de Ronchol, seigneur de Beaume, demeurant en son château de Saint-André des Effangeas et  en 1789 au marquis du Bourg de Polgue (famille Bordarier-Chappus).Propriété de la famille Laurent du XVIIe au XIXe siècle.","architecture":"Le manoir de Saint-Laurent possède un corps de logis rectangulaire flanqué d'une tour ronde.","habitants":"Famille des Seigneurs de Brion et de la famille Laurent.\r\n        \"","divers":"Manoir d'Arcens","gps":"","images":["../../jctruffet.com/image/image_07/07_Arcens_1.jpg"]},"Consult_chateau_formulairef428":{"id":"Consult_chateau_formulairef428","dept":"07","canton":"Satillieu","commune":"Ardoix","nom":"Ardoix","type":"Manoir","periode":"XIV","histoire":"A Ardoix la maison forte de Manoha, de Munas et la tour d'Oriol.                                                                                  ARDOIX; dépendait de l'abbaye de St- Claude (Jura) ainsi que d'autres communes du plateau du Vivarais, suite aux accords passaient  par Charlemagne en 716, administré ensuite en 1557 par Vienne.                                              MANOHA, au XIIIe siècle était habité par une famille de même nom, dont plusieurs membres de la famille en descendirent Martin, Jean, Perronet, Michel et Vincent. Le 4 mars 1494 Mathieu Manoha embrasse la carrière des armes, il est anoblie par Charles VIII. En 1573  le château fut pillé malgré les fortifications par les troupes de protestants. En 1583 Marguerite de Manoha épouse Charles de Wetz de la Roche, la branche noble des Manoha s'éteint en 1584 et les biens passent par alliance avec Charles de Wetz de la Roche. En 1715 Madame du Puy de Dienne hérita de son frère Jean-Baptiste de la Roche. Le fief de Manoha connait son apogée par  le mariage en 1748 de Jean-François du Puy de Dienne, passa aux  le More de l'Hotoire, par mariage en 1796 à Nicolas Julien de Villeneuve, Marguerite Sophie de Dienne apporte le domaine dans cette famille,  puis acquis par madame de Lacheisserie et vendue au XXe Siècle à monsieur Reynaud qui exploita la ferme et en vendit une partie à monsieur Abeille.                                                   MUNAS; au XVIe siècle le seigneur était Jean de Saignard qui épousa Florie de Chamouroux, ancien fief de Guaspard-Dupont en 1650  noble Izac Dupont, et par alliance passa en 1685 aux de la Roque  par le mariage de Jacques de la Roque et Suzanne de Dupont de Munas héritière.  La  seigneurie de Munas resta dans cette famille jusqu'en 1834. Le fils de Félix de Saignard habita en 1876 à Munas.                                                                                ORIOL; ce casernement dont il ne reste qu'un pan de mur de la tour qui commandait jadis le passage, il fut détruit pendant les guerres de religion. Les protestants l'ayant évacués après le traité de l'Hotoire, mais les bandits s'y installèrent, un dénommé Erard qui fut pendu à Lamastre, suite à cela les paysans s'y précipitèrent et le démolirent pierres par pierres pour éviter que d'autres soldats s'y installèrent.","architecture":"Manoha, cette demeure sur le plateau d'Ardoix fortifié au XVe siècle a l'occasion de l'anoblissement de cette famille, a subit des dégâts importants lors des guerres de religion,  était un ensemble  fermé de remparts et tours rondes et trapues, défensives percées de meurtrières, donjon plus élancé, véritable tours de guet et tourelle d'escalier, le bâtiment a été partagé en deux propriétés.\r\nLe corps de logis se compose de deux bâtiments perpendiculaires, à leur intersection se trouve une tour de plan circulaire.                         Munas; maison forte, corps de logis en équerre, renaissance flanquée d'une tour ronde plein centre sur l'aile Sud.       La tour d'Oriol il ne reste qu'un pan de mur.","habitants":"famille de Mathieu de Manoha  \r\nfamille des Puy de Dienne  \r\nfamille des More  de l'Hotoire\r\n        \r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Munas_1.jpg","../../jctruffet.com/image/image_07/07_Munas_2.jpg"]},"Consult_chateau_formulaire537f":{"id":"Consult_chateau_formulaire537f","dept":"07","canton":"St-Félicien","commune":"Arlebosc","nom":"Arlebosc","type":"Château","periode":"XIII","histoire":"A Arlebosc le château et deux maisons fortes Malgarayt et Chazotte voir article). et de Romaneaux.           ARLEBOSC: la villa \"Arlebosc\" appellation du Xe siècle\"  appartenait au Drodon, qui en firent don à l'église du Puy qui le gardèrent jusqu'au  XVIIIe siècle, depuis cette époque, tous ces divers territoires ne cessèrent de faire partie du patrimoine du chapitre de Notre-Dame du Puy et de figurer sur les terriers de leur seigneurie d'Arlebosc; et le syndic de ce chapitre qui se qualifiait à la fois seigneur et prieur d'Arlebosc.\r\nPar suite il n'eut jamais dû exister aucun fief dans le mandement seigneurial d'Arlebosc; et de fait les propriétés de Chazotte, Romaneaux, Malgarays, Banches, bien  que patrimoine de familles nobles, ne cessèrent  jamais d'être considérés comme simples mas ruraux idem pour le mas d'Aulzon, le domaine du Peyrots, Bossas, Chirols  et Ruissas du moins jusqu'au XVIe siècle.\r\nLe 30 novembre 1634  Claude de Reboulet récent acquéreur de Ruissas céda au chapitre des rentes féodales en échange des rentes et des droits de seigneurie et de justice et ceci à tous les propriétaires nobles et après lui à son fils Antoine en  1652.                  MALGARAYT, en 1624 cette demeure est habité par Pierre  Louis de Bonnaud capitaine au régiment du Languedoc, appartenait auparavant aux de Burine et c'est Jean de Monteil de la Fond seigneur de Saint-Quentin qui en hérita colonel d'enfanterie et y mourut en 1711. Les Rouchet de Chazottes dont Jean qui construisit cette belle demeure Cette maison forte passa à Henri de Sonnier de la Boissière.                   ROMANEAUX: famille Blachier de Chazotte (de la Chau à l'époque) qui remonte au XVe siècle habitait dans cette maison forte, elle exerça des fonctions de juges et de châtelains ainsi que le commandement d'une milice qui y établit une garnison. Jean Blachier de la Chau  fut capitaine de la compagnie  de bourgeoisie d'Arlebosc et Bosas, cette famille s'éteignit dans la famille de Vaux de Pleyné par le mariage de Joseph-Ignace de Vaux de Serres seigneur du Pleyné et de Jeanne Blachier de la Chau,  Joseph-Ignace décéda en 1766, son neveu Jean-Philibert de la Chau  hérita, sans enfant, l'héritage revient aux  enfants de la dite Jeanne et le domaine rentrera dans la famille des Vaux de Serres de Pleyné. En 1873 Michel de Chazotte sous lieutenant du troisième bataillon des mobiles de l'Ardèche  se maria avec Marie de Missols  y habita mais n'eurent pas d'enfant.","architecture":"Arlebosc; ce vieux château médiéval servit de presbytère jusqu'au XIIIe siècle, fait corps avec l'église, l'ensemble fut  incendié lors du premier soulèvement du Calvinisme, remanié, restauré et agrandi et c'est au XIXe siècle que l'ancien édifice du château disparaît pour la construction de l'église.\r\nAujourd'hui les tours  sont utilisées par la commune.                             Malgarayt; cette maison forte a été construite en 1715-1725 par Jean Rouchet de construction  rectangulaire à deux niveaux sur la façade ouest des ouvertures à colonnettes dans un style oriental.                                                       Romaneaux; maison forte du XVIe siècle quadrangulaire flanquée de deux tours carrées.","habitants":"Famille de Claude de Reboulet\r\nFamille de Jean Bouchet\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Arlebosc_1.jpg"]},"Consult_chateau_formulaire45f4":{"id":"Consult_chateau_formulaire45f4","dept":"07","canton":"Tournon","commune":"Arras-sur-Rhône","nom":"Arras","type":"Château","periode":"XII","histoire":"ARRAS; le château féodal construit par la famille d'Yzerand puis passa aux fiefs des Dauphins du viennois était partagé en deux seigneuries; la tour Blanche dite \"tour de Soubise\" et l'autre tour dite\" tour de Jovyac\", seul reste la tour Blanche, du XIIIe siècle  appartenait aux Roussillon, puis aux Montchal et en 1366 à la famille de Brionet puis aux Bermond.\r\nDe la fin du XVe au XVIIe siècle aux Tournon, puis aux Levis-Ventadour et au Rohan-Soubise. \r\nVendue en 1785 aux Monteil.             La tour  \"Brune\" appartenait au XIIIe siècle aux Sylvain d'Arras, puis aux comtes du Forrez, en 1468 à Marguerite de Montchenu, à la fin du XVe aux Fay, puis aux Brion, aux d'Augéres, aux Saugéa et aux Jovyac.","architecture":"Vestiges de la tour ronde \" dite tour Blanche\" de 28 mètres de haut la tour Brune n'existe plus, était une tour carrée qui existait encore en 1706.","habitants":"Levis Ventadour  \r\nRohan Soubise \r\nSylvain d Arras\r\n        \r\n        \r\n        \r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Arras_Tour_1.jpg","../../jctruffet.com/image/image_07/07_Arras_Tour_2.jpg"]},"Consult_chateau_formulaire3469":{"id":"Consult_chateau_formulaire3469","dept":"07","canton":"Aubenas","commune":"Aubenas","nom":"Aubenas","type":"Château","periode":"XII","histoire":"AUBENAS: la seigneurie fut donnée au IXe siècle à un des Leudes de Charles Martel qui construisit le \"château-vieux\" et le premier suzerain fut la famille de Montlaur, originaire d'une petite seigneurie des hauts plateaux, non loin des sources de la Loire ils y  régnèrent de 1084 à 1441; Pons et Bernard de Montlaur puis Jean de Montlaur évêque de Maguelone et à son frère Hugues archevêque d'Aix, Pons III de Montlaur(1190-1226)joua un rôle dans le départ de la croisade des Albigeois. \r\nLa seigneurie d'Aubenas, Pons de Montlaur (1219)  la seigneurie comprenait trois châteaux Aubenas, Saint-Laurent et Ucel avec plus de 900 fiefs, passa à son fils d'Héracle, puis transformé en baronnie  par Louis de Montlaur, dit le \"Grand\" en 1432, puis par alliance passa  aux  Montlaur-Maubec par le mariage de Jeanne de Montlaur avec le seigneur de Maubec  de 1441 à 1551.\r\nLe fils de Jacques-Raymond baron de Modène, et de Maubec-Montlaur (fille unique de Louis II) hérita des biens. Il se fit appeler Guillaume-Louis de Raymond de Mormoiron de Maubec de Montlaur, baron de Modène et d'Aubenas, comte de Montlaur, seigneur de Saint-Laurent, d'Ucel, de Montpezat, Mayres, Montbonnet et Vals. Il devient lieutenant  général en Dauphiné en 1585, il eut trois filles; Jacqueline épousa le seigneur de Banne et leur fille se liera à la famille de Voguë. Marie épousera en deuxième noce Jean-Baptiste d'Ornano en 1591 et Marguerite épousera François d'Ornano, frère du président. Jean-Baptiste d'Ornano élevé au rang de maréchal de France fit évoluer la vie à Aubenas mais n'ayant pas d'héritier, son neveu Alphonse de Lorraine héritera en 1656; ce dernier prince d'Harcourt le délapida le domaine,  vendit la baronnie à son cousin Cérice François de Voguë en 1716, restera dans cette famille jusqu'en 1792, le fils de Cérice, Charles François Elzéar malgré son élection de député de la noblesse aux états généraux émigra en 1792.           Le château vendu comme bien national à la Révolution, racheté par monsieur de Bernardy maire d'Aubenas qui y installa la mairie depuis 1810.","architecture":"Aubenas; construit au XIIe siècle de forme quadrilatère irrégulier, l'édification du donjon est du XIIe, puis demeure renaissance au XVe siècle.\r\n Le château est constitué d'un haut donjon quadrilatère  de 7 m de côté et présente des murs de 2 m d'épaisseur, d'une hauteur de 26 m, flanqué a chaque angles d'échauguettes à toit en coupole. L'enceinte était surmontée d'un chemin de ronde sur mâchicoulis, et flanquée  de deux tours  rondes en angles couvertes de toits en poivrière, avec 4 étages.","habitants":"Famille de Modene.                   Familles des seigneurs de Montlaur  familles des seigneurs de Guillaume de Voguë                              Famille d'Ornano\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Aubenas_1.jpg","../../jctruffet.com/image/image_07/07_Aubenas_2.jpg","../../jctruffet.com/image/image_07/07_Aubenas_3.jpg","../../jctruffet.com/image/image_07/07_Aubenas_4.jpg"]},"Consult_chateau_formulaire1bea":{"id":"Consult_chateau_formulaire1bea","dept":"07","canton":"Viviers","commune":"Aubignas","nom":"Aubignas","type":"Château","periode":"XIII","histoire":"Aubignas: au XIIIe siècle le premier seigneur connu fut Pons de Bouchanet, en 1253 Aymard d'Aubignas le tient en fief, le château et le mandement, en 1287 Blonde de Bouchanet rend hommage à Aldebert évêque de Viviers, en 1306 Giraud d'Adhémar seigneur d'Aps et d'Aubignas. Au XVIe siècle la famille du Cheylard était propriétaire du château puis fut la propriété de Jacques Bouvier avocat  jusqu'à la Révolution.","architecture":"Le château d'Aubignas de conception rectangulaire au sommet du bourg, cantonné de deux tours circulaires, remanié au XIXe siècle, est actuellement en cours de rénovation pour habitation populaire.","habitants":"Famille d'Aymar d'Aubignas\r\n        \r\n        \r\n        \r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Aubignas_1.jpg","../../jctruffet.com/image/image_07/07_Aubignas_2.jpg","../../jctruffet.com/image/image_07/07_Aubignas_3.jpg","../../jctruffet.com/image/image_07/07_Aubignas_4.jpg","../../jctruffet.com/image/image_07/07_Aubignas_5.jpg"]},"Consult_chateau_formulaire9ea2-2":{"id":"Consult_chateau_formulaire9ea2-2","dept":"07","canton":"Chomérac","commune":"Baix","nom":"Baix","type":"Vestiges","periode":"X-XIX","histoire":"A Baix le château st-Maurice, la maison forte de la Cardinale et la motte féodale des Corbières.                        BAIX: Baxus en 950, Bays en 1200, Bais en 1300 et en 1900 Baïx, résidence favorite des comtes  de Valentinois, Aimar II dont son fils Guillaume est né à Baix le 31 janvier 1202, le premier seigneur connu en 1197 fut Guigues de la Roche en Régnier, en 1278 qui en fit hommage aux comtes de Valentinois Aymar II de Poitiers, ensuite les Blacons (1388), aux comtes de Ventadour (1577) aux  Gardon de Boulogne, les Guyon de Peyrolles et les du Pont de Furmenas (1620)  et les Suarez d'Aulan, ces derniers seigneurs.          Isaac de Chabrières, sieur de Baix en 1650 conseiller à la chambre, Charles de Chabrières lieutenant des maréchaux de France en 1700, Pierre Marie de la Roche de Chabrières était conseillé au parlement en 1789, puis chevalier de Peyrins, mort il y a quelques années au château  de ce nom faisant héritier son neveu le vicomte de Salmart.            La CARDINALE, au bord du Rhône, ancienne auberge,  accueilli Louis XIII en 1629, le Cardinal de Richelieu en 1642, elle fut la résidence de madame Catherine de Richard dont le premier époux Gabriel de Gordon décéda en 1754 à l'âge de 35 ans laissant à sa veuve outre cette maison le château de Gazavel et ses terres,  elle épousa en seconde  noce Louis-Charles de Barral seigneur du Besset en Montagnes.                             ST-MAURICE: Joseph Baratier juge royal à Baix, le Pouzin et au pays de Barrés en 1639, il épousa Elizène du Pont, leur  fils, un officier du génie possédait le château de Saint-Maurice qui venait des Varcia auxquels succédèrent les Rostaing dit \"Symesson\", Siméon de Baratier en 1637 était notaire à Saint-Vincent de Barrés.","architecture":"Baix; deux châteaux sur la colline au nord \"château neuf\" et au sud \"château vieux\", construit en 1310, le plus important appelé \"château des Corbières \" dont il reste des vestiges sur la colline position stratégique sur le Rhône  était corseté de murailles  et dominé par un autre château fort  construit par les comtes du Valentinois tout deux disparurent au XVIIe siècle puisqu'ils  jouèrent un rôle important lors des guerres de religion. Deux tours réduites  \"à hauteur d'infamie \" sur ordre du duc de Lesdiguières en 1622, ainsi que les fortifications de la ville. La tour de l'horloge du XVIe siècle, ancienne porte du nord et passage de la rue royale.                             La Cardinale ancienne auberge au bord du Rhône.                                 Saint-Maurice, château construit au XIXe siècle appelé aussi \"le Sourd\".","habitants":"Baix: famille de Guigues de Roche        La cardinale: famille de Catherine de Richard.                                 Saint-Maurice: Famille Baratier \r\n        \"","divers":"Motte féodale des Corbières, \r\nLa Cardinale\r\nTour de l'Horloge\r\nChâteau Saint-Maurice","gps":"","images":["../../jctruffet.com/image/image_07/07_Baix_1.jpg","../../jctruffet.com/image/image_07/07_Baix_2.jpg","../../jctruffet.com/image/image_07/07_Baix_3.jpg","../../jctruffet.com/image/image_07/07_Baix_4.jpg","../../jctruffet.com/image/image_07/07_Baix_5.jpg","../../jctruffet.com/image/image_07/07_Baix_6.jpg"]},"Consult_chateau_formulaireae64":{"id":"Consult_chateau_formulaireae64","dept":"07","canton":"Vallon-Pont-d`Arc","commune":"Balazuc","nom":"Balazuc","type":"Vestiges","periode":"XII","histoire":"BALAZUC, de 1095 à 1099 Pons de Balazuc, premier seigneur connu, chevalier illustre qui prit la croix, collabora à la première croisade. En 1263 Guillaume de Balazuc, ce dernier vend à Guillaume des Eperviers de Balazuc, puis aux Borne de Balazuc jusqu'au XVIIe siècle, changea souvent de nom tout en restant dans la famille par alliance. Passa ensuite aux Hautefort de Lestrange, aux Fare, aux Bonnier de la Masson, en 1738 aux de Voguë.","architecture":"Cette forteresse date du Xe siècle, par les seigneurs de Balazuc, au XVe siècle le château était ruiné, il ne reste qu'une tour dite \"tour Prisonnière\" du Xe siècle et quelques vestiges de tours rondes et de remparts.","habitants":"Famille de Pons de Balazuc \r\nfamille de Guillaume des Eperviers \r\n        \"","divers":"Ballerand grav 1 à 4      Marval grav 5-6","gps":"","images":["../../jctruffet.com/image/image_07/07_Balazuc_1.jpg","../../jctruffet.com/image/image_07/07_Balazuc_2.jpg","../../jctruffet.com/image/image_07/07_Balazuc_3.jpg","../../jctruffet.com/image/image_07/07_Balazuc_4.jpg","../../jctruffet.com/image/image_07/07_Balazuc_5.jpg","../../jctruffet.com/image/image_07/07_Balazuc_6.jpg","../../jctruffet.com/image/image_07/07_Balazuc_7.jpg"]},"Consult_chateau_formulairefec3":{"id":"Consult_chateau_formulairefec3","dept":"07","canton":"Villeneuve-de-Berg","commune":"St-Ginies-en-Coiron","nom":"Balme_Montbrun","type":"Vestiges","periode":"X","histoire":"La Balme-Montbrun, cette région très sollicité entre les évêques de Viviers, les comtes du Valentinois et les seigneurs des Adhémars, en 1159 co-session faites aux habitants par l'évêque Raymond. En 1206 conflit entre le comte du Valentinois, Aymar II de Poitiers et Burnon évêque de Viviers.  En 1291 Hugues de la Tour seigneur de la Balme épousa Mabile fille de Bertrand de la Balme d'où le nom la Balme de Montbrun.   \r\nLe château restera dans cette famille jusqu'au XIVe siècle, il fut transmit en 1326 au comte du Valentinois Aymar de Poitiers.","architecture":"Balme-Montbrun; habitat castral troglodyte qui s'est développé dans les falaises de tuf situé sous le château, trente cavités, parfois à deux étages, certaines ont disparues suite à l'effondrement d'un pan entier de rocher, quelques uns de ces habitats étaient encore occupés à la fin du XVIIIe siècle.  Mis à part les cavités des grottes il ne reste plus rien du château.","habitants":"famille des Seigneurs de la Tour\r\n        \"","divers":"Habitations troglodytes","gps":"","images":["../../jctruffet.com/image/image_07/07_Balme_Montbrun_1.jpg","../../jctruffet.com/image/image_07/07_Balme_Montbrun_2.jpg","../../jctruffet.com/image/image_07/07_Balme_Montbrun_3.jpg","../../jctruffet.com/image/image_07/07_Balme_Montbrun_4.jpg"]},"Consult_chateau_formulaire2e5e":{"id":"Consult_chateau_formulaire2e5e","dept":"07","canton":"Les Vans","commune":"Banne","nom":"Banne","type":"Vestiges","periode":"XII","histoire":"BANNE, au XIIe siècle éxistait déjà le château primitif \"Castrum de Bana\", appartenant à la famille de Banne.\r\nLes seigneurs de Bannes, les premiers seigneurs les Arnaud de Banne, cette descendance y restèrent jusqu'en 1600 environ, puis passa ensuite à la famille des Grimoard de Roure, dont Guillaume de Grimoard,  élu pape sous le nom  de Urbain-V.\r\nIl y avait longtemps que la famille des comtes de Roure n'habitait plus le château quand la terrible tempête de 1792 éclata et détruisit la forteresse. En 1800 le comte de Roure vendit les pierres du château a Henri Colomb marchand au Vans.                                 Dans la commune deux autres châteaux  Lébres et de Lorques.                  LEBRES, Pierre du Teil était en 1402 commandeur de Saint-Jean de Jérusalem et de Jalès co-seigneur de Lébres, qui veut dire château des Lièvres fut construit au XVIIe Siècle par la famille Grimoard de Beauvoir de Roure.                  LORQUES fut construit par les seigneurs de Lorques, rappelons que Louis de Narbonne qui épousa Jacqueline de Maurin Dame de Lorques était le petit fils de Jeanne de Grimoard de Roure (propriété privée).","architecture":"Banne, de ce château qui était une somptueuse demeure, le bâtiment principal long de 170 mètres, et 80 mètres de large s'élevait de plusieurs étages  au-dessus d'une vaste  terrasse, suite à son incendie en 1792, aujourd'hui, il reste les écuries intactes  et quelques vestiges sur  le site de l'emplacement féodal dominant le village.                                   Lébres, corps de logis de forme carrée avec tour de guet plein centre.       Lorques; Cette maison forte a été construite au XVIIe siècle, trois corps de bâtiments en équerre  flanqués au centre d'une tourelle.","habitants":"Famille des Seigneurs de Banne  \r\nFamille des Comtes de Roure\r\n        \"","divers":"Beaumont du Lac  GPS : 45° 48' 2,06\" Nord, 1° 51' 53,19\" Est.                  Grav 1-6, grav-7ruines de ternes","gps":"45° 48' 2,06\" Nord, 1° 51' 53,19\" Est.                  Grav","images":["../../jctruffet.com/image/image_07/07_Banne_1.jpg","../../jctruffet.com/image/image_07/07_Banne_2.jpg","../../jctruffet.com/image/image_07/07_Banne_3.jpg","../../jctruffet.com/image/image_07/07_Banne_4.jpg","../../jctruffet.com/image/image_07/07_Banne_5.jpg","../../jctruffet.com/image/image_07/07_Banne_6.jpg"]},"Consult_chateau_formulairedc17":{"id":"Consult_chateau_formulairedc17","dept":"07","canton":"Vallon-Pont-d`Arc","commune":"Sampzon","nom":"Bastide_de_Sampzon","type":"Château","periode":"XVIII","histoire":"SAMPZON, le premier seigneur connu est Guillaume de Sampzon co-seigneur en 1197, en 1220, on trouvait Bertrand d'Adillon également co-seigneur, en 1308 le château est remis en hommage à l'évêque de Viviers par Arnauld et Raymond de Sampzon.\r\nAu XIVe siècle, Jaucelin d'Adillon était seul seigneur. Au XVIe siècle, il passait aux de Rochier, aux Pelletier, et aux Borne. Mgr de la Saumée marquis de la Garde de Chambonnas l'acquit en 1643, Hector de Lagarde Chambonnas vend la seigneurie de Sampzon il se fait appeler Pallier de Sampzonet tous ses biens à sa mort  passèrent à Jean-Louis Tardy de Montravel en 1780, puis fut revendu à plusieurs reprises et fit retour dans la famille de Montravel.","architecture":"Au sommet du rocher de Sampzon était établi le château fort qui fut en 1235 la propriété de  Bertrand de Chalencon,et avait comme co-seigneur Dalmace de Lagorce, le château fut rasé par les troupes royales commandé par monsieur de Chaussy en 1602, aucune trace de cette forteresse malgré une tour construite et démolie à la Révolution.\r\nLe premier château de la Bastide est connu dès 1308; Jusqu'au XVIe siècle, le château n'est constitué que de sa partie méridionale actuelle; le corps de logis quadrangulaire de trois étages  flanqué de deux tours rondes au Sud et d'un donjon crénelé saillant sur la partie Est du château. Ce château fut brûlé par les camisards en 1703, tombait en ruines, habitait par des fermiers jusqu'à  sa restauration effectuée de 1860 à 1875 par mademoiselle de Montravel.","habitants":"Famille de Raymond de  Sampzon  \r\nFamille de Jaucelin d Adillon\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Bastide_de_Sampson_1.jpg","../../jctruffet.com/image/image_07/07_Bastide_de_Sampson_2.jpg","../../jctruffet.com/image/image_07/07_Bastide_de_Sampson_3.jpg","../../jctruffet.com/image/image_07/07_Bastide_de_Sampson_4.jpg"]},"Consult_chateau_formulaire1f39":{"id":"Consult_chateau_formulaire1f39","dept":"07","canton":"Serrières","commune":"Bogy","nom":"Bayard_07","type":"Maison forte","periode":"XIV","histoire":"BAYARD, ce château  relevait des seigneurs de Peyraud sous le nom de Bayas (mal connu). En 1606 Nicolas de Peloux en fit hommage à Jean de Fay, qui le passa à son petit fils Jacques de Beaufort-Canillac, en 1670 Emmanuel Frédéric de Tana, hérita et le revend à Louis Gourdan, ce dernier le revendit à Madame de Voguë en 1770, au XVIIIe siècle, aux Grottier de Chambonnas. \r\nActuellement vendu à différents propriétaires.","architecture":"Il constituait une immense cour fermée par des murs et des corps de logis du XIVe et XVe siècle. \r\nAu XVIe siècle, il est pourvu d'un magnifique portail, malheureusement construit en mollasse, pierre qui s'altère rapidement à la pluie. \r\nC'est ce qui nous reste aujourd'hui de plus intéressant du château.","habitants":"Famille de Nicolas de  Peloux\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Bayard_Bogy_1.jpg"]},"Consult_chateau_formulaireac83-2":{"id":"Consult_chateau_formulaireac83-2","dept":"07","canton":"La Voulte-sur-Rhône","commune":"Beauchastel","nom":"Beauchastel","type":"Vestiges","periode":"XII","histoire":"BEAUCHASTEL, le premier château \"Bellum castrum\" date de 1179 par les premiers seigneurs, les Retourtour et les Briand qui font ériger des remparts et un donjon à base carrée. Le bourg est situé sous l'ancien château, au confluent de la rive ardéchoise du Rhône et de l'Eyrieux, le port à péage était un important lieu d'échanges. L'évêque de Valence en fait don à son neveu Odon de Retourtour. \r\nEn 1376, aux Tournon par  le mariage d'Alix de Retourtour et de Jacques Ier de Tournon.\r\nAu XVe siècle aux Tournon, puis aux Crussol; en 1654 aux Levis-Ventadour, en 1717 aux Rohan-Soubise, fin XVIIIe siècle à la Famille d'Uzés.","architecture":"Le Bellum Castrum faisait partie d'un village fortifié groupé autour d'un donjon, la cité détruite au XIVe siècle par les \"routiers\", puis la guerre de religion en 1621 entraîne la destruction de la cité de l'église et des remparts. Aujourd'hui il ne reste que quelques vestiges du donjon et des éléments dans la cité.","habitants":"famille d'Odon de Retourtour            les seigneurs de Crussol  \r\nfamille des Levis-Ventadour\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Beauchastel_1.jpg","../../jctruffet.com/image/image_07/07_Beauchastel_2.jpg","../../jctruffet.com/image/image_07/07_Beauchastel_3.jpg","../../jctruffet.com/image/image_07/07_Beauchastel_4.jpg","../../jctruffet.com/image/image_07/07_Beauchastel_5.jpg"]},"Consult_chateau_formulaired2d7":{"id":"Consult_chateau_formulaired2d7","dept":"07","canton":"Joyeuse","commune":"St-Alban-Auriolles","nom":"Beaumefort","type":"Château","periode":"XV","histoire":"Beaumefort: De 1450 les familles connues sont; Pons d'Agulhac seigneur de Baumefort, en 1480 Jean de Montchenu, évêque de Viviers reçut l'hommage de Pons d'Agulhac, vendu en 1629 aux d'Anglejan, puis revendu en 1752 à Charles de Richard de Saint-Alban, conseiller à la cour des comptes.\r\nJean Richard de Beaumefort émmigra en 1789.                                    Ce château avait initialement un rôle militaire, et surveillait, avec le château de la Bastide (au pied du Sampzon, côté Grospierres) la vallée du Chassezac.\r\n Au XVIe siècle, le capitaine Balmefort, Pierre dAgulhac, entretenait une compagnie. Dans ces temps incertains le château était pour les habitants de Saint-Alban un refuge en cas de danger et en contrepartie ils participaient à lentretien des murs du château.\r\n Les premiers propriétaires furent les dAgulhac, famille originaire des Cévennes. Puis le château fut vendu en 1629 aux dAnglejean qui le revendirent à leur tour en 1752 à Charles de Richard de Saint-Alban qui avait épousé Suzanne La Tourre de Peyroche. Leurs descendants prirent alors, comme cétait lhabitude, le patronyme de Richard de Beaumefort.\r\nLe château est la propriété de monsieur de Limaire.","architecture":"Du XIVe siècle; corps de logis rectangulaire, trois étages flanqués de deux grosses tours rondes, échauguettes de surveillance donne l'impression de forteresse, tours crénelées dont nous voyons encore les supports.\r\nCe château fut assailli par les huguenots, le seigneur de Ligonés y fut tué.","habitants":"Famille de Pons d'Agulhac \r\nSeigneur de Beaumefort\r\n        \"","divers":"Boisseuil GPS : 45° 46' 15\" Nord et 1° 19' 56\" Est                                          Garenne grav-1  GPS : 45° 46' 15\" Nord, 1° 19' 56\" Est                                Faugeras grav-2,            Beauregard grav- 3","gps":"45° 46' 15\" Nord et 1° 19' 56\" Est","images":["../../jctruffet.com/image/image_07/07_Beaumefort_1.jpg","../../jctruffet.com/image/image_07/07_Beaumefort_2.jpg","../../jctruffet.com/image/image_07/07_Beaumefort_3.jpg","../../jctruffet.com/image/image_07/07_Beaumefort_4.jpg","../../jctruffet.com/image/image_07/07_Beaumefort_5.jpg"]},"Consult_chateau_formulaire8a4b":{"id":"Consult_chateau_formulaire8a4b","dept":"07","canton":"Rochemaure","commune":"St-Pierre-la-Roche","nom":"Beaupre","type":"Maison forte","periode":"XV","histoire":"Beaupré, cette maison forte qui commandait la vallée de Lavezon fut l'apanage de la famille Guilhon du XV au XVIIe siècle, passa après la Révolution a monsieur de Varenne et depuis 1963 à la famille Faure qui l'on remanié et transformé en ferme, l'exploite toujours.","architecture":"Bâtisse rectangulaire à trois étages du XVe siècle,  possède encore deux  échauguettes et bretèches.","habitants":"Famille de Montan Guilhon  \r\nMonsieur Varenne\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Beaupre_1.jpg","../../jctruffet.com/image/image_07/07_Beaupre_2.jpg"]},"Consult_chateau_formulairede56":{"id":"Consult_chateau_formulairede56","dept":"07","canton":"St-Pierreville","commune":"St-Etienne-de-Serres","nom":"Bernard","type":"Maison forte","periode":"XVI","histoire":"A Saint-Etienne de Serres deux châteaux dont celui de Bernard et de la Maison forte de la Cheysserie               Bernard: ce château appelé aussi château Freydier, Il tient son nom de la famille Bernard, Seigneur de Cros, héritier en 1615 puis à son neveu, Jacques de Bay et restera dans la famille jusqu'en 1940, puis racheté par la famille Bonnet, instituteur puis par les Lesur, colonel.  CHEYSSERIE: La seigneurie connue  dés le XIVe siècle des Trémolet de la Cheysserie, furent  co-seigneurs de Montagut et seigneur de Craux qui prirent part activement aux guerres de religion du XVIe siècle surtout noble Jacques du Trémolet et Alexandre du Trémolet son cousin, tout deux étaient protestants; cette famille donna de nombreux officiers dans l'armée dont plusieurs chevaliers de Saint-Louis. Les Trémolet de la Cheysserie  furent représentés à l'assemblée de la noblesse de Villeneuve-de-Berg en 1789 par Louis-Annet du Trémolet de Lacheysserie. Le dernier de cette maison  fut Maurice du Trémolet de Lacheysserie, sous lieutenant, chevalier des dragons d'Annam, mort en 1892 au Tonkin.","architecture":"Construction de cette maison  forte dit château Bernard de style renaissance  à deux étages autour du  XVIe siècle flanquée de deux tours rondes arasées, classique en Ardèche.   \r\nCheysserie; maison forte a deux étages et attique flanqué de deux tours rondes et d'une échauguette, l'ensemble à toits plats en tuiles  provençales.","habitants":"Famille Bernard  \r\nSeigneur de Cros  \r\nFamille de Jacques de Bay\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Bernard_1.jpg","../../jctruffet.com/image/image_07/07_Bernard_2.jpg","../../jctruffet.com/image/image_07/07_Bernard_3.jpg"]},"Consult_chateau_formulairec190":{"id":"Consult_chateau_formulairec190","dept":"07","canton":"Villeneuve-de-Berg","commune":"Berzème","nom":"Berzeme","type":"Manoir","periode":"XVI","histoire":"Berzème:  Gaspard du Mantin acheta les terres en 1634 sur ce domaine il fit     construire par Jean Claude de Fayon seigneur du Clap, cette maison forte appartenait aux Montbrun en 1711 aux Allies-Montbrunet en 1760 à un noble Fayon Baron de Montbrun seigneur du Clap, ce dernier avait épousé Suzanne de Joviac.l'abbé Antoine de Fayon  frére du chanoine du viviers en hérita.  Passa en 1782 à Jean de Roqueplane  receveur des tailles du Vivarais, dernier seigneur du château de l'Allier sur Coiron jusqu'en 1845 son cousin Le chanoine de Tavernol de Barrés, puis à  Eugéne de Villedieu hérita sous préfet de l'Ardéche.  \r\nA servit d'hôtel de Ville.","architecture":"Berzéme château construit au XVIIe siècle sur les ruines de l'ancien bâtiment, corps de logis rectangulaire flanqué sur sa façade Sud de deux  tours rondes crénelées à l'origine, arasées de trois étages.","habitants":"famille de Claude de Fayon\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Berzeme_1.jpg","../../jctruffet.com/image/image_07/07_Berzeme_2.jpg","../../jctruffet.com/image/image_07/07_Berzeme_3.jpg"]},"Consult_chateau_formulaire98c0":{"id":"Consult_chateau_formulaire98c0","dept":"07","canton":"Vallon-Pont-d`Arc","commune":"Bessas","nom":"Bessas","type":"Maison forte","periode":"X","histoire":"Bessas: Construit par le chef protestant Laurent Cheyrési rénové par les seigneurs de Roure jusqu'en 1820, où il fut acheté et partagé par quatre habitants de Bessas. Aujourd'hui gîtes de France.","architecture":"Château seigneurial flanqué de quatre tours rondes du Xe siècle, rénové.","habitants":"Famille de Laurent Cheyresi\"","divers":"A Bussièrre-Boffy GPS : 45° 37' 41\" Nord et 1° 02' 16\" Est  grav-1-2,        Joncherolles grav-4,           Lachenaud 46°2'49\"N   0°51'19\"E.  grav 5-6","gps":"45° 37' 41\" Nord et 1° 02' 16\" Est  grav-1-2,        Joncher","images":["../../jctruffet.com/image/image_07/07_Bessas_1.jpg","../../jctruffet.com/image/image_07/07_Bessas_2.jpg"]},"Consult_chateau_formulaire56e1":{"id":"Consult_chateau_formulaire56e1","dept":"07","canton":"St-Péray","commune":"St-Romain-de-Lerps","nom":"Besset","type":"Maison forte","periode":"XVI","histoire":"Besset; le 6 Septembre 1578, dans la maison forte du Besset, en salle basse du dit lieu, le noble Antoine de Vernoux, écuyer, seigneur du Besset et du Monestier, dictait son testament. Il était le dernier descendant d'une lignée, la première attestée en ces lieux et qui les occupa de 1433 à 1578.\r\nPar delà des siècles, ceux qui ont découvert et aimé cette terre et cette demeure, ont voulu leur rendre vie.\r\nEntre 1740 et 1782 le château du Besset appartenait à noble Jean-François de Reboulet d'Aureshe, baron de Rochebloine et de Pailharez.\r\nEn 1782, la propriété fut vendue à Raymond Terras, avocat  du barreau de Toulouse. Cette maison forte résista au temps et aux événements avec des vicissitudes diverses jusqu'en 1960 ou elle fut transformée en hôtel de luxe, par l'un des inventeurs de la restauration d'entreprise.\r\nDans les années 60 à 70 des transformations et de trés importants travaux d'environnements, le château a obtenu 4 étoiles,  tout le show-biz et le monde sportif et politique y venaient régulièrement s'y ressourcer.\r\nEn 1985 la société \"Nippon-Sangyoo\" déjà propriétaire de plusieurs châteaux, se porte acquéreur de cet hôtel par l'intermédiaire de Kiko Nakaharo, fille du PDG de la \"Nippon\".\r\nLa gestion confié à son mari Jean-Claude Perrez Vannestre, plus connu sous le nom de Jean-Paul Renoir, PDG de la holding des châteaux. Le château fut délapidé, voir même abandonné au pillage.\r\nDes travaux de restauration sont entrepris  depuis l'achat du château en 2009 par les nouveaux propriétaires Florence et Pablo Estrader.","architecture":"Construit au XVe siècle, d'un corps de logis rectangulaire flanqué de pavillon remanié  et de deux tours rondes dont une grosse en façade, trois étages .","habitants":"famille d' Antoine de Vernoux  \r\nSociété de Kiko Nakaharo\r\nFamille Estrader\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Besset_1.jpg","../../jctruffet.com/image/image_07/07_Besset_2.jpg","../../jctruffet.com/image/image_07/07_Besset_3.jpg","../../jctruffet.com/image/image_07/07_Besset_4.jpg","../../jctruffet.com/image/image_07/07_Besset_5.jpg"]},"Consult_chateau_formulaire6643":{"id":"Consult_chateau_formulaire6643","dept":"07","canton":"Lamastre","commune":"St-Prix","nom":"Besset_St_Prix","type":"Manoir","periode":"XV","histoire":"Besset Saint-Prix, au XVe siècle le manoir était habité par la famille de Besse. Laurent, son fils Antoine, qui prit  le nom de Besset. Cette famille fournit des chanoines de Paul et de Saint-Just à Lyon jusqu'au XIXe siècle, cette seigneurie resta dans cette famille jusqu'en 1675 passa au  Soubeyran puis à  de Just-Henry de Ginestous de la Tourette, Baron de Chalencon.  Les du Besset continuèrent dans les armées avec des fonctions de capitaines châtelains à Lamastre, Desaignes et Maisonseule; un Xavier était maire en 1871 à Lamastre.   Depuis la Révolution la famille des  du Besset vécurent entre le château de Saint-Prix sous le nom des Soubeyran de Saint-Prix et du château des Sauvages par Desaignes.","architecture":"Château quadrangulaire à trois niveaux modernisé mais a gardé sa tour carrée et sa bretèche à l'entrée, aujourd'hui utilisé comme lieu  de vacances pour hollandais.","habitants":"Famille de Besse\r\n        \"","divers":"Manoir de saint-Prix","gps":"","images":["../../jctruffet.com/image/image_07/07_Besset_St_Prix_1.jpg","../../jctruffet.com/image/image_07/07_Besset_St_Prix_2.jpg"]},"Consult_chateau_formulaireb51f":{"id":"Consult_chateau_formulaireb51f","dept":"07","canton":"Chomérac","commune":"Chomérac","nom":"Bijoux","type":"Manoir","periode":"XVIII","histoire":"Bijoux, la famille Barrès du Molard descendant des barons de Barrès. Nobles Alexandre de Barrès, sieur du Mollard, capitaine, châtelain du Pouzin. Cette famille fournit un maréchal de camp, des officiers, des capitaines, des gouverneurs, des chevaliers de Saint-Louis et reçurent le titre de vicomte en 1815. Jean-Scipion-Fleury de Barrès  qui épousa Marie-Anne-Josephe Tardy de Montravel La Boissy habitèrent au château du Bijou, cette famille à quitté la région fin XIXe siècle pour Paris.\r\nCe château passa en 1870 à Gustave-Louis-Alphonse de Sampigny d'Issoncourt, officier d'infanterie décédé en 1889 et vendu à  André Bouvier, syndic de Privas, puis aux Garel.","architecture":"Corps de logis rectangulaire à trois étages, flanqué de quatre tourelles crénelées.","habitants":"Famille d'Andre Bouvier\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Bijoux_1.jpg","../../jctruffet.com/image/image_07/07_Bijoux_2.jpg","../../jctruffet.com/image/image_07/07_Bijoux_3.jpg","../../jctruffet.com/image/image_07/07_Bijoux_4.jpg"]},"Consult_chateau_formulaire39ae":{"id":"Consult_chateau_formulaire39ae","dept":"07","canton":"Thueyts","commune":"Thueyts","nom":"Blou","type":"Château","periode":"XII","histoire":"Blou, la famille de Pressis, dont  Marguerite fille héritière épousa, le 14 février 1461, noble François de Blou chevalier écuyer et chambellan du roi Louis XI, dont sa descendance s'éteignit en la personne d'Oscar en 1886, Pierre le fils du Baron Léonce de Cassin, hérite, vendit en 1900 à la famille Montravel qui ses derniers vendirent le château à la ville en 1986.","architecture":"D'origine du XVe siècle, a été remanié plusieurs fois jusqu'au XVIIIe siècle pour devenir un château de plaisance; corps de logis rectangulaire  à trois étages flanqués de deux pavillons en saillie dont celui de droite avec  échauguettes à toits pointus.","habitants":"Famille de François de Blou\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Blou_1.jpg","../../jctruffet.com/image/image_07/07_Blou_2.jpg","../../jctruffet.com/image/image_07/07_Blou_3.jpg","../../jctruffet.com/image/image_07/07_Blou_4.jpg","../../jctruffet.com/image/image_07/07_Blou_5.jpg","../../jctruffet.com/image/image_07/07_Blou_6.jpg","../../jctruffet.com/image/image_07/07_Blou_7.jpg"]},"Consult_chateau_formulairecf8b":{"id":"Consult_chateau_formulairecf8b","dept":"07","canton":"Vernoux","commune":"Boffres","nom":"Boffres","type":"Vestiges","periode":"XII","histoire":"BOFFRES: A l'origine un seigneur de Balfre et le château de Balfram est signalé sur une charte du XII e siècle, le seigneur Galbert de Balfre en 1160, ce fief est apporté en dot à la maison des Poitiers, puis par alliance à la famille d'Anduze.  En 1475 l'évêque de Valence en rend hommage à Raymond de la Voulte. \r\nEn Août 1585, Jacques de Chambaud y forme un camp de 1200 hommes pour combattre le comte de Tournon. \r\nLe dernier seigneur propriétaire du château fut Henri d'Aumale huitième fils de Louis Philippe héritier des princes de Rohan-Soubise.                        Dans la commune le château des FAUGS: dessiné en 1886 par Vincent d'Indy, dont la famille est originaire de l'Ardèche depuis le XVe siècle, et s'y installa le 20 juin 1890 (compositeur) pour y séjourner en été, il est toujours dans la famille.                            CHABRETS, vers 1600 Guillaume d'Indy qui épousa en 1625 Marguerite du Pont, de leur mariage naquit Charles d'Indy de Chabret qui épousa en 1650 Judith de Praneuf et Joseph-Isaïe-Saint-Jean d'Indy, il fut préfet de l'Ardèche et avait épousé en 1791 mademoiselle Bertrand de Pélissier de ce mariage; trois enfants: Jean-Guillaume d'Indy, Melle d'Indy et Théodore d'Indy, fut garde d'honneur de Napoléon épousa en 1830, Thérèse Charier il eu deux fils le comte Wilfrid d'Indy et le Vicomte Vincent d'Indy compositeur. Le domaine appartient à la famille de Pampelone.","architecture":"Boffres Sur une vaste enceinte polygonale  le  château  du XIIe siècle, qui fut complètement ruiné au XVIIIe siècle, il ne reste qu'un pan de mur en équerre et d'un pan de tour.         Faugs; en 1886 début de la construction du château moderne, de style néogothique, les travaux s'achèvent en  1890, de plan quadrangulaire, deux étages sur un soubassement et un étage de combles. \r\nIl consiste dans un corps central flanqué d'ailes en légère saillie couverte d'un toit à deux pentes. \r\nLa façade principale offre en son centre un avant corps en encorbellement coiffé d'un toit en pyramide.                  Chabrets; magnifique  construction  précédée d'une somptueuse  terrasse, qui recouvre peut-être des bâtiments  plus anciens. Corps de logis rectangulaire à deux étages flanqué de trois pavillons  de trois étages ( extrémité et central ).","habitants":"Famille d'Henri d'Aumale \r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Boffres_1.jpg","../../jctruffet.com/image/image_07/07_Boffres_2.jpg","../../jctruffet.com/image/image_07/07_Boffres_3.jpg","../../jctruffet.com/image/image_07/07_Boffres_4.jpg","../../jctruffet.com/image/image_07/07_Boffres_5.jpg","../../jctruffet.com/image/image_07/07_Boffres_6.jpg","../../jctruffet.com/image/image_07/07_Boffres_7.jpg","../../jctruffet.com/image/image_07/07_Boffres_8.jpg"]},"Consult_chateau_formulaire2353":{"id":"Consult_chateau_formulaire2353","dept":"07","canton":"Vallon-Pont-d`Arc","commune":"Balazuc","nom":"Bories","type":"Maison forte","periode":"XVI","histoire":"Borie: Jacqueline de la Borie, nièce de Gabrielle de Borne, veuve du seigneur de Balazuc, était une maîtresse délaissée par Louis XIV, qui serait venu cacher ici sa peine, elle épousa Charles de la Fare en 1643 devenue veuve se remarie avec Scipion de Grimoard de Beauvoir de Roure. Jacqueline mourut en 1710. \r\nLe château resta longtemps inhabité et échu aux Voguë. \r\nEn 1576 le 3 février, c'est dans se château où a été négocié la trêve entre  Olivier de Serres (protestant) et le comte de Voguë (catholique) avec une trentaine de députés.","architecture":"Cette maison forte du XVIe siècle de  construction rectangulaire  à  trois étages flanquée de grosses tours rondes en angles à toits coniques assez plats donne l'impression d'une forteresse.","habitants":"famille de Jacqueline de Borie\r\nFamille de Voguë\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Borie_1.jpg","../../jctruffet.com/image/image_07/07_Borie_2.jpg"]},"Consult_chateau_formulaireac2f":{"id":"Consult_chateau_formulaireac2f"," ir appartenu aux de l'Estranges, revient à la fin du XVIIIe aux du Bourg de Saint-Polgues, puis à monsieur Floriel-la-Condamine, puis à Madame Floriel d'Estezet et à la famille Bonnet de Claustres.\r\nAujourd'hui propriété de la famille Braccond.","architecture":"Ce château  construit au XIIe siècle , donne l'aspect d'une forteresse, mais  à  subit  d'énormes  remaniements   au XVe siècle.\r\nActuellement deux corps de logis séparés, un transformé en habitation sur la place du village, a conservé une partie de ses tourelles et de ses murailles, donnant au village un aspect  fortifié.\r\nUne adjonction des XVII et XVIIIe siècle adossée au mur d'enceinte, a été modernisée.","habitants":"Les seigneurs de Boson \r\nFamille d'Emmanuel Du-Bourg\r\nFamille Braccond\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Bosas_1.jpg","../../jctruffet.com/image/image_07/07_Bosas_2.jpg","../../jctruffet.com/image/image_07/07_Bosas_3.jpg","../../jctruffet.com/image/image_07/07_Bosas_4.jpg","../../jctruffet.com/image/image_07/07_Bosas_5.jpg"]},"Consult_chateau_formulaire7274":{"id":"Consult_chateau_formulaire7274","dept":"07","canton":"Bourg-St-Andéol","commune":"St-Martin-d`Ardèche","nom":"Bosquet","type":"Maison forte","periode":"XVI","histoire":"Histoire de Saint-Martin qui s'appelait autrefois Saint-Martin de la Pierre jusqu'à la Révolution faisait partie de l'ancienne communauté d'Aiguèze, un conseil était élu chaque année;, au spirituel faisait partie du diocèse d'Uzes, lors de la séparation des deux départements St-Martin passa à l'Ardèche. Bosquet, bâti par Claude de Tournon (1520) évêque de Viviers, propriété du comte de Roure ( Jean Jacques de Beauvoir de Roure) en 1551. \r\nPuis  passa à la famille d'Harcourt-Lorraine en 1555, puis  le domaine fut cédé à Charles-François de Fayn de Rochepierre en 1716, les Voguë (Felix) en fit l'acquisition en 1778  pour Eugène de Voguë âgé alors de dix ans, il  en prendra  possession en 1810  jusqu'en 1824. \r\nCe domaine fut réquisitionné à la révolution, Eugène préféra  toucher sa part du fameux  \" milliard d'émigrés \" de Charles X. \r\nDonc acquit par monsieur Chalvet le 23 mars 1794 qui le revendra en 1810 à Eugène de Voguë  et ce dernier  le revend en 1824 à Jean François Roche  qui le gardera jusqu'en 1855.","architecture":"Bosquet; construction de forme  quadrilatère avec quatre tours rondes arasées et une tour d'escalier massive, la façade plein Sud, donne sur l'Ardèche les bâtiments annexes ont été ajoutés à l'Est postérieurement. \r\nBelles fenêtres à meneaux.","habitants":"Famille de Claude de Tournon.\"","divers":"A Chatenet Dognon, Orgnac grav 1-2, Brutines-grav-3 Rosier grav-4-5","gps":"","images":["../../jctruffet.com/image/image_07/07_Bosquet_1.jpg","../../jctruffet.com/image/image_07/07_Bosquet_2.jpg"]},"Consult_chateau_formulaire5b5f":{"id":"Consult_chateau_formulaire5b5f","dept":"07","canton":"Tournon","commune":"Boucieu-le-Roi","nom":"Boucieu_le_roi","type":"Patrimoine","periode":"XV","histoire":"Boucieu le Roi: en 1291, Hugues de la Tour du Pin évêque de Viviers et le seigneur de Boucieu Géranton de Saint-Romain de Valmordane céda à Philippe le Bel, roi de France la seigneurie de Boucieu,  cette cité était une capitale médiévale du Haut-Vivarais avec baillage royal, cette charte  fut confirmée par le roi, le roi était seigneur avec divers co-seigneurs,  tel que les d'Angerez, les Clavières, les de Lestrange, les de Beaudin.                                De cette époque reste la maison du bailli du XVIe siècle.  En 1564 le baillage fut transféré à Annonay, et Boucieu fut rattaché à la commune de Colombier le Jeune.  \r\nEn 1712 Pierre Vigne prêtre missionnaire s'installe à Boucieu, créa le chemin de croix composé de 39 chapelles, une partie de ces dernières furent démolies lors de la Révolution et reconstruit en 1883.  A cette époque fut construit à l'emplacement du château le couvent des soeurs du très-Saint-Sacrement dont la maison mère était à Valence, Pierre Vigne qui avait sa maison dans Boucieu, y logea les péllerins du grand chemin de Croix.","architecture":"la maison du bailli, belle bâtisse en pierre de granit taillé avec une échauguette.","habitants":"Philippe le Bel Roi de France\r\n        \"","divers":"Maison du bailli,, couvent des soeurs et maison forte de Tracollas.","gps":"","images":["../../jctruffet.com/image/image_07/07_Boucieu_le_roi_1.jpg","../../jctruffet.com/image/image_07/07_Boucieu_le_roi_2.jpg","../../jctruffet.com/image/image_07/07_Boucieu_le_roi_3.jpg"]},"Consult_chateau_formulaire175d":{"id":"Consult_chateau_formulaire175d","dept":"07","canton":"Annonay","commune":"Boulieu-les-Annonay","nom":"Boulieu les Annonay","type":"Bourg fortifié","periode":"XII","histoire":"BOULIEU les Annonay: village fortifié, la première mention de Boulieu date de 1095 et en 1222 on trouve un Pierre de Boelieu, et en 1308 Albert de Boulieu. \r\nAu XIVe siècle la cité fortifié s'appelé \"castrum de Belliloci\", au XVIIIe siècle appartenait aux Rohan Soubise.\r\nMARS: château situé dans la commune; Josué et Louis d'Argoud s'installèrent en 1696 au château de Mars, ces deux frères épousèrent deux filles de la région d'Annonay tous deux consuls d'Annonay et cette famille donna à la France des officiers,  des religieux, et d'autres. Un noble Barthélémy Lombard seigneur de Mars capitaine d'artillerie et chevalier de Saint-Louis avait épousé en 1769 Florie de Bouvier des Marets, ils eurent trois filles mariées dans les familles de Missolz Girodon et Peloux et leur fils François-Barthélémy épousa une fille de Soubeyran de Beauvoir, vendirent le château et s'installa à Estrablin.\r\nMais on trouva une Jeanne de Lombard de Mars née en 1786 et morte en 1861  au château  de Mars, elle avait épousé Henri-Jérome-Louis Traversier de Lassagne de Monteils lieutenant d'infanterie et chevalier de Saint-Louis.\r\nEn 1578 monsieur Louis de Boulieu seigneur de Charlieu à épousé Suzanne de Villars passa en 1579 à Meyraud de Boulieu écuyer seigneur de Jarnyeu et Charlieu.","architecture":"Boulieu; il en reste aujourd'hui cinq tours et des murailles d'enceintes d'une cité fortifiée  qui comprenait neuf tours, une partie de la ville fut détruite en 1575 par un incendie, au centre de l'enceinte s'élevé une tour de guet,  elle fut détruite  pour agrandissement de la place.            L'Hôtel de Ville a un cachet extérieur qui vaut le détour.\r\nDu château de Mars dans la commune; château de style Napoléon III avec pavillon central saillant en façade  et tour ronde à l'est à toit pointu.","habitants":"famille de Boulieu\r\nFamille Rohan-Soubise\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Boulieu_les_Annonay_1.jpg","../../jctruffet.com/image/image_07/07_Boulieu_les_Annonay_2.jpg","../../jctruffet.com/image/image_07/07_Boulieu_les_Annonay_3.jpg"]},"Consult_chateau_formulaire7b86":{"id":"Consult_chateau_formulaire7b86","dept":"07","canton":"Vals-les-Bains","commune":"St-Michel-de-Boulogne","nom":"Boulogne","type":"Vestiges","periode":"XIV","histoire":"Boulogne, au XIIIe siècle le château de Boulogne était inféodé à la seigneurie des comtes de Valentinois par le comte de Toulouse qui le possédait depuis le XIe siècle.  La lignée des Poitiers le conservèrent jusqu'en 1384.\r\nRacheté par Raoul de Lestrange, lieutenant de Raymond de Turenne, l'un de ses petits-fils, Raoul, devint chambellan de Charles VII. Antoine de Lestrange fut écuyer de Louis XI, puis chambellan de Louis XII, sénéchal d'Agenais et de Gascogne en 1503. Son fils Louis de Lestrange vivait à la cour et fut serveur de François Ier, d'Henri II et de Charles IX, lieutenant pour le roi en Languedoc en 1566. La baronnie de Boulogne était administrée par Gratien des Mottes qui vivait au château. Louis de Lestrange prit par au combat pour reprendre Aubenas, échoua mourut en 1563, son fils Claude de Lestrange, embrassa la cause protestante et fut tué à Moncontour en 1569. Il n'eut qu'une fille  qui épousa en 1579 le seigneur du Teil, René de Hautefort gouverneur du Puy et sénéchal du Velay pour Henri IV et Louis XIII. \r\nAprés la mort de René de Hautefort de Lestrange en 1622, le fief échoit à son fils, vicomte de Cheylanne et seigneur de Boulogne qui épousa Paule de Chambaud, dame de Privas, provoqua par ce mariage la reprise des guerres de religion au XVIIe siècle, Claude compromis dans un complot contre le duc de Montmorency, meurt sur l'échafaud en 1632.\r\nEn 1638  Marie la fille de Claude hérita, épousa Charles de Saint-Nectaire, puis par succession, le château passe ensuite à Marie-Louise de Saint-Nectaire épouse de Louis de Crussol, puis à leur fille Anne femme de Louis Armand de Richelieu, duc d'Aiguillon et en 1721 revint ensuite dans la famille de Charles-Louis César de Fay, marquis de Gerlande et à Charles-César de Fay, futur comte de la Tour-Maubourg,colonel à la Révolution, député de la noblesse du Puy aux états généraux de 1789, déserta lors de la poursuite de Louis XVI, passa chez les Autrichiens en 1792, fut emprisonné jusqu'en 1797, à son retour en France se rallia a Bonaparte, nommé sénateur et gouverneur de Cherbourg et pair de France,  très jeune vend les terres, garde que le château qui  sera vendu en 1793 comme bien national à Mr Barnier qui le revendit.\r\n L'abbé Fuzet le racheta et le revendit en 1881 au marquis de Romanet de Lestrange. \r\nEn 1960 le château est cédé à Monsieur Gérard de Villeneuve qui tente de le relever et le cède à son tour à Madame Ritter  qui réhabilite le corps de logis, puis en 1996 le château passe à la famille Aubry qui continu l'effort de rénovation.","architecture":"Ce château qui avait atteint au XIVe siècle une structure de forteresse avec chapelle, donjon carré, une enceinte flanquée  de tours cylindriques, pont levis à double arche et chemin de ronde couronnant les remparts. \r\nAujourd'hui, en ruines depuis les guerres de religion, fascine encore. Il conserve un donjon à mi-hauteur et quatre tours d'angle qui sont toujours à l'état de ruines, la chapelle, les écuries et les bâtiments du corps de garde ont été restaurés, et a gardé son portail d'entrée, fronton porté par quatre colonnes dont celle du centre son torsadées.","habitants":"Famille de René de Hautefort de Lestrange.\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Boulogne_1.jpg","../../jctruffet.com/image/image_07/07_Boulogne_2.jpg","../../jctruffet.com/image/image_07/07_Boulogne_3.jpg","../../jctruffet.com/image/image_07/07_Boulogne_4.jpg","../../jctruffet.com/image/image_07/07_Boulogne_5.jpg","../../jctruffet.com/image/image_07/07_Boulogne_6.jpg","../../jctruffet.com/image/image_07/07_Boulogne_7.jpg","../../jctruffet.com/image/image_07/07_Boulogne_8.jpg"]},"Consult_chateau_formulaired4c5":{"id":"Consult_chateau_formulaired4c5","dept":"07","canton":"Bourg-St-Andéol","commune":"Bourg-St-Andéol","nom":"Bourg_St_Andéol","type":"Manoir","periode":"XVII- XIX","histoire":"BOURG SAINT-ANDEOL, ancienne cité, lieu du martyr de Saint-Andéol, dépendait des prêtres constituant une université par les récollets, les Visitandines, les Ursulines et la Présentation, l'hôpital relevait des Hospitaliers de Saint-Jean de Trignan et des religieux de Saint-Esprit et la Maladrerie en 1640 par les Barnabites. Les évêques de Viviers resteront seigneurs jusqu'à la Révolution, entouré de co-seigneurs, comme Claude Tournon 1498-1542 qui y fit construire le palais épiscopal, des remparts avec trois tours pour protégeaient la ville et péage sur le Rhône depuis 1252.                      De nombreux édifices furent construit maisons et hôtels particuliers, tel  que celui de Nicolay (voir article).\r\nPRADELLE: Maison bourgeoise construite par Pierre Pradelle, son fils Marc  banquier châtelain, admirable courageux, homme de grande générosité qui va se ruiner  et à sa mort les enfants durent vendre pour payer les frais de succession, vendue à la ville pour une maison de retraite.              BELLEVUE, cette maison forte fut acheté à monsieur Louis  Antoine Brun  par les révérends père Gillièsme et Angelvin de l'ordre des Récollets  pour en faire leur première résidence, la communauté du même ordre y avait séjourné avant la Révolution de 1789.                    Les révérends vendirent en 1863 à monsieur Galdin. En 1944 le docteur Constantin Tzélepoglou se réfugie à Bellevue, puis monsieur Lelouch y résida quelques années .                  Aujourd'hui propriété de monsieur Christophe Chopitel.                    CHEYLAD: toujours habité par les descendants du premier propriétaire, longtemps occupé par la famille de Saladins de Chauvas, ce domaine était au XVIIIe siècle un rendez vous de chasse.  Propriétaire actuel  famille de Joseph de Fromont.\r\nRROCHECOLOMBE: construit au XVIIe Siècle, par la famille Pontal, aujourd'hui exploitation vinicole.                  VINSAS: ancien domaine des surs Ursulines jusqu'en 1779, cette demeure fut acquise en 1795 par Pierre-Charles Pellier, planteur à Saint-Dommingue, il fut maire de Bourg-Saint-Andéol et conseillé général du canton de 1825 à 1830, dont une fille épousa  Pichot de l'Espinasse  et la deuxième Louise épousa Antoine Chaigne, arrière grand-père des propriétaires actuels qui en ont fait une  exploitation vinicole.","architecture":"Pradelle: maison bourgeoise construite en 1820 dans un style baroque carrée à divers niveaux et une tourelle carrée.   Bellevue: corps de logis en forme d'équerre flanqué sur angle nord est d'une tour crénelée et sur la partie sud d'une tour carrée.                    Cheylad: cette maison forte a eu d'importants travaux au XIX et XXe siècle par Félix Tardy de Montravel, elle fut un temps logis de France.\r\nRochecolombe: corps de logis rectangulaire à deux étages et attique, fronton plein cintre,  bâtiment flanqué de deux pavillons en saillis.            Vinsas; gentilhommière, bâtiment rectangulaires  à trois étages flanqué d'une tour rectangulaire.","habitants":"Famille de Marc et pierre Pradelle Famille d'Antoine Brun \r\nFamille Saladins de Chauvas\r\nFamille Pontal\r\n        \r\n        \"","divers":"Château de Bellevue\r\nManoir du Cheylad\r\nManoir du Pradelle\r\nManoir de Rochecolombe\r\nGentilhommière de Vinsas","gps":"","images":["../../jctruffet.com/image/image_07/07_Bourg_St_And%c3%a9ol_1.jpg","../../jctruffet.com/image/image_07/07_Bourg_St_And%c3%a9ol_2.jpg","../../jctruffet.com/image/image_07/07_Bourg_St_And%c3%a9ol_3.jpg","../../jctruffet.com/image/image_07/07_Bourg_St_And%c3%a9ol_4.jpg","../../jctruffet.com/image/image_07/07_Bourg_St_And%c3%a9ol_5.jpg","../../jctruffet.com/image/image_07/07_Bourg_St_And%c3%a9ol_6.jpg","../../jctruffet.com/image/image_07/07_Bourg_St_And%c3%a9ol_7.jpg"]},"Consult_chateau_formulairefce7":{"id":"Consult_chateau_formulairefce7","dept":"07","canton":"Le Cheylard","commune":"Jaunac","nom":"Brion_Cheylard","type":"Vestiges","periode":"XI XII","histoire":"Brion et Cheylard: le château médiéval de Brion est mentionné au XIe siècle, appartenait à une puissante famille, les Chapteuil, restèrent seigneurs jusqu'au XVe siècle. \r\nAu XIIIe siècle prirent le nom de Brion, les seigneurs de Brion en 1224 deviennent vassaux des comtes de Valentinois.\r\nCes seigneurs quittèrent le château pour celui du Cheylard toujours sous le titre de seigneurs de Brion, au XIVe siècle aux seigneurs de Chalencon, à la mort de Just Louis II la châtellenie revint a Gilbert de Levis qui reprit possession du château et aux comtes de Tournon, Jacques de Tournon en 1551, qui fut gardé en 1555 par Alexandre du Trémolet seigneur de Craux et co-seigneur de Montagut, capitaine commandant la ville et le château du Cheylard avec cent hommes à pied, puis en fit hommage à Dianne de Poitiers, qui régna un temps dans ces murailles, puis passa à la famille de la Mothe et aux Voguë qui le revendirent en 1766 au marquis du Bourg aux Saint-Polgue.","architecture":"Brion: ce château médiéval était encore debout au XIVe siècle sa destruction commença au XVe siècle, la seigneurie de Brion alla s'installer au Cheylard construit un château au XIIIe siècle qui dépendait d'eux. \r\nDu château aujourd'hui détruit en partit en 1626 il ne reste que quelques vestiges  de remparts.","habitants":"Famille de Chapteuil    \r\nfamille de Pons de Brion \r\nDiane de Poitiers\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Brion_Cheylard_1.jpg","../../jctruffet.com/image/image_07/07_Brion_Cheylard_2.jpg","../../jctruffet.com/image/image_07/07_Brion_Cheylard_3.jpg","../../jctruffet.com/image/image_07/07_Brion_Cheylard_4.jpg","../../jctruffet.com/image/image_07/07_Brion_Cheylard_5.jpg"]},"Consult_chateau_formulaire3b02":{"id":"Consult_chateau_formulaire3b02","dept":"07","canton":"Largentière","commune":"Sanilhac","nom":"Brison_Montbrison","type":"Tour","periode":"XII","histoire":"BRISON; la  famille de Beaumont-Brison une des plus ancienne et plus importante du Vivarais, seigneurie citée au IXe siècle, seigneurs de Brison, Etienne de Tauriers en 1210 qui avait comme origine du château de Montbrison qui se trouvait au-dessus à 780 m, offrant une vue des quatre points cardinaux, mais ils quittèrent les lieux au XIIIe siècle pour s'installer au hameau de Brison dans le château construit au XIIe siècle. Le dernier des Brison fut Gabriel II, fils de Garin; il épousa Louise de Garave, cette dernière devenue veuve sans enfant transmis le 12 décembre 1583 à  Jeannes de Cayres d'Entraigues, femme de Rostaing I de Beauvoir du Roure de Beaumont. En 1622 celui-ci cède son héritage à son fils Joachim dit le \"Brave Brison\" qui périt assassiné en 1628, ce dernier avait épousé Smarande de Beaumont en deuxième mariage  Smarande épousa Guillaume de Beauvoir VI seigneur de Roure (créant une autre branche).  Brison passa entre les mains de Rostaing II, puis à son fils aîné François, baron de Beaumont et de Brison, marié le 8 janvier 1688 à Françoise des Boscs François achète  en 1705  la terre de Versas  et Montbrison à Jacques de Bernard de Montbrison  et y fit édifier un second château au-dessus du hameau de Brison, car leur château devenait inabitable. Nicolas de Beauvoir de Beaumont-Brison, dernier de la branche cadette, épousa, en 1782  Denise de Beauvoir de Roure; dernière de la branche aînée, héritière par la mort de son frère; mariage qui réunit les deux branches séparées depuis l'an 1420, et en restèrent propriétaire jusqu'à la Révolution, le château fut détruit en partie pendant la Révolution, ils firent construire celui de Versas ou ils s'installèrent, en outre ils possédèrent à l'époque des châteaux de Largentière acquis en 1716, celui de Montréal et en 1775 celui de madame de la Gorce née Hautefort, ainsi que le château de Vielprat dans l'Allier. Aujourd'hui le château de Brison est en ruine est propriété de monsieur Gouillon.","architecture":"Brison ; sur une plate-forme à 780 mètres d'altitude  se trouvait deux châteaux, aujourd'hui une  tour  carrée de 7,10m de côté, qui faisait partie du premier château de Montbrison, remanié au cours du siècle dernier par une équipe de bénévole groupé autour de Monsieur Robert Brugère, servit de poste d'observation de communication par signaux aperçues par soixante paroisses environnantes, aujourd'hui sert de vigie pour le feu, sur cette plate forme vestige au sol  du deuxième château. \r\nLe château de Brison au hameau en ruine, imposant laissant apparaître tours et une jolie porte d'entrée.","habitants":"famille de Guillaume de Beauvoir de Roure\r\nfamille de Pierre de Brison  \r\nfamille de Joachim de Beaumont\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Brison_1.jpg","../../jctruffet.com/image/image_07/07_Brison_2.jpg","../../jctruffet.com/image/image_07/07_Brison_3.jpg","../../jctruffet.com/image/image_07/07_Brison_4.jpg","../../jctruffet.com/image/image_07/07_Brison_5.jpg","../../jctruffet.com/image/image_07/07_Brison_6.jpg","../../jctruffet.com/image/image_07/07_Brison_7.jpg","../../jctruffet.com/image/image_07/07_Brison_8.jpg"]},"Consult_chateau_formulaire391b":{"id":"Consult_chateau_formulaire391b","dept":"07","canton":"Vernoux","commune":"Boffres","nom":"Cachard","type":"Maison forte","periode":"XV","histoire":"Cachard: Etienne de Sanglier serait l'auteur de la branche Cachard, il est qualifié comme noble de Sanglier de Cachard. Il se marie avec Isabeau du Boys, peut-être la fille de noble Goschal et de demoiselle Sébastienne de Cachard en 1592. \r\nC'est en 1786 que le château entre dans l'histoire; Le jeune Annet Christin Bouvier comte de Cachard, est lieutenant d'artillerie de Valence, Il a pour camarade un inconnu de 17 ans le lieutenant Napoléon Bonaparte, qui se dernier passa de belles soirées dans le château. \r\nAnnet de Cachard, noble émigré revint en 1814 avec Louis XVIII fut élu député de l'Ardèche en 1815. \r\nLe baron de Saint-Jean en fut propriétaire au début du XXe siècle.   Roubiac-Champis, au XIVe siècle  Hugues de Roubiac vivait en 1329 notaire, toujours la famille de Roubiac. Guillaume de Roubiac en 1430 forma la branche des seigneurs de Suzeux et en 1596 Jean de Roubiac épousa Anne de Saint-Ferréol, en 1626 Alexandrine de Roubiac épousa Pierre de Tardivon  et en 1651 la fille de Jacques de Roubiac  \"Judith de Roubiac\" épousa  Paul de Tardivon, puis passa dans la famille des de l'Espinasse au XVIIIe siècle par alliance de Jeanne de Roubiac et de Jacques de l'Espinasse seigneur de Landeot.","architecture":"Cachard, maison forte du XV-XVIe siècle à trois étages, aujourd'hui bâtiment en équerre flanquée de deux tours rondes à toits plats.                             Roubiac; du manoir il ne reste qu'une tour ronde et le départ d'un corps de logis avec des fenêtres à meneaux.","habitants":"Famille d'Etienne de Sanglier \r\nAnnet de Cachard\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Cachard_1.jpg","../../jctruffet.com/image/image_07/07_Cachard_2.jpg","../../jc
