fait le charme du manoir.","habitants":"St-Vincent de Barrés; famille d'Audebert de Barrés                             Aleyrac; Famille Aleyrac de Chambesson.\r\n        \"","divers":"Manoir d'Aleyrac \r\nVillage fortifié de St-Vincent de Barrés","gps":"","images":["../../jctruffet.com/image/image_07/07_St_Vincent_Barres_1.jpg","../../jctruffet.com/image/image_07/07_St_Vincent_Barres_2.jpg","../../jctruffet.com/image/image_07/07_St_Vincent_Barres_3.jpg","../../jctruffet.com/image/image_07/07_St_Vincent_Barres_4.jpg","../../jctruffet.com/image/image_07/07_St_Vincent_Barres_5.jpg","../../jctruffet.com/image/image_07/07_St_Vincent_Barres_6.jpg","../../jctruffet.com/image/image_07/07_St_Vincent_Barres_7.jpg"]},"Consult_chateau_formulaire4cb7-2":{"id":"Consult_chateau_formulaire4cb7-2","dept":"07","canton":"Privas","commune":"St-Vincent-de-Durfort","nom":"St_Vincent_Durfort","type":"Vestiges","periode":"XII","histoire":"Saint-Vincent de Durfort: au XIIIe siècle hommage d'Aymar de Poitiers au roi de France pour ce château dont les descendants le possédaient encore au XIVe siècle, noble Pierre de  Badel l'acquit, sa fille Béatrix de Badel du Noyer épousa Joachim de Trémolet, écuyer, puis passa aux Presles de Vaussèche.  Au XVIIe siècle aux Ginestoux de la Tourette et aux XVIIIe siècle aux Barruel de Bavas.                            BAVAS: Les Barwel: dont le nom passa en Barruel grande famille depuis le XIIIe siècle venant d'Ecosse, passa par alliance dans ces  seigneuries et marquisat de Bavas, St-Cierge, St-Vincent, St-Quintin, Montagu, Durfort, la Baume, Montellier, St-Pons, Chaix etc. La branche Vivaraise; en 1300 Raymond de Barruel seigneur de St-Pons de Mirabel, puis son fils Clément de Barruel en 1390, un Pierre de Barruel en 1480 et se fut un Pierre de Barruel troisième du nom qui relança la lignée en Vivarais dont un descendant de Louis son fils René-Marin de Barruel, cornette au régiment de cavalerie, marquis de Bavas et des environs, qui  épousa sa cousine en 1658, il eut quatre enfants, le premier prit la relève, il épousa en 1771 Pauline de Rochefort, céda le marquisat de Bavas à son cousin Louis-Antoine de Barruel-Bavas-St-Pons et cette branche resta à Bavas jusqu'en 1806, Louis Antoine de Barruel troisième du nom eut trois enfants qui firent différentes carrières militaires et se fixèrent dans d'autres lieux; tel que Saou. Louis-René-Henry-Alfred de Barruel de Bavas de Saint-Pons ( descendant) a épousé en 1837 Antoinette Mélina de Bardonenche,  fille de Ferdinand de Bardonenche vicomte de Champinet, ils eurent sept enfants. \r\nLe château et les terres passèrent après la Révolution  aux Planchier, aux Roches et d'autres propriétaires, aujourd'hui à la famille Nogués.","architecture":"St-Vincent de Dufort; A ce jour il ne reste qu'un bâtiment démunit de ses pierres d'ornement et se trouve prêt a tomber de sa propre mort. Du château déjà ruiné au XVe siècle, il ne reste que des vestiges, principalement celle du donjon qui devait faire 10 m par 10.             BAVAS; ce château  est un des plus ancien de la région de Privas et certaines parties de sa construction peut remonter au XIe siècle, deux grosses tours rondes en façade plein Sud, trois étages, un élément du corps de logis  côté Est a été détruit pendant la deuxième guerre mondial que le propriétaire actuel reconstruit.","habitants":"Famille de Chambaud \r\nFamille Barruel\r\n        \"","divers":"Vestiges du château de st-Vincent-Durfort(pans de murs et porte).\r\nChâteau de Bavas.","gps":"","images":["../../jctruffet.com/image/image_07/07_St_Vincent_Durfort_1.jpg","../../jctruffet.com/image/image_07/07_St_Vincent_Durfort_2.jpg","../../jctruffet.com/image/image_07/07_St_Vincent_Durfort_3.jpg","../../jctruffet.com/image/image_07/07_St_Vincent_Durfort_4.jpg","../../jctruffet.com/image/image_07/07_St_Vincent_Durfort_5.jpg"]},"Consult_chateau_formulairedd80-2":{"id":"Consult_chateau_formulairedd80-2","dept":"07","canton":"La Voulte-sur-Rhône","commune":"St-Laurent du Pape","nom":"StLaurent du Pape","type":"Maison forte","periode":"XVI","histoire":"BOUSQUET: Louis de Maugiron, par son mariage du 17 février 1646, avec Louise de Pierregourde, devint propriétaire de nombreuses seigneuries du Vivarais. Pendant quatre générations les de Maugiron se succédèrent comme seigneurs de Pierregourde. \r\nPassa ensuite aux de Cheylus et ce dernier vendit le château à monsieur Mirabel-Chambaud de Vernoux, depuis a changé de propriétaire.               Dans la commune le château d'HAUTEVILLE, ce château  descendant d'une branche de la famille des Hauteville, famille de Tancréde de Hauteville qui reçut en 1302 l'hommage du seigneur de Cheylus.  \r\nPierre de Hauteville seigneur de Pontserre gardèrent cette demeure jusqu'à la Révolution. \r\nDans ce château transformé aujourd'hui en maison de retraite a abrité les amours purement littéraires de la marquise du Vichet et de Châteaubriand.","architecture":"Bousquet; construit au XVIe siècle, corps de logis rectangulaire à haute toiture élégante a deux pans, flanqué d'une tour ronde à toit en poivrière.          Hauteville; deux grands corps de logis à deux étages et en parallèle très remanié.","habitants":"famille de Louis de Maugiron \r\nSeigneur de Pierregourde \r\n        \r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Bousquet_1.jpg","../../jctruffet.com/image/image_07/07_Bousquet_2.jpg","../../jctruffet.com/image/image_07/07_Bousquet_3.jpg"]},"Consult_chateau_formulaired202":{"id":"Consult_chateau_formulaired202","dept":"07","canton":"Largentière","commune":"Tauriers","nom":"Tauriers","type":"Château","periode":"XII","histoire":"Tauriers, était lun des plus important du Vivarais du XIIe siècle, comme celui de Montréal, pourvu dun haut donjon, possède une particularité dêtre édifié sur plan pentagonal et avait des créneaux et chemin de ronde.\r\nRaymond VI, comte de Toulouse, qui exploité les mines de plomb argentifère de Largentière, avec celle dEtienne de Tauriers qui ce dernier nen obtenait quun quart, put se faire construire cette forteresse. \r\nCette famille se prolongea jusquau XVe siècle. Olivier de Tauriers eut une fille qui épousa Mathieu de Sampzon devient seigneur du lieu et en 1512 Pierre II de la Baulme, seigneur dUzer épousa Antoinette de Tauriers, Pierre II devint co-seigneur du lieu, puis passa par différentes alliances,  aux de Fages, Guillaume de Fages  lieutenant colonel épousa en 1622  Anne de la Motte dont la branche séteint en 1773, mais la seigneurie fut acheté en 1691 par Louis de Comte co-seigneur de Saint-  Montan, seigneur de Tauriers et de Chalabrèges fut gouverneur de Largentière et sénéchal de la baronnie et avait épousé en 1650 Elisabeth de Blou, son fils Jean Louis le Comte, seigneur,  grand bailli sénéchal de Joyeuse épousa en 1673 Blanche de Rocher, leur fils Joseph de Comte de Tauriers dAubusson lieutenant colonel dinfanterie était présent à lassemblée de la noblesse de Villeneuve de Berg en 1789. \r\nAprès cette période fut la propriété de la famille de Rocles et la famille Helly en hérita et qui en sont toujours propriétaire.","architecture":"Ce château a été édifié au XIe siècle , imposante bâtisse d'ou un énorme donjon qui était à l'origine deux fois plus haut qu'aujourd'hui, qui possède la rare particularité d'être édifié sur plan pentagonal. \r\nUn corps de logis ajouté au XIVe siècle et remit au goût du jour aux XVII et XVIIIe siècle par le percement de nouvelles baies et l'addition d'un portail triomphal, complète l'édifice.","habitants":"Famille d'Aymar de Poitiers  \r\nfamille de Joseph comte de Tauriers\r\n        \"","divers":"Forteresse de Tauriers","gps":"","images":["../../jctruffet.com/image/image_07/07_Tauriers_1.jpg","../../jctruffet.com/image/image_07/07_Tauriers_2.jpg"]},"Consult_chateau_formulaire6588":{"id":"Consult_chateau_formulaire6588","dept":"07","canton":"Serrières","commune":"Thorrenc","nom":"Thorrenc","type":"Château","periode":"XII","histoire":"Thorrenc: Mentionné au XIe siècle, les comtes d'Albon l'inféodèrent aux         seigneurs d'Annonay, mais au XIVe siècle, il était encore en leur possession; les comtes d'Albon résistant à la réunion du Dauphiné à la France, le roi Jean le Bon confisqua leurs châteaux de Thorrenc et de Peyraud. \r\nIl donna Thorrenc au cardinal Pierre de Colombier en 1356, en 1361 à son neveu Pierre de Monestier, sans enfant laissa ses biens à son neveu Antoine-François de Saint-Priest-Monestier-Apinac, vendu ensuite à Jean de Saint-Chamond. \r\nPassa en 1577 à Jacques de la Motte de Chevrières, puis aux Just de Serres, aux Mazel de Montellier, aux Guignard, aux  Saint-Priest, en 1745 aux Desfrançois de Lolme. \r\nLe propriétaire d'aujourd'hui Charles Emile Mignot descend des de Desfrançois de Lolme.","architecture":"Ce château récemment restauré, est mentionné dés le XIe siècle  servant de barrage d'Annonay au Rhône. \r\nIl reste de ce château un corps de logis du XIVe siècle , un donjon carré crénelé une tour ronde à toit plat,  une tourelle et d'une église attenante du XV e siècle.","habitants":"Famille du Comte d'Albon \r\nfamille Desfrançois de Lolme\r\n        \"","divers":"Château de Thorrenc","gps":"","images":["../../jctruffet.com/image/image_07/07_Thorrenc_1.jpg","../../jctruffet.com/image/image_07/07_Thorrenc_2.jpg","../../jctruffet.com/image/image_07/07_Thorrenc_3.jpg","../../jctruffet.com/image/image_07/07_Thorrenc_4.jpg"]},"Consult_chateau_formulaired8a9":{"id":"Consult_chateau_formulaired8a9","dept":"07","canton":"St-Péray","commune":"Toulaud","nom":"Toulaud","type":"Maison forte","periode":"XIII","histoire":"Meyret: fut construit au XIIIe siècle  par la famille de Mérez jusqu'au XVIe siècle, vassal du seigneur de Crussol. Jean de Mérez accompagna le seigneur de Crussol à la croisade en qualité de arbaletrier, un Salomon de Mérez épousa le 11 octobre 1611 Jeanne de Serres , fille  de Jean, docteur en théologie et historiographe du roi Henri IV, frère du célèbre Olivier de Serres. Un autre Jean de Merez vendit la maison forte.  Racheté par la famille de Vincens de Mazade qui l'habita jusqu'à la fin du XVIIe siècle. Aujourd'hui monsieur Brunel en est le propriétaire.                             Maison forte de CHEYLUS trés vieille famille noble du Vivarais remonte à 1333 qui possédait un château près de Privas seigneur de Chomérac de St-Lager-Bressac de Rochemaure et de Toulaud. Cette famille fit alliance par mariage avec les De Benéfice, les Mirabel, les Chambaud, les Bernard, les Tatallion et autres. Château des fonts qui fut la propriété de la grande  famille Galbert originaire du Dauphiné jusqu'à la fin du XVIIe siècle ou des revers de fortune obligèrent la famille à quitter sa demeure. En 1686 une des filles d'Antoine De Galbert seigneur des Fonts prénommée Marguerite-Alexandrine, épousa Louis Josserand de la Garde alors capitaine au régiment royal qui devint par la même propriétaire du château.\r\nAprès les Galbert puis les Josserand, le château fut occupé par des familles plus modestes.                                              MIRABEL; dans la plaine de Toulaud, fut inféodé en 1550 par Emmanuel de Crussol à noble Mathieu d'Audemard de Charmes oncle de Jeanne de la Seauve bailli du comté de Crussol. En 1622 Audemard y habita est fut transmit de père en fils jusqu'en 1842, le dernier fut Louis-Esprit une de ses fille épousa Louis Georges Vasseur député de l'Ardèche et représentant à l'assemblée législative de 1849 à 1851 année de sa mort. D'autres alliances avec les bénéfice, les Tataillon, les Ithier de Géorand, les d'Aguesseau et aussi les de Cheylus et à la famille Faurie-Chambaud.","architecture":"Meyret; reste deux tours rondes au corps de logis quadrangulaire, utilisé aujourd'hui comme ferme.           Cheylus; possède toujours une tour.  Fonts, maison forte                   Chomat; maison forte.","habitants":"Famille Jean de Mérez     \r\nFamille Vincens de Mazade\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Maison forte de Meyret, des Fonts, de Chomat;  de Cheylus et de Mirabel","gps":"","images":["../../jctruffet.com/image/image_07/07_Toulaud_1.jpg","../../jctruffet.com/image/image_07/07_Toulaud_2.jpg","../../jctruffet.com/image/image_07/07_Toulaud_3.jpg","../../jctruffet.com/image/image_07/07_Toulaud_4.jpg","../../jctruffet.com/image/image_07/07_Toulaud_5.jpg"]},"Consult_chateau_formulaire5129-2":{"id":"Consult_chateau_formulaire5129-2","dept":"07","canton":"St-Pierreville","commune":"St-Pierreville","nom":"Tour_Poinsac","type":"Château","periode":"XIV","histoire":"La Tour-Poisac: Ce domaine appartenait au XIe siècle à Sylvion de Tournon sur lequel se trouvait un donjon, puis transmit  au XIVe siècle aux  seigneurs de Montagut, Raymond et son fils Floccard l'agrandissent et le fortifient. \r\nLes Poinsac héritent du château au XVe siècle, Guillaume de Poinsac l'agrandit d'une aile et renforce le château par des tours rondes et massives crénelées à canonnières couronnées de mâchicoulis.  Passa aux Pouzols par alliance  aux de  Lamotte-Brion au XVIe siècle ( Rouft de Lamotte-Brion accueillait les catholiques persécutés, chose pas facile dans une région où il y avait 5000 familles protestantes). Jacques de Lamotte-Brion fils de Roult  intervint régulièrement pour défendre les catholiques. Claude de Vocance  succédèrent aux Lamotte-Brion, ce dernier mourut en embuscade en 1709, son fils unique, François-Laurent-Scipion  de Vocance épousa en 1714 Anne-Françoise de Sibleyras, arrière petite fille de Pierre Marcha de Pras. \r\nLe château revint à la famille  de Marquet de 1714 à fin 1823, en 1944  occupé par les maquisards et  passe ensuite par plusieurs propriétaires, les derniers les Lacombe qui en fit un lieu de vacances, aujourd'hui toujours lieu de vacances pour hollandais, le propriétaire est monsieur Wan Ramskorst Buiten Huis.Le propriétaire néerlandais du château la Tour de Saint-Pierreville  a été contrôlé jeudi 31 juillet. De nombreuses irrégularités ont été découvertes : il employait douze personnes, toutes recrutées aux Pays-Bas et travaillant au noir.","architecture":"Corps de logis quadrangulaire central était flanqué d'une tourelle à chaque angle est entouré d'un rempart, à trois niveaux, les grosses tours rondes en façades portent des  mâchicoulis en perdit une tour pendant les guerres de religion, fut reconstruite par la suite.","habitants":"Seigneur de Poinsac  \r\nFamille  Lacombe\r\n        \r\n        \"","divers":"Château de la Tour-Poinsac","gps":"","images":["../../jctruffet.com/image/image_07/07_Tour_Poinsac_1.jpg","../../jctruffet.com/image/image_07/07_Tour_Poinsac_2.jpg","../../jctruffet.com/image/image_07/07_Tour_Poinsac_3.jpg"]},"Consult_chateau_formulaire0abf-2":{"id":"Consult_chateau_formulaire0abf-2","dept":"07","canton":"Vernoux","commune":"Vernoux","nom":"Tourettes","type":"Vestiges","periode":"XIV","histoire":"Tourettes: Connus depuis l'an 1240. Le dernier de ce nom est Hugon de la Tourette, tué en 1330, repris par Hugon de Chambaud, en 1371 est divisé entre les Chambaud et les Caumes , en 1420 Antoine de Chambaud hérite de Raymond de Caumes et deviendra en 1421 une dépendance de la baronnie de Chalencon. \r\nEn 1548, à Louis de Vaussèche et à Just- Henri de Ginestoux. \r\nAssiégé et pris par jacques de Chambaud en 1591, les protestants durent le restituer à son propriétaire Just-Henri de Ginestoux, après le siège de Privas en 1629. \r\nC'est dans ce château que fut enfermée Isabeau Durtail en 1623. \r\nEn 1666 le château servit de prison et restera dans la famille encore à l'heure actuelle. Gonzagues de la Tourette hérite en 1974 et entreprend la réhabilitation des ruines et du corps de garde.","architecture":"Le château édifié au XII-XIIIe siècle à l'emplacement d'une tour de guet était relié à une tour en terrasse par un pont levis, et de l'autre côté de cette tour était la ferme, construction du XVIe siècle.\r\nDu château il ne reste que des vestiges en pans de murs avec chaînages d'angles soignés, des tours quadrangulaires, multiplication des équipements défensifs, bretèches, mâchicoulis sur consoles.","habitants":"Famille de Just-Henri de Ginestoux  \r\nSeigneurs de la Tourettes\r\n        \"","divers":"Vestiges du château des Tourettes","gps":"","images":["../../jctruffet.com/image/image_07/07_Tourettes_1.jpg","../../jctruffet.com/image/image_07/07_Tourettes_2.jpg","../../jctruffet.com/image/image_07/07_Tourettes_3.jpg"]},"Consult_chateau_formulairea440":{"id":"Consult_chateau_formulairea440","dept":"07","canton":"Tournon","commune":"Tournon","nom":"Tournon","type":"Château","periode":"XIV","histoire":"TOURNON: Cité au bord du Rhône à l'ouverture de la vallée du Doubs  était habité dés l'antiquité, et une tour était signalée en 817.  \r\nLes seigneurs de Tournon (34-seigneuries) ont joué dès le XIe siècle un rôle essentiel pour la ville et pour les affaires du royaume.\r\nLe château n'évolue vraiment qu'au XIe siècle avec la famille des Tournon, en 1088 Odon de Tournon en rend hommage au roi Philippe Auguste quand Guillaume II de Tournon fait construire un grand corps de logis, et l'aile Nord-Ouest; Guillaume II accueille, en 1349, les plénipotentiaires venus négocier le rattachement du Dauphiné à la France. Jacques Ier meurt à la bataille  de Nicopolis en 1395, combattant les Turcs  pour défendre Constantinople.\r\nL'ascension commença avec Guillaume V qui fut l'un des soutiens  du dauphin Charles, futur Charles VII combattit avec lui à la bataille de Verneuil, à Anthon et siégera aux états du Languedoc. Son fils Jacques II (1467-1501) Chanoine honoraire de l'église de Lyon, et se distingue pendant la guerre de cent ans, ajoute un deuxième corps de logis qui surplombe la terrasse donnant sur le Rhône, et des remparts, décède en 1501. Son fils Christophe , seigneur de Beauchastel, devient bailli royal du Vivarais.\r\nFrançois de Tournon cinquième enfants de Jacques II épousa Jeanne de Polignac,  les parents du futur cardinal font élever les bâtiments et apportèrent le style renaissance. Just II neveu du cardinal ( François de Tournon 1530) fit construire la tour de Beauregard et la chapelle Saint-Vincent, Just II périt au début des guerres de religion, La veuve de Just II Claude de la Tour d'Auvergne fit rebâtir les remparts.\r\nA la mort du dernier des Tournon à la bataille de Philippsbourg en 1644 le château revient aux Montmorency-Levis Ventadour qui le revendirent aux Rohan Soubise, puis utilisé comme prison. \r\nLes Tournon accueillirent en 1536 François Ier et le dauphin François qui décéda brusquement au château, fils aînée et frère du futur Henri II.\r\nPropriété de la ville, aujourd'hui château-musée.                     MORDANE: Dans la vallée du Doubs à la limite de Saint-Barthélemy le Plain sur une motte féodale les vestiges du château qui fut le berceau de la famille de Guigues de Saint-Romain, cinquième prieur de la Grande Chartreuse de 1109 à 1137, Sylvion  en 1219,  A. Arthaud en 1245,  B. Jausserand de Meyras 1251 qui ce dernier épousa en 1315 Aliénor de Brion et devint seigneur de Saint-Romain-Valmordane leur fille Garine épousa en 1337 noble Bertrand de Montmeyran qui devint seigneur du lieu y compris Boucieu,  Garine devenu veuve se remaria en 1665 à Rolland de la Bastide et en 1675 ce dernier est seigneur des lieux et d'Arras, il eu comme fils le puissant Guillaume de la Bastide de Saint-Romain-Valmordane, décéda en 1670 et par testament les biens passèrent à la maison de Fay d'Etables auteur de la Branche des Fay de Saint-Romain et aux le Borgne.","architecture":"Dominant le Rhône, château féodal de la ville, il était indispensable d'établir une place-forte en ce lieu de circulation. Deux corps de logis renaissance en équerre avec grandes  tours rondes à mâchicoulis et canonnière font de ce château une forteresse de forme quadrangulaire, avec terrasse côté ville, et tour de guet au-dessus du château.                          Mordane, de ce château il ne reste que quelques pans de murs sur la motte féodale.","habitants":"Famille de Tournon \r\nFamille de la Tour d'Auvergne\r\n        \"","divers":"Le château\r\nL'hôtel de Fay\r\nBâtiment de la sous-préfecture\r\nRuines de Mordane","gps":"","images":["../../jctruffet.com/image/image_07/07_Tournon_1.jpg","../../jctruffet.com/image/image_07/07_Tournon_2.jpg","../../jctruffet.com/image/image_07/07_Tournon_3.jpg","../../jctruffet.com/image/image_07/07_Tournon_4.jpg","../../jctruffet.com/image/image_07/07_Tournon_5.jpg","../../jctruffet.com/image/image_07/07_Tournon_6.jpg","../../jctruffet.com/image/image_07/07_Tournon_7.jpg","../../jctruffet.com/image/image_07/07_Tournon_8.jpg"]},"Consult_chateau_formulairec724":{"id":"Consult_chateau_formulairec724","dept":"07","canton":"Vals-les-Bains","commune":"Ucel","nom":"Ucel","type":"Vestiges","periode":"XI","histoire":"Ucel: Le site fut occupé avant l'arrivée des Romains, un château fut construit sur le site dont la famille d' Ucel était présent dés le XIe siècle; cette seigneurie subit de nombreuses et difficiles épreuves aux XIIe siècle Hugues d'Ucel très endetté, confie une partie de ses mines de plomb argentifère à Raymond d'Uzés, évêque de Viviers, reconnaissant vassal le comte de Toulouse. \r\nLe château d'Ucel fut détruit par les Aragonais en 1185, les d'Ucel Galbouage et Hugues rendaient hommage pour le fief au comte de Toulouse qui ces derniers le revendaient aux Montlaur. Les d'Ucel s'installèrent aux château de Craux, paroisse de Genestelle. \r\nEn 1453 Garin d'Ucel donne son fief en héritage à son fils Raymond.\r\nAu XVIIe siècle un Gratien d'Ucel était cornette dans une compagnie de cavalerie de Mazarin, il sera tué à Pavie.         La dernière descendante des Ucel se nomme Marie-Thérése, fille de Charles-Antoine d'Ucel seigneur de Craux, d'Antraigues et de Genestelle, marquis d'Ucel.","architecture":"Du château, détruit par les Aragonais en 1213, il subsiste les ruines d'une enceinte polygonale établie sur le point le plus haut du site et des vestiges sur la partie opposée, dans l'enceinte existe des bâtiments de style renaissance en utilisant les matériaux d'époque.","habitants":"Famille d'Ucel\r\n        \"","divers":"Château et remparts à Ucel","gps":"","images":["../../jctruffet.com/image/image_07/07_Ucel_1.jpg","../../jctruffet.com/image/image_07/07_Ucel_2.jpg","../../jctruffet.com/image/image_07/07_Ucel_3.jpg","../../jctruffet.com/image/image_07/07_Ucel_4.jpg","../../jctruffet.com/image/image_07/07_Ucel_5.jpg"]},"Consult_chateau_formulairee032":{"id":"Consult_chateau_formulairee032","dept":"07","canton":"Lamastre","commune":"Lamastre","nom":"Urbilhac","type":"Maison forte","periode":"XVI","histoire":"Urbilhac: Au XVe siècle propriété de Jacques de Crussol. Elle fut la propriété de la famille de Reboulet, en 1646 jean de Reboulet d'Arenesche seigneur d'Urbilhac, fut incarcéré.\r\nLes biens furent transmis à sa soeur mademoiselle de Reboulet et passa à un dénommé Faure, notaire, qui fut tué par Charles d'Urbilhac en 1722 au château de la Bâtie et à la fin du XVIIIe siècle elle fut vendue à monsieur Richon ( juge de Boucieu le Roi) puis par alliance au Gaillard qui la gardèrent jusqu'en 1891, vendue ensuite à monsieur René Gaillard de Bel Air dont la fille épousa monsieur de Fraix de Figon de Cheylus. \r\nPuis propriété de la famille De Ville qui épousa Melle Solange de Fraix de Figon et fut vendue au XIXe siècle à monsieur Xompero qui un fit un restaurant de luxe.","architecture":"De style renaissance, cette maison forte, édifié au XVIIIe siècle sur des soubassements d'une autre maison forte du XVIe siècle, possède aujourd'hui un corps de logis rectangulaire à deux étages, toit mansardé et tour ronde sur la partie Est, de style renaissance également à toit poivrière.","habitants":"Famille de Jean de Reboulet  \r\nMonsieur Xompero\r\n        \"","divers":"Maison forte d'Urbilhac","gps":"","images":["../../jctruffet.com/image/image_07/07_Urbilhac_1.jpg","../../jctruffet.com/image/image_07/07_Urbilhac_2.jpg"]},"Consult_chateau_formulairedea8-2":{"id":"Consult_chateau_formulairedea8-2","dept":"07","canton":"Largentière","commune":"Uzer","nom":"Uzer","type":"Château","periode":"XII","histoire":"Uzer; Pierre Julien co-seigneur fin XIIIe siècle, à sa mort sa veuve en fit hommage à Guillaume de Balazuc, Les Balazuc  et les de la Baume  étaient aussi seigneurs de Vallon. Propriété  de Guigon de Borne en 1507 de François en 1538 passa en 1553 à François de Servissas. En 1584 à Louis de la Vernarde co-seigneur de Laurac et Tauriers et la famille de Borne au XVIe siècle.\r\nLe château joua un certain rôle pendant les guerres civiles du XVIe siècle, très violentes en 1574 et 1575, une nuit, le seigneur de la Baume et son fils y furent surpris et faits prisonniers par les huguenots. \r\nEn 1579 le deuxième  fils de François de la Baume se maria avec Anne de la Motte Chalendar en 1725. Avant la Révolution le château  et la bastide appartenais à madame de la Motte, puis acheté par les Chabert et par les Lapierre passa à son gendre De Sanilhac lequel vendit la bastide en 1817 aux Blachères. Le château fut acquis par le colonel Emile Mangin. Transformé aujourd'hui en hôtel restaurant de luxe.","architecture":"Uzer; sur une colline qui domine le village au lieu dit \"la bastide\"  on la  voit encore assez bien conservée, la maison forte qui fut l'objet d'une transaction.                            Le château d'Uzer possède un corps de logis rectangulaire flanqué d'un donjon rectangulaire du XIIe siècle, remanié en moderne. Aujourd'hui hôtel restaurant.","habitants":"Seigneur de la Baume\r\n        \"","divers":"Château d'Uzer","gps":"","images":["../../jctruffet.com/image/image_07/07_Uzer_1.jpg"]},"Consult_chateau_formulaire46bb-2":{"id":"Consult_chateau_formulaire46bb-2","dept":"07","canton":"Vallon-Pont-d`Arc","commune":"Vallon-Pont-d`Arc","nom":"Vallon-Pont-Arc-Salavas","type":"Château","periode":"XVII","histoire":"Vallon-Pont-D'Arc: Chastelas  Au Xe siècle le hameau Vallon dit \"vieux château où Chastelas\" était positionné sur une crête entourait de maisons paysannes.                               Le premier seigneur du lieu Hérail de Merle seigneur et baron de la Gorce et de Salavas qui possédait également le château de Salavas, épousa une fille catholique de la famille de Balazuc. Dans ce château naquit en 1405 Clotilde de Vallon-Châlis dame de Surville. A sa mort en 1472 laissera pour héritier Jacques d'Apchier. Puis les deux châteaux passèrent en 1398 par alliance de Anne de la Gorce à la famille des Châteauneuf de Randon, baron d'Apchier, en Haute-Loire, de ce mariage né Claude, baron d'Apchier, a sa mort en 1472 laissera pour héritier Jacques d'Apchier, qui n'habitant plus le châstelas s'en désintéresse, le règne des Apchier sur Vallon ne dure pas un siècle, prendra  fin au 17 novembre 1486 endetté vend le château à Joachim des Astars,  ce seigneur issu d'une famille de notaire de Villeneuve de Berg et Jean d'Apchier chevalier succédera à Charles des Astars.  \r\nC'est en 1546 que le Chastelas fut abandonné ou Jeanne de Borne alla s'installer au château d'Uzer.\r\nEn 1569 à la mort de son fils Jean (sans postérité) son épouse Jeanne de Borne de Leugières qui hérita du Chastelas et le château de Salavas resta dans la famille de Merle, de 1520 à 1560, puis aux d'Apchier et le Chastelas fut transmit à son second mari Antoine-François de la Baume Tauriers, seigneur d'Uzer en restèrent propriétaire jusqu'en 1650.\r\nLa guerre civile dura 62 ans de 1559 à 1621, Merle de Lagorce chef protestant, fut battue par le duc de Montmorency chef catholique qui  fit raser les maisons et les remparts, et en 1628 le duc de Rohan  détruisit le château et en 1629 le roi donna tout  le mandement au seigneur Merle de Lagorce et l'autorisant a construire le château de Vallon qui fut achevé en 1639 et demeurera intact jusqu'à la Révolution. \r\nEn 1650 le mandement est château échut à Marie-Marthe de la Beaume , la dernière de la famille de la Baume Tauriers, qui épousa Antoine du Molin seigneur du Pont de Mars.\r\nLes deux derniers seigneurs de Vallon furent Ignace du Pont de Mars et son frère Louis-Augustin et c'est leur soeur Louise Françoise de Roure de Brizieux\r\npetite-fille d'Antoine du Pont qui vendit le fief avec le nouveau château à Louis-Charles de Merle, baron de Lagorce et seigneur de Salavas en 1747. \r\nLes  ruines furent vendues par Louis-Charles de Merle à un nommé Vincent qui habitait dans le vieux village, et le château de Vallon fut vendu par Clodimir-Désiré de Merle à la ville de Vallon pont d'Arc en 1846.\r\nC'est aujourd'hui l'hôtel de ville.\r\nSALAVAS: Pendant les guerres de religion, le gué de Salavas était le passage obligé pour franchir l'Ardèche avant les gorges. C'était  le trajet des huguenots  venant du Gard et des Cévennes qui voulaient franchir le Rhône au Pouzin afin de rejoindre la Suisse.\r\nAu XIIIe siècle Salavas était la possession de la famille de la Gorce qui possédait également le Chastelas de Vallon qui passa  dans les biens  de la famille des Châteauneuf-Randon, baron d'Apchier en Haute-Loire, et dans celle des Astards. Puis aux Merle de Lagorce seigneur de Vallon et de Salavas, célèbre chef protestant et en 1628 le château fut préservé et Salavas resta dans la famille redevenue catholique. En 1750 Louis Charles de Merle de Lagorce qui résidait toujours dans son château de Salavas le quitta pour résider à Vallon pont d'Arc .   \r\nEn 1570 la tour du moulin fut prise par des huguenots déguisés en femmes. \r\nRendue aux  catholiques, elle est en 1621 reprise par Chalanqui, serrurier à Salavas, qui est nommé capitaine gouverneur le moulin a été épargné par les deux camps; les 4 et 5 Juin, c'est à Salavas que les consuls de Barjac, Saint-Ambroix et les Vans se soumettent et remettent les clés de leur ville à Louis XIII.","architecture":"Du Chastelas il ne reste que des vestiges de pans de murs et remparts encore visibles qui fut détruit au XVIIe siècle. \r\nVallon bâti au XVIe siècle, en remplacement du Chastelas, le château de Vallon se présente comme un corps de logis rectangulaire interrompu,  flanqué de tours d'angles arasées, long de sept travées, se bâtiment comporte deux étages nobles et un attique percé de demi-fenêtres.                                  Salavas; vestiges de la tour du vieux château et vestiges de remparts.","habitants":"Famille de Labeaume\r\nFamille des d'Apchier\r\nFamille des Astards\r\nFamille de Merle de Lagorce\r\n        \"","divers":"Château de Vallon pont d'Arc et château de Salavas","gps":"","images":["../../jctruffet.com/image/image_07/07_Vallon_pont_d_Arc_1.jpg","../../jctruffet.com/image/image_07/07_Vallon_pont_d_Arc_2.jpg","../../jctruffet.com/image/image_07/07_Vallon_pont_d_Arc_3.jpg","../../jctruffet.com/image/image_07/07_Vallon_pont_d_Arc_4.jpg","../../jctruffet.com/image/image_07/07_Vallon_pont_d_Arc_5.jpg","../../jctruffet.com/image/image_07/07_Vallon_pont_d_Arc_6.jpg","../../jctruffet.com/image/image_07/07_Vallon_pont_d_Arc_7.jpg"]},"Consult_chateau_formulaire68f6":{"id":"Consult_chateau_formulaire68f6","dept":"07","canton":"Joyeuse","commune":"Planzolles","nom":"Valoubiere","type":"Château","periode":"XVI","histoire":"Valoubière: Au XVe siècle fut le fief des Bornes de Serrecourt, passa aux Bertrand de Peyreflore de Valoubière seigneur de Planzolles et de la Rouvière, le fils de Loys Bertrand de la Pomme capitaine châtelain de la ville de Largentière épousa en 1613 Marguerite Fages.                                 Au XVIe siècle, il existait un seigneur de Planzolles qui était notaire à Largentière et en 1734 la seigneurie échue à la famille Vitallis, puis à la famille Dussargues de Planzolles qui acquérirent le fief peu avant la Révolution, le sieur Jean Dussarges seigneur de Planzolles habita Joyeuse fit une donation en 1788 à messire Louis Benoit Dussargues du Colombier et son autre fis Jean Louis qui était commissaire des impositions royales, en 1789 ce dernier participe à la défense de Lyon assiégé, il fut condamné à mort par le tribunal révolutionnaire .        Depuis le château a appartenu à la famille Nogués et depuis 1970 passa dans différentes mains et n'a a ce jour pas encore trouvé de stabilité.","architecture":"Construit au XVIe siècle,  de construction de style ardéchoise; corps de logis quadrangulaire  à  trois  étages  flanqué  d'une tour d'angle circulaire et d'une tour carrée à l'opposé.","habitants":"Famille Dussargues \r\n        \"","divers":"Château de Valoubière","gps":"","images":["../../jctruffet.com/image/image_07/07_Valoubiere_1.jpg","../../jctruffet.com/image/image_07/07_Valoubiere_2.jpg","../../jctruffet.com/image/image_07/07_Valoubiere_3.jpg","../../jctruffet.com/image/image_07/07_Valoubiere_4.jpg"]},"Consult_chateau_formulairec36f":{"id":"Consult_chateau_formulairec36f","dept":"07","canton":"Viviers","commune":"Valvignières","nom":"Valvignieres","type":"Vestiges","periode":"XVI","histoire":"Valvignières: En 1650 le premier co-seigneur connu fut Marc-Plantin écuyer de Villeperdrix et consul de Pont-Saint-Esprit, suivit de son fils Jérome qui prit les mêmes fonctions.                En 1763 Charles-Constance-François-Régis de Plantin de Villeperdrix épousa Catherine-Claire de Bruneau d'Ornac et dans ces années de co-seigneuries, elle fut reprise par Jacques de Mercoyrol seigneur de Beaulieu, de la Roche d'Apt, de Valvignières  et de Saint-Thomés.","architecture":"Dans cette ville il reste peu de chose de ce village fortifié, des éléments de tours, de remparts , de portes et des maisons renaissances, il faut reconnaître que la population de ce village s'applique a embellir leur patrimoine.","habitants":"Famille de Mercoyrol\r\n        \"","divers":"Vestiges dans le village","gps":"","images":["../../jctruffet.com/image/image_07/07_Valvignieres_1.jpg","../../jctruffet.com/image/image_07/07_Valvignieres_2.jpg","../../jctruffet.com/image/image_07/07_Valvignieres_3.jpg","../../jctruffet.com/image/image_07/07_Valvignieres_4.jpg"]},"Consult_chateau_formulaire77c1":{"id":"Consult_chateau_formulaire77c1","dept":"07","canton":"Les Vans","commune":"Les Vans","nom":"Vans_les","type":"Vestiges","periode":"XIII","histoire":"Les Vans: Rattaché au mandement de Naves a toujours appartenu à plusieurs co-seigneurs et en 1478  les Rochebarons, en  1625 Charles de la Fare marquis de la Fare-Montclar qui par le mariage avec Jacqueline de Borne de Laugères, dame de la Borie de Balazuc  devient seigneur de Naves,  des Vans, Grammaize, Ribes, Mirandol,  Larzallier, le Mosel, Labouresse, Valgorge, Rocles,  le Gua et Saint-Pierre de Malet; il est baron de Balazuc et de Rochegude de cette union nacquit  le poète de la Fare. En 1643 on trouvait les de Roure, les  Bellard de la Garde de Chambonnas, les d'Elze de Courseules et les de Larqué.             En 1742 le fief passa au  duc d'Uzès, les de Chambonnas, les Villefort, les du Vernet et les Bertrand.","architecture":"Le château dominant était celui de Naves.  Les Vans était un village fortifié avec 14 tours et 5 portes, tout a été détruit en 1629 lors des guerres de religion.","habitants":"Famille de la Fare\r\n        \"","divers":"Patrimoine des Vans","gps":"","images":["../../jctruffet.com/image/image_07/07_Vans_les_1.jpg"]},"Consult_chateau_formulaireed6c":{"id":"Consult_chateau_formulaireed6c","dept":"07","canton":"St-Félicien","commune":"Vaudevant","nom":"Vaudevant","type":"Maison forte","periode":"XV","histoire":"Clozel: au XVIe siècle un Claude Clozel de Saint-Félicien ayant épousé Marie Piot, habitant  Vaudevant leur fils fit construire la maison forte,  puis par alliance de leur descendance à la famille Martin et ainsi de suite toujours par alliance à la famille de  Hérasme de Suffise, en 1621, cette famille garda cette demeure jusqu'en 1723 au mariage de Antoinette à Antoine de Clavières de Villeneuve, leur petit fils, Louis-Antoine-René de Clavières de Villeneuve épousa la fille d'un notaire de Saint-Félicien, Marie Malleval, plus connue par le nom de son second mari  \"madame de Dienne\"  qui fonda par testament  l'orphelinat de Saint-Félicien dans sa propre maison et elle légua le Clozel à Ferdinand de Chazotte, zouave pontifical, grand-père de l'actuel comte de Chazotte , lequel à vendu en 1973 la maison à monsieur Leclercp.","architecture":"Grosse bâtisse à trois niveaux à toit presque plat enfermée dans un parc muré avec cour et tour ronde aujourd'hui arasé.","habitants":"Famille Clozel\r\n        \"","divers":"Maison forte de Clozel.","gps":"","images":["../../jctruffet.com/image/image_07/07_Clozel_1.jpg"]},"Consult_chateau_formulaire9b75":{"id":"Consult_chateau_formulaire9b75","dept":"07","canton":"Vernoux","commune":"Vernoux","nom":"Vausseche","type":"Maison forte","periode":"XIV","histoire":"Vaussèche: Cité dés le XIIIe siècle, au XIVe siècle appartenait à la famille de Collans, passa à la famille de Presle, puis passa aux de Montgros qui y résidèrent jusqu'à la fin du XVIIe siècle.\r\n Au début du XVIIIe siècle le domaine appartient à monsieur de Vallon qui le revend à monsieur Jean-Jacques Badon, notaire à Vernoux, pour Marguerite, fille de Claude Badon, épousa monsieur de Rouville, conseiller au parlement de Toulouse. \r\nEn 1849 monsieur Sonier de la Boissière hérita du château, en 1905 monsieur Henri Sonnier de la Boissière a épousé la fille cadette  de monsieur Ferdinand de Chazotte,  comte de Clavières et de mademoiselle Annabelle  de Longchamps.\r\nLe château est toujours dans la famille.","architecture":"Cette maison forte de forme rectangulaire, dont la construction qui paraît dater des XIV-XVe siècle était précédé d'une construction antérieure. \r\nElle possédait à l'époque cinq tours , aujourd'hui trois tours rondes et une carrée ( dite tour \" Sarrasine\"). \r\nPossède une cheminée classée I S M H.","habitants":"famille de Collans   \r\nfamille  de Presle   \r\nMonsieur Jean-Jacques Badon  \r\nMonsieur Sonier de la Boisière\r\n        \"","divers":"Maison forte de Vaussèche","gps":"","images":["../../jctruffet.com/image/image_07/07_Vausseche_1.jpg","../../jctruffet.com/image/image_07/07_Vausseche_2.jpg","../../jctruffet.com/image/image_07/07_Vausseche_3.jpg","../../jctruffet.com/image/image_07/07_Vausseche_4.jpg"]},"Consult_chateau_formulaireab19":{"id":"Consult_chateau_formulaireab19","dept":"07","canton":"Thueyts","commune":"Meyras","nom":"Ventadour_Hautsegur","type":"Vestiges","periode":"XI_XVI","histoire":"Ventadour: Ce château-forteresse a été édifié au XIIIe siècle  par le seigneur de la Roche en Régnier et seigneur de Meyras, sur les bases d'un ancien château, c'était plus une position militaire qu'une demeure de seigneurs qui n'habitèrent presque jamais en ces lieux.\r\nIl s'appelait Meyras pris le nom de Ventadour au XVe siècle juste avant son démantèlement, il était alors la propriété du seigneur de la Voulte.      Fief des Solignac qui le cèdent aux Montlaur, puis aux Jaujac jusqu'en 1262 et aux la Roche en Régnier qui le construisit.\r\nEn 1344 propriété de la seigneurie des Levis de Lautrec  par alliance  aux Levis-Ventadour, grande lignée féodale, duc en 1578.  \r\nPassa de 1463 à 1490 aux Bourbons, de 1490 à 1663  aux comtes Levis de Ventadour seigneur de la Roche succèdent les la Tour de Baings de Saint-Vidal  seigneur de Choisinet, son fils épousa  Marie-Félicie de Launay, les biens passèrent aux de Launay; comte d'Antraigues  et aux Chanaleilles en 1655. \r\nLe château fut détruit pendant les guerres de religion et resta en état de ruines, servit de refuge à toutes sortes de rebelle, des Montréal, des Roures etc..vendu comme bien national en 1794. Des acquéreurs Seboul du pont de la Baume, Bernard Dusserre, puis Louis Hippolyte des Arcis qui le revendirent en 1845 à Salomon Croizier,  revendut ensuite au marquis de Sosthéme de Chanaleilles installé au château de Chambonnas, sa fille Isabelle épouse d'Albenc de Marcieu hérita, les de Marcieu Guy et Amédée,  c'est Amédée veuve qui vendit en 1968 à Pierre Pottier (Gendre du marquis de Marcieu et spécialiste de la reconstruction du patrimoine) propriétaire du château.                             Dans la commune de Meyras le château de Hautségur: Cité en 1414 par Jean de Langlade, en 1680 passa aux Chanaleilles, seigneur de la Croze. \r\nHautségur fut vendu le 20 Juin 1752 à Jean Neyron, docteur en droit, aujourd'hui Patricia Demangeon en est propriétaire depuis 2012.","architecture":"Ventadour; ce château-forteresse a été édifié sur un promontoire rocheux dominant deux vallées de l'Ardèche et de Fontaulière entre le XIIIe siècle, siège d'une viguerie, il s'appela Ventadour juste avant son démantèlement en 1700, en cours de restauration  depuis 1969,  a repris la reconstruction de ses tours et donjon avec crénelures comme à l'origine.                            Hautségur; construit au XIIe Siècle en grosse bâtisse  irrégulière, de forme rectangulaire, corps de logis flanqué d'une grosse tour rectangulaire et de deux guérites en encorbellement aux angles, les échauguettes furent démantelées à la Révolution.","habitants":"seigneur de la Roche en Régnier   \r\nfamille Levis de Ventadour  \r\nseigneur de Launey d'Antraigues  \r\nMadame et Monsieur Pottier\r\n        \"","divers":"Gravure à l'état ruines à sa remise en état.( bravo monsieur Pottier) et château de Hautségur.","gps":"","images":["../../jctruffet.com/image/image_07/07_Ventadour_1.jpg","../../jctruffet.com/image/image_07/07_Ventadour_2.jpg","../../jctruffet.com/image/image_07/07_Ventadour_3.jpg","../../jctruffet.com/image/image_07/07_Ventadour_4.jpg","../../jctruffet.com/image/image_07/07_Ventadour_5.jpg","../../jctruffet.com/image/image_07/07_Ventadour_6.jpg","../../jctruffet.com/image/image_07/07_Ventadour_7.jpg","../../jctruffet.com/image/image_07/07_Ventadour_8.jpg","../../jctruffet.com/image/image_07/07_Ventadour_9.jpg"]},"Consult_chateau_formulairec922":{"id":"Consult_chateau_formulairec922","dept":"07","canton":"Lamastre","commune":"Desaignes","nom":"Vergier","type":"Maison forte","periode":"XIX","histoire":"Vergier:  Etait la propriété de François de Chanaleilles et au XVIe siècle les de Meyres s'installèrent au château du Vergier, apporté en dot par Louise de chanaleilles. François de Meyres seigneur de Retourtour et propriétaire de leur château de Meyres à Desaignes acheta la  seigneurie de la Mastre, et c'est François-Christophe de Tournon de Meyres chevalier et baron de Retourtour propriétaire, au XVIIe siècle réaménage complètement le Vergier où il mène grande vie. \r\nLieutenant de Louveterie, il participa avec son équipage  à la chasse de la bête du Gévaudan.","architecture":"Cette maison forte de deux étages et attique  remanié sur les restes d'un château féodal du XIIIe siècle ; corps de logis de forme carrée flanqué d'échauguettes en angles et d'une tourelle ronde crénelée à été transformée  aujourd'hui en chambres d'hôtes.","habitants":"Famille François de Chanaleilles\r\nBaron de Tournon de Mayres\r\nLieutenant de Louveterie\r\n\r\n        \"","divers":"Maison forte du Vergier","gps":"","images":["../../jctruffet.com/image/image_07/07_Vergier_1.jpg","../../jctruffet.com/image/image_07/07_Vergier_2.jpg","../../jctruffet.com/image/image_07/07_Vergier_3.jpg","../../jctruffet.com/image/image_07/07_Vergier_4.jpg","../../jctruffet.com/image/image_07/07_Vergier_5.jpg"]},"Consult_chateau_formulaire6c19":{"id":"Consult_chateau_formulaire6c19","dept":"07","canton":"Joyeuse","commune":"Vernon","nom":"Vernon_Latoure","type":"Maison forte","periode":"XV","histoire":"Vernon:  Appartenait au temporel du Viviers, au XIIIe siècle il y avait déjà les seigneurs de Vernon, En 1365 Catherine de Vernon épousa Béraud d'Agrain  en présence de   Pons de Pierre Mallet, co-seigneurs de Vernon, cette famille s'éteint en 1450, puis par alliance de  Martine de Montjonc dont la famille était seigneur de Vernon en 1594 avec Jacques de Ginestoux, laquelle récupéra  la seigneurie de Vernon, puis passa aux Chanaleilles dont Guillaume troisième du nom, chevalier, capitaine et  seigneur de Vernon et d'autres lieux, en 1630 repassa aux de Ginestoux Jacques et Annet de Ginestoux qui demeurait au château de Vernon en 1670. En 1764 le comte de Ginestoux habitant Arles vendit la seigneurie a Jean Louis  Dusarques de Planzolles.","architecture":"De cette maison forte, il reste une grosse tour ronde à canonnières accolée à un corps de logis rectangulaire à deux étages il abrite aujourd'hui la mairie.","habitants":"Famille de Ginestoux\r\n        \"","divers":"Maison forte de Vernon-Latour et maison renaissance de Brugel","gps":"","images":["../../jctruffet.com/image/image_07/07_Vernon_Latoure_1.jpg","../../jctruffet.com/image/image_07/07_Vernon_Latoure_2.jpg"]},"Consult_chateau_formulaire4e51":{"id":"Consult_chateau_formulaire4e51","dept":"07","canton":"Vernoux","commune":"Vernoux","nom":"Vernoux","type":"Maison forte","periode":"XV","histoire":"Vernoux: Au féodal fief des comtes de Valentinois, en 1205 le prieur avait cédé une part de la juridiction temporelle à Aymar II de Poitiers, au XVIe siècle appartenait aux de Clermont et ensuite  a Henri de Ginestous,  marquis de la Tourette  seigneur de Vernoux.     Vernoux possède le château de la Veyrume;  maison de justice des co-seigneurs de Vernoux, les grandes caves voûtées ont servies de cachots, qui existent encore. Dans l'un deux fut enfermé le pasteur Désubas  en décembre 1745, ce manoir a été acquit en 1866 par M.de Vissac de Saint-Marcel, et en 1885 par la famille de M. Genthial qui le possède encore.                        Vernoux possède aussi la maison de la préfecture et la maison des Charmilles ou s'installa le colonel Dubois qui avait épousé Adélaïde de Montreynaud jusqu'à la mort du colonel en 1832. Fleureton: Le premier seigneur connu de Fleureton est Esprit Floretton, dit messire Floretton, notaire à Vernoux, de 1628 à 1666  mentionné comme militant huguenot par le marquis de Lestrange. L'héritage revînt à sa belle-sur, Jeanne Achard qui épousa François de Sanglier, le 9 Juin 1671.                    Les PECHERS: Les premiers seigneurs connus appartiennent à la famille de Collans, le 15 Août 1325 Géranton et Guillaume de Collans seigneurs des Peschiers.                              En 1445 le seigneur des Peschiers et Géranton de Presles neveu du seigneur de Vaussèche, Guillaume de Presles, cette famille  y vécut presque un siècle,  passa ensuite,  par alliance entre les mains de la famille Montgros qui y résidèrent jusqu'à la fin du XVIIe siècle .\r\nAu début du XVIII siècle,  le comte de Vallon vend ses biens à J.J. Badon pour acquérir un régiment.\r\n Après la Révolution le château fut cédé à la famille Mirabel-Chambaud.","architecture":"Dans cette ville du Vivarais reste des habitations du XVe siècle au XIXe siècle  qui font parties du patrimoine, certaines sont  privées.                            Fleureton; Cette demeure plus importante à l'époque, possède malgré tout un corps de logis flanqué de deux tours carrées dont une a été construite en 1942,  et a conservé quelques motifs architecturaux des XV et XVIe siècle.                  Pechers;( Peschiers) corps de logis central  rectangulaire à trois  étages flanqué d'une tour  à toit plat, le bâtiment accolé à des dépendances en équerres terminant par une tour ronde et une tour carrée.","habitants":"Famille de la Tourette\r\n        \"","divers":"La maison du Prefet\r\nTour du château de Veyrune\r\nMaison du colonel Dubois\r\nManoir de Fleureton\r\nManoir de Piberet\r\nManoir des Pechers","gps":"","images":["../../jctruffet.com/image/image_07/07_Vernoux_1.jpg","../../jctruffet.com/image/image_07/07_Vernoux_2.jpg","../../jctruffet.com/image/image_07/07_Vernoux_3.jpg","../../jctruffet.com/image/image_07/07_Vernoux_4.jpg","../../jctruffet.com/image/image_07/07_Vernoux_5.jpg","../../jctruffet.com/image/image_07/07_Vernoux_6.jpg","../../jctruffet.com/image/image_07/07_Vernoux_7.jpg","../../jctruffet.com/image/image_07/07_Vernoux_8.jpg"]},"Consult_chateau_formulaire7b17":{"id":"Consult_chateau_formulaire7b17","dept":"07","canton":"Largentière","commune":"Sanilhac","nom":"Versas","type":"Manoir","periode":"XVII","histoire":"Versas: Ce manoir  fut construit au XVIIe siècle par Jacques de Montbrison, le fief est resté dans cette famille  de 1529 à 1669, au milieu du XVIe siècle Louise de Montbrison épousa Claude Laurent de Rochessauve et en deuxième mariage  Bermond de Combas, gouverneur de Bourg-Saint-Andéol de leur huit enfants ne survécut qu'une fille Michèle de Montbrison qui épousa en 1562  Dominique de Bernard seigneur de Parignargues dont les enfants formèrent la deuxième branche des Montbrison.  Ce château se trouva en 1700 de nouveau dans les mains du Marquis de Roure de Beaumont-Brison (autre branche de la famille d'origine) puis passa au Tardivon en 1702, ensuite aux marquis de Beaumont-Brison et en 1713 par un neveu héritier a Scipion-Guillaume de Bernard de Montbrison.\r\nAujourd'hui appartient au docteur Cedart.","architecture":"Construit au XVe siècle; Il fut endommagé à la Révolution , restauré et fut transformé en ferme, sa conception architecturale témoigne une volonté qui le différencie nettement des autres manoirs, par sa tour octogonale abritant l'escalier (classé), corps de logis rectangulaire à deux étages et attique  cantonné d'échauguettes, grandes et larges fenêtres à meneaux.","habitants":"Famille de Montbrison   \r\nFamille Bermond de Combas\r\n        \"","divers":"Manoir de Versas","gps":"","images":["../../jctruffet.com/image/image_07/07_Versas_1.jpg","../../jctruffet.com/image/image_07/07_Versas_2.jpg","../../jctruffet.com/image/image_07/07_Versas_3.jpg"]},"Consult_chateau_formulairefe4c":{"id":"Consult_chateau_formulairefe4c","dept":"07","canton":"Villeneuve-de-Berg","commune":"Villeneuve-de-Berg","nom":"Villeneuve_de_Berg","type":"Château","periode":"XIII","histoire":"Villeneuve de Berg: Fief des évêques de Viviers, en 1284, le sénéchal de Beaucaire s'empressa de fonder une \" ville neuve\" dont le roi serait co-seigneur avec le maître des lieux l'abbé Mazan. \r\nEn 1322 passa de nouveau sous le contrôle des évêques de Viviers. \r\nEn 1621 la ville est assiégé par le duc de Montmorency qui détruit le temple avec interdiction de le reconstruire. \r\nEn 1671 Villeneuve de Berg fut chargé d'une nouvelle fonction. \r\nLa réforme des maîtrises des eaux et des forêts.\r\nLa mairie actuelle occupe l'ancienne maison du roi du château de Villeneuve vit naître Olivier de Serre, le  père de l'agriculture moderne, voir article Mirabel.\r\nLA-COSTE: Antoine Meunier viguier de Villeneuve de Berg, originaire de Bourg en Bresse qui avait épousé Marie de Raoux en première noce héritière de la maison des Astars, sa fille Magdelaine de Meunier épousa en 1730 Antoine Barruel de Saint-Pons seigneurs et co-seigneurs de la région de Villeneuve de Berg, sa petite fille Marie Mége épousa en 1752, le comte Sébastien-Benoit de Colonne-d'Ornano chevalier de Saint-Louis, capitaine au régiment de Septimanie.\r\nLA-JAVELIER: Jean André de Malzamet seigneur de la Javelier et autres; lieutenant capitaine au régiment du Forez, chevalier de Saint-Louis qui décéda en 1766 sans postérité.","architecture":"Villeneuve de Berg: Du château du XIIIe siècle  ne subsiste  qu'un donjon quadrangulaire, qui servit de clocher à l'église, également grande enceinte quadrangulaire était cantonnée de sept tours du XVe siècle: Berg,  le Clocher, Barjac, les Astards, Langogne, Bougette, Neuve, et quatre portes: Nôtre-Dame l'Hôpital, le Mazel, St Jean; subsistent de cette bastide des remparts avec la magnifique porte de l'Hôpital, et la tour des Astars où Louis XIII séjourna en 1629. \r\nA l'intérieur de la vieille ville ont peut voir des façades d'hôtels particuliers du XVIIIe siècle ayant appartenu aux magistrats\r\nLa Coste: Gentilhommière flanquée de tours rondes. \r\nLa Javelier: Château de style renaissance Ardèchoise, quadrangulaire flanqué de deux tours rondes en façade.","habitants":"Abbe Mazan  \r\nOlivier de Serres\r\n        \"","divers":"Le château.\r\nMaison renaissance dans la ville.\r\nVue de la maison forte de La Coste.\r\nMaison forte la Javelier.","gps":"","images":["../../jctruffet.com/image/image_07/07_Villeneuve_de_Berg_1.jpg","../../jctruffet.com/image/image_07/07_Villeneuve_de_Berg_2.jpg","../../jctruffet.com/image/image_07/07_Villeneuve_de_Berg_3.jpg","../../jctruffet.com/image/image_07/07_Villeneuve_de_Berg_4.jpg","../../jctruffet.com/image/image_07/07_Villeneuve_de_Berg_5.jpg","../../jctruffet.com/image/image_07/07_Villeneuve_de_Berg_6.jpg","../../jctruffet.com/image/image_07/07_Villeneuve_de_Berg_7.jpg"]},"Consult_chateau_formulairea1d5-2":{"id":"Consult_chateau_formulairea1d5-2","dept":"07","canton":"Coucouron","commune":"Lachapelle-de-Graillouse","nom":"Villeneuve_Graillouse","type":"Maison forte","periode":"XVI","histoire":"Villeneuve: Construite au XVIe siècle par les seigneurs de Brison. Propriété de Mr Bertrand.","architecture":"Villeneuve: Maison forte, corps de logis rectangulaire de deux étages et attique flanquée d'une élégante et unique  tour octogonale desservi par un escalier à vis, très bien restauré,  belles fenêtres à meneaux.","habitants":"Seignieur de Brison\r\n        \"","divers":"Maison forte de Villeneuve de Graillouse","gps":"","images":["../../jctruffet.com/image/image_07/07_Villeneuve_1.jpg"]},"Consult_chateau_formulaire6625":{"id":"Consult_chateau_formulaire6625","dept":"07","canton":"Largentière","commune":"Vinezac","nom":"Vinezac","type":"Vestiges","periode":"XII-XIV","histoire":"Vinezac: Au XIIIe siècle la seigneurie était partagé entre l'évêque de Viviers et les seigneurs de Balazuc et une partie aux Chaste, puis fut vendu à Aymar de Julien et à Pierre de Laudun, puis on trouva au siècle suivant un seigneur appelé Alzia seigneur de Joanas et au XVe siècle Vinezac est vendu au seigneur du Merzelet, puis par alliance passa aux de Charbonnel de Chausson et passa de nouveau par alliance au Julien en 1644, cette famille  émigra à la Révolution et fit retour, s'éteignirent en 1815 sans descendance.                             Dans le hameau le château CHARBONNEL, au XVIIIe siècle, de l'histoire que nous connaissons de ce château est le mariage de Marie fille de Louis de Charbonnel de Chauzon avec Louis de Julien capitaine Labeaume par dot, la seigneurie de Vinezac revient à la famille Julien qui la gardera jusqu'à la Révolution.       JULIEN: Louis de Julien , capitaine de La Beaume , par dot de la seigneurie de Vinezac récupère le château qui prit son nom, que ses ancêtres  avaient perdue par le mariage avec Marie, fille de Charbonnel qui possède le château à l'opposé du village, ce château fut la propriété de diverses familles seigneuriales successivement; les de Joannas, les de Chalendar, les de Servissas et  les de Julien. Rattaché à la commune en 1928.","architecture":"Vinezac, le château sur la motte  village fortifié, possédait à l'époque trois châteaux, au sud le château Julien qui a conservé un donjon tour carrée incluse dans un ensemble de maison très remanié, une tour ronde du XIVe siècle. Du château de la Motte reste quelques traces et le château Charbonnel aujourd'hui transformé en hôtel restaurant.                             Charbonnel; ce château est conservé dans son état d'origine , il n'a pratiquement pas changé depuis sa construction en 1620, transformé aujourd'hui en hôtel restaurant de prestige.                  Julien; Aujourd'hui  il  reste du château un donjon carré du XIIe siècle caché par des bâtiments ultérieurs et une petite tour circulaire avec bretèche et meurtrières, un corps de  logis rectangulaire avec cour intérieure, transformé en hôtel.","habitants":"Seigneurs de Charbonnel et Jullien\r\n        \"","divers":"Village fortifié de Vinezac           Château de Charbonnel et de Julien","gps":"","images":["../../jctruffet.com/image/image_07/07_Vinezac_1.jpg","../../jctruffet.com/image/image_07/07_Vinezac_2.jpg","../../jctruffet.com/image/image_07/07_Vinezac_3.jpg","../../jctruffet.com/image/image_07/07_Vinezac_4.jpg"]},"Consult_chateau_formulaire03ec":{"id":"Consult_chateau_formulaire03ec","dept":"07","canton":"Viviers","commune":"Viviers","nom":"Viviers","type":"Palais","periode":"XII  XVII","histoire":"VIVIERS; siège épiscopal vers 475 après l'abandon du siège primitif d'ALba, donc  propriété des évêques. L'évêque de Venance (517-535) entreprend des grands travaux et entoure la ville d'une enceinte et d'une église, elle sera détruite par les Sarrasins vers 735, démolie et relevée plus de quinze fois, c'est en 1119 qu'était consacré la cathédrale de Saint-Vincent sur ordre de l'évêque Léger, Claude de Tournon décide de construire le choeur gothique en 1498, celle-ci ne devait se terminer qu'en 1605,  en 1630 le palais reconstruit sur demande de  Mgr de Villeneuve entre 1723 et 1748, pour cela revendirent le château et les mines de Largentière. \r\nDepuis 1308 l'évêque de Viviers reconnaissait la suzeraineté du roi de France, leurs titres étaient Comtes de Viviers, Prince de Donzère et de Châteauneuf, baron de Largentière, comte de Fanjau et seigneur spirituel et temporel de Bourg-Saint-Andéol, les principaux étaient Seigneur de Sampzon,  Vallon,  Largentière,  Viviers, Rochemaure,  Bourg-Saint-Andéol,  Baix, Antraigues  le Teil et Chomérac.","architecture":"Des anciennes défenses du château Vieux, il reste une tour carrée accolée à une aula, la tour sert de clocher  avec chapelle romane à l'étage,  englobé dans des constructions postérieures, composé de deux éléments juxtaposés.\r\nla ville était protégé par des enceintes remparts du XIVe siècle.\r\nLe bâtiment  de l'évéché aujourd'hui mairie se présente comme un hôtel particulier entre cour et jardin, il adopte l'avant corps central surmonté d'un fronton  triangulaire  typique, un balcon porté par quatre colonnes d'ordre ionique.","habitants":"Claude de Tournon. \r\nMonseigneur de Villeneuve\r\n        \"","divers":"Palais épiscopal\r\nL'évêché\r\nTour(donjon et tour ronde)\r\ntour de Chomel","gps":"","images":["../../jctruffet.com/image/image_07/07_Viviers_1.jpg","../../jctruffet.com/image/image_07/07_Viviers_2.jpg","../../jctruffet.com/image/image_07/07_Viviers_3.jpg","../../jctruffet.com/image/image_07/07_Viviers_4.jpg","../../jctruffet.com/image/image_07/07_Viviers_5.jpg","../../jctruffet.com/image/image_07/07_Viviers_6.jpg","../../jctruffet.com/image/image_07/07_Viviers_7.jpg"]},"Consult_chateau_formulairef984":{"id":"Consult_chateau_formulairef984","dept":"07","canton":"Villeneuve-de-Berg","commune":"Vogue","nom":"Vogue","type":"Château","periode":"XIII","histoire":"Voguë: Au XIIe siècle une branche de la famille de Voguë habité dans une tour du vieux castrum, ensemble fortifié , famille de chevalier.\r\nAu XIIIe  siècle Raymond de Voguë rachète le château de Rochecolombe et au XIVe siècle ce château de Voguë passa à la famille de Rochemure du Besset dont- il entreprenne la reconstruction du vieil édifice  en conservant les tours, puis  ce château fut acheté par Melchior Ier de Voguë en 1603 qui remania le château en style renaissance et c'est dans ce château que fut reçu le roi Louis XIII en juin 1629. \r\nMelchior II de Voguë fils de Georges s'emploie à restaurer le château des dégats subit suite aux guerres de religion.\r\nCerice Melchior au XVIIIe siècle épouse une riche héritière bourguignone qui lui permit d'obtenir de nombreuses propriétés, mais dut émigré en 1790 ses biens du Vivarais furent saisi  et le château fut racheté en 1840 par Léonce de Voguë qui le confie à une communauté religieuse, resté dans la famille et géré par une association culturelle.  Charles-François de Voguë (1739-1782)s'est illustré durant la guerre de succession d'Autriche puis durant la guerre de sept ans, mourut avant d'être élevé à la dignité de maréchal de France. \r\nCharles-Melchior de Voguë (1829-1916) ambassadeur de France en Turquie, puis en Autriche lui ouvrit les portes de l'Académie Française.","architecture":"Château construit aux XII-XIIIe siècle remanié au XVIe siècle, corps de logis  de  style  renaissance quadrangulaire à trois étages et attique flanqué de quatre tours rondes, l'ensemble à toits plats.","habitants":"Famille Melchior de Voguë\r\n        \"","divers":"Château de Voguë","gps":"","images":["../../jctruffet.com/image/image_07/07_Vogue_1.jpg","../../jctruffet.com/image/image_07/07_Vogue_2.jpg","../../jctruffet.com/image/image_07/07_Vogue_3.jpg"]},"Consult_chateau_formulairefe14":{"id":"Consult_chateau_formulairefe14","dept":"07","canton":"La Voulte-sur-Rhône","commune":"La Voulte-sur-Rhône","nom":"Voulte_la","type":"Château","periode":"XII","histoire":"La Voulte, le premier seigneur connu était Silvion de Clérieu, en 1151 auquel l'empereur Conrad confirma des droits de péage sur le Rhône.\r\nAu XIIIe siècle passait aux de Fay par le mariage de la fille de Roger de Clérieu, puis aux comtes de Poitiers par le mariage de Philippe de Fay avec Aimar Ier de Poitiers, comte de Valentinois qui légua cette seigneurie en 1246 à Raymond ou Bermond d'Anduze, qui commença la construction du château en 1319. \r\nAu 31 Mai 1416 passa au Pierregourde. Geneviève de Lévis-Ventadour apporta à la seigneurie par alliance avec Rohan-Soubise. Période de gloire sous Gilbert III de Levis et sous son fils, Anne de Levis de Ventadour (XV-XVIIe siècle).    Les Ventadours; mariage le 14 Février 1694 avec le très haut et puissant prince Hercule Mériadec de Rohan, gouverneur et lieutenant général du roi qui firent restaurer et agrandir le château.       \r\nEn 1629, Richelieu utilise le château en quartier général pour ses troupes pour le siège de Privas. \r\nEn 1789 les Levis-Ventadour toujours propriétaire, en indivis entre le prince de Guéménée et le duc de Bourbon. Racheter après la Révolution,  quatre propriétaires se succédèrent en 40 Ans: 1893 Compagnie de l'Homme 1909 hyppolite de L'Agreval, et en 1938 racheté par Katia Granoff qui le revendra après l'incendie des allemands en 1944 à  la ville pour le remettre en état.          Dans la commune le château de Souchet fut construit au XIXe siècle par Autussac de Pravieux.","architecture":"La Voulte; construit au XIVe siècle, assailli à la Révolution, remanié au XVIIe siècle, puis en 1970 après l'incendie de la dernière guerre; il reste trois corps de logis rectangulaires  en forme de U à deux étages flanqués d'une tour carrée en angle nord et d'une tour ronde  plein cintre façade Sud.                      Souchet;  corps de logis quadrangulaire  de  deux étages, flanqué de quatre pavillons carrés en angle et d'un donjon  plein cintre sur la façade Nord.","habitants":"Famille de Poitiers \r\nFamille Levis-Ventadour  \r\nFamille Rohan-Soubise\r\n        \"","divers":"Château féodal  de la Voulte et de Souchet","gps":"","images":["../../jctruffet.com/image/image_07/07_Voulte_La_1.jpg","../../jctruffet.com/image/image_07/07_Voulte_La_2.jpg","../../jctruffet.com/image/image_07/07_Voulte_La_3.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','07 — Ardèche'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)showDet(start);
</script></body></html>
