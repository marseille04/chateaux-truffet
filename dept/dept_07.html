truffet.com/image/image_07/07_Cachard_3.jpg"]},"Consult_chateau_formulaire9e39":{"id":"Consult_chateau_formulaire9e39","dept":"07","canton":"Les Vans","commune":"Casteljau","nom":"Casteljau-Berrias","type":"Château","periode":"XIII","histoire":"Casteljau, en 1438 Pierre de la Baume de Casteljau était chevalier de Saint-Jean-de-Jérusalem, commandeur de Jalés sa descendance gardèrent le château jusqu'en 1720 puis passa au sieur de Faget par alliance. Au XVIIe siècle aux de la Garde de Chambonnas. Le château en partie détruit au XVIe siècle.\r\nDans la commune un autre château appelé ROUVIERE, au XVIe siècle les propriétaires étaient les Bertrand de Valloubières seigneur de la Rouvière et d'autre lieu, aujourd'hui lieu de colonies de vacances.                  BERRIAS: Les seigneurs de Berrias étaient au XIIIe siècle les commandeurs de Jallés. Passa ensuite aux Malbosc, famille originaire du Gévaudan.","architecture":"Casteljau; énorme bâtisse  de deux bâtiments placés en équerre et de deux grosses tours rondes à toits coniques presque plats, mâchicoulis et meurtrières.\r\nLa Rouvière de construction moderne en équerre avec clocheton sur la partie centrale.                              Berrias; ce gros château du XVIIIe siècle, aux trois tours carrées couvertes de toitures à quatre pentes reliées par le corps de logis se singularise justement par la forme de ses tours.","habitants":"Pierre de la Baume de Casteljau\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Casteljau_1.jpg","../../jctruffet.com/image/image_07/07_Casteljau_2.jpg","../../jctruffet.com/image/image_07/07_Casteljau_3.jpg","../../jctruffet.com/image/image_07/07_Casteljau_4.jpg","../../jctruffet.com/image/image_07/07_Casteljau_5.jpg","../../jctruffet.com/image/image_07/07_Casteljau_6.jpg"]},"Consult_chateau_formulaire260e":{"id":"Consult_chateau_formulaire260e","dept":"07","canton":"Serrières","commune":"Colombiers-le-Cardinal","nom":"Celestins","type":"Château","periode":"XIV","histoire":"Celestins: le château-monastère de Colombier-le-Cardinal existait déjà aux XIIe et XIIIe siècles en tant qu'important point de défense et de refuge. Il était en la possession de la famille Malatour-Colombier d'Annonay, c'est pierre Bertrand du Colombier qui débuta au XIVe siècle la construction de c Pierre de Colombier, Cardinal, Évêque d'Ostie, puis Légat du Pape (c'est à ce titre qu'il couronna l'Empereur Charles IV en 1355) est à l'origine de l'établissement des Célestins au château. Au lendemain des guerres de religion prit l'allure d'un château. \r\nPendant la Révolution les frères Monneron en firent l'acquisition, vendu ensuite à  Monsieur Bodin de Lyon qui y installa une filature de coton qui brûla en 1820, acquit par la famille Lioud, en 1859 vendu à la famille  René  Barou de la Lombardiére de Canson, papeterie d'Annonay qui le conserva pendant plus d'un siècle, En 1961 la famille de Canson vend le château et des terres attenantes, à la société Saint-Gobain et en 1982, la société Saint-Gobain vend le château et les terres au syndicat mixte d'équipement de l'Ardèche, qui sont loués à la Fédération départementale des associations familiales rurales.","architecture":"Architecture  d'un  style  élégant, et  ample d'habitude réservé aux demeures de plaisance des aristocrates est typique de la reconstruction des couvents aux XVIIe et XVIIIe siècle, bâtiment tout en longueur à deux étages, flanqué de deux pavillons aux  extrémités, celui  sur la partie ouest flanqué d'un fronton arrondi.","habitants":"Famille de Bertrand du Colombier\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Celestins_1.jpg","../../jctruffet.com/image/image_07/07_Celestins_2.jpg","../../jctruffet.com/image/image_07/07_Celestins_3.jpg","../../jctruffet.com/image/image_07/07_Celestins_4.jpg"]},"Consult_chateau_formulaire21ae":{"id":"Consult_chateau_formulaire21ae","dept":"07","canton":"Thueyts","commune":"Barnas","nom":"Chadenac","type":"Vestiges","periode":"X","histoire":"Chadenac: le premier seigneur connu était Audigier de Goerand. Le château fut détruit en 1573 Jean Ithier de Chadenac fut tué en défendant son château contre les protestants, et les ruines furent vendues aux de la Rivoire, puis à Antoine de Blou seigneur de Thueyts. \r\nIl ne reste qu'une tour de guet rescapée de la destruction du château par les huguenots au XVIe siècle.","architecture":"De ce château il ne reste qu'une tour ronde crénelée entouré de vestiges et départ de pans de murs.","habitants":"famille d'Audigier de Georand\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Chadenac_1.jpg","../../jctruffet.com/image/image_07/07_Chadenac_2.jpg"]},"Consult_chateau_formulaire1611":{"id":"Consult_chateau_formulaire1611","dept":"07","canton":"Vernoux","commune":"Chalencon","nom":"Chalencon","type":"Bourg fortifié","periode":"XI","histoire":"Chalencon: oppidum Gaulois, puis garnison romaine avant de devenir le siège de l'une des douze baronnies du Vivarais. \r\n Sous Charlemagne, le bourg devint un centre administratif important  avant d'être érigée en baronnie avec cour de justice. Au XIVe siècle  terre des comtes de Valentinois. Chalencon était entouré de remparts tellement redoutables que les armées catholiques, en 1573, en exigèrent la démolition pour conclure la paix, et passa sous le commandement de Diane de Poitiers, ancienne Baronnie des Poitiers qui ont  tenu un rôle important lors des guerres de religion. Puis aux Ventadour, aux ducs de Lorraine et à la famille de Tournon; ces derniers catholiques et (Chalencon protestants), les conflits recommencèrent apportant de nouvelles fortifications. \r\nAu XVIIe siècle Les seigneurs de l'époque ont eu maille à parti contre les Tournon, les Pierregourde, les Chambaud dont le château se trouve encore dans la commune, les de Lestrange, les de la Rivoire et les de Saint-Priest. \r\nA la fin en 1623 Richelieu ordonna la démolition définitive.            CHAMBAUD: cette famille originaire du château du même nom, Imbert de Chambaud, mourut en 1548, eut pour fils François de Chambaud, chef protestant après plusieurs combats, s'empara de Saint-Agrève en 1567, blessé mourut en 1580. \r\nIl eu un fils Jacques plus célèbre capitaine que son père, joua un rôle important de représentant du protestantisme, en 1574 aux états généraux de Blois en 1576.  \r\nIl y eut de grands combats. Montmorency le nomma gouverneur de Castres en 1592, continuant dans ses combats il devait décédé en 1600 au Val-d'Aoste.  \r\nIl eu une fille unique Paule, qui avait épousée en 1597 René de la Tour de Gouvernet; mais devenue veuve, elle alla  déclencher une nouvelle guerre civile en Vivarais en se remariant avec le très catholique Seigneur de Lestrang.  \r\nLe château fut vendu en 1760 à Mr de Montrond.","architecture":"Chalancon: de cette baronnie et du village fortifié, il ne reste qu'une porte de Besse et la tour des pendus appelée \"tour de la Potence\", place forte,  mur d'enceinte et porte des Autrichiens.                       Chambaud; aujourd'hui il subsiste un bâtiment rectangulaire et les vestiges de deux tours rondes arasées.","habitants":"Familes des comtes de Poitiers\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Chalencon_1.jpg","../../jctruffet.com/image/image_07/07_Chalencon_2.jpg","../../jctruffet.com/image/image_07/07_Chalencon_3.jpg","../../jctruffet.com/image/image_07/07_Chalencon_4.jpg"]},"Consult_chateau_formulaire4329":{"id":"Consult_chateau_formulaire4329","dept":"07","canton":"Les Vans","commune":"Chambonas","nom":"Chambonas","type":"Château","periode":"XVII","histoire":"Chambonas: ce château du XIIIe siècle par les seigneurs de la Garde-Guerrin de Chambonas et seigneur de Naves, Henri de la Garde  s'illustra sous le règne de Louis XIII dans la guerre contre les Huguenots, son fils Antoine de la Garde achète à la famille de Borne la seigneurie de Chambonas, dont les La Garde portaient le nom mais qu'ils ne possédaient pas jusqu'alors, son petit fils Louis-Antoine obtient en 1683 la nomination des terres en marquisat, meurt sans enfant et le domaine revient à son frère Henri-Joseph, son fils  épousa en seconde noce une Beauvoir de Roure, et leur fils Scipion-Louis-Joseph en 1750 voulu faire un exploit qui le ruina; parc à la française.(Scipion de la Garde de Chambonas est ministre des affaires étrangères de Louis XVI). \r\nLe château saisit à la Révolution, dévasté  et occupé par une garnison d'infanterie, est restitué en 1802 dans son état aux la Garde de Chambonas. En 1808,  passa aux marquis Charles de Chanaleilles de retour d'émigration qui fut nommé marquis de Chambonas et pair de France par Louis-Philippe, siégera quarante ans au conseil général de l'Ardèche et sa petite fille  la comtesse G. de Marcieu hérita en 1893, toujours dans la descendance en 1965.","architecture":"Château de style Louis XIII construit fin XVI-XVIIe siècle, quadrilatère à trois niveaux flanqué de quatre tours cylindriques, et prolongé vers le Nord-Est par un bâtiment de même élévation datant du XVIIIe siècle, est raccordé au bâtiment principal par un escalier à vis, tout ceci encadre une cour, la façade est encadrée  de deux tours et deux échauguettes encadrant l'horloge.\r\nParc à la Française de Le Nôtre.","habitants":"famille de Scippion de La Garde\r\nFamille de Chanaleilles \r\nfamille du Marquis de Marcieu\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Chambonas_1.jpg","../../jctruffet.com/image/image_07/07_Chambonas_2.jpg","../../jctruffet.com/image/image_07/07_Chambonas_3.jpg","../../jctruffet.com/image/image_07/07_Chambonas_4.jpg"]},"Consult_chateau_formulaire21a5":{"id":"Consult_chateau_formulaire21a5","dept":"07","canton":"La Voulte-sur-Rhône","commune":"Charmes-sur-Rhône","nom":"Charmes sur Rhone","type":"Vestiges","periode":"XIII","histoire":"Charmes sur Rhône: à partir de 1217, le château appartenait à Giraud de Bastet, seigneur de Crussol, resta dans le fief jusqu'en 1507, passa sous le duché d'Uzés, jouèrent un rôle important pendant les guerres de religions. \r\nEn 1620 Emmanuel de Crussol reçut les hommages des consuls d'Uzés.\r\nL'abandon de la demeure et peut-être sa destruction date sans doute du siège de Soyons par Montmorency en 1629.\r\n( voir article Crussol).","architecture":"Charmes; de ce château féodal il ne reste que d'importants vestiges sur la crête du bourg que la commune essaye de le maintenir.                          Mirabel; voir Toulaud  possédait à l'époque deux tours.","habitants":"Famille de Giraud Bastet\r\nfamille d'Emmanuel de Crussol\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Charmes_sur_Rhone_1.jpg","../../jctruffet.com/image/image_07/07_Charmes_sur_Rhone_2.jpg","../../jctruffet.com/image/image_07/07_Charmes_sur_Rhone_3.jpg","../../jctruffet.com/image/image_07/07_Charmes_sur_Rhone_4.jpg"]},"Consult_chateau_formulaire1712":{"id":"Consult_chateau_formulaire1712","dept":"07","canton":"Les Vans","commune":"Chassagnes","nom":"Chassagnes","type":"Château","periode":"XV","histoire":"Chassagnes: en 1251 Arnaud de Voguë évêque de Viviers achetait le Castrum et en 1273, un Falcon de Chassagnes, début XVe siècle, le seigneur était Astorg de Montjeu, (branche descendante des Chazotte) qui aménagea le château à la place d'un ancien donjon de la famille des Prochans et en 1607 un Jacques de Montjeu était encore le seigneur de Chassagnes, passe au XVIIe siècle aux Iznard de Villefort, et ensuite aux la Forest de Chassagnes puis aux Chanaleilles, famille une des plus ancienne et des plus considérable en Vivarais. Entre 1893 et 1899 : un vaste château est alors bâti au même emplacement pour l'industriel lyonnais Henry Roux de Bézieux; l'architecte serait le lyonnais Paul de Montclos et les jardins sont dessinés par le paysagiste Henri Duchêne, père d'Achille Duchêne. Ce château abritait la retraite d'un moine de l'ordre de Citeaux.","architecture":"Château dont un donjon devait exister jusqu'à la fin du XIVe siècle. Un changement de résidence est attesté au milieu du XVIe siècle, corps de logis carré à quatre étages, flanqué de trois  tours qui ont été rajoutées au donjon au XVIIe siècle à toit en poivrière  (tuiles vernissées).","habitants":"Famille de Falcon de Chassagnes    Famille de Montjeu\r\n        \"","divers":"Château de Chassagnes","gps":"","images":["../../jctruffet.com/image/image_07/07_Chassagnes_1.jpg","../../jctruffet.com/image/image_07/07_Chassagnes_2.jpg"]},"Consult_chateau_formulaire1c76":{"id":"Consult_chateau_formulaire1c76","dept":"07","canton":"Valgorge","commune":"Valgorge","nom":"Chastanet","type":"Maison forte","periode":"XV","histoire":"Chastanet: les seigneurs connut au XVIIe siècle étaient les de la Fare, où naquit dans ce château  en 1644 le poète  Charles Auguste, marquis de La Fare , noble descendant de cette illustre famille qui, dans le XIe siècle, sous le règne de Henri Ier petit fils de Hugues Capet, comptait un chevalier de son nom parmi les grands du royaume; Charles Auguste mourut en 1712. La famille Jassoin a vécut dans cette maison forte.","architecture":"Maison forte rectangulaire de trois étages accolée aux dépendances, transformé en exploitation agricole.","habitants":"Famille d'Ovide de Valgorge\r\nFamille Jassoin et le Marquis de la Fare mémorialiste et poète\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Chastanet_1.jpg","../../jctruffet.com/image/image_07/07_Chastanet_2.jpg"]},"Consult_chateau_formulaire6e81":{"id":"Consult_chateau_formulaire6e81","dept":"07","canton":"Les Vans","commune":"St-André-de-Cruzières","nom":"Chastelas_St_Andre","type":"Château","periode":"XIII -XVI","histoire":"Chastellas Saint-André: Au XIIe siècle  la seigneurie appartenait aux de Barjac , qui en font don au commandeur de Jalés.\r\nLes templiers en furent donc les propriétaires, puis passa à la vicomté de Joyeuse au XIVe siècle et aux XVIe siècle aux de  Baume .","architecture":"Grosse bâtisse rectctangulaire à plusieurs niveaux, donjon carré belles fenêtres à meneaux et échauguettes","habitants":"Seigneur de  Baume\r\n        \"","divers":"Château de Saint-André","gps":"","images":["../../jctruffet.com/image/image_07/07_Chastelas_St_Andre_1.jpg","../../jctruffet.com/image/image_07/07_Chastelas_St_Andre_2.jpg","../../jctruffet.com/image/image_07/07_Chastelas_St_Andre_3.jpg"]},"Consult_chateau_formulaire5848":{"id":"Consult_chateau_formulaire5848","dept":"07","canton":"St-Péray","commune":"Châteaubourg","nom":"Chateaubourg","type":"Château","periode":"XII","histoire":"Châteaubourg: cité au XIe siècle, par Guillaume de Baudiner, en 1257 Giraud de Bastet, en 1283 Roger de Clérieux, au XIIIe siècle à la maison de Tournon et Richard de Clérieux en 1303, puis a Aymar V de Poitiers jusqu'en 1405 qui le revendit au seigneur de Fay, puis à Marguerite de Montchenu par alliance passa au de Brion et en 1592 à Guillaume de Rochebaron, en 1605 aux seigneurs de Pierregourde dont la fille marié à un de Maugiron qui en 1720 en rendit hommage à sieur André, puis à Jean-Jacques Guyenot seigneur de Châteaubourg. A la fin du XVIIIe siècle aux de Veynes. Racheté en 2007 par monsieur Arnaud Alain.","architecture":"Cette forteresse de style troubadour  située sur un rocher de granit contrôlant le Rhône est connue depuis le XIIe siècle,  remanié au XVIe siècle par le percement de fenêtres à meneaux; un grand corps de logis relie une tour ronde à un donjon quadrangulaire. \r\nReprit au XIXe siècle d'une tour circulaire d'une haute toiture en poivrière et d'un ensemble de crénelé.","habitants":"Famille de Guillaume de Beaudiner \r\nFamille de Roger de Clérieux\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Chateaubourg_1.jpg","../../jctruffet.com/image/image_07/07_Chateaubourg_2.jpg","../../jctruffet.com/image/image_07/07_Chateaubourg_3.jpg","../../jctruffet.com/image/image_07/07_Chateaubourg_4.jpg","../../jctruffet.com/image/image_07/07_Chateaubourg_5.jpg"]},"Consult_chateau_formulaireecea":{"id":"Consult_chateau_formulaireecea","dept":"07","canton":"Vernoux","commune":"Châteauneuf-de-Vernoux","nom":"Chateauneuf_de_Vernoux","type":"Vestiges","periode":"XII","histoire":"Châteauneuf de Vernoux: en 1255 appartenant à Aymar III de Poitiers, en 1280 aux Aymar IV de Poitiers seigneurs de Tournon, en 1304, à Hugues seigneurs de Pierregoude. \r\nAu XVIe siècle sera partagé entre les Tournon (Claude de Tournon ) et les Pierregourde( Hugues de Pierregourde), en 1631 aux seigneurs de Gardon, en 1657 aux Bénéfice, au XVIIIe siècle vendu à Claude Robert, avocat.","architecture":"Les fortifications furent détruites en 1567, tandis que le château  féodal était déjà en ruines vers 1650. \r\nVestiges du château dont il reste qu' un pan de mur du donjon quadrangulaire.","habitants":"famille de Claude de Tournon  \r\nfamille d'Hugues de Pierregourde\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Chateauneuf_de_Vernoux_1.jpg"]},"Consult_chateau_formulaireeb06":{"id":"Consult_chateau_formulaireeb06","dept":"07","canton":"Vallon-Pont-d`Arc","commune":"Ruoms","nom":"Chaussy","type":"Château","periode":"XV","histoire":"Chaussy: ce château appartenait à  la famille de Louis du Ranc en 1442  dont il portait le nom, et que les Venduol durent acquérir en 1552 d'où il prit le nom de Chaussy. Au XVIe siècle, aux de Bonas par alliance,  Louis de Bonas, qui devint \"Monsieur de Chaussy\" capitaine renommé  d'une compagnie de 40 cheveaux. En 1659  à Scipion de Beauvoir, comte de Beauvoir de Roure, qui n'ont jamais habité au château le vendirent  en 1785 à Jean-Baptiste Tourre, resta dans sa dynastie jusqu'en 1882, passa à son gendre Edouard-Benjamin Lauriol  et fut vendu en 1953  à Fernand Chamontin qui le revendit ensuite.","architecture":"Massive bâtisse quadrangulaire de deux étages et attique flanquée de deux  tours à toits plats  et d'échauguettes en angles. \r\nLes éléments de fortification montrent qu'il a été construit avant l'utilisation de l'artillerie, il comporte des meurtrières,  deux échauguettes  et des mâchicoulis, il reste deux tours des communs.","habitants":"Famille du Ranc  \r\nfamille de Scipion de Beauvoir  \r\nfamille de Jean-Baptiste  Tourre\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Chaussy_1.jpg","../../jctruffet.com/image/image_07/07_Chaussy_2.jpg","../../jctruffet.com/image/image_07/07_Chaussy_3.jpg"]},"Consult_chateau_formulairec4fe":{"id":"Consult_chateau_formulairec4fe","dept":"07","canton":"St-Félicien","commune":"Arlebosc","nom":"Chazotte","type":"Château","periode":"XVI","histoire":"Chazotte: berceau de la famille de Chazotte, qui se transforma en deux branches dont l'une s'éteint au XIVe siècle dans la famille des Montjeu de Chassagnes, l'autre branche, fief de la Gruterie, du Plenet, du Besset dans la paroisse de Saint-Félicien, de la Suchère, et au Chambon en Velay. \r\nLe premier seigneur connu est Jean de Chazotte en 1393, on trouve, un André de Pleynet de Chazotte, à qui l'on doit la construction du château actuel au XVe siècle, les filles descendantes de la famille, l'une d'elle, Catherine épousa  Balthazard de Bonnaud, militaire de père en fils dont Pierre-Louis hérita. \r\nA sa mort le domaine fut transmit à Jeanne de Romanet, puis  à son neveu Jean de Monteil de la Fond, seigneur de Saint-Quentin colonel d'infanterie, prend possession de Chazotte en 1696 et y meurt  en  1711. Son fils  également colonel d'infanterie, lui succède à Chazotte, le fils de ce dernier a épousé Marie-Françoise Faure de la Farge qui hérite des biens mais se désintéresse de Chazotte. \r\nEn 1728 Jean Blachier Rouchet propriétaire meurt en 1764 son fils Jean  hérite  et  sera le premier a porter le nom de Chazotte (Conseiller du Roi), décède en 1786 le laisse à son frère  Clément de Rouchet de Saint-Just curé d'Arlebosc pour choisir un successeur, c'est Athanasse de Chazotte-Carrière qui en 1795 hérita, ce dernier épousa Françoise-Thérése de Clavière.  Au XIXe siècle René-Louis de Chazotte-Clavière le posséda, puis le transmis à son fils, toujours dans la famille.","architecture":"Construit au XVI début XVIIe siècle, corps de logis cubique plus haut que large  de trois étages et attique, coiffé d'un toit à tuiles et cantonné à ses angles d'échauguettes en encorbellement reposant sur des consoles. Cour intérieure, portail d'entrée à fronton triangulaire.","habitants":"famille du Comte Louis de Chazotte \r\nfamille de Jean de Monteil\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Chazotte_1.jpg","../../jctruffet.com/image/image_07/07_Chazotte_2.jpg","../../jctruffet.com/image/image_07/07_Chazotte_3.jpg","../../jctruffet.com/image/image_07/07_Chazotte_4.jpg"]},"Consult_chateau_formulaire5747":{"id":"Consult_chateau_formulaire5747","dept":"07","canton":"St-Pierreville","commune":"Gluiras","nom":"Chervil","type":"Maison forte","periode":"XVII","histoire":"Chervil: dés le XIIIe siècle son nom est celui de Charvy, puis celui de Cherville, cette seigneurie située dans le mandement de Gluiras, sous la souveraineté de la baronnie de Chalencon. Le premier personnage célèbre est Marcoult Maurice qui reçut le 13 Août 1333 l'hommage des terres qu'il  possédait à Chalencon. EN 1423 à Falconnet Maurice et à Louis de Charvil en 1550. Un hommage prêté par noble Guinot de Marette, le 16 novembre 1489 propriétaire du dit lieu nous apprend que les  nobles jouissaient davantage de liberté. Cette famille  s'allia par alliance à celle des de Digons , des Tournon, des de Lestrange, des d'Albert, des de Montauban, des de Gordon.         En  1658 Jean Maurice seigneur de Chervil  épousa Marie de Gordon  fille de Claude de Gordon seigneur de Boulogne.    En 1786 passa dans la maison de Baillard de Combeaux, monsieur Jean-Jacques de Troussebois-Baillard de Combeaux chevalier seigneur de Chervil, il épousa Armande-Charlotte Bijard de Murinais de Saint-Maurice sans enfant. Le domaine passa au sieur Broë Jean-Jacques, comte de Troussebois ancien colonel. Le dernier seigneur fut Jean-Marcellin Baillard des Combeaux.","architecture":"Définit comme château au XIII et XVe  siècle. Aujourd'hui, maison forte, corps de logis en équerre flanquée de trois tours rondes  d'angles dont la principale conserve un escalier à vis, en bois de chêne ce qui est très rare, cheminée monumentale du XVIe.","habitants":"Famille Maurice\r\n        \"","divers":"Maison forte de Chervil","gps":"","images":["../../jctruffet.com/image/image_07/07_Chervil_1.jpg","../../jctruffet.com/image/image_07/07_Chervil_2.jpg"]},"Consult_chateau_formulaire25e7":{"id":"Consult_chateau_formulaire25e7","dept":"07","canton":"Le Cheylard","commune":"Le Cheylard","nom":"Cheylard_Cheze","type":"Château","periode":"XIV","histoire":"Cheylard et château de la Chèze: Jarenton de Chapteuil possédait le castrum du Cheylard, en fief du comte de Valentinois Aymar II de  Poitiers.\r\nEn 1248, Pons, Seigneur de Brion et du Cheylard, qui firent construire le château de la Chèze, cette seigneurie passa au XIIIe siècle aux Garrin seigneur de Jaunac et du Cheylard cette cité depuis le XIIIe siécle par les seigneurs de la Chèze et les seigneurs de Brion, aux comtes  de Valentinois, les Tournon, mais ce lieu a énormément souffert pendant les guerres de religion  jusqu'en juillet 1621 le château et les remparts furent détruit, seul une tour au bord de la Dorne fut conservée.                 Le site de Brion périclite est disparaît au XVe siècle, seul le château de la Chèze resta à Henri de Tersac et en 1582  à Gilbert III de Levis-Ventadour, le château fut vendu par sa fille en 1638 à Pierre Sellier à sa mort la famille La-Forêt-Divonne l'eût en héritage.\r\nClaude de Portalez président à la cour des comptes de Montpellier mourut à 84 ans en 1711 en son château de la Chèze . \r\nSous l'empire le château fut loué  à l'abbé Verdier qui y installe un collège de garçons. \r\nune personnalité qui laissa des traces (1820-1903) Saléon-Terras, industriel maire et conseillé général du Cheylard son fils Joseph sur ses pas fit construire le château qui fut une maternité.\r\n En 1862 acheté par Théophile Sauzet maire du Cheylard et sa fille épousa Mr Mimerel.\r\n En 1944 les allemands brûlèrent le château de la Chèze en parti détruit,  Mr Mimerel en fit don  à la commune, en 1945 qui le laisse longtemps à l'abandon, actuellement en cours de rénovation par une association de sauvegarde du patrimoine des Boutières sous le contrôle du président Gilles Oger pour un centre de loisirs.                                  Villa Mazza de Jean Mazza,  industriel, l'a fit construire en 1913, suite a ses  voyages en Allemagne.                    Saléon: construit dans la seconde moitié du XIXe siècle par François Saléon-Terass (industriel-moulinage ), il a été acheté en 1968 pour faire une maternité, actuellement privé, appelé aussi château  \"Bleu\"  transformé aujourd'hui en habitation populaire.","architecture":"La Chèze ce château fut construit au XII et XIIIe siècle de style militaire remanié au XVIe siècle  a subit de gros dégâts à la deuxième guerre mondiale, le 5 juillet 1944, mais a conservé ses trois  tours rondes très massives ou leurs toitures actuelles ne correspondent pas au style du château, corps de logis à peu prés rectangulaire, cet ensemble du XIVe siècle de style renaissance, mais a perdu à la Révolution  ses hautes tours, ses créneaux et ses mâchicoulis, ses douves et chemin de ronde.                          Mazza appelé aussi château, cette villa de style bavaroise est l'uvre d'un industriel.                             Saléon; corps de logis rectangulaire à deux niveaux avec attique, pavillon en extrémité légèrement saillants et tourelles à l'est.","habitants":"Chèze; Seigneur de Brion   \r\nBrion; famille de Henri de  Tersac  \r\nMazza; Jean Mazza\r\nSaléon; famille Saleon-Terras\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Cheylard_Cheze_1.jpg","../../jctruffet.com/image/image_07/07_Cheylard_Cheze_2.jpg","../../jctruffet.com/image/image_07/07_Cheylard_Cheze_3.jpg","../../jctruffet.com/image/image_07/07_Cheylard_Cheze_4.jpg","../../jctruffet.com/image/image_07/07_Cheylard_Cheze_5.jpg","../../jctruffet.com/image/image_07/07_Cheylard_Cheze_6.jpg","../../jctruffet.com/image/image_07/07_Cheylard_Cheze_7.jpg"]},"Consult_chateau_formulaire2be9":{"id":"Consult_chateau_formulaire2be9","dept":"07","canton":"Privas","commune":"Flaviac","nom":"Cheylus","type":"Château","periode":"XIV","histoire":"Cheylus: Le château de Cheylus sur Privas était une des plus ancienne seigneurie du Vivarais, les Tartaillon, les Monargues et les Fraîssinet, passa aux comtes de Toulouse et aux comtes du Valentinois; Cheylus était un bourg important fortifié (possédait un château qui fut détruit en 1620 par le maréchal de Montmorency pendant les guerres de religion). \r\nLa famille de Cheylus  s'éteignit dans la famille d'Arlempes et des Bénéfice au début du XIVe, devenue baronnie au XVe siècle. \r\nLa seigneurie  de Cheylus qui possédait plusieurs branches, celle de Flaviac passait au départ par Bertrand de Cheylus qui fit construire le château. Au milieu du XVIIe siècle appartenait aux Odde de Bonniot  seigneur de Rochemaure et de Cheylus, qui se réfugie au Pays-Bas pendant les guerres de religion; puis passa après la Révolution aux Traix de Figien de Cheylus.                      Saint-Quintin: Un Arthaud de Fay possédait ce manoir au XVe siècle, au XVIe siècle à Claude de Chambaud qui épousa en février Catherine de la Motte Chalendar, ils eurent cinq enfants dont Paul seigneur de Saint-Quintin, et  de Bavas et cette famille s'éteignit au XVIIIe siècle et passa à Jacques-Marie-René Barruel de Bavas.","architecture":"Du château appelé Cheylus sur la commune de Saint-Priest, il ne reste  plus rien détruit en 1620 par le duc de Montmorency et celui de Flaviac,  construit par Bertrand de Cheylus au XIVe siècle il reste une tour ronde arasée et des dépendances.                            St-Quintin; à ce jour il ne reste qu'un bâtiment démunit de ses pierres d'ornement et se trouve prêt a tomber de sa propre mort.","habitants":"Famille des Benefice de Cheylus          Famille d'Olde de Bonniot\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Cheylus_1.jpg","../../jctruffet.com/image/image_07/07_Cheylus_2.jpg","../../jctruffet.com/image/image_07/07_Cheylus_3.jpg"]},"Consult_chateau_formulaire307c":{"id":"Consult_chateau_formulaire307c","dept":"07","canton":"Serrières","commune":"Charnas","nom":"Cheyme","type":"Château","periode":"XV","histoire":"Cheyme: au XVe siècle, le premier seigneur connu est Antoine de Fontanés, puis par alliance au Maclas, seigneur de Cheymé qui conservèrent le château jusqu'à la Révolution par un fils de Joseph de Fontanés qui laissa comme héritier Marc-Antoine Pradier, marquis d'Agrain. \r\nAprès la Révolution il fut vendu à Simon Lajard, négociant, sa fille en hérita    (madame de Servios) dont le mari a été maire de Charnas en 1863.\r\nAujourd'hui Monsieur Curdic en est propriétaire.","architecture":"Cheymé allias Chimay, se présente comme le type même des maisons  fortes  du Vivarais, corps de logis quadrangulaire dont il ne reste que quatre tours rondes à toits plats et d'une échauguette.","habitants":"Famille d'Antoine de Fontanes\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Cheyme_1.jpg"]},"Consult_chateau_formulaireb663":{"id":"Consult_chateau_formulaireb663","dept":"07","canton":"Chomérac","commune":"Chomérac","nom":"Chomerac","type":"Château","periode":"XV","histoire":"CHOMERAC: le comte de Valentinois Adhémar  y fit bâtir un fort en 1213 pour s'assurer, contre l'évêque de Viviers qui passait vers sa seigneurie de Privas. Louis d'Anduze  seigneur de la Voulte qui habitait le château de Chomérac en 1339, son fils Bermond d'Anduze pris la suite et sa fille Antoinette héritière épousa  Philippe de Levis en 1395. Les Levis devenu duc de Ventadour en 1578. Durement touché par les guerres de religion en 1621 puis possédait par les protestants monsieur de Pampelonne en 1621 tour à tour assiégé changera six fois jusqu'en 1628.\r\nAu XVIe siècle la seigneurie aux Rohan-Soubisse et par alliance en 1694 d'Hercule Mériadec, duc de Rohan avec Geneviève de Levis héritière. En 1785, aux Joyeuse et aux Pierregourde,  et  aux Guerrin de Vaneilles.\r\nLe comte de Balazuc, rejeton de la branche cadette des Montréal habité le château en 1788 ou il décéda en 1789.     BOIS: château construit par le seigneur Jean Charrier au XVe siècle, au XVIIe aux Bénéfice, actuellement aux de Pampelone.  Les GRANGES: à St-Symphorien sous Chomérac, famille  de la région de Privas en 1545, Pierre de la Grange docteur et avocat à la sénéchaussée  et siège présidial de Valence,  bien qu'en 1686 est cité Anne Clivet; fille de sieur Clivet de la Grange,  puis  sieur Jean Grel de la Grange. Vers 1680  resta dans cette famille au Grel de la Grange, famille d' avocat à Chomérac et à ce jour toujours à Louis de Grel.              MAURAS; en 1568 appartenait a Alexandre de Bénéfice du Diois en 1578 à la duchesse de Bouillon baronne de Privas. Au XXe siècle à la famille de Hauteville,  dans ce château se sont réunis en 1591 le seigneur de Cheylus, le seigneur du Pont, le seigneur de Saint-Lager, le seigneur de Chambaud, le seigneur de Roucoules et sieur Descombes suite au guerres de religion.  Aujourd'hui (privé)","architecture":"Chomérac; donjon du XIIIe siècle fut un litige important entre le comte de Valentinois seigneur de Privas et l'évêque de Viviers. Le château, corps de logis rectangulaire enfermé dans un enclos mural et des remparts sur la partie Est; très remanié .           Bois; construction classique des maisons fortes de l'Ardèche  du XVIe siècle, à trois étages flanqués de tours rondes  à  toitures coniques assez plates.       Mauras; château quadrangulaire du style maison forte du Vivarais, flanqué de quatre tours rondes construites  au XVIe siècle par les seigneurs des Bénéfices.  Les Granges; construction du XVIIe siècle dans un style paladien.","habitants":"Famille Rohan-Soubise  \r\nFamille de Guerrin de Vaneilles\r\n        \r\n        \r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Chomerac_1.jpg","../../jctruffet.com/image/image_07/07_Chomerac_2.jpg","../../jctruffet.com/image/image_07/07_Chomerac_3.jpg","../../jctruffet.com/image/image_07/07_Chomerac_4.jpg","../../jctruffet.com/image/image_07/07_Chomerac_5.jpg","../../jctruffet.com/image/image_07/07_Chomerac_6.jpg","../../jctruffet.com/image/image_07/07_Chomerac_7.jpg","../../jctruffet.com/image/image_07/07_Chomerac_8.jpg","../../jctruffet.com/image/image_07/07_Chomerac_9.jpg"]},"Consult_chateau_formulaired01a":{"id":"Consult_chateau_formulaired01a","dept":"07","canton":"Privas","commune":"Pranles","nom":"Clap","type":"Maison forte","periode":"XV","histoire":"Clap: en 1535 noble Lauberge seigneur du Clap  acquit la propriété à Etienne Perrier et passa à Jean Claude de Fayon seigneur du Clap de Berzéme, de Saint-  Geniès, baron d'Allier et Montbrun écuyer et noble qui avait épousé Anne de Sibleyras fille de Jean et de Jeanne de Montgros. En 1674  Jacques Fayon  capitaine châtelain de Privas seigneur et baron de Montbrun  et d'Allier, seigneur du Clap, la Garde, Saint Ginies et Berzéme.  En 1720 son petit-fils Jean Claude Fayon, bailli de Privas, seigneur du Clap et en 1747 Jacques de Fayon de Montbrun seigneur du Clap baron d'Allier et capitaine de cavalerie épousa Marie-Ursule de Villeneuve, cette famille s'est éteinte au Bouchet au début du XXe siècle.                           Pranles: au dessus des Ollières, dans la vallée de l'Eyrieux ancienne maison forte du XVIIe siècle, haut lieu  du souvenir huguenot en Ardèche,  vivait au XVIIIe siècle la famille d'Etienne et Claudine Durand, emprisonné en 1729  Etienne restera enfermé 14 ans à Agde, son fils Pierre, pasteur fut pendu  à Montpellier en 1732, sa fille Marie arrêtée en 1730 à 19 ans passera 38 ans dans la tour de Constance à Aygues-Mortes. Cette famille depuis plusieurs décennies a marquée le peuple pour sa liberté de conscience et sa liberté d'expression. Aujourd'hui propriété de monsieur Delong.","architecture":"Clap; maison forte  rectangulaire à deux niveaux avec demi-tour d'escalier avec fenêtres à meneaux et une tour ronde attenante , aujourd'hui exploitation agricole.                                Bouchet; construction du XVe siècle, ensemble de bâtiment avec dépendances autour d'une cour et porche d'entrée. Aujourd'hui musée.","habitants":"Famille Fayon de Montbrun\r\n        \"","divers":"Maison forte du Clap.               Maison forte de la famille Bouchet de Pranles","gps":"","images":["../../jctruffet.com/image/image_07/07_Clap_1.jpg","../../jctruffet.com/image/image_07/07_Clap_2.jpg","../../jctruffet.com/image/image_07/07_Clap_3.jpg"]},"Consult_chateau_formulaire931c":{"id":"Consult_chateau_formulaire931c","dept":"07","canton":"Vals-les-Bains","commune":"Vals-les-Bains","nom":"Clement","type":"Château","periode":"XVIII","histoire":"Clément: sur les hauteurs de Vals-les-Bains, château de plaisance, construit en 1870 par Auguste Clément, nabab des eaux minérales de Vals, s'appelait auparavant \"la Châteigneraie\". Réquisitionné pendant la seconde guerre mondiale, établissement d'internement administratif, Vincent Auriol et Marcel Dassault en autres y ont été emprisonnés.                            Après la guerre devient colonie de vacances propriété de la société IBM. Aujourd'hui chambres d'hôtes et restaurant par la famille Chabot depuis 2004.","architecture":"Construit en 1577 et remanié  dans la deuxième partie du XIXe siècle, dans un style plaisance à deux étages flanqué d'échauguettes  doublées en façade et une tour à créneaux à l'arrière.","habitants":"Famille d'Auguste Clément\r\nFamille  d'Eric Chabot\r\n        \r\n        \r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Clement_1.jpg","../../jctruffet.com/image/image_07/07_Clement_2.jpg"]},"Consult_chateau_formulairea383":{"id":"Consult_chateau_formulairea383","dept":"07","canton":"St-Félicien","commune":"Colombier-le-Vieux","nom":"Colombier le vieux","type":"Manoir","periode":"XIII  XVI","histoire":"BELLECOMBE: La construction du château de Belle Combe débute au XIIIe siècle par des Belle Combe, Alix de Belle Combe et Arthaud de Montchal (1282), afin de représenter la seigneurie de Colombier le Vieux. Au fil des années et des siècles, le site voit défiler les propriétaires.\r\nEn 1309, la terre et la seigneurie de Colombier le Vieux appartiennent à Arnaud de Fay, Seigneur d'Etables. Au XV°siècle, réside à Boucieu Le Roi la famille De Fontgarnaud, Vincent le père, et deux fils, Louis, notaire de son état, et Jean, licencié des lois. Il épouse en première noce Françoise De Jaulte , ils ont 2 fils : Claude et Briand,  Claude De Fontgarnaud, pour sa part est à la fois viguier de la viguerie royale de Boucieu. il épouse le 14 janvier 1553 Anthoinette (ou Anthonie) Faure, fille de Pierre Faure, aux De Joyeuse qui par alliance en font acquisition, et cette terre devient en partie Seigneurie de Bozas. passera par alliance aux de Bosc, à la famille de Beaumont, marquis de Brison, à la famille de Robert de Châteauneuf du Mollard     L'héritier de cette famille est Monsieur Murati Septime, juge à Oletta (Corse).\r\nLe 30 juin 1910, le château est vendu aux frères Entressangle d'Etables: l'abbé Victor Entressangle, et Paul Entressangle, père de Madame Roche.\r\nLe 5 septembre 1997 : Vente du château de BelleCombe par Madame Roche à Régis Desbos.                               Dans la commune le château de RUISSAS fut construit par Barthélemy du Rochain entre 1550 et 1556 qui passa ensuite au Reboulet. En  1575 Jacques de Crussol châtelain de la Bâtie s'installe à Jacquemet    ( Urbillac, Macheville),  propriétaire de Ruissas et des Rosières à Saint-Félicien.  Marie Madeleine  de Reboulet en hérite en 1717 mais  assassinée par son neveu Charles de Reboulet d'Urbignac, condamné aux galères, mourut au château d'If.        Henri César de Lestrange, autre neveu de Marie Madeleine en devint propriétaire. En 1747, le Marquis H.C de Lestrange secouru par Charles Antoine de Romanet lors d'une altercation, lui offrit sa fille en compensation. Ils eurent beaucoup d'enfants, l'ainé Louis Charles César de Romanet, marquis de Lestrange, seigneur de St-Bonnet, de Ruissas, capitaine de cavalerie en 1774, lieutenant colonel de carabiniers en 1792, général de brigade le 8 mars 1793, il fut nommé en 1814 maréchal de camps, mort à Toulon en 1823, il avait épousé Louise-Anne de Châtillon.","architecture":"Bellecombe; corps de logis rectangulaire accolé d'un deuxième plus réduit et d'une tour carrée a toit presque plat , construction de style renaissance. Ruissas: Transformé en ferme, suite à un incendie, vaguement réparé,  il présente encore une robustesse de sa construction, deux grosses tours carrées à meurtrières, rangée de corbeaux extérieurs ayant dû soutenir un appareil défensif avec échauguette en angle, également à l'intérieur pour un chemin de ronde, corps de logis à fenêtres à meneaux.","habitants":"Monsieur Desbos\r\n        \"","divers":"Manoir de Bellecombe et de Ruissas.","gps":"","images":["../../jctruffet.com/image/image_07/07_Bellecombe_1.jpg","../../jctruffet.com/image/image_07/07_Bellecombe_2.jpg","../../jctruffet.com/image/image_07/07_Bellecombe_3.jpg"]},"Consult_chateau_formulaireadb0":{"id":"Consult_chateau_formulaireadb0","dept":"07","canton":"Les Vans","commune":"Berrias","nom":"Commanderie_Jales","type":"Château","periode":"XII","histoire":"Commanderie de Jalés: fondée autour de 1140 par l'ordre du temple, les Templiers de Jalés qui eurent au début de nombreuses possessions: les Berrias, Chandolas, Gropierres, Banne, Cruzières etc... et même en Lozère et en Haut-Vivarais, les commandeurs ne résidaient pas à Jalés, administraient leurs  biens par procuration. En 1312 à la suppression de l'ordre qui  revint à l'ordre des Hospitaliers de Saint-Jean de Jérusalem. Pendant les guerres de cent ans,  ils fortifièrent les lieux. Aux XVe siècle, phase de déclin, aux XVI-XVIIe siècle, jusqu'à l'arrivée  en 1746  du géomètre Antoine Fuzet, secrétaire du commandeur Pierre-Emmanuel Pouroy de Lauberivière de Quinsonnas qui  remit Jalés en pleine  prospérité;  restauration des bâtiments, remise en culture de la propriété, développement de sériciculture ,etc.      Le dernier commandeur fut le célèbre Bailli de Suffren de Saint-Tropez, qui n'y résida pas mais en prit possession par procuration en 1782.                 A la Révolution, ce domaine en pleine production fut confisqué comme bien national et peu à peu dépecé, vue sa notoriété fut acquis par un syndicat d'économie mixte qui le maintient dans l'état.","architecture":"Au XIIe siècle, le temple de Jalés était formé de quatre corps de bâtiments qui entouraient une cour centrée sur un puits. Au moment des guerres de cent ans, les Hospitaliers fortifièrent Jalés, relièrent les bâtiments entre eux et un seul pont-levis. Au XVIIIe siècle perdit tous les éléments défensifs. De la maison initiale monastique subsiste une chapelle romane au sud et un cellier.","habitants":"Commandeur Pierre Emmanuel de \r\nLauberivière de Qinsonnas\r\n        \"","divers":"Commanderie","gps":"","images":["../../jctruffet.com/image/image_07/07_Commanderie_Jales_1.jpg","../../jctruffet.com/image/image_07/07_Commanderie_Jales_2.jpg","../../jctruffet.com/image/image_07/07_Commanderie_Jales_3.jpg","../../jctruffet.com/image/image_07/07_Commanderie_Jales_4.jpg"]},"Consult_chateau_formulairecd82":{"id":"Consult_chateau_formulairecd82","dept":"07","canton":"Les Vans","commune":"Les Assions","nom":"Cornilhon_Assions","type":"Vestiges","periode":"XII","histoire":"Cornilhon-Assions: maison d'origine chevaleresque. Au XIe siècle le mandement appartenait à Alazais de Cornillon, puis  à Giraud de Casteljau, au XIIIe siècle à Gaucelin de Cornillon, puis passa à Pierre de Barjac et  au XIVe siècle aux évêques du Viviers. Au XVIIe siècle Antoine de la Garde seigneur de Chambonnas et de Cornillon.","architecture":"De ce château il ne reste que les ruines d'un donjon dominant le Chassezac, mais il est possible que cette tour soit celle du château de Guiramier étant construit tout à côté, ces derniers furent démolis par les routiers au XIVe  siècle.","habitants":"Famille Cornillon\r\n        \"","divers":"Vestiges du château de Cornillon","gps":"","images":["../../jctruffet.com/image/image_07/07_Cornilhon_Assions_1.jpg","../../jctruffet.com/image/image_07/07_Cornilhon_Assions_2.jpg","../../jctruffet.com/image/image_07/07_Cornilhon_Assions_3.jpg"]},"Consult_chateau_formulaireb6f2":{"id":"Consult_chateau_formulaireb6f2","dept":"07","canton":"St-Péray","commune":"Alboussière","nom":"Croizat_Crozat","type":"Maison forte","periode":"XVIII","histoire":"Croizat: château des seigneurs de Crozat, devenu Croizat. Jean de Crozat, gentilhomme de la chambre du roi était premier consul de Valence en 1602, Laurent leur fils, vivant en 1634 et Guillaume son petits fils, furent professeurs à l'université de Valence. Henri de Crozat de Ramon, capitaine des Levrettes du duc d'Orléans, fut nommé marquis de Thorigné. Le domaine de Crozat reste dans cette famille jusqu'à la Révolution.","architecture":"Crozat a évolué au cours des siècles : maison-forte au XIVe siècle, agrandi au XVIIIe siècle,  transformé au XIXe siècle par l'architecte Louis-Achille Tracol, ce petit château plein de charme a gardé tout son environnement naturel avec ses terrasses et son parc arboré, son bassin du XIXe siècle et ses deux petites lacs.Corps de logis rectangulaire à deux étages flanqué de deux tours octogonales  à toits en  poivrières , une de ces tours plein Sud  possède une tour accolée et crénelée  l'autre au Nord possède une échauguette.","habitants":"Seigneurs de Crozat\r\n        \"","divers":"Château de Croizat","gps":"","images":["../../jctruffet.com/image/image_07/07_Croizat_1.jpg","../../jctruffet.com/image/image_07/07_Croizat_2.jpg","../../jctruffet.com/image/image_07/07_Croizat_3.jpg","../../jctruffet.com/image/image_07/07_Croizat_4.jpg"]},"Consult_chateau_formulaire8b3e":{"id":"Consult_chateau_formulaire8b3e","dept":"07","canton":"Rochemaure","commune":"Cruas","nom":"Cruas","type":"Vestiges","periode":"IX","histoire":"Cruas: fondé au IXe siècle par le comte du Vivarais Eribert, une charte de privilèges accordée par Louis le Pieux, successeur de Charlemagne plaçait l'abbaye en 817 sous la protection de L'empereur. Cruas a souffert en premier par les épidémies puis par les guerres du XVIe siècle et XVIIIe siècle qu'ils durent l'abandonner; l'évêque de Viviers avait décidé sa suppression. \r\nIl subsiste du château abbatial du XIIe siècle transformé en véritable donjon au XIVe siècle et des vestiges du village fortifié.","architecture":"Centré autour d'une chapelle romane qui a pris l'allure d'un donjon, le château déploie ses remparts au flanc de la montagne. \r\nLa chapelle fortifiée au XIVe siècle dispose d'une entrée défendue par deux tours, les fortifications, arcs, mâchicoulis en tiers-point lancés entre les tourelles et les contreforts sont bien conservés.","habitants":"Comte Eribert\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Cruas_1.jpg","../../jctruffet.com/image/image_07/07_Cruas_2.jpg","../../jctruffet.com/image/image_07/07_Cruas_3.jpg","../../jctruffet.com/image/image_07/07_Cruas_4.jpg"]},"Consult_chateau_formulairece92":{"id":"Consult_chateau_formulairece92","dept":"07","canton":"St-Péray","commune":"St-Péray","nom":"Crussol","type":"Vestiges","periode":"X","histoire":"Crussol: au XIe siècle Agnès de Crussol apporte par alliance le château à Géraud  Bastet, et resta dans cette  famille  jusqu'à ce que Jean  Bastet épousa Béatrix de Poitiers, dont releva la seigneurie. Géraud V baron de Crussol, Louis de Crussol, gouverneur du Dauphiné et grand panetier de France ne résidait plus à Crussol il avait épousé Jeanne de Lévis qui lui apporta  la seigneurie de Florensac et en 1486 son fils Jacques Ier Baron de Crussol, épousa Simone d'Uzès héritière de sa famille; désormais Crussol fait parti du vicomté d'Uzès, en 1510 Charles Ier Vicomte de Crussol, et en 1556 Antoine Ier,  la vicomté d'Uzès est érigée en duché; militaire, mourut au siège de la Rochelle en 1573.  \r\nEn 1568 Jacques II duc d'Uzès son fils avait repris les responsabilités du duché , en 1625 François IV duc d'Uzès, en 1642 Emmanuel comte de Crussol, en  1675 Jean Charles duc d'Uzès, en 1707 Charles Emmanuel duc d'Uzès, en 1756 Marie François Emmanuel comte de Crussol, en 1778 Adrien Emmanuel comte de Crussol, en 1808 Armand Victorien duc et comte d'Uzès, en 1840 Aimable Antoine duc d'Uzès, qui racheta les ruines du château, en 1868 Jacques comte de Crussol, en 1871 Louis Emmanuel (frères de Jacques ) aura trois enfants, Louis  (deux enfants) marquis d'Uzès et de Crussol; Jacques actuel comte de Crussol, l'autre enfant étant Yolande.\r\nUne fondation est crée pour maintenir les vestiges du château qui  furent récupérés par la commune en 1998.","architecture":"Connu au Xe siècle , construction militaire  ou aucun des seigneurs y vécurent, ce château-forteresse  comportait à cette époque quatre enceintes de 800 mètres de tour qui ceinturaient la place, avec châtelet d'entrée, l'enceinte basse, la Vilette abritée une véritable ville  de 700 à 800 habitants et sur la partie supérieure le logis seigneurial, fut en partie détruit en 1580 et en 1620 par les guerres de religion. En 1855 par une détonation dans une carrière voisine qui a fait écroulé toute l'aile Sud, et le 18 Juin 1952 la foudre détruisit le pignon Nord et l'échauguette adjacente. \r\n Une organisation bénévole remet le cite en ordre.","habitants":"famille de Gerold de Bastet  \r\nBaron Comte duc de Crussol  \r\nMarquis d'Uzes\r\n        \r\n        \r\n        \r\n        \"","divers":"Vestiges du château de Crussol","gps":"","images":["../../jctruffet.com/image/image_07/07_Crussol_1.jpg","../../jctruffet.com/image/image_07/07_Crussol_2.jpg","../../jctruffet.com/image/image_07/07_Crussol_3.jpg","../../jctruffet.com/image/image_07/07_Crussol_4.jpg","../../jctruffet.com/image/image_07/07_Crussol_5.jpg","../../jctruffet.com/image/image_07/07_Crussol_6.jpg","../../jctruffet.com/image/image_07/07_Crussol_7.jpg"]},"Consult_chateau_formulaire0391":{"id":"Consult_chateau_formulaire0391","dept":"07","canton":"Annonay","commune":"Davézieux","nom":"Davezieux-Lombardière","type":"Gentilhommière","periode":"XVII","histoire":"LOMBARDIERE; au féodal ancien domaine des dauphins du Viennois, rattaché à la baronnie d'Annonay au XVIIIe siècle au Rohan Soubise. En 1560, acquis par Antoine Grivel, puis passa en 1561 à Achille Gamon, premier seigneur de la Lombardière, qui construisit cette demeure, à la mort de ce dernier en 1597 son fils Théodore hérita puis en 1669, le petit-fils d'Achille (Pierre Gamon) porte toujours le titre de seigneur de la Lombardière, puis l'héritage passa à Jean Barou, écuyer secrétaire du roi en 1690-1763, son fils Barthélémy de Barou de la Lombardière hérita en 1713 et en 1747 il épousa Marguerite de Saignard de Canson, ce nom se rajouta au sien. Le  domaine ira à son fils Jacques Jean-Baptiste mousquetaire du roi  en 1773 et en 1798 à sa mort et par alliance le domaine passa à son gendre Barthélémy François Gabriel de Soras qui en 1821 a épousé Jeanne Adélaïde Barou de la Lombardière de Canson, son fils Alfred 1834-1876 qui le transmet par héritage à son fils Marie Louis Régis (ingénieur) mort en 1944 et laissa le domaine à son fils René né en 1900. En 1970 René Veyre de Soras vend le domaine au district urbain d'Annonay.   Le MAS: En 1750 Jean de Barou de la Lombardière de Canson et Pierre de Montgolfier vendit le domaine à Anne-Jacques Barou de Canson de la Lombardière qui tenait le Mas de ses ancêtres, le laissa en 1859 à son fils Etienne de Canson (administrateur des papeteries Canson). Aujourd'hui partagait en trois propriétaires. \r\nDans la commune de Davézieux d'autres châteaux tel que Le Pin, le Puy, Sainte-Emilie,(voir article sur Pin Davézieux) JOSSOLS de la famille Jossoud qui fit fortune dans les tanneries en 1747 et par alliance passa dans plusieurs mains pour finir dans la famille Giraud jusqu'en 1989 pour terminer en complexe sportif et le château des  GENETS de la famille de Bechetoile.","architecture":"Davezieux; de l'ancien château féodal il ne reste plus rien.              Lombardière; construit au XIVe-XVIe siècle, remanié plusieurs fois, aujourd'hui bâtiment rectangulaire a plusieurs niveaux, cette tour massive contenant une salle voûtée est le seul témoin de la forteresse primitive. Diverses constructions sont venues successivement se greffer.              Le Mas; construit aux alentours du XVIe siècle, au XVIIe siècle une seconde tour fut construite qui donna l'aspect d'un véritable château de plaisance, qui en réalité est une maison forte d'où son nom de Mas.","habitants":"famille Achille Gamont\r\nFamille Barou de la Lombardière\r\nFamille de Soras\r\n        \r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Lombardiere_1.jpg","../../jctruffet.com/image/image_07/07_Lombardiere_2.jpg","../../jctruffet.com/image/image_07/07_Lombardiere_3.jpg","../../jctruffet.com/image/image_07/07_Lombardiere_4.jpg","../../jctruffet.com/image/image_07/07_Lombardiere_5.jpg","../../jctruffet.com/image/image_07/07_Lombardiere_6.jpg","../../jctruffet.com/image/image_07/07_Lombardiere_7.jpg","../../jctruffet.com/image/image_07/07_Lombardiere_8.jpg","../../jctruffet.com/image/image_07/07_Lombardiere_9.jpg"]},"Consult_chateau_formulaire2611":{"id":"Consult_chateau_formulaire2611","dept":"07","canton":"Annonay","commune":"Annonay","nom":"Deomas","type":"Château","periode":"XIX","histoire":"Déomas: le domaine tire son nom de la rivière Deûme qui coule en contre-bas, construit  par Paul Seguin de style classique de plaisance en 1876 (industriel), son épouse Caroline Périsse de Montgolfier; à la mort de monsieur Paul Seguin la propriété est vendue en 1897 à madame Clair Cyprien-Fabre qui épousa Georges Vignat         propriétaire rentier à Annonay, leur troisième enfant Jacques Rueff, sous gouverneur de la banque de France à Paris vendit le 7 Mars 1979 le Château à la ville d'Annonay, qui le restaura en 1995 et le parc de treize hectares sert d'envol de mongolfières.","architecture":"De style classique , illustration d'architecture d'Annonay fin XIXe siècle, quatre niveaux de 250 mètres carrés, flanqué d'une tour à toit en poivrière.","habitants":"famille Paul Seguin  \r\nFamille de Montgolfier\r\n        \r\n        \r\n        \r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Deomas_1.jpg"]},"Consult_chateau_formulaire1c8f":{"id":"Consult_chateau_formulaire1c8f","dept":"07","canton":"Lamastre","commune":"Desaignes","nom":"Desaignes-Meyres-Sauvages","type":"Château","periode":"XII","histoire":"Desaignes-Meyres: en 1305 Jocerand de Mounens rend hommage au seigneur Armand de Retourtour. En 1500 le seigneur de Meyres écuyer qui n'a que des filles, l'aînée épouse Alexandre de Tournon fils de Jacques de Tournon  qui prit le nom de Meyres. En 1603 les Meyres seigneur de Retourtour s'installèrent au château du Vergier, quittèrent donc leur château de Desaignes, François de Meyres fils de Gaspard capitaine  achète la seigneurie  de la Mastre, mais la revendit à Claude  de la Gruterie qui gardait Desaignes en 1595 et en 1644 la seigneurie revenait à Marguerite de Montmorency, duchesse de  Levi-Ventadour, en 1691 la princesse de Turenne vend la baronnie de Desaignes à l'arrière petit-fils de Jacques de Chambaud Antoine-Marie de la Gruterie seigneur de Maisonseule, à sa mort en 1730 c'est sa soeur Claudine qui héritera de tous les biens qui passèrent au marquis de Chevrier et passa ensuite aux Gaspard de Grollier et à son petit fils Pierre-Louis de Grollier qui en fût le dernier seigneur mais n'habitait pas au château, il se bat dans les rangs des insurgés, il est condamné à mort et fusillé.\r\nEn 1750 François-Christophe de Meyres baron de Retourtour propriétaire du château de Desaignes habitait au château du Vergier.\r\nEn 1783 Monsieur Gaillard acheta le château de Meyres et en fit don à sa mort à la fabrique catholique de Desaignes, on suppose pour la fabrication de la soie étant lui-même exploitant du verre à soie.  \r\nLe château a subit les turbulences des guerres de religion et à la Révolution revenait à la ville qui le maintient en état.                                 SAUVAGES:  Au XIVe siècle, Alasie de Salvages hérite,  en 1644  Marie Sauvages fille naturelle de Issac de Sauvages, leurs descendances le garde jusqu'au XVIIIe siècle. Passe ensuite aux Ranc des Sauvages, puis au Ravel au XIXe siècle, puis au comte Siméon Boissy d'Anglas   ( député de l'Ardèche et conseiller général qui transforma en 1870 cette demeure en son aspect actuel). Monsieur Charles du Besset l'acquit en 1903 serait toujours dans sa descendance.","architecture":"Le château \" dit château de Meyres\"  Il fut détruit par les routiers et reconstruit en 1420 autour d'une tour du XIIIe siècle, à  laquelle ont été accolés d'autres bâtiments aux XV et XVIe siècle, était entouré de remparts, à l'angle Sud-Ouest du village s'élèvent les vestiges d'un bâtiment quadrangulaire,  corps de logis rectangulaire  possédant deux  niveaux , mâchicoulis, tours.             Sauvages; corps de logis rectangulaire flanqué d'une tour carrée à mâchicoulis et d'un avant corps de garde en équerre garni d'une bretèche.","habitants":"famille d'Armand de Retourtour\r\nFamille de Meyres\r\n        \r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Desaignes_1.jpg","../../jctruffet.com/image/image_07/07_Desaignes_2.jpg","../../jctruffet.com/image/image_07/07_Desaignes_3.jpg","../../jctruffet.com/image/image_07/07_Desaignes_4.jpg","../../jctruffet.com/image/image_07/07_Desaignes_5.jpg","../../jctruffet.com/image/image_07/07_Desaignes_6.jpg","../../jctruffet.com/image/image_07/07_Desaignes_7.jpg","../../jctruffet.com/image/image_07/07_Desaignes_8.jpg","../../jctruffet.com/image/image_07/07_Desaignes_9.jpg"]},"Consult_chateau_formulaire4261":{"id":"Consult_chateau_formulaire4261","dept":"07","canton":"St-Péray","commune":"St-Romain-de-Lerps","nom":"Durtail","type":"Vestiges","periode":"XII","histoire":"Durtail: la seigneurie fut donné en 1217 par Humbert de Mirabel évêque de Valence, à Guigues de Tournon,  ensuite  Arnaud de Crest qui  la transmet à Pierre Guillaume, seigneur de Tournon, et à Guillaume Austorge, a son fils le château et le mandement, et  passa aux Arnaud de Christo, puis aux de Presles qui possédaient Vaussèche, la Tourette, Durfort, Gluiras,  Saint-Fortunat,  les Péchiers,  Chambon et Geys.             En 1414 aux seigneurs de Joyeuse,  en 1490 les seigneurs et barons qui possédaient ce fief furent les Levis-Ventadour est eurent comme châtelain à Durtail la famille Ferrand Teste seigneurs de la Motte et passa à son fils Claude-François Ferrand Teste ce dernier était chevalier de Malte en 1590. Claude Ferrand-Teste  (qui fit construire le château de Beauregard à Saint-Pèray)   épousa successivement  Magdeleine Dubreuil puis Barbe de Chernay sans enfant laissa ses biens à son neveu Jean Bouvier de Montmeyran. (Sa soeur, Catherine Ferrand-Teste de la Motte avait épousé le 14 mars 1627 noble Jean-Pierre Bouvier-Montmeyrand, dont leur fils Jean récupère tout les biens de son oncle), qui ce dernier épousa en 1659 Gabrielle du Muy, leur fille épousa en 1682 Claude-François de Coston, il mourut chevalier de Saint-Louis en 1732.  Le domaine passa à son fils Jean-Charles de Coston, baron de Durtail, capitaine de régiment, également épousa en 1736 Marie-Emérantienne du Cloup, qui  décéda en 1745.","architecture":"Du château qui existé jusqu'en  1570 fut une forteresse construite dans la vallée du Rhône sur le cours d'une rivière et sur un rocher inaccessible possédait encore au début du XXe siècle les vestiges d'un donjon ( tour octogonal dont la porte en ogive indique le XIIIe siècle ), il joua un grand rôle pendant les guerres de religions qui le mit en ruines, il ne reste aujourd'hui que quelques pans de murs ruinés.","habitants":"famille de Pierre Guillaume Seigneur de Tournon\r\n        \"","divers":"Vestiges de la forteresse de Durtail","gps":"","images":["../../jctruffet.com/image/image_07/07_Durtail_1.jpg","../../jctruffet.com/image/image_07/07_Durtail_2.jpg","../../jctruffet.com/image/image_07/07_Durtail_3.jpg"]},"Consult_chateau_formulaired18c":{"id":"Consult_chateau_formulaired18c","dept":"07","canton":"Tournon","commune":"Eclassan","nom":"Eclassan","type":"Château","periode":"XV","histoire":"Les Prés: construit au XVe siècle par les seigneurs de Montcal. En 1426, il y avait un notaire dit des \"Prés\" et en 1455 à  Mathieu Nesson, ainsi que Vital et Antoine des Prés plus tard en 1503, il y avait un autre notaire, Pierre de Bonnefoy,  puis noble François de Mistral en 1518, et André du Noyer en fit l'acquisition en 1520, sa descendance; Christophe qui n'appartenait pas à la noblesse épousa Marie de Lestrange en 1620, c'est cette famille qui lui donna l'aspect d'aujourd'hui. Mais suite a un assassinat d'un protestant le château fut mis aux enchères, mais resta aux Noyer.   En 1730 Denis du Noyer, épouse Catherine Filière d'Auvergne, une fille Marie Madeleine qui se marie en Octobre 1724 à Raymond de Colin baron des Roys au diocèse du Puy; donc passa aux des Roys, gardèrent les biens jusqu'en 1756. \r\nVendit ensuite à Baltazard de La Roque, baron de Mortesaigne en Velay passa ensuite a son fils Pierre qui épousa Suzanne du Pont des dames de Munas. Alexandre Baltazard 1764-1782 puis à Baltazard-Pierre-François  de La Roque fils ainé des précédents devint Baron de Montesaigne et d'Auzon, épousa Pierrette Melany d'Argout décédé en 1803, dernier seigneur d'Eclassan et d'Auzon,  paroisse  de Saint-Jeure. Jean-Jacques-Joseph de la Roque sous préfet de Tournon, c'est son fils Joseph qui le reconditionne en y rajoutant quatre tours. Ce château servit, du 21 au 25 juin 1940, de quartier général au colonel Jouffraud qui tenta, à la tête de la première brigade de Saphis, de s'opposer à l'avancée Allemande entre Annonay et Tournon. Château toujours dans la famille des de La Roque.                                                                                     BLANC: Ce château en 1575 était la propriété de François Robert de Châteauneuf seigneur du lieu au XVIIIe siècle, fut vendu en 1830 à différents acquéreurs, le propriétaire actuel Marc le Blanc ancien chef sommelier de la Chambre des Lords, aujourd'hui chambres d'hôtes.","architecture":"Prés; corps de logis quadrangulaire à deux étages et attiques, flanqué d'un donjon carré crénelé et d'une tour ronde à toit plat.                                                                                                                             Blanc; Construit en 1762 par Robert de Châteauneuf avec son jardin Médicis, bâtisse quadrilatère à trois étages flanquée de quatre tours carrées à toits presque plats et a  tuiles provençales.","habitants":"Seigneur de Montcal\r\nFamille de Mathieu Nesson  \r\nfamille du Baron Baltazard \r\nFamille du Baron de Laroque\r\nColonel Jouffrault\r\n        \r\n        \r\n        \r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_07/07_Eclassan_1.jpg","../../jctruffet.com/image/image_07/07_Eclassan_2.jpg","../../jctruffet.com/image/image_07/07_
