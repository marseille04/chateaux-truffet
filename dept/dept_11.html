 du Mirepoix, prudemment émigré à Rome dès octobre 1789, quatre familles de la même contrée ont vu un ou plusieurs de leurs membres émigrer à leur tour. Il sagit des familles Malroc de Lafage à Mirepoix, de Gouzens de Fontaines à Lafage, de Rouvairollis de Rigaud à Caudeval, et de Pardaillan de Portes à Manses.   Lointain descendant dun chaudronnier de Lavelanet, fils dun riche marchand, Guillaume Dominique Malroc est avant la Révolution lieutenant général criminel en la sénéchaussée de Limoux et co-seigneur de Lafage. Guillaume Augustin Malroc, son frère cadet, est procureur du roi à Carcassonne. Jean Baptiste Paul Malroc, son frère puîné, est prêtre et curé de Lafage. Jean Maurice Florentin Malroc de Raissac (commune située à 5 kilomètres de Lafage), autre frère des mêmes, est jusquen 1791 membre du corps prestigieux des gardes de Louis XVI. Jeanne Marie Malroc, soeur des mêmes, a épousé en 1752 Guillaume de Jaubert conseiller du roi, lieutenant en la maîtrise des eaux et forêts de la ville de Quillan au diocèse dAlet, fils de Jean Louis de Jaubert, aussi conseiller du roi, et de feue Marie Anne de Rouvairollis.    A Lafage et à Raissac, les Malroc fréquentent régulièrement la famille Gouzens de Fontaines, qui a vendu au marchand Dominique Malroc, au début du XVIIIe siècle, une partie de son antique seigneurie.","architecture":"Cahuzac;  grosse bâtisse de plan carrée à trois niveaux à toit plat.                                                                                                                        Fajac la Selve, vaste chantier de restauration de ce château du XVIe siècle,  retrouve sa splendeur endormie : les stucs et plâtres sont mis à jour, les tomettes ravivées et les fenêtres et portes restaurées, le parc à langlaise retrouve ses palmiers, le pré Saint Jean ses orchidées sauvages.                                                                                                                   Las Courtines, architecture du haut Languedoc du XVIIe siècle, de plan rectangulaire, très régulier flanqué de trois tours carrées, à l'écart dans le parc une autre tour semblable porte la date de 1663, les façades recouvertes d'un crépi ocre clair traditionnel sont dénudés de tout éléments décoratif. Un blason sculpté au dessus de la porte d'entrée, martelé à la Révolution. Les baies et portes son symétriques.","habitants":"Familles Malroc de Lafage                 \r\n        \"","divers":"Château de Cahuzac, de Fajac-la-Selve, de Saint-Amans à Cahuzac","gps":"","images":["../image/image_11/11_Cahuzac_1.jpg","../image/image_11/11_Cahuzac_2.jpg","../image/image_11/11_Cahuzac_3.jpg","../image/image_11/11_Cahuzac_4.jpg","../image/image_11/11_Cahuzac_5.jpg","../image/image_11/11_Cahuzac_6.jpg","../image/image_11/11_Cahuzac_7.jpg","../image/image_11/11_Cahuzac_8.jpg"]},"Consult_chateau_formulaire24ef":{"id":"Consult_chateau_formulaire24ef","dept":"11","canton":"Quillan","commune":"Camps sur l","nom":"Camps_Agly","type":"Vestiges","periode":"XI","histoire":"CAMPS, castrum de Camps  appartenait à la famille de Cucugnan et Soulatgé, Camps, comme les autres castra, servit de refuge aux seigneurs rebelles durant la croisade ainsi qu'en témoigne un document daté de 1258 concernant Guiraud d'Aniort, qui se trouvait à Camps en guerre. Familles riches apparentées à la famille de Peyrepertuse, tous descendant des vicomtes de Fenouillèdes qui laissèrent une trace dans l'histoire en 1241.  Un acte de soumission au Roi de France de Pierre de Béranger de Cucugnan dans la confirmation faite par Saint-Louis de cette soumission au Sénéchal de Carcassonne, le château est appelé \"Calmis\" en 1258. Guiraud d'Aniort   fait en février 1445 le testament en faveur d'Ermengaud de Rouffiac et une série de legs dont Calmis. Avec la seconde moitié du XVe et surtout le XVIe la situation saméliora. Forte de leurs finances reconstituées, certaines familles seigneuriales décidèrent de rénover leurs anciennes demeures, ce qui est le cas dans le château de Camps, et de construire des logis dignes deux. Malheureusement, léclaircie devait être de courte durée. Rapidement dès le premier quart du XVIe, les Espagnols en 1525  ramenèrent la guerre et la désolation dans la région. Camps fut détruit par les troupes Calvinistes en 1578. Au XIIe siècle, le château reste propriété seigneuriale lancien château est maintenu en état et servira de prison jusquà la fin du XVIIIe. Si lordre social se maintient au XVIIIe siècle, la fin des châteaux est proche. Avec la révolution les demeures seigneuriales sont remises en question, destruction après leur vente comme biens nationaux. Cest ce qui arriva au château de Camps  pouvait-on rêver de plus belle carrière de pierres pour construire le village actuel. Le château de Camps, véritable château cathare finit de disparaître, redevenir rocher et poussière.","architecture":"Ce château devait avoir la forme que l'on peut encore voir par les restes existants avec : un donjon à 2 ou 3 étages typique du XIe siècle, une chemise de protection ,  une basse cour,  un habitat groupé au pied du château. Il utilise  le point culminant du rocher comme assise du donjon. Son enceinte extérieure suit les caprices du rocher, barrant au passage les failles et cheminées qui auraient permis l'escalade. Mais la particularité de ce château est son entrée, on a utilisé avec astuce la large faille qui sépare le roc où est perché le donjon du reste du rocher comme chicane. L'entrée du château est l'entrée de la faille dont la largeur n'est que de 1,60 m, il semble que primitivement le seuil de cette faille devait être surélevé par rapport au niveau du sol extérieur. Elle était de défendre par une plate forme en bois qui la surplombait. Elément remarquable dans ce système d'entrée est la présence de petits ancrages de poutres, aménagés dans la partie haute de la paroi rocheuse, qui témoigne de l'existence de défenses verticales. Il devait exister au niveau de la plate forme une passerelle surplombant d'une dizaine de mètres l'entrée. Cette passerelle devait être bordée d'un parapet vers l'extérieur qui devait servir d'assommoir. En entrant dans le château, avant de parvenir au niveau de la plate forme, on est obligé de contourner le donjon par cette faille longue de 20 mètres et de 4 à 5 mètres de large, bordée de parois rocheuses sur les côtés et dans lequel on est exposé aux coups venant du donjon sur la gauche mais aussi à ceux lancés de la plate forme à droite devant et derrière.","habitants":"Famille de Cucugnan \r\n        \"","divers":"Vestiges du château de Camps-sur-Agly","gps":"","images":["../image/image_11/11_Camps_Agly_1.jpg","../image/image_11/11_Camps_Agly_2.jpg","../image/image_11/11_Camps_Agly_3.jpg"]},"Consult_chateau_formulaire8920":{"id":"Consult_chateau_formulaire8920","dept":"11","canton":"Trébes","commune":"Capendu","nom":"Capendu","type":"Château","periode":"XII","histoire":"Capendu étant une région viticole des corbières de petits manoirs ont été construit par les viticulteurs et autres tel que  Floure auberge, Nôtre dame de Lière aujourd'hui institut médical, manoir du Parc de monsieur Barbaza, et du Pins de monsieur Birat.                                                                                                                              CAPENDU se compose dun bâti ancien, le fort et le Palenc, construit autour du château. Une muraille enserre cet ensemble, les maisons sédifient à lextérieur de cette ligne de défense et sorganisent de manière concentrique autour du noyau primitif. Comme beaucoup de places fortes de la région du Carcassès, Capendu reçu de nombreuses fois la visite de corps d'armées durant la Croisade contre les Albigeois. On retrouve la trace du village en 1210 lors d'un soulèvement des habitants de Montlaur contre les envahisseurs venus du nord. Ceux-ci furent pour la plupart exterminés par Simon-de-Montfort, lequel avait pris soin de laisser son épouse dans le château de Capendu.\r\nCapendu fut l'objet de querelles entre Simon-de-Montfort et l'abbé Guillaume, représentant les intérêts de l'abbaye de Lagrasse. C'est Maître Thédise, évêque d'Agde, qui arbitra ce conflit au profit de l'abbaye.\r\nOn retrouve des traces de Raymond de Capendu ainsi que de Pierre-Raymond de Capendu  de 1222 à 1224, traitant avec Amaury-de-Montfort pour récupérer leurs biens. La croisade les avait en effet dépossédés, ayant soutenu leur seigneur légitime, le vicomte Trencavel.  Jourdane de Saissac, épouse de Girard de Capendu sera consolée par le parfait Guillaume Pagès vers 1270. Aujourd'hui  propriété de monsieur Didier Ragaru viticulteur.","architecture":"A Capendu, au Xe et XIe siècles, linsécurité ambiante expose les paysans à de nombreuses exactions. Le château de Capendu, situé sur une hauteur à proximité de lancienne voie dAquitaine, peut leur offrir labri de sa petite garnison. Le domaine de Surzac se vide alors au profit du village castral qui se bâtit sur la butte dont la configuration détermine lorganisation  en ovale autour du château dominant la ville, les ruines du château de Capendu datent du XIVe siècle. La place était fortifiée depuis la fin du XIe siècle et à la fin du XVIIe siècle, deux ensembles sappuient sur le château, le Fort à louest et le Palenc à lest. Les maison se construisent « hors les murs » : les faubourgs ou barris.                                                                     Château de Nôtre-Dame de plan carré à trois  niveaux flanqué d'échauguettes en encorbellements aux angles de la façade à toits pointus  et donjon coiffé à l'impérial sur l'arrière de l'édifice   et  prolongé en façade de bâtiments de deux niveaux.                                                                       Château du parc  classique de plan carré balcon au premier étage et lucarne sur partie centrale du toit à quatre pans.                       Château du Pins de Mr Birat de plan rectangulaire à trois niveaux série de lucarnes sur toit brisé.","habitants":"Famille de Raymond de Capendu\r\n        \r\n        \r\n        \"","divers":"A Capendu, vestiges du château primitif, château de Floure, de de Nôtre-Dame de Lière, du Parc et du Pins","gps":"","images":["../image/image_11/11_Capendu_1.jpg","../image/image_11/11_Capendu_2.jpg","../image/image_11/11_Capendu_3.jpg","../image/image_11/11_Capendu_4.jpg","../image/image_11/11_Capendu_5.jpg","../image/image_11/11_Capendu_6.jpg","../image/image_11/11_Capendu_7.jpg","../image/image_11/11_Capendu_8.jpg"]},"Consult_chateau_formulaire60e8":{"id":"Consult_chateau_formulaire60e8","dept":"11","canton":"Carcassonne","commune":"Carcassonne","nom":"Carcassonne","type":"Forteresse","periode":"XI-XII","histoire":"CARCASSONNE, en 1082 Bernard Aton Trencavel premier vicomte, en 1209 Simon de Montfort assiège la ville, et  en 1240, Raimond Trencavel tente de récupérer la cité, en 1248 la cité de Carcassonne est  rattachée au royaume de France et est désormais gouvernée par des sénéchaux, en 1272, le comte de Foix, rebelle, est enfermé par Philippe III de France dans la cité de Carcassonne. En 1283, un traité d'alliance est signé entre le roi de France et le roi de Majorque Jacques II contre Pierre III d'Aragon. En 1355, le prince Noir n'ose pas s'attaquer à la cité trop puissamment défendue et se contente de détruire et piller la ville basse. La cité devient prison d'État au XVe siècle dans laquelle sont enfermés les ennemis du roi comme Jean IV d'Armagnac. La peste décime les habitants de Carcassonne et de la cité en 1557. En 1585, la cité est attaquée par les huguenots mais ils sont repoussés par les « mortes-payes » entre 1560 et 1630, durant les Guerres de religion, la cité reste un dispositif militaire important pour les catholiques. Elle subit des attaques de la part des protestants. En 1575, le fils du sire de Villa tente d'attaquer la forteresse. En 1585, les hommes de Montmorency font de même, mais là aussi c'est l'échec. Le XVIIe siècle marque le début de l'abandon de la cité.  Le château comtal, les fortifications, et les tours appartiennent à l'État et sont gérés par le centre des monuments nationaux, tandis que les lices et le reste de la cité font partie du domaine municipal. Sauvée de la destruction par l'action et la ténacité de l'archéologue Jean-Pierre Cros-Mayrevieille, puis restaurée au XIXe siècle de manière parfois controversée sous la direction de Viollet-le-Duc puis de Boeswillwald, la cité de Carcassonne est, depuis 1997, classée au patrimoine mondial de l'UNESCO.","architecture":"Château de Carcassonne construit en 1130, cette cité médiévale fortifiée, dont les origines remontent à la période gallo-romaine, doit sa renommée à sa double enceinte, atteignant près de 3 km de longueur et comportant cinquante-deux tours, qui domine de manière spectaculaire la vallée de l'Aude. Comprend également un château  et une basilique. La première enceinte du Ve siècle.  Du côté Ouest, la pente est assez raide offrant un accès difficile à d'éventuels assaillants. À l'Est, la pente est plus douce et permet un accès aisé des marchandises, mais aussi des attaquants. Aussi, les plus importants mécanismes de défense se trouvent de ce côté de la cité. L'enceinte est percée de quatre portes principales donnant accès à l'intérieur. Les portes sont réparties aux quatre points cardinaux. La porte Narbonnaise située à l'est, est construite vers 1280 durant le règne de Philippe III le Hardi, la porte Saint-Nazaire est aménagée dans la tour du même nom, l'une des deux tours carrés. C'est un dispositif de défense complexe ; l'ouvrage était très abîmé et Viollet-le-Duc le reconstitua entre 1864 et 1866.  La porte du Bourg ou de Rodez donnait sur l'ancien bourg Saint-Vincent.","habitants":"Jean-Pierre Cros-Mayrevieille\r\n        \"","divers":"Citadelle de Carcassonne","gps":"","images":["../image/image_11/11_Carcassonne_1.jpg","../image/image_11/11_Carcassonne_2.jpg","../image/image_11/11_Carcassonne_3.jpg","../image/image_11/11_Carcassonne_4.jpg","../image/image_11/11_Carcassonne_5.jpg","../image/image_11/11_Carcassonne_6.jpg","../image/image_11/11_Carcassonne_7.jpg","../image/image_11/11_Carcassonne_8.jpg"]},"Consult_chateau_formulairedc54":{"id":"Consult_chateau_formulairedc54","dept":"11","canton":"Carcassonne","commune":"Carcassonne","nom":"Carcassonne_Chateau","type":"Château","periode":"XVIII-XIX","histoire":"plusieurs châteaux à Carcassonne, d'Auriac  hôtel,  des Dames  à Carcas chambres d'hôtes,  d'Alexcendre-P. Faidherbe , domaine de Maran,  des Serres à Tallavignes (voir article), de Villardonel.                                                                                                                                                  Dames de CARCAS est un personnage purement imaginaire. La légende dérive de chansons de gestes médiévales disparues. Elle fut un recueil d'après la tradition orale par divers auteurs notamment au XVIe siècle par Jean Dupré et au XVIIe siècle par Guillaume Besse et Guillaume Catel. Charlemagne n'a probablement pas fait le siège de Carcassonne, son père Pépin le Bref l'ayant déjà prise aux Sarrasins vers 759, alors que Charlemagne avait 17 ans.                                                                                                                        VILLARDONEL château du XIXe siècle d'Alphonse Mahul ancien député de l'Aude et de la Haute Garonne,","architecture":"Auriac,  Dames de Carcas, Maran,Serres et Villardonnel sont des constructions du XVIIIe et XIXe siècle de structures classiques.    Dames de Carcas  À l'entrée du pont-levis, le buste de Dame Carcas accueille les visiteurs. Il s'agit d'une réplique. L'original, datant du XXIe siècle, est conservé au château. Il existe une auberge de Dame Carcas dans la cité.   Le château de Saint-Martin logis rectangulaire flanqué d'une tour hexagonale.","habitants":"Famille d'Alphonse Mahul \r\n        \"","divers":"Carcassonne, d'Auriac  hôtel,  des Dames  à Carcas d'Alexcendre-P. Faidherbe , domaine de Maran,  des Serres à Tallavignes et  de Villardonel.","gps":"","images":["../image/image_11/11_Carcassonne_Chateau_1.jpg","../image/image_11/11_Carcassonne_Chateau_2.jpg","../image/image_11/11_Carcassonne_Chateau_3.jpg","../image/image_11/11_Carcassonne_Chateau_4.jpg","../image/image_11/11_Carcassonne_Chateau_5.jpg","../image/image_11/11_Carcassonne_Chateau_6.jpg","../image/image_11/11_Carcassonne_Chateau_7.jpg"]},"Consult_chateau_formulaire4d51":{"id":"Consult_chateau_formulaire4d51","dept":"11","canton":"Fabrezan","commune":"Cascastel-les-Corbières","nom":"Cascastel","type":"Tour-Château","periode":"XIV","histoire":"CASCASTEL,  au XIIIe siècle, les droits seigneuriaux sur Cascastel se partageaient entre les Abbés de Lagrasse et deux co-seigneurs laïcs Raymond de Castel et Sicart de Cascastel. Comme cela existait, à cette époque, ils devaient posséder en commun, cette tour. En 1734, Gaspard de Pailhoux et son épouse, la noble Marie-Thérèse de Ros et Sorribes se portent acquéreur du château de Cascastel. Ils vivent alors au château et Gaspard de Pailhoux mourant l'année de cette acquisition, c'est sa veuve, Marie-Thérèse de Ros qui fait entreprendre les travaux, qui seront poursuivis par leur fils unique Joseph Gaspard de Pailhoux de Cascastel en 1726 Toulouse - 1808 Cascastel, chevalier, seigneur haut-justicier de Cascastel, seigneur de Villeneuve, de Rouffiac, de Saint-Jean de Barrou, d'Embres et de Castelmaure et conseiller au conseil souverain du Roussillon. Joseph Gaspard de Pailhoux de Cascastel, à l'origine du salon des gypseries, fut le dernier seigneur de Cascastel. Il entreprit l'exploitation de mines sur ses terres aussi bien qu'alentours  avec le négociant Pelletier, l'ingénieur, commissaire du Roi pour les Mines Jean Guillot-Duhamel puis le chimiste Jean-Antoine Chaptal. Entreprise à laquelle se joindra son gendre, le mari de sa fille Jacquette Claire Josèphe de Pailhoux de Cascastel le général Luc Dagobert. Devenu maire de Cascastel et de Villeneuve après la Révolution, Joseph Gaspard de Pailhoux de Cascastel s'éteint au cours de l'exercice de son mandat, dans son château de Cascastel en 1808. Le Château de Cascastel est inscrit aux M.H. depuis 1948 et 2001.","architecture":"C'est un château fort dont la construction date du XIIe siècle. Ses assises de 2,50 m d'épaisseur supportent une salle couverte par une voûte de 8 mètres de hauteur. Côté rivière, un escalier est creusé dans l'épaisseur du mur. Outre qu'il facilita la construction, cet escalier permettait à un guetteur d'accéder à la plate forme. La tour avait la fonction de guet et assurait la sécurité des seigneurs laïcs affirmant leur autorité sur le territoire. Elle abritait aussi les archives de la communauté villageoise, baux et chartes divers, elle protégeait des salles voûtées servant de celliers. Le patrimoine médiéval de Cascastel est relativement bien connu par une charte de 1390, portant sur la reconstruction du Fort et les agencements avec le château existant.","habitants":"Joseph Gaspard de Pailhoux de Cascastel \r\n        \r\n        \"","divers":"Château de Cascastel","gps":"","images":["../image/image_11/11_Cascastel_les_Corbieres_1.jpg"]},"Consult_chateau_formulaire58f6":{"id":"Consult_chateau_formulaire58f6","dept":"11","canton":"Narbonne","commune":"Montredon des Corbières","nom":"Castellas_Aude","type":"Vestiges","periode":"XII","histoire":"CASTELLAS; dit château de St-Pierre des Clars, il a été construit  au Xe siècle . Cette position stratégique explique l'importance que la forteresse occupait au Moyen-Age, sous la dépendance des vicomtes de Narbonne qui y tenaient justice. En 1194, le vicomte de Narbonne autorisa le seigneur Bringuier de Montredon à bâtir son château, et tout naturellement l'emplacement de St-Pierre fût choisi, les fondations déjà posées.  Dans la deuxième partie du XVe siècle, le château de St-Pierre des Clars est rattaché au domaine royal. En 1477, par lettres patentes, Louis XI le donne à son premier médecin, Claude de Moulins, en récompense des services qu'il lui avait rendus. Il en jouit jusqu'en 1493. Dans la seconde moitié du XVIe siècle, au cours des guerres de religion qui ravagèrent le midi de la France, la ville de Narbonne obtint le démantèlement de St Pierre des Clars. En 1575, on fit sauter les éléments principaux du château qui risquaient de nuire à la sécurité de Narbonne ralliée à la Ligue contre les Cathares et quelques autres mécréants. Les familles de Neveys, de Calvisson, de Biord possédèrent ensuite le château et ses dépendances jusqu'en 1757. Le seigneur de Montredon repris les terres de St Pierre jusqu'à leur confiscation en 1804.","architecture":"Le château du Castellas, L'ancienneté du bâtiment est attesté par les vestiges des salles du donjon. Deux salles superposées sont en voûte pleine, sans clé, décalées de 45°. Un peu comme deux nef d'église romane et posées l'une sur l'autre. L'appareillage des murs ''opus spicatum'' en usage romain et mérovingien fut abandonné à cette époque au profit de pierres massives taillées. De lancien château de Belpech, dit le Castelas, construit au XIe siècle au sommet du pech qui domine le bourg, il ne subsiste plus quune ruine. Il sagit là du vestige dune tour et dune porte,  situées sur une butte à gauche de la route qui conduit à l'abbaye de Fontfroide. L'archéologue narbonnais H. Rouzeaud y voyait  le plus vénérable et le plus ancien château de toute la Gaule méridionale, Le Castellas fut souvent utilisé comme un poste d'observation et de signalisation romain. Des témoignages de cette époque y ont été trouvés : Un denier de Brutus au pied du donjon, des médailles, des débris de vases romains sur les pentes de la butte.","habitants":"Seigneur Bringuier de Montredon                                                       Famille de Neveys\r\n        \"","divers":"Vestiges ddu château de Saint-Pïerre des Clars  à Montredon des Corbières","gps":"","images":["../image/image_11/11_Castellas_Aude_1.jpg","../image/image_11/11_Castellas_Aude_2.jpg","../image/image_11/11_Castellas_Aude_3.jpg","../image/image_11/11_Castellas_Aude_4.jpg","../image/image_11/11_Castellas_Aude_5.jpg","../image/image_11/11_Castellas_Aude_6.jpg","../image/image_11/11_Castellas_Aude_7.jpg"]},"Consult_chateau_formulaire206c":{"id":"Consult_chateau_formulaire206c","dept":"11","canton":"Castelnaudary","commune":"Castelnaudary","nom":"Castelnaudary","type":"Château","periode":"XII","histoire":"PRESIDIAL à Castelnaudary  en 1211 par Simon de Montfort qui voulait y pénétrer et en 1220 par Raymond VI de Toulouse. Le traité de Paris (1229) livrant le comté de Toulouse à la couronne de France. Durant la guerre de cent Ans le Prince Noir (1355) incendie la ville afin de punir les factieux, pratique courante au Moyen-Age. Louis XI (1477) par souci d&#146;organisation crée le comté du Lauragais mais cest Catherine de Médicis, comtesse de ces lieux qui permettra à Castelnaudary dacquérir ses titres de noblesse  en faisant le chef-lieu de la sénéchaussée.   En 1630, Gaston d'Orléans, le propre frère du Roi Louis XIII, tente d'organiser un soulèvement général du royaume. Henri de Montmorency, gouverneur du Languedoc, influencé par la reine Marie de Médicis qui souhaite le départ du cardinal de Richelieu alors Ministre du roi, le soutient et rallie les États du Languedoc, auxquels le cardinal a tenté d'enlever le droit de lever l'impôt. Le 22 juillet 1632, la province de Languedoc fait sécession du Royaume de France. Une partie de la petite noblesse suit Montmorency dans la rébellion, mais Toulouse reste fidèle au Roi tout comme Carcassonne et Narbonne qui refusent d'accueillir l'armée des rebelles. Louis XIII ordonne alors au maréchal Schomberg de faire route contre les opposants. La rencontre a lieu devant Castelnaudary, le 1er septembre 1632. Schomberg dispose de plus de 2.000 hommes, les insurgés ne peuvent lui opposer que 1.200 à 1.500 nobles peu entraînés au combat. L'affrontement sera très rapide : grièvement blessé, son cheval tué, le duc de Montmorency est fait prisonnier. Jugé par le Parlement de Toulouse pour crime de lèse-majesté, il est condamné à être décapité. Il sera exécuté dans la cour du Capitole le 30 octobre 1632.","architecture":"Castelnaudary,  Le musée est situé sur les hauteurs de la vieille ville. Il surplombe le grand bassin et offre une vue exceptionnelle sur la Montagne Noire et sur la chaîne des Pyrénées. Sur les ruines du château fondateur de la ville de Castèl nòu d'Ari, le Musée du Lauragais est installé dans l'ancienne prison de la ville, attenante au bâtiment du Présidial (tribunal civil et criminel). Edifiès en 1554 par Catherine de Médicis, Comtesse du Lauragais, afin d'asseoir le chef-lieu de sa nouvelle Sénéchaussée, les fenêtres à meneaux de ces bâtiments sont aujourd'hui classées Monuments Historiques.  le château est rasé comme trente autres de ses semblables  Présidial du XIIe siècle importante demeure seigneuriale dont les origines datent du XIIe siècle, largement remanié  au XVIIe siècle, notamment son grand escalier à arcades et son  pigeonnier. Les ruines du château serviront dassises au « Présidial », tribunal civil et criminel qui fonctionnera jusquà la Révolution et sera ensuite transformé en centre dincarcération pour délits mineurs. Les cellules de la prison rempliront leurs « bons offices » jusquen 1926.  Aujourdhui le Présidial est une école primaire et la prison, un musée, dans lequel on peut admirer une exposition annuelle, sans oublier la petite chapelle Saint-Pierre de la prison qui recèle deux magnifiques reliquaires-bustes du XVIIIe siècle.","habitants":"Catherine de Médicis\r\n        \"","divers":"Le Présidial à Castelnaudary et une maison forte et le moulin de Cugarel.","gps":"","images":["../image/image_11/11_Castelnaudary_1.jpg","../image/image_11/11_Castelnaudary_2.jpg","../image/image_11/11_Castelnaudary_3.jpg","../image/image_11/11_Castelnaudary_4.jpg","../image/image_11/11_Castelnaudary_5.jpg"]},"Consult_chateau_formulaire6c54":{"id":"Consult_chateau_formulaire6c54","dept":"11","canton":"Castelnaudary","commune":"Castelnaudary","nom":"Castelnaudary_ Chateau","type":"Château","periode":"XII-XVIII","histoire":"Quatre  châteaux à Castelnaudary dont celui de Castelnaudary, de Cheminières centre d'études scientifiques de l'Aude, le Canast, , le Coquelicot chambres d'hôtes de Françoise et Frédéric Bernier et  le Castelet de Crozes.                                                         CHEMINIERES  fut constitué par Eugène Mir de 1843 au 1930 ,sénateur et conseiller général de lAude, Le château des Cheminières date de 1886, mais le domaine agricole est antérieur. Eugène Mir adjoint plusieurs fermes à son domaine  sa disparition en 1930, le domaine et son arboretum se dégradèrent peu à peu, au grès des successions, rachats, et morcellements. En 1978 larmée française acquiert une grande partie du domaine et y installe un régiment de la Légion Etrangère.                                                    CASTELLET de CROZES,   construction de la demeure vers 1770  Jean-Jacques Soulier, petit-fils du constructeur du château, à partir de 1780.","architecture":"Cheminières; quadrangulaire, corps de logis de plan rectangulaire à deux niveaux et un niveaux sous toit brisé à la Mansard avec lucarnes par travées, pavillon de trois travées saillant en façade dans le même style l'édifice est flanqué à gauche par une tourelle à toit en poivrières et à droite par une tour avec toit en terrasse.                                                                                 Le Castelet de Crozes, était à lorigine un château médiéval entouré dun domaine agricole. Racheté au XVIIIe siècle, la demeure et les jardins ont été profondément modifiés pour adopter le style néo-classique palladien avec des jardins en terrasses à litalienne. L'ornementation de la façade est animée par des médaillons, des pots à feu et guirlandes sur les pilastres du corps central et dessus de fenêtres, classés Monuments Historiques en 2000.                                                                                            Le  Coquelicot manoir à Souilhanels  corps   de logis rectangulaire à trois niveaux  flanqué sur angles d'échauguettes en encorbellement et tour rectangulaire, pavillon d'entré  saillant sur pilier  et protection   au deuxième d'un préau.","habitants":"Famille de Eugène Mir \r\n        \"","divers":"A Castelnaudary le château dit le castelet de Crozes, de Prébens, de Cheminières, coquelicot à Souilhanels et autres châteaux dont je n'ai pas les noms.","gps":"","images":["../image/image_11/11_Castelnaudary_Chateau_1.jpg","../image/image_11/11_Castelnaudary_Chateau_2.jpg","../image/image_11/11_Castelnaudary_Chateau_3.jpg","../image/image_11/11_Castelnaudary_Chateau_4.jpg","../image/image_11/11_Castelnaudary_Chateau_5.jpg","../image/image_11/11_Castelnaudary_Chateau_6.jpg","../image/image_11/11_Castelnaudary_Chateau_7.jpg","../image/image_11/11_Castelnaudary_Chateau_8.jpg"]},"Consult_chateau_formulairec67a-2":{"id":"Consult_chateau_formulairec67a-2","dept":"11","canton":"Quillan","commune":"Caudeval","nom":"Caudeval","type":"Château","periode":"XIII-XV","histoire":"CAUDEVAL; Guillaume  d'Aniort qui avait édifié la première place forte au XIIe siècle fut dépossédé en 1229 au profit de Gui de Levis seigneur de Caudeval en 1493, Bertrand de Antihaco,  en 1428, Jean d'Aulon  épouse Hélène de Mauléon dame de Caudeval, écuyer de Jeanne d'Arc et conseiller du roi. en 1565 passe à Hecoe Labat  d'Antignac, capitoul de Toulouse qui fait érigé le domaine en baronnie. Par suite d'alliances, la famille des comtes de Rochechouart,  au baron de Rigaud de Rivayrolles conseiller au Parlement de Toulouse. Le marquis de Faudoas, s'installa à Caudeval.    Peu après la Révolution, il a appartenu aux familles de Saint André et de Tréville  le propriétaire, le comte de Tréville au XIXe siècle, était musicien et avait créé, au château, un atelier de luthier.  Le comte de Tréville fit détruire la tour du IXe siècle, de même que les Rochechouart firent démolir au XVIIIe siècle les courtines,  En 1885, il fut trouvé dans ce château un trésor en pièces d'or caché dans un sac dissimulé dans un mur de l'actuelle salle d'Armes. Les propriétaires à l'époque étaient Mr Ludovic de Tréville et sa soeur, Mademoiselle de Fournas. Son dernier propriétaire connu fut le général Delpoux  A Caudeval, ils fréquentent  la famille Rouvairollis de Rigaud.","architecture":"Caudeval en 1565  à  cette époque fut construit à la tour hexagonale un escalier en vis. La cour sud était pavée et on entrait dans la tour en franchissant deux marches. À l'extérieur, le renforcement des défenses fut réalisé par les Levis, quand ils construisirent les deux  tours entre 1300 et 1350, la tour Est s'appuyant sur le mur-porte du premier château. Ces tours, de section carrée, étaient plus basses qu'actuellement. Le château est en partie du XIVe siècle. Deux tours extérieures datent de 1606. Le corps de bâtiment a été engerbé par une vaste construction en 1672, comportant en particulier un important escalier de pierre avec rampe en fer forgé. Toutes les constructions sont en pierre de taille. les Rochechouart firent démolir au XVIIIe siècle les courtines, sauf celles de l'Est, combler les fossés et relever le niveau de la cour sud, ainsi que le niveau de la « cour des armes » ou « cour des tours ». Au XIXe siècle, l'orangerie et les « communs » furent construits, en reliant le bâtiment principal aux anciennes petites écuries.","habitants":"Comte de Tréville\r\n        \"","divers":"Château de Caudeval","gps":"","images":["../image/image_11/11_Caudeval_1.jpg","../image/image_11/11_Caudeval_2.jpg","../image/image_11/11_Caudeval_3.jpg","../image/image_11/11_Caudeval_4.jpg","../image/image_11/11_Caudeval_5.jpg"]},"Consult_chateau_formulaire35d2":{"id":"Consult_chateau_formulaire35d2","dept":"11","canton":"Villemoustaussou","commune":"Lastours","nom":"Caunette","type":"Château","periode":"XVI","histoire":"CAUNETTE,  le château de la Caunette est un château bâti à Lastours, Il date du XVIe siècle. A la Révolution, en 1794, les biens du baron François de Treil de Pardailhan sont mis sous séquestre en tant que parent d'émigré, son fils Alexandre, garde du corps du roi a émigré. Il est contraint, en 1797, d'effectuer le partage de ses biens avec la République. Sa fille Monique veuve de Planque, pour sauver une partie de la fortune familiale, est obligée de provoquer son expropriation du domaine de La Caunette, dont elle devient propriétaire en 1801. Par héritage, le domaine, de plus en plus réduit est transmis, après le décès de cette dernière, en 1822, à ses neveux : Alexandre le fils d'Alexandre de Treil de Pardailhan, puis François, et enfin à son petit-neveu Henri. La superficie totale du domaine couvre alors, à la fin du XVIIIe siècle environ 45 hectares. Il est inscrit aux M.H. depuis 1948. Le château de la Caunette appartient depuis à une société privée et ne se visite pas.","architecture":"Caunette, bâtisse en équerre de trois niveaux, corps de logis rectangulaire à deux niveaux et attiques toiture en croupe.","habitants":"baron François de Treil de Pardailhan \r\n        \"","divers":"Château de Caunette","gps":"","images":["../image/image_11/11_Caunette_1.jpg","../image/image_11/11_Caunette_2.jpg"]},"Consult_chateau_formulaire2d29":{"id":"Consult_chateau_formulaire2d29","dept":"11","canton":"Montréal","commune":"Caux-et-Sauzens","nom":"Caux_Sauzens","type":"Château","periode":"XVII","histoire":"Trois châteaux à Caux et Sauzens, Celui de Caux, de Cauzens, l'Espitalet et le domaine du Castelle chambres d'hôtes. \r\n CAUX,  la famille de Roger de Cahuzac de Caux cinq siècles. De 1296 date à laquelle Raimond de Roger prit possession officiellement de la terre de Caux, que son épouse Isabeau de Goguan dame de Caux lui apporte en dot, jusqu'à 1791 époque à laquelle Louis Gaspard de Roger de Cahuzac de Caux, fuyant la Révolution émigra en Espagne, les seigneurs de Caux seront fortement impliqués dans la vie villageoise dont ils assurèrent treize générations durant cohésion et sécurité.  \r\nLa lignée des de Roger de Cahuzac de Caux s'éteindra avec le décès d'Henri en 1889, écuyer de Napoléon III et Grand dEspagne qui mourra sans descendance.","architecture":"Le cur du village de Caux tel qu'il nous apparaît aujourd'hui daterait du XIIe siècle et se serait constitué par extension du clos ecclésial qui ceinturait l'église primitive.\r\nLe village auquel on accédait par 3 portes était ceinturé d'un mur constitué par le dos des maisons accolées les unes aux autres, un fossé en défendait l'accès. Le château situé au sud du village faisait partie intégrante du mur qui ceinture le village.                                                                                                                Le Château de Caux à en croire le style des quatre fenêtres à meneaux de la façade méridionale a été fortement remanié au XVIe siècle. Mais la construction du château qui fait partie intégrante des fortifications du village est de toute évidence antérieur à cette époque. Ses défenses comprenaient trois tours rondes munies de canonnières reliées par des courtines.   Le château de Sauzens-Cauzens pourrait pour sa partie la plus ancienne dater du XIIe siècle, fortement remanié au XIXe siècle seule sa façade conserve encore des vestiges du XIVe siècle, deux fenêtres divisées par un meneau horizontal.                                                                         Castelle pas d'informations historique de ce château, ancien domaine viticole du  XIXe siècle entièrement restauré de plan rectangulaire flanquée de tours carrées aux extrémités à deux niveaux avec fronton triangulaire sur corps de logis, pavillon saillant en façade, chambres d'hôtes par madame Bretton Isabelle.","habitants":"famille de Roger de Cahuzac de Caux\r\n        \"","divers":"Châteaux de Caux, de Sauzens, de L'Espitalet et le Castelle.","gps":"","images":["../image/image_11/11_Caux_Sauzens_1.jpg","../image/image_11/11_Caux_Sauzens_2.jpg","../image/image_11/11_Caux_Sauzens_3.jpg","../image/image_11/11_Caux_Sauzens_4.jpg","../image/image_11/11_Caux_Sauzens_5.jpg","../image/image_11/11_Caux_Sauzens_6.jpg"]},"Consult_chateau_formulairec47e":{"id":"Consult_chateau_formulairec47e","dept":"11","canton":"Carcassonne","commune":"Cavanac","nom":"Cavanac","type":"Château","periode":"XVIII","histoire":"Plusieurs châteaux à Cavanac dont celui de Cavanac pas d'information historique aujourd'hui  auberge.                                                                                                                                 CAVANAC cité au XIIIe siècle, construction d'une fortification. remanié au XVIIe siècle, la construction est réaménagée, et  en 1948. Transformé en hôtel par la famille Gobin.                                                                                                                                    MARAN le domaine  est une ancienne propriété viticole familiale.\r\nLa maison de maître, reconstruite au début du XIXe siècle sur un site habité depuis le XIIIe siècle, vous accueille dans son son appartement \"Garance\" et ses deux chambres d'hôtes,","architecture":"CAVANAC, au XIIIe siècle, construction d'une fortification.  Le château du XVIIe siècle, la construction est réaménagée. En 1948, le portail et la grille d'entrée sont inscrits aux Monuments Historiques.\r\nAu début du XXIe siècle, la découverte de l'extérieur du site est libre et gratuite depuis les rues annexes..                                           Maran corps de logis rectangulaire à deux niveaux et attiques à toits plats accolé d'une tour hexagonale.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château de Cavanac et de Maran.","gps":"","images":["../image/image_11/11_Cavanac_1.jpg","../image/image_11/11_Cavanac_2.jpg","../image/image_11/11_Cavanac_3.jpg","../image/image_11/11_Cavanac_4.jpg","../image/image_11/11_Cavanac_5.jpg","../image/image_11/11_Cavanac_6.jpg","../image/image_11/11_Cavanac_7.jpg","../image/image_11/11_Cavanac_8.jpg","../image/image_11/11_Cavanac_9.jpg"]},"Consult_chateau_formulairea42c":{"id":"Consult_chateau_formulairea42c","dept":"11","canton":"Quillan","commune":"Chalabre","nom":"Chalabre","type":"Château","periode":"XIII-XVI","histoire":"Deux châteaux à Chalabre, celui de Chalabre et de Falgas.                                                    CHALABRE, le village est fondé avant le XIIe siècle et les terres appartiennent à la maison Trencavel. Après la croisade contre les Albigeois, les terres sont léguées à Pons de Bruyères, d'une famille venue en Languedoc avec Guy de Lévis et Pierre de Voisins, à la suite de Simon de Montfort dont ils étaient alliés et voisins des terres de Montfort-lAmaury en Isle de France. Ses descendants furent seigneurs, barons puis marquis de Chalabre.  M. le Marquis de Mauléon  Henriette Nathalie de Bruyères, la dernière des Bruyères Chalabre, a épousé en 1817 le comte Mathieu Antoine de Mauléon Narbonne de Nébias, qui se dernier le  vend  ce qui met fin à une présence familiale depuis le XIIIe siècle. Aujourd'hui propriété d'une association locale \" les chevaliers du Kercorb\" depuis 2002 qui en assure des animations historiques.                                                                                                                         FALGAS est situé à 1 km au nord de Chalabre, à l'époque c'était une maison de convalescence ou de repos Le château de Falgas dans les années 1970, Hercule Poirot personnage des romans d'Agatha Christie aurait pu y mener une enquête,  en 1969. Les propriétaires Yolande et Claude Morat  qui découvre le pays chalabrais en 1952, lorsque son père achète Falgas et crée la société de « Maison de repos du château de Falgas », acte fondateur du futur centre Christina. A la mort de son père, survenue en 1969, Claude Morat rachète la propriété des bords de lHers, fonde une exploitation agricole quil ne cessera de faire prospérer. En 1972 et avec le précieux soutien de son épouse Yolande, ils proposent un concept alors nouveau, le gîte à la ferme, précurseur de la chambre dhôtes.","architecture":"Chalabre, en 1279, le village connaît d'importantes inondations. En 1350, les remparts sont terminés et forment une fortification complète autour du village. Le centre-ville est une bastide du XIIIe siècle  Le château de Chalabre composé de trois parties du XIIIe, XVe et XVIIIe siècles. Cette cour dhonneur est limitée vers le midi par une belle balustrade en pierre. La façade principale tournée vers louest. Cette construction sans style, qui na jamais été achevée, est loeuvre de Louis Henri de Bruyères, évêque de Saint-Pons, qui, vers le milieu du XVIIIe siècle, sacrifia une partie du vieux manoir (restauré et agrandi une première fois, au XVe siècle, par Roger Antoine de Bruyères Chalabre), et adapta la nouvelle demeure aux besoins de lépoque. Seul fut conservé le donjon que lon a couronné  de créneaux et qui imprime encore à lédifice son cachet Moyen-Age.                                                                                           Falgas de style néo-classique à trois niveaux avec des lucarnes  corps de logis rectangulaire accolé d'une tour polygonale à toits galbés avec clocheton et pavillon en équerre à l'opposée avec oeil de boeuf en façade. Le château de Falgas, assoupi depuis 20 ans, est actuellement restauré par la famille. Il évoque un château de conte de fée, le site sera  loué pour des cérémonies diverses.","habitants":"Marquis de Mauléon  \r\n        \"","divers":"Château de Chalabre et de Falgas à Chalabre.","gps":"","images":["../image/image_11/11_Chalabre_1.jpg","../image/image_11/11_Chalabre_2.jpg","../image/image_11/11_Chalabre_3.jpg","../image/image_11/11_Chalabre_4.jpg","../image/image_11/11_Chalabre_5.jpg","../image/image_11/11_Chalabre_6.jpg","../image/image_11/11_Chalabre_7.jpg","../image/image_11/11_Chalabre_8.jpg"]},"Consult_chateau_formulaireb8a7":{"id":"Consult_chateau_formulaireb8a7","dept":"11","canton":"Bram","commune":"La Force","nom":"Chevalinière","type":"Château","periode":"XVIII","histoire":"CHEVALINIERE, un certain Sezard  de Haubergeon, capitaine des gardes français dHenri II en 1556. Au nombre des possessions de cette famille, on compte notamment une « terre de La Chevalinière ». Or lorsque Louis dAuberjon, le premier des Auberjon du Lauragais dont la filiation est suivie avec certitude, acheta, le 1er décembre 1554, un domaine situé près de Fanjeaux, il changea son nom ancien de Pechgausy en la Chevalinière, nom qui, par la suite, sera parfois accolé à celui dAuberjon. Le fait que Louis dAuberjon donne à sa terre nouvellement acquise dans le Lauragais un nom qui était celui du fief des Haubergeon du Vendômois accrédite lhypothèse dune communauté dorigine dautant plus facilement que celui-ci arrive dans le Lauragais, en 1543, dans la suite de Madeleine de Bourbon, fille du duc de Vendôme, Charles de Bourbon (1489-1537). Il paraît donc plausible destimer que Louis dAuberjon était un de ces cadets de famille qui, faute de perspectives, quoique non dépourvu de fortune, se mit au service de son suzerain pour élargir ses horizons. Le milieu dans lequel évoluent les Auberjon au début de leur établissement dans le Lauragais semble, au demeurant, perpétuer lorbite dinfluence des ducs de Vendôme puisque, jusque dans les années 1630, les Auberjon feront alliance à plusieurs reprises avec les familles de Marion et de Capriol, elles-mêmes au service des Bourbons avant même laccession dHenri de Navarre, duc de Vendôme en 1562, au trône de France.  Louis dAuberjon était un protégé de Madeleine de Bourbon (1520-1569) et dEléonore de Bourbon (1532-1611), filles de Charles de Bourbon et tantes dHenri de Navarre. Marie Elisabeth dite « Isabelle » dAuberjon (1861-1922), religieuse des Dames de la Retraite, qui rejoint la vie civile après les expulsions de 1903, infirmière-major à la société de secours aux blessés militaires  sur le navire-hôpital  Divona,  célibataire. cette grande famille se termine par cette dernière lignée.","architecture":"La CHEVALINIERE niché au milieu de la Toscane française, le domaine  un charmant et élégant, est idéalement situé entre la cite médiévale de Carcassonne et les villages de Castelnaudary, Limoux et Mirepoix dans la région Languedoc, un corps de logis rectangulaire à deux niveaux et attiques  flanqué aux extrémités de pavillons rectangulaires de même niveaux, l'ensemble à toit en tuiles peu inclinées, unique maison de maître du XVIIIe siècle, a récemment été transformée en chambres dhôtes de charme. Situé au cur du « Pays Cathare » à proximité du célèbre Canal du Midi et à quelques kilomètres de la Cité de Carcassonne.","habitants":"Famille de Louis dAuberjon\r\n        \r\n        \"","divers":"Château de la Chevalinière à la Force.","gps":"","images":["../image/image_11/11_Chevaliniere_1.jpg","../image/image_11/11_Chevaliniere_2.jpg"]},"Consult_chateau_formulaire57b9":{"id":"Consult_chateau_formulaire57b9","dept":"11","canton":"Rieux Minervois","commune":"Citou","nom":"Citou","type":"Vestiges","periode":"XVI","histoire":"CITOU, vestiges de la forteresse, construite au XVIe siècle pendant les guerres de religion, cette dépendance de l'abbaye de Caunes est mentionnée sous la dénomination de \"castrum\" dès 1183.","architecture":"Le \"château\" les vestiges apparaissent plutôt comme une maison fortifiée, utilisant une position naturelle très forte. Bâti au sommet d'un escarpement rocheux, il se présente comme un trapèze avec trois côtés rectangulaires et un oblique. Le côté nord-ouest est au sommet d'une falaise verticale. L'entrée se faisait par le sud. Elle est défendue par une bretèche reposant sur de hauts corbeaux par l'intermédiaire d'un grand linteau, laissant une fente libre pour l'attaque. A l'angle sud, une échauguette est bâtie elle aussi sur cinq corbeaux. La tourelle de l'angle nord, ronde, est en encorbellement. A quelques mètres à l'est, sur un terre-plein qui devait être clos de murailles et dépendre du château, le roc est creusé d'un silo rectangulaire. Deux belles terrasses arasées dans la roche ont gardés une sorte de muraille rocheuse côté précipice.","habitants":"Seigneurs locaux\r\n        \"","divers":"Vestiges de la forteresse de Citou.","gps":"","images":["../image/image_11/11_Citou_1.jpg","../image/image_11/11_Citou_2.jpg","../image/image_11/11_Citou_3.jpg","../image/image_11/11_Citou_4.jpg"]},"Consult_chateau_formulaire0281":{"id":"Consult_chateau_formulaire0281","dept":"11","canton":"Bram","commune":"Plaigne","nom":"Commanderie_Cazaux","type":"Commandeerie","periode":"XVII","histoire":"A Plaigne les châteaux de Cazaux et la Commanderie   propriété des Cazeaux.                                                                                  COMMANDERIE  En février 1693, messire Pierre Hippolyte de Béon Cazaux , seigneur marquis du dit lieu, de Saint Paul de Jarrat,  la commanderie de Plaigne-Béon Cazaux, dont le commandeur en titre,  Francois Paul II de Béon Cazaux, son fils aîné, issu de son mariage avec Jeanne Dax de La Serpent. Il sagit là dune prise de possession administrative à laquelle Pierre Hippolyte de Béon Cazaux aspire depuis 1688  date de la mort de son oncle, François Paul I de Béon Cazaux (1610-1688), chevalier de lordre de Saint Jean de Jérusalem, commandeur de la Capelle Lieuvron et du temple de Bordeaux, grand prieur de Toulouse, qui à fondé la commanderie de Plaigne en 1685, qui a réservé ladministration de cette commanderie à la famille de Béon Cazaux, et plus spécialement la charge de premier commandeur à François Paul II de Béon Cazaux, son petit-neveu préféré. Dès 1688 en effet, en présence de Robin Barbentane, receveur du Grand-Prieuré, Pierre Hippolyte de Béon Cazaux a fait procéder à linventaire des meubles du château  qui abrite la commanderie, et il sest chargé par la suite de ladministration du domaine, arguant de la minorité de François Paul II de Béon Cazaux, son fils aîné, désigné pour succéder à son grand-oncle bien-aimé, François Paul Ier de Béon Cazaux. Après la mort de Pierre Hippolyte de Béon Cazaux, datée du 27 février 1710, François Paul II de Béon Cazaux exercera  la fonction de commandeur de Plaigne, jusquà sa mort, survenue le 16 juin 1716.   Henri Joseph de Béon Cazaux ne sera commandeur de Plaigne quà partir de 1737. Il meurt le 7 septembre 1746 au château de la Serpent. Bernard I de Béon Cazaux, quant à lui, ne sera jamais commandeur de Plaigne, il est devenu entre temps capitaine au régiment de la Reyne cavalerie et a épousé le 10 avril 1713 demoiselle Claire de Saint-Jean de Thurin, fille de Jean Anne de Saint-Jean de Thurin, seigneur de Hounoux. Aujourd'hui lieu de réception séminaires, mariages etc.","architecture":"Château de Cazeaux  du XVIIe siècle cette bâtisse est composé d'un corps de logis rectangulaire à trois niveaux  toit en tuile en croupe dont une partie réduite, flanqué de trois tours rondes à toit presque plats en tuile.                                                                             Château de la commanderie à trois niveaux flanqué d'une tour carrée.                                                                                                                Château Capitaine qui appartenait au comte dAigues-Vives, de plan rectangulaire à deux niveaux, l'entrée incurvée dans la bâtisse laissant saillir deux pavillons.","habitants":"Messire Pierre Hippolyte de Béon Cazaux\r\n        \"","divers":"Commanderie de Cazaux, le château du Capitaine et le château de Cazaux à la Plaigne.","gps":"","images":["../image/image_11/11_Commanderie_Cazaux_1.jpg","../image/image_11/11_Commanderie_Cazaux_2.jpg","../image/image_11/11_Commanderie_Cazaux_3.jpg","../image/image_11/11_Commanderie_Cazaux_4.jpg","../image/image_11/11_Commanderie_Cazaux_5.jpg","../image/image_11/11_Commanderie_Cazaux_6.jpg"]},"Consult_chateau_formulaireeee5":{"id":"Consult_chateau_formulaireeee5","dept":"11","canton":"Villemoustaussou","commune":"Conques sur Orbeil","nom":"Conques_Orbeil","type":"Château","periode":"XIII-XVIII","histoire":"Quatre châteaux à  Conques sur Orbeil; dont  celui de Conques, de Saptes (voir article) de Korian la Vernède  clinique et de Vic pas d'information.                                                                         CONQUES-sur-ORBIEL, La famille de Conques, vassale des vicomtes de Carcassonne, fut dépossédée à la suite de la guerre des Albigeois et la seigneurie confisquée par les Montfort, puis par le roi, lequel concéda une partie des revenus domaniaux à  la famille de Gautier de Secrunio. La seigneurie appartenait en partie à l'abbaye de La Lagrasse. Malgré l'importance relative de ce lieu, l'histoire de Conques est assez obscure. Au milieu du XIIIe siècle, le castrum et la seigneurie de Conques, détenus en fief par Pierre de Conchis, appartenaient au Roi de France qui les possédait en paréage avec labbé de Lagrasse. Des travaux de fortification du village furent entrepris à cette époque. Au XVe siècle, Rodrigues de Villendras, capitaine espagnol et chef des « écorcheurs », pilla et brûla Conques. En 1623 la maison consulaire se composait des immeubles appartenant aux sieurs Peyrottes et Vaichère l'emplacement où sont construites les deux chapelles du Sacré Cur et Saint-Roch en faisaient aussi partie.  En lannée 1789, la population atteignait déjà 1537 habitants. Prospère, florissante avec ses moulins, ses manufactures de draps qui ont fait la fortune des négociants de la région carcassonnaise au XVIIe et XVIIIe siècles.                                                                                          La Vernède clinique devenue Korian  depuis 2001 .","architecture":"Conques du  Moyen-Age restent les vestiges des fortifications, les portes, les fossés remplacés aujourdhui par les routes départementales. Au centre du village, le château fort, léglise et les ruelles étroites du vieux Priourat qui raconte lhistoire de Conques à qui sait voir, déchiffrer et écouter la voix lointaine du tocsin qui annonçait les drames, les victoires, les joies, les souffrances des hommes.                                                                            Château de la Vernède, corps de logis rectangulaire   à trois niveaux toits à deux pans flanqué d'une  tour octogonale plein cintre dépassant l'ensemble et à l'opposée de deux tours carrées  dont une sur angle gauche l'autre saillante  les deux dépassant le toit du bâtiment.                                                                                        Vic  de plan carrée à trois niveaux toiture en terrasse escalier  a double révolution avec balcon au premier étage servant d'abri, oeil de boeuf en ouverture intermédiaire au troisième.","habitants":"Famille de Conques\r\n        \"","divers":"Château de Conques sur Orbeil,  de Korian  de la Vernède et de Vic .","gps":"","images":["../image/image_11/11_Conques_Orbiel_1.jpg","../image/image_11/11_Conques_Orbiel_2.jpg","../image/image_11/11_Conques_Orbiel_3.jpg","../image/image_11/11_Conques_Orbiel_4.jpg","../image/image_11/11_Conques_Orbiel_5.jpg","../image/image_11/11_Conques_Orbiel_6.jpg","../image/image_11/11_Conques_Orbiel_7.jpg","../image/image_11/11_Conques_Orbiel_8.jpg"]},"Consult_chateau_formulaire8d3a":{"id":"Consult_chateau_formulaire8d3a","dept":"11","canton":"Carcassonne","commune":"Couffoulens","nom":"Couffoulens","type":"Château","periode":"XIII-XIV","histoire":"Deux château à couffoulens celui de Leuc à 2 Km.                                                  COUFOULENS, en 1170  sous les Trencavel, le château est géré par un bayle et un viguier.  Devenu par l'alliance de Madeleine de Cayres d'entraigues avec Marc de Calvières, le 02 juin 1646, propriété de Calvières; les archives du château ayant brûlé à la Révolution. Cependant, on a retrouvé un récit plein de charme du mariage mouvementé de leur fille Charlotte de Calvières née en 1641, appelée \"Mademoiselle de Couffoulens\" avec Fulcran-Guilhem de Clermont Lodève Castelnaux. De Marc de Calvières, conseiller au parlement de Toulouse, mort en 1652 peu après la naissance de sa fille unique Charlotte, la baronnie est transmise à son frère Antoine, un temps aumônier de la reine Anne d'Autriche, puis militaire. À cette époque, une fenêtre à meneaux a été percée dans le mur ouest au premier étage du donjon. La croisée a disparu, au XIXe à la suite de limpôt sur les portes et les fenêtres. Plus tard, sur la façade sud du donjon, après le XVIe siècle, seront ouvertes les six grandes fenêtres que l'on voit actuellement.  En 1712, Guillaume Castanier, riche marchand-drapier, rachète la baronnie de Couffoulens. Il entreprend dimportants travaux sur tout le château. Une grande partie de ces transformations a été détruite après la Révolution.\r\n  LEUC a deux kilomètres au sud-est, le château de Leuc est cité en 1110 et en 1215 avec des seigneurs successifs comme Raymond de Saverdun, Nicolas de la Jugie, Arnaud Dax, Benjamin de Levis-Montmaur. Cest Pierre de la Jugie, cardinal archevêque de Narbonne, qui fit bâtir le château actuel en 1347. Après le meurtre de son mari, Magdeleine de Siran se tint enfermée, le reste de ses jours. Nayant point eu denfant, elle transmit la terre de Leuc à Gabriel Siran, son petit-neveu. Ce dernier eut deux filles et un fils Gabriel-Guillaume de Siran qui épousa en 1772 Mademoiselle de Romans, ancienne favorite de Louis XV, qui vendit en octobre 1769 à M. Ayrolles, marchand drapier de Carcassonne, son château et sa seigneurie de Leuc. Le château abrite la mairie de Leuc depuis le 18 juillet 2011.","architecture":"Couffoulens est un village circulaire qui sest construit autour de son château, lensemble était protégé de remparts : un premier rempart protégeant le château et un second protégeant lensemble, château et village. Le château primitif était une tour fortifiée qui appartenait à la puissante famille Trencavel dont les seigneurs étaient vicomtes de Carcassonne, de Béziers et du Razès. Ce château, de dimensions modestes, a été incendié (pendant la croisade de 1209 ou lors du passage du Prince Noir ?) comme le démontrent plusieurs traces encore visibles.Les archives communales conservent des plans de la terre de Couffoulens dont lun, dressé en 1777, présente au centre du village un grand bâtiment en forme de U désigné comme « Château de Couffoulens » adjoint sur le côté dun bâtiment rectangulaire appelé: lécurie de Madame de Poulpry. Ce plan représente donc le château tel quil était (et tel quil est resté) pendant la grande époque des Castanier .                         Leuc,  on y découvre les armes de la maison Dax dans la grande salle du château et à la porte de la tour de lescalier. Il y avait avant cinq tours, quatre aux angles et la cinquième, plus puissante, le donjon. Parmi les quatre tours, la fameuse tour carrée ou tour de la Pleureuse qui laisse le souvenir légendaire de la Dame voilée, Madgeleine de Siran, fille de Louis de Siran, seigneur de Cavanac, épouse de Benjamin de Levis-Montmaur, assassiné le 8 juin 1653 dans un faubourg de Mirepoix.","habitants":"Famille de Marc de Calvières                                                              Famille Trencavel\r\n        \"","divers":"Château de Couffoulens et de Leuc","gps":"","images":["../image/image_11/11_Couffoulens_1.jpg","../image/image_11/11_Couffoulens_2.jpg","../image/image_11/11_Couffoulens_3.jpg","../image/image_11/11_Couffoulens_4.jpg","../image/image_11/11_Couffoulens_5.jpg"]},"Consult_chateau_formulaire5885":{"id":"Consult_chateau_formulaire5885","dept":"11","canton":"Quillan","commune":"Couiza","nom":"Couiza","type":"Château","periode":"XV","histoire":"COUIZA, château dit des ducs de Joyeuses,En 1231, lors de la croisade des Albigeois, le pays de Couiza est donné à Pierre de Voisins lieutenant de Simon de Montfort  qui va construire son château à Arques. Il faut attendre le mariage en 1518 de la dernière héritière des Voisins, Françoise, avec Jean de Joyeuse (pair et chambrier nommé par François 1er, gouverneur de Narbonne et lieutenant général en Languedoc), pour quà son initiative fut entrepris, entre 1540 et 1550, la construction du château. Les travaux furent par la suite poursuivis par son fils, Guillaume de Joyeuse III (1520-1592), lui-même évêque dAlet, puis lieutenant général en 1561. En 1577, les protestants dAlet lassiègent et il doit prendre la fuite : le château est pillé. Mais en 1582, Guillaume y revient maréchal et y tient une véritable cour. Il meurt à Couiza le 24 janvier 1592 et est inhumé, semble t-il, aux Cordeliers ou peut-être à Couiza. Le 20 octobre 1587, son fils aîné, le « mignon », baron dArques Anne de Joyeuse, duc et pair à 20 ans, périt à la bataille de Coutras gagnée par Henri de Navarre. Malheureusement, aucun des six autres fils (François, Antoine, Georges, Henri, Scipion et François), ne semble être intéressé par le château de Couiza, dailleurs inachevé. En 1649, la fille unique dHenri, veuve de Charles de Guise le vend à un neveu de larchevêque de Narbonne, Claude de Rébé. Alors déclaré bien national, le château est la propriété de la marquise de Poulpry née Castanier ayant émigré le château est adjugé à un négociant, aprés avoir connu diverses affectations, devient  hôpital militaire, gendarmerie, et enfin magasin de laine pour une fabrique de chapeaux. La toiture seffondre en 1928, arbustes et ronces prennent possession du 1er étage, la ruine totale est proche quand le monument est enfin restauré il y a environ 50 ans. Aujourd'hui, ce château est un hôtel-restaurant.","architecture":"Château féodal traditionnel, quadrilatère Couiza construit en 1560 sorganise autour dune cour rectangulaire et comporte une grosse tour circulaire  à chaque angle. Lensemble est bâti en un bel appareil régulier avec le calcaire aux tons fauves qui caractérise la plupart des monuments de la région. Laspect extérieur est encore médiéval. Les quatre façades aux murs dun mètre dépaisseur, ne comportent aucune fenêtre au rez-de-chaussée. Aux deux étages, les quatre corps de bâtiment sont éclairés par délégantes fenêtres à meneaux en croix latine et puissamment grillagées. Les quatre tours rondes sont  robustes avec leurs deux mètres dépaisseur. Liées aux corps de logis par un pan coupé, il nest pas nécessaire de les traverser pour aller dun bâtiment à un autre. Elles sont percées de meurtrières adaptées à lusage des armes à feu. Leurs toits coniques recouverts de tuiles roses présentent la pente douce habituelle à la région audoise.\r\nLa cour intérieure aux logis construits dans un grès très fin contraste heureusement avec lappareil militaire extérieur. Tout y évoque la riante architecture de la Renaissance.","habitants":"Duc de Joyeuse\r\n        \"","divers":"Château de Couiza","gps":"","images":["../image/image_11/11_Couiza_1.jpg","../image/image_11/11_Couiza_2.jpg","../image/image_11/11_Couiza_3.jpg","../image/image_11/11_Couiza_4.jpg","../image/image_11/11_Couiza_5.jpg","../image/image_11/11_Couiza_6.jpg","../image/image_11/11_Couiza_7.jpg"]},"Consult_chateau_formulairedc9e":{"id":"Consult_chateau_formulairedc9e","dept":"11","canton":"Quillan","commune":"Coustaussa","nom":"Coustaussa","type":"Vestiges","periode":"XII","histoire":"COUSTAUSSA, il semble, comme dans de nombreux sites de la région, qu'un site wisigoth existe en ce lieu dès 730. Plus tard, au XIe siècle, un village fortifié semble construit sur le plateau: \"Villam quae vocatur Constantium\". En 1157, à la demande du Vicomte de Trencavel, un castellum est construit sur un éperon avancé de la vallée de Sals. Ce château fut confié à Pierre de Villar,  construit en 1170 , l'armée aragonaise d'Alphonse II déferla sur le secteur. En revanche, son déclin commença en 1210 lorsque sa population fit le choix terrible de résister à Simon de Montfort. Au XIIe siècle, la seigneurie et la forteresse de Coustaussa, tenue par la famille de Villar, sont occupés sans combat en 1210 par Simon IV de Montfort qui commande les armées croisées contre les Albigeois. À l'automne 1211, le soulèvement de Castelnaudary poussa le seigneur de Coutaussa à se rebeller contre les \"envahisseurs\". Montfort dut assiéger le castellum. Il fit massacrer la garnison, piller et brûler le village. En 1212, le territoire est confié à la famille de Montesquieu de Sault seigneur de Roquefort de Sault, plus \"sage\" que son ancien propriétaire. Le château ne fut plus jamais inquiété par des\"ennemis\". Au XIVe siècle, elle était entre les mains de la famille de Fenouillet. En 1367, par le mariage de Géraude de Fenouillet avec Saïx de Montesquieu, la seigneurie passa aux Montesquieu qui la conservèrent jusqu'à la Révolution.","architecture":"vestiges , sans être très important, ce château, assis sur un rocher, faisait quarante-cinq mètres de façade. Protégé par un solide rempart, d'autres murs de défense disposés à intervalles réguliers à flanc de coteau en rendaient l'accès toujours plus difficile.","habitants":"Famille de Villar                                                                                   Famille de Fenouillet\r\n        \"","divers":"Vestige du château de Coustaussa.","gps":"","images":["../image/image_11/11_Coustaussa_1.jpg","../image/image_11/11_Coustaussa_2.jpg","../image/image_11/11_Coustaussa_3.jpg","../image/image_11/11_Coustaussa_4.jpg","../image/image_11/11_Coustaussa_5.jpg","../image/image_11/11_Coustaussa_6.jpg"]},"Consult_chateau_formulaire2d31":{"id":"Consult_chateau_formulaire2d31","dept":"11","canton":"Trébes","commune":"Douzens","nom":"Douzens","type":"Château","periode":"XII-XIX","histoire":"Deux château à Douzens celui de Douzens et de Fontenelle viticole.                                                                                     DOUZENS, la ville de Douzens deveint une commanderie templière dès le XIIe siècle. Hélion de Villeneuve naquit vers l'an 1270, les écus indiqueraient un ordre militaire, on en conclut que ce blason pourrait être celui d'un chevalier de la Commanderie de Douzens. Mais ce n'est pas le blason d'un simple chevalier, mais bien celui du Grand Maître Helion de Villeneuve, élu Grand Maître de l'Ordre de Saint-Jean de Jérusalem en 1319 et mort en 1346., un écusson d'azur, chargé d'une fleur de lis d'or.  Hélion de Villeneuve  cette famille eut une branche : les de Villeneuve-Bargemont, dont il y avait encore de la survivance à Paris et à Avignon dans les années 1930. C'est l'auteur de cette branche qui obtint en 1506 du roi de France Louis XII d'ajouter en cur du blason ancestral. C'est une concession octroyée après la bataille de Marignan. Il est à remarquer que la commanderie de Douzens était particulièrement affectionnée de l'Ordre puisque, en 1567, nous voyons un allié de la famille de Villeneuve : Octavien de Baschi, commandeur de Douzens.  La famille Montlaur possédait le château au début du XXe siècle, Joseph Montlaur maire de Douzens en 1937 en était le propriétaire à l'époque.                                                La FONTENELLE, cest une histoire de famille mais cest aussi la passion dun couple de vignerons résolument tournés vers lavenir. Guidés par lamour de la vigne et du vin, Thierry Tastu et son épouse Nelly  sattachent chaque jour à allier culture dexcellence.","architecture":"Le château a été complètement restauré au début du XXe siècle et ne possède rien d'ancien. de plan rectangulaire  à trois niveaux et attiques  toit à deux pans flanqué  de deux tours carrées à créneaux et sur l'autre face deux tourelles rondes à créneaux également reliés à la base par une terrasse surélevée. On remarque seulement au-dessus d'une porte sur la terrasse, un blason incrusté dans le mur. Il est en relief et de forme elliptique. C'est un écu fretté, chaque partie chargée d'un écu, au chef chargé d'une croix, d'après la science du blason de Magny. Mais il y a une remarque qui fut faite sur ce blason indiquant que le blason des de Villeneuve était bien antérieurement au Grand Maître Hélion, en possession de la famille provençale de ce nom.  C'est l'auteur de cette branche qui obtient en 1506 du roi de France Louis XII d'ajouter un cur du blason ancestral.","habitants":"Famille Octavien de Baschi                                                                    Hélion de Villeneuve \r\n        \"","divers":"Château de Douzens et domaine de la  Fontenelle.","gps":"","images":["../image/image_11/11_Douzens_1.jpg","../image/image_11/11_Douzens_2.jpg","../image/image_11/11_Douzens_3.jpg","../image/image_11/11_Douzens_4.jpg","../image/image_11/11_Douzens_5.jpg","../image/image_11/11_Douzens_6.jpg"]},"Consult_chateau_formulaire19b2-2":{"id":"Consult_chateau_formulaire19b2-2","dept":"11","canton":"Fabrezan","commune":"Durban Corbières","nom":"Durban","type":"Vestiges","periode":"XI","histoire":"DURBAN. le château de Durban appartenait aussi loin que l'on puisse remonter dans le temps et dont nous ayons trace, à la famille de Donos. Ils étaient seigneurs : de Donos, du Catourze, de Durban, de Saint-Martin, de Portel, de Mathes, d'Ornezons, d'Olonzac, de Leucate et autres lieux dans les comtés de Roussillon, d'Empurias, de Minervois et dans la vicomté de Narbonne. La seigneurie de Gléon portait au Moyen-Age le nom de Glevum, on peut admettre sans peine que Glevum était le nom de cette station à l'époque romaine. Gléon formait au Moyen-Age une petite seigneurie qui passa dès le XIIIe siècle, peut-être même avant, dans la famille de Treilles, Olivier de Treilles, plus connu sous le nom d'Olivier de Gléon, .Le château fut vendu en 1873 et servit de carrière, ce qui explique sont état actuel. Il est aujourd'hui la propriété de la commune et l'association \"Comité de Sauvegarde du Vieux Durban\" uvre pour  sauvegarder son patrimoine avec les vestiges de ce château.  En 1996 on découvrit le sceau de Véziade de Durban épouse de Guillaume de Durban datant de la fin XIIIe Siècle  début du XIVe siècle celui-ci fut trouvé dans les vignes situées au pied du château.","architecture":"Durban, une enceinte fortifiée avec une tour-porte. la tour isolée de l'horloge, ancien poste avancé, dans laquelle on accède par deux portes de plein cintre. Au Sud, une calade  donne accès aux mines de la forteresse. La construction un grand rectangle, dont les énormes murs du Nord et de l'Ouest sont encore intacts.  Bâtiment rectangulaire à deux étages, les murs sont percés de trois fenêtres géminées du XIIIe siècle ou à meneaux avec une élégante colonnette de marbre blanc datant du XVIe siècle. Deux autres ouvertures sont des fenêtres renaissance à croisillons percées dans un mur repris au XVIe ou au XVIIe siècle. Au-dessus des fenêtres en plein cintre sont ouverts deux fenestrons carrés immédiatement au-dessous de trous carrés où s'engageaient les poutres de la toiture. Les fenêtres sont amorties à l'intérieur en arc surbaissé. Sur la partie supérieure de l'enceinte subsistent des créneaux. Le donjon circulaire transformé en pigeonnier, des pans de courtine, des tours, les restes d'une salle voûtée et une citerne sont encore visibles.Vers l'Est, le château était défendu par deux tours auxquelles venaient s'appuyer des courtines dont on aperçoit encore des restes. La tour ronde située plus au Sud se relie aux grands murs de l'ouest. Une porte cintrée, percée dans un mur qui a plus de deux mètre d'épaisseur permet de pénétrer dans une enceinte circulaire qui n'a pas plus de 2 m. 50 de diamètre ; elle est couverte par un dôme voûté.","habitants":"Olivier de Treilles\r\n        \"","divers":"","gps":"","images":["../image/image_11/11_Durban_1.jpg","../image/image_11/11_Durban_2.jpg","../image/image_11/11_Durban_3.jpg","../image/image_11/11_Durban_4.jpg","../image/image_11/11_Durban_5.jpg","../image/image_11/11_Durban_6.jpg","../image/image_11/11_Durban_7.jpg","../image/image_11/11_Durban_8.jpg","../image/image_11/11_Durban_9.jpg"]},"Consult_chateau_formulaire19d5":{"id":"Consult_chateau_formulaire19d5","dept":"11","canton":"Fabrezan","commune":"Vignevieille","nom":"Durfort_Aude","type":"Vestiges","periode":"XI","histoire":"DURFORT,  en 1215, le château de Durfort devient la propriété d'Alain de Roucy, l'un de ses lieutenants. La population de la région reste néanmoins cathare de cur, et lorsque la région redevient tranquille, le mouvement cathare se reforme. En 1225, le village de Pieusse tout proche accueille un concile cathare dont le but est de réorganiser la communauté cathare du Razès. Benoît de Termes en devient le chef spirituel. En 1226 commence la « guerre de Limoux » au cours de laquelle s'affrontent cathares et troupes royales de Louis VIII. Le pouvoir royal affermit sa conquête sur cette région en édifiant ou en aménageant cinq grandes forteresses et un réseau de petits forts de guet. Le château  s'inscrit dans ce système défensif, visant à protéger les nouvelles frontières du Royaume de France. Distante de 3 km, la forteresse toute proche de Termes est remaniée en 1229 pour devenir un château royal hébergeant une garnison. En 1241, Olivier de Termes se soumet à Louis IX, et récupère ainsi une partie de ses terres et châteaux dont Durfort. Il semble qu'il le donne aux anciens seigneurs de Durfort. En 1243, Hugues de Durfort prête serment de fidélité au roi, et participe l'année suivante au côté des croisés au siège de Montségur. En 1256, Gaucelin de Durfort se ligue avec d'autres seigneurs contre l'autorité du roi de France et perd ainsi ses droits sur son domaine, mais les récupère quelques mois plus tard, après un hommage au Roi. En 1659, Louis XIV signe le traité des Pyrénées avec le Royaume d'Espagne, scellé par son mariage avec l'Infante Marie Thérèse. Ce traité modifie les frontières en donnant le Roussillon à la France. La frontière recule sur la ligne de crêtes des Pyrénées et les différentes forteresses de la région perdent leur importance stratégique. Le château de Durfort est donc remanié pour en améliorer le confort.","architecture":"La construction du château de Durfort date du XIe siècle est l'un des châteaux cathares que l'on peut encore admirer dans l'Aude. Il fut érigé sur un piton rocheux qui surplombe la vallée de l'Orbieu. Il se situe au nord, à 3 kms du château de Termes. Les ruines actuelles sont celles d'un habitat fortifié, comprenant une chapelle, des logis à fenêtres rectangulaires et une tour. De hauts murs épais, des caves et puits, des salles voûtées de bâtiments carrés, des tourelles d'angle, des échauguettes et une tour maîtresse sont encore visibles. Aujourd'hui, le château de Durfort est une propriété privée. Le château de Durfort n'étant pas consolidé, le risque de chutes de pierres reste élevé. Au XVIIIe siècle, il semble abandonné, mais son isolement permet de préserver ses ruines.","habitants":"Famille d'Alain de Roucy\r\n        \"","divers":"Vestiges du château de Durfort","gps":"","images":["../image/image_11/11_Durfort_Aude_1.jpg","../image/image_11/11_Durfort_Aude_2.jpg","../image/image_11/11_Durfort_Aude_3.jpg","../image/image_11/11_Durfort_Aude_4.jpg","../image/image_11/11_Durfort_Aude_5.jpg","../image/image_11/11_Durfort_Aude_6.jpg"]},"Consult_chateau_formulairea1b7":{"id":"Consult_chateau_formulairea1b7","dept":"11","canton":"Lézignan Corbières","commune":"Escales","nom":"Escales","type":"Château","periode":"XIX","histoire":"ESCALES, les comtes de Narbonne avaient un fief à Escales au XIIIe siècle. Pays natal d'Achille Mir,  auteur de chefs-d'uvre en langue d'Oc. C'est, a dit Mistral,  La tour d'Escale  vestiges de la fin du XIe siècle, le château appartient au chapitre cathédrale de Saint-Just de Narbonne, après le XVe siècle,  le site n'est  plus habité, au XXe siècle, la tour appartient à la commune. Jusque-là propriété d'Anne-Marie et Guilhem Durand  En 1942, elle est inscrite aux Monuments Historiques. Acheté en 2015 par un groupe chinois sera cédé à l'importateur chinois BHC International Wine Assets Management, et le château de la Guirlande de Madame Julien viticole.                                                                                                                                                    La BASTIDE est un restaurant gastronomique et d'un centre d'initiation à la dégustation à Escales. hôtel restaurant par Guilhem Durand.","architecture":"Vestiges de la Tour d'Escale dont-il ne reste que la base.              Le château de la Bastide  actuel est construit à lemplacement de lancien château médiéval, et date  du XVIII ou XIXe siècle. Á  première vue, cet ensemble impressionne par la hauteur des murs, directement assis sur le rocher. Son emplacement se situe à lextrémité orientale de léperon rocheux qui porte le vieux village, vestiges de constructions, il est  difficile de déterminer la fonction de chaque pièce, les murs intérieurs, les couloirs,les portes sont identifiables. La tour ses dimensions la rendent habitable, mais l'absence de fenêtre confirme qu'elle n'a pas été aménagée pour le confort après le XIVe siècle. Les défenses, la tour ayant été arasée, il n'est pas possible de savoir si mâchicoulis et crénelage existaient. Il est quand même possible de voir des fentes verticales sur plusieurs façades. Ce sont des archères du XIIe siècle. En partie basse, cette large fente ne ressemble guère à une archère.","habitants":"Guilhem Durand     \r\n        \"","divers":"Vestiges du château d'Escales (tour) et ce château de la Bastide","gps":"","images":["../image/image_11/11_Escales_1.jpg","../image/image_11/11_Escales_2.jpg","../image/image_11/11_Escales_3.jpg","../image/image_11/11_Escales_4.jpg","../image/image_11/11_Escales_5.jpg"]},"Consult_chateau_formulairee5f4":{"id":"Consult_chateau_formulairee5f4","dept":"11","canton":"Fabrezan","commune":"Fabrezan","nom":"Fabrezan","type":"Château","periode":"XII-","histoire":"FABREZAN,  simple villa au Xe siècle, Fabrezan dépendait alors du monastère de Lagrasse, également seigneur de Ferrals. Par la suite, cette seigneurie devint le chef-lieu d'une baronnie, avec des seigneurs particuliers et des coseigneurs. Le \"castrum\" de Fabrezan est mentionné à partir de 1222. On découvre l'existence du comte de Fabrezan et seigneur de Villerouge. Il faut  rappeler que Fabrezan est un ancien village fortifié, on  aperçoit des remparts à l'impasse Nego-Saumo. À proximité de Fabrezan, les textes signalent un autre site, Villerouge, avec son église. Au Moyen-Age, avant la croisade contre les Albigeois, la seigneurie de Fabrezan appartenait à la vicomté de Narbonne. À partir du XIVe siècle, quand le vicomte de Narbonne accusa les consuls de la ville de Fabrezan de rébellion envers le roi en 1381, il décida du punir les Narbonnais. Ces derniers ripostèrent en attaquant et en prenant le donjon de Fabrezan, refuge de la famille du Vicomte. En 1508, la vicomté de Narbonne se trouve rattachée au domaine royal. Les nouveaux seigneurs de Fabrezan  se chargent de percevoir les redevances féodales. Début du XVIIe siècle. En 1633, Jean de Seigneuret, seigneur de Fabrezan, fut reçu en remplacement du baron de Castrie. Ainsi venait d'être créée la baronnie de Fabrezan, construction des remparts et création de deux quartiers.                                                                                                                                                        A quelques kilomètres aux environs, le château de Fontcouverte chambres d'hôtes, de Bouterac et le château de la Baronne à Moux.","architecture":"Fabrezan, ancien donjon du château, fut démantelé dans sa partie supérieure, en 1628, pendant la Fronde.  La tour est en partie enclavée dans les habitations. De plan barlong, haute de plus de 30 mètres à mâchicoulis, elle présente à la base des assises en grès du pays. Au-dessus, de rares archères sont pratiquées dans les murs. A l'ouest, porte murée en arc plein cintre composé de treize claveaux dont une clé. L'encadrement intérieur est sculpté en cavet. Cet arc est constitué par des claveaux de teintes alternées. Une série de parements à bossages est visible à la partie supérieure de la tour. Il en existe aussi à la base de l'arête sud. Il s'agit  de reprises du XIIIe siècle pour se protéger des multiples attaques, le seigneur du village fit construire le château dont ont voir encore la tour. Elle date du XIIe siècle,  la porte en partie basse n'est pas classique au Moyen-Age. De plus, cette porte est surélevée d'un petit mètre par rapport au sol. L'arc de décharge au dessus parait trop imposant pour une si petite porte,  une archère unique basse, la dimension impressionnante de cette tour la rend habitable.","habitants":"Famille de  Jean de Seigneuret\r\n        \"","divers":"Château de Fontcouverte, de Bouterac et Tour avant rénovation et après à Fabrezan","gps":"","images":["../image/image_11/11_Fabrezan_1.jpg","../image/image_11/11_Fabrezan_2.jpg","../image/image_11/11_Fabrezan_3.jpg","../image/image_11/11_Fabrezan_4.jpg","../image/image_11/11_Fabrezan_5.jpg"]},"Consult_chateau_formulaireffc7":{"id":"Consult_chateau_formulaireffc7","dept":"11","canton":"Castelnaudary","commune":"Saint-Papoul","nom":"Ferrals","type":"Château","periode":"XVI","histoire":"A  St-Papoul le château de Ferrals et l'abbaye de Saint-Papoul.                                                 FERRALS, cité en 1213  : le fief appartient à labbaye de Saint-Papoul, La seigneurie est achetée à labbaye de Saint-Papoul par Guillaume Pia, sénéchal de Carcassonne, entre 1248 et 1252. au XVe siècle : la seigneurie passe à Antoine de Toulouse-Lautrec  en 1479 : Ferrals passe à la famille dAntin en 1545 : La seigneurie est saisie par François 1er en raison dune accusation de forfaiture portée contre Antoine dAntin. en 1547 : La seigneurie est donnée à Diane de Poitiers, par Henri II. en 1559 : Diane de Poitiers revend la Seigneurie à François de Rougier, secrétaire général des guerres et trésorier de France à Montpellier. François d
