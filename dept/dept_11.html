ateau_formulairee663-2","nom":"Védilhan","commune":"Moussan","type":"Château","img":"../image/image_11/11_Vedilhan_1.jpg"}];const FULL={"Consult_chateau_formulairee446":{"id":"Consult_chateau_formulairee446","dept":"11","canton":"Fabrezan","commune":"Tuchan","nom":"Aguilar_Domneuve","type":"Vestiges","periode":"XII-XIII","histoire":"Deux vestiges de  château à Tuchan Aguilar et Domneuve.                                        AGUILAR,  est l'un des \"cinq fils de Carcassonne\" qui surveillait la frontière avec l'Espagne d'alors au XIIe siècle. Il appartient aux comtes catalans, aux vicomtes de Carcassonne, et au moment de la croisade à Olivier  de Termes seigneur. En 1210, il est occupé par Simon de Montfort avant de tomber dans les mains du Roi de France Louis IX. Il fut consolidé et modifié par les ingénieurs royaux à la fin du XIIIe siècle.  Après léchec de cette révolte Olivier de Termes fait sa soumission au roi. En mai 1241 il remet son château dAguilar et Termenès à Louis IX. Le château devient une forteresse royale, dirigé par un châtelain dont le premier est cité en 1246. Cependant dix ans plus tard Saint-Louis rend à Olivier, Aguilar et la plus grande partie du Termenès en raison de son bon comportement en Terre Sainte. Soucieux de concourir à la défense du royaume de France Olivier projette, dans son testament de 1257, de léguer le château au roi. Mais il finit par le vendre à Saint-Louis, lors dun séjour à Paris en mars 1262. Six mois après le châtelain royal Peire de Mirepoix prend possession de la forteresse. Aguilar constitue à partir de cette date  et jusquau traité des Pyrénées en 1659, lune des forteresses frontières défendant la France face aux royaumes hispaniques.                                                                                              DOMNEUVE;  appartenait en 1177 à Pierre de Domneunova. En 1262, l'abbaye fortifiée de Fonfroide possède le domaine. En 1315, ce petit château appartient à la famille de Nouvelles.","architecture":"Aguilar, situé sur un mamelon rocheux et au pied du prestigieux vignoble du Haut Fitou.  Contrôlait l'accès aux Corbières centrales. Le château est situé sur une colline de 96 mètres de hauteur surplombant la plaine de Tuchan. Il est composé de deux enceintes séparées par des lices. Les bâtiments regroupés au centre de la deuxième enceinte sont tous pratiquement détruits. L'enceinte extérieure, construite par les ingénieurs royaux entre 1262 et le début du XIVe siècle, est composée de six tours semi-circulaires. L'enceinte intérieur, correspondant au château féodal des seigneurs de Termes, abrite un corps de logis et une citerne. À une époque tardive cette enceinte a été flanquée par une tour rectangulaire.                                                                                  Domneuve  château de plaine, absence de fossé autour.\r\ncomblé avec le temps pour agrandir les terres à vigne,\r\nl'extérieur est une vaste enceinte à plan polygonal irrégulier.\r\n Les murs font 1 mètre d'épaisseur et presque 1,5 mètre au Nord-Ouest, coté le plus proche de la colline. Le mur coté Ouest comporte de très nombreuses ouvertures sur 2 niveaux. Elles sont trop étroites pour des archères, pour des ouvertures de tir d'arme à feu, ce qui prouverait que ce château était toujours habité au XVIe siècle. Le mur Est est complètement effondré.","habitants":"Famille d'Olivier  de Termes                                                                 Famille de Nouvelles\r\n        \"","divers":"Vestiges d'Aguilar et de Domneuve","gps":"","images":["../image/image_11/11_Aguilar_Domneuve_1.jpg","../image/image_11/11_Aguilar_Domneuve_2.jpg","../image/image_11/11_Aguilar_Domneuve_3.jpg","../image/image_11/11_Aguilar_Domneuve_4.jpg","../image/image_11/11_Aguilar_Domneuve_5.jpg","../image/image_11/11_Aguilar_Domneuve_6.jpg","../image/image_11/11_Aguilar_Domneuve_7.jpg","../image/image_11/11_Aguilar_Domneuve_8.jpg"]},"Consult_chateau_formulairebe22":{"id":"Consult_chateau_formulairebe22","dept":"11","canton":"Rieux-Minervois","commune":"Aigues-Vives-d","nom":"Aigues_Vives","type":"Vestiges","periode":"XIII","histoire":"AIGUES-VIVES, vers 984, le bourg de Aguaviva est cité suite à un échange entre l' abbé Udulgarius et Roger Trencavel, vicomte de Carcassonne.  Au  XIIIe siècle, construction d'une fortification entourant le petit bourg. En 1948, la tour est inscrite aux Monuments Historiques.                                                                                                                    A cinq kilomètres au sud-Ouest à Rustiques le château de CANET  Domaine viticole traditionnel du XIXe siècle,  est aujourdhui reconnu comme un des domaines « phare » du Minervois hôtel restaurant.","architecture":"L'origine dAigues-Vives remonte à lépoque gallo-romaine. La villa Aqua Viva sélevait sur un lieu appelé Saint-Jean. Sur cet emplacement, un prieuré fut construit vers le VIIe siècle par des moines bénédictins et un nouveau village vint sy grouper. Le château fort, entouré de fortifications, fut construit au VIIIe siècle. Peu à peu, les habitants abandonnèrent ce lieu  de Saint-Jean, et vinrent se fixer autour du château, fondant ainsi le village actuel.","habitants":"Roger Trencavel\r\n        \"","divers":"Vestiges  du château d'Aigues-Vives et château du Canet à Rustiques","gps":"","images":["../image/image_11/11_Aigues_Vives_1.jpg","../image/image_11/11_Aigues_Vives_2.jpg","../image/image_11/11_Aigues_Vives_3.jpg","../image/image_11/11_Aigues_Vives_4.jpg","../image/image_11/11_Aigues_Vives_5.jpg"]},"Consult_chateau_formulairea20a":{"id":"Consult_chateau_formulairea20a","dept":"11","canton":"Castelnaudary","commune":"Airoux","nom":"Airoux","type":"Château","periode":"XVI-XVII","histoire":"AIROUX, les origines dAiroux remontent au Moyen-Age,  L'édifice changea maintes fois de propriétaires jusquà la Révolution Française. A ce moment là, les paysans se répartissent les terres dAiroux.\r\nLa demeure, au XXe siècle, propriété de M. Grillères, est une solide construction Renaissance.","architecture":"Airoux est un château bâti à Airoux. Sa construction date du XVIe et XVIIIe siècle, du château de cette époque, il ne subsiste que la tour et la porte dentrée du XIIe siècle ainsi quune tourelle qui surplombe le mur dangle dans la rue principale la demeure, est une solide construction Renaissance, flanquée d'une tourelle d'angle, l'escalier est enfermé dans une autre tourelle percée d'une porte et de fenêtres aux riches sculptures.","habitants":"Famille de M. Grillères\r\n        \"","divers":"Château d'Airoux","gps":"","images":["../image/image_11/11_Airoux_1.jpg","../image/image_11/11_Airoux_2.jpg","../image/image_11/11_Airoux_3.jpg","../image/image_11/11_Airoux_4.jpg","../image/image_11/11_Airoux_5.jpg"]},"Consult_chateau_formulaire8a5b":{"id":"Consult_chateau_formulaire8a5b","dept":"11","canton":"Fabrezan","commune":"Albières","nom":"Albières","type":"Vestiges","periode":"XI-XII","histoire":"ALBIERES,  le seigneur d'Auriac possède vers le XIe siècle une partie des terres d'Albières. En 1113, les seigneurs d'Auriac et d'Albières rendent hommage aux Trencavel. En 1183, Amélius d'Auriac rend hommage à l'archevêque de Narbonne pour le 'Castrum d'Albières'. En 1210, durant la croisade des Albigeois, la puissante forteresse de Termes  est prise par les armées de  Simon de Montfort.  Il semble que de nombreux \"châteaux\" se rendent sans combattre. En 1557, Audouin de Châteauneuf, seigneur d'Albières, rend hommage à l'archevêque de Narbonne. Entre 1792 et 1824, les signes religieux extérieurs sont bannis en France. Les croix sur les places publiques sont démontées ou cassées. C'est peut être à cette époque que certains villageois ont gravé sur les murs extérieurs du château des \"graffitis cruciformes et religieux\".","architecture":"Albières, après 1792, la Révolution Française \"permet\" de dépouiller les châteaux de leurs plus belles pierres, se retrouve amputer de ses sculptures, éviers etc.  Y avait il eu une destitution et un déclassement du château en maison après la Révolution de 1789.  Au XXIe siècle, la visite est libre et gratuite à l'extérieur. L'intérieur est privé et habité, Il n'est donc pas visitable. Le risque de recevoir une pierre est important près des remparts, et faible pour l'extérieur du château sur le promontoire.","habitants":"Famille d'Audouin de Châteauneuf\r\n        \r\n        \"","divers":"Vestiges du château d'Albières","gps":"","images":["../image/image_11/11_Albieres_1.jpg","../image/image_11/11_Albieres_2.jpg","../image/image_11/11_Albieres_3.jpg"]},"Consult_chateau_formulaireabc6":{"id":"Consult_chateau_formulaireabc6","dept":"11","canton":"Limoux","commune":"Alet-les-Bains","nom":"Alet_les_Bains","type":"Palais-Episcopal","periode":"XII-XVII","histoire":"ALET les BAINS, Abbaye  fondée par Bera, vicomte du Razès. Au XIIe siècle elle est influente et attire bon nombre de pèlerins. Pons Amiel, abbé de 1167 à 1197, fit fortifier la place. À sa mort, le chapitre avait désigné pour le remplacer Bernard de Saint-Ferréol. Le cathare Bertrand de Saissac, tuteur du vicomte Raimond-Roger Trencavel.  il fit élire l'abbé Boson, favorable aux Cathares. Bérenger de Barcelone, archevêque de Narbonne, entérina ce choix contre une coquette somme d'argent. Boson ne fut chassé qu'en 1222, après avoir livré Alet au comte de Foix. En 1318, l'abbaye est érigée en évêché, pour poursuivre la lutte contre le catharisme. Elle le reste jusqu'à la Révolution.  Au XVIe siècle, sous l'épiscopat d'Antoine Dax les calvinistes, appelés Huguenots par leurs adversaires, incendièrent et ruinèrent le palais épiscopal et l'abbaye qui était devenue la cathédrale sainte-Marie de l'évêché d'Alet. Au XVIIe siècle, Nicolas Pavillon, évêque d'Alet, disciple de saint Vincent de Paul grand organisateur, défenseur et soutien des pauvres et, qui osa même se dresser contre l'administration de Louis XIV, aurait pu trouver les moyens de restaurer les édifices endommagés mais n'a pas jugé bon de le faire, faute sans doute d'en apprécier la valeur et pour ne pas choquer les pauvres de son diocèse. Il fera tout de même construire le pont qui enjambe l'Aude en 1662, un système d'irrigation perfectionné, ainsi qu'un séminaire et une institution des Dames Régentes. Le palais épiscopal fut acquis par le propre chirurgien du dernier évêque. Sa petite-fille, Élise Dellac, épousa Auguste Saunière qui fut maire d'Alet durant 18 ans. Ce dernier était lui-même le petit-fils d'Étienne Larade, avocat, qui représenta la Haute-Vallée de l'Aude à l'Assemblée Nationale de 1789.Leurs descendants conservèrent la propriété qui fut entretenue et occupée jusqu'au milieu du XXe siècle. La famille de l'actuel propriétaire de l'Hôtel de l'Évêché l'acheta.","architecture":"Alet les Bains. Le 35e et dernier évêque d'Alet, Charles de la Cropte de Chanterac, qui a ouvert la \"Grand Route\" Limoux-Quillan, a fait aussi construire une partie de l'évêché, rattachée au bâtiment le plus ancien qui date du XIIe siècle, actuellement conservé et aménagé. Par un escalier de pierre appartenant à la vieille abbaye, on accède au premier étage où l'on peut voir la belle et vaste salle synodale et la bibliothèque en trompe-l'il d'époque. L'évêché et ses jardins de trois hectares occupent en grande partie l'emplacement de l'ancienne abbaye.","habitants":"Famille d'Étienne Larade\r\n        \"","divers":"Vestiges du palais épiscopal abbaye d'Alet les Bains et la maison Nostradamus.","gps":"","images":["../image/image_11/11_Alet_les_Bains_1.jpg","../image/image_11/11_Alet_les_Bains_2.jpg","../image/image_11/11_Alet_les_Bains_3.jpg","../image/image_11/11_Alet_les_Bains_4.jpg","../image/image_11/11_Alet_les_Bains_5.jpg"]},"Consult_chateau_formulaire8e75":{"id":"Consult_chateau_formulaire8e75","dept":"11","canton":"Villemoustaussou","commune":"Aragon","nom":"Aragon","type":"Château","periode":"XII-XVII","histoire":"ARAGON,  la première lignée des seigneurs dAragon qui a fait bâtir un château fortifié au XIIe siècle descend de Guilhem-Roger dAragon cousin du roi dAragon dEspagne. Le seigneur dAragon a hébergé vers la fin du XIIe siècle des prêtres cathares pour les protéger des poursuites des soldats du Roi de France. Pendant les guerres de religion, par deux fois, en 1580 et en 1588, le château a été occupé par les Huguenots avant dêtre repris par le vicomte de Turenne, royaliste catholique. Le village dAragon est devenu ensuite la propriété du roi Louis IX, le château étant ensuite vendu à un riche drapier. Six manufactures « royales » dans les villages autour dAragon ont joué un rôle important dans léconomie locale pendant une période de 150 ans à partir du début du XVII siècle. A la Révolution, le comte de Bancalis, monarchiste, a été exproprié du château. Les valeurs ont évolué avec les raisons de la convoitise, mais le château dAragon est resté lobjet et le symbole de tous les conflits. La façade rappelle limportance historique de la bâtisse composée de deux tours de chaque côté dune balustrade en pierre portant le blason de la seigneurie.","architecture":"Le château d'Aragon  date de deux époques, les origines remontant au XIIe siècle, il a été remanié au XVIIe siècle, le château d'Aragon date de la fin du XVIe au début du XVIIe siècles. La façade du château rappelle naturellement limportance historique de la bâtisse composée de deux tours de chaque côté dune balustrade soutenue par deux colonnes en pierre portant le blason de la seigneurie. Il est inscrit aux M.H. depuis 1948.","habitants":"Famille de Guilhem-Roger dAragon\r\n        \"","divers":"Château d'Aragon","gps":"","images":["../image/image_11/11_Aragon_1.jpg","../image/image_11/11_Aragon_2.jpg","../image/image_11/11_Aragon_3.jpg","../image/image_11/11_Aragon_4.jpg"]},"Consult_chateau_formulaireb17a":{"id":"Consult_chateau_formulaireb17a","dept":"11","canton":"Salléles d","commune":"Argeliers","nom":"Argeliers_Aude","type":"Château","periode":"XV-XVII","histoire":"ARGELIERS,  ce castellum est mentionné pour la première fois en 1154, lorsqu'il est attribué à l'abbaye de Quarante. L'édifice a dû souffrir des guerres de Religion et la reconstruction presque complète des bâtiments a dû être réalisée au moment du retour à la paix, à la fin du XVIe ou au début du XVIIe siècle. Les religieux de Quarante conservèrent le domaine jusqu'à la Révolution.   Des hommes comme Marcelin Albert et d'autres ont mené un combat juste, face à l'état français de l'époque, la croisade viticole contre les fraudeurs du vin se mit en route grâce à leur courage et détermination.","architecture":"La construction du château d'Argeliers date du XVIIe siècle. Le mur de la cour, très épais à la base, avec traces de chemin de ronde à hauteur du second étage actuel, paraît indiquer que cette demeure seigneuriale a été aménagée dans les murs du château-fort primitif. L'édifice se reconnaît de loin par sa tour carrée qui intercepte une ruelle perpendiculaire aux anciens murs d'enceinte des défenses sud. Des deux culs de sac obtenus, celui du sud sert actuellement d'entrée. Celui du nord permettait autrefois d'accéder à la tourelle par une porte basse, murée depuis. Le mur méridional du château, qui longe la cour et se prolonge vers l'est au-delà de la tourelle, montre encore des traces de chemin de ronde au deuxième étage. Il s'agit là d'une courtine du château-fort. L'aile située à l'est de la ruelle remonte au XVe siècle, était un vestige de la construction antérieure aux guerres de la Ligue. Au premier étage existe deux salles en enfilade. On peut voir de l'extérieur les vestiges des remparts ainsi que \"la porte de la Calade\" coiffée de la tour de l'horloge datant du XIIe siècle.","habitants":"Marcelin Albert\r\n        \"","divers":"Château d'Argeliers, un manoir et l'hôtel de ville","gps":"","images":["../image/image_11/11_Argeliers_Aude_1.jpg","../image/image_11/11_Argeliers_Aude_2.jpg","../image/image_11/11_Argeliers_Aude_3.jpg","../image/image_11/11_Argeliers_Aude_4.jpg"]},"Consult_chateau_formulaire2759":{"id":"Consult_chateau_formulaire2759","dept":"11","canton":"Lézignan-Corbières","commune":"Argens-Minervois","nom":"Argens_Minervois","type":"Château","periode":"XIV","histoire":"ARGENS, anciennement Villa Arsegii (881), tire son nom du site géologique composé de grès et d'argile. Possession de l'archevêché de Narbonne, il passa en 1215, lors de la croisade contre les Albigeois aux mains de Simon de Montfort qui le donna en fief à l'un de ses lieutenants. Il est ensuite vendu en 1356 pour payer la rançon de Jean II le Bon prisonnier des Anglais. C'est à cette même période qu'il échappe aux ravages du Prince Noir qui ne put traverser avec ses troupes l'Aude en crue. Argens devient ensuite la propriété de Guillaume de Tournissan, seigneur de Serres, puis de Jacques de Verzeille en 1529  qui prend le titre de monsieur d'Argens. Racheté en 1631 par Blaise de Graves d'une illustre famille de la province du Languedoc.  En 1722, Antoine de Niquet, président du Parlement de Toulouse en prend possession. En 1800, la famille Segonne acquiert la plus grande partie des terres ainsi que le château et ses dépendances.                                                                                                                    Minervois-Corbières magnifique et majestueux: ce château médiéval rénové du XIIe siècle témoigne de 900 ans d'histoire depuis les cathares aux chevaliers du temple jusqu'à nos jours. Nombreux éléments d'époque. Dominant le village et les environs. 600 m² sur 3 étages, hauts plafonds.","architecture":"Le château  d'Argens du XIXe siècle a été construit à la place dun autre bien plus ancien. Le XIXe siècle verra le village prendre un essor démographique important dû au développement de la viticulture moderne. D'importants travaux modifieront l'aspect du château. On assistera aussi à la construction de l'église paroissiale Saint-Roch.Argens Minervois  dominant le passage du Canal du Midi au sommet dune colline, le village offre un visage dominant et massif où se détache la forme caractéristique du château avec ses deux tours et son logis.  Il date dans son ensemble du XIVe siècle, mais il succède à un édifice bien antérieur. Remanié à plusieurs reprises au cours du XIXe siècle, il a pris alors son aspect actuel.                                                                                                                   Minervois Corbières, nombreux éléments d'époque, dominant le village et les environs. 600 m² sur 3 étages, hauts plafonds, derrière le magnifique portail en fer forgé se découvre un escalier monumental menant à l'entrée du château ainsi qu'une partie de la façade avec ses tours carrées.","habitants":"Famille de Jacques de Verzeille\r\n        \"","divers":"Château d'Argens et celui d'Argens Minervois de Corbières","gps":"","images":["../image/image_11/11_Argens_Minervois_1.jpg","../image/image_11/11_Argens_Minervois_2.jpg","../image/image_11/11_Argens_Minervois_3.jpg","../image/image_11/11_Argens_Minervois_4.jpg","../image/image_11/11_Argens_Minervois_5.jpg"]},"Consult_chateau_formulaire93c2":{"id":"Consult_chateau_formulaire93c2","dept":"11","canton":"Coursan","commune":"Armissan","nom":"Armissan","type":"Château","periode":"XVII","histoire":"deux châteaux à Armissan celui d'Armissan et de Cazeneuve ruinés.                                                                                 ARMISSAN,  René de Chef de Bien, originaire du Poitou, avait pris pied en Languedoc où il avait acquis la seigneurie de Puisserguier pour devenir seigneur d'Armissan et de Saint-Pierre Del Lec.  Durant tout le XVIIe siècle cette famille possédera, en co-seigneurerie avec Narbonne, les territoires d'Armissan et de Saint-Pierre Del Lec.\r\nSans héritier, en 1736 le château était dans un tel état de délabrement que le comte d'Albaret ordonna sa démolition. Tous les matériaux provenant de la démolition furent réemployés pour la construction du nouveau château à l'emplacement de l'ancien. Armissan était la propriété de Marcel Dassault qui l'avait défiguré  par des résidences de vacances pour son personnel revendu en 1992 ensuite à monsieur et madame  Alain Duplessis de Pouzilhac   le restaure complètement.","architecture":"Le château d'Armissan, construit à partir des pierres du fort médiéval en 1736 ruiné du château de Marmonières.                                                                                           Vestiges du château de Cazeneuve,   il n'est évidemment pas facile, avec un petit pan de mur, de déterminer s'il s'agit d'un vestige de château ou d'une ruine d'église fortifiée, mais le plaisir de l'observation et de la découverte est plus fort que la résolution d'une énigme.","habitants":"René de Chef de Bien\r\n        \"","divers":"Château d'Armissan et vestiges du château de Cazeneuve","gps":"","images":["../image/image_11/11_Armissan_1.jpg","../image/image_11/11_Armissan_2.jpg","../image/image_11/11_Armissan_3.jpg","../image/image_11/11_Armissan_4.jpg"]},"Consult_chateau_formulaire62d2":{"id":"Consult_chateau_formulaire62d2","dept":"11","canton":"Quillan","commune":"Arques","nom":"Arques","type":"Forteresse","periode":"XIII","histoire":"ARQUES, propriété des seigneurs de Termes, en 1217, Béranger d'Arques figure parmi les proches de Guillaume de Peyrepertuse. Après la prise en 1231 du château de Termes durant la croisade contre les Albigeois, Simon IV de Montfort s'attaque à Arques, après avoir brûlé le village, situé sur les bords du Rialsès, il donne cette partie du Razès à un de ses lieutenants, Pierre de Voisins. En 1284, Gilles de Voisins sires d'Arques,commence les travaux de construction du château. Il s'agissait de défendre la vallée du Rialsès et de contrôler les voix de la transhumance qui menaient aux Corbières. En 1316, Gilles II de Voisins dit « Gilet » remanie et achève la construction du château. En 1518, Françoise de Voisins, dernière héritière, épouse Jean de Joyeuse auquel revient la baronnie d'Arques. Le château fut alors délaissé au profit des Couiza, puis échoue aux Guise et  en 1575, le château est assiégé par les protestants et seul le donjon résiste à l'assaut. Passa  à la famille de Rébé.\r\nÀ partir de la Révolution, le château tombe en ruine. Il est vendu comme bien national puis subit quelques dommages. Après son classement en 1887, il est alors rénové et reconstruit en partie, puis ouvert aux visiteurs.","architecture":"Arques  est une ancienne maison forte, de la fin du XIIIe siècle,  bien que sur le plan architectural elle présente tous les attributs du château :  Constitué d'une enceinte et d'un « haut donjon » carré cantonné de quatre tourelles. Le donjon carré, haut de 25 mètres, est un chef-d'uvre d'architecture militaire inspirée d'Ile de France. Il comporte 4 niveaux desservis par un escalier à vis. Les différentes salles ont été construites avec un soin extrême. Le dernier étage était consacré à la défense du château. Une quarantaine de soldats pouvaient y défendre en même temps ce donjon grâce aux nombreuses archères et baies rectangulaires qui ajourent symétriquement les murs. L'enceinte presque carrée 51 × 55 mètres cerne le château avec une porte dotée d'un mâchicoulis ornée au sommet d'une clef de voûte aux armes de la famille de Voisins (\"De gueules à trois fusées d'or en fasce, accompagnées en chef d'un lambel à quatre pendant de même\"). De nombreux bâtiments devaient exister le long de l'enceinte. Subsistent deux tours-logis bien conservées. C'est un bon exemple des progrès des constructions militaires, désormais complexes et savantes, dans une zone stratégiquement sensible.","habitants":"Famille de Béranger d'Arques\r\n        \"","divers":"Forteresse d'Arques.","gps":"","images":["../image/image_11/11_Arques_1.jpg","../image/image_11/11_Arques_2.jpg","../image/image_11/11_Arques_3.jpg","../image/image_11/11_Arques_4.jpg","../image/image_11/11_Arques_5.jpg","../image/image_11/11_Arques_6.jpg","../image/image_11/11_Arques_7.jpg"]},"Consult_chateau_formulairec56e":{"id":"Consult_chateau_formulairec56e","dept":"11","canton":"Montréal","commune":"Arzens","nom":"Arzens","type":"Château","periode":"XV-XVI","histoire":"ARZENS, château seigneurial mentionné dans un acte de 949, la seigneurie d'Arzens appartient, au XIe siècle, aux comtes de Carcassonne, puis aux comtes de Foix qui s'en emparent en 1072. En 1310, ils cèdent la demeure à titre d'échange au vicomte d'Armagnac et à son frère. Jean d'Armagnac, curé ensuite cardinal, fut appelé à Rome et procura à l'église d'Arzens la relique de deux épines de la \"vraie couronne\". En 1591, après les combats contre les Ligueurs, le château est pris, saccagé et brûlé par les troupes du duc de Joyeuse. Ce dernier rend hommage pour Arzens à l'évêque de Carcassonne,   durant les Guerres de Religion, le bourg et le château sont attaqués par des troupes espagnoles. Au début du XVIIe siècle, le château n'est plus une résidence seigneuriale. En 1948, le site est inscrit aux Monuments Historiques.","architecture":"L'actuel bâtiment d'Arzens possède deux étages sur rez-de-chaussée. La façade de gauche comporte : De belles pierres taillés de grandes dimensions. Des fenêtres à meneaux en croix rebouchées. La troisième façade avec des fenêtres à meneaux en pierre ont été remplacé par le bois du XXe siècle. les pierres sous le toit, sont un ajout récent. Le bâtiment a été arasé.  Son architecture m'informe que la façade fut l'extérieur du bâtiment médiéval. La quatrième façade  montre un mur ayant souffert du temps. Curieusement, une magnifique fenêtre géminée avec colonnette est bouchée en gardant son relief \"historique\" corps du logis dans les remparts.  Pendant la Révolution, le château et ses dépendances furent confisqués. Aujourd'hui, il ne reste que les ruines de l'ancienne porte dite Pourtanel, la tour du château, les vestiges des anciens remparts et fossés qui entouraient le village au Nord.\r\nEléments protégés MH : les quatre façades et la fenêtre géminée dans le mur occidental.","habitants":"Vicomte d'Armagnac\r\n        \"","divers":"Château d'Arzens","gps":"","images":["../image/image_11/11_Arzens_1.jpg","../image/image_11/11_Arzens_2.jpg"]},"Consult_chateau_formulairef1f5":{"id":"Consult_chateau_formulairef1f5","dept":"11","canton":"Fabrezan","commune":"Auriac","nom":"Auriac_Aude","type":"Vestiges","periode":"XII-XV","histoire":"AURIAC  en 1028, le castellum d'Auriac est donné aux frères d'Auriac au profit du vicomte d'Aton III. Raimondus Ameli et Bertrandus font hommage au comte Raymond de Barcelonne, en 1067. Rangarde comtesse de Carcassonne vend  ses droits sur le domaine d'Auriac à Raimondus comte de Barcelonne en 1071. Bernard Aton, en 1121 vicomte de Carcassonne, rend hommage à l'évêque pour les terres d'Auriac jusqu'au Termenes, et en 1124, Pierre Raimond d'Auriac, cautionne Raimond de Durfort, pour la paix conclue avec Bernard Aton, vicomte de Carcassonne. En 1125, Petrus Raimondis d'Aurig après avoir été un seigneur rebelle, fait sa soumission au vicomte Bernard Aton.  En 1173 aux sires de Termes. Vers 1211, après la croisade des Albigeois, le château semble être en possession d'un seigneur du nord. En 1227, l'archevêque de Narbonne écrit une lettre de protestation sur les possessions abusives des seigneurs des croisades. Il revendique les terres d'Auriac. Au XVIIIe siècle, le château est abandonné. En 1849, l'édifice est à monsieur Laffont de Donos, qui le vend en 1859 à monsieur Casimir Ducros de Castres par adjudication judiciaire.","architecture":"vestiges du château d'Auriac qui est un château cathare qui fut construit au début du XIIe siècle,reste d'un donjon, entouré d'une haute enceinte polygonale, avec un corps de logis seigneurial flanqué d'une tourelle d'escalier circulaire, bien qu'il soit en ruine, il est possible de venir visiter les vestiges du château qui surplombe la vallée, est inscrit aux M.H. depuis 1948. Au début du XVe siècle, il semble que le château soit remanié. Au XVIe siècle, les bâtiments intérieurs sont modifiés, grandes fenêtres, et escaliers en tourelles sont réalisés. Les archères sont modifies pour les armes à feu.","habitants":"Comte Raymond de Barcelonne\r\n        \"","divers":"Vestiges du château d'Auriac","gps":"","images":["../image/image_11/11_Auriac_Aude_1.jpg","../image/image_11/11_Auriac_Aude_2.jpg","../image/image_11/11_Auriac_Aude_3.jpg","../image/image_11/11_Auriac_Aude_4.jpg","../image/image_11/11_Auriac_Aude_5.jpg"]},"Consult_chateau_formulaireef89":{"id":"Consult_chateau_formulaireef89","dept":"11","canton":"Quillan","commune":"Axat","nom":"Axat","type":"Vestiges","periode":"XIII","histoire":"AXAT, cité en 1306, castrum, de la famille Castelpor. Au début du XIIIe siècle, pris par les troupes de Simon de Monfort, Castelpor devint forteresse royale. En septembre 1342, Bernard de Castelpor, damoiseau, et son frère, prêtèrent leur concours au roi de France pour combattre les Anglais. En 1370, noble Pierre de Castelpor fut établi capitaine à Narbonne par le vicomte Aymeri.  Au XIVe siècle, le castrum appartient à Antoine du Vivier, puis aux Arnaud de Dax possède le site fortifié. Au début du XVe siècle, le site appartient à nouveau à la famille Castelpor. Cette famille est alliée à la famille du Vivier. En 1466, Arnaud de Dax acquit la seigneurie d'Axat  d'Antoinette de Castelpor épouse d'Antoine du Vivier, par acte passé devant maitre Minety notaire à Narbonne. Vers 1583, le château semble subir une remise en état.   En 1539, l'écuyer Sicard de Plaigne devint seigneur de Marsa et Quirbajou baron de Castelpor. Par acte notarié en date du 14 novembre 1558, les consuls et habitants de Marsa et ceux de Quirbajou agissant pour eux-mêmes et pour les habitants de Chalabrette et de Castelpor renouvellent leur serment de fidélité a leur seigneur.   En 1792, les révolutionnaires s'emparent des ruines du château. La famille Dax perd ses droits sur leur possession castrale et territoriale. Au XIXe siècle,  mentionné comme possession de la société des forges d'Axat. Le principal actionnaire est  le marquis de Dax d'Axat, maire de Montpellier.","architecture":"En 1580, il semble que le château d'Axat  soit attaqué par les Aragonais, faisant de nombreuses incursions, qui ont pillé le village\". Le rempart est solidement posé sur le rocher et comporte des contreforts . Le mur est  appareillé et semble avoir été reconstruit plusieurs fois tant les pierres sont disparates.  La hauteur n'est pas assez importante pour distinguer des défenses en encorbellement (comme des mâchicoulis, bretèche etc...), pas de trace d'archère. Il forma ensuite, avec Quirbajou et un village nommé Altozoul, la seigneurie de Castelpor dont le chateau fort  s'élevait sur la rive droite du Rébenty, entre Marsa et Joucou  au sommet d'une crête de rochers surplombant la rivière, près du hameau de Taffine. On ne retrouve que de rares vestiges de ce château fort, qui dut être détruit  par les espagnols à la fin du XVe siècle.","habitants":"Famille Castelpor\r\n        \"","divers":"Vestiges du château d'Axat","gps":"","images":["../image/image_11/11_Axat_1.jpg","../image/image_11/11_Axat_2.jpg","../image/image_11/11_Axat_3.jpg"]},"Consult_chateau_formulaire84d1":{"id":"Consult_chateau_formulaire84d1","dept":"11","canton":"Rieux Minervois","commune":"Azille","nom":"Azille","type":"Château","periode":"XVIII-XIX","histoire":"Plusiers châteaux à Azille, celui de Floris  et de Jouarès,                                                                                                                           AZILLE,  Le rempart du Moyen-Age : Partiellement détruit au XVIIIe siècle, il fut pour la plus grande partie intégré à des maisons construites sur son front. On peut en suivre la ligne sur les boulevards qui ont remplacé les anciens fossés comblés. Quelques portions sont visibles en plusieurs points, notamment près du syndicat d'initiative.                                                                                                                                                      FLORIS viticole de   Philippe et Damien Remaury. Un bel édifice du XIXe siècle, fut fondé en 1536 de Guéry viticulteur, depuis plusieurs générations.                                                                                                             JOUARRES viticole et chambres d'hôtes, Jouarres est l'une des dernières caves du XIXe siècle avec des foudres en bois. Domaine dont les terres sont traversées par le canal du Midi, ainsi que la rivière Aude, le ruisseau de l'Aiguille coupé par une voie romaine secondaire près des Fans.   Ville libre de tout pouvoir seigneurial dès 1483, elle appartient à la couronne, d'où les armes de son blason qui sont celles du roi, et elle est administrée par ses propres consuls élus .","architecture":"Azille, le rempart du Moyen-Age : Partiellement détruit au XVIIIe siècle, il fut pour la plus grande partie intégré à des maisons construites sur son front. On peut en suivre la ligne sur les boulevards qui ont remplacé les anciens fossés comblés. Quelques portions sont visibles en plusieurs points, notamment près du syndicat d'initiative. Établie sur un éperon rocheux, la ville s'entoure de murailles fortifiées dotées de plusieurs portes et de tours rondes et carrées. La cité trop à l'étroit dans son enceinte crée alors plusieurs faubourgs dont celui de l'Est au-delà de la porte de Narbonne, le plus ancien faubourg s'enferme lui aussi dans une muraille.  Des vestiges des murailles et des monuments sont encore visibles de nos jours et font l'objet de visites guidées proposées par le syndicat d'initiative.\r\nJouarès, la résidence est composée de 3 bâtiments judicieusement répartis dans un parc privé arboré de 5 hectares. Les témoins de la grande époque viticole (1870 - 1910) : la cave de vieillissement de Jouarres, le château et son portail néogothique près du pont du canal.                                                                                             Floris, le château de style néo-renaissance du XIXe siècle composé d'un corps de logis à deux niveaux, trois tours rectangulaires à trois niveaux  toits à l'impérial.","habitants":"Famille de Guéry \r\n        \"","divers":"Vue  sur Azille, château de Floris et le château de Jouarès.","gps":"","images":["../image/image_11/11_Azille_1.jpg","../image/image_11/11_Azille_2.jpg","../image/image_11/11_Azille_3.jpg","../image/image_11/11_Azille_4.jpg","../image/image_11/11_Azille_5.jpg","../image/image_11/11_Azille_6.jpg","../image/image_11/11_Azille_7.jpg"]},"Consult_chateau_formulaire980e":{"id":"Consult_chateau_formulaire980e","dept":"11","canton":"Rieux Minervois","commune":"Bagnoles","nom":"Bagnoles","type":"Forteresse","periode":"XII","histoire":"BAGNOLES, Il a été construit au IX siècle, de ce château il ne reste que le donjon. Le mur sud-est de cette tour est le seul qui ne soit pas masqué par d'autres constructions. Des remparts ont été construits sur deux lignes, il n'en reste plus rien sauf le pont-levis dont on voit la porte en ogive. Au  XIe siècle, le village appartient à l'abbaye de Lagrasse.  Simon de Montfort s'attaqua aux quatre châteaux déjà investis dans le Cabardès dont celui de Bagnoles. L'inquisition fit des ravages même à Bagnoles, sur la place du village on voit une croix, reste du bûcher. Au XVIe siècle tout rentre dans le calme, on commence même à construire en dehors des remparts du château, quelques maisons protégées par une troisième ligne de rempart.  En 1632 des notes du curé de Bagnoles, Francis Gasc, signalent la présence de Polacres sur le village. Le nom de Polacres était donné dans les environs de Conques, à des soldats réguliers faisant partie de l'armée de Montmorency.","architecture":"Bagnoles, construction d'un ensemble fortifié au XIIe siècle.\r\n Le village appartient au monastère de Caunes au XIVe siècle.\r\n Au XVe siècle, des fenêtres sont ouvertes pour donner plus de lumière et de vie à cette tour médiévale. Les révolutionnaires suppriment au monastère les droits sur la commune vers 1792.\r\nAu début du XXIe siècle, la découverte de l'extérieur de la tour  l'imposante tour apparaît, avec ses dimensions ce devait être le donjon du château, de plus un donjon habitable.\r\nLe plus surprenant est l'absence de construction en encorbellement comme des latrines ou bretèche. La tour ayant été partiellement arasée, il semble que la tour n'ait pas eu d'amélioration défensive (bouche à feu, canonnière, etc..), elle a évolué pour devenir plus confortable.","habitants":"l'abbaye de Lagrasse\r\n        \"","divers":"Porte et tour du donjon de Bagnolles","gps":"","images":["../image/image_11/11_Bagnoles_1.jpg","../image/image_11/11_Bagnoles_2.jpg","../image/image_11/11_Bagnoles_3.jpg","../image/image_11/11_Bagnoles_4.jpg","../image/image_11/11_Bagnoles_5.jpg","../image/image_11/11_Bagnoles_6.jpg"]},"Consult_chateau_formulaire08af":{"id":"Consult_chateau_formulaire08af","dept":"11","canton":"Bram","commune":"Baraigne","nom":"Baraigne","type":"Château","periode":"XIII","histoire":"BARAIGNE, vers 1225, Estieu de Roqueville. A la même date, Bernard de Mayreville chevalier diacre s'installa au Mas-Saintes-Puelles. Il y déploya une inlassable activité prédicante sur les villages de Laurac, Fanjeaux et Gaja la Selve vers le sud et de Baraigne à Saint-Michel-de-Lanès vers l'ouest. En 1271, le chevalier Gautier de Varagne était présent lors du serment au roi par les consuls de Carcassonne. En 1272 et 1282, Gaufrid de Varagne, frère du précédent, fut élu membre de l'assemblée de la noblesse de la sénéchaussée et en 1287 il fut élu gouverneur de Carcassonne. On trouve, un Bernard de Varagne qui était l'envoyé du sénéchal de Toulouse en 1433. \r\nEn 1485, c'est à partir de cette période qu'apparaît le nom Buisson, en effet, Jean de Buisson fils de Bernard de Varagne cité ci-avant, devint seigneur  le nom évolue, il s'écrivait indifféremment Baragne ou Varagne et capitoul de Toulouse.  La première construction du château de Baraigne voit aussi le jour sur des terres appartenant   aux seigneurs des lieux à la famille Buisson. la construction est attribuée à Barthélémy de Buisson (1568-1622) chacun des villages de ces régions de Lauraguais est dominé par un château de style Renaissance qui donne l'impression non de vieilles forteresses, mais de riches et opulentes habitations seigneuriales.  Il passa au XVIIe siècle entre les mains de la famille de Roquette.\r\nLe château appartient aujourd'hui à la famille Le Garsmeur qui a acheté la propriété en 1974 à monsieur du Lac. Lui-même le tenait par héritage de Mlle de Lavalette, sa tante par alliance.","architecture":"Baraigne construit sur une petite éminence dominant le village, à 300 mètres à lOuest du bourg. Le monument délimite un vaste quadrilatère, presque régulier composé de trois corps de bâtiments  flanqué de deux tours rondes dangle au sud et d'une carré à l'angle nord-ouest nanti dune cour intérieure. Lensemble était ceinturé par des douves. A lEst, la porte dentrée a conservé deux longues rainures qui constituent les restes dun pont-levis. Cet accès est défendu par une puissante bretèche supportée par quatre consoles. Louvrage est percé dembrasures qui devaient être utilisées pour le tir de mousquets. Les deux tours dangle, côté Sud, sont de forme circulaire et protégées par plusieurs canonnières réparties sur deux étages, de forme rectangulaire à lextérieur et circulaires à lintérieur. Une tour descalier octogonale a été aménagée à langle Nord Est de la cour intérieure. La façade sud présente les restes d'un mâchicoulis. La façade ouest comprend une fenêtre à meneaux croisés et une petite archère, une tour d'escalier octogonale a été ménagée à l'angle nord-est de la cour intérieure. Par une porte remarquable, on accède aux cuisines et surtout à la salle des gardes, ce château, du début du XVIe siècle, devait avoir des soubassements plus anciens.","habitants":"Famille de Barthélémy de Buisson\r\n        \"","divers":"Château de Baraigne","gps":"","images":["../image/image_11/11_Baraigne_1.jpg","../image/image_11/11_Baraigne_2.jpg","../image/image_11/11_Baraigne_3.jpg","../image/image_11/11_Baraigne_4.html","../image/image_11/11_Baraigne_5.jpg","../image/image_11/11_Baraigne_6.jpg","../image/image_11/11_Baraigne_7.jpg","../image/image_11/11_Baraigne_8.jpg"]},"Consult_chateau_formulaire2fb1":{"id":"Consult_chateau_formulaire2fb1","dept":"11","canton":"Quillan","commune":"Belcaire","nom":"Belcaire_Aude","type":"Château","periode":"XVI","histoire":"A Belcaire l'ancienne forteresse de Belfort et le manoir de Belcaire chambres d'hôtes BELCAIRE, au  XIe siècle la famille d'Aniort régnait sur tout le pays de Sault.   Un membre de la famille de Nègre se vit attaqué dans le château de Belcaire au pays de Sault dont il avait le commandement, par Jean Claude de Lévis, qui s'était jeté dans le parti des Réformés. Leurs terres furent ravagées, pillées et leur château brûlé entre 1572 et 1573. Afin de mettre un terme à la haine qui, par suite des événements, divisait les deux familles de Lévis et de Nègre depuis une longue période, un mariage fut conclu en 1598 entre Antoine 1er de Nègre seigneur de Bleau et Jeanne de Lévis. Leur fils unique, Pierre de Nègre qui sera bailli de Sault se maria avec Marguerite de Verniolles ; de ce mariage naquit Jean de Nègre. Pierre de Nègre fit une seconde noce avec Angéline Gayraud fille de Pierre Gayraud seigneur de Clat, de cette nouvelle union naquit Pierre de Nègre ; cela donna deux branches. La première  fut celle des de Nègre d'Able avec Jean de Nègre ; et la seconde fut celle des de Nègre du Clat avec Pierre de Nègre, fils d'Angéline.    Avec tous ces enfants la famille Thimoléon de Nègre était à son apogée, Son nom était respecté et il fit de belles alliances ce qui lui permettra d'agrandir son riche domaine. Le second château de Belcaire, plus récent, de la famille de Nègre qui date de 1695, En 1667, il acheta au baron de Coustaussa la seigneurie de Rodome et la coseigneurie de Niort. A sa mort en 1703, Thimoléon de Nègre possédait cinq fiefs nobles. Ses fils hériteront de la charge de bailli, qu'ils se transmettront jusqu'en 1770, date à laquelle la famille s'en sépare définitivement.  Le manoir changea plusieurs fois de propriétaires après la Révolution, un notaire en fut propriétaire dans les années 1900 . C'est monsieur Camurac qui installa la fromagerie au château,","architecture":"ll ne reste que des vestiges de la forteresse   après la destruction et l'abandon définitif de la forteresse royale située comme vous l'avez vu sur le promontoire rocheux dominant le village,  datant du Moyen-Age et qui n'existe plus, seul quelques vestiges de murailles subsistes aujourd'hui.                                                              Le manoir, du XVIe siècle corps de logis de plan carré toit en croupe à quatre étages avait sur l'angle Sud -Ouest , deux tours d'angle rondes identiques, une tour a perdu sa toiture en pointe.","habitants":"Famille de Nègre\r\n        \"","divers":"Vestiges de la forteresse de Belfort et manoir de Belcaire","gps":"","images":["../image/image_11/11_Belcaire_Aude_1.jpg","../image/image_11/11_Belcaire_Aude_2.jpg","../image/image_11/11_Belcaire_Aude_3.jpg","../image/image_11/11_Belcaire_Aude_4.jpg","../image/image_11/11_Belcaire_Aude_5.jpg","../image/image_11/11_Belcaire_Aude_6.jpg"]},"Consult_chateau_formulaire0aca":{"id":"Consult_chateau_formulaire0aca","dept":"11","canton":"Limoux","commune":"Belcastel et Buc","nom":"Belcastel","type":"Vestiges","periode":"X-XII","histoire":"BELCASTEL,  cité   en 1082,  en 1209, débute la terrible croisade des Albigeois commandée par Simon de Montfort. Curieusement, le château de Belcastel n'est pas cité. En 1221, le château est nommé : Castellum Pulchrum. Au début du XXIe siècle, la découverte de l'extérieur de la ruine est libre et gratuite. La visite de l'intérieur est possible. Le château de Belcastel-et-Buc est un château en ruine aussi appelé château de Villardebelle.","architecture":"Belcastel, à  510 m d'altitude, les ruines dominent la petite vallée au fond de laquelle serpente le Buc, on voit encore le donjon quadrangulaire et l'enceinte que des arbres rendent proche de l'effondrement. Le château est mentionné pour la première fois en 1082, cité  en 1221. Bien que situé au coeur des événements albigeois, proche des châteaux de Termes et d'Arques et des abbayes de Saint Hilaire et de Saint Polycarpe, Belcastel ne fait l'objet d'aucune mention dans les ouvrages modernes ou d'époque. \r\nLe donjon, dans la salle principale ou plutôt le bâtiment le plus imposant, devant l'équilibre des pierres, on a l'impression que la ruine ne veux pas mourir et s'accroche au ciel. Les fenêtres sont clairement identifiables avec leurs piédroits parfaitement taillés. Aux étages supérieurs, les ruines de fenêtres laissent deviner les coussièges. Le nombre de fenêtres ferait plus penser à un château renaissance qu'à un donjon fortifié médiéval.","habitants":"Seigneurs locaux\r\n        \"","divers":"Vestiges de Belcastel","gps":"","images":["../image/image_11/11_Belcastel_1.jpg","../image/image_11/11_Belcastel_2.jpg","../image/image_11/11_Belcastel_3.jpg","../image/image_11/11_Belcastel_4.jpg"]},"Consult_chateau_formulaire2421":{"id":"Consult_chateau_formulaire2421","dept":"11","canton":"Bram","commune":"Belflou","nom":"Belflou","type":"Château","periode":"XI-XIV","histoire":"Deux châteaux à Belflou; celui de Belflou et celui de La Barthe .                                     BELFLOU trouve ses origines historiques au début du XIIIe siècle. Au fil du temps, il a bénéficié  de nombreuses modifications et plusieurs fois ses propriétaires, Aimeric de Roquefort jusqu'en 1206, puis Philippe de Fontaines et ses héritiers jusqu'en 1789, les huguenots en 1581 et 1582 et les révolutionnaires. Par ailleurs, hasard ou signe du destin, la famille de Fontaines, qui avait reçu le château en cadeau de la part de Philippe le Bel a quitté la France a la Révolution pour se réfugier en Suisse. Et aujourd'hui, c'est un Suisse qui lui redonne vie  Pierre Helg,","architecture":"Le château de Belflou du XIIIe - XIVe, fut à l'origine une forcia, soit une forteresse féodale secondaire, consistant  en un donjon devenu la tour carrée sud, des constructions en bois et le fossé en eau. Fin XIIIe début XIVe, la place forte fut transformée en château fortifié, dont l'aspect ne changera plus beaucoup jusqu'à nos jours. Les éléments aujourd'hui disparus sont un pont-levis à l'ouest, remplacé par un petit pont de pierre, des communs dans la cour, un chemin de ronde en bois surplombant le mur d'enceinte et, peut-être, une seconde tour d'enceinte au nord-est. Début XVIe, la tour d'escalier nord fut surélevée et ornée de bustes et de gargouilles, tandis que son avant-corps fut remanié. Au XVIIe et au XVIIIe, plusieurs ouvertures, notamment les fenêtres au sud, furent agrandies. Au XIXe, la façade nord et les parties hautes de l'aile est furent réaménagées, cependant qu'un petit pont fut ajouté à l'est pour accéder à la terre attenante.\r\nDans l'ensemble, l'édifice et ses fortifications sont un exemple bien conservé de l'architecture défensive du bas Moyen-Age en Lauragais. Le château et son fossé en eau sont protégés au titre des monuments historiques depuis 1948. Le site a été classé en 1989.                                                                                                    La Barthe est un ensemble de bâtiments encerclés dans un parc avec corps de logis rectangulaire et un donjon rectangulaire également.","habitants":"Famille de Pierre de Lassus\r\n        \"","divers":"Château de Belflou dit la Barthe","gps":"","images":["../image/image_11/11_Belflou_1.jpg","../image/image_11/11_Belflou_2.jpg","../image/image_11/11_Belflou_3.jpg","../image/image_11/11_Belflou_4.jpg","../image/image_11/11_Belflou_5.jpg","../image/image_11/11_Belflou_6.jpg","../image/image_11/11_Belflou_7.jpg","../image/image_11/11_Belflou_8.jpg","../image/image_11/11_Belflou_9.jpg"]},"Consult_chateau_formulaireede4":{"id":"Consult_chateau_formulaireede4","dept":"11","canton":"Lézignan Corbières","commune":"Lézignan Corbières","nom":"Belle_Isle","type":"Château","periode":"XVII","histoire":"BELLE-ISLE, le domaine Belle-Isle possède une longue et belle histoire. Tout commence au XVIIe siècle lorsque Charles-Louis Foucquet, maréchal de France, devient surintendant des finances du roi Louis XIV. En 1638, il achète l'île de Belle-Île-en-Mer en Bretagne, s'appropriant ainsi le titre de marquis de Belle-Isle et la condition de noble. Jaloux et contrarié de la trop grande aisance de son surintendant, le roi le fait tomber en disgrâce et condamner à la prison perpétuelle. Ses héritiers continueront cependant de porter le titre de duc de Belle-Isle. L'épouse de Foucquet, Marie-Madeleine de Castille, réclame réparation à Louis XIV pour dédommagement des biens perdus. Ce n'est que sous le règne de Louis XV en 1718 que la famille De Belle-Isle recevra en dédommagement des terres en Languedoc autour de Lézignan . Le domaine prend le nom de la famille De Belle-Isle. Le domaine est aujourd'hui exploité par la SCEA Belle-Isle comptant six associés et dont Michel Peresse est le gérant. Ce dernier est arrivé en Languedoc en 1965 pour le compte de la maison Nicolas qui l'employait. Il n'en repartira plus. Michel Peresse a été président du CIVL de Narbonne pendant trois ans.  le château de Belle-Isle a reçu la médaille d'or au concours des grands vins de France 2011 à Mâcon pour sa cuvée Belle-Isle vieilles vignes 2010 et la médaille d'argent pour la cuvée la Régale 2010.","architecture":"Belle-Isle de plan en équerre par un pavillon rectangulaire de quatre  étages intercalés, au niveau du deuxième par une rangée d'oeils de bufs et de deux tourelles en façade et une en encorbellement  sur un angle toiture de ses tours en poivrières, le corps de logis  de plan rectangulaire  avec fronton redondant sur la partie centrale au niveau de la toiture qui elle est en croupe le logis de trois niveaux prolongé au troisième étages par la continuité d'oeils de boeufs et accolé sur la partie gauche d'une tour carrée dépassant l'ensemble  toit à quatre pans avec échauguettes.","habitants":"Charles-Louis Foucquet\r\n        \"","divers":"Château de Belle-Isle à Lézignan Corbières","gps":"","images":["../image/image_11/11_Belle_Isle_1.jpg","../image/image_11/11_Belle_Isle_2.jpg","../image/image_11/11_Belle_Isle_3.jpg","../image/image_11/11_Belle_Isle_4.jpg"]},"Consult_chateau_formulaire8d9b":{"id":"Consult_chateau_formulaire8d9b","dept":"11","canton":"Narbonne","commune":"Bizanet-Gaussan","nom":"Bizanet","type":"Forteresse","periode":"XVI","histoire":"BIZANET-GAUSSAN deux châteaux celui de Bizanet et de St-Martin de Toques (voir article) et le château de Beauregard à Mirouze pas d'informations historiques.                                              Au Moyen-Age, les archevêques de Narbonne établirent leurs emprises sur ces terres convoitées, en y faisant édifier vers 964 une chapelle rurale sous le vocable de Sancti Stephani de Agauciano. Puis vers la fin du XIIe siècle, l'église devient la possession du monastère de Sainte-Eugénie, près de Peyriac-de-Mer, qui, criblé de dettes, se donna à Fontfroide en 1189. Le domaine de Gaussan devenu paroisse puis grange cistercienne prospéra, comme son voisin Hauterives (Ornaisons) sous la protection de l'abbaye. Avec ses prairies, ses troupeaux, ses champs de céréales, il resta propriété de Fontfroide jusqu'à la Révolution puis fut vendu comme bien national en 1791. Charles Lambert de Sainte-Croix (1827-1889), fils d'un notaire parisien, orléaniste élu sénateur de l'Aude en 1876, hérita de Gaussan, en pleine période de croissance du vignoble audois. Profitant de ce contexte économique favorable, il transforma la propriété en une exploitation viticole puis la vieille grange en un château néo-médiéval.","architecture":"L'actuel château de Bizanet correspond à un ensemble important de bâtiments, pour la plupart à vocation viticole et construits au XIXe siècle. Le terme \"château\" s'attache  à quatre corps de bâtiments qui ferment une cour intérieure rectangulaire, très largement remaniés, mais dont le gros-oeuvre date majoritairement du XIVe siècle. Les façades Est et Sud sont couronnées par un système de défense, à créneaux sur mâchicoulis, semblant reprendre un dispositif existant au préalable, les corbeaux formés de trois quart-de-rond en encorbellement étant d'origine. La porte d'entrée est constituée d'un arc de tête en plein cintre au revers duquel a été ménagée une gaine permettant le mouvement de la herse, et un deuxième arc plein cintre plus bas que le premier. Cette façade est cantonnée par deux échauguettes d'angle en encorbellement. Les façades sur cour, du XIVe siècle, ont été remaniées,  en ce qui concerne l'ordonnance des ouvertures. Le corps de bâtiment central se compose, en rez-de-chaussée, d'une vaste salle couverte en berceau brisé, de la fin du XIIIe - XIVe siècle. L'étage est occupé par une chapelle désaffectée, aménagée au XIXe siècle. Le corps d'habitation est placé dans le bâtiment sud. Au premier étage se trouve la chambre dite de \"l'évêque\", couverte d'une fausse voûte d'ogives à liernes et tiercerons. Au rez-de-chaussée, l'ensemble des pièces est plafonné à la française, à l'exception de la salle à manger et de la cage d'escalier voûtées. La tour nord-ouest, ou donjon, sur plan rectangulaire, est munie d'archères et couronnée par un rang de mâchicoulis sur corbeaux en encorbellement. Ces derniers sont d'origine tandis que les arcatures sont le résultat d'aménagements du XIXe siècle. Les mâchicoulis portaient autrefois des créneaux qui ont été démolis par mesure de sécurité.","habitants":"Charles Lambert de Sainte-Croix\r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Bizanet à Gaussan et de Beauregard à Mirouze","gps":"","images":["../image/image_11/11_Bizanet_1.jpg","../image/image_11/11_Bizanet_2.jpg","../image/image_11/11_Bizanet_3.jpg","../image/image_11/11_Bizanet_4.jpg","../image/image_11/11_Bizanet_5.jpg","../image/image_11/11_Bizanet_6.jpg","../image/image_11/11_Bizanet_7.jpg","../image/image_11/11_Bizanet_8.jpg"]},"Consult_chateau_formulairee589":{"id":"Consult_chateau_formulairee589","dept":"11","canton":"Quillan","commune":"Rennes les Bains","nom":"Blanchefort","type":"Vestiges","periode":"X-XIV","histoire":"BLANCHEFORT, cité en 1119, été la possession de Bernard de Blanchefort, il eut recours à une lutte armée contre l'abbé d'Alet et contre le comte Bernard Aton pour conserver son domaine, il y  réussit, et c'est à cette condition qu'il déposa les armes en 1124. Quelques années plus tard, le maître de Blanchefort offrit le village aux templiers. Vers 1231, le compagnon d'arme de Simon de Montfort, Pierre de Voisins, saisit le château et le territoire comme biens de la croisade. Il devient le nouveau seigneur de Blanchefort,  puis il fait payer de fortes taxes aux habitants de la région. Sous leur impulsion, il fut reconstruit et renforcé. Le seigneur de Blanchefort leur confia l'exploitation des mines. Les templiers firent venir de Rhénanie des ouvriers fondeur qu'ils installeront au village de Réna, avec interdiction de fréquenter les gens du village. En fait l'or natif des filons n'intéressa pas les templiers, ils exploitaient un antique trésor wisigoth enfoui dans un ancien puit de mine, les mineurs réduisaient les monnaies et les objets précieux en lingot. Tout cela est bien sur attesté par les chroniques du temps et surtout par les cartulaires du temple. Le puits principal qui donnait dans les mines était creusé au pied des murailles de Blanchefort. On peut encore de nos jours voir ce puits. Cette opération dura sans doute deux ans. Au XIIIe siècle, le comte Roger de Blanchefort subit le même sort que la plupart des châtelains de la contré. Son domaine fut détruit et les biens confisqués au profit de Pierre de Voisins.","architecture":"Blanchefort,  c'est au confluent de la Sals et du Rialses  que les wisigoths ont construit cette forteresse. Au Xe siècle le site fut rebâtit et fortifié et des remparts furent élevés en escaliers, afin de rendre la nouvelle forteresse imprenable. Le château tirait son nom de la couleur de la roche sur lequel il était élevé. Ses dimensions étaient comparables à celles de Carcassonne. Du château de Blanchefort dépendait l'abbaye de Jaffus dont il ne reste rien de nos jours, il fut le centre d'une agglomération d'habitants (une villaria) étalant ses maisons au sud ouest.  Au sud de la cour trône les fondations d'une tour carrée de 7 mètres de coté avec des murs de 1,50m d'épaisseur. Ce n'était sûrement pas un bâtiment d'habitation. Le donjon devait servir de tour de guet et de dernier refuge en cas d'envahissement du château. Sa construction semble datée du XIVe siècle, mais il est difficile d'être affirmatif par le manque d'indice et de pierres.","habitants":"Famille de  Bernard de Blanchefort\r\n        \"","divers":"Vestiges du château de Blanchefort à Rennes les Bains","gps":"","images":["../image/image_11/11_Blanchefort_1.jpg","../image/image_11/11_Blanchefort_2.jpg","../image/image_11/11_Blanchefort_3.jpg"]},"Consult_chateau_formulaire08c7":{"id":"Consult_chateau_formulaire08c7","dept":"11","canton":"Rieux-Minervois","commune":"Blomac","nom":"Blomac","type":"Château","periode":"XVII","histoire":"BLOMAC,  la construction de l'actuel château de Blomac débuta en 1789,  par des viticulteurs Paul Sapin, aujourd'hui chambres d'hôtes par Jacqueline Mangelaars, pas d'autres information historiques.","architecture":"Château de plan rectangulaire de style Louis XIII en façade à trois niveaux avec lucarnes sur toit en ardoise et fronton triangulaire avec deux tours carrées sur angle toit à quatre pans, côté parc  trois lucarnes apparaissent sur le toit et deux orangerais ont été conçut  de chaque côté de l'édifice  relié entre elle par une galerie couverte  soutenu par des piliers ronds.","habitants":"Viticulteur Paul Sapin\r\n        \"","divers":"Château de Blomac","gps":"","images":["../image/image_11/11_Blomac_1.jpg","../image/image_11/11_Blomac_2.jpg","../image/image_11/11_Blomac_3.jpg","../image/image_11/11_Blomac_4.jpg"]},"Consult_chateau_formulaire08ef":{"id":"Consult_chateau_formulaire08ef","dept":"11","canton":"Trébes","commune":"Bouilhonnac","nom":"Bouilhonnac","type":"Vestiges","periode":"X-XV","histoire":"Deux châteaux à Bouilhonnac le château fort et le château dans le village du XVIe siècle aujourd'hui chambres d'hôtes.                                                                                        BOUILHONNAC, c'est à la fin du XVe siècle que le château a été construit, puis ruiné, Eustache de Lévis était alors évêque de Mirepoix et possédait les terres qui s'étendaient jusqu'à Mirausse ou une borne porte le blason. Un autre écu en pierre au dessus de la porte de l'escalier de la tour nord-est dans l'intérieur du château représente les armes de Pierre d'Absac archevêque de Narbonne de 1494  à 1502. Avant la Révolution, les abbés de Lagrasse étaient possesseurs du château et des terres des environs. Ils furent expropriés et leurs biens mis en vente, très probablement vers 1813.","architecture":"Le château fort de Bouilhonnac, construit vers le XVe  siècle, s'élevait seul sur la colline. Peu à peu, les habitants abandonnèrent les bords de l'Orbiel et mirent leurs demeures autour du château. Les ruines de ce château, flanqué de deux fortes tours, forment un monument historique digne dêtre conservé. C'était un excellent poste dobservation. Au sud-ouest on aperçoit un  magnifique ensemble des fortifications de la cité de Carcassonne, au sud-est, la vue s'étend sur l'Alaric et son vieux château de Miramont, au nord se déroule tout le pays du Minervois jusqu'à la montagne noire, et les Causses de l'Hérault. Dans l'angle sud-ouest de la cour du château, se trouvent les ruines de l'ancienne chapelle aux belles fenêtres gothiques. Les armoiries d'un évêque, sculptées sur la poterne de la tour  nord-est, sont remarquables. Ce château n'est que ruines, mais il garde, de sa gloire passée, toute sa majesté d'antan.                                                                                                                 Le château accolé au château fort, chambres d'hôtes corps de logis rectangulaire à deux niveaux toit à deux pans flanqué  aux angles de la façade de deux tours carrées.","habitants":"Des évêques de Mirepoix\r\n        \"","divers":"Château et vestiges du château de Bouilhonnac.","gps":"","images":["../image/image_11/11_Bouilhonnac_1.jpg","../image/image_11/11_Bouilhonnac_2.jpg","../image/image_11/11_Bouilhonnac_3.jpg","../image/image_11/11_Bouilhonnac_4.jpg","../image/image_11/11_Bouilhonnac_5.jpg","../image/image_11/11_Bouilhonnac_6.jpg","../image/image_11/11_Bouilhonnac_7.jpg"]},"Consult_chateau_formulairea2cd":{"id":"Consult_chateau_formulairea2cd","dept":"11","canton":"Fabrezan","commune":"Bouisse","nom":"Bouisse","type":"Château","periode":"XVI","histoire":"BOUISSE,  l'abbaye de Lagrasse au XIe siècle demande à la famille de Termes de sécuriser et diriger certaine de ses possessions dont Bouisse. Car   de nombreux conflits au XIIe siècle, opposent la puissante famille de Termes et Lagrasse sur l'attribution des terres.  en 1210, la croisade contre les Albigeois fait rage, et le château de Termes  se rend. Toutes les possessions, dont Bouisse, appartiennent maintenant à un seigneur du \"Nord\" : Alain de Roucy. Olivier de Termes en 1241 fait sa soumission auprès de Louis XI, puis part aux croisades en terre Sainte. Par cet acte, il obtient les faveurs du roi, plusieurs de ses anciens châteaux, dont Bouisse, sont rendus à Olivier de Termes. Olivier a de gros besoin d'argent, en 1260 Il vend plusieurs châteaux et terres à Pierre de Voisins, Baron d'Arques. Bouisse change de propriétaire. Pendant les guerres de religion, en 1572 le château subira des dégâts importants ainsi que lors des incursions des Espagnols en 1495 et 1503, Bouisse compte parmi les châteaux, bourgs et villages de la vicomté de Narbonne qui furent pris et rançonnés par le duc dAlbe, Frédéric de Tolède qui, sur lordre de Ferdinand, roi dEspagne, envahit les Corbières et arriva à Narbonne.Au XVIIe siècle, la famille de Voisins change de nom et devient les  \"Moussoulens\". A la Révolution, les Moussoulens perdent leur domaine. En 1792, le château est le siège d'une \"gendarmerie\". Il appartiendrait à la famille Raymond. Au XIXe siècle, les terres et le château sont vendus à plusieurs habitants de Bouisse.  Ces nouveaux propriétaires font des travaux pour rendre son \"âme\" à ce vestige \"médiéval\",  déja  largement remanié au XVIIe siècle sous limpulsion des propriétaires Gérard de Saint-Jean de Moussoulens et Catherine de Goût. En 1951, René Nelli achetait le château de Bouisse, aujourdhui propriété de Philippe Ramon.","architecture":"Ce château de Bouisse est implanté au Nord du village sur une petite colline communément appelée le Caïrat, altitude 650 mètres,  du XVIe siècle,  ensemble rectangulaire composé : d'un vaste bâtiment au nord, de deux ailes massives,  d'un mur de clôture au sud fermant l'ensemble, et flanqué à chaque angle, des tours carrées.   en 1660, construction des 2 ailes annexes. Pourtant, sur une des tours carrées, une archère à fente droite est visible. Le couronnement primitif a fait place à une toiture. Le remaniement des murs durant 400 ans a supprimé de nombreux éléments d'architecture médiévale. L'ensemble paraît robuste, droit, rectiligne, peu médiéval. Aucune tour ronde, aucune échauguette, aucune bretèche. Sa silhouette massive domine le village du côté Sud, tandis que sa façade Nord est tournée vers le Milobre.","habitants":"Famille de Termes                                                                                           Famille de Voisins\r\n        \"","divers":"Château de la Bouisse","gps":"","images":["../image/image_11/11_Bouisse_1.jpg","../image/image_11/11_Bouisse_2.jpg","../image/image_11/11_Bouisse_3.jpg","../image/image_11/11_Bouisse_4.jpg","../image/image_11/11_Bouisse_5.jpg","../image/image_11/11_Bouisse_6.jpg","../image/image_11/11_Bouisse_7.jpg","../image/image_11/11_Bouisse_8.jpg","../image/image_11/11_Bouisse_9.jpg"]},"Consult_chateau_formulaire2383":{"id":"Consult_chateau_formulaire2383","dept":"11","canton":"Fabrezan","commune":"Boutenac","nom":"Boutenac","type":"Château","periode":"XVI-XIX","histoire":"BOUTENAC, il était autrefois appelé château bas, car il y avait un autre château dont il ne reste aujourd'hui qu'une partie de la tour au centre du village. Dans les années 90, la propriété est achetée par l'AOC Corbières  qui fera de ce lieu son siège et sa vitrine, rénovant la bâtisse et ajoutant un centre de dégustation et formation ultra-sophistiqué à des salles de réceptions et de conférences.                                                                               VOULTE GASPARETS,  c'est la même famille depuis 6 générations qui assure la continuité et la réputation du domaine, reconnu actuellement comme un des fleurons de la viticulture du Languedoc-Roussillon. Niché au coeur du village de Gasparet, village vigneron typique des Corbières, le château abrite un caveau où Patrick Reverdy vous accueille pour partager la dégustation des grands vins, un échange avec le vigneron vinificateur, grand protecteur du patrimoine viticole.                                                   SAINT-LOUIS,  château ou le cru réputé de l'appellation Corbières, proche du village d'Ornaisons.","architecture":"le Château de Boutenac, du XVIe siècle  au sommet du village, en plan d'équerre à deux niveaux et attiques toiture en tuiles à deux pans . Il y avait un autre château dont il ne reste aujourd'hui qu'une partie de la tour au centre du village. Un vitrail de l'église Saint-Mammès peut donner une idée de la configuration du château bas dans le passé, notamment les murailles dont on ne peut apercevoir que des vestiges de nos jours.                                                                                                                   Château Saint-Louis du XIXe siècle, de plan en U à deux niveaux.","habitants":"\"","divers":"Château de Boutenac de Voulte Gasparets et de Saint-Louis.","gps":"","images":["../image/image_11/11_Boutenac_1.jpg","../image/image_11/11_Boutenac_2.jpg","../image/image_11/11_Boutenac_3.jpg","../image/image_11/11_Boutenac_4.jpg"]},"Consult_chateau_formulaire4877":{"id":"Consult_chateau_formulaire4877","dept":"11","canton":"Bram","commune":"Bram","nom":"Bram","type":"Château","periode":"XVIII","histoire":"Trois châteaux à Bram, celui de Lordat,  de Valgros dit de Frontenac et de la Seignoure.                                                                                                                                             LORDAT cette vaste résidence fût construite au XVIIIe siècle par le comte de Lordat,  Baron des États majors, Inspecteur de gendarmerie, Gouverneur de la ville haute de Carcassonne, seigneur de Bram et  de Compoix en 1761. La maison de Lordat, aussi ancienne qu'illustre, était apparentée avec les comtes souverains de Foix. Au XIIe siècle, elle gouvernait la vallée de Lordat, située dans les Pyrénées, au comté de Foix. Son premier auteur connu est Guillaume de Lordat, vivant en 1137. Cette famille, maintenue dans ses différentes branches, par M. de Besons, compte parmi ses membres un patriarche, un prince du Saint-Empire, des évêques, un légal du pape, des officiers généraux, des ambassadeurs, un grand prieur et plusieurs chevaliers de Malte, de Saint-Louis, etc. M. Louis de Lordat acquit, en 1719, une baronnie des Etats de Languedoc, dont il fit transférer le titre sur la terre de Bram.                                                                                                          VALGROS dit de Frontenac  fut  le plus important incendie de ces vingt dernières années. Construit en 1870, le château appartenait à Mr Fabre puis il a été la propriété de la famille Piquet jusqu'en 1987 où il a été vendu à une société hollandaise qui avait comme projet d'y aménager des appartements de luxe à louer.                                                             SEIGNOURE  château ayant appartenu à Mr Fernand de Fournas de la Brosse né le 8 juillet 1858 décédé en 1930 à l'âge de 72 ans. Il était le fils d'Évremond-Claude-François-Joseph de Fournas de La Brosse (1816-1874) et de Mathilde de Séverac (1829-1916) Fernand de Fournas se maria 3 fois : 1er mariage le 17 octobre 1883 avec Anne de Ménard d'Ahalighen (1860-1888) ils eurent 3 enfants. 2ème mariage le 1er juillet 1890 avec Jeanne de Narp (1865-1909) ils eurent aussi 3 enfants. 3ème mariage  en 1911 avec Hélène Le Prince.\r\nBram  centre éducatif et de convalescence Sainte-Gemme.","architecture":"Lordat, cette vaste résidence fût construite dans le second quart du XVIIIe siècle , la façade de style classique, comporte un avant-corps central dominé par les armes des Lordat. Présentant un ordonnancement régulier, elle est percée de dix fenêtres à chaque niveau. Plus loin, se hisse l'ancien pigeonnier. Attribué au XVIIIe siècle, il appartient avec la ferme dont il dépend du baron. L'ouvrage, typique des pigeonniers du Lauragais, s'appuie sur de puissants piliers qui se rejoignent en grandes arcades en plein cintre. Sur les piles et au-dessus des arcades court une corniche destinée à empêcher la montée des rongeurs. Sur la face Sud, des trous d'envol de volatiles sont percés dans la toiture. Aujourd'hui propriété privée, le château de Lordat accueille un centre d'apprentissage par le Travail.                                                                    Valgros, dit de Frontenac datant de la fin du XVIIIe siècle restauré au XXe siècle,  il a été détruit par un incendie dans la nuit du 25 octobre 2005  puis reconstruit.                                                                              Seignoure, corps de logis de plan rectangulaire à trois niveaux, toitures en terrasses, accolé à un corps de bâtiment inférieur de deux étages avec terrasses également une tour carrée est accolée à l'ensemble à trois niveaux toitures à quatre pans.","habitants":"Comte Guillaume de Lordat                                                                 Famille Piquet                                                                                                 Famille de Mr Fernand de Fournas de la Brosse \r\n        \"","divers":"Château de Lordat à Bram, de Valgros  et de la signoure.","gps":"","images":["../image/image_11/11_Bram_1.jpg","../image/image_11/11_Bram_2.jpg","../image/image_11/11_Bram_3.jpg","../image/image_11/11_Bram_4.jpg","../image/image_11/11_Bram_5.jpg","../image/image_11/11_Bram_6.jpg","../image/image_11/11_Bram_7.jpg","../image/image_11/11_Bram_8.jpg"]},"Consult_chateau_formulaire800a":{"id":"Consult_chateau_formulaire800a","dept":"11","canton":"Quillan","commune":"Bugarach","nom":"Bugarach","type":"Vestiges","periode":"XIII","histoire":"BUGARACH, on trouve les traces du village de Bugarach dès le XIIIe  siècle. Lors de la conquête par les troupes françaises de Simon de Montfort, les différents villages du secteur reviennent à son sénéchal Pierre de Voisins. Plus tard, le village de Bugarach sera érigé en viguerie. Néanmoins, la partie la plus importante de son passé historique se situe dans le rôle considérable qui fut le sien dans le développement économique de la Haute Vallée de l'Aude du XIXe siècle jusqu'au début du XXe siècle. Durant le règne de Louis XV, et pendant la guerre de sept ans de 1756 à 1763  les habitants de Bugarach sont fait prisonniers et sont envoyés en Pologne, dans la province de Haute Silésie qui se situe à l'extrême Est pour fabriquer des chapeaux. A leur libération et de retour à Bugarach, ils vont perpétuer ce savoir-faire en utilisant les ressources de la région, laine des moutons, outils en bois. C'est ainsi que naîtra l'industrie chapelière de la haute vallée de l'Aude qui se déplacera sous le Second Empire à Espéraza pour des raisons pratiques.   chambres d'hôtes.","architecture":"Du château, vestiges dont les parties les plus anciennes remontent au XIIIe siècle, il  reste plus qu'une tour carrée et quelques pans de fortifications. Cette tour ruinée fortement délabrée, est en cours de restauration. Construit à l'extrémité du village, après avoir servi de carrière de pierre, le château fut laissé très longtemps sans soin, envahi par les ronces et hautes herbes. On peut voir à gauche de la porte tour, sur deux pierres d'angle, un ensemble de graffiti d'inspiration nettement chrétienne. On reconnaît des étoiles symbolisant la Nativité et des croix figurant la Passion. L'une des croix, juchée sur un mont, n'est pas sans rappeler la scène du Golgotha. Enfin, des branches entrecroisées suggèrent le dogme de la Trinité.\r\nC'est en octobre 1967 que Mme Marie-Louise signala l'existence de ces curieux graffiti au SESA (Société d'Études Scientifiques de l'Aude). On pense qu'ils ont été gravés au XVe siècle. Un rapprochement avec les archères des châteaux de Lanet et Bouisse, permet démettre lhypothèse dune construction réalisée par les seigneurs de Voisins, ce qui nous amènerait vers le milieu du XIIIe siècle.","habitants":"sénéchal Pierre de Voisins\r\n        \"","divers":"Vestiges du château de Bugarach","gps":"","images":["../image/image_11/11_Bugarach_1.jpg","../image/image_11/11_Bugarach_2.jpg","../image/image_11/11_Bugarach_3.jpg","../image/image_11/11_Bugarach_4.jpg"]},"Consult_chateau_formulairef80b":{"id":"Consult_chateau_formulairef80b","dept":"11","canton":"Sallèles d","commune":"Bize-Minervois","nom":"Cabezac","type":"Château","periode":"XIX","histoire":"BIZE-MINERVOIS, plusieurs châteaux à Bize-Minervois, à la fin du XIXe siècle, le village est bouleversé. Les grandes propriétés viticoles implantent caves et bâtiments immenses, les châteaux et maisons de maître fleurissent (4 châteaux encore visibles à Bize). Le village déborde sa ceinture de remparts et double dans le faubourg jusqu'à la gare. La vigne, les grandes foires connues de toute la région, les mines de lignite promettent un grand avenir à la commune. Le XXe siècle est au contraire marqué par la crise de l'économie viticole de masse languedocienne                                 CABEZAC, Georges Emile Eugène Le Camus a construit le château de Cabezac à Bize-Minervois sur la base des plans d'une villa Florentine (antisismique) qui lui a coûté 3 millions de francs or, dans lequel a été tourné les film \"les beaux jours\" avec Jean Pierre Aumont et Simone Simon. aujourd'hui est un domaine viticole de 75 ha classés en AOC Minervois. Gontran Dondain, passionné de vin, acquiert cette propriété en 1997 pour son fort potentiel, aujourd'hui hôtel.  Château du docteur Marty.                                                                                                                                                                                                                                                                                                                 Le CAMUS  About Georges Emile Eugène Le Camus, artiste peintre, architecte de l'Ecole Nationale des Beaux Arts, membre de la Commission Archéologique de la ville de Narbonne, administrateur délégué de la compagnie narbonnaise des produits céramiques.","architecture":"A Bize Minervois, la tour de Boussecos du Haut Moyen-Age : en face des grottes, de l'autre côté de la rivière, on aperçoit quelques murs en ruine sur un piton rocheux. Il s'agit d'une ancienne tour de guet qui verrouillait le passage de la vallée de la Cesse. Les remparts, la porte Saint-Michel, la tour d'Attila du Bas Moyen-Age - Renaissance. La Manufacture du XVII-XVIIIe siècle : elle a gardé tous ses bâtiments et l'intégrité de ses façades.                                                                                                                     Les châteaux viticoles du XIXe siècle, sont caractéristiques des châteaux viticoles languedociens, par la frivolité  de leur architecture. Le plus important a été édifié sur un ancien château seigneurial, Cabezac.  Le château de la Selette est plus impressionnant par la taille de ses caves et de ses écuries que par son architecture propre, aujourd'hui auberge.","habitants":"Gontran Dondain                                                                                 Docteur Marty\r\n        \"","divers":"Château de Cabezac, de le Camus et de M. le Marty à Bize-Minervois","gps":"","images":["../image/image_11/11_Cabezac_1.jpg","../image/image_11/11_Cabezac_2.jpg","../image/image_11/11_Cabezac_3.jpg","../image/image_11/11_Cabezac_4.jpg","../image/image_11/11_Cabezac_5.jpg","../image/image_11/11_Cabezac_6.jpg","../image/image_11/11_Cabezac_7.jpg","../image/image_11/11_Cabezac_8.jpg"]},"Consult_chateau_formulaire3a3f":{"id":"Consult_chateau_formulaire3a3f","dept":"11","canton":"Rieux minervois","commune":"Cabrespine","nom":"Cabrespine_Aude","type":"Vestiges","periode":"X","histoire":"CABRESPINE, ancien château, actuellement ruiné, était une solide construction du Xe siècle qui avait appartenu à l'abbaye de Lagrasse. L'église Saint-Pierre était fort ancienne et figurait dans une charte de Charles le Simple vers 899. Elle est mentionnée aussi en 1280. L'actuelle église paroissiale, construite sur les fondations primitives, date de 1753 et possède un chur de 1880. Il existait une chapelle rurale dite Notre-Dame de Pitié, aujourd'hui ruinée, qui était attenante au cimetière.Le 28 janvier 1584, les protestants prirent, grâce à un pétard (canon de fonte) placé à la porte d'entrée, le très fort château de par sa situation. Ils ravagèrent tous les environs. Mais les catholiques, sous la conduite du marquis de Mirepoix, le reprirent le 22 juillet. En 1952, le village rendait hommage à un enfant du pays, Pierre Duhem qui était à l'origine d'importants travaux scientifiques.","architecture":"Le château de Cabrespine dont il ne reste que quelques ruines date de 1035, époque des Capétiens. À l'origine il était garnison royale. En 1217, il a été donné à l'abbaye de Lagrasse par Simon de Montfort, en rémission de ses fautes. Revenu à la couronne royale vers 1327, il est tour à tour attaqué par les Huguenots puis repris par les catholiques en 1584. Le village disposait à l'époque d'un château datant de 1035, dont il ne reste aujourd'hui que quelques ruines. Le village conserve encore deux moulins, survivants des quatre cités en 1789. Le village est aussi connu pour son gouffre.","habitants":"Pierre Duhem \r\n        \"","divers":"Vestiges du château de Cabrespine","gps":"","images":["../image/image_11/11_Cabrespine_Aude_1.jpg","../image/image_11/11_Cabrespine_Aude_2.jpg","../image/image_11/11_Cabrespine_Aude_3.jpg","../image/image_11/11_Cabrespine_Aude_4.jpg"]},"Consult_chateau_formulaireb3e0":{"id":"Consult_chateau_formulaireb3e0","dept":"11","canton":"Bram","commune":"Cahuzac","nom":"Cahuzac","type":"Château","periode":"XVIII","histoire":"Plusieurs châteaux aux environs de Cahuzac dont celui de Cahuzac, du XVIIIe siècle, pas d'information historique,  de Fajac la Selve  à Pech-Luna chambres d'hôtes et de Saint-Amans et de Lafage vestige de la Tour de Lafage et à l'est à quelques kilomètres   et plus à l'est à Gajac la Selve deux châteaux de Las Courtine et St-Sauveur  dont je n'ai pas d'informations.                                                                                                     FAJAC la SELVE , ses trois chambres dhôtes, ses deux gîtes inattendus et, cerise sur le gâteau, ses deux magnifiques roulottes anciennes, découverte chez la styliste Jeanne Bayol.                                                                                                                                       LAFAGE;  après le départ du marquis
