e04b8","dept":"11","canton":"Sallèles d","commune":"Ouveillan","nom":"Preissan","type":"Château","periode":"XVIII","histoire":"Deux châteaux à Ouveillan celui de Preissan du XIXe siècle et d'une  commanderie dans le domaine et celui du Terral dit Andoque (voir article)  .                                                                                                              PREISSAN  Le territoire de Preïssan, devient un bien hospitalier (une commanderie) en 1193. Passé sous le giron de labbaye de Fontfroide, au XVIe siècle , labbé commendataire de Frégose, issu dune illustre famille génoise, donna ce domaine à son neveu  Alexandre, natif de Padouen, qui le transmis en sa descendance, jusquau comte de Frégose, les Frégoze, illustre famille génoise inféodée à Ouveillan en 1594 par un parent alors abbé de l'Abbaye de Fontfroide qui épousa en 1774 la nièce de Mgr de Bausset, évêque de Béziers, provençal aimé. Débuta alors une dévolution largement féminine avec leur fille et héritière mariée en pleine Révolution à Pascal Dubreuil, né à Montauban en 1765 devenu général et titré en 1810 baron de Frégose, avec majorat. Il décéda à Béziers en 1844, laissant ce vaste ensemble à leur fille, qui épousa en Provence en 1815,  le vicomte de Villeneuve-Bargemont, leur postérité sétant alliée en 1837 avec la famille du fameux Bailli de Suffren de St-Tropez, et avec la famille de Boigne qui ajoutèrent à lhistoire de Preïssan.\r\nAujourdhui sest ajouté le domaine voisin du Bousquet, et sy poursuit une activité viticole à lombre de ce château de briques et de pierre, lun des fleurons de ce qui fut leldorado viticole, agrémenté dun lac qualimente leau du proche canal du midi, les hauts platanes du parc Créany un îlot paisible et actif.","architecture":"A Preissan , est sur les lieux d'une villa romaine, bien de Prexanus, la colonne de marbre monolithique, ci-dessus récupérée afin d'ériger un crucifix en est un vestige. Château de style néo-Louis XIII construit vers 1860 en briques et pierres, un corps de logis rectangulaire à deux niveaux  à six travées et la partie centrale d'entrée  avec balcon et fronton triangulaire série de lucarne sur toit en ardoises intercalées d'oeils de buf, ce château est accolé sur les côté de pavillon d'une travée rectangulaire avec prolongement de lucarnes et d'oeils de boeuf, l'ensemble formant un U.","habitants":"comte de Frégose                                                                                      Bailli de Suffren\r\n        \r\n        \r\n        \"","divers":"Château de Preissan","gps":"","images":["../image/image_11/11_Preissan_1.jpg","../image/image_11/11_Preissan_2.jpg","../image/image_11/11_Preissan_3.jpg"]},"Consult_chateau_formulaireb491-2":{"id":"Consult_chateau_formulaireb491-2","dept":"11","canton":"Rieux-Minervois","commune":"Puichéric","nom":"Puichéric","type":"Château","periode":"XIII-XIX","histoire":"Deux châteaux à Puichéric celui de Puichéric et celui de Saint-Aunay, cest une ancienne demeure bourgeoise du XIXe siècle, entourée dun parc arboré dun hectare, chambres d'hôtes   par  Dominica et Philippe Gouze.                                                  PUICHERIC,  le premier château, date  du VIe ou VIIe siècle sur le rocher de Puichéric, affleurement d'excellente pierre à bâtir dut tout de suite attirer l'attention des conquérants wisigoths. Et le nom même de Puichéric Podium Théodoroci Terreci, le \"Pech de Théodoric\" (la montagne de Théodoric) le plus célèbre des princes goths avec Alaric II semble bien confirmer cette hypothèse. En 1355, les fortifications de Puichéric furent ruinées par les anglais du Prince Noir, et leurs pierres servirent à remonter l'enceinte actuelle. Le château hébergera plus tard le \"père du canal des deux mers\" : Paul Riquet. Le château possède un passé très intéressant et constitue en lui-même une énorme richesse, mais il ne peut être visité car il appartient à un particulier.\r\nPUICHERIC, chambres d'hôtes par  Dominica et Philippe Gouze.","architecture":"Puichéric  entre Aude et canal du midi, ce paisible village du Minervois au milieu des vignes,  le village, groupé autour de l'église et le château, présente quelques maisons anciennes et des ruelles pittoresques, ainsi que plusieurs monuments et sites inscrits ou classés au patrimoine historique, dont une curieuse pyramide du XVIIe siècle.                                                                                               St-Aunay, superbe maison de maitre, nichée en plein coeur du Minervois, près du canal du midi. Tout confort pour accueillir une grande famille ou un groupe d'amis, calme et détente assuré.","habitants":"Paul Riquet\r\n        \r\n        \"","divers":"Château de Puichéric et de Saint-Aunay.","gps":"","images":["../image/image_11/11_Puicheric_1.jpg","../image/image_11/11_Puicheric_2.jpg","../image/image_11/11_Puicheric_3.jpg","../image/image_11/11_Puicheric_4.jpg","../image/image_11/11_Puicheric_5.jpg","../image/image_11/11_Puicheric_6.jpg","../image/image_11/11_Puicheric_7.jpg","../image/image_11/11_Puicheric_8.jpg","../image/image_11/11_Puicheric_9.jpg"]},"Consult_chateau_formulaire68d6":{"id":"Consult_chateau_formulaire68d6","dept":"11","canton":"Quillan","commune":"Puilaurens","nom":"Puilaurens","type":"Vestiges","periode":"X-XII","histoire":"PUILAURENS, le château se situe sur le Mont Ardu. Ce nom apparaît pour la première fois en 958 dans une charte où Lothaire concède à l'Abbaye Saint-Michel de Cuxa la prévôté de Puilaurens qui est composée de la vallée de la Boulzane ou vallée Sainte-Croix. Le document mentionne aussi la présence d'une église Saint-Laurent servant de refuge fortifié et perché d'époque carolingienne. Le premier châtelain de Puilaurens est Pierre Catala qui figure comme témoin dans les actes de Guillaume de Peyrepertuse en 1217. En 1229, Guillaume de Peyrepertuse commande le château de Puilaurens. Puis en 1242, le château est maintenu par Roger Catala, fils de Pierre. Elle est connue seulement pour le rôle de refuge du château durant la croisade contre les Albigeois. En 1241, le diacre cathare du Fenouillèdes, Pierre Paraire y séjourne. Plusieurs parfaits et parfaites y seront hébergés de 1245 à 1246. La forteresse ne tomba jamais entre les mains de Simon de Montfort.  Vers 1250, le château passe aux mains de la royauté française. Par une lettre d'août 1255, Louis IX ordonne au sénéchal de Carcassonne de fortifier le château. Saint-Louis le fit renforcer pour défendre le Languedoc contre les incursions espagnoles. Le traité de Corbeil en 1258 passe le château au rang des forteresses de défense face à l'Aragon. Il fait alors partie des \"Cinq fils de Carcassonne\" avec les châteaux de Quéribus, Peyrepertuse, Termes et Aguilar, tous situés en haut de pitons rocheux \"imprenables\". Une garnison dirigée par Odon de Monteuil avec un chapelain et 25 sergents occupe le château de Puilaurens en 1259.  bien que restauré au début du XVIe siècle, il fut  pris par un détachement espagnol de 1635-1639 guerre du Roussillon entre la France et l'Espagne et en 1790 abandon du site.","architecture":"Puylaurens, les travaux de consolidations et de fortification se poursuivent sous l'impulsion de Philippe le Hardi de 1270 à 1285. Le château va alors résister à plusieurs attaques aragonaises et restera comme la forteresse la plus méridionale de France. Comme les quatre autres fils de Carcassonne, le château de Puilaurens est abandonné à partir du Traité des Pyrénées en 1659 qui fixe la frontière franco-espagnole au niveau des crêtes pyrénéennes. Une faible garnison occupe quelque temps la citadelle. Puis, mal défendu et peu entretenu dès la fin du XVIIe siècle, il est abandonné à la Révolution. Bien que quelques pierres aient été arrachées, notamment sur les créneaux et les bords de fenêtres-porte , et que les bâtiments de la cour soient détruits, le château est dans un bon état. Il est aujourd'hui propriété de la commune.","habitants":"seigneur Guillaume de Peyrepertuse\r\n        \"","divers":"Vestiges de la forteresse de Puilaurens","gps":"","images":["../image/image_11/11_Puilaurens_1.jpg","../image/image_11/11_Puilaurens_2.jpg","../image/image_11/11_Puilaurens_3.jpg","../image/image_11/11_Puilaurens_4.jpg","../image/image_11/11_Puilaurens_5.jpg","../image/image_11/11_Puilaurens_6.jpg","../image/image_11/11_Puilaurens_7.jpg","../image/image_11/11_Puilaurens_8.jpg"]},"Consult_chateau_formulaire2281":{"id":"Consult_chateau_formulaire2281","dept":"11","canton":"Quillan","commune":"Puivert","nom":"Puivert","type":"Vestiges","periode":"XII","histoire":"PUIVERT, La construction daterait du XIIe siècle. Les premières mentions de l'édifice remontent à 1152 et appartient à la famille de Congost, au moment de la croisade des Albigeois. Ces seigneurs puissants du Kercorb, accueille  les « grands », dont Aliénor d'Aquitaine, pour de somptueuses fêtes ; ils pratiquent le catharisme et sont montrés comme des hérétiques. Ainsi, en novembre 1210, le château subit un siège de trois jours par l'armée de Thomas Pons de Bruyère, lieutenant de Simon de Montfort et Puivert devient une possession du royaume.  Au début du XIVe siècle, Thomas de Bruyères, petit-fils de Pons et d'Isabelle de Melun, sa femme, font reconstruire le « nouveau château », à l'est du vieux château dont les vestiges sont toujours visibles et parmi lesquelles l'on peut voir les armoiries d'Isabelle de Melun, fille d'un grand chambellan de France. La remise en forme du bâtiment lui donne le caractère symbolique et pittoresque que l'on peut observer. Passe ensuite aux de Voisins et à leur héritiers les Joyeuses et en 1593 échoit à une famille de drapier de Chalabre  Jean Pressoires.  En 1659 traité des Pyrénées , Puivert perd son rôle stratégique, en 1680 la terre de Puivert est érigée en marquisat pour la famille de Roux qui en furent dépossédait à la Révolution et en 1793 démantèlement des tours.\r\nDepuis sa vente en 1995 par la famille de Puivert, le château sert à de nombreux tournages (La neuvième Porte, Le peuple migrateur, La passion Béatrice) grâce à son donjon très bien conservé.","architecture":"Puivert, s'étend sur une longueur de 175 mètres, sur un plan rectangulaire, percé d'archères, et séparé du plateau par un fossé, pratiquement invisible de nos jours. L'accès à la cour intérieure se fait par une tour-porte, carrée, située au centre de la courtine Est. Il subsiste 5 tours des 8 initiales : une ronde, lisse, à l'angle nord-est ; une ronde à bossage au milieu du front nord ; une tour à plan carré, avec une tourelle en encorbellement, sur le côté oriental, reliant les deux derniers étages ; les restes d'une tour ronde au sud-est ; le donjon .\r\nEn plus de la porte centrale, située sur le mur oriental, il y a deux autres portails, un sur l'angle défendu par le donjon à angle nord-ouest et un au sud du donjon, permettant d'accéder au vieux château. La surface au sol (basse-cour) du site est très grande : 3 200 m2 à l'intérieur des murs. Partie la mieux conservée de l'édifice, de forme carrée, dressé en 1310, il mesure 15 m de côté et 32 de haut. Il était initialement attenant au logis seigneurial. Sur la partie ouest de la tour, on peut observer des arrachements de pans de murs perpendiculaires, ainsi que des portes, laissant à déduire que les habitations étaient accolées à cette paroi.\r\nLe donjon est composé de cinq niveaux. Les deux premiers (dont un partiellement souterrain) ont des plafonds berceaux brisés. Le troisième même par une porte couverte en arc brisé à la chapelle, décorée de colonnettes, de moulures et de blasons, au plafond voûté d'ogives à culots sculptés et dont au mur, se trouvent une piscine liturgique et des fenêtres trilobées.","habitants":"Famille de Thomas de Bruyères                                                           Famille de Puivert\r\n        \"","divers":"Vestiges de la forteresse de Puivert","gps":"","images":["../image/image_11/11_Puivert_1.jpg","../image/image_11/11_Puivert_2.jpg","../image/image_11/11_Puivert_3.jpg","../image/image_11/11_Puivert_4.jpg","../image/image_11/11_Puivert_5.jpg","../image/image_11/11_Puivert_6.jpg","../image/image_11/11_Puivert_7.jpg","../image/image_11/11_Puivert_8.jpg"]},"Consult_chateau_formulairecbb4":{"id":"Consult_chateau_formulairecbb4","dept":"11","canton":"Rieux minervois","commune":"Pépieux","nom":"Pépieux","type":"Château","periode":"XVI","histoire":"Plusieurs châteaux à Pépieux dont celui de Pépieux , celui de Massamier la Mignarde, de Pépusque et celui de Théron.                                                                          PEPIEUX,  bâti au cours du XIe siècle dans sa partie principale, est conçu comme tous ceux de cette époque, vaste quadrilatère aux murs énormes percés de rares et petites ouvertures très hautes à l'extérieur, entouré de fossés , haut de 3 à 4 étages sans plancher quelquefois mais avec des encorbellements pour les recevoir communiquant avec le dehors par une large porte unique munie d'un pont levis et ouvrant par un couloir voûté sur la cour intérieure. Ce qui nous reste du château, remanié de bonne heure et abîmé depuis la Révolution, ne peut nous donner qu'une idée partielle en raison des nombreux changements qui y ont été apportés. Le plus important est celui du percement des murs de la cour intérieure du château qui l'a transformée en rue. Dans les années 50, on pouvait voir le puits du château qui était carré en pierre de taille bouché par la mairie mais on peut voir une petite trappe qui sert de regard. Celui-ci est réputé intarissable car il mesure 18 mètres de profondeur donc sous le niveau de la rivière.                                                                                  MASSAMIER La Mignarde est un domaine viticole de 70 hectares situé au pied de la Montagne Noire, propriété de madame de Vènes.                                                                                                                      PEPUSQUE viticole Benoît Laburthe, vigneron propriétaire .","architecture":"Les fortifications de Pépieux, la muraille est haute mais peu solide. Le bord de la rivière est défendu par les importantes bâtisses du château prolongées au cers par le rempart qui remonte le cours de l'Ognon jusqu'à un petit bastion d'où il repart obliquement vers le sud, à 50 m du bastion s'ouvre la Porte Narouge, encore vingt-cinq mètre et le mur aboutit à un bastion d'angle qui prend la direction de l'ouest longeant bientôt le chemin du mercadal jusqu'à la porte Notre-Dame, laquelle est précédée d'un pont-levis. À partir de là, la muraille se prolonge vers l'ouest jusqu'à un troisième bastion d'angle où elle prend la direction du nord. À vingt mètres de la rivière, elle rencontre la tour de guet, elle s'infléchit alors vers le cers, rencontre la porte du pont et va rejoindre le moulin à huile qui jouxte le château.                                                                                               Massamier la mignarde quadrangulaire flanqué de quatre pavillons carrés aux angles toit à quatre pans corps de logis rectangulaire à trois niveaux  balcon et fronton plein cintre sur façade.                            Théron corps de logis à deux niveaux flanqué de tour carré aux extrémités.","habitants":"Famille de Vènes\r\n        \r\n        \"","divers":"Château de Pépieux, de Massamier la  Mignarde, de Pépusque et de Théron","gps":"","images":["../image/image_11/11_Pepieux_1.jpg","../image/image_11/11_Pepieux_2.jpg","../image/image_11/11_Pepieux_3.jpg","../image/image_11/11_Pepieux_4.jpg"]},"Consult_chateau_formulaired625":{"id":"Consult_chateau_formulaired625","dept":"11","canton":"Quillan","commune":"Quillan","nom":"Quillan","type":"Vestiges","periode":"XII-XIII","histoire":"QUILLAN  le château de Quillan, fut bâti au XIIe et XIIIe siècles par les archevêques de Narbonne. S'en suivirent de nombreux heurts avec le Roi de France. En 1229 un traité de paix marque la fin de la croisade des Albigeois, Quillan devient alors Ville Royale. Deux siècles après, le Roi de France en fit une fortification militaire afin de résister aux invasions aragonaises. Sentinelle veillant sur la frontière avec l'Espagne, abritait une garnison. En 1575, est incendié par les Huguenots. En 1576, rendue au vicomte de Joyeuse, la ville est fortifiée et des fossés sont creusés.  Après les guerres de religions, il semble que le château soit très délabré. En 1628, le Sénéchal de Carcassonne demande à larchevêque une remise en état du château et du moulin de Quillan.  En 1659, le traité des Pyrénées scelle une paix entre l'Espagne et la France et permet l'annexion du Roussillon. La ville n'est plus proche de la frontière Espagnole, les fortifications deviennent inutiles.\r\nEn 1735, le château est démantelé, sur la proposition de l'archevêque.\r\nEn 1790, durant la révolution, Quillan devient chef lieu de district. En 1793, dans la crainte dune incursion espagnole, les murs Ouest et Nord sont abattus de façon à créer une aire de manuvres pour les canons. En 1791, le château est vendu aux enchères. L'achat est réalisé par Thomas Marre plâtrier à Quillan. En 1950, il est acheté par la ville qui construit un château deau à lintérieur. La construction d'un château d'eau dans le fort est judicieuse (puisque c'est l'endroit le plus haut de la ville), mais catastrophique pour cet \"ancêtre\" qui est amputé d'une partie de sa cour intérieure.","architecture":"Le château de Quillan dont les vestiges actuels attestent cette fortification,  avec une enceinte quadrangulaire de 35 m de coté et des murs à bossage reste un témoignage de l'architecture militaire du XIVe et XVe siècles. L'enceinte est taluté à la base en forte déclivité. Les courtines, de 1,80 m d'épaisseur, sont percées d'archères et de grandes baies en plein cintre. Elles avaient une hauteur de 13 mètres, aujourd'hui 5 à 6 mètres de pierres ont été restaurés. Les quatre angles sont pourvus d'échauguettes polygonales.\r\nLes échauguettes reposaient sur une série d'encorbellements arrondis. Elles étaient surmontées d'un parapet en grès jaune, percé d'archères, aujourd'hui disparu. L'entrée principale est située Nord-Nord-Est. Elle était protégée par un fossé  aujourd'hui comblé et par un pont-levis disparu.\r\nConcernant la porte d'entrée, certains pensent que c'était le donjon et d'autres \"une tour-porte\". Ce détail est important. Des tours-portes, il en existe plusieurs dans la région. C'est un type de construction assez classique sur des châteaux peu élevés. Mais si le donjon est au dessus de l'entrée, ce château est unique en pays Audois. De nombreux experts optent pour cette option.","habitants":"Thomas Marre\r\n        \"","divers":"Vestiges du château primitif de Quillan et nouveau château.","gps":"","images":["../image/image_11/11_Quillan_1.jpg","../image/image_11/11_Quillan_2.jpg","../image/image_11/11_Quillan_3.jpg","../image/image_11/11_Quillan_4.jpg","../image/image_11/11_Quillan_5.jpg","../image/image_11/11_Quillan_6.jpg"]},"Consult_chateau_formulairea81b":{"id":"Consult_chateau_formulairea81b","dept":"11","canton":"Fabrezan","commune":"Cucugnan","nom":"Quéribus","type":"Vestiges","periode":"X-XII","histoire":"QUERIBUS, mentionné en 1020, le château de Quéribus fait alors partie du comté de Besalù, puis de Barcelone et entre enfin dans la maison dAragon en 1162 en tant que forteresse royale. Une famille \"de Cucugnan\", apparaît pour la première fois en 1193. Lors de la croisade contre les albigeois, elle se présente comme lune des championnes de la cause du Languedoc. Ainsi, avant 1240, Pierre de Cucugnan ravitaille les hérétiques du château de Puylaurens et héberge le faydit Guiraud dAniort. En 1240, il rejoint Raymond Trencavel qui fait le siège de Carcassonne. A la suite de léchec de ce siège, il se soumet à Saint-Louis. Le château de Quéribus abrite encore des cathares. Le diacre du Razès, Benoît de Termes, sy réfugie sous lautorité du chevalier Chabert de Barbaira. Celui-ci est finalement contraint de céder devant Saint-Louis en 1255. Dernier bastion à tomber, onze ans après la chute de Montségur, il devient une pièce maîtresse du dispositif défensif français. Quéribus est lun des « cinq fils de Carcassonne »avec Aguilar, Peyrepertuse, Puilaurens et Termes. Sa situation stratégique de premier ordre lui permettait dexercer une remarquable surveillance sur la plaine roussillonnaise au Sud et de barrer lentrée du massif des Corbières à lennemi. Il perd son intérêt stratégique en 1659 lors du Traité des Pyrénées qui fixe la frontière avec lEspagne à son emplacement actuel.","architecture":"Quéribus perché sur un étroit piton rocheux, le château émerge et projette sa silhouette massive à 728 mètres daltitude. Il devient alors une place forte maîtresse qui appartient au dispositif défensif français dont le commandement est Carcassonne. Le château est constitué de trois enceintes étagées au sommet et le long de la falaise. Elles assuraient les défenses du château grâce à divers systèmes de défense : de fines archères utilisées par les arbalétriers, des meurtrières canonnières pour les armes à feu plus large et des mâchicoulis. Quatre siècles d'évolutions de l'art défensif y sont représentés. Plusieurs systèmes de défenses des portes sont présents : assommoirs, bretèches. Des chemins de ronde et des casemates assurent la surveillance des points vulnérables. Le reste de la forteresse est constitué d'un corps de logis, de salle de stockage, de citernes et d'un donjon. Le donjon est une tour polygonale située dans la troisième enceinte au plus haut de la falaise. Le sommet du donjon détient une terrasse accessible par un escalier à vis situé dans une tour rectangulaire accolée au donjon.","habitants":"Famille de Cucugnan\r\n        \r\n        \"","divers":"Vestiges de la forteresse de Quéribus.","gps":"","images":["../image/image_11/11_Queribus_1.jpg","../image/image_11/11_Queribus_2.jpg","../image/image_11/11_Queribus_3.jpg","../image/image_11/11_Queribus_4.jpg","../image/image_11/11_Queribus_5.jpg","../image/image_11/11_Queribus_6.jpg"]},"Consult_chateau_formulaire2bbb":{"id":"Consult_chateau_formulaire2bbb","dept":"11","canton":"Quillan","commune":"Rennes le Chateau","nom":"Rennes_le_Chateau","type":"Château","periode":"XIIXIX","histoire":"RENNES le CHÂTEAU, a notamment été rendue célèbre par l'un de ses curés ayant vécu dans la paroisse à la fin du XIXe siècle et au début du XXe, l'abbé Bérenger Saunière. Malgré l'absence de preuves, de nombreuses théories laissent entendre qu'il y aurait trouvé un trésor en 1885, sans que l'origine et la nature exactes en soient connues.                                                                                                                                          Le château de RENNES date du XIIIe siècle. La plus grande partie de la bâtisse actuelle date du XVIe siècle et du XVIIe siècle. En 1293, Pierre II de Voisins va remettre en état les fortifications de Redhae. La famille de Voisins restera maître de ce qui deviendra Rennes-le-Château, au fil du temps, jusqu'en 1362, Henri de Trastamare, à la tête d'une bande de pillards surnommés les « routiers aragonais », ravage et pille le Razès, qu'ils prennent et détruisent ne laissant derrière eux que des ruines. C'est à cette date que l'antique ville disparaît. Sur le plateau, seules restent quelques bâtisses épargnées et la structure du château qui a résisté à la destruction.                                                                La Maison d'Hautpoul, le comté de Razès passe en 1422 à la maison d'Hautpoul, originaire d'Aussillon près de Mazamet, par le mariage de Pierre-Raymond d'Hautpoul avec Blanche de Castille, fille de Jeanne de Voisins, descendante de Pierre II de Voisins à qui le Razès avait été inféodé en 1230. François d'Hautpoul (1689-1753) releva le titre de marquis de Blanchefort tombé en désuétude, que lui apporta en dot son épouse Marie de Nègre d'Ables (1714-1781), dame de Niort, de Roquefeuil et de Blanchefort. Lors de la Révolution Française, le marquis Paul-François-Vincent de Fleury, héritier des Hautpoul-Blanchefort, après son mariage avec Anne-Gabrielle-Elisabeth d'Hautpoul-Blanchefort, dernier seigneur des lieux, émigra en Espagne avec ses trois enfants et son chapelain, l'abbé Antoine Bigou. Cependant, un de ses fils, Paul Urbain de Fleury, racheta son domaine, le 27 floréal an IV, lorsque ces propriétés furent vendues comme biens nationaux. Après de nombreuses vicissitudes, les biens et les propriétés de la famille d'Hautpoul furent vendus aux enchères le 7 juin 1889.","architecture":"La tour Magdala est beaucoup plus surprenante. Il s'agit d'une tour carrée de style néogothique. Elle semble former un angle d'un carré imaginaire dont l'orangerie occupe l'angle diamétralement oppose. L'abbé Saunière fait de cette tour son refuge où il peut en toute tranquillité lire ou s'occuper de sa collection de timbres. Ici, une fois de plus, on retrouve beaucoup de symboles, 22 créneaux, 22 marches, dallage correspondant au carré forme par les bâtiments, le village de Rennes le château surplombe les vallées de l'Aude et de la Sals, l'abbé Saunière a construit  la tour Bibliothèque Magdela et la villa luxueuse Béthania Marie Denarnaud, la fidèle servante de l'abbé Saunière, vécut dans la villa Béthania à la suite du décès de l'abbé ; mais ne pouvant régler les taxes foncières de la propriété, elle fut contrainte de vendre la villa en viager. En 1946 Noël Corbu a racheté l'ancienne propriété de l'abbé Saunière et réglé toutes les dettes. En 1955, la villa Béthania est devenue un restaurant L'hôtel de la Tour, géré par Noël Corbu, dans le but d'attirer des clients qui pourraient s'intéresser aux nombreux mythes entourant la zone. Corbu  vend sa propriété en 1965 à Henri Buthion qui y poursuit des fouilles, sans succès.\r\nLa villa Béthania est décorée avec le symbolisme religieux du Sacré-Cur sous la forme de vitraux et d'une grande statue de Jésus-Christ au-dessus de l'entrée.","habitants":"Abbé Bérenger Saunière\r\n        \"","divers":"Tour Magdala, le château et la maison d'Hautpoul et de Béthania à Rennes le château.","gps":"","images":["../image/image_11/11_Rennes_le_Chateau_1.jpg","../image/image_11/11_Rennes_le_Chateau_2.jpg","../image/image_11/11_Rennes_le_Chateau_3.jpg","../image/image_11/11_Rennes_le_Chateau_4.jpg","../image/image_11/11_Rennes_le_Chateau_5.jpg","../image/image_11/11_Rennes_le_Chateau_6.jpg"]},"Consult_chateau_formulaire91f4":{"id":"Consult_chateau_formulaire91f4","dept":"11","canton":"Rieux-Minervois","commune":"Rieux-Minervois","nom":"Rieux_Minervois","type":"Château","periode":"XVI-XVIII","histoire":"La-JUGIE, dans les familles aristocrates du Moyen-Âge, en cas de rupture du nom, fille unique ou manque de descendance, d'où héritage d'un neveu ou une nièce, s'ils ne portent pas le nom de famille, ils le relèvent. Dans le cas des La Jugie, ce fut ainsi pendant de nombreuses générations, mais en 1640, François des Moustiers, comte de Mérinville, qui épouse Marguerite de La Jugie, non seulement refuse cette habitude, mais encore impose son nom au village de Rieux, qui depuis s'appelle Rieux-Mérinville. La famille de La Jugie compte pas moins de deux papes, cas unique des familles françaises : Clément VI, Pierre de La Jugie, élu pape en 1342, et Grégoire XI, Pierre-Roger de Beaufort, élu pape en 1370 ; et moult cardinaux, car à cette époque les cardinaux ne sont pas forcément prêtres. Jacques de La Jugie s'installe tout d'abord à La Livinière. Il est anobli en 1339. Son fils Nicolas achète La Livinière, Ferrals-les-Montagnes et plusieurs châteaux régionaux, dont en 1372 la baronnie de Rieux. Les couleurs de cette famille : six roses rouges. Tous ces seigneurs et prélats connurent une importance prépondérante pendant la période des papes d'Avignon 1309-1378 dont ils comptèrent. Leur pouvoir politique ne cessa guère jusqu'au XVIIIe siècle (1707), période de faillite pour Mérinville, rachat du château par le riche banquier Samuel Bernard, puis retour aux Mérinville en 1739. \r\nAujourd'hui  Marcel Julien y  fait des manifestations culturelles.","architecture":"Au Moyen-Age, le centre de lactuel village de Rieux-Minervois était ceinturé dun rempart, défendu à ses angles par des tours. Mais la particularité du village est tout de même sa rotonde du XIIe siècle. Joyau de lart roman, elle abrite des chapiteaux sculptés du maître de Cabestany. Elle est unique au monde par son architecture bâtie sur sept pans  « la Sagesse a bâti sa maison, elle a taillé ses sept colonnes ». Château du XI et XVIe siècle dans un village avec dépendance et cour. Le château, partiellement démantelé, montre encore les restes de ses murailles. \r\nChâteau de village en grande partie rénové , très belle cage d'escalier en pierre, grande pièce à vivre . Très beaux plafonds à la française, fenêtres à meneaux.  Le principal a été fait pour sauver cette magnifique bâtisse.  Non attenant se trouve un bâtiment à aménager mais les huisseries sont neuves, double vitrage et toiture entretenue. La tour et le donjon sont bien restaurés.","habitants":"Famille de  La Jugie \r\n        \"","divers":"Château de la Jugie à  Rieux-Minervois","gps":"","images":["../image/image_11/11_Rieux_Minervois_1.jpg","../image/image_11/11_Rieux_Minervois_2.jpg","../image/image_11/11_Rieux_Minervois_3.jpg","../image/image_11/11_Rieux_Minervois_4.jpg","../image/image_11/11_Rieux_Minervois_5.jpg"]},"Consult_chateau_formulaire5f68-2":{"id":"Consult_chateau_formulaire5f68-2","dept":"11","canton":"Trébes","commune":"Roquecourbe-Minervois","nom":"Roquecourbe","type":"Château","periode":"XVII-XIX","histoire":"Deux châteaux à Roquecourbe dont celui de Roquecourbe et de Redorte.                                                                        ROQUECOURBE, d'origine médiévale du Xe siècle, a été reconstruit au XVIIe siècle. Possession de la famille de Montbrun en 1299 passe ensuite  à la famille Génibrousse, des Authemar, puis à la famille  de la Poterie.\r\n  REDORTE  Le château, à un jet de pierre du magnifique Canal du Midi, est un parfait spécimen de ces édifices construits au XIXe siècle dans le Languedoc, lors du premier âge dor de la viticulture locale. La famille Artois a vécu en ses murs pendant cinq générations.  Cet élégant monument du patrimoine languedocien préside toujours à la destinée de deux hectares de vignes, reprises en main par le maître vigneron Frantz Vènes. Les propriétaires dun bien au château sont chaleureusement invités à participer à lélaboration du vin du domaine. aujourd'hui transformé en hôtel restaurant.","architecture":"Le château de Roquecourbe, d'origine médiévale, a été reconstruit au XVIIe siècle. Le décor intérieur se signale par des toiles peintes ainsi que des papiers peints panoramiques du XVIIIe siècle. Le décor de la chapelle a, pour sa part, été réalisé à la fin du XVIIIe siècle et complété en 1925 par Henri-Justin Marrey, élève de Maurice Denis.      Eléments protégés MH : la chapelle en totalité; les façades et les toitures du château. En totalité, les pièces contenant un décor déplacé, à savoir au rez-de-chaussée le petit salon nord-ouest et le grand salon sud et les trois chambres du premier étage contenant un décor en place, la chambre du nord ouest, celle du sud-est et celle du sud.                                                                                                                   Redorte, quadrilatère de trois niveaux flanqué de quatre tours carrées aux angles de quatre étages avec toit à quatre pans, pavillon saillant de trois travées plein cintre avec fronton triangulaire au niveau du toit avec oculus.  Laissé à labandon pendant des décennies au cours du XXe siècle, le château a été entièrement restauré.  Ils ont redonnés leur lustre dantan à ses colonnes « Belle Époque », à ses imposantes fenêtres, à ses toits en ardoise ainsi quà ses moulures sophistiquées. Rendu à sa splendeur originelle. Face au château, un bassin de nage de vingt-cinq mètres, bordé de dalles de pierre, constitue la pièce maîtresse des lieux. Il est encadré par les nouvelles constructions du domaine dont le style architectural sharmonise parfaitement avec le château.","habitants":"Famille Artois \r\n        \"","divers":"Château de Roquecourbe de redorte à Roquecourte -Minervois.","gps":"","images":["../image/image_11/11_Roquecourbe_1.jpg","../image/image_11/11_Roquecourbe_2.jpg","../image/image_11/11_Roquecourbe_3.jpg","../image/image_11/11_Roquecourbe_4.jpg","../image/image_11/11_Roquecourbe_5.jpg","../image/image_11/11_Roquecourbe_6.jpg","../image/image_11/11_Roquecourbe_7.jpg"]},"Consult_chateau_formulairedf02":{"id":"Consult_chateau_formulairedf02","dept":"11","canton":"Villemoustaussou","commune":"Roquefère","nom":"Roquefère","type":"Château","periode":"XII","histoire":"ROQUEFERE, en 1124, Guillaume de Roquefère, premier seigneur  fit allégeance à Bernard Aton Trencavel, vicomte de Carcassonne. Ses descendants ont été, comme les seigneurs de Cabaret, des protecteurs de la cause cathare, ce qui entraîna leur destitution à lissue de la croisade conduite par Simon de Monfort. Louis VIII aurait alors attribué la seigneurie de Roquefère à un certain Henri Alamann. Louis IX, plus connu sous le nom de Saint-Louis, confirma cette donation et lassortit des droits de justice. Henri Alamann aurait suivi Saint-Louis dans ses croisades et ce dernier lui aurait fait donation dune épine de la couronne du Christ encore vénérée.  Ramond est le dernier représentant de la lignée Alamann à apparaître dans des documents de 1338. En 1372, Maurice de Bar est mentionné comme seigneur de Roquefère qui demeura un siècle et demi entre les mains de cette famille, puis fut transmise par le mariage de Jeanne de Bar à Jean de Narbonne-Talairan. En 1553, Aymeric, successeur de Jean, revendit le fief à Jean de Maurel, seigneur dAragon. Roquefère, comme tous les villages de la région, eut à souffrir des guerres de religion. Le château fut pris par les protestants le 26 février 1574, puis retomba aux mains des catholiques un mois plus tard. En 1633, Bertrand de Maurel se dessaisit de la seigneurie au profit dAntoine de Cansac, bourgeois du Mas-Cabardès. La seigneurie qui comprenait aussi Cubserviès et Labastide-Esparbairenque fut ensuite attribué à Antoine Cathala, neveu des Cansac. Celui-ci à partir de 1638 entrepris la restauration du château qui était en très mauvais état. La famille acquit un titre de noblesse et le nom de François de Cathelan de Roquefère apparaît en 1693 à loccasion de lenregistrement des armoiries de la famille. Au XVIIIe siècle, on signale un long procès intenté par la communauté de Labastide aux châtelains à propos des droits dusage des forêts. Lessentiel du patrimoine foncier fut conservé par la famille lors de la Révolution. Par la suite ce patrimoine fut  vendu. La famille de Roquefère séteignit en 1902.  vendu à la famille Sarthou et Brigitte Deruy  en 1975.","architecture":"Roquefère laissé à labandon pendant des décennies au cours du XXe siècle, le château a été entièrement restauré. Ils ont redonné leur lustre dantan à ses colonnes « Belle Époque », à ses imposantes fenêtres, à ses toits en ardoise ainsi quà ses moulures sophistiquées.  Cette construction dont les témoignages historiques remontent au XIIe siècle, est située en Aude, dans le Cabardès. Laissé à labandon de nombreuses années, il était en très mauvais état.  Sarthou a crée un centre de création théâtrale qui fut subventionné par le Ministère de la culture.  Cette activité dura de 1986 à 1994. Le château fut acheté à nouveau. Il est  restauré et accueille tous les ans dans la prairie, des concerts de « Jazz sous les châtaigniers », début août.","habitants":"Seigneur Maurice de Bar \r\n        \r\n        \"","divers":"Château de Roquefère","gps":"","images":["../image/image_11/11_Roquefere_1.jpg","../image/image_11/11_Roquefere_2.jpg","../image/image_11/11_Roquefere_3.jpg","../image/image_11/11_Roquefere_4.jpg","../image/image_11/11_Roquefere_5.jpg","../image/image_11/11_Roquefere_6.jpg","../image/image_11/11_Roquefere_7.jpg","../image/image_11/11_Roquefere_8.jpg","../image/image_11/11_Roquefere_9.jpg"]},"Consult_chateau_formulairef82f":{"id":"Consult_chateau_formulairef82f","dept":"11","canton":"Montréal","commune":"Saissac","nom":"Saissac","type":"Vestiges","periode":"XII-XVI","histoire":"quatre châteaux à Saissac, les vestiges de la forteresse, le château des Matayer et de Ramondens                                   SAISSAC,  en 1240 seigneurie de la famille de Thurey et entre dans le patrimoine de la famille des Lévis,  à la fin du XIIIe siècle,  nouveaux seigneurs de Mirepoix, et devient enfin, de 1331 à 1412, possession de la famille de L'Isle-Jourdain. Au XVe siècle, la baronnie est détenue par la famille de Caraman. D'autres propriétaires par alliance, les Bernuy, la maison de Clermont-Lodève changent jusqu'en 1565. Vue du château depuis la terrasse sud. En 1568 et 1580, les troupes protestantes détruisent le village mais ne peuvent entrer dans le château imprenable. Il fut ensuite détenu à partir de 1715 par les Luynes qui ne résidaient pas dans la forteresse.  Le château est inoccupé et déjà délabré au milieu du XVIIIe siècle. À la Révolution, le château sert de carrière de pierres. Son aspect romantique lui vaut même d'être dégradé en 1862 par des chercheurs de trésors. Il est acheté en 1920 par Henri Dupuy-Mazuel, cinéaste et écrivain. À sa mort, en 1962, ses héritiers donnent le château à la mairie de Saissac.\r\nDepuis 1995, la municipalité mène un programme de restauration. De 2004 à 2006, deux salles du corps du logis (logis Aldonce construit pendant le XVIe siècle) sont reconstruites dans le style XVIe. Dans ces salles se trouve aujourd'hui un petit musée présentant des informations sur la monnaie ancienne, notamment sur le \"trésor\" trouvé à Saissac  en 1979 lors de travaux de construction.                                                                     RAMONDENS au pied de la montagne Noire et au beau milieu de sombres forêts,\r\nse cache le château. Propriété, en son temps, du célèbre Pierre Paul Riquet,  fût un témoin privilégié du temps passé. aujourd'hui CCAS centre de vacances.","architecture":"Saissac du XIIe siècle sur un promontoire rocheux.  Le pont-levis et le fossé ont été remblayés, et l'on pénètre directement dans la première terrasse. Le côté Est fait apparaître un pont dormant à 2 arches. Le pont se poursuivit par un mur en appareil plus grossier, nettement marqué par un coup de sabre dans la maçonnerie qui délimite l'emplacement du pont-levis. À l'est se trouve un corps de logis alors qu'à l'Ouest deux échauguettes rondes flanquent le mur. Au centre de la terrasse se dressent les restes d'un donjon polygonal d'environ 20 m de hauteur. La rampe d'accès Est débouche sur la seconde terrasse, sur laquelle se trouve également un grand corps de logis ( musée). Sur la troisième terrasse se trouvent entre autres des casemates. Deux tours circulaires encadrent le mur Sud. Le donjon, les tours quadrangulaires et les courtines remonteraient à cette époque. Le deuxième remaniement intervient au XVIe siècle, le château est plus \"confortable\" (notamment en introduisant de grandes fenêtres à meneaux Renaissance). Mais les guerres de religions introduisent également de nouvelles modifications : l'utilisation d'armes à feu mène à la construction de canonnières. Les tours circulaires, le logis central et les échauguettes dateraient également de cette époque.                                                    Ramondens de plan rectangulaire à trois niveaux, toit en ardoises en croupe flanqué en façade de deux échauguettes et sur l'arrière de l'édifice un  donjon à quatre niveaux  crénelé et avec mâchicoulis.","habitants":"Famille de Bernuy \r\n        \"","divers":"châteaux à Saissac, les vestiges de la forteresse, le château des Matayer et de Ramondens.","gps":"","images":["../image/image_11/11_Saissac_1.jpg","../image/image_11/11_Saissac_2.jpg","../image/image_11/11_Saissac_3.jpg","../image/image_11/11_Saissac_4.jpg","../image/image_11/11_Saissac_5.jpg","../image/image_11/11_Saissac_6.jpg","../image/image_11/11_Saissac_7.jpg","../image/image_11/11_Saissac_8.jpg","../image/image_11/11_Saissac_9.jpg"]},"Consult_chateau_formulairea18e-2":{"id":"Consult_chateau_formulairea18e-2","dept":"11","canton":"Coursan","commune":"Salles d","nom":"Salles_Aude","type":"Château","periode":"XVI","histoire":"Plusieurs châteaux à Salles d'Aude dont celui de Marmonnières (voir article) de Pech Celeyran                                                                                                                                            PUECH-CELEYRAN, le château a appartenu depuis le XVIIe et jsuqu'à la fin du XIXe siècle à la famille Mengau-Tapié. Henri de Toulouse-Lautrec y a passé une partie de sa jeunesse. En 1883, Amédée Tapié vend le domaine à Thérèse Humbert.\r\nEdouard Soulas, négociant en viandes s'enrichit en Argentine, fait l'acquisition du domaine avant 1917. Il entreprend de rénover les installations techniques et refait  la décoration du château, dans un style néo-Louis XV qu'il déploiera  après 1924 dans la villa acquise à Nice. Il meurt à Celeyran en 1943. Entièrement pillié , vandalisé en trois ans d'abandon le domaine est acquis par la région en 2009.   Propriété de la famille Saint-Exupéry depuis cinq générations, de Caroline d'Andoque de Seriège qui l'avait reçu de ses parents avec Joseph, comte de Saint-Exupèry grand père de Jacques de Saint-Exupèry actuel dirigeant  de l'exploitation  viticole  , également chambres d'hôtes ou en gîtes. La location des salles, du chai et du préau vous permet d'organiser des réceptions, mariages ou séminaires d'exception par la famille  Nollemalle propriétaire.","architecture":"Celeyran se présente aujourd'hui comme un grand logis intégrant les pièces de service, la  partie vouée à l'exploitation se compose des deux ailes du régisseur, des grandes dépendances agricoles, d'un chai et d'un silo à marcs. Le logis est constitué d'un bâtiment principal rectangulaire allongé terminé par deux ailes courtes en retour d'équerre sur le jardin. La façade postérieure de ces ailes et celle du bâtiment principal sont alignées. Deux tours carrées y sont adossées dans l'axe des deux ailes, de manière à renforcer la symétrie de la composition. Le logis se compose d'un rez-de-chaussée supportant un étage-carré, surmonté d'un étage en surcroît sous comble perdu. Le bâtiment principal est couvert de deux longs pans versant sur la façade principale et la\r\nfaçade postérieure, tandis que deux croupes couvrent les ailes. Les deux tours symétriques dominent le logis de deux niveaux supplémentaires, surmontés par un toit terrasse festonné d'un garde-corps à balustres.                                                                  Pech-Ceyleran   de plan en U à deux niveaux","habitants":"Famille de Woillemont                                                                                   Famille Mengau-Tapié.                                                                          Famille Saint-Exupéry \r\n        \"","divers":"Château de Ceyleran et de pech-Ceyleran àSalles d'Audes","gps":"","images":["../image/image_11/11_Salles_Aude_1.jpg","../image/image_11/11_Salles_Aude_2.jpg","../image/image_11/11_Salles_Aude_3.jpg","../image/image_11/11_Salles_Aude_4.jpg","../image/image_11/11_Salles_Aude_5.jpg","../image/image_11/11_Salles_Aude_6.jpg"]},"Consult_chateau_formulaire835b":{"id":"Consult_chateau_formulaire835b","dept":"11","canton":"Bram","commune":"Salles-sur-l","nom":"Salles_sur_Hers","type":"Château","periode":"XII-XVIII","histoire":"Deux châteaux à Salles sur l'hers  celui de Salles et celui de Galinières dit de Bel-Aspect.                                                                                                                                                      SALLES Sur l'HERS, cité en 1529 La tradition rapporte que la construction du château doit être attribuée à l'ordre des templiers qui, en 1259, cédèrent leurs droits sur Salles à Arnaud de Villar, son seigneur. Les Hospitaliers, héritiers de l'Ordre du Temple, y prélevèrent quelques terrains jusqu'à la Révolution Française.  Cette tour ou donjon qui subsiste depuis le XIIIe siècle a dû être construite par les seigneurs de Montesquiou qui ont été les héritiers naturels des premiers seigneurs de la famille de Villar, à laquelle a succédé la famille dEspagne-Montespan. Le 4 décembre 1386, Esclarmonde de Villar dénombrait les biens de Saint André dUstre, de Copadel, dEn-salès, de Malvézy et du château de Salles. Le dernier seigneur de Salles fut Charles de Roquefort,  seigneur de Marquein, décédé au château de Marquein en 1797. Ce chateau est la propriété de M. Roques.\r\nBEL-ASPECT  La famille de Montesquiou a vendu ce fief au seigneur de Mongeard, de Durand,  ce fief comportait une ferme dénommée \"les Galinières\". Selon les conditions de la cession, les héritiers ont pu faire construire un château au lieu des \"Galinières\", château qui apparaît sous le nom de \"Bel Aspect\" sur lEtat-civil de Salles. Le propriétaire, jusquà la Révolution, fut le seigneur dAustry de Canneville, dont la veuve ne fut nullement inquiétée durant la Révolution.  Le fief  était possédé, en 1729, par Me Marc d'Austry, qui s'intitule seigneur.  Il avait épousé Marguerite de Luppé qui, avec son époux, constitue à son fils, Jean François d'Austry, un titre clérical, c'est-à-dire une constitution dotale. En 1730, Jean François d'Austry, écuyer, garde du corps du Roi, résidant au château de Bel-Aspect, paroisse de Salles, fils de Marc d'Austry, seigneur  et de feue dame Marguerite de Luppé, épouse demoiselle Anne-Marie de Gouzens de Fontaynes résidant au château de Lafage, fille de noble Henri de Gouzens et de Fontaynes, coseigneur de Lafage, et de dame Jeanne de Boutaric. Aujourd'hui chambres d'hôtes.","architecture":"Salles sur Hers, L'ancien château-Fort se dresse à l'angle Nord-Est de la ville. Magnifique construction du XIIe siècle, entourée d'un grand parc, restauré et transformé au XVIe siècle. Il reste de la construction primitive une grande et belle tour, au Nord, bâtie en petit appareil et qui a été abaissée de prés de trois mètres. Aux pieds de la tour traces des fossés. la tour féodale primitive, de plan quadrangulaire, est à trois étages sur rez-de-chaussée et étage de comble. Le rez-de-chaussée est voûté. Un bel escalier en pierre de taille et en forme de spirale donne accès aux étages, composés chacun d'une vaste salle à plafond élevé et servant de magasin à grains. Planchers et toiture ont disparus. Ce donjon faisait parti de l'ancien château-manoir de Salles, d'une grande hauteur et construite en bel appareil.  La forme de la tour carrée, le style de ses fenêtres à meneaux rappellent les constructions de la seconde moitié du XVIe siècle, car elle a dû subir une transformation et une restauration durant cette période.  Ancienne bastide de la fin du XIIIe siècle (1271) par Alphonse de Poitiers, frère de Louis IX. Le château avait été démoli vers 1860, dame Irma Alquier, épouse Roques, fit démolir le vieux château et sa chapelle pour construire à la place un grand immeuble,  plus confortable, mais sans le cachet du vieux manoir. \r\n Le château de Bel-Aspect a  été construit  en 1701  sous le règne de Louis XIV. Cest une très belle demeure, fort bien conservée au milieu dun nid de verdure.","habitants":"Seigneurs de Montesquiou                                                                 Seigneur dAustry de Canneville\r\n        \"","divers":"hâteaux à Salles sur l'hers  celui de Salles et celui de Galinières dit de Bel-Aspect.","gps":"","images":["../image/image_11/11_Salles_sur_Hers_1.jpg","../image/image_11/11_Salles_sur_Hers_2.jpg","../image/image_11/11_Salles_sur_Hers_3.jpg","../image/image_11/11_Salles_sur_Hers_4.jpg","../image/image_11/11_Salles_sur_Hers_5.jpg","../image/image_11/11_Salles_sur_Hers_6.jpg","../image/image_11/11_Salles_sur_Hers_7.jpg"]},"Consult_chateau_formulaired215":{"id":"Consult_chateau_formulaired215","dept":"11","canton":"Sallèles d","commune":"Sallèles d","nom":"Sallèles_Aude","type":"Château","periode":"XV-XVII","histoire":"A Sallèles d'Aude plusieurs châteaux celui  de la Roque, de Truilhas, de Fon-Delon, celui dit de François I et de la Bourgade.                                                                                          SALLELES  Il est difficile dexpliquer lorigine du nom de Sallèles. Néanmoins, on peut émettre lhypothèse que « Salellea »est formé de 2 mots latins « Salis » et « Ellea » que lon peut imaginer comme « magasin à sel ».   Situé en face du jardin du Roy, le château de François 1er devait exister au XIIe siècle avec ses trois tours moyenâgeuses.  Il a été habité par différents seigneurs et on note tout particulièrement la visite de François 1er en 1542. Sur les trois tours du château, une seule reste intacte. Puis le mot sest déformé en « Salela » après le Moyen-Age pour devenir Sallèles Rive dAude en 1790 et Sallèles dAude. En effet, favorisé par la présence sur place de grandes quantités dargile, deau, de combustibles et de bonnes voies de communications, un important atelier de poterie se développe. A cette période, lactivité portuaire de Sallèles dAude repose sur le transport du vin et bien sûr la production de briques, tuiles, canalisations, amphores et vaisselle courante.                                                                                                                                                       La Bourgade, EHPAD privé, repris en 2014 par un groupe, est situé en pleine campagne, dans un château (ancien domaine viticole) qui fut restauré en 1994.","architecture":"Sallèles d'Aude, le château dit de François Ier, seul lextérieur est actuellement visible. Souvent remanié, cest lun des rares bâtiments style Renaissance. Il a été habité par différents seigneurs et on note tout particulièrement la visite de François 1er en 1542. Sur les trois tours du château, une seule reste intacte. Ce bâtiment classé \"Monument Historique\" a été agrandi dans la deuxième moitié des XVIIe et XVIIIe siècles. Il se compose de deux corps de bâtiments en équerre bordant une cour. Laile sud constitue la partie la plus ancienne. A lintérieur, les divisions modernes ont modifié la distribution dorigine et fait disparaître les cheminées. A létage, on note la présence dun décor peint du XVIe siècle. Dans laile ouest, on relève une cage descalier avec rampe de ferronnerie datée de 1739.                                                                                                            Roques; corps de logis rectangulaire à trois niveaux  pavillon d'entrée saillant plein cintre s'étage sur piliers avec terrasse au troisième étage, flanqué en angle intérieur d'une tour carrée avec mâchicoulis et toit à quatre pans.                                                      Truilhas, corps de logis rectangulaire à deux niveaux fenêtres du deuxième étages avec fronton redondant et deux tour carré en façade toit  plats sur terrasse.                                                          Bourgade corps de logis rectangulaire  à trois niveaux  à sept travées pavillons saillants aux extrémité  de trois travées l'ensemble à toit plats.                                                                                      Fon-Delon de plan en U à deux niveaux  tour accolée d'une tourelle à toit oriental  pointu sur angle gauche.","habitants":"François Premier\r\n        \r\n        \"","divers":"A Sallèles d'Aude plusieurs châteaux celui  de la Roque, de Truilhas, de Fon-Delon, celui dit de François I et de la Bourgade","gps":"","images":["../image/image_11/11_Salleles_Aude_1.jpg","../image/image_11/11_Salleles_Aude_2.jpg","../image/image_11/11_Salleles_Aude_3.jpg","../image/image_11/11_Salleles_Aude_4.jpg","../image/image_11/11_Salleles_Aude_5.jpg","../image/image_11/11_Salleles_Aude_6.jpg"]},"Consult_chateau_formulaire4e82":{"id":"Consult_chateau_formulaire4e82","dept":"11","canton":"Villemoustaussou","commune":"Conques sur Orbiel","nom":"Saptes","type":"Château","periode":"XVI","histoire":"SAPTES,  à l'origine importante fabrique de draps par les frères Saptes originaire de Tuchan ,Vers 1540, Pierre de Sapte drapier. Vers 1750, François Castanier  propriétaire. Pierre de Laporterie assure la succession, mais avec moins d'activité à Roquecourbe une autre manufacture. La crise à la fin du règne de Louis XV,  sonne le glas de la manufacture des Saptes. La nouvelle propriétaire, la marquise de Poulpry vend le château au docteur Sabatier, médecin à Carcassonne. Quelques années avant la Révolution, le château des Saptes devient un simple domaine rural. Ce domaine devient en 1792, la propriété de Mme d'Urre, née de Mac-Mahon. L e marquis passa son enfance dans le château familial de Saptes situé à Conques sur Orbiel, propriété devenu familiale par son rachat en 1792 par Théodorine de Mac-Mahon, son arrière grand mère paternel. La famille d'Urre d' Aubais, originaire du Dauphiné, et l'une des plus anciennes de cette région, était venue à la suite de mariages, se fixer en Languedoc sous le règne de Louis XV. Le marquis d'Urre, sera selon ses dernières volontés, inhumé au château des Saptes en 1927. Il est le dernier descendant de cette dame de  Mac-Mahon, comtesse d'Urre.","architecture":"Saptes, le château des Saptes fut construit, s'appelait, le moulin de la Torte où les frères Saptes s'établirent, rappelons le, une manufacture de draps fort célèbre qui obtint, sous Colbert, le titre de Royale. Le château date du premier quart du XVIe siècle   occupe un vaste quadrilatère régulier, ses murs solides  d'enceintes de quatre vingt-dix centimètres d'épaisseur et sobrement décorés, sont flanqués aux angles par des tours rondes braquant à tous les étages leurs multiples canonnières dans toutes les directions. La nécessité de la défense d'une cité ouvrière isolée en pleine campagne, les a conduits à organiser une sorte de place forte capable de résister à une attaque venue du dehors ou une entreprise des ouvriers eux-mêmes. Sur la façade Nord, les deux grosses tours d'angle, cylindriques de même hauteur et de même diamètre, sont précédées de deux autres tours semblables de forme, mais plus petites et moins hautes Ce grand escalier est logé dans une tour intérieure noyée au centre de la construction. On y accède du rez-de-chaussée par un passage voûté assez étroit. La tour formant cage de l'escalier est éclairée par de larges baies donnant sur la cour intérieure. Aucune modification importante n'a été apportée à la conception des installations manufacturières entre 1534 et 1779. Le château a été surélevé d'un étage entre 1663 et 1689. Lices et fausses-brayes ont disparu au XVIIIe siècle.","habitants":"Famille de François Castanier \r\n        \"","divers":"Château de Saptes à Conques sur Orbiel","gps":"","images":["../image/image_11/11_Saptes_1.jpg","../image/image_11/11_Saptes_2.jpg","../image/image_11/11_Saptes_3.jpg","../image/image_11/11_Saptes_4.jpg","../image/image_11/11_Saptes_5.jpg"]},"Consult_chateau_formulaire47a4":{"id":"Consult_chateau_formulaire47a4","dept":"11","canton":"Quillan","commune":"La Serpent","nom":"Serpent","type":"Château","periode":"XIV","histoire":"SERPENT, au Moyen-Age, le nom antique que porte la seigneurie de La Serpent, le fort ou la place forte de La Serpent, du XVIIIe siècle.   Ce village du Haut Razès se trouve mentionné pour la première en 1319 dans des documents relatifs au Salin de Carcassonne. Les seigneurs de La Serpent sont issus alors de la maison de Rivière. Ils doivent hommage pour La Serpent, Lion et Bouriège, aux seigneurs de Mirepoix, dont, à lépoque considérée, Jean II de Lévis. Vers 1389 ou 1390, le fief change plusieurs fois de main. Il passe dabord à la maison de Vivier, suite au mariage de Gabelle de Rivière avec Gaucelin du Vivier ; il passe ensuite à la maison de Belcastel, via le mariage de leur fille, Gaillarde du Vivier, seigneuresse de La Tour en Fenouillèdes, avec François de Belcastel. En 1432, Bernard Guillaume de Belcastel rend hommage à Philippe de Lévis II pour les lieux de Bouriège, Lion et La Serpent. En 1441, Gausselin de Belcastel, seigneur du Vivier, réitère cet hommage à Philippe de Lévis II.Entre 1444 et 1452, le fief de La Serpent change encore de main par deux fois. En 1444, cest noble Roger de Senesplède qui rend hommage à Jean de Lévis IV ; et en 1459, noble Arnaud dAx. La famille dAx, ou Dax, conservera ce fief jusquau mariage de Pierre Hippolyte de Béon Cazaux avec Jeanne Dax de La Serpent , jusqu'en 1672, celui-ci devient alors seigneur de La Serpent. Aujourd'hui propriété de M. A. Caizergues.","architecture":"Magnifique château datant du XVIIe siècle situé à lentrée du village, il représente une réduction architectonique du château de Versailles. De plan en U avec corps de logis de trois niveaux flanqués aux angles de tours carrées.","habitants":"Seigneur Gausselin de Belcastel\r\n        \"","divers":"Château et commanderie de Serpent à Plaignes","gps":"","images":["../image/image_11/11_Serpent_1.jpg","../image/image_11/11_Serpent_2.jpg","../image/image_11/11_Serpent_3.jpg","../image/image_11/11_Serpent_4.jpg","../image/image_11/11_Serpent_5.jpg","../image/image_11/11_Serpent_6.jpg"]},"Consult_chateau_formulaire32c4":{"id":"Consult_chateau_formulaire32c4","dept":"11","canton":"Quillan","commune":"Serres","nom":"Serres_Aude","type":"Château","periode":"XVI","histoire":"SERRES,  cité en 1209, le seigneur  en 1283 était l'évêque d'Alet toujours aux évêques d'Alet jusqu'en 1347, au XVIe siècle le château est construit sur les ruines de l'ancien modifié au XVIIe siècle.  Le site ne semble pas avoir été la cible des attaques des troupes Royales de Simon de Montfort, modification de l'architecture dessiné au milieu du XIXe siècle. par les frères Bühler, ce parc à l'anglaise s'étend sur une dizaine d'hectare aux portes de Carcassonne. construit au XVIe siècle et a accueilli de nombreuses grandes familles du Languedoc. Il y a un peu plus d'un siècle, il est repris par la famille Le Marié-Tallavignes.                                                                                            Le château de SERRES de TALLAVIGNES, les comtes de Tutavina produisent alors du vin dans la région de la Rioja et résident à Burgos. Le condé de Tutavina quitte lEspagne au milieu du XVIe siècle et sinstalle en Languedoc où il plante des vignobles. Décidé à créer une dynastie de propriétaires terriens et viticulteurs en France, il francise son nom, qui devient Tallavignes en 1595 et il unit ses armoiries espagnoles à celles quil choisit en France et qui représentent un cep de vigne taillé par une serpe dargent. 420 années plus tard, la famille Le Marié-Tallavignes perpétue toujours cette tradition ininterrompue et met à lhonneur les meilleurs terroirs du Languedoc au travers de sa collection de vins.","architecture":"Le château de Serres a été construit au XVIe siècle du château dont lorigine remonte à la Renaissance, remanié au fil des siècles avec une façade du XVIIIe siècle,  maison forte au XVIe siècle, construite sur les \"ruines d'une construction médiévale.  En 1977, son parc a été classé site naturel. Des conditions de vieillissement optimal sont garantis par la cave semi-enterrée qui bénéficie d'une fraîcheur naturelle.De plan carré à quatre étages avec fenêtres à meneaux, échauguettes et bretèches. Serres de Tallavignes de plan rectangulaire à deux niveaux  flanqué de quatre tours carrées en angles, toitures en croupe.","habitants":"Famille de Le Marié-Tallavignes\r\n        \"","divers":"Château de Serres et de Serres de Tallavignes.","gps":"","images":["../image/image_11/11_Serres_Aude_1.jpg","../image/image_11/11_Serres_Aude_2.jpg","../image/image_11/11_Serres_Aude_3.jpg","../image/image_11/11_Serres_Aude_4.jpg","../image/image_11/11_Serres_Aude_5.jpg","../image/image_11/11_Serres_Aude_6.jpg"]},"Consult_chateau_formulaire89c1":{"id":"Consult_chateau_formulaire89c1","dept":"11","canton":"Trèbes","commune":"Arquettes  en Val","nom":"Serviès_Aude","type":"Château","periode":"XII-XV","histoire":"A Serviès, le château de Serviès  et à deux kilomètres au nord le château d'Arquettes A l'opposée à Villard en Val un château.                 \r\nSERVIES,    était autrefois une seigneurie dont le seigneur était dans le dernier quart du XVe siècle, époque ou fut construit le château, Jean de Castelnau, gouverneur de Lombers. Son fils ou petit-fils Antoine-Vital de Castelnau, co-seigneur de Cuq et de Serviès, fut capitaine du château de Lombers, puis lui succéda son frère Guy. Pierre de Castelnau-Serviès s'étant fait chevalier de Malte, en 1623 il légua sa seigneurie à sa nièce.                                                                                                                                         ARQUETTES Après avoir été possédée au Xe siècle par labbaye de Lagrasse, au XIIe siècle par les vicomtes de Carcassonne et au XIIIe siècle par Olivier de Termes, la seigneurie dArquettes appartenait dès 1300 au chapitre cathédrale  de Carcassonne. En 1775 Mr de Lassalle était seigneur dArquettes.                                                          VILLARD en VAL  conserve les traces d'un riche passé comme en témoignent son ancien château seigneurial et son église romane aux belles arcatures lombardes.\r\nBerceau de l'écrivain Joseph Delteil (1894-1978), un Sentier-en-Poésie ouvert toute l'année et un festival annuel  perpétuent l'oeuvre et l'art de vivre de cette grande figure de la littérature du XXe siècle.","architecture":"Arquettes, dominant le village, son château du XIIe flanqué de de tours, restauré au XVIe siècle , ne manque pas de charme . Le château de plan rectangulaire à trois niveaux toit à deux pans flanqué de trois tours rondes et une carrée toute crénelée.\r\nServiès une maison forte de trois niveaux les tours rondes et carrée encerclent un corps de logis de plan carré toit en croupe. Le château de Serviès présente un corps de logis dont les ouvertures ne sont pas antérieures au XVIIIe siècle et flanqué d'une massive tour circulaire dont la toiture a été arasée,  pendant la Révolution. Cette tour est construite dans un matériau composite blocs de pierre bien appareillés, petit appareil, lits de brique, qui montre que le bâtiment a dû subir beaucoup de remaniements depuis le XVIe siècle. L'intérieur conserve un escalier et une cheminée du temps de Louis XIII .\r\nLe monument \"château de Villar-en-Val\" est une propriété privée. Ce monument fait partie du recensement immeubles  datant du XVIIe siècle.","habitants":"Seigneur Mr de Lassalle\r\n        \r\n        \"","divers":"le château de Serviès  et à deux kilomètres au nord le château d'Arquettes A l'opposée à Villard en Val un château.","gps":"","images":["../image/image_11/11_Servies_Aude_1.jpg","../image/image_11/11_Servies_Aude_2.jpg","../image/image_11/11_Servies_Aude_3.jpg","../image/image_11/11_Servies_Aude_4.jpg","../image/image_11/11_Servies_Aude_5.jpg","../image/image_11/11_Servies_Aude_6.jpg","../image/image_11/11_Servies_Aude_7.jpg","../image/image_11/11_Servies_Aude_8.jpg","../image/image_11/11_Servies_Aude_9.jpg"]},"Consult_chateau_formulairebe3e":{"id":"Consult_chateau_formulairebe3e","dept":"11","canton":"Sigean","commune":"Sigean","nom":"Sigean_Lac","type":"Chateaux","periode":"XII-XVIII","histoire":"Trois châteaux à Sigean dont celui du Lac (vestiges)celui de la Pinède et de Pech-Maho pas d'information historique pour ses deux derniers.                                                                                   SIGEAN-Lac, Lexistence du château est attestée dès le XIe siècle. Il dépendait de larchevêque de Narbonne, baron de Sigean. Protégé par une enceinte, le bourg regroupé autour du château sétendit au-delà des murailles à partir du XVe siècle. En 1659, le traité des Pyrénées mit fin à quatre siècles de conflits, opposant le Royaume de France à lAragon puis à lEspagne. Au cours de cette période, la ville proche de lancienne frontière fut détruite à plusieurs reprises.                                                                          LAC, est le nom féodal d'une famille considérable qui, divisée en plusieurs, branches donne des familiers aux comtes de Toulouse et aux vicomtes de Narbonne, des chevaliers qui sont parmi les premiers du Narbonnais, des légistes, des avocats qui prennent part durant de longues années à l'administration de la ville de Narbonne et aux plus importantes affaires du pays. Bérenger et Raymond du Lac sont les premiers seigneurs de cette maison dont on trouve trace dans les anciennes chartes. Nous savons qu'en 1114 la seigneurie du Lac appartient déjà à la vicomté de Narbonne, pour preuve l'engagement  passé entre le vicomte de Narbonne Aymeric II et l'abbaye de Lagrasse. Le 6 septembre 1445, le comte Gaston de Foix achète la Vicomté de Narbonne aux derniers survivants de l'ancienne famille vicomtale, la transmet à son fils qui l'offre à son oncle le Roi Louis XII en échange du duché de Nemours, le 19 novembre 1507. Après la réunion de la vicomté à la Couronne, de nombreuses familles de la noblesse mais aussi de la bourgeoisie narbonnaise vont rivaliser d'empressement pour obtenir du Roi, un château, des terres ou des titres nobiliaires. Le château du Lac sera aliéné à titre d'engagement à messire de Narbonne peu avant 1523. Vers l'année 1557, il passe ensuite à Bernard de Narbonne-Lomagne.  Plus tard Guillaume de Montredon déjà en possession du château de Mattes près de Portel aurait acquis la seigneurie du Lac.","architecture":"Au château du Lac, vivait le comte de Lareinty-Tholozan, un homme particulier qui mena une vie atypique. Issu des plus illustres familles de France, marié à la princesse Demidof de la cour de Russie, le comte menait grande vie. Dans les années qui suivirent la Grande Guerre, son train de vie, sa gestion du domaine fantaisiste et les crises viticoles le conduisirent  à la ruine. Quoique ayant eu une conduite exemplaire pendant la guerre de 1914-1918 il revêt l'uniforme de l'armée allemande en 42. Adopté pour des raisons dynastiques par son beau-père Michel Mikhaïlovitch Kotchoubey, Ataman d'Ukraine, il porta le titre de prince russe et hérita ainsi du territoire Ukrainien. Lorsque Adolphe Hitler rompt le pacte germano-soviétique de non agression réciproque, le comte voit là la possibilité de s'asseoir sur son trône. Le comte périt fusillé à Narbonne en 1944 pour collaboration ouverte avec l'occupant avant qu'un télégramme affirmant qu'il était agent double au service des anglais n'arrive. Aujourd'hui, il ne reste du château que des ruines et l'oubli s'installe. Aujourd'hui les ruines du château trônent au milieu des vignes comme les vestiges d'un douloureux passé que l'on souhaiterait effacer. Les seigneurs du Lac sont tombés dans l'oubli, laissant place à de grandes familles dont la noblesse ne fut pas un rempart contre cette sombre destinée.   \r\nChâteau de la Pinède aujourd'hui maison de repos.","habitants":"Bernard de Narbonne-Lomagne\r\n        \"","divers":"Vestiges du château du Lac (gravure en noir avant et vestiges après), la Pinéde et Puech-Maho.","gps":"","images":["../image/image_11/11_Sigean_Lac_1.jpg","../image/image_11/11_Sigean_Lac_2.jpg","../image/image_11/11_Sigean_Lac_3.jpg","../image/image_11/11_Sigean_Lac_4.jpg","../image/image_11/11_Sigean_Lac_5.jpg","../image/image_11/11_Sigean_Lac_6.jpg","../image/image_11/11_Sigean_Lac_7.jpg"]},"Consult_chateau_formulairefc9c":{"id":"Consult_chateau_formulairefc9c","dept":"11","canton":"Quillan","commune":"Saint-Ferriol","nom":"St_Férriol","type":"Château","periode":"XVI","histoire":"St-FERRIOL, le château de Saint-Férriol, qui date du XVIe siècle, est un exemple bien conservé de larchitecture de cette époque charnière de la fin de la Renaissance. Les seigneurs de Saint-Ferriol furent assez nombreux depuis le XIVe siècle. Ainsi on connaît un certain Pierre Roques, dAlet, qui eut maille à partir avec lautorité ecclésiastique, puis Pierre Martin et les familles de Plaigne et de Peyrat. La famille seigneuriale la plus connue demeure celle dEspéronnat qui est à lorigine de la construction du château et portait le titre de baron de Saint-Ferriol. Noublions pas quun Jean dEspéronnat, curé dEscouloubre au XIXe siècle, est vénéré tel un saint pour avoir construit un canal dirrigation qui a pu alimenter en eau ce village du piémont pyrénéen. Le fief de Saint-Ferriol appartient, après avoir été tenu par la famille dEspéronnat, à la suite d'une alliance entre les deux familles, à la maison Dax issue d'une ancienne lignée de consuls de la cité de Carcassonne au Moyen-Age anoblis par lettres patentes du roi Charles VII le 1er juillet 1457 et implantée dès le XVe siècle en haute vallée de l'Aude notamment à Axat, Le Serpent et Leuc.","architecture":"Saint-Férriol, encadré par le Pech (632 m) et le Roc de la Dent (584 m) est un petit village érigé sur un point culminant avec un imposant château, édifice des XVIe-XIXe siècle.   Le village possède le château de Dent  qui sera inhabité dès le début du XVIe siècle et dont il ne reste aujourdhui que quelques structures. Château de st Férriol  qui date du XVIe siècle, est un exemple bien conservé de larchitecture de cette époque charnière de la fin de la Renaissance. de plan rectangulaire à trois niveaux , toit à deux pans, deux pavillons carrés en légère saillit sur les extrémités et bâtiments en retour d'équerres sur la face opposée à niveau inférieur, fenêtres à meneaux.","habitants":"Familles de Plaigne\r\n        \r\n        \"","divers":"Château de Saint-Férriol","gps":"","images":["../image/image_11/11_St_Ferriol_1.jpg","../image/image_11/11_St_Ferriol_2.jpg","../image/image_11/11_St_Ferriol_3.jpg","../image/image_11/11_St_Ferriol_4.jpg","../image/image_11/11_St_Ferriol_5.jpg"]},"Consult_chateau_formulaire47f0":{"id":"Consult_chateau_formulaire47f0","dept":"11","canton":"Castelnaudary","commune":"Saint Jean de Plats","nom":"St_Jean_Plats","type":"Château","periode":"XV","histoire":"ST-JEAN-PLATS  est un château du XVIIIe siècle, situé dans le Lauragais.  Chambres d'hôtes.                                                                                                                                                             A Saint-Jean des Plats, le château existe  depuis  le Moyen-Age. Une peinture représente \"la Bataille de Castelnaudary\". En 1630, Gaston dOrléans, le propre frère du roi Louis XIII, tente dorganiser un soulèvement général du royaume. Henri de Montmorency, influencé par la reine-mère Marie de Médicis, le soutient. Il rallie les États du Languedoc. Une armée royale se met donc en route, commandée par le maréchal de Schomberg afin de faire barrage à celle commandéePar Henri de Montmorency. La rencontre a lieu devant Castelnaudary, le 1er septembre 1632.\r\nLa famille Francqueville possède la liste des nombreux propriétaires depuis 1552. Elle a repris cette propriété en 2004 lors de la naissance de son huitième enfant pour en faire une demeure familiale et pouvoir y recevoir tous ses enfants et petits-enfants. Elle ouvre aujourdhui ses portes à dautres familles, qui comme elle, pourront profiter du bonheur dêtre ensemble. Transformé en  hôtel restaurant.","architecture":"A St-Jean de Plat, au départ il s'agissait d'un château fort à quatre tours transformé au fils du temps en demeure d'agrément. Il reste sur le domaine de nombreux vestiges de cette époque (mur, tour, pierres.). On peut avoir une idée de ce à quoi il devait ressembler en 1632 puisqu'il est représenté sur une toile de l'école française du XVII siècle  que l'on peut admirer à Versailles.  La construction du château actuel semble très liée à celle du canal du midi de part son emplacement, son système d'eau (bassin et buffet d'eau) et ses espace-terrasses creusées par des ouvriers du canal.","habitants":"Famille Francqueville\r\n        \"","divers":"Château de Saint-Jean de Plats","gps":"","images":["../image/image_11/11_St_Jean_Plats_1.jpg","../image/image_11/11_St_Jean_Plats_2.jpg","../image/image_11/11_St_Jean_Plats_3.jpg","../image/image_11/11_St_Jean_Plats_4.jpg"]},"Consult_chateau_formulaire0adf":{"id":"Consult_chateau_formulaire0adf","dept":"11","canton":"Fabrezan","commune":"Saint-Laurent de la Cabresrisse","nom":"St_Laurent_Cabresrisse","type":"Château","periode":"XVIII-XIX","histoire":"Trois châteaux de viticulteurs à Saint-Laurent de la Cabresrisse; celui de  Caraguilhès, de Sabine et  du Palais.                                                                                                    CARAGUILHES  était lun de ces domaines et lun des plus importants, situé sur le terroir de Boutenac, Caraguilhes couvre une surface de 600 hectares comprenant un vignoble de plus de 100 hectares dun seul tenant, entouré par 500 hectares de garrigue. Epargné à travers les âges, le domaine ne sera jamais morcelé et restera longtemps le fief des seigneurs de Montredon, qui édifièrent l'actuel château sous Henri IV. Lorsque le château a été acheté à la fin des années 1950, le propriétaire, Lionel Faivre, la garrigue forme autour de la vigne un cirque grandiose et naturel qui protège  comme un écrin les terres cultivables.  Des siècles plus tard, en 1958, Lionel Faivre, un vigneron bien établi en Algérie, prend en charge Caraguilhes avec pour objectif de perpétuer la tradition de la propriété et de faire un vin authentique, En 2005, Pierre Gabison, épris des vins de Caraguilhes et de la région,                                       SABINE, dans cette superbe propriété viticole datant du XIXe siècle, Catherine et Bernard Mallent vous accueillent afin de vous faire découvrir tous les vins du château La Sabine ainsi qu'une gamme de produits régionaux.                                               PALAIS cet ancien couvent du XIIe siècle \"Palatio, domus Sanctae Mariae de Palacio\" a été repris comme propriété familiale en 1820, et retrouve à cette époque son nom francisé. Aujourd'hui, Anne et Xavier de Volontat vous accueillent dans l'ancienne chapelle du couvent transformée en caveau pittoresque. \r\nSitué entre vignes et garrigue à proximité du village de Saint-Laurent-de-la-Cabrerisse, le domaine est dans la famille depuis le XIXe siècle.","architecture":"Garaguilhès; de plan rectangulaire à deux niveaux et attiques à huit travées toit à deux pans en tuiles, flanqué aux extrémités de deux pavillons de trois étages et attiques toits à quatre pans.                                                                                                                       Sabine, composé de deux bâtiments du XIXe siècle de deux niveaux dont celui de l'arrière plus élevé à un seul pan.                  Palais du XIXe siècle                                                                                            Palais  remanié au XIXe siècle de plan rectangulaire escalier à double révolution.","habitants":"Lionel Faivre\r\n        \"","divers":"A Saint-Laurent de la Cabresrisse; xhâteau de  Caraguilhès, de Sabine et  du Palais.","gps":"","images":["../image/image_11/11_St_Laurent_Cabresrisse_1.jpg","../image/image_11/11_St_Laurent_Cabresrisse_2.jpg","../image/image_11/11_St_Laurent_Cabresrisse_3.jpg","../image/image_11/11_St_Laurent_Cabresrisse_4.jpg","../image/image_11/11_St_Laurent_Cabresrisse_5.jpg"]},"Consult_chateau_formulaire67ed":{"id":"Consult_chateau_formulaire67ed","dept":"11","canton":"Narbonne","commune":"Bizanet","nom":"St_Martin_Toques","type":"Forteresse","periode":"XII","histoire":"St-Martin de Toques, vers 978, un château sur une colline est cité dans un texte.  Bâti à l'époque féodale, le château devait servir à protéger la route qui conduit de la vicomté de Narbonne aux Corbières. Il appartient à la vicomtesse Adélaïde de Narbonne. Château cité au  XIIe siècle. Puis dépendance des Vicomtes de Narbonne.  Au XVIe siècle, des familles d'Alezio et Castiglione, Milanais qui s'installent dans le narbonnais à la suite du cardinal de Ferrare, l'abbé de Fontfroide, le château subit de nombreuses modifications architecturales : Ouvertures de fenêtres, aménagement des salles.  Les révolutionnaires en 1792 suppriment la paroisse. Le château est abandonné.  A la fin du XXe siècle, la ruine est achetée puis rénovée.  Au XVIIIe siècle, l'édifice semble avoir été abandonné comme lieu de résidence. Tas de ruines imposant, il fut racheté et restauré, dès 1990, par l'acharnement de propriétaires privés.","architecture":"Sur la butte est posé le château féodal de Saint-Martin de Toques, parfois aussi nommé : Saint Martin de Telgue, ce n'est pas par hasard qu'un château ait été construit sur cette colline, la construction fortifiée permet la surveillance des vallées avec leurs routes utilisées pour rejoindre Narbonne. Posé sur un rocher, le château semble presque inattaquable. Évidemment, avec les siècles de confort et l'inutilité dans notre siècle de paix d'avoir des murs borgnes, de nombreuses fenêtres ont été ouvertes. Mais avec son imposant donjon central et habitable, ses crénelages ainsi que ses tours d'angle rondes, la construction a gardé son image de forteresse médiévale.","habitants":"Vicomtesse Adélaïde de Narbonne\r\n        \"","divers":"Vestiges de l'imposante forteresse de Saint-Martin de Toques.","gps":"","images":["../image/image_11/11_St_Martin_Toques_1.jpg","../image/image_11/11_St_Martin_Toques_2.jpg","../image/image_11/11_St_Martin_Toques_3.jpg","../image/image_11/11_St_Martin_Toques_4.jpg","../image/image_11/11_St_Martin_Toques_5.jpg","../image/image_11/11_St_Martin_Toques_6.jpg","../image/image_11/11_St_Martin_Toques_7.jpg"]},"Consult_chateau_formulairec718":{"id":"Consult_chateau_formulairec718","dept":"11","canton":"Montréal","commune":"Saint-Martin-le-Vieil","nom":"St_Martin_Vieil","type":"Vestiges","periode":"XII","histoire":"A Saint-Martin le Vieil, vestiges du château, et autre châteaux viticoles et abbaye de Villelongue.                                                                                                                                                 ST-MARTIN-VIEIL, cest en 1180 quon trouve la première mention turri et fortia et dominio de San-Martino veteri et dun Saint-Martin, Guillaume, coseigneur, avec Ugo de Rocon et Géraud et Raymon Forti. En 1212, Simon de Montfort en fait donation à labbé et au monastère de Villelongue. En mai 1573, le village fut pris par les protestants. En 1578, il est décrit ruiné. Un linteau de la petite tour, porte la date de 1678, signe de reconstruction. En 1759, les notes du curé de Saint-Martin le Vieil citent \"un antique château, situé sur une haute terrasse, entourée de fossé où il y avait autrefois un pont-levis. Le château est flanqué de trois tours, deux du côté du nord, dune hauteur et d'une grosseur assez considérable, et lautre à lEst, carrée, imposante. Le dernier Saint-Martin, seigneur du lieu, participa à lassemblée générale des trois ordres de la sénéchaussée de Carcassonne en 1789. Particularité de Saint Martin le Vieil : les Cluzels, habitat troglodytique remontant peut-être à l'époque carolingienne et occupé jusqu'au XVIIe siècle.","architecture":"Lensemble  de saint-Martin le Vieil occupe un éperon rocheux au bout du village. Un donjon pentagonal à plusieurs niveaux (rdc, premier étage sur voûte, deuxième sur plancher, troisième sur voûte, quatrième avec un arc de refend, et sans doute une terrasse) est relié par les restes dune courtine à une tour carrée saillante et talutés, dont subsistent quatre niveaux (dont un sous sol creusé dans le roc côté cour). Cette tour noffre que de petites ouvertures qui semblent impropres à une défense rapprochée ; de même, le donjon ne présente pas de meurtrières sur lextérieur. La défense devait
