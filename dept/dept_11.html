e Rougier devient baron de Ferrals, maître dhôtel ordinaire du roi, François de Rougier meurt à Rome en 1575 : la seigneurie passe à son fils aîné Barthélémy, puis à son cadet François, mort en 1624 sans descendance mâle. La seigneurie passe au mari de la fille aînée : Jean-Gabriel de Gaulejac. Fin XVIIe siècle : la baronnie est élevée au rang de marquisat. En 1730 : Le dernier Gaulejac, Henri-Louis, marquis de Ferrals, laisse ses biens à sa veuve Catherine de Barthélémy. Ferrals passe ensuite aux deux frères de la veuve, puis à la fin du XVIIIe siècle. à sa nièce, épouse du marquis de Noé.  \r\nAu  XIXe siècle , Ferrals passe par alliance à la famille de Roquelaure, puis à la famille de Virieu, en 1895, à loccasion du passage de la société détude scientifique de lAude, en 1920 : la famille de Virieu très touchée par la grande guerre décide de vendre le domaine et le château. Ferrals est désormais propriété de Joseph-Henri Dupuy-Mazuel, qui sen dessaisit en 1932 au profit de Marcel Rousset, qui le vendit à son tour en 1936 à madame de Cransac de Panat. En 1956 : Le docteur Jean Gally achète le château rachat en 2012 du château par Mr Rémy Baysset  propriétaire actuel.                                                                                  ST-PAPOUL ancien palais épiscopal.","architecture":"en 1564-1565 : Démarrage des travaux du château neuf, à proximité du château vieux en 1565. vers 1568 : construction du château neuf,  extérieurement, le château est une forteresse bien défendue, avec six tours losangées, un pont levis et de larges fossés. Larchitecte était bien au fait de larchitecture militaire française de lépoque. Intérieurement, avec sa façade renaissance et ses grandes pièces bien éclairées. De vastes sous-sols apportent un intérêt supplémentaire à lensemble.                                      Abbaye de Saint-Papoul  En 1119,  fut possession de labbaye dAlet, alors très puissante. Son âge dor intervient au XIVe siècle grâce à la création de lévêché de Saint-Papoul par le pape Jean XXII, en 1317.  Par la suite, labbaye connu différentes agressions notamment le pillage des « routiers » en 1361 ou la colère des troupes protestantes en 1595. Lattention des évêques se porta donc rapidement sur létat de dégradation de labbaye. Pierre Soybert, évêque dès 1426, réhabilita la totalité des bâtiments. Puis, les XVIIe et XVIIIe siècles, virent dimportants travaux de consolidation et la construction du palais épiscopal. Le cloître connaît de graves dommages à la Révolution qui fut aussi la fin de lévêché de Saint-Papoul. Il fallut attendre 1840 pour que commence sa restauration.","habitants":"Diane de Poitiers\r\n        \r\n        \"","divers":"Le château de Ferral, l'abbaye, le palais épiscopal et le château de Saint-Papoul.","gps":"","images":["../image/image_11/11_Ferrals_1.jpg","../image/image_11/11_Ferrals_2.jpg","../image/image_11/11_Ferrals_3.jpg","../image/image_11/11_Ferrals_4.jpg","../image/image_11/11_Ferrals_5.jpg","../image/image_11/11_Ferrals_6.jpg"]},"Consult_chateau_formulaire85cd":{"id":"Consult_chateau_formulaire85cd","dept":"11","canton":"Sigean","commune":"Fitou","nom":"Fitou","type":"Vestiges","periode":"XII","histoire":"FITOU,  en 990, la vicomtesse de Narbonne lègue une villa de Fictorius à Ermangaud de Narbonne. Son territoire s'étendait sur plus de trois mille hectares. La famille de Perignan possédait la plénitude des droits seigneuriaux sur Fitou et accordait à des vassaux les titres et droits qui étaient leur propriété. Au  XIIe siècle, construction d'une fortification. Le territoire de Fitou s'étend jusqu'à la limite de Salses.   En 1211, l'armée Royale commandée par Simon de Montfort  détruit le château.  Au début un grand nombre de seigneurs y régnèrent. Après la chute du château de Montségur, et la défaite des Cathares, le seigneur de Niort, hérétique, se convertit au christianisme et s'établit au château. Le 19 mai 1635 le cardinal de Richelieu déclare la guerre à l'Espagne.  Les Cabannes de Fitou, le village et le château malgré ses murailles, capitulent dès les premiers assauts. La famille d'Aragon fut la dernière seigneurie à occuper le château jusqu'à la révolution de 1789. Vers 1790, la famille d'Aragon possède terres et site de Fitou, mais elle est délogée par les révolutionnaires français.  A la fin du XXe siècle, monsieur et madame  Jacky Gaillot antiquaire  propriétaire du château reconstruisent les murs puis aménagent une buvette et un petit musée.","architecture":"Le château La date de construction de Fitou n'est pas connue, mais elle est fort ancienne  par sa situation, fut maintes fois exposé aux hasard de la guerre, il fut assiégé, brûlé et reconstruit plusieurs fois, a été pillé et brûlé en 1843. Longtemps il servit de carrière de pierre pour la construction du village actuel à la suite d'un procès-verbal de destruction émanant de la préfecture, puis les ruines menaçantes au-dessus du village et la commune n'ayant pas les moyens d'entreprendre sa restauration du vendre l'édifice à un particulier, monsieur et madame Jacky Gaillot antiquaire à Paris, qui à partir de 1972 entreprirent sa restauration.","habitants":"famille d'Aragon\r\n        \"","divers":"Vestiges du château de Fitou","gps":"","images":["../image/image_11/11_Fitou_1.jpg","../image/image_11/11_Fitou_2.jpg","../image/image_11/11_Fitou_3.jpg","../image/image_11/11_Fitou_4.jpg","../image/image_11/11_Fitou_5.jpg"]},"Consult_chateau_formulaire9dc1":{"id":"Consult_chateau_formulaire9dc1","dept":"11","canton":"Limoux","commune":"Limoux","nom":"Flandry","type":"Château","periode":"XIX","histoire":"FLANDRY, le château de Flandry à Limoux date du XIXe siècle. Il appartient à la coopérative viticole des sieurs d'Arques, depuis une trentaine d'année. Ce manoir, transformé en gentilhommière dans le cours du XIXe siècle a été construit au lieu-dit « Métairie Peyre ». Il appartient dabord à Louis Auguste Alexis Peyre, né à Limoux en 1797. Ce dernier, issu dune ancienne famille, grand propriétaire terrien, avocat, maire de Limoux, conseiller général, député de lAude, est aussi conseiller référendaire à la cour des comptes. Mêlé très jeune à la politique, il est nommé maire de Limoux par ordonnance royale du 23 août 1830. Pendant la durée de son mandat municipal, Auguste Peyre créé labattoir de la rue de lhospice ; acquiert divers terrains pour létablissement des promenades du Tivoli et du cimetière .En 1843, le château de Flandry passe aux mains du notaire Rieutort. Oscar François Rougé, loccupe en 1877 et en devient propriétaire. Comme Louis Auguste Alexis Peyre, il est avocat, conseiller général, député de lAude et franc-maçon. Elu député, Oscar Rougé entreprend de faire élever les tourelles dangle du château de Flandry. Après lui, le château de Flandry ne sera plus jamais habité.","architecture":"Flandry, corps de logis rectangulaire à deux niveaux et attiques, toiture en croupe flanqué de deux tours carrées toits à quatre pans et à l'opposée  deux tourelles toit en poivrières.","habitants":"Louis Auguste Alexis Peyre\r\n        \"","divers":"Château de Flandry à Limoux","gps":"","images":["../image/image_11/11_Flandry_1.jpg","../image/image_11/11_Flandry_2.jpg","../image/image_11/11_Flandry_3.jpg"]},"Consult_chateau_formulaired868":{"id":"Consult_chateau_formulaired868","dept":"11","canton":"Coursan","commune":"Fleury","nom":"Fleury","type":"Château","periode":"XVIII","histoire":"Plusieurs châteaux à Fleury-sur-Aude celui d'Anglès de Eric et Vianney  Fabre de Laquirou , de Tarailhan de Jean-Yves Duret, de Bouisset de  Christophe Barbier , de Négly, de Moyau  par la famille Köhler chambres d'hôtes, de Constantine, d'Anglés, de Marmorières et de Mire l'étang   tous viticole.                                                       LAQUIROU château est un domaine géré par Erika et Eckard Hug Harke.                                                                                 MARMORIERES est situé sur le flanc Ouest du massif de la Clape. Il appartient à la famille de Woillemont depuis 1826 et cest aujourdhui la huitième génération qui gère ce domaine.                                                                                                                                  NEGLY  débute au XVIIIe siècle où le château portait le nom dAncely. En 1781, la propriété pris le nom de Nerly pour enfin sappeler La Nègly en 1807. Plusieurs familles se sont succédés à la tête du domaine. Dans les années 30, la famille Piquemal sinstalle au château avant de le céder en 1992 à M. Jean Paux-Rosset.                                                                                                      MIRE-l'Etang la famille Chamayrac élabore depuis plus de quarante ans des grands vins de la Clape.","architecture":"Anglés  ce domaine possède un bâtiment en équerre, le corps de logis à deux niveaux et attiques.                                                          Laquirou   château corps de logis rectangulaire à deux niveaux toit en tuiles  deux pans pavillons légèrement saillant plein cintre avec fronton redondant flanqué à l'Est d'un corps de bâtiment rectangulaire formant un T  toiture deux pans en tuiles.                                                                                                  Marmonières; château  corps de logis oblong  rectangulaire à trois niveaux toiture à deux pans, flanqué de deux tours massives carrées à toits quatre pans.                                                       Mire l'Etang, manoir de plan rectangulaire à deux niveaux à toit plats flanqué à l'Est d'une tour carrée à trois niveaux.                      Moyau domaine de plan en U corps de logis central à deux niveaux.                                                                                                          Negly château corps de logis à deux niveaux toit à deux pans flanqué de tours carrées toitures à quatre pans  et tour complémentaire à toit à quatre pans.","habitants":"Famille de Woillemont \r\n        \"","divers":"Le domaine des Angles, le château de Laquirou, de  Marmorières, de Mire l'Etang, de Moyau, de Negly, de Tarailhan et la tour Pagèze  à Fleury","gps":"","images":["../image/image_11/11_Fleury_1.jpg","../image/image_11/11_Fleury_2.jpg","../image/image_11/11_Fleury_3.jpg","../image/image_11/11_Fleury_4.jpg","../image/image_11/11_Fleury_5.jpg","../image/image_11/11_Fleury_6.jpg","../image/image_11/11_Fleury_7.jpg","../image/image_11/11_Fleury_8.jpg","../image/image_11/11_Fleury_9.jpg"]},"Consult_chateau_formulaire5a00":{"id":"Consult_chateau_formulaire5a00","dept":"11","canton":"Sallèles-d","commune":"Ouveillan","nom":"Fontcalvy","type":"Vestiges","periode":"XII","histoire":"FONTCALVY,  la Grange de Fontcalvy,  construite entre 1297 et 1320 avec ses tours d'angle, son donjon, son chemin de ronde, est la mieux conservée des 24 granges de l'Abbaye de Fontfroide. Ces granges étaient des exploitations agricoles où travaillaient des frères \"convers\", c'est-à dire des religieux de condition modeste qui ne  pouvaient pas prétendre au titre de moine. Ces frères faisaient 20 km à pied chaque dimanche pour assister à la messe à Fontfroide.","architecture":"Construite entre 1297 et 1320 par des frères convers, la grange servait de bergerie au rez-de-chaussée, et de lieu de stockage des denrées sensibles à l'humidité dans sa partie haute. Fontcalvy est une forteresse de 20 sur 70 mètres. Sa cour est entourée de murs percés de meurtrières.  Tandis que la salle basse servait de cellier et de bergerie, la salle haute abritait les denrées craignant l'humidité, les plus précieuses. L'accès à cette salle pouvait être obstrué par un système de pont-levis au niveau de l'étage de la tour-donjon. Un seul pilier central, dit \"palmier cistercien\", soutient tout l'ensemble : les 4 superbes arcs doubleaux de la salle basse et les deux arcades de 7,60 m de large dans la salle haute. Rongé par la lèpre de la pierre à la fin des années 1970, il fut consolidé à temps grâce à un fond de sauvegarde de la caisse nationale des monuments historiques. Chaque été, la grange est le théâtre d'un spectacle de fiction historique.   La grange a échappé à la destruction au cours de la seconde guerre mondiale, grâce à l'abbé Sigal et l'architecte Nodet. En 1943, la zone libre était occupée et les troupes allemandes chargées de mettre en défense le littoral audois contre un éventuel débarquement des alliés en Méditerranée, avaient décidé de récupérer les pierres de la grange pour construire leurs défenses.","habitants":"abbé Sigal et l'architecte Nodet\r\n        \"","divers":"Vestiges du château de Fontcalvy.","gps":"","images":["../image/image_11/11_Fontcalvy_1.jpg","../image/image_11/11_Fontcalvy_2.jpg","../image/image_11/11_Fontcalvy_3.jpg","../image/image_11/11_Fontcalvy_4.jpg"]},"Consult_chateau_formulaire834a":{"id":"Consult_chateau_formulaire834a","dept":"11","canton":"Fabrezan","commune":"Fraisse de Corbières","nom":"Fraisse_Corbières","type":"Château","periode":"XIII-XVI","histoire":"FRAISSE  célèbre pour sa cité dont le château et les remparts ont été classés au patrimoine mondial de l'humanité par l'Unesco, vers 1271, un castrum est cité.\r\nEn 1390, les Aragonnais envahissent la région et s'emparent du château. En 1503, le Duc d'Albe s'empare de la ville et le saccage. Au XVIe siècle, tout en conservant les remparts médiévaux, la famille Pompadour du Languedoc le reconstruit dans un style plus moderne.","architecture":"Château du Moyen-Age dont la construction s'échelonne entre les XIe et XIVe siècles. Corps de logis en équerre à trois niveaux avec échauguettes en encorbellement sur angles, bretèche sur la porte  et remparts avec tourelle sur angle ouest.","habitants":"Famille Pompadour \r\n        \r\n        \"","divers":"Château de Fraisse-de-Corbières","gps":"","images":["../image/image_11/11_Fraisse_Corbieres_1.jpg","../image/image_11/11_Fraisse_Corbieres_2.jpg","../image/image_11/11_Fraisse_Corbieres_3.jpg","../image/image_11/11_Fraisse_Corbieres_4.jpg","../image/image_11/11_Fraisse_Corbieres_5.jpg","../image/image_11/11_Fraisse_Corbieres_6.jpg","../image/image_11/11_Fraisse_Corbieres_7.jpg"]},"Consult_chateau_formulaired868-2":{"id":"Consult_chateau_formulaired868-2","dept":"11","canton":"Limoux","commune":"Gardie","nom":"Gardie_Aude","type":"Château","periode":"XIX","histoire":"La GARDIE, décapité par la guerre la Gardie en perd son toit, après le passage des troupes d'occupation allemandes, quelque peu tonitruant. Conformément au goût de la deuxième moitié du XIXe siècle, période de grande prospérité viticole, Joseph Bouniol, seigneur terrien d'un nouveau genre, décide d'édifier un château à la mesure de sa fortune. Le célèbre Louis Garros construit le château de la Gardie, à quelques kilomètres de Vias ,  au milieu des vignes. Plus précisément, il réalise une copie conforme du château d'Azay- le-Rideau, près de trois cent ans plus tard, en 1897. A un détail près, le château de La Gardie ne possède que trois tours, contre quatre à celui d'Indre-et-Loire. En bouquet final, de somptueux jardins, imaginés par les frères Bühler, parmi les plus grands paysagistes de l'époque.  La famille Bouniol mène la grande vie. Un pavillon de chasse, des écuries et des dépendances accompagnent le château. Un monte-charge installé dans une des tours, permet d'apporter les plats dans la salle à manger. Occupé par les troupes allemandes, au moment de plier armes et bagages devant l'avancée des troupes alliées, un incendie se déclare dans la bâtisse. Peut-être que les troupes allemandes ont brûlé, dans leur précipitation, les archives militaires qu'ils ne pouvaient emporter, mettant ainsi le feu au bâtiment. Les parties hautes de la construction ont donc été dévastées et n'ont jamais été remontées.  Aujourd'hui, La Gardie appartient aux Bessière, qui ont racheté le château en 1979 et qui s'appliquent depuis à rendre toute sa splendeur à cette bâtisse. Aujourd'hui encore, d'anciens officiers, le vague à l'âme, en vacances dans la région, viennent en pèlerinage.","architecture":"Le château de la Gardie  n'est pas visitable, mais Jean Bessière ouvre souvent ses portes pour diverses activités, qui vont de la protection de l'environnement à l'accueil d'enfants. Ce château arasée suite à un incendie il a gardé son cachet jusqu'au deuxième étage se terminant aujourd'hui par des terrasses. Comble du raffinement, les murs de cette salle à manger sont ornés de toiles collées, peintes par Adrien Karbowsky, en 1898, représentant les quatre saisons.","habitants":"Famille Bouniol \r\n        \"","divers":"Château de la Gardie avant et après l'incendie.","gps":"","images":["../image/image_11/11_Gardie_Aude_1.jpg","../image/image_11/11_Gardie_Aude_2.jpg"]},"Consult_chateau_formulaire7c3b":{"id":"Consult_chateau_formulaire7c3b","dept":"11","canton":"Sallèles d","commune":"Ginestas","nom":"Ginestas","type":"Château","periode":"XIX","histoire":"deux châteaux à Ginestas, blottis entre mer et montagne le Puits-es-Pratx et le château de Vergel-Authenac chambres d'hôtes.  Et à quelques kilomètres au nord ouest le château de Pouzols viticole.                                                                                                                PUITS Es PRATX   se situe à proximité du canal du midi, au cur de la région du Minervois. Cet ancien château viticole, édifié au XIXe siècle sous Napoléon III, offre un cadre romantique et intime, propice à la détente, son restaurant, établi au sein de l'ancienne cave, vous proposera des menus gourmets.                                                      VERGEL-AUTHENAC, viticole et  chambres d'hôtes de monsieur Jean-Louis Satgé, pas d'information historique.                                                                                                          POUZOLS   L'ancien Château fortifié se trouvait sur le même emplacement que le château actuel, propriété de Mr le baron de Fournas. Fabrezan. Cette superbe résidence, entourée d'un vaste et joli parc, a été construite en 1786 par Mr de Gaillac, maréchal de camp, capitaine aux gardes françaises, seigneur de Pouzols, décédé sans postérité à Paris en 1806. Il laissa le château et la terre de Pouzols à son neveu, Mr de Fournas de la Brosse baron de Fabrezan. Mr de GaiIlac était un descendant par alliance de Pontus de La Gardie, général en chef des armées de Suède. La seigneurie de Pouzols est l'antique patrimoine des premiers de La Gardie.\r\nLe haut du Village renferme de nombreux vestiges des fortifications: Tour d'angle derrière la fontaine; - Chapelle voûtée servant de cave -Forteresse dont les murs ont 2m50 d'épaisseur, propriété de Mr Rouquet; -Maison seigneuriale, magnifique escalier en pierre, cour curieuse.","architecture":"Puits-es-Pratx, du XIXe siècle de plan rectangulaire deux niveaux à toits presque plats fronton plein centre  en façade d'entrée avec fronton semi circulaire supporté par des encadrements à refends.                                                                                                                  Vergel-Authenac  du XIXe siècle  composé d'une maison de maître, d'une maison d'hôtes, deux corps de logis rectangulaire a deux niveaux différents  accolés,  un à deux niveaux l'autre à trois niveaux toitures en croupes.","habitants":"Mr de Gaillac\r\n        \"","divers":"Château du Puits de Pratx, de Pouzols et de Vergel-Authenac à Ginestas","gps":"","images":["../image/image_11/11_Ginestas_1.jpg","../image/image_11/11_Ginestas_2.jpg","../image/image_11/11_Ginestas_3.jpg","../image/image_11/11_Ginestas_4.jpg","../image/image_11/11_Ginestas_5.jpg","../image/image_11/11_Ginestas_6.jpg","../image/image_11/11_Ginestas_7.jpg","../image/image_11/11_Ginestas_8.jpg"]},"Consult_chateau_formulaire377a":{"id":"Consult_chateau_formulaire377a","dept":"11","canton":"Bram","commune":"Gramazie","nom":"Gramazie","type":"Château","periode":"XV-XIX","histoire":"GRAMAZIE, pas d'information historique, il  est le fruit dune lente évolution temporelle : Abbaye au IXe siècle, propriété agricole au XVe siècle, propriété dagrément au XIXe, il est devenu aujourdhui un espace dédié aux loisirs, au bien-être, propice à la détente.  Reprise il y a de cela quatre ans, cette ancienne propriété familiale est entourée de vignes, sur lesquelles règne le calme olympien de la campagne audoise, bercé par lécoulement du Canal du Midi dont le lit repose non loin. C'est aujourdhui un hôtel- chambres d'hôtes grand confort.","architecture":"A Gramazie a été rajouté à l'ancien bâtiment  rectangulaire du XVe siècle un corps de logis dont la façade représente un super château de style néo-gothique à deux étages  et attiques  calés par des cordons entre étages un fronton plein cintre triangulaire, balcon sur portes doubles d'entrées. Toitures en terrasses.","habitants":"\"","divers":"Château de Gramazie et son orangerie.","gps":"","images":["../image/image_11/11_Gramazie_1.jpg","../image/image_11/11_Gramazie_2.jpg","../image/image_11/11_Gramazie_3.jpg","../image/image_11/11_Gramazie_4.jpg","../image/image_11/11_Gramazie_5.jpg"]},"Consult_chateau_formulairece3d":{"id":"Consult_chateau_formulairece3d","dept":"11","canton":"Lézignan-Corbières","commune":"Lézignan- Corbières","nom":"Grand_Caumont","type":"Château","periode":"XIX","histoire":"GRAND-CAUMONT  Au IXe siècle, le domaine appartient au roi Charles le Chauve qui offre la propriété à son neveu en lan 847.  A lépoque romaine, le domaine existe déjà il  est baptisé \"Villa Manzanetto\". Lors de la Révolution Française, le château et ses dépendances brûlent entièrement, seuls demeurent quelques vestiges des anciens bâtiments, tels que la tour et les deux portails.\r\nEn 1850 le domaine est acheté par Auguste Sarda qui reconstruit les bâtiments, implante la vigne et construit la cave. Cest à cette époque que le Grand Caumont devient un domaine expérimental présenté en modèle dans toute la région et récompensé par une prime dhonneur. \r\nEn 1906 Louis Rigal fondateur du célèbre Roquefort Rigal achète la propriété, sy installe, y fonde sa famille et y cultive la vigne pendant plus de trente ans. \r\nPuis il transmet le domaine à son fils Louis Rigal qui poursuivra son entreprise jusquà la fin des années 70, toujours dans la famille.","architecture":"Cette colline recouverte de thym, de romarin et darbustes du midi dénommée \"Capus Monti\" qui signifie \"Mont Chauve\" donnera alors son nom au \"Grand Caumont\". Quadrilatère avec un corps de logis rectangulaire à deux niveaux et attiques.","habitants":"Famille d'Auguste Sarda\r\n        \"","divers":"Château du Grand-Caumont à Lézignan Corbières","gps":"","images":["../image/image_11/11_Grand_Caumont_1.jpg","../image/image_11/11_Grand_Caumont_2.jpg"]},"Consult_chateau_formulaireb08c":{"id":"Consult_chateau_formulaireb08c","dept":"11","canton":"Narbonne","commune":"Gruissan","nom":"Gruissan","type":"Vestiges","periode":"X-XI","histoire":"GRUISSAN, en 1084 un partage arbitral signale l'existence du château de Gruissan que se disputent l'Archevêque de Narbonne et le Coseigneur installé sur le site. Le mot \"château\" est employé pour la première fois. La population s'y réfugie à chacune des nombreuses incursions des pirates. La vieille tour centrale, aujourd'hui disparue, est commune aux deux coseigneurs. En 1247, la construction de la tour ronde, qui existe encore aujourd'hui, est terminée sous l'impulsion de l'Archevêque Guillaume de Broa. En 1296- Gilles Aycelin, archevêque et seigneur de Gruissan, rachète la part de seigneurie de Bérenger de Boutenac. C'est en 1246 que Guillaume de Broa, archevêque de Narbonne, rénove et consolide le vieux château. Sa position par rapport à la mer en faisait une puissante sentinelle ainsi qu'un lieu de refuge. En 1632, sur les conseils de Richelieu, Louis XIII fait démolir les places fortes et le château est abandonné en 1582- Le château, forteresse militaire, joue un rôle important pendant les guerres de la Ligue, tantôt occupé par les partisans de Montmorency, tantôt par ceux du duc de Joyeuse, ceci à la grande souffrance des habitants, en  1597 à la fin de ces guerres, le château, débarrassé de ses militaires, est rendu à son seigneur. Mutilé, il a perdu de son importance stratégique. Il est  abandonné.                                                                                                                                                          Dans la commune le château le BOUÏS  chambres d'hôtes Frédérique Olivié propose de faire vivre à ses hôtes une véritable expérience gustative et sensorielle autour des nombreuses activités du domaine.                                                                                              Château le CAPITOUL . Les arrières grands parents maternels de Charles Mock, qui dirige l'exploitation, s'étaient installés en Algérie, où ils produisaient déjà du vin. Son grand père racheta dès les années 30 plusieurs vignes languedociennes dont le château Capitoul de la famille Bonfils,   hôtel de luxe, surplombant la Clape, aux portes du charmant village de Gruissan, a été récemment racheté par les Vignobles Bonfils.","architecture":"La tour dit de Barberousse  est tout ce qui reste d'un château bâti à la fin du Xe siècle pour observer les alentours du port de Narbonne et protéger la cité contre les invasions maritimes.  le château a été agrandi au XIIe siècle. Au XVIe siècle, Richelieu ordonna la destruction de l'édifice qui fut, ensuite, laissé à l'abandon. Aujourd'hui, le village de Gruissan, construit en circulade, entoure les ruines du château, au pied desquelles se trouve léglise paroissiale Notre-Dame de lAssomption. Le site de la tour offre un panorama assez spectaculaire, d'où l'on peut admirer tout le village ainsi que la côte, l'étang, les marais salants et le port de Gruissan.   Au centre du château, la tour prison offre une situation dobservation idéale. La seule issue de louvrage permet un contrôle facile des prisonniers et rend toute évasion difficile pour ne pas dire impossible.  La démolition de la forteresse fut décidée par Louis XIII en 1632. \r\nLédifice a servi de carrière. Ses pierres ont été réutilisées pour la construction de quelques maisons du village et de la cathédrale Saint-Just de Narbonne.\r\nBouïs, plus domaine que château,  viticole, chambres d'hôtes  construction du XXe siècle.                                                                            Le Capitoul plus manoir que château, corps de logis en équerre toiture en tuiles avec lucarnes en façade à deux niveaux flanqué  sur la droite d'un pavillon saillant de trois étages  qui est accolé à une tour ronde à toit en poivrière .","habitants":"Seigneurie de Bérenger de Boutenac\r\n        \"","divers":"Vestiges du château de Gruissan, château du Capitoul et domaine de Bouïs","gps":"","images":["../image/image_11/11_Gruissan_1.jpg","../image/image_11/11_Gruissan_2.jpg","../image/image_11/11_Gruissan_3.jpg","../image/image_11/11_Gruissan_4.jpg","../image/image_11/11_Gruissan_5.jpg","../image/image_11/11_Gruissan_6.jpg","../image/image_11/11_Gruissan_7.jpg","../image/image_11/11_Gruissan_8.jpg"]},"Consult_chateau_formulaire1e11":{"id":"Consult_chateau_formulaire1e11","dept":"11","canton":"Quillan","commune":"Joucou","nom":"Joucou_Castelpor","type":"Vestiges","periode":"XII","histoire":"JOUCOU, le château de Joucou appartenait à la seigneurie ecclésiastique. L'abbé de Joucou était également seigneur d'Aniort. Les vestiges d'un donjon-tour rectangulaire juché sur une hauteur dominant le village au lieu dit \"Le Casteillas\" . Il communiquait à vue avec les châteaux d'Able.   C'est pour défendre le passage stratégique entre la vallée du Rébenty et le plateau de Sault qui conduisait au Donnezan que fut construit le château. Jusqu'au Xe siècle, sous le nom de Rébenti, inféodé par un seigneur du même nom dont les traces sont conservées dans deux actes l'un de 1124 où figure Guillaume de Rébenti  il était parmi les nobles qui se soulevèrent en 1124 contre Bernard Aton, l'autre de 1183 où est signalé Pierre Bernard de Rébenti comme témoin dans un acte consenti par Roger comte de Razès.                                             CASTELPOR Ce riche fief comprenait alors : Marsa, Quirbajou, le village d'Altozoul aujourd'hui simple métairie et une grande partie de la forêt de Fanges. En 994 Bernard Odon de Niort donne ce château à sa femme, ainsi que celui d'Aniort et de Belfort.  En 1152 le seigneur de ce fief n'était autre qu'un des membres de la famille d'Aniort qui prêta serment de fidélité à Raymond de Trencavel, comte du Razès, fils de la princesse Cécile de Provence. En 1342, Bernard de Castelpor, damoiseau et son frère, prêtèrent leur concours au roi de France pour combattre les Anglais. En 1370, Pierre de Castelpor fut fait capitaine à Narbonne par le vicomte Aymery. En 1594,  un sieur de Plaigne, seigneur de toute juridiction de Marsa et Quirbajou. Son héritière, Anne de Plaigne, en 1667 , s'intitule seigneuresse de Marsa, Quirbajou et Castelpor. Anne de Plaigne était mariée à Guy de Fau, comte de Pibrac, et la seigneurie de Castelpor passa dans cette famille ; elle dut la garder jusqu'à son extinction. En 1748 (acte notarié à Aunat), on y trouve François de Durfort, comte de Pibrac.","architecture":"Des vestiges du château de Joucou, des murs éparses délimitent l'enceinte .                                                                                     Le château d'Able ou de Rébenti comme on l'appelait au Xe siècle, faisait partie du fief des comtes du Razès. Fédié disait que le château d'Able était une ancienne tour wisigothe. Ce château  avait comme celui de Belvis, la forme d'un rectangle tracé sur la crête d'un roc. Les aménagements de défense consistaient dans le chemin d'accès avec deux ou trois portes fortifiées, du côté de l'Ouest. Avec ce qui restait des murs dans les années 1940 on pouvait encore suivre le plan. Il y a 75 ans, on pouvait discerner son plan rectangulaire mesurant six mètres sur douze et trois murs parallèles formant un accès en chicane.                                                                                                        Castelpor. Au cours du XIVe siècle  résista aux attaques espagnoles mais pas à celles de la deuxième invasion. Lors des luttes entre Charles VIII et Ferdinand le Catholique, roi d'Aragon, il fut détruit en 1496 par les armées espagnoles qui ravagèrent le pays de Sault. Ne subsistent aujourd'hui que quelques restes de murs.","habitants":"seigneur d'Aniort\r\n        \"","divers":"Vestiges du château de Joucou, d'Able et de Castelpor","gps":"","images":["../image/image_11/11_Joucou_Castelpor_1.jpg","../image/image_11/11_Joucou_Castelpor_2.jpg","../image/image_11/11_Joucou_Castelpor_3.jpg","../image/image_11/11_Joucou_Castelpor_4.jpg","../image/image_11/11_Joucou_Castelpor_5.jpg","../image/image_11/11_Joucou_Castelpor_6.jpg"]},"Consult_chateau_formulaire4124":{"id":"Consult_chateau_formulaire4124","dept":"11","canton":"Montréal","commune":"Labécède  Lauragais","nom":"Labécède_Lauragais","type":"Château","periode":"XV","histoire":"LABECEDE-LAURAGAIS,  en fait depuis la croisade des Albigeois en 1249, Labécède appartient  au comte Alphonse, frère de Saint Louis et mari de la princesse Jeanne, fille de Raymond VII, comte de Toulouse. En 1271, Labécède appartient pour 1/4 au Roi de France et pour 3/4 au seigneur du lieu. Au XIVe siècle le seigneur de Labécède est Rigaud de Vaudreuille. En 1539  la famille Rigaud vend la seigneurie à Bertrand de Sabatery, procureur au parlement de Toulouse  Cette situation entraîne de la part des habitants, un refus d'allégeance au seigneur. Lignée des Sabatery : 1er consul  en 1627 et syndic entre 1631 et 1639, avant féodation au Roi de la commune. Lignée des Seneaux de 1719 à 1790 par acte du 16 mai 1719, le château et les terres passent aux Seneaux. A partir de 1688, il n'y a plus de vrai seigneur de Labécède, la commune inféodée au Roi Louis par lettres d'amortissement.  A dater de 1688, le pouvoir administratif et judiciaire passe à la communauté gérée par un comité de consuls qui fût en lutte permanente avec la famille des Seneaux pour l'exécution des pouvoirs concédés par le Roi. En 1697, la communauté bénéficie, au titre de l'inféodation au Roi, du droit de rendre haute et basse justice. En 1789 vente du château au seigneur Gailliassou  qui était officier municipal à la Révolution. La veuve et ses descendants de la famille Bastouil conserveront la propriété jusqu'en 1839. Vente du château à monsieur De Carayon Latour, bienfaiteur du village avec sa femme. Le château sera ensuite légué à leur nièce madame De Barbot. Transformation du château vers 1900. Mort du vicomte De Barbot en 1966.  Vente du château à la famille Naudy ,  en 1971 vente du château à la famille Gabolde,  en 1987  achat du château par la famille Ricard,  en  2000 achat du château par M et Mme Chauvet-Fougoux.","architecture":"Le premier château  de Labécède ancien castrum du Moyen- Age, que l'on appelle le \"Castelas\" ou château de Villemagne était contigu à la porte fortifiée d'Amont et aux remparts qui, à l'époque, possédaient trois tours côté amont. Voir ce passage en voûte existant dans le mur d'enceinte.\r\nLe second château appelé \"La Citadelle\" existant avant le XVe siècle au centre du village, il occupait un site important, allant du château actuel jusqu'à la maison maintenant rénovée où subsiste une tour d'angle dominant le village au Sud-Est. Ce qui subsiste aujourd'hui de la \"citadelle\", est une très vieille maison comportant une porte voûtée en cintre qui porte le blason des \"Sabatery\" daté de 1583 (ex maison Bousquet). Il était entouré de fossés. Rien na changé depuis le XIVe siècle avec des restes de remparts, une porte fortifiée, des ruelles très étroites et en forte pente, une église romane. On n'y pénétrait que par deux portes l'une au Nord, la porte d'amont ou de Castelas existant encore, solidement construite, à plein cintre, surmontée d'une salle de guet ; l'autre à l'Ouest la porte d'Abail, avenue de Castelnaudary, elle n'existe plus. On y voit la base de la tour flanquant l'angle. Une grande partie des remparts d'enceinte est toujours debout. Un lavoir communal toujours utilisé, construit sur l'emplacement de la porte fortifiée d'Aval et l'ancienne fontaine du Théron en activité jusqu'en 1864.","habitants":"Famille Rigaud\r\n        \r\n        \"","divers":"Château de Labécède-Lauragais.","gps":"","images":["../image/image_11/11_Labecede_Lauragais_1.jpg","../image/image_11/11_Labecede_Lauragais_2.jpg","../image/image_11/11_Labecede_Lauragais_3.jpg","../image/image_11/11_Labecede_Lauragais_4.jpg","../image/image_11/11_Labecede_Lauragais_5.jpg","../image/image_11/11_Labecede_Lauragais_6.jpg","../image/image_11/11_Labecede_Lauragais_7.jpg"]},"Consult_chateau_formulairebff1":{"id":"Consult_chateau_formulairebff1","dept":"11","canton":"Limoux","commune":"Ladern sur Lauquet","nom":"Ladern","type":"Forteresse","periode":"X-XI","histoire":"LADERN, construit sous Roger 1er le Vieux à la fin du Xe siècle pour défendre ses terres contre les seigneurs voisins qui lui disputaient le Razès. Au XIe siècle, la seigneurie de Ladern faisait partie des domaines des comtes de Carcassonne. Elle fut donnée après la conquête par Louis IX en 1230 à Raymond de Saverdun, seigneur de Ladern, Alzonne, Leuc, Rieux Minervois, pour apaiser les remords importuns et les justes alarmes de sa conscience et par l'autorité et le sage conseil du roi Saint Louis fonda à perpétuité une messe qui devait être célébrée tous les ans dans la cathédrale de Carcassonne pour le repos de l'âme d'Etienne d'Insula, chevalier dont Raymond de Saverdun fut le meurtrier. Le fief d'Alzonne est donné au chapitre de Carcassonne. En 1494  Hélix de la Jugie fait hommage à Charles VI rois de France, dans le château de Leuc, du fief de Ladern, en 1269 : Gabrielle de la Tour de Bonnafos, bisaïeule dune poète : J-B de la Tour de Bonnafos né à Montréal, en  1270 : Foulque de Capendu - Guillaume Pétri de Fanjeaux - De Siran sont pendant trois siècles seigneurs de Ladern-Cavanac-Greffeil-Clermont-Labastide puis se fixent dans le nord. En  1785 : J-B de Soubiran émigra en Espagne. En  1793 : ses biens furent confisqués. Lorsque le calme fut rétabli en France, il revient avec sa famille dans son pays natal. En 1818 : sous la Restauration on lui offrit une indemnité en compensation des biens confisqués. Son fils, l'abbé François de Soubiran, composa des pièces de vers en langue d'Oc et les faisait débiter par les congréganistes du Bon Secours afin de les maintenir dans des sentiments religieux et moraux.","architecture":"Le château fort, flanqué de tours, était bâti sur le roc, avec pilori et collier de fer, marque seigneuriale. Au XIIe siècle, par une bulle adressée à Udalguier, abbé de Saint Hilaire, le pape Calixte II prend sous sa protection Ladern et les propriétés de l'abbaye dont il avait la jouissance. En 1292, le manoir féodal est qualifié de \"Castrum de Aladerno\" ou bien \"Castrum Aladernum\".   Il devint château royal  en 1344. \r\nLe 14 janvier 1576, le capitaine du Villa de la Val de Daigne, huguenot, prit par escalade le château de Ladern et le livra aux flammes. Il rançonna et pilla aussi les pauvres habitants de Ladern.  En 1789, les tours du château (qui était autrefois un fort) furent sur pied  Le fort avait pilori avec collier de fer. Au début du XIXe siècle les tours furent abattues.","habitants":"Famille de J-B de Soubiran\r\n        \"","divers":"Château de Lardsern sur Lauquet","gps":"","images":["../image/image_11/11_Ladern_1.jpg","../image/image_11/11_Ladern_2.jpg","../image/image_11/11_Ladern_3.jpg","../image/image_11/11_Ladern_4.jpg","../image/image_11/11_Ladern_5.jpg","../image/image_11/11_Ladern_6.jpg","../image/image_11/11_Ladern_7.jpg"]},"Consult_chateau_formulaire6073":{"id":"Consult_chateau_formulaire6073","dept":"11","canton":"Castelnaudary","commune":"Lasbordes","nom":"Lagoual","type":"Château","periode":"XII","histoire":"LAGOUALS, au XVIe siècle, au cours des guerres de religion, le château de Lasbordes sera partiellement détruit. La famille du seigneur va alors s'établir dans leur demeure champêtre : le château de Saint-Martin de Pebrens plus connu sous le nom de Lagoual. Château remanié à diverses époques surtout au XVIIe siècle. Converti en ferme au début du XXe siècle, l'édifice fut sauvé de la ruine par l'actuel propriétaire,  en cours de restauration pour la toiture. Récemment récompensé par les Vieilles Maisons Françaises pour lensemble de la restauration du gros uvre, lancienne maison seigneuriale retrouve son lustre d'antan.","architecture":"Cette demeure seigneuriale d'origine médiévale a été largement remaniée. quadrangulaire à deux niveaux et attiques, deux tours rondes aux angles arasées au niveau du corps de logis, prolongé sur la droite par d'importantes dépendances. De grands travaux ont été nécessaires pour conserver le gros uvre, rétablir les volumes des pièces, des ouvertures.\r\nLongtemps laissé à l'abandon, il fut acquis par un passionné qui le sauva de la ruine il y a un peu plus de huit ans. Après la restauration du gros uvre, les intérieurs sont peu à peu aménagés. Le bel escalier à arcades a retrouvé toute sa splendeur et le plafond peint du XVIIe siècle est en cours de restauration.","habitants":"Seigneur locale\r\n        \"","divers":"Château de Lagouals","gps":"","images":["../image/image_11/11_Lagoual_1.jpg","../image/image_11/11_Lagoual_2.jpg","../image/image_11/11_Lagoual_3.jpg","../image/image_11/11_Lagoual_4.jpg","../image/image_11/11_Lagoual_5.jpg","../image/image_11/11_Lagoual_6.jpg","../image/image_11/11_Lagoual_7.jpg","../image/image_11/11_Lagoual_8.jpg"]},"Consult_chateau_formulaired0ef":{"id":"Consult_chateau_formulaired0ef","dept":"11","canton":"Fabrezan","commune":"Lagrasse","nom":"Lagrasse","type":"Château","periode":"XII-XV","histoire":"Trois châteaux à Lagrasse et ses environs, Villemagne, Borderouge.                                                                              LAGRASSE pas d'information historique                                                                                             BORDE-ROUGE bâtisse du château et à sa tourelle au charme intemporel                                                                            VILLEMAGNE l'enracinement au pays est notre force. Vous serez accueillis dans la cave du château Villemagne,  sous lancien régime, labbé incarnait le seul seigneur en toute justice de Lagrasse. Cependant, les habitants représentés par des « Consuls », géraient les affaires de la communauté. Ces consuls, cités dès 1269, oscillaient en nombre de deux à quatre. Paulette et Roger Carbonneau et Sophie et Christophe Hébraud pratiquent l'accueil éducatif à la ferme (écoles maternelles et élémentaires, collèges, lycées).                                                                                                                ST-AURIOL,  gîte situé sur un domaine viticole,  célèbre par son abbaye bénédictine datant de l'an 800.  Marika et Jean-Pierre Salvagnac,   gîtes de France","architecture":"Lagrasse village fortifié  né de son abbaye, le village sest développé sur les deux rives de lOrbieu et a gardé des vestiges de ses remparts médiévaux, dont la porte de lEau et la tour de Plaisance. Vestiges du château un puissant donjon quadrangulaire qui  fait face posé sur un rocher aplani sans ouverture une porte seulement, ni archères reste la tour de plaisance ancien rempart.                                                                Borderouge   de plan rectangulaire à deux niveaux accolé d'une tour carrée à créneaux.                                                                                   St-Auriol de plan en U à deux niveaux porte d'entrée  dans le corps de logis central par un préau supporté par deux colonnes ioniques.                                                                                                                   Villemagne, bâtisse du XIIe siècle, ancien prieuré de l'Abbaye de Lagrasse.","habitants":"Seigneurs des Termes                                                                                  Famille de Cucugnan\r\n        \"","divers":"Vestiges du château de Lagrasse, château de Borde-Rouge de Villemagne et de Saint-Auriol.","gps":"","images":["../image/image_11/11_Lagrasse_1.jpg","../image/image_11/11_Lagrasse_2.jpg","../image/image_11/11_Lagrasse_3.jpg","../image/image_11/11_Lagrasse_4.jpg","../image/image_11/11_Lagrasse_5.jpg","../image/image_11/11_Lagrasse_6.jpg","../image/image_11/11_Lagrasse_7.jpg","../image/image_11/11_Lagrasse_8.jpg","../image/image_11/11_Lagrasse_9.jpg"]},"Consult_chateau_formulaire9427":{"id":"Consult_chateau_formulaire9427","dept":"11","canton":"Fabrezan","commune":"Lanet","nom":"Lanet","type":"Château","periode":"XI-XIII","histoire":"LANET,  cité au XIe siècle présence d'une tour sur le site de Lanet. En 1260, le roi  de France Saint-Louis autorise Olivier de Termes à vendre sa \"villa\"  à Pierre de Voisins. En 1262 le fief est inféodé à Arnaud de Soulatge et  en 1268 la maison de Mage hérite de Lanet. A la fin du XIIIe siècle, la famille de Voisins construit un château.En 1526 Jezan de Mage épouse Yolande d'Arse le domaine passera  aux d'Arse puis à la fin du XVIe siècle à la famille Grave. En 1572 François II d'Arse sieur de Lanet est nommé viguier du Termenès et au XVIIIe siècle la famille de Grave de Lanet remanie le château, puis passa aux Stadieu qui continueront des modifications au XIXe siècle et en 1956 le château est acquis par la famille Girard.","architecture":"Lanet édifié au sommet d'une colline, la tour carrée du XI-XIIe siècle fera office de donjon est entourée d'enceintes fortifiées percées d'archères. Le bâtiment semble parallélépipédique avec 2 tours carrés aux angles et une tour ronde au centre. Cette tour semble avoir une base taluté. Il n'y a pas de trace de crénelage ni mâchicoulis sur la partie visible de ce château.","habitants":"Famille de Voisins \r\n        \"","divers":"Château de Lanet","gps":"","images":["../image/image_11/11_Lanet_1.jpg","../image/image_11/11_Lanet_2.jpg","../image/image_11/11_Lanet_3.jpg","../image/image_11/11_Lanet_4.jpg","../image/image_11/11_Lanet_5.jpg","../image/image_11/11_Lanet_6.jpg"]},"Consult_chateau_formulaire50b4":{"id":"Consult_chateau_formulaire50b4","dept":"11","canton":"Fabrezan","commune":"Laroque de Fa","nom":"Laroque_de_Fa","type":"Vestiges","periode":"XII","histoire":"LAROQUE de FA, en 1167, Bernard de Balbonne était seigneur de La Roque-de-Fa. Le traité de Paris en 1229 avait stipulé la soumission de Raymond VII, comte de Toulouse, et le mariage de sa fille Jeanne avec Alphonse de Poitiers, frère du roi Louis IX. Alphonse étant mort sans enfant, le comté de Toulouse, donc la partie ouest du département de l'Aude, fut uni à la couronne en 1271. À son tour, Raimond II Trencavel, vicomte de Carcassonne, se soumit au pouvoir du roi en 1246, et apporta ainsi au domaine royal, la partie centrale du département de l'Aude. Le reste fut annexé en 1258 par la cession qu'en fit le roi Jacques d'Aragon roi de Majorque  à Louis IX. Ce lieu disputé au XIIIe siècle entre les seigneurs de Termes et l'abbaye de Lagrasse fut vendu au roi Louis IX par Olivier de Termes. À Laroque-de-Fa, lors de la grande révolte occitane de 1240, Olivier de Termes fut assiégé par les troupes royales. Le domaine de Carcassès fut vendu au roi par Olivier de Termes en 1260. Le commandeur du temple de Notre-Dame de Peyrens rendait la justice à La Roque-de-Fa entre 1273 et 1285. En 1557, Françoise d'Arse était seigneuresse à Laroque-de-Fa et en 1607, Jean de Montredon est mentionné comme seigneur. En 1695 Bernard de Barre acquiert du roi la seigneurie de La Roque-de-Fa et André de Barre le racheta au roi en le 6 mai 1666.","architecture":"Le village a été bâti au Moyen-Age, en amphithéâtre autour du Castelnaut.  Vestiges du château  dont il ne reste que quelques traces de murs.\r\nDans une situation ancestrale, la rivière « Le Sou » assurait une défense naturelle aux habitations de l'époque.","habitants":"Famille de Bernard de Barre \r\n        \"","divers":"Vestiges du château de la Laroque de Fa.","gps":"","images":["../image/image_11/11_Laroque_de_Fa_1.jpg","../image/image_11/11_Laroque_de_Fa_2.jpg","../image/image_11/11_Laroque_de_Fa_3.jpg","../image/image_11/11_Laroque_de_Fa_4.jpg"]},"Consult_chateau_formulairef9d1":{"id":"Consult_chateau_formulairef9d1","dept":"11","canton":"Villemoustaussou","commune":"Lastours","nom":"Lastours_Aude","type":"Vestiges","periode":"XI-XIII","histoire":"Deux châteaux à Lastours, les vestiges des châteaux de Lastours et celui de Caunette (Voir article)   Les châteaux de Cabaret, Surdespine et Quertinheux, et la Tour Régine.                                                                                                                                                                                                                           LASTOURS, constitue un ensemble exceptionnel avec ses quatre châteaux édifiés à 300 mètres daltitude, au sommet dun éperon rocheux.                                                                                  CABARET, le plus massif et célèbre tombe au mains de Simon de Montfort en 1211,                                                                         TOUR-REGINE, dominent le cours de lOrbiel et le torrent du Grézilhou,  proche de Cabaret  construite après  la croisade des Albigeois par les hommes du roi en 1260.                                                                                                        SURDESPINE, ou Fleur d'Espine, troisième château le plus délabrés .                                                                               QUERTINHEUX, plus en contrebas  sur un piton rocheux isoléexistait avant la croisade contre les Albigeois, mais sous une forme différente de leur aspect actuel. À lépoque du catharisme florissant, le seigneur Pierre Roger de Cabaret apparaît très lié aux adeptes de la nouvelle religion et subit dès 1209 les assauts des croisés.   \r\n Entre 1223 et 1229, lactivité cathare est intense à Cabaret et les châteaux seront assiégés, en vain, une deuxième fois en 1227. Il faudra attendre 1229 pour assister à la reddition définitive de ces places-fortes et voir les derniers réfugiés sur le site senfuir pour rejoindre le Pays de Sault. Après la croisade, le roi de France récupère les biens des seigneurs, rase le village et les châteaux. Il les fait reconstruire sur la crête, y adjoignant une quatrième tour : Tour Régine.\r\nA la fin du XVIe siècle, pendant les guerres de Religion, Cabaret constitue une plate-forme importante pour les protestants qui laménagent pour les armes à feu. Ils en sont délogés en 1591 par les troupes du maréchal de Joyeuse.","architecture":"Lastours et ses quatre châteaux patrimoine exceptionnel qui fait partie des sites majeurs du Pays cathare.\r\nCes 4 châteaux perchés sur un éperon rocheux dominent fièrement le village dont les maisons s'étalent sur les collines et serpentent le long des berges ombragées de l'Orbiel.                                              Cabaret, bâtisse compacte de forme allongée composé d'un donjon polygonal sur lequel s'appuie un corps de logis rectangulaire. l'enceinte qui court sur les bords du replat protège ce corps central de ses hauts murs crénelés. Tour Régine tout près de Cabaret se compose d'une tour ronde flanquée d'un escalier à vis et d'une petite enceinte dont il ne reste que la façade sud.                                                          Quertinheux solide château fort médiéval sur un piton rocheux isolé avec une tour ronde, une enceinte massive qui a subit les outrages  du passé.\r\nAu pied des quatre citadelles, le village médiéval de Cabaret blotti dans son site grandiose a été mis à jour sous la direction de Marie Elise Gardel, archéologue. Un lieu exceptionnel surgi de l'oubli où l'avaient précipité les seigneurs de la croisade contre les Albigeois.\r\nCaunette  fenêtres et portes anciennes des quatre façades ; tour carrée Sud-Est et tourelle d'escalier carrée Nord-Ouest : inscription par arrêté du 27 septembre 1948.","habitants":"seigneur Pierre Roger de Cabaret\r\n        \"","divers":"Vestiges de la forteresse  de Lastours","gps":"","images":["../image/image_11/11_Lastours_Aude_1.jpg","../image/image_11/11_Lastours_Aude_2.jpg","../image/image_11/11_Lastours_Aude_3.jpg","../image/image_11/11_Lastours_Aude_4.jpg","../image/image_11/11_Lastours_Aude_5.jpg","../image/image_11/11_Lastours_Aude_6.jpg","../image/image_11/11_Lastours_Aude_7.jpg","../image/image_11/11_Lastours_Aude_8.jpg"]},"Consult_chateau_formulaire661a":{"id":"Consult_chateau_formulaire661a","dept":"11","canton":"Rieux-Minervois","commune":"Laure-Minervois","nom":"Laure_Minervois","type":"Château","periode":"XII-XIV","histoire":"Plusieurs châteaux ou domaine à Laure Minervois village fortifiés du XIVe siècle celui d'Argères, de St-Jacques d'Albas, de Fabas, de Gilabaux domaine viticole de Marie-Jeanne et Baptiste Bonnet  et le domaine  de Prat-Majou et de la Tour Boisée fait parti des remparts entourant le bourg.                                                                                            ARGERES, situé en plein coeur du Minervois, à 20mn de Carcassonne, le domaine est exploité par la famille Cros-Mayrevieille depuis 5 générations. Chargé d'histoire, il abrite d'importants sites Néolithiques et Gallo-Romains dont on parle dans les textes à partir du XIIe siècle.                                                                                                                      St  JACQUES d'ALBAS,  propose toute une gamme d'activités liées au tourisme du vin: visites de la cave par la famille Cros Mayrevieille.                                                                                                                   FABAS, château Fabas est une référence incontournable dans le Minervois. Ancien prieuré de Saint-Genest de Fabas, entité religieuse et agricole, solidement planté au pied dune colline coiffée de pins, la ferme fortifiée de Fabas sordonna autour dune église champêtre mentionnée au Xe siècle. De grandes personnalités ont ensuite séjournées dans lactuel château du XIVe siècle, de madame de Poulvères, veuve de noble Pierre de Toulouse à Louis-Pierre-Joseph de la Valette, seigneur de Fabas.  Issu dune famille champenoise où lon est vigneron depuis 1872, Roland Augustin, ancien responsable des relations publiques de Moët et  Chandon, achète le domaine de Fabas en 1996 et sy installe avec ses deux fils, Yann et Loïc.","architecture":"Laure-Minervois, l'imposant rempart médiéval il ne reste que des murs percés de fenêtres pour amener la lumière dans les habitations et surtout une tour-porte.   En partie haute, le crénelage avec ses archères dans les merlons donne le ton d'un système défensif de la fin du Moyen-Age, sur la hauteur, une petite fente centrale, ressemble à une archère du XIIe siècle alors que la fortification daterait du XIVe, le bourg est fortifié.\r\nVers 1792, les révolutionnaires s'attaquent aux symboles de l'ancien régime.                                                                                       Argères, grandes maitairie, les batisses toutes en pierres, intemporelles, traversent les siècles avec une aisance déconcertante, des rudesses du climat méditérannéen.                                                       Fabas, de plan quadrangulaire  flanqué de tours rondes à toits presque plats avec corps de logis à niveaux différents se deux et trois étages                                                                                                    Gibalaux viticole                                                                                Saint-Jean d'Albas ensemble de bâtiment","habitants":"Famille Cros-Mayrevieille                                                                        Famille de Madame de Poulvères\r\n        \"","divers":"A Laure Minervois le château d'Argères, de Saint-Jean d'Albas, de Fabas, de Galibaux et de la tour des remparts du Bourg.","gps":"","images":["../image/image_11/11_Laure_Minervois_1.jpg","../image/image_11/11_Laure_Minervois_2.jpg","../image/image_11/11_Laure_Minervois_3.jpg","../image/image_11/11_Laure_Minervois_4.jpg","../image/image_11/11_Laure_Minervois_5.jpg","../image/image_11/11_Laure_Minervois_6.jpg","../image/image_11/11_Laure_Minervois_7.jpg","../image/image_11/11_Laure_Minervois_8.jpg","../image/image_11/11_Laure_Minervois_9.jpg"]},"Consult_chateau_formulaire411e-2":{"id":"Consult_chateau_formulaire411e-2","dept":"11","canton":"Rieux-Minervois","commune":"Lespinassière","nom":"Lespinassière","type":"Vestiges","periode":"X-XVI","histoire":"LESPINASSIÈRE, est une petite commune située dans la Montagne Noire, près de la source l'Argent-Double, bâtie au bord d'un cirque de montagne. En son centre, sur un éperon rocheux ce petit château boucle l'accès nord de la vallée de l'Argent Double bien au dessus de Citou et de son \"château\". Ce territoire est possédé, dès le IXe siècle, par le monastère de Caunes et jusqu'en 1789. En 1413, l'abbé de Caunes fait hommage au roi pour le château de Lespinassière. \r\nIl semblerait , aussi bien pendant la croisade Albigeoise que pendant les périodes troublées qui ont suivi au XIIIe siècle (Cathares), ce château n'a jamais eu un rôle significatif  militairement il reste à l'écart des troubles. Son emplacement au coeur de la montagne et assez loin des voies principales explique peut-être, la soumission au roi aussi.","architecture":"Lespinassière ce village se signale surtout par le donjon carré des ruines du château féodal dont l'origine remonte au IXe siècle, mais démantelé en 1579. Détruit à la fin du XVIe siècle pendant les guerres de Religion sans doute préventivement, il ne subsiste que des ruines basses au niveau de la cour intérieure et un imposant donjon datant du XVe siècle. L'intérieur voûté en berceau, les fenêtres en plein cintre attestent son ancienneté ainsi que l'appareillage des murs ''opus spicatum'' au dessus de la porte d'accès qui semble avoir été ouverte au XVe siècle lors de la construction du donjon. A l'extérieur, dans la montée, les vestiges d'une arche gothique correspond à cette époque. Restauré il y a une quarantaine d'années, il domine le paysage en venant de Caune-Minervois, bien visible sur le fond de forêt.","habitants":"Abbé de Caunes\r\n        \r\n        \"","divers":"Vestiges dfu château de Lespinassière seul la tour est intact.","gps":"","images":["../image/image_11/11_Lespinassiere_1.jpg","../image/image_11/11_Lespinassiere_2.jpg","../image/image_11/11_Lespinassiere_3.jpg","../image/image_11/11_Lespinassiere_4.jpg","../image/image_11/11_Lespinassiere_5.jpg"]},"Consult_chateau_formulaire8e1f":{"id":"Consult_chateau_formulaire8e1f","dept":"11","canton":"Carcassonne","commune":"Leuc","nom":"Leuc","type":"Château","periode":"XIV","histoire":"LEUC,  est cité en 1110 et en 1215 avec des seigneurs successifs comme Raymond de Saverdun, Nicolas de la Jugie, Arnaud Dax, Benjamin de Levis-Montmaur. Cest Pierre de la Jugie, cardinal archevêque de Narbonne, qui fit bâtir le château actuel en 1347. On y découvre les armes de la maison Dax dans la grande salle du château et à la porte de la tour de lescalier. La tour de la Pleureuse qui laisse le souvenir légendaire de la Dame voilée, Madgeleine de Siran, fille de Louis de Siran, seigneur de Cavanac, épouse de Benjamin de Levis-Montmaur, assassiné le 8 juin 1653 dans un faubourg de Mirepoix. Après le meurtre de son mari, Magdeleine de Siran se tint enfermée, le reste de ses jours, dans la salle voûtée, toute tendue de deuil. Elle vécut là, priant pour lâme de son défunt mari jusquen 1696 soit quarante-trois ans de prières et de larmes. Elle fut enterrée à côté de son époux dans la chapelle Notre-Dame. Nayant point eu denfant, elle transmit la terre de Leuc à Gabriel Siran, son petit-neveu. Ce dernier eut deux filles et un fils Gabriel-Guillaume de Siran qui épousa en 1772 mademoiselle de Romans, ancienne favorite de Louis XV, qui vendit en octobre 1769 à M. Ayrolles, marchand drapier de Carcassonne, son château et sa seigneurie de Leuc.\r\nLe château abrite la mairie de Leuc depuis le 18 juillet 2011.","architecture":"Il y avait avant cinq tours, quatre aux angles et la cinquième, plus puissante, le donjon. Parmi les quatre tours, la fameuse tour carrée ou tour de la Pleureuse qui laisse le souvenir légendaire de la Dame voilée.","habitants":"Pierre de la Jugie\r\n        \"","divers":"Château de Leuc","gps":"","images":["../image/image_11/11_Leuc_1.jpg","../image/image_11/11_Leuc_2.jpg","../image/image_11/11_Leuc_3.jpg"]},"Consult_chateau_formulaire6f7a":{"id":"Consult_chateau_formulaire6f7a","dept":"11","canton":"Sigean","commune":"Leucate","nom":"Leucate","type":"Vestiges","periode":"XII","histoire":"LEUCATE, initialement simple demeure seigneuriale, Leucate deviendra par son rattachement à la couronne de France en 1312 une place forte dintérêt stratégique. Par sa position géographique, le château était le poste dobservation, face à lennemi venant du sud. Ainsi les déplacements des troupes des Corbières ou sur le cordon littoral ne pouvaient échapper à loeil des guetteurs. Le donjon primitif sera complété au fil des siècles par des enceintes successives mieux adaptées pour résister aux nouvelles techniques de guerre. Les architectes italiens du XVe siècle révolutionneront lart de la construction des places fortes et Leucate néchappera pas à cette influence. La signature du traité des Pyrénées en 1659 par le roi Louis XIV mit définitivement fin aux problèmes de frontières avec l'Espagne. Le château médiéval sera une importante forteresse moderne sans cesse améliorée au fil des batailles qui sy dérouleront.","architecture":"Le château médiéval sera une importante forteresse moderne sans cesse améliorée au fil des batailles qui sy dérouleront. Aujourdhui les ruines du château offrent un magnifique panorama, une vue à 360° sur l'étang de Leucate, les Corbières, la Méditerranée et le Canigou.La valeur stratégique du château disparaissait en même temps. Comme il coûtait cher d'entretien, à la Province d'abord, à la Couronne ensuite, il fut décidé de le détruire purement et simplement. Les notions de patrimoine étaient évidemment inexistantes alors. Le chantier fut adjugé à un maçon de Narbonne, à qui l'on mit à disposition les stocks de poudre contenus dans les casemates de la forteresse. En 1665, le chantier était mené à bien et le château de Leucate prenait l'apparence qu'on lui connaît aujourd'hui.","habitants":"Seigneurs locaux\r\n        \"","divers":"Vestiges du château de Leucate","gps":"","images":["../image/image_11/11_Leucate_1.jpg","../image/image_11/11_Leucate_2.jpg","../image/image_11/11_Leucate_3.jpg","../image/image_11/11_Leucate_4.jpg","../image/image_11/11_Leucate_5.jpg"]},"Consult_chateau_formulaire4118":{"id":"Consult_chateau_formulaire4118","dept":"11","canton":"Lézignan-Corbières","commune":"Lézignan-Corbières","nom":"Lezignan_Corbières","type":"Château","periode":"XII-XVII","histoire":"Plusieurs châteaux  à Lézignan , de l'Escales (voir article) de Montbrun des Corbières   (voir article) le château de Sérame et la tour de Montrabech.                                                                LÉZIGNAN-CORBIÈRES  est le chef-lieu d'un canton de l'arrondissement de Narbonne. A 35 mètres d'altitude, c'est une petite ville au milieu d'un vaste vignoble dont le cru est renommé.                                                                                                              FONTARECHE, à quelques kilomètres à l'est au Canet d'Aude, tient son nom du latin « fonte erecto » (la fontaine qui jaillit), est un des grands domaines historiques viticoles du Languedoc. Dans les inventaires de larchevêché de Narbonne, on décèle la présence de vignes à Fontarèche dès 1350. 9 générations. En 1682, le château de Fontarèche ainsi que son domaine vinicole, devient la propriété de la famille Mignard dont les descendants, la famille de Lamy, sont les actuels propriétaires du domaine.                                                                                                             SERAME, le château Sérame, célèbre domaine viticole , est lune des plus anciennes propriétés du Languedoc. Ancien camp de César, les Romains avait établi sur le site des villas dont on a retrouvé les vestiges non loin du domaine actuel.    Le comte Antoine-Achille d'Exéa-Doumerc (1807-1902) est un militaire et général français du Second Empire. aujourd'hui  La société famille d' Exea  est dirigée par Christian Gaffinel.","architecture":"Lézignan corbières    subsistent les restes d'une maison noble de plan carré. Il s'agit probablement des derniers vestiges du château de Lézignan\". Au XIIe siècle, Lézignan est un site fortifié. \"L'agrandissement du périmètre protégé se fera par la construction d'un nouveau système défensif complexe et ovalaire, datable en l'état du XIIIe -XIVe siècle\". Avec son chemin de ronde, son fossé et son glacis, Lézignan était donc une place forte jouant ce rôle durant les guerres de religion. Une partie de la muraille de Lézignan a d'ailleurs été mise à jour dans la rue Baudin. Il apparaît qu'à la fin du XVIIe siècle, \"le bourg de Lézignan est toujours enserré dans son enceinte\".                                                                                        Au Canet d'Aude le château de Fonterèche deux niveaux et attique toit en croupes flanqué d'un donjon crénelés à mâchicoulis et sur la même face une tour avec toit en poivrières. Un autre château dont le corps de logis rectangulaire à trois niveaux  flanqué de tour carrées aux extrémitées.                                                                                                      Sérame; corps de logis rectangulaire à deux niveaux et attiques prolongé sur l'arrière et de chaque côté par deux ailes toiture en  croupe avec imposant fronton rodondant et escalier à double révolution.","habitants":"comte Antoine-Achille d'Exéa-Doumerc                                                 Famille Mignard \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Château sur le bourg de Lézignan, le château de Fontarèche, de Guirlande de madame Julien, de Sérame et de la Bastide.","gps":"","images":["../image/image_11/11_Lezignan_Corbieres_1.jpg","../image/image_11/11_Lezignan_Corbieres_2.jpg","../image/image_11/11_Lezignan_Corbieres_3.jpg","../image/image_11/11_Lezignan_Corbieres_4.jpg","../image/image_11/11_Lezignan_Corbieres_5.jpg","../image/image_11/11_Lezignan_Corbieres_6.jpg"]},"Consult_chateau_formulaire6cfe":{"id":"Consult_chateau_formulaire6cfe","dept":"11","canton":"Limoux","commune":"Limoux","nom":"Limoux","type":"Château","periode":"XIII","histoire":"Plusieurs châteaux à  Limoux dont celui de Limoux, de Flandry (voir article) et les vestiges du  château des Evêques d'Alet  de Cournanel  et Pieusse (voir article)                                              LIMOUX,  en 1221,  Il appartenait à l'archevêché de Narbonne, puis il est passé sous l'autorité des Comtes du Razès,  le roi  les avait chargés de gérer ces biens. Il y a eu une période d'accalmie de très courte durée. Au début de la croisade contre les Albigeois, l'inquisition traite très durement les habitants de ces lieux qui abritaient un certain nombre de cathares, les gens dissimulent et se rebellent. Les révoltés de 1240, sous les ordres du dernier des Trencavel en ont fait leur capitale qui a été totalement détruite. Simon de Montfort a donné ce château à son lieutenant Lambert de Turry qui s'est alors appelé Lambert de Limoux. Les comtes de Toulouse, de Foix et Trencavel ont eu de gros problèmes avec les héritiers de Lambert de Limoux. Les habitants sont toujours restés fidèles à leur seigneur et pour cela, il ont eu tous leurs biens confisqués. Vers 1300, après la révolte de Bernard Délicieux, quarante bourgeois ont été pendus. Il ne reste rien du château, on le devine plus qu'on ne le voit vraiment.","architecture":"LIMOUX, le château de Limoux est un chef d'oeuvre en péril. Il pourrait même être rasé, si l'argent pour le restaurer n'est pas trouvé. Ainsi en a décidé son propriétaire, la coopérative Sieur d'Arques, car il est trop coûteux à entretenir. Mais les habitants de Limoux veulent le sauver de la démolition.  le château impressionnant date de la fin du XIIIe siècle, construit sur les fondations d' un ancien donjon et sur des caves voûtées de 356m², un bâtiment du XVIIe siècle a rejoint les 2 tours de défense.","habitants":"Famille de Louis Auguste de Peyre \r\n        \"","divers":"Château de Limoux, manoir  d'Espéraza et les vestiges de Cournamel.","gps":"","images":["../image/image_11/11_Limoux_1.jpg","../image/image_11/11_Limoux_2.jpg","../image/image_11/11_Limoux_3.jpg","../image/image_11/11_Limoux_4.jpg","../image/image_11/11_Limoux_5.jpg","../image/image_11/11_Limoux_6.jpg","../image/image_11/11_Limoux_7.jpg","../image/image_11/11_Limoux_8.jpg","../image/image_11/11_Limoux_9.jpg"]},"Consult_chateau_formulaire57c3":{"id":"Consult_chateau_formulaire57c3","dept":"11","canton":"Sallèles d","commune":"Mailhac","nom":"Mailhac","type":"Château","periode":"XII-XVIII","histoire":"MAILHAC, le village médiéval a été restauré et conserve les traces de son passé : la circulade carolingienne est ceinte dun rempart ponctué de portes imposantes. Le quartier dit \"du château\" est sillonné de ruelles pavées donnant sur des portes de caractère et un embanc typique. Le village abrite aussi des villas romaines, des marques wisigothiques, un dolmen de 4 000 ans, un moulin à huile, des fours à chaux et léglise Saint-Paul-Serge datant du Ve siècle. Autant de témoins dun passé riche de 5 000 ans dhistoire.\r\n LANDURE à Mailhac, occupé depuis l'âge de pierre, fréquenté par les Cathares au XIIe siècle, Landure fût acheté en 1649 par un ancêtre. Le château date de 1870. Au fil des générations, le domaine a affiné sa vocation viticole. Depuis 1989, Marielle et Luc Rouvière le possède.    Installés en 1989,  ont terminé la reconversion du vignoble en 2003. Lélevage en barrique est pratiqué depuis 1998, date à laquelle les vins du château sont reconnus comme très haut de gamme.","architecture":"Dans le même esprit, avec tourelles aux toits d'ardoise, le château de Landure.","habitants":"Famille de Marielle et Luc Rouvière\r\n        \"","divers":"Porte des remparts du bourg de Mailhac et le château de Landure.","gps":"","images":["../image/image_11/11_Mailhac_1.jpg","../image/image_11/11_Mailhac_2.jpg","../image/image_11/11_Mailhac_3.jpg","../image/image_11/11_Mailhac_4.jpg","../image/image_11/11_Mailhac_5.jpg"]},"Consult_chateau_formulaire9265":{"id":"Consult_chateau_formulaire9265","dept":"11","canton":"Villemoustaussou","commune":"Malves en Minervois","nom":"Malves","type":"Château","periode":"XVI","histoire":"MALVES, en plein cur du village de Malves-en-Minervois, la fondation du château de Malves, par une famille seigneuriale  apparentée à celles de Laure et Cabaret, a participé entre le XIe et le XIIe siècle au phénomène de « lincastellamento », vague de construction de châteaux qui affecte à cette époque lOccident Méditerranéen.\r\nAprès avoir appartenu à la famille de Grave, la baronnie de Malves est achetée en 1490 par « Noble Guillaume de Bellissens, marchand », viguier de Carcassonne et châtelain dune des tours de Cabaret.\r\nLes Bellissens de Malves font partie dune puissante famille de marchands drapiers. Ils avaient des hôtels particuliers à Carcassonne et des relations avec lItalie et lEspagne, ce qui peut expliquer la qualité des décors conservés dans le château.\r\nComme cela est fréquent dans la région, lédifice est situé en limite de lagglomération ancienne. Le château actuel a été construit à lest du castrum originel. Il a par la suite structuré le développement du village vers lest.\r\nAcheté par la commune en 1986, il est utilisé depuis pour des activités culturelles. Le château est inscrit à linventaire supplémentaire des monuments historiques par arrêté du 8 juin 1989.","architecture":"Le château de Malves se compose d'une grande bâtisse rectangulaire positionnée à l'ouest d'un grand espace rectangulaire, proportionnée au château, constitué d'un immense parc contenant les communs et des bâtiments d'exploitation, un mur de pierre dans la tradition des châteaux du XVIe siècle et des domaines viticoles du XIXe siècle entoure l'ensemble, percé à l'ouest d'une entrée monumentale qui donne dans la cour d'honneur. Le château est de plan rectangulaire cantonné de quatre tours rondes, les deux tours ouest, côté village, plus puissantes que les autres, font partie d'un édifice du XVe siècle, agrandi au milieu du XVIe siècle puis remanié au XVIIIe siècle, les tours, symbole de noblesse, possèdent un système défensif encore visible à l'intérieur sous la forme d'arquebusières; l'angle sud-est possède une tourelle en encorbellement et une cinquième tour, abritant un escalier à vis en bois, est accolée à la façade nord ouest, l'entrée principale donne sur la  cour d'honneur, limitée par le parc et les communs. Le château a trois niveaux et attiques, possède un étage noble particulièrement marqué ; il s'inscrit dans la ligne des châteaux de la région, caractérisés par une grande sobriété de formes et le refus de l'ornementation.   Cest en 1998 qua été effectuée la restauration totale de la toiture.","habitants":"Famille de Grave\r\n        \"","divers":"Château de Malves en Minervois","gps":"","images":["../image/image_11/11_Malves_1.jpg","../image/image_11/11_Malves_2.jpg","../image/image_11/11_Malves_3.jpg","../image/image_11/11_Malves_4.jpg","../image/image_11/11_Malves_5.jpg","../image/image_11/11_Malves_6.jpg"]},"Consult_chateau_formulairee69c":{"id":"Consult_chateau_formulairee69c","dept":"11","canton":"Sallèles d","commune":"Marcorignan","nom":"Marcorignan","type":"Domaine","periode":"XVIII","histoire":"A Marcorignan plusieurs domaine dont celui de la Motte de Gléon Berthy gites de France                                                                                                                                                                 MOTTE, le château de la Motte est un ancien domaine viticole reconverti en petite résidence touristique de charme. L'ancienne cave à vin ainsi que les chais ont été aménagés en habitation. A la noblesse de la demeure s'ajoute un environnement idyllique : 50 ha de nature d'un côté et de l'autre le village de Marcorignan, typique du Languedoc-Roussillon.  Le site est géré par un couple franco-danois : l'artiste- peintre Gaëtan de Séguin, et sa femme Kristina.","architecture":"Château de la Motte est une propriété viticole ancienne reconvertie en maisons d'habitation touristique. Le calme est garanti de 50 hectares de champs, vignobles, forêts de pins, cyprès et d'oliviers - aussi loin que l'oeil peut voir.\r\nLes confortables maisons sont entourées d'un vaste parc sur trois hectares, agrémenté d'une piscine, bien exposée au soleil. Toutes les maisons ont un agréable petit jardin privatif. Nous gardons le style extérieur de vieux murs avec des intérieurs élégamment meublés, ayant tout le confort moderne.Le domaine de la Motte de plan quadrangulaire, les corps de logis à deux niveaux et attiques  couvert d'un toit à deux pans en tuiles, un donjon est accolées ainsi qu'une chapelle.","habitants":"peintre Gaëtan de Séguin\r\n        \"","divers":"A Marcorignan le château de Comte, de la Motte, le domaine  de Gléon Betty","gps":"","images":["../image/image_11/11_Marcorignan_1.jpg","../image/image_11/11_Marcorignan_2.jpg","../image/image_11/11_Marcorignan_3.jpg","../image/image_11/11_Marcorignan_4.jpg","../image/image_11/11_Marcorignan_5.jpg","../image/image_11/11_Marcorignan_6.jpg"]},"Consult_chateau_formulaireadc1":{"id":"Consult_chateau_formulaireadc1","dept":"11","canton":"Bram","commune":"Marquien","nom":"Marquien_Fajac","type":"Château","periode":"XVI","histoire":"MARQUIEN, remontant à 1539 appartenait à la famille de Roquefort-Marquein. La maison de Roquefort n'existe plus. Les branches du Vivier, d'Arignac, de Sarnhac, d'Engarravagues, de Dauma-zan, d'Esperce ne sont plus. Toutes sont tombées en quenouille après de nombreux services militaires. A la fin du Directoire, à l'aube du XIXe siècle, ce château servit de base à une insurrection royaliste contre la République.  A la mort de Charles de Roquefort, le domaine de Marquein passe sur la tête de Pauline de la Tour, sa petite fille, représentée par Gabriel Florent de la Tour, son grand-père maternel. En 1819, il est en possession de la maison de Rigaud de Vaudreuil. En 1840, il passe des mains de Philippe de Rigaud de Vaudreuil à celles du colonel Paul-Marie Sol de Marquein, qui a restauré le château et l'a remis en l'état où il demeurait encore au début du XXe siècle. Enfin, à la mort de Georges Adrien Sol de Marquein, conseiller général de l'Aude en  1898 et fils du colonel, il est devenu la propriété du fils mineur de M. Émile Hérisson Laparre, ingénieur des poudres à Toulouse.                                                                                                                                FAJAC, perché sur les collines du haut Lauragais, le château de Fajac tourne ses tours en briques vers les Pyrénées depuis le XVIe siècle, chambres d'hôtes par Béatrice Leroy.","architecture":"D'époque Renaissance, le château de Marquein Un grand château, de style Renaissance,fut construit en 1539 et achevé en 1554. Une certaine dissymétrie des façades nord et sud donne à penser que la construction du XVIe siècle, aurait englobé une partie plus ancienne, peut-être la maison forte mentionnée dans un dénombrement de 1464. En 1579, la demeure reçut la visite de Catherine de Médicis ; en 1579 et 1581, celle de Henri IV. Le château de plan carré cantonné de quatre tours rondes dont deux arasées au niveau de la base du toit crénelées avec mâchicoulis, les deux autres de même niveaux toiture en poivrière. Sur la façade sud se trouve la porte d'entrée en anse de panier, Des canonnières rectangulaires, situées au niveau du premier étage, défendent les quatre tours, en flanquement des façades.                                 Fajac, corps de logis rectangulaire à deux niveaux et attiques toitures en croupes flanqué sur une façade de deux tours carrées en briques à toit plats accolée  en dépendance de deux ailes  à deux niveaux.","habitants":"Famille de Roquefort-Marquein\r\n        \"","divers":"Château de Marquien et le château de Fajac.","gps":"","images":["../image/image_11/11_Marquien_Fajac_1.jpg","../image/image_11/11_Marquien_Fajac_2.jpg","../image/image_11/11_Marquien_Fajac_3.jpg","../image/image_11/11_Marquien_Fajac_4.jpg","../image/image_11/11_Marquien_Fajac_5.jpg","../image/image_11/11_Marquien_Fajac_6.jpg"]},"Consult_chateau_formulairef7a3":{"id":"Consult_chateau_formulairef7a3","dept":"11","canton":"Castelnaudary","commune":"Mas Saintes Puelles","nom":"Mas_Stes_Puelles","type":"Château","periode":"XVII","histoire":"A Mas Sainte-Puelles les vestiges du château primitif, le château ancien couvent et le château de Farebouc.                                                                                                                     MAS-Ste-PUELLES,   selon une tradition ancienne, les Puelles, qui identifient aujourd'hui la commune, sont ces jeunes femmes qui recueillirent le corps martyrisé de Saturnin, premier évêque de Toulouse au vie siècle, pour lui donner une sépulture chrétienne. Pour ce fait, elles furent chassées de Toulouse par l'autorité romaine, se réfugièrent en ce lieu où elles moururent et y furent inhumées avant leur translation dans la nouvelle agglomération qui prit leur nom. Au Moyen-Age, la localité comptait des partisans du catharisme. En 1242, les seigneurs languedociens venant de Montségur, s'y arrêtent avant d'aller assassiner à Avignonet-Lauragais des inquisiteurs qui tenaient tribunal. Au XIVe siècle, les Augustins fondent au Mas un couvent avec pour mot d'ordre la réévangélisation du Lauragais. Durant les guerres de religion, le village est farouchement protestant. Au lieu-dit la Planque se trouvait une petite communauté de protestants qui permirent à Henri de Navarre et Catherine de Médicis d'avoir une entrevue secrète.\r\nEn 1598, après l'édit de Nantes, une bande de huguenots continuait à attaquer les convois marchands. En 1622, Louis XIII fait détruire le village. Il ne reste de vestiges du Moyen-Age que le portail de l'église du XIVe siècle. Le village sera reconstruit et le culte catholique rétabli. Au XVIIe siècle un couvent de l'ordre de la Merci pour la rédemption des captifs en Terre musulmane y est construit. Saint Pierre Nolasque, fondateur de l'ordre au XIIIe siècle, serait né au Mas-Saintes-Puelles.\r\nAu cours de la Révolution Française, la commune porte provisoirement le nom de Le Mas-l'Union.","architecture":"Bourg fortifié du Mas saintes Puelles,    Au dessus des toits, d'épais murs se dorent au soleil. La taille des pierres et la qualité de construction montrent que ces murs ont été édifiés avec soin. Mais il n'en reste pas assez pour en déterminer la fonction. Il est même impossible de déterminer si cela est une défense, car il n'y a ni archère, ni crénelage, ni mâchicoulis.                                          Domaine de Ferrabouc et le château du mas du XVIIIe siècle au bord du canal du midi, château du XVIII remanié au XIXe siècle d'environ 900m² habitable en 14 pièces principales, authenticité. Belles dépendances dont un appartement de gardien.","habitants":"Seigneurs locaux\r\n        \"","divers":"A Mas Sainte-Puelles les vestiges du château primitif, le c
