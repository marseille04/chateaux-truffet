 être uniquement sommitale. Les courtines devaient être surmontées dun chemin de ronde, qui se prolonge sur le donjon, sur triple console, face à la cour, et dessert ce qui devait être lentrée principale donnant accès au deuxième étage planchéié. Au quatrième niveau, on aperçoit les consoles dune bretèche qui devait défendre cette ouverture en plein cintre desservant un étage dhabitation. On voit sur les côtés du donjon, deux autres bretèches défendant également le chemin de ronde. Si la construction de ce donjon, à cheval sur la muraille, semble dater de la fin du Moyen-Age, son programme ressemble beaucoup à celui des tours-résidences des XIe et XIIe siècles (aux étages, habitat et dernier réduit de défense avec accès en hauteur, réserves au rez de chaussée).","habitants":"Seigneur de Saint-Martin\r\n        \"","divers":"A Saint-Martin le Vieil, vestiges du château, et autre châteaux viticoles et abbaye de Villelongue.","gps":"","images":["../image/image_11/11_St_Martin_Vieil_1.jpg","../image/image_11/11_St_Martin_Vieil_2.jpg","../image/image_11/11_St_Martin_Vieil_3.jpg","../image/image_11/11_St_Martin_Vieil_4.jpg","../image/image_11/11_St_Martin_Vieil_5.jpg","../image/image_11/11_St_Martin_Vieil_6.jpg"]},"Consult_chateau_formulairee912":{"id":"Consult_chateau_formulairee912","dept":"11","canton":"Limoux","commune":"Saint-Martin de Villeréglan","nom":"St_Martin_Villeréglan","type":"Château","periode":"XVIII","histoire":"A Saint-Martin de Villeréglan deux château celui de Villeréglan  et de Guilhem.                                                                                          St-MARTIN  de VILLEREGLAN.  la cité de Carcassonne et son chapitre, possèdent des propriétés dans le château, villa et forge Taillebois. Saint-Martin faisait partie du domaine de Trencavel, vicomtes de Carcassonne et après la croisade contre les Albigeois, le bourg fut incorporé au domaine royal. Rattaché au diocèse de Narbonne jusquen 1789, puis de 1789 à 1806 au Canton de Cailhau, il intégra le canton de Limoux en 1806.  En 1785, le roi directement seigneur du village, vendit ses droits avec faculté de rachat, à Duston  qualifié de co-seigneur, propriétaire en fief et qui devint seigneur engagiste. Le 19 Juin 1813, il fut nommé baron par Napoléon 1er. A cette époque la communauté était administrée par un conseil politique qui comprenait deux consuls et six conseillers élus pour deux ans et renouvelables par moitié, chaque année, le lendemain de la Noël, jour de la Saint Etienne. Quand à son fils Jean Martin (1764-1822), sans enfants, il devient dabord greffier doffice et régent sous le roi. Il apparaît dans les registres de messidor comme conseiller municipal, Jean Martin ainsi le retrouve-t-on adjoint de 1813 à 1815, sous Louis XVIII, puis pendant les cent jours sous Napoléon 1er. Il aura prêté serment de fidélité, au roi, à lempereur, puis au roi. Maire du 1er octobre 1815, à sa mort en 1822, il est probable que cet élu faisait preuve dune très grande faculté dadaptation.                                                                                                                                                Au nord ouest à Malviès le château de GUILHEM  au coeur de l'AOC Malepère, construit à la fin du XVIIIe siècle de style directoire sur l'emplacement d'une cité Gallo-Romaine, a toujours été entouré de vignes. Depuis 1878, 6 générations de vignerons se sont succédé jusqu'à l'actuel propriétaire, Bertrand Gourdou-Guilhem.","architecture":"Villeréglan quadrilatère à  trois niveaux  flanquée de pavillons carrées en angles                                                                                             Guilhem  un château du XVIIIe siècle de style directoire, construit sur l'emplacement d'une villa gallo-romaine.","habitants":"famille de  Duston\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"château  de Villeréglan  et de Guilhem.","gps":"","images":["../image/image_11/11_St_Martin_Villereglan_1.jpg","../image/image_11/11_St_Martin_Villereglan_2.jpg","../image/image_11/11_St_Martin_Villereglan_3.jpg","../image/image_11/11_St_Martin_Villereglan_4.jpg","../image/image_11/11_St_Martin_Villereglan_5.jpg","../image/image_11/11_St_Martin_Villereglan_6.jpg"]},"Consult_chateau_formulaire4882-2":{"id":"Consult_chateau_formulaire4882-2","dept":"11","canton":"Bram","commune":"Saint-Michel de Lanès","nom":"St_Michel_Lanès","type":"Château","periode":"XVIII","histoire":"St-MICHEL de Lanès, appartenait au XII siècle au comte de Toulouse. Il fut pris, en 1211, par Simon de Montfort. Raymond VI, comte de Toulouse, le remit quelques temps après sous son obéissance, mais Simon de Montfort le lui reprit en 1213, le partagea entre plusieurs co-seigneurs. Le château médiéval à proximité de l'église, disparu: était la propriété de la  famille Lenoir de St Michel et famille d'Araih du XIIe au XVIe siècle. En 1579, Catherine de Médicis séjourne dans ce château avec sa fille Marguerite de Valois, première femme d'Henri IV.  Château du XVIIIe siècle propriété successive du baron de St Michel et comte de Polastron, et la famille Ardenne, Auguste Ardenne maire de St-Michel de Lanès en 1870,au début du XXe siècle, comtesse de Monts, proche parente des Ardenne, depuis 1995, vicomte et vicomtesse Vincent de la Panouse et leurs enfants.  En tout cas ce château apporte une note romantique à un village beau mais austère. Il appartient depuis 1996 à  Vincent de la Panouse qui l'habitent à plein temps et ne cessent de l'entretenir.  chambres d'hôtes du poète Bertrand de Born et de la comtesse Catherine. Toutes les deux vous enchanteront par leur atmosphère élégante et paisible.  propriétaires actuels, Nathalie-Alix et Vincent de la Panouse.","architecture":"St-Michel de Lanès, le château seigneurial se trouvait au milieu du fort, en avant de l'Église, sur l'emplacement occupé aujourd'hui par le jardin de la Vierge. Il n'en reste qu'un pilier et quelques portes visibles à une maison au sud de l'Église. Devant la statue de la Vierge, on voit une ancienne cuve baptismale, sur le fût la soutenant, sont sculptées des grappes de raisins. Le château  corps de logis rectangulaire à deux niveaux au toit d'ardoise avec lucarne inséré entre trois pavillons, offre l'image d'une demeure harmonieuse bien que transformée au fil des générations par des propriétaires soucieux d'apporter une touche originale: têtes de déesses au faîte du toit, grotesques ornant la façade principale, deux tours sans doute du XIXe siècle et une autre médiévale rapportée en 1810 et provenant du château fort du village, disparu depuis plusieurs siècles. Cette tour garde d'ailleurs le souvenir de la baronne Aiceline de St Michel, amie des troubadours et fondatrice de l'église au clocher mur.","habitants":"Comte de Polastron                                                                                   Vincent de la Panouse\r\n        \r\n        \"","divers":"Château de Saint-Michel de lanès","gps":"","images":["../image/image_11/11_St_Michel_Lanes_1.jpg","../image/image_11/11_St_Michel_Lanes_2.jpg","../image/image_11/11_St_Michel_Lanes_3.jpg"]},"Consult_chateau_formulaire4be4":{"id":"Consult_chateau_formulaire4be4","dept":"11","canton":"Sallèles d","commune":"Saint-Nazaire sur Aude","nom":"St_Nazaire_Aude","type":"Château","periode":"XVIII","histoire":"A saint-Nazaire sur Aude plusieurs châteaux  dont celui de Comte chambres d'hôtes de charme, et a   deux kilomètres à L'Est à Saint-Marcel sur Aude de Massignan chambres d'hôtes et de la Motte chambres d'hôtes.                                                               COMTE d'Artois. Les origines de la commune remontent au IXe siècle. Mais ce n'est qu'à partir de 1150 que l'on entend parler de Saint-Nazaire d'Aude, à la suite d'une transaction entre messire Bertrand de Saint-Nazaire et Guillaume Arnaud de Béziers. Venez prendre soin de vous près du canal du midi, dans l'ancien pavillon de chasse du comte d'Artois,  pas d'information historique pour les autres","architecture":"Le château du Comte est un pavillon de chasse du XVIIIe siècle transformé en maison dhôtes pour accueillir les touristes et vacanciers qui viennent dans la région. Construit au XVIII-XIXe siècle et entouré d'un parc, notre pavillon familial a quatre grandes chambres pleines de caractère.                                                                                  A St-Nazaire vestige d'un ancien château  tour carrée crénelée accolée d'une tour servant de guérite.","habitants":"Comte d'Artois\r\n        \"","divers":"Château de Comte, l'ancien château de Saint-Marcel, de Massignan et un manoir et hôtel Ste-Valière.","gps":"","images":["../image/image_11/11_St_Nazaire_Aude_1.jpg","../image/image_11/11_St_Nazaire_Aude_2.jpg","../image/image_11/11_St_Nazaire_Aude_3.jpg","../image/image_11/11_St_Nazaire_Aude_4.jpg","../image/image_11/11_St_Nazaire_Aude_5.jpg","../image/image_11/11_St_Nazaire_Aude_6.jpg"]},"Consult_chateau_formulaireaed0":{"id":"Consult_chateau_formulaireaed0","dept":"11","canton":"Castelnaudary","commune":"Saint-Paulet","nom":"St_Paulet","type":"Forteresse","periode":"X-XIII","histoire":"St-PAULET,  château actuel remanié date du XVIIIe. A cette période apparaît la culture du pastel qui marque un tournant pour lagriculture Lauragaise. La plante servant à la teinture des tissus en bleu est exportée après traitement dans toute l'Europe. Au XVIIe siècle le château reçoit un hôte de marque Le maréchal Henri de La Tour d'Auvergne, vicomte de Turenne ( 1611-1675). Son coeur embaumé rendu au comte de la tour d'Auvergne Lauraguais en 1814 et conservé dans un coffret de plomb au château toujours propriété de la famille de la Tour d'Auvergne. En 1814 c'est aussi la bataille de Toulouse, l'armée du maréchal Soult est attaquée par les anglais sous les ordres du général Wellington. C'est de ce jour là que les hostilités cessèrent, Wellington faisant informer Soult que Bonaparte venait d'abdiquer. aujourd'hui André Faure gére l'entreprise du château de Saint-Paulet.","architecture":"Saint-Paulet du XVe siècle, de plan en équerre à trois niveaux toits à deux pans  en tuiles  accolé d'une tour carrées toits à quatre pans dépassant l'ensemble avec prolongement de dépendance.","habitants":"Maréchal Henri de La Tour d'Auvergne\r\n        \r\n        \"","divers":"Château de Saint-Paulet","gps":"","images":["../image/image_11/11_St_Paulet_1.jpg","../image/image_11/11_St_Paulet_2.jpg"]},"Consult_chateau_formulaireddb8":{"id":"Consult_chateau_formulaireddb8","dept":"11","canton":"Lagrasse","commune":"St-Pierre-des-Champs","nom":"St_Pierre_Champs","type":"Château-fort","periode":"XII-XVI","histoire":"St-PIERRE, du Xe siècle à la fin du XVIIIe siècle le village était une des possessions de l'Abbaye de Lagrasse. C'est vers 1160 que le château de Saint-Pierre appelé à ce moment-là, San-Piere Del Calmis, a été construit par les moines de Lagrasse. Le but de cette construction était de matérialiser la propriété des terres  et d'en protéger les habitants contre les turbulents voisins, les seigneurs des Termes. Mais les défenses n'étaient pas assez fortes pour empêcher Raymond II, comte des Termes, de s'en emparer et de le confier à son parent allié, Pierre de Cucugnan. Restitué à l'abbé de Lagrasse en 1208 par Rixent, fille de Raymond II, il sert d'étape aux croisés de Simon de Montfort allant assiéger  à Termes. L'inquisition qui suit les croisades fait des victimes: Pierre Pons, Raymond Sutor et Pierre Piervent sont brûlés vifs en présence de St-Dominique. En 1247, St-Louis rend le château à la famille de Cucugnan, mais se réserve la suzeraineté. Les habitants de St-Pierre sont affranchit  en 1324 par Guillaume d'Alzonne, abbé de Lagrasse. Aujourd'hui chambres d'hôtes.","architecture":"St-Pierre, le château fort plus maison forte actuellement : occupé maintenant par des habitations particulières , L'ancienne maison à l'entrée de la grand rue ; belle façade, portail en plein cintre et fenêtres géminées.","habitants":"Famille de Ccucugnan\r\n        \"","divers":"Château de Saint-Pierre des Champs","gps":"","images":["../image/image_11/11_St_Pierre_Champs_1.jpg","../image/image_11/11_St_Pierre_Champs_2.jpg","../image/image_11/11_St_Pierre_Champs_3.jpg","../image/image_11/11_St_Pierre_Champs_4.jpg","../image/image_11/11_St_Pierre_Champs_5.jpg"]},"Consult_chateau_formulaire49bd":{"id":"Consult_chateau_formulaire49bd","dept":"11","canton":"Fabrezan","commune":"Termes","nom":"Termes","type":"Vestiges","periode":"XII-XIV","histoire":"TERMES; cité en 1137 sous le règne de Louis VII. Au moment de la Croisade, Simon de Montfort sattaque au château de Termes, en août 1210. défendue par Raimond de Termes avec quatre cent soldats, vingt chevaliers. La forteresse, confisquée, est rattachée à la couronne de France en 1228. Elle sera ensuite intégrée dans la ligne des places-fortes gardant la frontière avec l'Aragon. Deux ans après ce siège le château est confisqué  est remis à un seigneur du nord  Alain de Roucy, et en 1240 Olivier de Termes l'un des deux fils de Raymond récupère les biens  et vend en 1260  le château au roi pour y installer une garnison de frontières, elle sera maintenu jusqu'en 1653. Le château de Termes est ensuite rebâti par les ingénieurs royaux et pendant quatre siècle vont surveiller la frontière franco-aragonaise. Mais suite à un manque dentretien et au contexte trouble de la «fronde» vers 1650, le pouvoir choisit de détruire le château, ce qui est fait en 1654. Tombé ensuite dans loubli, il ne fut redécouvert quau XX siècle. Racheté par la commune au Touring club de France en 1988, le château de Termes est classé monument historique l'année suivante et ouvert au public. Restaurations et fouilles archéologiques y sont aujourdhui menées de pair.","architecture":"Termes est bâti sur un relief entouré de talus abrupts sur trois côtés, quelques vestiges de la partie sommitale correspondent au château primitif des seigneurs de Termes et remontent aux XIe  et  XIIe siècle. La majeure partie du site a été reconstruite à la fin du XIIIe et au début du XIVe siècle par les architectes royaux lorsque le site de Termes est devenu une forteresse défendant la frontière contre l'Aragon. il se compose de deux enceintes concentriques, et comprenait un donjon dont on ne perçoit plus que des pans de murs effondrés,  à la suite de son démantèlement à la poudre au XVIIe siècle. Le tracé de l'enceinte supérieure n'est que perceptible, dans ses parties sud et est. L'enceinte inférieure, mieux conservée, mesure environ 125 mètres sur 70. Elle comprend divers ouvrages de flanquement, mais le tracé exact de l'angle sud-ouest n'est plus perceptible. Plusieurs bâtiments subsistent à l'intérieur des deux enceintes. Le rocher a largement été aménagé du côté sud pour former un fossé défendant l'accès le moins bien défendu . Sur le flanc méridional du relief, les restes de murailles et d'un accès en chicane sont à mettre en relation avec le village fortifié du XIIe siècle. Cet habitat villageois a été déplacé plus bas dans la vallée, à son emplacement actuel, après la prise de possession par le roi de France au XIIIe siècle.","habitants":"Seigneur Alain de Roucy\r\n        \"","divers":"Vestiges de la forteresse de Termes","gps":"","images":["../image/image_11/11_Termes_1.jpg","../image/image_11/11_Termes_2.jpg","../image/image_11/11_Termes_3.jpg","../image/image_11/11_Termes_4.jpg","../image/image_11/11_Termes_5.jpg"]},"Consult_chateau_formulaire5b6b-2":{"id":"Consult_chateau_formulaire5b6b-2","dept":"11","canton":"Sallèles d","commune":"Ouveillan","nom":"Terral_Aude","type":"Château","periode":"XIX","histoire":"TERRAL, son architecture sinspire du XVIIe siècle pour les façades et du  XVIIIe pour les intérieurs. Le site est classé monuments historiques depuis 2005.  Construit de 1889 à 1909, pour André d'Andoque de Sériège, était une ancienne métairie du XVIIIe siècle, par les architectes Louis et Alexandre Garros. L'architecture s'inspire du XVIIe siècle pour les extérieurs, et du XVIIIe siècle pour les intérieurs. . \r\nLes Andoque sont connus depuis le XVIe siècle dans la région comme étant de riches propriétaires terriens. Alliés aux familles de notables du coin, ils possédaient l'ancienne seigneurie de Sériège, puis, pendant la Révolution, ils achetèrent le domaine du Terral situé sur la commune d'Ouveillan, un ancien fief de l'abbaye de Fontfroide devenu bien national. A la suite des grèves de 1905, le domaine sera racheté par André dAndoque (1870-1954), un cousin qui venait dachever la construction de limposant château du Terral à Ouveillan. Leur architecture reprend des modèles du passé : néo-médiéval, néo-Renaissance, néo-Louis XIII dit « brique et pierre ». Ces châteaux sont luvre darchitectes à la mode comme Louis Garros  ou Léopold Carlier  mais bien souvent aussi luvre darchitectes inconnus.","architecture":"Le château du Terral, édifié entre 1889 et  1909  de style néo-Renaissance est un des exemples les plus significatifs des châteaux de la richesse viticole. Il a été construit, de forme triangulaire. L'ensemble se compose d'un corps central jouxté de deux pavillons. Sur les façades se trouvent des chaînages à refends, de larmiers sur consoles, ainsi que des balcons à balustres de pierre. À l'intérieur, l'agencement d'origine a été maintenu. Au sud, donnant sur la route de Capestang, se trouvent une terrasse et des escaliers qui descendent vers un plan d'eau  devant le château. Achevée en 1909, la chapelle possède un plan rectangulaire dont la nef est couverte par une coupole ajourée. Pour compléter l'ensemble figurent les anciennes écuries, le pavillon de la conciergerie, la clôture et la grille d'entrée.","habitants":"Famille d' André d'Andoque\r\n        \r\n        \"","divers":"Château de Terral","gps":"","images":["../image/image_11/11_Terral_Aude_1.jpg","../image/image_11/11_Terral_Aude_2.jpg","../image/image_11/11_Terral_Aude_3.jpg"]},"Consult_chateau_formulairea898":{"id":"Consult_chateau_formulairea898","dept":"11","canton":"Fabrezan","commune":"Thézan les Corbières","nom":"Thézan_Corbières","type":"Château","periode":"X-XVI","histoire":"Quatre châteaux à Thézan les Corbières, celuid'Aiguilloux, de Saint-Estève, de Donos (ruines)  et celui de Grange-Neuve                                                                                    AIGUILLOUX,  Marthe et François Lemarié, propriétaires, éleveurs à Aiguilloux.                                                                              DONOS,  Gomezinde, compagnon de Charlemagne, s'établit sur les terres de Donos   vers 800. Une charte signée par le roi Charles II Le Chauve, en 859 confirme un seigneur nommé Gomezinde dans les droits de Donos. Aujourd'hui chambres d'hôtes par la famille Chardigny.\r\nSt-ESTEVE, l'héritage d'Henri de Montfreid, enfant de la région avant d'être l'aventurier et le célèbre écrivain que l'on sait. Viticole, Sylvie, Eric et David Latham mènent familialement ce domaine de 130 ha en partie sur le terroir de Boutenac,                                   GRANGES-NEUVES sarl , spécialisé dans le secteur d'activité de la culture de la vigne.","architecture":"Donos, entre l'an 800 et 1820 trois châteaux furent construit sur le site, le premier féodal comprend deux enceintes fortifiées et le châteaux lui même était situé sur un éperon rocheux. Les ruines permettait d'imaginer l'importance stratégique du lieu. Le deuxième château  du XVe siècle, le château féodal semble abandonné au profit d'une nouvelle construction. Durant 3 siècles, ce nouveau château est modifié et embelli.\r\nA Thézan au XVIe siècle, un nouveau château est construit.\r\n Au XXe siècle, le château comporte des chambres d'hôtes.\r\nAu début du XXIe siècle, la découverte de l'extérieur de la ruine médiévale est libre et gratuite depuis la route.","habitants":"Famille de Gomezinde\r\n        \r\n        \"","divers":"Quatre châteaux à Thézan les Corbières, celuid'Aiguilloux, de Saint-Estève, de Donos (ruines)  et celui de Grange-Neuve","gps":"","images":["../image/image_11/11_Thezan_Corbieres_1.jpg","../image/image_11/11_Thezan_Corbieres_2.jpg","../image/image_11/11_Thezan_Corbieres_3.jpg","../image/image_11/11_Thezan_Corbieres_4.jpg","../image/image_11/11_Thezan_Corbieres_5.jpg","../image/image_11/11_Thezan_Corbieres_6.jpg","../image/image_11/11_Thezan_Corbieres_7.jpg"]},"Consult_chateau_formulaire5ca8":{"id":"Consult_chateau_formulaire5ca8","dept":"11","canton":"Rieux Minervois","commune":"Trébes","nom":"Trébes","type":"Château","periode":"XVII-XIX","histoire":"Trois châteaux à Trébes dont celui de la Villa-Carla, de Millepetit et deux autres dont je n'ai pas d'information historique.                                                                                          TREBES, la bourgade qui est à l'origine de Trèbes s'est établie sur la butte du Plô, non loin du confluent de l'Aude et de l'Orbiel qui lui servaient de barrière naturelle.\r\nÀ l'époque romaine, elle devient un important vicus dont le territoire porte encore les traces de la cadastration de la colonie de Carcassonne.                                                                        MILLEPETIT, fief de la famille de Bellissen, sieur de Millegrand en 1545, puis aux Millepetit jusqu'à la Révolution, passe à Joseph Ier de Banyuls marquis de Montferré décède en 1801, deux filles la comtesse Marie-Lucie de Tréville  et Angélique de Castéras Villarmartrin, le domaine passe aux gendres.","architecture":"Château Millepetit du XVII-XIXe siècle   bâtisse carrée  toit en ardoises en croupe avec lucarnes, hôtel de ville du XIXe siècle   autres du XVII et XVIII de plan carré  trois niveaux avec tours rondes et carrées.","habitants":"Famille de Bellissen\r\n        \r\n        \"","divers":"Divers châteaux à Trébes dont celui de Millepetit et l'hôtel de ville.","gps":"","images":["../image/image_11/11_Trebes_1.jpg","../image/image_11/11_Trebes_2.jpg","../image/image_11/11_Trebes_3.jpg"]},"Consult_chateau_formulairebf61":{"id":"Consult_chateau_formulairebf61","dept":"11","canton":"Villemoustaussou","commune":"Ventenac Carbardès","nom":"Ventaillole_Rougepeyre","type":"Château","periode":"XVI","histoire":"VANTAILLOLE, domaine vinicole  Sur décret du Roi Henri IV , du 12 Août 1609. Les Pères Jésuites de Carcassonne ont acquis ce domaine aujourd'hui, à Alain Maurel.   Aujourd'hui  Marie-Claude et Robert de Curbières exploitant viticole.                       ROUGEPEYRE, la même famille cultive les vignes du château depuis neuf générations.  Au Moyen-Age, la Bastide est une dépendance des châteaux de Lastours qui dominent la vallée de l'Orbiel et contrôlent le passage vers les richesses minières de la Montagne Noire. Cest le seigneur de ces forteresses, Roger Pierre de Cabaret, qui donne son nom actuel au Cabardès et au domaine de Rougepeyre. Roger-Pierre de Cabaret participe à la résistance occitane menée contre les ennemis de la papauté que sont à cette époque les croyants cathares coupables d'hérésie. Ce seigneur a hébergé une communauté cathare quil a défendu plusieurs fois contre les attaques de Simon de Montfort. En 1211, il finit par se soumettre volontairement. Les quatre forteresses tombent dans le domaine royal en 1243. Au XVIIe siècle, ce sont les aïeux des actuels propriétaires, le comte et la comtesse Dominique de Lorgeril, qui marquent le terroir par leurs actes, leurs engagements et leur résistance. Neuf générations dune même famille se succèdent.La même famille cultive les vignes du Château depuis neuf générations.  Dominique (Régisseur) : Jacques de Lépinau de Lorgeril.","architecture":"Ventaillole l'ensemble du domaine forme un U toiture en tuiles à deux pans, le corps de logis à trois niveaux  au centre  entre deux dépendances, qui elle sont accolées à des dépendances en retour d'équerre.                                                                                        Rougepeyre, la bastide  est une ancienne ferme fortifiée, de plan en U corps de logis oblong rectangulaire à deux niveaux  accolé à un donjon carré  à terrasse couverte.   Les quatre forteresses tombent dans le domaine royal en 1243, de plan en U à deux niveaux flanqué d'un donjon.","habitants":"seigneur Roger-Pierre de Cabaret\r\n        \"","divers":"Château de Ventaillole et de Rougepeyre","gps":"","images":["../image/image_11/11_Ventaillole_Rougepeyre_1.jpg","../image/image_11/11_Ventaillole_Rougepeyre_2.jpg","../image/image_11/11_Ventaillole_Rougepeyre_3.jpg","../image/image_11/11_Ventaillole_Rougepeyre_4.jpg","../image/image_11/11_Ventaillole_Rougepeyre_5.jpg"]},"Consult_chateau_formulairea745":{"id":"Consult_chateau_formulairea745","dept":"11","canton":"Villemoustaussou","commune":"Ventenac Carbardès","nom":"Ventenac_Cabardès","type":"Tour-Château","periode":"XII-XIV","histoire":"A Ventenac-Cabardès le château de L'Abbé, de Lalande et la tour Ginestas hôtel.  Le domaine de Vantaillole etla bastide  de Rougepeyre (article Suivant pour ces deux).                                      ABBE,  en 1184, se trouvait indivis entre l'abbé Isarn et Guillaume d'Aragon. Lors de la croisade albigeoise, les biens du faydit Pierre d'Aragon furent saisis, et revendus à l'abbé de Montolieu, Ermengaud, par le sénéchal Guillaume de L'Orme. Une transaction entre cet abbé Ermengaud et l'évêque Guy de Vaux-Cernay, avait adjugé dès 1217, les décîmes de Ventenac à l'abbé. Lors des troubles du XVIe siècle, Ventenac fut occupée par les réformés en 1574; et se trouva aux mains des ligueurs en 1589, sans qu'il soit fait mention de faits d'armes importants.\r\nDonjon de l'Abbé, lors de l'affaire Montmorency (1632), le seigneur d'Alzau entreposa au château de Ventenac des mousquetons et autres armes; le syndic du diocèse, de Russon, accompagné de 150 hommes de pied, força les portes et fit enlever et confisquer ces armes au profit du Roi. Le château aurait servi de maison conventuelle à quelques bénédictins de la congrégation de Saint-Maur, avant leur réunion au monastère principal de Montolieu. On y voyait en 1789 un autel de Sainte-Anne, qui était le titre du prieuré régulier.                                                                        LALANDE ce domaine  au XVIIIe siècle, et servait à cet époque à loger un des architectes les plus réputés, qui dessina les plans du canal du midi.      La propriété faisait à ce moment 2000 Hectares et après la Révolution, celle-ci a été scindée.\r\nPierre Degroote et Bernard Montariol ont décidé de racheter cette propriété en 1996.","architecture":"La tour dite \"Donjon de l'Abbé\", est une massive construction sur plan carré, de 6,84 mètres de côté, qui domine tout le pays environnant. Elle surmonte un passage voûté en berceau, entre deux portes en arc. Du coté du sud-ouest, l'arc est en tiers-point, à longs claveaux, l'arête abattue, avec arrière voussure à double retraite (ouverture : 1,83 m); du côté du nord-est, l'arc, plus large et en plein cintre, est appareillé en claveaux courts à extrados concentrique, avec arête abattue. Pas de herse.                                   Lalande,   corps de logis de plan rectangulaire à deux niveaux deux tours carrées dépassant légèrement l'ensemble.                       Tour Ginestas belle tour à quatre niveaux  avec ses fenêtres  géminées.","habitants":"Comtesse Dominique de Lorgeril\r\n        \r\n        \"","divers":"Château de l'Abbé, de Lalande et la tour Ginestas à Ventenac.","gps":"","images":["../image/image_11/11_Ventenac_Cabardes_1.jpg","../image/image_11/11_Ventenac_Cabardes_2.jpg","../image/image_11/11_Ventenac_Cabardes_3.jpg","../image/image_11/11_Ventenac_Cabardes_4.jpg","../image/image_11/11_Ventenac_Cabardes_5.jpg","../image/image_11/11_Ventenac_Cabardes_6.jpg"]},"Consult_chateau_formulaire7492":{"id":"Consult_chateau_formulaire7492","dept":"11","canton":"Carcassonne","commune":"Villardonnel","nom":"Villardonnel","type":"Château","periode":"XIX","histoire":"VILLARDONNEL château du XIXe siècle d'Alphonse Mahul ,  le père de J.-A. Mahul dirigea, à la veille de la Révolution, la manufacture de draps de Villardonnel et sa mère appartenait à la famille très connue dans le monde textile, des Airolles.  Dès 1817, il participe à divers journaux patronnés par Guizot et apparaît comme un libéral hostile aux ultraroyalistes, affilié à diverses sociétés secrètes, ce qui lui vaut deux mois de prison, en 1823. La révolution de 1830 semble voir le triomphe de ses idées et il se retrouve député de l'Aude, en 1831. Mais il change alors de camp, manifestant des positions très conservatrices, en s'opposant au parti du mouvement. Sa déclaration selon laquelle « les fonctionnaires de l'ordre politique sont la chair de la chair et les os des os du ministère » est mal acceptée par ses électeurs et, lors des élections de 1834, cela lui vaut une manifestation hostile avec un violent charivari si bien que son mandat n'est pas renouvelé. L'année suivante, il embrasse la carrière préfectorale, passe dans divers départements, se retrouve même directeur général de la police pour devenir, en 1841, préfet de la Haute- Garonne. Quelques jours après son arrivée, éclate, à Toulouse, une émeute qui manque de dégénérer en affrontement entre l'armée et la garde nationale, si bien qu'il doit démissionner. Il est élu à nouveau député en 1846, mais la Révolution de 1848 marque la fin de sa carrière politique et il ne reçoit pas d'autre affectation administrative. Il se consacre, dès lors, dans son château de Villardonnel, à l'énorme travail d'érudition du « Cartulaire », auquel il consacra les trente dernières années de sa vie.","architecture":"château de Villardonnel, corps de logis rectangulaire à deux niveaux toit à deux pans inséré dans quatre tours carrées à toit presque plats.\r\nPujol corps de logis rectangulaire à trois niveaux accolé d'une tour  rectangulaire à trois niveaux également toiture à un pan légèrement incliné, prolongé en équerre par  des dépendances à deux niveaux et attiques, deux échauguettes ont été rajoutés lors de sa rénovation ainsi qu'un pavillon d'entrée saillant avec angles arrondies, balcon sur colonnes doriques et abrité par une toiture avancée.","habitants":"Famille d'Alphonse Mahul\r\n        \"","divers":"Château de Villardonnel et de Pujol à Cuxac-Carbardès","gps":"","images":["../image/image_11/11_Villardonnel_1.jpg","../image/image_11/11_Villardonnel_2.jpg","../image/image_11/11_Villardonnel_3.jpg","../image/image_11/11_Villardonnel_4.jpg","../image/image_11/11_Villardonnel_5.jpg","../image/image_11/11_Villardonnel_6.jpg"]},"Consult_chateau_formulaire1149":{"id":"Consult_chateau_formulaire1149","dept":"11","canton":"Rieux-Minervois","commune":"Villarzel Cabardès","nom":"Villarlong","type":"Forteresse","periode":"XVI","histoire":"VILLARLONG; le château de Villarlong est un château bâti à Villarzel-Cabardès, le château est installé dans un parc de 100 hectares et possède une chapelle qui remonte au IXe siècle. C'est un château doté d'une piscine à débordement, d'un court de tennis et d'un vignoble de 7 hectares. Les appartements et les villas autonomes présentent des murs en pierres apparentes ainsi que des poutres en bois.  Chacun comprend une cuisine entièrement équipée. Un petit-déjeuner continental est proposé sur demande préalable. Vous pourrez également déguster des plats méditerranéens au restaurant. L'endroit est paradisiaque !'ancienne forteresse rebâtie dans la seconde moitié du XVIe siècle, acheté aux XVIIIe siècle par Dominique Ayrolles  riche fabriquant de draps de Carcassonne. Aujourd'hui de la famille de Nigri.","architecture":"le château de Villarlong bâti à Villarzel-Cabardès est installé dans un parc de 100 hectares et possède une chapelle qui remontée au IXe siècle. vu l'ampleur des communs qui abritent en particulier un bel escalier à vis suspendue. Disposant d'une grande terrasse ou d'un jardin privé, tous les appartements sont ornés d'une cheminée à foyer ouvert dans le salon et offrent une vue sur les jardins du château.","habitants":"Famille de Dominique Ayrolles  \r\n        \"","divers":"Château de Villarlong","gps":"","images":["../image/image_11/11_Villarlong_1.jpg","../image/image_11/11_Villarlong_2.jpg","../image/image_11/11_Villarlong_3.jpg","../image/image_11/11_Villarlong_4.jpg","../image/image_11/11_Villarlong_5.jpg","../image/image_11/11_Villarlong_6.jpg"]},"Consult_chateau_formulairea95a":{"id":"Consult_chateau_formulairea95a","dept":"11","canton":"Bram","commune":"Villarzel du Razès","nom":"Villarzel","type":"Château","periode":"XV","histoire":"VILLARZEL, le château et la terre de Villarzel-du-Razès furent donnés en 1212, par Simon de Montfort à Philippe Golloinh. Cette possession fut longtemps disputée par Guillaume Pétri de Villarzel et sa sur Gaillarde de Fanjeaux, comme faisant partie de l'héritage de Pierre Bernard, leur oncle, et de Guillaume Petri, leur père. Une transaction fut passée en 1263, par la médiation et le jugement rendu par Raymond Trencavel, vicomte de Carcassonne. Jusqu'en 1790, la Justice était rendue par la châtellenie de Montréal, jusqu'en 1838 par les frères de La Pujade, derniers seigneurs de Villarzel, qui l'avaient divisé en deux, puis par la famille Azaubert, puis par M. Courtauly. L'église, ancienne chapelle du château, est d'origine romane. Elle a été agrandie et restaurée au XIVe siècle. Curieux chapiteaux sculptés, joli clocher pyramidal, en briques, reposant sur la voûte de la chapelle du sud. Le Château de Villarzel est privé et propose des appartements. C'est un authentique château du XVIe siècle. Vendu avec une bergerie immense et d'autre dépendances sur un terrain d'environ 80 hectares en bordure d'un village,   En 1838 par les frères de La Pujade, derniers seigneurs de Villarzel, qui l'avaient divisé en deux, puis par la famille Azaubert, puis par M. Courtauly.","architecture":"Château de Villarzel, château seigneurial, construit en briques posées a plat, vaste et bien conservé, est flanqué de trois tourelles aux angles du nord, du sud et de l'ouest. Une partie ancienne, datant de la fin du XVe début XVIe siècle, s'élève au nord-est, rappelant le plan d'une maison forte de petit chevalier villageois.  on y accède par un perron conduisant à un escalier tournant en pierre, surmonté d'un dôme. Grande cuisine, vastes appartements, on remarquera surtout la chambre du seigneur:  Sa construction du XVe au XVIIe siècle. On remarque quelques motifs de sculpture aux deux façades du Sud et de l'Est, à hauteur du premier étage.    Elle se compose d'un rez-de-chaussée avec salle et cuisine, et d'un étage accessible par un escalier en vis hélicoïdal, hors oeuvre, de style gothique tardif. Les pièces s'ornent un décor stuqué du XVIIe siècle sur la porte et la cheminée, ainsi que de plafonds à la française. Une partie, construite avant le XVIIIe siècle, double le logis ancien vers le sud-ouest, avec l'adjonction de deux autres tours, dont l'une a été démolie au XVIIIe siècle.","habitants":"Famille de Guillaume Pétri de Villarzel \r\n        \"","divers":"Château de Villarzel  du Razès","gps":"","images":["../image/image_11/11_Villarzel_1.jpg","../image/image_11/11_Villarzel_2.jpg","../image/image_11/11_Villarzel_3.jpg","../image/image_11/11_Villarzel_4.jpg","../image/image_11/11_Villarzel_5.jpg"]},"Consult_chateau_formulaire43cc":{"id":"Consult_chateau_formulaire43cc","dept":"11","canton":"Rieux-Minervois","commune":"Villegly","nom":"Villegly","type":"","periode":"XIII-XVI","histoire":"VILLEGLY, au  vicomte de Minerve au XIIIe siècle. En 1253 une  lettre du roi Saint-Louis, Tout cela en considération des services de son frère. Guillaume de Minerve n'eut que des filles. Le roi voulut que le droit, qu'elles avaient sur la dot de leur mère, fut réglé après le décès de cette dame suivant les usages et les coutumes du pays. En 1279 : Le roi accorde que la fille de Blanche de Minerve jouira sa vie durant, des soixante livres de rente assignées à sa mère sur la susdite terre de Villegly. Raimonde mourut vers 1308. La mère et la fille jouirent, pendant plus de cinquante ans, des droits que le roi Saint-Louis leur avait concédés sur Villegly, et qui se changèrent en usufruit, à titre précaire. En 1308 : Mort de Raimonde de Minerve, fille de Guillaume IV et de Blanche de Termes. Dès l'année suivante, le roi Philippe le Bel, soucieux d'établir un port sur nos côtes, put entamer la procédure d'échange entre le château de Villegly, sur lequel la mort de la dernière des descendants de la famille comtale de Minerve avait levé toute hypothèque, et celui de Leucate, détenu à cette époque par la maison de Durban. En la personne de Gaubert de Durban, une nouvelle famille s'installait donc à Villegly. A la fin du XIVe siècle, propriété de la famille de Sauve, le  château primitif échoit par alliance à Foulquet de Merle  viguier du Minervois sa fille  de Sauve le fait entrer dans la famille de Grave, le conserveront jusqu'au XVIIe siècle. En 1646 suite au décès de de Marc-Antoine et Jacques de Grave  le château est cédé à Pierre de Gach  ses descendants le revendent en 1684 à Jacques de Danty juge mage à la sénéchaussée de Carcassonne, la dernière des Danty Jeanne-Françoise-Charlotte épouse en 1748 Guillaume-Marie d'Ouvrier vicomte de Bruniquel, le dernier de cette famille lègue à un de ses neveux Rigal d'Ouvrier  à condition qu'il épouse Marie-Charlotte de Villeneuve nièce de sa défunte épouse, ils auront dix enfants. en 1981 le château est acquis par le conseil général de l'Aude.","architecture":"Villegly se présente sous deux visages l'ancien  à l'Est  de la construction actuelle remanié et reconstruit au XIIIe siècle   possédait une tour de pierre entourée d'une enceinte de hautes murailles qui étaient bâties en pierre également. Au XVIe siècle les travaux entrepris donne naissance à deux corps de bâtiments reliés au sud par un bâtiment transversal. En avant de celui-ci un bâtiment abritant un escalier marque la séparation entre la cour intérieure petites et la cour d'honneur. le quadrilatère ainsi formé de trois angles d'échauguettes reposant sur des culs-de-lampe. en 1650 agrandissement du château dans un style néo-renaissance, nouvelles ouvertures démolition d'une tour et rajout de la quatrième échauguette et en 1871 le château fait l'objet d'une nouvelle transformation.","habitants":"Famille de Sauve\r\n        \"","divers":"Château de Villegly","gps":"","images":["../image/image_11/11_Villegly_1.jpg","../image/image_11/11_Villegly_2.jpg","../image/image_11/11_Villegly_3.jpg","../image/image_11/11_Villegly_4.jpg","../image/image_11/11_Villegly_5.jpg","../image/image_11/11_Villegly_6.jpg","../image/image_11/11_Villegly_7.jpg"]},"Consult_chateau_formulairec252":{"id":"Consult_chateau_formulairec252","dept":"11","canton":"Montréal","commune":"Montolieu","nom":"Villeneuve_Aude","type":"Château","periode":"XVII","histoire":"VILLENEUVE,   transformé en chambres d'hôtes de monsieur Guy François, dit aussi   la ferme de Peyremale.  Le quartier de Valsiguier, à Montolieu, a fait l'objet d'une étude par l'amicale laïque de Carcassonne avant des travaux d'aménagement municipaux. L'équipe a mis au jour un mobilier archéologique abondant datant du dernier tiers du XIIIe siècle et du premier tiers du XIVe siècle. Selon l'hypothèse de l'archéologue Marie-Élise Gardel, il s'agirait du faubourg détruit en 1243 pour punir la population ralliée à la cause du fils Trencavel lors de la révolte de 1240-1242. Montolieu fut chef-lieu de canton durant la Révolution. En 1939, un camp dinternement est ouvert pour interner les réfugiés espagnols fuyant la dictature franquiste.","architecture":"Villeneuve château  de style néo-Renaissance possède un   corps de logis rectangulaire à deux niveaux avec lucarne sur partie centrale gothique, sur la gauche un pavillon à trois niveaux à pignon triangulaire, à l'opposé un donjon rectangulaire à trois niveaux , grande baie au rez-de-chaussée  balcon au premier , toitures en terrasse avec mâchicoulis et échauguettes en encorbellement , accolée sur l'extérieur d'une tourelle dépassant l'ensemble avec mâchicoulis et terrasse,à la base une chapelle à l'arrière à l'opposée une tour ronde à toiture en poivrière.","habitants":"monsieur Guy François\r\n        \"","divers":"Château de Villeneuve d'Aude à Montolieu","gps":"","images":["../image/image_11/11_Villeneuve_Aude_1.jpg","../image/image_11/11_Villeneuve_Aude_2.jpg","../image/image_11/11_Villeneuve_Aude_3.jpg","../image/image_11/11_Villeneuve_Aude_4.jpg","../image/image_11/11_Villeneuve_Aude_5.jpg"]},"Consult_chateau_formulairec35a-2":{"id":"Consult_chateau_formulairec35a-2","dept":"11","canton":"Castelnaudary","commune":"Villeneuve la Comtal","nom":"Villeneuve_Comptal","type":"Château","periode":"XIV","histoire":"Deux châteaux à Villeneuve-Comptal celui de Villeneuve et celui de Fendeille                                                                             VILLENEUVE la COMPTAL, les premières traces de son existence remontent à 1140, il appartient alors à la famille seigneuriale de Villeneuve. Lors de la croisade albigeoise il est pris par les croisés mais en 1211 le comte de Foix le récupère. Il faut attendre le XVIe siècle pour apprendre quil va être acheté par Jean de Bernuy en 1514  à la famille de Caraman. Cest son fils Pierre de Bernuy qui en 1553 reconstruira la bâtisse sur les bases du château féodal. Les dépendances du château sont transformées en atelier pour « agrandir le pastel » et le magasin situé à langle Nord-Ouest du château est toujours visible. Il est aussi question dun moulin pastelier près du cimetière. En 1574 le château est occupé par les huguenots, la famille de Bernuy ayant opté pour ce parti. Mais en 1575 il est pris dassaut et en partie brûlé et détruit.Au début du XVIIe siècle il bénéficiera dune restauration et en 1693 il est cédé par mariage à Hugues de Ricard qui le conservera jusquà la Révolution.                                                                               A quelques kilomètres à l'Est a FENDEILLE  la construction du château de Fendeille date de 1208, et  Simon de Montfort donna Fendeille à son lieutenant Fontaines dont la famille conserva  le domaine jusqu'au XVIe siècle. En 1726 Alexandre  de Bessabat marquis de Fendeille vend le marquisat  à Pierre de Bonniol  baron de Montaleyrac. En 1760 vente à François de Gauzy Driget marquis de Malespina  qui décédera à Montpellier en 1836 le château passe à son neveu Louis-Julien Serres de Gauzy, le château et les terres resteront  dans cette famille jusqu'au XXe siècle.  Il appartient aujourd'hui à la commune de Fendeille et sert d'école.","architecture":"Villeneuve Comptal à la Révolution, le château est alors  laissé à labandon et atteint létat de ruine dès la première guerre mondiale. Il faut sauter trois siècles pour arriver à notre époque où une poignée de militants créé « lassociation de sauvegarde du château de Villeneuve la Comptal ». Sur les bases dun contrat signé avec la famille du propriétaire du château le but est de redonner vie aux vieilles pierres et de créer un pôle culturel avec des salles dexposition et de conférences.   En 2005 il y a la réfection en pierre apparente dun mur du château en bas du grand escalier, le long de la rue de lEnvol. Mais le mauvais état général du site pose de sérieux problèmes. En 2009, un pan de mur seffondre en créant un risque majeur pour la population et donc nécessite une mise en sécurité obligatoire. Devant lampleur des travaux, lassociation vote en 2009 sa dissolution. Depuis le « château » est en vente,  seuls les piliers du portail et le mur de soutènement de la plate forme sont encore visibles.                                                              Fendeille, en 1760 remaniement du château de plan quadrangulaire  à deux niveaux flanqué d'un pavillon d'entrée légèrement saillant  balcon au premier et fronton redondant sur niveau du toit avec série de lucarnes avec fronton identique ainsi que sur les tours carrées en angles.","habitants":"Famille de Caraman\r\n        \"","divers":"A Villeneuve-Comptal celui de Villeneuve et celui de Fendeille","gps":"","images":["../image/image_11/11_Villeneuve_Comptal_1.jpg","../image/image_11/11_Villeneuve_Comptal_2.jpg","../image/image_11/11_Villeneuve_Comptal_3.jpg"]},"Consult_chateau_formulairea73c-3":{"id":"Consult_chateau_formulairea73c-3","dept":"11","canton":"Rieux-Minervois","commune":"Villeneuve_Minervois","nom":"Villeneuve_Minervois","type":"Forteresse","periode":"XII","histoire":"VILLENEUVE-Minervois signe de la puissance seigneuriale du chapitre de Carcassonne, le château a été bâti sous l'influence d'Isarn d'Aragon, entre 1195 et 1236. Le château primitif, dont le rôle de sentinelle à l'entrée de la vallée de la Clamoux est évident, engloba dans son enceinte l'église Saint-Etienne et les quelques habitations qui s'étaient développées autour. Au  XIe siècle, un petit château fort surveille la vallée de la Clamoux. Au XIIe siècle, débute la terrible croisade des Albigeois commandée par Simon de Montfort. Au milieu du XIIIe siècle, après la croisade des Albigeois, des biens  sont donnés aux chanoines du chapitre Saint-Nazaire. A la fin du XIIIe siècle, le site se nomme Villeneuve les Chanoines. Au début du XXIe siècle, la découverte de l'extérieur des fortifications est libre et gratuite.","architecture":"Par la suite de l'extension de la Ville Neuve, il comporte un château fort, une église fortifiée, un fossé et des remparts sur lesquelles s'appuient des maisons, le rempart fut prolongé et défendu par une nouvelle tour dite de l'hôpital et une poterne située au débouché du Pont-Vieux. L'ancien château-fort, transformé en habitation particulière, présente encore son imposante masse quadrangulaire, avec des courtines crénelées, flanqué à l'angle nord-est d'une grande et forte tour solidement bâtie en moellons taillés et garnie de meurtrières. Elle était plus élevée et elle est désignée jusqu'à la Révolution comme : tour des chanoines. Même si le crénelage a été refait, si un toit trop récent recouvre la tour, avec ses petites fentes verticales, archères droites, et ses trous de boulins pour un hourdage .Dans la cour intérieure, autrefois cour d'honneur,  une élégante tourelle octogone de la Renaissance, renfermant un large et superbe escalier en pierre bien conservé. La porte d'entrée de l'escalier murée est encadrée de fines moulures et surmontée d'un blason effrité. La grande porte du château, plein cintre, est visible au Sud, derrière le cur de l'église. Au dessus de la porte s'ouvre une fenêtre gothique, géminée, finement sculptée.","habitants":"Chapitre Saint-Nazaire\r\n        \"","divers":"Château de Villeneuve de Minervois","gps":"","images":["../image/image_11/11_Villeneuve_Minervois_1.jpg","../image/image_11/11_Villeneuve_Minervois_2.jpg","../image/image_11/11_Villeneuve_Minervois_3.jpg","../image/image_11/11_Villeneuve_Minervois_4.jpg"]},"Consult_chateau_formulaire3e1d":{"id":"Consult_chateau_formulaire3e1d","dept":"11","canton":"Rieux-Minervois","commune":"Caunes Minervois","nom":"Villerambert","type":"Château","periode":"XVI","histoire":"VILLERAMBERT, le château Villerambert de monsieur et madame Marcel Julien, ce magnifique château  et une chapelle du XVIe siècle.","architecture":"Villerambert est un château quadrangulaire  à trois niveaux  flanquée de tours rondes aux angles à toits arasées l'ensemble couvert en tuiles.","habitants":"Famille Julien\r\n        \"","divers":"Château de Villerambert","gps":"","images":["../image/image_11/11_Villerambert_1.jpg","../image/image_11/11_Villerambert_2.jpg","../image/image_11/11_Villerambert_3.jpg","../image/image_11/11_Villerambert_4.jpg"]},"Consult_chateau_formulairefdb9":{"id":"Consult_chateau_formulairefdb9","dept":"11","canton":"Fabrezan","commune":"Fabrezan","nom":"Villerouge_Crémade","type":"Vestiges","periode":"XII","histoire":"VILLEROUGE-CREMADE,  ce hameau possède aussi un palais du Moyen-Age, dont il ne subsiste à ce jour qu'un demi-mur et une meurtrière. Il est à noter que l'appellation \"la Crémade\" provient d'une voie de fait : un bûcher dressé à l'intention de cathares. Ce château a été détruit lors de la chevauchée du Prince Noir. De plus, dans les archives de la ville, l'on peut découvrir l'existence du comte de Fabrezan et seigneur de Villerouge, au XVIIe siècle. Il faut également rappeler que Fabrezan et un ancien village fortifié, on peut encore apercevoir des remparts à l'impasse Nego-Saumo. À proximité de Fabrezan, les textes signalent un autre site, Villerouge, avec son église Villa Ruvia cum ecclesia sancti saturnini (an 859). Au Moyen-Age, avant la croisade contre les Albigeois, la seigneurie de Fabrezan appartenait à la vicomté de Narbonne. À partir du XIVe siècle, quand le vicomte de Narbonne accusa les consuls de la ville de Fabrezan de rébellion envers le roi (an 1381), il décida du punir les Narbonnais. Ces derniers ripostèrent en attaquant et en prenant le donjon de Fabrezan, refuge de la famille du vicomte. En 1508, la vicomté de Narbonne se trouve rattachée au domaine royal. L'histoire féodale se terminait. Les nouveaux seigneurs de Fabrezan  se chargent de percevoir les redevances féodales. Début du XVIIe siècle, fin de l'histoire féodale. En 1633, Jean de Seigneuret, seigneur de Fabrezan, fut reçu en remplacement du baron de Castrie. Ainsi venait d'être créée la baronnie de Fabrezan. Fin XIXe siècle, construction des remparts et création de deux quartiers de Saint-Marc et les Plantiers.","architecture":"Villerouge- Crémade est dominé par un château ruiné dont il ne reste qu'un mur visible. Cela donne une impression de décor de théâtre, tant il est vrai qu'un seul mur livré aux attaques du vent et des intempéries ne peut plus guère faire valoir le prestige qui pouvait être le sien quelques siècles plus tôt. La date de naissance du château reste encore inconnue. Sa vie est tout aussi mystérieuse que les causes de son état. Mais, ce que l'on sait, c'est qu'au XIIe siècle le château est ruiné. Il ne reste qu'un mur et quelques vestiges des enceintes extérieures.","habitants":"Seigneurs de Fabrezan \r\n        \r\n        \"","divers":"Vestiges du château de Villerouge de la Crémade","gps":"","images":["../image/image_11/11_Villerouge_Cremade_1.jpg","../image/image_11/11_Villerouge_Cremade_2.jpg","../image/image_11/11_Villerouge_Cremade_3.jpg"]},"Consult_chateau_formulaire8bf4":{"id":"Consult_chateau_formulaire8bf4","dept":"11","canton":"Fabrezan","commune":"Villerouge-Termenès","nom":"Villerouge_Termenès","type":"Forteresse","periode":"XI","histoire":"VILLEROUGE, est la porte méditerranéenne des Hautes Corbières. Située au cur du village, la masse importante du château impose le respect. En effet, en 1107, le pape Pascal II doit confirmer larchevêque Richard dans sa possession de Villerouge qui est en réalité occupé, depuis 1070, par Pierre de Peyrepertuse. Ce dernier le donna en dot à sa fille au moment de son mariage avec Pierre Olivier de Termes. Ce nest que vers 1110, que la famille de Termes accepta de rendre le château à larchevêque de Narbonne. Au début du XIIe siècle, occupé par Simon de Montfort qui le rendra en 1228. A cette époque et jusquà la Révolution Française, les puissants archevêques de Narbonne sont les seigneurs du château et du village. Cependant, le château de Villerouge-Termenès fut plusieurs fois occupé et convoité. Le village est intimement lié à lhistoire du catharisme finissant : en 1321, Guilhem Bélibaste, dernier parfait cathare occitan connu y fut brûlé vif. Guilhem Bélibaste avait été initié au catharisme jusquà en devenir parfait en Catalogne où il était en fuite. Seuls les parfaits pouvant transmettre la religion, sa mort signifia la fin de la religion cathare. En 1789 les archevêques de Narbonne sont dépossédés de Villerouge et en 1994 la commune devient propriétaire du château.","architecture":"Villerouge Les archevêques de Narbonne s'efforcèrent de fortifier cette place qui s'impose par sa robustesse. architecture militaire de la région se compose d'une enceinte formant un quadrilatère de plan régulier cantonné à chaque angles de tours rondes, La grosse tour ou donjon de 23 mètres de haut, l'angle sud-est comporte trois salles superposées, aux murs très épais, dans lesquels ont été aménagés des escaliers. On parvient à une terrasse crénelée. Cette citadelle a sans doute été construite au XIIIe siècle, pendant le troisième quart du siècle. Faut-il y deviner le souci nouveau des autorités ecclésiastiques de mieux défendre leur bien. Le château a joué un rôle important durant la croisade contre les Albigeois.  Le château, alors en ruines, fait lobjet dun classement au titre des monuments historiques depuis le 6 octobre 1976.","habitants":"Famille de Termes\r\n        \r\n        \"","divers":"Château de Villerouge Termenès","gps":"","images":["../image/image_11/11_Villerouge_Termenes_1.jpg","../image/image_11/11_Villerouge_Termenes_2.jpg","../image/image_11/11_Villerouge_Termenes_3.jpg","../image/image_11/11_Villerouge_Termenes_4.jpg","../image/image_11/11_Villerouge_Termenes_5.jpg","../image/image_11/11_Villerouge_Termenes_6.jpg","../image/image_11/11_Villerouge_Termenes_7.jpg","../image/image_11/11_Villerouge_Termenes_8.jpg","../image/image_11/11_Villerouge_Termenes_9.jpg"]},"Consult_chateau_formulairee663-2":{"id":"Consult_chateau_formulairee663-2","dept":"11","canton":"Sallèles d","commune":"Moussan","nom":"Védilhan","type":"Château","periode":"XVII","histoire":"VEDILHAN domaine familial, acquit en 1824 par Antoine Fayet (grand-père de Gustave Fayet)  de 1865 à 1925 propriété du collectionneur Gustave Fayet qui épousa  en 1893 Marie Madeleine d'Andoque de Sériège famille la plus fortuné qui sauva l'abbaye de Fontfroide de la ruine, compta jusquà 210 ha de vignes. En 1895, Gabriel Fayet construisit dimmenses caves pouvant loger au moins 15 000 hl de vin.\r\n Château édifié en 1893 sur linitiative de Gabriel Fayet  ayant appartenu aux seigneurs de Tarrabust. L'actuel château est le fruit de l'opulence viticole de la fin du XIXe siècle dans tout le Bas-Languedoc. Il se caractérise par une architecture néo-renaissance.","architecture":"Le château construit à la fin du XIXe siècle  et sa façade néo renaissance a été expliqué avec détail; son histoire aussi: il y avait à l'époque un village autour du château où se situe actuellement le parc. Le château était un cadre de vie, de réception, de vie mondaine. Le public était en extase devant un tel bâtiment avant de découvrir un trésor caché: le vestibule. Un lieu majestueux en bois sculpté orné de nombreux tableaux réalisés par Gabriel et son frère Léon Fayet. Des uvres inestimables qui reproduisent des objets précieux de la famille, des paysages mais aussi les ascendants.","habitants":"Famille d'Antoine Fayet\r\n        \r\n        \"","divers":"Château de Védilhan","gps":"","images":["../image/image_11/11_Vedilhan_1.jpg","../image/image_11/11_Vedilhan_2.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','11 — Aude'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
