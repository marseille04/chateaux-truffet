hâteau ancien couvent et le château de Farebouc.","gps":"","images":["../image/image_11/11_Mas_Stes_Puelles_1.jpg","../image/image_11/11_Mas_Stes_Puelles_2.jpg","../image/image_11/11_Mas_Stes_Puelles_3.jpg","../image/image_11/11_Mas_Stes_Puelles_4.jpg","../image/image_11/11_Mas_Stes_Puelles_5.jpg","../image/image_11/11_Mas_Stes_Puelles_6.jpg","../image/image_11/11_Mas_Stes_Puelles_7.jpg","../image/image_11/11_Mas_Stes_Puelles_8.jpg"]},"Consult_chateau_formulaire4631":{"id":"Consult_chateau_formulaire4631","dept":"11","canton":"Sigean","commune":"Portel des Corbières","nom":"Mattes_Sabran","type":"Château","periode":"XVII","histoire":"MATTES-SABRAN, les Montredon vont s'installer au château de Mattes situé près de Portel des Corbières. Afin d'accroître leurs richesses, les archevêques de Narbonne détenteurs de la seigneurie de Sigean vont user de leur influence politique considérable pour que le Lac devienne un lieu d'étape pour les troupes employées à la conquête du Roussillon. Le Lac sera très vite ruiné obligeant les habitants à se réfugier dans les seigneuries voisines de Portel et Sigean. Après 1653, Melchior de Montredon quitte le château de Mattes. Avant de mourir, il lègue le Lac et Mattes à son cousin par alliance Jacques Del Rieu seigneur de Villefalse. Son fils prénommé lui aussi Jacques,  hérite des biens de son père et se sépare du château de Mattes vers 1657 qu'il vend à Raymond Pierre de Pompadour, fils de Pierre, seigneur de Villesèque. Jacques Del Rieu prend le titre de baron du Lac et de Villefalse. Il devient conseiller du Roi à la cour des comptes aides et finances de Montpellier. Il épouse en 1683 Marie Faure de la Farge. De cette union naît une fille qui choisit de rentrer au couvent. Privé de descendance mâle il vend ses seigneuries du Lac et de Villefalse à son neveu par alliance Balthazar Aymar de Monteil, originaire du Vivarais.","architecture":"Château de Mattes-Sabran, l'ensemble des bâtiment en plan de U le corps de logis principal à deux niveaux avec fronton triangulaire prolongé sur l'avant de dépendances dont celle de gauche est accolée d'une tour carrée à quatre niveaux.","habitants":"Famille de Jacques Del Rieu \r\n        \"","divers":"Château à Mattes Sabran","gps":"","images":["../image/image_11/11_Mattes_Sabran_1.jpg","../image/image_11/11_Mattes_Sabran_2.jpg","../image/image_11/11_Mattes_Sabran_3.jpg","../image/image_11/11_Mattes_Sabran_4.jpg","../image/image_11/11_Mattes_Sabran_5.jpg"]},"Consult_chateau_formulaire3d8c":{"id":"Consult_chateau_formulaire3d8c","dept":"11","canton":"Trébes","commune":"Barbaira","nom":"Miramont_Barbaira","type":"Vestiges","periode":"XII","histoire":"A Miramont les vestiges du château du XIIe siècle et le château de Floure.                                                                                       MIRAMONT,  en 1063, un \"Castellum\" est mentionné a été construit par les seigneurs de Capendu au Moyen-Age entre le XI et XIIe siècle. Simon de Montfort en prit possession après quelques jours de siège en 1210 lors de la croisade des Albigeois. Il fut détruit vers le XVI siècle. Au  XIIe siècle, amélioration des défenses et construction du donjon . En 1211, l'armée Royale commandée par Simon de Montfort  détruit le château. \r\n  FLOURE  a deux kilomètre au nord de Miramont se blottit contre le massif de lAlaric. Gaston Bonheur sest attaché à lui reconstituer son profil passé: Homme de lettres et vigneron, cest là quil se livre à ses deux passions: écrire et faire du bon vin. Si Charles Trénet dans sa chanson na vu que les « tours de Carcassonne se profilant à lhorizon de Barbaira », cest que celles du château de Floure sont bien moins imposantes et quelles se cachent au milieu des vignes. Pourtant depuis la route on distingue aisément leur silhouette camouflée sous un épais tapis de lierre grimpant. Vieil ami de Gaston Bonheur, Trénet vient parfois faire le tour de la propriété de ce dernier, en son absence.  Quand il est à sa maison de Vestiges Narbonne on se voit souvent », raconte Gaston Bonheur. aujourd'hui chambres d'hôtes et viticole.","architecture":"Le château de Miramont est situé sur les flancs de la Montagne d'Alaric, à quelques kilomètres de Carcassonne. date du XIe au XIIIe siècle. Il est en ruine, mais on voit encore son organisation générale : un donjon central (dont il reste une partie d'une salle voûtée), une enceinte extérieure sur laquelle sont adossés divers bâtiments. Le château de Miramont est situé dans une position très avantageuse : il domine la vallée de l'Aude.                                                                                                                Floure, cest une de ces maisons types de la voie romaine qui sont devenues monastère au Ve siècle. Elle en a gardé le déambulatoire classique voûté en plein cintre. Il faisait les quatre coins de la cour Les Moines en fin de compte, nont rien inventé. Ils ont mis tout simplement une croix sur la porte et ont continué à porter la toge et les spartiates romaines et à parler en latin. Un moine est un romain qui a continué à être romain sous les barbares. Pendant la Révolution le château aurait servi de prison  Cest le dessin classique de ces belles et vastes maisons bourgeoises du XVIe siècle flanquée de deux massives tours carrées, les tours du Cers et du Marin, daprès leur exposition au vent comme leurs noms lindiquent.","habitants":"Simon de Montfort                                                                                 Famille de Gaston Bonheur \r\n        \"","divers":"Vestiges du château féodal  de Miramont et le château de Floure à Barbaira.","gps":"","images":["../image/image_11/11_Miramont_Barbaira_1.jpg","../image/image_11/11_Miramont_Barbaira_2.jpg","../image/image_11/11_Miramont_Barbaira_3.jpg","../image/image_11/11_Miramont_Barbaira_4.jpg","../image/image_11/11_Miramont_Barbaira_5.jpg","../image/image_11/11_Miramont_Barbaira_6.jpg"]},"Consult_chateau_formulairebee4":{"id":"Consult_chateau_formulairebee4","dept":"11","canton":"Bram","commune":"Molleville","nom":"Molleville","type":"Château","periode":"XIII-XVIII","histoire":"MOLLEVILLE    Antoine François Bertrand de Molleville\r\nBiographie Jeunesse Antoine François de Bertrand de Molleville est reçu conseiller au parlement de Toulouse en 1766. Il a comme secrétaire Bernard François Balssa, futur père dHonoré de Balzac.","architecture":"Château seigneurial modifié à plusieurs époques. Grande bâtisse flanquée de quatre tours carrées, plus une tour à créneaux du XIIIe siècle et XVIIIe siècle, une cour d'honneur et un parc en gradins.","habitants":"Famille d' Antoine François Bertrand de Molleville\r\n        \"","divers":"Château de Molleville","gps":"","images":["../image/image_11/11_Molleville_1.jpg","../image/image_11/11_Molleville_2.jpg","../image/image_11/11_Molleville_3.jpg","../image/image_11/11_Molleville_4.jpg"]},"Consult_chateau_formulaire6e55-2":{"id":"Consult_chateau_formulaire6e55-2","dept":"11","canton":"Bram","commune":"Montauriol","nom":"Montauriol_11","type":"Château","periode":"XVI-XVII","histoire":"MONTAURIOL, ancien château seigneurial et l'église. Sur la place, croix monumentale en pierre, surmontée du coq gaulois, élevée en 1776.  Moulin à vent du Clos de la Maït, au-dessus du château. Sculptures sur le linteau de la porte de deux maisons, avant et après la Mairie : Sur l'un on voit deux lions affrontés avec un cur entre et la date de 1827. Sur l'autre, deux animaux fantastiques, avec vase de fleurs entre et la date 1862. Ces sculptures sont l'uvre d'un maçon du pays nommé Berquière.\r\nCette belle demeure est devenue la propriété de M. Lapasset.   Catherine, Nicolas Gelis et leurs quatre enfants seront vraiment chez eux. Ils s'installeront dans le château du XVIIe siècle qui abrita sept générations de Saint-Plancat.\r\nCUMIES à quelques kilomètres au nord château d'origine ancienne, a été restauré et transformé au commencement du XIXe siècle. Pas d'information historique.","architecture":"Le château de Montauriol des anciens seigneurs de Montauriol (Monteauriolo) est une vaste et confortable résidence, précédée d'un jardin, d'un parc et entourée d'arbres séculaires. Deux tourelles carrées, démantelées, flanquent les angles de l'est et du sud, Ancienne fenêtre grillée donnant sur l'église. Du côté du nord-ouest, le château était naturellement défendu par une pente rapide. Des fossés, aujourd'hui comblés, protégeaient les autres faces.                                                                                               Cumies  a été restauré et transformé au commencement du XIXe siècle. est entouré d'un grand parc. Le Donjon flanque l'angle Nord-Ouest. L'entrée est précédée d'une cour fermée par un mur élevé, sur lequel on remarque, du côté de l'église, d'anciennes ouvertures à plein cintre murées. Sur le linteau des portes, à l'intérieur de la cour, sont sculptés deux lions. Sur une porte on lit la date 1827, sur l'autre Berquier. C'est le nom de l'auteur de ces sculptures; il était tailleur de pierre à Montauriol. On voit sur deux maisons de ce virage des motifs semblables.château, d'origine ancienne, a été restauré et transformé au commencement du XIXe siècle.","habitants":"Seigneurs de Montauriol \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Château féodal de Montauriol et celui de Cumiès","gps":"","images":["../image/image_11/11_Montauriol_1.jpg","../image/image_11/11_Montauriol_2.jpg","../image/image_11/11_Montauriol_3.jpg","../image/image_11/11_Montauriol_4.jpg","../image/image_11/11_Montauriol_5.jpg","../image/image_11/11_Montauriol_6.jpg","../image/image_11/11_Montauriol_7.jpg"]},"Consult_chateau_formulairee5a1":{"id":"Consult_chateau_formulairee5a1","dept":"11","canton":"Lézignan de Corbières","commune":"Montbrun des Corbières","nom":"Montbrun_Corbières","type":"Vestiges","periode":"XIII","histoire":"Trois châteaux à Montbrun celui de Montbrun, de l'Horte, du Roc et du Vieux Moulin.                                                                   MONTBRUN-des-CORBIÈRES, ce château a fait partie en 1229 de lhommage de Roger de Franco de Casali au comte de Foix, Roger-Bernard II. Cité  ensuite  en 1263 dans le dénombrement des possessions que le comte de Foix. Le vicomte de Narbonne s'en empare. En 1209, Montbrun devint une des trente-et-une baronnies de la vicomté de Narbonne. En 1272, première apparition d'une communauté villageoise près du Castrum de Montbruno. Durant la période de la croisade des Albigeois, le seigneur de Montbrun est dépossédé de ses biens par Simon de Montfort. Ce fut son fils Amaury de Montfort qui restitua le château au vicomte de Narbonne. Le château avait un châtelain qui occupait les lieux ainsi qu'un viguier.  La seigneurie arrive par mariage en possession de Pierre-Antoine de Trégoin, seigneur de Montbrun en 1625. Jean-Pierre de Trégoin, puis Jean-Hyacinthe de Trégoin lui succèdent et portent le titre de vicomte de Montbrun en 1693. Marie-Gabrielle de Trégoin, petite fille de l'ingénieur Antoine Niquet, apporte en dot Montbrun par son mariage avec Antoine Pascal de Saint-Félix, fils  d'Antoine Pascal, et d'Isabeau de Gothias. Leur fils, Hyacinthe-Xavier-Joachim-Antoine Pascal, marquis de Saint-Félix et seigneur de Montbrun, lui succède. Il épouse Anne-Marie-Madeleine du Bois-des-Cours de la Maisonfort, fille d'Alexandre du Bois-des-Cours de la Maisonfort, marquis, seigneur de Bertry et de Catherine de Chicogneau. Il meurt en 1790 et sa veuve en 1824.  Château de LHORTE viticole et chambres d'hôtes de Jean-Pierre Biard et Johanna Van der Spek                                                                                                                  ROC, créé et bâti au début du XVIIIe siècle, le château du Roc est exploité depuis de Père en Fils, de la famille Bacou .                                                                                                 Vieux Moulin viticole chambres d'hôtes par Alex They.","architecture":"Le château de Montbrun, il  présente une situation agréable à  125 mètres d'altitude. Autrefois, il était entouré de remparts flanqués de tours dominés par un important château-fort. La porte Saint-Pierre est bien conservée avec des vestiges de murs primitifs   Démoli par son acquéreur en 1824, il ne reste presque plus rien, à part quelques pierres et la forme d'une motte.\r\nAu XVIIIe siècle, le châtelain qui représente le seigneur possédait une maison adossée au château devenu inhabitable.\r\nLe bourg était clos de remparts dont il reste des vestiges.","habitants":"Famille de Pierre-Antoine de Trégoin\r\n        \r\n        \"","divers":"Château de Montbrun, de l'Horte, du Roc et du vieux Moulins.","gps":"","images":["../image/image_11/11_Montbrun_Corbieres_1.jpg","../image/image_11/11_Montbrun_Corbieres_2.jpg","../image/image_11/11_Montbrun_Corbieres_3.jpg","../image/image_11/11_Montbrun_Corbieres_4.jpg","../image/image_11/11_Montbrun_Corbieres_5.jpg"]},"Consult_chateau_formulaireae02-2":{"id":"Consult_chateau_formulaireae02-2","dept":"11","canton":"Castelnaudary","commune":"Montferrand","nom":"Montferrand_Aude","type":"Vestiges","periode":"X","histoire":"MONTFERRAND,  est mentionné pour la première fois en 1 102. À cette époque, il est propriété des puissants comtes de Toulouse. Son entrée dans l'histoire se situe en 1208, à l'aube de la croisade sanglante contre les Albigeois.  Le comte de Toulouse, Raymond VI, s'impose comme protecteur des Cathares. Lorsque le légat du Pape, Pierre de Castelnau, est assassiné, il est  mis en cause. Pour se racheter, il offre à l'église huit de ses principales forteresses dans la région, dont le château de Montferrand. Ainsi, après avoir appartenu aux comtes, le château tombe dans les mains des évêques de Maguelone. De 1208 à 1255, la forteresse vivra une histoire locale. Il domine tout, comme ses trois prisons : la comtesse, la diablesse et la marquise. Au XVIe siècle, vient vivre au Montferrand celui qui sera le dernier des évêques de Maguelone : Guillaume Pellicier, dit 'le jeune'. Ambassadeur de François Ier, cet homme libéral finira ses jours dans le nid d'aigle de Montferrand, où il mourra en 1 568. La petite histoire dit que Guillaume Pellicier fut prisonnier de la citerne de l'édifice, parce qu'il avait fauté avec une belle  femme?. En 1698, on ordonne la destruction du château de Montferrand, faute de pouvoir payer son entretien et, surtout, parce que cette ancienne place forte est devenue sans importance.","architecture":"La visite de la ruine de Montferrand est libre et gratuite en respectant la propriété privée. Le risque de recevoir une pierre existe. Ce site est surtout une ruine pour les passionnés. En 1698, on ordonne la destruction du château de Montferrand, faute de pouvoir payer son entretien et, surtout, parce que cette ancienne place forte est devenue sans importance.\r\nSes pierres serviront à construire certaines maisons du village du haut à qui, d'ailleurs, la chapelle de cet édifice dédié à Saint-Mathieu donnera son nom.","habitants":"Famille de Guillaume Pellicier\r\n        \"","divers":"Vestiges du château de Montferrand.","gps":"","images":["../image/image_11/11_Montferrand_Aude_1.jpg"]},"Consult_chateau_formulaire0de1":{"id":"Consult_chateau_formulaire0de1","dept":"11","canton":"Trébes","commune":"Montlaur","nom":"Montlaur_Niermans","type":"Forteresse","periode":"XII-XVII","histoire":"MONTLAUR,  forteresse du XIIe siècle, les batailles entre le comte  de Toulouse et le comte de Barcelone sont fréquentes. Se situant sur la route d'Aquitaine, Montlaur craint les représailles. Pour éviter d'être massacrés par l'un des 2 camps, les seigneurs du pays des Mattes font construire un château fort sur la colline.  Vers 1210, l'armée royale de Simon de Montfort attaque et s'empare du château.  Le château-fort consistait en trois forts l'un dans l'autre, bâtis au XIIe siècle, sur un rocher abrupt, par Pierre Roger, vicomte de Béziers.                                                                                                          NIERMANS dit château de Montlaur,  gîtes de France. Une première construction au XVIIe siècle du château de Rigals a été remplacée par le château actuel ou château Niermans au XIXe siècle mais sur une composition architecturale du XVIIe siècle, le château fut la propriété dEdouard Niermans, le célèbre architecte de la Café Society à qui lon doit entre autres lhôtel Négresco à Nice, lhôtel du palais à Biarritz, lhôtel de Paris à Monte-Carlo ainsi que le Moulin Rouge, le casino de Paris, les folies Bergères, le théâtre des Capucines et le théâtre Marigny à Paris. Passionné de ce qui était alors un vaste domaine viticole, Edouard Niermans séjourna les dernières années de sa vie à Montlaur.  Le château est aujourd'hui la propriété de ses petits-enfants. Son fils, Jean, architecte premier grand prix de Rome, a réalisé la fresque de la chapelle St Michel qui se trouve dans l'église.","architecture":"Montlaur, Si les vestiges des fortifications de lancienne place forte sont peu visibles, ce lieu de promenade offre de splendides vues panoramiques sur le village, la plaine et la Coque. Mais ce château au cours des guerres entre seigneurs fut très rapidement démoli. Déjà en 1360, la première enceinte était en ruines. On remonta la deuxième enceinte et toute la population s'établit entre les deux murailles. Après la guerre de cent ans, on sortit des murailles et on passa même le ruisseau de la Fargue,  il ne reste que quelques vestiges des murs d'enceinte et le portail de \"Bissens\".                                                                                Niermans corps de logis rectangulaire à deux niveaux  avec pavillons d'entrée saillant avec escalier en fer à cheval.","habitants":"Famille d'Edouard Niermans\r\n        \"","divers":"Vestiges de la forteresse de Montlaur, château de Niermans","gps":"","images":["../image/image_11/11_Montlaur_Niermans_1.jpg","../image/image_11/11_Montlaur_Niermans_2.jpg","../image/image_11/11_Montlaur_Niermans_3.jpg","../image/image_11/11_Montlaur_Niermans_4.jpg","../image/image_11/11_Montlaur_Niermans_5.jpg","../image/image_11/11_Montlaur_Niermans_6.jpg","../image/image_11/11_Montlaur_Niermans_7.jpg"]},"Consult_chateau_formulaire9fd6":{"id":"Consult_chateau_formulaire9fd6","dept":"11","canton":"Castelnaudary","commune":"Montmaur","nom":"Montmaur_Aude","type":"Forteresse","periode":"X-XV","histoire":"MONTMAUR, la construction  remonte au Xe siècle et appartient à la seigneurie de St-Félix rattachée à la vicomté d'Albi et au conté de Toulouse. Montmaur, entre dans l'histoire au début du mouvement cathare. Ainsi, en 1211 et au printemps 1212, le bourg fut pris et repris par les armées croisées de Simon de Montfort. Les premiers seigneurs de Montmaur connus se nomment Bertrand de Montmaur et Sicard de Beaufort qui fut d'ailleurs condamné à la prison à perpétuité pour soutien à l'hérésie. En 1226, la seigneurie de St Félix et ses dépendances font l'objet d'une donation de Raymond VII comte de Toulouse en faveur de Roger Bernard comte de Foix qui le confie à son vassal Pierre de Buisson. Quatre siècles plus tard, une nouvelle vague d'agitation touche la région.la seigneurie passe à la famille de Lévis. Les guerres de religion du début du XVIIe siècle vont soumettre à rude épreuve le château actuel ; après pillage, prises d'assaut le 16 mars 1628, il est sauvé de la destruction ordonnée par Richelieu contre le versement d'une somme de 18 000 livres par Raymond Cau et Germain Touzet. II passe ensuite de main à main pour échoir par voie testamentaire à l'archevêque d'Albi, puis devient, à la Restauration, la propriété de la mairie de Castres. Il a été vendu récemment à un particulier.","architecture":"Montmaur est une imposante bâtisse reconstruite en 1495 de plan quadrangulaire en pierre calcaire locale s'inscrit dans un rectangle de 60 m sur 50 m avec une tour cylindrique à chaque angle, haute de 15 à 20 m. De l'extérieur apparaissent gargouilles, meurtrières et grandes fenêtres à meneaux dont certaines sont masquées par des barreaux. Des bouches à feu ainsi qu'une tourelle accrochée vers l'intérieur de l'enceinte à la tour sud indiquent des aménagements progressifs au cours des deux siècles suivants. La porte d'entrée protégée d'un mâchicoulis et dont les montants sont pourvus de glissières pour la herse, s'ouvre sur une cour intérieure carrée avec un puits en son centre. Face à elle et sur les côtés sont construits des logis percés de fenêtres à meneaux. Une tour d'escalier à vis permet la desserte des étages. Un vestige de palissade en bois, le long du mur sur la porte d'entrée, matérialise le chemin de ronde. Le château de Montmaur eut, durant les XVIe et XVIIe siècles un rôle essentiellement militaire ; ce n'est qu'au prix de difficiles adaptations qu'il servit partiellement de résidence dans le courant du XVIIIe siècle. Le château est inscrit aux monuments historiques depuis 1926. On ne visite que l'extérieur.","habitants":"Famille de Bertrand de Montmaur \r\n        \"","divers":"Forteresse de Montmaur","gps":"","images":["../image/image_11/11_Montmaur_Aude_1.jpg","../image/image_11/11_Montmaur_Aude_2.jpg","../image/image_11/11_Montmaur_Aude_3.jpg","../image/image_11/11_Montmaur_Aude_4.jpg","../image/image_11/11_Montmaur_Aude_5.jpg","../image/image_11/11_Montmaur_Aude_6.jpg"]},"Consult_chateau_formulaire3ce9":{"id":"Consult_chateau_formulaire3ce9","dept":"11","canton":"Sallèles d","commune":"Roubia","nom":"Montrabech","type":"Vestiges","periode":"XII","histoire":"MONTRABECH, domaine viticole dit les hauts de Montrabech, pas d'informations historiques","architecture":"Vestiges d'une tour du château  crénelée de plan carrée avec gite de guet et bretèche, un portail d'entrée et échauguettes dans le parc,  domaine viticole corps de logis rectangulaire à deux niveaux et attiques en oculus flanqué en  façade de deux tours carrées à deux niveaux avec oculus toit à quatre pans.","habitants":"Seigneur locaux\r\n        \"","divers":"Tour du château de Montrabech et domaine","gps":"","images":["../image/image_11/11_Montrabech_1.jpg","../image/image_11/11_Montrabech_2.jpg","../image/image_11/11_Montrabech_3.jpg","../image/image_11/11_Montrabech_4.jpg","../image/image_11/11_Montrabech_5.jpg","../image/image_11/11_Montrabech_6.jpg","../image/image_11/11_Montrabech_7.jpg","../image/image_11/11_Montrabech_8.jpg"]},"Consult_chateau_formulaire5785":{"id":"Consult_chateau_formulaire5785","dept":"11","canton":"Fabrezan","commune":"Montséret","nom":"Montséret","type":"Vestiges","periode":"XII","histoire":"MONTSERET,  en 1153 Raingarde de Montseret fonde ici aux Ollieux, la première abbaye cistercienne de femmes du royaume de France. Cette abbaye unique pour l'époque, deviendra en 1174 un prieuré rattaché à l'abbaye de Fontfroide, dont le rôle sera déterminant pendant la croisade contre les Albigeois. En 1304, après la mort du chevalier Guillaume-Raimon du Bourg, seigneur de Montséret, et de son fils Arnaud, Ricarde resta seule avec sa fille Mabile pour conserver et défendre le patrimoine familial. Avec une énergie farouche, Mabile âgée de 20 ans décida d'assumer l'héritage des charges que lui léguait son père. Entreprise difficile qui demandait une activité et une autorité peu commune parmi les femmes de cette époque. En 1311, elle perdit ses droits à Montséret au profit de sa toute puissante voisine l'abbaye de Fontfroide. Après 18 ans de lutte acharnée, elle retrouvera ses droits et son château en 1329.  Le castrum de Montséret fut soudainement abandonné par ses habitants en 1550, et ne fut jamais plus habité. La raison n'est pas connue, mais il semble que tout fut fait pour faire oublier ce lieu.","architecture":"Sur l'éperon rocheux de Roca Longua fut construit à partir du Xe siècle, le château de Montséret entouré de son village accroché aux flancs escarpés de la montagne. C'était un imposant château fort, avec donjon et doubles remparts, à l'image de son voisin Saint-Martin-de-Toques, aujourd'hui restauré.\r\nLes pierres du château qui n'avaient pas été utilisées pour construire le nouveau village et les murets des chemins de vignes, servirent de remblai à la voie de chemin de fer de l'éphémère petit train des Corbières. Ainsi disparurent en moins de 2 ans, donjons et double rempart.","habitants":"Chevalier Guillaume-Raimon du Bourg\r\n        \r\n        \"","divers":"Vestiges de la forteresse de Montséret","gps":"","images":["../image/image_11/11_Montseret_1.jpg","../image/image_11/11_Montseret_2.jpg","../image/image_11/11_Montseret_3.jpg","../image/image_11/11_Montseret_4.jpg","../image/image_11/11_Montseret_5.jpg","../image/image_11/11_Montseret_6.jpg","../image/image_11/11_Montseret_7.jpg","../image/image_11/11_Montseret_8.jpg"]},"Consult_chateau_formulaireee00":{"id":"Consult_chateau_formulaireee00","dept":"11","canton":"Montréal","commune":"Moussoulens","nom":"Moussoulens","type":"Château","periode":"XVII","histoire":"Deux châteaux à Moussoulens,  celui de Bouriette et de Trabet et autres domaines.                                                                        BOURIETTE chambres d'hôtes de Isabelle et Ashot Shahmirian. Pas d'information  historique pour ces deux châteaux.                                                                                                      TRABET domaine Le Trabet dont lhistoire remonte à la fin du XVIIIe siècle. Anciennement un domaine viticole, il offre maintenant trois luxueux gîtes où les voyageurs du monde entier viennent pour découvrir les joies de la vie française.","architecture":"Le Trabet fut construit autour dune grande cour avec un olivier de plus que 150 ans en son centre. À côté se trouve la « maison de maître », où habitent les propriétaires. Adjacents à celle-ci, les gîtes Le Palmier (une ancienne grange nommée daprès de nombreux palmiers dans le jardin) et Le Laurier (lancienne maison du vigneron de la propriété) ont été récemment transformés et rénové lui aussi, LOlivier, le troisième gîte, luxueux et très spacieux, est situé de lautre côté de la cour intérieure. Entre les deux corps de bâtiments, au fond de la grande cour, il existe une grande terrasse couverte où on peut jouer au tennis de table ou profiter de lombre avec la vue de lolivier et du parc .                                                                                                La Bouriette, corps de logis rectangulaire à trois niveaux, belle façade avec ses deux tourelles en angles à toit en poivrières.","habitants":"Seigneurs locaux\r\n        \"","divers":"Vestiges du château de Moussoulens, château de Trabet;  de Bouriette et  de Roujeanne.","gps":"","images":["../image/image_11/11_Moussoulens_1.jpg","../image/image_11/11_Moussoulens_2.jpg","../image/image_11/11_Moussoulens_3.jpg","../image/image_11/11_Moussoulens_4.jpg","../image/image_11/11_Moussoulens_5.jpg","../image/image_11/11_Moussoulens_6.jpg","../image/image_11/11_Moussoulens_7.jpg","../image/image_11/11_Moussoulens_8.jpg","../image/image_11/11_Moussoulens_9.jpg"]},"Consult_chateau_formulairebda3":{"id":"Consult_chateau_formulairebda3","dept":"11","canton":"Bram","commune":"Mézerville","nom":"Mézerville","type":"Château","periode":"XV","histoire":"MEZERVILLE, cité dans lacte dacquisition fait par Raimond-Roger, comte de Foix, des fiefs de Molandier, La Louvière, Mézerville auprès de Bernard et Sicard de Montaut, le 6 janvier 1208. Sicard de Montaut, allié des croisés, participe au siège de Toulouse de 1218.  ce dernier est blessé à Baziège en 1219, il rejoindra le comte de Toulouse. En 1486 Mézerville est attribué au chevalier Jehan dAulon (1390-1458), conseiller du roi et sénéchal de Beaucaire.  À lissue d'un procès, Mézerville est attribué au petit-fils, comme faisant partie des biens propres apportés par feu Jehan dAulon lors de son mariage. Hélène de Mauléon, dame de Caudeval, mariée le 23 septembre 1428 à Jehan dAulon, chevalier, seigneur de Mézerville, Peyrefitte et Belesta. Jehan dAulon, personnage considérable selon lhistorienne Régine Pernoud, « est célèbre pour avoir été pour Jeanne dArc le compagnon de tous les instants » de Poitiers à Rouen il fut fait prisonnier avec elle. Le roi Charles VII lavait choisi pour veiller sur Jeanne parce quil était « le chevalier le plus sage et de lhonnêteté la plus éprouvée de tout son entourage ». Sa conduite auprès delle lui valut dêtre investi par Charles VII de plusieurs missions de confiance. « Lors de son entrée solennelle à Paris en 1437, cest lui qui à pied tenait par la bride le cheval du roi ». Ensuite larchevêque de Reims, Jean Juvenal des Ursins, sollicite son témoignage lors du procès en réhabilitation de Jeanne dArc.","architecture":"Le Château de Mézerville est édifié au sommet d'une colline de la Piège, à 330 m d'altitude, dans la province du Lauragais. Il date, pour l'essentiel de son gros oeuvre, du début du XVe siècle.Cette époque troublée, pleine d'insécurité,  de la fin de la guerre de cent ans explique le caractère très austère du bâtiment à vocation militaire de défense. . On retrouve à l'intérieur quelques éléments d'architecture de cette époque. Au XVIe siècle, avec la richesse du pastel, des fenêtres à meneaux seront ouvertes sur la façade sud.\r\nDans les siècles suivants, le bâtiment ne sera pas modifié, ce qui nous permet aujourd'hui de disposer d'un ensemble assez homogène des XVe et XVIe siècles. de plan d'équerre corps de logis rectangulaire brisé à quatre niveaux deux tours rondes à toits plats dominant la vallée, et du côté entrée prolongée  d'une aile avec tour carrée toit quatre pans, l'ensemble de même niveau.","habitants":"chevalier Jehan dAulon\r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Mézerville","gps":"","images":["../image/image_11/11_Mezerville_1.jpg","../image/image_11/11_Mezerville_2.jpg","../image/image_11/11_Mezerville_3.jpg","../image/image_11/11_Mezerville_4.jpg","../image/image_11/11_Mezerville_5.jpg","../image/image_11/11_Mezerville_6.jpg"]},"Consult_chateau_formulairec154":{"id":"Consult_chateau_formulairec154","dept":"11","canton":"Narbonne","commune":"Narbonne","nom":"Narbonne_Chateau","type":"Château","periode":"XVI","histoire":"Plusieurs châteaux à Narbonne; dont celui d'Auris, Capitoul (voir article Gruissan),  Hospitallet, Jonquière ,Laprade,  Montplaisir, Moujan et le Petit Madirac .                                                            AURIS,  avant dêtre une dépendance de la célèbre Abbaye de Fonfroide pendant tout le Moyen-Age, les terres dAuris étaient liées à la seigneurie de Quillanet. les terres dAuris en grange Cistercienne durant trois siècles, du XIIIe au XVIe siècle. Auris  devient  autonome en 1736 et après la Révolution en 1791 Noël Daru sen porte acquéreur. Les héritiers Daru ne conserveront Auris  que durant quelques années après le décès des hardis entrepreneurs. Auris est vendu en 1834  à Etienne Simon Cambournac, propriétaire terrien  et aubergiste. Depuis, le château a connu différentes familles pour prendre soin du vignoble, avec en particulier la famille Herpe dans les années 1980.                                                                                                                      HOSPITALLET  n'est plus quun domaine viticole et hôtel. En 2002, Gérard Bertrand réalise son rêve et acquiert cette propriété qui constitue un des fleurons de la viticulture méridionale.                                                                                                                              MONTPLAISIR   du XVIIIe siècle, ancien domaine viticole, qui abrite aujourdhui les locaux du parc naturel régional et de lONF, le sentier sélève doucement permettant davoir une vue sur les étangs tout en gardant un oeil sur le massif de Fontfroide.   Elles remontent aux années 1500-1533. Au début du XVIIe siècle, Jean de Raynoard 1er consul de Narbonne baptisa cette ancienne métairie de Fenolhet du nom de Montplaisir. La métairie reste alors aux mains des héritiers de M. Raynoard jusqu'en 1653 puis passe entre celles de nombreuses familles:  les Exéa, Barrue, Pailhez, les origines de ce domaine remontent au XVIe siècle.     C'est le négociant sieur Hippolyte Parazols qui édifia en 1869, l'actuel château,il fut terminé par l'avocat M. Paul Gayraud. Il présente une architecture typique de la période faste de la viticulture. En 1881, le domaine est réunifié, puis en 1908 change plusieurs fois de propriétaire. Aujourd'hui le domaine est le siège du syndicat mixte de préfiguration Le parc naturel régional de la narbonnaise en méditerranée.","architecture":"Auris, le corps de logis de plan carré à trois étages toit en croupe presque plat au centre de divers bâtiments de dépendance viticole                                                                                         Hospitallet     divers bâtiments disposés en forme de U   complétés d'une tour carrée.                                                                        Jonquière, corps de logis rectangulaire à deux niveaux toitures en croupes.                                                                                                           Montplaisir, château rectangulaire à deux niveaux sur soubassement toitures garnie de lucarnes l'édifice accolé d'une tourelle ronde à toit en poivrière.                                                              Le petit Madirac, manoir corps de logis rectangulaire à deux niveaux, deux pavillons saillants en façades, l'entrée est garnie d'un escalier évasé, d'une porte à fronton triangulaire et un oculus sur le toit, un bandeau au niveau du premier étage, l'édifice est accolée sur l'arrière d'une tour  hexagonale à toit à six pans pointus l'ensemble de la toiture en ardoise soutenu par des mâchicoulis, belles fenêtres à meneaux sur l'ensemble et échauguettes sur pavillons arrières.","habitants":"Famille de Noël Daru                                                                        Famille Bonfils                                                                            Famille de Gérard Bertrand  \r\n        \"","divers":"Château d'Auris, de l'Hospitallet et de Montplaisir","gps":"","images":["../image/image_11/11_Narbonne_Chateau_1.jpg","../image/image_11/11_Narbonne_Chateau_2.jpg","../image/image_11/11_Narbonne_Chateau_3.jpg","../image/image_11/11_Narbonne_Chateau_4.jpg","../image/image_11/11_Narbonne_Chateau_5.jpg","../image/image_11/11_Narbonne_Chateau_6.jpg","../image/image_11/11_Narbonne_Chateau_7.jpg"]},"Consult_chateau_formulaire63ab-2":{"id":"Consult_chateau_formulaire63ab-2","dept":"11","canton":"Narbonne","commune":"Narbonne","nom":"Narbonne_Chateaux_suite","type":"Château","periode":"XIV-XVI","histoire":"JONQUIERES Pas d'information historique, chambres d'hôtes.                                                 MOUJAN  Michel de Braquilanges est propriétaire  qui produit des vins appellation la Clape. Son arrière-grand-père a racheté le domaine dans les années 1850 .    Michel de Braquilanges est propriétaire du château Moujan qui produit des vins . le château a été construit en 1873.  L'ancienne métairie fut alors détruite. Ancien employé d'une société fabriquant des machines à vendanger, Michel de Braquilanges s'est lancé dans la viticulture en 1981.                                                                                            LAPRADE  situé entre mer et garrigue,  château du XVIIIe siècle, bien intégré à l'ensemble architectural typique,  chaque comte ou noble de notre région faisait construire son propre château avec son style bien à lui, d'ou ces toitures en ardoise et ces balcons fleuris qui rappellent à chaque coup dil le château de la belle au bois dormant,     c'est alors que la dynastie Maléry, amoureux des lieux à caractère, décide de se lancer après déjà d'autres projets de genre acquis, dans la réhabilitation de ce lieu féérique dans la seule idée d'accueillir, restaurer, loger.  Cette dynastie réussit donc son pari car à ce jour, tout en conservant ce patrimoine  décoré de façon baroque et clinquant aux racines artistiques de cette famille (père chanteur d'opéra, mère cantatrice et enfant danseur) à faire de ce lieu incontournable sur le rond point du sud de la France.\r\nPETIT-MADIRAC pas d'information historique.   Alain Delclos, est gérant de la société EARL du Petit Mandirac.","architecture":"Jonquières,  témoin de l'histoire viticole des grands vins du Languedoc, c'est aujourd'hui un haut lieu d'accueil. Dans son imposant corps de bâtiments au cadre chaleureux, le château préserve au creux de ses murs la douceur de vivre                             Laprade,  manoir du XVIIIe siècle corps de logis rectangulaire à deux niveaux et combles avec de belles lucarnes toit à l'impérial édifice accolé de deux tours carrées à toit à quatre pans, bien intégré à l'ensemble architectural typique, chambres d'hôtes de prestige.                                                                                         Moujan,  du XIXe siècle de plan en U à trois niveaux toit en tuile deux pans,  pavillons toit en croupes,  plan en forme de T   à trois niveaux                                                                                                Petit Madirac manoir  de plan carré à deux niveaux accolé  d'une tour ronde et d'une échauguette en encorbellement.","habitants":"familles des Exéa                                                                                      Avocat M. Paul Gayraud                                                                               Famille Lacroze\r\n        \"","divers":"Château de Jonquières, de Moujan, ,de Laprade et du Petit Madirac","gps":"","images":["../image/image_11/11_Narbonne_Chateau_suite_1.jpg","../image/image_11/11_Narbonne_Chateau_suite_2.jpg","../image/image_11/11_Narbonne_Chateau_suite_3.jpg","../image/image_11/11_Narbonne_Chateau_suite_4.jpg","../image/image_11/11_Narbonne_Chateau_suite_5.jpg","../image/image_11/11_Narbonne_Chateau_suite_6.jpg"]},"Consult_chateau_formulairee36e":{"id":"Consult_chateau_formulairee36e","dept":"11","canton":"Narbonne","commune":"Narbonne","nom":"Narbonne_Palais","type":"Palais-Episcopal","periode":"XII-XIII","histoire":"NARBONNE;  Le Palais des archevêques au IVe siècle siège d'un archevêché, en 1244 abrite le concile de Narbonne  et en 1290 l'archevêque Gilles Aycelin de Montagu fait édifier le donjon. Les successeurs de Gilles Aycelin s'attacheront à faire de palais une résidence de plaisance et en 1802 suppression de l'évêché de Narbonne, sont acquis par la ville et deviendra mairie en 1840 et le musée d'Art et le musée archéologique.  en 1840 Viollet le Duc remanie  la façade donnant sur la place.","architecture":"Le Palais  se compose du palais vieux, d'origine romane, et du palais neuf, de style gothique. Sa façade comporte trois tours carrées datant des XIIIe et XIVe siècles.  En 1272 construction de la tour Madeleine, en 1290 construction du donjon. Le palais vieux  accolé au chevet et au clocher de la cathédrale se compose de deux ailes en équerre autour d'une cour intérieure. L'aile Est a conservé une baie  d'architecture romane du Xe siècle sa façade percées de baies géminées du XIIe siècle. l'aile sud percements d'époque romane et gothiques  avec des fenêtres à meneaux. A la jonction de deux corps de bâtiments s'élève le donjon gothique de la Madeleine avec porte romane décorée  de colonnes et de chapiteaux sculptés, ce donjon appareillé de bossage  est relié  par une courtine épaisse à une autre tour,  l'ensemble construit sur les remparts de la ville le donjon flanqué d'échauguettes  et couvert  d'une terrasse crénelée avec une guette dépassante. Au XVIIe siècle remaniement des façades sur cour du palais neuf.   Une tour rectangulaire fortifiée,  Elle s'étage sur trois niveaux, le dernier est percé d'oculis à remplage en plus des baies médianes. Le sommet de la tour est formé d'un parapet sur mâchicoulis aux consoles d'angle sculptées, coiffé d'un toit en pavillon. L'aile sud possède deux niveaux remaniés. On y distingue des vestiges d'arcades et de voûtes. Son toit d'origine était beaucoup plus aigu. L'aile ouest, constituée d'un étage de soubassement et d'un rez-de-chaussée surélevé, est très restaurée. Les murs sont couronnés d'une corniche sur modillons au-dessus de laquelle s'élève un toit brisé.","habitants":"Evêché de Narbonne\r\n        \"","divers":"Palais épiscopal de Narbonne","gps":"","images":["../image/image_11/11_Narbonne_Palais_1.jpg","../image/image_11/11_Narbonne_Palais_2.jpg","../image/image_11/11_Narbonne_Palais_3.jpg","../image/image_11/11_Narbonne_Palais_4.jpg","../image/image_11/11_Narbonne_Palais_5.jpg","../image/image_11/11_Narbonne_Palais_6.jpg","../image/image_11/11_Narbonne_Palais_7.jpg","../image/image_11/11_Narbonne_Palais_8.jpg","../image/image_11/11_Narbonne_Palais_9.jpg"]},"Consult_chateau_formulaire1d88":{"id":"Consult_chateau_formulaire1d88","dept":"11","canton":"Quillan","commune":"Niort de Sault","nom":"Niort_de_Sault","type":"Château","periode":"XI-XVII","histoire":"A Niort de Sault deux édifices les vestiges du château d'Albe et le château de Sault.  ABLE-SAULT,  fief des comtes du Razès, il était désigné sous le nom de Rébenti, inféodé par un seigneur du même nom dont les traces sont conservées dans deux actes l'un de 1124 où figure Guillaume de Rébenti  il était parmi les nobles qui se soulevèrent  contre Bernard Aton, l'autre de 1183 où est signalé Pierre Bernard de Rébenti comme témoin. A dater du XIVe siècle, le château de Rébenti fut appelé le château d'Able. Il appartenait, deux cents ans plus tard, à un seigneur du nom de Nègre d'Able. Ce château succomba en 1572 devant les attaques des calvinistes et fut détruit. La famille de Nègre l'acheta aux commissaires du roi dont la descendance conserva le titre de sieurs d'Able. Jean de Nègre est investi de la charge de bailli de Sault en 1594 Par alliance Jean Thimoléon de Nègre né en 1629 mourut en 1703. Il avait épousé en 1665 Marie Anne de Corneille ou Cornille fille du notaire Jean Corneille d'Aunat. Elle décédera en 1692. De ce mariage naquît douze enfants, dont François de Nègre qui épousa en 1704 Toinette Gaichier de Roquefeuil, il mourut en 1721. Elle décédera en 1724. De ce mariage naquît seulement une fille en 1713 : Marie de Nègre d'Able. Les biens de cette famille de Nègre d'Able seront par la suite transmis par testaments à diverses nièces et ce fut l'extinction de cette branche de Nègre.","architecture":"Il ne reste de ses ruines aucun élément architectural caractéristique. Le château d'Able protégeait une communauté blottie sous ses murs près de la rivière et dont les ruines sont encore visibles. Les murs de deux maisons qui la composaient ont encore 2 à 3 mètres de haut.                                                              Le château de Niort   du XVIIe siècle,  la dernière famille qui l'occupa disparut en 1914. Il est probable que le village fut reconstruit au pied du rocher près de l'eau après avoir subi le même sort que celui du château au XVIe siècle.\r\nCertaines forteresses furent rasées pendant les guerres de religion, et d'autres lors des incursions espagnoles des XVe et XVII e siècles. Si le plus souvent, les communautés rurales ont subsisté à proximité de l'ancienne forteresse, certaines ont été complètement abandonnées comme Able, Gesse.","habitants":"Famille de Jean Thimoléon de Nègre\r\n        \"","divers":"Vestiges du château d'Albe et château de Niort de Sault","gps":"","images":["../image/image_11/11_Niort_de_Sault_1.jpg","../image/image_11/11_Niort_de_Sault_2.jpg","../image/image_11/11_Niort_de_Sault_3.jpg","../image/image_11/11_Niort_de_Sault_4.jpg","../image/image_11/11_Niort_de_Sault_5.jpg"]},"Consult_chateau_formulaire2c68-2":{"id":"Consult_chateau_formulaire2c68-2","dept":"11","canton":"Narbonne","commune":"Névian","nom":"Névian","type":"Château","periode":"XIX","histoire":"NEVIAN, à lépoque moderne, le village se serait rapproché de leau , lOrbieu  et aurait été construit à lendroit de léglise et du « Fort » actuel. Sur le plan du secrétariat de mairie est indiqué le château du Ve siècle, avec le « corps de garde », la « place du fort » et les fossés faisant le tour de ce qui appartenait au chapitre de St-Just au Xe siècle. Léglise ancienne chapelle devenue plus grande que le château  date du XIVe siècle. Le château fut acheté par la famille Bédry, lors de la vente des biens nationaux et communaux.  Une bataille aurait opposé le duc de Joyeuse et le comte de Montmorency au XVIe siècle, dans le cadre des guerres de religion et surtout de la volonté damener le Languedoc à la couronne de France. Mais, en 1696, Louis XIV, fort à court dargent, décida pour sen procurer que les particuliers et les communautés du royaume auraient à faire enregistrer leurs armes contre finances. Le château du XIXe siècle à appartenu  à la famille de Bruguière, puis de Tarde   vivra jusquau milieu du XXe siècle.\r\nNEVIAN serait apparu au néolithique sur les hauteurs de plan de garrigue (170 mètres daltitude). En descendant de la première éolienne vers la combe Portale, les CAPITELLES sont des constructions de cette époque ou du moins leur mode de construction en pierres sèches a traversé le temps depuis 6 000 ans. Le nom de Névian désigne un castrum gallo-romain . La mer sétant retirée, le village serait descendu à lépoque gallo-romaine vers « Clottes . En sont témoins : « vani clauses » avec des éléments de constructions dune retenue deau et « paretz antiquos » des murs antiques. Au cours de charruages de vignes ont été trouvées des canalisations en poterie en forme de fourches, au lieu-dit « Fourcade.","architecture":"le château du XVIII-XIXe  siècle bâtisse construite avec des pierres des remparts Fort » actuels (24 mètres daltitude). Sur le plan du secrétariat de Mairie est indiqué le château du V° siècle, avec le « corps de garde », la « place du fort » et les fossés faisant le tour de ce qui appartenait au chapitre de St-Just au Xe siècle. Outre l'ancien château, propriété privée, la commune compte des vestiges romains, dont, semble-t-il, les restes d'un aqueduc.","habitants":"Famille de Bruguière\r\n        \r\n        \r\n        \"","divers":"Vestiges de Névian, château et aqueduc","gps":"","images":["../image/image_11/11_Nevian_1.jpg","../image/image_11/11_Nevian_2.jpg","../image/image_11/11_Nevian_3.jpg","../image/image_11/11_Nevian_4.jpg"]},"Consult_chateau_formulairedf55":{"id":"Consult_chateau_formulairedf55","dept":"11","canton":"Fabrezan","commune":"Padern","nom":"Padern","type":"Vestiges","periode":"X-XII","histoire":"PADERN, est assez méconnu dans la région, car il n'a pas joué un rôle très important pendant la croisade contre les albigeois, contrairement à ses voisins de Termes, Queribus ou encore Peyrepertuse. On ne connaît pas exactement l'année de sa construction, mais le village de Padern est cité dès 899, date à laquelle le roi Charles III dit le Simple cède le territoire à l'Abbaye de Lagrasse, alors que ce dernier appartenait encore aux comtes de Toulouse, et non à la couronne de France.\r\nLa fortification est signalée pour la première fois en 1026, et on fait état d'une fortification secondaire à Padern à la fin du XIIe siècle, placée sous le contrôle de l'abbaye de Lagrasse. Pendant la croisade albigeoise, Chabert de Barbeira, compagnon d'armes d'Olivier de Termes, protecteur des Cathares et seigneur de Quéribus, s'empare de la place. Après la prise du Quéribus, il négocie sa liberté contre l'abandon des citadelles au roi Louis IX. L'Abbaye de Lagrasse récupère donc le château, et en 1283, en devient officiellement propriétaire par une transaction avec le procureur du roi Philippe III de France dit le Hardi, elle en restera propriétaire jusqu'en 1579. A la fin du XVIe siècle, après les guerres de religion,  il semble avoir été en grande partie reconstruit par la famille de Vic . Pierre de VIC originaire de Catalogne  fait l'acquisition du château, y fait des aménagements en conservant son aspect féodal. En 1706, les descendants revendront par la suite l'ensemble à l'Abbaye de Lagrasse qui laissera le tout à l'abandon à la fin du XVIIIe siècle.","architecture":"Au Moyen-Age, la féodalisation de Padern s'accompagne de la construction de nouveaux châteaux. Vers 1165-1192 une \"forcia\", fortification secondaire de caractère fortifié et féodal en raison de l'insécurité qui régnait alors. Le château qui n'était qu'une \"méchante masure\"  . Malgré son allure féodale construit au bord d'un plateau dominant le village par des a-pics au nord et à l'est, il se compose  d'un donjon au bord de la falaise, d'une enceinte à l'ouest et au sud et d'une défense avancée qui protège la face nord-est. L'accès se faisait au sud par une tour-porche aux armes de la famille de Vic, joignant une autre tour. Cette dernière abritait au premier étage une chapelle voûtée dédiée à Saint-Louis. On pénétrait ensuite dans un bâtiment polygonal qui donnait accès à la cour. Au centre de la cour, on accède au donjon par une tourelle d'escalier ronde. Celle-ci donne accès à des latrines au dessus du vide. Le donjon qui servait de résidence à la famille de Vic, comportait trois niveaux. Au nord, une petite pièce abrite un vide-ordures. A l'ouest du donjon se développe le logis, construit à la fin du XVIIe siècle.A quelques kilomètres du château se trouvent les ruines du village de Molhet avec les restes de son église à architecture lombarde.","habitants":"Famille de Vic\r\n        \"","divers":"Vestiges du château de Padern","gps":"","images":["../image/image_11/11_Padern_1.jpg","../image/image_11/11_Padern_2.jpg","../image/image_11/11_Padern_3.jpg","../image/image_11/11_Padern_4.jpg","../image/image_11/11_Padern_5.jpg","../image/image_11/11_Padern_6.jpg","../image/image_11/11_Padern_7.jpg"]},"Consult_chateau_formulaire35fc":{"id":"Consult_chateau_formulaire35fc","dept":"11","canton":"Carcassonne","commune":"Palaja","nom":"Palaja","type":"Château","periode":"XVIII","histoire":"PALAJA, installé dans un bâtiment datant du XVIIIe siècle, le château de Palaja est un établissement situé dans le village de Palaja, à 5 minutes en voiture de la cité de Carcassonne. château transformé en hôtel.","architecture":"Palaja de plan quadrangulaire à deux niveaux et attiques flanqué de pavillons saillants sur les angles  à trois niveaux, l'ensemble toit presque plats.","habitants":"Catherine R\r\n        \"","divers":"Château de Palaja","gps":"","images":["../image/image_11/11_Palaja_1.jpg","../image/image_11/11_Palaja_2.jpg","../image/image_11/11_Palaja_3.jpg"]},"Consult_chateau_formulaire6b69-2":{"id":"Consult_chateau_formulaire6b69-2","dept":"11","canton":"Rieux-Minervois","commune":"Trausse","nom":"Pauligan","type":"Château","periode":"XIV","histoire":"PAULIGNAN, domine les communes de Trausse et de Peyriac. L'histoire de cette bastide s'écoule au fil des siècles. Plusieurs propriétaires se sont succédé mais des liens plus ou moins proches existaient entre eux. Cette bastide devenue château de Paulignan au XVIe siècle s'est transmise de cousins en cousins et pour ne rien changer à cette tradition,  de 1241 à 1404 le famille de Grave.  Le Roi Saint-Louis donna à cette famille le bastide de Ventenac. En 1255, Trencavel échangea un Paulignan avec le Roi Saint-Louis contre une rente de 1415 à 1527 à la famille de Cardaillac. Cette maison descendait des Trencavel. de 1527 à 1752 la famille de Saïx, certains les disent descendre d'apothicaires de Carcassonne, d'autres du frère du comte de la Rose en Angleterre. De 1752 à 1779 la famille de Veye. Il doit exister un lien puisque Georgette de Saïx avait épousé Pierre de Brugairoux  et que les de Veye étaient apparentés aux Brugairoux.  De 1779 à 1891 la famille Marisy descendante des de Saïx de Paulignan François-Augustin Marisy, maire de Trausse, avait épousé en 1793 Jeanne-Marie Tallavignes, leur petit-fils Emile Levasseur vendit Paulignan au descendant de l'avant-dernier fils de Balthazar Tallavignes, c'est-à-dire à Antoine Ladislas Tallavignes et à son beau-frère Paul Gleizes, le 26 Mai 1891. Le musicien Paul Lacombe était leur arrière petit-fils. De 1891 à 1991 la famille Tallavignes. Depuis 1991, la famille Moreau, petit-fils d'Antoine Tallavignes, a racheté Paulignan à ses petits-cousins, un siècle après ses arrières grands-parents.","architecture":"Trausse La «place de la Tour Trencavel», la «rue de l'Observatoire», la «rue des remparts» ou la «rue de Paulignan» ramène le promeneur encore plus loin dans le temps, à l'époque des cathares, symboles de la résistance occitane à tous les inquisiteurs.                                                                              Paulignan l'ensemble de la bâtisse en plan de U avec de grosses dépendances à l'ouest retour sur l'arrière avec flanquement de trois tours carrées toits en terrasse Les tours datent des XIe siècle puis du XIIIe au XIVe siècle sur des fondations sans doute Carolingiennes, le château actuel entouré à la base par des arcades, toit en croupes ; l'ensemble couvert de tuiles.","habitants":"Famille de Gilles Moreau\r\n        \"","divers":"Tour de Trencavel à Trausse et château de Paulignan à Trausse","gps":"","images":["../image/image_11/11_Paulignan_1.jpg","../image/image_11/11_Paulignan_2.jpg","../image/image_11/11_Paulignan_3.jpg","../image/image_11/11_Paulignan_4.jpg","../image/image_11/11_Paulignan_5.jpg","../image/image_11/11_Paulignan_6.jpg"]},"Consult_chateau_formulairedc08":{"id":"Consult_chateau_formulairedc08","dept":"11","canton":"Bram","commune":"Payra sur l","nom":"Payra","type":"Forteresse","periode":"XIV","histoire":"PAYRA,  Raymond de Marion avait été fermier général 1558. En 1562 de Catherine de Médicis comtesse de Lauragais, mère de Marguerite de Valois. Jacques I de Marion était marié à Lisette de Costa. en 1583 Jacques I de Marion, seigneur de Payra, accourut au secours de son frère Bernard de Marion assiégé dans Montréal par les troupes catholiques du capitaine Lawiston gouverneur de la cité de Carcassonne qui fut obligé de se retirer  avec son armée. En 1584 Jacques I de Marion était gouverneur de Montréal pour le service du roi de Navarre.  Henri IV fut le bienfaiteur de la maison de Marion qui avait servi sa cause pendant toutes les guerres de religion. Trois lettres d'Henri IV adressées à Jacques de Marion seigneur de Payra pendant qu'il était gouverneur de Montréal dont le parti protestant en témoigne. En 1592 cette seigneurie passa, par alliance dans la maison de Capriol, en effet Sarah de Marion, fille de Jacques II de Marion de Payra, apporta en mariage à Odet de Capriol-Mandoul, seigneur de Capriol ( fils de Pierre Capriol, seigneur de Mandoul et de dame Antoinette de Caraman) Cette Seigneurie, issue de cette vieille famille chevaleresque, le resta jusqu'en 1839. En 1683 noble François de Capriol prend le titre de seigneur de Payra. Joseph Gonzalez d'Exéa (1809-1898) épouse en 1839 Marie Thérèse C de Capriol ( 1817-1880) Mademoiselle de Capriol était la dernière héritière du nom. De cette union naquirent Justine, Louise, Achille d'Exéa (1849-1902), Edouard (1849.1866), Gustave (1851.1908) Charles (1853.1887). Joseph Gonzalez d'Exéa épousa en seconde noce Rose Louise d'Exéa, sa cousine. Achille d'Exéa fut le dernier vicomte de Payra En 1933.Trois autres co-seigneurs se partageaient ce domaine : lhôpital de Villasavary, la confrérie de Laurac et le chapitre dAlet. Enfin, la commune, qui prit en 1933 le nom de Payra-sur-lHers. Le château fut ensuite acquis par un riche propriétaire terrien M. Espitalier qui le laissa pendant de nombreuses années à l'abandon, avant qu'une nouvelle famille entreprenne une restauration.","architecture":"L'origine de Payra sur l'hers remonte au IX siècle c'était un château fort avec église et couvent, entourés de murs et de fossés. Remanié vers la fin du XVIe siècle par Marguerite de Valois , Il dominait le vieux bourg qui s'étendait alors sur l'emplacement du parc actuel. Le château  est le même que celui de l'époque féodale, mais il fut cependant remanié, échauguette à l'angle nord ouest; dans la cour la tour de défense ayant servi plus tard de pigeonnier.Les seigneurs de Payra prirent une grande part aux guerres de Religion, qui népargnèrent pas la localité : le village, occupé par les protestants depuis 1568, fut en outre, traversé par larmée de Coligny en 1570. En 1580, les troupes catholiques le détruisirent partiellement et, lannée suivante, revinrent lincendier et investir le château. Le château fut restauré avec goût et bien conservé début XXe siècle, avec une façade style Renaissance, et un parc ombragé. Il possède de belles salles avec des cheminées monumentales, et un large escalier en pierre, surmonté d'un dôme, d'un oratoire voûté aux fines nervures ogivales sculptées. Dans la cour une ancienne tour de défense servait de pigeonnier.","habitants":"Famille de François de Capriol \r\n        \"","divers":"Château de Payra sur l'Hers","gps":"","images":["../image/image_11/11_Payra_1.jpg","../image/image_11/11_Payra_2.jpg","../image/image_11/11_Payra_3.jpg","../image/image_11/11_Payra_4.jpg","../image/image_11/11_Payra_5.jpg","../image/image_11/11_Payra_6.jpg","../image/image_11/11_Payra_7.jpg","../image/image_11/11_Payra_8.jpg"]},"Consult_chateau_formulaire6d5d":{"id":"Consult_chateau_formulaire6d5d","dept":"11","canton":"Fabrezan","commune":"Paziols","nom":"Paziols","type":"Vestiges","periode":"XII","histoire":"PAZIOLS, cité  en 1208,  un \"Fortia de Padulis\" appartenant à la puissante famille de Termes. Après la chute de Terme, le château, dépendant de cette seigneurie appartient au roi de France. En 1215, un acte de loi  nomme Alain de Rouci, Seigneur de Termes c'est un chevalier du Nord, compagnon de guerre de Simon de Montfort détenteur du château et des terres de Paziols. En ce début du deuxième tiers du XIIIe siècle, le château appartient au nouveau seigneur de Termes : Olivier de Termes qui  vendit terre et château de Paziol à l'abbaye de Fontfroide en 1257, et en  1495, une armée espagnole ravage le pays \"frontalier\".  En 1537, la ville et le château sont pillés et brûlés par les espagnols.  Au XVIIe siècle, construction d'une église sur les ruines du château fort. Vers 1792, les révolutionnaires s'emparent du site qui n'appartient plus à l'abbaye.","architecture":"Paziols est un petit bourg accroché à une colline. Au sommet, un mur composé de pierres  taillées, voire presque brutes,  Sa forme imprécise, sa construction aléatoire ne le fait pas ressembler à un rempart médiéval, dans une partie un peu plus haute du rempart, deux pierres verticales ressemblant à une fente de tir médiévale ou non, cet indice prouve une construction fortifiée. quelques études très détaillées d'archéologues et de médiévistes ont expliqué l'architecture de ce site. Une vue satellite permet de dessiner le plan actuel \r\nfossé creusé par l'homme. Église actuelle. Plateau entouré de l'actuel rempart,  les vestiges du château.","habitants":"seigneur Alain de Rouci\r\n        \"","divers":"Vestiges du château de Paziols","gps":"","images":["../image/image_11/11_Paziols_1.jpg","../image/image_11/11_Paziols_2.jpg"]},"Consult_chateau_formulaireae74":{"id":"Consult_chateau_formulaireae74","dept":"11","canton":"Villemoustaussou","commune":"Pennautier","nom":"Pennautier","type":"Palais","periode":"XVI","histoire":"Trois châteaux à Pennautier celui de Pennautier, de Auzias-Paretlongue viticole et celui de Liet est destiné à devenir dans le sud de la France la vitrine de la société Pierce et Elliott, chambres d'hôtes.                                                                                                               PENNAUTIER, a été reconstruit en 1620, par Bernard de  Reich,  quelques années plus tard, cest Pierre Louis Reich, fils de Bernard, qui prend sa suite. Il est, comme son père, trésorier des états du Languedoc, mais il est aussi depuis 1669 receveur général du clergé de France. Il séjourne régulièrement à Versailles à la cour de Louis XIV doù il rapporte modes architecturales et impulsion politique et économique.  En 1670, il confie à Le Vau, larchitecte de Versailles, lagrandissement de son château de Pennautier et à Le Nôtre le dessin du parc à la française. Fin lettré, Pierre-Louis de Pennautier est un soutien actif de Molière qui séjourne et « donne la comédie » à Pennautier.  Pierre-Louis de Pennautier est un grand financier de lépoque, canal du midi, compagnie du Levant et manufactures royales régionales. À sa mort, en 1710, le château revient à ses neveux issus de la famille de Beynaguet monsieur de Sevin qui devient alors Beynaguet de Pennautier. Jacques de Beynaguet de Pennautier, chevalier de Saint Pardoux, laisse de nombreuses traces passionnantes : officier dartillerie, il passe la période de la Révolution à Versailles et livre son témoignage des événements. Il rapporte de ses voyages en Inde et en Afrique du Sud de nombreux récits, dessins et manuels militaires.  En 1910, Paule de Pennautier, une des dernières filles à porter le nom, reprend le flambeau. Elle se marie avec le comte Christian de Lorgeril, gentilhomme breton, qui fut assassiné en 1944. Nicolas de Lorgeril, son petit-fils, prend la responsabilité du château en 2000 à la suite de ses parents. Avec son épouse Miren de Saint-Chamas, ils sattaquent à une rénovation complète de lédifice.","architecture":"Pennautier est un élégant château Louis XIII aux fenêtres largement ouvertes sur une cour au Sud et une cour au Nord, ce qui est une nouveauté pour lépoque. En 1670, Le Vau réalise lélévation de deux ailes de part et dautre de la façade, à l'est une orangerie, à lOuest une salle de bal ou salon de musique. La façade sud est longue de 100 mètres. Le Nôtre, paysagiste de Versailles, dessine alors le parc à la française sur plus de 30 hectares. Jacques de Beynaguet de Pennautier, amateur et artistique éclairé, embellit le château  Entre 1835 et 1850, son fils Rodolphe lance une nouvelle phase de travaux du château et lagrandit encore en comblant la cour centrale et en rénovant lintérieur avec notamment des sols de mosaïques à litalienne. Il redessine le parc à langlaise selon la mode de lépoque. Dès 1920, Christian de Lorgeril et Paule de Pennautier entreprennent une vaste rénovation qui conduira notamment à la suppression de laile Nord-Est endommagée par un incendie.","habitants":"Famille de Beynaguet \r\n        \"","divers":"Château de Pennautier, d'Auzias-Paretlongue et de Liet","gps":"","images":["../image/image_11/11_Pennautier_1.jpg","../image/image_11/11_Pennautier_2.jpg","../image/image_11/11_Pennautier_3.jpg","../image/image_11/11_Pennautier_4.jpg","../image/image_11/11_Pennautier_5.jpg","../image/image_11/11_Pennautier_6.jpg","../image/image_11/11_Pennautier_7.jpg"]},"Consult_chateau_formulaire3c21":{"id":"Consult_chateau_formulaire3c21","dept":"11","canton":"Fabrezan","commune":"Duilhac-sous-Peyrepertuse","nom":"Peyrepertuse","type":"Vestiges","periode":"XI-XIII","histoire":"PEYREPERTUSE, le site  a été occupé à lépoque romaine, dès les débuts du 1er siècle avant J.C.  Faisant partie de la marche dEspagne, la première mention du château date de 1020, à une époque où le Pérapertusès était dans la mouvance des comtes catalans de Besalù. Par la suite, Peyrepertuse eut comme suzerain les comtes de Barcelone puis, vers le milieu du XIIe siècle, les rois dAragon. Au cours de la croisade contre les Albigeois, Guillaume de Peyrepertuse, ne voulant pas faire sa soumission, est excommunié en 1224. Après léchec du siège de Carcassonne, Guillaume se soumet et le château devient possession française en 1240. En 1258 construction du second château dans la partie haute de la forteresse, le traité de Corbeil allait fixer, pour quatre siècles, la frontière entre la France et lAragon : Peyrepertuse devint alors forteresse royale à la limite sud de la couronne. A la fin du XIIIe siècle, elle matérialise une place forte dotée dexceptionnelles défenses. Pendant lhiver 1367-1368, Peyrepertuse est le refuge dHenri de Trastamare, prétendant au royaume de Castille. Le traité des Pyrénées en 1659 en éloignant la frontière à son emplacement actuel, diminua limportance stratégique de ce château. Toutefois, il conserva une petite garnison jusquà la Révolution. En 1950, commencent les premières campagnes de consolidation du monument.","architecture":"Le château mesure 300 mètres de long et 60 mètres de large dans sa plus grande largeur. L'entrée se trouve au nord et tout le reste du château est inaccessible de par les falaises qu'il surplombe. Tout le château est entouré de remparts  accrochés en haut des à-pics. Mais la muraille de la partie nord plus accessible et plus imposante que celle de la partie sud qui est composée de pentes très abruptes. Il est composé de deux esplanades à l'est et à l'ouest. Celle de l'est est bordée d'une courtine de 120 mètres de long jalonnée par deux tours de plan semi-circulaire. Cette enceinte \"basse\" a conservé son chemin de ronde formé de dalles reposant sur des corbeaux. Le côté sud est défendu par l'à-pic de la falaise. L'angle nord-ouest abrite la porte d'entrée. Le donjon vieux est formé de l'église Sainte-Marie, de style roman, et d'un logis, constitué de deux pièces voûtées superposées. Quatre citernes alimentaient le château. Sur l'esplanade ouest se dresse le château plus récent perché sur le roc Sant-Jòrdi. Il fut construit sur l'ordre du roi Saint-Louis en 1242 pour renforcer la forteresse. Pour y accéder, un escalier dit de Saint-Louis assez vertigineux monte le long de la paroi du roc. Le \"donjon de Sant Jòrdi\" est un château avec son propre système de défense capable de résister aux assaillants ayant réussi à accéder à la forteresse et possédait sa propre chapelle dans le donjon, la chapelle Sant-Jordi (Saint-Georges) à nef unique.","habitants":"Comte de Besalù  Henri de Trastamare\r\n        \"","divers":"Vestigesde la forteresse de Peyrepertuse.","gps":"","images":["../image/image_11/11_Peyrepertuse_1.jpg","../image/image_11/11_Peyrepertuse_2.jpg","../image/image_11/11_Peyrepertuse_3.jpg","../image/image_11/11_Peyrepertuse_4.jpg","../image/image_11/11_Peyrepertuse_5.jpg","../image/image_11/11_Peyrepertuse_6.jpg","../image/image_11/11_Peyrepertuse_7.jpg"]},"Consult_chateau_formulaire5b61-3":{"id":"Consult_chateau_formulaire5b61-3","dept":"11","canton":"Rieux-Minervois","commune":"Peyriac-Minervois","nom":"Peyriac_Minervois","type":"Château","periode":"XII-XIII","histoire":"Plusieurs châteaux dans le Minervois, à Peyriac le château Violet, à 1 km à l'Est Rieux.                                                                                                                                                      \r\nPEYRIAC,    tire son nom de l'ancien château de Minerve, qui d'ailleurs n'est point situé dans les limites du canton. La vicomté, plus tard viguerie du Minervois. Le plus ancien titre connu, où il est fait mention du Minervois est une charte de Charles le Chauve datée de l'an 855. La croisade Albigeoise fit passer la seigneurie de Peyriac au XIIIe siècle, à l'ordre des chevaliers de Saint-Jean de Jérusalem qui l'ont possédée jusqu'à la Révolution. Eléazar de Grave, seigneur de Peyriac, se défendit deux jours, et en sortit pour se jeter dans Rieux qui n'était plus en état d'être défendu. Il fut attaqué par Simon de Montfort qui prit Rieux et fit prisonnier Eléazar. Tous ses biens furent confisqués.                                                                                                                                 RIEUX  la  seigneurie de Rieux, possédée au XIIe siècle par les vicomtes de Minerve, sous la suzeraineté des comtes de Carcassonne, fut confisquée en 1210. Le roi Saint Louis inféoda cette seigneurie, en 1230, à Raymond de Saverdun et en 1372 à Nicolas de La Jugie. Après la prise de Minerve en juillet 1210, Peyriac et Rieux résistèrent. Eléazard de Grave se réfugia dans le château de Rieux, beaucoup plus fort, et résista deux jours à l'assaut des troupes de Simon de Montfort.                                                           VIOLET, dix ans qu'Émilie Faussié, l'ancienne propriétaire du château Violet aujourd'hui en liquidation judiciaire se bat pour faire valoir son droit. Le domaine quasi à l'abandon est la proie des voleurs.","architecture":"Peyriac Minervois, il s'agit d'un village pittoresque ayant conservé son centre ancien et ses vielles maisons. Situé en bordure de lArgent Double, le visiteur pourra admirer depuis le pont, les remparts et l'église antérieure au XIe siècle où une tour-clocher y est accolée datant du XVe siècle. En faisant le tour de la vieille ville, le mur denceinte presque complet est encore visible et des restes de tours entre les maisons demeurent. Village pittoresque : centre ancien, vieilles maisons, restes de remparts du XVIe siècle.\r\nChâteau : façade, tourelle, escalier du XVIe siècle, porte et tourelle d'angle remarquables. Nombreux vestiges intéressants de l'ancienne enceinte fortifiée.  \r\nChâteau de Violet, moderne : château viticole (40 ha) et hôtelier de Violet, du XVIIe siècle et du XIXe siècle, bien restauré, avec un petit musée.                                                                                 Rieux, au Moyen-Age, le centre de lactuel village était ceinturé dun rempart, défendu à ses angles par des tours. Mais la particularité du village est tout de même sa rotonde du XIIe siècle. Joyau de lart roman, elle abrite des chapiteaux sculptés du maître de Cabestany.  Unique au monde par son architecture bâtie sur sept pans   « la Sagesse a bâti sa maison, elle a taillé ses sept colonnes » et le château La Jugie du XVI-XVIIIe siècle.","habitants":"Eléazar de Grave,                                                                                  Émilie Faussié\r\n        \"","divers":"Château de Peyriac, de Violet et de Rieux","gps":"","images":["../image/image_11/11_Peyriac_Minervois_1.jpg","../image/image_11/11_Peyriac_Minervois_2.jpg","../image/image_11/11_Peyriac_Minervois_3.jpg","../image/image_11/11_Peyriac_Minervois_4.jpg","../image/image_11/11_Peyriac_Minervois_5.jpg"]},"Consult_chateau_formulaire5d13":{"id":"Consult_chateau_formulaire5d13","dept":"11","canton":"Montréal","commune":"Pezens","nom":"Pezens","type":"Château","periode":"XVI-XIX","histoire":"Deux châteaux à Pezens celui de Puech-Redon et celui d'Alzau  de la comtesse de Pins.                                                                                                                                                             PECH-REDON  Bruno et Marie-France de Lambert des Granges  au château de Pech-Redon. Le domaine de Pech-Redon remonte au XVIe siècle, son château fût construit en 1861, à l'emplacement d'un ancien manoir ayant appartenu à la famille de Levis qui l'a transmis aux Montcalm, dont un membre fut le défenseur du Québec. Propriété familiale depuis 1882, les orangeries ont été restaurées et ouvertes au public en mai 2003.  Pech-Redon a été laissé en héritage en 1940 à Claire de Saint-Exupéry, comtesse Bernard de Lambert des Granges, par sa mère, Caroline, née d'Andoque de Sériège, comtesse Joseph de Saint-Exupéry.","architecture":"Alzau construit en 1906 élégante demeure  de plan quadrangulaire  à deux niveaux et série de lucarnes sur toit brisé fronton sur partie centrale au niveau du toit, l'édifice est accolé de chaque côté de pavillon rectangulaire dans le même style que la partie centrale, mais la toiture est brisé.                                                                    Pech-Redon imposant château comprenant deux corps de logis un de trois niveaux toiture en croupes avec lucarnes et balustres de protections l'autre de deux niveaux toitures brisées avec une partie en terrasse avec protection également tout le tour, ces deux édifices sont reliés par un bâtiment à un niveau  de huit travées et orifice d'entrée avec fronton et à l'ouest prolongé par l'orangerie a été restaurée et ouverte au public en mai 2003.","habitants":"Famille de Levis                                                                                comtesse Joseph de Saint Exupery\r\n        \"","divers":"châteaux à Pezens celui de Puech-Redon et celui d'Alzau.","gps":"","images":["../image/image_11/11_Pezens_1.jpg","../image/image_11/11_Pezens_2.jpg","../image/image_11/11_Pezens_3.jpg","../image/image_11/11_Pezens_4.jpg","../image/image_11/11_Pezens_5.jpg","../image/image_11/11_Pezens_6.jpg","../image/image_11/11_Pezens_7.jpg"]},"Consult_chateau_formulaireaea5":{"id":"Consult_chateau_formulaireaea5","dept":"11","canton":"Limoux","commune":"Pieusse","nom":"Pieusse","type":"Château","periode":"XIII","histoire":"PIEUSSE, le château  a été construit aux environs de 1140 à 1145, sous le règne du roi Louis VII le jeune par les comtes de Foix. En 1225, il abrite le concile Cathares, rassemblant une centaine de parfaits présidé par Guilhabert de Castres, évêque de Toulouse. Lors d'une réunion au château, ils décident de créer l'évêché du Razes. Benoît de Termes y est ordonné évêque de ce nouveau diocèse. En 1229, Bernard Roger, fils du comte de Foix, cède son fief au roi Louis IX qui le réunit à lévêché de Narbonne.  C'est dans ce puits que furent effectuées des recherches pour retrouver un possible trésor laissé par monseigneur Dillon durant la Révolution De 1764 à 1790, le château dépend de monseigneur Dillon, dernier président des états généraux du Languedoc et archevêque de Narbonne.","architecture":"Pieusse, plusieurs parties ont été réaménagées en lieux d'habitation. La muraille du Nord est encore visible ainsi qu'un donjon massif et allongé. Au premier étage de ce donjon, on retrouve deux élégantes fenêtres en cintres géminés avec des chapiteaux sculptés. Une autre fenêtre géminée, mais plus simple, se trouve au deuxième étage. Le donjon, placé à lavant est debout jusquau premier étage. On y voit même une belle voûte cintrée. La cour possède un puits permettant d'alimenter le village lors d'un siège. Célèbre dans lhistoire du Languedoc médiéval pour avoir accueilli un concile « cathare », Pieusse fut confisque´ par le roi, puis restitué aux archevêques de Narbonne qui le conservèrent dans leur patrimoine. La pie`ce maîtresse du château est un donjon roman dont il est difficile de dire sil a été bâti par les anciens seigneurs ou par larchevêque Pierre Amiel, ou son successeur Guillaume de La Broue. Il comportait quatre niveaux, chacun dun espace intérieur de 10,50 m sur 6,50, avec un accès extérieur au deuxième ; cest au troisième niveau, éclairé par des baies géminées, que fut établi le décor dont seul subsiste aujourdhui le plafond, singulier parmi les autres plafonds languedociens, et de très fugaces traces dun décor mural.","habitants":"Monseigneur Dillon \r\n        \"","divers":"Château de Pieusse","gps":"","images":["../image/image_11/11_Pieusse_1.jpg","../image/image_11/11_Pieusse_2.jpg","../image/image_11/11_Pieusse_3.jpg","../image/image_11/11_Pieusse_4.jpg","../image/image_11/11_Pieusse_5.jpg"]},"Consult_chateau_formulaire0632-2":{"id":"Consult_chateau_formulaire0632-2","dept":"11","canton":"Castelnaudary","commune":"La Pomarède","nom":"Pomarède(la)","type":"Château","periode":"XVII","histoire":"La POMAREDE, à cette période, La Pomarède est un habitat ecclésial. Elle devient une communauté villageoise avant le milieu du XIIIe siècle. En 1211, La Pomarède, qui fait partie des places fortes acquises à la cause du comte de Toulouse contre Simon de Montfort, est assiégée lors de la croisade des Albigeois (1208-1249), menée à l'instigation de l'église catholique romaine contre l'hérésie, et en particulier contre le catharisme. Vers 1347, Aimeri de Roquefort est le premier à être nominativement désigné seigneur de La Pomarède. À partir du siècle suivant, la baronnie de La Pomarède sera associée aux vicomtes de Caraman avant d'être liée à d'autres patronymes (Antoine de Carmaing à la moitié du XVe siècle, Jean de Saint-Etienne à partir de 1552, Jean Emeric de Bruyères, baron de Chalabre, au XVIIIe siècle, le marquis Louis dAuberjon en 1841 ). Le château de La Pomarède est vendu à la municipalité en 1950 par Jeanne-Marie-Louise dAuberjon (1883-1968), épouse de Louis Marie Nicolas Ernest Maurin de Brignac. Elle incarnerait ainsi la dernière châtelaine de La Pomarède Frédéric Bézian, auteur de bandes dessinées, a vécu, d'abord de 1960 à 1963, puis de 1984 à 1998 au château de La Pomarède où il a puisé son inspiration pour créer certains des paysages dans lesquels il a mis en scène ses personnages fantastiques, en particulier dans la série Adam Sarlech.      Aujourd'hui hôtel restaurant par Marjorie et Gérald Garcia.","architecture":"La Pomarède, l'enceinte fortifiée du XIe et XIIe siècle qui abrite la mairie, l'agence communale de \"La Poste\", l'école et la salle des fêtes. Appuyée sur deux des tours, le bâtiment seigneurial du XVIIe siècle est devenu en 1997 l'hostellerie du château de La Pomarède. Une autre tour est dite de Jean XXII, pape d'Avignon, qui est supposé y avoir passé une nuit en 1320.","habitants":"Frédéric Bézian\r\n        \r\n        \"","divers":"Château de la Pomarède","gps":"","images":["../image/image_11/11_Pomarede(la)_1.jpg","../image/image_11/11_Pomarede(la)_2.jpg","../image/image_11/11_Pomarede(la)_3.jpg","../image/image_11/11_Pomarede(la)_4.jpg","../image/image_11/11_Pomarede(la)_5.jpg"]},"Consult_chateau_formulaire50c0":{"id":"Consult_chateau_formulaire50c0","dept":"11","canton":"Limoux","commune":"Pomas","nom":"Pomas","type":"Vestiges","periode":"XV","histoire":"POMAS,   la première mention du \"castrum de Pomaribus\" est de 1319: le seigneur du lieu était alors Simon de Goloin. Quelques parties du château paraissent remonter à cette époque. A lextrême fin du XVe siècle, un riche Limousin, Antoine Rabot, fit bâtir un vaste château, surplombant la vallée de lAude. Son père avait fait fortune au service du roi et de lévêque dAlet. Il établit chacun de ses trois fils sur une seigneurie dotée chacune dun château ; ils ne cessèrent pas pour autant de servir le roi, ni de siéger au consulat de Limoux. Le château de Pomas est celui dun homme en pleine réussite.","architecture":"Pomas, aux angles Est, Nord et Ouest, trois tourelles rondes reposent sur des encorbellements attribués au XVIe siècle. L'angle sud est occupé par une massive tour carrée du XIIe siècle. Les archères de ces murs sont cruciformes, d'un type rare dans l'Aude. Un peu partout, les murs ont été percé de canonnières de formes variées, ovales ou rectangulaires; quelques unes ont leur ébrasement inversé, les plafonds peints se trouvent au premier étage.\r\nLa lourde masse du château domine la vallée de l'Aude un peu à l'écart du village, sur une éminence, dont la défense naturelle a été complétée par une circonvallation encore nettement tracée. L'angle sud est occupé par une massive tour carrée. A l'emplacement du pont-levis disparu, un ponceau franchit le fossé et supporte le chemin actuel, qui mène à une terrasse comprise entre la tour carrée et des dépendances modernes. Cette façade (Sud-est) est sans caractère: les appartements qui y prennent jour sont les seuls habités.\r\nUne autre porte s'ouvrait jadis dans la face Sud-ouest: aujourd'hui murée, elle a conservé son puissant linteau chanfreiné: un cadran solaire y était gravé en creux. Cette porte était défendue par une bretèche, dont les corbeaux seuls sont encore en place à la hauteur du second étage.","habitants":"Famille d'Antoine Rabot\r\n        \"","divers":"Vestiges du château de Pomas","gps":"","images":["../image/image_11/11_Pomas_1.jpg","../image/image_11/11_Pomas_2.jpg","../image/image_11/11_Pomas_3.jpg","../image/image_11/11_Pomas_4.jpg","../image/image_11/11_Pomas_5.jpg","../image/image_11/11_Pomas_6.jpg"]},"Consult_chateau_formulaire04b8":{"id":"Consult_chateau_formulair
