heux et escarpé de la rive droite du Cher, est  lenjeu dun  conflit qui oppose Eudes de Déols à Geoffroy, vicomte de  Bourges. Jusquau  début du XIIIe siècle, le château reste acquis aux  Déols puis passe en indivision à la  famille des Culan et au saint-Palais. En 1270 les Culan seul propriètaire et au XVe siècle font reconstruire le château donnant la structure qu'il a conservé depuis.\r\nLes corps des bâtiments actuels sont loeuvre de Guillaume de LAubespine vers  1580. en 1679 échoit à Colbert également le châtelain de Lignières qui obtient l'érection de la seigneurie en marquisat. En 1715  l'abbé de Sergnelay descendant de Colbert cède le château Jean de Phélipeaux comte de Pontchartrain qui le revend en 1739 au marquis de  LHôpital, ambassadeur du roi en Russie,  après la Révolution  passe  aux Cavillon Destillières propriétaire du château de Pontchartrain, leur fille  Marie-Angélique épouse le marquis d'Osmont, frère de  madame de Boigne,  ensuite par le mariage de Jeanne d'Osmond avec le troisième duc de Maillé de 1845 à 2001 leur fils épouse Carmen de Wendel héritières de la dynastie des maîtres de forges. En 2001, le château fût vendu à un promoteur immobilier.En 2015, le château a été racheté par Mr et Mme Charrier.","architecture":"CHATEAUNEUF sur Cher à traverser une période noire au cours de laquelle ses magnifiques intérieurs ont été dépecés et destructurés, réaménagés en logements, puis abandonnés, saccagés et pillés.  l'édifice de plan en U  sur soubassement à deux niveaux trois corps de logis avec série de lucarnes sur combles  flanqué sur aile gauche d'une grosse tour cylindrique à quatre niveaux toit en poivrières et porche d'entrée entre deux tourelles cylindriques à toit en poivrières. L'agencement des façades extérieures ainsi   que le châtelet d'entrée, s'ouvrant du côté du sommet de la colline est précédé d'un pont-levis franchissant les douves. Depuis peu, sa restauration est en marche. En plus des artisans professionnels, une vaillante équipe de bénévoles s'active et fait revivre ce château sinistré.  Finalement, le couple Charrier a racheté environ 80 % de la proprité (une quinzaine de lots appartiennent toujours à leurs propriétaires) et a trouvé un édifice en mauvais état. Le parc n'a pas été entretenu, les arbres ont grandi, sont pour certains dangereux, le château qui était ouvert au vent a été pillé et l'ancien promoteur avait commencé à construire de nouvelles cloisons dans le château.","habitants":"Famille des Charrier\r\n        \"","divers":"Chateauneuf 46° 51' 31\" Nord et 2° 19' 13\" Est","gps":"","images":["../image/image_18/18_Chateauneuf_Cher_1.jpg","../image/image_18/18_Chateauneuf_Cher_2.jpg","../image/image_18/18_Chateauneuf_Cher_3.jpg","../image/image_18/18_Chateauneuf_Cher_4.jpg","../image/image_18/18_Chateauneuf_Cher_5.jpg","../image/image_18/18_Chateauneuf_Cher_6.jpg","../image/image_18/18_Chateauneuf_Cher_7.jpg","../image/image_18/18_Chateauneuf_Cher_8.jpg"]},"Consult_chateau_formulaire7009":{"id":"Consult_chateau_formulaire7009","dept":"18","canton":"Châteaumeillant","commune":"Chatelet en Berry","nom":"Chatelet","type":"Château","periode":"XII-XVIII","histoire":"Trois type de châteaux aux Chatelet en Berry,  vestiges de la forteresse, la chambre  d'hotes de la famille Faverges, le châtelet de la vieille Foret.             CHATELET, la présence dune telle fortification dans une région qui ne semble pas présenter denjeu stratégique ou économique majeur. On serait tenté de répondre: la géopolitique. Le Châtelet-en-Berry est en effet une possession propre des seigneurs de Déols, qui la font garder par leurs officiers, mais qui ne laccorde jamais en fief à un de leurs vassaux locaux ni en apanage, comme cétait le cas à Châteaumeillant. Cette forteresse se trouve située juste au centre dun grand territoire carré délimité naturellement à louest par la vallée de la Sinaise, et au nord et à lEst par la vallée de lArnon. Aucun autre seigneur important ne possède de biens sur ce territoire, et tous les féodaux qui loccupent rendent hommage aux Déols. Le Châtelet se trouve donc au centre dun territoire qui sert de glacis défensif aux terres déoloises. Une première ligne de défense apparaît sur la Sinaise, avec des forteresses comme Châteaumeillant et Rezay. Une seconde ligne fortifiée par des mottes et des maisons-fortes suit le cours de lArnon. Le Châtelet est le symbole matériel de lautorité des seigneurs de Déols sur cette partie du Berry du Sud. Ces seigneurs et leurs vassaux participent à la fondation et protègent le prieuré dOrsan et le chapitre augustin de Puyferrant.","architecture":"CHATELET,  qui présente la particularité dêtre ici attaché à une forteresse et une ville, alors quon le trouve en général associé à des sites fortifiés très rustiques, de taille variable, qui semblent plus correspondre à des habitats ruraux palissadés quà des châteaux primitifs. On émettra lhypothèse que le lieu était occupé par un ouvrage défensif de terre et de bois avant que les Déols ne le fasse évoluer au XIe siècle en aménageant sur le sommet dune petite colline dominant le Portefeuille une motte castrale servant dassise à une tour carrée, probablement de bois, remplacée au XIIe siècle par le gros donjon décrit par Chaumeau et visible sur plusieurs documents iconographiques.   Un rempart garni dune dizaine de tours délimite une aire assez étendue dans laquelle sélèvent les espaces résidentiels.La tour de défense de l'ancienne forteresse du Châtelet, témoigne des fortifications des XIIe et XIIIe siècles. C'est sous le règne de Philippe Auguste (1179-1223) que s'opèrent les grands chantiers de fortification. La grosse tour de Bourges a longtemps été un témoin de cette présence royale. il apparaît que lancien château du Châtelet était plus étendu, dont potentiellement plus puissant, que ses voisins de Culan ou de Montrond, par exemple. Comme dautres ruines, le Châtelet disparaît derrière la végétation du printemps à la chute des feuilles et il est difficile den apprécier les proportions. Le fait que le site soit vivant et accueille des jeunes pour des stages à caractère culturel et archéologique ne facilite pas laccès à lintérieur des remparts.","habitants":"Seigneurs de Déols\r\n        \"","divers":"Vestiges de la forteresse du Châtelet le château de la Vieille Foret grav-5 et celui des Estivaux grav-6","gps":"","images":["../image/image_18/18_Chatelet_1.jpg","../image/image_18/18_Chatelet_2.jpg","../image/image_18/18_Chatelet_3.jpg","../image/image_18/18_Chatelet_4.jpg","../image/image_18/18_Chatelet_5.jpg","../image/image_18/18_Chatelet_6.jpg"]},"Consult_chateau_formulaire10c3":{"id":"Consult_chateau_formulaire10c3","dept":"18","canton":"Aubigny sur Nère","commune":"Clémont","nom":"Clémont","type":"Château","periode":"XVII","histoire":"Deux châteaux  à Clémont celui de la Boudinière et de Lauroy.                                                                            La BOUDINIERE, pas d'information historique.         LAUROY fief cité en 1391, au XVe siècle propriété des Foucault et par alliance en 1444 aux de Gamaches, en 1460 Guillaume de Gamaches fait hommage de sa terre à Charles II d'Albret, son fils Jean de Gamaches fera de nombreuses libéralités à la paroisse de Clémont. Au XVIe siècle Marguerite de Gamaches par alliance porte les terres dans la famille de La Verne. C'est son petit-fils, Philibert de La Verne en 1617 cède le domaine à Jean Midou famille riche d'Orleans au XVIIe siècle sa descendance construisirent le château actuel, terminé en 1715 lors de la vente à Marie-Marguerite.  Le sieur de Mitry devenue dame de Lauroy en 1715 avait épousé en secondes noces Charles Coysevox, sieur de Brécourt, fils du célèbre sculpteur. Elle n'eut pas d'enfants de cette union et à sa mort Lauroy revient à l'un de ses fils, Claude de Buc  issu d'un premier mariage. En 1793 Antoine de Gaudard d'Allaines époux d'Adélaïde Dubuc de Lauroy remet tous les titres féodaux au conseil municipal à la commune de Clémont, le château n'ayant pas subit de dégat passe par alliance aux Dufour d'Isard revenu ensuite au professeur François de Gaudard d'Allaines menbre de l'académie de médecine, le château appartient  aujourd'hui à ses descendants aux Denizot.","architecture":"BOUDINIERE manoir dont le corps de logis rectangulaire à deux niveaux flanqué d'une tourelle ronde et d'un donjon carré à l'opposée toit à l'impérial.  LAUROY, la mention la plus ancienne de la seigneurie remonte à 1391. Le château fut  édifié à la fin du XVIIe siècle en remplacement d'un ancien édifice qui existait encore en 1718, avec fossés et pont-levis. Il se présente comme un corps de logis en briques, long de 43 mètres,construit en rez-de-chaussée et combles. La partie centrale forme un corps de bâtiment surélevé d'un étage attique coiffé d'un toit à quatre pentes. Deux petites ailes en retour d'équerre sont accolées à la façade sud, les façades éclairées par des fenêtres légèrement cintrées  et séparées par des tables nues sont rythmées horizontalement par une corniche moulurée. Des mansardes disposées deux à deux chevauchent le comble aux extrémités de la façade nord ouvrant sur la cour. Cette dernière a été habillée, au début du siècle, par une galerie fermée, construite dans le même style, destinée à distribuer les pièces du rez-de-chaussée. La façade nord conserve son aspect d'origine. Quelques décors de boiseries sont conservés à l'intérieur. La particularité de ce château est de n'avoir jamais subi les outrages de l'histoire mais aussi d'être toujours resté dans les mains d'une seule famille, de père en fils ou de mère en fille depuis plus de 300 ans.","habitants":"Jean Midou\r\n        \"","divers":"Château de Lauroy grav 1-2-3.                                 Boudinière grav 4-5.                                                      Clémont 47° 34' 08\" nord, 2° 18' 29\" est","gps":"","images":["../image/image_18/18_Cl%c3%a9mont_1.jpg","../image/image_18/18_Cl%c3%a9mont_2.jpg","../image/image_18/18_Cl%c3%a9mont_3.jpg","../image/image_18/18_Cl%c3%a9mont_4.jpg","../image/image_18/18_Cl%c3%a9mont_5.jpg"]},"Consult_chateau_formulaire1d2c-2":{"id":"Consult_chateau_formulaire1d2c-2","dept":"18","canton":"Saint-Amand-Montrond","commune":"Colombiers","nom":"Colombier_la_Salle","type":"Manoir","periode":"XV-XVII","histoire":"COLOMBIERS, le château de la Salle : ce manoir date pour l'essentiel des XVe et XVIIe siècles. Le portail d'entrée est classé depuis l'arrêté du 10 décembre 1987. Le Manoir de Colombiers construit sur lemplacement du vieux château féodal, il fut érigé par Antoine de Saint-Avit puis par son fils Bertrand conseillé  du roi Charles VII.  En 1494, messire Jean Gadon, curé de Colombiers a donné  son nom au domaine des Gadons situé au bord du Chignon, Le manoir est appelé dès le XVe siècle, « château de la Salle ». La famille de Saint-Avit  le posséda jusquen 1558.  En 1621, Etienne Neiret sieur de Coullombier, bailli des terres dOrval-St-Amand-Bruère Montrond et Epineuil, possédait ce petit fief, le château existe encore.  Lheure de la décadence ayant sonnée pour ce manoir féodal quétait St-Amand le Chatel en 1650. Louis Armand de Bigny était seigneur de Colombiers. En 1651 Philippe de Bigny en est le possesseur mais le 18 octobre 1651  il est assiégé par larmée de Philippe de Clérambault, comte de Palluau et commandant des troupes du roi. Le comte de Palluau sempare du manoir, fait combler en partie les fossés, détruire le pont-levis et fait raser létage supérieur du bâtiment principal. Philippe de Bigny est exilé à Nevers, et le château passe à Gaspard de Montmorin, marquis de Saint-Helem.  En 1670, puis il passa par leffet dun partage au marquis de Montmorin.  Avant 1789, la famille le Fer-de-lEpinay de la Branche de le Fer de  château-fer en était propriétaire et le vendit à Mr et Me Rollet qui ajoutèrent à leur nom celui de la Salle.","architecture":"COLOMBIERS, l'existence du château est attestée au XIVe siècle. De cette demeure seigneuriale construite pour Jean du Pin, il reste sans doute les fondations et la tour ouest. Au XVe siècle elle prit son aspect actuel, édifiée par François de Saint-Avit, conseiller de Charles VII. Au XVIIe siècle, alors en possession de la famille de Bigny favorable au parti de Condé, le château est mutilé sur ordre du roi. Il est restauré dans la seconde moitié du XVIIe siècle. L'édifice se présente aujourd'hui comme un corps de logis cruciforme, composé d'un corps principal rectangulaire à deux étages flanqué à l'est d'une tourelle d'escalier en demi-oeuvre, de plan demi-octogonal. Un portail rebâti au XVIIe siècle donne accès à la cour d'entrée, fermée au nord par un pavillon de gardien et, au sud, par des bâtiments de ferme. Le prieuré attenant à léglise est devenu une propriété ayant appartenue à la famille Aury ; peut-être la première,  car dans le cimetière il existe une croix gothique très remarquable et sans inscription qui date du XVIIe siècle.","habitants":"Famille d'Antoine de Saint-Avit\r\n        \"","divers":"Château du colombier à Colombier la Salle","gps":"","images":["../image/image_18/18_Colombier_la_Salle_1.jpg","../image/image_18/18_Colombier_la_Salle_2.jpg"]},"Consult_chateau_formulairef387":{"id":"Consult_chateau_formulairef387","dept":"18","canton":"Saint-Amand-Montrond","commune":"Farges-Allichamps","nom":"Commanderie_Farges","type":"Château","periode":"XIV","histoire":"COMMANDERIE, propriété de Claude et Mireille Charrier depuis 2016.  La Commanderie de Farges nest pas le seul cheval de bataille du couple Charrier qui a également acquis le château de Châteauneuf-sur-Cher en 2015, afin de le restaurer. Jusqu'au XIVe siècle, ce domaine de la commanderie fut la résidence des commandeurs de l'Ordre des Templiers la configuration actuelle correspond au plan laissé par le comte de Choulot. Le parc de la Brosse présente un grand intérêt pour l'histoire de l'art des jardins car il est, sans doute, un des rares parcs dessinés par le comte de Choulot ayant gardé sa lisibilité et son caractère agricole et paysager. En effet, en général, les parcs du comte de Choulot, du fait de leur fonction agricole et de l'emploi d'essences indigènes, ont rarement été conservés en l'état.  « L'objet qu'on se doit de proposer en créant un parc, c'est de l'harmoniser avec les campagnes qui l'entourent, c'est qu'il paraisse beau, non seulement à l'intérieur, à l'il du propriétaire, mais encore à l'extérieur, aux regards du voyageur, étonné des rapports qui unissent ce jardin au pays tout entier. » Le comte Georges de la Chapelle né le 16 juillet 1868 à Farges-Allichamps au château de la Brosse a été médaillé de bronze en double aux Jeux olympiques d'été de 1900 à Paris. Le château est acheté par la ville de Colombes en région parisienne, qui y installe une colonie de vacances. Au printemps 1939, des réfugiés espagnols y sont hébergés.","architecture":"La COMMANDERIE à Farges-Allichamps est une ancienne commanderie de l'ordre du Temple puis de l'ordre de Saint-Jean de Jérusalem qui faisait partie de la langue d'Auvergne. L'édifice est inscrit au titre des M.H. en 2000. deux bâtiments en équerre  dont l'un possède une tour ronde à trois niveaux avec chemin de ronde sur mâchicoulis toit en poivrière, le corps de logis attenant à deux niveaux sur soubassement et lucarnes sur combles et échauguettes en encorbellement à l'opposé, la bâtisse prolongeant à l'équerre à deux niveaux avec belle lucarnes à meneaux et fronton sur comble toit en croupes.","habitants":"Comte Georges de la Chapelle\r\n        \"","divers":"Farges 46° 45' 34\" nord, 2° 24' 04\" est","gps":"","images":["../image/image_18/18_Commanderie_Farges_1.jpg","../image/image_18/18_Commanderie_Farges_2.jpg","../image/image_18/18_Commanderie_Farges_3.jpg","../image/image_18/18_Commanderie_Farges_4.jpg","../image/image_18/18_Commanderie_Farges_5.jpg","../image/image_18/18_Commanderie_Farges_6.jpg","../image/image_18/18_Commanderie_Farges_7.jpg"]},"Consult_chateau_formulaire5296":{"id":"Consult_chateau_formulaire5296","dept":"18","canton":"Sancerre","commune":"Concressault","nom":"Concressault","type":"Vestiges","periode":"XIII-XVI","histoire":"CONCRESSAULT, vestiges de la forteresse primitive de Concressault fut ruinée par les Anglais au cours de la guerre de cent ans. Peu après sa destruction, le duc Jean de Berry (1340-1416) la réédifia plus solidement quelle nétait auparavant. Jean II Stuart de Darnley, connétable d'Écosse, est récompensé de sa participation à la bataille de Baugé par la seigneurie de Concressault, près de Sancerre. Ce dernier deviendra aussi seigneur d'Aubigny-sur-Nère en mars 1423. Sous le règne de Charles VII (1422-1461),  le domaine est documenté depuis le XVe siècle et dépendait de l'abbaye cistercienne de Lorroy.  le château fut à nouveau assiégé par les Anglais, qui ne parvinrent pas à sen emparer. Poursuivis par les Français, ils confondirent une fosse étroite et profonde avec la Sauldre quils pensaient pouvoir passer à gué. Beaucoup sy étant noyés, cet endroit fut appelé par la suite la fosse aux Anglais.","architecture":"CONCRESSAULT,  il se compose d'un ensemble de bâtiments d'habitation et d'exploitation caractéristiques de l'architecture rurale du Pays Fort : construction en pans de bois avec torchis en remplissage. La maison d'habitation est prolongée par l'ancien moulin, construit au XVIe siècle, puis restauré au XIXe siècle.Le château reconstruit était de forme hexagonale, avec des murs de grosses pierres de 32 mètres de hauteur et de 12 mètres environ dépaisseur. Les bâtiments étaient en briques de diverses couleurs et couverts en ardoise. Les fossés avaient une largeur de 32 mètres et une profondeur de quatre mètres.\r\nLes deux moulins situés de part et d'autre de la Grande Sauldre, y compris le mécanisme et le lit du valet à l'intérieur du moulin situé sur la rive gauche de la rivière ; grange de type pyramidal, à pans de bois, y compris sa charpente sur poteaux, sa distribution intérieure ainsi que son auvent ; façades et toitures de l'étable avec le fenil ; grange de type rectangulaire traditionnel, à pans de bois, située au Nord-Ouest ; façades et toitures de l'ancienne grange ou remise, à pans de bois, accolée à la maison de maître ; façades et toitures de l'ancienne bergerie, à pans de bois, transformée en maison d'habitation, située en bordure de la Grande Sauldre, au Sud-Est , inscription par arrêté du 21 mai 1987.","habitants":"Duc Jean de Berry\r\n        \"","divers":"Vestiges à Concressault","gps":"","images":["../image/image_18/18_Concressault_1.jpg","../image/image_18/18_Concressault_2.jpg","../image/image_18/18_Concressault_3.jpg"]},"Consult_chateau_formulaire9160":{"id":"Consult_chateau_formulaire9160","dept":"18","canton":"Châteaumeillant","commune":"Epineuil le Fleuriel","nom":"Cornancay","type":"Château","periode":"XVIII","histoire":"CORNANCAY, le château de Cornançay dit de la Landes est inscrit aux M.H. depuis 1994. Il fut au XVIIIe siècle, la source d'inspiration du \"domaine mystérieux\" du Grand Meaulnes. Sa construction a débuté au XVIIIe siècle. Après 1863, un pavillon supplémentaire a été accolé à l'extrémité sud de l'édifice. La chapelle a sans doute été élevée à cette époque, et les communs remaniés. Plusieurs érudits ont situé en ce lieu la \"Fête Etrange\" du \"Grand Meaulnes\". La famille de Fadate avait pour tradition d'y organiser une Fête des enfants. Le château de Cornançay est devenu la propriété d'une société privée, fermé au public. \r\nGRAND-MAULNES, cest en 1891, à lâge de cinq ans que le jeune Henri Alban Fournier, sinstalle dans lécole dEpineuil-le-Fleuriel, un village situé aux confins du Cher et de lAllier. Toute son enfance sy déroule et sa scolarité se fait dans la classe de son père. Bien des années plus tard, en 1913, devenu Alain-Fournier, il situera dans cette maison-école le point de départ de son célèbre et unique roman, « Le grand Meaulnes.","architecture":"CORNANCAY, certains éléments de ce château ont sans doute contribué à la construction romanesque du domaine perdu du roman d'Alain-Fournier \"Le Grand Meaulnes\". Siège d'un ancien fief, le château a été construit au XVIIIe siècle. De plan rectangulaire, il se compose de trois corps de bâtiment en U. Le corps principal était flanqué, sur son élévation occidentale, de deux pavillons en décrochement. Entre 1835 et 1863, un toit brisé en ardoises a remplacé une toiture à deux versants en tuiles. Après 1863, un pavillon supplémentaire a été accolé à l'extrémité sud de l'édifice. La chapelle a sans doute été élevée à cette époque, et les communs remaniés. Plusieurs érudits ont situé en ce lieu la \"Fête Etrange\" du \"Grand Meaulnes\".","habitants":"Famille de Fadate \r\n        \"","divers":"Cornancay 46° 33' 35\" Nord et 2° 35' 04\" Est               Ecloe de  Henri Alban Fournier grav 5","gps":"","images":["../image/image_18/18_Cornancay_1.jpg","../image/image_18/18_Cornancay_2.jpg","../image/image_18/18_Cornancay_3.jpg","../image/image_18/18_Cornancay_4.jpg","../image/image_18/18_Cornancay_5.jpg"]},"Consult_chateau_formulairec757":{"id":"Consult_chateau_formulairec757","dept":"18","canton":"La Guerche-sur-l","commune":"Cornusse","nom":"Cornusse","type":"Château","periode":"XVII-XIX","histoire":"CORNUSSE, château de Jussy, Le manoir de Défens, le Bois d'Acons. Le manoir de Pierry.                CORNUSSE demeure féodale restaurée à la toute fin du XIXe siècle, a longtemps été la résidence d'été des archevêques de Bourges jusqu'à ce qu'ils la transfèrent au XVIIIe au château de Turly. On trouve d'ailleurs sur l'une des cheminées ornementales du château, les armes de Jean Cur, archevêque de Bourges au XVe siècle et fils du Grand Argentier. Propriété au début de la IIIe République des surs Triboudet de Maimbray, le château passe aux mains d'Henri Martin-Zédé à la fin du XIXe siècle. Celui-ci, ingénieur d'origine parisienne était le frère de Georges Martin-Zédé, avocat et industriel ayant fait fortune aux côtés du chocolatier Ménier, avec lequel il avait développé des biens au large du Canada français, sur l'île d'Anticosti. Il était également un ami du romancier Paul Morand, lieutenant de cavalerie, il fut décoré par le président des États-Unis d'Amérique en juillet 1918 pour le travail accompli en tant que membre de la mission diplomatique française près du haut commandement américain, durant la guerre. Avec son épouse, il s'attacha à restaurer le château et fit venir à Cornusse le célèbre paysagiste Henri Duchêne pour redessiner le parc. Le couple n'ayant eu qu'un enfant, handicapée, choisit de faire don du château, après la seconde guerre mondiale, à un institut pour enfants handicapés. Le château subit alors d'importantes transformations, lesquelles il faut l'avouer n'ont pas eu que des conséquences heureuses sur le dessin de la construction d'origine. Le centre spécialisé a fermé ses portes dans les années 1990 et le château a alors été mis en vente.","architecture":"CORNUSSE, corps de logis rectangulaire à trois niveaux à bandeaux reliant en façade deux pavillons un de droite carré et le donjon à l'opposée de quatre niveaux sont apparente les saignée du pont-levis, sur la partie arrière du donjon  sur angle interne une tourelle sur encorbellement toit en poivrière très pointu. Trois tours rondes aux angles à trois niveaux à bandeaux.                                                               PREFOND à Bengy sur craon  quadrangulaire à deux niveaux avec pavillons sur flancs en décrochement.","habitants":"Famille d'Henri Martin-Zédé\r\n        \"","divers":"Cornusse grav 1 à 4, 46° 57' 19\" nord, 2° 43' 54\" est   Préfond grav 5-6","gps":"","images":["../image/image_18/18_Cornusse_1.jpg","../image/image_18/18_Cornusse_2.jpg","../image/image_18/18_Cornusse_3.jpg","../image/image_18/18_Cornusse_4.jpg","../image/image_18/18_Cornusse_5.jpg","../image/image_18/18_Cornusse_6.jpg"]},"Consult_chateau_formulairec748":{"id":"Consult_chateau_formulairec748","dept":"18","canton":"Vierzon","commune":"Graçay","nom":"Coulon_Chesné","type":"Château","periode":"XVI-XVIII","histoire":"Deux châteaux, Coulon à Graçay et Chesné à Nohant sur Graçay.                                                                     COULON, contruction probable est datée entre 1551 et 1563 et attribuée à Charles de Pisseleu, évêque de Condom de 1551 à 1559, certaines sources estimes que la construction serait plus tardive  fin XVIe siècle début XVIIe siècle.\r\nCHESNE, le château du Chesné est une étape idéale en Berry, au coeur d'un paisible domaine de plusieurs hectares de forêt accessible,  une ame, une atmosphère, un art de vivre, à la fin du XVIIIe siècle lors d'une soirée-étape agrémentée d'une table d'hôtes en saison. Le château du Chesné est un château du XVIIIe siècle situé près du hameau de Lenay à 3 km du bourg.","architecture":"COULON, présente une architecture du XVIe siècle inspirée par les modèles de du Cerceau. La construction daterait d'entre 1551 L'édifice présente un corps de logis longitudinal entre deux pavillons en retour côté jardin. Il s'élevait au fond d'un terre-plein rectangulaire et était entouré de fossés aujourd'hui comblés. Une aile antérieure, à l'ouest, a été démolie ou n'a jamais été construite. L'absence d'appareil militaire prouve qu'il n'avait pas de valeur défensive mais une fonction résidentielle et agricole.Château de Coulon classé et partiellement inscrit au titre des M.H. en 1994. Remparts anciennement allée des Tilleuls.      CHESNE, édifice  à deux niveaux sept travées série de lucarnes attique avec sur toit  en croupe un fronton triangulaire sur pavillon d'entrée légèrement saillant, deux  bâtiment de dépendances en retour d'équerre formant la cour d'honneur.","habitants":"Charles de Pisseleu\r\n        \"","divers":"Coulon 47° 12' 21\" nord, 3° 44' 14\" est                          Chesné grav 4,  47° 08' 15\" Nord, 1° 53' 43\" Est","gps":"","images":["../image/image_18/18_Coulon_Chesn%c3%a9_1.jpg","../image/image_18/18_Coulon_Chesn%c3%a9_2.jpg","../image/image_18/18_Coulon_Chesn%c3%a9_3.jpg","../image/image_18/18_Coulon_Chesn%c3%a9_4.jpg"]},"Consult_chateau_formulaire7b65":{"id":"Consult_chateau_formulaire7b65","dept":"18","canton":"Châteaumeillant","commune":"Le Bourg-Culan","nom":"Culan","type":"Forteresse","periode":"XII-XV","histoire":"CULAN,  construit à la fin du XIIe siècle, début du XIIIe siècle. Il a  appartenu à lamiral de Culant (13601444), en 1582  acquis par  Gilbert de Beaufort qui le cède en 1599  au ministre d'Henri IV Maximilien de Béthune duc de Sully (15991621) puis au prince de Condé. En 1663, le prince de Conti cède les terres à Michel Le Tellier de Chaville, marquis de Barbezieux, dont une branche de la descendance de la famille  de la Tour d'Auvergne, des d'Harcourt, puis de Croÿ qui resteront  propriétaires jusqu'à la Révolution. Durant la Révolution, les terres du château furent partagées entre quelques familles et la forteresse fut vendue comme bien national. Au XIXe siècle et dans la première moitié du XXe siècle, le château appartenait à Félix Legrand ( 1893), avocat à la cour d'appel de Bourges et maire de Saint-Doulchard, puis à son fils l'helléniste Philippe-Ernest Legrand (1866-1953). \r\nIl a reçu plusieurs hôtes célèbres : Jeanne dArc (1429), Louis XI (1465), Sully, Madame de Sévigné, la romancière George Sand, « la bonne dame de Nohant » venue en voisine avec Chopin, ou encore Ernest Renan. Le général de Gaulle, en visite à Saint-Amand-Montrond après la guerre, préféra passer la nuit dans une demeure particulière de la rue de lÉglise.  Jean Pierre Marquis avait racheté le château de Culan, dominant lArnon,  en 1960 à Jean Ferragut, en 2001. Depuis, il n'a eu de cesse de le restaurer afin douvrir ses portes aux visiteurs. Il est décédé le 24 août 2018 à l'âge de 82 ans toujours dans la famille.","architecture":"CULAN , une première construction en bois dont il ne reste rien aurait été démolie au Xe siècle. Une seconde bâtisse fut assiégée et détruite par Philippe Auguste en 1188, lors des guerres de mouvements. Le château actuel de la fin du XIIe siècle ou début du XIIIe siècle, est une construction qui s'est poursuivie jusqu'au XVe siècle, avec rajouts à la Renaissance avec une façade  longue de quatre-vingts mètres avec des fenêtres à meneaux rythmées de trois puissantes tours rondes couronnées de hourdes en bois toit en poivrières. Lors de la fronde en 1651, le château perdra, sur ordre de Mazarin, le haut de son donjon, une partie de ses remparts et son chatelet d'entrée. Le château a été  remarquablement restauré dans la période 1950-1980 par son propriétaire, Jean Ferragut, qui y organisa de belles expositions (Picasso, Bernard Buffet, tapisseries flamandes). C'est l'une des rares forteresse à posséder encore ses hourds qui permettaient de jeter des pierres et divers projectiles sur les assaillants. Le château possède des cheminées monumentales du XVe siècle.\r\n Façades et toitures ont été inscrites le 2 mars 1926 puis classées M.H.  le 2 juin 1956","habitants":"Famille de Culan\r\n        \"","divers":"Culan  46° 32' 47\" nord, 2° 21' 08\" est1","gps":"","images":["../image/image_18/18_Culan_1.jpg","../image/image_18/18_Culan_2.jpg","../image/image_18/18_Culan_3.jpg","../image/image_18/18_Culan_4.jpg","../image/image_18/18_Culan_5.jpg"]},"Consult_chateau_formulaire1d52":{"id":"Consult_chateau_formulaire1d52","dept":"18","canton":"Dun-sur-Auron","commune":"Dun sur Auron","nom":"Dun_sur_Auron","type":"Château","periode":"XVI","histoire":"deux châteaux à Dun Terlan et la Périsse.              DUN sur AURON,  dit de  PERISSE, entre 1202 et 1203, les fortifications du château sont entièrement remaniées sous l'impulsion de Philippe Auguste. L'enceinte est alors adjointe de courtines, de tours latérales et d'un donjon. D'autres aménagements d'ampleur sont opérés sur  l'ancien logis des vicomtes de Dun au cours du XIVe siècle. Conséquence d'une mise à sac de la cité berrichonne en 1430, le château de Dun-sur-Auron fait dès lors l'objet d'une importante reconstruction. Au XVIIe siècle, l'une des ailes de l'édifice est réorganisée afin de faire office de chambre d'auditoire d'une part, de prison et de conciergerie, d'autre part. Enfin, au cours du XIXe siècle, le château devient uniquement un bâtiment destiné à l'incarcération et tient lieu de tribunal juridictionnel. La porte dite « de l'Horloge » est disposée sur un plan d'architecture de forme carrée. Elle présente en outre deux tourelles qui se déploient sur chacun des angles de sa facade. Son style architectural se manifeste également au sein d'autres édifices médiévaux tels que le celui du Louvre et dont la période de construction s'échelonne entre 1200 et 1300.","architecture":"DUN sur AURON, également dénommé « La Salle-le-Roi », ou encore « Palais Royal » Le chantier de construction débute au cours du 1er quart du XIIIe siècle, en 1202. Le tout premier élément édifié du site médiéval est sa porte. Fréquemment confondue avec un donjon, cette porte est également connue sous le nom de « porte de l'Horloge ». À cette époque, au début du XIIIe siècle, elle faisait office d'accès principal pour la seconde enceinte fortifiée de la cité dunoise. La mise-en-place de cette deuxième fortification se manifeste dès lors comme un renforcement de la défense de Chatel vieil. À la fin du XIVe siècle, une deuxième phase de construction s'inscrit dans la partie Est de l'enceinte. Dès lors, l'entrée monumentale dite de « l'Horloge » ne possède plus sa vocation de porte de ville. Toutefois, l'arc monumental conserve sa destination de beffroi. D'importants travaux de remise en état sont effectués au début du XVe siècle, conduisant ainsi à la restauration complète de charpente. À cette occasion, le bâtiment est complété par un escalier hélicoïdal. En 1856, l'ensemble de la toiture subie de lourdes réfections. Le donjon ou « Tour de l'Horloge » du château de Dun-sur-Auron fait l'objet d'un classement sur la liste des M.H de France  depuis le 27 décembre 1913. Ultérieurement, l'intérieur de l'édifice médiéval est modifié afin d'abriter un  musée.","habitants":"Seigneurs locaux\r\n        \"","divers":"Dun grav 1-2                                                               Terlan 46° 53' 08\" N, 2° 34' 21\" E   Grav 7-8               Perisse 46° 53' 03\" Nord et 2° 31' 17\" Est  Grav 3 à 6.","gps":"","images":["../image/image_18/18_Dun_sur_Auron_1.jpg","../image/image_18/18_Dun_sur_Auron_2.jpg","../image/image_18/18_Dun_sur_Auron_3.jpg","../image/image_18/18_Dun_sur_Auron_4.jpg","../image/image_18/18_Dun_sur_Auron_5.jpg","../image/image_18/18_Dun_sur_Auron_6.jpg","../image/image_18/18_Dun_sur_Auron_7.jpg","../image/image_18/18_Dun_sur_Auron_8.jpg"]},"Consult_chateau_formulairee718":{"id":"Consult_chateau_formulairee718","dept":"18","canton":"Aubigny sur Nère","commune":"Ennordres","nom":"Ennordres","type":"Château","periode":"XIV-XV","histoire":"Ennordres trois châteaux, de l'ECHENEAU bâtisse du XVIIe siècle ;  de La MOTTE du XVIIe siècle sur les bords de la petite Sauldre ; de la BROSETTE dont le corps principal date du XVIIIe siècle et actuellement ouvert en chambre d'hôtes ;\r\net  au nord Est le manoir de BELLEVUE chambre d'hôtes.","architecture":"ENNORDRES; l'ECHENEAU bâtisse du XVIIe avec ses pierres et grès noirs de Vailly en angle. corps de logis à un niveau avec lucarnes sur combles flanqué entre deux pavillons carrées à deux niveaux également mais celui de droite est accolée d'une tour ronde toit en poivrière et celui de gauche d'une tour carrée à deux niveaux.                                                La MOTTE du XVIIe sur les bords de la petite Sauldre. L'édifice oblong à deux niveaux toit en croupe accolé d'une tour ronde  toit en poivrière.\r\n La BROSETTE, corps de logis rectangulaire à deux niveaux et attiques, accolé à un bâtiment transversal de même niveau.\r\n La ferme des Grimousseaux à la sortie du bourg est typique des constructions du XVIIIe avec ses briques et colombages.","habitants":"Seigneurs locaux\r\n        \"","divers":"Ennordres 47° 25' 51\" nord, 2° 23' 03\" est                    La Motte grav 1-2                                                       Echeneau  grav 3                                                         Brosette grav 4-5","gps":"","images":["../image/image_18/18_Ennordres_1.jpg","../image/image_18/18_Ennordres_2.jpg","../image/image_18/18_Ennordres_3.jpg","../image/image_18/18_Ennordres_4.jpg","../image/image_18/18_Ennordres_5.jpg"]},"Consult_chateau_formulaire02e8":{"id":"Consult_chateau_formulaire02e8","dept":"18","canton":"Saint-Amand-Montrond","commune":"Farges_Allichamps","nom":"Farges_Allichamps","type":"Château","periode":"XIII","histoire":"A la Farges-Allichamps le château de la Brosse et le Manoir chambres d'hôtes à Brinay pas d'information pour ce dernier, et la Commanderie (voir article).          La BROSSE, dès le XIIIe siècle,  est une seigneurie, que le marquis Gardye de la Chapelle-Crosville a fait construire cette résidence de chasse monumentale sans sacrifier au confort.  La configuration actuelle correspond au plan laissé par le comte de Choulot. Le parc de la Brosse est un des rares parcs dessinés par le comte de Choulot ayant gardé sa lisibilité et son caractère agricole et paysager.  En 1863, Paul de Lavenne, comte de Choulot, paysagiste réputé pour ses nombreuses et fameuses réalisations de 280 parcs en France, Italie et Suisse, création de la ville-parc du Vésinet en 1858, des villes de Cognac, Clermont-Ferrand et du Mans intervient au château de la Brosse à l'apogée de son uvre. Le comte Georges de la Chapelle, né le 16 juillet 1868 à Farges-Allichamps au château de la Brosse a été médaillé de bronze en double, aux Jeux olympiques d'été, de 1900, à Paris. Le château de la Brosse est racheté, par la ville de Colombes, qui y installa une colonie de vacances. Au printemps 1939, des réfugiés espagnols y furent hébergés. Le château de la Brosse a été inscrit aux M.H. en 2000.","architecture":"La BROSSE, dès le XIIIe siècle, restructuré au milieu du XIXe siècle dans le style du XVe siècle, l'ancienne fortification a laissé place à un château à l'architecture raffinée de l'époque.  L'extrême précision de la sculpture de la pierre et ses décors intérieurs font du château de la Brosse un chef-d'uvre de l'architecture néogothique.  En effet, en général, les parcs du comte de Choulot, du fait de leur fonction agricole et de l'emploi d'essences indigènes, ont rarement été conservés en l'état. l'édifice malgré son incendie en 1862  à repris son aspect d'origine, de plan rectangulaire sur soubassement à deux niveaux et lucarnes gothique à pinacle sur combles à toit brisés  flanqué de tour cylindrique aux angles et échauguettes à mâchicoulis, pavillon carrée au centre de la façade de trois niveaux  avec terrasse sur mâchicoulis, balustrade et tourelles insérré dans les angles internes. Les escaliers d'entrée sont sur chaque flanc de la façade. Un nouveau feu en 1973 détruisit les toits des tourelles et les pavillons du châteaux transformé en terrasse.","habitants":"Comte Georges Gardye de la Chapelle\r\n        \"","divers":"Farges-Allichamps  46° 45' 38,16\" Nord, 2° 25' 1,2\" Est Brosse grav 1-2                                                         Manoir de Brinay grav-3","gps":"","images":["../image/image_18/18_Farges_Allichamps_1.jpg","../image/image_18/18_Farges_Allichamps_2.jpg","../image/image_18/18_Farges_Allichamps_3.jpg","../image/image_18/18_Farges_Allichamps_4.jpg"]},"Consult_chateau_formulaire604f":{"id":"Consult_chateau_formulaire604f","dept":"18","canton":"Bourges","commune":"Lazenay","nom":"Ferté_Lazenay","type":"Château","periode":"XIX","histoire":"FERTE de LAZENAY, il est classé aux M.H. depuis 1986. Lazenay milieu du XIXe siècle. Cette demeure est construite sur l'emplacement d'un châtelet antérieur, au XIIe siècle, par Jean Constant Hémery et son épouse Louise Barrois. Situé en Sologne, cet hôtel-club occupe un château du XIXe siècle, près de la vallée des Rois.","architecture":"FERTE-LAZENAY, le corps de logis de plan rectangulaire à deux niveaux et série de lucarnes sur comble, l'édifice inséré entre deux tours carrées de même hauteur toit à quatres pans  flanqué en façade d'une tourelle d'escalier et sur la gauche en retour pavillon carré à un niveau avec terrasse.","habitants":"Jean Constant Hémery\r\n        \r\n        \"","divers":"Ferté-Lazenay  47° 04' 16\" Nord et 2° 03' 51\" Est","gps":"","images":["../image/image_18/18_Fert%c3%a9_Lazenay_1.jpg"]},"Consult_chateau_formulaire1e64":{"id":"Consult_chateau_formulaire1e64","dept":"18","canton":"Guerches-sur-l","commune":"Flavigny","nom":"Flavigny_Néronde","type":"Château","periode":"XV-XVIII","histoire":"FONTENAY   au sud de Nérondes bâti  pour le comte Charles de Montsaulin par Henri Tarlier, architecte originaire de Bourges, entre 1882 et 1887.                    BAR-BONNEBUCHE appartenait au XIIIe siècle à la famille Fontenay, le qualificatif de seigneur de Bonnebûche est relevé dès le XIIIe siècle.Il est attribué par exemple à Pierre II de Fontenay dans son acte de mariage vers 1300, à son fils Jean en 1338 dans un dénombrement de la dixme de la Vauvrille, et un siècle plus tard, à un de ses descendants, un autre Jean de Fontenay, dans un dénombrement de la seigneurie de Bonnebûche consenti le 15 septembre 1443 au seigneur de Germigny.   Bonnebûche appartient encore, en 1496, à un Geoffroy de Fontenay, puis en 1503 à Jean de Montaulieu par mariage, dont la petite-fille, Gilberte de Montaulieu, épouse le 20 juillet 1589 Jean-Claude de Bar, seigneur de Billeron, Lugny et Estiveau. Les comtes de Bar conservent Bonnebûche pendant les deux siècles suivants, et l'un d'eux, Jean-Claude II de Bar, n'ayant pas d'héritiers portant son nom, obtient en 1784 pour le transmettre à l'un de ses neveux, de changer par un décret de Louis XVI, le nom de Bonnebûche en celui de Bar. Et c'est finalement en 1822 que Bonnebûche, apparemment toujours transmis jusqu'alors par succession ou mariage depuis plus de cinq siècles, fait l'objet d'une vente, et se trouve ainsi acheté, en partie, par Maurice de Bonnault, trisaïeul du propriétaire actuel.    Dimportants aménagements intérieurs de lannexe sud furent exécutés vers 1845 par madame de Bonnault devenue veuve en 1832 de lacheteur de Bar de 1822 sans doute à cette occasion le toit « à la Mansart » couvert de petites tuiles de pays, fut-il remplacé par un toit à trois versants, couvert en ardoise","architecture":"FONTENAY dont le corps de logis date du XVIIIe siècle. Les 2 pavillons sont construits en retour d'équerre, ils ont été élevés pour le comte Charles de Montsaulin  entre 1882 et 1887.                               BONNEBUCHE, la construction du château actuel doit remonter au XVe siècle. Mais en 1710, la tour d'escalier qui était extérieure au centre de la façade sur la cour a disparu pour permettre l'ouverture de fenêtres plus larges et plus nombreuses. C'est de cette époque que date la terrasse qui surplombe l'étang. On sait avec certitude, du moins, que ce fut dans les années 1860 à 1870 que la couverture, à très forte pente, de la partie la plus ancienne du château, auparavant également en petite  tuile, fut remise à neuf avec des ardoises violettes des Ardennes. Pour la « petite histoire », ces ardoises ont beaucoup souffert lors du cyclone de 1936 qui fit dénormes dégâts dOurouer à Flavigny, avec des grêlons gros comme des ufs de poule, des vents très violents et descendirent lune des pilastre de la chapelle et la cheminée du milieu du château.","habitants":"Famille Fontenay                                                         Comte Charles de Montsaulin\r\n        \r\n        \"","divers":"Flavigny 46° 58' 05? nord, 2° 48' 07? est       Fontenay grav 1 à 4      Bar grav 5-6","gps":"","images":["../image/image_18/18_Flavigny_N%c3%a9ronde_1.jpg","../image/image_18/18_Flavigny_N%c3%a9ronde_2.jpg","../image/image_18/18_Flavigny_N%c3%a9ronde_3.jpg","../image/image_18/18_Flavigny_N%c3%a9ronde_4.jpg","../image/image_18/18_Flavigny_N%c3%a9ronde_5.jpg","../image/image_18/18_Flavigny_N%c3%a9ronde_6.jpg"]},"Consult_chateau_formulairedcec":{"id":"Consult_chateau_formulairedcec","dept":"18","canton":"Dun-sur-Auron","commune":"Thaumiers","nom":"Foret_Thaumiers","type":"Château","periode":"XV","histoire":"La FORET dit THAUMIERS, le premier seigneur connu fut Jean de la Porte en 1243.  En 1383 passe à Jean de la Forêt damoiseau, puis  en 1479 un autre Jean de la Forêt, au XVIe siècle le domaine passe à Guillaume  Bochetel secrétaire des finances époux d'une sur de Jean de Morvilliers lieutenant et bailli du Berry, Jeanne de Bochetel leur fille apporte par alliance à Claude de L'Aubespine baron de Châteauneuf sur Cher, en 1569 passe  par Madeleine de L'Aubespine à Nicolas de Neufville marquis de Villeroy passera à leur fils Charles de Neufville gouverneur du Lyonnais épousera en second noce Jacqueline de Harlay,  il auront plusieurs enfants, dont Nicolas futur maréchal de France et Louis-François chevalier de Malte qui hérite de Thaumiers, à sa mort en 1639, le domaine passe aux Titon , seigneur de Villegenon, puis aux Maréchal et enfin par alliance  aux Doullé. En 1796  à la famille de Bonneval par mariage d'Henriette de Doullé avec Philippe-Armand de Bonneval pair de France  sous la Restauration. Gaston de Bonneval aide de camp du général de Gaulle, toujours dans la famille de Bonneval.","architecture":"la FORET à Thaumiers actuel remonte au XVe siècle. Il formait un carré avec 4 tours aux angles. Entouré de fossés, il était doté d'un pont-levis et d'un donjon d'entrée. A la fin du XVIIIe siècle, les ailes Est et Sud et la tour Sud ont été supprimés avec le donjon d'entrée. Une grande partie des fossés a été comblée. Il reste deux corps de logis perpendiculaires, remaniés lors des transformations du XVIIIe siècle, 3 tours circulaires d'angle, 2 tourelles carrées et une tourelle ronde ainsi que la douve sud. L'accès à la cour d'honneur se fait par un pont de pierre franchissant la douve. L'extrémité sud de l'aile Ouest présente un pavillon rectangulaire en retour d'équerre qui semble être l'amorce de l'ancienne aile Sud du château médiéval. Les tours et tourelles ont été percées de grandes fenêtres au XVIII siècle. Elles ont gardé au sommet, leurs petites ouvertures et archères d'origine. L'aménagement intérieur date de la restauration du XVIIIe siècle. Les appartements ont été refaits au XIXe siècle. Les éléments d'origine sont un escalier de pierre à vis, sur trompes d'angle, dans la tourelle carrée de la cour et une salle carrée, au rez-de-chaussée de la tour ronde contigüe. Ancienne chapelle, elle est voûtée d'ogives. Un escalier avec sa rampe en fer forgé et un escalier à vis ont été inscrits aux M.H. le 14/12/1979.","habitants":"Jean de la Forêt\r\n        \"","divers":"Thaumiers 46° 49' 20\" Nord et 2° 39' 21\" Est","gps":"","images":["../image/image_18/18_Foret_Thaumiers_1.jpg","../image/image_18/18_Foret_Thaumiers_2.jpg"]},"Consult_chateau_formulairef6b2":{"id":"Consult_chateau_formulairef6b2","dept":"18","canton":"Vierzon","commune":"Genouilly","nom":"Genouilly","type":"Château","periode":"XII-XVI","histoire":"Deux château à Genouilly, Maisonfort et Maisonblanche.                                                 MAISONFORT, est un édifice de briques et de pierres, de style Renaissance, construit de 1586 pour, Claude II de La Châtre, chef de la Ligue en Berry dont le château devient le quartier général,  à la place de l'ancienne forteresse féodale, dite maison forte où il était né et dont subsistent quelques éléments. Promu maréchal de France en 1594, Claude de La Châtre fut l'un des plus valeureux chevaliers de son époque, dont la forte personnalité et la légende ont illustré lhistoire de la commune.                                           MAISONBLANCHE,  le prieuré de Fontblanche (ou celle de Fontblanche) est lun des plus anciens de lordre érémitique de Grandmont puisque sa fondation, par le seigneur de Graçay, Renaud IV, remonterait entre 1140 et 1145. En 1317 le prieuré de Fontblanche fut uni avec le prieuré de Chateauneuf-sur-Cher, commune de Corquoy.   À lextinction de lordre de Grandmont prononcée par le pape Clément XVI en 1772, la celle de Fontblanche était déjà transformée en bâtiments agricoles. Elle a été vendue comme bien de première origine en 1791.","architecture":"MAISONFORT,  le château actuel, privé de son système défensif, est constitué d'un grand corps de logis au sud, avec avant-corps central flanqué de deux ailes en retour d'équerre au nord. Au XIXe siècle probablement, la partie centrale aurait partiellement brûlé et les transformations des façades seraient la conséquence des restaurations. Les ailes ont conservé leurs lucarnes Renaissance. Les façades du pavillon d'angle sud-ouest ont conservé des murs médiévaux. Celles de l'aile orientale présentent un appareil mixte, brique et pierre, en damiers. La façade de l'avant-corps central sur le parc est revêtue d'un faux appareil de brique et pierre. Du décor intérieur datant de la construction subsistent des cheminées monumentales et une chambre au deuxième étage dont les murs sont ornés de scènes religieuses encadrées par des frises à décor floral. Le décor se compose également de lambris des XVIIIe et XIXe siècles. Quelques éléments défensifs subsistent : tourelle en encorbellement ; tour polygonale de l'ancienne ferme. La Maisonfort offre le premier exemple dans la région de l'architecture militaire de la fin du XVIe siècle, avec abandon des ordres, simplification des couvertures, apparition de l'appareil polychromé.                                MAISONBLANCHE, dès lors, il connut une période de lente désaffection et subit de graves déprédations avec, en particulier en 1650, lincendie du bâtiment ouest et du cloître en bois.","habitants":"Maisonfort Famille de Claude II de La Châtre         Maisonblanche seigneur de Graçay, Renaud IV\r\n        \"","divers":"Maison-fort grav 1-2-3 47° 12' 31\" Nord et 1° 55' 07\" Est.                                                                         Maisonblanche grav 4","gps":"","images":["../image/image_18/18_Genouilly_1.jpg","../image/image_18/18_Genouilly_2.jpg","../image/image_18/18_Genouilly_3.jpg","../image/image_18/18_Genouilly_4.jpg"]},"Consult_chateau_formulaire9b2d":{"id":"Consult_chateau_formulaire9b2d","dept":"18","canton":"La Guerche de l","commune":"Germigny-Exempt","nom":"Germigny_Lexempt","type":"Château","periode":"XVII","histoire":"A Germigny-l'Exempt le château Renaud , le Gaillard, et deux autres dont je n'ai pas les informations historiques.                                                            CHATEAU-RENAUD, cet édifice a été reconstruit vers 1683 sur l'emplacement d'un château médiéval, pour Bernard Briçonnet d'Oizonville, d'une famille originaire de Touraine, acquéreur de la seigneurie en 1689. La construction est souvent attribuée à Joseph Lingré, maître-maçon nivernais.  1629 : maître Gilbert Rouzé, notaire royal, châtelain et procureur fiscal à Germigny époux de Françoise Matté, veuve de Pierre Rondet, notaire royal à Sagone le 28 juin 1629 \r\nEn 1695 : Gilbert Ménard, procureur en la prévôté royale de Cencoins le 28 août 1695. 1683 : Bernard Briçonnet dOizonville et Thomas son frère sont adjudicataires. La fille de Bernard, Paulle-Louise-Marie épouse jean Frezeau de la Freselière et en était veuve en 1718.   1711 : Hilarion de Frezeau, lieutenant-général de lartillerie de France, comte de la Fréselière obtient lérection de la terre de Germigny en marquisat. Il demeurait dans son château en 1752. Sa fille épousa Louis César de Bonneval, seigneur de Bannegon et émigra sous la Révolution.  En 1762 : Antoine Glaut, notaire royal et bailli de La Guerche le 8 janvier 1762.  En 1768 : Gabriel Brunet, notaire royal à Cencoins le 20 mai 1768.","architecture":"CHATEAU-RENAUD, le château de plan en  U occupe la partie orientale d'un terre-plein rectangulaire entouré de douves ou de fossés murés. L'entrée se situe à l'ouest, sur un pont à refuges donnant accès à un portail dont le parement à bossages continus est animé par des pilastres et dont le fronton porte les armes des Briçonnet d'Oizonville. A l'angle nord-ouest de la cour d'honneur, une tour ronde avec corniches à denticules, couverte d'un dôme, abrite la chapelle. L'angle sud-ouest est occupé par une terrasse circulaire qui pourrait être la base d'une tour qui n'aurait jamais été construite. Le château présente un corps principal aux façades ordonnancées symétriquement de part et d'autre d'un avant-corps légèrement saillant. Ce corps est flanqué, au sud et au nord, d'une aile en retour d'équerre dont les angles sont occupés par des tours rondes. Elevés au nord, les communs ont été édifiés à différentes époques. Au XIXe siècle, une campagne de restauration porta surtout sur l'aile nord, en grande partie remontée, ainsi que sur les ouvertures, le revêtement des murs extérieurs et la décoration intérieure.","habitants":"Bernard Briçonnet dOizonville \r\n        \"","divers":"Germigny  46° 55' 08\" nord, 2° 53' 57\" est.                  Château Renaud grav 1à3                                            Gaillard grav-7","gps":"","images":["../image/image_18/18_Germigny_Lexempt_1.jpg","../image/image_18/18_Germigny_Lexempt_2.jpg","../image/image_18/18_Germigny_Lexempt_3.jpg","../image/image_18/18_Germigny_Lexempt_4.jpg","../image/image_18/18_Germigny_Lexempt_5.jpg","../image/image_18/18_Germigny_Lexempt_6.jpg","../image/image_18/18_Germigny_Lexempt_7.jpg"]},"Consult_chateau_formulaire334d":{"id":"Consult_chateau_formulaire334d","dept":"18","canton":"Châteaumeillant","commune":"Saint-Maur","nom":"Grand_Besse","type":"Château","periode":"XV","histoire":"GRAND-BESSE,  on trouve un Jean Rougier de Besse en 1432, peut-être en est-il le constructeur, bien que le château puisse être plus ancien, si on s'en rapporte à la forme du donjon. Par la suite, le château appartient à un Savary, maréchal sieur de Besse, puis un Martin, maréchal sieur de Besse, avocat, échevin de Bourges en 1507-1508, enfin un Pélagie de Villeboucher qui transmet le château à son petit-fils François d'Assy ; celui-ci le vend en 1662 à Étienne Ragon, fermier général. Le Grand Besse était alors un vieux manoir. D'Étienne Ragon, le château passe à Guillaume Thabaud, qui en fait aveu en 1714, et par héritage à Boucheron de Boisvignault en 1784-1786 ; en 1843, vente à Julien Arthur Gohin, puis au comte de Boissieu et à sa femme. La famille de Boissieu qui le rachète dans la deuxième moitié du XIXe siècle, agrandit le logis, ajoute une tourelle d'escalier néo-gothique et décore l'ancien donjon (réfection des cheminées décorées aux armes de la famille de Boissieu) les bâtiments de ferme sont reconstruits à cette époque, serre ajoutée dans le parc. Les lucarnes du XIXe siècle ont toutes été supprimées.","architecture":"GRAND-BESSE, le château actuel se compose d'un donjon carré, d'aspect très robuste, éclairé par des fenêtres à meneaux. Ce donjon du début du XVe siècle date de la construction  du château. De l'enceinte qui a disparu il ne reste que la tour ronde avec un pan de mur et une partie de fossé encore remplie d'eau. Seraient aussi de cette époque une tour ronde d'escalier éclairée par de petites fenêtres carrées, et, au sud-est, une porte à linteau ornée d'un écusson qui donne sur la cour. Le nouveau logis date du XVIIe siècle et a été agrandi au XIXe siècle avec ajout d'une tourelle d'escalier néo-gothique. Le bâtiment d'habitation est de forme rectangulaire, avec une tour d'escalier au milieu ; une petite poivrière non accessible en briques sur de beaux encorbellements se trouve à un angle de ces bâtiments. La toiture est surmontée d'épis en métal. Les bâtiments de ferme et la serre sont décorés de chaînes faisant alterner la brique et la pierre.  Donjon : rez-de-chaussée surélevé et un étage carré accessibles par une tour d'escalier en vis en pierre. Tours couvertes de toit conique et corps de logis d'un toit en pavillon. Nouveau logis à un étage carré desservi par un escalier en pierre rampe sur rampe et un deuxième escalier du XIXe siècle en pierre qui loge dans une tourelle hors oeuvre. Serre décorée de chaînes avec alternances brique et pierre, ornée d'un décor de rocaille et couverte d'un toit en croupe en tuiles mécaniques.","habitants":"Jean Rougier de Besse.\r\n        \"","divers":"Grand-Besse 46° 34' 14\" nord, 2° 16' 18\" est 1","gps":"","images":["../image/image_18/18_Grand_Besse_1.jpg","../image/image_18/18_Grand_Besse_2.jpg"]},"Consult_chateau_formulaire909f":{"id":"Consult_chateau_formulaire909f","dept":"18","canton":"Aubigny sur Nère","commune":"Neuvy sur Barengeon","nom":"Grand_Chavanon","type":"Château","periode":"XIX","histoire":"GRAND-CHAVANON, dit  de Saint-Hubert, bâti de 1895 à 1897 dans un style \"néo-Louis XIII-Louis XIV\" pour le vicomte Robert du Bourg de Bozas, \"industriel métallurgiste nivernais passionné de chasse\", qui le destinait pour son fils (qui ne l'a jamais occupé); quatre statues de 1903 du sculpteur Eugène Guillaume ornent les angles de la grande pièce d'eau du parc (Michel Berger et Bernard Toulier, la Sologne à tire d'aile, 1995 ). En 1923 le domaine devient la propriété de la princesse de Caraman-Chimay, qui fit moderniser partiellement le décor intérieur. Le 9 juin 1933 fut prise, probablement en vue de sa mise en vente, une vue aérienne du château, de sa cour d'honneur et des bâtiments latéraux.  En 1935 Louis Joseph Fillon, archevêque de Bourges, fit acheter le domaine afin d'y installer le Petit Séminaire du diocèse, puis en mars 1936 dom Bellot, bénédictin et architecte à Wisques, Pas-de-Calais, fit édifier une importante chapelle et un cloître en béton à parements de briques dans la cour d'honneur et dans l'axe central, interrompant ainsi une perspective de plus de 1 500 mètres (de la conciergerie route de Vierzon à la route de Vouzeron). Après différents propriétaires de 1970 à 1978, ce fut une des propriétés françaises de Jean-Bedel Bokassa qui fut louée et ensuite prêtée par le Cercle des Combattants de Roger Holeindre, un des dirigeants du Front National à l'époque7 (qui y forge les jeunes militants FN8), puis rachetée en 2005 par un couple d'Australiens pour en faire un gîte de luxe, puis en 2010 par une société civile immobilière privée qui le gère depuis lors. Aujourd'hui     SCI de Marques Falk Artur, Osorio.","architecture":"Grand-CHAVANON,  Le corps de logis se dresse au fond de la cour d'honneur bordée de chaque côté par un pavillon de communs. En brique et pierre, il adopte le style du début du XVIIe siècle. Les façades reprennent les principes de la composition classique avec une division en trois corps de bâtiments principaux, la symétrie de part et d'autre d'un avant-corps central en légère saillie et la répartition régulière des travées rythmées. Les élévations attestent d'inspirations tels que les châteaux de la fin du XVIe siècle ou les demeures du début du XVIIIe siècle en Ile-de-France et Picardie. La distribution intérieure et le décor sont d'origine. Les peintures de la chapelle et des pièces de réception ont été réalisées en 1926. En 1935, le château fut acquis par l'archevêché de Bourges pour y installer le petit séminaire diocésain. Les travaux d'aménagement furent réalisés de 1935 à 1937, sous la direction du révérend père Dom Paul Bellot, moine architecte de l'abbaye bénédictine de Wisques. Château et communs sont conservés. Une nouvelle chapelle est édifiée dans l'axe de la façade d'entrée du château, ainsi qu'une galerie couverte la reliant au château. De plan octogonal, la chapelle est constituée d'une ossature en béton armé avec des parements de murs en briques, ornés de briques vitrifiées colorées.","habitants":"vicomte Robert du Bourg de Bozas\r\n        \"","divers":"Grand_Chavanon   47° 18' 58\" Nord, 2° 15' 17\" Est","gps":"","images":["../image/image_18/18_Grand_Chavanon_1.jpg","../image/image_18/18_Grand_Chavanon_2.jpg","../image/image_18/18_Grand_Chavanon_3.jpg"]},"Consult_chateau_formulaire8859":{"id":"Consult_chateau_formulaire8859","dept":"18","canton":"La Guerche-sur-l","commune":"Mornay-Berry","nom":"Grand_Cour","type":"Forteresse","periode":"XIII-XV","histoire":"GRAND'COUR, le fief de Mornay dit la Grand'Cour,  Pierre Mornay à l'origine de la construction un des plus anciens châteaux du Cher, encore très bien conservé, illustre l'architecture militaire du Moyen-Age, avec son plan en château-coquille, son châtelet, ses douves en eau, son pont et son assommoir. La visite remet la construction dans le contexte historique et permet d'appréhender le mode de vie des petits seigneurs ruraux. La quiétude des jardins, jardin clos avec son bassin et potager médiéval, offre aux visiteurs un instant hors du temps, propice à la rêverie et au romantisme. Son propriétaire actuel est Mr Jean-Pierre Berger.","architecture":"GRAND'COUR, construit à la fin du XIIIe siècle, peu de temps avant la guerre de cent ans, il est un rare exemple encore démonstratif de \"forteresse-coquille\" avec son enceinte polygonale et sa porte-donjon. Ses douves en eau, son pont-bascule et son assommoir illustrent son rôle protecteur d'une petite seigneurie contre les brigands et les mercenaires des armées de tous bords, aussi bien françaises qu'anglaises ou bourguignonnes. Au XVe siècle un étage a été ajouté et un escalier a dû être créé, abrité dans une tourelle ronde appuyée au donjon massif initial : cette juxtaposition exceptionnelle est une des originalités architecturales du site. Au centre de la motte médiévale, une longère a été construite au XVIIIe siècle sur les ruines du logis seigneurial qui avait brûlé au XVIe siècle. Aujourd'hui, son cadre de verdure et l'agrément de ses jardins fleuris de roses anciennes, en font un lieu de quiétude propice aux jeux entre les haies ou à la rêverie romantique dans ses alcôves de charmilles. La Grand'Cour, un des plus anciens châteaux du Cher, encore très bien conservé, illustre l'architecture militaire du Moyen Age, avec son plan en château-coquille, son châtelet.","habitants":"Mr Jean-Pierre Berger.\r\n        \"","divers":"Grand-Cour 47° 02' 57\" Nord, 2° 52' 52\" Est","gps":"","images":["../image/image_18/18_Grand_Cour_1.jpg","../image/image_18/18_Grand_Cour_2.jpg","../image/image_18/18_Grand_Cour_3.jpg","../image/image_18/18_Grand_Cour_4.jpg"]},"Consult_chateau_formulaire2296":{"id":"Consult_chateau_formulaire2296","dept":"18","canton":"Dun-sur-Auron","commune":"Montjoie-Grossouvre","nom":"Grossouvre","type":"Forteresse","periode":"XIII-XIV-XV","histoire":"GROSSOUVRE, la commune  trouve son origine en la seigneurie de Grossouvre, cédée en 1364 à Jehan de Grivel par un seigneur du Bourbonnais. Sous l'ancien régime, la seigneurie de Grossouvre faisait en effet partie du Bourbonnais et a été rattachée après la Révolution au département du Cher alors que le département de l'Allier recouvre l'essentiel du Bourbonnais. En 1779, Jean-François Durand (Monteguet 1779 -  Alexandre Aguado, Marquis de Las Marimas, banquier espagnol, racheta le château de Grossouvre 1802), bailli du Breuil en Bourbonnais, afferme la seigneurie de Grossouvre au comte de Grivel puis lui achète en septembre 1785 par contrat passé à Colmar. Jean-François Durand, seigneur de Grossouvre (a prêté foi et hommage à la marquise de Bonneval en 1785), sera maire de la Chapelle-Hugon, la commune de Grossouvre n'existant pas encore. François Durand de Grossouvre, fils de Jean-François, également maître de forges mais moins entreprenant que son père vendra le château et les terres en 1822. Alexandre Aguado, marquis de Las Marimas, banquier espagnol, achète le château de Grossouvre en 1833.    NEUVY LE BARROIS à 6 km à l'Est  le château du Pey  à Neuvy-le-Barrois date du XIIe siècle à la fin du XVe et au XVIIIe siècle.","architecture":"GROSSOUVRE, des XIIIe et XVe siècles. Ce château médiéval  la tour à bossages est de la fin du XIIIe siècle, et la chapelle de la fin du XVe siècle début du XVIe siècle a été restauré au XIXe siècle et habité par la famille Aguado (très liée à l'Impératrice Eugénie, jusqu'en 1868. Il a été restauré dans le style troubadour, reconstitution souvent attribuée à Viollet-le-Duc qui serait intervenu à la demande du comte Olympio Aguado. L'édifice présente une enceinte cantonnée, à ses quatre angles, par des tours circulaires. Le château conserve une tour à bossage rustique, édifiée à la fin du XIIIe siècle, exceptionnelle dans le Berry où ce type de parement fut rare au Moyen-Age. La courtine proche de cette tour garde les traces de l'entrée primitive du château, avec pont-levis à flèches  et l'ancienne chapelle qui lui fait suite au nord.","habitants":"Jehan de Grivel\r\n        \"","divers":"Grossouvre 46° 52' 29\" Nord et 2° 57' 09\" Est      Neuvy-Barrois grav 8,  46° 51' 56\" Nord, 3° 02' 17\" Est","gps":"","images":["../image/image_18/18_Grossouvre_1.jpg","../image/image_18/18_Grossouvre_2.jpg","../image/image_18/18_Grossouvre_3.jpg","../image/image_18/18_Grossouvre_4.jpg","../image/image_18/18_Grossouvre_5.jpg","../image/image_18/18_Grossouvre_6.jpg","../image/image_18/18_Grossouvre_7.jpg","../image/image_18/18_Grossouvre_8.jpg"]},"Consult_chateau_formulaire79da":{"id":"Consult_chateau_formulaire79da","dept":"18","canton":"La Guerche-sur-l","commune":"Guerche-sur-L","nom":"Guerche","type":"Château","periode":"XV-XVI","histoire":"Trois châteaux à Guerche celui de Chézelles, de Gravier  et à 8 Kilomètres à l'Est à Cuffi le chateau de Vouilly et Les ruines d'un XIVe siècle de la  Motte et Bailey  pas d'informations.                                     CHEZELLES, manoir du XVe -XVIe siècle), bâtie sur les fondations d'une villa gallo-romaine possède un impressionnant donjon du XVe siècle. \r\nLe château de l'hôtel de Ville du XIe siècle-XVe siècle-XIXe siècle. Ce château, de style néo-gothique, est construit au XIXe siècle par un maître de forges sur le mur des fortifications du XIe siècle avec les pierres décoratives de l'ancien château (XVe siècle). Il est racheté en 1936 par la municipalité qui y installe la mairie de La Guerche.\r\nGRAVIER, en 1867, la famille Revenaz qui venait de sinstaller au château du Gravier, offrit de construire un hospice. Le terrain choisi, et donné à la ville par M. Ferrand était inculte. Grâce à la générosité de Messieurs Gustave et Arthur Revenaz, rien ne fût épargné pour doter létablissement de tout le confort existant à lépoque afin de donner le maximum de bien être aux malades et aux vieillards.","architecture":"CHEZELLES, le château comprend un rez-de-chaussée et un premier étage. Devant la façade nord se trouve une tour prismatique contenant l'escalier. Le pignon Est est occupé par une tour triangulaire avec terrasse au sommet. Au sud se trouve une tour saillante carrée. Autour de la cour carrée se devine une enceinte rectangulaire de fossés. Une tour, disparue, occupait l'un des angles.  L'édifice a été classé au titre des M.H. en 1994\r\nGRAVIER de style néogothique, constitué de deux corps de logis  rectangulaire à deux niveaux sur soubassement avec série de lucarnes sur comble, le corps de droite de quatre travées  est saillant à celui de trois travées dont une est  caché par une tourelle à quatre niveaux avec mâchicoulis toit en poivrière sur chemin de ronde, à l'extrème gauche une tour ronde avec ouverture de trois  grandes fenêtres à fronton retondant à mi-hauteur toit en poivrière. A l'opposé pavillon en retour d'équerre et dans l'angle donjon carrée à quatre niveaux à mâchicoulis et chemin de ronde crénelé, toit à l'impériale.","habitants":"Gravier Famille Revenaz                                        Renaud  Famille De Maistre\r\n        \"","divers":"Chezelles grav-1,  46° 57' 07\" Nord, 2° 56' 54\" Est    Gravier grav-2 à 6                                                       Vouilly grav 7                                                              Vestiges de Cuffy grav 8","gps":"","images":["../image/image_18/18_Guerche_1.jpg","../image/image_18/18_Guerche_2.jpg","../image/image_18/18_Guerche_3.jpg","../image/image_18/18_Guerche_4.jpg","../image/image_18/18_Guerche_5.jpg","../image/image_18/18_Guerche_6.jpg","../image/image_18/18_Guerche_7.jpg","../image/image_18/18_Guerche_8.jpg","../image/image_18/18_Guerche_9.jpg"]},"Consult_chateau_formulaire60d8":{"id":"Consult_chateau_formulaire60d8","dept":"18","canton":"Châteaumeillant","commune":"Touchay","nom":"Isle_sur_Arnon","type":"Château","periode":"XIV","histoire":"ISLE sur ARMON, c'est un ancien château-fort dont la construction  est attribuée à Jean Dumas, conseiller et chambellan du roi Louis XI, en 1480. Le château fut enrichi par son fils, évêque de Périgueux, en 1494, puis passe aux mains de Jean de Beaufort, prince de Canillac en 1579, mais fut incendié par le prince de Condé en 1650 après avoir perdu une partie de ses défenses en 1591 à la suite d'un siège, puis appartiendra en 1579, à Jean de Beaufort, prince de Canillac.   Le château de l'Isle-sur-Arnon est inscrit aux M.H. en 1926.","architecture":"ISLE sur ARMON, la forteresse date  du XVe siècle, sa construction est attribuée à Jean Dumas, composé de trois  corps de logis reliés par des courtines, de plan carré à trois niveaux  flanqués de deux tours rondes toits en poivrières deux donjons intercalés en façades de plan carré à mâchicoulis  à trois niveaux celui de gauche à échauguettes sur mâchicoulis.","habitants":"Jean Dumas,\r\n        \"","divers":"Isle sur Arnon 46° 42' 12\" nord, 2° 12' 33\" est","gps":"","images":["../image/image_18/18_Isle_sur_Arnon_1.jpg","../image/image_18/18_Isle_sur_Arnon_2.jpg","../image/image_18/18_Isle_sur_Arnon_3.jpg","../image/image_18/18_Isle_sur_Arnon_4.jpg","../image/image_18/18_Isle_sur_Arnon_5.jpg"]},"Consult_chateau_formulairec3ac":{"id":"Consult_chateau_formulairec3ac","dept":"18","canton":"Aubigny sur Nère","commune":"Ivoy le Pré","nom":"Ivoy_le_Pré","type":"Château","periode":"XVI-XVII","histoire":"IVOY, en limite du Berry et de la Sologne, aux portes du Sancerrois, ce château du XVIe et XVIIe siècles, conçu selon des plans d'Androuët du Cerceau, a abrité, par le passé, nombre d'histoires et de relations secrètes, autour de Condé, mais aussi des familles écossaises de Marie Stuart à Lord Drummond. Henri IV séjourna au château en 1606. \r\n  Rémy Chauvin, biologiste et entomologiste français qui mena ses travaux au début des années 1990 dans le château d'Ivoy dont il était le propriétaire,  Jean-Gérard et Marie-France Gouëffon de Vaivre vous accueillent dans leur demeure pour un séjour enchanteur.                                                           MOISON, chambres d'hôtes de La Palme Bruno, ancien relais de chasse des XVII et XIXe siècle","architecture":"IVOY, de plan rectangulaire, le corps de logis de deux niveaux à cinq travées inséré entre deux pavillons carrée toit à quatre pans et flanqué au extrémités du corp de logis en façade deux tours circulaires toit en poivrières.                                                                         MOISON, de plan rectangulaire, quatre pavillons formant le corps de logis de différents niveaux  dont certains sont  saillants.","habitants":"Jean-Gérard et Marie-France Gouëffon de Vaivre\r\n        \"","divers":"Yvoi le Pré, 47° 20' 45\" nord, 2° 29' 16\" est","gps":"","images":["../image/image_18/18_Ivoy_le_Pr%c3%a9_1.jpg","../image/image_18/18_Ivoy_le_Pr%c3%a9_2.jpg","../image/image_18/18_Ivoy_le_Pr%c3%a9_3.jpg","../image/image_18/18_Ivoy_le_Pr%c3%a9_4.jpg"]},"Consult_chateau_formulairea3c5":{"id":"Consult_chateau_formulairea3c5","dept":"18","canton":"Bourges","commune":"Bourges","nom":"Jacques_Cur","type":"Palais","periode":"XIV-XV","histoire":"Palais JACQUES COEUR, la construction de l'hôtel de la Chaussée, en 1453, au moment où Jacques Cur grand argentier du roi Charles VII était tombé en disgrâce en 1451, emprisonné jusqu'en 1454, avant de s'évader et se réfugier dans l'île grecque de Chios, où il mourut en 1456. Le palais fut confisqué, avec tout son mobilier, par le roi Charles VII, qui en était jaloux, et par la couronne. Ne trouvant pas d'acquéreur, le roi le rendit finalement en 1457 aux fils de Jacques Cur, Henri, Ravan et Geoffroy, avant de connaître des fortunes diverses. Il fut revendu en 1501 par le fils de Geoffroy à un notable local, Antoine Turpin, qui le revendit lui-même en 1552 à Claude de L'Aubespine, secrétaire d'État aux finances.  Adjugé par décret judiciaire au ministre Jean-Baptiste Colbert le 13 mai 1679, ce dernier le rétrocéda à la municipalité de Bourges le 30 janvier 1682. Celle-ci y installa divers services administratifs et judiciaires. En 1920, le département revendit à son tour à l'État la partie qui lui appartenait, la Cour d'appel et les tribunaux quittant le bâtiment. L'hôtel Jacques Cur continue à porter l'appellation de palais en référence à cette ancienne utilisation. L'État se porta acquéreur de l'ensemble du bâtiment en 1923 et une restauration reposant sur des bases historiques sérieuses fut menée de 1927 à 1937. L'état actuel des bâtiments en est le résultat direct.","architecture":"Palais; JACQUES COEUR, l'édifice de style flamboyant gothique ils s'élèvent, du moins pour le corps principal, sur trois étages, le premier séparé du rez-de-chaussée par un cordon en larmier, le dernier pris dans la toiture et éclairé par d'imposantes lucarnes. L'élévation obéit déjà à un quadrillage régulier, fondé sur un jeu marqué de verticales baies superposées et sommées, sur les travées, par une arcade richement ornée et horizontales, est de style gothique flamboyant. Son premier étage se termine par une corniche, formée de choux frisés, et par une balustrade, où réapparaît l'ordinaire motif emprunté au nom même de Jacques Cur, les curs et les coquilles. Cette façade externe comporte une double porte centrale, percée sous un pavillon rectangulaire et surmontée d'une statue équestre de Charles VII sous un dais, martelée à la Révolution. Cette statue est encadrée par deux fausses fenêtres qui représentant Jacques Cur et sa femme, Macée de Léodepart.  La façade arrière interne est bâtie sur le rempart gallo-romain de l'oppidum de Bourges, dont elle incorpore trois tours, avec leurs courtines, sur une centaine de mètres.  La galerie sud comporte deux cheminées monumentales : l'une, appelée « Les loisirs de la noblesse », a son manteau divisé en trois arcades aveugles et dont la frise est interrompue par les pinacles des arcs en accolade fleuronnée.","habitants":"Jacques Cur\r\n        \"","divers":"Palais de Jacques Cur 47° 05' 05\" nord, 2° 23' 39\" est","gps":"","images":["../image/image_18/18_Jacques_Coeur_1.jpg","../image/image_18/18_Jacques_Coeur_2.jpg","../image/image_18/18_Jacques_Coeur_3.jpg","../image/image_18/18_Jacques_Coeur_4.jpg","../image/image_18/18_Jacques_Coeur_5.jpg","../image/image_18/18_Jacques_Coeur_6.jpg","../image/image_18/18_Jacques_Coeur_7.jpg","../image/image_18/18_Jacques_Coeur_8.jpg"]},"Consult_chateau_formulaire7bb5":{"id":"Consult_chateau_formulaire7bb5","dept":"18","canton":"Sancerre","commune":"Jars","nom":"Jars","type":"Maison forte","periode":"XIV-XV","histoire":"deux chateaux à Jars celui de Jars et celui de Nancray.                                                                         JARS Archambaud de Seuly devient le seigneur de Jars à la fin du XIIe siècle. Au XIVe siècle, grace à plusieurs mariages et alliances, la châtellenie passera dans le patrimoine des Tochechouart, une grande famille du Limousin. Guillaume de Rochechouart naquit à la fin de 1497. Ce personnage, très représentatif de la noblesse de la Renaissance fit construire léglise Saint Aignan de Jars. Devenu le page du roi François Ier, il participera aux guerres dItalie et se verra confier différentes charges qui le maintiendront dans lentourage des Rois de France successifs, jusquà sa mort en 1568. Il sera enterré à Jars tout comme son fils François qui participa au siège de la place protestante de Sancerre, en 1573 et, mourut, en 1576. Au XVIIème, la Seigneurie du Jars est rachetée par la marquise de Cugnac, veuve du seigneur de Boucard, puis, en 1644, Boucard, Nancray et la seigneurie de Jars passeront dans les mains du Duc de Noailles. En 1720, le fermier général Etienne Perrinet du Pezeau , directeur de la Compagnie des Indes, rachèta le château de Boucard et maria sa fille, à son cousin Pierre David Perrinet afin de conserver les domaines dans le patrimoine familial. A la veille de la Révolution, les justices de Boucard, Nancray, Sury lès Bois, se sont réunies au bourg de Jars.","architecture":"JARS maison forte de plan rectangulaire à deux niveaux toit haut en croupe deux lucarnes en façade sur comble et plein cintre accolé d'une tourelle toit en poivrières et de deux tours aux angles sur la partie arrière.                                                                                NACRAY de plan en U à deux niveaux avec lucarnes sur combles pavillon d'entrée  saillant avec fronton triangulaire sur le toit.","habitants":"Guillaume de Rochechouart \r\n        \"","divers":"Jars  47° 23' 46\" Nord, 2° 41' 01\" Est","gps":"","images":["../image/image_18/18_Jars_1.jpg","../image/image_18/18_Jars_2.jpg","../image/image_18/18_Jars_3.jpg"]},"Consult_chateau_formulaireb3f0-2":{"id":"Consult_chateau_formulaireb3f0-2","dept":"18","canton":"dun-sur-Auron","commune":"Sancoins","nom":"Jouy_Sancoins","type":"Vestiges","periode":"XIV","histoire":"A Sancoins  les vestiges du château de Jouy, le château de Sancoins  et la Barre.                         JOUY,  vers 1346 acquisition du fief par Pierre de Giac  qui fit construire un important donjon.  Pierre de Giac, seigneur de Jouy en 1346, chancelier de France de 1373 à 1388, mort en 1407. le domaine passe ensuite à son fils Louis Echansson de France, puis à son petit-fils  Pierre II qui détournant des fonds de la couronne est condamné à mort et exécuté en 1426, le fils de ce dernier parvient à recouvrer les biens paternel; confisqué et sans enfants les cède à sa soeur Louise  épouse de Jacques de la Queuille. Jouy aura comme seigneurs plusieurs membres de la famille La Queuille ainsi que Robert Stuart, maréchal d'Aubigny époux de Jacqueline de La Queuille. En 1551  Marc de Beaufort, vicomte d'Alluie et son épouse Catherine de La Queuille, cèdent Jouy  à Jean Babou grand bailli de Touraine, seigneur de Sagonne. Désormais, les deux  domaines partageront un destin commun et passeront aux  L'Aubespine, aux Hardouin-Mansart et aux Boisrenaud.  Vendu comme bien national  à la Révolution.  Le donjon de Jouy est inscrit aux M.H.depuis 1926.","architecture":"JOUY, les vestiges du donjon de Jouy est un château bâti à Sancoins,  de style Médiéval, sa construction date du XIVe siècle. Le donjon est une construction de plan carré, renforcé et flanqué de trois tours circulaires aux angles, la quatrième tour abrite un escalier à vis. L'intérieur présentait plusieurs étages reliés par un escalier. Le rez-de-chaussée est couvert en berceau brisé et est éclairé par deux archères. Le premier étage est voûté d'ogives élevées sur des colonnettes d'angle aux chapiteaux ornés de feuillages. Les deux étages supérieurs sont recouverts d'un plancher. Au niveau du deuxième étage, la tour sud-est était aménagée en chapelle. Ce donjon qui fut partiellement incendié à la fin du XVIe siècle n'était plus habité, ruiné se trouve dans un parc d'un hôtel installé dans les anciens bâtiments du Prieuré.","habitants":"Famille de Pierre de Giac\r\n        \"","divers":"Jouy 46° 49' 19\" nord, 2° 52' 06\" est2","gps":"","images":["../image/image_18/18_Jouy_Sancoins_1.jpg","../image/image_18/18_Jouy_Sancoins_2.jpg","../image/image_18/18_Jouy_Sancoins_3.jpg","../image/image_18/18_Jouy_Sancoins_4.jpg","../image/image_18/18_Jouy_Sancoins_5.jpg","../image/image_18/18_Jouy_Sancoins_6.jpg","../image/image_18/18_Jouy_Sancoins_7.jpg"]},"Consult_chateau_formulaire8c31":{"id":"Consult_chateau_formulaire8c31","dept":"18","canton":"Avord","commune":"Jussy-Champagne","nom":"Jussy_Champagne","type":"Château","periode":"XVI-XVII","histoire":"JUSSY-CHAMPAGNE,  première reconstruction entre 1584 et 1591, est due à François de Gamaches, gentilhomme de la maison du roi, chef du parti royaliste en Berry pendant les guerres de Religion. Les Gamaches originaires de Picardie, établie en Berry, depuis des alliances avec les familles Foucaud et de Blet, au XVe siècle. Eléonore des Gamaches vendit le château de Jussy, faute de moyens, à la famille de Gaucourt en 1702, qui vendit à son tour le château en 1759 à Pierre-Philippe  de Champgrand et son épouse Marie-Madeleine Agard de Morogues. Cette famille, toujours propriétaire des lieux, entreprend d'achever le château, de le restaurer et de le moderniser, au XIXe siècle passe à la famille de Bengy. Le château de Jussy appartient aujourd'hui à la famille Ponton d'Amécourt, est classé aux M.H. depuis 1946.","architecture":"JUSSY-CHAMPAGNE,  bel édifice du  XVIe de briques a coin de pierre, ceint de douve,  en 1591, alors que seule avait été construite la partie gauche du corps de logis comprenant l'avant-corps central avec l'escalier, le haut pavillon et l'aile courte en retour. Claude de Gamaches, son petit-fils, qui participa à la Fronde aux côtés de Condé, fit construire, en 1646-1648, par l'architecte Berruyer Jean Lejuge, la partie droite du corps de logis et l'aile courte attenante, sur le modèle exact de la partie du XVIe siècle, à l'exception du haut pavillon droit qui ne fut pas construit et sur l'emplacement duquel on éleva un bâtiment au XVIIIe siècle. Il fit compléter le château, à une date indéterminée, par les ailes à galeries qui bordent la cour, les deux pavillons carrés de chaque côté de l'entrée et un portail ouvert dans un mur portant une terrasse sur arcades,  suppression des meneaux des fenêtres, dépose des couronnements des lucarnes, décoration des
