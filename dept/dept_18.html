ossession de la famille de Barres, puis aux seigneurs de Bourbon, au XIVe siècle passe  aux Sully, Jean de sully transforme la citadelle en forteresse, son fils Claude fit édifier la ravissante citadelle  en style Renaissance,  en 1390 Ainay revient par alliance à la famille de Culan qui le vend à Jacques Coeur financier du roi Charles VII suite à des difficultés financières, elle le récupérera quelques années plus tard avant de le céder à nouveau en 1467 acquis par deux frères écuyers Jean et Charles de Chevenon seigneurs de Bigny qui l'achetèrent est  firent du manoir leur principale résidence. De 1855 à 1858 restauration complète à l'initiative du marquis de Bigny et à la fin du XIXe siècle , il échut par les femmes aux Villefranche, puis  par alliance aux Colbert par la petite fille du dernier marquis de Bigny avec le marquis de Colbert, et à la baronne  Géraud d'Aligny née Colbert toujours dans cette famille.","architecture":"AINAY le VIEIL, de style médiéval Renaissance, à gardé son aspect qu'il avait à la fin du Moyen-Age, architecture  militaire féodale de forme octogonale vaste ceinture crénelée   protégée par de hautes murailles cernées de douves, entouré d'une enceinte polygonale féodale, flanqués de neuf grosses tours lisses et massives coiffées  de poivrières et de  meurtrières reliés par un chemin de ronde surnommé le « Petit Carcassonne » à cause de son enceinte fortifiée,   deux de ces tours encadrent une imposante poterne qui fait office de châtelet d'entrée.","habitants":"Famille d'Aligny\r\n        \r\n        \r\n        \"","divers":"Forteresse d'Ainay-le-Vieil 46° 40' 05\" nord, 2° 32' 59\" est","gps":"","images":["../image/image_18/18_Ainay_le_Vieil_1.jpg","../image/image_18/18_Ainay_le_Vieil_2.jpg","../image/image_18/18_Ainay_le_Vieil_3.jpg","../image/image_18/18_Ainay_le_Vieil_4.jpg","../image/image_18/18_Ainay_le_Vieil_5.jpg","../image/image_18/18_Ainay_le_Vieil_6.jpg","../image/image_18/18_Ainay_le_Vieil_7.jpg","../image/image_18/18_Ainay_le_Vieil_8.jpg"]},"Consult_chateau_formulairee11a":{"id":"Consult_chateau_formulairee11a","dept":"18","canton":"La Guerche-sur-l","commune":"Apremont sur Allier","nom":"Apremont","type":"Château","periode":"XIV-XV","histoire":"APREMONT,  bâti à Apremont-sur-Allier,  domine lAllier qui coule à ses pieds. Il ne reste pas grand-chose de la formidable forteresse anglo-bourguignonne de 12 à 14 tours du XVe siècle. Aux premiers seigneurs connus, la famille des Barres qui habitère le château aux XIIe siècle,  au XIIIe siècle et XIVe siècle, succéda Guyot de Révillon puis Philippe de Boutillat, bailli de Nevers et trésorier du royaume, qui le reçut en apanage du comte de Nevers en 1477.  À cette date, Philibert de Boutillat demande les fonds nécessaires à son suzerain pour reconstruire partiellement le château.  Diverses familles se succèdent pendant les XVIe siècle et XVIIe siècle. Le fils de Philippe de Boutillat, Nicaise, le cède à la famille des Barres issu d'une branche collatérale. En 1602, François de Roffignac achète le château. Sa descendance le vendit en 1722 à Louis Marie Victoire, comte de Béthune. Dès cet instant, il restera dans la même famille par la lignée féminine:  Caroline de Masseran, lainée des petites filles de la comtesse Béthune-Pologne, épouse en 1801, Aldonce, marquis de Saint-Sauveur qui fait dApremont sa résidence dété. le marquis de Saint-Sauveur a dilapidé sa fortune dans les fêtes et au jeu, il choisit de se suicider pour éviter le déshonneur. Ses terres, ses voitures, ses meubles ont été vendus. Il ne subsiste guère que le château d'Apremont,  désormais inhabité, il se délabre. En 1894, leur fille, arrière-petite-fille d'Aldonce, Antoinette de Rafelis-Saint-Sauveur, épouse Eugène Schneider, maître des forges au Creusot.","architecture":"APREMONT,  Eugène Schneider  ne cessera alors de le transformer et den améliorer le confort pendant 50 ans. A la mort de son mari, en 1942, Antoinette Schneider se consacre au maintien en bon état de la demeure. À sa mort, en 1969, sa fille, la duchesse de Brissac en devint propriétaire. Après avoir perdu un fils de 22 ans, tué dans un combat aérien, en 1918, Antoinette Schneider,  son petit-fils, Gilles de Brissac, qui décidera de créer, au début de 1970, un parc floral à Apremont. Le Château d'Apremont-sur-Allier est toujours au sein de la même famille.  L'édifice de style néo-gothique est un vaste quadrilatère cantonné de tours à ses angles, présente un aspect médiéval avec un massif donjon occupant l'angle  sud-ouest son  chemin de ronde soutenu par des mâchicoulis, ses épaisses courtines percées de rares ouvertures. A l'un de ses angles s'élève, l'attribut indispensable de toute demeure seigneuriale, une chapelle sur plan hexagonal le corps de logis reçoit des lucarnes d'inspiration médiéval, surmontées de pot à feu, un espace formée en remblai est aménagée autour de l'édifice pour faciliter l'accès. Inscrit aux M.H. de France par arrêté du 16 juin 1986.","habitants":"Famille d'Eugène Schneider\r\n        \"","divers":"Apremont 46° 54' 14\" Nord et 3° 02' 50\" Est","gps":"","images":["../image/image_18/18_Apremont_1.jpg","../image/image_18/18_Apremont_2.jpg","../image/image_18/18_Apremont_3.jpg","../image/image_18/18_Apremont_4.jpg","../image/image_18/18_Apremont_5.jpg"]},"Consult_chateau_formulairea983":{"id":"Consult_chateau_formulairea983","dept":"18","canton":"Aubigny sur Nère","commune":"Argent sur Sauldre","nom":"Argent_sur_Sauldre","type":"Château","periode":"XV-XVIII","histoire":"ARGENT sur SAULDRE, dit de Saint-Maur a été construit vers 1776-1778.  A l'origine la seigneurie d'Argent au XIIIe siècle construit par la famille de Sully qui passa en 1401 par alliance à la famille d'Albret, et au XVe siècle aux comtes de Nevers, vendu à la fin du XVIe siècle  Jean de Vétus  conseiller au parlement de Bretagne, au XVIIe siècle à sa petite-fille  qui épousa Nicolas de Vignolles seigneur de Montour et de la Tour de Boueix, le domaine passa ensuite aux Gauville descendants des Vignolles qui le cédèrent à Claude Fizeaux qui le  vendra en 1765, à Nicolas Dupré de Saint-Maur, alors nommé intendant de la généralité de Bourges. Ses descendants, les Montbel le conserveront jusqu'en 1957 et sera à cette date céder à la commune qui abrite depuis 1987 un musée des métiers.  Il bénéficie d'un classement aux M.H. de France depuis le 11/07/2002.","architecture":"ARGENT sur Sauldre, le principal architecte de l'édifice berrichon était Victor Louis. Pendant la seconde moitié du XVIIIe siècle, le château fit l'objet de nombreux réaménagements. Il est pourvu de dépendances supplémentaires. L'espace entourant le château de saint-Maur fut réorganisé afin d'accueillir un parc et des jardins paysagers. La fabrique de jardin, appelée le « Temple de Bacchus », se situé, dans le parc du château de Saint-Maur, l'édifice du XVe siècle vieille demeure féodale, l'aile Est est conservé s'encadre entre deux tours l'aile sud  abattu ouverture de l'aile nord, transformée en corps principal, la droite du château  construction néoclassque dont la porte d'entrée surmontée d'un oculus, s'encadre dans un vigoureux massif à bossages.","habitants":"Famille de Nicolas Dupré de Saint-Maur.\r\n        \"","divers":"Château d'Argent sur Sauldre 47° 33' 40\" Nord et 2° 26' 57\" Est","gps":"","images":["../image/image_18/18_Argent_sur_Sauldre_1.jpg","../image/image_18/18_Argent_sur_Sauldre_2.jpg","../image/image_18/18_Argent_sur_Sauldre_3.jpg","../image/image_18/18_Argent_sur_Sauldre_4.jpg","../image/image_18/18_Argent_sur_Sauldre_5.jpg","../image/image_18/18_Argent_sur_Sauldre_6.jpg","../image/image_18/18_Argent_sur_Sauldre_7.jpg"]},"Consult_chateau_formulaire8de2":{"id":"Consult_chateau_formulaire8de2","dept":"18","canton":"Aubigny sur Nère","commune":"Aubigny sur Nère","nom":"Aubigny_sur_Nère","type":"Château","periode":"XIV-XV","histoire":"AUBIGNY ou STUART,   Il y a presque six siècles, Charles VII remit la ville d'Aubigny à Jean Stuart comte  de Darnley (1423), le plus prestigieux des chefs de l'armée écossaise, qui lui permit d'établir une alliance à long terme durant la guerre de cent ans au nom de l'Auld   Alliance (traité d'aide mutuelle entre la France et l'Écosse conclu au XIIIe siècle. Bérault et Robert Stuart, compagnons d'armes du chevalier Bayard et contemporains de Léonard de Vinci, firent construire les châteaux d'Aubigny et de la Verrerie.  En 1512, un gigantesque incendie ruina la cité des Stuarts, surnom d'Aubigny. Robert le relève et autorise les habitants à tirer le bois de charpente de ses forêts ; il lui en coûtera trois forêts qui nous valent les belles maisons à pans de bois que l'on voit aujourd'hui. Inspirés par les Stuarts et règlementés par Colbert, l'industrie et le commerce du drap firent la réputation des Albiniens. Louise de Kéroualle, bretonne, duchesse de Portsmouth, reçut de Louis XIV le duché-pairie d'Aubigny. Elle embellit les châteaux des Stuarts et a légué de magnifiques jardins inspirés de Le Nôtre. A la mort de la duchesse son petit-fils Charles Lennox  duc de Richemont   ses descendants conserveront Aubigny jusqu'en 1812 vendut à la commune qui abrite les services municipaux ainsi qu'un musée de l'Auld Alliance.","architecture":"AUBIGNY-STUARTS, l'édifice  style Renaissance  vaste demeure consistait dans deux ailes parallèles que relie un corps  de bâtiment perpendiculaire dont le centre est occupé par un châtelet d'entrée. Couverte d'un très haut comble sur lequel se détache une lucarne Renaissance encadrée de pilastres, cette construction est flanquée de trois tourelles en encorbellemet, deux sur sa façade antérieure, une autre sur la cour. Le quatrième angle est occupé par une tour abritant un escalier à vis. Dans la cour , le corps de logis réaménagé au XIIe siècle s'encadre d'une tourelle d'escalier  flanquée d'une vis secondaire logée dans une tourelle en brique, et le chevet de la chapelle, épaulé par des contreforts.   Devenu hôtel de ville à cet ensemble unique de maisons à colombage, en passant par la marque de Whisky « The Aubigny Auld Alliance » qui arbore fièrement les couleurs locales. La splendeur de cette ville, située sur la route historique Jacques Cur, est complétée par de jolis éléments patrimoniaux comme lenceinte Philippe Auguste, De superbes grands jardins, inspirés par Le Nôtre ont quant à eux étés légués par la duchesse de Portsmouth. Notons également quAubigny-sur-Nère bichonne ses hôtes grâce à son label « Ville Fleurie » dont elle détient la récompense des 4 fleurs.","habitants":"Famille de John Stuart\r\n        \"","divers":"Château d'Aubigny 47° 29' 20,04\" Nord et 2° 26' 27,6\" Est","gps":"","images":["../image/image_18/18_Aubigny_sur_N%c3%a8re_1.jpg","../image/image_18/18_Aubigny_sur_N%c3%a8re_2.jpg","../image/image_18/18_Aubigny_sur_N%c3%a8re_3.jpg"]},"Consult_chateau_formulaire14c4":{"id":"Consult_chateau_formulaire14c4","dept":"18","canton":"Avord","commune":"Sancergues","nom":"Augy","type":"Château","periode":"XVI","histoire":"Plusieurs châteaux à Sancergues  dont Augy et à cinq kilomètres au sud-Est Charentonnay.                             AUGY, Roger Martin du Gard de 1881 à 1958, lauréat du prix Nobel pour son oeuvre Les Thibault, a séjourné dans le château pendant 27 ans.   A deux kilomètres  au sud à Charentonnay château et vestiges.","architecture":"AUGY,  le château  de plan rectangulaire transformé en un centre médico éducatif.  Le corps de logis style manoir accolé de tour ronde et carrée prolongé d'un bâtment à deux niveaux avec frontons sur combles.      Charentonnay,  château et vestiges d'un château des trois Brioux.","habitants":"Seigneur local\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Château à Sancergues et Charentonnay 47° 08' 47\" nord, 2° 52' 29\" est","gps":"","images":["../image/image_18/18_Augy_1.jpg","../image/image_18/18_Augy_2.jpg","../image/image_18/18_Augy_3.jpg","../image/image_18/18_Augy_4.jpg","../image/image_18/18_Augy_5.jpg","../image/image_18/18_Augy_6.jpg","../image/image_18/18_Augy_7.jpg","../image/image_18/18_Augy_8.jpg","../image/image_18/18_Augy_9.jpg"]},"Consult_chateau_formulairee543":{"id":"Consult_chateau_formulairee543","dept":"18","canton":"Mehun-sur-Yèvre","commune":"Méreau","nom":"Autry","type":"Château","periode":"XIV-XV-XIX","histoire":"Plusieurs châteaux à Méreau , dont le château d'Autry, de La Motte du XVe siècle chambre d'hôtes, de Chevilly,  de la Ferrière et de Ponthereau et  Latour .                                                                                                    AUTRY, depuis 1380  l'alliance que Robert d'Étampes, sieur de Salbris, Valençay et Ardreloup, contracta en 1448 avec une jeune châtelaine du pays de Lury Marguerite de Beauvilliers, fit entrer dans la maison d'Étampes la terre d'Autry, destinée à y rester près de quatre cents ans. \r\nMonsieur Vallet propriétaire.                                                                                                              Le BRIOU d'AUTRY manoir du XIXe siècle transformé en chambres d'hôtes","architecture":"AUTRY du XVe siècle, XVIIIe siècle et XIXe siècle. Les façades, côtés et toitures du château dAutry, il fut certainement remanié plusieurs fois depuis sa construction. Certaines élévations de lignes, quelques dissemblances dans les ailes et la présence dans les combles de l'aile nord d'un ancien mur pignon, témoignent des reprises successives. L'ensemble de l'édifice a été remanié au XVIIIe siècle. Les bâtiments d'exploitation, élevés dans l'avant-cour à l'est, datent des XVIIIe et XIXe siècles. L'édifice se présente comme un grand corps de bâtiment rectangulaire formant les trois côtés d'une cour à l'angle desquels sont accolées deux tourelles circulaires. Deux tourelles carrées, également en saillie, flanquent les angles de la façade postérieure.                                                                                                                Le manoir de BRIOU d'AUTRY a brûlé en avril 2003 mais a été reconstruit  est habitable depuis le 4 juillet 2009. On peut admirer la façade du château et ses douves, classés à l'inventaire des M.H.\r\nCHEVILLY du XVe siècle, XVIe siècle et XVIIe siècle. Les façades, côtés et toitures du château de Chevilly et de ses communs, y compris le pigeonnier et le moulin du XVIIe siècle, sont inscrits sur linventaire supplémentaire des M.H. par l'arrêté du 6 juin 1977.","habitants":"Seigneurs locaux\r\n        \"","divers":"Autry grav 1-2: 47° 11' 49\" Nord - 2° 02' 25\" Est.    Briou-Autry  grav 3-4.     Chevilly Grav  6-7-8","gps":"","images":["../image/image_18/18_Autry_1.jpg","../image/image_18/18_Autry_2.jpg","../image/image_18/18_Autry_3.jpg","../image/image_18/18_Autry_4.jpg","../image/image_18/18_Autry_5.jpg","../image/image_18/18_Autry_6.jpg","../image/image_18/18_Autry_7.jpg","../image/image_18/18_Autry_8.jpg"]},"Consult_chateau_formulairedda8":{"id":"Consult_chateau_formulairedda8","dept":"18","canton":"Dun-sur-Auron","commune":"Bannegon","nom":"Bannegon","type":"Château","periode":"Ii-XIII-XIV","histoire":"BANNEGON, au XIe siècle construit par la famille de la Porte et passe à Jean de Barres en 1383 seigneurs de Cours, les Barres et de Givry. En 1516 passe par le jeu des alliances à Jacques du Mas seigneur de l'Isle sur Arnon, à sa mort sans postérité, léguera à son neveu Loys de Barres son successeur Jacques de Barres seigneur de Neuvy le Barrois et d'Apremont puis à Jean de Barres époux de l'héroïque Marie de Barbançon, leur fils  François des Barres épouse Charlotte de la Rochefoucauld, François décéde en 1588 sans postérité. Bussy-Rabutin l'a occupé pour le roi en 1552. Partiellement détruit au XVIe siècle, il a été complété par un corps de bâtiment de style début Renaissance. Ayant pris le parti de la Réforme, Marie de Brabançois, alors dame de Bannegon, prit la défense du château lors d'un siège de quinze jours, tenu par le gouverneur du Bourbonnais, M. de Montaré. La veuve de François remet le château à son père, puis à sa mère  Françoise de Chabot. En 1633 François de Brichanteau hérite de Bannegon qui restera dans les mains des descendants jusqu'en 1742 qui sera vendu à Gabriel de Bonneval. A la Révolution vendu comme bien national racheté en 1806 par Philippe-Armand de Bonneval qui le cède à Claude-Marguerite Martin de Marolles épouse divorcée d'un sieur du Peyroux. Sa fille Eléonore épouse en 1807 Claude de Bengy, vicomte des Porches\r\nleur fils unique meurt jeune, laissant trois enfants de son mariage avec mademoiselle du Hamel de Fougeroux, après elle Bannegon ne sera guère habité. En 1988  Yves de Bengy de Puyvallée héritier par sa mère, meurt accidentellement, sa veuve  et ses enfants poursuivent les travaux de restauration.","architecture":"BANNEGON est une forteresse féodale du XII et XIIIe siècle est entièrement ceinturée de douves alimentées par lAuron. Elle a été édifiée sur un site défensif existant déjà au XIe siècle. Il comporte un imposant donjon à pont-levis, et une enceinte fortifiée trapézoïdale bordant la rivière l'Auron, flanqué de trois tours d'angles cylindriques. La grosse tour, dite des Barres, date du XIIIe ou début XIVe siècle et possède une cheminée de 9,5 m de hauteur et présente deux niveaux percés d'archères et un étage en surplomb  avec mâchicoulis, une haute tour  d'escalier s'y adosse. A l'angle opposé, une tour à usage de colombier a toit conique avec lanternon. En fond de cour  le corps de logis dont les façades possèdent des fenêtres à meneaux s'articule sur une aile en retour. L'ensemble est desservi par deux tours  d'escalier carrées dont l'une est accostée d'une tourelle en encorbellement.  Le château de Bannegon est classé au M.H. depuis 1936.   Les propriétaires actuels héritent du château en 1988 et créent une association (Bannegon Millénaire) dont la vocation est de restaurer le château. En 1996, ils créent les \"Médiévales de Bannegon\" qui ont lieu chaque année en fin de semaine la plus proche du 15 août.","habitants":"Famille de Jean de Barres\r\n        \"","divers":"Château de Bannegon 46° 48' 07\" Nord et 2° 42' 49\" Est","gps":"","images":["../image/image_18/18_Bannegon_1.jpg","../image/image_18/18_Bannegon_2.jpg","../image/image_18/18_Bannegon_3.jpg","../image/image_18/18_Bannegon_4.jpg","../image/image_18/18_Bannegon_5.jpg","../image/image_18/18_Bannegon_6.jpg"]},"Consult_chateau_formulaire34cb":{"id":"Consult_chateau_formulaire34cb","dept":"18","canton":"Sancerre","commune":"Sens-Beaujeu","nom":"Beaujeu_Sens","type":"Château","periode":"XVI-XVIII","histoire":"BEAUJEU, a été édifié en 1566 pour Jean du Mesnil-Simon, comme l'atteste une pierre sculptée conservée dans la cave du château. Nul ne sait pourquoi les Du-Ménil-Simon abandonnèrent lancienne demeure et firent construire le nouveau Beaujeu.  Ce commanditaire, descendant par alliance de l`illustre famille de Seuly, abandonna ainsi l'ancienne demeure seigneuriale, attestée au XIIIe siècle et située sur la paroisse de Neuilly en Sancerre pour s'installer au bord de la rivière de la Sauldre, sur la paroisse de Sens. Après avoir appartenu à la famille de Bouthillier de Chavigny comte des Adhémar, le château est racheté en 1809 par Pierre-Maurice de Pommereau qui entreprend une reprise complète du château sur le fronton de la façade ouest sont gravées les initiales P M et la date 1811. Son fils, Marcellin, gendre du comte de Chabrol Crousol, ministre de la marine puis des Finances de Charles X, en achèvera l'embellissement, renferme une énigme. Le village de Sens-Beaujeu est marqué par des affaires de sorcellerie. Au Moyen Age, un procès pour hérésie eut lieu dans le château de Sens-Beaujeu où plusieurs villageois et leurs familles furent accusés de sorcellerie, torturés, soumis à la question, puis ils furent brûlés vifs, sur la place publique, devant les habitants de Sens-Beaujeu.","architecture":"BEAUJEU, longues bâtisse régulière entre deux grosses tours rondes en saillie par rapport à la façade sud  sur l'autre part par deux ailes en retour d'équerres. Les soubassements du logis seigneurial ont été en partie conservés et deux tours ont été préservées. La reprise des façades et son aménagement intérieur d'un style néo-classique, ont transformé l'édifice d'allure médiévale en une résidence représentative de l'époque de la Restauration. Quant aux communs, si le colombier date du XVIe siècle, les bâtiments qui l'entourent ont été  reconstruits à la fin du XVIIIe siècle ou au début du XIXe siècle :  l'ensemble, très homogène, séduit par ses chaînages alternant le grès noir et le calcaire. Le donjon est de style roman et date du XIIe siècle. Il représente le dernier vestige des seigneurs de Beaujeu. L'escalier est implanté dans le corps de logis central, à la jonction de l'aile nord-est ; les communs, construits sur un plan symétrique de part et d'autre d'une cour centrale, ont des chaines d'angle et des encadrements de baies en pierre de taille alternant calcaire et grès noir ; les toits sont couverts en tuile, ceux du château sont couverts en ardoise ; un lanterneau a été placé au sommet du toit conique du colombier.","habitants":"Famille de Jean du Mesnil-Simon\r\n        \"","divers":"Beaujeau  47° 30' 18\" Nord et 5° 40' 38\" Est","gps":"","images":["../image/image_18/18_Beaujeu_Sens_1.jpg","../image/image_18/18_Beaujeu_Sens_2.jpg","../image/image_18/18_Beaujeu_Sens_3.jpg","../image/image_18/18_Beaujeu_Sens_4.jpg","../image/image_18/18_Beaujeu_Sens_5.jpg"]},"Consult_chateau_formulairecaaa":{"id":"Consult_chateau_formulairecaaa","dept":"18","canton":"Vierzon","commune":"Saint-Hilaire de Court","nom":"Beuvrière","type":"Château","periode":"XV","histoire":"Deux châteaux à St-Hilaire de Court celui de Beuvrière et Chaponnière.                                                  BEUVRIERE, fief protestant, la Beuvrière fut en partie détruite au cour des guerres de religions. Reconstruit à la Renaissance  au XVe siècle. Acquis et restauré en 1655 par Jacques de la Fond,  conseiller du roi il revient en 1827 au marquis de Monspey, ancêtre de l'actuel propriétaire. Transmis par héritage, depuis 1827 il appartient à la famille de l'actuelle propriétaire. Aujourd'hui hôtel restaurant de Arnaud et Chantal de Brach                                                                               CHAPONNIERE, pas d'information historique.","architecture":"BEUVRIERE, construit au XIe siècle, connu dès le XIIe siècle. Il fut rebâti en partie aux XVe, XVIIe, et XVIIIe siècles.  Il a été restauré au XIXe siècle. l'édifice dont le corps de logis de plan rectangulaire a deux niveaux  toit à deux pans entre une tour ronde toit en poivrière et un pavillon carré à l'opposé,  attiques sur comble côté extérieur et lucarnes côté cour flanqué d'une tourelle à quatre niveaux toit en poivrière sur mâchicoulis, a conservé ses arcades supportant une terrasse et une tourelle octogonale ancienne isolé dans la cour . C'est devenu un bel hôtel 2 étoiles.       CHAPONNIERE , corps de logis de plan rectangulaire à deux niveaux pavillons d'entrée saillant en façade sur trois travées donjon de trois étages sur angles toit à l'impérial et à l'opposé édifice attenant d'un étage.","habitants":"Famille de  Jacques de la Fond\r\n        \"","divers":"Beuvriere  47° 12' 27\" nord, 2° 01' 25\" est.     Chaponnière grav  5-6","gps":"","images":["../image/image_18/18_Beuvri%c3%a8re_1.jpg","../image/image_18/18_Beuvri%c3%a8re_2.jpg","../image/image_18/18_Beuvri%c3%a8re_3.jpg","../image/image_18/18_Beuvri%c3%a8re_4.jpg","../image/image_18/18_Beuvri%c3%a8re_5.jpg","../image/image_18/18_Beuvri%c3%a8re_6.jpg"]},"Consult_chateau_formulairee5bf":{"id":"Consult_chateau_formulairee5bf","dept":"18","canton":"Trouy","commune":"Vallenay","nom":"Bigny","type":"Maison forte","periode":"XVI","histoire":"BIGNY,  sa construction date du XVIe au XVIIIe siècle,  La seigneurie relevait d'Orval.  Le Château de Bigny est inscrit aux M.H. depuis 1981.","architecture":"BIGNY,  ce château était un ensemble fortifié au XVIe siècle, subsiste trois corps de bâtiment, le premier, au nord, se termine par une aile en retour d'équerre avec tourelle d'angle, cette aile se poursuit par un bâtiment plus haut, à deux étages, percé au-dessus des combles de meurtrières du XVIe siècle, sans doute réalisées à l'époque des guerres de Religion. Cette aile se poursuit elle-même par un bâtiment formant angle. Au nord-ouest du château se trouve le bâtiment de ferme.","habitants":"Seigneur d'Orval\r\n        \"","divers":"Bigny 46° 48' 08\" Nord et 2° 22' 19\" Est","gps":"","images":["../image/image_18/18_Bigny_1.jpg","../image/image_18/18_Bigny_2.jpg","../image/image_18/18_Bigny_3.jpg"]},"Consult_chateau_formulaireaca8":{"id":"Consult_chateau_formulaireaca8","dept":"18","canton":"Avord","commune":"Lugny-Champagne","nom":"Billeron_Jalognes","type":"Château","periode":"XVIII","histoire":"BILLERON, la construction du château de Billeron et de ses dépendances date de la seconde moitié du XVIIIe siècle. Une chapelle fut élevée durant la seconde moitié du XIXe siècle, dans un parc de 11 hectares et accompagné de communs. Le château de Billeron ouvre ses portes exceptionnellement aux 2 Journées du Patrimoine le 3ème W.E. de Septembre.","architecture":"BILLERON est mentionné à la fin du XIIe siècle. L'édifice fut construit à la fin du XVIIIe siècle et comprend un corps de logis rectangulaire avec deux  pavillons saillant, un niveau de soubassement et un étage dont l'accès se fait par un perron, fronton sur toit avec lucarnes. Devant le corps de logis, au sud, s'étend une cour fermée par une demi-lune cantonnée par deux tours circulaires. Cet espace se prolonge par une seconde cour bordée par des bâtiments de communs datant des XVIIIe et XIXe siècles. Au sud-ouest du corps de logis se trouve une chapelle de style néo-gothique, construite vers 1895 par l'architecte Tarlier.","habitants":"TARLIER Henri (architecte)\r\n        \"","divers":"Billeron 47° 11' 13\" Nord, 2° 49' 21\" Est","gps":"","images":["../image/image_18/18_Billeron_Jalonges_1.jpg","../image/image_18/18_Billeron_Jalonges_2.jpg","../image/image_18/18_Billeron_Jalonges_3.jpg"]},"Consult_chateau_formulaire8437":{"id":"Consult_chateau_formulaire8437","dept":"18","canton":"Aubigny sur Nère","commune":"Blancafort","nom":"Blancafort","type":"Château","periode":"XI-XV","histoire":"Deux châteaux à Blancafort dont celui de Blancafort et celui de l'Hospital de Fresne.                                          BLANCAFORT, maison forte  édifiée au XVe siècle par les Boucard, en 1350 Jean de Boucard devient seigneur de Blancafort par l'alliance  d'Agnès  fille de Guillaume de Blancafort, a été construit après 1475 et, fut achevé, au début du XVIe siècle, pour François de Boucard et son épouse Marguerite de Cugnac,  puis sera transformée, au XVIIe siècle, par la famille de Faucon. Claude  de Faucon construit des pavillons. En 1781 les Allemand de Concressault descendants des Faucon le  vendent  au comte de Durranti,  il projette la destruction complète du monument pour le reconstruire. Cinq propriétaires se succèdent entre 1920 à  1963, le château est racheté par la baronne de Cramer, qui fit entreprendre une importante restauration du château, et le lèguera , 20 ans plus tard, à son petit-fils, le comte Alban de Montjou, décorateur à Paris, pour ses 18 ans. Ce dernier s'emploiera à continuer de faire vivre le château en l'ouvrant à la visite, en créant des salles de réceptions et en proposant le château comme lieu de tournage de films. Le château de Blancafort est inscrit aux M.H. depuis 1926.    toujours dans la famille Cramer.            HOSPITAL de FRESNE,  commanderie de Templiers édifiée au milieu du XIIe siècle à 1312 ; devient commanderie de Malte de 1313 au quatrième quart du XVIIIe siècle ; actuellement devenue château. Le logis a été reconstruit et fortifié en 1469 pour Jean de Bridiers, commandeur.","architecture":"BLANCAFORT, un précédent château devait se trouver plus au sud de l'actuel, près de la Sauldre. Des traces d'anciennes tranchées sont encore visibles aujourd'hui. Ce précédent château était très certainement entouré de douves pleines en eau. Dans son bel appareillage de briques roses, cette maison forte, entourée par un parc et un jardin à la française. l'édifice autour d'une cour rectangulaire fermée flanqué de tours rondes et carrées aux angles, corps de logis cantonnée à l'arrière de deux tours en fer à cheval rectangulaire à deux niveaux , l'entrée se fait à l'ouest  par un pont-levis, s'ouvrant  dans un pavillon d'entrée couronné d'un curieux pignon à redan et que flanque à gauche un donjon coiffé en pavillon planté de biais par rapport à l'entrée.  Le pignon de l'entrée primitive de la façade ouest a été transformé en pignon à pas-de-moineaux. Transformée au XVIIe siècle, Blancafort pendant la seconde guerre mondiale, le monument a été occupé par les allemands qui ont presque entièrement détruit le chartrier du château.            HOSPITAL DE FRESNE  le fossé, le pont-levis et les dépendances ont été détruits à la fin du XVIIIe siècle ; restauration importante au milieu du XIXe siècle. Le moulin a été édifié vers 1766 ; un bâtiment a été accolé au XXe siècle au mur sud de l'église.","habitants":"Famille de Boucard\r\n        \"","divers":"Blancafort : 47° 31' 54\" Nord et 2° 32' 03\" Est L'hospital grav 7","gps":"","images":["../image/image_18/18_Blancafort_1.jpg","../image/image_18/18_Blancafort_2.jpg","../image/image_18/18_Blancafort_3.jpg","../image/image_18/18_Blancafort_4.jpg","../image/image_18/18_Blancafort_5.jpg","../image/image_18/18_Blancafort_6.jpg","../image/image_18/18_Blancafort_7.jpg"]},"Consult_chateau_formulaire98ec":{"id":"Consult_chateau_formulaire98ec","dept":"18","canton":"La Guerche-sur-l","commune":"Blet-Lantan","nom":"Blet_Chaume","type":"Château","periode":"XV-XVI-XVIII","histoire":"Château de Blet à Blet et le  château de Chaume et de Sangleton  à Lantan à cinq kilomètres au nord-ouest.    BLET, est une seigneurie du Moyen-Age ayant appartenu à une branche cadette de la maison de Sully, dont Alix, dame de Blet en 1399, épouse de Philibert de Thianges, seigneur de Creuzet en 1407. Au XVIe siècle, elle appartient aux Saint Quintin puis passe par mariage aux Simiane au XVIIe siècle, aux Malon de Bercy au XVIIIe siècle enfin par mariage aux Nicolay au XIXe siècle. En 1860 le marquis Aymard-Marie de Nicolay, dernier propriétaire du château de Bercy, y transféra la partie de son mobilier qu'il n'avait pas vendue. On y trouve une petite chapelle ; au plafond dune des tours sont peints les blasons et initiales de chaque nom de famille qui a vécu dans le château de Blet. Aujourd'hui chambres d'hôtes par Michel Bibanow.                                                        CHAUME, la construction du château de la Chaume a débuté au XVIIe et s'est achevée au XIXe siècle. En 1635, mention du fief de la chaume ; sur le plan cadastral de 1831 le plan masse de l'ancien château à cour fermée avec tours d'enceinte est encore visible mais en 1862 une nouvelle demeure est construite pour M. Guillebon à l'emplacement de l'ancien château.","architecture":"BLET, la construction  date des XVe et XIXe siècles. De style Renaissance édifice en équerre deux corps de logis à deux et trois niveaux série de lucarnes sur l'ensemble flanqué au angle de tours rondes à toit  en poivrières et d'un pavillon carré à quatre étages  toit à quatre pans sur mâchicoulis.                             CHAUME, le nouveau château construit  au 1er quart du XXe siècle, 2 ailes sont ajoutées au corps central du logis, des écuries et une maison de garde sont construites au sud en bordure de la nouvelle route de Bussy à Lantan, corps de logis rectangulaire à deux niveaux inséré entre deux pavillons carrées  toit carrée et série de  hublot et une  lucarne centrale à aileron  et fronton arrondie, deux ailes en retour d'équerre sur cour à deux niveaux la premier étage à colombage.  SANGLETON,  de plan rectangulaire sur soubassement à deux niveaux et série de lucarnes en comble, flanqué aux extrémités de deux pavillons légèrement saillants et sur leurs flancs accolés d'une dépendance  à un niveau","habitants":"Blet ; Famille de Philibert de Thianges               Chaume ; M. Guillebon \r\n        \r\n        \"","divers":"Blet  46° 53' 46\" nord, 2° 43' 56\" est  46° 53' 45,52\" Nord et 2° 43' 52,95\" Est                                             Chaume 46° 54' 27\" Nord et 2° 39' 46\" Est grav 7   Sangleton grav 8","gps":"","images":["../image/image_18/18_Blet_Chaume_1.jpg","../image/image_18/18_Blet_Chaume_2.jpg","../image/image_18/18_Blet_Chaume_3.jpg","../image/image_18/18_Blet_Chaume_4.jpg","../image/image_18/18_Blet_Chaume_5.jpg","../image/image_18/18_Blet_Chaume_6.jpg","../image/image_18/18_Blet_Chaume_7.jpg","../image/image_18/18_Blet_Chaume_8.jpg"]},"Consult_chateau_formulaired596":{"id":"Consult_chateau_formulaired596","dept":"18","canton":"St-Martin-d","commune":"Vignoux sur Barangeon","nom":"Blosset","type":"Château","periode":"XIVXVI","histoire":"BLOSSET, le premier propriétaire fut le marquis Paul de Blosset, au milieu du XVIe siècle, la seigneurie est détenue par la famille Fumé, dont l'un des membres avait été premier médecin de Charles VII, dès 1631, la seigneurie est entrée dans le patrimoine de la famille Fradet de Saint-Aout appartenant au proche entourage des princes de Condé. Jean Fradet, lieutenant de la Grosse-Tour de Bourges se verra élevé au rang de baron de Bourdeille. Son fils Louis-Armand accèdera pour sa part à la prestigieuse charge de Lieutenant général du Berry avant de succomber en 1675 durant les guerres de Hollande. En 1739, Bourdeille passe à Claude-Gabrielle de Champagneux, une femme de tête qui, mal mariée à un trésorier receveur général dont l'impéritie était notoire, mit en valeur la baronnie afin d'assurer l'avenir de sa fille. C'est à elle et à son gendre Blosset que nous devons ce qu'est le château aujourd'hui. Si le domaine n'eut guère à souffrir de la Révolution et qu'au début du XIXe siècle le préfet Barral pouvait encore écrire que le Blosset était « la plus belle propriété du département du Cher », les décennies qui suivirent virent un réel déclin du site. Après une reprise en main opérée à la Restauration par le petit neveu de Paul de Blosset, le comte Philibert d'Estut d'Assay, l'ancien marquisat fut démembré et le château vendu séparément en 1843 à la comtesse de Villemotte, la plupart des infrastructures actuelles du village,  église, mairie. Transformé en hôpital militaire pendant la guerre de 1870.","architecture":"BLOSSET, est élevé sur l'emplacement du siège de l'ancienne seigneurie de Bourdeille mentionné pour la première fois en 1398. Dès cette époque, il semble que le site ait été occupé par une maison forte qui  contrôlait le franchissement du Barangeon  positionnée à la frontière des importants fiefs qu'étaient alors Vierzon et Mehun-sur-Yèvre. Jusqu'alors, il s'agissait d'un grand manoir en U, marqué par son origine féodale, entouré de douves en eau, cantonné de quatre tours rondes et assailli d'un ensemble de bâtiments rustiques et disparates formant, au Sud et à l'Est, la basse cour. Une première campagne de modification a sans doute été initiée par Madame de Champagneux dans les années 1750-1760 mais c'est à l'actif de Paul de Blosset, ministre plénipotentiaire de Louis XV à Londres ou il succèdera au Chevalier d'Eon, puis ambassadeur au Danemark et au Portugal, qu'il faut mettre l'essentiel de la modernisation radicale que connut alors le château. Ces travaux grandioses terminés, Paul de Blosset délaisse alors le vieux château-fort de Certaines  où résidait principalement son père, et cède ses fiefs nivernais à son cousin Pierre-Constant, marquis de Certaines de Villemolin. \r\n Les propriétaires actuels monsieur et madame Jean-Jacques Morlon.","habitants":"Famille Fradet de Saint-Aout\r\n        \"","divers":"Blosset : 47° 12' 20\" Nord et 2° 10' 31\" Est","gps":"","images":["../image/image_18/18_Blosset_1.jpg","../image/image_18/18_Blosset_2.jpg"]},"Consult_chateau_formulaire1e69":{"id":"Consult_chateau_formulaire1e69","dept":"18","canton":"Avord","commune":"Farges en Septaine","nom":"Bois_Bouzon","type":"Château","periode":"XVII","histoire":"BOIS-BOUZON, a été construit par l'architecte Berruyer Jean Lejuge, maître d'oeuvre de la famille de Condé et de la ville de Bourges, pour le parlementaire parisien André Lefebvre d'Eaubonne, qui venait de s'installer en Berry. La demeure a été édifiée à l'époque de Louis XIII. Cette demeure seigneuriale appartenait à Artault Trousseau. Le château de Bois-Bouzon est classé aux M.H. depuis 1924 et 1931. Propriété de mademoiselle Choulot.                              Maison forte d'AUGY pas d'information historique.","architecture":"BOIS-BOUZON, sa construction débuta au XIVe au XVe siècle, elle se compose d'un pavillon avec un rez-de-chaussée élevé d'un étage surmonté d'un comble percé de lucarnes de pierre. La façade est en moellons enduits. Les fenêtres sont en pierre de taille surmontées d'un fronton  cintré dans lequel sont placées des clefs saillantes. Du côté de la façade principale se trouve une avant cour bordée de chaque côté de communs datant de la même époque, cette cour est fermée par une porte cochère en pierre de taille munie d'un fronton. Contre cette porte est accolée une poterne. A l'intérieur, le rez-de-chaussée conserve deux pièces ornées de boiseries. Le corps de logis sélève au fond dune cour dhonneur ouverte sur lallée par un portail surmonté dun fronton auquel est accolée la porte cavalière. Loriginalité architecturale de la façade de pure facture classique, réside dans lasymétrie de son ordonnancement et dans la décoration des linteaux bordés de claveaux à bossages chanfreinés et munis de clés saillantes, marque de larchitecte Jean Lejuge qui utilisa le même élément décoratif au château de Jussy-Champagne tout proche. La justesse de ses proportions, léquilibre de ses lignes et la sobriété du décor qui la composent, font de cette façade un remarquable exemple de larchitecture civile de la première moitié du XVIIe siècle.                                                                              Maison forte d'AUGY corps de logis rectangulaire sur soubassement a un étage série de lucarne sur comble toit en tuiles en croupes accolé d'une grosse tour ronde de deux niveaux toit en poivrière.","habitants":"Famille de mademoiselle Choulot\r\n        \"","divers":"Bois-Bouzon 47° 04' 20\" Nord et 2° 39' 44\" Est     D'Augy grav 4-5","gps":"","images":["../image/image_18/18_Bois_Bouzon_1.jpg","../image/image_18/18_Bois_Bouzon_2.jpg","../image/image_18/18_Bois_Bouzon_3.jpg","../image/image_18/18_Bois_Bouzon_4.jpg","../image/image_18/18_Bois_Bouzon_5.jpg"]},"Consult_chateau_formulaire279c":{"id":"Consult_chateau_formulaire279c","dept":"18","canton":"Trouy","commune":"Vorly","nom":"Bois_Sire_Aimé","type":"Vestiges","periode":"XV","histoire":"BOIS-SIRE-AIME,  demeure d'Agnès Sorel maîtresse deu roi Charles VII.  date du XVe au XVIe siècle. Artault Trousseau était le premier propriétaire du château de Bois-Sire-Amé, Jacquelin Trousseau, fils d'Artault Trousseau, vicomte de Bourges épousera, en juin 1447, Perrette, seule fille de Jacques Cur, grand argentier du roi Charles VII, en présence de celui-ci. La forte dot de Perrette servit en partie à améliorer et embellir le château, dans le style gothique. Ce \"Palais de campagne\", de taille considérable, est annonciateur des futurs châteaux de la Loire. Avait appartenu à Colbert  qui le dépeça des poutres, au profit de ses châteaux de Châteauneuf-sur-Cher et de Lignières que le maréchal Mac Donald, un des propriétaires suivant le réservait à ses chasses. Cet édifice mal aimé malgré son nom fut ensuite livré à des carriéristes sans scrupule qui le vendirent pierre par pierre. Cest ainsi que lon retrouve des éléments insolites dispersés dans les environs, des porches, des cheminées, vestiges de fenêtres ouvragées de lancien château.  Dans les années 1970, M et Mme Jochyms sétaient attachés à « ce site historique » dans un état déplorable. Ils restaurèrent à leurs frais la tour de défense avec laide du conseil général sans se faire trop dillusion sur les aides de lÉtat.  La consolidation du corps  de bâtiment à labandon serait encore faisable, mais cest trop lourd pour un particulier  avait regretté M. Jochyms. En 2002, un amateur éclairé, Pascal Colas sétait à son tour passionné pour ce quil considérait comme « lune des plus belles ruines de la région ». Nous avions conclu : « Aujourdhui, oublié des monuments historiques, le château risque de peu à peu disparaître ». Le naufrage continue.","architecture":"BOIS-SIRE-AIME, aujourd'hui à l'état de ruine, le château de Bois-Sir-Amé se présentait dans son état primitif comme suit : Un grand corps de logis, présentant sur la face extérieure à l'enceinte trois tours rondes et, au nord, une plus puissante tour carrée, crénelée avec mâchicoulis ; Une cour fermée par une enceinte dont le corps de logis formait un côté, avec deux tours rondes d'angle et une entrée constituée d'un pont-levis lui-même défendu par deux tours ; Le tout était entouré de profonds et larges fossés en eau.  Seule une tour qui flanquait le château au sud-est subsiste. Elevée sur plan carré, cette tour renferme, au rez-de-chaussée, la chapelle. La tour comprend deux salles superposées au-dessus de cette chapelle, et une au-dessous. La chapelle est voûtée sur croisée d'ogives. Les nervures retombent sur des culots ornés de personnages. La voûte et les murs sont ornés de fresques. Dans le mur nord, un couloir conduisait aux latrines portées en encorbellement à l'extérieur.  Le Roi Charles VII, qui déteste les villes importantes, considérait le château de Bois-Sire-Amé, comme sa garçonnière,  Il financera des travaux supplémentaires, dont les frais seront gérés par Jacques Cur. Le Roi François Ier séjourna, lui aussi, en juillet 1524 au château de Bois-Sire-Amé et fut l'auteur d'un fameux quatrain évoquant la \"Dame de beauté\" en ces lieux. Vauban est son dernier grand propriétaire connu.","habitants":"Famille d'Artault Trousseau\r\n        \"","divers":"Bois-Sire-Aimé  46° 55' 55\" Nord et 2° 28' 47\" Est","gps":"","images":["../image/image_18/18_Bois_Sire_Aim%c3%a9_1.jpg","../image/image_18/18_Bois_Sire_Aim%c3%a9_2.jpg","../image/image_18/18_Bois_Sire_Aim%c3%a9_3.jpg"]},"Consult_chateau_formulaire351f":{"id":"Consult_chateau_formulaire351f","dept":"18","canton":"Dun-sur-Auron","commune":"Coust","nom":"Bonnais","type":"Château","periode":"XV","histoire":"BONNAIS, En 1445, Pierre de Bonnay, seigneur de Précy et Bonnay épouse Jeanne de Grassay. En 1550, Gilbert de Bonay épouse Marguerite de Bar. Le dernier connu du nom à être seigneur de Bonnais est Paul, en 1613.  Cette ancienne famille, connue dans la chevalerie en 1550, et en possession dans le Bourbonnais des terres de Nereux, Chameron et Gensac s'est notamment alliée aux maisons de Bigny, de Bort, de Bonnay, de Champfeu et d'Estampes. En 1669, Jean d'Aubigny est seigneur de Bonnais et d'Alligny. L'an 1736, Bonnais voit la naissance de Jean-Claude-Gilbert d'Aubigny, qui mourra sur les Pontons de Rochefort pour avoir refusé de se soumettre à la constitution civile du clergé. De son vivant, il fut successivement vicaire à Saint-Amand Montrond, curé de Saint-Pierre-les-Bois, de Notre-Dame du Fourchaud à Bourges, puis chanoine titulaire de la Cathédrale Saint-Étienne de Bourges. Clandestinement réfugié au château de Madeau, voisin de Bonnais, on l'arrêta le 26 avril 1793 puis après avoir été écroué au couvent Saint-François de Bourges, il fut déporté le 6 mars 1794. En 1768, Antoine-François d'Aubigny est chevalier et seigneur de Bonnais. Les D'Aubigny possédèrent Bonnais jusqu'à la Révolution. Au XIXe siècle, Bernard Rey, membre du conseil est propriétaire du château.","architecture":"BONNAIS,  date du XVe siècle, bâti sur le plan d'un carré, et compte six tours dont quatre tours d'angle, l'une abritant un pigeonnier. Au milieu de la façade vue de l'intérieur de la cour, l'escalier d'honneur est abrité par une tour de forme octogonale ramenée au carré dans sa partie haute par des encorbellements, on retrouve ce modèle notamment aux châteaux de Gien et Jallanges. L'accès aux étages supérieurs de cette dernière se fait par une tourelle ronde reposant sur des culs-de-lampe en doucine. On note un portail à cintre de style Louis XIV et attribué au XVIIe siècle à l'ouest. Le ruisseau du Chignon prend sa source dans les douves de l'édifice, qu'il alimentait, de même que les douves du vieux castel de Saint-Amand-Montrond. \r\nUne aile du château abrite aujourd'hui un gîte rural. \r\nLe château du Creuzet et son hameau, inscrits aux M.H. depuis le 14 janvier 2014.","habitants":"Famille de Pierre de Bonnay\r\n        \"","divers":"Bonnais  46° 41' 51\" Nord et 2° 36' 11\" Est","gps":"","images":["../image/image_18/18_Bonnais_1.jpg","../image/image_18/18_Bonnais_2.jpg","../image/image_18/18_Bonnais_3.jpg"]},"Consult_chateau_formulaire66b7":{"id":"Consult_chateau_formulaire66b7","dept":"18","canton":"Sancerre","commune":"Noyer-Vailly sur sauldre","nom":"Boucard","type":"Château","periode":"XIV-XV","histoire":"BOUCARD,  la seigneurie s'appelait la Motte du Plessis  lorsque qu'elle fut acquise en 1381 par Lancelot de Boucard aujourd'hui est dû, à Antoine de Boucard, gentilhomme de la maison de François Ier, combattant des guerres d'Italie. L'un de ses descendants, François de Boucard, fit élever l'aile en 1560. De 1671 à 1674, Louis XIV assigne Philippe de Montaut-Bénac de Navailles, à résidence à Boucard. Ce dernier ouvre la cour sur la Sauldre et aménage le premier étage de l'aile Nord. Le fermier général Étienne Perrinet de Jars qui devint propriétaire du château en 1760. La petite fille  de Perrinet de Jars  Marie-Louise apporte par son mariage au marquis de Longeron, la fille cadette de ce mariage épouse en 1779 Charles Damas d'Antigny, divorcé en 1812 le couple aura une fille Zéphirine  qui s'allie  au comte de Vogüé puis au marquis de Chastellux. Boucard passe à la duchesse de Damas marié au prince de la Trémoille, à sa mort le château passe à son neveu Léonce de Vogüé qui le transmet à sa fille comtesse  de Charles-Auguste de Bryas, descendant de la famille de Vogüé. Son épouse, Hélène de Bryas (née de La Rochefoucauld) redécouvre le château qui menacent de tomber en ruines, et le fait restaurer, pour rendre le domaine habitable. La famille y séjournera durant la seconde guerre mondiale. En 1960, le château revint à son actuelle propriétaire, Marie-Henriette de Montabert, fille d'Hélène de Brias, en 1965. Le château de Boucard, ainsi que ses dépendances, les parcs et jardins, les douves, canaux et ponts sont classés aux M.H. depuis le 10/07/1995. La propriétaire actuelle du château Boucard est Mme Marie-Henriette de Montabert.","architecture":"BOUCARD, le château se présente comme un trapéze, avec trois corps de logis, comportant au levant un corps de bâtiment dont le centre est occupé par un châtelet d'entrée, cantonné de jolies tourelles de Brique en encorbellement. En retour, deux bâtiments  au nord et au sud bordent la cour dont les angles sont flanqués de tours cylindriques. Au XVIe siècle reconstruction de la partie sud du corps de logis oriental, les deux façades sont percées d'ouvertures encadrées de pilastres et une corniche à modillons court à la base du toit du logis de la tour  qui lui fait suite. A la Renaissance Antoine de Boucard   qui édifia vers 1520, dans le style de la première Renaissance, un logis neuf dans l'angle sud de la cour, augmente le châtelet d'entrée d'un avant corps et fait reconstruire l'aile nord achevée en 1560, le corps de logis coiffé d'un comble en pavillon est éclairé à l'étage par des croisées alternant avec des demi-croisées, au rez-de-chaussée par de petites croisées encadrant des portes à l'italienne. Cinq bandeaux plats horizontaux et par de larges trumeaux ornés de tables à l'antique.   Au début du XVIe siècle remaniement du corps de logis central Au milieu du XVIIIe siècle, le plan des jardins fut donné par Dosmont, élève de l'architecte du roi Jean-Michel Chevotet, pour le fermier général Etienne Perrinet de Jars.","habitants":"Famille Boucard.\r\n        \"","divers":"Boucard 47° 21' 02\" Nord et 2° 40' 54\" Est","gps":"","images":["../image/image_18/18_Boucard_1.jpg","../image/image_18/18_Boucard_2.jpg","../image/image_18/18_Boucard_3.jpg","../image/image_18/18_Boucard_4.jpg"]},"Consult_chateau_formulaire0914":{"id":"Consult_chateau_formulaire0914","dept":"18","canton":"Bourges","commune":"Bourges","nom":"Bourges_Chateaux","type":"Château","periode":"XV-XVI-XVIII","histoire":"BOURGES, un château bâti rue de la Vernusse à Bourges,  celui de Jacques Coeur au centre( voir article)  et Chappe, Cujas  de Lazenay   CHAPPE,  la terre relevait de la seigneurie de Maubranches-Villemenard.  Le château de Chappe vous propose ses chambres d'hôtes et sert aussi de salle de réception pour des événements privés.                             LAZENAY, exemple rare à Bourges d'architecture civile de la fin du XIIIe siècle ou du XIVe siècle. La construction du corps d'entrée, seul élément subsistant du domaine avec un château reconstruit vers 1876 à l'emplacement d'un corps de logis élevé vers 1500 par Guillaume Compaing, peut être attribuée à un riche bourgeois de Bourges, Robert de Clamecy. En 1574, le château devint la maison des champs du collège de Jésuites de Bourges et le resta jusqu'à la Révolution, époque à laquelle il fut vendu comme bien national. Au début du XXe siècle, il servit de maison de campagne à des séminaristes.                                      PLANETTE, occupant un bâtiment du XVIIIe siècle doté d'un mobilier d'époque, l'hôtel de Planette . Un château en Ville est entouré d'un jardin de 600 m². Il s'agit de l'ancien domaine du roi Charles V d'Espagne lors de son exil.","architecture":"CHAPPE,  le corps de logis du manoir a été construit entre 1556 et 1584. L'existence d'une motte témoigne de la permanence d'un habitat seigneurial sur le site, château composé du corps de logis principal,  du pavillon, les structures anciennes d'une maison forte, dont les tours d'angle du château actuel sont les vestiges, servirent de base à la construction de l'hôtel du XVIe siècle, est inscrit aux M.H. en 2008.  Après les guerres de Religion, les bâtiments furent restaurés aux XVIIe et XVIIIe siècles. Le château a conservé le plan habituel d'un manoir médiéval, en forme de quadrilatère fermé, défendu par des tours aux angles de la cour autour de laquelle se répartissaient les bâtiments de service. Un jardin clos aux murs agrémentés de tourelles, descendait vers la rivière. Les bâtiments agricoles étaient regroupés dans deux cours situées de part et d'autre du manoir. Ce manoir est très représentatif de l'évolution d'une petite seigneurie rurale implantée aux portes de la ville.   \r\nLAZENAY, de plan rectangulaire, le corps d'entrée se compose d'un porche d'entrée carré et d'un bâtiment rectangulaire flanqué, au sud, d'une abside pour le four.","habitants":"Chappe, Maubranches-Villemenard                            Lazenay Guillaume Compaing\r\n        \r\n        \"","divers":"A Bourges Chappe   grav 1 à 3                                     Lazenay grav-4                                                             Planette grav 5-6","gps":"","images":["../image/image_18/18_Bourges_Chateaux_1.jpg","../image/image_18/18_Bourges_Chateaux_2.jpg","../image/image_18/18_Bourges_Chateaux_3.jpg","../image/image_18/18_Bourges_Chateaux_4.jpg","../image/image_18/18_Bourges_Chateaux_5.jpg","../image/image_18/18_Bourges_Chateaux_6.jpg","../image/image_18/18_Bourges_Chateaux_7.jpg","../image/image_18/18_Bourges_Chateaux_8.jpg"]},"Consult_chateau_formulaire99f2":{"id":"Consult_chateau_formulaire99f2","dept":"18","canton":"Bourges","commune":"Bourges","nom":"Bourges_Patrimoine","type":"Patrimoine","periode":"XVI","histoire":"Patrimoine de Bourges.                                      CUJAS, propriété de la ville, l'hôtel, qui porte couramment le nom du jurisconsulte Jacques Cujas propriétaire en 1585, fut construit pour Durand Salvi, marchand italien installé à Bourges, peut-être par le maître maçon Guillaume Pelvoysin. L'hôtel abrite depuis 1892 le musée du Berry.                         ECHEVINS, dit hôtel construit après le grand incendie de Bourges de 1489 à 1490 par Jacquet de Persigny et Jacquet Gendre et agrandi au début du XVIIe siècle, l'édifice abrita le siège de l'assemblée des Échevins, qui le délaissèrent pour le palais Jacques-Cur, plus spacieux, vers 1682. Il devient alors le petit collège jésuite, lesquels l'occupèrent jusqu'en 1762. Vendu comme bien national à la Révolution, il reçoit l'école normale en 1833 et devient le Petit Lycée qui dépendra plus tard du lycée du nom d'un de ses anciens élèves, Alain-Fournier. Édouard Branly y enseigna.                                                     LALLEMANT, déjà en 1467, Jean Lallemant le père achète une parcelle de terrain rue Narette (qui devient la rue des vielles prisons, actuellement rue de l'hôtel Lallemant). Cette parcelle correspond à l'actuelle cour intérieure. Après l'incendie de juillet 1487, il achète un terrain,  l'hôtel est demeuré dans la famille Lallemant jusqu'au milieu du XVIIe siècle. Il passe à Anne Lallemant, fille unique d'Étienne, qui fut  épouse de Gaston Viole seigneur d'Andrezel, puis en 1651 à Pierre Barjon, secrétaire du prince de Condé. Marie Barjon, probablement sa fille, épouse un Jacques d'Orsanne qui met ses armes en plusieurs points du bâtiment.  Passé aux Gamaches et aux Lemoyne, l'hôtel devient collège de garçons avant d'être vendu à la ville de Bourges par un grammairien nommé Pierre-Constance Séguin en 1826.","architecture":"CUJAS, architecture atypique qui vaut le coup d'oeil tant à l'extérieur qu'à l'intérieur, où l'on peut découvrir un  espace d'accueil, une cheminée monumentale. ECHEVINS, est constitué d'un corps de logis, flanqué d'une tour-escalier. Comme nombre des hôtels particuliers de la ville, l'édifice fut construit à cheval sur les remparts gallo-romains. C'est à l'architecte Jehan Lejuge que l'on doit la galerie perpendiculaire, construite dans le style Renaissance en 1624   LALLEMANT, hôtel consiste en deux corps de logis principaux, est bâti en partie sur les restes du rempart gallo-romain de la ville, plus haut. À cause de cette position, il y a deux cours : une cour haute et la cour basse, séparées par un muret et un petit escalier à quelques marches. Les intérieurs communiquent par un passage incliné. Le décor Renaissance de la cour haute est probablement luvre dune équipe dartistes italiens : en témoignent les médaillons en terre cuite, balustres et coquilles encadrant les fenêtres de la tourelle, le belvédère couronnant la tour descalier. De ces médaillons circulaires incrustés contenant des figures en terre cuite sur fond de coquille, il en reste que quatre, deux dhommes et deux de femmes. Lentrée actuelle de lhôtel Lallemant et du musée des arts décoratifs se trouve rue de Hôtel-Lallemant. À lorigine, lentrée principale était la grande porte à côté  Il est musée  à partir de 1951. L'Hôtel Lallemant est classé M.H. en 1840.","habitants":"Jacques Cujas    Echevins Jacquet de Persigny        Famille Lallemant \r\n        \r\n        \"","divers":"Bourges 47° 05' 04\" Nord et 2° 23' 47\" Est                    A Bourges Palais des Echevins Grav 1- 2-3.                 Hôtel Lallemant grav 4-5-6-7.                                 Cujas grav 8-9","gps":"","images":["../image/image_18/18_Bourges_Patrimoine_1.jpg","../image/image_18/18_Bourges_Patrimoine_2.jpg","../image/image_18/18_Bourges_Patrimoine_3.jpg","../image/image_18/18_Bourges_Patrimoine_4.jpg","../image/image_18/18_Bourges_Patrimoine_5.jpg","../image/image_18/18_Bourges_Patrimoine_6.jpg","../image/image_18/18_Bourges_Patrimoine_7.jpg","../image/image_18/18_Bourges_Patrimoine_8.jpg","../image/image_18/18_Bourges_Patrimoine_9.jpg"]},"Consult_chateau_formulaire3fce":{"id":"Consult_chateau_formulaire3fce","dept":"18","canton":"Aubigny sur Nère","commune":"Brinon sur Sauldre","nom":"Brinon_Sauldre","type":"Château","periode":"XI-XVIII","histoire":"Plusieurs châteaux à Brinon dont celui de Brinon , de Bouffard, de Coudray, de la Bergerie et  de  Seiguier, pas d'information historique  ni gravure pour ces trois derniers.                                                                          BRINON,  Jean Charles, marquis de Saint-Nectaire ( 11 novembre 1685  23 janvier 1771), seigneur, marquis de Brinon-sur-Sandres et de Pisani, baron de Didonne et de Saint-Germain-sur-Vienne dans la Marche, seigneur de Brillac et autres terres en Auvergne, comte de Saint-Victour, maréchal de France BOUFFARD, à lextrême nord du Berry, aux portes de la Sologne, séjournez dans le prestigieux château des Bouffards qui vous propose plusieurs chambres spacieuses et de nombreux équipements de loisirs piscine chauffée.                                                      BEAUCHENE, superbe château du XIXe siècle en pleine forêt entouré dun parc de 1,5 ha dans lequel dagréables chambres dhôtes vous attendent","architecture":"BRINON  inséré entre deux pavillons rectangulaires à deux niveaux le corps de logis central oblong d'une vingtaine de travées avec lucarnes sur combles  toit à deux pans en ardoises.                                            BOUFFARD de plan carré à deux niveaux sur soubassements toits en croupes à quatre pans en ardoises avec attiques.                                                 MINEE manoir  à deux niveaux corps de logis  inséré entre deux pavillons de plan rectangulaire à toit haut avec lucarnes.                                                          SEIGUIER, deux pavillons accolés avec toit impérial trés haut en ardoises, corps de logis à deux niveaux.   BERGERIE, manoir avec un corps de logis a deux niveaux flanqué d'une tour carrée sur angles à trois niveaux  toit quatres pans.                                     COUDRAY, l'édifice à deux niveaux sur soubassemenr, corps de logis  à trois travées entre deux pavillons rectangulaires légèrement saillant avec lucarnes sur combles.","habitants":"Brinon Marquis Jean Charles\r\n        \"","divers":"Brinon   grav 1 à 3  47° 33' 56\" nord, 2° 15' 21\"est.        Bouffard grav 4                                                                Minée grav 5                                                                   Seiguier grav-6                                                             Bergerie grav-7                                                     Coudray grav 8","gps":"","images":["../image/image_18/18_Brinon_Sauldre_1.jpg","../image/image_18/18_Brinon_Sauldre_2.jpg","../image/image_18/18_Brinon_Sauldre_3.jpg","../image/image_18/18_Brinon_Sauldre_4.jpg","../image/image_18/18_Brinon_Sauldre_5.jpg","../image/image_18/18_Brinon_Sauldre_6.jpg","../image/image_18/18_Brinon_Sauldre_7.jpg","../image/image_18/18_Brinon_Sauldre_8.jpg"]},"Consult_chateau_formulaire1d18":{"id":"Consult_chateau_formulaire1d18","dept":"18","canton":"St-Germain du Puy","commune":"Brécy","nom":"Brécy","type":"Château","periode":"Châteaux","histoire":"Plusieurs châteaux à Brécy,   chateau des Escorcelles. Manoir au lieu-dit de Guilly,  d'Aigrefeuille, du Chat Botté,                                                                               BRECY, manoir au lieu-dit de Guilly : c'est un manoir au toit de type Mansart, qui date des XVIIe et XVIIIe siècles. Famille Ducray. Le roi Charles VII  y séjourna  plusieurs fois. \r\nESCORCELLE, château datant du XIXe siècle ainsi que ses communs typiques du Berry  du XVIe siècle. Inscrit au patrimoine rural du Berry et situé sur les hauteurs de Guilly, ce château fait partie des propriétés de la famille la Combe de Blanchelande.\r\nAIGREFEUILLE manoir : les bâtiments,  logis, granges, étables et écuries de la ferme-manoir  en partie du XVIe siècle, maison du bailli Jean Chenu  actuellement dans la famille Gourdin- dont un bâtiment est aménagé en gîte rural. Ce fief fut habité de 1685 jusqu'en 1721 par des Rigault, seigneurs d'Aigrefeuille.\r\nCHAT-BOTTE, manoir  près de l'ancien relais de La Poste reconstruit en partie au XXe siècle, le manoir appartient à la famille Lyon du XXe siècle.","architecture":"BRECY, construction du XIIIe, 1ère moitié du XIVe,  reliquat d'une importante demeure fortifiée. Le tracé de l'enceinte est représentatif des plans géométriques des châteaux-cours du XIIIe siècle. L'enceinte carrée contenait le logis, adossé à la courtine sud, les écuries et la chapelle. Des tours cylindriques saillantes, percées d'archères et couronnées de hourds en charpente, surmontaient les murs droits des courtines, terminées par un chemin de ronde. De larges fossés défendaient l'approche du château dont l'entrée se faisait par un pont-levis. Le logis actuel a été bâti à la fin du XVe ou au début du XVIe siècle sur les fondations de l'ancienne maison forte. Deux tourelles polygonales, dont une abrite l'escalier, animent la façade sur cour. A l'époque classique, des constructions se sont adossées au corps de logis et à la courtine sud. Un portail encadré de pavillons a remplacé le pont-levis. Entre 1875 et 1900, un programme de remise en état a désorganisé les façades. Certaines tours de l'enceinte ont été dérasées et les fossés comblés. A l'intérieur du logis, de grandes cheminées du 15e siècle sont encore en place.","habitants":"Brécy  Famille Ducray                                             Escorcelle famille la Combe de Blanchelande            Aigrefeuille famille Gourdin                                             Chat Botté Famille Lyon\r\n        \"","divers":"Brécy47° 07' 21\" Nord et 2° 37' 11\" Est                        Chat Botté : 47° 07' 30\" Nord, 2° 37' 13\" Est","gps":"","images":["../image/image_18/18_Br%c3%a9cy_1.jpg","../image/image_18/18_Br%c3%a9cy_2.jpg","../image/image_18/18_Br%c3%a9cy_3.jpg","../image/image_18/18_Br%c3%a9cy_4.jpg","../image/image_18/18_Br%c3%a9cy_5.jpg","../image/image_18/18_Br%c3%a9cy_6.jpg"]},"Consult_chateau_formulaire28a3":{"id":"Consult_chateau_formulaire28a3","dept":"18","canton":"Sancerre","commune":"Boulleret","nom":"Buranlure_Pezeau","type":"Château","periode":"XV-XVI","histoire":"A Boulleret le château de Buranlure et celui de Pezeau.                                                                    BURANLURE, c'est plus un manoir qu'une véritable forteresse même si les douves constituent un élément de défense important,  de la fin du XVe ou début XVIe siècle, vers 1550 et du  XVIIIe siècle. Le château de Buranlure a été le théâtre en 1420 de la fuite de huit moines de Saint-Satur qui tentaient d'échapper aux anglais et à l'incendie de leur abbaye. Le seigneur de Buranlure les a recueillis. En 1420, possession des Vinon, Jean de Vinon décède en 1505. Sa fille Françoise épouse en 1515 Jean de Bar seigneur de Villemenard, et le château de Buranlure accueillait alors les fidèles du roi de France  pour protéger la région. En 1718 Jacques-Paul de Bar se défait du domaine acquis par Jean-François Masson conseiller  secrétaire du roi. En 1769, le château de Buranlure change de main. Les propriétaires vendent le domaine au marquis de Langeron, gendre de David Perrinet du Peseau,  qui est surtout intéressé par les nombreuses prairies du domaine que par la maison forte  humide et dans un fond sans vue. Par les Damas  Buranlure  s'est transmis aux Vogüé  qui après deux siècles d'occupation par des fermiers, appartient depuis à la même famille, il fait l'objet d'un classement au titre des M.H. depuis le 25 mai 1944. Il a servi de cadre au tournage de films et de séries télévisées.\r\nPEZEAU a Boulleret , le château du Pezeau datant du XIVe siècle restauré au XIXe siècle. Pas d'information historique.","architecture":"BURANLURE, construit au XVe siècle, agrandit au XVIe mais délaissé dès le siècle suivant,  n'a subit ni remaniement, ni destruction et a conservé toute son authenticité.  Construit sur un plan carré et entouré de douves remises en eau, il réunit en un pittoresque ensemble logis, pavillons, tours, échauguettes, à partir de puissantes maçonneries médiévales. Il a conservé ses couvertures en tuiles plates, et les nombreuses meurtrières témoignent de linsécurité qui perdura jusquau XVIIe siècle. La tour-porche donne accès à une cour étroite. Le bâtiment central est du XVe siècle, l'aile sud du XVIe. La tour octogonale de la cour qui abrite l'escalier à vis et les fenêtres à meneaux ont été rajoutés au XVIe siècle, ainsi que les 7 splendides cheminées Renaissance qu'on retrouve dans les salles principale.  La chance de Buranlure réside dans le fait que ses propriétaires l'ont quitté au XVIIe siècle ; il a ainsi évité les modifications des châteaux de plaisance et a gardé son architecture d'origine. Les murs Nord et Est datent du XIVe siècle  on retrouve le chemin de ronde, les meurtrières dans les murs de plus d'un mètre d'épaisseur.\r\nPEZEAU date du XIVe siècle restauré au XIXe siècle. Le château, remanié à diverses époques, forme un vaste rectangle entouré de fossés plein deau, dont lentrée ancienne était à louest. Deux grosses tours marquent les angles extérieurs du côté oriental, mais le corps de logis qui les réunit a été refait au XVIIIe siècle en même temps que la partie sud de la cour qui était ouverte et qui faisait place à des terrasses à balustrades.","habitants":"Famille des  Vogüé  Marquis de Langeron,\r\n        \"","divers":"Buranlure grav de 1 à 4  47° 24' 38,16\" Nord et 2° 53' 15,72\" Est.                                                                      Pezeau grav de 5 à 9","gps":"","images":["../image/image_18/18_Buranlure_Pezeau_1.jpg","../image/image_18/18_Buranlure_Pezeau_2.jpg","../image/image_18/18_Buranlure_Pezeau_3.jpg","../image/image_18/18_Buranlure_Pezeau_4.jpg","../image/image_18/18_Buranlure_Pezeau_5.jpg","../image/image_18/18_Buranlure_Pezeau_6.jpg","../image/image_18/18_Buranlure_Pezeau_7.jpg","../image/image_18/18_Buranlure_Pezeau_8.jpg","../image/image_18/18_Buranlure_Pezeau_9.jpg"]},"Consult_chateau_formulairec733":{"id":"Consult_chateau_formulairec733","dept":"18","canton":"Chârost","commune":"Plou-Breuilhamnon","nom":"Castelnau_Font_Moreau","type":"Château","periode":"X-XVI","histoire":"A Plou le château de Castelnau et le château de Font-Moreau dont-il reste quelques vestiges.             CASTELNAU, de 1585 à 1652, la seigneurie de Breuilhamnon est tenue par la lignée des Bochetel Castelnau avec Jacques I et Jacques II. Ce fut en 1652, que Jacques II de Castelnau-Bochetel, obtiendra du roi, en récompense de ses glorieux faits darmes, que la seigneurie de Breuilhamenon sont érigée en marquisat sous le nom de Castelnau. Ce grand soldat fut fait maréchal de France juste avant de mourir en 1658.  Le 14 janvier de cette même année 1652, un tremblement de terre secoua la paroisse de Plou.  De 1658 à 1699, le marquisat de Castelnau de la paroisse de Plou sera tenu par la lignée des de Castelnau, avec Michel II de Castelnau (1658- 1671), puis avec sa fille Henriette (1671-1699), première écrivaine douvrages osés, et dont les dettes lobligeront à vendre le château et le marquisat.  De 1699 à 1708, Le marquisat de Castelnau sera tenu par la lignée des « Forcadel ».Il faut attendre 1779 pour que Charles Joseph de Bussy lui donne laspect quil a aujourdhui , de 1742 à 1755 le marquisat de Castelnau sera acquis par la famille bourgeoise des Duvaucel, lacquisition, le 30 janvier 1756, du marquisat de Castelnau par Charles Joseph Patissier de Bussy, de 1785 à 1827, sa nièce et héritière Charlotte Catherine Sophie de Bussy épouse de Folleville. A la mort dAmélie Charlotte Julie Musnier de Folleville, le 17 juillet 1836,  passa à son époux Hilaire Etienne Octave Rouillé de Boissy paire de France et sénateur, qui  devait épouser en seconde noces en 1847  la comtesse Guicciolli, en 1866 suite au décés du sénateur Boissy la veuve vendit le château à Jean Soubiran,  Mme Albert Soubiran  propriétaire.","architecture":"CASTELNAU, le château de Castelnau, à Brouillamnon : à son origine, qui date autour de lan 1000. Cest en 1541 que Guillaume de Bochetel, secrétaire du roi François Ier transforme lédifice médiéval en château de style renaissance berrichonne (entre le gothique flamboyant et la renaissance française dinspiration italienne). Il faut attendre 1779 pour que Charles Joseph de Bussy lui donne laspect quil a aujourdhui, de plan quadrangulaire, trois corps de logis avec des tours rondes à chaque angles, à deux niveaux  sur soubassement  avec trois lucarnes gothiques sur combles toit en croupe, flanqué au angles de tours rondes toit en poivrières.  Retour en équerre d'un corps de logis   de même style  avec au centre porche d'entrée  surmonté d'échauguettes en encorbellement et sur le centre une tourelle de guet  avec clochetons dépassant l'ensemble, deux lucarnes gothique flamboyante. Le troisième corps de logis idem au deux autres mais inférieur accolée sur l'angle interne d'une grosse tour ronde accolée d'une tourelle carrée et sur l'angle extérieure une grosse tour carrée.  FONT-MOREAU  Vestiges  dépendait à lorigine de la seigneurie de Chârost. Il fut probablement lapanage traditionnel des puînés de la maison des seigneurs de Chârost.   Au XIVe siècle, construction du château.  D'après certains médiévistes, ce château aurait appartenu à une famille de Chârost. Il aurait été donné en apanage au 2ème enfant (l'aîné ayant toujours le château principal).La tour et l'enceinte il ne reste que des vestiges.","habitants":"Charles Joseph Patissier de Bussy\r\n        \"","divers":"Castelneau grav 1 à 5                                                    Plou-47° 00' 55\" nord, 2° 09' 20\" est  Grav  6 à 9","gps":"","images":["../image/image_18/18_Castelnau_Font_Moreau_1.jpg","../image/image_18/18_Castelnau_Font_Moreau_2.jpg","../image/image_18/18_Castelnau_Font_Moreau_3.jpg","../image/image_18/18_Castelnau_Font_Moreau_4.jpg","../image/image_18/18_Castelnau_Font_Moreau_5.jpg","../image/image_18/18_Castelnau_Font_Moreau_6.jpg","../image/image_18/18_Castelnau_Font_Moreau_7.jpg","../image/image_18/18_Castelnau_Font_Moreau_8.jpg","../image/image_18/18_Castelnau_Font_Moreau_9.jpg"]},"Consult_chateau_formulaireb4d3":{"id":"Consult_chateau_formulaireb4d3","dept":"18","canton":"Aubigny sur nère","commune":"Chapelle d","nom":"Chapelle_Angillon","type":"Château","periode":"XI-XV","histoire":"CHAPELLE D'ANGILLON dit de BETHUNE, le constructeur de la première forteresse devient la demeure des princes de Boisbelle, centre d'une principauté souveraine, séparée du royaume de France et ne payant pas l'impôt à ce dernier. Le château fut fortifié au XIe siècle par  Gillon de Seuly. Au XVe siècle la dernière de la branche des Sully de la Chapelle Marie, apporte le domaine en dot à  Charles d'Albret, En 1504 leur descendante Marie II d'Albret, duchesse de Nevers apporte à son tour à son époux Charles duc de Clèves, en 1528 le fils de Marie et de Charles  François de Clèves duc de Nevers épouse Marie de Bourbon la tante du futur Henri IV. Un fils né de cette union, Jacques, prince de Boisbelle dont est issue la célèbre princesse de Cléves, fut propriétaire du château du XIVe au XVe siècles. Les Gonzague, duc de Mantoue qui succèdent aux Clèves par mariage cèdent en 1605 à Maximilien de Béthune duc de Sully et ministre du roi Henri IV qui lui conserve ses avantages. En 1766, elle est cédée au Royaume de France.  Le château et les terres sont rachetés en 1808 par François Dumont de la Charnaye, Le 18 juin 1940, une trentaine de bombardiers ennemis, après un premier passage, ont déversé leurs bombes sur le champ de foire faisant de nombreuses victimes. Le domaine est acheté par un diplomate M. Henri Coursier, son gendre et sa fille le comte et la comtesse Jean d'Ogny poursuivent l'oeuvre de rendre vie à ce château.","architecture":"CHAPELLE D'ANGILLON,  avec un donjon premier édifice carré de la région  datant du XIe siècle : il est classé aux M.H. en 1963. Cette importante forteresse a pour origine lun des plus anciens donjons carrés de cinq étages de la région élevé à la fin du XIe siècle au fils du temps s'ajoutèrent divers corps de bâtiments qui formèrent un ensemble fortifié trapézoïdal, de plan en U cernant la cour intérieure. La tour carrée de six étages sont adossées d'autres tours carrées rondes ou octogonales. La façade principale du corps d'habitation regarde la terrasse, l'entrée dans l'aile nord, est également encadrée de deux tours. La dernière aile abrite des bâtiments  annexes et une galerie Renaissance. Sa terrasse domine le plan deau communal des Barres.","habitants":"Famille de Maximilien de Béthune \r\n        \"","divers":"Chapelle_47° 21' 51\" nord, 2° 26' 02\" est","gps":"","images":["../image/image_18/18_Chapelle_Angillon_1.jpg","../image/image_18/18_Chapelle_Angillon_2.jpg","../image/image_18/18_Chapelle_Angillon_3.jpg","../image/image_18/18_Chapelle_Angillon_4.jpg","../image/image_18/18_Chapelle_Angillon_5.jpg","../image/image_18/18_Chapelle_Angillon_6.jpg","../image/image_18/18_Chapelle_Angillon_7.jpg","../image/image_18/18_Chapelle_Angillon_8.jpg","../image/image_18/18_Chapelle_Angillon_9.jpg"]},"Consult_chateau_formulaire341e":{"id":"Consult_chateau_formulaire341e","dept":"18","canton":"Chârost","commune":"Chârost","nom":"Charost","type":"Château","periode":"XV-XVI","histoire":"CHAROST, l'origine du nom : du latin quadrivium signifiant carrefour. Le village est situé sur la voie antique secondaire allant de Châteaumeillant à Vierzon. Privilèges de franchise accordés par Gautier II de Chârost en 1194. Par un acte passé à Paris en mai 1217, Hélie de Culan et Étienne de Saint-Palais abandonnent au roi Philippe Auguste le fief de Chârost et le fief de Lignères en échange du fief de Vierzon, du fief de Charenton et du domaine de Vatan. En octobre 1589, les soldats du maréchal des camps puis maréchal de France, gouverneur des duchés de Berry et d'Orléans, Claude III de La Châtre  mort le 18 décembre 1614 à 78 ans et en décembre 1591 celles du sieur François de La Grange d'Arquian saccagèrent la ville. Armand Joseph de Béthune (1738-1800), 5e duc de Chârost, Pair de France, lieutenant général (1792), maire du 10e arrondissement de Paris en 1799.\r\nTOUR-LAMY,  en arrivant à Charost, face au château de lautre côté de lArnon, une tour que lon pourrait penser vestige du château. Il nen est rien, ce bâtiment très particulier fut édifié par un important vigneron, marchand de vin. Augustin Lamy, enfant de Chârost, après avoir au cours de son service militaire effectué en Algérie, il devient Maire et juge de paix de la commune. Il séteignit en 1901. Ce fut sa sur Mme Artigaud, très proche de son frère qui pendant près de 25 ans maintient lactivité.","architecture":"CHAROST, du  XVe et XVIe, surplombe la vallée de l'Arnon. du château proprement dit, très bien entretenu. Cest un édifice rectangulaire aux fenêtres à meneaux croisés, aux lucarnes à pignons, aux toits dardoise. Il est contigu à lune des tours de lenceinte qui domine lArnon, ronde, fine et coiffée dune toiture conique très pointue. Ce bâtiment date de la fin du XVe siècle ou début XVIe siècle. On pense quil a été construit par Guy de Rochechouart, qui apprécia Charost et y vécut. Ce château, très dégradé après la Révolution, fut restauré au siècle dernier par le comte de Guébriant. Au cours de travaux on trouva au-dessus des bâtiments des fondations qui semblent indiquer quil a été bâti sur lemplacement de lune des anciennes enceintes fortifiées.","habitants":"Famille de Gautier II de Chârost                      Augustin Lamy   \r\n        \"","divers":"Charost   46° 59' 37\" nord, 2° 07' 01\"est                         Tour Lamy grav-4","gps":"","images":["../image/image_18/18_Charost_1.jpg","../image/image_18/18_Charost_2.jpg","../image/image_18/18_Charost_3.jpg","../image/image_18/18_Charost_4.jpg","../image/image_18/18_Charost_5.jpg","../image/image_18/18_Charost_6.jpg","../image/image_18/18_Charost_7.jpg","../image/image_18/18_Charost_8.jpg"]},"Consult_chateau_formulairebde6":{"id":"Consult_chateau_formulairebde6","dept":"18","canton":"Saint-Amand-Montrond","commune":"Buère-Allichamps","nom":"Chateaufer","type":"Château","periode":"XVII","histoire":"CHATEAUFER, construit par Charles Le Fer, seigneur du Breuil et de Sausay qui le lègue à sa fille Marguerite Le Fer à son décès en 1695, chevalier de Saint-Louis, vicomte de Coulogne, descendant à la 12e génération de Jean Ier de Valois, duc de Berry, épouse Marguerite Le Fer qui apporte le domaine à la famille Robin et dont certains des descendants se feront appeler par la suite Robin de Châteaufer.  Son fils, Charles Désiré Robin de Coulogne, lieutenant-colonel au corps royal de l'artillerie et du génie, commissaire provincial de l'artillerie, père de Charles-Jacques-Désiré Robin de Coulogne, est né au château de Châteaufer le 10 mai 1703. En 1731, le château appartient à Balthasar Robin de Châteaufer. Il est vendu par la fille de celui-ci en 1774 à Catherine-Athenais et Étienne Boucart de Châteaufer, né vers 1730, écuyer officier de la chambre du Roi, chevalier de l'ordre du Roi du Portugal, ancien major au service de l'Impératrice de toutes les Russies, ex-contrôleur des bâtiments du comte d'Artois. D'après Buhot de Kersers, dans une chapelle annexe, construite par Le Fer en 1670, le curé-prieur d'Allichamps devait, à titre de fondation, dire la messe cinq fois par an. Ce droit fut l'objet de différents entre le curé Pajonnet et les de Coulogne qu'il est un motif de la vente, en 1774. En 1789, il appartient à la veuve Boucart. Chateaufer est le dernier témoin de l'architecture civile du XVIIe dans le Berry. En 1917, des troupes américaines sont cantonnées dans l'annexe de la remonte. Arrivés le 4 juillet 1918, les soldats séjournent à Châteaufer pendant deux années. En 1939, certains bâtiments sont transformés en camp d'accueil pour des réfugiés de la guerre civile espagnole.","architecture":"CHATEAUFER  entre 1666 et 1670, construit par Charles Le Fer,  est formé d'un corps logis rectangulaire terminé par deux ailes saillantes. Un premier étage domine le tout. Les portes sont entourées de pilastres doriques et surmontées d'un fronton très bas. Les lucarnes sont également à fronton. L'une des ailes abrite l'escalier en pierre rampe sur rampe. Le rez-de-chaussée est peu développé, un étage noble et des combles couverts de tuiles plates. Aucune rupture dans la ligne de faîte des toitures ne vient modifier l'horizontalité de l'ensemble. Le décor est simple et les seuls éléments sculptés sont réservés aux encadrements des portes et des lucarnes de la façade antérieure. Les bâtiments agricoles sont intégrés à la composition d'ensemble et soulignent le plan symétrique. À l'intérieur sont conservé des décors peints sur les murs datant de la construction. \r\nSont protégés notamment le corps de logis ; la chapelle située à l'extrémité sud ; les façades et les toitures des deux bâtiments de communs situés dans l'avant-cour ; le portail d'entrée et le mur de clôture de l'avant-cour ; les fossés sont inscrits à linventaire supplémentaire des M.H. le 12/09/2002.","habitants":"Famille de Balthasar Robin de Châteaufer\r\n        \"","divers":"Chateaufer  46° 46' 06\" Nord et 2° 25' 57\" Est","gps":"","images":["../image/image_18/18_Chateaufer_1.jpg","../image/image_18/18_Chateaufer_2.jpg"]},"Consult_chateau_formulairecb8a":{"id":"Consult_chateau_formulairecb8a","dept":"18","canton":"Trouy","commune":"Châteauneuf sur Cher","nom":"Chateauneuf_Cher","type":"Forteresse","periode":"XI-XV-XVI","histoire":"CHATEAUNEUF SUR CHER, dans les années 1037 et 1038, le château des vicomtes de Bourges qui possède la baronnie est nouvellement construit sur  un  promontoire roc
