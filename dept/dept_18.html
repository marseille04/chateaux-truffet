aînages, et les bandeaux séparant les niveaux. L'organisation de cette résidence seigneuriale qui témoigne de son évolution jusqu'à sa vente comme bien national à la Révolution, est encore pour l'essentiel préservée.","habitants":"Famille Dumoustier\r\n        \r\n        \"","divers":"Sarragosse   47° 04' 34\" Nord et 2° 06' 24\" Est","gps":"","images":["../image/image_18/18_Sarragosse_1.jpg","../image/image_18/18_Sarragosse_2.jpg"]},"Consult_chateau_formulaire0ab3":{"id":"Consult_chateau_formulaire0ab3","dept":"18","canton":"Saint-Amand-Montrond","commune":"Saint-Amand-Montrond","nom":"St_Amand_Montrond","type":"Château","periode":"XIII-XV","histoire":"Plusieurs châteaux à Montrond dont celui de Montrond, le manoir de Vernet, le Musée de St-Vic; la tour Malakoff et les vestiges d'Orval.                  MONTROND, la première mention certaine apparaît en 1225, date à laquelle Renaud de Montfaucon fortifie le château ; en 1361, occupation anglaise ; en 1412, le château d'Orval ayant été brûlé par les anglais, Charles d'Albret, seigneur d'Orval et de Saint-Amand, s'installe au château de Montrond, mieux protégé ; d'importants travaux ont lieu pendant le XVe siècle et au début XVIe siècle ; une chapelle pour Isabeau de La Tour du Pin est fondée à la fin du XVe siècle ; en 1606, le château est acquis par le duc de Sully ; les bâtiments étant très délabrés, Sully réaménage le logis, crée le jardin, reprend les fortifications ; de 1621 à 1652, les fortifications sont achevées pour Henri II de Condé et son fils Louis II, le Grand Condé, par Jean Sarrazin, architecte ; en 1652 a lieu le siège de Montrond ; le château est démantelé à partir de 1736, puis sert de carrière ; en 1834, Montrond est transformé en jardin public ; en 1970, un chantier de fouilles confié au Chasa est ouvert.                         MANOIR du VERNET, un sous-fief de Montrond, datant du XIVe-XVe siècle, s'est illustré modestement lui aussi lors de la Fronde en 1652. Bien plus tard, il abrita des soldats américains qui résidèrent entre 1918 et 1919 à Saint-Amand, puis, par ce biais fut vendu à un antiquaire parisien à destination d'un milliardaire des Amériques. Certaines pierres y auraient été remontées dans une construction moderne, le dernier petit château, aujourd'hui disparu, a été rasé en deux temps entre 1920 et 1921, une première phase de récupération des pierres de : cheminées, fenêtres, lucarnes et autres éléments architecturaux, puis destruction complète.","architecture":"MONTROND La tour Malakoff, érigée par le général-marquis de Rochechouart-Mortemart en l'honneur des troupes victorieuses de Napoléon III durant la campagne de Crimée. Elle porte la mention « Gloire immortelle à l'Armée d'Orient - 8 septembre 1855 ». dit aussi, château de La Férolle,  du 1er quart du XIIIe siècle et XVe siècle  au  XVIIe siècle la forteresse médiévale revue au début du XVe siècle par la famille d'Albret. Mutation profonde au XVIIe siècle sous Sully et les princes de Condé. La forteresse de Montrond est la seule fortification bastionnée édifiée dans le centre de la France. Ses origines remontent au XIIIe siècle.  Totalement agrandie et aménagée par Sully au début du XVIIe siècle, elle fut ensuite dotée d'un très puissant système de fortifications bastionnées conçu par Jean Sarrazin pour le Prince de Condé.\r\nST-VIC  cet hôtel est l'ancienne résidence des abbés commendataires de l'Abbaye de Noirlac. Son origine remonte au début du XIIIe siècle, mais il n'en reste rien. L'édifice actuel est une reconstruction de l'époque de la Renaissance. Il a été vendu comme bien national au moment de la Révolution Française. Il devient ensuite une maison d'arrêt jusqu'en 1934.","habitants":"Renaud de Montfaucon\r\n        \"","divers":"Vestiges grav 1-2                                                            St-Amand-Montrond Grac 3-4-5-6,  46° 43' 22\" nord, 2° 29' 44\" est                                                                Vernet grav-7                                                                   Vic fig 8                                                                     Tour-Malakoff grav-9","gps":"","images":["../image/image_18/18_St_Amand_Montrond_1.jpg","../image/image_18/18_St_Amand_Montrond_2.jpg","../image/image_18/18_St_Amand_Montrond_3.jpg","../image/image_18/18_St_Amand_Montrond_4.jpg","../image/image_18/18_St_Amand_Montrond_5.jpg","../image/image_18/18_St_Amand_Montrond_6.jpg","../image/image_18/18_St_Amand_Montrond_7.jpg","../image/image_18/18_St_Amand_Montrond_8.jpg","../image/image_18/18_St_Amand_Montrond_9.jpg"]},"Consult_chateau_formulaire61b1":{"id":"Consult_chateau_formulaire61b1","dept":"18","canton":"Saint-Martin-d-Auxigny","commune":"Saint Eloi de Gy","nom":"St_Eloi_de_Gy","type":"Château","periode":"XV-XVI","histoire":"Sept châteaux à  St-Eloy de GY ; Chaplude,  Dames,  Lépinière, Montet, Péron, Rongère chambre d'hôtes de la famille Atger-Rochefort  et Vernay,  pas d'information historique pour ces châteaux mise à part  le château des Dames .                                              ST-ELOI de GY, il est fait mention dans \"La guerre des Gaules\" de Jules César, dans le livre VII Chapitre XXIII de mines de fer, ce qui laisse penser qu'il ait ici fait référence aux mines de Bourgneuf, commune de Saint-Eloy-de-Gy.  1272 : La paroisse Sanctus Eligius de Gii est mentionnée.   Avant 1789, Saint-Éloy-de-Gy était un prieuré simple et régulier dépendant de l'abbaye de Saint-Sulpice de Bourges  laquelle percevait donc la part principale de la dîme versée par les habitants de cette paroisse.   Louis Hector Chaudru de Raynal naquit à Bourges le 28 janvier 1805. Son père était né à Salignac le 7 mai 1768, mais il se fixa en Berry après son mariage avec Mlle Decencière de la Ferrandière, originaire dune famille du Sancerrois. \r\nChâteau de DAME, du XVe siècle, à quelques kilomètres, est la propriété de Geoffroy Collard qui a bien voulu ouvrir les portes de son parc. L'historique du château construit au XVIe siècle sur un site médiéval par une famille de chambellans du roi et agrandi au début du XIXe siècle a été relaté, ainsi que l'histoire de la commune au carrefour de trois territoires.","architecture":"Château de St Eloi de Gy  presques tous  similaires  date du XVI au XVIIIe siècle.                                     DAMES,  de style féodal flanqué de tours rondes accolées aux corps de logis de trois niveaux  et série de lucarnes.                                                           CHAPELUDE manoir en équerre à deux niveaux sur soubassement flanqué d'un pavillon carré sur angle et tour ronde à l'extrémité à gauche.                           LEPINIERES, quadrangulaire à deux niveaux et série de lucarnes sur combles, l'édifice est accolé de pavillons carrés aux extrémités de part en part.      MONTET, quadrangulaire à tois niveaux  flanqué de pavillons carrés aux angles, toitures hautes.        PERON, corps de logis de deux niveaux à cinq través insérées entre deux tours carrées à trois niveaux toit à quatre pans dont les lucarnes du corps de logis en toit brisé, l'édifice est prolongé  sur les flancs de pavillon et retour d'équerre en avant,  dépendances à deux niveaux toit à deux pans.                                  RONGERES, le corps de logis central à un niveau  sur soubassement    série de lucarnes sur toit en croupe   l'édifice est accolé de part et d'autre à deux bâtiment identiques de trois niveaux toit à deux pans   avec balcons en façades.                                             VERNAY,  de plan en U à deux niveaux entre deux pavillons saillants  dont celui de gauche plus haut d'un étage que celui de droite , porche d'entrée légèrement décallé vers la gauche.","habitants":"Geoffroy Collard \r\n        \r\n        \r\n        \"","divers":"St-Eloi grav-1              Dames grav 2                Capeluche grav-3           Lespinières grav-4           Montet grav-5               Peron grav -6                     Rongères grav-7           Vernay grav-8","gps":"","images":["../image/image_18/18_St_Eloi_de_Gy_1.jpg","../image/image_18/18_St_Eloi_de_Gy_2.jpg","../image/image_18/18_St_Eloi_de_Gy_3.jpg","../image/image_18/18_St_Eloi_de_Gy_4.jpg","../image/image_18/18_St_Eloi_de_Gy_5.jpg","../image/image_18/18_St_Eloi_de_Gy_6.jpg","../image/image_18/18_St_Eloi_de_Gy_7.jpg","../image/image_18/18_St_Eloi_de_Gy_8.jpg"]},"Consult_chateau_formulaire6c56":{"id":"Consult_chateau_formulaire6c56","dept":"18","canton":"Saint-Florent-sur-cher","commune":"Saint-Florent sur Cher","nom":"St_Florent_sur_Cher","type":"Château","periode":"XIV-XVI","histoire":"ST-FLORENT, le plus ancien seigneur connu est Jean des Barres, seigneur de La Guerche, petit-fils de Guillaume des Barres qui s'illustra en 1191, en battant Richard Cur de Lion. En 1278 Jean de Barres cède le domaine à Pierre Leroy; le fief échu en partage à son fils Guillaume, il restera dans cette famille jusqu'au XVIIe siècle. En 1562, il fut attaqué et pillé. En 1625, la seigneurie de Saint-Florent est vendue à Henri II de Condé, prince de sang, duc de Châteauroux, seigneur de La Châtre et gouverneur du Berry. Après lui, en 1646, Saint-Florent revient à son fils Louis II de Bourbon, dit le Grand Condé, chef de la Fronde. son successeur  Henri III s'éteint en 1709 laissant pour héritière sa fille Louise épouse de Louis de Bourbon comte du Vermandois  et grand amiral de France. La seigneurie de Saint-Florent restera dans cette famille jusqu'en 1727. En 1749 vendu à François  Thabaud de la Terrée qui aura pour successeurs sa fille et son gendre Pierre de Lestang conseiller du roi et en 1779 vendu à Charles-Joseph Patissier marquis de Bussy-Castelnau. Par héritage de Bussy à madame de Folleville, puis en 1825 elle vend St-Florent  a la marquise de Travanet et à son beau-frère monsieur Lonchampt, qui le revend en 1835, a monsieur Carpentier, négociant. Sa fille épousa le fils d'un industriel d'Orléans, monsieur Brunet, qui fut longtemps maire de Saint Florent. Acheté en 1890 par le comte de Courcelles puis à un industriel en 1899     M. Renevey.  Le château devient la propriété de la commune de Saint-Florent en 1936 pour héberger les services municipaux et l'hôtel de ville.","architecture":"St-FLORENT,  situé entre Bourges et Issoudun, le château eut à subir plusieurs sièges et de nombreuses dévastations pendant les guerres de religion, l'ancienne forteresse médiévale qui devint un château de style Louis XII avec un revêtement extérieur de briques rouges, une large terrasse à balustrade sur toute la façade et un magnifique escalier à double révolution,  la poterne d'entrée de l'ancien château est flanquée, à gauche, de la chapelle et, à droite, d'un escalier, ainsi que de la tour au sud-est de l'ancienne enceinte disparue. La porte d'entrée est en anse de panier. Deux tourelles en encorbellement habillent les angles du pavillon. Les parties hautes à partir de l'entablement datent du XIXe siècle. La façade intérieure présente un décor en briques et pierre polychrome. Du côté gauche du pavillon se trouve la tourelle d'escalier, laquelle le relie à une tour plus ancienne qui a conservé ses meurtrières. Hotel de style gothique de Jacques Leroy de 1447 formait un rectangle bordé d'un côté par le Cher et sur les trois autres côtés de fossés, le corps de logis en équerre étaient disposés au nord et à l'est, les courtines contre lesquelles s'appuyaient des appentis reliaient les qutre tours d'angle un pont-levis au sud -est précédait le châtelet d'entrée, commandant l'accès à la cour de cet ensemble subsiste le châtelet d'entrée.","habitants":"Famille de Pierre Leroy\r\n        \"","divers":"St-Florent    46° 59' 34,69\" Nord et 2° 14' 40,52\" Est","gps":"","images":["../image/image_18/18_St_Florent_sur_Cher_1.jpg","../image/image_18/18_St_Florent_sur_Cher_2.jpg","../image/image_18/18_St_Florent_sur_Cher_3.jpg","../image/image_18/18_St_Florent_sur_Cher_4.jpg"]},"Consult_chateau_formulaire36b1":{"id":"Consult_chateau_formulaire36b1","dept":"18","canton":"Saint-Martin d","commune":"Saint Georges sur Moulon","nom":"St_Georges_Moulon","type":"Château","periode":"XV","histoire":"St-GEORGES, du XIVe siècle, ce fief appartient à la famille Trousseau avant de passer au XVe siècle dans le giron de Pierre de la Porte, chevalier seigneur de Pesselières et de Veaugues, pendant 185 ans.  Ce château comprend deux corps de logis carrés donnant un aspect non conventionnel pour cette époque. Il a ensuite été agrandi au XVIIIe siècle par monsieur de Saint-Georges qui a construit un bâtiment pour y élever des vers à soie. Il est actuellement restauré grâce à ses nouveaux propriétaires qui en ont fait l'acquisition en 1987.","architecture":"St-GEORGES  le château commencé au XIe siècle, il comprend deux corps de logis carrés donnant un aspect non conventionnel pour cette époque à deux niveaux sur soubassement accolé d'une tour ronde toit en poivrière,  agrandi au XVIIIe siècle par M. de St Georges pour y élever des vers à soie ! Il est actuellement restauré grâce à l'engagement de ses propriétaires.","habitants":"Famille de Pierre de la Porte\"","divers":"Château de St-George sur Moulon","gps":"","images":["../image/image_18/18_St_Georges_Moulon_1.jpg","../image/image_18/18_St_Georges_Moulon_2.jpg","../image/image_18/18_St_Georges_Moulon_3.jpg"]},"Consult_chateau_formulaire7ab7":{"id":"Consult_chateau_formulaire7ab7","dept":"18","canton":"Sancerre","commune":"Thauvenay","nom":"Thauvenay_Choulot","type":"Château","periode":"XVIII","histoire":"THAUVENAY, c'est un château dont la construction a débuté en 1773 et s'est achevée en 1898. Il appartient actuellement au comte Georges de Choulot de Chabaud la Tour. Pierre Perrinet de Faugnes fait réédifier entièrement le logis seigneurial, en 1773, à l'emplacement du château reconstruit au XIIIe siècle. Un vaste parc est aménagé. En 1819, le château de Thauvenay est racheté, par la comtesse Bachasson de Montalivet qui fait réaménager le logis. Jean-Pierre de Montalivet créé la même année le vignoble du château. Il passera par la suite dans les mains de leur petit-fils, Arthur de Chabaud-Latour. En 1898, la famille de Chabaud-Latour agrandit à l'est, un nouveau corps de bâtiment avec des tourelles, tout en fermant la cour située derrière les cuisines du château. La construction et la décoration sont confiées à l'architecte Louis Parent. Le château de Thauvenay appartient à un producteur vinicole AOC. Propriété de la famille Choulot de Chabaud la Tour, vient dêtre acquis par Langlois-Château, avec le soutien de sa maison mère, la Société Bollinger.","architecture":"THAUVENAY,  Pierre Perrinet de Faugnes réédifie entièrement le logis seigneurial, en 1773, à l'emplacement du château reconstruit au XIIIe siècle. Un vaste parc est aménagé comme l'atteste le plan terrier de la seigneurie, contemporain de la construction.  la construction et la décoration sont confiées à l'architecte Louis Parent. L'édifice du XVIIIe siècle se compose de deux corps de logis ; le premier corps se compose de deux ailes à chaque extrémité mais qui ne font saillie que sur la façade Est ; il a un étage : pièces de réception et chapelle au rez- de-chaussée et chambres à l'étage, distribuées par un couloir latéral ;l'escalier est placé à l'extrémité sud du bâtiment ; le deuxième corps de  logis est en rez-de-chaussée, il est réservé à la cuisine et aux offices, les combles mansardés abritaient les chambres du personnel ; le logis du XIXe siècle a gardé son décor intérieur d'origine. Les écuries sont avec des chaînes d'angle en alternance brique et pierre, les oculis du toit sont en plomb ; la fontaine est couverte d'un toit à pavillon en tuiles plates. Le parc a conservé de belles essences d'arbres.","habitants":"Pierre Perrinet de Faugnes\r\n        \"","divers":"Thauvenay 47° 18' 31\" Nord et 2° 51' 47\" Est","gps":"","images":["../image/image_18/18_Thauvenay_Choulot_1.jpg","../image/image_18/18_Thauvenay_Choulot_2.jpg","../image/image_18/18_Thauvenay_Choulot_3.jpg"]},"Consult_chateau_formulairea987":{"id":"Consult_chateau_formulairea987","dept":"18","canton":"Saint-Germain-du-Puy","commune":"Neuvy-deux-Clochers","nom":"Tour_Vesvre","type":"Maison forte","periode":"XIII","histoire":"TOUR-VESVRE, cette imposante maison forte aux murs épais fut bâtie au XIIe siècle par Hugues II de Vesvre.  Au cours de la deuxième moitié du XIIe siècle, le site  semble connaître une nouvelle ère. Hugues II délaisse un temps le site de Vesvre, siège de sa famille, pour devenir, de par son mariage avec Béatrix, seigneur de  Ménetou-Salon.  Deux Clochers en 1973, la Seignerie de Vesvre a connu bien des propriétaires; La grange et le colombier attenants ont été restaurés en 2012 et 2014, et la motte castrale est acquise par la commune. Le site est géré par l'Association des Amis de la Tour de Vesvre  \r\nClassé M.H.depuis 1993 pour son intérêt historique et architectural exceptionnel.","architecture":"VESVRE, son histoire s'inscrit dans l'histoire du site de Vesvre, comprenant une motte castrale, une ferme du XVIe siècle, et un manoir de même époque aujourd'hui en ruines. L'élément le plus important est une imposante tour rectangulaire récemment protégée des intempéries et des dégradations dues au temps.     Seule lescarpe du fossé est chemisée et il est probable quelle corresponde aux bases de lancienne courtine fortifiant le terre plein. Elle comporte encore deux petites guérites ou échauguettes à ses angles sud-est et sud-ouest, attribuables au XVIe siècle. La tour est édifiée au début du XIIIe siècle. Elle  nest pas située au centre du terre-plein, mais  plutôt excentrée vers le sud. Elle adopte un plan quadrangulaire de 21 m de long par 15 m de large  avec des murs de plus de 2,50 mètres dépaisseur. Construite principalement en grès ferrugineux, elle mesure environ 27 m de haut et abrite aujourdhui quatre niveaux, du réseau de cave de plain-pied  aux combles. Ses façades extérieures comportent encore un ressaut qui était initialement appareillé avec dépaisses dalles en marne compressée, appelées marnes de Saint-Doulchard. Ce ressaut correspondait à lorigine au passage entre le premier et le second niveau, avant que les intérieurs ne soient entièrement remaniés au cours du XVIe siècle. Cest sans doute à cette période que lon doit la superbe charpente qui surmonte la tour encore aujourdhui.","habitants":"Hugues II de Vesvre\r\n        \"","divers":"Vesvres 47° 17' 16\" nord, 2° 43' 24\" est","gps":"","images":["../image/image_18/18_Tour_Vesvre_1.jpg","../image/image_18/18_Tour_Vesvre_2.jpg","../image/image_18/18_Tour_Vesvre_3.jpg","../image/image_18/18_Tour_Vesvre_4.jpg"]},"Consult_chateau_formulaire9321":{"id":"Consult_chateau_formulaire9321","dept":"18","canton":"Saint-Germain-du-Puy","commune":"Saint-Michel de Volengis","nom":"Turly","type":"Château","periode":"XVI","histoire":"TURLY, sa construction a démarré au XVe siècle et s'est achevée au XVIIe siècle. Le château de Turly est classé aux M.H. depuis 2006. Le domaine de Turly est la propriété des archevêques de Bourges depuis la fin du XIIe siècle. La reconstruction du château est attribuée à Guillaume de Cambray, en 1496. Ce château médiéval est restauré à partir de la fin du XVIIe siècle, après les guerres civiles, à la demande de Monseigneur Phélypeaux de la Vrillière.","architecture":"TYRLY, sans doute à partir de constructions hétéroclites, naît une résidence de plan régulier, ouverte sur les jardins. Le château est annoncé par une avant-cour, le pont-levis est remplacé par un pont de pierre, les murs de la cour sont détruits, les fossés comblés et une terrasse aménagée autour du château. Le grand pavillon élevé près de l'entrée et les ailes abritant les communs et la chapelle sont détruits puis reconstruits. Les jardins sont remodelés et le parc augmenté. L'intervention de Le Nôtre pour le dessin d'un parterre est mentionnée sur un devis. Les successeurs de Monseigneur de la Vrillière poursuivent les travaux et apportent chacun des embellissements. A la fin du XVIIIe siècle, la façade antérieure sur cour du corps de logis s'agrémente d'une galerie. En 1784, une nouvelle basse-cour est bâtie. En 1791, le domaine est vendu comme bien national. Entre 1858 et 1891, la restauration du domaine est entreprise par le Baron de Laître, avec le concours de l'architecte Saglio. En 1862, il commanda, au paysagiste Paul de Lavenne de Choulot, un jardin agricole et paysager.","habitants":"Famille Guillaume de Cambray\r\n        \"","divers":"Turly  47° 07' 25\" Nord et 2° 28' 29\" Est","gps":"","images":["../image/image_18/18_Turly_1.jpg","../image/image_18/18_Turly_2.jpg","../image/image_18/18_Turly_3.jpg"]},"Consult_chateau_formulaire59a4":{"id":"Consult_chateau_formulaire59a4","dept":"18","canton":"Sancerre","commune":"Assigny-Subligny","nom":"Vallée_Assigny","type":"Château","periode":"XV-XVI","histoire":"A deux kilomètres au nord le château de la VALLEE est un château bâti à Assigny.  Ce château a été construit pour Pierre Du Houssay, conseiller du Roi au parlement de Bretagne et maître des requêtes, acquéreur de la vallée en 1582. dont La construction  date de la même année, est de style Renaissance. C'est la résidence privée de la Famille de Loynes de Fumichon,le bâtiment et le pigeonnier sont inscrits aux M.H. depuis 1971. Aujourdhui gîte de France.             La BOULAYE  a Subligny  chambre d'hôtes de monsieur jean Marie Chanez","architecture":"La BOULAYE a Subligny   ce château ayant un style architectural homogène et original et une tour d'escalier du XVe siècle comprenant une chambre de guet.                                                                     VALLEE  à Assigny  Le château se compose d'un grand corps de logis flanqué de deux ailes. L'aile gauche qui paraît plus ancienne forme un pavillon massif agrémenté d'une bretêche en encorbellement. Le corps central est à deux étages régulièrement percés et surmontés de lucarnes avec oeil de boeuf et volutes. A l'angle de ce corps et de l'aile droite, une tour massive circulaire se termine par un étage carré abritant une pièce. L'aile gauche présente une bretèche semblable à celle du grand pavillon. Les intérieurs présentent des salles avec cheminées dont quelques-unes ont conservé le décor peint d'origine. Les communs comprennent écuries et pigeonnier.","habitants":"Vallée Famille de Loynes de Fumichon                       Boulaye\r\n        \r\n        \"","divers":"Boulaye Grav 1-2                                                  Vallée Assigny grav 3à 7,  47° 25' 42\" nord, 2° 45' 20\" est","gps":"","images":["../image/image_18/18_Vall%c3%a9e_Assigny_1.jpg","../image/image_18/18_Vall%c3%a9e_Assigny_2.jpg","../image/image_18/18_Vall%c3%a9e_Assigny_3.jpg","../image/image_18/18_Vall%c3%a9e_Assigny_4.jpg","../image/image_18/18_Vall%c3%a9e_Assigny_5.jpg"]},"Consult_chateau_formulairefebf":{"id":"Consult_chateau_formulairefebf","dept":"18","canton":"Saint-Doulchard","commune":"Saint-Doulchard","nom":"Varye_Vouzay","type":"Château","periode":"XVI-XVII-XIX","histoire":"Deux chateaux à Saint-Doulchard, celui de Vouzay et celui de Varye et à cinq K.M. à l'oues t le château  de l'Ermitage Berry-Bouy chambres d'hôtes de Laurence de la Fage.                                                            VARYE  construit en 1870 sur trois niveaux, a été acquis par la ville en 2002, notre ambition était de faire de ce patrimoine de doulchard est devenu un haut lieu culturel autour de la peinture, de la musique, de la littérature et autres. Le domaine de Varye jouit d'un parc d'une superficie de quatre hectares environ. Le domaine est ouvert au public depuis la réhabilitation du château. \r\nVOUZAY est connu pour avoir été la retraite de l'abbé de Choisy.  Il fut le compagnon de jeu du jeune Philippe d'Orléans, frère du roi Louis XIV, qui s'y serait retiré pour écrire ses mémoires (Mémoires de l'Abbé de Choisy qui s'était déguisé en femme - publiées en 1735, se faisant passer pour la comtesse des Barres. Ce François Timoléon de Choisy né le 16 août 1644 avait été compagnon de jeu du « petit » Monsieur, Philippe dOrléans, et a conservé toute sa vie le goût prononcé de se travestir en femme. Avec lui le château de Vouzay se transforme en château de Crespon où y règne une comtesse des Barres qui aurait réussi à dépraver quelques jeunesses de bonnes familles Berruyère.  Au début du siècle, Vouzay, avant de passer entre les mains dune miss Maud Chesson, attire lil du philosophe Alain venu passé quelques jours, en 1903, chez sa sur alors directrice dune école maternelle à Bourges : Un monsieur Laski fait partie des propriétaires en 1930, puis à la famille Roman. Transformé en école ménagère agricole puis en accueil au groupement dentraide aux hadicapés inadaptés, cest aujourdhui un Institut médico éducatif.","architecture":"VOUZAY, est un édifice du XVIIe siècle proche de lancien canal de Berry et de la rivière lYèvre, le corps principal, couvert dune toiture en carène  renversées, était flanqué de deux  tours carrées  décrit dans une enfance dans la gueule du loup par Monique Lévi-Strauss. Cet hôtel qui, après avoir appartenu à plusieurs familles des Bastard, et des Lallemant a pris sa silhouette architecturale définitive grâce à un sieur Barjon.  Son heure de gloire reste hypothétique mais souvent énoncée en souvenir du séjour dun certain abbé de Choisy, Timoélon de son prénom qui avait « cru que la ville de Bourges  lui conviendrait et quil pourrait  faire ce quil lui plairait . Le château paraît grand, on devine, sous un toit en bateau surmonté de clochetons, un logis bas et long, à hautes fenêtres. Deux autres bâtiments encadrent une cour rectangulaire.","habitants":"Famille des Bastard                                                  François Timoléon de Choisy\r\n        \"","divers":"Hermitage grav 1-2           Varye grav-4               Vouzay grav 3 47° 05' 08\" Nord et 2° 21' 30\" Est","gps":"","images":["../image/image_18/18_Varye_Vouzay_1.jpg","../image/image_18/18_Varye_Vouzay_2.jpg","../image/image_18/18_Varye_Vouzay_3.jpg","../image/image_18/18_Varye_Vouzay_4.jpg"]},"Consult_chateau_formulaire7b9a":{"id":"Consult_chateau_formulaire7b9a","dept":"18","canton":"Sancerre","commune":"Crézancy en Sancerre,","nom":"Vauvredon","type":"Maison forte","periode":"XIII-XVI","histoire":"VAUVREDON,  le fief de Vauvredon est mentionné dès 1255 et dépend de la juridiction des Aix d'Angillon. Au début du XVIe siècle, Jean Turpin, seigneur de Vaufreland, en est détenteur. Le fief demeurera dans cette famille Turpin jusquau mariage dune des filles avec le chancelier de France Michel le Tellier en 1629. En 1739 le château et les terres sont la propriété de David Perrinet du Pezeau, fermier général et secrétaire du roi, seigneur de Reigny, Jars, Boucard et Tour de Vesvre. Aujourd'hui  chambres dhôtes et gîtes de France de Raymond Cirotte.","architecture":"VAUVREDON, Si limplantation de la demeure seigneuriale peut dater du XIIIe siècle, le gros uvre et les éléments architecturaux encore en place (tour d'escalier ronde sur la façade, encadrements des baies moulurés), attestent une construction du XVe  ou du XVIe siècle, la tour carrée avec toit en pavillon sur le pignon nord date de la fin du XVIIe siècle. En 1690, le terrier de Vauvredon et du Briou, mentionne  un grand corps de logis couvert de tuiles comprenant deux chambres basses à cheminée, une grande cuisine et trois chambres hautes, avec grenier au-dessus. La tour circulaire sur  la façade ouest, signalée sur le plan cadastral de 1819, a aujourd'hui disparu, ainsi que les douves entourant le logis, ce dernier a été agrandi au sud au siècle dernier. Lensemble a été restauré en 2005. Les autres bâtiments de ferme ont disparu ainsi que le colombier mentionné dans lacte de 1690.","habitants":"Famille Turpin\r\n        \"","divers":"Château de Vauvredon","gps":"","images":["../image/image_18/18_Vauvredon_1.jpg","../image/image_18/18_Vauvredon_2.jpg","../image/image_18/18_Vauvredon_3.jpg","../image/image_18/18_Vauvredon_4.jpg"]},"Consult_chateau_formulaired1bb":{"id":"Consult_chateau_formulaired1bb","dept":"18","canton":"Aubigny sur Nère","commune":"Oizon","nom":"Verrerie_Stuart","type":"Château","periode":"XVI","histoire":"VERRERIE, en 1670, le dernier Stuart dAubigny séteint et le château de La Verrerie, comme prévu dans lacte de donation du Roi Charles VII, revient à la Couronne de France. Le Roi Louis XIV, par arrêt du conseil du 18 mars 1673, restitue cette terre à Charles II, Roi dAngleterre et descendant en ligne directe et masculine de Jean Stuart. A la demande de ce dernier, don en est fait la même année à sa favorite, Louise de Kéroualle, duchesse de Portsmouth. En 1734, le duc de Richmond, fils de Louise de Kéroualle et Charles II dAngleterre hérite de la seigneurie érigée en duché-prairie. En 1842, les héritiers vendent le château et la terre dAubigny à Léonce de Vogüé, aïeul des propriétaires actuels. En 1895, le marquis Louis de Vogüé fait construire laile Sud qui abrite aujourdhui les pièces de réception et la plupart des chambres. En 1962, le comte Antoine de Vogüé, alors maire de la commune dOizon et ce depuis 1953 qui sera conseiller général du Cher en 1964  sinstalle définitivement au rez-de-chaussée de laile Nord. En 1965, il ouvre le château à la visite et rejoint la Route Jacques-Cur. En 1978, la comtesse Antoine de Vogüé, son épouse, crée le restaurant « La Maison dHélène » . En 1982, elle initie les chambres dhôtes. Elle réside aujourdhui dans la grande demeure située à larrière du restaurant et dénommée « le Gros Chêne ».  En 1993, leur fils, le comte Béraud de Vogüé et sa famille, de retour du Canada et des Etats-Unis, prennent la suite de laffaire familiale.  Seul propriétaire de La Verrerie à y avoir vu le jour, il uvre actuellement en permanence à la promotion de La Verrerie et dautres châteaux privés, réunis au sein de la route Jacques-Cur dont il est le président. Toujours dans la famille des Vogüé.","architecture":"VERRERIE, lorigine du château de La Verrerie remonte à 1422. Fastueux aux espaces démesurés, une grande importance est donnée aux pièces de reception. Une maison de garde fut élevée. Une petite fabrique de verre, située alors au bord du lac mais démolie en 1815 inspira le nom de « La Verrerie ». \r\nLe corps de logis la chapelle et le poterne sont de style Louis XII et ont été construits pour Béraut Stuart à la fin du XVe siècle. L'aile sud avec galerie aussi de style Renaissance a été ajoutée vers 1525 pour Robert Stuart et Jacqueline de la Queille. L'escalier à vis est en hors-d'uvre. Des modifications et agrandissements ont été effectués en 1894.  Mais le château ne fut pas construit avant la fin du XVe siècle, période pendant laquelle Béraud Stuart, petit-fils de Jean Stuart, à son retour de la campagne dItalie, fait ériger le corps de logis principal dans le prolongement de la Chapelle et qui rejoint la Galerie « Renaissance » construite en 1525 par Robert Stuart, gendre de Béraud Stuart et compagnon darmes de Bayard.","habitants":"Comte Antoine de Vogüé\r\n        \"","divers":"Verrerie-47° 25' 23,66\" Nord et 2° 31' 18,60\" Est","gps":"","images":["../image/image_18/18_Verrerie_Stuart_1.jpg","../image/image_18/18_Verrerie_Stuart_2.jpg","../image/image_18/18_Verrerie_Stuart_3.jpg","../image/image_18/18_Verrerie_Stuart_4.jpg","../image/image_18/18_Verrerie_Stuart_5.jpg"]},"Consult_chateau_formulaire39e7":{"id":"Consult_chateau_formulaire39e7","dept":"18","canton":"Vierzon","commune":"Vierzon","nom":"Vierzon","type":"Patrimoine","periode":"XVII","histoire":"VIERZON, au Xe siècle, les Vikings y fortifient sur une motte féodale. Ils deviennent seigneurs de Vierzon et la ville se développe à l'intérieur de remparts, à l'ouest du château. En 980 Humbold le Tortu, seigneur de Vierzon, fera construire dans les alentours une forteresse constituée d'une motte fortifiée. Cette forteresse, plusieurs fois modifée et agrandie par la suite, restera dans la Maison de Vierzon plusieurs siècles, et deviendra le château de La Ferté-Imbault.  Le Beffroi, trace entière du château, voisine avec une ancienne tour carrée dont il ne reste que le rez-de-chaussée, encore visibles, la tour du guet, des vestiges de rempart, une partie du chemin de ronde, les meurtrières de l'ancien poste de garde.   La ville compte trois châteaux. Celui de la NOUE, du XIIIe siècle un ancien fief. Il est passé au fil des siècles entre de nombreuses mains jusqu'à sa destination finale, l'hôpital dit de la Noue. Autre château, celui de CHAILLOT (Moyen-Age), propriété de la famille Giscard d'Estaing , le frère de l'ancien président de la République. Troisième château, celui de Fay. Propriété en 1844 d'Edouard Mac-Nab, le père de Maurice Mac-Nab, célèbre chansonnier du cabaret du Chat-Noir à Montmartre. Et plus tard, propriété de Célestin Gérard, le fondateur du machinisme agricole à Vierzon.             LA-NOUE, ce château aurait été bâti par Antoine Bourdaloue, secrétaire du duc de Guise,  transformé en un centre hospitalier.                                               Hôtel de la MONNAIE pour avoir participé à la Croisade au côté du Roi de France Louis VII le Jeune, Hervé 1er seigneur de Vierzon est confirmé dans son privilège de battre monnaie. Ce bâtiment médiéval fut racheté au XIXe siècle par les Frères et transformé en école libre. Aujourd'hui, il s'agit du collège Notre-Dame.","architecture":"GAILLARDIERE, manoir marque la préoccupation de sécurité engendrée par les guerres civiles du début du règne de Louis XIII. Toutes les ouvertures s'ouvrent sur une cour entourée de murs. Sur l'extérieur, à l'ouest, deux tours flanquent la façade, l'une contenant un pigeonnier, l'autre un escalier. Le corps principal a deux étages. Une porte avec auvent en charpente donne accès au rez-de-chaussée. Le comble a conservé ses deux épis en plomb ornés, de même que la tour d'escalier. Le bâtiment principal se prolonge au nord par un corps à rez-de-chaussée, chargé de deux lucarnes en pierre de même composition classique que celles du pavillon. Un petit mur sépare la cour de ce logis seigneurial de celle du domaine situé à l'ouest et qui comprend des bâtiments d'exploitation. Au nord-ouest, un autre enclos rejoint les précédents, protégeant le potager. Dans un angle se trouve un pavillon carré en ruine.                                                   Château de la MONNAIE   à deux niveaux sur soubassement, lucarnes sur comble, accolée d'une tour ronde toit en poivrière avec lucarne côté façade.    La NOUE, vers 1640, certaines parties pourraient remonter à 1620. Situé au sud d'une cour dont l'accès se fait par une porte sous une tour carrée, le château comprend un sous-sol, un rez-de-chaussée surélevé, un étage et deux ailes aux extrémités. Les lucarnes en pierre sont à pilastres et frontons triangulaires ou arrondis. Un perron donne accès au rez-de-chaussée. En façade nord, des tourelles saillantes ont été ajoutées. Communs et puits. La tour pourrait être un vestige de fortification.","habitants":"Seigneur locaux                                                              La Noue Antoine Bourdaloue\r\n        \"","divers":"Vierzon grav 1-2-3       La Noue grav 4-5-6-7 Gaillardière grav 8        Monnaie  grav-9","gps":"","images":["../image/image_18/18_Vierzon_1.jpg","../image/image_18/18_Vierzon_2.jpg","../image/image_18/18_Vierzon_3.jpg","../image/image_18/18_Vierzon_4.jpg","../image/image_18/18_Vierzon_5.jpg","../image/image_18/18_Vierzon_6.jpg","../image/image_18/18_Vierzon_7.jpg","../image/image_18/18_Vierzon_8.jpg","../image/image_18/18_Vierzon_9.jpg"]},"Consult_chateau_formulaire1ba4":{"id":"Consult_chateau_formulaire1ba4","dept":"18","canton":"Sancerre","commune":"Léré","nom":"Villattes","type":"Château","periode":"XV-XIX","histoire":"VILLATTES, construit entre le XVe et le XIXe siècle, le château de Villattes situé entre Léré et Savigny-en-Sancerre garde de la construction originelle ces deux corps de bâtiment entouré de douves. Appartenant au XVIe siècle à la famille Louzeau il est dans la même famille depuis 1609. Successivement propriété des Reugnys puis des Michel La Barre, est classée parmi les M.H. depuis 1922.","architecture":"VILLATES, le logis, de plan rectangulaire, assez massif, s'appuie sur deux tours rondes s'élevant à ses angles nord-est et sud-est, à droite de sa façade sur cour est appliquée une importante tour d'escalier polygonale, hors-oeuvre. Cette façade principale, largement percée par de grandes croisées où s'affirme un décor flamboyant, intégrant quelques motifs de la première Renaissance, est un bel exemple de l'architecture des années 1500, de style Louis XII. Les autres façades, comme celle de l'aile droite sur cour, construction médiévale, en retour d'équerre, ont été repercées au XVIIIe siècle. Les toitures de l'ensemble de l'édifice furent alors modifiées. L'édifice était protégé par de larges fossés, en partie conservés aujourd'hui, qu'un pavillon d'entrée permettait de franchir, à l'est. De part et d'autre de celui-ci, des dépendances étaient adossées à l'enceinte. Les communs situés au sud furent bâtis ou reconstruits dans les dernières années de l'ancien régime. Après 1812, l'ouvrage d'entrée et les dépendances qui se développaient au nord furent détruites. Il ne reste que les bases de la tourelle qui protégeait l'angle nord-est de l'enceinte. A la fin du XIXe siècle, un grand pavillon carré fut adossé à la façade latérale de l'aile du corps de logis. La tour d'escalier a conservé son décor architectural des années 1500, et l'oratoire aménagé dans la tour d'angle nord-est présente un rare décor peint à la fin du XVIIe siècle :  Des vues perspectives accompagnent le décor en trompe-l'oeil.","habitants":"Famille Louzeau\r\n        \"","divers":"Château de Vilattes à Léré","gps":"","images":["../image/image_18/18_Villattes_1.jpg","../image/image_18/18_Villattes_2.jpg","../image/image_18/18_Villattes_3.jpg"]},"Consult_chateau_formulairec52a":{"id":"Consult_chateau_formulairec52a","dept":"18","canton":"Saint-Germain-du-Puy","commune":"Saint-Germain du Puy","nom":"Villemenard","type":"Gentilhommière","periode":"XV","histoire":"VILLEMENARD,  romaines. En 1231, apparaît sur le territoire de la commune la Villa Menardi qui devient Praeria de insula Menardi en 1236 et enfin Villemenard en 1945.  Le château dela famille de Bar de Ménardi, Villemenard était à l'origine un domaine. Si le gros oeuvre remonte à l'époque du roi Chales VII qui obtint le 3 décembre 1436 l'autorisation de fortifier sa maison, son fils Désiré poursuivra les travaux en 1519 et son neveu Denis interviendra à son tour en 1517. puis, vers 1580, des « Cousin », des « Fradet ». Jean II de Bar, fils de Jean I de Bar, valet de chambre du duc Jean de Berry, hérite du demi-fief de Villemenard et, en 1435, achète l'autre moitié de la terre. Thaumas de la Thaumassière, historien du Berry  lui attribue la construction du manoir de Villemenard ; l'un des héritiers de ce dernier, Pierre de Bar, écuyer et valet de chambre du roi Charles VII, seigneur de Villemenard et de Saint-Germain-du-Puy, Au cours des siècles suivants, la terre fut morcelée, les bâtiments transformés en ferme, maison de repos pour enfants, ce qui les sauva. Régine et Robert Leloup les propriétaires actuel procèdent à une restauration de l'édifice qui retrouve une utilisation plus conforme à sa noblesse en servant de lieu pour expositions, de salle de théâtre.","architecture":"VILLEMENARD, entouré de fossés à l'origine, présente deux enceintes, la première, probablement édifiée au XVII e siècle renfermant la basse-cour. La seconde, plus restreinte et fortifiée, c'est le château, construction quadrangulaire des XV e et XVI e siècles, était à lorigine une maison avec un domaine rural.","habitants":"Famille de Pierre de Bar\r\n        \"","divers":"Château de Villemenard,  47° 06' 00\" Nord et 2° 28' 55\" Est","gps":"","images":["../image/image_18/18_Villemenard_1.jpg","../image/image_18/18_Villemenard_2.jpg","../image/image_18/18_Villemenard_3.jpg"]},"Consult_chateau_formulaire4f67-2":{"id":"Consult_chateau_formulaire4f67-2","dept":"18","canton":"Charost","commune":"Villeneuve sur Cher","nom":"Villeneuve_Cher","type":"Château","periode":"XIV-XVII","histoire":"VILLENEUVE, indique une origine romaine : Villanova. Des époques plus récentes (début du Moyen-Âge), nous parviennent des monuments isolés ou faisant partie du bourg dont les plus marquants dans le paysage sont :                                                        GALIFARD (ruines du XIV et XV siècles), en 1986, la commune a acquis lensemble immobilier de Galifard. VILLENEUVE  du XV, XVI, XVII, XVIII siècles, le corps de lhabitation occupait le côté nord. Après les remaniements effectués entre le XVIIe et le XIXe siècles, seules les deux tours défendant le pont-levis subsistent de la construction des XVe et XVIe siècles. Lune delles est transformée en colombier, et une chapelle adossée à la courtine nord a été bâtie entre les deux tours au XVIII siècle.   Aujourdhui, ce château privé est habité en permanence, dont une partie a été transformé en gîte rural et chambre dhôtes                                                                      MOULIN-NEUF du XVI, XVII, XIX siècle.        BREUX,   Mr Moreau Des Breux, suite à son union avec une des filles de Mr Soumard, propriétaire à cette époque du château de Villeneuve, a fait construire ce château en 1850. Dune très belle architecture.","architecture":"BREUX du XIXe siècle, le château actuel remanié date de 1860 et a été construit sur la base dun ancien manoir. Dune très belle architecture. Cest une très belle demeure avec de grandes lucarnes de style XVIe siècle et, au centre une tour polygonale en briques et pierres. A larrière, on peut toujours admiré le pigeonnier et le pavillon de chasse.                        GALIFARD Les ruines du château sont les vestiges de ce petit manoir. La tour ronde, comprend un escalier en mauvais état qui desservait le 1er étage ; où pouvaient  voir des cheminées à montants cannelés et rudentés du XVII. La porte dentrée, voûtée de plein cintre, est surmontée dun cartouche soutenu de rampants à volutes et couvert dun fronton très bas.\r\nEn 1986, la commune a acquis lensemble immobilier de Galifard, transformé depuis en salles des fêtes. Il y existe aussi deux maisons dhabitation. Il existait également une bergerie mais elle a été détruite car les travaux de restauration étaient trop importants.             \r\nLa TOUR patrimoine architectural privé le plus ancien du bourg, cette tour, accessible, par un perron, comporte 3 étages. Le toit saillant et trés élevé couvre un vaste grenier-colombier. En effet, cest dans les combles de la tour quétait installé le pigeonnier avec ses petites alcôves de céramiques.  Elle dépend initialement du château de Villeneuve. Probablement érigé dans les années 1450, on ne connaît pas ses commanditaires ni sa destination dorigine. Toutefois, elle aurait pu servir aussi de poste de guet au passage du Cher, ou de relais sur un chemin de Compostelle.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Ruines de Galifard grav1-2                             Villeneuve grav 3-4                                                Moulin Neuf grav-5                                                    Breux grav_6","gps":"","images":["../image/image_18/18_Villeneuve_Cher_1.jpg","../image/image_18/18_Villeneuve_Cher_2.jpg","../image/image_18/18_Villeneuve_Cher_3.jpg","../image/image_18/18_Villeneuve_Cher_4.jpg","../image/image_18/18_Villeneuve_Cher_5.jpg","../image/image_18/18_Villeneuve_Cher_6.jpg"]},"Consult_chateau_formulairefea2":{"id":"Consult_chateau_formulairefea2","dept":"18","canton":"Avord","commune":"Villequiers","nom":"Villequiers","type":"Château","periode":"XV","histoire":"VILLEQUIERS En 1483, la baronnie de Montfaucon est achetée par Jacques de Chazeron (mari d'Anne d'Amboise, fille de Pierre Ier d'Amboise et d'Anne de Bueil-Sancerre, cette dernière étant fille de Jean IV de Bueil et de Marguerite-Dauphine d'Auvergne héritière de Sancerre, donc issue des anciens seigneurs de Montfaucon), d'une famille auvergnate qui la conservera plus d'un siècle. Puis Henri II de Bourbon, prince de Condé et gouverneur du Berry (petit-fils de Louis Ier de Condé et d'Éléonore de Roye-Conti-Roucy, une descendante des comtes de Roucy ci-dessus et donc des anciens Montfaucon), déjà seigneur de Baugy, achète la baronnie en 1626. Henri II de Condé se constitue d'ailleurs un immense domaine en Berry, acquérant notamment les comtés de Châteauroux (1612) et de Sancerre (1640). \r\nEnfin, le prince Armand de Bourbon-Conti, deuxième fils d'Henri II de Condé et frère cadet du Grand Condé, vend en 1663 la baronnie de Montfaucon à Louis-Marie-Victor d'Aumont de Rochebaron, marquis de Villequier, baron de Chappes, de Nolay et d'Estrabonne, 2e duc d'Aumont à Isle-Aumont (qui d'ailleurs descendait des anciens sires de Montfaucon par son ancêtre Françoise de Sully-Beaujeu, femme de Pierre IV d'Aumont). Montfaucon devient alors Villequiers, son nom actuel, venu d'un titre seigneurial de la Maison d'Aumont : Villequier , faisant référence au fief de Villequier, actuelle commune de Seine-Maritime. Les articles château de Villequier et Antoinette de Maignelais), qui avait appartenu à des ancêtres maternels des d'Aumont mais qu'ils ne possédaient plus. Les d'Aumont ont aussi honoré le nom de Villequier en rebaptisant ainsi leur terre de Genlis en Picardie : Villequier-Aumont, ou duché de Villequier.","architecture":"VILLEQUIERS, à A mi-chemin entre Nevers et Bourges,  château XVe siècle , corps de logis rectangulaire à deux niveaux, lucarne sur haute  comble accolé d'une tour ronde toit en poivrière et à l'opposé en angle intérieur donjon carré également accolé d'une tourelle avec dépendance en retour d'équerre.                                                           COLOMBIER, corps de logis entre deux pavillons  latéraux l'ensemble à deux niveaux toit en croupes avec série de lucarnes.","habitants":"Famille de Jacques de Chazeron \r\n        \"","divers":"Villequiers 47° 04' 13\" nord, 2° 48' 20\" est     Colombiers grav-3","gps":"","images":["../image/image_18/18_Villequiers_1.jpg","../image/image_18/18_Villequiers_2.jpg","../image/image_18/18_Villequiers_3.jpg","../image/image_18/18_Villequiers_4.jpg"]},"Consult_chateau_formulairec9f1-4":{"id":"Consult_chateau_formulairec9f1-4","dept":"18","canton":"Avord","commune":"Chassy","nom":"Villiers_Chassy","type":"Château","periode":"XV-XVI","histoire":"VILLIERS, le château actuel semble avoir été construit entre 1410 et 1427 par Guillaume Fouchier, écuyer du duc de Berry. En 1520, René Thizart, trésorier de la Garde Ecossaise de François Ier, obtint la seigneurie de Villiers et débaptise le Champ Raymbault, nom de ce château où il résidait, pour lui donner le nom de Villiers, Un siècle plus tard, René Tizart, trésorier de la garde écossaise de François Ier, lui fit attribué le nom du château voisin de Villiers dont ne subsiste que le colombier. Le château de Villiers possédait aux XVIIe et XVIIIe des jardins à la française en parterres, abandonnés à la Révolution. Les propriétaires ont entrepris la restauration de la demeure et ont créé de nouveaux jardins à partir de 1985 possèdant un bel étang peuplé de hérons et un quinconce de néfliers. Au delà du jardin floral, une collection de Syringas, un jardin de roses et un bosquet de Deutzias.","architecture":"VILLIERS . Le château comprend un ensemble de bâtiments groupés autour de deux cours séparées avec tourelle d'escalier et deux tours  rondes. Les bâtiments situés autour de la cour des communs, rebâtis au XVIIe siècle, forment un quadrilatère dans l'axe duquel se trouve le pigeonnier carré, servant de passage charretier au rez-de-chaussée. Des deux corps de logis qui entouraient la cour du château n'en subsiste plus qu'un accosté de deux tours. L'autre corps de logis a été détruit et les douves comblées à partir de 1652, la chapelle et l'allée couvert qui reliaient les deux corps de logis, furent démolies en 1778. Le moulin à vent dit du château de Villiers est du XIXe siècle, construit en pierre, il est de type tour, et conserve ses ailes, l'arbre, les mécanismes (en mauvais état) et une paire de meules.","habitants":"Famille de Guillaume Fouchier\r\n        \"","divers":"Villiers 47° 01' 52\" Nord et 2° 50' 30\" Est","gps":"","images":["../image/image_18/18_Villiers_Chassy_1.jpg","../image/image_18/18_Villiers_Chassy_2.jpg","../image/image_18/18_Villiers_Chassy_3.jpg"]},"Consult_chateau_formulaire8f0c":{"id":"Consult_chateau_formulaire8f0c","dept":"18","canton":"Avord","commune":"Vornay","nom":"Vornay","type":"Château","periode":"XVIII-XIX","histoire":"VORNAY, les fondations du château remontent au XIIe siècle. Cet ancien fief avait ses seigneurs particuliers : Guillaume de Soupezes au XIIIe siècle, les familles Jobert au XVe siècle , Seurrat et Pecquot au XVIIe siècle. Le Seigneur de Tristan puis la famille Jarre rayonnent sur cette propriété durant le XIXe siècle. Outre le château, plusieurs domaines voisins, un moulin à vent et un moulin à eau forment alors cette vaste propriété. Plus récemment, dans les années 1960-1970, le château a abrité une colonie de vacances du comité dentreprise de Renault.\r\nCHAISE, durant une très longue période qui démarre avant la Révolution et qui se termine en 1905, la famille Vivier de la Chaise règne sur ce domaine qui regroupe lui aussi à cette époque de nombreuses petites fermes voisines.                                              ST-AIGNAN, construit à partir de 1866, sur les plans de Clément Parent, architecte parisien, à l'initiative de la famille Seurrat de Loynes de Morette, le château de Saint-Aignan jouit d'une vue unique sur la Loire.\r\n Elle fût bénie le 26 août 1869. Pour la petite histoire, l'ensemble de la toiture a été détruit à la suite d'un incendie survenu en février 1941. Elle a été remplacée par une terrasse avec acrotère (ornement sculpté).\r\nEnfin, les jardins entourant la demeure, ont été imaginés et aménagés par Lebreton, paysagiste orléanais.\r\nLa FEULARDE, à deux kilomètres au sud ouest le château de la Feularde. doté dune magnifique chapelle. Ce château conte une histoire intéressante avec plusieurs destructions. En 1380, le domaine appartient à Guillaume de Chauvigny puis passe aux mains de plusieurs propriétaires jusquen 1879 où il est laissé à labandon. La dernière reconstruction date de 1902. Le château ne se visite pas.","architecture":"ST-AIGNAN,  la construction de cet édifice, portant le nom du saint patron protecteur de la famille de Loynes de Morette, qui en avait gardé les reliques pendant la Révolution, dura trois ans sous la direction d'Alfred- de-Bengy de Puy-Vallée. L'arrivée des pierres a connu quelques difficultés en raison de la crue du fleuve en 1866. Ce qui a conduit au retard de l'édification de la chapelle de style néorenaissance, aux voûtes élevées, ornées de clefs où l'on voit les armoiries de la famille.   FEURLADE, manoir flanqué d'un corp de logis à deux niveaux et lucarnes sur combles entre deux pavillons rectangulaires  sur flancs                                                                                                                          SOUPIZE, identique  au château de Feurlade mais plus important à trois niveaux, corps de logis central  à six travées.   Les fondations du château remontent au XIIe siècle.    CHAISE, corps de logis oblong  rectangulaire à  deux niveaux  accolés de pavillons droit et gauche  dont un à deux niveaux en décrochement,  une tour ronde à quatre niveaux toit en poivrière Le château ou maison de maître porte également le nom de « manoir » sur de très anciens documents.","habitants":"St-Aignan,  famille Seurrat de Loynes de Morette          Feularde Guillaume de Chauveigny\r\n        \"","divers":"Soupize grav 1-2                                                            Chaise grav-3                                                                 Feurlade grav 4                                                              St-Aignan grav-5","gps":"","images":["../image/image_18/18_Vornay_1.jpg","../image/image_18/18_Vornay_2.jpg","../image/image_18/18_Vornay_3.jpg","../image/image_18/18_Vornay_4.jpg","../image/image_18/18_Vornay_5.jpg"]},"Consult_chateau_formulaire781b-2":{"id":"Consult_chateau_formulaire781b-2","dept":"18","canton":"Saint-Martin-d","commune":"Vouzeron","nom":"Vouzeron","type":"Château","periode":"XIX","histoire":"VOUZERON  Il est bâti par Gabriel-Hippolyte Destailleur pour le baron Eugène Roger dans les années 1887-1893. Destailleur avait, quelques années auparavant, édifié le château de Franconville à Saint-Martin-du-Tertre (Val-d'Oise), pour le duc de Massa, demi-frère du baron Roger. C'est en voyant Franconville que le Baron chargea Destailleur de lui édifier un château sur un vaste terrain qu'il possédait dans le Cher.  La porte d'honneur  qui est située sur la gauche du bâtiment et non au centre  ouvre sur un hall qui dessert plusieurs pièces. Trois pièces principales, construites en enfilade, servaient de pièces de réception. Elles sont chacune ornées de cheminées copiées des cheminées royales de François Ier. Un escalier d'honneur en bois et orné de têtes de lions sculptées dessert le premier étage où étaient les chambres. Trois autres étages servaient pour les domestiques. Un ingénieux système d'ascenseur et de rails permettait l'acheminement du bois, de la nourriture etc. Il est à noter que l'année de l'achèvement de la construction a débuté celle du château de Trévarez, dans le département du Finistère, réalisé par le fils de Gabriel-Hippolyte Destailleur, Walter-André Destailleur. Le château est acheté en 1937 par lUnion des syndicats des travailleurs de la métallurgie de la région parisienne (CGT) qui le transforme pour lutiliser comme colonie de vacances jusquen 1939. Puis il devient le centre Louis Gatignon. Les deux châteaux présentent de très nombreuses similitudes, tant dans les volumes et le style que dans les aménagements de grand luxe déployés, a été vendu, en 2003, à un particulier néerlandais. Le château est inscrit au titre des M.H. en 1995. En 2006 un industriel hollandais l'achète.","architecture":"VOUZERON,  est un château de style néo-gothique et Renaissance dont le bâtiment principal  s'étend sur 2 000 m2. Des travaux ont été entreprit  en 2003 par le nouveau propriétaire. Le domaine comprend deux châteaux élevés à proximité d'une motte castrale : le vieux château ou petit château, construit vers 1850, probablement pour le marquis de Châteaumorand, et, proche de celui-ci, le château neuf ou grand château, La maison de garde a été édifiée par Walter Destailleur, avec un rond-point d'entrée dessiné par l'architecte-paysagiste Henri Duchêne. Les dépendances, jardins et parc ont été réalisés à la fin du XIXe siècle. Cet ensemble constitue un témoignage sur le fonctionnement d'un grand domaine de chasse en Sologne à la Belle Epoque.                                    Chateau du BEAUCHENE à Allogny à 8 Km au sud-Est  et à cinq km au nord à Neuvy sur Barangeon,  le château de Sainte Lunaise.","habitants":"Baron Eugène Roger \r\n        \"","divers":"Vouzeron  47° 15' 17\" nord, 2° 14' 10\" est1","gps":"","images":["../image/image_18/18_Vouzeron_1.jpg","../image/image_18/18_Vouzeron_2.jpg","../image/image_18/18_Vouzeron_3.jpg"]},"Consult_chateau_formulairec8d4":{"id":"Consult_chateau_formulairec8d4","dept":"18","canton":"Dun-sur-Auron","commune":"Chalivoy-Milon","nom":"Yssertieux","type":"Château","periode":"XV","histoire":"YSSERTIEUX, est un château bâti à Chalivoy-Milon. Il est fait mention du site dès le IXe siècle. Les seigneurs de la Porte vont faire construire le château-fort, au XIe siècle.  Louis Joseph Charles de La Porte d'Yssertieux marquis, propriétaire, chevalier de Saint-Louis. Angélique Henriette Saucoire de Tenancez marié le 9 février 1831, à Bourges , avec Augustine Louise Panon Desbassayns de Montbrun, née le 11 janvier 1812 à Saint-Denis, La Réunion, décédée en 1850 à l'âge de 38 ans  Parents : H Henri Charles Panon Desbassayns de Montbrun, voir receveurs généraux 1772-1851 et   Anne Louise Thérèse Charlotte Sophie Fabus de Vernan 1786-1865.","architecture":"YSSERTIEUX, Les quatre tours et la courtine dateraient du XIVe siècle, mais l'ensemble a été remanié à plusieurs reprises. La partie classée, qui date du XVe siècle, est la façade et la toiture du côté sud-sud-est. Au XIe siècle : première mention de seigneurs de la Porte qui construisent le château fort d'Yssertieux. Les quatre tours et la courtine qui subsistent datent probablement du XIVe siècle. Elles ont été très remaniées en 1424 pour Odast de la Porte. A la fin du XVe siècle, Pierre de la Porte fait construire l'ouvrage d'entrée. Au XVIe siècle, Jean V obtient l'autorisation d'établir une chapelle. En 1656, un logis neuf remplace le donjon qui occupait le côté nord. En 1856, deux galeries sont construites à la place des courtines ouest et est, le logis est rehaussé d'un étage et les fenêtres des tours adjacentes modifiées.","habitants":"Louis Joseph Charles de La Porte d'Yssertieux \r\n        \"","divers":"Yssertieux  46° 51' 37\" Nord et 2° 42' 23\" Est              Chalivoy 46° 55' 53\" Nord, 2° 47' 06\" Est","gps":"","images":["../image/image_18/18_Yssertieux_1.jpg","../image/image_18/18_Yssertieux_2.jpg","../image/image_18/18_Yssertieux_3.jpg","../image/image_18/18_Yssertieux_4.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','18 — Cher'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
