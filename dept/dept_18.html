 appartements du rez-de-chaussée, démolition du portail et de la terrasse d'entrée. Une nouvelle restauration a eu lieu en 1907-1910 : rétablissement des couronnements des lucarnes et croisillons des fenêtres du grand pavillon, reprise complète des maçonneries de l'aile gauche.","habitants":"Famille de Gamaches,\r\n        \"","divers":"Jussy- 46° 59' 10\" nord, 2° 38' 41\" est","gps":"","images":["../image/image_18/18_Jussy_Champagne_1.jpg","../image/image_18/18_Jussy_Champagne_2.jpg","../image/image_18/18_Jussy_Champagne_3.jpg","../image/image_18/18_Jussy_Champagne_4.jpg","../image/image_18/18_Jussy_Champagne_5.jpg","../image/image_18/18_Jussy_Champagne_6.jpg"]},"Consult_chateau_formulairef52e":{"id":"Consult_chateau_formulairef52e","dept":"18","canton":"Sancerre","commune":"Saint-Bouize","nom":"Lagrange_Montalivet","type":"Château","periode":"XVII","histoire":"LAGRANGE-MONTALIVET, nouveau château aurait été élevé à partir de 1595 pour Antoine de La Grange, seigneur d'Arquian, gouverneur de Berry durant les guerres de la Ligue. Celui-ci aurait vendu le château inachevé à son frère François de La Grange, seigneur de Montigny, gouverneur de Berry, grand maître de la cavalerie de France qui en aurait terminé la construction vers 1610. L'attribution à la famille de Buffevant (ou Buffevent) est plus probable, soit à Louis, seigneur de la Grange-Chaumont, gentilhomme ordinaire de la Chambre du roi en 1585, soit à Louis II, devenu gouverneur d'Auxerre, qui, en 1628, épousa Marie-Anne de Bretagne. L'aveu et dénombrement de la terre de La Grange rendu par ce dernier en 1640 mentionne le lieu et manoir ancien de ladite seigneurie. En 1647, la famille Buffevent accueille saint Vincent de Paul à La Grange. En 1655, dans l'aveu et dénombrement rendu par Marie-Anne de Bretagne, veuve de Louis II de Buffevent. En 1763, le château est acquis par François Brisson, président de la première chambre des enquêtes du Parlement de Paris. Au XVIIIe siècle,  le domaine est restauré sous la Restauration par le comte Jean-Pierre Bachasson de Montalivet, haut dignitaire de l'Empire puis ministre de l'Intérieur de Napoléon 1er, acquéreur de La Grange en 1807-1816, dues à Camille de Montalivet, ministre de l'Intérieur de Louis-Philippe puis ministre de l'Académie des Beaux-Arts entre 1830 et 1865. A sa mort, le domaine revint à sa fille Marie-Amélie, filleule du roi Louis-Philippe et de la reine Marie-Amélie, qui avait épousé en 1861 le comte Gustave Guyot de Villeneuve. Leur petit-fils M .Pierre Guyot de Villeneuve en est propriétaire.","architecture":"A huit kilomètres au sud le château de HERRY dont je n'ai pas d'information historique sur cette imposante bâtisse de plan en T à deux niveaux avec série de lucarnes sur un toit brisé, deux tours rondes accolée au corps de logis .                                                          LAGRANGE-MONTALIVET, du château détruit en 1569, il ne reste qu'une salle voûtée située dans le bâtiment ouest des communs, reconstruit à partir de 1590, est formé corps de logis central flanqué de deux pavillons. L'entrée se fait côté cour par un perron semi-circulaire et côté parc par un escalier en fer-à-cheval.  Si la construction du château a pu intervenir entre 1640 et 1665, en revanche celle des communs semble antérieure et dater du règne d'Henri IV. En 1698, Paul de Grivel hérite de La Grange et fait modifier la décoration intérieure. Certains des communs sont ornés de parements de bois découpé. \r\nMontalivet fit remonter dans le vestibule les lambris au décor Rocaille avec les dessus-de-porte où sont posées des toiles peintes provenant de la salle à manger du château. Entre 1823 et les années 1840, on a procédé à la modification de l'entrée de la cour d'honneur, la démolition du bâtiment et de la basse-cour, à des modifications de la décoration intérieure du château (bibliothèque) , à la restauration du parc, la construction de bâtiments d'exploitation dans la basse-cour et de la maison-portière.","habitants":"Antoine de La Grange\r\n        \"","divers":"Montalivet Grav  1-2-3  47° 16' 20\" nord, 2° 54' 01\" est  Herry grav 4-5-6","gps":"","images":["../image/image_18/18_Lagrange_Montalivet_1.jpg","../image/image_18/18_Lagrange_Montalivet_2.jpg","../image/image_18/18_Lagrange_Montalivet_3.jpg","../image/image_18/18_Lagrange_Montalivet_4.jpg","../image/image_18/18_Lagrange_Montalivet_5.jpg","../image/image_18/18_Lagrange_Montalivet_6.jpg"]},"Consult_chateau_formulaire88f3":{"id":"Consult_chateau_formulaire88f3","dept":"18","canton":"Châteaumeillant","commune":"Saulzais le Potier","nom":"Lalande_Touratte","type":"Chateaux","periode":"XVI-XVIII-XIX","histoire":"La-LANDE  La Lande (vers 1720-1723) : la plate-forme du château de la Lande, les douves, dans lancienne basse-cour : les façades, côtés et toitures des bâtiments subsistant de la ferme du XVIIIe siècle, savoir lancienne maison du fermier, lancien bâtiment dhabitation et le petit édifice rond élevé à langle sud, le bâtiment néo-classique et lorangerie sont inscrits sur lInventaire supplémentaire des M.H.  par arrêté du 24 février 1992. monsieur et madame De La Rochefoucauld et leur famille  habite les lieux depuis 1982. La façade du château date du XVIII e siècle.       TOURATTE, le 1er seigneur a  avoir vécu est le seigneur Armand de Buchepot qui gouverna les terres d'Epineuil et d'Orval. Cinq générations se sont succédé. Le château de la Touratte a donné son nom à la fromagerie de la Touratte, car ils faisaient partie du même lieu-dit.","architecture":"LA-LANDE, ce château a été construit sur les bases d'un château médiéval, reconstruit le XVIIe et le XIXe siècle pour une seconde partie, Le château est entouré d'un mur d'enceinte de 7 km en grès rose. Toujours à l'entrée, on remarque un magnifique pigeonnier, la nouvelle demeure a été élevée à l'ouest de ce terre-plein, sans doute au début du XVIIIe siècle, selon un plan en U. Un corps de logis rectangulaire en grés rose surmonté d'un toit à la Mansart est flanqué au nord-est et au sud-est de deux ailes en retour d'équerre. En 1875, le corps central a été doublé en profondeur et deux pavillons ont été construits au nord-ouest et au sud-ouest, transformant ainsi un château ancien en une demeure plus fastueuse. Du XIXe siècle date aussi la construction de dépendances dans l'ancienne basse-cour du château.             TOURATTE,  ce château existe depuis 1592. C'était une forteresse avec des douves. Il s'étend sur une superficie de 1 300 m2 avec un jardin de 9 hectares, en grès rose, émanation de la communauté de communes du grès rose, c'est un château fait de pierres et de briques. Il y a 30 pièces, 4 étages. Il y avait 4 tours, mais une a été en partie détruite. La plus haute tour mesure 20 m. La tour de briques est à l'emplacement de la tour la plus ancienne. Le donjon a été rénové en 1760, mais la guerre de 1870 a entraîné la fin des travaux. Sa forme actuelle date de la fin du XIXe siècle. Il y a des gargouilles qui bordent les toitures. Il y a des armoiries au-dessus de la porte d'entrée : deux lions avec un blason. La devise est « Gare aux griffes ».","habitants":"La-Lande Famille  De La Rochefoucauld                      Touratte Famille de Armand de Buchepot\r\n        \"","divers":"La Lande grav 5-6-7-8 .- 46° 35' 59\" nord, 2° 29' 48\" est                                                                                    Touratte grav 1-2-3-4, 46° 40' 36\" nord, 2° 26' 01\"  est","gps":"","images":["../image/image_18/18_Lalande_Touratte_1.jpg","../image/image_18/18_Lalande_Touratte_2.jpg","../image/image_18/18_Lalande_Touratte_3.jpg","../image/image_18/18_Lalande_Touratte_4.jpg","../image/image_18/18_Lalande_Touratte_5.jpg","../image/image_18/18_Lalande_Touratte_6.jpg"]},"Consult_chateau_formulaire3ab2":{"id":"Consult_chateau_formulaire3ab2","dept":"18","canton":"Avord","commune":"Laverdines","nom":"Laverdines","type":"Château","periode":"XIX","histoire":"LAVERDINES, construit en 1840 par monsieur Lalouel De Sourdeval, et racheté par Claude Gindre en 1870. Il associe classicisme et des tours dangle néo-Renaissance.  En 1839, monsieur Lalouel de Sourdeval acquiert des terrains. Il les assainit et y pratique la culture de la betterave à sucre et fait construire une sucrerie quil transforme en distillerie. Il fait border les routes darbres et devient maire en 1840. Son château sera édifié en 1840, et agrémenté dun parc. En 1868, il met toute la propriété en vente et se retire à Paris.  Après la première guerre mondiale, lexode rural fait perdre un grand nombre dhabitants à Laverdines. En 1870, la guerre faisait rage. Claude Gindre, un soyeux Lyonnais qui avait acheté le château de Laverdines en 1860, fit le vu de construire une chapelle si les Prussiens ne passaient pas la Loire. Lyonnais dorigine, il fit construire en 1873 une chapelle.","architecture":"LAVERDINES   à cinq kilomètres au nord  de Nérondes  construit en pierres et briques fabriquées sur place durant la seconde moitié du XIXe siècle, entourée dune pièce deau et dun parc, cette bâtisse de style Louis XIII a été entièrement restaurée dans les années 1990 et appartient à une société privée espagnole. Laverdines possède depuis la fin des années 1870 une chapelle devenue église après son rachat par la commune pour le franc symbolique (il y a une trentaine dannées). Et lhistoire de cet édifice qui domine le paysage est plutôt original. Il faut remonter à lannée 1870. Les Prussiens envahissent alors la France. Le propriétaire du château et des terres de Laverdines fait la promesse dériger une chapelle dédiée à La Vierge (afin de remplacer léglise détruite à la fin du XVIIIe siècle), si les ennemis narrivent pas jusquà la commune. Cinq ans plus tard, une chapelle sort de terre, en dehors du périmètre du château afin den faire une église paroissiale. Au sommet, une statue, réplique de Notre Dame de Fourvière, est dressée. Mais, lors dune tempête, cette dernière tombe du toit et finalement, la commune décide de linstaller dans un espace de recueillement aménagé à proximité de la chapelle.","habitants":"Monsieur Lalouel de Sourdeval \r\n        \"","divers":"Château de Laverdines","gps":"","images":["../image/image_18/18_Laverdines_1.jpg","../image/image_18/18_Laverdines_2.jpg","../image/image_18/18_Laverdines_3.jpg"]},"Consult_chateau_formulairec6cc":{"id":"Consult_chateau_formulairec6cc","dept":"18","canton":"Trouy","commune":"Levet","nom":"Levet","type":"Château","periode":"XIX","histoire":"Trois châteaux à Levet  celui  de Plaix et de Soulangis ; Bel air A 6 kilomètres au nord ouest à Arcay.   Pas d'information historique pour les  châteaux de   Plaix et soulangis.                                                  BELAIR  chambres d'hôtes de madame et monsieur Maginiau                                                              SOULANGIS  Roland Guérin de Vaux. Né le 17 décembre 1903 à Paris, décédé en 1971 à Jérusalem. Il passe son enfance et son adolescence dans le domaine de Soulangis, commune de Levet. Dominicain français.","architecture":"BELAIR construit au XIXe siècle, corps de logis rectangulaire à deux niveaux sur soubassement toit brisée à la mansard avec lucarnes sur combles deux pavillons de quatre travée chacun en débordement sur façade                                                                              PLAIX de plan rectangulaire à trois niveaux sur soubassements et à toit plat.                                 SOULANGIS corps de logis sur plan rectangulaire à deux niveaux sur soubassement et série de lucarnes sur toit brisé, flanqué de  pavillons à droite et à  gauche saillants sur façade de même hauteur avec balcon au premier étage sur pavillon.","habitants":"Roland Guérin de Vaux\r\n        \"","divers":"Levet 46° 55' 36\" nord, 2° 24' 34\" est                         Belair grav-1,                                                                  Plaix grav-2,                                                                Soulangis grav-3","gps":"","images":["../image/image_18/18_Levet_1.jpg","../image/image_18/18_Levet_2.jpg","../image/image_18/18_Levet_3.jpg"]},"Consult_chateau_formulaire7844":{"id":"Consult_chateau_formulaire7844","dept":"18","canton":"Châteaumeillant","commune":"Lignières","nom":"Lignières_Cher","type":"Palais","periode":"XVII","histoire":"LIGNIERES, du XI-XVe siècle, propriété de la famille de Lignières,  passe par alliance à la famille de Beaujeu, à la famille d'Amboise et aux La Rochefoucauld-Barbézieux avant d'échoir aux Brichanteau . A partir de 1654, il fut construit sur les bases d'un château féodal, abattu en 1653, pour Jérôme de Nouveau, grand maître des postes et relais de France et secrétaire de Louis XIV. En 1657  Louis le Vau construit le château du Vaux pour Fouquet. En 1668 Anne de Gonzague de Clèves princesse de Palatine devient propriétaire du château. En 1683, le château devint la propriété de jean-Baptiste Colbert déja propriétaire de Châteauneuf et du palais  Jacques-Coeur, décédera deux jours après la signature  de l'acte de vente puis passa à son fils en 1796  par alliance de mademoiselle de Lordat descendante de Colbert  avec le comte de Bourbon-Busset  auxquels il appartient toujours aujourd'hui. Madeleine de Bourbon-Busset, qui épousa en 1927 le prince Xavier de Bourbon-Parme en raison de son état calamiteux, tombant en ruines, aucun travau d'entretien n'étant engagés depuis des décennies par son propriétaire privé le Sixte Henri de Bourbon-Parme, victime d'un grave accident automobile en 2001, il a, depuis, des difficultés à marcher. Il réside régulièrement au château de Lignières, héritage de son grand-père maternel, Georges de Bourbon, vicomte de Busset, comte de Lignières. Le château est classé aux M.H.depuis 1935.","architecture":"LIGNIERES,  vaste château médiéval baigné par de profondes douves et fortement défendu ceinturée par une enceinte, la basse-cour à laquelle on accédait par un pont-levis flanqué de tourelles , comportait une chapelle et une prison, la galerie fut alors construite, puis en 1660, celle des deux pavillons qui cantonnent la terrasse d'entrée sur la cour, un puissant donjon de forme ovale  voisinait le corps de logis  qui fut édifié de 1654 à 1656.  Les douves furent construites à la place des fossés,  actuel château de Lignières, avec ses dépendances, la cour dhonneur, les douves, les bâtiments des communs et le parc,  la cour fermée par deux gros pavillons encadrant la cour d'entrée, il est plus sobre encore dans ce style que ne l'imaginait son concepteur, lequel avait prévu l'adjonction d'éléments décoratifs (statues, bustes, bas-reliefs, etc.) qui ne furent jamais installés. Si pour l'essentiel le château correspond au bâtiment initial, certaines parties furent aménagées au cours des siècles, notamment la galerie, qui fut transformée en filature au XIXe siècle pour être reconstruite dans son état initial vers 1920.","habitants":"jean-Baptiste Colbert\r\n        \"","divers":"Château de Lignières 46° 45' 00\" nord, 2° 10' 45\" est","gps":"","images":["../image/image_18/18_Ligni%c3%a8res_Cher_1.jpg","../image/image_18/18_Ligni%c3%a8res_Cher_2.jpg","../image/image_18/18_Ligni%c3%a8res_Cher_3.jpg","../image/image_18/18_Ligni%c3%a8res_Cher_4.jpg","../image/image_18/18_Ligni%c3%a8res_Cher_5.jpg"]},"Consult_chateau_formulaire9705-2":{"id":"Consult_chateau_formulaire9705-2","dept":"18","canton":"Aubigny sur Nère","commune":"Méry-es-Bois","nom":"Loroy","type":"Abbaye","periode":"XII-XVI","histoire":"LOROY, en 1190, Hugues de Vevres, seigneur de Menetou, donne des terres à labbaye Notre-Dame de Loroy toute proche (actuellement sur la commune de Méry-ès-Bois) fondée depuis peu (1125) par le seigneur de Sully, la Chapelle et les Aix. La famille de Graçay qui donne la moitié de la terre de Saint-Palais et le droit dusage dans la forêt du même nom, ce qui permet à labbaye de prendre vite de l'essor grâce également à une autre grande famille est celle de Sully. L'abbaye prospère assez rapidement, au point de fonder une abbaye-fille, celle d'Élan, dans les Ardennes. L'abbaye souffre énormément des guerres de religion : le lundi de Pentecôte 1562, au matin, un groupe de protestants venus d'Aubigny-sur-Nère détruisent et pillent l'abbaye, puis brûlent le reste. Elle est restaurée en 1583. En 1661, l'abbaye est à nouveau ravagée par un incendie provoqué par l'imprudence d'un valet d'écurie. La reconstruction de l'édifice n'intervient qu'environ cent ans plus tard. À la Révolution, l'abbaye est fermée et vendue comme bien national et achetée par le docteur Aubry, qui entretient les bâtiments d'habitation mais démolit l'église abbatiale.  À la fin du XIXe siècle, le comte de Clermont-Tonnerre fait reconstruire une chapelle à l'angle du cloître. Alain-Fournier, influencé par sa sur Isabelle qui aimait à venir s'y promener, introduit l'abbaye comme cadre « mystérieux » de la fête dans son roman Le Grand Meaulnes. Le domaine est aujourd'hui à l'abandon.","architecture":"LOROY, cette abbaye, peut-être fondée en 1125 par Vulgrin, archevêque de Bourges, a été entièrement détruite. L'église abbatiale a été édifiée au 3e quart du XIIIe siècle, puis endommagée par un incendie en 1562 par les protestants, puis en 1661. La reconstruction des voûtes et du portail a été achevée en 1731. De l'église ne subsistent que des ruines. Les bâtiments conventuels, cloître et communs, ont été entièrement détruits en 1661. Les ailes ouest et sud des bâtiments conventuels ont été achevées en 1724 par François Fricallet. Les ailes nord et est ont été achevées en 1772 par Gaspard Fricallet, fils de François. L'abbaye a été vendue comme bien national. La chapelle a été édifiée vers 1890, pour le comte de Clermont-Tonnerre. Façades et toitures, y compris les galeries du cloître, et à l'exclusion de la chapelle moderne ; salle à manger du rez-de-chaussée avec son décor ; ruines de l'ancienne église abbatiale : inscription par arrêté du 27 octobre 1971.","habitants":"docteur Aubry\r\n        \"","divers":"Loroy  47° 33' 58\" Nord et 2° 18' 54\" Est","gps":"","images":["../image/image_18/18_Loroy_1.jpg","../image/image_18/18_Loroy_2.jpg","../image/image_18/18_Loroy_3.jpg"]},"Consult_chateau_formulaireb9a7":{"id":"Consult_chateau_formulaireb9a7","dept":"18","canton":"Mehun-sur-Yèvre","commune":"Lury_sur_Arnon","nom":"Lury_sur_Arnon","type":"Château","periode":"XII-XVIII","histoire":"A Lury la porte de la ville, la tour, le château de Ferrandeau, Guérigny  pas d'information historique pour ces deux derniers                                            LURY, en 1066, Hugues de Lury participe à la conquête de lAngleterre avec Guillaume le Conquérant. Humbaud le Tortu sempare du fief de Lury et le donne à son fils, qui le transmet à son neveu, Arnaud 1er.  En 1164, au retour de croisade, Hervé 1er déclare libres tous les habitants de Lury.  En 1189, lors de la troisième croisade, les troupes de Richard Cur de Lion passent par Vierzon et Lury. Alors que Richard est prisonnier, le roi reconquiert les villes du nord de lAquitaine, royaume des Plantagenêt depuis 1152. À son retour, Richard fait brûler les villes de Reuilly, Lury et Vierzon.  Au XIIIe siècle, Hervé III, seigneur de Vierzon, se marie avec Jeanne de Lury, qui épouse en secondes noces Godefroy de Brabant. Leur fille Marie épouse Guillaume de Juillers. En 1378, Guillaume II de Juillers, sétant allié à lAngleterre, se voit confisquer le château, ses rentes et droits féodaux par le roi Charles V. Jean de France, duc de Berry, frère du roi de France, reçoit, en toute propriété, les biens confisqués à la famille Julliers. Il répare le château et léglise romane, détruits en grande partie par les Anglais. Les seigneurs et gens de Lury, fidèles au prince et au roi, bénéficient de la protection du duc et se voient attribuer des fonctions importantes.  Les connétables Bertrand Du Guesclin, Louis de Sancerre et Gaucher de Passac sont « capitaines de Lury » et de la grosse tour de Bourges. En 1412, le duc Jean donne Lury aux chanoines de la cathédrale de Bourges, qui le conservent jusquen 1773.","architecture":"Lury sur Arnon Le donjon : entouré par l'eau de l'Arnon, il a été édifié au début du XIe siècle par Arnaud Ier. L'accès au donjon se fait au-dessus de la salle des gardes par une large porte en plein cintre, depuis le rempart de la cité ; le petit pont-levis, relevé, se loge dans l'épaisseur du mur. Les trois étages ont été détruits par les armées anglaises de Richard Cur de Lion et du Prince Noir.  Portes fortifiées du XIIe siècle, dans le bourg.  Ferrandeau  et Guérigny châteaux de même styles deplan rectangulaire à deux niveaux à cinq travées avec lucarnes sur toit en croupes.","habitants":"Famille Julliers\r\n        \"","divers":"Lury 47° 07' 42\" nord, 2° 03' 28\" est.                  Ferrandeau grav 3                                                       Guerigny grav-4","gps":"","images":["../image/image_18/18_Lury_sur_Arnon_1.jpg","../image/image_18/18_Lury_sur_Arnon_2.jpg","../image/image_18/18_Lury_sur_Arnon_3.jpg","../image/image_18/18_Lury_sur_Arnon_4.jpg"]},"Consult_chateau_formulaire7061":{"id":"Consult_chateau_formulaire7061","dept":"18","canton":"Mehun-sur-Yèvre","commune":"Massay","nom":"Massay","type":"Tour-Châteaux","periode":"XII-XVI","histoire":"A Massay ,la tour Chamborant et son château , château de la Ferrière, de la Motte  et de Ponthéreau, pas d'information historique pour  ces trois derniers.   MASSAY, Charlemagne aurait fait une visite à Massay et à cette occasion, aurait fait don d'un trésor. Comme le couvent et son trésor, la commune est pillée par les Normands en 873. Elle subit des incendies en 999 et 1128. Un hôpital et une léproserie sont établis par les seigneurs locaux en 1252. Saint Louis passe en 1258 de retour d'Égypte. Massay est détruit pendant la guerre de cent ans, les guerres contre Charles Quint et saccagée par les protestants au XVIe siècle. \r\n Lhiver de 1709-1710 notamment cause de nombreuses pertes, ainsi que la grande canicule de 1719 (qui tua beaucoup par dysenterie). Les mêmes causes sont à lorigine de la très forte baisse de population de la communauté de Saint-Vincent-de-Gy à la même époque. En janvier 1814, le pape Pie VII, de retour de son séjour à Fontainebleau, fait étape à Massay. Pendant la seconde guerre mondiale, deux avions anglais sont abattus sur le territoire, l'un en 1942 et l'autre en 1944. Une stèle commémore ces événements.","architecture":"MASSEY Les anciennes fortifications Une tour ronde, indépendante de l'église, reste le vestige le mieux conservé des fortifications de l'abbaye. On peut en suivre le tracé en empruntant certaines rues de la ville, dans lesquelles on aperçoit les ruines d'autres tours.   TOUR CHAMBORANT, à l'église est adossée une tour-clocher haute de 42 mètres. Cette tour est divisée en trois étages marqués par des cordons et soutenus par des contreforts terminés par des pinacles. L'accès se fait par le nord, par une porte en tiers-point surmontée des armes de l'abbé de Chamborant complétées par une légende en lettres gothiques disant « Rébérend père en Dieu, frère Bertrand de Chamborand, abbé de labbaye de Massay, a fait faire cette présente tour l'an 1324 . À l'étage suivant se trouvent une fenêtre à meneaux ainsi que des contreforts possédant des niches soutenues par des culs-de-lampe. Le dernier étage, le plus riche en décoration, est entouré d'une balustrade gothique avec des lettres rappelant le nom du fondateur. Les contreforts se terminent par des pinacles et la tour est percée sur chaque face de deux fenêtres entourées de riches moulures, derrière lesquelles se trouvent deux cloches, parmi les sept qu'avait le clocher autrefois. L'une date de 1512 et porte les armes de l'abbé de Chamborant.  anciennes fortifications Une tour ronde, indépendante de l'église, reste le vestige le mieux conservé des fortifications de l'abbaye. On peut en suivre le tracé en empruntant certaines rues de la ville, dans lesquelles on aperçoit les ruines d'autres tours.","habitants":"Seigneurs locaux \r\n        \"","divers":"Massay 47° 09' 17\" nord, 1° 59' 36\" est.                         La Motte grav 5,                                                            la Ferriere grav 6,                                                      Ponthéreau grav 8","gps":"","images":["../image/image_18/18_Massay_1.jpg","../image/image_18/18_Massay_2.jpg","../image/image_18/18_Massay_3.jpg","../image/image_18/18_Massay_4.jpg","../image/image_18/18_Massay_5.jpg","../image/image_18/18_Massay_6.jpg","../image/image_18/18_Massay_7.jpg","../image/image_18/18_Massay_8.jpg"]},"Consult_chateau_formulaire1d14":{"id":"Consult_chateau_formulaire1d14","dept":"18","canton":"Avord","commune":"Moulins sur Yèvre","nom":"Maubranche","type":"Château","periode":"XV","histoire":"MAUBRANCHE C'est en 1888, que les travaux de modernisation du château de Maubranche par Ernest Sanson débutent.","architecture":"MAUBRANCHE, à la fin du XVIIIe siècle, le château formait un grand quadrilatère, privé de deux tours lors du siège de 1591. Le domaine fut restauré à partir de 1596, doté de cours d'eau aménagés, de terrasses plantées et d'avenues. Les projets de restauration présentés à la fin du XIXe siècle ne montrent plus qu'un grand corps de logis, de plan rectangulaire, fenêtres à meneaux,  à trois niveaux lucarnes sur toit à deux pans accolé d'un donjon double en retour d'équerre avec mâchicoulis et chemin de ronde et en façade une tourelle carrée, à l'opposé  sur flanc accolée d'une tour mi-hors-oeuvre d'une tour ronde toit en poivrière l'ensemble est relié par les ailes ayant été détruites, un batiment de un niveau relie une tour ronde de même niveau accolée d'une tourelle les deux toit à Poivrière.Les traces les plus anciennes que l'on a pu retrouver du château datent du XVe siècle, mais il prend sa forme finale plus de 400 ans plus tard, avec les travaux de Sanson.","habitants":"Famille d'Henri Duchêne\r\n        \"","divers":"Maubranche 47° 05' 01\" Nord et 2° 31' 05\" Est","gps":"","images":["../image/image_18/18_Maubranche_1.jpg","../image/image_18/18_Maubranche_2.jpg","../image/image_18/18_Maubranche_3.jpg"]},"Consult_chateau_formulaire5fc4":{"id":"Consult_chateau_formulaire5fc4","dept":"18","canton":"Saint-Germain-du-Puy","commune":"Morogues","nom":"Maupas","type":"Château","periode":"XV","histoire":"MAUPAS, la seigneurie de Morogues et Maupas a  appartenu à  Henri III de Sully, seigneur des  Aix dAngillon en 1284, puis aux  Mathefelon en 1357, puis, par mariage, aux  Rochechouart.  Cette seigneurie passa ensuite en 1440 aux Dumesnil-Simon par le mariage de Phillipine de Rochechouart à Jean Dumesnil-Simon, chambellan de Louis XI. Enfin la seigneurie de Morogues et Maupas fut acquise en 1688 par Antoine Agard de Vailly, dont la famille était originaire de Vierzon, il était fils de Clément Agard, qui fut élu maire de Bourges en 1672. Louis XV en 1725, érigea en marquisat les terres, sous le nom de marquisat de Maupas. À la Révolution, Maupas et son château furent saisis par un descendant de Pierre Agard, émigré, et vendus comme bien national. C'est au lieutenant-colonel Jérôme de Maupas, qui avait suivi les princes en exil en Angleterre et en Allemagne, qu'il reviendra de reprendre possession de la terre de Maupas. Bénéficiant de l'amnistie de 1802, il revient en France et racheta le domaine de Maupas et son château à la famille Guibert, qui lavait entretenu parfaitement. Parmi les membres de cette illustre famille, il convient de citer Marie Auguste Agard, marquis de Maupas, qui fut décoré de la légion d'honneur par Napoléon le 14 juillet 1813. Il fut ensuite attaché militaire à l'ambassade de Constantinople sous Louis XVIII. En 1827, il fut nommé sous-gouverneur du comte de Chambord sa mère la duchesse de Berry séjourna à Maupas.  Le marquis de Chaumont Quitry (Amaury) fut propriétaire avant de devenir  la propriété de la famille Agard de Maupas. Le domaine de Maupas est devenu un domaine viticole.","architecture":"MAUPAS, construit au XVe siècle pour Jean Dumesnil-Simon, gouverneur du Berry, sur l'emplacement d'une ancienne demeure ayant appartenu aux Sully à la fin du XIIIe siècle. De la reconstruction du XVe siècle subsiste le corps central flanqué d'une haute tour ronde à créneau sur mâchicoulis et toit en terrasse à l'est et d'une tour d'escalier hexagonale à l'ouest. Une aile sud fut construite au XVIIIe siècle et, entre 1861 et 1863, une aile nord. A cette occasion, l'ensemble de l'édifice fut remanié assez profondément dans le style néo-gothique (extérieurs et intérieurs), restauration menée à partir de 1860 par l'architecte Tarlier. Les décors intérieurs sont représentatifs des XVIIIe et XIXe siècles. En 1872 a eu lieu la pose de la rampe en bois de l'escalier monumental en pierre, modèle demeuré en place d'un ouvrage en fer forgé qui ne fut jamais exécuté.","habitants":"Famille d'Antoine Agard de Vailly\r\n        \"","divers":"Maupas 47° 14' 42\" nord, 2° 35' 10\" est1","gps":"","images":["../image/image_18/18_Maupas_1.jpg","../image/image_18/18_Maupas_2.jpg","../image/image_18/18_Maupas_3.jpg","../image/image_18/18_Maupas_4.jpg","../image/image_18/18_Maupas_5.jpg"]},"Consult_chateau_formulaire06cd":{"id":"Consult_chateau_formulaire06cd","dept":"18","canton":"Méhun sur Yèvre","commune":"Méhun sur Yèvre","nom":"Mehun_sur_Yèvre","type":"Vestiges","periode":"XII-XIV","histoire":"MEHUN, au XIIe siècle, une forteresse est construite sous l'impulsion de Mahaut de Mehun-Courtenay et de sa descendante Amicie de Mehun-Courtenay, il devient un véritable lieu de culture au XIIIe siècle. En 1367, Jean Ier Duc de Berry ordonne le début des travaux de modernisation des défenses et d'embellissement du château  médiéval. Guy de Dammartin est l'architecte; André Beauneveu et Jean de Cambrai sont les sculpteurs. En 1390, les travaux extérieurs semblent terminés, mais commencent les réalisations d'habitation. En 1414, durant la guerre entre Armagnac et Bourguignon, le duc de Guyenne quitte Paris et se réfugie au château de Mehun. En 1416, Jean Ier duc de Berry meurt, il ne verra pas la fin des travaux. Le duc ayant reçu le Berry  en apanage, le château revient dans le domaine Royal. En 1417, le château est si luxueux et prestigieux qu'il devient l'une des résidences préférées des Rois.  En 1429, la ville de Mehun reçoit Jeanne d'Arc après le couronnement du roi à Reims. La légende prétend que certains plans des futures batailles contre les \"Anglais\" ont été décidés dans le château.  En 1461, le roi Charles VII  décède au château de Mehun.  A partir du XVIe siècle, les rois délaissent Mehun au profit des châteaux de la vallée de la Loire.  En 1550, un incendie dû à la foudre ravage une partie du château.  A partir de 1562, les guerres de Religions n'épargnent pas les bâtiments.  Au XVIIe siècle, le château est partiellement démantelé. Vers 1792, les révolutionnaires réquisitionnent le château comme bien national. Le saccage commence et sonne le glas de ce prestigieux monument.","architecture":"MEHUN, la construction date du XIVe siècle, il est de style Gothique, l'aspect architectural du château respectait le plan typique des châteaux forts. Les quatre tours dont le donjon, poste et habitation principale du seigneur ont été conservées lors de la reconstruction de l'édifice sous Jean de Berry. Les douves profondes, également conservées, donnaient l'impression d'une forteresse imprenable et étaient une défense de plus face aux envahisseurs. Les vestiges encore visibles aujourd'hui datent pour l'essentiel du XIVe siècle, lors duquel il fut remodelé de 1367 à 1390 pour le duc Jean de Berry  largement ruiné depuis le XVIIIe siècle, ce fut lun des plus excentriques châteaux gothiques. Les ruines du château montrent encore aujourd'hui cette excentricité architecturale mélangeant des éléments de château fort et de résidence luxueuse. Sur certains pans de murs des tours, des vestiges de sculptures apparaissent distinctement. Les bases d'un ancien château fort sont également visibles au sol, de même que les séparations des pièces du château tracées à même le sol. La tour Charles VII renferme un petit musée.","habitants":"Jean Ier Duc de Berry\r\n        \"","divers":"Mehun 47° 09' 00\" nord, 2° 13' 00\" est","gps":"","images":["../image/image_18/18_Mehun_sur_Y%c3%a8vre_1.jpg","../image/image_18/18_Mehun_sur_Y%c3%a8vre_2.jpg","../image/image_18/18_Mehun_sur_Y%c3%a8vre_3.jpg","../image/image_18/18_Mehun_sur_Y%c3%a8vre_4.jpg","../image/image_18/18_Mehun_sur_Y%c3%a8vre_5.jpg","../image/image_18/18_Mehun_sur_Y%c3%a8vre_6.jpg"]},"Consult_chateau_formulaireca00-2":{"id":"Consult_chateau_formulaireca00-2","dept":"18","canton":"Mehun-sur-Yèvre","commune":"Meillant","nom":"Meillant","type":"Palais","periode":"XIII-XIV","histoire":"MEILLANT,  transmis de générations en générations depuis 1000 ans, est un des joyaux du Berry. Quelques grands noms tel que les comtes de Sancerre, les Chaumont dAmboise ou encore le duc de Charost  y ont vécu par exemple. Et ont ainsi contribué à lévolution et également à la transformation du château.   le château actuel a été entrepris à la fin du XIIIe siècle et au début du XIVe siècle par Étienne II de Sancerre qui est mort avant 1308. le château passe par alliance à la famille de Jean de Beuil., en 1453 passe par alliance   d'Anne du Beuil avec Pierre d'Amboise descendant de Foulques Nerra comte d'Anjou. Meillant change à nouveau de mains entre dans la famille de Touraine. En 1525 passe par alliance d'Antoinette  d'Amboise qui épousa Antoine de la Rochefoucault-Barbézieux, en 1578, leur petite-fille apporta Meillant à son mari  Antoine de Brichanteau seigneur de Nangis, à la mort de  Madeleine-Thérése de Brichanteau première femme de Pierre Georges d'Entraigues duc de Falari. Le domaine échut  sans avoir été vendu aux Béthune duc de Charost, descendants du frère du grand Sully et il rentre au XIXe siècle dans la famille  de la Rochechouart de Mortemart. Aujourdhui, lhéritage de ce magnifique patrimoine appartient aux Mortemart, grande famille française que lon retrace jusquà la période des Croisades. En 1837 la duchesse  de Charost née Henriette de Tourzel  légua à sa nièce, Virginie de Saint-Aldegonde duchesse de Mortemart. A ce jour, la famille Mortemart, et ce depuis plus de 200 ans, soccupe toujours du château  Muriel et Aimery marquis  de Mortemart met tout en uvre pour maintenir le patrimoine dans la famille; Par arrêté du 2 mars 1926, le château fait l'objet d'une inscription au titre des M.H.","architecture":"MEILLANT, de style Renaissance, gothique flamboyant. Il était déjà fait mention du château de Meillant au XIe siècle qui sera reconstruit du XIIIe au XVIe siècle, de plan initial du château, tel qu'il avait été construit par Étienne II de Sancerre et que montre le dessin de Claude de Chastillon. Les parties construites par la famille d'Amboise à partir de 1473 sont plus rattacher  à la fin du style gothique qu'au début du style Renaissance en France.  On peut rattacher les bâtiments construits par Charles Ier d'Amboise  le corps de logis central, la chapelle et la tour à vis du Lion , côté cour. Sous Charles II d'Amboise a été construite la tour du Lion, en hors-uvre et comprenant un escalier à vis, et la mise en forme de la façade côté cour du bâtiment occidental par le percement des fenêtres dans les murs du début du XIVe siècle et leur décoration. La décoration de la tour et des fenêtres hautes de la façade côté cour est assez exubérante. Elle a été réalisée avant 1510 dans le style Louis XII, marquant la transition entre les styles gothique flamboyant et de la première Renaissance française. On retrouve ce type de tour-escalier au Palais Jacques-Cur et à l'hôtel des Échevins de Bourges. La galerie qui prolongeait l'aile occidentale et qui a été construite dans le style de la première Renaissance a malheureusement disparu. La décoration de la tour du Lion, appelée ainsi à cause du lion qui la surmonte, est la partie la plus intéressante du château. Il ne semble pas que la restauration entreprise à partir de 1842 ait beaucoup affecté cette partie du château.","habitants":"Comtes  Étienne II de Sancerre et de Mortemart\r\n        \r\n        \"","divers":"Meillant 46° 46' 59\" nord, 2° 30' 15\" est1","gps":"","images":["../image/image_18/18_Meillant_1.jpg","../image/image_18/18_Meillant_2.jpg","../image/image_18/18_Meillant_3.jpg","../image/image_18/18_Meillant_4.jpg","../image/image_18/18_Meillant_5.jpg","../image/image_18/18_Meillant_6.jpg","../image/image_18/18_Meillant_7.jpg","../image/image_18/18_Meillant_8.jpg"]},"Consult_chateau_formulaireba9c":{"id":"Consult_chateau_formulaireba9c","dept":"18","canton":"La Guerche-sur-l","commune":"Menetou-Couture","nom":"Menetou_Couture","type":"Forteresse","periode":"XIII-XV","histoire":"A 8 kilomètres à l'Est à Marseilles-lès-Aubigny le Chateauvert.                                                      MENETOUR-COUTURE, construction militaire seigneuriale à la veille de la Renaissance, le château avec son donjon dhabitation est une place avancée de la Bourgogne et dépendait à la fois des comtes de Nevers et de lArchevêché de Bourges. dit le Donjon. Louis XI y séjourna en mars en 1482, ainsi Henri IV en remerciement des services rendus par le chevalier Marcellin de Guillon. Au XVIe siècle le domaine passa dans les mains de la famille Guillon par alliance de Geneviève de Fontenay dont le père Jacques de Fontenay notaire du roi épouse  en 1575 Marcellin de Guillon. En 1793 Pierre Denys de Guillon décède sans descendance laisse à sa soeur héritière Marie-Adélaïde de Guillon veuve de Marcellin  de Roland, seigneur d'Arbourse qui décèdera un peu plus tard  deux fils dont Armand-Marcellin-Baltazard de Rolland et Paul-Edme-Bernard  de Rolland d'Arbourse se partagent le domaine. En 1901 Armand-Maurice de Rolland d'Arbourse épouse en mai Ludmilla Tlusty originaire de de Bohême-Hongrie vende en 1908 les terres à l'une de ses soeurs Pauline-Henriette de Rolland épouse de Justin -Eugène Delafosse, qui ce dernier  vend en 1913, le nouveau propriétaire envisage de détruire le donjon, une procédure un classement au M.H. signé par Raymond Poincaré le 30 octobre 1917 met un therme à cette décision. Utilisé pendant la seconde guerre mondiale par la  Kommandantur.  Aujourd'hui propriété du docteur Max Dunner.                                                             CHATEAUVERT chambres d'hotes","architecture":"MENETOUR-COUTURE, du château, il reste le donjon du XVe siècle et une tour dangle abritant une chapelle. Des bâtiments annexes ont été accolés aux XVIIe et XVIIIe siècles. le donjon, pièce maîtresse du château-fort dresse son imposante silhouette à près de 40 mètres. Domaine barlong  flanqué d'une haute tourelle  d'escalier élevée par Jean de Villaines vers 1460  le logis du XVIIe siècle. Entre le XVIe et le XVIIIe siècles, laspect militaire de la construction dorigine est atténué par ladjonction des bâtiments annexes à la Mansart et par louverture de fenêtres, charpente imposante dans un comble dune hauteur de 17,50 mètres. Il est entouré dun parc aux arbres centenaires. Sur la place du village, et fait partie des derniers châteaux forts construits en France. Menetou-Couture, vers 1460 et XVIIIe siècle. Il est resté à l'écart des transformations de la Renaissance et a conservé sa charpente d'époque, haute et élancée et d'imposantes cheminées de pierre. Des aménagements de différentes époques sont encore visibles sans que la structure générale ait été altérée, c'est un havre de paix, de fraîcheur et de dépaysement.                                                          CHATEAU-VERT de plan rectangulaire à deux niveaux sur soubassement et lucarnes  et occulus sur les toits en croupes, corps de logis central de cinq travées accolés de part et autres de pavillons rectangulaires saillants.","habitants":"chevalier Marcellin de Guillon\r\n        \"","divers":"Menetou 47° 02' 45\" Nord, 2° 54' 53\" Est                        Chateauvert  Grav 5-6, 47° 04' 06\" nord, 3° 00' 50\" est","gps":"","images":["../image/image_18/18_Menetou_Couture_1.jpg","../image/image_18/18_Menetou_Couture_2.jpg","../image/image_18/18_Menetou_Couture_3.jpg","../image/image_18/18_Menetou_Couture_4.jpg","../image/image_18/18_Menetou_Couture_5.jpg","../image/image_18/18_Menetou_Couture_6.jpg"]},"Consult_chateau_formulairebf6c":{"id":"Consult_chateau_formulairebf6c","dept":"18","canton":"Saint-Martin-d","commune":"Menetou-Salon","nom":"Menetou_Salon","type":"Château","periode":"XII-XVII","histoire":"MENETOU-SALON, au XIIIe siècle appartenait à la famille de Sancerre,  au XIVe siècle  la famille Sancerre abandonna la forteresse pour construire le nouveau château avec des tourelles, au XVe siècle, avant que Hugues de Cormaing ne cède en 1450 Menetou à Jacques Cur, le château appartint à Sarlon le Riche, contemporain de Henri Ier, puis à la maison de Vèvre, de Vierzon et de Sancerre. Le château primitif a appartenu en 1448 à Jacques Cur  le grand argentier de Charles VII de France  avant de lui être confisqué lors de sa disgrâce en 1455, pour être adjugé à  sa maîtresse Antoinette de Maignelay, veuve d'André Villequier puis racheté par Jeanne de Graville, puis à ses neveux  Balzac d'Entragues,  échoit par succession au XVIe siècle  à Jean Pot dont le fils Guillaume chevalier de Rhodes. Au siècle suivant  Paulinde Gand de Mérode, héritière l'apporte en dot à la famille Brancas Lauragais, dont la fille Pauline, en 1773, épousa Louis Engelbert, prince et duc dArenberg. L'ancien château fut en effet agrandi et embelli, entre 1884 et 1890 par l'architecte parisien Ernest Sanson, le sculpteur Antoine Margotin et le menuisier-ébéniste Calmel, à la demande du prince Auguste Louis Albéric d'Arenberg et de la princesse son épouse. Ce représentant de l'aristocratie française remplit, sous la troisième République, des fonctions éminentes dans de nombreux domaines, notamment comme député du Cher de 1877 à 1902, est habité de nos jours par le propriétaire actuel, le 5e prince et duc dArenberg français.  Il a été classé à l'inventaire supplémentaire des M.H..","architecture":"MENETOU-SALON,  il date du XIIe siècle entièrement remaniée en XVIIe siècle,  agrandie, dans un style néo-gothique, les lucarnes, les gâbles et les pinacles furent posés sous Auguste d'Arenberg. Les intérieurs furent refaits après la seconde guerre mondiale. Les travaux portèrent sur les parties sud et est, les parties nord et ouest conservant leur aspect classique. La construction primitive qui consistait le corps de logis reliant deux pavillons  flanqués de tourelles d'escalier à vis ont été conservé.  Le château possède 24 cheminées, et 297 fenêtres. \r\nLe hall d'entrée est une vaste pièce abritant la statue d'Agnès Sorel. La salle à manger est située dans l'aile médiévale avec une façade du XIVe siècle. Elle est ornée de céramiques reprenant les motifs des Saisons d'Arcimboldo. Dans la salle de billard sont exposés les portraits peints et photographiés des membres de la famille d'Arenberg. Le sol est couvert d'un tapis rouge, la couleur des princes de ce château. La bibliothèque compte 12 000 volumes. Elle est ornée de lambris de chêne et d'une cheminée à l'italienne en marbre gris et blanc. \r\nAu nord à 8 Km le château d'Henrichemont pas d'info à part qu'il est devenu en éhpad.","habitants":"Prince et Duc dArenberg\r\n        \"","divers":"Menetou salon-47° 14' 05\" Nord, 2° 29' 29\" Est Henrichemont grav 6-7","gps":"","images":["../image/image_18/18_Menetou_Salon_1.jpg","../image/image_18/18_Menetou_Salon_2.jpg","../image/image_18/18_Menetou_Salon_3.jpg","../image/image_18/18_Menetou_Salon_4.jpg","../image/image_18/18_Menetou_Salon_5.jpg","../image/image_18/18_Menetou_Salon_6.jpg","../image/image_18/18_Menetou_Salon_7.jpg"]},"Consult_chateau_formulaire0221":{"id":"Consult_chateau_formulaire0221","dept":"18","canton":"Aubigny sur Nère","commune":"Ménétréol sur Sauldre","nom":"Ménétréol","type":"Château","periode":"XVI-XIX","histoire":"Cinq châteaux à Ménétréol dont celui de Ménétréol, du Bas Boulay, de Bellevue de la Faye et de Simouet.   MENETREOL, en 1189, le roi Philippe Auguste s'empara d'Aubigny et la fortifia en vue de résister aux assauts des voisins anglais. Puis en 1571, l'abbaye de Saint-Benoît vendit au seigneur du château de la Faye, Jehan Senecton, ses droits sur la censive de Ménétréol. Cette censive fut transmise d'année en année, d'abord à François Treugnac, ensuite aux seigneurs de Nançay (un village voisin), et enfin au comte de Buat.  Jusqu'aux années 1800, les pélerins venaient se recueillir à la fontaine Saint-Martin, sur la route de Souesmes. Mais cette dernière fut détruite lors de travaux d'élargissement de la voie. On trouve aux alentours les deux grands domaines et châteaux de Landeroyne et du Simouet à l'ouest, datant du XIXe siècle, tandis qu'à l'est se trouve le fameux château de la Faye. On peut penser qu'à l'origine, c'était une forteresse faite de terre et de bois. D'ailleurs dès 1064, on retrouve trace d'un Raymon de la Faye. Puis en 1081, de Pétrus de la Faye. La structure du château a bien sûr subi de nombreuses modifications, au XVIe, XVIIe et XVIIIe siècle. Depuis ce lieu, on peut jouir d'une vue imprenable sur la vallée de la Sauldre. En 1577, il est la propriété de Jehan de Senecton, en 1668, d'Antoine de la Chapelle de Launay, puis en 1679, de son fils Jacques, dont la dépouille repose en l'église Saint-Martin. Désormais les aristocrates font place aux bourgeois. Ces derniers construisent nombre de châteaux, manoirs et autres rendez-vous de chasse, et participent ainsi à lembellissement du patrimoine local.","architecture":"MENETREOL, on peut observer des tombelles au sud du château de la Faye. Hautes de 1 m sur 12 à 20 de large, aux allures carrées ou rondes, elles sont constituées de silex provenant de la surface du sol. Ces protubérances de terre dateraient de l'époque antique et servaient à des rites inconnus.                    FAYE de plan en T deux styles différents, la partie principale du corps de logis rectangulaire  à deux niveaux plus lucarnes, deux pavillons saillants sur la partie extrême de l'orifice, à l'opposé corps transversal style à colombages à trois niveaux  toit à deux pans  avec fronton triangulaire plein cintre sur pavillon d'entrée saillant.                                                       BAS-BOULAY quadrangulaire à deux niveaux flanqué de tours  rondes   aux angles à toit en poivrière.      BELLEVUE, de plan en T , corps de logis à deux niveaux et lucarnes sur combles, les pavillons à trois niveaux sous un toit très incliné, pavillon  d'entée saillant sur l'arrière toit à quatre pans.            SIMOUET de plan rectangulaire à deux niveaux  avec lucarnes sur combles  flanqué d'un pavillon carré à trois niveaux toit à l'impérial à quatre pans.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Ménétréol grav 1                                                            Faye grav  2-3                                                    Bellevue grav 4                                                         Bas-Boulay grav 5                                                        Simouet grav 6.","gps":"","images":["../image/image_18/18_M%c3%a9n%c3%a9tr%c3%a9ol_1.jpg","../image/image_18/18_M%c3%a9n%c3%a9tr%c3%a9ol_2.jpg","../image/image_18/18_M%c3%a9n%c3%a9tr%c3%a9ol_3.jpg","../image/image_18/18_M%c3%a9n%c3%a9tr%c3%a9ol_4.jpg","../image/image_18/18_M%c3%a9n%c3%a9tr%c3%a9ol_5.jpg","../image/image_18/18_M%c3%a9n%c3%a9tr%c3%a9ol_6.jpg"]},"Consult_chateau_formulaire3717":{"id":"Consult_chateau_formulaire3717","dept":"18","canton":"Aubigny sur Nère","commune":"Nançay","nom":"Nancay","type":"Château","periode":"XIV-XVI","histoire":"Château du Haut Boulay et de Nancay.                       NANCAY, en 1388  Grenier-Vilatre, appartenait à la famille de La Châtre, en  1413  Jean de La Châtre, bailli de Gien, obtient du duc Jean de Berry,  le logis, en ruine à la fin du XVIIIe siècle, fut reconstruit autour d'importants vestiges pour Louis Pépin-Le Halleur, manufacturier de porcelaine à Vierzon, qui entreprit une restauration néo-classique du XVIe siècle, suivant les dessins exécutés par Georges Rouget au cours de sa démolition, acquéreur en 1848.   dans les bâtiments d'exploitation du château de Nançay   Galerie Capazza, galerie internationale d'art contemporain créée en 1975 par Gérard et Sophie Capazza.","architecture":"NANCAY, en 1388 : mention d'une maison forte. En  1413 fortification du château, fortification qui ne fut réalisée qu'à la fin du XVe siècle ou au début du XVIe siècle, époque de construction du château actuel. Les communs furent reconstruits à la fin du XVIe siècle. Le logis, en ruine à la fin du XVIIIe siècle, fut reconstruit autour d'importants vestiges. A l'écart, au nord-est, un ensemble de bâtiments ayant servi de ferme, mais dont la fonction d'origine demeure inconnue, peut être identifié avec le grand corps de logis où sont les escuyers, cité en 1631.                                                 GRENIER VILATRE ancienne caserne du XVIIe siècle château d'origine du XIIe siècle, rebâti sur des fondations du XVe siècle, au XVIe siècle ,  les façades, côtés et toitures du château de Nançay et des communs, lescalier intérieur monumental situé dans laile Sud du château, sont inscrits sur linventaire supplémentaire des M.H.  par arrêté du 9 juillet 1986.","habitants":"Famille Louis Pépin-Le Halleur,\r\n        \"","divers":"Nancay grav 1à 4,   47° 20' 53,37\" Nord et 2° 11' 52,17\" Est                                                                   Grenier Vilatre grav 5                                                     Haut-Boulay grav 6 - 7","gps":"","images":["../image/image_18/18_Nancay_1.jpg","../image/image_18/18_Nancay_2.jpg","../image/image_18/18_Nancay_3.jpg","../image/image_18/18_Nancay_4.jpg","../image/image_18/18_Nancay_5.jpg","../image/image_18/18_Nancay_6.jpg","../image/image_18/18_Nancay_7.jpg"]},"Consult_chateau_formulaire653d":{"id":"Consult_chateau_formulaire653d","dept":"18","canton":"Dun-sur-Auron","commune":"Neuvy le Barrois","nom":"Neuvy_Barrois","type":"Château","periode":"XIII","histoire":"Plusieurs château à Neuvy;  le Clochers, Appremont (voir article), hôtel le Salley maison forte, le Pey.          NEUVY, Guillaume des Barres : les membres de la famille des Barres auraient été seigneurs de la Guerche, fief du comté de Sancerre. Guillaume des Barres participa à la croisade de 1191. Son fils, Guillaume, surnommé la « fleur des chevaliers » sauva le roi de France, tombé de son cheval pendant la bataille de Bouvines en 1214. Un changement de patronyme se fait progressivement jusquà Jacques et son fils Louis des Barres-le-Barrois au milieu du XVIe siècle. Neuvy le Barrois serait un bourg nouveau vers le XIIe siècle. Le nom va évoluer au cours des siècles. Lappellation Neuvy le Barrois apparaît avec la Révolution française, son nom complet fait référence à la famille des Barres.","architecture":"BARROIS  château de Neuvy-le-Barrois : du  XII-XV- XVIIIe siècle . à 2 km du bourg, bâtisse rectangulaire  à deux niveaux avec tour carré sur flanc.                     Le SALLEY maison forte de trois niveaux avec plein cintre enfaçade une tourelle  héxagonale à toit pointu  hôtel.                                                                         PEY, de plan rectangulaire à deux niveaux et lucarnes sur combles, pavillon d'entrée saillant imposant sortant de l'édifice par un pignon crénelé, deux pavillons saillants sur les flancs de l'édifice de même hauteur.","habitants":"Famille des Barres\r\n        \r\n        \"","divers":"Barrois grav 1                                                                  Pey grav 2                                                                       le Salley grav 3","gps":"","images":["../image/image_18/18_Neuvy_Barrois_1.jpg","../image/image_18/18_Neuvy_Barrois_2.jpg","../image/image_18/18_Neuvy_Barrois_3.jpg"]},"Consult_chateau_formulaire78c9":{"id":"Consult_chateau_formulaire78c9","dept":"18","canton":"Avord","commune":"Nohant en Gout","nom":"Nohant_en_Gout","type":"Château","periode":"XV-XVII","histoire":"Deux château à  Nohant en Gout celui de Préau et celui Puyverday (pas d'information ).                            PREAU, les différentes périodes de sa construction datent du 4e quart du XVe siècle, du XVIIe siècle et du 4e quart du XVIIIe siècle, a été bâti, pour Jean Lallemand, fils de Guillaume  receveur général de Normandie. En 1645, Etienne de Chabenat, conseiller et secrétaire du roi, trésorier général de France à Grenoble, rachète le château du Préau et fait transformer l'ancien manoir fortifié, en une maison d'agrément. Les couvertures seront refaites en 1646. Le château aurait été la résidence principale des seigneurs de Savigny.                                                     PUYVERDAY pas d'information historique.","architecture":"PREAU, Il se compose d'un corps de logis à un étage et mansardes, accosté de deux ailes, restes probables d'une enceinte carrée. La façade ouest présente des angles garnis de tourelles percées d'embrasures rondes à couleuvrines. La cour carrée était autrefois fermée par un pavillon à pont-levis au-dessus duquel se trouvait une chambre de guet. Ce pavillon a été détruit au début du XIXe siècle.                           PUYVERDAY, corps de logis de trois travées à deux niveaux enclavé entre deux pavillons saillants rectangulaires de même niveaux toit à deux pans avec une lucarne centrale pour le corps de logis et lucarne à oeil de boeuf sur les pavillons.","habitants":"Famille de  Jean Lallemand\r\n        \"","divers":"Nohant  47° 06' 00\" nord, 2° 34' 16\" est                   Préau grav 1 -2                                                        Puyverday grav 3","gps":"","images":["../image/image_18/18_Nohant_en_Gout_1.jpg","../image/image_18/18_Nohant_en_Gout_2.jpg","../image/image_18/18_Nohant_en_Gout_3.jpg"]},"Consult_chateau_formulaire9b0d":{"id":"Consult_chateau_formulaire9b0d","dept":"18","canton":"La Guerche-sur-l","commune":"Ourouer","nom":"Ourouer_Cher","type":"Tour-Châteaux","periode":"XV-XVI","histoire":"Plusieurs châteaux à Ourouer dont celui d'Ourouer, la tour de Bourdelins et  de Chalivoy.                  OUROUER, les seigneurs de Troussebois, de  Vilaines et de Pelorde, ajoutèrent plusieurs bâtiments. Vers 1820, Pierre Faucard fit tracer une allée à lOuest des bâtiments, qui permettait la communication directe du château dOurouer au hameau des Bourdelins. Cette création, dune part, et la séparation en 2 lots du château dOurouer le 27 décembre 1855, provoqua labandon progressif de lentrée primitive vers lEst. Pour desservir la cour dhonneur, vers 1937, Lucien Clavier fit ouvrir la porte dans le mur denceinte Ouest et tracer un chemin qui aboutissait à cette allée ; ce chemin fut empierré en 1951. Lors de la séparation en 2 lots de la maison de maître, en 1968,Jean Clavier fit ouvrir la porte Est à angle droit et au Sud de lentrée primitive.","architecture":"OUROUER,  se trouve divisé en 3 propriétés. Il se compose du logis du maître, divisé en 2 parties depuis 1968, et des bâtiments dexploitation répartis autour de la basse-cour, qui composent la 3e propriété depuis le 27 décembre 1855.  Le bâtiment qui jouxte lescalier en vis au Nord a disparu sur le plan de 1945, sans doute depuis 1840.  La tour qui fait pendant au Nord à la tour dite la prison au Sud, à lEst de laile dhabitation ; elle fut bâtie en 1980 pour Jean Clavier, après la séparation en 2 propriétés du logis de maître ; elle permet daccéder aux pièces dhabitation créées dans les combles.  Différents travaux damélioration, de transformation, de réparation et de fouilles permirent de mettre à jour les emplacements :  Différents murs denceinte de la cour dhonneur et de son entrée Est et le mur denceinte extérieur, côté Ouest, dans lequel une porte donnait accès à la basse-cour. Les fondations du bâtiment entre bâti au XVe siècle, accolés au donjon et dont laccès se situait près du puits.Tour fortifiée dangle Nord-Ouest. Lexcavation de forme carrée de 2 m de côté et de 2 m 70 de profondeur, qui pouvait servir de réserve.","habitants":"Famille de Pierre Faucard\r\n        \"","divers":"Ourouer grav 1à4                                                     Bourdeleins grav 5-6                                                 Chalivoy grav 7","gps":"","images":["../image/image_18/18_Ourouer_Cher_1.jpg","../image/image_18/18_Ourouer_Cher_2.jpg","../image/image_18/18_Ourouer_Cher_3.jpg","../image/image_18/18_Ourouer_Cher_4.jpg","../image/image_18/18_Ourouer_Cher_5.jpg","../image/image_18/18_Ourouer_Cher_6.jpg","../image/image_18/18_Ourouer_Cher_7.jpg"]},"Consult_chateau_formulairee200-2":{"id":"Consult_chateau_formulairee200-2","dept":"18","canton":"Sancerre","commune":"Jalognes","nom":"Pesselières","type":"Château","periode":"XVI","histoire":"PESSELIERES, est sur les terres de la seigneurie de Pesselières. En 1639, Jean de Guibert acquiert les terres de la dernière héritière des La Porte, demoiselle Anne de Rochechouart veuve de Claude de La Porte, et entreprend d'importants travaux en 1640.  Parmi les Guibert, on note Jean-Louis, chancelier en l'Église cathédrale et Université de Bourges, seigneur de Pesselières. En 1693, les de Guibert cèdent Pesselières à François Robert, sieur du Verger, famille qui a pour auteur Antoine Robert, anobli par le roi Louis XI,  François Robert en fait le dénombrement en 1700. En 1705, cest le marquis de Puységur et la famille Chastenet de Puységur qui en deviennent propriétaires. À la Révolution, le marquis de Puységur demeure à Pesselières. Il est emprisonné sous la Terreur, libéré et meurt sur ses terres en 1810. Sous lEmpire et la Restauration, le château et ses terres sont entre les mains de Monsieur Boin, président du tribunal civil de Sancerre. Il édifie en 1820 une chapelle à lentrée du parc. En 1835, Madame de Mager, parente des Puységur, acquiert Pesselières des héritiers Boin. Elle est la veuve du colonel Collard, officier du Roi en 1773, puis des armées révolutionnaires et enfin de Napoléon 1er qui le fait chevalier de la Légion dHonneur à Schonbrunn en 1809. Les Collard demeurent propriétaires de Pesselières jusquà la fin des années 1980. Après une période dabandon et de nombreuses vicissitudes, Pesselières est l'objet de travaux de restauration depuis la fin des années 90.","architecture":"PESSELIERES,  plan en U. Il est entouré de douves avec un châtelet dentrée commandant le pont-levis. La porte d'entrée à bossage donne accès à un escalier en pierre rampe sur rampe. Des éléments architecturaux du XVe siècle sont visibles sur l'aile nord-ouest son corps de logis central et sa tourelle d'escalier. Le dénombrement de 1700 en précise la description : le château consiste en un grand corps de logis de face flanqué par derrière et au milieu dune grande tour couverte dardoises, deux autres bâtiments avec ailes, comprenant une grande salle, plusieurs chambres hautes, chapelle et prison, pont-levis en planches et dormant en pierres à arcades, profonds et larges fossés remplis deau vive ; basse cour avec portail accompagné de deux tours, le tout environné de hautes murailles et fossés profonds, gros colombier en pierre. Après la Révolution, sous la Restauration, le pont-levis est remplacé par un pont dormant en pierre, les fossés par des vallonnements de gazons, les murailles et les fortifications rasées. Sous le Second Empire, une ferme modèle est reconstruite à la place de bâtiments de ferme jugés obsolètes. Vers 1880, le Colonel Collard fait démolir laile gauche du château ouvrant ainsi la vue sur le parc et sa rivière. La tour est rehaussée et coiffée de créneaux, les ornements architecturaux des bâtiments revus dans le style néo-renaissance. Les communs sont reconstruits et le colombier est déplacé. Les relevés les plus récents mettent en évidence la structure médiévale du corps central et confirment lédification de laile en retour sud-est au XVIIe siècle sur une base plus ancienne.","habitants":"Famille de Jean de Guibert\r\n        \"","divers":"Pesselières 47° 12' 58\" nord, 2° 46' 42\" est1","gps":"","images":["../image/image_18/18_Pesseli%c3%a8res_1.jpg","../image/image_18/18_Pesseli%c3%a8res_2.jpg","../image/image_18/18_Pesseli%c3%a8res_3.jpg","../image/image_18/18_Pesseli%c3%a8res_4.jpg","../image/image_18/18_Pesseli%c3%a8res_5.jpg","../image/image_18/18_Pesseli%c3%a8res_6.jpg"]},"Consult_chateau_formulaire7f5b":{"id":"Consult_chateau_formulaire7f5b","dept":"18","canton":"Châteaumeillant","commune":"Saint-Hilaire de Lignières","nom":"Plaix_Plessis","type":"Château","periode":"XV-XVII","histoire":"PLAIX  Vers 1220, le fief du Plaix est donné au capitaine de la terre de Lignières en Berry. Du XVe siècle au XVIIe siècle, Le Plaix appartient à une branche cadette de la famille de La Châtre, puis à la famille Tailhandier du XVIIIe siècle jusqu'au XIXe siècle. Les Tailhandier ajoutèrent le nom de cette terre à leur patronyme. En 1961, la famille Goin-Berthier fait don du château au groupe folklorique des Thiaulins de Lignières, fondé en 1946 par Roger Pearron. Il abrite désormais un musée d'arts et traditions paysannes et accueille des conférences, des stages de musique traditionnelle, ainsi que des animations comme l'Assemblée du Plaix, qui fait revivre chaque année une fête paysanne berrichonne. Il est inscrit au titre des M.H. depuis novembre 1995. \r\nAu Nord de Lignières à la Celle Condé le château de Plessis pas d'information historique","architecture":"PLAIX, le château est entouré de douves en eaux ; on y accède aujourd'hui par un pont dormant. Il mêle des éléments médiévaux, des ajouts du XVIIe et XVIIIe siècles et le néogothique du XIXe siècle, abrite un musée d'arts et traditions paysannes avec des expositions renouvelées tous les 2 ans. Edifice de plan en équerre   à deux niveaux sur soubassement conséquant étant sur plan d'eau flanqué de tour carrée en décrochement  et d'un donjon flanqués d'une tourelle ronde en angle intérieur toit en poivrière et d'échauguettes en encorbellement   sur angles extérieurs.                                                                         PLESSIS à la Celle Condé  est inscrit aux M.H. depuis 1948, est fermé provisoirement au public. Il va devenir un gîte d'hôtes. Gentilhommière semblant avoir été construite au XVe siècle. L'édifice de plan rectangulaire comprend un rez-de-chaussée et un étage avec toit aigu en charpente terminé par deux pignons. Les façades nord et sud sont coupées, en leur centre, par deux tours circulaires. Les pignons sont accostés, sur chaque côté, par de petites échauguettes portées sur corbelets et couvertes par des poivrières. Ces échauguettes possèdent toutes des ouvertures à archères. La tour de la façade ouest soutient la porte d'entrée avec tympan souligné par une moulure en triangle curviligne concave, dans laquelle est ménagé un écu martelé. La menuiserie ancienne en planches bardées de clous existe toujours. Dans cette tour se trouve l'escalier en vis de pierre et de bois.","habitants":"Famille Tailhandier\r\n        \r\n        \"","divers":"Plaix  46° 43' 37\" nord, 2° 10' 27\" est                              Plessis grav 4,  46° 47' 12\" Nord et 2° 13' 51\" Est","gps":"","images":["../image/image_18/18_Plaix_Plessis_1.jpg","../image/image_18/18_Plaix_Plessis_2.jpg","../image/image_18/18_Plaix_Plessis_3.jpg","../image/image_18/18_Plaix_Plessis_4.jpg"]},"Consult_chateau_formulaire5771":{"id":"Consult_chateau_formulaire5771","dept":"18","canton":"Avord","commune":"Précy-Garrigny","nom":"Précy_Doys","type":"Château","periode":"XVI-XVII","histoire":"PRECY,  Antoine-Henri de Labriffe dAmilly  était chevalier, comte dAmilly, capitaine des frégates du Roi. Il épousa 21 janvier 1764 Julienne-Marie Renée Le Prestre de Châteaugiron (fille de Jacques-René Le Prestre,et de Louise-Jeanne de Robien). Ils ont eu Arnaud-Paul de Labriffe dAmilly, Henri-Bonaventure Jean Baptiste de Labriffe  et Charlotte-Julie Marie Jeanne (alias Hyacinthe-Charlotte) de Labriffe . Arnaud-Paul de Labriffe dAmilly, chevalier, comte dAmilly, seigneur de Précy, Saint-Martin-des-Champs, Bion, Les Barres (près de la Charité-sur-Loire), Amigny (Normandie), admis aux Écoles Royales (1780), officier au régiment du Roi-infanterie. Il épousa en mai 1789 Anne-Françoise Louise Hortense Le Tonnelier de Breteuil. Il mourut en 1796 lors de la deuxième guerre de Vendée (1795-1796) du côté de l'armée catholique et royale de Vendée. Son frère jumeau, Henri-Bonaventure Jean Baptiste de Labriffe était comte dAmilly, vicomte de Labriffe, officier au régiment du Roi, capitaine du 13° régiment des dragons de lempereur dAutriche, blessé à Hohenlinden (03/12/1800). Sa sur, Charlotte-Julie Marie Jeanne de Labriffe était dame de compagnie de madame Elisabeth (1785-1789). Elle épousa le 31/01/1785 François-Louis des Monstiers-Mérinville marquis de Mérinville, lieutenant des gendarmes de la Garde du Roi.","architecture":"A trois Km au sud ouest Garigny Château de Doys à Garigny date du XVIe et XVIIIe siècle. Ce château a fait l'objet de nombreuses reconstructions. Peu d'éléments de l'édifice sont conservés dans leur état d'origine. Durant la seconde guerre mondiale, les troupes allemandes occupent le château et elles l'incendient à leur départ. Aujourd'hui le château est une propriété privé et ne se visite pas. De plan rectangulaire à deux niveaux et lucarnes sur combles accolé de tours rondes  et d'échauguettes       Chantal De Roland Dallon est gérant de l'entreprise Sté du château de Doys .Gîtes de france .                   BLAUDY deux corps de logis   de plan rectangulaire place en équerre à deux niveaux avec lucarnes  sur toit en croupe, tour ronde de trois niveaux toit en  poivrière.","habitants":"Famille Arnaud-Paul de Labriffe dAmilly\r\n        \r\n        \"","divers":"Précy -Blaudy grav 1-2-6-7                                           Doys grav grav 3-4-5-","gps":"","images":["../image/image_18/18_Pr%c3%a9cy_Doys_1.jpg","../image/image_18/18_Pr%c3%a9cy_Doys_2.jpg","../image/image_18/18_Pr%c3%a9cy_Doys_3.jpg","../image/image_18/18_Pr%c3%a9cy_Doys_4.jpg","../image/image_18/18_Pr%c3%a9cy_Doys_5.jpg","../image/image_18/18_Pr%c3%a9cy_Doys_6.jpg","../image/image_18/18_Pr%c3%a9cy_Doys_7.jpg"]},"Consult_chateau_formulaire1d2a":{"id":"Consult_chateau_formulaire1d2a","dept":"18","canton":"Saint-Martin-d","commune":"Saint-Martin-d","nom":"Quantilly","type":"Château","periode":"XVIII-XIX","histoire":"CHAMPGRAND, le nouveau château est édifié avant 1850 pour Charles Valéry Batailler, homme d'affaires et héritier du vieux château par sa femme Jeanne Guillot. Chambres d'hôtes de monsieur M De Botmiliau                                                        QUANTILLY, du XVIIIe siècle et celui de Champgrand du XIXe siècle.  Le fief de Chamgrand, aux Labbe depuis le XVIe siècle, rend hommage à Mehun, tandis que celui de Vaux, mentionné dès le XIIIe siècle relève de l'alleu de Boisbelle.                                                   VIEUX CHATEAU, cette seigneurie appartenait aux seigneurs de Menetou, puis à une série de seigneurs qui paraissent unis à la famille : Etienne en 1255, Guillaume en 1286 Jehan de Quantilly en 1346, Robert en 1310, Gilbert en 1377, Robert de Ronay seigneur de Quantilly en 1414. Jacques Coeur acquit Quantilly, son fils en jouissait en 1487. Rougier le jeune en est seigneur de 1504 à 1517   En 1524 Jeanne Rougier le vend à Jacques Thiboust secrétaire du roi. Marie Thiboust porta cette terre à Etienne Bigot dont elle était veuve en 1570. Jacques Bigot la vendit à l'archevêque en 1618 dès lors Quantilly fut uni à la terre de Saint-Palais.","architecture":"QUANTILLY, Champgrand, logis de france de  Gazeau. La maison de maître comprend un corps de logis central accolé de deux pavillons en retrait, les deux angles de la façade portant chacun une tourelle polygonale saillante. Seul l'étage du bâtiment central est surmonté de combles mansardés. L'intérêt de cette maison bourgeoise provient de son implantation sur un coteau bien exposé au midi.                                            VIEUX-CHATEAU  Situé en pays de bois et de vignobles et sur un sol propice aux arbres fruitiers, la propriété de Thiboust pouvait être des plus agréable. Mais il y manquait le principal un manoir en rapport avec l'importance du maître, et qui pût remplir l'usage qu'il lui destinait. Il le fit reconstruire et édifia un château dans le gout du jour. Il l'entoura d'un parc et fit planter futaies, arbres, fruitiers, vignes. En 1789, le château consistait en une cour fermée; un pavillon abritait la porte d'entrée.","habitants":"Charles Valéry Batailler                                                 Famille de Jehan de Quantilly \r\n        \"","divers":"Quantilly Grav 1à 4                                                   Champgrand grav 5-6 47° 13' 30\" nord, 2° 26' 44\"   Vieux château grav 7","gps":"","images":["../image/image_18/18_Quantilly_1.jpg","../image/image_18/18_Quantilly_2.jpg","../image/image_18/18_Quantilly_3.jpg","../image/image_18/18_Quantilly_4.jpg","../image/image_18/18_Quantilly_5.jpg","../image/image_18/18_Quantilly_6.jpg","../image/image_18/18_Quantilly_7.jpg"]},"Consult_chateau_formulaire7945-3":{"id":"Consult_chateau_formulaire7945-3","dept":"18","canton":"Mehun-sur-Yèvre","commune":"Quincy","nom":"Quincy","type":"Château","periode":"XIV","histoire":"QUINCY,  la fin du XIVe siècle, Quincy appartient aux frères Jacquelin et Johannet Trousseau, propriétaires de Bois-Sir-Amé. Par la suite, il appartient au chirurgien de Charles VII de France, Regnault Thierry de Mehun. En 1490, Louis Dupont, seigneur de Meart et de Quincy, obtint du roi Charles VIII le droit de faire fortifier son château de Quincy. En 1648, le roi Louis XIV érige la seignerie de Quincy en vicomté, au nom de Charles Pinon de Quincy, maître des Requêtes et intendant du Berry. Dans son état actuel, le château de style Louis XII, inspiré de Bois-Bouzon et Jussy remplace le château hypothétique de 1490 ou celui qui lui fut antérieur. Ce château fut construit , sur l'emplacement d'un château médiéval. Son fils, intendant général de Bourgogne en 1705, fit élever vers 1708 deux ailes latérales, exécuter des aménagements intérieurs et probablement dessiner les jardins.","architecture":"QUINCY en totalité, y compris les décors intérieurs, les deux pavillons dentrée situés de part et dautre de lallée daccès, les façade, côtés et toitures de la remise bordant la cour du château au Nord-Ouest, les façades et les toitures des bâtiments de lancienne ferme situés au Nord-Ouest du château comprenant : au Nord, lhabitation avec grange et garage contigus, à lOuest, le corps de bâtiment disposé perpendiculairement à lhabitation, abritant la remise et les logements, et situés le long du chemin rural dit du domaine, à lEst, le cellier, le colombier et le corps de porche avec son passage, le puits de lancienne ferme, lallée daccès du château, lavant-cour, la cour dhonneur  les jardins, les escaliers de pierre qui relient les trois terrasses et les murs de soutènement de celles-ci, la balustrade, les deux bassins du parterre de la terrasse inférieure, lensemble du parc avec sa partie boisée, y compris les bancs sy trouvant et les murs de clôture, sont classés parmi les M.H par arrêté du 31 mars 1992.","habitants":"Famille de  Charles Pinon de Quincy\r\n        \"","divers":"Quincy 47° 07' 59\" nord, 2° 09' 27\" est","gps":"","images":["../image/image_18/18_Quincy_1.jpg","../image/image_18/18_Quincy_2.jpg","../image/image_18/18_Quincy_3.jpg"]},"Consult_chateau_formulaired764":{"id":"Consult_chateau_formulaired764","dept":"18","canton":"Dun-sur-Auron","commune":"Sagonne","nom":"Sagonne","type":"Forteresse","periode":"XIV","histoire":"SAGONNE,   la seigneurie de Sagonne appartient au domaine des comtes de Sancerre depuis le Xe siècle, est érigé en comté au XVe siècle et rattaché à la maison d'Amboise par alliance  de Anne du Bueil  qui épousa en 1428 Pierre Ier d'Amboise, en 1542 la dernière des Amboise vend le domaine à Jean Babou  de la Bourdaissière son fils ainé meurt également à la guerre de religion en 1589, Sagonne revient à Georges Babou gouverneur de Chartres et c'est sa nièce Gabrielle d'estrées favorite d'Henri IV qui vend en 1632 à Charles de L'Aubespine. Son neveu, héritier dépensier Claude Lebas de Montargis  le rachète  en 1694 et le revend en avril 1695 à Nicolas-Bernard Morel de Boistiroux, conseiller et aumônier du roi, Jules Hardouin-Mansart  acheta le château en 1699, le passe à son fils Jacques  en vertu de la donation contenue dans son acte de mariage en 1701 avec Madeleine Bernard, fille du puissant financier Samuel Bernard, banquier de la cour, il laisse la jouissance de la terre en 1754 à son fils cadet Jacques Hardouin-Mansart de Sagonne (1711-1778), architecte du roi et dernier des Mansart, se livre alors à la restauration du château. Du fait de sa bâtardise, il ne peut hériter, à la mort de son père en 1762, de Sagonne qui échoit, après moult procès, en 1765, à la marquise Anne Claude Louise d'Arpajon, comtesse de Noailles, sa cousine germaine, descendante d'Hardouin-Mansart et dame d'honneur de Marie-Antoinette. À la Révolution française, la comtesse de Noailles est guillotinée et le château entre dans une longue période de déclin. C'est à partir de 1977 que, racheté par Jacques  Babou descendant de la famille.","architecture":"SAGONNE, le château est élevé au cours du XIVe siècle pour contrôler l'itinéraire de Bourges à Sancoins, dans une enceinte de forme arrondie, l'enceinte possédait jadis neuf côtés d'un diamètre de 67 mètres il reste des tours rondes accolées au bâtiment de ceinture et bases de tour.  C'est à cette époque que les fossés sont remplacés par des douves en eau, au centre vestiges de la forteresse composé de tour ronde carré agloméré en un seul bloc avec le donjon, un imposant donjon  du XIVe siècle deux grands bâtiments dont-il reste rien aujourd'hui, et les restes d'une enceinte fortifiée sertie de tours, bordée par des douves alimentée par un rû, le Sagonin. Les jardins à la française, créés au début du XVIIIe siècle et disparus depuis, longtemps attribués à André Le Nôtre, furent en fait une des réalisations emblématiques de Jules Hardouin-Mansart en la matière, le château est classé au M.H. depuis 1914.","habitants":"Famille de Jules Hardouin-Mansart\r\n        \"","divers":"Forteresse de Sagonne 46° 51' 00\" nord, 2° 49' 35\" est","gps":"","images":["../image/image_18/18_Sagonne_1.jpg","../image/image_18/18_Sagonne_2.jpg","../image/image_18/18_Sagonne_3.jpg","../image/image_18/18_Sagonne_4.jpg","../image/image_18/18_Sagonne_5.jpg","../image/image_18/18_Sagonne_6.jpg","../image/image_18/18_Sagonne_7.jpg","../image/image_18/18_Sagonne_8.jpg","../image/image_18/18_Sagonne_9.jpg"]},"Consult_chateau_formulaire5360":{"id":"Consult_chateau_formulaire5360","dept":"18","canton":"Sancerre","commune":"Sancerre","nom":"Sancerre_Tour_Fiefs","type":"Patrimoine","periode":"XIV","histoire":"SANCERRE  château de Sancerre a été l'un des plus forts châteaux du Moyen-Age construits, il fut le siège des comtes de Sancerre dont des membres de la famille furent Grands Officiers du royaume de France : comme Louis de Sancerre, connétable de France. Le futur Charles VII et Jeanne d'Arc séjournèrent au château, alors place stratégique à la frontière du  Royaume de Bourges. La ville de Sancerre était  fortifiée. Elle était construite sous le château, fermant l'accès à la pente la moins escarpée de la montagne. Construit sur le sommet d'une montagne isolée des collines du Sancerrois, il en reste cependant l'ancien donjon,  la Tour des Fiefs comporte un escalier de bois, de 1856, pour Armand de Crussol, Duc dUzès. Les ruines du château féodal sont aujourd'hui occupées par un hôtel particulier, construit en 1874, pour Mlle de Crussol d'Uzès. Château de Sancerre, Gérard Charrier, le château en lui-même ne fait pas partie de lacquisition. Il restera une propriétaire privée.  Un autre acquéreur  devrait reprendre le château à travers une convention dutilisation avec Terrena.","architecture":"SANCERRE, la Tour des Fiefs est l'un des derniers vestiges du château des Comtes de Sancerre. De forme cylindrique, le donjon date de la fin du XIVe siècle. Il se situe en haut d'une colline. Flanqué d'un escalier de pierre en spirale, il abrite dans ses murs, au rez-de-chaussée, un musée privé, qui recèle des armures et boulets, du siège de 1573. Au 1er étage se trouve une chapelle du XVIIIe siècle. Le château des comtes de Sancerre et les remparts de la ville furent démolis en 1621.  La Tour des Fiefs, un des derniers vestiges du château des comtes de Sancerre, est un donjon cylindrique, datant de la fin du XIVe siècle, situé au sommet de la colline. Flanqué d'un escalier de pierre en spirale, il abrite au rez-de-chaussée un musée privé recelant armures et boulets, témoins de la période du siège de 1573. Au 1er étage se trouve une chapelle du XVIIIe siècle.   La  Les ruines du château féodal sont aujourd'hui occupées par un hôtel particulier. L'hôtel de style Louis XII et le parc privé sont aujourd'hui la propriété de la société Marnier-Lapostolle. Elle fait lobjet dune inscription au titre des M.H. depuis le 12 février 1927.","habitants":"Duc dUzès Armand de Crussol,\r\n        \"","divers":"Sancerre 47° 19' 52\" nord, 2° 50' 27\" est1                 Vallée: 47° 25' 21\" Nord et 2° 44' 54\" Est                 L'Etang grav-5","gps":"","images":["../image/image_18/18_Sancerre_Tour_Fiefs_1.jpg","../image/image_18/18_Sancerre_Tour_Fiefs_2.jpg","../image/image_18/18_Sancerre_Tour_Fiefs_3.jpg","../image/image_18/18_Sancerre_Tour_Fiefs_4.jpg","../image/image_18/18_Sancerre_Tour_Fiefs_5.jpg"]},"Consult_chateau_formulaire4103":{"id":"Consult_chateau_formulaire4103","dept":"18","canton":"Mehun-sur-Yèvre","commune":"Limeux","nom":"Sarragosse","type":"Maison-Forte","periode":"XVI","histoire":"SARRAGOSSE, la construction du château de Saragosse date du XIV au XVII siècle. L'histoire du lieu noble de Saragosse se confond avec celle des familles Dumoustier et Dorsanne, anciennes familles du Berry issues de la Bourgeoisie. La construction du château actuel, au début du XVIe siècle, sur des fondations plus anciennes, est due aux Dumoustier, des écuyers qui possédaient la terre de Saragosse depuis le milieu du XIVe siècle.  Cette maison-forte endommagée par les Ligueurs, comme en témoigne la reconstruction en 1592 du pavillon d'entrée, fut modernisée sous Henri IV ou Louis XIII, pour la famille Dorsanne qui l'acquit en 1604.","architecture":"SARRAGOSSE, la maison seigneuriale reprend le parti traditionnel des demeures de plaisance construites en Berry par la petite noblesse après la guerre de cent ans et dont le type perdure jusqu'au milieu du XVIe siècle. Etablie sur une plate-forme fossoyée, elle présente un logis de plan massé rectangulaire, cantonné de tourelles, avec tour d'escalier implantée dans l'axe de la façade. Des bâtiments de service sont répartis dans la cour fermée par des courtines, s'ouvrant à l'ouest par un ouvrage d'entrée. Un fossé, au nord, sépare la plate-forme carrée de la cour du château de la basse-cour ; un second fossé, au sud, sépare de l'enclos adjacent du jardin, enclos par un fossé plus étroit. Le château est annoncé par une avenue.  La porte de la tour d'escalier du logis reçut un riche décor mêlant avec fantaisie les souvenirs de la Renaissance et l'influence du baroque. Le colombier a été construit entre 1646 et 1715. Une galerie à arcades, détruite après 1891, remplaça la courtine nord, tandis que le pignon nord du logis et sa façade postérieure prirent une ordonnance classique, symétrique, simplement marquée par les encadrements des baies, à bossages et refends, formant ch
