maines. L'architecte Eugène Millet, disciple du célèbre Eugène Viollet-le-Duc, détruit les pavillons bâtis par Mansart au XVIIe siècle et restitue l'aspect du palais au temps de sa splendeur. Le musée est inauguré en présence de l'empereur en 1867. La vieille bâtisse est encore le témoin muet d'un événement historique majeur, en effet le 10 septembre 1919, les alliés y signent la paix avec l'Autriche. Abrite aujourd'hui les fabuleuses collections du Musée des Antiquités Nationales.\nÉléments protégés MH : le château Vieux : classement par liste de 1862. Le pavillon de la Muette, dans la forêt domaniale: classement par arrêté du 7 avril 1921. L'ensemble du domaine national : classement par arrêté du 8 avril 1963.","architecture":"VAL, en 1674, construction d'un rendez-vous de chasse par Jules Hardouin-Mansart, architecte, pour le roi Louis XIV. Les jardins auraient été conçus par André Le Nôtre, les sculptures par Etienne Le Hongre et Martin Desjardins. Vers 1776 agrandissement du château du Val par l'architecte Galant pour le prince Charles de Beauveau avec surélévation d'un étage et construction d'un corps de bâtiment au sud. Les jardins ont été redessinés par Hubert Robert. Vers 1855 transformation pour Madame Achille Fould et réaménagement du parc par Louis Sulpice Varé architecte paysagiste. Construction de la laiterie dans la deuxième moitié du XIXe siècle. Limite du XIXe-XXe siècle, création du parterre régulier. En 1927, lotissement d'une partie du parc et don du reste du domaine à la grande chancellerie. Entre 1935 et 1939, reconstruction des communs. Éléments protégés MH : le château, à l'exclusion des communs : inscription par arrêté du 21 juin 1991. Les façades et les toitures du château, à l'exclusion de celles des communs qui prolongent l'édifice au nord : classement par arrêté du 5 juillet 1993 . Elevé pour Louis XIV comme relais de chasse, puis surélevé à la fin du XVIIIe siècle pour le prince de Beauvau. Château très modifié sous le Second Empire pour Achille Fould. Parc transformé au XVIIIe siècle par Hubert Robert.","habitants":"St-Germain; Jacques II Stuart,                                  Val ; le prince Charles de Beauveau\"","divers":"deux châteaux dans cet article  St-Germain en Laye grav 1-2-3 -4 et le Val grav 5-6-7-8","gps":"","images":["../../jctruffet.com/image/image_78/78_ST_Germain_en_Laye_1.jpg","../../jctruffet.com/image/image_78/78_ST_Germain_en_Laye_2.jpg","../../jctruffet.com/image/image_78/78_ST_Germain_en_Laye_3.jpg","../../jctruffet.com/image/image_78/78_ST_Germain_en_Laye_4.jpg","../../jctruffet.com/image/image_78/78_ST_Germain_en_Laye_5.jpg","../../jctruffet.com/image/image_78/78_ST_Germain_en_Laye_6.jpg","../../jctruffet.com/image/image_78/78_ST_Germain_en_Laye_7.jpg","../../jctruffet.com/image/image_78/78_ST_Germain_en_Laye_8.jpg"]},"Consult_chateau_formulaire4307":{"id":"Consult_chateau_formulaire4307","dept":"78","canton":"Rambouillet","commune":"St-Hilarion","nom":"St_Hilarion","type":"Chateaux","periode":"XVII-XIX","histoire":"deux châteaux dans cet article;  Gueville à Gazeran et Voisins.                                                                                                                                                                                          GUEVILLE à cinq K.M. au sud Est de Saint -Hilarion, à Gazeran  château construit à la fin du quatième quart du XIXe siècle pour le président Sadi Carnot ; la ferme existait en 1830, elle est très restaurée.\nIl a été construit entre 1903 et 1906 à Saint-Hilarion par l'architecte René Sergent et le paysagiste Achille Duchêne. On lira avec intérêt le texte historique très complet de Cricrimary qui nous conte les péripéties de la construction du château et nous rappelle les propriétaires et résidents célèbres comme. Le maréchal Pétain. L'édifice se compose d'un sous-sol, d'un étage carré et d'un étage de comble. Le gros oeuvre : brique; brique et pierre; enduit et moellon. Elévation ordonnancée surmontée d'un toit à longs pans et croupe, recouverts d'ardoise.","architecture":"VOISINS,  un premier château construit au XIVe siècle,  remaniè à plusieurs reprises et le château reconstruit de 1903 à 1906 par l'architecte René Sergent pour un riche banquier parisien, le comte Edmond de Fels, prince de Heffingen. En 1892, le commanditaire avait acquis le domaine de Voisins où restaient des vestiges de l'ancien château du marquis de Croismare, modifié par l'architecte Ange Jacques Gabriel en 1779. Le nouveau château s'inspire des oeuvres de cet architecte auquel le comte de Fels vouait un culte particulier. A leur retour d'émigratuion  il cèdent Voisins à monsieur Saint-Didier dont la fille épouse le duc de la Trémoille, veuf une deuxième fois se remarie avec mademoiselle Walsle. Le  duc cède  le domaine au marquis des Moustiers-Mérinville. Derrière ses allures de pastiche du XVIIIe siècle, le château, qui ne comporte pas moins de 47 pièces, est doté de tous le confort moderne et à conservé quelques dépendances d'un château habité par la princesse de Conti fille de Louis XIV  et de mademoiselle de la Vallière,  fut en grande partie reconstruit sous la restauration  : chauffage central, monte-charge, etc. Les jardins sont aménagés de 1906 à 1929 par l'architecte-paysagiste Achille Duchêne.  Voisins appartient ensuite à Leconte de l'Isle propriété de la B.N.C.I.  Éléments protégés MH : les façades et les toitures du château y compris la terrasse à balustres avec l'escalier côté jardin ; le vestibule et l'escalier avec sa cage et sa rampe en fer forgé ; les pièces suivantes avec leur décor, au rez-de-chaussée la salle à manger, le grand salon, le salon vert, le petit salon de l'aile sud ; au premier étage, la chapelle ; le parc ordonnancé : classement par arrêté du 30 décembre 1983.","habitants":"Rosay; Louis Charles Colbert                                      Voisins; marquis de Croismare\"","divers":"Trois châteaux dans cet article, Gueville grav-4 à gazeran et Voisins grav-1-2-3.","gps":"","images":["../../jctruffet.com/image/image_78/78_St_Hilarion_1.jpg","../../jctruffet.com/image/image_78/78_St_Hilarion_2.jpg","../../jctruffet.com/image/image_78/78_St_Hilarion_3.jpg","../../jctruffet.com/image/image_78/78_St_Hilarion_4.jpg"]},"Consult_chateau_formulairebf59":{"id":"Consult_chateau_formulairebf59","dept":"78","canton":"Maurepas","commune":"St-Rémy lès Chevreuse","nom":"St_Rémy_Chevreuse","type":"Château","periode":"XIV-XV-XVII","histoire":"Cinq châteaux dans cet article; Aigrefoin,  Coubertin, Benedictins, Rodhon, et Vaugien.                                                                                                             AIGREFOIN, ce manoir fut construit au XVIIe siècle. Il est composé d'un logis au nord-est dans un enclos et d'une ferme à l'ouest. En 1750, le fief ne comporte qu'une ferme, et un colombier est au centre de la cour. Les bâtiments sont très dénaturés. Il subsiste au nord-est le mur de clôture avec deux tours arasées, gros-oeuvre en meulière, calcaire, grès, moellon, enduit partiel, brique  avec toit à longs pans, pignon couvert  en tuile mécanique.                                                                                                              COUBERTIN, fief attesté dès le XIIe siècle. Acheté en 1577 par Jean Fredy, il se compose seulement de la ferme de la verrerie. Motte, fossé, moulin à blé et manoir sont attestés en 1634. Le château a été construit peu avant 1698 pour Bernard Fredy. Ferme remaniée à plusieurs reprises, très restaurée. En 1620, chapelle mentionnée à la verrerie. Chapelle actuelle du milieu XIXe siècle, mais sur emplacement construit en 1724. Plafond de la chapelle peint par Ch. de Coubertin en 1856. Le fronton postérieur du château porte les dates 1696 et 1896.  La charpente porte la date  de 1700.   fondation à but culturel grace au baron Pierre de Coubertin qui créa la fondation  en 1973, en 1974 au décès de  Yvonne de Coubertin le domaine revient par legs à la fondation, Jean Bernard  en 1985 en  fait don   d'un ensemble d'oeuvres de son père Joseph Bernard.                                                                                                    éléments protégés MH : le château de Coubertin en totalité : inscription par arrêté du 7 septembre 1945.","architecture":"BENEDICTINS     Château édifié dans le quatième quart XIXe siècle sur cave voûtée de l'ancien logis abbatial en avant de l'édifice,  hôtel de ville.           \nRODHON, le manoir  a été construit au XVIIe siècle, dès 1765 l'implantation actuelle est en place; après 1819 un bâtiment en bordure de rue vient rejoindre la tourelle qui flanque le portail d'entrée, a un étage carré avec  escalier dans-oeuvre   meulière, silex, moellon sans chaîne en pierre de taille, enduit partiel, brique avec pierre en remplissage, toit à longs pans, croupe, pignon couvert, toit conique en tuile plate.                                                                                          VAUGIEN, au XIIe siècle, mention d'une grange. Aux XIVe, XVe et XVIe siècles, mention d'un manoir, d'une chapelle et d'un colombier. En 1659, existence d'une grande maison de quatre travées. Le château a été édifié dans la deuxième moitié du XVIIe siècle. Le jardin créé à la fin du XVIIe siècle par le célèbre architecte paysagiste André Le Nôtre pour Pierre ou Denis Feydeau. Détruit entre 1798 et 1819. L'actuel château  a été construit après 1828 avec matériaux provenant du Grand Ragonant aux Molières.\nÉléments protégés MH : les façades et les toitures, les espaces de distribution sur l'ensemble des niveaux, ainsi que les pièces du rez-de-chaussée suivantes : la bibliothèque, le bureau, le grand salon, la salle de billard et la salle à manger, inscription par arrêté du 20 février 2001.","habitants":"Coubertin ; famille fredy                                       Vaugien ; famille de  Denis Feydeau.\"","divers":"Cinq châteaux dans cet article; Aigrefoin    grav 4,  Coubertin grav 1-2-3, Benedictins, Rodhon, et Vaugien grav-7-8-9.","gps":"","images":["../../jctruffet.com/image/image_78/78_St_R%c3%a9my_Chevreuse_1.jpg","../../jctruffet.com/image/image_78/78_St_R%c3%a9my_Chevreuse_2.jpg","../../jctruffet.com/image/image_78/78_St_R%c3%a9my_Chevreuse_3.jpg","../../jctruffet.com/image/image_78/78_St_R%c3%a9my_Chevreuse_4.jpg","../../jctruffet.com/image/image_78/78_St_R%c3%a9my_Chevreuse_5.jpg","../../jctruffet.com/image/image_78/78_St_R%c3%a9my_Chevreuse_6.jpg","../../jctruffet.com/image/image_78/78_St_R%c3%a9my_Chevreuse_7.jpg","../../jctruffet.com/image/image_78/78_St_R%c3%a9my_Chevreuse_8.jpg","../../jctruffet.com/image/image_78/78_St_R%c3%a9my_Chevreuse_9.jpg"]},"Consult_chateau_formulaire515e":{"id":"Consult_chateau_formulaire515e","dept":"78","canton":"Rambouillet","commune":"Ste-Mesme","nom":"Ste_Mesme","type":"Manoir-château","periode":"XV-XVI","histoire":"Deux châteaux dans cet article, ste Mesme et le Manoir.                                     STE MESME,    première mention en 1379 d'un château que Louis d'Orgessin fait fortifier ; agrandissements au cours de la deuxième moitié du XVe siècle par Aymard de Poisieux et Marguerite de Montorsier qui bâtissent un logis à l'est avec tourelle, à l'angle sud-est, et tour d'escalier hors-oeuvre carrée au milieu de la façade nord; au cours du premier quart du XVIe siècle, doublement du logis au nord et construction d'une deuxième tour d'escalier, décor 1ère Renaissance, porte et lucarne actuellement réemployées, construction d'une seconde tour en encorbellement au sud; durant le 1er quart XVIIe siècle, René ou Anne de l'Hospital élèvent une galerie de sept travées sur portique côté nord pour relier un châtelet à l'ouest existant sans doute déjà; une chapelle y est aménagée ; de 1864 à 1888 : aménagement et remplois gothiques cheminées, grilles, portes, et consoles  pour le romancier Auguste Maquet.  Éléments protégés MH : les façades et les toitures du château : classement par arrêté du 27 juillet 1987. L'intérieurs du château; les façades et les toitures des communs ; les douves : inscription par arrêté du 27 juillet 1987.","architecture":"Le MANOIR de Sainte Mesme est un des derniers manoir du XVe siècle subsistant en Île-de-France. Jusquà la Révolution, le manoir était la demeure du receveur du seigneur de Sainte Mesme, leur blason orne toujours la cheminée du manoir. Le manoir avec ses murs en grès, ses fenêtres à meneaux, sa tour octogonale et ses caves voûtées, conserve des éléments darchitecture du XVe et du XIXe siècles. Le musée du Costume militaire se situe dans les dépendances du splendide manoir de Sainte-Mesme, appartenant au général et à la comtesse Louis de Lambilly. Avec ses 105 mannequins, grandeur nature, tout un pan dhistoire défile en bonne ordre entre un général de 1870 et un soldat en Afghanistan, sans oublier les soldats de la Grande Guerre et tous les combattants de la Deuxième Guerre Mondiale aux conflits récents.\nÉléments protégés MH : les façades et les toitures du manoir : inscription par arrêté du 22 novembre 1985.","habitants":"Ste-Mesme; Anne de l'Hospital                                    Manoir; Louis de Lambilly.\"","divers":"Deux châteaux dans cet article, Ste-Mesme  grav 1-2 et le Manoir grav-3.","gps":"","images":["../../jctruffet.com/image/image_78/78_Ste_Mesme_1.jpg","../../jctruffet.com/image/image_78/78_Ste_Mesme_2.jpg","../../jctruffet.com/image/image_78/78_Ste_Mesme_3.jpg"]},"Consult_chateau_formulaire85a4":{"id":"Consult_chateau_formulaire85a4","dept":"78","canton":"Mantes-la-Jolie","commune":"Rosny sur seine","nom":"Sully_Rosny","type":"Château","periode":"XV-XVI","histoire":"SULLY,  du XV-XVIe siècle  Maximilien de Béthune, duc de Sully, ministre de Henri IV, fit construire le château de Rosny, sur les bases d'un château médiéval, dans les dernières années du XVIe siècle. En 1641 mort de Sully héritier de la terre de Rosny qui avait entreprit en 1595 la construction du château. En  1718 le château est vendu à la famille de Senozan, le fils de ce dernier, président au parlement de Paris fait édifier un pavillon de bain au bord de la seine, en 1779 passe par alliance à Archambaud-Joseph de Talleyrand-Périgord, frère du futur ministre de Napoléon. il reecouvrera la jouissance de Rosny après la Révolution avant de s'en défaire en 1817 acquis par le duc de Berry, qui en fait donation à son épouse qui en fait sa résidence favorite fait bâtir des ailes en retour prévues dans les plans de Sully et agrandir le corps de logis principal du côté de l'arrivée d'un avant-corps à un niveau surmonté d'une terrasse. En 1830 acquis par un banquier qui disperse une partie du mobilier puis par le comte Le Marois qui fait raser  les ailes construites par la duchesse de Berry, vendu en 1869 à la famille Lebaudy et en 1955 à la famille Hertz, en 1984 par une siociété japonnaise qui le vide de son mobilier et le laisse se degrader, victime d'un incendie en janvier 1997, le ministère de la culture décide de le remettre en état avec la mairie de Rosny.","architecture":"SULLY, sur les bases d'un château médiéval, dans les dernières années du XVIe siècle. Le château était composé sur un plan en quadrilatère avec quatre pavillons d'angle, la cour étant fermée par un mur et l'ensemble  entouré de fossés. En 1818, le duc de Berry fit appel à l'architecte Froelicher afin de doubler le corps de logis central par un corps en rez-de-chaussée et les ailes latérales furent détruites en 1846. Actuellement, le château, construit en brique et pierre, est constitué d'un corps de bâtiment central flanqué de deux pavillons latéraux. Un incendie a ravagé une grande partie du château le 24 janvier 1997.\nÉléments protégés MH : le château, y compris le parc et les dépendances : classement par arrêté du 11 juillet 1941.","habitants":"Maximilien de Béthune, le ministre Sully\"","divers":"Château des Sully","gps":"","images":["../../jctruffet.com/image/image_78/78_Sully_Rosny_1.jpg","../../jctruffet.com/image/image_78/78_Sully_Rosny_2.jpg"]},"Consult_chateau_formulaire952d":{"id":"Consult_chateau_formulaire952d","dept":"78","canton":"Aubergenville","commune":"Thoiry","nom":"Thoiry","type":"Château","periode":"XVI","histoire":"THOIRY, vers 1559, la quête de Raoul Moreau n'eut rien de banal et révéla un étonnant projet. Trésorier du roi de France, cet homme d'argent, alchimiste de surcroît, cherchant à transformer en or ses passions ésotériques, trouva l'endroit idéal, le site de Thoiry lui sourit et il décida de construire son château en haut d'une colline. Restait à trouver les hommes de l'art et ce furent l'architecte Philibert de l'Orme et le maître maçon Olivier Ymbert, utilisant avec bonheur les règles architecturales du nombre d'or, surent offrir au maître des lieux un château en résonance avec les forces de la Nature et en pleine harmonie avec l'univers. Le château est modernisé vers 1840 pour Henriette de Voguë ancêtre des propriétaires actuels,  en 1968 Paul de la Panouse transformr une partie du parc en parc  animalie, toujours dans cette famille.","architecture":"THOIRY, grâce à sa position dans l'espace, l'édifice crée un pont de lumière à travers lequel le Soleil semble se lever, au solstice d'été et se coucher au solstice d'hiver, dans le vestibule du château. Depuis, les 16 générations de la famille de La Panouse se sont succédé. Et s'il a fallu 400 ans pour rassembler 450 hectares en une propriété d'un seul tenant, il ne vous suffira que d'un instant pour être conquis et transporté, du côté de la féerie.  Éléments protégés MH : les façades et les toitures du château: inscription par arrêté du 19 janvier 1973. Les façades et les toitures du bâtiment des écuries du château ; les façades et les toitures du bâtiment du fief du Perron ; la chapelle du château en totalité; la grande perspective du château : inscription par arrêté du 12 décembre 2014.","habitants":"famille de La Panouse \"","divers":"Château de Thoiry","gps":"","images":["../../jctruffet.com/image/image_78/78_Thoiry_1.jpg","../../jctruffet.com/image/image_78/78_Thoiry_2.jpg","../../jctruffet.com/image/image_78/78_Thoiry_3.jpg"]},"Consult_chateau_formulaireea32-2":{"id":"Consult_chateau_formulaireea32-2","dept":"78","canton":"ConFlans ste honorine","commune":"ConFlans ste honorine","nom":"Théméricourt_78","type":"Château","periode":"XVII","histoire":"THEMERICOURT, en 1658, le sieur François Lesecq achète les fiefs de Théméricourt et de Thibault Messier qui comprennent une maison comportant deux pièces au rez-de-chaussée et deux à l'étage, des annexes agricoles un parc avec une garenne. Ils construit le château en 1667 comme l'atteste un plan du fief. Le domaine sort de la famille en 1782, il est acquis par Alphonse Tarboichier de Beaumont, puis passe entre les mains de plusieurs propriétaires avant d'entrer en 1875 dans la famille Troussel, cette famille vers 1880 décide de créer un lotissement dit le Parc du Château de Conflans qui n'aura pas de succès, probablement en raison du manque de viabilité. En 1906 il est acquis par Maître Renault, créancier des propriétaires. En 1921, le château a été acheté par l'Enfance Batelière, une association qui y installe une école primaire avec internat destinée aux enfants de bateliers. Il est donné à l'Etat en 1960 et un nouveau bâtiment scolaire est construit au-dessus, sur le plateau en 1968.\nUn p.v. de 1773 permet de voir que les volumes extérieurs du château ont été peu modifiés. La façade présente un léger avant corps central marqué par une lucarne avec fronton cintré. Les trumeaux comportent des tables rentrantes. Les six autres lucarnes ont été refaites au XXe siècle. L'escalier se trouve à l'arrière, en hors oeuvre : il est en pierre jusqu'au premier étage puis en bois au delà. La distribution intérieure comportait des pièces en enfilade. D'ouest en est : un salon de compagnie, une chambre à alcôve, une salle à manger, une chambre à coucher, un cabinet donnant sur un escalier secondaire. Au sous-sol entièrement voûté se trouvaient les cuisines et d'autres pièces de service. La chapelle se trouve à l'arrière, au niveau du premier étage, entre l'escalier en hors oeuvre et la falaise, au dessus d'un passage cintré permettant d'aller dans la basse-cour.","architecture":"THEMERICOURT, l'édifice était en très mauvais état en 1773, (plafonds effondrés, enduits tombés) mais un document atteste qu'elle était restaurée en 1808. Les communs étaient installés dans d'anciennes carrières à gauche et à l'arrière du bâtiment. Ces carrières étaient fermées d'un mur de revêtement décoré de cinq arcades et d'un étage avec des croisées feintes. L'ancienne basse-cour, au delà du passage est occupée par une grande salle de spectacle qui occulte les ouvertures nord de la partie droite. Les pièces du rez-de-chaussée ont été cloisonnées. A l'étage se trouvaient trois appartements de maîtres. Le comble avait un grand grenier et des chambres. Les boiseries du rez-de-chaussée ont été très dénaturées par les nombreux remaniements.","habitants":"sieur François Lesecq \"","divers":"Château de Téméricourt","gps":"","images":["../../jctruffet.com/image/image_78/78_Th%c3%a9m%c3%a9ricourt_78_1.jpg","../../jctruffet.com/image/image_78/78_Th%c3%a9m%c3%a9ricourt_78_2.jpg"]},"Consult_chateau_formulairec2a5":{"id":"Consult_chateau_formulairec2a5","dept":"78","canton":"Bonnières-sur-Seine","commune":"Tilly","nom":"Tilly_78","type":"château","periode":"XVII","histoire":"TILLY, domaine construit dans le premier tiers du XVIIe siècle, ayant conservé son parc, ses communs et son allée de tilleuls de la fin du XVIIIe siècle. Le comte de Grasse avait acquis le château et le marquisat de Tilly, à la veille de son premier mariage, en janvier 1764. C'est là qu'il se retira en 1784, exilé de la Cour après le conseil de guerre qui blâma les subordonnés qui l'avaient mal servi au combat des Saintes, parmi lesquels Bougainville. Le château se dresse face à l'église de Tilly, il fut acheté et sauvé de la ruine en 1936 par François Delalande, sa fille l'occupe toujours aujourd'hui.","architecture":"TILLY,  de plan rectangulaire à deux niveaux et un niveau sur combles avec lucarnes réduites seul la partie centrale est sommet d'un fronton triangulaire. C'est une belle demeure de style Louis XIII, flanquée de ses deux tours avec toit original en coupole, dans un parc de six hectares entièrement entouré de murs.    Éléments protégés MH : les façades et les toitures du château et des communs; le parc et l'allée de tilleuls : inscription par arrêté du 21 avril 1994.","habitants":"Le comte de Grasse\"","divers":"Château de Tilly","gps":"","images":["../../jctruffet.com/image/image_78/78_Tilly_78_1.jpg"]},"Consult_chateau_formulaire9f99-2":{"id":"Consult_chateau_formulaire9f99-2","dept":"78","canton":"Aubergenville","commune":"Tremblay sur Mauldre","nom":"Tremblay_Mauldre","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article Mareil et Tremblay.                                                                               A cinq K.M. au nord ouest  MAREIL LE GUYON, le château a été construit au XVIIe siècle au milieu des marécages qui assuraient sa protection et qui ont été drainés depuis. Les seigneurs du lieu s'appelant Guyon, le château a reçu leur nom. En 1226, le comté de Montfort était propriété d'Amaury VI, fils de Simon, la seigneurie et la terre de Mareil étaient à Simon de Mareuil. La famille Chaumont est propriétaire de la demeure jusqu'à ce qu'Antoine Pierre de Chaumont marie sa fille à Louis Honoré Félix, baron Le Pelletier d'Aunay, qui hérite alors du domaine de Mareil. Leur fille épouse le baron Séguier qui en devient propriétaire. Puis enfin, de nouveau par alliance, la famille d'Avaray en devient propriétaire en 1876.                                                                                                      TREMBLAY, château bâti sous le règne de Louis XIII à la fin du XVIe siècle par Jean Le Clerc de Tremblay et terminé par son épouse Marie de Lafayette. Cette dernière fait construire une poterne à pont-levis afin de mettre le château en sûreté. L'un de leur fils, François, se fait capucin sous le nom de père Joseph et devient conseiller de Richelieu. Son frère Henri, gouverneur de la Bastille entreprend des travaux et donne au château son aspect quasi-actuel. Au XVIIIe siècle, deux ailes basses en retour sont adjointes, le château est vendu en 1947 à la ville de Neuilly-sur-Seine et revendu à une société hôtelière avec golf et parc de 40 ha.","architecture":"TREMBLAY éléments protégés MH :  construction en pierre et brique, les façades et les toitures du château et des communs : classement par arrêté du 5 décembre 1979. Le pavillon de musique ; le parc ordonnancé, y compris le tapis vert : classement par arrêté du 11 février 1991. Les intérieurs du château et des communs ; la partie boisée du parc : inscription par arrêté du 11 février 1991.","habitants":"Mareil ; famille Chaumont                           Jean Le Clerc de Tremblay\"","divers":"Deux châteaux dans cet article Mareil grav-3 et Tremblay grav 1-2.","gps":"","images":["../../jctruffet.com/image/image_78/78_Tremblay_Mauldre_1.jpg","../../jctruffet.com/image/image_78/78_Tremblay_Mauldre_2.jpg","../../jctruffet.com/image/image_78/78_Tremblay_Mauldre_3.jpg"]},"Consult_chateau_formulaire3a36":{"id":"Consult_chateau_formulaire3a36","dept":"78","canton":"Rambouillet","commune":"Vaux de Cernay","nom":"Vaux_Cernay","type":"Château","periode":"XVIII","histoire":"VAUX DE CERNAY, l'ensemble fut acheté en 1873 par la baronne Charlotte de Rothschild. La famille fortunée s'efforça de reconstituer l'esprit des lieux avec des travaux importants pour consolider ou réhabiliter les vestiges dans une évocation architecturale de style anglican. Après la mort de la baronne en 1899, le domaine entre dans le patrimoine de son petit-fils, Henri de Rothschild, auteur dramatique. L'héritier disparaît en 1946 (au commencement de la Seconde Guerre mondiale les statues du château de Versailles trouvèrent refuge dans les bois de l'abbaye), année durant laquelle l'industriel Félix Amiot, constructeur d'avions devient le nouveau propriétaire du domaine. Il y transfère ses bureaux d'études et cet endroit restera secret, strictement privé et fermé au public. En 1988, l'ensemble de l'abbaye des Vaux de Cernay fut racheté à la famille Amiot par le groupe Savry \"Les Hôtels Particuliers\". Le nouveau propriétaire, Philippe Savry, entreprend alors d'importants investissements de rénovation avec le même respect des lieux que Mme Charlotte de Rothschild. La stratégie en est contemporaine basée sur l'évènementiel en plein centre du Parc Naturel Régional de la Haute Vallée de Chevreuse : hôtellerie \"haut de gamme\", restauration, concerts (Yehudi Menuhin s'y produira), visites \"ouvertes à tous\", réceptions festives de groupes, etc. L'heureux transfert de propriété appuyé par tous les élus des Yvelines a permis d'ouvrir le site au public en diffusant sur le plan international une histoire liée à celle de l'Ile-de-France. L'affaire est cédée depuis fin 2020 au groupe Paris Sociéty. Le 4 janvier 1994, l'abbaye des Vaux-de-Cernay a été classée au titre des monuments historiques et depuis 2014 les fonds d'archives de la Société archéologique de Rambouillet sont téléchargeables","architecture":"VAUX DE CERNAY, Cest ainsi que renaissent et vivent encore : le cellier devenu le salon de musique et le salon gothique aux immenses cheminées, lancien réfectoire des convers, restaurant rebaptisé « la table du prieur », létonnante salle des moines aux deux travées voûtées en arêtes dogives et colonnes aux chapiteaux de grès. Plus de huit siècles vous habitent. Lancien cloître, la galerie de lecture, le moulin, la salle capitulaire ont retrouvé leur vocation existentielle. Les cisterciens avaient tout inventé. Il nous fallait revivre ces lieux magiques bénis de Dieu et protégés par les Rois de France. Saint-Louis et Marguerite de Provence burent à la fontaine de Saint-Thibault leau miraculeuse qui rendit féconde la Reine de France. Elle coule toujours dans le bois voisin et apaise encore la soif de nos hôtes.","habitants":"famille de Charlotte  de Rothschild\"","divers":"Château de Vaux à Cernay","gps":"","images":["../../jctruffet.com/image/image_78/78_Vaux_Cernay_1.jpg","../../jctruffet.com/image/image_78/78_Vaux_Cernay_2.jpg","../../jctruffet.com/image/image_78/78_Vaux_Cernay_3.jpg","../../jctruffet.com/image/image_78/78_Vaux_Cernay_4.jpg"]},"Consult_chateau_formulaire990b":{"id":"Consult_chateau_formulaire990b","dept":"78","canton":"Les Mureaux","commune":"Vaux sur Seine","nom":"Vaux_sur_Seine","type":"Château","periode":"XVI","histoire":"VAUX SUR SEINE,  château construit au XVIe siècle (dont subsistent quatre tours rondes et un corps de bâtiment), réaménagé par le sculpteur Carlo Marochetti qui l'acquiert en 1822. Transformation par le sculpteur (ajout d'un corps de bâtiment) et par son fils Maurizio, lui même sculpteur. Les deux sculpteurs décorent le château avec leurs oeuvres et également avec des remplois divers  bas-reliefs, cuirs, tapisseries, rondes-bosses.","architecture":"VAUX SUR SEINE, de plan en equerre à deux niveaux, trois corps de logis dont un en légère saillies, flanqué de deux  tours rondes   d'entrées,  l'autre en equerre possède une tour ronde et une tour mi- engagé. Éléments protégés MH : les façades et les toitures du château ; le vestibule d'entrée ; la salle à manger ; la salle dite des Chasses ; les deux escaliers et leur cage ; le parc clos de murs : inscription par arrêté du 22 octobre 1996.","habitants":"Famille de Carlo Marochetti\"","divers":"Château de Vaux sur Seine","gps":"","images":["../../jctruffet.com/image/image_78/78_Vaux_sur_Seine_1.jpg","../../jctruffet.com/image/image_78/78_Vaux_sur_Seine_2.jpg","../../jctruffet.com/image/image_78/78_Vaux_sur_Seine_3.jpg"]},"Consult_chateau_formulaire1714-2":{"id":"Consult_chateau_formulaire1714-2","dept":"78","canton":"Versailles","commune":"Versailles","nom":"Versailles","type":"Palais","periode":"XVI-XVII","histoire":"VERSAILLES, au XIIIe siècle le château est en ruine, cest la famille de Soisy qui relève les bâtiments détruits, composés dun corps de logis principal et dune aile en retour, précédés dun portail encadré de deux tourelles. Le nom dun bourg, Versailles aux bourg de Galie, apparaît dans un texte daté de 1472. Les seigneurs de Versailles relevaient directement du Roi.  Leur modeste château se dressait sur la pente sud de la butte sur laquelle sera construit le futur château. En 1475, Gilles de Versailles, cède ses droits sur Trianon à labbé de Saint-Germain. Le Roi était à Trianon plus proche des siens. Premier caprice royal, Trianon, comme Marly, demeure un lieu de détente, loin de létiquette et des fatigues du pouvoir. En 1561, le domaine est vendu à Martial de Loménie, secrétaire des finances de Charles IX, qui lagrandit. Le 24 août 1572, Loménie est assassiné lors de la nuit de la Saint Barthélémy. Albert de Gondi, comte de Retz, un des Florentins qui accompagnent Catherine de Médicis en France, devient propriétaire du château et de la seigneurie de Versailles. Année 1683 fut endeuillée par la décès de la reine Marie-Thérèse et par celui de Colbert. La surintendance des Bâtiments passera entre les mains de Louvois qui naime pas Le Brun et qui introduira Mignard à Versailles. En 1684, lappartement des collectionneurs sagrandit par lannexion de lancien appartement de Montespan, transformé en une galerie que décora Mignard qui trouva dans cette galerie loccasion de rivaliser avec Le Brun, les murs étaient tendus détoffes somptueuses. C'est dans cette pièce que Louis XIV exposa les pièces maîtresses de sa collection de tableaux. Cette collection de chefs duvre était si considérable, on accrochait les tableaux par roulement. Dans ce cadre précieux, le roi sattardait à contempler la Joconde.","architecture":"VERSAILLES, en 1701, transformation des appartements du Roi. La chambre se place au centre du château.  les autres chambres sont meublées et tendues de riches étoffes, les plafonds non peints formèrent des calottes blanches. La construction de la chapelle, dédiée à Saint Louis, débuta en 1689. Elle fut interrompue par la guerre, reprise en 1699 par Jules Hardouin Mansart, il mourut durant les travaux en 1708. Elle fut achevée en 1710 par son beau frère Robert de Cotte. En 1715, le nouveau roi nétant qu'un enfant, son tuteur Philippe dOrléans (dit le Régent) quitta Versailles et sinstalla dans sa résidence parisienne du Palais Royal et la Cour aux Tuileries. Pierre le Grand, tsar de Russie, visita Versailles et résida au Grand Trianon en 1717. Agé de 12 ans, Louis XV se réinstalla au château de Versailles en 1722, dans les appartements de Louis XIV. Le souverain se montra soucieux de faire respecter les traditions de Versailles. Lère des grandes constructions était révolue et le château ne retrouva plus le lustre des années Louis XIV. De 1761 à 1768 Ange Jacques construit le Petit Trianon, en 1770, le 16 mai, mariage du dauphin (futur Louis XVI) avec Marie Antoinette de Lorraine, archiduchesse dAutriche, célébré dans la chapelle royale. Éléments protégés MH : le palais de Versailles et ses dépendances ; le petit parc et ses dépendances ; le palais et le parc des deux Trianons et les dépendances ; le grand parc et ses dépendances : classement par arrêté du 31 octobre 1906.","habitants":"Les rois de France\"","divers":"Palais de Versailles","gps":"","images":["../../jctruffet.com/image/image_78/78_Versailles_1.jpg","../../jctruffet.com/image/image_78/78_Versailles_2.jpg","../../jctruffet.com/image/image_78/78_Versailles_3.jpg","../../jctruffet.com/image/image_78/78_Versailles_4.jpg","../../jctruffet.com/image/image_78/78_Versailles_5.jpg","../../jctruffet.com/image/image_78/78_Versailles_6.jpg","../../jctruffet.com/image/image_78/78_Versailles_7.jpg"]},"Consult_chateau_formulaire361d-2":{"id":"Consult_chateau_formulaire361d-2","dept":"78","canton":"Versailles","commune":"Versailles","nom":"Versailles_II","type":"Château","periode":"XVI-XVII-XVIII","histoire":"Trois châteaux dans cet article; Hélisabeth,  pavillon de la Comtesse de Provence et Richaud, pavillon du Barry et le Petit Trianon.                                                                                   HELISABETH  Domaine de Madame Elisabeth à Versailles doit son nom à son ancienne propriétaire, Madame Elisabeth, sur du roi Louis XVI. La Maison ainsi que le parc de 8 hectares qui lentoure furent acquis en 1983 par le conseil départemental des Yvelines. Longtemps resté méconnu du public, le domaine est aujourdhui un lieu dédié à la nature, aux arts et à la culture.  Le domaine de Madame Elisabeth fut constitué dans les années 1770 par le prince et la princesse de Rohan-Guéméné. La propriété fut acquise par Louis XVI lors de la faillite du couple. Le roi fera don du domaine à sa jeune sur Madame Elisabeth, en 1783.  Remanié au XIXe siècle dans l'esprit d'un jardin romantique anglais, le parc a gardé son état d'esprit premier : Le 19 août 1983, le département des Yvelines, se porte acquéreur du domaine. La demeure va faire l'objet d'un programme complet de restauration, et suite à la tempête de 1999 qui a détruit ou endommagé de nombreux arbres, le conseil départemental des Yvelines va en outre entreprendre une campagne de replantation et de mise en valeur du site. Le parc accueille régulièrement des animations  ainsi que des uvres d'art contemporain créant un lien indispensable entre l'histoire et la modernité. Il fait enfin partie, des lieux de pique-nique préférés des Yvelinois à la belle saison.","architecture":"PAVILLON -COMTESSE -PROVENCE,   le pavillon de musique de madame ou pavillon de musique de la comtesse de Provence est un bâtiment, il est construit en 1784 par larchitecte Jean-François Chalgrin pour la comtesse, femme de monsieur, frère du roi Louis XVI et futur roi Louis XVIII. Il faisait partie d'un vaste domaine, morcelé depuis, auquel appartenait également le pavillon madame, qui fait partie depuis 1913 du lycée privé Sainte-Geneviève,  il est acheté par la famille du bijoutier Mellerio qui le fait agrandir en 1820, par l'architecte Jean-Jacques-Marie Huvé.  Puis, après plusieurs mutations, cette partie du domaine est adjugée à Alfred Chauchard, fondateur des grands magasins du Louvre. En 1902, celui-ci fait don du terrain à une société immobilière qui y crée 105 lots et qui les attribue aux employés les plus méritants de son entreprise. Au milieu de ce lotissement, dit parc Chauchard, subsiste le pavillon de musique.                                                                            RICHAUD, lespace Richaud du XVIIIe siècle, dédié à laccueil des expositions, propose une grande diversité de manifestations. Chaque exposition temporaire bénéficie dune programmation culturelle spécifique, est acheté par la famille du bijoutier Mellerio qui le fait agrandir en 1820, par l'architecte Jean-Jacques-Marie Huvé. Ses différents espaces répartis sur deux niveaux permettent de nombreuses combinaisons au service de la création comme de la valorisation du patrimoine. Dans cette perspective, lespace Richaud propose désormais une offre de visites guidées sur lhistoire et larchitecture du bâtiment, grace à l'obstination du maire  de Versailles François Mazières  fait racheté l'hôpital par la ville, propriété de l'état.","habitants":"Madame Elisabeth,       la comtesse de provence                           famille de Mellerio                   \"","divers":"Trois châteaux dans cet article; Hélisabeth grav-3 ,  pavillon de la Comtesse de Provrncegrav-8 et Richaud grav-7, Ferme de marie grav-1 , pavillon du Barry grav 4-5 et le Petit Trianon grav_6.  Hotel de ville grav-2","gps":"","images":["../../jctruffet.com/image/image_78/78_Versailles_II_1.jpg","../../jctruffet.com/image/image_78/78_Versailles_II_2.jpg","../../jctruffet.com/image/image_78/78_Versailles_II_3.jpg","../../jctruffet.com/image/image_78/78_Versailles_II_4.jpg","../../jctruffet.com/image/image_78/78_Versailles_II_5.jpg","../../jctruffet.com/image/image_78/78_Versailles_II_6.jpg","../../jctruffet.com/image/image_78/78_Versailles_II_7.jpg","../../jctruffet.com/image/image_78/78_Versailles_II_8.jpg"]},"Consult_chateau_formulaire179b-2":{"id":"Consult_chateau_formulaire179b-2","dept":"78","canton":"Verneuil-sur-Seine","commune":"Villennes-sur-Seine","nom":"Villennes_sur_Seine","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article; Acqueville et Migneaux.                                                                       ACQUEVILLE, le château aurait été construit au XVIIe siècle, puis complété au XVIIIe siècle et remanié au XIXe siècle. La chapelle refaite en 1802 pour Philippe de Foissac Latour. L'édifice se compose d'un sous-sol, un étage carré, un étage de comble et de deux étages carrés. Gros-oeuvre: enduit, élévation à travées surmontée d'un toit à longs pans brisés, croupe brisée, toit à longs pans, croupe, toit conique, toit en pavillon et flèche polygonale recouverts d'ardoises. Aujourd'hui, il abrite une résidence de tourisme composée de 80 suites et appartements au coeur d'un domaine de 12 hectares, entourée de jardins à l'anglaise et d'un lac.","architecture":"MIGNEAUX, le château fut peut-être construit au XVIIIe siècle, mais rhabillé au XIXe siècle. Les communs datent du XIXe siècle. Plusieurs carrières ont été exploitées dans l'éperon rocheux du milieu du parc. L'édifice, de plan symétrique, se compose d'un sous-sol, d'un étage carré et un étage de comble. Gros-oeuvre en enduit, élévation ordonnancée surmontée d'un toit à longs pans ; noue et toit en pavillon, couverts d'ardoises.","habitants":"Acqueville : Famille de Philippe de Foissac Latour\"","divers":"Deux châteaux dans cet article; Acqueville grav -1-2 et Migneaux grav_3-4.","gps":"","images":["../../jctruffet.com/image/image_78/78_Villennes_sur_Seine_1.jpg","../../jctruffet.com/image/image_78/78_Villennes_sur_Seine_2.jpg","../../jctruffet.com/image/image_78/78_Villennes_sur_Seine_3.jpg","../../jctruffet.com/image/image_78/78_Villennes_sur_Seine_4.jpg"]},"Consult_chateau_formulaireb8ba":{"id":"Consult_chateau_formulaireb8ba","dept":"78","canton":"Versailles","commune":"Villepreux","nom":"Villepreux","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article Grand-Maison et Villepreux. GRANDMAISON,  manoir peut-être édifié à la fin du XVIe siècle, détruit. Château actuel édifié à partir de 1720 pour les Francini, construction terminée dans le deuxième quart du XIXe siècle, orangerie construite vers 1720 avec matériaux du manoir détruit. Depuis l'époque Romantique, la propriété s'est transmise, intacte jusqu'à ses propriétaires actuels, le comte et la comtesse de Saint Seine. Rénové et réaménagé avec goût dans le respect de son style et de sa personnalité, aujourd'hui le château propose, à 20 Km de Paris, à proximité immédiate du golf de Saint Nom la Bretèche, ses Salons de réception et son cadre protégé, plein de charme et chargé d'histoire.  Éléments protégés MH : les façades et les toitures du château, le petit salon et le grand salon bleu avec leur décor : inscription par arrêté du 9 juillet 1970.","architecture":"VILLEPREUX,  dans le domaine de Grand'Maisons est un château du XVIIIe siècle situé à quelques kilomètres de Versailles. Propriété de la famille Bertin de Veaux et de ses descendants, depuis le début du XIXe siècle, les salons de cette maison littéraire furent, jusqu'à novembre 2016, un des rares exemples de ce que pouvaient être les grands salons des époques Empire et Restauration. maison forte mentionnée en 1483 ; Albert de Gondi la remplace vers 1600 par un château de plan carré avec pavillons aux angles, gravé par Chastillon en 1641 ; canal en 1686 ; pavillons antérieurs ajoutés pour Louis René Edouard Colbert en 1703 ; sert de filature entre 1812 et 1870 ; après sa destruction nouveau château à mi-pente pour Nagelmacker en 1885 ; communs et entrée rue A. Brocard vers 1912 par Marcel Cochet. L'édifice, de plan symétrique, se compose d'un étage de soubassement et d'un étage carré. Gros-oeuvre : pierre de taille et calcaire. Aujourd'hui à la famille Francini.","habitants":"Comte et la Comtesse de Saint Seine.                                    Villepreux ; la famille Bertin de Veaux \"","divers":"Deux châteaux dans cet article Grand-Maison grav 1-2-3 et Villepreux.grav-4-5","gps":"","images":["../../jctruffet.com/image/image_78/78_Villepreux_1.jpg","../../jctruffet.com/image/image_78/78_Villepreux_2.jpg","../../jctruffet.com/image/image_78/78_Villepreux_3.jpg","../../jctruffet.com/image/image_78/78_Villepreux_4.jpg","../../jctruffet.com/image/image_78/78_Villepreux_5.jpg"]},"Consult_chateau_formulaire1126":{"id":"Consult_chateau_formulaire1126","dept":"78","canton":"Aubergenville","commune":"Villiers Le Mahieu","nom":"Villiers_Mahieu","type":"Château","periode":"XIII-XIX","histoire":"VILLIERS,  le château a un aspect de forteresse médiévale qui sexplique par lutilisation des vestiges dun château-fort du XIIIe siècle sur les substructions duquel il fut construit en 1642. Ce nest quau XVIIe siècle que lon retrouve le propriétaire des terres de Villiers le Mahieu, en la personne de Claude de Bullion, Garde des Sceaux et Surintendant des Finances sous Louis XIII. De ses trois fils, cest Claude, Marquis dAttilly qui en hérita, ou il fit reconstruire le château en 1642. En 1919, il fut acheté par le Docteur Velter, qui exploite les 150 hectares de terres situés autour du château. En 1965, le comte Charles de Rohan-Chabot entreprend des travaux de restauration jusquen 1970, afin de donner au château son aspect actuel. De 1971 à 1979, le célèbre peintre Bernard Buffet sinstalle dans ce beau château restauré. En 1980, Jean Luc Chaufour le reprend, très bien situé dans louest parisien et il y entreprend de gros travaux de restauration intérieurs et extérieurs, afin dadapter ce site médiéval aux contraintes du XXe siècle pour y créer un superbe château-hôtel de Prestige. Transformer en hôtel restaurant.","architecture":"VILLIERS, niché dans un parc arboré de 12 hectares, le château de Villiers-le-Mahieu est la première demeure des maisons de campagne le Mahieu de style Louis XIII en pierre et brique entouré de douves à conservé pliusieurs tours. Il s'ouvre par une belle poterne.  Éléments protégés MH : les façades et les toitures ; les douves et le sol de la cour ; l'allée axiale avec ses plantations ; le parc attenant, conservant un tracé en étoile : inscription par arrêté du 28 avril 1964.","habitants":"Famille de Claude, Marquis dAttilly \"","divers":"château de Villiers-le-Mahieu","gps":"","images":["../../jctruffet.com/image/image_78/78_Villiers_Mahieu_1.jpg","../../jctruffet.com/image/image_78/78_Villiers_Mahieu_2.jpg","../../jctruffet.com/image/image_78/78_Villiers_Mahieu_3.jpg","../../jctruffet.com/image/image_78/78_Villiers_Mahieu_4.jpg","../../jctruffet.com/image/image_78/78_Villiers_Mahieu_5.jpg","../../jctruffet.com/image/image_78/78_Villiers_Mahieu_6.jpg"]},"Consult_chateau_formulaire17f8":{"id":"Consult_chateau_formulaire17f8","dept":"78","canton":"Chevreuse","commune":"Voisins le Bretonneux","nom":"Voisins_Bretonneux","type":"Château","periode":"XVII-XVIII-XIX","histoire":"Quatre châteaux dans cet article Frossardière, Port-Royal, Brouëssy,  et Voisins le Bretonneux.                                                                                                                      FROSSARDIERE,  petit château visible sur un plan datant de 1694, détruit. Le château actuel a été construit avant 1819 (peut être sur un bâtiment plus ancien, le long de la rue des Ruelles. Le château fut modifié au milieu du XIXe siècle pour le baron Frossard. L'édifice, de plan régulier, se compose d'un sous-sol, d'un étage carré et d'un étage de comble, le gros-oeuvre en moellon, meulière et enduit, élévation ordonnancée, surmontée d'un toit à longs pans brisés et croupe, recouverts d'ardoises. Armoiries du comte de Frossard ajoutées au XIXe siècle. Abrite l'Association pour le développement des oeuvres sociales des sapeurs pompiers de Paris.                      PORT ROYAL a trois K.M.au sud à Magny le hameaux  est un  endroit ou fut le théâtre dune intense vie religieuse d'abord, intellectuelle et politique ensuite jusqu'à nos jours. Dabord simple abbaye cistercienne féminine au cur du Bassin parisien, Port-Royal devient au XVIIe siècle lun des hauts lieux de la réforme catholique puis l'un des symboles de la controverse janséniste,  cet emplacement répond au désir de Bernard de Clairvaux dinciter à lhumilité et à la vie intérieure par un retrait du monde. Les fréquentes visites des représentants de lordre cistercien laissent penser que Port-Royal sest inscrit très tôt dans lorbite cistercienne. Au cours de lannée 1713, labbaye est rasée.  Ses pierres sont vendues ou récupérées par les habitants des alentours, parfois comme reliques mais le plus souvent comme matériau de construction.","architecture":"VOISINS le BRETONNEUX,  logis seigneurial au nord avec communs et douves du XVIIe siècle attestés en 1694, le colombier et la chapelle mentionnés vers 1693. Au XVIIIe siècle figurent des tours carrées d'angle (vestiges dans les douves au nord), un colombier  et un bâtiments de ferme hors douves. Un nouveau logis a été édifié après 1819 à l'opposé du logis du XVIIe siècle. Le pressoir à cidre est encore utilisé en 1882. L'édifice, de plan symétrique, se compose d'un sous-sol, d'un étage carré et d'un étage de comble. Le gros-oeuvre en brique, meulière, grès, moellon et enduit partiel. Le parc comprend les communs, un colombier, une bergerie, une étable, une grange, une distillerie, un abreuvoir et un pressoir à cidre.                                                                                                             A cinq K.M. au  sud à Magny  le Hameau BROUËSSY,  le château dit de BROUËSSY, et le parc ont été constitués au début du XVIIIe siècle pour Pierre Cailleteau dit Lassurance, architecte et contrôleur des Bâtiments du Roi. Il achète le domaine en 1711 et le complète l'année suivante par des terres et des bâtiments de ferme. Pour édifier le château familiale, il rachète des matériaux provenant de la destruction de l'abbaye de Port-Royal. Éléments protégés MH : les façades et les toitures du château et le terrain du domaine clos de murs : inscription par arrêté du 10 septembre 2009.","habitants":"Fossardière;  comte de Frossard                          Brouessy ; Pierre Cailleteau  \"","divers":"quatre châteaux dans cet article; la Frossardière grav-6, Brouéssy grav-1 2, Port-Royal, le musée et Voisins grav-.","gps":"","images":["../../jctruffet.com/image/image_78/78_Voisins_Bretonneux_1.jpg","../../jctruffet.com/image/image_78/78_Voisins_Bretonneux_2.jpg","../../jctruffet.com/image/image_78/78_Voisins_Bretonneux_3.jpg","../../jctruffet.com/image/image_78/78_Voisins_Bretonneux_4.jpg","../../jctruffet.com/image/image_78/78_Voisins_Bretonneux_5.jpg","../../jctruffet.com/image/image_78/78_Voisins_Bretonneux_6.jpg"]},"Consult_chateau_formulaire0733-2":{"id":"Consult_chateau_formulaire0733-2","dept":"78","canton":"Poissy-sud","commune":"Crespières","nom":"Wideville","type":"Château","periode":"XV-XVI","histoire":"WIDEVILLE, le château est construit en 1580 et 1581 pour Benoît Milon, surintendant des finances sous Louis XIII, (plan d'après un modèle de Jacques Androuet du Cerceau. Il remplace un manoir détruit dont on conserve la terrasse bastionnée, les douves et une galerie à deux étages construite au milieu du XVIe siècle. C'est une belle demeure en brique et pierre, construite sur un terre-plein selon un plan symétrique (pavillon central et deux ailes). Toutes les pièces du rez-de-chaussée et du premier étage sont ornées de poutrelles peintes et décorées par Simon Vouet. Non loin du château, se trouvent une chapelle et un bâtiment dit l'ermitage, bâti au XVIIIe siècle et décoré de boiseries de style Louis XV. A l'extrêmité du grand parterre, s'élève le nymphée, édifié au XVIIe siècle, par l'architecte Lemercier: c'est une des dernières grottes qui aient été conservées. Les grilles qui ferment l'entrée et les baies sont l'oeuvre de François Marchand. A l'intérieur, les murs sont décorés de coquillages et cristaux polychromes, le plafond d'une fresque attribuée à Simon Vouet. Dans le parc, des statues de Philippe Buyster représentant les dieux de l'Olympe, elles bordaient autrefois l'allée conduisant au château.\nÉléments protégés MH : le château, la chapelle et l'ermitage ; le nymphée ; le parc avec ses sept statues : classement par arrêté du 7 février 1977.","architecture":"WIDEVILLE, isolé sur une plate-forme ceinte de fossés cantonné de petits bastions en brique qui rendaient inutiles les ailes en retour et le mur de clôture traditionnel, Wideville est composé d'un corps de logis unique animé d'un haut pavillon central et de deux petits pavillons latéraux aux extrémités des deux corps longitudinaux plus bas, formule héritée de Jacques Androuet du Cerceau. Le plan de l'édifice s'apparente à ceux de Du Cerceau, dans la disposition symétrique des appartements (deux à chaque étage de part et d'autre des vestibules et des salles du pavillon central. Il s'agit d'une élévation d'une grande simplicité. Les façades sont composées d'un parement en briques et les chambranles harpées des fenêtres sont en pierre blanche de Crespières. Le seul ornement réside dans la façade arrière avec deux travées de niches des tableaux laissés nus entre les baies. Elles avaient été garnies en 1630 des statues des quatre éléments de Jacques Sarrazin. Les combles sont éclairés d'oculi à bossages chanfreinés, d'un type courant chez Du Cerceau. Ils alternent avec des lucarnes à fronton, à base interrompues et ailerons. L'entrée se présente sous la forme d'un portique, au dessin proche de celui que Philibert de l'Orme réalisa en 1550 à Saint-Léger-en-Yvelines.","habitants":"Famille de  Benoît Milon\"","divers":"Château de Wideville","gps":"","images":["../../jctruffet.com/image/image_78/78_Wideville_1.jpg","../../jctruffet.com/image/image_78/78_Wideville_2.jpg","../../jctruffet.com/image/image_78/78_Wideville_3.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','78 — Yvelines'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)showDet(start);
</script></body></html>
