ant et mécène, demande à Ingres en 1839, de doter Dampierre \"dune uvre qui soit à la fois un trésor d'art et une haute leçon de morale\". Ingres peindra \"L'âge d'or\" dans la galerie du premier étage où, sous la direction de Duban, travaillèrent également Hippolyte et Paul Flandrin, Gleyre, Duret et Simart. Ce dernier exécuta pour cette salle la restitution au quart de la statue chryséléphantine de Minerve. Éléments protégés MH : le château y compris les communs, les pavillons d'entrée, la grille et l'abreuvoir : inscription par arrêté du 30 mai 1928.","habitants":"Famille; Henri de Guise                       La reine Marie Leczinska \"","divers":"Château de Dampierre","gps":"","images":["../../jctruffet.com/image/image_78/78_Dampierre_78_1.jpg","../../jctruffet.com/image/image_78/78_Dampierre_78_2.jpg","../../jctruffet.com/image/image_78/78_Dampierre_78_3.jpg","../../jctruffet.com/image/image_78/78_Dampierre_78_4.jpg","../../jctruffet.com/image/image_78/78_Dampierre_78_5.jpg","../../jctruffet.com/image/image_78/78_Dampierre_78_6.jpg","../../jctruffet.com/image/image_78/78_Dampierre_78_7.jpg","../../jctruffet.com/image/image_78/78_Dampierre_78_8.jpg"]},"Consult_chateau_formulairecade":{"id":"Consult_chateau_formulairecade","dept":"78","canton":"Rambouillet","commune":"Paray Douaville","nom":"Douaville","type":"Château","periode":"XVIII-XIX-","histoire":"DOUAVILLE dit de Barthelémy  Le corps de bâtiment central est daté du XVIIIe siècle. Pendant la Révolution, le château de Douaville est vendu comme bien national au Dr Voisin, chirurgien des campagnes napoléoniennes. Ce dernier le cède après la mort de son petit-fils, qui daprès la tradition, se serait tué en tombant de lune des cheminées du château. Deux ailes ont été ajoutées de chaque côté à la fin du XIXe siècle.   Ancien relais de chasse, le château Barthélemy, à Paray-Douaville, a été construit au XVIIIe siècle. Appartenant à la même famille depuis 200 ans, dimportants travaux de rénovation ont été réalisés en 2015 afin de le transformer en un lieu dédié à lévénementiel.","architecture":"DOUAVILLE,L'édifice se compose d'un sous-sol, d'un étage carré et d'un étage de comble, le gros-oeuvre : meulière; moellon et enduit, élévation ordonnancée surmontée d'un toit à longs pans, croupe et terrasse recouvert d'ardoises. deux ailes ont été ajoutées de chaque côté à la fin du XIXe siècle. L'édifice se compose d'un sous-sol, d'un étage carré et d'un étage de comble, le gros-oeuvre : meulière; moellon et enduit, élévation ordonnancée surmontée d'un toit à longs pans, croupe et terrasse recouvert d'ardoises.","habitants":"Famille du Dr Voisin\"","divers":"Chaâteau  dit Barthélémy à Douaville","gps":"","images":["../../jctruffet.com/image/image_78/78_Douaville_1.jpg","../../jctruffet.com/image/image_78/78_Douaville_2.jpg"]},"Consult_chateau_formulaire0569":{"id":"Consult_chateau_formulaire0569","dept":"78","canton":"Rambouillet","commune":"Emancé","nom":"Emancé","type":"Château","periode":"XVI-XVIII","histoire":"triois châteaux dans cet article; Malmaison, Montlieu et Sauvage.                                      MALMAISON, le nom indique la présence très ancienne dune léproserie. Château bâti en grès datant du XVIe ou XVIIe siècle, avec tourelles en brique et balustrade ornée de pilastres d'après l'acte de vente. Même implantation sur toutes les cartes du XVIIIe siècle. La demeure appartient au chapitre de Chartres qui le revend à la chute de Robespierre, en mauvais état lors de cette vente en 1794, il est détruit avant 1829. Les vestiges, en particulier les éléments réemployés lors de la construction de la grange, sont de qualité: arcatures en pierre de taille, colonnettes à chapiteaux de grès, blasons.  La marque dappartenance, grand \"M \" gravé à langle sud-ouest.                                                                                     MONTLIEU, le château est construit pour le comte Antoine d'Aure, écuyer des rois Louis XVIII et Charles X, écuyer en chef de l'École de Saumur de 1847 à 1855 puis inspecteur des écuries impériales et écuyer de Napoléon III.  Ses bâtiments sont organisés autour d'une cour. Ayant été détruit, le château est reconstruit en 1910 par H. Goury et comporte deux étages carrés et un étage de combles percé de lucarnes à frontons semi circulaires ou triangulaires. Les fenêtres sont encadrées de briques et la travée centrale, coiffée d'un fronton semi-circulaire percé d'un oculus, est décorée de pierres de taille et de briques alternées.  Résidence hôtelière et spa.","architecture":"SAUVAGE, à l'origine, il s'agissait d'un château formé de trois bâtiments en U dont la date de construction est incertaine. Cette demeure fut donnée par Louis XIV à l'une de ses filles naturelles, Louise de Maison Blanche, née d'une liaison avec Madame des illets, dame de compagnie de Madame de Montespan. À l'emplacement du dit château, fut reconstruit, sous le second Empire, le château actuel, en pierres meulières et briques et au toit en ardoises, qui a été classé monument historique en 1979. Dans le parc, un étang décoratif a été créé à partir d'une dérivation du cours de la Drouette. Aujourd'hui le château est la propriété du Fonds International pour la préservation de la Nature, son parc accueille une réserve zoologique où une faune exotique très variée vit en quasi liberté, hormis les oiseaux de petites tailles. Site classé MH en 1979.","habitants":"comte Antoine d'Aure\"","divers":"triois châteaux dans cet article; Malmaison grav-1, Montlieu grav-2 et Sauvage grav-3-4.","gps":"","images":["../../jctruffet.com/image/image_78/78_Emanc%c3%a9_1.jpg","../../jctruffet.com/image/image_78/78_Emanc%c3%a9_2.jpg","../../jctruffet.com/image/image_78/78_Emanc%c3%a9_3.jpg","../../jctruffet.com/image/image_78/78_Emanc%c3%a9_4.jpg"]},"Consult_chateau_formulairef603":{"id":"Consult_chateau_formulairef603","dept":"78","canton":"Conflans-Sainte-Honorine","commune":"Andresy","nom":"Fa_Andresy","type":"Château","periode":"XV-XVII","histoire":"FA,  la terre et la seigneurie du Fay passe entre diverses mains. En 1670 notamment, Claude de Fusée, seigneur de Voisenon, vend à Jean-Baptiste de Guersans \"la terre et seigneurie du Fay consistante en une maison et ferme appliquée à plusieurs bâtiments et édifices, chapelle, jardin clos de murs, et terres étant au pourtour\". Plusieurs propriétaires se succèdent et en 1739 Louis Miotte de Ravannes l'achète à Siméon Michel Cavelier qui s'en était porté acquéreur en 1736. Jean Baptiste Miotte de Ravannes en hérite de son père en 1777 et le vend en 1779 à Armand Domilliers de Thésigny qui en est toujours propriétaire en 1821. Monsieur de Sainte Marie l'achète en 1827. C'est lui qui a fait reconstruire le château avant de revendre la propriété en 1855 à Louis Napoléon Lepic. Selon la monographie de l'instituteur il aurait fait réaménager le parc par les frères Bühler. Gustave Roy, riche négociant, l'achète en 1861. Ses mémoires font mention de travaux d'assainissement effectués à cause du sous-sol humide et de la reconstruction des communs par l'architecte Nénot. Le château est resté dans la famille Roy jusqu'au milieu du du XXe siècle. On connaît par une description le château en 1777, le château ou il y a une chapelle attenante, une cour appelée la cour d'honneur au devant du château et fermée d'une grille sur l'avenue.","architecture":"FA, de l'autre côte de la cour c'est à dire au couchant et en retour vers le midi, les jardins vergers et potagers et un pavillon dans l'angle du mur de clôture destiné pour le logement ordinaire du jardinier. Au midi du château un grand parterre aux cotés duquel sont plusieurs plantations et au bout le parc qui forme un taillis essence de châtaigniers pour la majeure partie, tout cet enclos fermé de murs et contenant ensemble cinquante neuf arpents soixante quatorze perches ou environ. En effet le pv de vente de 1827 décrit un bâtiment de onze croisées avec deux pavillons d'angle, un rez-de-chaussée et un étage mansardé. Il y avait aussi une chapelle aujourd'hui détruite ; le château actuel a gardé la même extension au sol et se compose d'un corps central et de deux corps latéraux saillants. Mais il a un étage carré. Il est précédé d'un bel escalier extérieur en fer à cheval mentionné en 1827. Il est orné de tables saillantes en faux appareillage de briques. Sur le toit en pavillon se trouve un belvédère. Les vestiges du parc présentent un petit lac comportant un rocher artificiel ainsi que quelques essences remarquables : un tulipier, un séquoia, et un araucaria. Dans la cour des communs, le vivier est toujours présent. Le colombier en pierre de taille et à toit en pavillons se trouve à l'extrémité Est du petit parc. Les communs de 1893 ont été reconstruits à l'emplacement de ceux du XVIIIe siècle. Ils sont en brique avec pierre en remplissage.","habitants":"Famille; Louis Miotte de Ravannes \"","divers":"Château de Fa  à Andresy","gps":"","images":["../../jctruffet.com/image/image_78/78_Fa_Andresy_1.jpg","../../jctruffet.com/image/image_78/78_Fa_Andresy_2.jpg"]},"Consult_chateau_formulaire2111":{"id":"Consult_chateau_formulaire2111","dept":"78","canton":"Conflans-Sainte-Honorine","commune":"Maurecourt","nom":"Fay_Maurecourt","type":"Château","periode":"XV-XVIII","histoire":"Du FAY, construit dabord pour être lhôtel des seigneurs commandant les \"Onze Mille Lances\" installées sur les hauteurs de lHautil afin de surveiller larrivé des Vikings venant de la Seine ou de lOise, le château fut rasé par le roi Henri IV qui le donna en fief foi et hommage au comte de Lysle, premier Louvetier du royaume. Comptant plus de cent pièces, celui-ci fut en partie détruit à la Révolution et la chapelle fut brûlée. Le comte de Sainte Marie, qui lacquit en 1802, garda et aménagea la partie intacte. Il confia laménagement du parc aux frères Buhler qui réalisèrent un beau parc à langlaise, mais gardèrent néanmoins certains arbres et plantes des XVIIe et XVIIIe siècles. Puis cest le général Baron Lepic qui loccupa et le vendit à monsieur Gustave Roy, président de la chambre de commerce de Paris en 1840. Celui ci aménagea les écuries telles quelles sont aujourdhui, et respecta le parc de Buhler, la famille Roy fut propriétaire du domaine jusquen 1970.","architecture":"FAY, Miss  Hamilton, riche américaine excentrique, première femme toréador et première femme à vaincre lEverest, lacquit et y invita le Dalai Lama. Le propriétaire actuel, qui occupe de château à titre privé depuis 1980, conserve les documents historiques qui datent du XIVe siècle. Avec ses 54 hectares de forêt et de parc dessiné par Bulher, la propriété compte plusieurs bassins, de nombreuses terrasses, vergers, potagers et de magnifiques bosquets dhortensias. Le château du Fay vous ouvre ses trois salles principales. Lorangeraie avec une magnifique vue sur le château, grand espace avec possibilité douverture sur lextérieur. Le Pavillon Henri IV datant de 1590 récemment rénové, dans lequel à logé Henri IV lors du siège de Paris en 1594. Idéal pour les petits séminaires, avec une pièce principale avec cheminée, pour prendre des pauses et déjeuner en toute convivialité. Une salle de réunion ouverte vous attend quelques marches plus haut.","habitants":"Famille du  comte de Sainte Marie et famille Roy\"","divers":"Château de la Fay à Maurecourt","gps":"","images":["../../jctruffet.com/image/image_78/78_Fay_Maurecourt_1.jpg","../../jctruffet.com/image/image_78/78_Fay_Maurecourt_2.jpg","../../jctruffet.com/image/image_78/78_Fay_Maurecourt_3.jpg"]},"Consult_chateau_formulaireb48b":{"id":"Consult_chateau_formulaireb48b","dept":"78","canton":"Limay","commune":"Fontenay_Saint-Père","nom":"Fontenay_St_Père","type":"Château","periode":"XVI- XVII","histoire":"FONTENAY ST PERE, la terre de Fontenay est citée pour la première fois en 832 par Hilduin, abbé de Saint-Denis, au sujet des redevances dues à son abbaye. Cette seigneurie fut offerte en 978 à labbaye Saint-Père-en-Vallée de Chartres par la comtesse Letgarde, veuve de Guillaume Longue-Epée, duc de Normandie, puis de Thibaud le Tricheur, comte de Chartres et cousine germaine dHugues Capet. Le pape Pascal VI confirme cette donation par une bulle du 7 janvier 1106. Les moines de cette abbaye devinrent ainsi les seigneurs et les patrons de Fontenay que lon prit lhabitude de qualifier de Saint-Père, altération populaire de Saint-Pierre. Cest donc à partir de cette époque que le nom de « Saint-Père » fut ajouté au nom de la commune. Cest eux qui firent édifier léglise Saint-Denis. En 1155, Louis VII, à son retour de pèlerinage, confirme les privilèges et les droits de commune à la paroisse. Jusquà la Révolution, le fief passe entre les mains de nombreux seigneurs. En 1708, René Jouenne, seigneur dEsgrigny, acheta la seigneurie de Fontenay à labbaye Saint-Père de Chartres. Souhaitant disposer dune demeure correspondant à son rang, il fit édifier le château du Mesnil. Il vendit le domaine en 1730 qui passa de main en main. Il appartient aujourdhui aux héritiers des derniers châtelains du Mesnil.","architecture":"Du Mesnil St Denis  Période ou style : Renaissance\nLe château de la Région Ile-de-France qui vous découvrirez est inscrit aux Monuments Historiques depuis 1947. Ce sigle est officiel et est destiné à protéger le château du Mesnil-Saint-Denis en tant que monument présentant un intérêt à l'échelle régionale. La construction de celui-ci commença pendant l'année 1589.","habitants":"Famille de  René Jouenne\"","divers":"Château de Fontenay St-Père","gps":"","images":["../../jctruffet.com/image/image_78/78_Fontenay_St_P%c3%a8re_1.jpg","../../jctruffet.com/image/image_78/78_Fontenay_St_P%c3%a8re_2.jpg"]},"Consult_chateau_formulaire03c0":{"id":"Consult_chateau_formulaire03c0","dept":"78","canton":"Aubergenville","commune":"Gambais","nom":"Gambais","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article Neuville et Bourdonné                                    NEUVILLE, château construit entre 1560 et 1580, achevé après 1582. Peu modifié jusqu'aux années 1750-1760 où il est mis au goût classique avec un corps central à fronton et deux ailes symétriques. Vendu comme bien national en 1793, et racheté en 1800 par la même famille. Peu de modifications au XIXe siècle, campagnes de restauration depuis 1972. Construction de l'édifice en 1560 pour Joachim de Bellengreville, grand Prévot de l'hotel du Roy Henri IV. On attribue le château à Androuet du Cerceau, célèbre architecte français. En 1690, acquisition du château par François de Nyert, premier valet de chambre de Louis XIV, et gouverneur du Louvre. En 1750, Agnès de Revol, fille de M. de Nyert, modifie l'aspect extérieur du château, en lui conférant sa forme actuelle. En 1765, acquisition par Clément de Laverdy, conseiller au parlement de Paris, contrôleur général des Finances de Louis XV. Pendant la Révolution, M. de Laverdy, âgé de 70 ans et retiré de toute fonction politique est arrêté, guillotiné et le château est pillé. En 1795, le marquis de Labriffe, gendre de M. de Laverdy, ancêtre des propriétaires actuels achète le château. Au XIXe siècle, il est habité par la famille de Labriffe. Au XXe siècle la maison est occupée par les armées en campagne durant les deux guerres mondiales puis laissée à l'abandon,  c'est en 1960 que la famille entreprend une très longue restauration qui se poursuit aujourd'hui.","architecture":"NEUVILLE; les toitures à la francçaises forment le principal attrait de ce château construit aux XVIe et XVIIe siècle et décoré au XVIIIe siècle.  S'élevant au bout d'une belle avenue, Neuville possèdent autant de portes et de fenêtres qu'ils y a de jours dans l'année. Il est restauré avec beaucoup de gout par un amateur américain monsieur Stacey . Éléments protégés MH : les façades et les toitures du château et des communs ; la rampe en fer forgé de l'escalier et les pièces suivantes du château avec leur décor : la salle à manger d'été, le salon d'été, la chapelle, la salle dite des gardes, la pièce dite billard, le salon d'hiver, la salle à manger d'hiver, le petit salon d'hiver : classement par arrêté du 17 juillet 1972. Le domaine clos de murs, en totalité : inscription par arrêté du 31 juillet 1995.           BOURDONNE, à trois K.M.au sud, demeure seigneuriale de style Louis XIII qui mire ses murs roses dans londe calme des étangs. Le château a été bâti au XVIIe siècle pour Charles Ier de Cocherel, conseiller du roi et bailli de Montfort l'Amaury. Edifice de brique et de pierre surmonté d'une haute toiture d'ardoises, il fut restauré au XIXe siècle. José-Maria de Hérédia sinstalla au château vers 1901 où il était lhôte des propriétaires M. et Mme Georges Itasse qui lentouraient dune amitié intelligente et profonde, il devait y passer les dernières semaines de sa vie. Éléments protégés MH : le corps de logis flanqué de deux pavillons en saillie, les communs, les douves, le parc de 14 ha arboré, les boiseries de chêne, la chapelle reconstruite en 1733, la grille et le mur de clôture et les fontaines de pierre : inscription par arrêté du 27 février 1989.","habitants":"Neuville; Clément de Laverdy                                  Bourdonné ;Charles Ier de Cocherel\"","divers":"Deux châteaux dans cet article Neuville grav 2 à 6 et Bourdonné  grav-1","gps":"","images":["../../jctruffet.com/image/image_78/78_Gambais_1.jpg","../../jctruffet.com/image/image_78/78_Gambais_2.jpg","../../jctruffet.com/image/image_78/78_Gambais_3.jpg","../../jctruffet.com/image/image_78/78_Gambais_4.jpg","../../jctruffet.com/image/image_78/78_Gambais_5.jpg","../../jctruffet.com/image/image_78/78_Gambais_6.jpg","../../jctruffet.com/image/image_78/78_Gambais_7.jpg","../../jctruffet.com/image/image_78/78_Gambais_8.jpg"]},"Consult_chateau_formulaire368e":{"id":"Consult_chateau_formulaire368e","dept":"78","canton":"Plaisir","commune":"Thyverval","nom":"Grignon","type":"Château","periode":"XVI-XVII","histoire":"GRIGNON  Pomponne de Bellièvre du 1529-1607, président à Mortier du Parlement de Paris puis chancelier de France jusqu'à sa mort, achète le domaine à Diane de Poitiers en 1582, ainsi que le domaine de Buc. À cette époque, un manoir sélève sur le fief de Buc depuis le XIIe siècle. Au XVIIe siècle (en 16361) et pendant la Renaissance française (du couronnement de Louis XIII en 1610 jusqu'en 1684), son fils Nicolas de Bellièvre de 1583 à 1650), seigneur de Neauphle, fait construire le château de Grignon actuel, et réussit à faire ériger Grignon en marquisat en 1651. En 1674, le domaine  est agrandi par un échange de terres avec léglise de Thiverval et la clôture. Une partie des maisons de Thiverval sont sacrifiées et ce village est déplacé vers louest. Le 12 mai 1682, Pierre de Bellièvre vend à André Potier, chevalier, seigneur de Novion, conseiller au Parlement, le marquisat de Grignon et la seigneurie de Saint-Germain-de-la-Grange.   À la Révolution française, après la dernière marquise de Grignon, madame de Brassac, le domaine devient la propriété de Monsieur Auguie dont la fille épouse le maréchal Ney en 1802. Le mariage est célébré à Thiverval dans la maison du maire appelé par la suite le château de Thiverval. Le futur maréchal Bessières d'Istries lui ayant acheté le château, le parc, les terres et les fermes de Grignon en 1809, sa veuve les met en vente en 1826.","architecture":"GRIGNON, l'adjudication a lieu en faveur de Charles X qui en fait l'Institution royale agronomique de Grignon . Cette école d'agriculture de Grignon changera plusieurs fois d'appellation : elle devient l'École impériale d'agriculture en 1852, l'École nationale d'agriculture en 1870, l'École nationale supérieure d'agronomie de Grignon, en 1960, puis l'Institut national agronomique Paris-Grignon en 1971. C'est aujourd'hui Agro Paris Tech, ce qui en fait la plus ancienne des écoles françaises d'agriculture et d'agronomie. En novembre 2021, le processus de vente du domaine au promoteur immobilier Altarea, qui avait été choisi en août, est suspendu par l'État ; une nouvelle procédure doit être lancée au second semestre 2022.  En juin 2022, l'État met en vente aux enchères du mobilier provenant du château, dans des conditions controversées. En novembre 2022, il est confié à l'association Emmaüs France, qui y héberge deux-cents personnes sans-abri. Situé au cur d'un parc de 300 hectares (dont 130 de terres agricoles et 130 de bois) clos par un long mur, le château construit en U dans le style Louis XIII (parement de briques et de pierres  est entouré de nombreux autres bâtiments composés d'anciens communs et d'installations plus récentes à vocation scientifique datant du XIXe siècle, puis du XXe siècle et du début de ce siècle. Tout cet ensemble intra muros est classé par les Monuments historiques et donc protégé. Le château de Grignon est inscrit au titre  par arrêté du 5 juillet 1941.","habitants":"Famille de Pierre de Bellièvre \"","divers":"Grignon 48° 50' 52? N, 1° 56' 23? Est","gps":"","images":["../../jctruffet.com/image/image_78/78_Grignon_1.jpg","../../jctruffet.com/image/image_78/78_Grignon_2.jpg","../../jctruffet.com/image/image_78/78_Grignon_3.jpg","../../jctruffet.com/image/image_78/78_Grignon_4.jpg"]},"Consult_chateau_formulaire73c7":{"id":"Consult_chateau_formulaire73c7","dept":"78","canton":"Saint-Germain-en-Laye","commune":"St_Germain en Laye","nom":"Hennemont","type":"Palais","periode":"XIX-XX","histoire":"HENNEMONT, le château présente un mélange de styles architecturaux : il est néo-gothique, néo-classique, néo-renaissance avec des éléments de l'architecture médiévale. Les toits sont de différents types : à longs pans, à flèche carrée, à flèche conique et à flèche en maçonnerie.\nchemin de ronde de la maison de notable dite château d'Hennemont\nUne des cheminées s'est écroulée sur le balcon en dessous pendant la tempête de 1999. Elle a été restaurée en 2014 ainsi que le balcon.\nLa façade du château est bicolore: elle est en brique et en pierre de calcaire. Elle présente une influence médiévale. Il y a deux tours d'escalier. La principale, inspirée d'un donjon, est décorée d'une frise de fleurs et de fruits, de style néo-classique. Des créneaux la couronnen, et on y voit un faux mâchicoulis. Par ailleurs, le château a un chemin de ronde qui ne fait pas le tour complet du château. Depuis ce chemin de ronde, La vue est à 180°, du nord-est au sud-est. Sur le côté Est, on peut voir le Mont Valérien, la tour Eiffel et la Défense, et au nord-est,  la forêt de Saint-Germain-en-Laye. Le chemin de ronde est lié aux deux tours d'escalier. Dans les mois qui ont suivi le débarquement du 6 juin 1944, il a été utilisé comme quartier général du Allied Naval Commander-in-Chief Expeditionary Force (ANCXF). Le château fait partie du lycée international de Saint-Germain-en-Laye depuis 1951. Il est une propriété publique.  Il a appartenu dans l'entre-deux-guerres au maharaja Tukojirao Holkar III (en), et à son fils Yeshwant Rao Holkar II. Il donne des fêtes dans son jardin, mises en lumières par l'ingénieur Fernand Jacopozzi.","architecture":"HENNEMONT   Caractérisé par un style très éclectique, il a été\nconstruit au tout début du XXe siècle. Son propriétaire était alors le pharmacien Henri-Edmond Canonne. En 1928, il est racheté par le maharadjah dIndore et devient le lieu de brillantes réceptions, avant dêtre  délaissé. Après avoir servi dhôpital pour les troupes coloniales au début de la seconde guerre mondiale, il est réquisitionné par larmée allemande sous  loccupation. A la Libération, il accueille des hauts  responsables des forces alliées, puis connaît une nouvelle période dabandon, de 1948 à 1951,  durant laquelle il sert toutefois de décor au tournage dun film. En 1952,  La façade nord, qui donne sur le jardin, présente un style beaucoup plus classique.  L'escalier d'honneur est un escalier à vis à jour à noyau creux, en maçonnerie. Il paraît directement inspiré de celui de Chambord qui a été dessiné par Léonard de Vinci.  La salle gothique, dite aussi salle néo-gothique, a un style qui se voit souvent dans les maisons bourgeoises contemporaines. L'emplacement de cette salle dans le château et son caractère intimiste laisse à penser qu'il s'agissait d'un cabinet ou d'un salon privé. La salle est ouverte sur le jardin par deux doubles portes. La cheminée est décorée en bois et est le point fort de cette salle. La décoration y est de style gothique flamboyant. Le château d'Hennemont est probablement le seul monument construit par l'architecte Duchampt, jeune architecte décédé à 25 ans pendant la première guerre mondiale.","habitants":"Henri-Edmond Canonne entre deux guerres maharaja Tukojirao Holkar III \"","divers":"Château d'Henneont à st-Germain en Laye de 1à 4                           48° 53' 53? nord, 2° 03' 42? est","gps":"","images":["../../jctruffet.com/image/image_78/78_Hennemont_1.jpg","../../jctruffet.com/image/image_78/78_Hennemont_2.jpg","../../jctruffet.com/image/image_78/78_Hennemont_3.jpg","../../jctruffet.com/image/image_78/78_Hennemont_4.jpg"]},"Consult_chateau_formulaire0dca":{"id":"Consult_chateau_formulaire0dca","dept":"78","canton":"Bonnières-sur-Seine","commune":"Houdan","nom":"Houdan","type":"Château","periode":"XII-XVI","histoire":"Deux châteaux dans cet article; Houdan et Maulette.                                              HOUDAN, le domaine de Houdan faisait partie du territoire de la famille des Montfort, vivant à une douzaine de kilomètres dans leur château de Montfort l'Amaury. Une lettre de Simon III de Montfort, comte d'Evreux, situe la construction du château et des deux églises de Hosdench (Houdan) sous le règne de son père Amaury III qui vécut de 1101 à 1137. Ce qui permet de dater la construction du donjon à  la fin du premier tiers du XIIe siècle. Il se présente sous la forme d'une tour cylindrique de 23 m de haut, à laquelle manque les créneaux (ceux-ci devaient probablement l'élever de 1 à 2 m supplémentaires). Les pierres furent utilisées pendant la Révolution française pour construire un autel de la liberté sur la place située devant la tour.  D'un diamétre d'environ 15 m au niveau du sol la tour est flanquée aux 4 points cardinaux de tourelles semi-circulaires d'un diamètre de 4,80 m. L'épaisseur des murs décroît de 3 m au niveau du sol jusqu'à 2,40 m au sommet.  En 1903, le donjon devient propriété de la ville de Houdan à la suite du legs de son dernier propriétaire privé, le docteur Aulet. \nÉléments protégés MH : le donjon et ses quatre tourelles : classement par liste de 188.","architecture":"HOUDAN, le donjon de Houdan est constitué d'une tour légèrement ovale de 16 m de diamètre environ et de 25 m de hauteur avec des murs épais de 3,50 m, flanquée de quatre tourelles-contreforts en saillie dans les angles de même hauteur et de 4,80 m de diamètre. Ce plan sera repris vers 1140 à Ambleny.La tour comprend trois niveaux : un rez-de-chaussée et deux étages. Les planchers intérieurs et la toiture ont disparu. Un escalier aménagé dans l'épaisseur d'un mur permet d'accéder à l'étage noble situé au premier niveau. Ce-dernier s'éclaire par des baies à banquettes latérales.La porte d'accès se situait à 6 m du niveau du sol et donnait accès à un entresol.                                                                                        MAULETTE, construction du XVIe siècle à un étage, flanquée de deux tourelles d'angle et dont les communs sont utilisés comme ferme. accolé à d'Houdan, la famille Petau a été anoblie en Petau de Maulette par Louis XV, c'est cette famille qui a fait construire le manoir qui se trouve en face de l'église. Elle posséda plusieurs châteaux dans la région : la Mormaire et la Couarde entre autres, puis habita Montfort l'Amaury, dont une rue porte le nom de Petau de Maulette. L'édifice se compose d'un corps principal de plan rectangulaire et de deux tours, le bâtiment comprend un rez de chaussée et un étage carré.","habitants":"Houdan ; Famille des Montfort\"","divers":"Deux châteaux dans cet article; Houdan grav 1-2 et Maulette grav 3.                       Houdan 48° 47' 22? N, 1° 35' 56? E","gps":"","images":["../../jctruffet.com/image/image_78/78_Houdan_1.jpg","../../jctruffet.com/image/image_78/78_Houdan_2.jpg","../../jctruffet.com/image/image_78/78_Houdan_3.jpg"]},"Consult_chateau_formulaire6e99":{"id":"Consult_chateau_formulaire6e99","dept":"78","canton":"Limay","commune":"Jambville","nom":"Jambville","type":"Château","periode":"XVII-XIX","histoire":"JAMBVILLE  Le château de Jambville est une construction de la fin du XVIIe siècle, reposant sur des caves voûtées du XIIIe siècle. Face à une allée de tilleuls datant de la fin du XIXe siècle, le château remplace un premier château du XIVe siècle. Il se compose d'un pavillon central avec deux grands frontons et d'un corps de logis faisant suite à l'ouest. La partie droite du logis semble dater du début du XVIIe siècle, la tourelle d'angle comporte un escalier à vis du XVIIe siècle, tandis que l'aile en retour remonte au XVe siècle. Un temple grec rond à portique, sans base, se trouve dans le parc. A la veille de la Révolution, le dernier seigneur de Jambville éait Thomas de Maussion, intendant de la généralité de Normandie.","architecture":"JAMBVILLE, ce fut un habile administrateur, curieux d'art et de nature qui créa à Jambville des pépinières d'arbres rares. Avec des caves voûtées du XIIIe siècle, le pavillon de l'époque Louis XIV, et l'aile Renaissance, Jambville offre une architecture hétéroclite. Éléments protégés MH : les façades et les toitures du château, le petit temple grec et le parc clos de murs : inscription par arrêté du 22 décembre 1994. Les façades et les toitures de l'orangerie et l'ensemble des bâtiments de communs, sis au Parc de Jambville: inscription par arrêté du 10 février 2010.","habitants":"Famille de Thomas de Maussion\"","divers":"Château de Jambville","gps":"","images":["../../jctruffet.com/image/image_78/78_Jambville_1.jpg"]},"Consult_chateau_formulairee448":{"id":"Consult_chateau_formulairee448","dept":"78","canton":"Versailles","commune":"Jouy en josas","nom":"Jouy_en_Josas","type":"Château","periode":"XVII","histoire":"Trois châteaux dans cet article; Montcel, Montebello et Vilvert,  MONTCEL,  le domaine du Montcel est un ancien fief de Saint-Germain-des-Prés. En 1765, il appartenait à Pierre Chavanne et se composait d'une maison, bâtiments, cour, parterre, bois, prés, potager, allées canaux. Il fut acheté en 1795 par M. Oberkampf et agrandi à partir de 1805 pour Madame Oberkampf par les architectes Barthélémy Vignon et Thibault. Ils batirent l'aile gauche et le perron donnant à la maison l'allure de château. Entre 1807 et 1810, l'écossais Thomas Blaikie transforma le parc. Un Elysée familial fut installé dans une partie du domaine. Une maison dite le Chalet fut bâtie dans le troisième quart du XIXe siècle. Le domaine demeura dans la famille Mallet jusqu'en 1923, il fut acquis par messieurs Jeanrenaud qui y installa une école pour jeunes gens qui exista jusqu'en 1980. Pendant la seconde guerre mondiale un blockhaus a été construit et le château en grande partie incendié. De 1980 à 1993 le domaine fut loué à la fondation Cartier et les tombeaux de la famille Oberkampf furent déplacés dans le jardin de la \"maison du pont de pierre\", 1, rue du Montcel. Le bâtiment a été très agrandi par Oberkampf. A la suite de l'incendie de 1944, il a été presque entièrement reconstruit. Depuis 2000 le domaine a été acheté par une société qui le transforme en centre de conférence. Le site est classé depuis le 10 avril 1967.","architecture":"MONTEBELLO,  en 1898 le comte de Cambacérès acquiert le domaine sur lequel il fait construire le chalet des Metz. Il épouse en 1909 une demoiselle de Montebello, d'ou le nom actuel de la demeure. En 1940, Madame de Cambacérès, comtesse de Motebello, vend le domaine à la Société Immobilière des Metz qui le lotit. Des modifications importantes ont été réalisées à ce moment là. Le château a été acquis en 1974 par la ville et a abrité quelques temps le musée de la toile de Jouy, transféré au château de l'Eglantine. Le bâtiment est articulé autour d'un corps de logis central élevé de deux étages carrés. Les deux ailes sont dissymétriques celle de droite par rapport à la façade d'entrée n'a qu'un étage carré. Plusieurs modifications ont été apportées aux toitures (élévation de celle du corps de bâtiment), aux lucarnes (remplacées par des chiens-assis) et au balcon (garde corps en bois découpé et loggia remplacés par de la ferronnerie). Le toit en ardoise à l'origine est actuellement en tuile plate.                                   VILVERT  Château de style classique construit sur l'emplacement du précédent par le baron Cabrol de Mouté, époux de Louise Mallet, petite fille d'Oberkampf, et maire de Jouy de 1868 à 1879. Le corps central à élévation à travées sur deux étages est couvert d'un toit percé de lucarnes ornées de frontons semi-circulaires. Il est flanqué de deux pavillons surmontés d'un fronton triangulaire. Le château servit d'ambulance pendant la guerre de 1870 et pendant la Seconde Guerre mondiale afin de recevoir des blessés de la division Leclerc. Le domaine de Vilvert comprenait autrefois deux fermes et un moulin.    Propriété du ministère de l'Agriculture qui y a installé l'INRA.","habitants":"Montcel, Pierre Chavanne                               Montebello ;  Comte de Cambacérès                                                         Vilvert; baron Cabrol de Mouté\"","divers":"Trois châteaux dans cet article; Montcel  grav -1-2-3, Montebello grav 4-5-6 et Vilvert  grav-7-8,","gps":"","images":["../../jctruffet.com/image/image_78/78_Jouy_en_Josas_1.jpg","../../jctruffet.com/image/image_78/78_Jouy_en_Josas_2.jpg","../../jctruffet.com/image/image_78/78_Jouy_en_Josas_3.html","../../jctruffet.com/image/image_78/78_Jouy_en_Josas_4.jpg","../../jctruffet.com/image/image_78/78_Jouy_en_Josas_5.jpg","../../jctruffet.com/image/image_78/78_Jouy_en_Josas_6.jpg","../../jctruffet.com/image/image_78/78_Jouy_en_Josas_7.jpg","../../jctruffet.com/image/image_78/78_Jouy_en_Josas_8.jpg"]},"Consult_chateau_formulaired605":{"id":"Consult_chateau_formulaired605","dept":"78","canton":"Versailles","commune":"Jouy  en josas","nom":"Jouy_en_Josas_II","type":"Château","periode":"XVI-XVIII-XIX","histoire":"Trois châteaux dans cet article; Eglantine, des Côtes  et Jouy.                     EGLANTINE  à Jouy-en-Josas qui  figure sur le cadastre napoléonien a été acheté par le maréchal Canrobert en 1882 et revendu en 1890, après la mort de sa jeune épouse Flora Mac Donald. Mais le château qu'il habita n'est pas celui que nous connaissons puisqu'il porte la date de 1891-1892, il a donc été construit postérieurement par Alfred Vaudoyer pour un commanditaire parisien, Emile Francq. Il est devenu musée de la Toile de Jouy en 1991 ce qui a entraîné des travaux effectués par Cuno Brullmann et Arno Fougerasse-Lavergnole. Edifice de plan complexe, il se compose d'un L en rez de chaussée surélevé avec comble mais comporte deux corps à un étage de part et d'autre du corps central. Les circulations verticales ont été complètement modifiées par les adjonctions récentes en verre et métal vers lesquelles elles ont été reportées.                                                                    Des COTES,   de style néo gothique est construit au XIXe siècle par la famille Mallet, illustre dynastie jovacienne descendante d'Oberkampf dont une partie du domaine existe encore à Jouy. Il est agrandi par la suite mais connait de sérieux dégâts, au cours de la deuxième guerre mondiale, lors des bombardements alliés. Il est acquis en 1951 par la société de charité maternelle de Paris. Château construit en bordure de la vallée sur un étage de soubassement dans lequel se trouvent les cuisines. Il a trois tours couvertes de toits coniques contenant les escaliers en hors-oeuvre. Le parc, très étendu, se composait de bois en continuité avec celui de Jouy qui appartenait à la même famille. En fond de vallée des plans d'eau avec une grotte.il abrite actuellement un centre médical, créé par la société de Charité maternelle de Paris. Depuis lentrée du château empruntez un sentier qui vous mènera sur les agréables rives du ru de Saint-Marc. Ceint d'un très beau parc,   il abrite actuellement et depuis 1952 un centre médical de cardiologie infantile créé par la société de Charité maternelle de Paris.","architecture":"JOUY en Josas Un château est attesté en 1543  en U puisqu'il est question de trois galeries couvertes en terasse le long de la cour. Il appartenait à Jean d'Escoubleau, sieur de Sourdis, de Jouy et de la Chapelle-Bertrand. En 1684, Antoine Daquin, premier médecin du roi, l'acquit et le vendit en 1701 à Louis Rollin Rouillier, son gendre. C'est probablement pour lui que le château fut agrandi et régularisé par Robert de Cotte. En 1719, il est acquis par Claude François Bidal Chevalier, Marquis d'Asfeld. On ne sait comment il vint dans la famille de Rouillé, mais Antoine Louis Rouillé, fils aîné de Louis Rollin, conseiller, ministre de Louis XV, le légua à sa fille Marie Catherine qui épousa le marquis de Beuvron. Le domaine connut alors des jours fastes. Le 24 pluviose an VII, madame de Beuvron céda le domaine au citoyen Dalbon mais en fait Jean Antoine Alexis d'Albon qui le vendit peu après, le 4 messidor an IX à Armand Séguin, ancien fournisseur des armées sous la République. C'est lui qui fit reconstruire le château par l'architecte Bienaimé au début des années 1800. Séguin conserva le château jusqu'en 1834 et le céda au comte Charles Lehon. En 1838 un négociant Parisien se porta acquéreur mais incapable de le payer il fut saisi, le domaine fut adjugé à Adolphe Mallet le 15 avril 1841. Il resta dans les mains de la famille jusqu'en 1955 date à laquelle il fut acheté par la Chambre de Commerce de Paris qui y construisit H.E.C. inauguré en 1964 par le Général de Gaulle.  Le château actuel a conservé les caves voûtées en berceau et le nymphée à voûte d'ogives du précédent château que l'on peut reconstituer. Son étage supérieur est en attique. Il a une façade ordonnancée avec un fronton triangulaire soutenu par des pilastres. L'escalier était au départ à deux volées mais l'un d'entre eux a été supprimée lors d'aménagements ultérieurs. Les deux ailes se raccordent difficilement au corps central dont elles obstruent des fenêtres, pourtant elles existent sur le cadastre napoléonien, propriété de la Chambre de Commerce de Paris.","habitants":"Eglantine; maréchal Canrobert                              Côtes;famille Mallet,   Jouy ;  Jean d'Escoubleau\"","divers":"Trois châteaux dans cet article; Eglantine grav 1-2-3, des Côtes grav-4-5-6-7-  et Jouy-8.","gps":"","images":["../../jctruffet.com/image/image_78/78_Jouy_en_Josas_II_1.jpg","../../jctruffet.com/image/image_78/78_Jouy_en_Josas_II_2.jpg","../../jctruffet.com/image/image_78/78_Jouy_en_Josas_II_3.jpg","../../jctruffet.com/image/image_78/78_Jouy_en_Josas_II_4.jpg","../../jctruffet.com/image/image_78/78_Jouy_en_Josas_II_5.jpg","../../jctruffet.com/image/image_78/78_Jouy_en_Josas_II_6.jpg","../../jctruffet.com/image/image_78/78_Jouy_en_Josas_II_7.jpg","../../jctruffet.com/image/image_78/78_Jouy_en_Josas_II_8.jpg"]},"Consult_chateau_formulaireb8e7":{"id":"Consult_chateau_formulaireb8e7","dept":"78","canton":"Rambouillet","commune":"Les Essarts le roi","nom":"Les_Essarts_le_Roi","type":"Château","periode":"XVI-XVII","histoire":"Trois châteaux dans cet article; Artoire, Gandines et Romanie.                             ARTOIRE, fief mentionné en 1556 avec haute tour carrée servant de colombier. Au XVIIe siècle, M. de Binanville ajoute un logis et un parc à la tour de l'Artoire. Acheté en 1714 par le comte de Toulouse, le fief dépendait de Rambouillet, c'est-à-dire du duc de Penthièvre, successeur du comte de Toulouse mort en 1737. En 1761, le Roi Louis XV acheta l'Artoire pour en faire une annexe du château de Saint-Hubert et y logea sa suite. En 1769, Louis XV donna la propriété en dot à l'une de ses filleules, Mlle Modeste Blanchet qui épousa Mr Fortin, gentilhomme bien apparenté et estimé du Roi. Sous Louis XVI, des agrandissements furent entrepris et un relais de poste fut installé dans les dépendances de la ferme, en bordure de la route royale. Ce Mr Fortin qui assura en 1791 le secrétariat de la mairie aux Essarts, fut incarcéré aux  Récollets en 1792. Il évita l'échafaud grace à l'intervention de sa femme auprès d'un député de la Constituante. Après 1792 l'édifice est passé aux mains de plusieurs particuliers jusqu'aux propriétaires actuels.  Monsieur Cousins.","architecture":"GANDINES, manoir,   fief appartenant à l'abbaye de Hautes-Bruyères acheté en 1745 par le duc de Penthièvre d'après Maillard. Une carte de la fin du XVIIe siècle indique que le manoir possède des douves au sud et a l'est, un jardin et quatre pavillons carrés sur les angles. Vestiges des pavillons sud et Est dans parties reconstruites. Le pavillon nord détruit, le pavillon ouest restauré. Cour ouverte à l'est au XVIIIe siècle sur le plan d'intendance et la carte des chasses. Des modifications au XIXe siècle, granges et logis à l'est.                                                      ROMANIE, en  1930 propriété de monsieur Châtin ancien maire, abrite  actuellement l'ADEIMA école de musique et théatre.","habitants":"Artoire; Mr Fortin  et le duc de Penthièvre\"","divers":"Deux châteaux dans cet article; Artoire grav-1_2, Gandines grav-5-6-7 et Romanie grav-3-4.","gps":"","images":["../../jctruffet.com/image/image_78/78_Les_Essarts_le_Roi_1.jpg","../../jctruffet.com/image/image_78/78_Les_Essarts_le_Roi_2.jpg","../../jctruffet.com/image/image_78/78_Les_Essarts_le_Roi_3.jpg","../../jctruffet.com/image/image_78/78_Les_Essarts_le_Roi_4.jpg","../../jctruffet.com/image/image_78/78_Les_Essarts_le_Roi_5.jpg","../../jctruffet.com/image/image_78/78_Les_Essarts_le_Roi_6.jpg","../../jctruffet.com/image/image_78/78_Les_Essarts_le_Roi_7.jpg"]},"Consult_chateau_formulaireeb39":{"id":"Consult_chateau_formulaireeb39","dept":"78","canton":"Limay","commune":"Limay_Issou","nom":"Limay_Issou","type":"Château","periode":"XVI","histoire":"ISSOU, située dans le Nord  du département, sur la rive droite de la Seine, Issou est une commune largement urbanisée. Elle est limitrophe de Guitrancourt au nord-ouest, de Porcheville au sud-ouest, de Gargenville à l'est. Au sud, elle est séparée par la Seine de Mézières-sur-Seine. Une première résidence dont il ne reste que peu de traces, est édifiée à la fin du XIVe siècle. La construction du château actuel commence en 1724. La femme de lambassadeur de France à la cour de Suède écrit en 1739 : \"Cet endroit est le plus joli du monde, on l'appelle Issou\". Acquis en 1750 par le duc de Bouillon, très introduit à la Cour. Issou est une résidence très appréciée. Mme de Pompadour aurait laissé sa devise sur le pigeonnier. Le château se trouvait au centre d'une importante exploitation agricole, dont de nombreux bâtiments subsistent. Il a fait l'objet d'une restauration en 1903, construction rénovée en 1903 dans le style du XVIIIe siècle. Après l'acquisition de la famille Chaperon à la famille du vicomte De Jean (contrairement à la légende locale il n'a pas été offert en cadeau de mariage), il a subi de nombreuses mutations successives. Le duc de Bouillon l'a acquise en 1750, il recevait la marquise de Pompadour qui selon la légende a laissé sa devise sur le pigeonnier rond : « Horace Non Numero Nisi Serenas ». Le château proprement dit date d'environ 1399 il n'en reste quasiment rien, sinon une tour carrée, vestige de l'ancien manoir féodal datant du XVIe siècle et un colombier rond qui ont été rénovés à la fin des années 1990 par l'association C.H.A.M (Chantiers Histoire et Architecture Médiévales).","architecture":"CELESTINS, le château se dresse à la droite duquel s'élevait la chapelle Sainte-Christine, reliée au château par un cloître. Des parties importantes du château ont été classées en 1970 par le ministère des affaires culturelles. Il s'agit des façades, des toitures du bâtiment principal, des trois pièces décorées du rez-de-chaussée de style empire: hall d'entrée, salle à manger et salon. Situé au pied de la forêt Saint-Sauveur (ex Ermitage Saint-Saveur), le château des Célestins domine la Ville sur son versant Nord.\nMOUSSETS, Ernest Chausson,  parcourut le château en sifflotant quelques poèmes pour violon ,le célèbre compositeur français qui mourut accidentellement dune chute de vélo dans ce château en 1899.   Construit au XVIIe siècle, le château des « Grands Moussets » connut de nombreux changements et remaniements de la part de ses propriétaires successifs : il fut lieu de rassemblement de la confrérie de l'Ermitage Saint-Sauveur à partir du XVIIIe siècle, résidence d'été d'Anne de la Force (favorite de Louis XVIII) avant d'être racheté par le baron Laurent-Atthalin à la toute fin du XIXe siècle. En 1945, le château fut vendu à l'ambassade de l'URSS qui le transforma en maison de repos pour les diplomates soviétiques de Paris. Le château est aujourd'hui  la  propriété de la Russie.","habitants":"le duc de Bouillon\"","divers":"Trois châteaux dans cet article Issou grav-1-2, Celestins grav -3-4 et Mousset_5","gps":"","images":["../../jctruffet.com/image/image_78/78_Limay_Issou_1.jpg","../../jctruffet.com/image/image_78/78_Limay_Issou_2.jpg","../../jctruffet.com/image/image_78/78_Limay_Issou_3.jpg","../../jctruffet.com/image/image_78/78_Limay_Issou_4.jpg","../../jctruffet.com/image/image_78/78_Limay_Issou_5.jpg"]},"Consult_chateau_formulaireba27":{"id":"Consult_chateau_formulaireba27","dept":"78","canton":"Chatou","commune":"Port-marly","nom":"Lions_Grandchamp","type":"Château","periode":"XV-XIX","histoire":"Deux châteaux dans cet article, les Lions et Grandchamp                                      Des LIONS, la gravure de Nicolas de Fer de 1716 indique le château à cet emplacement, mais il est détruit avant 1806. Le château des Lions, ancien manoir des seigneurs de Prunay est rebâti, tel que nous le connaissons aujourd'hui, avant 1819 date du cadastre. La famille Rodrigue Henriquès sinstalle au château en 1853, elle y recevra le peintre Camille Corot qui exécutera en 1872  plusieurs tableaux célèbres. Remplois de panneaux de menuiserie et d'un plafond peint. La demeure abrite un magnifique escalier d'honneur en fer à cheval de vingt marches à rampe de fer forgé, et des baies à vantaux et impostes dormantes.  Propriété de la commune, hôtel de ville depuis 1953. Éléments protégés MH : les façades et les toitures ainsi que le portail d'entrée avec ses deux statues de lion : inscription par arrêté du 27 avril 1972. La chambre dite de Jacques II avec son décor.","architecture":"le Pecq à cinq K.M. au nord GRANDCHAMP,  château attesté au XVe siècle. En 1820, construction d'un nouvel édifice pour le baron Gérard, détruit en 1900, seuls quelques communs subsistent. Vers 1911, reconstruction pour Louis Dior, entrepreneur de travaux publics, d'un château sur l'emplacement du précédent et aménagement d'un parc : pièces d'eau, potager, verger, jardin japonais, construction de deux pavillons de gardien et d'une orangerie. En 1924, vente du domaine à la Société Générale Foncière et lotissement du parc. En 1946, le château est agrandi par deux ailes pour devenir un asile de vieillards. En 1953, construction de deux nouvelles ailes, l'édifice étant affecté à la maison d'enfant de Saint-Cyr.  Centre médico social.","habitants":"Lions: famille Rodrigue Henriquès                                     Grandchamp; le baron Gérard\"","divers":"Deux châteaux dans cet article, les Lions grav-4-5  et Grandchamp grav-1-2-3","gps":"","images":["../../jctruffet.com/image/image_78/78_Lions_Grandchamp_1.jpg","../../jctruffet.com/image/image_78/78_Lions_Grandchamp_2.jpg","../../jctruffet.com/image/image_78/78_Lions_Grandchamp_3.jpg","../../jctruffet.com/image/image_78/78_Lions_Grandchamp_4.jpg","../../jctruffet.com/image/image_78/78_Lions_Grandchamp_5.jpg"]},"Consult_chateau_formulaire5bce":{"id":"Consult_chateau_formulaire5bce","dept":"78","canton":"Le Chesnay-Rocquencourt","commune":"Louveciennes","nom":"Louveciennes","type":"Château","periode":"XVII-XIX","histoire":"Trois châteaux dans cet article, Barry, Prunay et Voisins                               BARRY à Louveciennes, château construit après 1684 à la demande de Louis XIV pour Arnold de Ville, l'un des constructeurs de la machine de Marly. En 1769,  la comtesse  du Barry le reçu en cadeau de Louis XV elle y ajoute l'aile orientale sous la direction probable de Jacques-Ange Gabriel. En 1771, Claude Nicolas Ledoux construit le pavillon de musique dit pavillon de Louveciennes.  Glacière et jardin paysager du troisième quart du XVIIIe siècle. A la fin du XIXe siècle, Pasquier construit l'entrée sur bord de Seine et pavillon route de la princesse. En 1897 et 1898, Goury élève deux pavillons d'entrée et des écuries datées 1898. Après 1918, le pavillon de musique est démonté et rebâti. Parc redessiné à l'anglaise et bergerie de la fin du XIXe siècle. L'ensemble du domaine de la comtesse du Barry comprenait, le pavillon de musique à Louveciennes, le temple de l'Amour et la grille des Lions à Bougival et la machine de Marly. Au début de la Révolution en 1789 madame du Barry le 8 décembre 1793 elle monte à l' échaffaud.  Éléments protégés MH : pour être conservés et remis en état : l'ancien château, son parc, ses fabriques et sa bergerie: classement par décret du 26 décembre 1994.                                                                                                      PRUNAY, château avec jardin régulier, ferme et colombier figuré en 1739. Bâtiments sans doute édifiés à usage des communs près du château avant 1819, date du cadastre, château détruit au cours du XIXe siècle et jardin transformé en jardin paysager. L'actuel château de Prunay a été construit à la fin du XIXe siècle ou au début XXe siècle. Château composé d'un étage et d'un étage de comble, escalier dans oeuvre. Gros-oeuvre calcaire ; pan de bois ; pierre avec brique en remplissage; meulière.","architecture":"VOISINS, est construit entre 1650 et 1675. En 1696, il est acheté par Louis Oger de Cavoye puis devint la propriété de Louise Élisabeth de Bourbon-Condé, princesse de Conti, la princesse de Conti ajoute des annexes au XVIIIe siècle, elle demande à Claude Nicolas Ledoux des projets de reconstruction, sans donner suite. Vers 1820, constatant sa vétusté, son propriétaire, le comte Hocquart de Turtot? le fait démolir puis reconstruire ; la configuration du bâtiment est alors celle d'aujourd'hui. En 1857, le domaine est acheté par Charles Tavernier  À partir de 1874, le château appartient ainsi au banquier Guillaume Beer et à sa femme Elena Goldschmidt. Cette dernière y tient salon, recevant notamment le poète Leconte de Lisle qui écrit \"la rose de Louveciennes\" pour lui rendre hommage. Le poète meurt lors d'un séjour à Voisins. Lorsque son mari meurt en 1913, Élena Goldschmidt partage le domaine, se réserve le pavillon et cède le château et son domaine à son oncle, Robert de Rothschild. Le château et la majeure partie des communs furent reconstruits après 1819, date du cadastre, le château d'eau, élevé dans le parc au XXe siècle. Edifice de plan symétrique composé de deux étages et étage de comble, élévation ordonancée..En 1946, le domaine devient la propriété de la banque BNCI ancêtre de BNP Paribas. Elle l'utilise désormais comme centre de formation.\nÉléments protégés MH : le château de Voisins : inscription par arrêté du 10 février 1948.","habitants":"Barry; la comtesse du Barry.                                    Voisins la princesse de Conti\"","divers":"Trois châteaux dans cet article, Louvecienne-grav-1-2_3  Barry grav-4-5, Prunay-grav 6-7 et Voisins grav-8-9","gps":"","images":["../../jctruffet.com/image/image_78/78_Louveciennes_1.jpg","../../jctruffet.com/image/image_78/78_Louveciennes_2.jpg","../../jctruffet.com/image/image_78/78_Louveciennes_3.jpg","../../jctruffet.com/image/image_78/78_Louveciennes_4.html","../../jctruffet.com/image/image_78/78_Louveciennes_5.jpg","../../jctruffet.com/image/image_78/78_Louveciennes_6.jpg","../../jctruffet.com/image/image_78/78_Louveciennes_7.jpg","../../jctruffet.com/image/image_78/78_Louveciennes_8.jpg","../../jctruffet.com/image/image_78/78_Louveciennes_9.jpg"]},"Consult_chateau_formulairee2b4":{"id":"Consult_chateau_formulairee2b4","dept":"78","canton":"Maurepas","commune":"Chevreuse","nom":"Madeleine_78","type":"Vestiges","periode":"XI","histoire":"LA MADELEINE,  sa construction a commencé entre 1030 et 1090 ,  par Gui Ier, seigneur de Chevreuse. Un siècle plus tard, sous le règne d'Anseau de Chevreuse, d'importantes modifications furent apportées au château, avec la construction de mâchicoulis. La porte était protégée par des douves, l'eau était retenue par une digue et servait sans doute aux usages domestiques. Des ponts-levis permettaient la circulation des charettes et des piétons. En 1356, le château change de mains et appartient à Ingerger le Grand, seigneur de Chevreuse et d'Amboise, qui est fait prisonnier en Angleterre durant la guerre de Cent Ans, il est contraint de vendre la Madeleine pour payer sa rançon, le futur Pierre de Chevreuse achète la demeure. Les fortifications existantes sont grandement améliorées sous les règnes de Charles V et de Charles VI, qui financent les travaux grâce aux impôts royaux. Les travaux sont achevés sous Louis XI (1461-1483).  Au XIXe siècle le château devient la propriété des ducs de Luynes pour le céder au conseil général des Yvelines.","architecture":"LA MADELEINE,  de cette époque ne subsiste que le donjon. Au XIe siècle, le donjon n'était sans doute entouré que d'une palissade en bois qui ne fut remplacée par des murailles de pierre qu'au XIIe siècle.  Au cur du château de La Madeleine a été bâtie la \"maison du parc naturel régional de la haute vallée de Chevreuse\" dont l'architecture moderne se fond dans la cour intérieure tout en utilisant des salles anciennes. Il subsiste du château de La Madeleine une enceinte complète avec deux tours carrées à l'est, face au village, la porte principale entourée de deux tours, le fronton en pierre s'est écroulé et a été remplacé par un linteau en bois, deux tours rondes dont l'une est semi-circulaire, l'autre surmontée d'une tourelle de guet, un donjon dont il reste de petites fenêtres du XIe siècle et sur l'autre façade des fenêtres du XIVe siècle, un puits du XVe siècle et des mâchicoulis au sommet des remparts.  Éléments protégés MH : le château de la Madeleine (ruines) : inscription par arrêté du 27 janvier 1948. Tout comme le château, le village est lui aussi fortifié, on construit un rempart crénelé haut de 3,50 m et muni de tourelles. Les défenses sont complétées par un fossé de 15 mètres. Au XVIIe siècle, vers 1661, Jean Racine supervisa des modifications du donjon, le chemin qui va de l'abbaye de Port Royal des Champs jusqu'au centre du village de Chevreuse en passant par le château de la Madeleine a été baptisé de son nom. Il est vraisemblable que le donjon a été partiellement restauré au XIXe siècle. Les dernières modifications datent du XXe siècle.","habitants":"Les ducs de Luynes\"","divers":"Vestiges du château de la Madeleine","gps":"","images":["../../jctruffet.com/image/image_78/78_Madeleine_78_1.jpg","../../jctruffet.com/image/image_78/78_Madeleine_78_2.jpg","../../jctruffet.com/image/image_78/78_Madeleine_78_3.jpg","../../jctruffet.com/image/image_78/78_Madeleine_78_4.jpg","../../jctruffet.com/image/image_78/78_Madeleine_78_5.jpg","../../jctruffet.com/image/image_78/78_Madeleine_78_6.jpg","../../jctruffet.com/image/image_78/78_Madeleine_78_7.jpg"]},"Consult_chateau_formulairefbd9":{"id":"Consult_chateau_formulairefbd9","dept":"78","canton":"Sartrouville","commune":"Maisons Lafitte","nom":"Maisons_Lafitte","type":"Palais","periode":"XVI","histoire":"Maisons LAFFITTE, est destiné à lui permettre d'accueillir le Roi. Il confie le projet à l'un des plus grands architecte de cette époque François Mansart. En 1650, Longueil devient Surintendant des Finances. Mais son apogée est en avril 1651, lorsqu'il reçoit le Roi Louis XIV à Maisons, Ce jour-là Longueil offre un banquet et une fête somptueuse pour la régente Anne d'Autriche, le jeune Louis XIV âgé de 13 ans et pour Philippe duc d'Anjou, et d'autres personnages de la cour. En 1671 René de Longueil reçoit une nouvelle visite du roi au château. Les circonstances de cette visite sont assez tristes. En effet c'est à l'occasion de la mort du duc d'Anjou, 2ème fils de Louis XIV, à Saint-Germain. Louis XIV séjourne pendant plusieurs jours au château de Maisons. René de Longueil meurt à Paris en 1677, à l'âge de 82 ans. Le château reste ensuite propriété des descendants de René de Longueil. Jean René de Longueil disparaît en 1731 à l'âge de 31 ans. Son fils unique, René Prosper de Longueil âgé de 6 mois décède accidentellement un an plus tard et à partir de ce moment, il n'y a plus de descendant masculin. C'est l'extinction des Longueil. Le domaine de Maisons revient à Marie Renée de Belleforière, marquise de Soyécourt. Celle ci décède quelques années plus tard, c'est un petit fils de la marquise qui hérite de la propriété . Louis Armand, marquis de Soyécourt, le château représente une charge très lourde pour le marquis est incapable de financer et il cherche à le vendre à partir de 1746. Le château a failli, par deux fois, être racheté par Louis XV, une première fois, en 1747, pour Madame de Pompadour. Elle avait fait savoir au Roi que ce château lui plaisait. Le Roi vient visiter longuement le château. Il est visiblement très intéressé. Mais il renonce à cette acquisition sans explication. Une deuxième fois, en 1770, Louis XV revient au château de Maisons et il y demeure quelques jours en compagnie de Mme du Barry.","architecture":"Maisons LAFFITTE, Mme du Barry  se plait qu'elle aimerait bien l'acquérir, ainsi le roi demande à un architecte de réaliser des plans de transformations intérieures pour améliorer le confort du château, les plans présentés proposaient des modifications dans la structure du bâtiment pour le rendre habitable. Devant l'importance des travaux, le Roi s'empressa de renoncer à ce projet d'acquisition. Il faudra attendre plus de 30 ans pour trouver un acquéreur. Le comte d'Artois, frère du roi Louis XVI, acquiert le château en 1777 âgé de 20 ans. Il cherchait une propriété proche de Saint Germain en attendant la fin des travaux  de reconstruction du château Neuf. A Maisons le comte d'Artois entreprend aussi des travaux de restauration et de décoration qu'il confie à l'architecte Bellanger. On peut voir aujourd'hui la salle à manger dite salle à manger du comte d'Artois réalisée dans un décor néo-classique, les travaux de restauration  ne seront jamais terminés . Le comte d'Artois était si compromis par son attitude radicale et intransigeante que Louis XVI, lui-même, après la prise de la Bastille, lui demande de partir en exil à l'étranger. Et il part dés le 17 juillet 1789. Il se réfugie auprès de plusieurs cours européennes avant de s'installer en Angleterre, il reviendra en france en 1814 et succèdera à Louis XVIII sous le nom de Charles X avant d'être obligé de repartir en exil au moment des journées des trois glorieuses qui permettront l'avènement de Louis Philippe. En 1792, le château de Maisons est confisqué, il devient bien national, on pose les scellés au château et le domaine est mis sous séquestre. Il s'agit des biens de celui qu'on appelle l'émigré Charles Philippe Capet. En 1793, le château est vidé de son mobilier et celui-ci est transporté à Saint-Germain pour être vendu par adjudication.  En 1844 divers propriétaires, l'état l'acquiert  en 1905.","habitants":"Famille de René de Longueil \"","divers":"Palais de Maisons Lafitte grav de 1 à 5","gps":"","images":["../../jctruffet.com/image/image_78/78_Maisons_Lafitte_1.jpg","../../jctruffet.com/image/image_78/78_Maisons_Lafitte_2.jpg","../../jctruffet.com/image/image_78/78_Maisons_Lafitte_3.jpg","../../jctruffet.com/image/image_78/78_Maisons_Lafitte_4.jpg","../../jctruffet.com/image/image_78/78_Maisons_Lafitte_5.jpg"]},"Consult_chateau_formulaire001b":{"id":"Consult_chateau_formulaire001b","dept":"78","canton":"Mantes-la-Jolie","commune":"Mantes la jolie Limay","nom":"Mantes_la_jolie","type":"Château","periode":"XVI","histoire":"Deux châteaux dans cet article, Celestins et Mantes la Jolie.                                                                         CELESTINS,  avant 1371, en cet endroit était dressée la potence du baillage de Mantes, les travaux de construction d'un monastère commencent, en 1375, le premier prieur s'installe. En février 1376, le roi Charles V publie la charte de fondation du monastère des Célestins et le 15 février 1377 les moines s'installent officiellement. Ils y resteront 400 ans, jusqu'à la dissolution de l'ordre religieux le 13 mai 1779 par Louis XVI, dix ans avant la Révolution. Puis le château (ancien monastère remanié, et aménagé), changea plusieurs fois de propriétaires avant de devenir possession de la famille Lefébure en 1912. Le château est entouré d'un parc avec terrasses, sources, bassins et dépendances dont une orangerie, une maison secondaire, une chapelle, des garages et des caves creusées dans la roche.  Éléments protégés MH : les façades et les toitures du bâtiment principal et de l'aile en retour ; les trois pièces décorées du rez-de-chaussée de style Empire ; le hall ; la salle à manger et le salon : inscription par arrêté du 16 juin 1970.","architecture":"MANTES la JOLIE et Mantes la ville                                                                    En 1416, Mantes et son château furent pris par les Anglais, la ville resta sous la dominance Anglaise jusqu'en 1449. Une partie des fortifications furent démantelées en 1432. Ce que nous pouvons voir de nos jours. C'est en 1615 que le château cessa d'être une résidence Royale. Une partie des bâtiments avait été convertie en manufacture de draps de soie en 1604 par Henri IV qui y vint pour la dernière fois en 1609. Il fut laissé à l'abandon dès le début du XVIIIe siècle, il fut démoli en  1719 1720 les matériaux récupérés ont servis à la construction d'écuries pour y mettre les chevaux des gardes du roi. Il fut envisagé de réaliser la construction d'une caserne avec ces matériaux, mais cela ne se fit pas. En 1800, il ne restait plus que les écuries de cette belle demeure très riche en histoire.","habitants":"Celestins; famille Lefébure\"","divers":"châteaux dans cet article, et Mantes la Jolie.   Villiers grav-2  et mairie grav-1","gps":"","images":["../../jctruffet.com/image/image_78/78_Mantes_la_Jolie_1.jpg","../../jctruffet.com/image/image_78/78_Mantes_la_Jolie_2.jpg"]},"Consult_chateau_formulaire52e2":{"id":"Consult_chateau_formulaire52e2","dept":"78","canton":"Chatou","commune":"Marly le roi","nom":"Marly_le_Roi","type":"Château","periode":"XVIII-XIX","histoire":"Quatre chateaux à Marly le roi dont Marly, les Ombrages, Verduron, l'Etang la ville à MARLY LE ROI, près de mille ans avant la naissance de lhomme qui a donné son nom et son renom à la ville de Marly-le-Roi  le roi Louis XIV, la forêt était la propriété de labbaye de Saint-Germain-des-Prés. Mairilacus est la première mention connue du nom de Marly. Cest cette colline, déjà habitée mais en lisière des grandes forêts de chasse, que Louis XIV allait choisir pour se faire construire, par Jules Hardouin-Mansart, une résidence plus intime que Versailles.  Comme lécrit Gérard Mabille dans Vues des Jardins de Marly, ce que le roi chercha et trouva à Marly, cest peut-être, en définitive, ce qui manquait à Versailles. Enfin, la nécessité de concilier, sans cesse, le vieux et le neuf fut sans doute ce quil y eut de plus contraignant dans les travaux versaillais ; à Marly, créé de toutes pièces, le roi put enfin donner libre cours à son désir de faire uvre absolument personnelle. Ainsi, la dernière création du règne peut-elle être considérée comme la plus parfaite.  Ancien domaine royal sous Louis XIV, le parc est aujourd'hui propriété de lÉtat et est géré par létablissement public de Versailles. Depuis octobre 2018, le parc de Marly est accessible aux vélos.","architecture":"Village voisin MARLY LE ROI   Les OMBRAGES       Ensemble des bâtiments (communs et colombier) construit dans le premier quart XIXe siècle porté sur le cadastre de 1819, la construction du château actuel date du début du quatrième quart du XIXe siècle. Le bâtiment se compose d'un sous sol, d'un étage carré et d'étage de comble, élévation ordonnancée. Parties constituantes : logement de domestiques, écurie et colombier.                                                                     A  Marly le Roy; VERDURON, château construit pour l'essentiel au XVIIIe siècle avant 1726 avec jardin figurant sur plan de la bibliothèque nationale. Après 1863, l'orangerie est ajoutée puis construction d'une tour circulaire limite XIXe-XXe siècle. A la fin du XIXe siècle, l'écrivain Victorien Sardou installe des vestiges du château des Tuileries de Paris dans le parc; installation de l'allée des Sphinx 1867, 1868. L'édifice, de plan régulier, se compose d'un étage carré et d'un étage de comble. Le gros-oeuvre en calcaire ; pierre de taille; brique et enduit. Elévation ordonnancée surmontée de toit à longs pans brisés; dôme carré; terrasse et dôme circulaire, recouverts d'ardoises. Le parc comprend un bassin, un jardin, une orangerie et une serre..                                                                                Au nord de Marly le Roy, L'ETANG LA VILLE, le château de LEtang-la-ville a été édifié au XVIIe siècle par Pierre Séguier (1588-1672), chancelier sous Louis XIII qui l'a fait pair et duc de Villemaur, puis chancelier et garde des Sceaux de Louis XIV. Pierre Séguier est l'un des membres fondateurs de l'Académie française. Le château est actuellement occupé par la mairie. Son magnifique parc est classé Monument historique.  château de L'Etang la Ville, hôtel de ville, parc et jardin.","habitants":"l'écrivain Victorien Sardou \"","divers":"Quatre chateaux à Marly le Roi dont Marly  grav-1-2, les Ombrages, Verduron grav 7-8-9, l'Etang la ville-grav-3-4-5-6","gps":"","images":["../../jctruffet.com/image/image_78/78_Marly_le_Roi_1.jpg","../../jctruffet.com/image/image_78/78_Marly_le_Roi_2.jpg","../../jctruffet.com/image/image_78/78_Marly_le_Roi_3.jpg","../../jctruffet.com/image/image_78/78_Marly_le_Roi_4.jpg","../../jctruffet.com/image/image_78/78_Marly_le_Roi_5.jpg","../../jctruffet.com/image/image_78/78_Marly_le_Roi_6.jpg","../../jctruffet.com/image/image_78/78_Marly_le_Roi_7.jpg","../../jctruffet.com/image/image_78/78_Marly_le_Roi_8.jpg","../../jctruffet.com/image/image_78/78_Marly_le_Roi_9.jpg"]},"Consult_chateau_formulaire6377":{"id":"Consult_chateau_formulaire6377","dept":"78","canton":"Aubergenville","commune":"Maule","nom":"Maule_Agnou","type":"Château","periode":"XVI-XVII   XVIII-XIX","histoire":"trois châteaux dans cet article; Agnou,  Buat et Rolanderie.                                               AGNOU, la construction du château d'Agnou a débuté dans la denière décennie du XVIe siècle, vers 1594. Il a fallu d'abord assainir et remblayer l'ancien marais du bout d'Agnou, en bordure de la Mauldre. Nicolas Harlay de Sancy, baron de Maule, avait mis sa fortune et ses talents au service du roi Henry IV. Son projet était ambitieux. Il voulait bâtir un immense quadrilatère flanqué de quatre tours rondes. Par son mariage avec Marie Moreau le 15 février 1575, Nicolas de Harlay fait l'acquisition de la terre de Grosbois en 1596 où il entreprend la construction d'un autre château en 1597, pouvant expliquer l'inachèvement d'Agnou. Les héritiers du baron et de sa femme Marie Moreau ne pourront conserver la propriété. Il sera vendu en 1638 à Claude de Bullion, surintendant des finances et garde des sceaux. A la Révolution, il appartiendra au marquis de Boisse qui devra s'éxiler. Les révolutionnaires mutileront le château dont les restes seront vendus en 1793 à Nicolas-François Fréret et finalement récupéré par le marquis de Boisse en 1812. Il appartient au XIXe siècle à la famille de Maule Plainval, et en 1876, aux Balagny. Transformé en hospice lors de la première guerre mondiale, occupé par la Wehrmacht durant la deuxième guerre mondiale, il sera abandonné dans les années 1960. Sauvé par ses nouveaux propriétaires dans les années 1970, il retrouve peu à peu son image du XVIe siècle. Éléments protégés MH : les façades et les toitures du château et de la tour aménagée en colombier : classement par arrêté du 31 juillet 1979.","architecture":"BUAT, construit en 1730, de style Louis XV, sur les vestiges d'une ancienne porte de la ville fortifiée de Maule, la porte du Buat, qui était la quatrième qui longeait la propriété de l'hostellerie du Dauphin. Le fief du Buat est offert au monastère en 1366, par Jacques du Buat, chanoine de Saint-Paul à Saint-Denis et, en échange, le prieur avait l'obligation de dire une messe de requiem dans l'église une fois par semaine. La propriété est cédée par les moines, en 1491, à Thomas Morise, manoeuvrier. En 1664, le domaine est transmis au Sieur Pernot par un bail emphytéotique de 60 ans. Cet homme était Grand valet de pied du roi sous Louis XIV. A sa mort, sa veuve hérita du fief. Le château, appelé à l'époque Maison Rouge, fut bâti par les enfants Pernot en 1730. Il se transmit successivement de génération en génération par les femmes de la famille. Au début du XXe siècle, l'une d'entre elles cède le château à une congrégation de religieuses bénédictines. Création en 1951 par la mère supérieure et M. Corcoral, d'un lycée agricole privé, le ministère de l'agriculture donnant son agrément.   accueille aujourd'hui un lycée agricole.                                                        ROLANDERIE, date  du XVIIIe siècle. Au XIXe siècle, Rudolph Meyer, un canadien est régisseur du château qui, d'ailleurs, prendra le nom d'une colonie dans la Saskatchewan. Henri Lorin, catholique français engagé au sein du catholicisme social, a vécu dans ce château qu'il acheta après son mariage en 1891.                                                                                    St VINCENT pas d'historique.","habitants":"Agnou; Nicolas Harlay de Sancy                             Buat ; Jacques du Buat                      Rolandière ; Rudolph Meyer\"","divers":"Deux châteaux dans cet article; Agnou grav-1-2  et Buat gra v-3-4    et Rolanderie  grav 5                              gps 48° 54' 17? N, 1° 50' 50? E","gps":"","images":["../../jctruffet.com/image/image_78/78_Maule_Agnou_1.jpg","../../jctruffet.com/image/image_78/78_Maule_Agnou_2.jpg","../../jctruffet.com/image/image_78/78_Maule_Agnou_3.jpg","../../jctruffet.com/image/image_78/78_Maule_Agnou_4.jpg","../../jctruffet.com/image/image_78/78_Maule_Agnou_5.jpg"]},"Consult_chateau_formulaire70ee":{"id":"Consult_chateau_formulaire70ee","dept":"78","canton":"Limay","commune":"Hannecourt_Gargenville","nom":"Mesnil_St_Laurent","type":"Château","periode":"XVII","histoire":"Le Mesnil Saint-Laurent à HANNEUCOURT, lactuel château construit en 1727, par Mufle de la Tuilerie, pour René le Roy d'Erval  ancien contrôleur de la duchesse du Berry  a reçu la visite de personnages célèbres comme Napoléon Ier en 1810, Casimir Périer, le marquis de Cirée et Mlle Dosne, belle-sur dAdolphe Thiers, dont une avenue porte aujourdhui son nom à Gargenville. Cette dernière fut la propriétaire du château où elle résida de 1880 à 1890. la propriété fut acquise en 1891 par Eugène  Manet, frère du peintre Edouard  Manet et époux de Berthe Morisot.  Elle contribua à lembellissement de la propriété, mais aussi au développement de la commune et elle participa activement notamment à la création de deux ponts à Rangiport, avec la rive gauche de la Seine.   Éléments protégés MH : la façade Sud et la toiture correspondante ; la chapelle, le pigeonnier et l'orangerie ; la fontaine face à l'ancienne entrée du château : inscription par arrêté du 22 novembre 1981   centre de loisirs.","architecture":"MESNIL ST-LAURENT, se compose d'un rez-de-chaussée surélevé, dont l'avant corps central, coiffé d'un fronton circulaire, s'ouvre par une baie cintrée,mais l'importance et l'intérêt de l'édifice sont donné par la toiture, vaste comble d'ardoises à deux pentes auquel son  coyau retroussé donne un dernier souvenir  la fantaisie de l'époque Régence.","habitants":"Famille de René le Roy d'Erval \"","divers":"Mesnil_St_Laurent-Hanneucourt","gps":"","images":["../../jctruffet.com/image/image_78/78_Mesnil_St_Laurent_1.jpg"]},"Consult_chateau_formulaire6a54":{"id":"Consult_chateau_formulaire6a54","dept":"78","canton":"Aubergenville","commune":"Mesnuls","nom":"Mesnuls","type":"Château","periode":"XV-XVI","histoire":"MESNULS, en 1540, Christophe de Refuge, maître dhôtel du duc dAlençon, quatrième fils de Henri II, construit, à lemplacement du premier manoir, un bâtiment à deux niveaux, avec une aile basse, des douves et une poterne à deux tourelles, la poterne actuelle. Robert de Combault, gentilhomme de la chambre dHenri III et capitaine des gardes de la reine, chevalier des deux ordres du roi, acquiert le château, en 1575 et en 1580, Robert de Combault entreprend la construction de la partie gauche du corps central du château, avec un appareillage décoratif de briques, disposées à la verticale, en fougères ou en chevrons.                               En 1987, le groupe Thomson-CSF, à linitiative de son président Alain Gomez, achète le château, effectue sa restauration complète à létat dorigine. Il appartient actuellement à monsieur Chrissoveloni  qui l'a mis à la disposition d'une oeuvre pour la réducation de jeunes infirme.","architecture":"MESNULS, au XVIIIe siècle, les différents propriétaires font construire les ailes est et ouest du château et élever, devant lorangerie, le pédiluve servant à laver les pieds des chevaux et les roues des carrosses. Éléments protégés MH : les parties non classées du château : inscription par arrêté du 16 novembre 1945. Les façades et les toitures ; le grand escalier intérieur et les plafonds à la française du corps principal du château ; la porterie et l'orangerie ; le bassin avec sa vasque de la cour d'honneur ; la balustrade de la grande terrasse ; les restes architecturés du grand bassin : classement par arrêté du 7 mai 1975.","habitants":"Famille de Christophe de Refuge\"","divers":"Château du Mesnuls","gps":"","images":["../../jctruffet.com/image/image_78/78_Mesnuls_1.jpg","../../jctruffet.com/image/image_78/78_Mesnuls_2.jpg","../../jctruffet.com/image/image_78/78_Mesnuls_3.jpg"]},"Consult_chateau_formulaire2ddf-2":{"id":"Consult_chateau_formulaire2ddf-2","dept":"78","canton":"Poissy","commune":"Migneaux","nom":"Migneaux","type":"Manoir","periode":"XVII-XIX","histoire":"MIGNEAUX, après avoir redonné au manoir des Migneaux son allure dantan, Alain Sepulchre et son épouse se sont décidés à ouvrir les portes de leur propriété, ponctuellement, pour lorganisation dévénements. Des mariages sont notamment organisés dans les magnifiques jardins. Lactivité commerciale du domaine pourra peut-être se développer et se renforcer dans le futur par de nouvelles offres.","architecture":"MIGNEAUX, ces quelques mots dArthur Rimbaud décrivent parfaitement le cadre du manoir des Migneaux. Un lieu verdoyant, traversé par un petit ruisseau, le Ru. Ici, les jardins ont toujours eu une place centrale. Autrefois écrin dun château, ils entourent aujourdhui un élégant manoir du XIXe siècle. \nNous devons les premiers jardins des Migneaux à Charles Dufresny, propriétaire du domaine en 1682 et dessinateur officiel des jardins royaux sous Louis XIV. Le domaine devient pour lui une véritable source dinspiration. Alors que la mode est aux perspectives géométriques, il trace des chemins sinueux à travers les dix hectares de nature de la propriété, donnant naissance à ce que nous appellerons plus tard, les jardins anglais. Un paysage qui sera renforcé en 1791 lorsque le nouveau propriétaire fera appel à Jean-Marie Morel, paysagiste à lorigine de limplantation des jardins anglais en France. Sur les traces de Dufresny, il redessine les bois et les chemins menant au Ru.","habitants":"Famille d'Alain Sepulchre\"","divers":"Château de Migneaux","gps":"","images":["../../jctruffet.com/image/image_78/78_Migneaux_1.jpg","../../jctruffet.com/image/image_78/78_Migneaux_2.jpg","../../jctruffet.com/image/image_78/78_Migneaux_3.jpg"]},"Consult_chateau_formulaired5e3":{"id":"Consult_chateau_formulaired5e3","dept":"78","canton":"Aubergenville","commune":"Millemont","nom":"Millemont","type":"Château","periode":"XVIII","histoire":"MILLEMONT, la reine Claude fait don du duché de Bretagne et du comté de Montfort, dont dépend la seigneurie de Millemont, au roi François 1er, son époux. Le sieur d'Haville, gouverneur de Monfort et bailli du roi, fait bâtir en 1515 le petit château. En 1710, Guillaume IV de Briçonnet, conseilleur au Parlement de Paris et descendant de Robert de Briçonnet chancelier de France, entame la construction du grand château. En 1749, Millemont devient la propriété dAntoine Rousseau, secrétaire des finances de Louis XV et chevalier de lOrdre de Saint-Michel. Il est acquis, en 1760, par Claude Jean Rigoley, baron dOgny, intendant général des courriers, relais et Postes de France. Le baron dOgny, député aux Etats Généraux en 1789, fut propriétaire du célèbre cabaret parisien, \"la Folie Richelieu\". Retirée à Mantes la veuve dOgny cède Millemont, en 1827, au prince de Polignac, fils de Jules de Polignac, capitaine du Régiment de Royal Dragons et de Yolande de Polastron, confidente de la reine Marie Antoinette. Arrêté en 1800 pour avoir conspiré contre Napoléon Bonaparte, il s'évade et ne reviendra en France quen 1814, avec les Ultras. Nommé 1er Ministre par Charles X en 1829, le prince de Polignac rédige à Millemont les ordonnances du 26 juillet 1830; dissolution de la chambre des députés qui provoquèrent les \"Trois Glorieuses\" en 1830, et entraînèrent la chute des Bourbons. Pendant lexil de son mari, emprisonné puis amnistié en 1836, la princesse de Polignac vend la propriété en 1843, à M. Richard, avocat daffaires parisien. Elu à 31 ans au conseil municipal de Millemont et à la chambre des députés en 1863, Maurice Richard, son deuxième fils, est nommé ministre des Beaux Arts par Napoléon III. Le poste vient dêtre créé et Maurice Richard se retrouve donc le premier titulaire de ce qui est devenu aujourdhui le ministère de la Culture. Resté fidèle à la famille impériale après la chute du Second Empire, Maurice Richard héberge le prince Napoléon, neveu de Bonaparte, à Millemont.","architecture":"MILLEMONT, est un immense domaine de 600 ha en bordure de la forêt de Rambouillet, avec un château aux salons volumineux du XVIIIe siècle, un corps de logis datant du XVIe et XVIIe siècle, et un parc de 50 hectares. Le parc, le château et les bâtiments sont classés aux monuments historiques. Le château comprend un ensemble de bâtiments assemblés entre le XVIe et le XVIIIe siècle, à la fin du règne de louis XV. Le grand château, avec son immense façade, sa rangée de porte fenêtres ouvrant sur de vastes salons, date du XVIIIe siècle. Il règie l'axe de référence du parc avec la terrasse en terre-plein. Il est flanqué par les bâtiments plus ramassés, plus trapus, du XVIIe siècle, qui se referment à leur extrémité sur une cour pavée, la cour des cochers et que domine un pigeonnier. Le parc comprend allées, terrasse en terre-plein, parterres, pelouses, bosquets, miroir d'eau, conciergerie, colombier, étang et rendez vous de chasse. Il s'étend de part et d'autre du château au sud ouest et au nord-est.\nÉléments protégés MH : les communs : inscription par arrêté du 28 avril 1947. L'ensemble du château : le petit
