const FULL={"Consult_chateau_formulaireb3a7":{"id":"Consult_chateau_formulaireb3a7","dept":"78","canton":"Rambouillet","commune":"Ablis","nom":"Ablis","type":"Château","periode":"XVIII-XIX","histoire":"quatre châteaux dans cet article, Boiteaux, Gourville, Castaigne,  Long-Orme.                                                                                                                BOITEAUX,  ancien fief dont il ne reste, de la construction d'origine, que deux tourelles et une partie des douves; logis construit en 1905 ; et agrandi en 1945. Logis reconstruit sur une cave voûtée avec toit à longs pans, demi-croupe, noue, pignon couvert et une couverture en ardoise; deux tourelles couvertes de tuiles plates avec toit en pavillon,  élévation à travées, avec  étages, sous-sol, un étage carré, étage de comble, en \ngros-oeuvre , meulière, brique, silex, ciment,  moellon sans chaîne en pierre de taille,  enduit partiel,  toit à longs pans , demi-croupe, noue, pignon couvert , toit en pavillon en ardoise.                                              CASTAIGNE, manoir reconstruit vers 1910 (logis et pigeonnier); les communs datent du XVIIIe siècle; le pigeonnier est construit au-dessus d'une ancienne citerne. Le manoir de la Castaigne est composé d'un sous-sol, d'un étage carré et étage de comble. Le gros oeuvre: meulière; moellon sans chaîne en pierre de taille et brique, élévation ordonnancée surmontée d'un toit à longs pans ; croupe et pignon couvert.                                                                                                                      LONG ORME, ancien fief dont il ne reste qu'une partie des douves et un pont à trois arches conduisant à la porte d'entrée de la cour. Le logis a  été construit au XVIIIe siècle. En élévation à travées, en étages : sous-sol, 1 étage carré, étage de comble  avec oeuvre : meulière, grès, silex, moellon, enduit , toit à longs pans, croupe, noue, pignon couvert en ardoise.","architecture":"Prunay en Yvelines a cinq  K.M. au nord   GOURVILLE,  château fortifié construit au début du XVe siècle par François de Brilhac, abbé des moines bénédictins de Saint Père de Chartres, servit de résidence abbatiale avant de devenir la propriété des évêques de Chartres. Au XVIIe siècle, construction au nord d'un pavillon coiffé d'une toiture à quatre pans, ayant peut être servi de corps de garde. L'édifice se compose de trois étages carrés, le gros-oeuvre: pierre de taille, calcaire, meulière, silex et moellon, surmonté de toit à longs pans; croupe; toit conique; toit en pavillon, recouverts d'ardoises et de tuiles plates.   Éléments protégés MH : les façades et les toitures du bâtiment principal ainsi que l'escalier à vis et les cheminées (cheminées de la salle des gardes et de la cuisine au rez-de-chaussée, cheminée de la grande salle à l'Ouest au premier étage, cheminée de la chambre à l'Est au premier étage et celle du deuxième étage ; les façades et les toitures du pavillon annexe situé au Nord ; les façades et les toitures du bâtiment situé à l'angle Sud-Est ; les restes de l'ancienne enceinte : inscription par arrêté du 7 décembre 1972.                                                                                                          LONG ORME, ancien fief dont il ne reste qu'une partie des douves.","habitants":"Gourville; François de Brilhac\"","divers":"quatre  châteaux dans cet article, Boiteaux-grav-6, Gourville grav 3-4-5, Castaigne grav 1-2,  Long-Orme_grav -7.","gps":"","images":["../../jctruffet.com/image/image_78/78_Ablis_1.jpg","../../jctruffet.com/image/image_78/78_Ablis_2.jpg","../../jctruffet.com/image/image_78/78_Ablis_3.jpg","../../jctruffet.com/image/image_78/78_Ablis_4.jpg","../../jctruffet.com/image/image_78/78_Ablis_5.jpg","../../jctruffet.com/image/image_78/78_Ablis_6.jpg","../../jctruffet.com/image/image_78/78_Ablis_7.jpg"]},"Consult_chateau_formulaire2011":{"id":"Consult_chateau_formulaire2011","dept":"78","canton":"Bonnières-sur-Seine","commune":"Arnouville les Mantes","nom":"Arnouville_Mantes","type":"Château","periode":"XV-XVII-XIX","histoire":"Trois châteaux dans cet article, Arnouville, Plessis et Goussonville.                               PLESSIS, laspect général de cette maison ne permet pas de croire quelle est antérieure au milieu du XVIe siècle. De cette période, à la fin de lancien régime, elle fait partie du patrimoine de la famille dAbos de Binanville. Cette famille sinstalle à Binanville lors de la seconde moitié du XVIe siècle et est à lorigine de la reconstruction du château qui sera détruit au XIXe siècle. Les dAbos sont peut-être responsables de la construction ou de la reconstruction du manoir qui marque le fief dArnouville. Sur le plan darpentage de 1783, on distingue la maison au fond dune vaste cour quadrangulaire. Cette maison est louée en 1792 à la famille Verrier et elle est le centre dune exploitation agricole liée au château. En outre il existe un pressoir, découvert grâce aux matrices cadastrales. Construit sur le point le plus haut du village, le manoir dArnouville semble être composé de deux bâtiments distincts. La partie nord semble la plus ancienne, le corps de logis sud pourrait être un ajout. Achat de la maison dArnouville par M. Stockman à Melle Laurent\nNaude des Moutis en 1970.                                                                                                      A cinq K.M. à l'est GOUSSONVILLE, la seigneurie de Goussonville fut la propriété des comtes de Hallot depuis le XVe siècle jusqu'en 1786, année où elle fut rachetée par le comte de Séran. Celui-ci, dépossédé de ses biens pendant la Révolution, les recouvra à la Restauration et devint par la suite maire de Goussonville en1948 : création de la société du château de Goussonville, en vue de la création d'une clinique.","architecture":"ARNOUVILLE, le château d'Arnouville, propriété de la famille de Machault  jusqu'en 1869 la  comtesse de Choiseul petite fille de J.B. de Machault a vu se succéder jusqu'en 1921 une vingtaine de propriétaires, en particulier la baronne de Rothschild. Depuis quelques années, l'ensemble du domaine appartient à l'association Entraide Universitaire qui, avec lÉducation Nationale, assure la formation d'adolescents en les préparant à des métiers horticoles. Avec leur vocation d'enseignement horticole, les deux associations, l'A.B.N.G. et l'Entraide Universitaire  ont contribué à la sauvegarde du château et d'une partie du parc. Les jardins magnifiquement entretenus et fleuris, perpétuent la conception de ce domaine voulu par J.B. de Machault, qui contribua à faire d'Arnouville au XVIIIe siècle un très joli village d'Ile-de-France, jusqu'à l'an dernier les archives du château se trouvaient chez le vicomte de la Panouse, à Thoiry. Rien d'étonnant à cela car le vicomte descend du fils de Machault qui avait épousé une héritière du château de Thoiry.  Actuellement le château s'ouvre sur le Rond-Point de la Victoire par une grille moderne de style Louis XV qui a remplacé la grille d'origine. Celle-ci, en effet, a été transférée à la fin du XIXe siècle par la famille de Rothschild qui possédait alors le château, dans une autre de ses propriétés, au Vaux de Cernay. Le portail d'origine était monumental et constituait un chef-duvre de serrurerie. Dessiné sans doute par Pierre Contant d'Ivry, il a été réalisé par un maître serrurier du pays: Jean-Baptiste Nesles. On admirait surtout le grand écusson du tympan aux armes des Machault.","habitants":"Arnouville ;  famille de Machault  et  la  famille de Rothschild                          Plessis; famille dAbos de Binanville                           Goussonville, lecomte de Séran\"","divers":"Trois châteaux dans cet article, Arnouville grav-1-2, Plessis grav 6-7 et Goussonville grav-3-4-5.","gps":"","images":["../../jctruffet.com/image/image_78/78_Arnouville_Mantes_1.jpg","../../jctruffet.com/image/image_78/78_Arnouville_Mantes_2.jpg","../../jctruffet.com/image/image_78/78_Arnouville_Mantes_3.jpg","../../jctruffet.com/image/image_78/78_Arnouville_Mantes_4.jpg","../../jctruffet.com/image/image_78/78_Arnouville_Mantes_5.jpg","../../jctruffet.com/image/image_78/78_Arnouville_Mantes_6.jpg","../../jctruffet.com/image/image_78/78_Arnouville_Mantes_7.jpg"]},"Consult_chateau_formulaire6852":{"id":"Consult_chateau_formulaire6852","dept":"78","canton":"Rambouillet","commune":"Auffargis","nom":"Auffargis","type":"Château","periode":"XVIII","histoire":"Deux châteaux dans cet article; Fontaine et Villequoy.                            FONTAINE, château construit vers 1876, d'après la matrice cadastrale, par l'architecte parisien Gustave Yver pour lui même. Le porche en façade ajouté ultérieurement. La maison de jardinier est plus ancienne, avant 1869. Le bâtiment plan symétrique se compose d'un sous-sol, de deux étages carrés et un étage de comble, gros-oeuvre : meulière, brique, calcaire, enduit, bois, pan de bois, brique et pierre en damier, brique avec pierre en remplissage. Escaliers: escalier dans-oeuvre et escalier tournant à retours avec jour. Elévation ordonnancée surmontée d'un toit à longs pans ; croupe ; pignon couvert ; toit conique; toit polygonal, recouverts d'ardoise et de tuiles plates.","architecture":"VILLEQUOY,  Auffargis appartient au domaine royal dYveline au XIe siècle. Le premier seigneur dAuffargis connu est Jean de Rouvray, en récompense de ses services, il reçoit le domaine en 1195 de Philippe Auguste. Héritages successifs, et reventes. Auffargis appartient à la famille normande dIvetot pendant cent ans environ. Le château de Villequoy construit vraisemblablement dans le 4ème quart du XIXe siècle pour Charles Corte d'après la matrice cadastrale, se dresse au sommet d'une colline. Edifice de plan symétrique, composé d'un étage carré, le gros-oeuvre en moellon; brique et brique avec pierre en remplissage, élévation ordonnancée surmontée d'un toit recouvert d'ardoise.","habitants":"Gustave Yver                            Villequoy ; Jean de Rouvray,\"","divers":"Deux châteaux dans cet article; Fontaine grav-1 et Villequoy grav_2.","gps":"","images":["../../jctruffet.com/image/image_78/78_Auffargis_1.jpg","../../jctruffet.com/image/image_78/78_Auffargis_2.jpg"]},"Consult_chateau_formulairef743":{"id":"Consult_chateau_formulairef743","dept":"78","canton":"Le Chesnay-Rocquencourt","commune":"Bailly","nom":"Bailly","type":"Château","periode":"XV-XVI","histoire":"BAILLY, château construit pour Jehan de Saint-Benoist en 1526. L'édifice sera achevé par la famille des Lignéris. Théodore des Ligneris le cède, en 1571, à Albert de Gondi futur Maréchal de Retz, lui-même, ses héritiers et ses successeurs vont poursuivre les aménagements en regroupant les propriétés. Construction d'une terrasse pour François Boulin dans la première moitié du XVIIIe siècle, et réfection des façades limite du XVIIIe  au XIXe siècle, peut-être pour Louis de Boucheman.","architecture":"BAILLY Édifice de plan symétrique composé d'un sous-sol, de deux étages carrés et d'un étage de comble, le gros-oeuvre en enduit, élévation ordonnancée surmontée d'un toit à longs pans, croupe et toit en pavillon, recouverts d'ardoises, accueille aujourd'hui un centre de rééducation.","habitants":"Famille de  Albert de Gondi \"","divers":"Chateau de Bailly","gps":"","images":["../../jctruffet.com/image/image_78/78_Bailly_1.jpg"]},"Consult_chateau_formulaire4cb2":{"id":"Consult_chateau_formulaire4cb2","dept":"78","canton":"Aubergenville","commune":"Bazemont","nom":"Bazemont","type":"Château","periode":"XVI","histoire":"BAZEMONT,  à la fin du XVIe siècle, Charles d'O fit bâtir un château dans le goût de l'époque. On peut encore admirer la salle de gardes qui fut aménagée en foyer rural en 1966. Le château subit d'importantes restaurations quand il devint en 1765 la propriété de Louis Pierre Parat de Chalandray. La dernière tour fut abattue, à sa place fut ajoutée une aile conforme à la mode du XVIIIe siècle, le dernier seigneur de Bazemont fit batir des bâtiments dont certains demeurent; les écuries et des remises, le logement du Garde et du Jardinier, une galerie aérienne à colombages reliant le château à la tribune de l'église, la ferme, propriété privée.                      BOULEMONT,Herbeville , l'origine du château est un ancien fief d'Herbeville du XVIIe siècle. Reconstruit au XVIIIe siècle, la propriété comprend château, ferme et chapelle, elle est entourée d'un parc de 37 hectares. Le baron de Lanusse, lieutenant général du roi, en est propriétaire en 1819. Les vastes jardins de Boulémont comportent entre autres un jardin potager, un bassin, un réservoir, une fontaine, une cour jardin, une remise, une serre et un pont de jardin.","architecture":"BAZEMONT,   l'abreuvoir maintenant mare et il fit aménager un parc à l'anglaise dont il reste, outre des parties du mur d'enceinte, quelques vestiges. Le château fut acheté en 1893 par la municipalité pour y installer la mairie et les écoles. hôtel de ville.  Éléments protégés MH : les façades et les toitures du château et la salle basse voûtée ; les façades et les toitures des communs ; le sol de la cour ; la fontaine pyramidale : inscription par arrêté du 19 octobre 1965.","habitants":"Famille de Louis Pierre Parat de Chalandray\"","divers":"Château de Bazemont  grav 1 à 4 et de Boulemont grav 5","gps":"","images":["../../jctruffet.com/image/image_78/78_Bazemont_1.jpg","../../jctruffet.com/image/image_78/78_Bazemont_2.jpg","../../jctruffet.com/image/image_78/78_Bazemont_3.jpg","../../jctruffet.com/image/image_78/78_Bazemont_4.jpg","../../jctruffet.com/image/image_78/78_Bazemont_5.jpg"]},"Consult_chateau_formulaire51ee":{"id":"Consult_chateau_formulaire51ee","dept":"78","canton":"Montigny-le-Bretonneux","commune":"Chapet","nom":"Bazincourt_78","type":"Château","periode":"XX","histoire":"BAZINCOURT, est surtout connu par son château du début du XXe siècle, qui a connu des destins aussi divers que variés : colonie de vacances de la  SNCF, casernement de larmée allemande pendant la guerre, puis Centre de Rééducation Fonctionnelle depuis plusieurs  années. Citons deux anecdotes. Cest à Bazincourt dit-on que Jean Rostand  commença ses recherches génétiques sur les grenouilles, le hameau étant fort bien pourvu en batraciens, un commerce y a même été créé.\nPendant la guerre, Roger Pierre, lun des comiques préférés des français, dont le duo avec Jean-Marc Thibault est encore dans lesprit de nombreux seniors, a été moniteur à la colonie de vacances de la SNCF de Bazincourt.","architecture":"BAZINCOURT de plan d'equerre avec corps de logis allongés à deux niveaux  avec série de lucarnes sur combles, deux tours rondes mi hors uvres en façade à trois niveaux  et tourelles sur angle arrière toit en poivrières en tuiles comme l'ensemble du toit.","habitants":"Famille  de  Jean Rostand et  Jean-Marc Thibault \"","divers":"Château de  Bazincourt grav-1-2","gps":"","images":["../../jctruffet.com/image/image_78/78_Bazinxcourt_78_1.jpg","../../jctruffet.com/image/image_78/78_Bazinxcourt_78_2.jpg"]},"Consult_chateau_formulaireb146":{"id":"Consult_chateau_formulaireb146","dept":"78","canton":"Bonnières-sur-Seine","commune":"Behoust_Orgerus","nom":"Behoust_ifs","type":"Château","periode":"XI-XVII-Xix","histoire":"Deux châteaux dans cet article, Behoust et Ifs  à Orgerus.                                                 BEHOUST, l'origine du château remonte au XIe siècle. Les caves voutées sont les derniers témoins de l'ancien château. En 1767, François III, marquis de Lastic, lança la construction de l'actuelle propriété qui fut achevée en 1722. Pendant cette période, les dépendances furent restaurées sur le style des petites et grandes écuries qui font faces au château de Versailles. Deux ailes furent ajoutées à la partie centrale du château en 1880. Cette propriété possède deux magnifiques écuries et un grand parc.   Éléments protégés MH : les façades et les toitures du château et des communs; l'intérieur de la chapelle et des écuries : inscription par arrêté du 12 octobre 1976.","architecture":"IFS,   est situé à la sortie dOrgerus, en 1819, le propriétaire est Antoine Hargenvillers, maire dOrgerus de 1829 à 1835. De 1841 à 1871, M de Say, Jean Marie devient le nouveau propriétaire, puis de 1871 à 1877, M de Givry Paul, qui lagrandit en 1876. De nombreux propriétaires se succèderont : de 1877 à 1884, M Ramonde Gérard, pharmacien à Paris, de 1884 à 1896 M Brossard Gustave, rentier à Paris, de 1896 à 1901, M Raymond Bruno, de 1901 à 1909, M Louis Albert-Fernand, de 1909 à 1911 M Lefèvre Georges, de 1911 à 1928, messieurs Anglard  et Hombert, gendres de M Lefèvre, et de 1928 à 1963 à Mme Rosebéry née Hirsh Elsie, remariée à M Bufnoir. De 1963 à 1995, le château appartiendra à sa fille Hélène Rosebery, qui en fera don à son décès à lassociation ATD quart monde. En 1906, Rose Raux est domestique au château et Jean-Baptiste Luguand, jardinier.   Joseph Rivière sera chauffeur dautomobiles au château après la guerre de 14/18. Antoine Hargenvilliers était commissaire aux armées durant lépoque Napoléonienne. Il était chargé du bureau de la direction de la conscription dès 1806. En 1817, il écrit sur le bien-fondé du service militaire. En 1829, il verse de l'argent à la commune dOrgerus pour quune maison école soit construite, en échange, il souhaite que deux enfants pauvres fréquentent lécole gratuitement. Il décède en 1835 à lâge de 68 ans. Il est inhumé au cimetière du Moutier.","habitants":"Ifs;  Antoine Hargenvillers\"","divers":"Deux châteaux dans cet article, Behoust grav-1-2-3 et Ifs  grav_4  à Orgerus grav-5.","gps":"","images":["../../jctruffet.com/image/image_78/78_Behoust_ifs_1.jpg","../../jctruffet.com/image/image_78/78_Behoust_ifs_2.jpg","../../jctruffet.com/image/image_78/78_Behoust_ifs_3.jpg","../../jctruffet.com/image/image_78/78_Behoust_ifs_4.jpg","../../jctruffet.com/image/image_78/78_Behoust_ifs_5.jpg"]},"Consult_chateau_formulairea3fc":{"id":"Consult_chateau_formulairea3fc","dept":"78","canton":"Plaisir","commune":"Beynes","nom":"Beynes","type":"Vestiges","periode":"XV","histoire":"BEYNES, au VIIIe siècle, le domaine de Beynes dépend de l'abbaye de Saint-Germain-des-Prés. Le château a été une garnison militaire jusqu'à la fin du XVe siècle puis est devenu résidence de plaisance. Il passa en 1553 à une favorite célèbre, Diane de Poitiers. Elle fit construire un nouveau logis pour Henri II, son royal amant. Elle fit la commande à Philibert Delorme, architecte du roi, un des plus grands créateurs de la Renaissance, auteur du château des Tuileries, du château d'Anet ou d'une partie de celui de Chenonceau. Le château figure parmi les premiers répertoriés avec une charpente dont la technique a été inventée par ce grand architecte, précurseur du principe du \"lamellé-collé\". Après avoir été entre les mains d'illustres familles, des Rochechouart au XIXe siècle puis des Harrincourt, le château est cédé en 1956 à un cultivateur de Marcq, Mr Benoist, qui le revend ensuite à une société civile immobilière. C'est grâce à lui qu'il va sortir de sa torpeur et surtout de sa destruction entamée dès le XVIIe siècle.","architecture":"BEYNES, en 1732 il avait été décidé de le démolir partiellement pour en revendre les matériaux, ce dépeçage se poursuivit dans la deuxième moitié du XVIIIe siècle, nombre de maisons de Beynes aujourd'hui sont bâties avec des pierres du château. M. Legoy, dans le cadre de la société immobilière, entame donc la première fouille des ruines et fait inscrire le château à l'Inventaire des Monuments Historiques en 1959. Cet acte majeur va permettre de récupérer le terrain constitué par les douves et de sauver le domaine. En 1967, la mairie de Beynes rachète un château à peine visible et enseveli par la végétation...\nÉléments protégés MH : l'ensemble des vestiges et des sols du château avec ses fossés, y compris les murs de la contrescarpe, tel que délimité sur le plan annexé à larrêté : classement par arrêté du 17 janvier 2014.","habitants":"Diane de Poitiers\"","divers":"Château de Beynes grav-1 à 4","gps":"","images":["../../jctruffet.com/image/image_78/78_Beynes_1.jpg","../../jctruffet.com/image/image_78/78_Beynes_2.jpg","../../jctruffet.com/image/image_78/78_Beynes_3.jpg","../../jctruffet.com/image/image_78/78_Beynes_4.jpg"]},"Consult_chateau_formulairea85b":{"id":"Consult_chateau_formulairea85b","dept":"78","canton":"Rambouillet","commune":"La Boissière_Ecole","nom":"Boissière_Ecole","type":"Château","periode":"XVIII","histoire":"La BOISSIERE, dit la boissière-école, ensemble datant du XVIIe siècle. Implantation sans changement au cours du XVIIIe siècle sauf l'aile ajoutée à l'est. De 1853 à 1857, Gustave Legras supprime la ferme et reconstruit le château en lui donnant un plan symétrique. La seule partie conservée semble être l'aile ouest, l'ancien corps de logis est rhabillé. Achat en 1879 par Olympe Hériot. Escalier de marbre par Georges Tersling probablement après 1886. Adjonction après 1886, d'après un dessin daté, de deux ailes en rez-de-chaussée. Les écuries sont détruites en 1945. La chapelle Sainte-Catherine est démolie en 1855 et le parc est transformé en parc à l'anglaise. La Boissière était au Moyen Âge un fief de la châtellenie de Saint-Léger. La Haute-Boissière et la Basse-Boissière ont appartenu à différentes familles dont les Vaultier puis les Maillard vers la fin du XVIe siècle. En 1715, Catherine de Maillard, dame de La Boissière, épouse Eustache de Malebranche, apparenté au philosophe.  En 1948, Olympe II exécute les dernières volontés de sa mère en offrant le château à lécole. En 1966, le domaine devient la propriété de l'Éducation Nationale. En 1986, il est transféré à la région Île-de-France. En 1779, Marie-Catherine de Malebranche de La Boissière (1759-1781) épouse Claude Jacques Marie Le Gras (1748-1801), seigneur de Bercagny, capitaine de dragons au régiment de Lorraine, chevalier de Saint-Lazare. À la mort de son fils unique Alexandre Claude (1781-1847), lhéritage est partagé entre ses descendants : le baron Gustave Le Gras de La Boissière (1808-1897) qui reçoit le chateau de la Boissière et son frère cadet Achille (1816-1878), qui reçoit les terres et la ferme du Tremblay, située à la Basse-Boissière et fait construire une autre maison.","architecture":"La BOISSIERE,  éléments protégés MH : la salle des Glaces : inscription par arrêté du 4 décembre 1985. Les façades et les toitures ; les pièces suivantes et éléments du rez-de-chaussée : vestibule, grand escalier, petit salon, grande salle à manger dite salle des marbres, salle des maquettes : classement par arrêté du 22 septembre 1987.","habitants":"Famille de Gustave Legras \"","divers":"Château de la Boissière-Ecole","gps":"","images":["../../jctruffet.com/image/image_78/78_Boissi%c3%a8re_Ecole_1.jpg","../../jctruffet.com/image/image_78/78_Boissi%c3%a8re_Ecole_2.jpg","../../jctruffet.com/image/image_78/78_Boissi%c3%a8re_Ecole_3.jpg","../../jctruffet.com/image/image_78/78_Boissi%c3%a8re_Ecole_4.jpg"]},"Consult_chateau_formulaire761e":{"id":"Consult_chateau_formulaire761e","dept":"78","canton":"Maurepas","commune":"Choisel","nom":"Breteuil_Choisel","type":"Château","periode":"XVI","histoire":"BRETEUIl, la seigneurie est mentionnée pour la première fois en 1142 et la première référence à un manoir remonte à 1560. Le château appartient alors à la famille Le Jay. On estime généralement que c'est dans les années 1580 que Nicolas Le Jay fait exécuter d'importants travaux qui donnent à la demeure son plan actuel. Selon d'autres historiens, ceux-ci seraient dûs à Thibault Desportes, grand audiencier de la Chancellerie de France, qui achète le domaine par adjudication en 1596. Le château ainsi construit comporte une cour carrée entièrement enserrée de murs et bordée de fossés. Sur l'avant, deux pavillons d'angle (qui existent toujours, mais ont été surélevés) et un corps de passage central commandé par un pont-levis en fond de cour sur toute la largeur, un bâtiment dont le corps central a été conservé. Le domaine passe doncle en neveux au XVIIe siècle. Ses propriétaires portent successivement le nom de Desportes, Chanteclerc, Renouard et Breteuil. En effet, en 1712, Charles Le Tonnelier de Breteuil est lhéritier du dernier des Renouard et le domaine sera transmis de père en fils jusquà lépoque actuelle. Claude Charles décède en 1735. Son fils, Claude Stanislas.  Le Tonnelier de Breteuil réalise d'importants travaux, tant à lintérieur quà lextérieur. Apparaissent alors un \"bosquet de la garenne\" et un \"bosquet chimérique\", des \"chambres de verdure\", un \"potager verger en quatre terrasses\", un \"pavillon chinois\", un \"haha\" etc. Fermé pendant la Révolution, le château est repris par Charles de Breteuil en 1802.","architecture":"BRETEUIL, les longs murs qui entourent la cour sont détruits \"un magnifique jardin anglais bien dessiné et bien planté\" selon les termes de son propriétaire, succède au parterre du XVIIIe siècle. En 1820-1830, les murs de la cour sont détruits et les fossés sont asséchés. A la fin du XIXe siècle, d'importants travaux sont à nouveau réalisés pour Henry.  Le Tonnelier de Breteuil, VIIIe marquis de Breteuil : deux ailes en retour sont ajoutées au bâtiment du fond, les pavillons antérieurs sont surélevés et les communs sont reconstruits. Le château de Breteuil retrouve des jardins à la française grâce aux paysagistes Henri Duchêne et son fils Achille. député à l'époque, Henry Le Tonnelier de Breteuil reçoit en 1881 Léon Gambetta et le futur Roi Edouard VII. De cette rencontre naît l'entente cordiale signée en 1904. Henry Le Tonnelier de Breteuil est par ailleurs l'un des modèles de Marcel Proust pour son M. de Bréauté dans \"À la recherche du temps perdu\". A partir de 1967, le château est restauré par Henri François Le Tonnelier de Breteuil et sa femme, née Séverine Decazes de Glücksbierg et ouvert à la visite du public.  Éléments protégés MH : l'intérieur du château et le parc : inscription par arrêté du 29 octobre 1961. Les façades et toitures de l'ensemble du château ainsi que les douves ; pigeonnier ; parc (jardin à la française et parc à l'anglaise : classement par arrêté du 23 juillet 1973.","habitants":"Famille Le Jay                          Charles Le Tonnelier de Breteuil \"","divers":"Château de Breteuil à Choisel","gps":"","images":["../../jctruffet.com/image/image_78/78_Breteuil_Choisel_1.jpg","../../jctruffet.com/image/image_78/78_Breteuil_Choisel_2.jpg","../../jctruffet.com/image/image_78/78_Breteuil_Choisel_3.jpg"]},"Consult_chateau_formulaire8e9e":{"id":"Consult_chateau_formulaire8e9e","dept":"78","canton":"Aubergenville","commune":"Garancières","nom":"Breuil_Couharde","type":"Château","periode":"XVI","histoire":"Deux châteaux dans cet article; Breuil et Couharde.                                                BREUIL, le château fût à l'origine, à la fin XVIe siècle, un pavillon de chasse appartenant au Prince de Léon, qui était un Rohan. Au XVIIe siècle, on fit agrandir le pavillon de chasse d'une aile. Au début du XVIIIe siècle, on l'agrandit encore en prolongeant l'aile centrale et en la terminant par la Rotonde du grand salon (lors de récents travaux de restauration, on y releva la date de 1729 derrière un des trumeaux du grand salon. Au XIXe siècle, on fît construire la quatrième et dernière partie du château, reliant l'ancien pavillon de chasse à la ferme, dans cette aile  se trouve la chapelle. Les Rohan-Chabot donnaient des fêtes somptueuses et organisaient des chasses à courre en forêt de Rambouillet. A partir de 1930, la famille de Pierre Sauberan s'installe au Breuil. En 1967, M. Gilles Sarazin, industriel et son épouse, petite nièce de Madame Sauberan et descendante d'Henri IV et Gabrielle d'Estrée par les femmes, ont le courage de reprendre le Breuil abandonné depuis près de vingt ans.   Breuil, au XVIIe siècle, on fit agrandir le pavillon de chasse d'une aile. Au début du XVIIIe siècle, on l'agrandit encore en prolongeant l'aile centrale et en la terminant par la Rotonde du grand salon (lors de récents travaux de restauration, on y releva la date de 1729 derrière un des trumeaux du grand salon). Au XIXe siècle, on fît construire la quatrième et dernière partie du château, reliant l'ancien pavillon de chasse à la ferme, dans cette aile que se trouve la chapelle.  Au coeur d'un parc arboré de dix hectares, le château du Breuil met à votre disposition son aile du XVIIIe siècle. Boiseries, tentures, trumeaux et parquets de Hongrie agrémentent le décor. Les propriétaires vous feront bénéficier de leur trente cinq années d'expérience pour que votre  jour soit l'un des plus beaux de votre vie.","architecture":"A cinq K.M. au sud à la Queue  en Yvelines COUHARDE, le château de la Couharde a été construit au XVe siècle, propriété des Bréze, il revient par héritage à Diane de Poitiers avant de passer à Madame de Miramion, qui prête le domaine aux pères des missions étrangères. Au XVIIe siècle, son oncle, le chancelier de Pontchartrain, fait réaliser de gros travaux et fait dessiner le parc par le neveu de Le Nôtre, architecte des jardins de Louis XIV. Le domaine passe de mains en mains et à la fin du XIXe siècle, M. May l'acquiait. Il décide de supprimer les douves et creuse une pièce d'eau, et modernise la Couharde. Puis la demeure, en très mauvais état, est vendue afin de réaliser un club-house de golf et le parc est transformé en parcours de golf. Dans ce cadre exceptionnel, les golfeurs disposent de deux parcours, les Chênes, 18 trous Par 72, et les Tilleuls, 9 trous Par 31, club House de golf au coeur de la forêt de Rambouillet et salles de réunion au premier étage pour journées détudes, séminaires.","habitants":"breuil; la famille de Pierre Sauberan Couharde; Diane de Poitier\"","divers":"deux châteaux dans cet article; Breuil grav-7-8 et Couharde grv -1-2-3-4 garancières-5-6","gps":"","images":["../../jctruffet.com/image/image_78/78_Breuil_Couharde_1.jpg","../../jctruffet.com/image/image_78/78_Breuil_Couharde_2.jpg","../../jctruffet.com/image/image_78/78_Breuil_Couharde_3.jpg","../../jctruffet.com/image/image_78/78_Breuil_Couharde_4.jpg","../../jctruffet.com/image/image_78/78_Breuil_Couharde_5.jpg","../../jctruffet.com/image/image_78/78_Breuil_Couharde_6.jpg","../../jctruffet.com/image/image_78/78_Breuil_Couharde_7.jpg","../../jctruffet.com/image/image_78/78_Breuil_Couharde_8.jpg"]},"Consult_chateau_formulaire4e14":{"id":"Consult_chateau_formulaire4e14","dept":"78","canton":"Limay","commune":"Brueil en Vexin","nom":"Brueil_Vexin","type":"Château","periode":"XVII","histoire":"Deux chateaux dans cet article Brueil et Chartre,                                           BRUEIL en VEXIN, est mentionné pour la première fois dans un acte de 832 de l'abbaye de Saint-Denis au sujet de redevances dues à l'abbaye. En 1145, Hugues, archevêque de Rouen, donne au prieuré de Saint-Laurent l'église et la dime de Brueil. Dans la première moitié du XIIIe siècle, le chevalier Hugues de Brueil est seigneur du lieu. Vers le milieu du XVIe siècle, la seigneurie est considérablement morcelée. De 1697 à 1790, Brueil dépend du doyenné de Magny.  Le château de Brueil, construit au XVIIe siècle, est entouré de hauts murs et de communs qui le dissimulent aux regards. La façade arrière a conservé ses proportions d'origine; elle est recouverte de plâtre sur les trois niveaux et comprend, en guise d'ornement, une petite corniche au deuxième étage. La façade Est, plus complexe, est composée d'un corps central avec deux ailes courtes en retrait et d'un pavillon à chaque extrémité.\nÉléments protégés MH : le logis seigneurial , ses communs, le pigeonnier, le mur de clôture et le dernier pavillon d'angle : inscription par arrêté du 29 mars 1994.","architecture":"CHARTRE, ce château est constitué d'un corps central flanqué de deux pavillons dissymétriques, celui du midi étant plus important que celui du nord. L'entrée d'honneur, sur la façade Est, se divise en deux portes-fenêtres accessibles par un perron en encorbellement. Le corps de bâtiment central comme le pavillon nord comportent un étage et des combles aménagés. Au cours du XIXe siècle, la façade ouest est augmentée d'un grand portique couvert en pierre et supporté par cinq gros piliers avec chapiteaux néo-classiques, le pavillon en briques, ajouté au Sud, se développe sur deux étages et une grande toiture à quatre pans. Le rez-de-chaussée est occupé par les pièces de réception. Pigeonnier en bois et beau parc.","habitants":"Seigneur de Magny\"","divers":"Deux chateaux dans cet article Brueil grav-1- et Chartre grav 2-3,","gps":"","images":["../../jctruffet.com/image/image_78/78_Brueil_Vexin_1.jpg","../../jctruffet.com/image/image_78/78_Brueil_Vexin_2.jpg","../../jctruffet.com/image/image_78/78_Brueil_Vexin_3.jpg"]},"Consult_chateau_formulaire8649":{"id":"Consult_chateau_formulaire8649","dept":"78","canton":"Rambouillet","commune":"Boinville le Gaillard","nom":"Bréau","type":"Château","periode":"XIV-XV","histoire":"BREAU;  Boinville, dénommé \"Begonis villa\" à l'époque gallo-romaine, puis \"Bouenvilla\" ou \"Boenville\" du XIe au XIIIe siècle obtint le surnom de \"Gaillard\" vers la moitié du XIVe siècle. Les fouilles effectuées au XIXe siècle y ont révélé une importante occupation romaine, par la mise au jour de fondations d'habitations, de murailles, de pièces de monnaie romaine, etc... Boinville, qui faisait autrefois partie du diocèse de Chartres, comprend les anciennes seigneuries de Bretonville, de Villeray et du Bréau-sans-Nappe. L'histoire de cette commune n'est guère connue avant le XVIe siècle. Le Villeray fut au coeur de la lutte menée par le duc de Guise contre les protestants. Son ancien manoir, d'origine médiévale, fut très remanié. Au Bréau-sans-Nappe, le château, dont les fondations remontent au Moyen-Age, date du XVIe siècle. La légende veut que le roi Henri IV ait déjeuné dans le parc sur une table de pierre, sans nappe. Après la Révolution, le château devient la propriété de la famille d'Hervey.","architecture":"BREAU, très dégradé par les ravages de la guerre de cent Ans, elle fut en partie reconstruite aux XVe et XVIe siècles. En 1891, la voûte en bois de la nef fut remplacée par une voûte en briques creuses. À coté de l'église, le presbytère servit de maison communale et d'école de 1792 à 1795, puis de 1820 à 1835. La mairie-école fut construite en 1854. construit au XVe siècle, fut occupé par le Duc de Guise pendant les guerres de religion. Le corps de logis fut fortement remanié pour le marquis d'Hervey de Saint Denis, décédé en 1891. C'est un bâtiment rectangulaire flanqué de deux tourelles rondes sur la façade antérieure et de deux pavillons carrés à l'arrière. Malgré d'assez nettes restaurations, on note le soin apporté à l'appareillage de la brique et le décor qu'elle constitue avec la pierre meulière sur le logis. L'ensemble est entouré de fossés secs. siège d'un centre d'études d'EDF actuellement.","habitants":"famille d'Hervey\"","divers":"Château de Bréau à Boinville","gps":"","images":["../../jctruffet.com/image/image_78/78_Br%c3%a9au_1.jpg","../../jctruffet.com/image/image_78/78_Br%c3%a9au_2.jpg"]},"Consult_chateau_formulaireea0f":{"id":"Consult_chateau_formulaireea0f","dept":"78","canton":"Rambouillet","commune":"Breviaires","nom":"Bréviaires","type":"Château","periode":"XVI-XVIII","histoire":"Deux châteaux dans cet article; la Mare et Brévières de  Napoléon III                                              BREVIAIRES,   divin château Napoléon III, construit sous le règne de l'empereur Napoléon III et revêtu de briques roses, il se reflète dans les eaux de son étang privé, dans la petite cité des Bréviaires connue pour son calme olympien. Entouré de 30 hectares de verdure, l'édifice de 1 100 m² est doté d'un parc à la française, d'une maison d'amis et d'une autre dédiée au gardiennage.                                                                                                          La MARE, fief de la Malmaison donné en 1223 par Amaury V comte de Montfort à labbaye de Joyenval. Ce domaine était constitué de 200 arpents de bois à essarter sis dans la forêt d'Yveline, d'une place pour construire une grange et d'une autre pour faire un étang. A la suite de cette donation, les seigneurs de la Malmaison se succèdent et cela jusqu'à la veille de la Révolution. A cette époque, le domaine appartient à un émigré, M. Galop. Puis il fut mis en vente par les domaines nationaux. M. Claude Léopold Lefort Allais, marchand demeurant à Dourdan, est le nouveau propriétaire de la ferme de la Mare. En 1832, M. Germain Bourgeois, fils du premier directeur de la bergerie nationale de Rambouillet, directeur lui même à la mort de son père en 1811 est propriétaire de la ferme de la Mare. C'est en 1895 que le château de la Mare sera propriété de M. Gaston Dreyfus, banquier à Paris. Il sera le fondateur du haras du Perray, il sassocie avec M. Antoine May.","architecture":"La MARE, à la même époque, il y avait un élevage de moutons, un troupeau de pur Oxford Down. Il y avait également un élevage de porcs, des Berkshire noirs, ainsi que des vaches laitières. Ceci permettait de produire du lait et du beurre. Quand arriva la guerre M. Antoine May (dorigine juive), maire des Bréviaires depuis 1912, voulant éviter une déportation certaine, quitta la France en Novembre 1940. Cest à cette époque que M. Nomine le remplace à la tête du haras. Aujourdhui centre équestre, le château étant toujours habité par la famille Dreyfus. Les allées plantées desservent la ferme et non plus le logis en 1830, le  château détruit et logis reconstruit au début du XXe siècle. Centre équestre.","habitants":"la mare  M. Claude Léopold Lefort Allais,\"","divers":"Deux châteaux dans cet article; la Mare et Napoléon III","gps":"","images":["../../jctruffet.com/image/image_78/78_Br%c3%a9viaires_1.jpg"]},"Consult_chateau_formulaire1d17":{"id":"Consult_chateau_formulaire1d17","dept":"78","canton":"Versailles","commune":"Buc-Versailles","nom":"Buc_Sauvegarde","type":"Chateaux","periode":"XIX-XVIII","histoire":"Deux châteaux dans cet article; Buc  et Sauvegarde.                                                                         BUC  Rattaché au bailliage royal à la fin du XVIIe siècle, et situé dans le grand parc de Versailles de l'époque, servit à Louis XIV, alors roi de France, à héberger son fils naturel le comte de Toulouse et duc de Penthièvre, Louis Alexandre de Bourbon, qu'il eut de Madame de Montespan, et à le soustraire ainsi aux yeux de la cour avant qu'il ne soit légitimé en 1681. En 1740, le château fut détruit sur ordre de Louis XV, un autre édifice fut érigé sur l'emplacement, entre 1864 et 1866. Ce nouveau château fut construit pour Léon Thomas, riche bourgeois parisien, avant d'être acheté en 1893 par Noël Bardac. Cédé en 1918 à Gentilli di Giuseppe, astronome passionné qui installera dans les jardins, en 1922, un télescope géant. En 1929, il est acquis par un couple américain, les Mac Cune. Pour honorer au mieux ses invités, Madame Mac Cune avait transformé le domaine en un véritable \"petit Versailles\" ; le parc fut aménagé avec de belles fontaines et des statues, les allées tirées au cordeau, les buis taillés et une magnifique roseraie. Endommagé pendant la deuxième guerre mondiale, les propriétaires vendirent le domaine. En 1954, l'État rachète la propriété et l'utilise comme bâtiment scolaire. La commune de Buc quant à elle, ne se l'approprie qu'en 1988 et le restaure en l'an 2000.  Les jardins du château de Buc, aménagés par Éric Pouchain dans les années 90, aujourd'hui jardin public, possèdent une colonnade d'ordre ionique ainsi qu'un ensemble sculptural de cinq uvres, dont une allégorie de l'Air, une autre du Printemps, un sphinx, un couple de panthères et une Hébé avec l'aigle de Jupiter. Ces sculptures sont des copies d'uvres d'Étienne Le Hongre et de Pierre Ier Legros. Le domaine est aussi agrémenté d'un canal.  BUC l'aqueduc érigé en 1684 pour le Roi Louis XIV afin d'alimenter les fontaines de Versailles, il amène l'eau dans les réservoirs ou les bassins de distribution de Montbauron et du parc aux cerfs.","architecture":"SAUVEGARDE, la propriété existe depuis au moins le XVIIIe siècle, on aperçoit un jardin régulier sur la carte de Delagrive. Il est devenu paysager sur la carte des chasses avec un étang et une île artificielle et une allée rectiligne bordée d'arbres, dite allée des Philosophes. Le château actuel a été construit vers 1862 pour Pierre Huguier, chirurgien en chef de l'hôpital Beaujour à Paris. Le domaine est vendu en 1875 à François Pothier. C'est lui qui reconstruit les communs en 1875-76. Le château est occupé par François Pothier et son épouse, leur fille Elisabeth, vicomtesse de Castex et son époux Bertrand de Castex. La domesticité est très nombreuse: un concierge et sa femme, un régisseur et sa femme, deux cochers, deux valets de chambre, deux cuisinières, un maître d'hôtel, deux bonnes d'enfants. En 1923, le château est acheté par Alfred Wenz, négociant en laines, et qui le revend en 1944 à l'association de Sauvegarde des Yvelines qui y abrite des enfants et adolescents en difficulté, propriété d'une association.","habitants":"Buc ; Léon Thomas             Sauvegarde: Pierre Huguier et  François Pothier,\"","divers":"Deux châteaux dans cet article; Buc  et Sauvegarde.","gps":"","images":["../../jctruffet.com/image/image_78/78_Buc_Sauvegarde_1.jpg","../../jctruffet.com/image/image_78/78_Buc_Sauvegarde_2.jpg","../../jctruffet.com/image/image_78/78_Buc_Sauvegarde_3.jpg"]},"Consult_chateau_formulaire51ab":{"id":"Consult_chateau_formulaire51ab","dept":"78","canton":"Rambouillet","commune":"Bullion","nom":"Bullion","type":"chateaux","periode":"XVI-XX","histoire":"Trois châteaux dans cet article; Guedonne, Carneaux, Ronqueux et Bonnelles .                                                                                                                GUEDONNE, construit par l'éditeur Fayard durant le quatrième quart du XIXe siècle. Une tour fut ajoutée au premier quart du XXe siècle et belvédère arasé deuxième moitié du XXe siècle. Il possède plusieurs statues en provenance du château Porges (Rochefort en Yvelines). Un portail et une porte piétonne réemployés provenant du manoir de Guette (Bullion). Parties agricoles en place en 1825, modifiées au quatrième quart du XIXe siècle, tuilerie disparue.  Le groupe Angelys va transformer la bâtisse en 12 confortables appartements allant du T2 au T5. Spécialisé dans la restauration de monuments historiques, le groupe cherchait depuis longtemps un projet en Île-de-France.                                                                                 CARNEAUX, manoir cette seigneurie est possédée dès 1482 par Jean de la Motte, écuyer. Un blason est visible dans la salle voûtée de la tour nord est. La modénature des percements indique la première moitié du XVIe siècle, traces de fortifications. Le pigeonnier peut remonter au XVIIe siècle. En 1795, le manoir des Carneaux appartient à la famille de Crussol d'Uzès. Vendu comme bien d'émigré à la Révolution, la demeure est restituée à la famille au XIXe siècle                                                                          BONNELLES,à cinq K.M.au sud -est un premier château a été construit à la fin du XVe ou au début du XVIe siècle. Adjonction d'une aile au milieu du XVIe siècle. Adjonction d'une aile perpendiculaire à la fin XVIe ou au début du XVIIe siècle. En 1764 démolition du château. En 1782, doublement du château de plan rectangulaire, démoli à la fin XVIIIe siècle. Reconstruit à côté en 1849 pour le duc Giraud d'Uzès par les architectes Froelicher et Clément Parent. Il fut un établissement scolaire de l'après guerre jusqu'en 1990. Vendu à des Japonais, il devait être transformé en golf 18 trous.","architecture":"RONQUEUX, appartenaient, au début du XIXe siècle, au vicomte Alexandre Elisabeth Michel Digeon, général de division, aide de camp de Charles X. En 1828, la propriété fut vendue à Monsieur Sauvan de Paris, comte dAramont, puis en 1867 il passe à Louis Benoist le  sergeant d'Hendecourt. En 1887, la propriété appartenait à la duchesse dUzès. A la fin du XIXe siècle, M. Jacques Lehideux acheta le domaine et fit construire en 1910, un nouveau château à proximité de lancien qui était en ruine. Le manoir de Longchêne a aussi appartenu à la famille Lehideux. Pendant la seconde guerre mondiale, le château fut occupé par les troupes allemandes. Il fut en partie détruit par un incendie en 1945. Depuis juin 2009, l'édifice et les communs abritent un lieu dédié aux séminaires, réunions et événements.                                                         BONNELLES. Malheureusement le château fut pillé par ses acheteurs et laissé à labandon. Récemment, un particulier la racheté mais depuis, son état se dégrade régulièrement sans aucune mesure préventive.","habitants":"Carneaux; Jean de la Motte                                          Ronquieux : duchesse dUzès.\"","divers":"Trois châteaux dans cet article; Guedonne grav 7, Carneaux  grav 1-2     et Ronqueux grav-3-4 et Bonelles grav 5-6-7  Bullion grav-8-9","gps":"","images":["../../jctruffet.com/image/image_78/78_Bullion_1.jpg","../../jctruffet.com/image/image_78/78_Bullion_2.jpg","../../jctruffet.com/image/image_78/78_Bullion_3.jpg","../../jctruffet.com/image/image_78/78_Bullion_4.jpg","../../jctruffet.com/image/image_78/78_Bullion_5.jpg","../../jctruffet.com/image/image_78/78_Bullion_6.jpg","../../jctruffet.com/image/image_78/78_Bullion_7.jpg","../../jctruffet.com/image/image_78/78_Bullion_8.jpg","../../jctruffet.com/image/image_78/78_Bullion_9.jpg"]},"Consult_chateau_formulaireaa5e":{"id":"Consult_chateau_formulaireaa5e","dept":"78","canton":"Rambouillet","commune":"La Celle les Bordes","nom":"Celle_les_Bordes","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article; Bordes et la Celles les Bordes.                                                           BORDES, château en place au début XVe siècle. Construit l'année de la mort de Henri IV  par Harville de Palaiseau, à été  habité jusqu'en 1933 date de sa mort par la duchesse d'Uzès, qui anima inlassablement le \" Rallye Bonnelles\"le duc de Brissac laisse visiter.                                                Agrandissements au XVIIIe siècle : plan indiquant un logis devant les granges. En 1826, la grange et le colombier sont toujours en place. En 1871, le nouveau propriétaire, Monsieur Flury, fait construire un château neuf et des écuries. Dès lors le vieux château fait office de châtelet d'entrée. L'édifice de plan régulier se compose d'un sous-sol et de deux étages carrés, le gros-oeuvre de calcaire, grès, pierre de taille, meulière, moellon et brique, élévation à travées, surmontée de toit à longs pans brisés, croupe brisée, toit à longs pans; toit conique; toit en pavillon, recouverts d'ardoises et de tuiles plates. La propriété possède un bel ouvrage d'entrée, un logement de domestiques, un colombier, des écuries et une grange aux dîmes.","architecture":"La CELLES, au hameau de La Celle, face à l'église, se dresse le château que la duchesse d'Uzès utilisait comme rendez-vous de chasse. Caractéristique de larchitecture austère du XVIIe siècle, avec ses toits en ardoises, ses murs de briques rouges et ses chaînages en grès dEpernon, ce château aurait été édifié par Claude de Harville, marquis de Palaiseau. Le château connut ses heures de gloire au XIXe siècle, lorsque, appartenant à la duchesse dUzès, il abritait toute une équipe de chasse à courre composée de soixante chiens et de chevaux. Devenant un haut lieu de vénerie le château vit ainsi défiler tous les grands de ce monde durant les jours de chasse.Éléments protégés MH : les façades et les toitures du château : inscription par arrêté du 1er août 1966.","habitants":"Bordes et la celles: duchesse d'Uzès\"","divers":"Deux châteaux dans cet article; Bordes et la Celles.","gps":"","images":["../../jctruffet.com/image/image_78/78_Celle_les_Bordes_1.jpg","../../jctruffet.com/image/image_78/78_Celle_les_Bordes_2.jpg","../../jctruffet.com/image/image_78/78_Celle_les_Bordes_3.jpg"]},"Consult_chateau_formulaire1925":{"id":"Consult_chateau_formulaire1925","dept":"78","canton":"Le Chesnay-Rocquencourt","commune":"Celles st cloud","nom":"Celles_St_Cloud","type":"Château","periode":"XVI-XVII","histoire":"Quatre châteaux dans cet articles; la Celles et  Beauregard  à Bougival,  Jonchères etvilla Viardot                                                                                                          .  CELLES, pavillon construit au XVIe siècle pour les moines de Saint-Germain-des-Prés. En 1616, le corps de bâtiment central est élevé pour Claude Sandras. De 1748 à 1750, l'architecte Jean Cailleteau, dit \"l'Assurance\" bâtit pour Madame de Pompadour l'actuel corps de logis central, transforme le pavillon de l'ouest, édifie l'aile ouest et les grandes écuries. Après 1750, il transforme le pavillon nord-est pour J. Roussel qui fait dessiner un jardin à la française Après 1776, construction d'un escalier extérieur symétrique pour le corps de logis central. Divers propriétaires se succédèrent, il fut acquis en 1844  par un industriel luxembourgeois  M. Dutreux , il y reçut  Napoléon III et l'impératrice Eugénie. M. Morel de Lyon dessine pour Parat de Chalandray un jardin anglais. Entre 1844 et 1855, une orangerie, trois serres et un manège sont bâtis pour J.P. Pescatore. Corps de logis central avec escalier extérieur symétrique et toit à longs pans ; pavillons est et ouest avec toit à longs pans brisés.  Ses descendants ont en 1951, fait don du château à l'état pour être mis à la disposition exclusive du ministre des affaires étrangères (Michel Barnier).\nÉléments protégés MH : les façades et les toitures du corps central : classement par arrêté du 14 février 1978. Les façades et les toitures des deux pavillons latéraux en retour ; les pièces du rez-de-chaussée avec leur décor : inscription par arrêté du 14 février 1978.","architecture":"BEAUREGARD, Il connut plusieurs transformations avant de tomber définitivement en ruines. Il servit de camp de prisonniers sous l'occupation allemande entre 1940 et 1944, puis de centre de regroupement pour les prisonniers soviétiques à la Libération en vue de leur rapatriement, et enfin de camp de prisonniers de l'armée française jusqu'au début des années 1950, avant d'être rasé pour vétusté à l'exception de la façade du fronton ; le domaine est désormais occupé par des logements sociaux de la ville de Paris.       JONCHERE à cinq K.M. au nord à Bougival le Le château de la jonchère fut construit avant 1723 pour Gérard Michel, trésorier du roi. En 1815 (datation par travaux historiques), trois salons constituant l'aile droite du château sont construits pour le financier Ouvrard. En 1834 (datation par travaux historiques, l'actuelle aile gauche et un corps de logis central sont bâtis pour M. Dembinski. En 1899, les éléments du château datant du XVIIIe siècle sont démolis à l'exception des sous-sol situés sous la terrasse actuelle. Le domaine comprend un parc, une orangerie, une terrasse en terre-plein, un cellier et des écuries.                                                                                VILLA-VIARDOT, est édifiée sur un terrain acheté par un parfumeur en gros parisien, Alexandre Bourdonné. Elle a ensuite été revendue à un médecin renommé, le docteur Pierre Ségalas en 1844. La villa est achetée en 1874 au deux-tiers par Ivan Tourgueniev qui en avait l'usufruit, l'autre tiers étant payé par Louis et Pauline Viardot, avec lesquels Tourgueniev entretenait respectivement une profonde et durable amitié. La propriété prend alors la dénomination \" Les Frênes \".Le site, à l'abandon depuis 2014, reçoit également des financements de la fondation Total, de la Direction régionale Des Affaires culturelles La villa est de style néo-classique, teintée de touches palladiennes.","habitants":"Celles; Claude Sandras   Jonchère; Gérard Michel,\"","divers":"Deux châteaux dans cet articles; la Celles grav-6-7 et  Beauregard grav-1-2-3-4.  villa vardot-grav-5   château d'Edmond Blanc-8                                                          Beuregard 48° 50' 27? nord, 2° 07' 27? est","gps":"","images":["../../jctruffet.com/image/image_78/78_Celles_St_Cloud_1.jpg","../../jctruffet.com/image/image_78/78_Celles_St_Cloud_2.jpg","../../jctruffet.com/image/image_78/78_Celles_St_Cloud_3.jpg","../../jctruffet.com/image/image_78/78_Celles_St_Cloud_4.jpg","../../jctruffet.com/image/image_78/78_Celles_St_Cloud_5.jpg","../../jctruffet.com/image/image_78/78_Celles_St_Cloud_6.jpg","../../jctruffet.com/image/image_78/78_Celles_St_Cloud_7.jpg","../../jctruffet.com/image/image_78/78_Celles_St_Cloud_8.html"]},"Consult_chateau_formulairef541":{"id":"Consult_chateau_formulairef541","dept":"78","canton":"Rambouillet","commune":"Cernay la Ville","nom":"Cernay_la_Ville","type":"Château","periode":"xvii-xviii","histoire":"Deux châteaux dans cet article; Cernay et Charmes.                                              CERNAY la Ville, château mentionné par Lebeuf, de plan en H, avec quelques dépendances en 1765. Douves sur le plan d'intendance datant de 1785. Ferme construite au nord dans la deuxième moitié du XVIIIe siècle, à partir d'une dépendance. Le château de Cernay fut reconstruit ou réduit à une aile avant 1819. La grille d'entrée porte la date 1767 et les initiales A.L. Les bâtiments ouest de la ferme du XVIIe siècle, détruits au milieu du XXe siècle. L'édifice de plan en H est composé d'un étage carré, le gros-oeuvre: meulière; moellon; pierre de taille; enduit; pan de bois. Type de couverture : toit à longs pans ; demi-croupe; pignon couvert et toit conique, recouverts de tuiles plates et de tuiles mécaniques. La propriété possède un parc, des douves, un colombier, une charretterie, une grange, une étable et une laiterie.","architecture":"CHARMES , Petit château construit au XVIIIe siècle avec dépendances appartenant à la marquise de Noisy à la fin du XVIIe siècle. Le corps de logis actuel est un vestige du château (partie ouest abattue au début du XXe siècle). Granges ouest datant du XVIIe siècle, bâtiment nord XVIIe siècle (bergeries à l'ouest) et XVIIIe siècle (est). Hangar élevé après 1819, à la place du jardin. L'ensemble est très remanié. L'édifice se compose d'un sous-sol, d'un étage carré et un étage de comble, le gros-oeuvre : meulière ; grès ; silex ; appareil mixte; moellon, enduit partiel. Toit à longs pans brisés, pignon couvert ; toit à longs pans ; appentis massé brisé et noue. Tuiles plates et tuiles mécaniques.","habitants":"la marquise de Noisy\"","divers":"Deux châteaux dans cet article; Cernay Grav 2-3 et Charmes grav-1","gps":"","images":["../../jctruffet.com/image/image_78/78_Cernay_la_Ville_1.jpg","../../jctruffet.com/image/image_78/78_Cernay_la_Ville_2.jpg","../../jctruffet.com/image/image_78/78_Cernay_la_Ville_3.jpg"]},"Consult_chateau_formulaire676c":{"id":"Consult_chateau_formulaire676c","dept":"78","canton":"Chatou","commune":"Chatou","nom":"Chatou_Croissy","type":"Château","periode":"XVII","histoire":"Trois châteaux dans cet article; Chatou, Faisanderie et Piece-d'Eau.                                                                                                                    CHATOU. demeure construite pour Bertin contrôleur général des finances de louis XV, vers 1730 sur lemplacement dun bâtiment beaucoup plus ancien. En 1761, le château appartient au comte d'Arginy. En 1829, la propriété est acquise par Camille Joseph Perier. Vers 1830, décor intérieur, peintures, exécuté par le peintre J. Bérot. En 1878, l'édifice est vendu à la Société Immobilière Civile. Lotissement du parc et installation de la mairie. En 1879 mise en place d'un campanile. L'édifice de plan symétrique se compose d'un sous sol, d'un étage carré et d'un étage de comble, le gros-oeuvre : pierre de taille; moellon et enduit. Elévation ordonnancée surmonté de toit à longs pans ; croupe et noue, recouverts d'ardoises. La propriété comprend également un jardin, une orangerie, une chapelle, un parc et une glacière. A été la propriété de monsieur Lainé, aujourd'hui hôtel de ville.                                                                                                                 FAISANDERIE  En 1776, le comte d'Artois reçoit la forêt du Vésinet en apanage. En 1782, il y installe une faisanderie. Il fait construire en 1783 un pavillon dit \"Pavillon d'Artois\" puis \"de La Faisanderie\", complété par deux pavillons pour le gardien et le jardinier sur les plans de François Joseph Bélanger. Destruction en 1862 du Pavillon d'Artois pour la construction d'une demeure pour la famille Husson par l'architecte Bourlier. Réduction du parc pour des lotissements en 1858. Vente en 1926 des deux pavillons dénaturés par l'installation de commerces.\nÉléments protégés MH : les façades et les toitures des pavillons d'entrée : inscription par arrêté du 29 juillet 1977.","architecture":"PIECE D'EAU ou villa lambert   En 1873, Louis-Etienne Lambert acquiert le parc de la pièce deau lors du morcellement, par la famille Lacroix, de lancien domaine du seigneur de Bertin. Projet de construction en 1883 par l'architecte Alfred Gaultier, le projet est modifié lors de la construction en 1884, le plan général est conservé, mais les deux pavillons latéraux sont supprimés. Au XXe siècle, modification du couronnement des lucarnes avec création d'un deuxième étage de combles et disparition du belvédère. La pièce d'eau du château complète l'ambiance romantique de ce lieu d'exception, régulièrement loué pour des reconstitutions historiques. Le 25 août 1944, les allemands y fusillèrent 27 jeunes résistants de la ville, victimes du zèle abject de quelques dénonciateurs. Le bâtiment, de plan symétrique, est composé d'un étage de soubassement, de deux étages carrés et d'un étage de comble. Le gros-oeuvre de pierre avec brique en remplissage ; calcaire et pierre de taille, élévation ordonnancée surmontée de toit en pavillon ; toit à longs pans ; croupe ; toit conique, recouverts d'ardoises.","habitants":"Chatou : Famille du  comte d'Arginy.                                   Faisanderie : le comte d'Artois famille Husson\"","divers":"Quatre châteaux dans cet article; Chatou grav-1,Croissy grav 2-3-Faisanderie-grav 4-5 et Piece-d'Eau_6_7-8","gps":"","images":["../../jctruffet.com/image/image_78/78_Chatou_Croissy_1.jpg","../../jctruffet.com/image/image_78/78_Chatou_Croissy_2.jpg","../../jctruffet.com/image/image_78/78_Chatou_Croissy_3.jpg","../../jctruffet.com/image/image_78/78_Chatou_Croissy_4.jpg","../../jctruffet.com/image/image_78/78_Chatou_Croissy_5.jpg","../../jctruffet.com/image/image_78/78_Chatou_Croissy_6.jpg","../../jctruffet.com/image/image_78/78_Chatou_Croissy_7.jpg","../../jctruffet.com/image/image_78/78_Chatou_Croissy_8.jpg"]},"Consult_chateau_formulaire69c6":{"id":"Consult_chateau_formulaire69c6","dept":"78","canton":"Maurepas","commune":"Châteaufort","nom":"Châteaufort","type":"Château","periode":"XVI-XIX-XX","histoire":"Deux châteaux dans cet article ; Gavoy, Ocre et Geneste.                                                GAVOY, deux bâtiments parallèles sont figurés en 1740. Le château est mentionné en 1770, il est détruit après 1809, puis reconstruit ainsi que la maison du gardien.  Vers 1910, adjonction de la terrasse et du pavillon. L'édifice se compose d'un sous-sol, un étage carré et un étage de comble. En calcaire; pierre de taille, brique ; pierre avec brique en remplissage , meulière , moellon. Elévation ordonnancée surmontée de toit à longs pans, toit à longs pans brisés; croupe, noue, pignon couvert , toit en pavillon recouverts d'ardoises, de tuiles mécaniques et de zinc en couverture.                                                                                                                     OCRE; Sucret, une seigneurie est attestée en 1354. Un château est bâti en 1637 par Jean de Luynes. On voit le château et le moulin sur une carte de 1694. Avant 1809, construction d'un nouveau château dont on voit l'emplacement sur le cadastre napoléonien. Il est détruit en 1951. Les communs ont conservé la même implantation mais ont été transformés au XIXe siècle. Le portail de la chapelle de Gif a été remonté sur la façade de la chapelle en 1817, il comporte un fronton cintré brisé avec volutes supérieures rentrantes reliées par une guirlande et surmontées de deux pots à feu et d'une statue de la Vierge. Le moulin appartient au parc naturel régional de la vallée de Chevreuse et est en cours de réhabilitation. Le pont de jardin (pont-galerie) subsiste à l'état de ruine, détruit en 1951, reste le moulin et les communs.","architecture":"GENESTE, en 1339, la propriété était entre les mains dun bourgeois parisien qui serait le 1er propriétaire. Fief mentionné en 1554, il comporte un moulin à eau et un colombier. Reconstruction du château en 1614 avec les matériaux du donjon de Marly. En 1786, un acte de vente signale un château nouvellement reconstruit avec une étable à vache, des écuries, une grange, une bergerie, un poulailler, un toit à porcs et un jardin ainsi que le fief de la Haye-Dieu. Un nouvei édifice est construit en 1857 par Eugène Petit, les communs sont remaniés et l'ancien château détruit. Actuellement cest un domaine privé, où lon peut apercevoir de la rue, une tour intéressante. Les candidats de la 9ème promotion de la télé-réalité musicale \"Star Academy de NRJ 12\" vont s'installer au château, cette propriété privée n'a pas été choisie au hasard. Ce château entouré de murs de trois mètres de haut est très difficile d'accès et seul un chemin perdu au milieu d'une forêt y conduit. De quoi garantir la tranquillité des candidats. Au rez de chaussée aura lieu le salon lieu de vie de 55 m², meublé et décoré entre flashy et vintage. Attenantes, deux petites pièces accueilleront également des cours denseignement artistique. Au premier et deuxième il y aura des lieux de vie pour les élèves et leurs professeurs, avec un dortoir pour les filles et un autres pour les garçons, abrite les candidats de l'émission phare de TF1 \"Star Academy\".","habitants":"Ocre; Famille Jean de Luynes\"","divers":"Deux châteaux dans cet article ; Gavois grav-1 et Geneste grav 2-3 chateaufort grav -4.","gps":"","images":["../../jctruffet.com/image/image_78/78_Ch%c3%a2teaufort_1.jpg","../../jctruffet.com/image/image_78/78_Ch%c3%a2teaufort_2.jpg","../../jctruffet.com/image/image_78/78_Ch%c3%a2teaufort_3.jpg","../../jctruffet.com/image/image_78/78_Ch%c3%a2teaufort_4.jpg"]},"Consult_chateau_formulairec861":{"id":"Consult_chateau_formulairec861","dept":"78","canton":"Rambouillet","commune":"Clairefontaine en Yvelines","nom":"Clairefontaine_Yvelines","type":"Château","periode":"XVII-XVIII","histoire":"Trois châteaux dans cet article ; Bénécdictines, la Voisine et Montjoie. BENECDICTINES, Robert III évêque de Chartres fonde en 1160 une abbaye de bénédictines dépendante de Fleury et relevant du diocèse de Chartres. En 1174, les religieuses sont transférées à l'abbaye de Louye (Essonne). L'abbaye est supprimée en 1793. Vers 1830, un château, de plan régulier avec parc, est construit à proximité. Élévation ordonnancée, étage de soubassement; un étage carré; étage de comble, escalier de distribution extérieur; escalier droit; en maçonnerie;  et en équerre; en maçonnerie   en calcaire; pierre de taille; brique; meulière; pierre de taille toit à longs pans brisés; croupe brisée en ardoise.                                                                                                       LA VOISINE,  éxistence du prieuré Saint-Germain des Ajiots fondé au XIVe siècle, attesté encore au XVIIIe siècle. Porte du XIVe siècle remployée dans la première moitié du XIXe siècle. Au XVIIe siècle, un fief avec maison dépend en partie de l'abbaye de Clairefontaine et en partie du seigneur de Bullion. Le château actuel a été reconstruit après 1828 en partie sur des vestiges anciens. Les chapiteaux pourraient provenir de Port-Royal-des-Champs. Depuis 1954 la propriété appartient au groupe Pernod Ricard (170 ha) qui sert à la fois de centre de vacances pour le personnel et de lieu de séminaires pour les cadres. Le parc est classé monument historique notamment grâce à son orangerie, sa pièce d'eau et sa conciergerie. propriété du groupe Pernod Ricard depuis 1954.","architecture":"MONTJOIE, le château de Montjoye est une construction du XVIIe siècle, restauré au XIXe. Portail de l'église abbatiale de Clairefontaine remonté dans le parc en 1914. Pendant la première guerre mondiale il servit à héberger les blessés. Propriété achetée par la fédération Française de Football en 1985. L'édifice se compose d'un étage de soubassement et d'un étage carré. Types escaliers droit; escalier de distribution extérieur; en maçonnerie. Gros-oeuvre : meulière; calcaire; brique et pan de bois. Type de couverture: toit à longs pans brisés ; toit à longs pans ; demi-croupe ; toit conique, recouverts de tuiles plates. La propriété comprend également une serre, une chapelle et un château d'eau.Centre Technique National Fernand Sastre.","habitants":"seigneur de Bullion\"","divers":"Trois châteaux dans cet article ; Bénécdictines grav 6, la Voisine grav 1-2-3 et Montjoie grav -4-5.","gps":"","images":["../../jctruffet.com/image/image_78/78_Clairefontaine_Yvelines_1.jpg","../../jctruffet.com/image/image_78/78_Clairefontaine_Yvelines_2.jpg","../../jctruffet.com/image/image_78/78_Clairefontaine_Yvelines_3.jpg","../../jctruffet.com/image/image_78/78_Clairefontaine_Yvelines_4.jpg","../../jctruffet.com/image/image_78/78_Clairefontaine_Yvelines_5.jpg","../../jctruffet.com/image/image_78/78_Clairefontaine_Yvelines_6.jpg"]},"Consult_chateau_formulaire3fa4":{"id":"Consult_chateau_formulaire3fa4","dept":"78","canton":"Plaisir","commune":"Clayes sous Bois","nom":"Clayes_sous_Bois","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux dans cet article; Clayes sous Bois et Plaisir.                            CLAYES SOUS BOIS, le château des Clayes, ancien château fort, a été démoli au XIVe siècle lors des révoltes paysannes, appelées les jacqueries, et fut ensuite reconstruit. Au XVe siècle, il fut la propriété de Guillaume Poyet, président du parlement de Paris. Rattaché un temps au Domaine Royal, il devint au XVIe siècle la résidence de la favorite dHenri II, Diane de Poitiers puis du futur Henri III (1551-1589). Abritant une kommandantur allemande durant la seconde guerre mondiale, il a été en partie détruit en 1944. Il nen subsiste que les communs et deux tours rondes. Aujourdhui des expositions et des rencontres culturelles sont organisées dans ses salles du château, la bibliothèque municipale occupe également les lieux.","architecture":"A cinq K.M. à l'est le château de PLAISIR, le château vient d'une demeure possédée par la châtelaine de Neauphle au XVe siècle qui se tranforme durant le XVIe et XVIIe siècle pour devenir un château. Ce château est construit pour le conseiller et médecin de Louis XIII, Louis Le Tellier. En 1939, le dernier propriétaire rénove le parc et les lieux. Les volets à panneaux de chêne et des cheminées attestent d'un style Louis XIII, alors que les ailes basses, elles datent du XVIIIe siècle. Situé dans un parc de cinquante hectares, le bâtiment principal est composé d'un corps central cantonné de deux pavillons en décrochement et comprend deux étages surmontés de combles mansardés. Il est flanqué de deux ailes basses ajoutées au XVIIIe siècle.  Éléments protégés MH: le château; les façades et les toitures des communs; le parc: classement par arrêté du 25 août 1961.","habitants":"Clayes ;famille de  Guillaume Poyet                                                    Plaisir; famille de Louis Le Tellier\"","divers":"Deux châteaux dans cet article; Clayes sous Bois grav 3 et Plaisir 1-2.","gps":"","images":["../../jctruffet.com/image/image_78/78_Clayes_sous_Bois_1.jpg","../../jctruffet.com/image/image_78/78_Clayes_sous_Bois_2.jpg","../../jctruffet.com/image/image_78/78_Clayes_sous_Bois_3.jpg"]},"Consult_chateau_formulaire2113":{"id":"Consult_chateau_formulaire2113","dept":"78","canton":"Conflans-Sainte-Honorine","commune":"Conflans Ste -Honorine","nom":"Conflans_Ste_Honorine","type":"Château","periode":"XVIII","histoire":"PRIEURE, en 1808, l'ancien prieuré Sainte Honorine est acheté par la famille Lhéritier de Chézelles, d'abord par Frédéric puis par son frère Samuel en 1816. C'est ce dernier qui fit détruire les ailes du bâtiment. Le bâtiment principal a été redistribué entièrement et un jardin \"à l'anglaise\" aménagé. Après avoir eu plusieurs propriétaires entre 1829 et 1838, la propriété est achetée par Marguerite Fardel qui réalise des aménagements hydrauliques. En 1850 elle la revend à Joséphine Marcal veuve de Joseph Marin Batard  Gévelot, cette dernière fait construire l'aile la plus septentrionale en 1856. En 1868, son fils Jules Gévelot en hérite, il effectue de nombreux travaux, achat du Clos de Rome avec construction d'un passage sous la rue aux Moines pour rejoindre la Seine, construction de la cascade, de la seconde serre, du colombier. Le château est considérablement remanié: construction du jardin d'hiver entre les deux ailes, habillement des façades ouest et sud dans un style néo-renaissance et néo-gothique. En 1872, agrandissement du château vers le nord par adjonction du porche et en 1875 de l'aile nord. L'architecte chargé des travaux et de la décoration intérieure est Jean Alexandre Laplanche, un ami de la famille. A la mort de Jules Gévelot en 1904, sa veuve, Emma hérita du domaine qu'elle conserva jusqu'à sa mort en 1927. Ses héritiers le revendirent à la ville de Conflans en 1931. Des services municipaux y sont installés et en 1966 y est ouvert le musée de la batellerie. Le prieuré est en site classé depuis le 1er mars 1944.","architecture":"PRIEURE, la demeure aménagée par les Lhéritier comportait un étage de soubassement avec, côté place, des cuisines, une laiterie et d'autres pièces de service. Le rez-de-chaussée surélevé avait à peu près la même distribution que les bâtiments actuels qui abritent les services culturels de la mairie. L'escalier était au même endroit. A l'étage, se trouvait une pièce puis le grenier dont la charpente était apparente. Deux pièces étaient aménagées par des cloisons légères. Les travaux effectués par les Gévelot ont consisté tout d'abord à transformer le bâtiment dont la façade ouest a été habillée de brique et pierre, tandis qu'une façade à pignon découvert était ajoutée au sud.  A partir de 1872, le château est agrandi au nord en pierre de taille. L'édifice ne comporte qu'un étage sauf l'extrémité de l'aile en retour sur la cour d'entrée qui comporte deux étages carrés. Deux petits dômes à lanternon se trouvent au dessus des tourelles qui jouxtent le pignon découvert. La charpente a pu être datée du début du XVIIe siècle grâce à la dendrochronologie. Sur la façade néo-gothique choux frisés, personnages fantastiques soutenant un balcon à la manière d'une gargouille. Sur la façade néo-renaissance pilastres à chapiteaux ioniques. Les mufles de lion surmontent les pilastres des tourelles de la façade sud. Deux portraits en médaillons de Jules et Emma Gevelot sur la façade Est, musée de la batellerie.","habitants":"Famille Lhéritier de Chézelles\"","divers":"Deux châteaux dans cet article le prieuré musée gravi-1-2 la tour Montjoie grav 3","gps":"","images":["../../jctruffet.com/image/image_78/78_Conflans_Ste_Honorine_1.jpg","../../jctruffet.com/image/image_78/78_Conflans_Ste_Honorine_2.jpg","../../jctruffet.com/image/image_78/78_Conflans_Ste_Honorine_3.jpg"]},"Consult_chateau_formulaireadc9":{"id":"Consult_chateau_formulaireadc9","dept":"78","canton":"Maurepas","commune":"Senlisse -St-forget","nom":"Cour_Senlisse","type":"Château","periode":"XV-XVI","histoire":"Trois châteaux dans cet article Cour-Senlisse , Cour-Levis et Malvoisine.                             COUR SENLISSE, on trouve mention à cet emplacement d'un hôtel dès 1399. Construction du château à la fin du XVIe siècle, dessiné par Chastillon et partiellement en place à cette époque. Tours dont une au nord est du XVe siècle. Mais logis modifié (tour d'escalier XVe siècle disparue) et agrandi. Corps de bâtiments latéraux refaits au XVIIe siècle. Façade sur jardin du XVIIIe siècle. Site classé en 1980. A travers les siècles, le château de la Cour Senlisse a conservé son plan caractéristique hérité du moyen âge : un quadrilatère du 45 mètres de côté ceint de douves et cantonné de quatre tours. La plus importante de ces tours est aussi la plus ancienne et peut dater du milieu du XVe siècle. Le château appartient en 1602 à Balthazar de Gouyn puis il est acquis par Claude de Lorraine en 1651. De 1739 à 1985, il est la propriété de la famille de Luynes. Site classé en 1980.\nÉléments protégés MH : les façades et les toitures du château et les deux tours isolées, et les vestiges des douves : inscription par arrêté du 30 juin 1977.","architecture":"Dans la même zone COUR LEVIS  château antérieur (limite XVIIIe siècle XIXe siècle) détruit ; les communs construit dans la deuxième moitié du XVIIe siècle, sont peut-être des vestiges de la ferme mentionnée sur la carte des chasses en 1765 ; château actuel en brique et calcaire édifié à la fin du quatrième quart du XIXe siècle ; une partie du commun à l'est, transformé en chapelle au début du XXe siècle, site classé en 1980. L'édifice, de plan symétrique, se compose d'un sous-sol, d'un étage de soubassement  et d'un étage carré. Le gros-oeuvre : calcaire ; meulière ; pierre avec brique en remplissage; brique ; moellon et enduit. Elévation ordonnancée surmontée de toit à longs pans brisés ; croupe ; pignon couvert; toit à longs pans, recouverts d'ardoises et de tuiles plates.                             MALVOISINE, en 1235 existence attestée d'un manoir ; reconstruit dans le quatrième quart du XVe siècle; travaux aux fossés et aux murailles en 1652 par Pierre Perrot et devis pour un pont-levis; en 1786  colombier isolé et logis en équerre actuellement détruit; les bâtiments d'exploitation ont été modifiés en 1844; existence possible d'un chemin de ronde sur deux côtés; le logis actuel fut construit à la fin du XIXe siècle.","habitants":"Savinien de Cyrano\"","divers":"Trois châteaux dans cet article cour-Senlisse grav de 1 à 5 et Malvoisine  grav-6","gps":"","images":["../../jctruffet.com/image/image_78/78_Cour_Senlisse_1.jpg","../../jctruffet.com/image/image_78/78_Cour_Senlisse_2.jpg","../../jctruffet.com/image/image_78/78_Cour_Senlisse_3.jpg","../../jctruffet.com/image/image_78/78_Cour_Senlisse_4.jpg","../../jctruffet.com/image/image_78/78_Cour_Senlisse_5.jpg","../../jctruffet.com/image/image_78/78_Cour_Senlisse_6.jpg"]},"Consult_chateau_formulaire19b4":{"id":"Consult_chateau_formulaire19b4","dept":"78","canton":"Chatou","commune":"Croissy sur Seine","nom":"Croissy_sur_Seine","type":"Château","periode":"XVIII","histoire":"CROISSY SUR SEINE,   le corps de bâtiment principal a été construit au milieu du XVIIIe siècle pour le seigneur de Croissy, Paul Gautier de Beauvais, à lemplacement du manoir médiéval,  et mairie été la maison de madame Campan, Barras y séjourna ainsi, que Josephine de Beauharnais. Situé à Croissy, le parc Chanorier est baigné dans un cadre idéal, proche des berges de la  Seine. Ces mêmes lieux ont d'ailleurs été source d'inspiration pour les peintres Impressionnistes qui ont marqué l'histoire.  En 1779, il devient la propriété de Jean Chanorier, dernier seigneur de Croissy. En 1781, Jean Chanorier, seigneur de Croissy, premier maire, acquiert le château et c'est pourquoi son nom y est resté attaché. En 1881, la famille Auguste-Dormeuil en fait l'acquisition et y demeure jusqu'en 1937, la Commune, prononce alors l'expropriation dans le but d'installer dans le château une école primaire jusqu'en 1992,  passa au début du XIXe siècle à Jean-Louis Lapeyrière, receveur général de la Seine, père d'Augustin Lapeyrière et beau-père du maréchal Bessières. La famille Girod de l'Ain y réside en 1824, puis en 1845 le comte Jacques Charles Duval d'Eprémesnil. La famille Auguste-Dormeuil l'acquiert en 1881.  propriété de la commune de Croissy sur Seine.","architecture":"CROISSY SUR SEINE, Remaniement du château dans la première moitié du XVIIIe siècle pour Georges Gougenot de Croissy. Le château accueille des expositions et la bibliothèque municipale. La façade sur cour présente un balcon de belle facture à garde corps en fer forgé et soutenu aux extrémités par deux têtes de lion et deux consoles à leffigie dHercule. Les corps de logis sont maintenant occupés par les services techniques municipaux et les salles de réception au rez-de-chaussée accueillent expositions et manifestations culturelles.  Éléments protégés MH : les façades et les toitures ; la salle du rez-de-chaussée avec son plafond et sa corniche d'origine: inscription par arrêté du 18 juillet 1975.","habitants":"Famille de Georges Gougenot de Croissy, et de  Jean Chanorier\"","divers":"Château de Croissy sur seine","gps":"","images":["../../jctruffet.com/image/image_78/78_Croissy_sur_Seine_1.jpg","../../jctruffet.com/image/image_78/78_Croissy_sur_Seine_2.jpg"]},"Consult_chateau_formulairea802":{"id":"Consult_chateau_formulairea802","dept":"78","canton":"Maurepas","commune":"Dampierre","nom":"Dampierre_78","type":"Château","periode":"XVII","histoire":"DAMPIERRE,   la construction (1180-1351) est attribuée à larchitecte Jean Duval. Il fût embelli par Charles de Lorraine, cardinal archevêque de Reims. Vers 1670, lancien château ayant été rasé, Honoré dAlbert de Luynes Duc de Chevreuse, Ministre détat et gendre de Colbert (dont les initiales sont gravées sur les deux frontons du château) fit construire lactuel château sur les plans de Jules Hardouin Mansart. Du château que lui avait cédé sa grand-mère, Marie de Rohan duchesse de Chevreuse, restent les fondations et des dépendances. La seigneurie de Dampierre et le duché de Chevreuse appartinrent à Henri de Guise, dit le balafré, puis à son fils Claude de Lorraine qui mourut en 1657. Marie de Rohan, sa veuve le transmit en 1663 au duc de Luynes, fils de son premier mariage avec le connétable. Depuis lors le château est propriété des ducs de Luynes. Plusieurs souverains, en particulier les Rois Louis XIV, Louis XV et les reines de France Anne dAutriche, Marie Leczinska (lappartement personnel y est toujours conservé) ont habité le château. Au XIXe siècle, la grande galerie du premier étage fut enrichie sous la direction de Félix Duban et du duc de Luynes.  A chaque génération, les descendants semploient à conserver et à transmettre ce patrimoine. Charles de Guise, cardinal de Lorraine, l'achète et y fait de nombreux embellissements. En 1574, à sa mort, son neveu Henri hérite du château. Après lassassinat dHenri de Guise, son fils cadet, Claude de Lorraine, duc de Chevreuse en hérita. Il épousa en 1622 Marie de Rohan, veuve du connétable de Luynes. En 1655, le duc de Chevreuse donne Dampierre à son épouse, laquelle, en 1663, en fait donation à son fils le duc de Luynes. Site classé en 1980.","architecture":"DAMPIERRE, depuis 1663, Dampierre a toujours appartenu aux Luynes. Le petit-fils de Marie de Rohan, troisième Duc de Luynes, fit raser le château jusquau rez-de-chaussée en 1675. Il construisit alors le château actuel sur les plans de Jules Hardouin Mansart et de André Le Nôtre pour le parc. Aux XVIIe et XVIIIe siècles, les rois Louis XIV, Louis XV, Louis XVI viennent à Dampierre. La reine Marie Leczinska y fait de fréquents séjours et occupe l'appartement situé à droite du salon. En 1789, durant la Révolution, le duc de Luynes et sa famille n'émigrent pas et restent à Dampierre. Ils sont arrêtés et emprisonnés, le château et leur enfants sont protégés par les villageois. Ils sont finalement libérés. Le duc Honoré de Luynes sav
