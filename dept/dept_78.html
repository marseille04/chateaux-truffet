 et grand château: classement par arrêté du 25 janvier 1965.","habitants":"Famille dAntoine Rousseau,\"","divers":"Châteaux de Millemont","gps":"","images":["../../jctruffet.com/image/image_78/78_Millemont_1.jpg","../../jctruffet.com/image/image_78/78_Millemont_2.jpg","../../jctruffet.com/image/image_78/78_Millemont_3.jpg","../../jctruffet.com/image/image_78/78_Millemont_4.jpg"]},"Consult_chateau_formulaire30ab":{"id":"Consult_chateau_formulaire30ab","dept":"78","canton":"Maurepas","commune":"Milon la_chapelle","nom":"Milon_la_Chapelle","type":"Château","periode":"XVIII-XIX","histoire":"Deux châteaux dans cet article ; Abzac et Vert-Coeur.                                         ABZAC   Collage d'un corps de sept travées, dans le premier quart du XVIIIe siècle, en prolongement d'une aile à l'est, plus ancienne. Aile composée d'un corps de deux travées cantonné d'un pavillon datant probablement de la première moitié du XVIIe siècle ; de 1765 à 1819 même implantation, puis espace non bâti entre le château et les communs; appuis de fenêtre datant du début du XVIIIe siècle. L'édifice de plan symétrique, est composé d'un sous-sol, d'un étage carré et d'un étage de comble. Le gros oeuvre en moellon, meulière et pan de bois, élévation ordonnancée surmontée d'un toit à longs pans et croupe, recouverts de tuiles plates et d'ardoises. Château  édifié au début du XVIIe siècle pour la famille Besset, seigneurs de Milon. Il est vendu en 1764 au baron de Kalb, officier qui participe à la guerre d'indépendance aux côtés de la Fayette, puis passe par mariage à son gendre, le comte Raymond d'Abzac, maire du village pendant de nombreuses années. Ancien écuyer de Charles X, le comte installe un haras après la Révolution.","architecture":"VERT-COEUR  Construit pour René Philippon, ce château est caractéristique des constructions bourgeoises de la fin du XIXe siècle. René Philippon est spécialiste des sciences occultes, collectionneur, entomologiste et mécène. Son château est le rendez-vous du tout-Paris pendant une quinzaine d'années, et constitue alors le lieu le plus en vue de la vallée de Chevreuse. L'édifice, de plan symétrique, se compose d'un sous-sol, d'un étage carré et d'un étage de comble, gros-oeuvre en brique, meulière et brique avec pierre en remplissage, élévation ordonnancée surmontée d'un toit à longs pans brisés et croupe, couverts d'ardoises. Fondation Anne de Gaulle, établissement d'accueil pour jeunes filles handicapées mentales.","habitants":"Abzac;  famille Besset vert-cur ;  René Philippon\"","divers":"Deux châteaux dans cet article ; Abzac grav-1-2  et Vert-Cur grav-3.","gps":"","images":["../../jctruffet.com/image/image_78/78_Milon_la_Chapelle_1.jpg","../../jctruffet.com/image/image_78/78_Milon_la_Chapelle_2.jpg","../../jctruffet.com/image/image_78/78_Milon_la_Chapelle_3.jpg"]},"Consult_chateau_formulaire72ed":{"id":"Consult_chateau_formulaire72ed","dept":"78","canton":"Aubergenville","commune":"Montfort -Lamaury","nom":"Montfort_Lamaury","type":"Château-Vestiges","periode":"XII-XVIII","histoire":"quatre châteaux dans cet article ; Bluche, Groussay, Mormaire, et  Montfort.                                                                                                                          GROUSSAY,  a été construit en 1815 pour la Duchesse de Charost, la fille de Madame de Tourzel, gouvernante des enfants du Roi Louis XVI et de Marie-Antoinette. Racheté en 1938 par Charles de Beistegui, esthète inspiré, Groussay s'agrandit en 1952 de deux ailes dont l'une conduit au théâtre et de fabriques conçues avec la complicité d'artistes; Emilio Terry et Alexandre Serebriakoff et des architectes Desbrosses et Costi. La création de \"fabriques\" et la transformation du château se sont poursuivies jusqu'à la mort de Charles de Beistegui en 1970. L'ensemble est classé monument historique depuis 1993. Depuis 2001, Jean Louis Remilleux son nouveau propriétaire le restaure et a décidé de l'ouvrir au public. Le parc du château, de 30 hectares, est un véritable voyage à travers le monde, on y découvre de nombreuses fabriques ou \"folies\" très originales que Charles de Beistegui, accompagné par ses fidèles artistes Emilio Terry et Alexandre Serebriakoff, a construit de 1950 à 1970. La tente tartare, la pagode chinoise, le théâtre de verdure, pour ne citer qu'elles. Au delà des fabriques, le parc possède d'autres atouts indéniables. Le jardin d'agrément précédant le temple du labyrinthe est un de ceux là et le beau théâtre fait également partie de la visite libre du parc.  Éléments protégés MH : le château avec ses décors intérieurs ; le parc l'accompagnant avec toutes ses fabriques : classement par arrêté du 27 septembre 1993. Les vestiges de l'ancien château.","architecture":"BLUCHE, pavillon de chasse  du XVIIIe siècle, aménagé avec beaucoup de goût pour les acteurs Georges Marchal  et Dany Robin.   A cinq K.M. au nord ouest à Grosouvre   MORMAIRE,  actuellement propriété de l'homme daffaire François Pinault, grand amateur dart, comme en témoignent les oeuvres quon aperçoit dans le parc de la propriété. Ce château a été bâti au début du XVIIe siècle est l'oeuvre d'un secrétaire du roi Laurent Regnard au XVIIIe siècle le secrétaire de l'Académie des sciences Grandjean de Fouchy ensuite à monsieur Gordon Turner. Dans le fossé qui longe la clôture, on remarque des bornes armoriées. Le parc de la Mormaire est composé d'une belle allée, une terrasse en terre-plein, une île artificielle, une pergola, un jardin potager, une fausse rivière, un bassin, un pavillon de jardin et une orangerie.  Éléments protégés MH : les façades et les toitures du château ; les dépendances (non compris la ferme); le parc clos de murs : inscription par arrêté du 17 décembre 1990.                                                                                                                                         MONTFORT L'AMAURY, vestiges du château de Montfort les ruines du château médiéval des comtes de Montfort,  construit au XIIe siècle, détruit au cours de la guerre de Cent Ans, il nen subsiste que les ruines du donjon, appelé tour Anne-de-Bretagne, qu'on fit construire ultérieurement. Les ruines sont classées MH depuis 1862 la Tour dAnne de Bretagne ou admirer les fabriques du parc du château de Groussay.","habitants":"Groussay ;Duchesse de Charost,                                Mormaire ; François Pinault\"","divers":"quatre châteaux dans cet article ; Bluche grav-1, Groussay grav 2-3-4, Mormaire grav 5-6 et de Montfort_Grav-7-8","gps":"","images":["../../jctruffet.com/image/image_78/78_Montfort_Lamaury_1.jpg","../../jctruffet.com/image/image_78/78_Montfort_Lamaury_2.jpg","../../jctruffet.com/image/image_78/78_Montfort_Lamaury_3.jpg","../../jctruffet.com/image/image_78/78_Montfort_Lamaury_4.jpg","../../jctruffet.com/image/image_78/78_Montfort_Lamaury_5.jpg","../../jctruffet.com/image/image_78/78_Montfort_Lamaury_6.jpg","../../jctruffet.com/image/image_78/78_Montfort_Lamaury_7.jpg"]},"Consult_chateau_formulairef720":{"id":"Consult_chateau_formulairef720","dept":"78","canton":"Chatou","commune":"Port-Marly","nom":"Monté_Cristo","type":"Château","periode":"XIX","histoire":"MONTE-CRISTO, au sommet de sa gloire, en 1844, après le succès des Trois Mousquetaires et du comte de Monte Christo parus dans la presse sous forme de feuilletons, l'écrivain Alexandre Dumas cherche à s'établir loin du tumulte incessant de la ville dans un lieu où il pourra trouver suffisamment de quiétude pour travailler et fournir aux éditeurs ses manuscrits. Dumas réside alors à Saint-Germain en Laye. Séduit par les paysages de bords de Seine, il choisit une colline située sur les coteaux du Port Marly pour y faire construire sa demeure. Il engage un architecte, Hippolyte Durand, afin de lui faire réaliser son rêve. Il désire un château renaissance édifié face à un castel gothique entouré d'eau. Le parc doit être aménagé à l'anglaise et agrémenté de grottes, rocailles et cascades.   Dumas donne ses directives et son domaine est conçu selon ses souhaits. Le 25 juillet 1847, l'écrivain pend la crémaillère en présence d'une foule d'amis, d'admirateurs et de curieux. Monté-Cristo est une demeure aux façades entièrement sculptées, l'histoire, la nature, l'âme de l'écrivain sont omniprésentes : motifs  floraux, anges, instruments de musique et armes côtoient divers animaux étranges. Au-dessus de chaque fenêtre du rez-de-chaussée, Dumas a fait placer un portrait d'écrivain dramatique de toutes les époques. Au-dessus de la porte d'entrée, Dumas, lui même semble accueillir ses hôtes. Sur le fronton s'étale les armes de ses ancêtres et sa devise personnelle \"J'aime qui m'aime\". Enfin, les clochetons au sommet des deux tourelles du château sont ornées des initiales entrelacées de l'écrivain. Le château néogothique appelé par Dumas château d'If est son cabinet de travail. Dumas s'y enferme durant de longues heures pour écrire en paix. Ce charmant castel entouré d'eau présente des particularités architecturales hors du commun.","architecture":"MONTE-CRISTO ,  Dumas y imprime définitivement son âme : de nombreux titres d'uvres de l'écrivain figurent en effet sur les façades aux côtés des représentations sculptées dans la pierre de quelques héros. Le parc de Monte-Cristo est un écrin de verdure enfermant en son sein le château de Monte-Cristo. Dumas souhaite un parc aménagé à l'anglaise et riche des plus belles espèces d'arbres, mélèzes, charmes, bouleaux, chênes, la topographie du lieu et la présence de sources permettent une mise en scène du parc. La création de bassins, de rocailles et de cascades crée une atmosphère romantique idéale souhaitée par l'écrivain.\nEn 1848, poursuivi par ses nombreux créanciers, Dumas doit se résoudre à vendre sa propriété, ainsi que tout le mobilier et de nombreux objets. Le 22 mars 1849, Dumas cède le domaine Attaché à sa demeure, Dumas reste quelque temps encore à Monte Cristo, (l'acheteur est en effet un prête nom de Dumas), en 1851, Dumas aura quitté définitivement son paradis terrestre pour s'exiler en Belgique. Alors, la propriété passe de main en main jusqu'en 1969. Faute d'entretien, l'édifice perd de son prestige. Les toitures sont éventrées, le parc est à l'abandon, les sculptures abîmées. Le propriétaire des lieux, une société immobilière loue le château depuis plusieurs années et prévoit la réalisation de 400 logements, le château de est menacé de destruction. Devant l'émotion soulevée par un tel projet, Le Port-Marly, Marly-le-roi et le Pecq se réunissent en un Syndicat intercommunal pour créer la société des amis d'Alexandre Dumas.","habitants":"Alexandre Dumas\"","divers":"Château de Monté Cristo à Port-Marly","gps":"","images":["../../jctruffet.com/image/image_78/78_Mont%c3%a9_Cristo_1.jpg","../../jctruffet.com/image/image_78/78_Mont%c3%a9_Cristo_2.jpg","../../jctruffet.com/image/image_78/78_Mont%c3%a9_Cristo_3.jpg","../../jctruffet.com/image/image_78/78_Mont%c3%a9_Cristo_4.jpg","../../jctruffet.com/image/image_78/78_Mont%c3%a9_Cristo_5.jpg","../../jctruffet.com/image/image_78/78_Mont%c3%a9_Cristo_6.jpg"]},"Consult_chateau_formulaire3c03":{"id":"Consult_chateau_formulaire3c03","dept":"78","canton":"Verneuil-sur-Seine","commune":"Morainvilliers","nom":"Morainvilliers_78","type":"Château","periode":"XVII-XVIII","histoire":"Trois châteaux dans cet article, Morainvilliers, saint-André et St Sylvestre.       MORAINVILLIERS,  le château primitif et sa ferme ont peut-être été construits au XVIIe siècle. Vers 1832, le baron Charles Davilliers élève un nouvel édifice sur la pente dominant le château qui devient bâtiment des communs. Il est très dénaturé actuellement. Le nouveau château de Morainvilliers a été complété à l'arrière d'un corps de bâtiment et l'ouverture du vestibule sous le repos de l'escalier a été supprimée. A la fin du XIXe siècle la petite-fille de Charles Davilliers, Marguerite, devenue religieuse, cède le château et le parc aux surs \"Missionnaires de Marie\". Aujourd'hui, le bâtiment abrite la maison de vacances des petits frères des Pauvres, les séjours contribuent à apporter des moments de bonheur aux personnes les plus démunies et particulièrement, aux plus âgées et aux moins valides.  Résidence des petits frères des Pauvres.","architecture":"ST-ANDRE,  château reconstruit en 1817 pour Félix Gonse, sa famille étant propriétaire du domaine depuis la fin de l'Ancien Régime. Le parc est créé au cours du XIXe siècle, la chapelle est ajoutée de l'autre côté de la rue Sainte-Anne pour Madame Withcomb par l'entrepreneur Alphonse Dore en 1909. Une école américaine est installée dans le château vers 1925. On construit alors un bâtiment à usage scolaire le long de la rue Sainte Anne, une piscine, dont la forme est celle de l'Europe, comblée mais visible sur le cadastre, et un théâtre de verdure relié à une terrasse par un escalier que dissimule un arbre en ciment, centre de formation.                                    ST SYLVESTRE a cinq K.M. au sud à Alluerts le roi  En 1174, le village, qui est situé sur un plateau élevé, reçoit du roi Louis VII des privilèges tendant à en faire une ville neuve destinée à protéger ses domaines contre les ducs de Normandie et les comtes de Meulan. Des vestiges d'enceinte et de château fortifié existaient encore en 1821. Le manoir Saint-Sylvestre a été construit au XVIIe siècle. Au XIXe siècle, on ajoute le bâtiment des étables au nord et on reconstruit le logis Est le long de la rue. Destruction du pavillon ouest à une date inconnue, ensemble dénaturé, à un étage carré   avec escalier dans-oeuvre, de distribution, à l'extérieur, escalier droit.","habitants":"St-André; Famille Gonse                                  baron Charles Davillier\"","divers":"Trois châteaux dans cet article, Morainvilliers  Grav-1 , Saint-André grav-2-3 et St-Sylvestre grav-4-5","gps":"","images":["../../jctruffet.com/image/image_78/78_Morainvilliers_78_1.jpg","../../jctruffet.com/image/image_78/78_Morainvilliers_78_2.jpg","../../jctruffet.com/image/image_78/78_Morainvilliers_78_3.jpg","../../jctruffet.com/image/image_78/78_Morainvilliers_78_4.jpg","../../jctruffet.com/image/image_78/78_Morainvilliers_78_5.jpg"]},"Consult_chateau_formulaired95f":{"id":"Consult_chateau_formulaired95f","dept":"78","canton":"Verneuil-sur-Seine","commune":"Médan","nom":"Médan","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article, Médan et  Emile Zola.                                     MEDAN,  peut-être pour la famille Perdrier. Jean Bourdin, chambellan de Henri IV, ajoute la ferme dont l' entrée reprend la disposition du châtelet castral vers 1635, il édifie une autre terrasse afin de créer un jardin de l'autre côté de la route. Entre 1750 et 1777, les Gilbert de Voisins ajoutent une longue aile, qui regarde la vallée, dans le goût de l'époque. L'aile est reconstruite vers 1873 pour le baron de Dalmas, il fait également sculpter ses armoiries au-dessus du portail, ruinée, l'aile a été détruite. Ronsard, du Bellay, la Tasse et d'autres poètes fréquentèrent Médan au temps ou il était la demeure de Jean Brinon, chancelier du duc François d'Alençon   , le grand écrivain  belge Maeterlinck à séjourné dans cette propriété qui appartient toujours à sa famille. le château avait fier allure avec son entrée encadrée de deux tours carrées et son logis Louis XIII. Un incendie l'a ravagé ces dernières années. sur une terrasse étroite dominant la Seine, le petit château avec tour d'escalier en façade sur cour cantonné d'une tour et d'un châtelet d'entrée a pu être construit fin XVe début XVIe siècle. Éléments protégés MH : la poterne d'entrée avec son passage supérieur ; les façades et les toitures du bâtiment contigü à la poterne d'entrée, y compris les deux tours adjacentes ; le petit bâtiment avec lanterneau de la poterne des communs ; les murs de soutènement de l'ancien jardin : inscription par arrêté du 6 mars 1979.","architecture":"EMILE ZOLA,  acheta la maison en 1878 grâce aux gains de son roman L'Assommoir, publié en 1877, La maison a été agrandie à son idée avec la construction des tours Germinal et Nana. Il conservera la demeure pendant 24 ans, jusqu'à sa mort en 1902. De 1878 à 1902, Médan sera la résidence principale de Zola, En 1905, Alexandrine Zola fait donation de la propriété à l'Assistance publique en vue d'y réaliser un établissement hospitalier de convalescence, En 1982/1983, la maison de Médan servit d'école de personnels de santé (ambulanciers). Par arrêté du 21 mars 1983, l'ensemble du domaine est inscrit aux monument historique,  Le musée Émile-Zola a été inauguré dans la maison de Médan en 1984.","habitants":"Medan; famille Perdrier. Jean Bourdin  Emile zola;\"","divers":"Deux châteaux dans cet article, Médan grav-1-2-3-4 et  Emile Zola grav-5","gps":"","images":["../../jctruffet.com/image/image_78/78_M%c3%a9dan_1.jpg","../../jctruffet.com/image/image_78/78_M%c3%a9dan_2.jpg","../../jctruffet.com/image/image_78/78_M%c3%a9dan_3.jpg","../../jctruffet.com/image/image_78/78_M%c3%a9dan_4.jpg","../../jctruffet.com/image/image_78/78_M%c3%a9dan_5.jpg"]},"Consult_chateau_formulaire663e":{"id":"Consult_chateau_formulaire663e","dept":"78","canton":"Maurepas","commune":"Magny les hameaux","nom":"Mérantais","type":"château","periode":"XIV-XVII","histoire":"deux chateaux dans cet article; Mérantais et  Port -Royal.                                                 MERANTAIS  Les deux lieux habités, Mérantais et Mérancis, forment un seul fief mentionné en 1365. Château avec tours et terrasse jusqu'au XVIIIe siècle. La forme de la terrasse apparaît encore sur le cadastre de 1819. Château actuel fin XVIIIe siècle, peut-être autour d'un corps de bâtiment plus ancien. Ferme constituée au XVIIe siècle à partir d'un hameau et reconstruite partiellement aux XVIIIe et XIXe siècle. Logis du début du XXe siecle.  Gérondicap est un Groupement de Coordination Sociale et Médico-sociale qui développe des services pour les personnes âgées et handicapées. Installé au domaine du Mérantais à Magny-les-Hameaux, il a récemment bénéficié de laide du département pour la réhabilitation complète du site. Plusieurs services publics, dont la Coordination Gérontologique Locale (CGL).","architecture":"PORT-ROYAL Le domaine et ruines de l'abbaye de Port-Royal des Champs et le domaine national des Granges de Port-Royal ont été réunis pour former le domaine national de Port Royal des Champs. De ce haut lieu de la pensée janséniste, vous découvrirez les ruines de l'abbaye détruite sur ordre de Louis XIV et le musée installé dans le bâtiment des \"Petites Ecoles\".","habitants":"Seigneur  local\"","divers":"deux chateaux dans cet article; Mérantais grav-1-2-3-4 et  Port -Royal  grav-5-6","gps":"","images":["../../jctruffet.com/image/image_78/78_M%c3%a9rantais_1.jpg","../../jctruffet.com/image/image_78/78_M%c3%a9rantais_2.jpg","../../jctruffet.com/image/image_78/78_M%c3%a9rantais_3.jpg","../../jctruffet.com/image/image_78/78_M%c3%a9rantais_4.jpg","../../jctruffet.com/image/image_78/78_M%c3%a9rantais_5.jpg","../../jctruffet.com/image/image_78/78_M%c3%a9rantais_6.jpg"]},"Consult_chateau_formulaire7c4b":{"id":"Consult_chateau_formulaire7c4b","dept":"78","canton":"Maurepas","commune":"Méridon","nom":"Méridon","type":"Château","periode":"XVI","histoire":"MERIDON, fief avec hôtel en 1368 et 1464. Manoir avec dépendances et tour en 1527.  Le château, propriété de la famille de Breteuil fin du XIXe siècle, a été loué a partir de 1946 par une association néerlandaise, pour y installer un centre d'éducation permanente. La vocation initiale du centre était de former des agriculteurs néerlandais qui désiraient immigrer en France. Depuis 2013, le château de Méridon est propriété de la famille David qui accueille dans cette magnifique demeure des réceptions privées et dentreprise.","architecture":"MERIDON , château avec deux corps de logis, auditoire pour tenir la justice et pont-levis en 1601. Permission de chapelle en 1600. Détruit avant 1819. Château actuel en 1882 par E. Bruneau pour M. Marquez di Braga sur terrasse ancienne. Lambris par Gosselin. Ancienne porte d'entrée mentionnée en 1899 (monographie communale).","habitants":"Famille de   Monsieur Marquez\"","divers":"Château de Méridon grav de 1 à 4","gps":"","images":["../../jctruffet.com/image/image_78/78_M%c3%a9ridon_1.jpg","../../jctruffet.com/image/image_78/78_M%c3%a9ridon_2.jpg","../../jctruffet.com/image/image_78/78_M%c3%a9ridon_3.jpg","../../jctruffet.com/image/image_78/78_M%c3%a9ridon_4.jpg"]},"Consult_chateau_formulairecc5a":{"id":"Consult_chateau_formulairecc5a","dept":"78","canton":"Maurepas","commune":"Mésnil st denis","nom":"Mésnil_St_Denis","type":"Château","periode":"XVI-XVII","histoire":"Trois châteaux dans cet article; Ambesis, Mesnil et la Verrière.                                                                         AMBESIS, le château a été construit à la fin du XVIIe siècle, ainsi que l'aile Est qui comporte une chapelle, l'aile ouest a été reconstruite au XVIIIe siècle ou au XIXe siècle et adjonction d'une pièce (toit en terrasse) au milieu de la façade sur jardin (avant 1819). L'édifice, de plan symétrique, se compose d'un sous sol et d'un étage carré. Le gros-oeuvre en meulière; moellon et enduit, élévation ordonnancée surmontée d'un toit à longs pans ; croupe et terrasse recouverts de tuiles plates.    Éléments protégés MH : les façades et les toitures de la maison de maître avec l'escalier et sa cage ; les façades et les toitures des bâtiments des communs situés le long de la cour avec la chapelle en totalité ; les potagers avec leurs murs ; le parc clos et l'allée de tilleuls : inscription par arrêté du 21 janvier 1997. \nLa VERRIERE,  à  cinq K.M. au sud, dont les jardins ont été dessinés par Le Nôtre, a été construit au XVIe siècle. Cest en 1507, avec lachat de la terre de la verrière par Barthélémy Séguier, noble et magistrat, que commence lédification du château. Son descendant, Jean Séguier, chancelier du Roi Louis XIV, le terminera vers 1660 en accordant une attention toute particulière au parc confiés aux plus grands paysagistes de France, notamment André Le Nôtre. Sa perspective a été classée au titre des monuments historiques. Découvrez ce lieu rarement accessible au public mais aussi son théâtre à litalienne, son parc et son étonnante chapelle.  Éléments protégés MH : le parc du château de La Verrière : inscription par arrêté du 11 juillet 1945. Propriété de la MGEN.","architecture":"MESNIL, en 1580 Louis Habert de Montmort achète le fief du Mesnil et fait construire à partir de 1589. A sa mort son fils Jean-Louis du Rieu de Fargis,  époux d'Anne Hue de Miroménil  en 1727, François de la Pointe dessine le château (1691-1693)  Rhabillage des façades (modénature et lucarnes) et adjonction des attiques du corps de logis central au XIXe siècle.  Le château sort de la descendance des Habert et sera acquit  en  1865 par lea famille d'Husson-Carcenac. Le domaine est occupé en 1870 par les prussiens. En 1929, il deviendra propriété de Fredrik Herman Gade, ministre Norvégien, qui y accueillera en 1940 le Roi des Albanais, Zog 1er et sa femme la reine Géraldine, tous deux alors en exil. Puis, à sa mort, le château sera acheté en 1947 par Milton Reynolds, habitant Chicago, qui entreprendra la fabrication des 1ers stylos à bille dans les communs, commercialisés en France ! En 1952, la commune du Mesnil-St-Denis, présidée par Me Raymond Berrurier, racheta le château afin d'y installer la mairie, les écoles et divers services communaux. Le château est précédé et séparé par un fossé d'une avant cour, elle même ceinturée de douves, qui abrite les bâtiments des communs dont l' éléments les plus remarquables est un beau colombier circulaire datant du XVIe siècle, la demeure est composée d'un corps de logis dont l'avant corps, couronné par un fronton, est percé au rez-de-chaussée de portes fenêtres, que flanquent des pavillons prolongés par des ailes faisant saillie sur les deux façades, L'ensemble coiffé de hauts combles en ardoise, a éré transformé au XVIIIe siècle.   Du Mesnil St Denis  Période ou style : Renaissance\nLe château de la Région Ile-de-France qui vous découvrirez est inscrit aux M.H depuis 1947. Ce sigle est officiel et est destiné à  le protéger  en tant que monument présentant un intérêt à l'échelle régionale.","habitants":"Verrière ;Barthélémy Séguier                                                          Mesnil  ; Louis Habert de Montmort\"","divers":"Trois châteaux dans cet article; Ambesi grav-1, Mesnil grav-2-3 et la Verrière grav-4-5.","gps":"","images":["../../jctruffet.com/image/image_78/78_Mesnil_St_Denis_1.jpg","../../jctruffet.com/image/image_78/78_Mesnil_St_Denis_2.jpg","../../jctruffet.com/image/image_78/78_Mesnil_St_Denis_3.jpg","../../jctruffet.com/image/image_78/78_Mesnil_St_Denis_4.jpg","../../jctruffet.com/image/image_78/78_Mesnil_St_Denis_5.jpg","../../jctruffet.com/image/image_78/78_Mesnil_St_Denis_6.html","../../jctruffet.com/image/image_78/78_Mesnil_St_Denis_7.jpg"]},"Consult_chateau_formulaireea94":{"id":"Consult_chateau_formulaireea94","dept":"78","canton":"Les Mureaux","commune":"Mézy sur Seine","nom":"Mézy_sur_Seine","type":"Manoir","periode":"XIX","histoire":"MEZY, grande villa construite en 1923 par l'architecte Rob Mallet Stevens pour le couturier Paul Poiret. Située sur un coteau dominant la Seine, elle est conçue comme une maison de campagne mais comporte aussi un grand patio destiné à des défilés de mode. Après la faillite du couturier en 1924, l'édifice inachevé, reste à l'abandon durant une dizaine d'années, avant d'être acheté par la vicomtesse Elvire Foy (née Popesco) artiste d'origine roumaine.","architecture":"MEZY, pour la nouvelle propriétaire, l'architecte reprend l'édifice réalisant en 1934 une série de modifications destinées à conforter l'habitabilité de la villa au détriment de son caractère d'apparat.Éléments protégés MH : le bâtiment principal avec les terrasses et emmarchements ; les façades et les toitures du pavillon du gardien : inscription par arrêté du 21 décembre 1984.","habitants":"Paul Poiret\"","divers":"Château de Mezy sur Seine","gps":"","images":["../../jctruffet.com/image/image_78/78_M%c3%a9zy_sur_Seine_1.jpg","../../jctruffet.com/image/image_78/78_M%c3%a9zy_sur_Seine_2.jpg"]},"Consult_chateau_formulaire5b08":{"id":"Consult_chateau_formulaire5b08","dept":"78","canton":"Aubergenville","commune":"Neauphle-le-château","nom":"Neauphle_le_château","type":"Château","periode":"XIX","histoire":"VERBOIS, à Neauphle-le-Château, commune périurbaine de l'aire urbaine de Paris, elle est localisée à une quarantaine de kilomètres de Paris et à proximité de la ville de Plaisir. Construite sur une butte rocheuse, Neauphle-le-Château est située aux confins des plaines agricoles de Montfort-l'Amaury et de Versailles et à l'extrémité Est du Pays d'Yveline. Ses habitants sont les Neauphléencet, hôtel 3 étoiles est logé dans une belle et grande demeure bourgeoise de la fin du XIXe siècle. Une succession de salons, dont les proportions ont été conservées, perpétue latmosphère des grandes maisons bourgeoises du XIXe siècle.","architecture":"NEAUPLE le CHATEAU, Le site est occupé pendant la Préhistoire. Probable emplacement de Divoduro, station citée dans l'itinéraire d'Antonin entre Evreux et Lutèce. Le château fort, de \"La Butte à Philippe\", fut détruit par les Anglais lors de la guerre de Cent Ans.  En 1478, la baronnie de Neauphle-le-Château est rattachée au comté de Montfort-l'Amaury les deux fiefs appartenant au duc de Bretagne, mais Olivier Le Daim, qui a reçu le comté de Meulan dont relève la baronnie s'y oppose et le rattachement n'est entériné qu'en 1483, après la mort d'Olivier le Daim. Réunie à la couronne au XVIe siècle, Neauphle-le-Château passe ensuite entre les mains de divers seigneurs (dont Nicolas Potier de Novion en 1682-1693) jusqu'à la Révolution.  Au cours de la Révolution française, la commune porte provisoirement le nom de Neauphle-la-Montagne.\nGrand Marnier « Cordon rouge ».  En 1798 : le clocher de l'église est réquisitionné pour l'installation d'un télégraphe Chappe, relais entre le poste des Clayes-sous-Bois et celui de La Queue-les-Yvelines?; le télégraphe sert jusqu'en 1851. En 1827, Jean-Baptiste Lapostolle fonde une distillerie produisant des liqueurs de fruits, le futur Grand Marnier. Centre équestre « les fauvettes » Ce château du XIXe siècle, qui nétait quun simple relais de chasse à lépoque, a été acheté par la duchesse de Brissac ; elle le fait agrandir par larchitecte Neveu qui travaille à Rambouillet. Occupé par les familles Mortemart et les Chabannes Lapalisse, il est vendu au XXe siècle au Ministère de |Education Nationale.","habitants":"Famille de Jean-Baptiste Lapostolle \"","divers":"Trois châteaux à Neauple_-le châteaux dit les fauvettes grav 1-2 , Verbois grav-3               48° 48' 55? nord, 1° 54' 11? est","gps":"","images":["../../jctruffet.com/image/image_78/78_Neauphle_le_ch%c3%a2teau_1.jpg","../../jctruffet.com/image/image_78/78_Neauphle_le_ch%c3%a2teau_2.jpg","../../jctruffet.com/image/image_78/78_Neauphle_le_ch%c3%a2teau_3.jpg"]},"Consult_chateau_formulaire76db":{"id":"Consult_chateau_formulaire76db","dept":"78","canton":"Verneuil-sur-Seine","commune":"Noisy le roi","nom":"Noisy_le_Roi","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article , Noisy le Roi et Bretèche.                                       NOISY le ROI, au XVIe siècle, Noisy appartient à Diane de Poitiers (favorite d'Henri II), ses héritiers cèderont les terres à Albert de Gondi, grand chambellan et maréchal de France. En 1575, il fait bâtir un château où viendront séjourner la Reine mère et ses fils. C'est une période faste pour Noisy le Roi, le château s'embellit et devient un haut lieu culturel et artistique. La seigneurie demeurera dans la famille des Gondi jusqu'au XVIIe siècle. En 1675, Louis XIV acquiert les terres et Noisy est incorporé au domaine Royal. Sur le souhait de Madame de Maintenon, Louis XIV fait aménager la demeure pour y éduquer des jeunes filles de la noblesse désargentée. Les bâtiments devenant vite trop exigüs, la communauté part s'installer à Saint Cyr l'Ecole. Après le départ de Mme de Maintenon le château est abandonné. En 1732, Louis XV en fait don à M. Leroy, lieutenant des chasses du Roi à Versailles qui le fera raser et construire un plus petit château à la place.  éléments protégés MH : les façades et les toitures du château et des communs ; le salon au rez-de-chaussée avec son décor; l'escalier avec sa rampe en fer forgé : inscription par arrêté du 6 octobre 1981.","architecture":"BRETECHE, à cinq K.M. au nord -ouest à Saint-nom les Bretèche  château construit pour la famille de Pomereu au cours du XVIIe siècle, en remplacement d'un corps de bâtiment plus ancien. Vendu au comte de Toulouse par Auguste Robert de Pomereu en 1700, restauré vers 1702, et revendu en 1710. Une aile fut ajoutée à droite au XVIIIe siècle. Le bâtiment, de plan symétrique, se compose d'un sous-sol, d'un étage carré et d'un étage de comble. Le gros-oeuvre : calcaire, pierre de taille, moellon et enduit, élévation ordonnancée surmontée de toit à longs pans brisés, croupe et terrasse, couverts d'ardoises. Le parc comprend une ferme, un jardin régulier, un jardin potager et des communs.","habitants":"Diane de Poitiers             Bretèche , famille de Pomereu\"","divers":"Deux châteaux dans cet article de  Noisy le roi","gps":"","images":["../../jctruffet.com/image/image_78/78_Noisy_le_Roi_1.jpg","../../jctruffet.com/image/image_78/78_Noisy_le_Roi_2.jpg","../../jctruffet.com/image/image_78/78_Noisy_le_Roi_3.jpg"]},"Consult_chateau_formulaire97f1":{"id":"Consult_chateau_formulaire97f1","dept":"78","canton":"Verneuil-sur-Seine","commune":"Qrgeval","nom":"Orgeval","type":"Château","periode":"XVII-XVIII-XIX","histoire":"Trois châteaux dans cet article,  Brunetterie, Orgeval et Verte-Salle.                                                                  BRUNETTERIE, précédé de communs reconstruit vers 1884, à l'emplacement d'un château antérieur au cadastre napoléonien, pour la veuve d'Henri Sainton, née Grüter, descendante d'un compagnon du roi Jacques II Stuart. L'Orangerie a été bâtie en 1860. La demeure comprend quinze pièces aux parquets de chêne et des plafonds moulurés, elle fut acquise par la ville en 1991. Autour du château, s'étend un magnifique parc de 5 ha, où il fait bon se promener en toutes saisons. L'édifice, de plan symétrique, est composé d'un sous sol, d'un étage carré et d'un étage de comble, le gros-oeuvre en moellon sans chaîne en pierre de taille, meulière et enduit, élévation ordonnancée surmontée de toit à longs pans brisés ; croupe et toit à longs pans recouverts d'ardoises et de tuiles mécaniques, école de danse et de musique.","architecture":"ORGEVAL, petit château construit vers 1835 pour monsieur de Bouffe à l'emplacement du château du Haut Orgeval, détruit. L'escalier de la façade ouest semble remployé. L'édifice, de plan symétrique, se compose d'un étage de soubassement et d'un étage carré. Le gros-oeuvre en moellon sans chaîne en pierre de taille, meulière, calcaire, appareil mixte et enduit partiel, élévation ordonnancée toit à longs pans, pignon couvert et croupe, recouverts d'ardoises. Gérant Vincent et Silvana Douvier, transformé en hôtel de ville par la ville d'Orgeval.                                                                                                               VERTE SALLE, petit château construit dans la première moitié du XVIIIe siècle; perron complété d'un porche dorique dans le premier quart du XIXe siècle; les communs sont détruits au cours du XIXe siècle. L'édifice se compose d'un rez-de-chaussée surélevé et un étage de comble. Le gros-oeuvre en calcaire; meulière; moellon et enduit, élévation ordonnancée surmontée d'un toit à longs pans brisés; croupe;  recouverts d'ardoises et zinc en couverture. Le parc comprend des communs, un jardin potager, une terrasse en terre-plein, un verger et un vivier.","habitants":"Brunetterie; veuve d'Henri Sainton                Orgeval;  monsieur de Bouffe \"","divers":"Trois châteaux dans cet article,  Brunetterie grav-3, Orgeval  grav-1 et Verte-Salle -grav-2.  Marie grav-4 et le Moulin grav-5","gps":"","images":["../../jctruffet.com/image/image_78/78_Orgeval_1.jpg","../../jctruffet.com/image/image_78/78_Orgeval_2.jpg","../../jctruffet.com/image/image_78/78_Orgeval_3.jpg","../../jctruffet.com/image/image_78/78_Orgeval_4.jpg","../../jctruffet.com/image/image_78/78_Orgeval_5.jpg"]},"Consult_chateau_formulaire0c65":{"id":"Consult_chateau_formulaire0c65","dept":"78","canton":"Rambouillet","commune":"Orphin","nom":"Orphin","type":"Manoir","periode":"XVI-XVIII-","histoire":"Trois châteaux dans cet article; Cerqueuse, la Plaine et le Haut-Orphin. CERQUEUSE, manoir entouré de douves dont le logis avec tour d'escalier hors-oeuvre pourrait remonter au XVIe siècle; ouvertures du logis dénaturées ; douves en partie comblées et suppression d'un portail au sud après le cadastre de 1828 ; modification de l'aile ouest, des bergeries à l'est (toiture et façade), construction de la grange au sud au cours du XIXe siècle.   Élévation : élévation à travées, élévation ordonnancée, étages, sous-sol, un étage carré, étage de comble   avec, escalier hors-oeuvre, escalier en vis sans jour, en maçonnerie et, gros-oeuvre : moellon, brique, enduit partiel, brique avec pierre en remplissage: toit à longs pans, croupe, appentis, pignon couvert en   tuile plate, tuile mécanique.\nLa PLAINE, petit château aménagé dans le goût néo-médiéval vers 1875 pour M. Jenty à la place d'une grosse ferme qui a appartenu pendant longtemps à la famille Mulot. La ferme a été reconstruite plus au sud. Le château appartient actuellement à M. Christophe, député de lOrne et ancien gouverneur du crédit foncier de France. L'édifice se compose d'un étage carré et un étage de comble, élévation à travées surmontée d'un toit à longs pans pignon découvert et toit polygonal, recouverts d'ardoises et de tuiles plates.","architecture":"HAUT ORPHIN, le manoir a été construit au XVIe siècle. Il subsiste en 1899 les vestiges de fossés, le mur d'enceinte et les tourelles avec meurtrières d'après monographie communale. L'édifice a été très restauré au XXe siècle : deux travées ajoutées à l'est ; bâtiments d'exploitation du XIXe siècle dont deux (est et sud) détruits très récemment: élévation à travées et à étages : sous-sol, un étage carré, étage de comble  avec escalier hors-oeuvre, escalier en vis,  gros-oeuvre : grès, silex, meulière, moellon, appareil mixte : toit à longs pans, pignon couvert, toit polygonal, toit conique  en  tuile plate.","habitants":"Plaine:  famille Mulot\"","divers":"Trois châteaux dans cet article; Cerqueuse grav 3, la Plaine et le Haut-Orphin grav-1-2.                               48° 34' 46? nord, 1° 46' 55? est","gps":"","images":["../../jctruffet.com/image/image_78/78_Orphin_1.jpg","../../jctruffet.com/image/image_78/78_Orphin_2.jpg","../../jctruffet.com/image/image_78/78_Orphin_3.jpg"]},"Consult_chateau_formulaireb9ea":{"id":"Consult_chateau_formulaireb9ea","dept":"78","canton":"Plaisir","commune":"Plaisir","nom":"Plaisir","type":"Château","periode":"XVI-XVII","histoire":"PLAISIR, le château de Plaisir est un bâtiment caractéristique du XVIIe siècle. Lors de sa construction, il appartient à la famille Le Tellier qui le conserve pendant un siècle. Vers 1720, le domaine passe aux mains de la famille Goullet-de Rugy puis, par descendance, à la famille Saint-Sauveur jusquà la Révolution. Le XIXe siècle et une grande partie du XXe siècle vont être témoins dune succession de propriétaires très différents : notables de région, membres de professions libérales, exploitants agricole. \nEn 1939, la propriété est acquise par monsieur Bourdel, qui entreprend la remise à l'état d'origine du parc et des bâtiments. Il fut le dernier propriétaire privé avant le rachat du château et de son parc par la ville de Plaisir, en 1976. En février 1977, le domaine est ouvert au public. Des travaux de rénovation sont entrepris à partir de 1982. En 1996, le théâtre de la Grange est rebaptisé théâtre Robert Manuel, éminent Plaisirois membre de la comédie française.","architecture":"PLAISIR à lorigine, lédifice ne comportait que la partie centrale, correspondant à la terrasse qui la précède. Son architecture et des éléments daménagement intérieur attestent de lempreinte du style Louis XIII : volets à petits panneaux de chêne massif renforcés de barres de fer, quelques cheminées, escalier à deux volées et rampe en chêne massif, boiseries et alcôves. Les deux ailes basses et les bâtiments annexes à vocation agricole furent ajoutés au XVIIIe siècle. L'ensemble formé par le parc, le château et ses communs est classé monument historique en 1961.","habitants":"Plaisir ; famille Le Tellier                                     Grignon ; famille de Bellièvre, famille de Brassac\"","divers":"Plaisir grav-1-2","gps":"","images":["../../jctruffet.com/image/image_78/78_Plaisir_1.jpg","../../jctruffet.com/image/image_78/78_Plaisir_2.jpg"]},"Consult_chateau_formulaire8c4a":{"id":"Consult_chateau_formulaire8c4a","dept":"78","canton":"Rambouillet","commune":"Longvilliers","nom":"Plessis_Mornay","type":"Château","periode":"XVI","histoire":"PLESSIS-MORNAY, cette terre a longtemps appartenu à des seigneurs dont certains ont joué un rôle important dans lhistoire. Le plus célèbre, Philippe de Mornay, fut conseiller et ambassadeur d'Henri de Navarre. Après labjuration en 1593, il fonda la première académie protestante en 1599. Le château fut bâti dans la deuxième moitié XVIe siècle pour la famille de Mornay. Auparavant, le fief du Plessis Marly, appelé ainsi parce quil relevait des seigneurs de Marly, fut propriété de Guillaume de Harville, seigneur de Paloisel (Palaiseau) le plus ancien seigneur connu de ce fief. Sa famille le possédera jusquen 1504. A cette époque, Charles de Gaillon hérita du manoir du Plessis. Lautre moitié partagée entre les puînés fut vendue en 1679 à François Bazin, seigneur de Bandeville. Cette partie fut acquise par le comte James Alexandre de Pourtalès en 1806. Dans un acte datant de 1704 le duc de Rohan figure comme seigneur du Plessis. Inscrit MH en 1965. Propriété aujourd'hui de monsieur A de Pourtalès.","architecture":"PLESSIS-MORNAY, le bâtiment, de plan rectangulaire à trois niveaux toit en croupe avec lucarnes en comble sommet des pinacles, l'édifice est accolé d'une tour carré à quatre  étages à toits à l'impérial flaqué de pinacles sur ses trois faces, à l'opposée flanqué de deux tours rondes toit en poivrières sur mâchicoulis.","habitants":"Philippe de Mornay\"","divers":"Château de Plessis-Mornay à Longvilliers.","gps":"","images":["../../jctruffet.com/image/image_78/78_Plessis_Mornay_1.jpg","../../jctruffet.com/image/image_78/78_Plessis_Mornay_2.jpg"]},"Consult_chateau_formulairee560":{"id":"Consult_chateau_formulairee560","dept":"78","canton":"Poissy","commune":"Carrières sous Poissy","nom":"Poissy","type":"Château","periode":"XIV-XVII-XIX","histoire":"Trois châteaux dans cet article, Berthemont, Villiers et Champfleury à carrières sous Poissy.                                                                                                                                                   BERTHEMONT, cette tour aurait été commencée au XIVe siècle et finie par les anglais en 1416. La tour fut reprise aux anglais par Jeanne d'Arc en septembre 1429. En 1640 elle est acquise par René de Longueil, la descendance possèdera le domaine jusqu'en 1808 où il est acquis par Charles Joseph Lefèvre, marchand de drap de Saint-Germain-en-Laye. Au début du XIXe siècle aux pieds de la ruine, est construite une maison de garde à l'initiative de Joseph Joachim d'Hinnisdal. La tour de Bethemont a été choisie comme point trigonométrique de la carte de France dite de l'Etat Major. Elle est située sur un promontoire dominant la vallée de la Seine à 167 m au dessus de la mer. Son diamètre extérieur est de 10 à 12 m et pour l'intérieur de 8 à 10 mètres. Maçonnerie avec mur de parement en pierre de taille encadrant un blocage de moellons dont de la pierre meulière.                                                                                                                                           CHAMPFLEURY,  à Carrières sous Poissy village voisin, construit vers 1630, le château fut d'abord propriété de la famille Coudray. Après plusieurs propriétaires successifs (notamment la famille Turgot de Saint-Clair, il revint au début du XXe siècle à la comtesse de Ronseray qui y mourut en 1918. De 1922 à 1933, une oeuvre américaine le transforma en \"Ecole Foyer\" pour jeunes filles dont les pères avaient été tués à la guerre de 1914-18, ensuite les Franciscains en firent un séminaire jusqu'en 1956 et donnèrent à la paroisse plusieurs curés. Depuis cette date, le château de Champfleury est un foyer pour personnes en difficulté. Les bâtiments ont été bien restaurés, mais le parc et le potager sous la terrasse ont été vendus et batis, et le site définitivement défiguré.","architecture":"VILLIERS, la demeure actuelle date du XIXe siècle, elle appartient au baron Léonce Hély d'Oissel, maître des requêtes au conseil d'Etat, puis à ses enfants dont sa fille, épouse du marquis de Ségur. De études sur l'architecte Théophile Bourgeois permettent de lui attribuer la paternité des travaux de réfection et d'agrandissement de l'édifice qui, si l'on en juge par la présence sur les vitraux de la bibliothèque, les armoiries et initiales de la fille du baron et de son gendre le marquis de Ségur, ont été commandés par ses derniers. En 1928, le domaine est vendu, 25 ha sont acquis par la famille Agache, 7 par la famille Savoye et le reste, 20 ha comprenant le château, par les Etablissement Kuhlmann et Agache dont le directeur est Donat Agache. Le château est affecté aux loisirs du personnel de la société et agrandi d'une aile batie, en 1939, par l'architecte parisien Germain Debré. Le château est affecté aux loisirs du personnel de la Société et agrandi d'une aile de cinq travées couverte en terrasse, construite en 1938-1939 C'est ainsi que l'édifice figure parfois sous de nom de château Kuhlmann. La propriété est acquise par la mairie en 1976. Actuellement elle est affectée au centre aéré de la ville de Poissy. L'édifice est aujourd'hui recouvert d'un enduit blanc, mais les cartes postales du début du 20e siècle nous montrent les façades dans leur état initial en pierre et brique, dans un style néo-Louis XIII. Dans les deux niches à coquille du premier étage figurent deux baigneuses : à droite la Vénus au bain de Christophe Gabriel Allegrain et à gauche, la Baigneuse d'Etienne Maurice Falconnet, copies dont les oeuvres originales datées respectivement de 1767 et 1757 sont conservées au Musée du Louvre. Dans la niche supérieure est une femme drapée à l'antique non identifiée. La propriété est acquise par la mairie en 1976 et est affectée au centre aéré de la ville de Poissy, visite des extérieurs.","habitants":"Champfleury,  famille Turgot de Saint-Clair    Villiers,baron Léonce Hély d'Oissel,\"","divers":"Deux châteaux dans cet article, Berthemont-grav 1-2, Villiers Grav-6-7-8 et Champfleury grav 3-4-5 .","gps":"","images":["../../jctruffet.com/image/image_78/78_Poissy_1.jpg","../../jctruffet.com/image/image_78/78_Poissy_2.jpg","../../jctruffet.com/image/image_78/78_Poissy_3.jpg","../../jctruffet.com/image/image_78/78_Poissy_4.jpg","../../jctruffet.com/image/image_78/78_Poissy_5.jpg","../../jctruffet.com/image/image_78/78_Poissy_6.jpg","../../jctruffet.com/image/image_78/78_Poissy_7.jpg","../../jctruffet.com/image/image_78/78_Poissy_8.jpg"]},"Consult_chateau_formulairedd74":{"id":"Consult_chateau_formulairedd74","dept":"78","canton":"Aubergenville","commune":"Jouars_Pontchartrain","nom":"Pontchartrain","type":"château","periode":"XVI-XVII","histoire":"PONTCHARTRAIN, fief appartenant au seigneur de Pontchartrain au XVIe siècle, sur lequel existaient un manoir et une grange cistercienne rattachée à l'abbaye des Vaux de Cernay. En 1614 achat de la seigneurie,  et le château par la famille Phélypeaux qui se fait appeler de Pontchartrain, son arrière petit-fils;  Maurepas, ministre de  Louis XV dernier survivant. A plusieurs reprises le château est agrandi et embelli. Frère Romain, André Le Nôtre, Mansart, les artistes de l'époque, participent aux travaux. La Révolution ébranle Pontchartrain, le châtelain, le duc de Cossé Brissac, est massacré par la foule à Versailles. A la mort de Maurepas, sans héritier  passe à sa nièce la duchesse de Brissac ruinée vend le château en 1801. Au XIXe siècle les propriétaires se succèdent, Claude Carvillon Destillières, le marquis d'Osmont, le comte prussien Henckel von Donnersmarck (mari de la Païva, courtisane et espionne),  en 1888, à Auguste Dreyfus et son épouse, et la marquise de Villahermosa. A la mort de la marquise, le château est vendu en 1934 à la famille Lagasse, toujours dans cette famille.","architecture":"PONTCHARTRAIN, la construction en forme de U s'ordonne autour de deux pavillons carrés  auxquels se rattachent formant les côtés de la cour, deux ailes en retour d'équerre elles même terminées par des pavillons. L'ensemble formé par le corps de logis   central et les deux pavillons qui le flanquent  et prolongé par deux longues ailes basses, à un seul niveau, aboutissant à deux petits pavillons, l'appareil est  en brique et pierre, chaînage en brique ainsi que les encadrements  de fenêtres.  Éléments protégés MH : la grille d'entrée ; les façades et les toitures du château et des communs ; la grande galerie et le salon à plan tréflé avec leur décor dans l'aile basse à gauche et dans le pavillon qui la prolonge ; l'ancien parc ordonnancé : classement par arrêté du 14 décembre 1979.","habitants":"famille Phélypeaux \"","divers":"48° 47' 56? nord, 1° 53' 42? est\n Château de Pontchartrain","gps":"","images":["../../jctruffet.com/image/image_78/78_Pontchartrain_1.jpg","../../jctruffet.com/image/image_78/78_Pontchartrain_2.jpg","../../jctruffet.com/image/image_78/78_Pontchartrain_3.jpg","../../jctruffet.com/image/image_78/78_Pontchartrain_4.jpg","../../jctruffet.com/image/image_78/78_Pontchartrain_5.jpg"]},"Consult_chateau_formulairec3ca":{"id":"Consult_chateau_formulairec3ca","dept":"78","canton":"Rambouillet","commune":"Rambouillet","nom":"Rambouillet","type":"Palais","periode":"XIV","histoire":"RAMBOUILLET,  en 1368 Jean Bernier, chevalier, conseiller et maître des requêtes de l'hôtel du roi, prévôt de Paris, achète à Girard de Tournebu un manoir qu'il fait transformer en 1374 en un véritable château fortifié et entouré de douves. Château de plan pentagonal irrégulier, avec un corps de logis triangulaire cantonné de tourelles, d'une tour, d'un châtelet d'entrée et d'une cour fermée de courtines, ces transformations doivent se comprendre au regard de l'ordonnance de Charles V du 19 juillet 1367 prescrivant d'armer les châteaux, c'est l'époque où le roi fait fortifier à Paris le Louvre et la Bastille. Dès 1384, Guillaume, fils de Jean Bernier, vend le château à Regnault d'Angennes, écuyer et 1er valet tranchant du roi. Il restera dans la famille d'Angennes pendant plus de trois siècles, jusqu'en 1699. Pendant la guerre de Cent Ans, le château fut pillé et incendié entre 1425 et 1428. Il fut restauré en 1484 par Jean II d'Angennes et son épouse. Jacques d'Angennes, capitaine des gardes du corps de François Ier, agrandit le domaine en achetant les terres d'Auffargis etde Poigny, la châtellenie des Essarts le Roi et divers terrains alentours constituant un beau domaine de chasse, grand amateur, François Ier vient souvent à Rambouillet. Il y meurt le 31 mars 1547, dans la chambre haute de la grosse tour qui a subsisté jusqu'à nos jours. En 1612, Louis XIII érige la terre en marquisat au profit de la famille d'Angennes, époque où Catherine de Vivonne, marquise de Rambouillet, épouse de Charles d'Angennes, tient salon dans son hôtel de Rambouillet à Paris. Leur fille Julie, épouse le duc de Montausier à qui elle apporte en dot le domaine, il l'agrandit et fait redessiner les jardins.","architecture":"RAMBOUILLET, à la suite du mariage de la deuxième fille de Julie d'Angennes le domaine passe au duc d'Uzès, mais il a des problèmes financiers et doit vendre le château en 1699 à l'un de ses créanciers, Joseph Fleuriau d'Armenonville. Louis-Alexandre de Bourbon, comte de Toulouse fils naturel légitimé de Louis XIV et de Madame de Montespan, amiral de France, souhaitant posséder un domaine de chasse aux environs de Paris, jette son dévolu sur Rambouillet. d'Armenonville est contraint de lui céder le domaine en 1706. Le comte de Toulouse va développer et embellir la propriété. Il fait construire de splendides écuries et des communs reliés au château par un souterrain. Une campagne de travaux a lieu de 1706 à 1709. Les façades sur cour sont homogénéisées et la cour est fermée par une grille semi-circulaire. Lorsqu'il quitte le conseil de Régence en 1722 le comte de Toulouse se retire à Rambouillet. Il lance de 1730 à 1736 une deuxième campagne de travaux sous la direction de l'architecte Desgots. Elle vise à doubler l'aile ouest par la création d'un appartement dit appartement d'assemblée. En dépit de l'importance du projet, l'intervention de Desgots est relativement discrète. Il fait déplacer la tourelle d'angle pour ne pas bouleverser l'équilibre du château. La principale originalité est un balcon courant sur la façade le long du nouvel appartement. Les aménagements intérieurs réalisés à la même époque sont d'un très grand luxe. Un bel ensemble de boiseries sculptées est réalisé par François Vassé, qui a travaillé également à l'hôtel de Toulouse, et Jacques Verberckt. À la mort du comte de Toulouse en 1737, l'édifice passe à son fils, le duc de Penthièvre qui fait embellir les jardins, développer le réseau de canaux pour constituer un ensemble d'îles, fait aménager 25 ha du parc à l'anglaise avec fabriques. La chaumière aux coquillages, l'ermitage, le pavillon chinois datent de 1770-1780.","habitants":"Famille d'Angennes\"","divers":"câteau de Rambouillet","gps":"","images":["../../jctruffet.com/image/image_78/78_Rambouillet_1.jpg","../../jctruffet.com/image/image_78/78_Rambouillet_2.jpg","../../jctruffet.com/image/image_78/78_Rambouillet_3.jpg"]},"Consult_chateau_formulaire03f4":{"id":"Consult_chateau_formulaire03f4","dept":"78","canton":"Rambouillet","commune":"Rambouillet","nom":"Rambouillet_II","type":"Palais","periode":"XIV","histoire":"Rambouillet suite;   Louis XVI qui, comme Louis XV, chasse en forêt des Yvelines, mais trouve trop exigu son château de Saint-Hubert, demande à son cousin le duc de Penthièvre de lui céder son château et la vente est conclue en décembre 1783. Louis XVI fait bâtir, sous la direction de l'architecte Jacques Jean Thévenin, des communs à la place des anciennes écuries et de nouvelles écuries pour 500 chevaux. Marie-Antoinette déteste Rambouillet et pour tenter de la séduire, Louis XVI fait élever en juin 1787, une belle laiterie et remanier les jardins par Hubert Robert. Sous la Révolution le domaine est délaissé. Napoléon Ier fait restaurer le château qui est inscrit sur sa liste civile. Famin est chargé de revoir la décoration de plusieurs appartements. Dans le parc, il élève de nouvelles fabriques et plante de nouvelles essences, dont une allée de cyprès chauves de Louisiane, la première de France. Sur le chemin de l'exil, Napoléon passe à Rambouillet la nuit du 29 au 30 juin 1815. Avec le retour des Bourbons sur le trône, Rambouillet est remeublé et des travaux sont exécutés pour effacer les insignes impériaux. On entreprend de modifier la façade sur le jardin, le chantier est interrompu après avoir fait réaliser trois baies en plein cintre, ce qui donne aujourd'hui un aspect étrange et peu homogène à cette partie du château. C'est là que Charles X  prenant lui aussi la route de l'exil, abdique en faveur de son petit fils le duc de Bordeaux le 2 août 1830. Louis Philippe Ier ne veut pas conserver le château sur sa liste civile et le remet à l'administration des domaines, qui le loue à divers occupants; le baron de Schickler, le comte Duchâtel, un restaurant de luxe, etc. En 1852, il réintègre la liste civile de Napoléon III qui y fait quelques séjours. Après la chute du Second Empire l'administration envisage un moment de le transformer en hôpital, soulevant les protestations indignées d'Adolphe Thiers.","architecture":"Rambouillet suite  Mais dès 1883, les Présidents de la République reprennent la tradition des chasses à Rambouillet. Jules Grévy, Sadi Carnot, Jean Casimir Perier aiment ce château. Celui-ci est aménagé en résidence d'été pour Félix Faure et devient officiellement résidence présidentielle le 23 février 1886, le château de Rambouillet fut le siège de la première rencontre au sommet des pays les plus industrialisés à l'initiative du président Valéry Giscard d'Estaing en 1975. Éléments protégés MH : les bâtiments non classés de la ferme et de la bergerie, le sol des cours : inscription par arrêté du 29 août 1977. Le portail d'entrée, le pigeonnier, les deux granges situées de part et d'autre du pigeonnier et le grand bâtiment sud-ouest de la ferme ; le portail d'entrée, les deux bergeries et le hangar de gauche; les façades et les toitures des anciennes écuries du comte de Toulouse, dites \"Caserne des Gardes\" ; les immeubles bâtis et non bâtis: classement par arrêté du 30 novembre 2010.                                                                                                   A dix K.M. au nord-ouest à Poigny la Forêt château de PETIT-POIGNY, prieuré fondé par un seigneur de Montfort entre 1155 et 1176. Devient annexe du prieuré de Louye à la fin du XVe siècle. Très délabré après les guerres de Religion, il est aliéné en 1576 en faveur de Jean d'Angennes par son frère prieur de Louye. Erigé en fief en 1584. Le château fut reconstruit en grès et brique en conservant la chapelle à la fin du XVIe siècle (chapelle dans le choeur, cave et salle d'armes dans la nef). En ruine dès 1643, le moulin à servi de fabrique d'étain au XIXe siècle.","habitants":"Famille de Jean d'Angennes\"","divers":"Château de Rambouillet et de  Poigny grav-2","gps":"","images":["../../jctruffet.com/image/image_78/78_Rambouillet_II_1.jpg","../../jctruffet.com/image/image_78/78_Rambouillet_II_2.jpg"]},"Consult_chateau_formulaire65d4":{"id":"Consult_chateau_formulaire65d4","dept":"78","canton":"Bonnières-sur-Seine","commune":"Richebourg","nom":"Richebourg_78","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux dans cet article Richebourt et la Troche.                                                                           RICHEBOURG,   Richebourg fut au Moyen Age, un fief important qui assuma un rôle défensif, comme en atteste la motte féodale toute proche de la demeure actuelle. Bientôt un château féodal, puis un magnifique donjon de pierre, rectangulaire sur deux étages, construit par Charles de Sabrevois en 1522, le remplacèrent. Le château actuel, construit autour de ce donjon date des XVIe, XVIIe, XVIIIe siècles et présente de très beaux appareillages de briques roses dans les frises bordant les toitures et dans les hautes cheminées renaissance. Le château de Richebourg connut une période faste avec la famille des Cossé-Brissac de 1745 à 1831. acquis par la Fondation Mallet en 1976, abrite un centre médical,","architecture":"La TROCHE, le manoir est un édifice construit au XVIe siècle édifié sur des vestiges des XIIIe et XIVe siècles. On suppose qu'il s'agissait d'une maladrerie fondée par les Templiers au XIIIe siècle ; la grande salle du rez-de-chaussée a conservé le nom d'hôpital. La seigneurie de la Troche était indépendante de celle de Richebourg. L'acte le plus ancien qu'on ait trouvé se rapportant à la Troche date de 1200, et concerne Guillaume de la Troche et son fils Pierre qui \"du consentement de leur seigneur Simon de Neauphle, donnent au prieuré Saint-Georges de Basainville la dîme des essarts faits dans leurs bois\". C'est au cours du XVIe siècle que les moines de Coulomb ont possédé la Troche et y ont fait construire la ferme fortifiée pour se défendre des attaques des seigneurs de Richebourg. En 1587, messire Bourdin, prieur de la Troche, en la paroisse de Saulx et Richebourg, comparaissait pour son fief à l'arrière ban du comté de Montfort. On trouve ensuite un membre de la famille de Saint-Martin, seigneur de Torcy et de la Troche, puis en 1660, Olympe de Saint-Martin et Marie de Brosse, sa mère, vendent la Troche à la famille du Mancel. Le registre du tabelionnage de Houdan renferme la mention, en 1669, de Samuel de Vernassac, chevalier, seigneur de Lesmarie et de la Troche. Mais l'année suivante, ce sont les religieuses de Notre-Dame de Houdan qui font hommage pour le fief de la Troche. En 1707, le fief a encore changé de mains car c'est M. Le Tellier, seigneur de Saulx-Richebourg, qui s'intitule également seigneur de la Troche. Peu avant la Révolution, en préparation de la réunion des États Généraux, les habitants de Richebourg rédigeaient leurs cahiers de doléances se plaignant des ravages , du prix exorbitant du blé, et réclamaient aussi plus de justice fiscale. Après la Révolution, la Troche fut définitivement incluse dans la commune de Richebourg, inscription par arrêté du 13 juillet 1926.","habitants":"Richebourg: Charles de Sabrevois                            Troche;  famille du Mancel\"","divers":"Deux châteaux dans cet article Richebourt grav 4-5 et la Troche grav-1-2-3.","gps":"","images":["../../jctruffet.com/image/image_78/78_Richebourg_78_1.jpg","../../jctruffet.com/image/image_78/78_Richebourg_78_2.jpg","../../jctruffet.com/image/image_78/78_Richebourg_78_3.jpg","../../jctruffet.com/image/image_78/78_Richebourg_78_4.jpg","../../jctruffet.com/image/image_78/78_Richebourg_78_5.jpg"]},"Consult_chateau_formulairee464":{"id":"Consult_chateau_formulairee464","dept":"78","canton":"Rambouillet","commune":"Rochefort en yvelines","nom":"Rochefort_yvelines","type":"Château","periode":"XVIII-XIX","histoire":"Trois châteaux dans cet article Censé , Louis XIII et Rochefort.                                                                  Manoir de la CENSE, de plan rectangulaire régulier construit entre 1429 et 1596, pour servir de résidence seigneuriale aux différentes familles qui possédèrent la terre de Rochefort (Silly, La Roche-Guyon et Sarrebrück), François Ier et Henri IV y séjournèrent. A l'origine, le manoir composé de plusieurs corps disposés autour d'une cour carrée. Côté nord détruit par un incendie à la fin du XIXe siècle, à  deux étages carrés   en pierre, moellon, enduit, brique, grèstoit à longs pans, pignon couvert, toit en pavillonen tuile plate.                                                                                                               ROCHEFORT, de juillet 1899 à 1904, Charles-Frédéric Méwès conduit les travaux de construction du château pour le diamantaire Jules Porgès. Cest une réplique partielle très agrandie de lhôtel de Salm à Paris, actuel Palais de la Légion dHonneur. Le paysagiste Ferdinand Faivre est lauteur de sculptures décoratives. Le château comporte un grand hall et une centaine de chambres, dimmenses salons et plusieurs cuisines et offices. Pendant la première guerre mondiale, le château servit dhôpital. Par la suite des revers de fortune forcèrent M. Porgès à mener une vie moins dispendieuse et le château ne fut plus habité. Les allemands l'occupèrent pendant la deuxième guerre mondiale. A la libération les américains y installèrent un régiment et quittèrent le château en 1945. Au début des années 2000, le domaine fût racheté, un projet de rénovation du château devrait aboutir à la création d'un centre de séminaire à la fin 2008, équipé de piscine, sauna, salles de réunion et un golf de 18 trous. Voir également le château Louis XIII à Rochefort en Yvelines.","architecture":"LOUIS XIII    Construction d'un premier château entre 1596 et 1623 pour Hercule de Rohan Rochefort, détruit vers 1780; construction d'un deuxième château à la place du précédent par l'architecte Archangé, ce fut un véritable palais et sa construction demanda six année de 1781 à 1787, et il ne fut jamais achevé quand vint la Révolution. Le plan se trouve à la bibliothèque municipale de Rochefort avec la mention: Plan, coupe et élévation du château de Rochefort en Beauce près de Dourdan quavait fait construire S.A. Mgr le prince de Rohan Rochefort daprès les dessins et sous la conduite de Archangé, élève de lAcadémie Royale dArchitecture, commencé en 1781 et terminé en 1787, détruit en 1801. Un troisième château, dit château Louis XIII, est construit à l'emplacement des anciennes dépendances du château précédent, avec réutilisation de ses matériaux, entre 1896 et 1904, pour le diamantaire Jules Porgès, le château est la réplique, agrandie, de l'hôtel de Salm à Paris, palais de la Légion d'Honneur, à la fin du XIXe siècle remaniements (partie sud), le portail est un vestige en place du premier château. Larchitecte Mewès en a dessiné les plans, le grand paysagiste Verhaeghe a imaginé les jardins et lartiste Faivre a créé la sculpture décorative du jardin dagrément. Siège de réception fabuleuse jusqu'en 1914, il est transformé en hôpital pendant la Première Guerre mondiale. La famille Porgès ne pouvant plus l'entretenir le château devient le lieu de tournage de nombreux films, les terres sont alors cédés. En 1939, le lycée Stanislas s'y réfugie, les Allemands l'occupent durant la deuxième guerre mondiale, puis les Américains à la Libération. Vers 1946, un nouveau propriétaire, monsieur Chatard, essaye de lui redonner vie, mais après sa mort accidentelle en 1955, le château est à nouveau vendu.","habitants":"Charles-Frédéric Méwès \"","divers":"Trois châteaux dans cet article Censé , Louis XIII et Rochefort.","gps":"","images":["../../jctruffet.com/image/image_78/78_Rochefort_yvelines_1.jpg","../../jctruffet.com/image/image_78/78_Rochefort_yvelines_2.jpg","../../jctruffet.com/image/image_78/78_Rochefort_yvelines_3.jpg","../../jctruffet.com/image/image_78/78_Rochefort_yvelines_4.jpg"]},"Consult_chateau_formulairee1d7":{"id":"Consult_chateau_formulairee1d7","dept":"78","canton":"Bièvre","commune":"Bièvre","nom":"Roches_Bièvre","type":"Château","periode":"XVII","histoire":"ROCHES,  a été construit aux XVIIIe et XIXe siècles. Les ailes nord et est ont été édifiées vers 1740, en même temps que les communs. L'aile ouest a été adjointe au début du XIXe siècle.  En 1804, le journaliste Louis-François Bertin, fondateur et directeur du Journal des débats acquiert la propriété et organise de 1815 à son décès, en 1841, un salon littéraire où il convie des artistes dont Victor Hugo et sa maîtresse Juliette Drouet, Charles Gounod, Hector Berlioz, Jean-Auguste-Dominique Ingres, Franz Liszt et François-René de Chateaubriand qui réside non loin, à la Vallée-aux-Loups.\nEn 1966, le site fut inscrit au titre des sites et le château référencé à l'inventaire général du patrimoine architectural français en 1987.\nEn 1989, la propriété a été acquise pour quarante-neuf millions de francs par la Soka Gakkai qui la renomma en « Maison littéraire de Victor Hugo » pour l'ouvrir au public. L'Association culturelle Soka de France (ACSF) en est propriétaire. Elle y organise régulièrement des expositions liées à l'uvre de Victor Hugo qui sont ouvertes au grand public.","architecture":"ROCHES, le château se compose d'un corps principal en meulière et calcaire enduit, à trois étages élevés sur un sous-sol en forme de U. L'aile nord est percée au sud par deux baies vitrées et une fenêtre ouvrant sur une terrasse, surmontée par un étage mansardé sous un toit d'ardoise et de zinc, l'aile ouest, plus étroite présente trois niveaux, le dernier mansardé et surmonté à l'extrémité sud par une tour carrée rehaussée d'une girouette, au niveau du second niveau, une terrasse entourée d'un balustre est installée au-dessus de l'avancée du rez-de-chaussée. L'aile ouest, la dernière ajoutée est percée de six fenêtres sur trois niveaux à l'ouest et à l'est et une fenêtre à l'extrémité sud, la façade est surmontée d'un fronton triangulaire brisé. Le hall d'entrée est éclairé par une verrière et surmonté d'une mezzanine accessible par le double escalier, plusieurs salons et une bibliothèque restaurés dans le style romantique. Le parc du château est décoré de dentelles à proximité de l'entrée, de fabriques de jardin et de deux lacs artificiels obtenus par dérivation de la rivière la Bièvre qui coule au sud du parc. Il a fait l'étude d'un recensement au titre des jardins remarquables.","habitants":"Louis-François Bertin\"","divers":"Gps 48° 45' 25? nord, 2° 12' 02? est","gps":"","images":["../../jctruffet.com/image/image_78/78_Roches_Bi%c3%a8vre_1.jpg","../../jctruffet.com/image/image_78/78_Roches_Bi%c3%a8vre_2.jpg","../../jctruffet.com/image/image_78/78_Roches_Bi%c3%a8vre_3.jpg","../../jctruffet.com/image/image_78/78_Roches_Bi%c3%a8vre_4.jpg","../../jctruffet.com/image/image_78/78_Roches_Bi%c3%a8vre_5.jpg","../../jctruffet.com/image/image_78/78_Roches_Bi%c3%a8vre_6.jpg"]},"Consult_chateau_formulaire8de6":{"id":"Consult_chateau_formulaire8de6","dept":"78","canton":"Bonnières-sur-Seine","commune":"Rosay","nom":"Rosay_78","type":"Château","periode":"XVI","histoire":"ROSAY, au début de l'année 1615, Jean III Courtin permit à son fils aîné François Courtin, maître des requêtes, de faire construire un château et maison forte close de fossés « suivant le plan et dessein qui en a été fait  longtemps auparavant ». Josiane Sartre suppose que le projet avait été établi dès 1597 et rapproche le dessin du château des gravures du Livre d'architecture, pour seigneurs gentilshommes et autres qui voudront bastir aux champs (1582) de Jacques Ier Androuet du Cerceau. Vers 1660, Nicolas François Courtin fait rajouter des tourelles et créer le parc.\nEn 1671, Louis XIV érige le fief et celui de Villette en marquisat de Rosay-Villette pour François Briçonnet (1705), président au Parlement de Paris, héritier des Courtin par son mariage avec Geneviève Courtin (1697), dame de Rosay. À sa mort, le fief est vendu à René-Joachim de Chénedé, marquis de Rosay-Villette, premier valet de chambre ordinaire de la Dauphine, aïeule de Louis XV, puis premier valet ordinaire de la garde-robe du duc de Berry. Il fait faire des travaux considérables sur les dépendances, construction de la chapelle castrale placée sous l'invocation de sainte Anne, bénie le 26 juillet 1719 ; construction en 1721 d'un vaste colombier.  En 1748, Rosay est acquis par Charles Savalette, fermier général, propriétaire du château de Magnanville voisin. Il fait peut-être réaliser certains travaux par son architecte, François II de Franque.  Le château est revendu en 1760 à Jacques-Louis de Brétignières, dernier marquis de Rosay-Villette, qui fait réaliser des aménagements intérieurs par l'architecte Denis Antoine. Celui-ci participe également à la transformation du parc en jardin pittoresque agrémenté de nombreuses fabriques.","architecture":"ROSAY, ces aménagements se poursuivent sur une quarantaine d'années jusqu'au début du XIXe siècle. Le domaine est alors devenu la propriété de Marie Charlotte de Brétignières du Rosay (1756-1833), vicomtesse de Tourdonnet par son mariage avec Jacques Georges de Joussineau de Tourdonnet (1748-1829). En 1896, la propriété est achetée par une famille privée de dimensions modestes, le château du Haut-Rosay est bâti sur une plateforme cantonnée de quatre bastions et entouré de douves sèches. Il se compose d'un corps de logis construit en briques avec chaînages de pierres de taille, de plan massé rectangulaire, cantonné de deux pavillons qui forment décrochement du côté du jardin. Le plan et les élévations sont d'une grande simplicité. Éléments protégés MH : le château et son parc, avec les communs, dépendances, fabriques, douves, terrasses et murs de clôture, ainsi que les aménagements hydrauliques : classement par décret du 19 février 1992.","habitants":"François Briçonnet \"","divers":"Château de Rosay","gps":"","images":["../../jctruffet.com/image/image_78/78_Rosay_78_1.jpg","../../jctruffet.com/image/image_78/78_Rosay_78_2.jpg","../../jctruffet.com/image/image_78/78_Rosay_78_3.jpg","../../jctruffet.com/image/image_78/78_Rosay_78_4.jpg"]},"Consult_chateau_formulaire5c25":{"id":"Consult_chateau_formulaire5c25","dept":"78","canton":"Verneuil-sur-Seine","commune":"Créspières","nom":"Sautour_78","type":"Château","periode":"XVII-XVIII","histoire":"un châteaux dans cet article; Sautour à  Crespierres                                                               SAUTOUR, construit au XVIIe siècle appartient à Claude de Picquet ses héritiers ont vendu le domaine à Louis Petit contrôleur en bâtiments du roi, en 1681 après sa mort en 1713 , le château est occupé par la famille Bullion au XVIIe siècle, puis il est vendu en 1780 par leur héritière à Anne-julie-Françoise de Crussol, duchesse de la Vallière à Jean -Baptiste Daniel de Crux et resté aux Crux jusqu'en 1924 et, en 1960, racheté par Michel de Bourbon Parme jusqu'en 1989, passe ensuite dans différents promoteurs qui n'entrtiennent pas la bâtisse qui tombe en ruine.","architecture":"SAUTOUR; pavillon à trois niveaux sur deux berceaux de cave, et escalier à vis hors-oeuvre, de la première moitié du XVIIe siècle. Corps de bâtiment de sept travées ajouté à la fin du XVIIe siècle ou au début du XVIIIe siècle. L'extrémité de ce corps a été rehaussée sur deux travées pour former un deuxième pavillon peut être à la fin du XVIIIe siècle. Ferme reconstruite dans la deuxième moitié du XIXe siècle. Le bâtiment, de plan symétrique, se compose d'un sous-sol et de deux étages carrés. Le gros-oeuvre: calcaire, moellon et enduit, élévation ordonnancée surmontée de toit en pavillon ; croupe polygonale; toit à longs pans et croupe, recouverts d'ardoises. La propriété comprend un parc, un bassin, une ferme et un pressoir.","habitants":"Sautour; famille Bullion\"","divers":"Deux châteaux dans cet article; Sautour","gps":"","images":["../../jctruffet.com/image/image_78/78_Sautour_78_1.jpg"]},"Consult_chateau_formulaire06e7":{"id":"Consult_chateau_formulaire06e7","dept":"78","canton":"Rambouillet","commune":"Sonchamp","nom":"Sonchamp","type":"Chateaux","periode":"XVII-XVIII","histoire":"trois châteaux dans cet article; , Chènes Secs, Loirieux et Pinceloup.                                                                                                     \nLOIRIEUX, logis et colombier construits probablement au XVIIe siècle ; en 1708 et 1715 cour carrée cantonnée de deux tours avec douves et plantations régulières ; porte de la bergerie  date de 1776; constructions régulières autour de la cour entre 1765, date de la carte des chasses et le cadastre de 1828 ; densification des constructions autour de la cour et construction d'une aile formant une deuxième  cour avec l'aire à battre sur l'ancien fossé au nord-ouest au cours du XIXe siècle ; épi de faîtage début XXe siècle.                                                                                                          CHENES SECS, dans les hameaux de Chatonville, des Chênes-Secs, dEpainville et de Louareux, quatre manoirs sont la trace danciens fiefs, attestés pour certains à la fin du XVe et au XVIe siècle. Lieux de pouvoir seigneurial, ils participaient à lorganisation défensive et administrative du territoire. Plusieurs sont aujourdhui transformés en fermes.","architecture":"PINCELOUP, le château a été construits vers 1897 par Eugène Thome, collaborateur de Napoléon III, d'Alphand, mort en 1891 et d'Haussmann. Avec ses clochetons, sa toiture aux éléments variés, son pavillon de gardien et ses 365 fenêtres, il évoque la vie fastueuse et raffinée de la fin du XIXe siècle. Le château possède des dépendances dont l'ancien manège à chevaux qui se distingue par son décor intérieur. Il s'agit d'une bâtisse de plan rectangulaire pourvue, sur son pignon gauche, d'un appendice carré. Les peintures appliquées au-dessus d'un lambris bas, usent du trompe-l'oeil pour des scènes champêtres ou portuaires, et une procession de pèlerinage ainsi qu'une vue de marché, ce décor pourrait être daté des années 1900 ou 1920. Parc réalisé par le paysagiste Louis Varé avec allée régulière, serre, étang, pont de jardin, volière, île artificielle et glacière, abrite aujourd'hui l'école d'horticulture Le Nôtre. Éléments protégés MH : l'ancien manège à chevaux : inscription par arrêté du 27 décembre 2005.","habitants":"Famille de Eugène Thome\"","divers":"Quatre châteaux dans cet article; Chatonville, Chènes Secs grav-4, Loirieux et Pinceloup grav -1-2-3-4.","gps":"","images":["../../jctruffet.com/image/image_78/78_Sonchamp_1.jpg","../../jctruffet.com/image/image_78/78_Sonchamp_2.jpg","../../jctruffet.com/image/image_78/78_Sonchamp_3.jpg","../../jctruffet.com/image/image_78/78_Sonchamp_4.jpg","../../jctruffet.com/image/image_78/78_Sonchamp_5.jpg"]},"Consult_chateau_formulairee494":{"id":"Consult_chateau_formulairee494","dept":"78","canton":"Rambouillet","commune":"Saint-Forget","nom":"St_Forget","type":"Château","periode":"XVI-XVIII","histoire":"deux châteaux dans cet article , Mauvières et Boissière-Beauchamp. MAUVIERES, mentionné en 1179, par Bernard de Malverius. Le fief est donné à Ramond de la Rivière de la Martigue dans la deuxième moitié du XIVe siècle, en remerciement de son aide contre les Anglais pour reprendre Bergerac. Il donne aux prairies voisines de Mauvières le nom de Bergerac. En 1582, la propriété est achetée par Savinien de Cyrano. Son petit-fils, engagé dans la compagnie de Nobles Mousquetaires gascons, devient Cyrano de Bergerac. Après la mort de Savinien agée de 38 ans, son père vend le château  à Antoine Balestrieren 1636, passe en 1696 à Pierre Manseau. Au XVIIIe siècle agrandissement par la famille  de Lamouroux.  en 1801 achat de Mauvières par M. Mathieu de St-Laurent. En 1857, la duchesse de Lesparre reçoit le domaine par donation.  ancêtre des propriétaires actuels Ce dernier passe ensuite par succession au comte Jacques de Bryas; le château à conservé sa structure d'ensemble.","architecture":"BOISSIERE-BEAUCHAMPà 10 K.M.au sud-est à Lévis Saint-Nom,  Terre seigneuriale mentionnée au XVIe siècle. Constructions en équerre au nord et à l'est dans la première moitié du XVIIIe. Encore en place en 1819, actuellement détruites. Construction du château actuel limite XVIIIe XIXe siècle, très remanié, communs construits au XIXe siècle. L'édifice, de plan symétrique, se compose d'un sous sol, d'un étage carré et d'un étage de comble. Le gros-oeuvre en meulière; moellon et enduit. Elévation ordonnancée surmontée de toit à longs pans; croupe, toit conique ; pignon couvert et toit en pavillon recouverts d'ardoises. Le parc possède un jardin, des communs et un pigeonnier.                                                                           MAUVIERES, l'édifice, un corps central cantonné de deux tours prolongé sur la façade postérieure par deux ailes en brique et pierre dont l'une abrite la chapelle. Lamouroux inclut les constructions anciennes dans un bâtiment d'apparence classique. celui-ci revêtemet de plâtre avec refend sur les angles, comportent un ressaut central formant avant corps que surmonte un grand fronton triangulaire découpé dans le toit, orné d'une grande coquille et de deux cornes  d'abondance sculptées. Les deux tours sont englobées dans deux pavillons couverts d'un toit d'ardoise à la Mansart, éclairé par des lucarnes. L'autre façade avec ses corniches   et ses cordons en brique, subit peu de modifications, l'aile qui abrite la chapelle conserve son toit en pavillon surmonté d'un clocheton\nÉléments protégés MH : les façades et les toitures du château, y compris la chapelle et des communs ; le parc : inscription par arrêté du 24 janvier 1968.","habitants":"Famille de Savinien de Cyrano\"","divers":"deux châteaux dans cet article , Mauvières grav-4-5-6 et Boissière-Beauchamp grav-1-2-3.","gps":"","images":["../../jctruffet.com/image/image_78/78_St_Forget_1.jpg","../../jctruffet.com/image/image_78/78_St_Forget_2.jpg","../../jctruffet.com/image/image_78/78_St_Forget_3.jpg","../../jctruffet.com/image/image_78/78_St_Forget_4.jpg","../../jctruffet.com/image/image_78/78_St_Forget_5.jpg","../../jctruffet.com/image/image_78/78_St_Forget_6.jpg"]},"Consult_chateau_formulairedac7":{"id":"Consult_chateau_formulairedac7","dept":"78","canton":"St-Germain en Laye","commune":"St-Germain en Laye","nom":"ST_Germain_en_Laye","type":"Château-Palais","periode":"XV-XVII","histoire":"ST GERMAIN EN LAYE; est vidé de ses meubles et de ses occupants mais retrouve un semblant de vie à partir de 1689, en devenant le refuge de Jacques II Stuart, roi d'Angleterre déchu. Il y meurt en 1701. Sa famille y demeure jusqu'en 1713, date à laquelle Louis XIV signe le traité d'Utrecht, entérinant la paix avec la nouvelle dynastie anglaise. Son fils Jacques III Stuart, dit le Prétendant ou Chevalier de Saint Georges, doit quitter la France avec les siens, le palais ne suscite plus aucun intérêt aux yeux de la couronne. Louis XVI octroie la château Neuf à son frère Charles, comte d'Artois, futur Charles X. Celui-ci le fait presque entièrement détruire. Sous la Révolution et le Premier Empire, Saint-Germain devient tour à tour prison, hôpital et école de cavalerie, il sert de lieux de garnison aux forces anglaises d'invasion après la bataille de Waterloo le 18 juin 1815. Louis-Philippe confie le château de Saint Germain à l'armée afin d'y installer une prison militaire. Des geôles sont compartimentées dans les anciens appartements royaux ou princiers ! Napoléon III se penche sur le chevet de la vieille bâtisse et décide d'y installer le Musée des Antiquités celtiques et gallo-ro
