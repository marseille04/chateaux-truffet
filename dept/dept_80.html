rmulairef1d2","nom":"Villers_Authie","commune":"Villers sur Authie","type":"Château","img":"../image/image_80/80_Villers_Authie_1.jpg"},{"id":"Consult_chateau_formulaire6e84-2","nom":"Wailly","commune":"Conty","type":"Château","img":"../image/image_80/80_Wailly_1.jpg"},{"id":"Consult_chateau_formulairedcf3","nom":"Wargnies_Naours","commune":"Wargnies","type":"Châteaux","img":"../image/image_80/80_Wargnies_Naours_1.jpg"},{"id":"Consult_chateau_formulaire51b2","nom":"Warloy_Baillon","commune":"Warloy-Baillon","type":"Château","img":"../image/image_80/80_Warloy_Baillon_1.jpg"},{"id":"Consult_chateau_formulaireb80d-2","nom":"Yaucourt_Bussus","commune":"Yaucourt-Bussus,","type":"Château","img":"../image/image_80/80_Yaucourt_Bussus_1.jpg"},{"id":"Consult_chateau_formulaire3d6c-2","nom":"Yzengremer","commune":"Yzengremer","type":"Château","img":"../image/image_80/80_Yzengremer_1.jpg"}];const FULL={"Consult_chateau_formulairea66d":{"id":"Consult_chateau_formulairea66d","dept":"80","canton":"Abbeville","commune":"Abbeville","nom":"Abbeville","type":"Château","periode":"XV-XVII","histoire":"deux châteaux dans cet article; Abbeville  et Bagatelle.                       ABBEVILLE, en 1209, le comte de Ponthieu se fit construire un donjon d'allure encore romane. Il a été assez gravement endommagé au cours de la dernière guerre, mais restauré depuis. La tour, haute de trente mètres, possède un plan carré de dix mètres de côté; chacune de ses faces a été renforcée par trois contreforts plats, larges d'environ un mètre. Une tourelle polygonale datant du XVe siècle, lui a été ajoutée du côté nord; du côté sud on lui a accolé les bâtiments qui abritent le musée Boucher-de-Perthes; la porte de celui-ci est une uvre flamboyante. En 1939 il était couvert d'une toiture en pavillon; aujourd'hui celle-ci est presque plate. L'uvre a été réalisée en moellons de grès assez irréguliers ; les murs sont épais de deux mètres à la base, mais ils n'ont plus que 1,60 m au sommet. Les trois cordons horizontaux qui marquent extérieurement ses étages contournent les contreforts. L'intérieur est divisé en quatre niveaux dont l'un est voûté. Les deux niveaux supérieurs sont éclairés par deux fenêtres rectangulaires par face; au sud, on remarque au deuxième niveau une arcature romane en plein cintre qui déborde sur l'étage suivant.\nÉléments protégés MH : le beffroi et la salle de la trésorerie : inscription par arrêté du 18 mai 1926. musée Boucher-de-Perthes.","architecture":"BAGATELLE, à la sortie dAbbeville, se cache lun des plus délicieux châteaux que lon puisse voir de cette époque. Niché dans un décor de verdure qui lenclot tout entier, Bagatelle offre un ensemble unique en France de boiseries peintes, darchitecture, de mobilier et de décorations dépoque. Demeure familiale, Bagatelle conserve tout le charme vivant dune maison habitée. Paul de Wailly redessina le parc dans sa conception primitive liée à l'architecture du château. Un boulingrin ovale orné de deux statues de faunes, précède la façade d'entrée, tandis que le jardin, dessiné à la Française, s'insère dans un hémicycle de tilleuls plantés en 1750. Ce sont ces derniers qui avaient incité Abraham van Robais à acquérir le terrain afin d'y faire élever ce bâtiment. Un parc paysager de 10 ha, planté d'essences rares, prolonge ce jardin. L'ensemble est demeuré l'objet de soins constants de la part de Jacques Wailly, architecte paysager, fils de Paul et père du propriétaire actuel.   En 1878, la ferme, devenue vétuste, a été remplacée par 2 ailes. Depuis, l'extérieur de la demeure n'a pas changé. Le château de Bagatelle appartient, aujourd'hui, à Mr Yannick Chagnon. Les de Wailly conserveront Bagatelle durant 2 siècles, avant de le vendre aux actuels propriétaires qui ont entrepris une campagne de restauration, des intérieurs et du jardin. Éléments protégés MH : le château : inscription par arrêté du 18 mai 1926. L'ensemble des jardins à la française et le parc: inscription par arrêté du 26 novembre 1946.","habitants":"Famille de Jacques Wailly\"","divers":"Deux  châteaux dans cet article; Abbeville et Bagatelle grav-1-2.                                                  Bagatelle  GPS : 50° 05' 42\" Nord, 1° 50' 36\" Est","gps":"50° 05' 42\" Nord, 1° 50' 36\" Est","images":["../image/image_80/80_Abbeville_1.jpg","../image/image_80/80_Abbeville_2.jpg"]},"Consult_chateau_formulairec2f9":{"id":"Consult_chateau_formulairec2f9","dept":"80","canton":"Abbeville","commune":"Abbeville","nom":"Abbeville_II","type":"châteaux","periode":"XVII-XIX","histoire":"Trois châteaux dans cet article d'Abbeville; Mareuil-Caubert, Emonville et Saigneville.                                                                                                                        MAREUIL-CAUBERT, de la fin du Moyen Age subsistent à Mareuil des restes intéressants. Son plan était polygonal; les bâtiments de ferme actuels en gardent le souvenir. La tour de la chapelle a conservé une salle basse et l'oratoire qui sont voûtés d'ogives sur culots, plus loin se dresse encore une tourelle polygonale. Dans la cour, des escaliers couverts d'arcs concentriques disposés en retrait les uns par rapport aux autres donnent accès à des souterrains. L'aquarelle que Oswald Macqueron a exécutée en 1867 représente le bâtiment qui se trouve au-delà et la tourelle polygonale qui lui est adjacente et dans laquelle des baies modernes ont été percées. Actuellement, de ce côté, les fossés existent toujours ainsi que ce corps de logis et la tourelle mais la végétation les dissimule. Un peu plus loin, à l'époque moderne, on a construit un pavillon de chasse qui est toujours habité.","architecture":"EMONVILLE, cet endroit, appartenant au prieuré Saint-Pierre, est acquis par la famille abbevilloise Foucques d'Émonville au début du XIXe siècle.Arthur d'Émonville (1809-1880) transforme les lieux en 1861. Un hôtel particulier néo-renaissance est construit par l'architecte parisien Hector Martin Lefuel (1810-1880) dans un jardin à l'anglaise. Une orangerie et des serres destinées à sa collection de camélias et d'arbres remarquables s'y ajouteront. Sans descendance, la propriété est rachetée par la ville pour en faire le Musée d'Abbeville et du Ponthieu. En 1965, l'hôtel devient la bibliothèque municipale et partage ses locaux avec le Service des Archives municipales et celui du Patrimoine.  A noter que la mairie ayant été détruite par des bombardements en 1940, ses services s'y installèrent provisoirement.\nLe jardin est agrémenté de bassins et de sculptures. Notamment cet Apollon en plomb de Jean de Bologne du XVIIIe siècle, qu'accompagnaient jadis Diane et Mercure. Ou ce loup emportant une brebis, poursuivi par un chien, une uvre en fonte de 1886 réalisée d'après Auguste Cain.                                                                                                                                                                                     SAIGNEVILLE le château de Saigneville,ce manoir de prestige a une superficie de 600 m²,  Situé dans la Baie de Somme, cette demeure date du XIXe siècle, avec une vue sur la mer et son parc d'1.8 ha. Belle maison de maître offrant environ 600m² en 3 niveaux desservis par un ascenseur et escalier rez-de-chaussée.","habitants":"Mareuil Oswald Macqueron\"","divers":"trois châteaux dans cet article d'Abbeville grav 2; Mareuil-Caubert, Emonville grav-3 et Saigneville grav-1.                                                           Saigneville  GPS : 50° 08' 17\" Nord, 1° 42' 45\" Est","gps":"50° 08' 17\" Nord, 1° 42' 45\" Est","images":["../image/image_80/80_Abbeville_II_1.jpg","../image/image_80/80_Abbeville_II_2.jpg","../image/image_80/80_Abbeville_II_3.jpg"]},"Consult_chateau_formulairec52e":{"id":"Consult_chateau_formulairec52e","dept":"80","canton":"Abbeville","commune":"Agenvillers","nom":"Agenviilers","type":"Châteaux","periode":"XVIII","histoire":"Deux châteaux dans cet article Angelivers et  Neuilly l'Hôpital.                                             Au nord d'Abbeville AGENVILLERS, la construction du château d'Agenvillers date du XVIIIe siècle. Dans le parc, se trouve le pigeonnier, construit en briques. Philippe Seydoux en attribue la construction à Claude Leroy de Saint-Lau (1600-1660), Seigneur de Genvillers et qui fut grainetier au grenier à sel d'Abbeville.","architecture":"NEUILLY L'HOPITAL   à cinq K.M à l'ouest , le château actuel de Neuilly-l'Hôpital, entouré d'un magnifique parc, fut construit en 1880 pour M. de Cormette. François 1er séjourna dans l'ancien château en septembre 1545, après avoir appris la mort, à Forest Montiers, de son fils Charles d'Orléans. La seigneurie, qui relevait de Domvast, appartenait alors à la famille le Moictier qui la conserva jusqu'au milieu du XVIIe siècle environ. En venant d'Amiens, le château est situé dans le bourg, sur la droite de la RD 32 qui traverse la localité. Le château de Neuilly l'Hôpital possède un jardin d'agrément qui est inscrit au pré-inventaire des jardins remarquables.","habitants":"Agevlillers Claude Leroy de St-Lau\"","divers":"Deux châteaux dans cet article Agenvillers grav-1 et  Neuilly -l'Hôpital.  Grav-2                                  Agenvillers GPS : 50° 10' 45\" Nord, 1° 55' 13\" Est","gps":"50° 10' 45\" Nord, 1° 55' 13\" Est","images":["../image/image_80/80_Agenvillers_1.jpg","../image/image_80/80_Agenvillers_2.jpg"]},"Consult_chateau_formulairee947":{"id":"Consult_chateau_formulairee947","dept":"80","canton":"Gamaches","commune":"Aigneville","nom":"Aigneville","type":"Château","periode":"XVIII","histoire":"AIGNEVILLE, l'architecte était Giraud Sannier. Vers 1540, Nicolas Danzel, seigneur de Brunville, receveur des droits seigneuriaux de la châtellenie de Maisnières, résidait déjà à Aigneville. En 1575, son fils, Nicolas reçut du roi Henri III ses lettres de noblesse et devint vicomte de Boismont. À l'époque, les seigneurs d'Aigneville ne résidaient pas dans le château actuel mais dans une maison seigneuriale aujourd'hui disparue. Au début du XVIIIe siècle, Jean Danzel, vicomte de Boismont, est mousquetaire de la Garde du Roi. La branche ainée des Danzel de Boismont s'éteignit au XIXe siècle avec les frères Auguste et Gustave, restés sans descendance. Deux branches cadettes existaient alors. La première, détachée au XVIIe siècle est à l'origine de l'actuel château d'Aigneville. La seconde branche est domiciliée dans une demeure du hameau voisin d'Hocquélus. Au début du XVIIe siècle, l'actuel château d'Aigneville n'est qu'un pavillon de plain-pied au milieu d'un vaste domaine agricole. La propriété appartient alors à Antoine-François Danzel qui demeure à Abbeville. En 1746, Philippe-François Danzel, président du grenier à sel d'Abbeville, hérite du domaine. Il fait réparer les divers bâtiments agricoles et lance la reconstruction de l'habitation. La nouvelle demeure construite est le corps central du château actuel. Elle est alors constituée au rez-de-chaussée, d'un vestibule, d'une salle à manger, d'une office, d'un salon et à l'étage de quatre chambres. A la Révolution française, le château appartient à Louis-Antoine Danzel, capitaine de cavalerie aux Gardes du Corps du Roi.","architecture":"AiGNEVILLE,  la construction du château date du XVIIIe siècle, de style néo-Classique. Ce militaire décide de se fixer sur ses terres d'Aigneville pour se consacrer à l'exploitation du domaine agricole. Il devient d'ailleurs maire de la commune en l'an VIII. Son fils Louis-César Danzel fait construire les 2 ailes en légère saillie du château qui abritent une bibliothèque, une grande cuisine, 4 nouvelles chambres. Au tout début du XXIe siècle, le domaine d'Aigneville est constitué du château et de plusieurs bâtiments agricoles. La bâtisse principale et plusieurs bâtiments bénéficient alors d'une très importante rénovation. L'immense grange, en ruine, devra toutefois être détruite. Devenu la propriété de la famille Danzel depuis sa construction, le château d'Aigneville fut cédé, à la fin 2020 et quitta le giron familial.","habitants":"Famille Antoine-François Danzel \"","divers":"AIgneville GPS : 50° 01' 58,46\" Nord, 1° 37' 2,65\" Est","gps":"50° 01' 58,46\" Nord, 1° 37' 2,65\" Est","images":["../image/image_80/80_Aigneville_1.jpg"]},"Consult_chateau_formulairee72a":{"id":"Consult_chateau_formulairee72a","dept":"80","canton":"Ailly-sur-Somme","commune":"Airaines","nom":"Airaines","type":"Châteaux","periode":"XV-XVIII","histoire":"Trois châteaux dans cet article; Airaines, Beauvoir et le Quenoy              AIRAINES, gouverné par Renaud seigneur de Saint Valéry qui reçut de Baudouin III, roi de Jérusalem et comte de Bourgogne, fait construire de solide défense à Araines, il remplace une motte féodale en bois par un château en pierre, puis, vingt ans plus tard, une autre forteresse est construite à quelque mètres. Le château devient le siège d'une sénéchaussée après être passé par alliance, en 1278 au Roi d'Angleterre Edouard 1er. En 1589, le château d'Airaines est démantelé après le passage de la ligue. L'édifice est restauré en 1620 par le duc Charles Philippe d'Albert de Luynes. Il ne subsiste de l'ancien château, les deux tours hexagonales datant du XVIIe siècle (Tours de Luynes).\nÉléments protégés MH : le château des ducs de Luynes ou Chatellenie : inscription par arrêté du 5 juillet 1926.                                                              BEAUVOIR ; à Hallencourt  à trois K.M, à l'ouest ce château, d'époque du XVIIIe siècle, entouré dun bois et dun parc privés, domine les collines dHocquincourt. Le château de Beauvoir est toujours demeuré dans la même famille, voilà pourquoi on trouve, dans son enfilade de pièces de réception, cette ambiance inimitable où saccumulent mobiliers anciens, portraits, objets divers, et avec même, ici ou là, ces portions de peinture craquelée marquant la patine des ans. Tout aussi charmantes, les chambres sont à dominante orangée ou vert tilleul,  offrent une vue sur le magnifique cadre de verdure.","architecture":"QUESNOY sur Airaines  village voisin à l'est.  La terre de Quesnoy a appartenu à plusieurs seigneurs parmi lesquels on trouve, en 1279, Hugues d'Airaines et, en 1301, Enguerran d'Airaines. Le 10 février 1358, Robert de Picquigny, qui posseédait la terre depuis six ans, la légua à son petit-neveu et filleul, Robert d'Ailly. Les d'Ailly étaient seigneurs du lieu lorsqu'au mois de mars 1422 le château de Quesnoy fut détruit; il fut assiégé et pris par les Anglo-Bourguignons, sous la conduite de Jean de Luxembourg. Vers 1440, lsabeau d'Ailly ayant épousé Christophe Quiéret, la seigneurie entra dans cette famille qui la conservera jusqu'au début du XVIIe siècle. Le domaine fut vendu et devint alors la propriété des Dault, et quelques années plus tard, par alliance, des Le Fort de Fermembrun. A la suite du mariage en 1670, d'Antoinette Le Fort avec François le Roy, chevalier, seigneur de Moyenneville et Valanglart, la seigneurie appartint à cette famille qui la possédait encore en 1789. C'est à elle que l'on doit la construction du château actuel de Quesnoy, en 1682. Il se compose d'un grand corps de bâtiment principal, en brique, surmonté au centre, d'un fronton triangulaire et flanqué de deux ailes en retour d'équerre, édifiées en pierre. Du côté du parc, l'avant-corps central, très saillant, forme une rotonde qui est précédée d'un perron.\nÉléments protégés MH : les façades et les toitures du château ; l'écurie du XVIIIe siècle,le  bâtie en pierre de taille et la glacière: inscription par arrêté du 19 novembre 1993.","habitants":"Airaines,le duc Charles Philippe d'Albert de Luynes.                               Beauvoir;                                  Quesnoy;  Christophe Quiéret\"","divers":"Trois châteaux dans cet article; Airaines grav 1-2, Beauvoir grav -4 et le Quenoy grav 3                                     Airaines GPS : 49° 57' 57\" Nord, 1° 56' 35\" Est                                                             Beauvoir GPS : 49° 59' 32\" Nord, 1° 52' 40\" Est                                                       Quesnoy GPS : 49° 57' 24\" Nord, 1° 59' 30\" Est","gps":"49° 57' 57\" Nord, 1° 56' 35\" Est","images":["../image/image_80/80_Airaines_1.jpg","../image/image_80/80_Airaines_2.jpg","../image/image_80/80_Airaines_3.jpg","../image/image_80/80_Airaines_4.jpg"]},"Consult_chateau_formulaire0bdf":{"id":"Consult_chateau_formulaire0bdf","dept":"80","canton":"Ailly-sur-Noye","commune":"Courcelles-sous-Thoix","nom":"Alleux_80","type":"Châteaux","periode":"XVI","histoire":"Deux châteaux dans cet article Alleux  et le manoir d'Alleux.                        ALLEUX , le fief relevait de la baronnie de Picquigny. Il consistait en une maison seigneuriale avec masures, enclos, terres labourables et bois en 1771. Il appartenait au XVIIe siècle. à la famille Le Clercq d'Amiens pour une partie et pour une autre aux Du Val. Jean Du Val était en 1679 prévot des maréchaux de France en Picardie.   Sur la clef centrale de l'arc, on lit encore la date de 1638. Location de chambres d'hôtes de Renée et François de Fontanges.","architecture":"ALLEUX, le château est en pierre composé d'un corps de logis central à deux niveaux flanqué de deux ailes plus basses. Le corps de logis rectangulaire est percé à chaque niveau de cinq ouvertures rectangulaires celles de la travée centrale comprenant une porte surmontée d'une fenêtre sont plus larges, la travée est séparée des autres par deux jambes en bossages qui montent du sol jusqu'à l'appui du toit. Le corps de logis est séparé des ailes latérales plus basses par des chaînes d'angle. Le toit à croupes en ardoise est percé à sa base de cinq hautes lucarnes. Le château s'ouvre par une porte monumentale en brique et pierre; ces dernières forment des bossages saillants.  une table d'hôtes et des gîtes situés du côté de la Baie de la Somme. Le manoir des Alleux date du XVIIe au XVIIIe siècle.  Vous découvrirez un grand parc boisé avec son jardin potager et une ferme en activité.","habitants":"château d'alleux famille Le Clercq d'Amiens                                  manoir René-François et Elisabeth de Fontanges\"","divers":"Deux châteaux dans cet article Alleux  et le manoir d'alleux.   Alleux. GPS : 50° 02' 38\" Nord, 1° 46' 01\" Est","gps":"50° 02' 38\" Nord, 1° 46' 01\" Est","images":["../image/image_80/80_Alleux_80_1.jpg","../image/image_80/80_Alleux_80_2.jpg","../image/image_80/80_Alleux_80_3.jpg"]},"Consult_chateau_formulaire74eb":{"id":"Consult_chateau_formulaire74eb","dept":"80","canton":"Amiens","commune":"Amiens","nom":"Amiens","type":"Château","periode":"XVII","histoire":"Quatre châteaux dans cet article Amiens, Boury, le Fouilloy, Argoeuvres , St-Fuscien.                                                                                                                                         AMIENS Classée aux M.H. depuis 1862. est aussi  passionnant que le musée Picardie à découvrir. Au XVIIIe siècle, Étienne de Fay créa, à l'Abbaye Saint-Jean-des-Prémontrés d'Amiens, un cabinet d'antiquités et de curiosités, composé d'une collection d'objets divers parmi lesquels, 16 tableaux du XVIIe siècle,  statue de la Vierge en albâtre du XVe siècle,  plat de Bernard Palissy, des pièces de numismatique, des céramiques, des instruments d'astronomie. En 1786, le Vicomte de Breteuil adressa, au roi, une lettre lui demandant l'autorisation de créer un Musée à Amiens. La Révolution Française empêcha, provisoirement, ce projet. En 1802, 85 tableaux et gravures furent déposés à la Malmaison, pour former le « Musée de la Bourse ». Au moment de la signature de la Paix d'Amiens, l'État les  fit déposer à l'Hôtel-de-Ville d'Amiens.                                                                                           FOUILLOY à l'Est d'Amiens en 1636, le siège de Corbie. La collégiale de Fouilloy est alors incendiée. Les bateliers de Fouilloy :   Bâtiment en brique, de la fin du XIXe siècle, aux allures de château, résidence privée appartenant à la famille Blanchard, rachetée par la commune en 1943. Un parc enherbé est situé à l'arrière de l'édifice.                                                                BOURY à Thézy-Climont  possède 2 façades reliées par un fronton triangulaire. Une avancée à 3 pans complète le château, côté Est.                      partie sud d'Amiens,                                                                                                  ST-FUSCIEN En 1105, Enguerrand de Boves, comte d'Amiens dote l'abbaye de Saint-Fuscien qui est restaurée et occupée par des bénédictins. En 1648, le logis abbatial (dit à présent château de Saint Fuscien) est reconstruit, lors de la Révolution française, la congrégation bénédictine est dissoute en 1790, les biens de l'abbaye deviennent propriété de la nation, les bâtiments conventuels sont vendus à un particulier. De grandes modifications sont effectuées et une partie des bâtiments sont démolies pour récupérer des matériaux de construction. À présent, il ne subsiste que l'hôtel abbatial dit château de Saint-Fuscien.","architecture":"ARGOEUVES;  village voisin, c'est le général de cavalerie Pierre-Auguste Dejean, colonel de dragons, lieutenant général et aide de camp de l'Empereur, qui construisit le château. Il y a tout lieu de penser que c'est seulement au début du XIXe siècle que Dejean, alors âgé d'une trentaine d'années, s'est improvisé maître d'uvre. C'est donc sous l'Empire que Dejean dut dresser, pour son amie Gorguettes d'Arguves (la famille était propriétaire de la seigneurie depuis le milieu du XVIIe siècle), les plans de l'unique édifice que l'on possède de lui et qui constitue par conséquent un intéressant témoignage de ses talents d'architecte occasionnel. Le château est une aimable folie entièrement en pierre, son style et l'ordonnance de ses façades restent très influencés par le XVIIIe siècle bien qu'il soit d'une construction plus tardive. A la façade principale la porte d'entrée est précédée d'un petit portique constitué de deux colonnes d'ordre dorique, cannelées dans leur partie inférieure, supportant une frise ornée de triglyphes et de métopes. L'avant corps, dans l'alignement de la façade, est surmonté d'un fronton triangulaire, alors que sur le parc l'avant corps est à trois pans et par conséquent saillant. A l'intérieur, des décors de stucs, de lambris ainsi que des peintures symbolisant les travaux champêtres sont conservés.  Éléments protégés MH : le château, façades et toitures, ses dépendances (dont le pigeonnier et la serre) et son parc, en totalité: inscription par arrêté du 5 février 2013, modifiée par arrêté du 30 juin 2015.","habitants":"Amiens;  Vicomte de Breteuil                              Argoeuves;  Pierre-Auguste Dejean  Fouilloy  ; famille Blanchard,\"","divers":"Quatre châteaux dans cet article Amiens grav-1  Argoeuvres  grav-4 Fouilloy - grav-5 et Boury grav-2 , St-Fuscien grav-3.                           Amiens   GPS : 49° 53' 26\" Nord, 2° 17' 47\" Est                                                                                 Argroeuvre  GPS : 49° 55' 47\" Nord, 2° 13' 31\" Est                                               Fouilloy GPS : 49° 54' 01\" Nord, 2° 30' 16\" Est                                                  Boury; GPS : 49° 48' 47,88\" Nord, 2° 25' 51,96\" Est","gps":"49° 53' 26\" Nord, 2° 17' 47\" Est","images":["../image/image_80/80_Amiens_1.jpg","../image/image_80/80_Amiens_2.jpg","../image/image_80/80_Amiens_3.jpg","../image/image_80/80_Amiens_4.jpg","../image/image_80/80_Amiens_5.jpg"]},"Consult_chateau_formulaire7a22":{"id":"Consult_chateau_formulaire7a22","dept":"80","canton":"Rue","commune":"Argoules","nom":"Argoules","type":"Château","periode":"XVI","histoire":"ARGOULES, parc avec jardin et étang. La seigneurie d'Argoules appartenait aux XIIe et XIIIe siècles à une famille qui en portait le nom. Puis elle fut  par mariages ou par héritages la propriété des familles de Cambron aux XIIIe et XIVe siècles, Blondel au XVe siècle et de Benssérade au XVIe siècle. C'est semble-t-il pour les Benssérade que fut construit le château actuel, et qui a conservé son aspect raffiné de belle gentilhommière malgré les importantes restaurations dont il fut l'objet au XIX siècle. Au XVIIe siècle, ce château passa dans plusieurs mains avant d'être acheté, vers 1700, par Jacques Godart de Beaulieu, écuyer. En 1807 la terre d'Argoules fut transmise par mariage des Godart de Beaulieu aux Jourdain de l'Étoille qui en demeurèrent propriétaires jusqu'au début du XXe siècle. Aujourd'hui propriété de monsieur Duflot.","architecture":"ARGOULES; a été construit au cours du XVIe siècle. Quoique assez modifié au XIXe siècle dans le style néo-gothique, dans son décor et ses ouvertures, il présente une architecture de bonne facture et aux proportions très harmonieuses, y compris avec l'aile en prolongement construite en pierre calcaire au cours du XVIIIe siècle ou au début du XIXe siècle.  Du XVIe siècle en brique et pierre avec un corps de logis flanqué de 4 tourelles d'angle à poivrières, octogonales, et fut restauré au XIXe siècle dans le style néo-Gothique. Une aile en prolongement a été édifiée en pierre calcaire au cours du XVIIIe siècle. Le château d'Argoules est inscrit aux M.H. depuis 2009. Le propriétaire actuel du château d'Argoules est Mr Pierre de Maricourt. Il est classé aux M.H. depuis 2009. Il vous est proposé la location de salles pour votre mariage, ou des réunions de séminaires.\nÉléments protégés MH : le château, les façades et les toitures, comprenant la terrasse nord talutée avec son escalier et l'escalier intérieur : inscription par arrêté du 23 septembre 2009.","habitants":"Familles de Cambron\"","divers":"Argoules GPS : 50° 20' 36\" Nord, 1° 50' 02\" Est","gps":"50° 20' 36\" Nord, 1° 50' 02\" Est","images":["../image/image_80/80_Argoules_1.jpg"]},"Consult_chateau_formulaire4838":{"id":"Consult_chateau_formulaire4838","dept":"80","canton":"Abbeville","commune":"Arrest","nom":"Arrest_Drancourt","type":"Château","periode":"XVI","histoire":"Deux châteaux dans cet article Arrest,  Drancourt et Tirancourt.                                                        ARREST, la construction de l'édifice fut entreprise en 1575 (gravé sur une pierre du bâtiment) par Charles de La Chaussée d'Eu, seigneur de La Chaussée et d'Arrest, chevalier de l'ordre du Roi, et gouverneur des villes  et comté d'Eu, mort avant 1583., originaire d'Arrest, sans en être les seigneurs d'Abbeville, à partir de 1310, les membres de cette famille  remplirent des fonctions municipales et s'allièrent à un grand nombre de familles les plus marquantes de l'ancienne bourgeoisie. Le château d'Arrest est privé, fermé au public.                                                                                                                                        A cinq K.M.au nord DRANCOURT à Esteboeuf, fut construit dans la deuxième moitié du XIXe siècle, son jardin d'agrément est inscrit au pré-inventaire des jardins remarquables. Dans lenvironnement préservé de la Baie de Somme, grand site de France qui appartient au club des plus belles baies du monde, le domaine est un écrin naturel de grande qualité                       au nord d'Arrest.                                                                                                   TIRANCOURT, le château a été construit au début du XVIIIe siècle, remanié au XIXe siècle. Au XVIIIe siècle,  avec ses dépendances a ensuite connu plusieurs propriétaires. En 1731, Charlotte-Philippe de l'Estocq, propriétaire, vend le domaine à la famille le Sénéchal, c'est Jacques Le Sénéchal, bourgeois d'Amiens et Anne-Françoise Devie son épouse, qui achètent la maison principale, composée d'un corps de bâtiment et chapelle y tenant. Le parc du château possède un jardin d'agrément inscrit au pré-inventaire des jardins remarquables.","architecture":"ARREST, a l'aspect des châteaux de plaisance construits à la fin du XVIe siècle mais il avait conservé de l'époque antérieure la tradition de l'enceinte, construite après l'achèvement du château. Cette enceinte, détruite, faisait de cette demeure, une véritable gentilhommière fortifiée. Le château actuel se compose d'un corps de logis rectangulaire sous un haut toit à double pente, couvert, jusqu'à la Révolution, en feuilles de plomb. Il se terminait par deux pignons à pas de moineaux dont une partie est encore visible. Aux quatre angles, il est flanqué de quatre tours presque carrées formant pavillons, couvertes de toitures à quatre pentes et percées sur leur petit côté d'ils-de-buf à chaque étage. Tant par son plan que par son élévationon fut porté du XIVe au XVIIIe siècle par la famille d'Arrest. Au XIXe siècle des restaurations malencontreuses ont défiguré le château. Contre chaque pignon fut plaquée, entre les deux tours d'angle, une tourelle polygonale. Le toit à double pente  fut percé à sa base de lucarnes, et une grille ajourée fut posée sur le faîte.    Le blason fut porté du XIVe au XVIIIe siècle par la famille d'Arrest, originaire d'Arrest, sans en être les seigneurs.","habitants":"Famille D'Arrest\"","divers":"Deux châteaux dans cet article Arrest grav-1 et Drancourt grav-2-3-4. Tirancourt grav 5-                                   Arrest   GPS : 50° 07' 48\" Nord, 1° 37' 03\" Est                                                  Drancourt  GPS : 49° 40' 01\" Nord, 2° 43' 59\" Est                                                 Tirancourt .GPS : 49° 57' 2,57\" Nord, 2° 09' 42,07\" Est","gps":"50° 07' 48\" Nord, 1° 37' 03\" Est","images":["../image/image_80/80_Arrest_Drancourt_1.jpg","../image/image_80/80_Arrest_Drancourt_2.jpg","../image/image_80/80_Arrest_Drancourt_3.jpg","../image/image_80/80_Arrest_Drancourt_4.jpg","../image/image_80/80_Arrest_Drancourt_5.jpg"]},"Consult_chateau_formulairefe47":{"id":"Consult_chateau_formulairefe47","dept":"80","canton":"","commune":"Arry","nom":"Arry","type":"Château","periode":"XVIII","histoire":"ARRY, la construction date du 3e quart du XVIIIe siècle. Il est de style néo-Classique. Le Ccomte de Courteville d'Hodicq, joueur de cartes passionné, perdit toute sa fortune au jeu. Se plaignant qu'il ne pourrait faire bâtir son rendez-vous de chasse, la Reine Marie Leczinska l'entendit : elle lui remit l'argent en jeu et le lui fit regagner. Une console dans le salon, ornée d'un jeu de cartes, dessiné dans le marbre, « le Jeu de la Reine » rappelle l'évènement. Le comte de Courteville fit construire, en 1761, son rendez-vous de chasse . Le Château d'Arry est Classé aux M.H. depuis le 2/03/1979 il  est ouvert au Public. Vous y verrez les Intérieurs et les Extérieurs.                                                                                                 A quelques K.M au sud ouest à Albert le fort ROYAL-PICARDIE hôtel.","architecture":"ARRY en pierre et brique par l'architecte Giraud Sannier qui était aussi entrepreneur. Les façades et toitures du château et des deux pavillons de la cour d'honneur, plusieurs pièces du château (vestibule, escalier intérieur avec sa rampe en bois le grand et le petit salon du rez-de-chaussée tous deux décorés) ainsi que les deux perspectives axiales et la pièce d'eau (rivière de la Maye) et les 3 allées latérales, à l'Est, sont classées aux M.H.depuis le 2/03/1979.Arry possède de belles façades et les toitures du château ainsi que deux pavillons de la cour d'honneur, un vestibule, un escalier intérieur avec sa rampe à balustres en bois, les grand et petit salons avec leur décor au rez-de-chaussée et leurs 2 perspectives axiales.","habitants":"Le Comte de Courteville d'Hodicq,\"","divers":"Arry GPS : 50° 16' 39\" Nord, 1° 43' 32\" Est","gps":"50° 16' 39\" Nord, 1° 43' 32\" Est","images":["../image/image_80/80_Arry_1.jpg","../image/image_80/80_Arry_2.jpg"]},"Consult_chateau_formulaire7503":{"id":"Consult_chateau_formulaire7503","dept":"80","canton":"Poix-de-Picardie","commune":"Asvenes Chaussoy","nom":"Avesnes_Chaussoy","type":"Château","periode":"XVI-XVIII","histoire":"AVESNES, la seigneurie d'Avesnes appartenait au Moyen-Age à une famille qui en porta le nom pendant plus de deux siècles, de 1164 à 1395. En 1440, elle était la propriété de Guy IV  de Nesle. Sa fille, Jeanne, la transmit, par mariage avec Antoine de Villiers de l'lsle-Adam qui mourut le 25 août l504 laissant pour héritier son fils Claude, qui entreprend la construction d'une résidence plus confortable, il la cèda en 1530 à Jacques des Fontaines seigneurs d'Etrejust et deux ans plus tard  la cèda   à de la famille de  Jean de Calonne d'Avesnes époux de Marie de Machy et père d'un autre Jean. En 1645  Pierre de Calonne rachète leur part aux Fontaines et réunifie à son profit le domaine, son descendant Louis Edouard allié à Françoise Renée de Bommy  fait bâtir l'aile basse. Son petit fils Raoul épouse en 1844 Geneviève de Morgan fait supprimer les bâtiments agricoles. Au XXe siècle Xavier de Calonne refait les façades.","architecture":"AVESNES, date des XVIe et XVIIIe siècles, Le château d'Avesnes, dont la façade principale, orientée au sud,  se compose d'un long corps de bâtiment de plan rectangulaire, édifiée en brique et pierre, la pierre étant réservée aux pourtours des portes et des fenêtres et au bandeau séparant le rez-de-chaussée de l'étage. Entre ce rez-de-chaussée et l'étage, on remarque des \"ancres de construction\" qui sont au moins pour la moitié en bois, ce qui est rare puisque il s'agit de barres métalliques empêchant l'écartement des murs. Le bâtiment principal est prolongé à l'ouest par une aile plus petite édifiée en lits alternés de brique et pierre, ne comprenant qu'un rez-de-chaussée couvert  d'un toit à la Mansart. Il convient de signaler l'existence d'un colombier de plan octogonal du XVIIIe siècle, situé au sud-est. La façade nord de l'habitation donne sur des jardins dessinés à la française en une succession de terrasses s'étageant jusqu'au sommet de la colline couronnée par une futaie de hêtres. Le château et ses dépendances (communs, colombier) sont protégés aux M.H. Il est inscrit par arrêté du 25/01/1980.  C'est un ensemble de bâtiments de brique et pierre. Le corps de logis est flanqué d'une tourelle d'escalier hexagonale. Il est prolongé par un bâtiment d'une hauteur plus réduite. Outre les piliers d'entrée, les éléments les plus remarquables du château sont le grand salon et la grande chambre au premier étage avec leur décor. Le grand salon possède des lambris moulurés, une cheminée de marbre sculpté et un plafond avec gypserie, possède aussi des lambris moulurés, une cheminée de style Louis XV en marbre sculpté et une glace au trumeau en gypseries du XVIIIe siècle.","habitants":"Famille de Calonne d'Avesnes\"","divers":"Avesnes, Chaussoy grav 1-2- 3-4                                GPS : 49° 54' 2,16\" Nord, 1° 52' 14,23\" Est","gps":"49° 54' 2,16\" Nord, 1° 52' 14,23\" Est","images":["../image/image_80/80_Avesnes_Chaussoy_1.jpg","../image/image_80/80_Avesnes_Chaussoy_2.jpg","../image/image_80/80_Avesnes_Chaussoy_3.jpg","../image/image_80/80_Avesnes_Chaussoy_4.jpg"]},"Consult_chateau_formulaireb7ac":{"id":"Consult_chateau_formulaireb7ac","dept":"80","canton":"Gamaches","commune":"Bailleul","nom":"Bailleul","type":"Châteaux","periode":"XI_XVII","histoire":"Deux châteaux dans cet article; Bailleul et Cocquerel.                                      BAILLEUL,  château-fort à motte construit au XIe siècle par Rainault de Bailleul. De 1267 à 1363, les seigneurs de Bailleul ont été Rois dEcosse. La famille de Bailleul possédait quatre grands domaines et châteaux dans le pays : à Bailleul, à Hornoy, à Dompierre-sur-Authie et à Hélicourt. Le siège principal de ces vastes domaines se trouvait tout naturellement dans le village qui a donné son nom à cet illustre famille. Le château actuel, de plan régulier, est édifié au XVIIIe siècle pour la famille de Gautier.\nElévation : élévation à travées  à un étage carré  escalier dans-oeuvre ; escalier tournant à retours avec jour.  Gros-oeuvre : calcaire ; moellon ; enduit et à toit à longs pans et croupe couverts de tuile plate et ardoise.","architecture":"COCQUEREL, le château de Cocquerel, construit sur un plateau, se trouve à un km environ au sud du village de Bailleul. L'ancien château de Cocquerel aurait été construit au début du XVIIe siècle, peu avant 1607. Il appartenait alors à François Decourt, écuyer, seigneur de Cocquerel. De cette époque, le château actuel, construction en brique de plan rectangulaire et d'un étage sur rez-de-chaussée datant du XIXe siècle, conserve une partie des murs en pierre et surtout une aile en brique et pierre, visiblement du début du XVIIe siècle. Au milieu de la cour de ferme contiguë au château, a été conservé le pigeonnier en galandage de plan carré.","habitants":"famille de Bailleul              Cocquerel; François Decourt,\"","divers":"Deux châteaux dans cet article; Bailleul grav-1-2  et Cocquerel  grav-3.","gps":"","images":["../image/image_80/80_Bailleul_1.jpg","../image/image_80/80_Bailleul_2.jpg","../image/image_80/80_Bailleul_3.jpg"]},"Consult_chateau_formulairea433":{"id":"Consult_chateau_formulairea433","dept":"80","canton":"Poix-de-Picardie","commune":"Beaucamps","nom":"Beaucamps","type":"Château","periode":"XIV-XVI","histoire":"BEAUCAMPS, c'est au XIVe siècle qu'est attestée la première mention de la maison seigneuriale de Beaucamps. En 1539, Anne de Pisseleu, duchesse d'Etampes, favorite du roi François 1er, acquière le fief. Elle aurait entrepris la construction de la demeure l'actuelle en 1537 et achevée en 1574. Des transformations marquent le château au cours du XVIIIe siècle. Il s'agit de la reconstruction ou réparation de l'aile des étables et bergeries, qui ferme la cour à l'est et qui porte la date de 1771. Le château, acquis par l'Evêché d'Amiens, est occupé dans les années 1960-1970, par une colonie de vacances avant d'être racheté en 1975, par la famille Richard, antiquaires. Cette dernière, après avoir pillé les biens du château, revend la demeure à une Sté britannique qui souhaitait y créer un complexe hôtelier, mais fait faillite avant de commencer la rénovation de la demeure. La \"communauté des Emmaüs\" s'établit dans les lieux vers 1985 et achève de démonter ce qui reste du monument. Depuis le 13 mai 2000, M. et Mme Sylla se sont portés acquéreur du château, et ont commencé quelques travaux de nettoyage, de défrichage qui devraient permettre de sauver le bâtiment.Éléments protégés MH : les façades et les toitures du château et des deux porteries : classement par arrêté du 3 juillet 2003.                                                                                                                    NEUVILLE à Coppegueule, village voisin le corps de bâtiment principal rectangulaire en briques à soubassement de grès est daté de 1659 par ancrage. Il est prolongé par deux ailes symétriques à niveau unique au début du XIXe siècle. Toiture en croupe recouverte d'ardoises, belle charpente peut-être originelle, façade principale a appareillage losange et briques, colombier isolé au centre de la cour, en ardoise et brique avec enduits de chaux blanche. Éléments protégés MH : les façades et les toitures des bâtiments suivants : le manoir proprement dit, y compris les ailes ajoutées au XIXe siècle ; le pigeonnier ; le bâtiment des communs fermant la cour au Sud-Est : inscription par arrêté du 16 février 1988.","architecture":"a dix K.M. au nord ouest  St-AUBIN-RIVIERE, il subsiste le bâtiment principal et les ailes latérales édifiés en brique et pierre sur des soubassements en grès et paraissant dater du XVIIe siècle ou peut-être de la fin du XVIe siècle. La façade sur jardin du corps de logis dont l'élévation est à deux étages, présente l'étrange particularité d'être sur une moitié  en pierre et sur l'autre moitié en brique. Cette demeure a subi au cours des siècles, plusieurs remaniements. Ainsi l'aile, aujourd'hui surmontée d'un toit à la Mansart, était jusqu'au siècle dernier couverte d'un haut toit à double pente comme le sont l'autre aile et le corps de logis. Au-dessus de la porte du bâtiment des communs qui a été conservé, figurent, sur une pierre rapportée, les armoiries sous couronne de marquis et entourées de palmes, de la famille d'Auxy qui possèda le château aux XVIIe et XVIIIe siècles, Guy de Monceaux d'Auxy ayant épousé vers 1600, Suzanne de Soyécourt qui en était alors propriétaire.                                                                                BEAUCAMPS, la  construction  de Beaucamp date de des XVIe, XVIIe,  Le château de Beaucamps-le-Jeune est de style Renaissance. Construit en brique et pierre, il a été particulièrement dégradé au cours des siècles. La communauté des Lazaristes, propriétaire de l'édifice en 1920, fit rajouter une longue aile à l'Est de l'entrée du château. De nombreux motifs ont été réalisés en brique noire qui décorent les murs et les tours du château des Anges, un peu comme on les observe sur les églises fortifiées de la Thiérache. La restauration du Castel des Anges a été entreprise en 2017 et 2018. Une association de sauvegarde du château de Beaucamp s'est constituée et organise, chaque été, le 15 août, depuis 2009, une Fête médiévale, avec la participation d'une compagnie de fauconnerie équestre réputée, appelée l'Hippogriffe. Le château  partiellement rénové, sert régulièrement de cadre à de nombreuses animations. Aujourd'hui, il est appelé le Castel des Anges.","habitants":"Anne de Pisseleu, duchesse d'Etampes            St-Aubin famille d'Auxy \"","divers":"Beaucamps grav 1_à 5 et Neuville grav 6 et St-Aubin Rivière GPS : 49° 49' 3,11\" Nord, 1° 46' 16,77\" Est","gps":"49° 49' 3,11\" Nord, 1° 46' 16,77\" Est","images":["../image/image_80/80_Beaucamps_1.jpg","../image/image_80/80_Beaucamps_2.jpg","../image/image_80/80_Beaucamps_3.jpg","../image/image_80/80_Beaucamps_4.jpg","../image/image_80/80_Beaucamps_5.jpg","../image/image_80/80_Beaucamps_6.jpg"]},"Consult_chateau_formulairebcb2":{"id":"Consult_chateau_formulairebcb2","dept":"80","canton":"Corbie","commune":"Beaucourt sur l","nom":"Beaucourt","type":"château","periode":"XVII","histoire":"BEAUCOURT    En 1745, les terres et seigneuries de Beaucourt, Esbart et Bigaudelle sont vendues à Alexandre Du Fresne, seigneur de la Motte et maire d'Amiens,  c'est  pour lui qu'est alors construit le château, vers 1750 (la date 1753 apparaît dans une cave). Par ailleurs le pressoir au sud du château porte la date de 1787. Au XIXe siècle, sont édifiés près du corps de logis, deux pavillons en brique dont il ne reste que les cuisines, au nord. Deux ailes latérales (aujourd'hui disparues) sont rajoutées au corps de logis par l'architecte Herbault (1855). Le chalet en brique près du grand potager, à l'ouest du château, est quant à lui construit en 1877 sur les plans de Delefortrie. La cour de ferme date également du XIXe siècle. En 1887, une campagne de travaux est conduite sur le corps de logis par l'architecte Poinot pour Léon de Monclin (inscriptions en haut de la façade sur jardin). Le château est occupé par des troupes pendant les guerres de 1870, 1914-1918, et 1940-1945.  Le château de Beaucourt constitue une vaste propriété comprenant un corps de logis isolé entre cour et jardin, et diverses dépendances au nord, au sud et à l'ouest. Le corps de logis est un bâtiment en craie sur soubassement de grès, couvert en ardoise. En élévation, le corps principal comporte un étage-carré et un étage de comble, couverts par un toit à croupe. Il est encadré par deux petites ailes plus basses (rez-de-chaussée et combles), couvertes par une croupe brisée. Cette élévation simple, mais élégante, est couronnée par un fronton central triangulaire. Les deux façades, sur cour et sur jardin.","architecture":"BEAUCOURT,   couvertes par une croupe brisée. Cette élévation simple, mais élégante, est couronnée par un fronton central triangulaire. Les deux façades, sur cour et sur jardin, suivent la même ordonnance mais l'élévation antérieure présente en outre une véranda. A l'intérieur, le château a conservé bon nombre d'éléments du XVIIIe siècle: escalier avec rampe en ferronnerie, parquets (motif en marqueterie dans le salon), boiseries (remaniées au XIXe siècle). Au nord du corps de logis s'élève un bâtiment en brique, couvert par un toit brisé, qui abritait les cuisines. Au sud se trouvent un petit pavillon bas, une serre donnant sur le petit potager, et un ensemble de dépendances en U abritant logement, écuries et pressoir. Sous le pressoir est creusée une cave en brique et pierre en assises alternées. Une cave semblable s'étend sous le bâtiment des cuisines. Le domaine s'étendait à l'origine vers l'ouest, au-delà de la rue du Château, avec un grand potager dont demeure la maison du jardinier, bâtiment en brique comportant logement et remise. Enfin, au nord du château se trouve une cour de ferme dont les bâtiments (logement et étables) sont construits en briques et moellons de craie. Dans la cour s'élève un pigeonnier octogonal avec base en pierre, murs en pans de bois couverts d'un essentage d'ardoise, et flèche en ardoise couronnée d'un épi de faîtage en forme de pigeon.","habitants":"Famille Alexandre Du Fresne\"","divers":"Chateau de Beaucourt sur l'Hallue gps 49° 59' 16? nord, 2° 26' 44? est","gps":"","images":["../image/image_80/80_Beaucourt_1.jpg"]},"Consult_chateau_formulaire113c":{"id":"Consult_chateau_formulaire113c","dept":"80","canton":"Moreuil","commune":"Beaucourt en Santerre","nom":"Beaucourt_Santerre","type":"Château","periode":"XVII","histoire":"Deux châteaux dans cet article; Beaucourt et  Arvilliers.                                                        BEAUCOURT, le dimanche 30 août 1914, à 10h du matin, les Allemands ont fait leur entrée à Beaucourt par la route de Caix puis repartis le lundi à 4h du matin en mettant sans dessus dessous et dévalisant le château, il ne fut pas endommagé mais les archives du château ont disparu. L'historique actuel de ce château ne nous est pas connu. On peut admirer dans le beau parc une haute et mince tourelle. Le château de Beaucourt-en-Santerre, construit au XVIIe siècle, fait l'objet d'une inscription au pré-inventaire des jardins remarquables.                                                                                                                               Au sud à 10 K.M. ARVILLIERS  est un château privé, fermé au Public.","architecture":"BEAUCOURT,  château de Beaucourt-en-Santerre date du XVIIe siècle et, a fait l'objet d'un pré-inventaire (pour ses jardins remarquables). Dans le parc du château de Beaucourt-en-Santerre se trouve une belle et mince tourelle.","habitants":"seigneurs locaux\"","divers":"Deux châteaux dans cet article; Beaucourt grav1-2-3 et  Arvilliers grav-4. GPS : 49° 47' 38\" Nord, 2° 35' 11\" Est                                                                   Arvilliers GPS : 49° 44' 44\" Nord, 2° 38' 52\" Est","gps":"49° 47' 38\" Nord, 2° 35' 11\" Est","images":["../image/image_80/80_Beaucourt_Santerre_1.jpg","../image/image_80/80_Beaucourt_Santerre_2.jpg","../image/image_80/80_Beaucourt_Santerre_3.jpg","../image/image_80/80_Beaucourt_Santerre_4.jpg"]},"Consult_chateau_formulairec13d":{"id":"Consult_chateau_formulairec13d","dept":"80","canton":"Abbeville","commune":"Béhen -Acheux","nom":"Behen","type":"Châteaux","periode":"XVII","histoire":"trois châteaux dans cet article;, Acheux, Behen, Chépy.                                                                       BEHEN, construit aux XVIIIe et XIXe siècles le château de Béhen présente de beaux salons XVIIIe siècle avec boiseries, des salles de réception. Le château a deux niveaux  avec lucarnes sur combles, à été rénové en conservant le style original;, cheminées ouvragées et de hautes fenêtres jusquau plafond.  avec tourelles hexagonnales  sur angles  la demeure familiale est située dans un parc boisé clos. Centre équestre.                                                                                                   ACHEUX  à Vimeu, c'est un nouveau château, construit sur les ruines de l'ancien château. Sa construction date de la fin du XVIIe siècle. Il fut la résidence de Messire Gédéon, seigneur, en 1645, d'après Prarond. En 1688, il abrite Tillette d'Acheux qui « trucide son curé ». Il passe ensuite dans la propriété du marquis de Valanglart, le seigneur de Moyenneville.","architecture":"BEHEN  La famille Cuvelier est heureuse de vous accueillir au château de Béhen. A deux pas de la baie de Somme, belle demeure familiale, est située dans un parc boisé. Les visiteurs apprécieront ses arbres centenaires ou découvriront les animaux de la ferme : Construit au XVIIIe et XIXe siècle le château de Béhen présente de beaux salons XVIIIe avec boiseries, des salles de réception. Le château a été rénové en conservant son style original. Toutes les chambres, dans le château, sont spacieuses avec une salle de bain privée, lumineuses, avec marbre avec deux vasques,  un sèche cheveux, et une télévision. Les chambres du 1er étage possède une cheminée et toutes les chambres ont une vue sur le parc, propriété de Marc-Henri de Cousbi.                                                                                                            Dans village voisin CHEPY avait ainsi son château, son seigneur et son domaine seigneurial. La seigneurie de Chépy était baronnie en 1526 et fut érigée en marquisat en 1748 par Nicolas Antoine de Grouches, seigneur, chevalier, maréchal de camp et Grand-Croix de Saint-Louis. En 1728, Nicolas Antoine de Grouches, marquis de Chépy, seigneur et patron d'Huppy et autres, maréchal des camps et armées du Roy et commandeur de l'Ordre royal et Militaire de Saint-Louis, reçoit en don la seigneurie de Ramburelles, de sa cousine Suzanne de Gaillard Longjumeau.","habitants":"Acheux  marquis de Valanglart                                                             Behen ; Famille Cuvelier Chépy; Nicolas Antoine de Grouches\"","divers":"trois châteaux dans cet article;  , Acheux grav-4, Behen, grav 1-2-3 Chépy grav-5.                                       Acheux  GPS : 50° 03' 54,26\" Nord, 1° 40' 35,51\" Est                                        Behen GPS : 50° 03' 22\" Nord, 1° 45' 21\" Est                                                  Chépy GPS : 50° 03' 46\" Nord, 1° 38' 51\" Est","gps":"50° 03' 54,26\" Nord, 1° 40' 35,51\" Est","images":["../image/image_80/80_Behen_1.jpg","../image/image_80/80_Behen_2.jpg","../image/image_80/80_Behen_3.jpg","../image/image_80/80_Behen_4.jpg","../image/image_80/80_Behen_5.jpg"]},"Consult_chateau_formulaire87ae":{"id":"Consult_chateau_formulaire87ae","dept":"80","canton":"Corbie","commune":"Behencourt","nom":"Behencourt","type":"Château","periode":"XVII","histoire":"Deux châteaux dans cet article; Behencourt et Frechencourt.     BEHENCOURT, le nom du village est cité dès le XIIe siècle, sous la forme \"Behencurt\". A cette époque est également attestée l'existence d'une seigneurie (Simon de Béhencourt, chevalier en 1190). Le château attaché à cette seigneurie est toujours en place. Une autre seigneurie est attestée dans l'écart de Vilaincourt, mais le château avait déjà disparu bien avant la Révolution. Béhencourt avait une maladrerie, qui fut rattachée à l'Hôtel-Dieu d'Amiens en 1695-1697. Les autres édifices de la commune furent pour la plupart construits aux XIXe et XXe siècle. Le château de Béhencourt se compose de deux corps de logis : l'un, en craie, édifié au XVIIIe siècle, a été amputé de son aile en retour par un incendie. Cette partie disparue fut remplacée par un nouveau corps de logis en brique, en 1862 environ, achevé lors de la guerre de 1870. Il fut occupé par les Allemands puis par les Anglais, pendant la deuxième guerre mondiale. Le corps de ferme adjacent et le parc avec son lac datent de la deuxième moitié du XIXe siècle : la grange-écurie longeant la rue porte la date 1889.  Béhencourt se compose d'un logis isolé dans un vaste parc donnant sur l'Hallue. L'aile ouest de ce logis est construite en craie sur soubassement de grès, et couverte par une croupe brisée. Elle est reliée à la partie nord par un petit passage couvert d'un essentage d'ardoise. La partie nord du château présente une façade sur le parc en brique et pierre, les autres élévations étant simplement en brique. Elle est couverte par une croupe brisée, et flanquée de deux tourelles à flèche polygonale. A l'est du logis se trouve une cour de ferme. Cette dernière est bordée à l'est par un hangar récent, qui a pris la place d'un ancien logement de fermier en torchis.","architecture":"FRECHENCOURT,  le nom de Fréchencourt est mentionné sous sa forme française dès le XIIe siècle. C'était au Moyen-Age le siège d'une seigneurie (Drix de Waullincourt, sire de Fréchencourt en 1283) qui appartient ensuite aux seigneurs de Contay. Une chapelle castrale et un château-fort sont attestés dès le XIIIe siècle. Dans le premier tiers du XVIIe siècle, un nouveau château fut construit suivant une orientation nord-sud. Au XVIIIe siècle furent édifiés des communs et une nouvelle chapelle funéraire datant de 1785. Au XIXe siècle, le château fut démoli et fit place en 1856 à une maison de maître en briques, due à l'architecte amiénois Pinsard. Des communs furent bâtis ou agrandis en 1926 une remise en briques fut ajoutée près de la chapelle. De l'entre deux guerres date aussi le prolongement en briques du logis du fermier. Les bâtiments agricoles, qui se trouvent de l'autre côté de la rue, mais dépendent de la ferme du château, semblent dater des années 1920-30. Les dernières dépendances construites dans l'enceinte du château sont deux hangars datant de 1944 et 1962. La chapelle fut restaurée dans sa partie extérieure vers 1988.","habitants":"Famille de Simon de Béhencourt\"","divers":"Deux châteaux dans cet article; Behencourt grav 1-2 et Frechencourt grav-3.                      Behencourt GPS : 49° 58' 35\" Nord, 1° 41' 36\" Est","gps":"49° 58' 35\" Nord, 1° 41' 36\" Est","images":["../image/image_80/80_Behencourt_1.jpg","../image/image_80/80_Behencourt_2.jpg","../image/image_80/80_Behencourt_3.jpg","../image/image_80/80_Behencourt_4.jpg"]},"Consult_chateau_formulaireecd4":{"id":"Consult_chateau_formulaireecd4","dept":"80","canton":"Ailly-sur-Somme","commune":"Belloy sur Somme","nom":"Belloy_Somme","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article de Belloy, château d'En-Bas et château d'En-Haut                                                                                                                       BELLOY-Sur SOMME, il existe à Belloy-sur-Somme deux châteaux, le château d'en haut et le château d'En Bas. Le château d'en haut est situé à l'extrémité du village, en bordure de la route qui conduit à Vignacourt. Les 1ers seigneurs de Belloy que l'on connaisse en portaient le nom, ce n'est qu'à partir de la fin du XIIIe siècle que l'on commence à distinguer les seigneurs qui possédaient l'un ou l'autre des deux châteaux. Celui d'en bas, appelé château de la Motte, était sous la dépendance du château d'en haut. Cette situation dura plusieurs siècles puisque, en 1603 encore, lorsque la terre de la Motte fut acquise par la famille Picquet, elle se déclarait vassale du château d'en haut. A la fin du XVIe siècle, le château d'en Haut appartenait aux Monceaux, et en 1637, il appartenait à la famille Tiercelin de Brosses, dont une descendante, Angélique-Henriette-Marie Tiercelin, dame de Belloy et épouse de Louis-Henri, marquis de Pons, vendit en 1765, la seigneurie à Joseph-René Boistel. le château construit en pierre, mais plus petit que celui d'en Bas, fut très remanié au début du XIXe siècle. appartient à madame Renée Saint.\nÉléments protégés MH : le pigeonnier en pans de bois et torchis : inscription par arrêté du 20 juillet 1966.","architecture":"EN-BAS, entre la deuxième moitié du XVIIIe siècle et le premier quart du XIXe siècle, le château connut d'importantes modifications: agrandissement de la ferme, mise en place d'un avant-corps sur chaque façade du corps de logis du château. Au cours du XIXe siècle, d'autres aménagements radicaux sont entrepris tels l'édification de nouveaux bâtiments et de nombreux changements dans l'organisation du parc qui s'agrandit vers les marais entre 1833 et la fin du XIXe siècle. Le château visible aujourd'hui est le résultat des changements intervenus sur le domaine dans les années 1830. Le bâtiment est surmonté d'une toiture à croupes et possède quatre tourelles d'angle. La surélévation de la toiture détermine un étage supplémentaire surmonté d'une belle sculpture armoriée, oeuvre des frères Duthoit. Une remarquable chapelle, néo-classique, de style baroque italianisant, est également construite et le jardin est recomposé en un jardin irrégulier et paysager doté d'une serre chaude. Le système hydraulique de cette serre se trouve conservé, avec une installation de jardin, en rocaille ciment-faux-bois, à l'intérieur. Enfin, trois ponts ainsi qu'une grotte en rocaille viennent agrémenter la composition du parc.\nÉléments protégés MH : le château ; les façades et les toitures, la chapelle et la ferme en totalité, la serre et toutes les fabriques, la maison du gardien, façades et toitures, le parc en totalité, avec ses allées, son réseau hydraulique, ses ponts et ses rocailles: inscription par arrêté du 18 mars 2009. La chapelle et la serre chaude : classement par arrêté du 4 février 2011, modifié par arrêté du 18 octobre 2011.","habitants":"famille Tiercelin de Brosses\"","divers":"Deux châteaux dans cet article de Belloy, chat d'En-Bas grav-1 et chat d'En-Haut grav-2   GPS : 49° 54' 22\" Nord, 1° 54' 17\" Est                                                              En Bas  GPS : 49° 58' 11,76\" Nord, 2° 8' 17,16\" Est","gps":"49° 54' 22\" Nord, 1° 54' 17\" Est","images":["../image/image_80/80_Belloy_Somme_1.jpg","../image/image_80/80_Belloy_Somme_2.jpg"]},"Consult_chateau_formulaireb9c1":{"id":"Consult_chateau_formulaireb9c1","dept":"80","canton":"Poix-de-Picardie","commune":"Belloy_St_Léonard","nom":"Belloy_St_Léonard","type":"Château","periode":"XVIII","histoire":"BELLOY st-Léonard  Le plus ancien seigneur connu de Belloy est Hugues qui vivait en 1139 et était fils de Wautier. Eux mêmes et leurs successeurs portaient le nom de la terre de Belloy auquel s'associa celui de Saint-Liénard (devenu plus tard Saint-Léonard). La seigneurie de Belloy fut en effet réunie à celle de Saint Liénard à la suite du mariage, vers 1375, de Enguerran de Belloy avec Jeanne de Saint-Liénard. Elle resta dans la même famille jusqu'à la fin du XVIIe siècle, époque à laquelle François de Belloy Saint Léonard vendit le domaine à Gabriel Roussel. Son petit-fils, Jacques- Gabriel-François de Paule Roussel de Belloy fut, au XVIIIe siècle, le dernier seigneur de Belloy Saint-Léonard.   Au XIXe siècle la seigneurie appartenait à la famille de Morgan, passa par héritage, vers 1890, au comte Adrien de Hauteclocque. Le château, qui vu naître en 1902 Jacques Philippe de Hauteclocque, futur maréchal Leclerc, fut bâti à la fin du XVIIIe siècle, sur l'initiative de Jacques Roussel de Belloy, trésorier de France. Aujourd'hui appartient à la comtesse Guy de Hautecloque.","architecture":"BELLOY, Il est de style Classique. Construit entièrement en pierre, le château se compose d'un long corps de logis de plan rectangulaire terminé par deux ailes en retour d'équerre peu saillantes. L'élévation est à deux étages. L'avant-corps central de la façade principale est surmonté d'un fronton triangulaire aux armes des Roussel de Belloy. Éléments protégés MH : les façades du château (à l'exclusion de l'aile en retour d'équerre qui le prolonge au Nord et de la véranda accolée à la façade Est), des communs et du pigeonnier : inscription par arrêté du 10 octobre 1986  Le château de Belloy-Saint-Léonard a été inscrit aux M.H. le 10/10/1986 et a été classé aux M.H. en 2009 et 2011,  est, depuis 2021, un lieu d'accueil pour les séminaires d'entreprises. Il est en cours de restauration.","habitants":"A l'ouest d'amiens\"","divers":"Belloy-St-Léonard grav 1-2-3                    GPS : 49° 58' 11,76\" Nord, 2° 8' 17,16\" Est","gps":"49° 58' 11,76\" Nord, 2° 8' 17,16\" Est","images":["../image/image_80/80_Belloy_St_L%c3%a9onard_1.jpg","../image/image_80/80_Belloy_St_L%c3%a9onard_2.jpg","../image/image_80/80_Belloy_St_L%c3%a9onard_3.jpg"]},"Consult_chateau_formulaire099c":{"id":"Consult_chateau_formulaire099c","dept":"80","canton":"Doullens","commune":"Bernatre","nom":"Bernatre","type":"Château","periode":"XIV-XV","histoire":"BERNATRE, les origines de la seigneurie de Bernâtre remontent au XIIIe siècle. Les restes du château, visibles actuellement, remontent aux XIVe et XVe siècles. Ravagé au XVIe siècle, puis brûlé par les Espagnols en 1635, il ne fut pas rebâti, n'ayant plus de rôle militaire à jouer. Des bâtiments de ferme, entourant l'ancienne baille, furent accolés aux vestiges de l'ancien édifice castral. Il subsiste de celui-ci certains pans de murs ayant conservé des archères, des éléments de l'ancienne chapelle, la porte d'entrée du château et la tour de trois étages du XVe ou XVIe siècle, assez bien conservée. Éléments protégés MH : la tour-porte.","architecture":"BERNATRE, la construction du château date du XIVe et XVe siècle.  . Des bâtiments de ferme, entourant l'ancienne baille, furent accolés aux vestiges de l'ancienne demeure castrale. Les éléments protégés du château de Bernatre sont la Tour-porte, tour d'angle cylindrique Nord-Ouest avec le pan de courtine adjacent, sols archéologiques de la cour castrale et de l'ancienne basse-cour, ainsi que les façades de l'ensemble des bâtiments de la ferme du château, inscrits aux M.H. depuis le 2/12/1998.","habitants":"Famille de Bernatre\"","divers":"Château de Bernatre grav 1-2-3-4GPS : 50° 11' 51\" Nord, 2° 05' 29\" Est","gps":"50° 11' 51\" Nord, 2° 05' 29\" Est","images":["../image/image_80/80_Bernatre_1.jpg","../image/image_80/80_Bernatre_2.jpg","../image/image_80/80_Bernatre_3.jpg","../image/image_80/80_Bernatre_4.jpg"]},"Consult_chateau_formulaire747b":{"id":"Consult_chateau_formulaire747b","dept":"80","canton":"Amiens","commune":"Bertangles","nom":"Bertangles","type":"Château","periode":"XVII-XVIII","histoire":"BERTANGLES, en 1611 date du mariage de Gabrielle de Glisy et de Jacques de Clermont-Tallard,  famille de Clermont-Tonnerre. Bertangles est construit autour de 1730, pour Louis-Joseph de Clermont-Tonnerre, comte de Thoury. Sa conception est attribuée à Germain Louis Boffrand, ingénieur-architecte. Il est reconstruit au début du XVIIe siècle au nord-est de l'ancien manoir, après sa destruction par les Espagnols en 1597, sans doute pour Jacques de Clermont-Tallard et Gabrielle de Glisy. La terre fut érigée en marquisat par Charles X en 1829, au profit d'Amédée Marie de Clermont-Tonnerre. Le domaine, toujours transmis par successions et mariages, n'a jamais été vendu. La demeure est complétée dans le deuxième quart du XIXe siècle, par de nouveaux communs et par des aménagements paysagers, un parc à l'anglaise signalé par A. Goze (1849) et par la pose d'un portail, acquis en 1847. La grille exécutée pour le marquis de Gouffier, par le serrurier Jean-Baptiste Veyren, établi à Corbie, était destinée au château d'Heilly. Endommagé par un incendie en août 1930, il ne conserve de son décor d'origine attribué à François Cressent, que l'escalier et sa rampe en fer forgé. Les pièces de réception et la bibliothèque ont été refaites à l'identique, de 1930 à 1934, par André Mailfert. L'aménagement du parc au milieu du XIXe siècle, d'une faisanderie et d'un enclos à chevreuils, et celui de la cour d'honneur reproduisent en partie l'aspect du XVIIIe siècle reconstitué d'après des documents authentiques par l'architecte-paysagiste Duchesne.  Le château orienté nord-ouest sud-est est implanté en retrait d'une cour d'honneur. Au nord-ouest, le parc est prolongé par une avenue qui traverse le bois de Bertangles.   Le corps de logis de plan allongé est formé d'un corps central à deux étages carrés et étage de comble prolongé par deux ailes basses à étage de comble couvertes de toits à pans brisés.","architecture":"BERTANGLES, construit en calcaire, appareillé en pierre de taille, il est couvert d'ardoises. Le corps central présente une élévation sur cour à sept travées, dont les trois travées centrales sont couronnées par un fronton triangulaire (côté cour) et par un fronton semi-circulaire (côté parc); il est flanqué de deux pavillons en saillie à deux travées. Les corps de bâtiment délimitent une cour fermée sur trois côtés. Un portail à porte charretière et porte piétonne en briques et calcaire appareillé en pierre de taille en constitue l'entrée. Au nord-est, un portail donne accès au château.  dont la façade nord sur la cour est en calcaire, appareillé en pierre de taille, située au sud de la ferme. Accolé au portail d'entrée, un bâtiment en rez-de-chaussée surélevé sur cave est construit en calcaire appareillé en pierre de taille et couvert de tuiles.  Des trois portes d'origine visibles en façade sud, les deux latérales ont été murées et la porte centrale a été agrandie. Un accès latéral ouvert dans un second temps a également été muré. A l'est, s'élève un corps de bâtiment en rez-de-chaussée surélevé, construit en briques sur solin de grès et couvert d'un toit à croupe en ardoises; il présente quatre grandes fenêtres en façade sur cour, l'une d'elle a été transformée en porte, et une porte en pignon à l'est. A l'ouest du portail, la conciergerie est construite en calcaire appareillé en pierre de taille; en rez-de-chaussée, elle est couverte d'un toit en double bâtière en ardoises. Ils sont construits en briques et couverts de toits à longs pans à demi-croupe avec aisseliers et épis de faîtage. Les façades présentent un décor polychrome en assises alternées. A l'ouest. Il est couvert en tuiles.","habitants":"Familles des Clermont-Tonnerre \"","divers":"Bertangles: 49° 58' 21\" Nord, 2° 18' 06\" Est","gps":"","images":["../image/image_80/80_Bertangles_1.jpg","../image/image_80/80_Bertangles_2.jpg","../image/image_80/80_Bertangles_3.jpg"]},"Consult_chateau_formulaire37db":{"id":"Consult_chateau_formulaire37db","dept":"80","canton":"Gamaches","commune":"Biencourt","nom":"Biencourt","type":"château","periode":"XVIII","histoire":"BIENCOURT, le château actuel de Biencourt, propriété du baron Pierre Macquart de Terline, date du XVIIIe siècle, et avait en particulier appartenu au Moyen-Age, à une maison qui portait le nom de cette terre, les Biencourt, connus en Picardie dès le XIe siècle.  En 1190, Humphroy de Biencourt participe à la troisième croisade. Son nom figure dans la deuxième salle des croisades du château de Versailles.  La commune faisait partie des quatre fiefs de Beauregard, autrefois nommés de Biencourt ou d'Offinicourt, de Cornehotte, de Rignauville dit la Boissière aux XVIe et XVIIe siècles. Au  XVe siècle Antoinette de Biencourt épouse Louis d'Abbeville dit Ivregny  lui apportant le domaine en dot, le ménage aura une fille Margueritte qui s'allie avec Jean de Monchy, seigneur de Seinapont, Antoine de Monchy qui lui succède comte au baron de Visme  cette lignée s'éteint avec François de Monchy qui laisse ses bien à sa soeur Charlotte femme d'Adrien de Créqui en 1654 madame sera veuve se défait de Biencourt au profit de Charles de Belleval seigneur d'Aigneville après des difficultés financières  le domaine est saisie adjugé en 1678 à Pierre le  Boucher seigneur du Castelet  en 1702 Charles Pierre le Boucher entreprend la construction du château actuel, passe à Pierre François le Boucher Gentilhomme de la duchesse d'orléans qui meurt en 1782 sans avoir contracter l'alliance lègue le domaine à son neveu Pierre-Jean Tillette de Buigny époux de Marie-Jeanne le Blond de Plouy cette dernière décède en 1790, le domaine est vendu comme bien nationnal acquis par Charles-Lefèvre de Hodent et passe par héritage aux Hautecloque, puis aux Macquart de Terline.","architecture":"BIENCOURT,  de ces constructions antérieures, le château a conservé d'intéressants communs, d'époque Louis XIV, en brique et pierre et dans ces communs un vieux pressoir à cidre datant du XVIIe siècle. Le parc fait l'objet d'une inscription au pré-inventaire (jardins remarquables).Sa construction date du XVIIIe siècle. Il datait du Moyen -Age , connut dès le XIe siècle, en Picardie. Le chateau de Biencourt fut plusieurs fois rebâti au même endroit, en brique et pierre,  élevé à trois niveaux dont un de comble  avec des lucarnes dont celle du centre, chargée dses armoiries d'Edmond de Hautecloques qui fut maire de Biencourt de 1904 à 1908. A l'intérieur des communs se trouve un vieux pressoir à cite, du XVIIIe siècle. Le parc a été inscrit au pré-inventaire des jardins remarquables. Le château est relié à la route nationale par une belle avenue bordée, de 3 rangs de peupliers, de chaque côté.","habitants":"Famille Biencourt\"","divers":"Briancourt     49° 58' 35? nord, 1° 41' 36? est","gps":"","images":["../image/image_80/80_Biencourt_1.jpg","../image/image_80/80_Biencourt_2.jpg"]},"Consult_chateau_formulaire3dd0":{"id":"Consult_chateau_formulaire3dd0","dept":"80","canton":"Abbeville","commune":"Boismont","nom":"Boismont","type":"Château","periode":"XVII","histoire":"BOISMONT,  Philippe Gardin fait construire le corps principal du château en 1737, comme l'indiquait la présence de quatre pierres de l'attique de la façade portant la date de 1737. La bâtisse consistait à l'origine  d'un corps de logis rectangulaire, connu par un dessin de Gillard (1860). Philippe Gardin ne fit que remanier le château qui aurait été l'oeuvre de Daniel de Boubers; d'après Seydoux, la façade est proche de celle des châteaux de Huppy et Frucourt du XVIIe siècle. A l'est du château se trouvait le jardin d'agrément, constitué au XVIIe siècle, jouxté au potager situé au nord. Le bois était un parc aménagé. La propriétaire actuelle possède le plan terrier du château, indiquant la forme du parc ainsi que la présence de chemins d'accès entourant la ferme. C'est par Anne Barbe du Gardin, sa fille, que Boismont passe à Pierre Wulfran Briet, écuyer, seigneur de Rainvillers, le 2 janvier 1725. Vers 1760, Marie-Charlotte Pappin de Caumesnil, fait ajouter un avant-corps central à la façade sur parc avant de faire aménager le salon dont le décor rappelle celui du château de Bagatelle. Vers 1875, Louis de Rainvillers entreprend d'importants travaux: réfection du pignon nord, construction du bâtiment de la cuisine au nord et réaménagement du rez-de-chaussée. Le salon, situé dans l'axe du soleil, bénéficiait ainsi d'une forte exposition à la lumière. Le corps principal, long de sept travées, possédait en son centre, sur la façade postérieure, un élément en saillie de trois travées de long. Le toit à longs pans brisés et croupe recevait un comble à surcroît éclairé de plusieurs lucarnes. Le château actuel, construit à l'emplacement de l'ancien, étant la propriété de M. de Lauzon et de son épouse, née Briet de Rainvillers.","architecture":"BOISMONT  Le corps central était flanqué au sud d'un long bâtiment bas dans lequel était située la chapelle (aménagée au sud par le fils de Louis de Rainvillers, Bernard, en 1908 et au nord, d'un petit pavillon de trois travées de long, de même style que le corps central. D'après la propriétaire, la tour contenant la cage d'escalier en façade aurait été ajoutée en 1908. Au début du XXe siècle. La grille d'entrée se trouvait à l'origine face au château à 50 mètres de la façade. Elle est aujourd'hui située à l'entrée du chemin qui mène aux communs. A proximité de ceux-ci, il existe encore un colombier du XVIIIe siècle de plan carré et à la toiture en pavillon. Le mur du parc est démoli par un obus lors de la première guerre mondiale, très près de la maison. En avril 1948, le château est partiellement détruit par un incendie, qui touche la chapelle et que le décor Louis XVI. Il ne reste aujourd'hui qu'une partie de l'édifice du XVIIIe siècle, complété au milieu du XXe siècle. D'après le plan terrier du XIXe siècle, la ferme située à l'est de la propriété et qui dépend du château, était plus étendue qu'aujourd'hui et formait un rectangle à cour fermée, une mare et un pigeonnier en occupaient l'espace central. Le logis semble avoir été construit entre 1860 et 1880. Certains bâtiments ont été détruits à l'ouest. Les écuries, agrandies vers 1875, le bâtiment sur rue (XVIIIe siècle) ainsi que le colombier (également XVIIIe siècle) ont échappé à l'incendie de 1948. En mai 1940, Louis de Rainvillers proposa d'abriter les haras de Compiègne dans la ferme du château. Les étalons de la station d'Abbeville s'installèrent à Boismont. Dans la cour, est conservée une grande auge de pierre portant un écu écartelé (ou à la croix cantonnée): de chaque côté de la croix, les lettres PAM forment monogramme. Ce sont les armes des Anquier ou Anguier, famille de Saint-Valéry.","habitants":"Famille de Marie-Charlotte Pappin de Caumesnil,\"","divers":"château de Boismont à Abbeville  gps 50° 09' 12? nord, 1° 41' 10? est","gps":"","images":["../image/image_80/80_Boismont_1.jpg","../image/image_80/80_Boismont_2.jpg"]},"Consult_chateau_formulaire99ee":{"id":"Consult_chateau_formulaire99ee","dept":"80","canton":"Abbeville","commune":"Port-le-Grand","nom":"Bonance","type":"Château","periode":"XVIII","histoire":"BONANCE  Les terres de Bonance, à la Révolution sont acquises par Jean-Pierre Hecquet d'Orval, ancien manufacturier abbevillois. Son fils Pierre-Emile Hecquet d'Orval crée une exploitation, vers 1840, date à laquelle il commence les défrichements. Les fouilles s'arrêtèrent contre le bois. Mais le village antique s'étendait  bien au-delà. Toujours dans le bois, en 1840, l'érudit découvrit les fondations d'un temple gallo-romain (fûts de colonnes et chapiteaux), sur lequel devait s'établir à l'époque mérovingienne un monastère dit de sainte Austreberthe, couvent de bénédictines détruit au IXe siècle par les Normands. Le site fut donc occupé sans discontinuité de l'époque gauloise à l'époque médiévale. Le recensement de population de 1851 indique qu'il habite alors la ferme de la Creuse. Celui de 1872, signale pour la première fois le château de Bonance, habité par Pierre-Emile Pecquet d'Orval, propriétaire, cultivateur et chevalier de la légion d'honneur, et la ferme du château, comprenant deux logis, celui du concierge et celui du garde des bois. En 1881 et 1906, le château est habité par son fils Fernand Hecquet d'Orval, son épouse la baronne Joséphine Kuppmann Walkella, leurs enfants, nés à Port-le-Grand, et six domestiques étrangers. Trois logements sont destinés au chef de culture, au jardinier et au berger. En 1911, le château est habité par la veuve de Fernand Hecquet d'Orval, toujours présent sur la liste électorale de 1910, son fils Honoré, né à Paris, et une amie; la domesticité est plus réduite, . L'annuaire des châteaux et des départements indique que le château est une résidence secondaire de Fernand Hecquet d'Orval (1851-1911) officier de cavalerie, qui réside également à Paris  et dans son château de Solnitz (Bohème), de 1897 à 1905. Après la première guerre mondiale (1920 à 1927), sa femme apparaît encore dans l'annuaire au château de Bonance et à Paris.","architecture":"BONANCE De 1926 à 1935, l'annuaire donne le château de Bonnance comme résidence secondaire d'Honoré Hecquet d'Orval et sa femme Annette Le Pelletier, également domiciliés à Paris. Les cartes postales du début du XXe siècle en donnent une première représentation. Le logis comprend un corps central en brique, de cinq travées. Le rez-de-chaussée avait été percé de larges baies sur la face méridionale. Le premier étage était souligné d'une terrasse peu large avec garde-corps ajouré en pierre. La travée centrale était mise en valeur par une légère avancée en pierre de taille, s'achevant au sommet par un fronton percé d'une double baie cintrée. Cette partie architecturale existe encore. Le corps central était flanqué au sud-ouest d'une tour octogonale en brique, recouverte à l'étage d'un placage de pierre. Une terrasse devait à l'origine en occuper le sommet puisqu'un garde-corps (similaire à celui du corps central) en ornait le pourtour. Le premier étage était ouvert de nombreuses baies cintrées. L'Est du bâtiment d'origine était flanqué dès la fin du XIXe siècle d'un imposant corps entièrement en brique avec avancée à pans coupés au sud. Le toit à longs pans brisés et croupes abritait un étage de comble ajouré de lucarnes plates. Cet élément est encore aujourd'hui en place mais est largement modifié. En 1928, après le mariage d'Honoré Hecquet d'Orval et d'Annette le Pelletier, le logis fait l'objet d'importantes transformations, dans un style vernaculaire régionaliste et historicisant, sur des plans attribués à l'architecte Henri-Pierre Jacquelin, originaire de Louvée comme la jeune épouse. On ignore s'il est intervenu sur le parc.","habitants":"Bonance                             Jean-Pierre Hecquet d'Orval,Famille Maillar\"","divers":"Château de Bonance à Port le Grand","gps":"","images":["../image/image_80/80_Bonance_1.jpg","../image/image_80/80_Bonance_2.jpg","../image/image_80/80_Bonance_3.jpg","../image/image_80/80_Bonance_4.jpg"]},"Consult_chateau_formulaire4e3a":{"id":"Consult_chateau_formulaire4e3a","dept":"80","canton":"Gamaches","commune":"Bouillancourt-en-Séry","nom":"Bouillancourt","type":"Château","periode":"XV","histoire":"deux châteaux dans cet article de Bouillancourt et Ansennes. BOUILLANCOURT, appartient au XIIe siècle à la famille de Cayeux. C'est elle qui a fait  construire  le château médiéval. En 1453, Hughes de Cayeux le vendit au comte d'Etampes puis il a appartenu à des membres de diverses familles parmi lesquels on relève les noms d'Antoine de Mailly, Charles de Gonzague, Henriette de Clèves, Henri d'Orléans et enfin Charles de Rambures. En 1764, son propriétaire, Jacques le Boucher d'Ailly, seigneur de Richemont, intenta un procès à un paysan à propos d'un droit de passage dans les fossés ; ses descendants ont conservé la propriété jusqu'à la fin du XIXe siècle. Deux des tours du château médiéval existent encore, l'absence de moulures et de voûtes rend difficile leur datation. Il est probable que la demeure avait été réalisée au début du XIIIe siècle. propriété de la famille de Bougleux.","architecture":"BOUILLANCOURT est composé d'un grand corps de logis rectangulaire que prolonge à gauche une aile basse, à sa droite fait suite une autre construction basse disposée obliquement par rapport à lui. L'ensemble repose sur une terrasse assez élevée limitée par une balustrade de pierre. Celle-ci contourne le bâtiment oblique et s'arrondit en forme de tour: avec les deux tours médiévales, celle-ci évoque donc partiellement le dessin de la forteresse primitive. Quatre arcades soutiennent la partie de la terrasse remplaçant l'ancienne courtine disparue. Éléments protégés MH : les façades et les toitures du château ; les sols archéologiques de l'ancienne basse-cour : inscription par arrêté du 12 décembre 2001.  Bouillancourt-en-Séry est un château moderne, bâti sur les ruines d'une forteresse du Moyen Age. L'enceinte intérieure était flanquée de 6 tours, dont les créneaux étroits étaient à l'usage de la flèche et antérieurs, à l'usage des armes à feu. L'enceinte extérieure était aussi défendue par plusieurs tours et protégée par un fossé sec, assez profond, garni d'un parapet. On reconnait encore 2 vestiges des tours contre les murs actuels. Le château de Bouillancourt-en-Sery a été classé aux M.H. en 2001.                                          ANSENNES à Bouillancourt-en-Séry a été construit au XVIIIe siècle, et fait l'objet d'une inscription au pré-inventaire (jardins remarquables). L'historique actuel du château ne nous est pas connu. A noter sur cette commune de Bouillancourt-en-Séry le château qui est visible extérieurement au centre du bourg.","habitants":"Jacques le Boucher d'Aill
