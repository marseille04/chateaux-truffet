:"Famille du baron Gérard de l'Epine \"","divers":"Prouzel  GPS : 49° 49' 08\" Nord, 2° 12' 06\" Est","gps":"49° 49' 08\" Nord, 2° 12' 06\" Est","images":["../image/image_80/80_Prouzel_1.jpg","../image/image_80/80_Prouzel_2.jpg"]},"Consult_chateau_formulaire0eac":{"id":"Consult_chateau_formulaire0eac","dept":"80","canton":"Péronne","commune":"Péronne","nom":"Péronne","type":"Forteresse","periode":"XIII","histoire":"PERONNE, sa construction date du XIIIe siècle. Bâti pour le roi Philippe Auguste, au début du XIIIe siècle, ce majestueux château a conservé son aspect du Moyen-Age et ses tours massives. Le château de Péronne est ouvert au Public et se visite librement. Un article plus complet lui a été consacré sur ce site. Ce majestueux château a été voulu par Philippe Auguste au début du XIIIe siècle. Il conserve de nos jours l'aspect qu'il possédait au Moyen-Âge. On peut en admirer notamment les tours massives. Le château fût le théâtre d'un épisode dramatique de l'histoire de France. En 1468 ils étaient la propriété du duché de Bourgogne, c'est-à-dire de Charles Le Téméraire. Des conflits avec Louis XI décidèrent d'une entrevue entre Charles Le Téméraire et le Roi dans l'enceinte même du château. Louis XI arriva accompagné d'une escorte assez réduite, mais parallèlement, Louis XI, souverain au tempérament manipulateur, fomentait en douce la révolte du peuple liégeois. Quand Charles Le Téméraire apprend la trahison, il fait enfermer sur le champ le Roi dans les prisons du château, terrible humiliation pour la couronne de France. Louis XI ne parvint à sortir de cet emprisonnement qu'en ratifiant un traité qui stipulait quelques concessions, rien moins que l'abandon de plusieurs villes de la Somme. Prix fort pour la libération du Roi de France, consignée dans un traité dit \"Traité de Péronne\".","architecture":"PERONNE, la porte de Bretagne, cette porte fortifiée fait partie des anciens remparts de la ville. Son nom provient du faubourg de Bretagne, quartier de la ville ainsi nommé en souvenir des Irlandais, Bretons insulaires (Anglais, Écossais, Gallois), qui accompagnent Fursy de Péronne et qui sinstallent à l'extérieur de la cité, hors de l'enceinte fortifiée.  Le nom s'est ensuite transmis à la nouvelle porte de la ville qui débouche dans ce quartier.La porte de Bretagne est composée de deux pavillons rectangulaires en brique et pierre qui se font face, séparés l'un de l'autre par un espace à ciel ouvert. Sur le pavillon ouvrant sur l'extérieur des remparts, les armoiries de la ville de Péronne sont sculptées dans la pierre. Sur le pavillon intérieur, une niche abritait autrefois une statue de la Vierge. Un pont-levis, toujours en place et en état de fonctionnement, permettait de franchir la porte ou de protéger la ville en cas de danger.  Cette porte est prolongée par des fortifications reconstruites en 1647, le bastion royal et une série de défenses (cavaliers, demi-lunes, chicanes).  La porte est restaurée après la première guerre mondiale et classée aux Monuments Historiques en 1925. Les vestiges des fortifications qui l'entourent sont classés en 1944.                                \nÉléments protégés MH : le château (ruines des trois tours subsistantes et des courtines qui les relient) : classement par arrêté du 22 mars 1924. Vestiges,  seul le front sud-ouest subsiste aujourd'hui.","habitants":"roi Philippe Auguste\"","divers":"Péronne  GPS : 49° 55' 45\" Nord, 2° 55' 51\" Est","gps":"49° 55' 45\" Nord, 2° 55' 51\" Est","images":["../image/image_80/80_P%c3%a9ronne_1.jpg","../image/image_80/80_P%c3%a9ronne_2.jpg","../image/image_80/80_P%c3%a9ronne_3.jpg","../image/image_80/80_P%c3%a9ronne_4.jpg","../image/image_80/80_P%c3%a9ronne_5.jpg"]},"Consult_chateau_formulairecd25-2":{"id":"Consult_chateau_formulairecd25-2","dept":"80","canton":"Amiens-Corbie","commune":"Querrieu-Pont de noyelles","nom":"Querrieu","type":"Château","periode":"XVII","histoire":"QUERRIEU  la plus ancienne mention des seigneurs de Querrieu remonte à 1106. Au XVIe siècle fut construit un château dont restent des vestiges : les deux tours rondes de la façade occidentale et le cellier qui s'étend sous la partie centrale du corps de logis. En 1596, le domaine passa par mariage aux Gaudechart, illustre lignage beauvaisien. Au XVIIe siècle, les Gaudechart firent réédifier l'ancien château : la structure générale du corps central et son élévation orientale remontent à cette campagne de reconstruction. A partir de 1753, Paul-Maximilien de Gaudechart modifia à nouveau l'aspect du château : comblement des fossés, percement de nouvelles baies, aménagement du parc. De cette époque datent le vestibule d'honneur et son escalier, ainsi que le petit et le grand salon au rez-de-chaussée. Au sud, se trouvaient alors une cour de communs avec colombier, écuries et remises, près du moulin seigneurial : de cet ensemble ne subsiste qu'un bâtiment (remanié) en briques et pierres. D'importants travaux furent enfin réalisés vers 1840, conférant son aspect actuel au corps de logis : reconstruction des ailes latérales, ajout d'un étage sur la partie centrale, et reprise du décor intérieur (beaux parquets en marqueterie). Parallèlement, le parc fut redessiné à l'anglaise l'accès au château par deux allées latérales. Pendant la première guerre mondiale, il servit de QG à l'armée britannique. Le péristyle oriental du corps de logis a été ajouté vers 1925. Le corps de ferme a été refait à l'identique vers 1980.","architecture":"QUERRIEU , le corps de logis est un édifice isolé, orienté est-ouest, construit en briques (avec quelques motifs en briques surcuites sur la façade orientale). La partie centrale, à deux étages-carrés, est flanquée de deux tours rondes côté ouest. Elle est encadrée par deux ailes symétriques, moins hautes (un seul étage-carré). Tout le corps de logis est couvert en ardoises, avec des toits à croupe (peu élevés sur les ailes, où ils ont presque l'aspect de terrasses). Au sud-ouest du corps de logis s'élèvent les communs : une écurie faite de matériaux hétérogènes (craie, briques et pierres, briques seules) et un corps de ferme comprenant logis, étables et pigeonnier, en briques et en torchis sur pan de bois. Ces bâtiments sont couverts en tuiles, avec des toits à longs pans. Le pigeonnier a un toit en pavillon. Cet ensemble bâti est entouré d'un grand parc à l'anglaise, avec une allée vers le nord, et un canal avec un bassin circulaire à l'est.\nÉléments protégés MH : les façades et les toitures du château ; les pièces du rez-de-chaussée (salle à manger, grand et petit salon, petit vestibule) ; l'escalier ; le parc et le sous-sol archéologique : inscription par arrêté du 1er décembre 1998.","habitants":"Famille de Gaudechart\"","divers":"Querrieu\nGPS : 49° 49' 08? nord, 2° 12' 06? est","gps":"49° 49' 08? nord, 2° 12' 06? est","images":["../image/image_80/80_Querrieu_1.jpg","../image/image_80/80_Querrieu_2.jpg"]},"Consult_chateau_formulaire3cd3":{"id":"Consult_chateau_formulaire3cd3","dept":"80","canton":"Doullens","commune":"Outrebois","nom":"Quesnel","type":"Château","periode":"XIX","histoire":"QUESNEL  au pied de l'escarpement, près de la route, subsiste un manoir du XVIIe siècle. Il a certainement remplacé le logis seigneurial après la ruine du château fort d'Outrebois. C'est une construction en craie taillée qui comprend un bâtiment rectangulaire auquel s'adjoint à l'arrière une aile en retour de sorte que le plan dessine un L aux branches inégales; c'est ce que marque très bien le dessin des toitures; trois tours carrées, saillantes, marquent les angles externes du manoir, leurs pyramides trapues sont moins hautes que la toiture du reste du bâtiment ; une corniche à modillons court au sommet de l'ensemble des murs. L'élévation Est à deux étages séparés par un cordon horizontal, des fenêtres rectangulaires et des oculus éclairent les pièces de l'intérieur et son escalier. Dans la cour de la ferme un pigeonnier octogonal en brique avec chaînages de pierre aux angles contribue au pittoresque de l'ensemble.  Le domaine est vendu en 1732 à Geneviève Maurice, veuve de Pierre Le Fèvre de Wadicourt mort en 1725.  Il demeura dans cette famille jusqu'au mariage en 1835 de Louis-Françoise-Aurélie Le Fèvre de Wadicourt avec Charles Blin de Bourdon.\nAprès 1900, il appartient à la famille Handron, aujourd'hui à la famille Sara.","architecture":"OUTREBOIS * un autre château fut construit en 1875, il appartenait au début du XXe siècle à la famille Croix de Feuilles et actuellement à Antoine d'Halluin époux de Brigitte d'Hautefeuille.  Le château d'Outrebois, brique et pierre, a été construit au XIXe siècle (1875). Au début du XXe siècle, il appartenait à la famille Croix de Feuille. Le jardin d'agrément du château est inscrit au aupré-inventaire des jardins remarquables.","habitants":"Famille Croix de Feuille\"","divers":"Quesnel_Outrebois grav-2 GPS : 49° 49' 32\" Nord, 2° 04' 48\" Est","gps":"49° 49' 32\" Nord, 2° 04' 48\" Est","images":["../image/image_80/80_Quesnel_1.jpg","../image/image_80/80_Quesnel_2.jpg"]},"Consult_chateau_formulairee6fd":{"id":"Consult_chateau_formulairee6fd","dept":"80","canton":"Ailly-sur-Somme","commune":"Quevauvillers","nom":"Quevauvillers","type":"Château","periode":"XVII","histoire":"QUEVAUVILLERS, le domaine conserve un ensemble de constructions relativement homogène et peu dénaturé du XVIIIe siècle. Le château a été construit en plusieurs étapes, par les Tyrel de Poix, les de Cayeux  et par  alliance  à la famille de la Tramerie et toujours par alliance aux  Gomer  au cours des XVIIe et XVIIIe siècles.  en 1647 François de Gomer fait construire le corps de logis,  construction de style Louis XIII à cinq travées.                                                                                          Le petit-fils Charles-Gabriel de Gomer officier aux gardes Françaises, marié en 1761 avec Marie-Josèphe de Pingré. Il est caractéristique des grandes propriétés seigneuriales rurales de cette époque en Picardie, tant par les matériaux employés que par les éléments constructifs, en dépit de la disparition de son colombier. Au  XIXe siècle la fils de Charles-Gabriel, Alexandre de Gomer entreprend des travaux de rénovation, et en 1876 le château revient à Paul de Gomer fils d'un cousin germain de Maxime qui fit des travux pour le rendre habitable, le château  appartient aujourd'hui aux Percy, descendant du dernier comte de Gomer.","architecture":"QUEVAUVILLERS , la construction date du XVIIIe siècle, elle a gardée le style du XVIIIe siècle, corps de logis élevé sur un soubassement en pierre en 1647 de un niveau à l'origine pour les dépendances et d'un étage avec  lucarnes sur un haut comble d'ardoise sur toit brisés à la Mansart. Le château de Quevauvillers a été construit en brique et pierre, en plusieurs fois durant le XVII et XVIIIe siècle, l'aile basse  avec deux pavillons en retour d'équerre aux extrémitées.  Seul son pigeonnier a disparu.  Le château de Quevauvillers est entouré d'un beau parc à l'anglaise, créé au XIXe siècle. La présence d'un puits anglo-chinois datant du XIXe surprendra les visiteurs, tout en faisant partie d'un aménagement ordonnancé dans le goût paysager. Le parc à l'anglaise, du début du XIXe siècle, semble avoir gardé ses principales dispositions d'origine, faisant partie d'un aménagement ordonnancé dans le goût paysager.\nÉléments protégés MH : le château (Vieux et Grand), les façades et toitures, les écuries, l'orangerie, le puits anglo-chinois, les deux longs bâtiments de la ferme en brique et pierre, le parc, les clôtures en pierre et silex, l'entrée en fer à cheval et le saut-de-loup : inscription par arrêté du 13 avril 2008.","habitants":"Famille de Gomer\"","divers":"Quevauvillers   GPS : 49° 49' 32\" Nord, 2° 04' 48\" Est","gps":"49° 49' 32\" Nord, 2° 04' 48\" Est","images":["../image/image_80/80_Quevauvillers_1.jpg","../image/image_80/80_Quevauvillers_2.jpg","../image/image_80/80_Quevauvillers_3.jpg","../image/image_80/80_Quevauvillers_4.jpg"]},"Consult_chateau_formulairee1b9":{"id":"Consult_chateau_formulairee1b9","dept":"80","canton":"Albert","commune":"Raincheval","nom":"Raincheval","type":"Château","periode":"XVII","histoire":"RAINCHEVAL, le château fut construit en 1719, à l'emplacement d'un château du XVe siècle, pour la famille Gorjon de Verville et racheté par la famille de Favernay. La demeure appartient aujourd'hui à la famille de Thieulloy.  Le château de Raincheval est de style classique et fut bâti en 1719. Les premiers propriétaires étaient la famille Gorjon de Verville. C'est une habitation privée, fermée au Public qui appartient, depuis la Révolution, à la Famille de Favernay.","architecture":"RAINCHEVAL, le bâtiment se compose d'un corps de logis en pierre avec avant corps central côté cour et deux avant corps côté jardin, une ferme seigneuriale et un beau colombier octogonal de plus de 300 boulins. L'entrée possède une grille monumentale et son portail flanquée de deux lions montant la garde.  La cour d'honneur est formée d'une grille qui se développe en hémicyle. La façade du château de Raincheval est en pierre blanche, décoré de pilastres, ornées d'un petit fronton. Sur sa gauche, se trouve une aile du château à la Mansart, prolongée par les arcades d'une orangerie. Sur la droite, un mur reproduit les baies opposées et sépare le château, de la ferme qui date du XVIIIe siècle. Celle-ci possède un colombier octogonal, en pierre de taille. La pelouse du château de Raincheval au tracé rigoureux.  La cour d'honneur est formée d'une grille qui se développe en hémicyle, un aspect en harmonie, avec l'ensemble du château.   Éléments protégés MH : les façades et les toitures y compris les bâtiments bordant la cour d'honneur ; la grille d'entrée avec son portail ; l'escalier intérieur et sa rampe en bois; la cheminée en marbre de la salle à manger du rez-de-chaussée; les pièces suivantes avec leur décor : les salons au rez-de-chaussée; les deux chambres à alcôves, deux chambres de l'aile côté jardin et la chambre de l'aile en retour sur la cour d'honneur au premier étage : inscription par arrêté du 5 décembre 1975.","habitants":"Famille de Favernay.\"","divers":"GPS : 50° 04' 26\" Nord, 2° 26' 09\" Est","gps":"50° 04' 26\" Nord, 2° 26' 09\" Est","images":["../image/image_80/80_Raincheval_1.jpg"]},"Consult_chateau_formulaire0771":{"id":"Consult_chateau_formulaire0771","dept":"80","canton":"Poix-de-Picardie","commune":"Rambures","nom":"Rambures","type":"Forteresse","periode":"XII-XV","histoire":"RAMBURES, la construction du château actuel remonte au XIIe siècle. Le \"chastel\" de Rambures est mentionné dès 1421 dans les places tenues par les Anglais dans le Ponthieu. En 1423, Henri VI d'Angleterre donne à Collart et Ferry de mailly \"le chatel, terre et seigneurie de Rambures\". Le château est repris en 1431 par les Français. André de Rambures entre en possession de son château après son retour de captivité en 1436. De 1450 à 1465-70, l'on construit le château actuel. La date de 1472 marque la soumission de Jacques de Rambures envers Charles le Téméraire qui laisse une garnison au château. La Ligue l'occupe  en 1585. Au cours du XVIIe siècle, des travaux d'aménagement sont entrepris au château : l'on modifie la porte nord, on supprime les fortifications, ainsi que la chapelle et on installe un escalier monumental. Au XVIIIe siècle, des pièces de réception sont créées notamment au deuxième étage et l'on perce de grandes baies qui endommagent les mâchicoulis. Lors de la Révolution, la perquisition de Marat reste sans effet. En 1840, le général de Fontenilles réalise des \"aménagements gothiques\" au rez-de-chaussée du château, dans la salle à manger et la salle des gardes.  Le plan du château s'inscrit dans un carré et est composé de huit tours et de demi-tours imbriquées les unes dans les autres. Les tours sont placées dans les angles du carré et sont reliées par les demi-tours. Une seule pièce est aménagée à chaque niveau des tours et demi-tours depuis les caves jusqu'au deuxième étage. La communication verticale depuis le sous-sol jusqu'au deuxième étage se fait par quatre escaliers à vis placés dans les angles internes des tours d'angle.","architecture":"RAMBURES, le château est construit dans une fosse sèche, mesure défensive contre la nouvelle artillerie. Des canonnières de défense sont placées au niveau du plateau situé au-delà de la fosse.\nÉléments protégés MH : le château : classement par arrêté du 23 février 1927. Les façades et les toitures des communs ; le parc, avec ses allées, le saut-de-loup de l'entrée, avec les grilles et les alignements d'arbres de la route de Oisemont à Rambures ; les façades et les toitures de la chapelle dans le parc ; les façades et les toitures du bûcher : inscription par arrêté du 17 juin 2003.                                                      A cinq K.M au nord RAMBURELLES; le château se situe sur l'axe Oisemont - Gamaches. en 1728, Suzanne de Gaillard Longjumeau possédait la seigneurie de Ramburelles. Elle la donna à son cousin Nicolas Antoine de Grouches, marquis de Chepy. Suzanne de Gaillard Logjumeau est décédée à Maisnières le 25 juin 1745 (registres paroissiaux de la commune). Les obsèques furent célébrées « en présence du puissant seigneur Nicolas Antoine de Grouches marquis de Chepy, seigneur et patron d'Huppy et autres, maréchal des camps et armées du Roy et commandeur de l'ordre Royal et militaire de Saint-Louis, et en présence également de Claude de Belloy seigneur de Rogean ». En 1745, Suzanne de Gaillard Logjumeau a fait donation à la communauté des habitants de Ramburelles, de 6 journaux de terre pour la Fondation d'un vicariat dans leur paroisse.","habitants":"Seigneurs locaux\"","divers":"Deux châteaux dans cet article; Rambures et Biencourt.                                  Biencourt 9° 58' 35? nord, 1° 41' 36? est                                                               Rambures GPS : 49° 56' 40\" Nord, 1° 42' 27\" Est                                             Ramburelles  grav_4 GPS : 49° 58' 05\" Nord, 1° 42' 38\" Est","gps":"49° 56' 40\" Nord, 1° 42' 27\" Est","images":["../image/image_80/80_Rambures_1.jpg","../image/image_80/80_Rambures_2.jpg","../image/image_80/80_Rambures_3.jpg","../image/image_80/80_Rambures_4.jpg"]},"Consult_chateau_formulaire365b":{"id":"Consult_chateau_formulaire365b","dept":"80","canton":"Poix-de-Picardie","commune":"Biencourt","nom":"Rambures_Biencourt","type":"Château","periode":"XVIII","histoire":"RAMBURES-BIENCOURT, a la fin du XVe siècle Antoinette de Biencourt épouse Louis d'Abbeville dit d'Ivregny. En 1500 le mariage de sa fille Marguerite avec Jean de Monchy fait entrer la terre dans cette famille. En 1654 Charlotte de Monchy, veuve d'Adrien de Créquy, seigneur de Frohen, la cède à Charles de Belleval, seigneur d'Aigneville, qui connait semble-t-il de graves difficultés financières. Décrétées par les créanciers, terre et seigneurie sont adjugées en 1678 à Pierre Le Boucher du Castelet et Jeanne Gaillard d'Embreville.  C'est à leur fils Charles-Pierre Le Boucher (1661-1735) que l'on doit la construction du château, après 1702, date de son mariage avec Catherine de Ponthieu.  A la génération suivante,  Pierre-François Le Boucher de Biencourt, gentilhomme de la duchesse d'Orléans, jouit fort agréablement de sa belle fortune avant de mourir célibataire en 1782. Héritier de son oncle, Pierre-Jean Tillette de Buigny, officier de cavalerie au régiment de Bourgogne, devenu vicomte de Biencourt, il continue de résider à Buigny où il meurt en 1790.  Déclaré bien national, confisqué et mis en adjudication, le domaine appartient sous la Restauration à Pierre-Charles Lefèvre du Hodent puis à sa fille Marie-Sidonie qui en 1825 l'apporte en mariage à Alphonse de Hauteclocque.  Tous deux font restaurer les appartements et ajouter  deux ailes de service latérale.  Mais c'est leur fils Edmond qui donne à la façade d'arrivée son allure définitive comme le rappelle la présence de ses armes sur la lucarne centrale, accolées à celles de Valentine Le Josne-Contay qu'il a épousé en 1856. Le mariage de Yolande de Hauteclocque avec le baron de Terline fait entrer le domaine dans cette famille qui en est toujours propriétaire.","architecture":"BIENCOURT, le château de Biencourt est relié à la route nationale par une longue avenue bordée, de chaque côté, de trois rangs de peupliers. Le château actuel de Biencourt, propriété du baron Pierre Macquart de Terline, date du XVIIIe siècle. Il fut plusieurs fois reconstruit au même endroit et avait en particulier appartenu au Moyen Age, à une maison qui portait le nom de cette terre, les Biencourt, connus en Picardie dès le XIe siècle. De ces constructions antérieures, le château a conservé d'intéressants communs, d'époque Louis XIV, en brique et pierre et dans ces communs un vieux pressoir à cidre datant du XVIIe siècle. Le parc fait l'objet d'une inscription au pré-inventaire (jardins remarquables).","habitants":"Famille  d' Alphonse de Hauteclocque.\"","divers":"_Rambures_Biencourt GPS : 49° 56' 40\" Nord, 1° 42' 27\" Est","gps":"49° 56' 40\" Nord, 1° 42' 27\" Est","images":["../image/image_80/80_Rambures_Biencourt_1.jpg","../image/image_80/80_Rambures_Biencourt_2.jpg"]},"Consult_chateau_formulaire85d5":{"id":"Consult_chateau_formulaire85d5","dept":"80","canton":"Ailly-sur-Noye","commune":"Remiencourt","nom":"Remiencourt","type":"Château","periode":"XVIII","histoire":"Deux châteaux dans cet article Bouflers  et Guyencourt.\nBOUFFLERS,  le château a été bâti au XVIIIe siècle pour la famille de Boufflers, l'édifice est une agréable construction en pierre blanche et à étage mansardé, disposée en trois corps de bâtiment autour dune vaste cour, Propriété du comte Xavier de Francqueville, dont la famille le possède depuis la fin du XVIIIe siècle. Au delà de la grille d'entrée, se développent autour de la cour d'honneur, ceinturée de douves disposées en arc de cercle, le corps de logis principal dont les travées centrales sont mises en valeur par un avant-corps surmonté d'un fronton, et les ailes en retour d'équerre, plus basses bien que présentant le même système d'élévation: un rez-de-chaussée surmonté d'un étage mansardé. Les pavillons situés aux extrémités des ailes étaient occupés, à droite par les cuisines et à gauche par une chapelle qui existe toujours. La façade arrière donne sur un parc à l'anglaise qui a remplacé, au début du XIXe siècle, un jardin à la française terminé par un canal toujours en place.                          Éléments protégés MH : les façades et les toitures du château et de ses deux ailes ; la cour d'honneur avec son portail d'entrée: inscription par arrêté du 14 mai.                                                                                                                          Le château de Boufflers ou château de Remiencourt est inscrit aux M.H. depuis le 1973.","architecture":"Dans le village voisin  sur l'autre rives   GUYENCOURT  château situé à une quinzaine de kilomètres au sud-est d'Amiens et dominant le village et la vallée de la Noye. Edifié vers 1750 par Firmin Ducrocquet, issu d'une très ancienne famille de l'échevinage amiénois et lui-même maire d'Amiens. Face au château et lui faisant vis à vis, la ferme de la basse cour présente deux cours successives, la première délimitée par des bâtiments du XVIIIe siècle, la seconde se composant de bâtiments bâtis au XIXe siècle, le tout dominé par l'élégante silhouette d'un pigeonnier-porche,  en  brique et pierre.  Éléments protégés MH : les façades et les toitures du château, du bûcher et de l'ensemble des bâtiments de la ferme du XVIIIe siècle ; les façades et les toitures de l'ensemble des bâtiments de la ferme du XIXe siècle : inscription par arrêté du 19 mars 1992 , ce château possède une architecture de pierre d'une grande sobriété de facture, avec un corps central rythmé par un avant-corps saillant sommé d'un fronton et prolongé par deux ailes plus basses.","habitants":"Famille de Boufflers\"","divers":"Deux châteaux dans cet article Bouflers  et Guyencourt.","gps":"","images":["../image/image_80/80_Remiencourt_1.jpg","../image/image_80/80_Remiencourt_2.jpg","../image/image_80/80_Remiencourt_3.jpg","../image/image_80/80_Remiencourt_4.jpg"]},"Consult_chateau_formulaire17c1":{"id":"Consult_chateau_formulaire17c1","dept":"80","canton":"Flixecourt","commune":"Ribeaucourt","nom":"Ribeaucourt","type":"Château","periode":"XVII","histoire":"RIBEAUCOURT , en 1613, Marie de Boubers hérite de son père la seigneurie de Ribeaucourt et s'y installe avec son époux Antoine Le Fournier, seigneur de Wargemont, terre que possède la famille Le Fournier depuis le XVe siècle, la maison seigneuriale se présente encore sous la forme d'un manoir ayant conservé certains caractères médiévaux, comme la basse-cour précédant le logis et la tour latérale qui servira de chapelle seigneuriale jusqu'à la Révolution. Les deux caves subsistant sous le château actuel (aile nord-est et corps de logis sud-ouest) correspondent à ce premier manoir, la première portant un graffiti avec la date de 1642. Le logis à deux niveaux et pignons, qui sera agrandi et modifié en 1678, a été construit pour Antoine Le Fournier de Wargemont dans les années 1620, en tous les cas avant l'année 1635 qui marque le début d'une période de troubles dans le Ponthieu, peu propice à des travaux de cette envergure. Le 4 avril 1678, François le Fournier, chevalier, seigneur de Wargemont, Ribeaucourt, Barlette, Graincourt et Méricourt, passe marché avec le maître charpentier amiénois François de Vaux, par l'intermédiaire de Dom Augustin de Saint-Joseph, prieur des Feuillants d'Amiens; en effet, le charpentier vient de réaliser le grand escalier du couvent, situé rue des Rabuissons à Amiens, et avec lequel la famille Le Fournier est très liée.  On doit à François-Louis Le Fournier, marquis de Wargemont, maréchal de camp, des travaux considérables à Ribeaucourt dans le troisième quart du XVIIIe siècle, la façade du corps de logis principal comprend alors trois travées sur cour et sur jardin, et l'aile deux travées. Après ces travaux, le plan du logis doit être relativement simple et symétrique, le vestibule central desservant de part et d'autre une grande salle éclairée par une fenêtre sur la cour et une sur le jardin, suivie d'une chambre éclairée par deux fenêtres sur le jardin. Des pièces de service et de commodité complétaient  ces deux appartements côté cour. L'aménagement de la basse-cour à l'est et la construction des communs et dépendances ont dû s'étaler entre la fin du XVIIe et le milieu du XVIIIe siècle.","architecture":"RIBEAUCOURT, François-Louis Le Fournier de Wargemont laisse une succession obérée et ses domaines fonciers, mis en adjudication le 23 avril 1774, sont acquis  par son frère Aymar Le Fournier, comte de Wargemont. Mais de longues procédures vont l'opposer jusqu'à la Révolution aux enfants et héritiers de son frère. Ribeaucourt et acquis par un négociant d'Abbeville. L'ensemble est recouvré en 1803 par Bonne Charlotte Le Fournier de Wargemont, marquise de Persan qui le cède à son tour en 1821, avec la forêt de Goyaval et les terres de Barlette, au négociant amiénois Pierre-Louis Degove et à son gendre Jean-Charles Deberny  devenu seul propriétaire du château à la suite du décès de son beau-père, la commande du doublement du nombre des baies des façades du corps de logis principal, qui passent ainsi de trois à sept travées. On doit à Charles-Philippe de Berny,  ces travaux concernent la construction d'un corps de logis en prolongement du logis à l'ouest,  Ce bâtiment est presque symétrique à l'aile des cuisines, qui est alors surélevée d'un étage carré.   À la fin du XIXe ou au tout début du XXe siècle ce qui permet de régulariser la limite du parc dans la continuité de la perspective plantée. En 1928, Gérard de Berny, dernier représentant de la lignée, hérite de l'ensemble du patrimoine familial. Sénateur de la Somme et maire de Ribeaucourt, il est surtout connu comme bibliophile et amateur d'art et lègue à sa mort la demeure amiénoise de la famille à la ville d'Amiens pour en faire un musée d'histoire régionale (actuel musée de l'hôtel de Berny). À Ribeaucourt, il fait construire dans les années 1930 le portail en brique et pierre qui marque sur la place publique l'entrée de la rue du Château, qui a été occupé de 1940 à 1944 par l'armée allemande, qui installe des rampes de lancement de V1 et de V2 dans le bois.","habitants":"Famille Le Fournier\"","divers":"Château de Ribeaucourt. GPS : 50° 07' 11,75\" Nord, 2° 06' 58,71\" Est","gps":"50° 07' 11,75\" Nord, 2° 06' 58,71\" Est","images":["../image/image_80/80_Ribeaucourt_1.jpg","../image/image_80/80_Ribeaucourt_2.jpg"]},"Consult_chateau_formulairee581":{"id":"Consult_chateau_formulairee581","dept":"80","canton":"Abbeville","commune":"Toeufles","nom":"Rogeant","type":"Château","periode":"XVIII","histoire":"ROGEANT, la seigneurie de Tufles a appartenu, dès le XIIe ssiècle et jusqu'à la fin du XVe siècle, à une famille qui en porta le nom. Vers 1490, Baugeois de Teufles, écuyer, légua le domaine à son neveu Nicolas de Fontaines. Les de Fontaines conservèrent la seigneurie jusqu'au début du XVIIe siècle. C'est la famille de Belleval qui entreprit au XVIIIe siècle, de faire construire, sur la terre qui lui appartenait.","architecture":"ROGEANT, le château actuel, de proportions modestes, mais non dépourvu de charme. Edifié entièrement en brique, le château se compose d'un corps de logis dont l'élévation n'est qu'à un étage couvert d'un toit à la Mansart percé à la base de sept fenêtres, légèrement cintrées et à encadrement de bois. Le corps de logis est flanqué de deux pavillons saillants qui ne sont pas placés aux extrémités mais entre les deux fenêtres qui encadrent à droite et à gauche la porte d'entrée, ces pavillons sont éclairés chacun par une fenêtre et reliés entre eux par un perron auquel on accède par quelques marches. Le château ne possède pas d'avant-corps central. Sur le côté nord de la cour d'honneur a été bâti à la fin du XVIIIe siècle le bâtiment des communs, entièrement en brique, et de plan rectangulaire. On peut lire, gravée dans une pierre,  à l'angle sud ouest des communs, la date de 1796.","habitants":"Famille de  Belleval \"","divers":"Château de rogeant  GPS : 50° 04' 01\" Nord, 1° 42' 55\" Est","gps":"50° 04' 01\" Nord, 1° 42' 55\" Est","images":["../image/image_80/80_Rogeant_1.jpg"]},"Consult_chateau_formulaire5189":{"id":"Consult_chateau_formulaire5189","dept":"80","canton":"Amiens","commune":"Rumigny","nom":"Rumigny","type":"Château","periode":"XVIII","histoire":"RUMIGNY, au moyen-âge, Rumigny dépend de la Seigneurie de Boves. Le château existe déjà à l'emplacement actuel, mais il fut rasé sous Henri IV, le seigneur de Rumigny ayant pris parti avec les ligueurs contre le roi. C'est alors que la seigneurie passe aux Gueulluy ; leurs descendants, les Sercey puis les Saint-Maur, sont toujours propriétaires du château qui a été reconstruit au XVIIIe siècle. Pendant la guerre de 1870, il servit de quartier général aux Français. Une aile rajoutée au XIXe siècle fut détruite en 1940. Le parc du château est classé zone protégée dans le plan d'occupation des sols de Rumigny.","architecture":"Manoir de RUMIGNY, au moyen-âge, Rumigny est un simple village agricole qui dépend de la seigneurie de Boves. Il paye la dîme au chapitre de Picquigny, aux religieuses de lHôtel-Dieu dAmiens et au chapitre de la Cathédrale. Face à la forge, ce manoir, construit au XVIe siècle, est le plus vieil édifice de Rumigny. Il conserve encore intact son pignon ouest à gratins dominé par une cheminée dont le coffre, carré à sa sortie du toit, présente dans sa partie supérieure une série darrêtes en dents de scie formée, sans doute par des briques posées de biais. Lencadrement des baies est orné à lextérieur de moulures prismatiques redescendant sur des bases du même genre. Des cordons de sculpture ornementale variée décorent la gorge du milieu, le couronnement et le bord inférieur de lappui. Les fenêtres sont protégées par une grille de leur époque dont un barreau sur deux se termine par des fleurons, à la naissance desquels on remarque de petits écussons en fer.\nÉléments protégés MH : les deux fenêtres avec grilles : inscription par arrêté du 18 mai 1926 et par arrêté du 10 janvier 1934.","habitants":"Famille des  Gueulluy \"","divers":"Château de Rumigny","gps":"","images":["../image/image_80/80_Rumigny_1.jpg"]},"Consult_chateau_formulaire761e-2":{"id":"Consult_chateau_formulaire761e-2","dept":"80","canton":"Rue","commune":"Régnière-Ecluse","nom":"Régnière_Ecluse","type":"Château","periode":"XVI","histoire":"REGNIERE-ECLUSE,  des  Tyrel au XIe siècle passe au XVe siècle par alliance aux Soissons-Moreuil, puis aux Soyecourt en 1553; François de Soyecourt seigneur de Tilloloy chevalier du roi fait bâtir le château ; exemple complet d'architecture néo-gothique à la mode troubadour appréciée au XIXe siècle, à la demande du propriétaire qui souhaitait ressusciter un mode de vie aristocratique.  Voilà 35 générations de châtelains qui s'y succèdent depuis 1030.  et digne d'un décor de cinéma, le comte Raymond de Nicolay  guide Kamini dans ce dédale seigneurial, suite à la perte de ces trois fils  et une partie de ses biens le domaine passe à l'ainée de ses filles Françoise veuve de  Ponthus Belleforière, au XVIIe siècle, Marie-Renée de Belleforière épouse Timoléon-Gilbert de séglière maîtres des requettes de l'hôtel du roi et par alliance passe au XIXe siècle à la famille d'Hinnisdal héritier de Régnière.  Le comte en 1828 s'occupe peu de ce domaine en possède d'autres; Ferfay en Artois, vers 1846 veuf de sa première épouse née  Bryas mais remarié  à une Choiseul Herman d'Hennisdal entreprend une troisième campagne d'agrandissement  dont il confie à l'architecte Jean Herbault. Régnière restera inhabité durant le premier quart du XXe siècle, pillé en 1940 puis occupé par les Allemands    et affecté  à une utilisation collective  et en 1960 la marquise de  Nicolay, née Lubersac hérite.","architecture":"REGNIERE-ECLUSE, depuis 1000 ans dans la même famille qui continue à le gérer avec l'Association de gestion et de sauvegarde, le \"Domaine millénaire de Regnière Ecluse\", a rejoint les sites du conservatoire du littoral. L'édifice, réalisé par l'architecte Jean Herbault a été construit à partir d'un manoir du XVIe siècle ayant servi de noyau au développement de l'ensemble. Ce château de Régnière Ecluse est l'un des plus atypiques de Picardie par son ornementation, uvre des décorateurs amiénois Aimé et Louis Duthoit, \"derniers imagiers du Moyen-Age\" selon Viollet-le-Duc. Le domaine a été aménagé suivant un projet associant la chasse à l'agrément.  Ce sont des créations rares au XIXe siècle et renouent avec la tradition des parcs Renaissance. Sur près de 130 ha, il serait l'uvre du créateur de jardins du XIXe siècle, Louis Sulpice Varé. Au delà, ce sont en fait les 1 000 ha de la propriété que l'on aménage en à peine un demi-siècle. Une ferme modèle, dans son état d'origine, témoigne de la modernisation des techniques agricoles au milieu du XIXe siècle. Éléments protégés MH : les façades et les toitures, le parc paysager, la ferme modèle du Franc Picard, l'ensemble constituant l'ancien domaine, avec le château en totalité, la maison du gardien en totalité, le parterre devant le château, le parc paysager comprenant les pelouses et les clumps, les massifs forestiers des bois de la Chelle, de la Grande-Vente, de Vron, du Franc-Picard, des Queneaux, de Soyécourt, et les parcelles agricoles de la grande Pièce du grand Patis et de la Verrerie : classement par arrêté du 20 juin 2006.","habitants":"Famille de François Soyecourt\"","divers":"Régnière-Ecluse GPS : 50° 16' 54,48\" Nord, 1° 46' 25,03\" Est","gps":"50° 16' 54,48\" Nord, 1° 46' 25,03\" Est","images":["../image/image_80/80_R%c3%a9gni%c3%a8re_Ecluse_1.jpg","../image/image_80/80_R%c3%a9gni%c3%a8re_Ecluse_2.jpg","../image/image_80/80_R%c3%a9gni%c3%a8re_Ecluse_3.jpg","../image/image_80/80_R%c3%a9gni%c3%a8re_Ecluse_4.jpg","../image/image_80/80_R%c3%a9gni%c3%a8re_Ecluse_5.jpg","../image/image_80/80_R%c3%a9gni%c3%a8re_Ecluse_6.jpg","../image/image_80/80_R%c3%a9gni%c3%a8re_Ecluse_7.jpg","../image/image_80/80_R%c3%a9gni%c3%a8re_Ecluse_8.html"]},"Consult_chateau_formulaire7f5c-2":{"id":"Consult_chateau_formulaire7f5c-2","dept":"80","canton":"Doullens","commune":"Rémaisnil","nom":"Rémaisnil","type":"Château","periode":"XVIII","histoire":"REMAISNIL, la famille Riollot fut propriétaire du château, de 1960 à 1970. C'est une élégante demeure du XVIIIe siècle ayant gardé une grande authenticité et une partie de son décor intérieur. Laura Ashley fut la propriétaire du château de Remaisnil, de 1979 à 1986. Sa société y organisait des défilés de mode dans le village pour les photographes. Le château de Remaisnil est inscrit aux M.H. depuis 1986.","architecture":"REMAISNIL, association très caractéristique dans la Picardie de cette époque de la brique et de la pierre. Le corps de logis est composé d'un corps central flanqué de deux pavillons légèrement saillants. Deux niveaux et combles à la Mansart (sans lucarnes à l'origine). Au rez-de-chaussée, boiseries Louis XVI dans deux des salons, gypseries Louis XV dans le salon central. Son bel escalier possède une rampe en fer forgé. La porte et les grilles de fer forgé datent du XVIIIe siècle ainsi que le pavillon de garde. Le pigeonnier est du XIXe siècle, l'aile de communs du XVIIIe siècle fut très remaniée au XIXe siècle. L'allée d'arbres est dans la perspective de l'entrée.   Éléments protégés MH : les façades et les toitures du château, du pavillon d'entrée, des communs, du pigeonnier, le petit salon Louis XVI, le grand salon Louis XV, la salle à manger Louis XV, le grand salon Louis XVI, la grille de clôture avec ses piliers, l'allée bordée d'arbres qui lui fait face : inscription par arrêté du 1er avril 1986.","habitants":"Famille de  Laura Ashley\"","divers":"château de Rémaisnil\nGPS : 50° 11' 58,57\" Nord, 2° 14' 30,89\" Est","gps":"50° 11' 58,57\" Nord, 2° 14' 30,89\" Est","images":["../image/image_80/80_R%c3%a9maisnil_1.jpg","../image/image_80/80_R%c3%a9maisnil_2.jpg"]},"Consult_chateau_formulaire3f99":{"id":"Consult_chateau_formulaire3f99","dept":"80","canton":"Abbeville","commune":"Sailly Flibeaucourt","nom":"Sailly_Flibeaucourt","type":"Châteaux","periode":"XVI-XIX","histoire":"quatre châteaux dans cet article; Sailly, Flibeauxecout,  Lys et Noyelles.                                                                      SAILLY-FLIBEAUCOURT, l'édifice remonte partiellement au XVIe siècle, date à laquelle le domaine entre dans la famille de Monchy, c'est principalement au XIXe siècle, que le château subit la plupart de ses modifications. Fait à la fois de briques et de pierres, les murs de l'édifice attestent de ces nombreux remaniements. Vers 1747 le château possédait un parc remarquable, d'après la carte des Routes de Flandres et d'une composition soignée et régulière. Une longue perspective prolonge la cour d'honneur. Une structure qui est encore visible aujourd'hui. En 1823, un incendie ravage le château. La reconstruction est menée par les Valanglart et c'est de cette époque que daterait l'aménagement paysager. Au début du XXe siècle le château se retrouve en la possession de Eusébe Hecquet de Beaufort, qui y meurt en 1926, c'est ensuite Jacques Noël Stremler, industriel de Sailly puis sa fille, Mme Bernard Durosoy, qui acquièrent la propriété. Aujourd'hui le bâtiment abrite la mairie de Sailly Flibeaucourt. propriété de la commune, hôtel de ville.","architecture":"de LYS, le château des Lys a été construit en 1850. Un magnat Parisien du rail, M. Sangnier, a fait bâtir cette demeure comme résidence de vacances. Il fit construire trois autres bâtiments,  pour héberger ses domestiques. A lorigine lensemble était bien plus vaste. La propriété est restée dans la famille Sangnier jusquà la mort du dernier héritier, aux alentours de la première guerre mondiale. A cette époque, deux ailes sont rajoutées, laile gauche, côté route, abrite la chapelle. Il subsiste des vestiges de ce passé ecclésiastique que lon admire dans les vitraux. Vers 1940 cest un agriculteur qui pris possession du château des Lys avant de lotir le terrain, et le vendre en 2005 à la famille Lutz, qui la transformé et lui a donné son cachet actuel.                                                                                                                      A cinq K.M.à l'Est à NOYELLES SUR MER Il est devenu un Hôtel 2 étoiles. Vous pourrez vous échapper en Baie de Somme dans un cadre enchanteur qui accueille aussi quelques roulottes aménagées.","habitants":"Sailly; famille d'Eusébe Hecquet de Beaufort\"","divers":"Flibeaucourt  GPS : 50° 01' 04\" Nord, 2° 04' 55\" Est                                                              Sailly GPS : 50° 10' 57\" Nord, 1° 46' 12\" Est                                                      Lys  GPS : 50° 10' 57\" Nord, 1° 46' 12\" Est                                                         Mairie grav_4                                              Noyelles grav  5","gps":"50° 01' 04\" Nord, 2° 04' 55\" Est","images":["../image/image_80/80_Sailly_Flibeaucourt_1.jpg","../image/image_80/80_Sailly_Flibeaucourt_2.jpg","../image/image_80/80_Sailly_Flibeaucourt_3.jpg","../image/image_80/80_Sailly_Flibeaucourt_4.jpg","../image/image_80/80_Sailly_Flibeaucourt_5.jpg"]},"Consult_chateau_formulairea259":{"id":"Consult_chateau_formulairea259","dept":"80","canton":"Ailly-sur-Somme","commune":"Clairy-Saulchoix","nom":"Saulchoix","type":"Château","periode":"XVII","histoire":"SAULCHOIX au sud ouest d'Amiens, édifice de style Louis XIII, bâti sous Louis XIV en 1679, le château en brique et pierre a conservé l'essentiel de son caractère d'origine. Il appartenait à la famille de Louvencourt et fut acheté au XVIIIe siècle par une branche de la famille de Gillès, originaire du Tournaisis, qui après s'être fixée au XVIe siècle en Hollande, vint s'installer en France. De chaque côté du château du Saulchoix furent ajoutés dans le prolongement du corps de logis, deux petits pavillons qui furent démolis au XIXe siècle et rebâtis en brique qui nuit à l'harmonie de l'ensemble. Une partie des dépendances est conservée: des bâtiments de la ferme à l'ouest ; des bâtiment en pierre blanche des communs à l'est, longeant la cour d'honneur et le portail mitoyen donnant accès à une allée et serre.  Il est de style Louis XIII, construit sous Louis XIV, en 1679.","architecture":"SAULCHOIX, la construction du château remonte à 1679. Il fut remanié aux XVIIIe et XIXe siècles. A l'Est, se trouve le jardin et l'orangerie. Dans le prolongement du corps de logis, deux petits pavillons ont été reconstruits en briques. La chapelle funéraire du château de Saulchoix date de 1679. Quatre membres de la famille de Gillès y reposent. \nÉléments protégés MH : le domaine comprenant le château, façades et toitures (non compris les pavillons adossés), les trois caves (y compris celle du pavillon adossé ouest), le rez-de-chaussée (excepté la cuisine), les deux chambres à alcôve du premier étage, les bâtiments de la ferme à l'ouest en totalité, le bâtiment en pierre blanche des communs à l'est longeant la cour d'honneur, ainsi que le portail mitoyen donnant accès à une allée, la chapelle et la serre en totalité, les murs de clôture qui délimitent les espaces et entourent le domaine dans la partie nord, le parc et jardin avec toutes ses parties constituantes (les cours, allées, portes, sauts-de-loup) et le bois : inscription par arrêté du 18 mars 2009.","habitants":"Famille de Gillès \"","divers":"Saulchoix GPS : 49° 51' 23\" Nord, 2° 10' 48\" Est","gps":"49° 51' 23\" Nord, 2° 10' 48\" Est","images":["../image/image_80/80_Saulchoix_1.jpg","../image/image_80/80_Saulchoix_2.jpg"]},"Consult_chateau_formulaire61eb":{"id":"Consult_chateau_formulaire61eb","dept":"80","canton":"Ailly-sur-Somme","commune":"Saveuse","nom":"Saveuse","type":"Château","periode":"XVIII","histoire":"SAVEUSE  est reconstruit en pierres au XVIIIe siècle, au sud de l'emplacement d'origine. L'auteur signale l'absence d'ornementation. Il se substitue à un édifice plus ancien qui comportait, en 1737, un corps de logis flanqué de quatre tours (deux grosses et de deux plus petites) et un large perron. Il comprenait également une ferme et un moulin. Acquise par Louis Pingré, vers 1680, la seigneurie passe au début du XVIIIe siècle à Firmin Antoine Ducroquet, seigneur de Guyencourt. Ph. Seydoux (2003) indique que la seigneurie de Saveuse, dont la famille joue un rôle important durant la guerre de Cent Ans, devient la propriété des Rouhaut au XVIe siècle. Le château-fort, siège de la seigneurie, tombe aux mains des Ligueurs en 1592. Saisie des Tiercelin de Brosse, elle est vendue en 1680 à Louis Pingré, procureur du Roi au bailliage d'Amiens, dont le fils épouse la fille du riche négociant amiénois Jean-Baptiste Morgan. En 1724, leur fille épouse Firmin-Antoine Ducroquet, seigneur de Guyencourt. La reconstruction du château est attribuée à leur fils Jean-Baptiste Ducroquet de Saveuse, peu après son mariage en 1767. Avec neuf travées en façade, dont trois au centre formant un léger avant-corps côté cour, plus saillant côté jardin, il s'apparente aux châteaux de Guyencourt et de Contay. L'ancienne demeure des Tiercelin de Brosse comprenait un corps de logis flanqué de tours, deux petites d'un côté, une plus importante de l'autre.","architecture":"SAVEUSE, le plan géométrique de la commune donne une représentation des avenues ouvertes dans le parc de la propriété. Il comprend un corps de logis de plan allongé à avant-corps central au sud, des communs construits à l'est, autour de la cour donnant accès à la demeure, et des jardins. Le portail principal (ouest) de l'église paroissiale ouvre sur la cour du château. Au nord de la place publique, apparaissent une vaste ferme et des maisons. Les matrices cadastrales conservées aux archives départementales indiquent que la propriété, comprenant un jardin d'agrément, appartient à la famille Ducroquet de Saveuse qui possède également deux argilières, un cimetière et une serre, démolie en 1911. Au nord du château, la ferme est acquise par un cultivateur en 1846. A l'est, les parcelles B 43 et 44 appartiennent à un saiteur. Une maison y est construite en 1852. Le recensement de 1872 y signale la présence d'une institutrice allemande et d'une gouvernante anglaise. L'édifice implanté sur un terrain surplombant le village comprend un corps de logis et des communs, cour, jardin et bois. Un portail est ménagé au sud du jardin, dans l'axe de l'entrée du cimetière du village. Le corps de logis en calcaire à étage carré comporte un avant-corps central au sud, côté jardin. Il est couvert d'ardoises, comme les communs qui délimitent la cour, à l'est. L'ancienne ferme du château comprend des bâtiments en briques couverts de tuiles mécaniques.","habitants":"Famille de Firmin Antoine Ducroquet de Saveuse\"","divers":"Saveuse GPS : 49° 53' 24\" Nord, 1° 43' 07\" Est","gps":"49° 53' 24\" Nord, 1° 43' 07\" Est","images":["../image/image_80/80_Saveuse_1.jpg"]},"Consult_chateau_formulairecb86":{"id":"Consult_chateau_formulairecb86","dept":"80","canton":"Amiens","commune":"St-Gratien","nom":"St_Gratien_80","type":"Château","periode":"XVII","histoire":"St GRATIEN, le château de Saint-Gratien appartient d'abord aux seigneurs du même nom, puis à deux familles échevinales d'Amiens, May du XVe siècle et Saint-Delis du XVIe siècle. Il fut ensuite la possession des Hirzel, protestants suisses. En 1778 Salomon d'Hirzel vendit le domaine à Jean-Baptiste Jourdain de Thieulloy, issu d'une famille amiénoise anoblie en 1735. En 1786, ce dernier commanda la reconstruction du corps de logis à l'architecte Rousseau, ingénieur de la ville d'Amiens.  Elles étaient à peu près terminées en 1788. La chapelle fut inaugurée en 1793. Depuis, peu de modification: le parc fut mis à l'anglaise en 1826, remplaçant un parc à la française dont subsiste une charmille. En 1860, la partie supérieure du pigeonnier fut démolie et reconstruite en briques, et une galerie fut édifiée entre le corps de logis et la cuisine (dans la cour des communs, jusqu'en 1948). Le château comprend un corps de logis rectangulaire orienté nord-sud, et une cour de communs à l'ouest, avec écuries, pigeonnier, chapelle. Le corps de logis est constitué d'un avant-corps central légèrement saillant, pourvu d'un étage de combles, et de deux ailes un peu moins hautes. Le domaine appartient aujourd'hui au comte Hubert de Thieulloy.","architecture":"St GRATIEN, l'ancien édifice du XVIIe siècle fut partiellement conservé, pour les communs. Le nouveau corps de logis, folie de style néo-classique, fut rapidement construit: les travaux étaient achevés en 1789. La craie provenait de la carrière voisine de Bavelincourt. Les sculptures des façades furent exécutées par le sculpteur François-Joseph Gruau, d'Amiens, sur les dessins de Rousseau. Le château comprend un corps de logis rectangulaire orienté nord-sud, et une cour de communs à l'ouest, avec écuries, pigeonnier, chapelle. Le corps de logis est constitué d'un avant-corps central légèrement saillant, pourvu d'un étage de combles, et de deux ailes un peu moins hautes.               Éléments protégés MH : le château en totalité ; les façades et les toitures des communs ; le parc : inscription par arrêté du 21 décembre 1954.","habitants":"Famille de Salomon d'Hirzel \"","divers":"Château de St-Gratien    GPS : 49° 57' 48,27\" Nord, 2° 24' 33,85\" Est","gps":"49° 57' 48,27\" Nord, 2° 24' 33,85\" Est","images":["../image/image_80/80_St_Gratien_80_1.jpg"]},"Consult_chateau_formulairea87b":{"id":"Consult_chateau_formulairea87b","dept":"80","canton":"Abbeville","commune":"St_Valéry-sur-somme","nom":"St_Valéry","type":"Patrimoine","periode":"XIV","histoire":"SAINT-VALERY  le château du ROMEREL de plan rectangulaire à deux niveaux toit en croupe recouvert d'ardoise. C'est un gite d'hôtes qui vous propose ses chambres, sa piscine extérieure ouverte en saison et son parking privé gratuit. Vous aurez la plus belle vue sur la Baie de Somme.  Propriétaire actuelle Mme Odile Mulon.","architecture":"SAINT-VALERY, la cité médiévale est une ville aux allures moyenâgeuses chargée dhistoire avec ses remparts, ses tours, ses portes, son château-fort, son église à deux nefs et ses beaux murs en damiers où s'entremêlent le silex taillé et les blocs de grès ou de calcaire. Les places et les rues pavées étroites nous invitent à une promenade bucolique, par les rues fleuries et les maisons à colombages et à encorbellement datant des XVe et XVIe pour les plus anciennes, pour atteindre au final un magnifique petit jardin botanique dit \"Herbarium\" niché au creux des remparts.Saint-Valéry-sur-Somme a conservé une partie de ses remparts qui lui donne une allure très médiévale. La porte de Nevers ou porte du bas donnait autrefois directement sur la grève.  Sur la porte, on voit encore les armes du duc Gonzague-Nevers.  Les bâtiments sont utilisés comme corps de garde jusqu'au XVII siècle avant de devenir le presbytère de la ville.","habitants":"Famille de Mme Odile Mulon \"","divers":"Château de st-Valéry  GPS : 49° 51' 23\" Nord, 2° 10' 48\" Est","gps":"49° 51' 23\" Nord, 2° 10' 48\" Est","images":["../image/image_80/80_St_Val%c3%a9ry_1.jpg","../image/image_80/80_St_Val%c3%a9ry_2.jpg","../image/image_80/80_St_Val%c3%a9ry_3.jpg","../image/image_80/80_St_Val%c3%a9ry_4.jpg","../image/image_80/80_St_Val%c3%a9ry_5.jpg"]},"Consult_chateau_formulaire96b2":{"id":"Consult_chateau_formulaire96b2","dept":"80","canton":"Albert","commune":"ste-Suzanne","nom":"Ste_Suzanne (80)","type":"château","periode":"XVII","histoire":"SAINTE-SUZANNE, au XIIIe siècle possession de Robert de Fauviaus . En 1619 reconstruction du château par Georges de Valperge seigneur du lieu en 1625, Louise, fille de Georges de Valperge;  épouse Louis d'Estourmel , c'est à lui que l'on doit la construction du château avec Louis dEstourmel, fit entrer la terre de Sainte-Suzanne dans cette famille dont la célébrité remonte aux faits darmes de Reimbold Creton dEstourmel, compagnon de Godefroi de Bouillon à la première croisade. Au château dorigine, édifié en 1619 par Georges de Valperge, sur une terrasse donnant sur des étangs, En 1625  Louis II, marquis dEstourrnel, ajouta à la fin du siècle deux vastes ailes. Vers 1748 des aménagements realisés par Marie-Anne de Mazière épouse de François-Louis d'Estourmel , construction des ailes latérales.  Le château,  traversa la Révolution sans dommage, eut à souffrir de la restauration radicale qui, en 1861, renouvela toutes les parties extérieures dans le style primitif, ainsi que lécrivait un contemporain. Il dut encore être sérieusement réparé à la suite des dégâts subis en 1914-18 et ces restaurations répétées lui ont fait perdre une grande partie de son authenticité. Il a toutefois conservé son beau parc en terrasses au sud face à un admirable paysage de rivière et détangs.","architecture":"Ste-SUZANNE, la construction du château date de 1619 à 1625. Georges de Valperge, seigneur de Suzanne fit édifier, en brique et pierre, le château actuel, en 1619, sur une terrasse dominant les étangs de la Somme.  Les Frères Duthoit ont réalisé deux dessins du château de Suzanne : l'un représentant l'entrée, l'autre une fenêtre de la façade Sud. Le château de sainte-Suzanne fut restauré de 1855 à 1861,  constructions des pavillons latéraux, bien endommagé par la guerre 14-18  puis après la grande guerre à subit d'importantes restaurations. Le château est protégé en tant que M.H. : classé aux M.H. le 29/08/1984 pour certaines parties du château  il appartient à l'Imitateur français Yves Lecoq .Éléments protégés MH : l'escalier avec sa cage et son plafond peint ; la salle à manger au premier étage avec sa cheminée monumentale : classement par arrêté du 29 août 1984. Les façades et les toitures ; les pièces suivantes avec leur décor : au rez-de-chaussée la salle à manger et le boudoir contigü, la chapelle ; au premier étage le grand salon : inscription par arrêté du 29 août 1984.","habitants":"Famille de Georges de Valperge\"","divers":"Ste_Suzanne_   GPS : 49° 57' 03\" Nord, 2° 46' 06\" Est","gps":"49° 57' 03\" Nord, 2° 46' 06\" Est","images":["../image/image_80/80_Ste_Suzanne_1.jpg","../image/image_80/80_Ste_Suzanne_2.jpg","../image/image_80/80_Ste_Suzanne_3.jpg"]},"Consult_chateau_formulaire273b":{"id":"Consult_chateau_formulaire273b","dept":"80","canton":"Poix-de-Picardie.","commune":"Sénarpont","nom":"Sénarpont","type":"Château","periode":"XVI","histoire":"SENARPONT,  un château médiéval a été rasé en 1443 par le comte d'Étampes. Sous Louis Xl et Louis XII on entreprit une nouvelle construction, celle-ci reçut un plan quadrangulaire avec des tours d'angle. Les Monchy succédèrent aux Cayeux, ils entreprirent de moderniser le château avant 1558. L'aile faisant face au village fut abattue, celle d'en face fut dotée d'arcades à l'italienne, et le donjon octogonal fut coiffé d'un dôme. A la mort du dernier Monchy en 1765, le château revint à son petit-fils, le prince Charles Henri de Nassau Enghien.","architecture":"SENARPONT ,  ruiné plusieurs fois, il fut contraint de vendre en 1785 la demeure à un cousin éloigné, Dary. Le château était en piteux état, une aile faisant face à la vallée et le donjon s'effondrèrent. A son retour d'émigration après la Révolution, Dary entreprit les travaux de restauration et le parc fut redessiné. Le 24 décembre 1889 un incendie anéantit la demeure; ses ruines demeurèrent en place jusqu'en 1911, date à laquelle le grand-père de l'actuel propriétaire fit tout raser, combler les fossés et construire l'actuel logis réalisé dans le style des villas d'alors.","habitants":"prince Charles Henri de Nassau Enghien \"","divers":"Sénarpont  GPS : 49° 53' 24\" Nord, 1° 43' 07\" Est","gps":"49° 53' 24\" Nord, 1° 43' 07\" Est","images":["../image/image_80/80_S%c3%a9narpont_1.jpg","../image/image_80/80_S%c3%a9narpont_2.jpg"]},"Consult_chateau_formulaire183e-4":{"id":"Consult_chateau_formulaire183e-4","dept":"80","canton":"Ailly-sur-Somme","commune":"Tailly","nom":"Tailly_arbre_Mouches","type":"Château","periode":"XVII","histoire":"TAILLY-l'arbre-à-mouches; est une belle construction en pierre des années 1730-1740, caractérisée par de hauts combles à la française, une modénature soignée et un décor très sobre imprégné d'esprit classique. Les bâtiments de ferme, à l'exception d'un élément construit en 1879, sont en matériaux traditionnels; pierre pour le logis, pan de bois et torchis pour les granges et le colombier.  Passé dans plusieurs mains au XIXe siècle, le domaine de Tailly (château, parc, ferme) est acquis par Adrien de Hauteclocque et offert à son fils Philippe, le futur Maréchal Leclerc, à l'occasion de son mariage, en 1925. Les descendants du Maréchal Leclerc, décédé en 1947, le conservent encore, aujourd'hui. Le domaine fut acquis par Adrien de Hauteclocque, offert en 1925 à son fils Philippe, le futur maréchal Leclerc, à l'occasion de son mariage: éléments de boiseries, papier peint panoramique en grisaille dans la salle à manger. Enfin, le domaine est doté d'un parc boisé et d'une longue avenue isolant la demeure de la route départementale.  Éléments protégés MH : le château ; l'ancien bâtiment de la cidrerie ; l'ensemble des bâtiments de la ferme ; le parc, y compris l'avenue à l'est du château : inscription par arrêté du 10 octobre 1995.","architecture":"TAILLY--l'Arbre-à-Mouche a été construit, de 1730 à 1740, pour la Famille de Mannay de Camps, qui conserva le domaine jusqu'au lendemain de la Révolution. La demeure conserve de façon très présente la mémoire du maréchal, par les nombreux souvenirs qu'elle détient. On y trouve notamment son mobilier, ainsi que des portraits, des bustes, des statues, des photographies, son journal de chasse, et enfin, des objets qui lui furent offerts en cadeau. Par ailleurs, le château a préservé une partie de ses décors intérieurs des XVIIIe et du XIXe siècles.","habitants":"Famille de Mannay de Camps\"","divers":"Tailly l'arbre à Mouches  GPS : 49° 55' 52\" Nord, 1° 56' 22\" Est","gps":"49° 55' 52\" Nord, 1° 56' 22\" Est","images":["../image/image_80/80_Tailly_arbre_Mouches_1.jpg","../image/image_80/80_Tailly_arbre_Mouches_2.jpg"]},"Consult_chateau_formulaire2f86":{"id":"Consult_chateau_formulaire2f86","dept":"80","canton":"Amiens","commune":"Taisnil","nom":"Taisnil","type":"Château","periode":"XVIII","histoire":"TAISNIL, la seigneurie relevait de la châtellenie de Picquigny. Au XIIIe siècle, une famille du nom de Taisnil possède la terre qui appartient au siècle suivant à Guillaume de Bacquel, puis à la famille du Caurel. Au XVIIIe siècle, François du Pinguet, seigneur de Rouvroy, possède la terre de Taisnil. Ses héritiers revendent cette seigneurie vers 1788, à François Boulanger de Rivery, dont la femme, Anne Bosquillon, est inhumée en 1789 dans le chur de l'église.","architecture":"TAISNIL, est un bâtiment en brique et pierre, formé de plusieurs éléments disparates, il est composé d'un corps de logis central flanqué de deux ailes terminées par deux pavillons extrêmes, le pavillon central à deux niveaux est en légère saillie, coiffé d'un toit à quatre pentes peu élevé, terminé par un important épi de faîtage. A droite l'aile latérale est aussi à deux niveaux, en brique et pierre, sous un toit à deux versants. Chaque niveau possède deux fenêtres rectangulaires, le deuxième étage a été rajouté postérieurement au bâtiment primitif, en effet, on remarque des différences et des décrochements dans l'appareil. L'aile de gauche présente un seul niveau, percé de baies surmontées de lucarnes à la base du toit brisé ; tel devait être probablement l'état primitif de l'aile de droite. Les pavillons extrêmes sont élevés en pierre, ils sont saillants et percés de fenêtres rectangulaires. Leurs toitures sont indépendantes.","habitants":"Famille de François du Pinguet\"","divers":"Taisnil   GPS : 49° 48' 13\" Nord, 2° 06' 28\" Est","gps":"49° 48' 13\" Nord, 2° 06' 28\" Est","images":["../image/image_80/80_Taisnil_1.jpg"]},"Consult_chateau_formulaire38fc-2":{"id":"Consult_chateau_formulaire38fc-2","dept":"80","canton":"Ailly-sur-Noye","commune":"Thoix","nom":"Thoix","type":"Châteaux","periode":"XVI","histoire":"THOIX,  était le chef-lieu d'une châtellenie importante qui relevait de celle de Breteuil et du vidamé de Gerberoy. Le château actuel date de la fin du XVIe siècle et fut construit par le 1er marquis de Thoix. Les pillages de la Révolution et les nombreux changements de propriétaires au cours du XIXe siècle expliquent probablement son état. Il devint en 1920 propriété de M. Marseille dont la famille poursuit toujours la restauration. Le château est une vaste construction en pierres de taille.","architecture":"THOIX, Il est composé d'un corps de logis allongé, rectangulaire, flanqué de deux pavillons saillants. Au centre de ce corps de logis se trouve une porte en plein cintre entre deux pilastres, surmontée d'un fronton triangulaire. On voit encore, de part et d'autre de la porte, les rainures des flèches du pont-levis. A l'intérieur, restent quelques grande salles et un escalier en brique et pierre à rampes droites. Les communs se trouvent derrière le château, devant ce dernier s'étend une grande cour fermée par une grille.","habitants":"marquis de Thoix.\"","divers":"Thoix GPS    49° 42' 20? N, 2° 04' 12? Est","gps":"","images":["../image/image_80/80_Thoix_1.jpg","../image/image_80/80_Thoix_2.jpg","../image/image_80/80_Thoix_3.jpg"]},"Consult_chateau_formulairebbe4":{"id":"Consult_chateau_formulairebbe4","dept":"80","canton":"Ailly-sur-Noye","commune":"Thézy-Glimont","nom":"Thézy_Glimont","type":"Châteaux","periode":"XVIII","histoire":"Deux châteaux dans cet article Thézy et Boury.                                                        THEZY- GLIMONT, le château est situé dans le village, de petites dimensions, il fut édifié en pierre au milieu du XVIIIe siècle. Il possède une élévation à deux étages et chacun des avant-corps centraux est surmonté d'un fronton triangulaire. Le jardin d'agrément du château de Thézy-Glimont, réalisé aux XVIIIe et XIXe siècles, est inscrit au pré-inventaire des jardins remarquables. Accès par la RN 35, entre Boves et Thennes, une petite route sur la droite mène directement à Thézy, à 15 km environ au sud-est d'Amiens.","architecture":"BOURY,  sa construction date du XVIIIe siècle, possède 2 façades reliées par un fronton triangulaire. Une avancée à 3 pans complète le château, côté Est.","habitants":"Seigneur local\"","divers":"Thézy-Glimont   GPS : 49° 48' 48\" Nord, 2° 25' 52\" Est","gps":"49° 48' 48\" Nord, 2° 25' 52\" Est","images":["../image/image_80/80_Th%c3%a9zy_Glimont_1.jpg","../image/image_80/80_Th%c3%a9zy_Glimont_2.jpg"]},"Consult_chateau_formulaire4665":{"id":"Consult_chateau_formulaire4665","dept":"80","canton":"Roye","commune":"Tilloloy","nom":"Tilloloy","type":"château","periode":"XVII","histoire":"TILLOLOY. Il n 'a jamais été vendu il est resté dans la même famille. Le château présente la particularité, tout comme les châteaux de Bertangles, Bussy-lès-Poix et Régnière-Ecluse. Au XIVe siècle, la seigneurie relevait de la châtellenie de Nesle et appartenait à Jean du Fay. Elle passa aux Soyécourt au XVIe par le mariage d'Antoinette de Rasse (à qui l'on doit la construction de l'église actuelle vers 1530) avec Jean III de Soyécourt, puis au début du XVIIe siècle à Ponthus de Belleforière. Son petit-fils, Charles-Maximilien de Belleforière, Marquis de Soyécourt et comte de Tilloloy fut nommé, en 1669, Grand-Veneur, fit bâtir le château, en 1645. Il passa aux Seiglières qui le firent remanier, par Boullée en 1752. Le château de Tilloloy alla à la famille d'Hinnisdäl après la Révolution. Le comte Henri d'Hinnisdäl (1841-1922)  fit restaurer le château de Tilloloy, en 1880 par les frères Duthoit. Le château de Tilloloy fut restauré à l'initiative de la comtesse Thérèse d'Hinnisdal (1878-1959) par l'architecte Montant, en 1930. Ce dernier refit le château à l'identique, en réemployant au maximum les éléments, de l'ancien château. La comtesse mourut sans enfant et le château revint à sa seconde nièce, la marquise d'Andigné, dont la fille est aujourd'hui propriétaire.  l'ancien portail de l'hôtel parisien d'Hinnisdal et la grande allée (et ses bosquets) qui relie le château au village de Laucourt.","architecture":"TILLOLOY, la construction du château de Tilloloy date du XVIIe siècle. Le parc du château de Tilloloy accueille quelques évènements musicaux, comme, par exemple, le Festival de rock Rétro' C'Trop, depuis 2016. La tenue d'un festival de rock gothique et de dark wave a eu lieu en août 2017. Le château de Tilloloy est un château privé, qui appartient à Mlle d'Andigné. La nièce de la comtesse dHinnisdäl lève volontiers le voile sur cet édifice construit en 1645 et restauré en 1880 par les frères Duthoit puis en 1930 par larchitecte Albert Montant. Elle partage sa propriété aux portes de Roye à travers le Festival, chaque été. Pour y passer la nuit, à défaut dune vie de châtelain.                                                                                                           Éléments protégés MH : le château,  Le château de Tilloloy est fait de briques et pierres. Incendié et bombardé lors de la première guerre mondiale, il ne restait, en 1918, du château, que des pans de murs.  l'ensemble des bâtiments des communs et les trois portails monumentaux, ancien portail de l'hôtel parisien d'Hinnisdal remonté dans le parc, restes du parc à la française avec ses allées, ses vases et ses bancs de pierre, les douves sèches et la grande allée axiale avec ses bosquets reliant le château au village de Laucourt : classement par arrêté du 4 mars 1994.","habitants":"Famille de  famille d'Hinnisdäl\"","divers":"Tilloloy GPS : 49° 38' 44\" Nord, 2° 44' 41\" Est","gps":"49° 38' 44\" Nord, 2° 44' 41\" Est","images":["../image/image_80/80_Tilloloy_1.jpg","../image/image_80/80_Tilloloy_2.jpg","../image/image_80/80_Tilloloy_3.jpg","../image/image_80/80_Tilloloy_4.jpg","../image/image_80/80_Tilloloy_5.jpg"]},"Consult_chateau_formulaire077c":{"id":"Consult_chateau_formulaire077c","dept":"80","canton":"Ailly-sur-Noye","commune":"Tilloy lès Contys","nom":"Tilloy_lès_Contys","type":"Châteaux","periode":"XVIII","histoire":"deux châteaux dans cet article Tilloy et Essertaux                                        TILLOY LES CONTIS, le château appartenait au XVIe siècle à la famille de Halluin comme le prouvent, à l'extrémité gauche de la façade et sur le colombier de la cour, les deux écussons aux armes de la famille. C'est un de Fransures qui vendit en 1580, le tiers de la terre de Tilloy à Antoine de Halluin, seigneur de Wailly et que Charles-Maximilien de Halluin acquérait le reste de la propriété en 1618. A partir de cette date, l'histoire des seigneurs de Tilloy se confond avec celle des seigneurs de Wailly. Il paraît  que le château de Tilloy dépendait de la terre de Wailly dont l'important château, éloigné de quelques kilomètres seulement, appartenait alors à la famille de Halluin. Le château actuel fut construit à la fin du XVIIIe ou au début du XIXe siècle, il est de plan rectangulaire, couvert dun toit à quatre pans en ardoise sur une charpente en bois chevillée. Laménagement du parc de huit hectares daterait du dernier quart du XIXe siècle. La demeure souvre sur une grande allée bordée dune double rangée de tilleuls plantés en quinconce. Le château de Tilloy est aujourd'hui la propriété de Monsieur et Madame Benoist.\nÉléments protégés MH : les façades et les toitures, le hall d'entrée avec ses deux paliers et son escalier, le parc : inscription par arrêté du 19 juillet 2004.","architecture":"A cinp K.M. à l'est ESSERTAUX sa construction date du XVIIIe siècle.  \n La demeure doit sa silhouette inhabituelle aux destructions qui ont suivi sa vente après la Révolution avant son rachat en 1826 par la famille de Guillebon. Gabriel de Béry, en faveur duquel Louis XV avait érigé en marquisat la terre d'Essertaux, confia à Sénéchal, architecte de Corbie, la construction du nouveau château, dont le gros oeuvre était achevé en 1786. Le grand corps de logis à deux étages, flanqué d'ailes en retour, et prolongé par deux bâtiments de service plus bas, développait la façade en 21 fenêtres. Le pavillon et les deux ailes mansardées qui subsistent représentent l'avant-corps central et le rez-de-chaussée du corps de logis, soit moins du tiers de la construction dorigine, on remarquera le décor dordres superposés du pavillon, qui se termine par deux écus, encadrés de chimères, et d'où les armoiries de la famille de Béry ont été martelées. Le château est actuellement la propriété de la famille du général de Guillebon. Les communs font partie de la campagne de reconstruction du château, au début du XVIIIe siècle. L'ensemble dessine une répartition équilibrée et symétrique des parties autour de l'esplanade arborée, axe menant au château situé au centre du dispositif. Éléments protégés MH : le château : inscription par arrêté du 19 février 1926., les dépendances en totalité (excepté l'intérieur de l'unité d'habitation nord-ouest), les murs et clôtures, ainsi que le parc et le jardin : inscription par arrêté du 25 janvier 2008, modifié par arrêté du 7 juillet 2008.","habitants":"Tilloy ;                                                            famille de Halluin          Essertaux famille du général de Guillebon.\"","divers":"deux châteaux dans cet article Tilloy et Essertaux   EsserteauxGPS : 49° 44' 26,85\" Nord, 2° 14' 22,82\" Est                    Tilloy GPS : 49° 45' 12,42\" Nord, 2° 10' 43,87\" Est","gps":"49° 44' 26,85\" Nord, 2° 14' 22,82\" Est                    Ti","images":["../image/image_80/80_Tilloy_l%c3%a8s_Contys_1.jpg","../image/image_80/80_Tilloy_l%c3%a8s_Contys_2.jpg","../image/image_80/80_Tilloy_l%c3%a8s_Contys_3.jpg"]},"Consult_chateau_formulaire1492":{"id":"Consult_chateau_formulaire1492","dept":"80","canton":"Abbeville","commune":"Le titre","nom":"Titre","type":"Château","periode":"XVII-XIX","histoire":"Du TITRE, le château de la Garenne appelé aussi le château du Titre Dans « La Garenne », en 1899, des ruines d'un château féodal furent découvertes. Cet ancien château datait du Xe siècle, selon François-César Louandre. Edouard Ier, roi d'Angleterre et son épouse Aliénor achètèrent les terre du Titre à Eustache de Fontaines, seigneur de Longpré, en 1288. Au XVIe siècle, le Château Du Titre appartenait à la famille Le Saige. La construction du château de la Garenne date du XIXe siècle. C'est un château privé, fermé au Public. Aujourd'hui,Emeric et Astrid D'Hautefeuille","architecture":"Du TITRE, le château fut bâti en 1780. Il se compose d'un corps de logis dont l'élévation est à deux étages et dont l'avant-corps central est surmonté d'un fronton triangulaire. Ce corps de logis est flanqué aux extrémités de deux ailes saillantes. Le parc a été aménagé dans le deuxième quart du XIXe siècle et possède un jardin potager, une serre et une fabrique de jardin, le jardin d'agrément du château est inscrit au pré-inventaire des jardins remarquables.  La construction du château du Titre date du XVIIIe siècle. Dans « La Garenne », en 1899, des ruines d'un château féodal furent découvertes. Cet ancien château datait du Xe siècle, selon François-César Louandre. Edouard Ier, roi d'Angleterre et son épouse Aliénor achètèrent les terre du Titre à Eustache de Fontaines, seigneur de Longpré, en 1288.","habitants":"famille Le Saige\"","divers":"Garenne GPS : 50° 11' 21\" Nord, 1° 48' 07\" Est","gps":"50° 11' 21\" Nord, 1° 48' 07\" Est","images":["../image/image_80/80_Titre_1.jpg"]},"Consult_chateau_formulaire87e0":{"id":"Consult_chateau_formulaire87e0","dept":"80","canton":"Abbeville","commune":"Hautvillers-Ouville,","nom":"Triquerie","type":"Château","periode":"XVIII","histoire":"TRIQUERIE,  ancien pavillon de chasse construit en 1770, propriété du comte de Louvencourt, à Ouville. Cette propriété très joliment boisée, qui appartenait au comte de Louvencourt, est située tout au bout dOuville en direction de Drucat Le Plessiel.","architecture":"TRIQUERIE, en direction de Drucat-Le Plessiel Le modeste château de la Triquerie, isolé par rapport au village de Hautvillers-Ouville, est un ancien pavillon de chasse situé dans un parc de 40 hectares. Celui-ci possède une belle allée régulière, un jardin potager, un bassin et une rivière artificielle. Le château a été construit en 1770, à l'intérieur, il a conservé de cette époque, ses élégantes boiseries délicatement sculptées. Le jardin d'agrément de la Triquerie est inscrit au pré-inventaire des jardins remarquables.","habitants":"comte de Louvencourt\"","divers":"château de  Triqurerie à Hautvillers-Ouville","gps":"","images":["../image/image_80/80_Triquerie_1.jpg"]},"Consult_chateau_formulaire55a6":{"id":"Consult_chateau_formulaire55a6","dept":"80","canton":"Amiens","commune":"Blangy-Tronville,","nom":"Tronville","type":"Château","periode":"XVII","histoire":"TRONVILLE, les seigneurs de Tronville sont attestés au XIIIe siècle. Le château est construit en 1677 pour Jacques Becel, écuyer et commissaire aux armées, qui fait l'acquisition du domaine trois ans plus tôt. A la fin du XVIIIe siècle, il appartient aux Langlois de Septenville, dont le monogramme LS orne la grille d'entrée; côté parc le bel escalier est muni d'une rampe aux armes des Septenville. L'étage de la construction en briques et pierre est ajouté au début du XIXe siècle. La chapelle funéraire Saint-Honoré est construite en 1678 dans la cour d'honneur. Une information orale indique que l'étage de comble du corps de logis est reconstruit vers 1868. Le cadastre napoléonien levé vers 1809 figure un important domaine aménagé de nombreuses avenues formant perspectives et espaces de promenade, en particulier la grande avenue à hémicycle donnant accès à la demeure. Le château comprend alors un corps de logis de plan allongé avec un parterre au nord et une cour d'honneur au sud, fermée à l'ouest par des communs. L'accès principal à la cour d'honneur dont le mur de clôture est en hémicycle se situe au sud, dans l'axe du corps de logis; l'accès secondaire se situe au nord-ouest de la cour depuis le chemin de desserte de la ferme. Un petit bâtiment de plan massé est visible dans l'angle sud-est de la cour d'honneur, appuyé au mur de clôture. Immédiatement au nord-ouest du logis apparaît un deuxième petit bâtiment de plan allongé à chevet polygonal. La ferme du château, au nord-ouest, comprend un corps de logis de plan allongé, au sud de la cour, et des dépendances agricoles disposées en U irrégulier, au nord.","architecture":"TRONVILLE, la notice géographique et historique rédigée en 1899 par l'instituteur G. Lefebvre indique que le hameau de Tronville, ne compte plus que 23 habitants à cette date. L'édifice comprend actuellement un corps de logis à étage carré et étage de comble construit en brique avec chaînages de calcaire et couvert d'ardoises, au sud duquel s'étend une cour d'honneur de plan rectangulaire. Une chapelle occupe l'angle sud-est de la cour ; un pavillon en briques est construit au sud-ouest. Une grille portant le monogramme LS. Une avenue à hémicycle donne accès à la demeure depuis la route. La façade sur la cour présente une élévation à sept travées. Au nord-ouest du logis, un petit bâtiment à chevet polygonal, construit en calcaire appareillé en pierre de taille et couvert d'ardoises est mentionné comme chapelle sur le plan cadastral. La ferme présente une disposition à cour fermée avec corps de logis au sud et dépendances agricoles disposées en U irrégulier au nord. D'autres dépendances apparaissent au centre de la cour, au sud et à l'ouest de la ferme.","habitants":"Famille de Langlois de Septenville\"","divers":"château de Blangy-Tronville  GPS : 50° 00' 20\" Nord, 2° 29' 20\" Est","gps":"50° 00' 20\" Nord, 2° 29' 20\" Est","images":["../image/image_80/80_Tronville_1.jpg","../image/image_80/80_Tronville_2.jpg"]},"Consult_chateau_formulairebec9":{"id":"Consult_chateau_formulairebec9","dept":"80","canton":"Corbie","commune":"Vadencourt","nom":"Vadencourt_80","type":"Château","periode":"XVIII","histoire":"VADENCOURT, la seigneurie de Vadencourt appartenait au Moyen-Age à une famille qui en portait le nom. Le 1er seigneur connu est Baudouin, chevalier, en 1245. En 1437, on trouve Bauduin de Waulincourt puis, un peu plus tard, Gilles de Sarcus. En 1488 c'est Charles de Moyencourt, écuyer, seigneur de Moyencourt, qui est propriétaire de Vadencourt. Le domaine est transmis par mariages successifs, à la famille du Chastenet et à la famille d'Estourmel. Puis vient Henri Pingré de Vraignes, en 1710, dont le gendre Jean-François de Chassepot de Beaumont vendra la terre, en 1748, à François Emmanuel de Quellerie, chevalier, seigneur de Chanteraine et autres lieux.","architecture":"VADENCOURT , érigé entre l'église et les sources de l'Hallue, se compose d'un corps de logis central encadré par une cour de communs au nord, et un corps de ferme au sud. Tous les bâtiments sont en craie, exceptée l'élévation sud en briques et pierres. Le corps de logis est en rez-de-chaussée, avec un étage de comble couvert d'un toit à la Mansart. Les deux ailes en retour d'équerre, abritant les écuries (au nord) et la cuisine avec le logement du fermier (au sud) , sont couvertes par un toit à longs pans, pignons découverts. Elles sont épaulées par deux tours rondes coiffées d'un toit en poivrière. Une grille en fer forgée marque l'entrée du château, entre ces deux tours. C'est à peu près à cette époque semble-t-il, ou peut-être même au début du XVIIIe siècle que fut bâti le château actuel. qui se compose d'un corps de logis couvert d'un toit à la Mansart et flanqué de deux ailes en retour d'équerre avec une toiture à deux pans, ces ailes sont reliées au corps de logis par des angles arrondis percés d'une porte. Elles sont par ailleurs terminées, du côté de la cour par une tour ronde coiffée d'un toit en poivrière. A ces deux tours est accrochée l'élégante grille en fer forgé qui ferme la cour d'honneur complètement enserrée par les bâtiments. L'élévation du corps de bâtiment est à un étage seulement sans avant-corps central. L'entrée principale se trouve dans l'angle nord-ouest du corps de logis.","habitants":"Famille du Chastenet \"","divers":"Château de Vadencourt   GPS : 50° 00' 20\" Nord, 2° 29' 20\" Est","gps":"50° 00' 20\" Nord, 2° 29' 20\" Est","images":["../image/image_80/80_Vadencourt_80_1.jpg","../image/image_80/80_Vadencourt_80_2.jpg","../image/image_80/80_Vadencourt_80_3.jpg"]},"Consult_chateau_formulaire448c-2":{"id":"Consult_chateau_formulaire448c-2","dept":"80","canton":"Flixecourt","commune":"Vauchelles lès-Domart","nom":"Vauchelles","type":"Château","periode":"XVII","histoire":"VAUCHELLES   Antoine de Blottefière, chevalier, gouverneur de la ville et du château de Doullens, acquiert en 1595 le fief de Vauchelles sous Ailly. Il n'est pas impossible qu'une première maison seigneuriale ait existé, dont des vestiges pourraient subsister dans le soubassement du bâtiment des communs sur la basse cour. Son fils cadet François de Blottefière, vicomte de Domart, capitaine d'infanterie au régiment de Picquigny puis lieutenant du roi en Picardie, fait construire vers 1630 l'actuelle demeure (logis principal, ailes basses, bâtiment des communs, mur de clôture). La demeure était distribuée en enfilade simple, de part et d'autre d'un escalier central rampe-sur-rampe. Chaque niveau du logis principal devait abriter une salle et une chambre, sans doute complétées de pièces de service, de commodités et de logements secondaires dans les ailes et les étages de combles. François de Blottefière rattache en 1670 le domaine de Mouflers à celui de Vauchelles.
