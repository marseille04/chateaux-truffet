 Nicolas de Blottefière, marquis, cède le domaine en 1756 à sa fille Marguerite de Blottefière, épouse de Jean-Baptiste du Sauzay, marquis d'Amplepuis, seigneur de Ronno. C'est à cette époque que l'escalier est décentré vers l'est, afin d'aménager un vestibule au rez-de-chaussée et une nouvelle chambre au centre du premier étage. Cette pièce de style rocaille présente un lambris dont le revers porte l'inscription à la craie: \"héno\", qui peut être interprétée comme une signature et une datation, ou alors comme un simple graffiti indiquant à tout le moins que le lambris était posé à cette date. Dans la deuxième moitié du XVIIIe siècle, les propriétaires entreprennent d'importants travaux, ajout de pavillons en retour d'équerre sur la cour (1767), qui présente un appareil comparable ; remaniement du mur de la cour et construction du portail principal (1771).","architecture":"VAUCHELLES  Les deux pavillons devaient abriter d'une part la cuisine, le logement du chapelain ou le chartrier. À l'édicule d'angle du pavillon est, abritant le fournil, répondait un édicule similaire, quoique plus petit, à l'angle du pavillon ouest, qui servait peut-être de bûcher. Vétuste, cette construction a été détruite au début des années 1970. Par ailleurs, sur les plans d'intendance des années 1770, on distingue attenante à la chapelle une petite aile en retour d'équerre sur jardin, dans le prolongement de celle située sur la cour, peut-être pour abriter une dépendance de jardin. Saisi sous la Révolution, le domaine de Vauchelles est restitué en 1815 à Louis Joseph Henri, marquis du Sauzay, ancien colonel et chevalier de Saint-Louis, époux d'Hortense des Essarts. En 1842, il passe à leur fille unique Agathe-Hortense du Sauzay, épouse d'Auguste-Gabriel, comte de Gomer. C'est peut-être elle qui fait redécorer deux pièces de l'aile ouest, un salon en style néo-rocaille et une petite salle à manger en style néo-Henri II. Elle fait ériger à ses frais la nouvelle église paroissiale avant de laisser en 1881 le domaine de Vauchelles à sa nièce et filleule, Agathe des Essarts, épouse du comte de Saint-Sauveur. Ses descendants le possèdent toujours. À la fin du XIXe ou au début du XXe siècle sont aménagés les garages et le parterre de pelouse au centre de la cour. Les aménagements intérieurs, sans caractère particulier à l'exception de ceux déjà mentionnés, datent pour la plupart des XIXe ou XXe siècle. Durant la seconde guerre mondiale, le château a été occupé par l'organisation allemande de génie militaire Todt, le mobilier. En remplacement d'une simple pelouse, un jardin régulier a été aménagé au sud du logis, sur les plans de l'architecte amiénois Patrick Delamotte, établis par devis du 24 mars 1983.","habitants":"Famille de François de Blottefière\"","divers":"Château de Vauchelles  GPS : 50° 03' 21\" Nord, 2° 03' 23\" Est","gps":"50° 03' 21\" Nord, 2° 03' 23\" Est","images":["../image/image_80/80_Vauchelles_1.jpg","../image/image_80/80_Vauchelles_2.jpg","../image/image_80/80_Vauchelles_3.jpg"]},"Consult_chateau_formulaireddb7":{"id":"Consult_chateau_formulaireddb7","dept":"80","canton":"Gamaches","commune":"Fontaine-sur-Somme","nom":"Vieulaines","type":"Château","periode":"XVII","histoire":"VIEULAINES, possède un superbe château, qui offre un corps de logis édifié vers 1750 par J.B. de May de Vieulaines , il y fut empoisonné le 2 mai 1763 par son neveu héritier ; Charles le Roy de Valines qui avait dejà empoisonné son père  et sa mère quelques jours plus tôt et devait être brulé vif à Abbeville le 3 septembre 1764 à l'âge de dix-huit ans . Le 22/08/1346, lors de la chevauchée, les troupes anglaises d'Édouard III tentèrent de prendre Fontaine, qui disposait d'un pont, pour franchir la Somme mais elles furent repoussées par les troupes françaises. En août 1763, Charles François Joseph de Valines, écuyer et seigneur de Valines, Ils en réchapperont mais Mr de Riencourt y laissera la vie.  Au cours des deux guerres mondiales, une ancienne carrière de craie fut utilisée comme lieu de refuge pendant les alertes dues aux conflits. Le château de Vieulaines est inscrit partiellement aux M.H. depuis 1990,","architecture":"VIEULAINES, le château en brique à chaînages de pierre, prolongé de chaque côté par une aile plus basse terminée par un pavillon. La façade sur cour, banale et remaniée au XIXe siècle, contraste avec la façade sur parc, qui présente un élégant avant-corps à refends et pilastres ioniques cannelés.  Éléments protégés MH : les façades, les toitures et la rampe d'escalier en fer forgé : inscription par arrêté du 30 mars 1990.","habitants":"Famille de J.B. de May de Vieulaines\"","divers":"Château de Vieulaines  GPS : 50° 01' 23,65\" Nord, 1° 57' 49,78\" Est","gps":"50° 01' 23,65\" Nord, 1° 57' 49,78\" Est","images":["../image/image_80/80_Vieulaines_1.jpg"]},"Consult_chateau_formulaired01a-2":{"id":"Consult_chateau_formulaired01a-2","dept":"80","canton":"Flixecourt","commune":"Ville de Marclet","nom":"Ville_de_Marclet","type":"Châteaux","periode":"XVIII","histoire":"VILLE DE MARCLET l'édifice appartient à Émile Racine. Il comprend, outre le château, un jardin, un verger et une pépinière. Les matrices signalent une augmentation d'imposition du château en 1864, pour une extension achevée en 1861. En 1864, le château devient la propriété d'Omer Hippolyte Jérôme.  Le logis à étage carré et étage de comble, flanqué de deux ailes basses, présente une élévation sur le jardin à huit travées. Au centre, le léger avant-corps en briques couronné d'un fronton triangulaire, à deux travées de baies cintrées, donne accès à la terrasse. La façade comporte un enduit. On distingue trois refends internes. Les ailes basses à trois travées comptent un étage de comble. D'après le dictionnaire historique et archéologique de Picardie (1909), le château de Ville-Saint-Ouen aurait été bâti en 1755 pour le baron François Vincent de Tournon.","architecture":"MARCLET, l'ancien château de Ville présente un bâtiment de plan allongé (simple en profondeur), une cour au nord et des jardins au sud. Des communs et un colombier de plan octogonal sont visibles au nord. Une petite terrasse et un petit escalier visible au centre du jardin, compensent le fort dénivelé du terrain. Le château dispose de trois accès, deux accès aboutissant à une avant-cour (l'un précédé d'une avenue depuis la route de grande communication, l'un contournant le bois, depuis la route d'Abbeville), et un depuis le village aboutissant à la cour, qui distribue les différents bâtiments.  Le bâtiment était composé d'un corps principal de huit travées, construit en brique et pierre, et dont les deux travées centrales réunies sous un fronton triangulaire formaient un léger avant-corps. Il était flanqué de deux ailes basses en pierre et couvertes de combles à la Mansart. En 1912, ce château est démoli et Robert Saint en rachète les vestiges l'année suivante. En raison des circonstances de la première guerre mondiale, il ne peut entamer sa reconstruction qu'à partir de 1918. Les travaux sont achevés en 1922. En février 1923, le syndicaliste Léon Baquet évoque d'ailleurs la construction de ce nouveau château de la famille Saint. L'édifice actuel comprend un logis de plan allongé, composé d'un corps central à cinq travées flanqué de pavillons à pans coupés. Construit en briques avec chaînages en calcaire, il compte un étage carré et deux étages de comble. La toiture débordante à demi-croupes est couverte d'ardoises.  propriété privée, Institut Médico Educatif.","habitants":"Famille d'Émile Racine\"","divers":"Ville de Marclet  GPS : 50° 01' 24\" Nord, 2° 05' 22\" Est","gps":"50° 01' 24\" Nord, 2° 05' 22\" Est","images":["../image/image_80/80_Ville_de_Marclet_1.jpg","../image/image_80/80_Ville_de_Marclet_2.jpg"]},"Consult_chateau_formulairef1d2":{"id":"Consult_chateau_formulairef1d2","dept":"80","canton":"Rue","commune":"Villers sur Authie","nom":"Villers_Authie","type":"Château","periode":"XVII","histoire":"VILLERS sur AUTHIE, maison de Moreuil  Dès 1220-1230, Bernard de Moreuil, chevalier, est signalé comme seigneur local.  De 1250 à 1302, Bernard de Moreuil, chevalier son fils lui succède de 1302 à 1360, Bernard de Moreuil, chevalier, maréchal de France.  En 1380, Tristan de Moreuil, chevalier.  En 1399, Colaye de Moreuil, femme de Jean de Friaucourt, chevalier.  François Truffier, Jean Truffier  comte de Villers, capitaine au régiment de la reine, commandeur de l'ordre de Saint-Lazare, chevalier de Saint-Louis ; il a pour héritier son neveu qui l'obtient en 1679 l'errection  en comté des terres de Villers. Ceci laisse supposer que le château aurait été bâti en 1687 sur l'initialive de Gabrielle de Saint-Souplis, dame de Dreuil, Sorel, Wanel, veuve de Jean Truffier, chevalier, seigneur d'Allenay, pour qui la terre et seigneurie de Villers sur Authie fut érigée en comté par le Roi Louis XIV, le 22 février 1679. Jean Truffier, étant mort sans enfants, avait légué Villers à  sa fille unique du ménage, la marquise de Wargemont , échoit à son frère puîné, François Truffier, comte de Villers, capitaine au régiment de la reine, commandeur de l'ordre de Saint-Lazare, chevalier de Saint-Louis. En 1710 le domaine passe par alliance au Caheleu.  Claude de Cacheleu qui épouse en 1714 Bonne-Françoise de Manneville, fille du gouverneur de Dieppe  après la Révolution Henriette de Cacheleu  épouse le comte  de Guibert de Fonteloy le domaine passe ensuite par alliance aux Thouret, en 1930 vendu à monsieur Durand, aujourd'hui le propriétaire est monsieur Doublet.","architecture":"VILLERS sur AUTHIE,   le château, bâti en pierre et couvert d'ardoise, porte sur l'une de ses façades latérales, exposée au sud, les dates de sa construction et de sa restauration : 1687 et 1878. A la façade principale, deux écus ovales accolés et surmontés de la couronne de comte, représentent les armes de Truffier,  on a perdu la trace de l'ancien château qui était entouré de fortes murailles avec pont-levis. Il était situé près du château actuel.  Le village a longtemps tiré des ressources de l'exploitation de la tourbe dont les revenus étaient partagés entre le comte de Ponthieu et le prieur de Maintenay.  En 1849, comme dans toutes les communes de France, la population masculine majeure put, pour la première fois, aller voter grâce à l'instauration du suffrage universel. Voici la répartition (en nombre  de quelques patronymes des électeurs. Les armes de Jean Truffier et de Gabrielle de Saint-Souplis, sont représentées sur la façade principale.   Ce beau château fut construit auprès de l'ancien château situé sur une éminence, enclos de fortes murailles et de tourelles et fermé de bons fossés, étangs, voûtes souterraines.","habitants":"Famille de Jean Truffier\"","divers":"Villers Authie GPS : 49° 46' 00,15\" Nord, 2° 09' 22,6\" Est","gps":"49° 46' 00,15\" Nord, 2° 09' 22,6\" Est","images":["../image/image_80/80_Villers_Authie_1.jpg","../image/image_80/80_Villers_Authie_2.jpg","../image/image_80/80_Villers_Authie_3.jpg"]},"Consult_chateau_formulaire6e84-2":{"id":"Consult_chateau_formulaire6e84-2","dept":"80","canton":"Ailly-sur-Noye","commune":"Conty","nom":"Wailly","type":"Château","periode":"XVI-XVII","histoire":"WAILLY; il existe très peu d'archives relatant l'histoire de la construction du château de Wailly, ayant débuté vers 1640, s'est poursuivie en 1690, édification des communs, pour se terminer vers 1785 par les pavillons d'angle et l'Hémicycle. Le corps de logis et l'aile Est ont été démolis pendant la Révolution en 1789. L'aile ouest avait perdu la partie Sud de son toit au XIXe siècle. En 1919, le château est vendu par Ferdinand de Croy d'Havré au baron Alexis de l'Epine dont la famille, originaire de Belgique, se fixa en France à la fin du XVIIIe siècle. Il entreprend alors des travaux qui seront poursuivis jusqu'en 1925 par l'architecte Pierre Parent. Pendant la seconde guerre mondiale, en septembre 1944, le général Montgoméry y a établi son QG.","architecture":"WAILLY, le corps de logis actuel, en brique et pierre, ne représente plus que le tiers du château originel.  Il comporte un étroit pavillon central encadré de larges ailes, ces dernières arrangées en façade de petits pavillons saillants, accolés sur les côtés. Au sud, un corps intermédiaire disposé en équerre le relie à un second corps de bâtiment, parallèle à lui, abritant dépendances et logements de service. Cest ce second bâtiment, directement adossé à la falaise crayeuse, qui constitue le château actuel. L'accès au château se fait par une allée bordée par les communs et d'un hémicycle de pierre en ruines. Le plan en U du château initial révèle les dimensions imposantes de l'édifice avec des jardins à la française en contrebas de l'aile Est. La restauration du début du XXe siècle a utilisé des matériaux des bâtiments ruinés. Aujourd'hui, une allée, bordée de part et d'autre des communs monumentaux et du bel hémicycle de pierre en ruine, mène au château construit dans leur prolongement. Le château restauré est inscrit aux monuments historiques.\nÉléments protégés MH : les ruines de l'hémicycle ; les façades et les toitures du bâtiment Sud-Est des communs ; la façades subsistante du bâtiment Nord-Ouest ; les terrasses avec leurs murs de soutènement : classement par arrêté du 20 août 1974. Les façades et les toitures de l'aile subsistante ainsi que la pièce dite la chapelle : inscription par arrêté du 20 août 1974.","habitants":"Famille du baron A. de l'Epine \"","divers":"Château de Wailly GPS : 49° 46' 00,15\" Nord, 2° 09' 22,6\" Est","gps":"49° 46' 00,15\" Nord, 2° 09' 22,6\" Est","images":["../image/image_80/80_Wailly_1.jpg","../image/image_80/80_Wailly_2.jpg"]},"Consult_chateau_formulairedcf3":{"id":"Consult_chateau_formulairedcf3","dept":"80","canton":"Corbie","commune":"Wargnies","nom":"Wargnies_Naours","type":"Châteaux","periode":"XVIII","histoire":"Deux châteaux dans cet article  Wargnies  et Naours.                                                                                                    A cinq K.M. de distance  WARGNIES  Le château de Wargnies a vraisemblablement été construit au milieu du XVIIIe siècle, le parc  possède un beau jardin d'agrément inscrit au pré-inventaire des jardins remarquables.","architecture":"NAOURS est issu dun site féodal très ancien qui remonte  au haut Moyen Âge et qui aurait pris la place dun établissement de lépoque romaine. Le château était entouré de douves qui ont été comblées. Il était protégé par une muraille complète avec tours dangle. À lemplacement approximatif de la grille se trouvait un pont-levis. Les murs ont été modifiés depuis. Les parties les plus anciennes sont le mur (brique et pierre) style Louis XIII et les restes dun ancien donjon (sans doute du XVe siècle sur la face nord. Plusieurs constructions se sont succédé  après les guerres du XVIIe siècle, au cours desquelles il fut en partie détruit, il fut reconstruit (au début du XVIIIe siècle) et a subsisté dans son ensemble jusquà nos jours.  Le pigeonnier menaçait de tomber en ruine et nétait plus en harmonie avec le nouveau château : en 1737, labbé Corbie fit dresser un projet par divers artisans. Il fut achevé en 1738 puis partiellement restauré en 1987. Le château était une dépendance de la très puissante abbaye de Corbie, qui selon les périodes, laissa plus ou moins dautonomie à son représentant. Il semble même que celui-ci ait fini par jouir dune véritable indépendance car, en 1435, labbaye dut racheter le fief de Naours à un seigneur voisin. À la Révolution française, le château fait partie des biens nationaux et est vendu en adjudication le 31 janvier 1783 à un Amiénois. Aux XIXe et XXe siècles, le château sera la plupart du temps la propriété des notaires résidant à Naours. Il  est transformé en lieu de réception pour les professionnels et les particuliers.","habitants":"Les notaires locaux\"","divers":"Château de Wargnies à Naours","gps":"","images":["../image/image_80/80_Wargnies_Naours_1.jpg","../image/image_80/80_Wargnies_Naours_2.jpg"]},"Consult_chateau_formulaire51b2":{"id":"Consult_chateau_formulaire51b2","dept":"80","canton":"Corbie","commune":"Warloy-Baillon","nom":"Warloy_Baillon","type":"Château","periode":"XVII","histoire":"WARLOY-BAILLON, l'histoire de Warloy est étroitement liée à celle de l'abbaye de Corbie. En effet, à l'origine la seigneurie et la terre de Warloy lui appartenaient du fait de la donation du comte Guntland au VIIe siècle. L'abbaye abandonne la terre de Warloy en fief à Guy II de Châtillon, comte de Saint Pol. La seigneurie restera dans la famille de Châtillon, puis dans celle des Luxembourg jusqu'en 1504. A cette date Louise de Luxembourg et son mari Jean de Ghistelles cèdent Warloy à Pierre d'Ostrel abbé de Corbie. Son successeur, Guillaume du Caurel la revend en 1509 à Adrien de Hénencourt, doyen du chapitre de la cathédrale d'Amiens, qui la transmet à son neveu, Jacques de Lameth-Hénencourt. A partir de ce moment, la seigneurie de Warloy aura les mêmes destinées que la seigneurie voisine d'Hénencourt. Baillon dépendait de la prévôté de Beauquesne relevant de la province d'Artais. Cette seigneurie ne fut réunie à la province de Picardie qu'en 1743.","architecture":"WARLOY-BAILLON, le château est une demeure en brique et pierre, à deux niveaux sur un soubassement de grès, accosté de deux pavillons plus bas. La travée centrale du corps de logis est en pierre. Deux pilastres encadrant la porte d'entrée, soutiennent un entablement que surmonte un balcon en fer forgé. Une baie rectangulaire en pierre est sommée d'une volute saillante au deuxième étage. Le toit en ardoise est percé de trois lucarnes.","habitants":"Famille  Jacques de Lameth-Hénencourt.\"","divers":"Warloy Baillon GPS : 50° 06' 16\" Nord, 1° 58' 39\" Est","gps":"50° 06' 16\" Nord, 1° 58' 39\" Est","images":["../image/image_80/80_Warloy_Baillon_1.jpg"]},"Consult_chateau_formulaireb80d-2":{"id":"Consult_chateau_formulaireb80d-2","dept":"80","canton":"Rue","commune":"Yaucourt-Bussus,","nom":"Yaucourt_Bussus","type":"Château","periode":"XVIII","histoire":"YAUCOURT-BUSSUS, la construction du château de Yaucour date du XVIIIe siècle. Dès l'entrée du parc, le château de Yaucourt, tout illuminé, nous dévoile sa belle façade typique en briquettes de la région. Nous serons accueillis par le propriétaire, Christian du Perray, passionné et amoureux des belles demeures. Il a restauré le château de Yaucourt, tout en gardant son âme, sans le défigurer, avec, par exemple ses parquets qui craquent mais le bois, c'est vivant ! C'est ça la vie dans un vieux château. Le château de Yaucourt possède aussi un beau parc de 3,4 ha avec quelques arbres remarquables : un cèdre du liban, un platane oriental, un hêtre pourpre.","architecture":"YAUCOURT-BUSSUS , le château était un gite d'hôtes avant que le château ne soit vendu aux enchères et racheté par un particulier. Le château de Yaucourt-Bussus est en excellent état. Aucun travaux n'est à faire. Sa surface habitable est de 800m2. Le château est composé d'un grand salon, d'un séjour digne d'une salle de réceptiion, d'une imposante cuisine, de 6 chambres, et de 2 salles de bain. Le Domaine qui l'entoure est de 3,4 Ha. avec un parc arboré et des dépendances.","habitants":"propriétaire, Christian du Perray,\"","divers":"Yaucourt Bussus_ GPS : 50° 03' 40\" Nord, 1° 31' 07\" Est","gps":"50° 03' 40\" Nord, 1° 31' 07\" Est","images":["../image/image_80/80_Yaucourt_Bussus_1.jpg","../image/image_80/80_Yaucourt_Bussus_2.jpg"]},"Consult_chateau_formulaire3d6c-2":{"id":"Consult_chateau_formulaire3d6c-2","dept":"80","canton":"Friville-Escarbotin","commune":"Yzengremer","nom":"Yzengremer","type":"Château","periode":"XVII","histoire":"YZENGREMER, le château  aurait toujours appartenu à la même famille Fautereau. Très restauré au XIXe siècle, il possède de très beaux bossages \"en pointes de diamant\" qui ornent l'angle de l'étage de l'aile sud ouest et les deux pieds droits de la fenêtre qui le jouxtent, méritent toute notre attention tant ils sont exceptionnels en Picardie et même en France. Comment expliquer que des artisans d'un modeste, château de la campagne picarde aient eu connaissance d'un tel motif. Nous savons qu'Anne de Fautereau, chevalier, baron de Noleval, descendant d'une famille normande du pays de Bray, qui vécut de 1603 à 1676, épousa Marie de Strozzi de la maison des Strozzi de Florence en 1647. C'est à lui qu'il faut attribuer la construction du château dans la première moitié du XVIIe siècle. Il ne fait donc presque aucun doute que le modèle vint directement de l'Italie. Peut-on imaginer toute la façade ainsi ornée ou bien ne s'agit-il que d'un essai.  Les travaux du XIXe siècle ne nous permettent pas de donner de réponse certaine. Tout au plus peut-on relever que l'appareillage en harpe autour des fenêtres n'est pas toujours en pierre, certaines parties n'étant en réalité qu'un enduit de chaux et de torchis. Un tel procédé n'était pas habituel au XIXe siècle, mais relèverait plutôt de pratiques ayant eu cours au XVIII siècle. Le  château est situé au centre de la commune, au sud-ouest de la place publique et reste accessible depuis cette dernière par un chemin bordé d'arbres. Le logis construit en briques avec un soubassement de silex et de pierres calcaires, présente un corps de bâtiment central muni d'un retour d'équerre au sud-ouest.","architecture":"YZENGREMERY, comporte un rez-de-chaussée, un étage et des combles aménagés. Trois tours carrés sont établies aux angles nord-ouest, nord-est et sud ouest. A l'étage de l'aile sud ouest, les deux piédroits qui ornent la fenêtre comportent des bossages. Ces derniers ne sont pas toujours réalisés en pierre mais en enduit de chaux. La travée centrale de la façade antérieure et postérieure, édifiée au début du XXe siècle, est construite en pierres légèrement en saillie. Elles comportent de multiples décorations florales ainsi que des pinacles. Le fronton de la lucarne du premier étage accueille deux blasons représentant les armes de la famille De Fautereau. Les lucarnes des combles, à chapeau de gendarmes, ont également été aménagées au début du XXe siècle. La cour comporte des communs au sud-ouest, édifiées en briques et au rez-de-chaussée l'ensemble est complété par un colombier orthogonale, édifié en briques pour le soubassement et en torchis et pans de bois pour la partie supérieure. Il est coiffé d'un toit en ardoises. A proximité, l'emplacement de l'ancienne marre reste visible. A l'intérieur, le rez-de-chaussée et l'étage semblent avoir conservé l'essentiel de leur distribution du XVIIIe siècle, et les pièces leurs proportions.","habitants":"famille Fautereau\"","divers":"Yzengremer  GPS : 50° 03' 40\" Nord, 1° 31' 07\" Est","gps":"50° 03' 40\" Nord, 1° 31' 07\" Est","images":["../image/image_80/80_Yzengremer_1.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','80 — Somme'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
