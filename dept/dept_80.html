y \"","divers":"deux châteaux dans cet article de Bouillancourt grav 1 à 4 et Ansennes grav-5. Boulliancourt GPS : 49° 57' 41\" Nord, 1° 37' 44\" Est","gps":"49° 57' 41\" Nord, 1° 37' 44\" Est","images":["../image/image_80/80_Bouillancourt_1.jpg","../image/image_80/80_Bouillancourt_2.jpg","../image/image_80/80_Bouillancourt_3.jpg","../image/image_80/80_Bouillancourt_4.jpg","../image/image_80/80_Bouillancourt_5.jpg"]},"Consult_chateau_formulaire80fa":{"id":"Consult_chateau_formulaire80fa","dept":"80","canton":"Ailly-sur-Somme","commune":"Bovelles","nom":"Bovelles","type":"Châteaux","periode":"XVII","histoire":"Deux châteaux dans cet article; Bovelles et  Gribeauval.                                  BOVELLES, limposante façade en briques et de pierres, toiture en ardoise d'Anjou un peu austère du château porte bien la marque de celui qui a construit ce bâtiment. En 1769, Jean-Baptiste Vacquette de Gribeauval, chevalier, lieutenant général des armées du roi, acquiert la terre et la seigneurie de Bovelles. Premier inspecteur de lartillerie, cest lui qui réorganise cette arme, et dote larmée française dun matériel qui fit toutes les campagnes de la Révolution et de lEmpire. Il construit le château actuel dans les années 1770. Cest un grand corps de logis flanqué de deux pavillons en saillie, les bâtiments de service, exceptionnellement développés, servaient au logement de cent hommes à cheval. A sa mort en 1789, sa soeur, mademoiselle Vacquette de Fréchencourt, hérita du domaine, puis par divers legs, le château passa dans la famille du Bos, qui le possède toujours. Éléments protégés MH : les façades et les toitures du château : inscription par arrêté du 28 août 1989.","architecture":"GRIBEAUVAL, La construction du château de Gribeauval fut terminée, quelques années, avant la Révolution Française. Il existe aussi à découvrir, sur la commune, le château de Bovelles et le Manoir Seigneurial de Bovelles.","habitants":"Jean-Baptiste Vacquette de Gribeauval\"","divers":"Deux châteaux dans cet article; Bovelles grav1-2 et  Gribeauval grav-3.     GPS : 49° 53' 06\" Nord, 2° 08' 16\" Est                                    Gribeauval  GPS : 49° 53' 00\" Nord, 2° 08' 46\" Est","gps":"49° 53' 06\" Nord, 2° 08' 16\" Est","images":["../image/image_80/80_Bovelles_1.jpg","../image/image_80/80_Bovelles_2.jpg","../image/image_80/80_Bovelles_3.jpg"]},"Consult_chateau_formulairef556":{"id":"Consult_chateau_formulairef556","dept":"80","canton":"Rue","commune":"Brailly Cornehotte","nom":"Brailly_Cornehotte","type":"Châteaux","periode":"1650-1770","histoire":"deux châteaux dans cet article; Brailly-Cornehotte et Gapennes.                                   BRAILLY-CORNEHOTTE au XVIe siècle,  la seigneurie de  Brailly et en possession  des Bruigny, son seigneur était  Antoine de Bruigny  en 1770 sa fille  Marie-Charlotte-Alexandrine de Bruigny épouse le fils  Antoine-Joseph du Maisniel, maire d'Abbeville,  il a  construit le château de 1770 à 1775,  L'architecte fut Ange-Jacques Gabriel.  Le château est vendu comme bien national en 1793. En 1891 le château sort de la descendance des Maisniel  la famille parvient à récupérer le domaine  et c'est à Brailly qu'Antoine-Joseph est devenu maire du village en 1807 il s'éteint en 1822, le château passe à sa fille épouse Jean-Baptiste-Sébastien DrIllet de Lanigout, puis échoit par alliance  aux Cazin d'Honincthum. Appartient actuellement au vicomte Raymond de Chabot-Tramecourt. inscription par arrêté du 9 juillet 1926. Éléments protégés MH : le motif central de la façade principale.                                                                                  GAPENNES; village au sud   En 831, la seigneurie était possédée par l'abbaye de Saint-Riquier. Le château fut construit en 1650, lors des guerres où l'Espagne et la France se disputent le Ponthieu, l'église (seul subsistera le clocher) et le château ne sont pas épargnés. Suite au décès de Jules de Carpentin, châtelain et maire, le comte François-Marie Alof de Louvencourt hérite du château de Gapennes. Il est nommé en 1851 lieutenant de louveterie de l'arrondissement d'Abbeville. Le jardin d'agrément du château de Gapennes est inscrit au pré-inventaire des jardins remarquables.","architecture":"BRAILLY CORNEHOTTE  Ses deux façades en brique et pierre sont très dissemblables à larrivée, deux ailes en retour encadrent le corps de logis, plus élevé dun attique, et couvert comme lensemble dun toit à faible pente. L'avant-corps central en pierre blanche est orné de grands motifs Louis XVI. Dans le parc, un hémicycle décoré de pilastres colossaux fait saillie au centre de la façade rectiligne. à la fin du XIXe siècle construction de l'aile gauche et remaniement de la façade du corps principal. Lintérieur de la demeure renferme de belles sculptures de Pfaffenhoffen, ancien officier autrichien devenu sculpteur et établi à Abbeville mais aucune source ne vient confirmer cette hypothèse. L'artiste a surtout travaillé à labbaye de Valloires. Une plaque rappelle que \"Jean-Pierre-Clarisse Florian composa dans ce château quelques-unes de ses fables\" . Lintérieur renferme de belles sculptures attribuées à Simon Pfaff de Pfaffenhoffen, ancien officier autrichien devenu sculpteur et établi à Abbeville. L'édifice est construit en brique et pierre. Les deux façades sont très différentes. Deux ailes en retour encadrent le corps de logis, plus élevé. Il est couvert dun toit à faible pente. L'avant-corps central en pierre blanche est sculpté de grands motifs Louis XVI. Dans le parc, un hémicycle décoré de pilastres s'avance au centre de la façade. Le château de Brailly-Cornehotte est inscrit aux M.H. depuis 1926, pour sa façade.","habitants":"Famille de Antoine-Joseph du Maisniel,\"","divers":"deux châteaux dans cet article; Brailly-Cornehotte grav 1-2-3 et Gapennes grav-4     Brailly GPS : 50° 13' 05\" Nord, 1° 57' 36\" Est                gps 50° 12' 56? N, 1° 57' 22? E","gps":"50° 13' 05\" Nord, 1° 57' 36\" Est                gps 50° 12'","images":["../image/image_80/80_Brailly_Cornehotte_1.jpg","../image/image_80/80_Brailly_Cornehotte_2.jpg","../image/image_80/80_Brailly_Cornehotte_3.jpg","../image/image_80/80_Brailly_Cornehotte_4.jpg"]},"Consult_chateau_formulaire3d35":{"id":"Consult_chateau_formulaire3d35","dept":"80","canton":"Abbeville","commune":"Boismont","nom":"Bretel","type":"Château","periode":"XVIII","histoire":"BRETEL, Pierre-Edouard du Liège d'Ausny fait construire, sur un terrain acheté en 1832 à la commune de Boismont, ce château qui reste dans la famille jusqu'en 1901. En 1926, celui-ci est racheté par Bernard de Rainvillers, puis loué à René de Ramecourt, avant d'être donné à Gabrielle de Rainvillers. En 1940, les bombardements détruisent une partie des dépendances. Selon les propriétaires, le château semble avoir brûlé au milieu des années 1990. Il s'en suivit l'abaissement du toit (le bord des souches de cheminée en témoigne) ainsi que la transformation des deux pans brisés et croupes brisées en toit à longs pans et croupes, tel que les cartes postales du début du XXe siècle l'attestent. Le château semble avoir été, à cette période, entièrement recouvert de chaux. Les anciennes photographies témoignent encore de la présence, sur le côté oriental de la cour de la ferme, d'un long bâtiment qui semble avoir accueilli les étables à moutons, entièrement en brique, avec portes cintrées, augmentées d'un pigeonnier au centre à toit octogonal. Le logis, occupant le nord-ouest de la cour, était couvert d'un toit à longs pans brisés et demi-croupe en ardoise avec lucarnes plates. Le jardin d'agrément (recensement des jardins effectué par le ministère de la Culture), composé d'une allée irrégulière, a été constitué au XIXe siècle. La propriété est close d'un mur de clôture en brique et silex au solin. Le logis, situé au fond du jardin, présente une élévation à cinq travées. Il possède une maçonnerie en brique avec chaînes d'angle en pierre de taille. Le rez-de-chaussée surélevé, trahissant la présence d'une cave, est augmenté d'un étage carré. Le mur pignon occidental est entièrement recouvert d'un essentage d'ardoise. La façade principale est pourvue d'une avancée rectangulaire abritant le double escalier d'accès. La couverture à longs pans et croupes est en ardoise.","architecture":"BRETEL, les dépendances situées à l'arrière de la construction étaient réservées au personnel. Dans le prolongement de celles-ci, à l'est, existaient d'autres dépendances dont la trace est encore perceptible au sol. Le mur de clôture réalisant la séparation entre le château. Dans le prolongement, le visiteur peut toujours observer une grange dont le pignon occidental est en ciment; le reste de la construction est en torchis et pans de bois, mise à part la partie ouest du mur nord, composée d'un appareillage de moellons de craie. Des blocs de grès composent une partie du solin, complété par la présence de silex à joints de terre. Celui-ci est percé d'une porte permettant l'accès à la cave pour le stockage des pommes de terre et du cidre. L'étable, entièrement en brique et moellon de craie pour une partie du mur oriental, est située en retour d'équerre de la grange, à l'est. Le mur pignon sud, auparavant flanqué du pigeonnier, est aujourd'hui recouvert au sommet d'un essentage d'ardoise. Au sud, s'étendent d'est en ouest, une remise, aujourd'hui convertie en logement, les six boxes à chevaux ainsi que l'abri pour les voitures et le logement du cocher, dont le soubassement dissimule deux caves semi-enterrées. L'ensemble est en brique. La moitié des boxes est ajourée et ne possède pas de plafond, l'autre moitié est à façade fermée par une porte à doubles vantaux. Les plafonds ainsi que les murs intérieurs sont en torchis, le solin est composé d'un appareillage mixte de brique et de silex. Le toit à longs pans et croupe et en ardoise.","habitants":"Famille de   Pierre-Edouard du Liège d'Ausny \"","divers":"Château de Bretel à Boismont  gps 50° 09' 12? nord, 1° 41' 10? est","gps":"","images":["../image/image_80/80_Bretel_1.jpg"]},"Consult_chateau_formulairecb55":{"id":"Consult_chateau_formulairecb55","dept":"80","canton":"Rue","commune":"Rue","nom":"Broutel","type":"Châteaux","periode":"XVII-XVIII","histoire":"deux châteaux dans cet article; , Broutel et Gaillard à Forest-Montiers.                               BROUTEL,  château date de 1714. Son premier propriétaire était Jean Loisel Le Gaucher. La démolition de la Citadelle de Rue eut lieu après 1668. Les matériaux récupérés servirent à la construction du château du Broutel, en brique et pierre. Datant de 1714, dans un domaine de 16 ha, le château du Broutel était destiné à Jean-Baptiste Loisel, un des principaux officiers de cavalerie de Louis XIV, qui mourra, avant l'achèvement des travaux du château. Jean Loisel Le Gaucher, propriétaire du château, élève de Joseph Vernet, décora lui-même le salon de fresques et peignit vers 1760 les grands panneaux qui décorent le salon du château. Après quelques dommages subis, dont sa toiture, durant la Révolution, le château du Broutel sera restauré en 1824. La seconde armée Allemande y établira son quartier général durant le seconde guerre mondiale. Des inscriptions gravées dans la pierre attestent de sa présence. En 1960, le château du Broutel sera racheté par Lionel Leroy, le fils du fondateur des Ets Leroy Merlin) désirant en faire une résidence privée.","architecture":"En 1990, le château sera reconverti en Hotel. Ses écuries du XVIIIe siècle ont été rénovées. À la fin du XXe siècle, le hâteau a été vendu à Globebrow, une société britannique, qui poursuit la restauration des dépendances et ses abords. Le château du Broutel et ses écuries sont situés dans un parc boisé de 7 ha qui entourent un lac privé. Le château du Broutel est devenu depuis, un hôtel 3 étoiles de monsieur de Hautefeuille philippe qui sert également de centre résidentiel pour des enfants britanniques, sous le nom de château Aventure. à  Forest-Montiers  le château GAILLARD.camping","habitants":"Broutel;  Jean Loisel Le Gaucher, \"","divers":"deux châteaux dans cet article; Broutel-Gaillard                           Broutel  GPS : 50° 15' 54\" Nord, 1° 40' 39\" Est","gps":"50° 15' 54\" Nord, 1° 40' 39\" Est","images":["../image/image_80/80_Broutel_1.jpg","../image/image_80/80_Broutel_2.jpg"]},"Consult_chateau_formulaire3680":{"id":"Consult_chateau_formulaire3680","dept":"80","canton":"Abbeville","commune":"Buigny_st_Maclou","nom":"Buigny_st_Maclou","type":"Château","periode":"XVII","histoire":"BUIGNY-st-MACLOU, en 1584 Jean de Dompierre possédait la seigneurie de Buigny qui passera dans la famille Tillette à la suite du mariage de Marie de Dompierre avec Mathieu Tillette vers 1640-1660. C'est alors une riche famille de l'industrie de la voile ennoblie après le siège de Calais, qui fait édifier le château en 1727, comme l'indiquent les ancres de fer de la façade.","architecture":"BUIGNY-st-MACLOU, dès que l'on débouche de l'allée latérale menant au château caché dans les arbres, on est frappé  par l'architecture de ses deux façades dont l'appareillage est en assises alternées, un lit de pierre correspondant à trois lits de brique. Cette alliance décorative brique et pierre, qui connut une grande vogue en Touraine puis en Normandie au XVIe siècle, se développa assez tardivement en Picardie, où il faudra attendre le XVIIIe siècle pour qu'elle soit employée dans les bâtiments de communs comme dans l'aile ajoutée à cette époque au château d'Avesnes-Chaussoy ou dans le colombier de Bussy-lès-Poix. Avec son appareillage en lits alternés, le château de Buigny Saint-Maclou est inclassable dans l'histoire de l'architecture brique et pierre picarde. Il a pourtant un précédent célèbre au XVIIe siècle, la cour intérieure du château de Saint-Fargeau dans l'Yonne, embellie de 1654 à 1657, par l'architecte Louis Le Vau pour la Grande Mademoiselle qui y trouva refuge durant son exil ordonné par Louis XIV. Éléments protégés MH : les façades et les toitures du château : inscription par arrêté du 31 août 1992. Buigny-Saint-Maclou date du XVIIIe siècle. Il est en brique et pierre et ses toitures sont mansardées. Il a été endommagé par les Allemands qui l'occupère, durant la seconde guerre mondiale.","habitants":"Famille de Mathieu de Tillette \"","divers":"Buigny st-Maclou GPS : 50° 09' 21\" Nord, 1° 48' 40\" Est","gps":"50° 09' 21\" Nord, 1° 48' 40\" Est","images":["../image/image_80/80_Buigny_st_Maclou_1.jpg","../image/image_80/80_Buigny_st_Maclou_2.jpg"]},"Consult_chateau_formulaired9e9":{"id":"Consult_chateau_formulaired9e9","dept":"80","canton":"Friville-Escarbotin","commune":"Tully","nom":"Buiret","type":"Château","periode":"XIX","histoire":"BUIRET,  la construction du château Buiret date du XIXe siècle. C'est un ensemble de demeures patronales du Vimeu et d'un ensemble industriel. Ce château est de style éclectique, à dominante Louis XIII pour les façades en brique rouge et pierre de taille. La décoration intérieure associe l'Art Nouveau aux styles Louis XIII et Louis XVI. Des vitraux des ateliers Vermonet ornent portes et fenêtres à l'étage. Le château de Buiret est inscrit aux M.H. en 2013, pour ses façades et toitures, son entrée-galerie, sa salle à manger, le petit et les grands salons, l'escalier monumental du château, les bâtiments annexes, le parc, la grille de clôture. Le château de Buiret est avec ses anciennes écuries, son parc et ses serres, c'est le lieu d'opérations culturelles.","architecture":"BUIRET, l'ensemble architectural que constitue le \" château \", comprenant les façades et toitures, les bâtiments annexes (garage et ancienne écurie, excepté le chenil et les deux serres), le parc en totalité y compris la trace de l'ancienne voie de chemin de fer à l'arrière de la propriété, la grille clôture sur rue et les espaces intérieurs suivants de la maison : l'entrée-galerie, la salle à manger, le petit et le grand salon ainsi que l'escalier monumental  : inscription par arrêté du 26 février 2013.","habitants":"Chatelain de Buiret\"","divers":"Buiret  GPS : 50° 05' 08\" Nord, 1° 31' 02\" Est","gps":"50° 05' 08\" Nord, 1° 31' 02\" Est","images":["../image/image_80/80_Buiret_1.jpg","../image/image_80/80_Buiret_2.jpg"]},"Consult_chateau_formulaire74b5":{"id":"Consult_chateau_formulaire74b5","dept":"80","canton":"Poix-de-Picardie","commune":"Le Translay","nom":"Busménard","type":"château","periode":"XVII","histoire":"BUSMENARD, la date de 1755, inscrite en fers d'ancrage sur la façade laisse supposer que le château de Busménard fut bâti pour François Danzel, chevalier, brigadier des chevau-légers de la garde du Roi, alors seigneur du lieu qui posséda le domaine de 1739 à 1770. Les Danzel avaient acheté la terre de Busménard en 1660 et la possédaient toujours en 1789. Au XIXe siècle, le château appartenant à la famille d'Ault du Mesnil passa par alliance au comte Adrien de Louvencourt, dont le fils le vendit, vers 1920, à M. Huguet.","architecture":"BUSMENARD, la date de 1755 est inscrite en fers d'ancrage sur la façade du château. Le château de Busménard est de formes harmonieuses, faits de briques et de pierres. Il est composé d'un corps de logis, flanqué de 2 ailes en retour d'équerre, peu saillantes. Le château est en cours de restauration. Château de proportions harmonieuses, se compose d'un corps de logis flanqué de deux ailes en retour d'équerre assez peu saillantes. L'avant-corps central, étroit, comprend la porte d'entrée et la baie qui la surmonte et qui ouvre sur un balcon en fer forgé, la porte et la baie sont en plein cintre. Un fronton triangulaire couronne cet avant-corps. Il est en pierre mais son pourtour est en brique. L'édifice est orné en son milieu d'un vase de fleurs finement sculpté, ce fronton repose sur des pilastres en brique au lieu d'être en pierre. Le corps de logis comprend au rez-de-chaussée, six fenêtres et deux à l'étage. Quant aux ailes, elles possèdent chacune, deux ouvertures par étage.Éléments protégés MH : les façades et les toitures du château : inscription par arrêté du 17 juin 2003.","habitants":"Famille de   François Danzel\"","divers":"Château de Busménard à le Translay GPS : 49° 58' 17,02\" Nord, 1° 39' 9,59\" Est","gps":"49° 58' 17,02\" Nord, 1° 39' 9,59\" Est","images":["../image/image_80/80_Busm%c3%a9nard_1.jpg"]},"Consult_chateau_formulaire3375":{"id":"Consult_chateau_formulaire3375","dept":"80","canton":"Poix-de-Picardie","commune":"Bussy lès Poix","nom":"Bussy_Poix","type":"château","periode":"XVIII","histoire":"BUSSY, le château est depuis le XIVe siècle, à la famille Le Clerc de Bussy qui  habite la terre dont elle porte le nom. Elle a conservé de ce passé un témoin précieux, le pittoresque journal manuscrit du chevalier de Bussy, qui constitue un très vivant tableau de la vie dun gentilhomme campagnard dans le premier quart du XVIIIe siècle.  La Famille Le Clerc de Bussy en est propriétaire depuis le XIVe siècle.","architecture":"BUSSY, le château actuel date de 1700. Sa longue façade en brique et pierre souffre de la toiture uniforme qui a remplacé au XXe siècle les hauts combles dorigine. La travée centrale est décorée d'abondantes et belles sculptures, elle abrite un hall de plan octogonal qui occupe toute la hauteur et se terminait primitivement par un lanternon dans la toiture. La disposition intérieure des pièces, en enfilade au rez-de-chaussée et desservies par un couloir orienté à l'Est au premier étage, est restée très simple. On peut toujours admirer à droite de la cour d'honneur, un joli colombier à lits alternés de brique et de pierre, coiffé d'un toit conique. La construction du château date du XVIIIe siècle. Le château de Bussy-Lès-Poix est en haut d'une côte, derrière une grille blanche.","habitants":"famille Le Clerc de Bussy \"","divers":"Château de Bussy à Bussy lès Poix GPS : 49° 49' 17\" Nord, 2° 01' 07\" Est","gps":"49° 49' 17\" Nord, 2° 01' 07\" Est","images":["../image/image_80/80_Bussy_Poix_1.jpg"]},"Consult_chateau_formulairee02b":{"id":"Consult_chateau_formulairee02b","dept":"80","canton":"Flixecourt","commune":"Canaples","nom":"Canaples","type":"Château","periode":"XIX","histoire":"CANAPLES  appartenait initialement à Amédée Hordequin qui en avait fait sa résidence privée. Sa construction fut achevée en 1898.. Le château de Canaples fut construit à la fin du XIXe siècle, pour le compte d'un pharmacien de Doullens, qui s'était enrichi par l'extraction de phosphate à Beauval.  Benjamin Hordequin, fils d'un pharmacien de Doullens, fait construire la demeure actuelle en 1898   sur les plans de l'architecte amiénois Anatole Bienaimé. Quelques années après, Benjamin Hordequin cède la propriété en cadeau de mariage à sa fille unique Lucie, qui épouse vers 1902 le vétérinaire Joseph Leroy. Le jardin d'hiver de l'aile Est, réalisé sous la conduite d'Aimé Delarue, autre architecte actif au Touquet durant le premier quart du XXe siècle, a probablement été aménagé à cette époque.","architecture":"CANAPLES  le château de Canaples et son parc sont représentatifs de l'ascension sociale de la bourgeoisie provinciale, de la fin du XIXe siècle et de la Belle Époque. Durant la Première Guerre mondiale, des Officiers français et leurs alliés logèrent au château qui reçut, à lhiver 1917, la visite du Prince de Galles, le futur roi d'Angleterre, Edouard VIII. Le château de Canaples et son parc sont protégés par les M.H. depuis le 23/05/2013, il est privé, seul, son parc est accessible au public, Le site de la propriété est ceint d'un mur de clôture en brique, et s'ouvre par une grille monumentale en fer forgé richement travaillé. Le logis est situé au milieu de la parcelle et comprend un rez-de-chaussée surélevé et un étage carré. Deux petites ailes en rez-de-chaussée surélevé couvert en terrasse, en léger retrait, flanquent le corps de logis. Le toit brisé, couvert d'ardoise et de tôle nervurée, couvre un étage de combe à surcroît.  Éléments protégés MH : le château en totalité, à savoir les façades, les toitures et les intérieurs, ainsi que le portail, les dépendances et le parc : inscription par arrêté du 23 mai 2013.","habitants":"Famille de Benjamin Hordequin \"","divers":"Château de Canaples à Canaples GPS : 50° 03' 06\" Nord, 2° 12' 54\" Est","gps":"50° 03' 06\" Nord, 2° 12' 54\" Est","images":["../image/image_80/80_Canaples_1.jpg","../image/image_80/80_Canaples_2.jpg","../image/image_80/80_Canaples_3.jpg"]},"Consult_chateau_formulaire2711":{"id":"Consult_chateau_formulaire2711","dept":"80","canton":"Albert","commune":"Cappy-Bray","nom":"Cappy","type":"Château","periode":"XVII","histoire":"CAPPY,  très tôt il dut y avoir à Cappy un château fort pour défendre le passage de la Somme. Au Xe siècle Robert 1er de Péronne est seigneur de Cappy et de Bray. Le village et le château furent détruits par Warwick en 1373. De 1423 à 1428 Antoine de Chabannes à la tête des Écorcheurs, pille la région de Cappy. En 1468 Charles Le Téméraire campe à Cappy avec son armée, avant de rejoindre Péronne où il rencontrera Louis XI. En 1553 Cappy fut encore incendié par les Impériaux.","architecture":"CAPPY,  le château actuel date  du XVIIe siècle, c'est une construction en brique et pierre comprenant un corps de logis rectangulaire flanqué sur la droite d'un petit bâtiment. Le corps de logis, à deux niveaux sur un soubassement percé de soupiraux, comporte un corps central en légère saillie délimité par deux jambes de pierre en bossage qui montent du sol jusqu'à la base du toit, mais qui sont interrompues par les deux chaînes horizontales portant bandeau qui séparent les deux niveaux. La porte principale est précédée par un perron. Sur la droite, se trouve un bâtiment d'une travée, d'un niveau, présentant une fenêtre rectangulaire et cantonnée par une chaîne d'angle à bossages.","habitants":"seigneur locaux\"","divers":"Château de Cappy à Bray","gps":"","images":["../image/image_80/80_Cappy_1.jpg"]},"Consult_chateau_formulaire99e0":{"id":"Consult_chateau_formulaire99e0","dept":"80","canton":"Ailly-sur-Somme","commune":"Cavillon","nom":"Cavillon","type":"Château","periode":"XVII","histoire":"CAVILLON,  dans les jardins du château de Cavillon, oeuvre en bronze attribuée à Théophile Caudron, sculpteur picard, elle représente Pan, un dieu de la mythologie grecque ou un Satyre. L'important bois de Cavillon dit \"Bois de Tenfol\" prolonge le parc du château.  Au début de 1950, le château de Cavillon devient la propriété des Auxiliaires du Clergé de lAbbaye du Gard, en aval de Picquigny, sur la rive gauche de la Somme .","architecture":"CAVILLON  château brique et pierre construit au XVIIe siècle composé d'un corps de logis rectangulaire prolongé par deux ailes plus basses, l'une datant de 1698, l'autre édifiée en 1830. Le château possède un toit à la Mansard. Il est en briques et pierres. Le château de Cavillon est composé d'un corps de logis, de forme rectangulaire, prolongé par 2 ailes plus basses. L'une date de 1698, l'autre de 1830. L'important bois de Cavillon, dit le Bois de Tenfol, prolonge le parc du château.","habitants":"Famille de  Théophile Caudron\"","divers":"Cavillon  GPS : 49° 55' 23\" Nord, 2° 05' 05\" Est","gps":"49° 55' 23\" Nord, 2° 05' 05\" Est","images":["../image/image_80/80_Cavillon_1.jpg"]},"Consult_chateau_formulaire9a9f":{"id":"Consult_chateau_formulaire9a9f","dept":"80","canton":"Ailly-sur-Noye","commune":"Chaussoy-Epagny","nom":"Chaussoy","type":"Château","periode":"XVIII","histoire":"CHAUSSOY, construit au XVIIIe siècle pour la famille Gouffier de Cambray,  En 1789, cette grande demeure récemment acquise par la famille Morgan ne subira pas les outrages de la Révolution. De génération en génération les propriétaires se sont attachés à préserver ce patrimoine familial, ils sont heureux de recevoir des hôtes et visiteurs dans ce cadre exceptionnel.","architecture":"CHAUSSOY, en effet sa construction en pierre est une particularité en Picardie ou généralement on retrouve un maillage de briques et pierres. La tour demi-cylindrique présente sur la façade principale, ajoute à l'originalité de son architecture  est de style Louis XVI. Ce beau château appelé une \"Folie\" a été construit durant la 2ème moitié du XVIIIe siècle, en pierres blanches. Il a été restauré au XIXe siècle avec sa tour d'escalier. Son architecture est sobre. Le château de Chaussoy est composé d'une tour, d'un perron à double révolution et avec de nombreuses décorations intérieures. Éléments protégés MH : les façades et les toitures du château :  Le château de Chaussoy-Epagny est inscrit aux M.H. depuis 1992, est ouvert au public. Vous y trouverez aussi des chambres d'hôtes.","habitants":"Famille Gouffier de Cambray,                                  Famille Morgan\"","divers":"Chaussoy GPS : 49° 43\" 30\" Nord, 2° 19' 40\" Est","gps":"49° 43\" 30\" Nord, 2° 19' 40\" Est","images":["../image/image_80/80_Chaussoy_1.jpg","../image/image_80/80_Chaussoy_2.jpg","../image/image_80/80_Chaussoy_3.jpg"]},"Consult_chateau_formulaire4823":{"id":"Consult_chateau_formulaire4823","dept":"80","canton":"Gamaches","commune":"Citerne","nom":"Citerne","type":"Châteaux","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article; Citerne et Yonville.                                        CITERNE le château de Citerne fut construit entre 1750 et 1780 \"brique et pierre\" doté d'une couverture en chaume mais après avoir subit une restauration vers 1825 le bâtiment fut recouvert d'ardoises. Cette demeure parfaitement entretenue est implantée dans un magnifique parc inscrit au pré-inventaire des jardins remarquables, propriétaire  Philippe le fort.","architecture":"YONVILLE, au coeur du Vimeu, le château de Yonville, brique et pierre, propriété de famille depuis le début du XVIIIe siècle, agrandie par chaque génération pour atteindre sa forme définitive en 1898. A l'intérieur du château, la salle à manger est ornée de sculptures réalisées par Paul Romanet. Meubles d'époque, cheminée, statue de marbre blanc sculptée par Emile Feugère des Forts, trumeau inspiré de Watteau. A gauche, en entrant dans la propriété, de magnifiques communs bâtis en 1910 dans le style normand avec ses colombages et dessins de briques colorées. Le château de Yonville est une véritable oasis de verdure et de calme dans la plaine proche de la côte picarde où se trouve le port médiéval de Saint-Valéry sur Somme.","habitants":"Famille Paul Romanet.\"","divers":"Deux châteaux dans cet article; Citerne grav-1 et Yonville grav-2-3-4.         Citerne GPS : 49° 58' 59\" Nord, 1° 49' 27\" Est","gps":"49° 58' 59\" Nord, 1° 49' 27\" Est","images":["../image/image_80/80_Citerne_1.jpg","../image/image_80/80_Citerne_2.jpg","../image/image_80/80_Citerne_3.jpg","../image/image_80/80_Citerne_4.jpg"]},"Consult_chateau_formulairee724":{"id":"Consult_chateau_formulairee724","dept":"80","canton":"Amiens","commune":"Coisy","nom":"Coisy","type":"Château","periode":"XVII","histoire":"COISY, comprend un corps de bâtiment en T. La partie occidentale, couverte en ardoise, présente une élévation sur cour en briques avec chaînes harpées en craie, et une élévation sur jardin en craie. L'aile perpendiculaire, formant le côté nord-est du château, est en briques, couverte en ardoise. Elle est composée d'un rez-de-chaussée surélevé et d'un étage carré desservi par un escalier débordant en tourelle sur la façade postérieure. Cette tourelle est en partie couverte en zinc avec une croupe à trois pans. Le buste d'une femme couronnée dans un médaillon est sculpté à plusieurs reprises le long du logement ouest et sur le portail. L'écurie qui ferme la cour du château au sud-est est édifiée en briques et pierres à assises alternées, sur un soubassement de grès. Le toit, à croupe, est fait de tuiles mécaniques. La deuxième écurie, perpendiculaire à la première, est en briques. Elle a été complétée au XIXe siècle par un bâtiment perpendiculaire en briques pour la famille de Saveuse.","architecture":"COISY. la partie la plus ancienne est le corps de logis ouest dont la façade antérieure, de style Louis XIII, date de la première moitié du XVIIe siècle. La façade postérieure, en craie, avec deux petites ailes en retour, fut refaite à la fin du XVIIe ou au XVIIIe siècle, les caves en craie voûtées en berceau sont de cette époque, l'ensemble de ce corps de logis a subi des remaniements à la suite de la Première Guerre mondiale: la partie centrale a été remplacée par une pergola aménagée en 1935, et la distribution intérieure a été modifiée dans la deuxième moitié du XXe siècle. Mais le logis avait été agrandi au XIXe siècle avec la construction d'une nouvelle aile à l'est, plus haute d'un étage.  L'ensemble comportait un corps de bâtiment principal orienté Nord-Sud et flanqué à chacune de ses ailes de 2 pavillons symétriquement, répartis de part et d'autre. L'ensemble présente, vu du plan, la forme d'un H. La façade et les pavillons du côté Ouest étaient en pierre de taille, alors que les pavillons et la façade Est étaient en brique. Au centre de chacune des façades, on accédait au rez-de-chaussée par un escalier en grès. Un corps de garde se dressait près de cette entrée ; de l'autre côté un bâtiment commun à usage du personnel, à des écuries et des remises. Le château de Coisy a été démoli et remplacé par un simple pavillon. Du château originel, il ne subsiste comme vestiges, que ses 2 piliers, qui encadrent l'entrée principale, la porte piétonne et les éléments du mur d'enceinte.","habitants":"Famille de Saveuse\"","divers":"Château de COISY                                      G PS : 49° 57' 38\" Nord, 2° 19' 42\" Est","gps":"","images":["../image/image_80/80_Coisy_1.jpg"]},"Consult_chateau_formulaire62c8":{"id":"Consult_chateau_formulaire62c8","dept":"80","canton":"Corbie","commune":"Contay","nom":"Contay","type":"Château","periode":"XVIII","histoire":"CONTAY, le plus ancien seigneur connu est Raoul de Contay en 1138. Un premier château semble avoir existé en bordure de l'Hallue, il aurait été détruit vers 1636. L'actuel château  de Contay fut construit au milieu du XVIIIe siècle pour Barthélémy d'Amiens, ou pour son gendre Gilbert Morel de Bécordel. Les armes de Barthélémy d'Amiens sont sculptées au fronton de la façade antérieure. La date de 1753 est encore inscrite en ancres de fer sur les communs.  Au XIXe siècle on reprit en partie l'aménagement intérieur, et on construisit la citerne dans le parc. Les chambres au premier conservent des boiseries du XVIIIe siècle, d'un style assez dépouillé. Les pièces d'apparat ont été redécorées sous le Second Empire. Le château, qui s'élève en bordure de la route Amiens-Arras, est entouré d'un parc de cinq hectares, délimité par un mur d'enceinte en calcaire et en brique. La propriété comprend plusieurs corps de bâtiments: le château et aussi ses dépendances et notamment un corps de ferme à l'ouest.","architecture":"CONTAY;  le corps de logis, précédé d'un jardin en pente, suit un plan en U avec deux ailes en retour d'équerre. Sa façade antérieure est tournée vers le sud-est. Les murs sont en craie sur soubassement de grès, la toiture en ardoises. Les deux façades du corps de logis, vers l'entrée et vers le parc, présentent un large avant-corps central légèrement saillant, couronné par un fronton arrondi. Ce motif est d'ailleurs répété à plus petite échelle au-dessus des portes centrales. Un appareillage à refends souligne les angles du corps de logis et de ses avant-corps centraux. L'intérieur est classique; pièces de réception au rez-de-chaussée, chambres à l'étage desservies par un long couloir, cuisines dans l'aile orientale. Dans le parc se trouve une citerne en briques. Tous les autres bâtiments sont concentrés à l'ouest du château, ils forment une cour de ferme ouvrant sur la rue par un porche en craie. Les éléments les plus remarquables de cette cour sont le logis du fermier et le pigeonnier octogonal bâtis en craie.  La ferme comprend en outre quelques dépendances en brique.","habitants":"Famille de Gilbert Morel de Bécordel.\"","divers":"Château de Contay  GPS : 50° 00' 22,09\" Nord, 2° 28' 49,64\" Est","gps":"50° 00' 22,09\" Nord, 2° 28' 49,64\" Est","images":["../image/image_80/80_Contay_1.jpg","../image/image_80/80_Contay_2.jpg","../image/image_80/80_Contay_3.jpg"]},"Consult_chateau_formulaireccd1":{"id":"Consult_chateau_formulaireccd1","dept":"80","canton":"Corbie","commune":"Corbie","nom":"Corbie_Daours","type":"Château","periode":"XVII-XIX","histoire":"Trois château dans cet article; Corbie , Fouilloy et Bussy.                                            CORBIE, cet ancien château appartenait au Baron Oswald Caix de Saint-Aymour construit sur les plans de l'architecte amiénois Charles Joseph Pinsard au XIXe siècle.  Charles-Louis-Marie-Oswald de Caix de Saint-Aymour, maire de Corbie de 1855 à 1861 et conseiller général de 1848 à 1861 fit construire un château de style troubadour entre 1850 et 1854 pour lui servir de résidence temporaire. Sa fille Hélène en hérita ; elle épousa Albalat y Navajas, comte de San Carlos et le couple partit vivre en Espagne. En 1923, grâce à la contribution financière de la ville de Chartres, marraine de guerre de la ville de Corbie, la municipalité racheta le château qui fut transformé en hôtel de ville et le parc en jardin public. La façade de l'hôtel de ville a été ravalée et le jardin public réaménagé en 2013, désormais, une place-parvis dénommé « espace Chartres » donne accès au monument aux morts sculpté par Albert Roze et à l'hôtel de ville. Construit en brique, le bâtiment est facilement identifiable par ses tourelles couvertes d'ardoise. Il a été rénové complètement en 2013 ainsi que le jardin public qui l'entoure.                                                                                             A l'est village voisin FOUILLOY château servant d'hôtel de ville  La construction du château date du XIXe siècle. Il se situe rue Jules Lardière, à Fouilloy.  Georges Duhamel, médecin militaire en 1916 et écrivain fut en cantonnement à Fouilloy. Il la évoqué dans des lettres écrites à son épouse. Aujourdhui les services de la mairie se trouvent au milieu dun parc aménagé dans lancien château de Fouilloy datant du XIXe siècle et qui fut cédé à la commune au XXe siècle.","architecture":"BUSSY   les Daours à l'ouest de Corbie. La seigneurie de Bussy, qui relevait de la châtellenie de Daours, appartient surtout aux familles de Sacquespée aux XVIe et XVIIe siècles et Pingré au XVIIIe siècle. Le 1er des Sacquespée à posséder Bussy fut Pierre, écuyer, seigneur de Becquincourt, mayeur d'Amiens en 1535, receveur des tailles de l'élection d'Amiens. A la mort de l'un de leurs descendants, le château fut vendu en 1696, à Louis de Gomer, mais ce dernier revendit le domaine, dès 1713, à Adrien Pingré, bourgeois et échevin d'Amiens en 1686, conseiller secrétaire du Roi, maison et couronne de France. A la fin du XIXe siècle ce sont les de Witasse Thézy qui habitent le château. Agnès de Witasse Thézy fut la dernière à y vivre jusqu'en 1982, date de son décès. Le château actuel, de dimensions modestes, fut conçu comme une maison des champs, construit en pierre au XVIIIe siècle, il fut remanié au XIXe siècle. On ajouta en particulier, vers 1830, les deux ailes latérales.                                                                                                              DAOURS, les premiers seigneurs de Daours portaient le nom de leur terre. Les plus anciens que l'on connaisse sont, en 1148, Gérard de Durs, et, en 1153, Baudouin de Dours. Il existait alors un château-fort très important situé non loin du confluent de la Somme et de l'Hallue, à 200 m envifon en face du château actuel, construit au XVIIIe siècle, comme une propriété de campagne, se caractérisant par sa sobriété. Il est construit entièrement en pierre sur un soubassement en grès, et se compose d'un corps de logis orienté nord-sud, de plan rectangulaire, dont l'élévation est à deux étages. Dans le prolongement du corps de logis, d'un côté seulement, en l'occurrence à l'ouest, fut bâtie un peu plus tard, pour la famille Lequieu, une aile latérale comprenant un rez-de-chaussée couvert d'un toit à la Mansart. De toute évidence une autre aile existait à l'est mais fut détruite à une date imprécise par un incendie, semble-t-il. M. et Mme Hollville qui ont redonné vie à l'édifice, dans l'enceinte duquel ils ont installé un magasin d'antiquités.","habitants":"corbie; .Charles-Louis-Marie-Oswald de Caix de Saint-Aymour                    Fouilloy; Georges Duhamel                                 Bussy;  famille de Sacquespée                          Daours;famille Lequieu\"","divers":"Trois châteaux dans cet article; Corbie grav-1, Fouilloy Grav-5  et Bussy grav-2-3-4.                        Corbie  GPS : 49°54' 28,43\" Nord, 2°30' 43,7\" Est                                                   Fouilloy GPS : 49° 54' 01\" Nord, 2° 30' 16\" Est","gps":"49°54' 28,43\" Nord, 2°30' 43,7\" Est","images":["../image/image_80/80_Corbie_Daours_1.jpg","../image/image_80/80_Corbie_Daours_2.jpg","../image/image_80/80_Corbie_Daours_3.jpg","../image/image_80/80_Corbie_Daours_4.jpg","../image/image_80/80_Corbie_Daours_5.jpg"]},"Consult_chateau_formulaire0c72":{"id":"Consult_chateau_formulaire0c72","dept":"80","canton":"Poix-de-Picardie","commune":"Courcelles-sous-Moyencourt,","nom":"Courcelles_Moyencourt","type":"Château","periode":"XVIII","histoire":"COURCELLES,  construction du château de Courcelles-sous-Moyencourt de style classique date du XVIIIe et XIXe siècle.  A appartenue à la famille de Sarcus jusqu'en 1718, date à laquelle il fut acquit par Pierre Langlois de Septenville et revendu en 1826 à la famille de Gomère, seigneurs de Quevauvillers. La dernière vente, en 1881, se fera à la famille de Ranst dont le comte et la comtesse Antoine de Ruffi de Pontevès héritèrent. Le château a été édifié par les Langlois de Septenville dans les années 1750. L'acte de bénédiction de la chapelle située au premier étage datant du 14 décembre 1751 confirme cette hypothèse. Il a un plan encore identique à ceux du XVIIe siècle avec son corps de logis flanqué de deux ailes en retour d'équerre assez saillantes sur la façade Est côté cour, et en léger ressaut, côté jardin. Cet édifice est très bien équilibré, jamais remanié, bâti d'un seul jet; il symbolise le passage du XVIIe au XVIIIe siècle dont il n'a pas encore l'harmonie des courbes, mais révèle d'une manière encore très classique la somptuosité du nouvel équilibre entre la brique et la pierre.","architecture":"COURCELLES, les jardins  de Courcelles, sont composés d'une belle allée principale et de petits sentiers qui partent de celle-ci. Le bois qui l'entoure est particulièrement enrichi et embelli grace à la présence de superbes Séquoias et de magnifiques rhododendrons. Le château de Courcelles-sous-Moyencourt est classé aux M.H. depuis 1969 et inscrit aux M.H. depuis 1989. Les Façades, les toitures ainsi que le portail d'entrée et le Jardin à la Française sont classés aux M.H.  Éléments protégés MH : les façades et les toitures, le portail d'entrée et le jardin à la française : classement par arrêté du 21 février 1969. Les boiseries directoires de la chambre du rez-de-chaussée; façades et toitures de l'ensemble des communs; la grille du parc; l'arboretum et sa grotte; la statue par Jacquemart et le château d'eau : inscription par arrêté du 16 juillet 1987, modifié par arrêté du 6 janvier 1989.  Le comte Antoine Ruffi  de Pontevès-Gévaudan en est propriétaire.","habitants":"Comte Antoine de Ruffi de Pontevès\"","divers":"Courcelles-Moyencourt GPS : 49° 48' 49\" Nord, 2° 02' 31\" Est","gps":"49° 48' 49\" Nord, 2° 02' 31\" Est","images":["../image/image_80/80_Courcelles_Moyencourt_1.jpg","../image/image_80/80_Courcelles_Moyencourt_2.jpg"]},"Consult_chateau_formulaire00a9":{"id":"Consult_chateau_formulaire00a9","dept":"80","canton":"Ailly-sur-Somme","commune":"Creuse","nom":"Creuse_80","type":"Château","periode":"XVIII","histoire":"CREUSE, les façades et les toitures des bâtiments bâti par Joseph-Alexandre Famechon. fut élevé entièrement en pierre au début du XVIIIe siècle. Il se compose d'un corps de logis, de plan rectangulaire, dont l'élévation est à deux étages surmontés d'une corniche à denticules, et dont l'avant corps central sur chacune des deux façades principales est terminé par un fronton triangulaire percé en son centre, d'un il-de-buf. Du côté cour, sous le fronton figure la date de 1706 sculptée dans la pierre. Ce corps de logis est couvert d'un toit d'ardoises dont les lucarnes, réparties sur deux niveaux, ont des encadrements de bois non dépourvus d'une certaine élégance.","architecture":"CREUSE; dans le prolongement du bâtiment principal ont été construites deux ailes sans étage. Le château a subi des remanlements à la fin du XIXe siècle, en particulier, du côté de la cour, une vaste véranda qui masque tout le rez-de-chaussée. Dans le parc une glacière date du XVIIIe siècle. A l'est, une éolienne a été bâtie à la fin du XIXe siècle, elle alimentait en eau le château, le potager et la ferme.  Éléments protégés MH : les façades et les toitures du château ; boiseries du XVIIIe siècle de la chambre à alcôve au premier étage; rampe en ferronnerie du XVIIIe siècle de l'escalier d'honneur; glacière; éolienne; murs de clôture : inscription par arrêté du 29 mars 1994. La ferme du château de Creuse : les façades et les toitures des bâtiments bâti par Joseph-Alexandre Famechon, dans les années 1880, de la ferme et correspondant à la maison d'habitation du chef de culture: inscription par arrêté du 29 juillet 2013.  La construction  de Creuse date du début du XVIIIe siècle, est inscrit aux M.H. depuis 1994 et la ferme depuis 2013. et  est entouré d'un parc de 4 Ha et de jardins, dans le charmant village de Creuse.","habitants":"famille de  Joseph-Alexandre Famechon, \"","divers":"château de Creuse, GPS : 49° 50' 21,66\" Nord, 2° 09' 51,07\" Est","gps":"49° 50' 21,66\" Nord, 2° 09' 51,07\" Est","images":["../image/image_80/80_Creuse_80_1.jpg","../image/image_80/80_Creuse_80_2.jpg"]},"Consult_chateau_formulaireb895":{"id":"Consult_chateau_formulaireb895","dept":"80","canton":"Poix-de-Picardie","commune":"Heucourt-Croquoison","nom":"Croquoison","type":"Château","periode":"XVIII","histoire":"CROQUOISON, les communes d'Heucourt et de Croquoison fusionnent en 1840. La commune a relevé les armes de la famille De Croquoison. historien et généalogiste, René de Belleval a noté les premiers du nom en les personnes d'Evrard de Croquoison, chevalier, sénéchal de Brétizel, vivant en 1314, puis de Wautier de Croquoison, écuyer, vivant à Bernaville en 1339.  Le village de Croquoison avait pour seigneurs, en 1380 et 1420, deux Jean de Croquoison, père et fils et tous deux chevaliers. Ce furent en tout cas les derniers possesseurs de la terre du nom, qui passa après eux à la famille De Mauvoisin. Les De Croquoison s'établirent définivement à Amiens à la fin du XVIe siècle.\"Les armes des Croquoison, enregistrées dans un armorial de 1397, étaient d'argent au franc quartier de gueules\" précise Belleval (Nobiliaire du Ponthieu, tome II, 1864).\nNicolas de Croquoison, seigneur de La cour des fiefs, à Flixecourt, fut mayeur d'Amiens en 1568 et 1572. Cette branche des de Croquoison \"de La cour des fiefs\", qui avait fait bâtir un château à Flixecourt à la fin du XVIIIe siècle, était encore présente à Flixecourt au début du XIXe siècle.","architecture":"CROQUOISON, sur la façade du côté jardin, apparaît la structure en pan de bois de l'édifice. Le hourdis de torchis est aujourd'hui masqué par un enduit au rez-de-chaussée et par un essentage en ardoise. Mais la sablière de plancher a conservé son décor d'arcs en accolade et sous l'essentage apparaissent des pinacles en bois sculpté. Une élégante façade fut édifiée au XVIIIe du côté de la cour d'honneur. Construite en brique avec chaînes harpées et encadrements de fenêtres en pierre, cette façade présente un avant-corps en légère saillie, surmontée d'un fronton triangulaire. Chaque baie, dont la largeur et le profil en anse de panier pourrait être une survivance des percements du XVe siècle est ornée d'une agrafe sculptée d'un motif de coquille. Intérieurement, subsistent de part et d'autre des éléments anciens : plafonds à poutres et solives ornés de blasons, encadrement de porte et poutre de cheminée ornée d'arcs en accolade, caves médiévales voûtées en pierre, escaliers à balustres rampants du XVIIe siècle, panneaux de boiseries rapportés du XVIIIe siècle. Dans la cour, les dépendances agricoles et le colombier en pan de bois et torchis conservent au manoir de Croquoison son apparence de maison seigneuriale, à vocation à la fois féodale et agricole. Aujourd'hui le propriétaire de la demeure poursuit l'oeuvre de restauration de cet ensemble.  Éléments protégés MH : les façades et les toitures du manoir ; le colombier en torchis : inscription par arrêté du 10 octobre 1995.","habitants":"Famille De Croquoison.\"","divers":"Croquoison GPS : 49° 55' 53\" Nord, 1° 53' 01\" Est","gps":"49° 55' 53\" Nord, 1° 53' 01\" Est","images":["../image/image_80/80_Croquoison_1.jpg"]},"Consult_chateau_formulaire151d":{"id":"Consult_chateau_formulaire151d","dept":"80","canton":"Rue","commune":"Le Crotoy","nom":"Crotoy","type":"Château","periode":"XIX","histoire":"Deux châteaux, dans cet article; Crotoy et Millevoye.                                     CROTOY, l'histoire du Crotoy est particulièrement riche, et marquée par la guerre de cent ans, durant laquelle la commune fut alternativement sous domination anglaise et française. Edouard III d'Angleterre séjourna au Crotoy et y fit construire une importante forteresse en 1346 où fut d'ailleurs interné le Duc d'Alençon Jean II. En 1674, le château fut détruit sur ordre du roi de France, Louis XIV. Reste les tourelles du XIXe siècle hôtel restaurant de la famille Ferriera da Sylva.                                                                                                               MILLEVOYE, voici un édifice à aller voir absolument lors d'un passage dans la commune du Crotoy. Ce manoir fut construit en 1810 et fut le lieu de résidence du poète Charles Hubert Millevoye. Il est d'ailleurs occupé de nos jours par les descendants de l'artiste, connu pour des uvres telles que La Chute des feuilles et Le Poète mourant. Il fut aussi l'un des premiers poètes à initier le romantisme. C'est sur le quai Léonard, entre la petite plage du centre-ville et le port du Crotoy, que vous pouvez contempler cette magnifique bâtisse qui, rappelons-le, fut édifiée sur les ruines du château.","architecture":"CROTOY,  au milieu du XIXe siècle, le parfumeur Pierre Guerlain, natif d'Abbeville et très épris du Crotoy et de la baie de Somme ouvrit son hôtel en 1860, destiné à la venue de l'Impératrice Eugénie qui ne lui rendit jamais visite. Il y invita ses amis parisiens, Le Crotoy devint alors une destination privilégiée pour les vacances. A la mort de Guerlain en 1864, l'hôtel fut agrandi et devint le 'grand hôtel\" tenu par Delant cuisinier renommé.                                                                                                  \"Vestiges du château, ces restes seraient ceux d'une fortification du  XIIe siècle, fort probable un des derniers lieux de passage de Jeanne d'Arc, construit vers  1150 par les comtes de Ponthieu, démantelé en 1674. Dans cette forteresse Jeanne d'Arc fut gardée prisonnière  du 21 novembre au 20 décembre 1430 Elle franchit alors la baie de Somme pour se rendre via Saint-Valéry et Eu à Rouen où l'attend le sort que l'on connaît.","habitants":"Famille de pierre Guerlain                                   Famille Ferriera da Sylva\"","divers":"Deux châteaux, dans cet article; Crotoy-grav 2-3    et Millevoye-grav-1      Crotoy GPS : 50° 12' 50,02\" Nord, 1° 37' 34,52\" Est","gps":"50° 12' 50,02\" Nord, 1° 37' 34,52\" Est","images":["../image/image_80/80_Crotoy_1.jpg","../image/image_80/80_Crotoy_2.jpg","../image/image_80/80_Crotoy_3.jpg"]},"Consult_chateau_formulaire86eb":{"id":"Consult_chateau_formulaire86eb","dept":"80","canton":"Roye","commune":"Davenescourt","nom":"Davenescourt","type":"Château","periode":"XVIII-XIX","histoire":"DAVENESCOURT,  date de 1787 à 1805. La construction de l'actuel château  a été entreprise à partir de 1787, pour le Comte de La Mire, à la place d'un ancien château détruit lors des invasions espagnoles de 1652. Les communs ont été édifiés dans le second quart du XIXe siècle. En 1857, Gabrielle Marguerite de La Myre, fille de Charles La Myre et d'Antoinette Rouillé de Fontaine épousa le Marquis Elzéas de Villeneuve-Bargemont et lui apporta en dot la terre de Davenescourt. Au cours de la Grande Guerre, le château de Davenescourt fut transformé en hôpital militaire et accueillit des hôtes de marque comme, le 23/08/1915, le roi des Belges Albert Ier, le Président de la République Française Raymond Poincaré, le général Joffre. Ce serait au château de Davenescourt, au printemps 1915, que l'idée de la création de la croix de guerre (1914-1918) fut abordé lors d'une rencontre réunissant : Maurice Barrès, Ernest Cauvin et le général Boëlle. En mars 1918, lors de l'offensive allemande, le village de Davenescourt dut être évacué, le château de Davenescourt et le village, furent pillé par l'armée allemande. Le vicomte Augustin de Villeneuve-Bargemont a remis en valeur le jardin à la française après la seconde guerre mondiale. Le château de Davenescourt est inscrit aux M.H. depuis 1977 et 2009 et classé depuis le 7/07/1977 avec ses façades, ses toitures, le hall d'entrée, le grand salon, la chambre du rez de chaussée et son décor, l'escalier avec sa rampe en fer forgé.","architecture":"DAVENESCOURT, les communs sont du deuxième quart du XIXe siècle. Le jardin d'agrément est attribué au paysagiste Edouard André. Un système hydraulique d'alimentation en eau, lié au domaine, est une partie constitutive du château. Éléments protégés MH : les façades et les toitures ; le hall d'entrée ; l'escalier avec sa rampe en fer forgé ; le grand-salon et la chambre au rez-de-chaussée avec leur décor ; la grille d'entrée ; la chapelle en totalité : classement par arrêté du 7 juillet 1977. Les façades et toitures des communs : inscription par arrêté du 7 juillet 1977. Les parties non encore protégées comprenant : les pièces du château non classées, c'est à dire tout l'intérieur du château encore non protégé : le rez-de-chaussée, le premier étage, l'étage des domestiques, les combles, le sous-sol et les galeries et salles médiévales souterraines, excepté au rez-de-chaussée, l'ancienne chambre des enfants située à l'angle nord-est transformée aujourd'hui en salle de bains, les autres pièces transformées en salle de bains ou toilette au premier étage, ainsi que l'ancienne chambre transformée aujourd'hui en cuisine au premier étage ; l'intérieur des premiers communs du château, en pierre blanche, face interne de murs et de voûtes, parfaitement exécutée ; le ferme de 1834-1837, adossée aux communs, en totalité, dont la glacière, la cour et le pigeonnier, excepté la bergerie de 1896 ; le système hydraulique d'alimentation en eau lié au domaine, partie constitutive du château ; le parc et jardin en totalité avec la partie boisée, entourée de ses murs compris également dans la protection, avec la partie en contrebas au sud (le bûcher, la serre et la petite maison d'enfants) , tous les sols liés à ces parties : inscription par arrêté du 11 mai 2009.","habitants":"Famille de Gabrielle Marguerite de La Myre,\"","divers":"Davenescourt GPS : 49° 42' 41\" Nord, 2° 35' 52\" Est","gps":"49° 42' 41\" Nord, 2° 35' 52\" Est","images":["../image/image_80/80_Davenescourt_1.jpg","../image/image_80/80_Davenescourt_2.jpg","../image/image_80/80_Davenescourt_3.jpg"]},"Consult_chateau_formulaire8a83":{"id":"Consult_chateau_formulaire8a83","dept":"80","canton":"Poix-de-Picardie","commune":"Morvillers Saint Saturnin","nom":"Digeon","type":"Digeon","periode":"XIX","histoire":"DIGEON, du XIXe siècle, transformation des communs en une ferme modèle, construite entre 1860 et 1868, témoignant d'une agriculture avancée. Le parc paysager garde l'essentiel de l'ancienne ordonnance, avec les pelouses principales, les espaces boisés, les clôtures intérieures, et une palette végétale variée.  Le château, reconstruit  de style néo-classique brique et pierre, cet édifice présente un exemple d'exploitation agricole de la seconde moitié du XIXe siècle dans la Somme.\nÉléments protégés MH : l'ensemble comprenant le château (façades et toitures), le parc et le jardin, y compris le potager, situé au hameau de Digeon: inscription par arrêté du 27 décembre 2004. La ferme modèle du château, en totalité : classement par arrêté du 10 octobre 2005, modifié par arrêté du 30 novembre 2005.","architecture":"DIGEON, le potager se maintient sur le même emplacement et garde ses anciennes limites. Le château, présente un style néo-classique brique et pierre. Le château et les jardins de Digeon datent du XIXe siècle, il est en briques peintes, entouré d'un parc de 2,5 hectares, avec des arbres anciens, des massifs d'iris, d'hydrangeas, de rhododendrons et un sentier botanique. Le potager reconstitué sur le même emplacement a gardé ses anciennes limites. De forme rectangulaire, cest un jardin à la française de 3 500 m2, véritable jardin dagrément où les légumes alternent avec des arbustes et des plantes vivaces. Les massifs sont entourés de bordures de buis. La Roseraie se situe derrière la ferme, elle rassemble des dizaines despèces de rosiers modernes dune longue durée de floraison et quelques espèces anciennes.","habitants":"Chatelain locale\"","divers":"Digeon GPS : 49° 46' 53\" Nord, 1° 49' 35\" Est","gps":"49° 46' 53\" Nord, 1° 49' 35\" Est","images":["../image/image_80/80_Digeon_1.jpg"]},"Consult_chateau_formulaire0c91":{"id":"Consult_chateau_formulaire0c91","dept":"80","canton":"Rue","commune":"Dompierre sur Authie","nom":"Dompierre_Authie","type":"Châteaux","periode":"XV-XVII","histoire":"trois châteaux dans cet article; Dompierre, Ligescourt et la tour.  DOMPIERRE, il existe deux châteaux à Dompierre sur Authie. Le plus ancien appartenait au début du XVe à Philippe d'Auxy qui fut tué à Azincourt, la seigneurie passa à sa sur dont le mari, David de Rambures, fut tué lui aussi dans le même combat. Leur fils la fit entrer dans le patrimoine des Rambures et Charles, dit brave Rambures posséda le château de 1593 à 1633. En 1703 il est décrit comme étant \"un château-fort construit à l'antique situé dans une île au milieu du marais que forme la rivière d'Authie, avec basse-cour, et trois à quatre journaux d'enclos et trois moulins à blé, à huile, à papier\". La façade sud du château en brique ornée de chaînages en harpe de pierre porte gravée près de la porte d'entrée la date de 1627, et il est probable qu'elle fut construite après la destruction d'une partie de la forteresse de pierre. Son élévation où la brique domine, présente beaucoup de similitudes stylistiques avec le manoir de Beaucamps-le-Jeune. On accède aux étages par un escalier à vis au bel appareillage de brique. À l'intérieur, la brique est apparente dans toutes les pièces qui ne sont pas dans la grosse tour circulaire de pierre, ces salles ne sont pas voûtées; la salle supérieure a conservé un plafond aux belles poutres apparentes.Éléments protégés MH : la tour : inscription par arrêté du 18 mai 1926. La construction du château date de 1627, date gravée sur la porte d'entrée, pour Charles de Rambures. Le château de Dompierre-sur-Authie a été construit en brique et pierre. Les toitures ont été restaurées dans le style d'origine. Un escalier à vis donne accès aux étages. Dans les pièces intérieures la brique est apparente dans toutes les pièces. Des pièces ont conservé des cheminées monumentales aux armes de Charles de Rambures.","architecture":"DOMPIERRE, en 1750 pour le marquis de Quenteleu pour lui servir de rendez-vous de chasse. Elle est constituée par un bâtiment rectangulaire présentant sur chacune de ses faces principales un avant-corps dont les angles ont été arrondis. Elle a été édifiée sur un soubassement de grès que l'on a dissimulé au XXe siècle sous le ciment, le reste des murs a été monté en brique sauf les angles et les encadrements des baies qui sont en pierre, un toit à la Mansart avec lucarnes couvre ce bâtiment. Ce qui donne l'originalité à ce château, c'est que ses avant-corps présentent chacun deux baies à chaque niveau; ses portes et ses baies ont été tracées en plein cintre, les autres fenêtres, trois de chaque côté à chaque niveau sont à peine cintrées.                                                                                                                                                                                     La TOUR,  Charles de Rambures fit construire en 1627 ce château comme l'indique la date gravée près de la porte d'entrée est de style Louis XV. Il fut construit en brique et pierre vers 1750, les toitures ont été restaurées dans le style d'origine. Un escalier à vis donne accès aux étages. Dans les pièces intérieures, la brique est apparente dans toutes les pièces. Des pièces ont conservé des cheminées monumentales aux armes de Charles de Rambures. Il existe 2 châteaux de la Tour sur la même commune.                                                                                                              LIGESCOURT, ce petit château en brique et pierre construit au XVIIe siècle ne comprend qu'un simple rez de chaussée couvert d'une toiture à la Mansart. Deux pavillons à ses extrémités font légèrement en  saillie; six travées les séparent, eux-mêmes en ont deux chacun ; à chaque percement correspond une lucarne au niveau de la toiture d'ardoise. Le château possède un jardin d'agrément qui est inscrit au pré-inventaire des jardins remarquables.","habitants":"Famille de Charles  de Rambures\"","divers":"trois châteaux dans cet article; Dompierre grav-1-2, Ligescourt grav 3 et la tour grav-4.  GPS : 50° 18' 15,35\" Nord, 1° 55' 12,71\" Est                                                                     Tour  GPS : 50° 18' 15,35\" Nord, 1° 55' 12,71\" Est","gps":"50° 18' 15,35\" Nord, 1° 55' 12,71\" Est","images":["../image/image_80/80_Dompierre_Authie_1.jpg","../image/image_80/80_Dompierre_Authie_2.jpg","../image/image_80/80_Dompierre_Authie_3.jpg","../image/image_80/80_Dompierre_Authie_4.jpg"]},"Consult_chateau_formulaire2d15":{"id":"Consult_chateau_formulaire2d15","dept":"80","canton":"Doullens","commune":"Doullens","nom":"Doullens","type":"Patrimoine","periode":"XV-XVIII","histoire":"Trois châteaux cite dans cet article, la citadelle de Doullens , château de Bagneux,à Gezaincourt, Occoches.                                                                                                                                        CITADELLE DE DOULLENS , en 1525 régulièrement dévastée par les troupes espagnoles et cest pour protéger cette frontière que François Ier dota Doullens dune importante et luxueuse citadelle de grés. Rendu nécessaire par la puissance de lartillerie à poudre cet ouvrage fait transition entre les châteaux forts du Moyen-Age et les futures citadelles bastionnées que Vauban fera construire un siècle et demi plus tard. Après le rattachement de lArtois à la France en 1659 la citadelle abritera successivement une garnison, un lieu dassignation à résidence, prison dÉtat, une maison de préservation de jeunes filles et prison pour femmes. Cest du haut des remparts quAlbertine Sarrazin séchappa. Elle fit le récit de cette évasion dans son roman LAstragale.  Éléments protégés MH : l'ensemble des fortifications ; les façades et les toitures du logis du gouverneur ; la porte royale avec les vestiges du pont dormant correspondant ; la porte de secours de l'ancien château : inscription par arrêté du 17 juillet 1978.                                                                                                                 OCCOCHES  à cinq K.M à l'ouest, le château a été bâti au XVIIIe siècle  à lemplacement dun ancien manoir, des dépendances furent rajoutées dans la première moitié du XIXe siècle. Elles occupent les côtés de la cour dhonneur et sordonnent de part et dautre des portails donnant, lun sur la cour de lexploitation agricole, lautre sur lentrée du domaine. Le château est en pierre blanche et sinscrit dans la lignée des châteaux de cette époque : sobre, confortable et aux proportions raisonnables. Il comprend un corps de bâtiment principal double en profondeur, coiffé dun comble à la Mansart et encadré dailes basses placées en léger retrait. Il possède un parc avec un pigeonnier, une terrasse en terre-plein, une allée irrégulière.","architecture":"DOULLENS, l'hôtel de ville a été construit en 1898 par l'architecte Anatole Bienaimé, à l'emplacement de l'ancienne abbaye Saint-Michel. La  construction remonte au XIVe siècle. La citadelle de Doullens sera rénovée du XVIe- XVIIe siècle par Jean Errard de Bar-le-Duc. En 1525, le roi de France François 1er fait bâtir une place forte à Doullens, pour protéger le pays contre les Espagnols installés en Artois. La construction et ses modernisations se poursuivront sous le règne des rois Henri II, de Louis III, et de Louis XIV. Par le traité des Pyrénées, en 1659, qui rattache l'Artois à la France, la citadelle de Doullens perdit de son importance et devint une prison d'Etat. Vous découvrirez ses galeries; ses chambres de tir, ses places d'armes. La visite s'achève par une promenande sur les remparts, qui dévoile une vue magnifique. La visite guidée est organisée par les Amis de la citadelle.                                                                                                                  BAGNEUX à Gézaincourt,  Robert Frestiaux construisit vers le milieu du XIIIe siècle la forteresse de Gézaincourt \"dans la banlieue de Dorlens\", ce qui excita contre lui les animosités de l'Echevinage. Au XIXe siècle quelques vestiges y subsistaient encore. Aujourd'hui, on trouve un imposant château édifié en craie vers 1846, dominant un magnifique parc, pour le baron Lallart de Lebucquière. L'édifice possède deux étages, dont le dernier de forme attique, lui donnant une élévation inhabituelle. Près du château s'élevait une magnifique chapelle de style néo-gothique, détruite pendant la deuxième guerre mondiale par les occupants allemands. Au sud de Doulens le château de GEZAINCOURT,  fut édifié au milieu du XIIIe siècle. Il a été reconstruit, en 1846, pour le Baron Lallart de Lebucquière. Édifié en pierre crayeuse, il fut converti en colonie de vacances, pour la Caisse d'Allocations Familiales de Valenciennes.","habitants":"seigneurs locaux\"","divers":"Trois châteaux  cite dans cet article, la citadelle de Doulens  grav-2-3-4, château de Gezaincourt grav-5, Occoches grav-6.                                Doulens GPS : 50° 09' 06\" Nord, 2° 20' 06\" Est                                                            Hôtel de ville grav-1                               50° 09' 27? nord, 2° 20' 29? est                                       Gézaincourt PS : 50° 08' 30\" Nord, 2° 19' 13\" Est","gps":"50° 09' 06\" Nord, 2° 20' 06\" Est","images":["../image/image_80/80_Doullens_1.jpg","../image/image_80/80_Doullens_2.jpg","../image/image_80/80_Doullens_3.jpg","../image/image_80/80_Doullens_4.jpg","../image/image_80/80_Doullens_5.jpg","../image/image_80/80_Doullens_6.jpg","../image/image_80/80_Doullens_7.jpg"]},"Consult_chateau_formulaire2c2c":{"id":"Consult_chateau_formulaire2c2c","dept":"80","canton":"Poix-de-Picardie","commune":"Dromesnil","nom":"Dromesnil","type":"Château","periode":"XV-XVII","histoire":"trois châteaux dans cet article Dromesnil,  du Fresnoy et Villers-Campsart .                     DROMESNIL, remplacé par un nouveau au XVe siècle, démoli en 1750. Rebatie en 1752, élégante construction en brique et pierre, et remaniée au siècle dernier. La façade arrière donne sur une majestueuse futaie de hêtres. Dans la ferme attenante reste un manoir du XVe siècle. La terre de Dromesnil fut érigée en marquisat en faveur de la famille dHallencourt, qui la posséda jusquen 1749. Passé ensuite aux Roussel de Belloy qui conservèrent Dromesnil jusqu'en août 1884, date à laquelle le domaine fut mis en vente par Pierre-Aymar-Joseph de Roussel, comte de Belloy, et acquis par Félix de Beauvillé, le grand père du propriétaire actuel. M. de Beauvillé rachetait alors une terre qui avait appartenu à une famille à laquelle il était apparenté, sa propre famille ayant eu une alliance avec les de Hallencourt vers 1700-1705 par la famille de Grasse des princes d'Antibes. Décoration intérieure de style Louis XVI. Pigeonnier de forme octogonale. Propriété de la famille de Beauville.\nÉléments protégés MH :  les façades et les toitures du château, le grand salon y compris les deux consoles en marbre et le petit salon avec leur décor au rez-de-chaussée. Les façades et les toitures du manoir et des bâtiments de la ferme et le colombier du château : inscription par arrêté du 23 octobre 1980.","architecture":"Dix K.M au nord ouest FRESNOY Andainville,   la seigneurie de Fresnoy appartenait, en 1377, à Guillaume Haterel. Vers 1460, elle passa dans la famille de Haucourt, à la suite du mariage de Jeanne de Caumont avec Pierre de Haucourt, écuyer. En furent propriétaires, la famille Bellengreville au XVIe siècle et, à partir de 1650, les Ternisien qui conservèrent le domaine jusqu'au XIXe siècle. Le château actuel situé près de l'église, au cur de la commune, date du XVIIIe siècle. Il se compose d'un corps de logis tout en longueur, de plan rectangulaire, construit en brique. Son élévation est à deux étages. Des pierres sont insérées dans la façade sud et y dessinent des figures géométriques d'un effet inattendu, ce qui lui confère une certaine originalité. Un pigeonnier carré en galandage, malheureusement laissé à l'abandon, s'élève près du château.                                                                                                                 A Villers-Campsart à cinq K.M. au sud ouest VILLERS, le château de Villers, en  brique et pierre, a été  construit à la fin du XVIIIe siècle, le parc possède un beau jardin d'agrément inscrit au pré-inventaire des jardins remarquables.","habitants":"Dromesnil Famille dHallencourt                      Fresnoy famille de Haucourt\"","divers":"trois châteaux dans cet article Dromesnil grav-1,  du Fresnoy et Villers-Campsart grav-2                                   Dromesnil GPS : 49° 52' 40\" Nord, 1° 51' 53\" Est","gps":"49° 52' 40\" Nord, 1° 51' 53\" Est","images":["../image/image_80/80_Dromesnil_1.jpg","../image/image_80/80_Dromesnil_2.jpg"]},"Consult_chateau_formulaire3208-2":{"id":"Consult_chateau_formulaire3208-2","dept":"80","canton":"Rue","commune":"St-Riquier","nom":"Drugy","type":"Château","periode":"XVIII","histoire":"DRUGY,  Hameau de Saint-Riquier, en 1361, des réparations importantes financées par l'abbé de Saint-Riquier Philippe du Fossé y sont effectuées. En 1431, Jeanne d'Arc est enfermée dans une des salles du château. Entre 1457 et 1465, l'abbé Pierre Le Prestre reconstruit le château qui selon sa chronique était en ruine. En 1475 l'incendie de Saint-Riquier perpétré par les troupes de Louis XI n'épargne pas le château, qui continue d'être habité pour être démantelé en 1709, après la mort de Daniel de Cosnac. Dans le troisième quart du XVIIIe siècle, le château est partiellement reconstruit et transformé en ferme grâce au consentement de Philippe de Quevauvillers. Du château médiéval ne subsiste qu'une salle à l'angle nord ouest et une fenêtre dans un des bâtiments au sud.  La disposition actuelle des bâtiments, organisée sur un plan polygonal irrégulier reprend celle de l'ancien château. Détruit puis reconstruit à usage de ferme, le château médiéval n'a gardé qu'une salle voûtée d'ogives et une fenêtre en tiers point à deux lancettes. Les autres corps de bâtiments ont une élévation ordonnancée à deux niveaux pour les parties d'habitations au nord et à l'est, et en rez-de-chaussée ordonnancé pour les étables et granges. La salle dite cachot de Jeanne d'Arc est couverte en tuiles plates mécaniques ainsi que les bâtiments attenant à l'est. Les corps d'habitations sont couverts en ardoise. Les autres parties ont une toiture en tuiles mécaniques.  Éléments protégés MH : la tour contenant la salle dite cachot de Jeanne d'Arc : inscription par arrêté du 7 septembre 1943.","architecture":"DRUGY, la construction du château de Drugy date de 1447 à 1465. Il servit de prison à Jeanne d'Arc. Dans un angle de la ferme de Drugy, reconstruite sur les fondations de lancien château fortifié et résidence dété des abbés de Saint-Riquier, on montre encore une ancienne salle voûtée qui correspondrait à lemplacement du cachot occupé par Jeanne dArc, une nuit de novembre 1430, alors quelle était conduite pour son procès et son supplice à Rouen. Le passage de Jeanne dArc à Drugy-lès-Saint-Riquier est relaté dans la chronique latine de Jean de la Chapelle, datée de 1492. Un château aurait déjà existé en 1217 mais, c'est sous l'abbatiat de Gilles de Marchemont que de grands travaux de fortification furent entrepris en 1272. L'abbé Philippe du Fossé ordonna des réparations en 1361. En septembre 1430, Jeanne d'Arc fut enfermée dans le château. La salle où elle fut détenue est toujours visible. La guerre de Cent Ans ayant ruiné lédifice, Pierre Le Prestre, abbé de Saint-Riquier le fit reconstruire de 1447 à 1465. En 1475, sur ordre du roi de France Louis XI, labbaye de Saint-Riquier et le château de Drugy furent incendiés. Le château continua cependant dêtre occupé jusquà son démantèlement en 1709. Les vestiges de la tour du cachot de Jeanne d'Arc sont protégés par les M.H.du 7/09/1943.","habitants":"Philippe de Quevauvillers\"","divers":"Châteu  de Drugy à St-Riquier                GPS : 50° 07' 53\" Nord, 1° 56' 59\" Est","gps":"50° 07' 53\" Nord, 1° 56' 59\" Est","images":["../image/image_80/80_Drugy_1.jpg","../image/image_80/80_Drugy_2.jpg"]},"Consult_chateau_formulaire52b9-2":{"id":"Consult_chateau_formulaire52b9-2","dept":"80","canton":"Amiens","commune":"Dury","nom":"Dury","type":"Château","periode":"XVII","histoire":"DURY La première mention du domaine, est citée lors du contrat de mariage du 16/11/1563, unissant Adrien Ier Picquet, Ecuyer, Seigneur de Dourier et Françoise Scourion. La propriété comprend une maison « dune certaine importance » avec une maison de concierge, donnée en dot à la future épousée. Pendant presque 300 ans, une branche de la Famille Picquet de Dourier a possédé le Chateau de Dury, étant un bien concédé par un seigneur (ici, le chapitre cathédrale) contre le paiement perpétuel dune redevance appelée cens. Il semble que les chanoines du chapitre furent les seigneurs jusquà la Révolution, mais une autre source nous affirme quen 1666, « Colbert confirme la seigneurie à Adrien Picquet de Dourrier ». Un premier Château (Maison seigneuriale) en 1685, dont la construction est due à Adrien III, a démarré plus dun siècle plus tard, vers 1685 et nétait quune maison de campagne. Ce premier château, était en brique et pierre, typique des constructions du XVIIème siècle. Cest à cette époque que lentrée de la propriété est modifiée. Une demande a été faite auprès du chapitre pour transporter lancienne entrée, située au carrefour de la Route nationale et de la rue Grimaux, celle-ci ne se trouvant pas dans laxe de la cour dhonneur. Elle sera désormais tournée vers le centre du village et léglise. Chaque génération de Picquet de Dourier va enrichir la bâtisse et le domaine. Pratiquement à chacun des décès, un inventaire est notifié, permettant davoir une idée des biens de la famille. En 1873, le dernier des Picquet de Dourier, Adrien Charles, séteint ; la propriété est vendue à Monsieur Ferdinand Garçon dont le fils Fernand est maire de Dury en 1878 et le reste jusquen 1895. La propriété est vendue en 1911 à Abel Duvette, banquier amiénois. Une des deux filles de Monsieur Duvette et de son épouse la Comtesse de Faverney sunit à Monsieur Seydoux dont elle aura trois fils, possesseurs des biens jusquà lété 2014.","architecture":"DURY Un haut-lieu historique Siège de hauts faits historiques, entre le 30 octobre 1915 et le 3 septembre 1916, pour la préparation et le déroulement de la Bataille de la Somme, le château abrite épisodiquement le général Ferdinand Foch et son aide de camp Maxime Weygand. Ils y reviendront quelques jours en 1918 au moment de lorganisation du « Commandement unique ». Ils sont logés au château et travaillent dans une villa sur la Route nationale. Le château a vécu et survécu au rythme de lhistoire. Il est endommagé lors des 3 conflits : 1870, 1914/1918 et 1939/1945. Il est pillé et brûlé. Il brûle dabord en 1919, non pas des suites de la guerre mais à cause dun incendie déclenché par un feu de cheminée. Le château est terminé depuis 5 ans quand la Maréchale Foch et le général Weygand posent la plaque commémorant le séjour de Foch à Dury. Elle sera remplacée par une plaque nouvelle en 1966. En juin 1940, le château est de nouveau en ruine cette fois-ci à cause des combats violents qui se sont déroulés dans la commune. Il est reconstruit sur le modèle du précédent entre 1952 et 1958. Par deux fois, Abel Duvette relève les ruines de son château. Un rajeunissement du Château Nouveau changement de propriétaires durant lété 2014. Le nouvel occupant du château, Monsieur Ladislas De Simencourt nest pas étranger à la famille Duvette, son arrière-grand-mère paternelle, Jeannine, née Duvette, était la sur de Monsieur Abel Duvette. Elle a épousé, en 1907, le Baron Louis Cotteau de Simencourt. Dimportants travaux de restauration ont rendu sa splendeur au château de Dury.","habitants":"Famille Picquet de Dourier\"","divers":"Dury  GPS : 49° 50' 46\" Nord, 2° 16' 14\" Est","gps":"49° 50' 46\" Nord, 2° 16' 14\" Est","images":["../image/image_80/80_Dury_1.jpg","../image/image_80/80_Dury_2.jpg"]},"Consult_chateau_formulaire0909":{"id":"Consult_chateau_formulaire0909","dept":"80","canton":"Abbeville","commune":"Epagne-Epagnette","nom":"Epagne","type":"Château","periode":"XVII","histoire":"EPAGNE, il existait déjà au Moyen-Age un château qui appartenait, en 1312, à Mathieu de Belloy, écuyer, il n'en reste plus rien aujourd'hui. Il y avait en outre un monastère de l'ordre de Cîteaux, fondé par Enguerran de Fontaines, sénéchal de Ponthieu, en 1178. En 1645, les religieuses l'abandonnèrent et c'est à peu près à l'emplacement de cette abbaye qu'aurait été construit, à la fin du XVIIe ou au début du XVIIIe siècle.","architecture":"EPAGNE, le château actuel d'Épagne restauré et remanié au XIXe siècle. Une grille en fer forgé et un parterre à la française précèdent la demeure édifiée en brique et pierre. Ce château se compose d'un corps de logis flanqué de deux ailes en retour d'équerre assez saillantes. Son élévation est à un étage, sauf l'avant-corps qui est à deux étages; une grande fenêtre surmonte la porte d'entrée principale. A la base de la toiture d'ardoise, des ouvertures alternent, de manière heureuse, avec des lucarnes plus grandes et à encadrements de pierre. L'intérieur souffrit particulièrement de l'occupation allemande en 1940-1945.","habitants":"Enguerran de Fontaines\"","divers":"Epagne GPS : 50° 04' 27\" Nord, 2° 32' 01\" Est","gps":"50° 04' 27\" Nord, 2° 32' 01\" Est","images":["../image/image_80/80_Epagne_1.jpg","../image/image_80/80_Epagne_2.jpg"]},"Consult_chateau_formulaire9944":{"id":"Consult_chateau_formulaire9944","dept":"80","canton":"Abert","commune":"Acheux  en amienois","nom":"Epine_80","type":"Château","periode":"XVI","histoire":"EPINE,    la terre d'Acheux est donnée à l'abbaye de Corbie par la reine Bathilde et le roi Clotaire III lors de sa fondation. Les seigneurs d'Acheux furent vassaux de l'abbé de Corbie. En 1415, le roi d'Angleterre, Henri V, logea à Acheux quelques jours avant la bataille d'Azincourt  Jacques d'Humières, seigneur d'Acheux, fonda la Ligue.   En 1593, Acheux fut dévastée par les Espagnols. Le roi Henri IV accorda aux habitants une exonération de taille pour trois ans.en 1685, Louis de Crevant, seigneur d'Acheux, maréchal de France, devint grand-maître de l'artillerie du roi Louis XIV.  À partir de 1702 et jusqu'à la Révolution française, les paysans d'Acheux furent en procès contre leurs seigneurs.  Ses origines remontent au XIe siècle.","architecture":"Le château de l'Epine était composé de 7 tours. Aujourd'hui, il n'en reste que 2 encore debout. Le mur d'enceinte était entouré d'un fossé toujours à sec, rempli de ronces et d'épines, aussi, d'après la tradition, on l'appelait « château ou manoir de l'Épine.","habitants":"Famille de  Louis de Crevant\"","divers":"Château d'Epine GPS : 50° 04' 27\" Nord, 2° 32' 01\" Est","gps":"50° 04' 27\" Nord, 2° 32' 01\" Est","images":["../image/image_80/80_Epine_80_1.jpg","../image/image_80/80_Epine_80_2.jpg","../image/image_80/80_Epine_80_3.jpg"]},"Consult_chateau_formulairedb88":{"id":"Consult_chateau_formulairedb88","dept":"80","canton":"Abbeville","commune":"Ercourt","nom":"Ercourt","type":"Château","periode":"XIX","histoire":"ERCOURT;    Le château fut édifié en 1849 sur l'initiative d'Adhémar Le Blond du Plouy, alors propriétaire du domaine. Par sa date et par son style, il constitue une des rares constructions Empire du département et on utilisa pour le construire des pierres du pays (extraites des carrières de Pont-Rémy). Il fut édifié à l'emplacement de deux châteaux forts successifs. Le premier, détruit au moment de la Jacquerie et le second par les Ligueurs abbevillois après la bataille d'Arques en 1589. Au XVIIe siècle, un troisième château avait été construit également sur le même emplacement, pour la famille Sanson.","architecture":"ERCOURT le château actuel est bâti en brique et pierre au milieu d'un parc d'un hectare sur une colline
