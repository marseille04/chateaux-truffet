qui domine le village. La pierre est disposée en longues bandes verticales formant pilastres, destinée essentiellement à souligner les angles de la demeure; elle est employée aussi en bandeau horizontal entre le rez-de-chaussée et l'étage et en chaînages rectilignes autour des ouvertures. La brique, quant à elle, fait fonction de remplissage. Le château se compose d'un corps de logis flanqué aux extrémités de deux ailes, en saillie du côté de la cour d'entrée, en retrait et moins longues du côté du parc. Au centre de la façade sur le parc se détache un avant corps polygonal saillant surmonté d'un toit à pans. Jusqu'à une date récente, trois allées du parc partaient en étoile depuis chacune des trois faces principales de cet avant-corps.","habitants":"d'Adhémar Le Blond du Plouy\"","divers":"Château d'ercourt   GPS : 49° 59' 14\" Nord, 2° 27' 19\" Est","gps":"49° 59' 14\" Nord, 2° 27' 19\" Est","images":["../image/image_80/80_Ercourt_1.jpg","../image/image_80/80_Ercourt_2.jpg","../image/image_80/80_Ercourt_3.jpg"]},"Consult_chateau_formulaire6557":{"id":"Consult_chateau_formulaire6557","dept":"80","canton":"Corbie","commune":"Bavelincourt","nom":"Esbarts","type":"Château","periode":"XVII","histoire":"ESBARTS, le vocable de Bavelincourt est attesté depuis le XIIe siècle (Bavelainecort  en 1148) , mais le terroir est un lieu de peuplement beaucoup plus ancien puisqu'il contient un menhir, la \"pierre d'Oblicamp\" (sur la colline qui domine le village) dont les premiers détenteurs portaient le nom (Hessselin de Bavelincourt en 1212), avant que le fief ne passe à la famille de Fouquesolles. Deux écarts aujourd'hui disparus étaient alors attestés : le Francmoulin abritait une ferme appartenant à l'abbaye de Corbie, qui aurait été détruite avant 1669, et le hameau d'Agnicourt (mentions dès le XIIe siècle) était le siège d'une seigneurie. Enfin, une autre seigneurie, relevant de celle de Bavelincourt, était attachée au hameau d'Esbart, où s'élève encore aujourd'hui un château.   La demeure actuelle reprend les murs de l'ancien château peut-être médiéval, c'est une grande maison de maître édifiée en 1893 pour madame Gourdin Bouquet dont les initiales figurent sur la girouette des communs et sur la cheminée de la salle de billard. Elle fit appel à larchitecte Amédée Milvoy, auteur de plusieurs hôtels particuliers à Amiens, auquel elle commanda aussi la chapelle funéraire du cimetière de Bavelincourt.","architecture":"ESBARTS,  Charles de Beauffort, seigneur de Bavelincourt, apparenté aux Beauffort de Bavincourt, trouva la mort à la Bataille d'Azincourt, en 1415. \"Esbart\" (le hameau et le château d'Esbart portent le même nom) se dresse au milieu de la belle campagne de Bavelincourt, où il est très bien situé.  les Esbarts était au Moyen Age le siège d'une seigneurie relevant de celle de Bavelincourt, et contenant maison et colombier. La demeure actuelle reprend les murs de l'ancien château (peut-être médiéval ) mais a été entièrement remaniée vers 1900.","habitants":"Famille de Fouquesolles\"","divers":"GPS : 49° 59' 14\" Nord, 2° 27' 19\" Est","gps":"49° 59' 14\" Nord, 2° 27' 19\" Est","images":["../image/image_80/80_Esbarts_1.jpg","../image/image_80/80_Esbarts_2.jpg"]},"Consult_chateau_formulaired738":{"id":"Consult_chateau_formulaired738","dept":"80","canton":"Poix-de-Picardie.","commune":"Etréjust","nom":"Etréjust","type":"Château","periode":"XVII","histoire":"ETREJUST   la terre d'Étréjust a appartenu jusqu'à la fin du XVIIe siècle, à la famille de Fontaines: Aléaume en était seigneur en 1185 ses descendants s'y succédèrent jusqu'à Charles qui ne laissa qu'une fille. La terre et la seigneurie fut vendue en 1698, à M. d'Hivernay, avocat à Paris, et, vers 1749, Charles-Louis, Comte de Carvoisin en était possesseur, il la conserva jusqu'en 1787 et la vendit le 7 novembre de cette année, à Gabriel François de Paule Roussel de Belloy. Au début du XXe siècle, le comte Adrien de Hauteclocque en était propriétaire. Il appartient toujours à cette famille; la comtesse Bernard de Hauteclocque est la propriétaire actuelle.","architecture":"ETREJUST, le château de dimensions modestes, se compose d'un corps de logis en brique et pierre qui constitue la partie la plus ancienne de la demeure qui date du XVIIe siècle. Seule la toiture a été refaite : les pannes remplacent les tuiles. Contre les deux pignons à pas-de-moineaux de ce corps de logis, s'appuyaient deux ailes plus basses, du XVIIIe siècle. L'aile nord existe toujours mais l'aile sud a été démolie. Deux pavillons, de plan carré du XVIIIe siècle, sont placés aux extrémités de la façade du côté jardin. Un de ces pavillons était occupé par une petite chapelle dédiée à saint François de Paule, construite en 1755-1756, sur l'initiative du comte de Carvoisin, brigadier des armées du roi, qui, infirme, ne pouvait plus se rendre à l'église du village.\nÉléments protégés MH : les façades et les toitures du château : inscription par arrêté du 1er avril 1986.","habitants":"Famille du comte Adrien de Hauteclocque\"","divers":"Etréjust   GPS : 49° 54' 41\" Nord, 1° 53' 11\" Est","gps":"49° 54' 41\" Nord, 1° 53' 11\" Est","images":["../image/image_80/80_Etr%c3%a9just_1.jpg","../image/image_80/80_Etr%c3%a9just_2.jpg","../image/image_80/80_Etr%c3%a9just_3.jpg"]},"Consult_chateau_formulaire5d4d":{"id":"Consult_chateau_formulaire5d4d","dept":"80","canton":"Ailly-sur-Noye","commune":"La Faloise","nom":"Faloise","type":"Forteresse","periode":"XIV","histoire":"La FALOISE  Le château est mentionné dès 1327; il s'agissait d'une forteresse entourée de fossés appartenant à Jean de Montmorency. Elle fut partiellement détruite en 1358 au cours de la Jacquerie, rébellion de paysans soutenue par Etienne Marcel prévôt des marchands de Paris. Un état des lieux de 1463 indique que le château n'était toujours pas reconstruit depuis ce soulèvement, mais un château fut sans doute édifié peu après  .La seigneurie de La Faloise a appartenu aux familles de Lorraine Vaudemont, de Roye, de Bourbon Condé, de Béthune Sully. En 1736, elle est achetée par Paul Maximilien Hurault, marquis de Vibraye, colonel d'un régiment de dragons, lieutenant général des armées, dont le fils la vend en 1776 à Louis du Gard, écuyer ordinaire de la Grande Écurie du roi. En 1793, Louis du Gard revend le domaine de La Faloise à Alexandre Joseph Debray, qui le revend en 1804 à Louis-Frédéric Bourgeois de Mercey . La famille de ce dernier conserve le domaine jusqu'au début du XXe siècle.\nLa période révolutionnaire voit le village se restructurer et s'industrialiser, La Faloise étant alors renommée pour la fabrication des clous. Cette prospérité durera jusqu'aux alentours de 1850. En 1846, le chemin de fer dessert le village, avec la mise en service de la ligne de Paris-Nord à Lille et de la gare de La Faloise.","architecture":"La FALOISE , de cette forteresse de la fin du Moyen-Age, il subsiste une poterne, composée d'une tour carrée en pierre, cantonnée de deux tourelles en éperon pentagonal qui en protégeaient l'entrée : leur rez-de-chaussée est encore percé de fentes de tir. Au-dessus de la voûte du passage, la tour comporte trois étages comprenant chacun une pièce d'habitation. Celles-ci étaient desservies par un escalier extérieur aujourd'hui coiffé d'un campanile. La fenêtre de la pièce du 1er étage à conservé son entourage du XVe siècle décoré de moulures prismatiques.\nSelon la tradition, Henri IV se serait souvent rendu à La Faloise pour y chasser. Une des chambres de la tour porte toujours son nom. Un document de 1686 mentionne l'existence, à gauche de la tour, d'un corps de logis brique et pierre à deux étages. Une cuisine et une salle occupaient le rez-de-chaussée; l'étage recouvert d'une toiture en tuiles comprenait deux chambres. À la fin du XVIIIe siècle, un corps de bâtiment d'habitation en pierre, répondant aux exigences du confort moderne, fut édifié à l'arrière et pourvu d'une façade principale donnant sur le jardin. Durant la première moitié du XIXe siècle, la famille de Mercey propriétaire du château y entreprit des travaux de restauration, et c'est de cette époque que date la reconstruction de l'actuel bâtiment en brique et pierre sur cour qui fut doté d'une couverture en terrasse pour ne pas obstruer les fenêtres du corps de logis sur jardin. De l'ancienne ferme il reste des bâtiments ruinés du XVIIe siècle, un pigeonnier octogonal et un abreuvoir.","habitants":"Famille de Jean de Montmorency.\"","divers":"Faloise 49° 42' 00? nord, 2° 20' 30? est","gps":"","images":["../image/image_80/80_Faloise_1.jpg","../image/image_80/80_Faloise_2.jpg","../image/image_80/80_Faloise_3.jpg"]},"Consult_chateau_formulaire5396":{"id":"Consult_chateau_formulaire5396","dept":"80","canton":"Ailly-sur-Somme","commune":"Ferrières","nom":"Ferrières_80","type":"Château","periode":"XVIII","histoire":"FERRIERES,   c'est Nicolas de Herté qui fit construire ce château au XVIIIe siècle. Il s'agit d'un bâtiment rectangulaire, flanqué de deux ailes en alignement, avec un étage entre rez-de-chaussée et grenier, surmonté d'un toit en ardoises.","architecture":"FERRIERES, dépendances à l'est et à l'ouest du château formant cour. A l'intérieur, présence dans les salons et les chambres de treize trumeaux au-dessus des portes réalisés par Raoul de Pibrac, les seuls qui subsistent encore en place avec ceux que l'artiste réalisa pour orner à Toulouse les salons de l'Académie des Jeux Floraux (1906).  Éléments protégés MH : le château comprenant le corps de bâtiment, les communs (le pigeonnier, l'orangerie, les écuries et la ferme), le parc, les allées, les clôtures et, en particulier, le saut-de-loup : inscription par arrêté du 17 février 2003.   La grille du château de Ferrières s'ouvre sur la place du village. Il est inscrit aux M.H. depuis 2003, c'est un château privé, fermé au Public.","habitants":"Famille de  Nicolas de Herté\"","divers":"Ferrieres_GPS : 49° 53' 34? nord, 2° 10' 40? est","gps":"49° 53' 34? nord, 2° 10' 40? est","images":["../image/image_80/80_Ferri%c3%a8res_80_1.jpg","../image/image_80/80_Ferri%c3%a8res_80_2.jpg"]},"Consult_chateau_formulaire9467":{"id":"Consult_chateau_formulaire9467","dept":"80","canton":"Flixecourt","commune":"Flesselles","nom":"Flesselles","type":"Château","periode":"XIV-","histoire":"FLESSELLES, la seigneurie de Flesselles est attestée à partir du XIIe siècle. Elle appartenait au début du XIVe siècle à Guillaume de Saveuse qui fait bâtir un château à plusieurs tours, dont l'une est conservée. Au XVIIe siècle, un nouveau château fut construit pour la famille Brégy de Flesselles, de cet édifice reste l'actuelle salle de réception. En 1744 le château fut vendu à Alexandre Nicolas de Bray, qui fit édifier en 1747 le corps de logis actuel et le pavillon à étage carré. La liaison entre le corps de logis et le pavillon est assurée par un bâtiment à portail néo-classique, qui aurait été construit vers 1780 par l'architecte Rousseau. Charles de Chévigné, au XIXe siècle, agrandit le parc. Il remania aussi l'aménagement intérieur : établissement d'un fumoir, réfection de l'escalier et des boiseries du corps de logis. Le château a été en partie restauré par son propriétaire actuel en 1985 : aménagement de salles de réception près de la tour.\nLes bâtiments s'organisent autour d'une cour rectangulaire ouverte au nord. Le côté sud de la cour est occupé par le corps de logis élevé en craie et couvert en ardoises. Le côté Est est délimité par trois bâtiments de communs : le premier est en craie, le deuxième est en briques et pierres (façade arrière) et en torchis (façade avant), le troisième est en briques. En face, le côté ouest de la cour comprend un bâtiment en craie avec portail d'entrée et toit brisé, un pavillon en craie de même élévation que le corps de logis, et des communs en briques et pierres englobant une tour circulaire en craie, voûtée d'ogives, couverte d'une flèche.  Éléments protégés MH : les façades et les toitures du château ; l'escalier avec sa rampe à balustres de bois et la salle à manger et le salon avec leur décor au rez-de-chaussée : inscription par arrêté du 31 juillet 1979","architecture":"FLESSELLES. Autrefois, le château était entouré de 7 tours. C'est le seul vestige de l'ancienne forteresse du XIVe siècle. Les comptes des frères Duthoit indiquent en août 1842 et en novembre 1843, la fourniture de rosaces de plafond, de corniches et d'éléments en carton-pierre destinés au salon et à la salle à manger du château, à Flesselles. Le Marquis est décédé le 2/06/1879 et son épouse, le 8/07/1896 à Paris. Marie-Louise, née en 1843, petite fille du marquis de Chevigné, épousa Casimir-Louis-François de Sainte-Aldégonde, décédé en 1873. Au décès de la marquise de Chevigné, le domaine échut à leur petit-fils, Edmond-Arthur-Gaston-Jules, de Sainte-Aldégonde, né en 1866, qui épousa Marie-Marthe des Acrés de L'Aigle, mais décéda à 38 ans, en 1904. Puis, en 1920, le domaine passe dans les mains de la fille de ces derniers, Adèle Aglaé Marie Louise Aldegonde , née à Paris le 30 août 1895, épouse du Prince Stanislas Auguste Charles Hubert Guillaume Poniatowski,  qui vendit le château en 1937 à un cultivateur, Georges Ferté. Le château de flesselles est, depuis 1977, la propriété de M. et Mme Patrick Benoit, qui, avec leurs enfants, le réhabilitent,  le château de Flesselles est le seul à conserver un élément médiéval significatif dans le canton de Villers Bocage où la plupart des grandes demeures ont été reconstruites à partir du XVIIe siècle, et son cops de logis est le seul à porter une date dans le canton. Le portail néo-classique rappelle le style de Rousseau à Amiens et à Saint-Gratien. Éléments protégés MH : les façades et les toitures du château.","habitants":"Famille de Brégy de Flesselles,\"","divers":"Flesselles GPS : 50° 00' 07\" Nord, 2° 15' 38\" Est","gps":"50° 00' 07\" Nord, 2° 15' 38\" Est","images":["../image/image_80/80_Flesselles_1.jpg","../image/image_80/80_Flesselles_2.jpg","../image/image_80/80_Flesselles_3.jpg"]},"Consult_chateau_formulaire1c9a":{"id":"Consult_chateau_formulaire1c9a","dept":"80","canton":"Flixecourt","commune":"Flixecourt","nom":"Flixecourt_Blanc","type":"Château","periode":"XVI","histoire":"FLIXECOURT, logement patronal faisant partie de l'ensemble textile Saint frères Flixecourt, construit entre 1884 et 1886, dates sur la grille du grand portail, d'après les plans de l'architecte Paul Louis Deleforterie d'Amiens pour Jean-Baptiste Saint. Existence d'un fonds d'archives privées. Il abrita létat major du général Rawlinson, commandant de la IVe armée anglaise, lors de loffensive en Août 1918. Il fut en 1942 le cadre dune importante conférence de la Luftwaffe, présidée par le maréchal Goering. Le domaine constitue une oeuvre majeure dans l'art de l'architecture éclectique et dans celui du parc paysager et de son jardin tels qu'ils étaient conçus à la fin du XIXe siècle.    Éléments protégés MH : les façades et les toitures, la grille d'honneur, le grand escalier de pierre à balustres avec son plafond peint, les pièces suivantes avec leur décor : le hall d'entrée, le grand et le petit salon, la grande et la petite salle à manger, la salle de billard, la chambre bureau, la salle de bains, la chambre d'angle, la chambre de monsieur et la salle de bains adjacente au premier étage : inscription par arrêté du 28 avril 1980. Le parc et le jardin : inscription par arrêté du 29 juillet 2013.  Construit en brique et pierre, il est composé d'un corps de logis avec un avant corps en ressaut et des pavillons en décrochement. Ses hautes toitures à la française, s'inspirent des châteaux de la fin du XVIe siècle. Côté jardin, l'avant-corps octogonal est davantage en saillie et une tour d'inspiration médiévale répond au nord-ouest au pavillon du nord-est. Le décor extérieur a été particulièrement soigné : fronton à volutes pour les fenêtres de l'avant corps, balcons étagés reposant sur des consoles, mascarons, grotesques qui révèlent l'éclectisme de la fin du XIXe siècle.","architecture":"BLANC, le château blanc de Flixecourt il n'en présente pas moins un véritable intérêt patrimonial au sein du vaste ensemble Saint-Frères, de la vallée de la Nièvre.   Blanc est le troisième et avant dernier château construit par la famille Saint, tout près de la direction des usines de la vallées de la Nièvre.  En 1912, Alice Saint, de la branche rouennaise, veuve d'Henri de la branche de Flixecourt, fait appel à l'architecte Charles Bourgeois pour construire ce château, face aux usines et magasin construits à la fin du XIXe siècle , le long de la voie ferrée en contrebas. Alice Saint, veuve depuis 1907, s'adresse à un architecte alors très en vue dans le nord de la France pour construire sa nouvelle demeure dans le bon goût de la haute bourgeoisie industrielle. Charles Bourgeois est alors en pleine ascension. Il a appris son métier à Tourcoing, puis en Belgique, avant de travailler en collaboration avec son père, architecte lui aussi. Dans les premières années du XIXe siècle, il travaille essentiellement pour la petite, moyenne, et haute bourgeoisie de Tourcoing et des environs. En 1912, il est nommé directeur de l'école des beaux-arts de Tourcoing, poste qu'il occupera jusqu'en 1940. Le château Blanc est sa première commande dans la Somme, sa cliente est en contact avec les réseaux industriels du Nord. Sa fille aînée Marie a épousé Albert Six, fils d'un industriel lainier bien connu à Roubaix et Tourcoing.  Charles Bourgeois sait s'adapter à la clientèle. Il est capable de réaliser des immeubles de styles très variés, du plus tendance aux intonations art nouveau, au plus classique, dans le bon goût Louis XV qu'affectionne la haute bourgeoisie.","habitants":"Blanc; famille de Saint\"","divers":"Flixecourt GPS : 50° 00' 49\" Nord, 2° 04' 55\" Est                                                      Blanc grav-4 GPS : 49° 54' 51\" Nord, 1° 43' 23\" Est                                                               Navette 50° 01' 04? N, 2° 04' 20? E    Rouge grav-6                                            50° 01' 08? N, 2° 04' 36? E          Hesse grav-5                                              50° 00' 34? N, 2° 04' 50? E","gps":"50° 00' 49\" Nord, 2° 04' 55\" Est","images":["../image/image_80/80_Flixecourt_Blanc_1.jpg","../image/image_80/80_Flixecourt_Blanc_2.jpg","../image/image_80/80_Flixecourt_Blanc_3.jpg","../image/image_80/80_Flixecourt_Blanc_4.jpg","../image/image_80/80_Flixecourt_Blanc_5.jpg","../image/image_80/80_Flixecourt_Blanc_6.jpg"]},"Consult_chateau_formulaire5b25":{"id":"Consult_chateau_formulaire5b25","dept":"80","canton":"Poix-de-Picardie","commune":"Foucaucourt-Hors-Nesle","nom":"Foucaucourt","type":"Château","periode":"XVII","histoire":"FOUCAUCOURT,  en 1230  Adrien de Foucaucourt coseigneur,  en 1347 Jean dit de Morant écuyer dont la fille Marie héritière épouse en 1350 Guillaume d'Acheux. En 1680 Antoine d'Acheux  cède  le domaine à Louis de Caumont, chevalier et en 1686 le domaine est acquis par  François Pingré échevin d'Amiens  qui construisit le château, le fils de François, Nicolas  épouse Elisabeth Marié de Toulle qui meurt en 1754 sans postérité, Nicolas cède son bien à un neveu de sa femme Florimond Marié. Fils de Louis anobli en 1728   secrétaire du roi et capitaine  au régiment de Gramont meurt en 1792. le domaine passe au fils de florimont ancien lieutenant général. Aprés le décès de Marie-Agathe Marié de Toulle, comtesse de Sénarpont, vend le château et en 1933 le marquis de Paty de Clams  se défait au profit  de monsieur Henri de Cosme,  ambassadeur  de France qui le transmet à sa petite fille Madame de Rocquigny.","architecture":"FOUCAUCOURT, on accède à la cour d'honneur en passant une grille  s'encadrant entre deux pilliers portant des boules de pierres ornées de guirlandes poccupant le fond de la cour, le corps de logis de brique et de pierre à cinq travées est élevé  sur un rez-de-chaussée et un étage, coiffé par un toit à la Mansart, de grandes fenêtres   rectangulaires entourés par des chaînes harpées  de pierre blanche se détachent de la maçonnerie de brique enduite. Au centre des deux façades principales qui sont identiques, une porte plein cintre s'ouvrant entre des pilastres plats supportant un fronton  arrondi.   Les archives situent la construction du château au XVIIe siècle, sur un château antérieur dont certains éléments encore en place dont une grange avec un mur du XVIe siècle, servant aussi de bûcher et de pressoir et pigeonnier orné de briques vitrifiées et murs de clôture peuvent être datés du XVIe siècle, deux ailes basses en brique dans le prolongement du corps de logis coifées à la Mansart ont été rajoutées dans les années 1760   Éléments protégés MH : les façades et les toitures du château, des ailes attenantes, de la dépendance reliée au corps de logis, de la grange; l'escalier en bois du XVIIe siècle ; le salon, la salle à manger, la chambre à coucher du premier étage ; la cour ; le jardin et ce qui reste de l'hémicycle : inscription par arrêté du 14 octobre 2002.","habitants":"Famille de  Florimont  Mariè\"","divers":"Foucaucourt GPS : 49° 54' 51\" Nord, 1° 43' 23\" Est","gps":"49° 54' 51\" Nord, 1° 43' 23\" Est","images":["../image/image_80/80_Foucaucourt_1.jpg","../image/image_80/80_Foucaucourt_2.jpg"]},"Consult_chateau_formulaire026b":{"id":"Consult_chateau_formulaire026b","dept":"80","canton":"Ham","commune":"Framerville-Rainecourt","nom":"Framerville","type":"Château","periode":"XVII","histoire":"FRAMERVILLE, François de Collemont s'est marié, en 1596, avec  Renée Scourion. Il eut une confirmation de noblesse par Henri IV, en 1592  Son fils Claude, marié en 1651 à Jeanne de Parisis lui succède, puis le fils de celui-ci, Charles de Collemont , marié en 1681 à Françoise Martin,   c'est lui qui fit construire le château, le fronton portait dit-on les armes des de Collemont. Son fils Jean-Charles, né en 1682, chevalier et lieutenant des maréchaux de Péronne, épousa en 1715 Charlotte de Vendeuil.  Sa nièce Marie-Geneviève du Fossé de Watteville (1718-1764) en hérita, elle se maria en  1750 avec François-Firmin Desfriches-Doria, marquis de Payens, capitaine de cavalerie et seigneur de Cayeux-en-Santerre. André de Biaudos, fils aîné de Stanislas Catherine, né en 1780 marié en 1802 à Alexandrine Françoise de Pons-Renepont ont eu un fils Rémy Léon de Biaudos-Scarisbrick, marquis de Castéja, page du Roi, né en 1805, marié en 1835 à Eliza Margaret Humloke, dont un fils mort-né et un fils naturel. La première guerre mondiale, une fois la paix revenue, la marquise de Castèja renonça à faire renover cette immense demeure dont elle n'avait pas l'usage, mais elle fit restaurer les bâtiments de la ferme voisine ainsi que le long corps de communs qui bordait la cour d'honneur.  Le château de Framerville a appartenu ensuite à Mme Courtier.","architecture":"FRAMERVILLE, la seigneurie  appartenait à la fin du XVIe siècle à la famille de Festard, qui la vendit en 1610 à François de Collemont, grenetier de la ville d'Amiens, anobli par le roi Henri IV en 1592.\nÀ François de Collemont, succède comme seigneur de Framerville,  seigneur de Cayeux-en-Santerre. De cette union est issue une fille, Marie Élisabeth Françoise Desfriches Doria, dame de Framerville, mariée en 1779 avec Stanislas Catherine de Biaudos, comte de Castéja. Framerville échut à l'aîné de leurs deux fils, André de Biaudos de Castéja, qui fut maire de Framerville, mais vendit le château en 1815 à son frère, François de Biaudos de Castéja. Ce dernier épousa en 1819 Caroline de Bombelles (1797-1861), l'une des enfants que Marc de Bombelles, alors évêque d'Amiens, avait eu alors qu'il était marié, avant d'entrer en religion. Marc de Bombelles séjourna alors fréquemment à Framerville, chez sa fille et son gendre, jusqu'à sa mort, en 1822. À la mort de François de Biaudos de Castéja, sans postérité, en 1862, le château de Framerville échut à son neveu Rémi Léon de Biaudos, marquis de Castéja, qui le vendit en 1866. Décédé en 1899, Rémi Léon de Biaudos de Castéja laissa un fils, Emmanuel Alvar de Biaudos de Castéja, qui racheta en 1908 le château de Framerville, mourut en 1911, et le laissa à l'un de ses enfants.","habitants":"Famille de Charles de Collemont\"","divers":"Château de Framerville; GPS : 49° 51' 41\" Nord, 2° 42' 50\" Est","gps":"49° 51' 41\" Nord, 2° 42' 50\" Est","images":["../image/image_80/80_Framerville_1.jpg"]},"Consult_chateau_formulaireaa31":{"id":"Consult_chateau_formulaireaa31","dept":"80","canton":"Rue","commune":"Francières","nom":"Francières","type":"Château","periode":"XVII","histoire":"FRANCIERES; fut construit en 1620, par un conseiller du Roi Henri III. Il est composé de pierre calcaire et recouvert d'ardoise. Le château de Francières eut plusieurs seigneurs : En 1542, Jacques d'Aoust, écuyer, est le seigneur du village. Il fut mayeur d'Abbeville. Dès le début du XVIIe siècle, Charles Paschal rachète la vicomté de la Quinte, il y meurt le 25/10/1625. Charles Destailleurs de Chantereine réunit les seigneuries de Francières et de la Quinte en 1678. Benoit Alexandre de Monchy, seigneur du lieu, fut sénéchal du Ponthieu en 1747. Les comtes des Essars succèdèrent ensuite aux de Monchy. Racheté en 2012, par Bernard Rouyer et Dragos Moldoveanu, ses nouveaux propriétaires, ceux-ci ont financé les travaux les plus urgents.","architecture":"FRANCIERES, le château de Francières espère une aide financière, de la Mission Bern, pour ses travaux de restauration. La bâtisse du XVIIe siècle a été retenue, par la Fondation du Patrimoine, comme 100 sites en France.  Le château présente un long corps de bâtiments de 75m, construit en craie, avec deux courtes ailes symétriques, côté parc et une aile asymétrique côté cour.","habitants":"Famille de Charles Paschal \"","divers":"Château de Francières   GPS : 50° 04' 23\" Nord, 1° 56' 33\" Est","gps":"50° 04' 23\" Nord, 1° 56' 33\" Est","images":["../image/image_80/80_Franci%c3%a8res_1.jpg","../image/image_80/80_Franci%c3%a8res_2.jpg"]},"Consult_chateau_formulairee1b4":{"id":"Consult_chateau_formulairee1b4","dept":"80","canton":"Moreuil","commune":"Fransart","nom":"Fransart","type":"Château","periode":"XIX","histoire":"FRANSART,  était un fief important de la châtellenie de Roye. En 1195, Baudouin de Fransart le possède. La seigneurie passe aux XIIIe et XIVe siècles dans la famille de Hangest, seigneurs de Davenescourt, puis à la branche puînée des seigneurs de Genlis. En 1367, le fief de Fransart, tenu par Aubert de Hangest, consistait en \"une demeure, cour, jardin, four, grange dîmière, terres et bois et droits seigneunaux\". En 1499, Hélène de Hangest apporte la terre à Arthus Gouffier. Elle sera rachetée en 1561 par Louis d'Ongnies, comte de Chaulnes. En 1770, elle est la propriété de Charles des Fossez dit le comte de Fransart, décédé en 1825. La proximité de Roye entraîna très souvent la ruine du bourg et du château. En 1591 le château est pillé par l'armée d'Henri IV qui assiège Roye.","architecture":"FRANSART; Reconstruit, le village ainsi que le château sont rasés lors de l'avancée allemande de 1918. L'édifice reconstruit après la première guerre mondiale, près de l'église, est une grosse demeure en brique et pierre. Il s'agit d'un corps de bâtiment rectangulaire, à deux niveaux sous un toit à croupes en ardoise, accosté d'un pavillon plus élevé, et qui présente, à chaque niveau, quatre baies en cintre surbaissé; la base du toit est percée de lucarnes en pierre. Le pavillon, plus élevé et couvert d'ardoises, ne présente qu'une travée. Le corps de logis est précédé, vers la cour, d'une terrasse bordée par une balustrade.","habitants":"Famille de  Charles des Fossez\"","divers":"Fransart_GPS : 49° 46' 05\" Nord, 2° 46' 27\" Est","gps":"49° 46' 05\" Nord, 2° 46' 27\" Est","images":["../image/image_80/80_Fransart_1.jpg"]},"Consult_chateau_formulaire5799":{"id":"Consult_chateau_formulaire5799","dept":"80","canton":"Flixecourt","commune":"Fransu","nom":"Fransu","type":"Château","periode":"XVIII","histoire":"FRANSU, Il est délaissé avant le XVIe siècle par les seigneurs qui n'y résident guère, mais conserve sa ferme seigneuriale. Détruit à la Révolution puis démantelé dans les premières années du XIXe siècle, il en subsiste seulement la muche (carrière souterraine) creusée à son emplacement au XVIe ou au XVIIe siècle. Comme l'indique la date de 1670 inscrite sur un mur extérieur de l'actuel logis, un premier édifice aurait été érigé à cette époque, à l'initiative de Marie-Claude de Monchy, épouse de Charles, marquis de Sailly. Par acte passé devant maître Lemoine, notaire à Paris, le 25 juillet 1737, Louis, marquis de Sailly, vend la seigneurie de Fransu à Adrien Jacques Wignier, chevalier, capitaine d'infanterie et contrôleur des guerres, qui ajoute à son patronyme le nom de sa nouvelle terre. L'acte de vente ne mentionnant pas de maison seigneuriale, c'est  le nouveau seigneur qui fait aménager peu après le corps de bâtiment de 1670 pour y établir une résidence, en y faisant notamment ajouter un pavillon au sud. La modestie de la construction indique une maison des champs assez caractéristique de l'époque, seulement accompagnée de deux ailes de communs bordant la cour. Au début du mois de juillet 1791, le château est saccagé et incendié en partie. En 1809, le domaine passe par héritage à Armand Douville, écuyer, officier de cavalerie et futur aide de camp du prince de Croÿ, qui relève à son tour le nom de Franssu. Entre 1833 et 1845, il fait ajouter un avant-corps central au corps de logis, qui est diminué à son extrémité nord pour le dégager de l'aile des communs en retour d'équerre sur la cour, et y faire construire un pavillon symétrique à celui du sud.  En 1854, est mentionnée une construction nouvelle et en 1862 un agrandissement de construction (matrice des propriétés foncières), château et communs. De fait, sous le Second Empire, de nombreux aménagements du domaine sont réalisés pour Henri-Armand Douville de Franssu, membre fondateur de la Société des agriculteurs de France.","architecture":"FRANSU,c'est à cette époque qu'un avant-corps central est ajouté au corps de logis, qui est diminué à son extrémité nord pour le dégager de l'aile des communs en retour d'équerre sur la cour, et où est construit un pavillon symétrique à celui du sud,  et les deux ailes de communs remaniées et agrandies. Une écurie caractéristique des bâtiments d'accompagnement de style régionaliste, proposés par les traités d'architecture contemporains,   le corps de logis principal s'élève au fond d'une cour fermée par une grille en fer forgé. Il est formé d'un rez-de-chaussée surélevé surmonté d'un étage de comble. Un avant-corps de calcaire à trois travées marque le centre de la façade. Il est prolongé par un devant de lucarne flanqué d'ailerons à volutes et couronné d'un fronton triangulaire portant les initiales D et F (Douville de Franssu). L'ensemble est construit en brique et pierre, à assises alternées pour le corps de logis principal dont le soubassement est formé d'une assise en damier de brique et silex. Sur les pavillons latéraux, seuls les encadrements de baies et les chaînes d'angle sont en calcaire. Le pignon sud est en calcaire avec soubassement et linteau cintré des baies en brique, alors que le pignon nord est en brique, encadré par des chaînes horizontales et des chaînes d'angle en calcaire. La cour qui précède le château à l'est est flanquée des deux corps de bâtiments bas en brique et pierre abritant les communs. Le bâtiment sud borde également la cour de l'ancienne ferme du château, très remaniée. Celui du nord donne sur un potager clos de mur, complété dans l'angle nord-ouest par un pavillon en rez-de-chaussée dit maison du jardinier. De nombreux bâtiments d'exploitation en tôle bordent la rue Madame. Le jardin, qui prolonge le corps de logis à l'ouest, ne se présente plus que sous la forme d'une grande pelouse, mais il a conservé sa perspective à travers le bois.","habitants":"Famille de Louis, marquis de Sailly,et   Armand Douville\"","divers":"Fransu  GPS : 50° 06' 33,51\" Nord, 2° 05' 31,42\" Est","gps":"50° 06' 33,51\" Nord, 2° 05' 31,42\" Est","images":["../image/image_80/80_Fransu_1.jpg"]},"Consult_chateau_formulaire2c7d":{"id":"Consult_chateau_formulaire2c7d","dept":"80","canton":"Poix-de-Picardie","commune":"Fresnoy_Andainville","nom":"Fresnoy_Andainville","type":"Châteaux","periode":"XVII-XIX","histoire":"Deux châteaux dans cet article Fresnoy, Lignières et Inval-Boiron.                                                         FRESNOY-ANDAINVILLE  la seigneurie de Fresnoy appartenait, en 1377, à Guillaume Haterel. Vers 1460, elle passa dans la famille de Haucourt, à la suite du mariage de Jeanne de Caumont avec Pierre de Haucourt, écuyer. En furent  propriétaires, la famille Bellengreville au XVIe siècle et, à partir de 1650, les Ternisien qui conservèrent le domaine jusqu'au XIXe siècle. Le château actuel situé près de l'église, au cur de la commune, date du XVIIIe siècle. Il se compose d'un corps de logis tout en longueur, de plan rectangulaire, construit en brique. Son élévation est à deux étages. Des pierres sont insérées dans la façade sud et y dessinent des figures géométriques d'un effet inattendu, ce qui lui confère une certaine originalité. Un pigeonnier carré en galandage,  laissé à l'abandon, s'élève près du château.","architecture":"LIGNIERES  a cinq K.M.à l'ouest  Le château de Lignières, construit au XIXe siècle, a été occupé par le Général Gerhard Garf von Schwerin, commandant la 116ème Panzer division, de la fin mai 1944 au 19 Juillet 1944. En mai 1944, la 116ème division est envoyée dans la Somme et le Général von Schwerin sinstalle dans le château en prévision dun débarquement des armées alliées dans le Pas de Calais. Le 29 Juin 1944 a lieu le bombardement allié qui a pour but de détruire la piste de V-1 de Bernapré, ce jour là, 746 impacts de bombes seront recensés à Lignières. De nombreuses maisons dont le château seront endommagées, il a été rebâti vers 1946 sur le même plan mais selon une architecture plus sobre et moins lourde.                                       A quelques K.M. au sud ouest INVAL-BOIRON  , est un château bâti à Inval-Boiron. Il possède une architecture locale. Il est aussi appelé le château Sanglier ou le manoir de l'Horloge, il est privé, fermé au public.","habitants":"famille Bellengreville \"","divers":"Deux châteaux dans cet article Fresnoy  grav-4    et Lignières grav 2-3.Inval   grav 1                                                    Inval  GPS : 49° 53' 04\" Nord, 1° 44' 54\" Est","gps":"49° 53' 04\" Nord, 1° 44' 54\" Est","images":["../image/image_80/80_Fresnoy_Andainville_1.jpg","../image/image_80/80_Fresnoy_Andainville_2.jpg","../image/image_80/80_Fresnoy_Andainville_3.jpg","../image/image_80/80_Fresnoy_Andainville_4.jpg"]},"Consult_chateau_formulaire79c1":{"id":"Consult_chateau_formulaire79c1","dept":"80","canton":"Friville-Escarbotin","commune":"Friville-Escarbotin","nom":"Friville","type":"Château","periode":"XIX","histoire":"Deux châteaux dans cet article Friville et la Motte.                                              FRIVILLE, ce château abrite aujourdhui la maison de retraite de Friville-Escarbotin-Belloy. Une aile est utilisée pour le musée du Vimeu (Robinetterie et Serrurerie)\nDans cette commune on peut voir ce qui reste du château dEscarbotin \"la tour Montmignon\" cachée derrière léglise et la bibliothèque. Il ne reste plus quun corps de logis tronqué qui rejoint un pavillon quadrangulaire flanqué dune tourelle ronde datant peut-être du XVIe siècle et cachant un escalier.","architecture":"FRIVILLE , château en pierres crayeuses rehaussées de briques, avec un corps principal flanqué dailes saillantes et un avant-corps surélevé au XIXe siècle avec ladjonction dun double fronton. Sur le côté se trouve un colombier trapu, l'un des plus beaux de la région, partiellement visible de la rue, qui a été transformé au XIXe siècle. Il possède l'un des plus beaux pigeonniers de la région. Le château de Frivile était appelé autrefois la \"Maison des Petits\". C'était une maison d'enfants créée par M. les Andrade et Bellomet. \nLA MOTTE  au nord-Est de St-Quentin la Motte  Le château est situé sur un domaine historique du XVIIIe siècle, au coeur d'un parc de douze hectares boisé d'arbres séculaires. Le jardin d'agrément du château de la Motte est inscrit au pré inventaire des jardins remarquables. Le parc possède une allée régulière, un jardin potager et une orangerie.","habitants":"seigneurs locaux\"","divers":"Deux châteaux dans cet article Friville grav 1 et la Motte grav 2-3  GPS : 50° 5' 26\" Nord, 1° 32\" 59\" Est","gps":"50° 5' 26\" Nord, 1° 32\" 59\" Est","images":["../image/image_80/80_Friville_1.jpg","../image/image_80/80_Friville_2.jpg","../image/image_80/80_Friville_3.jpg"]},"Consult_chateau_formulaire55e9":{"id":"Consult_chateau_formulaire55e9","dept":"80","canton":"Gamaches","commune":"Frucourt","nom":"Frucourt","type":"Château","periode":"XVII","histoire":"FRUCOURT, fief d'une  branche cadette de la maison de Forceville.  La seigneurie de Frucourt fut vendue par Jean de Vaux en 1541 à Antoine de Monthomer et qu'en 1678 Marie-Anne de Monthomer épousait Louis de Rouvroy de Saint-Simon, marquis de Sandricourt qui vendra la terre en 1745 à Jacques Morgan.  Il devint la propriété de la famille Morgan au XVIIIe siècle, racheté par Jean-Baptiste Morgan. Les Morgan firent restaurer et embellir le château de Frucourt au XVIIIe et au XIXe siècle il  fut racheté, en 1920, par Philippe de Forceville, descendant de la soeur du constructeur du château.   Éléments protégés MH : les façades et les toitures ; le hall d'entrée avec son décor de gypseries ; l'escalier avec sa rampe en fer forgé ; les pièces suivantes avec leur décor Les façades et les toitures du pigeonnier : inscription par arrêté du 6 juin 1980. L'ensemble des bâtiments de la ferme et le parc ordonnancé : inscription par arrêté du 30 novembre 1995.","architecture":"FRUCOURT, la construction du château de Frucourt date du XVIIe au XVIIIe siècle. Un château existait dès le XIIIe siècle dont il subsiste les soubassements des tours des angles Nord-Ouest et Nord-Est qui cantonnent la façade côté jardin. Le château actuel daterait des années 1635 comme en témoignent le plan côté cour, composé d'un corps de logis et de deux courtes ailes en retour d'équerre et l'élévation de la façade côté jardin avec ses trumeaux de brique et le double bandeau de pierre entre les étages. Les travaux d'embellissements du château au XVIIIe siècle modifièrent son aspect par ladjonction, côté cour, de pavillons polygonaux coiffés de toits à la Mansart aux deux extrémités des ailes en retour d'équerre. Côté jardin, fut ajouté un avant-corps à trois pans percé douvertures en plein cintre. Le château de Frucourt est inscrit aux M.H.","habitants":"Famille Morgan \"","divers":"Château de Frucourt  GPS : 49° 59' 47\" Nord, 1° 48' 36\" Est","gps":"49° 59' 47\" Nord, 1° 48' 36\" Est","images":["../image/image_80/80_Frucourt_1.jpg","../image/image_80/80_Frucourt_2.jpg"]},"Consult_chateau_formulaire3217":{"id":"Consult_chateau_formulaire3217","dept":"80","canton":"Gamaches","commune":"Gamaches","nom":"Gamaches","type":"Château","periode":"XIII","histoire":"GAMACHES,   le premier seigneur de Gamaches fut Guillaume II  en 1355, il sert dès 1410 dans louest royal sous le comte de La Marche, puis Maître-Veneur (ou Grand-Veneur) et gouverneur de la Vénerie en décembre 1410. Il est ensuite conseiller et chambellan de Charles VI, prisonnier à Azincourt, il est Bailli de Rouen vers 1417. Propriété composée d'un ensemble de bâtiments divers : deux tours rondes en pierre subsistent de l'ancien château, l'une en ruine détruite en 1500 par les Anglais, l'autre très remaniée au XIXe siècle, les bâtiments modernes, accolés à la tour entière, un portail, du XVIIe siècle.","architecture":"GAMACHES, la construction du château de Gamaches date du XIIe et XIIIe siècle. C'était une forteresse. L'une des tours a été détruite en 1500, l'autre a été remaniée au XIXe siècle. Elles font l'objet d'une inscription aux M.H. depuis le 16/12/1986. Les bâtiments forment un ensemble disparate, deux tours rondes subsistent du château médiéval, l'une est en ruine, l'autre a été très remaniée au XIXe siècle. Le portail date du XVIIe siècle selon toute vraisemblance. Des bâtiments sans véritable style ont été accolés à la tour, remaniée au XIXe siècle. \nÉléments protégés MH : les deux tours : inscription par arrêté du 16 décembre 1986.","habitants":"comte de La Marche\"","divers":"Gamaches GPS : 49° 59' 03,24\" Nord, 1° 33' 27,36\" Est","gps":"49° 59' 03,24\" Nord, 1° 33' 27,36\" Est","images":["../image/image_80/80_Gamaches_1.jpg"]},"Consult_chateau_formulaire25d4":{"id":"Consult_chateau_formulaire25d4","dept":"80","canton":"Ailly-sur-Noye","commune":"Grivesnes","nom":"Grivesnes","type":"Château","periode":"XVI","histoire":"GRIVESNES  Louis de Goussencourt fit ériger le corps de logis principal du château, entre 1611 (date de son mariage avec Catherine Le Sellier, fille de Jean, payeur de la Gendarmerie de France et 1640. Agrandi au XVIIIe, le château appartenait à la fin de l'Ancien Régime à Louis de Goussencourt, comte de Grivesnes, qui ne put s'opposer à la confiscation de la propriété, en raison du départ pour l'émigration de son fils Louis-Henri. Il obtint cependant la levée des scellés en l'An II et, lors des adjudications de 1793 et 1794, le château fut vendu comme bien national. Un habitant de Grivesnes, Roch Théry, dont les aïeux (venus de l'Arrageois) résidaient depuis plus de deux siècles dans le village, racheta une partie des terres et le moulin, qu'il rétrocéda ensuite à ses propriétaires. La propriété a été vendue, en 1899, par le vicomte Urbain Dominique de Beaurepaire de Louvagny à Maitre Lenain, un notaire amiénois.","architecture":"GRIVESNES, construction entre 1611 et 1640.  Durant le printemps 1918, le plateau de Grivesnes constitua l'un des principaux enjeux de la Bataille de Picardie, déclenchée le 21 mars entre Arras et Saint-Quentin par les troupes de Ludendorff. Les assauts les plus violents de la garde Impériale se déroulèrent entre le Vendredi Saint et le jour de Pâques du 29 au 31 mars. La résistance du 350ème régiment d'infanterie et du 19ème bataillon de chasseurs à pied permit, début avril, de stabiliser le front jusqu'au 9 mai lorsqu'une contre offensive de l'armée française repoussa la ligne des tranchées au devant du parc du château de Grivesnes. Les combats eurent raison de la partie est de l'édifice qui datait du XVIIe siècle lorsque les Goussencourt étaient seigneurs du lieu. En revanche le corps de logis en briques avec chaînages, harpes, fronton et lucarnes de pierres élevé au XIXe siècle dans le goût du XVIIe siècle put être restauré.","habitants":"Famille de Louis de Goussencourt\"","divers":"GPS : 49° 41' 23,38\" Nord, 2° 28' 5,31\" Est","gps":"49° 41' 23,38\" Nord, 2° 28' 5,31\" Est","images":["../image/image_80/80_Grivesnes_1.jpg"]},"Consult_chateau_formulairec53e":{"id":"Consult_chateau_formulairec53e","dept":"80","canton":"Poix-de-Picardie","commune":"Saint-Germain-sur-Bresle","nom":"Guémicourt","type":"Manoir","periode":"XVI","histoire":"GUEMICOURT, situé au confluent de la Bresle et de la Méline,  était en Normandie et fut rattaché au district d'Amiens. au XVe siècle fief tenu par la famille de saint-Rémy  et rentré par alliance dans la famille de Monsures Jean de Monsures est sieur de Guémicourt en 1501, cette famille conservera la terre jusqu'en 1628, à la mort  d  d'Antoine de Monsures  en 1620 date à laquelle Nicolas d'Arandel devient sieur de Guémicourt et de la feuille,  puis le domaine est vendu à un cousin  en 1747 à Godefroy Louis d'Estrades lieutenant des armées du roi gouverneur de Gravelines et de Dunkerque, son fils prénmmé  aussi Godefroy-Louis meurt sans héritier en 1769 l'héritiere la comtesse de Turenne se défait de Beaucamps et de Guémicourt toute deux acquises en 1778 par Louis Sanson de Frières écuyer, conseiller au présidial d'Abbeville. D'après le dictionnaire historique et archéologique de la Picardie, sa construction serait l'uvre de la famille de Monsures au début du XVIe siècle, mais c'est l'écusson de la famille d'Arandel qui se trouve au-dessus de la porte d'entrée.","architecture":"GUEMICOURT   de brique et de pierre, caractéristique de la tradition picarde est composé de deux bâtiments perpendiculaires entre eux, au XVIe siècle construction de l'aile gauche reliés par une tour octogonale hors uvre aux angles appareillés de chaînages en harpe dans laquelle se trouve un escalier qui présente une grande ressemblance avec celles des manoirs de Touraine, en particulier celui de Plessis-lez-Tours commencé par  Louis XI et ceux de Jallanges et de Luynes qui datent des années 1485. Nous avons remarqué aussi combien avec ses toits en bâtière et ses murs pignon en \"pas de moineaux\" le manoir de Guémicourt ressemble à celui d'Ablaincourt aujourd'hui disparu, qui se trouvait, lui, à l'autre extrémité du département dans le Santerre.","habitants":"Famille de Jean de Monsures\"","divers":"Château à Guémicourt","gps":"","images":["../image/image_80/80_Gu%c3%a9micourt_1.jpg","../image/image_80/80_Gu%c3%a9micourt_2.jpg","../image/image_80/80_Gu%c3%a9micourt_3.jpg"]},"Consult_chateau_formulaire6c23":{"id":"Consult_chateau_formulaire6c23","dept":"80","canton":"Péronne","commune":"Villers Carbonnel","nom":"Happlincourt","type":"Forteresse","periode":"XIII","histoire":"HAPPLINCOURT,  l'existence d'un manoir à cet endroit est attestée en XIIIe siècle. En 1415, le sire d'Happlincourt est tué à Azincourt et dans les décennies suivantes son manoir est l'objet de luttes entre les compagnies françaises et bourguignonnes. C'est dans ce château, appartenant à Nicolas d'Amerval, qu'aurait été signé, le 4 juin 1576, le pacte de Péronne, instituant la Sainte Ligue, en réponse à la nomination par le Roi du prince de Condé, protestant, comme gouverneur de la ville.\nÉléments protégés MH : les vestiges du château d'Happlaincourt : inscription par arrêté du 24 avril 1926.","architecture":"HAPPLINCOURT,  La première guerre mondiale réduisit à l'état de ruines ce château dont l'ouvrage d'entrée se mire encore dans le tour d'eau qui ceinture la motte. Des bâtiments qui étaient répartis autour d'une cour rectangulaire, seul subsiste l'ouvrage d'entrée découronné et éventré. Deux tours semi-circulaires encadrent une porte charretière en tiers-point et une porte piétonne ou venaient s'encastrer les tabliers des ponts-levis. Les rainures qui abritaient leurs flèches sont encore visibles.  Les tours en pierres de taille s'élèvent sur une base talutée en grès percée de deux canonnières.","habitants":"Famille de Nicolas d'Amerval, \"","divers":"Happlincourt  GPS : 49° 52' 18\" Nord, 2° 55' 14\" Est","gps":"49° 52' 18\" Nord, 2° 55' 14\" Est","images":["../image/image_80/80_Happlincourt_1.jpg","../image/image_80/80_Happlincourt_2.jpg","../image/image_80/80_Happlincourt_3.jpg"]},"Consult_chateau_formulaire3298":{"id":"Consult_chateau_formulaire3298","dept":"80","canton":"Gamaches","commune":"Maisnières","nom":"Harcelaines","type":"Château","periode":"XIX","histoire":"HARCELAINES Le château d'Harcelaines est la propriété de la famille Lardemelle depuis plus de deux siècles. Il a été repris il y a 20 ans par Vincent et Fabienne de Lardemelle qui ont restauré les anciens bâtiments de ferme de la propriété.  Quant au potager, cest le royaume de Vincent. L'ensemble de trois hectares comporte un sous-bois avec des ilots d'arbustes et de vivaces, une allée d'hortensias, un green de croquet anglais, un jardin de fleurs sauvages, un jardin aquatique sur une île et le long de la rivière de la Vimeuse et des mixed-borders composés de vivaces et d'annuelles.  Vincent et Fabienne sont installés toute l'année à Harcelaines. Ils ont créé et dirigent une agence spécialisée dans la fabrication de nuanciers qui est située dans les anciens bâtiments de ferme.  Le château d'Harcelaines a toujours été un lieu d'accueil, pour la famille et les amis. Pour perpétuer cette tradition, Vincent et Fabienne proposent une chambre d'hôte suite de charme Bali et deux appartements Le Mirus et Le Chapo.","architecture":"HARCELAINES   Le château d'Harcelaines est la propriété de la famille Lardemelle depuis plus de deux siècles. Il a été repris il y a 20 ans par Vincent et Fabienne de Lardemelle qui ont restauré les anciens bâtiments de ferme de la propriété. le château d'Harcelaines construit au XIXe siècle, \"brique et pierre\" est adossé à une église du XVIe siècle. A Harcelaines, le jardinage est une passion de famille. Henri de Lardemelle y a rassemblé hydrangea, rhododendron, bruyères, hostas et une collection de fougères dans cet ancien pré à moutons traversé par la rivière Bresle.  Le jardin a été totalement revu par le père de Vincent, Henri de Lardemelle, passionné de jardin et collectionneur de plantes. Ce grand jardinier a modifié l'ensemble du design du parc qui a l'origine était essentiellement composé de pâtures pour les animaux de la ferme.","habitants":"Famille de   Henri de Lardemelle \"","divers":"Château d'Harcelaines                           GPS : 50° 00' 58\" Nord, 1° 37' 02\" Est","gps":"50° 00' 58\" Nord, 1° 37' 02\" Est","images":["../image/image_80/80_Harcelaines_1.jpg","../image/image_80/80_Harcelaines_2.jpg","../image/image_80/80_Harcelaines_3.jpg"]},"Consult_chateau_formulaire09ba":{"id":"Consult_chateau_formulaire09ba","dept":"80","canton":"Flixecourt","commune":"Havernas","nom":"Havernas","type":"Château","periode":"XVIII","histoire":"HAVERNAS , le premier seigneur  est Antoine de Saint-Delis, également seigneur d'Heucourt, Allery et Bernapré, lieutenant général au bailliage et mayeur d'Amiens en 1524. Robert de Saint-Delis, gouverneur d'Abbeville, converti au protestantisme, est tué avec son fils en 1562 par les Abbevillois révoltés. À partir de 1569, sa veuve Suzanne  accueille en sa demeure d'Havernas un lieu de culte protestant. La famille de Saint-Delis est contrainte d'émigrer après la révocation de l'édit de Nantes en 1688. Ils seraient donc dus à la famille de Saint-Delis, peut-être à Madeleine Arnault, veuve de Robert de Saint-Delis. L'étable et la remise agricole en brique, quant à eux, sont sans doute antérieurs de peu au tracé du plan cadastral de 1832, sur lequel ils apparaissent comme les précédents bâtiments. La demeure est surélevée d'un étage carré et couverte d'un toit à croupes avant 1844. Après la mort de son épouse, Clémence de Calonne d'Avesnes, en 1851, le vicomte Édouard Marie Augustin de Brandt, neveu de Jean-Baptiste Marie François-Xavier de Mons, fait élever à l'ouest du château une chapelle funéraire de style néo-gothique. Les travaux les plus importants sont réalisés à l'initiative du vicomte Charles Marie René de Brandt, également maire de la commune d'Havernas. En 1870, le jardin et le parc du château sont aménagés sur les plans des jardiniers et paysagistes boulonnais Quéhen et fils. Le corps de logis à l'est de la demeure est détruit afin de permettre l'agrandissement et le remaniement de cette dernière entre 1875 et 1882, en style néo Louis XIII, d'après les plans des architectes Victor et Paul Delefortrie, qui ont déjà donné les plans de reconstruction de l'église en 1872. La distribution du corps central du logis, est harmonisée. Il est actuellement toujours habité par les descendants d'Édouard de Brandt.","architecture":"HAVERNAS , le sculpteur Hesse réalise, entre 1876 et 1882, le décor extérieur en pierre (notamment fronton et lucarne), la sculpture du lambris de la salle à manger. Déserté par ses propriétaires durant l'exode de 1940, le château est réquisitionné par l'occupant allemand qui y installe un hôpital militaire. L'histoire architecturale du château n'est pas connue pour l'époque moderne, mais l'aspect révélé par l'aquarelle du début du XIXe siècle, par analogie avec certains manoirs en brique de la région, permet de dater le logis  du milieu du XVIIe siècle, comme peut-être les anciens communs et le bûcher, également construits en pierre de taille, qui bordent toujours le tracé de l'ancienne cour. La propriété, ceinte d'un mur de brique, est bordée à l'est par la route de Flesselles, à l'ouest par la route de Vignacourt et au sud par le bois de Havernas qui prolonge le parc du château, dans l'axe duquel sont situés un portail et une allée forestière. L'entrée du château, sur la place de lÉglise, est formée d'une demi-lune avec portail en fer forgé flanqué de deux portes piétonnes. Elle est située dans l'axe du logis, construit au fond de l'ancienne cour qui est bordée de communs et de dépendances. La propriété est complétée d'un vaste parc qui se déploie au sud et à l'est. Celui-ci a conservé en grande partie ses dispositions de 1870, les allées entourant le logis sont gravillonnées, celles qui se déploient au sud sont simplement enherbées. La partie Est forme aujourd'hui une vaste prairie ponctuée de quelques massifs d'arbres. La demeure comprend un soubassement et deux niveaux sous un étage de comble. Le corps de logis initial à cinq travées ordonnancées, couvert d'un toit d'ardoise brisé à croupes, est flanqué de deux ailes perpendiculaires à deux travées formant avant-corps sur la façade antérieure, mais en très léger retrait sur la façade sur jardin. Devant la façade antérieure, entre les avant-corps des deux ailes, est établie une terrasse au niveau du rez-de-chaussée surélevé, accessible par un degré rectangulaire et bordée d'un mur-bahut que surmontait à l'origine une balustrade.","habitants":"le vicomte Édouard Marie Augustin de Brandt,\"","divers":"Le château d'Havernas                           GPS : 50° 02' 14\" Nord, 2° 14' 12\" Est","gps":"50° 02' 14\" Nord, 2° 14' 12\" Est","images":["../image/image_80/80_Havernas_1.jpg"]},"Consult_chateau_formulaire6c32":{"id":"Consult_chateau_formulaire6c32","dept":"80","canton":"Corbie","commune":"Ribemont sur ancre","nom":"Heilly","type":"Château","periode":"XVIII","histoire":"HEILLY, Le seigneur d'Heilly, hanté par le château de Versailles, consacra sa fortune à vouloir faire de son château le plus beau de la province. Il a été en partie détruit et transformé en carrière de pierre après sa vente en 1848. Les dépendances du château, qu'il s'agisse en particulier de la ferme, de la maison du portier avec son toit à la Mansart, de celle du jardinier ou du régisseur, existent toujours et sont dans l'ensemble bien conservées, elles datent, pour la plupart, du XVIIIe siècle, et sont le plus souvent en pierre (sauf la maison du jardinier-chef qui est en brique et pierre) se trouvent dans le village d'Heilly où elles témoignent, à l'ombre des ruines du château, du prestige de ce petit Versailles picard.","architecture":"HEILLY, château féodal réaménagé en 1840 par l'architecte Contant d'Ivry qui construisit un corps de logis de style classique et conçut entièrement les jardins, le parc et le canal. Éléments protégés MH : le château, c'est-à-dire les vestiges et sa terrasse supérieure, l'orangerie, son parterre et les rampes d'escaliers, le boulingrin, la basse-cour primitive et le canal : inscription par arrêté du 9 juillet 2001.","habitants":"chatelain local \"","divers":"Le château de Heilly                           GPS : 49° 57' 3,16\" Nord, 2° 32' 5,28\" Est","gps":"49° 57' 3,16\" Nord, 2° 32' 5,28\" Est","images":["../image/image_80/80_Heilly_1.jpg"]},"Consult_chateau_formulairead64":{"id":"Consult_chateau_formulairead64","dept":"80","canton":"Corbie","commune":"Henencourt","nom":"Henencourt","type":"Châteaux","periode":"XVII-XVIII","histoire":"deux châteaux dans cet article; Hennecourt et Senlis le sec.             HENENCOURT, cette vaste  demeure construite peu après 1636  en partie détruiteau cours de la première guerre mondiale et dut être restauré en brique et pierre sous Louis XIV appartenait aux Lameth, une vieille famille de la noblesse locale. Gagnés aux idées libérales après la guerre dIndépendance des Etats Unis, Alexandre et Chartes Lameth devinrent tour à tour présidents de lAssemblée constituante. Le péristyle à six colonnes ioniques et fronton armorié, de style néo-classique, à été rajouté au milieu du XVIIIe siècle. L'édifice a perdu de sa splendeur, une aile a été détruite pendant la Grande Guerre, causé avant tout par l'effondrement d'une sape aménagée par les Anglais, suivi de l'explosion d'une bombe et d'un violent incendie. La grille d'entrée provient du château d'Heilly, ce château est depuis plusieurs siècles dans la famille de Lameth. Un vaste parc, limité par des sauts de loup habilement ménagés, était précédé d'un jardin à la Française au plan en étoile, avec charmilles et bassins ornés d'uvres sculptées. La tradition veut que ce soit André Le Nôtre en personne qui ait dessiné ce jardin que l'on appelait le \"petit Versailles picard\" et dont on ne devine plus aujourd'hui que les grandes lignes.\nÉléments protégés MH : le château d'Hénencourt en totalité, le pigeonnier et le parc : classement par arrêté du 28 décembre 1984. La marquise de Lameth en est propriétaire.","architecture":"HENENCOURT fut construit aux XVIIe et XVIIIe siècles. La grille de la cour d'honneur fut exécutée au XVIIIe siècle par le ferronnier d'art Jean Veyren. La façade côté du parc, comporte un avant-corps du XVIIIe siècle, autrefois situé au milieu de cette façade, aujourd'hui sur son côté droit, par suite de la destruction d'un peu moins de la moitié du château, après la première guerre mondiale. Le château d'Hénencourt est classé aux M.H. depuis 1984. C'est un château privé, fermé au public, qui se trouve non loin de la commune d'Albert.                                                                                                           SENLIS le Sec,  beau petit château construit au XIXe siècle en brique et pierre avec orangerie et parc. Lintérieur de l'église de Senlis le Sec, placée sous le vocable de Saint-Martin, est remarquable, il est en cours dinscription à linventaire supplémentaire du patrimoine au titre des monuments historiques. De magnifiques vitraux éclairent les murs peints en rose et décorés de frises.","habitants":"Famille de Lameth\"","divers":"Henencourt grav 1-2  GPS : 50° 00' 12\" Nord, 2° 33' 55\" Est                                    Senlis le sec grav 3","gps":"50° 00' 12\" Nord, 2° 33' 55\" Est","images":["../image/image_80/80_Henencourt_1.jpg","../image/image_80/80_Henencourt_2.jpg","../image/image_80/80_Henencourt_3.jpg"]},"Consult_chateau_formulairef135":{"id":"Consult_chateau_formulairef135","dept":"80","canton":"Roye","commune":"Herly","nom":"Herly","type":"Château","periode":"XVII","histoire":"HERLY,  seigneurie très ancienne relevant de la châtellenie puis du marquisat de Nesle. En 1153, Jean de Herly donne des biens à l'abbaye Saint Augustin de Thérouanne; en 1215, Oudart de Rellye (Herly) est vassal de Jean de Nesle. A la fin du XIVe siècle, Catherine de Luxembourg, fille de Jean de Herly, comte de Saint Pol, est dame de Herly. En 1613, Louis Le Carlier, gouverneur d'Étaples, rachète la terre d'Herly; sa famille restera en possession du domaine jusqu'au début du XIXe siècle. Le château actuel, à deux niveaux, en brique et pierre, a été rebâti sur l'emplacement de l'ancien détruit pendant la 1ère guerre mondiale. La famille de Bouteville, propriétaire, décida de raser les murs et de reconstruire à la place la demeure actuelle. Elle reprend le plan traditionnel de ce type d'édifice : un bâtiment principal à trois corps, un corps de logis et deux pavillons latéraux en léger ressaut. Les communs, détachés du château, forment ailes de part et d'autre de la cour d'entrée. Les pavillons n'ont qu'une baie en plein cintre au premier niveau et deux au second; des lucarnes se dressent à la base du toit. Chaque élément du bâtiment principal possède sa couverture propre, un toit à croupes très aigu, en ardoise, terminé par des girouettes et des épis de faîtage. Le parc est encore très important et l'allée d'arbres qui mène au château a été replantée après la guerre.","architecture":"HERLY, Mort sans postérité 5 ans plus tard, il laissa le domaine à son frère Philippe, auquel succéda son neveu Louis. Au XVIIe siècle, on édifia sur un côteau proche du village, un nouveau château en brique et pierre.  Ce dernier lieutenant de chevau-légers, épousa en 1648 Madeleine Brunier, il mourut en 1671 laissant 4 fils, lieutenants-colonels des armées royales.  Les deux premiers furent tués en opérations, le troisième mourut en 1735 au château d'Herly, quant au dernier, Salomon vicomte de Trosly, il épousa en 1709 Marguerite Trinquant et en eut 6 enfants, dont Jacques-Nicolas, seigneur d'Herly et mousquetaire du Roi, il épousa en 1738 Louise-Olympe de Béry d'Esserteaux.  Né en 1740, Louis-Nicolas Le Carlier d'Herly, page du Roi en sa grande écurie à 17 ans, maréchal de camp en 1791, il fut incarcéré à Roye pendant la Terreur et libéré sur l'intervention des habitants du village.  Le dernier comte d'Herly, qui semblait avoir préservé l'essentiel de sa fortune, devint maire sous l'Empire, et du connaître sous la Restauration de graves difficultés financières, le domaine fut mis en vente. L'acquéreur fut Robert de Bouteville, représentant d'une famille notable du Santerre  anoblie par Louis XVIII, et ancêtre de l'actuel propriétaire.  Endommagé par l'artillerie puis dévasté par le feu au cours de la guerre de 1914-1918, le château fut jugé irréparable et ses ruines furent abattues. Georges de Boutteville, marié avec Françoise Boudoux d'Hautefeuille, le fit remplacer par la demeure actuelle, élevée entre 1923 et 1925 sur les plans des architectes Paul et André Schroeder.  Il décèdera en 1972 au château de Fransart.","habitants":"Famille de  Louis-Nicolas Le Carlier d'Herly\"","divers":"GPS : 50° 07' 29\" Nord, 1° 52' 05 Est","gps":"50° 07' 29\" Nord, 1° 52' 05 Est","images":["../image/image_80/80_Herly_1.jpg","../image/image_80/80_Herly_2.jpg"]},"Consult_chateau_formulaire57e1":{"id":"Consult_chateau_formulaire57e1","dept":"80","canton":"Abbeville","commune":"Caours","nom":"Heure_Caours","type":"Château","periode":"XVIII","histoire":"HEURE,  manoir édifié en brique et pierre  qui a conservé une grande authenticité dans son élévation et dans son décor. Certains éléments de la ferme seigneuriale qui en dépendaient, subsistent et en particulier le colombier quadrangulaire. Cheminée en brique, avec colonnes engagées et appareillage en épi. Éléments protégés MH : les façades et les toitures du manoir : inscription par arrêté du 10 novembre 1994.","architecture":"Le petit château : ce château ou plutôt Maison de Maître date du milieu du XIXe siècle. Cette demeure privée située 7, rue du sac appartient à Monsieur HURE vieille famille de CAOURS. Son architecture est de style balnéaire (en rive du toit, bois sculpté.  Le château fut occupé par les allemands pendant la dernière guerre mondiale. Son immense    parc fut notamment utilisé pour réaliser des essais de transmission.\nLe château, il fut construit au XVIIe ou au XVIIIe siècle par Monsieur de   Freytag, ancien maire dAbbeville puis de Caours. Il est caractérisé par une intéressante    architecture de style balnéaire.Il est aujourdhui la propriété des descendants de Monsieur Flandrin En 1933, un moulin était utilisé pour la fabrication de brouettes.  Cette demeure fut également occupé par les allemands jusquen 1945. Cest dailleurs au cours de cette période (juin 1943) quun Messerschmidtt allemand sest écrasé dans cette  propriété.","habitants":"Monsieur de   Freytag\"","divers":"GPS : 50° 07' 29\" Nord, 1° 52' 05 Est","gps":"50° 07' 29\" Nord, 1° 52' 05 Est","images":["../image/image_80/80_Heure_Caours_1.jpg"]},"Consult_chateau_formulaire66b2":{"id":"Consult_chateau_formulaire66b2","dept":"80","canton":"Poix-de-Picardie","commune":"Hornoy Le Bourg","nom":"Hornoy","type":"Châteaux","periode":"XVII-XVIII","histoire":"deux châteaux dans cet article, Hornoy et Sélincourt.                                                                                                                                                                   HORNOY, la seigneurie d'Hornoy fut vendue en 1713 par François de la Roche Fontenille à Nicolas Joseph de Dompierre, époux en troisièmes noces de Marie Elisabeth Mignot, nièce de Voltaire. La terre passa ensuite dans la famille de Glos qui la possède encore aujourd'hui. C'est à l'architecte parisien, Jean-Jacques Huvé, que les propriétaires ont fait appel pour construire le château d'Hornoy, ce qui explique son originalité aussi bien dans son plan que dans son élévation, celle-ci très simple; sur chaque façade principale un avant-corps en plerre, appareillé à refends et légèrement saillant, marque l'axe de la construction qui a trois étages: le rez-de-chaussée au-dessus d'un entresol, le premier étage et le second en attique, l'ensemble étant couvert par un toit en terrasse.                                   La pierre est employée également aux angles de la construction et en chaînages rectilignes autour des ouvertures, le reste du bâtiment étant en brique. Avec son plan carré, sa décoration sobre obtenue par la seule juxtaposition des matériaux qu'aucune sculpture ne vient agrémenter.","architecture":"SELINCOURT, c'est à Charles-Nicolas Manessier, vicomte de Selincourt, capitaine d'infanterie au Régiment du Roi, que l'on doit la construction, à partir de 1734, de l'actuel château de Selincourt, sur l'emplacement de l'ancien château, détruit par un incendie. Ce bâtiment, de proportions modestes mais équilibrées, est précédé d'une cour limitée par un saut-de-loup au centre duquel la grille d'entrée s'ouvre entre deux piliers de pierre surmontés chacun d'un lion. Le château, érigé en panneaux de briques et chaînes de pierre de taille, avec appareillage à refends, se compose d'un corps de logis, de plan rectangulaire, terminé par deux ailes en très faible saillie et doté d'un avant-corps central à trois pans. A l'intérieur, on remarque une belle rampe d'escalier en fer forgé du XVIIIe siècle et une chapelle aménagée sous les combles, au deuxième étage.\nÉléments protégés MH : le château, le pavillon de l'intendant, les communs, les caves, la carrière souterraine, le parc et le jardin : inscription par arrêté du 17 février 2003.","habitants":"Hornoy   famille de Glos\"","divers":"deux  châteaux dans cet article, , Hornoy  grav1-2 et Sélincourt grav-3.                                                                            Selincourt  GPS : 49° 52' 23\" Nord, 1° 54' 12\" Est","gps":"49° 52' 23\" Nord, 1° 54' 12\" Est","images":["../image/image_80/80_Hornoy_1.html","../image/image_80/80_Hornoy_2.jpg","../image/image_80/80_Hornoy_3.jpg"]},"Consult_chateau_formulaire5ef8":{"id":"Consult_chateau_formulaire5ef8","dept":"80","canton":"Poix-de-Picardie","commune":"Hornoy le bourg","nom":"Hornoy_le_Bourg","type":"Château","periode":"XVIII","histoire":"Deux châteaux dans cet article Bezancourt et Dromesnil          BEZANCOURT,  à la mort, en mars 1671, de Jean de Schulemberg, André-Louis Renouard, conseiller du roi, receveur des tailles en l'élection d'Amiens, se rendit acquéreur de la seigneurie de Bezencourt connue dès le XIIe siècle, et qui avait appartenu aux familles de Boulainvilliers et de Forceville. André-Louis Renouard fit  construire au début du XVIIIe siècle le château actuel en brique et pierre. On peut lire sur les murs de la cave, les dates de 1712 et 1718. Détruit en partie en 1940, il fut restauré en 1947 d'après les plans anciens. Château de bonnes proportions, de plan rectangulaire, terminé par deux ailes en saillie sur la façade côté cour. Il se compose d'un rez-dechaussée couvert sur toute sa longueur d'un toit à la Mansart percé à la base de fenêtres répondant aux ouvertures de la façade. En 1735, la fille d'André-Louis Renouard, Marie Madeleine Ursule, épousa François de Clément du Wault dont les descendants conservèrent Bezencourt jusqu'en 1800, date à laquelle Angélique du Blaizel, veuve et héritière d'Albéric André de Clément vendit le domaine à Jean-Bernard Lemarchand. Ce sont les Clément qui, vers le milieu du XVIIIe siècle, à une date difficile à préciser, firent poser la rampe en fer forgé à l'escalier permettant d'accéder à l'étage mansardé.                            .","architecture":"DROMESNIL  à cinq K.M. au nord  de Hornoy le bourg  date du XVIIIe siècle. Au Moyen Age, un château existait à Dromesnil. Au XVe siècle, il fut reconstruit après la guerre de Cent Ans. Démoli en 1750, il fut remplacé par l'édifice actuel, en 1752. Le château de Dromesnil, tel qu'il est parvenu jusqu'à nous, a été construit au milieu du XVIIIe siècle et remanié au XIXe. La seigneurie de Dromesnil fut érigée en marquisat pour la famille d'Hallencourt qui conserva le château jusqu'en 1749.   Il devint ensuite la propriété de la famille Roussel de Belloy puis de la Famille de Beauvillé, en 1884. Les armoiries des familles Roussel de Belloy et de Béry d'Essertaux sculptées sur le fronton ont été martelées à la Révolution française. Le 8/06/1940, les abords du château de Dromesnil et de son parc furent le théâtre d'un épisode tragique de la Bataille de France. Proche du saut de loup qui marque la limite du parc, des tirailleurs sénégalais de la 5e division d'Infanterie coloniale furent massacrés par l'armée allemande. Une stèle rappelle ce tragique événement à l'endroit où furent retrouvés les cadavres. Le parc à l'arrière du château est constitué d'une futaie de hêtres majestueux. Le château de Dromesnil est protégé aux M.H. La ferme attenante et le colombier sont protégés aux M.H. du 23/10/1980. Le château de Dromesnil est privé mais accueille le public sur RV. C'est un château classé pour ses façades et toitures du château, son grand salon avec ses deux consoles de marbre, et au rez de chaussée, le petit salon.","habitants":"Beznacourt; Famille de  André-Louis Renouard  Dromesnil; famille d'Hallencourt \"","divers":"Deux châteaux dans cet article Bezancourt et Dromesnil              Dromesnil GPS : 49° 52' 40\" Nord, 1° 51' 53\" Est                                             GPS : 50° 00' 12\" Nord, 2° 33' 55\" Est","gps":"49° 52' 40\" Nord, 1° 51' 53\" Est","images":["../image/image_80/80_Hornoy_le_Bourg_1.jpg","../image/image_80/80_Hornoy_le_Bourg_2.jpg","../image/image_80/80_Hornoy_le_Bourg_3.jpg"]},"Consult_chateau_formulaire3584":{"id":"Consult_chateau_formulaire3584","dept":"80","canton":"Flixecourt","commune":"Houdencourt","nom":"Houdencourt","type":"Château","periode":"XVIII","histoire":"HOUDENCOURT, en 1407, la seigneurie appartient à Jean d'Embreville, écuyer, puis à la famille de Brucamps de 1430 à 1550. À cette date, elle passe par alliance à la famille de Boubers. Pierre de Boubers, écuyer, cède la terre en 1603 à François de Croze, également écuyer, que sa fille Marguerite apporte par alliance à Jean de Gaude, seigneur de Martainneville et de Saint-Élier, capitaine au régiment de Soyecourt. Celui-ci achète en 1656 la seigneurie voisine de Franqueville, ainsi que la moitié sud de la forêt de Goyaval, qui prend alors le nom de forêt de Martainneville. Marie-Thérèse de Gaude, marquise de Boudeville, comtesse de Martainneville et baronne de Cotigny, hérite des domaines familiaux en 1749 et épouse la même année Philippe-Charles Vogt, comte de Hunolstein et d'Ottange, chambellan de Stanislas Leszczynski, ancien roi de Pologne puis duc de Lorraine et de Bar, et capitaine au régiment royal allemand de cavalerie.   Elle transmet dès 1770 à leur second fils Jean-François Léonor Vogt, baron de Hunolstein, les seigneuries de Houdencourt et de Franqueville, les seigneuries de Harondel et de Rouvroy en partie, et les droits formant la vicomté de Domart, c'est lui qui fait reconstruire le logis, caractéristique des petits châteaux de plaisance du milieu du XVIIIe siècle,  rehaussé de brique au XIXe siècle, il porte la date de 1772. Les communs et dépendances, semblent former un ensemble compact et homogène. Les d'Hunolsten émigrent dès 1789 et le domaine de Houdencourt, saisi comme bien national, est acquis en 1793 par son ancien fermier, Jean-Baptiste Roussel.  La partie nord du bois de Martainneville est acquise dans les années 1820 par Jean-Charles Deberny, nouveau propriétaire du château et du domaine de Ribeaucourt, qui lui donnera son nom. Jean-Baptiste Roussel fils est aussi maire de Fransu dans les années 1830-1840.","architecture":"HOUDENCOURT. il fait agrandir le logis d'un pavillon à un étage carré et étage de comble, dans le style du corps de logis initial, et agrémenter la toiture dils-de-buf et de lucarnes ornés et d'une crête.L'ensemble de ces travaux porte la marque du Second Empire.  Juliette Roussel, fille de Jules et héritière du domaine, épouse en 1884 Hippolyte Jérosme, héritier de la ferme du Bois-Riquier à Ville-le-Marclet. Le couple fait reconstruire ou remanier les bâtiments d'exploitation de la ferme qui, selon Patrick Longuet, portent sur une pierre la date de 1890 surmontée des initiales J. et R. (Jérosme et Roussel). La propriété passe ensuite à leur fille Eugénie, qui a épousé après la Première Guerre mondiale l'officier britannique Arthur Grace en cantonnement au manoir. La famille Grace vend la propriété en 1973 à un entrepreneur, qui laisse le domaine se dégradé, corps de logis est construit en rez-de-chaussée surélevé, en brique et pierre sur soubassement de grès. Les façades sont en brique avec éléments saillants en pierre, les pignons sont à assises alternées. Les façades ordonnancées sont marquées par un léger avant-corps central de quatre travées. Le toit à longs pans et croupes brisés et les lucarnes ont été restitués selon le modèle ancien. Le corps de logis, simple en profondeur, n'a conservé aucun aménagement ancien. Au nord du château se déploie l'emprise de l'ancien jardin clos de mur. Les communs et les dépendances sont pour la plupart construits en brique et pierre à assises alternées, complétés de pignons à pan de bois, et couverts de tuile.","habitants":"Famille des  d'Hunolsten \"","divers":"Château d'Houdencourt","gps":"","images":["../image/image_80/80_Houdencourt_1.jpg","../image/image_80/80_Houdencourt_2.jpg"]},"Consult_chateau_formulaire6467":{"id":"Consult_chateau_formulaire6467","dept":"80","canton":"Gamaches","commune":"Huppy","nom":"Huppy","type":"Château","periode":"XV-XVII","histoire":"HUPPY, château construit au XVIIe siècle en arc de cercle de gauche à droite ou de l'ouest au sud, un coup d'il au corps de ferme, avec son pigeonnier, de bois et torchis, visible dans le bouquet d'arbres. Le château de briques et de pierres fût achevé par Augustin De Grouches en 1692, date près du porche d'entrée. Il se compose d'un corps principal de logis flanqué de deux tours au Sud. L'aile nord est perpendiculaire dans le prolongement de l'ancien château du XVe siècle. Ils étaient reliés ensemble autrefois. Le vieux château, en ruine, conserve encore une fenêtre à meneaux, l'emplacement de la cuisine et dans la tour nord une prison. A droite du château se trouve les parterres et l'ancien potager transformé en 1984 en parc floral. Derrière le château un grand parc aux hêtres séculaires. L'ensemble de la propriété est entourée par un mur de briques picardes. L'édifice fût cédé à la famille Joly Buiret vers 1900 et devint la propriété de la famille De Nolf en 1984 jusqu'à ce jour.","architecture":"HUPPY, la constuction du château  date du XVIe et XVIIe siècle. Le château de Huppy fut le poste de commandement du Colonel Charles de Gaulle lors de la Bataille d'Abbeville (du 28 mai 1940 au 31 mai 1940). Le château, du XVIIe siècle en brique à harpes de pierre, est constitué du corps de logis flanqué de deux tours et accolé perpendiculairement à un corps de logis secondaire dans le prolongement des ruines de l'ancien château du XVIe siècle.\nÉléments protégés MH : le château du XVIIe siècle : inscription par arrêté du 3 avril 1926.","habitants":"Famille De Nolf\"","divers":"Huppy GPS : 50° 1' 39,99\" Nord, 1° 46' 4,22\" Est","gps":"50° 1' 39,99\" Nord, 1° 46' 4,22\" Est","images":["../image/image_80/80_Huppy_1.jpg","../image/image_80/80_Huppy_2.jpg","../image/image_80/80_Huppy_3.jpg","../image/image_80/80_Huppy_4.jpg"]},"Consult_chateau_formulaire5373":{"id":"Consult_chateau_formulaire5373","dept":"80","canton":"Moreuil","commune":"Ignaucourt","nom":"Ignaucourt","type":"Château","periode":"XVI-XIX","histoire":"deux édifices dans cet article Ignaucourt et Camp- Vermont                               IGNAUCOURT   Lorigine de ce village ne doit guère remonter au-delà du XIe ou du XIIe siècle. Il faisait autrefois partie du diocèse et de larchidiaconé dAmiens, du doyenné de Fouilloy et du bailliage de Montdidier. Le château d'Ignaucourt à  été construit au XIXe siècle, le jardin d'agrément du château est inscrit au pré-inventaire des jardins remarquables.  En 1636, durant la guerre de Trente Ans, les Espagnols mettent à feu le village et ravagent l'église. Happeglène est alors détruit ainsi que la chapelle Saint-Claude. En 1690, le village a déjà son école. Avant sa canalisation, la Luce actionnait un moulin à wade, à l'entrée du marais.  Château d'Ignaucourt du XVIIIe siècle. Vestiges d'un château du XIIIe siècle.","architecture":"Manoir de  CAMP-VERMONT, XVIe siècle, appartient jusqu'à la Révolution à la famille de Béthisy ; À la fin de l'épopée napoléonienne, en 1814 et 1815, les Cosaques occupent Ignaucourt.  Le village est concerné par la guerre franco-allemande de 1870. Lors de la bataille de Villers-Bretonneux, les Allemands sont présents dans la commune.   À la fin de la guerre, le village, considéré comme totalement détruit, a été décoré de la Croix de guerre 1914-1918 le 3 novembre 1920.","habitants":"Seigneurs locaux\"","divers":"Ignaucourt  GPS : 49° 53' 10\" Nord, 2° 23' 28\" Est","gps":"49° 53' 10\" Nord, 2° 23' 28\" Est","images":["../image/image_80/80_Ignaucourt_1.jpg","../image/image_80/80_Ignaucourt_2.jpg","../image/image_80/80_Ignaucourt_3.jpg"]},"Consult_chateau_formulairebefb":{"id":"Consult_chateau_formulairebefb","dept":"80","canton":"Amiens","commune":"Lamotte Brébière","nom":"Lamotte_Brébière","type":"Château","periode":"XVIII","histoire":"LAMOTTE-BREBIERE, ce petit village a toujours dépendu de l'abbaye de Corbie, à qui la seigneurie appartenait à l'exception d'un fief qui relevait de la châtellenie de Daours. En 1767, deux négociants amiénois, Pierre-Antoine et François Léonard, achètent une prairie pour édifier dessus une folie. Ils firent appel à Jacques Rousseau, architecte né à Saumur mais établi à Amiens en 1757 comme inspecteur des Ponts et Chaussées. Cette folie est l'une de ses premières uvres d'architecte réalisées dans la région. Le château est une petite construction rectangulaire en brique et pierre, à deux niveaux.","architecture":"LAMOTTE-BREBIERE, sa seigneurie, achetèrent une prairie pour édifier dessus une \"Folie\", Cette Folie est l'une de ses premières uvres d'architecte réalisées dans la Somme.  Sur la façade Nord, il y a une avancée rectangulaire, elles correspondent à un grand salon ovale continué par une salle à manger rectangulaire. Les 2 pièces sont flanquées latéralement de 2 chambres à alcôves accompagnées de deux cabinets. Cette construction correspond aux goût de la seconde moitié du XVIIIe siècle. Sur la face Nord, on voit 2 rampes en fer à cheval, du XIXe siècle, permettent d'accéder à la salle à manger.","habitants":"Famille de  Pierre-Antoine et François Léonard\"","divers":"Lamotte_Brébière   GPS : 49° 53' 10\" Nord, 2° 23' 28\" Est","gps":"49° 53' 10\" Nord, 2° 23' 28\" Est","images":["../image/image_80/80_Lamotte_Br%c3%a9bi%c3%a8re_1.jpg"]},"Consult_chateau_formulaire386a":{"id":"Consult_chateau_formulaire386a","dept":"80","canton":"Friville-Escarbotin","commune":"Lanchères","nom":"Lanchères","type":"Château","periode":"XVIII","histoire":"Deux châteaux dans cet articl
