es Lanchères et Poutricourt.                            LANCHERES, entouré d'un beau parc avec canal de jardin, le château de Lanchères a été construit au milieu du XVIIIe siècle et restauré au XXe siècle, son jardin d'agrément est inscrit au pré-inventaire des jardins remarquables. Nous pouvons également voir sur la commune de Lanchères les vestiges du château de Pourtricourt.","architecture":"POUTRICOURT, depuis 1403, la seigneurie de ce lieu appartient à la famille de Biencourt, originaire de Picardie, son existence est attestée dès 1150. Au XVIe siècle, le château revint à Florimond de Biencourt et à Jeanne de Salazar, son épouse, mais ceux-ci n'y résidèrent qu'épisodiquement puisqu'ils habitaient ordinairement à Saint Maulvis dans le Vimeu. A leur mort il revint à leur fils Jacques, leur autre fils, Jean de Poutrincourt, après avoir combattu dans les rangs de la Ligue, se rallia à Henri IV et se lança dans des explorations colonial: c'est lui qui a fondé Port-Royal en Acadie. Jusqu'à la veille de la Révolution, le château est demeuré dans la même famille. Construit au XVe ou au XVIe siècle, il est aujourd'hui en ruine, il ne subsiste guère que des éléments de l'un de ses longs côtés et ses deux faces latérales, tout le mur de façade a disparu. Ses murs épais d'environ 0,75m ont été construits sur une assez grande hauteur en damiers de silex et de briques, quelques blocs de tuf renforçant les angles. Vers 1930, le château de Poutrincourt avait encore ses quatre murs debout; on peut craindre que les intempéries ne viennent à bout de ses dernières ruines. Il y a quelques années le gouvernement du Canada ait songé à s'en rendre acquéreur en souvenir de jean de Biencourt, mais aucune suite n'aurait été donnée à ce projet.Éléments protégés MH : le château de Pourtricourt (ruines) : inscription par arrêté du 18 mars 1980.","habitants":"Seigneur local\"","divers":"Deux châteaux dans cet articles Lanchères et Poutricourt.     Lanchères  GPS : 50° 09' 34\" Nord, 1° 33' 20\" Est Francières   GPS : 50° 04' 23\" Nord, 1° 56' 33\" Est","gps":"50° 09' 34\" Nord, 1° 33' 20\" Est Francières   GPS : 50° 04'","images":["../image/image_80/80_Lanch%c3%a8res_1.jpg","../image/image_80/80_Lanch%c3%a8res_2.jpg"]},"Consult_chateau_formulaireee4d":{"id":"Consult_chateau_formulaireee4d","dept":"80","canton":"Rue","commune":"de Long","nom":"Long","type":"Château","periode":"XVIII","histoire":"De LONG, ancienne forteresse des comtes du Ponthieu et de la famille De Fontaine depuis le IXe siècle, le château est démoli une première fois en 1361 puis une seconde vers 1700  le château de Long, appelé aussi la « Folie de Buissy », a été construit dans la première moitié du XVIIIe siècle, pour Honoré-Charles de Buissy, seigneur de Long et autres lieux, époux de Thérèse Geneviève Ravot dOmbreval par l'architecte Charles-Étienne Briseux. À son décès, en 1762, son fils Pierre de Buissy continua l'uvre paternelle, faisant décorer le château. Jean-Baptiste Huet en décora les boiseries dont certaines furent démontées pour être vendues aux États-Unis et furent rachetées par Gérard de Berny qui les installa dans son hôtel particulier d'Amiens, l'actuel Musée de l'Hôtel de Berny. Il est alors reconstruit en 1733 par Honnoé-Charles de Buissy pour un montant certainement fort important qui lui vaudra son surnom de folie de Buissy.  Il est racheté en ruine, par M. Roger Vanglabeke, P.D.G. des peintures Avi. Les travaux de réhabilitation durent sept ans pour aboutir à l'aspect de l'actuel château, et obtint le Grand Prix Chefs-d'uvre en péril.\nÉléments protégés MH : le château, le parc et l'avenue qui précède l'entrée : inscription par arrêté du 28 janvier 1944. Les façades et les toitures des communs ; le pigeonnier et les deux serres, en totalité : inscription par arrêté du 1er décembre 2003.","architecture":"Le LONG, sa construction date du XVIIIe siècle. L'Architecte Charles-Étienne Briseux. Le bâtiment principal est orienté est-ouest, bati en briques et pierres, il a une forme rectangulaire flanquée sur chacune de ses façades de trois pavillons polygonaux à trois pans. À l'origine était construite à cet endroit une petite forteresse médiévale comme au Catelet, destinées à contrôler. Dès son origine, le château possède de beaux communs auxquels viendront s'adjoindre deux belles serres classées à l'inventaire supplémentaire des monuments historiques. Il traverse la Révolution et la 1ère guerre mondiale sans trop de dommages. Il souffrira entre 1939 et 1945 de son occupation par les troupes allemandes : LArt de bâtir les maisons de campagne. Laissé à l'abandon, le château de Long, délabré, fut racheté, en 1964, par l'industriel Roger Van Glabeke qui le restaura . A l'intérieur, on peut y admirer sa collection de mobilier, d'automates du XVIIIIe siècle et de pendules. Le château de Long domine la Somme et de nombreux étangs, est enrouré d'un grand parc décoré de nombreuses statues et fontaines, est une propriété privée ouverte à la visite. Le château de Long a été inscrit aux M.H. en 1944 et 2003.","habitants":"Famille de H.C. de Buissy \"","divers":"long GPS : 50° 02' 19,14\" Nord, 1° 58' 52,04\" Est","gps":"50° 02' 19,14\" Nord, 1° 58' 52,04\" Est","images":["../image/image_80/80_Long_1.jpg","../image/image_80/80_Long_2.jpg","../image/image_80/80_Long_3.jpg","../image/image_80/80_Long_4.jpg","../image/image_80/80_Long_5.jpg"]},"Consult_chateau_formulairee2e9":{"id":"Consult_chateau_formulairee2e9","dept":"80","canton":"Albert","commune":"Louvencourt","nom":"Louvencourt","type":"Château","periode":"XVIII","histoire":"LOUVENCOURT, au Moyen Age, il existait déjà à Louvencourt un château qui se trouvait a peu près a l'emplacement actuel de la cour de l'école communale. Il appartenait alors à une famille qui portait le nom de sa terre, les Louvencourt. A cette maison de Picardie on doit rattacher, en particulier, Charles de Louvencourt qui fut mayeur d'Amiens en 1567. Le château, tel qu'il se présente aujourd'hui, fut édifié au milieu du XVIIIe siècle, en même temps que l'église, pour la famille de Lestocq dont descend l'épouse du propriétaire actuel M. le Sellier de Chezelles. Il s'agit d'une demeure très simple, aux allures de grande maison de campagne, construite entièrement en pierre sur un soubassement en grès. Elle se compose essentiellement d'un corps de logis de plan rectangulaire dont l'élévation est à deux étages couverts d'un toit d'ardoise percé, sur la façade principale, de trois lucarnes. Dans le prolongement de ce corps de logis furent ajoutées, un peu plus tard, deux petites ailes sans étage, coiffées d'un toit à la Mansart.   Au début du règne de Louis XV, Charles-Antoine de Lestocq est seigneur de Louvencourt, il occupait la charge de trésorier de France, c'est à lui que l'on attribue généralement la construction du château, voisin de l'église dont le clocher porte la date de 1740, l'actuel corps de logis serait plutôt l'oeuvre de son fils Nicolas-Charles, capitaine d'infanterie au régiment de Mailly et chevalier de Saint-Louis, il épousa Marie-Jeanne Demazures de Florimont en 1753, il fixa sa résidence habituelle à Louvencourt où il fut inhumé en 1777 sous une grande pierre gravée du choeur de l'église.   Sa fille Marie-Victoire épousa Jean-Jacques-Guislain du Val de Nampty, son voisin de Bus-les-Artois.","architecture":"LOUVENCOURT, son fils Charles-René-Victoire-Damien mourut à Louvencourt en 1817. Héritière du domaine Angélique de Lestocq l'apporta en mariage à Antoine Serpette de Berseaucourt.\nLeur fils Edouard fut maire de la commune, avec son épouse Léontine de Valicourt, ils parrainèrent la cloche de l'église. Georges Serpette de Berseaucourt leur succéda et mourut en 1897.  Le domaine est entré par alliance dans la famille de Thélin.  Le château a subi des dommages en 1914-1918, il fut occupés par les troupes alliées. Les propriétaires actuels sont M. Le Sellier de Chezelles et son épouse, descendante de la famille de Lestocq.                                                                                            A cinq k.M. au nord AUTHIE, le fief d'Authie existe déjà dans les années 800, il relève du monastère de Saint-Riquier. Il semble qu'Authie soit donné par Charlemagne au duc Angilbert, abbé de Saint-Riquier. Le premier château semble dater du IXe siècle. Après l'An 1000 la châtellenie d'Authie devient une possession du seigneur de la Ferté. Sa situation géographique explique l'importance stratégique du château d'Authie, détruit au XVIe siècle, en représailles par les huguenots, qui n'avaient pu se rendre maîtres de Doullens. Le château actuel ne sera reconstruit que sous le règne de Louis XV. Les Seigneurs d'Authie exercent le droit de haute, moyenne et basse justice. Dans leur fonction de seigneurs justiciers ils sont entourés d'officiers auxquels ils délèguent leurs compétences. Il possède une salle de justice où se tiennent les audiences et auditions. Les cas qui ne sont pas de la compétence du bailli qui exerce la justice en lieu et place du seigneur, sont déférés au bailliage d'Amiens et les appels au Parlement de Paris.","habitants":"famille de Lestocq\"","divers":"Louvencourt_GPS : 50° 11' 52,89\" Nord, 2° 24' 36,45\" Est","gps":"50° 11' 52,89\" Nord, 2° 24' 36,45\" Est","images":["../image/image_80/80_Louvencourt_1.jpg","../image/image_80/80_Louvencourt_2.jpg"]},"Consult_chateau_formulaired6d3":{"id":"Consult_chateau_formulaired6d3","dept":"80","canton":"Doullens","commune":"Lucheux","nom":"Lucheux","type":"Château","periode":"XV","histoire":"LUCHEUX , les archives n'attestent véritablement l'existence du château qu'en 1147 mais l'on situe sa fondation vers 1120. C'est Hugues II Campdavène, comte de Saint Pol qui en serait l'instigateur. Au XIIe siècle, par l'hommage qu'Hugues IV Campdavène rend au roi Philippe Auguste, Lucheux demeure dans le giron des comtes de saint-Pol mais relève directement du royaume. Lorsque Hugues IV Campdavène meurt à Constantinople, en 1205, sa fille fait passer le château à la famille de Châtillon, Guy Ier de Châtillon et ensuite Guy II remodèlent les fonctions militaires et enrichissent l'ensemble d'éléments résidentiels dans le deuxième quart du XIIIe siècle. Le donjon et la grande salle sont reconstruits. Le château devient alors, avec ses jardins, son verger et la forêt, un cadre agréable apprécié des comtes de Saint-Pol et de divers Rois de France qui y séjournent régulièrement à partir du XIVe siècle. Après la bataille d'Azincourt en 1415, le château est très endommagé. Pierre de Luxembourg le répare et en profite pour moderniser l'arsenal militaire en 1431. Louis de Luxembourg, son successeur, complète ce dispositif par la construction de la tour Neuve, il est exécuté en 1475 pour avoir voulu ériger Lucheux en une principauté autonome et puissante de par sa situation à la limite du royaume de France et des états bourguignons. Le comté de Saint-Pol est alors confié à Guy Pot, bailli de Vermandois avant que Charles VII ne le rende à Marie de Luxembourg. Au XVIe siècle le château doit encore subir les assauts répétés des Anglais et des Impériaux, qui en 1522 exercent un siège de huit jours à l'issue duquel seul le donjon résiste. Malgré les réparations importantes qui furent entreprises, le château ne peut se relever et en 1640, Richelieu donne l'ordre de le démanteler. Après sa saisie comme bien national, les parties les plus anciennes (donjon et résidence en basse cour) sont à l'état de ruines, les restes en élévation ont été restaurés et maintenus hors d'eau.","architecture":"LUCHEUX  l'ensemble des vestiges est compris dans une enceinte polygonale irrégulière, percée de deux portes et renforcée de plusieurs tours. Elle est cernée par un fossé sec, aujourd'hui comblée au sud. De ce fait, et contrairement au modèle philippéien, les bâtiments sont construits de manière anarchique et sa surface est immense. La porte du Bourg menait à la ville. Formée d'un berceau brisé entre deux tours circulaires coiffées de poivrières, elle était autrefois protégée par une herse et un pont-levis à flèche, fonctionnant donc sur un système de contrepoids, ainsi que l'attestent les rainures verticales dans la partie supérieure. La deuxième porte, celle du Haut-Bois qui donnait accès à la forêt, est flanquée de deux massifs contreforts rectangulaires aux allures de tours qui, jusqu'au XVIIIe siècle étaient couronnées d'échauguettes. Cette seconde entrée était, elle aussi, dotée d'un pont-levis. A droite de la porte, la courtine talutée à sa base, conserve des mâchicoulis en arc plein-cintre bandés sur des contreforts peu saillants. Retranché derrière les mâchicoulis, le chemin de ronde en espalier s'étendait sur trois plates-formes séparées par des escaliers. Aujourd'hui ce dispositif a disparu mais l'on peut l'imaginer grâce à l'existence de lits de silex noir bien distincts dans les murs en calcaire blanc. A l'intérieur de l'enceinte, l'élément fort du dispositif militaire est le donjon dont il ne subsiste plus que la partie orientale. Ce cylindre cantonné de quatre demi-tourelles s'assoit en encorbellement sur une base plus ancienne carrée renforcée de contreforts semi-circulaires, correspondant au donjon roman. De longues archères présentes dans l'axe de la tour centrale et sur chacune des tourelles attestent du rôle essentiellement défensif de ce donjon, et ce malgré les dimensions des salles, proches de celles des pièces résidentielles des châteaux, en particulier la pièce octogonale au centre du bâtiment. Le caractère résidentiel du château est attesté par la conservation de la grande salle rectangulaire ouverte vers l'ouest par sept fenêtres géminées aux linteaux décorés de trèfles trilobés.","habitants":"Famille de Gfuy Pot\"","divers":"Lucheux  GPS : 50° 11' 52,89\" Nord, 2° 24' 36,45\" Est","gps":"50° 11' 52,89\" Nord, 2° 24' 36,45\" Est","images":["../image/image_80/80_Lucheux_1.jpg","../image/image_80/80_Lucheux_2.jpg","../image/image_80/80_Lucheux_3.jpg"]},"Consult_chateau_formulaireffca":{"id":"Consult_chateau_formulaireffca","dept":"80","canton":"Ailly-sur-Noye","commune":"Conty","nom":"Luzières","type":"Château","periode":"XVIII","histoire":"LUZIERES, bien situé dans le fond de la vallée, ce beau petit château doit son originalité à son ordonnance néo classique et au torchis sur ses façades. Lossature de l'édifice est en charpente recouverte de torchis, mais les fondations sont parementées en briques et les murs latéraux \"brique et de pierre\". Précédé dune perspective gazonnée terminée en arc de cercle et bordé par un étang le château saccompagne de bâtiments variés : ancienne chapelle en pierre blanche et près de lentrée latérale, pavillon précédé dun pont-levis, sur le côté, près dune dépendance accolée à une tourelle. Le parc est entouré par une pièce deau isolant complètement la propriété, on ne peut y pénétrer que par le Pont Levis. Les archives conservent les actes dinhumation dans la chapelle de deux seigneurs de Luzières: Henri-Antoine Fleurton, mort en 1698 en son château dudit Luzières et Jean Baptiste Boullenger du Hamel, lieutenant général de la maréchaussée dAmiens en 1772.  La seigneurie de Conty a donné son nom aux princes de Conti, branche cadette des Bourbon-Condé. François de Bourbon, Prince de Conti, propriétaire du château, était le cousin du roi Henri IV","architecture":"LUZIERES, la construction du château de Luzières date de 1770 à 1793. Les communs ont été rajoutés en 1715. Ils se reflètent dans une pièce d'eau alimentée par des sources dun lieu-dit les Fontainieux, captées et qui passent sous le cours de la Selle. Le château de Luzières est de style néo-classique et date de la fin du XVIIIe siècle. Il a été construit en torchis, sur un soubassement de pierres calcaires, et des pignons de briques, comme de nombreuses constructions picardes.","habitants":"Jean Baptiste Boullenger du Hamel\"","divers":"Luzieres  GPS : 49° 44' 29\" Nord, 2° 09' 09\" Est","gps":"49° 44' 29\" Nord, 2° 09' 09\" Est","images":["../image/image_80/80_Luzi%c3%a8res_1.jpg","../image/image_80/80_Luzi%c3%a8res_2.jpg","../image/image_80/80_Luzi%c3%a8res_3.jpg"]},"Consult_chateau_formulairecebb":{"id":"Consult_chateau_formulairecebb","dept":"80","canton":"Doullens","commune":"Maizicourt","nom":"Maizicourt","type":"Châteaau","periode":"XVII","histoire":"MAIZICOURT, un château-fort existait au XIIIe siècle. Détruit par un incendie. Le château actuel est construit au même endroit pour Nicolas François de La Houssoie. Mais la construction de la demeure fut interrompue  par une indivision.  Autour du château, les jardins replantés par Catherine  et André Guévenoux en 1989, forment une succession de tableaux, le jardin du puits accueille fleurs et arbustes, le jardin du cloître demeure dans un camaïeu de tonalités blanc nacré, grâce aux graminées, aux arums et aux pivoines blanches, lancienne mare accueille hostas, iris, gunneras et crambes, le verger de Lucie est planté de pommiers, vers léglise a été reconstitué un jardin de curé.","architecture":"MAIZICOURT, édifice  de brique et pierre, de plan rectangulaire,corps de logis central à un niveau  de six travées et lucarnes sur combles avec un rez-de-chaussée coiffé d'une haute toiture à double pente en ardoises. Au dessus de la fenêtre qui surplombe la porte centrale se trouve un fronton à la base du toit, orné d'armoiries qui sont celles des Acquet de Férolles et des Mellier. Ce fronton a dû être remanié au XIXe siècle. deux pavillons carrées en retour d'équerres saillant sur angles de la fàçade côté jardins dans le même style toit à quatre pans.","habitants":"Famillede Nicolas François de La Houssoie\"","divers":"Maizicourt  GPS : 50° 11' 47\" Nord, 2° 07' 24\" Est","gps":"50° 11' 47\" Nord, 2° 07' 24\" Est","images":["../image/image_80/80_Maizicourt_1.jpg","../image/image_80/80_Maizicourt_2.jpg","../image/image_80/80_Maizicourt_3.jpg"]},"Consult_chateau_formulaire0cf8":{"id":"Consult_chateau_formulaire0cf8","dept":"80","canton":"Albert","commune":"Marieux","nom":"Marieux","type":"Châteaux","periode":"XVIII","histoire":"MARIEUX, la terre et seigneurie de Marieux appartenait, au Moyen-Age, à la famille de Jumelles. Cette terre passa dans la famille de Cresecques à la suite du mariage, à la fin du XIVe siècle, de Robert de Cresecques, chevalier, seigneur de Cresecques, Longpré et Martinville, avec Eléonore de Jumelles. Au début du XVIe siècle, Jean transforma le nom de Cresecques en celui de Quérecques. Il épousa,  vers 1546, Jacqueline de la Tramerie et eurent quatre enfants, dont le fils aîné, Louis, écuyer, seigneur de Marieux et de Martinville, n'eut qu'une fille, Catherine qui porta la terre de Marieux à son mari Oudart de Monthomer, chevalier, seigneur de Fricourt. C'est à cette époque que le château de Marieux fut détruit par les Espagnols, au moment du siège de Corbie.  Le château actuel a été élevé en 1777 pour la famille de Chizelle.","architecture":"MARIEUX, il possède un portail monumental avec sa grille décorée et une fuie octogonal en pierre, construit au XVIIe siècle. Aujourd'hui, le château est toujours la propriété de la même famille.\nÉléments protégés MH : le grand salon avec son décor : classement par arrêté du 7 novembre 1973. Les façades et toitures y compris le portail d'entrée avec sa grille; l'escalier intérieur avec sa rampe en fer forgé; les pièces suivantes avec leur décor : la salle à manger et la bibliothèque au rez-de-chaussée, les chambres verte, rouge et bleue au premier étage : inscription par arrêté du 7 novembre 1973.","habitants":"famille de Chizelle\"","divers":"Marieux GPS : 50° 06' 28\" Nord, 2° 26' 30\" Est","gps":"50° 06' 28\" Nord, 2° 26' 30\" Est","images":["../image/image_80/80_Marieux_1.jpg","../image/image_80/80_Marieux_2.jpg"]},"Consult_chateau_formulaire85e9":{"id":"Consult_chateau_formulaire85e9","dept":"80","canton":"Gamaches","commune":"Martainneville","nom":"Martainneville","type":"Château","periode":"XVI-XVII","histoire":"MARTAINNEVILLE, la terre connut de nombreux propriétaires : en 1270, elle appartient à Jean de Martainneville et de 1317 à 1339 à Hugues de Monsures. Elle fut par la suite vendue à Jean Journe en 1490 puis à Jacques de Vaudroy en 1605, avant d'être acquise par Jean de Gaude en 1606. De 1685 à 1720, Jean-François de Gaude est seigneur de Martainneville. En 1749, Marie-Thérèse, fille de François-Léonor de Gaude épouse Philippe Charles, comte de Hunolstein. La terre passe dans cette famille originaire d'Allemagne et attachée au duché de Lorraine en 1760 avant d'être rachetée en 1789 par Gabriel Vincent, marquis d'Hantecourt.","architecture":"MARTAINNEVILLE, la 1ère construction remonterait à la fin du XVIe siècle ou aux toutes premières années du XVIIe siècle comme en témoignent les deux tours qui subsistent aux angles du corps de logis côté jardin. Les travaux furent poursuivis au XVIIe siècle selon le schéma classique, corps de logis et deux courtes ailes en retour d'équerre côté cour. De grands travaux d'embellissement se déroulèrent au siècle suivant, avec son bel avant corps central en saillie à trois pans coupés orné de deux pilastres à refends supportant un fronton demi circulaire. Les ailes en retour ont été supprimées et des chaînages rectilignes ont remplacé les chaînages en harpe du siècle précédent. La balustrade qui couronne l'avant-corps doit dater quant à elle du XIXe siècle.","habitants":"Gabriel Vincent, marquis d'Hantecourt.\"","divers":"châteaux dans cet article de Martainneville","gps":"","images":["../image/image_80/80_Martainneville_1.jpg","../image/image_80/80_Martainneville_2.jpg"]},"Consult_chateau_formulaire9402":{"id":"Consult_chateau_formulaire9402","dept":"80","canton":"Abbeville","commune":"Miannay","nom":"Mianney","type":"Château","periode":"XVII","histoire":"MIANNAY, la construction du château de Miannay date du XVIe au XVIIIe siècle. La famille De Miannay a tenu la seigneurie, de la fin du XIIe siècle jusqu'en 1380. Elle a disparu entièrement après la première moitié du XIVe siècle. Martin de Miannay fit partie du nombre des nobles et fieffés du bailliage d'Amiens, convoqués pour la guerre, le 25/08/1337. Le château de Miannay est inscrit aux M.H. depuis 1988   Il y eut à Miannay deux seigneuries et deux châteaux, dont l'une relevait du Ponthieu et l'autre était en bailliage. Le premier château avait été construit vers 1600 par Hector de Créquy, écuyer du duc d'Alençon, il fut détruit vers 1700. Le second château, qu'il serait plus exact d'appeler manoir, existe encore. Le manoir est composé de deux ailes perpendiculaires. L'aile longeant la route est la plus ancienne, elle est en brique, avec un pignon flanqué de deux tourelles percées de meurtrières. L'aile en retour est formée de deux bâtiments : l'un en décrochement a été ajouté au XVIIIe siècle; il est composé de lits de brique et de pierre alternés. Sa réhabilitation a nécessité l'intervention de la collectivité, la Communauté de communes en a réalisé l'acquisition afin d'y implanter parallèlement à sa restauration, deux gîtes ruraux et un gîte de groupe. Éléments protégés MH : l'ensemble des vestiges subsistants du manoir et du pigeonnier : inscription par arrêté du 16 février 1988.","architecture":"MIANNAY  « le vieux manoir de Miannay existe encore, converti en ferme. Il se compose de deux corps de bâtiments, fermant en  équerre. Toute la maçonnerie est en briques, sauf un pavillon carré, à la rencontre des deux ailes, qui est en chaînages de briques et de pierres; ce bâtiment a un toit de tuiles en forme de pavillon, plus élevé que les autres toits du manoir et sommé dépis sans ornement. Sur le retour, un oeil-de-boeuf éclaire le premier étage. un autre toit à pavillon sélève immédiatement à droite.Le pignon du principal du  logis est flanqué de deux tourelles, dont une seule sélargit vers la base. Elles sont percées de fenêtres carrées sans caractère, probablement refaites. Toutes deux sont coiffées de poivrières en ardoises. Les jolis toits de tuiles recouvrent une belle charpente en chêne. La façade sur la cour peut-être datée de la fin du XVIe siècle. La façade sur le jardin est moins ancienne. Par endroits, la base des murs est en craie taillée, plus vieille que le reste. A lintérieur, on voit encore danciennes boiseries.","habitants":"Famille d'Hector de Créquy\"","divers":"Miannay GPS : 50° 05' 52\" Nord, 1° 43' 14\" Est","gps":"50° 05' 52\" Nord, 1° 43' 14\" Est","images":["../image/image_80/80_Miannay_1.jpg","../image/image_80/80_Miannay_2.jpg"]},"Consult_chateau_formulaireebd0":{"id":"Consult_chateau_formulaireebd0","dept":"80","canton":"Corbie","commune":"Molliens au bois","nom":"Molliens","type":"Château","periode":"XVII","histoire":"MOLLIENS,  Molliens-au-Bois est le siège d'une seigneurie depuis le Moyen Age (Jehan de Molliens 1153). Cette seigneurie appartient notamment à la famille de Créquy (XIVe-XVIIe siècle), mais le château mentionné dans le dénombrement de 1539 a totalement disparu. La famille du Fresne conserva la propriété de 1695 à 1765, date à laquelle elle fut vendue à M. Poujol de Molliens, dont les descendants l'habitent encore. La chapelle au nord du corps de logis actuel est le seul vestige du château construit vers 1760 pour M. Du Fresne de Fontaine. L'aspect général de ce château du XVIIIe siècle, restitué par un dessin d'Ernest Héren (d'après un tableau aujourd'hui disparu), était assez imposant: le corps central était flanqué de deux ailes, dont seule demeure l'aile orientale, servant de chapelle funéraire. Tout le reste du château fut détruit en 1820, la famille ne pouvant supporter le coût de son entretien. Un nouveau corps de logis fut reconstruit en style néo-classique vers 1840. Il servit de logement aux officiers alliés pendant la première guerre mondiale, recevant notamment la visite du roi Georges V et du général Pershing en août 1918, pendant la seconde guerre mondiale.","architecture":"MOLLIENS,  le château fut occupé par les Allemands, qui l'incendièrent accidentellement. Les parties endommagées (notamment la façade antérieure) furent reconstruites presque à l'identique en 1950, à l'exception de certains éléments comme le fronton triangulaire. L'allée de tilleuls menant vers le village de Molliens, plantée vers la fin du XIXe siècle, est inscrite depuis le 11 septembre 1950. Le corps de logis forme une masse rectangulaire dont seule l'élévation antérieure est en craie, les autres murs étant construits en brique, avec toutefois de nombreux éléments en pierre (bandeaux, corniche, encadrement de baies.). Il comprend un étage carré. Au nord de ce corps de logis s'élève la chapelle, construite en craie sur un soubassement de grès, et couverte en ardoise. L'angle de ce petit bâtiment est marqué par une flèche servant de clocher. Au sud-est du château se trouve une ferme comprenant un logement et des dépendances en brique.","habitants":"famille de Créquy \"","divers":"Mollens                                                   GPS : 49° 59' 20\" Nord, 2° 23' 10\" Est","gps":"49° 59' 20\" Nord, 2° 23' 10\" Est","images":["../image/image_80/80_Molliens_1.jpg"]},"Consult_chateau_formulaire63ab":{"id":"Consult_chateau_formulaire63ab","dept":"80","canton":"Friville-Escarbotin","commune":"Ochancourt","nom":"Mons_Boubert","type":"Château","periode":"XVIII","histoire":"Deux châteaux dans cet article Mons-Boubert et Ochancourt.                    MONS-BOUBERT, le château de Mons-Boubert date du XVIIIe siècle, rue de Nibas. Le jardin a été inscrit à l'inventaire général du Patrimoine Culturel. La famille  d'Anvin de Hardenthun s'établit à Ochancourt dès le XVe siècle. Elle est maintenue dans sa noblesse sur preuves remontant à Pierre d'Anvin de Hardenthun, seigneur du lieu. Les membres de cette famille, une des grandes familles du Boulonnais et de la Picardie, vont garder Ochancourt comme fief central : ils seront inhumés dans l'église, puis dans une chapelle édifiée à cette fin, même après qu'ils ne furent plus seigneurs d'Ochancourt.                                                                                                                                     Le château du Mons de Boubert, construit pour le Sous-Préfet Manessie d'Abbeville durant la Deuxième République et le Second Empire, date de 1867.Vous pourrez réserver une chambre parmi les 5 chambres à louer. 5 Salles de bain, Grande cuisine équipée, salle/salon. Grand parc arboré.","architecture":"OCHANCOURT, le château d'Ochancourt a été construit au XVIIe siècle, puis remanié au XIXe siècle. Pendant la première guerre mondiale un campement de soldats Hindous s'est installé dans le parc du château. Le jardin d'agrément  est inscrit au pré inventaire des jardins remarquables.","habitants":"Famille d'Anvin de Hardenthun \"","divers":"DEeux châteaux dans cet article Mons-Boubert et Ochancourt grav 2. GPS : 50° 06' 15\" Nord, 1° 36' 57\" Est","gps":"50° 06' 15\" Nord, 1° 36' 57\" Est","images":["../image/image_80/80_Mons_Boubert_1.jpg","../image/image_80/80_Mons_Boubert_2.jpg"]},"Consult_chateau_formulaire01f2":{"id":"Consult_chateau_formulaire01f2","dept":"80","canton":"Ailly-sur-Noye","commune":"Monsures","nom":"Monsures","type":"Forteresse","periode":"XV","histoire":"MONSURES, la construction du château de Monsures date de 1651 à 1804. Le château fut longtemps la propriété de la Famille de Mailly-Couronnel. En 1912, il passe dans les mains de la famille Morel de Foucaucourt, après que le Baron Édouard Morel de Foucaucourt l'ai acquit. Après sa mort en 1929, le château de Monsures ira à son fils, le baron Jean Morel de Foucaucourt, inspecteur général des finances. Grand voyageur et aviateur, il fit installer une piste datterrissage derrière le château de Monsures pour son avion personnel. Il y organise également chaque année un rallye aérien très couru. Le chateau possède un jardin inscrit au pré-inventaire (jardins remarquables). Le château de Monsures fait lobjet dune double inscription aux M.H. : une première inscription sur les restes du château date du 18/05/1926 et la seconde portant sur les façades et toitures datée du 16/12/1970. Il ne reste que la porte principale de l'ancienne forteresse.","architecture":"MONSURES, de la forteresse construite au début du XVe siècle il ne subsiste que la porte principale flanquée de deux tours dont une assez délabrée. Le château actuel, bâti vers 1650, possèdant une porte près de laquelle une statue de Notre-Dame de Lourdes, fut restauré au XIXe siècle. Le baron Jean Morel de Foucaucourt,  possèdant un petit avion personnel, jusquà ce funeste 21 février 1939 où, ironie du sort, le baron et son épouse périrent dans un accident davion. Éléments protégés MH : les restes de l'ancien château : inscription par arrêté du 18 mai 1926 . Les façades et les toitures du château : inscription par arrêté du 16 décembre 1970.","habitants":"Famille de Mailly-Couronnel.\"","divers":"Monsures  GPS : 49° 42' 44\" Nord, 2° 09' 43\" Est","gps":"49° 42' 44\" Nord, 2° 09' 43\" Est","images":["../image/image_80/80_Monsures_1.jpg","../image/image_80/80_Monsures_2.jpg","../image/image_80/80_Monsures_3.jpg"]},"Consult_chateau_formulairee124":{"id":"Consult_chateau_formulairee124","dept":"80","canton":"Gamaches","commune":"Bouttencourt","nom":"Monthières","type":"Château","periode":"XVII-XIX","histoire":"MONTHIERES , la construction du château de Monthières date de 1820 pour le Baron d'Halloy d'Hocquincourt issu d'une famille amiénoise de hauts magistrats. Son propriétaire initial était le Baron d'Halloy d'Hocquincour, le château  date du milieu du XVIIe siècle. Il appartenait en 1654 au chevalier François Clément du Vault, maréchal des camps et armées du Roi. Un siècle plus tard, en 1745, son descendant Charles Clément du Vault possédait des titres de propriété. En 1765, le domaine revint à l'écuyer Marie Antoine Godde, Conseiller du roi, mais aussi Maître particulier des eaux et forêts de Picardie, fonction qui la peut-être prédisposé à entreprendre des plantations. Sur une représentation de la fin du XVIIIe siècle, conservée aux Archives départementales, le domaine apparaît ceinturé dun cours deau et de masses végétales. Malheureusement, seuls le bâti et les circulations sont représentés. Le château de Monthières a  été construit au début du XIXe siècle, il appartenait à la famille Borel de Bretizel. Le jardin d'agrément est inscrit au pré-inventaire des jardins remarquables, notamment deux platanes sur les pelouses du château.","architecture":"MONTHIERES,  c'est un château de briques et pierres avec son parc datant du XIXe siècle. Le parc est ouvert au Public, avec ses 5 ha. La municipalité en est devenue propriétaire. Le bâtiment reprend l'architecture brique et pierre traditionnelle en Picardie. Il subira plusieurs transformations en 1905. En 1940, la baronne devenue veuve en fit don à la Communauté missionnaire Notre-Dame des Apôtres pour que les religieuses puissent dispenser des soins à la population. En 1971, l'entretien du bâtiment étant une charge trop lourde pour elles, les religieuses le vendirent pour un franc symbolique à la ville d'Amiens. Après l'incendie de 1989, le château de Montières a été remis en état et est devenu une maison de retraite. Il appartient à la Ville d'Amiens.","habitants":"Baron d'Halloy d'Hocquincourt\"","divers":"Monthières GPS : 49° 54' 53\" Nord, 2° 15' 32,71\" Est","gps":"49° 54' 53\" Nord, 2° 15' 32,71\" Est","images":["../image/image_80/80_Monthi%c3%a8res_1.jpg","../image/image_80/80_Monthi%c3%a8res_2.jpg"]},"Consult_chateau_formulaire386a-2":{"id":"Consult_chateau_formulaire386a-2","dept":"80","canton":"Corbie","commune":"Montigny sur l","nom":"Montigny_Hallue","type":"Château","periode":"XVIII","histoire":"MONTIGNY, en 1636, l'armée française qui y campait y fut décimée par les troupes de Jean de Werth. L'apogée démographique de la commune se situe dans la première moitié du XIXe siècle , mais la population ne tarda pas à chuter en lien avec l'exode rural : les habitants employés dans la fabrique de bonneterie de Montigny refluèrent vers Amiens lorsque cette dernière ferma (vente des biens immeubles en 1894). Le château de Montigny a appartenu à plusieurs familles et en particulier, au XVIIIe siècle, à la famille de Lameth; Josèphe-Françoise Le Fournier de Wargemont, en épousant en 1722 Henri-Louis de Lameth, lui avait apporté le domaine. En 1789, Augustin Louis Charles, marquis de Lameth, seigneur d'Hénencourt, fut le dernier seigneur de Montigny. Au XXe siècle, le château est à l'abandon, alors M. Christian du Perray rachète la demeure en 1996 et se consacre pendant 15 ans à sa restauration, tout était à refaire à l'intérieur comme à l'extérieur.","architecture":"MONTIGNY, les anciens communs ont été transformés en logement. Le parc a été récemment loti en résidence pavillonnaire. Situé dans un vaste et luxueux, château de style Louis XIII entièrement restauré, entouré d'un parc de trois ha, d'arbres centenaires et d'une belle pelouse, cet appartement de 200m² d'une capacité d'accueil de 10 pers, dispose de deux terrasses juxtaposées orientées plein sud dans un cadre protégé de toute urbanisation.","habitants":"Famille de Lameth;\"","divers":"Montigny  sur l'Hallue","gps":"","images":["../image/image_80/80_Montigny_Hallue_1.jpg"]},"Consult_chateau_formulaire18a5":{"id":"Consult_chateau_formulaire18a5","dept":"80","canton":"Amiens","commune":"Montonvillers","nom":"Montonvillers","type":"Châteaux","periode":"XVIII","histoire":"Deux châteuxdans cet article Montovillers et Naours.                         MONTONVILLERS , la seigneurie de Montonvillers est attestée depuis le XVe siècle. Au XVIIIe siècle s'élevait un manoir appartenant à la famille de Monsures Graval, avec une orangerie, des granges et des étables, une forge et un jardin orné de bassins. Au XIXe le manoir de Montonvillers fut vendu à la famille Lennel. Le château actuel et les communs ont  été élevés pour Théodore Lennel, vers 1830. L'architecte François Duvillers (également employé à Epagne-Epagnette par un autre propriétaire, A. Cornet) serait intervenu vers 1860 peut-être pour le dessin du parc. La sculpture du fronton est due aux frères Duthoit. Le château est actuellement inhabité, son état se dégrade. Le corps de logis est un bâtiment néo-classique de plan carré, en briques et pierre, avec un toit à croupe.  A l'est s'élèvent deux bâtiments en briques servant de communs avec toits à longs pans. Près du portail d'entrée se trouve une maison de gardien en briques sur soubassement de grès, le pignon nord et la couverture sont modernes. Le domaine est bordé le long de la rue de l'Eglise par un mur en briques avec deux portails, contemporains du corps de logis. Un calvaire en fonte faisant partie du domaine se trouve à l'est, en bordure du parc boisé    . D'après un voisin, il aurait été occupé par les allemand en 1943 et depuis il n'est plus habité.","architecture":"MONTONVILLERS, le logis est de style néo-classique, de forme carré, en briques et pierre, avec un toit à croupe. A l'intérieur, se trouve un escalier à éclairage zénithal. Coté Est, 2 bâtiments en briques servent de communs avec leur toits à longs pans. A côté du portail, il y a la maison du gardien en briques, sur son soubassement de grès. Le pignon Nord et la couverture sont modernes. Le domaine de Montonvilers est bordé le long de la rue de l'église, par un mur en briques avec deux portails contemporains, du corps de logis. Un ancien calvaire en fonte se trouve, à l'Est, en bordure du parc boisé. Ce manoir est inhabité depuis 1943.                                                                                                         Au nord 10  K.M. NAOURS, le Château de Naours est un château bâti à Naours, dans le département de la Somme, en région Hauts-de-France, en France. Vous pourrez louer des salles pour fêter vos évènements privés comme votre mariage ou professionnels.","habitants":"famille de Monsures Graval\"","divers":"Deux châteuxdans cet article Montovillers et Naours -grav-3.        GPS : 49° 59' 39\" Nord, 2° 17' 47\" Est                                                                     Naours GPS : 50° 02' 10\" Nord 2° 16' 39\" Est","gps":"49° 59' 39\" Nord, 2° 17' 47\" Est","images":["../image/image_80/80_Montonvillers_1.jpg","../image/image_80/80_Montonvillers_2.jpg","../image/image_80/80_Montonvillers_3.jpg"]},"Consult_chateau_formulaire92ee":{"id":"Consult_chateau_formulaire92ee","dept":"80","canton":"Poix-de-Picardie","commune":"Moyencourt les Poix","nom":"Moyencourt","type":"Château","periode":"XVII","histoire":"MOYENCOURT, les Poix , la seigneurie de Moyencourt a appartenu à la famille du même nom jusqu'en 1533, date à laquelle Antoinette de Moyencourt épousa Charles du Chastenet. Les du Chastenet conservèrent le domaine jusqu'en 1728. Leur neveu, Charles-François de Sarcus hérita du domaine, mais le vendit en 1739 à Louis, comte de Gomer. En 1742, François-Charles de Gomer échangea Moyencourt contre partie de Quevauvillers avec Jean-Louis de Creny. Cette famille de Creny en resta propriétaire jusqu'en 1771.","architecture":"MOYENCOURT, les Poix  date à laquelle, le 30 août précisément, Jacqueline-Élisabeth de Creny épouse Antoine Michel de Tourtier et lui apporte le domaine. Les ancres de fer, scellées dans la façade du château, permettent d'attribuer sa construction en 1612. Des modifications et des restaurations auraient été apportées en 1752, par Jean-Louis comte de Creny. Une aile en particulier (celle de gauche) fut reconstruite après un incendie sur des plans légèrement différents. Le château est demeuré dans la même famille depuis le XVIIIe siècle, il appartient aujourd'hui au descendant d'Antoine Michel de Tourtier. Le château comprend un corps de logis de plan rectangulaire, couvert en ardoises, flanqué de deux ailes saillantes, qui constituent, dans une certaine mesure, quatre tours carrées disposées à chacun des angles du bâtiment principal.","habitants":"Famille de Jean-Louis de Creny\"","divers":"Moyencourt GPS : 50° 20' 58\" Nord, 1° 44' 47\" Est","gps":"50° 20' 58\" Nord, 1° 44' 47\" Est","images":["../image/image_80/80_Moyencourt_1.jpg"]},"Consult_chateau_formulairea9f0":{"id":"Consult_chateau_formulairea9f0","dept":"80","canton":"Albert","commune":"Etinehem_Mericout-Sur-Somme","nom":"Méricourt","type":"Château","periode":"XVII-XVIII","histoire":"MERICOURT, un château-fort est bâti à cet endroit à la fin du XIIe siècle. Détruit sur ordre de Richelieu en 1626.  L'une des murailles de ce château en pierre de taille conserve encore l'écusson des Le Fournier qui le reconstruisirent en 1655 et devinrent seigneurs de Mericourt en 1667. Au fil des siècles.   En 1667. La propriété appartient toujours à la famille Objois depuis six générations, les propriétaires actuels, monsieur et madame Jean Jacques Objois accueillent des hôtes.   Au cours de la grande guerre le château est quasiment épargné et est utilisée par les plus hauts responsables français et britanniques: Poincaré, Joffre, Foch, Haig. \nÉléments protégés MH : le château (la tour de fortification médiévale et le corps de logis du XVIIIe siècle en totalité, les écuries, la remise et la serre), le parc, le jardin et le réseau hydraulique ancien : inscription par arrêté du 14 octobre 2003.","architecture":"MERICOURT, reconstruit à partir de 1655, par la famille Le Fournier de Wargemont, qui détenait la seigneurie de Méricourt. Le château de Méricourt-sur-Somme fut transformé et agrandi au XVIIIe siècle. Du château médiéval, il reste la porte d'entrée.  Lédifice fait lobjet de diverses transformations puis dagrandissements. La plus grande partie des bâtiments date du XVIIIe siècle cependant, certains élément du château remontent à la Renaissance. Encadrant le château, un parc naturel de 15 hectares avec réseau hydraulique médiéval fait d'étangs et de pièces d'eau dans les méandres de la Haute Somme.  Le corps de logis, en pierre de taille, fut construit pour l'essentiel au XVIIIe siècle. Il est orné des armoiries sculptées des Le Fournier de Wargemont. Le parc  avec ses arbres centenaires. Les dépendances se composent des écuries, de la remise et d'une serre. Pendant la première guerre mondiale. Le château de Méricourt-sur-Somme est inscrit aux M.H. depuis le 14/10/2003.","habitants":"Famille le Fournier de Wargemont et à la famille Objois\"","divers":"Méricourt GPS : 49° 55' 43\" Nord, 2° 41' 27\" Est","gps":"49° 55' 43\" Nord, 2° 41' 27\" Est","images":["../image/image_80/80_M%c3%a9ricourt_1.jpg","../image/image_80/80_M%c3%a9ricourt_2.jpg","../image/image_80/80_M%c3%a9ricourt_3.jpg","../image/image_80/80_M%c3%a9ricourt_4.html"]},"Consult_chateau_formulaired89f":{"id":"Consult_chateau_formulaired89f","dept":"80","canton":"Gamaches","commune":"Mérélessart","nom":"Mérélessart","type":"Châteaux","periode":"XVI-XIX","histoire":"Deux châteaux dans cet article ; Mérélessart et Tourelles .                                  MERELESSART, la terre  appartenait au Moyen Age à une famille qui en portait le nom. A partir du XVIe siècle (1540), elle fut la propriété des Le Normand de Tronville qui la gardèrent jusque vers 1770, date à laquelle Claude-Marie Griffon d'Offoy, capitaine au régiment de Flandre, chevalier de Saint-Louis mayeur d'Abbeville, en fit l'acquisition. Environ un siècle plus tard, le domaine passa à la famille de Bonnault d'Houet à la suite du mariage de Claudine Griffon d'Offoy avec Antoine Joseph Léon, vicomte de Bonnault d'Houet dont le propriétaire actuel est le descendant.","architecture":"MERELESSART, la construction du château date du XVIIIe siècle. Les éléments protégés aux M.H. sont : ses façades, ses toitures,les boiseries du salon, de la salle à manger, de la salle de billard, et le pigeonnier.  Château brique et pierre formé d'un corps principal du XVIIIe siècle, en trois parties, flanqué de deux pavillons, l'un à l'ouest et l'autre à l'est (XIXe siècle). Subsiste du premier château un pigeonnier à tour ronde en craie daté de 1634. Éléments protégés MH : inscription par arrêté du 16 décembre 1986. Le château de Mérélessart est inscrit aux M.H. depuis le 16/12/1986.                                                                  TOURELLES,  à Mérélissart  Le château des Tourelles, de plan carré, a été construit au XIXe siècle, son nom proviendrait du fait qu'il possède de fines tourelles à ses angles.","habitants":"Famille de Bonnault d'Houet\"","divers":"Deux châteaux dans cet article ; Mérélessart et Tourelles .                               GPS : 50° 00' 03\" Nord, 1° 42' 27\" Est  Mérélessart GPS 49° 58' 22\" Nord, 1° 51' 10\" Est","gps":"50° 00' 03\" Nord, 1° 42' 27\" Est  Mérélessart GPS 49° 58' 22","images":["../image/image_80/80_M%c3%a9r%c3%a9lessart_1.jpg","../image/image_80/80_M%c3%a9r%c3%a9lessart_2.jpg","../image/image_80/80_M%c3%a9r%c3%a9lessart_3.jpg"]},"Consult_chateau_formulaired12f-2":{"id":"Consult_chateau_formulaired12f-2","dept":"80","canton":"Rue","commune":"Nampont st-martin","nom":"Nampont","type":"Château","periode":"XV","histoire":"NAMPONT, aux XIIe et XIIIe siècles, Nampont a appartenu à la famille portant ce nom; au XIVe siècle le bien passa à celle du Quesnoy et au XVe siècle à celle de Biencourt, c'est ces derniers qui le fit reconstruire.   Marie de Biencourt épousa, en 1464, Josse de Vaudricourt et l'apporta à cette famille. François 1er séjourna dans le château en 1517. En 1570 Anne de Vaudricourt le transmit par alliance aux Monchy d'Hocquincourt. En 1712, le manoir fut vendu à un sieur Becquin et en 1764, l'édifice passa par alliance aux du Maisniel. Au XIXe siècle, par héritage, il a appartenu à la famille de Bertoult. Depuis quelques années M. Podvin en était le propriétaire des lieux remplacé par Henri Moural.","architecture":"NAMPONT,  le portail d'entrée au Nord, les bâtiments, dominés par 2 tours dont une seule subsiste encore. Le roi de France François Ier réunit, au château de Nampont, les membres du Parlement de Paris, en 1517, pour ratifier le concordat de Bologne. Adrien de Vaudricourt était alors propriétaire des lieux. En 1635, les troupes du roi d'Espagne pillèrent le château. Il fut ensuite, reconverti en poste douanier, pour la perception d'une taxe appelée la gabelle, poursuivit les réparations et fit remplacer le pont-levis par un pont dormant, apposant ses armoiries à l'entrée du château, de plan polygonal, est une ancienne maison-forte encore entourée de douves dans lesquelles ses murs se reflètent, il doit avoir été bâti au XVe siècle, en calcaire sur soubassement de grès. Sa porte d'entrée s'ouvre entre deux tours formant éperon et dotées de meurtrières pour bouches à feu. Des toitures pyramidales les couvrent; des fenêtres modernes encadrées de briques y ont été percées. La porte charretière est flanquée à droite d'un passage pour piétons.","habitants":"Famille de Biencourt\"","divers":"Nampont GPS : 50° 20' 58\" Nord, 1° 44' 47\" Est","gps":"50° 20' 58\" Nord, 1° 44' 47\" Est","images":["../image/image_80/80_Nampont_1.jpg","../image/image_80/80_Nampont_2.jpg","../image/image_80/80_Nampont_3.jpg"]},"Consult_chateau_formulaire678c":{"id":"Consult_chateau_formulaire678c","dept":"80","canton":"Ailly-sur-Noye","commune":"Namps_Ménils","nom":"Namps_Taisnil","type":"Château","periode":"XVIII","histoire":"NAMPS, la terre de Namps devint au XVIIIe siècle, la propriété de la famille de Bonflaire qui était d'origine normande, ceux-ci achetèrent le domaine à la famille de Bournel qui le possédait depuis le XVe siècle. Il ne fut jamais vendu depuis. C'est Mesnelée Hyacinthe de Bonnaire, chevalier de Saint-Louis et brigadier des armees du roi, qui fit construire, en 1760, le château actuel. Les travaux de charpente étaient terminés en 1762, ainsi que le confirment les archives conservées par le baron de Vassart. Ce château est resté dans la même famille jusqu'à nos jours. Une très belle grille, provenant du château de Bourdon, ouvre sur la cour d'honneur qui précède l'édifice construit en pierre, orienté nord-sud et conçu dans un style classique sobre et élégant. Il se compose d'un corps de logis à deux étages prolongé à l'est et à l'ouest par deux ailes abritant les communs dont l'élévation est à un seul étage. Au milieu de la façade sur cour, l'avant-corps est surmonté d'un fronton triangulaire. L'intérieur, qui fut très endommagé par les guerres, et subit par conséquent des restaurations, a néanmoins conservé d'intéressantes boiseries. Un escalier, dont la rampe est très belle dans sa simplicité, part du vestibule d'entrée et permet d'accéder à l'étage.","architecture":"NAMPS, le château de Namps-au-Mont, fut construit pour Meneslée-Hiacinthe de Bonnaire, vers 1760-1765, en pierre blanche, couvert d'ardoise et entouré d'un parc. Le château de Namps-au-Mont est inscrit aux M.H. depuis 1976. Visite libre ou guidée de la belle façade Nord. Il existe aussi un aute chateau à découvrir sur la commune : Le château de TAISNIL en brique et pierre : un corps de logis flanqué de 2 ailes terminées par des pavillons.","habitants":"famille de Bonflaire\"","divers":"Namps GPS : 49° 48' 13\" Nord, 2° 06' 28\" Est","gps":"49° 48' 13\" Nord, 2° 06' 28\" Est","images":["../image/image_80/80_Namps_Taisnil_1.jpg","../image/image_80/80_Namps_Taisnil_2.jpg"]},"Consult_chateau_formulaire89cf":{"id":"Consult_chateau_formulaire89cf","dept":"80","canton":"Poix-de-Picardie","commune":"Oisemont","nom":"Oisemont","type":"Château","periode":"XVII","histoire":"OISEMONT, il ne reste rien de l'importante forteresse qui défendait, au Moyen Age, le bourg d'Oisemont entouré lui-même d'une muraille. Il y avait dès cette époque deux seigneuries. L'une appartenait aux Templiers et passa ensuite aux Hospitaliers de Saint-Jean de Jérusalem qui la gardèrent jusqu'à la Révolution et ceux-ci portaient alors le nom d'Ordre de Malte. Il n'existe plus rien aujourd'hui de la commanderie. L'autre seigneurie appartenait à la fin du XIIe siècle, a une famille qui en portait le nom. Par héritage, cette seigneurie passa dans la famille de Bailleul et en 1304, Jean de Bailleul la vendit à l'abbaye de Séry qui la possédait encore en 1730. Le château, qu'il serait plus juste d'appeler manoir, fut agrandi et restauré à plusieurs époques. Le seul vestige de l'ancien bâtiment est une tourelle octogonale entièrement en pierre, plantée à l'un des angles de la construction, elle pourrait dater de la fin du XVe siècle ou du début du siècle suivant. Près de cette tourelle, a subsisté mais à une époque postérieure, une porte monumentale qui ouvre directement sur la rue du bourg et sur laquelle figure la date 1633. Le plan du château s'inscrit dans un carré et est composé de huit tours et de demi-tours imbriquées les unes dans les autres. Les tours sont placées dans les angles du carré et sont reliées par les demi-tours. Une seule pièce est aménagée à chaque niveau des tours et demi-tours depuis les caves jusqu'au deuxième étage. La communication verticale depuis le sous-sol jusqu'au deuxième étage se fait par quatre escaliers en vis placés dans les angles internes des tours d'angle. Le château est construit dans une fosse sèche, mesure défensive contre la nouvelle artillerie. Des canonnières de défense sont placées au niveau du plateau situé au-delà de la fosse.","architecture":"OISEMONT, la première mention de la famille de Rambures initiatrice de la construction du château actuel remonte au XIIe siècle. En 1346, Philippe VI autorise la fondation d'une chapelle dans \" l'ostel \" d'Enguerrand d'Airaines à Rambures. Le \" chastel \" de Rambures est mentionné dès 1421 dans les places tenues par les Anglais dans le Ponthieu. En 1423, Henri VI d'Angleterre donne à Collart et Férry de Mailly \" le chatsel, terre et seigneurie de Rambures \". Le château est repris en 1431 par les Français. André de Rambures entre en possession de son château après son retour de captivité en 1436. De 1450 à 1465-70, l'on construit le château actuel. La date de 1472 marque la soumission de Jacques de Rambures envers Charles le Téméraire qui laisse une garnison au château. La Ligue occupe le château en 1585. Au cours du XVIIe siècle, des travaux d'aménagement sont entrepris au château : l'on modifie la porte nord, l'on supprime les fortifications, ainsi que la chapelle et l'on installe un escalier monumental. Au XVIIIe siècle, des pièces de réception sont créées notamment au deuxième étage et l'on perce de grandes baies qui endommagent les mâchicoulis. Lors de la Révolution, la perquisition de Marat reste sans effet. En 1840, le général de Fontenilles réalise des \" aménagements gothiques \" au rez-de-chaussée du château, dans la salle à manger et la salle des gardes.","habitants":"Famille de Rambures\"","divers":"Château Oisemont","gps":"","images":["../image/image_80/80_Oisemont_1.jpg","../image/image_80/80_Oisemont_2.jpg"]},"Consult_chateau_formulaire6e84":{"id":"Consult_chateau_formulaire6e84","dept":"80","canton":"Ailly-sur-Somme","commune":"Oissy","nom":"Oissy","type":"Château","periode":"XVIII","histoire":"OISSY, château construit au XVIIIe siècle par François II Trudaine, faisant partie d'un grand domaine détaillé lors de la vente comme bien national en 1795. Il reste de cet ensemble l'essentiel du parc et jardin, des clôtures, le portail d'entrée et les murs du rez-de-chaussée du château détruit par un incendie en 1946.","architecture":"OISSY,  la demeure, de plan rectangulaire, édifiée en brique et pierre avec un soubassement en grès, avait un étage et était mansardée. Le canal est toujours entouré des arbres du parc, ce qui est peu banal, les canaux du XVIIe et XVIIIe siècle étant bordés de talus gazonnés ou maçonnés. La pièce d'eau existe toujours dans sa forme d'origine. Le château et le domaine constituent un témoignage intéressant des châteaux de la fin du XVIIe ou début XVIIIe siècle dans la région.\nÉléments protégés MH : l'ensemble du domaine : le portail d'entrée, les deux pavillons, les restes du château, le jardin, le parc et le canal : inscription par arrêté du 11 juin 2001.","habitants":"Famille de François II Trudaine,\"","divers":"Oissy v  GPS : 49° 54' 22,52\" Nord, 2° 02' 59,9\" Est","gps":"49° 54' 22,52\" Nord, 2° 02' 59,9\" Est","images":["../image/image_80/80_Oissy_1.jpg","../image/image_80/80_Oissy_2.jpg"]},"Consult_chateau_formulaireda87":{"id":"Consult_chateau_formulaireda87","dept":"80","canton":"Ham","commune":"Omiécourt","nom":"Omiécourt_Misery","type":"Château","periode":"XIX","histoire":"deux châteaux dans cet article Omiecourt et Misery.                                                             OMIECOURT, le château d'Omiécourt est une propriété privée, qui appartient à la même famille depuis 1882. Bien cachés, derrière la route départementale, Véronique et Dominique de Thézy nous ouvrent les grilles de leur havre de paix. Il est entouré d'un beau parc arboré de 16 hectares et d'un jardin à l'anglaise. Il vous est proposé des chambres d'hôtes, une piscine intérieure et extérieure, un spa et un terrain de Golf. Votre Week-end romantique est assuré. Véronique et Dominique vous souhaitent la bienvenue et vous ouvrent les portes de leur château de famille, en vous promettant un grand dépaysement, beaucoup de détente et de bien-être, au cours de votre séjour.                                                                                                                        A dix k.M. au nord  MISERY, l'aspect qu'avait le château de Misery en 1914 est connu par l'expertise de l'architecte parisien Georges Déchard. Le domaine, outre plusieurs fermes, comprend alors le château proprement dit, construit vers 1870, entouré d'un parc clos de murs, avec maison de garde, serres, manège, fabriques de jardin (pavillon près du château, gloriette), hangar pour bestiaux, château d'eau, petit pavillon d'infirmerie, poulailler et chenils. A l'issue de la guerre de 1914-18, la ferme Martin Tempête appartient à M et Mme Maurice Lalain-Chomel, propriétaires du château et ainsi que de plusieurs fermes sur le territoire de Misery, la ferme de la Plaine, du château et la Petite ferme. Le château a été reconstruit après 1918, son jardin d'agrément est inscrit au pré-inventaire des jardins remarquables.","architecture":"OMIECOURT, a été construit au XIXe siècle, en 1976, vint s'installer au château, le pamphlétaire et éditeur Michel-Georges Micberth qui reprit deux immeubles à Chaulnes pour édifier sa maison d'édition et son imprimerie. Magnifique propriété, appartenant à la famille de Thézy, au sein d'un parc arboré de 16 hectares, la vue sur une étendue verdoyante ornée d'arbres séculaires appelle au repos et à la sérénité, le jardin d'agrément du château est inscrit au pré-inventaire des jardins remarquables.","habitants":"Famille de Thézy\"","divers":"deux châteaux dans cet article Omiecourt et Misery  GPS : 49° 48' 35\" Nord 2° 50' 49\" Est","gps":"49° 48' 35\" Nord 2° 50' 49\" Est","images":["../image/image_80/80_Omi%c3%a9court_Misery_1.jpg","../image/image_80/80_Omi%c3%a9court_Misery_2.jpg"]},"Consult_chateau_formulaire0603":{"id":"Consult_chateau_formulaire0603","dept":"80","canton":"Moreuil","commune":"Caix-st Aymou","nom":"Oswald_Caix","type":"Château","periode":"XVIII","histoire":"OSWALD, Charles-Louis-Marie-Oswald de Caix de Saint-Aymour, maire de Corbie de 1855 à 1861 et conseiller général de 1848 à 1861 fit construire un château de style troubadour construit sur les plans de l'architecte amiénois Charles-Joseph Pinsard au XIXe siècle, entre 1850 et 1854 pour sa fille Hélène qui épousa Albalat y Navajas, comte de San Carlos et le couple partit vivre en Espagne. En 1923, grâce à la contribution financière de la ville de Chartres, marraine de guerre de la ville de Corbie, la municipalité racheta le château qui fut transformé en hôtel de ville et le parc en jardin public. La façade de l'hôtel de ville a été ravalée et le jardin public réaménagé en 2013, désormais, une place-parvis dénommé « espace Chartres » donne accès au monument aux morts sculpté par Albert Roze et à l'hôtel de ville. Construit en brique, le château est facilement identifiable par ses tourelles couvertes d'ardoise. Le château du Baron Oswald-Caix a été rénové complètement, en 2013, ainsi que le jardin public qui l'entoure, devenu l'Hôtel de Ville.","architecture":"OSWALD, Charles-Louis-Marie-Oswald de Caix de Saint-Aymour\nbaron Né le 25 décembre 1812 à Amiens.  A servi dans les armées royales du Portugal et d'Espagne avec le grade de capitaine d'Etat-Major, décoré des ordres de la Tour et de l'Epée.\nRentré en France après la capitulation d'Evora, il a épousé le 25 août 1840 Marie-Antoinette Chamont le Ratz de Chavannes.Maire de Corbie de 1855 à 1861 et conseiller général de 1848 à 1861   Il a fait construire ce château entre 1850 et 1854, sa fille Hélène, veuve, épousa le comte espagnol Albalat Y Navajas, en hérita puis le vendit à la ville en 1923 qui le transforma en hôtel de ville.","habitants":"Charles-Louis-Marie-Oswald de Caix\"","divers":"Oswald_Caix  GPS : 49° 54' 28,43\" Nord, 2° 30' 43,71\" Est","gps":"49° 54' 28,43\" Nord, 2° 30' 43,71\" Est","images":["../image/image_80/80_Oswald_Caix_1.jpg","../image/image_80/80_Oswald_Caix_2.jpg"]},"Consult_chateau_formulairec4ce":{"id":"Consult_chateau_formulairec4ce","dept":"80","canton":"Ailly-sur-Somme","commune":"Picquigny","nom":"Picquigny","type":"Forteresse","periode":"XIII-XIV","histoire":"PICQUIGNY, par alliance avec Robert III d'Ailly-le-Haut-Clocher, le château passe entre les mains de la famille d'Ailly. En 1470, le château est incendié par les Français, s'enfuyant devant les troupes de Charles le Téméraire qui quelques jours plus tard achèveront sa ruine. La courtine sud est reconstruite après 1475. Au XVIe siècle, les travaux continuent et donnent au château médiéval une allure plus résidentielle avec un système défensif remodelé. Dans le second quart du XVIe siècle, Antoine d'Ailly augmente la superficie du château dont il fait remparer les terres-pleins et adosse contre l'épaisse courtine sud du grand bâtiment, un corps de logis, cantonné à l'est d'un pavillon, dit Pavillon Renaissance, portant autrefois la date de 1539. Il répare aussi certainement la Porte de Gard qui porte ses armoiries. La seconde campagne de construction complètera la précédente, par le réaménagement de la porte d'entrée au sud et des tours et par la construction au nord du pavillon Sévigné. Témoin du travail mené par   Les plus anciens vestiges, que sont les tours d'entrée, la barbacane, la porte du Gard et la tour Est, ne datent cependant que de la première moitié du XIVe siècle, peut-être sous Renaud de Picquigny ou de sa fille Marguerite qui, à sa mort, laisse la seigneurie à sa cousine, également prénommée Marguerite, seigneur de Picquigny, la façade de la cuisine porte sur l'un de ses pilastres la date de 1575 ainsi que les initiales entrelacées P.E.F.D.W. (Philibert-Emmanuel d'Ailly et Françoise de Warty, sa mère), et la voûte de cette cuisine porte dans un cartouche la date de 1583 (seul le dernier chiffre est encore visible). Passé en 1620 à Honoré d'Albert, duc de Chevreuses et de Chaulne, le château est  vendu le 27 avril 1774 à Pierre Bryet , à Liefman Calmer le 24 avril 1779, puis à Charles-Philippe, comte d'Artois, avant d'être finalement vendu comme bien national le 29 nivôse de l'an III. La dernière propriétaire, la comtesse Aymar de la Rochefoucault, lègue les ruines du château le 12 août 1912 à la Société des Antiquaires de Picardie.","architecture":"PICQUIGNY, les plus anciens vestiges, que sont les tours d'entrée, la barbacane, la porte du Gard et la tour Est, ne datent cependant que de la première moitié du XIVe siècle, peut-être sous Renaud de Picquigny. Le plan du château, dépourvu de donjon, suivait primitivement un tracé parallélépipédique irrégulier cantonné de tours aux angles et de part et d'autre de l'entrée méridionale, également précédée d'une fausse barbacane. Les vestiges du château ne comportent plus de toiture, hormis le pavillon Sévigné, dont le dernier étage est amputé pour former un faux attique et couvert d'une toiture en pavillon à tuiles plates. L'élévation comporte un niveau de sous-sol abritant les celliers voûtés en berceau plein cintre et passages souterrains. L'un d'eux aboutit à une prison logée dans la tour nord-est, voûtée en cul-de-four et voûtes d'ogives au profil chanfreiné. Le rez-de-chaussée était occupé par les salles de garnisons et les communs. La cuisine et l'arrière-cuisine, aménagées dans la tour Est de l'entrée, ont respectivement gardé une voûte d'arêtes à lunettes et un départ de voûte d'ogives. Les deux niveaux supérieurs d'étages carrés accueillaient la grande salle de réception et les appartements privés. Les pavillons étaient des organes de distribution logeant des escaliers droits maçonnés rampe sur rampe sur voûte en anse de panier. Au milieu du corps principal, une tourelle polygonale dans oeuvre comportait également un escalier à vis maçonné sans jour.\nÉléments protégés MH : les ruines du château de Picquigny : classement par arrêté du 11 septembre 1906.","habitants":"Famille de Philibert-Emmanuel d'Ailly \"","divers":"Picquigny GPS : 49° 56' 36\" Nord 2° 08' 28\" Est","gps":"49° 56' 36\" Nord 2° 08' 28\" Est","images":["../image/image_80/80_Picquigny_1.jpg","../image/image_80/80_Picquigny_2.jpg","../image/image_80/80_Picquigny_3.jpg","../image/image_80/80_Picquigny_4.jpg","../image/image_80/80_Picquigny_5.jpg"]},"Consult_chateau_formulaire6a0f":{"id":"Consult_chateau_formulaire6a0f","dept":"80","canton":"Ailly-sur-Somme","commune":"Pissy","nom":"Pissy","type":"Château","periode":"XVII","histoire":"PISSY, édifice représentatif des demeures seigneuriales de l'Amiénois aux XVIIe-XVIIIe siècles. Il a été reconstruit en briques à harpages et chaînages de pierre, en 1681, sur l'emplacement d'une ancienne maison seigneuriale. L'édifice présente la particularité d'avoir été élevé avec des pierres extraites d'une carrière creusée sous la cour d'honneur actuelle d'où un affaissement du sol à cet endroit, notamment au niveau des bâtiments de communs du XIXe siècle qui encadrent la cour. Cette carrière aurait permis de construire, dit-on, léglise et le beau colombier de plan octogonal. La carrière est à 14 mètres sous le niveau du sol, on y accède par un escalier partant de la cave sous le vestibule dentrée.  Éléments protégés MH : les façades et les toitures du château : inscription par arrêté du 22 mai 1989.","architecture":"PISSY, Mr ou Mme Bernard qui seront ravis de vous accueillir. La construction du château de Pissy date de 1680, il se situe, à l'entrée du village, en venant de Revelles. L'accès du domaine se fait par une avenue, bordée de platanes, et aboutit à une grille dhonneur du XVIIIe siècle, il est composé dun corps de logis à deux étages,Le corps central flanqué de deux ailes en retour d'équerre a été prolongé, au nord et au sud de deux ailes plus basses au cours du XVIIIe siècle,  avec un avant-corps central en saillie, flanqué de deux ailes en retour déquerre en brique et pierre et toits en croupes. Les communs, plus bas, la remise à voiture et écuries, ont été respectivement reconstruits en 1834 et 1842. Le château de Pissy est composé de brique et pierre et date du XVIIe siècle. Sa grille, de la même époque, est encadrée de 2 colonnes, accompagnée d'un saut de loup. Dans la cour, a été édifié un colombier en pierre qui date de 1681, de forme octogonal. La visite guidée commence par une présentation architecturale des bâtiments à l'extérieur et s'achève par la visite des 3 pièces principales à partir du hall d'entrée.","habitants":"Famille de M.Bernard\"","divers":"Pissy GPS : 49° 51' 34,07\" Nord, 2° 07' 35,94\" Est","gps":"49° 51' 34,07\" Nord, 2° 07' 35,94\" Est","images":["../image/image_80/80_Pissy_1.jpg","../image/image_80/80_Pissy_2.jpg"]},"Consult_chateau_formulaire6346-2":{"id":"Consult_chateau_formulaire6346-2","dept":"80","canton":"Gamaches","commune":"Vismes","nom":"Plouy","type":"Château","periode":"","histoire":"PLOUY,  le château du Plouy, qui se dresse au milieu d'un parc qui fut magnifique, est aujourd'hui inhabité et totalement abandonné. La dernière propriétaire du nom, Hélène du Plouy, y est décédée en 1931, sans alliance. Au cours de la deuxième guerre mondiale, l'édifice fut occupé successivement par les Anglais et par les Allemands.","architecture":"PLOUY, actuellement le domaine appartient à la famille Candas qui exploite la ferme, mais n'a pas pu effectuer la restauration du château tant son état de délabrement est grand et ce dernier est assurément condamné à disparaître dans un avenir plus ou moins proche ; pourtant il possède encore sa fière allure d'autrefois. Il se compose d'un corps de logis, de plan rectangulaire, dont l'élévation est à deux étages construits sur des caves creusées dans la craie à six mètres au-dessous du niveau du sol. bâti en brique avec quelques insertions de pierre. L'avant-corps central, légèrement saillant, est surmonté d'un fronton triangulaire percé en son milieu d'un il-de-buf. Deux autres ils de buf sont placés au-dessus de chacun des rampants de ce fronton. A cet avant-corps, la porte d'entrée, les deux fenêtres du rez-de-chaussée et les trois fenêtres de l'étage précédées de balcons en fer forgé sont en plein cintre. L'édifice est couvert d'un toit à la Mansart percé à la base de lucarnes à encadrement de bois dont le nombre correspond à celui des ouvertures de la façade en très mauvais état.","habitants":"famille Candas\"","divers":"Plouy GPS : 50° 00' 46\" Nord, 1° 40' 24\" Est","gps":"50° 00' 46\" Nord, 1° 40' 24\" Est","images":["../image/image_80/80_Plouy_1.jpg","../image/image_80/80_Plouy_2.jpg"]},"Consult_chateau_formulaireea12":{"id":"Consult_chateau_formulaireea12","dept":"80","canton":"Friville-Escarbotin","commune":"Vaudricourt","nom":"Poireauville","type":"Château","periode":"XVII","histoire":"POIREAUVILLE, en 1463, la famille de Rambures fait l'acquisition d'un manoir au hameau de Poireauville. Il s'agit de la partie la plus ancienne du château. Au cours du XVIIe siècle, la famille fait édifier dans le prolongement du manoir primitif, un bâtiment de style Louis XIII. À la fin du XIXe siècle, le propriétaire, le vicomte Louis de Rambures, conseiller général de la Somme, fait donner au château son aspect actuel avec notamment la construction d'un pavillon à l'extrémité Est de l'ensemble. Dans l'alignement de la rue, les communs et le mur de clôture en briques sont construits, eux aussi, au cours du XVIIe siècle. En 1641, Jephté de Rambures, seigneur, fait établir un temple protestant dans un moulin lui appartenant. Le synode de 1653 désigne la paroisse protestante d'Oisemont à Saint-Valéry sous le nom d'église \"dOisemont, de Saint-Valéry et de Poireauville\". Vaudricourt devient un haut lieu du protestantisme dans le Vimeu. Celui-ci accueille alors les fidèles de Saint-Valéry et de ses environs. En 1655, le synode ordonne au pasteur de cette paroisse dy passer un tiers de son temps. En 1664, l'évêché d'Amiens demande la destruction du temple de Poireauville, en application du traité de 1594 qui n'autorisait que l'érection de deux temples pour lensemble de la Picardie. Un arrêté du conseil d'état, en 1665, interdit l'exercice de la religion réformée, mais permet toutefois à la famille de Rambures de la pratiquer dans sa demeure dans la limite de trente personnes. L'office se tient alors dans un moulin, jusquen 1672. Un cimetière Huguenot est également mentionné par la société des antiquaires de Picardie, il y accueillait les sépultures des Rambures Poireauville, celui-ci se situait à proximité du manoir au hameau de Poireauville.","architecture":"POIREAUVILLE, la partie datant du XVe siècle, présente un pignon découvert à l'aplomb de la rue composé dans un appareil mixte brique et silex en damier. L'élévation nord dispose d'un gros-oeuvre en torchis et pan de bois. Ce corps primitif fait l'objet d'une protection au titre des M.H. À l'Est, un corps de bâtiment de style Louis XIII est accolé. Rythmée par neuf travées de baies rectangulaires, la verticalité de l'ensemble est accentuée par les chaînes de pierre harpées et les panneaux des pleins-de-travée traités en bossage. Les étages sont marqués par un bandeau courant sur l'ensemble de l'élévation. L'étage de comble est couvert par un toit à longs pans brisés. Il est éclairé par des lucarnes à fronton triangulaire. L'utilisation de la brique, la pierre peinte et l'ardoise met en valeur par contraste l'ensemble de l'édifice. Les deux corps principaux sont réunis à la même période par la construction d'un bâtiment en rez-de-chaussée couvert d'un toit à longs pans brisés. Le pavillon, à l'extrémité Est du corps principal, bien qu'édifié à la fin du XIXe siècle, suit le même style. Dans l'alignement de la rue, les communs présentent un gros oeuvre en briques et sont décorés par une arcature aveugle, une frise ainsi que des briques en ressaut en forme de croix. Ils sont couverts d'un toit à longs pans agrémenté de croupes et de coyaux.\nÉléments protégés M.H.: les façades et les toitures de la demeure du XVe siècle : Inscription par arrêté du 13 février 1979.","habitants":"Famille de Rambures\"","divers":"Poireauville  GPS : 50° 07' 20\" Nord, 1° 32' 45\" Est","gps":"50° 07' 20\" Nord, 1° 32' 45\" Est","images":["../image/image_80/80_Poireauville_1.jpg"]},"Consult_chateau_formulairec26c":{"id":"Consult_chateau_formulairec26c","dept":"80","canton":"Amiens","commune":"Pont de Metz","nom":"Pont_de_Metz","type":"Château","periode":"XIX","histoire":"PONT de METZ, un édifice qui comprend un bâtiment aligné sur rue, une cour et un jardin. Les matrices cadastrales indiquent que la propriété appartient à Henri Beaucousin, propriétaire à Amiens. Sur la parcelle B 280, se trouvent cour et bâtiment. Deux maisons y sont construites en 1849 et 1851. De nouvelles constructions sont réalisées en 1897 (un bureau) et en 1901 (un château d'eau, hors d'usage en 1930, et un hangar ouvert). En 1901, la propriété se compose d'une maison avec écurie, remise et sellerie, bureau et logement du jardinier. La maison est agrandie en 1913. Au sud une usine est construite en 1895. Selon le Dictionnaire historique et archéologique de Picardie (1919), le château moderne de Pont-de-Metz remplace un édifice plus ancien.\nL'édifice, implanté en parcelle traversante, comprend un bâtiment principal à usage d'habitation en retrait d'une cour antérieure avec parc boisé qui s'étend à l'ouest et au sud, un bâtiment secondaire aligné sur la rue du Château, au nord.","architecture":"PONT de METZ  La parcelle est close d'un mur ; un portail et une porte piétonne donnent accès à la demeure. Le bâtiment principal, construit en briques et couvert d'ardoises, est formé d'un corps central à sept travées et de deux pavillons à deux travées. Il compte un étage carré et un étage de comble sur cave et rez-de-chaussée surélevé. Des extensions en rez-de-chaussée sont visibles au nord-ouest et au sud. Les communs, construits en brique et couverts d'ardoises, sont disposés sur les trois côtés de la cour secondaire, prolongeant un bâtiment à étage à pignon sur rue. Date portée: 1833 sur le mur de clôture.","habitants":"Famille de  Henri Beaucousin\"","divers":"Pont_de_Metz GPS : 49° 49' 08\" Nord, 2° 12' 06\" Est","gps":"49° 49' 08\" Nord, 2° 12' 06\" Est","images":["../image/image_80/80_Pont_de_Metz_1.jpg","../image/image_80/80_Pont_de_Metz_2.jpg","../image/image_80/80_Pont_de_Metz_3.jpg"]},"Consult_chateau_formulaire6367":{"id":"Consult_chateau_formulaire6367","dept":"80","canton":"Abbeville","commune":"Pont-Rémy","nom":"Pont_Rémy","type":"Vestiges château","periode":"XV","histoire":"PONT-REMY, dès le haut Moyen Age, une forteresse défendait le passage de la Somme à cet endroit. Le château joua un rôle non négligeable pendant la guerre de Cent Ans : Édouard III y fut tenu en échec en 1346 avant la Bataille de Crécy. Sous Charles V, les Anglais boutés hors d'Abbeville y trouvèrent refuge, mais ils en furent chassés aussitôt par Guy de Luxembourg-Saint-Pol. En 1415, avant la Bataille d'Azincourt, ce fut le roi Henri V d'Angleterre qui échoua devant la résistance de Louis de Waucourt. En 1416, lempereur du Saint-Empire romain germanique Sigismond y séjourna. Cependant le duc de Bourgogne Philippe le Bon parvint à s'en emparer.  Le château fut reconstruit après 1421 et conserva son rôle de place forte pendant les guerres de religion. Au XVIe siècle, la reine Éléonore et le dauphin y logèrent en 1531, Henri II en 1549. Marie Stuart y fit sa dernière étape en France, en 1561 et Henri IV y passa en 1594. Au XVIIe siècle, Richelieu y coucha en 1638 mais le feu ayant pris dans le magasin à poudre de la garnison, il dut fuir de nuit, sur une barque. Au cours des invasions espagnoles, le logis fut incendié et le château perdit son rôle de place forte après la Paix des Pyrénées de 1659. C'est au début du XIXe siècle que le château fut reconstruit en style néogothique par le comte du Maisniel de Liercourt. Victor Hugo en fit un dessin en 1837. En 1955, le château qui était la propriété de la comtesse de Coux, fut vendu puis revendu à des propriétaires qui le laissèrent à labandon. Le château est protégé au titre des monuments historiques : inscription par arrêté du 8 janvier 1993.","architecture":"PONT-REMY  Forteresse médiévale construite au XVe siècle, comme en témoigne la tour ronde, réaménagée au XIXe siècle dans le style néo-flamboyant, Château chargé d'histoire de par sa position sur un petit ilôt d'eau qui lui a permis de résister en 1380 face aux anglais lors de la guerre de Cent Ans. En 1421 Philippe de Bourgogne s'empara de Pont Rémy et brula le chateau après un siège de six jours. Il a accueilli des personnages illustres : Henri IV, Richelieu et il abrita Marie Stuart de retour d'Ecosse. Le propriétaire actuel, M. Michel de Monicault, ne l'entretient plus depuis plus de dix ans et le château menace de s'effondrer ce qui est un sujet brûlant dans la commune et auprès des habitants du village. Une association voit le jour en 2007 afin d'étudier toute solution qui permettrait au propriétaire de revenir à la raison.  Du Moyen Age, le château n'a gardé qu'une grosse tour ronde couronnée d'un chemin de ronde à mâchicoulis avec deux salles octogonales voûtées. Le corps de logis de style néogothique s'élève sur trois niveaux encadrés par deux tours octogonales.\nDans la nuit du 13 au 14 août 2012, un incendie d'origine criminelle détruisit les toitures, les escaliers et les planchers. La commune de Pont-Rémy racheta le domaine en 2015.\nLa commune de Pont-Rémy s'emploie à consolider et à sécuriser les ruines et à mettre en valeur le parc de 3 ha. Les architectes paysagistes Delphine Miguet et François Marié travaillent sur ce projet","habitants":"comte du Maisniel de Liercourt\"","divers":"Pont_Rémy 50° 03' 17? nord, 1° 54' 13? est","gps":"","images":["../image/image_80/80_Pont_R%c3%a9my_1.jpg","../image/image_80/80_Pont_R%c3%a9my_2.jpg"]},"Consult_chateau_formulairea6a9":{"id":"Consult_chateau_formulairea6a9","dept":"80","canton":"Ailly-sur-Noye","commune":"Prouzel","nom":"Prouzel","type":"Château","periode":"XV","histoire":"PROUZEL,  le château passa par legs successifs, vers 1490, aux Le Scellier puis aux Villepoix, avant d'être vendu en 1696 par Charles de Villepoix à Adrien Creton, seigneur de Wiameville, conseiller du roi, à qui l'on doit la construction, en 1699 et 1700, du château actuel.  Louis-Joseph  Creton le légua à sa mort en 1777 à son neveu Louis-Joseph Gaillard seigneur de Boëncourt, dont la fille épousa le général de Lamoricière, Le domaine fut acquis en 1880 par le baron de l'Épine, arrière-grand-père du propriétaire actuel.  Le château de Prouzel se distingue par la hauteur de son étage, ses fenêtres et sa toiture à lucarnes. Un parc important lenvironne. Le château de Prouzel appartenait au général de Lamoricière qui y mourut en 1865. Christophe Louis Léon Juchault de Lamoricière, général de l'Armée Française, député de la Sarthe, ministre de la guerre de la Deuxième République en 1848,  s'était distingué  en Algérie, à la prise d'Alger en 1830  organiser le premier bureau arabe à la défaite du  d'Abd el-Kader expulsé en 1852 rentré en France en 1857 ou il fut résigné en             châtelain de Prouzel, décéda au château le 11/09/1865. Éléments protégés MH : le château de Prouzel et son parc : inscription par arrêté du 27 avril 1963.","architecture":"PROUZEL, la construction du château de Prouzel se trouve au Sud-Ouest d'Amiens. Une longue allée d'honneur à la Française conduit au château bâti en 1699,  occupé par les Allemands en 1940, l'intérieur subit pendant  cette période, de graves dégâts.  La construction du château, à l'emplacement d'une ancienne ferme médiévale, exclusivement en pierres, dressé au milieu dun parc de 12 ha, situé sur un plateau qui domine la Vallée de la Selle.  Le château est constitué  de plan rectangulaire   dun corps de logis flanqué de deux ailes en pierre alliant les styles XVIIe et XVIIIe siècle. L'édifice de style classique a été construit en pierre. Il s'élève sur deux niveaux surmontés d'un toit à la Mansard.  Aujourd'hui, si cette demeure a retrouvé son aspect d'origine, elle le doit au baron Gérard de l'Epine qui mit tous ses efforts à la restaurer de façon exemplaire. Une allée à la française mène au château à la fois simple, noble, harmonieux et discret. L'élévation est à deux étages pour alors que les deux ailes basses ont une élévation à un étage surmonté d'un toit à la Mansart.  Le château de Prouzel se distingue par la hauteur de son étage, ses fenêtres et sa toiture à lucarnes. Construit à la charnière de deux siècles, cette demeure est le reflet de tendances diverses, alors que les hautes toitures et les grandes fenêtres sont caractéristiques du XVIIe siècle, l'emploi exclusif de la pierre, l'appareillage à refends soulignant les angles des avant-corps et des ailes, et l'élévation élégante et équilibrée des façades le classeraient volontiers parmi les édifices du XVIIIe siècle.","habitants"
