truction remonte à la fin du XIVe siècle, avait pour but de protéger le château d'Apcher plus au sud. Aujourd'hui il est en ruine, pillé après la seconde guerre mondiale, il appartient aux évêques de Mende. En 1789,  le châtelain fuit le château.  En 1795, il est incendié par les révolutionnaires. Au XXIe siècle, la découverte des vestiges  est libre et gratuite.","architecture":"Les ruines du château de la Garde  qui ne possédait pas de remparts ni fossés conçut comme tour de guet, de forme carrée avec quatre tours d'angle, la courtine fortifié avec murs très épais, avec archères à ouverture circulaire, de forme triangulaire côté nord du XVe siècle, une \"barbacane\" est construite  pour renforcer la défense avec l'amélioration des armes de jet.","habitants":"Evêques de Mende\"","divers":"Vestiges du château de la Garde","gps":"","images":["../image/image_48/48_Albaret_Garde_1.jpg","../image/image_48/48_Albaret_Garde_2.jpg","../image/image_48/48_Albaret_Garde_3.jpg","../image/image_48/48_Albaret_Garde_4.jpg","../image/image_48/48_Albaret_Garde_5.jpg","../image/image_48/48_Albaret_Garde_6.jpg","../image/image_48/48_Albaret_Garde_7.jpg"]},"Consult_chateau_formulaire5cac":{"id":"Consult_chateau_formulaire5cac","dept":"48","canton":"Grandrieu","commune":"Allenc","nom":"Allenc","type":"Tour","periode":"XII","histoire":"TOUR du VILLARET, du XIIe siècle. Deux grands maîtres des hospitaliers de Saint-Jean-de-Jérusalem sont originaires de cet endroit: Guillaume et Foulques de Villaret. Ce dernier fit la conquête de l'île de Rhodes en 1309. C'est dans ce château que naît Guillaume de Villaret,  grand maître de l'ordre des chevaliers hospitaliers de Saint-Jean-de-Jérusalem. Son neveu, Foulques de Villaret, lui aussi né au château, sera son successeur. En 1561, l'héritier des Villaret, Jean II, est ruiné et contraint de vendre une grande partie de ses biens. Le château de Villaret est racheté par Jean Leblanc, juge royal de Nîmes et de Beaucaire. Lorsque sa fille se marie, le château devient ainsi propriété de la famille de Rets. Mais peu de temps après, les guerres de religions vont détruire une grande partie du château.  En 1875 la tour, seule subsistance du château, et le domaine sont vendus à la famille Reversat de Bagnols-les-Bains. Près d'un siècle plus tard, en 1973, les Reversat vendent l'ensemble à la famille de Villaret qui récupère ainsi ses propriétés. En 1979, la tour est inscrite aux monuments historiques.\r\nEn 1985 le domaine échoit à Jacqueline et Guillaume Sonnet, qui vont bâtir autour de la tour le parc à thème du vallon du Villaret, qui ouvre ses portes en 1993. La tour devient alors le centre des expositions qui y ont lieu chaque année.","architecture":"La tour du Villaret a été reconstruite à la fin du XVIe siècle, après avoir été détruite lors de graves conflits qui opposèrent catholiques et protestants. Elle est inscrite à l'inventaire supplémentaire des Monuments Historiques. Depuis son aménagement réalisé de 1992 à 1993, la tour du Villaret présente des expositions d'art contemporain. Un atelier d'artiste est implanté dans le vallon.   Cette tour du XVIe siècle. a été restaurée, bâtiment de base rectangulaire, haut de cinq niveaux avec peu d'ouverture à toiture brisée.","habitants":"Guillaume de Villaret               Famille de Jean Leblanc\"","divers":"Château de la tour du Villaret à Allenc et maison forte","gps":"","images":["../image/image_48/48_Allenc_1.jpg","../image/image_48/48_Allenc_2.jpg","../image/image_48/48_Allenc_3.jpg"]},"Consult_chateau_formulaireeed7":{"id":"Consult_chateau_formulaireeed7","dept":"48","canton":"Saint-Chely d","commune":"Prunières","nom":"Apcher","type":"Vestiges-Tour","periode":"XII","histoire":"APCHER  La première trace du château remonte à 1180, lorsque Garin ou Guérin de Châteauneuf, seigneur d'Apcher et co-seigneur de Châteauneuf-Randon, rend hommage à l'évêque de Mende Aldebert III du Tournel. Issu de la famille de Randon, Guérin avait épousé Alix d'Apchier, dernière héritière de la première famille d'Apchier. Dès le XIIe siècle, le Gévaudan a été partagé entre huit barons: Tournel, Randon, Peyre, Apchier, Canilhac, Cénaret, Mercoeur et Florac. Les 8 baronnies ont pu acquérir leur puissance du fait de la faiblesse de l'autorité royale et épiscopale de l'époque. Plusieurs Guérin d'Apcher furent célèbres; Guérin IV connu pour ses fondations pieuses , Guérin VI et Guérin VII pour leur luttes contre les Anglais, Béraud , fils de Guérin VIII se battit auprés de Jeanne d'Arc. Jean II en 1580 lutta contre les huguenots, son fils Philibert rallié à la ligue,  fut assassiné par Annet de Polignac. Marguerite d'Apcher  menait un grand train de vie  s'intéressa à l'hôpital de St-Chély, des Cordeliers, des écoles, son petit-fils, Charles de Crussol, vendit la baronnie, dont le marquis de Roquelaure en recueillit une belle part.\r\nLa baronnie d'Apchier possédait son château patrimonial à Apcher, avait été vendue en 1717 et ce qui restait après les guerres de religion de ce château était  entré dans les possessions des barons de Mercoeur.","architecture":"Ce donjon, dit tour d'Apcher, C'est encore aujourd'hui un donjon remarquable, carré, en partie garni de mâchicoulis est une construction de 12 m de haut capitale du patrimoine de la Baronnie.  la tour qui domine  le site et la campagne environnante pourrait dater du XIe ou du XIIe siècle. La tour carré a trois étages voûtés en berceau plein cintre ; elle est couverte en terrasse et garde une partie de son mâchicoulis.                    Les vestiges de la place forte comprennent aujourd'hui la tour, une chapelle, une glacière et un puits. Des fouilles archéologiques réalisées en 2000 et 2001 ont fait apparaître 2 tours d'enceinte et une salle. De cette époque date  probablement le coeur actuel et une partie de la nef. La base de l'abside semi-circulaire d'une église  antérieure a été dégagée à l'intérieur du coeur. La construction présente de nombreuses reprises : la porte d'entrée située au sud pourrait dater du XVe siècle ; l'élévation ouest et le clocher-mur sont du XVIe ou du XVIIe siècle.","habitants":"Famille d'Apchier\"","divers":"Donjon d'Apcher à Prunières et vestiges à Apcher et Arzens","gps":"","images":["../image/image_48/48_Apcher_1.jpg","../image/image_48/48_Apcher_2.jpg","../image/image_48/48_Apcher_3.jpg","../image/image_48/48_Apcher_4.jpg","../image/image_48/48_Apcher_5.jpg"]},"Consult_chateau_formulaire3e59":{"id":"Consult_chateau_formulaire3e59","dept":"48","canton":"Aumont-Aubrac","commune":"Aumont-Aubrac","nom":"Aumont_Aubrac","type":"Château","periode":"XVI","histoire":"Trois châteaux et une maison forte à Aumont-Aubrac, le château de Javols et à 6 Km le château du Barry, le château du Bois du Mont et la maison forte du Gros Viala.                                    JAVOLS appartient à la communauté de communes de la Terre de Peyre qui a été créée le 30 décembre 1996,  entre les destructions et les incendies, Javols s'est peu à peu dépeuplé. Si Javols a pu éventuellement accueillir l'évêché du Gévaudan, il est presque sûr que pendant le haut Moyen-Age celui-ci se trouvait dans l'une des deux villes. Ce siège épiscopal apportera par la suite beaucoup de richesses à Mende, aux dépens notamment de Javols, dont on a alors oublié que c'était la capitale du Gévaudan. Cette communauté  se situent sur une partie des anciens Peyre. Les dites communes sont les mêmes que celles que se présentent dans le canton d'Aumont-Aubrac. Le siège de cette communauté est d'ailleurs Aumont-Aubrac.","architecture":"Aumont-Aubrac Le bourg, autrefois fortifié, conserve des maisons des XVIe et XVIIe siècles, façades de pierre de taille, aux rez-de-chaussée voûtés s'ouvrant en arceaux.               Javols, en forme de U à trois niveaux.    Bois du Mont, de Prat Long et Moulin en contrebas de la ferme du Pont; bâtiment rectangulaire à deux niveaux accolés d'une tour carrée à toit pointu.\r\nMaison forte du Gros Viala de forme rectangulaire à trois niveaux  avec tour ronde en hors-oeuvre en façade.","habitants":"Seigneurs des Peyre\"","divers":"Vestiges dans Aumont-Aubrac A Javols le château du Barry, du Bois du Mont et la maison forte du Gros Viala","gps":"","images":["../image/image_48/48_Aumont_Aubrac_1.jpg","../image/image_48/48_Aumont_Aubrac_2.jpg","../image/image_48/48_Aumont_Aubrac_3.jpg","../image/image_48/48_Aumont_Aubrac_4.jpg","../image/image_48/48_Aumont_Aubrac_5.jpg"]},"Consult_chateau_formulaire2559":{"id":"Consult_chateau_formulaire2559","dept":"48","canton":"Langogne","commune":"Auroux","nom":"Auroux","type":"Château","periode":"XIII-XVII","histoire":"Deux châteaux à Auroux;  château de Fabrègues du XVIIe siècle, le château de Soulages du XIIIe siècle  et vestiges du château fort, évoquent le souvenir de deux importantes seigneuries.           FABREGUES,pas d'informations historiques. appartient aujourdhui à la famille de Lamarjorie.                               SOULAGES, la famille de  Guyon d' Agulhac son fils Pierre d' Agulhac, seigneur de Soulages et de Malmon, dans cette famille avec  Agulhac  de Soulages d' Auroux, son fils de feue Jeanne de Retz de Bressolles,  Maître Gaspard d'Agulhac, seigneur de Malmont et autres lieux, conformément à leur contrat, puis passa  à Affre Denis-Auguste (1793 - 1848) et  à Frayssinous Denis-Luc (1765 - 1841) Le château qui appartenait à la famille Morangiés, seigneurs de Saint-Alban, date du XVIIe siècle. Il a été restauré au XVIIIe siècle et percé de grandes fenêtres.","architecture":"Fabrèges,  sur la rive du Chapeauroux, le manoir et la chapelle de Fabrèges se cachent dans un parc ombragé. La chapelle, non loin du château, a été construite et décorée par Viollet-le-Duc en 1847.  Corps de logis rectangulaire, avec façade régulière sa longue muraille  à trois niveaux accolée aux angles de tours rondes, sur la partie arrière une tour ronde accolée à niveaux inférieur de l'ensemble flanqué de chaque côté de pavillon à un niveau et échauguettes. \r\nSoulages,   bien conservé, dans un beau cadre de verdure, domine la vallée boisée du Chapeauroux. En partie antérieur au XIIIe siècle, le nouveau datant de 1860. En fait, deux édifices coexistent : un édifice ancien (XIIIe et XVIe siècles) qui conserve une vieille tour dit donjon quadrangulaire couronnée de créneaux chemin de ronde sur mâchicoulis, trois étages habitables  et le rez-de-chaussée sont percés de nombreuses fenêtres de diverses époques, remanié au cours des ans et le dernier au XVIIIe siècle, bâtisse du XIXe siècle. La nouvelle partie est constitué d'un bâtiment rectangulaire à trois niveaux toitures en croupes accolés  d'une tour ronde à toitures en poivrière et des échauguettes en angles.","habitants":"Famille De Lamarjorie                    Famille de  Guyon d' Agulhac \"","divers":"Château de Fabrègues et de Soulages","gps":"","images":["../image/image_48/48_Auroux_1.jpg","../image/image_48/48_Auroux_2.jpg","../image/image_48/48_Auroux_3.jpg","../image/image_48/48_Auroux_4.jpg","../image/image_48/48_Auroux_5.jpg","../image/image_48/48_Auroux_6.jpg","../image/image_48/48_Auroux_7.jpg","../image/image_48/48_Auroux_8.jpg"]},"Consult_chateau_formulaire45b3":{"id":"Consult_chateau_formulaire45b3","dept":"48","canton":"Chirac","commune":"Balsièges","nom":"Balsieges","type":"Château","periode":"XIII","histoire":"Deux châteaux à Balseiges;  celui de Choizal et le manoir du Pont-Neuf.    BALSIEGES,  construit par l'évêque Odilon de Mercoeur en 1260, fut la résidence d'été des évêques mais aussi une place forte importante commandant le passage de la rivière. Aujourd'hui ruines du château fort construit au XIIe siècle par les évêques de Mende, le mandement de Balsièges comprenait les écarts de Bec-de-Jeu, Bramonas, Villaret, et Julhers ainsi que le château du Choizal et le village du Falisson.  Celui de Balsièges était d'ailleurs, avec le palais épiscopal de Mende et le château de Chanac, l'une de leurs résidences principales.                        CHOIZAL; au XIIIe siècle, le manse du Chauzal et son territoire font partie du domaine de l'évêque de Mende. La famille Pineton de Chambrun vend le domaine le 6 avril 1640 à Bernard Bardon, marchand de Mende.  La famille Bardon appartenait à l'ancienne bourgeoisie consulaire de Mende. Jean Bardon notaire était syndic de la ville en 1522. En 1689, la demeure appartient  à madame du \"Chauzal\" qui en fait hommage à l'évêque de Mende. Vendu en 1796 comme bien d'émigré, il est partagé en 1844 entre deux propriétaires. \r\nManoir du PONT-NEUF, ce quartier qui existait au début du siècle nest mentionné dans aucune documentation.","architecture":"Balsièges, le château a été rasé en 1580 par le capitaine Merle pendant les guerres de religions.                    Le château de Choizal construit au XIIIe siècle au début du XVIIe siècle en très mauvais état et reconstruit, l'aile ouest a été en partie détruite par un incendie et relevée au début du XXe siècle, la propriété comprenait  un circuit de terroir d'environ deux lieues de rond, maisonnage, cuisine voutée, chambres au dessus. C'est à Bardon que l'on doit sans doute la reconstruction de l'édifice à partir de 1661 (date inscrite sur le fronton de la porte d'entrée) ou à partir de 1665, selon le texte cité. Les bâtiments agricoles ne semblent pas antérieurs au XIXe siècle. Actuellement le château est constitué d'un corps de logis rectangulaire à trois niveaux accolé à droite comme à gauche de bâtiment  de dépendances avec en façade une tour ronde à quatre niveaux  avec mâchicoulis et chemin de ronde et toit à la chinoise.                          Manoir du Pont-Neuf corps de logis rectangulaire à deux niveaux accolé d'une tour ronde à toit incliné.","habitants":"Famille Pineton de Chambrun \"","divers":"Château de Choizal et manoir du Pont-Neuf à Balsièges","gps":"","images":["../image/image_48/48_Balsieges_1.jpg","../image/image_48/48_Balsieges_2.jpg","../image/image_48/48_Balsieges_3.jpg","../image/image_48/48_Balsieges_4.jpg","../image/image_48/48_Balsieges_5.jpg"]},"Consult_chateau_formulaired84c":{"id":"Consult_chateau_formulaired84c","dept":"48","canton":"La Canourgue","commune":"Banassac","nom":"Banassac","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux Banassac, le château de la Salelles du XVIe siècle(chambres d'hôtes) et vestiges de Montferrand du XIIe siècle.                              SALELLES, si des le XIe siècle une villa était présente aux Sallèles, le château ne daterait que du XVIe siècle. Le premier propriétaire connu, en 1524, est Antoine Bompars. Au XVIIIe siècle, le château devient une propriété des Yzarn de Fraissinet, également possesseurs du château de Saint-Saturnin. En 1808, il devient possession de la famille de Nogaret, suite à l'union de Louise Boudon de la Roquete et du baron d'empire Pierre Barthélémy Joseph de Nogaret.\r\nÀ la fin du XIXe siècle, une institution religieuse s'installe dans le château, entraînant de nombreux travaux. Les religieuses vendent la propriété en 2002. Le château devient alors un hôtel-restaurant.\r\nMONTFERRAND, vestiges  était la propriété et le siège des comptors de Montferrand, ayant sensiblement le même pouvoir que celui des autres barons du Gévaudan, et possédant un droit d'entrée pour les états particuliers. Les comptors étaient seigneurs sur le mandement de Saint-Germain-du-Teil.  En 1150, Hugues  et Guilabert de Montferrand en font hommage au vicomte de Gévaudan. C'est dans ce château que naquit Amphélise de Montferrand, aussi appelée sans doute à tort Amphélise de Sabran, mère du pape Urbain V. Place stratégique importante sur la route qui relie Mende au Rouergue il est connu dès la fin du XIe siècle comme fief du roi d'Aragon. Montferrand fort de Banassac. Une chapelle Saint-Pierre est mentionnée en 1239. Rattaché au XIIIe siècle au royaume de France, il sera le siège du commandement militaire du Gévaudan jusqu'à la Révolution.","architecture":"Le château de Salèlles du XVIe siècle, à la place du château est installée une villa. qui est devenue un château quau XVIe siècle. en forme de U, le corps de logis à trois niveaux à fenêtres rotondantes, deux retours en équerre avec accolé sur la droite d'une tourelle  et à l'opposé un pavillon carré à niveaux inférieur. Actuellement, grand domaine rural converti en château puis remanié au XIXe siècle.                           Les ruines du château de Montferrand du XII-XIVe siècle sont aussi des monuments de Banassac, les vestiges, constitués d'une tour, d'une portion de courtine, de la base des murs d'une salle rectangulaire et d'une porte située dans le village datent sans doute du XIIIe et du XIVe siècles. Le pont de Montferrand et le pont de Banassac sont aussi des patrimoines communaux.","habitants":"Famille de Nogaret                       Amphélise de Montferrand\"","divers":"Vestiges du château de Montferrand et château de Salelles à Banassac","gps":"","images":["../image/image_48/48_Banassac_1.jpg","../image/image_48/48_Banassac_2.jpg","../image/image_48/48_Banassac_3.jpg","../image/image_48/48_Banassac_4.jpg","../image/image_48/48_Banassac_5.jpg","../image/image_48/48_Banassac_6.jpg","../image/image_48/48_Banassac_7.jpg"]},"Consult_chateau_formulairee2b7":{"id":"Consult_chateau_formulairee2b7","dept":"48","canton":"Chirac","commune":"Barjac","nom":"Barjac_Chirac","type":"Château","periode":"XVI-XVII","histoire":"deux châteaux à Barjac  de la Vigne du XVIe siècle et celui des Recoulettes du XVIIe siècle.                          Les évêques de Mende maître de Balsièges et de Chanac les prenaient en tenaille et peu à peu les grignotaient. Son territoire s'étendait jusque dans les Gorges du Tarn.                    VIGNE,  Barjac abrite le château de la Vigne qui date du XVIIe siècle et actuelle propriété de la famille Saboulin-Bollena, ce territoire fut au Moyen-Age le siège de la baronnie de Cénaret, la plus petite des huit baronnies du Gévaudan.                            RECOULETTES, ce château à Barjac fut tenu par le vicomte de Lescure, par la famille d'Albert ou Atbert  jusqu'en  1468 nommé Recoulettes et Montméjan, puis passa aux Taurand et au Monbel.","architecture":"Mention d'un manse de la Vigne en 1331. Destruction du premier château en 1656 sur arrêt du parlement de Toulouse en représailles contre les seigneurs coupables de banditisme. Reconstruction dans le courant du XVIIe siècle englobant sans doute des vestiges du premier édifice. Au XIXe siècle, agrandissement  au sud, dessin du parc. Il a été agrandi  de forme quadrangulaire avec dépendances, le corps de logis rectangulaire à trois niveaux avec retour en équerre à deux niveaux à toits brisé. Aujourd'hui il ne reste rien des vestiges.      Recoulettes, situé au cur de la Lozère, entre Mende et Marvejols, Patrick et Nicole auront le plaisir de vous accueillir au domaine de Recoulettes transformé en chambres d'hôtes. Corps de logis rectangulaire à trois niveaux de construction classique  du XIXe siècle.","habitants":"Famille Saboulin-Bollena                 Famille d'Albert\r\n        \"","divers":"Château de la Vignes et de Recoulettes à Barjac","gps":"","images":["../image/image_48/48_Barjac_Chirac_1.jpg","../image/image_48/48_Barjac_Chirac_2.jpg","../image/image_48/48_Barjac_Chirac_3.jpg","../image/image_48/48_Barjac_Chirac_4.jpg","../image/image_48/48_Barjac_Chirac_5.jpg"]},"Consult_chateau_formulaireb694":{"id":"Consult_chateau_formulaireb694","dept":"48","canton":"Collet de Déze","commune":"Barre des Cevennes","nom":"Barre_Cevennes","type":"Château-Vestiges","periode":"XII","histoire":"Barre des Cévennes, était le siège de l'une des douze seigneuries gentilhommières du Gévaudan, donnant droit d'entrée aux états particuliers, vestiges d'un château   des sires d'Anduze, cité en 1052,  est mentionné le «château », propriété du seigneur dénommé Frédol.                                  Plusieurs châteaux ou maison forte, de la Balme, de la Barre et  de Vergougnou dont je n'ai pas d'informations historiques.   La BARRE, au XIe siècle apparaît, pour la première fois. La région fut particulièrement marquée par la révolte des Camisards au début du XVIIIe siècle.  La physionomie du bourg a peu changé. Les constructions modernes se dressent seulement à la périphérie de l'agglomération. Du XVIe siècle au début du XXe siècle 1831 Barre a absorbé les communes du Bousquet-la-Barthe et les Balmes. Jusqu'en 1958 Barre-des-Cévennes portait le nom de Barre. Cité cévenole, riche de tout son passé huit fois séculaire, de son authentique architecture conçue au fil des générations par ses seigneurs, ses chefs religieux, ses marchands, après avoir connu le déclin comme toutes les cités voisines, revient à la vie.\r\nLa Balme  et Vergougnou, je n'ai pas d'information historique.\r\nChâteaux ruinés de Terre-Rouge et du Castelas. Tout près du col de Jalcreste, cest Cassagnas, qui abrita Robert Louis Stevenson et son ânesse Modestine en 1878, Robert Louis Stevenson, né le 13 novembre 1850 à Édimbourg et mort le 3 décembre 1894 à Vailima, est un écrivain écossais et un grand voyageur, célèbre pour son roman L'Île au trésor, pour sa nouvelle l'étrange cas du docteur Jekylle.","architecture":"Barre des Cevennes, le château du seigneur de Barre était situé sur le promontoire au-dessus du village, les ruines du château situées juste au-dessus du cours de la Mimen. Ce fortin de pierres et de bois s'élevait à l'extrémité orientale de cette butte. C'est probablement dans la première moitié du XIIIe siècle que fut définitivement abandonné le castrum. Un document de 1265 mentionne le « château neuf » qui s'élevait au milieu de la localité.  Le château de la Barre édifié au XIIe et au XIIIe siècle, il fut entièrement reconstruit vers le début du XVIe siècle. De 1710 à 1715, il fut remanié par le seigneur de Barre qui fit graver ses armoiries au-dessus de la porte d'entrée. A cette époque, deux tours furent ajoutées. Pendant la Révolution de 1789, les armoiries disparurent, victimes d'un vigoureux martelage. Au début du XIXe siècle, la tour maîtresse fut supprimée lors d'un agrandissement.                         Balme, corps de logis en forme de U  à trois niveaux avec fenêtres à meneaux.    Vergougnou, corps de logis rectangulaire à trois niveaux  accolé en angles de deux tours rondes à quatre niveaux à toits style asiatique.","habitants":"Seigneur Frédol                       Robert Louis Stevenson\"","divers":"Château de la Balme et de Vergougnou à la Barre des Cévennes","gps":"","images":["../image/image_48/48_Barre_Cevennes_1.jpg","../image/image_48/48_Barre_Cevennes_2.jpg","../image/image_48/48_Barre_Cevennes_3.jpg","../image/image_48/48_Barre_Cevennes_4.jpg","../image/image_48/48_Barre_Cevennes_5.jpg","../image/image_48/48_Barre_Cevennes_6.jpg"]},"Consult_chateau_formulairebd62":{"id":"Consult_chateau_formulairebd62","dept":"48","canton":"Collet de Déze","commune":"Bassurels","nom":"Bassurels","type":"Maison forte","periode":"XVI","histoire":"Deux château à Bassurels, L'Hon et Poujol; pas d'informations historique à part celui de l'Hon, Bernard Cabannes, est gérant de l'entreprise  l'Hon  location de terrains et d'autres biens immobiliers de la Lozère, et de Poujol transformé en chambres d'hôtes de M. et Mme Chabannes.","architecture":"L'Hon, de plan rectangulaire à deux niveaux toiture en croupe accolé à l'ouest d'un bâtiment à un niveau et à l'est un donjon carré à toit pointu dépassant l'ensemble.                     Le château du Poujol se dresse sur un éperon rocheux au bout de la Vallée Borgne sur les confins nord du massif de l'Aigoual.  Le château s'est développé autour d'une tour médiévale et a été modifié au cour des siècles, au gré des besoins des petits seigneurs propriétaires pour devenir la maison maitresse d'un groupe de bâtis à vocation agricole, en forme d'équerre à trois niveaux, pavillons saillant sur la gauche avec tourelles à un étages accolée sur l'extérieur, à l'opposé une tour dépassant le bâtiment avec toiture style asiatique. Au milieu dun site grandiose et préservé du parc national des Cévennes.","habitants":"Seigneurs locaux\"","divers":"Château de l'Hon et vestiges Château de Poujol à Bassurels","gps":"","images":["../image/image_48/48_Bassurels_1.jpg","../image/image_48/48_Bassurels_2.jpg","../image/image_48/48_Bassurels_3.jpg","../image/image_48/48_Bassurels_4.jpg"]},"Consult_chateau_formulaire0319":{"id":"Consult_chateau_formulaire0319","dept":"48","canton":"Aumont-Aubrac","commune":"Prinsuéjols","nom":"Baume_Cevennes","type":"Château","periode":"XV","histoire":"LA BAUME, au Moyen-Age, la baronnie de Peyre était lune des plus puissantes  à régner sur le Gévaudan des huit baronnies possédait sept châteaux. Leur château fort ayant été détruit durant les guerres de Religion, les seigneurs de Peyre, Antoine de Grolée et son épouse  Marguerite de Soulages, décidèrent en 1630 de faire construire le château de la Baume et dy transférer le siège de la baronnie. Propriété de la famille de Las Cases depuis deux cents ans, le château de la Baume, habité toute l'année, ce château conserve le souvenir de mademoiselle de Fontanges Angélique de Scoraille favorite de Louis XIV. En 1630, Antoine de Grollée  baron de Peyre, et sa femme Marguerite de Soulages construisent une première partie du château, le tout dans un style austère. C'est leur cinquième fils, César de Grollée Virville, Bailli du Gévaudan puis Lieutenant-général du Roy pour le Languedoc, qui avec sa fortune dû à son rang, s'emploiera à faire de la Baume, un petit Versailles. N'ayant pas d'enfant, il choisit comme héritier le petit-fils de sa soeur Victoire, Antoine de Cardaillac qui eu deux fils qui s'installèrent un à la Peyre l'autre à la Baume, le dernier comte de Peyre qui léguera le domaine à sa cousine madame du Plessis-Châtillon qui vendra la Baume. Puis l'édifice est délaissé et en 1858, le sénateur  Casimir Mayran l'acquiert pour sa fille, la comtesse de Las Cases par alliance. Sylvie de Las Cazes , soeur jumelle de l'ancien président Valéry Giscard d'Estaing. Depuis, les différents propriétaires se sont évertués à restaurer et embellir ce château.","architecture":"Le château du XVe siècle a conservé une grande partie de son décor dorigine auquel se sont ajoutés ceux des familles qui sy sont succédé, ont découvre un bel ensemble où se mêlent le style rustique du Gévaudan du début du XVIe siècle avec celui plus raffiné du XVIIe, de plan quadrangulaire à trois corps de logis à deux niveaux et attiques flanqué de trois tours carrées aux angles et un donjon couvert de Lauzes avec chemin de rondes à mâchicoulis, influencé par des artistes venus dItalie et le travail des manufactures de Versailles. L'allure austère de ses murs de granits renferme donc un intérieur richement décoré en meubles, boiseries, tapisseries et tableaux, qui rendent ainsi justice au surnom qui lui a été accordé au fil du temps, le petit Versailles du Gévaudan. Tel qu'il nous apparaît aujourd'hui,  malgré son incendie  de 1586, de château médiéval en château résidentiel à la vaste façade accueillante, percée de nombreuses fenêtres, dans ces hautes terres situées à la limite de l'Aubrac,","habitants":"Famille d'Antoine de Grollée\"","divers":"Château de la Baume à Prinsuéjols","gps":"","images":["../image/image_48/48_Baume_Cevennes_1.jpg","../image/image_48/48_Baume_Cevennes_2.jpg","../image/image_48/48_Baume_Cevennes_3.jpg","../image/image_48/48_Baume_Cevennes_4.jpg","../image/image_48/48_Baume_Cevennes_5.jpg","../image/image_48/48_Baume_Cevennes_6.jpg"]},"Consult_chateau_formulaire240f":{"id":"Consult_chateau_formulaire240f","dept":"48","canton":"Saint-Etienne de Valdonnez","commune":"Bedoués","nom":"Bedoues","type":"Château","periode":"XIV-XVIII","histoire":"Plusieurs châteaux à Bédouès; celui d'Ariges du XVIIe siècle, de Chabrières gites d'étapes, d'Issenges du XVIIe siècle, de Miral du XIVe siècle et le Castel,  pas d'information pour ce dernier.                                 BEDOUES au cur dun pays minier et forestier de grande beauté, ce village dépendait de la baronnie de Florac. Cest le pape Urbain V, originaire de la commune, qui a fait construire la collégiale de Bédouès pour accueillir le tombeau de ses parents en 1363, sur le promontoire qui domine le village et le cours du Tarn. Elle sera fortifiée et protégée par une muraille, ravagée à la Révolution.                               ARIGES, actuellement laissé à l'abandon, le château a servi de lieu de tournage au film \"Scout toujours, (1985) de Gérard Jugnot\". Fut prison de 1807 à 1837 et hôpital.                              ISSENGES, il est décrit comme « la demeure plus désirable » de la Lozère par Renaud Camus, perfection des volumes, des accents, et des altières du paysage, sur les pentes les plus occidentales, ouvertes à l'ouest et au soir, du vaste massif du Lozère.                    MIRAL dorigine médiévale, au XVIIe siècles, la famille de Malbosc de Miral l'agrandit successivement. Lors de la Révolution Française la famille qui avait succédé aux Malbosc de Miral est condamnée à mort et le château vendu. Il tombe peu à peu en ruines, jusqu'à une action privée au début des années 1980 pour le remettre en état. C'est ainsi que le château est protégé par inscription aux monuments historiques depuis 1984.","architecture":"Ariges de plan en U  fenêtres à meneaux sur façades, construit sur la base d'un ancien château, corps de logis rectangulaire à trois niveaux et attiques,  flanqué d'une tour carrées à toit pointu, une autre se prolonge en chapelle ornée sur une de ses façades d'une haute fenêtre géminée de forme ogivale.                             Chabrières château féodal, a été construit sur l'emplacement d'un vieux château. Ce dernier étant trop en ruine, il a été remplacé par le château de Miral qui en est la copie, d'où le nom Miral qui signifie Miroir. Vestige de l'ancien château, des restes de murs et l'ancienne prison surplombent le village.         Miral; dominant le confluent du Tarn et de la rivière de Runes, le donjon du château de Miral fut construit à la fin du XIIIe siècle, mais il prend sa véritable dimension après les XVIe et XVIIe siècles,  entouré de remparts. Deux bâtiments du château; bâtiments du corps de garde, vestiges de l'enceinte extérieure avec les salles en sous-sol.   Issenges, cette maison forte sont les restes d'un château fort illustre un type de domaine rural seigneurial hérité du Moyen-Age,  L'ensemble est constitué de trois corps de bâtiments, le corps principal de plan presque carré et deux ailes longues et basses de communs qui enserrent une cour close. L'entrée s'effectue par un porche voûté, situé à l'angle sud du corps principal. Ce dernier devait présenter quatre échauguettes d'angle, une tour hors-oeuvre au centre contenant l'escalier à vis et une entrée couronnée d'un fronton. Cet aspect fortifié était renforcé par les bouches à feu et un chemin de ronde ou, du moins, une bretèche au-dessus de la porte d'entrée. Il n'en reste aujourd'hui qu'un corbeau. Les échauguettes ont été démolies et la tour centrale rabaissée. Les fenêtres à meneaux ont été conservées. Une pierre porte la date de 1624.","habitants":"Le pape Urbain V                       Famille de Malbosc de Miral \"","divers":"A Bédoués; château d'Ariges, château féodal de Chabrières, la maison forte de Miral, le manoir d'Issanges, le château de Ste Marthe et une collégiale.","gps":"","images":["../image/image_48/48_Bedoues_1.jpg","../image/image_48/48_Bedoues_2.jpg","../image/image_48/48_Bedoues_3.jpg","../image/image_48/48_Bedoues_4.jpg","../image/image_48/48_Bedoues_5.jpg","../image/image_48/48_Bedoues_6.jpg","../image/image_48/48_Bedoues_7.jpg","../image/image_48/48_Bedoues_8.jpg","../image/image_48/48_Bedoues_9.jpg"]},"Consult_chateau_formulaire026d":{"id":"Consult_chateau_formulaire026d","dept":"48","canton":"Saint-Chely d","commune":"Saint-Chely d","nom":"Billieres","type":"Château","periode":"XV","histoire":"BILLIERES, en 1363, pendant la guerre de cent-ans, le bourg est attaqué par les Anglais. Sous les ordres du baron d'Apcher, les habitants vont devoir livrer bataille. Le baron d'Apchier, Guérin VI, et son fils, Guérin VII, reviennent du siège de Saugues, à la frontière du Gévaudan et du Velay, où les habitants ont combattus les routiers. Les Anglais vaincus ont été enterrés au lieu-dit « la croix des Anglais » situé au nord de la ville. Cette croix représente un mouton et un étendard avec dessus une croix de Malte.\r\nÀ cette époque, le village s'est déjà doté de son château.\r\nLe Château de Billières fut construit vers 1450 par Béraud d'Apcher, baron d'Apcher. Son fils Jean (Jehan) d'Apcher, héritera de cette seigneurie, devenant le premier seigneur de Billières après son mariage avec Anne de Ventadour.","architecture":"Billières, au XIIIe-XIVe siècle  le village s'est doté de son château. Château de Billières construit du XVe siècle, corps de logis rectangulaire à trois niveaux  avec mâchicoulis en façade bien qu'il possédait quatre tours au XVe siècle il en reste deux rondes dont une toiture arasée et une tour octogonale saillante en façade pour les escaliers.","habitants":"Baron Béraud d'Apcher\"","divers":"Château de Billières à Saint_Chély d'Apcher avec sa tour","gps":"","images":["../image/image_48/48_Billieres_1.jpg","../image/image_48/48_Billieres_2.jpg","../image/image_48/48_Billieres_3.jpg","../image/image_48/48_Billieres_4.jpg","../image/image_48/48_Billieres_5.jpg"]},"Consult_chateau_formulaire0ffc":{"id":"Consult_chateau_formulaire0ffc","dept":"48","canton":"Saint-Etienne de Valdonnez","commune":"Lanuéjols","nom":"Boy","type":"Château","periode":"XIII","histoire":"BOY,  le Mas de Boy cité au XIIIe siècle, le domaine agricole est sans doute  à l'origine du nom curieux porté par l'édifice (Boy étant une déformation de bouvier). Possession du baron du Tournel en 1307. Pierre Charles de Morangiés, époux de Louise de Chateauneuf-Randon, héritière de la baronnie du  Tournel, le transforme à partir de 1758. C'est sans doute à lui  qu'il faut attribuer l'initiative de la construction de la façade ouest. En 1805, Alexandre Paul de Châteauneuf Randon vend le château à Dominique Eymard de Jabrun, à la mort de ce dernier le château est vendu en 1812 à un propriétaire de Marvejols, Jacques Jean-Louis Simon Malafosse. Le mobilier est en partie dispersé ou transféré par la famille Malafosse dans son hôtel de Marvejols. Vers 1920 le château devient propriété du sénateur Louis Bringer qui en donne la jouissance puis l'entière propriété à l'institution de la Providence pour la création d'une maison d'enfants,  aujourd'hui centre de soins. Etablissement de cures, de réadaptation et de convalescence.","architecture":"Boy; vaste quadrilatère plaqué au XVIIIe siècle devant une cour intérieure du début du XVIIe siècle  sur laquelle au premier étage donne une galerie éclairée par des fenêtres à meneaux. l'édifice aurait été fortifié en 1369. L'élévation nord présente des vestiges qui peuvent  dater du XIVe siècle: deux tours et une baie à remplage gothique. Ruiné pendant les guerres de religions il est  réparé et agrandi à la fin du XVIe siècle ou au début du XVIIe siècle où l'on bâtit  la galerie  intérieure. Il est formé d'un bâtiment à quatre corps entourant  une cour carrée. Chaque corps comprend deux étages carrés  sur rez-de-chaussée voûté en berceau. La galerie voûtée du rez-de-chaussée et celles des deux niveaux qui la surmontent ont sans doute été plaquées sur des élévations plus anciennes englobant les deux cages d'escalier  polygonales qui contiennent les escaliers en vis  desservant les différents niveaux. Le gros-oeuvre est fait de tuf calcaire, les toits à croupe des corps de bâtiment et les toits coniques des cages d'escalier  sont couverts de lauzes et de schiste. Construction à  partir de 1943  d'un bâtiment avec un solarium à l'emplacement d'une partie ruinée au sud-est du château.","habitants":"Famille de Pierre Charles de Morangiès\"","divers":"Château de Boy à Lanuéjols","gps":"","images":["../image/image_48/48_Boy_1.jpg","../image/image_48/48_Boy_2.jpg","../image/image_48/48_Boy_3.jpg","../image/image_48/48_Boy_4.jpg","../image/image_48/48_Boy_5.jpg","../image/image_48/48_Boy_6.jpg","../image/image_48/48_Boy_7.jpg"]},"Consult_chateau_formulaire0991":{"id":"Consult_chateau_formulaire0991","dept":"48","canton":"Saint-Etienne de Valdonnez","commune":"Brenoux","nom":"Brenoux","type":"Tour","periode":"XV","histoire":"BRENOUX, le nom de Brenoux pourrait signifier venimeux. En effet, une légende raconte qu'au IVe siècle un monstre vivait dans les marécages qui bordaient alors la Nize. Ce monstre, qui effrayait les habitants, était réputé venimeux. Les riverains auraient alors fait appel à un saint-ermite qui traversait le pays pour les débarrasser du monstre. Après avoir terrassé la bête, l'ermite aurait fait construire une chapelle sur le lieu de sa victoire. Le village qui se bâtit autour de la chapelle aurait alors pris le nom de Brenoux. Une autre hypothèse, moins légendaire, fait dériver Brenoux du mot gaulois Brenna, signifiant marécage. Brenoux a reçu le label « Pays d'Art et d'Histoire de Mende et Lot en Gévaudan ». Ce pays regroupe quatre communautés de communes: Cur de Lozère, Goulet-Mont Lozère, Valdonnez et Pays de Chanac, auxquelles s'est adjointe la commune du Chastel-Nouvel.","architecture":"Manoir dit tour de Langlade ou château de Langlade, il ne reste qu'une tour à trois niveaux toitures de lauzes incliné à un seul pans.\r\nChâteau de Préfontaine à  l'est de Langlade se dressait là aussi un petit château, ravagé par un incendie. Il reste également  qu'une tour ruinée.","habitants":"Seigneurs locaux   \"","divers":"Tour de Langlade et le pigeonnier de Venède à Brenoux","gps":"","images":["../image/image_48/48_Brenoux_1.jpg","../image/image_48/48_Brenoux_2.jpg","../image/image_48/48_Brenoux_3.jpg"]},"Consult_chateau_formulairec40a":{"id":"Consult_chateau_formulairec40a","dept":"48","canton":"Collet de Déze","commune":"Saint-Germain de Calberte","nom":"Calberte","type":"Château","periode":"XI","histoire":"Quatre châteaux à Saint-Germain de Calberte dont celui de Calberte du XIe siècle,  celui de Gibertin, de Crémat et de Déze.                           CALBERTE ou St-PIERRE, fief cité au XIIe siècle des sires d'Anduze qui succédèrent au XIIIe siècle  au seigneur de Randon. Au XIVe siècle propriété des Cadoines de Gabriac avant d'appartenir au XVIe siècle aux marquis de Portes. Ayant pris le parti de leur suzerain le comte de Toulouse, leurs biens et donc ce château furent confisqués par le Roi de France vers 1229, au terme de la croisade des Albigeois. Mais l'évêque de Mende et le roi se disputèrent longtemps la possession de la région. Un premier accord en 1265 le donne au roi. En 1307, après 36 ans de procès les opposant, l'acte de paréage le lui attribua définitivement. Le château reste la propriété directe des barons de Portes jusqu'en 1320 où Raymond de Cadoène le leur achète et leur rend hommage pour cela. Le château subit néanmoins les vicissitudes de la seigneurie de Portes: En 1322, celle-ci est vendue par Guillaume de Randon à la famille des Budos. Ceux-ci originaires de Guyenne prennent donc généralement le parti des anglais pendant la guerre de Cent Ans.  Il devient propriété de la famille Darnas en 1964. Aujourd'hui le château est presque entièrement restauré. Sa visite  est payante et permet ainsi de financer les travaux de débroussaillement.         GIBERTIN et CREMAT, pas d'information historique.\r\nDEZE, à quelques  kilomètre dans la commune du Collet de Déze  ruines d'un donjon relevant de la vicomté  de Portes  acquis au XIIe siècle par les sires de Randon.","architecture":"Ce château fort de Calberte est composé de plusieurs bâtiments: La construction du château aurait débuté au XIe siècle, mais il a pris sa dimension réelle au XIIe siècle.  Comme la plupart des châteaux de la région, celui de Calberte a dû probablement subir la menace des routiers pendant la guerre de Cent Ans. Le grand donjon carré, haut de 11 mètres, date du XIIe siècle. Un logis rectangulaire plus ancien lui est accolé. Celui-ci comporte deux niveaux, et au XIVe siècle lui ont été ajoutés des merlons, des créneaux ainsi qu'une bretèche au-dessus de sa porte. Quatre dépendances, une tour ronde et une chapelle castrale le complètent. Une première petite enceinte isole les bâtiments du château de ceux du village médiéval situé en contrebas sur le côté nord. Ce village est lui-même entouré d'une deuxième enceinte qui ferme le tout. L'accès principal se fait par la porte nord.\r\nLe château de Calberte fut abandonné sans doute au début du XVe siècle sans qu'on en sache les raisons et sombra peu à peu dans l'oubli.  Ses ruines ont servi de refuge lors des guerres de religions (fin du XVIe siècle) ainsi que pendant la guerre des camisards. Au XXe siècle, c'est sous le nom de château Saint-Pierre que les calbertois désignaient les restes du château désormais largement ruiné.\r\nCrémat, du XIXe siècle quadrilatère par ses dépendances à trois niveaux, une  tourelle en façade sur angle gauche.     Gibertin du XIXe siècle  à deux niveaux  avec tour ronde en façade toiture style asiatique.","habitants":"Famille de Guillaume de Randon\"","divers":"Château  de Calberte, de Crémat, de Gibertin, de Saint-Pierre, La tour de Calberte et les vestiges du château au colllet de Déze","gps":"","images":["../image/image_48/48_Calberte_1.jpg","../image/image_48/48_Calberte_2.jpg","../image/image_48/48_Calberte_3.jpg","../image/image_48/48_Calberte_4.jpg","../image/image_48/48_Calberte_5.jpg","../image/image_48/48_Calberte_6.jpg","../image/image_48/48_Calberte_7.jpg","../image/image_48/48_Calberte_8.jpg","../image/image_48/48_Calberte_9.jpg"]},"Consult_chateau_formulaire7922":{"id":"Consult_chateau_formulaire7922","dept":"48","canton":"Collet de Déze","commune":"Saint-Etienne-Vallée-Française","nom":"Cambiaire","type":"Château","periode":"XIV","histoire":"CAMBIAIRE, construction, par deux frères. Bernard et Pierre De Raymond de Calberte, a commencé en 1366, avec l'autorisation du vicomte de Beaufort, comte d'Alais. \r\nEn 1392 les châtelains achètent une partie des droits de justice de Saint-Étienne et en deviennent de ce fait les co-seigneurs. Jusqu'au XVIIIe siècle les Raymond sont régulièrement cités comme seigneurs ou co-seigneurs de Saint-Étienne et demeurent propriétaires du château. Celui-ci passe ensuite par alliance dans la famille Cabiron, l'autre grande famille noble du lieu. Le marquis Borelly de Roqueservières, qui épouse en 1746 l'héritière des De Raymond, possède toujours le château en 1789. En 1792 il est contraint,  par ses vassaux, de rendre les titres féodaux et de rembourser les redevances qu'il avait continué à percevoir mais contrairement à d'autres demeures nobles de la vallée, le château de Cambiaire ne subit pas de dégradations. L'une des descendantes du marquis, Jeanne de Cabiron, se marie avec le général marquis de Cambiaire donnant ainsi ce nom au château. À partir de 1873, elle le fait restaurer dans le style néo-médiéval de l'époque, lui adjoignant une chapelle (1875) et la reproduction de la grotte de Lourdes. Un pèlerinage et des manifestations catholiques s'y déroulent alors pendant quelques décennies. Il reste en ruine pendant plusieurs années. Le dernier baron de Saint-Étienne le vend. Ses nouveaux propriétaires le restaurent presque à l'identique, les toitures des tourelles du sud perdant cependant leur aspect élancé.\r\nLongtemps le château fut une propriété privée ne se visitant pas. Vendu en 2011, il a désormais une vocation touristique : gîtes, chambre d'hôtes etc.","architecture":"Ce château  de Cambiaire du XIVe siècle se dresse juste au-dessus du village de Saint-Étienne-Vallée-Française. C'est un bâtiment quadrangulaire comportant une tour ronde à trois de ses angles et une tour carrée à l'angle nord-ouest. Il se compose de trois ailes autour d'une cour fermée sur le côté ouest par un mur d'enceinte crénelé percé d'un portail. L'existence de tours et créneaux constitue des marques seigneuriales. La grande tour crénelée, qui fait office de donjon, est surmontée sur sa terrasse  d'une tourelle de guet avec un toit en forme de poivrière. Ce bâtiment carré construit en pierre de schiste mêlé de quartz blancs est le plus ancien. Il comporte trois niveaux, les deux premiers datent du XIVe siècle, le dernier niveau et l'escalier à vis proviennent d'une surélévation de la fin du XVe siècle. Cette tour semble plus ostentatoire que militaire.\r\nAu fil des siècles lédifice à été remanié, une chapelle a été édifiée dans le prolongement du donjon, et des clèdes pour lexploitation des châtaignes sont apparues.  \r\nDans la commune la maison forte de Marols, corps de logis rectangulaire avec tour carré.","habitants":"Marquis Borelly de Roqueservières\"","divers":"Château de Cambiaire, vestiges du Castellas, maison forte de Murols le manoir d'Elzet à Saint-Etienne Vallée Française","gps":"","images":["../image/image_48/48_Cambiaire_1.jpg","../image/image_48/48_Cambiaire_2.jpg","../image/image_48/48_Cambiaire_3.jpg","../image/image_48/48_Cambiaire_4.jpg","../image/image_48/48_Cambiaire_5.jpg","../image/image_48/48_Cambiaire_6.jpg","../image/image_48/48_Cambiaire_7.jpg"]},"Consult_chateau_formulaireb655":{"id":"Consult_chateau_formulaireb655","dept":"48","canton":"La Canourgue","commune":"Canilhac","nom":"Canilhac","type":"Vestiges","periode":"XI-XVI","histoire":"Vestiges du château fort du XIe siècle à Canilhac et le manoir des Clerges.        CANILHAC, siège dune baronnie puissante et la plus ancienne du vicomté du Gévaudan cité dès le XIe siècle dont cette famille fourni un cardinal en 1350, leurs possessions sétendaient aux confins du Gévaudan et du Rouergue.  Jacque-Timoléon de Montboissier (1594-), marquis de Canilhac,  Son château de Saint-Urcize fut rasé. Marié en 1624 avec Catherine Mathel, il a eu trois enfants : Guillaume de Montboissier, fils cadet, marquis de Pont-Château, sénéchal de Clermont. Marié à Michelle Rivière, on ne lui connaît pas d'enfant. Marie de Montboissier, mariée à Claude de Brezons, seigneur de La Roque-Massebeau, Charles-Timoléon, qui devint seigneur de Canilhac en conséquence de la condamnation à mort de son père, en 1666, marié en 1667 avec  Claire Hurault de L'Hospital, il eut une fille, dont on ignore ce qu'elle est devenue, et un fils: Philippe de Montboissier-Beaufort-Canillac, l'aîné, dernier seigneur de Canilhac. Il fut maréchal de camp en 1704, puis lieutenant général du roi pour le Languedoc, marié avec Louise d'Aubusson, on ne lui connaît pas d'enfant.   A la mort du dernier des Canilhac, Philippe, Lieutenant du roi en Languedoc en 1720, les terres sont dépecées et vendues.  Après sa mort, survenue à Paris le 29 janvier 1725, la seigneurie de Saint-Urcize sera vendue en 1727 par Alexis Rogery, avocat au parlement de Paris.                  Ferme château des CLERGUES, pas d'information.","architecture":"Canilhac, ruines d'un château fort du XIe siècle, l'implantation du château est remarquable sur les bords d'un plateau en surplomb d'une large vallée, entourée de falaises, il était accessible  par le sud est.  le château subit de gros déboires, en particulier en 1258 où Bernard  de Mercoeur assiégea les châteaux de Canilhac et  de Montferrand, le donjon comporte trois salles dont les planchers à structure de bois reposaient sur des retraits successifs de la maçonnerie. La salle basse est voûtée et dans la salle haute s'élève une cheminée en pierre rouge dite la \"Cheminée du capitaine\". On peut voir aujourdhui  le donjon restauré et  bâti en opus spictum ou arête de poisson.                             Ferme château des Clergues corps de logis rectangulaire donjon sur porte toiture en coupole, rénové dernièrement, transformé en chambres d'hôtes.","habitants":"Famille de Philippe de Montboissier-Beaufort-Canillac.\"","divers":"Vestiges du château de Canilhac et château des Clergues à Canilhac.","gps":"","images":["../image/image_48/48_Canilhac_1.jpg","../image/image_48/48_Canilhac_2.jpg","../image/image_48/48_Canilhac_3.jpg","../image/image_48/48_Canilhac_4.jpg","../image/image_48/48_Canilhac_5.jpg","../image/image_48/48_Canilhac_6.jpg"]},"Consult_chateau_formulairef3cd":{"id":"Consult_chateau_formulairef3cd","dept":"48","canton":"La Canourgue","commune":"La Canourgue","nom":"Canourgue","type":"Château","periode":"XII","histoire":"Cinq châteaux à la Canourgue  dont celui de la Canourgue du XVIIe siècle, de Montferrand du XIe siècle (voir article sur Banassac), de Montjezieu du XVIe siècle (voir article)et celui de Meylan et de Booz.                        CANOURGUE, Joseph de Finance de Clairbois, prêtre jésuite et philosophe. Céleste Albaret, domestique de Marcel Proust, née à Auxillac, commune aujourd'hui associée à La Canourgue.\r\nLes vestiges du château de Montferrand était la propriété des petits comtes de Montferrand.","architecture":"Canourgue;  vestiges d'un château fort  de Montferrand des vicomtes de Gévaudan cité au XIIe siècle. Le gros-oeuvre de l'ensemble, constitué par un appareil de moellons calcaires assisés semble indiquer que le corps principal, les deux tours et la tour pigeonnier qui lui donnent l'aspect d'un petit château, ont été construits au XVIIe siècle, ainsi que la porte d'entrée avec sa menuiserie. Un seul corps de bâtiment de plan  rectangulaire morcelé et en partie reconstruit, cantonné de deux tours couvertes de toit en pavillon. Au centre  se trouve une 3ème tour couverte d'un toit en appentis à pignon découvert abritant un pigeonnier au dernier  niveau. Le corps de bâtiment en aile à l'est, était couvert  d'un toit à croupe, il a été surélevé vers 1965. Les toits à longs pans sont couverts de lauzes calcaires posées sur l'extérieur des voûtes en berceau brisé des  combles. Une partie de la toiture avait été refaite en ardoise.","habitants":"Céleste Albaret                         Amphélise de Montferrand\"","divers":"Vestiges de Montferrand, le château de Meyllan, d'auxillac,  château moderne du Booz et patrimoine de la ville  de la Canourgue (tour)","gps":"","images":["../image/image_48/48_Canourgue_1.jpg","../image/image_48/48_Canourgue_2.jpg","../image/image_48/48_Canourgue_3.jpg","../image/image_48/48_Canourgue_4.jpg","../image/image_48/48_Canourgue_5.jpg","../image/image_48/48_Canourgue_6.jpg","../image/image_48/48_Canourgue_7.jpg","../image/image_48/48_Canourgue_8.jpg"]},"Consult_chateau_formulairefa1f":{"id":"Consult_chateau_formulairefa1f","dept":"48","canton":"Saint-Etienne de Valdonnez","commune":"Pourcharesses","nom":"Castanet_Morangies","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux à Pourcharesses celui de Castanet du XIIIe siècle et les vestiges du château de Morangiès          CASTANET, des  seigneurs d'Hérail, co-seigneur de la Garde-Guérin et vassal de l'évêque de Mende, qui possède le fief. Jusqu'en 1550,le fief va être reçue en héritage, en plus du prestigieux droit d'être affirmer de la Garde-Guérin. C'est Robert Brun qui est possesseur du domaine à partir de 1550, il va le vendre le 14 décembre 1571 à Jacques d'Isarn de Villefort seigneur de Coursoules. C'est ce dernier qui fait bâtir l'année suivante le manoir de Castanet. Il sera peu à peu agrandi ou enjolivé par ses descendants. Vers 1684, le château n'est plus qu'une place secondaire pour la famille d'Isarn. Jacques Joseph d'Isarn, l'héritier, a épousé Marie Suzanne de Valicourt, plus connue sous le nom de marquise de Villefort, sous-gouvernante des enfants de France de 1709 à 1744. En 1760, Jean-Louis Baldit, avocat à Villefort, rachète le château à Louis-François d'Isarn. Il le vendra en 1784 à Victorin Bonnet-Ladevèze, juge à Villefort. Après la Révolution, il est encore vendu, cette fois-ci comme bien national, à Théodore Borrely et Joseph André de Villefort suite à l'émigration de son ancien propriétaire pendant la Révolution. En 1932 c'est Joseph Piton qui acquiert le château, lequel deviendra un bien familial jusque dans les années 1960, et la menace de sa destruction. En effet, à partir de l'étude de 1956-1957 est construit le barrage de Villefort qui doit noyer une partie de la vallée dont le château. L'inscription du château à l'inventaire des monuments historiques en 1964, va empêcher sa destruction.\r\nChâteau de MORANGIES,  donation du château de Morangiès en 1410 à Jean de Molette.","architecture":"Castanet, manoir du XV-XVIe siècle,  logis rectangulaire avec tourelles d'angle équipées de bouche à feu. Les tours ont perdus leur couronnement. Il ne subsiste   qu'un seul corps de logis rectangulaire, double en profondeur, cantonné de trois tours circulaires et d'une tour d'escalier rectangulaire avec une cheminée à décor peint au premier étage. L'édifice se compose d'un rez-de-chaussée voûté d'arêtes et en plein-cintre, étages carrés, gros-oeuvre, granite et pierre de taille surmonté d'un toit à longs pans et appentis massé, avec schiste en couverture. Aujourd'hui, le château est cerné par le lac artificiel de Villefort, mis en eau en 1964. A cette occasion, démolition de l'enceinte  de la basse-cour.                        Château de Morangiès, abandon probable au XVIe siècle. Le site ne comprend plus aujourd'hui que des vestiges de murs et un bâtiment de plan carré. Porte plein cintre avec blason  martelé, sans doute  du XVIe siècle, une deuxième porte indiquant une reconstruction du début du XIXe siècle (date portée: 1811).","habitants":"Seigneur Jacques d'Isarn de Villefort\"","divers":"Château du Castanet sur le barrage de Villefort et vestige de Morengies avec tour carrée.","gps":"","images":["../image/image_48/48_Castanet_Morangies_1.jpg","../image/image_48/48_Castanet_Morangies_2.jpg","../image/image_48/48_Castanet_Morangies_3.jpg","../image/image_48/48_Castanet_Morangies_4.jpg","../image/image_48/48_Castanet_Morangies_5.jpg","../image/image_48/48_Castanet_Morangies_6.jpg"]},"Consult_chateau_formulaire073a":{"id":"Consult_chateau_formulaire073a","dept":"48","canton":"Chirac","commune":"Saint-Martin de Lansuscle","nom":"Cauvel","type":"Château","periode":"XIV","histoire":"A Saint-Martin de Lansuscle le château de Cauvel du XIVe siècle et la tour de Fontanilles.                              CAUVEL, château du XIVe siècle, la famille de Salin est enracinée en Ariège dans la région du Couserans. Elle se scinde en deux au XVIe siècle, la branche de Niar et celle de Saillan. Celle-ci s'installe au début du XVIIIe siècle à Saint-Germain-de-Calberte, dans le château de Polastron, puis devient propriétaire par mariage du château du Cauvel situé dans la commune de Saint-Martin-de-Lansuscle.  Ses membres sont essentiellement des militaires;  Philippe  de Saillan, officier au régiment de Bretagne, époux de Julie de Verdeilhan des Molles; Pierre-Philippe, marquis de Saillan, page de la grande écurie du roi de 1761 à 1764, officier au régiment d'Aquitaine de 1764 à 1770, chevalier de Saint-Louis, capitaine de la garde nationale de Mende en 1792, émigré, époux de Marie-Christine de Vareille, dame du Cauvel;  Camille-Joseph-Hillarion (1779-1836), capitaine d'infanterie, chevalier de Saint-Louis, époux de Marie Caroline de Cadolle (1771-1810), puis de Marie Julie Aglaé de Charrier-Moissard;  Charles-Philippe-Camille (1799-1875), enrôlé dans les volontaires royaux de la Lozère en 1815, lieutenant au 8e régiment de ligne jusqu'en 1830, chevalier de la Légion d'Honneur, juge de paix du canton de Saint-Germain-de-Calberte, époux de Louise Wilhelmine de Girard de Coëhorn. C'est le fils de ce dernier, Henri-Camille-Émile, qui vend à la fin du XIXe siècle le château du Cauvel à ses métayers. La famille de Saillan émigre par la suite en Afrique du Nord.\r\n Transformé en chambres d'hôtes et gites d'étapes.                                 Château de Fontanilles vestiges du château des vicomtes du Gévaudan acquis par l'évêque de Mende en 1265. la famille Calvet, seigneurs de Fontanilles.","architecture":"Cauvel du XIVe siècle belle architecture d'une petite seigneurie cévenole,  corps de logis  principal rectangulaire à deux niveaux toiture en croupes flanqués d'échauguettes en angles.             Près du hameau de Cauvel, vestiges d'un donjon du château de Fontanilles; la porte étroite surmontée d'un arc en plein cintre, donne accès à l'intérieur de la tour qui présente une chapelle avec abside romane et voûte en berceau. Cette pièce fort occultée parait en accord avec l'esprit religieux;  la porte , qu'une ouverture une fente formant meurtrière de l'extérieur largement ébrasée à l'intérieur, construite en petit appareil de schiste, la tour est vouée à une double fonction; religieux militaire  et servi de signaux serait du XIIe siècle.","habitants":"Famille de Philippe  de Saillan,\"","divers":"Vestiges du château de Fontanilles, du château de Cauvel et de la maison forte des Abrits à Saint-Martin de Lanescule","gps":"","images":["../image/image_48/48_Cauvel_1.jpg","../image/image_48/48_Cauvel_2.jpg","../image/image_48/48_Cauvel_3.jpg","../image/image_48/48_Cauvel_4.jpg","../image/image_48/48_Cauvel_5.jpg"]},"Consult_chateau_formulairecb8c":{"id":"Consult_chateau_formulairecb8c","dept":"48","canton":"Grandrieu","commune":"Chambon le château","nom":"Chambon_Chateau","type":"Forteresse","periode":"XIV","histoire":"CHAMBON le CHATEAU, Le  fort, dit aussi « de Rochefort », M. de Rochefort était un preux chevalier de Saint-Louis qui avait fait les guerres  dAmérique avec Lafayette. On sait que celui-ci avait échappé de peu au démantèlement en 1419, Jean dApcher, gouverneur du Gévaudan pour le roi Henri III, aurait-il alors sanctionné loccupation du site par des huguenots partisans de Mathieu Merle.\r\n Sept maisons seigneuriales sy succédèrent: de Chastels de Beaumont, de Capellis, de Ponsonnailles, de Longeviale, de Lahondès de Laborie.  Le général Auguste Chirac natif du Chambon et ami proche des de Capellis alors propriétaire le décrit ainsi : « Ce donjon dont le nom est très bien justifié par la solidité de sa position assis quil est au milieu dun riant bassin, bien abrité des mauvais vents par un coteau circulaire très élevé, Le vingtième siècle fut témoin dun délabrement des lieux, bientôt de leur abandon et finalement de la vente en 1972 du château et des terres attenantes à M. Lafage qui semploya aussitôt à le restaurer. Cest aujourdhui une imposante mais élégante bâtisse. Un mur véritable chef duvre de maçonnerie réalisé par les compagnons du tour de France, constitue lenceinte du château lui-même, de ses dépendances, de ses cheminements, de ses arbres séculaires, de son jardin.","architecture":"Le château du fort du XIVe siècle, la construction débuta au XIV siècle. Il fut lobjet de travaux successifs tant et si bien que lon ne peut parler dachèvement avant le XVIII siècle.  Le château Chirac. Le château de la Place. Manoir\r\nCHAMBON napparaît que comme un lieu-dit pourvu dune chapelle et dun château, déjà à létat de ruine. Beaucoup de châteaux donc pour ce seul village : un premier ruiné, abandonné, disparu, remplacé en 1874 par un pensionnat des frères des écoles chrétiennes, un second amputé dune de ses tours mais réhabilité, entretenu, ouvert à la vie de la place, et enfin le château du fort bien dans ses pierres, bien dans son parc et son remarquable mur denceinte. Assez pour avoir choisi, en toute simplicité, de sappeler en 1893, à la demande de ladministration des postes et télégraphes Chambon le Chateau.","habitants":"Général Auguste Chirac\"","divers":"Forteresse à Chambon le Château et le château de la Place.","gps":"","images":["../image/image_48/48_Chambon_Chateau_1.jpg","../image/image_48/48_Chambon_Chateau_2.jpg","../image/image_48/48_Chambon_Chateau_3.jpg","../image/image_48/48_Chambon_Chateau_4.jpg"]},"Consult_chateau_formulaire067f":{"id":"Consult_chateau_formulaire067f","dept":"48","canton":"Saint-Etienne de Valdonnez","commune":"Altier","nom":"Champ_Altier","type":"Château","periode":"XIII","histoire":"ALTIER, vestiges du Grand Altier on ne saura sans doute jamais qui a donné son nom à l'autre, du village d'Altier ou du ruisseau qui le baigne,             CHAMP,  propriété familiale, et fut toujours transmis aux héritiers les plus directs, le plus souvent par les femmes, et ce depuis son édification jusqu'à la fin du XVIIIe siècle. Le château figura depuis sa construction et pour trois générations dans la maison d'Altier (1308-1375), l'une des plus anciennes familles du Gévaudan. Elle s'est éteinte au XIVe siècle dans une branche de la famille de Borne, par le mariage en 1375, du damoiseau Armand de Borne avec Delphine d'Altier, fille unique de Raymond d'Altier. Il en résultera la création d'une nouvelle maison, les Borne d'Altier (1375-1828), solidement implantée au Champ pour une bonne douzaine de générations et porteront les titres de Comte d'Altier et de marquis du Champ . Il fut vendu en 1668 par les vicomtes de Polignac, successeurs des Randon, à la famille Borne d'Altier  en 1796 toujours dans la famille. Après la Révolution, en 1812, le dernier descendant des Borne d'Altier mourut sans postérité après avoir racheté le Champ à sa tante, qui l'avait elle-même racheté à l'administration. La succession, (Charles Elisabeth Michel de Borne d'Altier, émigré à l'étranger en juin 1793), car il n'existait plus civilement, arriva donc au petit cousin Jules de Chapelain, sous-préfet de Marvejols. La famille Chapelain (1812-1905) a conservé la propriété du Champ tout au long du XIXe siècle. À la troisième génération des Chapelain, Joseph baron de Chapelain de Gras Saint-Sauveur marquis du Champ n'eut que trois filles: L'aînée, Elisabeth qui transmis le nom (1899), se maria à Alfred Gaspard comte de Gourcy-Récicourt, décéda, ses enfants seront déshérités du château au profit de sa petite sur, Marie Margueritte mariée à Maurice Raguenet de St-Albin et le Champ passa donc successivement aux Raguenet de Saint-Albin (1905) puis aux Gourcy-Récicourt qui le rachète suite à la faillite des précédents (1919). Le 29 septembre 1928, Joseph Varin d'Ainvelle qui avait épousé la comtesse Elizabeth de Gourcy-Récicourt racheta le château du Champ.","architecture":"Altier, nef ancienne à berceau brisé, plein cintre. L'abside gothique fut reconstruite au XVIIe siècle. Portail roman s'ouvrant au sud. Cela n'empêchait point qu'il soit pillé pendant les guerres de Religion. Il n'en subsiste que les ruines, à 500 mètres au nord-est du village;  En 1942, il sera inscrit à l'inventaire des monuments historiques.   Champ, ce château du XIIe siècle. Les seigneurs d'Altier possédaient un château au lieu-dit \"le Grand Altier\". Ce n'est qu'au XIIIe siècle qu'un des fils cadet de la famille Altier fit construire une maison forte au lieu-dit \"le Champ\". Puis au XVe siècle et au XVIIe, de plan quadrangulaire formé par des logis disposés autour d'une cour, flanqués de tourelles circulaires, le château sera ensuite agrandi. Abandonné au XVIe siècle, ce n'est qu'à partir du XIXe siècle qu'il sera restauré. Il présente un aspect de type militaire avec des tours couronnées de mâchicoulis à toits superposés en poivrières.","habitants":"Famille d'Armand de Borne d'Altier\"","divers":"Château de Champ à Altier et vestiges du Grand Altier","gps":"","images":["../image/image_48/48_Champ_Altier_1.jpg","../image/image_48/48_Champ_Altier_2.jpg","../image/image_48/48_Champ_Altier_3.jpg","../image/image_48/48_Champ_Altier_4.jpg"]},"Consult_chateau_formulaire8646":{"id":"Consult_chateau_formulaire8646","dept":"48","canton":"La Canourgue","commune":"Chanac","nom":"Chanac","type":"Patrimoine châteaux","periode":"XIII-XVI","histoire":"A Chanac tours et vestiges, château du Villard, de Malavieille et de Ressouches du XVIe siècle (voir article).            CHANAC; construction du donjon entre 1196 et 1213  pour l'évêque de Mende propriétaire du lieu à partir de 1213. Au XVIIe siècle, l'évêque transforme le château en résidence d'été:  Le 24 août 1696 un grand incendie ravage le château et les habitations de Chanac. François-Placide de Baudry de Piencourt, alors évêque, fera réparer la forteresse et lui apportera un meilleur confort. Monseigneur de Piencourt fera également aménager la glacière du château. Cette tour étant en effet remplie de blocs de glace provenant du Lot, à partir de 1767 l'évêque possesseur château sera Jean-Arnaud de Castellane. En 1790 c'est dans le château de Chanac qu'il se réfugie pour fuir la Révolution. Il y restera deux ans avant de tenter de s'enfuir. Il sera repris et assassiné avant d'avoir pu quitter la France. À sa mort, les révolutionnaires garderont le château.                          MALAVIEILLE pas d'information historique.                             VILLARD pas d'information historique.","architecture":"Chanac, fortement endommagé en 1562 pendant les guerres de religion, l'édifice est réparé et agrandi en 1580, construction d'un logis et de dépendances surnommés le Petit Versailles. Tous les bâtiments ont disparu dans l'incendie du 2 juin 1793 à l'exception  du donjon médiéval. L'implantation des terrasses et  les noms donnés aux parcelles permettent de localiser  l'emprise première  du château fort. Dans le village la tour de Vielle-Vigne, de Redonde, tour de l'Horloge  et le donjon présente 3 niveaux voûtés en berceau plein cintre dont un disparu,  desservis par des escaliers droits construits à l'intérieur des murs. Le château de Chanac a connu de multiples changements dans sa forme et dans sa fonction, le donjon est le seul vestige de l'édifice qui brûla le 2 juin 1793 et qui fut l'un des châteaux les plus importants en Gévaudan.                                 Malavieille, construction probable d'un premier château au XVIe siècle, la destruction presque totale à l'exception de la tour d'escalier, reconstruction à la fin du XVIIIe siècle ou au début  du XIXe siècle, le corps de logis indépendant  avec tour d'escalier couverte d'un toit conique, à élévation à travées régulières et deux étages carrés sur rez-de-chaussée voûté en berceau. Ferme composée  de plusieurs corps de bâtiment dont un moulin désaffecté, toit à longs pans brisés et à croupe sur l'ancien moulin.                   Villard, un mur d'enceinte du XIVe siècle, comprenant une porte fortifiée, délimite une esplanade où se trouvent les restes d'un donjon plus ancien, un bâtiment très remanié, une construction datant du XVe siècle, dite \"le presbytère\", présentant une tour d'escalier hors-oeuvre.","habitants":"François-Placide de Baudry\"","divers":"Maison forte  et vestiges de Villard Vieux, de Malavieille, le donjon, la tour de l'horloge,  la Rotonde, la tour de Vieillevigne, la porte et les remparts","gps":"","images":["../image/image_48/48_Chanac_1.jpg","../image/image_48/48_Chanac_2.jpg","../image/image_48/48_Chanac_3.jpg","../image/image_48/48_Chanac_4.jpg","../image/image_48/48_Chanac_5.jpg","../image/image_48/48_Chanac_6.jpg","../image/image_48/48_Chanac_7.jpg","../image/image_48/48_Chanac_8.jpg","../image/image_48/48_Chanac_9.jpg"]},"Consult_chateau_formulaire535c":{"id":"Consult_chateau_formulaire535c","dept":"48","canton":"Florac","commune":"Montbrun","nom":"Charbonieres","type":"Château","periode":"XIII-XVI","histoire":"CHARBONIERES,  du XIIIe au XVIe siècle, le manoir de Charbonnières appartient aux Montesquieu. Vers 1493 Louis de Montesquieu, dit de Charbonnières, était moine de Ste-Enimie. En 1582 François Merle, surnommé Rohan, abandonne Quézac moyennant une forte indemnité. L'année suivante, à la tête d'une soixantaine de rebelles, il surprend Charbonnières et s'y fortifie. Puis il pille le château de Mallevieille dont il capture le seigneur. Après trois mois de siège,  mais le blocus échoua contre une poignée de bandits. On entame des pourparlers. D'Albignac se montre très arrogant et se voit accorder une rançon de 500 écus et la liberté de sortir de la place avec les honneurs de la guerre. Le seigneur de Gilbertès se montra peu reconnaissant de la reprise de son château. Il refusa de payer la moitié de l'indemnité. On fit saisir ses biens, et les états décrétèrent la ruine du vieux manoir.\r\nCe fortin fut complètement détruit à cette époque, C'est peu probable puisqu'il existait apparemment encore en 1621 et 1724 . Mme de Vareilles reçut en effet, en 1622, 90 livres pour y entretenir 3 soldats pendant 3 mois .","architecture":"Château de Charbonnières dit petit manoir du XIIIe siècle, restauré à l'identique et qui domine le Tarn.                 Carbonnières de la famille de Montesquiou du XIV au XVe siècle et des Volonzac-Malespina du XVII au XVIIIe siècle, et en 1828 à la famille Boutin toujours dans la descendance.  En forme de U à trois niveaux accolés d'une tour carrée sur l'arrière droit.","habitants":"Famille de  Louis de Montesquieu\"","divers":"Château de Charbonnières à Montbrun","gps":"","images":["../image/image_48/48_Charbonnieres_1.jpg","../image/image_48/48_Charbonnieres_2.jpg","../image/image_48/48_Charbonnieres_3.jpg","../image/image_48/48_Charbonnieres_4.jpg","../image/image_48/48_Charbonnieres_5.jpg"]},"Consult_chateau_formulaire17ce":{"id":"Consult_chateau_formulaire17ce","dept":"48","canton":"Grandrieu","commune":"Chateauneuf de Randon","nom":"Chateauneuf_Randon","type":"Vestiges-Château","periode":"XII","histoire":"A Châteauneuf de Randon, les vestiges du château du XIIe siècle.         CHATEAUNEUF de RANDON, place forte médiévale bâtie par les Randon sur la route de Mende vers 1150, elle est la seconde résidence des barons de Randon après avoir déménagé du château de Puech David. La baronnie dominait toute cette partie de la Margeride, barrée au nord-est par les Peyres, avec qui les querelles ont été fréquentes, et par les Mercur et au sud par les barons du Tournel. Sous la protection des Randon se trouvait donc toute la plaine de Montbel et la forêt de Mercoire qui sont visibles depuis le promontoire Châteauneuf-de-Randon était alors l'un des nombreux châteaux de la région détenus par les Anglais et le refuge de nombreux pilleurs qui s'attaquaient aux pays du Velay. En arrivant au Puy, en mai 1380, la population demande alors à Du Guesclin de s'attaquer à Châteauneuf,  vers 1632, le roi Louis XIII ordonne que l'on démantèle les châteaux de Luc, Grèzes et Châteauneuf. On utilisera les restes du château pour construire l'église du village et une partie des habitations.    AURANCHET à Arzen-de-Randon monsieur Trauchessec y fait un élevage de Bovins.","architecture":"Au nord-ouest, subsistent les ruines d'une tour du XI le siècle de l'ancien château appelée « Tour des Anglais » construit au XIIe siècle,  vestiges de la Tour des Anglais, la citadelle  était vraisemblablement en forme de losange, les angles étant situés pour l'un au niveau du calvaire, un autre étant le donjon de la Tour des Anglais, au sud vers l'entrée de la citadelle et à l'est en opposition avec la tour. Elle servit aux XVe et XVIe siècles de refuge pour les habitants alentour en cas de mauvaise période. C'est à ce moment-là que Châteauneuf a alors englobé les lieux-dits à ses pieds, l'Habitarelle et les Combettes planes entre autres.     Arenchet, corps de logis rectangulaire à trois niveaux et quatre travées toitures en croupes flanquée d'échauguettes aux angles.","habitants":"Les barons de Randon\"","divers":"Vestiges du château dit tour des Anglais à Châteauneuf de Randon  et le château d'Auranchet à Arzenc de Randon","gps":"","images":["../image/image_48/48_Chateauneuf_Randon_1.jpg","../image/image_48/48_Chateauneuf_Randon_2.jpg","../image/image_48/48_Chateauneuf_Randon_3.jpg","../image/image_48/48_Chateauneuf_Randon_4.jpg","../image/image_48/48_Chateauneuf_Randon_5.jpg"]},"Consult_chateau_formulaire7835":{"id":"Consult_chateau_formulaire7835","dept":"48","canton":"Marvejols","commune":"Ribennes","nom":"Combettes","type":"Manoir","periode":"XVI","histoire":"COMBETTES, histoire du lieu attachée à la mémoire de Jourdan de Combettes, maire de Mende pendant la Révolution et à celle de Rivière de Larque, fondateur du département de la Lozère. Ensemble pittoresque, toute l'évolution des remaniements effectués dans le domaine se fait dans le respect de l'architecture.   CHEMINADE à Ribennes qui fut aux Moré de Charaix au temps de la Révolution et jusqu'en 1880. Son dernier héritier, le chanoine Charles Isidore le vendra  passa aux Combettes, aux Talensier, aujourd'hui aux Ceyrac.","architecture":"Situé à 1000 mètres d'altitude en Margueride, le château de Combettes surplombe forêt et pature, corps de logis à quatre niveaux et attiques, pavillon central en façade avec bretèches sous toits et échauguettes carrées en angles. La ferme moderne construite au début du XXe siècle d'après des recueils de modèles est adaptée au contexte local, prend en compte l'existant et réussit son intégration.\r\nEdifice caractéristique de l'habitat rural de la Margeride avec une grande ferme constituée de bâtiments disposés autour d'une vaste cour presque entièrement fermée, à laquelle on accède par un passage couvert. Le gros oeuvre du logis, la tour d'escalier en vis et les encadrements de fenêtre pourraient dater du XVIIe siècle, de même que les décors peints de poutres et les cheminées. Quelques éléments du logis pourraient dater du XVIe siècle.           Cheminade, bâtiment en forme de  T  transformé par la famille Seguin  en GAEC, groupement agricole d'exploitation en commun est active depuis 4 ans, elle est spécialisée dans le secteur d'activité de l'élevage d'autres bovins et de buffles.","habitants":"Jourdan de Combettes\"","divers":"Manoir dit château des des Combettes à Ribennes","gps":"","images":["../image/image_48/48_Combettes_1.jpg","../image/image_48/48_Combettes_2.jpg","../image/image_48/48_Combettes_3.jpg","../image/image_48/48_Combettes_4.jpg"]},"Consult_chateau_formulairee5de":{"id":"Consult_chateau_formulairee5de","dept":"48","canton":"Langogne","commune":"Saint-Bonnet de Montauroux","nom":"Condres","type":"Forteresses","periode":"XV","histoire":"CONDRES, dans la paroisse de Saint-Bonnet-de-Montauroux, appartenait en 1459 à noble Gouin de Sinzelles, seigneur de Condres fonda la chapelle Sainte-Catherine, Pierre qui suit eut une sur Claude  1480 à Antoine de Chastel, qui possédait le château se perpétua jusqu'à la Révolution. François de Chastel, épousa Françoise de Brunel d'Allentin, dont il eut:  François, abbé de Cussac, et Gabriel de Chastel, baron de Cussac, qui figure en 1742 comme témoin au contrat de mariage de Jean-Baptiste de Brunel, seigneur de Bonneville, avec Jeanne-Marie Gailhard de Couteaux. Reconstruit en 1624 et réagencé au XVIIIe siècle, sera ouvert à la visite par son propriétaire, M. Didier.","architecture":"Condres, château fort du XVe siècle avec parties médiévales, juché sur un promontoire au confluent de l'Allier et du Chapeauroux. La date de la construction du premier château de Condres du XIVe siècle, extérieurement, il conserve son allure primitive avec un appareil défensif et des fenêtres où subsistent les traces de meneaux, ainsi que son aspect massif, derrière ses façades austères et majestueuses, Condres fut aménagé au XVIIIe siècle en une demeure confortable, le château semble avoir été transformé successivement aux XVIe et XVIIe siècles. La porte d'entrée est d'inspiration Renaissance, on y observe aussi un escalier à rampe en fer forgé. On trouve encore au château des caractéristiques de l'architecture militaire du bas Moyen-Age, la visite extérieure, mettra en évidence des corbeaux qui soutenaient l'ancien chemin de ronde, et une avancée médiane, en façade.","habitants":"Famille de Chastel\"","divers":"Château fort de Condres à Saint-Bonnet de Montauroux","gps":"","images":["../image/image_48/48_Condres_1.jpg","../image/image_48/48_Condres_2.jpg","../image/image_48/48_Condres_3.jpg","../image/image_48/48_Condres_4.jpg","../image/image_48/48_Condres_5.jpg"]},"Consult_chateau_formulaire5c81":{"id":"Consult_chateau_formulaire5c81","dept":"48","canton":"Chirac","commune":"Gabrias","nom":"Cougoussac","type":"Château","periode":"XIII_XV","histoire":"COUGOUSSAC, .  La famille Rousset, propriétaire de Cougoussac, depuis 1906 a entrepris depuis quelques années des travaux de restauration qui permettent de retrouver lambiance des riches demeures des XVIe et XVIIIe siècles. On peut aussi y découvrir des personnages en superbes costumes dantan. Un programme de restauration démarré en 1996 se poursuit en 2010 avec la consolidation de la chapelle romane construite en 1622.","architecture":"Le château est situé sur le territoire de la commune de Gabrias, Témoignage dune des douze seigneuries du Gévaudan, lorigine de Cougoussac remonte au XIIIe siècle et il faudra attendre le XVe siècle pour que cette borie devienne réellement un château.  Corps de logis  à trois niveaux de plan rectangulaire, sur une façade d'une tour carrée sort de la toiture, cette dernière en croupes,  façade opposée côté entrée par un parc, ce château accolée en angle une tour ronde arasée et en partie centrale un pavillon carrée ce bâtiment à perdu ses fenêtres à meneaux.","habitants":"Famille des Retz de Bressolles\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Le château et la maison forte à Gabrias","gps":"","images":["../image/image_48/48_Cougoussac_1.jpg","../image/image_48/48_Cougoussac_2.jpg","../image/image_48/48_Cougoussac_3.jpg"]},"Consult_chateau_formulairebc73":{"id":"Consult_chateau_formulairebc73","dept":"48","canton":"Marvejols","commune":"Antrenas","nom":"Crespin","type":"Château","periode":"XIX","histoire":"CRESPIN, élevé en 1849 par Charles dEspinassoux. Larcis, sur cette paroisse, fut jadis une seigneurie, appartenant aux barons de Peyre, achetée en 1435 par un Pineton de Chambrun. César de Grollée, comte de Peyre, obligea le chevalier Charles P. de Chambrun, après un long procès en 1702.  Il ne reste rien du château de Larcis, qui se dressait au nord du village, sur un monticule. La chapelle attenante est ruiné. La Bastide dAntrenas est le village natal du Père J.B Rouvière, massacré en 1917 par les esquimaux qui lui mangèrent le foie. \r\nLes habitants d'Antrenas payaient des redevances seigneuriales à leurs divers seigneurs (car chaque hameau dépendait d'un seigneur différent) et des dîmes au prieur curé. \r\nEn temps de guerre ou de troubles, les habitants dAntrenas étaient obligés au « guet et garde » des châteaux dont ils dépendaient. Avant la Révolution le village était administré par deux consuls élus chaque année, un greffier (secrétaire de mairie) faisait les écritures. Mais Antrenas est connu pour son préventorium inauguré en 1935, réalisé sur linitiative de la marquise de Chambrun et du docteur de Framond, sans cesse développé et transformé depuis.","architecture":"Le seul château du village est celui du Crespin à 4 tourelles, a été construit en 1849 par Achille dEspinassoux.  Corps de logis rectangulaire à trois niveaux toitures en croupes, flanqué de quatre tourelles carrées sur les angles à toit pointus.","habitants":"Famille de Charles dEspinassoux\"","divers":"Château de Crespin à Antrenas","gps":"","images":["../image/image_48/48_Crespin_1.jpg","../image/image_48/48_Crespin_2.jpg"]},"Consult_chateau_formulaire384d":{"id":"Consult_chateau_formulaire384d","dept":"48","canton":"La Canourgue","commune":"Saint-Rome de Dolan","nom":"Dolan_Peyre","type":"Vestiges","periode":"XI-XIII","histoire":"DOLAN, mentionné au XIe siècle comme fief de la famille de Sévérac en Rouergue, il est donné en hommage  à l'évêque de Mende au plus tard au XIIIe siècle. Hugues de Dolan le possédait en 1174.  Au XIIIe siècle, elle passa aux Sévérac, En 1224, les seigneurs de Sévérac rendirent hommage de vassalité, pour le château de Dolan, à Etienne II, évêque de Mende. En 1255 appartenait aux sires  de Sévérac, et en 1359, le seigneur d'Arpajon, baron de Dolan, leva des troupes sur ses terres pour combattre les Anglais.               A l'avènement de Henri IV, les li
