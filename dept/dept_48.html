_7.jpg","../image/image_48/48_Prevencheres_8.jpg","../image/image_48/48_Prevencheres_9.jpg"]},"Consult_chateau_formulaire25ee-2":{"id":"Consult_chateau_formulaire25ee-2","dept":"48","canton":"La Canourgue","commune":"Chanac","nom":"Ressouches","type":"Château","periode":"XV","histoire":"RESSOUCHES, mention d'un manse de Ressouches dépendant de l'évêque de Mende en 1291. Le château remanié au XVIe siècle par Charles d'Aragon a été probablement bâti sur les fondations d'une petite maison forte du XIIe siècle. En 1635, vente de la seigneurie à Antoine de Buisson qui réalise d'importantes réparations à partir de 1639. Dans cette chapelle se trouve les armes de la famille du Pont de Ligonnès, longtemps propriétaires du château. L'un des plus illustre membre de cette famille fut Charles du Pont de Ligonnès, évêque de Rodez et Vabres. Actuellement à la famille Bazin de Jersey.","architecture":"Ressouches, à partir de 1639 : réfection des  charpentes et d'une tourelle d'angle en 1640. Entre 1640 et 1643 construction ou reconstruction de la ferme.  Chapelle du XVIIe siècle englobée dans un bâtiment  du XIXe siècle (écurie). Le jardin mentionné en 1711 a été sans doute redessiné au XIXe siècle. Aile ouest du château bâtie au XXe siècle.   Logis: deux étages carrés sur rez de chaussée voûté en berceau, couvert d'un toit à croupe, la tour nord hors-oeuvre  abrite l'escalier  en vis sans jour,  et tour d'angle couvertes de toits coniques en pierre qui se termine par des corbeaux  qui supportaient autrefois des mâchicoulis.","habitants":"Charles d'Aragon                    Famille fut Charles du Pont de Ligonnès\"","divers":"Château de Ressouches","gps":"","images":["../image/image_48/48_Ressouches_1.jpg","../image/image_48/48_Ressouches_2.jpg","../image/image_48/48_Ressouches_3.jpg","../image/image_48/48_Ressouches_4.jpg"]},"Consult_chateau_formulaire1a79-3":{"id":"Consult_chateau_formulaire1a79-3","dept":"48","canton":"Florac","commune":"Ispagnac","nom":"Rocheblave","type":"Forteresse","periode":"XVI","histoire":"Le château de Rocheblave est un château du XVIe siècle situé à Ispagnac, en surplomb de l'entrée des gorges du Tarn, dans le département français de la Lozère. Le château est situé à proximité du hameau de Molines, sur la commune d'Ispagnac, en Lozère. Accessible depuis la route départementale  reliant Quézac à Sainte-Enimie, il surplombe la rive droite du Tarn. Sa situation lui permettait ainsi de contrôler l'entrée des gorges du Tarn ainsi que l'accès au causse de Sauveterre.  À la fin du XIXe siècle, son propriétaire était Louis Jourdan, député de la Lozère.","architecture":"Rocheblave une première résidence fut édifiée au-dessus de l'actuel château comme l'atteste les ruines encore visibles. Le monolithe dressé vers le ciel le fit surnommé l'aiguillette. Difficile d'accès fut abandonné au XVIe siècle et reconstruit plus bas, d'importantes restauration eu lieu en 1880,  de forme cubique il présente trois étages surmontées d'une rangée de mâchicoulis la façade principale est ornée de baies à meneaux d'un balcon et d'une porte présentant une décoration en accolade.","habitants":"Député Louis Jourdan\"","divers":"Château de Rocheblave et porte à Ispagnac","gps":"","images":["../image/image_48/48_Rocheblave_1.jpg","../image/image_48/48_Rocheblave_2.jpg","../image/image_48/48_Rocheblave_3.jpg","../image/image_48/48_Rocheblave_4.jpg"]},"Consult_chateau_formulaire24be":{"id":"Consult_chateau_formulaire24be","dept":"48","canton":"Florac","commune":"Meyrueis","nom":"Roquedols","type":"Château","periode":"XVI","histoire":"ROQUEDOLS, dès 1329, un certain Pierre Pagès, acquiert la totalité  du domaine de Roquedols, partie de la baronnie de Meyrueis. D'importants personnages locaux, nommés à plusieurs reprises consuls ou viguiers de Meyrueis, sont issus de cette famille Pagès. Il est probable qu'une maison forte soit édifiée au XIVe siècle avant d'être remplacée par le château actuel construit avant 1534. Hérail de Pagès, sire de Pourcarès, s'illustre alors en tant que capitaine huguenot pendant les guerres de religion. En 1604, le roi Henri IV érige la terre de Roquedols en baronnie pour remercier les Pagès Pourcarès de leur fidélité à sa cause au cours des conflits. En 1715, le château passe à la famille Dupont de Bossuges. Au XIXe siècle, le baron de Roquedols fait une carrière politique locale assez brillante. À l'extinction du dernier représentant de la lignée des Pagès, en 1885, la baronnie est vendue à messieurs Breuil, Dayre et Jouve. Le château, lui, est racheté par les Dol, une famille d'industriels de Marseille. Le domaine est alors livré à la surexploitation forestière par les trois associés. Après saisie, les terres sont revendues à la châtelaine, Mme Dol en 1893. À sa mort, Roquedols revient à son petit-fils, Gabriel-Joseph-Auguste Dol. Pendant la seconde guerre mondiale, le château sert de refuge aux services forestiers repliés de l'est de la France. Il abrite également les dépôts de certains musées nationaux, notamment le musée Fabre de Montpellier, et probablement, à un moment donné, la Joconde. Le château, devenu résidence de vacances des conservateurs généraux du service. En 1973, l'office national des forêts confie le château et ses abords immédiats au parc national des Cévennes, créé en 1970. Celui-ci en entreprend la réfection et la gestion directe du château lui étant déléguée par l'administration des Domaines. Cependant, depuis 2006, en raison de mesures de sécurité dues à la vétusté des installations électriques, le bâtiment n'est plus ouvert au public.","architecture":"Roquedols est formé de deux bâtiments rectangulaires, au nord et à l'est, joints à angle droit, flanqués de trois tours rondes coupées au ras du toit, une quatrième tour, plus basse, surmontée d'un toit en poivrière, est située au sud-est, à l'intersection des deux murs qui ferment la cour intérieure. Cette cour est elle-même délimitée par les deux bâtiments rectangulaires et ces deux murs. La bâtisse est un quadrilatère de 25 mètres de côté, flanqué de quatre tours de 6 à 8 mètres de diamètre. Les ailes nord et est constituent le logement principal. L'aile sud correspond à un bâtiment annexe (les anciennes cuisines) qui longe le mur fermant la cour intérieure. À l'ouest, la façade comprend un mur percé d'une porte d'accès à la cour intérieure. Cette porte est précédée d'un perron arrondi. La façade nord comporte deux étages de salles voûtées avant d'atteindre les logements positionnés au niveau des pièces de la façade opposée, au sud (ces dernières pièces étant bâties sans sous-sol). Jusqu'en 1885, la plus basse de ces salles voûtées a servi de bergerie.","habitants":"Famille Pagès Baronnie de Meyrueis\"","divers":"Château féodal de Roquedols","gps":"","images":["../image/image_48/48_Roquedols_1.jpg","../image/image_48/48_Roquedols_2.jpg","../image/image_48/48_Roquedols_3.jpg","../image/image_48/48_Roquedols_4.jpg"]},"Consult_chateau_formulaire000e":{"id":"Consult_chateau_formulaire000e","dept":"48","canton":"Collet de Déze","commune":"Vébron","nom":"Salgas","type":"Château","periode":"XVIII","histoire":"A Vébron deux châteaux dont celui de Salgas, et de Châteauroux,        SAGLAS,  Le baron François Pelet de Salgas Depuis la révocation de lEdit de Nantes, Au moment de la Révolution et de lEmpire,  Lozéran de Fressac, qui naquit en 1753 va jouer un rôle important dans lhistoire du Gévaudan. Lamoignon de Basville, gouverneur de la province, redoute la possible alliance avec les insurgés, dun grand seigneur influent, riche et respecté. Or le baron François Pelet de Salgas s'y réfugie après la Révocation de l'édit de Nantes, est plus riche que les autres gentilshommes des Cévennes. Pourtant, le baron de Salgas semble inoffensif : il gère ses domaines et chasse. Le baron avait 57 ans lorsque souvrit son existence de forçat. Ne reniant jamais sa foi, il nobtint pas sa délivrance tant que vécut Louis XIV. Libéré en 1716, lui qui avait supporté la torture puis le bagne, ne respira pas longtemps lair de la Suisse où il rejoint sa femme. Il mourut à Genève en 1717.   Le XVIIIe siècle La famille catholique de Bernis, reconstruisit le château de Salgas. Labbé de Bernis, oncle des propriétaires séjourna à Salgas après 1760 et fit construire la côte Cardinale. Il entretient des relations amicales avec le vieillissant Voltaire.  En 1790, il est maire de Vébron et le redeviendra en 1812.                      ROUX cité dès le XIVe siècle appelé aussi le château de Mépaud fut acheté par le préfet Robert Pagnol historien et l'abbé de Chayle en 1955.","architecture":"Le premier château fut détruit en 1703 suite à l'arrestation du baron François de Pellet. Le nouveau  château construit au XVIIIe siècle,En 1622, les protestants sestimant menacés, fortifient le village mais, en exécution de la paix dAlais, ces fortifications sont détruites en 1629  Son château de Salgas, ses mandements de Rousses et de Montcamp, en font le maître de toute la vallée du Tarnon et des pentes boisées de lAigoual qui sont de vrais repaires pour les Camisards. construit de plan carré, il présente trois façades similaires avec retour en équerre et tourelle carrée. La partie centrale, légèrement proéminente par rapport aux deux autres est surmontée d'un fronton triangulaire. Dix huit fenêtres reparties sur le rez-de-chaussée et les deux étages éclairent chaque façade.                                   Châteauroux  du XIVe siècle surplombe le village de Vébron  assurant la protection du hameau qui s'est développé a ses pieds, corps de logis à trois niveaux  la façade nord orientée vers le Causse, présente des fenêtres petites et profondes, cette façade  ornée d'une échauguette dressée sur  trois corbeaux de pierre. La façade sud surplombant la vallée du Tarnon à trois niveaux  deux niveaux possédant des fenêtres à meneaux.","habitants":"Famille de Lozéran de Fressac\"","divers":"Château de Salgas à Vebron","gps":"","images":["../image/image_48/48_Salgas_1.jpg","../image/image_48/48_Salgas_2.jpg","../image/image_48/48_Salgas_3.jpg"]},"Consult_chateau_formulaireff07":{"id":"Consult_chateau_formulaireff07","dept":"48","canton":"Chirac","commune":"Montrodat","nom":"Sejas","type":"Maison forte","periode":"XV","histoire":"SEJAS; château des sires de Peyre font hommage au vicomte du Gévaudan vers 1126 et en 1150; en 1204 le comte de Toulouse auquel le roi d'Aragon avait engagé le Gévaudan y reçoit l'hommage des vassaux.","architecture":"Sejas corps de logis rectangulaire à trois niveaux toiture en croupe, accolé d'une tour ronde à toit en poivrière, hautes cheminées.","habitants":"sires de Peyre\"","divers":"Maison forte de Sejas","gps":"","images":["../image/image_48/48_Sejas_1.jpg","../image/image_48/48_Sejas_2.jpg"]},"Consult_chateau_formulairecee8-2":{"id":"Consult_chateau_formulairecee8-2","dept":"48","canton":"Saint-Alban sur Limagbnole","commune":"Serverette","nom":"Serverette","type":"Patrimoine","periode":"XIII","histoire":"SERVERETTE, chateau du XIIe siècle 1202, reconstruit au XVe siècle de style Rénaissance, appartenant à Guillaume Merle qui le donna le 7 juillet 1202 par une cession fictive au comte évêque de Mende, Guillaume II de Peyre au moment de son départ en croisade.  Au cours du XIII siècle, les biens de Serverette sont divisés en plusieurs seigneuries. L'évêque de Mende, coseigneur de Serverette est en même temps suzerain et vassal. Mentionné pour la première fois en 1202 dont une partie est acquise par les évêques de Mende.  La  construction du grand logis est due à l'initiative de monsieur de Rouville, en 1820. En 1835, une communauté d'Ursulines s'installe  dans les nouveaux bâtiments.","architecture":"Chateau de Serverette du XIIe siècle, reconstruit au XVe siècle Tout autour du château s'étendaient les remparts, 7 portes et 7 tours dont on peut apercevoir les vestiges. Une description de 1292 mentionne la présence d'une enceinte, de quatre tours et de la chapelle castrale St-Vincent. Au moment de la Révolution, le château est en ruine mais conserve encore deux tours et une partie de l'enceinte qui seront rabaissées;  meurtrière. Aujourd'hui, le couvent accueille une école privée.  Les bâtiments sont situés autour d'une cour où  se trouvent un puits et une croix.  Les murs sont constitués de moellons de granite. Le bâtiment principal daté de 1820, est construit sur des caves voûtées en berceau. Il présente deux étages et  un comble à surcroît. Le toit à demi-croupe est  couvert d'ardoise. La porte principale, légèrement cintrée, est surmontée d'un  larmier. La porte, sur l'élévation postérieure, semble être un vestige du château. Les murs intérieurs de la cave voûtée comporte des meurtrières.","habitants":"Famille de Guillaume Merle\"","divers":"Patrimoine à Serverette","gps":"","images":["../image/image_48/48_Serverette_1.jpg","../image/image_48/48_Serverette_2.jpg","../image/image_48/48_Serverette_3.jpg"]},"Consult_chateau_formulaire19ac":{"id":"Consult_chateau_formulaire19ac","dept":"48","canton":"Collet de Déze","commune":"Saint-Hilaire de Lavit","nom":"Solier","type":"Maison forte","periode":"XV","histoire":"SOLIER,  Après l'incendie du château par les camisards en 1704 (mobilier détruit, bibliothèque disparue) pas d'autres informations historiques.","architecture":"Solier  témoin architectural de deux siècles d'histoire dans les Cévennes. Demeure fortifiée construite à la fin du XVe ou au début du XVIe siècle.  Travaux de réparation : grand comble mansardé, mais conservation du système défensif, intérieur refait à l'identique. La ferme voisine comprend une habitation, des remises et une magnanerie. De plan quadrangulaire fermé par ses dépendances à deux niveaux  flanqués de deux tours rondes sur  angles, vue son état général des contreforts sur partie centrale de longue façade.","habitants":"Seigneurs locaux\"","divers":"Maison forte dit château de Solier","gps":"","images":["../image/image_48/48_Solier_1.jpg","../image/image_48/48_Solier_2.jpg","../image/image_48/48_Solier_3.jpg","../image/image_48/48_Solier_4.jpg","../image/image_48/48_Solier_5.jpg","../image/image_48/48_Solier_6.jpg"]},"Consult_chateau_formulairea349":{"id":"Consult_chateau_formulairea349","dept":"48","canton":"Saint-Alban sur Limagnole","commune":"Saint-Alban sur Limagnole","nom":"St_Alban_Limagnole","type":"Maison forte","periode":"XV-XVIII","histoire":"Deux châteaux  à Saint-Alban, dont celui de Saint-Alban du XIIe siècle dit de Morangiès et celui de La Chastre dit le relais de Saint-Roch hôtel restaurant.    Saint-ALBAN cité au XIIe siècle, construit en 1245 par les barons d'Apcher et que les Anglais occupèrent en 1364. Au Moyen-Age, c'était une des douze seigneuries du Gévaudan jusqu'à la Révolution. Au XVIe siècle, les Calvisson construisirent près de la forteresse un vaste château. Trois familles de seigneurs se sont succédé : les Apcher, les Louet de Calvisson et les Molette de Morangiès. Les Apcher ont été les premiers seigneurs du château de Saint-Alban. En 1440, Louis de Calvisson épousa Marguerite de Murat, fille de Blanche d'Apcher. A partir de cette époque, les Louet de Calvisson devinrent les nouveaux seigneurs de Saint-Alban. Marie Louet de Calvisson, héritière de la famille, épousa François Molette de Morangiès le 16 septembre 1652, le château passa ainsi à cette famille jusqu'en 1821 que le dernier des Morangiès Christophe Théodore de Morangiès, complètement ruiné, vendit le château, à un religieux, Hilarion Tissot, frère de l'ordre de Saint Jean de Dieu pour accueillir soigner les aliénés du département. Le religieux n'étant pas un gestionnaire. En 1822, le conseil général de la Lozère vote la formation d'un établissement pour malades mentaux. Le 27 avril 1824, Monsieur De Valdenuit, préfet de la Lozère, acheta le château pour le compte du département. Depuis lors, il est resté hôpital psychiatrique départemental.","architecture":"Le bourg est dominé par un château  du XIIe siècle, forteresse médiévale à lorigine, il a été de nombreuses fois remanié et embelli au cours des siècles,  et agrandi au cours du XIXe siècle, son portail et ses galeries en grès rose lui donnent un air de théâtre italien et en font une curiosité incontournable du territoire, il a abrité pendant plus dun siècle le premier asile de Lozère, et aujourdhui les locaux de loffice de tourisme y sont installés. Plusieurs expositions y sont proposées tous les ans,  château en quadrilatère irrégulier, flanqué de cinq tours arasées massives et inégales, un fossé entourait l'enceinte, que franchissait un pont-levis.         Le manoir de la Chastre dit de St-Roch transformé en hôtel restaurant par Christian Chavignon, corps de logis à trois niveaux accolé sur la droite d'une tour polygonale à toit pointu et à l'opposé pavillon saillant.","habitants":"Famillede Louet de Calvisson\"","divers":"Château de St-Alban et de la Chastre","gps":"","images":["../image/image_48/48_St_Alban_Limagnole_1.jpg","../image/image_48/48_St_Alban_Limagnole_2.jpg","../image/image_48/48_St_Alban_Limagnole_3.jpg","../image/image_48/48_St_Alban_Limagnole_4.jpg","../image/image_48/48_St_Alban_Limagnole_5.jpg","../image/image_48/48_St_Alban_Limagnole_6.jpg","../image/image_48/48_St_Alban_Limagnole_7.jpg"]},"Consult_chateau_formulaire6344":{"id":"Consult_chateau_formulaire6344","dept":"48","canton":"Saint-Etienne de Valdonnez","commune":"Saint-Bauzile","nom":"St_Bauzile","type":"Vestiges","periode":"XII","histoire":"MONTIALOUX, le château faisait partie du patrimoine d'Aldebert du Tournel,  futur évêque de Mende, est né à Montialoux vers 1100, et rien ne prouve alors que le Tournel ait déjà été érigé en château, il est cité dans les hommages rendus à partir  de 1249 aux évêques de Mende par les seigneurs du Tournel. Les parties les plus anciennes,  mur d'enceinte, tour  ronde du logis et chapelle Saint-Jean, pourraient dater cependant du XIIe siècle. En 1588, le château figure sur la  liste des édifices à démolir sur l'ordre des états du Gévaudan de façon à ce qu'ils ne puissent pas être utilisés par les protestants; mais on ne sait pas si cet ordre a été exécuté à Montialoux. Les dates inscrites sur un linteau, et sur la clef de l'arc de la porte d'entrée, disparues depuis, indiquent des travaux de construction qui correspondent sans doute à la reconstruction du logis seigneurial autour  de 1661 et de 1666 ; de cette époque date sans doute   l'escalier dont il reste deux volées. Le château semble avoir été habité jusqu'en 1786, date à laquelle il est vendu par Charlotte de Lafayette et le chevalier de Chavanac à Guillaume Perrier, conseiller du Roi, puis fermier général pour le Gévaudan dont  les biens seront séquestrés  en 1792. L'édifice sera vendu plusieurs fois au cours du XIXe  et du XXe siècle. En 1932 il était mentionné comme ruine. Dans son état actuel il reste un témoin remarquable   de l'architecture féodale du Valdonnez. \r\nROUFFIAC pas d'information historique.","architecture":"Le château de Montialoux situé au dessus du village éponyme,  Il est aujourd'hui en état de ruine mais est facilement accessible.  Les vestiges comportent un mur d'enceinte, des terrasses qui peuvent être le signe de la présence d'un second mur d'enceinte. Un passage vouté mène à la cour, la chapelle était contre l'enceinte. Un logis plus récent occupe le côté sud de la cour, il reste aussi les soubassements d'une tour ronde. \r\nRouffiac,  du XIXe siècle montre que le hameau de Rouffiac possédait cinq parcelles bâties. Deux dates du XVIIe siècle inscrites sur  la porte charretière (1656) et sur la porte de la tour (1660) permettent de  dater de cette période l'ensemble de la demeure et le logis avec sa tour hors oeuvre qui fait penser que cette maison pouvait être la maison de maître d'un domaine important, peut-être ecclésiastique. Le bâtiment principal est composé de deux corps  disposés en L sur les deux côtés d'une cour  rectangulaire. L'accès à la cour se faisait  par un passage couvert dont la porte charretière en anse de panier est aujourd'hui en partie murée. Le corps de logis est établi perpendiculairement à la pente et présente vers  la vallée un mur pignon ajouré d'une travée de fenêtres,  A l'articulation des deux corps de logis  se trouve une tour ronde hors-oeuvre qui contient l'escalier en vis; le dernier niveau de cette tour est voûté en coupole ; il est aménagé en pigeonnier avec des nichoirs faits de lauzes calcaires; elle est couverte d'un toit en appentis.","habitants":"seigneurs du Tournel\"","divers":"Vestiges du château de Montalioux et manoir de Rouffiac à St-Bauzile","gps":"","images":["../image/image_48/48_St_Bauzile_1.jpg","../image/image_48/48_St_Bauzile_2.jpg","../image/image_48/48_St_Bauzile_3.jpg","../image/image_48/48_St_Bauzile_4.jpg","../image/image_48/48_St_Bauzile_5.jpg","../image/image_48/48_St_Bauzile_6.jpg"]},"Consult_chateau_formulaire10b6":{"id":"Consult_chateau_formulaire10b6","dept":"48","canton":"St-Alban-sur-Limagnole","commune":"St_Denis en Margeride","nom":"St_Denis_Margeride","type":"Manoir","periode":"XVI-XVIII","histoire":"Deux châteaux à Saint-Denis en Margeride, le château de Crouzet transformé en sci par monsieur Delmas pierre, et le château de Lescure, propriété de  Lescure  Raymond comte de Lescure né en 1848 qui épousa Marie Anne Adolphine \"Blanche\"  de Riverieulx de Chambost,  passa à cette famille, dont je n'ai  pas d'informations historiques.","architecture":"Crouzet, joli petit manoir du XVIIIe siècle à deux niveaux et attiques flanqué côté parc de deux échauguettes et tours rondes sur la façade d'entrée.         Lescure, corps de logis à trois niveaux de forme rectangulaire accolé d'une tour carrée à toit pointu.","habitants":"Famille éponyme\"","divers":"Château de Crouzet et de Lescure à saint-Denis de la Margeride","gps":"","images":["../image/image_48/48_St_Denis_Margeride_1.jpg","../image/image_48/48_St_Denis_Margeride_2.jpg","../image/image_48/48_St_Denis_Margeride_3.jpg"]},"Consult_chateau_formulaire1ab0":{"id":"Consult_chateau_formulaire1ab0","dept":"48","canton":"Collet de Déze","commune":"Saint-Julien d","nom":"St_Julien_Arpaon","type":"Vestiges","periode":"XII","histoire":"St-JULIEN d'ARPAON,  on retrouve les premières mentions du village au XIIIe siècle comme étant une possession des seigneurs d'Anduze. Cette puissante famille possède en effet en Gévaudan la baronnie de Florac, l'une des huit de la province. Cependant en 1266 l'évêque de Mende, Odilon de Mercur en fait l'acquisition.\r\nEn 1618 le château, alors propriété de la famille de Gabriac, est démantelé, puis passa aux  De Thezan seigneur de la Barre. Cependant au XVIIIe siècle, le château revient par héritage à la famille de Montcalm, famille rouergate ayant plusieurs possessions en Gévaudan, qui restaure la bâtisse.                      A quelques kilomètres au sud-est à Sainte-Croix Vallée Française une maison forte.","architecture":"Vestiges du château médiéval cité dès 1219 sur un éperon rocheux surplombant la Mimente, probablement rectangulaire, le château subira ensuite les affres du temps, et est actuellement à l'état de ruines. Il ne reste que deux façades faites de schistes cévenols, la façade sud a été construite au XVIIe siècle, la porte d'entrée est protégée par un mâchicoulis encore intact situé au troisième étage, à l'est , une tour carrée paraît remonter à une époque plus ancienne, à l'intérieur on découvre des vestiges de salles voutées creusées dans le roc.","habitants":"Famille de Gabriac\"","divers":"Vestiges du château de Saint-Julien d'Arpaon","gps":"","images":["../image/image_48/48_St_Julien_Arpaon_1.jpg","../image/image_48/48_St_Julien_Arpaon_2.jpg","../image/image_48/48_St_Julien_Arpaon_3.jpg","../image/image_48/48_St_Julien_Arpaon_4.jpg"]},"Consult_chateau_formulaire0112":{"id":"Consult_chateau_formulaire0112","dept":"48","canton":"La Canourgue","commune":"Saint-Saturnin de Tartaronne","nom":"St_Saturnin_Tartaronne","type":"Château","periode":"XIV","histoire":"ST-SATURNIN,  mentionné dans le patrimoine du roi de France au XIIIe siècle, ancien château  des évêques de Mende du XIVe siècle, au XVe siècle aux  comtors de Montferrand, ce qui place sa construction vers cette époque. Le Gévaudan du Moyen-Age est une vicomté décomposée en huit baronnies, auxquelles s'ajoutent douze seigneuries importantes (ayant un droit d'accès aux états privés du Gévaudan). Cependant, une famille possède un statut particulier qui est très proche de celui de baron, il s'agit des comtors de Montferrand (désormais inclus dans la commune de Banassac) qui possède trois mandements (Saint-Pierre-de-Nogaret, Saint-Germain-du-Teil et Trélans). Le château de Saint-Saturnin n'est donc pas une possession des barons de Canilhac tout proches, mais de Montferrand. Cependant au XVIe siècle, on retrouve trace du château comme étant une possession de Cénaret. Il sera agrandi à partir du milieu du XVIIe siècle, puis sera peu à peu abandonné après la Révolution Française. Il est d'ailleurs en état de ruine lors de l'inventaire national de 1968. Ses attributs ont été pillés, ainsi retrouve-t-on le linteau de la porte principale au château de la Caze, non loin de là, dans les gorges du Tarn. Vers la fin du XXe siècle une association commence à le restaurer. Il est par ailleurs inscrit aux monuments historiques depuis 1995.","architecture":"Le château corps de logis rectangulaire à cinq niveaux  flanqué   de trois tours rondes dont deux éloignées et d'une quatrième carrée. Une légende est associée au château et à ses seigneurs. Au Moyen Âge, les gens qui passaient devant le château étaient en devoir de saluer en se découvrant ou en descendant de leur monture. Un jour, plusieurs individus n'ayant pas réalisé le salut furent enfermés dans la prison du château. Mais le seigneur ne voulant pas payer pour les garder enfermés, il conclut avec eux un marché : ils seraient libres à condition d'effectuer la distance entre les cachots et la porte en dansant. Mais les prisonniers n'étaient pas au courant des conditions dans lesquelles devait se dérouler la danse. En effet, juste avant le passage des prisonniers, le seigneur avait fait chauffer les pierres des murs et du sol. La légende ne raconte cependant pas les détails des souffrances endurées par les prisonniers pour rejoindre la sortie.","habitants":"Comtors de Montferrand\"","divers":"Château de Saint Saturnin","gps":"","images":["../image/image_48/48_St_Saturnin_Tartaronne_1.jpg","../image/image_48/48_St_Saturnin_Tartaronne_2.jpg","../image/image_48/48_St_Saturnin_Tartaronne_3.jpg","../image/image_48/48_St_Saturnin_Tartaronne_4.jpg","../image/image_48/48_St_Saturnin_Tartaronne_5.jpg","../image/image_48/48_St_Saturnin_Tartaronne_6.jpg","../image/image_48/48_St_Saturnin_Tartaronne_7.jpg"]},"Consult_chateau_formulaire24ad":{"id":"Consult_chateau_formulaire24ad","dept":"48","canton":"La Canourgue","commune":"Sainte-Enimie","nom":"Ste_Enimie","type":"Vestiges","periode":"XII","histoire":"Plusieurs châteaux à Sainte-Enimie, château de la Caze de Castelbouc du XIIe siècle, de Prades  du XIIIe siècle (voir article) de Charbonnières et les vestiges d'Hauterives.                      CASTELBOUC, le château  fut cité au XIIe siècle alors quil appartenait à Etienne de Castelbouc, vassal dElie de Montbrun, commandeur des templiers du Larzac.  Le château remonte au XIIe siècle. Au XVIe siècle, les états particuliers du Gévaudan ordonnent la destruction de nombreux châteaux en province. Celui de Castelbouc sera détruit en 1592, pendant les guerres de religion, afin quil ne serve pas de refuge aux protestants. Mais ce château possède une légende qui attire de nombreux touristes encore aujourdhui. On raconte, quau temps des croisades, tous les hommes seraient partis guerroyer, sauf le seigneur de Castelbouc.  La légende raconte quil aurait du contenter toutes les femmes du village, en manque de tendresse, épuisé, ayant présumé de sa vigueur, celui-ci serait alors mort dépuisement.  Le soir de sa mort, son fantôme en forme de bouc serait venu survoler le château, donnant son nom final au château de Castelbouc, depuis en ruines.\r\nChâteau de Quézac à Blajoux, pas d'information historique","architecture":"Vestiges du château fort médiéval de Castelbouc, Il fut détruit en 1592,  sur ordre des états du Gévaudan, afin quil ne serve pas de refuge aux protestants lors des guerres de religions.  Devenu inaccessible, il est aujourdhui, complètement en ruine. Il date de lépoque médiévale.","habitants":"Famille d'Etienne de Castelbouc\"","divers":"Vestiges du château de Castelbouc et D'Hauterives et château de St-Chely , de Quezac   et de Ste Enimie","gps":"","images":["../image/image_48/48_Ste_Enimie_1.jpg","../image/image_48/48_Ste_Enimie_2.jpg","../image/image_48/48_Ste_Enimie_3.jpg","../image/image_48/48_Ste_Enimie_4.jpg","../image/image_48/48_Ste_Enimie_5.jpg","../image/image_48/48_Ste_Enimie_6.jpg","../image/image_48/48_Ste_Enimie_7.jpg","../image/image_48/48_Ste_Enimie_8.jpg"]},"Consult_chateau_formulaire4cad-2":{"id":"Consult_chateau_formulaire4cad-2","dept":"48","canton":"Saint-Etienne de Valdonnez","commune":"St-Julien du Tournel","nom":"Tournel","type":"Vestiges","periode":"XII-XIII","histoire":"TOURNEL,  la famille prend donc le nom de Tournel vers 1215, la première mention du nom est faite en 1219 dans un hommage d'Odilon-Guérin à l'évêque Guillaume IV de Peyre. C'est donc  à cette date que la famille de Châteauneuf de Randon aurait investi le château du Tournel. Cependant, vers 1307, la famille a décidé de s'éloigner du château de défense, lui préférant le confort du château du Boy dans le Valdonnez. Le site est réputé comme étant imprenable, et sera donc une solution de repli très importante pour la famille lors des diverses guerres et querelles qui rythment la vie du Gévaudan médiéval. Cependant, au début de la guerre de Cent Ans, les Tournel songent plus à fortifier grandement le château du Boy, plutôt que de retourner au Tournel. S'ensuivent les différentes guerres de religion, durant lesquelles le château sera détruit une première fois vers 1500. Il subira ensuite les affres des troupes huguenotes de Matthieu Merle, mais pourra être libéré à l'arrivée du baron depuis le mandement du Boy. Il sera ensuite complètement abandonné, sans jamais pouvoir être restauré. Il est cependant entretenu depuis le XXe siècle, grâce à des consolidations, et peut être suivi à l'aide d'un sentier d'interprétation.","architecture":"Le château était lui composé de six tours. Le château de Tournel est situé sur un éperon rocheux qui domine la haute vallée du Lot. Désormais rattaché à la commune de Saint-Julien-du-Tournel il est à une position stratégique, Les colossales proportions font de lui un des plus importants édifices de l'arrondissement de Mende, malgré l'état d'abandon dans lequel il se trouve, il conserve une solide charpente burinée par les ans, son aspect austère, presque rébarbatif accrédite son ancienneté, son édification n'est pas postérieure au XIIe siècle. A partir d'un tronc massif de dépendances et de fortifications s'élèvent plusieurs tours rondes décapitées, position privilégié, robustesse des formes vétustés de la pierre confèrent au château de Saint-Julien du Tournel  ses lettres de noblesse. Du temps où il était habité, il fallait franchir sept portes avant de pouvoir pénétrer dans le château. Certains passages entre deux portes étaient proche de la falaise qui domine le Lot, ce qui en faisait un lieu de défense privilégié.","habitants":"Famille de Tournel\"","divers":"Vestiges du château de Tournel","gps":"","images":["../image/image_48/48_Tournel_1.jpg","../image/image_48/48_Tournel_2.jpg","../image/image_48/48_Tournel_3.jpg","../image/image_48/48_Tournel_4.jpg","../image/image_48/48_Tournel_5.jpg","../image/image_48/48_Tournel_6.jpg"]},"Consult_chateau_formulaire9343":{"id":"Consult_chateau_formulaire9343","dept":"48","canton":"Saint-Etienne de Valdonnez","commune":"Bagnols les Bains","nom":"Tournel_Bleymard","type":"Maison forte","periode":"XVI","histoire":"Deux châteaux à Bagnols les Bains, dont celui de Bagnols, château de la Loubière,  et au Bleymard, château de Peytavin l'abbaye et tour,  hôtel de ville.\r\nBAGNOLS Les BAINS, château du Tournel, église romane St-Julien, jusqu'en 1961 Bagnols-les-Bains portait le nom de Bagnols. La station bénéficie de cautions très anciennes, et Sidoine, évêque de Clermont, au Ve siècle, vante déjà les vertus curatives des eaux de Bagnols, dans une lettre adressée à un ami. La trace formelle du passage des Romains est repérée lors des travaux importants effectués dans les Thermes en 1764 par le comte de Morangiès, seigneur et propriétaire de Bagnols, et en 1837 par M. Marius Richard. Le 23 novembre 1857, la station thermale de Bagnols devient la première en France à être reconnue dutilité publique par décret impérial.  BLEYMARD, la maison Peytavin, manoir de la vieille tour devenu hôtel de ville.    L'abbaye à st-Jean du Bleymard devenu château.                                La LOUBIERE  plus maison forestière que manoir.","architecture":"Du château du Bleymard bâtisse rectangulaire à deux niveaux flanqué d'une tourelle à toit en poivrière.      A Bagnols les Bain, tour rondes accolée à un bâtiment à trois niveaux.             La loubière tour carrée accolée à un bâtiment rectangulaire.                   Chapelle de Saint-Jean du Bleymard, dit le château  XIIe siècle, classée monument historique, prieuré de Saint-Jean du Bleymard,                               La maison notable dite Peytavin, XVIIe siècle, rues du village, maisons anciennes aux couvertures de lauze, en équerre avec tour carrée  intérieur à trois niveaux à toit pointu.","habitants":"Comte de Morangiès\"","divers":"Manoir de Bagnols les Bains, le château saint-Jean,le manoir de Peytevin de la Loubière  et tour de Bagnols","gps":"","images":["../image/image_48/48_Tournel_Bleymard_1.jpg","../image/image_48/48_Tournel_Bleymard_2.jpg","../image/image_48/48_Tournel_Bleymard_3.jpg","../image/image_48/48_Tournel_Bleymard_4.jpg","../image/image_48/48_Tournel_Bleymard_5.jpg","../image/image_48/48_Tournel_Bleymard_6.jpg","../image/image_48/48_Tournel_Bleymard_7.jpg","../image/image_48/48_Tournel_Bleymard_8.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','48 — Lozère'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
