gueurs s'emparèrent de Dolan (1590-1594). A cette époque la baronne de Dolan s'appelait Mme de Castelnau, veuve de Louis d'Arpajon.  puis aux Arpajon et, en 1728, elle appartenait à la comtesse de Roye, elle venait rarement à Dolan et habitait le manoir de Sévérac-le-Château.  En 1968 on avait pu identifier une tour, le logis et peut-être la chapelle castrale que l'on peut dater du XIIe ou du XIIIe siècle, la citerne voûtée était encore visible au milieu du site,  Aujourd'hui transformé en hôtel restaurant.                   PEYRE, c'est sur le roc de Peyre qu'était situé le château de la baronnie de Peyre, l'une des plus puissantes du Gévaudan. château de Peyre dépendait peut être de celui de Blanquefort. Ce château avait la réputation d'être imprenable, ce qui fut le cas jusqu'au XVe siècle et sa destruction par l'amiral Joyeuse. Cette destruction intervint en riposte aux destructions perpétuées en Gévaudan par Matthieu Merle, capitaine huguenot engagé par la veuve d'Astorg de Peyre pour venger le meurtre de son mari.","architecture":"Dolan, les importants vestiges encore visibles occupent une plate forme dominant le Tarn.  En 1968 on avait pu identifier une tour, le logis et peut-être la chapelle castrale que l'on peut dater du XIIe ou du XIIIe siècle, la citerne voûtée était encore visible au milieu du site,  Le Castel de Dolan existait encore en 1730. Les biens de la baronnie furent vendus, semble-t-il, en 1793.                                   Les Vignes à  Dolan ce manoir féodal périt par les flammes. Les riverains auraient allumé l'incendie en l'absence des maîtres et en haine du joug trop dur que les barons de Dolan faisaient peser sur eux. \r\nPeyre dépendait peut être de celui de Blanquefort. Il a été comme celui-ci abandonné dès le Moyen-Age. Les vestiges font partie du site inscrit des gorges du Tarn. Il ne reste de ce château que  les vestiges d'une tour édifiée dans un bel appareil de moellons équarris et assisés. Implantés sur un piton dominant la vallée du Tarn, ces vestiges mériteraient d'être conservés.","habitants":"Seigneurs de Sévérac \"","divers":"Vestiges du château sur un rocher et sur une motte féodale de Peyre, vestiges du château des vignes et maison forte à Massegros","gps":"","images":["../image/image_48/48_Dolan_Peyre_1.jpg","../image/image_48/48_Dolan_Peyre_2.jpg","../image/image_48/48_Dolan_Peyre_3.jpg","../image/image_48/48_Dolan_Peyre_4.jpg","../image/image_48/48_Dolan_Peyre_5.jpg","../image/image_48/48_Dolan_Peyre_6.jpg","../image/image_48/48_Dolan_Peyre_7.jpg","../image/image_48/48_Dolan_Peyre_8.jpg"]},"Consult_chateau_formulaire65c6-2":{"id":"Consult_chateau_formulaire65c6-2","dept":"48","canton":"Florac","commune":"Florac","nom":"Florac","type":"Château","periode":"XV_XVI-XIX","histoire":"Florac; quatre châteaux, celui de Florac, de Gralhon, Azinières et Montvaillant à la salle Prunet, et maison forte à  Sainte-Croix Vallée Française.     FLORAC, La baronnie s'étendait sur le Méjan et les Cévennes et possédait sur le  Tarn  les deux châteaux de Castelbouc et de Montbrun, qui appartenait au XIIIe siècle à la famille dAnduze la petite fille de Raymond,  Isabelle mariée à Pons de Montlaur  affranchissait en 1291 les serfs de Florac a subi de nombreux avatars et occupé plusieurs fonctions. Les barons de Florac étaient de la famille des seigneurs d'Anduze et avaient donc l'un de leur château principal en  ce lieu depuis le XIIIe siècle. En 1664, Scipion de Grimoard de Beauvoir, comte de Roure, marquis de Grizac achetait cette baronnie. En 1810, il sera vendu à l'État qui l'utilisera, et le transformera, comme prison, il en garde encore quelques vestiges (barreaux aux fenêtres, portes de cellules, etc...) Depuis 1976, le château est devenu le siège du Parc National des Cévennes qui l'a restauré.   GRALHON, aujourd'hui centre équestre  entre Florac et le Causse Méjean, dans la ferme équestre de Gralhon. Christina vous accueille en chambres d'hôtes pour un séjour nature au coeur du Parc National des Cévennes.                           MONTVAILLANT à la Salle Prunet,  ancien fief  relevant de l'évêque de Mende. Jean II de Belcastel, seigneur; recueille la succession paternelle et épouse, le 4 janvier 1553, sa cousine Jeanne de Belcastel de la Pradelle, fille de Jean I. Passera à la famille de Paul Vignolles, lieutenant et duc de Rohan, restera dans la famille de Belcastel  jusqu'à  la Révolution.                   Azinières et Sainte-Croix pas d'information historique.","architecture":"Florac; La période la plus mouvementée correspond à celle des guerres de Religions ou catholiques et protestants se disputent la ville et le château. L'actuel château a été reconstruit en 1652, sur un mamelon de tuf et roche, sur le site du château féodal où siégeait l'une  des huit baronnies du Gévaudan.  Au moment de la Révolution Française, alors que plusieurs châteaux de la région sont détruits (principalement  les possessions des évêques de Mende) celui de Florac servira de grenier à sel.  Corps de logis rectangulaire à trois niveaux, à cinq travées,   toitures en croupes flanqué de deux tours rondes en façade à toitures pointus            Montvaillant, du XVe siècle de plan rectangulaire à quatre niveaux, et quatre travées, chemin de rondes crénelés avec échauguettes sur angles  et avancée saillante sur angle gauche, tour carrée crénelée aujourd'hui disparu. Rajout au XIXe siècle créneaux et échauguettes circulaires ornant le rebord des toits, endommagé par la Révolution. Azinières Ste-Croix, corps de logis en L à deux niveaux, toitures en croupes, flanqué d'une tour ronde sur un angle à toit arasés                                   Gralhon, quadrilatère à deux niveaux  flanqué de tours carrées aux angles de trois niveaux.","habitants":"Famille dAnduze                        Famille de Paul Vignolles\"","divers":"Le château de Montvaillant, d'Azinières, de Gralhon et celui de Florac.","gps":"","images":["../image/image_48/48_Florac_1.jpg","../image/image_48/48_Florac_2.jpg","../image/image_48/48_Florac_3.jpg","../image/image_48/48_Florac_4.jpg","../image/image_48/48_Florac_5.jpg","../image/image_48/48_Florac_6.jpg","../image/image_48/48_Florac_7.jpg","../image/image_48/48_Florac_8.jpg","../image/image_48/48_Florac_9.jpg"]},"Consult_chateau_formulairee88b":{"id":"Consult_chateau_formulairee88b","dept":"48","canton":"Saint-Alban sur Limagnole","commune":"Fontans","nom":"Fontans","type":"Château","periode":"XV","histoire":"FONTANS,  sous l'ancien régime, le terroir et le village de Rayrols sont mentionnés parmi les emphytéotes de l'évêché de Mende. Le logis de la ferme située au nord de la maison de maître présente une baie à traverse et des ouvertures  qui pourraient dater  du XVIIe siècle. L'histoire de la maison de maître et  de ses dépendances est connue par les informations recueillies  par les propriétaires et  confirmées par les inscriptions portées par l'édifice.  La propriété est achetée en 1793 par la famille Trincal originaire du hameau de Taladisse. En 1810 (date portée sur une pierre sculptée de la façade de la maison de maître) Joseph Trincal entreprend la  construction d'un grand logis auquel il donne l'apparence d'un petit château. Il fait élever aussi la grande écurie, démolie en 1965.","architecture":"Ce domaine de Fontans comprend 2 fermes et  une maison de maître. Celle-ci et les bâtiments qui en dépendent donnent sur une cour à laquelle on accède par une porte flamande. La maison de maître a trois niveaux, un étage de soubassement donnant sur une terrasse, un rez-de-chaussée surélevé et un étage carré. Son toit à demi-croupe est couvert de schiste. L'élévation, à sept travées, est construite en pierres de taille de granite gris, un pigeonnier couvert par une flèche carrée, s'élève au-dessus de la travée axiale. Le mur de soutènement de la terrasse abrite sous des voûtes en berceau, Une porte charretière en arc déprimé est ouverte sur la façade principale. Un porche couvert d'un toit à croupe,  est établi entre la grange-étable et le hangar et donne sur les propriétés du domaine et sur le four à pain.","habitants":"Famille Trincal \"","divers":"Château de Chzeirolettes, de Rayrols, de Sérépinière","gps":"","images":["../image/image_48/48_Fontans_1.jpg","../image/image_48/48_Fontans_2.jpg","../image/image_48/48_Fontans_3.jpg","../image/image_48/48_Fontans_4.jpg","../image/image_48/48_Fontans_5.jpg"]},"Consult_chateau_formulaire1ccb":{"id":"Consult_chateau_formulaire1ccb","dept":"48","canton":"Aumont-Aubrac","commune":"Fournels","nom":"Fournels_Brion","type":"Château","periode":"XIV","histoire":"MONTALEYRAC,  Vestiges, donjon  d'un château des barons d'Apcher cité au XIIe siècle pour lequel ces derniers firent hommage à l'évêque de Mende en 1245.                                  La construction du château dit du Brion a été entreprise, sur les bases d'un ancien château remontant à 1338 appartenant à Rigaud de Capluc, par un fils  des barons dApcher, Jean, en 1573.                                                                                                    FOURNEL,  reconstruit en 1573, par Jean, bâtard d'Apchier, seigneur d'Hauteville, fils de François Martin, baron d'Apchier, et d'Antoinette de Fabresse. Il s'était marié le 15 novembre 1570 avec Jeanne, bâtarde de Lastic, fille de Louis de Lastic, grand-prieur d'Auvergne de l'ordre de Saint-Jean de Jérusalem. Il a été légitimé en 1571 avec le titre d'écuyer et le droit de porter les armes d'Apchier. Jean d'Apchier s'est remarié avec Anne de Maumont le 16 novembre 1594, dont il eut Marie d'Apchier d'Auteville. Elle a été mariée, en 1616, à Jacques, bâtard de Lastic, qui se distingua au siège de La Rochelle en 1627. L'un de leurs descendants, Florimond de Lastic, eut une fille qui fut élevé à l'école de Saint-Cyr, fondée par Mme de Maintenon près de Versailles. \"Amélie de Lastic épousa le 27 avril 1799 Géraud Pierre de Michel du Roc, marquis de Brion. Le marquis de Brion, barons de l'Empire, membre du collège électoral de la Lozère, était le neveu de Géraud Christophe de Michel du Roc, duc de Frioul, grand-maréchal du Palais de Napoléon Ier. Propriété des Lactic au XVIe siècle,Les Michel du Roc qui possédaient de nombreuses seigneuries en Gévaudan, Quercy et Languedoc à la fin du XVIe siècle,  il passa aux mains des marquis de Brion au XIXe siècle. Aujourdhui, la branche fournelaise de la famille de Brion sest éteinte.","architecture":"Montaleyrac;   les vestiges de  lantique forteresse  culmine à 1263 mètres daltitude est située à 2 kilomètres et demi à lest de Fournels. Subsistent les restes de la tour ronde (trois mètres de haut), lesquels témoignent de lexistence de la paroisse primitive alors installée à Montaleyrac jusquen 1958.                                                                  Fournels, dominant trois vallées, il domine la Bédaule affluent du Bè, occupait une position stratégique; c'était une véritable maison forte, défendue par ses tours et l'épaisseur de ses murs percés de meurtrières; cette vieille demeure a su conserver toute son authenticité. À l'intérieur, on pouvait admirer du mobilier d'époque, des tapisseries splendides et des tableaux d'une étonnante fraîcheur.  Il est composé de grands murs de pierre et dune double terrasse au milieu de grands arbres. Entouré de trois grandes tours, 4 cheminées de la même hauteur parachèvent sa grandeur. Les aménagements intérieurs ont été réalisés à la fin du XVIIe siècle et  dans la première moitié du XVIIIe siècle. Le portail de la cour d'honneur, la transformation des écuries en ferme et la construction des communs dans les cours basses datent du XIXe siècle. Le parc entourant lédifice est classé  depuis 1961 à linventaire des monuments historiques","habitants":"Baron d'Apchier\"","divers":"Vestiges du château de Montaleyrac et le château dit de Lastic à Fournels","gps":"","images":["../image/image_48/48_Fournels_Brion_1.jpg","../image/image_48/48_Fournels_Brion_2.jpg","../image/image_48/48_Fournels_Brion_3.jpg","../image/image_48/48_Fournels_Brion_4.jpg","../image/image_48/48_Fournels_Brion_5.jpg"]},"Consult_chateau_formulairef852-2":{"id":"Consult_chateau_formulairef852-2","dept":"48","canton":"Aumont-Aubrac","commune":"Chauchailles","nom":"Fraisse","type":"Manoir","periode":"XVII","histoire":"Quant au château du Fraisse datant du XVIIe siècle, il fut le siège de la seigneurie du même nom. Le château actuel a succédé à une construction plus ancienne, rasé le 11 juin 1577 par les troupes de Saint-Vidal qui venaient de la reprendre aux légionnaires.","architecture":"Il est décidé de le reconstruire au tout début du XVIIe siècle. Plus maison forte que château d'un corps de logis rectangulaire à deux niveaux et attiques, flanqué de trois tours rondes arasées à position inférieure du toit à un  pan incliné.","habitants":"Seigneurs de Chauchailles\"","divers":"Manoir de Fraisse à Chauchailles.","gps":"","images":["../image/image_48/48_Fraisse_1.jpg","../image/image_48/48_Fraisse_2.jpg","../image/image_48/48_Fraisse_3.jpg"]},"Consult_chateau_formulaire3c9e":{"id":"Consult_chateau_formulaire3c9e","dept":"48","canton":"Marvejols","commune":"Servières","nom":"Grange_Servieres","type":"Forteresse","periode":"XVI","histoire":"La-GRANGE, datant du XVIe siècle, d'aspect médiéval, remanié, a été bâti par la famille de Borrel de la Grange. Cette famille, notable dans la région, baron de Lagrange. Elle fit des alliances avec l'aristocratie considérée du Gévaudan telle que les Retz de Servies ou les Salin de Saillant. De cette famille sortit des illustrations comme la génération des quatre frères Borrel de la Grange qui se distingua particulièrement pendant la Révolution Française dans les mouvements contre révolutionnaires : l'aîné: le chevalier de Borrel, baron de la Grange, colonel de la garde nationale de Mende, chevalier de l'ordre de Saint-Louis qui communiquera avec Louis XVIII et préparera des attentats visant à la restauration monarchique; pris, il sera emprisonné puis empoisonné par ordre de Bonaparte. Le deuxième, prêtre réfractaire sera massacré par les révolutionnaires. Les deux derniers, tout comme leur premier frère, seront contre-révolutionnaires et capitaines et chevalier de l'ordre de Saint-Louis.\r\nDe cette génération seule une fille se marie avec celui qui reprendra le château il s'agit du colonel dans l'Armée des Princes de Florit de la Tour de Clamouze comte de (Woodville) Rivière de Corsac chevalier de Saint-Louis, gouverneur du Gévaudan et maire de Mende. Ses descendants possèdent le château jusqu'en 1912, date à laquelle décède Urbain comte de Rivière de Corsac, dernier du nom, qui s'éteint dans la maison des comtes de Gourcy-Récicourt de Chapelain.\r\ndeux châteaux à Servières  qui fut aux Moré de Charaix au temps de la Révolution et  jusqu'en 1880. son dernier héritier, le chanoine Charles Isidore le vendra  passa aux Combette, aux Talensier, aujourd'hui aux Ceyrac.","architecture":"Le château de la Grange est situé sur la commune de Servières. On découvre le château dans un domaine couvert d'une forêt de pins noirs présente un plan rectangulaire et uniforme de pierre du pays surmonté d'un chemin de ronde à mâchicoulis de gros merlons de granite; la façade est ouverte par une très belle porte Louis XIII dite « à facette de diamant » typique du Gévaudan d'ancien régime, porte à rapprocher de celle d'autres châteaux et vieilles demeures de la région comme le château du Champ. La façade du logis féodal est percée de huit grandes fenêtres à meneaux en grès rose sur trois niveaux  et quatre travées.","habitants":"Famille de Borrel de la Grange\"","divers":"Château de la Grange à Servières","gps":"","images":["../image/image_48/48_Grange_Servieres_1.jpg"]},"Consult_chateau_formulaire1cc4":{"id":"Consult_chateau_formulaire1cc4","dept":"48","canton":"Chirac","commune":"Grézes","nom":"Grezes","type":"Vestiges","periode":"XIII","histoire":"GREZES, sur le \"Truc de Grèzes\", emplacement d'un castrum romain traces d'un château des vicomtes du Gévaudan cité depuis l'an 1000, aux sires de Peyre en 1126, en 1205, le comte de Toulouse auquel le roi d'Aragon a engagé le Gévaudan y reçoit les hommages des vassaux; occupé par l'évêque  de Mende en 1229, repris par le comte de Toulouse en 1221; réuni à la couronne par Louis IX en 1258. Endommagé en 1617 lors des guerres de religion démantelé en 1632 par Louis XIII.","architecture":"Du château de Grézes vestiges sur motte féodale, il ne reste que les murs  de plan carré  accolé d'une tour ronde l'ensemble sans toiture.","habitants":"Comte de Toulouse \"","divers":"Vestiges du fort de Grézes et maison forte à Grézes","gps":"","images":["../image/image_48/48_Grezes_1.jpg","../image/image_48/48_Grezes_2.jpg","../image/image_48/48_Grezes_3.jpg","../image/image_48/48_Grezes_4.jpg","../image/image_48/48_Grezes_5.jpg"]},"Consult_chateau_formulaire2bfd-2":{"id":"Consult_chateau_formulaire2bfd-2","dept":"48","canton":"Saint-Etienne de Valdonnez","commune":"Le Pont de Montvert","nom":"Grizac_Grimoard","type":"Maison forte","periode":"XIII","histoire":"GRIZAC, aurait été bâti, au XIIIe siècle, par Guillaume de Grimoard y naquit dont le statut de chevalier-paysan lui autorisait une telle construction. Guillaume de Grimoard en 1309 marquis de Grisac  couronné pape sous le nom d'Urbain V en 1362, lhéritier de la seigneurie se retire, le  fils aîné de Guillaume II Grimoard, seigneur de Grizac, et d'Amphélise de Montferrand, près de La Canourgue, dans la baronnie de Canilhac, le futur pape Urbain V est prénommé comme son père. Il naît en 1310  au château familial de Grizac, prénommé lui aussi Guillaume, le futur pape Urbain V.  Après de brillantes études de droit, lhéritier de la seigneurie se retire du monde pour se faire bénédictin. Il devient pape en 1362 sous le nom dUrbain V et a le mérite de ramener à Rome le Saint-Siège. \r\nLe château est l'actuelle propriété de monsieur le Marquis de Laubespin qui a fait des anciennes ruines la charmante demeure que l'on peut aujourd'hui admirer.  Heureusement que le marquis de Laubespin a sauvé Grisac et le Roure, sinon du patrimoine des Grimoard et conjoints on aurait plus que des ruines.","architecture":"Grizac bâti à une époque très ancienne sur un éperon rocheux en contrebas du village. De plan rectangulaire à trois niveaux accolé d'un donjon carrée sans toiture. Le 21 décembre 1984 le donjon et le logis (les parties restantes du château), ont été classées monument historique, et l'ensemble des dépendances et bâtiments de ferme a été inscrit. Chaque année, une exposition vivante est consacrée à ce pontif exceptionnel admiré par Pétrarque.","habitants":"Marquis de Laubespin \"","divers":"Maison forte de Grizac au Pont de Montvert.","gps":"","images":["../image/image_48/48_Grizac_Grimoard_1.jpg","../image/image_48/48_Grizac_Grimoard_2.jpg","../image/image_48/48_Grizac_Grimoard_3.jpg"]},"Consult_chateau_formulaireb934":{"id":"Consult_chateau_formulaireb934","dept":"48","canton":"Langogne","commune":"Langogne","nom":"Langogne","type":"Château","periode":"XVII","histoire":"LANGOGNE, la viguerie de Langogne est dirigée par le Vicomte Étienne et sa femme Angelmode.  Langogne devient ville de consulat et obtient ses libertés et ses magistrats. D'abord administrée par un conseil politique composé d'un Maire, de deux assesseurs, de quatre consuls et quatre conseillers, un édit de 1771 vient établir officiellement le rôle du maire. Il reste toutefois au seigneur la justice et la puissance territoriale. Il faudra attendre les États Généraux, en 1789, et la Révolution pour voir le département de la Lozère crée. Le premier maire, Jean Bourguignat de Chabaleyre a poursuivi son mandat quelques mois suivi par Jean Louis Mathieu. Il faut attendre 1815 où l'on évoque le nouveau maire appelé monsieur de Colombet de Landos, lieutenant colonel et chevalier de Saint-Louis, grand administrateur de la commune. C'est  lui qui érige la Halle aux grains et la Tour de l'Horloge.                     BARRES;  ou vécut la famille  de Colombet de Landos en  1895-1895, aujourd'hui,  hôtel restaurant, domaine de Barres.   NAUSSAC, Ancien château dépendant de l'abbaye des Chambons              VIGERIE; propriété également de Colombet  de Landos en 1833-1898,  aujourd'hui en société par Assenat Philippe qui occupe le poste d'exploitant agricole, l'élevage de bovins et de buffles                  CONCOULES, Lavillatte était le siège dune commanderie des Hospitaliers de Saint-Jean-de-Jérusalem. Cétait une propriété de Chartreux, cédée aux Hospitaliers en 1231.  En 1313, le commandeur était Aymon de Montlaur. Lavillatte fut rattachée au Grand Prieuré de Saint-Gilles-du-Gard, lors de la réorganisation qui a suivi la transmission aux Hospitaliers des biens des Templiers, au début du XIVe siècle.","architecture":"Langogne, vestiges des remparts, deux tours rondes à trois niveaux côté nord accolé à des bâtiment, plus tour indépendante de Naussac également à trois niveaux et bretèches.               Barres; gentilhommière du XVIIIe siècle revue et transformée par larchitecte de renom Jean-Michel Wilmotte. De forme rectangulaire à deux niveaux et attiques deux pavillons saillants sur façade, toiture à la Mansard.              Vigerie; corps de logis de plan rectangulaire à trois niveaux et attiques, pour le premier corps a toiture en croupe avec  échauguettes en angles, prolongement du corps de logis à trois niveaux toiture en croupes.        Concoules, ruines imposantes d'un château seigneurial reste d'une tour,  extérieurement, la tour a encore fière allure. Haute dune vingtaine de mètres, de dix mètres de côté, elle est construite en pierres de granit soigneusement appareillées. Les fenêtres sont rares, mais assez grandes ; la plupart sont agrémentées de moulures, un linteau est décoré dune accolade et il semble quil y ait eu des meneaux à certaines dentre elles. Un escalier extérieur à double volée permettait daccéder au premier étage, mais il nest plus quun tas de pierres. Lintérieur de la tour est ruiné, car la toiture sest effondrée en 1986 sous le poids de la neige et na pas été remise en état. On remarque encore que la plupart des pierres dangles sont à bossage et peut-être certaines étaient-elles sculptées. Il sagissait donc dune construction soignée.","habitants":"Seigneurs locaux                       Jean Bourguignat de Chabaleyre\"","divers":"Tour dans les remparts de Langogne, château de la Barres, la tour de Naussac, tour de Concoules et château de la Vigerie","gps":"","images":["../image/image_48/48_Langogne_1.jpg","../image/image_48/48_Langogne_2.jpg","../image/image_48/48_Langogne_3.jpg","../image/image_48/48_Langogne_4.jpg","../image/image_48/48_Langogne_5.jpg","../image/image_48/48_Langogne_6.jpg","../image/image_48/48_Langogne_7.jpg"]},"Consult_chateau_formulairea5c5":{"id":"Consult_chateau_formulairea5c5","dept":"48","canton":"Saint-Etienne de Valdonnez","commune":"Lanuéjols","nom":"Lanuejols_Cevennes","type":"Château-Vestiges","periode":"XIII-XVI","histoire":"Trois châteaux à Lanuéjols,  celui de Boy du XIIIe siècle (voir article) et vestiges de Chapieu, le mausolée gallo-romain de Lanuéjols est l'un des plus célèbres de France.                 PRADE, du XVIe siècle  possessions de la baronnie du Tournel. En 1662 le propriétaire est noble Estienne de Savy, sieur de La Veyssière qui y rédige son testament.  Le château appartient alors à Jacquemont Dumouchet qui y réside.       CHAPIEU, construit par l'évêque de Mende Aldebert III de Tournel pour contrôler la route du Vivarais par Villefort, ancienne possession des barons du Tournel.  et cédé vers 1170 au bâtard de Tournel; sert d'asile au milieu du XIIIe siècle  à l'évêque de Mende lorsqu'il fut chasser par les bourgeois.                      Le Mausolée; chef d'oeuvre d'architecture unique en son genre  comporte trois niches débordant à l'extérieur. sur un linteau de la porte , imposante pierre inscription latine de cinq lignes  (Lucius Julius Bassianus  et Pomponia Regola) dit d'un père et d'une mère qui ont élevé ce tombeau à leurs deux  fils très aimants, Bassulus et Balbinus, comme l'origine de la famille Pompinius. Bien que des recherches effectuées en Valdonnez ont mis à jour de nombreux vestiges gallo-romains, l'emplacement de la demeure familiale n'a pas encore été retrouvé.","architecture":"Le Mausolée est unique à plus d'un titre. Seul tombeau, de l'antique \" Gaule Chevelue \", épargné par l'épreuve du temps, il est tout exceptionnel par sa datation. A un moment ou la puissance de Rome s'effrite, alors que les barbares commencent à ravager la Gaule romanisée, et que le christianisme s'affirme. Malgré ces éléments historiques connus et certifiés par l'épitaphe, encore visible, à l'entrée du mausolée, plusieurs mystères demeurent. \r\nPrades cette petite maison forte est mentionnée dès le Moyen-Age, Les vestiges encore en place ne semblent pas être antérieurs au XVe siècle, le bâtiment est isolé au milieu des prairies  qui bordent le ruisseau  de la Prade. Il est aujourd'hui en ruine, on peut identifier cependant  les vestiges d'une grande salle rectangulaire  dont un mur assez bien conservé  présente le départ d'une voûte en berceau et l'entrée d'un four à pain. La voûte retombait sur un bandeau  chanfreiné. Une tour de plan circulaire couverte d'un toit conique présente une meurtrière et l'arrachement du mur de clôture de la cour. La construction est faite d'un appareil de moellons calcaires équarris et assisè.                   Vestiges du château de Chapieu construit vers 1160  de 96 mètres de long.","habitants":"Famille d'Estienne de Savy,\"","divers":"Vestiges de Chapieu  et de Prades à Lunéojols, château de Lanuejols de Chapieu et le Mausolée.","gps":"","images":["../image/image_48/48_Lanuejols_Cevennes_1.jpg","../image/image_48/48_Lanuejols_Cevennes_2.jpg","../image/image_48/48_Lanuejols_Cevennes_3.jpg","../image/image_48/48_Lanuejols_Cevennes_4.jpg","../image/image_48/48_Lanuejols_Cevennes_5.jpg"]},"Consult_chateau_formulaire5921":{"id":"Consult_chateau_formulaire5921","dept":"48","canton":"Grandrieu","commune":"Chateauneuf de Randon","nom":"Laubert","type":"Château","periode":"XV","histoire":"LAUBERT, en 1112 Raymond-Beranger III Comte de Barcelone épouse Douce, héritière du Gévaudan et de la Provence. En 1113, Douce donne ses biens à son époux Raymond-Béranger dont le fils devient Roy d'Aragon. Ainsi le Gévaudan, et bien sûr la seigneurie de Laubert, passent sous la domination des Roys d'Aragon pendant plus de cent ans. en 1278 Le chapitre de Mende, seigneur de Laubert. On sait aussi que le chapitre de Mende y possède le mas de Bonifaces et que l'abbaye de Bonnevaux (Gard) y perçoit des revenus. En 1322 le Chapitre devient seul seigneur de Laubert et s'approprie le château qu'il conserve jusqu'aux guerres de religion. En 1569 le chapitre doit vendre la seigneurie de Laubert à noble Pierre de Rivière qui avait épousé Louise Guérine de Cardalhac Dame de Corsac et coseigneuresse du Tournel. En 1597 le chapitre tente de récupérer la seigneurie de Laubert mais il est débouté par un arrêt du conseil du Roi qui maintient en possession la veuve de Pierre de Rivière. Le nom \"palais du Roy\" donné au château de Laubert vient du fait que, selon la légende la fille du Roy d'Aragon, atteinte de la lèpre y fut exilée pendant de nombreuses années.","architecture":"Laubert, l'ensemble Moyen-Ageux fortifié ne subsiste que le corps principal du château, remanié pour la dernière fois au XVIIIe siècle en 1721. On peut voir aussi un petit édicule, à l'extérieur de l'enceinte actuelle, en bon état, et qui n'est autre qu'une \"tour d'aisance\". Un souterrain, bâti pour une circulation humaine \"tête baissée\", a été mis à jour par deux fois dans le village actuel. Une exploration complète et une réhabilitation seraient à envisager Les propriétaires, les modifications qui subsistent aux quatre angles sont les vestiges des tourelles d'angle et du chemin de ronde couvert qui donnaient au château son aspect médiéval. Sur la façade nord on peut voir très clairement une meurtrière, maintenant obstruée, autre témoin de la forteresse originelle. Toujours sur la façade nord, on découvre, en levant la tête, une construction en porte-à-faux, une deuxième tour d'aisance en parfait état.","habitants":"Famille de Raymond-Beranger\"","divers":"Château de Laubert.","gps":"","images":["../image/image_48/48_Laubert_1.jpg","../image/image_48/48_Laubert_2.jpg"]},"Consult_chateau_formulaire7f06":{"id":"Consult_chateau_formulaire7f06","dept":"48","canton":"La Canourgue","commune":"Laval du Tarn","nom":"Laval_La_Caze","type":"Forteresse","periode":"XIV-XV","histoire":"Deux châteaux à Laval sur Tarn celui de la Caze du XVe siècle, et celui du Grandlac du XIVe siècle                 La CAZE, construction au XVe siècle d'une petite maison-forte pour Soubeyrane Alamand et Guillaume de Montclar de cet union nacquirent cinq  filles, la dernière Gabrielle devient dame de la Caze à la mort de sa mère. L'oncle de Soubeyrane, François Alamand, était prieur au monastère de Sainte-Énimie, et prévôt de la cathédrale de Mende. Il paya une grande partie de la construction du château pour sa nièce.  Le château passa par alliance à Bertrand de Mostuejouls par alliance avec Anne fille  de Françoise, il eurent un garçon David  de Maillan.  Les travaux de rénovation ont sans doute été réalisés pour la famille de Maillan,  riches marchands anoblis qui constituent à partir du XVIe siècle un domaine agricole  sur le causse de Sauveterre  autour des châteaux de La Caze et de Grandlac (voir article).   La deuxième épouse  de celui-ci  Anne des Ondes offrit à sa petite fille Marthe une galerie de huit portraits pour la chambres des Nymphes.  Le château a été transformé en hôtel de luxe.             GRANDLAC, le domaine est mentionné comme manse dans l'acte de paréage passé entre le roi de France et l'évêque de Mende en 1307. La maison est entre les mains de Jean de Maillan en 1580. Par son mariage avec Jacquette de Mostuéjouls, il réunit à cette date Grandlac au domaine de la Caze situé sur la même commune. On lui doit peut-être les aménagements de la maison: arasement des parties hautes, percement de baies dans l'élévation sud. A la suite d'une période d'abandon, l'édifice est acheté au milieu du XIXe siècle  par la famille de Nogaret qui en fait le logis d'une importante exploitation agricole.","architecture":"La Caze,  du XVe siècle est à l'origine une maison forte, travaux d'aménagement  au XVIIe siècle, percements de baies à croisée et à traverse et surtout création du plafond de la chambre dite des nymphes dont le décor est daté 1637. Au centre de la courtine flanquée de deux tours rondes sommées de mâchicoulis, la haute tour carrée défendait l'entrée  de la forteresse ; la galerie sud-est une adjonction du XIXe siècle. La belle porte d'entrée de la tour principale provient du château  de St-Saturnin à La Canourgue, c'est sans doute au XVIe siècle que l'on agrandit l'édifice au nord et que  l'on construit l'escalier principal.                                Grandlac; la construction de la maison forte pourrait dater du XIVe siècle ou du XVe siècle; de cette  période subsistent probablement le gros-oeuvre, les corbeaux soutenant le mâchicoulis disparu, les culs de lampe  des échauguettes arasées ornés de bustes et de têtes de caractère grotesque et un linteau monolithe  orné d'un trilobé en remploi dans le pignon, corps de logis de plan massé à deux étages carrés, construit en moellons de pierre calcaire équarris et assisés. Le toit  est couvert de lauzes de schiste. La tour demi hors-oeuvre circulaire contenant un escalier en vis sans jour est couverte d'un toit en appentis. Les culs de lampe des échauguettes disparues  sont couverts de toits coniques.    Maison forte à St-Chely du Tarn.","habitants":"Famille de Guillaume de Montclar         Famille de Jean de Maillan\"","divers":"Château de la Caze et de Grandlac à Laval du Tarn","gps":"","images":["../image/image_48/48_Laval_La_Caze_1.jpg","../image/image_48/48_Laval_La_Caze_2.jpg","../image/image_48/48_Laval_La_Caze_3.jpg","../image/image_48/48_Laval_La_Caze_4.jpg","../image/image_48/48_Laval_La_Caze_5.jpg","../image/image_48/48_Laval_La_Caze_6.jpg","../image/image_48/48_Laval_La_Caze_7.jpg","../image/image_48/48_Laval_La_Caze_8.jpg","../image/image_48/48_Laval_La_Caze_9.jpg"]},"Consult_chateau_formulaire4cfb":{"id":"Consult_chateau_formulaire4cfb","dept":"48","canton":"Langogne","commune":"Luc","nom":"Luc_Lozere","type":"Vestiges","periode":"XII","histoire":"LUC, vestiges du château qui était  tout d'abord une possession des seigneurs De Luc, devenus par le biais de mariages, liés aux barons d'Anduze, de Randon (installés près de Rieutort-de-Randon puis au Châteauneuf-de-Randon au XIIe siècle), de Moras, de Merle et de Périer. Il devient ensuite une possession des Polignac, bien que certaines parties dépendent des seigneurs voisins (une tour aux Agrain des Hubacs, une autre aux Bourbal de Choissinet). En 1380, durant la guerre de Cent Ans, il est assiégé par une bande de routiers. Les habitants réfugiés là seront secourus par dix gentilshommes des alentours. Ils sont emmenés par trois seigneurs, dont Béraud d'Agrain des Ubas. Durant les guerres de religion du XVIe siècle, une garnison est installée là pour protéger cette partie du Gévaudan. Le château est ensuite détruit après 1630 sur la demande de Richelieu, comme il sera fait de celui de Châteauneuf-de-Randon et de Grèzes.","architecture":"Luc, sur un ancien site celtique, vestiges  d'un château du XIIe siècle dont la plus haute tour porte une  grande statue de la vierge, ce château possédait cinq tours et trois redoutes qui ont laissé de beaux restes. Le bâtiment le plus ancien du château est antérieur au XIIe siècle. Au cours du XIIe et XIIIe siècle des murailles furent édifiées pour relier les tours et former ainsi une enceinte. En 1878, le donjon est transformé en chapelle et la statue de la Vierge Marie est alors installée. En 1978, quelques amis décident de lui redonner sa place dans la vie locale. Ils fondent une association de sauvegarde et de mise en valeur du château de Luc. Son but est de préserver et de restaurer ces vestiges.","habitants":"Famille d'Agrain des Hubacs\"","divers":"Vestiges du château du Luc","gps":"","images":["../image/image_48/48_Luc_Lozere_1.jpg","../image/image_48/48_Luc_Lozere_2.jpg","../image/image_48/48_Luc_Lozere_3.jpg","../image/image_48/48_Luc_Lozere_4.jpg","../image/image_48/48_Luc_Lozere_5.jpg"]},"Consult_chateau_formulaire30b9":{"id":"Consult_chateau_formulaire30b9","dept":"48","canton":"Saint-Alban sur Limagnole","commune":"Le Malzieu","nom":"Malzieu_Chateau","type":"Château","periode":"XVI-XVIII","histoire":"Plusieurs Chateaux à le Malzieu, de Laporte du  XIXe siècle,  du Villard et du Villeret bâti en 1608.            VILLERET  cette famille citée en 1650 (Pierre Bertrand Louis Brun de Villeret)\r\nchevalier d'Empire (1808), baron de Villeret (1818), pair de France (1835), chevalier de Saint-Louis, grand officier de la Légion d'honneur (1836), chevalier de Saint-Henri de Saxe, dans cette, le petit château du Villard, planté dans un décor de nature et de légendes, dégage une ambiance médiévale avec ses murs et ses cheminées de granit. Bâti en 1608, il vous plonge dans le début du XVIIe siècle. Transformé en chambres d'hôtes par Ingrid Kremer.","architecture":"ST-Leger, ce château sur lequel on ne connaît aucune étude, pourrait dater en partie du XVIIe siècle. Cependant,  la présence d'importants corbeaux de pierre pourraient être des vestiges d'un mâchicoulis médiéval. L'édifice a été très remanié lors de sa restauration.  le château est composé d'un corps de logis, de plan rectangulaire. Les murs sont constitués de moellons de granite. Les encadrements et le  chaînage d'angle sont en pierre de taille. Le toit à croupe est couvert de tuile creuse. L'ensemble présente deux  étages carrés probablement desservis par un escalier en vis, inséré dans une tour demi hors-oeuvre.        Villard, corps de logis rectangulaire à quatre niveaux toiture en croupes, dégage une ambiance médiévale avec ses murs et ses cheminées de granit, avec dépendances sur l'arrière gauche.                Villeret; corps de logis rectangulaire à deux niveaux et attiques à cinq travées, toitures brisées.                  Laporte  plus villa que château, belle tourelle.","habitants":"Famille de Brun de Villeret\"","divers":"le château des Mercoeur, du Villeret, du Gouverneur, de Crussols  de Laporte et du Villard","gps":"","images":["../image/image_48/48_Malzieu_Chateau_1.jpg","../image/image_48/48_Malzieu_Chateau_2.jpg","../image/image_48/48_Malzieu_Chateau_3.jpg","../image/image_48/48_Malzieu_Chateau_4.jpg","../image/image_48/48_Malzieu_Chateau_5.jpg","../image/image_48/48_Malzieu_Chateau_6.jpg","../image/image_48/48_Malzieu_Chateau_7.jpg","../image/image_48/48_Malzieu_Chateau_8.jpg"]},"Consult_chateau_formulaire94a5":{"id":"Consult_chateau_formulaire94a5","dept":"48","canton":"Saint-Alban sur Limagnolle","commune":"Le Malzieu","nom":"Malzieu_Lozere","type":"Patrimoine","periode":"XII","histoire":"Plusieurs éléments du patrimoine a le Malzieu, le château des Mercoeur et de Crussols.                                 MALZIEU,  est village fortifié dont l'édification des remparts  survint au Moyen-Age, période durant laquelle la cité devient place forte et ville judiciaire,  il reste des traces, au moins dans les coutumes locales, d'une bataille qui aurait eu lieu contre les Sarrazins au VIIIe siècle. En effet, le « pré des Sarrazins », situé sous le village de Verdezun, attesterait de ce combat. Il y aussi le chemin des \"Espagnols\". En 1055, le Malzieu devient la propriété des barons de Mercur, l'une des huit baronnies du Gévaudan. En 1307, l'évêque de Mende, Guillaume VI Durand, conclut avec le roi de France l'acte de paréage. Les Mercur ayant principalement leurs possessions en Auvergne, qui sont rattachés à la cour de Riom et au parlement de Paris, alors que le reste du Gévaudan est dépendant de la cour et du parlement de Toulouse. Cet acte partagé en trois le territoire du Gévaudan,  la terre du Roi, la terre de l'évêque et la terre commune (administrée également par les barons). Le 7 août 1586, son armée a détruit la partie qui est de nos jours tournée vers le Pont de la Truyère. En 1632 après une épidémie de peste, la baronnie des Mercoeur qui échut aux Bourbons en 1643 et revient à la couronne de France en 1778.","architecture":"Malzieu au Moyen-Age possédait sept tours qui étaient reliées entre elles par des remparts :\r\nla tour de Mercur (en 1739, elle est désignée « Tour de Jaumes ») située au nord-ouest, est fortement abaissée et recouverte d'un toit ;\r\nla tour de Jonas, est emportée le 27 août 1656 par une crue du Galastre, les ponts sont tous noyés, la tour ne sera jamais reconstruite faute de moyens.\r\nla tour de Bodon à l'est, elle est la tour la mieux conservée, elle abrite l'office de Tourisme.\r\nla tour de Crussols, de nos jours il n'en reste que de minces traces ;\r\nla tour de Thaler est située au nord-ouest au côté du trou de Merle, écrêtée mais conservée.\r\nla tour de la Communauté, détruite par les troupes de Joyeuse.\r\nla tour de Tourlande, détruite par les troupes de Joyeuse.\r\nIl y avait aussi trois autres tours qui à l'intérieur des remparts étaient censées former le château, l'une d'entre elles était la tour de Baude, celle-ci est la seule qui reste du château.\r\nUne autre tour est le beffroi, qui porte l'horloge. Il servit autrefois de prison.","habitants":"Barons de Mercur\"","divers":"Patrimoine à Malzieu, tour de baude, de Thaler, des forains des ducs et la tour de Bodon à st-Leger de Malzieu","gps":"","images":["../image/image_48/48_Malzieu_Lozere_1.jpg","../image/image_48/48_Malzieu_Lozere_2.jpg","../image/image_48/48_Malzieu_Lozere_3.jpg","../image/image_48/48_Malzieu_Lozere_4.jpg","../image/image_48/48_Malzieu_Lozere_5.jpg","../image/image_48/48_Malzieu_Lozere_6.jpg","../image/image_48/48_Malzieu_Lozere_7.jpg","../image/image_48/48_Malzieu_Lozere_8.jpg"]},"Consult_chateau_formulaire2eb2":{"id":"Consult_chateau_formulaire2eb2","dept":"48","canton":"Chirac","commune":"Esclanèdes","nom":"Marance","type":"Château","periode":"XVII","histoire":"MARANCE, un manse d'Amaranza est mentionné en 1389 dans un hommage de Bernard de Cénaret. Le logis du  château est une construction du XVIIe siècle. Bâti en 1608, il vous plonge dans le début du XVIIe siècle. chambres d'hôtes par la famille Kremer.","architecture":"Un manse d'Amaranza La ferme a sans doute été construite au XVIIIe ou au XIXe siècle. Logis: construction dans un appareil de petits moellons calcaires assises comportant un corps de bâtiment à un étage de soubassement, un étage carré et un comble à surcroît couvert d'un toit à croupe, un escalier dans l'oeuvre à mur noyau et une élévation à travées ; corps de bâtiment d'exploitation en retour à rez de chaussée  voûté en berceau plein cintre et grande citerne cylindrique; ferme isolée du château comprenant 3 logis contigus desservis par des escaliers de distribution extérieurs droits ; un des logis possède un comble voûté et un toit couvert de lauzes calcaires.","habitants":"Famille de Bernard de Cénaret\"","divers":"Château de Marance à Esclanèdes","gps":"","images":["../image/image_48/48_Marance_1.jpg"]},"Consult_chateau_formulaire2c58":{"id":"Consult_chateau_formulaire2c58","dept":"48","canton":"Aumont-Aubrac","commune":"Marchastel","nom":"Marchastel","type":"Château","periode":"XII","histoire":"MARCHASTEL, fief de la baronnie des Peyre, les sires de Peyre font hommage au vicomte du Gévaudan vers 1126 et en 1150, puis à l'évêque de Mende vers 1152. L'archevêque de Sens se soumit, et envoya à la Beaume, comme ses procureurs, messire Philibert de Guaint, sieur de Villemorenc, chevalier d'Aubrac; messire Raymond Dumas, conseiller du roi et messire Biaise Sodrillac, avocat au parlement de Paris. Les trois mandataires, munis d'une procuration en règle, rendirent à dame Marguerite de Soulages et à son mari, au nom de la seigneurie de Marchastel.  Le seigneur de Marchastel accepta cette proposition; et fit expressément stipuler dans l'acte d'hommage, « que ses rentiers, ses fermiers, pourront aller prendre tout le bois qui leur sera nécessaire aux bois d'Aubrac, soit en Gévaudan, soit en Rouergue; et que les habitants de Marchastel auront la faculté d'en prendre, tant pour le chauffage que pour leurs constructions, dans tous les bois d'Aubrac situés en Gévaudan, excepté dans les bois des Salhens. le château dit le Petit-Villard transformé en chambres d'hôtes.","architecture":"Le château de la baronnie des Peyre se dressait sur le pic appelé \"la Tour\" ils reste quelques vestiges de mur.          Le château de Marchastel dit le petit Villard bâtisse du XIXe siècle à trois niveaux, neuf travées et fronton en façade sur trois travées.","habitants":"les sires de Peyre\"","divers":"Château de Marchastel","gps":"","images":["../image/image_48/48_Marchastel_1.jpg","../image/image_48/48_Marchastel_2.jpg"]},"Consult_chateau_formulaire62b5":{"id":"Consult_chateau_formulaire62b5","dept":"48","canton":"Marvejols","commune":"Marvejols","nom":"Marvejols","type":"Patrimoine","periode":"XI","histoire":"A Marvejols,  au XIe siècle, Marvejols est un petit bourg, situé près de Grèzes, et de son puissant château, et du prieuré-monastère du Monastier, fondée en 1060.   MARVEJOLS, appartient  à la vicomté de Grèzes, propriété successive des comtes de Toulouse, de l'évêque de Mende, des comtes de Barcelone, des rois d'Aragon et du royaume de France. Le bourg est également à proximité du Roc de Peyre où se dresse le château principal de la baronnie du même nom, et dont Marvejols fait partie.  Porte de Soubeyran, autrefois appelée porte de l'Hôpital. A propos des Augustins de Marvejols,  pas de documents sur l'époque de l'établissement des Augustins à Marvejols ; ils devaient exister antérieurement aux guerres de religion, nous trouvons qu'en 1586, à l'époque du siège, leur couvent fut presque entièrement ruiné, À partir de 1589, Henri IV de France apporte son soutien aux habitants de la ville pour qu'ils puissent reconstruire la cité, en 1590, une partie seulement existait en entier au champ qu'ils avaient à la sortie de la porte de l'hôpital. Plus tard, il fut réédifié dans la ville pour le mettre à l'abri d'un nouveau coup de main.","architecture":"La ville de Marvejols ne comprenait, à peu de chose près, que l'espace compris entre les boulevards actuels.  Luttant avec Du-Guesclin contre les grandes compagnies des routiers, qu'elle était défendue par une enceinte de remparts et de tours armées de créneaux et de mâchicoulis dont on voit encore des restes et enfin par trois grandes portes que défendaient des ponts levis, porte de Soubeyran, porte de Chanelles et la porte du Théron.  Ce sont des portes doubles défendus par deux grosses tours rondes, ces tours sont reliés par une courtine et couronnées de mâchicoulis  coiffé de lauzes. La ville de Marvejols est  fortifiée dans les années 1360.  En mars 1481, le roi Louis XI assura sa protection royale par ses lettres patentes.  La porte du Soubeyran, une porte datant du XIVe siècle, malgré une réparation effectuée au XVIIe siècle, elle conserve son allure très médiévale. La porte de Chanelles idem du XIVe siècle, et la porte du Théron; Esplanade, chambres d'hôtes.","habitants":"Famille du Roc de Peyre \"","divers":"Patrimoine de Marvejols la porte de Soubeyran, la porte de Théron, la porte de Chanelles et la mairie.","gps":"","images":["../image/image_48/48_Marvejols_1.jpg","../image/image_48/48_Marvejols_2.jpg","../image/image_48/48_Marvejols_3.jpg","../image/image_48/48_Marvejols_4.jpg"]},"Consult_chateau_formulaire2d99":{"id":"Consult_chateau_formulaire2d99","dept":"48","canton":"Marvejols","commune":"Marvejols","nom":"Marvejols_Chateau","type":"Château","periode":"XIV-XVIII","histoire":"Plusieurs châteaux à Marvejols; les portes du XIVe siècle, celui de Saint-Lambert  du XVIIIe siècle, le domaine de la Carrière, de Pineton, de l'Esplanade, de l'Empery, de Lignon, de Cougoussac ( voir article )  et le château d'Antrenas à Crespin.                              ST-LAMBERT, les Augustins avaient leurs couvents est la demeure de la famille Framond, le domaine du château, aujourd'hui un Poney-Club de la Crouzette.                        CARRIERE, le domaine, ancien relais de chasse, lié à la famille de Chambrun appartient depuis deux décennies à la famille Mialanes. Aujourd'hui chambres d'hôtes par la famille Crémona.          L'EMPERY, lié à la famille de Chambrun, parmi ces trois nouveaux arrivés, il y avait deux femmes, deux cousines, deux américaines de Cincinnati. La première, Margaret Rives Nichols, était venue sinstaller à Marvejols, en 1897, après son mariage avec le marquis Pierre de Chambrun. Elle y acquit une réputation de générosité qui servit bien la carrière politique de son mari, député, puis sénateur de la Lozère. Clara Longworth rencontre celui qui allait devenir son mari : Aldebert de Chambrun, le deuxième fils de la maison.                  LIGNON, Pas d'information historique.   PINETON, habité par la famille Pineton de Chambrun pendant une grande partie du XVIIIe siècle, cette famille s'est particulièrement illustrée aux XIXe siècle et XXe siècle avec des hauts fonctionnaires (un préfet et deux diplomates), Depuis le milieu du XIXe siècle, comme quelques autres, cette famille descend en ligne féminine du général La Fayette. Le château fut acquis en 1818 par la famille d'Espinassoux.   Manoir de l'ESPLANADE au centre de Marvejols, chambres d'hôtes par madame Fernandez, plus villa que château, pas d'historique du XXe siècle.","architecture":"Carrière, corps de logis rectangulaire à deux niveaux toiture en croupe accolé de deux pavillons rectangulaire  de trois niveaux, toitures en croupes, avec ses écuries datant du XVIIe siècle et ses tours majestueuses. En 2007, le château  a subi une profonde rénovation, mais les parquets et boiseries ont été conservés. Lemperie, de plan rectangulaire, un corps de logis à deux niveaux coupé par un donjon de quatre niveaux à toit pointu accolé d'une tour ronde à mâchicoulis recouvert d'un toit incliné, bâtiment à trois niveaux prolongé avec terrasse.     Lignon, corps de  logis rectangulaire à deux niveaux et attiques, curieux toit en caréne  et ses deux oeils-de-boeuf sur le pignon, en 1872 c'était un établissement industriel pour la laine.               St-Lambert, corps de logis rectangulaire à trois niveaux et attiques  toiture en croupe  accolé d'une tour ronde de chaque côté dont une arasée                  Saint-Hélion,corps de logis rectangulaire à deux niveaux toitures en croupes accolé à une tour ronde sur la droite et pavillon saillant sur la gauche,         Pineton, corps de logis rectangulaire à trois niveaux et à sept travées accolée d'une tour carrée dépassant l'ensemble. Acquis par le clos du Nid.","habitants":"Famille de Chambrun \"","divers":"Le château de Carrière, de Pineton, l'Empery, de Lignon, de Saint-Helion, la Colagne et de Saint-Lambert","gps":"","images":["../image/image_48/48_Marvejols_Chateau_1.jpg","../image/image_48/48_Marvejols_Chateau_2.jpg","../image/image_48/48_Marvejols_Chateau_3.jpg","../image/image_48/48_Marvejols_Chateau_4.jpg","../image/image_48/48_Marvejols_Chateau_5.jpg","../image/image_48/48_Marvejols_Chateau_6.jpg","../image/image_48/48_Marvejols_Chateau_7.jpg","../image/image_48/48_Marvejols_Chateau_8.jpg","../image/image_48/48_Marvejols_Chateau_9.jpg"]},"Consult_chateau_formulaire4a50":{"id":"Consult_chateau_formulaire4a50","dept":"48","canton":"Florac","commune":"Le Pompidou","nom":"Masaribal","type":"Château","periode":"XIX","histoire":"Dans la commune de Pompidou un château du XIXe siècle et  le château Parlier du XXe siècle,   tous deux construit par des industriels locaux.                      La terre de MASARIBAL dépendait de la baronnie de Florac. Déjà en 1219, au moins un château s'élevait en ce lieu. Différentes familles s'y succédèrent jusqu'au XIXe siècle.","architecture":"La maison forte de Masaribal quadrilatère à deux niveaux du XVIIe siècle  toitures en lauzes.                               Le château de Parlier de plan rectangulaire avec pavillon de prolongement de chaque côté toiture à la Mansard et le troisième château plus maison de maitres que château à deux niveaux et attiques toitures à la Mansard.","habitants":"baronnie de Florac\"","divers":"Maison forte de Masaribal et le château Parlier","gps":"","images":["../image/image_48/48_Masaribal_1.jpg","../image/image_48/48_Masaribal_2.jpg","../image/image_48/48_Masaribal_3.jpg","../image/image_48/48_Masaribal_4.jpg","../image/image_48/48_Masaribal_5.jpg"]},"Consult_chateau_formulaire9b24":{"id":"Consult_chateau_formulaire9b24","dept":"48","canton":"Mende","commune":"Mende","nom":"Mende","type":"Patrimoine","periode":"XII","histoire":"A Mende en plus du patrimoine local possède plusieurs châteaux   le Bahours, Bellesagne  et de Rieucos.           MENDE, le Gévaudan au XIIe siècle fait partie du comté de Barcelone. Aldebert III, dit « le Vénérable », évêque de la ville au milieu du XIIe siècle, car, ayant racheté les possessions du comte de Barcelone à Mende, il était devenu le régent de la ville.  À Mende, les comtes y ont un château, le castel-Frag. Trois autres seigneurs ont leur château autour de l'église romane : celui de Canilhac, celui de Cabrières et de Dolan qui administre et régente la maison épiscopale durant l'interrègne des évêques. En 1161, Mende, qui est alors sous la suzeraineté du roi de France, voit son évêque Aldebert III obtenir les droits régaliens. Cette situation prend fin à partir de 1307 avec l'acte de paréage conclu entre l'évêque Guillaume VI Durand et le roi Philippe le Bel  Le chapitre de Mende possède, à cette époque, un château sur les hauteurs de la ville, au Chastel-Nouvel.  En 1390, Bernardon de la Salle est à Mende, où Jean III d'Armagnac tentait, au nom du roi de France, de mettre un terme à la guerre privée que Raymond de Turenne menait contre le pape d'Avignon.  Au XVIe siècle, les événements principaux sont la réforme et les guerres de religions qui en découlent. Le 21 juillet 1562, lors du massacre de la Saint-Barthélémy, le baron Astorg de Peyre est assassiné.         BAHOURS, seigneurie de Bahours possédait deux châteaux mais celui du centre du hameau a été démoli vers 1960.       BELLESAGNE un député lozérien Ed Marius Bousquet (1932-1942)  y est mort le 7 février 1954.Aujourd'hui est un  ensemble thérapeutique.                      RIEUCROS; pas d'information historique.","architecture":"Mende; en 1150 est entouré de remparts,   Mende fut une ville fortifiée, ceinte de murailles, possède la porte du Théron, de Soubeyran, la tour des pénitents , la tour du collège, la tour de l'orange.  La destruction des remparts fut entreprise à partir de 1768. Il  reste cette tour des Pénitents, haute de près de 30 m., qui servait de logement au sacristain et de clocher à la chapelle des Pénitents Blancs qui jouxte la tour et qui fut construite au milieu du XVIIe siècle. \r\nAvant l'installation des Pénitents, la tour s'appelait Tour d'Auriac, du nom du quartier. Les Pénitents Blancs formaient une confrérie d'hommes et de femmes de la « bonne » société qui se réunissaient dans la chapelle et s'adonnaient à la charité. Bellesagne et l'ancienne gendarmerie.                           Bellesagne, manoir de plan rectangulaire  petit château à cinq travées du XIXe siècle, corps de logis  à deux niveaux et attiques surélévation en plein cintre en façade avec fronton, dépendance à l'arrière du bâtiment.              Bahours; présente une masse cubique à trois niveaux couverte d'un toit à croupes recouvert de lauzes à gardé ses fenêtres à meneaux. Cette maison forte fut vraisemblablement construite vers 1648 sur un bâtiment plus ancien et agrandi.                               Rieucros d'Abaisse; en forme d'équerre à cinq niveaux.","habitants":"Famille de Bernardon de la Salle\"","divers":"Le patrimoine de Mende la tour des Pénitents, la tour du collége, la tour de l'orange, le château de Bahours, de Bellesagne de Rieucros d'Abaisse.","gps":"","images":["../image/image_48/48_Mende_1.jpg","../image/image_48/48_Mende_2.jpg","../image/image_48/48_Mende_3.jpg","../image/image_48/48_Mende_4.jpg","../image/image_48/48_Mende_5.jpg","../image/image_48/48_Mende_6.jpg","../image/image_48/48_Mende_7.jpg","../image/image_48/48_Mende_8.jpg","../image/image_48/48_Mende_9.jpg"]},"Consult_chateau_formulairee14b":{"id":"Consult_chateau_formulairee14b","dept":"48","canton":"Florac","commune":"Meyrueis","nom":"Meyrueis","type":"Château","periode":"XII-XV","histoire":"Meyrueis; vestiges portes et remparts et trois châteaux, des Ayres du XII-XVIe siècles, Roquedols du XVIe siècle (voir article) et de Viguier.          MEYRUEIS,  dès le Xe siècle à une famille de ce nom et des barons d'Anduze. En 1229, La châtellenie fut ensuite possédée par la famille de Roquefeuil jusqu'en  1230 où elle passa par mariage aux comtes de Rodez, puis en 1283 à ceux d'Armagnac, le comte Raymond II de Roquefeuil. La charge de Viguier royal est alors détenue par la famille Pagès de Pourcarès (qui détiendra par ailleurs la baronnie de Roquedols). Hérail de Pagès, surnommé le capitaine Pourcarès.  En 1607, Henri IV, qui a hérité du château de Meyrueis de sa mère, Jeanne d'Albret, unit ses possessions au domaine de la Couronne de France, aux ducs d'Alençon.  Meyrueis, ville protestante d'un Languedoc en conflit avec le jeune roi Louis XIII, vécut son dernier siège en 1628. Le duc Henri de Rohan, chef militaire des révoltés, vint mettre le siège avec plusieurs milliers d'hommes devant le château en mai 1628. En 1629, Rohan fut défait et le roi put sceller la paix par la « Grâce d'Alès ». Cet édit, donné en 1630, amnistiait les rebelles mais ordonnait la destruction de leurs fortifications. La démolition du château et des deux portes principales de la cité eut lieu en 1632.                   AYRES, monastère au XIIe siècle, où il constituait avec ses dépendances de Sirgas, Campis et Peyremoule la propriété du chapitre de l'église de Montpellier. Transformé en résidence seigneuriale dès le XVIe siècle par André Galtier de Montauran, qui l'habitat jusqu'en 1624,  fut réaménagé en château au XVIIIe siècle par les Nogaret à la suite dun incendie lié à la guerre des Camisards. Transformé en hostellerie de campagne dans les dernières décennies par l'héritière demoiselle de Roussel qui épousa un cousin des Nogaret. Aujourd'hui par madame G.  Teissier du Cros.              VIGUIER pas d'information historique.","architecture":"Meyrueis, conserve des vestiges de ses fortifications, des remparts ceinturent la ville ; ils sont percés de portes. La démolition du château et des deux portes principales de la cité a lieu en 1632,  La porte Méjeane (du milieu) et le portail du Prieirou (prieuré) donnent toujours accès au quartier médiéval, appelé « la Ville », et qui contient quelques traces du quartier juif (Judarié) ou du premier temple protestant (XVIe siècle) ainsi que la maison des Consuls sur le planet.\r\nLa tour de l'Horloge, reconstruite en 1568 sur des bases médiévales, cantonne l'enceinte au confluent de la Jonte et du Béthuzon. Restaurée après un incendie en 1897. Un campanile de ferronnerie la surmonte. Il renferme une cloche de belles proportions, datée de 1634.\r\nAyres, l'ancien prieuré Saint-Martin des Ayres, situé près de la Jonte, à 1 km au nord-est de la cité, est transformé en château au XVIe siècle par la famille Galtier. Après avoir connu les vicissitudes des conflits religieux, l'édifice est reconstruit par la famille Nogaret au XVIIIe siècle puis transformé en hôtel-restaurant de luxe au XXe siècle.                                   Viguier; bâtisse à trois niveaux dans Meyrueis à gardé sa façade féodale avec sa tour hors-oeuvres.","habitants":"Famille de Roquefeuil \"","divers":"Vestiges, tour, porte Méjanne et maison des consuls à Meyrueis, le château des Ayres et de Viguier","gps":"","images":["../image/image_48/48_Meyrueis_1.jpg","../image/image_48/48_Meyrueis_2.jpg","../image/image_48/48_Meyrueis_3.jpg","../image/image_48/48_Meyrueis_4.jpg","../image/image_48/48_Meyrueis_5.jpg","../image/image_48/48_Meyrueis_6.jpg","../image/image_48/48_Meyrueis_7.jpg"]},"Consult_chateau_formulaireb25d":{"id":"Consult_chateau_formulaireb25d","dept":"48","canton":"Collet de Déze","commune":"Moissac Vallée Française","nom":"Moissac_Cevennes","type":"Vestiges","periode":"XI-XVI","histoire":"MOISSAC, au début du XIe siècle les seigneurs d'Anduze y construisirent au centre de la vallée un véritable château-fort veillant sur leur petite baronnie de Moissac, fief de celle de Florac, une des huit grandes baronnies de la province du Gévaudan. En 1229, à la fin de la croisade des Albigeois, leurs biens et donc le fief de Moissac furent confisqués par le Roi de France. En 1307, au terme d'un long procès opposant le Roi à l'évêque de Mende, l'acte de paréage attribua à ce dernier la baronnie de Moissac. Sous le règne de Louis XIV, en 1685, comme toutes les localités protestantes, Moissac fut victime de dragonnades. Les membres de la religion réformée furent alors contraints d'héberger des soldats (des dragons) qui avaient presque tous les droits pour les « convertir ». Sous la pression de ces exactions, ils se convertirent en masse et devinrent des nouveaux convertis. Les plus récalcitrants s'enfuirent, rejoignant l'émigration huguenote vers la Suisse, l'Allemagne, les Pays-Bas, l'Afrique du Sud.  Avec la révocation de l'édit de Nantes, le 18 octobre 1685, la répression sur les protestants s'accentua. Pendant la Révolte des Camisards (1702-1704), le village, était situé au cur de la zone rebelle et subit bien des troubles : passage de troupes, assemblées secrètes au « désert », « levées d'impôt » des camisards, représailles, meurtres, incendies, etc. Le château fut alors brûlé par les camisards (mais fut reconstruit par la suite) et ils échouèrent à incendier l'église de Notre-Dame-de-Valfrancesque. Lors du «l'incendie des Cévennes » tactique de la terre brulée employée par l'armée royale et destinée à empêcher tout soutien matériel à la guérilla), les maisons des « anciens protestants » furent rasées. Leurs habitants durent se réfugier à Saint-Étienne-Vallée-Française ou à Saint-Jean-du-Gard.","architecture":"Vestiges du château de Moissac-Vallée-Française a été construit au XIe siècle sur les bases d'un ancien château reconstruit au XVIe siècle. Il fut brûlé une première fois pendant la révolte des Camisards puis une seconde fois à la Révolution. A la Révolution, des groupes de « patriotes » révolutionnaires obligèrent les nobles à détruire les signes distinctifs de leurs maisons. L'un d'entre eux mit le feu au château qui fut définitivement abandonné. C'était un quadrilatère à trois étages, bâti sur un bloc de schiste conserve son allure imposante, donjon, tourelles à chaque angle et Il était défendu par deux tours d'angle relié au château par un chemin de ronde courant le long du rempart, l'accès par pont-levis surplombant un long fossé.","habitants":"Baronnie de Moissac\"","divers":"Vestiges du Château  de Moissac","gps":"","images":["../image/image_48/48_Moissac_Cevennes_1.jpg","../image/image_48/48_Moissac_Cevennes_2.jpg","../image/image_48/48_Moissac_Cevennes_3.jpg"]},"Consult_chateau_formulaire5e98":{"id":"Consult_chateau_formulaire5e98","dept":"48","canton":"Collet de Déze","commune":"Molezon","nom":"Molezon","type":"Château-Vestiges","periode":"XII-XVI","histoire":"A Molezon, le château de Mazel, maison-forte de la Rouvière, maison-forte de Devèze chambres d'hôtes, maison-forte de Brissac, la tour de la Canourgues et Biasses,  maison forte de Sous-Breton et du Castelet.                        MAZEL, ce château a été construit par la famille du Parlier du Mazel originaire de Barre qui se signala à l'assemblée de la noblesse du Gévaudan en 1784. Aujourd'hui  SCI LE Mazel, société civile immobilière est en activité depuis 9 ans.\r\nLA ROUVIERE, comme le Mazel  société civile immobilière dirigée à ce jour par Jean Matthews, a été fondée en janvier 1990. C'est donc une entreprise qui bénéficie d'une très forte ancienneté.   DEVEZE, transformé en chambres d'hôtes par Danielle Pinard et Lionel Dumarcet.   BRISSAC, maison forte de Sous-Breton ruiné et du Castelet ainsi que la tour de la Canourgue et de Biasses Je n'ai pas d'information historique.","architecture":"Brissac, plus maison forte que château, quadrilatère à trois niveaux flanqué sur façade côté vallée de deux tours rondes certainement arasées à la Révolution.    Devéze, comme Brissac  accolée à flan de colline avec deux tours rondes en façades arasées,  toiture à chapeau de style asiatique, blottie dans un écrin de verdure, au cur de la nature sauvage, cette ancienne demeure, restaurée dans le respect de lesprit cévenol traditionnel et avec le confort de nos jours, offre un séjour reposant dans une chambre dhôtes de charme, très belle et spacieuse.    Tour du Canourgue: vestige d'un système défensif du XIIe siècle; de tours à signaux reliant Anduze à Florac. il s'agit  du donjon d'un château abandonné à la fin du XIVe siècle.            Mazel, construit en 1880, corps de logis rectangulaire  à trois niveaux éclairé par des fenêtres à meneaux, flanquées  de deux petites tourelles d'angles en encorbellement surmontée de toits pointus et une porte Renaissance du XVIe siècle. La partie tournée vers Sainte-Croix est flanquée de deux grosses tours rondes à toits pointus.                     Rouvière, au XVIe siècle cité métairie noble de la Rouvière, sa façade principale percée de trois grandes fenêtres à meneaux, à l'arrière reste d'une tour carrée qui communique avec la tour du Canourgue et de Biasses.","habitants":"Famille du Parlier du Mazel \"","divers":"Tour de la Canourgue et de la Biasses, maison forte de Brissac, du Castelet et de Devése et château du Mazel et de la Rouvière","gps":"","images":["../image/image_48/48_Molezon_1.jpg","../image/image_48/48_Molezon_2.jpg","../image/image_48/48_Molezon_3.jpg","../image/image_48/48_Molezon_4.jpg","../image/image_48/48_Molezon_5.jpg","../image/image_48/48_Molezon_6.jpg","../image/image_48/48_Molezon_7.jpg","../image/image_48/48_Molezon_8.jpg","../image/image_48/48_Molezon_9.jpg"]},"Consult_chateau_formulaire08f5":{"id":"Consult_chateau_formulaire08f5","dept":"48","canton":"La Canourgue","commune":"La Malène","nom":"Montesquieu","type":"Château-Vestiges","periode":"XII-XVI","histoire":"A la Malène, les vestiges du château de Plagnols.                                 MONTESQUIEU, le manoir de La Malène date du XVIe siècles et se rattache à l'histoire des seigneurs de Montesquiou et Montesquieu par la suite. Louis XIII ordonna de raser les forteresses rebelles mais grâce aux services que rendit Pierre de Montesquieu, le château fut épargné.   Suite aux assauts répétés des protestants au XVIe siècle notre premier château, plus en aval, a été détruit, ses tours et ses tourelles montrent combien nous sommes puissants.  Au début du XVIIe siècle  Françoise de Montesquieu héritière épousa François  de Brun qui prit le nom de Brun de Montesquieu. Le château a tenu bon et a reçu les remerciements du roi Louis XIII.  Vers 1811 il appartient  au vicomte Grégoire de Gardies puis au général Thilorien son beau frère.   Depuis les années 1960 le château est devenu manoir, Les descendants des Montesquieu, la famille de Saint-Amand, lont vendu et les nouveaux propriétaires l'ont rénové, des agrandissements ont peu à peu été faits pour convertir le manoir en hôtel de charme et une nouvelle tour a même été construite.  Aujourd'hui Evelyne et Bernard  Guillenet gère l'hostellerie.","architecture":"Le premier château de Montesquiou dominant le château de Plagnols, ruinés, cité depuis le XIe siècle. Le 31 Octobre 1793, le château  de Montesquieu de La Malène furent livrés aux flammes. Ruines du Castel Merlet, plus vieux château de France connu, magnifique forteresse car les Francs envahissent le Gévaudan, protégés dun côté par les gorges et de lautre par la tour de garde et des remparts maçonnés. Reconstruit corps de logis de plan rectangulaire à trois niveaux il présente une tour centrale en façade et deux tourelles d'angle  à toit pointu. Le rez-de-chaussée et les deux étages sont percées  de fenêtres à meneaux.","habitants":"Famille de François  de Brun \"","divers":"Vestiges du château de Plagnols à la Malène et le château de Montesquieu.","gps":"","images":["../image/image_48/48_Montesquieu_1.jpg","../image/image_48/48_Montesquieu_2.jpg","../image/image_48/48_Montesquieu_3.jpg","../image/image_48/48_Montesquieu_4.jpg","../image/image_48/48_Montesquieu_5.jpg"]},"Consult_chateau_formulaire6cff":{"id":"Consult_chateau_formulaire6cff","dept":"48","canton":"La Canourgue","commune":"La Canourgue","nom":"Montjezieu","type":"Forteresse","periode":"XII","histoire":"MONTJEZIEU, la première date fiable attestant de sa présence est celle de 1121 où Pierre de Montjézieu fit hommage pour son château à Alphonse, roi dAragon. Relevant des comtes de Montferrand,  mentionné au XIIe siècle dans un hommage au roi d'Aragon, alors propriétaire du Gévaudan. Au XIIIe siècle, il serait la possession des évêques de Mende. Lors de l'acte de paréage de 1307. Néanmoins cette année 1307 est celle où les juifs furent expulsés du Gévaudan par ordre de l'évêque, puis les états généraux du Languedoc ordonnent sa démolition de 1653 et 1656 : C'est juste après les guerres de religions du XVIe siècle entre catholiques et protestants pour éviter que ce château serve de refuge. Pour une raison inconnue, l'ordre de démolition n'a pas été appliqué, ce qui n'est pas la cas de nombreux autres châteaux de la région,  le château serait donc devenu possession épiscopale à ce moment-là. Il est racheté en 1726 par Jean-Georges de Jurquet, seigneur de Salelles. Il le restaure en grande partie, et l'agrandit légèrement. La famille Barroux sont les propriétaires actuels. \r\n Pas d'information historique du château de Meylan et de Booz du XIXe siècle.","architecture":"Montjezieu, dit de Jurquet cité au XIIe siècle Imposant donjon rectangulaire en moellons calcaires à quatre étages, avec mâchicoulis et chemin de rondes couverts, le parapet est percé de fentes de tir pour armes à feu. Un logis du XVIe siècle ainsi qu'une tourelle ronde ont été accolés au donjon\r\nLe château de Meylan (monument privé aujourd'hui habité).","habitants":"Famille de Pierre de Montjézieu\"","divers":"La forteresse de Montjezieu","gps":"","images":["../image/image_48/48_Montjezieu_1.jpg","../image/image_48/48_Montjezieu_2.jpg","../image/image_48/48_Montjezieu_3.jpg","../image/image_48/48_Montjezieu_4.jpg"]},"Consult_chateau_formulaire822f":{"id":"Consult_chateau_formulaire822f","dept":"48","canton":"Saint-Chely d","commune":"Albaret sainte-marie","nom":"Orfeuillette","type":"Château","periode":"XIX","histoire":"ORFEUILLETTE, au milieu du XIXe siècle, le docteur Théophile Roussel, député et sénateur de la Lozère, rachète la demeure, qui était un rendez-vous de chasse, il transforme ce relais de chasse en un magnifique château. Les travaux ont duré plus de 15 ans et se sont achevés en 1875. Théophile Roussel y résidera jusqu'à la fin de sa vie, en 1903. Le médecin lègue l'édifice à sa petite fille, tant admiratif qu'il était devant le vu de celle ci de devenir religieuse  par charité, elle le légua à son tour  à son couvent. Durant une grande partie du XXe siècle, le château devint un  endroit de recueil, de pèlerinage pour les surs  de la France entière. Aux alentours des années 1980, le conseil général de la Lozère décide  d'acheter la propriété. Après avoir connu plusieurs  propriétaires, la famille Gardereau. Orfeuillette a connu  depuis 2009 un nouveau souffle, Christophe Brunel a entièrement redécoré l'intérieur du château, en donnant un  visage plus moderne  tout en conservant le charme et le caractère ancestral de la propriété, transformé en hôtel-restaurant.","architecture":"Château d'Orfeuillette est à Albaret Sainte Marie. Le château est une élégante demeure du XIXe siècle, entièrement rénovée. En forme de U à deux niveaux et attiques toitures mansardés  flanqués de deux tourelles polygonales à toit en poivrières sur les pavillons et tour sur les flans du bâtiment à trois niveaux. Sa décoration contemporaine et l'ambiance glamour contrastent agréablement avec la bâtisse.  Entouré par un parc de 12 hectares.","habitants":"Docteur Théophile RousseL\"","divers":"Le château d'Orfeuillette","gps":"","images":["../image/image_48/48_Orfeuillette_1.jpg","../image/image_48/48_Orfeuillette_2.jpg","../image/image_48/48_Orfeuillette_3.jpg","../image/image_48/48_Orfeuillette_4.jpg","../image/image_48/48_Orfeuillette_5.jpg","../image/image_48/48_Orfeuillette_6.jpg"]},"Consult_chateau_formulairee1fb":{"id":"Consult_chateau_formulairee1fb","dept":"48","canton":"Saint-Etienne de Valdonnez","commune":"Pied-de-Borne","nom":"Planchamp","type":"Château","periode":"XVIII","histoire":"PLANCHAMP, le château a été construit sans doute au XVIIIe siècle par la famille Barrot, une famille installée à Planchamp depuis le XIVe siècle. Vers la fin du XIXe siècle, Frédéric Barrot aménage grandement le château. C'est dans ce château qu'est né Odilon Barrot en juillet 1791. Cet homme politique avait d'ailleurs pour habitude de s'y retirer fréquemment.","architecture":"Le château de Planchamp est un château néo-renaissance du XVIIIe siècle, situé au village de Planchamp, sur la commune de Pied-de-Borne, construction du grand corps de logis à la fin du XIXe siècle dans le style néo Renaissance pour Frédéric barrot ; un logis plus ancien, peut être du XVIIIe siècle, a été conservé au nord-est. L'édifice se compose de deux étages carrés, gros-oeuvre en brique; granite et pierre de taille, élévation ordonnancée surmontée de toit à longs pans,  toit conique et flèche polygonale, couvertes d'ardoise.","habitants":"Famille de Frédéric Barrot\"","divers":"Château de Planchamp","gps":"","images":["../image/image_48/48_Planchamp_1.jpg","../image/image_48/48_Planchamp_2.jpg","../image/image_48/48_Planchamp_3.jpg","../image/image_48/48_Planchamp_4.jpg"]},"Consult_chateau_formulaire7a10":{"id":"Consult_chateau_formulaire7a10","dept":"48","canton":"Chirac","commune":"Palhers","nom":"Pradassoux","type":"Maison forte","periode":"XIII","histoire":"PALHERS, c'est en 1191 que Richard de Grèzes donne Palhers aux hospitaliers de Saint-Jean de Jérusalem en leur commanderie de Gap-Francès. Au début du XIIIe siècle, Palhers devient elle même une commanderie sous la dépendance du grand Prieuré de Saint-Gilles, avec des biens s'étendant à l'ouest du Gévaudan, et notamment sur l'Aubrac, ainsi qu'en Rouergue et en Vivarais.  Le commandeur hospitalier vivait à Palhers, qui avait des revenus très supérieurs à la commanderie mère de Gap-Francès. En 1332, la commanderie est donnée aux Hospitaliers de Saint-Jean de Jérusalem, au terme d'un procès que le roi Philippe le Bel intente à l'ordre du Temple.\r\nJusqu'à la Révolution, la Commanderie est desservie par les Hospitaliers appelés aussi chevaliers de Malte à partir du XVIe siècle.  Aujourd'hui SCI d'élevage dirigé par Véronique Bouniol.","architecture":"Palhers (Paillos) qui veut dire grange à paille en occitan s'est implanté autour de la commanderie fondée par le chevalier du Temples (ou Templiers) à partir du XIIe siècle. Le manoir de Pradassoux de plan carré à trois niveaux avec en façade une tour carré (donjon)  à l'opposé pavillon saillant et entre deux une tour ronde dont la toiture est englobé dans l'ensemble.","habitants":"commandeur Hospitalier\"","divers":"La maison forte de Pradassoux","gps":"","images":["../image/image_48/48_Pradassoux_1.jpg","../image/image_48/48_Pradassoux_2.jpg","../image/image_48/48_Pradassoux_3.jpg","../image/image_48/48_Pradassoux_4.jpg","../image/image_48/48_Pradassoux_5.jpg"]},"Consult_chateau_formulaire4add":{"id":"Consult_chateau_formulaire4add","dept":"48","canton":"La Canourgue","commune":"Sainte-Enimie","nom":"Prades","type":"Château","periode":"XV","histoire":"PRADES. Au milieu du XVe siècle, labbé du monastère abbatial de Sainte-Enimie, seigneur de Prades, administrateur de Julien de la Rovère, futur pape Jules II, vint résider à Prades. Lors des guerres de religion, le château de Prades résiste aux assauts du capitaine Merle mais doit être réaménagé.  Propriété des seigneurs prieurs de l'abbaye de Sainte-Enimie jusqu'à la Révolution. Vendu comme bien national, transformé en exploitation agricole. Il a été acquis en 1972 par le propriétaire actuel à la caisse des dépôts et consignations abandonné de 1950 à 60 puis restauré par la caisse des dépôts et consignations qui avait restauré ou reconstruits l'essentiel des parties supérieures et des toitures. Le château est aujourdhui redevenu une résidence privée.","architecture":"Prades, forteresse construite sur un éperon rocheux au dessus du Tarn, a été remanié à plusieurs occasions au cours des siècles,  est parfois décrit comme protecteur de l'abbaye de Ste-Enimie et son rôle est aussi expliqué par la protection de l'accès aux gorges.  Létude historique et archéologique entreprise par le propriétaire a mis en valeur la richesse de son histoire en liaison avec le puissant monastère de Sainte Enimie de fondation royale, avec les évêques et avec Urbain V. La présence des armes dUrbain V sur la cheminée (aujourdhui bûchées mais attestée par des écrits) témoigne de sa reconstruction à ce moment là. Cest sans doute à la même époque que fut offerte au prieur la précieuse Croix de Prades. Enorme polygone est occupe de divers bâtiments élevés sans interruption du XIIIe siècle au XVIe siècle autrefois ceint de rempart en grande partie disparu. En amont du Tarn il s'apparente à une énorme tour sans fenêtre, en aval de petites tours rondes à toits irréguliers et côté rive gauche large façade flanquée de deux tours carrées.","habitants":"Seigneur de Prades\"","divers":"Le château de Prades","gps":"","images":["../image/image_48/48_Prades_1.jpg","../image/image_48/48_Prades_2.jpg","../image/image_48/48_Prades_3.jpg","../image/image_48/48_Prades_4.jpg","../image/image_48/48_Prades_5.jpg","../image/image_48/48_Prades_6.jpg","../image/image_48/48_Prades_7.jpg","../image/image_48/48_Prades_8.jpg"]},"Consult_chateau_formulaireaf1d":{"id":"Consult_chateau_formulaireaf1d","dept":"48","canton":"Saint-Etienne de Valdonnez","commune":"Prévenchères","nom":"Prevencheres","type":"Tour","periode":"X-XIII","histoire":"A Prévenchères le château de Roure et la tour de la Garde-Guérin                 La GARDE-GUERIN, citadelle médiévale construite au Xe siècle par les seigneurs de Tournel  confrérie des nobles Pariers, dès le XIe siècle, administré par des seigneurs Pariers relevant de l'évêque de Mende Aldebert III.  On pense généralement que les seigneurs qui s'installèrent à La Garde vers le XIIe siècle étaient des Guérin, est un patronyme commun aux trois baronnies de  Randon, d'Apcher et du Tournel. Droit de péage sur le chemin de Régordane.  Pour porter assistance aux pèlerins et aux voyageurs qui se rendaient au Puy un hôpital leur était ouvert par la seigneurie mis à leur disposition une communauté de  27 seigneurs,   chacun vivant au village dans leur maison forte. Prit par les Anglais en 1361 et au XVIe siècle assiégé par les protestants. Abandonné sous Louis XIV en partie détruite par un incendie en 1722  et par la bataille de Fontenoy entraine le déclin de la Garde en 1745 par la mort des chevaliers de la Garde. les pariers furent abolit à la Révolution.            ROURE, fut le berceau de la famille de Beauvoir du Roure, d'origine modeste  qui s'éleva peu à peu par des alliances , jusqu'à devenir , à la fin de l'ancien régime  l'une des plus importantes du Languedoc, propriété du marquis de l'Aubespin.","architecture":"La tour de la Garde Guérin est le donjon médiéval du château. De plan carré, elle est haute de 21,50 m et a 4 étages dont 3 voûtés. Le rez de chaussée est aveugle, on ne peut y pénétrer que par une trappe ouvrant dans le sol du premier étage, voûté en berceau de plein-cintre, servait de garde-manger, le second et le troisième étage, également voûté en berceau de plein-cintre, constituaient des niveaux d'habitation, au sommet de la tour une terrasse, sans doute le vestige d'un étage supportant un toit disparu, offre un sublime point de vue sur les gorges du Chassezac. En cas d'assaut les habitants s'y réfugiaient, enlevaient les échelles mobiles et se défendaient en lançant toutes sortes de projectiles sur les ennemis (pierres, huile bouillante). Cette tour est équipée d'un appareil à bossage, caractérisé par des pierres dépassant le long des murs. Lorsqu'on envoyait des projectiles sur la tour, ils étaient aussitôt renvoyés dans le sens opposé.\r\nRoure, Il domine de son donjon millénaire les gorges sauvages du Chassezac, face à La Garde Guérin, son prestigieux voisin. Le château du Roure fut bâti à proximité dune ancienne voie romaine.  Donjon carré  à 3 étages avec vestiges de mâchicoulis  sans doute du XIIe siècle. Logis accolé, probablement construit au XVIe siècle, avec cheminées à moulures, fenêtre à croisée à l'étage. Tour nord entièrement  rebâtie, sur une base ancienne, et toit en pavillon   tournant à retours sans jour.","habitants":"Seigneurs de Tournel                 marquis de l'Aubespin\"","divers":"La tour de la Garde Guerin et la maison forte du Roure","gps":"","images":["../image/image_48/48_Prevencheres_1.jpg","../image/image_48/48_Prevencheres_2.jpg","../image/image_48/48_Prevencheres_3.jpg","../image/image_48/48_Prevencheres_4.jpg","../image/image_48/48_Prevencheres_5.jpg","../image/image_48/48_Prevencheres_6.jpg","../image/image_48/48_Prevencheres
