.  propriété publique, abrite la Maison Familiale Rurale de La Cerlangue.","habitants":"Bellevue; famille Meneust\"","divers":"Deux châteaux dans cet article; Drumare grav-1 et Bellevue grav 2.                                                                 Bellevue  GPS : 49° 30' 27\" Nord, 0° 24' 53\" Est","gps":"49° 30' 27\" Nord, 0° 24' 53\" Est","images":["../image/image_76/76_Cerlangue_1.jpg","../image/image_76/76_Cerlangue_2.jpg"]},"Consult_chateau_formulairef81d":{"id":"Consult_chateau_formulairef81d","dept":"76","canton":"Eu","commune":"Criel-sur-Mer","nom":"Chantereine","type":"Châteaux","periode":"XV-XVI-XVII","histoire":"Deux châteaux dans cet article ; Chantereine et  Briancon.                                     CHANTEREINE, cité dès le XVe siècle, le château fut transformé en 1776 par la marquise de Reynel, qui fit également ériger la chapelle. A la mort de la marquise, en 1791, le château devenu bien national accueillit le 44ème régiment d'infanterie des hussards. Rendu aux héritières, Mme de Choiseul et Mesdemoiselles Grimaldi De Monaco, il connut par le suite plusieurs propriétaires. Le château de Chantereine hébergera également une école de mitrailleurs belges pendant la guerre de 1914-1918 et, en 1939, des femmes espagnoles réfugiées de la guerre civile de 1936. Acquis en 1930 par la société coopérative amiénoise l'Union, le château fut transformé en centre de colonie de vacances.                                                           Le château de Chantereine a été racheté, en 1930, par la Commune de Criel-sur-Mer.","architecture":"BRIANCON, les éléments du château actuel datent du XVIe siècle.\nL'édifice est acquis par la duchesse de Montpensier auprès de Marc Antoine de Rollindes.  Le château sert d'hôpital jusqu'en 1957. Le monument est inscrit M.H. depuis le 14 avril 1930. Le manoir appartenait à la famille de Briançon qui lui donna son nom à la fin du XIIe siècle. Il fut racheté  par la Grande Mademoiselle Anne-Marie Louise d'Orléans en 1682. Elle le transforma en hospice et y fit installer l'école du village. Puis elle y ouvrit un orphelinat pour jeunes filles dirigé par quatre religieuses.    Ce lieu servit également de refuge pour les blessés lors des deux grandes guerres mondiales. Depuis 1972, c'est la Mairie qui s'y est installée. Visite des extérieurs sauf lors d'expositions ou manifestations. La construction est bâtie en silex, pierre et brique.","habitants":"Marquise de Reynel      Famille de Briançon\"","divers":"Deux châteaux dans cet article ; Chantereine grav-1 et  Briancon grav -2-3.4                                                         GPS : 50° 01' 00\" Nord, 1° 19' 06\" Est","gps":"50° 01' 00\" Nord, 1° 19' 06\" Est","images":["../image/image_76/76_Chantereine_1.jpg","../image/image_76/76_Chantereine_2.jpg","../image/image_76/76_Chantereine_3.jpg","../image/image_76/76_Chantereine_4.jpg"]},"Consult_chateau_formulaire98e6-2":{"id":"Consult_chateau_formulaire98e6-2","dept":"76","canton":"Etretat","commune":"Saint Jouin de Bruneval","nom":"Clos_des_Fées","type":"Palais","periode":"XX","histoire":"Deux châteaux à st-Jouin dont celui la Marguerite et le Clos des Fées.                       CLOS des FEES, Louis Besnard, architecte rachète, en 1902, les restes du manoir du Clos des Fées et fit construire tout autour du manoir, un véritable palace, entre 1904 et 1924. A la belle époque, le château du Clos des Fées fut le théâtre de somptueuses réceptions, auxquelles la célèbre actrice Sarah Bernhardt participa.  En 1926, le château du Clos des Fées fut vendu à la Société foncière dÉtretat, puis, en 1931, à la Fondation du Bon Pasteur, mais resta inoccupé jusquen 1935, lorsque les dames de la Providence de Sanvic   y firent installer, un pensionnat pour orphelines","architecture":"CLOS des FEES, En 1978, il devint laïc et hébergea des colonies de vacances. Le château du Clos des Fées et ses 7 000 m² furent rachetés, en 1984, par un propriétaire privé, faute de moyens, na pu effectuer les travaux dentretien nécessaires. Le château du Clos des Fées construit au début du XXe siècle, pour Louis Besnard, Maire du village, artiste-peintre, fils du Peintre et académicien Albert Besnard et d'Ernestine Aubourg. Le monument a subi un grave incendie en 1990. Racheté par la commune, le manoir du Clos des Fées va être rénové, en appartements privés.","habitants":"Famille de Louis Besnard\"","divers":"Clos   des fées                                            GPS : 49° 38' 38\" Nord, 0° 09' 49\" Est","gps":"49° 38' 38\" Nord, 0° 09' 49\" Est","images":["../image/image_76/76_Clos_des_F%c3%a9es_1.jpg","../image/image_76/76_Clos_des_F%c3%a9es_2.jpg","../image/image_76/76_Clos_des_F%c3%a9es_3.jpg","../image/image_76/76_Clos_des_F%c3%a9es_4.jpg","../image/image_76/76_Clos_des_F%c3%a9es_5.jpg"]},"Consult_chateau_formulaire3b75":{"id":"Consult_chateau_formulaire3b75","dept":"76","canton":"Bois-Guillaume","commune":"Clères","nom":"Clères","type":"Château","periode":"XIII-XVI","histoire":"CLERES, du Xe siècle au milieu du XVIIe, le domaine de Clères a appartenu aux seigneurs de Clères, puis aux Fontaine-Martel, aux Béthune-Charost et aux Galard de Béarn. Endommagé pendant la première guerre mondiale, il est acquis en 1919 par l'ornithologiste, Jean Delacour (1890-1985) qui transforme le parc en jardin zoologique. Cet ensemble comprend des ruines sur une motte correspondant au premier château des Xe-XIe siècles, l'organisation de l'enclos seigneurial autrefois entouré de douves, avec front défensif au nord formé par un ensemble de dépendances dont les parties les plus anciennes remontent au XIIIe siècle, alors que le logis et la galerie adjacente appartiennent au XVIe siècle, ainsi que le rhabillage des dépendances côté cour. Cet ensemble transformé par Hector de Béarn dans les années 1864-1865 avec l'architecte Henri Parent et le sculpteur Foucher est devenu un élégant château néo-gothique après démolition de l'aile sud, aux aménagements intérieurs fonctionnels et de qualité. Le parc prend forme en 1865, le lac est creusé et les jardins sont aménagés. L'ornithologue Jean Delacour poursuit en 1919 les travaux d'aménagement extérieur dans le but de créer un parc botanique et ornithologique, qui ouvrira ses portes au public en 1930. En 1967, Jean Delacour lègue l'édifice au muséum national d'histoire naturelle, qui poursuit selon ses vux le travail de préservation d'espèces ornithologiques rares ou menacées et améliore la collection botanique.","architecture":"CLERES, Éléments protégés MH : l'ensemble du bâti historique du château, à savoir les deux ailes de bâtiments entourant la cour : château, communs et manoir avec la terrasse sur laquelle ils sont situés, avec la motte et les ruines, ainsi que le portail et la maison du régisseur, tel que délimité sur le plan annexé à l'arrêté (bâti en vert, terrasse et motte en jaune), situé avenue du parc : inscription par arrêté du 9 mai 2017.  Le château, avec le parc zoologique, est la propriété du muséum d'histoire naturelle de 1966 à 1989, date à laquelle il est racheté par le conseil départemental de la Seine-Maritime.","habitants":"Famille de  Galard de Béarn\"","divers":"Clères  GPS : 49° 35' 49\" Nord, 1° 06' 28\" Est .","gps":"49° 35' 49\" Nord, 1° 06' 28\" Est .","images":["../image/image_76/76_Cl%c3%a8res_1.jpg","../image/image_76/76_Cl%c3%a8res_2.jpg","../image/image_76/76_Cl%c3%a8res_3.jpg"]},"Consult_chateau_formulairedfe2":{"id":"Consult_chateau_formulairedfe2","dept":"76","canton":"Saint-Romain-de-Colbosc","commune":"Saint-Jean-de-la-Neuville","nom":"Colombier_76","type":"Châteaux","periode":"XVIII","histoire":"COLOMBIER,  le village de Saint-Jean-de-la-Neuville a été créé en même temps que celui limitrophe de Saint-Gilles-de-la-Neuville, par essartage dans la forêt de Lillebonne au cours du XIIe siècle : dès 1158, est mentionnée une grange au petit Bec ; entre 1177 et 1189, Henri II donne à l'abbaye de Valmont le patronage des églises Saint Jean et Saint Gilles de la Neuville. La topographie du chef lieu en forme de village rue est représentative des villages de ce type, créés aux XIIe et XIIIe siècle par essartage. Le fief éponyme, relevant du roi appartient en 1419 au prieuré de Beaulieu. D'autre fiefs ont leur chef moi sur le territoire du village, le Petit Bec, mentionné en 1421, appartenant aux religieux du Valasse qui possèdent aussi une ferme au Mont Criquet en 1560.","architecture":"COLOMBIER , dans cette ferme a été établi au XVIIe siècle un prêche protestant, comme en d'autres fermes ou manoirs de cette partie du Pays de Caux, qui a particulièrement bien reçu la réforme. Le logis du Colombier a été construit dans la deuxième moitié du XVIIIe siècle, ainsi que le pressoir, et les dépendances agricoles. Les étables ont été construites au XIXe siècle; un bâtiment porte la date de 1908. Le logis est en brique et pierre, avec un fronton percé d'un oculus, les bâtiments agricoles sont assises alternées de brique orange et silex. Les étables sont en assises alternées de brique et silex blond.","habitants":"Seigneur local\"","divers":"Colombier grav 1-2","gps":"","images":["../image/image_76/76_Colombier_76_1.jpg","../image/image_76/76_Colombier_76_2.jpg"]},"Consult_chateau_formulaire1416":{"id":"Consult_chateau_formulaire1416","dept":"76","canton":"Barentin","commune":"Bardouville","nom":"Corset_Rouge","type":"Château","periode":"XVII","histoire":"CORSET-ROUGE,  château fort construit au XIe ou XIIe siècle, D'après la légende, le corset rouge était une étoffe que la châtelaine, Yolaine de Montigny, épouse de Bertrand de Bardouville, hissait sur une tour, lorsque son enfant, Guillaume, était malade, pour faire venir Don Raphaël Capelli, prieur de l'abbaye de Saint-Georges,  Le sire Bertrand l'avait retiré, dont les liens amoureux étaient restés intacts ,  Il surprit ensemble les deux amants. Fou de colère, il tua le Prieur Raphaël et obligea sa femme à porter, sur elle, le corset ensanglanté du sang de son amant.                                                                                                                                  Le château du Corset Rouge ou château de Bardouville appartenait au XIe siècle, au Sire Bertrand de Bardouville. Le château du Corset Rouge actuel fut construit, de 1664 et 1683, pour la Famille de Saldaigne d'Incauville.","architecture":"CORSET-ROUGE, c'était un manoir, avec un colombier datant de 1606. , pour faire venir Don Raphaël Capelli, prieur de l'abbaye de Saint-Georges,   un jour, le Sire Bertrand revint, plus tôt que prévu.                                            Détruit ; reconstruction du château dans le quatrième quart du XVIIe siècle, restaurations dans la deuxième moitié du XIXe siècle. Colombier polygonal en maçonnerie.  Le château aurait été construit par ses ancêtres, en 1106, puis incendié. Il fut reconstruit, au XVIe siècle.   L'édifice se compose d'un sous-sol, de deux étages carrés et d'un étage de comble, le gros oeuvre en calcaire, moellon et revêtement, élévation à travées surmontée de toit à longs pans, croupe et toit polygonal, recouverts d'ardoises.   \" En 1834, le sentier a reçu avec le temps de légers changements ; mais la trace du fossé se retrouve encore au pied de lancien donjon qui sert de base à la construction moderne. En abattant les terres on était parvenu à faire un jardin délicieux dun infect cloaque. A la base dun mur on remarque lapparence dune ouverture, cétait la poterne. Un pavillon orné dune tente élégante a remplacé une tour carrée surmontée de machicoulis, percée de meurtrières. Plus loin une autre tour ronde ou carrée comme la première recouvrait un puits qui se trouvait à la disposition des défendeurs du château. Les mêmes tours existaient du côté du nord et se rattachaient aux premières par un mur crénelé au milieu duquel était lentrée principale par un pont-levis sur dautres fossés depuis longtemps remplis sans quil en reste de traces.","habitants":"Sire Bertrand de Bardouville.\"","divers":"Corset-Rouge grav-1-2-3                            GPS : 49° 26' 13\" Nord, 0° 55' 39\" Est","gps":"49° 26' 13\" Nord, 0° 55' 39\" Est","images":["../image/image_76/76_Corset_Rouge_1.jpg","../image/image_76/76_Corset_Rouge_2.jpg","../image/image_76/76_Corset_Rouge_3.jpg"]},"Consult_chateau_formulaire6dda":{"id":"Consult_chateau_formulaire6dda","dept":"76","canton":"Luneray","commune":"Imbleville","nom":"Couture_Imbleville","type":"Château","periode":"XV-XVI-XVIII","histoire":"COUTURE, le château dImbleville a été fondé en 1491 par Zanon de Dampierre.   est appelé le château d'Imblevile ou Château de la Couture. Il est composé de trois styles : du Moyen Age, de la Renaissance et Classicisme. Son propriétaire initial était Zanon de Dampierre qui en avait fait sa résidence seigneuriale. Son propriétaire actuel est la Société Civile du Vivier. Famille Kourimsky-De Boigne qui en a fait sa résidence familiale. Du XVe siècle, les terres alentour constituaient une seigneurie sous l'égide de Zanon de Dampierre seigneur de Biville-la-Baignarde, Thiédeville, Imbleville et Eurville. Cest lui qui, en 1491, construisit, dans un îlot formé par la Saâne, une maison forte qui, après transformation, devint le château actuel il est composé de briques roses. Il servait, avec son domaine, à protéger et à contrôler le passage de la Vallée. A la fin du XVIe siècle, la terre et le château du Vivier furent acquis par Nicolas Baudry avocat au Parlement de Normandie. Son fils Charles mourut à Imbleville en 1651. Ses descendants conservèrent le domaine jusquau début du XVIIIe siècle. Le Château  reviendra, par succession, à Pierre Eustache de Dampierre qui mourut en 1795, laissant trois filles. En 1801, la terre fut attribuée à lainée qui avait épousé le Marquis de Bimorel. Le dernier Bimorel mourut en 1842. Son gendre Louis de Folleville hérita du domaine du Vivier qui resta dans sa famille, jusquen 1917. Cest  durant cette période du XIXe siècle, que le château du Vivier va subir de profondes transformations. Il appartient depuis à une société privée.","architecture":"IMBLEVILLE- COUTURE,  il a certainement été construit pour se défendre par leau. La Saâne se partageait en deux contre son mur fortifié sud et le seul accès à sa cour intérieure se faisait par un pont-levis au nord, les bâtiments ont été constamment remaniés à travers les siècles. Son aspect actuel remonte à 1872. Ses assises sont de grès et silex. Ses briques anciennes changent de couleur selon les saisons et la lumière : plus roses par temps gris, plus dorées au soleil, nacrées au clair de lune. Le pont-levis, qui formait autrefois l'unique accès est devenu chemin de terre conduisant à l'ancienne porte fortifiée toujours cramponnée à l'entrée de la cour. La vue est impressionnante sur les jardins à la rigueur presque militaire, quadrillés de pelouses parsemées de topiaires et de banquettes de bégonias, tout en harmonie de vert et de rose.","habitants":"Zanon de Dampierre et  Nicolas Baudry  \"","divers":"Deux château dans cet article; Couture   grav 1-2-3","gps":"","images":["../image/image_76/76_Couture_Imbleville_1.jpg","../image/image_76/76_Couture_Imbleville_2.jpg","../image/image_76/76_Couture_Imbleville_3.jpg"]},"Consult_chateau_formulairef4cc":{"id":"Consult_chateau_formulairef4cc","dept":"76","canton":"Saint-Valery-en-Caux","commune":"Crasville-la-Rocquefort","nom":"Crasville","type":"Château","periode":"XVII","histoire":"CRASVILLE    Jehan de Sainte-Beuve est seigneur de Crasville ; puis ses deux fils Robert (+1415) et Laurent (1370/1415) de Sainte-Beuve, tous deux tués à la bataille dAzincourt sous la bannière du roi de France Charles VI dit Le Fol (1368/1422). La terre est confisquée par le vainqueur, le roi dAngleterre Henri V (1386/1422), qui la remet à un chevalier anglais, Roger Penys. Après lexpulsion des Anglais, en 1464, la terre est rendue aux descendants de la Famille de Sainte-Beuve.  Dès les premières années du XVIe siècle, la seigneurie passe à la Famille de Rocquigny qui la conserve jusquen 1876 : Jean de Rocquigny, né en 1501, époux de Robinette Le Charron ; Jean de Rocquigny né en 1519 époux de Guillemette Mignot ; Claude de Rocquigny né en 1535, écuyer, époux de Ma???????rguerite Le Roux ;  Jacques  de Montfort Louis Roquigny (1558/1610) décédé à Crasville, époux d'Isabeau Le Carpentier ;  Charles de Rocquigny (1610/1670), époux de Suzanne de Limoges et Anne Jubert ; Emery de Rocquigny (1634/1708) décédé à Crasville, époux de Françoise Marie d'Auber de Daubeuf ; François Charles de Rocquigny (1670/1748) décédé à Crasville, époux de Anne Cécile Le Seigneur ;  Louis Emery de Rocquigny né en 1688 à Crasville,  François Emery Louis né en 1701 à Crasville.   Le château a été construit dans les premières années du XVIIe siècle par Jean de Rocquigny. Le colombier est daté de la fin du XVIe siècle.  Deux pavillons construits à la même époque.  La terre de Crasville est achetée aux héritiers de la Famille en 1876 par le vicomte Louis Philogène de Montfort (1840/1911), époux de Marie-Alice-Bathilde de Martel de Janville, sénateur de la Seine Inférieure et maire de Crasville où il décède en son château.  Éléments protégés MH : les façades et les toitures du château (à l'exclusion de l'aile du XIXe siècle); des deux pavillons d'entrée et du colombier : inscription par arrêté du 30 mars 1978. Aujourd'hui propriété de la vicomtesse de Montfort.","architecture":"CRASVILLE La partie la plus large de lenceinte constitue la basse cour. Telle quelle est conservée, la motte de Crasville constitue une intéressante réserve archéologique. Le logis, ainsi que deux pavillons, sont reconstruits un peu plus à lEst par Jacques de Roquigny. Une inscription au-dessus du linteau de la porte mentionne la date de 1602 comme les pavillons dentrée, le logis, abrité par une haute toiture dardoise, est édifié sur un soubassement de grès. La disposition est semblable sur les deux façades : un avant-corps central (escalier) en légère saillie, couronné par un fronton curviligne avec oculus sur le jardin, de tracé triangulaire coupé par une grande lucarne sur la cour ; de part et dautre, une travée de grandes fenêtres surmontée, du côté de la cour, dune importante lucarne a grand tympan triangulaire et petite ouverture en plein cintre. Les fenêtres intercalées entres ces travées et lavant-corps central sont de facture beaucoup plus simple et doivent résulter de modifications ultérieures.  Les deux façades diffèrent cependant à leurs extrémités. Sur la cour dhonneur, le corps de logis est flanqué, de chaque côté en avancée, dun pavillon de plan carré à toiture en hache. Par contre, sur le jardin, délégantes tourelles latérales cylindriques, coiffées en poivrière très élancées, reposent en encorbellement sur un haut soubassement de plan carré. Les deux tourelles portent à leur base un bandeau en dents dengrenage. Au-dessous de la corniche, un troisième bandeau sinscrit tout au long des différentes façades du château : quatre rangées de briques de profil semi-elliptique, placées en opposition deux à deux, y dessinent deux chaînes superposées.  Les façades et les toitures du château, à l'exclusion de l'aile du XIXe siècle, les deux pavillons d'entrée et le colombier sont inscrits aux M.H. en 1978.","habitants":"Famille de Rocquigny \"","divers":"Crasville grav 1-2-3","gps":"","images":["../image/image_76/76_Crasville_1.jpg","../image/image_76/76_Crasville_2.jpg","../image/image_76/76_Crasville_3.jpg"]},"Consult_chateau_formulairecb68":{"id":"Consult_chateau_formulairecb68","dept":"76","canton":"Octeville-sur-Mer","commune":"Cuverville","nom":"Cuverville","type":"Châteaux","periode":"XVIII","histoire":"CUVERVILLE, grande demeure du XVIIIe siècle marquée par un fronton bas qui embrasse le centre de la façade. Acquis par la famille Rondeaux en 1835, le château était devenu la propriété d'Émile Rondeaux, qui l'avait reçu en héritage à la mort de sa mère, en 1873. Lorsqu'il fut décédé, en 1890, la propriété fut mise en adjudication et acquise par sa fille Madeleine, qui devait s'y installer en 1891. Le château doit sa célébrité à l'un de ses hôtes récents, André Gide, marié à Madeleine Rondeaux, écrivit nornbre de pages de son uvre. La propriété, situé à quinze kilomètres au sud-est d'Étretat, appartenait au milieu du XXe siècle à Mme René Bouffet.  Éléments protégés MH : les façades et les toitures ; le grand salon et l'escalier intérieur : inscription par arrêté du 21 janvier 1970.                                              La construction du château de Cuverville date de 1730 pour la famille Cavelier de Cuverville. Il a été construit sur lemplacement dune maison, plus ancienne, dont il ne subsiste qu'une cheminée datant du XVIe siècle, dans la cuisine, il a appartenu pendant un siècle à la Famille De Cuverville. Puis il fut vendu à la Famille Rondeaux. André Gide, époux de Madeleine Rondeaux, y a habité et écrit. En 1835, il fut acquis par une famille protestante de Rouen, les Rondeaux. Une inscription sur le fronton témoigne de sa restauration, à cette période. Le château de Cuverville est inscrit aux M.H. depuis le 21/01/1970,  et ses abords constituent un site naturel de 8,22 Ha, Il  est classé aux M.H. depuis le 22/05/1945","architecture":"CUVERVILLE, typique du début du XVIIIe siècle normand, la bâtisse est construite en pierre de taille et en briques rouges. Son fronton donne à l'ensemble une allure altière appuyée par ses hautes cheminées qui défient les vents. Les seigneurs de Cuverville en furent les propriétaires. Plus tard, en 1835, il est acheté par la famille rouennaise Rondeaux. En 1895, Madeleine Rondeaux en hérite. Elle se marie avec son cousin, André Gide, qui avait fréquenté la demeure dans sa jeunesse. L'écrivain y séjourne souvent. Il y écrit et reçoit ses amis. Après la mort de sa femme, en 1938, il n'ira plus.","habitants":"Famille Rondeaux               Famille Cavelier De Cuverville\"","divers":"Cuverville   grav-1-2                                                   GPS : 49° 39' 32\" Nord, 0° 16' 24\" Est","gps":"49° 39' 32\" Nord, 0° 16' 24\" Est","images":["../image/image_76/76_Cuverville_1.jpg","../image/image_76/76_Cuverville_2.jpg"]},"Consult_chateau_formulairea9eb":{"id":"Consult_chateau_formulairea9eb","dept":"76","canton":"Dieppe","commune":"Dieppe","nom":"Dieppe","type":"Châteaux","periode":"XIV-XVII-XVIII","histoire":"quatre châteaux dans cet article Dieppe, et Pontrancart à Ancourt et Thibermont .                                                                                                        DIEPPE, un premier château a été construit en 1188 et détruit en 1195. Vers 1360 ont été construites les murailles de la ville, dont fait partie la tour nord ouest. Une extension a été réalisée par Charles des Marets de 1435 à 1442 (le château est bâti sur une terrasse aménagée dans le massif crayeux). L'enceinte a été agrandie à partir de 1574, incluant l'ancienne église Saint-Rémi, puis vers 1625 en partie sud. Le château a été racheté par la municipalité en 1903. Finalement, la citadelle gardera sa dimension militaire jusqu'en 1944 avec le départ tonitruant des Allemands qui font sauter le dépôt de munitions dans la Tour Saint-Rémy. Il abrite aujourd'hui le musée, dont l'extension a été réalisée en 1984 par Georges Duval.\n THIBERMONT Au sud-est de Dieppe en banlieue Martin l'eglise   siège d'un demi-fief attesté de longue date. Corps central  au milieu du XVIIe siècle. Réédifié au XVIIIe siècle. Les ailes ainsi que l'ensemble des bâtiments de communs reconstruits dans le quatrième quart du XIXe siècle. L'édifice de plan symétrique, se compose d'un sous-sol, de deux étages carrés et d'un étage de comble, escalier dans-oeuvre, le gros oeuvre en silex, brique et appareil mixte, élévation ordonnancée, surmontée d'un toit à longs pans, toit à longs pans brisés, pignon couvert et découvert, toit conique recouverts d'ardoise. L'ensemble comprend un parc, un enclos, une cour, un logement, des communs, des écuries, un colombier circulaire et des parties agricoles, maison de retraite de religieuses.","architecture":"DIEPPE  Éléments protégés MH : le corps de logis du front Nord flanqué de deux tours rondes ; aile à la suite sur la face ouest couronnée par des machicoulis, poterne contiguë et bâtiments crénelés jusqu'à la petite échauguette du XVIIe siècle ; tour Saint-Rémy ; logis avec sa tour, sis à l'est, dominant la plage et se reliant au bâtiment principal du front nord : classement par liste de 1862. Ensemble du système défensif du château, assiette foncière, y compris les vestiges enfouis (à l'exclusion de l'extension du musée) : classement par arrêté du 10 mai 1995.                                                                                                                                                        PONTRANCART  a cinq  K.M à l'est, le fief du Pontrancart est né du pont de pierre à péage sur l'Eaulne, attesté dès le début du XIe siècle. Château fort médiéval, limite XIe siècle XIIe siècle Très éprouvé durant la guerre de Cent Ans, finalement détruit par les anglais en 1430; relevé dès le milieu du XVe siècle, il soutient un siège contre Charles Le Téméraire en 1472 mais ne semble guère avoir survécu aux guerres de Religion; le château actuel est en majeure partie du XVIIIe siècle; largement restauré au XIXe siècle (façade nord); le vieux moulin semble encore en état de marcher. de plan symétrique, élévation ordonnancée.","habitants":"Seigneurs locaux\"","divers":"quatres châteaux dans cet article Dieppe-1 tour-  2-6-7-8             Pont-rilly grav-3,  Ponttrancart  grav_4 et Thibermont grav_5                         GPS : 49° 55' 29,03\" Nord, 1° 04' 12,94\" Est","gps":"49° 55' 29,03\" Nord, 1° 04' 12,94\" Est","images":["../image/image_76/76_Dieppe_1.jpg","../image/image_76/76_Dieppe_2.jpg","../image/image_76/76_Dieppe_3.jpg","../image/image_76/76_Dieppe_4.jpg","../image/image_76/76_Dieppe_5.jpg","../image/image_76/76_Dieppe_6.jpg","../image/image_76/76_Dieppe_7.jpg","../image/image_76/76_Dieppe_8.jpg"]},"Consult_chateau_formulairebafc":{"id":"Consult_chateau_formulairebafc","dept":"76","canton":"Barentin","commune":"Duclair","nom":"Duclair","type":"Chateaux","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article; Taillis et Vaurouy                                                                                      TAILLIS, en 1484 propriété du fief du Taillis, la construction du château du Taillis s'est déroulée à partir de la fin du XVIe siècle (corps central) pour Jehan Dufay, seigneur du Taillis, puis au milieu du XVIIe siècle (pavillons), puis à la fin du XVIIe siècle (corps de liaisons et aile) et enfin au début du XIXe siècle les ailes. En 1807 appartient aux Quièvremont, puis par alliance aux Lenepveu , puis aux Borde qui le conserveront jusqu'en  1980 et aux Navarro, unique exemple architectural de la Seconde Renaissance Italienne en Normandie.   Plusieurs chapelles successives sont connues ainsi qu'un logement pour le chapelain. Vers 1930, une restauration importante a eu lieu et la mise en place du décor d'un grand salon provenant d'un hôtel particulier de Rouen.                                                                                 VAUROUY, au XVIe siècle, fief de Robert de Ponches et la famille de Richard  Boyvin, Jacques  fils de  Richard seigneur de Vaurouy épouse Marie du Four, ils eurent trois enfants ; Robert; conseiller au parlement de Rouen. Deux des fils de Robert ; Romain et Henri  trésorier et conseiller et seigneur de Vaurouy,  est cédé aux Cabeuil, Henri meurt en 1677 laissant plusieurs enfants dont trois fils qui serviront dans l'armée et seront tués. Héritier du domaine Antoine-Jérome Boyvin, prêtre  docteur en Sorbonne cède en 1717 à Jean Berruyer, écuyer seigneur de Lorfavrie à son fils Georges et à son épouse Marie Louvel en 1748 le domaine est vendu à Abraham Cottard qui s'en défait  en 1776 au profit de Nicolas de  Cabeuil qui construirat le château en 1776, qui passera  au XIXe siècle aux Monchy et aujourd'hui à la famille M. Laurent.","architecture":"TAILLIS, la construction du château du Taillis date du XVIe siècle est de style Renaissance italienne,                                                                                                                 Le château du Taillis au hameau Saint-Paul Bâti sur les fondations dune maison forte du XIIIe siècle,il a été édifié vers 1530 par Jehan du Fay du Tailly. La façade sculptée présente des blasons seigneuriaux ainsi que des niches et des pilastres. Après une construction inachevée, le corps central fut agrandi par l'adjonction de deux pavillons au XVIIe siècle et finalisé par de nouvelles ailes au XVIIIe siècle. Depuis sa construction, le château du Taillis était une propriété privée, réservée à quelques rares privilégiés qui pouvaient y venir. En quelques années, les toits, sols, et les boiseries furent restaurés. C'est une habitation privée, et un musée. Afin d'aider à sa restauration, il ouvre ses portes au Public, ou des réceptions et des manifestations sont organisées, toute l'année. Il est inscrit aux M.H. depuis 1996.                                                                                                           VAUROUY, au XVIIIe siècle sur l'emplacement d'un ouvrage fortifié dont-il reste des caves voûtées. le corps de logis  sur huit travées , comporte en son centre un avant corps, aux angles marqués par des chaînes à bossages et couronne par un fronton triangulaire percé par un oculus. Deux avant-corps en légère saillies, coiffées de toitures à double pente, occupent les extrémité de la façade.","habitants":"Taillis Famille de Jehan Dufay.                                           Vaurouy; famille de Richard  Boyvin.\"","divers":"Deux châteaux dans cet article; Taillis grav-1-2 et Vaurouy grav-3    Taillis GPS : 49° 28' 05\" Nord, 0° 51' 09\" Est","gps":"49° 28' 05\" Nord, 0° 51' 09\" Est","images":["../image/image_76/76_Duclair_1.jpg","../image/image_76/76_Duclair_2.jpg","../image/image_76/76_Duclair_3.jpg"]},"Consult_chateau_formulaire5da0":{"id":"Consult_chateau_formulaire5da0","dept":"76","canton":"Bolbec","commune":"Bernières","nom":"Durdan","type":"Château","periode":"XVI","histoire":"DURDAN, la première mention du nom de la paroisse de Beuzemouchel remonte à 1157, ce fief comprenait un château-fort à motte. La tradition place au lieu dit Val-Roger l'église primitive. Une maladrerie avec chapelle Saint-Jean-Baptiste et Saint-Quentin construite au XIe siècle et un vivier alimenté par la source au Malade existait au lieu dit le Vieux Clocher. De la seigneurie de Beuzemouchel dépendaient plusieurs fiefs au XVe siècle, le fief Pouchin, le grand fief Beuzelin, le grand fief Heudebert, le petit fief Putréautot, le fief au Cesne, le fief au Sage et celui de la Pouchinière. D'autres fiefs qui ont conservé manoir ou château sont attestés au XVIe siècle, Le Quesnay, Les Portes et Le Redan. En 1678, le fief de Beuzemouchel est érigé en marquisat sous le nom de Bernières et le village change de nom. La seigneurie de Duredent est attestée en 1676, appartenant à la famille Le Mazurier.","architecture":"DURDAN, il subsiste, du manoir construit au milieu du XVIe siècle, la partie inférieure d'une tour de défense. Le logis actuel a été bâti au XVIIe siècle et la tour reconstruite sur trois étages. La chapelle a été construite au XIXe siècle en style néo-gothique. La bascule a été édifiée au XIXe siècle. Les bâtiments de la ferme ont été élevés au XIXe siècle, le colombier circulaire, qui figure sur le cadastre de 1823 a été détruit depuis ainsi que la cour d'honneur au sud du logis et le jardin d'agrément implanté à l'ouest. Le Logis est en brique et pierre ; la chapelle en pierre de taille calcaire; les batiments de la ferme sont en assises alternées de silex et de brique.","habitants":"Seigneurie de Duredan  famille Le Mazurier.\"","divers":"Durdan","gps":"","images":["../image/image_76/76_Durdan_1.jpg","../image/image_76/76_Durdan_2.jpg"]},"Consult_chateau_formulaireaad0-2":{"id":"Consult_chateau_formulaireaad0-2","dept":"76","canton":"Notre-Dame-de-Gravenchon","commune":"Bolleville","nom":"Epremesnil","type":"Château","periode":"XVII-XIX","histoire":"Deux châteaux  dans cet article, Epremesnil et Gadelles.                     EPREMESNIL, l'appellation château ne repose sur aucun toponyme ancien. Il s'agit en fait du château de BOLLEVILLE, dont le fief est attesté en 1180, appartenant à Roger de Bolleville. En 1503, le demi fief relevant de la baronnie de Cleuville, appartient aux Pymont. Le logis a été construit dans la première moitié du XVIIe siècle, sur des caves appartenant à l'édifice antérieur. Il a été détruit en 1986. Seuls subsistent un mur de cloture en silex et brique, et des dépendances du XIXe siècle en brique et silex. Sur l'emplacement du logis s'élève une maison en pan de bois construite après 1986.   De plan symétrique en U;    élévation ordonnancée; un étage carré ; étage de comble ; sous-sol ; escalier dans-oeuvre ; escalier tournant à retours avec jour ; en maçonnerie  en  brique et pierre ; calcaire ; brique ; silex ; appareil à assises alternées. Couverture à toit à longs pans ; avec croupe  et couverture en  ardoise. Il date du 1596, avec son colombier. Le fief dÉprémesnil est répertorié sur la table de 1503, mais le château fut bombardé, en 1944. Sa construction  date du XIXe siècle. Il devait pré-exister un manoir et peut-être même un fief primitif (Bas Moyen Age à proximité du Moulin de Tauvais).","architecture":"GADELLES,  l'architecte parisien Pierre Edouard Dumont s'assure la collaboration de l'architecte Henri Toutain afin de bâtir de 1886 à 1894 le pavillon d'entrée de son château, dont il fait une conciergerie bibliothèque. L'élévation principale est ordonnancée selon le modèle de l'Arco de Santa Maria de Burgos, construit pour Charles Quint vers 1536. Le décor sculpté est d'inspiration Renaissance (colonnes à chapiteaux corinthiens surmontant des pilastres adossés, pots à feu, gargouilles, porte-drapeaux en ferronnerie, etc.). Les structures métalliques de la couverture sont de Gustave Eiffel. Le logis proprement dit ne sera jamais réalisé. L'édifice a été restauré en 1996.   Il s'agit, en réalité, de la Conciergerie des Gadelles d'un plus vaste domaine, avec son château envisagé par Pierre-Edouard Dumont, un architecte parisien, à la fin du XIXe siècle, mais jamais réalisé pour différentes raisons. Le château des Gadelles est une construction  édifiée, de 1886 à 1894, en collaboration avec l'architecte Henri Toutain. Les structures métalliques de la couverture sont de Gustave Eiffel. Gravement endommagée par une bombe tombée sur la chaussée, en août 1944, la Villa des Gadelles fut restaurée, tandis que son portail surmonté de tourelles à créneaux dû être rasé, en 1950. Laissé longtemps à l'abandon, le château des Gadelles a été restauré, en 1996. C'est, aujourd'hui, une propriété privée, fermée au Public.Éléments protégés MH : l'ensemble des éléments subsistants : conciergerie-bibliothèque, ensemble des murs de clôture et de soutènement, grilles et escaliers : inscription par arrêté du 6 août 1997.","habitants":"Famille des Pymont\"","divers":"Deux châteaux  dans cet article, Epremesnil-Bolleville grav-3 et Gadelles-1-2.                                     Epremesnil    GPS : 49° 36' 00\" Nord, 0° 33' 57\" Est","gps":"49° 36' 00\" Nord, 0° 33' 57\" Est","images":["../image/image_76/76_Epremesnil_1.jpg","../image/image_76/76_Epremesnil_2.jpg","../image/image_76/76_Epremesnil_3.jpg"]},"Consult_chateau_formulaire49fb":{"id":"Consult_chateau_formulaire49fb","dept":"76","canton":"Bois-Guillaume","commune":"Esteville","nom":"Esteville","type":"Château","periode":"XVII","histoire":"ESTEVILLE la construction du château d'Esteville date du XVIIe siècle. L'abbé Pierre y a habité plus de 20 ans et y est enterré depuis le vendredi 26 janvier 2007, aux côtés de 20 de ses compagnons et de sa secrétaire Lucie Coutaz qui l'a secondé durant une grande partie de sa vie. Il avait toujours gardé sa petite chambre dans cette commune ; de ses mains, il avait tout conçu dans cette petite chambre toujours dans l'esprit d'Emmaüs car pour l'abbé Pierre « avec un rien on fait vivre tous quand on s'en donne la peine ». Aujourd'hui sa tombe est devenue un lieu de recueillement, Esteville compte entre 300 et 500 visiteurs par jour. Un centre du mouvement Emmaüs, « La Halte d'Esteville », où se trouve la chambre de l'abbé, héberge encore, aujourd'hui, des jeunes en difficulté. Georges Lanfry fut durant sa vie un fervent opposant des inégalités sociales, lors de la fondation du mouvement Emmaüs par l'abbé Pierre, il lui fit don du château d'Esteville, reçu en héritage, qui devint la \"Halte d'Emmaüs\" à Esteville.","architecture":"ESTEVILLE, de plan rectangulaire à trois niveaux dont les combles, deux pavillons séparés par allée en partie centrale, toit brisés.                            Le centre abbé Pierre, Emmaüs est un manoir rustique du XVIIIe siècle situé au milieu d'un parc de 2 ha arboré et fleuri. Lieu de prédilection de l'abbé Pierre, le Lieu de mémoire est un havre de paix bucolique et beau. Il permet de découvrir une partie de l'histoire sociale des XXe et XXIe siècles. Il présente l'inventivité et l'énergie que des hommes et des femmes déploient depuis 1949 en France et dans le monde pour construire un monde plus fraternel. Il délivre un message d'espoir (c'est le sens du mot Emmaüs) et offre l'occasion de se ressourcer.","habitants":"Georges Lanfry \"","divers":"Esteville  GPS : 49° 36' 24\" Nord, 1° 13' 21\" Est","gps":"49° 36' 24\" Nord, 1° 13' 21\" Est","images":["../image/image_76/76_Esteville_1.jpg","../image/image_76/76_Esteville_2.jpg","../image/image_76/76_Esteville_3.jpg"]},"Consult_chateau_formulaire53c7":{"id":"Consult_chateau_formulaire53c7","dept":"76","canton":"Notre-Dame-de-Gravenchon","commune":"St-Maurice d","nom":"Etelan","type":"Châteaux","periode":"XV-XVII","histoire":"Deux châteaux dans cet article; Etelan et Petiville.                                              ETELAN Le premier château d'Etelan, appartenant à Pierre Picart d'Etelan (mort à la bataille de l'Ecluse en 1340), a été détruit pendant la guerre de Cent Ans. En 1494, Louis Picart d'Etelan reçoit 700 livres du duc d'Orléans pour réédifier sa maison. Le logis et la chapelle correspondent à cette campagne de construction, le portail et la ferme ont été batis au XVIIe siècle. Des bâtiments de la ferme ont été construits au XVIIIe siècle. En 1867, Madame de Bois Hébert fait restaurer le logis dont le côté sud-ouest était complètement ruiné, supprimer la construction de 1772 et restituer la couverture et les lucarnes. Avant 1893, Simon, architecte à Rouen, entreprend pour Madame Auguste Desgenetais une campagne de restauration avec la construction d'un ouvrage d'entrée. La partie centrale du bâtiment, détruite par un incendie en 1944, est restaurée en 1968. Le premier niveau du logis est en pierre de taille calcaire ; le second niveau en assises alternées de brique et calcaire, la cage d'escalier est en pierre de taille calcaire couvert d'un toit en pavillon; le deuxième niveau du logis de ferme est en pan de bois avec doubles croix de saint André ; les bâtiments de la ferme sont à assises alternées de brique et de calcaire ; l'ouvrage d'entrée et les murs sont en pierre de taille calcaire. La chapelle Sainte-Madeleine a été entièrement restaurée. Les terrasses dominent la Seine. Aujourd'hui pour aider et financer sa restauration, le château est ouvert au public, des réceptions et des manifestations sont organisées toute l'année. Le château d'Etelan à Saint-Maurice-d'Etelan est un lieu privilégié pour vos réceptions, le château d'Etelan en totalité : inscription par arrêté du 16 avril 1941.","architecture":"ETELAN est de style Renaissance flamboyant et date du XVe siècle. C'était une habitation autrefois a été bâti à partir de 1494, pour Louis Picart sur lemplacement dun ancien château fort, rasé sur les ordres de Louis XI. Il ne reste de la construction médiévale quune cave, un mur denceinte et la maison des gardes datée de 1350. De style gothique flamboyant, lédifice est contemporain du Palais de Justice et de l'hôtel de Bourgtheroulde de Rouen, ainsi que du vieux château de Clères. Il est composé de deux corps de logis à appareillage de pierres et de briques alternées reliés entre eux par une galerie descalier en pierre datant de la première Renaissance. Le château d'Etelan est entouré d'un parc de 20 Ha. Alain Boudier est propriétaire du château  est inscrit aux M.H. depuis le 16/04/1941. Aujourd'hui,  est devenu un Musée.                                                                                                                     A  cinq K.M. à l'ouest PETIVILLE   En 1640, autorisation est donnée à Raoul Pochon référendaire en la chancellerie du Parlement de Rouen de faire construire une chapelle dans son domaine de Petiville. Les autres bâtiments ont été construits au XVIIIe siècle. Le logis, édifié en brique, ferme au sud la cour d'honneur délimitée par la remise et les écuries en assises alternées de silex et de brique ; la chapelle en pierre de taille calcaire et chaînes de brique est située au sud-est.","habitants":"Famille de Pierre Picart d'Etelan                                      Petiville; Famille de Raoul Pochon \"","divers":"Deux châteaux dans cet article; Etelan Grav 1 à 5 et Petiville grav-6.                                                                     GPS : 49° 27' 59,04\" Nord, 0° 37' 41,16\" Est","gps":"49° 27' 59,04\" Nord, 0° 37' 41,16\" Est","images":["../image/image_76/76_Etelan_1.jpg","../image/image_76/76_Etelan_2.jpg","../image/image_76/76_Etelan_3.jpg","../image/image_76/76_Etelan_4.jpg","../image/image_76/76_Etelan_5.jpg","../image/image_76/76_Etelan_6.jpg"]},"Consult_chateau_formulaire5c4d":{"id":"Consult_chateau_formulaire5c4d","dept":"76","canton":"Eu","commune":"EU","nom":"EU","type":"Châteaux","periode":"XVI","histoire":"Trois châteaux dans cet article; Eu , Beaumont et Joinville.                                                                         EU , le château d'Eu est un château de style type Renaissance.  C'est un château de style Renaissance.. En décembre 1430, Jeanne d'Arc, prisonnière des Anglais, séjourna dans la prison du château. En 1475, Louis XI ayant appris que le comte d'Eu avait promis de livrer son château à Edouard IV, roi d'Angleterre, ordonna la destruction complète de la place.  Un siècle entier s'écoulera avant la construction d'un somptueux château. Il fut commencé entre 1581 et 1583 après le mariage d'Henri de Guise, duc de Guise dit le Balafré avec Catherine de Clèves, comtesse d'Eu, puis terminé en 1665 après que Anne-Marie-Louise d'Orléans dite la Grande Mademoiselle, cousine germaine du roi Louis XIV, en eut pris possession le en 1661. La forme actuelle de ce château n'est pas antérieure à la fin du XVIe siècle. Il a été agrandi au XVIIe siècle pour la Grande Mademoiselle, cousine de Louis XIV qui la contraignit à lexil pour la punir de sa participation à la Fronde. La duchesse de Montpensier contribua ainsi à lembellissement du château en y apportant notamment sa collection de portraits et en aménageant un jardin à langlaise. Au XIXe siècle, il fut profondément remanié pour Louis Philippe par l'architecte Fontaine, les travaux permirent de lagrandir et de construire les communs. En 1874, le comte de Paris, petit fils du \"Roi des Français\", confia à son tour la décoration et la modernisation du château à Eugène Viollet-le-Duc qui y travailla jusquà sa mort en 1879. En 1902, la moitié sud a été détruite par un incendie. Acheté par le conseil Général de la Seine Maritime à la famille dOrléans Bragance en 1961, le château dEu abrite depuis 1973 la mairie et le Musée Louis-Philippe.","architecture":"EU; Catherine de Clèves et Henri de Lorraine, Duc de Guise, firent construire le château d'Eu à la fin du XVIe siècle. Les visites sont libres. Le château d'Eu est classé aux M.H.depuis 1985,    inscription par arrêté du 6 juin 1983. Les façades et les toitures des trois bâtiments de la ferme modèle ; les façades et les toitures des grandes écuries Ouest du pavillon de Joinville : inscription par arrêté du 6 juin 1983. Le château, y compris les parties souterraines ; la cour d'honneur avec sol, clôture, statues, saut-de-loup et balustrade ; le jardin à la française avec ses murs de soutènement ; les dépendances au Nord du château ; la roue motrice ; l'éolienne ; les façades et les toitures de l'usine à gaz et de l'émissaire des sources ; les dépendances dans le parc : les façades et les toitures du pavillon Montpensier et de la maison des portiers ; les façades et les toitures de la maison du jardinier ainsi que le portail d'entrée et les murs de clôture.                                        BEAUMONT manoir, relais de chasse datant du XVIIIe siècle dotée dune splendide vue, situé dans un parc fleuri à 2Km de « Eu » et du « Musée de Verre », propose 3 chambres décorées de style anglo-normand avec ses tapisseries anciennes et modernes pour lune dentre elles.  Et à proximité le château de JOINVILLE transformé en hôtel restaurant, est l'ancien pavillon de Chasse du château d'Eu, du Roi Louis Philippe.                                                                                                                       JOINVILLE; à quelques encablures de la plage de Mers les Bains et du petit port de pêche de Le Tréport, le Domaine de Joinville est l'Ancien Pavillon de chasse du château d'Eu, bâtit sous Louis Philippe et la famille d'Orléans Bragance en 1830. Entouré de la forêt domaniale d'Eu, dans un parc de 10 hectares.","habitants":"Eu, famille du duc de Guise\"","divers":"Trois châteaux dans cet article; Eu grav 1-2-3 , Beaumont grav -6 et Joinville grav-4-5                                     EU   GPS : 50° 02' 57,72\" Nord, 1° 24' 57,01\" Est                                    Beaumont GPS : 50° 1' 47,05\" Nord et 1° 26' 36,91\" Est","gps":"50° 02' 57,72\" Nord, 1° 24' 57,01\" Est","images":["../image/image_76/76_EU_1.jpg","../image/image_76/76_EU_2.jpg","../image/image_76/76_EU_3.jpg","../image/image_76/76_EU_4.jpg","../image/image_76/76_EU_5.jpg","../image/image_76/76_EU_6.jpg"]},"Consult_chateau_formulairec425":{"id":"Consult_chateau_formulairec425","dept":"76","canton":"Bolbec","commune":"Beuzevilette","nom":"Feugrès","type":"Château","periode":"XVIII-XIX","histoire":"FEUGRES, au milieu du XIIe siècle, le château de Haubert du Feugrès était tenu du comte dÉvreux par Guillaume de Mortagne, lequel fit défricher une fougeraie, afin de construire un manoir. Il tenta d'agrandir son fief et réclama aux moines du Valasse, des terres sises dans la Haie de Lintot, et fit brûler leur grange. Guillaume de Tancarville, en représailles, incendia le manoir du Feugrès. Un aveu du XVIIe siècle cite le manoir fossoyé, avec une motte et une forteresse environnée d'eau, avec 29 acres de terres tant en mottage, édifices que terres labourables. Le logis du château actuel a été construit au XVIIIe siècle, sur le site de la motte.","architecture":"FEUGRES, il subsiste à côté de la ferme les vestiges de l'enceinte fossoyée de la basse cour et un puits abandonné au XVIIIe siècle, situé hors de l'enceinte de la ferme du château. Le logis du château du Feugrès a été remanié au XIXe siècle. Les communs (écurie et remise) ont été conservés mais englobés dans des bâtiments construits dans les années 1960 pour une colonie de vacances. Il subsiste des bâtiments du XVIIIe siècle dans la ferme et une grange du XIXe siècle. En revanche, le jardin régulier à l'Ouest du logis, qui figurait sur le cadastre de 1826, de part et d'autre de l'allée, a disparu. Le château du Feugrès se situe dans un grand parc de 6 Ha, dans la campagne proche du Havre et non loin de Rouen.","habitants":"Famille  Guillaume de Mortagne\"","divers":"Feugrès             GPS : 49° 34' 22\" Nord, 0° 32' 13\" Est","gps":"49° 34' 22\" Nord, 0° 32' 13\" Est","images":["../image/image_76/76_Feugr%c3%a8s_1.jpg"]},"Consult_chateau_formulaire3179":{"id":"Consult_chateau_formulaire3179","dept":"76","canton":"Saint-Romain-de-Colbosc","commune":"Gommerville","nom":"Fillières","type":"Châteaux","periode":"XVI-XVIII","histoire":"Deux châteaux dans cet article Fillières et Rebomare                                   FILLIERES, au XIVe siècle construction d'une première forteresse par les  Chardon de Filières, Le château de Filières appartenait à Jehan de Filières.  Ruinés pendant les guerres de religion, reconstruction sur des plans de  l'architecte Victor Louis,  du château bâti pour Alexandre-Charles-Eudes de Catteville marquis de Mirville la famille de Mirville et resté inachevé passa à son fils se transmet ensuite à sa petite fille, la comtesse Ocquart de Turtot puis par alliance, aux Persan. Le château de Filières vous accueille dans ses salles pour vos réceptions, séminaires, mariages. ils contiennent de nombreux souvenirs notamment des Talleyrand-Perigord et du marèchal Lauriston ancêtres des Persan. C'était au début une maison forte, puis elle devient une demeure de plaisance.                                                                                                      REBOMARE, fief noble mentionné dès 1464. Logis construit au XVIe siècle. Baies du XVIIe siècle. Pressoir et colombier du XVIIIe siècle. Grange et étables bâties au XIXe siècle. Ce manoir a subi des restaurations aux XIXe et XXe siècles. Logis en pan de bois au niveau du deuxième niveau essenté d'ardoise sur une photographie de 1927, l'essentage a disparu aujourd'hui. Premier niveau du logis à assises alternées de silex blond et de pierre de taille calcaire, le deuxième niveau est en pan de bois; pressoir à assises alternées de silex blond, brique et pierre de taille calcaire sur la façade sud-ouest et en pan de bois sur la façade nord-est; colombier enduit avec chaînes en brique et un toit conique ; grange et étables à assises alternées de silex et de brique.","architecture":"FILLIERES, fief de Filières attesté en 1503. Dans la cour d'honneur, vestiges enterrés d'une maison forte du XVe siècle. Vestiges d'un manoir du XVIe siècle dans l'aile ouest du logis. Le château de Filières date du XVIe et XVIIIe siècles.   Colombier du XVIe siècle. Transformé au XIXe en maison. Les communs datent du XVIIIe siècle. Écuries construites au milieu XIXe siècle. Le château de Filières comporte deux parties d'époques différentes : deux travées et une aile de calage datent du règne de Henri IV tandis que le reste est de l'époque Louis XVI. Sa construction a débuté en 1599 et s'est achevée en 1768. L'architecte était Victor Louis. Il fut élevé sur la plateforme d'une maison forte médiévale entourée de douves. Un manoir en pierre de taille est construit sous Henri IV. Vous pouvez donc admirer deux châteaux juxtaposés.Des salons du XVIIIe siècle, l'un est dit \"salon chinois\" et comporte un décor de peintures chinoises présentées dans des panneaux de lambris, tandis que le deuxième est orné de boiseries, pilastres, colonnes ioniques et décors de stucs. Logis en pierre de taille calcaire, colombier à assises alternées de silex blond et de pierre de taille calcaire avec un toit conique, communs en brique et calcaire, écuries en pan de bois, silex et brique Un colombier en damiers de silex, des écuries et remises du XIXe siècle complètent le domaine. Il est à noter son mobilier présent dans les salons. Le château de Filières est inscrit aux M.H. en 1946 et classé aux M.H. depuis 1947.","habitants":"Famille de filières\"","divers":"Deux châteaux dans cet article Fillières grav-1-2-3-4 et Rebomare grav-5                               GPS : 49° 33' 42\" Nord, 0° 22' 20\" Est","gps":"49° 33' 42\" Nord, 0° 22' 20\" Est","images":["../image/image_76/76_Filli%c3%a8res_1.jpg","../image/image_76/76_Filli%c3%a8res_2.jpg","../image/image_76/76_Filli%c3%a8res_3.jpg","../image/image_76/76_Filli%c3%a8res_4.jpg","../image/image_76/76_Filli%c3%a8res_5.jpg"]},"Consult_chateau_formulaire2386":{"id":"Consult_chateau_formulaire2386","dept":"76","canton":"Gournay-en-Bray","commune":"Forges les eaux","nom":"Forges_les_Eaux","type":"Château","periode":"XVII","histoire":"FORGES-LES-EAUX ; tient son histoire de son sol, riche en fer qui donna naissance aux forges dès lépoque gallo-romaine. Hôtel de ville de Forges-les-Eaux, il possède un hôtel de ville partiellement historique.  Au XVIIe siècle, la bâtisse initiale était la propriété de la famille Levaillant qui y accueillit le roi Louis XIII, la reine Anne dAutriche et le cardinal Richelieu lors de leur séjour en 1633.   Réputée pour ses eaux ferrugineuses dont on disait quelles soignaient lanémie et la stérilité, la Reine qui ne parvenait pas à donner dhéritier au royaume, décide de venir profiter des bienfaits des sources.  Forges-en-Bray (nom de la ville à cette époque) nétant pas le lieu dune seigneurie, il ny avait pas de château pour accueillir les hôtes royaux. Hôtel de ville - Forges-les-Eaux Au XIXe siècle, la bâtisse était la propriété de Jules Thiessé (1833-1912), député, descendant des Levaillant.  Il fit démolir et reconstruire la partie située le long de la place Brévière. Seuls furent conservés lOratoire dAnne dAutriche et le corps de garde situés côté parc. À sa mort, la maison fut léguée à lUniversité de Paris.  En 1933, après expropriation, la ville récupéra la maison et en fit lHôtel de ville, pour remplacer la mairie qui se trouvait jusqualors à lemplacement de la poste actuelle. Plusieurs transformations furent opérées dont le plaquage de la façade blanche côté ville pour démarquer la mairie des autres bâtisses de la place, construction du clocheton avec lhorloge, blason de la ville représentant le marteau et lenclume,  côté ville, la façade blanche est caractéristique de cette période des années 30 et côté parc, le XIXe et le XVIIe se côtoient.","architecture":"FORGES-LES-EAUX, le terrain, de forme rectangulaire, se situe sur la commune de Forges les Eaux. Le terrain est occupé en son centre par le château de la Minière, construit au XIX siècle en pierre et briques, complété par une tour isolée au Nord. Plusieurs bâtiments hétérogènes, de faible qualité architecturale, ont été ensuite construits sur le site. Le parc, face au château, est composé dune grande pelouse de bosquets et darbres de hautes tiges dont quelques spécimens dessences rares. Il est limité à louest par un mur de pierres doublé dun alignement darbres. Deux parkings sont aménagés, pour les enseignants, ladministration et les visiteurs.","habitants":"Famille Levaillant \"","divers":"Forges les eaux grav-1-2-3,  Minières grav -4","gps":"","images":["../image/image_76/76_Forges_les_Eaux_1.jpg","../image/image_76/76_Forges_les_Eaux_2.jpg","../image/image_76/76_Forges_les_Eaux_3.jpg","../image/image_76/76_Forges_les_Eaux_4.jpg"]},"Consult_chateau_formulaire4d79":{"id":"Consult_chateau_formulaire4d79","dept":"76","canton":"Octeville-sur-Mer","commune":"Le Tilleul","nom":"Fréfossé","type":"Château","periode":"XVIII","histoire":"FREFOSSE  Galehaut de Saâne érigea aux environs de 1370 à 1380 au lieu de l'actuel château, la première place forte de la région. À la fin de la guerre de Cent Ans, la seigneurie de Fréfossé entre dans la famille de Pelletot, touchée par la \"terra salica\" (Cest-à-dire que seuls les hommes peuvent en hériter), la seigneurie passera ensuite par filiation aux Puchot de Gerponville, puis aux familles Doullé de Gerponville, Compoinct du Boulhard et Hocquart dont le dernier de cette lignée au Tilleul, fut le baron Édouard Hocquart, marié à Coralie de Lauriston, chambellan de Louis XVIII et de Charles X ; il devient le second maire du Tilleul en 1814 ; le baron et la baronne Hocquart acquirent en 1824 l'antique château de Valmont, demeure de la famille d'Estouteville. Le château et son domaine sont mis en vente en 1887. Reconstruit et restauré dans un style néo-Renaissance, il est mis en vente en 1902. Durant la seconde guerre mondiale, le bâtiment fut dégradé. Il fut d'abord utilisé comme caserne par les soldats allemands, ensuite, il servit de logement aux troupes alliées. Après que la ville du Havre fut devenue propriétaire du château, à la suite d'une donation de la famille Dusbosc en 1946, il est de nouveau propriété privée depuis 1997. En octobre 2009, un des bâtiments attenants dans la propriété a été complètement détruit par un incendie. Le Foyer du Tilleul, se situait également sur le terrain du domaine pendant quelques années. Quelques années après le rachat du château par un Allemand, l'établissement fut fermé.","architecture":"FREFOSSE  En 1374, Galehaut de Saâne fit bâtir un château fort, il sera le lointain ancêtre du château de Fréfossé édifié au XVIIIe siècle, en brique et pierre, sans caractère architectural particulier, construit pour le marquis de Fréfossé. Au XIXe siècle, le propriétaire fit adjoindre des tours dont les toits atteignaient une cinquantaine de mètres de hauteur. Le parc avait été magnifiquement planté. En 1938 le château a été aménagé en hôpital militaire, en juin 1940 il est occupé par l'état-major de l'armée allemande, et repris en septembre 1944 par les troupes alliées. Depuis lors, les tours ont été en partie arasées et le château a été donné en 1946 par M. Albert Dubosc, président du Conseil Général de la Seine Maritime, à la ville du Havre, sous réserve que la propriété serve pour des oeuvres d'assistance et d'éducation ou d'hygiène de l'Enfance et de la Jeunesse et présentant un caractère exclusivement désintéressé. Les charges importantes d'entretien et de maintenance du château ont amené la Ville à se dessaisir du domaine en 1997. Le château de Fréfossé est de nouveau un château privé, fermé au Public, depuis 1998. Il se situe au milieu d'un parc boisé de 50 hectares. Le bâtiment principal, en brique, est de forme rectangulaire et composé de trois étages, il est couvert d'un toit en croupe, percé de nombreuses lucarnes,  a été transformé en un beau Palace-Hôtel.","habitants":"Famille de Pelletot\"","divers":"Prefossé  grav-1-2                                                       GPS : 49° 41' 35,75\" Nord, 0° 12' 24,42\" Est              GPS : 49° 40' 59\" Nord, 0° 12' 23\" Est","gps":"49° 41' 35,75\" Nord, 0° 12' 24,42\" Est              GPS : 49","images":["../image/image_76/76_Fr%c3%a9foss%c3%a9_1.jpg","../image/image_76/76_Fr%c3%a9foss%c3%a9_2.jpg"]},"Consult_chateau_formulairebb40":{"id":"Consult_chateau_formulairebb40","dept":"76","canton":"Fécamp","commune":"Fécamp","nom":"Fécamp","type":"Châteaux","periode":"XIX","histoire":"Trois châteaux dans cet article Fécamp, Gruville et les Hogues.                                  FECAMP,  Le trésor royal, figurant au 1er rang des créanciers, en profita pour réclamer l'attribution du Moncel. Philippe Le Bel en prit possession en 1306 et le fit transformer en résidence royale. Il fît ajouter quatre tours, deux restent encore de nos jours. Philippe Le Bel y a résidé de 1309 à 1313. C'est au cours de l'une de ses chasses dans la forêt Royale qu'il fût victime d'un accident de cheval en octobre 1314, à Fontainebleau. Philippe VI de Valois, y séjourna entre 1326 et 1346, en compagnie de son épouse Jeanne de Bourgogne et de son fils, le futur Jean II le Bon. Peu entretenue, la demeure se dégrada rapidement. Louis XIV, en 1709, se laissa convaincre par les nonnes de l'Abbaye voisine de leur céder le château pour le démolir et vendre les pierres. Seules, les deux tours encastrées dans le mur d'enceinte furent épargnées. Au XIXe siècle, un marchand de vin fait l'acquisition des terres du Moncel, il fait édifier un corps de logis entre les deux tours. Éléments protégés MH : les vestiges du château de Fécamp : classement par arrêté du 26 octobre 1910.\nLe palais Bénédictine est un édifice mêlant les styles néogothique et néo-Renaissance, construit à la fin du XIX? siècle à Fécamp pour Alexandre-Prosper Le Grand, négociant en spiritueux et qui a fait fortune en inventant et commercialisant la liqueur Bénédictine nouveau château  néo-Gothique, néo-Renaissance et Art Nouveau. L'architecte était Camille Albert. Il abrite un Musée consacré à la précieuse liqueur normande et à des expositions temporaires d'art. Ce palais Bénédictine est inauguré la 1ère fois en 1888, puis disparaît en partie dans un grand incendie le 12/01/1892, mais il sera rebâti, de façon encore plus grandiose, l'année suivante,  nouveau château  néo-Gothique, néo-Renaissance et Art Nouveau.","architecture":"FECAMP, ce palais Bénédictine est inauguré la 1ère fois en 1888, puis disparaît en partie dans un grand incendie le 12/01/1892, mais il sera rebâti, de façon encore plus grandiose, l'année suivante. Le second édifice est inauguré en 1900 par les enfants d'Alexandre Legrand, décédé durant les travaux.  Les ferronneries et les faîtages sont confiés à un autre artiste haut-alpin Ferdinand Marrou (1836-1917) qui venait d'achever les faîtages du Palais de Justice de Rouen ainsi que les 4 pinacles de la Cathédrale de Rouen.                                                                                       GRUVILLE  à 8  K.M au sud est de Fécamp, château construit à partir de 1876 par l'architecte Camille Albert en 1911, pour Alexandre Le Grand, fondateur de la société Bénédictine de Fécamp. Le logis est asymétrique, sur plan massé, utilisant des matériaux hétérogènes: brique. Un soin particulier est accordé au parc, d'esprit XIXe siècle, et à la vaste serre. (création d'un escalier d'honneur) et en 1923 adjonction d'une galerie. Centre d'un domaine agricole, le château de Gruville est doté d'une ferme modèle et d'un château d'eau en forme de tours crénelées, construits de 1886 à 1888. éléments protégés MH : le logis ; le portail monumental de la ferme avec les bâtiments adjacents et les tours crénelées : inscription par arrêté du 6 août 1997.                                           Au sud de Fecamp les HOGUES  se situe aux limites de Froberville et d'Yport. Il a été construit au début du XXe siècle par l'architecte Camille Albert (1852-1942) pour Henry Simon (1849-1932), Armateur, propriétaire du trois-mâts morutier Marie-Marguerite, dont la totalité de l'équipage était yportais. La cousine des propriétaires, Anita Conti vint au Château des Hogues durant son enfance. C'est aujourd'hui une maison d'éducation spécialisée.","habitants":"Arch.  Camille Albert\"","divers":"Trois châteaux dans cet article Fécamp grav-1-2-6, Gruville grav-3-4 et les Hogues grav-5. Palais grav 6-7     GPS : 49° 45' 19,3\" Nord, 0° 22' 47,08\" Est                                                    Hogues  GPS : 49° 44' 34\" Nord, 0° 21' 33\" Est","gps":"49° 45' 19,3\" Nord, 0° 22' 47,08\" Est","images":["../image/image_76/76_F%c3%a9camp_1.jpg","../image/image_76/76_F%c3%a9camp_2.jpg","../image/image_76/76_F%c3%a9camp_3.jpg","../image/image_76/76_F%c3%a9camp_4.jpg","../image/image_76/76_F%c3%a9camp_5.jpg","../image/image_76/76_F%c3%a9camp_6.jpg"]},"Consult_chateau_formulaire150d":{"id":"Consult_chateau_formulaire150d","dept":"76","canton":"Gournay-en-Bray","commune":"Gaillefontaine","nom":"Gaillefontaine","type":"Château","periode":"XVIII","histoire":"GAILLEFONTAINE, cette motte castrale témoigne de l'importance du site, en Pays de Bray, sur l'ancienne frontière entre la Normandie et le nord du domaine royal. En 1800, le domaine a été acquis par la veuve du général Hoche. A partir de 1867 a commencé une importante campagne de travaux : de 1867 à 1877,1871 - Ernest-Gabriel devint Marquis, conseiller dÉtat et député à lAssemblée nationale.1873 - Après avoir habité lancien château, la Maison Blanche, il fit construire le superbe pavillon dénommé aujourdhui les Communs, pour y installer notamment une vaste bibliothèque en 1881 , Son uvre principale fut la construction du château actuel. Elle dura 5 ans. Il commença ensuite la construction de la chapelle dans les dépendances du parc. Il nen vit pas lachèvement car il mourut en 1903. Il y est inhumé ainsi que son épouse, la veuve du général Hoche et sa fille Jenny. Le parc à l'anglaise et communs de 1881 à 1899, par l'architecte Pini et le logis par l'architecte Bir, pour le marquis Ernest-Gabriel des Roys dans le style néo-gothique. La chapelle funéraire de la famille des Roys, extérieure au parc, a été achevée en 1903. A l'intérieur du logis, une galerie est ornée de peintures murales de Godon réalisées à l'extrême fin du XIXe siècle (1899).","architecture":"GAILLEFONTAINE, dans un style néo-renaissance; en brique et pierre, avec tourelles, clochetons, fenêtres à meneaux. Il renferme quelques vestiges de l'Abbaye de Beaubec et des cheminées provenant du manoir de Bures-en-Bray. Proches, se trouvent les communs élevés selon un plan en \"U\" et chapelle sépulcrale familiale, élevée selon un plan en forme de croix.                                                                                                   Éléments protégés MH : l'ensemble du domaine, y compris sa chapelle funéraire, les éléments bâtis et assise foncière : classement par arrêté du 1er février 2001.","habitants":"Famille de Ernest-Gabriel\"","divers":"Gaillefontaine GPS : 49° 39' 16\" Nord, 1° 37' 01\" Est","gps":"49° 39' 16\" Nord, 1° 37' 01\" Est","images":["../image/image_76/76_Gaillefontaine_1.jpg","../image/image_76/76_Gaillefontaine_2.jpg"]},"Consult_chateau_formulaire05a1":{"id":"Consult_chateau_formulaire05a1","dept":"76","canton":"Yvetot","commune":"Doudeville","nom":"Galleville","type":"Châteaux","periode":"XVII","histoire":"GALLEVILLE, c'est un château de style Louis XIII. Sa construction date de 1678. Il appartenait à Roque de Varengeville. Il date du XVIIe siècle. Le château fut fondé en 1680, par la marquise de Varengeville qui, à la même époque, avait épousé Claude -Louis-Hector de Villars, elle fit construire un hôtel parisien, devenu l'actuelle Maison de l'Amérique latine. Le château de Galleville était la demeure du maréchal de Villars, Grand maréchal, sous Louis XIV en 1760 acquisition du château par la famille le Seigneur dont descendent les proprietaires actuels, en 1885, mariage d'Isaure de montaut, héritière de Galleville avec le comte Mniszech chambellan de l'empereur d'Autriche. Il fut restauré après l'incendie qui l'endommagea en 1943. La visite vous fait pénétrer dans la première cour bordée de communs, puis dans la cour d'honneur, les salons, la bibliothèque, la chapelle et l'ancienne cuisine. Dans toutes les pièces vous admirerez son très beau mobilier, ainsi qu'un beau décor de stuc présent dans les salons et la chapelle. En 1980 Mr et Mme Robert Gillet héritent de Galleville. Légué  à un neveu de la comtesse de  Mniszech, le baron d'Etchegoyen. A la mort du Baron en 1980, le château échoit à sa nièce Arlette  de Pracomtal épouse de Robert Gillet Il est de style Louis XIII. Son premier propriétaire fut Roque de Varengeville. Le château de Galleville fut revendu au maréchal de Villars. Puis, il a appartenu en 1984 à l'ambassadeur Robert Gillet.","architecture":"GALLEVILLE, éléments protégés MH : les façades et les toitures du château, des deux bâtiments des communs, des deux pavillons de garde et du colombier ; les deux allées plantées à l'est et à l'ouest du château ; l'ensemble des murs de clôture y compris le saut-de-loup à l'ouest et ceux entourant l'avant-cour et la cour d'honneur avec le saut-de-loup et le pont ainsi que la grille d'entrée : classement par arrêté du 4 mai 1984.","habitants":"Famille de Claude -Louis-Hector de Villars\"","divers":"Galleville  GPS : 49° 43' 52\" Nord, 0° 28' 20\" Est","gps":"49° 43' 52\" Nord, 0° 28' 20\" Est","images":["../image/image_76/76_Galleville_1.jpg","../image/image_76/76_Galleville_2.jpg","../image/image_76/76_Galleville_3.jpg"]},"Consult_chateau_formulaireb309":{"id":"Consult_chateau_formulaireb309","dept":"76","canton":"Rouen","commune":"Claville_Motteville","nom":"Gouville_Claville","type":"Château","periode":"XVIII","histoire":"GOUVILLE, fut construit en 1840 et racheté par Adrien de Germiny en 1854. Héritier dune lignée de grands serviteurs de lEtat, est Receveur Général des Finances de la Seine Inférieure et Régent de la Banque de France en 1864. En 1870, l'armée française et la défaite à Sedan et la France est ouverte à loccupation prussienne. Les caisses de lEtat sont vides et le gouvernement de la Défense Nationale doit faire face aux dommages de guerre et au réarmement. Cest alors que Gambetta fait appel à Adrien de Germiny, financier avisé et reconnu, pour négocier avec le gouvernement Anglais un emprunt de 250 millions de francs.","architecture":"GOUVILLE, Adrien de Germiny fait creuser un étang alimenté par de nombreuses sources, transforme un ancien moulin en établissement de pisciculture. Amateur de botanique, il installe une vingtaine de serres pour cultiver des espèces rares, créé un jardin potager qui donne des fruits en toutes saisons. Aménagé au milieu du XIX siècle et totalement préservé, le parc à langlaise de vingt hectares est un havre de calme et de sérénité.","habitants":"Famille de Adrien de Germiny\"","divers":"Gouville à Claville_Motteville","gps":"","images":["../image/image_76/76_Gouville_Claville_1.jpg"]},"Consult_chateau_formulaire3f17":{"id":"Consult_chateau_formulaire3f17","dept":"76","canton":"Saint-Romain-de-Colbosc","commune":"Daubeuf-serville","nom":"Grand_Daubeuf","type":"Château","periode":"XVII","histoire":"Deux châteaux dans cet article; Gd-Daubeuf et Serville.                                  GRAND-DAUBEUF, le château attribué à François Mansart, a été construit en 1629, ainsi que le domaine enclos. Le château avec corps de logis flanqué de deux pavillons construits sur une légère éminence est très caractéristique des constructions de la fin du règne de Louis XIII. Malgré les travaux d'amélioration du XIXe siècle, il est encore représentatif de cette architecture robuste mais très soignée. Le parc a été redessiné au XVIIIe siècle, des perspectives ont été créées se prolongeant à l'extérieur du domaine au delà du saut de loup. Dans son emprise foncière et dans sa composition, les grandes lignes en sont préservées y compris la clôture. Au XIXe siècle, il a été modifié par Bühler (adjonction de la pièce d'eau et du jardin bas). L'ensemble des dépendances, construites par Alexandre Pinchon et Boulanger dans la deuxième moitié du XIXe siècle, sont d'un intérêt moindre. L'intérêt de ce château vient surtout de son mobilier, ensemble exceptionnel dont il n'est pas douteux qu'en partie il ait été conçu ou acquis pour ce château et ne l'ait pas quitté depuis le XVIIIe siècle.   Éléments protégés MH : l'enclos ; les éléments subsistants de la composition d'ensemble et des aménagements de jardins ; l'avenue sud-ouest ; les écuries : inscription par arrêté du 12 avril 1994. Le château ; le portail monumental et la clôture ; l'ensemble des éléments bâtis du parc, à l'exception du bassin : classement par arrêté du 3 novembre 1997.","architecture":"GRAND-DAUBEUF, le château a été construit à la 1ère moitié du XVIIe siècle. Quatre architectes ont suivi sa construction. Le Domaine du Grand Daubeuf est classé aux M.H. depuis 1997. Le château attribué à François Mansart, a été construit en 1629, ainsi que l'enclos du domaine. Le château avec corps de logis flanqué de deux pavillons construits sur une légère éminence est très caractéristique des constructions de la fin du règne de Louis XIII. Malgré les travaux d'amélioration du XIXe siècle, il est encore très représentatif de cette architecture robuste mais très soignée. Le parc a été redessiné au XVIIIe siècle, des perspectives ont été créées se prolongeant à l'extérieur du domaine au-delà du saut-de-loup. Dans son emprise foncière et dans sa composition, les grandes lignes en sont préservées, y compris la clôture. Au XIXe siècle, il a été modifié par Bühler (adjonction de la pièce d'eau et du jardin bas). Les dépendances, dans la 7ème moitié datent du XIXe siècle.                                                                                                       SERVILLE, sur le site sélevait autrefois un château-fort majestueux, gardant le flanc gauche de la vallée de Saint-Maclou, pendant que celui de Bois-Rozé gardait le flanc droit. Le château de Serville, construit au XVIe siècle, entrera en possession de la famille de Nourry a l'issue d'un long procès, commencé en 1705 par François de Nourry, sieur de Saint Wandrille, et terminé en 1730 par Madeleine Honorée de Franciny, veuve de Jean-Baptiste de Nourry de Bénouville, son frère et héritier. Ayant subi des transformations au XIXe siècle, il ne conserve du XVIe siècle, date de sa construction, que la façade postérieure ainsi qu'une tourelle, dont la couleur de la brique est étonnante. Dans le domaine se trouve une très belle chapelle décorée et un colombier. La chapelle, ancienne église paroissiale du village de Serville, a été entièrement redécorée en 1843 par son propriétaire dalors, M. Mongrard, entrepreneur de travaux publics au Havre.","habitants":"François Mansart\"","divers":"Deux châteaux dans cet article; Gd-Daubeuf  grav-1 et Serville grav-2-3.                                            GPS : 49° 42' 29,55\" Nord, 0° 28' 37,1\" Est","gps":"49° 42' 29,55\" Nord, 0° 28' 37,1\" Est","images":["../image/image_76/76_Grand_Daubeuf_1.jpg","../image/image_76/76_Grand_Daubeuf_2.jpg","../image/image_76/76_Grand_Daubeuf_3.jpg"]},"Consult_chateau_formulaire8446":{"id":"Consult_chateau_formulaire8446","dept":"76","canton":"Saint-Romain-de-Colbosc","commune":"Saint-Romain-de-Colbosc","nom":"Gromesnil","type":"Château","periode":"XVI","histoire":"GROMESNIL En 1184, Hémon de Gromesnil a droit de conserver un colombier, château bâti au XVIe siècle (caves voûtées). En 1883, vente à Louis René Preverand de la Boutresse qui entreprend la reconstruction de l'ancien château, en cours en 1892. Colombier circulaire dans la cour de la ferme figuré sur le cadastre de 1822, détruit. Blockhaus de la Seconde Guerre mondiale dans le parc.","architecture":"GROMESNIL, l'édifice se compose d'un étage carré et un étage de comble, gros oeuvre en calcaire, pierre de taille, silex, brique et appareil à assises alternées, élévation à travées surmontée de toit à longs pans et croupe, couverts d'ardoises.  Découvrez la salle du château de Gromesnil . Le parc est ouvert et libre de visite","habitants":"Famille de Louis René Preverand de la Boutresse \"","divers":"Gromesnil GPS : 49° 31' 55\" Nord, 0° 21' 28\" Est","gps":"49° 31' 55\" Nord, 0° 21' 28\" Est","images":["../image/image_76/76_Gromesnil_1.jpg","../image/image_76/76_Gromesnil_2.jpg"]},"Consult_chateau_formulaire11c2":{"id":"Consult_chateau_formulaire11c2","dept":"76","canton":"Bolbec","commune":"Gruchet le Valasse","nom":"Gruchet_le_Valasse","type":"Châteaux","periode":"XVII","histoire":"Deux châteaux dans cet article dont Gruchet et Navarre,                            GRUCHET LE VALASSE, ancienne abbaye du Valasse  dont la construction date du XIIe siècle au XVIIIe siècle. Elle est de style Gothique. Fondée en 1157 par l'Impératrice Mathilde, elle est devenue, au XVIIIe siècle, le château de Gruchet-le-Valasse, au cours de ses reconstructions. L'abbaye a été fondée vers 1150 par Galéran IV, Comte de Meulan, à son retour de croisade. La fondation a été reprise par Mathilde l'Emperesse, car elle ne lui faisait pas confiance, et après des débuts difficiles (1152-1153), elle est parvenue à imposer des moines cisterciens, venus de l'abbaye de Mortemer, fondée par son père Henri Ier d'Angleterre. L'abbatiale fut consacrée en 1181, l'ensemble a été achevé en 1218. L'abbaye a été détruite durant la guerre de Cent Ans, au XVe siècle, par les Troupes Anglaises, puis reconstruite à l'aide des pierres de la carrière du Valasse. Elle a été à nouveau saccagée par les Protestants en 1562. A la Révolution Française, elle fut confisquée à l'Église et devint une demeure châtelaine. Après avoir été aménagée en filature au XIXe siècle, puis en une laiterie, après la Seconde Guerre mondiale, elle est depuis 1985 la propriété de la commune de Gruchet-le-Valasse. Le site a accueilli, du 12/07/2008 au 31/12/2012, un parc de loisirs consacré au développement durable : Terre des possibles, qui a connu un lourd déficit.  Gruchet-le-Valasse a été inscrit aux M.H. le 4/08/1943.","architecture":"NAVARRE, en 1771, Charles Boutren vend à Pierre Le Sauvage de Raffetot, une maison de maître ornée de deux pavillons, avec les écuries, remises, colombier à pied, jardin, cour d'honneur, basse cour, clos de murs, une autre basse-cour plantée d'arbres fruitiers, entourée de murs et de haies vives, plus une masure édifiée de deux maisons, cour et jardin plantés d'arbre de haute futaye et fruitiers. Il figure sur le plan terrier de l'abbaye du Valasse en 1767, avec un jardin d'agrément régulier et un parc à l'est, sillonné d'allées plantées d'arbres. En 1823, le domaine appartient à Lebas de Bultot, maire de Bolbec et comprend un château, une cour d'honneur et une avenue. Le domaine est acheté au XIXe siècle par le duc de Lillers et le parc est vendu à l'industriel Auguste Desgenetais qui y fait construire en 1865 le château des Genêts. Le château Navarre a été incendié peu avant 1985. Il reste des communs, bâtis dans les années 1900 en style régionaliste. La conciergerie, en assises alternées de brique et de calcaire a un étage carré desservi par un escalier hors oeuvre en forme de tour polygonale, la maison en pan de bois couverte d'un toit à demi croupe est en rez-de-chaussée.                                                                                                                       A 10 K.M. à l'est Grand-Camp  ST-SYLVESTRE En 1454, Jean de Saint Sylvestre rend aveu au comte de Maulévrier du manoir, maison, jardin, colombier à pied et motte ancienne, le tout clos de murs et de fossés. Au début du XVIIe siècle, Tristan de Goutimesnil reconstruit ce manoir. En 1804, madame de Gueutteville fait agrandir le logis vers l'est, reconstruire une tour, séparer ce logis de la ferme, le transformant ainsi en château. En 1860, une aile est ajoutée au logis. A la fin du XIXe siècle sont construites des écuries monumentales. Les bâtiments de la ferme datent pour la plupart du XVIIIe siècle. La partie centrale du logis est en assises alternées de silex et de calcaire ; la partie agrandie est en assises alternées de calcaire et de brique ; les bâtiments de la ferme sont en pan de bois ou en assises alternées de silex et de brique ou de calcaire et de brique ; les écuries sont en bois avec décor ajouré.","habitants":"Gruchet; problème de religions\"","divers":"Trois châteaux dans cet article dont Gruchet grav -1-2-3, Navarre et St-Sylvestre grav-4      GPS : 49° 32' 13,56\" Nord, 0° 30' 20,16\" Est                                              Valasse  GPS : 49° 32' 13,56\" Nord, 0° 30' 20,16\" Est","gps":"49° 32' 13,56\" Nord, 0° 30' 20,16\" Est","images":["../image/image_76/76_Gruchet_le_Valasse_1.jpg","../image/image_76/76_Gruchet_le_Valasse_2.jpg","../image/image_76/76_Gruchet_le_Valasse_3.jpg","../image/image_76/76_Gruchet_le_Valasse_4.jpg"]},"Consult_chateau_formulairea866":{"id":"Consult_chateau_formulairea866","dept":"76","canton":"Eu","commune":"Guerville","nom":"Guerville","type":"Châteaux","periode":"XVI-XVIII","histoire":"Deux châteaux dans cet article; la Haye Grande Vallée et grosmenil.                                          LA HAYE, depuis 1523, l'activité verrière avait donné du travail aux habitants jusqu'à son déclin après la première guerre mondiale. Il date du XIXe siècle. Le domaine de La Haye fait 11 hectares. Depuis 35 ans, ce riche domaine appartient à lécole de la Rose-Croix dOr. Cette organisme, reconnu association cultuelle par lÉtat en 2012, mêle, dans ces lieux, une base de vie, dans lenceinte dun château datant du XIXe siècle, et un temple, servant de l
