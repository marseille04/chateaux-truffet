meure dans la famille Duval jusqu'à l'époque révolutionnaire. En 1789, Vincent Raoul Louis Duval de Beaumet l'habite. Après son décès vers 1800, il revient en héritage à sa fille Antoine Marguerite qui le vend le 8 avril 1816 à Casimir Perier. Le père, Claude Perier, fabricant de toile, devient député en 1800. Son fils Casimir est l'un des créateurs de la Banque de France, homme politique, Député de Paris, il fut l'un des chefs de l'opposition libérale, sous la Restauration, il fut ensuite Président de la Chambre des Députés, Président du Conseil puis Ministre de l'intérieur. C'est lui qui réprima sévèrement la révolte des Canuts de Lyon en 1831 et donna son nom à la famille Casimir-Perier. Son petit fils Jean, fut Président de la République après l'assassinat de Sadi Carnot en juin 1894. Le 1/11/1828, Casimir Perier revendit le château de Varengeville et ses dépendances à Godefroy Quirinus Rouff, Industriel en textiles, dans les Vallées du Cailly et de l'Austreberthe. Godefroy Quirinus Rouff fut maire de Saint-Pierre-de-Varengeville de 1837 à 1847.","architecture":"En 1854, au décès de Godefroy Quirinus Rouff, le château revint à sa fille Madeleine Iphygénie, épouse de Pierre César Dieusy, négociant et Président du Tribunal de Commerce de Rouen. En 1879, au décès de Madeleine Iphygénie Dieusy, Edouard Leverdier acquiert le château et ses dépendances (194 ha). Edouard Leverdier est un riche négociant possédant de nombreuses fermes, terres et bois en Pays de Caux ainsi que le château du Vaudichon à Saint-Saëns. En 1887, il fit une donation partage entre ses trois enfants: Claire Marguerite épouse de Gaston Le Breton devint propriétaire du château. En 1888, il  est en mauvais état. Gaston Le Breton, riche collectionneur, et directeur des musées Départementaux le fit raser pour construire le château actuel.    Construit en 1869, après la deuxième guerre mondiale, les Houillères du nord devenues propriétaires en avaient fait une colonie de vacances pour accueillir près de 180 jeunes. Le château était fermé depuis quatre ans lorsque Pierre Bienfait, attiré par la commune grâce à son épouse, Marie-Jacqueline, originaire de Varengeville, a acheté le château pour transformer le rez-de-chaussée en salle pouvant accueillir jusquà 300 personnes. Sous le nom de Pierre Delamare, le propriétaire est également auteur compositeur et pianiste.                                                                                        BOIS DES MOUTIERS en 1897 achat par Guillaume Mallet qui décéde en 1945 toujours dans la descendance de la famille Mallet.","habitants":"Famille de Duval et Casimir Perier\"","divers":"deux châteaux dans cet article ; Varengeville grav-1-2 et Bois des Moutiers grav 3.    Varengeville     GPS : 49° 54' 10\" Nord, 1° 00' 04\" Est","gps":"49° 54' 10\" Nord, 1° 00' 04\" Est","images":["../image/image_76/76_Varengeville_1.jpg","../image/image_76/76_Varengeville_2.jpg","../image/image_76/76_Varengeville_3.jpg"]},"Consult_chateau_formulaire3ef2":{"id":"Consult_chateau_formulaire3ef2","dept":"76","canton":"Le Mesnil-Esnard","commune":"Héroncelles","nom":"Vascoeuil_Belmesnil","type":"Château","periode":"XV","histoire":"deux châteaux dans cet article Vascoeuil et Belmesnil                            VASCOEUIL, dillustres familles ont été propriétaires de Vascoeuil : au Moyen-Âge, Guillaume et son épouse née dEstouteville. Les familles Hotot et De Moy, cette dernière apparentée au Roi de France, ont également\npossédé cette terre. A lépoque moderne, Jules Michelet découvrit Vascoeuil en 1841, alors quil  travaillait sur le procès de Jeanne dArc à Rouen, il y fut invité par son élève et futur gendre, Alfred  Dumesnil, fils des propriétaires de Vascoeuil.  Michelet établit son Cabinet de travail - aujourdhui fidèlement reconstitué au sommet de la tour du château où il écrivit, une importante partie de son uvre  dhistorien mais aussi La Sorcière, L'Oiseau, La Mer. Avec la restauration du château conduite avec beaucoup dintégrité, le courant du passé vibre dans chaque pierre sans jamais paraître le témoignage froid dune gloire effacée.  Château ou le musée consacré  dans une dépendance du XVIIIe à Michelet et à sa famille  le seul existant en France mais aussi  pour sy sentir heureux et paisible dans un décor dune surprenante harmonie.  La tour du château accueillit en son temps le cabinet de travail de l'historien Jules Michelet, qui y fit plusieurs longs séjours de 1843 à 1860, d'abord chez Mme Dumesnil, dont il était épris, puis chez son fils M. Alfred Dumesnil  et principal disciple devenu propriétaire du château.                                                                                                 BELMESNIL-Saint-Denis le Thiboult, c'est devenu un Hôtel-Restaurant. Cette superbe demeure familiale du château de Belmesnil repose au coeur de son parc d'origine. Le succès de sa restauration est la combinaison du contemporain avec le style traditionnel du XVIIIe siècle la superbe salle de Gala Cristal restaurée à l'ancienne dans les règles de l'art par nos artisans : Lustres et appliques de Murano, parquet chêne, cheminée en marbre. La grande fierté du château de Belmesnil.","architecture":"VASCOEUIL, le château de Vascoeuil est un bon exemple de maisons fortes édifiées en Normandie après la guerre de Cent ans. Il garde la structure typique des dernières années du XVe siècle ; les portes en anse de panier, la haute tourelle octogone avec son escalier à vis qui dessert les différents niveaux ; à lintérieur de belles cheminées. Son homogénéité et sa beauté lui sont données par lappareillage du rez-de-chaussée  en grès local. Les ouvertures des façades ont été réalisées au XVIe siècle. Dans la Cour dHonneur, le  colombier en briques du XVIIe siècle possède sa charpente dorigine et un remarquable système  déchelle tournante permettant daccéder aux boulins où nichaient les pigeons. 25 ans de travaux couronnés par un prix des Chefs dOeuvres en péril. Après leur acquisition en 1965 de ce domaine, les actuels propriétaires entreprirent, parallèlement à sa restauration, dy créer un centre dArt et dHistoire inauguré en 1970 par Jacques Duhamel, alors Ministre des Affaires Culturelles.  Depuis lors, Vascoeuil a été inscrit à lInventaire supplémentaire des Monuments Historiques   présente chaque saison dimportantes Expositions dArtistes contemporains renommés, comme Bernard Buffet etc. et en permanence dans le parc et le jardin à la française, un ensemble exceptionnel de plus de 50 sculptures originales (bronzes, marbres, mosaïques, céramiques) de : Beck, etc.","habitants":"famille deJules Michelet\"","divers":"Vascoeuil grav 1-2 Belmesnil grav-3","gps":"","images":["../image/image_76/76_Vascoeuil_Belmesnil_1.jpg","../image/image_76/76_Vascoeuil_Belmesnil_2.jpg","../image/image_76/76_Vascoeuil_Belmesnil_3.jpg"]},"Consult_chateau_formulaire6f62":{"id":"Consult_chateau_formulaire6f62","dept":"76","canton":"Luneray","commune":"Gonneville-sur-Scie,","nom":"Vatine","type":"Château","periode":"XVIII","histoire":"VATINE  Ce beau château d'époque Louis XIII a été reconstruit par la duchesse de Longueville après qu'elle se fut assagie. En 1777, le château appartenait à Joseph Quevillon, émigré à l'époque de la Révolution, qui meurt à Schwerin en Westphalie le 08 mars 1800, après avoir servi dans le corps des gendarmes de la garde de Louis XVI. Son épouse, Madame Quevillon de la Vastine, fût arrêtée et mise en prison au moment de la terreur. Mme d'Harvilliers, sa cousine la suivit pour lui prodiguer ses soins. Les biens de M. Quevillon, dont le château, sont confisqués par la Nation, vendu aux enchères comme bien national, Madame Quevillon, libérée, racheta le château, et en reconnaissance du dévouements et des soins de Madame d'Harvilliers, elle légua le château par testament à son filleul, M. d'Harvilliers, lequel devient garde du corps de Louis XVIII et de Charles X. Il est à noter qu'il présente de fortes similitudes d'architecture avec les petites écoles de Port-Royal des Champs. Aujourd'hui propriété de monsieur Robert Tourres.","architecture":"VATINE construit en 1777 par Joseph Quevillon, De plan rectangulaire à deux niveaux, toit en croupes avec série de lucarnes sur comble ardoisés.","habitants":"Famille de Quévillon\"","divers":"Vatine à  Gonneville-sur-Scie","gps":"","images":["../image/image_76/76_Vatine_1.jpg"]},"Consult_chateau_formulairead03":{"id":"Consult_chateau_formulairead03","dept":"76","canton":"Neufchâtel-en-Bray","commune":"ST-Saens","nom":"Vaudichon","type":"Château","periode":"XX","histoire":"VAUDICHON   Sa construction date de 1987. Il est devenu le Golf-Hotel de Saint-Saens se situe entre Rouen et Dieppe, il se trouve au coeur de la fôret d'Eawy, plus grande hêtraie de France,  dans un cadre magnifique.","architecture":"VAUDICHON  Le Club House, qui domine la vallée est situé dans un château du XIXe siècle, avec, depuis 1999, 7 chambres à l'étage. En 2008, et face à une demande croissante de golfeurs étrangers (Britanniques, Belges et Néerlandais), 14 nouvelles chambres sont ouvertes dans l'annexe, ancienne étable située sur le domaine. Le golf accueillit durant 7 ans l'Open International de Normandie, épreuve professionnelle européenne. Il se caractérise par la variété de son tracé entre la vallée, la forêt et le plateau, et offre aux joueurs, une grande diversité dans leur jeu. La fôret d'Eawy proche et le château du Vaudichon qui domine la vallée, conférent au golf l'élégance et le charme naturel de la campagne normande.","habitants":"Responsable château\"","divers":"St-Saens        GPS : 49° 41' 12\" Nord, 1° 15' 32\" Est","gps":"49° 41' 12\" Nord, 1° 15' 32\" Est","images":["../image/image_76/76_Vaudichon_1.jpg","../image/image_76/76_Vaudichon_2.jpg"]},"Consult_chateau_formulaire861f":{"id":"Consult_chateau_formulaire861f","dept":"76","canton":"Neufchâtel-en-Bray","commune":"Villequier","nom":"Villequier_76","type":"Châteaux","periode":"XVII-XVIII","histoire":"Quatre châteaux dans cette article; Caumon, Roques, Guerches et Villequier.                                                                                                                 CAUMONT, Il fut reconstruit dans la deuxième moitié du XVIIIe siècle. Un inventaire du mobilier de Caumont fin 1744, révèle l'importance du nouveau château qui venait remplacer l'ancien manoir. Une expertise datant de 1830, après le décès d'Augustin Busquet, marquis de Caumont, présente l'édifice avec une élégante façade élaborée en pierre de taille blanche. Bien dessinée dans le style Louis XV assez sobre, tel se présentait le château appartenant à Isambart Busquet de Caumont, qui avait réalisé une partie du château, terminé par son fils Nicolas Isambart à la fin du XVIIIe siècle. En 1866, le domaine est vendu à un homme d'affaires, James-Edmond Roberts. Ses héritiers cèdent la propriété en 1921 à Charles-Augustin Fercoq qui ne la conservera que pendant deux ans. Elle sera rachetée par René Ernest Cordier qui la gardera de 1924 à 1934. L'édifice inhabité et sans entretien se dégrade. Il est vendu en 1935 à Paul Vautier et la partie centrale s'effondre en 1937, ébranlant la toiture de l'aile gauche, il fallut refaire la toiture de l'aile droite en supprimant les mansardes, la petite-fille Vautier, Michèle et son mari Jean Levagneur ont sauvé ce qui restait. Site inscrit en 1972.","architecture":"ROQUES manoir, aussi appelé la Maison Blanche, est une des plus anciennes demeures de Villequier. Edifiée au XVe siècle par un certain Chevalier de Brie, la demeure a été revendue à   Pierre Busquet. Ses héritiers la conservèrent une centaine dannées. Il fut alors acheté en 1767 par Jacques-François Asselin. En 1523 : Jehan Busquet, Seigneur des Roques, offrit la moitié du célèbre vitrail du combat naval toujours situé près de la chaire en léglise St Martin de Villequier. Entre 1913 et 1949 : cest le neveu dErnest, Georges Binet (1865  1949), post  impressionniste connu qui y vécut tous ses étés. Chambres dhôtes et ouverture lors de plusieurs manifestations comme un marché de Noël, les journées du patrimoine.                                                                                                      VILLEQUIER, l'ancien château féodal de Villequier avait encore ses fossés, sa chapelle et son colombier en 1602; il fut complètement reconstruit entre 1763 et 1784, importants remaniements, construction de la galerie nord et de la chapelle après 1866. Site classé en 1958 et inscrit en 1972. L'édifice de plan symétrique, se compose d'un étage carré et un étage de comble, le gros-oeuvre en calcaire, brique, pierre avec brique en remplissage et bossage, élévation ordonnancée, surmontée de toit à longs pans brisés, pignon découvert et flèche polygonale, couverts d'ardoises. Propriété de Claude de Casselane.                                                                                                                                                                                                GUERCHES , au coeur du Parc naturel Régional de Bretonne, la propriété domine le petit village de Villequier cher à Victor Hugo.\nLe domaine de la Guerche, géré par l'Association GEDEON, est agréé Jeunesse et Sports.","habitants":"Caumont Famille d'augustin Busquet\"","divers":"Quatre châteaux dans cette article; Caumont et Villequier grav-1-2.    Roques grav-5-6 et Guerche-grav 3-4","gps":"","images":["../image/image_76/76_Villequier_76_1.jpg","../image/image_76/76_Villequier_76_2.jpg","../image/image_76/76_Villequier_76_3.jpg","../image/image_76/76_Villequier_76_4.jpg","../image/image_76/76_Villequier_76_5.jpg","../image/image_76/76_Villequier_76_6.jpg"]},"Consult_chateau_formulaire0614-2":{"id":"Consult_chateau_formulaire0614-2","dept":"76","canton":"Canteleu","commune":"Saint-Pierre-de-Manneville","nom":"Villers_76","type":"Château","periode":"XV-XX","histoire":"VILLERS en OUCHE , château de Villers-en-Ouche. À lemplacement du château actuel était construite une Villa romaine qui donné le nom de Villers au château ainsi quau village. Au XIVe siècle ce lieu est transformé en Maison Forte dont il reste aujourdhui le grand colombier du XVe siècle, au toit de tuiles plates et aux colombages. À cette époque, Villers est une « Maison des Champs » avec 670 hectares qui sétendent à lEst du Village. Le château est construit vers 1610 par la famille de Baurepaire. Le grand escalier de chêne est dépoque et les autres pièces sont remises au goût du jour sous Louis XVI. Au XVIIIe siècle, est également ajouté un parc à lAnglaise dans lequel est construit un petit temple, appelé « Fabrique » ou galamment nommé « Trianon ». Le parc à lAnglaise se voit agrémenté dun rond à danser pour les fêtes de la moisson. Le château est épargné pendant la Révolution, tout comme les alentours du village. Pendant la deuxième guerre mondiale, les Allemands auraient établi leur commandantur.","architecture":"VILLERS à Saint-Pierre-de-Manneville   Ce site seigneurial est mentionné dans les sources au XVIe siècle. Ancien manoir remplacé par un château de style néo normand achevé vers 1908 par Charles Lassire, architecte. C'était en 1581, une Maison de Maitre construite en pierre de Caumont avec un étage à pans de bois et recouverte de tuiles. Il fut transformé et agrandi au cours des siècles, jusqu'à devenir ce manoir néo-normand aux toitures inspirées des belles maisons de Rouen et aux façades habillées d'un curieux trompe l'oeil. Les jardins classiques du XVIIIe siècle sont devenus à la fin du XIXe siècle un parc ouvert sur la vallée de la Seine fortement structuré. Celui-ci a été réhabilité dans un esprit nouveau, où rigueur et souplesse permettent de passer du sophistiqué au bucolique. Le Manoir de Villers est situé à 20 kms de Saint-Jacques-sur-Darnétal. Inscrit aux M.H. depuis 1997, pour ses façades, ses toitures et sa chapelle. IL est membre des Parcs et Jardins de Haute Normandie et de la Route des Abbayes, le manoir de Villers est ouvert à la visite  du public. Les chambres sont décorées de meubles dépoque (du XVIIIe siècle), pleines de charme, avec une vue sur le parc et la Seine. Le manoir de Villers date du XVIe au XIXe siècle. Il est la propriété de la même famille depuis 1764, et permet, en s'appuyant sur le patrimoine familial, de découvrir l'évolution des Arts Décoratifs et ses liens avec l'Histoire. Éléments protégés MH : les façades et les toitures du logis et de la chapelle : inscription par arrêté du 6 août 1997.","habitants":"Famille de Baurepaire\"","divers":"Villers grav 1-2 à Saint-Pierre-de-Manneville et Villers grav-3 sur Ouche","gps":"","images":["../image/image_76/76_Villers_76_1.jpg","../image/image_76/76_Villers_76_2.jpg","../image/image_76/76_Villers_76_3.jpg"]},"Consult_chateau_formulaire16c7":{"id":"Consult_chateau_formulaire16c7","dept":"76","canton":"","commune":"Petit Caux","nom":"Wargemont","type":"Château","periode":"XV-XVII","histoire":"WARGEMONT   A partir de 1855, le château a appartenu à la famille Bérard qui y a reçu le peintre Renoir. Celui-ci y a peint régulièrement de 1879 à 1885 Le domaine de Wargemont datant de 1258 a connu des hôtes et propriétaires illustres : Récemment, Loïc Dubigeon, artiste peintre, y demeura et y réalisa plusieurs tableaux et collages entre autre pour \"Hermès \". Wargemont date du XVIIIe siècle. C'est un château inscrit aux M.H. Les de Clieu introduisent la culture du café aux antilles.  A la fin du XIXe siècle, Auguste Renoir vint passer des vacances chez M.et Mme Paul Bérard et peignit plusieurs tableaux que l'on peut découvrir dans les musées du monde entier : Dieppe, Paris, Sao Paulo, New York, etc.\nMerlin de Douai, homme de lois, fut ministre de la justice après la Révolution et prit une part importante en la constitution du code pénal. Il épousa l'héritière du château de Wargemont et y demeura pendant plusieurs années. Son gendre, Alexandre d'Haubersart, président de la Cour d'appel de Douai, avocat, député, baron de l'Empire, fut également Pair de France et maire du village de 1830 à 1843.\nLe château de DERCHIGNY a été construit par Gabriel de Clieu, introducteur d'un plant de caféier à la Martinique en 1720.","architecture":"WARGEMONT, du XVe siècle à 1789, le château est aux mains des  François Le Menu de La Noë, seigneurs puis marquis de Wargemont quelques vestiges en sous-sol . Reconstruction totale dans la deuxième moitié du XVIIIe siècle, dont il subsiste le corps de logis central. Flanqué de deux pavillons en retour ainsi que d'une chapelle neuve, qui date de la deuxième moitié du XIXe siècle. Éléments protégés MH : à l'intérieur du château le rez-de-chaussée et son décor à l'exclusion de la copie du panneau peint dans la bibliothèque : inscription par arrêté du 26 juin 1986. La salle à manger avec son décor, y compris deux panneaux peints par Renoir : la chasse d'Eté et la chasse d'Automne : classement par arrêté du 8 octobre 1993.Derchigny et Graincourt furent réunis en 1822 par Ordonnance du Roi Louis et Derchigny en est le chef-lieu. Une grande rivalité a pourtant touché ces deux paroisses, toutes deux voulant garder leur indépendance. Quelques temps auparavant, le Préfet de la Seine-Inférieure avait même proposé de rattacher ces deux communes, soit à Glicourt, soit à Sauchay-le-Haut. Il n'en fut rien et Derchigny fut choisi au détriment de Graincourt, bien qu'il soit plus peuplé.","habitants":"Famille le Fournier\"","divers":"Wargemont au petit Caux  GPS : 49° 56' 2,29\" Nord, 1° 11' 50,51\" Est","gps":"49° 56' 2,29\" Nord, 1° 11' 50,51\" Est","images":["../image/image_76/76_Wagremont_1.jpg"]},"Consult_chateau_formulairecd08":{"id":"Consult_chateau_formulairecd08","dept":"76","canton":"Yvetot","commune":"Yvetot","nom":"Yvetot_Bois_Himont","type":"Château","periode":"XVIII-XIX","histoire":"Deux châteaux dans cet article  Bois-Himont à Yvetot, Fay et Valiquerville.              FAY. Au début du XVIIe siècle,  appartenait à Pierre Houel de Valleville, grand-oncle de Pierre Corneille. Le logis, achevé en 1612 (date gravée sur la façade), est construit en brique et calcaire, avec une tourelle d'escalier hors-oeuvre. A la fin du XVIIe siècle, un bâtiment de plan en L. fut accolé à l'Est. Le manoir du Fay servit de prison à la Révolution, puis il devint une exploitation agricole au XIXe siècle. L'ensemble est inscrit dans un enclos de type clos-masure. Il est composé de pierre calcaire et briques à motifs de losanges, dans un style Henry IV. Il a été acquis par la commune d'Yvetot en 1989. Le parc et la cour sont régulièrement utilisés pour des représentations artistiques ou théâtrales et des feux d'artifices. Le club de tir à l'arc utilise également des installations sur le territoire du manoir du Fay, il est inscrit partiellement aux M.H. depuis 1994 et classé aux M.H. le 12.12.1996.                                                                                                                                       YVETOT-BOIS HIMONT, château construit au XVIIIe siècle ; agrandi et restauré par René Martin, architecte à Rouen au début du XXe siècle. L'édifice se compose d'un sous-sol, d'un étage carré et d'un étage de comble, le gros oeuvre en calcaire, brique, et pierre avec brique en remplissage, élévation ordonnancée, surmontée d'un toit à longs pans, croupe, toit en pavillon, bulbe et toit conique, couverts d'ardoise et de chaume. Le parc est composé d'écuries et d'un colombier circulaire.                                                    La construction du château de Bois-Himont date du XVIIIe siècle. Le château fut agrandi et restauré, par René Martin, Architecte à Rouen, au début XXe siècle. Le château de Bois-Himont accueille, aujourdhui, un Centre dAide par le Travail, géré par lArcaux.","architecture":"A  cinq K.M .à l'est VALLIQUERVILLE, château-fort du XIe ou du XIIe siècle détruit. Chapelle Sainte-Anne ou Sainte-Marie attestée en 1267. Patronage: le seigneur du lieu. château construit limite XVIIIe-XIXe siècle. Parties agricoles bâties au XVIIIe siècle. L'édifice se compose d'un sous-sol, un étage carré et un étage de comble, le gros-oeuvre en silex, brique, calcaire, appareil mixte, bois, pan de bois et pierre avec brique en remplissage, élévation à travées surmontée de toit à longs pans, toit conique, pignon couvert et croupe, recouverts d'ardoise et de chaume. L'ensemble comprend des communs, une grange, une charretterie, un puits, une étable et des logements.","habitants":"Famille de  René Martin\"","divers":"Yvetot grav-1 bois-Himont grav_3 Clieu Chergny grav-2 Valliquerville-grav_4                                                           Fay  grav-5  GPS : 49° 37' 04\" Nord, 0° 45' 15\" Est","gps":"49° 37' 04\" Nord, 0° 45' 15\" Est","images":["../image/image_76/76_Yvetot_Bois_Himont_1.jpg","../image/image_76/76_Yvetot_Bois_Himont_2.jpg","../image/image_76/76_Yvetot_Bois_Himont_3.jpg","../image/image_76/76_Yvetot_Bois_Himont_4.jpg","../image/image_76/76_Yvetot_Bois_Himont_5.jpg"]},"Consult_chateau_formulaire8558":{"id":"Consult_chateau_formulaire8558","dept":"76","canton":"Barentin","commune":"Yville sur Seine","nom":"Yville","type":"Château","periode":"XVII","histoire":"YVILLE, dès son acquisition en 1708, François le Menu de La Noë, conseiller secrétaire du roi, entreprend la construction du château dont les plans sont attribués à Jules Hardouin-Mansart, mais cette hypothèse est non confirmée par de récentes recherches. Le domaine passe aux mains de l'un de ses créanciers, le marquis d'Etampes, et ensuite du financier John Law. La construction est poursuivie de 1723 à 1735 par l'ingénieur Jean-Jacques Martinet pour Jean-Prosper Goujon de Gasville (intendant de la généralité de Rouen de 1715 à 1732) nouveau propriétaire, mais le château ne sera achevé que dans la seconde moitié du XVIIIe siècle.","architecture":"YVILLE, en pierre de taille, présente d'un côté une façade encadrée d'ailes en retour avec galerie accompagnée d'un péristyle à colonnes ioniques, des sculptures raffinées aux frontons latéraux et aux agrafes des baies inspirées par la chasse, dans le style des maisons de plaisance, dont le goût se développait au début du XVIIIe siècle. Ce château est édifié au coeur de son domaine sur une terrasse étroite aménagée dans la pente, il est accompagné de deux basses-cours et d'un ensemble complet de communs comprenant une chapelle, d'un petit parc clos de murs avec glacière dans un des bosquets, d'un vivier avec ses écluses permettant d'amener l'eau de la Seine et inscrit dans une composition monumentale avec perspectives principale et secondaire plantées de tilleuls et dont les lignes s'inscrivent dans un vaste paysage compris entre la Seine et le sommet du coteau, où fut même aménagé un belvédère. Il est en outre accompagné d'un parc à gibier avec sa maison de garde, et de la ferme. Éléments protégés MH : le château : inscription par arrêté du 7 octobre 1931. Le domaine en totalité, soit l'ensemble du bâti, de la clôture, le parc et les perspectives : inscription par arrêté du 19 novembre 2002.","habitants":"François Le Menu de La Noë\"","divers":"Yville  à Yville sur seine  GPS : 49° 23' 50,41\" Nord, 0° 52' 41,92\" Est","gps":"49° 23' 50,41\" Nord, 0° 52' 41,92\" Est","images":["../image/image_76/76_Yville_1.jpg","../image/image_76/76_Yville_2.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','76 — Seine-Maritime'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
