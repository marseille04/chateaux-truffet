ieu de prière, dans un bâtiment moderne, aménagé non loin du château.  Le château de La Haye est à vendre pour 2,2 Millions d'euros. C'est un château d'une superficie de 3800 m2, avec 99 pièces, chargé dhistoire, mis en vente. Isolé au cur de la forêt, le château de La Haye de Guerville ne devrait pas à avoir de mal à trouver un nouveau propriétaire. Il appartenait à une association cultuelle.","architecture":"GRANDE VALLEE, la construction du château de la Grande Vallée date du XVIIIe siècle. Cette ancienne verrerie de la Grande Vallée, construite pour Anne de la Vicogne, est édifiée sur un parc de 7 hectares. Le château de la Grande-Vallée  appartenait à une association cultuelle. Ses dépendances sont riches dune noblesse acquise de la patine du temps sur les boiseries et ses pierres authentiques, mais ne sacrifient rien à la modernité avec une restauration.                                                                                                               Château de la VALLEE à Grandcourt à 10 K.M au sud, hôtel restaurant. Pas d'historique.  etChâteau de Guerville à Grosmesnil                                       GROSMENIL, mme de Cossé-Brissac, en 1878, héritant de la propriété. En 1883, elle décide de se séparer de son bien et demande à Me Brière, notaire à Saint-Romain-de-Colbosc, de le mettre en adjudication .","habitants":"Gd vallée Seigneurs locaux\"","divers":"Deux châteaux dans cet article; la Haye  Grav-3-4 et Grande Vallée Grav-1-2.   la vallée grav  5  à Grandcourt.                                                  Grande -Vallée GPS : 49° 57' 35\" Nord, 1° 33' 11\" Est                                                                La Haye GPS : 49° 57' 34\" Nord, 1° 30' 53\" Est","gps":"49° 57' 35\" Nord, 1° 33' 11\" Est","images":["../image/image_76/76_Guerville_1.jpg","../image/image_76/76_Guerville_2.jpg","../image/image_76/76_Guerville_3.jpg","../image/image_76/76_Guerville_4.jpg","../image/image_76/76_Guerville_5.jpg"]},"Consult_chateau_formulaire84d8":{"id":"Consult_chateau_formulaire84d8","dept":"76","canton":"Luneray","commune":"Gueures","nom":"Gueures","type":"Château","periode":"XV-XVII","histoire":"GUEURES. le château de Gueures est la propriété du chevalier des Aubes. On y trouve encore des éléments témoignant de l'établissement d'une communauté à l'époque gallo-romaine. Peut être Gueures est-il le Gauriacum donné en 750 par Pépin le Bref à l abbaye de Saint-Denis, mais l' histoire connue commence en 1431 quand Jeanne de Gueures épouse Guillaume de Canouville et crée la célèbre lignée des Canouville qui règne sur le plein fief jusqu à la Révolution. Ces derniers émigrent alors et le village est décrété bien national puis mis aux enchères.en 1766 début de la reconstruction du château. En 1792, Gueures revient à un hobereau. Emmanuelle de Tocqueville dont le fils. Le comte Pierre Victor de Tocqueville, adepte de Saint Simon, donne à la commune son essor industriel et agricole. en 1844 le domaine devient la propriété de la famille Bard.  Au XXe siècle seuls deux établissements créés par Gabriel Bourdon subsistent , à partir de 1900 est loué à Jehanne Leblanc et par Fernand  Prat qu'elle épousera en 1903 et en  1910 Maurice Leblanc séjourna au château que louait alors sa sur Jehanne, sa soeur Georgette installe ses quartiers  avec Maurice Maeterlinck dans le village de Cruchet est cité plusieurs fois et est au cur de son roman, la comtesse de Cagliostro. Gueures appartient aujourd'hui à Mme du Plessis descendante des Bard.","architecture":"GUEURES, est un château bâti à Gueures. Le village offre au regard un certain nombre de bâtiments construits sous la Restauration, dans le plus pur style anglais. Il possède son château, une belle demeure seigneuriale, reconstruite dans la dernière partie du XVIIIe siècle, d'une très sobre ordonance, d'un corps de logis rectangulaire dont l'assise est faite de briques et de silex superposées dans la tradition normande, toit en croupes recouvert d'ardoises,  dans lequel s'encadrent des lucarnes. Au centre de chacune des façades principales se détache un avant corps  en pierre, celui de la façade Est à ses angles soulignés par des pilastres qui supportent un fronton  triangulaire gravés la date de 1766 la façade ouest  le fronton semi-circulaire est percé dun oculus.  le Jardin à l'Anglaise est traversé par la Saâne.","habitants":"Guillaume de Canouville   et  Emmanuelle de Tocqueville\"","divers":"Gueures                                                      gps 49° 50' 40? nord, 0° 57' 47? est","gps":"","images":["../image/image_76/76_Gueures_1.jpg"]},"Consult_chateau_formulaire223d":{"id":"Consult_chateau_formulaire223d","dept":"76","canton":"Fécamp","commune":"Froberville","nom":"Hainneville","type":"Château","periode":"XVIII","histoire":"HAINNNEVILLE  Au XVIe siècle possession des Vattemare, le château sera construit par la famille Larrey au XVIIIe siècle. Sous l'empire passe en héritage au Mauduit de Sémerville qui cédèrent les terres et quinze fermes à Jacques -François Bégouën, conseiller d'état, en 1831 au décès de Bégouên, la propriété est vendue et passe dans différentes familles . Vers 1883 , Guy de Maupassant y séjournat, transformé en hôtel le château est acquis en 1956 par une association protestante.","architecture":"HAINNNEVILLE, citée en lan 1162 « Frobervilla » fut octroyée en 1179 au prieuré de Saint-Lô.  Aujourdhui, quelques vestiges nous rappellent lancien temps, comme le château dHainneville, sentinelle de pierre qui fut jadis perdu aux échecs par le Roi Charles X. Ce village champêtre se signale au loin par léglise Sainte-Hélène qui semble veiller là depuis le XIXe siècle.  Au cur de paysages variés où se mêlent harmonieusement, les verts et les tons chauds des différentes cultures maraîchères et florales, cest un plaisir de se laisser charmer par ce joli village, loin des grandes agglomérations.  La communauté religieuse cuménique de Caulmont s'y installe en 1976.   De 1984 à 1991, elle accueille ce qu'il reste de la communauté    des surs bénédictines hospitalières de Fécamp.  Mais la demeure subit un grave incendie en 2005. Depuis 2007, elle est à vendre. Le château d'Hainneville a accueilli la Communauté de Caulmont de 1976 à 2005.","habitants":"famille Larrey \"","divers":"Hainneville grav_1-2","gps":"","images":["../image/image_76/76_Hainneville_1.jpg","../image/image_76/76_Hainneville_2.jpg"]},"Consult_chateau_formulaire0be8":{"id":"Consult_chateau_formulaire0be8","dept":"76","canton":"le Havre","commune":"Harfleur","nom":"Harfleur","type":"Châteaux","periode":"XVII-XIX","histoire":"deux chateaux dans cet article; Harfleur et St-Joseph,                                      HARFLEUR  En 1636, Pierre Costé sieur de Saint-Supplix obtient de Louis XIII la cession d'une partie des anciens remparts et fossés entre la porte de Montivilliers et la tour de derrière le presbytère. En 1653, il acquiert de Charles de la Tour, curé d'Harfleur, \"la cour, les granges, les écuries du presbytère, rue Notre-Dame, vis à vis du choeur de l'église, aboutissant aux fossés\". Sur ce vaste domaine il fait bâtir un château. En 1657, il obtient l'érection du domaine en fief sous le nom de Saint-Martin de Harfleur, transformé en 1600 suite aux protestations de l'abbaye de Montivilliers en fief d'Harfleur avec le titre de gouverneur de la place. En 1827 le domaine appartient à la famille de Mérainville. Par succession il échoit en 1848 à la veuve de Charles de la Bédoyère. En 1873, Madame de la Bédoyère fait restaurer le logis par Eugène Viollet-le-Duc. Charles Schneider l'achète en 1910. En 1953, la municipalité acquiert le domaine et fait restaurer le logis par l'architecte Liot assisté des architectes Franche et Alleaume afin de l'approprier comme hôtel de ville.Cet ancien château construit en 1653, fut la résidence de la Famille Schneider, de 1906 à 1953. Il accueille aujourd'hui l'Hôtel de ville.                                                                          A cinq K.M a l'Est d'Harfleur   SAINT-JOSEPH  château construit dans la deuxième moitié du XIXe siècle à l'emplacement de deux fermes ; acheté en 1930 par l'abbé Emile Arson, curé de saint François, au havre pour en faire une maison de retraite, puis construction de nouveaux locaux pour une colonie d'enfants, qui n'est plus en activité. Le bâtiment, de plan régulier en L, se compose d'un étage carré, gros oeuvre en brique, élévation à travées, surmontée de toit à longs pans ; pignon couvert ; croupe et toit en pavillon recouverts d'ardoises et de tuiles mécaniques.","architecture":"HARFLEUR, sa façade principale sur cour est ornée de colonnes jumelées cannelées et baguées, à l'image de celles posées sur le portail Ouest de l'église Saint-Martin. La façade nord donne sur un jardin à l'anglaise. actuel hôtel de ville :  En 1636 Pierre Coste, seigneur de Saint Supplix, fils d'un bourgeois anobli en 1593, achète des terres situées au droit des anciens remparts et fossés de la ville au roi Louis XIII. Sur ses terres, il construire un château d'Harfleur qui fut achevé en 1653 et il achèta une partie des terrains près du presbytère à la paroisse situé rue Notre-Dame, actuelle rue de la République. En 1657, le domaine devient un fief sous le nom de Saint-Martin d'Harfleur qui change de nom en 1600 à la suite des protestations de l'abbaye de Montivilliers en fief d'Harfleur avec le titre de gouverneur d'Harfleur. Le château d'Harfleur appartenait à la Famille La Bedoyère, au XIXe siècle, qui le fit restaurer, en 1851, par l'architecte Charles Louis Fortuné Brunet-Debaines (1801-1862) puis, en 1873, par Viollet-le-Duc. Charles Schneider achète le château en 1910. La ville d'Harfleur racheta le château d'Harfleur, aux établissements Schneider, en 1953, pour en faire l'Hôtel de ville. Il fut restauré, par l'architecte Liot, avec les architectes Franche et Alleaume comme assistants. Le château d'Harfleur est un bel exemple d'architecture de château, de style Louis XIII.   Éléments protégés MH : le château d'Harfleur en totalité : inscription par arrêté du 24 novembre 1926.","habitants":"Famille de Mérainville et la  Famille La Bedoyère\"","divers":"deux chateaux dans cet article; Harfleur grav-1 et St-Joseph grav-2,       GPS : 49° 30' 26\" Nord, 0° 11' 56\" Est","gps":"49° 30' 26\" Nord, 0° 11' 56\" Est","images":["../image/image_76/76_Harfleur_1.jpg","../image/image_76/76_Harfleur_2.jpg"]},"Consult_chateau_formulaire895f":{"id":"Consult_chateau_formulaire895f","dept":"76","canton":"Neufchâtel-en-Bray","commune":"Grigneuseville","nom":"Haucourt","type":"Château","periode":"XVI","histoire":"HAUCOURT, la seigneurie d'Haucourt appartenait au Moyen Âge à cette famille. En 1472, le château d'Haucourt est détruit par Charles le Téméraire, duc de Bourgogne, comme la localité voisine de Gaillefontaine. Il est ensuite reconstruit. En 1503, Françoise de Bailleul, fille de Jacques de Bailleul, seigneur de Saint Léger, et de Jeanne d'Haucourt, épouse Adrien de Mailly. En 1519, Françoise de Bailleul hérite de son grand-père, Lancelot d'Haucourt, Gouverneur d'Abbeville. Ce mariage fait entrer Haucourt dans une branche de la Maison de Mailly qui conserva Haucourt jusqu'à la Révolution. Vers 1790, le maréchal de Mailly le vendit  aux dames Puissant, qui revendirent le domaine, en 1830, à Anne Louise Marie de Trie Pillavoine, veuve en premières noces de René François de Gaudechart et en seconde de Claude Marie, comte de Ruffo. Le château d'Aucourt échut, après elle, à son fils, René Ferdinand, marquis de Gaudechart (1787-1856), mort sans postérité, qui laissa Haucourt à son neveu, le comte de Valon. Utilisé alors comme habitation par le fermier, puis fut laissé à l'abandon, à la fin du XIXe siècle, avant d'être démoli, vers 1930. Son aspect est connu par des cartes postales anciennes. Il se composait d'un massif corps de logis édifié en brique et pierre aux XVe, XVIe et XVIIIe siècles, surmonté d'une haute toiture. La façade vers l'église comportait une tour carrée engagée, surmontée d'un clocheton.","architecture":"HAUCOURT, éléments protégés MH : les façades et les toit château-fort du Xe ou XIe siècle dont subsistent quelques vestiges à proximité du logis actuel. Un aveu de 1515 mentionne château et place forte avec manoir. Pigeonnier construit au XVIIe siècle. Restauré en 1788. Logis construit vers 1715. Communs édifiés entre 1649 et 1777. L'ensemble comprend un parc, un colombier polygonal, un logement, des communs, des parties agricoles, une motte et un fossé,  les perspectives nord et sud soit une bande de 50 mètres de part et d'autre des deux axes jusqu'au mur de clôture, l'escalier avec sa rampe en fer forgé, le grand salon et le petit salon avec leur décor : classement par arrêté du 29 novembre 1977. Les façades et les toitures des deux bâtiments des communs; le pigeonnier: inscription par arrêté du 29 novembre 1977.","habitants":"Famille de  Jacques de Bailleul\"","divers":"Haucourt","gps":"","images":["../image/image_76/76_Haucourt_1.jpg"]},"Consult_chateau_formulairef392":{"id":"Consult_chateau_formulairef392","dept":"76","canton":"aint-Valery-en-Caux","commune":"Saint-Pierre-le-Vieux,","nom":"Herbouville","type":"Château","periode":"XVI-XVIII","histoire":"Deux châteaux dans cet article; Herbouville  et Bosc le Comte, HERBOUVILLE, château élevé en brique et grès au début du XVIIe siècle avec un puits visible de l'extérieur. Il fut construit et habité par les Marquis d'Herbouville et leur descendance de 1600 à 1907 sur une ancienne maison-forte du XVIe siècle dont il subsiste une cuisine voutée comprenant un potager d'époque et une vaste cheminée. Jardin bouquetier avec légumes anciens et pièce d'eau. Les bâtiments agricoles sont antérieurs au XIXe siècle.  Construit en brique et pierre, le château Hybouville date de 1635. Le manoir conserve notamment une corniche sculptée et une lucarne surmontée d'un fronton sur la façade principale. Il fut construit pour la famille Gally anoblie par Henri IV au siège de Dieppe. La propriété appartenait au milieu du XXe siècle à M. Gally d'Hybouville.\nÉléments protégés MH : les façades et les toitures ; la cuisine voûtée : inscription par arrêté du 28 juillet 1972. Le château en totalité ; les façades et les toitures des bâtiments annexes en retour d'équerre au nord ; les façades et toitures du pavillon sud ; le pavillon nord en totalité ; la grange et le four à pain en totalité ; l'enclos, la cour d'honneur et le jardin potager avec leurs murs de clôture : inscription par arrêté du 11 mai 2006.","architecture":"HERBOUVILLE, le château d'Herbouville date des XVIe et XVIIe siècles, en brique et grès avec ses 2 pavillons d'entrée. Il est inscrit partiellement aux M.H. depuis le 5.11.2006. Ses éléments protégés sont les façades, les toitures, la cuisine voûtée inscrite au  MH le 28 juillet 1972, le château d'Herbouville dans sa totalité, les façades et toitures des bâtiments annexes en retour d'équerre au nord, les façades et toitures du pavillon Sud, le pavillon Nord en totalité, la grange et le four à pain en totalitén l'enclos, la cour d'honneur et le jardin potager avec leurs murs de clôture, sont inscrits aux M.H. le 11 mai 2006. Le château d'Herbouville est ouvert au public,  La visite est toujours guidée, en individuel et en groupe.                                                                           BOSC LE COMTE i'édifice est situé route de Luneray, à laquelle le pignon de l'aile gauche est attenant, à Saint-Pierre-le-Vieux, au centre du hameau de Bosc-le-Comte. Le château actuel est daté de la fin du XVIIIe siècle et bâti sur l'emplacement d'un édifice antérieur. Il sert de pavillon de chasse.Il est acquis par une famille d'industriels après la Révolution française. La façade et la toiture sont inscrites au titre des monuments historiques le 23 juillet 1970. L'édifice est construit en grès, briques, pans de bois et plâtre.","habitants":"Famille Gally  d'Hybouville\"","divers":"Deux châteaux dans cet article; Herbouville grav-1 et Bosc le Comte grav-2.                                                                           Herbouville  GPS : 49° 51' 04\" Nord, 0° 52' 24\" Est","gps":"49° 51' 04\" Nord, 0° 52' 24\" Est","images":["../image/image_76/76_Herbouville_1.jpg","../image/image_76/76_Herbouville_2.jpg"]},"Consult_chateau_formulairedf38":{"id":"Consult_chateau_formulairedf38","dept":"76","canton":"Fécamp","commune":"Colleville","nom":"Hougerville","type":"Château","periode":"XII-XVI","histoire":"HOUGERVILLE  Le château dHougerville fut édifié au XIIe siècle. Le bâtiment tel que lon peut lobserver appartenait à Simon  Halcrost Hougerville  et revient au XVe siècle à  la famille Martel, au décès du dernier des Martel, Hougerville revient à Marguerite de Vassy mariée à Louis Thézart leur fils  René le cède à en 1535  le fief par Nicolas le Vanier                                                                            aujourdhui date du XVIe siècle. lL'héritière d'hougerville et d'Ancreteville à la mort de son frère Elisabeth  Vanier est depuis 1668 l'épouse de Louis de Canivet protestant  s'établira en Hollande en 1680. Jean-Philippe de Canivet, petit-fils  de Louis et d'Elisabeth n'aura que des filles de son mariage avec Marie-Madeleine de Brossard et c'est à la quatrième, Anne -Esther, mariée avec Isaac-Antoine Dumont seigneur de Bostaquet et de la Fontelaye que reviendra Hougerville. Son fils Issac-Antoine-Auguste, marquis de Lamberville émmigre mais de retour pour combatre sous les ordres de son neveu, chef chouan  Louis de Frotté s'éteint en 1847 , deux ans après, Hougerville est cédé à Auguste le Ber ancètre direct  du propriétaire actuel.","architecture":"HOUGERVILLE, de plan rectangulaire, Le château d'Hougerville actuel date du XVIe siècle. Il fut occupé par une communauté protestante pendant les guerres de religion. La grange située dans la cour du château servit de temple jusqu'à la révocation de l'Edit de Nantes, en 1685. Le château d'Hougerville  possède une architecture extérieure, typique de la Renaissance avec des fenêtres à meneaux surmonté darc en accolade. L'originalité du bâtiment réside dans l'association de l'architecture Renaissance à l'architecture Normande : on constate l'utilisation du pan de bois et de la brique de Saint-Jean, que l'on retrouve dans l'habitat traditionnel cauchois. On remarque aussi la présence de douves et de petits pavillons datant du XVIIe siècle, placés près de l'entrée principale.","habitants":"Famille Martel. Et de Jean-Philippe de Canivet,\"","divers":"Hougerville  GPS : 49° 44' 59\" Nord, 0° 27' 08\" Est","gps":"49° 44' 59\" Nord, 0° 27' 08\" Est","images":["../image/image_76/76_Hougerville_1.jpg"]},"Consult_chateau_formulaire46bb":{"id":"Consult_chateau_formulaire46bb","dept":"76","canton":"Gournay-en-Bray","commune":"Dampierre en Bray","nom":"Huguenots","type":"Château","periode":"XIV","histoire":"HUGUENOTS,  situé au hameau de Beuvreuil, ce château, construit au XIVe siècle, est dit des Huguenots car au XVe siècle son propriétaire Jean le Cat, seigneur de Beuvreuil, y accueillait des calvinistes. Son petit-fils, Gilles le Cat, époux de Françoise Vadequarre, écuyer, était seigneur de Beuvreuil au XVIe siècle. Leur arrière petit-fils, Samuel le Cat était également seigneur de Beuvreuil.  Son origine remonte a Giroldus le Cat, écuyer qui vivait en 1118. En 1677, David de la Louel était seigneur de Beuvreuil. Ensuite le château a appartenu aux Sarous, aux Pont-carré, aux Sassetot, aux Sommesnil, aux Fumechon, il appartient aujourd'hui à M. Lefilleul.","architecture":"HUGUENOTS ,  le château est construit en pierre du pays et se compose d' un corps de logis carré long, flanqué à chacun de ses quatre angles d'une tourelle circulaire placée en encorbellement sur des contreforts énormes. Les façades, comme les pignons, sont soutenues par des contreforts gigantesques, ceux de chaque bout renferment deux cheminées circulaires dont une est double. Ce grand et austère bâtiment est encore éclairé par des fenêtres ogivales dont une a conservé ses meneaux de pierre. A droite et à gauche de ce castel sont de vieux bâtiments en ruine qui remontent au XIIIe siècle. Éléments protégés MH : le château dit des huguenots à Beuvreuil : classement par arrêté du 2 mai 1921.","habitants":"Famille de  Fumechon,\"","divers":"Huguenots à Dampierre en Bray","gps":"","images":["../image/image_76/76_Huguenots_1.jpg","../image/image_76/76_Huguenots_2.jpg","../image/image_76/76_Huguenots_3.jpg"]},"Consult_chateau_formulaire5ed8":{"id":"Consult_chateau_formulaire5ed8","dept":"76","canton":"Yvetot","commune":"Héricourt en Caux","nom":"Héricourt_en_Caux","type":"Château","periode":"XVI","histoire":"Trois châteaux dans cet article; Boscol, Plein Bosc et St-Denis                    BOSCOL,  construit au XVIe siècle a été agrandi au début du XVIIe siècle par la famille de Normanville, puis au XVIIIe siècle par Charlotte Desmares de Bellefosse et Charles Hébert de Beauvoir, à  l'extrémité d'une magnifique allée de hêtres d'un kilomètre, le château du Boscol a été construit au XVIe siècle, puis remanié au XVIIIe siècle. Propriété au début du XVIIIe siècle de Charles Hébert de Beauvoir, conseiller au parlement de Normandie. En 1998, le château était la possession de Mme Bernard Halliez et du marquis de Beauvoir.                                                                 PLAIN-BOSC à Etouteville 10 K.M.au sud est  Le château a été construit dans le quatrième quart du XVIe siècle, bel ensemble de brique à chaînages de calcaire sur soubassement de grès. Le logis, élevé sur sa motte, a très probablement succédé à un édifice plus ancien, seul le logis de ferme semble avoir été remanié au XVIIIe siècle. L'édifice de plan régulier, se compose d'un sous sol, un étage carré et un étage de comble, le gros-oeuvre en brique, calcaire, grès et silex, élévation à travées surmontée d'un toit à longs pans, croupe, toit conique et toit polygonal, recouverts d'ardoise. Typologie : cour fermée ; portail en maçonnerie ; mare ; talus plante ; colombier polygonal en maçonnerie ; silex appareillé ; briques moulurées ; décor de brique émaillée. Éléments protégés MH : les façades et les toitures du château ; la cheminée de la pièce située à gauche de l'entrée principale au rez-de-chaussée ; le mur d'enceinte avec ses deux porches d'entrée ; le pigeonnier : inscription par arrêté du 3 mai 1974.","architecture":"Le château ST-DENIS devient un préventorium au début du XXe siècle.\nLe château du PIVAL anciennement pension de famille, est aujourdhui un élevage de chiens et chats.                                                                             BOSCOL . Il fut restauré au XIXe siècle, et son parc planté d'alignements de hêtres. Éléments protégés MH : les façades et les toitures du château, de la chapelle et du colombier; les murs de clôture du parc avec les sauts de loup; pièces suivantes avec leur décor : le grand salon au rez-de-chaussée, la chambre Est et la chambre sud-ouest au premier étage de l'aile sud : inscription par arrêté du 23 février 1981.","habitants":"Charles Hébert de Beauvoir\"","divers":"trois châteaux dans cet article;  Boscol grav-1-2 et St-Denis grav-3  Plein Bosc grav-4     Boscol   49°  41' 18? N, 0° 42' 04? E","gps":"","images":["../image/image_76/76_H%c3%a9ricourt_en_Caux_1.jpg","../image/image_76/76_H%c3%a9ricourt_en_Caux_2.jpg","../image/image_76/76_H%c3%a9ricourt_en_Caux_3.jpg","../image/image_76/76_H%c3%a9ricourt_en_Caux_4.jpg"]},"Consult_chateau_formulaired5db":{"id":"Consult_chateau_formulaired5db","dept":"76","canton":"Notre-Dame-de-Gravenchon","commune":"Tourville","nom":"IFS_Tourville","type":"châteaux","periode":"XVI-XVII","histoire":"IFS-TOURVILLE   Le château des Grands Ifs a été construit entre la fin du XVIe siècle et le début du XXe sur l'ancien manoir des Ifs de la famille Hervieu, présente au XVe siècle en ce lieu. La famille Hervieu achètera nombre de terres autour du manoir puis du château dont on peut encore admirer la façade sud dans son état original datant de la Renaissance, faite d'un appareil de brique et de pierre blanche sculptée. Au milieu du XIXe siècle, le domaine est racheté par Pierre Dufresne qui va agrandir le château, lui rajoutant entre autres deux ailes. Le château et son domaine changent de propriétaires à la fin du XIXe siècle et c'est le baron Levavasseur qui l'entretient et l'embellit. Racheté voilà cinq ans par Yann et Carole Latourte, le château retrouve une nouvelle vie.","architecture":"IFS-TOURVILLE, le château actuel se compose d'une aile ancienne du XVIIe siècle et de deux ailes ajoutées au XIXe siècle par son propriétaire, Pierre Dufresne, perpendiculairement au château initial. L'aile du XVIIe siècle est pourvue d'un décor caractéristique de l'architecture nobiliaire de style Henri IV-Louis XIII. Son plan est très simple. C'est un bâtiment rectangulaire de 22 mètres de long sur 8 mètres de largeur flanqué à chaque angle de la façade principale de deux tourelles circulaires. L'aile du XIXe siècle est un pastiche d'architecture XVIIe siècle mais particulièrement réussi, les deux ailes formant une certaine unité.  Il est composé de deux tours rondes, mais a été très remanié au XIXe siècle et est entouré d'un parc paysager. Malheureusement il sera en partie abandonné à la fin du XXe siècle.","habitants":"Famille Hervieu\"","divers":"IFS_Tourville                                                         gps 49° 42' 04? N, 0° 23' 38? E","gps":"","images":["../image/image_76/76_IFS_Tourville_1.jpg","../image/image_76/76_IFS_Tourville_2.jpg"]},"Consult_chateau_formulaire485f":{"id":"Consult_chateau_formulaire485f","dept":"76","canton":"Luneray","commune":"Tôtes","nom":"Imbleville","type":"château","periode":"XV-XIX","histoire":"IMBLEVILLE, a été construit, en 1491, par Zanon de Dampierre  Philippe  fils de Zanon et de Marie  de Gouvys épouse Gilette Paisnel, fille de jean, seigneur de Boisguillaume, le fils,antoine s'allie à une Masquerel  sans postérité le Vivier est vendu en 1597 à Nicolas Baudry qui acheta quatre ans plus tard  le fief  d'Imbleville. Charles , fils et héritier de Nicolas meurt en 1651, le domaine sera transmit par les femmes aux Civille et aux Le Viguier avant de revenir toujours par alliance  à un Dampierre, en 1801, sa fille épouse le marquis de Bimorel et par alliance Imbleville passe aux Le Vaillant  de Folleville  qui le conserveront jusqu'en 1917, date de sa cession aux Saint-Rémy Mme Kourimsky, l'actuel propriétaire, est la fille du comte et de la comtesse de Boigne qui acquirent Imbleville en 1961.                                                                                                                        TOTES, le Château de Totes se situe face à l'Auberge du Cygne. La construction date du XIXe siècle.","architecture":"IMBLEVILLE, le château et les bâtiments alentour, disparates en apparence, constituent un ensemble architectural harmonieux. Le parc comprend de nombreux éléments, des pièces d'eau, des canaux et surtout des douves alimentées exclusivement par des eaux de source indépendantes de la rivière. À lorigine, la Saâne arrivait directement sur la face sud de la cour. Elle se divisait en deux bras qui défendaient le château. Au nord, quatre tours, dont deux subsistent, abritaient la herse et un pont-levis qui seul permettait laccès. Au nord, des bâtiments de service sélevaient entre la chapelle et le pont-levis. À lest, reliant létage du logis avec celui de la chapelle, il y avait une longue galerie supportée par des arcades en plein cintre ouvertes sur la cour. Cette galerie servait de nef au public qui y était admis le dimanche. Au sud, un long mur crénelé et une vaste tour (sud-ouest) ont été également abattus au XIXe siècle.\nDeux ailes carrées furent construites aux extrémités de lancien corps de logis. Entre 1850 et 1860, la Saâne qui, lors de ses crues, inondait les abords du château, fut détournée et les douves furent créées. Entre 1917 et 1961, dimportants travaux de réfection ont été exécutés par Madame de Saint-Rémy et son fils Gilbert, avec notamment la construction au pied de la colline boisée, d'un élégant escalier à double révolution provenant de lancien château des ducs dElbeuf.","habitants":"Famille Le Vaillant  de Folleville\"","divers":"Imbleville grav-1-2  GPS : 49° 43' 22,21\" Nord, 0° 57' 21,12\" Est                                                    Totes   grav -3-4   GPS : 49° 40' 46\" Nord, 1° 02' 52\" Est","gps":"49° 43' 22,21\" Nord, 0° 57' 21,12\" Est","images":["../image/image_76/76_Imbleville_1.jpg","../image/image_76/76_Imbleville_2.jpg","../image/image_76/76_Imbleville_3.jpg","../image/image_76/76_Imbleville_4.jpg"]},"Consult_chateau_formulaire71d8":{"id":"Consult_chateau_formulaire71d8","dept":"76","canton":"Saint-Valery-en-Caux","commune":"Ingouville","nom":"Ingouville","type":"châteaux","periode":"XV-XVI-XIX","histoire":"INGOUVILLE, comme Graville et Sanvic, c'était un village implanté à flanc de falaise, avec des terres sur les bancs herbeux de l'estuaire en contrebas et sur le plateau. Il était groupé autour de l'église paroissiale Saint-Michel attestée en 1240. Les bancs herbeux relevaient de la seigneurie de Graville, mais les habitants avaient des droits de pâturage sur eux. La création en 1517 du port, puis de la ville Françoise-de-Grâce se fait sur ces bancs herbeux. Le fondateur du Havre, Guyon Le Roy, amiral du Chillou achète alors les terres en marais des habitants de Graville. Il doit les restituer au seigneur de Graville en 1524 suite à un procès. Une route surélevée, la chaussée d'Ingouville, tracée à travers les marais relie la nouvelle ville au village. En 1584, le Lazaret Saint-Roch est fondée à l'ouest de la chaussée. En 1661, le couvent des pénitents est fondé au pied de la falaise au sud-ouest de l'église paroissiale.","architecture":"INGOUVILLE,  Huitième de fief mentionné au XVIe siècle, le château d'Ingouville est reconstruit dans le premier quart du XIXe siècle. Le logement et les parties agricoles édifiés au XVIIIe siècle. L'édifice se compose d'un étage carré, un étage de comble et un sous-sol, escalier dans-oeuvre, gros oeuvre en brique, calcaire, grès, appareil mixte, bois, pan de bois, torchis, enduit partiel et pierre de taille, élévation ordonnancée surmontée d'un toit à longs pans et croupe couverts d'ardoise. L'ensemble comprend également un parc, un logement et des parties agricoles.","habitants":"Famille de   Guyon Le Roy, amiral du Chillou\"","divers":"Ingouville à Ingouville","gps":"","images":["../image/image_76/76_Ingouville_1.jpg"]},"Consult_chateau_formulaire6e94":{"id":"Consult_chateau_formulaire6e94","dept":"76","canton":"Bezancourt","commune":"Bezancourt","nom":"Landel","type":"Château","periode":"XVIII","histoire":"LANDEL en Seine-Maritime, près de Gisors, le château du Landel a dabord été un relais pour les pèlerins sur le chemin de Saint-Jacques-de-Compostelle. La sérénité qui règne sur les lieux se prête en effet parfaitement au recueillement et au repos. Il devient ensuite la propriété de maîtres verriers jusquen 1870. Entre les 14e et 19e siècles, la forêt de Lyons et sa hêtraie exceptionnelle ont en effet contribué au développement dactivités industrielles utilisant le bois comme matière première: délicats objets en verre, miroirs dépoque, portraits des anciens propriétaires.  Au fil du temps, vos hôtes daujourdhui ont su restaurer et réaménager le château ainsi que ses 17 chambres dans le respect de ce précieux héritage.  A la fois maître des lieux et chef de cuisine, Yves Cardon vous invite à la table de son restaurant. Au cur du château, dans deux salles rivalisant délégance et de raffinement, dégustez une cuisine gourmande et savoureuse.","architecture":"LANDEL,  élégante bâtisse, le château du Landel, ancien relais de Saint-Jacques de Compostelle, est une demeure du XVIIIe siècle, propriété des Maîtres Verriers jusqu'en 1870. Un accueil chaleureux dans un cadre raffiné, pour un séjour où dépaysement rime avec détente. grande bâtisse sursoubassement à neuf travées sur deux niveaux et sérir de lucarnes sur comble avec fronton triagulaire et un occulus au centre, la bâtiie est accoléde part et autre depavillons de trois travées donun à un niveaux","habitants":"Famille d'Yves Cardon\"","divers":"Château de Landel en Bezancourt","gps":"","images":["../image/image_76/76_Landel_1.jpg"]},"Consult_chateau_formulaire8073":{"id":"Consult_chateau_formulaire8073","dept":"76","canton":"Barentin","commune":"St_Paër","nom":"Launay_St_Paër","type":"Châteaux","periode":"XV- XVIII","histoire":"Trois châteaux dans cet article; Launay, des Vieux et Matmut.                      LAUNAY  le château de Launay a été construit au début du XVIIe siècle pour Raoul Labbé, seigneur de la Motte, conseiller au Parlement de Normandie.  Launay a été construit, au début du XVIIIe siècle, pour Pierre-Robert Le Cornier de Cideville  En 1653, il est la propriété de Claude Fournier, écuyer. En 1701, le château fut ravagé par un incendie provoqué par la foudre. Il a été rebâti au début du XIIIe siècle en brique et pierre calcaire, par Pierre Robert le Cornier, seigneur de Cideville, conseiller au Parlement de Normandie. A la fin du XVIIIe siècle, le château passe à la famille Le Marcis, protestant, et riches manufacturiers de Bolbec. L'édifice est racheté par Pierre-Louis Baudoin, Conseiller du Roi, syndic des Consuls. La propriété passe au XIXe siècle aux Baudoin de Joigny et font de Launay un centre de la vie mondaine.  Éléments protégés MH : le château : inscription par arrêté du 2 février 1932. Le parc et les bâtiments anciens qu'il renferme, les granges et les communs : inscription par arrêté du 12 février 1948.                                                                                                                        DES VIEUX, château-fort construit  au XVe siècle ; remanié dans la première moitié du XVIIe siècle et également au XVIIIe siècle. Le logis de ferme et le colombier circulaire furent édifiés au XVIIIe siècle. Le bâtiment, de plan symétrique, se compose d'un étage carré et un étage de comble, le gros oeuvre en calcaire, pierre de taille, pierre, brique, pierre avec brique en remplissage, pan de bois et enduit partiel, élévation à travées surmontée de toit à longs pans, croupe et toit conique, recouverts d'ardoises et de tuiles plates. L'ensemble comprend un enclos, un parc, des communs, des parties agricoles et un four à pain.","architecture":"A cinq K.M. à l'est le château MATMUT ou Breton à St-Pierre  de Varengeville  Le Centre d'Art Contemporain de la Matmut appelé avant le château Le Breton, dû à l'architecte Lucien Lefort, achevé en 1898. La construction du centre d'Art Contemporain de la Matmut date du XVIIe siècle est érigé sur lancien fief de Varengeville, appartenant à labbaye de Jumièges. En 1887 la propriété a appartenu à Gaston Le Breton (1945-1920), Directeur des Musées Départementaux (musée des Antiquités, musée de la Céramique et musée des Beaux-Arts de Rouen). Aujourd'hui, le Centre dArt Contemporain de la Matmut propose 4 expositions d'art contemporain, par an. La galerie de 400 m² est un lieu dédié aux expositions temporaires dartistes émergents ou confirmés. Laccès est libre et ouvert à tous.","habitants":"Launay;   Famille de Raoul Labbé,             Matmut famille de Gaston Le Breton\"","divers":"Trois châteaux dans cet article; Launay grav -1-2, des vieux grav-5 et Matmut grav-3-4.       Launay GPS : 49° 31' 02\" Nord, 0° 52' 48\" Est                                              Matmut GPS : 49° 30' 08\" Nord, 0° 56' 01\" Est","gps":"49° 31' 02\" Nord, 0° 52' 48\" Est","images":["../image/image_76/76_Launay_St_Pa%c3%abr_1.jpg","../image/image_76/76_Launay_St_Pa%c3%abr_2.jpg","../image/image_76/76_Launay_St_Pa%c3%abr_3.jpg","../image/image_76/76_Launay_St_Pa%c3%abr_4.jpg","../image/image_76/76_Launay_St_Pa%c3%abr_5.jpg"]},"Consult_chateau_formulaire5e4c":{"id":"Consult_chateau_formulaire5e4c","dept":"76","canton":"Bolbec","commune":"Lillebonne","nom":"Lillebonne","type":"Châteaux","periode":"XIII-XV","histoire":"Trois chateaux dans cet article; Lillebonne, Marefosse et St-Jean de Folleville,  LILLEBONNE, ce château ducal a été fondé par Guillaume le Conquérant. Le donjon a été réparé aux XIVe et XVe siècles. La tour octogonale date de la fin du XIIIe ou du début du XIVe siècle. La tour du Chartier a été transformée au XIXe siècle, le corps de logis a été démoli, une maison de maître a été construite dans l'enceinte du château par Théodore Huchon, vers 1870. Plus de détails voir le château fort Notre-Dame à Lillebonne.le château, après avoir été donné au comte de Boulogne, Renaud de Dammartin, il revient à Philippe Auguste. C'est ce dernier qui fait construire le gros donjon cylindrique, son fossé, avec la chemise. Au XIIIe siècle, la forteresse est entre les mains de la famille d'Harcourt, qui après la guerre de Cent Ans modifia le dernier niveau du donjon en y installant une plate-forme pour l'artillerie.Le château sera ensuite laissé à l'abandon, et en 1760, le plomb de la terrasse du donjon est vendu provoquant l'effondrement de la voûte terminale à la suite des infiltrations d'eau. Les bâtiments servent de carrières de pierre, les courtines rasées au niveau de la cour intérieure, les tours abattues. En 1869, le donjon est restauré, et une maison d'habitation moderne est construite sur la courtine nord.  Éléments protégés MH : le donjon, le sol des parcelles avec les vestiges archéologiques qu'elles contiennent et totalité de la tour dite du Chartrier, de la tour octogonale et de l'enceinte: classement par arrêté du 7 mai 1990.                                                                                                                                               MAREFOSSE à la Remué, un château est mentionné en 1715. Le fief de Marefosse est érigé en 1787. Colombier du XVIIIe siècle avec lanternon, lequel était en ruines en 1969, et détruit lors de la restauration. L'orangerie et le logis sont édifiés au XVIIIe siècle. Grange de la deuxième moitié du XIXe siècle. Sur le cadastre de 1822, le corps de logis figure avec deux ailes (détruites), une cour d'honneur délimitée par l'orangerie, un bâtiment (peut-être une remise et des écuries), un édifice circulaire symétrique au colombier, lequel a également disparu. La propriété chevauche deux communes. Les étables bâties dans la deuxième moitié du XIXe siècle sont situées sur la commune de La Cerlangue.","architecture":"LILLEBONNE, date du Xe, XIe, XIIIe et XIX siècle. Ce château ducal s'est implanté à l'angle de l'ancienne cité gallo-romaine. Il ne demeure aujourd'hui qu'une tour maîtresse de Philippe Auguste, qui fut modifiée, au XVe siècle, dans ses parties hautes. La tour octogonale date de la fin du XIIIe siècle, attribuée à Jean II d'Harcourt. La tour du Chartrier du XIIIe siècle a été transformée vers 1870. Ce magnifique logis roman, qui datait probablement d'Henri II, a été définitivement détruit, en 1832, et une maison de maître a été construite dans l'enceinte du château, par Théodore Huchon, vers 1870, pour le propriétaire Pierre Gustave Langer, sur le modèle du Château des Aygues bâti à Étretat, construit quelques années auparavant, pour Amédée Boyer, le propriétaire de l'Eau de Mélisse. Le Château de Lillebonne est privé, fermé au public. C'est une propriété appartenant à la Commune de Lillebonne.                                                                                            ST JEAN de FOLLEVILLE village à 3K.M à l'ouest Le château a été construit au XVIIIe siècle pour la famille de Bellegarde, sur des caves voûtées plus anciennes, il a été agrandi au XIXe siècle. Les écuries du haras ont été construites au début du XXe siècle, au cours des déblaiements, pour construire le haras, ont été découverts une colonne romane et des sarcophages déposés dans l'orangerie. Le colombier a été transformé en logis au XXe siècle. Logis en brique avec chaînes calcaire et corps central enduit, les écuries sont en assises alternées de calcaire et brique.","habitants":"lillebonne famille de Renaud de Dammartin,\"","divers":"trois chateaux dans cet article Lillebonne grav--1-2-3, Marelfosse grav-4 et St-Jean de Folleville grav-5-6.                                             Lillebonne GPS : 49° 31' 8,92\" Nord, 0° 32' 20,81\" Est","gps":"49° 31' 8,92\" Nord, 0° 32' 20,81\" Est","images":["../image/image_76/76_Lillebonne_1.jpg","../image/image_76/76_Lillebonne_2.jpg","../image/image_76/76_Lillebonne_3.jpg","../image/image_76/76_Lillebonne_4.jpg","../image/image_76/76_Lillebonne_5.jpg","../image/image_76/76_Lillebonne_6.jpg"]},"Consult_chateau_formulaired2d7-2":{"id":"Consult_chateau_formulaired2d7-2","dept":"76","canton":"Fécamp","commune":"Limpiville","nom":"Limpiville_Vaudroque","type":"Châteaux","periode":"XVII-XIX","histoire":"LIMPIVILLE dit de Vaudroc, il est construit sur les fondations d'un prieuré pourvu d'une petite chapelle, appartenant aux moines bénédictins de Fécamp. Ce prieuré est confirmé à lAbbaye de Fécamp par la charte de 1026 de mon ancêtre le duc de Normandie Richard II dit l'Irrascible. le château de Limpiville fut construit au début du XVIIe siècle puis remanié au XIXe siècle. De magnifiques jardins à la française complètent l'agrément de cette belle demeure. Limpiville est l'uvre des Dyel de Vaudrocque, gouverneurs de la Martinique et ancêtres de l'Impératrice Joséphine Tascher de La Pagerie.  En 1806, la propriété est vendue. En 1820, elle revient en héritage à la Famille Ferrère, puis au marquis de Vasselot. Acquis par le marquis et la marquise de Lillers en 1958, le domaine et plus particulièrement le parc font l'objet d'une restauration soignée. La propriété appartenait au milieu du XXe siècle au marquis de Lillers. Lintérieur du château est secret tout comme l'histoire de cette riche famille de propriétaires, dit-on parents des Grimaldi de Monaco et descendant de la princesse de Polignac.  Éléments protégés MH : le château de Limpiville en totalité : inscription par arrêté du 7 octobre 1931  Voir le château de Vaudroc.","architecture":"VAUDROC, le corps central, reconstruit au XVIIe siècle, est flanqué au XVIIIe siècle de deux pavillons par le marquis Louis François Dyel de Vaudrocque.  Passée la cour dhonneur où se trouve la chapelle, le parc souvre sur une imposante perspective à la française. Il est bordé dune haie de tilleuls taillés de 10m de hauteur et est composé de deux pelouses, dun grand bassin, dune double rangée de buis et de deux vases Médicis sculptés. Une basse-cour plantée de pommiers à cidre, est surplombée dun colombier, dune grange et dun manège en bois. Dans le jardin inférieur subsiste une ancienne orangerie. Dans le bosquet de charmes, face au balcon, en surplomb, se trouvent deux statues, dont les originaux sont au Louvre dans le pavillon de Flore.\n Ancien monastère bénédictin, flanqué de pavillons extérieurs au XVIIIe siècle. Restauré selon les plans du XVIIIe siècle.","habitants":"Limpiville; Famille Ferrère et le marquis Louis François Dyel de Vaudrocque\"","divers":"Vaudroc GPS : 49° 41' 01\" Nord, 0° 30' 04\" Est","gps":"49° 41' 01\" Nord, 0° 30' 04\" Est","images":["../image/image_76/76_Limpiville_Vaudroque_1.jpg","../image/image_76/76_Limpiville_Vaudroque_2.jpg"]},"Consult_chateau_formulaire566d":{"id":"Consult_chateau_formulaire566d","dept":"76","canton":"Notre-Dame-de-Bondeville","commune":"Limésy","nom":"Limésy","type":"Châteaux","periode":"XVII-XVIII","histoire":"cinq châteaux dans cet article de Limezy : Bagneux, Etennemare, Motteville, et Grosfy.                                                                                                                    BAGNEUX, siège du très ancien fief de Frontebosc. Logis construit au XVIIIe siècle, détruit depuis quelques années. L'ensemble des autres bâtiments (l'enclos, la cour, le jardin, le parc, le logement, l'écurie, la charretterie. pour la plupart remontant au XVIIIe siècle, remaniés au XIXe siècle, subsiste en partie. Typologie : portail en maçonnerie ; verger enclos ; silex appareillé ; décor de silex.                                                                                                                           A 10 k.M à l'ouest de Limézy  MOTTEVILLE   En 1574, la terre de Motteville fut démembrée de la baronnie d'Esneval et érigée en quart de fief en faveur de la famille Langlois, dont un des membres fut premier président de la cour des comptes de Rouen, et fit construire l'ensemble du château dans le premier quart du XVIIe siècle et de l'église. L'édifice de plan symétrique se compose d'un sous-sol, un étage carré et un étage en surcroît, gros oeuvre en brique, calcaire et grès, élévation à travées surmontée de toit à longs pans et croupe, recouverts d'ardoise. L'ensemble comprend un parc, un logement, des communs, un colombier, une orangerie et une glacière.","architecture":"ETENNEMARE, siège d'un très ancien fief, le château actuel a été construit au début du XVIIIe siècle. L'édifice, de plan régulier, se compose d'un sous-sol, de deux étages carrés et d'un étage en surcroît, le gros oeuvre en brique, calcaire et grès, élévation à travées, surmontée d'un toit à longs pans, croupe, toit à longs pans brisés, toit en pavillon et de hauts toit conique, recouverts d'ardoise, coupés par des lucarnes alternant avec des oeils-de-boeuf. L'ensemble comprend deux ailes en équerre et également un parc, des parties agricoles, un logement, des communs, un enclos et un pigeonnier circulaire. aujourd'hui Institut médico-pédagogique de Rouen.                                                                                                             GROSFY  à Hugleville, l'édifice est composé dun corps de logis central construit au XVIIIe siècle ) en brique de saint Jean sur la façade. La demeure est flanquée de deux ailes construites en 1854 et 1860. Il sagissait, à lorigine dun pavillon de chasse. Ce château fait 550 m² de surface habitable, et est éclairé de 69 fenêtres. Lentrée se fait sur une allée de tilleuls. Cet endroit reflète tout à fait lambiance des oeuvres de Guy De Maupassant, cette Normandie du XIXe siècle. Dans un parc de 5 ha d'arbres bi-centenaires le château ainsi que sa ferme respirent l'ambiance des maisons de famille d'antan.","habitants":"Motteville; famille Langlois\"","divers":"cinq châteaux dans cet article Bagneux-6, Etennemare grav 2-3, Motteville-grav-5,   et Grosly-grav-4. gps 49° 36' 50? nord, 0° 55' 36? est","gps":"","images":["../image/image_76/76_Lim%c3%a9sy_1.jpg","../image/image_76/76_Lim%c3%a9sy_2.jpg","../image/image_76/76_Lim%c3%a9sy_3.jpg","../image/image_76/76_Lim%c3%a9sy_4.jpg","../image/image_76/76_Lim%c3%a9sy_5.jpg","../image/image_76/76_Lim%c3%a9sy_6.jpg"]},"Consult_chateau_formulaireb896":{"id":"Consult_chateau_formulaireb896","dept":"76","canton":"Port-Jérôme-sur-Seine","commune":"Lintot","nom":"Lintot","type":"château","periode":"XV","histoire":"LINTOT, en 1143 est mentionnée la Haie de Lintot donnée à l'abbaye du Valasse, toponyme qui témoigne de l'existence d'un parc de chasse qui comprenait encore au XVIIIe siècle plus de deux lieues en terre et bois. L'église Saint-Samson est mentionnée en 1225. Le village comptait 80 paroissiens en 1245. Les fiefs de Lintot (correspondant au chêteau), de la Haie de Lintot (correspondant au parc), et de la Moissonnière relèvent directement du roi (aveux en 1484). Le plein fief de Lintot, relevant du roi appartenait au XVe siècle à la famille de Régneville. En 1503, il appartient à Thomas de la Haye au droit de sa femme, fille de Louis d'Erneville. Il subsiste une porte d'un logis bâti au XVIe siècle, vraisemblablement détruit pendant les guerres de religion, Pierre de Lintot ayant embrassé la Réforme. Le château actuel a été reconstruit au début du XVIIe siècle pour Isaac de Lintot.","architecture":"LINTOT,  a eu son château et ses seigneurs. De leur demeure, il ne reste plus que le corps de ferme, solide construction du XVIIe siècle et à l'entrée, ce monumental porche en pierre qui témoigne de la richesse d'antan de ces lieux. Celui-ci porte un très bel écusson soutenu par deux animaux héraldiques.  La grange avec abri à manège a été élevée au milieu du XIXe siècle. Le pigeonnier figurant sur le cadastre de 1822 est détruit. Logis en brique et pierre. Portail en pierre de taille calcaire. Grange à manège en assises alternées de silex et brique et pan de bois. Abri à manège couvert en chaume.","habitants":"famille de Régneville\"","divers":"domaine de Lintot","gps":"","images":["../image/image_76/76_Lintot_1.jpg","../image/image_76/76_Lintot_2.jpg"]},"Consult_chateau_formulairefa08":{"id":"Consult_chateau_formulairefa08","dept":"76","canton":"Gournay-en-Bray","commune":"Ferrières en Bray","nom":"Manais","type":"CHâteaux","periode":"XVII-","histoire":"Deux châteaux dans cet article , Manais  et Folie,                                                               MANAIS,  le château du Manais a été bâti en 1730. Son propriétaire actuel est Mr de Mesnais. Le château se compose de trois étages. Son nom provient du terme manoir en normand.  Manais est habité par ses propriétaires qui en ont fait leur résidence principale.","architecture":"FOLIE  Le château de la Folie de 1881 de Ferrières est une « folie » architecturale, cest-à-dire un bâtiment quelque peu extravagant par rapport aux autres habitations de la même époque. Il date de 1881 et son histoire reste entourée de mystères ! Au XXe siècle, il s'appelait le « chateau du Mont Grimpet » comme témoignent plusieurs cartes postales anciennes. Il fait donc partie du patrimoine du village et fait actuellement lobjet dune demande (en cours) de classement auprès des monuments historiques. Parmi les constructions remarquables de Ferrières-en-Bray, cest la seule habitation privée qui est ouverte au public : en effet, le château de la Folie accueille toutes les semaines deux associations : « Peindre ensemble » qui est un atelier ouvert pour les peintres amateurs débutants ou confirmés et « Club Sciences et Techniques » qui rassemble les passionnés de sciences et de techniques. Le château est également le lieu où se déroulent chaque année des manifestations culturelles gratuites comme la « Nuit des étoiles », la « Fête de la science » ainsi que des conférences ou expositions.Théo et Marie-Christine Priniotakis ont acheté le château de la Folie à Ferrières-en-Bray il y a déjà quelques années. Vieux de 140 ans, lédifice na rien perdu du charme de sa jeunesse. Cependant, il nest pas exactement celui quil était en 1880 et même un peu plus tard.","habitants":"Mr de Mesnais\"","divers":"Deux châteaux dans cet article , Manais  et Folie,  Manais-grav-1              Folie-2-3.                                                 Manais  GPS : 49° 29' 10\" Nord, 1° 45' 32\" Est","gps":"49° 29' 10\" Nord, 1° 45' 32\" Est","images":["../image/image_76/76_Manais_1.jpg","../image/image_76/76_Manais_2.jpg","../image/image_76/76_Manais_3.jpg"]},"Consult_chateau_formulaire70c1":{"id":"Consult_chateau_formulaire70c1","dept":"76","canton":"Canteleu","commune":"Sahurs","nom":"Marbeuf","type":"Manoir","periode":"XV-XVI","histoire":"deux châteaux dans cet article; manoir de Marbeuf et Soquence.    MANOIR DE MARBEUF,  l'exposition au sud, la fertilité des terrains alluvionnaires, les riches pâturages irrigués tout au long de l'année, la forêt toute proche est depuis toujours voué Sahurs à l'agriculture : vergers, élevages, etc. Ce village, qui s'étale sur 6 kilomètres, contraste avec La Bouille, sur l'autre rive de la Seine, à l'ombre, ramassée sur elle-même au pied des falaises et dont l'activité est essentiellement tournée vers le fleuve. Dès la Renaissance, la luxuriance de la nature attire à Sahurs seigneurs et bourgeois. En 1637, Anne d'Autriche est venue prier en la chapelle Notre-Dame-de-la Paix. En 1940, les travaux d'élargissement du méandre, trop étroit à cet endroit pour la navigation remontant vers Rouen, occasionnent la perte de vingt-deux maisons, dont quatre fermes. Le café du Passage disparaît, et la cale du bac est déplacée en amont. Sahurs reste aujourd'hui encore un petit bourg à caractère rural.","architecture":"MANOIR DE MARBEUF  1515 Façade nord Pierre de Caumont et pan de bois, Rue de Seine Louis de Brézé, grand sénéchal de Normandie, et à son époque, la belle Diane de Poitiers, qui deviendra par la suite la favorite du roi Henri II, apprécient les chevauchées en forêt de Roumare. Le Sénéchal fait bâtir cette demeure, où, après les parties de chasse, il se plaît à recevoir ses amis. Le poète Pierre de Marbeuf et sa femme sont représentés en médaillon. Le manoir possède une des rares granges surélevées de la boucle de Roumare.","habitants":"Marboeuf; Famille de  Louis de Brézé\"","divers":"deux châteaux dans cet article; manoir de Marbeuf  grav-1-2-3-4","gps":"","images":["../image/image_76/76_Marbeuf_1.jpg","../image/image_76/76_Marbeuf_2.jpg","../image/image_76/76_Marbeuf_3.jpg","../image/image_76/76_Marbeuf_4.jpg"]},"Consult_chateau_formulaire85b6":{"id":"Consult_chateau_formulaire85b6","dept":"76","canton":"Le Mesnil-Esnard","commune":"Martainville -Epreville","nom":"Martainville","type":"Châteaux","periode":"XV-XVI","histoire":"Deux châteaux dans cet article, Martainville et Mont-Perreux MARTAINVILLE, le constructeur  Jacques Le Pelletier, fils d'une riche famille de commerçants rouennais et lui même armateur acquiert en 1481 le fief de Martainville. Il entreprend durant une dizaine d'années la construction du château. Jacques de Martainville meurt vers 1510, sans fils, son neveu Jacques, second du nom, hérite de toute sa fortune. Nommé également vicomte de l'eau, il entreprend de transformer radicalement le château de son oncle. Jacques II fait combler les fossés, établir l'enceinte défensive ponctuée de tours, élargir les fenêtres, élever les toitures et fait surtout remanier la façade principale, le pont-levis enlevé, cède la place à un portail couronné d'arcs concaves avec feuillages. Au-dessus, la loggia à encorbellement correspond à la chapelle; elle est caractéristique de la fin du style gothique. L'art des Flandres se fait sentir dans ce qui est un chef-duvre au château de Martainville à savoir les souches des cheminées extérieures qui ne comportent pas une pierre malgré un décor gothique extraordinaire. Elles sont toutes différentes dans leur composition d'arcs, de contreforts, de bandeaux.  Mais au XVIe siècle, les troubles graves qui déchirent la région stoppent les bâtisseurs. Vers 1590, Henri IV se rendant à Fontaine le Bourg passe par Martainville et chasse les troupes du duc de Parme. Le dernier des Martainville, mort en 1757 sans héritier, le château passe entre différentes familles.  c'est alors que l'État en 1906 le rachète mais tout le mobilier du château est déjà dispersé. Le conseil général, à partir de 1955, fait procéder à la restauration de la demeure pour installer un musée en 1965.  il abrite le musée départemental des Traditions et Arts normands, ces collections ont un caractère exceptionnel et retracent l'évolution stylistique du mobilier régional du XVe au XIXe siècle.","architecture":"MARTAINVILLE, la date de 1485 gravée sur la clef d'une fenêtre de la tour sud précise l'époque exacte des travaux. C'est un château-fort flanqué de quatre tours et d'un pont-levis, dont un chemin de ronde mâchicoulis couronne les murailles. Construit en briques, cuites sur place, et en pierres blanches venues des carrières de Vernon, on relève sur l'appareillage une savante inclusion décorative de briques vernissées noires disposées en cur, en croix et en losanges. Les pièces de Haute époque, notamment des XVe et XVIe siècles sont nombreuses et de grande qualité. La présentation des régions de Haute Normandie, sous l'aspect d'intérieurs de fermes avec les meubles, ustensiles et objets de la vie quotidienne au XIXe siècle.  Éléments protégés MH : le château : classement par liste de 1889. La ferme du château : le puits avec sa couverture ; le colombier ; les couvertures et les façades des bâtiments entourant la cour de la ferme ; l: classement par arrêté du 4 juin 1931.: inscription par arrêté du 7 octobre 1997.                                                                                                               A l'ouest à 10 K.M.  MONT-PERREUX  à St-Martin du Vivier. Construction  dans la première moitié du XVIIe siècle, puis remaniements dans la deuxième moitié du XVIIIe siècle; la façade ouest porte la date 1781. Le bâtiment de plan régulier, se compose d'un étage carré et étage de comble, gros-oeuvre en brique, calcaire, brique avec pierre en remplissage et enduit partiel, élévation ordonnancée surmontée de toit à longs pans brisés, croupe, pignon couvert et découvert et toit conique, recouverts d'ardoises et de tuiles plates.","habitants":"Jacques de Martainville \"","divers":"Deux châteaux dans cet article, Martainville grav 1 à 5 et Mont-Perreux  grav-6              GPS : 49° 27' 30,6\" Nord, 1° 17' 37,32\" Est","gps":"49° 27' 30,6\" Nord, 1° 17' 37,32\" Est","images":["../image/image_76/76_Martainville_1.jpg","../image/image_76/76_Martainville_2.jpg","../image/image_76/76_Martainville_3.jpg","../image/image_76/76_Martainville_4.jpg","../image/image_76/76_Martainville_5.jpg","../image/image_76/76_Martainville_6.jpg"]},"Consult_chateau_formulaire86d6":{"id":"Consult_chateau_formulaire86d6","dept":"76","canton":"Barentin","commune":"Mauny","nom":"Mauny","type":"Châteaux","periode":"XV-XVI-XVII","histoire":"Deux châteaux dans cet article; Mauny et Val des Leux.                         MAUNY, le château de Mauny se compose, aujourd'hui, de 3 parties qui datent du XIIIe, du XVe et du XXe siècle, la partie où nous vivons », expliquent Pascale et Joël Caillibote, les actuels propriétaires du château. Ce sont les Familles Gauthier de Mauny, puis les Poulin de Mauny, qui ont bâti cette demeure. La Famille Caillibote était fermière à Mauny et ce sont les parents de Joël, Joseph et Marie Caillibote, qui ont racheté le château de Mauny, en 1977. Lorsque mes parents ont entrepris de le rénover, on s'est aperçu qu'il était en mauvais état. Cela a nécessité de gros travaux de restauration. A l'époque, les douves faisaient encore le tour du château avant qu'elles soient bouchées en partie. « Je me souviens de la dernière propriétaire, la Comtesse Hervé de La Fontaine-Follin qui a même fait de la barque avec une de mes tantes sur ces douves. » Pascale et Joël ont des tas de projets de restauration. D'abord, ils souhaiteraient rénover la chapelle dont les murs sont encore debout et réinstaller son clocheton. « Mais voilà, on n'arrête pas de taper dans les cailloux depuis que mes parents ont acheté Mauny ! » Ils admettent tout de même que c'est un privilège d'habiter un tel endroit chargé d'histoire, au calme et en pleine nature.                                                                                                                                                                   VAL Des LEUX ,le fief relevait du marquisat de Mauny. Au XIXe, le château est profondément remanié. Pour tracer la route actuelle, on abat la chapelle, les tourelles et le pavillon d'entrée.  Une vingtaine cercueils de l'époque franque furent par ailleurs détruits en 1867 chez M. Decamps au grand dam des Antiquaires de Normandie. Ce même Decamps fit élever la stèle du cimetière de Mauny à la mémoire de Morand, ancien marin d'Empire, avec qui il était lié d'amitié.","architecture":"MAUNY, le château a été construit dans le premier quart du XVIIe siècle, à l'emplacement d'un château fort médiéval ; le colombier édifié dans le premier quart du XVIe siècle porte les armes de Diane de Poitiers et Louis de Brézé. Reprise de l'aile sud et du vestibule, et construction du porche dans la deuxième moitié du XVIIIe siècle ; l'escalier porte la date 1780. L'édifice de plan régulier se compose d'un étage carré, gros oeuvre en pierre de taille, calcaire, bossage, moellon, enduit partiel et brique, élévation ordonnancée surmontée d'un toit à longs pans, et toit polygonal, recouverts d'ardoise et de tuiles plates. L'ensemble comprend, une glacière, des communs, une terrasse en terre-plein, un enclos, un parc et un colombier polygonal.                        VAL Des LEUX  Trois périodes marquent sa construction en 1668 : le XVIIe siècle, le 3e quart du XVIIe siècle et le XIXe siècle. Le château du Val des Leux est inscrit aux M.H. depuis 1975. Le gros oeuvre est composé de calcaire et de briques, et fermé au Public. Le château du Val-des-Leux est attesté au XVIIe siècle. Lucas Boullays fonda en ces lieux une chapelle en 1668.","habitants":"Mauny;Famille Caillibote                             Val des leux;  M. Decamps\"","divers":"Deux châteaux dans cet article; Mauny grav-1-2-3 et Val des Leux grav-4.                                                               Mauny   GPS : 49° 23' 06\" Nord, 0° 53' 09\" Est                                                       Val  GPS : 49° 23' 06\" Nord, 0° 53' 09\" Est","gps":"49° 23' 06\" Nord, 0° 53' 09\" Est","images":["../image/image_76/76_Mauny_1.jpg","../image/image_76/76_Mauny_2.jpg","../image/image_76/76_Mauny_3.jpg","../image/image_76/76_Mauny_4.jpg"]},"Consult_chateau_formulaire9541":{"id":"Consult_chateau_formulaire9541","dept":"76","canton":"Gournay-en-Bray","commune":"Brémontier Merval","nom":"Merval","type":"Château","periode":"XVII","histoire":"MERVAL, en 1575 les terres de Merval passe par alliance au Bucy. leur petite-fille Nicole dame de st-Aubinet-Merval \"pouse en 1575 Claude de Bucy  écuyer, au décès de Louis de Bucy en 1652 laisse Merval à  l'ainé de ses fils, Jean qui s'endéter pour désinterresser son frère Louis. acquis par la famille l'Héritier, la terre de Merval passe à une famille de négociants de Rouen les Le Boucher avant d'être vendue en 1750 à Etienne Marye écuyer conseiller secrétaire du roi, il sera maire de Rouen en 1755, son fils Georges receveur des décimes du diocèsede de Rouen, c'est lui qui cède en 1806   les terres de Merval et d'autres domaines au colonel  Rodolphe de Vachon de Belmont qui mourat en 1814 en défendant Reims son épouse Clémentine de Choiseul-Gouffier se défait en 1816 de Merval au profit d'Ange-François du Barry, Jean-Felix fils d'Ange-François épouse Emilia de Romeuf, il meurt en 1858  légant  à son fils Alexandre conseiller général du canton de Gournay décède en 1881 sans postérité, il cède à son épouse Marie-Henriette de Captot celle-ci en 1890 convole avec avec le comte d'Elva qui loue le château à madame Lebey, dernière d'une longue lignée de propriétaires privés, qui  s'en porte acquéreur en 1920. En 1944, elle décède sans enfants, elle avait pris soin dans son testament de déshériter ses héritiers accusés de collaboration pendant la guerre et institua l'État Français pour légataire universel. Le château fut abandonné, pillé et désossé, il fit le bonheur de gamins qui en avaient fait leur repaire, jusqu'à ce que soit engagée la 1ère étape de la régionalisation qui attribua aux régions la gestion des lycées, et après de lourds travaux de réhabilitation, le nouveau lycée agricole ouvrait ses portes en 1990.","architecture":"MERVAL, le château se compose d'un corps de logis central que flanquent deux ailes plus élevés d'un étage faisant saillies sur chacune des façades  adossée à l'aile sud du château, une chapelle. La construction appareillée en moellons enduits, la brique étant utilisée pour les chaines et pour les jambes qui délimitent les travées joue délibérément du contraste  entre le corps de logis principal  développe en largeur sur sept travées et la verticalité des ailes, dont la toiture en pavillon  est ornée de grandes souches de cheminées. La travée centrale dans laquelle s'encadre une porte d'entrée  sommet d'un fronton cintré sur  la façade d'arrivée et d'un fronton triangulaire  sur la façade postérieure et terminé par une grande lucarne  s'encadrant entre deux oeils-de-boeuf en pierre. Les autres lucarnes, en briques son couronnées  par des frontons cintrés, deux grands escaliers à balustres de pierre dont l'un en fer à cheval sur la façade postérieure.                                                                                                               \nÉléments protégés MH : les façades et les toitures ; le pavillon du régisseur ; les bâtiments de l'orangerie ; les écuries et le pigeonnier : classement par arrêté du 11 juin 1943.","habitants":"Famille l'Heritier\"","divers":"château de Merval à Brémontier de Merval","gps":"","images":["../image/image_76/76_Merval_1.jpg","../image/image_76/76_Merval_2.jpg","../image/image_76/76_Merval_3.jpg","../image/image_76/76_Merval_4.jpg"]},"Consult_chateau_formulairee960":{"id":"Consult_chateau_formulairee960","dept":"76","canton":"Saint-Valery-en-Caux","commune":"Ermenouville,","nom":"Mesnil_Geoffroy","type":"Château","periode":"XIV-XVI-XVII","histoire":"trois châteaux dans cet article; Arnouville, Mesnil-Geoffroy.                                                    ARNOUVILLE, logis construit dans le quatrième quart du XVIe siècle pour Nicolas Allais, conseiller d'Henri III (la cheminée de la grande salle porte la date 1589). Le château d'Arnouville est passé ensuite dans les mains de la famille Dupuis d'Arnouville, puis des Clercy.                                                                                                                        MESNIL-GEOFFROY, au XIVe siècle construction du premier château par la famille de Pinneville. la dernière représentante Elisabeth, épouse  en 1384 Jeufre de Folin à son décès le château se transmet par alliance aux Olivier, en 1510 Jeanne Olivier apporte le domaine par mariage à Jean de Bailleul de Rufosse  leur descendance apporte toujours par alliance à Angélique de Baillleul avec Guillaume le Seigneur de la Heuze   le château a été construit au début du XVIIe siècle par Guillaume le Seigneur de La Heuze. Henri le Seigneur leur fils meurt en 1702 sans postérité transmet le domaine à sa soeur Jeanne qui à épousé en 1678 Henri de Launoy.  Vers 1740, Jacques Lannoy de Bellegarde transformèrent entièrement ce qui n'était qu'un petit château, et le dote de parterres à la française et de charmilles. Depuis le XVIIIe siècle, le château n'a connu aucune modification, tant à l'intérieur qu'à l'extérieur. le fils de Jacques de Lannoy prénommé également Jacques maire de Rouen de 1776 à 1779 meurt sans postérité en 1822, le domaine échoit à Marie -Henriette de Montmorency, en 1970 passe à monsieur Daniel Paterne, Il est actuellement la propriété du prince et de la princesse Hany Kayali (originaires de Syrie et cousins des Aga Khan) qui l'habitent toute l'année.                                                                                                 .","architecture":"ARNOUVILLE, façade postérieure incendiée et reconstruite au XVIIIe siècle. Ailes construites après 1825 (ne figurent pas sur le cadastre napoléonien). Logement construit à la fin du premier quart du XIXe siècle (date 1817). Pressoir à cidre XVIIIe siècle. Colombier détruit après 1825 (figure sur le cadastre napoléonien). Le château d'Arnouville actuel a été construit au XVIe siècle en remplacement de l'ancien manoir seigneurial qui était à l'autre bout du village a été détruit.   Éléments protégés MH : le portail d'entrée avec ses grilles ; les façades et les toitures du château (sauf parties modernes de la façade arrière), du fruitier ancienne chapelle du château, des anciennes écuries, du bâtiment du chenil, du grenier, du poulailler, du pressoir, du bâtiment des communs à l'ouest, des deux pavillons du jardin ; le mur de clôture du potager et le mur de l'avant-cour : inscription par arrêté du 18 décembre 1981.                                      MESNIL-GEOFFROY, les boiseries, les façades extérieures, les décors de la salle à manger et les chambres à coucher sont un témoignage de la vie de la noblesse normande au XVIIIe siècle. Victor Hugo et Saint-Exupéry y séjournèrent.  Le château est également célèbre pour sa grande roseraie, la plus importante roseraie privée de Normandie, comprenant plus de 2 500 rosiers avec des très nombreuses variétés de roses anciennes ou modernes, fameuses ou rares dont 'Abraham Darby', 'Adélaïde d'Orléans', 'Cardinal de Richelieu', 'Henri Foucquier', 'Honorine de Brabant', 'Jules Barigny', 'Lady Waterlow', 'Madame Alfred Carrière', 'Madame Ernest Calvat', 'Paul Noël', 'Victor Parmentier, etc. Nouveau : un potager romantique de légumes anciens agrémente le parc. Le jardin du château mesure 10 hectares et son agencement est resté le même depuis le XVIIIe siècle.","habitants":"Arnouville; Famille de  Nicolas Allais                    Mesnil , Famille d' Henri de Launoy                               Tonneville, famille de  des Fitz James\"","divers":"trois châteaux dans cet article; Arnouvile grav-4, et Mesnil-Geoffroy -grav- 1-2-3                         Arnouville GPS : 49° 48' 00\" Nord, 0° 47' 21\" Est                                               Mesnil  geoffroy  49° 48' 44? nord, 0° 47' 01? est1","gps":"49° 48' 00\" Nord, 0° 47' 21\" Est","images":["../image/image_76/76_Mesnil_Geoffroy_1.jpg","../image/image_76/76_Mesnil_Geoffroy_2.jpg","../image/image_76/76_Mesnil_Geoffroy_3.jpg","../image/image_76/76_Mesnil_Geoffroy_4.jpg"]},"Consult_chateau_formulaire5ac1":{"id":"Consult_chateau_formulaire5ac1","dept":"76","canton":"Neufchâtel-en-Bray","commune":"Mesnières-en-Bray","nom":"Mesnières","type":"Château","periode":"XV-XVI","histoire":"MESNIERES,  Charles de Boissey succède à sa soeur Suzanne de Gouvis dont la fille épouse  François de Fautereau leur fils Nicolas prend le parti du roi Henri IV  ce qui vaut au château d'être ravagé par les ligueurs en 1591 le petit-fils de Nicolas, Louis de Fautereau  épouse en 1648 Catherine de Manneville. en 1713  les Fautereau se défond de Mesnières acquis par Jean Baptiste Durey  président du grand conseil, son fils président de Mesnières fait ouvrir la cour remplacé par un escalier  et vend le château à Michel-Charles-Louis de Biencourt marquis de Poutrincourt. Transformé en prison pendant la Révolution, après sa mort, le domaine a été acquis par l'abbé Eude en 1834, qui y a installé un orphelinat (aile droite surélevée en 1840, parc laissé à l'abandon, construction d'une grande chapelle entre 1861 et 1864). depuis 1878 Mesnières est la propriété des pères de Saint-Esprit, qui ont installé  un établissement éducatif. Des nouvelles constructions ont été réalisées entre 1865 et 1904, encore utilisées par l'Institution Saint-Joseph. Le vendredi 20 février 2004, à 11h 07 très précisément, les flammes montent de la chapelle, rapidement, le feu se propage, la toiture est la proie des flammes. Deux ans après le drame, le château retrouve peu à peu son allure d'origine. Il continue d'offrir un cadre exceptionnel aux 600 élèves de l'Institution Saint-Joseph et il reste ouvert au public dévoilant encore ses plus beaux attraits.","architecture":"MESNIERES, a été commencé vers 1500 par Laurent de Boissey achevé en 1546 par la chapelle seigneuriale. Il a subi une restauration vers 1668 . Des transformations ont été opérées au XVIIIe siècle (ouverture de la cour, déplacement de l'entrée et escalier monumental). De style Renaissance, le château de Mesnières est un Fleuron de larchitecture Renaissance, vous pourrez alors découvrir ses fabuleux trésors. La  grande galerie des cerfs où le marquis de Mesnières fit sculpter sept cerfs. La salle des quatre tambours qui, autrefois, était un salon de musique. La salle des cartes avec ses peintures du XIXe siècle. En février 2004, un violent incendie détruisit, durant 5 heures, une partie du château. De nombreuses peintures et tableaux furent saccagés face aux jets d'eau, ayant servi à éteindre l'incendie. L'association des Amis du château de Mesnières fut créée et contribua à sa reconstruction, qui dura 10 ans environ, il est devenu l'Institution Saint-Joseph, un lycée horticole et forestier, est classé aux M.H. depuis 1862 et 1995.     Éléments protégés MH : le château : classement par liste de 1862. L'enclos castral dans ses limites actuelles : les sols; les deux colombiers polygonaux ; le bâtiment des communs, à l'exclusion de l'aile en retour ; la grande chapelle de l'école, y compris le vestibule, à l'exclusion des aménagements du réfectoire en sous-sol : classement par arrêté du 12 octobre 1995.","habitants":"Famille de  Charles de Boissey \"","divers":"Mesnières à  Mesnières-en-Bray                                                      GPS : 49° 45\" 44,28' Nord, 1° 22' 54,48\" Est","gps":"49° 45\" 44,28' Nord, 1° 22' 54,48\" Est","images":["../image/image_76/76_Mesni%c3%a8res_1.jpg","../image/image_76/76_Mesni%c3%a8res_2.jpg","../image/image_76/76_Mesni%c3%a8res_3.jpg"]},"Consult_chateau_formulaire1c06":{"id":"Consult_chateau_formulaire1c06","dept":"76","canton":"Dieppe","commune":"Tourville sur Arques","nom":"Miromesnil","type":"Château","periode":"XI-XVI-XVII","histoire":"MIROMESNIL, en 1689 érection de Mironesnil en marquisat. Au XVe siècle propriété de Jean Leroux, échanson de Louis XI passe dans les mains de Thomas Bazin, au siècle suivant aux  des Dyel dont plusieurs menbres  seront gouverneurs  généraux à la Martinique et au isles, dans les salons sont rassemblés des souvenirs du marquis de Miromesnil, garde des sceaux de Louis XVI,  Guy de Maupassant, qui naquit à Miromesnil le 5 août 1850 et dAlbert de Mun, personnalité politique marquante de la famille des propriétaires actuels.  En 1668 à Thomas Hue de la Roque qui obtient l'érection en marquisat du domaine, son petit-fils devenu garde des Sceaux du roi Louis XVI provient à préserver Miromesnil à la Révolution. Vendu par les héritiers en 1805 passe dans différentes mains famille de Maupassant de 1849 à 1853   Leurs propriétaires actuels sont Jean-Christophe et Nathalie Romatet. Achat en 1838 de Miromesnil par les Voguê.","architecture":"MIROMESNIL, la diversité harmonieuse des styles du château de Miromesnil, Forteresse du XIe siècle, demeure des XVIe et construction du château au  XVIIe siècles, témoigne de plus de quatre siècles dhistoire architecturale. Devasté par les troupes de Henry IV lors de la bataille d'Arques. Jean Dyel fait reconstruire le château à la fin du XVIe siècle, fait élever  un nouveau bâtiment qui prend forme  d'un corps  de bâtiment muni d'un haut toit couvert d'ardoises et flanqué de deux tours rondes du côté jardin, Ornée de pilastres, de guirlandes, de masques et durnes en pierre, la façade nord est un exemple rare du style Louis XIII monumental. Elle est encadrée de deux ailes construites au XIXe siècle dans le même esprit. La richesse imposante de cet ensemble contraste avec la simplicité classique de la façade sud dépoque Henri IV, avec ses lignes pures et la couleur chaude de ses briques cuites au feu de bois. Éléments protégés MH : le château : inscription par arrêté du 6 février 1945. La chapelle : classement par arrêté du 9 juillet 1957.","habitants":"Guy de Maupassant\"","divers":"Miromesnil  à Tourville sur Arques  GPS : 49° 51' 40\" Nord, 1° 04' 56\" Est","gps":"49° 51' 40\" Nord, 1° 04' 56\" Est","images":["../image/image_76/76_Miromesnil_1.jpg","../image/image_76/76_Miromesnil_2.jpg","../image/image_76/76_Miromesnil_3.jpg"]},"Consult_chateau_formulaire2d04":{"id":"Consult_chateau_formulaire2d04","dept":"76","canton":"Bolbec","commune":"Mirville","nom":"Mirville","type":"Château","periode":"XVI","histoire":"MIRVILLE, le fief de Mirville est attesté en 1080, relevant de Tancarville. En 1105, Adam de Mirville ayant pris part au conflit entre Henri Beauclerc et Robert Courteheuse a certainement effectué des travaux de fortification dont il subsiste une motte. En 1150, sont signalés un étang et un moulin seigneurial sur la rivière de Bolbec.","architecture":"MIRVILLE, un manoir est construit au XVIe siècle, à proximité de la motte, pour la famille le Goupil du Mesnil d'O. Au XVIIe siècle, la chapelle du château devient l'église paroissiale. Le jardin potager a été construit au XVIIIe siècle. A la fin du XIXe siècle, le baron Pierre de Coubertin remanie le logis. Des fouilles réalisées sur la motte de 1979 a 1981, ont révélé l'existence de 8 niveaux distincts de bâtiments de bois, édifiés au XIe siècle autour de poteaux fichés en terre. La construction de la motte peut être datée du début du XIIe siècle avec deux agrandissements au cours du XIIe siècle. Au XVIe siècle, ont été aménagés dans la motte deux fours à brique pour la construction du manoir. Éléments protégés MH : les façades et les toitures ; l'escalier avec sa rampe à balustres en bois : inscription par arrêté du 13 mars 1975.","habitants":"Guy de Maupassant\"","divers":"château à  Mirville                                                            GPS : 49° 36' 33,5\" Nord, 0° 26' 37\" Est","gps":"49° 36' 33,5\" Nord, 0° 26' 37\" Est","images":["../image/image_76/76_Mirville_1.jpg","../image/image_76/76_Mirville_2.jpg"]},"Consult_chateau_formulaire15ea":{"id":"Consult_chateau_formulaire15ea","dept":"76","canton":"Le Mesnil-Esnard","commune":"Morgny la Pommeray","nom":"Mondétour","type":"château","periode":"XVII","histoire":"MONDETOUR, cet ensemble a été construit entre 1720 et 1730 pour Pierre Duval, directeur de la Monnaie de Rouen. Le château de Mondétour occupe le fond d'une cour d'honneur encadrée par d'importants communs disposés en retour d'équerre et fermés par une grille. Le bâtiment est construit en briques, selon un parti classique et inscrit dans une vaste composition paysagère avec parc remanié sous le Second Empire, basse-cour avec colombier et orangerie et ferme de l'autre côté. Sept pièces décorées au rez-de-chaussée, escalier à rampe de fer forgé.","architecture":"MONDETOUR l'ensemble du domaine comprenant : le parc et les cours en totalité, sols, plantations, murs, piliers, grilles et bassins, la perspective vers la chapelle de Vimont au nord jusqu'au ravin, et la perspective vers l'église de Morgny-la-Pommeraye au sud-ouest ; l'emprise de l'avenue d'accès de part et d'autre du chemin vicinal ; les façades et les toitures de l'ancienne ferme du château, à savoir le logis, l'ancien pressoir, la grange et, en totalité, la charretterie : inscription par arrêté du 30 mai 2002, est devenu un lieu de création et de diffusion artistique du pays. Laction culturelle et touristique de Mondétour sinscrit dans une approche de préservation et de développement durable de lenvironnement architectural et végétal du lieu: programme de restauration des batiments mené en lien étroit avec la conservation régionale des MH, préservation du paysage rural (restauration des talus plantés de hêtres et replantation dessences locales), préservation de la faune sauvage. Éléments protégés MH : les façades et les toitures du château et des communs ; la chapelle et le pigeonnier ; l'escalier avec sa rampe en fer forgé ; les sept pièces du rez-de-chaussée avec leur décor : inscription par arrêté du 27 août 1975. Les intérieurs du château et des communs ; la grille et les piliers fermant la cour d'honneur ; l'orangerie et les bâtiments adjacents : inscription par arrêté du 17 juillet 2001.","habitants":"Famille de Pierre Duval\"","divers":"Mondétour à  Morgny la Pommeray  GPS : 49° 30' 15\" Nord, 1° 18' 07\" Est","gps":"49° 30' 15\" Nord, 1° 18' 07\" Est","images":["../image/image_76/76_Mond%c3%a9tour_1.jpg"]},"Consult_chateau_formulaire3353":{"id":"Consult_chateau_formulaire3353","dept":"76","canton":"Elbeuf","commune":"Moulineaux","nom":"Moulineaux","type":"Châteaux","periode":"XI-XIV-XIX","histoire":"Trois châteaux dans cet article de Moulineaux; Robert le Diable, Rouvray et  Ste-Vaubourg.                                                                                                                       ROBERT LE DIABLE  Un château existait dès le XIe siècle. Le nom de Robert le Diable pourrait êt
