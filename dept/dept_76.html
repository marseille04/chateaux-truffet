re celui de Robert Courteheuse, duc de Normandie de 1087 à 1096. Jean sans Terre rebâtit la place entre 1202 et 1203. Elle fut démantelée avant d'être reprise par les Capétiens. Importants travaux au XIVe siècle, par la suite, les rouennais détruisirent les tours du château pendant la Guerre de Cent ans pour empêcher les Anglais de s'y fortifier. Au début du XXe siècle, les propriétaires, la famille Cosserat, consolident les souterrains et les tours. Une vaine opération puisque le château sera à nouveau détruit en partie durant la deuxième guerre mondiale. Seuls le donjon, le portail, des parties des courtines et des tours ont subsisté. Un musée de personnages en cire abrite des scènes de la vie de Robert le Diable, et une réplique du drakkar royal d'Asenberg est exposée dans une chapelle d'inspiration norvégienne.","architecture":"SAINTE-VAUBOURG Val de la haye  Ancien manoir ducal transformé vers 1130 (ou en 1173 ) en commanderie de templiers. Chapelle consacrée en 1264. Grange aux dîmes construite au XIIIe siècle. Logis reconstruit au XVIIe siècle, porte la date  de 1637. Château édifié à proximité, sur d'anciens bâtiments au début du XIXe siècle. L'édifice se compose d'un étage carré, le gros oeuvre en calcaire, moellon et pierre de taille, type de couverture pignon couvert et toit à longs pans couverts de tuiles plates.Éléments protégés MH : la grange dimière ; les restes de la chapelle ; la cave voûtée ; le puits : inscription par arrêté du 27 décembre 1972.                                                                   ROUVRAY  La construction du château du Rouvray date de 1876. Il fut construit pour Eugène Dutuit, dont la famille est actionnaire à la Banque de France. Le château de Rouvray se situe en bordure de Seine. Vous pourrez y louer des salles.","habitants":"famille Cosserat et  à Rouvray Eugène Dutuit\"","divers":"Trois châteaux dans cet article; Robert le Diable grav-1-2, Rouvray-grav-3 ,ste-Vaubourg-Grav-4.                                           Moulineaux GPS : 49° 20' 23\" Nord, 0° 57' 35\" Est                                            Rouvray GPS : 49° 20' 35\"Nord, 0° 58' 00\" Est","gps":"49° 20' 23\" Nord, 0° 57' 35\" Est","images":["../image/image_76/76_Moulineaux_1.jpg","../image/image_76/76_Moulineaux_2.jpg","../image/image_76/76_Moulineaux_3.jpg","../image/image_76/76_Moulineaux_4.jpg"]},"Consult_chateau_formulairea275":{"id":"Consult_chateau_formulairea275","dept":"76","canton":"Bolbec","commune":"Mélamare","nom":"Mélamare","type":"château","periode":"XVIII","histoire":"MELAMARE, le premier seigneur de Mélamare dont on a connaissance est Michel de Goustimesnil (vers 1670). Les descendants de ce noble personnage ne semblent pas avoir été seigneurs du lieu car on trouve un échange de propriété en 1687 avec les Boutren qui détenaient le fief de Franqueville dans le voisinage. Après la tourmente révolutionnaire, Pierre Manoury de Franqueville hérite en 1809 de son père Guillaume Manoury, conseiller du Roy, greffier en chef de la cour des comptes. Maire de Mélamare et conseiller général, Pierre de Manoury mourut en 1841 et sa fille  le vendit au Docteur Pillore en 1850. Monsieur Théodore-Stanislas Pouchet, de la dynastie des manufacturiers du textile, aïeul de Mademoiselle Ouvry acquit ce bien de Madame Nicolle, légataire universelle du médecin qui n'avait pas d'enfant.","architecture":"MELAMARE, le château a sans doute été édifié au XVIIIe siècle pour Jacques Le Boutier qui rendit aveu pour le fief de Franqueville à Mélamare en 1753. En 1769 a lieu la visite de la chapelle nouvellement construite pour M. Manoury de Franqueville dans la cour du château. Les bâtiments de la ferme datent du XVIIIe siècle et la grange à manège du XIXe siècle. Le logis présente une élévation en brique avec chaînes calcaire et l'autre en assises alternées de silex et de brique, la chapelle est bâtie en assises alternées de calcaire et de brique; les écuries, le cellier et la grange sont à assises alternées de calcaire, silex et brique; le pressoir, la grange et la porcherie sont en pan de bois couverts en chaume le pigeonnier est à assises alternées de silex et de brique, son toit est en pavillon.","habitants":"Michel de Goustimesnil \"","divers":"Mélamare à Mélamare","gps":"","images":["../image/image_76/76_M%c3%a9lamare_1.jpg"]},"Consult_chateau_formulaireb1e9-2":{"id":"Consult_chateau_formulaireb1e9-2","dept":"76","canton":"Bolbec","commune":"Nointot_Baclair","nom":"Nointot","type":"Châteaux","periode":"XVI_XVII-XIX","histoire":"trois châteaux dans cet article ; Baclair, la Houssaye et Nointot.                                                          BACLAIR  le fief de Calletot, dépendant de la baronnie de Hallebosc, est attesté en 1164. En 1578, Michel de Baclair commence la construction du château actuel, terminée au milieu du XVIIe siècle. Le colombier, de plan circulaire, en brique et pierre, date de cette époque. Le château a été transformé en prison à la Révolution, puis restauré au cours de la première moitié du XIXe siècle. La construction du château de Baclair date du XVIIe, de la 2eme moitié du XVI et du XVIIe siècle. Il se situe dans un parc de 12 Ha. Laissé à l'abandon durant 32 ans, le château de Baclair a été racheté depuis et restauré. Aujourd'hui; collège agricole.  Le château de Baclair et son colombier sont inscrits aux M.H. depuis le 15.01.1934. Éléments protégés MH : le château et le colombier : inscription par arrêté du 15 novembre 1934.                                                                                                      NOINTOT, Elevé à partir de 1560 par Charles de Monchy et Charlotte de Baclair, et terminé seulement vers 1625 par leur fils, qui fut Gouverneur de Péronne et Maréchal de France, le château de Baclair passa par alliance au marquis de Saint-Julien, et entra en 1740 dans la famille de Montault, qui le remania et l'agrandit sous la Restauration.   Il comprend trois corps de bâtiment disposés en U autour d'une cour ouverte au sud, et cantonnés de pavillons quadrangulaires. Il est encore entouré de douves sèches, sauf sur son côté nord.  Son caractère, à la fois pittoresque et coloré lui vient de la multiplicité de ses toitures indépendantes et des nombreuses variantes décelables dans le riche décor de ses façades ; bandeaux, chaînes harpées, arcades, niches et tableaux de pierre. Un colombier, d'époque postérieure, accompagne cet ensemble, l'un des plus remarquables témoins de l'architecture d' époque Henri IV - Louis XIII du Pays de Caux.","architecture":"HOUSSAYE   Le fief, terre et haute justice de la Houssaye relevant du fief de Soreng appartient au prieuré du Mont aux Malades de Rouen en 1503. Sur le plan terrier de la fin du XVIIIe siècle figure un manoir avec colombier, verger, dépendances et une pépinière. Un plan géométrique de la ferme de M. Delamotte de Rouen, ayant appartenu au prieuré du Mont aux Malades est établi en 1791. La pépinière est alors une terre en labour. Sur le cadastre de 1822 figure le manoir avec colombier, mares, grange et charretterie. Le château actuel a été bâti dans la deuxième moitié du XIXe siècle, ainsi que la ferme du château, le propriétaire en 1895 étant Mr Le Caron jusqu'en 1910. Le château a été occupé pendant la première guerre mondiale par l'orphelinat sinistré de Graville, il est surnommé le castel Montjoie. L'orphelinat est remplacé en 1970 par un institut médico-social, dépendant de l'hôpital Fauquet de Bolbec. Le logis est en assises alternées de brique et de calcaire ; les batiments de la ferme sont en assises alternées de silex et de brique.  Abrite un établissement de bienfaisance.","habitants":"M. Delamotte de Rouen\"","divers":"Deux châteaux dans cet article ; Baclair-grav-1-2  et  la Houssaye-grav-3-4.                                         Baclair GPS : 49° 35' 44,16\" Nord, 0° 29' 51,72\" Est","gps":"49° 35' 44,16\" Nord, 0° 29' 51,72\" Est","images":["../image/image_76/76_Nointot_1.jpg","../image/image_76/76_Nointot_2.jpg","../image/image_76/76_Nointot_3.jpg","../image/image_76/76_Nointot_4.jpg"]},"Consult_chateau_formulaire4f18":{"id":"Consult_chateau_formulaire4f18","dept":"76","canton":"Saint-Étienne-du-Rouvray","commune":"Oissel","nom":"Oissel","type":"Châteaux","periode":"XIX-XVIII","histoire":"Quatre châteaux dans cet article; d'Oissel, Clos-Gosse, Frondeville et Roches.                               OISSEL  Fief royal, Richard Cur de Lion y fit construire un rendez-vous de chasse où séjourna Philippe le Bel en 1312. Ce manoir, profondément modifié au cours des siècles, abrite aujourdhui l'hôtel de ville. On peut ainsi admirer un pavillon Louis XVI où vécut Charles-Henri Dambray, avocat au Parlement de Paris pendant la Révolution, mais aussi la ferme normande. Dans le parc, les arbres de la région sont à l'honneur à travers l'arboretum : le chêne Rouvre qui a donné son nom à la forêt du Rouvray, hôtel de ville, jardin public aménagé en 1955 dans le parc du château de la marquise de La Perreuse.                                                                                          CLOS-GOSSE, château reconstruit dans la deuxième moitié du XIXe siècle, probablement par Eugène Barthélémy; colombier circulaire datant du XVIIe siècle. L'édifice de plan symétrique se compose d'un étage carré, et d'un étage de comble, le gros-oeuvre en calcaire, brique, pierre avec brique en remplissage et bossage, élévation ordonnancée surmontée de toit à longs pans, croupe et toit conique, recouverts d'ardoise et de tuiles plates. L'ensemble comprend un parc, un jardin, des parties agricoles et une chapelle.                                                                                                                        ROCHES  est une belle construction du XIXe siècle, batîe sur lemplacement dun ancien château datant du Roi de France Louis XIII, dont il ne ne reste que le logement du directeur du centre de formation Jean-LHerminier. Il abrita Grimoin Sanson. Dans le parc, on peut voir une chapelle néo-classique, bâtie par Grimoin Sanson au début du siècle pour les besoins de son film. Dans le parc municipal, peuvent être découverts le château de la marquise de Frondeville, dit aussi de la Perreuse, bâtisse du XVIIIe, le Pavillon Dambray de style Louis XVI, et la ferme normande. Le château des Roches est devenu le Centre de Formation Jean l'Herminier.","architecture":"CHANT D'OISEL  En 1760, Pierre Asselin Desparts, Seigneur du Chant d'Oisel, Chevalier de St-Louis et Conseiller à la Cour des Comptes, construisit ce château de style Louis XIII, tel que nous le connaissons actuellement avec façade sur la rue des Andelys. En 1781, Louis Jules Asselin Desparts hérita de son père, devint seigneur du Chant d'Oisel. A sa mort, sa soeur, Anne Jeanne Asselin, mariée à Louis Adrien de Lestanville hérita du domaine. La grille dentrée, absente à la suite dun mariage avec une dame de Lestanville, se trouve aujourdhui au château de Bosc Oursel à Letteguives. En 1850, la famille de Lestanville céda le château à un avocat de Rouen, M. Adolphe Archier. Celui-ci modifia l'entrée qui se trouvait face au château et la déplaça sur la droite. En 1893, le domaine fut vendu à M. Emard Baudry, apparenté aux de Lestanville, il supprima les murs d'enceinte et planta des haies et des arbres. Maire de 1896 à 1910, et de 1935 à 1939, il fut conseiller municipal durant 43 ans. Actuellement, ce château est habité par M. et Mme Faroult.                                                                                          FRONDEVILLE ou Pereuse , c'est une anciene verrerie. Dans le parc municipal de Oissel peuvent être vus le château de la Marquise de Frondeville, dit aussi de la Perreuse. Le château de la Marquise date du XVIIIe siècle. Le pavillon Dambray est de style Louis XVI et la ferme, de style normand. Le château de la Marquise de Frondeville ou château de Péreuse est privé, fermé au public.","habitants":"Clos-Gosse  Famille de Eugène Barthélémy              Roches , Jean-LHerminier\"","divers":"Quatre châteaux dans cet article; Clos-Gosse grav-4, Chant d'Oisel, Frondeville,  Roches-grav-2-3.  Frondeville  GPS : 01° 05' 32\" Est, 49° 20' 33\" Nord                                           Roches GPS : 49° 20' 41\" Nord, 1° 05' 52\" Est","gps":"01° 05' 32\" Est, 49° 20' 33\" Nord","images":["../image/image_76/76_Oissel_1.jpg","../image/image_76/76_Oissel_2.jpg","../image/image_76/76_Oissel_3.jpg","../image/image_76/76_Oissel_4.jpg"]},"Consult_chateau_formulairedb40-2":{"id":"Consult_chateau_formulairedb40-2","dept":"76","canton":"le Havre","commune":"Gonfreville l","nom":"Orcher","type":"Châteaux","periode":"XIV-XVII","histoire":"trois châteaux dans cet article; Orcher, Benvilier  et Hellandes                                                            ORCHER, là Gonfreville le fief d'Auricher attesté en 1140 a été édifié par le duc de Normandie sans doute en même temps que le fief de Tancarville en faveur de la famille de Auricher, qui fait construire un château-fort. Donjon reconstruit, il fut pris par les Anglais en 1415. La famille Crespin est dépossédée par Henri V au profit de Jean Falstaff. En 1434, le domaine d'Orcher et les étangs est rendu au duc de Bedford. En 1449, le domaine revient aux Crespin et par héritage à la famille de Brézé en 1488, et à la famille d'O en 1539. En 1604, la terre d'Orcher est saisie aux mains de Georges Laillet, seigneur d'Auricher. En 1719, la famille Potier, propriétaire depuis 1632, vend le domaine à Law et adjugé en 1723 à Philippe de Vitry et vendu en 1735 à Thomas Planterose qui fait transformer pendant dix ans le château par François de la Motte et Jacques Lesueur, maçons, Courtel, maître plâtreur à Caudebec. Les boiseries sont exécutées par le menuisier havrais Le Roux. En 1795, division du domaine à la mort de madame de Melmont, il est décrit comme maison d'habitation château et accessoire. Au XIXe siècle le domaine appartient à la famille de Rochechouart qui fait restaurer le château en 1857 par l'architecte P. Philippon, notamment la tour. Fin XIXe siècle à la famille d'Haucourt toujours propriétaire. Éléments protégés MH : le grand salon au rez-de-chaussée avec son décor : classement par arrêté du 12 février 1976. Les façades et les toitures du château, des communs et du colombier ; l'escalier du château avec sa rampe ; les pièces suivantes avec leur décor.                                                                                                                  BENVILIER, le château d'Orcher est une demeure des XI? et XII? siècles, restauré au XV? siècle et transformé au XVIIIe siècle qui se dresse sur le territoire de la commune française de Gonfreville-l'Orcher.","architecture":"HELLANDES, bâti à Manéglise 10 K.M au nord Est du Havre,   en 1904, pour Mr Levesque Saint-Aignan-sur-Ry, Angerville-l'Orcher et Manéglise ont été les plus importants. En 1371, Jehan de Hellande, fils de Simon, était préposé, avec 2 autres chevaliers et 3 écuyers, à la garde de la ville de Montivilliers où se trouvait sa résidence,le manoir de la Fontaine. Robert, le fils ainé de Jehan, épousa, en 1380, Jehanne de Montmorency-Beaussault et devint, en 1399, Capitaine de Pont-de-l'Arche. Chambellan du roi, Bailli de Rouen en 1414, il fut fait prisonnier à Azincourt et mourut en décembre 1415. Déclaré rebelle par Henry V, Robert, son second fils, fut dépouillé de ses biens, de même que son fils Roger. Clément Overton, le Capitaine anglais de Montivilliers, occupa le manoir de la Fontaine, puisqu'il résidait déjà aux Hellandes. Vingt ans plus tard, la famille s'éteignit malheureusement dans les mâles. La seigneurie revint au petit-fils de Roger de Hellande dont la mère avait épousé Jehan de Trousseauville.  Les frères Jehan et Gilles de Trousseauville épousèrent Anne et Renée, les filles de Roger de Hellande. En 1581, le Domaine était aux mains des Auber, seigneurs de Bléville. En 1645, François de Saint Denis vendit le fief à Hector Desmares, seigneur de Tournay et de Saint-Gilles, qui avait épousé Charlotte de Canouville (Grosmesnil). Adrien, son fils, lui succéda en 1672, mais après le décès de ses 2 fils, en 1718 et 1719, le domaine passa aux neveux, époux des deux surs Desmares, d'abord Pierre-François de Paulmier d'Annemours, lieutenant de frégate, puis François Tiéchard. François Nicolas, leur héritier, était le fils naturel du chancelier d'Aguesseau. Il épousa en 1803, Élisabeth Viard, d'une famille protestante. Félix-Charles Levesque (1842-1919) fit raser l'ancien château. Marcel-Adolphe qui en hérita, en 1917, vendit la nouvelle habitation qui avait servi d'hôpital belge, durant la guerre.Il appartient à l'association Val Soleil.","habitants":"Orcher; famille Laillet Roger de Hellande \"","divers":"trois châteaux dans cet article; Orcher grav 1 à 4, Benvilier _6-7  et Hellandes grav 5                                                                                                                                                     Hellandes GPS : 49° 34' 35,1\" Nord, 0° 16' 10,9\" Est                                          Orcher GPS : 49° 29' 48,33\" Nord, 0° 14' 46,98\" Est","gps":"49° 34' 35,1\" Nord, 0° 16' 10,9\" Est","images":["../image/image_76/76_Orcher_1.jpg","../image/image_76/76_Orcher_2.jpg","../image/image_76/76_Orcher_3.jpg","../image/image_76/76_Orcher_4.jpg","../image/image_76/76_Orcher_5.jpg","../image/image_76/76_Orcher_6.jpg","../image/image_76/76_Orcher_7.jpg"]},"Consult_chateau_formulaireb792":{"id":"Consult_chateau_formulaireb792","dept":"76","canton":"Dieppe","commune":"Ouville L","nom":"Ouville","type":"château","periode":"XVII","histoire":"OUVILLE, demeure seigneuriale de grands parlementaires aux XVIIe et XVIIIe siècles. Jean de La Place fait bâtir le château actuel pour en faire  une résidence dété. Le château d'Ouville passe par alliance à la famille Dambray, anoblie en 1582, à qui l'édifice doit ses heures de gloire. Charles Henry Dambray, chancelier de France et président de la Cour des Pairs, accompagne Louis XVIII à Gand pendant les Cent Jours, et vend finalement la propriété à la famille du Val de LEscaude qui y demeure jusquen 1922.\nÉléments protégés MH : le château sauf les aménagements contemporains ; les façades et les toitures des étables et de la remise à gibier ; le puits ; les écuries avec les stalles ; les façades et les toitures des deux pavillons d'entrée ; l'avant-cour ; la cour d'honneur et l'ancien jardin ; l'avenue plantée et l'ancien vivier : inscription par arrêté du 1er juillet 1991.","architecture":"OUVILLE, le château d'Ouville est devenu, aujourd'hui, une grande habitation du village. Il a fort souffert durant la Seconde Guerre mondiale. Il remplace le château primitif détruit durant les guerres de religion au XVIe siècle. Il existe aussi sur la commune à découvrir : Le château de Tous-les-Mesnils du XVIIIe siècle, Dominant la vallée de la Saâne, le domaine de Tous-les-Mesnils présente encore un ensemble architectural bien préservé, dans des dispositions très proches de sa période dapogée, au début du XVIIIe siècle.l sagit dun ensemble parfaitement ordonnancé, axé sur une longue avenue aboutissant au château, grande et sobre demeure, sans fronton, traitée en briques à motifs géométriques au niveau de la corniche, dont le soubassement et les encadrements de baies sont réalisés en grès aux tonalités cendrées. Au coeur du Pays de Caux, se trouve le manoir de Tessy et son colombier exceptionnel du XVIe siècle","habitants":"Famille Dambray,\"","divers":"Ouville   L'abbaye       GPS : 49° 52' 25\" Nord, 0° 57' 37\" Est","gps":"49° 52' 25\" Nord, 0° 57' 37\" Est","images":["../image/image_76/76_Ouville_1.jpg","../image/image_76/76_Ouville_2.jpg"]},"Consult_chateau_formulaire27c1":{"id":"Consult_chateau_formulaire27c1","dept":"76","canton":"Saint-Valery-en-Caux","commune":"Paluel","nom":"Paluel_Janville","type":"Châteaux","periode":"XVI","histoire":"trois châteaux dans cet article de Paluel , Janville et Bertheauville. JANVILLE, le château de Janville est construit vers 1610 par Jean Louvel, conseiller-secrétaire du roi en la chancellerie du Parlement de Rouen et anobli par lettres patentes de décembre 1576. Le château restera dans sa descendance jusqu'à la fin du XIXe siècle.  Sybille Gabrielle Riquetti de Mirabeau, comtesse Martel de Janville (1849-1932) (auteur de romans publiés sous le pseudonyme de Gyp), mariée à vingt ans à Nancy, le 2 décembre 1869, avec le comte Roger de Martel de Janville.\nLouis-François-Pierre Louvel de Janville (17 juillet 1743-29 juillet 1808, maire de Caen, président du conseil général du Calvados, connu pour sa bonté et les services qu'il rendit dans la région, ainsi que pour ses travaux en agriculture. Il se marie (sans descendance) avec madame veuve de Mondrainville, née Marie-Pierre de Tournebu.                              BERTHEAUVILLE,  à Paluel château construit après 1752. Largement restauré de 1887 à 1890: distribution intérieure modifiée, façades rhabillées, travaux de ferronnerie par Ferdinand Marrou, grille de clôture par Liezard. L'édifice se compose d'un étage carré, d'un sous sol et d'un étage de comble, le gros oeuvre en calcaire et enduit, élévation ordonnancée surmontée d'un toit à longs pans, toit en pavillon et dôme circulaire, recouverts d'ardoise et zinc en couverture.","architecture":"JANVILLE,  le château, entouré d'un parc, cantonné d'étroits pavillons saillants a été flanqué vers 1895 de deux ailes classiques. Le corps de logis est de style Renaissance. La maçonnerie est composée de grès, silex et brique mixés dans l'appareil. Des décors en brique émaillée sont présents. Un colombier qui porte la date de 1781 complète l'ensemble.  Les façades et toitures du bâtiment central, à l'exclusion des pavillons d'extrémité ; le grand salon avec son décor et le colombier sont inscrits au titre des monuments historiques par arrêté du 19 août 1975.","habitants":"Famille de  Jean Louvel, \"","divers":"trois châteaux dans cet article de Paluel grav-6, Janville grav-1-2-3- et Bertheauville-grav 4-5-                                       . Janville 49° 50' 03? nord, 0° 38' 21? est","gps":"","images":["../image/image_76/76_Paluel_Janville_1.jpg","../image/image_76/76_Paluel_Janville_2.jpg","../image/image_76/76_Paluel_Janville_3.jpg","../image/image_76/76_Paluel_Janville_4.jpg","../image/image_76/76_Paluel_Janville_5.jpg","../image/image_76/76_Paluel_Janville_6.jpg","../image/image_76/76_Paluel_Janville_7.html"]},"Consult_chateau_formulaire8e11-2":{"id":"Consult_chateau_formulaire8e11-2","dept":"76","canton":"Notre-Dame-de-Bondeville","commune":"Mesnil-Panneville","nom":"Panneville","type":"Château","periode":"XVI","histoire":"PANNEVILLE,  le fief de Panneville est tenu par la famille de Trubleville et à la famille Margerie en 1486 passe par alliance à Jean d'Esmalleville qui décèdera en 1528. Jean et Marie sont les parents de Robert d'Esmalleville gouverneur de Caudebec en 1575 qui transmettra ses charges à son fils Adrien, mort en 1652, Robert fils d'Adrien épouse en 1647  Catherine Marguerite de Rieux et s'intitule seigneur de Panneville et d'Ecalle-Alix, baron de Fréville seigneur de Mont de l'If, de Carville et autres lieux. A la génération suivante Robert-Vincent premier du nom s'allie avec Catherine de Chalon dont-il aura un fils également prénommé Robert-Vincent en 1745 constitue le marquisat de Panneville réunissant les domaines possédés par la famille. A la mort d'Antoine-Robert dernier du nom, le domaine passe à l'époux de Marie-Madeleine-Gabrielle d'Esmalleville, marquis de Cairon. En 1834 le domaine est vendu pour la première fois à la famille Jourdainne, en 1858, sophie Jourdainne héritière de Panneville épouse Jules Flavigny, le château est resté dans la descendance de ce ménage appartient aujourd'hui au colonel Robert de Flavigny.","architecture":"PANNEVILLE, fronton sculpté, daté 1732, l'édifice semble être resté inachevé, le corps principal n'est accosté que d'une seule aile; à la place de la seconde se trouve une petite tourelle en brique de plan carré peut être antérieure; chapelle du château édifiée à partir des matériaux de l'ancienne église paroissiale de Panneville, démolie en 1780. Le bâtiment, de plan régulier, se compose d'un sous-sol, de deux étages carrés et d'un étage de comble, le gros oeuvre en brique, calcaire et pierre de taille, élévation à travées surmontée de toit à longs pans, croupe, demi-croupe et toit en pavillon, recouverts d'ardoise.","habitants":"Famille de Robert d'Esmalleville \"","divers":"à Mesnil-Panneville","gps":"","images":["../image/image_76/76_Panneville_1.jpg"]},"Consult_chateau_formulairef24b":{"id":"Consult_chateau_formulairef24b","dept":"76","canton":"Notre-Dame-de-Bondeville","commune":"Pavilly","nom":"Pavilly_Bouville","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article ; Esneval  et Bouville.                                      ESNEVAL, le château d'Esneval a été construit du XVe siècle. Le corps de bâtiment principal est intact, tout comme deux ailes et la chapelle de la bâtisse Saint-Thomas de Canterbury dans laquelle repose le gisant de Thomas de Pavilly.  La construction du château d'Esneval date du 3ème quart du XVIIIe siècle, il est reconstruit au XVe siècle par Jeanne d'Esneval et Robert de Dreux, vidame de Normandie. En 1644, il échoit à Claude Le Roux, puis à ses successeurs, membres du parlement de Normandie.  Vers 1765, le président Le Roux d'Esneval fait transformer le château en l'agrandissant d'ailes latérales et ajoute une grande chapelle. Les éléments protégés aux M.H. sont la Chapelle, le corps de bâtiment attenant au Nord, à savoir : façades et toitures, logettes sur 3 niveaux et l'escalier d'accès attenant, pièce lambrissée, depuis le 2/03/1970. Le château d'Esneval est classé aux M.H. depuis le 25/07/1974.  Propriété du marquis d'Aurais de St-Pois Éléments protégés MH : la chapelle ; le corps de bâtiment attenant au nord, à savoir les façades et les toitures, les logettes sur trois niveaux, l'escalier d'accès attenant, la pièce lambrissée : classement par arrêté du 2 mars 1970.","architecture":"A six K.M. de distance BOUVILLE  Ancien manoir du plein-fief de Bouville, du moins attesté au XIIe siècle, détruit. En 1780 est posée la première pierre du \"château Trianon\", construit par Bernard Vauquelin, architecte rouennais, pour Jean Grossin, comte de Bouville. Sur une vaste terrasse, édifice à élévation ordonnancée, avant-corps à ordre ionique. Vendu en 1794, détruit dès le XIXe siècle. Chapelle Saint-Thibault détruite. Château actuel du premier quart du XXe siècle, de plan symétrique, composé d'un étage et étage en surcroit, élévation à travée ordonnancée. Parties constituantes : enclos, parc, communs, terrasse en terre-plein et chapelle,propriété de la commune.","habitants":"Esneval; famille le Roux                                    Bouville;  famille Jean Grossin\"","divers":"Deux châteaux dans cet article ; Esneval grav 3-4  et Bouville grav-1-2.                                                               Bouville GPS : 49° 34' 03,92\" Nord, 0° 57' 12,27\" Est                                                          Esneval  49° 34' 18? N, 0° 57' 13? E","gps":"49° 34' 03,92\" Nord, 0° 57' 12,27\" Est","images":["../image/image_76/76_Pavilly_Bouville_1.jpg","../image/image_76/76_Pavilly_Bouville_2.jpg","../image/image_76/76_Pavilly_Bouville_3.jpg","../image/image_76/76_Pavilly_Bouville_4.jpg"]},"Consult_chateau_formulaired5e4":{"id":"Consult_chateau_formulaired5e4","dept":"76","canton":"Barentin","commune":"Quévillon","nom":"Quévillon","type":"Châteaux","periode":"XV-XVII","histoire":"Deux châteaux dans cet article Delaitre et Rivière-Bourdet                            RIVIERE-BOURDET,  a la mort  d'Etienne Bourdet en 1283, le fief passe aux sires d'Yvetot.  Au XIIIe siècle, un premier château fut édifié, pour Étienne Bourdet, qui donne son nom, au domaine. Il fut mis à sac en 1570 par les catholiques . Puis il fut reconstruit en 1610 à l'initiative de Charles II Maignart de Bernières. en 1678 érigés en marquisat  sous le nom de Bernières.  Voltaire séjourna, au château, en 1723. Il y écrivit en partie Mariane et La Henriade. Honoré de Balzac y fait des séjours en 1834 et 1835 et s'en inspire pour le cadre de son roman. Le médecin de campagne. Passé par succession à la famille du Moucel, le château se transmet, toujours par succession, de 1862 à 1940, à la famille de Montholon-Sémonville fut très fortement restauré vers 1865 par la princesse de Montholon-Sémonville. Puis aux Brillet de Candé. Occupé pendant la guerre, il connut ensuite une longue période d'abandon. Vendu en 1962, il fut transformé en une maison de retraite, en 1966 jusqu'en 1995. En 2011, Chantal Trapes et sa sur, héritèrent de leurs parents. Le château de la Rivière-Bourdet est inscrit aux M.H.depuis le 30/11/1934.  Subsistent quelques éléments du manoir médiéval fortifié construit au XVe siècle. Reconstruction du château à partir de 1625 pour les Maignart de Bernières, membres du Parlement de Rouen. Le colombier polygonal en maçonnerie porte la date 1668.","architecture":"RIVIERE-BOURDET, De plan en U avec deux ailes à deux niveaux  sur cours complété pardeux pavillons accolés. chapelle Saint-Jean-Baptiste, Saint-Pierre, Sainte-Madeleine et colombier polygonal en maçonnerie construits au XVIIe siècle. Le logis de ferme a été édifié au XVIIIe siècle ; projet de reconstruction par l'architecte Paris en 1786 ; logis détruit au XIXe siècle.  Etage carré, le gros oeuvre en calcaire ; moellon ; brique avec pierre en remplissage ; bois ; pan de bois et enduit partiel. Type de couverture: toit à longs pans ; croupe ; toit polygonal recouverts d'ardoise et de tuiles plates. L'ensemble comprend également un enclos, une garenne, un parc et des parties agricoles, construction des communs dans la deuxième moitié du XVIIIe siècle. Dans la 1ère moitié du XIXe siècle quelques reprises sont faites: chapelle et comblement des douves. L'ensemble comprend également un enclos, un parc, un jardin, des communs, des parties agricoles et un pressoir à cidre.","habitants":"Famille d'Étienne Bourdet\"","divers":"deux châteaux dans cet article  Rivière-Bourdet grav-1-2                                        Rivière Bourdet  GPS : 49° 14' 41\" Nord, 0° 33' 51\" Est","gps":"49° 14' 41\" Nord, 0° 33' 51\" Est","images":["../image/image_76/76_Qu%c3%a9villon_1.jpg","../image/image_76/76_Qu%c3%a9villon_2.jpg"]},"Consult_chateau_formulaire7437":{"id":"Consult_chateau_formulaire7437","dept":"76","canton":"Rouen","commune":"Rouen","nom":"Rouen","type":"Patrimoine de rouen","periode":"XIII-XV-XVIII","histoire":"Trois châteaux dans cet article; Tourelles, la tour Jeanne d'Arc et Lions. TOURELLES, il date du XIIIe au XVIIIe siècle. Il s'élève près du Vieux-Moulin Son histoire commence en 1196, après que Philippe Auguste a mis la main sur une partie des forteresses du Vexin normand aux dépens de Jean Sans Terre pendant la captivité de son frère Richard Cur de Lion. Il fait alors construire le château des Tourelles en remplacement d'un chateau plus ancien qui aurait été construit sous le règne du Duc Henri Ier Beauclerc, dans le but de renforcer le système défensif de Vernon, sur la rive droite et de protéger le pont. La première mention du château des Tourelles apparaît en tant que \"tour du pont\" dans le compte royal de 1202-1203. La garde de l'édifice était confiée à un certain Maître Hugues. Durant lAncien Régime, le château demeure la propriété de la châtellenie de Vernon. Le château \"Les Tourelles\" actuel a été construit au XIXe siècle.                             ROUEN, la tour de Jeanne d'Arc, appelé aussi château de Bouvreuil ou Vieux-château. Construit par Philippe Auguste en 1204, il fut compris dans la ville par Saint-Louis au milieu du XIIIe siècle. Conquis par les Anglais en 1418, Jeanne d'Arc y fut détenue de décembre 1430 au 30 mai 1431. Il fut repris par Charles VII en 1447. Démoli vers 1594, il n'en subsiste que le donjon. Il occupait environ la surface comprise entre le boulevard de la Marne, la rue Bouvreuil, la rue du Baillage et la rue Jeanne d'Arc. cet ancien château fort est de style médiéval fut construit au XIIe siècle. Le donjon Philippe-Auguste est classé aux M.H. depuis 1840. C'est dans la Tour Jeanne d'Arc qu'elle fut emprisonnée, par les Anglais. De la forteresse ne subsiste plus aujourd'hui que la seule tour maîtresse. Elle a conservé une large part de sa splendeur passée et constitue un jalon essentiel pour la compréhension de l'architecture castrale au début du XIIIe siècle. Donjon restauré à la fin du troisième quart du XIXe siècle par Louis Desmarest sur les indications du célèbre architecte Eugène Viollet-le-Duc. Éléments protégés MH : la tour dite de Jeanne d'Arc :classement par liste de 1840.","architecture":"Rouen,  le palais espicopal est de style Gothique. L'archevêché occupe l'espace au nord-est de la cathédrale, compris entre la cour des Libraires, la rue Saint-Romain au nord, la rue de la République à l'est et la rue des Bonnetiers au sud. La cour d'honneur ouvre à l'ouest au pied de la cathédrale sur une cour de service et à l'est sur des jardins. L'archevêché dispose de nombreuses pièces. Les agrandissements successifs et les adaptations de chaque archevêque résidant à l'archevêché conduit à la multiplication de certaines pièces. Ainsi, l'archevêché est doté de trois cuisines, celle du XIXe siècle possède un four piano à bois de la maison Anquetil et de 3 salles à manger. Au sous-sol, dans les salles basses, se trouve la salle des gardes qui donne accès aux cuisines. Dans la salle de garde se trouve entreposées diverses pièces religieuses, allant des reliquaires aux peintures, parmi lesquels un tableau de Guillaume d'Estouteville daté de 1453. À la séparation de l'Église et de l'État en 1905, le fait que l'archevêque ait déménagé la totalité des biens présents dans les lieux a pour conséquence que l'immobilier est la propriété de l'État tandis que le mobilier est la propriété du diocèse de Rouen.                                                                                    LIONS  dit des deux Lions à Canteleu château bâti vers 1650 pour Nicolas Langlois, seigneur de Motteville et attribué selon les auteurs à François Mansart ou à Jacques Le Mercier. Les deux ailes ont été rasées vers 1780 et le château des Lions restauré de 1810 à 1817. La chapelle est actuellement détruite, ses vitraux ont été déposés au musée des antiquités de Rouen. Devant le château, statue d'Henri IV provenant de Rouen. Bâtiment de plan symétrique, composé d'un étage carré et d'un étage de comble, élévation ordonnancée, couvert d'ardoise. Parties constituantes : parc, douves, communs, fabrique de jardin et chapelle.Éléments protégés MH : le château des Lions : inscription par arrêté du 28 avril 1948.","habitants":"Philippe Auguste \"","divers":"Trois châteaux dans cet article; Rouen Retival grav 1 Palais  grav 2-3-6  Tourelles, la tour Jeanne d'Arc grav-4 et   Lions Grav 5                                                         Rouen GP S : 49° 26' 47\" Nord, 1° 05' 40\" Est                                                     Palais  grav-2-3GPS : 49° 26' 25\" Nord, 1° 05' 47\" Est","gps":"49° 26' 25\" Nord, 1° 05' 47\" Est","images":["../image/image_76/76_Rouen_1.jpg","../image/image_76/76_Rouen_2.jpg","../image/image_76/76_Rouen_3.jpg","../image/image_76/76_Rouen_4.jpg","../image/image_76/76_Rouen_5.jpg","../image/image_76/76_Rouen_6.jpg"]},"Consult_chateau_formulaire575d":{"id":"Consult_chateau_formulaire575d","dept":"76","canton":"Dieppe","commune":"Rouxmesnil-Bouteilles","nom":"Rouxmesnil_Bouteilles","type":"Châteaux","periode":"XV-XVI","histoire":"ROUXMENIL-Bouteilles, la construction commence à la Renaissance lorsque la famille dHacquenouville se fait construire une résidence principale, dont un membre illustre Roger dHacquenouville, est chambellan du Roi de France Charles VI au début du XVè siècle. Une communauté religieuse sy installe en 1692, tout de suite après le prieuré passe aux mains des jésuites qui y demeurent jusquen 1762. A la Révolution Française le prieuré sera vendu en bien national. Lhistoire ne sarrête pas là, au XIXe siècle le grand-père du compositeur Claude Delvincourt achète la propriété. Lillustre musicien y restera jusquen 1954, date de son décès. Cest en 1980 que le prieuré abritera désormais la Mairie.                                                                                                                                  ROUXMESNIL Ce manoir passa aux mains d'une communauté religieuse en 1692. Les Jésuites de Dieppe s'y installèrent peu après et y demeurèrent jusqu'en 1762. Ses murs, heureux assemblage de grès et de silex, constituaient au 17ème siècle une agréable maison de campagne pour les Pères Jésuites de Dieppe.                                                                                                ROSANDAL voir Deppe","architecture":"ROUXMENIL-Bouteilles, Après cet intermède historique, jen reviens à ma déambulation autour de ce bâtiment magnifique, modifié au fil du temps par ses hôtes successifs. Je note que les différentes restaurations ont su conserver sa silhouette massive, sa marqueterie de silex et de grès, caractéristique du patrimoine rural de la région dieppoise. En prenant un peu de recul, je découvre le plan du logis qui est rectangulaire comme cest la mode à la Renaissance. Il est posé sur une cave voutée, dont lentrée est à la droite des marches de la porte en arc plein cintre, avec une frise en grès décorée. Décidément, larchitecture de ce prieuré est un plaisir pour les yeux. En levant le regard jadmire également les fenêtres à meneaux, et les oculi percés harmonieusement sur la façade, mais aussi les lucarnes de style anglo-normand. Ma curiosité me pousse à aller voir ce qui se cache à larrière du bâtiment et là je découvre une tour carrée qui rappelle les campaniles typiques de lItalie. Toujours au nord-ouest une grosse tour octogonale a été rajoutée en 2001 et sert daccueil au public de la Mairie. Je note que même sur cette partie récente, tous les murs reprennent les mêmes motifs en grès/silex du logis, créant ainsi une belle homogénéité de lensemble bâti.","habitants":"famille dHacquenouville \"","divers":"Château à  Rouxmesnil_Bouteilles_Rosendal","gps":"","images":["../image/image_76/76_Rouxmesnil_Bouteilles_1.jpg","../image/image_76/76_Rouxmesnil_Bouteilles_2.jpg","../image/image_76/76_Rouxmesnil_Bouteilles_3.jpg"]},"Consult_chateau_formulairedfe3":{"id":"Consult_chateau_formulairedfe3","dept":"76","canton":"Canteleu","commune":"Sahurs","nom":"Sahurs","type":"Château","periode":"XVI-XVIII-","histoire":"deux châteaux dans cet article; Soquence et   Trémauville.                            SOQUENCE,   le domaine de Soquence abrite un château neuf, manoir néo-Renaissance de la fin du XIXe siècle, et une résidence de campagne édifiée par les Gruchet de Soquence à la fin du XVIe siècle et au début du XVIIe siècle, après la destruction du précédent château, le Vieux Soquence, en 1589. Cet ancien manoir, ou plutôt maison de campagne, destiné à accueillir un bourgeois rouennais et de lui permettre de profiter de la nature, ce qui explique les grandes fenêtres donnant sur la Seine et la succession de terrasses y descendant, maintenues par des murs de soutènement et reliées par des escaliers avec des rampes en fer forgé. Le manoir est bâti suivant un plan en U avec le corps de logis à l'ouest, une petite chapelle à l'est et une longue galerie face à la Seine. Il est situé dans un parc boisé et aménagé en même temps que le nouveau château, de style néo-renaissance, construit par Dusillon en 1840  qui  est l'auteur probable des écuries et d'adjonctions à la maison du jardinier. Le décor intérieur est très abîmé, mais il subsiste quelques boiseries, des traces de décor peint et une grande cheminée de cuisine avec son four à pain et une rampe d'escalier du XVIIe siècle à balustres tournés.  Éléments protégés MH : le corps de logis dans ses dispositions d'origine, y compris les restes de décor peint ; les façades et les toitures de l'ensemble des bâtiments restants : galerie centrale, chapelle, communs (à l'exception des adjonctions modernes) et pavillon d'angle ; les terrasses, y compris les murs de soutènement, les murs de clôture et les escaliers avec leurs rampes en fer forgé. Le parc, y compris la clôture ; les façades et les toitures de l'ensemble des bâtiments, à l'exclusion de la maison de gardien : inscription par arrêté du 8 janvier 1998.","architecture":"TREMAUVILLE  Le domaine sinscrit dans la famille des demeures de plaisance édifiées par la noblesse rouennaise au XVIIIe siècle. Le château, bâti en brique et pierre, présente des élévations régulièrement ordonnancées, à larchitecture soignée. Il fut amputé dune aile suite à un incendie dans les années 1880. La demeure conserve intactes ses dispositions intérieures : distribution, planchers, cheminées, lambris, panneaux peints et sculptés. On distingue également la présence dun bel ensemble de scènes chinoises. Le domaine, agrémenté dun parc paysager du XIXe siècle, conserve des terrasses, des communs ainsi que des dépendances des XVIIe et XVIIIe siècles.  Éléments protégés MH : le domaine du château de Trémauville : le château et son domaine, soit le bâti en totalité, la clôture et parc avec le sol des parcelles sur lesquelles il est situé : inscription par arrêté du 8 juillet 2015.                                                                                                      ANCIEN CHATEAU DE SOQUENCE, fin du XVIe siècle Pierre, Route de Soquence   Edifiée par Charles Gruchet, conseiller au parlement de Rouen, Soquence abrite une « maison de campagne » typique de la période de la Renaissance en Normandie. Le corps de logis, modeste ici, qui s'organise autour d'une cour centrale, adopte la forme traditionnelle en U : les ailes perpendiculaires sont réservées aux communs, et la partie centrale, découpée en son milieu par une grande arcade, s'ouvre sur une succession de terrasses exposées au sud et dévalant vers la Seine ; on parle à l'époque du  beau et fructueux vignoble de Soquence.","habitants":"Famille des  Grouchet de Soquence\"","divers":"Sahurs    deux châteaux dans cet article; Soquence grav-1-2-3 et   Trémauville grav-4-5.                                                              Soquence  GPS : 49° 21' 34\" Nord, 0° 56' 39\" Est                                              Trémauville  GPS : 49° 21' 14,0\" Nord, 0° 57' 26,3\" Est","gps":"49° 21' 34\" Nord, 0° 56' 39\" Est","images":["../image/image_76/76_Sahurs_1.jpg","../image/image_76/76_Sahurs_2.jpg","../image/image_76/76_Sahurs_3.jpg","../image/image_76/76_Sahurs_4.jpg","../image/image_76/76_Sahurs_5.jpg"]},"Consult_chateau_formulaire0e88":{"id":"Consult_chateau_formulaire0e88","dept":"76","canton":"Fécamp","commune":"Sassetot le Mauconduit","nom":"Sassetot_Mauconduit","type":"châteaux","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article Sassetot et Briquedalle                          SASSETOT. Jean-Robert Bigot lança sa construction en 1772, à la fin du règne de Louis XV, ii appartient à une personne privée.  Magnifique demeure du XVIIIe siècle, le château de Sassetot est définitivement entré dans l'histoire le 31 juillet 1875, il accueillit Élisabeth de Wittelsbach, dite \"Sissi\", lors d'un de ses séjours en France. Adrien Charles Deshommets (1783-1847), marquis de Martainville, y fit  achever la construction ancien Maire de Rouen et député de Seine-Inférieure où il mourut,  son fils Jean-Robert président au parlement de Normandie transmet le domaine à se soeur Françoise-Louise veuve du marquis de Martainville. En 1872 achat du château par la famille du Perquer qui le louera à l'impératrice d'Autriche. Ce jour-là, Sissi en personne débarque en gare de Fécamp par un train spécial. Et elle n'est pas seule. Une suite de 70 personnes l'accompagne. Le temps d'un été, l'impératrice Elisabeth d'Autriche va marquer de son empreinte le petit village du pays de Caux et créer l'événement à de multiples reprises. Depuis lors, le château de Sassetot demeure la résidence de Sissi. Un rêve de princesse pour celles qui peuvent alors passer une nuit dans la suite de l'impératrice et marcher dans ses traces le long des allées du parc, à l'ombre de deux tulipiers de Virginie âgés de plus de 500 ans.  en 1872 achat du château par la famille du Perquer, il a été depuis  1958 , transformé en un bel hôtel-restaurant.\nÉléments protégés MH : les façades et les toitures du château et de l'orangerie ; le colombier : inscription par arrêté du 20 mai 1975.","architecture":"BRIQUEDALLE  date du XVIIIe siècle. La chapelle du château (à l'exception de l'adjonction contiguë au Nord-Ouest est inscrit aux M.H. depuis le 27/10/1988.  Situé à Sassetot-le-Mauconduit, face au château de Briquedalle,  le manoir est typique des constructions du Pays de Caux en briques \"de Saint Jean\" et silex taillés. Bâti en 1825, il est restauré en 2013, à partir de matériaux nobles. Pouvant accueillir 15 personnes, ce manoir de 400 m² est accessible aux personnes atteintes de handicap. Sa décoration raffinée et son confort vous assureront un séjour très réussi.  Le château de Briquedalle est devenu un gite de groupe. pour 1 à 15 Personnes. Propriétaire : Mme de Bagneaux-Savatier.","habitants":"Élisabeth de Wittelsbach, dite \"Sissi\"","divers":"Deux châteaux dans cet article Sassetot-Mauconduit-1-2 et Briquedalle   grav-3-4                         Briquedalle  GPS : 49° 48' 16\" Nord, 0° 31' 45\" Est                                                Sassatot  GPS : 49° 48' 22,22\" Nord, 0° 31' 44,4\" Est","gps":"49° 48' 16\" Nord, 0° 31' 45\" Est","images":["../image/image_76/76_Sassetot_Mauconduit_1.jpg","../image/image_76/76_Sassetot_Mauconduit_2.jpg","../image/image_76/76_Sassetot_Mauconduit_3.jpg","../image/image_76/76_Sassetot_Mauconduit_4.jpg"]},"Consult_chateau_formulaire283f":{"id":"Consult_chateau_formulaire283f","dept":"76","canton":"Notre-Dame-de-Gravenchon","commune":"Saint-Aubin-de-Crétot,","nom":"St_Aubin_de_Crétot","type":"Châteaux","periode":"XV-XVI-XVII-XVIII","histoire":"cinq châteaux dans cet article; Picotières, Trouville, St-Aubin, Vièziaire et les Ormeaux.                                                                                                           PICOTIERES, ancien fief de Claville. A la fin du XIXe siècle, l'ensemble dont les parties les plus anciennes remontent au XVIIe siècle, est entièrement transformé. Près d'une mare devenue pièce d'eau maçonnée, une glacière est construite, bâtie en brique avec emploi ponctuel de silex encadrant l'entrée. La cuve conique est profonde de 3,50 métres pour un diamètre de 10 mètres. Elle est couverte d'une voûte de brique et conserve grille et échelle.  Éléments protégés MH : la glacière du château : inscription par arrêté du 3 août 2007.  Le château de Saint-Gilles-de-Crétot abrite, dans ses murs, la Mairie et un Musée.                                                                                      A cinq K.M de St-Aubin de Crétot TROUVILLE, la franche vavassorie de Trouville relevant d'Hallebosc est mentionnée en 1477, devenue quart de fief en 1503. Le château de Trouville a été construit dans la première moitié du XVIIIe siècle pour le Président de Coqueréaumont. Le bâtiment qui figure sur un plan de 1754 avec une avenue bordée d'arbres à l'ouest a été détruit vers 1870. Il subsiste les communs en brique et le colombier en assises alternées de silex blond et de brique, et la chapelle desaffectée. Un tumulus gallo-romain est conservé dans le parc du château. vestiges, qui a été résidence du maire Roger-Léon Anisson-Duperron.                                                     ST-AUBIN du CRETOT à 10  K.M.au sud -Est  château construit à la fin du XVIe siècle ; importantes restaurations en 1893 et 1894 par Bir, architecte à Paris et Cottard architecte à Bolbec, puis en 1903 par l'architecte René Martin. Le bâtiment de plan symétrique, se compose d'un étage carré, le gros oeuvre en brique, pierre, enduit partiel, brique avec pierre en remplissage et bossage, élévation ordonnancée surmontée de toit à longs pans brisés recouvert d'ardoises. L'ensemble comprend un parc un temple et des parties agricoles, de plan symétrique  à élévation ordonnancée  et un étage carré.","architecture":"ST-AUBIN  de Crétot, La terre de Crétot est une ancienne baronnie. Richard de Lucy était Baron Crétot en 1172.  le chateau conportant un seul étage  construit en brique et pierre au début du XVIIe siècle par la famille Lesueur de colleville. Abandonné à la Révolution, restauré en 1838 par R.L. Anisson du Perron, il appartient aujourd'hui à la colonie de vacances de Sarcelles.   Depuis 1991, le château, propriété de Didier et Jacqueline Baissas,                                                                               VIEZIAIRE,  fut construit, pour les Barons de Crestot qui portaient, depuis les premiers Ducs de Normandie, le titre de « Franc Bouteiller Hérédital de Normandie ». Le château de Saint-Gilles-de-Crétot a été construit dans la seconde moitié du XVIIIe siècle pour Jean-François Charles de Brihon. Le château actuel date du XVIIII mais il subsiste dun précédent édifice des bâtiments dexploitation et deux petits pavillons aux angles des murs denceinte, visibles depuis la rue. Le roi Henri IV est passé à Saint-Gilles-de-Crétot. Le château de la Viézaire est devenu une société Immobilière d'exploitation forestière agricole privée.                                                                                         A six K.M. l'ouest les ORMEAUX   a été construit pour Albert Lemonnier en 1824 à Lanquetot. Les dépendances ont été construites au milieu du XIXe siècle. Puis entre 1913 et 1954, il appartient à Marcel Catherine, propriétaire du tissage de Lanquetot. Le directeur du tissage y est logé jusqu'en 1937, lorsque l'usine est en partie fermée. Le logis est alors divsisé en logements, il est en brique enduite et pierre de taille calcaire; les dépendances en assises alternées de brique et silex ; le portail est en brique.","habitants":"Seigneurs locaux\"","divers":"cinq châteaux dans cet article; Picotières grav-2, Trouville grav-3, St-Aubin grav-1-5 Vièziaire-6 et les Ormeaux grav-4                 Viézaire GPS : 49° 33' 33' Nord, 0° 38' 43\" Est","gps":"49° 33' 33' Nord, 0° 38' 43\" Est","images":["../image/image_76/76_St_Aubin_de_Cr%c3%a9tot_1.jpg","../image/image_76/76_St_Aubin_de_Cr%c3%a9tot_2.jpg","../image/image_76/76_St_Aubin_de_Cr%c3%a9tot_3.jpg","../image/image_76/76_St_Aubin_de_Cr%c3%a9tot_4.jpg","../image/image_76/76_St_Aubin_de_Cr%c3%a9tot_5.jpg","../image/image_76/76_St_Aubin_de_Cr%c3%a9tot_6.jpg","../image/image_76/76_St_Aubin_de_Cr%c3%a9tot_7.jpg"]},"Consult_chateau_formulaire6423":{"id":"Consult_chateau_formulaire6423","dept":"76","canton":"Saint-Valery-en-Caux","commune":"St-Aubin sur mer","nom":"ST_Aubin_sur_Mer","type":"Château","periode":"XVIII","histoire":"SAINT-AUBIN  sur mer, du château primitif, mentionné en ruine en 1604, ne subsistent que deux niveaux de caves. Le logis est reconstruit limite XVIIe siècle XVIIIe siècle pour Auber de Daubeuf. Colombier  du XVIe siècle. Parties agricoles et logement du XVIIIe siècle. Logis en grès, silex et brique, pierre avec brique en remplissage; colombier en grès et silex; remise et écuries en brique et silex, brique avec pierre en remplissage ; logement en silex et brique ; parties agricoles en pan de bois et torchis.                                   Le château de Saint-Aubin-sur-Mer style Louis XIII appartenait au XVIIe siècle au Marquis Arnault  de Pomponne, ministre de Louis XIV, puis, au XVIIIe siècle, aux Choiseul-Gouffier. Le 6 juillet 1746, Gaspard Moïse de Fontainieu, intendant des meubles de la Couronne, et son épouse, Marie Anne Pollard de Villequay, le vendent à Marie Madeleine Marguerite Le Ber de Trouville, alors veuve de Thomas Caillot, seigneur de Coquereaumont, conseiller en la Chambre des Comptes de Normandie. A la mort de Cette dernière, en 1755, le domaine passe à son fils, Antoine Pierre Thomas Louis Caillot de Coquereaumont, président de la Cour des Comptes, Aides et Finances de Normandie, qui le vend le 22 mars 1765 à Charles Antoine de Gouffier, marquis d'Heilly, pour sa fille Adélaïde.\nAdélaïde de Gouffier épouse en 1771 Marie Gabriel Florent Auguste de Choiseul. Elle conserve Saint-Aubin jusqu'à sa mort, en 1816.   Depuis les années 1930, il appartient à la famille Saint-Pierre.","architecture":"SAINT AUBIN  sur mer, le château actuel   de plan rectangulaire entre deux pavillons de même niveaux  construit en brique,  en grès et brique roses, en pierre et silex.  corps de logis central à deux niveaux\nIl est précédé par une avenue plantée d'arbres. Son parc jouxte le littorale. Saint-Aubin-sur:-Mer et du colombier sont inscrits aux M.H. depuis le 15/06/1976. Il est classé aux M.H. depuis 1948. \nÉléments protégés MH : les façades et les toitures du château et du colombier : inscription par arrêté du 15 juin 1976.","habitants":"Famille d'Auber de Daubeuf\"","divers":"St-Aubin GPS : 49° 53' 18\" Nord, 0° 52' 49\" Est","gps":"49° 53' 18\" Nord, 0° 52' 49\" Est","images":["../image/image_76/76_ST_Aubin_sur_Mer_1.jpg","../image/image_76/76_ST_Aubin_sur_Mer_2.jpg"]},"Consult_chateau_formulaire0dce":{"id":"Consult_chateau_formulaire0dce","dept":"76","canton":"Bolbec","commune":"Saint-Eustache-la-Forêt","nom":"St_Eustache_la_Forêt","type":"Châteaux","periode":"XV-XVI-XVII-XVIII","histoire":"Quatre châteaux dans cet article; Petite Croix, Val d'Arques,  St-Eustache et St-Antoine.                                                                                                               PETITE-CROIX, en 1195, deux cent acres de terre sont données aux religieux du Valasse (Gruchele-Valasse). Au XIIe siècle, elles appartiennent a Renaud de Dammartin, comte de Boulogne. En 1471, Robin de la Croix en hérite du prêtre Jean le Forestier. En 1497, son gendre Cardin Barbey possède le domaine qui reste dans la famille jusqu'a la révocation de l'Edit de Nantes. En 1691, il est acheté apres avoir été décrété, par Francois Eustache de Vauclair, auditeur de la chambre des comptes de Normandie. Le logis a été construit dans le troisième quart du XVIIIe siècle,  pour Francois Antoine Eustache, petit-fils du précédent. L'acte de vente de 1822 à Charles Isambart Busquet de Caumont cite un manoir ayant précédé le château dont il ne resterait que le soubassement. Vers 1920, le compositeur André Caplet, locataire de la famille Berquier, y compose la messe des Petits Chanteurs de Saint-Eustache. Le corps de logis est en brique et pierre ; le logis de la ferme en rez-de-chaussée est en pan de bois, les dépendances sont en assises alteernées de brique orange et de silex. Éléments protégés MH : les façades et les toitures du château : inscription par arrêté du 21 mars 1963.                                                                                   VAL d'ARQUES, est un ensemble architectural fin XVIe siècle-début XVIIe siècle, composé d'un château entouré de ses bâtiments, puits du XVe siècle. Dans un clos masure typique du Pays de Caux, le seul à être en fer à cheval, parc classique, verger, potager et mare.Le colombier datant de 1610 accompagne noblement le château du Val d'Arques.  Briques roses de saint Jean, pierre en chaîne harpée et appareillage de silex taillés noirs apportent couleur et élégance typique de la polychromie Cauchoise.  Éléments protégés MH : les façades et les toitures du château et des cinq bâtiments agricoles en dépendant : charreterie, étable, grange, pigeonnier et puits : classement par arrêté du 12 avril 1972.","architecture":"St-EUSTACHE, il date du XVIIIe siècle. Le château de Saint-Eustache accueillera, pour la première fois, des visiteurs dans le cadre de la 37è édition des Journées du Patrimoine. Le château de Saint-Eustache-la-Forêt témoigne de ce quétait cette élégante demeure de plaisance, construite au milieu du XVIIIe siècle, pour un membre du Parlement de Rouen. Son architecture extérieure, comme ses aménagements intérieurs, ont certes connu les vicissitudes de l'histoire, mais il a su garder la splendeur de son origine, pour demeurer, jusquà aujourdhui, un émouvant témoignage dun certain « Art de vivre » au Siècle des Lumières. Les visiteurs y trouveront nombre déléments architecturaux remarquables de lépoque de sa construction. Avant daccéder au château, ils découvriront lallée spectaculaire difs et de buis taillés, encadrés par quatre pots-à-feu contemporains de la maison. Ce décor conduit le regard vers la façade classique du château, au bout de la perspective.                                                                                                               A quelques K.M. a l'est  SAINT-ANTOINE la Forêt le château a été construit au XVIIe siècle pour la famille protestante Desmaretz. Les baies du rez de chaussée ont été remaniées au XVIIIe siècle ainsi que la toiture qui a reçu un comble à brisis. La ferme a une grange à manège du XIXe siècle. Le logis est en brique avec décor de losanges et chaînes harpées calcaire; les ailes et les communs ont des assises alternées de calcaire et de brique; cave voûtée en berceau surbaissé ; la grange est en assises alternées de silex et de calcaire et le manège  en  planches.","habitants":"la croix; famille de la croix\"","divers":"Quatre châteaux dans cet article; Petite Croix grav--2-3, Val d'Arques  grav-1,  St-Eustache et St-Antoine grav_4.                                                                           st-Eustache GPS : 49° 33' 09\" Nord, 0° 27' 06\" Est","gps":"49° 33' 09\" Nord, 0° 27' 06\" Est","images":["../image/image_76/76_St_Eustache_la_For%c3%aat_1.jpg","../image/image_76/76_St_Eustache_la_For%c3%aat_2.jpg","../image/image_76/76_St_Eustache_la_For%c3%aat_3.jpg","../image/image_76/76_St_Eustache_la_For%c3%aat_4.jpg"]},"Consult_chateau_formulaire2f07":{"id":"Consult_chateau_formulaire2f07","dept":"76","canton":"Notre-Dame-de-Bondeville","commune":"St Jean du Cardonnay","nom":"St_Jean_du_ Cardonnay","type":"château","periode":"XVII-XIX","histoire":"ST_JEAN du CARDONNAY, habité par la famille d'Herbouville au XVIIe siècle, la propriété appartenait au prince Henri de Polignac au début du XXe siècle, pendant la première guerre mondiale, il appartenait au 103e régiment d'infanterie et fut tué en septembre 1915 à Auberive-en-Champagne. Au milieu du XXe siècle, le château de Saint Jean du Cardonnay appartenait à la princesse de Polignac, les familles dHerbouville, de Crillon, de Polignac furent successivement les propriétaires du château qui a beaucoup souffert pendant la Seconde Guerre Mondiale. Les bombardements aériens des 28 juin et 4 août 1944 visaient la destruction dune rampe de lancement de installée dans le parc. Le dernier des seigneurs dHerbouville, Charles-Joseph Fortuné et sa femme sont inhumés dans le caveau de la chapelle. Le Duc Héracle de Polignac, Maire de Saint Jean du Cardonnay jusquen 1917 y repose aussi, ainsi que dautres membres de la famille des Polignac, aujourd'hui appartient à la princesse de Polignac.","architecture":"ST_JEAN du CARDONNAY, le château a été en grande partie reconstruit à l'époque Louis XIII, mais il reste quelques vestiges de l'ancien château où Henri IV y aurait logé.  Le centre du château a été rebâti au début du XVIIe siècle sur lemplacement  dun manoir seigneurial et dune chapelle édifiés à la fin du XIVe siècle par Guillaume de Croixmare, vicomte de Roumare et seigneur de Saint Jean du Cardonnay. Actuellement seul subsiste le corps de logis du milieu datant du règne dHenry IV.  de plan régulier, élévation ordonnancée de deux étages carrés ; étage de comble, toit à longs pans ; croupe ; toit en pavillon. Couverture  en  ardoise.","habitants":"famille dHerbouville\"","divers":"Château de St Jean du Cardonnay","gps":"","images":["../image/image_76/76_St_Jean_du_Cardonnay_1.jpg","../image/image_76/76_St_Jean_du_Cardonnay_2.jpg"]},"Consult_chateau_formulaire0535":{"id":"Consult_chateau_formulaire0535","dept":"76","canton":"Saint-Valery-en-Caux","commune":"ST-Martin aux Buneaux","nom":"ST_Martin_aux_Buneaux","type":"Châteaux","periode":"XVII","histoire":"ST-MARTIN aux BUNEAUX, portail en maçonnerie du XVIe siècle, château construit dans la deuxième moitié du XVIIe siècle, ailes du château et parties agricoles datent du XIXe siècle.","architecture":"ST-MARTIN aux BUNEAUX, édifice composé d'un étage carré, un sous-sol et un étage de comble, gros oeuvre: grès; brique; appareil mixte, élévation ordonnancée, surmontée d'un toit à longs pans, croupe, toit en pavillon et couvert d'ardoise. Parties constituantes : le jardin, le logement et les parties agricoles. Le château possède un puit marin, un logement, un jardin et des parties agricoles.","habitants":"famille de Nourry\"","divers":"ST-Martin   GPS : 49° 49' 33\" Nord, 0° 33' 13\" Est","gps":"49° 49' 33\" Nord, 0° 33' 13\" Est","images":["../image/image_76/76_ST_Martin_aux_Buneaux_1.jpg","../image/image_76/76_ST_Martin_aux_Buneaux_2.jpg"]},"Consult_chateau_formulairea6f2":{"id":"Consult_chateau_formulairea6f2","dept":"76","canton":"Bolbec","commune":"Tancarville","nom":"Tancarville","type":"Châteaux","periode":"XII-XVII","histoire":"Trois châteaux dans cet article Camp-blanc, Cramesville à Lillebonne  et Tancarville                                                                                                          CRAMESVILLE    à St-Vincent Cramesnil village voisin  Plein fief relevant de Tancarville attesté en 1318. Château bâti au XVIIe siècle, subsiste de cette époque le soubassement. Reconstruit au milieu du XVIIIe siècle et les dépendances construites au XIXe siècle. Colombier portant, avant l'effondrement de la porte, la date 1722 et les armes des Malet de Graville. Les dépendances du XVIIIe siècle sont en très mauvais état. Logis avec élévation est en brique et pierre et élévation ouest en pierre de taille calcaire; campanile et horloge au pied du mur sud; colombier édifié en silex avec chaînes harpées de calcaire et décor de losanges et cercles calcaire avec remplissage de brique ; dépendances en brique orange avec chaînes et baies en calcaire.                                                                                                               a 15 K.M. au nord de Tancarville CAMP BLANC a été construit en 1896 par l'architecte Auguste Boeswillwald pour la famille d'industriels textile les Lemaître. Le château est bâti en brique rouge et blanche avec décor de brique noire et blanche vernissée. Les écuries et la remise sont en silex et brique. L'édifice se compose d'un sous-sol, d'un étage carré et d'un étage en surcroît, élévation à travées, surmontée d'un toit à longs pans brisés, croupe et demi croupe couverts d'ardoise. Propriété possédant un parc, un verger, des écuries et une remise.                                                                 TANCARVILLE, un premier château a été fondé pour un seigneur nommé Tancrède qui a donné son nom au château fort construit sur un éperon dominant la Seine pour Raoul de Tancarville, chambellan de Guillaume Le Conquérant au XIe siècle, dont il subsiste la tour carrée. Reconstruit au XIIe siècle, toujours pour les sires de Tancarville, chapelle Saint-Michel dédiée en 1267, ouvrage d'entrée et chapelle du XVe siècle. Un château neuf est construit dans les vestiges du premier, avec des écuries de 1709 à 1717 pour Louis de la Tour d'Auvergne, comte d'Evreux, ce château est pillé et endommagé à la Révolution. En 1793 le château-fort et ses fortifications sont signalés dans un état de vétusté qui les rendent impraticables le château neuf est restauré au milieu du XIXe siècle pour le comte de Lambertye.Éléments protégés MH : le château de Tancarville : classement par liste de 1862.","architecture":"TANCARVILLE, date du XIe siècle. Cet ancien château fort est de style Médiéval.   fit construire des murailles et la vieille tour. Au XIIe siècle, est construite la tour carrée dont les murs font 1,65 mètre d'épaisseur. En 1316, Jeanne de Tancarville, unique héritière, épouse Jean II de Melun. Son fils devient le second comte de Tancarville, en 1364 le Comté de Tancarville est séparé de celui de Longueville. En 1417, la comtesse Marguerite se marie avec Jacques d'Harcourt. En 1418 au moment de la conquête de la Normandie par Henri V d'Angleterre, le titre de comte de Tancarville, il est donné à Jean de Gray (John Grey), tandis que dans le royaume de France il était porté par la Famille d'Harcourt qui va récupérer le château de Tancarville, après le départ des Anglais. En 1468, une salle de réception est construite. Le fils du grand Dunois en hérita en 1488. En 1505, le roi de France Louis XII érigea le comté de Longueville en Duché de Longueville et Tancarville n'est plus qu'un comté annexe. En 1709, une partie, de style classique est adjointe aux parties médiévales de l'édifice par le comte d'Évreux. Après 1789, le château de Tancarville fut pillé et en partie incendié. En 1960, le château de Tancarville servit, de Colonie de vacances, pour les enfants de la région.  Il  appartient, aujourd'hui, à la société Civile Immobilière de Figeac, la SCI SAQQARA (Lot), qui  du aménager des appartements de luxe, il  a été classé aux M.H. en 1862.","habitants":"Tancarville Raoul de Tancarville                                                                                                     Camp famille des Lemaîtres\"","divers":"trois châteaux dans cet article Camp-Blanc à Lillebonne  et Tancarville  grav-1-2-3-4-5-6                     GPS : 49° 29' 02,19\" Nord, 0° 27' 51,59\" Est","gps":"49° 29' 02,19\" Nord, 0° 27' 51,59\" Est","images":["../image/image_76/76_Tancarville_1.jpg","../image/image_76/76_Tancarville_2.jpg","../image/image_76/76_Tancarville_3.jpg","../image/image_76/76_Tancarville_4.jpg","../image/image_76/76_Tancarville_5.jpg","../image/image_76/76_Tancarville_6.jpg"]},"Consult_chateau_formulaireb0bf":{"id":"Consult_chateau_formulaireb0bf","dept":"76","canton":"Bouville","commune":"Bourville","nom":"Tonneville","type":"Château","periode":"XVII","histoire":"TONNEVILLE, Il est construit dans la seconde moitié du XVIIe siècle de style Louis XV, avec corps de logis, remise et écuries. Au milieu du XIXème siècle, la partie du corps de logis située à l'Ouest du pavillon central est reprise et un logement est édifié. L'édifice, de plan symétrique, se compose d'un étage carré et d'un étage de comble, le gros-uvre est en grès, brique et pierre avec brique en remplissage, lélévation ordonnancée est  surmontée d'un toit à longs pans brisés, pignon couvert, croupe et toit à longs pans, recouverts d'ardoise.  Il est la propriété de la Famille Fitz-James, puis de la Famille Labarbe. La veuve de son dernier propriétaire, Alfred Labarbe (+1883), dont les enfants sont déjà décédés, lègue le château au Département à sa mort en 1898. Le testament stipule que le Département doit y installer un hospice.  A partir de juin 1902, lhôpital-hospice Labarbe accueille des personnes âgées. En 1914, il est utilisé comme hôpital bénévole pour accueillir les soldats blessés pendant la Grande Guerre. Il ferme ses portes à la fin des années 1980 pour des raisons de sécurité, les travaux de mise aux normes étant trop onéreux. Une expertise réalisée en 1993 affirme que le bâtiment nest pas à labandon mais que de nombreux travaux sont à prévoir pour le réutiliser. Jean Pascal et Loraine Tranié l'achètent au Département et le rénovent au début du XXIème siècle.  Une croix de chemin du XVIème siècle, en grès et pierre de taille,  porte les armes de la Famille de Tonneville.","architecture":"A cinq K.M.à l'ouest à Bourville; TONNEVILLE, château de style Louis XV, ancien domaine des Fitz James, avec corps de logis, remise, écuries construits dans la deuxième moitié du XVIIe siècle; la partie du corps de logis située à l'ouest du pavillon central a été reprise dans la deuxième moitié du XIXe siècle ; logement éfifié dans la seconde moitié du XIXe siècle également. L'édifice, de plan symétrique, se compose d'un étage carré et d'un étage de comble, le gros-oeuvre en grès, brique et pierre avec brique en remplissage, élévation ordonnancée surmontée d'un toit à longs pans brisés, pignon couvert, croupe et toit à longs pans, recouverts d'ardoise","habitants":"Tonneville, famille de  des Fitz James\"","divers":"Château de Tonneville à Bouville","gps":"","images":["../image/image_76/76_Tonneville_1.jpg","../image/image_76/76_Tonneville_2.jpg"]},"Consult_chateau_formulaireec8e":{"id":"Consult_chateau_formulaireec8e","dept":"76","canton":"Port-Jérôme-sur-Seine","commune":"Triquerville","nom":"Triquerville","type":"Château","periode":"XVI","histoire":"TRIQUERVILLE, le château de Triquerville est attesté au XIIIe siècle comme appartenant à la famille de Sorenc puis au XVIe siècle à la Desmares de Trébons,. En 1634, le domaine de Triquerville est saisi et acquis par Pierre II de Mesnil Costé, conseiller au parlement de Normandie qui fait construire le château dont il reste le pavillon du régisseur et le colombier.","architecture":"TRIQUERVILLE, en 1717 est signalée une chapelle domestique attenante à la grange et couverte en paille. En 1802, le régisseur incendie le château de Triquerville au retour d'émigration du propriétaire. Une chapelle est reconstruite en 1850. Le logis actuel a été construit en 1863. Un haras a été installé vers 1930. Le pavillon du régisseur et le logis en brique et pierre, les écuries couvertes d'un enduit faux pan de bois, le colombier rond est en brique avec soubassement de calcaire ; les écuries sont couvertes d'un enduit faux pan de bois.  Éléments protégés MH : les façades et les toitures du pavillon Louis XIII ; le pigeonnier cylindrique : inscription par arrêté du 29 octobre 1968.","habitants":"Famille de Desmares de Trébons\"","divers":"Château deTriquerville","gps":"","images":["../image/image_76/76_Triquerville_1.jpg"]},"Consult_chateau_formulaire58de":{"id":"Consult_chateau_formulaire58de","dept":"76","canton":"Saint-Romain-de-Colbosc","commune":"Grainville-Ymauville","nom":"Trébons","type":"Châteaux","periode":"XVII","histoire":"TREBONS   demeure édifiée dans les années 1760 par l'architecte rouennais Joseph Abel Couture, qui donna également le tracé du parc, pour les Desmares de Trébons, dont les ancêtres étaient titulaires du fief depuis le XVIe siècle.","architecture":"TREBONS , entièrement construit en pierre de taille, le château conserve l'essentiel des aménagements intérieurs, décors de la seconde moitié du XVIIIe siècle, cette oeuvre de Couture a été mise en place sur une structure antérieure d'enclos manorial, et dont restent l'organisation générale de la cour avec bâtiments agricoles adossés à l'enceinte, d'importantes portions de l'ancienne enceinte avec les tourelles et une partie des caves du château. L'agrandissement du domaine dans ses limites actuelles a été réalisé entre 1781 et 1826. Un incendie est survenu le 13 décembre 2008, détruisant charpentes et couvertures, mais épargnant l'essentiel du décor intérieur. Dans l'oeuvre de Couture élève de Carpentier, qui réalisa la construction de châteaux en Normandie, Trébons est le mieux conservé et constitue un témoignage à préserver.","habitants":"Famille de  Desmares de Trébons,\"","divers":"Trébons à Grainville-Ymauville","gps":"","images":["../image/image_76/76_Tr%c3%a9bons_1.jpg"]},"Consult_chateau_formulaire6f13":{"id":"Consult_chateau_formulaire6f13","dept":"76","canton":"Caudebec-lès-Elbeuf","commune":"Sotteville-sous-le-Val","nom":"Val_Freneuse","type":"Château","periode":"XVII","histoire":"VAL-FRENEUSE, a été construit au XVIIe siècle pour les parlementaires.  Le Cornier ;pour un membre de la famille de conseillers au parlement de Rouen. Au XIXe siècle l'édifice appartient à une famille de drapiers d'Elbeuf.","architecture":"VAL-FRENEUSE, l'édifice est construit en pierre, brique, ciment et silex.\nL'entrée de l'édifice comporte un blason. Des boiseries sont présentes.Une chapelle est construite au XIXe siècle elle a été aménagée au XIXe siècle dans les communs.  Éléments protégés MH : les façades et les toitures du château et des communs ; la grille d'entrée ; les pièces suivantes avec leur décor : le petit salon et le grand salon et le bureau-bibliothèque au rez de chaussée ; la chambre nord-ouest au premier étage et la chapelle aménagée dans les communs : inscription par arrêté du 21 décembre 1977. La chapelle de style néo-gothique conserve des boiseries.","habitants":"Seigneurs local\"","divers":"Val_Freneuse à  Sotteville-sous-le-Val    49° 19' 00? N, 1° 05' 33? E","gps":"","images":["../image/image_76/76_Val_Freneuse_1.jpg"]},"Consult_chateau_formulaire9a54":{"id":"Consult_chateau_formulaire9a54","dept":"76","canton":"Fécamp","commune":"Valmont","nom":"Valmont","type":"Châteaux","periode":"XV-XVII","histoire":"VALMONT, citadelle de pierre plantée en 1096, des suites d'une nécessité pour Robert Courteheuse de sécuriser la côte contre une éventuelle invasion par son frère Guillaume Le Roux. Les deux frères voulaient réunifier l'héritage de Guillaume le Conquérant, à leur profit personnel. Il semble que ce soit Robert II, fils de Robert 1er d'Estouteville qui en soit chargé. Fidèle compagnons de Guillaume à Hastings, puis de Robert Courteheuse, leur fief d'origine est à Etouteville près d'Yvetot. En 1537, Adrienne dEstouteville fit construire laile Renaissance. En 1672 après la mort du dernier des Longuevlle  le duché de Estouteville passe de mains en mains, la duchesse  de Nemours, les Goyon-Matignon, les Grimaldi   Le château traversa sans dommage la Révolution. Propriété de la famille de Monaco jusquen 1805, en 1824  vendu au comte Hocquart.  Le professeur Odilon Marc Lannelongue, médecin de Léon Gambetta, et sa femme Marie, née Cibiel, fondatrice de l'hôpital portant son nom à Paris, furent les propriétaires du château de Valmont, de 1877 à 1911. Aujourdhui, les Cibiel, aux Lanelongue, le nouveau propriétaire a entrepris de grands travaux de rénovation. Le domaine a abrité pendant vingt ans un parc de loisirs mais est aujourdhui une propriété privée, le château est détruit en grande partie au XIXe siècle par le propriétaire du moment, le comte Hocquart, qui, voulant faire une habitation résidentielle, fit raser lenceinte, les tours, le pont-levis, la barbacane et la chapelle. Il eut même recours à un régiment dartillerie pour venir à bout de la vieille poterne si solidement bâtie. Enfin il appartient à la famille de la Morandière pendant des années. Puis la gestion en fut laissée à des comités dEntreprises qui en firent un parc de loisirs très réputé dans la région.","architecture":"VALMONT, d'ou leur nom. Le château de Valmont domine toujours le centre du village de ses puissants remparts de deux mètres d'épaisseur. Le bâtiment se distingue par une aile médiévale et une aile Renaissance.  Au Moyen-âge, le château occupait un site stratégique de première importance puisquil fait partie de la deuxième ligne de défense de la Normandie avec Harfleur et Mortemer. Le magnifique donjon carré date du XIIe siècle. Il est construit en briques et en silex placés en arêtes de poisson. Primitivement la citadelle ne possédait  pas de toit élevé mais peut-être crénelé. Au cours des siècles, le château de Valmont subit de nombreuses dégradations, notamment pendant la guerre de Cent Ans contre les Anglais. Seul le donjon résista en 1416, lors de la bataille de Valmont. Éléments protégés MH : le château, sauf parties classées : inscription par arrêté du 14 avril 1930. Les façades et les toitures; les pièces suivantes avec décor ou éléments de décor : chartrier (donjon) ; chapelle et cheminée du XVe siècle au rez-de-chaussée, chambre à alcôve, cheminée du XVe siècle et cheminée en pierre du XVIIIe siècle du salon au 1er étage, cheminée du XVe siècle de la grande pièce Ouest du 2e étage (vieux château) ; salle à manger, grand salon et petit salon Hocquart au rez-de-chaussée, chambre au 1er étage (côté Sud) avec boiseries et cheminée  : classement par arrêté du 30 mars 1976.","habitants":"Famille de Robert Courteheuse,                  famille de Monaco     \"","divers":"Valmont   GPS : 49° 44' 26,99\" Nord, 0° 30' 48,94\" Est","gps":"49° 44' 26,99\" Nord, 0° 30' 48,94\" Est","images":["../image/image_76/76_Valmont_1.jpg","../image/image_76/76_Valmont_2.jpg","../image/image_76/76_Valmont_3.jpg","../image/image_76/76_Valmont_4.jpg","../image/image_76/76_Valmont_5.jpg","../image/image_76/76_Valmont_6.jpg"]},"Consult_chateau_formulaire39bb-2":{"id":"Consult_chateau_formulaire39bb-2","dept":"76","canton":"Neufchâtel-en-Bray","commune":"Osmoy-Saint-Valery","nom":"Valouines","type":"Château","periode":"XVI-XVII","histoire":"VALOUINES, à la fin du XVIe siècle, construction de la ferme fortifiée par les seigneurs de Ricarville.  En 1930, le site est classé aux Monuments Historiques.   Au XXIe siècle, la découverte de l'extérieur depuis la route est libre et gratuite. La visite de la cour et des bâtiments est interdite car la ferme est une propriété privée habitée. Mais en ayant la politesse de demander l'accès à la cour, il est fort probable que vous n'ayez point un refus.  Le manoir est bâti en 1602 pour le seigneur de Ricarville. Au XVIIe siècle le site appartient à « un quart de fief de haubert ». Le manoir est classé comme monument historique le 11 février 1930.","architecture":"VALOUINES,  qu'après le XVe siècle, ce type de bâtiment ne pouvait plus être imaginé.  Voici un bâtiment construit au XVIe siècle avec les mêmes critères qu'au XIIe. cette construction n'est point médiévale et ne devrait pas apparaître dans ce blog. Mais la ferme-manoir de Valouine est l'exemple parfait que les hommes-bâtisseurs ne sont pas aussi rigides que les historiens avec leurs dates de début/fin. Ce n'est pas parce qu'un universitaire du  XIXe ou XXe siècle décrète une date de fin du Moyen Âge que les nouvelles constructions ont changé du jour au lendemain.  Maintenant la place à messire M.J.  L'ordonnancement des bâtiments respecte les préceptes de Charles Estienne et Olivier de Serre. Les éléments de l'exploitation occupent trois côtés et le logis le dernier côté. Une tour porche porte la date de construction de l'ensemble.  L'édifice est construit de pierre, silex et briques.  Le logis comporte deux tours et un escalier à double rampe. L'édifice possède encore un riche décor dont des fleurs de lys qui ont été effacées lors de la Révolution française.","habitants":"seigneur de Ricarville\"","divers":"Valouines à Osmoy-Saint-Valery","gps":"","images":["../image/image_76/76_Valouines_1.jpg","../image/image_76/76_Valouines_2.jpg"]},"Consult_chateau_formulaire11c0":{"id":"Consult_chateau_formulaire11c0","dept":"76","canton":"Dieppe","commune":"Varengeville sur mer","nom":"Varengeville","type":"Châteaux","periode":"XIX","histoire":"deux châteaux dans cet article ; Varengeville et Bois des Moutiers.                                    VARENGEVILLE SUR MER, la construction du manoir date du XIXe siècle. L'architecte était Lucien Lefort. Il a une superficie de 900 m2 entouré d'un parc arboré classé aux M.H.  Le château  est actuellement la propriété de la MATMUT (Assurances). Il a été construit par Gaston Le Breton à la fin du siècle dernier. Auparavant à son emplacement s'élevait un autre château dont il ne subsiste, aujourd'hui, que la chapelle et un pavillon de style Louis XIII dont la construction remonterait au XIIIe siècle. Le 15/02/1620, l'Abbaye de Jumièges vendit le château à Charles Duval, écuyer, seigneur de Coupeauville, à la charge d'être tenu de la Baronnie de Duclair, appartenant à cette abbaye. La construction de l'ancien château a été attribuée à Charles Duval qui décède à Varengeville le 15 janvier 1650. Il de
