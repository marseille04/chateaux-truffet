Marie.","gps":"","images":["../image/image_76/76_Allouville_Bellefosse_1.jpg"]},"Consult_chateau_formulairee780":{"id":"Consult_chateau_formulairee780","dept":"76","canton":"Yvetot","commune":"Ancretiéville Saint Victor","nom":"Ancretiéville_St_Victor","type":"Châteaux","periode":"XVIII","histoire":"Deux châteaux dans cet article ; Frettemeule et  Bourdainville. FRETTEMEULE   Le cadastre ancien montre, au milieu d'un vaste parc très structuré, le château du XVIIIe siècle, de plan symétrique : un corps central et deux pavillons perpendiculaires. Les seigneurs de Frettemeule ont été les Desprez du XVe au XVIIIe siècle qui ont construit ce château Louis XIV. A la veille de la Révolution, la seigneurie passe aux Garvey, gentilhommes dorigine irlandaise. Au début du XIXe siècle un sinistre a dû réduire ce bâtiment de moitié et entraîner un remaniement important. L'édifice de plan symétrique, se compose d'un sous sol, d'un étage carré et d'un étage de comble, le gros oeuvre en grès, calcaire et brique, élévation à travées surmontée d'un toit à longs pans, croupe et toit conique, couverts d'ardoise. Il est entouré d'un beau parc comprenant des communs, un pigeonnier et une charretterie.","architecture":"ANCRETIEVILLE   château du début du XVIIIe siècle, le château de Saint-Victor est classé monument historique. Les pièces intérieures sont décorées de magnifiques boiseries sculptées en chêne. La visite des caves permet de découvrir la vie domestique au XVIIIe siècle, fours à pain et à pâtisserie, buanderie, système de chauffage... Le colombier, aménagé en musée (anciens outils agricoles et horticoles), a été restauré et laisse entrevoir une charpente à double enrayure. Découverte du parc et des écuries.","habitants":"Famille Desprez\"","divers":"Deux châteaux dans cet article ; Frettemeule grav-2                                    st-Victor grav 3","gps":"","images":["../image/image_76/76_Ancreti%c3%a9ville_St_Victor_1.jpg","../image/image_76/76_Ancreti%c3%a9ville_St_Victor_2.jpg","../image/image_76/76_Ancreti%c3%a9ville_St_Victor_3.jpg"]},"Consult_chateau_formulaire20b6":{"id":"Consult_chateau_formulaire20b6","dept":"76","canton":"Saint-Romain-de-Colbosc","commune":"Angerville-Bailleul","nom":"Angerville_Bailleul","type":"Châteaux","periode":"XVI-XVIIi","histoire":"Trois châteaux dans cet article; Bailleul, Fiquainville et Hattenville                               BAILLEUL,   c'est un château de style Renaissance Italienne, construit en 1528, pour Bertrand de Bailleul, en avait fait sa demeure de plaisance, il hérite de la terre d'Angerville en 1543, et y accole son nom, Bailleul, d'où le nom d'Angerville-Bailleul,  La reine Marie Stuart aurait fait escale à Bailleul en 1561, lors de son retour d'Écosse.  Dans le parc, la chapelle gothique abrite un remarquable retable du XVe siècle, le château de Bailleul est resté dans la même famille depuis son origine. Éléments protégés MH : le domaine avec l'ensemble de la clôture et du bâti, les sols et plantations, ainsi que la grande perspective : inscription par arrêté du 28 juillet 2005. Le château en totalité : classement par arrêté du 8 juillet 2010. il appartient aujourd'hui à  Mme Kim Molzer née Qdile de Bailleul.                                                                                                                                         A cinq K.M. à l'est à Thiergeville le château de FIQUAINVILLE La construction du château de Fiquainville date du XVIIIe siècle.                                       et à 10 K. M. au sud est à HATTENVILLE, la construction du château de Hattenville date du XVIIe siècle, défiguré au XIXe siècle, a été, entièrement restauré.","architecture":"BAILLEUL, situé dans un enclos où existaient une chapelle et un colombier. L'ensemble a fait l'objet de profondes transformations dans la deuxième moitié du XVIIIe siècle. Une vaste composition régulière a été mise en place, avec plantations d'alignements et création d'une grande perspective, suivie de la réalisation d'un projet paysager en 1850. Une grande campagne de construction et de restauration a été réalisée de 1870 à 1890, donnant au domaine son aspect actuel.  Le château, de plan massé, est cantonné de pavillons carrés et présente un décor sculpté pourvues de combles en formes de hache, au centre du corps de logis, un portique à colonnes superposant les trois ordres dorique, ionique et corinthien encadre les ouvertures et se termine par une manière de campanile. Dans le parc, la chapelle gothique abrite un remarquable retable du XVe siècle. Entièrement construit en pierre, sur un large socle taluté, le corps de logis de plan carré est cantonné de 4 pavillons quandrangulaires, fortement saillants, dont les hauts toits sont surmontés de 4 statues symbolisant les quatre vertus cardinales. Les façades latérales sont percées de rares et petites ouvertures, et comportent chacune une loggia permettant l'accès d'un pavillon à l'autre. La sobriété des façades latérales contrastent avec la richesse architecturale des 2 autres façades, ornées de sculptures représentant les armoiries des marquis de Bailleul. L'intérieur du château, non ouvert à la visite, contient des détails architecturaux insolites en France, et typique de la Renaissance italienne, avec des plafonds en ogives et d'un escalier à double-révolution. La perspective du château se déploie sur plus d'1 km.","habitants":"Famille de Bertrand de Bailleul \"","divers":"Trois châteaux dans cet article; Bailleul grav 1-2, Fiquainville grav-3 et Hattenville grav-4  GPS : 49° 40' 27,12\" Nord, 0° 27' 00\" Est                                                         Fiquainville  GPS : 49° 43' 14\" Nord, 0° 29' 43\" Est                                                Hattenville GPS : 49° 39' 31,38\" Nord, 0° 32' 25,32\" Est","gps":"49° 40' 27,12\" Nord, 0° 27' 00\" Est","images":["../image/image_76/76_Angerville_Bailleul_1.jpg","../image/image_76/76_Angerville_Bailleul_2.jpg","../image/image_76/76_Angerville_Bailleul_3.jpg","../image/image_76/76_Angerville_Bailleul_4.jpg","../image/image_76/76_Angerville_Bailleul_5.jpg"]},"Consult_chateau_formulaire87e6":{"id":"Consult_chateau_formulaire87e6","dept":"76","canton":"Fécamp","commune":"Angerville la Martel","nom":"Angerville_la_Martel","type":"Châteaux","periode":"XV","histoire":"Quatre châteaux dans cet article; Angerville la Martel, Theuville aux Maillots; Daubuef et la Tour lanterne à Épreville\nANGERVILLE l'ancien château, édifié sur une motte et pourvu de tourelles, d'un pont-levis et de douves, existe encore en 1602. Sa reconstruction est entreprise quelques années plus tard par Charles de L'Estandard selon un grandiose plan en H. Ne fut-il que partiellement achevé, ou bien une partie fut-elle démolie plus tard.  Quoi qu'il en soit, il ne reste plus aujourd'hui qu'une seule aile de brique cantonnée de deux pavillons et, près de l'église, deux autres élégants pavillons à  pierres en bossage, manifestement prévus pour être rattachés aux précédents par un corps de logis qui manque.                                                                                                                              Manoir de DAUBEUF, date du XVe siècle. Reconstruit sur des bases beaucoup plus anciennes et plusieurs fois remaniée, cette maison allié tous les matériaux de construction cauchois: silex taillés jointifs au premier niveau et pans de bois à  l'étage, chaînages en brique, arc de porte en grès.","architecture":"Tour LANTERNE à Épreville, décidé à  bâtir un monument en souvenir de l'ancienne léproserie d'Épreville, l'abbé Maurice a l'idée de lui donner la forme d'une lanterne des morts, bien que cette tradition soit plus localisée dans l'ouest de la France (Vendée, Poitou) qu'en pays de Caux. De vieille tradition, les lanternes des morts sont érigées dans les cimetières, et un fanal est allumé à  leur sommet quand un décès survient dans la communauté.                                                                           A cinq K.M à l'ouest THEUVILLE aux Maillots au Moyen-Âge le bourg fait partie du Duché de Normandie. La terre est possédée par la famille seigneuriale des Maillots ou Maillets. Le château de Theuville a été construit à la fin du règne de Louis XIV. Il conserve de très belles boiseries. L'entrée est annoncée par deux tours, vestige bien entretenu de l'ancien château médiéval. La propriété de Theuville appartenait au milieu du XXe siècle au baron de Cools.","habitants":"Angerville Charles de L'Estandard                     famille seigneuriale des Maillots       \"","divers":"Quatre châteaux dans cet article; Angerville la Martel grav-1 et 6, Bailleul grav-2, Theuville aux Maillots grav-5 ; Daubuef grav-4 et la Tour lanterne grav-7","gps":"","images":["../image/image_76/76_Angerville_la_Martel_1.jpg","../image/image_76/76_Angerville_la_Martel_2.jpg","../image/image_76/76_Angerville_la_Martel_3.jpg","../image/image_76/76_Angerville_la_Martel_4.jpg","../image/image_76/76_Angerville_la_Martel_5.jpg","../image/image_76/76_Angerville_la_Martel_6.jpg","../image/image_76/76_Angerville_la_Martel_7.jpg"]},"Consult_chateau_formulaire1aea":{"id":"Consult_chateau_formulaire1aea","dept":"76","canton":"Saint-Valery-en-Caux","commune":"Angiens","nom":"Angiens","type":"Châteaux","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article; Iclon et Silleron.                                                          ICLON, aile ouest du logis, colombier, grange et étable à vaches édifiés dans la première  moitié du XVIIe siècle. Pavillons construits dans la deuxième moitié du XVIIe siècle. Corps principal du logis construit dans le deuxième quart du XVIIIe siècle: une des lucarnes porte l'inscription et la date \"morb 1730 pour René Baillard\". L'aile Est n'a jamais été construite: briques en attente. Le château se compose d'un sous-sol, un étage carré et un étage de comble, le gros-oeuvre en grès, brique, appareil mixte, pierre avec brique en remplissage et pierre de taille, élévation ordonnancée surmontée d'un toit à longs pans, pignon couvert, toit polygonal, couverts d'ardoise. Dans le parc on trouve un colombier circulaire en brique et grès, une charretterie, écurie et logement.","architecture":"SILLERON, à la fin du XVIe siècle ou au début du XVIIe, le manoir est implanté dans un enclos rectangulaire avec logis en brique et pierre à l'initiative de la famille Clécy, une des plus anciennes familles nobles du pays de Caux. Au cours du XVIIe siècle sont  construits à la suite du logis: un grand corps central en 1617, Flanqué de deux ailes, et deux pavillons plus bas, le porche à trois pavillons , Oeuvres de la famille de Toustain, passa à la famille de Faudoas, aux de Bagneux,  aux de Polignac puis aux comtes d'Eudeville. Une chapelle en 1640-1643 puis l'aile orientale, toujours en brique et pierre. De la même époque datent les éléments de l'enclos, notamment les deux portes monumentales et des bâtiments agricoles. En 1912 est bâtie l'aile ouest sur le modèle de l'aile est. Les intérieurs du logis sont modifiés par l'architecte Flavigny vers 1950. Silleron est représentatif d'une résidence de famille de la noblesse d'épée de l'Ancien Régime avec éléments architecturaux représentatifs, notamment la chapelle, l'enclos et les portes fortifiées. Éléments protégés MH : le château et son enclos castral (lieu-dit Silleron) avec l'ensemble de la clôture, des bâtiments et des aménagements de jardins et la mare, en totalité ; les bâtiments anciens de la ferme (lieu-dit Silleron), à l'exception de la grange sud-est : inscription par arrêté du 17 novembre 2008.","habitants":"Iclon;  René Baillard                                 Silleron   famille Clécy\"","divers":"Deux châteaux dans cet article; Iclon grav-3 et Silleron grav-1-2.       \ngps 49° 50' 00? nord, 0° 48' 42? est","gps":"","images":["../image/image_76/76_Angiens_1.jpg","../image/image_76/76_Angiens_2.jpg","../image/image_76/76_Angiens_3.jpg"]},"Consult_chateau_formulaire5f8e":{"id":"Consult_chateau_formulaire5f8e","dept":"76","canton":"Octeville-sur-Mer","commune":"Anglesqueville les  Murs","nom":"Anglesqueville_Murs","type":"Châteaux","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article; Anglesqueville et Angerval\n ANGLESQUEVILLE les  Murs   Fief mentionné en 1265. Logis construit vers 1690, à l'emplacement d'une ancienne forteresse, pour le chevalier de Miffant, chef d'escadre de la marine royale. Endommagé pendant la deuxième Guerre Mondiale, et restauré à partir de 1962. Le logement et les communs datent du XIXe siècle. Les parties agricoles du XVIIIe siècle. Il est principalement construit en briques claires dites de vase, fabriquées à Saint-Valery.  Éléments protégés , est un château bâti à Saint- Sylvain, La construction  date de 1694. Les périodes de construction datent du 4e quart du XVIIe siècle et du 1er quart du XVIIIe siècle. Les éléments protégés du château sont ses façades et toitures, les charpentes anciennes subsistantes et l'ancienne glacière dans le parc (inscription par arrêté du 8 février 1991), est inscrit aux M.H. le 8/02/1991.","architecture":"Le Château d'ANGERVAL est un château bâti à Ancretteville-sur-Mer,La construction du Château d'Angerval date du XVIIIe siècle.  Le chanoine dAngerval  né en 1723.   Jean Pierre Gommé dAngerval, sous diacre au diocèse de Rouen, devient le 2 juin 1746 chapelain, prieur pourvu de la chapelle Sainte-Marguerite en la paroisse de Toutainville ; prieur également de Notre-Dame des Bois près dHarfleur  En 1754 , il devient membre du chapitre de Rouen jusquen 1789, nommé avec une portion de Londinières le 20 mai 1754. Pendant la Terreur, courant 1794, le chanoine est hors détat de fuir et donc voit son mobilier vendu dans la rue.  Le 22 janvier 1797, mort  dAngerval chanoine de Rouen.    Le château dit « dAngerval » : du XVIIIe siècle en pierre et brique, construction en lanterne. Propriétaires successifs : La famille Gommé depuis lorigine ; par la suite M et Mme Xavier du Fayet de la Tour ; vendu par adjudication de Me Retout notaire à Valmont le 6 mai 1926 ; à Emile Liez, un fabricant de chapeaux à Paris ; revendu depuis.","habitants":"chevalier de Miffant  Famille Gommé\"","divers":"Deux châteaux dans cet article; Anglesqueville grav -3-4-5                      Angerval grav-1-2                                                         GPS : 49° 50' 47\" Nord, 0° 40' 25\" Est                                                                                              Angerval GPS : 49° 47' 21\" Nord, 0° 30' 44\" Est","gps":"49° 50' 47\" Nord, 0° 40' 25\" Est","images":["../image/image_76/76_Angles_1.jpg","../image/image_76/76_Angles_2.jpg","../image/image_76/76_Angles_3.jpg","../image/image_76/76_Angles_4.jpg","../image/image_76/76_Angles_5.jpg"]},"Consult_chateau_formulaired9f4":{"id":"Consult_chateau_formulaired9f4","dept":"76","canton":"Varengeville sur mer","commune":"Ango","nom":"Ango","type":"Manoir","periode":"XVI","histoire":"ANGO, Jean Ango, armateur, vicomte et gouverneur de Dieppe, conseiller maritime de François Ier, fait reconstruire le manoir entre 1530 et 1545 par des artistes italiens. Il l'habite comme résidence d'été jusqu'à sa mort en 1551. De la partie Est, il peut voir entrer et sortir ses bateaux du port de Dieppe, ce qui n'est plus possible à cause des nombreuses hêtraies. Lors de la venue à Dieppe, en 1534, du roi François Ier, il laccueillera à Varengeville, ainsi que dans son hôtel dieppois. Le manoir sera à demi ruiné par un incendie et converti en ferme au XIXe siècle.  Honoré de Balzac le mentionne dans son roman sur Catherine de Médicis comme « le splendide manoir d'Ango ». Des écrivains comme Louis Aragon ou André Breton y séjournent. André Breton y rédige notamment le récit Nadja durant le mois d'août 1927. De 1928 à 1976, le manoir est la propriété de M. et Mme Hugot-Gratry qui contribuent activement à la restauration du monument. Repris par la famille en 2008, il connait dimportants travaux de rénovation et est ouvert au public.","architecture":"ANGO, le manoir dAngo est un des rares exemples darchitecture Renaissance italienne en pays normand. Il est bâti avec des matériaux locaux : grès, briques, silex tirés des falaises. Le célèbre colombier, de tradition cauchoise, haut de onze mètres, est circulaire avec des décors géométriques polychromes, formés de bandes alternées de briques, silex, grès et calcaires. Il est couvert d'un toit à l'impériale, d'influence byzantine. Il contient 1 600 boulins, pouvant abriter jusqu'à 3 200 pigeons. Le droit de colombier étant un privilège de la noblesse, accordé à titre exceptionnel au puissant armateur Jean Ango. Un portail encadré de deux tourelles armées de quelques meurtrières commandent l'entrée du manoir à quatre bâtiments qui entourent la cour d'honneur en forme de rectangle. L'aile sud, abrite la partie noble avec sa loggia Renaissance aux arcades décorées de médaillons6 qui représentent François Ier, Ango, et leurs épouses. L'emblème de François Ier, la Salamandre, est sculptée dans les murs de laile Ouest.","habitants":"Famille de Jean Ango\"","divers":"domaine d'Ango à Varengeville sur mer                                                                    GPS : 49° 54' 02,23\" Nord et 0° 59' 49,21\" Est","gps":"49° 54' 02,23\" Nord et 0° 59' 49,21\" Est","images":["../image/image_76/76_Ango_1.jpg"]},"Consult_chateau_formulaire5b1d":{"id":"Consult_chateau_formulaire5b1d","dept":"76","canton":"Barentin","commune":"Templiers","nom":"Anneville_Ambourville","type":"Manoir","periode":"XIII","histoire":"Deux châteaux dans cet article, les Templiers et la Cheminée Tournante.  Des TEMPLIERS, La construction  date du XIIIe siècle. La tourelle du château a été ajoutée au XVe siècle. Elle abrite un petit musée d'histoire et d'archéologie locale (Musée Biochet-Bréchot) qui raconte, l'histoire de l'expédition du Latham de Guilbaud, disparu en mer de Barents avec Amundsen et qui présente également une épée viking draguée en Seine, ainsi qu'une collection de plaques de cheminée. Le château des Templiers a été classé aux M.H. en 1899. Devenu un musée, il est ouvert au Public.","architecture":"Le manoir de la Cheminée Tournante a été construit, en bord de Seine, au XVIIe siècle,  il est  composé d'un logis bas avec un fronton triangulaire, auquel sont accolés 2 pavillons plus élevés, prolongés par 2 ailes plus basses. Le manoir de la Cheminée-Tournante et ses dépendances sont inscrits au titre des Monuments Historiques depuis le 4/12/1991.","habitants":"Famille de    Latham de Guilbaud\"","divers":"Deux châteaux dans cet article, les Templiers grav-1-3-4    et la Cheminée Tournante grav-2.                                                                     GPS : 49° 27' 44\" Nord, 0° 53' 12\" Est                                                                  Cheminée  GPS : 49° 26' 28\" Nord, 0° 51' 42\"est","gps":"49° 27' 44\" Nord, 0° 53' 12\" Est","images":["../image/image_76/76_Anneville_Ambourville_1.jpg","../image/image_76/76_Anneville_Ambourville_2.jpg","../image/image_76/76_Anneville_Ambourville_3.jpg","../image/image_76/76_Anneville_Ambourville_4.jpg"]},"Consult_chateau_formulaireb670":{"id":"Consult_chateau_formulaireb670","dept":"76","canton":"Le Mesnil-Esnard","commune":"La Neuville Chant d","nom":"Anquetil","type":"Château","periode":"XIX","histoire":"ANQUETIL, en 1833, le Grand-Père de Maupassant fit l'acquisition d'une superficie de 130 ha sur laquelle il fit construire une demeure en 1835. Le domaine fut le rendez-vous de l'élite des sciences et des arts de Rouen. Gustave flaubert, ami intime de la famille, y séjourna souvent. Nul doute que le calme et la poésie du site ne l'aient inspiré dans ses oeuvres, qui chacun sait sont immortelles. En 1869 cette demeure bourgeoise fut rachetée par Louis Pottevin, peintre de son époque et cousin de l'écrivain Guy de Maupassant. Elle fut transformée en château en 1874 par l'architecte Janet. Le 24 juin 1969 s'y installait Jacques Anquetil.","architecture":"ANQUETIL, sa construction date du XIXe siècle. Le château Anquetil est en bas au Sud-Est du centre-bourg. Son propriétaire initial était Jules Maupassant  (1795-1875), entrepreneur de tabac, à Rouen, qui en avait fait son habitation principale. Il avait acheté le 10/12/1833 un domaine de 130 ha, la forêt de Longboël étant devenu un bien national. Ce n'est que 2 ans plus tard qu'il fera bâtir une maison à l'italienne. Divers artistes ont séjourné au château Anquetil, dont son petit-fils Guy de Maupassant et Gustave Flaubert. Le château sera racheté, en 1869, par Louis Pottevin, cousin de Guy de Maupassant et peintre. Celui-ci le revendra le 19/09/1872, à Mr Lenepveu-Decaux. Emile Janet, l'architecte fera quelques transformations, en 1874, dont le rajout d'un 2ème étage et d'une aile. Le 28/06/1924, Mr Lenepveu-Decaux revendra le château Anquetil à Jacques Wattebled. Une nouvelle fois, le château changea de main, en 1961, et fut racheté par le célèbre coureur cycliste, Jacques Anquetil (1934-1987) qui viendra y vivre, en 1969. Le château Anquetil sera renommé le Château des Elfes. Aujourd'hui, le château Anquetil vous propose ses chambres d'hôtes et son gîte.","habitants":"Famille de jules de  Maupassant\"","divers":"Château D'Anquetil  GPS : 49° 22' 07\" Nord, 1° 14' 38\" Est","gps":"49° 22' 07\" Nord, 1° 14' 38\" Est","images":["../image/image_76/76_Anquetil_1.jpg"]},"Consult_chateau_formulaire39e9":{"id":"Consult_chateau_formulaire39e9","dept":"76","canton":"Saint-Romain-de-Colbosc","commune":"Saint-Laurent-de-Brèvedent","nom":"Aplemont","type":"Château","periode":"XVII","histoire":"APLEMONT, après 1598, la famille Dumé acquiert la Vavassorie d'Aplemont. Manoir sans doute construit dans le troisième quart du XVIIe siècle pour Nicolas Leroy Dumé d'Aplemont, mort en 1655. En 1659, Nicolas II Dumé demande l'autorisation de rétablir une chapelle. Avant 1748, Charles de Houdetot fait rétablir la chapelle au premier étage du logis. En 1754, Charles Louis de Houdetot, son fils, fait détruire le manoir et le remplace par un château avec une cour d'honneur, qui conçu sur un plan très grand ne fut pas achevé, chapelle à l'est du château en pierre de 11 pieds carré.","architecture":"APLEMONT  ceinture de haute futaie dit la Chênée d'Aplemont plantée en 1749. Puis démolition en 1830 du logis de 1754 et construction du château actuel sur un autre emplacement au centre du clos masure. Remise et écuries construites au XIXe siècle, le colombier du XVIIe siècle, situé à l'est du manoir primitif sur le cadastre de 1822, a été remonté ensuite dans la ferme à l'ouest. Remise et écuries construites au XIXe siècle. Logis actuel enduit ; logement, remise et écuries en brique ; colombier en brique avec chaînes harpées en calcaire et lucarnes à ailerons.","habitants":"Famille de Nicolas Leroy Dumé d'Aplemont\"","divers":"Château d'Aplemont à Saint-Laurent-de-Brèvedent","gps":"","images":["../image/image_76/76_Aplemont_1.jpg"]},"Consult_chateau_formulaire8f38":{"id":"Consult_chateau_formulaire8f38","dept":"76","canton":"Gournay-en-Bray","commune":"Argueil","nom":"Argueil","type":"Château","periode":"XV","histoire":"ARGUEIL   lorsque Philippe Auguste sempara dArgueil et lintégra au domaine royal, il fit raser cette place forte et le village sinstalla dans le vallon traversé par la Roulée. Au premier château en bois succéda une ferme seigneuriale construite au XVe siècle. A cette époque la terre d'Argueil appartenait à la famille de Bricqueville. La famille de Castelbajac, propriétaire des lieux, ayant perdu les moyens dentretenir l'édifice, le rachat dans les années 1980 devenait inévitable. En 2007 Villages Okaya acheta le site pour lui donner un nouveau souffle et continuer à accueillir des jeunes de toute la France. Le centre fut officiellement inauguré le 18 avril 2008.","architecture":"ARGUEIL   le château actuel comporte un donjon du XVe siècle flanqué de quatre tourelles, le tout bâti en brique avec des assises de pierre blanche, et deux ailes du XVIIe siècle. Le parc du manoir est inscrit au pré-inventaire des jardins remarquables.   Accueille des enfants, adolescents pour des classes de découvertes à thèmes.","habitants":"famille de Castelbajac,\"","divers":"Château d'Argueil à Argueil                       GPS : 49° 32' 30\" Nord et 1° 30' 57\" Est","gps":"49° 32' 30\" Nord et 1° 30' 57\" Est","images":["../image/image_76/76_Argueil_1.jpg","../image/image_76/76_Argueil_2.jpg","../image/image_76/76_Argueil_3.jpg"]},"Consult_chateau_formulaire67ba":{"id":"Consult_chateau_formulaire67ba","dept":"76","canton":"Saint-Valery-en-Caux","commune":"Auberville-la-Manuel","nom":"Auberville","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux dans cet article Auberville et Veulettes.                            AUBERVILLE, la construction du château d'Auberville date du XVe et XVIe siècle. Il a été remanié, et se situe dans un enclos rectangulaire avec des tourelles. et agrémenté d'un important pavillon d'entrée avec des épis dus à Ferdinand Marrou. IL possède aussi un colombier. Le château est situé à l'Ouest de la paroisse. Le hâteau d'Auberville est inscrit aux M.H. depuis le 14/04/1930. Il est privé, fermé au Public                                                                                                                                                         A cinq K.M au nord à VEULETTES sur mer, c'est un beau château du XIXe siècle, trans formé en hôtel","architecture":"AUBERVILLE,  logis construit au XVe siècle et XVIe siècle, le portail du XVIe siècle et XVIIe siècle, la charretterie porte la date 1633, le colombier date du XVIIe siècle. Gros oeuvre : grès; silex; brique; bois; appareil mixte; pierre de taille; bossage; moellon; pan de bois; enduit partiel, élévation ordonnancée, un étage carré , étage de comble,  couverture ardoise; tuile plate.Typologie : pan de bois à grille ; croix de saint André ; portail en maçonnerie ; silex appareillé ; décor de silex, appareil en damier ; fer de hache ; décor de brique émaillée ; colombier circulaire. Éléments protégés MH : le château d'Auberville en totalité : inscription par arrêté du 14 avril 1930.","habitants":"Seigneur local\"","divers":"Deux châteaux dans cet article Auberville grav 1-2-3 et Veulettes grav-4.                                                           Auberville   GPS : 49° 49' 43\" Nord, 0° 35' 22\" Est                                               Veulettes GPS : 49° 50' 52\" Nord, 0° 35' 49\" Est","gps":"49° 49' 43\" Nord, 0° 35' 22\" Est","images":["../image/image_76/76_Auberville_1.jpg","../image/image_76/76_Auberville_2.jpg","../image/image_76/76_Auberville_3.jpg"]},"Consult_chateau_formulaire2e8b":{"id":"Consult_chateau_formulaire2e8b","dept":"76","canton":"Luneray","commune":"Auffay","nom":"Auffay","type":"Châteaux","periode":"XVI-XVIII","histoire":"Deux châteaux dans cet article d'Auffay, Bosmelet et Guerrots.                                                           BOSMELET, le château a été construit vers 1632, par Richard d'Heugleville, pour Jean Beuzelin, parlementaire rouennais. Il est de style Louis XIII.  En 1698 Anne-Marie de Buzelin apporte en dot au duc de la Force qui était Gouverneur de Normandie.   En 1752 à la mort de la duchesse de la Fosse le château revient à Thomas du Fossé, descendant de Beuzelin. Très restauré au XIXe siècle. Gravement endommagé pendant la dernière guerre et restauré, la maison du chapelain et la chapelle, Plus de 900 variétés de fruits, de légumes et de fleurs le composent sur près d'un hectare.  Hugues MERLET fit ériger, au XIe siècle, un petit manoir sur cette terre \"Le Bois de Merlet\".                                                                                                                                                                      GUERROTS appelé le Manoir de la Motte est un château bâti au hameau de Longtuit à Heugleville-sur-Scie. La construction du château date des XVIII au XXe siècles. L'édifice que l'on parçoit aujourd'hui date de 1750-1760. Il est reconstruit à l'emplacement du château initial détruit par un incendie.  Amable Jean-Baptiste Le Filleul de La Hélinière. M Désiré-François dit le Florian de la Normandie Le Filleul des Guerrots, seigneur des Guerrots 1778-1857. M Alexandre-Emmanuel.  Le Filleul de Longhuit 1780-1860 ,  Amable-Désirée Le Filleul de La Hélinière 1782-1814 Éléonore Adélaïde Duval d'Amonville épouse de Raoul de Sonning  Françoise Demoiselle d'Amonville Duval  1724-1783  Married 20 Juin 1758, Notre-Dame, Calais (62),  Henry Charles Armand seigneur des Barraux de Guizelin, sgr d'Azuingle  1719-1784.","architecture":"BOSMELET, Logis rectangulaire en pierre et brique, sur un des côtés, tours rondes et au milieu de la façade tour d'escalier polygonale.Reconstruit par Jean d'Oudetot vers le milieu XVe siècle, remanié à la Renaissance vers 1553. Le parc est ordonnancé selon un projet de Collinet en 1715, partiellement réalisé, dont seules subsistent les grandes lignes. Les bâtiments sont des XVIIe et XVIIIe siècles. Très restauré au XIXe siècle. Gravement endommagé pendant la dernière guerre et restauré,   le château de Bosmelet fut éventré en février 1944, alors que les Allemands installaient dans son parc une base de lancement de V1. Il a été depuis, restauré à l'identique avec son parc et son potager. Jean Beuzelin fit construire le château actuel, en 1632. Il a reçu le Label « Jardin Remarquable ». On s'en approche grace à une belle allée, composée de 167 arbres , d'après les projets de Colinet, 1er jardinier de Le Nôtre, en 1715.  éments protégés MH : le château (sauf parties classées) : inscription par arrêté du 7 octobre 1931. Les façades et les toitures du château : classement par arrêté du 30 juillet 1946. Les façades et les toitures de la maison du chapelain, de la chapelle et des communs ; les murs, le saut-de-loup, les grilles et les bassins de la cour d'honneur, du potager et des avants-cours entourant le château ; la pièce d'eau : inscription par arrêté du 15 novembre 1994.","habitants":"Bosmelet, famille de Jean Beuzelin\"","divers":"Deux châteaux dans cet article Bosmelet grav-1 et Guerrots grav-2                                    GPS : 49° 42' 3,96\" Nord, 1° 07' 39,72\" Est\nGuerrots GPS : 49° 43' 53\" Nord, 1° 05' 59\" Est","gps":"49° 42' 3,96\" Nord, 1° 07' 39,72\" Est","images":["../image/image_76/76_Auffay_1.jpg","../image/image_76/76_Auffay_2.jpg"]},"Consult_chateau_formulairedaf6":{"id":"Consult_chateau_formulairedaf6","dept":"76","canton":"Saint-Valery-en-Caux","commune":"Oherville","nom":"Auffay_Oherville","type":"château","periode":"XVII","histoire":"AUFFAY,  à l'origine se trouvait une installation castrale des XIe-XIIe siècles dont témoigne la motte à proximité du logis, qui a appartenu jusqu'au XVIIe siècle à la famille d'Houdetot. Ce sont sans doute Jean d'Houdetot et son fils Guillaume qui ont bâti l'actuel manoir. En 1744  extinction de la ligne masculine  de la branche  des Houdetot d'Auffray,  et Marguerite  d'Houdetot en hérite, meurt sans postérité,  receuilli par sa tante Marie , Geneviève Adrienne d'Houdelot épouse  de Laurent-Paul le Poulletier sieur de Montenant en 1793 portera le titre de  de comte d'Auffay. Leur fils Alfred-Laurent-Josephle Poulletier décéde en 1861, passe à la comtesse de Vergès née Poulletier, le château est acquis au XIXe siècle par Melle Le Verdier descendante des Houdetot qui se charge de restaurer le château, puis transmis en héritage aux Beauvoir et aux Prunelé qui le possèdent toujours.","architecture":"AUFFAY, Le logis date de la seconde moitié du XVe siècle, et a été modifié à la Renaissance. Quelques travaux (façade sud) sont l'oeuvre, vers 1900, de l'architecte Janet. Le logis se compose d'un massif rectangulaire flanqué de deux tours d'angle et d'une tourelle polygonale au centre de la façade nord, et en façade sud d'une tourelle au sud-ouest. La construction se caractérise par une succession de lits alternés de briques, pierre calcaire et silex composant un riche décor. L'ensemble présente un aspect fortifié (fossés et petites ouvertures) du côté nord, qui vient en opposition avec une façade sud où le décor de la fin du XVe et du XVIe siècle s'impose. Le plafond à caissons du vestibule, daté de 1553,  est attribué à Jean Goujon.  Le domaine comprend un colombier de même style et une motte castrale ceinte de son fossé.  Éléments protégés MH : le château: inscription par arrêté du 2 février 1932. Le colombier ; la motte castrale, y compris son fossé : inscription par arrêté du 6 septembre 1996.","habitants":"Famille d'Houdetot\"","divers":"Aulffay    GPS : 49° 31' 02\" Nord, 0° 52' 48\" Est","gps":"49° 31' 02\" Nord, 0° 52' 48\" Est","images":["../image/image_76/76_Auffay_Oherville_1.jpg","../image/image_76/76_Auffay_Oherville_2.jpg","../image/image_76/76_Auffay_Oherville_3.jpg"]},"Consult_chateau_formulaire35ce":{"id":"Consult_chateau_formulaire35ce","dept":"76","canton":"Octeville-sur-Mer","commune":"Aygues_Etretat","nom":"Aygues_Etretat","type":"Châteaux","periode":"XVIII-XIX","histoire":"Deux châteaux dans cet article: Aygues et Saveurs et donjon                                               AYGUES, a été édifié en 1866 et doit son intérêt aux visites et séjours qu'y effectuèrent au XIXe siècle les deux reines d'Espagne, Marie Christine de Bourbon-Siciles, épouse de Ferdinand VII, puis régente d'Espagne, et sa fille Isabelle II, reine d'Espagne. Le château des Aygues est une demeure privée. Lédifice a été construit par larchitecte havrais Théodore Huchon (1824-1895). La maison a été construite pour Amédée Boyer (1805-1875), inventeur de lEau de mélisse des Carmes Boyer. À la mort de M. Boyer, sa veuve, Angélique des Saussayes (1837-1901), épouse en 1877 le prince Józef Maksymilian Lubomirski (1839-1911), ancien page et chambellan du tsar Nicolas 1er. En 1880 il reçoit dans sa maison, alors château Lubomirski la reine Isabelle II qui louera lensemble de la propriété pour elle même et sa suite en août 1881. En 1913, la maison est acquise par le comte Georges-Albert Puyou de Pouvourville (1861-1939), officier français, grand spécialiste de lExtrême Orient et du taoïsme sur lequel il écrivit de nombreux ouvrages sous le pseudonyme de Matgioi.  Aujourd'hui, le  château est habité par des particuliers mais il est ouvert aux touristes en visite guidée en 1989 la famille  Poinsot de Lorgeoux.                                     SAVEURS, la construction du château des Saveurs date du XVIIIe siècle. C'est un château. Auberge. L'endroit chaleureux et sympathique. Le propriétaire Didier et Muriel, en vérité aiment les bêtes.","architecture":"AYGUES ,La demeure est représentative du style balnéaire « éclectique » du Second Empire  avec trois façades, chacune conçue selon une inspiration spécifique (façade néo-gothique, façade italienne, façade néo-Louis XIII), l'ensemble restant maîtrisé par une rigoureuse symétrie commandée par un axe central est-ouest.  Derrière la maison, le parc arboré et aménagé dans le style « Alphand-Davioud » est caractéristique du goût du XIXe siècle, avec son imposant et spectaculaire décor de fausses rocailles. Il comporte une serre, une glacière, une gloriette dominant la mer et le site d'Étretat. Le parc dissimule en outre des sources qui ont donné son nom à la maison en 1913 (« Les Aygues »). Les grilles extérieures, les décors intérieurs de ferronnerie (lustre monumental) et les boiseries sculptées sont luvre de lartiste rouennais Ferdinand Marrou (1836-1917).  Les façades et toitures du château sont inscrites au titre des monuments historiques par arrêté du 11 août 1997.   Les abords sont un site inscrit par arrêté du 24 avril 1934.A 10.K.M.à l'est BENOUVILLE, la construction du château date de 1765 à 1785. L'architecte était Claude Nicolas Ledoux. Le château de Bénouville est de style Néo-Classique. Ses façades et toitures, son escalier intérieur avec sa rampe en fer forgé, son grand salon, sauf la cheminée moderne, et le petit salon marocain, avec son décor, sont inscrits, partiellement, aux M.H. depuis le 20/09/1972.                                                                                                    CLOS-ARSENE-LUPIN, propriété familiale où Maurice Leblanc \"l'historiographe d'Arsène Lupin\" séjourna de 1915 à 1941.\nIl y écrivit une grande part de son oeuvre. Cette villa à l'architecture du XIXe caractéristique des stations balnéaires du littoral normand appartient maintenant à son unique petite-fille. CHARMETTES  Réalisé à la fin du XIXe siècle, le parc témoigne des caractéristiques de cette époque. Laissé un temps à labandon il a été réhabilité en 1993 puis en 2016. Il se concentre sur moins de 2 hectares une palette végétale horticole diversifiée.","habitants":"Famille du comte Georges-Albert Puyou de Pouvourville   Haygues  prince Joseph Lubomirski                           Arsène; famille de Maurice Leblanc     \"","divers":"Cinq châteaux dans cet article; Aygues grav-1-2, Benouville grav-6, Saveurs grav-3, Arsène grav-4 et Charmettes grav-5.                                              GPS : 49° 42' 18,22\" Nord, 0° 12' 49,04\" Est                                                     Bénouville GPS : 49° 14' 11,69\" Nord, 0° 16' 55,24\" Est                     Donjon grav-7                                                 Tilleul  GPS : 49° 40' 59\" Nord, 0° 12' 23\" Est","gps":"49° 42' 18,22\" Nord, 0° 12' 49,04\" Est","images":["../image/image_76/76_Aygues_Etretat_1.jpg","../image/image_76/76_Aygues_Etretat_2.jpg","../image/image_76/76_Aygues_Etretat_3.jpg","../image/image_76/76_Aygues_Etretat_4.jpg","../image/image_76/76_Aygues_Etretat_5.jpg","../image/image_76/76_Aygues_Etretat_6.jpg","../image/image_76/76_Aygues_Etretat_7.jpg"]},"Consult_chateau_formulaire6822":{"id":"Consult_chateau_formulaire6822","dept":"76","canton":"Yvetot","commune":"Baons le Comte","nom":"Baons_le_Comte","type":"château","periode":"XV-XVI","histoire":"BAONS LE COMTE, il fut construit au XIIe siècle mais détruit durant la guerre de Cent Ans et restauré au XVe siècle. La partie centrale actuelle date du XVIe siècle tandis que les ailes du bâtiment sont plus récentes. Le vieux château de Baons-le-Comte fut la propriété des familles Cossé-Brissac puis de la famille Espinay Saint-Luc. Il existe 2 châteaux et 1 manoir sur la commune de Baons-le-Comte à découvrir, le château de Baons-le-Comte, construit pour la Famille Quesnel et le manoir de Baons-le-Comte et son colombier.","architecture":"BAONS LE COMTE  le vieux château construit au XIIe siècle mais détruit durant la guerre de Cent Ans et restauré au XVe siècle. La partie centrale actuelle est du XVIe siècle tandis que les ailes du bâtiment sont plus récentes.","habitants":"Familles Cossé-Brissac et la Famille Espinay Saint-Luc\"","divers":"Baons le Comte                                               GPS : 49° 38' 33\" Nord, 0° 46' 39\" Est","gps":"49° 38' 33\" Nord, 0° 46' 39\" Est","images":["../image/image_76/76_Baons_le_Comte_1.jpg","../image/image_76/76_Baons_le_Comte_2.jpg"]},"Consult_chateau_formulaire107a":{"id":"Consult_chateau_formulaire107a","dept":"76","canton":"Octeville-sur-Mer","commune":"Saint-Martin du Bec","nom":"Bec_Crespin","type":"Château","periode":"XVI","histoire":"BEC-CRESPIN, la construction du château du Bec date du XII au XVIe siècle. Il a été plusieurs fois détruit et restauré. Situé au milieu de 2 plans deau alimentés par les sources de la Lézarde,  a puisé son nom dans lappellation normande « Le bec » qui signifie le ruisseau.  Au Moyen-âge, il appartenait à la famille Crespin, dont plusieurs représentants furent connétables et maréchaux de Normandie. En 1454, Antoine Crespin, évêque de Laon, céda la baronnie du Bec Crespin à son beau frère, Pierre de Brézé, Grand Sénéchal de Normandie, un des proches de Charles VII. A la fin du XVe siècle, le château fut remis en état par Louis de Brézé, petit-fils de Charles VII et dAgnès Sorel, qui devint Gouverneur de Normandie. En 1579 le duc dAumale, Charles de Lorraine, vendit la Baronnie à Nicolas Romé de Fresquiennes, Conseiller au Parlement de Rouen, qui remania entièrement le château dans le goût de lépoque. Utilisé sous la terreur comme prison pour les prêtres réfractaires, le château passa par alliance au comte de Chatenay, puis au vicomte de Croismare qui le fit restaurer de 1844 à 1848.  Mis en 1916 à la disposition du gouvernement belge réfugié à Saint-Adresse, il fut la résidence du comte Carton de Wiart, ministre dEtat, qui y reçut de nombreuses personnalités, parmi lesquelles Maurice Barrès, Louis Barthou et René Bazin.","architecture":"BEC-CRESPIN, le château actuel est une belle construction Louis XIII entourée d'eau, on y entre par un châtelet qui comportait un pont-levis mais a été remanié au XVIIe siècle par l'adjonction d'un grand fronton timbré d'armoiries. Éléments protégés MH : les façades et les toitures du bâtiment d'entrée, du bâtiment des communs et de la tour : inscription par arrêté du 22 décembre 1952.","habitants":"Famille Crespin\"","divers":"Château de Bec-Crespin                  GPS : 49° 36' 11\" Nord, 0° 12' 39\" Est","gps":"49° 36' 11\" Nord, 0° 12' 39\" Est","images":["../image/image_76/76_Bec_Crespin_1.jpg","../image/image_76/76_Bec_Crespin_2.jpg","../image/image_76/76_Bec_Crespin_3.jpg","../image/image_76/76_Bec_Crespin_4.jpg"]},"Consult_chateau_formulairef5ab":{"id":"Consult_chateau_formulairef5ab","dept":"76","canton":"Darnéta","commune":"Belbeuf","nom":"Belbeuf","type":"Châteaux","periode":"XVI","histoire":"BELBEUF, le château de Belbeuf  du XVIe siècle, construit pour Jean-Pierre Prosper Godart de Belbeuf, son premier propriétaire. Le Château de Belbeuf a été construit, entre 1764 et 1780. Jacques Godart, fut le 6ème Marquis de Belbeuf, l'un des hommes les plus riches de France, époux de Sophie-Mathilde Adèle Denise de Morny, fille du duc de Morny, surnommée « Missy ». Elle y rencontra Colette, l'écrivaine. En 1906, au décès de Jacques Godart de Belbeuf, dernier Marquis de Belbeuf, le Château devient la propriété de la famille de Mathanle comte Raoul de Mathan, ancien maire de Belbeuf, vendit le château de Belbeuf à Me Jallu, Avocat du Barreau de Paris. En 1930,  occupé par l'armée pendant la seconde guerre mondiale abrite des réfugiers, entame une longue agonie, de nouveau vendu dépouillé  et en 1958 le château de Belbeuf est depuis la propriété des Assurances AXA.","architecture":"BELBEUF  Antoine-Louis-Pierre-Joseph Godart de Belbeuf y meurt en 1872.  En 1906, au décès de Jacques Godart de Belbeuf, dernier marquis de Belbeuf, le château devint la propriété de la famille de Mathan. En 1930, le comte Raoul de Mathan, cousin du marquis de Belbeuf et ancien maire de Belbeuf, vend le domaine à Me Jallu, avocat du barreau de Paris. Pendant la Seconde Guerre mondiale, il est occupé par le chef de char du 3e Reich, Michael Wittmann, en 1943-1944, avec son épouse, puis par des réfugiés ; dépouillé de son décor, le château est laissé à l'abandon. La charpente s'écroule en 1956. Une vente aux enchères en 1957 disperse les biens de valeur. En 1958, les « Anciennes Mutuelles » (devenues Axa), qui ont leur siège place de la Cathédrale à Rouen, acquièrent le château.\nLe château est repris par le maroquinier rouennais Paul Marius en 2020.   De plan rectangulaire deux pavillons saillants aux extrémités. Le château est couvert d'une terrasse à balustrades depuis la perte de ses toitures. L'escalier d'honneur est décoré d'une rampe en fer forgé.","habitants":"Jean-Pierre Prosper Godart de Belbeuf,\"","divers":"Belbeuf   GPS : 49° 23' 31,12\" Nord, 1° 08' 38,33\" Est","gps":"49° 23' 31,12\" Nord, 1° 08' 38,33\" Est","images":["../image/image_76/76_Belbeuf_1.jpg","../image/image_76/76_Belbeuf_2.jpg"]},"Consult_chateau_formulaire183e":{"id":"Consult_chateau_formulaire183e","dept":"76","canton":"Bolbec","commune":"Beuzeville-la-Grenier,","nom":"Beuzeville","type":"château","periode":"XVI","histoire":"BEUZEVILLE    Le quart de fief de Beuzeville est attesté en 1210, il relève en 1497 de la baronnie de Hallebosc. Un manoir est édifié au XVe siècle, dont il subsiste le logis. La construction du château a été commencée en 1547 pour Antoine Selle et achevée en 1588 pour son gendre René de Prie. La façade est remaniée en même temps. Le colombier est construit au XVIIIe siècle, l'étable porte la date 1762. La construction du château remonte à la fin du XVIème siècle. Il a remplacé un ancien manoir datant du XVe siècle qui existe encore lequel avait lui-même remplacé, selon toute vraisemblance, un château fort.  Ce château est inspiré par le château dAnet, le chef duvre de Philibert de lOrme. Le château a été occupé par différentes familles nobles puis est resté inhabité de 1651 à 1903, date à laquelle il a été adjugé à Madame Eugène Lemaître.\nIl ne reste malheureusement plus aujourdhui que les murs extérieurs et les tourelles dangle                                                                                                                Manoir de BEUZEVILETTE, cette belle construction du XVII ème siècle en pierres et briques avec ailes carrées aux angles est composée d'un rez-de-chaussée surélevé et d'un étage. Elle aurait été édifiée par François Mansart pour un Marquis de Beuzevillette qui se ruina au jeu.","architecture":"BEUZEVILLE,  il est construit sur un plan rectangulaire, en pierres de taille de grandes dimensions avec quatre tourelles en encorbellement à la hauteur du premier étage, en 1948, le propriétaire demande la démolition du château inscrit à l'Inventaire supplémentaire des Monuments historiques, car il menace ruine. Le rapport de l'architecte mentionne que la charpente ancienne subsiste encore en partie, que la couverture en ardoise est dans un état déplorable, que des planchers se sont effondrés et que toutes les menuiseries sont arrachées. Depuis, charpente et couverture se sont effondrées, seuls les murs subsistent. Le bâtiment est en pierre de taille calcaire pour l'élévation ouest, et présente un escalier hors-oeuvre en vis, et en assises alternées de brique et silex avec des chaînes calcaire pour l'élévation Est.  Éléments protégés MH : les façades et les toitures du château et du manoir : inscription par arrêté du 14 avril 1930.","habitants":"Famille de Antoine Selle\"","divers":"Château de Beuzeville grav-1 et de Beuzevilette grav-2","gps":"","images":["../image/image_76/76_Beuzeville_1.jpg","../image/image_76/76_Beuzeville_2.jpg"]},"Consult_chateau_formulaireeb32":{"id":"Consult_chateau_formulaireeb32","dept":"76","canton":"Eu","commune":"Blangy_sur_Besle","nom":"Blangy_sur_Besle","type":"Châteaux","periode":"XV-XVI-XVII-XVIII","histoire":"Cinq châteaux dsans cet article Fontaine, Hottineaux, Rieux, Rosmenil, Roumare  et Penthièvre                                                                                                        HOTTINEAUX dit Manoir de Penthièvre,  portant en façade la date 1636, bâti pour Mademoiselle de Montpensier et rendez-vous de chasse des comtes d'Eu, d'après la tradition orale ; chapelle mentionnée au XVIIe siècle ; restaurée en 1885, moulin dit de Hollande pour le dégraissage des draps de la manufacture Van Robais d'Abbeville dès le XVIIe siècle, transformé en filature de coton pour M. Fruictier au milieu du XIXe siècle, agrandi par le nord vers 1885 ; communs du milieu du XIXe siècle.      \nRIEUX , château construit à Rieux  par l'aile Est fin XVe ou début XVIe siècle avec porte charretière et tour d'angle. Au XVIIe siècle, ajout de deux corps de bâtiment formant plan en U, et construction du colombier dans la cour de ferme. Au début XIXe siècle, réfection des charpentes, percement de baies. Vers 1870-1875, modification du corps central dans son élévation sur cour. Porte en inscription la lettre E en écusson pour Ermann Barrault, son acquéreur. Décor intérieur de boiseries en faux Louis XV. Logis de ferme portant la date de 1874, écuries et étables de la même date. Construction en brique  émaillée notamment pour l'aile Est de la porte charretière en grès en arc brisé ; sous-sol voûte en pierre de Marne ; corps central en brique avec chaînes de pierre et couverture du pavillon en fer de hache ; colombier en brique.                                                                                           ROMESNIL, à Nesle-Normendeuse; a été construit au milieu du XVIIIe siècle pour Louis de Bourbon, prince des Dombes, comte d'Eu. Le domaine forme avec l'ancienne verrerie, créée en 1776 et les logements des ouvriers, un ensemble homogène. Le château est aujourd'hui fractionné en quelques appartements locatifs.Éléments protégés MH : les façades et les toitures du château, à l'exclusion de l'aile Est ; les murs de clôture du potager et de la cour d'honneur avec son portail d'entrée et le portail de l'avant-cour : inscription par arrêté du 31 août 1989.","architecture":"FONTAINE, Hugo de Fontaines cité en 1238. Fief tenu par l'abbaye du Tréport. Appartenait à la famille de Bommy puis de Calonne. Logis construit dans la première moitié du XVIe siècle. Au début du premier quart du XVIIe siècle, il est agrandi d'une travée, une croupe est substituée au pignon découvert original, et la date de 1607 portée sur le mur, à la même période, reprise des ouvertures et ajout d'un corps de bâtiment en retour d'angle, côté nord. Restaurations attestées par les dates de 1818, 1821 et 1911 portées sur le mur. Moulin à blé reconstruit en 1870. Ecuries, étable et reprise du moulin au début du premier quart du XXe siècle. Corps de logis du XVIe siècle : soubassement en moellons de silex, élévation en brique, brique émaillée, décor de calcaire, escalier à la Rihour, les autres bâtiments en brique. En 1993, le musée de la verrerie a élu domicile dans les annexes du manoir de Fontaine.                                                                                                          ROUMARE, ce château a été bâti vers 1630 par Sanson Vignon, parlementaire rouennais. Il est flanqué de deux ailes ajoutées au XVIIIe siècle et d'une chapelle (bénie en 1756 et ornée de panneaux du XVIIe siècle peints en grisaille). D'importants travaux sont affecté entre 1895 et 1910.  Typologie: portail en maçonnerie ; décor de silex.   Éléments protégés MH : le château, à savoir : en totalité le bâtiment principal y compris ses extensions latérales et les dépendances, à l'exclusion de la maison dite \"nouvelle maison du jardinier\" et des trois bâtiments sud-est, les murs d'enclos et les murs intérieurs, y compris les grilles, les piliers et les lions les surmontant, l'assise foncière y compris le parc et l'ancienne motte castrale avec son fossé : inscription  arrêté  en  1997.                                                                                                       PENTHIEVRE   construit en 1636 pour Mademoiselle de Montpensie  petite fille du roi Henri IV, nièce du roi Louis XIII et cousine du Roi Soleil. Par son style et les matériaux mis en oeuvre pour sa construction, cet édifice présente les grandes caractéristiques de larchitecture du premier tiers du XVIIe siècle.","habitants":"Houttinaux, Mademoiselle de Montpensier                          Romesnil; Louis de Bourbon                                  Fontaine; famille de Bommy                             Roumare; Sanson Vignon,\"","divers":"Cinq châteaux dans cet article Fontaine grav-1-2 Hottineaux, Rieux, Rosmenil_6, Roumare  et Penthièvre grav-3-4 waltersperge grav-5","gps":"","images":["../image/image_76/76_Blangy_sur_Besle_1.jpg","../image/image_76/76_Blangy_sur_Besle_2.jpg","../image/image_76/76_Blangy_sur_Besle_3.jpg","../image/image_76/76_Blangy_sur_Besle_4.jpg","../image/image_76/76_Blangy_sur_Besle_5.jpg","../image/image_76/76_Blangy_sur_Besle_6.jpg"]},"Consult_chateau_formulaire988b":{"id":"Consult_chateau_formulaire988b","dept":"76","canton":"Saint-Valery-en-Caux","commune":"Blosseville","nom":"Blosseville","type":"Châteaux","periode":"XVII-XVIII","histoire":"trois châteaux dans cet article, Blosseville, Calmesnil,  et Sainte-Trinite.                                  BLOSSEVILLE, logis, colombier, chapelle, écuries et parties agricoles construits au XVIIIe siècle, le four à pain porte la date 1745; logement construit dans la première moitié du XIXe siècle. L'édifice se compose de deux étages carrés, le gros-oeuvre en brique, silex, grès, appareil mixte, bois, torchis, pan de bois et moellon, élévation ordonnancée, surmontée d'un toit à longs pans, pignon découvert, pignon couvert, croupe et toit conique, recouverts d'ardoise et de tuiles plates. Un parc comprenant un colombier circulaire en brique et silex, une charretterie et un four à pain. Typologie : pan de bois à grille, appareil à assises alternées.                                 A 8 K.M.à l'est St -Pierre le vieux SAINTE-TRINITE, fief possédé en 1455 par Charles Desmarets, capitaine de Dieppe. Portail ouest et mur de clôture construits au XVIIe siècle. Le logis reconstruit dans la deuxième moitié du XVIIIe siècle. Le colombier figure sur le cadastre napoléonien vers 1825. L'édifice se compose d'un étage carré et un sous-sol, le gros oeuvre en brique, grès, appareil mixte et bossage, élévation ordonnancée surmontée de toit à longs pans et croupe, recouverts d'ardoises. L'ensemble comprend également un beau portail en brique et grès, un parc et des parties agricoles. Éléments protégés MH : les façades et toitures du château de Bosc-le-Comte : inscription par arrêté du 23 juillet 1970.","architecture":"CALMESNIL,  village voisin Bolleville, le château de Calmesnil a été construit dans la première moitié du XVIIIe siècle. Les Calmesnil, originaires du Pays de Caux, s'établirent en Pays d'Auge à la fin du XVe siècle dans les paroisses de Camembert et de Saint-Germain-de-Montgommery. Au XVIe siècle, ils devinrent protestants, sans doute après avoir été enrôlés dans les troupes de Montgommery ou après avoir participé à l'escorte de Henri IV en Normandie, durant la marche de ce roi vers Paris. Le domaine a été acheté en 1804 par la famille Beaunay de Saint-Aubin qui agrandi le logis de deux ailes et d'une tourelle. L'édifice se compose d'un étage carré,Le château de Calmesnil est une construction du XVIIe siècle et fut érigé sur les fondations de l'ancien manoir des Seigneurs de Bolleville. Un superbe édifice en briques avec chaînages de pierre aux angles et aux portes et fenêtres, gros-oeuvre en brique et pierre et calcaire, escalier dans-oeuvre, élévation ordonnancée surmontée d'un toit à longs pans, croupe recouverts d'ardoise. Parc avec un colombier, des communs, une ferme, un jardin potager et un enclos.","habitants":"Famille de Calmesnil\"","divers":"Deux châteaux dans cet article Blosseville grav-1 et Calmesnil grav  et ste Trinité grav-2                                 Blosseville; GPS : 49° 51' 17\" Nord, 0° 47' 49\" Est","gps":"49° 51' 17\" Nord, 0° 47' 49\" Est","images":["../image/image_76/76_Blosseville_1.jpg","../image/image_76/76_Blosseville_2.jpg"]},"Consult_chateau_formulaire77e4":{"id":"Consult_chateau_formulaire77e4","dept":"76","canton":"Le Mesnil-Esnard","commune":"Bois Heroult_guibert","nom":"Bois_Heroult_Guibert","type":"Châteaux","periode":"XVII","histoire":"deux châteaux dans cet article Bois-Héroult et Bois-Guibert                             BOIS HEROULT, propriété en 1713 de la famille de Civille qui fit raser le château médiéval et c'est Jacques Alphonse de Civille qui fait construire à partir de 1721 le château actuel, ce château est accompagné de bois et d'un parc au tracé régulier, planté après 1720. Il a été édifié en 1720 par Louise de Bonissent et Jacques de Civille-Saint Mards, dont les descendants le conservèrent jusqu'en 1979. Les communs ont été édifiés par Hardy vers 1778, et le colombier date de la fin du XVIIIe siècle. Le tracé paysager du parc existait en 1790 mais les jardins ont été reconstitués à partir de 1960, dans le cadre d'importants travaux de restauration du château et du parc. Éléments protégés MH : les façades et les toitures ; le grand et le petit escalier ; le grand et le petit salon : inscription par arrêté du 1er avril 1966. La partie ordonnancée du parc, les perspectives sud-est et nord-ouest avec les plantations et l'ensemble des aménagements de jardins, ainsi que le colombier et le grand commun : inscription par arrêté du 23 décembre 1996.  Le château de style classique bâti en brique est couvert d'un très haut comble d'ardoise. À l'intérieur, la rampe en fer forgé du grand escalier a été fabriquée en 1740, à l'occasion du mariage de Pierre de Civille-Saint Mards.","architecture":"A trois K.M. au sud   BOIS-GUIBERT, Fondé en 1620 par son ancêtre Charles Le Pesant, cousin de la mère de Pierre et Thomas Corneille, le domaine a évolué au fil des siècles. Jean-Marc de Pas, sculpteur, a grandi là, en pleine nature, au pied des arbres remarquables, entouré de poneys. En 1983, à l'âge de 21 ans, il reçoit le château de famille avec de beaux bâtiments datant des XVIIe et XVIIIe siècles.\nL'artiste y trouve l'espace de liberté pour réaliser un rêve, la création d'un jardin poétique célébrant la Nature pour entourer la maison d'enfance, sur sa terre maternelle, et l'ouvrir au public.\nIl créé un vaste espace de poésie sur sept hectares. Soixante-dix de ses uvres en bronze, résine ou ciment jalonnent la promenade à travers différents espaces paysagers célébrant les éléments, les saisons, la terre, le soleil ou le cosmos, dans une harmonie de l'Art et de la Nature.","habitants":"famille de Civille et Bois guibert Charles Le Pesant\"","divers":"deux châteaux dans cet article Bois-Héroult  grav-3 et Bois-Guibert   grav-1-2","gps":"","images":["../image/image_76/76_Bois_Heroult_Guibert_1.jpg","../image/image_76/76_Bois_Heroult_Guibert_2.jpg","../image/image_76/76_Bois_Heroult_Guibert_3.jpg"]},"Consult_chateau_formulaire8fc0":{"id":"Consult_chateau_formulaire8fc0","dept":"76","canton":"Bolbec","commune":"Bolbec","nom":"Bolbec","type":"Château","periode":"XV-XIX","histoire":"Deux châteaux dans cet articles; Roncherolles et Val aux Grès. RONCHEROLLES   Le château de Roncherolles a été édifié au nord du manoir du même nom, dans les premières années du XIXe siècle, avant 1822, pour Pierre Pouchet, industriel bolbécais. En 1822, il comprend un corps de logis au milieu d'une grande cour d'honneur, avec un parc et un jardin régulier. Au sud figure une fabrique de mouchoirs de plan en L. Le château appartient ensuite à Jacques Fauquet, industriel et maire de Bolbec, qui vers 1830 y fait de nombreux embellissements, tant au logis qu'au parc, dont un kiosque-belvédère. Puis la propriété devient une institution d'enseignement libre. En 1962, la ville de Bolbec l'achète pour y créer un collège d'enseignement général. Le logis a été détruit peu après, mais la fabrique de mouchoirs a été conservée, transformée en logements. Le logis était en brique et pierre avec sous-sol et étage carré, la fabrique est en brique enduite avec des arcades aveugles.                                                e Gruchet-le-Valasse. Le site a accueilli, du 12/07/2008 au 31/12/2012,               VAL AUX GRES    En 1108, Gautier Mal Oiseau, chanoine de Saint Laurent en Lyons, fonde une maladrerie près de la ville de Bolbec, sur un terrain d'environ 67 hectares. Elle prend le nom de Val aux Malades, ou Val aux Grès, les murailles étant construites en grès des carrières proches. En 1672, ses biens sont attribués à l'ordre de Saint Lazare et N-D du Mont Carmel et donnés à titre de bénéfice militaire et religieux à Pierre Puchot des Alleurs. Le choeur et la chapelle de la Vierge sont en bon état et vitrées, mais cinq piliers butants sont à reconstruire, la couverture du grand bâtiment en tuile est à refaire, le mur du réfectoire est à reprendre ainsi que la grande porte d'entrée et la muraille de l'enclos. En 1693, par don de Mgr. Colbert, archevêque de Rouen, les chanoines réguliers de Saint-Jacques-Le-Majeur, de l'Ordre de Saint-Augustin, venus du couvent de Saint-Lô du Bourg Achard s'installent au Val  aux Grès.","architecture":"VAL AUX GRES   En 1695 a lieu la visite des bâtiments du prieuré Saint-Jacques : la voûte sous le clocher entre choeur et nef est à refaire. Le cloître, le dortoir, la chambre d'hôtes, la cuisine, le réfectoire et un bâtiment en retour d'équerre inhabitable sont signalés. En 1723 les charpentes de l'église sont à reprendre, les planchers de l'arbre du pressoir, de l'écurie et l'étable sont à refaire. Après l'incendie de la ville en 1765, l'église priorale sert d'église paroissiale. En 1789, le cardinal de la Rochefoucauld supprime la communauté et réunit le prieuré au Grand Séminaire de Rouen. Durant la Révolution, le prieuré est transformé en pensionnat de garçons et école pour filles et garçons, le pensionnat dure jusqu'en 1805. Les bâtiments sont vendus comme bien national à Mme Le Barois d'Orgeval. En 1822, les bâtiments sont indiqués comme fabrique. Le clocher de l'église est détruit en 1828 et le reste de l'édifice en 1838. Une partie du terrain est amputé pour tracer des routes et la ligne de chemin de fer. Le prieuré est transformé en château et le logis, installé dans le bâtiment principal, construit à la fin du XVIIe siècle. Les bâtiments qui subsistent on été remaniés au cours du XIXe siècle, d'autres construits au XXe siècle.","habitants":"Rocherolles,famille de Jacques Fauquet                  Val; Pierre Puchot des Alleurs. \"","divers":"Deux châteaux dans cet articles; Roncherolles grav-4 et Val aux Grès grav 1-2-3.                                          Val GPS : 49° 34' 30,9\" Nord, 0° 28' 10,1\" Est","gps":"49° 34' 30,9\" Nord, 0° 28' 10,1\" Est","images":["../image/image_76/76_Bolbec_1.jpg","../image/image_76/76_Bolbec_2.jpg","../image/image_76/76_Bolbec_3.jpg","../image/image_76/76_Bolbec_4.jpg"]},"Consult_chateau_formulaireda33":{"id":"Consult_chateau_formulaireda33","dept":"76","canton":"Bois-Guillaume","commune":"Bosc Guérard Saint Adrien","nom":"Bosc_Theroulde","type":"Château","periode":"XVII","histoire":"BOSC-THEROULDE, on  mentionne Bosco Guérard en 1188, puis Bosco Girardi en 1205, St-Pierre de Bosc Guérart en 1286, le Bois Guérard en 1629 pour finir par le nom aujourdhui de Bosc Guérard depuis 1757.\nLes seigneurs étaient Robert de la Motte et le seigneur de Hellete.\nLa famille de la Motte resta longtemps propriétaire dune partie de\nce fief. Plusieurs membres (écuyers, chevaliers, conseillers au\nparlement) furent inhumés dans le cur de léglise. La pierre\ntombale de Guillaume de la Motte y est encore visible. Son blason\nest encore visible sur un vitrail de léglise. Fief que possédait en 1553 François de Montgomery, premier homme d'armes en France. Le château du Bosc-Théroulde est reconstruit de 1616 à 1632 de style Napoléon III, et reprises importantes au XIXe siècle. En 1845, Mr Charles Sénateur Maze, fabricants de produits  chimiques achète cette propriété, restaure le château, il le revêtit  de pierres, lornant de deux frontons.  Après désamination des biens de valeur, dun incendie, le château appartient aujourdhui à Mr et Mme Fontaine.","architecture":"BOSC-THEROULDE ce château a été construit en 1616 en brique de style Louis XIII par , Jacques le Fae, noble homme, conseiller du Roy, contrôleur général  des traites domaniales et des impôts forains.  L'édifice de plan symétrique se compose d'un étage carré et un étage de comble, le gros-oeuvre en calcaire, brique, pierre de taille et pierre avec brique en remplissage, élévation ordonnancée surmontée d'un toit à longs pans, croupe et toit à longs pans brisés, recouverts d'ardoise. L'édifice se dresse au milieu dun magnifique parc dont quatre hectares clos de murs avec de grands et beaux arbres dornement et avec vue étendue. Une impressionnante allée bordée de peupliers, mène à la propriété dont le parc est délimité par deux superbes grilles dhonneur.","habitants":"Famille de la Motte\"","divers":"Bosc_Theroulde","gps":"","images":["../image/image_76/76_Bosc_Theroulde_1.jpg"]},"Consult_chateau_formulaire68be":{"id":"Consult_chateau_formulaire68be","dept":"76","canton":"Yvetot","commune":"Bourdainville","nom":"Bourdainville","type":"Châteaux","periode":"XVI-XVII-XVIII","histoire":"Deux châteaux dans cet article; Bourdainvillie et  Saussay.                     BOURDAINVILLE, Il fut autrefois un vieux château assis sur une motte et entouré de fossés. La butte et la forteresse, détruites. L'édifice repose sur un vaste sous-sol à parement de grès taluté, datant de 1648. Le reste est terminé en 1862. Entre autres éléments anciens, une immense grange en brique et silex, portant la date 1760. dans le parc du château actuel,  l'édifice de plan symétrique se compose d'un sous-sol, un étage carré et un étage de comble, le gros-oeuvre en grès, brique, silex, pierre de taille, torchis, bois et pan de bois, élévation à travées surmontée d'un toit à longs pans et croupe recouverts d'ardoise et chaume. Parc avec enclos, logement, parties agricoles, motte et charretterie. Typologie : cour ouverte ; silex appareillé ; pan de bois à cadre ; pan de bois à grille ; brique moulurée.","architecture":"SAUSSAY, construit au XVIIIe siècle, propriété de la famille Hue au XVIIIe siècle jusqu'à sa vente en 1783 à Jean Vassé. Chapelle construite en charpente à l'ouest du château, bénite en 1740, démolie dès la fin du siècle. L'édifice de plan symétrique, se compose d'un sous-sol, d'un étage carré et d'un étage de comble, le gros oeuvre en brique, grès, silex et enduit partiel, élévation à travées, surmontée de toit à longs pans, croupe et toit à longs pans brisés recouverts d'ardoises. Typologie: portail en maçonnerie, briques moulurées silex appareillé et décor de brique émaillée.","habitants":"Saussay  famille Hue\"","divers":"Deux châteaux dans cet article; Bourdainvillie_3 et  Saussay grav 1-2.                                                           GPS : 48° 31' 6,31\" Nord, 2° 22' 25,57\" Est","gps":"48° 31' 6,31\" Nord, 2° 22' 25,57\" Est","images":["../image/image_76/76_Bourdainville_1.jpg","../image/image_76/76_Bourdainville_2.jpg","../image/image_76/76_Bourdainville_3.jpg"]},"Consult_chateau_formulairebc05":{"id":"Consult_chateau_formulairebc05","dept":"76","canton":"Saint-Romain-de-Colbosc","commune":"Manneville-la Goupil","nom":"Bourdemare","type":"château","periode":"XVI","histoire":"BOURDEMARE, le Manoir de Bourdemare date de la fin du XVIe siècle. Sa charpente est d'origine.  Le château de Bourdemare est privé, fermé au Public. Il a été construit pendant les guerres de religion, à la fin du XVIe siècle, par Guillaume Des Pommares (1542-1593). C'était une Vavassorerie qui s'étendait sur près de 90 hectares.   Ce manoir en brique et pierre à corps principal et ailes saillantes d'origine date de la fin du XVIe siècle.\nÉléments protégés MH : le château comprenant le logis en totalité et son assiette foncière, y compris les talus et les alignements: inscription par arrêté du 10 décembre 2003.","architecture":"BOURDEMARE, en brique et pierre à corps principal et aux ailes saillantes d'origine, date de la fin du XVIe siècle. Le logis se compose d'un corps central flanqué de 2 tourelles d'angle. La distribution intérieure reproduit un type manorial classique, avec vestibule transversal ouvrant sur 2 salles à cheminée. Sa charpente est d'origine. L'édifice est situé dans un grand clos-masure avec un beau talus planté et d'anciens bâtiments de ferme. Au XVIIIe siècle, le Domaine de Bourdemare devint une exploitation agricole. L'architecture est représentative d'une noblesse militaire de la fin du XVIe ou XVIIe siècle, au point de passage entre le manoir et le château.","habitants":"Guillaume Des Pommares \"","divers":"Bourdemare,                                                   GPS : 49° 36' 54\" Nord, 0° 20' 07\" Est","gps":"49° 36' 54\" Nord, 0° 20' 07\" Est","images":["../image/image_76/76_Bourdemare_1.jpg"]},"Consult_chateau_formulairecd64":{"id":"Consult_chateau_formulairecd64","dept":"76","canton":"Rouen","commune":"Brecy","nom":"Brecy_76","type":"Château","periode":"XVII","histoire":"BRECY, Jacques de Lacretelle écrivit à propos de Brécy :  Des atours de princesse italienne jetés sur les épaules d'une petite paysanne normande. Les pavillons ont été construits au XVIIIe siècle. La grille sud-est,\nà l'extrémité du parc, est d'Isaac Gélin, XVIIe siècle. L'église Sainte-Anne de Brécy, du XIVe siècle, est attenante au château et   directement accessible par une petite porte. À quelques mètres de l'église, on peut voir un bassin dont l'eau guérissait les yeux au Moyen Âge, selon la légende.","architecture":"BRECY,  Lions bicéphales et rinceaux de feuillages : le charme de ce château du XVIIe s'affiche au portail. On accède à ce château du XVIIe siècle par un beau portail monumental avec vantaux en chêne sculpté. De l'autre côté de la demeure, un jardin à la française comportant 5 terrasses ornées de balustres  et de vases de pierre, se termine par une belle grille en fer forgé. A côté, une jolie église du XIIIe siècle contribue au charme de la demeure.   Somptueux ensemble architectural. Brécy se trouve à la limite de la plaine de Caen et du Bessin. Par quel hasard ce jardin est-il venu se nicher dans ce creux, cest une énigme qui obsédait La Varende,  asciné par cette « inexplicable magnificence ». Le jardin de Brécy, longtemps attribué à François Mansart, date de la seconde moitié du XVIIe siècle. Un des rares exemples de cette époque subsistant en France, il sétage sur cinq terrasses sélevant au-dessus du parterre à larrière de la maison jusquà la grille et le ciel. Chaque terrasse abrite un jardin particulier. Brécy a gardé une forte empreinte médiévale (jardins indépendants clos de murs) des acquisitions de la Renaissance, sculpture et broderies, tout en   annonçant les grandes compositions des jardins français classiques, en étroite relation avec la demeure.","habitants":"Seigneur local\"","divers":"Brecy","gps":"","images":["../image/image_76/76_Brecy_76_1.jpg","../image/image_76/76_Brecy_76_2.jpg"]},"Consult_chateau_formulairef07f":{"id":"Consult_chateau_formulairef07f","dept":"76","canton":"Yvetot","commune":"Bretteville-Saint-Laurent,","nom":"Bretteville","type":"Châteaux","periode":"XVII","histoire":"BRETTEVILLE ce château a été édifié dans la première moitié du XVIIIe siècle dans le style classique, pour Albert Louis Asselin, conseiller du roi Louis XV, qui avait épousé Marie Anne Romé, fille du baron du Bec. Sa fille a épousé en 1749 Armand Thomas Hue, marquis de Miromesnil, qui fut Garde des Sceaux du roi Louis XVI de 1774 à 1787. La demeure, précédé d'une avenue bordée d'une triple rangée d'arbres, est implanté entre une cour d'honneur limitée par des douves sèches et des jardins avec saut de loup dans l'axe.   Ce domaine de parlementaire d'Ancien Régime est conservé dans sa quasi-totalité en composition générale et en élévation.  Tous les logements sont revêtus de parquet et offrent une vue sur le jardin. Dotés d'une salle de bains privative, les appartements possèdent aussi un coin salon et une kitchenette entièrement équipée. .","architecture":"BRETTEVILLE. Il comprend un corps de logis central de plan rectangulaire cantonné de 2 ailes en pavillon formant décrochement sur les deux façades. L'ensemble est clos de murs. Au Nord, subsiste l'ancienne chapelle devenue une église paroissiale. Il est prolongé au Sud par une aile de service et un bâtiment des offices qui commande la cour des communs. Ce domaine de grand parlementaire d'ancien régime est conservé dans sa quasi-totalité en composition générale et en élévation. Le château de Bretteville-Saint-Laurent est privé, fermé au public, il  est inscrit aux M.H. le 01/07/1991 et classé aux M.H. le 2/10/1992.","habitants":"Armand Thomas Hue\"","divers":"Château de Bretteville_st_Laurent","gps":"","images":["../image/image_76/76_Bretteville_1.jpg"]},"Consult_chateau_formulaire0c66":{"id":"Consult_chateau_formulaire0c66","dept":"76","canton":"Saint-Valery-en-Caux","commune":"Cany-Barville","nom":"Cany_Barville","type":"Châteaux","periode":"XV-XVI-XVII-XVIII","histoire":"Cinq châteaux dans cet article ; Cany, Catteville, Hanouard et Auzeville.                                                                                                                     CANY-BARVILLE,  c'est un château de style Louis XIII. Il a été construit de 1640 à 1646, pour son premier propriétaire Pierre le Marinier, un Parlementaire de Rouen. De forme rectangulaire de 10 m sur 45 m et sur 3 étages, il totalise 1 300 m2 habitables. Il est fait de briques, de pierres calcaire et de grès. Il est couvert d'une toiture en ardoise. Le château de Cany-Barville est entouré d'un vaste parc de 50 ha, arrosé par la Durdent, qui alimente les douves du château. Pierre de Bec de Lièvre puis Anne-Christian de Montmorency-Luxembourg en furent ensuite successivement les propriétaires. Depuis 1980, Cany-Barville est inhabité. Jusqu'en 2006. Il reste ouvert au Public chaque été, du 1er Juillet et jusqu'au 31 Août. Il est inscrit aux M.H. depuis 1930. Son propriétaire actuel, depuis 2002, est Mr Antoine de Dreux-Brézé. Le Château de Cany-Barville est inscrit aux M.H. depuis 1930. Éléments protégés MH : le château : inscription par arrêté du 14 avril 1930. Le domaine, l'emprise foncière, le bâti et non bâti : inscription par arrêté du 7 décembre 1990.                                                                                         A cinq K.M. à l'est à Ocqueviie, CATTEVILLE, construit au XVe siècle puis reconstruit au XVIIe siècle ;ayant appartenu aux Bec de Lièvre  de Cany, Puis  XIXe siècle aux Montmorency-Luxembourg,  propriété de la vicomtesse de Durfort. Ailes et façade postérieure remaniées au XVIIIe siècle, restauré au XIXe siècle. Motifs géométriques de briques rouges, noires et blanches. Edifice de plan plan symétrique composé d'un étage carré, d'un étage de comble et un sous-sol, le gros oeuvre brique; calcaire, escalier dans-oeuvre, élévation ordonnancée, toit à longs pans couvert d'ardoise. Parties constituantes : parc, douves, chapelle, logement, communs et parties agricoles. Il est inscrit aux M.H. depuis le 19/08/1975.","architecture":"AUZEVILLE  à Ocqueville, Portail construit au XVe siècle et repris dans les remaniements de l'aile nord, contemporains de la reconstruction du logis vers 1582; décor de ferronnerie du puits datant du XIXe siècle. L'édifice se compose d'un étage carré, un étage de comble et un sous-sol, gros oeuvre engrès, brique et appareil mixte, élévation ordonnancée surmontée de toit à longs pans, croupe et toit polygonal, recouverts d'ardoise. L'ensemble comprend un four et d'un beau portail en maçonnerie.                                                                                                                                               A  10 K.M. au sud à HANOUARD  sa construction date du XVIe et XVIIe siècle. Le fief est attesté depuis le XIIe siècle et s'inscrit dans un ensemble fortifié dont subsistent de nombreux éléments. Du XVIIe siècle date la modification de la façade Sud-Est du logis repercement des baies, la porte d'entrée soulignée d'un fronton sur pilastres. Le Domaine Le Hanouard comprend, aujourd'hui, un logis rectangulaire de la fin du XVe siècle, en briques. La porte d'entrée soulignée par un fronton calcaire, porté par deux pilastres à chapiteaux. La façade postérieure présente des baies à meneaux et une tourelle hexagonale en forte saillie,  destinée à l'escalier.","habitants":"Cany Famille de Pierre le Marinier                            Catteville  Famille  de Bec de Lièvre  de Cany\"","divers":"cinq châteaux dans cet article ; Auzeville_2, Cany-Barville grav-1, Catteville grav-3-4,  Hanouard grav-5,                                                                               Cany  GPS : 49° 46' 00,84\" Nord, 0° 37' 49,08\" Est                                             Hanouard GPS : 49° 43' 51,96\" Nord, 0° 39' 26,64\" Est","gps":"49° 46' 00,84\" Nord, 0° 37' 49,08\" Est","images":["../image/image_76/76_Cany_Barville_1.jpg","../image/image_76/76_Cany_Barville_2.jpg","../image/image_76/76_Cany_Barville_3.jpg","../image/image_76/76_Cany_Barville_4.jpg","../image/image_76/76_Cany_Barville_5.jpg"]},"Consult_chateau_formulaire9f03":{"id":"Consult_chateau_formulaire9f03","dept":"76","canton":"Saint-Valery-en-Caux","commune":"Cany-Barville","nom":"Cany_Barville-II","type":"Châteaux","periode":"XVII","histoire":"Quatre châteaux dans cet article, Cleuville, malleville est Riquier es Plains.                                                                                                                                                                                      ST RIQUIER ES PLAINS   au nord de Cany,   colombier édifié au XVIe ou XVIIe siècle, écuries construites en 1708, date portée, et remaniées au XIXe siècle ; étable à vaches bâtie au XVIIIe siècle puis remaniée en 1877, date portée ; logis et logement élevés dans la première moitié du XIXe siècle  ; ailes du logis et décor de ferronnerie ajoutés dans le quatrième quart du XIXe siècle. Typologie : logis en brique et en calcaire, colombier en grès, logement en brique, communs en brique, en grès et en silex, parties agricoles en brique et en grès.","architecture":"CLEUVILLE date du XVIIIe siècle, situé dans le pays de Caux cher à Guy de Maupassant, le château de Cleuville est un exemple parfait de résidence campagnarde recherché par les familles nobles des grandes villes de Normandie au siècle des lumières.                                                                                       MALLEVILLE, la construction du château pourrait dater du XVIIe siècle, il a été presque entièrement reconstruit au XIXe siècle, le colombier, la grange et l'étable XVIIIe siècle, la charretterie porte la date 1860. Parties constituantes: l'enclos. L'édifice se compose d'un étage carré, d'un sous-sol et d'un étage de comble, élévation ordonnancée, escalier dans-oeuvre, gros oeuvre: grès; silex; brique; appareil mixte; pierre de taille.","habitants":"Seigneurs locaux\"","divers":"Quatre châteaux dans cet article; , Cleuville grav-2-3, Malleville  grav-1 et st-Riquier es Plains grav-4.","gps":"","images":["../image/image_76/76_Cany_Barville_II_1.jpg","../image/image_76/76_Cany_Barville_II_2.jpg"]},"Consult_chateau_formulairedbc8":{"id":"Consult_chateau_formulairedbc8","dept":"76","canton":"Saint-Romain-de-Colbosc","commune":"La Cerlangue","nom":"Cerlangue","type":"Châteaux","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article; Drumare et Bellevue.                                  DRUMARE, l'Ostel de Drumare est mentionné en 1434, le demi fief de Drumare mentionné en 1466, en 1566 il relevait de la vicomté de Montivilliers ; logis construit en 1838 par l'ingénieur Pierre François Frissard; colombier du XVIIIe siècle, en ruines ; pavillon édifié au XVIIe siècle, remanié en 1838, détruit après 1969. Le logis possède un avant -corps avec toit à croupe ; pavillon en brique avec chaînes d'angle et bandeaux en calcaire, toit à l'impériale; le pigeonnier en silex avec chaînes harpées en brique, soubassement et larmier en calcaire, sans toit. Ferme en pan de bois à grille, entretoise en moise, surcroît en croix de saint André, parties latérales en brique et silex, enduit ; grange à assises alternées de calcaire, silex noir, silex blond, damier silex noir, silex blond.","architecture":"BELLEVUE, la date de 1858 est inscrite dans le sous sol. Le château appartient en 1895 à la famille Meneust. Le logis est construit en brique et pierre calcaire et se compose d'un sous-sol, un étage carré et de deux étages de comble, escalier dans-oeuvre, élévation ordonnancée surmontée de toit à longs pans brisés et croupe, recouverts d'ardoises ; les écuries sont édifiées en assises alternées de brique et silex blond. L'ensemble de la propriété comprend un beau parc, un jardin potager, une serre et des parties agricoles
