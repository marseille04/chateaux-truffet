ice retourne au royaume du Piémont Sardaigne et Monaco à son indépendance et passe sous protectorat Sarde.                                 En 1860 par l'adjonction du comté de Nice passe au royaume de France  et par le détachement du Var de l'arrondissement de Grasse devient département pour la deuxième fois département  des Alpes Maritimes .","architecture":"","habitants":"\"","divers":"Informations depuis Moyen-Age","gps":"","images":["../image/image_06/06_attente.html"]},"Consult_chateau_formulaire6529":{"id":"Consult_chateau_formulaire6529","dept":"06","canton":"Nice","commune":"Nice","nom":"Anglais","type":"Villa","periode":"XIX","histoire":"ANGLAIS; au sommet  de l'extrémité du cap de Nice, le château de l'Anglais est une des plus ancienne folie niçoise d'un colonel de génie de l'armée des Indes  Robert Smith d'origine  écossaise fit construire ce château de 1856 à 1858 et après sa mort son fils le vendit en 1875 le bâtiment inachevé au comte Melchior Gurowsky de Wezel qui lui donna l'aspect actuel,  les dépendances sont transformées en habitations.","architecture":"Le château de l'Anglais sur l'extrémité du cap de Nice  construit en 1858  dans un style Hindou et médiéval britannique.","habitants":"Mr Robert Smith\r\n        \"","divers":"Château de l'Anglais.","gps":"","images":["../image/image_06/06_Anglais_1.jpg","../image/image_06/06_Anglais_2.jpg","../image/image_06/06_Anglais_3.jpg","../image/image_06/06_Anglais_4.jpg"]},"Consult_chateau_formulaire5b3c":{"id":"Consult_chateau_formulaire5b3c","dept":"06","canton":"Antibes","commune":"Antibes","nom":"Antibes","type":"Château","periode":"XIV","histoire":"ANTIBES: Vieille ville médiévale construite sur la cité crée par les colons grecs, elle reçoit le nom Antipolis et du bas empire romain devient une ville de la Narbonaise siège de l'évêché de 400 à 1244, le pape cède la ville aux Grimaldi de Cagnes. Antibes devient la pointe avancée du royaume de France quand le comté de Nice passe à la Savoie en 1388. La ville est en 1536 pille par les troupes de Charles Quint à la suite de quoi François Ier  la fortifié, en 1608 Alexandre de Grimaldi entre dans le domaine du roi de France, Henri IV qui poursuit les fortifications, un fort appelé \"carré\" sur la presqu'île de Saint-Roch sur ordre d'Henri II et amélioré au XVIIe siècle par Vauban les remparts en 1707 lors des guerres d'Autriche en 1815 Antibes résiste. Fut la résidence du gouverneur du roi de 1820 à  1924. Lors du passage  du Comté de Nice à la France en 1860 le fort carré perd ses fonctions militaires, il fut restauré et racheté par la ville d'Antibes en 1997 pour le transformer en musée Picasso qui y résida en 1946.                                                    Le château des Grimaldi fut la résidence des évêques, Luc et Marc Grimaldi capitaines arbalétriers au service de la reine Jeanne en furent propriétaires  conférés en 1384 à Luc et Marc Grimaldi par le pape Clément VII, les Grimaldi le gardèrent jusqu'en 1608, se situe sur les remparts,  remanié au XVIe siècle, abrite aujourd'hui le musée de Picasso ce dernier s'en servit d'atelier  de juillet à décembre 1946. Plusieurs châteaux dans la commune du Cap d'Antibes; château de Garoupe construit fin du XXe siècle pour Antony Norman, de la Croé de style victorien, d'Elein-Roc de Thenard dit château \"Francas\" style néo-classique,  villa moderne dessiné par Charles Garnier pour un riche hollandais Hugues Hope  en 1860, elle a  appartenu en 1873 à James Wyllie revendu à son décès à l'américain Baumont, en 1927 à sa mort sa femme le légua à la ville pour la fondation Beaumont, le château Scott construit en 1872 pour Michel Hugues Scott inventeur de l'émulsion à base d'huile de foie de morue, à sa mort sa femme vendit le château en 1891 à Monsieur Emile Meunier et en 1935 le domaine est vendu au propriétaire du grand hôtel à Cannes.  Le château Centhury et de Bel-Rive, château de l'horizon ou villa blanche au bord de mer  a été la propriété du prince Aly Khan il épousa Rita Hayworth le 27 mai 1949 et villa du roi d'Arabie.","architecture":"Antibes Vieille ville médiévale construite sur la cité, le fort carré, situé sur la presqu'île Saint-Roch bâti sur un rocher culminant la mer à 26 mètres de haut construit sur ordre du roi Henri III  remanié par François Ier puis Henri IV et Vauban qui la transforma en citadelle de 1746 à 1815,  pour servir de sentinelle pour la frontière toute proche avec le comté de Nice opérationnel en 1585 à connu sa première attaque en 1592 contre les ducs de Savoie,  le fort demeure un site stratégique jusqu'au  XIXe siècle,  déclassé en 1860.                                                                                       L'ancien château primitif des Grimaldi  date du XI-XIIe siècle subsiste les fondations et le donjon carré du XIIe siècle  édifié sur les remparts enserré entre trois corps de logis du XIVe siècle.                                  Bastion St-André du XVIIe siècle dit de Vauban transformé en musée de l'archéologie et à l'histoire, la tour du Graillon conserve le patrimoine naval et napoléonien. En 1895 les remparts sont démolis.                                                                                    Château Garoupe grande maison à un seul étage, rez-de- chaussée surélevé au corps centrale s'adossent deux ailes en retour.","habitants":"Famille des Grimaldi\r\n        \"","divers":"Château fort d'Antibes, Fort carré,  château des Grimaldi  dit \"Picasso\",  d'Elien-Roc et de Bel-Rive.","gps":"","images":["../image/image_06/06_Antibes_1.jpg","../image/image_06/06_Antibes_2.jpg","../image/image_06/06_Antibes_3.jpg","../image/image_06/06_Antibes_4.jpg","../image/image_06/06_Antibes_5.jpg","../image/image_06/06_Antibes_6.jpg","../image/image_06/06_Antibes_7.jpg","../image/image_06/06_Antibes_8.jpg","../image/image_06/06_Antibes_9.jpg"]},"Consult_chateau_formulaire3a5b":{"id":"Consult_chateau_formulaire3a5b","dept":"06","canton":"Puget-Théniers","commune":"Ascros","nom":"Ascros","type":"Vestiges","periode":"XIII","histoire":"ASCROS:  Cité en 1066 sous le nom de Castrum de Crocis, appelé Ascros en 1760. Le Premier seigneur était les Crocis  qui participe avec Guillaume Ier de Provence à l'expulsion des Sarrasins  En 1250 les Châteauneuf succèdent aux Crocis ils en furent les co-seigneurs jusqu'en 1387 et le seigneur connu en 1252  est  Raibaud d'Ascros qui ce dernier s'empare de la seigneurie de Toudon ancien fief des barons et du comté du Beuil. En 1381, le comte de Savoie  donne une partie du fief d'Ascros  à Jean Grimaldi du Beuil ils  en sont co-seigneurs avec Honoré de Marquesan seigneur de Coaraze,  tous deux s'entendent avec Louis XII pour livrer Nice au au roi en échange d'autres seigneuries par l'intermédiaire du gouverneur de Provence,  Georges qui est autre que  le gendre, cela n'aboutit pas, Georges eu la gorge tranchée. Le comté du Beuil revient a Honoré de Grimaldi seigneur d'Ascros,  Honoré Ier de Beuil fut nommé gouverneur de Nice par le duc de Savoie en 1526  ce dernier décéda en 1537. Jean-Baptiste  de Grimaldi seigneur de Beuil second fils d'Honoré Ier est son frère René de Grimaldi  seigneur de Massoins complotent avec le roi de France contre le duc de Savoie, accusé par Honoré seigneur de les Ferres et de Gilette, les deux frères mettent le siège pendant deux mois devant le château de Gilette, mais ce dernier arrive à s'échapper, une clémence accepté en 1529, mais Jean-Baptiste  continua la guerre au duc de Savoie entraînant avec lui la population, il fut tué en 1544 à la bataille de Censolles. Après la révolte  d'Annibal de Grimaldi en 1621 le château fut rasé par ordre du duc de Savoie et le fief fut donné a un Galléan-Caissot de Roubion qui le conservera jusqu'en 1776, qui possédait la seigneurie de Toudon.","architecture":"Ascros; à 1145 mètres d'altitude sur un éperon rocheux dont une extrémité était défendue par un rempart flanqué de deux tours rondes, site stratégique pour une surveillance d'un comté à l'autre, il ne reste que des vestiges sur la pointe du rocher.","habitants":"Famille de Grimaldi du Beuil\r\n        \"","divers":"Vestiges sur motte féodale.","gps":"","images":["../image/image_06/06_Ascros_1.jpg","../image/image_06/06_Ascros_2.jpg","../image/image_06/06_Ascros_3.jpg"]},"Consult_chateau_formulairee1ba":{"id":"Consult_chateau_formulairee1ba","dept":"06","canton":"Levens","commune":"Aspremont","nom":"Aspremont_A_M","type":"Vestiges","periode":"XIV","histoire":"ASPREMONT:  Vers l'an mille fief des vicomtes de Nice  dont une fille de cette famille épouse Raymond de Rostaing  vassal du comte, il fit reconstruire le château sur le Mont-Boron  en remplacement du château  construit sur le Mont-Barri  et qui fut détruit par les niçois. Raymond Béranger V supprima le consulat de Nice 1230. La famille Rostaing conserva le fief pendant deux siècles avant de le vendre à Raymond Chabaud  seigneur de Saint-Blaise en 1240 qui le garde jusqu'en 1388. La région passant au comté de Savoie, les Chabaud  furent expulsés, le fief sera vendu en 1406 à Ludovic Marquesan, mais le premier château est abandonné et en 1428, le village et le châtelain quittèrent les lieux pour s'installer plus bas ou il construisit le village et un nouveau château en 1438 , le fils de Ludovic Honoré  vend à  Barthélémy Borriglionne co-seigneur de Contes et de Berre et en 1621 érigé en comté au profit d'Annibal Barriglionne  qui le garderont jusqu'en 1777 date à laquelle Marinet Lascaris, petit fils de Charles Antoine Lascaris-Vintimile ( seigneur de Castellar  et consul de Nice de 1713 à 1721 le reçoit au titre de comte) et par alliance passe au Grimaldi et aux Caravadossi.  En 1860 votèrent le rattachement à la France.","architecture":"Aspremont; du château primitif il ne reste plus rien. Le château construit en 1340 remanié au cours des temps,  enceinte fortifiée entourait un bâtiment rectangulaire, subsiste   que les fondations, la tour ronde édifié en 1315 servit de prison, et tour qui couronnait le mont Boron d'observation par la suite rasé en 1706 complètement démoli en 1793  par les Villageois, comme les remparts de la ville basse sur ordre de Louis XIV.","habitants":"Famille des Rostaing\r\n        \"","divers":"Vestiges du Château.","gps":"","images":["../image/image_06/06_Aspremont_A_M_1.jpg","../image/image_06/06_Aspremont_A_M_2.jpg","../image/image_06/06_Aspremont_A_M_3.jpg","../image/image_06/06_Aspremont_A_M_4.jpg","../image/image_06/06_Aspremont_A_M_5.jpg","../image/image_06/06_Aspremont_A_M_6.jpg"]},"Consult_chateau_formulaire2dca":{"id":"Consult_chateau_formulaire2dca","dept":"06","canton":"Puget-Théniers","commune":"La Croix-sur-Roudoule","nom":"Auvare","type":"Vestiges","periode":"XVI","histoire":"AUVARE;  Auvaro en langue locale,  forteresse importante,  dépendait de l'évêché de Glandevès ces derniers fondèrent Auvare, en  574  appartenait à des seigneurs de haut lignage  tel que les comte de Provence Guillaume Ier de Provence \"le libérateur\" qui chassa les Sarrasins . A l'an mille vigerie des Templiers qui y construisirent le château dont la tour maîtresse était surmontait d'une croix d'où le nom, après la mort de la reine Jeanne, le village se plaça sous la protection d'Amédée II de Savoie. Transformé en baronnie aux Balbs de Vintimille, un de ses descendants seigneur du Puget devient baron d'Auvare, le fief appartient à Guillaume de Glandevès se Saint-Auban  co-seigneurs avec les Hospitaliers de St-Jean de Jérusalem ce dernier échangea avec Charles d'Anjou pour obtenir des terres au Muy. Charles Ier d'Anjou fit d'Auvare une forteresse, dont Emmanuel de Puget en devient le Gouverneur, et en 1480 devient française, par alliance la baronnie repassa au seigneur de Puget.  En 1548 c'est le capitaine de l'île Sainte Marguerite  Joseph de Cambis qui en fait acquisition  auprès de Melchiona de Castellane, dame de Figanières, en 1578 sa fille vend le titre à dame de Beuil épouse d'Honoré de Grimaldi,  les Grimaldi en deviennent propriétaires mais Annibal trahi le duc de Savoie son suzerain retranché dans son nid d'aigle de Tourette-Revest,  le comte de Savoie fit détruire tous ses châteaux en 1621 dont celui d'Auvare.  En 1705 un descendant des Grimaldi vendit à Louis de Corporandi, seigneur de la Croix,  Gaspard ce dernier  brillant général s'illustra sous Louis XIV en Espagne,  il existe toujours des biens du baron à Auvare mais sa descendance vit en Italie.","architecture":"Auvare; château construit sur des rocher, château féodal  des Corporandi d'Auvare du XVIIe siècle  remanié au XIXe siècle et des remparts sont encore visibles tel que des meurtrières des portes de l'enceinte fortifié début XVe siècle.","habitants":"Emmanuel de Puget\r\n        \"","divers":"Village fortifié.","gps":"","images":["../image/image_06/06_Auvare_1.jpg","../image/image_06/06_Auvare_2.jpg","../image/image_06/06_Auvare_3.jpg","../image/image_06/06_Auvare_4.jpg","../image/image_06/06_Auvare_5.jpg","../image/image_06/06_Auvare_6.jpg"]},"Consult_chateau_formulaire20ed":{"id":"Consult_chateau_formulaire20ed","dept":"06","canton":"Grasse","commune":"Bar-sur-Loup","nom":"Bar_sur_Loup","type":"Château","periode":"XVII","histoire":"Le BAR sur LOUP; Château  des comtes de Grasse de la branche du Bar, construit au XIVe siècle. Au XVe siècle, le château était devenu le rendez vous de toute la noblesse locale. Bertrand de Grasse en était le seigneur  célibataire, Jouisseur,  impertinent, passionné et autoritaire aimant le luxe et le plaisir de la vie suite à une tragédie d'orgie il s'enfuit pour vivre en ermite dans les grottes du Loup. Dans ce château est né en 1722 François-Joseph-Paul comte de Grasse, celui ci s'illustra sous Louis XVI en tant que lieutenant général des armées navales, parti au secours des  américains en lutte  contre les anglais pour l'indépendance à la bataille de Yorktown. François-Joseph-Paul fut nommé marquis de Tilly prince d'Antibes commandeur de l'ordre royal et militaire de Saint-Louis chevalier de Malte et membre fondateur de la société Cincinati.                                                                                              Dans le canton commune du  Rouret un château du XVIIe siècle de la famille de ce nom, la seigneurie passa au Geoffroy du Rouret au XVIIe siècle qui firent construire le château.","architecture":"Le Bar sur Loup; à 330 m d'altitude fondé à l'époque médiévale il n'a conservé de sa forteresse  que la base d'un donjon de la fin du XIVe siècle qui se dresse au milieu de la place principale, le château actuel en  contrebas, construction massive rectangulaire flanquée de tours cylindriques du XVIe siècle aux quatre angles. Grille de fer forgée de la porte d'entrée, encadré de deux canons avec douve et pont-levis, ce château a eu des  remaniements aux cours des siècle. Aujourd'hui  divisé en copropriété et les caves servent d'expos.                                                                            Château du Rouret style maison forte à trois niveaux flanqués de deux tours rondes.","habitants":"Famille de Bertrand de Grasse                                                          Geoffroy du Rouret\r\n        \"","divers":"Village de Bar-sur-Loup et son château et le château du Rouret.","gps":"","images":["../image/image_06/06_Bar_sur_Loup_1.jpg","../image/image_06/06_Bar_sur_Loup_2.jpg","../image/image_06/06_Bar_sur_Loup_3.jpg","../image/image_06/06_Bar_sur_Loup_4.jpg","../image/image_06/06_Bar_sur_Loup_5.jpg","../image/image_06/06_Bar_sur_Loup_6.jpg","../image/image_06/06_Bar_sur_Loup_7.jpg"]},"Consult_chateau_formulaire3ffe":{"id":"Consult_chateau_formulaire3ffe","dept":"06","canton":"Roquebilière","commune":"Belvédère","nom":"Belvedere","type":"Vestiges","periode":"XIII","histoire":"BELVEDERE; Le fief dépendait de l'évêque de Nice à l'an 1000 au détriment des seigneuries qui tenaient le pays depuis plusieurs décennies, passa aux comtes de Provence qui le partagea en deux parties; le nord fut transmit au XIe siècle à la famille Rostaing apparenté à la famille vicomtale  de Nice, dont la comtesse Odile. La partie du Sud à la famille de Vintimille suzerain des comtes de Provence qui gardèrent le fief jusqu'au XVe siècle. Puis ces castrums  furent détruit par Romée de Villeneuve et un château fut reconstruit en 1252  par le comte de Provence appelé \"Villa-Belvédère\" tenu par la famille de Vintimille.                             Au XIVe siècle les seigneurs de Grimaldi et du Beuil obtiennent le château de Roquebilière et de Belvédère, en 1495 Honoré de Grimaldi s'installe au château, il fut l'objet  de diverses convoitises de plusieurs barons prit le titre de château comtal pour la famille Laurenti  professeur doyen à l'académie de Montpellier et médecin de la reine Marie de Médicis et d'HenriI V et Joseph-François-Félix de Raynardi de Sainte-Marguerite comte de Belvédère baron de l'Empire et les Boschetti de Chieri  habitant de Modène  en étaient châtelains à titre perpétuel, le général autrichien de Wins y installa  son quartier général en 1791 ils furent refoulé par l'armée française en 1793 la guerre et le tremblement de terre détruisit l'ensemble des habitations et du château.","architecture":"Belvédère; du château construit  en 1252 sur une crête surplombant la Vésubie, il ne reste que des vestiges.","habitants":"famille de Vintimille Honoré de Grimaldi\r\n        \"","divers":"Vestiges et village de Belvédère.","gps":"","images":["../image/image_06/06_Belvedere_1.jpg","../image/image_06/06_Belvedere_2.jpg"]},"Consult_chateau_formulaire9960":{"id":"Consult_chateau_formulaire9960","dept":"06","canton":"Contes","commune":"Berre-les-Alpes","nom":"Berre_les_Alpes","type":"Vestiges","periode":"XIII","histoire":"BERRE les ALPES; cité en 1108 par Raymond Caglièri. Au XIe siècle la région compté onze châteaux dont celui de Berre \"le castellum Barra\". Propriété des comtes de Provence, passa aux comtes de Barcelone  avant d'appartenir au comte d'Anjou  en 1245.  Raymond de Berre  en 1270 achète Contes une partie des Tourettes et une autre partie de Châteauneuf,  ils y installèrent une co-seigneurie  de deux frères niçois Bertrand et Isoard,  issus des barons de Berre. Le château fut agrandi en 1350 par Gaspard de Berre , épouse la baronne Yolande Galléan transforme ce lieu  privé pour  la noblesse  qui donnera des fêtes restées célèbres. Après la dédition de 1388 les Berre obtiendront la seigneurie de Gilette en 1503 érigé en Baronnie , ils sont co_seigneurs de  de Berre de Châteauneuf, Tourette, Falicon et Ascros en 1602 et garderont ces seigneuries érigées en Baronnie, et, en 1696. date de restitution du comté de Nice au comte de Savoie. Le titre de Baron de Berre passe par alliance aux Delaise et aux Terrassani et aux XVIIIe siècle aux Cachiardi.  En 1749 restitution du comté de Nice au roi du Pièmont et de Sardaigne, en 1826 le dernier baron de Berre, Emile Antoine Cachiardi, est investi du titre par Charles Félix roi du Piémont-Sardaigne. Avant la Révolution le fief passa au Cabris dont la marquise de Cabris  \"Louise de Mirabeau\" s'en sépara à la Révolution s'exila en Italie. A la fin du premier empire retour au roi de Sardaigne et en 1860 retour à la France.","architecture":"Berre les Alpes; le château féodal construit au XIIe siècle agrandi au XIVe siècle et détruit à la Révolution, il ne reste que des ruines.","habitants":"Famille de Raymond de Berre\r\n        \"","divers":"Village de Berre les Alpes","gps":"","images":["../image/image_06/06_Berre_les_Alpes_1.jpg"]},"Consult_chateau_formulaired4aa":{"id":"Consult_chateau_formulaired4aa","dept":"06","canton":"Guillaumes","commune":"Beuil","nom":"Beuil","type":"Vestiges","periode":"XII","histoire":"BEUIL; Position stratégique dans les gorges du Cians que les romains firent édifier le castrum Boliacum, un fort qui servit de relais à leurs armées, la seigneurie est fondée à la fin du Xe siècle. Au XIe siècle le village  sous l'emprise du pouvoir épiscopal , en 1230 au comté de Provence fait partie de la Vigerie de Puget-Théniers. En 1258 révolte contre le seigneur Guillaume Rostaing qui est assassiné.  En 1315 sa fille Astruge épouse Andaron Grimaldi (oncle de Rainier Ier Grimaldi de Monaco), créant la dynastie des Grimaldi de Beuil, puissant et encombrant  navigue entre leur protecteurs, ils créeront un des plus grand fief de Provence  qui sera à l'origine de dédition  du pays niçois, ils régneront trois cent ans, grand vassal du comté de Savoie les Grimaldi du Beuil seront fréquemment gouverneur du comté de Nice. A l'assassina de la reine Jeanne  en 1382,  la maison de Savoie reprend possession du fief, en 1387 les Grimaldi de Beuil possède les territoires de Péone, Beuil, Robion, Roure, Illonse, Bairols, Touët sur Beuil, Rigaud et Pierlas. En 1561 érigé en comté augmente leur  fief d'une dizaine d'autres  et en 1621 la dynastie s'étend avec Annibal de Grimaldi qui est exécuté pour trahison.  Les fiefs sont confisqués  et le château est démantelé  en 1633 après être  inféodé avec Péone et Sayze au comte de Cavalca de Parme qui passa par alliance au baron de Chenillac.  Après la Révolution le comte Mattei propriétaire habitant à Turin renonce à ses droits sur Beuil vend ses biens aux villageois.","architecture":"Beuil; vieux village  et vestiges du château féodal du XIIe siècle  qui après sa destruction servit de carrière de pierre pour la construction du village.","habitants":"Famille de Grimaldi de Beuil\r\n        \"","divers":"Village de Beuil et clocher","gps":"","images":["../image/image_06/06_Beuil_1.jpg","../image/image_06/06_Beuil_2.jpg","../image/image_06/06_Beuil_3.jpg"]},"Consult_chateau_formulaire1934":{"id":"Consult_chateau_formulaire1934","dept":"06","canton":"Coursegoules","commune":"Bézaudun-les-Alpes","nom":"Bezaudun_A_M","type":"Château","periode":"XIII","histoire":"BEZAUDUN; cité en 1232  castrum fondé entre 1224 et 1231 lors des luttes opposant la noblesse locale au comte de Provence et son capitaine Romée de Villeneuve, ce dernier récupère le château et  le donne à l'évêque de Vence en 1233 qui le remaniera au cours des ans et  restera dans leurs mains jusqu'à la Révolution.","architecture":"Bézaudun: vestiges du château  de plan rectangulaire comprend trois corps de bâtiment accolés;  un donjon et deux logis,  le second est flanqué d'un pigeonnier, reste d'une tour du XIII-XIVe siècle.","habitants":"Evêché de Vence\r\n        \"","divers":"Village de Bezaudun et son château remanié.","gps":"","images":["../image/image_06/06_Bezaudun_A_M_1.jpg","../image/image_06/06_Bezaudun_A_M_2.jpg","../image/image_06/06_Bezaudun_A_M_3.jpg","../image/image_06/06_Bezaudun_A_M_4.jpg","../image/image_06/06_Bezaudun_A_M_5.jpg","../image/image_06/06_Bezaudun_A_M_6.jpg"]},"Consult_chateau_formulaire0e4b":{"id":"Consult_chateau_formulaire0e4b","dept":"06","canton":"Antibes","commune":"Biot","nom":"Biot","type":"Vestiges","periode":"XIII","histoire":"BIOT: Au XIe siècle le fief dépendait de l'abbaye de Saint-Victor de Marseille, le château et l'église  dépendaient des évêques d'Antibes. En 1209 le comte de Provence fit donation du castrum et  tout ses biens a l'ordre du temple qui cessèrent leur activité en 1308 les biens furent remis aux Hospitaliers de Saint-Jean de Jérusalem. En 1470 le roi René fit repeupler Biot,  installe cinquante familles venues du Val Oneille (Impèria-Italie).             Biot dut se fortifier dans la deuxième moitié du XIVe siècle joua un rôle important dans les événements militaires qui se déroulèrent dans la région.                                                                                 Dans la commune le château de Funel qui a disparu par le site Sophia-Antipolis.","architecture":"Biot; il ne reste plus rien des châteaux, seulement des arcades côté nord qui date du XIII et XIVe siècle et une porte du XVIe siècle et un musalae romain de la chèvre d'or.","habitants":"Evêques d'Antibes\r\n        \"","divers":"Village de Biot, vestiges de la tour de la chèvre d'Or, et château.","gps":"","images":["../image/image_06/06_Biot_1.jpg","../image/image_06/06_Biot_2.jpg","../image/image_06/06_Biot_3.jpg","../image/image_06/06_Biot_4.jpg"]},"Consult_chateau_formulairec3a8":{"id":"Consult_chateau_formulairec3a8","dept":"06","canton":"Breil-sur-Roya","commune":"Breil-sur-Roya","nom":"Breil_sur_Roya","type":"Vestiges","periode":"XIII","histoire":"BREIL sur ROYA;  En 973 , les Sarrasins  sont définitivement chassés de la région grâce à la coalition formée par Guillaume Ier de Provence, le comte d'Arles et Ardoin de Suze, les territoires de Breil, Saorgue, Tende et la Brigue sont inféodés  aux comtes de Vintimille  vassaux des comtes de Turin,  ils construisirent le castrum de Brehl en 1239  et la tour Cruelam dit \"Cruella\"  Les Breillois s'en emparent, et en 1252 date à laquelle ils doivent tous restituer aux Génois. En 1258 Les comtes Georges et Boniface de Vintimille cèdent au comte de Provence à Charles Ier d'Anjou les droits de Breil et Saorgue, passe en 1388 au comte de Savoie sur la dédition.  En 1699 passe au comte de Provence. Puis acheté par Jean de Ribotti en 1700 érigée en marquisat par le duc de Savoie au profit du comte Octave Solar de Gouvon illustre personnage à la cour de Turin.  A la Révolution en 1793 passera pour vingt et un ans à la France et passera définitivement  en 1860.                            Le château de Peine Haute Jusqu'en 1815 le château constitue la position stratégique la plus avancée de la République de Génes dans la vallée de  la  Roya.","architecture":"Breil sur Roya;  du château de Brehl,  d'Arc-Casté et la tour de la Crivella,  il ne reste que des pans de murs et la porte de Brehl, d'Italie et vestiges des fortifications construite à proximité de l'agglomération, fort construit au XIXe siècle pour la défense des Alpes Maritimes.","habitants":"Famille de Boniface de Vintimille\r\n        \"","divers":"Château de Brehl, de la Peine, vestiges  d'Ar-Castré et la tour de Crivelle.","gps":"","images":["../image/image_06/06_Breil_sur_Roya_1.jpg","../image/image_06/06_Breil_sur_Roya_2.jpg","../image/image_06/06_Breil_sur_Roya_3.jpg","../image/image_06/06_Breil_sur_Roya_4.jpg","../image/image_06/06_Breil_sur_Roya_5.jpg","../image/image_06/06_Breil_sur_Roya_6.jpg"]},"Consult_chateau_formulaire4aeb":{"id":"Consult_chateau_formulaire4aeb","dept":"06","canton":"St-Aubin","commune":"Briançonnet","nom":"Brianconnet","type":"Vestiges","periode":"XII","histoire":"BRIANCONNET; Village fortifié cité au XIe siècle  appelé Brianzo et Castelli Brianconis aurait été le siège  de l'évêché  de Glandevès, aux moines de Lerrins la seigneurie a appartenu aux Grasse Bar de 1474 à la Révolution.","architecture":"Briançonnet; Il ne reste que des ruines du château féodal cité en 1080 qui possédait quatre tours dont  une servait de tour de guet a été remanié au XIVe siècle et abandonné à la fin du Moyen  Age au profit de nouvelle implantation.","habitants":"Famille de Grasse Bar\r\n        \"","divers":"Vestiges du château de Briançonnet","gps":"","images":["../image/image_06/06_Brianconnet_1.jpg","../image/image_06/06_Brianconnet_2.jpg"]},"Consult_chateau_formulaireab4e":{"id":"Consult_chateau_formulaireab4e","dept":"06","canton":"St-Vallier-de-Thiey","commune":"Cabris","nom":"Cabris_Escragnolles","type":"Vestiges","periode":"XI-XII","histoire":"CABRIS; Cité au XIIe siècle  Cabris lieu dit de chèvre, fief de Guillaume II de Provence dont le vassal Roabard Ier  de Grasse-Bar seigneur fit construire le château en 1252. En 1496 Balthazard marquis de Cabris y installe cinquante familles, passera à la famille Clappier de Gréoux jusqu'en 1789. Célébrité  au XVIIIe siècle due à l'éclat  que lui donne la marquise de Cabris Louise de Mirabeau (soeur de Mirabeau) qui à épousé Jean-Paul de Cabris. La seigneurie de Cabris qui vivait  à Grasse dans leur hôtel demeure construite en 1770.                                                                 Escragnolles; château de la famille des comtes d'Escragnolles cité en 1252 remanié transformé en appartement.","architecture":"Cabris, du premier château féodal construit au XI- XIIe siècle il ne reste plus rien, détruit en 1384-05 par les Duras dans la lutte de succession après la mort de la reine Jeanne , le second construit au XVIe siècle  sur l'emplacement,  à été démoli à la Révolution, reste la plate forme et mur d'enceinte.","habitants":"Famille Clappier de Gréoux\r\n        \"","divers":"Vestiges du château de Cabris et d'Escragnolles.","gps":"","images":["../image/image_06/06_Cabris_Escragnolles_1.jpg","../image/image_06/06_Cabris_Escragnolles_2.jpg","../image/image_06/06_Cabris_Escragnolles_3.jpg","../image/image_06/06_Cabris_Escragnolles_4.jpg","../image/image_06/06_Cabris_Escragnolles_5.jpg"]},"Consult_chateau_formulaire1caf":{"id":"Consult_chateau_formulaire1caf","dept":"06","canton":"Cagnes-sur-Mer","commune":"Cagnes","nom":"Cagnes_sur_Mer","type":"Château","periode":"XIV","histoire":"CAGNES; Commence au Ve siècle  avec la fondation des moines du Lérins, en 1033 aux mains des Villeneuve et en 1220 à Raymond Béranger V comte de Provence issu de la maison des comtes de Barcelonne, Raymond fit construire le château  qui passa par alliance à Charles  d'Anjou avec Béatrice, fille du comte, leur petit-fils Robert d'Anjou transmet la seigneurie et revendu  en 1309 à Rainier Ier  Grimaldi  ( branche cadette d'origine Génoises chassée de Gènes en 1297 par les Doria, s'établit à Monaco possession de cette famille depuis le XIe siècle), se met au service  de Philippe Auguste qui le nomme amiral de France, cette seigneurie de Monaco  apporte en construction la beauté que l'on trouve aujourd'hui. En 1370 Rainier II le petit-fis de l'amiral vend Cagnes à son cousin Luc Grimaldi seigneur d'Antibes qui ce dernier fonde la branche des Grimaldi de Cagnes et d'Antibes, désormais séparé  de celle de Monaco. Les Grimaldi restent fidèles à leurs propriétés lors des envahissements de Charles Quint en 1523-1536. Remaniement du château  par Jean-Henri-Honoré de Grimaldi en 1620,  érigé en marquisat en 1677. En 1710 Honoré de Grimaldi fut arrêté par d'Artagnan pour fabrication de  fausses monnaies,  et Cagnes  passe par héritage aux Goyon-Matignon marquis de Cagnes  qui émigra en 1792 , le château fut vendu comme bien national à la Révolution. En 1800 quartier général du  maréchal Suchet et fut acquis par la famille Gerbaud et vendu en 1873 au docteur Clément Gerecke qui entreprend la restauration des dégâts subit lors des occupations piémontaises de 1815. En 1936 racheté par la commune pour le transformé en musée.","architecture":"Cagnes sur Mer; Cité en 1033, importants vestiges de l'enceinte XII  XIIIe siècle,  porte de Saint-Paul, porte Ferrière à bretèche, porte d'Antibes  ouverte  en 1830 et porte de Nice  ogivale du XIIIe siècle. Village médiévale fortifié perchée sur une butte conique dominé par la masse importante de son château bien restauré, donjon polygonal  à créneaux et mâchicoulis  ajouté au XIXe siècle et chemin de ronde sur mur crénelé du XIIIe siècle. La forteresse du XIVe siècle  de forme pentagonale architecture militaire endommagé à la Révolution propriété de la commune en 1937 (musée).","habitants":"Famille de Grimaldi de Cagnes\r\n        \"","divers":"Château des Grimaldi, et musée Renoir.","gps":"","images":["../image/image_06/06_Cagnes_sur_Mer_1.jpg","../image/image_06/06_Cagnes_sur_Mer_2.jpg","../image/image_06/06_Cagnes_sur_Mer_3.jpg","../image/image_06/06_Cagnes_sur_Mer_4.jpg","../image/image_06/06_Cagnes_sur_Mer_5.jpg","../image/image_06/06_Cagnes_sur_Mer_6.jpg"]},"Consult_chateau_formulaire13b6":{"id":"Consult_chateau_formulaire13b6","dept":"06","canton":"Cannes","commune":"Cannes","nom":"Cannes_Cannet","type":"Vestiges","periode":"XI-XII","histoire":"CANNES;  Vers l'an 1000 le village se construit autour d'un castrum qui coiffe la colline de Suquet propriété des  comtes de Provence donné par Guillaume de Gruetta, fils de Rodoart prince d'Antibes concernant le château en boisdit \"Marcellini\" tour édifié au XIe siècle et mur d'enceinte, le nouveau château prend le nom de château Franc au profit de l'abbé du Lérins. Au XVe siècle le château est laissé à l'abandon qui passa sous la tutelle royale et sur demande d' Augustin Grimaldi abbé de Lérins qui fit renforcer la défense en un style militaire et ne sera pas modifier jusqu'au XVIIIe siècle, malgré les  périodes d'invasions plus épidémie de peste,  guerre de Charles Quint, occupation savoyarde et les espagnols qui prennent les îles du Lérins. En 1707 reprise par le duc de Savoie, puis guerre de succession d'Autriche en 1736; les troupes impériales envahissent Cannes. Le château est prévu à la démolition sur demande  de l'évêque de Grasse seul l'aile ouest sera détruite le château sera vendu en 1791 à Jean-Charles Hibert maire de la ville  son fils  ordonne la démolition de la tour donjon mais arrêtait par les moines  pécheurs de Cannes qui  le transforment  en 1878 en supprimant les parties crénelées, et la ville le racheta aux XXe siècle pour en faire un musée  dit de la Castre.  En 1815 Napoléon, de retour de l'île d'Elbe, séjourne à Cannes.                                                                                   Le CANNET; Logé au cur de sept collines,  commune qui s'est séparé de Cannes en 1778. dans le vieux Cannet, la tour des Danys dit tour des \"Brigands\" construite au XIIe siècle,  édifiée par l'abbé du Lérins, seigneur de Cannes refuge pour assurer la sécurité des habitants. appartient depuis longtemps à la famille de monsieur  Jean Paul Calvi, ainsi que la  tour  de Calvi, tour de Guet au XVIe siècle, remanié  au XIXe siècle qui porta le nom des Calvis ancienne famille fondatrice du Cannet arrivée en 1441 cette dernière sauva en 1707 les habitants qui s'y réfugièrent étaient en lutte contre l'abbé Ardison; elle fut vendu comme bien national à la Révolution. dans la commune le domaine Garibondi du XIXe siècle.                A Cannes la Bocca une tour ronde accolée à un bâtiment rectangulaire aujourd'hui hôtel de la Tour construit en 1870.      Dans la commune la villa Domergue, Romée et Rothschild toutes date du XXe siècle.","architecture":"Cannes; Tour du Suquet ensemble rectangulaire sur la butte:  tour de guet haute de 22 mètres,  construite entre 1070 et 1385 par d'Adebert II abbé du Lérins, possédait autrefois des mâchicoulis, deux corps de bâtiment remaniés qui entourent la tour,  les tours d'angles du XVIe siècle ils n'en restent que les bases. Le château partiellement démantelé en 1736 ne subsiste qu'un fragment de rempart du XIVe siècle le musée appelé château de la Castre sur l'emplacement du Castrum.                                                             Dans la ville tour des Calvis tour de guet du XVIe remanié au XIXe siècle,  le domaine du château de Garibondi  XIXe siècle                                    Le Cannet; logé  au coeur de sept collines la ville bénéficie d'une vue panoramique  sur les îles du Lérins et le massif de l'Estérel, a su conserver la tour des Danys \"des Brigands\" du XIIe siècle remanié au XIXe siècle avec mâchicoulis , seul ouverture  d'accès au deuxième étage. et la tour de Calvis accolée à l'église sainte Philoméne.","habitants":"Abbé du Lerins\r\n        \"","divers":"Cannes; tour du Suquet et tour des Calvis, domaine de Garibondi, château des Rothchild. Au Cannet tour de Danys. Château Scott à la Bocca.","gps":"","images":["../image/image_06/06_Cannes_Cannet_1.jpg","../image/image_06/06_Cannes_Cannet_2.jpg","../image/image_06/06_Cannes_Cannet_3.jpg","../image/image_06/06_Cannes_Cannet_4.jpg","../image/image_06/06_Cannes_Cannet_5.jpg","../image/image_06/06_Cannes_Cannet_6.jpg","../image/image_06/06_Cannes_Cannet_7.jpg","../image/image_06/06_Cannes_Cannet_8.jpg","../image/image_06/06_Cannes_Cannet_9.jpg"]},"Consult_chateau_formulairec262":{"id":"Consult_chateau_formulairec262","dept":"06","canton":"Villefranche-sur-Mer","commune":"Le Cap-d`Ail","nom":"Cap_d_Ail","type":"Château","periode":"XIX","histoire":"CAP-d'AIL; Commune  qui fut longtemps un hameau de la Turbie, depuis 1908, indépendant, bien que voisin à Monaco, a subi l'occupation  des Génois, puis des Guelfes qui était en conflits avec les Gibelins, possession des Grimaldi de Monaco et des Spinola de Gènes, les Richelmi de Levens et les Gabaud de la Turbie en furent propriétaires jusqu'en 1331 Daniel Marquesan co-seigneur du fief le cède  au comte de provence, Robert le Sage,  passera ensuite par le reine Jeanne au seigneur de Monaco de 1388 jusqu'en 1860,  revient à la France. Cette petite station  de bord de mer fut lancée par le baron de Pauville en 1879 pour les hivernaux fortunés fit développer les grandes villas tel que  le château de l'Ermitage ou Malet construit par Sir Edwards Malet  ancien ambassadeur d'Angleterre à Berlin dans les années 1890 a eu des visites des plus grands personnages du siècle dernier dont la famille du tsar Nicolas II, la reine Victoria, la princesse Béatrix, Edouard VII roi d'Angleterre, et Léopold II roi des Belges l'impératrice Eugénie et autres, presque à l'état de ruine  a retrouvé sa splendeur  devenu l'Amphithéâtre  de Jean Cocteau.           Dans cette commune  le château des Terrasses de William Mendel banquier londonien, en 1885 fut d'abord la résidence  de l'impératrice Maria Fédérovna et de son fils Georges, y séjourna Alexandrovytch frère du tsar Nicolas II et le président Félix Faure. Vendu en 1914 a Anne Emilie Lans du Eyssier, acheté ensuite  à la deuxième guerre mondiale par Frédéric Buchingham  consul d'Angleterre.                                                                                     Résidence de l'Eden ou hôtel Radium doit son existence à l'intuition du baron de Pauville, construit en 1892 pour Charles-Alfred-Léon Nicolle propriétaire du petit journal \"le Niçois\".             Résidence le Cap Fleuri du XIXe siècle ancien hôtel Stanilas, transformé en établissement sanitaire, son fondateur le docteur Onimus  dans lequel y séjournèrent des personnalités  tel que l'empereur du Brésil Don Pédro, puis acheté par la comtesse  Vauden-Austen pour en faire une maison de plaisance, aujourd'hui maison de retraite.                                                                        D'autres villas  Mouette, Del Mare, Léa, Logres, Primavéra, Fanette, Torrontina, villa de Sacha Guitry,  et la villa Lumière édifié en 1902 par Auguste Lumière appelé au départ \" Perle Blanche\".  Rebaptisé en 1920 \"villa Lumière\", Villa Hélios de Louis Lumière et la Pergola d'Antoine Lumière démoli en 1945 reconstruite par les Boussac revendue pour devenir la copropriété \"le Parc\".","architecture":"Cap d'Ail; Château de l'Hermitage ou Mallet construit en 1890  de plan irrégulier par l'architecte  danois Hans Georg Tersling.                         Château des Terrasses  construit en 1860 de style italien, présente un corps  de bâtiment principal encadré de deux tours de plein-pied surmontées de magnifiques terrasses, balustres, escaliers et frontons triangulaires; aujourd'hui propriété de la ville.               Château des frères Lumières  édifié en 1902 (Perle Blanche) à quatre niveaux avec deux tours en façade  en cul de lampe, escalier en fer à cheval  flanqué au nord d'une tour d'escalier couverte en coupole métallique.                                                 Résidence de l'Eden (Hôtel Radium) construit en 1892.                Résidence du Cap-Fleuri construit au XIXe siècle  corps de logis rectangulaire à fronton triangulaire, aujourd'hui maison de retraite.                            Château dit\" villa Violette\" construite en 1905 pour Jeanne Jeanbernat avec une tour belvédère et un logement pour le gardien Vavell Wakefield.","habitants":"Prince de Monaco                                                                                baron de Pauville\r\n        \"","divers":"Château Mallet, des Terrasses, de la Perle Blanche, hôtel Eden, Cap-Fleuri et diverses  villas.","gps":"","images":["../image/image_06/06_Cap_d_Ail_1.jpg","../image/image_06/06_Cap_d_Ail_2.jpg","../image/image_06/06_Cap_d_Ail_3.jpg","../image/image_06/06_Cap_d_Ail_4.jpg","../image/image_06/06_Cap_d_Ail_5.jpg","../image/image_06/06_Cap_d_Ail_6.jpg","../image/image_06/06_Cap_d_Ail_7.jpg","../image/image_06/06_Cap_d_Ail_8.jpg","../image/image_06/06_Cap_d_Ail_9.jpg"]},"Consult_chateau_formulaire486c":{"id":"Consult_chateau_formulaire486c","dept":"06","canton":"Menton","commune":"Roquebrune-Cap-Martin","nom":"Cap_Martin","type":"Villa","periode":"XIX","histoire":"Dans la commune à Cap-Martin site résidentiel de nombreuses villas luxueuses,                                                                             Villa Cyrnos construite en 1892 résidence belle époque du XIXe siècle pour l'impératrice Eugénie de Montijo.                            Villa Cypris de style byzantine édifiée en 1904 pour Robert Douine épouse du directeur des grands magasins du Louvre à Paris,                                   Aréthuse-Trianon construite en 1899 par Hans Georg Tersling pour Georges de Montgomery,                                                            Villa  Zoraïde, appartient à Daisy Fellouves,                                Villa Del Mar  ou vécu l'actrice Silvana Mangano dans les années cinquante et  Mobutu  ancien président africain.                        \r\nVilla  E 1027 construite en 1930 pour Eileen Gray de style Corbusier.                                                                              \r\n Villa Zamir construite en 1902 pour le banquier Alfred Khan.                Villa Torre Clémentina ou Torrentina de l'épouse du banquier Louis Stern 1840-1900.                                                                               Villa les Rochers de l'impératrice Eugénie Villa Eclaircie ainsi que d'autres non citées.","architecture":"Cap-Matin toutes ces villas sont construites aux XIXe siècle dans des styles différents.","habitants":"l'impératrice Eugénie de Montijo\r\n        \"","divers":"","gps":"","images":["../image/image_06/06_Cap_Martin_1.jpg","../image/image_06/06_Cap_Martin_2.jpg","../image/image_06/06_Cap_Martin_3.jpg","../image/image_06/06_Cap_Martin_4.jpg","../image/image_06/06_Cap_Martin_5.jpg","../image/image_06/06_Cap_Martin_6.jpg"]},"Consult_chateau_formulaire8fb5":{"id":"Consult_chateau_formulaire8fb5","dept":"06","canton":"Menton","commune":"Menton","nom":"Carnoles","type":"Palais","periode":"XVII","histoire":"CARNOLES; La ville de  Menton fait partie du patrimoine des Grimaldi depuis le XIVe siècle,  au XVIIe siècle Honoré II fait construire un pavillon de plaisance dans les jardins de Carnolés, construit en 1717 à 1725 pour le prince Antoine Ier de Grimaldi de Monaco, duc de Valentinois et pair de France, résidence d'été des princes de Monaco, construction d'après les plans de l'architecte  Gabriel dans le style  grand Trianon de Versailles. Le palais est réquisitionné à la Révolution, puis de retour à cette famille le prince Honoré IV restaure le palais, en 1861 Menton et Roquebrune son rattachés à la France  et en 1863  Charles III de  Grimaldi prince de Monaco se défait du palais qui est transformé en casino avant d'être une résidence  occupé par les reines de Prusse et de Bavière  et par le prince de Metternich, en 1896 acheté par un  docteur américain  Edward Allis qui fit  transformer la demeure par l'architecte danois Georg Tersling et finalement acheté par la ville de Menton et  le département des Alpes Maritimes pour abriter les collections de peintures constitués par des dons de la famille de Rothschild et le legs de Wekefield Mori.","architecture":"Carnolés construit  en 1717 à 1725, les bâtiments   domestiques ont été démolis, les logements d'officier ont servit de casino encore debout restauré en style du XVIIIe siècle en 1820 avec beaux décors intérieurs, l'escalier extérieur à double révolution a été remplacé par un autre intérieur. Façade  avec deux avant-corps flanquant le corps central, avec loggia à arcades, au niveau de l'étage trois baies en plein cintre; la baie du centre encadré de deux colonnes ioniques sur un balcon soutenu par des consoles.","habitants":"Famille d'Honoré de Grimaldi\r\n        \"","divers":"Palais de Carnoles","gps":"","images":["../image/image_06/06_Carnoles_1.jpg"]},"Consult_chateau_formulaire0f94":{"id":"Consult_chateau_formulaire0f94","dept":"06","canton":"Grasse","commune":"Carros","nom":"Carros","type":"Château","periode":"XII","histoire":"CARROS; Au IIe siècle Vicus Lavaratensis. Au XIIe siècle le village possédait un château féodal  qui le domine ainsi que la vallée du Var,  il est appelé à l'époque(Castrum Carossi), il appartenait à la seigneurie des Blacas  très lié à l'ordre des chevaliers de Malte dont le premier seigneur vassal était Rostang de Carros. Ce château fut sauvé des conflits malgré les destruction successives au XVIIe siècle  placé entre le comté de Nice et le comté de Grasse territoire de la Provence, il ne sera jamais intégré au comté de Nice, en 1860 Carros rejoint de nouveau les Alpes-Maritimes, il va connaître une immigration italienne durant le reste du XIX-XXe siècle, le château à gardé sa structure médiéval, a échappé à la période révolutionnaire dont les seigneurs durent émigrés, divisé et vendu à neuf propriétaires commence à se dégrader au XXe siècle mais la commune en le rachetant le rénove pour en faire un lieu d'expositions.","architecture":"Carros; de plan rectangulaire à quatre niveaux et attiques, flanqué de deux tours rondes à toits plats côté ouest et tour carrée saillante à l'est.","habitants":"seigneurie des Blacas\r\n        \"","divers":"Village de Carros et son château.","gps":"","images":["../image/image_06/06_Carros_1.jpg","../image/image_06/06_Carros_2.jpg","../image/image_06/06_Carros_3.jpg","../image/image_06/06_Carros_4.jpg","../image/image_06/06_Carros_5.jpg","../image/image_06/06_Carros_6.jpg"]},"Consult_chateau_formulaireaec6":{"id":"Consult_chateau_formulaireaec6","dept":"06","canton":"Contes","commune":"Châteauneuf-de-Contes","nom":"Chateauneuf_Bendejun","type":"Vestiges","periode":"XVI","histoire":"CHATEAUNEUF de Contes; aujourd'hui Châteauneuf-Villevieille que le \"mauvais oeil\" s'acharna sur ce village suite à plusieurs cataclysmes destructeurs, murs, barbares,  tout  à commencer au temps des seigneurs du XVIIe siècle, en 1631 la peste deux cents personnes perdront la vie, en 1733 sécheresse, en 1744 la guerre franco-espagnole et en 1793 les révolutionnaires  saccagent le village ceci oblige les gens a aller s'installer à Villevieille et le comble en 1887 un terrible tremblement de terre finit de détruire les maisons seigneuriales et la foudre détruit la tour défensive.                  BENDEJUN: L'histoire de Bendejun se confond avec celle de châteauneuf jusqu'au 25 Juin 1911.  cité au XIe siècle; bec voulant dire éperon pointe, Jun nom d'une importante famille romane de Cimiez qui possédait des terres à Bendejun d'où le nom Bendejun, fief de l'église de Saint-Benoit, cette commune de Châteauneuf de Contes prit le nom de châteauneuf-Villevieille.  En 1622  fief des évêques de Nice, dont l'évêque Mgr Maletti érigea la paroisse en lieudit  qui se détacha de Châteauneuf,  au XIXe siècle la bourgeoisie y firent construire des demeures de plaisances tel que le manoir des seigneurs de Rossa et le château du Chevalier Mari \"la Pergola\".   Dans la commune château de la Tour du XVIe siècle et la maison des barons de Raiberti du XVIIIe siècle.","architecture":"Châteauneuf de Contes ; les ruines du château qui fut abandonné au XVIe siècle , il reste aujourd'hui  une courtine flanquée de deux grosses tours rondes d'angles qui dateraient du XIIIe siècle.  Bendejun; sur la ligne des crêtes du Férion vestiges des fortifications de 1747 et d'enceinte du château féodal et des vestiges de fortifications qui remontent au IXe siècle et au XIIe siècle.","habitants":"Seigneurs locaux\r\n        \"","divers":"Vestiges du château de Châteauneuuf et village de Bendejun.","gps":"","images":["../image/image_06/06_Chateauneuf_Bendejun_1.jpg","../image/image_06/06_Chateauneuf_Bendejun_2.jpg","../image/image_06/06_Chateauneuf_Bendejun_3.jpg","../image/image_06/06_Chateauneuf_Bendejun_4.jpg","../image/image_06/06_Chateauneuf_Bendejun_5.jpg","../image/image_06/06_Chateauneuf_Bendejun_6.jpg","../image/image_06/06_Chateauneuf_Bendejun_7.jpg"]},"Consult_chateau_formulaire765b":{"id":"Consult_chateau_formulaire765b","dept":"06","canton":"Guillaumes","commune":"Châteauneuf-d`Entraunes","nom":"Chateauneuf_Entraunes","type":"Vestiges","periode":"XIII","histoire":"CHATEAUNEUF d'Entraunes; Cité au XIIe siècle \"Castrum de Castro Novo\", le village du Val d'Entraunes était inféodé par les familles seigneuriales ; les Glandevès, les Balb, les Rostaing et les Féraud de Thorame, sous la dépendance des comtes de Provence. Le val d'Entraune  dépendait avant 1388 de Barcelonnette, quand les comtes de Savoie acquièrent Barcelonnette et Châteauneuf d'Entraunes qui seront  rattachés à la viguerie de Puget-Théniers. La seigneurie passa aux Grimaldi  de Beuil à la fin du XIVe siècle. Annibal de Grimaldi 1557-1621 comte de Beuil  joua un jeu dangereux  d'abandonner le  roi de France au profit du roi d'Espagne ce fut une trahison condamné à mort en 1621 par le sénat de Nice, il fut étranglé par deux esclaves turcs. Le comte n'ayant pas payé d'impôt au duc de Savoie  une demande d'arriéré de 1545 à 1548,  le village fut vendu en 1645 à l'abbé Collet Papachano et a dû subir les guerres, Entraunes vendu au Gentilhomme Louigny, Saint-Martin à un Chenillat de Péonne et Villeneuve à un certain Michaël Ange Codi de Turin en 1702, toutes ces communautés ont racheté leur liberté de leurs éphémères seigneurs.","architecture":"Châteauneuf d'Entraunes; du château médiéval du XIIIe siècle   il ne reste que le donjon restauré avec des  tourelles militaires.                    A Villeneuve vestiges du château des Villeneuve au sommet du village.","habitants":"Famille de  Glandevès \r\n        \"","divers":"Fort d'Entraunes","gps":"","images":["../image/image_06/06_Chateauneuf_Entraunes_1.jpg"]},"Consult_chateau_formulaire62c6":{"id":"Consult_chateau_formulaire62c6","dept":"06","canton":"Cagnes-sur-Mer","commune":"La Colle-sur-Loup","nom":"Colle_sur_Loup","type":"Château","periode":"XVII","histoire":"COLLE sur LOUP;  Sous la juridiction de l'évêché de Vence du VI , effondrement de l'empire romain, invasion des Sarrasins, au Moyen-Age la Colle sur Loup était intégré à la commune de Saint-Paul de Vence, du Xe au XIIe siècle cédé à l'abbaye du Lérins par l'évêque de Vence, successivement aux comte de Barcelonne, au duc d'Anjou et aux comtes de Provence  et sous le régime de Raymond Béranger V, une conquête fut mené par Romée de Villeneuve  qui reçu en récompense le territoire  sud du Gaudelet ou il fit construire en 1230 l'actuel château de Villeneuve. En 1219 le fief dépendait du Gaudelet. En 1538 la venue de François Ier qui séjourna au château de Villeneuve apporta des modifications militaires  dans la région  et installa des familles importantes dans les villages  environnant pour le développement.  Le  site fut racheté à la communauté  de Saint-Paul sous les appellation \"Forest\", puis \"Faubourg\" et ensuite bourg de la Colle en 1789 la commune s'appelle la Colle du Var puis la Colle sur Loup.","architecture":"La Colle sur Loup; site important par le château voisin de Villeneuve Loubet et le château de Montfort.","habitants":"Romée de Villeneuve\r\n        \"","divers":"La porte d'entrée au Village, le donjon, la villa Montfort, le château de la Colle Noir, le Canadel et l'Abbaye.","gps":"","images":["../image/image_06/06_Colle_sur_Loup_1.jpg","../image/image_06/06_Colle_sur_Loup_2.jpg","../image/image_06/06_Colle_sur_Loup_3.jpg","../image/image_06/06_Colle_sur_Loup_4.jpg","../image/image_06/06_Colle_sur_Loup_5.jpg","../image/image_06/06_Colle_sur_Loup_6.jpg","../image/image_06/06_Colle_sur_Loup_7.jpg"]},"Consult_chateau_formulaire3c47":{"id":"Consult_chateau_formulaire3c47","dept":"06","canton":"Roquesteron","commune":"Cuebris","nom":"Cuebris","type":"Vestiges","periode":"XIV","histoire":"CUEBRIS; ce village  encastré dans une brèche rocheuse au pied d'un piton  était à la frontière  du comté de Nice et de la Provence, en 1002 Cabrium : le château fut construit en 1320 par Geoffroy de Châteauneuf seigneur de Cuebris. Fut le fief des ducs de Savoie en 1388.Passa aux  Laugier, puis aux le Roux Ier seigneur et bien d'autres après, la famille Flotte jusqu'au rattachement du comté de Nice à la France. En 1760 le fief passe aux Isnardi seigneur de Coursegoules.","architecture":"Cuebris; ruines du château  qui fut construit en 1320 remanié au cours des ans malheureusement il ne reste que quelques pans de murs.","habitants":"Seigneur Geoffroy de Châteauneuf\r\n        \"","divers":"Vestiges sur motte.","gps":"","images":["../image/image_06/06_Cuebris_1.jpg","../image/image_06/06_Cuebris_2.jpg","../image/image_06/06_Cuebris_3.jpg"]},"Consult_chateau_formulairee6a7":{"id":"Consult_chateau_formulairee6a7","dept":"06","canton":"Guillaumes","commune":"Daluis","nom":"Daluis","type":"Vestiges","periode":"XII","histoire":"Daluis; Cité au XIIe siècle Castrum Adaluesio, les premiers seigneurs furent les Castellane-Thorame ( branche de la famille de Daluis), le fief passa aux Templiers, puis aux Hospitaliers de Saint-Jean de Jérusalem, Daluis comme Guillaume  en 1388 reste provençal, les Hospitaliers et les Corporandi d'Auvare reste co-seigneurs jusqu'au XVIIIe siècle le fief échoit aux Villeneuve Beauregard qui obtenu de la part  de Louis XIV  une concession pour l'exploitation du gisement de cuivre.  Au traité de Turin en 1760 le village est cédé au Piémont Sardaigne et à celui de la France.","architecture":"Daluis. Du château féodal du XIIe siècle qui fut détruit en partie au XIVe siècle et  restauré puis complètement détruit en 1793 par les révolutionnaires, du château féodal il ne reste que des pans de murs  et le reste d'un donjon.","habitants":"Seigneur Castellane-Thorame\r\n        \"","divers":"Vestiges sur motte","gps":"","images":["../image/image_06/06_Daluis_1.jpg","../image/image_06/06_Daluis_2.jpg","../image/image_06/06_Daluis_3.jpg","../image/image_06/06_Daluis_4.jpg","../image/image_06/06_Daluis_5.jpg"]},"Consult_chateau_formulaireb41b":{"id":"Consult_chateau_formulaireb41b","dept":"06","canton":"Contes","commune":"Drap","nom":"Drap","type":"Vestiges","periode":"XII","histoire":"DRAP, cité en 1115, Le château de Drap était une forteresse Romaine en 1073 devient château féodal, était un chef lieu d'une seigneurie  des évêques  de Vaison (Vaucluse) fut échangé avec l'accord de la maison de Savoie avec l'évêque de Nice  pour laquelle ils doivent une obole d'or au comte de Savoie, en 1252 le château est vendu à l'évêque par Romée de Villeneuve en bailliage du comte, transformé en ferme. En 1388 le château était encore cité mais en 1472 dépend de la communauté d'Eze ou un nouveau village prit place en 1586, village actuel sous le nom de comté de Drap, le titre disparu à la mort de monseigneur Raymond évêque de Nice  en 1963. Dans ce château eu lieu la rencontre en 1538 de Charles Quint et François Ier.","architecture":"Drap ;sur une cime dominant la vallée du Paillon et du Laguet, le château fut édifié à l'emplacement des fortifications romaines, il fut détruit suite au tremblement de terre en 1564, les ruines définies sous le nom du château donnent l'aspect, correspondant à une construction du XIIIe siècle.","habitants":"Romée de Villeneuve\r\n        \"","divers":"Vestiges","gps":"","images":["../image/image_06/06_Drap_1.jpg","../image/image_06/06_Drap_2.jpg"]},"Consult_chateau_formulaireb5ba":{"id":"Consult_chateau_formulaireb5ba","dept":"06","canton":"Villefranche-sur-Mer","commune":"St-Jean-Cap-Ferrat","nom":"Ephrussi","type":"Villa","periode":"XX","histoire":"VIlla EPHREUSSI  de Rothschild; La baronne Béatrice  de Rothschild légataire du baron Edouard de Rothschild, elle épousa le banquier Maurice Ephrussi  acheta un terrain de sept hectares sur les hauteurs de la presqu'île pour y construire  de 1905 à  1912 le palais de style renaissance florentin et vénitien  de couleur rose qui sera peu habité, elle y séjourna que quelques mois et au décès de son mari en 1915 elle n'y reviendra plus, au décès en 1934 de Béatrice la villa est léguée à l'Académie des Beaux-Arts servi de musée  \"Ile de France\" et depuis quelques années ouvert à différentes manifestations culturelles.","architecture":"La villa musée Ephreussi  de Rothschild  palais de style vénitien du XIXe siècle construite au sommet de la presqu'île de Saint  Jean Cap  Ferrat,  entre 1905 et 1912 ,  cette villa  a souffert pendant la deuxième guerre mondiale mais restaurée en 1961 avec des jardins remarquables.","habitants":"Maurice Ephrussi\r\n        \"","divers":"Villa","gps":"","images":["../image/image_06/06_Ephrussi_1.jpg","../image/image_06/06_Ephrussi_2.jpg"]},"Consult_chateau_formulaire1b88-2":{"id":"Consult_chateau_formulaire1b88-2","dept":"06","canton":"Villefranche-sur-Mer","commune":"Eze","nom":"Eze","type":"Vestiges","periode":"XII","histoire":"EZE ; Ancienne forteresse médiévale occupé par les Grecs dès le IVe siècle avant J.C. témoignage d'un magnifique patère d'argent conservée au Britisch muséum.  Vers l'an 220 avant J.C la population s'abrite sur le rocher.  Au XIIe siècle un seigneur du nom  Eze issue des comtes de Nice, fit construire le château entouré de remparts,  après être passé du comté de Provence en 1229 le château est confisqué par Raymond Béranger V, il appartient ensuite à la couronne d'Anjou -Provence  de 1246 à 1388,  puis passe au comté de Savoie qui améliore les fortifications, la  porte \"la Poterne\"  et fut érigé en comté en 1592.  Son altesse le prince Guillaume de Suède  en 1920 acquit un ensemble d'habitations qu'il transforma  et baptisa \"château d'Eza\" ou la famille royale y séjourna  de 1923 à 1953, aujourd'hui les ruines du château abrite le jardin exotique.                                       Dans la commune le château de Balsan ou du Seuil utilisé pour le tournage du film la main au collet avec Grace Kelly,  construit par le célèbre paysagiste Achille Duchêne en 1921  et le château de la Chèvre d'Or acquit au début du XXe siècle par le violoniste yougoslave Zlatko Balakovic pour le transformer en hôtel restaurant gastronomique, il est acheté en 1953 par Robert Wolf pour lui faire prendre une dimension internationale  par la venue de Walt Disney, passe en relais et châteaux  en 1960  Bruno Ingold consul d'Afrique du Sud à Monaco  s'associe à Robert Wolf pour le développer, racheté en 1992 par un fidèle client pour une clientèle princière et Royale.","architecture":"Eze sur mer;  sur un rocher à 350 mètres  un château  et des remparts furent construit au XIIe siècle, l'ensemble démantelé sur ordre de Louis XIV en 1706. il ne reste qu'une porte fortifiée du XIVe siècle et quelques pans de murs. Le château de Balsan endommagé par un incendie de forêt en 1985 possède un cloître carré de style roman avec galeries.","habitants":"Comte de Nice et seigneur d'Eze\r\n        \"","divers":"village d'Eze, château de Balsan det de la Chèvre d'Or.","gps":"","images":["../image/image_06/06_Eze_1.jpg","../image/image_06/06_Eze_2.jpg","../image/image_06/06_Eze_3.jpg","../image/image_06/06_Eze_4.jpg","../image/image_06/06_Eze_5.jpg","../image/image_06/06_Eze_6.jpg"]},"Consult_chateau_formulaire4505":{"id":"Consult_chateau_formulaire4505","dept":"06","canton":"Nice","commune":"Falicon","nom":"Falicon","type":"Vestiges","periode":"XII","histoire":"FALICON; au pied du mont Chauve , le village était au Moyen-Age couronné d'un château  dont   il reste des vestiges,   au XIe siècle fief de Raynardus et au XIIe siècle à un Bertani, en 1232 possession des comtes de Provence, dont à  Charles d'Anjou, puis en 1325 fief de l'abbaye de Saint  Pons et fut partagé au XVIe siècle  à divers co-seigneurs.","architecture":"Falicon; vestiges d'un château","habitants":"comtes de Provence\r\n        \"","divers":"Vestiges sur motte.","gps":"","images":["../image/image_06/06_Falicon_1.jpg","../image/image_06/06_Falicon_2.jpg"]},"Consult_chateau_formulaire8dc7":{"id":"Consult_chateau_formulaire8dc7","dept":"06","canton":"Vence","commune":"Gattières","nom":"Gattieres","type":"Vestiges","periode":"XIII","histoire":"GATTIERES; Enclave savoyarde de la rive droite du Var jusqu'en 1760.   Fief  du comté de Nice, acquis en 1247 par l'évêque de Vence, celui-ci en rendit hommage au comte de Provence en 1271 et en 1388 profitant des troubles en Provence Amédée VII de Savoie  s'assure de la trahison du gouverneur de Nice et fit un coup de Théâtre en récupérant le fief que possédait   Allégret de Mauléon capitaine Gascon, et pendant quatre cents ans .                            Gattières suivra les destinés du comté de Nice, d'abord Savoyarde, aux Sarde  et au traité de Turin en 1760 rattaché à la France. Dans la commune le château dit la \"Bastide\" club de tennis.","architecture":"Gattières; Sur un éperon dominant le Var, ruines sur le rocher du Gastes cité en 1235, du château il ne reste que la chapelle.","habitants":"Amédée de Mauléon\r\n        \"","divers":"Village de Gattières","gps":"","images":["../image/image_06/06_Gattieres_1.jpg","../image/image_06/06_Gattieres_2.jpg"]},"Consult_chateau_formulairec346":{"id":"Consult_chateau_formulairec346","dept":"06","canton":"Roquesteron","commune":"Gilette","nom":"Gilette_Bonson","type":"Vestiges","periode":"XIII","histoire":"GILETTE; Fief  des comtes de Provence au XIIe siècle qui construisirent le château dit de l'Aiguille qui domine le village et pour surveiller la vallée de l'Esteron, qui passa ensuite au Saint-Auban en 1232, puis  aux  Grimaldi. Ce château connu  une série  de sièges, de destructions et de reconstructions mais il doit sa célébrité aux combats  que les troupes françaises menèrent contre les Astro-Sardes en octobre 1793.                                                 BONSON;  perché sur le Mont Val et la vallée du Var a toujours appartenu  au comté de Nice  faisaient partie du diocèse de Glandevès,  les seigneurs étaient à partir du XVIIe siècle,  aux Liti, aux Lascaris, aux Chabaud et aux Gubernatis.","architecture":"Gilette, Dominé par les ruines imposantes du château dont  il reste un mur d'enceinte, château construit aux XII-XIIIe  des Grimaldi sur le rocher dominant la vallée de l'Esteron.                                            Bonson, il ne reste plus rien du château féodal.","habitants":"Famille de Saint-Auban \r\n        \"","divers":"Villages de Gilette et de Bonson avec vestiges.","gps":"","images":["../image/image_06/06_Gilette_Bonson_1.jpg","../image/image_06/06_Gilette_Bonson_2.jpg","../image/image_06/06_Gilette_Bonson_3.jpg","../image/image_06/06_Gilette_Bonson_4.jpg","../image/image_06/06_Gilette_Bonson_5.jpg","../image/image_06/06_Gilette_Bonson_6.jpg"]},"Consult_chateau_formulaire568e":{"id":"Consult_chateau_formulaire568e","dept":"06","canton":"Bar-sur-Loup","commune":"Gourdon","nom":"Gourdon","type":"Château","periode":"XVI","histoire":"GOURDON; Fief des comtes de Provence au XIIe siècle qui construisirent le château pour une surveillance de la frontière de la Provence et du comté de Vintimille, s'entourant de remparts puis la seigneurie passe  à la famille de Grasse en 1232, puis par alliance au Villeneuve. Après le rattachement du comté à la couronne en 1495 le roi Charles VIII confirme les privilèges aux Villeneuve du fait de l'héritage du comte de Provence, subit les guerres de religion mais résiste, appartient au XVIe siècle aux Bourillon d'Aspremont qui le vend pour une petite somme en 1597 à Louis de Lombard avocat au parlement de Provence, ce dernier hérite du titre de marquis de Montauroux, fortuné transformera la forteresse en une demeure d'agrément, son fils François officier épousera Gabrielle de Grimaldi, firent élever un second étage au château sur les plans du célèbre architecte  Le Nôtre. Passera la Révolution sans encombre seul la chapelle a souffert et les Lombard garderont le château jusqu'en 1820, sera légué à un neveu le marquis de Villeneuve Bargemon et en 1918, les héritiers le cèdent  à une citoyenne américaine, Mis Norris, occupé pendant la deuxième guerre mondial par les Allemands, puis restauré par la comtesse Zalewska.","architecture":"Gourdon; village créé au XIe siècle fortifié subit de modifications au cours des ans au Moyen-Age les fortifications presque entièrement reconstruite à partir du XVIe siècle, le château massif quadrilatère à hautes murailles conserve de récents éléments d'architecture médiévale, il fut reconstruit en 1610 vaste bâtiment carré flanqué de tours rondes et une tour carrée au nord, la porte d'entrée côté village est encadrée par deux pilastres portant un fronton rompu surmonté d'une fenêtre à meneaux abrite un musée d'art.","habitants":"Louis de Lombard\r\n        \"","divers":"Château de Gourdon","gps":"","images":["../image/image_06/06_Gourdon_1.jpg","../image/image_06/06_Gourdon_2.jpg","../image/image_06/06_Gourdon_3.jpg","../image/image_06/06_Gourdon_4.jpg","../image/image_06/06_Gourdon_5.jpg","../image/image_06/06_Gourdon_6.jpg","../image/image_06/06_Gourdon_7.jpg"]},"Consult_chateau_formulaire630e":{"id":"Consult_chateau_formulaire630e","dept":"06","canton":"Grasse","commune":"Grasse","nom":"Grasse","type":"Villa","periode":"XIX","histoire":"GRASSE: le premier village s'est accroché aux contreforts des prèalpes vers le Xe siècle, au XIIe siècle conflits entre les seigneurs et les évêques d'Antibes.  Grasse  est une ville médiévale qui se libère et installe un consul qui affirme sa puissance et cela jusqu'au XVe siècle ou le comte de Provence en prend domination jusqu'au rattachement à la  France. Charles Quint en 1536 fait détruire la ville, puis les guerres de religion à partir de 1559 assiégé par le baron de Vins capitule en 1589 à la mort de ce dernier, la guerre de succession d'Autriche aux frontières dont Grasse est le quartier général des français et paye un lourd tribut en 1746, et devient siège d'un tribunal militaire à la Révolution, des biens nationaux ont été vendus; tel que l'hôtel Clapiers-Cabris de la marquise  Louise de Mirabeau soeur de Mirabeau du lieu \"Cabris\" village médiéval dont il ne reste que des vestiges, descendance de la seigneurie de Cabris qui vivait  à Grasse dans leur hôtel demeure construite en 1770 vendu aux enchères en 1813 par la fille de la marquise , puis racheté par le fils du président Carnot et par la ville en 1921. Au début du XVIIe siècle ont commencer à parfumer les gants  et au début du XIXe siècle apparaît les parfumeries tel que Fragonnard, Jean Honoré y vécut avec sa famille de 1790 à 1791 racheté par un riche négociant Alexandre Maubert transformé en musée ainsi que Molinard et autres.                               Dans la commune villa Noaille, d'Andon, St-Jean et Santa-Clara.","architecture":"Grasse. Les fortifications se renforcèrent sous le comté de Provence au XIII-XIVe siècle, il ne reste que deux donjons ( le petit  carré qui a perdu ces créneaux \"Lombard\" du XIIe siècle situé dans la partie sud de l'évêché, aujourd'hui hôtel de ville, l'autre transformé en tour d'horloge du XIIIe siècle et une partie du palais épiscopal avec tour carrée du XIIe siècle, vestiges des remparts du XVIe siècle et porte de la ville (porte neuve) plus rien mis à part quelques maisons à colombages et des hôtels particuliers de Cazan de la Peyrière, des Pontevès et de Théas-Caille, la demeure de la marquise de Clapiers-Cabris soeur de Mirabeau construite en 1770  aujourd'hui musée d'art et d'histoire abrite de riches collections de faïences.                                                               Château de Malbose (Rotschild) , château Fragonnard; ancien hôtel Maubert demeure construite au XVIIe siècle. Molinard parfumerie.","habitants":"Evêques d'Antibes\r\n        \"","divers":"Ville de Grasse et Ets de Molinard et Fragonard","gps":"","images":["../image/image_06/06_Grasse_1.jpg","../image/image_06/06_Grasse_2.jpg","../image/image_06/06_Grasse_3.jpg","../image/image_06/06_Grasse_4.jpg"]},"Consult_chateau_formulaire03c2":{"id":"Consult_chateau_formulaire03c2","dept":"06","canton":"Coursegoules","commune":"Gréolières","nom":"Greolieres_Cipieres","type":"Vestiges","periode":"XIV  XVII","histoire":"GREOLIERES; Deux châteaux pour un seul village, le château de Gréolières le haut construit au XIe siècle par les vicomtes de Nice passa ensuite au comte de Provence fut  abandonné après les guerres de religion, et celui de Gréolières basse du XIIIe siècle fut remanié en conséquence pour abriter son monde jusqu'à la fin du XIXe siècle. La commune achète la château, et Mr Jacques Tanziet, Mr Robert Martin se partage le domaine.                       CIPIERES;  face au massif du Chevron  surplombe la vallée du Loup, le château construit au XVIIe siècle.","architecture":"Gréolières  deux châteaux dans la vallée du Loup, dès le XIe siècle une forteresse s'élève à l'emplacement du château ruiné du village actuel. Au XIIe siècle un second château est bâti sur un promontoire rocheux qui culmine à 800 mètres, les deux villages vont cohabiter et au XVIe siècle le haut périclite et le bas se développe. Le château de Gréolières basse reconstruit en 1400 remanié au XVII-XVIIIe siècle et à Gréolières haute vestiges du château qui fut reconstruit au XVe siècle.                                     Cipières; Château de style provençal classique date du XIIIe siècle remanié au XVIIIe siècle  et en 1951 en hôtel restaurant.","habitants":"Jacques Tanziet Robert Martin\r\n        \"","divers":"Vestiges à Gréolières, Ciprières et Courségoules.","gps":"","images":["../image/image_06/06_Greolieres_Cipieres_1.jpg","../image/image_06/06_Greolieres_Cipieres_2.jpg","../image/image_06/06_Greolieres_Cipieres_3.jpg","../image/image_06/06_Greolieres_Cipieres_4.jpg","../image/image_06/06_Greolieres_Cipieres_5.jpg","../image/image_06/06_Greolieres_Cipieres_6.jpg","../image/image_06/06_Greolieres_Cipieres_7.jpg"]},"Consult_chateau_formulairecb98":{"id":"Consult_chateau_formulairecb98","dept":"06","canton":"Guillaumes","commune":"Guillaumes","nom":"Guillaumes","type":"Vestiges","periode":"XIII","histoire":"GUILLAUMES; Place forte sur un rocher qui domine le Var fondée  par Guillaume II au Xe siècle comte de Provence, dans la première moitié du XIVe siècle la reine Jeanne accorde les privilèges de porter ses armes dans ses armoiries. Au XIVe siècle la propriété dépend  des souverains lointains au roi de Naples dont-ils sont contraints de soutenir la lutte contre la maison de Barcelone Dragon. Séparation  du comté de Nice passe à la famille d'Anjou-Provence. Le château fut dévasté lors du passage de la reine Jeanne mais en 1450 le roi René reconstruit la forteresse qui sera amélioré par François Ier, par Henri IV et par Louis XIV et sera restauré par Vauban  qui fortifia la place (1700-1706). En 1760 Guillaumes est cédé par Louis XV au Royaume du Piémont-Sardaigne, le château est démantelé.","architecture":"Guillaumes. Le château fut construit au XIIIe siècle  dévasté une première fois en 1380 et  en 1450, reconstruit et renforcé au cours des siècles pour être détruit en 1760, reste malgré tout des pans de murs importants et tour ronde.","habitants":"Comte de Provence\r\n        \"","divers":"Vestiges du château","gps":"","images":["../image/image_06/06_Guillaumes_1.jpg","../image/image_06/06_Guillaumes_2.jpg","../image/image_06/06_Guillaumes_3.jpg","../image/image_06/06_Guillaumes_4.jpg","../image/image_06/06_Guillaumes_5.jpg"]},"Consult_chateau_formulaire0529":{"id":"Consult_chateau_formulaire0529","dept":"06","canton":"Cannes","commune":"Lérins","nom":"Iles_Lerins","type":"Fort-Abbaye","periode":"XII-XV","histoire":"LERINS; les îles  Sainte-Marguerite et Saint-Honorat est aujourd'hui des lieux de  promenade idéal, mais connurent des moments mouvementés. Au XIIe siècle propriété de l'Abbaye et en  1351 l'ile est cédée à   Bertrand de Grasse, puis rendu au XVe siècle, l'abbé  de Lérins seigneur de Sainte Marguerite malgré son opposition l'île est cédé à la communauté de Cannes, en 1617 les moines quittèrent l'île et la laissèrent au cardinal Claude de Lorraine qui la cède un an plus tard à son frère le duc de Guise gouverneur de Provence qui l'inféode à Jean de Bellon et ce dernier construisit le château primitif.    Richelieu qui fit construire le fort Royal en 1635 installa une garnison. Les espagnols prirent d'assaut l'île en 1635 pendant deux ans ces derniers renforcent les fortifications, ils seront refoulés en 1637 par le comte d'Harcourt, sur ordre de Louis XV confiera  à Saint-Mars de faire une prison d'état qui sera sous sa surveillance. Il aura comme prisonnier le masque de fer 1687-1698, Jean-Baptiste Suard 1751-1773, Abd-el-Kader,1842-1859 et bien d'autres tel que 600 prisonniers autrichiens et le maréchal Bazaire qui s'en échappa.                          Ile Saint-Honorat, ile ou se trouvait un monastère depuis 410  St-Vincent y vivait en 434, au V-VIe siècle le plus célèbre de toute la chrétienté. En 1073 l'abbé Aldebert II fit construire le monastère fortifié qui sera malgré tout plusieurs fois assaillit, en 1464 commence le déclin la communauté monacale est dissoute et l'île est vendu aux enchères en 1791 à un avocat de Grasse Mr Alziary en fit don à sa fille  de Sainval actrice qui y demeura jusqu'en 1830 et en 1859 l'évêque de Fréjus rachète l'île  et dix ans plus tard l'abbé de Sénanque (Vaucluse) crée la communauté des moines cisterciens et occupé par les allemands en 1943 après expulsion des moines qui reviennent un an après.","architecture":"Lérins; iles Sainte-Marguerite  un fort royal de forme pentagonale flanqué de quatre bastions construit entre 1624 et 1627 par Jean de Bellon qui était au départ une maison fortifiée, transformé en fort défensif par les Espagnols et par Richelieu en 1637 sur plan de Vauban puis sera cédé à la ville de Cannes  en 1971, qui l'on restauré pour en faire un  musée de la mer.                            \r\nSaint-Honorat fondé en 400-410 par Honnorat d'Arles pillé en 1400 par les corsaires génois.  Le monastère appelé château fut construit en 1073 grand donjon ou se lisse trois campagnes de construction, la plus ancienne est une tour quadrangulaire à mâchicoulis à deux niveaux voûtés, agrandi au XIII-XIVe siècle,  des anciens bâtiments ne subsistent que le cloître du XIIe siècle. Le monastère fortifié, non loin de l'actuel construit en 1073 de 86 pièces 4 chapelles etc, on y accède par une porte à 4 mètres du sol. Du château suite aux attaques continuelles des espagnols en 1635 de l'amiral anglais en 1706 et du duc de Savoie en 1735 a du être fortifié.","habitants":"abbé  de Lérins\r\n        \"","divers":"Patrimoine sur l'Iles du Lèrins.","gps":"","images":["../image/image_06/06_Iles_Lerins_1.jpg","../image/image_06/06_Iles_Lerins_2.jpg","../image/image_06/06_Iles_Lerins_3.jpg","../image/image_06/06_Iles_Lerins_4.jpg","../image/image_06/06_Iles_Lerins_5.jpg","../image/image_06/06_Iles_Lerins_6.jpg","../image/image_06/06_Iles_Lerins_7.jpg","../image/image_06/06_Iles_Lerins_8.jpg","../image/image_06/06_Iles_Lerins_9.jpg"]},"Consult_chateau_formulairef995":{"id":"Consult_chateau_formulairef995","dept":"06","canton":"Beaulieu-sur-Mer","commune":"Beaulieu-sur-Mer","nom":"Kerylos","type":"Villa","periode":"XX","histoire":"KERYLOS; (l'Hirondelle de mer) villa sur la presqu'île rocheuse des Fourmis, construite vers 1900  par l'architecte Emmanuel Pontremoli suite à la rencontre d'un mécène érudit et d'un architecte; Théodore Reinach (1860-1928) étant le plus jeune des trois frères sur-doués d'une famille de banquiers  venus de Francfort, passionné par la Grêce antique, archéologue, professeur de numismatique ancienne, directeur de revues des études juives et greques et député de Savoie il avait épousé Fanny Kann, nièce du banquier Charles Ephrussi. Théodore Reinach avant son décès lègue la villa  en 1928  à l'institut de France en réservant l'usufruit à ses héritiers qui occuperont la villa jusqu'en 1967 à cette date passe à l'institut, aujourd'hui lieu de manifestations culturelles.","architecture":"Kerylos; de style néoclassique s'inspire des maisons traditionnelles  de l'île de Délos, à plusieurs corps de bâtiments, d'inégales hauteurs couverts de toits plats formant terrasses et surmontés par des portiques. l'intérieur reflète la Grèce Antique.","habitants":"Monsieur Théodore Reinach\r\n        \"","divers":"Villa Kérylos","gps":"","images":["../image/image_06/06_Kerylos_1.jpg","../image/image_06/06_Kerylos_2.jpg","../image/image_06/06_Kerylos_3.jpg"]},"Consult_chateau_formulaire78ab":{"id":"Consult_chateau_formulaire78ab","dept":"06","canton":"Tende","commune":"Tende","nom":"Lascaris_Tende_Brigue","type":"Vestiges","periode":"XIII","histoire":"LASCARIS; seigneurie  liée à la commune de Tende et de La Brigue. En 1157, ces deux villages furent donnés à Gènes par le comte Gui Ier surnommé Guerre qui les rendit presque aussitôt pour traité un accord de défense en 1221  signé par Breil contre les envahisseurs sauf le comte de Vintimille qui en devient possesseur et cédera une partie de son comté  en février 1258 au sénéchal de Provence  de Sacy, au nom de Charles d'Anjou marié à la comtesse Béatrice de Provence, Le comte de Vintimille garde Tende et La Brigue créant la branche des Lascaris de Vintimille par alliance  de Guillaume Pierre Ier comte et seigneur de Tende avec Eudoxie Lascaris soeur de Jean de Lascaris IV en 1261, cette famille avait perdu la seigneurie de Vintimille conquise par la République de Gènes, trop faible pour la reconquérir avait cédé la ville en 1222 à Charles d'Anjou comte de Provence  qui fera fuir les Génois en 1257.  Entre 1278 et 1352  plusieurs conflits entre le comte de Vintimille Tende et le comte de Provence. Jean Ier finit par en rendre hommage en 1285 à Charles II comte de Provence. A la mort de Guillaume-Pierre II de Lascaris Vintimille en 1369, les deux seigneuries Tende et la Brigue se séparent, le fils de Guillaume garde Tende et le premier seigneur de la Brigue est Ludovic Ier de Lascaris marié en 1380 à Tiburge Grimaldi de Beuil. En 1426 les descendants de Ludovic Ier Lascaris vendent un tiers de la seigneurie de la Brigue au duc de Savoie Amédée VIII.                    Les Lascaris  plusieurs branches se feront  en 1468 les Castellar coseigneurs de Castellar et Gobio, qui firent érigés le fief en comté par Jean-Paul Augustin de Lascaris 1720-1797 et se sera le dernier seigneur, ils avaient leurs palais face à face subsiste une partie du palais des comtes de Vintimille, qui  subirent des dégâts lors du tremblement de terre en 1564, vendu comme bien national à la Révolution,  La Brigue devient française le 10 février 1947, en 1987 la commune l'acquit pour en faire un espace d'activité public.           TENDE; village médiéval fortifié qui est resté italien jusqu'en 1947 pour permettre au roi Emmanuel II de conserver son territoire de chasse dans le Mercantour.","architecture":"Tende;  sur un éperon rocheux à 823 m d'altitude vestiges du château  des Lascaris  qui dominait le village, fondé au XIIIe siècle qui fut démantelé en 1692. Tour de l'horloge du XIXe siècle ainsi que des pans de murs du donjon.    La Brigue;  sur un éperon rocheux à 770 m d'altitude  il ne reste qu'une tour ronde et des pans de murs du château des Lascaris qui fut détruit par un tremblement de terre en juillet 1564.","habitants":"Comtes de Lascaris   \r\n        \"","divers":"Vestiges à la Brique et Tende","gps":"","images":["../image/image_06/06_Lascaris_Tende_Brigue_1.jpg","../image/image_06/06_Lascaris_Tende_Brigue_2.jpg","../image/image_06/06_Lascaris_Tende_Brigue_3.jpg","../image/image_06/06_Lascaris_Tende_Brigue_4.jpg","../image/image_06/06_Lascaris_Tende_Brigue_5.jpg","../image/image_06/06_Lasca
