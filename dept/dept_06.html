ris_Tende_Brigue_6.jpg"]},"Consult_chateau_formulaire8f7e":{"id":"Consult_chateau_formulaire8f7e","dept":"06","canton":"Coursegoules","commune":"Les Ferres","nom":"Les_Ferres","type":"Vestiges","periode":"XII","histoire":"Les FERRES; situé au pied du Mont St-Michel (montagne locale) habitat fortifié au XIIIe siècle.  En 1325 un prieuré des Ferres  est joint à celui de la Rocca-Roquestéron. En 1388 la seigneurie passe de la Provence au comté de Nice, les premiers seigneurs  étaient les Laugier famille du comte de Nice ; Raymond Laugier évêque de Nice , en 1526 Honoré Laugier seigneur de les Ferres et de Gilette dénonce Jean Baptiste Grimaldi seigneur d'Ascros  et son frère René  seigneur de Massions  de la famille Grimaldi du Beuil d'avoir comploté contre le roi de France, ils durent s'enfuirent condamné par le duc de Savoie. La seigneurie au XVIIIe siècle appartient au Drago puis aux Balbi et aux Ricci et revient à la France en 1760.","architecture":"Les Ferres; vers la fin du Moyen-Age au XIVe siècle le premier site est abandonné, au profit d'un nouveau château et d'un nouveau village construit sur l'emplacement actuel, les ruines du château rectangulaire dominent sur un éperon.","habitants":"Famille Laugier\r\n        \"","divers":"Village des ferres","gps":"","images":["../image/image_06/06_Les_Ferres_1.jpg","../image/image_06/06_Les_Ferres_2.jpg","../image/image_06/06_Les_Ferres_3.jpg"]},"Consult_chateau_formulaireaf35":{"id":"Consult_chateau_formulaireaf35","dept":"06","canton":"L`Escarène","commune":"Luceram","nom":"Luceram","type":"Vestiges","periode":"XII","histoire":"LUCERAM: Cité en 1108, confirmé par la reine Jeanne de Provence, les  Lucéramois  étaient  des hommes libres ne relevant  d'aucun seigneur féodal mais possédaient un système défensif établi sous le règne de Charles Ier d'Anjou comte de Provence au XIIIe siècle. Rattaché au pays niçois et ensuite au duc de Savoie, le comte gouverneur de Nice en 1395 autorise la construction des remparts,  faisait partie du comté de Nice avant d'être rattaché à la France en 1860.","architecture":"Lucéram; A l'extrémité d'une crête possédait des remparts du XIVe siècle avec tour percée d'archères et couronné de mâchicoulis haute de 15 mètres dite tour \"fendue\" avec accès par le deuxième étage servait également de tour de guet, les remparts enceinte triangulaire crénelée bien conservée sur une longueur de 40 mètres depuis la tour jusqu'à la porte de l'Iera (porte fortifiée) et du côté nord dit du Carchaou et jusqu'au bas du Terron. Le village est surtout l'église ont prit la place du château.","habitants":"Seigneurs locaux\r\n        \"","divers":"Village et vestiges à Lucéram","gps":"","images":["../image/image_06/06_Luceram_1.jpg","../image/image_06/06_Luceram_2.jpg","../image/image_06/06_Luceram_3.jpg","../image/image_06/06_Luceram_4.jpg"]},"Consult_chateau_formulaire8a64":{"id":"Consult_chateau_formulaire8a64","dept":"06","canton":"Mandelieu","commune":"Mandelieu","nom":"Mandelieu","type":"Château","periode":"XII-XIV","histoire":"MANDELIEU; S'appelé au Moyen-Age, Avignonet ou de San-Peyre. Le fief fut donné en 1224 par le comte Raymond Béranger aux moines de Lérins, la Provence passe sous la souveraineté de la maison d'Anjou en 1246 et les moines cédèrent le fief au Villeneuve en 1284, le château d'Avignonet ou San- Peyre situé sur une colline dominant la ville de Mandelieu dont le seigneur était  l'abbé de Saint-Victor de Marseille qui en rend  hommage au roi Robert, le château  fut détruit en 1347 par Raymond de Turenne,  il fut reconstruit au XIVe siècle par les Villeneuve au bord de mer sur les rochers de la Napoule, appelé château de la \"Napoule\" ce dernier subit des assauts  en 1530 des corsaires turcs, Barberousse allié au roi de France contre Charles Quint, en 1543 les Impériaux que les habitants repoussèrent, en 1590 Charles Emmanuel de Savoie que les armées de David de Villeneuve repoussa. En 1719 le château est vendu à Dominique de Montgrand, fils d'un riche secrétaire du roi de Marseille le château fut démantelé sur ordre du duc de Savoie au XVIIIe siècle et abandonné en 1793 à l'exil de Joseph-Jean-Baptiste de Montgrand, vendu comme bien national abrita une verrerie avant d'être racheté sous la restauration par le fils  du marquis de Montgrand, un riche particulier l'acheta à la fin du XIXe siècle qui restaure l'édifice.  Revendu à Henry et Mary Clews ( Henry artiste peintre Marie architecte) en 1918 qui entreprennent des travaux d'agrandissement et de rénovation. Henry décède  en 1937 et Marie en 1955, le château est géré par la fondation Henry-Clews, dépendant de la New York State University sert à développer les relations et a  des expositions et depuis 1987 des artistes en résidence.   Théoule; fief des Eucher Gaulois de haute aristocratie et seigneur de Mandelieu la Napoule, le château de Théoule fut édifié au XIVe siècle a appartenu en 1898 à Monsieur Hourlier, aujourd'hui propriété de monsieur Férouillat.","architecture":"Mandelieu: Vestiges sur une colline dominant la Napoule  à l'ouest reste d'un château dit \"d'Avignonet ou de Saint-Peyre, petit donjon carré du XII- XIVe siècle  accolé d'une enceinte , les logis ont disparu.                                                                                          La Napoule; construit au bord de mer au XIVe siècle sur d'anciennes fondations sarrasines et romaines,  subit de nombreux assauts, possède un corps de logis une cour encadrée de deux tours carrées et côté mer par deux tours rondes, démantelés au XVIIIe siècle  et dévastés en 1793 sert de verrerie et commence a être remanié par divers propriétaires et en 1918 reconstruction totale du bâtiment fenêtres ogivales, tours à mâchicoulis, murailles crénelées, chapiteaux sculptés et cloître gothique et un jardin méditerranéen par Marie Clews.                                        \r\n Château de Théoule; crénelé en pierre rouge  dit château des \"mineurs\" est en fait une ancienne savonnerie du XVIIIe siècle restauré transformé en château par le rajout des remparts et de tourelles crénelés.","habitants":"Famille de Villeneuve\r\n        \"","divers":"Château de la Napoule et de Théoule","gps":"","images":["../image/image_06/06_Mandelieu_1.jpg","../image/image_06/06_Mandelieu_2.jpg","../image/image_06/06_Mandelieu_3.jpg","../image/image_06/06_Mandelieu_4.jpg","../image/image_06/06_Mandelieu_5.jpg","../image/image_06/06_Mandelieu_6.jpg","../image/image_06/06_Mandelieu_7.jpg","../image/image_06/06_Mandelieu_8.jpg","../image/image_06/06_Mandelieu_9.jpg"]},"Consult_chateau_formulaire9037":{"id":"Consult_chateau_formulaire9037","dept":"06","canton":"Menton","commune":"Menton","nom":"Menton_Gorbio_St_Agnes","type":"Palais","periode":"XV","histoire":"MENTON;  cité au Xe siècle. \"Mont d'Othon\" au XIIe siècle, Ligure de tradition domaine des seigneurs Génois; fief d'Othon II comte de Vintimille au XII-XIIIe siècle construisirent un château passa au seigneur du Puypin au XIIe siècle, passa au XIIIe siècle aux Vento famille génoise qui y construisirent un autre château.  Charles de Grimaldi seigneur de Monaco et de Roquebrune l'acquiert en 1346 est restera sous la suzeraineté des princes monégasques pendant cinq siècles jusqu'en 1848  se placera sous le protectorat du roi de Sardaigne rendu en 1814 aux Grimaldi. fut rattaché au département des Alpes Maritimes à la Révolution,  et rattaché à leur demande à la France en  1860.                                                                         Villa de Val Rahmeh nom de la femme du lord Percy Radcliffe qui a acheté en 1905 la villa aux Monléon qui avait construit cette dernière au XIXe siècle; Radcliffe ancien gouverneur de Malte, cette villa est racheté en 1957 par un botaniste Maybud Campbell et en 1966 elle est vendu à l'état pour en faire un muséum national d'histoire naturelle.                                                                       GORBIO; Fief des comtes de Provence avant de devenir le fief des Lascaris de 1258 à  1860 sous protectorat de la maison de Savoie ( branche des Lascaris de Vintimille) qui construisirent la place forte de Gorbio dont le château date du XIIe siècle, que le comte Ottone II de Vintimille transformera le lieu en commanderie des Templiers  puis le fief passa aux héritiers des Lascaris et entre le XVII -XVIIIe siècle les seigneuries seront tenues à leurs tours par les familles  Isnardi, les Coubernatis, les Raimondi, les Corvezi, les Alziari de  Malausséna famille originaire d'Aix en Provence, au XVIIe siècle y firent construire leur château et les Guigliotti.                                                                                                CASTELLAR; les premiers seigneurs cités  en 1258 les comtes de Vintimille, les Lascaris furent co-seigneurs du Castellar et Gorbio possédaient leurs palais face à face.                                            STE-AGNES; Village de caractère médiéval à la sortie de Menton, village le plus du littoral, en 1185 à Othon II comte de Vintimille à Guillaume II qui l'abandonne au comte de Provence en 1258, passa aux de Léotardi, aux  comtes d'Auda, aux des Hauteville,  des Candie et des Grimaldi.","architecture":"Menton;Vieille ville  ancienne enceinte dont-il reste deux portes le cimetière a prit la place de l'ancien château du XII-XIIIe siècle transformé par les Grimaldi au XVIe siècle dont-il subsistent le mur d'enceinte et les parties hautes, quatre terrasses superposées.  Tour de la Noria.Palais de l'Europe ancien casino (Bibliothèque)    Gorbio;  Tour du Palais de Lascaris à deux étages  et deux fenêtres géminées du XVe siècle avec colonnettes de marbre et la  construction du château sur des bases du XIIe siècle remontent au XVIIe siècle demeure des Malausséna.                                          Carnolés palais( voir article) Castellar; ruines du vieux village sur un piton rocheux fondé en 1258 construit sur plan rectiligne avec enceinte et tours rondes. Sainte-Agnés; ruines du château du XII-XIIIe siècle sur un piton rocheux à 766 mètres d'altitude qui fut reconstruit en 1502, vestiges d'un donjon et des fortifications.                        Fort de Righi  ouvrage militaire construit de 1938 à 1939 dans le sens des ouvrages de la ligne Maginot.","habitants":"Comtes de Lascaris                                                                           Famille d'Alziari de  Malausséna\r\n        \"","divers":"Patrimoine de Menton, Gobio, Castellar et Saint-Agnès.","gps":"","images":["../image/image_06/06_Menton_Gobio_St_Agnes_1.jpg","../image/image_06/06_Menton_Gobio_St_Agnes_2.jpg","../image/image_06/06_Menton_Gobio_St_Agnes_3.jpg","../image/image_06/06_Menton_Gobio_St_Agnes_4.jpg","../image/image_06/06_Menton_Gobio_St_Agnes_5.jpg","../image/image_06/06_Menton_Gobio_St_Agnes_6.jpg","../image/image_06/06_Menton_Gobio_St_Agnes_7.jpg","../image/image_06/06_Menton_Gobio_St_Agnes_8.jpg","../image/image_06/06_Menton_Gobio_St_Agnes_9.jpg"]},"Consult_chateau_formulaired2b7":{"id":"Consult_chateau_formulaired2b7","dept":"06","canton":"Principauté-de-Monaco","commune":"Monaco","nom":"Monaco_Turbie","type":"Palais","periode":"XIII","histoire":"MONACO-Monté-Carlo; Principauté enclavé dans le département des Alpes-Maritimes, deux villes bordant la mer. Fief des Grimaldi grande famille Guelfe sont amené à occuper Monaco en 1297. Le premier Grimaldi est Grimaldo Consul de Gènes  et ainsi de suite jusqu'à  aujourd'hui en formant différentes branches et en s'alliant avec d'autres tel que les Matignon en 1715 et les de Polignac en 1920. Le premier seigneur de Monaco 1331-1357 à l'époque  Menton et Roquebrune faisait partie du fief, famille de grands chefs de guerre aux service du roi de France ce qui leur permet au XVIIe siècle  de posséder des fiefs du Valentinois, des Baux, de  Saint-Rémy et Carladez, Les troubles à la Révolution mettent fin à une brillante période, en 1793 la convention  proclame la déchéance des Grimaldi. Annexée à la France jusqu'en 1814 restaurée par le traité de Paris le 30 mai 1814, passe sous le protectorat de Sardaigne en 1817, Menton et Roquebrune profitent de la révolution Italienne en 1848 pour se rallier à la France et passe la période de l'occupation italienne et allemande en 1942-1943.                              Le prince Rainier épouse Grace Kelly en 1956. Monarchie constitutionnelle depuis 1911 connait une stabilité politique depuis.                                   TURBIE: à 450 mètres au dessus de Monaco sur le promontoire de la tête de Chien, le village est regroupé autour du Trophée d'Auguste, monument Romain construit au Ier siècle par l'empereur Auguste, pour célébrer sa victoire sur les 44 tribus ligures.","architecture":"Monaco. Le quartier administratif sur un rocher, éperon rocheux de 800 mètres par 300 mètres au cur de la principauté, l'ancienne citée génoise protéger par des remparts du XVIe siècle, résidence et palais princier d'un luxe et décor de Versailles ou de palais italien au nord-ouest du rocher forteresse commencé en 1215 par Fulco di Castello subsistent quatre tours reliées entre elles par des remparts crénelés, de cette époque seule reste la tour  de Serravole, remanié au cours des siècles, pillé à la Révolution restauré depuis.                                                                        La Turbie; d'un monument imposant de 50 mètres de haut sur une base carrée de 32,50 mètres de côté avec un second étage carré en retrait supportait un péristyle circulaire de 24 colonnes doriques, surmontées d'une frise à métopes, elles entouraient un massif de maçonnerie, en forme de tour et sur des gradins circulaires la statue d'Auguste, dégradé à la fin de l'Empire Romain, transformée en forteresse au Moyen-Age, devenu tour fut démantelé en 1705 servit  de carrière de pierre pour l'église , en 1858 le gouvernement Sarde le consolida.","habitants":"Prince Rainier\r\n        \"","divers":"Principauté de Monaco et temple à la Turbie.","gps":"","images":["../image/image_0 t accepte les constructions les plus luxueuses de châteaux et villas. Château des tours des Baumettes construit en 1850 pour le compte de Maurice Audiffret, il fut vendu au comte Joseph Caravadossi.                                                                            Le château de l'anglais, le château de Crémat en 1880 de style troubadour lié à son vignoble de Bellet (voir article sur site). Le palais Lascaris de style baroque et génois fut édifié de 1643 à 1650  pour Jean-Paul Lascaris-Vintimille maréchal de camp du duc de Savoie, et devient la résidence des Lascaris Vintimille jusqu'en 1802 il fut racheté par la ville de Nice  en 1942, aujourd'hui musée,  accueille le centre du patrimoine  de la ville de Nice. Le palais hôtel Nesgresco construit en 1912 par Edouard Niermans pour le roumain Henri Négresco. Le château des Ollières  du prince Lobanov-Rostowsky transformé en hôtel musée. L'église orthodoxe Saint-Nicolas édifié en 1910 par le tsar Nicolas II avec ses coupoles à bulbes rappelle  la cathédrale de Moscou. Ceci est le  reflet et évoque  de cent cinquante ans de la présence russe.   Tour \"Bellanda\" parc du château musée de la navigation.                         Sur Cimiez outre le site gallo romain du Ier siècle au Ve siècle après J.C. Le monastère ensemble artistique exceptionnel, églises, cloitres, musée et jardins. Sur la Trinité-Victor dans la vallée du Peillon banlieue niçoise ancien hameau de la commune d'Eze détaché en 1818 en l'honneur de Victor Emmanuel Ier de Savoie  roi de Sardaigne avant de devenir simplement la Trinité en 1950.","architecture":"NICE; sur la butte dominant la ville et la mer fut construit un château sur l'emplacement d'un castrum en 1229, complété en,citadelle avec architecture militaire en 1347 et 1440 modifié par les savoyards pour l'artillerie en 1517-1543 et 1548, en 1691 deux explosions ravages le château  et en 1696 il est bien endommagé et sur ordre de Louis XIVe il est rasé en 1706 ainsi que les enceintes de la par Victor Amédée II érigé en comté le gardera  jusqu'à la Révolution. Rétablissement au roi de Sardaigne et en 1860 fut mené par Napoléon III une compensation contre l'indépendance de l'Italie  pour le rattachement de Puget-Théniers à la France.                   La PENNE. Cité en 1070, le castello Penna fief des seigneurs de Thorame Glandevès, au XIIIe siècle suite à l'inondation de Puget-Théniers  ( 78 morts) ou  une population est venues s'installer à La Penne, et au XVII après la chute des Grimaldi du Beuil le fief passa aux d'Authier et à la famille Durand de la Penne en 1778 elle est cédé au royaume Piemont Sardaigne  et son histoire se confond au comté de Nice.","architecture":"Puget-Theniers. du château féodal, rasé en 1691 sur ordre de Louis XIV  au sommet du rocher  surplombant la vieille ville. vestiges d'enceintes en ville avec portes et remparts                                    Penne ;Vestiges du château des Glandevès, reste d'un donjon.et d'un pavillon du XVIIe siècle.","habitants":"seigneurs de Glandevès\r\n        \"","divers":"Villages de Puget-Théniers de la Penne.","gps":"","images":["../image/image_06/06_Puget_Theniers_Penne_1.jpg","../image/image_06/06_Puget_Theniers_Penne_2.jpg","../image/image_06/06_Puget_Theniers_Penne_3.jpg","../image/image_06/06_Puget_Theniers_Penne_4.jpg"]},"Consult_chateau_formulaire893d":{"id":"Consult_chateau_formulaire893d","dept":"06","canton":"Menton","commune":"Roquebrune-Cap-Martin","nom":"Roquebrune_Cap_Martin","type":"Château","periode":"XI","histoire":"ROQUEBRUNE-CAP-MARTIN. Beau village médiéval perché sur une éminence rocheuse qui est dominé par son imposant château fort Carolingien, cité fondé  en 970 par le comte ligure de Vintimille Conrad Ier de son nom Rocabrune, il fit cette forteresse pour protéger la frontière occidentale, passa  en 1258 au pouvoir des  comtes de Provence Charles Ier d'Anjou puis est placé de 1157 à 1355 sous la suzeraineté de la République de Génes dont le responsable était Charles Grimaldi. En 1355 les Vento possèdent le fief de Roquebrune et Menton et le vendent a Charles Grimaldi prince de Monaco, cette famille  gardent le fief pendant plusieurs siècles.  Confisqué en 1793 avec toute la principauté de Monaco, le château est rendu aux Grimaldi après avoir été  vendu comme bien national huit ans auparavant. La commune de Roquebrune devient française, puis monégasque en 1814, avant de s'ériger en ville libre  en 1848 avec Menton sous la protection du roi de Sardaigne. Pour remercier son aide à l'unification Italienne le roi Victor Emmanuel II cède à la France le comté de Nice et c'est en 1860 que ce comté devient définitivement français.  Le château est acheté en 1911 par William Ingram riche citoyen britannique qui avait était acheté par divers propriétaires, lequel en fit don gracieusement à la commune en 1926.    Dans la commune à Cap-Martin de nombreuses villas, Villa Cyrnos construite en 1892 résidence belle époque du XIXe siècle pour l'impératrice Eugénie de Montijo. Villa Cypris de style byzantine édifié en 1904 pour Robert Douine. Arethuse-Trianon construite en 1899 par Hans Georg Tersling pour Georges de Montgomery. Villa Zoraïde, appartient à Daisy Fellouves. Villa Del Mar  ou vécut l'actrice Silvana Mangano dans les années cinquante et  Mobutu  ancien président africain et villa  E 1027 construite en 1930 de style Corbusier. Villa Zamir construite en 1902 pour le banquier Alfred Khan. Torre Clémentina ou Torrentina de l'épouse du banquier Louis Stern 1840-1900, ainsi que d'autres non citées.","architecture":"Roquebrune-Cap-Martin; Ce château fort Carolingien du XIe siècle  d'architecture militaire imposant quadrilatère enceinte restaurée percé de six portes fortifiées  et de deux tours carrées, un pont-levis permet d'accéder  au  donjon. Au XVe siècle prend la dénomination château et le reste se transforme en village médiéval. Roquebrune est  remanié à partir de 1490 incendié en 1506 par les génois, rénové par Mr Augustin Grimaldi et au XVIIe siècle ces derniers aménagent le château en prison. La tour donjon le plus vieux de France  haut de 26 mètres,  mâchicoulis, échauguettes créneaux et archères, il fut remanié en 1747 abandonné il tombe en ruine restauré en 1911 par le nouveau propriétaire dans un style néo-médiéval avec chemin de ronde. Maison du gouverneur de style italien du XVIIe siècle.","habitants":"Rocabrune de Vintimille\r\n        \"","divers":"Le fort féodal de Roquebrune-Cap-Martin","gps":"","images":["../image/image_06/06_Roquebrune_Cap_Martin_1.jpg","../image/image_06/06_Roquebrune_Cap_Martin_2.jpg","../image/image_06/06_Roquebrune_Cap_Martin_3.jpg","../image/image_06/06_Roquebrune_Cap_Martin_4.jpg","../image/image_06/06_Roquebrune_Cap_Martin_5.jpg","../image/image_06/06_Roquebrune_Cap_Martin_6.jpg","../image/image_06/06_Roquebrune_Cap_Martin_7.jpg","../image/image_06/06_Roquebrune_Cap_Martin_8.jpg"]},"Consult_chateau_formulaire2506":{"id":"Consult_chateau_formulaire2506","dept":"06","canton":"Bar-sur-Loup","commune":"Roquefort-les-Pins","nom":"Roquefort_les_Pins","type":"Vestiges","periode":"XII","histoire":"ROQUEFORT  les  Pins; Cité en 1113,  fortifié en 1178 les membres de cette famille de ce nom est signalé dés 1092 et peut-être même avant par la personne du gendre de l'évêque d'Antibes. Le château  plus ancien dépendait de l'abbaye du Lérins, vestiges importants au lieu dit du Castellas cinq kilomètres au nord-est de la mairie. En 1241 Roquefort est inhabité,  territoire acheté par les habitants de Saint-Paul dans la première moitié  du XIVe siècle, Roquefort est occupé par un moine  brigand  sa troupe  est  chassés par les habitants de Saint-Paul qui détruisirent le château.","architecture":"Roquefort les Pins; au sommet qui surplombe la rive droite du Loup, ruines du village avec au point le plus haut des débris du château cité en 1178 abandonné au XVe siècle","habitants":"Seigneurs de Roquefort\"","divers":"Vestiges de Roquefort et la Bégude","gps":"","images":["../i 06/06_Roubion_5.jpg"]},"Consult_chateau_formulaire792a":{"id":"Consult_chateau_formulaire792a","dept":"06","canton":"Breil-sur-Roya","commune":"Saorgue","nom":"Saorgue_Fontan","type":"Vestiges","periode":"XIII","histoire":"SAORGUE: Cité au Xe siècle faisait partie  du comté de Vintimille jusqu'au XIIe siècle, Guillaume de Vintimille seigneur de Gorbio, Tende, la Brique, Castellas,  Castillon et Saint-Agnés échange ses terres et ses droits en 1257 à Charles d'Anjou contre une  terre suzeraine directe du comté de Provence pour ne pas perdre un membre de sa famille  Vintimille. En 1258  un de ses cousins Boniface de Vintimille  cède au comte  de Provence  le château de Sospel et ses droits sur Breil et Saorgue,  l'ensemble passa en 1278 à une branche des Lascaris de Vintimille , en 1388 rentre dans le domaine de Savoie ce qui permet au comte de construire des châteaux pour contrôler la vallée en 1465 un incendie détruit le village , en 1553 les troupes françaises  s'emparent du fort de Saorgue avec l'aide d'Anne de Lascaris, comtesse de Tende dont le fils est gouverneur de Provence, en 1691 le château est encore en état et dépend du comté de Nice est rendu comme le reste au comté de Savoie. En 1700, le fief passe à la famille Solaro, puis aux Roffredo qui deviennent en 1710 comtes de Saorgue. En 1787 le futur président des Etats Unis Thomas Jafferson passe à Saorgue. De violents combats entre 1792 et 1802 les comtes durent émigrer. Fontan; château de la Causségue dit\" Causséga\"  dont le nom provient de nombreuses sources et fontaines.","architecture":"Saorgue; A 830 mètres d'altitude vestiges du château médiéval de Malmorte où de Malamorte au sud ouest du village du Xe siècle, il reste également des vestiges de remparts  du château fort de Saint-Georges et du castel de Sal.                                                                    Fontan; du château de Caussègue à 424 mètres d'altitude le long de la Roya, les restes du château transformé en musée des arts et de l'apiculture en mémoire  de Philippe Jean Baldens.","habitants":"Comtes de Vintimille\r\n        \"","divers":"Vestiges à Saorgue et Monastère","gps":"","images":["../image/image_06/06_Saorgue_Fontan_1.jpg","../image/image_06/06_Saorgue_Fontan_2.jpg"]},"Consult_chateau_formulaire7d0e":{"id":"Consult_chateau_formulaire7d0e","dept":"06","canton":"Sospel","commune":"Sospel","nom":"Sospel","type":"Vestiges","periode":"XII","histoire":"SOSPEL; Fief des comtes de Vintimille au Moyen-Age, puis passa au comtes de Provence, le 28 mars 1258 la cession de Sospel à la Provence est définitive chef lieu de la Viguerie, en 1378 le grand Schisme d'occident permet à Sospel de devenir évêché. En 1388 face à la guerre de succession déclenché par l'assassinat de la reine Jeanne, le comté de Nice dont Sospel font acte de dédition à la Savoie, les comtes de Tende, les Lascaris  acceptent le passage de Nice à Turin, de 1614 jusqu'en 1796 Sospel est le siège des quatre préfectures du sénat de Nice.","architecture":"Sospel ; était entouré de remparts, aujourd'hui entièrement détruit  dont il ne reste qu'un morceau dans le quartier du  vieux château où il existe encore une porte et les vestiges du château médiéval, le pont était la route du sel et le bâtiment  servait de péage.","habitants":"Comtes de Provence\r\n        \"","divers":"Vestiges et pont à Sospel","gps":"","images":["../image/image_06/06_Sospel_1.jpg","../image/image_06/06_Sospel_2.jpg"]},"Consult_chateau_formulaire3e63":{"id":"Consult_chateau_formulaire3e63","dept":"06","canton":"Nice","commune":"St-André","nom":"St_Andre","type":"Château","periode":"XII","histoire":"SAINT-ANDRE: A l'an 1000 aux seigneurs  Miron,  sa fille a épousé Laugier Rostaing en 1108 le fief passa à Jean Travaque et à Raymond Chabaud en 1441, en 1555 Melchior de Micholetti épouse la fille de Jean III de Chabaud est acquit les trois quart du fief. En 1611 Pierre Thaon médecin du duc de Savoie, épouse Camille Micholetti, en 1634 Don Jules de Thaon, chanoine archidiaire cède à son neveu Charles Antoine Thaon qui fit construire la château, épousa Lucréce Galléan fille des seigneurs de Châteauneuf , dont les descendants; Anne Françoise Ferrerro fille de Léanche Ferrerro sénateur à Nice, Marie Camille Thaon de Lantosque, Cassandre Chabaud, des seigneurs de Tourettes Gertrude Provana fille du premier président du senat de Chambéry et ambassadeur des Savoie, Marie Thérése de Cortina  San-Martin fille du comte de Clans, Madeleine Galléan des ducs de Gadagne, Sabine Spitalièri fille du comte de Cossole  qui transformera la forteresse médiévale en agréable villa à l'italienne. Les Thaon de Revel en 1671 premier consul à Nice, le fief  restera dans cette famille jusqu'en 1685. en 1715 et 1752 le comte Joseph Horace agrandit  et embellit le château. A la Révolution bien national vendu aux enchères, acquis par Scoffier géomètre, en 1860 au rattachement de Nice à la France, le propriétaire  qui l'avait acquis  était vice roi de Sardaigne très liés à la famille de Savoie, qui allèrent s'installer en Piémont après avoir vendu le château à l'hospice de Saint Paul et passera successivement  à diverses associations religieuses , compagnons d'Emmaus.","architecture":"Saint-André; Au fond du val de Banquière s'étale le long du torrent un édifice architectural remarquable appelé le château de Thaon de Revel.","habitants":"Famille des Thaon de Revel \r\n        \"","divers":"Château de Saint-André","gps":"","images":["../image/image_06/06_St_Andre_1.jpg","../image/image_06/06_St_Andre_2.jpg"]},"Consult_chateau_formulaire432d":{"id":"Consult_chateau_formulaire432d","dept":"06","canton":"Levens","commune":"St-Blaise","nom":"St_Blaise","type":"Vestiges","periode":"XII","histoire":"ST-BLAISE; A la redistribution des fiefs par Guillaume le libérateur suite à la reconquête de la Provence sur les Sarrasins en 973, le fief échoit aux vicomtes de Nice, ceux-ci le cèdent vers 1075 à l'abbaye de Saint-Pons en même  temps que Saint-Martin du Var.  de Flayosc \r\n        \"","divers":"Vestiges","gps":"","images":["../image/image_06/06_St_Cezaire_1.jpg"]},"Consult_chateau_formulaire3d7f":{"id":"Consult_chateau_formulaire3d7f","dept":"06","canton":"Villefranche-sur-Mer","commune":"St-Jean-Cap-Ferrat","nom":"St_Jean_Cap_Ferrat","type":"Résidence  Villa","periode":"XIX","histoire":"St-JEAN Cap-Ferrat, Entre Nice et Monaco au bord de mer,  sur la commune de Villefranche et de Beaulieu comprend la presqu'île Cap Ferrat. En 1388  elle fait partie de la commune de Villefrance  qui revient au duché de Savoie, fief  du duc Emmanuel-Philibert de Savoie y fit construire le fort Saint-Hospice qui sera détruit en 1706 par le duc de Berwick. Rattaché à la France en 1860, aujourd'hui site résidentiel, rempli de superbe villa  tel que la villa Santo-Sospir en 1931 par Marital Hourez et à Françine Weisweiller ou Jean Cocteau à peint les murs de l'intérieur en 1950. La belle villa Léopolda, la plus chère au monde du XIXe siècle et la villa de May construite en 1826 par Gaëtan de May  racheté par la ville en 1967, aujourd'hui musée de l'histoire de l'archéologie. Beaulieu; station balnéaire, vestiges grecs et romains sur les hauteurs, le Bristol et la Rotonde de Tersling de 1899 et le palais des Anglais 1885, et de nombreuses résidences, hôtels. Dans cette commune ils existent une cinquantaine de villas luxueuses tel que la Villa Euphreussi et Kérilos qui font l'objet d'un article à part.","architecture":"Dans la commune le palais  de la couronne des rois de Belgique \"Villa des Cédres\" ancienne propriété de Léopold II Saint-Jean Cap-Ferrat: La  tour Sainte-Hospice haute de 13 mètres  construite par le duc Charles Emmanuel III vers 1750 sur l'emplacement du fort Saint-Hospice rasé par Louis XIV en 1705.","habitants":"Emmanuel-Philibert de Savoie\r\n        \"","divers":"Tour et diverse Villas.","gps":"","images":["../image/image_06/06_St_Jean_Cap_Ferrat_1.jpg","../image/image_06/06_St_Jean_Cap_Ferrat_2.jpg","../image/image_06/0 ./image/image_06/06_St_Jeannet_Gaude_7.jpg","../image/image_06/06_St_Jeannet_Gaude_8.jpg"]},"Consult_chateau_formulaire3a91":{"id":"Consult_chateau_formulaire3a91","dept":"06","canton":"St-Sauveur-sur-Tinée","commune":"St-Sauveur-sur-Tinée","nom":"St_Sauveur_Rimplas","type":"Vestiges","periode":"XII","histoire":"ST-SAUVEUR de Thinée; En 1067 fief de la puissante famille  des Rostaing de Thorame, au XIVe siècle l'un des descendants Pierre Bald seigneur de Saint- Sauveur, de Rimplas, de  Marie, de Valdeblore et des Roure. Ces communes  se révoltèrent contre le comtes de Provence, en 1376 la reine Jeanne de Naples comtesse de Provence et suzeraine de Pierre de Bald,  prive Pierre Bald de tous ses droits, il fut grâcié en 1382 mais il se rebella à nouveau en 1388 avec l'aide des Grimaldi du Beuil, ambitieux voisin  du seigneur Blavet . Le comte de Savoie s'empare du pays niçois fidèle aux Anjou. Pierre Balb  se réfugie dans son château  de Rimplas et se lance dans une lutte  sans espoir, privé de ses fiefs  en 1392 qui sont récupérer par les Grimaldi. Saint-Sauveur et Marie  deviennent  commune libre,  privilège confirmé par le comte de Savoie en 1404, par pauvreté à la fin du XVIe siècle accepte son inféodation en premier  aux seigneur Baciloto  en 1618, puis aux Capri en 1683, aux Orcièro en 1700 et aux Lovera di Maria en 1722,  ensuite au titre de comté au niçois Jean François Ghisi , mis à mal par les espagnols et dévasté à nouveau en 1744 par les autrichiens. Les derniers seigneurs à la Révolution étaient les Ongran durent émigrer. Rimplas;  Comme St-Sauveur  fief des Thorame-Glandevès passa aux Faucon au XIVe siècle, puis aux Grimaldi jusqu'à la Révolution, érigé en comté en faveur des Grimaldi. En 1927 Mussolini visant la récupération du comté de Nice décide de construire un fort sur l'éperon rocheux s'éparant la vallée de la Tinée et du Val de Bore avant l'édification de la ligne Maginot, n'a jamais servit fut vendu à la commune pour abriter une champignonnière.","architecture":"Saint-Sauveur; au confluent de la Tinée et de la Vioméne sur la voie romaine qui relie Cimiez à Embrun un  castrum  cité en 1066 commune de Marie,  village médiéval perché château du XVIIe sur des bases féodales (restauré) portes féodales et fort sur la commune de Rimplas.","habitants":"Famille  des Rostaing de Thorame\r\n        \"","divers":"Rimplas et son fort","gps":"","images":["../image/image_06/06_St_Sauveur_Rimplas_1.jpg","../image/image_06/06_St_Sauveur_Rimplas_2.jpg","../image/image_06/06_St_Sauveur_Rimplas_3.jpg","../image/image_06/06_St_Sauveur_Rimplas_4.jpg","../image/image_06/06_St_Sauveur_Rimplas_5.jpg"]},"Consult_chateau_formulaire1479-2":{"id":"Consult_chateau_formulaire1479-2","dept":"06","canton":"St-Auban","commune":"Andon","nom":"Thorenc_Castellaras","type":"Vestiges","periode":"XII","histoire":"THORENC; L'histoire de la commune remonte à la période romaine, Thorenc a de tous temps été une place stratégique, le château des 4 tours (XIII°) qui fait face au donjon et aux ruines du village fortifié de Castellaras est là pour en témoigner.                               Dés 1038, le Castellaras de Thorenc était une enceinte fortifiée abritant village, château, et chapelle. En 1200, le Castellaras appartenait, dés 1038 aux fief de la famille d'Andonaux, seigneurs d'Amirats puis aux consuls de Grasse qui le fortifièrent, les comtes de Provence prennent Thorenc aux Grasse pour le donner en 1227 aux sires de Castellane,  puis acquit par Romée de Villeneuve,  bail du comte de Provence qui le conservera jusqu'en 1251. En 1387 la forteresse prise par une bande de pillard qui la remette  au comte de Savoie en 1391,  il fut détruit par une bande de pillards qui en firent leurs repaires à la fin du XVe siècle. Le château des quatre tours, fief de la famille d'Andon. Dans la commune le château de la Baraque.                                                        ANDON: Le Castellaras semblent être habité bien avant le XIIIe siècle abandonné au XIVe siècle. Le château d'Andon et le village sont détruit en 1691.                                                                        Les derniers seigneurs; les Villeneuve de Thorenc firent plusieurs châteaux peu fortifiés sur leurs terres.","architecture":"Thorenc; Le Castellaras de Thorenc était une vaste enceinte en partie romane assise à l'aplomb de la falaise fortifiée abritant village, château, et chapelle  et fortifications dont on voient encore les vestiges deux portes. Le château des quatre tours (manoir fortifié du XVe siècle).                                                                     Andon; à l'extrémité d'une crête, vestiges d'un château donné avec une partie de la seigneurie par le comte de Provence à Romée de Villeneuve en 1230.","habitants":"Famille d'Andonaux et de Villeneuve de Thorenc.\r\n        \"","divers":"Vestiges de Castellaras et manoir des Tours","gps":"","images":["../image/image_06/06_Thorenc_Castellaras_1.jpg","../image/image_06/06_Thorenc_Castellaras_2.jpg","../image/image_06/06_Thorenc_Castellaras_3.jpg","../image/image_06/06_Thorenc_Castellaras_4.jpg","../image/image_06/06_Thorenc_Castellaras_5.jpg","../image/image_06/06_Thorenc_Castellaras_6.jpg","../image/image_06/06_Thorenc_Castellaras_7.jpg","../image/image_06/06_Thorenc_Castellaras_8.jpg","../image/image_06/06_Thorenc_Castellaras_9.jpg"]},"Consult_chateau_formulaire90e6":{"id":"Consult_chateau_formulaire90e6","dept":"06","canton":"Levens","commune":"Tourette-Levens","nom":"Tourette_Levens","type":"Château","periode":"XII","histoire":"TOURETTE-LEVENS.  Fief en 1175   de la famille de Chabaud, co-seigneur de Tourettes restera dans cette famille jusqu'en 1684, élevé au rang de comté par le duc Charles-Emmanuel II de Savoie. A la mort  d'Honoré IV de Chabaud sans héritier direct  le fief est transmis à sa nièce Marie Anne Peyrani qui par alliance apporte le fief  à la famille Canubio de Cunéo qui l'abandonneront à la Révolution.  La famille Canubbio a gardé le titre de \"comte de Tourette\" en Italie  ou ils demeurèrent, il fut vendu à la famille Carle et revendu  en 1829   à un notaire de Tourette, qui sera acheté  par la commune en 1992 pour en faire un musée d'entomologie (papillons et coléoptères).","architecture":"Tourette Levens; Le vieux village perché sur un piton qui conserve des maisons  ruinées  dominé par une tour carrée à créneaux reste du château du XIIIe siècle, le château fut construit sur l'emplacement d'un temple avec six tours (trois rondes, trois carrées) pour surveiller les vallées.","habitants":"famille de Chabaud\r\n        \"","divers":"Vestiges du premier château féodal, donjon du second château et remparts.","gps":"","images":["../image/image_06/06_Tourrette_Levens_1.jpg","../image/image_06/06_Tourrette_Levens_2.jpg","../image/image_06/06_Tourrette_Levens_3.jpg","../image/image_06/06_Tourrette_Levens_4.jpg","../image/image_06/06_Tourrette_Levens_5.jpg","../image/image_06/06_Tourrette_Levens_6.jpg","../image/image_06/06_Tourrette_Levens_7.jpg","../image/image_06/06_Tourrette_Levens_8.jpg","../image/image_06/06_Tourrette_Levens_9.jpg"]},"Consult_chateau_formulaire1740":{"id":"Consult_chateau_formulaire1740","dept":"06","canton":"Bar-sur-Loup","commune":"Tourette-sur-Loup","nom":"Tourette_sur_Loup","type":"Château","periode":"XIV","histoire":"TOURETTE sur Loup;  Castrum de Toretis, la ville s'est organisé autour du château. En 1388 possession des Grimaldi qui se sont ralliés à la Savoie, puis confisqué par le comte de Provence qui l'attribue à Guichard de Villeneuve dit le Bâtard de Vence,  les seigneurs de Tourette  formaient une branche de la famille de Villeneuve, élevé en marquisat le conserveront le fief jusqu'à la Révolution, le dernier marquis s'enfuit,  arrêté et assassiné à Vintimille.  Les habitants s'emparent du château et en font l'hôtel de ville, encore aujourd'hui, une partie appartient à plusieurs copropriétaires.","architecture":"Tourette sur Loup: A gardé son cachet médiéval avec sa situation à 405 mètres d'altitude, le château remonterait au XIVe siècle, le donjon serait du XIIe siècle, l'ensemble remanié, dont une face est visible dans la cour du château moderne,  tracé de remparts,  enceinte médiévale subsistent deux portes  et quelques pans de mur.","habitants":"Guichard de Villeneuve\r\n        \"","divers":"Village de Tourette sur Loup et son château au centre.","gps":"","images":["../image/image_06/06_Tourrette_sur_Loup_1.jpg","../image/image_06/06_Tourrette_sur_Loup_2.jpg","../image/image_06/06_Tourrette_sur_Loup_3.jpg"]},"Consult_chateau_formulaire0424":{"id":"Consult_chateau_formulaire0424","dept":"06","canton":"Antibes","commune":"Vallauris","nom":"Vallauris","type":"Château","periode":"XV","histoire":"VALLAURIS: En 1038 \"Vallis-Auréa\" le co-seigneur Aldebert évêque d'Antibes fait don du territoire à l'abbaye de Lérins, qui firent au XIIIe siècle un prieuré et une chapelle à l'emplacement du château actuel qui sera presque  abandonné au XVe siècle suite aux guerres brigandages pestes et famines le moine  seigneur Dom Raynier de Lascaris fit repeupler les lieux et construire au XVIe siècle le château sur les ruines du prieuré, transformé en résidence  confortable par les moines du Lérins qui l'occuperont jusqu'en 1791, vendu comme bien national à sieur Maurel négociant à Vence et en 1810 à une riche famille les Daumas et en 1973 la commune achète le château qu'elle restaure pour en faire un musée consacré à la céramique et  à l'art moderne de Picasso, installé dans la chapelle depuis 1959.","architecture":"Vallauris: construit sur les ruines de l'ancien prieuré, corps de bâtiment en forme de U à trois niveaux entourant une cour et flanqués à leurs angles extérieurs de tours rondes à bases tallutés et les toitures couvertes en tuiles plates.","habitants":"Moines du Lerins\r\n        \"","divers":"Château de Vallauris","gps":"","images":["../image/image_06/06_Vallauris_1.jpg","../image/image_06/06_Vallauris_2.jpg","../image/image_06/06_Vallauris_3.jpg","../image/image_06/06_Vallauris_4.jpg","../image/image_06/06_Vallauris_5.jpg"]},"Consult_chateau_formulaireb062-2":{"id":"Consult_chateau_formulaireb062-2","dept":"06","canton":"Vence","commune":"St-Paul-de-Vence","nom":"Vence_St_Paul","type":"Vestiges","periode":"XII","histoire":"VENCE; Vintium, évincée au Moyen-Age par la ville de Grasse,  au XIIIe siècle, le comte de Provence donne la ville en fief à Romée de Villeneuve fondateur de la  lignée qui demeurera jusqu'à la Révolution, et les évêques en étaient les co-seigneurs. Pendant  les guerres de religion, elle résiste au siège du calviniste Lesdiguières 1592, épargné pendant la guerre de succession d'Espagne grâce à l'intervention de l'évêque Surian.                                 ST-PAUL de Vence, dans la seconde moitié du Moyen-Age le fief est administré par le comte de Provence Raymond Bérangé au début du XIIIe siècle  et la comtesse Jeanne Ier d'Anjou au XIVe siècle à la mort de la reine,  Saint-Paul se rallie à la maison d'Anjou, la ville passera à la France en 1482,  c'est en 1538 que François Ier entreprend les nouvelles fortifications en remerciements aux villageois d'avoir résisté aux troupes de Charles Quint.                                                                                  Occupée successivement par les ducs de Savoie pendant les guerres de religion, les Hongrois en 1707 et   les guerres de la succession d'Espagne, cette place forte est déclassée en 1868 après la vente aux enchères des remparts racheté par la ville.                           Le château Nôtre-Dame des Fleurs dans la commune bâtisse du XIXe siècle sur le site d'une abbaye bénédictine abrité un musée de la parfumerie acheté par  Marianne et Pierre  Nahon en 1990.","architecture":"VENCE; village médiévale vestiges de fortifications à créneaux et archères encore visibles dans la courtine entre la porte de l'orient et le portail du pont-levis, la porte du Peyra incorporé aux remparts une tour médiévale de l'ancien château, la porte du Faubourg et la porte du Singapour sous une tour tronquée remonte au Moyen-Age. Un  château des Villeneuve  du XIIIe siècle commencé par Romée considérablement remanié depuis. Un autre château  des Villeneuve rebâti au XVIIe siècle  abrite la fondation de Hugues.                                                                    Le château de St-Martin ruines imposantes du château aujourd'hui reconditionné transformé  en hôtel restaurant, ses vestiges du Moyen-Age attribués à tort aux Templiers serait une ancienne propriété des évêques de Vence aurait accueilli en l'an 350 l'évêque de Tours et en garda le nom, légué aux croisés en retour de Jérusalem par le comte de Provence,  il devient le fief des chevaliers du temple, remanié en 1995 par l'architecte Duc Svetchine.  Le château de Nôtre-Dame des Fleurs, reconstruit au XIXe siècle sur l'emplacement de l'abbaye de Saint-Victor.                                 St-Paul de Vence; A 4 km de Vence ville fortifiée au Moyen-Age devient forteresse au XVIe siècle de modeste dimension, enceinte avec la porte de Vence flanquée de deux orillons aux formes arrondies et tour médiévale du XIIIe siècle, couronnée de mâchicoulis, d'un donjon du XIIIe siècle utilisé par la mairie, la porte de Nice, au sud flanquée de deux bastions à orillons, remparts du XVIe siècle chemin de ronde sur la périphérie de la ville et courtine médiévale partiellement conservée à l'intérieur et l'enceinte bastionnée, aux formes anguleuses et massives.","habitants":"Romée de Villeneuve\r\n        \"","divers":"St-Paul de Vence et sa tour et son château, commanderie, rempart et divers châteaux","gps":"","images":["../image/image_06/06_Vence_St_Paul_1.jpg","../image/image_06/06_Vence_St_Paul_2.jpg","../image/image_06/06_Vence_St_Paul_3.jpg","../image/image_06/06_Vence_St_Paul_4.jpg","../image/image_06/06_Vence_St_Paul_5.jpg","../image/image_06/06_Vence_St_Paul_6.jpg","../image/image_06/06_Vence_St_Paul_7.jpg","../image/image_06/06_Vence_St_Paul_8.jpg","../image/image_06/06_Vence_St_Paul_9.jpg"]},"Consult_chateau_formulairee025":{"id":"Consult_chateau_formulairee025","dept":"06","canton":"Villars-sur-Var","commune":"Villars-sur-Var","nom":"Villars_Massoins_Touet","type":"Vestiges","periode":"XII","histoire":"VILLARS sur Var; Chef lieu de Canton; A partir de 1388 lors de la dédition de Nice qui met pour  cinq cent ans  le domaine Niçois  dans les mains des comtes de Savoie. Jean Grimaldi du Beuil reçoit Villars parmi ces fiefs, sa famille y règne pendant trois siècles,  faisant un lieu de résidences. Annibal de Grimaldi fut exécuté en 1621 et son château fut détruit le fief devient propriété des notables piémontais et le site classé par Louis XIV et Louis XV  au XVIIIe siècle et en 1860 rattachement à la France.     MASSOINS ; Cité au Xe siècle, ancienne forteresse des Grimaldi de Beuil et d'un deuxième  château  dit de la Casette construit à l'an 1000. Après la déroute d'Annibal de Grimaldi du Beuil, le fief  est inféodé aux Caissoti érigé en comté que succédèrent les Capuoti et les Corniglion, en 1746 le village est pillé par les Gallispans et en 1792 occupé par les Massuoins jusqu'en 1814, Le village retournera au Piémont jusqu'en 1860, date d'annexion à la France.                                                                                 TOUET sur Var; Au Xe siècle les comtes de Provence qui confie le fief à l'un de ses vassaux le comte de Beuil, ce petit château  sera utilisé à cinquante pour cent par les deux comtes Provence et Beuil. Entre le  XIIIe et le XVIIe siècle  le village subit des servitudes des Templiers  installés à Rigaud joue un rôle de seigneurs  de Touët sous l'égide de l'abbaye de Lérins,  le village fut inféodé au XVIIIe siècle  à différents seigneurs dont les derniers le comte de Claretti. En 1793  Touët deviendra français en 1793 et repassera sous la domination Sarde en 1814 et de retour à la France en 1860.                                                                                 Le village voisin Malaussène  comprend un château fortifié du XIIIe siècle sur un éperon rocheux qui domine le village, un nouveau château a été construit dans le bas de l'agglomération actuelle sur un promontoire qui jouxte la chapelle Sainte-Croix.","architecture":"Villars sur Var; anciens remparts et ruines du château  de l'Espéron sur lequel a été reconstruit le château des Grimaldi qui ce dernier a été détruit.   Massoins; vestiges de château construit à l'an mille, dont  il subsiste des ruines de l'enceinte et d'une tour carrée situé à l'extrémité du village,  sur un mamelon avec clocheton de la chapelle.           Touët sur Var; au XVIIIe siècle suite à l'exécution du comte (Anibal de Grimaldi) ses châteaux furent détruits et ses biens confisqués.","habitants":"Annibal de Grimaldi\r\n        \"","divers":"Patrimoine de Villars,  de Massoins et de Touet.","gps":"","images":["../image/image_06/06_Villars_Massoins_Touet_1.jpg","../image/image_06/06_Villars_Massoins_Touet_2.jpg","../image/image_06/06_Villars_Massoins_Touet_3.jpg","../image/image_06/06_Villars_Massoins_Touet_4.jpg","../image/image_06/06_Villars_Massoins_Touet_5.jpg"]},"Consult_chateau_formulaire4210":{"id":"Consult_chateau_formulaire4210","dept":"06","canton":"Villefranche-sur-Mer","commune":"Villefranche-sur-Mer","nom":"Villefranche_sur_Mer","type":"Fort  Villa","periode":"XIX","histoire":"VILLEFRANCHE sur Mer: Villa Franca, en 1295 Charles II d'Anjou, comte de Provence transplante des habitants de \"Montolivo\" sur le bord de mer auquel il donne le nom de Villam-Francam. A l'occasion de la trêve de Nice en 1529 Charles Quint  qui avait promis d'envahir la cité, mais François Ier fit alliance avec les Turcs, avec une importante flotte qui mis en déroute Charles Quint.  Le fief étant passé en 1543 sous le contrôle du duc Emmanuel-Philibert de Savoie qui  fit faire des fortifications bastionnées de la rade et constitue la citadelle. La seigneurie au XVIIIe siècle était attribué au seigneur de Germano érection en comté en 1700 aux Auda 1743 puis aux Dani en 1743. La France occupe le comté de Nice entre 1710-1722 et en 1744 pendant les guerres de succession d'Autriche, en 1793 repasse de nouveau à la France jusqu'en 1814 ou elle retourne sous l'occupation de la Savoie  et en 1860 retour à la France.                                                Au cours du XVIIIe au XIXe siècle  Villefranche  avec le port de la Darse  port militaire qui sera entraîné dans des conflits contre le roi de Sardaigne principalement et accueille de nombreuses escadres étrangères russes et anglaises et la flotte U.S lors de la dernière guerre, ce qui amena la noblesse impériale russes et anglaises a acquérir et construire de superbes villas sur le canton de Villefranche sur Mer. (Voir article St-Jean Cap Ferrat).","architecture":"Villefranche sur Mer; s'étage en amphithéâtre sur les contreforts  des collines environnantes, port militaire de la Darse, ville fortifié par une citadelle dont une tour dite \"Torre Vecchia\" dans les remparts et le fort \"Mont-Alban\" construit de  1557 à 1570 de Domenico Bonsello architecte militaire, et le fort de Saint-Hospice aujourd'hui disparu, c'est à partir de ses constructions que Vauban et Niquet  construisirent les forts de défense de la France. Ces forts sont transférés au ministère  de la défense, la citadelle Saint-Elme du XVIe siècle abrite le centre administratif de la ville et hôtel de ville depuis 1981  musée et le château Saint-Michel. Villefranche possède l'observatoire océanologique  qui dépend de l'université Pierre et Marie Curie  sous tutelle du CNRS.  Dans la commune le palais  de la couronne des rois de Belgique \"Villa des Cédres\".                                                                                 Saint-Jean Cap-Ferrat: La  tour Sainte-Hospice haute de 13 mètres  construite par le duc Charles Emmanuel III vers 1750 sur l'emplacement du fort Saint-Hospice rasé par Louis XIV en 1705.","habitants":"Emmanuel-Philibert de Savoie\r\n        \"","divers":"Citadelle de Villefranche, le fort Saint-Alban, de Saint-Helme et les villas de Bristol, de Tamaris, Léopolda et l'observatoire.","gps":"","images":["../image/image_06/06_Villefranche_sur_Mer_1.jpg","../image/image_06/06_Villefranche_sur_Mer_2.jpg","../image/image_06/06_Villefranche_sur_Mer_3.jpg","../image/image_06/06_Villefranche_sur_Mer_4.jpg","../image/image_06/06_Villefranche_sur_Mer_5.jpg","../image/image_06/06_Villefranche_sur_Mer_6.jpg","../image/image_06/06_Villefranche_sur_Mer_7.jpg","../image/image_06/06_Villefranche_sur_Mer_8.jpg","../image/image_06/06_Villefranche_sur_Mer_9.jpg"]},"Consult_chateau_formulaire9325":{"id":"Consult_chateau_formulaire9325","dept":"06","canton":"Cagnes-sur-Mer","commune":"Villeneuve-Loubet","nom":"Villeneuve_Loubet","type":"Château","periode":"XI","histoire":"VILLENEUVE-LOUBET; Cité au IXe siècle, l'héritière du comte de Provence au XIIe siècle épouse un membre de la famille de Barcelone la région devient \"Catalane\" suivirent des combats pour récupérer la région par les anciens seigneurs de Provence, au XIIIe siècle Romée de Villeneuve grand viguier de Nice, le fils cadet du grand seigneur Giraud de Villanova est placé comme chanoine à Fréjus, en 1231 Romée récupère les terres  où se trouve le château  en 1251,  fut vendu pour payer les dettes de Romée le comte de Provence récupère l'ensemble et renforce ses défenses. En 1420  Yolande comtesse de Provence donne le château à Antoine de Villeneuve  un des descendants de Romée de Villanova. A la fin du XVe siècle le fils d'Antoine le vend   à Pierre de Lascaris comte de Vintimille dont une des filles des Lascaris  épouse René le bâtard  de Savoie, comte de Tende.  En 1536 Charles Quint envahit le comté de Provence et s'empare du château ou il y restera quelques jours, en 1538 François Ier y résida également deux mois pour signé la paix de Nice avec Charles Quint. Passa  à Claude de Lorraine dont son frères Charles de Guise fils du Balafré y résida de 1571 à 1640, le château appartient ensuite aux Bouthillier de Chavigny avant de revenir en 1678 à Antoine, marquis de Thomas   président du parlement de Provence, qui fait passer les terres en marquisat, Henri de Thomas marquis de la Garde, baron de Ciprières seigneur de Villeneuve-Loubet lègue ses biens en 1741  la famille de Mark Tripoli marquis de Panisse-Passis nouveau propriétaire est toujours dans cette famille. Le château aurait reçu à plusieurs reprises le général Bonaparte.                                          Dans la commune le château de Vaugenier et le château des Baumettes de la fin du XIXe siècle  résidentielle de style néo-palladienne aujourd'hui abrite l'espace culturel d'André Malraux et d'autres activités toute l'année.","architecture":"Villeneuve-Loubet:  Du premier château  appelé la \"Garde\" une tour donjon appelé \"Tour de la Madone\" le château construit entre 1231  et 1234  de forme quadrangulaire ceinturé d'une enceinte qui avait à l'origine treize tours, trois subsistent aujourd'hui  mais arasées,  vastes  corps de logis à trois niveaux à hautes courtines avec chemin de ronde, flanqué de tourelles en angles crénelées comportant des branches à feu, Tour pentagonale  du IXe siècle haut de 33 mètres en façade fermant la cour d'honneur accolée d'une tour ronde médiévale. Tout l'ensemble est crénelé. En 1830 on entré dans le château par un pont-levis, suite au tremblement de terre de 1887 une restauration s'est imposé avec ouvertures de fenêtres  et nouvelle entrée.","habitants":"Giraud de Villanova \r\n        \"","divers":"Château de Villeneuve Loubet, des Baumettes et de Vaugrenier.","gps":"","images":["../image/image_06/06_Villeneuve_Loubet_1.jpg","../image/image_06/06_Villeneuve_Loubet_2.jpg","../image/image_06/06_Villeneuve_Loubet_3.jpg","../image/image_06/06_Villeneuve_Loubet_4.jpg","../image/image_06/06_Villeneuve_Loubet_5.jpg","../image/image_06/06_Villeneuve_Loubet_6.jpg","../image/image_06/06_Villeneuve_Loubet_7.jpg","../image/image_06/06_Villeneuve_Loubet_8.jpg"]}};

function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','06 — Alpes-Maritimes'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
