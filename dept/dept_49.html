que le comte Charles Thoinet décède à Paris. Occupée par les Allemands en 1939-45 et très endommagée, la propriété est revendue après la seconde guerre à la Fédération des Amicales Laïques de Loire-Atlantique qui crée un institut spécialisé pour les enfants, devenu depuis 1982 un I.R.P. (Institut de Rééducation et de Psychothérapie). Par la suite, le château étant devenu trop étroit pour le nombre de pensionnaires, l'IRP a été déplacé dans des bâtiments construits autour du château. Ce dernier est maintenant investi par l'association la Turmelière qui accueille des enfants dans le cadre scolaire pour des classes de découverte. Les séjours proposés conjuguent des activités autour de lenvironnement, du sport, de lécriture et de la poésie.","habitants":"Famille du Bellay                                                                Famille Thoinet   \r\n        \r\n        \r\n        \r\n        \"","divers":"Tumelière  à Liré 47° 20' 8,89\" Nord et 1° 11' 6,15\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Turmeli%c3%a8re_1.jpg","../../jctruffet.com/image/image_49/49_Turmeli%c3%a8re_2.jpg","../../jctruffet.com/image/image_49/49_Turmeli%c3%a8re_3.jpg","../../jctruffet.com/image/image_49/49_Turmeli%c3%a8re_4.jpg","../../jctruffet.com/image/image_49/49_Turmeli%c3%a8re_5.jpg","../../jctruffet.com/image/image_49/49_Turmeli%c3%a8re_6.jpg"]},"Consult_chateau_formulaire5046":{"id":"Consult_chateau_formulaire5046","dept":"49","canton":"Saumur","commune":"Turquant","nom":"Turquant","type":"Château","periode":"XV-XVIII","histoire":"La CHAUVELLIERE  et la Herpinière ont appartenu au négociant en vin Van Vorn qui créa le comptoir hollandais du Thoureil tandis que La Mastinière était une dépendance de lAbbaye de Fontevraud. Le château de la Fessardière appartenait à la famille Aubert du Petit-Thouars et fut le lieu de résidence surveillée dAhmed Ben Bella en 1961 avant quil ne devienne le premier président de la république algérienne.                                                                 FESSANDIERE, fut construit au XVII siècle. La propriété domine le village de Turquant, cest au château de la Fessardière quest né le 3 août 1793, Abel Aubert Du Petit Thouars, navigateur, explorateur et officier de marine français. Il participa à diverses missions hydrographiques, mais son titre de gloire, alors quil est capitaine de frégate, fut le débarquement et la prise dAlger sous Charles X en 1830. Puis des missions à caractère scientifique et commerciale le conduisent dans locéan Pacifique ; capitaine de vaisseau en 1834, il effectue un tour du monde de 1836 à 1839. Il est chargé, en 1841, de prendre possession des îles Marquises. Vice amiral en 1846, il prit sa retraite en 1858 et mourut à Paris le 16 mars 1864. Puis, cest en 1961 que le château de la Fessardière connut un autre fait historique. À lépoque,  loué par le ministère de la Justice.","architecture":"FESSANDIERE, du XVIIIe siècle, Château-Gaillard, maison du XVe siècle ;  Manoir de la Chauvellière (inscrit MH) du XVIIIe siècle ;  Manoir de la Vignole (inscrit MH) du XVe siècle ; hôtel restaurant de Bartholeyns.                                                          La VIGNOLLE , manoir à tourelle du XVe siècle avec ses dépendances creusées dans la roche. En 1474 ce manoir est la propriété de Jean de La Vignolle nommé président de la chambre des comptes dAnjou par le Roi René. Plusieurs propriétés du sieur de la Vignolle furent mises à la disposition de Marguerite dAnjou, fille du Roi René et reine dAngleterre. La Chauvelière et La Herpinière ont appartenu au négociant en vin Van Vorn qui créa le comptoir hollandais du Thoureil tandis que La Mastinière était une dépendance de lAbbaye de Fontevraud.                                                  TURQUANT L'étymologie de Turquant demeure encore hypothétique, mais son histoire remonte au XIIe siècle. Dès 1125, un prieur portant le nom de \"G. de Turcham\" est seigneur de la paroisse. Il faut écouter le son puisque le nom a été parlé bien longtemps avant d'être écrit. Les premiers écrivains ont traduit tout simplement, en latin, le mot qu'ils entendaient. Le nom s'est écrit Torquam, Turquam, Torcan et Torgam. Enfin au XIXe siècle, la forme de Turquant a prévalu. Village de Perreyeux, de tonneliers, de bateliers, de mariniers et de meuniers, tous un peu vignerons, avait ses coutumes pittoresques et ses personnalités.","habitants":"Fessandière;  Abel Aubert Du Petit Thouars,\r\n        \"","divers":"Chauvelière      47° 12' 23\" nord, 0° 01' 52\" est                      Fessandière grav-1-2                                                                       Vignolle grav 3-4 ,  47° 13' 17\" nord, 0° 02' 14\"est","gps":"","images":["../../jctruffet.com/image/image_49/49_Turquant_1.jpg","../../jctruffet.com/image/image_49/49_Turquant_2.jpg","../../jctruffet.com/image/image_49/49_Turquant_3.jpg","../../jctruffet.com/image/image_49/49_Turquant_4.jpg"]},"Consult_chateau_formulaire1424":{"id":"Consult_chateau_formulaire1424","dept":"49","canton":"Chemillé-Melay","commune":"Valanjou","nom":"Valanjou","type":"Château","periode":"X-XV-XIX","histoire":"ARGONNE,  date de 1070-1080, où il est fait mention d'Argonia, détenue par un dénommé Goslenus. La terre d'Argonne a appartenu depuis le XIVe siècle à la famille Dubois, jusqu'en 1661. Une chapelle y est fondée le 1er juillet 1527 par la veuve de François Dubois, Catherine de Souvigné. Elle passe ensuite à Guillaume Cesbron, puis en 1716 à un dénommé Gourreau, en 1750 à Pierre Pichot et en 1770 à Lépagneule de Rillé jusqu'en 1804. En 1810, il est propriété d'Alexandre de la Calvinière, puis est vendu à Jacob Abraham. Incendié par les Républicains lors des troubles révolutionnaires, Frédéric Abraham fait restaurer le château en 1846                                                                             SOURDIGNE, GONNORD, ancien fief et seigneurie, relevant de Cernusson et de Gonnord (1070-1100), avec château-fort, entouré de douves, que commandait autrefois une tourelle en avancement sur la poterne ouvrant par deux couloirs obliques. En est sieur Blandin, 1506, Jean Guérin, châtelain de Thouarcé 1539, François Bastard 1567, Perrine Goupil 1592. Durant la guerre de Vendée, le feu a été mis en vain à l'habitation par des soldats de passage. Elle fut agrandie d'un second corps de logis, égal au premier en 1825, par M. Janvier Lachesnaie. Le domaine, 180 ha environ est morcelé et la demeure est acquise, en 1935, par M. Bazantay, propriétaire actuel. Sauf une tourelle, les bâtiments paraissent avoir été reconstruits au XIXe siècle, ils sont toujours entourés de douves vives.","architecture":"ARGONNE,  l'édifice, entouré de douves, est constitué d'une poterne avec pont-levis flanquée de deux tours et ornée d'une lucarne avec fronton. On y trouve un corps de logis ainsi qu'une fuie.                                                                                                     GONNORD, du Xe siècle abrite un jeu de boules de fort toujours en activité.  Valanjou a une très longue histoire derrière lui. Château fort à pont-levis entouré de douves au Xe siècle, il est pris par les anglais en 1230, abrite Charles X en 1565, reçoit la visite du Duc d'Anjou en 1580 puis celle d'Henri de Navarre à plusieurs reprises. Incendié à la Révolution, il est vendu comme bien national en 1796. En ruine au cours du XIXe siècle, il est exploité un court instant pour ses pierres. La partie Est est sauvée par le curé de l'époque. La tour Nord est aménagée de salles de réunions et de spectacles ainsi que du fameux jeu de boules de fort animé par le \"Cercle Saint Pierre\".  En 1926, le château est inscrit à l'inventaire des M.H..","habitants":"Famille M. Janvier Lachesnaie\r\n        \"","divers":"Châteaux à Valenjou; 47° 14' 44\" nord, 0° 36' 30\" ouest  Valenjou  grav-1   Argonne  grav-2   Sourdigne -3-4  Gonnord   grav-5-6","gps":"","images":["../../jctruffet.com/image/image_49/49_Valanjou_1.jpg","../../jctruffet.com/image/image_49/49_Valanjou_2.jpg","../../jctruffet.com/image/image_49/49_Valanjou_3.jpg","../../jctruffet.com/image/image_49/49_Valanjou_4.jpg","../../jctruffet.com/image/image_49/49_Valanjou_5.jpg","../../jctruffet.com/image/image_49/49_Valanjou_6.jpg"]},"Consult_chateau_formulaire0ad9":{"id":"Consult_chateau_formulaire0ad9","dept":"49","canton":"Segré","commune":"Loiré","nom":"Vallière_Loiré","type":"Château","periode":"XVIII","histoire":"VALLIERE, ancien fief avec manoir relevant de la seigneurie de la Peroussaie. Le manoir a été détruit et remplacé par le logis du château actuel dans la deuxième moitié du XVIIIe siècle. La construction, avec les communs, est probablement à placer vers 1765, si les deux blasons au fronton de la face ouest du corps de logis sont ceux de ses constructeurs, Joseph Charles François de Hellaut et Anne Agathe Luce de Barin, son épouse. Du domaine dépendaient deux moulins; l'un à vent qui se trouvait au lieu de la Beausse, l'autre, à eau, proche du logis, était alimenté par un étang rempli par les eaux dérivées de l'Argos. Les deux ont été détruits en 1868, lors des travaux de modernisation du château qui touchèrent les façades des communs, les parties hautes, la construction de la faisanderie, création d'un jardin potager au sud du logis et la construction d'une orangerie et de serres. Le parc fut aménagé par l'architecte paysagiste Auguste Killian, d'Angers. Les douves à l'est devaient être en partie comblées et l'Argos détourné pour former une courbe traversant la prairie située à l'est du logis. Le projet ne fut qu'en partie réalisé ; le moulin à eau fut détruit et une grille de fer fut placée à l'entrée en demi-lune de l'allée principale menant au logis. Le détournement de l'Argos, selon le projet de Killian, ne fut réalisé qu'au cours du troisième quart du XXe siècle, à la faveur du remembrement.","architecture":"VALLIERE, le premier établissement médiéval de Vallière formait un site défensif aquatique ; la motte devait être protégée par l'Argos et par un vaste étang qui s'allongeait vers l'ouest, constituant également la réserve énergétique du moulin. Les douves régulières formant quatre quartiers rectangulaires furent établies à l'époque classique, peut-être au moment de la reconstruction du château, au XVIIIe siècle. Le logis lui-même paraît avoir été établi sur l'ancienne chaussée de l'étang puisque l'on constate une différence de niveau d'environ deux mètres entre les douves ouest et Est. Ce bâtiment, de plan rectangulaire à deux pavillons latéraux, à un étage et étage de comble, présente cinq travées d'ouvertures à arcs segmentaires et encadrements de tuffeau, sur chaque face. L'enduit qui couvrait ses élévations a été enlevé au cours du troisième quart du XXe siècle. Les communs comprennent deux bâtiments parallèles dont les encadrements de baies en briques sont un remaniement du troisième quart du XIXe siècle. Le bâtiment nord-est à usage de logement de domestiques ; le bâtiment sud comprend une écurie de quatre stalles et deux poulinières, une sellerie et une remise. Au fronton de la façade sud est sculpté un cheval lancé au galop. L'orangerie, située dans le jardin potager, présente sept grandes baies vitrées à arcs en plein cintre, en brique et tuffeau.","habitants":"Joseph Charles François de Hellaut\r\n        \"","divers":"la Vallière à Loiré","gps":"","images":["../../jctruffet.com/image/image_49/49_Valli%c3%a8re_Loir%c3%a9_1.jpg","../../jctruffet.com/image/image_49/49_Valli%c3%a8re_Loir%c3%a9_2.jpg"]},"Consult_chateau_formulairec14b":{"id":"Consult_chateau_formulairec14b","dept":"49","canton":"Tiercé","commune":"Miré","nom":"Vaux_Miré","type":"Château","periode":"XIV-XV","histoire":"VAUX-Miré,  Jean Bourré y créa des jardins qui produisaient des \"poyres de Bon Chrestien et autres bons fruitz\" très appréciés. Trop occupé par ses nombreuses charges auprès de Louis XI, Jean Bourré ne séjourna que très peu à Vaux. Il délaissa bientôt cette terre et acquit les terres du Plessis le Vent dès 1462, pour y faire édifier le château du Plessis Bourré en 1468. Vaux fut vendu en 1582 à René de Bourgneuf, seigneur de Cussé. Le marquis de Rambouillet en était seigneur en 1627. René de Salles, écuyer et seigneur de Miré lacquit en 1656. En 1793, Vaux appartenait au juge de paix Bordillon. Une centaine de chouans linvestirent et le 19 thermidor de lAn II, un assaut du cantonnement voisin les en chassèrent, laissant deux morts et le manteau de leur chef Coquereau. Le marquis de Préaux en prit ensuite possession, le revendit à son régisseur Auguste Briand et plusieurs familles vers 1830, ainsi il a perduré jusqu'à nous dans son style d'origine, mais dans un si pitoyable état que beaucoup le croyaient définitivement perdu.","architecture":"VAUX, sur les ruines dun manoir du XIIe, Jean Bourré fit reconstruire ce beau château à partir de 1464, auquel fut annexée une chapelle. Le château est un édifice ceint de douves vives et flanqué de tours aux quatre coins. La campagne étant troublée, il a conservé des vestiges de l'architecture militaire médiévale (douves, pont-levis, bretèche, meurtrières, hourd). Mais la douceur de la Renaissance commence à poindre, le château se fait plus ouvert et agréable (fenêtres à meneaux, frises).Il a bien fallu tout l'engagement des architectes des M.H. et des Bâtiments de France conjugué, avec la passion et la ténacité des actuels propriétaires, Jean et Christiane Nitzel, pour mener au bout cette aventure et sauver in extremis ce témoignage rare de l'architecture pré-renaissance et frère aîné du Plessis-Bourré.","habitants":"marquis de Rambouillet\r\n        \"","divers":"Vaux à Miré;  47° 47' 06\" Nord et 0° 30' 52\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Vaux_Mir%c3%a9_1.jpg","../../jctruffet.com/image/image_49/49_Vaux_Mir%c3%a9_2.jpg","../../jctruffet.com/image/image_49/49_Vaux_Mir%c3%a9_3.jpg","../../jctruffet.com/image/image_49/49_Vaux_Mir%c3%a9_4.jpg","../../jctruffet.com/image/image_49/49_Vaux_Mir%c3%a9_5.jpg","../../jctruffet.com/image/image_49/49_Vaux_Mir%c3%a9_6.jpg","../../jctruffet.com/image/image_49/49_Vaux_Mir%c3%a9_7.jpg","../../jctruffet.com/image/image_49/49_Vaux_Mir%c3%a9_8.jpg"]},"Consult_chateau_formulaire040a":{"id":"Consult_chateau_formulaire040a","dept":"49","canton":"Segré","commune":"Pouancé","nom":"Vengeau","type":"Château","periode":"XVI-XIX","histoire":"VENGEAU, bâti au cours du XVIe siècle. A l'origine, il devait être protégé par des douves, car sur le cadastre de 1833, au nord du logis une pièce d'eau est représentée et les dépendances face au logis, forment une cour. De nombreuses traces de collages sont visibles sur l'arrière de la façade au niveau du corps central, entre celui-ci et la chapelle, le piédroit de la porte à droite est le réemploi d'un linteau d'une chapelle avec l'inscription \"Pour son Dieu et Marie cette chapelle a resté bâtie en l'honneur de Saint René\". La chapelle dédiée à Saint-Blaise a été fondée le 9 juillet 1501. Le logis a été restauré au cours de la seconde moitié du XIXe siècle, vers 1868, par les frères Oger de Nantes. Des lucarnes ont été ajoutées, les façades ont été régularisées, la chapelle a été restaurée, son intérieur a été peint par les frères Viaud, décorateurs à Nantes.","architecture":"VENGEAU, le château est composé de deux corps accolés latéralement et d'une chapelle. Deux tourelles en encorbellement cantonnent la façade antérieure du corps principal couvert par un toit à croupes; elles sont en tufeau et couvertes par de petits toits campaniformes. Lors de l'ordonnancement de la façade, avant le XIXe siècle, de nombreuses ouvertures ont été percées. L'étage de comble est éclairé par 3 lucarnes à fronton-pignon orné de trois pinacles. Le corps central à un étage et étage de comble est couvert par un toit à longs pans percé lui aussi de trois lucarnes. Sur sa façade postérieure, une tour polygonale abrite un escalier à vis. Au XIXe siècle, lors des restaurations, la partie arrière a été agrandie et la tour a été englobée par deux avancées. La chapelle occupe la partie la plus à droite du bâtiment, sa porte présente un linteau en accolade, elle se compose d'une seul travée couverte par une voûte, le chevet plat est percé d'une baie fermée de remplages en tufeau et d'un vitrail réalisé au XIXe siècle. Les murs latéraux sont creusés de deux en feux, la chapelle abritait deux tombeaux qui ont été supprimés lors de la restauration, elle est orné d'un décor peint. Les dépendances s'élèvent à quelques mètres du logis. Les communs adoptent un plan en U ; le second-oeuvre est en briques.","habitants":"les frères Oger de Nantes\r\n        \"","divers":"Château de Vengeau à Pouancé","gps":"","images":["../../jctruffet.com/image/image_49/49_Vengeau_1.jpg","../../jctruffet.com/image/image_49/49_Vengeau_2.jpg","../../jctruffet.com/image/image_49/49_Vengeau_3.jpg","../../jctruffet.com/image/image_49/49_Vengeau_4.jpg","../../jctruffet.com/image/image_49/49_Vengeau_5.jpg","../../jctruffet.com/image/image_49/49_Vengeau_6.jpg"]},"Consult_chateau_formulaireec1d":{"id":"Consult_chateau_formulaireec1d","dept":"49","canton":"Doué-la-Fontaine","commune":"Verchers-sur-Layon","nom":"Verchers_Baugé","type":"Château","periode":"XV-XVI","histoire":"Cinq châteaux à Verchers sur Layon celui de Bauge, de Bellevue d'Echuilly (voir article) de Varenne de Bussy-Fontaine                                                                              BAUGE, château dont subsiste une tour et les vestiges d'une enceinte du XIVe ou XVe siècle ; Jean d'Oiron y fit élever une chapelle de Bonnes Nouvelles en 1483, détruite à une date inconnue ; le château a été reconstruit dans la deuxième moitié du XIXe siècle, il se compose d'un étage carré et d'un étage de comble, gros-oeuvre en calcaire; pierre de taille; moellon; appareil mixte; enduit partiel. Toit à longs pans, toit en pavillon; terrasse, toit conique et toit polygonal, couverts d'ardoise.                                                                           \r\nBELLEVUE, est connue depuis le début du XVIe siècle. René de Strossy en est seigneur en 1604, Jacques Jarret en 1631. Elle reste dans cette dernière famille jusqu'en 1810 et passe aux de Laistre. En 1827, Louis-Henry Isle de Beaucheine (1777-1870) et son épouse Marie-Pauline Aubert de Boumois - l'une des héritières du château de Boumois, près de Saumur -, achètent le domaine. En 1899, leur petite-fille, Camille Isle de Beaucheine (1870-1958), apporte Bellevue à son époux le vicomte Hervé de Maupeou d'Ableiges. Leur fils, Jean de Maupeou d'Ableiges (1904-1984) sera durant vingt six ans maire des Verchers qui lui dédiera une place de la commune.\r\nLe château, ses communs et ses dépendances datent des XVI-XIXe siècles. Les terres d'exploitation sont réparties sur l'ancienne seigneurie mitoyenne d'Auvers.","architecture":"BELLEVUE, château dont les communs conservent les vestiges d'un escalier du XVIe ou XVIIe siècle ; au XVIIIe siècle reprise des communs. Reconstruction du corps de logis principal en fond de la cour, limite du XVIIIe siècle au XIXe siècle. Edifice composé d'un étage carré et étage de comble, gros-oeuvre: calcaire; moellon et enduit partiel, élévation à travées surmontée d'un toit à longs pans ; pignon couvert et toit en croupe, couverts d'ardoise.                                                                       BUSSY-FONTAINE, château du XVe ou XVIe siècle à cour triangulaire entourée de douves. Une enceinte a été construite vers l'est à la limite du XVIe et du XVIIe siècle, dont il subsiste deux tours. Au deuxième quart du XVIIIe siècle construction d'une aile en retour d'équerre vers ouest et construction de communs suivant le tracé de l'enceinte à la limite du XVIe, XVIIe siècle. Dans la deuxième moitié du XIXe siècle, crénelage d'une tour, transformation d'un bâtiment en orangerie et voûte en pierre de la chapelle. Implanté sur une plate-forme, qui est aussi une île, et se caractérise précisément par l'omniprésence de l'eau.                                                                                                                      VARENNE, une cheminée et une porte surmontée d'armoiries illisibles du XVe ou XVIe siècle ; vestiges du château, visibles dans les dépendances d'une maison de maître, construite à son emplacement dans la première moitié du XVIIIe siècle ; l'intérieur a été repris au milieu du XIXe siècle ; la partie sud, rehaussée d'un étage, à la limite du XIXe et XXe siècle.","habitants":"Bellevue; Famille de René de Strossy                                         Famille de Jean d'Oiron\r\n        \"","divers":"à Verchers sur Layon celui de Bauge, de Bellevue d'Echuilly (voir article) de Varenne de Bussy-Fontaine grav-6-7","gps":"","images":["../../jctruffet.com/image/image_49/49_Verchers_Baug%c3%a9_1.jpg","../../jctruffet.com/image/image_49/49_Verchers_Baug%c3%a9_2.jpg","../../jctruffet.com/image/image_49/49_Verchers_Baug%c3%a9_3.jpg","../../jctruffet.com/image/image_49/49_Verchers_Baug%c3%a9_4.jpg","../../jctruffet.com/image/image_49/49_Verchers_Baug%c3%a9_5.jpg","../../jctruffet.com/image/image_49/49_Verchers_Baug%c3%a9_6.jpg","../../jctruffet.com/image/image_49/49_Verchers_Baug%c3%a9_7.jpg"]},"Consult_chateau_formulaire1263":{"id":"Consult_chateau_formulaire1263","dept":"49","canton":"Longué-Jumelles","commune":"Vernantes","nom":"Vernantes","type":"Château","periode":"XVII-XVIII","histoire":"a 8 km à l'ouest le château d'Etiau à st-Philibert du peuple              JALESNES, le château actuel date du début du XVIIe siècle. Le dernier marquis de Jalesne est mort en 1642. Sa femme Éléonore de Maillé-Brézé est décédée en 1659, le château revient aux deux filles de Charles et Éléonore et par alliance à la famille de Maillé de la Tour-Landry. À la Révolution, Charles Henri François de la Tour Landry, se faisant appeler Maillé marchand de bois, achète des biens nationaux dont la riche abbaye de Louroux le 10 mars 1791 pour la somme de 60 000 livres. En 1792, les scellés sont posés sur le château. En décembre 1793, c'est le pillage. Au XIXe siècle, le château se transforme et s'agrandit, précédée d'une magnifique avenue de hauts et vieux arbres, avec vaste parc enclos, la demeure actuelle quoique très remaniée et accrue de constructions neuves en 1862, a conservé son aspect seigneurial par son ensemble grandiose, ses profondes douves. Un riche marchand de Saumur M. Ackerman rachète la propriété en 1886 et restaure le château. Après sa mort en 1914 ses filles héritent et cèdent le château à une uvre d'éducation. En 1916 les Oblates de l'Assomption s'établissent en Anjou et transforment le château en institution Saint-Louis.","architecture":"ETIAU, aile Est des communs datant de la première moitié du XVIIe siècle ; le logis, les remises, la partie nord des ailes Est et ouest des communs et le pavillon nord datent du XVIIIe siècle, parties nord du château et parties agricoles de la première moitié du XIXe siècle ,  moulin à eau en partie détruit et reconstruit au XIXe siècle. L'édifice se compose d'un étage carré ,  étage de comble, le gros oeuvre en calcaire; grès; moellon; enduit; tufeau; pierre de taille; appareil mixte; bossage, élévation à travées surmontée d'un toit à longs pans brisés.                                                                  JALESNES, en 1940 l'édifice abrite le PC du général Feldt, commandant de la 1ère division allemande de cavalerie. En 1965 le docteur Frétigny ouvre une pouponnière pour enfants encéphalopathes, centre qui se développe pour accueillir les enfants, puis les adultes handicapés.\r\nMotte dite Motte Hutault, située au sud du château, du XIe siècle détruite. Partie gauche du corps central du château datant du XVIe siècle. Le reste du corps central et pavillon d'angle nord, écuries et pavillon des communs du XVIIe siècle. Logement de gardien au sud du parc, ailes sud et ouest des communs datant du XVIIIe siècle. Pavillon sud-est portant la date 1744. Logis du château très restauré en 1886. Orangerie, tour dans le parc datant du XIXe, cellier troglodytique.","habitants":"Jalesnes,famille de Maillé de la Tour-Landry.                                      Etiau; seigneur local\r\n        \"","divers":"A Vernantes ; Jalesnes grav 1-2-3-4   Etiau grav 5-6","gps":"","images":["../../jctruffet.com/image/image_49/49_Vernantes_1.jpg","../../jctruffet.com/image/image_49/49_Vernantes_2.jpg","../../jctruffet.com/image/image_49/49_Vernantes_3.jpg","../../jctruffet.com/image/image_49/49_Vernantes_4.jpg","../../jctruffet.com/image/image_49/49_Vernantes_5.jpg","../../jctruffet.com/image/image_49/49_Vernantes_6.jpg"]},"Consult_chateau_formulaire8e50-2":{"id":"Consult_chateau_formulaire8e50-2","dept":"49","canton":"Tiercé","commune":"Champteusse sur Baconne","nom":"Vernay","type":"Château","periode":"XV-XVI","histoire":"VERNAY, autour d'un château du XVe siècle s'étend un parc paysager bordé par la Baconne faisant alterner pelouses et bouquets d'arbres. La levée d'un vaste étang, partiellement remis en eau, conduit à l'ancienne motte féodale. Verney est un ancien fief et seigneurie ayant appartenu jusqu'au XVe siècle à une famille du nom, dont Mathurin fut en 1312 le Sénéchal d'Amaury de Craon. Il est ensuite passé par mariage à la famille de Montalais et servit de refuge en ces temps de guerre civile aux habitants et au clergé du pays en 1593.","architecture":"VERNAY, l'édifice actuel date des XVe et XVIe siècles et constitue un intéressant témoignage des restaurations dirigées par René Hodé en Anjou dans la deuxième moitié du XIXe siècle, devient alors une demeure destinée à l'agrément de la chasse, dotée du confort moderne et de dépendances. Les aménagements successifs du château, qui conserve des éléments du XVe siècle (tour, voûtes du pavillon sud-ouest, charpente, cheminées), attestent d'une continuité historique. La présence de la Baconne et d'un étang justifie la chaussée, datant du XVIIe siècle, avec ses murs de soutènement et son arche double. Elle est renforcée par une levée de terre se prolongeant au nord jusqu'à la motte. Les dépendances des XVIIe-XVIIIe siècles, avec quelques percements du XIXe siècle, présentent une belle ordonnance et une architecture soignée.","habitants":"Famille de Vernay\r\n        \r\n        \r\n        \"","divers":"A Champteusse sur Baconne le château de Vernay","gps":"","images":["../../jctruffet.com/image/image_49/49_Vernay_1.jpg","../../jctruffet.com/image/image_49/49_Vernay_2.jpg","../../jctruffet.com/image/image_49/49_Vernay_3.jpg","../../jctruffet.com/image/image_49/49_Vernay_4.jpg"]},"Consult_chateau_formulaireb28f":{"id":"Consult_chateau_formulaireb28f","dept":"49","canton":"Baugé en Anjou","commune":"Vieil_Baugé_Bocé","nom":"Vieil_Baugé_Bocé","type":"Château","periode":"XV-XVI","histoire":"Trois châteaux à Vieil-Bauge et Cuon celui de Landifer et a 5 km au sud Chartréne.                                                                                              CHARTRENE, édifice sur plan en équerre, flanqué vers l'ouest de deux tours cylindriques, datant du XVe siècle; façade sud, escalier remaniés au XVIIe siècle; aile sud ouest datant du XVIIIe siècle. La demeure se compose d'un étage carré et d'un étage de comble, le gros-oeuvre en tufeau; pierre de taille; moellon et appareil mixte, élévation à travées surmontée d'un toit à longs pans ; toit conique ; appentis; pignon couvert ; pignon découvert et croupe, couverts d'ardoises.","architecture":"COUTROLLE, château des XVIe, XVIIIe siècles et première moitié du XIXe siècle ; la chapelle Notre Dame de Pitié fondée en 1437, daté par source; elle a été reprise au XVIe siècle; ferme attenante du XVIIIe siècle et première moitié du XIXe siècle. Edifice composé d'un étage carré et étage de comble, gros-oeuvre en calcaire; moellon; appareil mixte; grès et enduit. Elévation à travées surmontée de toit à longs pans; croupe ; noue ; toit en pavillon ; toit conique et toit polygonal, couverts de tuiles creuses, tuiles plates et d'ardoise.                                                                                            LANDIFER, de la première moitié du XVIe siècle. Dédoublé en 1895, la partie moderne étant symétrique de la partie ancienne. Il est flanqué de quatre tours rondes sur une double façade. En 1895, le château est agrandi par un deuxième corps de logis identique, ainsi que deux tours d'angle à toit cônique. En prévision de la seconde guerre mondiale, une banque française transforme ce château en forteresse afin d'y entreposer des documents. Portail bâti en 1895 situé sur la commune de Bocé, cette belle demeure de la Renaissance  à été transformé à la fin du XIXe siècle et acheté en en 1938 par la banque de Paris et des Pays-Bas, son seul propriétaire qui y a installés un dépot de titres.","habitants":"Seigneurs locaux\r\n        \"","divers":"à Vieil-Bauge et Cuon celui de Landifer grav-2-3-4-5 et a 5 km au sud Chartréne grav 1. Chartrène  47°29'28,26\" Nord et 0°07'33,12\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Vieil_Baug%c3%a9_Boc%c3%a9_1.jpg","../../jctruffet.com/image/image_49/49_Vieil_Baug%c3%a9_Boc%c3%a9_2.jpg","../../jctruffet.com/image/image_49/49_Vieil_Baug%c3%a9_Boc%c3%a9_3.jpg","../../jctruffet.com/image/image_49/49_Vieil_Baug%c3%a9_Boc%c3%a9_4.jpg","../../jctruffet.com/image/image_49/49_Vieil_Baug%c3%a9_Boc%c3%a9_5.jpg"]},"Consult_chateau_formulaire4a17":{"id":"Consult_chateau_formulaire4a17","dept":"49","canton":"Baugé en Anjou","commune":"Vieil-Baugé","nom":"Vieil_Baugé_Cuon","type":"Château","periode":"XV-XVI-XIX","histoire":"GRAFFINIERE, les seigneurs de la paroisse le seront jusqu'au XVIIe siècle, époque où elle est réunie à La Graffinière. Sous l'Ancien Régime, la commune dépend de la sénéchaussée angevine de Baugé. Édifice et douves datant du XVe siècle ;  communs datant du XVIIIe siècle ; le château a été agrandi et remanié durant le deuxième ou troisième quart du XIXe siècle. L'édifice est composé d'un étage carré et un étage de comble, le gros oeuvre est réalisé en calcaire; grès; moellon; enduit; tufeau ; pierre de taille et appareil mixte, élévations à travées surmontées de toit à longs pans ; toit polygonal en croupe.  sci de M. Maxim Studennikov, ancienne  terre  seigneuriale  avec  son  château,  le  second  corps,  vers  lest,  date  du  XVIe  siècle  et  se termine par une tour carrée.                                                                            MONTIVERT, ce château de style néo-gothique est construit en 1895 par l'architecte parisien Laffilée pour Charles Renouf du Breil, avocat à Angers. Les sculptures sur pierre ont été exécutées par Hippolyte Oger, et les sculptures sur bois par André, les vitraux sont signés Delon Paris en 1895 et 1901. Dans le parc de la même propriété, vestiges de l'ancien manoir, deuxième moitié du XVIe siècle, détruit en 1895, il en subsiste une tour, le corps central et la tour sud furent détruits en 1895 lors de la construction du château. Le château de Montivert s'inspire des demeures angevine de l'époque du roi René.","architecture":"MONTIVERT, date du 4ème quart du XIXe siècle. C'est un château de la fin de la période néo-gothique, édifié entre 1893 et 1895, inspiré des demeures angevines de l'époque du roi René. Le  château de Montivert se trouve sur le territoire de l'ancienne commune du Vieil-Baugé, à environ 4,2 km au Sud-Ouest du bourg de Baugé, est classé aux M.H. depuis le 8/03/1994, il est  privé, fermé au Public. Il existe 4 châteaux et plusieurs manoirs à découvrir sur la commune : le château de Montivert, le château Coutrolle, des XVIe XVIIIe et XIXe siècles,de Parpacé près de Bocé, des XVIe et XIXe siècles, le château le Perray, du XIXe siècle ; Plusieurs manoirs, des XVe XVIe XVIIe XVIIIe et XIXe siècles, dont le Manoir de Clairefontaine. Pas d'information pour ces derniers.","habitants":"Graffinière; M. Maxim Studennikov                                  Montivert; famille de Charles Renouf du Breil,\r\n        \r\n        \r\n        \"","divers":"Graffinnière grav-1-2-3     Montivert  47° 31' 27\" nord, 0° 09' 06\" ouest  grav-4-5-6-7-8   Vieil-Baugé  47° 31' 26,51\" Nord et 0° 9' 5,76\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Vieil_Baug%c3%a9_Cuon_1.jpg","../../jctruffet.com/image/image_49/49_Vieil_Baug%c3%a9_Cuon_2.jpg","../../jctruffet.com/image/image_49/49_Vieil_Baug%c3%a9_Cuon_3.jpg","../../jctruffet.com/image/image_49/49_Vieil_Baug%c3%a9_Cuon_4.jpg","../../jctruffet.com/image/image_49/49_Vieil_Baug%c3%a9_Cuon_5.jpg","../../jctruffet.com/image/image_49/49_Vieil_Baug%c3%a9_Cuon_6.jpg"]},"Consult_chateau_formulairea395":{"id":"Consult_chateau_formulairea395","dept":"49","canton":"Longué-Jumelles","commune":"Vernoil-le-Fournier","nom":"Ville_Au_Fourrier","type":"Château","periode":"XV-XVIII-XIX","histoire":"Château de la Ville-au-Fourrier, des XVe au XIXe siècle, avec communs, moulin et écurie (inscrits MH) ;\r\nChâteau de la Roche des XVe et XVIIIe siècles ;  VILLE-AU-FOURRIER a toujours appartenu aux de Broc, Jean de Broc, Echanson de Louis XI en 1478, son petit-fils eu le privilège de recevoir le roi Charles IX et la reine  Marie de Médicis.","architecture":"VILLE au FOURRIER. le château de la Ville au Fourrier est mentionné dès le XIIIe siècle, deux corps de bâtiments, trois tours d'angle rondes à mâchicoulis en poivrières avec lanternon, se prolongeaient  formant une cour carrée et le gros-oeuvre de l'aile sud datant du XVe siècle ainsi que les échauguettes sur cour datent de la première moitié du XVIIe siècle ; les combles, les lucarnes sur cour, se composent tantôt de croisées  de pierre, tantôt de baies jumelées en plein cintre, les unes et les autres surmontées de frontons plein ou de frontons ornés de pilastres l'aile sud ont été remaniés au XVIIIe siècle,  les façades sur cour ont été remaniées en 1837 , celles sur le parc, les écuries et la remise datent du quatrième quart du XIXe siècle. Les intérieurs reçurent des aménagements au XVIIIe siècle. Au XIXe siècle, deux campagnes modifient l'aspect extérieur et une partie de l'intérieur. Le château de la Ville au Fourrier construit en 1265 par le chevalier Geoffroy le Fourrier qui ajouta son nom à la commune.\r\nROCHE du XVe siècle, le logis de Poligny, maison seigneuriale avec une chapelle du XV siècle. Au XVIe siècle, un grand bâtiment en équerre englobe un premier édifice médiéval, auquel s'ajoute une galerie doublant l'aile ouest au XVIIe siècle. Les intérieurs reçurent des aménagements au  XVIIIe siècle. Au  XIXe siècle, deux campagnes modifient l'aspect extérieur et une partie de l'intérieur.","habitants":"Fourrier, famillle de Jean de Broc,\r\n        \r\n        \"","divers":"A Vernoil-le-Fournier le château de la Ville au Fourrier grav-1-2-3  et de Vernoil    grav-4       47° 23' 11\" nord, 0° 04' 44\" est             Ville    47° 24' 15\" nord, 0° 04' 49\" est","gps":"","images":["../../jctruffet.com/image/image_49/49_Ville_au_Fourrier_1.jpg","../../jctruffet.com/image/image_49/49_Ville_au_Fourrier_2.jpg","../../jctruffet.com/image/image_49/49_Ville_au_Fourrier_3.jpg","../../jctruffet.com/image/image_49/49_Ville_au_Fourrier_4.jpg"]},"Consult_chateau_formulaire4ae9-2":{"id":"Consult_chateau_formulaire4ae9-2","dept":"49","canton":"Chalonnes sur loire","commune":"La Pouëze","nom":"Villenière","type":"Château","periode":"XVII","histoire":"VILLENIERE, la mention historique la plus ancienne daterait de 1123, époque à laquelle une charte du roi Louis VI confirme la propriété de la Villenière à l'église de Nantes. Au XVIIe siècle, la Villenière forme un fief et seigneurie avec manoir noble. A partir de 1736, le château appartient à la famille Talour. En 1810, cette famille vend la propriété au vicomte Amys du Ponceau, maire de la Pouëze de 1815 à 1830, qui fait reconstruire le château vers 1830. Le parc aurait été dessiné par le comte de Choulot. En 1872, il passe aux la Rochebrochard, puis au début du XXe siècle, il appartient à la commission des Ardoisières qui le vend en 1979 à la commune de La Pouëze. La ferme de la Villenière a été construite à la fin du XIXe siècle.","architecture":"VILLENIERE, le château est composé d'un corps central de 9 travées et doté d'un étage carré et d'un étage d'attique. Les trois travées centrales sont parées de tuffeau et surmontées d'un fronton triangulaire orné des armes d'Amys du Ponceau et de son épouse accompagnées d'un chien et d'un lion. Ce vaste corps central couvert d'un toit à croupes est encadré par deux pavillons d'angle et de deux ailes en retour d'équerre. Dans le prolongement de celles-ci se trouvent deux communs. Le château est situé dans un vaste parc auquel on accède par une porte flanquée d'une conciergerie et par une allée. La conciergerie de plan carré est dotée d'encadrements de baies en brique et tuffeau avec un décor soigné (buste d'homme dans un médaillon ornant la baie de la façade ouest). Un autre logement doté d'encadrements de baies en brique et tuffeau se situe au sud du château. A remarquer la présence d'une pièce d'eau formant un rectangle à proximité de la porte d'entrée et de la conciergerie, déjà présente sur le cadastre ancien. Château et communs ont été transformés en logements sociaux. La ferme de Villenière dépendant du château se trouve à l'est,  elle présente un plan régulier avec autour d'une cour, le logis et deux bâtiments de dépendance dotés d'encadrements de baies en tuffeau.","habitants":"famille Talour\r\n        \"","divers":"A La Pouëze  le château de Villenière","gps":"","images":["../../jctruffet.com/image/image_49/49_Villeni%c3%a8re_1.jpg","../../jctruffet.com/image/image_49/49_Villeni%c3%a8re_2.jpg","../../jctruffet.com/image/image_49/49_Villeni%c3%a8re_3.jpg"]},"Consult_chateau_formulaire30dc-2":{"id":"Consult_chateau_formulaire30dc-2","dept":"49","canton":"Angers","commune":"Villevêque","nom":"Villevêque","type":"Château","periode":"XV-XVI","histoire":"VILLEVEQUE, au XIIe siècle, les évêques dAngers ont plusieurs demeures aux alentours de la ville. La forteresse de Villevêque, qui surplombe le Loir, est lune delles. Assiégée pendant la Guerre de Cent ans, elle est reconstruite deux fois. Il ne reste aujourdhui du château quune partie des douves. Au milieu du XVe siècle, le château perd son aspect défensif. Lévêque Jean de Beauvau fait transformer la forteresse en une résidence agréable à vivre, des fenêtres sont percées, des éléments décoratifs sont appliqués à la façade.  En 1374 Hardouin du Breuil restera en fonction jusqu'à son décès, il reviendra en 1428 à l'évêque Jean de Beauveau, puis à Jean de Rely. Vendu à un propriétaire terrien au XVIe siècle, en 1791 vendu comme bien national à Claude-Augustin Fournond  notaire  et à André-Guy Parage maire du Village, à son décès en 1802 le château passe à son fils Pierre Nicolas Parage de l'Epinay prêtre qui décède en 1817, échue à son neveu, le château se dégrade peu à peu jusquaux restaurations réalisées en 1873, acquis par un orfèvre d'Angers et passa à Daniel Duclaux artiste peintre et sy établit et installe sa collection en 1979  jusquà son décès en 1999. les Duclaux acquièrent le châteaux qui le lègue en 2002 à la ville d'Angers.","architecture":"VILLEVEQUE, construit au XIe siècle pour défendre  la base  Vallée de Loir, au XIIe siècle  une double enceinte est construite et des large douves devenu place forte. De plan en équerre à deux niveaux, la façade s'encadre d'une tour pentagonale abritant un escalier à vis à son angle  sud et un pavillon plus tardif à son angle nord. Eclairé par des fenêtres à meneaux, elle présente un comble agrémenté de grandes lucarnes ajourées, une porte romane murée , ainsi que des départs d'arcs boutants. La façade opposée orientée vers le parc que prolongent en contrebas des jardins à la française, comporte à son centre une porte surmontée d'une accolade à trois fleurons, les lucarnes sont ornées de blason de Jean de Beauvau auquel on doit l'ordonnancement de l'édifice. Une grosse tour ronde à l'angle nord-ouest, et l'échauguette qui marque l'angle sud sont d'époque plus tardive que la construction.","habitants":"Famille d'Hardouin du Breuil\r\n        \"","divers":"A Villevêque château","gps":"","images":["../../jctruffet.com/image/image_49/49_Villeveque_1.jpg","../../jctruffet.com/image/image_49/49_Villeveque_2.jpg","../../jctruffet.com/image/image_49/49_Villeveque_3.jpg","../../jctruffet.com/image/image_49/49_Villeveque_4.jpg"]},"Consult_chateau_formulairecd66":{"id":"Consult_chateau_formulairecd66","dept":"49","canton":"Tiercé","commune":"Grez-Neuville","nom":"Violette","type":"Château","periode":"XVI-XVII","histoire":"VIOLETTE, la Violette est attestée dès 1111 dans le cartulaire de Saint-Serge d'Angers. Au XVIe siècle c'est un fief dont le seigneur est René Valleaux. En 1720, la terre appartient à Anselme Bucher de Chauvigné. Au début du XXe siècle, le château est acquis par la famille de Broglie. C'est une construction du XVIIe siècle fortement remaniée dans la deuxième moitié du XIXe siècle: l'aménagement de la terrasse, la modification des lucarnes et l'ajout de la tour d'escalier sur la façade arrière datent de cette époque. Les dépendances qui accompagnaient le château sont détruits et d'autres sont reconstruits à l'écart. La conciergerie est élevée vers 1926. De nombreuses fermes des environs dépendaient du château : la Bouchardière, la Hamonière, la Nouillère et la Thuellière.","architecture":"VIOLETTE, on accède au château à l'ouest par un chemin dont l'accès est gardé par la conciergerie. L'édifice est orienté au nord, sis sur une terrasse bordée d'une balustrade à laquelle on accède par quelques marches. La façade principale s'organise selon cinq travées avec un étage carré et un étage de comble. La travée centrale se distingue par l'encadrement de la porte à arc cintré et la lucarne-fronton, celle-ci de forme triangulaire émerge du fronton cintré brisé. La travée principale est soulignée par deux jambes harpées de pierre de taille de tuffeau ainsi que Les baies, elles sont aussi utilisées pour le chaînage d'angle. Horizontalement le premier étage est souligné par une plate bande et surmonté d'une corniche en tuffeau. La façade postérieure s'organise en trois parties : deux pavillons en léger ressaut encadrent la partie centrale dotée d'un pavillon ovale abrite l'escalier. Le pavillon d'escalier est ouvert sur le jardin par une baie surmontée d'un fronton triangulaire. Les flancs du pavillon d'escalier sont surmontés de deux lucarnes en oeil-de-boeuf. La distribution intérieure est celle du château du XVIIe siècle avec le vestibule d'entrée, et le couloir desservant à l'ouest, deux salons et à l'est la salle à manger et la cuisine. A proximité du château se trouve un jardin potager clos de mur. Un étang se trouve aussi sur la propriété non loin du tracé de l'ancienne ligne de chemin de fer.","habitants":"Famille de Anselme Bucher de Chauvigné\r\n        \"","divers":"A Grez-Neuville; le port,47° 36' 07\" Nord et 0° 40' 59\" Ouest                                  Violette : 47° 36' 07\" Nord et 0° 40' 59\" Ouest Grav-1","gps":"","images":["../../jctruffet.com/image/image_49/49_Violette_1.jpg"]},"Consult_chateau_formulaire4fcc-2":{"id":"Consult_chateau_formulaire4fcc-2","dept":"49","canton":"Tiercé","commune":"Cheffes","nom":"Vivier_Cheffes","type":"Château","periode":"XVI","histoire":"VIVIER, ancien fief et seigneurie avec manoir noble, relevant de Juvardeil par l'intermédiaire de Fontaine. En est sieur, en 1380, Jean Desmoulins, François de la Jaille en 1533, Pierre Auvé par son épouse Louise Haton en 1535. Un bel écusson à leur armes, remplit le \"D\" initial, orné d'enluminures, qui pare le début de l'aveu en 1538 pour le logis ancien avec quatre autres corps de maison, les grands bois, le pressoir banal: ce P. Auvé fait en 1540 déclaration des Viviers, tenus à quatre fois et hommages, deux à Juvardeil, un à Cheffes et un à Cimbré. Pierre Haton rédige son testament le 21 novembre 1574; Renée de Charnacé, sa veuve, légua la propriété le 22 juillet 1604 aux nièces de son mari, Barbe d'Aulnières, femme de Pierre du Bellay de la Courbe, et Anne d'Aulnières, veuve de Vincent Dupré, en se réservant l'usufruit dont elle jouissait encore en 1617; Renée des Rotours, veuve de René de Montesson en 1627, inhumée dans l'église de Bierné le 20 octobre 1633. Charles de Montesson, chevalier, mari de Marie Prévost de Saint Cyr qui le 11 juin 1644 la vend à messire François Lanier. L'acquisition était faite au profit du chapitre de Saint Martin d'Angers, qui avait cédé en échange à Lanier tout le fief que possédaient les chanoines dans la baronnie de Sainte Gemmes sur Loire, et les honneurs seigneuriaux. Elle fut ratifiée le 14 mars 1646 par le seigneur de Juvardeil.","architecture":"VIVIER, la propriété est vendue nationalement le 13 mai 1791 sur le chapitre de Saint Martin à Marie-Georges-Jean Limier, qui y meurt le 16 pluviose an XII. Sa fille, Geneviève, épouse J-F. Prévost, d'ou Marie Geneviève Prévost épouse de J. Godin, maire de Cheffes sous la monarchie de Juillet. Leur fils, Jules Jean, né en 1825 est propriétaire des Viviers en 1889 puis le domaine se transmet successivement aux familles Godin-Sarret (1903-1938), Girard-Godin en 1949, Girard et Le Bobinec (1965-1970), Tardieu (1981-1995). L'édifice est une grosse maison augmentée fin XIXe siècle d'un pavillon à tourelle.","habitants":"Pierre du Bellay de la Courbe,\r\n        \"","divers":"Vivier 47° 37' 18\" Nord, 0° 30' 23\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Vivier_Cheffes_1.jpg","../../jctruffet.com/image/image_49/49_Vivier_Cheffes_2.jpg","../../jctruffet.com/image/image_49/49_Vivier_Cheffes_3.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','49 — Maine-et-Loire'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)showDet(start);
</script></body></html>
