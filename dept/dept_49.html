une datée de 1701, ont été enlevées et replacées sur la façade d'une maison du bourg de Montguillon. Les bâtiments actuels forment un plan régulier en U avec, au nord, le logement couvert en croupe ; en retour vers le sud, on trouve à l'est, une grange couverte en longs pans avec un pignon en pans de bois ; à l'ouest, une première étable à vaches avec lucarne-pendante ouvrant sur le comble, agrandie vers le sud par un long corps couvert en longs pans. Tous les bâtiments sont construits en moellons de schiste. A l'ouest, il existe encore deux réserves d'eau, l'une de plan carré, alimentées par le ruisseau de Bouillé-Thévalle ; un fossé en eau est en place au sud de la ferme de la Petite-Motte ; deux fossés asséchés (peut-être d'anciennes douves) sont toujours visibles au nord-est et au nord-ouest des bâtiments. Selon un axe nord-est-sud-ouest, le cadastre ancien indique clairement l'ancienne allée qui conduisait à l'édifice seigneurial.","habitants":"Bouillé-Theval,famille de Thévalle et famille de Quatrebarbes\r\n        \"","divers":"A Montguillon le château de Bouillé-Théval et de montviant grav 2","gps":"","images":["../../jctruffet.com/image/image_49/49_Bouill%c3%a9_Th%c3%a9val_1.jpg","../../jctruffet.com/image/image_49/49_Bouill%c3%a9_Th%c3%a9val_2.jpg","../../jctruffet.com/image/image_49/49_Bouill%c3%a9_Th%c3%a9val_3.jpg"]},"Consult_chateau_formulaire7dec":{"id":"Consult_chateau_formulaire7dec","dept":"49","canton":"Longué-Jumelles","commune":"Saint-Martin  la Place","nom":"Boumois","type":"Forteresse","periode":"XVI","histoire":"BOUMOIS, construit à la fin du 1er quart du XVIe siècle pour René de Thory, seigneur de Boumois. Dans un style  féodal à l'extérieur abrite un logis renaissance très raffinée reste malgré tout une demeure de plaisance. Le logis et l'aile sud des communs sont élevés en 1520-1521, comme le laissent penser deux marchés de serrurerie passés en 1521 avec Jean Raciquot. En octobre 1521, René de Thory traite avec Jean Pymotz, maître maçon, à qui l'on peut attribuer sans doute les premiers travaux, lequel s'engage à construire les voûtes de la cuisine et du garde-manger, plus deux escaliers pour descendre de la cuisine à la cave, on été construites entre 1525 et 1530.  De monsieur Grillault Laroche, en 1700 le domaine passa à René Berthelot écuyer, en 1754 racheté par la famille Aubert du Petit-Thouars c'est dans ce château que naquit en 1760 Aristide Dupetit Thouars, mort héroïquement en 1798 au combat d'Aboukir.","architecture":"BOUMOIS, vers 1560-1570, lors des troubles des guerres de religions, la défense du château est renforcée par la création de deux bastions de terre, aux angles est des douves. Son plan carré marqué aux angles de quatre tours avec chemins de rondes  sur mâchicoulis et leur dernier étages sont en retrait. la façade sur cour et sa tour d'escalier accostée d'une tourelle, rappellent l'ordonnance  de celles de Plessis les Tours.  A la limite des XVIe et XVIIe siècles, le portail primitif du mur Est de la cour est remplacé par un portail inspiré d'un modèle de Serlio ; en même temps, deux échauguettes sont construites de part et d'autre du portail.  Les charpentes, toitures et huisseries des parties sud et sud-ouest du logis, ont été refaites après qu'une bombe, tombée en 1944 près du château, les aient soufflées. Les beaux vitraux de la chapelle ont été vendus à la fin du XIXe siècle. aujourd'hui propriété de monsieur Grillault Laroche.","habitants":"Aristide Dupetit Thouars\r\n        \"","divers":"Boumois : 47° 18' 30\" Nord et 0° 07' 48\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Boumois_1.jpg","../../jctruffet.com/image/image_49/49_Boumois_2.jpg","../../jctruffet.com/image/image_49/49_Boumois_3.jpg","../../jctruffet.com/image/image_49/49_Boumois_4.jpg"]},"Consult_chateau_formulairea226":{"id":"Consult_chateau_formulairea226","dept":"49","canton":"Doué la Fontaine","commune":"St-Cyr en Bourg","nom":"Bourchardière","type":"Vestiges","periode":"XIII","histoire":"BOURCHARDIERE, en 1223, le fief existe déjà et son seigneur en est Pierre de Longué. Il donne aux religieux de Louroux une rente dun demi-muid de vin à prendre dans ses pressoirs de la Bouchardière. En 1302, Jehan de Brézé reçoit de son père, par testament, la terre de la Bouchardière. Il y fait vraisemblablement construire le bâtiment actuel. Il reste dans la famille jusqu'en 1609. Trois siècles plus tard, en 1965, le fief existe toujours mais le bâtiment est en ruine. Depuis 1965, les propriétaires étaient  monsieur Héron, en 1973 à  monsieur Dufois et en 1998  achat des ruines par la commune de Saint-Cyr-en-Bourg. L'édifice est inscrit au titre des M.H. le 25 avril 2005.","architecture":"BOURCHARDIERE, les années 2010 sont marquées par la tentative de restitution de la maison forte de la Bouchardière. La façade sud que lon découvre en premier est remarquable, par son architecture soignée agrémentée dun décor sculpté assez abondant. Trois étages sont réparables : Rez de chaussée (communs et salle de stockage) 1er étage : grande salle dapparat. 2e étage : réservé à la vie privée du seigneur. À lorigine, le logis présentait la forme dune tour quadrangulaire denviron 14 m de côté, dotée de contreforts rectangulaires surmontés de tourelles circulaires.","habitants":"Famille de  Jehan de Brézé \r\n        \"","divers":"St-Cyr en Bourg, Bourchardière vestiges 47° 11' 20\" N, 0° 02' 17\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Bourchardi%c3%a8re_1.jpg"]},"Consult_chateau_formulaire1beb":{"id":"Consult_chateau_formulaire1beb","dept":"49","canton":"Segré","commune":"Le Bourg d","nom":"Bourg_Dirée","type":"Château","periode":"XVIII-XIX","histoire":"Deux châteaux dans cette commune dont Maboulière et douve Turpinière.                                                                       DOUVE-TURPINIERE   La construction du château de la Douve appelé le château de la Turpinière date du 1871 à 1974 puis du XIXe au XXe siècle. C'était, au départ, une petite maison seigneuriale, avec sa métairie. René Cormier l'acquiert en 1565. Claude Cormier en devint propriétaire en 1637, puis le domaine de la Douve passa en 1672 en héritage à Françoise Cormier, veuve de Jacques Grandet, lieutenant de la maréchaussée d'Anjou. En 1784, Marie Louis de Goureau de la Blanchardière, propriétaire du domaine, décède,  ira alors à Etiennette Catherine Françoise Goureau. Au XIXe siècle, Ambroise Louis Henri de La Forest d'Armaillé (1820-1892) en deviendra, à son tour, propriétaire,  Il se marie le 8 mai 1866 à Gabrielle de Buisseret-Steebecque de Blarenghien. C'est grâce à ce mariage et à l'argent de sa femme qu'il entreprendra la construction du château de la Douve. Henri d'Armaillé fait appel à l'architecte Auguste Bibard pour la construction  vers 1871-1874. Revendu au XXe siècle à la compagnie des wagons-lits transformé en hôtel par Christian Cjersoe                                                                     MABOULIERE dit aussi Falloux, le comte Alfred de Falloux, personnage politique, candidat légitimiste aux élections de 1842 et 1846, se rallia à la cause républicaine après les évènements de 1848. A cette date, il fut nommé par Louis Napoléon, ministre de l'Instruction publique et des cultes, et s'attacha à mettre en place une loi sur la liberté de l'enseignement, votée en 1850, et connue aujourd'hui encore sous le nom de \"loi Falloux\". A la suite du coup d'état du 2 décembre 1851, le comte de Falloux partagea son temps entre Paris et le Bourg d'Iré.","architecture":"DOUVE-TURPINIERE   Château construit à la fin du 3ème quart du XIXe siècle par l'architecte angevin Bibard. La chapelle est une adjonction des années 1880. Au cours de la deuxième moitié du XXe siècle le château a été transformé en hôtel-restaurant, l'intérieur fut très remanié à cette occasion. Construction ex-nihilo sur une éminence topographique dominant la Verzée. Le château adopte un plan massé quadrangulaire où les pièces de services sont placées en sous-sol. Le corps central, couvert en croupe, est cantonné de quatre pavillons. Les élévations sont rythmées par des avant-corps en ressaut couronnés au niveau du comble par un large fronton cintré  à l'est, et un haut pavillon à l'ouest.                                                                   MABOULIERE; construit au centre d'un vaste domaine agricole. Le corps de logis principal, couvert par un toit en croupe, est flanqué par deux corps transversaux dont les façades nord sont ornées d'échauguettes sur trompes et couvertes de toitures en pavillon. A l'ouest, le corps transversal est prolongé vers le sud par un pavillon lui-même accolé à une chapelle voûtée d'ogives et couverte par un toit polygonal. Une galerie est couverte en terrasse et dessert vers l'est un nouveau pavillon prolongé au sud par une aile à usage d'orangerie. Une partie des communs a été construite un peu à l'écart, au sud-ouest la conciergerie et le moulin à eau ont été construits à l'entrée de la propriété, au nord, dans l'ancien hameau de Saint-Jean.","habitants":"Maboulière; comte de Falloux                                                   Douve; Ambroise Louis Henri de La Forest d'Armaillé\r\n        \"","divers":"Douve turpenière grav-1 47° 40' 47\" Nord 0° 58' 29\" Ouest.  Falloux grav 3. Maboulière grav 2","gps":"","images":["../../jctruffet.com/image/image_49/49_Bourg_Dir%c3%a9e_1.jpg","../../jctruffet.com/image/image_49/49_Bourg_Dir%c3%a9e_2.jpg","../../jctruffet.com/image/image_49/49_Bourg_Dir%c3%a9e_3.jpg"]},"Consult_chateau_formulaired32c":{"id":"Consult_chateau_formulaired32c","dept":"49","canton":"Segré","commune":"Freigné","nom":"Bourmont","type":"Forteresse","periode":"XV-XIX","histoire":"BOURMONT, la seigneurie de Bourmont semble s'être constituée assez tardivement, au XIVe siècle, remplaçant la seigneurie primitive de Freigné. Du château construit au XVe siècle, ne subsistent que le terre plein entouré de douves autrefois en eau, la tour de l'angle nord-est et les bases des tours sud-ouest et sud-est, remaniées au XIXe siècle. Le parc d'une surface de 99 hectares, a été enclos de murs de 1788 à 1791. Les deux bâtiments des communs, les portails Sud et Est, le portail du jardin potager et l'orangerie sont du XVIIIe siècle. Le châtelet, qui comprend la chapelle seigneuriale Saint-Christophe a été reconstruite en 1882. Le logis a été reconstruit de 1892 à 1894 par l'architecte Le Diberder, de Nantes.","architecture":"BOURMONT, la métairie du domaine, qui s'élève dans la basse cour, à l'est du château, conserve deux tours, probablement du XVe siècle. Les parties agricoles et les dépendances, comprenant un séchoir à linge, une porcherie et un château d'eau furent construites au XIXe siècle. Établi au fond d'une vallée parcourue par le ruisseau de Venoux, Bourmont est un château aquatique. Tout l'oeuvre est réalisé en moellon de schiste. Les encadrements des baies du château et des communs ainsi que les travées centrales de ces derniers, sont en tufeau de taille. Les baies des parties agricoles et des bâtiments de la métairie du domaine sont en briques.","habitants":"Seigneur de Bourmont\r\n        \"","divers":"Bourmont : 47°32'41,41\" Nord et 1°06'03,39\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Bourmont_1.jpg","../../jctruffet.com/image/image_49/49_Bourmont_2.jpg","../../jctruffet.com/image/image_49/49_Bourmont_3.jpg","../../jctruffet.com/image/image_49/49_Bourmont_4.jpg","../../jctruffet.com/image/image_49/49_Bourmont_5.jpg","../../jctruffet.com/image/image_49/49_Bourmont_6.jpg"]},"Consult_chateau_formulairecb14":{"id":"Consult_chateau_formulairecb14","dept":"49","canton":"La Pommeraye","commune":"Bouzillé","nom":"Bouzillé","type":"Château","periode":"XIV-XVII","histoire":"Deux châteaux à Bouzillé celui de Bourgonnière et celui de Mauvoisinière.                                                                      BOURGONNIERE;  il est remarquable par son donjon, son perron du XVIe siècle, les restes du château Renaissance, détruit à la Révolution et, d'un château de style Néoclassique du début du XIXe siècle. Dans le bois, se trouve une chapelle du XVIIe siècle, dite \"à Madame\", qui semble avoir été un lieu de culte protestant, ainsi qu'une chapelle dédiée à Saint Joseph, non loin du portail d'entrée. Le domaine fut racheté, en 1824, par Jean Louis Bertrand de Saint-Pern, issu de la noblesse bretonne, à M. de Grimaudet. Il est toujours la propriété de cette famille.  La Bourgonnière est classé aux M.H. en 1924, inscrit en 1963.                                                                           MAUVOISINIERE, le château a été construit dans les années 1660, le seul épargné dans les Mauges lors des guerres révolutionnaires.","architecture":"BOURGONNIERE,  l'architecte était François-Léonard Seheult. C'est un château fort de style Empire.  Le domaine est composé d'un ensemble fortifié des XIVe et XVe siècles, vestiges d'un logis du XVIe siècle chapelle du XVIe siècle), l'édifice néo-classique édifié entre 1810 et 1820 se greffe sur les vestiges du logis du XVIe siècle. Ont été identifiés les tracés et vestiges d'un système de douves ou canaux régulés à partir d'une retenue artificielle qui semble médiévale. C'est un château néoclassique du début du XIXe siècle, qui conserve un perron du XVIe siècle, reste de l'ancien château brulé durant les guerres de Vendée. Dans le bois, se trouve également une chapelle du XVIIe siècle, dite « à Madame », qui semble avoir été un lieu de culte protestant, ainsi qu'une chapelle du XIXe siècle dédiée à Saint Joseph, non loin du portail d'entrée.                                       MAUVOISINIERE, le château a été construit dans les années 1660, L'ensemble comprend des jardins à la française clos de douves, des communs (des XVIIe et XVIIIe siècles), deux pavillons de cour et un réseau de douves. Des aménagements ont été effectués au XIXe siècle, dont la maison de l'intendant et la chapelle Sainte Sophie, dite \"enfeu des Gibot\" en 1846.","habitants":"Bourgonnière; Jean Louis Bertrand de Saint-Pern\r\n        \"","divers":"Bourgonnière  grav de 1 à 6.    47° 20' 53,31\" Nord et 1° 05' 21,06\" Ouest  Mauvoisinière 47° 19' 53 N, 1° 05' 54\" O grav -7-8","gps":"","images":["../../jctruffet.com/image/image_49/49_Bouzill%c3%a9_1.jpg","../../jctruffet.com/image/image_49/49_Bouzill%c3%a9_2.jpg","../../jctruffet.com/image/image_49/49_Bouzill%c3%a9_3.jpg","../../jctruffet.com/image/image_49/49_Bouzill%c3%a9_4.jpg","../../jctruffet.com/image/image_49/49_Bouzill%c3%a9_5.jpg","../../jctruffet.com/image/image_49/49_Bouzill%c3%a9_6.jpg","../../jctruffet.com/image/image_49/49_Bouzill%c3%a9_7.jpg","../../jctruffet.com/image/image_49/49_Bouzill%c3%a9_8.jpg"]},"Consult_chateau_formulairef4d2":{"id":"Consult_chateau_formulairef4d2","dept":"49","canton":"Tiercé","commune":"Brain-sur-Longuenée,","nom":"Brain_Longuenée","type":"Château","periode":"XVI","histoire":"Deux châteaux à Brain-Longuénée celui de la Maison Blanche et de Montergon.                                                           MAISON-BLANCHE, a été construit à la demande de  Eugène Richou, par l'architecte angevin Auguste Bibard   le 8 mai 1862-1864 Des vestiges de l'ancien château sont conservés, ils dateraient du XVIe siècle : deux pavillons dont l'un abrite un pigeonnier, un corps de bâtiment,  l'aile en retour a été détruite au cours du XIXe siècle, les Levoyer anciens propriétaires connus. A partir de 1766, la demeure est habitée par Mme Vernault. Après la Révolution c'est son petit-fils, Gaspard Guillot qui réside au château. Ruiné, il vend la propriété à René et Anne Richou. C'est leur fils Eugène qui fait construire le nouveau château. Un bâtiment construit par Gaspard Guillot au début du XIXe siècle était situé au-delà de la route près du ruisseau et de la ferme de la Maison Blanche.                                                                     MONTERGON, il appartient à la famille de Mergot. En effet, en 1872 un nouveau château est construit par l'architecte Charles-Paul Roques à proximité et les anciens bâtiments sont alors démolis ou transformés en bâtiments ruraux (vers 1874). Le commanditaire du nouveau château est Adolphe Mauvif de Montergon dont la famille possède Montergon depuis 1731.","architecture":"MAISON-BLANCHE,  l'ensemble clos est accessible par plusieurs portes à des endroits stratégiques du parc . L'édifice présente un plan massé avec une façade principale composée de trois travées et organisée selon un rez-de-chaussée surélevé, un étage carré et un étage de comble. Le tout est couvert de hautes toitures en pavillon ou à longs pans brisés. Les ailes latérales sont en léger ressaut par rapport à la travée centrale desservie par un escalier en fer à cheval et dotée de trois baies. La travée centrale est couronnée par un ensemble de trois lucarnes.                MONTERGON, le château est mentionné dès le XIIe siècle . Du XVe au début du XVIIe siècle,  l'ancien château  se situait à l'emplacement actuel de la ferme du Grand Montergon. Des anciens bâtiments, il ne semble rester que peu de choses. Le logis actuel et la petite étable, avec des encadrements en brique caractéristiques de la deuxième moitié du XIXe siècle, sont construits au même emplacement que des bâtiments. Le château actuel présente un plan massé avec un corps central de trois travées encadré par deux pavillons en ressaut, le pavillon nord-ouest étant plus large. La façade postérieure est dotée d'une tour d'escalier hors-oeuvre ainsi que d'une tourelle en surplomb à l'angle sud du château.","habitants":"Maison Blanche Gaspard Guillot                                   Montgeron famille de Mergot\r\n        \r\n        \"","divers":"Maison-Blanche  47° 35' 08\" Nord, 0° 45' 39\" Ouest           Montergon grav 1-2","gps":"","images":["../../jctruffet.com/image/image_49/49_Brain_Longuen%c3%a9e_1.jpg","../../jctruffet.com/image/image_49/49_Brain_Longuen%c3%a9e_2.jpg","../../jctruffet.com/image/image_49/49_Brain_Longuen%c3%a9e_3.jpg","../../jctruffet.com/image/image_49/49_Brain_Longuen%c3%a9e_4.jpg","../../jctruffet.com/image/image_49/49_Brain_Longuen%c3%a9e_5.jpg"]},"Consult_chateau_formulairee32e":{"id":"Consult_chateau_formulairee32e","dept":"49","canton":"Beaufort en Vallée","commune":"Chigné Geneteil","nom":"Breil_de_Foin","type":"Manoir","periode":"XV","histoire":"BREIL de FOIN, ressemble encore à ce que connaissait il y a 400 ans son propriétaire la famille de Maridort, Olivier de Maridort seigneur de Vaux-Freslon et son épouse Anne de Goyon de Matignon dit la célèbre dame de Montsoreau, épousera Jean de Coesmes baron de Lucé, puis en 1576 Charles de Chambes, comte de Montsoreau lequel moura en 1619,  leur fille  Françoise épouse Charles le Royer  de la Brisolière restera dans la descendance jusqu'en 1716 date de la vente  à Charles Erasmes Testu de Pierre-Basse qui cèdera le domaine en 1730 à Charles Isaac de Boissard de la Rigaudière qui le garderont deux siècles. le château sera occupé au XVIIIe siècle par des régisseurs et par des gardes ne sera habité par ses propriétaires  avant le XXe siècle par les Boissard.","architecture":"BREIL de FOIN, au XIe siècle construction de la première forteresse, au XVe siècle élévation du  corps de logis gothique du vieux château.   Aile nord-ouest avec échauguette et gros-oeuvre de l'aile sud datant du XVe siècle. Pavillon à la façade nord de l'aile nord-ouest datant de la première moitié du XVIe siècle. Aile sud rebâtie dans la première moitié du XVIIe siècle. Lucarnes et baies de l'aile nord ouest et façade de la remise ouest reprises au XVIIe siècle. Petits remaniements au XIXe siècle, l'ancien château. à l'origine une forteresse sur la frontière entre le Maine et l'Anjou, puis un point d'appui anglais pendant la guerre de Cent Ans, conserve des appartements moyenâgeux avec leurs pittoresques latrines.  Le nouveau château, formé de deux corps de logis en équerre conservant du XVe siècle des éléments gothiques, comme les remparts  et les fleurons qui soulignent ses toitures, ses façades sur cour  classique et lucarnes passantes sommées de frontons. Toujours habité, contient un magnifique escalier Henri IV et d'intéressantes collections (manuscrits archéologie, fossiles). Autour du monument, joli parc botanique.","habitants":"Famille de Maridort\r\n        \"","divers":"Brteil de Foin 47° 33' 42,54\" Nord et 0° 04' 52,54\" Est","gps":"","images":["../../jctruffet.com/image/image_49/49_Breil_de_Foin_1.jpg","../../jctruffet.com/image/image_49/49_Breil_de_Foin_2.jpg","../../jctruffet.com/image/image_49/49_Breil_de_Foin_3.jpg","../../jctruffet.com/image/image_49/49_Breil_de_Foin_4.jpg","../../jctruffet.com/image/image_49/49_Breil_de_Foin_5.jpg","../../jctruffet.com/image/image_49/49_Breil_de_Foin_6.jpg","../../jctruffet.com/image/image_49/49_Breil_de_Foin_7.jpg","../../jctruffet.com/image/image_49/49_Breil_de_Foin_8.jpg"]},"Consult_chateau_formulaire68f3":{"id":"Consult_chateau_formulaire68f3","dept":"49","canton":"Angers","commune":"Lambert des Levées","nom":"Briacé_49","type":"Château","periode":"XVIII","histoire":"BRIACE, ce nouveau logis a  été commencé pour Charles-Guillaume Drouin, entre 1777 et 1791, et achevé pour Jeanne de Garisson, il s'agit d'une demeure de plaisance édifiée au XVIIIe siècle, représentative de la distribution adoptée dans ce type de maison à cette époque. A l'intérieur, décors, huisseries et menuiseries sont encore visibles.","architecture":"BRIACE, il est composé de pierres de tufeau, pierres de taille et bossage. C'est un ancien château fort construit au 4e quart du XVIIIe siècle. Les façades et toitures ainsi que la cour d'honneur sont inscrits aux M.H. depuis le 21 mai 1969. La seigneurie de Briacé relevait féodalement du Toureil, située sur la rive gauche de la Loire, et comprenait, dès le XIe siècle, probablement, une maison forte, un manoir, construit sur une motte, appelé encore au XVIe siècle, la Motte de Maulévrier. Ce premier édifice, remanié sans doute au cours des siècles, subsista jusqu'à la fin du XVIIIe siècle, puis fut détruit et remplacé par un château de plaisance comprenant un logis, des communs, une ferme et un parc, vers 1795. La façade sur jardin rappelle celle de l'hôtel de la Besnardière, construit à Angers à la même époque par l'architecte Bernard Bardoul de la Bigottière. Le château de Briacé est inscrit aux M.H. depuis le 21/05/1969.","habitants":"Charles-Guillaume Drouin\r\n        \"","divers":"Briacé 47° 15' 58\" Nord et 0° 03' 23\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Briac%c3%a9_49_1.jpg"]},"Consult_chateau_formulairebf62":{"id":"Consult_chateau_formulairebf62","dept":"49","canton":"Doué la Fontaine","commune":"Brigné sur Layon","nom":"Brigné","type":"Château","periode":"XV-XVII","histoire":"Deux châteaux à Brigné celui de Bois-Airault et celui Maurepart.                                                                                    BOIS -AIRAULT,  colombier datant du XVIIe siècle ; partie nord est du château du Bois-Airault et ailes des parties agricoles au nord-est datant du XVIIIe siècle ; la partie centrale du château et une partie de la ferme datent du deuxième ou troisième quart du XIXe siècle; la partie sud du château, la bergerie, les écuries et l'orangerie ont été construits au quatrième quart du XIXe siècle. Dans le parc on trouve un pressoir à vin, une remise, un cellier, une étable à vaches et une étable à chevaux, une porcherie et une grange.","architecture":"MAUREPART, partie sud du château datant du XVe siècle. Aile des écuries datant de la deuxième moitié du XVIIe siècle et portant un graffiti: \"Jean Pimovée 1774\". La chapelle bénie en 1735 (datation par source) est détruite. L'élévation sur cour du corps de logis central porte la date de 1738. Le pavillon à gauche porte sur son élévation latérale la date de 1834. Une aile Est et une aile Ouest détruites. Communs et ferme à l'ouest construits à la  deuxième moitié du XIXe siècle. Les sources indiquent que la partie du XVe siècle du château a été agrandie et restaurée en 1852 par Ernest Dainville.","habitants":"Maurepart  Ernest Dainville.\r\n        \"","divers":"A Brigné Boisairault grav-1 Maurepart grav-2","gps":"","images":["../../jctruffet.com/image/image_49/49_Brign%c3%a9_1.jpg","../../jctruffet.com/image/image_49/49_Brign%c3%a9_2.jpg"]},"Consult_chateau_formulairec53c":{"id":"Consult_chateau_formulairec53c","dept":"49","canton":"Les Ponts de Cé","commune":"Brissac-Quincé","nom":"Brissac_Quincé","type":"Forteresse","periode":"XV","histoire":"Dans cet article deux châteaux celui de Brissac et de Plessis Blutière.                                                                                    BRISSAC, édifié au XIe siècle par Foulque Néra comte d'Anjou en 1435 Pierre Brézé acquiert le fief et élève un nouveau château en 1455, ce domaine appartient à la même famille depuis le 26 mai 1502, date dachat de la seigneurie de Brissac par un gentilhomme angevin, René de Cossé. 508 ans plus tard, en 2010, ses descendants, le marquis et la marquise habitent toujours la demeure avec leur quatre enfants, en 1768 Jean Paul Timoleon de Cossé  maréchal de France, le château réquisitionné à la Révolution transformé en cantonnement pour les bleus de Vendée. Restitué à la famille de Cossé,  habité aujourd'hui par le treizième duc de Brissac et son épouse.                                                          PLESSIS-BLUTIERE à deux km à l'est, construit au XVIe siècle a su garder toute son élégance angevine à laquelle a été rajoutée une magnifique façade du XVIIIe siècle, agrémentée de quatre exceptionnelles lucarnes baroques, il se dresse au milieu d'un ensemble de corps de bâtiments harmonieux et d'une chapelle baroque. Lucarnes à décors sculptés et stucs. A l'abri de ses jardins Renaissance et à la Française, Transformé en hôtel restaurant par monsieur Cauvier.","architecture":"BRISSAC  Son architecture en fait le château le plus haut de France, il compte sept étages au total, ainsi que deux cents salles, et sa façade traduit les influences baroques de l'époque du XVIII siècle. Les deux tours de la face du levant sont des vestiges de l'ancien \"château fort\" datant du XV siècle ce contraste, de style et dépoque, est tout à fait fortuit, en voici lexplication : pendant les guerres de Religion, les armées catholiques et protestantes se disputèrent le château, qui fut même assiégé un temps par Henri IV. Cette longue période de troubles le laissa endommagé et inhabitable, jusquen 1600 année qui marque le début de la reconstruction. Le premier duc de Brissac confia les travaux à son architecte Jacques Corbineau et ensemble, ils décidèrent délever un vaste château-palais en lieu et place de lancienne forteresse. Les ouvriers se mirent à loeuvre en démolissant lancien bâtiment au fur et à mesure quils construisaient le nouveau. La mort du premier duc, en 1621, a pour conséquence larrêt définitif du chantier qui ne sera jamais achevé par ses successeurs, ainsi les deux tours vouées à la démolition subsistèrent, laile droite ne sera jamais construite, voilà pourquoi la porte dentrée nest pas au centre de la façade. Le grand-père de lactuel propriétaire usait dune formule pour résumer lhistoire de son château, il disait \"Brissac est un château neuf à demi-construit dans un château vieux à demi-détruit\".  La façade de Brissac est de style Louis XIII. Elle fut élevée au début du XVIIe siècle et elle est restée inachevée. Elle est encadrée par deux tours médiévales.","habitants":"Brissac;  famille de Cossé\r\n        \r\n        \"","divers":"Brissac_47°21' 9,7\" Nord et 0° 26' 56,7\" Ouest                      Plessis-Blutière grav 7","gps":"","images":["../../jctruffet.com/image/image_49/49_Brissac_Quinc%c3%a9_1.jpg","../../jctruffet.com/image/image_49/49_Brissac_Quinc%c3%a9_2.jpg","../../jctruffet.com/image/image_49/49_Brissac_Quinc%c3%a9_3.jpg","../../jctruffet.com/image/image_49/49_Brissac_Quinc%c3%a9_4.jpg","../../jctruffet.com/image/image_49/49_Brissac_Quinc%c3%a9_5.jpg","../../jctruffet.com/image/image_49/49_Brissac_Quinc%c3%a9_6.jpg","../../jctruffet.com/image/image_49/49_Brissac_Quinc%c3%a9_7.jpg"]},"Consult_chateau_formulaire7824":{"id":"Consult_chateau_formulaire7824","dept":"49","canton":"Beaufort en Vallée","commune":"Broc","nom":"Broc","type":"Château","periode":"XV-XVII","histoire":"Trois châteaux à Broc dont celui de Godefrairie, des XVIIe, XVIIIe et XIXe siècles. Château de Meaulne, des XVIIe, XVIIIe et XIXe siècles. Château la Touche (vestiges), des XVe, XVIe, XIXe et XXe siècles, les trois sont recensé à l'inventaire général du patrimoine culturel.                                                                GODEFRAIRIE, dépendances et colombier construits au XVIIe ou XVIIIe siècle, très remaniés au XIXe siècle; le logis date de la première moitié du XIXe siècle avec aile à l'est datant de la deuxième moitié du XIXe siècle. L'édifice est composé d'un étage carré et un étage de comble, gros-oeuvre réalisé en tufeau ; grès; silex ; moellon ; appareil mixte et enduit, type de couverture : toit à longs pans brisés ; toit à longs pans ; croupe ; toit conique ; pignon couvert et appentis, couverts d'ardoise et tuiles plates.","architecture":"LIZARDIERE, ensemble des deux logis (articulés autour d'une tour flanquée de sa tour-guette d'escalier) , ainsi que l'ancien parterre clos de murs en ruines : inscription par arrêté du 15 février 1996   2e moitié 16e siècle.                                                                                                       MEAULNE, le portail est et le colombier furent construits au XVIIe siècle. Les deux ailes du château datent de la fin du XVIIIe siècle ou du début du XIXe siècle. L'ancien château a été détruit en 1791. Aile en retour contre l'aile nord du premier quart du XIXe siècle. Remaniements du colombier dans la deuxième moitié du XIXe siècle. La chapelle Saint-Louis est bâtie à la Roche de Broc en 1815 pour madame de Nau, puis restaurée en 1855 pour madame de Godefroy, a été déplacée en 1979 de la Roche de Broc au château de Meaulne. Elle n'a jamais été remontée. Les pierres sont dans le colombier du château.                                                              TOUCHE, dépendances datant de la fin du XVe ou du début XVIe siècle; remaniées au XIXe siècle; logis datant du XVe siècle; façade reprise au XXe siècle : les bâtiments sont divisés, les anciennes dispositions d'ensemble disparues. Elévations à travées, sous-sol et un étage carré, gros-oeuvre : tufeau ; grès; moellon ; appareil mixte ; enduit, type de couverture : toit à longs pans ; pignon couvert ; appentis couverts d'ardoise.","habitants":"Seigneurs locaux \r\n        \"","divers":"Chicaudière grav-1           Lizardière grav 2","gps":"","images":["../../jctruffet.com/image/image_49/49_Broc_1.jpg","../../jctruffet.com/image/image_49/49_Broc_2.jpg"]},"Consult_chateau_formulaireb99e":{"id":"Consult_chateau_formulaireb99e","dept":"49","canton":"Doué la Fontaine","commune":"Brézé","nom":"Brézé","type":"Forteresse","periode":"XVI","histoire":"BREZE,  Louis de Brézé  épousa Diane de Saint-Vallier connue sous le nom de Diane de Poitiers. En 1448, Gilles de Maillé Brézé obtient du Roi René lautorisation de fortifier  Urbain de Maillé Brézé sera le premier marquis, après que Louis XIII ait érigé le domaine en marquisat en 1615. Il se marie avec Nicole du Plessis, sur de Richelieu et ils auront deux enfants, Armand, grand amiral de France, qui meurt en toscane à lâge de 27 ans sans postérité, et Claire Clémence qui épousera Louis II de Bourbon Condé, le grand Condé, et lui transmet ce patrimoine en 1650. Le grand Condé prend la tête de la fronde, soppose ainsi à la régence pendant la minorité du jeune Louis XIV et en 1653, le château est occupé par des troupes Royales. En 1682, Condé échangera le château de Brézé contre la Galissonière, appartenant à Thomas de Dreux. En 1685, Thomas de Dreux se voit confirmer le titre de marquis de Brézé par le Roi Louis XIV. C'est Henri Evrard de Dreux Brézé, grand maître des cérémonies de Louis XVI, qui prolongera la partie Renaissance du château, puis son fils Pierre, évêque de Moulins et son petit-fils Henri Simon feront transformer le château qui devient néo-gothique par le célèbre architecte angevin René Hodé élève de Eugène Viollet-le-Duc. En 1701, la famille achète la charge de grand maître de cérémonies,  quils occuperont jusquen 1830. Charlotte de Dreux-Brézé, par son mariage en 1959, avec le Comte Bernard de Colbert, transmet ainsi le domaine à cette non moins illustre famille, qui y réside toujours.","architecture":"BREZE,  en 1448, Gilles de Maillé Brézé obtient du Roi René lautorisation de fortifier sa demeure et fera creuser des fossés. Le château Renaissance et les dépendances ont été reconstruits au début du XVIe siècle, situé sur la commune éponyme. Les terres sont celles des seigneurs de Brézé depuis le XIe siècle. Les premiers seigneurs de Brézé firent de nombreuses donations à l'Abbaye de Fontevraud toute proche. La particularité  réside en son réseau troglodytique situé sous le château et dans les fossés, comportant aussi bien des pièces de la vie quotidienne (boulangerie, écurie, magnanerie) que militaire (pont-levis, chemin de ronde). Le château fait l'objet d'un classement au titre des M.H. depuis le 6 mars 1979. Ses douves asséchées sont les plus profondes d'Europe (18 mètres). La pierre de la construction a été tirée du creusement des douves. Il possède un pont-levis et un réseau souterrain du XIIe siècle, toute une partie troglodytique. De style renaissance,  L'édifice de plan en U.  il comporte une grande galerie, un logis renaissance en équerre et une tour de l'horloge.","habitants":"Famille de  Urbain de Maillé Brézé \r\n        \r\n        \"","divers":"Brezé 47° 10' 30,6\" Nord et 0° 03' 28,4\" Ouest\r\nGrandfond  47° 10' 19\" Nord, 0° 03' 25\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Br%c3%a9z%c3%a9_1.jpg","../../jctruffet.com/image/image_49/49_Br%c3%a9z%c3%a9_2.jpg","../../jctruffet.com/image/image_49/49_Br%c3%a9z%c3%a9_3.jpg","../../jctruffet.com/image/image_49/49_Br%c3%a9z%c3%a9_4.jpg","../../jctruffet.com/image/image_49/49_Br%c3%a9z%c3%a9_5.jpg","../../jctruffet.com/image/image_49/49_Br%c3%a9z%c3%a9_6.jpg"]},"Consult_chateau_formulairef433":{"id":"Consult_chateau_formulairef433","dept":"49","canton":"Doué la Fontaine","commune":"Brézé","nom":"Brézé_II","type":"Château","periode":"XV","histoire":"Deux châteaux de Bézé dans cet article celui de Grandfond et Fouquet                                                                                     GRANDFOND, le puits porte la date de 1601 et le colombier circulaire est construit en 1568  pour remplacer un colombier carré, actuellement détruit.                                                         FOUQUET,  depuis l'été 2005, Laurence et Fredrik Filliatreau sont heureux de vous accueillir au château Fouquet. Le colombier cylindrique de 3700 boulins, qui date du début du XVIe siècle, est coiffé d'un dôme à lanternon.","architecture":"GRANDFOND,  le  château fort mentionné en 1460 ; vestiges de l'enceinte et de l'ouvrage d'entrée remontant à la deuxième moitié du XVe siècle; logis construit au XVIIe siècle et remanié au XXe siècle, le puits porte la date 1601 et le colombier circulaire est construit en 1568 (daté par travaux historiques) pour remplacer un colombier carré, actuellement détruit ; logement de ferme de la deuxième moitié du XVe siècle ; remanié en 1823 (porte la date) ; parties agricoles du XVIIe siècle ; remaniées au XIXe siècle ; parties agricoles troglodytiques installées au XIXe siècle. Enceinte et ouvrage d'entrée en tufeau pierre de taille ; parties agricoles troglodytiques à deux étages de soubassement.                                                                                   FOUQUET, le château est construit au XVe siècle (tour d'escalier, façade sud-est) ; la façade nord-ouest a été remaniée au quatrième quart du XVIe siècle ; remaniements au XIXe siècle ; parties troglodytiques indatables, remaniées au XIXe siècle, la façade sud-est , la façade nord-ouest a été remaniée au quatrième quart du XVIe siècle  remaniements au XIXe siècle, parties troglodytiques indatables, remaniées au XIXe siècle.  le château  possède des douves asséchées qui sont les plus profondes d'Europe, 18 mètres. La pierre de la construction a été tirée du creusement des douves. Il possède un pont-levis et un réseau souterrain du XIIe siècle, toute une partie troglodytique. De style Renaissance, il comporte, une grande galerie, un logis renaissance en équerre et une tour de l'horloge.","habitants":"Seigneurs locaux \r\n        \r\n        \r\n        \"","divers":"Grandfond  47° 10' 19\" Nord, 0° 03' 25\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Br%c3%a9z%c3%a9_II_1.jpg","../../jctruffet.com/image/image_49/49_Br%c3%a9z%c3%a9_II_2.jpg","../../jctruffet.com/image/image_49/49_Br%c3%a9z%c3%a9_II_3.jpg","../../jctruffet.com/image/image_49/49_Br%c3%a9z%c3%a9_II_4.jpg","../../jctruffet.com/image/image_49/49_Br%c3%a9z%c3%a9_II_5.jpg"]},"Consult_chateau_formulaire3cfb":{"id":"Consult_chateau_formulaire3cfb","dept":"49","canton":"Tiercé","commune":"Juvardeil","nom":"Buronnière","type":"Château","periode":"XV-XVII","histoire":"BURONNIERE, les documents les plus anciens du château remontent à 1410. Pendant plus de trois siècles, le château a appartenu à la famille Sébille de la Buronnière. Les premiers membres étaient Chevaliers de Malte. Vers 1684, le château est rénové et agrandi dans un style Renaissance en ajoutant deux ailes rectangulaire et convertit en habitation de plus grand confort. Les influences du style italien classique y sont très visibles. Pendant la Révolution, le château est exproprié. Mais en 1811 la famille saisit lopportunité de racheter leur chère demeure. Au XIXe siècle, le château de la Buronnière subit par deux fois un changement de propriétaires.","architecture":"BURONNIERE; les dépendances sont agrandies et se parent de traits architecturaux raffinés. Vers 1860, les deux ailes sont agrandies avec la construction de la grande galerie. En dépit des deux guerres mondiales du XXe siècle, le château est demeuré intacte. La famille actuelle est la cinquième famille à résider dans le château et a pour mission de lui redonner vie.","habitants":"famille Sébille de la Buronnière\r\n        \"","divers":"Buronnière 47° 39' 21\" Nord, 0° 29' 50\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Buronni%c3%a8re_1.jpg"]},"Consult_chateau_formulaire3711":{"id":"Consult_chateau_formulaire3711","dept":"49","canton":"Chalonnes sur loire","commune":"Cornuaille","nom":"Caillotière","type":"Château","periode":"XIX","histoire":"CAILLOTIERE, le château, dont le nom provient des cailles, nombreuses sur le domaine, a été construit au début du XIXe siècle, par l'ambassadeur français Augustin de Vernouillet, ancêtre de l'actuel propriétaire.","architecture":"CAILLOTIERE, la maison est un témoignage d'élégance et de charme, avec ses façades de briques roses et de tuffeau, et en pierre blanche de la vallée de la Loire, la ferronnerie superbement conçu des escaliers avant et d'un balcon. Il est situé dans un parc de plus de 70  hectares avec un beau \"jardin à la française\", à l'avant de la demeure, en pente douce vers un étang, un arboretum d'environ 250 espèces rares de petits arbres choisis pour leurs fleurs spectaculaires, ainsi qu'un jardin potager clos. A l'intérieur, au rez-de-chaussée, le hall d'entrée s'ouvre sur le salon rouge. Le grand salon est une magnifique salle avec boiseries, tapisseries des Gobelins du XVIe siècle, une cheminée en marbre, un lustre en cristal, et des portraits d'ancêtres. La salle à manger dont les murs sont recouverts de tapisseries de damas.","habitants":"Famille d'Augustin de Vernouillet,\r\n        \"","divers":"A Cornuaille château de la Caillotière","gps":"","images":["../../jctruffet.com/image/image_49/49_Cailloti%c3%a8re_1.jpg","../../jctruffet.com/image/image_49/49_Cailloti%c3%a8re_2.jpg","../../jctruffet.com/image/image_49/49_Cailloti%c3%a8re_3.jpg"]},"Consult_chateau_formulaire3edd":{"id":"Consult_chateau_formulaire3edd","dept":"49","canton":"Segré","commune":"Candé","nom":"Candé_Saulée","type":"Château","periode":"XIV-XVII","histoire":"Le bourg de Candé est mentionné pour la première fois en 1063. Vers la fin du XIe siècle, le château fortifié par Geoffroy Rorgon, seigneur de Candé, et l'église castrale Saint-Denis, sont entourés par une enceinte. Le prieuré Saint-Nicolas, fondé à la même époque au nord-est de la ville par l'abbaye Saint-Nicolas d'Angers, avec l'accord de Geoffroy Rorgon, n'attire pas la population escomptée, et c'est à l'emplacement du marché se tenant à la porte sud-est de la ville, où bientôt s'installent des halles, que se développe un bourg contigüe à la cité. À l'est de la ville, autrefois sur le territoire de la paroisse d'Angrie, l'aumônerie et maladrerie de Saint-Jean est fondée vers la fin du XIIe siècle. Le château était ruiné dès au moins le XVIIe siècle. L'enceinte primitive en mauvais état au début du XVe siècle fut probablement rénovée peu après 1437, date à laquelle le roi Charles VII en avait donné l'autorisation.                                                                      BEAULIEU, au XVIIe siècle est créé l'hôpital Saint-Joseph, près de l'église, qui sera transféré à Saint-Jean au XIXe siècle. La ville ne s'étend pas au-delà de ces limites jusqu'au cours de la première moitié du XIXe siècle. Conserve des communs du XVIIe siècle. Le logis a été reconstruit en 1872 sur les plans de l'architecte Bonnet. La demeure se compose d'un étage carré et étage de comble, gros-oeuvre en schiste, moellon et enduit, élévation ordonnancée surmontée de toit à longs pans, croupe, toit en pavillon, toit polygonal recouverts d'ardoises.","architecture":"SAULAIE, le château est mentionné au XIVe siècle. Du château fort médiéval ne reste aujourd'hui que le terre plein carré entouré de douves et les tours d'angle sud-ouest et nord-ouest. Le logis est reconstruit à partir de 1654 par Antoine de l'Esperonnière. Le château du XVIIe siècle occupait les côtés sud, ouest et nord de la cour. En 1720 la tour sud-est est détruite et remplacée par la chapelle actuelle. Au cours du 4ème quart du XIXe siècle, le marquis de l'Esperonnière fait abattre les ailes sud et ouest et une partie de l'aile nord du logis. De cette dernière, il ne conserve que la partie droite et en 1882, fait élever un corps de logis sur la partie gauche, sur des plans de l'architecte angevin Auguste Eugène Beignet, achevé en 1883. Quelques années plus tôt, en 1877-1878, les terres entourant le château avaient été aménagées en parc par Bühler (date et attribution par travaux historiques) ; le parc s'ouvre par deux portes et conciergeries, l'une au nord, l'autre à l'est, construites vers 1880 probablement. Les étables situées derrière les communs ont été élevées en 1897 (portent la date). Enfin, M. de l'Esperonnière fit relier la partie gauche du logis, achevée en 1883, à la tour d'angle nord-ouest par un pavillon terminé en 1906 (porte la date). Au nord du château se trouve un moulin à vent tour, reconstruit au XVIIe ou au XVIIIe siècle, rehaussé de deux mètres en 1865, lors de l'installation des ailes Berton.","habitants":"Candé; Geoffroy Rorgon                                                       Saulaie  marquis de l'Esperonnière\r\n        \"","divers":"Saulaie 47° 33' 10,6\" Nord 1° 2' 51,02\" Ouest                              Beaulieu grav -4","gps":"","images":["../../jctruffet.com/image/image_49/49_Cand%c3%a9_Saulaie_1.jpg","../../jctruffet.com/image/image_49/49_Cand%c3%a9_Saulaie_2.jpg","../../jctruffet.com/image/image_49/49_Cand%c3%a9_Saulaie_3.jpg","../../jctruffet.com/image/image_49/49_Cand%c3%a9_Saulaie_4.jpg"]},"Consult_chateau_formulairefcb3":{"id":"Consult_chateau_formulairefcb3","dept":"49","canton":"Saumur","commune":"Chacé","nom":"Chacé","type":"Château","periode":"XVIII","histoire":"CHACE, lancienne seigneurie de Chacé dépendait de Montreuil-Bellay mais le château aujourdhui na rien de médiéval. Il sagit dune belle construction de la seconde moitié du XVIIe siècle dont le corps principal sorne de deux pavillons en retour déquerre. Sinspirant sans doute du superbe manoir de lOratoire nouvellement bâti au hameau voisin de Chaintres à Dampierre-sur-Loire, le nouveau château décline les éléments darchitecture alors à la mode : faible saillie des avant-corps, chaînes dangle à bossages, alternance des frontons cintrés et frontons triangulaires. Des remaniements datés du XVIIIème siècle laissent de belles boiseries de style Louis XVI. Le château est acheté, en deux temps, par la municipalité dans le courant du XIXe siècle. La mairie et lécole y trouvent place.  Les subventions publiques, les souscriptions et laide de la Fondation du Patrimoine permettent de valoriser ce joyau du patrimoine communal inscrit à linventaire des M.H. depuis 1968.","architecture":"CHACE, il sagit dune belle construction de la seconde moitié du XVIIe siècle dont le corps principal sorne de deux pavillons en retour déquerre. Sinspirant sans doute du superbe manoir de lOratoire bâti au hameau voisin de Chaintres à Dampierre-sur-Loire, le château décline les éléments darchitecture alors à la mode : faible saillie des avant-corps, chaînes dangle à bossages, alternance des frontons cintrés et frontons triangulaires. Des remaniements datés du XVIIIe siècle laissent de belles boiseries de style Louis XVI. Le château est acheté, en deux temps, par la municipalité dans le courant du XIXe siècle. La mairie et lécole y trouvent place. Tout récemment les collectivités se sont engagées pour restaurer l'édifice qui, au centre du village, accueille toujours la mairie mais aussi la bibliothèque-ludothèque et des espaces associatifs.","habitants":"seigneurie de Chacé\r\n        \"","divers":"Chacé 47° 12' 49,62\" Nord, 0° 04' 31,13\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Chac%c3%a9_1.jpg","../../jctruffet.com/image/image_49/49_Chac%c3%a9_2.jpg","../../jctruffet.com/image/image_49/49_Chac%c3%a9_3.jpg"]},"Consult_chateau_formulairec5c7":{"id":"Consult_chateau_formulairec5c7","dept":"49","canton":"Segré","commune":"Challain la Potherie","nom":"Challain_Menil","type":"Château","periode":"XIX","histoire":"deux châteaux à Challain-la-Potherie celui de Challain et de Menil.                                                                               CHALLAIN,  il existait un château à Challain depuis le milieu du XIe siècle habité par Hilduin de Chalen, le domaine et acquis au XVIe siècle par Christophe Fouquet et en 1747 acquit par Urbain le Roi. Au XIXe siècle, la terre appartient à la famille de La Rochefoucauld-Bayers qui fait construire le nouveau château de 1847 à 1854, près de l'ancienne demeure démolie. C'est l'architecte angevin René Hodé qui sera choisi en 1847, ses plans s'inspirant du projet primitif. En 1854 le corps de logis est achevé, y compris la décoration intérieure. Après la mort de son mari, madame de La Rochefoucauld-Bayers fait achever le château, puis fait bâtir les communs en 1859, le pont de jardin en 1862, le mur crénelé du nord, l'orangerie, les parties agricoles et les serres en 1866, le château d'eau, dit \"Tour de Monplaisir\" en 1875, la Porterie en 1882, les ruines artificielles, la fabrique de jardin et son embarcadère, situés au bord de l'étang du moulin. Sollicité, le comte de Choulot avait donné un plan pour aménager le parc, mais c'est le projet de Châtelain qui est exécuté, les ruines artificielles de l'étang lui sont peut-être attribuables. En 1893 le château est vendu  au général Courtés et au XXe siècle devient un hôtel de luxe.","architecture":"MENIL, l'ancien château du Ménil a été détruit pour faire place au nouveau château en 1862. Le logis fut bâti de 1862 à 1865, selon les plans de l'architecte Pierre-Etienne de Coutailloux. Les communs furent élevés de 1867 à 1869, le parc était créé d'après les plans d'Auguste Killian, architecte-paysagiste d'Angers. La conciergerie quant à elle, fut construite selon les plans de l'architecte Auguste Adolphe Eugène Beignet, en 1881. Le logis a été détruit au cours du troisième quart du XXe siècle. Le parc formait un triangle,  le château était situé au milieu de la grande allée est-ouest. À l'ouest se trouve la porterie et à l'est les communs comprenant une maison pour le régisseur, deux logements, des parties agricoles, un chenil et une orangerie. Le logis comptait deux étages carrés et un étage de comble. La maison du régisseur comprend un étage carré. La partie ouest du domaine est située sur le territoire de Loiré. Au XIXe siècle, dépendaient du château les fermes de la Revachères, de la Bénetière, de Gorieux, de la Noraie, de la Louironnaie, de la Daviaie, de la Dumettrie, de la Terre-Lande, de Trompe-Souris, de Bel-Orient et le Moulin-Blanc, dans la commune de Challain-la-Potherie. Dans la commune de Loiré, en dépendaient les fermes des Mats, de la Ricoulaie, de l'Arjolaie, de la Haute-Babinais, du Petit-Brandonné, et le moulin du Chêne-Moignon.","habitants":"Famille de La Rochefoucauld-Bayers\r\n        \r\n        \r\n        \"","divers":"Chaillan : 47° 38' 06\" Nord, 1° 2' 39\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Challain_M%c3%a9nil_1.jpg","../../jctruffet.com/image/image_49/49_Challain_M%c3%a9nil_2.jpg","../../jctruffet.com/image/image_49/49_Challain_M%c3%a9nil_3.jpg","../../jctruffet.com/image/image_49/49_Challain_M%c3%a9nil_4.jpg","../../jctruffet.com/image/image_49/49_Challain_M%c3%a9nil_5.jpg","../../jctruffet.com/image/image_49/49_Challain_M%c3%a9nil_6.jpg","../../jctruffet.com/image/image_49/49_Challain_M%c3%a9nil_7.jpg"]},"Consult_chateau_formulaireff9c":{"id":"Consult_chateau_formulaireff9c","dept":"49","canton":"Tiercé","commune":"Chambellay","nom":"Chambellay","type":"Château","periode":"XV-XVI-XVIII","histoire":"deux châteaux dans cet article la Grande-Saulaie, Bois-Montbourcher et manoir de Beauregard, de Perray et Verger.                                                                              GRANDE-SAULAIE, le domaine est attesté dès le XVIe siècle, alors que François Cousin en est sieur. Au début du XVIIe siècle, il comprenait une maison, une chapelle, un pressoir, des bois, des terres et des vignes. Des bâtiments actuels, le plus ancien est le pavillon avec la lucarne datée de 1610. La partie avec la cave en soubassement date du XVIIe siècle  a été remaniée au XVIIIe siècle. Le corps de logis principal est peut-être de la même époque et remanié au XIXe siècle, le pavillon à étage carré date du XVIIIe siècle. Enfin la partie méridionale est un ajout du XXe siècle imitant le XVIIIe siècle. De même, les appentis à l'arrière datent du XXe siècle. Le château est composé d'une succession de bâtiments : le plus au sud est en rez-de-chaussée avec un étage de comble coiffé d'un toit brisé à croupes. Les fenêtres et lucarnes en arcs segmentaires sont encadrées de tufeau. Un pavillon à étage carré et étage de comble est accolé au précédent. L'étage carré se distingue par un parement en pierres de taille de tufeau. Le corps de logis principal, à étage carré et étage de comble est coiffé d'un toit brisé à croupes, les baies de l'étage carré sont rectangulaires, celles du rez de chaussée à arcs segmentaires. Enfin un bâtiment avec pavillon et cave en soubassement complète l'ensemble. Ce pavillon en rez de chaussée présente une lucarne à fronton triangulaire en tufeau orné avec la date 1610.","architecture":"BOIS-MONTBOURCHER, attestée dès le XVe siècle comme appartenant à la famille du Bois, la terre passe aux Montbourcher vers 1530,  Si quelques éléments du XVIe siècle sont conservés (pavillon de l'horloge), l'édifice date principalement du XVIIe siècle et du XIXe siècle. En 1864, un réaménagement est effectué par l'architecte Delarue, à la demande du marquis  de Charnacé  propriétaire depuis 1711, construction d'un châtelet d'entrée, réfection des façades, et adjonction de deux pavillons d'angle de l'aile sud avec la volonté de donner un aspect XVIIe siècle aux bâtiments. Jusqu'au début du XIXe siècle, La tour sud-est a servi de fuie et de chapelle. Le château est constitué de deux corps de bâtiments en L  l'angle étant marqué par un pavillon carré. Le pavillon de l'horloge, autrefois relié au château par une aile, est aujourd'hui isolé. Les deux façades en équerre du château sont composées d'un soubassement, un rez-de-chaussée, un étage carré et un étage de comble. L'aile nord est dotée d'une porte d'entrée à pilastres supportant un fronton cintré. Les lucarnes possèdent des frontons alternativement triangulaires et cintrés à enroulements. Les façades sud et ouest sont organisées selon la même ordonnance que les façades de la cour intérieure.","habitants":"Bois; famille du Bois\r\n        \"","divers":"la Grande-Saulaie grav-1  Bois-Montbourcher grav 2-3-4  de Perray grav-5 et Verger grav 6.    Montboucher 47° 41' 28\" Nord, 0° 40' 56\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Chambellay_1.jpg","../../jctruffet.com/image/image_49/49_Chambellay_2.jpg","../../jctruffet.com/image/image_49/49_Chambellay_3.jpg","../../jctruffet.com/image/image_49/49_Chambellay_4.jpg","../../jctruffet.com/image/image_49/49_Chambellay_5.jpg","../../jctruffet.com/image/image_49/49_Chambellay_6.jpg"]},"Consult_chateau_formulaire6c20":{"id":"Consult_chateau_formulaire6c20","dept":"49","canton":"Tiercé","commune":"Chambellay","nom":"Chambellay_II","type":"Château","periode":"XIX","histoire":"HALLIERS, maison et hébergement de Lasliée sont attestés dès 1540. Cette terre a appartenu à la famille des Andigné.                                                                              PERRAY détruit au XIXe siècle pour laisser place à une nouvelle construction dans le style néo-gothique. Cependant, le pavillon à l'ouest du logis semble être un vestige de cette construction plus ancienne. La date de juillet 1610 ou 1615 figure sur la lucarne de la façade antérieure de cette partie, les autres ouvertures de la façade datent du XVIIIe siècle, les communs et la remise datent de la même époque que le logis, de la fin du XIXe siècle. Le logis comprend un étage carré et un comble à surcroît avec lucarnes et la façade s'organise selon trois travées. L'ensemble est couvert d'un toit à longs pans. Les baies rectangulaires sont à meneaux et encadrements en tufeau. Au corps principal est accolé un pavillon en rez-de-chaussée avec étage de comble et toit à croupes. Les baies sont également en tufeau et présentent un arc segmentaire. La remise est dotée de deux larges portes et d'une lucarne en tufeau. Sous le débord du toit, de petites baies géminées également en tufeau constituent un pigeonnier. Les communs sont composés d'un corps central avec deux larges portes et une lucarne. De part et d'autre, deux pavillons avec une porte font saillie.","architecture":"HALLIERS, les bâtiments actuels datent principalement du XIXe siècle. Seul le porche est peut-être un vestige des bâtiments du XVIIe siècle. L'ensemble a été restauré au XXe siècle. Le corps de bâtiment principal est un édifice à étage carré et étage de comble couverts d'un toit à croupes. Il est organisé selon cinq travées. Deux portes de part et d'autre de la travée centrale donnent accès à l'intérieur. La façade arrière est dotée d'un escalier pour accéder au rez-de-chaussée surélevé. Les encadrements de baies rectangulaires, la corniche et le chaînage d'angle sont en tufeau. En retour d'équerre se trouvent un porche surmonté d'une chambre haute à lucarne, une partie en rez-de-chaussée et un pavillon d'angle articulant cette partie du bâtiment avec l'aile suivante, ce pavillon d'angle avec un étage en surcroît présente une fenêtre à deux ouvertures surmontées d'un fronton arrondi. S'ajoutent à ces éléments une aile à étage carré.                                                                          BEAUREGARD, ce manoir domine la campagne angevine et la vallée de la Mayenne traversant le village de Chambellay. Ce grand gite est composé de deux bâtisses très anciennes se faisant face. Le vieux manoir date du XIVe, dont les fenêtres géminées et quelques douves constituent encore les témoins. Il a été restauré il y a quelques années. Le grand manoir date du XVe avec ses ouvertures en ogives en granit vert provenant danciennes carrières du pays aujourdhui épuisées. Sa tour XVIe en colimaçon et ses ouvertures à meneaux témoignent de lévolution architecturale du bâtiment au cours des siècles.","habitants":"Famille des Andigné\r\n        \"","divers":"Château de Beauregard grav-1 2-   Hallier-4       Vergé grav-3","gps":"","images":["../../jctruffet.com/image/image_49/49_Chambellay_II_1.jpg","../../jctruffet.com/image/image_49/49_Chambellay_II_2.jpg","../../jctruffet.com/image/image_49/49_Chambellay_II_3.jpg","../../jctruffet.com/image/image_49/49_Chambellay_II_4.jpg"]},"Consult_chateau_formulaire0c7d":{"id":"Consult_chateau_formulaire0c7d","dept":"49","canton":"Tiercé","commune":"Durtal","nom":"Chambiers","type":"Château","periode":"XV-XVII","histoire":"Quatre châteaux dans cet article dont celui de Chambiers, de Serrain de Bosse et de Durtal (voir article).                              CHAMBIERS, l'allée d'accès, bordée de rhododendrons, conduit au château niché dans une clairière à l'orée de l'importante forêt de Chambiers. Des parterres à l'italienne dessinés devant le logis, on chemine au travers du jardin d'herbes, de la roseraie et du jardin à la française au parc paysager, admirant près des communs un beau spécimen de chêne pédonculé. Six chambres, table d'hôtes et une suite. Deux cottages à votre disposition. Pour lorganisation de vos réceptions, mariages, séminaires, conventions ou fêtes familiales nous vous proposons dans un environnement superbe nos salles de réceptions, le parc et les jardins à la française.                                                                                     SERRAIN    Une petite forteresse médiévale succède ici à un camp romain pour défendre un gué sur le Loir. Dépendant du château de Durtal, tout proche, le monument actuel remonte à la fin du XVIe siècle. Au siècle suivant, une même famille l'habite durant trois générations et réaménage la demeure. Acquis ensuite par le chef d'escadron Oudri et ensuite au général Emile Oudri, puis à sa nièce qui épouse le le docteur Emile Poirier maire de Durtal. la fille unique du ménage mademoiselle Renée Poirier  aménage les salles de gardes en salles de reception pour des mariages et autres manifestations, sans héritier vend le Serrain  en 1983 à Dominique Dupart et obtient en 1985 l'inventaire M.H. depuis 1990 la famille de Quatrebarbes en est propriétaire.","architecture":"BOSSE , sa construction date du XVe au XVIIe siècle. Au Moyen-Age, Durtal dépendait de la Sénéchaussée de Baugé. La création de la commune est en lien avec la Fondation de la forteresse de Durtal, en 1040, par le comte d'Anjou Foulques Nerra.                                                                                       SERRAIN ; Le logis comprend un rez-de-chaussée surélevé et un étage de combles, éclairé par des lucarnes passantes sur la façade ouest et par des fenêtres en anse  de panier sur la façade opposée. Seule la façade ouest est encore longée par une douve. On doit son aspect actuel aux transformations opérées par la famille Deschamps au XVIIe siècle ou les baies à meneaux ont été remplacées par de grandes fenêtres à petits carreaux. A l'angle de l'aile une petite construction en encorbellement à pans de bois servait à l'origine de grenier.                                                      manoir de VAULX, ancienne grange dimière du XIIIe siècle remaniée au XVe siècle. Vous y trouverez dans la grande pièce des silos à grain. Ce manoir est restauré à l'identique. Les lits à baldaquin font le bonheur de nos clients. Les vitraux , quadrilobes sont représentatifs de l'époque. La cheminée monumentale dans la grande pièce à vivre de 100 m2. Le souterrain de défense est le plus rare de la région du Val de Loire, parc et piscine, chemins pédestres sur place, Golf.","habitants":"Seigneurs locaux \r\n        \"","divers":"de Chambiers, de Serrain de Bosse                               Chambiers 47° 38' 44\" Nord et 0° 14' 42\" Ouest                     Serrein grav 6-7-8","gps":"","images":["../../jctruffet.com/image/image_49/49_Chambiers_1.jpg","../../jctruffet.com/image/image_49/49_Chambiers_2.jpg","../../jctruffet.com/image/image_49/49_Chambiers_3.jpg","../../jctruffet.com/image/image_49/49_Chambiers_4.jpg","../../jctruffet.com/image/image_49/49_Chambiers_5.jpg","../../jctruffet.com/image/image_49/49_Chambiers_6.jpg","../../jctruffet.com/image/image_49/49_Chambiers_7.jpg","../../jctruffet.com/image/image_49/49_Chambiers_8.jpg"]},"Consult_chateau_formulaire344e":{"id":"Consult_chateau_formulaire344e","dept":"49","canton":"Tiercé","commune":"Champigné","nom":"Champigné","type":"Château","periode":"XV-XVII","histoire":"Deux châteaux à  Champigné celui de la Briottières, Charnacé et Hamonnières.                                                               BRIOTTIERES, tout à commencé pour les Briottières à laube du XVe siècle alors que ce fief appartenait à la famille de Mergot. Avant 1485, il passe à Jean de La Saussaie par son mariage avec Jeanne de Mergot. Il est acquis en 1519 par René de Baïf, mari de Catherine de Champchevrier, laquelle y fit élever la chapelle de Saint Bonaventure, en 1528. Puis les seigneurs se succèdent. Le château venait dêtre reconstruit en trois pavillons avec plate-forme centrale, qui ont été remaniés depuis. L'édifice appartenait en 1855, à la famille dArmaillé,  acquis au milieu du XIXe siècle par Alfred de Mieulle, arrière-grand-père de Mme Jacques de Valbray, née Monique de Mieulle, mère de François de Valbray lactuel propriétaire. En 1967 Jean de Mieulle légua la propriété à son épouse Geneviève de Mieulle née Paule dIvoy de La Poype qui légua les Briottières en 1969 à sa fille Monique de Valbray née Mieulle. Les Briottières sont dans la même famille depuis six générations. François sinstalle aux Briottières le 1er janvier 1979 à 23 ans et il épouse Hedwige de Craecker le 16 Novembre 1984. Tous les deux, en famille avec leurs six enfants, font revivre cette propriété en recevant des hôtes du monde entier et font renaître de ses cendres cette majestueuse demeure dAnjou.                         HAMONNIERE   Transformé en ferme à la Révolution. A Champigné, Guillaume Dehollain a hérité récemment du château  du XVe-XVIe siècle), que sa mère Marie-Antoinette a patiemment rénové pendant dix ans, dans les années soixante-dix.  Il est classé aux M.H. depuis 1949. Le propriétaire du manoir de la Hamonnière est la famille Dehollain.","architecture":"CHARNACE, est un manoir bâti à Champigné, La construction du manoir de Chanarcé date du XVIe siècle. Au premier étage, la fenêtre date de 1550-1560.  lLa commune s'honore d'avoir vu naître Hercule de Charnacé en 1588, au château. Ce seigneur fut emmené, dès l'âge de 12 ans, à la cour d'Henri III de France par son parrain le duc de Montbazon. Remarqué par le cardinal de Richelieu, il fut chargé d'ambassades importantes, notamment auprès du roi Gustave-Adolphe de Suède. Il négocia l'alliance, entre ce dernier et Louis XIII, en 1631. Le manoir de Charnacé a été classé aux M.H. depuis le 3/11/1930.  propriété de la comtesse d'Anthenaise.                                                                 HAMONNIERE, le château doit son nom à messire Antoine Hamon, qui était seigneur en 1408. Le corps central, datant de la première moitié du XVe siècle, comporte une tourelle à pans coupés pour l'escalier. Une grande toiture, aussi haute que la façade, est égayée de hautes lucarnes à grands pignons aigus. Au XVe siècle, l'édifice se vit adjoindre un prolongement vers l'ouest et un pavillon d'angle ou donjon de plaisance, de trois étages dans le style renaissance. Il passe fin XVe siècle à la famille Legay. Jean Legay fonda le 29 janvier 1509 une chapelle en lhonneur de Notre-Dame. La dame Claude Leroux, veuve dAntoine Legay, obtint le 2 février 1595 des lettres patentes, qui lui accordaient tous les droits de prééminence dans léglise, cession confirmée par lettres nouvelles du 26 août 1596 à lencontre de lopposition du prieur de Champigné et du seigneur de Charnacé.","habitants":"Brottières, famille de Mergot                                               Charnacé; comtesse d'Anthenaise.                       Hamonnière; Antoine Legay,\r\n        \r\n        \r\n        \"","divers":"à  Champigné celui de la Briottières, Charnacé et Hamonnières.  Charnacé  grav 6.   GPS : 47° 38' 57\" Nord, 0° 35' 34\" Ouest Briottieres   47° 39' 54\" Nord 0° 34' 16\" Ouest    Grav 1 à 5                     Hamonières  47° 38' 47\" Nord 0° 34' 18\" Ouest grav-7-8-9","gps":"47° 38' 57\" Nord, 0° 35' 34\" Ouest Briottieres   47° 39' 54\"","images":["../../jctruffet.com/image/image_49/49_Champign%c3%a9_1.jpg","../../jctruffet.com/image/image_49/49_Champign%c3%a9_2.jpg","../../jctruffet.com/image/image_49/49_Champign%c3%a9_3.jpg","../../jctruffet.com/image/image_49/49_Champign%c3%a9_4.jpg","../../jctruffet.com/image/image_49/49_Champign%c3%a9_5.jpg","../../jctruffet.com/image/image_49/49_Champign%c3%a9_6.jpg","../../jctruffet.com/image/image_49/49_Champign%c3%a9_7.jpg","../../jctruffet.com/image/image_49/49_Champign%c3%a9_8.jpg","../../jctruffet.com/image/image_49/49_Champign%c3%a9_9.jpg"]},"Consult_chateau_formulaire1b75":{"id":"Consult_chateau_formulaire1b75","dept":"49","canton":"Segré","commune":"Grugé l","nom":"Champiré","type":"Château","periode":"XV","histoire":"CHAMPIRE, cette seigneurie relevait de la baronnie de Pouancé, passa aux Sévigné la marquise y a sa chambre. En 1767, Joachim André Aveline de Narcé achète le domaine et décide de rebâtir l'aile nord. Son \"livre des principaux ouvrages que j'ai fait faire\" nous apprend que les travaux ont débuté en 1768, qu'ils s'achevèrent en 1770. Il fit appel à l'architecte angevin Etienne François Chaintrier et à un maçon dénommé Lardeux. Les écuries et une orangerie ont été édifiées au cours du XIXe siècle. Passa par héritage aux mains des Bodard de la Jacopière. Cette demeure a accueilli au XVIIe siècle mademoiselle de Lavergne, future madame de Lafayette,  et en 1940 le maréchal Leclerc.","architecture":"CHAMPIRE, le châteaux commencé au XVe siècle, terminé sous le règne de Louis XV   du château primitif, comprenant quatre tours protégées par des douves et un pont levis, il ne subsiste qu'une partie du gros-oeuvre, la tour sud et une cheminée à l'étage. Coulant le long de la façade nord, l'Araise est canalisée par deux bassins;  un canal reprenant peut-être le tracé de l'ancienne douve, aujourd'hui comblée prolongeait ces deux bassins sur les côtés Est et sud. Un pont permet d'atteindre l'autre rive où se trouvent les communs et le chenil. Un magnifique tulipier de Virginie ombrage la façade nord. Le château présente un plan en L : l'aile ouest, la plus ancienne, est cantonnée par une tour circulaire couverte par un toit en poivrière. L'aile élevée au XVIIIe siècle présente une élévation régulière : bâtiment simple en profondeur avec cinq travées ; travée centrale en léger avant-corps couronnée par un fronton triangulaire. La partie XVIIIe est plus haute que l'aile ouest.","habitants":"Joachim André Aveline de Narcé\r\n        \"","divers":"Champiré : 47° 45' 17\" Nord, 1° 00' 09\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Champir%c3%a9_1.jpg","../../jctruffet.com/image/image_49/49_Champir%c3%a9_2.jpg","../../jctruffet.com/image/image_49/49_Champir%c3%a9_3.jpg"]},"Consult_chateau_formulaire272c":{"id":"Consult_chateau_formulaire272c","dept":"49","canton":"La Pommeraye","commune":"Champtoceaux","nom":"Champtoceaux","type":"Château","periode":"XVII","histoire":"CHAMPTOCEAUX   castrum mentionné dès le VIe siècle par Grégoire de Tours. Le site comprend le château, la basse cour et le  bourg enclos avec motte. Au cours des guerres de succession de Bretagne, l'ensemble du site est détruit et abandonné au XVe siècle.","architecture":"CHAMPTOCEAUX, c'est un château fort. La première attestation de la citadelle remonte autour de 560, ou elle devint le siège d'un évêché. Cet ancien castrum fut mentionné dès le VIe siècle, par Grégoire de Tours. Au cours des guerres de succession de Bretagne, l'ensemble du site fut détruit et abandonné au XVe siècle. Installé sur un éperon au dessus de la Loire, il couvre environ 30 ha. Le château de Champtoceaux est inscrit aux M.H. depuis le 16/06/2009. Cet ensemble fortifié appartient depuis à la commune. Il est privé.","habitants":"Grégoire de Tours\r\n        \r\n        \"","divers":"47° 20' 14\" Nord, 1° 16' 13\" Ouest                                            47° 20' 16\" nord, 1° 15' 56\" ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Champtoceaux_1.jpg","../../jctruffet.com/image/image_49/49_Champtoceaux_2.jpg","../../jctruffet.com/image/image_49/49_Champtoceaux_3.jpg","../../jctruffet.com/image/image_49/49_Champtoceaux_4.jpg","../../jctruffet.com/image/image_49/49_Champtoceaux_5.jpg"]},"Consult_chateau_formulaire9c45":{"id":"Consult_chateau_formulaire9c45","dept":"49","canton":"Chalonnes sur loire","commune":"Champtocé sur loire","nom":"Champtocé","type":"Vestiges","periode":"XIII-XVI","histoire":"CHAMPTOCE, on doit la popularité du château de Champtocé au terrible Gilles de Rais appelé aussi Gilles de Retz, baron de Retz, devenu maréchal de France de 1404-1440. Gilles de Rais naquit au château de Champtocé vers 1405, de l'union de Marie de Craon et de Guy de Laval, sieur de Retz. Il fut le compagnon de Jeanne d'Arc. En octobre 1440, Gilles de Rais fut jugé dans le Duché de Bretagne, par l'officialité de Nantes, pour hérésie, sodomie et meurtres de 140 enfants. Simultanément, il fut condamné à être pendu et brûlé vif sur le bûcher, par la cour séculière nantaise pour s'être emparé, indûment, du château de Saint-Étienne-de-Mer-Morte (disparu depuis) et pour des crimes commis sur « plusieurs petits enfants.  Le château de Champtocé-sur-Loire est inscrit à l'inventaire supplémentaire des M.H depuis le 16/06/1926.","architecture":"CHAMPTOCE, est un château bâti à Champtocé-sur-Loire,  C'est une forteresse de style Médiéval a été construit au XIIIe au XVIe siècle. C'est un château entièrement en ruines, aujourd'hui. Situé à proximité de la frontière avec la Bretagne, c'était une place forte de l'Anjou. Tout comme le château d'Angers, il ne possédait pas de donjon. Il s'élève sur un promontoire de schiste, qui surplombe la Romme.  Au Moyen-Age, le château de Champtocé fut la première place forte de l'Anjou sur la rive droite de la Loire, la première ligne de défense contre le duché de Bretagne et représentait, un péage très important. L'enceinte de la forteresse se constituait de 11 tours, dont une seule, éventrée, subsiste et s'élève face à la route. Ce n'est qu'au XIIIe siècle que la Forteresse de Champtocé prendra sa forme définitive. Il ne reste aujourd'hui que des ruines importantes du château de Champtocé.","habitants":"Gilles de Rais\r\n        \"","divers":"Champtocé  47° 24' 45\" Nord et 0° 51' 43\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Champtoc%c3%a9_1.jpg","../../jctruffet.com/image/image_49/49_Champtoc%c3%a9_2.jpg","../../jctruffet.com/image/image_49/49_Champtoc%c3%a9_3.jpg","../../jctruffet.com/image/image_49/49_Champtoc%c3%a9_4.jpg","../../jctruffet.com/image/image_49/49_Champtoc%c3%a9_5.jpg","../../jctruffet.com/image/image_49/49_Champtoc%c3%a9_6.jpg"]},"Consult_chateau_formulaire6a91":{"id":"Consult_chateau_formulaire6a91","dept":"49","canton":"Chemillé-Melay","commune":"Chemillé d","nom":"Chanzeaux","type":"Château","periode":"XVIII","histoire":"CHANZEAUX, c'est un château fort dont la construction date du XVIIIe et XIXe siècle. L'architecte était René Hodé. Le château de Chanzeaux est inscrit aux M.H. depuis le 31.12.1980. C'est un château privé. Les façades et les toitures, ses communs, la conciergerie et de la tour se trouvent dans le parc. La grille d'entrée provient du palais des marchands à Angers. Les pièces suivantes sont protégées du rez-de-chaussée avec leur décor : vestibule d'entrée, grand salon, salle à manger, salle de billard, bibliothèque, la chapelle ainsi que le plafond du boudoir au rez-de-chaussée et les plafonds peints des chambres du premier et deuxième étage des tours Nord et Ouest.","architecture":"CHANZEAUX, au XIVe siècle. Une demeure seigneuriale, grande maison bourgeoise avec corps de bâtiment central et deux pavillons, est construite sur les bords de l'Hyrôme au début du XVIIIe siècle, le soulèvement vendéen débute à Chanzeaux en mars 1793, et en janvier de l'année suivante, le château partiellement ruiné en 1794, est ensuite entièrement restauré et agrandi aux XVIIIe (Temps modernes) et XIXe siècles. La restauration est effectuée par l'architecte angevin René Hodé (1811-1874), qui participa à différents ouvrages comme la construction du château de Challain-la-Potherie,  du Cloître de Chemillé, de l'Echo de Chemillé,  du Pineau de Champ-sur-Layon.  Description : Cour d'honneur fermée par une grille, château de style néo-gothique avec vestibule d'entrée, grand salon, salle à manger, salle de billard, bibliothèque, chapelle, chambres, et communs, conciergerie, ancien pont sur l'Hyrôme. Des objets d'art et souvenirs vendéens y sont conservés, dont un calice de l'abbé Blanvillain et une croix du Pin-en-Mauges.\r\nL'édifice a été partiellement inscrit aux M.H. par arrêté du 31 décembre 1980. Il est la propriété d'une personne privée.","habitants":"architecte angevin René Hodé \r\n        \"","divers":"Chanzeaux  47° 15' 54,23\" Nord, 0° 38' 47,63\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Chanzeaux_1.jpg","../../jctruffet.com/image/image_49/49_Chanzeaux_2.jpg"]},"Consult_chateau_formulaire73e0":{"id":"Consult_chateau_formulaire73e0","dept":"49","canton":"Segré","commune":"Chatelais","nom":"Chatelais","type":"Château","periode":"XVII","histoire":"CHALONGE, le Chalonge est une ancienne châtellenie qui relevait directement du château d'Angers. Aux mains d'Olivier de Neuville, . Le château originel apparaît plutôt comme un logis du début du XVIIe siècle. Une campagne de travaux sera en partie engagée au XVIIIe siècle. Un axe est-ouest est aménagé avec une avenue conduisant à une demi-lune flanquée de pavillon, flanqué d'un parterre et d'un jardin potager, une grande allée prolongea la perspective vers l'ouest. Au début du XXe siècle, les bâtiments subirent des modifications de fonction lors de l'installation de la laiterie Célia de Craon ; les pavillons furent remaniés et une nouvelle habitation fut construite accolée à celui du sud. le corps de logis originel ait été un bâtiment rectangulaire dont l'élévation orientale était rythmée par une série de travées couronnées de lucarnes à frontons triangulaires.  Le bâtiment est construit en moellon de grès mais la pierre de taille en tuffeau fut utilisée en second oeuvre pour l'encadrement des baies, les chaînages harpés d'angle, la corniche, les pilastres encadrant les travées centrales et les frontons en demi-lune les couronnant ; une croupe brisée en partie en ardoise. Les pavillons comportent un rez-de-chaussée surélevé, accessible par un escalier extérieur, et un étage carré ; celui du nord est couvert par un pavillon alors que celui du sud est encore couvert par une terrasse bordée de balustrades.","architecture":"SAINT-JULIEN, le site fut occupé par les bénédictins de l'abbaye Saint-Aubin d'Angers qui y fondèrent un prieuré, mentionné dès 1218. Si au XIXe siècle on pouvait encore voir les vestiges de la chapelle (transformée en écurie) et du logis prioral, il ne subsiste aujourd'hui aucune trace architecturale de cette occupation religieuse. Vers 1880, l'architecte angevin Bibard transforma les lieux en faisant bâtir le château actuel et ses communs.  L'oppidum est sis sur une cluse qui domine la vallée de l'Oudon par deux abrupts de 40 m. Les talus défensifs, visibles au nord-ouest, devaient occuper 5 hectares et protéger l'oppidum sur tout son côté ouest et sans doute au sud ; ils manquent à l'ouest et au nord, là où l'abrupt suffisait à la défense. Le château propose un corps de bâtiment central, couvert en longs pans, cantonné par des pavillons à hauts combles. Le gros-oeuvre de la construction est sans doute en moellons de grès avec enduit ; mais la pierre de taille en tuffeau est largement utilisée en second oeuvre pour les encadrements, les chaînages, les lucarnes  mais aussi en placage afin de mettre en valeur la travée en ressaut de la façade sud. Au nord-ouest, le moulin-tour date de 1821  construit lui aussi en moellons de grès et enduit est couvert par une toiture conique, l'escalier tournant en bois desservant les niveaux et le mécanisme sont toujours en place.","habitants":"Seigneurs  locaux\r\n        \"","divers":"Château st-Julien grav-1                                                                  Challonge grav 3-4","gps":"","images":["../../jctruffet.com/image/image_49/49_Chatelais_1.jpg","../../jctruffet.com/image/image_49/49_Chatelais_2.jpg","../../jctruffet.com/image/image_49/49_Chatelais_3.jpg","../../jctruffet.com/image/image_49/49_Chatelais_4.jpg"]},"Consult_chateau_formulaire3bc5":{"id":"Consult_chateau_formulaire3bc5","dept":"49","canton":"Segré","commune":"Chazé-sur-Argos","nom":"Chazé_sur_Argos","type":"Château","periode":"XVIII","histoire":"BORDERIES, le logis du XVIIIe siècle a été agrandi à la limite des XIXe et XXe siècles par l'adjonction de deux parties hors-oeuvre, l'une sur la face latérale ouest, l'autre sur la face postérieure nord. Les communs, bordant le côté ouest de la cour antérieure du logis, sont du milieu du XIXe siècle. Le grand bâtiment de la ferme date du XVIIIe siècle . L'édicule situé à l'ouest dans la cour postérieure du logis, peut-être à usage de séchoir, date de la limite des XIXe et XXe siècles. L'édifice comprend le logis et des communs. Le logis possède un étage carré et un étage de comble et présente cinq travées ordonnancées sur les deux façades sud et nord.","architecture":"PELTRAIS, succédant à une demeure ancienne, peut être un manoir, le château des Peltrais fut construit au cours de la seconde moitié du XIXe siècle pour Camille Parage qui y installa un haras. La chapelle fut érigée en 1850 et les communs en 1856. Le logis a été reconstruit à neuf en 1869 dans un style mélangeant les références Louis XIII et Renaissance ; sa grande similitude avec celui de la Douve, à Bourg-d'Iré, création de l'architecte angevin Auguste Bibard, milite en faveur d'une attribution à ce dernier. En même temps que le logis étaient bâtis des bâtiments probablement ceux du haras et les logis de certaines fermes appartenant au domaine et une conciergerie nommée le Chalet, installée sur la route de Chazé. Le château est un des domaines pilotes du Segréen de la deuxième moitié du XIXe siècle, où sont réalisées des expériences innovantes en matière d'élevage. Camille Parage, le fils de Frédéric, agronome, président de la société industrielle et d'agriculture de Maine et Loire, mit en valeur son domaine de La Roche d'Iré en développant des méthodes modernes d'exploitation. Implanté au milieu du parc, le logis comprend un corps rectangulaire cantonné de quatre pavillons carrés. Les encadrements de baies, les chaînages d'angles, les bandeaux et les entablements sont réalisés en tufeau de taille.","habitants":"Peltrais ; Camille Parage\r\n        \"","divers":"Château de Peltrais","gps":"","images":["../../jctruffet.com/image/image_49/49_Chaz%c3%a9_sur_Argos_1
