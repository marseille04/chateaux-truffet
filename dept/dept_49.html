ligné par une corniche à modillons. Les deux façades principales sont identiques, avec des ouvertures cintrées en rez-de-chaussée et une porte centrale cintrée. Un escalier tournant en bois occupe le centre du château, des lambris et un parquet en marqueterie subsistent dans les salles du rez-de-chaussée. Au sud-est, la chapelle néo-gothique qui conserve un court clocher carré puis conique, cantonné de colonnettes couronnées de pinacles, et orné d'arcatures en tiers point. Sa porte conserve ses vantaux à pentures d'esprit médiéval, un tympan sculpté et des colonnettes à chapiteaux. Le logis se trouve compris dans un vaste parc, et mis en valeur par une longue allée qui traverse le domaine d'ouest en est, avec deux portails (grilles en fer forgé). L'emploi de la brique comme matériau de second oeuvre, la présence d'un balcon en bois et de lambrequins illustraient le soin apporté à la réalisation de l'édifice, qui contrastait avec le château et les communs. La métairie de la Roche conserve un bâtiment ancien en grès avec des baies garnies de barreaux et une tour couverte d'un toit conique.","habitants":"Famille de la Grandière et  Pierre Adolphe Ayrault de Saint Hénis\r\n        \r\n        \"","divers":"Roches-aux-Fée à Les Lion d'Angers","gps":"","images":["../../jctruffet.com/image/image_49/49_Roches_aux_F%c3%a9es_1.jpg"]},"Consult_chateau_formulaire7250":{"id":"Consult_chateau_formulaire7250","dept":"49","canton":"Tiercé","commune":"Chenillé- Changé","nom":"Rues_49","type":"Château","periode":"XV-XVIII","histoire":"RUES, le premier acte relatif à ce château date de 1395. Après la guerre de Cent ans qui dévasta le Maine et l'Anjou, on dut restaurer le château. Le manoir du XVe siècle consistait en un corps de logis central, flanqué de deux tours. Une aile basse abritait les cuisines et l'autre les écuries : c'est toujours la disposition actuelle. En 1768 le vicomte et la vicomtesse Achille de Rougé firent reconstruire le château on conserve la pierre posée le 23 Mars 1768.  En 1918, le vicomte et la vicomtesse Olivier de Rouge construisirent la chapelle en souvenir de leurs deux filles décédées.","architecture":"RUES,  deux pavillons terminaient la cour fermée par un mur bas, bordé d'une douve. Un siècle plus tard, il fut remanié dans le style néo-gothique par larchitecte angevin René Hodé. Jardin potager accompagnant le parc paysager crée par le comte de Choulot vers 1860, clos de murs, divisé en huit carrés cernés de buis, ce jardin est ponctué, à lintersection des deux allées principales, dune fontaine et abrite bassins, rocailles et serres.","habitants":"vicomte et la vicomtesse Achille de Rougé \r\n        \"","divers":"a Chenillé-Changé château de Rues","gps":"","images":["../../jctruffet.com/image/image_49/49_Rues_49_1.jpg","../../jctruffet.com/image/image_49/49_Rues_49_2.jpg","../../jctruffet.com/image/image_49/49_Rues_49_3.jpg","../../jctruffet.com/image/image_49/49_Rues_49_4.jpg","../../jctruffet.com/image/image_49/49_Rues_49_5.jpg"]},"Consult_chateau_formulaire8416-2":{"id":"Consult_chateau_formulaire8416-2","dept":"49","canton":"Saumur","commune":"Neuillé","nom":"Salvert_Neuillé","type":"Château","periode":"XVI-XVIII","histoire":"SALVERT, au XVIe siècle se dresse un logis seigneurial. Par l'édification de l'aile est ouest, au XVIIIe siècle, Salvert devient un château abritant de vrais salons et des chambres confortables. Pierre Petit, Charles de Savonnières et René Lejumeau, seigneur de Blou se succèdent. Par mariage le château passe des Lejumeau aux Leroux de Mazé. En 1846, Amélie Leroux épouse le Baron Louis Eugène Le Pelletier. Ce sont eux qui seront les auteurs d'un vaste projet dont la construction du château n'est que l'élément final, en 1862, un projet d'envergure chemise l'ancien logis du XVIe siècle et l'aile XVIIIe siècle en les complétant par des adjonctions osées.","architecture":"SALVERT, les deux châteaux accolés dans une disposition en équerre seront maintenus unis par une même ornementation de façades mais en style gothique cette fois, tant pour la modernisation des anciennes structures que pour les constructions complémentaires au bâti ancien. Les sculpteurs sont chargés de faire du château le plus sculptés et le plus gothique de toute la province. Malgré un programme de sculptures chargé, malgré la profusion d'ajouts divers que sont crêtes de faîtage, épis, fleurons, consoles, créneaux et choux en ronde-bosse, la coexistence des architectures du XVIe siècle et néo-gothique ne parviendra pas à être gommée totalement procurant à ce château un aspect surprenant par son foisonnement de sculptures, de cheminées, de tourelles qui percent des toits à combles brisés.","habitants":"Baron Louis Eugène Le Pelletier\r\n        \"","divers":"Salvert à Neuillé : 47° 20' 31,02\" Nord 0° 01' 47,66\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Salvert_Neuill%c3%a9_1.jpg","../../jctruffet.com/image/image_49/49_Salvert_Neuill%c3%a9_2.jpg","../../jctruffet.com/image/image_49/49_Salvert_Neuill%c3%a9_3.jpg","../../jctruffet.com/image/image_49/49_Salvert_Neuill%c3%a9_4.jpg"]},"Consult_chateau_formulaire4e42":{"id":"Consult_chateau_formulaire4e42","dept":"49","canton":"Saumur","commune":"Saumur","nom":"Saumur","type":"Château","periode":"XIV-XV","histoire":"Quatre châteaux à Saumur dont celui de Saumur, le Belvédère, de Beauregard, de la Verrières du XIXe siècle hôtel de Yolaine de Valbray-Auger, du Vieux-Bagneux et de Pocé à Distré. Mis à part Saumur pas d'info pour les autres.                                                                   SAUMUR, a connu ses premières fortifications sous Thibaud, comte de Blois au Xe siècle. En 1026, il devint propriété du comte d'Anjou, le célèbre Foulques Nerra qui avait édifier le donjon le légua à ses héritiers Plantagenêt. Philippe Auguste, roi de France et capétien, l'annexa à la couronne. En 1227, Saint-Louis fait rehausser le fort devenu français et à partir de 1367 Louis Ier d'Anjou petit fils de Philippe VI, fait remplacer les vieilles tours rondes par des tours octogonales. Le roi René d'Anjou, bon roi René, écrivain, homme cultivé et bâtisseur de forteresse (Tarascon) améliore le confort de l'ensemble. Au XVIe siècle, Phlippe de la Mornay gouverneur de la place utilise l'italien Bartolomeo renforce les défenses du château. Il fit élever autour du château médiéval des défenses basses des fortins et courtines suivant un plan en étoile, très moderne, un siècle avant Vauban. Moins glorieux, le château devint prison sous Louis XIV et Napoléon. En 1889, l'état revend en 1902 le château à la ville de Saumur. Les importants travaux de restauration sont dirigés par l'architecte en chef Lucien Magne, et depuis 1912 cité de l'école de cavalerie et du Cadre Noir musée des arts et au deuxième étage du cheval.","architecture":"BELVEDERE. est un hôtel bâti à Saumur. La période de construction date de la 1ère moitié du XIXe siècle. Les éléments protégés aux M.H. sont la façade sur le quai et la toiture correspondante, le belvédère et le passage voûté, depuis le 21/05/1969.                                                                  SAUMUR,  édifier au XIVe siècle, l'accès  restauré se fait par un escalier monumental en pierres de taille. Quoique moins laid que la passerelle en béton ajoutée ensuite, cet escalier a vécu moins d'un siècle. A partir de 1912, le musée municipal, à l'étroit dans les locaux de l'hôtel de ville, est installé dans l'aile septentrionale restaurée. Il est enrichi par des donations, en particulier des peintures de Trouillebert et l'herbier Abot. En 1919 le legs de la collection du comte lair constitue un apport considérable pour le Musée des Arts décoratifs, l'intérieur de l'aile Est et la tour sud-est sont restaurés vers 1920 afin de pouvoir présenter les plus beaux objets. Le 22 avril 2001, la partie ouest du rempart nord s'est effondrée, il s'ensuivit un chantier de stabilisation du sous-sol et de reconstruction du rempart qui s'est achevé en 2007.                                                                                       A l'ouest à Distré le château de POCE; durant tout le Moyen-âge, centre dun fief important. La silhouette de lancien château seigneurial, visible de loin, rappelle encore sa vocation de forteresse. Le châtelet dentrée du XVe siècle, très bien conservé, se compose de deux tours rondes reliées par un corps de bâtiment central. Lensemble est couronné de hauts créneaux et mâchicoulis.","habitants":"Saumur;  roi René d'Anjou,\r\n        \r\n        \"","divers":"Saumur, le Belvédère grav-6, de Beauregard grav-5, de la Verrières grav 4 du Vieux-Bagneux et de Pocé à Distré grav 7-8-9.     Belvedère : 47° 15' 36\" Nord, 0° 04' 37\" Ouest             Vieux saumur  47° 14' 32\" Nord et 0° 05' 22\" Ouest grav-1-2-3-4","gps":"","images":["../../jctruffet.com/image/image_49/49_Saumur_1.jpg","../../jctruffet.com/image/image_49/49_Saumur_2.jpg","../../jctruffet.com/image/image_49/49_Saumur_3.jpg","../../jctruffet.com/image/image_49/49_Saumur_4.jpg","../../jctruffet.com/image/image_49/49_Saumur_5.jpg","../../jctruffet.com/image/image_49/49_Saumur_6.jpg","../../jctruffet.com/image/image_49/49_Saumur_7.jpg","../../jctruffet.com/image/image_49/49_Saumur_8.jpg","../../jctruffet.com/image/image_49/49_Saumur_9.jpg"]},"Consult_chateau_formulaire8d07":{"id":"Consult_chateau_formulaire8d07","dept":"49","canton":"Angers","commune":"Savennières","nom":"Savennières","type":"Château","periode":"XVI-XVII","histoire":"Trois châteaux à Savennières, celui  de Bizolière, d'Epiré viticole, celui de  Varennes et de Vault.                                                                  EPIRE, construit en 1850 sur une ancienne maison de maître. Pendant la période des Plantagenêts au XIe siècle, alors que lAnjou et la couronne dAngleterre étaient liés, commencèrent lexportation des vins de Savennières et dEpiré vers la Grande-Bretagne. Cest pour cette raison que lon trouve dans les collèges dOxford et de Cambridge des amateurs de vins de Savennières. Dans un bel environnement de vignobles, le parc paysager du château dEpiré, créé en 1839, domine la vallée, ses percées ouvrant de jolies perspectives sur la Loire. Au long des allées, le visiteur découvre des arbres exotiques bien acclimatés. Le vaste jardin potager, divisé en carrés, abrite des arbres fruitiers et fleurs.","architecture":"VARENNES, les abords du château sont organisés selon un jeu de terrasses et d'escaliers. Autour de la cour d'honneur, les bâtiments, datant des XVIIe et XVIIIe siècles, sont disposés en plan en U. Le domaine comprend une chapelle originale du XVIIe siècle au décor baroque ainsi qu'une grotte transformée en chapelle funéraire. Le parc, dont les structures anciennes subsistent (escaliers, murs tallutés, nymphée), témoigne d'aménagements successifs dans l'esprit du jardin pittoresque. Il présente des petites fabriques et des édicules organisés selon une \"promenade de l'eau\".                                                                                                    VAULTS, aux XVIe-XVIIe siècles, il s'agit dans un logis assez simple (partie centrale du château) que résidait le seigneur des Vaults, vassal des propriétaires de la châtellerie de Serrant. En 1830, la partie centrale de la demeure est refaite et les deux pavillons latéraux sont construits avec les armoiries des Walsh de Serrant dans le haut des fenêtres. Le parc paysager, remodelé en 1852 pour François Claude Fourmond Desmazières, est établi entre les coteaux arides voués à la vigne et la vallée de la Loire. Le paysage recomposé dessences rares et exotiques, cyprès de Lambert, chênes verts, cyprès chauves, platanes, répond aux façades du château, embaumant au fil des saisons, les glycines, le jasmin ou les roses.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"à Savennières, celui  de Bizolière grav-4, d'Epiré viticole grav-1, celui de  Varennes grav-5 et de Vault.    Vault  47° 23' 02\" Nord, 0° 39' 23\" Ouest  grav-6-7","gps":"","images":["../../jctruffet.com/image/image_49/49_Savenni%c3%a8res_1.jpg","../../jctruffet.com/image/image_49/49_Savenni%c3%a8res_2.jpg","../../jctruffet.com/image/image_49/49_Savenni%c3%a8res_3.jpg","../../jctruffet.com/image/image_49/49_Savenni%c3%a8res_4.jpg","../../jctruffet.com/image/image_49/49_Savenni%c3%a8res_5.jpg","../../jctruffet.com/image/image_49/49_Savenni%c3%a8res_6.jpg","../../jctruffet.com/image/image_49/49_Savenni%c3%a8res_7.jpg"]},"Consult_chateau_formulaire0791-2":{"id":"Consult_chateau_formulaire0791-2","dept":"49","canton":"Segré","commune":"Segré","nom":"Segré","type":"Château","periode":"XIII-XV-XIX","histoire":"SEGRE, en 1589, le comte de La Rochepot, gouverneur d'Anjou, au nom du roi Henri III, s'empare de Segré qui était jusque-là aux mains des ligueurs. Après avoir pillé la cité, il fait démanteler le château et les murs d'enceinte ainsi que tous les manoirs fortifiés de la contrée. En 1635, la terre de Segré est érigée en baronnie au profit d'un protégé de Richelieu, Guillaume II de Bautru, seigneur de Louvaines. il est en vente.                                                                                 MALADRIE le château aurait été élevé en 1066 par le comte d'Anjou Foulques le Réchin ; à la même époque fut  érigée l'enceinte fortifiée qui fera de Segré l'une des 32 villes closes de l'Anjou. L'ancienne église Saint-Sauveur est également mentionnée en 1097, et la Madeleine, alors simple chapelle, en 1077. Lors des guerres livrées aux Anglais et aux Bretons, la ville est assiégée à trois reprises: en 1422, 1433 date à laquelle le comte d'Arundel rase le donjon et enfin en 1490. Désormais le château est devenu inhabitable et la paroisse de Saint-Sauveur décline au profit de celle de la Madeleine. Pendant la Ligue, la ville fut occupée par la troupe catholique en 1591 et par le duc de Vendôme en 1621. En 1800, le choix de Segré pour être le siège de la sous-préfecture entraîne tout au long du siècle d'importantes modifications urbaines.","architecture":"SEGRE, ce beau château remanié en 1866 a conservé son caractère du XVe siècle avec de grandes fenêtres à meneaux, hautes lucarnes à gâble, pavillon percé de meurtrières, ancien châtelet transformé en chapelle.  D'une surface habitable d'environ 500m², le château comporte une quinzaine de pièces ornées de beaux éléments décoratifs  avec au rez-de-chaussée surélevé : entrée, départ d'un bel escalier en chêne, grand salon, petit salon, salle à manger,  bureau et autre escalier dans une tour. Au premier étage : 7 chambres, 3 salles de bains, cabinet de toilette avec douche, wc. Au-dessus se trouvent des chambres secondaires. Au rez-de-jardin : un appartement avec salle de séjour, coin cuisine, une chambre, salle de bains, wc et salle de jeux. Les dépendances comprennent : Un bâtiment abritant 3 garages et au-dessus, un ancien logement. L'aile compte 3 remises. Une ancienne maison annexe de 80m² au sol avec : Au rez-de-chaussée : une salle de séjour avec cheminée, un salon, une salle de bains. Au-dessus : 4 chambres. Cette maison se prolonge par d'anciennes écuries et remises. Segré  authentique donjon classé M.H. des XIIIe.                                                                                                       MALADRIE est construit au cours de la première moitié du XIXe siècle. Château composé d'au moins deux corps de bâtiments définissant un plan régulier en L . L'un d'entre eux dispose d'une tour d'escalier quadrangulaire demi-hors-oeuvre couverte en pavillon.","habitants":"Segré;  Guillaume II de Bautru,                                         Maladrie;comte d'Anjou Foulques le Réchin\r\n        \"","divers":"Maladrie grav 3-4                                                                       Segré  47° 41' 14\" Nord, 0° 52' 15\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Segr%c3%a9_1.jpg","../../jctruffet.com/image/image_49/49_Segr%c3%a9_2.jpg","../../jctruffet.com/image/image_49/49_Segr%c3%a9_3.jpg","../../jctruffet.com/image/image_49/49_Segr%c3%a9_4.jpg","../../jctruffet.com/image/image_49/49_Segr%c3%a9_5.jpg"]},"Consult_chateau_formulairea44e":{"id":"Consult_chateau_formulairea44e","dept":"49","canton":"Angers","commune":"Seiches sur le Loir","nom":"Seiches_sur_Loire","type":"Château","periode":"XIV-XV-XIX","histoire":"Tois châteaux à Seiches sur le Loir, Brignac, Garenne, et Verger   \r\nBRIGNAC, ancienne seigneurie de Coué achetée en 1839 par le vicomte de Villoutreys de Brignac. Le château actuel, bâti par larchitecte René Hodé, en 1856, à la demande du comte de Villoutreys, est représentatif du courant néo-gothique en Anjou. Les tourelles d'angles de la demeure sont pourvues d'une échauguette. A lintérieur de la demeure, il convient de remarquer le décor éclectique des pièces de réception. Le parc à l'anglaise a été dessiné par le comte de Choulot. Il existe également une chapelle du XVII ou XVIIIe siècle.                                                       GARENNE, la construction du château de la Garenne date de 1846, fut construit pour Jean Ouvrard, ancien maire de la commune, au lieu-dit le Grand-Chaussé. Il a la forme d'un quadrilatère. La façade Nord-Est du château de la Garenne est flanquée de 2 tourelles, couvertes d'un toit pointu. Le château de la Garenne fut racheté, plus tard, par Emile Alexis Segris, avocat d'affaires, juge, député, ministre de l'instruction civique et ministre des finances.","architecture":"VERGER, en 1441, le premier château du Verger, qui était une ferme fortifiée entourée de douves et pourvue d'un pont-levis, appartenait à Pierre Chabot, un bourgeois d'Angers. En 1482, le maréchal de Gié le racheta et décida de faire rebâtir une nouvelle demeure. Commencée en 1494, le nouveau château fut achevé en 1499. L'un des descendants du maréchal, le cardinal de Rohan, le fit démolir en 1776. Des vestiges encore imposants de l'immense château sont encore visibles : tours à mâchicoulis, fossés, douves, mur de clôture du parc et des écuries, ancien logis prioral et bâtiment du XVIe. C'est là où fût signé le Traité du Verger, par Charles VIII, roi de France, et François II, duc de Bretagne le 19 août 1488. Il stipule que lhéritière du Duché ne put se marier sans laccord du roi de France. Le château du Verger est en cours de rénovation et n'est pas ouvert au public. Il peut néanmoins être admiré de la route.","habitants":"Brignac,Vicomte de Villoutreys de Brignac                             Garenne, Famille de  Jean Ouvrard                                         Verger;  maréchal de Gié \r\n        \"","divers":"à Seiches sur le Loir, Brignac  grav 5-6, Garenne, et Verger grav 1 à 4  Brignac: 47° 34' 25\" Nord, 0° 21' 17\" Ouest                              Garenne  47° 34' 25\" Nord et 0° 21' 17\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Seiches_sur_Loire_1.jpg","../../jctruffet.com/image/image_49/49_Seiches_sur_Loire_2.jpg","../../jctruffet.com/image/image_49/49_Seiches_sur_Loire_3.jpg","../../jctruffet.com/image/image_49/49_Seiches_sur_Loire_4.jpg","../../jctruffet.com/image/image_49/49_Seiches_sur_Loire_5.jpg","../../jctruffet.com/image/image_49/49_Seiches_sur_Loire_6.jpg","../../jctruffet.com/image/image_49/49_Seiches_sur_Loire_7.jpg"]},"Consult_chateau_formulaire1090":{"id":"Consult_chateau_formulaire1090","dept":"49","canton":"Angers","commune":"Saint-Georges sur Loire","nom":"Serrant_49","type":"Forteresse","periode":"XVI","histoire":"SERRANT. Dans les années 1530, Françoise de Serrant apporte par alliance à Jean de Brie, Serrant revient à son demi-frère Charles. Le château, inachevé, est vendu par adjudication en 1597 à Jean de Brie et ses fils. En 1596, Hercule de Rohan, duc de Montbazon, devient le propriétaire des lieux. C'est surtout en 1636 que l'académicien  Guillaume Bautru l'achète, que les travaux connaissent un nouvel essor. Né à Angers en 1588, Guillaume Bautru est conseiller d'État sous Louis XIII et Louis XIV, introducteur des ambassadeurs chez le roi, ministre plénipotentiaire.  Malgré le siècle qui sépare les travaux commandés par Guillaume Bautru ainsi que ceux réalisés par son prédécesseur, Hercule de Rohan, l'unité de la construction a été préservée, grâce à un strict respect du programme établi au XVIe siècle. Guillaume Bautru meurt le 7 mars 1665. Sa petite-fille, Marguerite de Bautru, épousa son cousin Nicolas Bautru le marquis de Vaubrun. À la mort de son mari, tué à la bataille d'Altenheim, la marquise poursuivit les travaux jusqu'en 1705. Elle fit bâtir par Jules Hardouin Mansart,  le château passe à sa soeur la duchesse  d'Estrées vend le domaine en 1749 , Antoine Walsh officier de marine Irlandaise,  il est issu d'une vieille famille irlandaise qui s'est exilée en France avec le titre de comte en 1755.  En 1830, la comtesse Valentine Walsh de Serrant épouse le Duc de la Trémoille , toujours dans la descendance à la duchesse de la Trémoille.","architecture":"SERRANT. à l'origine une forteresse,  passe à l'architecture Renaissance sera amélioré le long des siècles, défendue de toute part grâce à des ponts-levis, des douves et des tours massives qui dominent la campagne environnante. le corps de logis central  surélevé d'un étage,  le centre de la façade est surmontée d'un fronton des baies cintrées éclairent la cage d'escalier  les fenêtres son entourées de chaînes de pierre blanche cette façade est accostée de deux grosses tours rondes  surmontées de bulbes coiffés de lanternon  ainsi que la tour sud et les deux ailes en retour sur la cour achevées en 1710, deux pavillons carrées aux angles libres de la cour parachèvent la symétrie de cet ensemble, la monumentale grille d'honneur, qui porte leur blason : un cygne navré, c'est à dire percé d'une flèche. En 1755, Serrant fut érigé en comté.  Le duc fait restaurer le château par l'architecte Lucien Magne. De cette époque datent la belle balustrade ornée de pots-à-feu, les chapiteaux qui couronnent les fenêtres du deuxième étage, et le blason des la Trémoille au dessus de l'entrée principale.","habitants":"Famille de Jean de Brie et Guillaume Bautru\r\n        \"","divers":"Serrant 47° 24'54,82\" Nord et 0°44'38,54\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Serrant_49_1.jpg","../../jctruffet.com/image/image_49/49_Serrant_49_2.jpg","../../jctruffet.com/image/image_49/49_Serrant_49_3.jpg","../../jctruffet.com/image/image_49/49_Serrant_49_4.jpg","../../jctruffet.com/image/image_49/49_Serrant_49_5.jpg","../../jctruffet.com/image/image_49/49_Serrant_49_6.jpg"]},"Consult_chateau_formulairef79a":{"id":"Consult_chateau_formulairef79a","dept":"49","canton":"Tiercé","commune":"Marigné_Soeudre","nom":"Soeudre_Marigné","type":"Château","periode":"XV","histoire":"PERRINE, ancienne terre noble avec château appartenant aux puissantes familles Giffard et Champagné et qui restera dans la même famille de 1480 jusqu'en 1789. En est dame alors Geneviève Lemaire de la Mairerie puis sa fille Jane Caroline Legoué épouse de David Ferdinand Deschamps du Mery de La Guitterie. Le château sera vendu au vicomte Alexandre Laplanche de Ruillé en 1853 qui entreprendra sa reconstruction et l'aménagement d'un parc paysagé. Urbain Auguste Lemotheux en fait l'acquisition en 1865, construit les communs et le jardin potager. Par succession le comte Alphonse Désiré de Burgat le vendra à madame Harel-Mariotti en 1925. Monsieur Landais-Charbonneau père de madame Jacqueline Emery-Landais, l'actuelle propriétaire, en fait acquisition en 1946. Mme Jacqueline Emery continue aujourd'hui la restauration du château et l'entretien de ce magnifique parc.","architecture":"A cinq kilomètres au nord-Est à Soeudres  le château de Moyre et le manoir de la Touche Moreau du XVIe siècle privé.                                                                                                                 MOYRE, château du premier Empire entouré de douves dans un beau parc Hall et large escalier de pierre, construit en 1810 sur l'emplacement d'un château ancien, de style classique dont la façade élevée sur trois niveaux est couronnée en son centre d'un fronton est sertie d'une balustrade.","habitants":"Familles; Vicomte Alexandre Laplanche de Ruillé \r\n        \"","divers":"Perrine grav_3                                                                             Moyre grav 2","gps":"","images":["../../jctruffet.com/image/image_49/49_Soeudres_Marign%c3%a9_1.jpg","../../jctruffet.com/image/image_49/49_Soeudres_Marign%c3%a9_2.jpg","../../jctruffet.com/image/image_49/49_Soeudres_Marign%c3%a9_3.jpg"]},"Consult_chateau_formulaireeba9":{"id":"Consult_chateau_formulaireeba9","dept":"49","canton":"Cholet","commune":"Somloire","nom":"Somloire","type":"Château-fort","periode":"XIV","histoire":"SOMLOIRE, la liste des seigneurs de Somloire depuis 1311, est longue, en voici quelques uns : en 1696, Charles Barillon, maître des lieux à l'époque, cède le domaine par échange à Thomas Dreux, marquis de Brézé, lieutenant général des Armées du Roi et grand maître des cérémonies de France, mort en 1749, son fils Joachim épouse Jeanne de Courtavel, ils ont une fille Charlotte qui épouse le comte de Rochelambert, qui est en 1789, le dernier seigneur de Somloire. Il laisse la terre à sa fille Amandine qui, en 1818, épouse Arnaud de Pontgibaud. En 1869, la propriété et le château sont mis en vente et en 1873, le comte Arthur des Nouhes s'en porte acquéreur. Puis le domaine est transmis aux familles des Nouhes, de Champagny et Huon de Penanster de Fontaines.","architecture":"SOMLOIRE, château fort du XIVe siècle : gros-oeuvre logis, deux tours vers ouest d'un édifice détruit, cheminée logement de domestiques ouest, rajout quatre tours d'angle du XVIe, ouvertures reprises au XVIe et limite XVIe siècle XVIIe siècle , portail XVIe siècle remployé provenant de Saint-Savin, ouvertures logement de domestiques ouest limite XVIe-XVIIe siècle, reprises deuxième moitié XIXe siècle.","habitants":"Thomas Dreux, Marquis de Brézé,\r\n        \"","divers":"Château de Somloire 47° 02' 03\" nord, 0° 36' 25\" ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Somloire_1.jpg","../../jctruffet.com/image/image_49/49_Somloire_2.jpg","../../jctruffet.com/image/image_49/49_Somloire_3.jpg","../../jctruffet.com/image/image_49/49_Somloire_4.jpg"]},"Consult_chateau_formulaire2608":{"id":"Consult_chateau_formulaire2608","dept":"49","canton":"Chemillé-Melay","commune":"Chemillé d","nom":"Sorinière","type":"Château","periode":"XV","histoire":"SORINIERE, Marie de Pierres, épouse de François de Brie est la première dame de la Sorinière relevée vers 1450. Quatre générations plus tard, le château passe à René d'Escoublant (1598-1634), époux de Catherine Jousseaume, par la mère de René : Renée de Brie épouse Michel d'Escoublant. C'est leur fille Marie d'Escoublant qui apporte la terre de la Sorinère à François du Verdier, en 1669. Trois générations plus tard on trouve Claude François du Verdier de La Sorinière (1701-1784), président de l'Académie d'Angers. Lors de la Révolution, une de ses filles, Rosalie du Verdier de la Sorinière, bénédictine au Calvaire d'Angers et sa belle-fille Marie de la Dive, veuve d'Henri-François-Esprit-Sophie du Verdier de la Sorinière (1725-1790), réfugiées au Longeron, sont arrêtées le 19 janvier 1794 et guillotinées place du ralliement, à Angers, les 26 et 27 janvier 1794. Mme de la Sorinière, veuve depuis avril 1790, n'avait pas voulu émigrer ni passer la Loire. Elle était revenue avec ses deux filles au Longeron. Cest en novembre 1792 que vint les rejoindre sa belle-sur, religieuse. Lors de la Révolution, toute la famille fut guillotinées. Propriété du colonel comte O'Kelly Farell.","architecture":"SORINIERE,  construit au XVe siècle  sur les ruines  d'un édifice ancien,  fut incendié pendant les guerres de religion, reconstruit, de nouveau incendié pendant les guerres de Vendée en 1793 reconstruit en 1805. Parmi ses derniers trésors, Chemillé conserve encore des ruines de la collégiale Saint Léonard qui a été incendiée en 1794 par les colonnes infernales ayant ravagé la Vendée militaire. La Sorinière garde aussi encore debout un château des plus anciens qui conserve notamment les deux grosses tours, les douves, le pont-levis et sa herse médiévale. Depuis 1921, la chapelle du château de la Sorinière est classée au titre des M.H. pour ses peintures murales. Ce monument, construit au XVIe siècle par la famille du Verdier, renferme en son intérieur des peintures à la détrempe qui figurent parmi les oeuvres les plus artistiques que le XVIe siècle a pu léguer à l'Anjou.","habitants":"Famille de Michel d'Escoublant et du Verdier\r\n        \"","divers":"A Chemillé d'anjou 47° 13' 14\" nord, 0° 41' 56\" ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Sorini%c3%a8re_1.jpg","../../jctruffet.com/image/image_49/49_Sorini%c3%a8re_2.jpg","../../jctruffet.com/image/image_49/49_Sorini%c3%a8re_3.jpg"]},"Consult_chateau_formulaire5a8d-2":{"id":"Consult_chateau_formulaire5a8d-2","dept":"49","canton":"les Ponts de Cé","commune":"Soulaines_sur_aubance","nom":"Soulaines_Aubance","type":"Château","periode":"XVII","histoire":"A SOULAINES, les ruines du XVIIe siècle de l'ancien château de la Morinière (classé MH).  Le manoir de la Constantinière, dit château avec puits, et chapelle. Le logis  (inscrit MH), édifice agricole du XVIIe siècle.  La mairie du XVIIe siècle.  Le manoir dit château de Rochambeau, du XIXe siècle. Le manoir dit château de la Verronière, des XVIIIe et XXe siècles.                                                                                       NOIZE Le manoir dit château de Noizé, des XVIIIe et XIXe siècles, édifié en 1755, il fut incendié par les armées républicaines en juillet 1793 et reconstruit par la suite. C'est aujourd'hui un domaine privé. Ferme et écurie du XIXe siècle.","architecture":"CONSTANTINIERE, est un témoin remarquable de ce que pouvait être une grande demeure rurale angevine de la fin du XVIIe siècle, accessible après avoir franchi un portail en demi-cercle. L'édifice fut probablement construit entre 1664 et 1685, pour servir de maison de campagne à Gilles Lespagneul de la Plante. La porte d'entrée principale du logis marquée des initiales GL et CM et sculptée d'une tête d'épagneul indique selon toute vraisemblance l'identité des commanditaires, Gilles Lespagneul de La Plante receveur des tailles à Saumur et de son épouse depuis 1688 Claude Morineau, fille du receveur des gabelles en Anjou, résidant principalement en leur hôtel des Ponts de Cé. Après 1705, leur fils second, René, y réside en permanence. La propriété possède des jardins à la Française avec son vivier, un potager et un jardin de fruits rouges, une chapelle et une orangerie. Propriété de monsieur Roger Couffin.","habitants":"Famille de Gilles Lespagneul de la Plante\r\n        \"","divers":"Soulaines_sur_aubance  Noizé  grav 3                                                            47° 22' 32\" Nord et 0° 31' 09\" Ouest.                                             Constantinière grav 2","gps":"","images":["../../jctruffet.com/image/image_49/49_Soulaines_Aubance_1.jpg","../../jctruffet.com/image/image_49/49_Soulaines_Aubance_2.jpg","../../jctruffet.com/image/image_49/49_Soulaines_Aubance_3.jpg"]},"Consult_chateau_formulaire60f8":{"id":"Consult_chateau_formulaire60f8","dept":"49","canton":"Saumur","commune":"Souzay-Champigny","nom":"Souzay_Champigny","type":"Château","periode":"XV-XVI","histoire":"Trois châteaux à Souzay Champigny  le Souzay,  le Villeneuve   de La Bien-Boire, viticole et musée du patrimoine de France.                                                          SOUZAY-Champigny, le château de Marguerite d'Anjou est , en effet une magnifique demeure semi-troglodite. Ce fut en ce lieu que mourut en 1482, la reine d'Angleterre, héroïne de la guerre des Deux Roses. Née en 1429, elle était la fille de René Ier d'Anjou et d'Isabelle duchesse de Lorraine. Elle avait épousée le roi d'Angleterre Henry IV et joué un rôle important auprès de son époux; elle avait combattu avec acharnement Richard duc d'York, et tenté en vain de l'établir sur le trône, après le meurtre de son mari  en 1471, son fils Edouard, prince de galles, qui fut lui aussi assassiné. Elle vint alors chercher repos et refuge au village de Souzay-Champigny.                                                                    VILLENEUVE, en 1577 la maison de Bel-Air appartenait à la famille de Villeneuve (Hobereau des Ducs de Luynes). Celle-ci était destinée au fils aîné, qui fût tué à la bataillle de York en Amérique, sous les ordres de Lafayette. C'est donc Jean Marie Berthelot de Villeneuve qui donna le nom définitif à la propriété et au vignoble. En 1867, propriété de la famille de Foucault et de Bossoreil qui remanièrent le château. Il fût occupé en 1940 et bombardé par les alliés le 13 juin. La famille Chevalier en devient propriétaire en 1969, elle le restaure entièrement pour lui donner son aspect actuel.","architecture":"VILLENEUVE, bâti dans une enceinte fortifiée préexistante, ce manoir garde pour lessentiel sa structure du XVe siècle, malgré des remaniements postérieurs. Lensemble présente les caractéristiques des résidences seigneuriales élevées peu après la fin de la Guerre de Cent Ans, qui allie système défensif et architecture dagrément pour la demeure: on note le châtelet fortifié, avec son porche du XIVe siècle à double ouverture, dont la facture est très soignée et sur la façade du logis, les vestiges de lordonnance typique des manoirs ruraux de cette époque. Les bâtiments agricoles occupent l'emplacement des murs d'enceinte et s'organisent autour d'une cour. Le corps de logis, construit sur des caves voûtées plus anciennes, pouraît dater du XVe siècle. Il est pourvu d'une tour d'escalier octogonale et conserve des cheminées du XVe siècle et des grilles de fenêtres de la même époque, il a été remanié au XVIIe siècle.","habitants":"Souzay,Maguerite d'Anjou                                   Villeneuve,famille de Villeneuve\r\n        \"","divers":"Trois châteaux à Souzay Champigny grav 1-2-3-4  le Souzay,  le Villeneuve grav 7   de La Bien-Boire grav-5 nazé Grav 8  47° 13' 50\" nord, 0° 00' 36\" ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Souzay_Champigny_1.jpg","../../jctruffet.com/image/image_49/49_Souzay_Champigny_2.jpg","../../jctruffet.com/image/image_49/49_Souzay_Champigny_3.jpg","../../jctruffet.com/image/image_49/49_Souzay_Champigny_4.jpg","../../jctruffet.com/image/image_49/49_Souzay_Champigny_5.jpg","../../jctruffet.com/image/image_49/49_Souzay_Champigny_6.jpg","../../jctruffet.com/image/image_49/49_Souzay_Champigny_7.jpg","../../jctruffet.com/image/image_49/49_Souzay_Champigny_8.jpg"]},"Consult_chateau_formulairebe58":{"id":"Consult_chateau_formulairebe58","dept":"49","canton":"La Pommeraye","commune":"Saint-Florent le Vieil","nom":"St_Florent_le_Vieil","type":"Forteresse","periode":"XIV","histoire":"St-FLORENT, en 1343, le sel devient un monopole d'État par une ordonnance du roi Philippe VI de Valois, qui institue la gabelle, la taxe sur le sel. L'Anjou fait partie des pays de  grande gabelle  et comprend seize tribunaux spéciaux ou « greniers à sel », dont celui de Saint-Florent-le-Vieil.\r\nLe 24 novembre 1369, des lettres patentes de Charles V autorisent l'abbaye de Saint-Florent, sous le coup d'une menace immédiate, en raison de l'avance en Anjou des troupes anglaises commandées par le comte de Pembroke et Hugues de Calveley, à se fortifier en urgence. En 1423, les habitants du bourg donnent 1 000 livres à l'abbaye pour restaurer les fortifications. Le jour de la Saint-André en 1426, une bande de routiers tente d'escalader les murs et de prendre le bourg, en vain.","architecture":"St-FLORENT, pendant son règne, Foulques Nerra y construisit une forteresse, sur le promontoire dominant la Loire. Il fait  ériger une motte surmontée d'un donjon. Cette motte est encore visible sur le promontoire et sert aujourd'hui de support à la colonne de la duchesse d'Angoulême. Le successeur de Foulques Nerra, Geoffroy Martel, fait fortifier l'abbaye et le bourg attenant par une enceinte, en confiant la garde de la place aux moines. Geoffroy III confirme le droit des moines, sous condition de ne pas remettre la place à un tiers. En 1130, Geoffroy Plantagenêt s'engage à ne pas établir de communes sur le territoire de l'abbaye.","habitants":"Foulques Nerra et  Geoffroy Plantagenêt\r\n        \r\n        \"","divers":"La tour de la Gabelle à st-Florent","gps":"","images":["../../jctruffet.com/image/image_49/49_St_Florent_le_Vieil_1.jpg","../../jctruffet.com/image/image_49/49_St_Florent_le_Vieil_2.jpg","../../jctruffet.com/image/image_49/49_St_Florent_le_Vieil_3.jpg"]},"Consult_chateau_formulaire2edc":{"id":"Consult_chateau_formulaire2edc","dept":"49","canton":"Doué la Fontaine","commune":"St-Georges sur Layon","nom":"St_Georges_Layon","type":"Château","periode":"XVI-XVIII","histoire":"MINES, gros-oeuvre construit après 1775 et avant 1835 pour la compagnie des mines de Saint Georges; les bâtiments agricoles portent la date de 1821, le château fut entièrement remanié ainsi  que les communs, le pavillon d'entrée, sur le territoire de Concourson-sur-Layon, bâtis à partir de 1862 par Ernest Dainville et l'orangerie datant de 1864. L'édifice de plan symétrique se compose d'un étage carré et d'un étage de comble, le gros-oeuvre est réalisé en calcaire, moellon, enduit, tufeau, grison, pierre de taille, appareil mixte et bossage, élévations à travées surmontées de toit à longs pans  brisés, toit en pavillon, pignon couvert et croupe en ardoise.","architecture":"CHATELAISON manoir (anciennement \"La Grand' Maison\" date du début du XVIe siècle. Il montre une façade asymétrique présentant quatre ouvertures principales en pierres de tuffeau moulurées et sculptées de motifs gothique flamboyant. La tourelle excentrée est occupée par un escalier à vis qui donne accès aux deux pièces du rez-de-chaussée, du premier étage ainsi qu'au grenier. Manquent les lucarnes qui, si elles étaient prévues dans la charpente, n'ont  jamais été construites. À l'arrière, dominant la rivière \"Le Layon\", se trouve une construction sensiblement carrée qui se détache de la façade ; ce plan se retrouve sur quelques manoirs angevins. Cette construction est récente, elle a été édifiée lors des restaurations du logis sur les fondations retrouvées au pied du mur qui à l'étage, montrait deux portes murées de moellons. Toutes les menuiseries ont été créées à partir de modèles existants sur des bâtiments de la même époque, équipées de vitraux. La porte d'entrée a pour modèle celle d'un musée du Mans.","habitants":"Seigneurs locaux\r\n        \r\n        \r\n        \"","divers":"St-Georges sur Layon Mines grav_1    47° 11' 54\" nord, 0° 22' 02\" ouest                                                                                       Chelaison grav_2","gps":"","images":["../../jctruffet.com/image/image_49/49_St_Georges_Layon_1.jpg","../../jctruffet.com/image/image_49/49_St_Georges_Layon_2.jpg"]},"Consult_chateau_formulaireb192":{"id":"Consult_chateau_formulaireb192","dept":"49","canton":"Doué la Fontaine","commune":"Saint Georges sur Loire,","nom":"St_Georges_sur_Loire","type":"Château","periode":"XIV-XVI","histoire":"Trois châteaux dont Epinay, Bénaudière et Comterie.              EPINAY, l'histoire remonte au XIIIe siècle et peut être à l'an mil pour les premières fortifications. Toutefois, la partie principale de la demeure date des XVIe et XVIIIe siècles. De grandes familles angevines ont possédé le fief de l'Epinay. Aux Gastinel, fondateurs du fief au XIIe siècle ont succédé les Montalais de Vern aux XVe et XVIe, les La Jaille en 1451, les Brie-Serrant, les d'Andigné. C'est à la fin du XVIe siècle que la terre passe par mariage à la famille d'Andigné qui le conservera jusqu'en 1730, date à laquelle les de Cumont en deviennent propriétaires. Un des descendants de cette famille, Arthur de Cumont qui hérita en 1874 de la propriété, était ministre de l'Instruction Publique. A notre époque, le fief fut longtemps la propriété de Mr Gasiorowski, maire de Saint-Georges. Il est racheté en 1988 par l'ancien propriétaire, alors qu'il avait souffert de longues années d'abandon et menaçait de tomber en ruine.                              BENAUDIERE, est un ancien château fort, construit au XVIe siècle. Le domaine appartenait aux seigneurs de Serrant au XVIe siècle. A partir de 1601, il devint la propriété de familles de la haute bourgeoise d'Angers qui lui donneront son aspect actuel de la fin XVIIe au début XVIIIe siècle. Sa chapelle date du XVIe siècle est classée aux M.H. Le château est un château privé et fermé au public, car il appartient à une société privée, est inscrit partiellement aux M.H. depuis le 4/12/1996.","architecture":"EPINAY, le bâtiment est encastré entre deux tours, une fuie du XIIIe siècle et une tour carrée du XVe siècle. La fuie serait en fait une tour de l'ancienne enceinte fortifiée, transformée en colombier et couverte au XVIIe siècle d'un dôme à lanternon évoquant Serrant, la façade principale ne laisse pas soupçonner qu'à l'arrière du château, sur le coté opposé de la cour, un logis seigneurial du XVe siècle, qui rappelle le charme de certains manoirs bretons, mêlant ici schiste et tuffeau. De grands travaux au XVIIe siècle prolongèrent ce logis vers le sud par un long bâtiment avec  de vastes fenêtres et porte à fronton. Face à ce logis seigneurial des XVe et XVIe siècle se dressent encore les vestiges de la forteresse médiévale: haut mur d'enceinte avec chemin de ronde en ruine d'un châtelet d'entrée carré qui donnait accès à la cour intérieure du logis. Les douves qui entouraient la forteresse ont été comblées, mais il reste encore des traces de l'appareil de défense en descendant vers les boires. En outre, le souterrain qui s'ouvre au pied du colombier faisait sans doute partie de cet ensemble défensif.                                                                                                             COMTERIE, la construction du château date du XIXe siècle, de plan rectangulaire à deux niveaux sur soubassement et série de lucarnes sur toits des pavillons avant corps polygonal mi-hors oeuvres à trois niveaux et petites lucarnes sur chaque pan du toit pointu avec clocheton.","habitants":"Epinay;  famille d'Andigné\r\n        \r\n        \"","divers":"A st-Georges sur loire Trois châteaux dont Epinay, Bénaudière grav -5  et Comterie.   Comterie  grav 6-7 : 47° 24' 36\" Nord, 0° 45' 40\" Ouest       Epinay 47° 24' 36\" Nord 0° 45' 40\" Ouest   grav 1-2-3-4 grav -4","gps":"","images":["../../jctruffet.com/image/image_49/49_St_Georges_sur_Loire_1.jpg","../../jctruffet.com/image/image_49/49_St_Georges_sur_Loire_2.jpg","../../jctruffet.com/image/image_49/49_St_Georges_sur_Loire_3.jpg","../../jctruffet.com/image/image_49/49_St_Georges_sur_Loire_4.jpg","../../jctruffet.com/image/image_49/49_St_Georges_sur_Loire_5.jpg","../../jctruffet.com/image/image_49/49_St_Georges_sur_Loire_6.jpg","../../jctruffet.com/image/image_49/49_St_Georges_sur_Loire_7.jpg"]},"Consult_chateau_formulaire6195":{"id":"Consult_chateau_formulaire6195","dept":"49","canton":"Tiercé","commune":"Andigné","nom":"St_Henis","type":"Château","periode":"XIV-XVI","histoire":"ST-HENIS, le château est à l'origine la nouvelle demeure de la seigneurie du Bois de La Cour. Le domaine est mentionné au XIVe siècle, il appartient aux familles d'Andigné de 1340 à la fin XVIe siècle, à partir de 1622 au baron de Saint-Hénis (Anne de Franquetot) à l'origine du nouveau nom du château, puis au début du XVIIIe siècle, à Joseph Lemarié de Lespinay conseiller du présidial d'Angers ensuite à la famille Ayrault jusqu'au XIXe siècle. Le château, bâti sur une plateforme cernée de douves, conserve un logis des XVe et XVIe siècles, une partie ayant été reprise vers 1850, aile rallongé au XVIIe siècle. La chapelle Saint-Sébastien, fondée le 14 juillet 1526 par Jean d'Andigné, a été remaniée au XIXe siècle dans un style néo-gothique.  L'ensemble du site et du château a sans doute été réaménagé au XVIe siècle à partir d'un manoir du XVe siècle à l'initiative de Mathurin d'Andigné vers 1530, valet-tranchant de François Ier dès 1533, et commandant du château de Craon en 1562.  Le jardin actuel a été créé en 1991 -1992 par les élèves de l'école des ingénieurs horticoles d'Angers.","architecture":"St-HENIS, le château, construit sur une vaste plateforme entourée de douves vives, s'organise autour de trois cours. L'édifice regroupe le logis, la chapelle, le châtelet d'entrée daterait du XVIe siècle, repris au XIXe siècle, restauré récemment. Les communs et les dépendances sont adossés au mur défensif: ils dessinent, avec le châtelet d'entrée, l'avant-cour et la basse-cour semblent du XVIe siècle, remaniés aux XVIIe et XIXe siècles. Le logement de la basse-cour porte la date de 1810., des communs et une métairie autour de trois espaces bien distincts; cour d'honneur, avant-cour et basse-cour fermée de dépendances formant enceinte. La poterne d'entrée cantonnée de tours servait d'entrée au château, face au logis. De part et d'autre se trouvaient des écuries puis au niveau de la basse-cour, une fuie, des étables, des porcheries, le logement du fermier, des granges, une \"remise aux carrosses\". L'aile antérieure de l'habitation abritait l'office, le cellier, le pressoir, un logement en pavillon tandis que l'aile ouest à l'arrière, était consacrée à la cuisine. La salle du logis distribuait des chambres au sud, antichambres et cabinets toujours en place, tandis que d'autres chambres occupaient les étages.","habitants":"aux familles d'Andigné \r\n        \r\n        \"","divers":"A Andigné ;St-Henis  47° 40' 28\" nord, 0° 47' 06\"  ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_St_H%c3%a9nis_1.jpg","../../jctruffet.com/image/image_49/49_St_H%c3%a9nis_2.jpg","../../jctruffet.com/image/image_49/49_St_H%c3%a9nis_3.jpg","../../jctruffet.com/image/image_49/49_St_H%c3%a9nis_4.jpg","../../jctruffet.com/image/image_49/49_St_H%c3%a9nis_5.jpg","../../jctruffet.com/image/image_49/49_St_H%c3%a9nis_6.jpg"]},"Consult_chateau_formulaireecc7":{"id":"Consult_chateau_formulaireecc7","dept":"49","canton":"Longué-Jumelles","commune":"Saint-Martin de la Place","nom":"St_Martin_la_Place","type":"Château","periode":"XVI","histoire":"Deux châteaux à saint-Martin de la place celui de Boumois ( voir article ) et de la Poupardière.                                            POUPARDIERE. Vers 1568, Jean Charbonnier, receveur des tailles à Saumur, y fait bâtir un château comprenant un logis encadré de deux pavillons rectangulaires et une chapelle.","architecture":"POUPARDIERE, ancien fief et seigneurie dont le bâtiment est, du XVe ou XVIe siècle, est peut-être l'ancien logis, autrefois entouré de douves. Au XVIIIe siècle, certaines baies du logis, dont les deux portes centrales de chaque face sont remaniées. Entre 1889 et 1893, sont édifiés une orangerie de style néo-classique, des communs en style néo-gothique, un petit bâtiment doublant en profondeur l'ancien logis et deux tours d'escaliers desservant l'étage du château, dont l'une de style néo-renaissant. L'ancienne ayant été détruite, une nouvelle chapelle fut édifiée vers 1890, à l'ouest du logis, dédiée à Notre Dame; le projet éxécuté, d'esprit néo-roman, dont l'auteur est Léon Brey, s'inspire des volumes de l'église de la Madeleine, située près de Boumois à Saint-Martin-de-la-Place. Les parties agricoles Est, qui comprennent un logement de fermier, des porcheries, un cellier et un séchoir pour les lessives du château, ont été construits en 1905.","habitants":"Famille de Jean Charbonnier\r\n        \r\n        \"","divers":"pourpadière 47° 18' 58\" Nord et 0° 08' 53\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_St_Martin_la_Place_1.jpg","../../jctruffet.com/image/image_49/49_St_Martin_la_Place_2.jpg"]},"Consult_chateau_formulairecb92":{"id":"Consult_chateau_formulairecb92","dept":"49","canton":"les Ponts de Cé","commune":"Saint-Saturnin sur Loire","nom":"St_Saturnin_sur_Loire","type":"Château","periode":"XV-XVI-XIX","histoire":"A deux kilomètres au nord-Est le château d'Ambroise à st -Sulpice  à St-Saturnin le château de Mont-Rude et de Groye                                                                                    AMBROISE, château à St-Sulpice au sud-Est, a été agrandi au XVIe siècle par la famille de Maillé, Le propriétaire des lieux, Dominique d'Orglandes, a fait visiter ce joyau du Val de Loire aux nombreux visiteurs venus pour l'occasion, passage dillustres propriétaires, comme les Du Merle ou les Maillé-Brézé, qui lont reconstruit en partie, au XVIIIe siècle.                                                                          MONT-RUDE, le château du Mont Rude est une demeure bourgeoise du XIXe siècle acheté par la municipalité en 1980 pour y implanter l'hôtel de ville. Entouré de son parc, c'est un lieu de promenade et de pique-nique. A noter que sur cette commune on peut admirer de nombreux moulins à vent, notamment celui des Quatre Croix du XVIIIe siècle.                  GROYE  C'est un manoir privé, mais qui se visite. L'édifice est classé au titre des ML.H. en 1977.","architecture":"AMBROISE dominant le village, ce château, dont l'origine remonte au XVe siècle a été agrandi au XVIe siècle par la famille de Maillé, réaménagé aux XVIe et XVIIIe siècles. La façade sud a été complètement transformée au XIXe siècle. On y  découvre  un  pigeonnier,  les  vestiges  d'un  jeu  de  paume  et  une  chapelle reconstruite au XVIIIe siècle.                                                                                    La GROYE, construit aux XVIe et XVIIe siècles, le manoir et ses jardins sont situés sur le versant sud du coteau de la Loire, en bordure du village de Saint-Saturnin sur Loire. Tombés en déshérence jusquaux années 40, ils ont  fait lobjet dune restauration soignée au cours des dernières décennies, et sont depuis classés M.H. . Construit entre 1585 et 1595, le logis principal incarne parfaitement dans son architecture la renaissance tardive dinfluence Italienne. en 2016. Renaud Paque et Marc Levey ont quitté Paris pour cette douceur angevine immortalisée par Joachim du Bellay.","habitants":"Ambroise, famille de Maillé\r\n        \"","divers":"le château d'Ambroise grav 1 à st -Sulpice  à St-Saturnin le château de Mont-Rude  grav 4-5    et de Groye                                               47° 23' 58\" Nord 0° 26' 09\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_St_Saturnin_sur_Loire_1.jpg","../../jctruffet.com/image/image_49/49_St_Saturnin_sur_Loire_2.jpg","../../jctruffet.com/image/image_49/49_St_Saturnin_sur_Loire_3.jpg","../../jctruffet.com/image/image_49/49_St_Saturnin_sur_Loire_4.jpg","../../jctruffet.com/image/image_49/49_St_Saturnin_sur_Loire_5.jpg"]},"Consult_chateau_formulaire49a2":{"id":"Consult_chateau_formulaire49a2","dept":"49","canton":"Segré","commune":"St_Sauveur de Flée","nom":"St_Sauveur_Flée","type":"Château","periode":"XVII-XIX","histoire":"Deux châteaux à St-Sauveur de Flée la Houssay et le Tilleul. HOUSSAY, l'ancien château relevait de Bouillé-Théval. Il fut reconstruit durant le troisième quart du XIXe siècle par l'architecte angevin Pierre Jacques Tendron.Le corps de bâtiment central, couvert en croupe, est garni aux angles de deux tours octogonales. Au nord, la travée centrale en ressaut est couverte en pavillon et la porte d'entrée au rez-de-chaussée dispose d'une marquise couverte par une verrière. L'élévation sud présente un avant-corps central à trois pans coupés, couvert par une toiture polygonale, le gros oeuvre des murs est en moellons de schiste, seul l'avant-corps sud et les tours latérales à l'étage de comble paraissent bâtis en pierre de taille de tuffeau.","architecture":"TILLEUL, la tour d'escalier carrée passe pour être l'élément le plus ancien du château ; elle pourrait avoir été construite au cours de la première moitié du XVIIe siècle. Le corps de bâtiment principal est une construction du XVIIIe siècle. Le corps de logis principal présente une longue élévation à sept travées; il est interrompu au nord par un corps transversal, plus ancien, vestige d'une longue aile construite en retour d'équerre vers l'ouest; ce corps de bâtiment présente une toiture en croupe plus saillante et deux contreforts encore visible sur la face sud; ces derniers témoignent de la solidité  du mur après la destruction de la plus grande partie de l'aile, le niveau supérieur de la tour d'escalier présente une mise en oeuvre utilisant le pan de bois avec un remplissage de briques et de pierres de tuffeau.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"St_Sauveur de Flée                  Houssay   grav-1-2                   Flée  grav-1       St-Sauveur 47° 45' 16\" nord, 0° 47' 27\" ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_St_Sauveur_Fl%c3%a9e_1.jpg","../../jctruffet.com/image/image_49/49_St_Sauveur_Fl%c3%a9e_2.jpg","../../jctruffet.com/image/image_49/49_St_Sauveur_Fl%c3%a9e_3.jpg"]},"Consult_chateau_formulaire7c3c":{"id":"Consult_chateau_formulaire7c3c","dept":"49","canton":"Angers","commune":"St_Sylvain d","nom":"St_Sylvain_Anjou","type":"Château","periode":"XII-XVII","histoire":"A saint-Sylvain d'anjou le château d'Echardot d'Edite Creysson ,  et de Haie-Joulain.                                                ECHARDOT La construction du château d'Echarbot date des XVIIe et XIXe siècles. Il est inscrit aux M.H. depuis le 24.12.1981, appartient à Edite Cresson, ancienne premier ministre socialiste, qui n'a exercè que 11 mois, sous la présidence de Mitterrand.","architecture":"HAIE-JOULAIN, c'est un château unique en Europe. Le château à Motte de la Haie-Joulain est un site construit en lan mil,  a été reconstitué dans les années 1990. Ancêtre du château fort en pierre, le château comprend une motte castrale surmontée dun donjon et une basse-cour composée de bâtiments civils et agricoles. La présence de vestiges archéologiques dune motte datée du XIIe siècle et dune maison fortifiée du XVe siècle sur la commune a suscité la volonté de restituer un château à motte typique des XIe  XIIe siècles. Entièrement reconstruit en bois et en terre, le château est le fruit dun travail de concertation entre archéologues, historiens et compagnons du devoir. Initié en 1984, le projet a vu le jour en 1993 avec louverture du site au public. Cest au travers dune saison danimations médiévales et de spectacles que le château à Motte de la Haie Joulain vous accueille, dans un cadre à la fois ludique et pédagogique. Lors de journées thématiques, danseurs et figurants en armes font de vous de gentes dames, ou de preux chevaliers.","habitants":"Echardot; Edith Cresson\r\n        \r\n        \"","divers":"A saint-Sylvain d'anjou le château d'Echardot  grav-1-2-3-4-5 ,  et de Haie-Joulain grav 6,    Echardot  47° 29' 49\" Nord, 0° 28' 46\" Ouest,      Haie : 47° 31' 14\" Nord, 0° 28' 14\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_St_Sylvain_Anjou_1.jpg","../../jctruffet.com/image/image_49/49_St_Sylvain_Anjou_2.jpg","../../jctruffet.com/image/image_49/49_St_Sylvain_Anjou_3.jpg","../../jctruffet.com/image/image_49/49_St_Sylvain_Anjou_4.jpg","../../jctruffet.com/image/image_49/49_St_Sylvain_Anjou_5.jpg","../../jctruffet.com/image/image_49/49_St_Sylvain_Anjou_6.jpg"]},"Consult_chateau_formulaire8bfd":{"id":"Consult_chateau_formulaire8bfd","dept":"49","canton":"Angers","commune":"Sainte Gemmes sur Loire","nom":"Ste_Gemmes_Loire","type":"Château","periode":"XII-XVII","histoire":"Deux châteaux à ste Gemmes sur Loire, Hutreau et Châteaubriant.                                                                             HUTREAU, le premier propriétaire connu est en 1658 Marc Foussier de La Cassinerie, conseiller au présidial, issu d'une famille d'avocats. A la fin du XVIIe siècle, le Hutreau passe aux Garsanlan, famille d'anoblis, maîtres en la chambre des comptes de Bretagne. En 1780, Marie Courballay, veuve d'un négociant angevin, achète le domaine, qui reste à vocation agricole. De 1816 à 1872, les Grille, puis les Châtelains sy succèdent. Le 12 octobre 1872, Armand-François-Rupert Laity, sénateur du second Empire, achète lensemble. La presse et ses biographes le donnent comme un ami personnel de Napoléon III. En moins de deux ans, l'architecte Charles Roques auteur de l'église de la Madeleine, construit le château actuel dans le style néo-Renaissance. Des communs, une buanderie et une serre sont bâtis peu après et le parc est replanté dans le goût anglais, le tracé des allées du XVIIIe siècle est maintenu. Divers propriétaires se succèdent jusqu'à ce qu'en 1932 une société immobilière achète le domaine et le loue aux ursulines pour établir un pensionnat.","architecture":"CHATEAUBRIANT, cest la famille qui possède  la terre au XIIe siècle qui donna son nom à ce fief. Les propriétaires des siècles suivants effectuèrent des transformations successives sur la maison principale. Au XVIIIe siècle, elle revint à la veuve de Gaspard Van Breedenbeck. Darlus de Montclerc acquit le domaine en 1769 .  Au XIXe siècle, les propriétaires se succédèrent, chacun apportant quelques modifcations : le vicomte Léonard Joseph d'Andigné de Beauregard en 1842, les Lainé-Laroche en 1864, la famille Cointreau en 1898. L'affichiste et aquarelliste Jean Adrien Mercier y résida jusqu'à sa mort. Le château appartient désormais à sa fille Sylvie Mercier, aquarelliste.  Après avoir été la propriété de la famille Cointreau, le château appartient aujourd'hui à la descendance de Jean Adrien Mercier, grand aquarelliste, qui y résida jusqu'à sa mort en 1995. Malgré des interventions successives au cours du XIXe siècle, le parc  a gardé les grandes lignes de sa composition de la fin du XVIIIe siècle, et de nombreuses fabriques telles que le pavillon octogonal dans laxe du logis. Une travée de fenêtres au nord qui vient rompre la symétrie de la façade antérieure correspond à un escalier à balustres en bois du XVIIe siècle. Les façades ordonnancées régulièrement, couronnées par un fronton, les jeux de toitures aux volumes compliqués, les chaînages de pierre jouant sur le crépi : tous ces éléments s'inscrivent dans la lignée dune architecture provinciale du XVIIIe siècle.","habitants":"Hurteau; famille de Marc Foussier de La Cassinerie.                      Châteaubriant, famille de Châteaubriant et  Sylvie Mercier\r\n        \"","divers":"à ste Gemmes sur Loire, Hutreau grav-2 et Châteaubriant.  Châteaubriand 47° 26' 52\" N, 0° 35' 04\" Ouest    grav-1","gps":"","images":["../../jctruffet.com/image/image_49/49_Ste_Gemmes_Loire_1.jpg","../../jctruffet.com/image/image_49/49_Ste_Gemmes_Loire_2.jpg"]},"Consult_chateau_formulaire0b82-2":{"id":"Consult_chateau_formulaire0b82-2","dept":"49","canton":"Saumur","commune":"Parnay","nom":"Targé_Parnay","type":"Château","periode":"XV","histoire":"TARGE, date du XVe au XIXe siècle. Phelippeau de Pontchartrain, secrétaire personnel du roi Louis XIV, avait fait l'acquisition de cette résidence de chasse située près des forêts de l'Abbaye Royale de Fontevraud avec une bonne terre à vignes. Il en fit don, en 1655, à sa fille  mariait avec Joseph Gigault de Targé-Parnay. La propriété est depuis restée dans la famille, et chaque génération a collaboré à son rayonnement. Henri Allain-Targé y fit venir le monde politique de la III ème République, parmi lesquels Gambetta et Villemain. Puis, par le mariage de Geneviève Allain-Targé avec Charles Ferry, frère de Jules, le château de Targé devint la résidence privilégiée des Ferry. Fresnette, leur unique descendante, et son époux Edgard Pisani, ministre du Président la Répubique Charles de Gaulle, surent rendre à Targé, sa prospérité après les dommages des deux guerres mondiales. Leur fils, Edouard Pisani-Ferry, à peine diplômé ingénieur agronome en viticulture à l'ENSA de Montpellier, prit en charge le domaine, en 1976.","architecture":"Targé, Il commença par construire un chai moderne, doté de cuves thermo-régulées. Il s'attacha ensuite, dans les années 1990, à l'agrandissement et à l'amélioration du vignoble, par l'acquisition de terroirs toujours meilleurs. Il commença à introduire dès cette période des pratiques d'exploitation respectueuses des vignobles et de l'environnement. Depuis 2000, il adhère à la charte \"Terra Vitis\" certifiée agriculture raisonnée, qui impose une traçabilité rigoureuse des processus dans la vigne et au chai. Le château est classé aux M.H. depuis 2003. C'est devenu un domaine vinicole. Le décorateur Daniel Kiener a été chargé de l'aménagement d'un gîte de charme au sein de la propriété de Targé, qui, depuis 2008, permet aux clients de venir découvrir la région.","habitants":"Targé; Edouard Pisani-Ferry\r\n        \"","divers":"Targé à Parnay  47° 13' 37\" Nord, 0° 00' 59\" Est","gps":"","images":["../../jctruffet.com/image/image_49/49_Targ%c3%a9_Parnay_1.jpg","../../jctruffet.com/image/image_49/49_Targ%c3%a9_Parnay_2.jpg","../../jctruffet.com/image/image_49/49_Targ%c3%a9_Parnay_3.jpg"]},"Consult_chateau_formulaire2ba4":{"id":"Consult_chateau_formulaire2ba4","dept":"49","canton":"Angers","commune":"Montreuil-Juigné","nom":"Thibaudière","type":"Château","periode":"XVI","histoire":"THIBAUDIERE, les traces des premiers occupants du château  ont été retrouvées, elles remontent à 1440 avec Jean Nicolas, maître orfèvre du Roi René et de Jeanne de Laval. Puis se sont succédé à plusieurs générations de la famille des Maupassant, parmi lesquelles le comte et la comtesse de Maupassant.  En 1821, Joseph-François de Mieulle, député, receveur général des finances pour le Maine -et-Loire rachète la Thibaudière château du XVIIe siècle, en partie incendié en 1794 au milieu d'un domaine d'origine médiévale et XVIe siècle. Les communs sont agrandis et transformés en fabrique de voiles au XVIIIe siècle. Joseph-François de Mieulle puis son fils Auguste entreprennent une restructuration du château avec trois architectes (l'entrepreneur François Lecoy en 1822, Sébastien Dellêtre  pour le pavillon Sud autour de 1846 , et enfin René Hodé  pour le pavillon Nord et la chapelle. Le paysagiste Delavenne, comte de Choulot.","architecture":"THIBAUDIERE , du XVIe siècle, très remanié. Les communs s'organisent autour d'une cour intérieure enfermant, en son centre, une volière en briques, pierres et ardoises. Ces bâtiments reprennent le style anglo-normand, en particulier avec les colombages peints en façades. La cour intérieure s'organise autour de deux pôles fonctionnels : les écuries et la ferme-modèle. Le parc a été dessiné au XIXe siècle est classé au titre des sites, a été dessiné et exécuté à partir de 1840 par M. Delavenne, comte de Choulot. Cest un parc à langlaise comme tous ceux conçus par lun des plus célèbres architectes-paysagistes de son époque qui a réalisé, entre autres, les plans de la ville-parc du Vésinet. Essences indigènes et arbres exotiques s'y reflètent dans une vaste pièce d'eau, animent les pelouses et ombrent un petit temple à l'Antique, vestige des anciens jardins.\r\nLe château XVIIe s'est vu adjoindre au XIXe une chapelle (Hodé) ornée de très beaux vitraux. Une volière absolument remarquable occupe le centre des communs (ISMH) construits au XIXe selon le principe des fermes modèles.","habitants":"Thibaudière; Famille de  Jean Nicolas\r\n        \"","divers":"Thibaudière à  Montreuil-Juigné","gps":"","images":["../../jctruffet.com/image/image_49/49_Thibaudi%c3%a8re_1.jpg","../../jctruffet.com/image/image_49/49_Thibaudi%c3%a8re_2.jpg"]},"Consult_chateau_formulairec33e":{"id":"Consult_chateau_formulairec33e","dept":"49","canton":"Chemillé-Melay","commune":"Thouarcé","nom":"Thouarcé","type":"Château","periode":"XVIII-XIX","histoire":"Trois châteaux à Thouarcé, Fesles, Gué du Berge et Bonnezeaux.                                                                     THOUARCE, à la réorganisation administrative qui suit la Révolution, Thouarcé est en 1790 chef-lieu de canton, dépendant du district de Vihiers, puis en 1800 de l'arrondissement de Saumur et ensuite de celui d'Angers.\r\nAu XIXe siècle se développent les fours à chaux, dont ceux de la commune fonctionnent à partir de la molasse coquillière. Thouarcé compte aussi une importante activité viticole, renommée notamment pour ses vins blancs de Bonnezeaux. La viticulture constitue l'activité dominante.\r\nDurant la Seconde Guerre mondiale, la tour de Beauregard (ancien moulin du XVIe siècle situé sur le coteau de Bonnezeaux) sert d'observatoire aux troupes allemandes, qui le détruisent à leur départ en août 1944.\r\nEn 2016, les communes de Champ-sur-Layon, Faveraye-Mâchelles, Faye-d'Anjou, Rablay-sur-Layon et Thouarcé se regroupent donnant naissance à la nouvelle commune de Bellevigne-en-Layon.","architecture":"FESLES  viticoles,  Le nom de ce fief avec manoir apparaît dès le XIe siècle. En 1717, il possède un manoir et une chapelle. Le château, gros logis en fer à cheval est situé sur une haute colline. En 1844, de vastes servitudes sont construites et en 1884, il es agrandi de deux ailes à trois étage, lancienne maison étant rasée. Le château de Fesles est un des plus anciens vignobles de lAnjou. On est saisi par la vue  sur les Coteaux du Layon puis par larrivée dans le jardin à la française et sa roseraie, environnée de vigne.                                 GUE du BERGE, monument classé par la maison de maître du XIXe siècle pour ses façades et ses toitures des communs, le parc (avec la serre, lancienne ferme-communs, la maison du jardinier, la pompe) et la chapelle prieurale St-Jean du XIIe siècle. Lédifice est inscrit au titre des M.H. en 2006.                                                                               BONNEZEAUX, sur un coteau couvert de pampres, qui domine la vallée du Layon, non loin du bourg de Thouarcé, sélève un logis bourgeois dont la toiture se confond avec la cime de la futaie qui y est adossée. Ce  logis  sélève ici depuis le XVIIIe siècle ou la fin du XVIIe, mais certains éléments en sont plus anciens et le fief de Bonnezeaux, (avec hôtel, pressoir, clos de vigne, etc) appartenait déjà, au moins depuis le début du XIVe siècle, à la famille noble des Prévost.  La famille de Russon en hérite à la fin du XVIIIe siècle. Leurs descendants sont toujours en possession du château.","habitants":"Bonnezeaux;  famille de Russon\r\n        \"","divers":"à Thouarcé, Fesles grav-3-4-5, Gué du Berge et Bonnezeaux grav-6-7.      Thouarcé  grav-1-2    47° 16' 04\" nord, 0° 29' 55\" ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Thouarc%c3%a9_1.jpg","../../jctruffet.com/image/image_49/49_Thouarc%c3%a9_2.jpg","../../jctruffet.com/image/image_49/49_Thouarc%c3%a9_3.jpg","../../jctruffet.com/image/image_49/49_Thouarc%c3%a9_4.jpg","../../jctruffet.com/image/image_49/49_Thouarc%c3%a9_5.jpg","../../jctruffet.com/image/image_49/49_Thouarc%c3%a9_6.jpg","../../jctruffet.com/image/image_49/49_Thouarc%c3%a9_7.jpg"]},"Consult_chateau_formulaire9a2e-2":{"id":"Consult_chateau_formulaire9a2e-2","dept":"49","canton":"Cholet","commune":"Tigné","nom":"Tigné","type":"Vestiges-châteaux","periode":"XV-XVI","histoire":"TIGNE, au XVIe siècle, le capitaine ligueur Des Esves  fait prisonnier Jacques de Beauvau-Tigné et se retranche dans le château qu'il fortifie. Le gouverneur de Saumur, Duplessis-Mornay, gouverneur d'Anjou et assiège le château, ainsi que le comte de Montsoreau et Donadieu de Puycharit. On commence à démanteler le château, mais les travaux sont interrompus. Le donjon seigneurial, resté intact, accueille en 1598 le roi Henri IV . En 1620, la terre et le château, propriété de la famille de Beauvau, sont saisis et adjugé judiciairement à Claude d'Aubigné. En janvier 1632, il héberge une troupe de gentilshommes. Ces derniers décident d'aider Claude d'Aubigné à marier son fils à la fille d'Urbain de Maillé. Le gouverneur d'Anjou Martin du Bellay assiège le château pendant deux mois avant de réussir à se faire remettre la prisonnière. Le dernier seigneur de Tigné, Hippolyte-Jean-René de Toulongeon, émigre à la Révolution. Le château est incendié en 1794, vendu à un banquier d'Angers, M. Rogeron. Il le revend en 1826 au notaire de Tigné, Gendron. Sa fille épouse Pierre Péton, conseiller général de Maine-et-Loire. Propriété au début du XXe siècle de Joseph-Henri Péton, maire de Saumur.  Le domaine est vendu en 1919 à la famille Lalanne. En 1989, le château et son domaine sont achetés  par l'acteur Gérard Depardieu qui y exploite alors son premier vignoble.","architecture":"TIGNE, situé sur un point de passage entre l'Anjou et le Poitou, le château est au Moyen-âge le centre d'une châtellenie relevant du château de Saumur. Le château de Tigné possède alors des droits de haute-justice sur les paroisses de Tigné, Cernusson, Montilliers et Tancoigné. Le fief de Tigné donne son nom à la famille propriétaire,  en 1830, on détruit deux tours et le portail d'entrée. En 1860, le château est restauré par l'architecte Ernest François Dainville dans un style néogothique, avec les cinq tours à créneaux et l'échauguette restante du château d'origine.\r\nGRAND RIOU  inscrit au M.H  par arrêté du 19 mai 1988, pour les ruines subsistantes, se composant d'une vaste enceinte rectangulaire. Incendié en 1792, il est resté depuis à l'état de ruines.  Le château est un édifice de la seconde moitié du XVe siècle, construit en deux campagnes très proches. Il se compose d'une vaste enceinte rectangulaire et était accompagné au XVIIIe siècle d'un parc enclos de murs.  De l'enceinte, subsiste la majeure partie de la courtine nord, une partie de la courtine ouest et la tour d'angle sud-ouest qui abrite un pigeonnier. La courtine constitue la façade du corps de logis ; ce corps de bâtiment, à plan en équerre, possède une tour d'escalier à vis dans oeuvre flanqué d'une tourelle secondaire. Il ne reste rien des aménagements intérieurs, les planchers s'étant effondrés.","habitants":"Tigné; famille de Beauvau                                                    Tigné;acteur Gérard Depardieu \r\n        \"","divers":"A Tigné 47° 12' 28\" nord, 0° 26' 54\" ouest                                le Tigné grav 1-2-3 de Depardieu  et le Grand-Riou vestiges grav-4-5-6-7","gps":"","images":["../../jctruffet.com/image/image_49/49_Tign%c3%a9_1.jpg","../../jctruffet.com/image/image_49/49_Tign%c3%a9_2.jpg","../../jctruffet.com/image/image_49/49_Tign%c3%a9_3.jpg","../../jctruffet.com/image/image_49/49_Tign%c3%a9_4.jpg","../../jctruffet.com/image/image_49/49_Tign%c3%a9_5.jpg","../../jctruffet.com/image/image_49/49_Tign%c3%a9_6.jpg","../../jctruffet.com/image/image_49/49_Tign%c3%a9_7.jpg"]},"Consult_chateau_formulaire9fab":{"id":"Consult_chateau_formulaire9fab","dept":"49","canton":"Cholet","commune":"Montilliers","nom":"Tirpoil","type":"Château","periode":"XVII","histoire":"TIRPOIL, château mentionné en 1409 dont subsistent des vestiges : murs, tour sud est de la basse-cour, douves comblées et trois cheminées du XVe siècle; une chapelle est mentionnée en 1669 et 1738, actuellement détruite, remaniements en 1717, porte la date, dont il ne subsiste rien d'apparent ; à l'emplacement du château primitif se trouve la ferme de l'actuel château construit vers le sud par les architectes Lenoir et Chesneau de 1842 à 1908  dates et attribution par travaux historiques.","architecture":"TIRPOIL,  l'édifice se compose de deux étages carrés et un étage de comble, appareil mixte et enduit partiel. Elévations ordonnancées coiffées de toit à longs pans, croupe, pignon couvert, toit  et dôme polygonal, couverts d'ardoise et de tuiles creuses. Bon état général, restauré ou rénové, construit au XIe siècle, rénové au cours des siècles  baroque et rococo, empire, Louis XVI - directoire,  second empire.","habitants":"Seigneur local\r\n        \"","divers":"Montilliers; 47° 11' 01\" nord, 0° 30' 12\" ouest                           Tirpoil","gps":"","images":["../../jctruffet.com/image/image_49/49_Tirpoil_1.jpg","../../jctruffet.com/image/image_49/49_Tirpoil_2.jpg","../../jctruffet.com/image/image_49/49_Tirpoil_3.jpg","../../jctruffet.com/image/image_49/49_Tirpoil_4.jpg","../../jctruffet.com/image/image_49/49_Tirpoil_5.jpg"]},"Consult_chateau_formulaireb9c1-2":{"id":"Consult_chateau_formulaireb9c1-2","dept":"49","canton":"Cholet","commune":"Maulévrier","nom":"Touvois","type":"Château","periode":"XV-XVII","histoire":"TOUVOIS, au XI-XIIe siècle Foulques Nerra fit édifier la forteresse de Maulévrier, au XVe siècle Hardy de Touvois qui épouse Jeanne de Beaumont fille du baron de Bressuire, leur fils Pierre épouse en 1506 Jeanne d'Echallard de la Boulaye, en 1521 Pierre Touvois est nommé seigneur d'Argenton capitaine du château  et en 1532 le passe  au profit de son fils Charles. Au XVIIe siècle  René Serpillon devient par alliance seigneur de Touvois. Au XVIIIe siècle Marie-Charlotte de Touvois apporte en dot le domaine à Philippe-Gilbert-Raoul du Soulier. Leur fils Philippe-Charles, aura sept enfants dont Joseph tué en 1796, deux filles restées célibataires habiterons la maison forte de Livois. En 1808 Marie-Julie-Henriette Chevalleau  de bois Ragon veuve, cède Touvois  à madame Leroux née Renée Sagory qui transmet à son fils Charles qui s'établit comme avocat et épouse en 1813 Agathe Dessaulx cinq enfants, l'un deux, Auguste, hérite de Touvois qui se dernier épouse Marie-Gabrielle Boutillier de Saint-André sans enfant lègue la propriété à sa nièce Marthe.  Le Roux  soeur de son épouse, Marthe  alliée à Ernest Rampillon des Magnils laissera Touvois  à l'une de ses filles, madame Blanpain de Saint-Mars. Dans la descendance de cette famille en la personne de madame Roger de Hillerin  née Nicole Blanpain de Saint-Mars.","architecture":"TOUVOIS, à la frontière de l'Anjou et du Poitou, le château de Touvois, élevé vers 1470 par Hardy de Touvois à l'emplacement d'un château féodal ancien, séduit par son architecture, se compose  d'un corps de logis à deux niveaux dont la toiture pointue repose sur deux pignons. Ce bâtiment est flanqué à l'un de ses deux angles d'une tour ronde coiffée  en poivrière, côté cour il est prolongé d'une petite aile en retour d'équerre, jouxtant une tour d'escalier à pans coupé à laquelle s'accroche une tourelle en encorbellement. Au XIXe siècle est venues s'ajouter, sur cette façade deux tours rondes accolées, d'inégale hauteur. Un mur relie le logis à la tour carrée équipée d'une bretèche de l'époque des guerres de religion,  de la même campagne les deux tours faisant face au logis de l'autre côté de la cour.   En 2004, une importante restauration des dépendances a permis d'ouvrir ses portes pour de nombreuses fêtes. l'édifice est rénové dans le respect des matériaux et de l'architecture anciennes, cest un cadre chaleureux idéal pour les mariages et les fêtes familiales.","habitants":"Famille de Hardy de Touvois\r\n        \"","divers":"Touvois à Maulévrier","gps":"","images":["../../jctruffet.com/image/image_49/49_Touvois_1.jpg","../../jctruffet.com/image/image_49/49_Touvois_2.jpg","../../jctruffet.com/image/image_49/49_Touvois_3.jpg","../../jctruffet.com/image/image_49/49_Touvois_4.jpg","../../jctruffet.com/image/image_49/49_Touvois_5.jpg"]},"Consult_chateau_formulaire9962":{"id":"Consult_chateau_formulaire9962","dept":"49","canton":"Segré","commune":"Pouancé","nom":"Tressé","type":"Château","periode":"XVI-XVII-XIX","histoire":"TRESSE, la métairie de Tressé était une dépendance du domaine de Pouancé. Sur les bords de l'étang, un moulin à draps est signalé au XVIe siècle. Antoine Feuillant, journaliste, achète le vieux château aux héritiers du duc de Villeroy en 1809 et fait bâtir le premier château \"bâti dans le goût le plus moderne\" à Tressé. En 1817, il se composait d'un étage carré éclairé par cinq travées et d'un étage de comble sur la façade nord, sur la façade sud, un étage de soubassement compensait la déclivité du terrain. Le parc du château était composé d'un jardin \"anglais\", d'un jardin potager, d'une ferme. Le marquis de Préaulx acquiert le domaine en 1818, fait démolir l'ancien bâtiment et fait batir un nouveau château à partir de 1845 par l'architecte nantais Liberge. Le parc est l'oeuvre du paysagiste Jolly. Une chapelle est construite dans le parc vers 1871 par un architecte de Pouancé nommé Saget. A partir de 1951, il est acquis par le département du Maine et Loire qui le transforme en sanatorium.","architecture":"TRESSE, le château est un vaste bâtiment rectangulaire composé d'un étage de soubassement ouvrant de plain-pied sur la façade sud qui abritait les pièces réservées au service : la cuisine, l'office, la salle à manger, lingeries, des caves, d'un rez-de-chaussée abritant le hall d'entrée avec l'escalier et les salles de réception : grand salon, bibliothèque, salon-fumoir, salle-à-manger, d'un entresol comprenant des appartements pour le personnel, un premier étage avec douze chambres, d'un premier étage de comble abritant cinq chambres, un bureau et onze chambres pour les domestiques et d'un second étage de comble abritant les greniers. La façade nord présente deux avant-corps latéraux et un central comprenant trois travées, il est couronné par une lucarne-pignon entre deux volutes. Cette façade a reçu un abondant décor sculpté, lucarnes, frontons, bas-reliefs de rinceaux habités ornant les murs sous-appuis. Les avants-corps de la façade sud sont plus saillants, les avants-corps latéraux présentent un étage d'attique et sont couverts par des toits en pavillon. Des niches ornent l'avant-corps central qui est surmonté d'une lucarne-pignon et d'une horloge, son toit est couronné par un lanternon. Deux tourelles sont adossées aux façades ouest et Est. La porte d'entrée en plein cintre donne accès à un vaste vestibule d'entrée où se trouve le grand escalier tournant à deux volées avec départ central droit.","habitants":"Marquis de Préaulx\r\n        \"","divers":"Château de Tressé à Pouancé","gps":"","images":["../../jctruffet.com/image/image_49/49_Tress%c3%a9_1.jpg","../../jctruffet.com/image/image_49/49_Tress%c3%a9_2.jpg","../../jctruffet.com/image/image_49/49_Tress%c3%a9_3.jpg","../../jctruffet.com/image/image_49/49_Tress%c3%a9_4.jpg"]},"Consult_chateau_formulaire676c-3":{"id":"Consult_chateau_formulaire676c-3","dept":"49","canton":"La Pommeraye","commune":"Liré","nom":"Turmelière","type":"Château","periode":"XIX","histoire":"TURMELIERE, la Turmelière appartiendra à la famille du Bellay du XIIIe siècle jusquau milieu du XVIe siècle. Catherine du Bellay, la soeur de Joachim, devenue héritière du domaine, épouse Christophe du Breil. En 1772, totalement ruinés, ils vendent leurs terres à Pierre Thoinnet, commerçant dAncenis. Arrivent les guerres de Vendée durant lesquelles Liré est entièrement dévasté. Les Républicains, pourchassant les armées vendéennes, pillent et incendient le château, il ne sera pas reconstruit. La famille Thoinet qui s'était enfuie, revient à Liré et fait édifier, avec les matériaux du château détruit, une demeure qui se trouve à lemplacement du château actuel. Charles Thoinnet se marie en 1860 avec Adèle Velpeau, fille unique du célèbre chirurgien Velpeau cest à ce docteur que lon doit la fameuse bande élastique qui porte son nom, cette union augmente la fortune de Charles Thoinnet. Devenu comte, il fait détruire son premier château pour en bâtir un autre sur le même emplacement, devenu centre sanitaire scolaire.","architecture":"TURMELIERE,  le château actuel, construit en 1887, est la réplique du château de Beaumesnil en Normandie. Le comte a fait aménager les ruines du château-fort en jardin. Des grottes artificielles, des cascades, des plantations en terrasse dont il reste quelques traces, ajoutent alors au caractère \"romantique\" du lieu. Lédifice nest pas encore terminé lors
