.jpg"]},"Consult_chateau_formulaireb2bb":{"id":"Consult_chateau_formulaireb2bb","dept":"49","canton":"Doué la Fontaine","commune":"Chênehutte les Tuffeaux","nom":"Chenehutte","type":"Château","periode":"XV-XVII","histoire":"Quatre châteaux à Chenehutte la tour de Trêves, le Prieuré , Beauregard et Grissay.                                                                  TOUR TREVES, édifiée au XVe siècle,  est un monument historique angevin, à Chênehutte-Trèves-Cunault. L'emplacement est fortifié dès le début du XIe siècle par Foulques Nerra. Plusieurs autres édifices lui succèdent, notamment au XVe siècle. Un château y est reconstruit au XVIIIe siècle, dont seul le donjon est conservé, la tour de Trèves. La forteresse est une grosse tour ronde aux murs très épais. Elle est divisée en cinq étages. Les trois niveaux du bas étaient destinés à la défense et aux cuisines, et les deux derniers étages aux appartements seigneuriaux. L'édifice a été classé aux M.H. de 1862 et par arrêté du 5 août 1904. Il est la propriété d'une personne privée.                                                                                          PRIEURE,  est transformé dans le style renaissance. Il en résulte un magnifique château à double pignon, agrémenté d'une tourelle hexagonale pourvue d'un large escalier à vis. L'ancien appartement privé du Prieur laisse encore apparaître une cheminée riche en symboles et ornements. En 1830, le comte de l'Aubépin, nouveau propriétaire du Prieuré entreprend des travaux pour doter la demeure d'une tour carrée et lui donner ainsi l'apparence d'un château. Au début du XXe siècle, c'est au tour du comte Raymond de Castellane, le nouvel acquéreur, issu d'une famille noble de Provence, de se lancer dans des travaux de restauration et d'embellissement, en particulier des terrasses.","architecture":"BEAUREGARD  à Cunault, chambres d'hôtes de la famille Tonnelier                                                                                           GRISSAY, la construction du manoir de Grissay date du XIIIe au XVe siècle.                                                                                                   TREVES, château fort, le premier château a été fondé peu avant 1026 par Foulque Nerra en vue de la prise de Saumur qui à l'époque était une possession du comte de Blois. Le château fut pris par le comte Foulques Réchin en 1068, détruit par son ordre et reconstruit par ses soins vers 1091. En 1147, le seigneur de Trèves, Renaud le Roux, part à la croisade avec Louis VII et sa suzeraine directe, Aliénor d'Aquitaine. En 1206, le château soutient victorieusement une attaque de larmée de Jean sans Terre. En 1616, Pierre de Laval, baron de Lezay, agrandit et embellit de nouveau le château. Aux deux corps distincts du logis, Pierre de Laval fait ajouter un pavillon neuf dhabitation desservi par un jardin en terrasse. Devant le pont-levis, sélevait encore au XVIIe siècle une motte dite\"motte de Monsoreau\" qui avait sans doute porté le manoir primitif et qui, restée nue et vide jusquau XVIe siècle, fut alors chargée dun corps de logis adossé à la chapelle reconstruite.","habitants":"Beauregard; famille Tonnelier                                                Comte de Blois                                                                          Prieuré ;comte Raymond de Castellane\r\n        \"","divers":"Beauregard grav 1-2   Grissay 47° 18' 25,47\" Nord et 0° 09' 17,98\" Ouest Grav-3                                                                 Trèves grav 4 à 8","gps":"","images":["../../jctruffet.com/image/image_49/49_Chenehutte_1.jpg","../../jctruffet.com/image/image_49/49_Chenehutte_2.jpg","../../jctruffet.com/image/image_49/49_Chenehutte_3.jpg","../../jctruffet.com/image/image_49/49_Chenehutte_4.jpg","../../jctruffet.com/image/image_49/49_Chenehutte_5.jpg","../../jctruffet.com/image/image_49/49_Chenehutte_6.jpg","../../jctruffet.com/image/image_49/49_Chenehutte_7.jpg","../../jctruffet.com/image/image_49/49_Chenehutte_8.jpg"]},"Consult_chateau_formulairedc58":{"id":"Consult_chateau_formulairedc58","dept":"49","canton":"Tiercé","commune":"Pruillé","nom":"Chesnaie","type":"Château","periode":"XV-XIX","histoire":"CHESNAIE, le fief appartenait en 1482 à Etienne de la Chénaie, mari de Jeanne d'Orvaux. En 1625 un procès-verbal d'adjudication mentionne la maison seigneuriale comprenant un corps de logis, deux pavillons aux deux bouts, chacun avec un escalier, chambres et antichambres, cellier et cuisines au-dessous, première cour enclose de hautes murailles, dans laquelle il y a le logis du closier. Chapelle, grange, jardin, le tout enclos de bois de haute futaie, fossés, étang, réservoirs, terres et les métairies de la Haute et Basse-Chénaie, de la Hoderaye et de la Vallée. De cet ensemble, seules les douves existent encore en 1853. Charles Louvet fait bâtir un nouveau château en 1856 (date portée sur la façade postérieure). Charles Louvet est ministre de l'agriculture en 1870. Il fait appel au comte de Choulot pour un projet de parc réalisé en 1863, dont il ne reste aujourd'hui aucune trace. Les dépendances du château sont composées de bâtiments d'époques différentes : un ensemble semble antérieur au XIXe siècle avec son toit brisé et ses encadrements en tuffeau. Un autre ensemble est daté de 1851.","architecture":"CHESNAIE, le château est entouré au sud, à l'est et à l'ouest de douves et d'un étang côté nord. Le château est composé d'un corps central flanqué aux angles de quatre pavillons en ressaut. Le bâtiment est doté d'un rez-de-chaussée surélevé avec en sous-sol les cuisines, d'un étage carré et d'un étage de comble. La façade principale est organisée selon sept travées (plus celles des pavillons), les trois centrales étant en léger ressaut et couronnées d'un fronton avec triple lucarnes. Le premier étage est souligné par un bandeau de tuffeau et les garde-corps des trois fenêtres centrales et de celles des pavillons. L'accès à l'intérieur s'effectue par un escalier en fer-à-cheval. Les trois fenêtres centrales du rez-de-chaussée sont ornées des initiales du commanditaires et de représentations liées aux activités agricoles. Un autre accès au château est possible sur la façade latérale orientale avec également un escalier en-fer-à-cheval. La façade postérieure est plus sobrement traitée : les travées, qui encadrent le ressaut central réunissant trois travées, ne sont pas dotées d'appareillage en tuffeau mais recouvertes d'un enduit ocre. La lucarne centrale porte la date de construction du château  de 1856.","habitants":"Chesnaie; Charles Louvet\r\n        \"","divers":"Château de Chesnaie à Pruillé","gps":"","images":["../../jctruffet.com/image/image_49/49_Chesnaie_1.jpg","../../jctruffet.com/image/image_49/49_Chesnaie_2.jpg","../../jctruffet.com/image/image_49/49_Chesnaie_3.jpg"]},"Consult_chateau_formulaire852a":{"id":"Consult_chateau_formulaire852a","dept":"49","canton":"Cholet","commune":"Cholet","nom":"Cholet_49","type":"Château","periode":"XV-XIX","histoire":"A 20 KM à l'ouest à Torfou le château de Couboureau. TREMBLAYE, construit sur des terres chargées dhistoire aux confins de lAnjou et du Poitou. Dès le XVe siècle, la famille Robin de la Tremblaie vient sy établir et occupe un premier château, dont il ne reste presque plus rien, composé de deux grosses tours au devant des ailes et entouré de douves. En 1793, le domaine de 200 hectares devient un des champs de bataille de la guerre de Vendée. Le 15 octobre, les Bleus y conduisent une offensive victorieuse qui coûtera la vie à Lescure, lun des chefs vendéens, et leur permettra de prendre la ville de Cholet. Le château est incendié et le dernier des héritiers de la famille Robin de la Tremblaye cède le domaine, vers 1830, à M. Chevallereau de Sely, Il le revend dès 1846 à un riche Saumurois, Paul Mayaud (1814-1881), qui a fait fortune dans les articles religieux. Très vite, il entreprend dy construire un château à la mesure de sa richesse. Paul Mayaud fait appel à un architecte angevin, René Hodé, qui démarre le chantier au début des années 1850. Le gros uvre est terminé en 1862 mais il devra patienter encore deux ou trois ans avant davoir tout le confort désiré.En 1978, Guy et Liliane Baudry, un couple de Vendéens, achètent le château quils transforment en restaurant en 1981.  En 1998, trois investisseurs parisiens, Philippe Chapelet, Michel Giraud et Patrick Élouarghi, reprennent laffaire en y ajoutant 12 chambres dhôtel.","architecture":"COUBOUREAU, au XVe siècle, Couboureau appartient à la  famille Robin de la Tremblaye . Le château actuel a été construit au début du XIXe siècle, par cette famille. En effet, près du château du Couboureau, une colonne commémore la bataille du 19 septembre 1793,  où se brisèrent, du 18 au 22 septembre, les multiples assauts des troupes républicaines renforcées par les Mayençais de Kléber. Sa première pierre fut posée sous la Restauration, le 19 septembre 1826, à l'initiative de M. Jousseaume, marquis de La Bretesche, propriétaire du château à cette époque.                                                                                                                           CHENE LANDRY,  aurait été construit entre 1840 et 1860, à côté d'un corps de ferme plus ancien de dix à quinze ans. Charles Cesbron-Lavau et son fils furent les propriétaires de ce petit castel, appelé « maison Lavau ». Dans l'hiver 1917, un incendie survient au château du Chêne-Landry. Les eaux sont gelées et ne peuvent servir à éteindre le sinistre. En 1943, fut créée une zone interdite autour du château et en 1944, l'état major allemand chasse les propriétaires et occupe la bâtisse.                                                                              TREMBLAYE, larchitecte Hodé a dessiné une jolie bâtisse de style éclectique, édifiée à base de granit de Mortagne et de tuffeau saumurois. La façade rappelle larchitecture italienne avec ses grands pilastres plats et ses lucarnes couronnées de coquilles nervurées. À lintérieur, un escalier monumental et des boiseries ajoutent au cachet de lensemble. Au milieu du XXe siècle, le domaine devient propriété des frères de Saint-Gabriel qui y forment les futurs religieux.","habitants":"famille Robin de la Tremblaye                                Couboureau ; famille de Jousseaume  marquis de La Bretesche\r\n        \"","divers":"A Cholet le château de Tremblaye grav 1-2-3 Comboureau grav-4       Chène grav 5-6 Cholet divers 7-8-9","gps":"","images":["../../jctruffet.com/image/image_49/49_Cholet_49_1.jpg","../../jctruffet.com/image/image_49/49_Cholet_49_2.jpg","../../jctruffet.com/image/image_49/49_Cholet_49_3.jpg","../../jctruffet.com/image/image_49/49_Cholet_49_4.jpg","../../jctruffet.com/image/image_49/49_Cholet_49_5.jpg","../../jctruffet.com/image/image_49/49_Cholet_49_6.jpg","../../jctruffet.com/image/image_49/49_Cholet_49_7.jpg","../../jctruffet.com/image/image_49/49_Cholet_49_8.jpg","../../jctruffet.com/image/image_49/49_Cholet_49_9.jpg"]},"Consult_chateau_formulaire335a":{"id":"Consult_chateau_formulaire335a","dept":"49","canton":"Angers","commune":"Ste-Gemmes d","nom":"Chétardière","type":"Château","periode":"XVI","histoire":"CHETARDIERE, le village de Saintes-Gemmes s'est développé à partir du XIIe siècle autour de l'église priorale. Au XVIe siècle la reconstruction du logis du prieur souligne une certaine activité en matière de construction comme en témoignent plusieurs autres maisons probablement édifiées au XVIe siècle, puis reprises ou modifiées aux siècles suivant. La chapelle du cimetière et certains bâtiments, vestiges de l'ancien presbytère, témoignent des réalisations du XVIIe siècle. Des modifications furent apportées au cours du XIXe siècle : outre la reconstruction de l'église et du presbytère, signalons la construction d'un hospice vers 1810 auquel fut annexé en 1813 un pensionnat et une école de jeune filles ; en 1875 deux nouvelles ailes furent ajoutées à cet ensemble transformé au XXe siècle en maison de retraite.","architecture":"CHETARDIERE, apparaît comme une vaste demeure rurale à laquelle on accédait primitivement, depuis le bourg, par une allée longeant la crête escarpée de la rivière de Verzée. Les bâtiments composent un plan traditionnel en U avec un corps de logis en fond de cour et des communs en retour d'équerre; un vivier est creusé près de l'allée principale. Deux pavillons de jardin sont couverts par des toitures à l'impériale : celui situé au sud comporte un pigeonnier. Le logis, avec rez-de-chaussée surélevé sur un niveau de cave, est un corps en simple profondeur flanqué de deux ailes plus basses, couvertes en croupe. Les façades sur jardin présentent plusieurs caractéristiques : le corps central est en retrait par rapport aux ailes latérales prenant la forme de pavillon très larges, couverts par des croupes brisées on notera les nombreuses travées de baies qui scandent les murs, ouvrant largement les espaces intérieurs à la lumière. A l'intérieur de nombreuses pièces conservent leur décoration d'origine; des motifs en stucs sur les trumeaux de cheminée. Dans le jardin des canalisations souterraines en pierre permettent de drainer les eaux pluviales.","habitants":"Seigneur local\r\n        \"","divers":"Château de la Chétardière à saint-Gemmes","gps":"","images":["../../jctruffet.com/image/image_49/49_Ch%c3%a9tardi%c3%a8re_1.jpg","../../jctruffet.com/image/image_49/49_Ch%c3%a9tardi%c3%a8re_2.jpg"]},"Consult_chateau_formulairec548":{"id":"Consult_chateau_formulairec548","dept":"49","canton":"Beaufort en Vallée","commune":"Cheviré-le-Rouge","nom":"Chéviré_le_Rouge","type":"Château","periode":"XV-XVI","histoire":"Cinq châteaux à Chéviré le Rouge; Mouline, Crochardières, Bois-Bineteau et la Roche-Hue.                                         MOULINES, partie nord datant du XVe siècle, ensemble repris et agrandi au XVIe siècle la partie nord flanquée de deux pavillons au XVIIe siècle, diverses petites adjonctions au XVIIIe siècle, ensemble de l'édifice très remanié au début du quatrième quart du XIXe siècle; chapelle fondée en 1513, détruite en 1781, armes de la famille Dureil, losange d'or et azur. L'édifice se compose de deux étages carrés et d'un étage de comble, le gros-oeuvre est en calcaire; grès; moellon; tufeau; pierre de taille; appareil mixte et enduit partiel, élévations à travées surmontées de toit à longs pans, pignon découvert et couvert,  toit polygonal, toit conique et toit en pavillon, couverts d'ardoise.                                                                     CROCHARDIERES, la Crochardière, seigneurie relevant de jarzé et appartenant dès le XVIe siècle à la famille de Crochard. Simon Crochard, écuyer, fils de Jeanne de la Costardière, en est le seigneur en 1567. Lenfeu des seigneurs était dans la chapelle de St-Louis, au grand cimetière de Cheviré, où lon apportait les membres de la famille décédés en dautres paroisses.","architecture":"BOIS-BINETEAU, les seigneurs de Moulines et du Bois-Bineteau étaient, dit-on, toujours en guerre. On raconte dans le pays que celui des deux qui pouvait offir le meilleur dîner avait le droit de traverser le salon de lautre avec sa meute. Il appartenait jusquau milieu du XVIIe siècle à une famille Bineteau alliée aux Domagné. Passe par le mariage de Catherine Bineteau en 1632 à Charles dHéliand puis à François de La Roussardière devenue veuve en 1670                                                                                              La ROCHE HUE, construit au début du quatrième quart du XIXe siècle sur l'emplacement d'un ancien château du XVIIe siècle détruit . L'édifice se compose de deux étages carrés et étage de comble.  Ancien fief et seigneurie qui donne son nom jusquau milieu du XIVe siècle à une famille de chevalerie. Guyon de Domaigné en hérite par son mariage le 26 décembre 1635 avec Marguerite de la Roche-Hue, et après lui jusquau milieu du XVIIIe siècle. Le seigneur prenait le titre de fondateur de léglise paroissiale et avait banc et enfeu dans le choeur. A la suite de querelles et de longs procès contre le seigneur de Jarzé, son suzerain, qui y réclamait lusage de ses droits, le jeune fils de Pierre de Domaigné se fit tuer en duel à Paris, au Pré-aux-Clercs, par François du Plessis le 25 juillet 1625.","habitants":"Moulines, famille Dureil   Crochardières; famille de Crochard.                     Bois-Bineteau; famille Bineteau.  Roche-Hue, Famille de   Guyon de Domaigné \r\n        \"","divers":"à Chéviré le Rouge; Mouline grav-1, Crochardière grav-2, Bois-Bineteau grav-3 et la Roche-Hue grav 4-5.","gps":"","images":["../../jctruffet.com/image/image_49/49_Ch%c3%a9vir%c3%a9_le_Rouge_1.jpg","../../jctruffet.com/image/image_49/49_Ch%c3%a9vir%c3%a9_le_Rouge_2.jpg","../../jctruffet.com/image/image_49/49_Ch%c3%a9vir%c3%a9_le_Rouge_3.jpg","../../jctruffet.com/image/image_49/49_Ch%c3%a9vir%c3%a9_le_Rouge_4.jpg","../../jctruffet.com/image/image_49/49_Ch%c3%a9vir%c3%a9_le_Rouge_5.jpg"]},"Consult_chateau_formulaire90b7":{"id":"Consult_chateau_formulaire90b7","dept":"49","canton":"Doué la Fontaine","commune":"Cizay-la-Madeleine","nom":"Cizay_Madeleine","type":"Château","periode":"XVII","histoire":"Château d'Épinats (inscrit MH), château avec logis en tufeau de pierre de taille, en partie du XVIIe siècle ;\r\nChâteau La Mouche, des XVIIe, XVIIIe et XIXe siècles EPINATS, château avec une partie du logis du XVIIe siècle, salle et cheminée à l'ouest et escalier à vis; remaniée et englobée dans un nouveau logis construit en 1780, date portée, par l'entrepreneur Jean Dubois; ferme du XVIIe siècle, puits sans doute du XVe siècle, remanié au XVIIe siècle, ferme et puits remaniés au XIXe siècle, château avec logis en tufeau de pierre de taille; logement de ferme  de pierre de taille et le reste de la ferme en appareil mixte: tufeau de moellon et de pierre de taille, logis à deux escaliers: escalier central tournant à retours avec jour et voûte, ouvrage remarquable, et escalier ouest à vis, plus ancien.","architecture":"MOUCHE, château avec logis du XVIIe siècle comprenant une cage d'escalier et une terrasse, le colombier et le logement de ferme sont également du XVIIe siècle ; le logis fut très remanié et agrandi au XVIIIe siècle; parties agricoles des XVIIIe et XIXe siècles puis remaniements au XIXe siècle. Château avec corps de bâtiment en pierre de taille de tufeau à un étage carré, un étage de comble, colombier en moellon, pierre de taille de tufeau, enduit. Logement de domestiques en moellon et pierre de taille de falun et de tufeau ; logement de ferme en moellon de falun et de tufeau.","habitants":"Seigneurs locaux \r\n        \r\n        \"","divers":"Deux châteaux à  Cizay 47° 11' 50\" nord, 0° 12' 24\" ouest                                       Epinats grav 1 à 5 et Mouche grav 6","gps":"","images":["../../jctruffet.com/image/image_49/49_Cizay_Madeleine_1.jpg","../../jctruffet.com/image/image_49/49_Cizay_Madeleine_2.jpg","../../jctruffet.com/image/image_49/49_Cizay_Madeleine_3.jpg","../../jctruffet.com/image/image_49/49_Cizay_Madeleine_4.jpg","../../jctruffet.com/image/image_49/49_Cizay_Madeleine_5.jpg","../../jctruffet.com/image/image_49/49_Cizay_Madeleine_6.jpg"]},"Consult_chateau_formulaire1657":{"id":"Consult_chateau_formulaire1657","dept":"49","canton":"Cholet","commune":"Cléré sur Layon","nom":"Cléré_sur_Layon","type":"Château","periode":"XIV-XVI","histoire":"Deux châteaux à Cléré sur Layon celui, château de Beaurepaire, des XVIe et XIXe siècles ; château les Landes, des XIVe, XVIIIe et XIXe siècles.                                                                      BEAUREPAIRE,   château du XVe siècle, remanié au XVIe siècle et XIXe siècle, corps de bâtiment sud en retour d'équerre détruit après 1838, date du cadastre ancien. L'édifice est composé de deux étages carrés et étage de comble, le gros oeuvre en schiste, appareil mixte et enduit partiel, élévation à travées surmontée d'un toit à longs pans,  croupe, toit conique, terrasse et pignon couvert, recouverts d'ardoise et de tuiles creuses. Les parties agricoles et le logement des domestiques remontent au XVIe siècle et remaniés au XIXe siècle.","architecture":"LANDES, château-fort mentionné en 1323, de ce bâtiment, il subsiste des vestiges du XIVe ou XVe siècle comme le portail, les tours d'angles Sud et Est, et la tour sud englobés dans les communs. Le château des Landes fut reconstruit par l'architecte Bibard en 1875, attribution et date par travaux historiques. La chapelle est installée dans la tour Est, avant 1789 (daté par travaux historiques) et les communs datent du XVIIIe siècle.","habitants":"Seigneurs clocaux\r\n        \"","divers":"Beaurepaire grav 1-2                                                              Landes grav-3","gps":"","images":["../../jctruffet.com/image/image_49/49_Cl%c3%a9r%c3%a9_sur_Layon_1.jpg","../../jctruffet.com/image/image_49/49_Cl%c3%a9r%c3%a9_sur_Layon_2.jpg","../../jctruffet.com/image/image_49/49_Cl%c3%a9r%c3%a9_sur_Layon_3.jpg"]},"Consult_chateau_formulaire0c0e":{"id":"Consult_chateau_formulaire0c0e","dept":"49","canton":"La Pommeraye","commune":"Saint-Sauveur de Landemont","nom":"Colaissière","type":"Château","periode":"XIV-XVIII","histoire":"COLAISSIERE, le château de style du XIIIe situé à Saint-Sauveur de Landemont fait partie de la communauté des communes du Pays dAncenis. Au Moyen-Age était la possession  d'un chevalier du nom de Colas, et passa au seigneur Jean de Barbechat. En 1479 détenut par  Jean I de Brosse, le petit fils cède le domaine à un de ses plus fidèles lieutenants François de la Poëze qui le garderont jusqu'en 1918 à la mort du comte de Yves de la Poëze à la première gruerre mondiale. Restauré en 1992 racheté par M. Leinekugel Le Cop abrite aujourd'hui un hôtel de luxe.","architecture":"COLAISSIERE, la construction date du XIVe siècle. La Colaissière est entourée de douves et dun parc boisé de 16ha et vous accueille dans un cadre prestigieux et historique. Au XVIIe siècle  encore de style médiéval est agrandi au nord d'un corps de logis dont l'architecture demeure gothique. Malgré les dégâts causé par les guerres de Vendée, il est  entièrement restauré dans le respect des styles, ce joyau de la Renaissance, bâti sur un terre plein rectangulaire au sud deux corps de bâtiments bas, couverts de toits en tuile et flanqués de deux tours à bases tallutées encadrent un châtelet d'entrée compris entre deux tours rondes et au centre  duquel s'ouvre un porche. D'autres bâtiments bordent la cour à l'ouest et à l'Est. Au nord, le corps de logis principal très remanié au XIXe siècle est de plan rectangulaire et  coiffé d'une toiture  d'ardoise s'appuyant sur des pignons. La façade principale flanquée d'une haute tour  carrée et d'une échauguette en encorbellement, comporte une tourelle d'escalier à pans coupés légèrement décentrée, les trois travées  sont terminées par des lucarnes de styles gothique sommés de pinacles.  Un petit bâtiment couvert d'une terrasse crénelée relie le logis à une aile basse éclairée sur ses deux façades par de grandes lucarnes comportent à son angle nord-Est une tour circulaire.","habitants":"Famille de François de la Poëze\r\n        \"","divers":"Colaissière 47° 17' 06\" Nord, 1° 15' 17\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Colaissi%c3%a8re_1.jpg","../../jctruffet.com/image/image_49/49_Colaissi%c3%a8re_2.jpg","../../jctruffet.com/image/image_49/49_Colaissi%c3%a8re_3.jpg","../../jctruffet.com/image/image_49/49_Colaissi%c3%a8re_4.jpg","../../jctruffet.com/image/image_49/49_Colaissi%c3%a8re_5.jpg","../../jctruffet.com/image/image_49/49_Colaissi%c3%a8re_6.jpg","../../jctruffet.com/image/image_49/49_Colaissi%c3%a8re_7.jpg"]},"Consult_chateau_formulaire2879":{"id":"Consult_chateau_formulaire2879","dept":"49","canton":"Cholet","commune":"Lys-Haut Layon","nom":"Coudray_Montbault","type":"Château","periode":"XVI-XVIII","histoire":"COUDRAY-MONTBAULT, date du XVIe au XVIIIe siècles. Au XIIIe siècle, la famille Papin fit construire un château fort, composé de 12 tours avec un pont-levis, des mâchicoulis, entièrement entouré de douves. Un second fossé empêchait les engins de siège d'approcher trop près pour détruire les remparts. Le château faisait partie de la dernière marche de Bretagne et fut détruit, pendant la guerre de Cent Ans. Il reste aujourd'hui de belles ruines. En 1599, Honorat de la Haye Montbault, Vidame du Mans, fit construire un château de style Renaissance, sur les bases du château fort, en briques rouges, dont certaines sont recouvertes d'émail vert, pour former des rectangles, comme en Normandie. Il appartient aujourd'hui à M.J.H. Tual.","architecture":"COUDRAY-MONTBAULT, le château du Coudray-Montbault ne fut jamais achevé: la partie à droite du pont-levis n'a jamais été construite, ce qui aurait donné un aspect symétrique. Le château du Coudray-Montbault avait un large escalier, un oratoire, une galerie en balcon, une salle des fêtes. Une grande partie du château et du prieuré furent incendiées pendant les guerres de Vendée, en 1783, dont les toitures et le mobilier. Le château du Coudray-Montbault sera, à nouveau, habité en 1824, par M. Bourgeois, qui réhabilitera le rez-de-chaussée. Au cours du XXe siècle, fut entièrement restauré. Une ferme s'installa dans les communs, un second pont fut installé pour faciliter l'accès de la ferme. Aujourd'hui, la ferme a cédé la place à un Jardin français et anglais. Le château est toujours habité, a été inscrit aux M.H. en 12.04.1965 et classé. Les éléments protégés du château sont : ses douves, sa chapelle priorale, son élévation, sa toiture, son décor intérieur.","habitants":"Honorat de la Haye Montbault,\r\n        \r\n        \"","divers":"47° 8' 19,97\" Nord, 0° 34' 49,22\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Coudray_Montbault_1.jpg","../../jctruffet.com/image/image_49/49_Coudray_Montbault_2.jpg"]},"Consult_chateau_formulairea73a":{"id":"Consult_chateau_formulairea73a","dept":"49","canton":"Doué la Fontaine","commune":"Coutures Vivy Grézillé","nom":"Coutures","type":"Château-Forteresse","periode":"XIV","histoire":"Cinq châteaux à Coutures celui de Coutures, Montsabert, de Goupillon, de Nazé et de Pimpean (voir aerticle). A St-Rémy de Varennes Chauvigné                                                  MONTSABERT, tenu au XIVe siècle par Guy de Pommerieux, possédé ensuite par la famille de Laval. L'édifice est situé à mi-chemin entre Angers et Saumur, reconstruit entre 1374 et 1380 par Bertrand du Guesclin sur un fief que sa deuxième épouse, Jeanne de Laval Tinténiac lui apporta en dot. Du Guesclin transforme le château initial du XIIIe siècle en une vaste forteresse dotée d'une double enceinte. Cette forteresse construite pour contenir le parti anglais, ne servit jamais. En 1575, le château passa dans la famille d'Aubigné qui fit transformer le bâtiment et édifier la chapelle. Le château, composé de trois corps de bâtiments, avec deux tours dont l'une remonte au XIVe siècle, restauré au XIXe siècle par Hodé. Le corps de logis est couronné d'un mâchicoulis avec échauguettes aux angles. L'ensemble présente de beaux détails sculptés de toutes époques.                                                               COUTURES, l'ancien château des Coutures a été détruit en 1837 et à son emplacement a été élevé un logis d'inspiration italienne, achevé en 1841. La construction en est attribuée, par la famille propriétaire, à Charles Joly-Leterme, architecte saumurois. L'aménagement du parc date de la même époque. Les communs, également italianisants, furent construits en 1843 puis augmentés des divers logements et remises en 1885 et 1890. Une serre fut construite en 1901.","architecture":"CHAUVIGNE,  le manoir date du XIVe, XVe, XVIe et XVIIe siècle. La porte de la façade orientale du logis d'habitation du manoir date du XVIIe siècle, est inscrit aux M.H. le 28/12/1984.\r\nGOUPILLON à Neuillé Une magnifique demeure du XIXe située au cour du parc naturel Loire Anjou Touraine, Patrimoine de l'UNESCO. Une étape hors du temps, idéale pour une découverte des richesses de la région et des châteaux de la Loire. Ambiance familiale, confort et silence sont au rendez-vous pour une villégiature paisible.                    NAZE, entouré de ses douves en eau, telles qu'elles existaient autour du logis primitif construit au XVe siècle, le château de Nazé constitue un bel exemple du style néo gothique Angevin. Il est entouré d'un bois, verger et potager sur environ sept hectares. Le potager de Nazé a été récompensé du premier prix de la société nationale d'horticulture en 2009.  Quatre chambres d'hôtes de charme.","habitants":"Montsabert; famille de Laval                                          Coutures; Charles Joly-Leterme\r\n        \"","divers":"à Coutures  47° 20' 04\" nord, 0° 03' 19\" ouest celui de Chauvigné  grav-1  Coutures grav 4-5, Montsabert grav 6-7, de Goupillon grav 2-3, de Nazé Coordonnées par GPS : 47° 23' 58\" Nord, 0° 20' 22\" Ouest","gps":"47° 23' 58\" Nord, 0° 20' 22\" Ouest","images":["../../jctruffet.com/image/image_49/49_Coutures_1.jpg","../../jctruffet.com/image/image_49/49_Coutures_2.jpg","../../jctruffet.com/image/image_49/49_Coutures_3.jpg","../../jctruffet.com/image/image_49/49_Coutures_4.jpg","../../jctruffet.com/image/image_49/49_Coutures_5.jpg","../../jctruffet.com/image/image_49/49_Coutures_6.jpg","../../jctruffet.com/image/image_49/49_Coutures_7.jpg"]},"Consult_chateau_formulaireee62-2":{"id":"Consult_chateau_formulaireee62-2","dept":"49","canton":"Saumur","commune":"Dampierre sur loire","nom":"Dampierre_Loire","type":"Château","periode":"XV","histoire":"DAMPIERRE-SUR-LOIRE, commune associée de Saumur, Marguerite dAnjou (1429 - 1482), fille du Roi René, elle est mariée en 1445 à Henri de Lancastre, roi dAngleterre. Ce jeu diplomatique permet la signature dune trêve entre les royaumes de France et dAngleterre. Plongée au cur des querelles dynastiques entre les maisons dYork et de Lancastre, elle perdra successivement son fils et son mari, assassinés. Elle sera elle-même emprisonnée par le futur Richard III. Louis XI la délivre contre rançon, mais exige en contrepartie du Roi René le retour à la couronne de France des duchés dAnjou, de Lorraine, de Bar et de Provence. Exilée en France, Marguerite est alors recueillie par Jean de la Vignolle qui met à disposition ses manoirs des bords de Loire. Aujourdhui deux manoirs situés sur la côte saumuroise se disputent la résidence de lancienne reine dAngleterre. Le manoir semi-troglodytique de Souzay, restauré dans le style néogothique au XIXe siècle, prend à cette époque le nom de \"château de Marguerite d'Anjou\" sous la plume d'écrivains romantiques et d'érudits locaux. En réalité, c'est bien au manoir de Morains à Dampierre-sur-Loire, que la \"plus malheureuse des épouses et des mères\" séjourna et décéda à la fin du XVe siècle.","architecture":"DAMPIERRE-SUR-LOIRE, et son aire daccueil pour camping-cars sont idéalement situés entre Loire et vignoble, sur l'itinéraire de la Loire à vélo. Implanté à labrupt du coteau calcaire qui domine la rive sud de la Loire, le village possède un patrimoine troglodytique particulièrement dense. Aux XVIIe et XVIIIe siècles danciennes seigneuries sont converties en exploitations viticoles où un vaste clos de vigne et de nombreuses dépendances jouxtent le logis à larchitecture recherchée. Cest le cas du château de Morains, un ancien fief en partie troglodytique qui présente un beau logis du XVe siècle où sest accolée au XIXe siècle une aile en retour avec une tour crénelée. Au XVIIIe siècle, le vin de la côte saumuroise est appelé « de Morains », en référence à ce château.","habitants":"Marguerite d'Anjou\r\n        \r\n        \"","divers":"Château de Dampierre","gps":"","images":["../../jctruffet.com/image/image_49/49_Dampierre_Loire_1.jpg"]},"Consult_chateau_formulaire72c2":{"id":"Consult_chateau_formulaire72c2","dept":"49","canton":"Segré","commune":"Saint-Martin du Bois","nom":"Danne","type":"Manoir","periode":"XVI","histoire":"DANNE, ancienne seigneurie relevant de Chambellay et de la Chouanière. Le domaine appartenait au début du XVIe siècle à la famille d'Orvaux qui fonde une chapelle dédiée à Notre-Dame et Saint Claude en 1501.  Un ancien manoir aurait été élevé sur une motte près de l'actuel colombier. Au XVIIe siècle, il fut rasé pour laisser place à un vaste logis comportant trois corps de bâtiments, une chapelle (détruite en 1870) et un jardin double. Il ne reste aujourd'hui que la fuie située au sud-est du château actuel. Ce dernier fut bâti par l'architecte Leblond en 1826, il est probable qu'une partie des communs aient été élevée durant le deuxième quart du XIXe siècle (vers 1840). Les parties agricoles dateraient du 3e quart du XIXe siècle (vers 1860). Le jardin paysager aurait été réalisé au cours des années 1830-1840 par J. Chevalier.","architecture":"DANNE, depuis la route départementale une avenue conduit vers le château. L'édifice est élevé sur un sous-sol abritant les communs. Depuis ce soubassement, construit en pierre de taille de granit, on accède au rez-de-chaussée surélevé par un escalier en U à l'est, et un escalier droit à l'ouest. Le corps de logis est couvert par une toiture en croupe. Au sud-est, la fuie conservée est construite en moellons de schiste et couverte par un toit conique. Vers l'est le jardin paysager est constitué d'une pelouse avec bosquets et massifs d'arbres. A l'est et à l'ouest les escaliers sont encadrés de massifs, bordés de banquettes de buis. Vers l'ouest, une pelouse se prolonge en une large prairie ornementale agrémentée de part et d'autres de bosquets ou de groupes d'arbres. Au sud, certains communs et les parties agricoles présentent un plan régulier un U : on trouve au nord un corps de bâtiment en tuffeau de taille, couvert en croupe, comprenant écuries et remises, logements et orangerie.","habitants":"famille d'Orvaux \r\n        \"","divers":"Château de Danne à  Saint-Martin du Bois","gps":"","images":["../../jctruffet.com/image/image_49/49_Danne_1.jpg"]},"Consult_chateau_formulairef8ae":{"id":"Consult_chateau_formulairef8ae","dept":"49","canton":"Doué la Fontaine","commune":"Doué-la-Fontaine","nom":"Doué_Fontaine","type":"Vestiges-Châteaux","periode":"XII-XVI","histoire":"DOUE-La FONTAINE, ville créée autour d'une motte du premier quart du XIIe siècle. Trois enceintes successives des premier quart du XIe siècle. La ville englobe actuellement trois anciennes communes et leurs villages.  L'habitat de surface s'y développe dans la 1ère moitié du XIXe siècle. Motte féodale élevée par le comte d'Anjou  la partie nord du château date du XVIe siècle, et la partie sud du XVIIIe siècle, l'édifice se compose d'un étage carré et étage de comble. Gros oeuvre : terre,  pierre de taille, moellon, appareil mixte, enduit. Couverture : toit à longs pans, croupe, noue, pignon découvert, toit  polygonal recouverts d'ardoise et grison en couverture.                                                                         PONT de VARENNE, cinq Km au nord ouest de Doué  à Louresse Rochemenier.   Domaine appartenant au XIe siècle à l'abbaye Saint-Florent de Saumur. Il appartient à la famille Serpillon au XVe siècle. Le fief dépendait du Grand Launay en la paroisse Saint-Pierre de Doué-la-Fontaine. Le château du Pont de Varenne, construit à la limite des XVe et XVIe siècles, présente deux ailes en retour d'équerre édifiées sur un terre plein carré flanqué de trois tours d'angles et entouré de douves. La chapelle de la Vierge et Sainte Suzanne fut fondée par René Thoisnon le 21 décembre 1530. Les communs sont du XVIIIe siècle. Les intérieurs et l'aile sud du château ont été repris au XVIIIe siècle et au XIXe siècle.","architecture":"SOULANGER, l'édifice est construit à la demande du baron Joseph François Foullon.  A Soulanger, l'habitat est presque entièrement troglodytique en 1772,   du XIIe siècle, trois enceintes successives des premier quart du XIe siècle, XVIIe; La Chapelle-sous-Doué, établie autour d'une villa carolingienne du premier quart du Xe siècle, rattachée à Doué en 1841. Douces mentionnée au XIe siècle, rattachée à Doué, en 1964, et Soulanger mentionnée au IXe siècle, rattachée à Doué en 1964. A Soulanger, l'habitat est presque entièrement troglodytique en 1772. L'habitat de surface s'y développe dans la 1ère moitié du XIXe siècle. Château dit des Basses-Minières, vestiges du château bâti à partir de 1774 par Jacques-Antoine pour Joseph-François Foullon. Le parc, l'aile sud des écuries, les dépendances au sud-ouest, le pavillon d'entrée Est, ont été remaniés au XIXe siècle.  Un moulin à vent fut bâti sur les soubassements du château en 1805. Sa construction date du 3ème quart du XVIIIe siècle. Jacques Denis Antoine en fut l'architecte. Les éléments protégés du château de Soulanger sont les restes du soubassement du château, inscrits aux M.H. le 1/04/1986.","habitants":"Pont  famille Serpillon  Soulanger;  baron Joseph François Foullon\r\n        \r\n        \"","divers":"Doué Mairie grav-1  doué fontaine vestiges grav 2-3-4  pont de Varennes  grav 8-947° 13' 43? N, 0° 16' 32? O                       Soulanger grav 5-6-7","gps":"","images":["../../jctruffet.com/image/image_49/49_Dou%c3%a9_Fontaine_1.jpg","../../jctruffet.com/image/image_49/49_Dou%c3%a9_Fontaine_2.jpg","../../jctruffet.com/image/image_49/49_Dou%c3%a9_Fontaine_3.jpg","../../jctruffet.com/image/image_49/49_Dou%c3%a9_Fontaine_4.jpg","../../jctruffet.com/image/image_49/49_Dou%c3%a9_Fontaine_5.jpg","../../jctruffet.com/image/image_49/49_Dou%c3%a9_Fontaine_6.jpg","../../jctruffet.com/image/image_49/49_Dou%c3%a9_Fontaine_7.jpg","../../jctruffet.com/image/image_49/49_Dou%c3%a9_Fontaine_8.jpg","../../jctruffet.com/image/image_49/49_Dou%c3%a9_Fontaine_9.jpg"]},"Consult_chateau_formulaired97f":{"id":"Consult_chateau_formulaired97f","dept":"49","canton":"Tiercé","commune":"Durtal","nom":"Durtal_49","type":"Forteresse","periode":"XI-XV-XVII","histoire":"A Durtal le château de Chambiers et Auvers.                   DURTAL, Les hostilités entre les comtés dAnjou et du Maine poussèrent Foulque Nerra à jeter dès 1040 les premières fondations du château de Durtal. Au milieu du XIe siècle, son fils Geoffroy de Martel acheva la construction du château. Le château actuel date du XVe siècle, après la guerre de Cent Ans. Il est édifié par la famille de La Jaille. Il est lune des résidences du maréchal de France François de Scépaux et, un siècle plus tard, dHenri de Schomberg. Le château a reçu la visite des membres de la famille royale et de la cour et, a hébergé le Roi René, Charles IX et Henri II. La multiplication des échanges commerciaux par le Loir au XVIe siècle entraîne lenrichissement progressif de la région et lapogée du château, laquelle marque le début dune transformation en un palais où séjourne Louis XIII et Catherine de Médicis. Au XVIIe siècle, le duc de la Rochefoucauld fait du château lune de ses nombreuses résidences. En 1859, le château va héberger l'hôpital de la ville, desservie par les surs de Sainte-Marie d'Angers. La transformation mutile certaines salles et certains décors des intérieurs. Construit sur un promontoire rocheux, le château de Durtal domine la vallée du Loir.  Il est classé aux M.H. en 1900 et 1950.","architecture":"DURTAL, forteresse féodale construite sur un promontoire rocheux,  constituait un rempart stratégique permettant dassurer la défense de ses terres  C'est un château-fort de style Médiéval et Renaissance. La construction du château de Durtal date du XIe, XVe et XVIIe siècle. Fondé par le comte dAnjou Geoffroy Martel au XIe siècle. La demeure actuelle fait coexister deux tours de lancien château, entouré d'une vaste enceinte  s'ouvrant par quatre portes, édifié avant l'apparition des armes à feu conserve des courtines trés élevées, de cette époque ainsi que deux tours à l'Est reliées par une courtine au sommet de laquelle courait un chemin de ronde continu  (mâchicoulis, lucarne gothique, toits à poivrières, appareil alterné de schiste et de calcaire) avec un corps de bâtiment représentatif des différentes tendances de la Renaissance : élévation, encore verticale, de la galerie Sud de la cour et ordonnances orthogonales des façades extérieures. Les peintures murales du XVIe siècle sont attribuées à Henry de Scomberg. Ce monument redevenu privé, après avoir hébergé une maison de retraite, a connu plusieurs phases de constructions. Les dernières en date sont très récentes, même s'il s'agit de travaux de rénovation. Aujourd'hui, les derniers acquéreurs ont pour volonté de rendre au château ses lettres de noblesse.","habitants":"Famille de La Jaille;   duc de la Rochefoucauld\r\n        \"","divers":"Durtal : 47°40'13,9\" Nord et 0°14'39,21\" Ouest                   DURTAL  47° 40' 14,02\" Nord et 0° 14' 42\" Ouest a                  auvers grav-7","gps":"","images":["../../jctruffet.com/image/image_49/49_Durtal_49_1.jpg","../../jctruffet.com/image/image_49/49_Durtal_49_2.jpg","../../jctruffet.com/image/image_49/49_Durtal_49_3.jpg","../../jctruffet.com/image/image_49/49_Durtal_49_4.jpg","../../jctruffet.com/image/image_49/49_Durtal_49_5.jpg","../../jctruffet.com/image/image_49/49_Durtal_49_6.jpg","../../jctruffet.com/image/image_49/49_Durtal_49_7.jpg"]},"Consult_chateau_formulaireffc5-2":{"id":"Consult_chateau_formulaireffc5-2","dept":"49","canton":"Doué la Fontaine","commune":"Les Verchers-sur-Layon","nom":"Echuilly","type":"Château","periode":"XVIII","histoire":"ECHUILLY,  a été construit en 1730 par la famille de La Celle originaire d'Anjou, par l'intermédiaire de Jean de La Celle (1712-1795), seigneur d'Echuilly et de Ligné, conseiller du Roi et président-trésorier du bureau des finances de Tours. Il passa successivement, de père en fils, à chevalier Jean-Joseph de La Celle (1741-1818), président de la Cour des Aides de Paris, à Jean de La Celle (1768-1827), magistrat à la cour impériale de Paris, au comte Jean-Amédée de La Celle (1802-1880), juge-auditeur au tribunal de Sens, et au comte Raymond de La Celle d'Echuilly (1836-1894)2. Il passa dans la famille de Geoffre de Chabrignac à la suite du mariage de Jeanne de La Celle d'Echuilly (1865-1919) avec le comte Louis de Geoffre de Chabrignac (1860-1902), officier de dragons. Leur fils Jean, marquis de Geoffre de Chabrignac, en hérita.  L'édifice est inscrit au titre des M.H. en 1992.","architecture":"ECHUILLY, architecture inspirée par les tendances parisiennes de l'époque Régence ; Une des grandes demeures du XVIIIe siècle en Anjou avec Montgeoffroy. Château dont les communs présentent des vestiges de l'ancien château du XVIe ou XVIIe siècle; les deux tours rondes reliées au château par deux ailes basses. Le château actuel a été construit pendant le deuxième quart du XVIIIe siècle ; la chapelle a été consacrée en 1758 ; une orangerie a été construite dans le parc en 1862. L'édifice se compose de deux étages carrés et étage de comble, un avant corps en légère saillie  sommet d'un fronton triangulaire à l'opposée côté parc avant corps, le gros-oeuvre en tufeau ; pierre de taille et bossage, type de couverture : toit à longs pans ; croupe ; dôme circulaire, couverts d'ardoise.","habitants":"famille de La Celle\r\n        \"","divers":"Echuilly 47° 08' 26\" nord, 0° 18' 46\" ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Echuilly_1.jpg","../../jctruffet.com/image/image_49/49_Echuilly_2.jpg"]},"Consult_chateau_formulaire9b92":{"id":"Consult_chateau_formulaire9b92","dept":"49","canton":"Segré","commune":"L","nom":"Faucille","type":"château","periode":"XVII","histoire":"FAUCILLE, ancien fief et seigneurie mentionnés dès le début du XVe siècle, en 1531, Renée de la Faucille y fonde une chapelle. Sa construction date du XVIIe siècle. Il appartient à la commune. Le château de la Faucille est inscrit partiellement aux M.H. depuis le 27/12/1972 et classé aux M.H. le 20 09 1973.","architecture":"FAUCILLE, le château actuel est une construction du XVIIe siècle. Au cours du XVIIIe siècle les travées centrales des élévations nord et sud ont été remaniées, au nord, l'aile reliant le château aux communs a été reprise. En 1895, le propriétaire aménage dans une partie du château un atelier de photos.Le château comporte un corps de logis central flanqué latéralement de deux courtes ailes. Aux faces nord et sud, les portes d'entrées sont encadrées par des bossages continus et couronnées par des frontons cintrés, le tout en tufeau.","habitants":"Renée de la Faucille\r\n        \"","divers":"Faucille 47° 44' 32,42\" Nord, 0° 54' 59,23\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Faucille_1.jpg","../../jctruffet.com/image/image_49/49_Faucille_2.jpg","../../jctruffet.com/image/image_49/49_Faucille_3.jpg","../../jctruffet.com/image/image_49/49_Faucille_4.jpg"]},"Consult_chateau_formulaire77d1":{"id":"Consult_chateau_formulaire77d1","dept":"49","canton":"Angers","commune":"Feneu","nom":"Feneu_Montriou","type":"Château","periode":"XV-XVIII","histoire":"Trois châteaux à Feneu celui de Bois-Dayen, de Montriou et de Sautré                                                                                     BOIS-DAYEN, construit en 1893 pour Edmond Lorieux, inspecteur des ponts et chaussées. Aujourd'hui relais château par Sylvaine Meyneau-Henri.                                                                      MONTRIOU, en 1474 au décès de Bertrand de Beauvau capitaine du château d'Angers, est un ensemble seigneurial fondée en 1484 par Charlotte de Beauvau, fille dun sénéchal dAnjou, veuve d'Yves de Scépeaux et remarié à Jean Rabault seigneur d'Yvoy.  La seigneurie passe au Pincé, aux de Brie  et au Brahier avant de passer en 1595 aux Constantin de Varennes qui en 1663 son fils Gabriel cède le domaine  à René Hercule de Launay de la Brosse dont les héritiers ne le conservent pas. Divers propriétaire se succèdent; Michel Mauvif de la Plante l'acquiere en 1749, échoit ensuite à sa fille  Renée Toublanc qui épouse en 1781 Pierre-René Cassin trésoriers à Tours. Au XIXe siècle Félix Cassin de la Loge époux d'Augusta de Beauchamp hérite, habité par les fermiers, mais en 1831 le fils du ménage Ferdinand Cassin de la Loge recoit en 1860 Montriou pour son mariage avec Thérése-Marie du Mas décide de restaurer l'édifice en une demeure confortable transmis par héritage à la famille de Loture.","architecture":"MONTRIOU, est un ensemble seigneurial assez important pour posséder douves et portail fortifié au XVe siècle. l'édifice se composait à l'origine de deux corps de bâtiments en équerre dont l'un avait été  bâti à partir d'éléments d'un ancien donjon du XIIe siècle une tour hexagonale à la base puis de plan carré logé un escalier à vis ,  la restructuration complète du site au XIXe siècle, portant sur le bâtiment et les éléments défensifs, laisse seule intacte la chapelle initialement attachée au logis, fondée en 1484 par Charlotte de Beauvau, fille dun sénéchal dAnjou, proche du Roi René. Aujourdhui, à lécart du château, cet édifice gothique flamboyant conserve un ensemble de peintures murales de la fin du XVe siècle, leur thème relatif à la passion du Christ et leur caractère rapprochent duvres équivalentes nées dans lentourage artistique du Roi René.                                                  SAUTRE, sur le site de Sautré, le château, belle construction du XVIIIe siècle, prend son assise sur une forteresse du XIIIe siècle. Construit par le seigneur Guillaume de Feneu, il est implanté sur un éperon rocheux et possède un parc paysager avec de grands arbres (séquoias, cèdres du Liban, tulipier), de nombreux rosiers et autres fleurs. Il faut ajouter a cela, une cour dhonneur entourée par des douves aujourdhui asséchées, une loggia à litalienne ouverte sur la Suine et un petit verger en bordure de la Mayenne, face à un moulin.","habitants":"Bois Dayen, famille d'Edmond Lorieux,                         Montriou; famille de Ferdinand Cassin                                     Sautré; seigneur Guillaume de Feneu\r\n        \r\n        \"","divers":"Feneu celui de Bois-Dayen grav-1, de Montriou  grav 2-3-4 , et de Sautré   de 5 à 8","gps":"","images":["../../jctruffet.com/image/image_49/49_Feneu_Montriou_1.jpg","../../jctruffet.com/image/image_49/49_Feneu_Montriou_2.jpg","../../jctruffet.com/image/image_49/49_Feneu_Montriou_3.jpg","../../jctruffet.com/image/image_49/49_Feneu_Montriou_4.jpg","../../jctruffet.com/image/image_49/49_Feneu_Montriou_5.jpg","../../jctruffet.com/image/image_49/49_Feneu_Montriou_6.jpg","../../jctruffet.com/image/image_49/49_Feneu_Montriou_7.jpg","../../jctruffet.com/image/image_49/49_Feneu_Montriou_8.jpg"]},"Consult_chateau_formulairebc20":{"id":"Consult_chateau_formulairebc20","dept":"49","canton":"Segré","commune":"Ferrière de Flée","nom":"Ferrière_Flée","type":"Château","periode":"XIV","histoire":"Château de La Retiverie pas d'ino et pas d'image.                   FERRIERE, le corps de logis principal, couvert en longs pans, ainsi que les deux pavillons qui le flanque semblent être des constructions du XIVe siècle, il fut rehaussé au cours du XXe siècle afin d'améliorer le logis seigneurial de la famille Villeprouvé : trois travées à meneaux et croisées et deux lucarnes à pignons contribuèrent à éclairer les espaces intérieurs. Il a été partiellement inscrit au registre des M.H. en juillet 1989.","architecture":"FERRIERE,  des XIVe-XVIe siècles, remanié au XIXe. Il est fait en moellon et en schiste et recouvert principalement en ardoise. La porte d'entrée du pavillon nord comprend un tympan ajouré de fleurs de lys. Il s'agit d'une propriété privée. Le pavillon sud-est fut remanié à la même époque: des baies de mêmes profils venant homogénéiser les élévations. Des travaux ont été entrepris au XVIIe siècle, surtout sur l'aménagement intérieur, au rez de chaussée du logis et à l'étage du pavillon Saint Aubin. La seconde et importante campagne de travaux commence en 1880, date à laquelle l'architecte angevin Auguste Beignet entreprend des restaurations et des agrandissements : à l'est, il recrée l'ancien porche et la chapelle à laquelle on accède depuis une petite tour demi circulaire; à l'ouest il élève un nouveau pavillon à deux étage carrés surélevés et étage de comble en surcroît ; il restitue enfin l'ancien hourd en couronnement de l'élévation sud du pavillon Saint-Aubin. Vers la même époque le paysagiste Chevalier entreprend l'aménagement du parc. L'ensemble des constructions a été réalisé en moellons de schiste; le tuffeau de taille fut utilisé en second oeuvre pour certains chaînages d'angle, les encadrements de baies et les lucarnes ; le pan de bois avec briques en parement a été employé pour la restitution du hourd du pavillon Saint-Aubin.","habitants":"Famille Villeprouvé \r\n        \r\n        \"","divers":"Château de la Ferrière à Flée","gps":"","images":["../../jctruffet.com/image/image_49/49_Ferriere_Fl%c3%a9e_1.jpg","../../jctruffet.com/image/image_49/49_Ferriere_Fl%c3%a9e_2.jpg","../../jctruffet.com/image/image_49/49_Ferriere_Fl%c3%a9e_3.jpg"]},"Consult_chateau_formulaire0db5":{"id":"Consult_chateau_formulaire0db5","dept":"49","canton":"Beaufort en Vallée","commune":"Fontaine-Guerrin","nom":"Fontaine_Guerrin","type":"Château","periode":"XV-XVI","histoire":"FONTAINE-GUERRIN, au XVe siècle, une grande famille féodale sinstalle sur les terres et prend à son tour le nom de celles-ci. Le père, sire Hardouin de Fontaine, est lauteur du Livre du trésor de vénerie, un traité de chasse orné denluminure, quil dédie en 1394, à Louis II dAnjou. Le texte débute ainsi « Je mappelle Hardoyn, seigneur de Fontaines-Guérin ». Ce seigneur a deux fils : Jean des Fontaines (v 1390  1423) et Guérin des Fontaines (v 1396  1421). Tous deux ont participé en 1421 à la bataille de Vieil-Baugé, pendant la guerre de Cent Ans. Cette bataille fait suite au traité de Troyes, du 21 mai 1420, dans lequel Charles VI Le Fou déshérite son fils, le dauphin Charles, au profit de son gendre, le roi dAngleterre Henri V. Henri V laisse son frère Thomas, duc de Clarence, mener larmée anglaise et le dauphin Charles sassocient aux Ecossais, ennemis jurés des Anglais.                                                                                 CHAPPE chambres d'hôtes de Jean-Claude et Catherine Desmet.                                                                                         TOUR-du-PIN dépendait de la seigneurie de Fontaine Guerrin.","architecture":"CHAPPE,   élégant château du XVIe siècle, de pur style Renaissance. Le manoir est un site occupé depuis l'âge du néolithique, on y retrouve un dolmen détruit. Entourées de douves, le manoir de Chappe fut construit dans la fin du XVIe au XVIIe siècle. C'est un monument typique de la renaissance avec une architecture composées de fenêtres hautes à vitraux, mais aussi de grandes cheminées et des tomettes typiques du XVIe siècle.                                                       TOUR DU PIN,  est un édifice construit au bas Moyen-Age mais est un site fréquenté depuis l'âge du Néolithique par la présence d'un dolmen (détruit) situé devant la ruine. On relève d'une architecture avec une fenêtre géminée sur la façade principale, caractéristique du XIIe au XIIIe siècle. L'édifice mesure 20 mètres de longueur pour 10 mètres de largeur et est situé à 48 mètres d'altitude au pied d'un sommet. Le château est composé de 3 tours protégées par des meurtrières et son architecture fut modifiée jusqu'au XVe siècle. Pour des raisons inconnues, le château est tombé en ruine (guerres de Cent Ans ) et n'a pas su retrouver sa généalogie, ni son histoire.","habitants":"Famille du Sire Hardouin de Fontaine\r\n        \"","divers":"Château de Chappe  grav 1-2-3-4, Fontaine_Guerrin grav-5, tour du pin grav 6-7","gps":"","images":["../../jctruffet.com/image/image_49/49_Fontaine_Guerrin_1.jpg","../../jctruffet.com/image/image_49/49_Fontaine_Guerrin_2.jpg","../../jctruffet.com/image/image_49/49_Fontaine_Guerrin_3.jpg","../../jctruffet.com/image/image_49/49_Fontaine_Guerrin_4.jpg","../../jctruffet.com/image/image_49/49_Fontaine_Guerrin_5.jpg","../../jctruffet.com/image/image_49/49_Fontaine_Guerrin_6.jpg","../../jctruffet.com/image/image_49/49_Fontaine_Guerrin_7.jpg"]},"Consult_chateau_formulaire2149":{"id":"Consult_chateau_formulaire2149","dept":"49","canton":"Beaufort en Vallée","commune":"Fougeré","nom":"Fougeré_Gastine","type":"Château","periode":"XV","histoire":"Deux château à Fougeré celui de Gastines et celui d'Aulnière. GASTINE, le château est construit en 1590, en pleines guerres de Religion. Sa silhouette initiale est modifiée par la surélévation de laile gauche du bâtiment (peut-être au XVIIIe siècle). Édifié sur une plate forme entourée de larges douves.                                                                                   AULNIERE, le château de l'Aulnière se situe sur la commune de Fougeré, à une dizaine de kilomètres au nord-ouest de Baugé-en-Anjou, au cur de la vallée du Loir, labellisée Pays d'Art et d'Histoire. Le nom de ce château lui vient du latin Alnus (l'Aulne) qui a également donné son nom au fleuve côtier de l'Aulne et à la seigneurie qui habitait le château depuis le Moyen-âge.","architecture":"GASTINE,  le château dorigine concilie les principes esthétiques acquis au XVIe siècle (façade symétrique axée sur un pavillon central) avec les impératifs dun système défensif discret adapté à cette période troublée, châtelet avec pont-levis, meurtrières dans les tours, garage à bateau (dispositif très rare). La modestie de la décoration et des espaces intérieurs suggère quon est en présence du corps dentrée dun logis plus prestigieux prévu sur la plate-forme, mais jamais réalisé.                                                                           AULNIERE,  fief mentionné au XIe siècle dont il subsiste la motte, semble t'il au sud du site, les bâtiments conservés datent du XVe siècle ; une chapelle, sous le vocable de saint-Loup, avait été aménagée dans la partie Est de la porte fortifiée, pendant le premier quart du XVIIe siècle (remaniements des ouvertures) et était désaffectée dès 1637, l'ensemble a été très dégradé vers 1930. Le domaine de l'Aulnière dévoile encore aujourd'hui un imposant châtelet d'entrée, précédé d'un pont passant ses douves en eau vive alimentées par la rivière du Verdun.","habitants":"Seigneur locaux\r\n        \"","divers":"à Fougeré celui de Gastines et celui d'Aulnière grav-5; Gastine 47° 37' 06\" N, 0° 08' 48\" O","gps":"","images":["../../jctruffet.com/image/image_49/49_Fouger%c3%a9_Gastine_1.jpg","../../jctruffet.com/image/image_49/49_Fouger%c3%a9_Gastine_2.jpg","../../jctruffet.com/image/image_49/49_Fouger%c3%a9_Gastine_3.jpg","../../jctruffet.com/image/image_49/49_Fouger%c3%a9_Gastine_4.jpg"]},"Consult_chateau_formulaireaf4a":{"id":"Consult_chateau_formulaireaf4a","dept":"49","canton":"Segré","commune":"La Chapelle-sur-Oudon","nom":"Gemmeraie","type":"Château","periode":"XVIII","histoire":"GEMMERAIE, ce beau château fut construit pour monsieur de Saint-Hénis vers 1875 en lieu et place d'une ancienne ferme. Le parc fut sans doute dessiné à la même époque. Toutefois la galerie située au nord-ouest paraît postérieure, sans doute élevée dans les années 1880. Si un logement et ses dépendances semblent être du XVIIIe siècle, les communs, les écuries et les remises, sont eux contemporains de la demeure; par contre la ferme nouvelle est probablement une création de la fin du quatrième quart du XIXe siècle. Demeure inscrite dans un parc paysager l'entourant sur trois côtés. Des allées divisent le jardin en quatre espaces agrémentés de bosquets; au nord-ouest, devant la galerie, se trouvait un parterre aujourd'hui disparu. Au sud-est on trouve les communs (écuries et remises), derrière un rideau d'arbres, un ancien logis et ses dépendances (étables à vaches, porcheries ) et au-delà, la ferme nouvelle dont les bâtiments sont disposés autour d'une cour.","architecture":"GEMMERAIE, la demeure, de plan quadrangulaire, présente un rez-de-chaussée surélevé sur un sous sol et un étage carré. Une toiture en croupe couvre l'ensemble, la galerie flanquant la façade nord-ouest est l'élément le plus surprenant de l'habitation : faisant office tout à la fois de salle à manger d'été et d'atelier d'artiste, elle est ouverte sur le parc par de nombreuses fenêtres. Elevée sur un sous-sol et couverte par de petites toitures en croupe, elle bénéficie d'un traitement décoratif recherché : pilastres, médaillons, modillons, balustrade et consoles ; les trois travées centrales de l'élévation sur le parc, légèrement en ressaut, révèlent un parement en briques, les dessus de fenêtres adoptent le même décor de volutes, coquilles et guirlandes végétales. Latéralement les élévations nord et sud de la galerie présentent une avancée à pans coupés, sorte de bow-window disposant d'un balcon sur consoles. Les communs présentent des murs en moellons de schiste recouverts d'enduit et l'entourage des ouvertures est en briques. Dans la ferme nouvelle, le logis est l'élément le mieux conservé: un corps de bâtiment couvert en long pans est flanqué de deux pavillons avec toitures en bâtières. Portes, fenêtres, lucarnes et oculi sont marqués par l'emploi alterné de briques et de pierres de taille calcaire en chaînage.","habitants":"Famille de monsieur de Saint-Hénis \r\n        \"","divers":"Château de Gemmeraie","gps":"","images":["../../jctruffet.com/image/image_49/49_Gemmeraie_1.jpg"]},"Consult_chateau_formulairebc6f-2":{"id":"Consult_chateau_formulairebc6f-2","dept":"49","canton":"Tiercé","commune":"Grez-Neuville","nom":"Grandière","type":"Forteresse","periode":"XII-XV","histoire":"GRANDIERE, au XIIe siècle la famille de la Grandière s'établie   sur la paroisse de Grez, il reconstruisirent au XVe siècle le château qui occupe l'emplacement du manoir fortifié de la Giraudière dont il subsiste les douves entourant le terre plein et le châtelet d'entrée, le nom de la Grandière est attesté dès le XIIIe siècle. Dès 1706 la chapelle de la Grandière est transférée à la Giraudière qui prend le nom de Grandière. La construction du nouveau château est interrompue par la Révolution et ne fut habité qu'au milieu du XIXe siècle  Gilles Hercule de la Grandière arrêté en 1793 guillotiné à Angers. La descendance de Palamède Gilles dont le dernier meurt sans descendance  les biens reviennent à l'épouse de son frère Eugène Charlemagne  suite à plusieurs décés dans cette famille le domaine est cédé  en 1882 à une branche cadette de la famille  de la Grandière.","architecture":"GRANDIERE , de forme trapézoïdale entouré de douves. Exposé nord-sud, de plan rectangulaire et doté d'un avant-corps central, il ouvre au sud sur la cour d'honneur et se compose d'un rez-de-chaussée surélevé, d'un étage carré et d'un étage de comble. La façade est composée de neuf travées : la travée centrale est constituée d'un avant-corps orné d'un bossage continu en pierre de taille de tuffeau et doté de deux baies cintrées. L'horizontalité de la façade est marquée par le bandeau qui souligne le premier étage et par la corniche. Les fenêtres rectangulaires sont encadrées de pierres de taille de tuffeau harpées. Les lucarnes sont dotées de frontons triangulaires. La façade postérieure est également organisée selon neuf travées, la travée centrale se distinguant par un léger ressaut et un fronton triangulaire doté d'un oculus.Le châtelet d'entrée se compose d'un corps de logis central dont les angles extérieurs sont garnis de tours rondes baignant dans les douves. La porte charretière en plein-cintre est cantonnée de deux contreforts qui, autrefois, servaient de cadre aux rainures du pont-levis ; au rez-de-chaussée, le passage couvert donne accès à la cour d'honneur et aux tours et à la tourelle d'escalier à vis. Au premier étage, une grande salle est dotée d'une cheminée en pierre (non vue). Les façades extérieures ont été modifiées au XVIIIe siècle ; Après 1812, destruction d'une aile accolée au châtelet d'entrée et celle d'un autre bâtiment à l'ouest du château, remplacé par la maison du garde.  Les bâtiments de ferme sont construits à partir de 1895 par l'architecte Dubos.","habitants":"Famille de la Grandière\r\n        \r\n        \"","divers":"Château de la Grandière à Creys- Neuville","gps":"","images":["../../jctruffet.com/image/image_49/49_Grandi%c3%a8re_1.jpg","../../jctruffet.com/image/image_49/49_Grandi%c3%a8re_2.jpg","../../jctruffet.com/image/image_49/49_Grandi%c3%a8re_3.jpg","../../jctruffet.com/image/image_49/49_Grandi%c3%a8re_4.jpg","../../jctruffet.com/image/image_49/49_Grandi%c3%a8re_5.jpg","../../jctruffet.com/image/image_49/49_Grandi%c3%a8re_6.jpg"]},"Consult_chateau_formulaire4dbe":{"id":"Consult_chateau_formulaire4dbe","dept":"49","canton":"Tiercé","commune":"Grez-Neuville","nom":"Grez_Neuville","type":"Château","periode":"XVI-XVII","histoire":"Trois chateaux celui de Beuvrière, Bellevue et du Port                   BEUVRIERE, l'actuel château est bâti vers 1867 à l'emplacement d'un château plus ancien détruit en 1864. Deux architectes se succèdent:  Dainville qui reprend en 1893 des plans de Chesneau pour bâtir l'aile ouest et la tour ronde. Le plus ancien seigneur de la Beuvrière connu est Jean Valleaux en 1384. A partir de 1765, la Beuvrière est la propriété de la famille de Terves jusqu'en 1909, date à laquelle le comte Léonce de Terves la vend  la terre à M. Paul Dognin. A partir de 1929, la terre de la Beuvrière est démembrée et les fermes qui en dépendaient sont vendues. Une chapelle est construite vers 1500 par René Valleaux et en 1633, le corps matériel de la chapelle des Essarts y est transféré. Elle est détruite au XIXe siècle et une nouvelle est bénie en 1893. Du château, dépendaient deux moulins : le moulin à eau est rebâti en 1856. De nombreuses fermes aux alentours étaient rattachées au domaine de la Beuvrière : dont au XVIe siècle, la Basse-Beuvrière, la Haute-Beuvrière, la Talonnière, le Vau, le Souchet, la Roberderie, le Petit Feudonnay. De nombreux échanges de terre ont eu lieu entre la seigneurie de la Beuvrière et celle des Essarts. La ferme du domaine a été construite après 1861.","architecture":"PORT, le lieu du Port est attesté dès le XVIe siècle. En 1720 la maison du Port se composait de maisons au bout de la cour, le tout clos de murs, avec un pré de charmes et un vivier encore visible sur le cadastre de 1812. Au XIXe siècle, le bâtiment subit des modifications. La remise doit dater du XVIIIe siècle, mais l'autre bâtiment de dépendance avec les encadrements de brique et de tuffeau fait partie des ajouts du XIXe siècle. En 1953, le bâtiment est acquis par la commune qui en fait la mairie. La façade est organisée selon cinq travées avec un étage carré et un étage en surcroît. L'ajout d'une travée a été réalisé sur le flanc nord. Les encadrements de baies et les chaînages d'angle sont en tuffeau.                                                                                             BEUVRIERE, le  plan du bâtiment est en forme de L . La façade principale est composée d'un corps central encadré par deux pavillons d'angle recouverts de toits en pavillon. La travée centrale est dotée d'un perron au rez-de-chaussée, d'un balcon au premier étage et flanquée de deux tourelles d'angle. La façade antérieure laisse apparaître l'étage de soubassement orné d'une galerie avec des arcades en anse de panier. Une tour d'escalier hors-oeuvre se trouve au centre de la façade. L'aile en retour d'équerre se termine par un pavillon d'angle et une tour circulaire ornés de mâchicoulis. L'ensemble du château est doté de toits en ardoise avec des lucarnes à frontons triangulaires à pinacles. Les baies sont à meneaux et les traverses en pierre.","habitants":"Beuvrière, Famille de Terves\r\n        \"","divers":"Bellevue  grav-1   Bourg d-iré  47° 36' 07\" Nord et 0° 40' 59\" Ouest  Beuvriere 47° 35' 13\" Nord et 0° 43' 48\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Grez_Neuville_1.jpg","../../jctruffet.com/image/image_49/49_Grez_Neuville_2.jpg","../../jctruffet.com/image/image_49/49_Grez_Neuville_3.jpg","../../jctruffet.com/image/image_49/49_Grez_Neuville_4.jpg"]},"Consult_chateau_formulaireb1db":{"id":"Consult_chateau_formulaireb1db","dept":"49","canton":"Segré","commune":"Loiré","nom":"Gué_Loiré","type":"Château","periode":"XV","histoire":"GUE, fief et seigneurie du Gué relevait des fiefs de la Motte-Cesbron et de la Péroussaie à Loiré. Vers le milieu du XVIe siècle le Gué devient prééminent dans la paroisse, et en 1606, une maison nouvellement édifiée est mentionnée par Louis de Saint-Martin dans un aveu fait à la Motte Cesbron. Vers 1620, de nouvelles constructions sont dues à Jean Gabory, seigneur du Gué. Le grand pavillon gauche du logis est achevé en 1642 et la chapelle, placée sous l'invocation de Notre-Dame de la Pitié et saint Jean-Baptiste, est construite en 1647. Au cours du 4e quart du XIXe siècle, l'ancienne métairie située au sud-est du logis est détruite, ainsi que l'aile Est du logis dont n'est conservé que le pavillon de l'extrémité sud et une tour ronde. La conciergerie est élevée en 1853-1855, tandis que le parc agricole et le jardin potager sont commencés en 1877, suivant les plans des frères Büler ; c'est probablement à cette époque que furent construits la bergerie, l'abreuvoir et l'orangerie. La galerie, le colombier et les deux viviers existant en 1667 sont détruits.","architecture":"GUE, le plan masse du château figuré sur le cadastre de 1832, correspond probablement à son état de la fin du XVIIe siècle. Le  logis et les communs se regroupaient sur les trois côtés de la cour, le logis occupant le côté nord, le côté sud étant clos en 1667 par une muraille,  construite entre 1607 et 1642, comprend deux pavillons Est et ouest, reliés par un corps central rectangulaire, leurs faces postérieures nord étant agrémentées par différents pavillons hors-oeuvre. Le pavillon ouest, date de 1642, comprend l'escalier d'honneur, à volées droites couvertes de voûtes en berceau en plein-cintre, desservant une salle et des chambres. L'aveu de 1667 indique que le logis comprenait aussi des \"offices, estuves, descharges, celliers, caves\" et une galerie. La chapelle, bâtie à l'angle nord-est du logis, était autrefois accessible par l'intérieur de celui-ci. La destruction de la métairie de la basse-cour est liée à la réorganisation du château vers 1877.","habitants":"Gué, Famille de Jean Gabory,\r\n        \"","divers":"Beuvrière, du Port","gps":"","images":["../../jctruffet.com/image/image_49/49_Gu%c3%a9_Loir%c3%a9_1.jpg","../../jctruffet.com/image/image_49/49_Gu%c3%a9_Loir%c3%a9_2.jpg"]},"Consult_chateau_formulairef7c6":{"id":"Consult_chateau_formulairef7c6","dept":"49","canton":"Segré","commune":"Loiré","nom":"Gué_Loiré_II","type":"Château","periode":"XVIII-XIX","histoire":"Dans cet article trois châteaux à Gué, celui de la Ferté, la Roche d'Iré et de Vallière.                                                          La FERTE, le château de la Ferté est situé au nord de la commune, sur les hauteurs. Le site est d'abord occupé par une motte médiévale, et le château actuel a été construit au XIXe siècle. La partie centrale du logis a été construite par le baron Turpin de Crissé au début du siècle, à son retour d'émigration, et la partie Est ainsi que les communs ont été ajoutés par Clovis-Antoine Brillet de Candé en 1845.                                                                          La ROCHE D'IRE qui était vaste de 505 hectares, a été profondément remodelé au milieu du XIXe siècle par Frédéric Parage. Ce dernier était un agronome de renom, membre puis président de société industrielle et agricole d'Angers et de Maine-et-Loire. Il a fait construire ou reconstruire les fermes du Tremblay, de la Porte, la Botelleraie, la Rénaie, la Vieille-Ville, Sauconnier, la Plineraie, le Petit-Aulnay, la Chaussée, le Lattay, la ferme du château de la Roche d'Iré, la Ricaudaie, la Daviaie, Champ-Forain et la Boussinaie. Ces fermes conservent une architecture traditionnelle en schiste mais les ouvertures sont encadrées de brique mécanique industrielle.\r\nDix-sept moulins ont été recensés à Loiré entre le XVe siècle et le XIXe siècle. Cinq étaient des moulins à eau, six des moulins à vent, deux des moulins à huile à traction animale ; les autres n'ont pas été identifiés. Le seul encore existant est le moulin à eau de la Rivière-d'Orvaux, reconstruit en 1866 par René Hodé.","architecture":"VALLIERE, a été construit vers 1765 par Joseph-Charles-François de Hellaut et son épouse Anne-Agathe-Luce de Barin. Il remplace un manoir plus ancien qui occupait lui-même l'emplacement d'une motte castrale du Moyen Âge. L'édifice a été remis au goût du jour en 1868 avec le remplacement de lucarnes et la modification des façades des communs. Le domaine a été complètement remanié à cette même période.","habitants":"Ferté; baron Turpin de Crissé                                                           La Roche; famille de  Frédéric Parage                                     Vallière;   Joseph-Charles-François de Hellaut \r\n        \"","divers":"Vallière-grav 1                                                                            Roche d'Iré grav 2-3_4","gps":"","images":["../../jctruffet.com/image/image_49/49_Gu%c3%a9_Loir%c3%a9_II_1.jpg","../../jctruffet.com/image/image_49/49_Gu%c3%a9_Loir%c3%a9_II_2.jpg","../../jctruffet.com/image/image_49/49_Gu%c3%a9_Loir%c3%a9_II_3.jpg"]},"Consult_chateau_formulaire3081":{"id":"Consult_chateau_formulaire3081","dept":"49","canton":"Beaufort en Vallée","commune":"Guédeniau","nom":"Guédeniau","type":"Manoirs","periode":"XVIII","histoire":"Deux châteaux à Guédeniau celui manoir de Monet et du Teil.                                                                                        MONET, partie centrale de l'édifice datant de la première moitié du XVIe siècle ; le corps de logis accolé vers l'est datant de la deuxième moitié du XVIIIe siècle; le corps de logis vers l'ouest, le portail et les communs datent de la première moitié du XIXe siècle. Le bâtiment se compose de deux étages carrés et d'un étage de comble, le gros-oeuvre est réalisé en tufeau ; pierre de taille ; calcaire ; moellon; enduit et appareil mixte, élévations à travées surmontées de toit à longs pans ; toit polygonal ; toit conique ; croupe ; pignon découvert et toit à longs pans brisés, couverts d'ardoise.","architecture":"TEIL, corps de logis central, et parties de l'aile sud-ouest des communs datant du XVe siècle ; reprise de la distribution intérieure du corps de logis central, escalier, pavillons d'angle et cour de la première moitié du XVIIe siècle; reprise des baies et cheminées du logis, ailes ouest et sud-ouest des communs au XVIIIe siècle; aile nord-ouest des communs datée 1811. L'édifice se compose d'un étage carré et un étage de comble, le gros-oeuvre : calcaire, moellon, élévations à travées surmontées de toit à longs pans ;  toit en pavillon, couverts d'ardoise. Il ne reste plus grand-chose et il est bien difficile de se faire une idée de ce que fut cette imposante forteresse.","habitants":"Peintre Monet\r\n        \r\n        \"","divers":"à Guédeniau grav 1 celui manoir de Monet grav_2 et du Teil grav-3.","gps":"","images":["../../jctruffet.com/image/image_49/49_Gu%c3%a9deneau_1.jpg","../../jctruffet.com/image/image_49/49_Gu%c3%a9deneau_2.jpg","../../jctruffet.com/image/image_49/49_Gu%c3%a9deneau_3.jpg"]},"Consult_chateau_formulaire0cb0":{"id":"Consult_chateau_formulaire0cb0","dept":"49","canton":"Segré","commune":"Louvaines","nom":"Hardas","type":"Château","periode":"XV-XVI","histoire":"HARDAS ,en 1667  Charles François dAndigné marquis de Vezins et Marie Collin son épouse à Angers, vendent à Toussaint Chastelain juge consul dAngers, la maison noble, terre fief et seigneurie du Hardas à Louvaines, château construit aux XVe et XVIe siècles. Des reprises ont été effectuées au XVIIe siècle et au XIXe siècle.  domaine métairie vigne bois taillis et bois de haute futaie, meubles en ladite maison du Hardas, la métairie de Chematz au Lion dAngers, qui lui appartient de la succession de Charles dAndigné baron dAngrie son père, ainsi que Rousseau en a joui à titre de ferme. Vente  sur laquelle à déduire due par ledit Sgr de Vezins audit acquéreur . Pendant la guerre de Vendée, les Chouans habitèrent le manoir du Hardas. Tapi dans une cache secrète du grenier, Augustin René de Jourdan fut arrêté et fusillé par \"les bleus\".","architecture":"HARDAS, du nord au sud, le château est constitué d'une succession de quatre corps de bâtiments, il est flanqué aux angles nord-ouest et sud-est de deux tours rondes. La tour nord, couverte par un dôme et sommée d'un lanternon, comporte une corniche à modillons, à l'intérieur fut installé au XXe siècle un escalier tournant métallique. Sur la face Est, le pavillon central auquel est accolé, au nord, un pavillon plus étroit comprenant un escalier à vis dans oeuvre. Le gros-oeuvre des constructions est en moellons de grès, les lucarnes, l'entourage des baies et les corniches sont en pierre de taille de tuffeau. Les lucarnes sont amorties de frontons-pignons, à rampants festonnés, sur lesquels sont inscrites des armoiries martelées, illisibles. Les baies de la face Est sont encadrées par des chambranles à crossettes ; celles de la face ouest disposent de pilastres cannelés ioniques, longs et étroits. On trouve au sud-Est un petit pavillon ouvrant sur le jardin. Les parties agricoles sont couvertes par des toitures à longs pans, l'étable présente sur sa face sud une lucarne-pignon.","habitants":"Hardas; Charles dAndigné baron dAngrie\r\n        \"","divers":"Hardas 47° 41' 27\" Nord, 0° 48' 38\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Hardas_1.jpg","../../jctruffet.com/image/image_49/49_Hardas_2.jpg","../../jctruffet.com/image/image_49/49_Hardas_3.jpg","../../jctruffet.com/image/image_49/49_Hardas_4.jpg"]},"Consult_chateau_formulaired7f6":{"id":"Consult_chateau_formulaired7f6","dept":"49","canton":"Chalonnes sur loire","commune":"Saint-Aubin-de-Luigné","nom":"Haute_Basse_Guerche","type":"Vestiges","periode":"XIII-XIV","histoire":"BASSE-GUERCHE, ce logis a été construit vers 1450 par Louis de Bauveau, sénéchal du Roi René Comte d'Anjou.  Au décès de Louis de Bauveau, sa fille Isabelle hérite du château. Mariée avec Jean II de Bourbon, Isabelle est l'aïeule des rois de France. À partir de 1506, il devient la propriété de la famille de la Trémoille. En 1545, il passe à la famille de Sanzay. Ensuite, c'est le maire d'Angers, François Lanier qui l'achète, Sa fille Marie conserve le château et le transmet par son mari Adrien, à la famille de Crespy. Toujours par alliance, la famille de Contades en est le propriétaire jusqu'à la Révolution.   il appartient actuellement à Paul Dénéchère.                                                                                 HAUTE-GUERCHE  La seigneurie, attestée dès le début du XIIIe siècle, appartenait à la famille de Savonnière avant de devenir, au début du XVe siècle, la propriété des seigneurs de la Jumellière. Né vers 1389, Guillaume de la Jumellière était seigneur de la Haute-Guerche, de Martigné Briand et de Blaison. Capitaine au château de Beaufort en Vallée, il fut lun des premiers membres de lordre du Croissant, créé par René dAnjou en 1448. Son fils Lépart, né vers 1411, résidait au château en 1452 et 1461. Il eut pour fils René de la Jumellière, conseiller et chambellan du Roi, commanditaire, vers 1503 au maître doeuvre Pierre Péret, de la partie centrale du château de Martigné Briand. À sa mort vers 1519, la seigneurie échut par héritage à la famille de Goulaines qui la vendit en 1635 aux Barrin de la Galissonnière. Il est incendié en 1793, sur lordre de Vial, maire de Chalonnes, et fut vendu comme bien national quatre ans plus tard.","architecture":"HAUTE-GUERCHE  Le site se divisait en deux parties : une haute cour indépendante, fermée de courtines et entourée de fossés secs au nord-est et une basse-cour incluant des communs et une chapelle. Le logis seigneurial sorganisait en L autour de la haute cour. Les trois étages, éclairés côté Layon par de larges croisées en tuffeau munies de coussièges, chauffés par des cheminées, formaient les étages nobles. Quatre tours rondes, dont deux seulement sont encore en élévation, flanquaient les angles de la haute cour. Très ruiné, le château présente encore deux enceintes fortifiées : dans la haute-cour sélève le donjon carré du XIIIe siècle, renforcé au XVe siècle par quatre tours circulaires (trois subsistent) et flanqué dun escalier de la même période. La basse-cour, dont lentrée est contrôlée par un corps de garde à échauguettes du XVIe siècle.                                               BASSE-GUERCHE, l'édifice est inscrit au titre des M.H. en 1947. Ce logis a été construit vers 1450 par Louis de Bauveau.","habitants":"Basse Guerche, famille de la Trémoille                                 Haute guerche; Guillaume de la Jumellière \r\n        \"","divers":"Haute et basse Guerche: 47° 19' 43\" Nord, 0° 39' 58\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Haute_Basse_Guerche_1.jpg","../../jctruffet.com/image/image_49/49_Haute_Basse_Guerche_2.jpg","../../jctruffet.com/image/image_49/49_Haute_Basse_Guerche_3.jpg","../../jctruffet.com/image/image_49/49_Haute_Basse_Guerche_4.jpg","../../jctruffet.com/image/image_49/49_Haute_Basse_Guerche_5.jpg","../../jctruffet.com/image/image_49/49_Haute_Basse_Guerche_6.jpg"]},"Consult_chateau_formulaire654f":{"id":"Consult_chateau_formulaire654f","dept":"49","canton":"Segré","commune":"Noëllet","nom":"Houssardière","type":"Château","periode":"XVII","histoire":"HOUSSARDIERE, une lucarne en tuffeau sur la façade arrière porte le date  de 1404 mais le logis a probablement été construit au XVIIe siècle. Lors
