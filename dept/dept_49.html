const FULL={"Consult_chateau_formulairea64d":{"id":"Consult_chateau_formulairea64d","dept":"49","canton":"Longué-Jumelles","commune":"Allonnes","nom":"Allonnes","type":"Château","periode":"XVI-XVII","histoire":"Trois châteaux dans cet article d'Allones, la Godinière, la Martinière, la Thibaudière et le manoir de Beauséjour.               GODINIERE, le manoir primitif mentionné en 1461 est détruit. Le colombier et les douves au nord-est, datant du XVIe siècle, sont des vestiges du château primitif. Le pavillon nord du corps de logis a été construit limite XVIIe siècle XVIIIe siècle, les communs du XVIIIe siècle. La chapelle saint Louis, bénie le 23 octobre 1756 est détruite. Le corps principal du logis et l'aile nord, la serre, le jardin régulier et le parc, datent de la première moitié du XIXe siècle. Le corps principal du logis, l'aile nord, la serre et le colombier édifiés en tufeau de taille. Le pavillon nord du logis et les communs en tufeau moellon, enduit et bossages...                                                               THIBAUDIERE, du XVe siècle, très remanié. Les traces des premiers occupants  ont été retrouvées, elles remontent à 1440 avec Jean Nicolas, maître orfèvre du Roi René et de Jeanne de Laval. Puis se sont succédé plusieurs générations de la famille des Maupassant. Les communs s'organisent autour d'une cour intérieure enfermant, en son centre, une volière en briques, pierres et ardoises. Ces bâtiments reprennent le style anglo-normand, avec les colombages peints en façades. La cour intérieure s'organise autour de deux pôles fonctionnels, les écuries et la ferme modèle, le parc a été dessiné au XIXe siècle achevé en 2003 est baptisé Maupassant de Bois Savary, en mémoire des anciens maîtres des lieux.","architecture":"BEAUSEJOUR,  chambres d'hôtes de la famille Thimolin. MARTINIERE, des découvertes fortuites indiquent qu'il existait un établissement humain à l'emplacement du village d'Allonnes dès l'âge du Fer puis à l'époque gallo-romaine. Une motte féodale parait avoir existé au lieu-dit les Châteliers, dans la partie nord-est du village. Le village s'étire sur la route nationale  qui suit le tracé de la voie antique reliant Tours à Angers. On note à peine deux maisons présentant des vestiges du XVIe siècle et quelques autres du XVIIIe siècle. L'ensemble du bâti du village a été remanié ou construit au XIXe siècle, à l'instar de l'église Saint-Doucelin agrandie et transformée à plusieurs reprises au cours du même siècle. Logis de l'ancien manoir, actuellement partie agricole, datant du XVIe siècle ; le château de la Martinière, construit à l'ouest du manoir primitif comprend un corps central du XVIIIe siècle et deux pavillons latéraux du XIXe siècle. Les parties agricoles Est et nord remontent au XVIIIe siècle et XIXe siècle, les douves sont en partie comblées, et les écuries datent du XIXe siècle, château et tour de l'escalier à  vis du manoir en tufeau et pierre de taille, escalier du château en charpente, dans le pavillon est  du XIXe siècle.","habitants":"Thibaudière; Famille de  Jean Nicolas\r\n        \"","divers":"Neuf châteaux à Allonnes 47° 18' 14\" nord, 0° 01' 05\" est dont l'hôtel de ville grav 1, Allonnes grav 2  Beauséjour-3, Rigaudiere-4","gps":"","images":["../../jctruffet.com/image/image_49/49_Allonnes_1.jpg","../../jctruffet.com/image/image_49/49_Allonnes_2.jpg","../../jctruffet.com/image/image_49/49_Allonnes_3.jpg","../../jctruffet.com/image/image_49/49_Allonnes_4.jpg"]},"Consult_chateau_formulaire9243":{"id":"Consult_chateau_formulaire9243","dept":"49","canton":"Longué-Jumelles","commune":"Allonnes","nom":"Allonnes_Brain","type":"Château","periode":"XVI-XVII","histoire":"Quatre châteaux dans cet article celui de Bellay,  de la Chaussées, de  Rigaudières et de Coutancières pas d'article pour ces deux derniers.                                                             BELLAY, il fut le berceau de la famille du Bellay, qui apporta de nombreux hommes illustres : des évêques de Paris, de Poitiers, du Mans ou de Fréjus, des abbés et des clercs, dont le plus célèbre fut le poète Joachim du Bellay. Le château du Bellay a appartenu ensuite à de nombreux propriétaires avant darriver au cours du XIXe siècle, à la famille Feuillant, qui était de riches industriels, dont un gérant de la Compagnie Générale des Omnibus de Paris, ancêtre de la RATP. Puis, il ira, par alliance à la famille de Contades, descendants du Maréchal Louis Georges Erasme de Contades dont les propriétaires actuels sont les descendants. Durant la seconde guerre mondiale, à cause de sa position stratégique et de sa proximité avec la ville de Saumur, le général allemand Kurt Feldt réquisitionna le château du Bellay durant la défense de la Loire où les allemands furent bloqués par la défense héroïque, des cadets de Saumur. Le château du Bellay a été inscrit partiellement aux M.H. le 8/11/1995.","architecture":"BELLAY, le château du Bellay date du XVIe au début du XIXe siècle. L'architecte français fut Léonard Seheult.  De style moderne en tr ois corps de logis le central le plus important à trois niveaux rectangulaire à toit plat  un balcon sur trois travées centrales soutenu par des piliers avec arcades, deux petits pavillons à chaque flanc  d'un niveau. Le deuxième pavillon en retour d'équerre avec pavillon carrée en bout, toit à l'impérial.                                                                            CHAUSSEES, est une élégante demeure reconvertie en résidence dartiste et galerie dart. Construits au cours de la deuxième moitié du XIXe siècle à l'emplacement d'un manoir détruit, à l'est, ferme du XVIIIe siècle. La demeure se compose d'un étage carré et un étage en surcroît, le gros-oeuvre en tufeau, pierre de taille, moellon, enduit et pierre avec brique en remplissage, élévation ordonnancée surmontée de toit à longs pans, pignon, toit en pavillon couvert, croupe, couverts d'ardoises.                                                  COUTANCIERE, est un beau et charmant château , qui offre des  chambres dhôtes élégantes et luxueuses avec tours carrées.","habitants":"Bellay Famille du Bellay, Famille Feuillant\r\n        \r\n        \"","divers":"Allonnes 47° 18' 14\" nord, 0° 01' 05\" est                             Coutancière grav 4-5-6, Bellay grav 1-2; Chaussée grav -3.                                           Bellay : 47° 18' 52\" Nord et 0° 01' 06\" Est","gps":"","images":["../../jctruffet.com/image/image_49/49_Allonnes_Brain_1.jpg","../../jctruffet.com/image/image_49/49_Allonnes_Brain_2.jpg","../../jctruffet.com/image/image_49/49_Allonnes_Brain_3.jpg","../../jctruffet.com/image/image_49/49_Allonnes_Brain_4.jpg","../../jctruffet.com/image/image_49/49_Allonnes_Brain_5.jpg","../../jctruffet.com/image/image_49/49_Allonnes_Brain_6.jpg"]},"Consult_chateau_formulaire7a9c":{"id":"Consult_chateau_formulaire7a9c","dept":"49","canton":"Tiercé","commune":"Andigné","nom":"Andigné","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux  à Andigné la Picoulière et de Saint-Henis (voir article).                                                                              PICOULIERE, bâtie en mars 1719, elle a été reconstruite en 1790 et restaurée en 1989. Elle abrite une statue de la Vierge anciennement dans l'église. Des travaux d'alignement du bourg (plans non datés : avant la reconstruction du clocher de l'église en 1889) menés dans la deuxième moitié du XIXe siècle ont modifié l'aspect du village.  Le maire de la commune d'Andigné monsieur Aubert y a habité de 1843 à 1853.","architecture":"PICOULIERE,  est une ancienne maison noble avec une chapelle Notre-Dame de Pitié fondée le 23 mars 1544 par demoiselle Thibaude de la Perrotière, la chapelle a été transformée en écurie avec l'ajout d'un grenier mais a été restaurée. Les bâtiments étaient entourés, sur le cadastre ancien, par des fossés en eau, La demeure actuelle date du XVIIIe siècle. Les bâtiments de ferme ont été remaniés dans la deuxième moitié du XIXe siècle. Le château de la Picoulière est composé d'un étage carré et d'un étage de comble doté de lucarnes cintrées en tuffeau, la façade s'organise selon trois travées. Les bâtiments de ferme disposés au nord du château sont dotés d'encadrements de baies en brique","habitants":"Andigné Henis; famille de Mathefelon\r\n        \"","divers":"Picoulière 47° 39' 49\" nord, 0° 47' 33\" ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Andign%c3%a9_1.jpg","../../jctruffet.com/image/image_49/49_Andign%c3%a9_2.jpg"]},"Consult_chateau_formulaire0a86":{"id":"Consult_chateau_formulaire0a86","dept":"49","canton":"Beaupréau","commune":"Andrezé","nom":"Andrezé","type":"Manoir-Vestiges","periode":"XIV-XVII","histoire":"A Andréze,  les  ruines du château médiéval des Hayes.\r\n La Morinière,  Moulin-Brulé, construit en 1880                         MORINIERE, manoir  ayant appartenu successivement à la famille Paulmier en 1414, à la famille Lecomte, puis à René de Pouillé marié à Jeanne Lecomte en 1493. Du XVIIe siècle à la Révolution, c'est la famille Frain qui en est propriétaire. La terre louée par M. de Dieusie à M. Retailleau, revint par alliance en 1848 à M. Charles Bourcier de la Morinière président de la cour d'appel d'Angers. Le château de la Morinière fut construit en 1853 par M. Cyr Charles Bourcier-Retailleau.                                                                                  HAYES-GASSELIN, fut construit en 1400. En 1747, le château appartenait à Bernard-Marie Pantin, capitaine au régiment de Penthièvre et chevalier de l'Ordre de Saint-Louis.  La famille Pantin vendit le domaine au député Ambroise Joubert-Bonnaire. Depuis 1893, le domaine appartient à la famille de Clermont-Tonerre.","architecture":"HAYES-GASSELIN, la construction du château date du XIVe au XVIe siècle.  C'était une forteresse entourée de douves et d'un étang de 4 ha. En 1747. Les Républicains brûlèrent le château en 1794 dont-il reste que des vestiges. Il est classé aux M.H. depuis 1970.                                                                    MORINIERE premier château médiéval construit en 1404 et détruit pendant les guerres de Vendée. Ce château bâti en dix huit mois, était une demeure de villégiatures de pur style Napoléon III. Il en a gardé tout son caractère et son mystère grâce à une décoration imaginative sur le thème des fées, le château de trois niveaux sur soubassement flanqué aux angles de tourelles à quatre  niveaux à toit en poivrières, domine les rives du Beuvron à proximité des ruines de l'ancien château.","habitants":"Morinière; famille Cyr Charles Bourcier-Retailleau.\r\n        \"","divers":"Andrezé    47° 10' 19\" nord, 0° 57' 08\" ouest                           Haies  garv-1. 47° 10' 26\" Nord et 0° 56' 12\" Ouest        Morinière grav 2-3-4,  47° 21' 58\" Nord, 0° 30' 35\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Andrez%c3%a9_1.jpg","../../jctruffet.com/image/image_49/49_Andrez%c3%a9_2.jpg","../../jctruffet.com/image/image_49/49_Andrez%c3%a9_3.jpg","../../jctruffet.com/image/image_49/49_Andrez%c3%a9_4.jpg"]},"Consult_chateau_formulaire7865":{"id":"Consult_chateau_formulaire7865","dept":"49","canton":"Angers","commune":"Angers","nom":"Angers","type":"Forteresse","periode":"XII-XIV","histoire":"ANGERS, édifier du Xe et XIe siècle par le comte d'Anjou Foulque Nerra et par son fils Geoffroy qui avait épousé en 1128 Mathilde, fille de Guillaume duc de Normandie et roi d'Angleterre. Autour de 1370, Louis Ier d'Anjou fait construire le logis du sénéchal, largement arasé en 1592, sur ordre  de Henri III, modernise la grande salle, fenêtres et cheminées, travaux réalisés sous la direction de son maître des uvres, Macé Darne. Le logis royal et la chapelle Saint-Jean-Baptiste sont commandités par Louis II vers 1400. Entre 1435 et 1453, René d'Anjou, dont le maître des oeuvres est Guillaume Robin, fait doubler le logis royal d'une galerie. L'escalier de cette galerie porte sur sa voûte la devise \"en dieu en soi\". Le châtelet est édifié vers 1450. Après la mort du roi René en 1482 l'Anjou est rattaché à la couronne, quelque temps habité par Louise de Savoie mère de François Ier. Ses autres réalisations ont disparu. Entre 1591 et 1593, les défenses sont réaménagées par les architectes Dagobert Guillot, Robert Chalemel et Guillaume Briffault sur ordre du capitaine Donadieu de Puycharic : arasement des tours, création de plates-formes d'artillerie, l'une portant la date de 1595, et de canonnières dans les tours.","architecture":"ANGERS, Forteresse  est pourvu sous Louis IX de sa grande enceinte  de 17 tours de 50 mètres de hauteur  construite à partir du milieu du IXe siècle sur un site d'origine mésolithique, la forteresse date pour ses parties les plus anciennes des Xe et XIe siècles,  du temps des comtes ingelgériens, les élévations ouest et est de la salle comtale remontent à cette période. Parmi les réaménagements dus à Henri II Plantagenêt, après 1132, subsistent des vestiges de la collégiale Saint-Laud, ainsi que la porte de la salle et l'arcature ornant le mur ouest, le logis du gouverneur, dont l'escalier date du 4e quart du XVe siècle, est remanié dans la première moitié du XVIIIe siècle. Au XIXe et dans la première moitié du XXe siècle, l'armée construit prisons, arsenaux et ateliers dans les cours et les jardins. Le château est restauré après 1945 par l'architecte Bernard Vitry qui ajoute une galerie pour présenter la tapisserie de l'Apocalypse, ensemble exceptionnel dinspiration franco-flamande commandé à la fin du XIVe siècle par Louis Ier dAnjou.","habitants":"Angers le roi René\r\n        \"","divers":"Angers  47° 28' 12\" Nord et 0° 33' 36\" Ouest                    t","gps":"","images":["../../jctruffet.com/image/image_49/49_Angers_1.jpg","../../jctruffet.com/image/image_49/49_Angers_2.jpg","../../jctruffet.com/image/image_49/49_Angers_3.jpg","../../jctruffet.com/image/image_49/49_Angers_4.jpg","../../jctruffet.com/image/image_49/49_Angers_5.jpg","../../jctruffet.com/image/image_49/49_Angers_6.jpg","../../jctruffet.com/image/image_49/49_Angers_7.jpg"]},"Consult_chateau_formulairee687":{"id":"Consult_chateau_formulairee687","dept":"49","canton":"Angers","commune":"Angers","nom":"Angers_II","type":"Château","periode":"XII-XV","histoire":"Dans cet article trois châteaux, le logis Barrault  le palais épiscopal et de Pince. A cinq kilomètres à l'est à Bauné le château de Briançon                                                           LOGIS- BARRAULT  En 1673, propriété du clergé, et  un lieu de formation pour les prêtres. Aux XVIIe et XVIIIe siècles, de profondes transformations et extensions sont effectuées. Le bâtiment du XVe siècle fait lobjet dun classement au titre des M.H. depuis le 29 janvier 1902. Aujourd'hui  musée.                                                     ORGEMONT, le château d'Orgemont, est un hôtel particulier, dont la construction date du XVIIIe siècle.                       PINCE, hôtel de Pincé date du XVe siècle. Le logis de style Renaissance édifié entre 1525 et 1535,  propriétaire Jean de Pincé, maire d'Angers. Le logis fut réalisé pour le maire de l'époque Jean de Pincé. En 1861, le peintre Angevin Guillaume Bodinier le donne à la ville d'Angers pour y créer un musée ouvert au public en 1889,  fermé depuis 2005 pour des raisons de sécurité et d'accessibilité, sa réouverture est prévue pour février 2020. L'hôtel de Pincé a été classé aux M.H. en 1875. Il est la propriété de la commune.                                                                    BRIANCON à Bauné, sa construction date du XVIIe siècle.  chambres d'hôtes.","architecture":"Palais EPISCOPAL du TAU dans son état actuel date du début du XIIe siècle, bâti sur des bases plus anciennes. En 1438, l'évêque Hardouin de Bueil fit modifier les toitures et aménager une vaste salle qui sert depuis de bibliothèque. L'escalier principal donnant sur la cour d'honneur a été construit, en 1506, sur la volonté de l'évêque François de Rohan. Il resta inachevé à la hauteur de la salle synodale jusqu'en 1864. Au XVIIe siècle, le palais du Tau a subi des modifications importantes. Avec l'évêque Claude de Rueil, les trois arcades de liaisons, entre les deux vaisseaux de la salle synodale, furent murées et des appartements furent aménagés dans le vaisseau Nord. Avec l'évêque Michel Lepeletier, les décors de la façade Nord et la salle synodale sont dénaturés. Il fit reconstruire une ancienne secrétairerie pour son usage personnel. En 1751, la cuisine circulaire fut restaurée. Dans la seconde moitié du XIXe siècle l'ensemble de l'édifice est restauré. Une seconde cour d'entrée rue de l'Oisellerie a été formée avec la construction d'une nouvelle aile, entre 1861 et 1864 les appartements du vaisseau Nord ont été supprimés afin dagrandir le corps principal. Le palais du Tau présente un ensemble architectural complet, montrant bien les différents remaniements. L'édifice conserve son affectation à la Révolution, et devint le musée des tapisseries et de l'art religieux en 1910, puis la maison diocésaine des uvres, en 1954. Le palais du Tau est classé aux M.H. depuis le 23/10/1907.","habitants":"Pincé; Famille de  Jean de Pincé\r\n        \"","divers":"A ANGERS, les châteaux;    Palais grav-4   : 47° 28' 15,6\" Nord, 0° 33' 13,68\" Ouest,     Briançon grav 2-3                       47° 29' 59\" Nord, 0° 19' 07\" Ouest                                   Orgement Grav-1,   47° 26' 34,44\" Nord et 0° 32' 22,2\" Ouest                                                   Logis Barrault-Grav-6","gps":"","images":["../../jctruffet.com/image/image_49/49_Angers_II_1.jpg","../../jctruffet.com/image/image_49/49_Angers_II_2.jpg","../../jctruffet.com/image/image_49/49_Angers_II_3.jpg","../../jctruffet.com/image/image_49/49_Angers_II_4.jpg","../../jctruffet.com/image/image_49/49_Angers_II_5.jpg","../../jctruffet.com/image/image_49/49_Angers_II_6.jpg"]},"Consult_chateau_formulaire5d56":{"id":"Consult_chateau_formulaire5d56","dept":"49","canton":"Segré","commune":"Angrie","nom":"Angrie","type":"Château","periode":"XVI-XIX","histoire":"A Angrie le château d'Angrie, de Villegontier et de la Gachetière.\r\nANGRIE, est mentionnée au XIIe siècle et relevait féodalement de Candé, avait été modernisé au XVIe siècle par la famille d'Andigné. Il passe ensuite aux mains de la famille Turpin de Crissé. Ce sont Elisabeth Louise Turpin de Crissé et Charles Louis Arthur d'Adhémar, comte de Lostanges, qui font reconstruire l'édifice de 1845 à 1849, par l'architecte René Hodé. La décoration peinte des quatre pièces principales du rez-de-chaussée est confiée au peintre parisien Achille Léger Larbouilhat.                               VILLEGONTIER, ancien logis du château qui faisait face aux communs, a été détruit au cours de la deuxième moitié du XIXe siècle et remplacé par le logis actuel reconstruit à quelques dizaines de mètres plus au sud, en haut de la pente dominant la vallée de l'Erdre. En même temps, la partie nord des communs étaient détruites, tandis que la partie sud étaient rénovée. Le pavillon situé à l'extrémité nord des communs actuels est datable du XVIIe siècle. L'ancienne ferme, située au nord-est du château paraît avoir été bâtie au XVIIIe siècle. En 1506, Louis Restier, seigneur,  Au XVe siècle, et sans doute antérieurement, les seigneurs de Villegontier étaient titulaire de l'office de sergent de la baronnie de Candé.","architecture":"ANGRIE,  reconstruit au XVIe siècle, fut démoli pour être remplacé par un château de style Néogothique Troubadour.  Le logis présente sa façade principale au sud. À l'est se trouvent les communs suivis d'une basse-cour bordée au sud par les bâtiments de la ferme. Le logis édifié par René Hodé, est constitué d'un bâtiment rectangulaire cantonné de quatre tours circulaires. Le gros-oeuvre des longs murs est en moellons de schiste enduit tandis que la travée centrale de chaque façade, les tours sont en tufeau de taille. Du côté sud, on accède au rez-de-chaussée surélevé par un escalier extérieur à deux volées en fer à cheval. Si par sa forme rectangulaire et son toit à croupes, le logis se rattache à la tradition néo-classique, ses tours, ses faux mâchicoulis et ses faux créneaux, démolis depuis  quelques années en 1990 , sont les éléments caractéristiques du style néo-gothique angevin, inauguré par René Hodé, que l'on retrouvera des années plus tard aux châteaux de Chanzeau et de Challain la Potherie.                                                                        GACHETIERE, manoir de la Gachetière a été bâti au XVIIe siècle. Il est inscrit aux M.H. depuis 1981.","habitants":"Angrie; famille d'Andigné\r\n        \"","divers":"Angrie grav-1,  47° 34' 15\" Nord et 0° 58' 20\" Ouest                                             Gachetière Grav-2,   47° 33' 17\" Nord et 0° 54' 38\" Ouest                                                    Villegontier grav-3","gps":"","images":["../../jctruffet.com/image/image_49/49_Angrie_1.jpg","../../jctruffet.com/image/image_49/49_Angrie_2.jpg","../../jctruffet.com/image/image_49/49_Angrie_3.jpg"]},"Consult_chateau_formulaired696":{"id":"Consult_chateau_formulaired696","dept":"49","canton":"Chalonnes sur loire","commune":"Le Pouéze","nom":"Anjouère","type":"château","periode":"XIX","histoire":"ANJOUERE, l'actuel château a été construit, à la demande d'Armand Hipolyte Tripier de Lozé marié à Adélaïde de Richeteau, par l'architecte Tendron en 1878. L'origine de l'Anjouère est plus ancienne, des vestiges de l'ancien site sont conservés : il s'agissait d'un fief relevant jusqu'au XVIIIe siècle de la terre d'Armaillé. En 1450, l'Anjouère est décrite \"lieu, maison, courtil, prez, plesses, faulx et meurgers à connins, landes, terres et boys nommés Lanjouère\". Jean Guibert en est alors le seigneur. En 1697, René de Terves, seigneur d'Armaillé, possède la maison principale, munie de fossés et ponts-levis, jardins, garennes, etc... Anne de Terves l'apporte par mariage à Paul Richeteau en 1832 : leur fille épouse Armand Hipolyte Tripier de Lozé qui fait construire un nouveau château à distance des vieux bâtiments.","architecture":"ANJOUERE, le château est de plan massé avec un rez-de-chaussée surélevé ménageant un étage de soubassement, puis un étage carré et un étage de comble. La façade sud est composée au centre d'une tourelle polygonale surmontée d'une lucarne ornée d'un écusson décoratif. De part et d'autre de cette travée centrale, une travée de baies est surmontée d'un pignon. La façade nord reprend un rythme ternaire : la partie centrale est dotée d'une tourelle d'angle et surmontée d'une lucarne ornée des armes des familles Tripier de Lozé et Richeteau. Sur les deux façades, les travées centrales sont dotées d'un parement en tuffeau tandis que les travées latérales sont enduites. L'ensemble des baies est encadré de tuffeau. A noter le soin apporté aux tables de tuffeau disposées sous les fenêtres, ornées de baguettes croisées. Au nord-ouest du château se trouve un bâtiment de dépendance abritant un logement et un garage. A proximité se trouve également une écurie : ces constructions sont dotées d'encadrements de baies en brique. Les bâtiments de l'ancien site de l'Anjouère et ceux d'Armaillé sont aujourd'hui en grande partie en ruine.","habitants":"Anjouére; Famille Paul Richeteau,\r\n        \r\n        \"","divers":"château d'Anjouère à le Pouéze.","gps":"","images":["../../jctruffet.com/image/image_49/49_Anjou%c3%a8re_1.jpg","../../jctruffet.com/image/image_49/49_Anjou%c3%a8re_2.jpg","../../jctruffet.com/image/image_49/49_Anjou%c3%a8re_3.jpg"]},"Consult_chateau_formulaireb55b":{"id":"Consult_chateau_formulaireb55b","dept":"49","canton":"Chemillé_Melay","commune":"Aubigné sur Layon","nom":"Aubigné","type":"Forteresse","periode":"XV","histoire":"AUBIGNE,  bâti par Geoffroi dAubigné, c'est un château fort. Il occupe une situation exceptionnelle dans le site de la Vallée du Layon. Il date du 4e quart du XIe siècle et du XVe siècle. L'élément majeur du château est le donjon quadrangulaire, édifié à la fin du XIe siècle, largement reconstruit au XVe siècle. Aubigné est constitué d'une double enceinte, avec ses tours flanquantes plus ou moins conservées, une enceinte intérieure avec 2 fortes tours carrées, conservant de nombreuses dispositions architecturales intéressantes, ainsi que des portes et serrureries originelles. Il est inscrit aux M.H. depuis le 11/06/1991. Le château d'Aubigné était la propriété d'une personne privée et aujourd'hui la propriété de la commune.","architecture":"AUBIGNE, le fort a été construit par Geoffroi dAubigné. Il est constitué d'une double enceinte il a été construit au 4e quart du XIe siècle et au XVe siècle à partir des vestiges d'une enceinte du château construit plus à l'est.  A l'intérieur de la première enceinte construit au XIIe siècle, on trouve un « four à ban » restauré, deux tours carrées du XIe siècle. L'une intacte, l'autre en ruine. Ces deux tours sont reliées entre elles par un chemin de ronde et de la même manière elles sont reliées à une troisième tour ronde, plus ancienne. A l'époque, elles avaient pour fonction de délimiter le domaine et le logis seigneurial, à présent, il est transformé en jardin. Le mur d'enceinte et les deux tours rondes (Sud-Ouest et Nord-Ouest) datent aussi du XIIe siècle. Nous pouvons trouver une cheminée du XVe siècle dans l'une des deux tours rondes.  En ce qui concerne les vestiges du château construit plus à l'est, nous pouvons encore voir les 2 tours carrées l'une à l'ouest, l'autre au nord ainsi qu'une cheminée mise en place au XVIe siècle et des fossés qui relient les deux tours. Nous trouvons aussi une tour ronde avec sa cheminée du XVe siècle qui fait suite au mur attenant au donjon. Il y a aussi des logis de ferme et des parties agricoles construit au XVe siècle et XVIe siècle.","habitants":"Aubigné; Famille Geoffroi dAubigné\r\n        \"","divers":"Forteresse d'aubigné GPS : 47° 12' 46\" Nord, 0° 27' 35\" Ouest","gps":"47° 12' 46\" Nord, 0° 27' 35\" Ouest","images":["../../jctruffet.com/image/image_49/49_Aubign%c3%a9_1.jpg","../../jctruffet.com/image/image_49/49_Aubign%c3%a9_2.jpg","../../jctruffet.com/image/image_49/49_Aubign%c3%a9_3.jpg","../../jctruffet.com/image/image_49/49_Aubign%c3%a9_4.jpg","../../jctruffet.com/image/image_49/49_Aubign%c3%a9_5.jpg"]},"Consult_chateau_formulaire3fb8":{"id":"Consult_chateau_formulaire3fb8","dept":"49","canton":"Beaufort en Vallée","commune":"Auverse","nom":"Auverse","type":"Château","periode":"XVI-XVIII","histoire":"Trois châteaux à Auverse celui de la Calvinière, de Fresne et de Sansonnière, à quelques kilomètres au sud-Est le château de  Bouchet à Lasse.                                                                   BOUCHET,  château du XVIe siècle transformé en demeure d'agrément au XVIIIe siècle et agrandi au XIXe siècle par une aile aujourd'hui démolie. Aile de dépendance datant des XVIIe et XVIIIe siècles. Propose des chambres d'hôtes.                                                                             CALVINIERE, manoir, des XVIe, XVIIe et XVIIIe siècles, façades et toitures, pigeonnier et communs, grille d'entrée, M.H. inscrit par arrêté du 13 mai 1986.  Partie Est du corps central conservant des vestiges du XVIe siècle ; reconstruite dans la première moitié du XVIIe siècle; partie ouest du corps central et pavillons latéraux bâtis dans la deuxième moitié du XVIIe siècle, sans doute en plusieurs campagnes, le colombier et la boulangerie datant du XVIIe siècle, les dépendances Est sont reconstruites dans la deuxième moitié du XIXe siècle et l'orangerie est construite vers 1900 par l'architecte Paul Datessen. L'édifice est composé d'un sous-sol, en rez de chaussée et un étage en surcroît, à travées surmontée d'un toit en pavillon, toit à longs pans et croupe recouverts d'ardoise.","architecture":"BOUCHET, grand corps de bâtiment avec pavillons latéraux reconstruit au XVIIIe siècle, logement à l'ouest du XVIIIe siècle, chapelle dans une tour au sud-est très remaniée au XIXe siècle. De la forteresse originelle du XVe siècle, il reste un grand mur défensif et 3 tours. Les XVIIIes et XIXes siècles en ont fait une demeure ouverte, sur un magnifique parc romantique de 30 ha.                                                                                FRESNE, le château du Fresne, des XVIe siècle et XIXe siècles, chapelle et tour dite des prisons qui l'accompagne, chapelle isolée fondée en 1572 et restaurée dans la décennie 1860-1870, M.H. inscrit par arrêté du 16 mars 1999 chapelle et tour accolée datant de la première moitié du XVIe siècle ; le château a été bâti en 1770 ; les dépendances à l'ouest ont été édifiées ou reconstruites sur des murs anciens dans la deuxième moitié du XIXe siècle, voûtes bâties, insertion dans les murs d'un retable flamand de la fin du XVe ou du début du XVIe siècle et d'un remarquable ensemble de vitraux du du XVIe siècle.                                            SANSONNIERE, du XVe, XVIe et XVIIe siècles; corps de logis principal au nord est datant du XVe siècle ; dépendance au sud-ouest datant du milieu XVIIe siècle; corps de logis principal reconstruit au XVIIIe siècle; au XIXe siècle reprise des toitures de la demeure, une petite pièce est ajoutée au nord, remaniement des ailes nord-ouest et sud-est en dépendances; les douves pratiquement comblées, les deux ponts de pierre qui les franchissaient sont détruits.","habitants":"Seigneurs locaux \r\n        \"","divers":"Trois châteaux à Auverse celui de la Calvinière grav 2-3, de Fresne et de Sansonnière, de  Bouchet Grav-1     Goupillière grav-6,   47°31'49,42\" Nord et 0°00'47,58\" Ouest                Calvinière 47° 31' 08\" Nord, 0° 03' 07\" Est                          Fresne grav 4-5,  47° 30' 26\" N, 0° 04' 34\" Est","gps":"","images":["../../jctruffet.com/image/image_49/49_Auverse_1.jpg","../../jctruffet.com/image/image_49/49_Auverse_2.jpg","../../jctruffet.com/image/image_49/49_Auverse_3.jpg","../../jctruffet.com/image/image_49/49_Auverse_4.jpg","../../jctruffet.com/image/image_49/49_Auverse_5.jpg","../../jctruffet.com/image/image_49/49_Auverse_6.jpg"]},"Consult_chateau_formulairee997":{"id":"Consult_chateau_formulairee997","dept":"49","canton":"Angers","commune":"Avrillé","nom":"Avrillé","type":"Château","periode":"XVI","histoire":"Deux châteaux à Avrillé la Guignardière et la Perrière. GUIGNARDIERE, au XVIe siècle construction du château par Jean Richard seigneur de la Guignardière de Bazoches et de Moricq. La famille Girard achèvent les travaux en 1563 mais assassiné par les protestants, le château passe aux Jousselin, charlotte de Jousselin l'apporte au milieu du XVIIe siècle à Antoine Marin son époux et seigneur de la Huberdière leur fille Françoise  Marin dame de la Guignardière épouse en 1759 Sylvestre comte de Chaffault. Confisqué à la Révolution racheté par Auguste-Salomon de Chaffault qui s'en sépare en 1814 de Parfait-Victor-Lucien Luce receveur général d'Indre et Loire. Sa fille Clémentine épouse le marquis de Juchereau de Saint-Denis qui modernise le domaine, son neveu  Henri Luce de Trémont  qui hérite déplacera le perron, et le domaine échoit par alliance aux Fouquet en 1983 le docteur Jacques de Fouquet cède le domaine à monsieur Alain Rousselot actuel propriétaire.                                                                     PERRIERE, a été construit au XVIIe siècle, en deux campagnes. Il comprend trois corps de logis sur un plan en U, avec à l'extrémité sud-ouest une chapelle. Une aile abritant des communs au rez-de-chaussée a été implantée au sud. L'intérieur comporte plusieurs pièces intéressantes, le petit salon et le grand salon dont les murs de refend sont recouverts de boiseries Louis XVI, l'escalier avec rampe en fer forgé, et les chambres avec cheminées des XVIIe et XVIIIe siècles. Le 30 août 2018, le château et le golf sont vendus à un groupe d'hôtellerie de luxe.","architecture":"GUIGNARDIERE construit au XVIe siècle sur l'emplacement de la maison forte, de style Renaissance, de plan en U de quatre niveaux flanqué d'un seul pavillon d'angle la façade sur cour à trois niveaux accostée de deux courtes ailes en retour d'équerre qui ne compte qu'un seul étage. Les travées régulières sont soulignées par des chaînages de granit, utilisé également pour les cordons qui marque la séparation  entre les niveaux et les chaînes d'angle.  Des fenêtres à meneaux éclairent les façades,  et des lucarnes à fronton triangulaire chevauchent le comble d'ardoise à pente prononcé.                                                                                        PERRIERE Le château est constitué de deux ailes, dont l'une, portant les armoiries des Goddes de Varennes, donne sur la cour d'honneur et l'entrée de la propriété ; l'autre donnant sur une terrasse ouvrant sur un parc en direction de la rivière de la Mayenne. À larrière du château, une chapelle se dresse face à lorangerie autour d'une cour intérieure  Le château  est aujourd'hui un lieu de restauration et dévénements professionnels et familiaux tels que les séminaires d'entreprise ou alors des mariages, des anniversaires ou tout autres événements. En 1988, est créé sur le parc du domaine, un golf.","habitants":"Guignardière; famille de Auguste-Salomon de Chaffault                              Perrière;Famille de Goddes de Varennes\r\n        \"","divers":"Guignardire grav 1-2     Perrière 47° 30' 25\" nord, 0° 35' 13\" ouest  Grav 3_4","gps":"","images":["../../jctruffet.com/image/image_49/49_Avrill%c3%a9_1.jpg","../../jctruffet.com/image/image_49/49_Avrill%c3%a9_2.jpg","../../jctruffet.com/image/image_49/49_Avrill%c3%a9_3.jpg","../../jctruffet.com/image/image_49/49_Avrill%c3%a9_4.jpg"]},"Consult_chateau_formulairebe06":{"id":"Consult_chateau_formulairebe06","dept":"49","canton":"La Pommeraye","commune":"La Chapelle-Saint-Florent","nom":"Baronnière","type":"Château","periode":"XVIII","histoire":"BARONNIERE, située dans un écrin de verdure au cur des Mauges. Construit à quelques dizaines de mètres des ruines du château du général vendéen Bonchamps (incendié pendant la Révolution), est entouré dun superbe parc romantique, dun jardin potager en amphithéâtre qui fait la part belle a` la biodiversité, de dépendances du XVIIe siècle et dune chapelle XIXe siècle ou` les descendants des Arnous-Rivie`re célèbrent encore les événements familiaux. Dès 1838, Jules-Armand et Ernestine Arnous-Rivière font établir par André Leroy, principal pépiniériste français et créateur pionnier de parcs en Anjou, un projet très proche de la réalisation définitive. Il crée de toutes pièces un nouveau paysage sur un espace denviron 20 hectares. Cet écrin pour le nouveau château utilise remarquablement les caractéristiques du côteau entouré par la rivière Èvre avec de longues perspectives sur le paysage. De très beaux arbres subsistent : platanes, chênes, pins Laricio, pins noirs dAutriche, séquoias, etc. Le parc a été classé parc pittoresque en 1993.","architecture":"BARONNIERE, lactuel château est construit entre 1852 et 1856, à quelques dizaines de mètres de lancien. Il est dessiné par larchitecte René Hodé, créateur du style néogothique troubadour inspiré de limitation du XVe siècle. La Baronnière est le premier de ses châteaux à être classé M.H., en 1995. Les toits, chenaux et lucarnes sont lobjet dimportants travaux de restauration depuis 2009.\r\nLintérieur est distribué verticalement par un grand escalier dhonneur. Au rez-de-chaussée, de part et dautre du hall, le salon de réception et la salle à manger sont habillés de lambris à plis de serviette, en chêne, et de cheminées surmontées de très grandes vitres. Au fronton, sur le côté des tours rondes, se trouvent les blasons accolés des Arnous Rivière (coupé de gueules et d'argent, le premier chargé de trois étoiles d'argent en fasce, le deuxième chargé d'une fasce ondée et ombrée de sinople et des Guillet de la Brosse (d'azur au sautoir d'argent, accompagné en chef d'un croissant d'or aux flancs de deux étoiles d'or, et en pointe d'un tiercelet aussi d'or).  Sa restauration débute en 2010.","habitants":"Famille  des Arnous-Rivie`re\r\n        \r\n        \"","divers":"Baronnière , vestiges d'une tour grav1 et châteaux grav 2-3-4: et dépendances grav 5,  47° 19' 25\" Nord et 1° 01' 44\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Baronni%c3%a8re_1.jpg","../../jctruffet.com/image/image_49/49_Baronni%c3%a8re_2.jpg","../../jctruffet.com/image/image_49/49_Baronni%c3%a8re_3.jpg","../../jctruffet.com/image/image_49/49_Baronni%c3%a8re_4.jpg","../../jctruffet.com/image/image_49/49_Baronni%c3%a8re_5.jpg"]},"Consult_chateau_formulaire0e9d":{"id":"Consult_chateau_formulaire0e9d","dept":"49","canton":"Beaupréau","commune":"Chaudron-en-Mauges,","nom":"Bas_Plessis","type":"Château-fort","periode":"XV","histoire":"BAS-PLESSIS, ce château fort est de style Médiéval et Empire. Au XVe siècle, appartenait à la famille Chenu, qui l'obtint  en mariage, entre le chevalier Pierre Chenu et Jeanne Bérard. Pierre Chenu, chevalier de l'Ordre du roi, obtint en 1602, le droit d'ériger la terre en châtellenie, avec le droit de prévôté, de sceau, de mesure, de four-à-ban et de moulin. Ce droit lui fut donné par son suzerain, Charles Turpin, comte de Montrevault. Le 2/11/1666, François de Villoutreys et sa femme, Renée Chenu, en deviennent propriétaires. Durant la guerre de Vendée, le château du Bas-Pessis accueillit Lescure, blessé, qui s'y réfugia. En 1794, le château féodal fut incendié lors d'un combat.  Le château du Bas-Plessis fut reconstruit, dans un style néo-classique, en 1845, puis il fut agrandi d'une aile, en 1875, pour y accueillir la bibliothèque du marquis de Villoutreys.  Le château du Bas-Plessis a été inscrit aux M.H. en 1992. Le propriétaire actuel est la famille de Villoutreys.","architecture":"BAS-PLESSIS, en 1982, l'aile de la bibliothèque fut démontée, pierre par pierre, afin de redonner au château sa ligne architecturale d'origine. Les ouvrages ont été transférés à l'université catholique de l'Ouest. Les vestiges du château médiéval sont composés de deux tours rondes à toits coniques couverts d'ardoises. Le premier étage de la tour Nord est constitué d'une chapelle. Une courtine relie ces deux tours. Le parc, d'une bonne centaine d'hectares, est composé d'arbres de différentes essences, très anciens. La partie nord du parc se trouve sur la commune de Botz et la partie sud sur celle de Chaudron. La séparation est matérialisée par le ruisseau Saint-Germain qui le traverse du Nord-Est au Sud-Ouest. Son dernier tronçon est fermé par un barrage,  qui forme un étang faisant office de douve et qui détourne l'eau vers le moulin.","habitants":"Famille Chenu\r\n        \"","divers":"Bas plessis : 47° 17' 52,43\" Nord, 0° 59' 12,39\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Bas_Plessis_1.jpg"]},"Consult_chateau_formulaire637a":{"id":"Consult_chateau_formulaire637a","dept":"49","canton":"Baugé en Anjou","commune":"Baugé en Anjou","nom":"Baugé","type":"Château","periode":"XV-XVII","histoire":"A Baugé en Anjou le château de Baugé, de Clairefontaine, de Coin, de Grésillon , de Sancé, et de la Graffinière ( Voir article).                                                                                    BAUGE, au XIe siècle fortification du château primitif par Foulques III de Nerra, dans lenceinte fortifiée  un logis résidentiel est reconstruit en plusieurs phases entre 1430 et 1455 par Yolande dAragon, puis par son fils René dAnjou, dit le Roi René. Utilisé par les gouverneurs de la ville entre le XVIe et le XVIIIe siècle, il est ensuite profondément remanié à lintérieur pour un usage administratif. La façade affiche nettement les caractères dun logis de plaisance du XVe siècle : disposition densemble assez irrégulière, lucarnes passantes avec gâbles à crochets au niveau du toit, tour octogonale en saillie sur la façade, baies à meneaux encadrées de tuffeau, disparition de tout élément militaire dans larchitecture.                                                  CLAIREFONTAINE, sa construction date du XIIIe et XVe siècle. Le manoir de Clairefontaine a été entièrement meublé du XVe au XVIIe siècle. Son ancienne grange cistercienne date du XIIe au XIVe siècle. Au XVe siècle, le Roi René, qui aimait venir chasser dans les forêts de la région, fit reconstruire le château de Baugé a été transformé en manoir, au début du XVe siècle. Le Logis de Clairefontaine a été classé aux M.H. le 28/09/1984.","architecture":"GRESILLON,  a St-Martin d'Arcé la construction du château de Grésillon date des XVe-XVIII siècles. Il est de style médiéval et Renaissance. Le château fut construit pour le Roi René, duc d'Anjou, grand amateur de chasse. Le château de Grésillon possède un oratoire, une bibliothèque, des tourelles, un escalier en élévation. En 1007, Foulques III Nerra, Comte d'Anjou, entreprend la construction d'une forteresse aux confluents de deux rivières : le Couasnon et l'Altrée. Cette place forte est située sur un éperon rocheux. C'est un site défensif et stratégique qui doit faire face aux éventuelles attaques du comte de Blois, ennemi de Foulques Nerra. Le château de Grésillon, bâtisse du XVIIIe siècle et son parc de 18 hectares, fonctionne comme maison culturelle de l'espéranto, a été classé en 1961 aux M.H.                             COIN  bâti entre 1015 et 1025 pour Foulques Nerra.  Fortification de la ville datant de la deuxième moitié du XVIe siècle. Partie Est de l'édifice datant du XVIIe siècle ; partie centrale reconstruite dans le premier quart du XIXe siècle;  pavillon ouest datant du quatrième quart du XIXe siècle. Édifice composé d'un étage carré et étage de comble, gros-oeuvre en calcaire; grès; moellon; appareil mixte et enduit, élévation à travées surmontée d'un toit à longs pans; croupe; pignon couvert; toit en pavillon, couverts d'ardoise.                                                                                                 SANCE des XVIe XVIIe et XVIIIe siècles, et M.H. inscrit le 14 janvier 1964 pour les façades et toitures du bâtiment d'habitation","habitants":"Baugé et Clairefontaine, Grésillon; le roi René       Graffinière;  M. Maxim Studennikov,\r\n        \r\n        \"","divers":"A Baugé en Anjou le château de Baugé grav-1, de Clairefontaine grav-2, de Coin grav-3, de Grésillon grav 4-5-6-7 , de Sancé grav -8,   Baugé 47° 32' 29\" Nord et 0° 06' 07\",O . Clairefontaine  47° 31' 34,72\" Nord, 0° 5' 55,72\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Baug%c3%a9_1.jpg","../../jctruffet.com/image/image_49/49_Baug%c3%a9_2.jpg","../../jctruffet.com/image/image_49/49_Baug%c3%a9_3.jpg","../../jctruffet.com/image/image_49/49_Baug%c3%a9_4.jpg","../../jctruffet.com/image/image_49/49_Baug%c3%a9_5.jpg","../../jctruffet.com/image/image_49/49_Baug%c3%a9_6.jpg","../../jctruffet.com/image/image_49/49_Baug%c3%a9_7.jpg","../../jctruffet.com/image/image_49/49_Baug%c3%a9_8.jpg"]},"Consult_chateau_formulaire4d47":{"id":"Consult_chateau_formulaire4d47","dept":"49","canton":"Beaufort en Vallée","commune":"Beaufort en Vallée","nom":"Beaufort_Vallée","type":"Vestiges","periode":"XIII","histoire":"BEAUFORT, château fort construit à partir du XIe siècle sur une butte à la place ancien oppidum gallo-romain. En 1347, Guillaume Roger, seigneur limousin et frère du pape Clément VI devient le premier comte de Beaufort et obtient le château qui nest que ruines. Il se met en devoir de le reconstruire, ces travaux durent dix ans, jusquen 1356.  Au milieu du XVe siècle, le roi René dAnjou acquiert le château et le fait réaménager. On trouve encore des traces des anciens remparts qui ont été détruits au XIXe siècle et seul subsistent deux tours et un pan de murailles. Le cardinal Pierre Roger fut élu pape, à Avignon, le 19 mai 1342, sous le nom de Clément VI. Le 27 mai, Philippe de Valois accorda une rente à Guillaume II Roger dans les comtés du Maine et dAnjou. Le frère du pape se vit attribuer, la même année, le fief de Beaufort-en-Vallée. Jean de Normandie, duc d'Anjou, ayant transformé ce fief en vicomté en 1344, Guillaume fit restaurer le château dès 1345. Puis la faveur royale en fit un comté en 1347.","architecture":"BEAUFORT,  pendant la guerre de Cent Ans les Anglais s'établissent dans les principaux châteaux de la région : Beaufort, Sablé, le Lourou. Il fallut attendre Du Guesclin et le seigneur de Maillé pour reprendre ses positions. On trouve encore des traces des anciens remparts qui ont été détruits au XIXe siècle et seul subsistent deux tours et un pan de murailles. Jeanne de Laval, femme de René dAnjou, complète le château dune nouvelle tour, la tour octogonale en 1459. Avec Jeanne, la région connaît la prospérité. En 1480, Jeanne de Laval organise et dirige la sénéchaussée de Beaufort. La bienfaitrice donne de nombreux avantages aux habitants, notamment par l'ordonnance du 1er mai 1471, elle réglemente l'usage des prairies communales (jouissance des biens communaux). \"Sa statue haute de deux mètres, érigée par les Beaufortais en 1842 sur une colonne dordre corinthien de douze mètres, se trouve sur la place qui porte son nom. Elle tourne les yeux vers la statue du roi René à Angers.","habitants":"roi René dAnjou\r\n        \r\n        \"","divers":"Beaufort 47° 26' 25\" nord, 0° 12' 51\" ouest                             Beaufort_Vallée,47° 26' 21\" nord, 0° 13' 10\" ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Beaufort_Vall%c3%a9e_1.jpg","../../jctruffet.com/image/image_49/49_Beaufort_Vall%c3%a9e_2.jpg","../../jctruffet.com/image/image_49/49_Beaufort_Vall%c3%a9e_3.jpg","../../jctruffet.com/image/image_49/49_Beaufort_Vall%c3%a9e_4.jpg","../../jctruffet.com/image/image_49/49_Beaufort_Vall%c3%a9e_5.jpg"]},"Consult_chateau_formulaire2ff3":{"id":"Consult_chateau_formulaire2ff3","dept":"49","canton":"Saumur","commune":"Saumur","nom":"Beaulieu_Saumur","type":"Château","periode":"XV-XVII","histoire":"Dans cet article deux châteaux à Saumur; Beaulieu Motte Barace.                                                                                   BEAULIEU, l'édifice primitif du XVIIe siècle; reconstruit par Jean Drapeau pour lui même entre 1729 et 1754; pavillon ouest et dépendance du quatrième quart du XIXe siècle. Ce bâtiment est réputé pour sa très belle architecture,  la demeure, de plan régulier, se compose d'un étage carré et étage de comble, le gros-oeuvre en calcaire et pierre de taille, élévation ordonnancée surmontée d'un toit à longs pans brisés, croupe et appentis, couverts d'ardoise.               MOTTE BARACE, bien qu'elle soit mentionnée pour la première fois en 1290, la terre et seigneurie de la Motte est certainement un établissement féodal du XIe ou XIIe siècle. Elle relevait  de la seigneurie d'Yonne, Indre et Loire. Succédant à l'oeuvre primitif, un manoir, dont ne subsistent que des vestiges du XVe siècle. Le château de la Motte fut bâti au cours du XVIe siècle par la famille Gastineau de Saint-Bonnet qui avait acheté la terre en 1507.","architecture":"MOTTE BARACE, le logis, bordé de douves sur deux côtés, a été détruit au début du XXe siècle, ses élévations sont connues par deux documents iconographiques. Sa façade arrière  sur cour, possédait des travées de fenêtres, à allèges ornementées surmontées de gables et pinacles. La face postérieure ouest comprenait un pavillon. La partie sud du  corps de logis avait été remaniée au XVIIIe siècle, époque à laquelle le bâtiment nord-est subsistant, fut bâti. Près de ce dernier est conservée la chapelle dont le vocable est inconnu, édifice du XVe siècle, sur lequel la famille Gastineau a fait rajouter ses armes. Le programme héraldique du château, sculpté et peint sur vitraux, presque entièrement détruit, datable des années 1507-1513 environ, et du XVIIe siècle, est connu par les documents mentionnés, établis en 1686. La terre de la Motte a pris successivement les noms de la Motte de Boumois, car elle appartenait à Béatrix de Boumois avant 1450, la Motte Saint-Bonnet, lieu dont étaient seigneurs les Gastineau, puis la Motte-Baracé, car Alexandre de la Motte Baracé en fut propriétaire à la fin du XVIIIe siècle. Le document de 1686 montre, qu'outre les travées de fenêtres déjà mentionnées, la façade Est du logis comprenait une tour d'escalier polygonale surmontée d'une chambre haute et une tourelle. Le corps de bâtiment comprenait un étage carré et un étage de comble; le pavillon ouest comptait trois étages carrés.","habitants":"Beaulieu; Jean Drapeau Motte-Baracé;  famille Gastineau\r\n        \r\n        \"","divers":"deux châteaux à Saumur; Beaulieu Motte Barace grav-3. Beaulieu 47° 14' 53\" Nord, 0° 02' 48\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Beaulieu_Saumur_1.jpg","../../jctruffet.com/image/image_49/49_Beaulieu_Saumur_2.jpg","../../jctruffet.com/image/image_49/49_Beaulieu_Saumur_3.jpg"]},"Consult_chateau_formulairee870":{"id":"Consult_chateau_formulairee870","dept":"49","canton":"Beaupréau","commune":"Beaupréau","nom":"Beaupréau","type":"Château","periode":"XV-XVI","histoire":"A 10 kilomètres à l'Est le château de  Chaperonnière à Jallais.                                                                      CHAPERONNIERE,  fut le théâtre d'évènements au cours du soulèvement royaliste en faveur de la duchesse de Berry en 1832, où fut assassiné le général Jacques-Joseph de Cathelineau, fils du général Cathelineau. Le château de la Chaperonnière, tombe en ruine, vers 1850. Il sera revendu à la famille Courtois de Beaupréau, qui le fit restaurer, en partie, peu de temps après.                                         BEAUPREAU, construit sous le comte Foulques Nerra, le château de Beaupréau fit partie d'une chaîne de fortifications pour protéger l'Anjou des marches de Bretagne. Il accueillit le Roi Charles IX en 1565. Il a appartenu au marquis de Scépeaux puis à ses héritiers, les ducs de Blacas, établissement géré par les surs jusqu'en 1970.","architecture":"CHAPERONNIERE,  manoir bâti à Jallais, date du XVIe, XVIIIe et XIXe siècles, de style angevin un corps de logis rectangulaire à deux niveaux avec lucarnes sommet de fronton triangulaire, l'édifice est flanqué d'une tour polygonale à toit en poivrière.                                                               BEAUPREAU, faisait partie d'une chaîne de fortifications, pour protéger l'Anjou, des marches de Bretagne. Le château médiéval connut de nombreuses transformations architecturales, au cours des  siècles, accolés de quatre tours rondes aux angles en façade d'entrée entre deux tours  lucarnes en chiens assis sur comble toit impérial entre deux tourelle toit en coupole. Son aspect gothique date de la fin du XIXe siècle. Au cours du XXe siècle, une extension fut construite, dans la cour intérieure, perpendiculairement, au corps principal du bâtiment. Le château de Beaupréau fut vendu par ces derniers à une congrégation religieuse qui le transforma en clinique maternité (1958/1995). A la fermeture de celle-ci, le château de Beaupréau fut vendu et aménagé en copropriété d'appartements privés, sans changer son aspect extérieur.","habitants":"Chaperonnières; Famille Courtois de Beaupréau,                            Beaupréau;marquis de Scépeaux\r\n        \"","divers":"Beaupréau  grav1-2-3-4.   47° 11\" 48,58\" Nord, 0° 59' 33,59\" Ouest      Chaperonnière grav-5","gps":"","images":["../../jctruffet.com/image/image_49/49_Beaupr%c3%a9au_1.jpg","../../jctruffet.com/image/image_49/49_Beaupr%c3%a9au_2.jpg","../../jctruffet.com/image/image_49/49_Beaupr%c3%a9au_3.jpg","../../jctruffet.com/image/image_49/49_Beaupr%c3%a9au_4.jpg","../../jctruffet.com/image/image_49/49_Beaupr%c3%a9au_5.jpg"]},"Consult_chateau_formulaire3821":{"id":"Consult_chateau_formulaire3821","dept":"49","canton":"Pont de Cé","commune":"Blaison-Gohier st-Sulpice","nom":"Blaison_Gohier","type":"Château","periode":"XIV-XVII","histoire":"A Blaison-St-Sulpice le château de Blaison, la Giraudière, de Bois-Brinçon  et de Chemant.                                            AMBROISE, construit au XIVe siècle, ancien fief et seigneurie dont le plus ancien possesseur connu remonte à 1436. Il fut acheté en 1939 par M. le comte d'Orglandes.                          BLAISON, la maison de Laval en fut propriétaire. Gilles de Laval, dit Gilles de Rais, na pas habité le château. Il le vendit en 1429 à son cousin, Guillaume de la Jumellière, seigneur de Martigné-Briand. Au XVIe siècle, le côté cour fut reconstruit, croisées à meneaux et lucarnes de toit festonnées, sous linfluence de la Renaissance italienne. Incendié partiellement en 1793, il devint bien national. Il fut vendu le 8 thermidor an IV, au détriment des héritiers de Raoul René Petit, vicomte de Chemellier, et racheté par sa veuve. Il fut reconstruit vers 1850 en partie seulement, pour y loger des lads anglais qui soccupaient de chevaux. Le porche et la tour du milieu restèrent en ruine jusquen 1960, époque ou le vicomte Thibaut de Chemellier effectua des réparations.                                                                       GIRAUDIERE  classée au Patrimoine Mondial de lUnesco chambres d'hôtes.","architecture":"BLAISON,  du XIIIe siècle, cétait une construction imposante : sept tours enveloppant la cour intérieure, le tout entouré de larges fossés. On peut encore voir dénormes pans de mur de cette forteresse. Le puits subsiste toujours avec la chapelle dans langle ouest de la cour. Vers 1323, il fut détruit par les Anglais.                            BOIS-BRINCON,   en 1219 le chapitre y fit planter des vignes. Quinze ans plus tard un manoir sy élève. Vers la fin du siècle, le seigneur de Blaison céda au chanoine ses droits dans la forêt, doù \"le Bois Brinçon\". Réquisitionné comme bien national durant la Révolution, il fut vendu en 1792 à un certain sieur Chauveau associé au sieur Priou. Au cours des siècles Bois Brinçon changea plusieurs fois de propriétaires jusquen 1892, ou la famille Cailleau en devint acquéreur. Depuis, cinq générations de Cailleau gèrent ce domaine, produisant dans ses chais un vin réputé. Aujourdhui sélève un château, composé dun corps de logis principal flanqué de deux bâtiments carrés coiffés de hautes toitures. Lensemble fut modifié au cours des temps, remanié à la Renaissance et rehaussé.                                                                       CHEMANT, les origines remontent au XIVe siècle. Son histoire commence en 1414 avec Jean de Marette, auquel appartint le fief relevant de la baronnie de Blaison. Ses propriétaires se sont succédé de Pierre 1er de Cheverue en 1600, qui agrandirent la maison noble avec sa chapelle jusqu'à la Révolution où le château fut vendu le 2 thermidor de l'an IV à des bourgeois nantais.","habitants":"Blaison; Gilles de Laval, dit Gilles de Rais                                 Bois-Brincon;  famille Cailleau                                               Chemant; Jean de Marette\r\n        \"","divers":"A Blaison-St-Sulpice le château de Blaison grav 2-3-, la Giraudière grav 5-6-7, de Bois-Brinçon grav 8 et de Chemant grav-4.  Chauvigné grav- 9   Ambroise  Grav-1       47° 23' 44\" nord, 0° 24' 48\" ouest Blaison  47°23' 56,71\" Nord, 0°22'16,78\" Ouest                                                              Bois-Brincon   47° 23' 10,34\" Nord, 0° 23' 41,66\" Ouest        Chemant grav-4  47°24'02\" Nord, 0°22'12\" Ouest                            Giraudière 47° 24' 02\" Nord, 0° 22' 12\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Blaison_Gohier_1.jpg","../../jctruffet.com/image/image_49/49_Blaison_Gohier_2.jpg","../../jctruffet.com/image/image_49/49_Blaison_Gohier_3.jpg","../../jctruffet.com/image/image_49/49_Blaison_Gohier_4.jpg","../../jctruffet.com/image/image_49/49_Blaison_Gohier_5.jpg","../../jctruffet.com/image/image_49/49_Blaison_Gohier_6.jpg","../../jctruffet.com/image/image_49/49_Blaison_Gohier_7.jpg","../../jctruffet.com/image/image_49/49_Blaison_Gohier_8.jpg","../../jctruffet.com/image/image_49/49_Blaison_Gohier_9.jpg"]},"Consult_chateau_formulaire0c2b":{"id":"Consult_chateau_formulaire0c2b","dept":"49","canton":"Beaufort en vallée","commune":"Sainte-Gemmes-d","nom":"Blanchaie","type":"Château","periode":"XV-XVI-XIX","histoire":"A Blanchaie; château la Blanchaie du XVe, XVIIIe et XIXe siècles ; de la Chetardière, des XVIIIe et XIXe siècles, site inscrit en 2002.                                                                                BLANCHAIE, château mentionné dès le XVe siècle ; il relevait alors de Champiré d'Orvaux. Le gros oeuvre des deux corps de logis est ancien du XVe siècle avec remaniements du XVIe siècle, encadrements de baies. La chapelle seigneuriale dédiée à Saint Claude, a été fondée en 1536. Le château passa à la fin du XVIe siècle à la famille d'Andigné. Une importante campagne de construction au XVIIIe siècle semble avoir transformée l'image du château, conservant des éléments médiévaux, tels la chapelle et la tour d'escalier. Ce dernier fut à nouveau repris et agrandi au cours du 3ème quart du XIXe siècle.","architecture":"BLANCHAIE, en 1878, Célestin Port signale en effet que la restauration la plus récente lui donne l'aspect des hôtels du XVIIIe siècle, les matrices cadastrales mentionnent d'ailleurs des augmentations de constructions pour le château en 1864 puis en 1867, on élève alors un pavillon à la place de la tour d'escalier dans l'angle rentrant des deux corps de logis sur lesquels on greffe deux avant corps; on prolonge l'aile ouest, en édifiant un pavillon. Durant ces années on construit une conciergerie et plusieurs maisons de garde. Le parc est probablement redessiné. Au début du XXe siècle de nouvelles écuries avec sellerie et chambres de palefrenier sont édifiées au sud ouest du château, à l'exception de l'avant-corps de l'aile sud. Le château a été alors restauré afin de retrouver son état d'origine du XVIIIe siècle. Les deux corps de bâtiment sont couverts par une toiture en croupe ; la chapelle est couverte en longs pans, avec pignons débordants ; le seul avant-corps conservé est couvert par une toiture à l'impériale.","habitants":"Blanchaie; famille d'Andigné\r\n        \r\n        \"","divers":"Blanchaie Grav -1 Chetardière grav-2","gps":"","images":["../../jctruffet.com/image/image_49/49_Blanchaie_1.jpg","../../jctruffet.com/image/image_49/49_Blanchaie_2.jpg"]},"Consult_chateau_formulaire97bc":{"id":"Consult_chateau_formulaire97bc","dept":"49","canton":"Longué-Jumelles","commune":"Blou","nom":"Blou_49","type":"Château","periode":"XVI-XIX","histoire":"A Blou le château de la Baronnie, des Essarts, du petit Perray, de Rouillon, de Modtais et de la Perrières.                    BARONNIE, Pas d'information historique.                               ESSARTS, le logis a été reconstruit dans le quatrième quart du XIXe siècle, l'étable date vraisemblablement du XVIIe siècle et les parties agricoles du XIXe siècle.                             PETIT-PERRAY, château construit à l'emplacement d'une ferme dans la première moitié du XIXe siècle; les communs, les parties agricoles et les bâtiments accolés à la façade nord du logis datent de la deuxième moitié du XIXe siècle. L'édifice se compose d'un étage carré, le gros-oeuvre est réalisé en tufeau ; moellon ; enduit ; pierre de taille; bossage et appareil mixte, élévations à travées surmontées de toit à longs pans ; pignon couvert et croupe, couverts d'ardoise.                                                         ROUILLON, partie du gros-oeuvre datant vraisemblablement du XVe siècle ; reconstruction du logis, puis des pavillons dans la première moitié du XVIIIe siècle ; la porcherie et la remise datent du XIXe siècle.","architecture":"BARONNIE, le logis et la partie gauche de l'aile Est des dépendances construites au XVIe siècle ; les pavillons, la grange et le portail datent de la deuxième moitié du XVIIe siècle ; la partie droite des dépendances Est, les étables et le logement sur la rue furent édifiés au XIXe siècle.         MODTAIS, partie centrale de l'édifice, le pavillon nord-est, les écuries et le colombier construits dans la première moitié du XVIIIe siècle, l'aile nord fut édifiée dans la deuxième moitié du XVIIIe siècle, chapelle datée avec référence 1852. Le château se compose d'un étage carré et d'un étage de comble, le gros oeuvre est réalisé en tufeau ; moellon; enduit partiel ; pierre de taille et appareil mixte, élévations à travées surmontées de toit à longs pans; croupe; pignon couvert; toit en pavillon et toit conique, couverts d'ardoise. En 2005, le château de la Modtais a ouvert ses portes aux moines de la tradition Bön.\r\nPERRIERES, chapelle datant de la deuxième moitié du XVIIe siècle avec statue du Christ en croix du XVIIe siècle, art populaire ; le château fut reconstruit en 1788 ; intérieurs, frontons centraux, communs construits en 1811, daté par des travaux historiques. L'édifice se compose d'un étage carré et un étage de comble, le gros oeuvre est réalisé en tufeau ; moellon ; pierre de taille ; enduit et appareil mixte, élévations à travées coiffées de toit à longs pans; toit en pavillon ; pignon découvert et croupe, couverts d'ardoise.","habitants":"Seigneurs locaux \r\n        \"","divers":"Blou-47° 21' 47\" nord, 0° 02' 10\" ouest grav 1-2                  Perrière grav-3","gps":"","images":["../../jctruffet.com/image/image_49/49_Blou_49_1.jpg","../../jctruffet.com/image/image_49/49_Blou_49_2.jpg","../../jctruffet.com/image/image_49/49_Blou_49_3.jpg"]},"Consult_chateau_formulairece5e":{"id":"Consult_chateau_formulairece5e","dept":"49","canton":"Beaufort en Vallée","commune":"Bocé","nom":"Bocé","type":"Château","periode":"XIV-XVI","histoire":"Trois châteaux à Bocé; Ardannes, l'Auberdière et Parpace.      ARDANNES, la seigneurie d'Ardannes existe depuis le XIVe siècle, où Jean Richard, son propriétaire, le cède à Jean de Cherbaye. Michel de Cherbaye, notaire et secrétaire du roi, en est propriétaire en 1472. Le 10 avril 1731, Marie de Cherbaye  épouse dans la chapelle Thomas de la Croix, sieur de Richelieu. Leur fils, Louis-Thomas-Joseph-Alexandre, possède le château à la Révolution. Au XIXe siècle, acquit par Mr. de la Noüe. Cette propriété appartient à la famille Martin de Vauxmoret.                                                              L'AUBERDIERE, il se trouve en lisière de la forêt de Chandelais. Il a été construit aux XVII et XVIIIe siècles. Les communs  abritent  les  vestiges  dune  enceinte  fortifiée du XVIe siècle. Le comte de lAuberdière, officier détat major du maréchal comte de Rochambeau, a fait avec lui les 4 campagnes dAmérique. Il participe à la guerre  dindépendance des Etats-Unis sous les ordres de  Lafayette.  Il  en  rapporte  des  arbres  exotiques  qui sont toujours dans le parc.","architecture":"ARDANNES, du XIVe siècle, de style Louis XIII il  reste le donjon, aujourd'hui poterne flanquée de deux tours rondes et d'une troisième à pans coupés hébergeant un escalier.\r\nL'AUBERDIERE, construit au XVIe siècle, puis repris au XVIIIe siècle ; les pavillons d'entrée portent les dates 1770 et 1789. Le château se compose d'un étage carré et étage de comble, gros-oeuvre en calcaire; grès; moellon; appareil mixte, bossage, enduit partiel, élévation ordonnancée, surmontée de toit à longs pans, croupe, pignon couvert; toit en pavillon; toit polygonal et toit conique recouverts d'ardoise\r\n PARPACE , comprenant un donjon du XIe ou XIIe siècle ; deux tours ont été construites aux angles nord-ouest et sud-est du donjon au XVe ou XVIe siècle ; les lucarnes sur faces ouest et Est sont de la deuxième moitié du XVIe siècle ; au deuxième étage des fenêtres ont été percées au XVIIe siècle dont l'une porte la date 1652 ; autres ouvertures du XIXe siècle. Donjon médiéval de forme quadrangulaire, cantonné de deux tours. Il semble plus ancien que les percements et voûtes de la fin du XVIe siècle. Le château voisin, restauré au XIXe siècle, a conservé la plupart de ses dispositions des XVIe-XVIIe siècles, en particulier ses cuisines monumentales,  le premier château de Parpacé est un château fort. Le bâtiment carré central est flanqué de deux tours circulaires  aux  angles  nord  et  sud.  Il  semble  dater  du XVe siècle mais les ouvertures ont été reprises au XVIe siècle.  A la même époque, un second château plus agréable à vivre est établi sur le flanc sud de la colline.","habitants":"Ardannes;Louis-Thomas-Joseph-Alexandre                            Auberdière;Comte de lAuberdière\r\n        \"","divers":"Bocé; Ardannes, l'Auberdière et Parpace.                          Ardannes 47° 33' 42\" nord, 0° 21' 33\" ouest grav 1-2-3     Auberdière grav 4-5-6-7.          Parpace grav-8-9","gps":"","images":["../../jctruffet.com/image/image_49/49_Boc%c3%a9_1.jpg","../../jctruffet.com/image/image_49/49_Boc%c3%a9_2.jpg","../../jctruffet.com/image/image_49/49_Boc%c3%a9_3.jpg","../../jctruffet.com/image/image_49/49_Boc%c3%a9_4.jpg","../../jctruffet.com/image/image_49/49_Boc%c3%a9_5.jpg","../../jctruffet.com/image/image_49/49_Boc%c3%a9_6.jpg","../../jctruffet.com/image/image_49/49_Boc%c3%a9_7.jpg","../../jctruffet.com/image/image_49/49_Boc%c3%a9_8.jpg","../../jctruffet.com/image/image_49/49_Boc%c3%a9_9.jpg"]},"Consult_chateau_formulaire9003":{"id":"Consult_chateau_formulaire9003","dept":"49","canton":"Segré","commune":"Armaillé","nom":"Bois_Gelin","type":"Château","periode":"XIV","histoire":"BOIS-GELIN, dès le XIVe siècle, la famille d'Armaillé possédait les terres de Bois-Gélin ; il existait peut-être déjà un château fort dont il ne subsiste aucune trace. Cette terre fut vendue vers 1570 à Jacques de la Forest, avocat au présidial d'Angers et conseiller au Parlement de Bretagne en 1576. Il se fit alors appeler La Forest Armaillé. Il semble que les travaux de reconstruction du château aient débuté vers 1570 sur l'ordre de Jacques Forest, mort en 1618. La façade nord a été repercée et réaménagée à la fin du XVIIe siècle. La lucarne centrale porte la date de 1689.","architecture":"BOIS-GELIN, l'ensemble des bâtiments vient d'être restauré, s'élevant le long de la Verzée qui alimentait les douves, l'édifice se compose d'un corps de logis central de plan rectangulaire flanqué à l'ouest et à l'est de corps latéraux couverts en pavillons. Ceux-ci sont cantonnés sur la façade antérieure par deux tours circulaires et sur la façade postérieure par deux échauguettes, toutes coiffées de toitures coniques. Les élévations sont couronnées par une corniche de dalles de schiste supportées par des modillons en quart-de-rond en tufeau. La façade sud présente des baies à croisées de pierre en grès bleu du XVIe siècle, et plusieurs baies à accolades. Les tours sont percées de meurtrières, celles au nord portent des archères canonnières. La façade antérieure de la fin  du XVIIe siècle est ordonnancée et présente une élévation régulière de baies et de lucarnes couronnées par des frontons cintrés alternant avec des lucarnes à fronton triangulaire. La porte d'entrée centrale est couronnée par un fronton cintré.  Les communs se composent, au nord, de deux ailes de part et d'autre de la cour d'honneur et sur le côté sud de deux autres corps de logis. Un pigeonnier circulaire flanque l'aile Est ; il comporte lui aussi des éléments défensifs. Sur la face sud du château les lucarnes à baies géminées sont couronnées par un fronton cintré interrompu par un pinacle; leurs piédroits extérieurs sont ornés d'une console renversée.","habitants":"Bois-Gelin; famille d'Armaillé \r\n        \"","divers":"Bois gelin 47° 42' 54\" nord, 1° 07' 39\" ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Bois_Gelin_1.jpg","../../jctruffet.com/image/image_49/49_Bois_Gelin_2.jpg","../../jctruffet.com/image/image_49/49_Bois_Gelin_3.jpg","../../jctruffet.com/image/image_49/49_Bois_Gelin_4.jpg"]},"Consult_chateau_formulaire80c1":{"id":"Consult_chateau_formulaire80c1","dept":"49","canton":"Chalonnes sur loire","commune":"Bécon les Granits","nom":"Bois_Guignot","type":"Château","periode":"XIV-XVIII","histoire":"BOIS-GUIGNOT,  Aux XIVe et XVe siècle, le manoir du Bois-Guignot était protégé de douves en eau. Au milieu du XVIIIe siècle, il fut reconstruit et remodelé suivant l'environnement.  Le château du Bois-Guignot a été inscrit aux M.H. le 8/03/2006.                                                                                               LANDERONDE, c'est un château inscrit et classé aux M.H. depuis 1964. Édifié au XVe siècle, il a été remanié aux XVIe et XVIIe siècles. Il est annexé d'une chapelle. Le château de Landeronde se situe au coeur d'un parc à l'Anglaise. Il a conservé son cachet d'origine. Les façades, en forme de L, sont reliées par une tour hexagonale de style Renaissance, et contiennent un escalier à vis, est la résidence de la famille de Meaulne, il est ouvert aux visites libres ou organisées.","architecture":"BOIS-GUIGNOT, aux XIVe et XVe siècle. Au milieu du XVIIIe siècle, reconstruction et remodelage de l'environnement. De cette période date la façade symétrique aux bandeaux horizontaux, mise en valeur par une cour d'honneur s'ouvrant à l'extérieur du domaine par une patte d'oie, en 1836, quelques aménagements donnent l'état actuel du bâti. A la façade arrière ont été ajoutés des ailes et des pavillons qui cachent la structure XVIIIe siècle.  Les façades et toitures de l'ensemble du château ; les décors intérieurs du rez-de-chaussée et du premier étage du corps de logis principal du château ; les décors intérieurs du premier étage de l'aile est du château ; les communs, la chapelle XIXe siècle et la fuie, en totalité ; les tracés essentiels du parc (la cour d'honneur avec ses murs, pavillons et grilles de clôture, les douves et pièces d'eau, le jardin clos de murs avec exèdre, les trois allées de la patte d'oie, la grande allée menant au bourg) allée de la patte d'oie, allée menant au bourg, partie des communs, sol de l'une des allées de la patte d'oie, château et cour d'honneur, inscription par arrêté du 8 mars 2006","habitants":"seigneurs locaux \r\n        \r\n        \"","divers":"Bois_Guignot; 47° 29' 41\" nord, 0° 47' 34\" ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Bois_Guignot_1.jpg","../../jctruffet.com/image/image_49/49_Bois_Guignot_2.jpg","../../jctruffet.com/image/image_49/49_Bois_Guignot_3.jpg"]},"Consult_chateau_formulaired563":{"id":"Consult_chateau_formulaired563","dept":"49","canton":"Tiercé","commune":"Vern d","nom":"Bois_Lozé","type":"Château","periode":"XIX","histoire":"BOIS-LAUZE ou LOZE, la première mention de Vern-d'Anjou date du XIe siècle. Le domaine seigneurial forme depuis le XIe siècle un fief important possédé par une famille de chevalerie qui relevait en partie de Pouancé au XIIe siècle. Il constitue plus tard une châtellenie qui rendait aveu à Candé. Le village connaît un fort accroissement au cours du XIXe siècle en lien avec les activités industrielles (ardoisières, fours à chaux, briqueteries) et agricoles (chaulage des terres) de la commune. De nombreux aménagements datent de cette époque: construction d'un lavoir et d'un abreuvoir (à partir de 1835), construction de halles couvertes à l'emplacement de l'ancienne église (dès 1868).\r\nLe château du Bois Lozé, de style néo Louis XIII, a été construit à la demande de Robert Edmond Tripier de Lozé en 1857.","architecture":"BOIS-LAUZE,  la chapelle funéraire est édifiée en 1866. Le château est composé d'un corps central coiffé d'un toit à croupes avec de part et d'autre deux ailes en retour au sud et deux pavillons au nord. La travée centrale de la façade sud est encadrée par des jambages en tuffeau et surmontée d'une lucarne richement décorée en tuffeau, la façade nord reprend le même type d'ordonnancement: la travée centrale est dotée d'un parement en tuffeau et coiffée d'un toit en pavillon avec lucarne en tuffeau. Le rez-de-chaussée surélevé est accessible par quelques marches sur les deux façades. La façade sud est dotée de deux tourelles en surplomb dans les angles formés par le corps central et les ailes en retour, les toits coniques ont été arasés. La chapelle se situe au sud-est du château.","habitants":"Famille de Robert Edmond Tripier de Lozé \r\n        \"","divers":"à Vern d'Anjou le château du bourg  grav-3 et celui de Bois-Lozé","gps":"","images":["../../jctruffet.com/image/image_49/49_Bois_Loz%c3%a9_1.jpg","../../jctruffet.com/image/image_49/49_Bois_Loz%c3%a9_2.jpg","../../jctruffet.com/image/image_49/49_Bois_Loz%c3%a9_3.jpg"]},"Consult_chateau_formulaire718f":{"id":"Consult_chateau_formulaire718f","dept":"49","canton":"Doué la Fontaine","commune":"Coudray-Marcouart","nom":"Bois_Seigneurie","type":"Château","periode":"XV--XVI","histoire":"LA Seigneurie du BOIS, manoir Renaissance des XVe et XVIe siècles, restauré par l'Association pour la protection du Patrimoine créée par un jeune avocat  Christian Prioux  à partir de 1988. Site privé ouvert au public sur rendez-vous.","architecture":"BOIS, existant à la fin du XVe siècle, la Seigneurie du Bois est le siège dun petit fief relevant de la châtellenie de Montreuil-Bellay. Le domaine, construit au XVIe siècle sur des caves troglodytes bâtiments compris, subit dimportantes détériorations après la Révolution. Cet ensemble est très évocateur des seigneuries rurales modestes de lAncien Régime ; de son enceinte fortifiée subsistent le portail dentrée, encadré de deux colonnes à bossage vermiculé et des douves profondes ; le logis de petites dimensions (15m x 8) dont la construction se place au début du XVIe siècle présente une façade irrégulière à grandes lucarnes dans laquelle souvre, seul élément décoratif dorigine, une porte en anse de panier surmontée dun décor à fleuron.","habitants":"Avocat  Christian Prioux\r\n        \"","divers":"Château du bois et ses remparts 47° 11' 44\" nord, 0° 06' 59\" ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Bois_Seigneurie_1.jpg","../../jctruffet.com/image/image_49/49_Bois_Seigneurie_2.jpg","../../jctruffet.com/image/image_49/49_Bois_Seigneurie_3.jpg","../../jctruffet.com/image/image_49/49_Bois_Seigneurie_4.jpg","../../jctruffet.com/image/image_49/49_Bois_Seigneurie_5.jpg"]},"Consult_chateau_formulairef355":{"id":"Consult_chateau_formulairef355","dept":"49","canton":"Beaufort en Vallée","commune":"Linières Bouton","nom":"Boissimon","type":"Château","periode":"XVI","histoire":"BOISSIMON,   château Renaissance du XVIe siècle, il fut la demeure où lon célébra le mariage en 1949 du Prince Louis Napoléon Bonaparte (branche de Jérôme, dernier frère de Napoléon Ier).","architecture":"BOISSIMON , corps principal datant du XVe ou XVIe siècle, pavillon sud-ouest datant de la première moitié XVIIe siècle, dépendances et colombier datant du XVIIe ou XVIIIe siècle, et remaniés au XIXe siècle. Boissimon actuellement sur le territoire de la commune de Noyant. Loin du monde et de son agitation, le château, au nord de Saumur, vous accueille dans une campagne boisée et préservée, pour les amoureux d'authenticité et de calme, ouvert de Pâques à la Toussaint.","habitants":"Prince Louis Napoléon Bonaparte\r\n        \"","divers":"a Linières Bouton, Boissimon: 47° 27' 42\" Nord et 0° 04' 41\" Est","gps":"","images":["../../jctruffet.com/image/image_49/49_Boissimon_1.jpg","../../jctruffet.com/image/image_49/49_Boissimon_2.jpg","../../jctruffet.com/image/image_49/49_Boissimon_3.jpg","../../jctruffet.com/image/image_49/49_Boissimon_4.jpg","../../jctruffet.com/image/image_49/49_Boissimon_5.jpg"]},"Consult_chateau_formulaire23d8":{"id":"Consult_chateau_formulaire23d8","dept":"49","canton":"Segré","commune":"Bouillé-Ménard","nom":"Bouillé_Ménard","type":"Château","periode":"XIV-XVI","histoire":"Deux châteaux dans cette commune , Bouillé-Ménard et Orgerie.                                                                                      BOUILLE-MENARD, du XIVe siècle jusqu'à la fin du XVe siècle, la famille Aménard possède le château.  Au XVIIe siècle, le château appartient à la famille d'Acigné, qui le vend en 1756 à Louis-Benjamin de la Mothe d'Andigné. Pendant la Révolution française, en 1790, la paroisse devient chef-lieu d'un canton qui comprend alors neuf communes. En 1804, le canton de Bouillé-Ménard est démantelé au profit des cantons de Pouancé et Segré.  La mairie est construite en 1856, en même temps que l'école de garçons. Une école de filles est établie en 1912. La première guerre mondiale voit la mort de 63 habitants de la commune. Le monument aux morts est construit en 1921.  La seconde guerre mondiale fait neuf victimes. Date du XVIe siècle environ. Il est la propriété de la famille Walsh de Serrant au XVIIIe siècle, mais ceux-ci le vendent en 1882 à Henri Brard. Le bâtiment est alors restauré. Le porche d'entrée est flanqué de deux tours circulaires encastrées dans le logis.","architecture":"ORGERIE, mentionnée en 1512, \"Logerie\" se composait vers 1770  d'après un censif de la châtellenie de Bouillé-Menard d'une maison de maître avec une ferme. Le gros-oeuvre de la partie nord du logis présente des murs plus épais et pourrait être plus ancien du XVIe siècle que le reste du bâtiment. La date de 1704 portée sur une des lucarnes, correspond  à l'agrandissement. La travée de gauche et la serre ont été ajoutées de même que l'écurie et le logement au cours du quatrième quart du XIXe siècle (en 1882 une nouvelle construction est déclarée dans la matrice) ; l'aménagement actuel des façades doit dater de cet époque comme la ferme.   Édifice à un étage et étage de comble éclairé par quatre lucarnes, couvert par un toit à croupes. Les encadrements de baies, les chaînes d'angle et la corniche sont enduits. Une tourelle couverte par un toit à l'impériale occupe la façade arrière. Une petite serre avec armature en métal est adossée au mur-pignon sud. Les écuries, (second oeuvre en briques) se trouvent dans le prolongement du pignon nord. On retrouve de la brique pour le petit logement qui précède le logis.","habitants":"Famille Aménard famille Walsh\r\n        \"","divers":"Deux châteaux dans cette commune ,  Bouille-Ménard, 47° 44' 33\" Nord, 0° 58' 00\" Ouest et Orgerie grav-7","gps":"","images":["../../jctruffet.com/image/image_49/49_Bouill%c3%a9_M%c3%a9nard_1.jpg","../../jctruffet.com/image/image_49/49_Bouill%c3%a9_M%c3%a9nard_2.jpg","../../jctruffet.com/image/image_49/49_Bouill%c3%a9_M%c3%a9nard_3.jpg","../../jctruffet.com/image/image_49/49_Bouill%c3%a9_M%c3%a9nard_4.jpg","../../jctruffet.com/image/image_49/49_Bouill%c3%a9_M%c3%a9nard_5.jpg","../../jctruffet.com/image/image_49/49_Bouill%c3%a9_M%c3%a9nard_6.jpg","../../jctruffet.com/image/image_49/49_Bouill%c3%a9_M%c3%a9nard_7.jpg"]},"Consult_chateau_formulaire8a66":{"id":"Consult_chateau_formulaire8a66","dept":"49","canton":"Segré","commune":"Montguillon","nom":"Bouillé_Théval","type":"Château","periode":"XIV-XVIII","histoire":"BOUILLE-THEVAL, l'édifice repose sur des bases fortifiées datant vraisemblablement du Moyen-Age; les pignons latéraux très saillants et la couverture d'un des corps de bâtiment pourraient dater du XIIIe siècle ou XIVe siècle. Des développements importants sont effectués au XVe siècle, époque à laquelle la famille de Quatrebarbes en est propriétaire, construction d'une tour d'escalier, fondation d'une chapelle en 1444. Au XVIe siècle le château passe aux mains de la famille de Thévalle. Des remaniements, notamment en ce qui concerne les baies, ont été apportés au cours du XVIIIe siècle. Les bâtiments, à l'exception de la tour d'escalier, ont été restaurés  au XXe siècle.","architecture":"MOTTE-MILLON, seule subsiste une cheminée datée du XVIe siècle. Le gros-oeuvre des bâtiments de la ferme actuelle daterait du XVIIIe siècle. Le logement a été entièrement repris au cours de la première moitié du XIXe siècle, la partie sud de l'étable a été reconstruite dans la deuxième moitié du XIXe siècle. Deux sculptures représentant une Annonciation, dont l'
