 de \"l'adjudication des terres de la Houssaudière à Julien Binet\" datée du 11 septembre 1769, est une ancienne maison noble, reconstruite au XIXe siècle. Le château de la Jaille, qui relevait autrefois d'Armaillé, est une ancienne demeure noble, qui autrefois était totalement enclos et protégé par cinq tours.","architecture":"HOUSSARDIERE, le château se composait de cinq pièces et une salle basse qui a été détruite lors des travaux de 1866, deux granges dont une avec un pressoir, une boulangerie, une chambre pour domestique, une écurie, un cellier, une chapelle et quatre soues. Vers 1866, les murs furent surélevés afin d'aménager un étage de comble avec toit brisé et l'aile nord fut ajoutée. On créa une nouvelle allée d'entrée à l'ouest et la pièce d'eau (vestiges d'anciennes douves) qui baignait la façade ouest fut alors comblée le long de la façade. Le chemin menant à la ferme de la Houssaudière suit le tracée de l'ancienne allée d'entrée du château. Les dépendances furent modifiées au cours de cette campagne de travaux. La chapelle est aujourd'hui transformée en logement. Les bâtiments s'organisent autour d'une cour ; au nord un bâtiment en longère abrite un logement.","habitants":"Seigneur local\r\n        \"","divers":"Houssardière  47° 41' 40\" nord, 1° 05' 25\" ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Houssardi%c3%a8re_1.jpg","../../jctruffet.com/image/image_49/49_Houssardi%c3%a8re_2.jpg"]},"Consult_chateau_formulaire3439":{"id":"Consult_chateau_formulaire3439","dept":"49","canton":"Tiercé","commune":"La Jaille-Yvon","nom":"Jaille_Yvon","type":"Château","periode":"XVI","histoire":"A la Jaille-Yvon;  château de la Guyonnière, de  Cussé, du Plessis, de Loncheray  (Voir article pour ce dernier).                                                                GUYONNIERE, le château de la Guyonnière appartenait au XVIe siècle à la famille Michaud, aux XVIIe et XVIIIe siècles par mariage à la famille Richard. Les bâtiments dateraient de la fin du XVIIe siècle (1680), le pavillon Est ayant été remanié au XIXe siècle. Le bâtiment en rez-de-chaussée date probablement du XVIIIe siècle (lucarnes cintrées). Une ferme a été bâtie au XIXe siècle à proximité du château. Le logis est orienté est-ouest et domine la Mayenne. La façade sur cour et le jardin est organisée selon six travées avec un étage carré et un étage de comble éclairé par 4 lucarnes aux frontons triangulaires. Les baies rectangulaires sont en tuffeau. Un décrochage au niveau de la toiture signale que la partie Est a été remaniée. Un bâtiment en rez de chaussée prolonge à l'ouest le logis. Il est doté de lucarnes cintrées. Un bâtiment de dépendance, perpendiculaire au logis à l'ouest, rejoint celui-ci par une porte d'accès qui clot la cour.                                                                                    CUSSE, la seigneurie de Cussé a appartenu au XVIIe siècle à Pierre Crespin et ensuite à son gendre Pierre de Cheverue. L'actuel château de Cussé conserve à l'arrière un corps de logis du XVIIIe siècle, prolongé par des dépendances. Le corps principal, de style néogothique, a été reconstruit en 1862 par l'entrepreneur Bellanger pour le comte Salomon de la Tullaye dont la famille a possédé le domaine de 1855 à 1915.","architecture":"CUSSE, Le parc a été réalisé à la même époque. L'aile principale des communs, du XIXe siècle, a été partiellement transformée en habitation dans la deuxième moitié du XXe siècle.  Le château de Cussé présente un plan en équerre: le corps principal  est complété par une aile perpendiculaire formant retour vers l'arrière, plus ancienne  ce corps principal, couvert d'une toiture à croupes, comprend un étage carré, un étage de comble ouvert par des lucarnes et un pignon central formant lucarne. Sa façade ouest comporte cinq travées ordonnancées et une corniche à modillons en tuffeau. A l'arrière s'élève un escalier hors-oeuvre, néo-gothique, à l'angle formé par l'aile ancienne. Celle-ci présente quatre travées ouvertes vers le sud, un étage carré et quelques ouvertures circulaires, en tuffeau. Un bûcher et un fournil s'appuient sur sa façade arrière. Deux autres dépendances situées au nord-ouest (le logement, la remise et l'étable) ont quelques ouvertures en briques, et n'ont pas d'étage, hormis un comble ouvert sur le pignon.","habitants":"Guyonnière;  famille Richard.                                                      Cusse; comte Salomon de la Tullaye\r\n        \"","divers":"A la Jaille-Yvon;  château de la Guyonnière, de  Cussé grav-1","gps":"","images":["../../jctruffet.com/image/image_49/49_Jaille_Yvon_1.jpg"]},"Consult_chateau_formulaire83f0-2":{"id":"Consult_chateau_formulaire83f0-2","dept":"49","canton":"Angers","commune":"Jarzé","nom":"Jarzé","type":"Château","periode":"XV-","histoire":"A Jarzé; les châteaux de Jarzé, de Bignon de la Pécaudière de la Truffière et de la Grifferaie.                                                     JARZE, le château est construit à la fin du XVe siècle, pour Jean Bourré, trésorier de France. Sous le parement de tuffeau mis en place entre 1794 et 1809,  monsieur Deurbroucq le fait restaurer dans le style néo-classique se retrouvent les maçonneries,  et certains décors de la fin du XVe siècle.                                                                                            BIGNON, il relève de la seigneurie de Vern et appartient à Pierre de Chazé. Vers 1880, est reconstruit par le notaire Adolphe Legeais.                                                                PERRAUDIERE, loué en Bourgeois  voisin à Jarzé;  ce château, vaste ensemble avec communs, ferme et jardin, a été édifié vers 1657 pour Sébastien Serezin, conseiller et ancien président de l'élection d'Angers. Le château est constitué d'un corps de bâtiment flanqué de deux ailes formant avant-corps latéraux. La cour d'honneur est encadrée par les communs, les écuries, la sellerie, les logements des domestiques. L'intérieur du château de la Perraudière conserve des décors de qualité.                                                                                TRUFFIERE, de la fin du XIXe siècle, nombreux dans la région, présente quelques originalités, elle est d'un style néo-Louis XIII moins fréquent que le style \"troubadour\" souvent utilisé pour les demeures de ce genre. Elle est l'oeuvre de l'architecte Fernand Richard Delalande, connus pour quelques bâtiments à Angers et non pas celle du fameux Odet, a qui l'on doit plusieurs châteaux aux alentours.","architecture":"GRIFFERAIE construit à Echemiré  Cinq km au sud-Est par l'architecte Bibard pour Louis d'Andigné en 1865-1866 près de l'emplacement d'un manoir détruit, sur fronton de lucarne, façade sud, armes de la famille d'Andigné. L'édifice se compose d'un étage carré et étage de comble, le gros-oeuvre est réalisé en calcaire, pierre de taille et bossage, élévation ordonnancée surmontée d'un toit à longs pans; toit polygonal et toit en pavillon, couverts d'ardoise.                                                                             BIGNON du XVe siècle vers 1880, le château de style néo-gothique (baies à meneaux et traverses et pinacles).  Le château a été édifié à l'emplacement d'un ancien manoir. Seules les douves appareillées en schiste sont en partie conservées à l'ouest du château. La façade principale est composée de deux étages carrés et d'un étage de comble et s'organise selon trois travées, chacune coiffée d'une lucarne en tuffeau. La façade est complétée à l'est par un pavillon qui se prolonge en retour d'équerre, côté postérieur du château, avec une aile à un étage carré. Les encadrements de baies, les chaînages d'angle, les bandeaux et les corniches sont en tuffeau. Les fenêtres de la façade principale sont à meneaux et traverses. A l'intérieur, au rez-de-chaussée, le vestibule avec l'escalier (modifié) dessert deux salles à cheminées. Le pavillon abrite un petit salon et donne accès à la cuisine et à l'escalier de service à vis.  Dans la cuisine, une cheminée plus ancienne provient peut-être de l'ancien manoir et a été remployée.","habitants":"Jarzé; famille de  Jean Bourré                                     Bignon;  Pierre de Chazé.                                      Pérraudière; famille de Sébastien Serezin                          Grifferaie; famille de  Louis d'Andigné\r\n        \r\n        \"","divers":"A Jarzé; les châteaux de Jarzé, de Bignon 2-3 de la Pécaudière de la Truffière grav-6 et de la Grifferaie 4-5.  Jarzé 47° 33' 16,08\" Nord, 0° 14' 14,59\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Jarz%c3%a9_1.jpg","../../jctruffet.com/image/image_49/49_Jarz%c3%a9_2.jpg","../../jctruffet.com/image/image_49/49_Jarz%c3%a9_3.jpg","../../jctruffet.com/image/image_49/49_Jarz%c3%a9_4.jpg","../../jctruffet.com/image/image_49/49_Jarz%c3%a9_5.jpg","../../jctruffet.com/image/image_49/49_Jarz%c3%a9_6.jpg"]},"Consult_chateau_formulaire45ed":{"id":"Consult_chateau_formulaire45ed","dept":"49","canton":"Beaupréau","commune":"le Pin en Mauges","nom":"Jousselinière","type":"Château","periode":"XV","histoire":"A Pin en Mauges  le manoir de Jousselinière et de Meslière.                                                                     JOUSSELINIERE  le manoir de La Jousselinière (autrefois Jouscelinière). On mentionne un nommé P. Jouscelin en 1414. Propriété successive des familles Gauvain et de Laly, puis Coqueret de Neuville et Binet. La chapelle de la Jousselinière est mentionnée vers 1684. Incendiée avec le manoir à la Révolution, elle est restaurée par un membre de la famille de Gauvin de la Jousselinière. Le domaine est la propriété de la famille Delaunay en 1854.","architecture":"MESLIERE, la gentilhommière est achevée en 1820.\r\nChéguillaume, un bourgeois nantais fortuné a racheté la terre de la Meslerie au seigneur de Saint-Julien, le baron du Gué-au-Voyer, contraint, à la Révolution, d'émigrer. Sa famille, restée sur place, est obligée de se dessaisir du terrain, où la maison était en pleine reconstruction \r\nLe projet initial a été remanié lors de la reconstruction.\r\nLa terre de la Meslerie  fait l'objet, au début du XVIIIe siècle, de la procédure féodale du retrait lignager. Le seigneur de Saint-Julien, Damien de Chandenier, voulait un pavillon d'été, à la place de la maison basse mais la Révolution le contrait à émigrer. La presque totalité du site est classé et  inscrit à l'Inventaire des M.H..  Elle fut plus tard la propriété de la famille de Gérald van der Kemp, mais fut vendue en 1929, ce qui fut un déchirement pour ce dernier, car cette maison lui était très chère, et il y gardait de très bons souvenirs : on le surnommait d'ailleurs L'enfant de la Mesler.","habitants":"Jousselinière; famille Delaunay.                                     Meslaie;  Damien de Chandenier\r\n        \"","divers":"A Pin en Mauges  le manoir de Jousselinière  grav 1-2-3-4 et de Meslière grav-5.      47° 15' 15\" nord, 1° 23' 04\" ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Jousselini%c3%a8re_1.jpg","../../jctruffet.com/image/image_49/49_Jousselini%c3%a8re_2.jpg","../../jctruffet.com/image/image_49/49_Jousselini%c3%a8re_3.jpg","../../jctruffet.com/image/image_49/49_Jousselini%c3%a8re_4.jpg","../../jctruffet.com/image/image_49/49_Jousselini%c3%a8re_5.jpg"]},"Consult_chateau_formulaire931a":{"id":"Consult_chateau_formulaire931a","dept":"49","canton":"Chemille en Anjou","commune":"Chemille en Anjou","nom":"Jumelière_Buhards","type":"Chateaux","periode":"XVII-XIX","histoire":"deux châteaux à Chemillé en Anjou; Buhards et Jumellière. BUHARDS, sur l'emplacement d'une seigneurie attestée au XVIe siècle,  René Montrieux, administrateur des Ardoisières d'Angers, fait bâtir entre 1853 et 1856 un parc et un nouveau château par les architectes Choulot et Mortier, tous deux parisiens et de renom. Reconstruit au milieu du siècle, l'édifice connut différents propriétaires et détranges histoires de maléfices.                                                                                      JUMELLIERE, cette propriété, dessinée sous le Second Empire pour Armand-Urbain, comte de Maillé, comprend un édifice élevé par larchitecte Henri Parent, entre 1858 et 1862, et agrandi par une extension vers 1874. Le domaine fut également complété par des dépendances. Enfin, un parc paysager fut aménagé en 1867. Le château de la Jumellière est situe au cur des vignobles et des Mauges, dans un grand parc paysagé à l'anglaise, créé par Henri et Achille Duchêne au XIXe siècle, lors de la construction du château actuel, sous Napoléon III. Cette demeure familiale des dames de Maillé, de Wittelsbach (dont Elizabeth de Bavière), Berthier et Lebrun (liées aux maréchaux d'Empire), des duchesses de plaisance, et des princesses de Polignac, vous accueillera dans une atmosphère d'autrefois, pleine de charme. L'architecture du château de la Jumellière est vraiment magnifique. Il est inscrit aux M.H. depuis 2014.","architecture":"BUHARDS, le château des Buhards est un château fort bâti sur l'ancienne commune La Jumellière, devenu Chemillé-en-Anjou. La construction du château date de 1853 à 1888. Le château composé de briques, de tuffeau et d'ardoises fut construit, en 1856, pour René Montrieux, maire d'Angers, de 1859 à 1870, dans un style Louis XIII. Sur l'emplacement d'une seigneurie attestée au XVIe siècle, au-dessus d'un vallon profond affluent au Layon, René Montrieux, fit dessiner et édifier, entre 1853 et 1856, un parc et un nouveau château, Le château des Buhards dispose d'une chapelle, d'une cour intérieure, d'une serre et d'un grand bassin. La chapelle a été construite, en 1888, par l'architecte angevin Beignet. Le château appartient à une société privée. Le château, la chapelle, le grand bassin, la serre, les façades et toitures des communs sont inscrits aux M.H. depuis le 9/08/1999.","habitants":"Buhards; Famille de René Montrieux,                                    Jumellières; famille de Henri et Achille Duchêne \r\n        \r\n        \"","divers":"à Chemillé en Anjou; Buhards et Jumellière grav -1. Buhards grav-2     : 47° 17' 43\" Nord et 0° 41' 26\" Ouest                              Jumelières 47° 16' 46\" Nord,0° 44' 07\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Jumeli%c3%a8re_Buhards_1.jpg","../../jctruffet.com/image/image_49/49_Jumeli%c3%a8re_Buhards_2.jpg"]},"Consult_chateau_formulaireb0a8":{"id":"Consult_chateau_formulaireb0a8","dept":"49","canton":"Longué-Jumelles","commune":"Lande-Chasles","nom":"Lande_Chasles","type":"Château","periode":"XVII","histoire":"Plusieurs châteaux à Landes dont celui de Landes Lasse. De la Porte de Lande  à Cerqueux sous Passavant  gites de France.                                                                                             LANDES-CHASLES Pas d'information historiques","architecture":"LANDES-CHASLES  Édifice et tour vers le nord-est construits au XVe siècle; gros pavillon accolé vers l'est édifié au XVIIe siècle; les écuries datant du XVIIIe siècle ; le corps central du château reconstruit au XIXe siècle. L'édifice se compose d'un étage de soubassement, de deux étages carrés et un étage de comble, le gros-oeuvre est réalisé en pierre de taille; tufeau; calcaire; grès; moellon ; enduit et appareil mixte, élévations à travées surmontées de toit à longs pans; croupe ; pignon couvert ; toit polygonal ; toit en pavillon et toit conique, couverts d'ardoise. Au Moyen Âge, il y avait un château fort qui a été en grande partie démoli et le château actuel fut reconstruit au second Empire. Il est entouré d'un parc. Les fondations d'une ville datant de l'époque gallo-romaine ont été retrouvées. La voie romaine Tours-Angers passait par la Lande Chasles.","habitants":"Seigneur local\r\n        \r\n        \"","divers":"à Landes dont celui de Landes Lasse grav 1-2. De la Porte de Lande grav-3-4","gps":"","images":["../../jctruffet.com/image/image_49/49_Lande_Chasles_1.jpg","../../jctruffet.com/image/image_49/49_Lande_Chasles_2.jpg","../../jctruffet.com/image/image_49/49_Lande_Chasles_3.jpg","../../jctruffet.com/image/image_49/49_Lande_Chasles_4.jpg"]},"Consult_chateau_formulaired158":{"id":"Consult_chateau_formulaired158","dept":"49","canton":"Cholet","commune":"Salles de Vihiers","nom":"Lathan_Breil","type":"Château","periode":"XV-XVIII","histoire":"BREIL En 1440, sous le règne de Charles VII, Jean et Yvon Quentin, fils de Jehan Quentin de la Roche, qui possédait un fief dans la région et fut tué à la bataille dAzincourt en 1415, achètent des terres dans le Chemillois. Un siècle plus tard, en 1539, les terres sont le siège dune seigneurie appartenant pour un quart à Jehan Prévost, seigneur de Bonnezeaux. En 1602, Jean V de Vaugirault, seigneur de la Boisardière, est désigné comme seigneur du lieu. La propriété passe ensuite aux Prégent, une famille de magistrats dAnjou. Le château est épargné durant la Révolution. Désiré Gontard de Launay, jeune châtelain, l'achète aux Prégent en 1811. Il est nommé maire de son village, à 32 ans, sous le règne de Louis XVIII. A l'arrivée de Napoléon III, invoquant son grand âge, le châtelain quitte ses fonctions de maire qu'il occupa pendant 33 ans. En 1858, le comte Victor de Terves devient propriétaire par un échange de terres et décide d'un programme de rénovation du château dans l'esprit néo-Renaissance du temps.                                                                             LATHAN, a  remplacé un premier château fort édifié à la fin du Xe siècle par Foulques Nerra. Un projet avait été fait pour la famille Pays de Lathan en 1773 par Victor Louis, architecte de Bordeaux mais le château n'a pas été réalisé. Seuls une partie du parc et des bâtiments annexes ont été réalisés.  Il est inscrit aux M.H. en 1990 et classé en 1999.","architecture":"LATHAN,  la période de construction date du XVIIe au XVIIIe siècle et de la 2ème moitié du XIXe siècle. Le château de Langeais fut reconstruit, sous Louis XI, en 1465. L'architecte était Vestier.  Le long travail de préservation, dont Patrice et Catherine ont repris la suite, permet désormais de visiter le parc tel qu'il était aux XVIIe et XVIIIe siècles. On traverse tantôt des jardins géométriques à la française, petit Versailles d'esprit de Le Nôtre, puis de romantiques espaces verts. Le château a été construit entre 1861 et 1865 à l'emplacement du projet. Seul une partie du parc et des bâtiments annexes ont été réalisés. Sont inscrits aux M.H. les façades et toitures du château neuf, le parc, à l'exception des parties classées par arrêté du 26 décembre 1990 . Parc du château avec ses fabriques, les façades et toitures des communs et les restes de l'ancien château.","habitants":"Breil; Famille Prégent.                                                                                      Lathan; Famille Pays de Lathan\r\n        \"","divers":"Breil grav 1-2-3     Lathan: 47° 28' 11\" Nord, 0° 09' 50\" Est                Salles-Vihiers grav 4-5-6-7-8","gps":"","images":["../../jctruffet.com/image/image_49/49_Lathan_Breil_1.jpg","../../jctruffet.com/image/image_49/49_Lathan_Breil_2.jpg","../../jctruffet.com/image/image_49/49_Lathan_Breil_3.jpg","../../jctruffet.com/image/image_49/49_Lathan_Breil_4.jpg","../../jctruffet.com/image/image_49/49_Lathan_Breil_5.jpg","../../jctruffet.com/image/image_49/49_Lathan_Breil_6.jpg","../../jctruffet.com/image/image_49/49_Lathan_Breil_7.jpg","../../jctruffet.com/image/image_49/49_Lathan_Breil_8.jpg"]},"Consult_chateau_formulaire97a3":{"id":"Consult_chateau_formulaire97a3","dept":"49","canton":"Longué-Jumelles","commune":"Villebernier","nom":"Launay","type":"Château","periode":"XV","histoire":"LAUNAY, après trois années passées dans son royaume de Naples, le \"Bon Roi René\", duc d'Anjou, acquiert le château en 1444.  René y introduit l'esprit de la Renaissance dans sa manière de vivre à l'italienne où le plaisir esthétique et le goût de la nature l'emportent sur la vie de cour. Dans ce lieu mythique se sont déroulés les plus grands tournois du XVe siècle où les plus grands nobles dEurope se mesurèrent, lors de fêtes somptueuses. Launay était pour le roi René le \"manoir du bon repos\", ce lieu incitait à la méditation : le roi René qui appréciait sa sérénité aimait sy reposer et partager son bonheur en musique.","architecture":"LAUNAY, agrandissement et embellissement, pour René et Isabelle de Lorraine, sa première épouse, font du château une demeure où est organisé le tournoi légendaire de la \"Joyeuse Garde\". Cette période charnière de la fin du Moyen-Âge y est sensible dans son architecture, où tourelles et douves ne sont que symboliques. Aujourd'hui la chapelle, la salle des gardes, la galerie, la chambre de retrait, le colombier, la cour d'honneur et la basse cour à colonnades ont gardé leur intégrité du XVe siècle.","habitants":"le \"Bon Roi René\r\n        \"","divers":"Château de Launay à Villebernier   47° 15' 51\" Nord et 0° 02' 25\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Launay_1.jpg","../../jctruffet.com/image/image_49/49_Launay_2.jpg","../../jctruffet.com/image/image_49/49_Launay_3.jpg","../../jctruffet.com/image/image_49/49_Launay_4.jpg","../../jctruffet.com/image/image_49/49_Launay_5.jpg","../../jctruffet.com/image/image_49/49_Launay_6.jpg","../../jctruffet.com/image/image_49/49_Launay_7.jpg"]},"Consult_chateau_formulaired6c2":{"id":"Consult_chateau_formulaired6c2","dept":"49","canton":"Tiercé","commune":"Le Lion d","nom":"Le_Lion_Angers","type":"Château","periode":"XIV-XIX","histoire":"ISLE-BRIAND, lieu relevant en 1143 de l'abbaye du Ronceray d'Angers. Au XVe siècle il dépend de la famille Briand puis en 1490 de Jean d'Andigné. Un château médiéval y existait au XVIe siècle, reconstruit vers 1775. Vers 1850, Charles Emmanuel d'Andigné de Mayneuf le rehausse d'un étage, il fait batir en 1861-1862 une conciergerie à l'entrée ouest du domaine et implante un parc attribué au comte de Choulot, une pompe à eau et un potager. La propriété est vendue en 1872 à la vicomtesse de Trédern, née Jeanne-Marie Say. Elle entreprend d'importants travaux avec agrandissement et remaniement en 1875, puis construction de communs supplémentaires (sellerie, écuries et buanderie en 1873), et d'une ferme modèle à partir de la métairie du domaine, fin du XVIIIe siècle, avec laiterie modèle, écurie de chasse et chenil, d'une serre en 1873, d'une maison de garde, d'un manège avec maison voisine, d'un logis à la place le la métairie de Beaumont, d'un second logis à proximité, d'un poulailler et de deux écuries.","architecture":"A deux kilomètres au nord à Montreuil sur Maine le château MONTREUIL, charmant château néo-gothique du XIXe siècle, oeuvre du célèbre architecte angevin René Hodé, situé dans le bourg de Montreuil sur Loire, demeure de Jacques et Marie Bailliou. Dominant la vallée du Loir, qui coule en bas du parc, et la forêt de Boudré, lemplacement du château est admirable. Chapelle du XIVe siècle et pigeonnier du XVIe. Bois et prés bordent la rivière. Salons de jardin.","habitants":"Isle Briand; famille Briand                                             Montreuil;Jacques et Marie Bailliou\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_49/49_Le_Lion_Angers_1.jpg","../../jctruffet.com/image/image_49/49_Le_Lion_Angers_2.jpg","../../jctruffet.com/image/image_49/49_Le_Lion_Angers_3.jpg"]},"Consult_chateau_formulaire8403":{"id":"Consult_chateau_formulaire8403","dept":"49","canton":"Tiercé","commune":"Le Lion-d","nom":"Lion_D_Angers","type":"Chateaux","periode":"XVIII","histoire":"Deux châteaux dans cet article Faveries et Foresteries. FAVERIES, la présence de dolmens atteste d'une occupation humaine dès le Néolithique (un subsiste) sur le site de l'Isle-Briand, à la confluence de la Mayenne et l'Oudon. Si Célestin Port mentionne à proximité un camp gaulois (au Bec d'Oudon), le bourg Le Lion d'Angers sur l'actuel site prend une certaine ampleur lors de l'installation au Xe siècle d'un fief relevant de Craon, sur la rive sud de l'Oudon, non loin de la confluence. Le Lion d'Angers se développe autour de la motte féodale (disparue) et d'un prieuré implanté au XIe siècle. Déjà traversée par l'ancienne voie romaine Angers Rennes, elle devient un axe de passage obligé en direction de Châteaugontier, le long de la Mayenne, grâce à la présence d'un pont sur l'Oudon. Située en zone frontalière, cette zone a toujours été le théâtre d'opérations militaires lors des conflits (le dernier en 1940). Faveries est édifié en 1865 selon les matrices cadastrales, en reprenant le nom du logis seigneurial encore en place (le manoir des Hautes Faveries). Logis comportant un étage carré et un étage de comble sur un étage de soubassement. Le gros-oeuvre est en calcaire et enduit, élévation ordonnancée surmontée d'un toit en pavillon et toit à longs pans recouverts d'ardoise. Les communs présentent un plan symétrique en H, les élévations sont ordonnancées","architecture":"FORESTERIE, château avec ferme voisine construit vers 1810 à l'instigation de Jean Charles de la Forestrie qui laisse le logis d'origine aux fermiers. Cette demeure est à rapprocher du château de Sourdon (logis le plus récent) qui appartient à la même famille au début du XIXe siècle. Le logis est couvert d'une toiture en croupes comportant cinq travées ordonnancées. La porte centrale en tuffeau est cintrée, ornée d'une agrafe et pourvue d'un châssis de tympan en éventail. Elle est encadrée de pilastres portant un entablement à corniche saillante. Le logis, double en profondeur, est situé dans un parc dégageant une perspective sur la route, et isolé des communs par un rideau d'arbres. Ceux-ci forment un vaste ensemble en U, orienté vers le logis, composés de plusieurs logements (ailes) à un étage carré, la partie centrale est percée de trois grandes ouvertures cintrées à usage de remises ; celle du centre est en fait un passage vers une cour.","habitants":"Favreries; seigneurs locaux                                    Foreterie; Jean Charles de la Forestrie\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Faveries grav-1 et Longeron grav-2     Foresteries. Isle-Briand grav 3-","gps":"","images":["../../jctruffet.com/image/image_49/49_Lion_D_Angers_1.jpg","../../jctruffet.com/image/image_49/49_Lion_D_Angers_2.jpg","../../jctruffet.com/image/image_49/49_Lion_D_Angers_3.jpg"]},"Consult_chateau_formulaire1d29":{"id":"Consult_chateau_formulaire1d29","dept":"49","canton":"Tiercé","commune":"Le Lion d","nom":"Lion_D_Angers_I","type":"Château","periode":"XIV-XVII-XIX","histoire":"Trois châteaux dans cet article Hommeau, Motte-Ferchaud et la  Rouerie.                                                                          HOMMEAU, très imposant avec ferme du XIXe siècle, construit après 1815.En 1972 il abritait une communauté d'Adventistes. Le corps de logis principal comporte une façade ordonnancée marquée par un fronton triangulaire au-dessus des travées centrales, porté par des pilastres cannelés à chapiteaux ioniques semblables à ceux des angles. Il développe neuf travées sur un étage de soubassement, un rez-de-chaussée, un étage carré et un étage de comble à lucarnes. La porte centrale cintrée, ornée de pilastres portant un entablement sculpté de palmettes. La toiture à croupes supporte de hautes souches de cheminée en tuffeau.                                                                               MOTTE-FERCHAUD, siège d'une seigneurie appartenant  au XIVe siècle à la famille de Champagné, avec chapelle Sainte Barbe, fondée le 5 mai 1493 par Thibault de Champagné, aujourd'hui détruite. Du château présent sur le cadastre napoléonien en 1809, entouré de larges douves pentagonales, il ne reste qu'un pavillon de la fin du XVIe siècle. Cet édifice a servi de refuge au chef chouan Houpert dit Monte-à-l'Assaut qui, né sur le domaine, en était le régisseur. Les lucarnes portent les armes des familles de Champagné et des Lancrau (M. Lancrau de Bréon propriétaire en 1785). Pavillon avec trois lucarnes à fronton triangulaire et toiture très élevée en pavillon,","architecture":"ROUERIE  Siège de la seigneurie de la Roirie (ou Royrie) mentionnée en 1539, qui relevait du château des Hautes Faveries. Il existait déjà sur ce site une \"grande maison\" avec fossés et douves habitée dès 1433. Le château actuel est une construction du XVIIe siècle, remaniée et agrandie (pavillon) au XIXe siècle. Deux pavillons des années 1700 encadrent l'entrée de la cour (l'un restauré récemment et l'autre a servi de garage). La ferme du château a été reconstruite au XIXe siècle. Il comprend un corps de logis principal à cinq travées ordonnancées sur les deux façades, couvert d'une toiture à croupes interrompue par des lucarnes à ailerons et fronton triangulaire. La porte centrale est surmontée d'un fronton triangulaire en tuffeau. Un bel escalier à balustres est signalé en 1973. Deux pavillons formant saillie encadrent cette façade et portent des oculi. Une tour carrée se détache sur une façade latérale. A l'arrière, un autre pavillon présente une façade polygonale: il est composé d'un rez-de-chaussée et d'un étage de comble avec lucarne à fronton triangulaire, sous une toiture à croupe brisée.","habitants":"Motte-Ferchaud; famille de Champagné                                  Rouerie seigneur local\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Hommeau, Motte-Ferchaud et la  Rouerie grav 1","gps":"","images":["../../jctruffet.com/image/image_49/49_Lion_D_Angers_I_1.jpg","../../jctruffet.com/image/image_49/49_Lion_D_Angers_I_2.jpg","../../jctruffet.com/image/image_49/49_Lion_D_Angers_I_3.jpg"]},"Consult_chateau_formulaire181f-2":{"id":"Consult_chateau_formulaire181f-2","dept":"49","canton":"Tiercé","commune":"Le Lion-d","nom":"Lion_Dangers","type":"Château","periode":"XV","histoire":"Deux châteaux dans cet article Mas et Sourdon.                           MAS,  mentionné en 1495, et appartient alors à Louis de Rohan. La seigneurie, le château et les métairies qui en dépendent sont achetés en 1558 par Marc Cerisay, fils d'un riche marchand boucher d'Angers devenu seigneur de Pruillé. Le château actuel occupe l'emplacement de l'ancien édifice. Il a été reconstruit en deux campagnes en style Louis XIII. L'aile basse est due à l'architecte Charles Roques pour Gaston Poulain du Mas en 1872. La seconde aile a été bâtie avec une chapelle par l'architecte Auguste Beignet en 1889 pour la baronne de Cholet qui l'achète cette année-là, une nouvelle ferme bâtie en 1889 par Auguste Beignet est élevée.","architecture":"MAS, le corps de logis présente un plan régulier en L , avec trois gros pavillons et un plus modeste à l'arrière. L'aile principale comporte un sous-sol et un étage carré. Ses deux façades sont ouvertes à l'étage par des fenêtres sommées de hauts couronnements. La seconde aile est plus basse, avec un étage en surcroît percé de fenêtres passantes. Les pavillons ont des étages de comble ouverts par des lucarnes. Toutes les façades sont ordonnancées et soulignées par de fortes moulures horizontales, et une corniche à modillons de tuffeau. Toutes les baies sont ornées de bossages en pierre de taille de tuffeau, et les toitures supportent de hautes souches de cheminées en tuffeau et brique.                                                                          SOURDON, château édifié dans le premier quart du XIXe siècle à proximité du logis seigneurial d'origine pour la famille Poulain de la Forestrie, comme le château de la Foresterie avec lequel il a une certaine ressemblance. Logis de deux étages sur un soubassement dont l'élévation ordonnancée est marquée par un fronton triangulaire couronnant la travée centrale, comme d'ailleurs le bâtiment contenant les communs et par des pilastres en tuffeau. Les dépendances comprennent deux bâtiments parallèles et forment une cour devant le château. On y trouve d'un côté une chambre de cocher, une remise, une autre chambre de cocher, un chenil et une cour, de l'autre côté une buanderie, une remise, une écurie et une cour. Le matériau de second oeuvre est le tuffeau.","habitants":"Mas; famille de  Marc Cerisay,\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_49/49_Lion_Dangers_1.jpg","../../jctruffet.com/image/image_49/49_Lion_Dangers_2.jpg","../../jctruffet.com/image/image_49/49_Lion_Dangers_3.jpg"]},"Consult_chateau_formulaire8bb2":{"id":"Consult_chateau_formulaire8bb2","dept":"49","canton":"Segré","commune":"St-Martin du Bois","nom":"Lizière","type":"Château","periode":"XV","histoire":"LIZIERE, ancien fief relevant de la Jaille-Yvon. Un manoir existait très probablement dès le XVe siècle. Le plan cadastral ancien figure ce qui pourrait être le logis d'origine avec sa tour d'escalier demi-hors-oeuvre. Communs du XVIIIe siècle, époque à laquelle on souhaita reprendre l'ensemble des bâtiments. Le château ne fut reconstruit que dans la première moitié du XIXe siècle. Une galerie extérieure reliant à l'étage, le corps de logis à l'aile ouest des communs paraît avoir été ajoutée dans la seconde moitié du XIXe siècle. Le jardin régulier fut transformé après 1826 en parc paysager. L'ensemble des bâtiments compose un plan régulier en U avec logis en fond de cour et communs en retour d'équerre vers le nord.","architecture":"LIZIERE est composé d'un corps central flanqué de deux corps transversaux, tous couverts en croupe et formant un plan régulier en H. Le gros oeuvre de la construction est en moellon de schiste avec parement d'enduit ; la pierre de taille de tuffeau est utilisée pour l'entourage des baies, la corniche et les lucarnes. La galerie reliant à l'étage le corps principal à l'aile ouest des communs est en fer et fonte, le sol en ciment, sa couverture en zinc. Le commun, couverts par des croupes brisées présentent d'intéressantes élévations jouant sur le contraste des matériaux : moellons de schiste et de grès pour le gros-oeuvre et pierre de taille en tuffeau pour la corniche, les portes et les baies, oculi, lucarnes et oeils-de-boeufs. Une série d'arcades vitrées composent l'étonnante galerie à structure métallique : dans les écoinçons et sur la frise qui les surmonte, on trouve un décor en fonte avec fleurs et enroulements végétaux ; le même thème est repris, en bois cette fois, sur les lambrequins de la lucarne-pignon. A la base de la suite d'arcades, on trouve un bandeau double de céramiques peintes ornées de motifs végétaux.","habitants":"seigneur locaux\r\n        \r\n        \"","divers":"a  St-Martin du Bois château de Lizière","gps":"","images":["../../jctruffet.com/image/image_49/49_Lizi%c3%a8re_1.jpg","../../jctruffet.com/image/image_49/49_Lizi%c3%a8re_2.jpg","../../jctruffet.com/image/image_49/49_Lizi%c3%a8re_3.jpg"]},"Consult_chateau_formulaire58c2":{"id":"Consult_chateau_formulaire58c2","dept":"49","canton":"Tiercé","commune":"Jaille-Yvon","nom":"Loncheray","type":"Château","periode":"XV-XVI","histoire":"LONCHERAY,  est le siège d'un fief mentionné dès 1322 à Robert de Loncheray. En 1847 le domaine passe dans la famille de Messay qui est à l'origine de sa reconstruction, le château a été presque entièrement repris dans un style néo gothique un peu avant 1876, sur la plate-forme d'origine entourée de douves anciennes. Il subsiste certains éléments anciens, tous remaniés au XIXe siècle; à l'angle sud-ouest du logis, une chapelle de la fin du XVe siècle ou du début du XVIe siècle, à l'arrière deux petites tours et à l'angle sud-est une tour isolée, les trois peut-être en partie du XVIe siècle. Une belle porte en bois sculptée du XVIe siècle a été réutilisée à l'entrée actuelle de la chapelle. Les dépendances datent du XVIIIe siècle (écurie et logement), mais ont été reprises au XIXe siècle et complétées par d'autres bâtiments (orangerie, bûcher). Le parc très vaste, est postérieur à 1809  mais englobe un étang rectangulaire qui existait déjà en 1809. Les deux jardins ont été créés à l'ouest du château, devant l'orangerie, après 1809 ; le jardin précédant se situait à l'est du château.","architecture":"LONCHERAY,  le château élevé sur une plate forme rectangulaire, entourée de douves vives, présente une élévation composée d'un étage carré et un étage de comble. Une tour polygonale en pierre de taille de tuffeau, couverte d'une toiture polygonale, occupe le centre de la façade principale, et abrite un escalier en bois. Elle comporte en partie haute une succession de gâbles néo-gothiques au-dessus des baies alternant avec des pinacles à colonnettes. La chapelle, au sud-ouest, est coiffée d'une croupe ronde, elle garde une voûte d'ogives d'origine, et se prolonge vers l'est par un vestibule formant terrasse. La tour isolée au sud-est, est couverte en pavillon, et décorée de faux mâchicoulis à colonnettes,  à l'ouest, deux jardins clos de murs (agrément et potager) surplombent un peu le château, avec plus à l'ouest une orangerie, ouverte sur le jardin potager. Cet édifice présente trois larges baies cintrées en tuffeau, avec de petits jours au niveau du surcroit, la partie centrale étant surmontée d'un fronton triangulaire. Plus loin, vers le sud ouest, se trouve un long édifice en rez-de-chaussée et étage de comble, en grès enduit. Il abrite une écurie et un logement, et comprend de rares pignons cintrés. Un bûcher est visible à l'ouest. Le ru qui alimente les douves émerge vers le nord-est et sert de déversoir ; il s'écoule jusqu'à un étang rectangulaire.","habitants":"famille de Messay\r\n        \"","divers":"Château de Loncheray Jaille-Yvon","gps":"","images":["../../jctruffet.com/image/image_49/49_Loncheray_1.jpg","../../jctruffet.com/image/image_49/49_Loncheray_2.jpg"]},"Consult_chateau_formulaire3e30":{"id":"Consult_chateau_formulaire3e30","dept":"49","canton":"Longué-Jumelles","commune":"Longué_Jumelles","nom":"Longué_Jumelles","type":"Château","periode":"XV-XVI-XVII","histoire":"A Longué-Jumelles, manoir de la Guiberderie des XVe et XIXe siècles, manoir de la Rigauderie des XVIIe et XIXe siècles, manoir de Lasse des XVIe XVIIIe et XIXe siècles. Logis de Beauregard, Jumelles, logis et ferme du XVIe siècle. Le site ancien du Vieux-Bourg correspond à la chapelle Notre-Dame de Thenais est à rapprocher de Thanaicus, Tanais . Ce vieux-bourg donnera la seigneurie du château d'AVOIR (berceau de la famille angevine d'Avoir qui eut aussi château-Fromont en Bretagne, et à laquelle appartenait Anne d'Avoir, la mère de Jean IV de Bueil). Alors que, toujours sur la rive gauche (sud) du Lathan, la ville correspond à l'ancien château de Longué et aux halles (site de l'actuelle mairie). Longué appartient au comte d'Anjou. En 1200, Jean sans Terre fait don de Longué à Rorgeon de Sacé, en 1204 Philippe-Auguste l'attribue à Roger de Mazé puis à Baudouin des Roches, et en 1215 à Geoffroi des Roches (des parents de Guillaume). Du XIIIe au XVe siècle, Jarzé et Longué demeurent dans la famille de Sainte-Maure, qui vend ses fiefs à Jean Bourré en 1473.\r\nUn château aurait été reconstruit au XIIIe siècle sur le territoire de Longué et aurait été ruiné à la fin du XVIIe siècle. La paroisse de Jumelles, quant à elle, fait partie de la seigneurie des Haies, à Brion. Le domaine de Baugé y a des possessions  M.H. inscrit par arrêté du 16 juin 1926","architecture":"Logis d'habitation de la Chesnaie-Archenon, du XVIe siècle, M.H. inscrit par arrêté du 29 juillet 1986.\r\nLogis Le Grand Boust, des XVe et XVIIIe siècles, M.H. inscrit par arrêté du 21 février 1974.\r\nManoir de la VENTE , des XVe XVIe et XVIIe siècles, manoir devenu ferme au XVIIIe siècle, Epoque du XVe siècle, au XVIIe siècle Le manoir en totalité,  inscription par arrêté du 15 juin 2005 propriété d'une personne privée. moiselle Lefebvre.  Charles agrandit en 1770 de deux ailes en retour. A sa mort en 1790 la fille  de Constantin la duchesse de Marmier , s'emploie après la Révolution de restaurer le château qu'elle transmettra à sa fille  Marguerite-Louise qui épouse le duc de fitz-James descendant d'un fils naturel du roi Jacques II d'Angleterre qui le transmet à son tour à son fils ruiné par le jeu, ce dernier doit s'en dessaisir au profit du marquis de Saint-Genys et à son épouse née Eugénie de Chabannes-la Palice avec leur fils Etienne le château revit. En 1979, Jean-Claude Brialy, a réalisé  un téléfilm \"Les Malheurs de Sophie\".  Toujours dans la famille des Saint-Genys.","architecture":"LORIE, doit son caractère exceptionnel, à son amélioration successive, par ses différents propriétaires qui sattachèrent à lui donner un plan architectural unique a été édifié sous l'Ancien Régime au XVIIe siècle. Il est de l'époque des temps Modernes. Les bâtiments du château s'articulent à partir du corps de logis central, couvert en croupe. Vers l'ouest, celui-ci est flanqué de deux pavillons comprenant des tourelles d'angle dont le couronnement médiéval illustre la toute première apparition du goût néo-gothique en Anjou. Vers l'ouest, deux ailes en retour d'équerre, s'achèvent par des pavillons à pignons convexes. La composition d'ensemble s'enrichit avec deux nouveaux corps de bâtiments couverts en croupe brisée, édifiés pour accueillir le haras modèle du marquis Constantin. Sur la face méridionale, le corps de logis est flanqué d'une série de pavillons en décrochement (couverts par des toitures en pavillon, à l'impériale ou en croupe) : on reconnaîtra notamment aux extrémités nord et sud, les extensions principales du XVIIIe siècle, à savoir la chapelle et le salon des marbres. Un escalier en fer à cheval desservait au XVIIe siècle les pièces de réception situées à l'étage. Ce château est construit autour de 5 cours, dans une symétrie permanente, mais aussi grâce à son décor remarquable avec sa grande galerie, son beau salon de marbre et à son mobilier dorigine exceptionnel.","habitants":"René le Pelletier et    Gabriel Constantin\r\n        \"","divers":"La Lorie : 47° 40' 42,72\" Nord, 0° 50' 55,06\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Lorie_1.jpg","../../jctruffet.com/image/image_49/49_Lorie_2.jpg","../../jctruffet.com/image/image_49/49_Lorie_3.jpg","../../jctruffet.com/image/image_49/49_Lorie_4.jpg","../../jctruffet.com/image/image_49/49_Lorie_5.jpg","../../jctruffet.com/image/image_49/49_Lorie_6.jpg","../../jctruffet.com/image/image_49/49_Lorie_7.jpg"]},"Consult_chateau_formulaire54d0":{"id":"Consult_chateau_formulaire54d0","dept":"49","canton":"Segré","commune":"Marans","nom":"Marans","type":"Château","periode":"XV-XVIII","histoire":"Deux châteaux à Marans, celui de la Cour et de Devansaye. COUR, édifice dont le corps de logis principal date de la fin du XVIIIe siècle et remanié au XIXe siècle.                               DEVANSAYE, ancien manoir datant probablement du XVe siècle remanié au XVIIIe siècle et de nouveau transformé et agrandi vers la fin du XIXe siècle par la famille de la Perraudière.","architecture":"COUR, un nouveau corps a été ajouté transversalement à la fin du XIXe ou au début du XXe siècle. Communs et parties agricoles semblent avoir été construits  au XIXe siècle, ce château comporte deux parties bien distinctes à l'instar de bien d'autres propriétés. A l'habitation initiale, logis d'un étage carré couvert en croupe, on accola un corps transversal plus haut (deux étage carrés), flanqué à l'ouest d'un avant-corps en rez-de-chaussée. On notera sur ce bâtiment des détails de sculpture (pots-à-feu) et des décors de zinguerie (oeuil de boeuf et épis de faîtage). Les communs et les parties agricoles sont bâtis en moellons de schiste recouverts d'enduit sur lequel le jeu harpés des chaînages de briques produit son décor habituel. Au delà du parc, vers le nord, il existait un grand verger clos de murs, des bâtiments étaient sans doute liés à cet espace.                       DEVANSAYE,   fut bâtie en 1875. A l'exception d'une tour d'escalier octogonale hors-oeuvre, il subsiste peu de traces de l'ancienne maison seigneuriale. Le château actuel se compose d'une série d'adjonctions réalisées à partir du logis primitif couvert par une toiture en longs pans et une toiture en croupe pour le corps en retour vers l'ouest. Il est cantonné au sud ouest par un pavillon, avec une tour et au nord-est d'un pavillon d'entrée couvert en terrasse. A l'extrémité nord, le dernier corps de bâtiment est couvert par une toiture en croupe brisée.","habitants":"Cour; seigneur local        Devansaye;   famille de la Perraudière.\r\n        \"","divers":"à Marans grav 1-2-3, celui de la Cour grav-4 et de Devansaye grav -5-6.","gps":"","images":["../../jctruffet.com/image/image_49/49_Marans_1.jpg","../../jctruffet.com/image/image_49/49_Marans_2.jpg","../../jctruffet.com/image/image_49/49_Marans_3.jpg","../../jctruffet.com/image/image_49/49_Marans_4.jpg","../../jctruffet.com/image/image_49/49_Marans_5.jpg","../../jctruffet.com/image/image_49/49_Marans_6.jpg"]},"Consult_chateau_formulaire9994":{"id":"Consult_chateau_formulaire9994","dept":"49","canton":"Saumur","commune":"Rou Marson","nom":"Marson","type":"Forteresse","periode":"XIX-XX","histoire":"MARSON,   le château actuel est édifié pour le comte Baillou de la Brosse, en lieu et place d'un édifice médiéval tombé en ruine, par l'architecte Joly-Leterme, de 1850 à 1865. Le domaine est vendu en 1913 à Henri Fricotelle qui fait moderniser l'édifice vers 1924. L'architecte Claudon conçoit un portail monumental, décoré par le sculpteur Voisine.","architecture":"MARSON, la construction du château de Marson date du 3ème quart du XIXe siècle et de la 1ère moitié du XXe siècle. Les maitres d'ouvrage étaient : le comte Baillou de la Brosse et Henri Fricotelle. Trois architectes ont travaillé sur le château : Joly-Leterme, Brunel Pierre Jean Victor et Claudon. Voisin était le sculpteur. Le domaine fut vendu, en 1913, à Henri Fricotelle qui fit moderniser le château, de 1924 à 1926. L'architecte Claudon conçut alors un portail monumental, décoré par le sculpteur Voisine. En 1927, Fricotelle fit construire dans le parc une piscine, inspirée de l'architecture thermale antique et de la colonnade en hémicycle de Hardouin-Mansart à Versailles. Cette piscine est l'oeuvre de l'architecte saumurois Pierre-Jean-Victor Brunel. Le château de Marson est inscrit au titre des M.H. en 1991","habitants":"comte Baillou de la Brosse\r\n        \"","divers":"Marson 47° 15' 05,49\" Nord, 0° 08' 45,64\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Marson_1.jpg","../../jctruffet.com/image/image_49/49_Marson_2.jpg","../../jctruffet.com/image/image_49/49_Marson_3.jpg","../../jctruffet.com/image/image_49/49_Marson_4.jpg"]},"Consult_chateau_formulaire493d":{"id":"Consult_chateau_formulaire493d","dept":"49","canton":"Chemillé-Melay","commune":"Martigné-Briand","nom":"Martigné_Briand","type":"Château","periode":"XIV-XVI-XVII","histoire":"Trois châteaux à Martigné-Briand celui de Flines et de Saulaie et des Noyers                                                                  FLINES, portail et vestiges de l'enceinte datant du XVIe siècle. Aile de communs vers l'est portant une date de la décennie 1740. Château reconstruit en 1789, puis incendié, et achevé dans la première moitié du XIXe siècle. Chapelle bâtie en 1846. L'édifice se compose d'un étage carré et un étage de comble, gros-oeuvre réalisé en calcaire ; moellon ; enduit ; grison ; tufeau ; pierre de taille ; appareil mixte; bossage, élévations à travées surmontées d'un toit à longs pans  brisés ; toit conique, pignon couvert, pignon découvert et croupe, couverts d'ardoise.                                                    la SAULAIE, le château de la Saulaie a été construit dans la deuxième moitié du XVIIe siècle,  remaniements au XVIIIe siècle ; fronton de la façade antérieure et aile accolée au nord datant du premier quart du XIXe siècle.                            VILLENEUVE,  dont la construction date des XIVe et XVe siècles. Il se situe sur le haut coteau qui domine la Vallée du Layon.   Bâti dans une enceinte fortifiée préexistante, ce manoir garde pour lessentiel sa structure du XVe siècle, malgré des remaniements postérieurs. Le château de Villeneuve est pourvu d'une tour d'escalier, de forme octogonale. Il a conservé ses cheminées du XVe siècle et ses grilles de fenêtres de la même époque, a été remanié au XVIIe siècle.","architecture":"NOYERS, de la fin du XVIe siècle, conserve des éléments architecturaux médiévaux, dont les communs du XVe siècle. Deux tours cantonnant les communs ont été transformées en pigeonnier et en chapelle. La basse-cour avec auditoire de justice et maisons rurales des XVIe et XVIIe siècles, longe le flanc Est de l'enceinte fortifiée. A la mort de du Guesclin, le fief de Montsabert revint dans la famille de Laval, puis sera vendu à la famille Le Maistre, par mariage il passera à la famille Goislard. Le château fut restauré par mode dans la seconde moitié du XIXe siècle. Ailes en retour, tour ouest, chapelle, parties des étables datant du XVe siècle ; logis, reprise ailes en retour, remaniement de la chapelle et portail datant de la deuxième moitié du XVIe siècle ; tours sud-ouest, couverture du logis, parties agricoles du XIXe siècle.M. Jean-Paul Besnard, domaine viticole, location chambres d'hôtes.                                                                                   VILLENEUVE, le manoir possède les caractéristiques des résidences seigneuriales élevées peu après la fin de la guerre de Cent Ans, qui allie un système défensif et une architecture dagrément. On remarque le châtelet fortifié, avec son porche du XIVe siècle à double ouverture, dont la facture est très soignée et sur la façade du logis.  Le corps de logis est construit sur des caves voûtées plus anciennes,et daterait du XVe siècle, est classé aux M.H depuis le 8/04/1992.","habitants":"Seigneurs locaux                                                                       Noyers famille Goislard\r\n        \r\n        \"","divers":"à Martigné-Briand celui de Flines et de Saulaie et des Noyers grav 1-2-3-4    Teranjou grav-5-6","gps":"","images":["../../jctruffet.com/image/image_49/49_Martign%c3%a9_Briand_1.jpg","../../jctruffet.com/image/image_49/49_Martign%c3%a9_Briand_2.jpg","../../jctruffet.com/image/image_49/49_Martign%c3%a9_Briand_3.jpg","../../jctruffet.com/image/image_49/49_Martign%c3%a9_Briand_4.jpg","../../jctruffet.com/image/image_49/49_Martign%c3%a9_Briand_5.jpg","../../jctruffet.com/image/image_49/49_Martign%c3%a9_Briand_6.jpg"]},"Consult_chateau_formulairef6fc":{"id":"Consult_chateau_formulairef6fc","dept":"49","canton":"Chemillé-Melay","commune":"Martigné Briand","nom":"Martigné_Briand_II","type":"Château","periode":"XII-XV-XVI","histoire":"Quatre chateaux à Martigné-Briand dont celui de Martigné du Grand-Riou à Tigné.                                                              GRAND-RIOU, est un édifice de la seconde moitié du XVe siècle, construit en deux campagnes très proches. Grand-Riou et de Villeneuve compose d'une grande enceinte rectangulaire et était accompagné au XVIIIe d'un parc enclos de murs. Incendié en 1792, il est demeuré depuis à l'état de ruines. De l'enceinte, subsiste la majeure partie de la courtine nord, une partie de la courtine ouest et la tour d'angle sud-ouest qui abrite un pigeonnier. La courtine Est constitue la façade du corps de logis, ce corps de bâtiment, à plan en équerre, possède une tour d'escalier à vis dans oeuvre flanqué d'une tourelle secondaire.                     MARTIGNE-BRIAND, du XIIe siècle par Martigné Briand jusqu'au XVIe siècles, construction de René de la Jumelière, a la fin du XVIe siècle Charles de Cossé-Brissac maréchal de France acquiert le château et apporte quelques modifications. Peu entretenu et à la Révolution française gravement endommagés, incendiés par les troupes révolutionnaires pas mal entretenu par les propriétaires successif et en 1956 la princesse  de Croÿ madame de Chaponay le lègue à une association \" la Jeanne d'Arc\" qui s'engage à le restaurer. Depuis 1993 les amis du vieux château proposent des visites.","architecture":"MARTIGNE-BRIAND, contre les vestiges dun château féodal construit sur les ruines d'une ancienne forteresse du XIIe siècle dont il conserve lenceinte fortifiée, René de la Jumelière fait appliquer lactuel château, dont la construction est complètement achevée avant 1550. Lensemble est très endommagé durant la Révolution (incendie des toitures). De petite dimension, le bâtiment se place dans le courant esthétique des premiers châteaux du XVIe siècle du Val de Loire: de style renaissance  principe architectural et décoration sont encore marqués par le Moyen-Age ; corps de logis principal entouré de deux tours circulaires, décor flamboyant des pilastres et des allèges de fenêtres, mais lordonnance régulière et symétrique de la façade appartient déjà à la Renaissance. Partie nord du sous-sol et souterrain datant du XIIe ou XIIIe siècle. Aile nord-ouest du logis datant du XVe siècle. Partie centrale du logis avec ses deux tours construite en 1503 par Pierre Péret pour René de la Jumelière. L'escalier nord portait la date actuellement disparue de 1587. Tour nord-ouest et portail datant de la deuxième moitié du XVIe siècle.","habitants":"Martigné; famille de  René de la Jumelière et Charles de Cossé-Brissac \r\n        \r\n        \"","divers":"Noyers 47° 14' 08\" Nord et 0° 29' 16\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Martigne_Briand_II_1.jpg","../../jctruffet.com/image/image_49/49_Martigne_Briand_II_2.jpg","../../jctruffet.com/image/image_49/49_Martigne_Briand_II_3.jpg","../../jctruffet.com/image/image_49/49_Martigne_Briand_II_4.jpg","../../jctruffet.com/image/image_49/49_Martigne_Briand_II_5.jpg"]},"Consult_chateau_formulaire227d":{"id":"Consult_chateau_formulaire227d","dept":"49","canton":"Chemillé-Melay","commune":"Chemille en Anjou","nom":"Martreil","type":"Château","periode":"XVII","histoire":"MARTREIL  Ce domaine appartenant au XVe siècle à Louis de Beauvau, premier sénéchal du Roi René, comportait en 1453 une maison bourgeoise. Au XVIe siècle, il était la propriété des la Trémoïlle, la maison servant de rendez-vous de chasse. Au XVIIe siècle, il appartint à Samuel de Breil, comte de Bruslon et conseiller d'Etat. Puis aux XVIIe et XVIIIe siècles à Jacques Boullay du Martray, conseiller du roi et maire d'Angers. En 1837, le domaine est acquis à M. de Beauchamps par Emmanuel Clémanceau de la Lande habitant Montjean et propriétaire de fours à chaux. C'est donc M. Clémanceau de la Lande, aïeul des propriétaires actuels qui entreprend, sur l'édifice existant, l'élévation du château, la construction des dépendances et le dessin du parc à l'anglaise.","architecture":"MARTREIL; de plan rectangulaire flanqué de tours  carrés au angles de la façades d'entrée, édifice à deux niveaux avec lucarnes sur combles à fronton triangulaires, l'avant corps d'entrée central saillant  accolé aux angles intérieur de tourelles  toit en poivrière avec toit à quatre pans pour l'avant corps et pavillons, deux pavillons polygonale sur flancs de part et autres  à  trois niveaux.","habitants":"Famille de la Trémoïlle,\r\n        \"","divers":"A Chemille en Anjou le château de Martreil","gps":"","images":["../../jctruffet.com/image/image_49/49_Martreil_1.jpg","../../jctruffet.com/image/image_49/49_Martreil_2.jpg","../../jctruffet.com/image/image_49/49_Martreil_3.jpg","../../jctruffet.com/image/image_49/49_Martreil_4.jpg","../../jctruffet.com/image/image_49/49_Martreil_5.jpg"]},"Consult_chateau_formulairee008":{"id":"Consult_chateau_formulairee008","dept":"49","canton":"Cholet","commune":"Maulévrier","nom":"Maulévrier","type":"Château","periode":"XV-XVII","histoire":"A Maulevrier le château Colbert, de Frogerie et Touvois (voir article).                                                                              COLBERT, pendant et après les guerres de Religion, la petite ville de Maulévrier connaît le déclin et c'est en 1669 que Edouard François Colbert, soldat des armées du roi Louis XIV, futur lieutenant général et frère du ministre Jean Baptiste Colbert, acquiert le comté de Maulévrier. Entre 1679 et 1683 Edouard François Colbert fait bâtir le château actuel avec comme architecte principal Jules Hardouin Mansart grand architecte du palais de Versailles. Durant les guerres de Vendée, Maulévrier sera un des foyers insurrectionnels et sera incendié à maintes reprises avec le château. Le garde principal du château et du comté de Maulévrier \"Jean-Nicolas Stofflet\" participera aux combats et deviendra généralissime des armées catholiques et royales. Il sera fusillé à Angers le 25 février 1796. A partir de 1817 Edouard-Victurnien Colbert, réhabilite l'édifice. En 1895, un Maulévrais, Eugène Bergère, devient propriétaire. En 1896, l'architecte parisien, Alexandre Marcel rénove le château. Il épouse en 1899 Madeleine Bergère, fille des châtelains. A partir de 1902 il crée le parc oriental de Maulévrier. Il deviendra en 1913 architecte en chef du gouvernement. C'est en septembre 2001 que les nouveaux propriétaires Jean-Louis et Dominique Popihn acquièrent le château et décident d'en faire un haut lieu de la gastronomie régionale.","architecture":"COLBERT De plan en U, Une architecture XVIIe siècle, des allures de Petit Versailles, style renaissance   Le château fut reconstruit dans son style actuel à partir de 1679. Après avoir été ravagé par de nombreux incendies au cours des différentes guerres, le château fut reconstruit sur les plans d'origine, entre 1814 et 1830. Depuis il est passé dans de nombreuses mains au fil des siècles.  Façades et toitures du château et des communs ; terrasse avec son escalier monumental ; pièces suivantes du rez-de-chaussée : grand escalier d'honneur de l'aile ouest, pièces de réception du corps principal (la grande salle à manger, la salle de billard, le grand salon, le petit salon) , le vestibule de l'aile Est ; chambres du premier étage avec leurs décors, dans le corps principal (chambres 102 à 107 comprise) et les deux chambres de l'aile ouest (: inscription par arrêté du 6 juillet 1995                                                                                                 FROGERIES, c'est dans ce lieu historique, bâti au XVe siècle, sur l'emplacement d'une maison forte datant du XIIe siècle, par Geoffroi Bouer, né en 1415 et arrière-petit-fils d'Hilaire du Puy du Fou, 7ème génération descendante de Renaud I du Puy du Fou, né en 1140 et, fondateur de la dynastie, que nous sommes heureux de vous accueillir.","habitants":"Colbert; Edouard François Colbert, \r\n        \"","divers":"A Maulevrier le château Colbert grav de 6 à 9, de Frogerie grav-1-2-3-4.                                                                Frogeries     47° 01 42,2\" Nord 0° 47 08,2\" Ouest             Colbert 47° 00' 30\" Nord, 3° 44' 43\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Maul%c3%a9vrier_1.jpg","../../jctruffet.com/image/image_49/49_Maul%c3%a9vrier_2.jpg","../../jctruffet.com/image/image_49/49_Maul%c3%a9vrier_3.jpg","../../jctruffet.com/image/image_49/49_Maul%c3%a9vrier_4.jpg","../../jctruffet.com/image/image_49/49_Maul%c3%a9vrier_5.jpg","../../jctruffet.com/image/image_49/49_Maul%c3%a9vrier_6.jpg","../../jctruffet.com/image/image_49/49_Maul%c3%a9vrier_7.jpg","../../jctruffet.com/image/image_49/49_Maul%c3%a9vrier_8.jpg","../../jctruffet.com/image/image_49/49_Maul%c3%a9vrier_9.jpg"]},"Consult_chateau_formulaireaeeb":{"id":"Consult_chateau_formulaireaeeb","dept":"49","canton":"Doué la Fontaine","commune":"Meigné","nom":"Meigné","type":"Château","periode":"XVI-XVII","histoire":"deux châteaux à Meigné, la Bretaudière et de la Tremblaye.                                                                BRETAUDIERE, au tournant du XVIe siècle la propriété appartient à messire Philippe Bertauld, magistrat , qui entreprend la construction dun châtelet fortifié dont il subsiste aujourdhui une élégante poterne à large porte charretière, accolée dun portillon pour les piétons. Son fils René, secrétaire du cardinal de Grandmont à Rome est nommé comte du Sacré Palais de Sa Sainteté le Pape et obtient en 1542 des moines de Saint Florent le droit de bâtir une chapelle à la Berthaudière. La propriété reste dans la descendance pendant plusieurs siècles. Le 12 janvier 1650 larrière-petite-fille de René Berthaud apporte le domaine par son mariage à noble homme Jen Tréton, médecin à Saumur. Leurs enfants Anne épousera en 1695 Pierre Perrault, conseiller secrétaire du roi Louis XIV à la chambre des comptes de Nantes. Pierre Perrault et leur fils Claude, né à Nantes en 1706, marié en 1726 à Marie Claude Lépagneul de la Plante, la propriété sétend alors jusquà la Rousselière et une douzaine dhectares sont consacrés à la culture de la vigne. Mais la propriété est confisquée pendant la Révolution Française et passe de mains en mains. Ce sont les éditeurs tourangeaux Mame qui en sont propriétaires au tournant du XIXe siècle. On doit à la famille Thomas, notaires à Angers, la destruction des murs denceinte et la construction de la façade principale dans le style Renaissance.","architecture":"La TREMBLAYE, village constitué en grande partie par un habitat troglodytique. La chapelle château de la Tremblaye détruite avait été fondée en 1495 ; vestiges d'un bâtiment XVIe siècle au mur nord de la chapelle actuelle; corps de logis central construit en 1652 par Claude, François et René Viollet; celliers troglodytiques datant du XVIIe siècle ; les deux pavillons latéraux et l'orangerie datent du deuxième quart du XIXe siècle ; dépendances rebâties en 1858. L'édifice se compose de deux étages carrés et étage de comble, gros oeuvre : tufeau; pierre de taille et appareil mixte, élévations ordonnancées surmontées de toit à longs pans, croupe; pignon couvert, pignon découvert; toit en pavillon, couverts d'ardoise et de tuiles creuses.","habitants":"Bretaudière; famille de Pierre Perrault                              Tremblaye; Famille Viollet\r\n        \"","divers":"à Meigné, la Bretaudière grav 2-3-4 et de la Tremblaye grav_1.","gps":"","images":["../../jctruffet.com/image/image_49/49_Meign%c3%a9_1.jpg","../../jctruffet.com/image/image_49/49_Meign%c3%a9_2.jpg","../../jctruffet.com/image/image_49/49_Meign%c3%a9_3.jpg","../../jctruffet.com/image/image_49/49_Meign%c3%a9_4.jpg"]},"Consult_chateau_formulaire7f11":{"id":"Consult_chateau_formulaire7f11","dept":"49","canton":"Doué la Fontaine","commune":"Gennes","nom":"Milly_Meugnon","type":"Château","periode":"XVI","histoire":"MILLY-le-Meugnon, petit village rattaché administrativement à la commune de Gennes, appartenait autrefois à la famille de Maillé-Brézé, alliée au Grand Condé et au cardinal de Richelieu. La construction du château de Milly date du XVI et XVIIe siècle, XIXe siècle. Il tire son origine d'une tour de guet médiévale datant du XVe siècle, dont les ruines sont encore visibles. Certains communs, dont les écuries, et une porte d'honneur remontent au XVIe siècle. Le château de Milly-le-Meugon a été racheté par la commune de Gennes. Il est inscrit partiellement aux M.H. depuis le 15.12.2000.","architecture":"MILLY-le-Meugnon, ensemble castral se situant sur la voie reliant Gennes à Doué-la-Fontaine. Aux XVIe et XVIIe siècles, renouvellement de l'organisation paysagère et architecturale par la famille de Maillé. L'intérêt de l'ensemble est dû en particulier à des bâtiments annexes comme la chapelle seigneuriale médiévale, les galeries du XVIe siècle avec leurs décors peints, et les vastes écuries du XVIIe siècle.","habitants":"famille de Maillé-Brézé\r\n        \r\n        \"","divers":"A gennes le château de  Milly grav-1 et de Boussinières  grav 2                MiIlly  47° 17' 12,16\" Nord, 0° 15' 11,71\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Milly_Meugon_1.jpg","../../jctruffet.com/image/image_49/49_Milly_Meugon_2.jpg"]},"Consult_chateau_formulaireefbe":{"id":"Consult_chateau_formulaireefbe","dept":"49","canton":"Segré","commune":"Aviré_Segré","nom":"Montchevalleraie","type":"Château","periode":"XVIII","histoire":"MONTCHEVALLERAIE,  bati en 1780 pour la famille Meigan Lihoreau, cette maison est resté dans la même famille jusqu'en 1970. La bâtisse, depuis sa construction n'a pas subi de transformation majeure, comme en témoignent les écuries et chenil attenants qui complètent cet hymne stylistique du XVIIIe siècle. Le château trône dans un élégant jardin a l'anglaise de six ha avec de vastes pelouses et une importante pièce d'eau. Le parc est planté d'arbres centenaires, dont de magnifiques séquoias. La demeure appartient depuis 1995 a Christian E. Boulmant Nomballais originaire de la région. Le château se décline sur trois niveaux, au rez-de-chaussée, le grand hall dessert les pièces de réception donnant sur le parc, les étages étant pour leur part réservés aux chambres a coucher. La décoration intérieure compose un écrin précieux et intime renfermant un beau mobilier du XVIIIe siècle de famille de Chiné, qui restitue le décor originel, depuis presque 40 ans.","architecture":"MONTCHEVALLERAIE, a été construit à la fin du XVIIIe siècle. C'est un château de plaisance de style classique. L'édifice est composé d'un corps de bâtiment. Celui-ci dispose de deux ailes en retour d'équerre s'ouvrant sur une cour non fermé, l'ensemble est coiffé d'un toit couvert d'ardoises Le corps de logis comprend deux ailes en retour d'équerre, vers le sud. Sur la travée centrale, le logis possède une lucarne complexe présentant les caractères d'une serlienne inscrite dans un fronton en plein cintre. Le célèbre chanteur français d'opérettes, Luis Mariano, y venait en vacances à l'invitation du propriétaire de l'époque, Maurice Lamy, directeur du théâtre du Châtelet à Paris. Selon l'Inventaire général du patrimoine culturel, le château de La Montchevalleraie est construit en schiste et moellons sur un plan régulier en U. Sur sa façade sud une lucarne complexe présente les caractères dune serlienne inscrite dans un fronton en plein cintre. Le parc et les Jardins s'étendent sur plus de 6 hectares. Ils sont inventoriés par le conseil général de Maine et Loire au titre de l'étude de valorisation des parcs et jardins de lAnjou et le comité des parcs et jardins de France. Le château a reçu le label patrimoine historique VMF (Vieilles Maisons Françaises) en 2013. Aujourd'hui, c'est un château habité toute l'année, qui vous propose ses chambres d'hôtes.","habitants":"famille Meigan-Lihoreau\r\n        \"","divers":"A Aviré-Segré le château de Montchevalleraie 47° 42' 25\" Nord et 0° 47' 47\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Montchevalleraie_1.jpg","../../jctruffet.com/image/image_49/49_Montchevalleraie_2.jpg","../../jctruffet.com/image/image_49/49_Montchevalleraie_3.jpg","../../jctruffet.com/image/image_49/49_Montchevalleraie_4.jpg","../../jctruffet.com/image/image_49/49_Montchevalleraie_5.jpg"]},"Consult_chateau_formulaire794b":{"id":"Consult_chateau_formulaire794b","dept":"49","canton":"Beaufort en Vallée","commune":"Mazé","nom":"Montgeoffroy","type":"Château","periode":"XVIII","histoire":"MONTGEOFFROY, son propriétaire initial était Louis Georges Érasme de Contades maréchal de France et gouverneur de la province dAlsace fait reconstruire, entre 1772 et 1776, le château familial de Montgeoffroy par larchitecte parisien Jean Benoît Vincent Barré, disciple de Ange Jacques Gabriel.  Demeuré depuis les années 1770 la propriété de la famille Contades, Le maréchal étant éloigné de l'Anjou par ses fonctions à Versailles et à Strasbourg, y séjournera quelques semaines, l'été.  En 1795 décès  du maréchal de Contades,  durand la Révolution le fils  et ses enfants émigrent, le marquis de Contades  qui s'y installa en 1772,  sa belle-fille, Julie Constantin de Marans, son ancienne maîtresse, Hélène Hérault de Sechelles, et la belle-fille de cette dernière, Marie-Marguerite Magon de La Lande. Son propriétaire actuel est le marquis de Contades. Montgeoffroy à gardé son mobilier d'origine, signé de Gourdin, Garnier et Durand, et de beaux tableaux de Rigaud, Drouais, Pourbus le Jeune, Desportes, Van Loo. L'ensemble est un modèle de proportion et d'harmonie. Chaque meuble, chaque toile, occupe la place pour laquelle il a été conçu. Les tapisseries, les tentures aux dessins et aux teintes magnifiques semblent dater d'hier.","architecture":"MONTGEOFFROY, date du XVIIIe siècle. L'ancien château fut rasé,  mais l'architecte Barré respecta son plan et conserva deux tours et les douves, vaste demeure coiffé d'une haute toiture en ardoise dévoile un corps de logis à trois niveaux, doté de deux ailes et d'un avant corps La façade sur cour est conventionnelle, avec son plan en U et son avant-corps central très marqué, à fronton triangulaire aux armes des Contades. La sobriété de son ornementation, la simplicité de lappareil et la structuration légère de ses volumes sont plus conformes à lesthétique de la fin du XVIIIe siècle, de même que la façade postérieure, avec la rythmique plus subtile de ses avant-corps.","habitants":"Louis Georges Érasme de Contades\r\n        \"","divers":"GPS : 47° 28' 08\" Nord, 0° 16' 34,97\" Ouest","gps":"47° 28' 08\" Nord, 0° 16' 34,97\" Ouest","images":["../../jctruffet.com/image/image_49/49_Montgeoffroy_1.jpg","../../jctruffet.com/image/image_49/49_Montgeoffroy_2.jpg","../../jctruffet.com/image/image_49/49_Montgeoffroy_3.jpg","../../jctruffet.com/image/image_49/49_Montgeoffroy_4.jpg","../../jctruffet.com/image/image_49/49_Montgeoffroy_5.jpg","../../jctruffet.com/image/image_49/49_Montgeoffroy_6.jpg"]},"Consult_chateau_formulaire0148":{"id":"Consult_chateau_formulaire0148","dept":"49","canton":"Doué la Fontaine","commune":"Montreuil Bellay","nom":"Montreuil_Bellay","type":"Château","periode":"XVII","histoire":"deux châteaux  à Montreuil-Bellay dont celui  de Montreuil et de Coux.                                                                                   COUX, domaine mentionné en 1384 ; ancien logement, avec tour d'escalier polygonale du XVIe siècle; remanié au XVIIIe siècle ; le château a été reconstruit en 1816, pour Charles de Croze.                                                                               MONTREUIL-BELLAY, le seigneur  Guillaume de Melun Tancarville meurt en 1415 à la bataille d'Azincourt. Son petit-fils, Guillaume d'Harcourt, épouse Yolande de Laval, belle soeur du Roi René. Henri II d'Orléans, duc de Longueville, hérite du château. Ambassadeur, il signera en 1648 le traité de Westphalie qui met fin à la guerre de Trente Ans. Son épouse, Geneviève de Condé, instigatrice de la Fronde avec son frère le Grand Condé, est contrainte par Louis XIV à l'exil à Montreuil-Bellay, entraînant avec elle ses nombreux admirateurs dont La Rochefoucault et Turenne. En 1662 vente du château au maréchal de la Meilleraye puis par héritage aux Cossé-Brissac et aux Trémoille. Saisi à la Révolution transformé en prison pour femmes redevient privés au XIXe siècle, les Trémoille le récupèrent à nouveaux, le revendent en 1822 à monsieur Niveleau, négociant à Saumur. La baronne de Grandmaison, fille de ce dernier. Ceux-ci remettront en état le château qu'ils lègueront à leur neveu Georges de Grandmaison, arrière-petit-fils du général Mouton, maréchal de France, aide de camp de l'Empereur Napoléon 1er. Georges de Grandmaison, maire de Montreuil Bellay pendant seize ans et parlementaire de l'arrondissement de Saumur pendant près d'un demi siècle.","architecture":"COUX  le cellier porte la date  de 1826; remaniements et agrandissements au cours du XIXe siècle, aile de communs, pavillon sur façade postérieure du château avec terrasse. Edifice composé d'un étage carré et étage de comble, gros oeuvre : tufeau; pierre de taille; calcaire ; moellon ; appareil mixte ; enduit et bossage, élévation ordonnancée surmontée d'un toit à longs pans; croupe; pignon couvert et découvert, toit en pavillon, terrasse et toit polygonal couverts d'ardoise.                                                                                                             MONTREUIL-BELLAY, entouré par un profond fossé  qu'enjambe un pont-levis défendu par une barbacane . Les murailles sont cantonnées par treize  tours dont la base  est percée d'archères. Un second pont-levis, partant de la Barbacane donne accès à la basse cour.  Le châtelet d'entrée encadré de deux tours qui défend le pont-levis, la construction de la capitainerie jouxtant le châtelet, la collégiale flamboyante qui remplace l'ancienne chapelle seigneuriale ainsi que les deux édifices formant l'ensemble résidentiel. Adossé aux courtines, le château neuf est un vaste rectangle cantonné de quatre tours rondes couvertes en terrasse, à l'angle Est du bâtiment une tourelle polygonale, coiffé d'un toit en cône chevauché par trois niveaux de lucarnes à haut fronton, abrite l'escalier à vis. sur la façade sud, une autre tourelle polygonale abrite un escalier, d'autres tourelles à clochetons abritant des escaliers secondaires. Au midi, un bâtiment en retour d'équerre contenant deux oratoires superposés.","habitants":"Coux ;Charles de Croze.                                                      Montreuil,Famille de la Trémoille\r\n        \"","divers":"Montreuil-Bellay    47° 07' 59\" nord, 0° 09' 18\" ouest          grav 1 à 5 Coux-grav de  6 à 9","gps":"","images":["../../jctruffet.com/image/image_49/49_Montreuil_Bellay_1.jpg","../../jctruffet.com/image/image_49/49_Montreuil_Bellay_2.jpg","../../jctruffet.com/image/image_49/49_Montreuil_Bellay_3.jpg","../../jctruffet.com/image/image_49/49_Montreuil_Bellay_4.jpg","../../jctruffet.com/image/image_49/49_Montreuil_Bellay_5.jpg","../../jctruffet.com/image/image_49/49_Montreuil_Bellay_6.jpg","../../jctruffet.com/image/image_49/49_Montreuil_Bellay_7.jpg","../../jctruffet.com/image/image_49/49_Montreuil_Bellay_8.jpg","../../jctruffet.com/image/image_49/49_Montreuil_Bellay_9.jpg"]},"Consult_chateau_formulaireb389":{"id":"Consult_chateau_formulaireb389","dept":"49","canton":"Tiercé","commune":"Montreuil sur Maine","nom":"Montreuil_Maine","type":"Château","periode":"XVIII-XIX","histoire":"A Montreuil sur maine le château de Poirier et la Chouanière. CHOUANIERE, est constitué d'un manoir ancien transformé en ferme et d'un château construit au XIXe siècle entre 1865 et 1868. Le fief et terre de la Chouanière relevaient du Lion-d'Angers et appartenaient en 1540 à Jean Landivy, prêtre. Sous la corniche de la façade principale, une inscription livre le nom des commanditaires et la date de construction du manoir ancien. Autour du logis et des communs, on trouve d'autres dépendances dont deux étables du XVIe ou du XVIIe siècle remaniées au XIXe siècle et des hangars du XIXe siècle. Au XIXe siècle, le manoir est abandonné et un château néo-gothique est construit à proximité.                                     POIRIER, est attesté dès le XIe siècle. L'église appartient alors au seigneur de Chambellay. Il en fait don au début du XIIe siècle à l'abbaye Saint-Aubin. Le prieuré constitue à cette époque un fief important, le prieur étant seigneur de la paroisse. La paroisse dépendait du Doyenné de Craon, de l'Election et des Aides d'Angers, du grenier à sel de Châteaugontier et du district de Segré. Le prieuré, fortifié pendant la guerre de Cent ans, accueille le tribunal ecclésiastique du Lion-d'Angers. .","architecture":"CHOUANIERE, est constitué d'un logis en fond de cour et de communs dans les ailes en retour. La cour est fermée par un mur doté d'un porche d'entrée. Le logis est un bâtiment à étage carré et étage de comble. La façade sur cour s'organise selon quatre travées. Les deux travées centrales avec deux portes au rez-de-chaussée sont couronnées de deux lucarnes à fronton cintré et devanture percée d'un oculus. Les deux autres travées possèdent des lucarnes à fronton triangulaire. Les portes du rez-de-chaussée sont également couronnées d'un fronton triangulaire.  Un bandeau entre rez-de-chaussée et étage et la corniche avec une inscription soulignent l'horizontalité du bâtiment, le château, construit au XIXe siècle à proximité de l'ensemble plus ancien, est un bâtiment composé d'un corps principal et de deux ailes en retour vers l'arrière du château.                                                   POIRIER, Le corps de logis principal semble dater du XVIIIe siècle tandis que le pavillon nord semble avoir été ajouté au XIXe siècle. Le corps de bâtiment central, couvert d'un toit en croupe, est composé d'un rez-de-chaussée, d'un étage carré et d'un étage de comble doté de lucarnes aux frontons arrondis. La façade s'organise selon cinq travées, la travée centrale étant mise en évidence par deux bandes verticales de tuffeau à bossages encadrant la porte, la fenêtre à balcon et la lucarne richement décorée de pilastres et d'ailerons à volutes. Les baies du rez-de-chaussée sont à arcs segmentaires tandis que celles de l'étage sont rectangulaires. Tous les encadrements de baies, la corniche et le chaînage d'angles sont en tuffeau, le pavillon accolé sur le flanc nord du corps central possède un rez-de-chaussée, un étage carré et un étage d'attique, dotés d'ouvertures jumelées.","habitants":"Chouanière ;Jean Landivy.                                                             Poirier; seigneur de Chambellay\r\n        \r\n        \r\n        \"","divers":"A Montreuil sur maine le château de Poirier  grav-3 et la Chouanière grav 1-2 Montrevaux -4","gps":"","images":["../../jctruffet.com/image/image_49/49_Montreuil_Maine_1.jpg","../../jctruffet.com/image/image_49/49_Montreuil_Maine_2.jpg","../../jctruffet.com/image/image_49/49_Montreuil_Maine_3.jpg","../../jctruffet.com/image/image_49/49_Montreuil_Maine_4.jpg"]},"Consult_chateau_formulaire70e3":{"id":"Consult_chateau_formulaire70e3","dept":"49","canton":"Saumur","commune":"Montsoreau","nom":"Montsoreau","type":"Forteresse","periode":"XIV-XV","histoire":"MONTSOREAU, en 1213, l'héritière de Montsoreau épouse un membre de la famille Savary, seigneur de Montbazon. En 1374, la seigneurie de Montsoreau passe aux Craon qui sont vicomtes de Châteaudun et peu après, vers 1400, elle est à la famille Chabot. Le 17 mars 1445, Jeanne Chabot épouse Jean II de Chambes seigneur vassal des ducs d'Anjou et maître d'hôtel du roi Charles VII, commanditaire du château. En 1472 la comtesse de Montsoreau épouse de  Charles de Chambes recevait le duc de Guyenne frères de Louis XI succombèrent suite à un empoisonnement, le frère de Charles, Jean de Chambes meurt  assassiné en 1572  lors de la nuit de la Saint-Barthélémy, maitresse du duc de Bussy d'Amboise qui fut assassiné dans ce château  en 1579 (Dumas).  Au XVIIe siècle le seigneur René de Chambes condamné au titre de trafiquant  et faux-monnayeur se réfugie en Angleterre.  le château passa par alliance  aux Bouchet de Sourches, puis au marquis de Tourzel. Le château abandonné après la Révolution servit  d'entrepot de marchandises et subit de nombreuses dégradations jusqu'en 1913 date à laquelle il fut acheté par le conseil général du Maine et Loire qui le fit restaurer de 1923 à 1932. Le château, rendu célèbre par l'uvre d'Alexandre Dumas \"La Dame de Montsoreau\", et musée des Goums.","architecture":"MONTSOREAU, au début du XIe siècle, Montsoreau était un point stratégique militaire et un octroi sur le fleuve. C'est à cette époque que la seigneurie de Montsoreau est apparue, période où la féodalité se développe en Touraine et en Anjou. Construit  entre 1440 et 1455, dominant la Loire, cet édifice, qui affecte la forme d'un quadrilatère consiste dans un corps de logis de truffeau encadré sur trois côtés par une enceinte basse  aujourd'hui presque totalement d
