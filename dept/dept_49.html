étruite.  La façade extérieure est flanquée de tours d'angles  et couronnée par un chemin de ronde à mâchicoulis annonce la fonction défensive. Mi résidence, mi forteresse, présentait, les fenêtres à meneaux et le double étage à lucarnes, la façade sud cantonnée de deux gros pavillons en saillie, possède à chacun de ses angles une tourelle d'escalier polygonale du XVe siècle, cerné de douves alimentées par la Loire. Remanié lors de la Renaissance  avec notamment de plusieurs cheminées de larges ouvertures à meneaux deux tourelles d'escaliers et des salles spacieuses, Après d'importants travaux de restauration, un parcours-spectacle animé sur le thème de la Loire est présenté dans le château.","habitants":"FamilleJean II de Chambes\r\n        \"","divers":"Château de Montsoreau    47° 12' 56\" nord, 0° 03' 44\" est","gps":"","images":["../../jctruffet.com/image/image_49/49_Montsoreau_1.jpg","../../jctruffet.com/image/image_49/49_Montsoreau_2.jpg","../../jctruffet.com/image/image_49/49_Montsoreau_3.jpg","../../jctruffet.com/image/image_49/49_Montsoreau_4.jpg","../../jctruffet.com/image/image_49/49_Montsoreau_5.jpg"]},"Consult_chateau_formulaire1dfd":{"id":"Consult_chateau_formulaire1dfd","dept":"49","canton":"Tiercé","commune":"Morannes","nom":"Morannes","type":"Château","periode":"XV-XVI-XIX","histoire":"Quatre châteaux à Morannes dont celui de Morannes,  de Roches, de Panne et de Vaux.                                                    MORANNES, château primitif datait des XVe et XVIe siècles. Un second château le remplaça au XIXe siècle. Le corps de logis abrite aussi une surprenante chapelle. Il est ouvert à la visite sur rendez-vous commentée sur une réservation uniquement.                                                                               ROCHES, cet important domaine se cache derrière une vaste enceinte. A l'intérieur se trouve le premier château des Roches qui date du XVe et XVIe siècle. Au XIXe siècle, le château des Roches fut reconstruit. Le corps de logis abrite une étonnante chapelle de Roches.","architecture":"PANNE, il est situé  à Morannes, et  limitrophe au manoir des Grignons. Sa construction date de 1480. Il est de style Louis XIII. Le logis a été construit du XVe au XVIe siècle. C'est un ensemble de constructions en forme de T, à traverses inégales, reliées par un gros pavillon carré, qui conserve ainsi qu'une des ailes, une haute lucarne de style Louis XIII, encadrée de deux pilastres avec architrave, frise, corniche. Le couronnement en forme de fronton est découpé, avec un mascaron au centre et une tête grimaçante, en amortissement, le reste des bâtiments a été remanié à diverses dates. Il comprend un portail en ruine sur la rue des Grignons, endommagé par l'entrée d'une charrette de foin, lorsque le domaine servait de ferme au XXe siècle. La charpente de ce bâtiment, possède un détail surprenant, « on ne sait pas comment elle tient. Normalement elle ne devrait pas tenir » se sont exclamés, les examinateurs des M.H., lors d'une visite, en 1991, car aucun pieu, ne la soutient, au milieu. Cette particularité remonterait au XVe siècle.","habitants":"Seigneurs locaux\r\n        \"","divers":"à Morannes dont celui de Morannes,  de Roches grav -4 -5-6-7, de Panne grav-3 et de Vaux grav 1-2.                         Roches 47° 44' 47\" Nord, 0° 24' 56\" Ouest                              Morannes 47° 44' 37\" Nord, 0° 24' 59\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Morannes_1.jpg","../../jctruffet.com/image/image_49/49_Morannes_2.jpg","../../jctruffet.com/image/image_49/49_Morannes_3.jpg","../../jctruffet.com/image/image_49/49_Morannes_4.jpg","../../jctruffet.com/image/image_49/49_Morannes_5.jpg","../../jctruffet.com/image/image_49/49_Morannes_6.jpg","../../jctruffet.com/image/image_49/49_Morannes_7.jpg"]},"Consult_chateau_formulaire899d":{"id":"Consult_chateau_formulaire899d","dept":"49","canton":"Tiercé","commune":"Baracé","nom":"Motte_Baracé","type":"Château","periode":"XV-XIX","histoire":"MOTTE, le château de la Motte est situé dans un vaste parc dominé par le comte de Choulot au milieu du XIXe siècle.Pierre-Vincent-Gatien de la Motte-Baracé de Senonnes, marquis de Senonnes (1779-1851), chevalier de la Légion dhonneur en 1823, maire de Feneu en 1811 puis de 1815 à 1830, épouse en 1805 Auguste-Marie-Fortunée Gabrielle Goddes de Varennes (héritière du château et terre de Sautré). Sa fille Auguste-Mélanie-Gabrielle de la Motte-Baracé de Senonnes (1808-1857) épousera en 1831 Gustave Bucher de Chauvigné deputé de Maine-et-Loire. Pierre-Auguste de la Motte-Baracé de Senonnes (1810-1844), décédé au château. En 1844, Héloïse de Jourdan de Fleins de la Perraudière, marquise de Senonnes, veuve de Pierre-Auguste de la Motte-Baracé de Senonnes, elle était spécialisée dans le secteur d'activité des hôtels touristiques avec restaurant.","architecture":"MOTTE,  la première mention du château de la Motte remonte à 1082. Le château de la Motte actuel a été construit au XVe siècle mais il a subi de nombreuses modifications au cours des siècles, et surtout de grandes transformations en 1870.   Pierre-Vincent-Gatien de la Motte-Baracé de Senonnes, marquis de Senonnes (1779-1851), chevalier de la Légion dhonneur en 1823, maire de Feneu en 1811 puis de 1815 à 1830, épouse en 1805 Auguste-Marie-Fortunée Gabrielle Goddes de Varennes (héritière du château et terre de Sautré).","habitants":"Auguste-Mélanie-Gabrielle de la Motte-Baracé de Senonnes\r\n        \"","divers":"Château de la Motte Baracé","gps":"","images":["../../jctruffet.com/image/image_49/49_Motte_Barac%c3%a9_1.jpg","../../jctruffet.com/image/image_49/49_Motte_Barac%c3%a9_2.jpg","../../jctruffet.com/image/image_49/49_Motte_Barac%c3%a9_3.jpg"]},"Consult_chateau_formulaire1ce4-4":{"id":"Consult_chateau_formulaire1ce4-4","dept":"49","canton":"Longué-Jumelles","commune":"Mouliherne","nom":"Mouliherne","type":"Château","periode":"XV-XVIII","histoire":"Deux châteaux à Mouliherne celui  des Auberts et de la Touche.                                                                                   AUBERTS, le village forme un arc de cercle, d'ouest en Est, au pied de la butte nord située au confluent de deux ruisseaux et qu'occupait l'ancien baile du château comtal, puis il s'étend vers le sud, de part et d'autre de la route de Longue. Edifices ou vestiges des XIIe, au XIXe siècles. La rue principale a été élargie en 1809,  corps de logis central du château des Auberts, la remise, le logement et les étables construits en 1846 ; les ailes latérales du logement bâties en 1914 par Sergent. Le château se compose d'un étage carré et d'un étage en surcroît, gros-oeuvre en tufeau, pierre de taille  moellon enduit et appareil mixte, élévation à travées surmontée de toit à longs pans, croupe, pignon couvert, toit en pavillon et terrasse, couverts d'ardoise et métal en couverture.","architecture":"La TOUCHE, à Mouliherne est constitué dès le XIe siècle autour d'un château comtal, de l'église paroissiale Saint-Germain, et du manoir épiscopal de Matas. Le château a été construit au XVe siècle, les baies, l'angle sud-ouest du logis, les intérieurs ont été remaniés et le portail est construit dans la première moitié du XVIIe siècle, la remise agricole fut remaniée au XIXe siècle. L'édifice se compose d'un étage carré et d'un étage de comble, le gros-oeuvre en calcaire; grès ; silex ; moellon ; appareil mixte ; enduit partiel, élévation à travées surmontée de toit à longs pans ; pignon découvert ; toit en pavillon ; toit conique; toit polygonal et appentis, couverts d'ardoises.","habitants":"seigneurs locaux\r\n        \"","divers":"a  Mouliherne celui  des Auberts grav 1-2, et de la Touche grav-3.   47° 27' 47\" nord, 0° 00' 41\" est","gps":"","images":["../../jctruffet.com/image/image_49/49_Mouliherne_1.jpg","../../jctruffet.com/image/image_49/49_Mouliherne_2.jpg","../../jctruffet.com/image/image_49/49_Mouliherne_3.jpg"]},"Consult_chateau_formulaire60cb-2":{"id":"Consult_chateau_formulaire60cb-2","dept":"49","canton":"Doué la Fontaine","commune":"Les Ulmes","nom":"Mousseau","type":"Château","periode":"XV-XVI","histoire":"MOUSSEAU, logement au nord-est, enceinte, portail datant de la première moitié du XVIe siècle, le logis et le colombier du XVIIe ou XVIIIe siècle, la remise et la grange datant de la deuxième moitié du XVIIIe siècle, les écuries datant de la première moitié du XIXe siècle, les pavillons accolés au corps de logis dans la deuxième moitié du XIXe siècle. L'édifice est composé d'un étage carré et un étage de comble, le gros-oeuvre est réalisé en tufeau, moellon, pierre de taille et appareil mixte, élévations à travées, surmontées de toit à longs pans, pignon découvert, toit à longs pans brisés, en croupe,  toit en pavillon, toit conique et appentis, couverts d'ardoise.","architecture":"A  cinq kilomètres  au sud-Est à Coudray-Marcouard le château de la SEIGNEURIE du BOIS,  est  manoir des XVe et XVIe siècles, située dans le bourg ancien et pittoresque du Coudray Macouard, vaut la visite. Chantier de restauration, commentaire sur l'histoire du village et du site, le logis seigneurial, le pigeonnier, les douves. Expositions,  la table au temps de la Renaissance, les fuies (pigeonniers) du Saumurois et d'ailleurs. Une nouvelle tranche de travaux porte sur la réhabilitation de lancienne chapelle du XVIe siècle pour laquelle seuls trois murs subsistent. Les travaux vont principalement portés sur la pose dune nouvelle charpente en chêne et dune toiture en ardoises et de lamorce dun mur de façade en tuffeau.","habitants":"Seigneurs locaux\r\n        \"","divers":"La seigneurie du bois à Mousseau","gps":"","images":["../../jctruffet.com/image/image_49/49_Mousseau_1.jpg","../../jctruffet.com/image/image_49/49_Mousseau_2.jpg","../../jctruffet.com/image/image_49/49_Mousseau_3.jpg","../../jctruffet.com/image/image_49/49_Mousseau_4.jpg","../../jctruffet.com/image/image_49/49_Mousseau_5.jpg","../../jctruffet.com/image/image_49/49_Mousseau_6.jpg"]},"Consult_chateau_formulaireb2ea":{"id":"Consult_chateau_formulaireb2ea","dept":"49","canton":"Beaufort en Vallée","commune":"Noyant la Plaine","nom":"Noyant_Plaine","type":"Château","periode":"XIV-XV-XVI-XVII","histoire":"Trois châteaux à Noyant la plaine celui de Bré-Robert, de Plessis-Lyonnais,  de Plessis au Maire de Hunon et à trois Km au sud ouest Bois-Noblet  à Louerre. A Meigné le Vicomte  Le manoir de Boisset du XVIe siècle, M.H. lassé par arrêté du 16 juillet 1968. Du Grand-Massé, des XVIIIe et XIXe siècles ;  du Plessis-Lionnet, (ou du Plessis-Lyonnais), des XVe, XVIe, XVIIe et XIXe siècles ;  de la Touche, des XVIIe et XVIIIe siècles ; pas d'article historique pour ces derniers.                                                                                    BRE-ROBERT, Porte fortifiée flanquée de deux tourelles datant du XIVe siècle ; vestiges au sud et à l'est d'une enceinte flanquée de tourelles rondes. Deux bâtiments de plan presque carré à l'ouest et au nord ont été détruits à la fin du XIXe siècle ; la porte fortifiée a été reprise au XVe ou XVIe siècle ; et aménagée en habitation au XVIIIe siècle ; aile nord de dépendances datant du XVIIIe siècle; divers ajouts et reprises du XIXe siècle                                                   PLESSIS-LYONNAIS, à l'Est de Noyans, corps de logis construit au XVe siècle; chapelle accolée dans l'axe, dans la première moitié du XVIe siècle; petites tours d'angles édifiées dans la première moitié du XVIIe siècle; aile ouest et colombier de la deuxième moitié du XVIIe siècle, pavillons ouest et sud, et sacristie de la deuxième moitié du XIXe siècle. L'édifice se compose d'un étage carré et un étage de comble, gros oeuvre en calcaire,  moellon, enduit, élévations à travées surmontées de toit à longs pans; croupe; toit conique; toit polygonal et toit en pavillon, couverts d'ardoise.","architecture":"BOIS NOBLET à Louerre est une demeure construite au XVIe siècle. Le manoir est entouré d'un parc de 17 hectares du Bois Noblet est bordé par une forêt domaniale. Doté de grandes chambres dont 2 avec des cheminées monumentales et dun salon convivial, vous pourrez profiter de la douceur angevine.                                                                 HUNON, ailes nord et sud datant du XVIIe siècle,  corps principal avec pavillons d'angle reconstruit dans le deuxième quart du XIXe siècle à la place d'un bâtiment qui aurait daté du XVIe siècle,  dépendances édifiées ou remaniées dans la deuxième moitié du XIXe siècle. L'édifice se compose d'un étage carré et d'un étage de comble, le gros-oeuvre est réalisé en tufeau ; grès ; silex ; moellon ; appareil mixte et enduit, élévations à travées surmontées de toit à longs pans ; croupe et toit en pavillon, couverts d'ardoise.                                                                                                     PLESSIS au MAIRE    Corps principal à l'ouest. Chapelle et pavillon sud-est datant du quatrième quart du XVIIe siècle. Chapelle fondée en 1686. Les lucarnes de la façade ouest du corps principal, les parties de l'aile nord et la ferme dans le parc datant de la première moitié du XVIIIe siècle. Reprise parties aile nord, façade sud (orangerie), escalier, entrées du grand corps de logis, corps de logis ajouté dans l'axe au nord au début du XIXe siècle. Aile sud reprise au XIXe siècle.","habitants":"Sreigneurs locaux\r\n        \r\n        \"","divers":"Trois châteaux à Noyant 47° 30' 25\" nord, 0° 04' 34\" est               Bois Noblet  grav 1-2: 47° 17' 50\" Nord, 0° 19' 23\" Ouest        Plessis grav 3-4","gps":"","images":["../../jctruffet.com/image/image_49/49_Noyant_Plaine_1.jpg","../../jctruffet.com/image/image_49/49_Noyant_Plaine_2.jpg","../../jctruffet.com/image/image_49/49_Noyant_Plaine_3.jpg","../../jctruffet.com/image/image_49/49_Noyant_Plaine_4.jpg","../../jctruffet.com/image/image_49/49_Noyant_Plaine_5.jpg"]},"Consult_chateau_formulaire22b5":{"id":"Consult_chateau_formulaire22b5","dept":"49","canton":"Cholet","commune":"Nueil sur Layon-Passavant","nom":"Nueil_Layon","type":"Château","periode":"XV-XVII","histoire":"NUEIL, château du Preuil, du XVe siècle, détruit, repris au XIXe siècle, de Ste Catherine et de Nôtre-Dame.                                                                            PREUIL mentionné au XVe siècle détruit. Le gros-oeuvre du corps de logis actuel date du XVIIe siècle. Entièrement repris dans la deuxième moitié du XIXe siècle avec adjonction de tours aux extrémités et sur la travée centrale du logis. Orangerie et communs deuxième moitié du XIXe siècle. Corps de bâtiment nord-ouest mentionné en 1838. Colombier mentionné en 1878, détruit. L'édifice se compose d'un étage carré et un étage de comble, le gros-oeuvre : schiste,  moellon, tufeau, pierre de taille, appareil mixte, enduit et bossage.                                                                                                         ROCHE-BOUSSEAU  mentionné au XVe siècle, logis principal détruit entre 1793 et 1795, daté par travaux historiques ; chapelle Sainte-Catherine fondée le 18 novembre 1433, détruite, daté par travaux historiques; vestiges d'une partie fortifiée au nord du XVe siècle et remaniée au XVIe siècle; logis de ferme et parties agricoles du XVIIe siècle, remaniements de détail au XXe siècle.                                  \r\nSte-CATHERINE dit aussi la Roche-Bousseau, au lieu-dit la Grande Roche, mentionné au XVe siècle, logis principal détruit au XVIIIe siècle, et remanié au XVIe siècle, logis de ferme et parties agricoles du XVIIe siècle, remaniements de détail au XXe siècle.","architecture":"ST_ETIENNE  le château bâti dans le premier quart du XIe siècle par Foulques Nerra ; ruiné. Reconstruit à partir de 1210 (datation par travaux historiques). Il en subsiste l'enceinte flanquée de tours, la cave, l'ancien donjon vers le sud-est avec salle dite du trésor, la tour sud-ouest. Tour d'escalier ajoutée devant la tour sud-ouest au XVe siècle. Logis actuel du XVIIe ou XVIIIe siècle, et repris au XIXe siècle. Portail et pont datent du XVIe siècle, le colombier du XIIIe siècle, repris au XVIe siècle.","habitants":"siegneurs locaux\r\n        \r\n        \r\n        \r\n        \"","divers":"A Nueil sur Layon, le château de Nueil grav-1 de roche Rousseau grav 2 de Ste Catherine grav-3 et de Ste Etienne grav 4     Montguerret  grav-6       Rochereau grav-5","gps":"","images":["../../jctruffet.com/image/image_49/49_Nueil_Layon_1.jpg","../../jctruffet.com/image/image_49/49_Nueil_Layon_2.jpg","../../jctruffet.com/image/image_49/49_Nueil_Layon_3.jpg","../../jctruffet.com/image/image_49/49_Nueil_Layon_4.jpg","../../jctruffet.com/image/image_49/49_Nueil_Layon_5.jpg","../../jctruffet.com/image/image_49/49_Nueil_Layon_6.jpg"]},"Consult_chateau_formulairee438":{"id":"Consult_chateau_formulairee438","dept":"49","canton":"Cholet","commune":"Passavant sur Layon","nom":"Nueil_Passavant","type":"Château","periode":"XVIII","histoire":"PASSAVANT, bâti dans le premier quart du XIe siècle par Foulques Nerra ; et le prieuré Notre-Dame au XIIe siècle, au XVe siècle réunion en une seule paroisse Saint-Etienne après destruction  en 1626 ; la structure actuelle du village a peu évolué et reflète cette bipolarisation, une zone semi concentrique s'étend à l'entrée du château,  face au Poitou, sur le haut Layon, le château de Passavant est l'une des places-fortes créées par le comte d'Anjou, Foulques Nerra dans le premier quart du XIe siècle. Ruinée, elle est reconstruite après 1210 avec une enceinte cantonnée de tours, à quoi s'ajoute au XVe siècle, un puissant logis à haute tour d'escalier. Le château est ravagé par les huguenots en 1574. Le château de Passavant fut remanié aux XIIIe, XIVe et XVe siècles puis brûlé à la Révolution. Au début du XIXe siècle, à la fin de la Révolution Française, le château de Passavant fut rachetée par la famille Falloux, de la branche du comte de Falloux en union avec la famille Jarret de Montchenin.","architecture":"PASSAVANT, au XVIIIe siècle un nouveau logis est construit, puis vers 1930 l'ensemble est réaménagé en maison viticole avec celliers. Depuis lors, il a été peu réoccupé (reconstruction d'un nouveau logis au XVIIIe siècle, puis vers 1930, réaménagement en maison viticole avec celliers) mais sauvé de la ruine complète. Il reste du château féodal dimportants vestiges comme la muraille flanquée de tours rondes et il est possible de voir, dans le portail dentrée du XVIe siècle, les traces dun ancien pont-levis. Lhabitation actuelle, qui se trouve dans la cour, date du XVIIe siècle.","habitants":"Foulques Nerra et famille Falloux,\r\n        \"","divers":"Passavant 47° 06' 20,41\" Nord, 0° 23' 24\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Nueil_Passavant_1.jpg","../../jctruffet.com/image/image_49/49_Nueil_Passavant_2.jpg","../../jctruffet.com/image/image_49/49_Nueil_Passavant_3.jpg","../../jctruffet.com/image/image_49/49_Nueil_Passavant_4.jpg","../../jctruffet.com/image/image_49/49_Nueil_Passavant_5.jpg"]},"Consult_chateau_formulaired600":{"id":"Consult_chateau_formulaired600","dept":"49","canton":"Cholet","commune":"Nueil sur Layon","nom":"Nueil_sur_Layon_I","type":"Château","periode":"XIV-XV-XVII","histoire":"Trois châteaux dans cet article le St-Michel, de Grise et Roche-Rousseau.                                                                                ST-MICHEL, ouvrage d'entrée et chapelle dédiée à St Michel et à Saint Sébastien du XVe siècle ; restaurés dans le quatrième quart du XIXe siècle, le corps de bâtiment est reconstruit au XIXe siècle, selon les projets de reconstruction dressés par l'architecte Léon Rohard en 1876, attribution et date par source ; aile Est, mentionnée en 1838, détruite,  vitraux de la chapelle de 1887, porte la date, de Lobin de Tours. L'édifice se compose d'un étage carré et d'un étage de comble, gros-oeuvre,  schiste, moellon, tufeau, pierre de taille, brique et bossage, élévations ordonnancée surmontées de toit à longs pans brisés, croupe, toit en pavillon,  pignon couvert et toit conique, couverts d'ardoise.                                                       GRISE,  mentionné au XIVe siècle,  tour d'escalier de la première moitié du XVIe siècle  reconstruit portant la date de 1888, les ailes nord et Est reconstruites en 1659, portent la date, et restaurées dans le quatrième quart du XIXe siècle : En 1888  l'aile ouest détruite après 1838,  l'intérieur repris au XXe siècle et la toiture rehaussée. Le bâtiment se compose d'un étage carré, le gros oeuvre est réalisé en tufeau, pierre de taille, schiste, moellon, appareil mixte et enduit partiel, élévations ordonnancées surmontées de toit en pavillon, croupe, toit à longs pans et toit conique, couverts d'ardoise.","architecture":"NOTRE-DAME, du XVe siècle, remanié aux XVIIIe et XIXe siècles (dont bâtiment ouest reconstruit entre 1864 et 1866 par l'architecte Léon Rohard), tour carrée nord,  portail d'entrée, bâtiments Est, tours Est, tours d'enceinte nord XVIe siècle, aile ouest du XVIIe siècle détruite entre 1864 et 1866. Le retable de la chapelle Notre-Dame a été exécuté après 1652 date de fondation de la chapelle, il a été restauré peu après 1845, peinture polychrome et sans doute ajout de deux colonnes. Le retable est constitué d'un corps central accosté de deux colonnes formant avant-corps deux pilastres et de deux ailes en retrait réduites à un ressaut doté d'une volute et d'un buste. Une niche surmontée d'un entablement en plein cintre, d'où remontent deux chutes de feuillages et de fruits, couronne le corps central. Colombier du XVIIe siècle,  le bâtiment à l'ouest actuellement corps de logis reconstruit par Rohard entre 1864, attribution et date par source, et 1866, daté par travaux historiques ; sur l'emplacement de l'ancienne aile ouest du XVIIe siècle.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"St-Michel, de Grise grav 4-5-6   Lys haut layon grav 7-8 et Roche-Rousseau. Viallet grav 6 Boissinière grav-2-3-","gps":"","images":["../../jctruffet.com/image/image_49/49_Nueil_sur_Layon_I_1.jpg","../../jctruffet.com/image/image_49/49_Nueil_sur_Layon_I_2.jpg","../../jctruffet.com/image/image_49/49_Nueil_sur_Layon_I_3.jpg","../../jctruffet.com/image/image_49/49_Nueil_sur_Layon_I_4.jpg","../../jctruffet.com/image/image_49/49_Nueil_sur_Layon_I_5.jpg","../../jctruffet.com/image/image_49/49_Nueil_sur_Layon_I_6.jpg","../../jctruffet.com/image/image_49/49_Nueil_sur_Layon_I_7.jpg"]},"Consult_chateau_formulaireca4c":{"id":"Consult_chateau_formulaireca4c","dept":"49","canton":"Angers","commune":"Saint-Lambert-la-Potherie","nom":"Parc_St_Lambert","type":"Château","periode":"XIX","histoire":"PARC-ST-LAMBERT, demeure datant du XIXe siècle, le château du Parc de Saint-Lambert est un endroit daccueil parfaitement digne d'un événement tel que la célébration de votre mariage. D'inspiration renaissance, le château, édifié en 1872 par le comte Tessié de la Motte, capitaine de cavalerie, chevalier de la légion dhonneur,  vient de reprendre vie dans son bel écrin de verdure. « Les qualités décoratives et architecturales ont été brillamment conservées et mises en valeur lors des travaux de rénovation », souligne Xavier Levavasseur, le dirigeant de ce prestigieux site d'accueil et d'hébergement   dont la partie commerciale est assurée par Célia Levasseur et Alexandre Fournier.   Pas d'information  proche de Beaucous.","architecture":"PARC st-LAMBERT, dinspiration Renaissance, fut édifié en 1872 par le Comte Tessié de la Motte, comme en témoignent le T et le M entrelacés sur le fronton du château. Le parc du domaine de plus de 20 hectares est réputé pour sa richesse et sa diversité et comprend plus de six bosquets dont plus de trente espèces darbres différentes aux essences exceptionnelles et répertoriées par lINRA (Institut National de la recherche agronomique) Architecture et décoration conservées avec excellence, ce lieu ne pourra que mettre en valeur ce jour tant attendu. La rénovation du château et de ses dépendances na en aucun cas nuit à sa beauté, au contraire, elle na fait quaccentuer les boiseries sculptées et autres subtiles décors, l'édifice de plan rectangulaire sur soubassement à deux niveaux  et série de lucarnes  sur un toit brisés,l'avant corps d'entrée saillant de trois travées à trois étages toit à l'impérial   et escalier en fer à cheval et à l'opposé un avant corps mi-hors oeuvre arrondie toit en dôme avec clocheton entre deux pavillons saillants, toit à la Mansart.","habitants":"comte Tessié de la Motte\r\n        \"","divers":"Parc st Lambert : 47° 29' 04\" Nord, 0° 40' 34\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Parc_St_Lambert_1.jpg","../../jctruffet.com/image/image_49/49_Parc_St_Lambert_2.jpg","../../jctruffet.com/image/image_49/49_Parc_St_Lambert_3.jpg"]},"Consult_chateau_formulaire1666":{"id":"Consult_chateau_formulaire1666","dept":"49","canton":"Beaufort en Vallée","commune":"Genneteil","nom":"Parnay","type":"Château","periode":"XV-XIX","histoire":"Deux châteaux à Parnay; Parnay geneteil et Targé.             PARNAY-GENNETEIL, date du XIXe siècle. Il est construit entièrement en tuffeau. Il a été construit pour Mr Virmont, un officier russe demeurant en France après l'occupation de 1815. Ce château est du style de l'époque, avec un fort coté Renaissance. Le bâtiment est agrémenté d'un relais de poste dit de la Croix de Parnay qui fut très fréquenté jusqu'à la fin du XIXe siècle.                                                                           .","architecture":"PARNAY, la première forteresse de Parnay date du Xe au XIe siècle. Un baptistère du XIe siècle, dans la cour d'honneur, est la seule trace de cette première construction. A la fin du XVe siècle, la propriété et le château appartiennent à Jehan du Plessis, Grand Argentier du roi René 1er de Naples, Duc d'Anjou. Le puits dans la cour du château date de cette époque. L'illustration ci-dessous représente sans aucun doute le château tel qu'il devait être du XVIe siècle au XVIIIe siècle. En 1794, le château est attaqué et brûlé par les républicains. En 1820, construction du nouveau château de style Renaissance. Il est acheté le 10 septembre 1887 par Antoine Cristal à l'occasion de la succession de Mme veuve Becquet de Marconnay, vente effectuée par le tribunal de Saumur. Au décès d'Antoine Cristal, en 1931, madame Vigeant et sa fille Madeleine héritent de la propriété,  la vend en 1948, en viager. La rente viagère est achetée par M. Collé Lucien en décembre 1953. Mademoiselle Vigeant décédée en 1996, la propriété appartient jusqu'en 2006 à la famille Collé.","habitants":"Parnay; Famille de Mr Virmont et Jehan du Plessis\r\n        \"","divers":"Parnay Geneteil et Targé.    Parnay : 47° 35' 37\" Nord, 0° 03' 00\" Est","gps":"","images":["../../jctruffet.com/image/image_49/49_Parnay_1.jpg","../../jctruffet.com/image/image_49/49_Parnay_2.jpg"]},"Consult_chateau_formulaire545f":{"id":"Consult_chateau_formulaire545f","dept":"49","canton":"Segré","commune":"St-Martin du bois","nom":"Percher","type":"Château","periode":"XV-XVI","histoire":"PERCHER, ancien fief et seigneurie relevant de Bouillé-Théval, le château est semble-t-il reconstruit entre 1495 et 1515 par Pierre et Guillaume de Tintiniac, puis à la famille de Bautru seigneur de Serrant et acquit en 1732 par le marquis de Scépaux resta dans cette famille, dont  madame  Colas de Francs propriétaire actuelle, descendante directe.","architecture":"PERCHER, le château comprend deux corps de bâtiments en équerre ouvrant vers le sud-est sur une cour. L'aile Est, plus disparate, dispose de deux bâtiments de volumes différents, l'un avec un étage de comble en surcroît, l'autre avec un étage carré, reliés par une haute tour d'escalier, à l'angle sud ouest, elle est flanquée d'une tour coiffée d'un toit conique. Passant d'un plan octogonal en partie basse à un plan carré en partie haute, par l'intermédiaire de pendentifs triangulaires, la tour d'escalier comporte à l'ouest une tourelle en encorbellement offrant un accès au comble et à la chambre haute. L'aile nord, avec un étage carré et un étage de comble, dispose elle aussi, sur sa face ouest, d'un escalier hors-oeuvre couvert comme le premier par un haut toit en pavillon.  La porte d'entrée de l'aile Est surmontée d'armoiries de la famille Scépaux. De par le décor sculpté des lucarnes il semble que l'aile Est soit la plus ancienne, datable fin du XVe siècle ; l'ornement italianisant des baies de l'aile nord indiqueraient une campagne plus tardive durant le premier quart du XVIe siècle.  Des restaurations ont été entreprises, notamment sur l'aile Est, mais aussi sur la chapelle entre 1855 et 1860, les vitraux de celle-ci sont alors exécutés par le peintre-verrier Gérome Darmel. De nouveaux travaux de restauration, concernant surtout les lucarnes les plus fragiles, ont été réalisés en 1930 par Hardion et Bricard, architectes des M.H.","habitants":"Famille de Bautru marquis de Scépaux\r\n        \"","divers":"château Percher à St-Martin du bois","gps":"","images":["../../jctruffet.com/image/image_49/49_Percher_1.jpg","../../jctruffet.com/image/image_49/49_Percher_2.jpg","../../jctruffet.com/image/image_49/49_Percher_3.jpg"]},"Consult_chateau_formulaireb67b":{"id":"Consult_chateau_formulaireb67b","dept":"49","canton":"Angers","commune":"Saint-Barthélemy d","nom":"Pignerolle","type":"Château","periode":"XVIII","histoire":"PIGNEROLLE, en 1680 la famille Avril, François Avril de Pignerolles prend la direction de l'académie d'équitation d'Angers. Ange Jacques Gabriel édifié en 1776 le petit Trianon à Versailles. En 1780 pour un riche Angevin, Martial Avril de Pignerolles fit construire la délicieuse folie identique  au petit Trianon de Versailles. Arrêté par les autorités révolutionnaires Martial Avril de Pignerolles  il décède du typhus en 1793. Le 22 octobre 1939, le château est réquisitionné au profit du président polonais général Sikorski en exil. Le 8 Juillet 1940, c'est l'amiral Dönitz qui occupe Pignerolle et y installe son centre de communication. Le domaine est vendu à l'armée en 1964 par les derniers propriétaires. Une nouvelle étape dans l'histoire du domaine depuis 1992, restauré, le château accueille le Musée Européen de la Communication.","architecture":"PIGNEROLLE,  château est conçu dès lorigine comme un pavillon de plaisance ;  de plan  massé offre avec une élévation du rez-de-chaussées, étage attique et toit plat dissimulé par une balustrade, de sept travées, lui confère une forme oblongue, l'avant corps à quatre colonnes ioniques au centre de la façade d'arrivée, et les pilastres plats cannelés à chapiteaux ioniques, côté du jardin reproduction du Trianon, frontons triangulaires sommant les fenêtres latérales surcharge décorative. il est alors intégré à un jardin, rétabli en 1993 selon les plans initiaux. Les bâtiments annexes (orangerie et pavillons de lentrée) sont rajoutés au XIXe siècle. Avec son avant-corps en ordre colossal se détachant sur une façade sobre et équilibrée, typiquement néo-classique, se plaçant dans la ligne stylistique du Petit Trianon à Versailles.","habitants":"Famille de François Avril de Pignerolles\r\n        \"","divers":"à Saint-Barthelemy-d-Anjou, Pignerolle  47° 28' 12\" Nord et 0° 28' 26\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Pignerolle_1.jpg","../../jctruffet.com/image/image_49/49_Pignerolle_2.jpg","../../jctruffet.com/image/image_49/49_Pignerolle_3.jpg","../../jctruffet.com/image/image_49/49_Pignerolle_4.jpg","../../jctruffet.com/image/image_49/49_Pignerolle_5.jpg"]},"Consult_chateau_formulaire7718":{"id":"Consult_chateau_formulaire7718","dept":"49","canton":"Doué la Fontaine","commune":"Grézillé","nom":"Pimpean","type":"Château","periode":"XV-XVIII","histoire":"PIMPEAN, en 1435 Bertrand de Beauvau doit son ascension à Charles VII et au duc d'Anjou le bon roi René conseiller et chambellan du roi et sénéchal  d'Anjou fit construire le château après avoir épouser en quatrième noce la fille naturelle du roi René, Jeanne Blanche, dame de Mirebeau. après son décès en 1474  le château reste dans sa descendance par André de Beauvau qui sera décapité  à Poitiers en 1579, son fils également prénommé André épouse Claude Barjot, veuve de Philippe de Naillac, leur fils  épouse François du Plessis soeur du cardinal de Richelieu sans enfant, le domaine revient à René de Naillac, fils du premier mariage de Claude Barjot. la terre de Pimpean réunie à celle d'Alligny, est  érigée en marquisat au début  du XVIIIe siècle pour Robin de la Tremblaie. En 1754  acquisition par la famille de La Lande-Guyon un riche créole qui reconstruit l'aile ouest du château puis revend Pimpean à la famille Gendron, en 1867 division du domaine par plusieurs propriétaires et sa conversion en exploitation agricole et en 1993, un agent artistique parisien Maryse Tugendhat rachète le château avec son mari.","architecture":"PIMPEAN, implanté au sud du bourg de Grézillé, forme un ensemble architectural imposant, que l'on doit l'édification, au milieu du XVe siècle.  Sur l'emplacement d'une construction existante fait édifier le château de style médiévale en 1435,  vaste quadrilatère  cantonné de douves dont les courtines couronnées d'un chemin de ronde sur mâchicoulis, sont interrompues par quatre portails crénelées, au XVIe siècle élévation de l'aile Est et des communs, l'aile ouest est reconstruite intégralement qui présente au rez-de-chaussée en galerie à baies cintrée, et que flanquent deux pavillons d'angle, et à la fin du du XVIIIe siècle reconstruction du corps de logis  central. Les bâtiments restaurés du château de Pimpéan, abritent aujourd'hui les barriques du vignoble.","habitants":"Pimpean; famille de  Bertrand de Beauvau \r\n        \"","divers":"Château de Pimpean à grézillé                                               47° 19' 18\" nord, 0° 20' 31\" ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Pimpean_1.jpg","../../jctruffet.com/image/image_49/49_Pimpean_2.jpg","../../jctruffet.com/image/image_49/49_Pimpean_3.jpg","../../jctruffet.com/image/image_49/49_Pimpean_4.jpg","../../jctruffet.com/image/image_49/49_Pimpean_5.jpg","../../jctruffet.com/image/image_49/49_Pimpean_6.jpg"]},"Consult_chateau_formulaire5ebf":{"id":"Consult_chateau_formulaire5ebf","dept":"49","canton":"Chalonnes sur loire","commune":"Champtocé sur loire","nom":"Pin_49","type":"Château","periode":"XII-XIV-XVII","histoire":"PIN, château fort du XIIe siècle  érigé sur les vestiges d'un oppidum romain. Ancien fief et seigneurie relevant du Pruinas, ruiné en partie au XIVe siècle pendant les guerres bretonnes. Reconstruit par la famille Cuissard aux XIVe et XVe siècles, passe par alliance au XVIIe siècle à Jean de Ballodes époux de Jeanne Cuissard dont une fille du premier lit, Jeanne Lemasson apporte en dot le domaine à Gilles Cordon de la Faucherie, gentilhomme, les la Faucherie effectuent d'importantes modifications architecturales conserveront le Pin jusqu'à la Révolution. Au XIXe siècle il appartient à la famille de La Haye qui fait  remanier l'édifice dans un style néogothique. De 1850 à 1860, le domaine se transforme en parc agricole par la construction d'un ensemble cohérents de bâtiments : En 1921, la propriété est acquise par Gérard Christmas Gignoux homme d'affaires américain diplômé d'agriculture et d'horticulture son oeuvre se poursuit dans sa descendance, notamment par sa petite fille madame Jeanne de Celle, chargée aujourd'hui de la gestion du domaine.","architecture":"PIN, le donjon central abrite l'escalier, bien qu'en partie détruit, il fut reconstruit du XVe au XVIIe siècle sur les ruines restantes, dont fait partie le donjon carré qui abrite un très bel escalier du XIIe siècle. Le château est agrandi au XVIIIe siècle dans un esprit néo-gothique Il présente deux corps de bâtiments disposés en équerre, comporte au centre de sa façade d'une haute tour carrée, l'ancien donjon que flanque  deux échauguettes, l'une des  façades latérales s'encadre entre deux tours coiffées en poivrière, la façade postérieure cantonnée de deux pavillons comporte trois travées, sur les combles se détachent des lucarnes de part et d'autre d'un avant-corps terminé par un pignon sommé de pinacles à la base du toit court une fausse balustrade interrompue par la partie supérieure des fenêtres de l'étage, l'aile en retour possède également un avant corps à pignons.  Le corps principal a été rechemisé au milieu du XIXe siècle, tout en conservant certains éléments anciens, ainsi que l'orangerie du XVIIIe siècle formant une aile.  Les jardins du château du Pin se situent sur 5 ha, avec un parc de 60 ha. Les jardins sont dessinés sur 14 niveaux qui correspondent à 14 thèmes différents, avec des bassins et des points d'eau,  et ses jardins (XIXe). Son parc a été classé \"Jardin Remarquable\" par le Ministère de la Culture.","habitants":"Famille de La Haye \r\n        \"","divers":"à Champtocé sur Loire le château du Pin","gps":"","images":["../../jctruffet.com/image/image_49/49_Pin_49_1.jpg","../../jctruffet.com/image/image_49/49_Pin_49_2.jpg","../../jctruffet.com/image/image_49/49_Pin_49_3.jpg"]},"Consult_chateau_formulaire6746":{"id":"Consult_chateau_formulaire6746","dept":"49","canton":"Segré","commune":"Combrée","nom":"Plessis","type":"Château","periode":"XV-XVI-XVIII","histoire":"Deux château à Combrée celui de Combrée et de Plessis.               COMBREE, le village de Saint-Clément-des-Levées s'est constitué au carrefour du chemin appelé la Grand'Voie, venant de Longué, et de la Grande Levée d'Anjou. Pendant tout le Moyen Age, la petite agglomération, nommée la Perrelerie sur la Levée, constitua une paroisse dépendant de celle de Trèves, outre Loire. En 1505, une chapelle dédiée à Saint-Clément y fut érigée, donnant son nom au village. Aux XVIIIe et XIXe siècle la population des mariniers étant en constante augmentation,                                                                       PLESSIS, attesté en 1406, ce fief rendait hommage à la baronnie de Candé. Le château actuel est le résultat d'ajouts successifs. Du manoir primitif du XVIe siècle, il ne subsiste qu'une partie du gros-oeuvre, une tour abritant l'escalier, les douves. Une partie du château fût brûlée durant la Révolution et la partie sud fut reconstruite et deux tours furent ajoutées au XIXe siècle sur le côté ouest et des communs furent construits.  Les douves entourent presque totalement le château ; lors de la construction des communs (deuxième moitié du XIXe siècle) une partie du fossé ouest a été asséchée et le bâtiment qui fait face au logis a été démoli.","architecture":"COMBREE, l'ancien manoir du Petit Combres, bâti  par un cadet de la famille du nom possédant le château de Combres situé à Trèves, sur la rive gauche de la Loire, fut détruit au XVIIIe siècle lors de la construction de l'actuel château. Dans l'oeuvre de ce dernier, on distingue deux campagnes au moins ; le corps central du logis fut édifié au cours de la première moitié du XVIIIe siècle, tandis que les pavillons latéraux et le corps de passage furent ajoutés au cours de la deuxième moitié du même siècle. Une aile accolée au pavillon sud formant un  retour d'équerre vers l'ouest, fut détruite au cours du XIXe siècle, les communs sont de la seconde moitié du XVIIIe siècle.                                                                                                   PLESSIS, le bâtiment se compose de trois ailes organisées autour d'une petite cour; sur le côté ouest, la cour est fermée par un bâtiment de dépendance en rez-de-chaussée et par une tour rectangulaire abritant à l'étage la chapelle et sur le côté Est par une aile à un étage sur cave couverte par un toit brisé à croupes. L'aile orientée au sud reconstruite après 1789, présente une façade à un étage avec cinq travées; la travée centrale est encadrée par deux pilastres à bossages est surmontée par un fronton triangulaire orné des armes d'Avoisnes. Ce corps principal abrite au rez-de-chaussée trois pièces, sur la façade nord, une tour rectangulaire recouverte par un toit en pavillon et éclairée par deux fenêtres à encadrements chanfreinés, abrite un vaste escalier en bois, tournant à trois volées.","habitants":"Famille de Combrée. Plessis baronnie de Candé\r\n        \r\n        \"","divers":"Château du Plessis à Combrée grav 1 , de Combrée grav 2 et Hommeaux grav 3","gps":"","images":["../../jctruffet.com/image/image_49/49_Plessis_combr%c3%a9e_1.jpg","../../jctruffet.com/image/image_49/49_Plessis_combr%c3%a9e_2.jpg","../../jctruffet.com/image/image_49/49_Plessis_combr%c3%a9e_3.jpg"]},"Consult_chateau_formulaire6277":{"id":"Consult_chateau_formulaire6277","dept":"49","canton":"Tiercé","commune":"La Jaille-Yvon","nom":"Plessis_Anjou","type":"Château","periode":"XVI-XVIII","histoire":"PLESSIS-ANJOU,  mentionné dès 1503 le seigneur Jean du Tertre, le transmet  aux familles de Bailleul au XVIIe siècle, de La Grandière au XVIIIe siècle, puis au XIXe siècle à Achille Doublard du Vigneau, et à la famille de Messay après 1888. L'essentiel de la demeure date du XVIIIe siècle. La tour conserve des peintures murales de Michel Liébaut, beau-frère de Mme Badel, alors propriétaire du château. Il subsiste cependant dans le logis des parties plus anciennes, gros-oeuvre de l'aile ouest du logis, et dans l'angle une cave peut-être du XVIe siècle. Dans le prolongement de l'aile ouest se trouvent une orangerie et une écurie du XVIIIe siècle, reprise au XIXe siècle. A l'arrière existe une ferme du XIXe siècle, comprenant un logement, Un corps de logement, ancien mais très repris, est conservé à l'ouest du logement de ferme, et un autre a remplacé une grange au début du siècle.","architecture":"PLESSIS-ANJOU, le logis forme un plan en L , avec dans l'angle une tour à deux étages carrés couverte en pavillon, où se trouve un escalier tournant en charpente.  L'angle nord-est du logis constitue une sorte de haute tour flanquée d'une tourelle batie au XIXe siècle. La tourelle en pierre de taille de tuffeau n'abrite aucun escalier, mais cache un passage entre les deux ailes du logis, avec rattrapage de niveau. L'aile principale au sud comporte un étage carré et un étage de comble, ainsi que des façades ordonnancées. L'aile ouest est surmontée d'un campanile. Elle est prolongée par un corps de bâtiment composé au rez-de-chaussée d'un bureau, d'une orangerie et d'une écurie, avec à côté des latrines isolées.  A l'est de la cour une aile comprend notamment un four, des ouvertures cintrées en briques et un passage vers un abreuvoir creusé à l'est de la ferme. Le potager est isolé visuellement du logis par un rideau d'arbres. Il est enfermé dans une enceinte aux angles arrondis (une partie est détruite) , subdivisé par deux murs, et traversé par une allée centrale. Une pompe adossée à l'un des murs se trouve abritée sous un fronton triangulaire en tuffeau. Le château, les dépendances et le parc, constitué de bois et de vastes pelouses, sont cernés d'une longue enceinte en pierres.","habitants":"Famille de Messay \r\n        \r\n        \"","divers":"à La Jaille-Yvon le château de Plessis anjou","gps":"","images":["../../jctruffet.com/image/image_49/49_Plessis_Anjou_1.jpg","../../jctruffet.com/image/image_49/49_Plessis_Anjou_2.jpg","../../jctruffet.com/image/image_49/49_Plessis_Anjou_3.jpg","../../jctruffet.com/image/image_49/49_Plessis_Anjou_4.jpg","../../jctruffet.com/image/image_49/49_Plessis_Anjou_5.jpg","../../jctruffet.com/image/image_49/49_Plessis_Anjou_6.jpg","../../jctruffet.com/image/image_49/49_Plessis_Anjou_7.jpg","../../jctruffet.com/image/image_49/49_Plessis_Anjou_8.jpg"]},"Consult_chateau_formulaire8b84":{"id":"Consult_chateau_formulaire8b84","dept":"49","canton":"Angers","commune":"Ecuillé","nom":"Plessis_Bourré","type":"Forteresse","periode":"XV","histoire":"PLESSIS-BOURRE, proche conseiller de Louis XI, puis de Charles VIII Jean Bourré (1424-1506 ) fut le bâtisseur du Pléssis-Bourré avec son épouse Marguerite de Feschal. Le 26 novembre 1462 Jean Bourré achète le domaine de Plessis,  qui appartenait  à la famille de Charles de Sainte-Maure. Construit dun seul trait entre 1468 et 1473 par un des \"hommes nouveaux\" de cette fin du Moyen-Age, le financier Jean Bourré, trésorier de Charles VIII, constructeur dans les mêmes années, en 1465-1469, du château de Langeais. Jean bourré décède en 1506 en 1751 le château est acquit par la famille de Ruillé, en 1794 Jean Ruillé et condamné et exécuté, achat par Henri Vaisse aïeul des propriétaires actuels, la  famille du comte de Sauveboeuf. De nombreux films ont été tourné dans ce château.                                                                                    Au sud au bourg le château de ROUSSELIERE; il date du XVIIIe siècle.  Il a été construit en 1787 il possède une tourelle d'angle et des douves avec leurs murs de soutènement, qui bordent la cour d'honneur de l'ancien château. Les façades et toitures sont du XVIIIe siècle.","architecture":"PLESSIS-BOURRE, le bâtiment de style renaissance, ne subit pas de transformation majeure par la suite. Lédifice flaquais de quatre tours rondes massives aux angles, dont une seule couronnée de mâchicoulis fait figure de donjon  de 44 mètres de haut, reflète lambivalence de larchitecture à cette période: pour répondre à linsécurité endémique, recours aux formes médiévales bien adaptées à la défense (porte fortifiée, douves larges qui l'entourent et  quatre pont levis  toujours en fonctionnement et tours circulaires, mais déjà, exigences de confort et desthétique préludant à la Renaissance, qui sexprime  dans lagencement de la cour et dans la conception du corps de logis, avec la façade dun gothique raffiné et à lordonnancement déjà régulier. Dans la salle des gardes est conservé lun des premiers plafonds à caissons peints du XVe siècle. Pour franchir le fossé un  pont de 43 mètres de long il conduit à un double pont-levis et à la plate-forme originale.","habitants":"Famille de Jean Bourré \r\n        \r\n        \r\n        \"","divers":"A Ecuillé, Plessis-Bourré 47° 36' 03\" Nord et 0° 32' 40\" Ouest        Rousselière 47° 35\" 25' Nord et 0° 31' 40\" Ouest grav 9","gps":"","images":["../../jctruffet.com/image/image_49/49_Plessis_Bourr%c3%a9_1.jpg","../../jctruffet.com/image/image_49/49_Plessis_Bourr%c3%a9_2.jpg","../../jctruffet.com/image/image_49/49_Plessis_Bourr%c3%a9_3.jpg","../../jctruffet.com/image/image_49/49_Plessis_Bourr%c3%a9_4.jpg","../../jctruffet.com/image/image_49/49_Plessis_Bourr%c3%a9_5.jpg","../../jctruffet.com/image/image_49/49_Plessis_Bourr%c3%a9_6.jpg","../../jctruffet.com/image/image_49/49_Plessis_Bourr%c3%a9_7.jpg","../../jctruffet.com/image/image_49/49_Plessis_Bourr%c3%a9_8.jpg","../../jctruffet.com/image/image_49/49_Plessis_Bourr%c3%a9_9.jpg"]},"Consult_chateau_formulaire3c7d":{"id":"Consult_chateau_formulaire3c7d","dept":"49","canton":"Beaupréau","commune":"St-Remy en Mauges","nom":"Plessis_Clairembault","type":"Château","periode":"XIX","histoire":"PLESSIS CLAIREMBAULT, le château aurait été construit au milieu du XIXe siècle pour la famille de Villoutreys de Brignac. A voir dans cette commune un spectacle en été qui plonge le public dans le Périgord de laprès Révolution française afin de lui faire découvrir ou redécouvrir lhistoire de \"Jacquou le Croquant\". Un spectacle nocturne unique au cur des Mauges présenté et animé par les habitants (400 bénévoles) de Saint Rémy en Mauges et des environs.","architecture":"PLESSIS CLAIREMBAULT, a cinq kilomètres au sud MONTREVAULT, le château avec son donjon a été construit à l'origine, vers l'an Mille, par Foulques Nerra, comte d'Anjou. Ses murs épais conservent la fraîcheur en été et la douceur en hiver. Le roi Charles IX et Henri de Navarre -futur Henri IV- furent les hôtes de ces lieux. D'une de ses fenêtres, dominant la côte de Bohardy, le poète Jean de la Fontaine y aurait trouvé l'inspiration pour écrire \"le coche et la mouche\".","habitants":"famille de Villoutreys de Brignac\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"St-Remy en Mauges château de Plessis -Clairembaul grav 1-2-3 et de Montrevault grav 4-5-6","gps":"","images":["../../jctruffet.com/image/image_49/49_Plessis_Clairembault_1.jpg","../../jctruffet.com/image/image_49/49_Plessis_Clairembault_2.jpg","../../jctruffet.com/image/image_49/49_Plessis_Clairembault_3.jpg","../../jctruffet.com/image/image_49/49_Plessis_Clairembault_4.jpg","../../jctruffet.com/image/image_49/49_Plessis_Clairembault_5.jpg","../../jctruffet.com/image/image_49/49_Plessis_Clairembault_6.jpg"]},"Consult_chateau_formulaire93ae":{"id":"Consult_chateau_formulaire93ae","dept":"49","canton":"Angers","commune":"Pléssis-Macé","nom":"Pléssis_Macé","type":"Forteresse","periode":"XII-XV","histoire":"PLESSIS-MACE, Au XIe siècle les du Plessis construise le premier donjon,  au XIIe siècle édification  d'un donjon en pierre.  Vers 1300 la petite fille de Macé II Isabelle du Plessis épouse Hardouin de Fougeré hérite de Macé, en 1427 Catherine de la Haye Joulain épouse Géoffroy de Beaumont, un siècle à l'abandon, vers 1460 Louis de Beaumont, chambellan de Louis XI remet en état les installations militaires (douves, boulevard dartillerie, tours et enceinte), mais en même temps, il répare le logis préexistant, dont il fait une résidence fastueuse qui accueille plusieurs rois aux XVIe et XVIIe siècles. Quatre rois séjournèrent au château : Louis XI, Charles VIII, François Ier, et Henri IV, vers la fin du XVe siècle  Thomas de Beaumont fait construire l'aile en retour et la tour d'escalier. C'est au château du Plessis-Macé que fut signé le traité de Vannes, en 1532, qui rattacha le duché de Bretagne au Royaume de France. Le château appartenait à la famille du Bellay, dont son représentant le plus connu fut Joaquim du Bellay.  En 1578 Guillaume Bautru châtelain de Serrant  achète le Plessis pour sa fille la marquise de Vaubrun la fille de cette dernière la duchesse d'Estrées se défait du Plessis en 1749 rarement habité jusqu'en 1865  date à laquelle Sophie de Walsh de Serrant entreprend la restauration. Vendu en 1888 aux Gouraud  d'Ablancourt, en 1908 à Charles Langlois gendre du chimiste Marcelin-Berthelot qui en fait don en 1967 au conseil général de Maine-et-Loire.","architecture":"PLESSIS-MACE, château à motte quasiment détruit pendant la Guerre de Cent ans auquel sa position géographique redonne un rôle de premier plan dans le cadre de la lutte entre la couronne de France et la Bretagne. Le château est réhabilité sur ses anciennes bases autour de 1450.  Sur le rebord d'un haut  plateau, c'est un ancien château fort construit du XIIIe au XVIe siècle de styles médiéval et Renaissance,  cantonnée de six tours  est inclus dans une vaste enceinte possède encore des murailles et ses douves, a l'intérieur des remparts  du côté ouest  s'élève un donjon isolé entouré de fossés. Le donjon est pourvu sur trois de ses faces d'un chemin de ronde et flanqué de deux tourelles qui reposent  sur des culs de lampe remplacé par des contreforts. Très simple, avec ses fenêtres à meneaux et ses lucarnes, sa façade se singularise par la galerie de tuffeau qui relie les deux corps de logis ; les motifs décoratifs en sont gothiques tardifs, et la forme originale, annonce la Renaissance. Tout le charme du logis de plaisance s'exprime dans le splendide balcon ciselé et l'admirable tribune en bois de la chapelle. Ce château gothique flamboyant devient l'un des plus beaux de la province.   Chaque été, a lieu le festival d'Anjou, qui se déroule dans la cour d'honneur du château du Plessis-Macé. Son propriétaire actuel est le Conseil général de Maine-et-Loire. Ouvert au public.","habitants":"Famille de Louis de Beaumont                                            Famille du Bellay,\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Plessis-Macé   47° 32' 15\" Nord, 0° 00' 42\" Est","gps":"","images":["../../jctruffet.com/image/image_49/49_Plessis_Mac%c3%a9_1.jpg","../../jctruffet.com/image/image_49/49_Plessis_Mac%c3%a9_2.jpg","../../jctruffet.com/image/image_49/49_Plessis_Mac%c3%a9_3.jpg","../../jctruffet.com/image/image_49/49_Plessis_Mac%c3%a9_4.jpg","../../jctruffet.com/image/image_49/49_Plessis_Mac%c3%a9_5.jpg","../../jctruffet.com/image/image_49/49_Plessis_Mac%c3%a9_6.jpg","../../jctruffet.com/image/image_49/49_Plessis_Mac%c3%a9_7.jpg","../../jctruffet.com/image/image_49/49_Plessis_Mac%c3%a9_8.jpg","../../jctruffet.com/image/image_49/49_Plessis_Mac%c3%a9_9.jpg"]},"Consult_chateau_formulaire71ef":{"id":"Consult_chateau_formulaire71ef","dept":"49","canton":"les Ponts de Cé","commune":"Les Ponts de Cé","nom":"Pont_de_Cé","type":"Château","periode":"XIII-XV-XIX","histoire":"A Pont de Cé le château du musée de la coiffe  et de Belle-Poule.                                                                                                         BELLE-POULE, demeure nichée au coeur dun parc à langlaise du XIXe siècle. Sur la rive droite de la Loire, ce domaine fait parti des fermes modèles du Maine et Loire. Le nom de Belle-Poule est issu de la forêt Bella Pola qui en 1160 formait une île entre lAuthion et la Loire. Lîle est aujourdhui rattachée au continent par une levée qui la couvre en la bordant vers la Loire depuis la Daguenière jusquau Ponts de Cé. Le parc du domaine de Belle-Poule fut créé vers 1853 au moment de la construction du château et de la ferme modèle. La présence abondante de leau a permis le développement de nombreux arbres aujourdhui remarquables tels que des hêtres pourpres et un beau spécimen de séquoia de 45m de haut et de 18m de circonférence.","architecture":"PONT de CE, la première forteresse des Ponts de Cé située sur un point stratégique déjà utilisé par les romains, fut bâtie vers 850 sous Charles II (Charles le Chauve) petit-fils de Charlemagne, pour résister à linvasion des Normands qui remontaient la Loire pour piller lintérieur du pays. À ce château en bois, succède un édifice en pierre. Détruit et reconstruit en 1206 par Guillaume des Roches, le château fut remanié par le roi René, fils de Louis II dAnjou. Il devient en 1440 sa résidence secondaire préférée. Il ne subsiste du château aujourdhui que le donjon. Celui-ci fut lenjeu dune bataille qui opposa Marie de Médicis à son fils Louis XIII en 1620, dénommée par les Angevins \"La Drôlerie des Ponts de Cé\". La paix entre la mère et le fils négociée par Richelieu fut signée dans le château de Brissac. Primitivement entouré des eaux du fleuve qui en assurait la défense, le château, bel édifice construit en pierres de tuffeau, possédait un chemin de ronde en encorbellement. Vendu comme bien national, le château est acquis par des particuliers. Victor Hugo envisage même de lacheter en 1830. En 1891, la commune des Pont-de-Cé fait lacquisition du bâtiment.","habitants":"Seigneurs locaux\r\n        \"","divers":"A Pont de Cé le château du musée de la coiffe  grav 4-5-6-7 et de Belle-Poule grav-3 .Ambroise   grav-1-2                                    47° 23' 44\" nord, 0° 24' 48\" ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Pont_de_C%c3%a9_1.jpg","../../jctruffet.com/image/image_49/49_Pont_de_C%c3%a9_2.jpg","../../jctruffet.com/image/image_49/49_Pont_de_C%c3%a9_3.jpg","../../jctruffet.com/image/image_49/49_Pont_de_C%c3%a9_4.jpg","../../jctruffet.com/image/image_49/49_Pont_de_C%c3%a9_5.jpg","../../jctruffet.com/image/image_49/49_Pont_de_C%c3%a9_6.jpg","../../jctruffet.com/image/image_49/49_Pont_de_C%c3%a9_7.jpg"]},"Consult_chateau_formulaire705f":{"id":"Consult_chateau_formulaire705f","dept":"49","canton":"Segré","commune":"Pouancé","nom":"Pouancé","type":"Vestiges","periode":"XII-XIII-XV","histoire":"Deux château à Pouancé celui de Pouancé et de Tressé (voir article)  Vengeau (voir article)                                                                             POUANCE, la première mention du château remonte à la période de 1049  à 1060 dans la pancarte de Carbay ; le comte d'Anjou y entretenait des hommes et un \"vicarius\". Des fragments de sarcophages datables du haut Moyen-Age  prouvent l'existence de peuplements antérieurs à l'édification du château fort dans cette zone. Il est vraisemblablement que \"Gautier Haï, seigneur de Pouancé-Martigné autour de 1100 ait assis son pouvoir châtelain sur les lambeaux d'une circonscription antérieure qui se nommait \"l'honneur de Lourzais\" (dont le centre géographique était un peu plus à l'est sur l'actuelle commune de Grugé-l'Hôpital). En 1094, Gautier Haï est seigneur de plein droit ; le château est alors le siège d'une grande seigneurie. Il ne semble pas que le château ait été précédé comme c'est souvent le cas par une motte. La tour Saint-aubin, la tour pointue et les restes de la tour du moulin sont datables de la fin du XIIe ou du début XIIIe siècle. Entre 1371 et 1379, Pierre II de Valois fait construire la Grosse Tour et fait poser des mâchicoulis au château. À la mort de Gautier, la seigneurie de Pouancé d'obédience angevine est rattachée à celle de La Guerche bretonne. En 1794 mort guillotiné du dernier seigneur, le château est abandonné, racheté en 1978  legs de monsieur Bessière à la commune.","architecture":"POUANCE, protégé par une enceinte comprenant onze tours et percée de trois accès, le château fort, construit en moellons de schiste, se compose d'une basse et d'une haute cour, séparées par une douve sèche. L'accès à la haute-cour était gardé par un châtelet d'entrée avec une passerelle (fin XIIe-début XIIIe siècle). Deux poternes percées dans le mur d'enceinte, une au nord (passage cavalier) et une au sud (passage charretier) débouchaient dans les douves sèches. On ignore le système de communication entre celles-ci et la haute-cour. Le logis seigneurial, dégagé lors des fouilles, est un vaste bâtiment rectangulaire d'environ 24 mètres sur 8 mètres, à un étage. Les traces d'ancrage des rampants du toit sont visibles sur la courtine. Sous le corps de logis, une salle souterraine entièrement aveugle, voûtée en berceau, est habituellement qualifiée de glacière : son sol est taillé dans le schiste et une rigole faisant le tour de la pièce permet de récupérer les eaux d'infiltration. Agrandie sur son côté nord au XVIIe siècle, cette tour-porche a perdu son aspect défensif ; les deux étages et l'étage de comble ont été alors transformés en logement. Un reste de tour est conservé chez un particulier à l'angle sud-est de la cour. La tour-porche semble avoir été construite au XVe siècle et l'extension au XVIIe siècle. Au XVe siècle les éléments défensifs ont été adaptés à l'introduction de l'artillerie.","habitants":"Pouancé; Famille de Pierre II de Valois\r\n        \"","divers":"Pouancé; 47° 44' 29\" Nord et 1° 10' 30\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Pouanc%c3%a9_1.jpg","../../jctruffet.com/image/image_49/49_Pouanc%c3%a9_2.jpg","../../jctruffet.com/image/image_49/49_Pouanc%c3%a9_3.jpg","../../jctruffet.com/image/image_49/49_Pouanc%c3%a9_4.jpg","../../jctruffet.com/image/image_49/49_Pouanc%c3%a9_5.jpg","../../jctruffet.com/image/image_49/49_Pouanc%c3%a9_6.jpg","../../jctruffet.com/image/image_49/49_Pouanc%c3%a9_7.jpg","../../jctruffet.com/image/image_49/49_Pouanc%c3%a9_8.jpg"]},"Consult_chateau_formulaire0e58":{"id":"Consult_chateau_formulaire0e58","dept":"49","canton":"Segré","commune":"Chazé sur Argos","nom":"Raguin","type":"Château","periode":"XV-XVI","histoire":"RAGUIN, au XIVe siècle relevait de Précort dont le premier seigneur est Pierre Hatton avec son fils Olivier de 1450 à 1482 ils construisirent Raguin,  lequel passera par héritage à diverses familles avant d'échoir à Barbe d'Aunières, celle-ci épouse en 1585  Pierre du Bellay  capitaine  d'une compagnie de gardes apporte le domaine en dot. Le fils de Pierre  Guy  époux de Marie de Pluvinel obtient  en 1619, de son suzerain l'autorisation d'enclore sa maison seigneuriale et d'élever un portail avec pont-levis. Héritier d'une belle fortune acquiert la seigneurie de Précort dont dépendait Raguin ainsi que le château du Plessis Macé. Jusqu'alors possédé par son cousin Charles du Bellay  en 1648  son fils Antoine épouse Madeleine de Beauvau.  En 1667 à la mort  de son père Guy, Antoine  cède Raguin à Michel Gohin de Montreuil, après une saisi le domaine échoit en 1692 à Thomas neveu sieur d'Urbé, l'ensemble des biens passa par héritage aux Crespin ensuite en 1728 à Louis-Georges Erasme de Contades, futur maréchal de France, font appel à l'architecte Henri Mellet pour agrandir le château d'un corps de galerie et d'une tour reliant  le pavillon nord. Au XIXe siècle passa aux de Plouër et au XXe siècle au comte de Jumilhac font bâtir  le pavillon ouest, aujourd'hui  l'édifice est entretenu par le docteur Henri Quinque.","architecture":"RAGUIN, ce dernier fut construit au cours de la deuxième moitié du XVe siècle, avant 1482 et était encore un logis de modestes dimensions. A la fin du XVIe siècle ou avant 1607, le corps de logis primitif fut augmenté, vers le nord-est, d'un grand pavillon et les élévations de l'ancien logis furent en partie reprises et mises au goût du jour. Le logis et les communs occupent respectivement les côtés nord et Est de la cour. La distribution verticale dans ce premier état devait être assurée par un escalier à vis hors-oeuvre, peut-être situé sur la face antérieure sud et le logis présentait tous les traits ordinaires des logis manoriaux angevins et du grand Ouest.  Le pavillon nord-est est achevé en 1607, en doublant la surface habitable du logis et en lui conférant une certaine monumentalité, est probablement à l'origine de la qualification de château appliquée à l'édifice. L'escalier monumental, en tufeau et schiste, est couvert de voûtes en berceaux en plein-cintre rampants, à caissons. La tour d'escalier et la galerie élevées vers 1880 sur la face postérieure nord du logis. Le pavillon ouest, bâti vers 1909, est du même architecte. Les communs bordant le côté Est de la cour paraissent dater de la fin du XVIe siècle, comme le pavillon nord. La ferme conserve un ancien logis, peut-être du premier quart du XVIIe siècle, un logis et des remises agricoles du XIXe siècle. Les étables joignant les communs semblent avoir été construites au XVIIIe siècle.","habitants":"Famille de Pierre Hatton et  Pierre du Bellay \r\n        \"","divers":"Raguin: 47° 37' 22\" Nord, 0° 53' 43\" Ouest","gps":"","images":["../../jctruffet.com/image/image_49/49_Raguin_1.jpg","../../jctruffet.com/image/image_49/49_Raguin_2.jpg","../../jctruffet.com/image/image_49/49_Raguin_3.jpg","../../jctruffet.com/image/image_49/49_Raguin_4.jpg","../../jctruffet.com/image/image_49/49_Raguin_5.jpg","../../jctruffet.com/image/image_49/49_Raguin_6.jpg"]},"Consult_chateau_formulairef927":{"id":"Consult_chateau_formulairef927","dept":"49","canton":"Tiercé","commune":"Gené","nom":"Ribou_Gené","type":"Château","periode":"XVII","histoire":"RIBOU, la plus ancienne mention est celle de Cesbron de Villeprouvée qui est sieur de Ribou en 1453. Au XVIIe siècle, il s'agit d'un fief et seigneurie relevant de Gené avec manoir \"clos et circuit de murailles et fossés par haute et basse-cour, retranchement et pont-levis, chesnaies et jardins\". En 1745, la terre est achetée par P. Martin Bossoreille, juge au Présidial d'Angers. Elle est vendue nationalement à René Bossoreille le 1er thermidor an IV puis à nouveau acquise par Eugène Bossoreille en 1804. Les caves du château constituent la partie la plus ancienne, fondations de l'ancien manoir. Le corps central date du XVIIe siècle et a été augmenté de pavillons latéraux, la façade postérieure a été remaniée dans un style néo-gothique (tourelles d'angles). La chapelle a été construite en 1844, le bâtiment qui abrite le logement du gardien, l'écurie et le garage, a été bâti dans la seconde moitié du XIXe siècle, à la même époque que la métairie de Ribou.","architecture":"RIBOU, la façade principale donne à l'est, et est composée d'un corps central en léger ressaut avec trois travées couvertes d'un toit en pavillon. Cette travée se distingue par son parement en tuffeau qui contraste avec l'enduit couvrant le reste du bâtiment. De part et d'autre de ce corps central, une travée avec une lucarne à fronton triangulaire s'intercale entre l'avant-corps et les ailes en retour d'une largeur de deux travées, coiffées de croupes brisées. La façade postérieure est moins régulière: sur le bâtiment central se greffe une tour d'escalier carrée coiffée d'un toit en pavillon. Un espace en rez de chaussée abrite un vestibule surmonté d'une terrasse exérieure. Enfin, l'aile en retour, coiffée d'une croupe brisée, est agrémentée de tourelles d'angles avec des toits coniques. Un pavillon polygonal à toit brisé se greffe au bâtiment prinicpal côté nord. Au sud du château se trouve la chapelle dont la porte est ornée d'une accolade surmontée d'une croix en tuffeau  est reliée au château par une arcade qui permet le passage vers le jardin ouest. Cet arc est orné des armes de Bossoreille.  Au nord ouest, un bâtiment abrite un logement, un garage et une écurie  : la façade au sud est composée d'un vaste pignon central encadré par deux ailes en rez-de-chaussée ornées de lucarnes à baies géminées. Les encadrements de baies sont en brique et tuffeau.","habitants":"Famille de P. Martin Bossoreille\r\n        \r\n        \"","divers":"Château de  Ribou à Gené","gps":"","images":["../../jctruffet.com/image/image_49/49_Ribou_Gen%c3%a9_1.jpg"]},"Consult_chateau_formulaire606c":{"id":"Consult_chateau_formulaire606c","dept":"49","canton":"Segré","commune":"Loiré","nom":"Rivière_Orvault","type":"Manoir","periode":"XIX","histoire":"RIVIERE-D'ORVAULT,  constituait un fief et seigneurie relevant de la Roche d'Iré, mentionné en 1409. Il y existait une chapelle dédiée à la Trinité. L'ancien manoir est mis à bas vers 1860 par Anatole Turpin de Crissé qui avait demandé à l'architecte angevin René Hodé de lui construire un château. Les travaux commencent un peu avant 1862, date de la mort du commanditaire, les travaux ne s'achevèrent que vers 1867, l'édifice ne fut imposable qu'en 1869. En même temps que le logis, d'autres bâtiments étaient construits : le logement du jardinier à l'ouest, la ferme au sud est, à l'emplacement de la métairie du domaine et le moulin à eau. Benjamin Brullé, le nouveau propriétaire, fait agrandir les communs et construire la ferme de la Porterie en 1894.","architecture":"RIVIERE D'ORVAULT  Le logis, bâtiment rectangulaire, cantonné de quatre tourelles, est en moellons de schiste enduit, excepté les tourelles et les travées d'ouvertures qui sont en tufeau de taille. Le parc actuellement très dégradé, présente plusieurs massifs d'arbres. On accède au rez-de-chaussée surélevé par un degré extérieur. Le style néo-gothique de l'édifice, typique de l'oeuvre de René Hodé, se caractérise par la présence des tourelles, d'un décor d'accolades, faux mâchicoulis, pinacles ornant les élévations. La ferme et le moulin à eau, reconstruits à la même époque que le logis du château, sont également en moellons de schiste enduit, les encadrements des ouvertures, à arcs segmentaires ou en plein-cintre ainsi que les chaînages, sont en briques mécaniques. La ferme comprend le logis du fermier, une étable à chevaux, une bergerie, un cellier, une charretterie et une grande étable à vaches précédée d'une \"panserie\", et surmontée d'un comble à surcroît à usage de fenil. Le moulin à eau qui, outre le bâtiment du moulin lui même, comprend un logis et des parties agricoles, offre les mêmes caractéristiques architecturales que la ferme. Les communs, la maison du jardinier, avec ses baies à arcs segmentaires et en plein cintre se rattache à la campagne précédente. En revanche, les trois autres bâtiments situés sur les côtés nord, Est et Sud de la cour des communs, construits en 1894, se singularisent par leurs toitures à demi-croupes et leurs baies géminées en briques.","habitants":"Famille d'Anatole Turpin de Crissé \r\n        \"","divers":"Château de Rivière-Orvault, à Loiré","gps":"","images":["../../jctruffet.com/image/image_49/49_Rivi%c3%a8re_Orvault_1.jpg","../../jctruffet.com/image/image_49/49_Rivi%c3%a8re_Orvault_2.jpg","../../jctruffet.com/image/image_49/49_Rivi%c3%a8re_Orvault_3.jpg"]},"Consult_chateau_formulairefd17":{"id":"Consult_chateau_formulairefd17","dept":"49","canton":"Segré","commune":"Noyant la Gravoyère","nom":"Roche_Noyant","type":"Château","periode":"XVIII-XIX","histoire":"La ROCHE, ancien fief relevant de la Roche d'Iré. Un manoir fortifié et endouvé existait jusqu'au XVIIIe siècle, propriété de la famille de Scépeaux. Vendu une première fois en 1767, il fut acquis en 1773 par Louis de Dieusy ou Dieusie. Il fit raser le manoir et entrepris la construction du château actuel en 1788. Passée entre les mains de Charles Clovis Brillet de Candé en 1802, la propriété fut réaménagée au cours de la seconde moitié du XIXe siècle. Le jardin régulier fut transformé en parc à l'anglaise, selon les plans de l'architecte paysagiste J. Chevalier, un jardin potager et un verger furent aménagés au nord-est dans la prolongation des nouveaux communs. Ils se sont substitués à l'ancienne basse-cour située à l'ouest du château : ils comprennent une importante écurie avec remises, logements pour les palefreniers et selleries; on construisit un fournil, une vacherie, un poulailler et une charretterie. La conciergerie sud pourrait dater des années 1870-1880, celle située au nord semble plutôt datée du début du XXe siècle. Le vestibule du château fut entrepris par l'architecte angevin Ernest Bricard Au XVIIIe siècle, Louis de Dieusie avait également créé dans sa propriété une fabrique de poterie et une briqueterie ; le baron de Candé conserva les installations artisanales où l'on fabriquait des briques de construction mais aussi des carreaux et des tuyaux de drainage.","architecture":"la ROCHE, l'ancien manoir présentait un plan en U avec un corps de logis, flanqué de deux pavillons coiffés par des tours, une basse-cour, une chapelle dédiée à Saint-Martin et une fuie. Le bâtiment actuel présente un rez-de-chaussée surélevé et un étage carré surmonté d'un demi étage carré. Au sud, le ressaut central à trois travées est couronné par un fronton triangulaire ; au nord, c'est un ressaut à pans coupés, couvert par une toiture à trois pans, qui marque l'axe central de l'élévation. Aux étages, les murs présentent un curieux remplissage de briques. Le bâtiment est construit sur un niveau de soubassement faisant socle ; au sud, le socle forme une terrasse ouvrant sur le parc ; des escaliers droits permettent d'accéder au rez-de-chaussée ou de descendre au sous-sol. Ce dernier comporte une belle cuisine voûtée d'arêtes en briques, une boulangerie, une buanderie, une cave et diverses resserres. A l'intérieur, chacun des étages comporte un long couloir desservant les nombreuses chambres du château.","habitants":"Famille de Louis de Dieusy \r\n        \"","divers":"Roches: 47° 42' 06\" Nord, 0° 57' 46\" Ouest                                  La Gravoyère grav 2","gps":"","images":["../../jctruffet.com/image/image_49/49_Roche_Noyant_1.jpg","../../jctruffet.com/image/image_49/49_Roche_Noyant_2.jpg"]},"Consult_chateau_formulaireb5b6":{"id":"Consult_chateau_formulaireb5b6","dept":"49","canton":"Chalonnes sur loire","commune":"Rochefort-sur-Loire","nom":"Rochefort_sur_Loire","type":"Château","periode":"XV","histoire":"Trois châteaux à Rochefort sur Loire celui de Dieusie, de la Peronnière, de la Guimonière, de Piegue chambres d'hôtes et de ste-Offrange.                                                               DIEUSIE, le village de Saintes-Gemmes s'est développé à partir du XIIe siècle autour de l'église priorale. Au XVIe siècle la reconstruction du logis du prieur souligne une certaine activité en matière de construction comme en témoignent plusieurs autres maisons probablement édifiées au XVIe siècle, puis reprises ou modifiées aux siècles suivant. La chapelle du cimetière et certains bâtiments, vestiges de l'ancien presbytère, témoignent des réalisations du XVIIe siècle. Des modifications furent apportées au cours du XIXe siècle : outre la reconstruction de l'église et du presbytère, signalons la construction d'un hospice vers 1810 auquel fut annexé en 1813 un pensionnat et une école de jeune filles, en 1875 deux nouvelles ailes furent ajoutées.                                                                        GUIMONIERE   En plein cur des prestigieux vignobles de la Loire, propriété seigneuriale bâtie au XVe siècle avec dans le parc un beau pigeonnier remontant au XVe siècle également. Le 24 juillet 1902, Jules Doucet achète le château de la Guimonière pour sa famille. Aujourd'hui, cinq générations plus tard, c'est Isabelle Doucet et ses enfants qui vous accueillent dans ce lieu chargé d'histoire. La propriété sétend sur une surface de 19 ha, ses vignes surplombent le Layon sur des terres composées de schistes et de grès, exposées plein sud.","architecture":"DIEUSIE, ancienne terre noble mentionnée dès le XVe siècle avec la présence d'un château fort qui aurait servit de refuge aux habitants des paroisses alentours pendant les guerres de religions. Le corps de logis principal avec ses deux ailes courtes sont des constructions du début du XIXe siècle ; l'aile en retour vers le nord, la plate forme et ses tourelles d'angle sont des éléments du XVIIIe siècle. Les parties agricoles du XVe siècle furent probablement reconstruites au XIXe siècle. On notera que dès la fin du XVIIIe siècle, le comte Louis de Dieusie, élu à l'assemblée provinciale d'Anjou, s'occupait de réformes agricoles et manufacturières.                                                                                Sainte OFFRANGE, on peut voir quelques vestiges du château fort du baron de Rochefort. C'est là que le village d'origine vit le jour.   Le lieu est occupé pendant les guerres de Religion (seconde moitié du XVIe siècle) par les trois frères Saint-Offange. Seigneurs de la ligue de l'union des catholiques, qui prône l'éradication du protestantisme du royaume de France, les frères s'opposent à Henri IV, qui pour obtenir la paix, doit acheter leur reddition en 1598 . Il fait détruire la place forte l'année suivante.   Saint-Offange est le nom moderne donné à la place depuis les frères Saint-Offange (XVIe siècle), Arthur, François et Amaury, est le nom de la  famille. Implantée en Anjou à la fin du XIVe siècle, elle possédait de nombreux domaines, les terres et château de la Beuvrière à Grez-Neuville, la Rivière d'Orveaux à Loiré, les terres d'Armaillé et de l'Anjouère à La Pouëze, l'Eperonnière à Saint-Aubin-de-Luigné, la Roirie près de Segré, la Douanerie à Vauchrétien, le Hurtault au Voide.","habitants":"Guimonière; Famille de Jules Doucet et la Famille de Ste-Offrange\r\n        \r\n        \"","divers":"à Rochefort sur Loire celui de Dieusie grav 5-6, de la Peronnière grav-4, de la Guimonière grav 1-2-3, de Piegue grav 9  et de ste-Offrange grav7-8","gps":"","images":["../../jctruffet.com/image/image_49/49_Rochefort_sur_Loire_1.jpg","../../jctruffet.com/image/image_49/49_Rochefort_sur_Loire_2.jpg","../../jctruffet.com/image/image_49/49_Rochefort_sur_Loire_3.jpg","../../jctruffet.com/image/image_49/49_Rochefort_sur_Loire_4.jpg","../../jctruffet.com/image/image_49/49_Rochefort_sur_Loire_5.jpg","../../jctruffet.com/image/image_49/49_Rochefort_sur_Loire_6.jpg","../../jctruffet.com/image/image_49/49_Rochefort_sur_Loire_7.jpg","../../jctruffet.com/image/image_49/49_Rochefort_sur_Loire_8.jpg","../../jctruffet.com/image/image_49/49_Rochefort_sur_Loire_9.jpg"]},"Consult_chateau_formulairef5b4":{"id":"Consult_chateau_formulairef5b4","dept":"49","canton":"Tiercé","commune":"Daumeray","nom":"Rochejacquelin_49","type":"Château","periode":"XVIII","histoire":"ROCHEJACQUELIN, la terre passe alors dès 1698 à François Bachelier garde du roi, mari d'Anne Bachelier (sa cousine germaine), par donation de Jeanne Le Maire sa belle mère qui meurt au château le 14 mai 1709, âgée de 77 ans. Anne Bachelier, veuve depuis 1705, y réside avec sa fille Anne mariée depuis au moins 1715 avec Gaspard-Claude Bommier, sieur de la Conillière. Louis, le fils aîné de François et Anne, y épouse le 2 juillet 1731 Marie Hennequin de Fleurville, puis décède le 1er septembre 1732 et le 27 juillet 1733 sa veuve vend le domaine à Charles Jacques Louis François Richer de Neuville, mari de Marie-Françoise de Montplacé. Ancien fief qui devient à partir de 1762 le manoir seigneurial de la paroisse de St-Germain-sous-Daumeray. Il appartenait dès le XIIIe à la famille Le Maire qui le possède encore à la fin du XVIe. Fut reconstruit en 1735 par un fermier général de l'Anjou Charles Richer de Neuville, un de ses héritiers avait épousé une fille d'une gouvernante des enfants de France qui y rapporta quantité de souvenirs de la famille royale. Depuis lors, il est passé  de main en main sans être vendu et appartient toujours au vicomte Jean de Blois .","architecture":"ROCHEJACQUELIN,   le nouvel acquéreur fit reconstruire le château, où son portrait se conserve encore avec plusieurs autres de la famille Lejeune. À sa mort il eut pour héritière, à défaut d'enfant, sa sur, marié depuis 1730 avec François Le Jeune de Créquy. Son fils, François Louis Marin, né à la Flèche le 31 mai 1731, capitaine de cavalerie au régiment de Languedoc, puis de cavalerie au Royal-Champagne en 1761, aide-maréchal de logis aux armés de Flandres et chevalier de Saint-Louis en 1763, marié à Adélaïde Louise de Fitte de Soucy, y meurt en 1817.  Sa fille unique, Adélaïde-Renée-Louise, avait épousée en 1799 Eugène de la Bonninière de Beaumont, vicomte de Beaumont, dont le fils, Eugène, habitait encore le château en 1878.   Sa sur Cécile née au château en 1817, épousa en 1839 Albert de Blois de La Calande dont la fille Marie Thérèse s'est mariée avec Alexis Bachelier, ce dernier descendant de Charles frère de Louis Bachelier. Georges-Aymar de Blois de La Calande, le fils d'Albert et Cécile fut sénateur du Maine-et-Loire en 1895 comme son fils Louis de Blois en 1922. L'édifice est inscrit aux M.H. selon larrêté du 21 février 1974. À savoir : façades et toitures, escalier intérieur avec sa rampe en fer forgé, antichambre, grand salon, salon chinois et boudoir avec leur décor.","habitants":"Famille de Gaspard-Claude Bommier et  Charles Jacques Louis François Richer de Neuville\r\n        \"","divers":"a  Daumeray le château de Rochejacquelin","gps":"","images":["../../jctruffet.com/image/image_49/49_Rochejacquelin_49_1.jpg"]},"Consult_chateau_formulairec42e-2":{"id":"Consult_chateau_formulairec42e-2","dept":"49","canton":"Tiercé","commune":"Les Lion d","nom":"Roches_aux_Fées","type":"Manoir","periode":"XVII","histoire":"ROCHE aux FEES, ce château était le siège d'un fief tenu en 1525 par Jean d'Estanson, Chambellan du roi, puis passe à la famille de la Grandière, et à partir du XVIIe siècle aux Bernard de Boismarais ; une descendante apporte le domaine à la famille Ayrault de Saint Hénis en 1790. L'actuel château a été construit de 1835 à 1837 dans un esprit classique, les communs repris en 1838 par l'architecte Michel Sébastien Dellêtre pour le propriétaire Pierre Adolphe Ayrault de Saint Hénis. Une chapelle de style néo-gothique avec une voûte bombée dite \"Plantagenêt\", est bâtie et consacrée en 1862. La métairie conserve sans doute des restes du logis ancien, notamment un bâtiment actuellement à usage d'étable à vaches et une large tour isolée du XVIe siècle. Les travaux du XIXe siècle sont dus à la famille Ayrault de Saint Hénis, c'est leur demeure principale jusqu'en 1837, avant la construction de leur château de La Roche aux Fées au Lion d'Angers.","architecture":"ROCHE aux FEES, le logis est un bâtiment double en profondeur à cinq travées ordonnancées, couvert d'une toiture à croupes au dessus d'un étage attique sou
