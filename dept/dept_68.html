/68_Kaysersberg_1.jpg","../../jctruffet.com/image/image_68/68_Kaysersberg_2.jpg","../../jctruffet.com/image/image_68/68_Kaysersberg_3.jpg","../../jctruffet.com/image/image_68/68_Kaysersberg_4.jpg"]},"Consult_chateau_formulaire6c4d":{"id":"Consult_chateau_formulaire6c4d","dept":"68","canton":"Sainte-Marie-aux-Mines","commune":"Kaysersberg","nom":"Kientzheim_Scvhwendi","type":"château","periode":"XV-XVI","histoire":"KINTZHEIM, en 1646, le tribunal dInnsbruck rend enfin son jugement dans le litige opposant les Leyen aux Schwendi et donne raison à ses derniers. Toutefois, la région nétant plus  l' ancien siège de la confrérie  d'Alsace  Il agrandit sa propriété par celle contiguë des chevaliers de Saint Jean de Colmar et y fit prolonger le mur d'enceinte crénelé qui subsiste dans la Grand 'rue sous contrôle impérial, les Leyen obtiennent du roi de France le droit de prendre possession du château. Mauvais gestionnaire, Nicolas de Leyen devient rapidement impopulaire à Kientzheim où il prélève de lourds impôts. Les Schwendi en profitent pour faire avancer leur cause auprès de Louis XIV et obtiennent en 1656 que laffaire soit jugée, cette fois par un tribunal français. Celui-ci confirme en 1657 le jugement du tribunal dInnsbruck et ordonne la restitution du château à Maximilien de Schwendi.\nEn 1681, les Schwendi sont dépossédés de leurs bien alsaciens par Louis XIV. La seigneurie et le château sont alors donnés à Joseph de Montclar.  À sa mort, le château passe à son gendre Jacinthe de Rébé, mais à son décès, les Leyen contestent une nouvelle fois la décision de 1656. Ils obtiennent en 1690 que le château leur soit remis, mais celui-ci est alors détaché de la seigneurie de Hohlandsberg, qui reste entre les mains des Rébé. Ceux-ci font par la suite plusieurs tentatives pour récupérer le château, mais sont à chaque fois déboutés. À sa mort en 1771, la dernière héritière des Leyen lègue le château à son filleul Conrad Reich de Pfalz, dont lépouse transforme le château en lieu de cure et construit un amphithéâtre dans le parc.  À la suite des événements de la Révolution française, les Reich de Pfalz émigrent en 1791. Confisqué sous le régime des biens nationaux, le château sert dabord de prison avant dêtre loué en mars 1793 à Pierre Albert, ancien avocat au Conseil souverain et désormais receveur des domaines.","architecture":"kIENTZHEIM, avant 1436. Il en subsisterait la cave voûtée de l'aile ouest et peut-être une partie du gros-oeuvre de celle-ci. Lorsque Lazare de Schwendi devint propriétaire de la seigneurie de Hohlandsberg, il fit partiellement reconstruire et agrandir le château entre 1563 et 1583. Il agrandit sa propriété par celle contiguë des chevaliers de Saint Jean de Colmar et y fit prolonger le mur d'enceinte crénelé qui subsiste dans la Grand'rue. La seigneurie est engagée à partir de 1363 aux Ribeaupierre, puis aux Lupfen en 1400, qui lagrandissent et le réaménagent. Le 23 décembre 1473, Jean de Lupfen, bailli de Thann, y héberge le duc de Bourgogne Charles le Téméraire, qui vient de se faire refuser lentrée dans Colmar.  Réparé à la fin de la guerre, le château sert de résidence à la famille de Jean de Castex jusquà la mort de ce dernier en 1972. Il est alors vendu à la confrérie viticole de Saint-Étienne, qui le réaménage y tenir ses chapitres, tandis que les dépendances accueillent un musée du vin, qui ouvre ses portes en 1980. Une nouvelle cave est construite entre 1987 et 1988 afin dabriter lnothèque de la confrérie15. Le château est inscrit en 1994 au titre des monuments historiques. De nouveau travaux de réaménagement des espaces intérieurs ont lieu en 2000. À la fin du XIIIe siècle, les Habsbourg regroupent leurs possessions dans une entité territoriale unique, la seigneurie de Hohlandsberg. La ville de Kientzheim devient le centre administratif de ce nouveau territoire géré par un bailli, qui est logé dans une maison située à lemplacement du château.","habitants":"famille de Joseph de Montclar  et t des espaces intérieurs ont lieu en 2000. À la fin du XIIIe siècle, les Habsbourg regroupent leurs possessions dans une entité territoriale unique, la seigneurie de Hohlandsberg. La ville de Kientzheim devient le centre administratif de ce nouveau territoire géré par un bailli, qui est logé dans une maison située à lemplacement du château.","habitants":"famille de Joseph de Montclar  et la famille de Jean de Castex \"","divers":"Kintzheim_du XIXe siècle  48°08'06\"N7°17'18\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Kintzheim_II_1.jpg","../../jctruffet.com/image/image_68/68_Kintzheim_II_2.jpg","../../jctruffet.com/image/image_68/68_Kintzheim_II_3.jpg","../../jctruffet.com/image/image_68/68_Kintzheim_II_4.jpg"]},"Consult_chateau_formulaire3dd0-2":{"id":"Consult_chateau_formulaire3dd0-2","dept":"68","canton":"Kaysersberg","commune":"Sainte_Marie aux Mines","nom":"Lacour","type":"Château","periode":"XII-XIX","histoire":"LACOUR ,  l'édifice fait l'objet d'une inscription au titre des monuments historiques depuis 1999 .  Demeure édifiée  en 1903 lorsque Jules Lacour vient, avec son frère Paul, reprendre la manufacture familiale de tissus de laine. Comme les autres demeures d'industriels de la même époque, c'est une construction dans le goût néo-baroque. La façade principale côté nord présente une loggia de trois arcades richement décorée. La façade sud sur jardin est agrémentée d'une sorte d'abside précédée d'un escalier à double volée convergente. A l'intérieur, le grand escalier en bois et les quatre pièces d'apparat du rez-de-chaussée ont été conservés (décor de stuc et marqueterie)  .SCHLOSBERG, ruine dominant le rempart urbain au nord-ouest, à l'extrémité d'une crête granitique.  Ruines du château classement par arrêté du 1er octobre 1841. Vestiges de l'enceinte reliant le château au système fortifié de la ville, tels qu'ils figurent sur le plan annexé à l'arrêté ,13 rue des Forgerons, : inscription par arrêté du 18 septembre 1995 Enceinte construite dans le premier tiers du XIIIe siècle. La propriété du château (anciennement propriété de l'Etat, ministère de la culture) a été transférée à la commune le 1er janvier 2008. L'enceinte triangulaire est dominée à la pointe dirigée vers l'attaque par un donjon circulaire.\nLes murs intérieurs étaient recouvert de crépi.","architecture":"LACOUR, cette grande villa a été élevée aux alentours de 1903, date de l'installation à Sainte-Marie-aux-Mines de Jules Lacour et de sa femme Fanny Marchal. Il venait diriger l'usine de tissage de laine, ayant appartenu à son père Jean-Baptiste, mort en 1902. Il était associé à son frère Paul, dont la villa était située juste à côté de la sienne (détruite en 1995, mais dont certains éléments ont été transportés à l'Europa Park en Allemagne. Ces deux villas étaient voisines de l'usine Lacour, située dans la ville haute. Vendue après le décès de Fanny Lacour survenu en 1948, la villa a été revendue en 1997 et divisée en appartements locatifs,  façades, toiture, vestibule, hall d'entrée, grand escalier avec cage, quatre pièces d'apparat avec décor, grille de clôture sur rue.","habitants":"Famille deJules Lacour \"","divers":"Lacour 48°14'34\"N, 7°10'20\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Lacour_1.jpg","../../jctruffet.com/image/image_68/68_Lacour_2.jpg"]},"Consult_chateau_formulaire572b":{"id":"Consult_chateau_formulaire572b","dept":"68","canton":"St_Louis","commune":"Leymen","nom":"Landskron","type":"Forteresse","periode":"XV-XVI","histoire":"LANSDSKRON, en 1462, le château est donné en bailliage aux seigneurs Reich de Reichenstein qui l'agrandissent et le transforment en forteresse en 1516 afin de l'adapter aux armes à feu. Le 24 octobre 1648, par les traités de Westphalie et de Münster qui mettent fin à la guerre de Trente Ans, les terres et seigneuries des Habsbourg, en Alsace, passent aux mains du roi de France. Après 1665 Vauban a été chargé de restructurer la forteresse, alors que les autres châteaux forts alsaciens étaient voués à l'abandon, l'arasement sinon à la destruction, à l'exception des châteaux de Lichtenberg et de Lützelstein. Vauban y effectue d'importants travaux de fortification qui y accueille, désormais, une garnison militaire. Concurrencé par les places fortes de Huningue et de Neuf-Brisach, il est également utilisé à partir des années 1690 en tant que prison d'État. Les quelques prisonniers qui y ont été enfermés, jusqu'à la Révolution française, étaient en majorité des prisonniers incarcérés par lettres de cachet et des prisonniers politiques. En décembre 1813, au début de la campagne de France et à la fin des guerres du Premier Empire, le château est détruit par les Autrichiens et les Bavarois à l'exception du donjon qui fut sauvé grâce à l'action du curé de Hagenthal-le-Bas qui réussit à convaincre le général de Wrede, chargé de démanteler la forteresse d'épargner le donjon en témoignage de sa victoire. Toutefois depuis cette date le château du Landskron est en ruine.","architecture":"LANDSKRON, construit avant 1297, le château du Landskron, situé à quelques mètres de la frontière avec la Suisse avait une position stratégique très importante, car il permettait le contrôle du Sundgau oriental, du coude du Rhin et de la ville de Bâle. Dès cette époque des rivalités au sujet des droits de propriété sur le château ont été rapportées. Tout comme les châteaux de Ferrette et de Morimont, le château du Landskron passe sous possession des Habsbourg et son histoire se confond avec l'Autriche antérieure. Une caractéristique particulière du château du Landskron est son donjon qui est une grande tour rectangulaire. À l'arrière de la porte d'entrée, on trouve une herse qui permet de condamner le passage et du fait de sa position bloquer le vantail de la porte Dans les années 1970, les propriétaires de lépoque y ont implanté une colonie de singes. Depuis 1984 le château du Landskron appartient à l'association binationale franco-suisse Pro-Landskron4,5 et a été partiellement rénové en 1996. Dautres travaux de restauration sont prévus.","habitants":"seigneuries des Habsbourg\"","divers":"Landskron-                                  47°29'18\"N, 7°29'26\"E1","gps":"","images":["../../jctruffet.com/image/image_68/68_Landskron_1.jpg","../../jctruffet.com/image/image_68/68_Landskron_2.jpg","../../jctruffet.com/image/image_68/68_Landskron_3.jpg","../../jctruffet.com/image/image_68/68_Landskron_4.jpg"]},"Consult_chateau_formulairefec6":{"id":"Consult_chateau_formulairefec6","dept":"68","canton":"Altkirch","commune":"Oberlang","nom":"Morimont","type":"vestiges","periode":"XIV","histoire":"MORIMONT, il est détruit par le tremblement de terre de Bâle en 1356 et ce sont les Morimont, vassaux des Ferrette qui le reconstruisent dont Pierre de Morimont en sera le plus illustre seigneur. Celui-ci le transformera en une forteresse adaptée aux armes à feu. Après la mort de Jean-Jacques de Morimont, entre 1533 et 1538, la famille connaissant des difficultés financières le vend aux comtes d'Ortenbourg-Salamanca en 1582.  Lors de la guerre de Trente Ans, il est occupé, en 1632, par les Suédois puis totalement détruit par les Français le 2 avril 1635. En 1641 le roi Louis XIV en fait don à la famille de Vignacourt qui le conserve jusqu'à la Révolution puis le vend au chancelier danois Frederik Ahlefeldt. .En 1792, les révolutionnaires le déclarent bien national. Il est acheté par Joseph Bruat, juge au tribunal civil de Altkirch.  En 1808, il est racheté par Aaron Meyer, de Genève. Le château devient le lieu de mémoire du Jura et de la province du Sundgau. En juillet 1826, le château de Morimont entre dans l'histoire du canton du Jura. Xavier Stockmar, Olivier Seuret, Auguste et Louis Quiquerez s'y retrouvèrent et ils firent le serment de « délivrer le Jura de l'oligarchie bernoise ». Cet acte fut le point de départ de la lutte qui mena en 1979 à la création de la République et Canton du Jura, 23e canton suisse.  Le château a servi de carrière de pierre jusqu'en 1864 date à laquelle Auguste Quiquerez dirige des travaux de restauration.","architecture":"MORIMONT, est construit sur un rocher qui domine le passage entre Oberlarg et Levoncourt. Quelques vestiges du château primitif, le Niedere Burg, subsiste à l'ouest du château reconstruit à partir du XIIIe siècle. La tour en U qui était le premier logis est sa partie la plus ancienne.\nAprès 1468 il est transformé et adopte un plan trapézoïdale entourée de sept tours et de la tour d'angle nommée Schlossturm. Du grand logis nord daté de 1552, long de 51 mètres sur 7,50 m, il reste la cave voûtée en berceau et une partie de ses deux tours d'escalier. Il est flanqué par deux grosses tours dont l'une est ornée des armoiries de Hans Jacob de Morimont et de son épouse Margarete de Furtenberg. Du logis sud, ne reste qu'une tourelle d'escalier polygonale.\nUne tour basse casematée et une barbacane situées au milieu de la courtine ouest défendent l'entrée du château. À l'arrière de la porte d'entrée, on trouve une herse qui permet de condamner le passage et du fait de sa position bloquer le vantail de la porte.En 1870, la famille Viellard, riches manufacturiers originaires de Morvillars dans le Territoire de Belfort achetèrent le domaine qui leur appartient toujours. La conservation du site est assurée par le Conseil général du Haut-Rhin qui y effectue des travaux de restauration actuellement en cour.","habitants":"Famille de Jean-Jacques de Morimont\"","divers":"Morimont                                 47°26'44\"N, 7°12'51\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Morimont_1.jpg","../../jctruffet.com/image/image_68/68_Morimont_2.jpg"]},"Consult_chateau_formulaire1ca4":{"id":"Consult_chateau_formulaire1ca4","dept":"68","canton":"Guebwiller","commune":"ABBAYE de Murbach dit de Meywihr","nom":"Murbach dit de meywihr","type":"Château","periode":"XVIII","histoire":"ABBAYE de Murbach dit de Meywihr, ce château a été construit pour l'industriel Baudry avant 1930 par les architectes Schulé et Doll. En 1956, la propriété est acquise par l'entreprise Pont-à-Mousson qui la transforme en colonie de vacances. Le château est constitué de plusieurs corps organisés autour d'une tour massive ronde. A l'ouest une aile de plan allongé, à l'est un corps de plan rectangulaire est assorti de plusieurs avants-corps. L'ensemble est d'inspiration néo-régionale (aile Est en pan de bois sur rez-de-chaussée en maçonnerie) et néo-renaissance (tour centrale, pierres à bossage).","architecture":"ABBAYE de Murbach dit de meywihr, le château, imbriqué dans un rocher spectaculaire, affiche des dimensions hors normes qui ne simposent quune fois au pied des murs denceinte. Guidé par des reconstitutions du monument qui superposent le passé au présent, le visiteur découvre une architecture militaire et une gestion de leau exemplaires, et simprègne de lhistoire de la saga familiale dans la galerie des ancêtres. Puis, il libère son imaginaire en progressant dans lextraordinaire dédale de salles et descaliers au cur même du grès et atteint le sommet, non sans avoir admiré les prouesses des bâtisseurs dantan. Soffre alors à lui les sublimes paysages des parcs des Vosges du Nord et du Palatinat.","habitants":"Famille de l'industriel Baudry\"","divers":"Murbach dit de Meywihr","gps":"","images":["../../jctruffet.com/image/image_68/68_Murbach_1.jpg","../../jctruffet.com/image/image_68/68_Murbach_2.jpg"]},"Consult_chateau_formulaire2d6b":{"id":"Consult_chateau_formulaire2d6b","dept":"68","canton":"Colmar","commune":"Neuf_Brisach","nom":"Neuf_Brisach","type":"fortification","periode":"XIX","histoire":"NEUF-BRISACH est une commune française située dans la circonscription administrative du Haut-Rhin et, depuis le 1er janvier 2021, dans le territoire de la Collectivité européenne d'Alsace, en région Grand Est. Cette commune se trouve dans la région historique et culturelle d'Alsace.  Le 7 juillet 2008, Neuf-Brisach, membre du réseau des sites majeurs de Vauban, est inscrite sur la liste du patrimoine mondial de l'UNESCO :En 1792, le général Favart d'Herbigny commandait la défense de Neuf-Brisach. En 1793, Jean-Antoine Louis fit libérer des officiers municipaux du village accusés d'avoir refusé d'obéir aux réquisitions militaires des deux pro-consuls d'Alsace, Saint-Just et Lebas.  Le 4 octobre 1793, le général de division François-Joseph Offenstein (1760-1837) fut nommé commandant de la place de Neuf-Brisach en remplacement du général Gromard, suspendu.  Entre 1815 et 1821, succédant au maréchal de camp, comte de Sabran (placé là en décembre 1814), le général de brigade Dermoncourt, acteur de l'échec du blocus de 1814-1815, commande la place,  La commune a été décorée le 11 novembre 1948 de la croix de guerre 1939-194525 avec étoile d'argent.  7 juillet 2008, inscription officielle au Patrimoine Mondial de l'UNESCO  La commune a accueilli du 16 mars 1962 au 19 juin 1992 le 9e régiment du Génie au casernement Abbatucci","architecture":": NEUF-BRISACH, ville créée ex nihilo en 1697 dans la plaine dAlsace, après la perte de Vieux-Brisach au-delà du Rhin, est la seule et magnifique illustration du « troisième système » de Vauban. Cest Louis XIV lui-même qui, parmi les trois projets soumis par Vauban, choisit le plan octogonal qui est parvenu jusquà nous   Neuf-Brisach se trouve dans la partie de la plaine alsacienne, proche de la frontière allemande et du Rhin (5 km). Schéma de la ville à l'intérieur de ses fortifications. Située dans la plaine d'Alsace, Neuf-Brisach est à 3,5 km du pont sur le Rhin, qui marque la frontière, et de la ville allemande de Vieux-Brisach située sur l'autre rive..","habitants":"famille de Cossé\"","divers":"Neuf_Brisach 48°01'08\"N, 7°31'45\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Neuf_Brisach_1.jpg","../../jctruffet.com/image/image_68/68_Neuf_Brisach_2.jpg","../../jctruffet.com/image/image_68/68_Neuf_Brisach_3.jpg","../../jctruffet.com/image/image_68/68_Neuf_Brisach_4.jpg","../../jctruffet.com/image/image_68/68_Neuf_Brisach_5.jpg"]},"Consult_chateau_formulaire31d5":{"id":"Consult_chateau_formulaire31d5","dept":"68","canton":"Guebwiller","commune":"Wuenheim","nom":"Ollwiller","type":"Château","periode":"XII","histoire":"OLLWILLER,  le domaine passe en 1260 à la famille Waldner de Freundstein. Celle-ci y fait édifier avec l'accord de son suzerain, l'évêque de Strasbourg, un château fortifié entouré de douves, à condition que l'évêque puisse y laisser une garnison en temps de guerre. Toutefois, le château d'Ollwiller est cité dès l'an de grâce 1180.  Au cours des siècles, le château subit les assauts du temps et des hommes, la guerre des Rustauds, la guerre de Trente Ans.Au XVIIIe siècle, le comte Christian Frédéric Dagobert de Waldner de Freundstein, lieutenant général du roi, disposant de moyens importants, fait raser l'antique forteresse puis construit un château avec des jardins à la française, où séjournent de nombreux personnages importants de lépoque dont Louis XV. Le chantier dure une dizaine d'années, le domaine retrouve une pleine activité au début des années trente, doté des derniers perfectionnement d'une agriculture moderne. En 1959, sous l'impulsion de Jacques Henry Gros, le domaine d'Ollwiller participe à la constitution de la cave du Vieil-Armand. L'exploitation est aujourd'hui celle d'un domaine viticole. Ollwiller et son château donnent leur nom à un grand cru d'Alsace, vin fin et distingué et à un pinot noir qui justifie sa renommée. Dans la nuit du 8 au 9 mai 2011, la partie la plus ancienne du château a été détruite par un incendie.","architecture":"OLLWILLER,  le chantier dure une dizaine d'années,  le domaine retrouve une pleine activité au début des années trente, doté des derniers perfectionnement d'une agriculture moderne. En 1959, sous l'impulsion de Jacques Henry Gros, le domaine d'Ollwiller participe à la constitution de la cave du Vieil-Armand. L'exploitation est aujourd'hui celle d'un domaine viticole. Ollwiller et son château donnent leur nom à un grand cru d'Alsace, vin fin et distingué et à un pinot noir qui justifie sa renommée.  En 2020, le château d'Ollwiller devient la propriété de la famille Mack, propriétaire dEuropa-Park. Le journal l'Alsace écrit à ce sujet « Le château d'Ollwiller à Wuenheim devient la propriété de la famille Mack dEuropa-Park. La cave viticole du Vieil Armand peut rêver d'un nouvel essor .","habitants":"Famille de Jacques Henry Gros,\"","divers":"Ollwiller à Hégenheim     47°33'45\"N, 7°31'43\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Ollwiller_1.jpg","../../jctruffet.com/image/image_68/68_Ollwiller_2.jpg"]},"Consult_chateau_formulaire9825":{"id":"Consult_chateau_formulaire9825","dept":"68","canton":"Guebwille","commune":"Orschwihr","nom":"Orschwihr","type":"château","periode":"XV","histoire":"ORSCHWIR, dès l'origine, le village fit surtout de la vigne car il bénéficie de collines bien exposées, surtout au Bollenberg et au Pfingtberg. Cette prospérité est attestée par les nombreuses maisons vigneronnes des XVIe et XVIIIe siècles, surtout dans le bas du village, le haut étant surtout occupé par les ouvriers et les petits vignerons. Les vignes du Lippelsberg et les impositions de la cour domaniale représentaient pour l'administration de Rouffach une intéressante source de revenus au Moyen Âge.\nOrschwihr reste un village essentiellement vigneron. Les deux versants du vallon produisent des vins de qualité. Les 214 ha de vignes occupent près de la moitié de la surface agricole totale du village. Le cadastre établi en 1828 recensait 396 propriétaires. En 1980 sur 363 ha de superficie agricole utilisées, 69 ha l'étaient pour des céréales, le reste correspondait au vignoble. Le nombre de viticulteurs est de 40 dont 34 qui commercialisent leur production.","architecture":"ORSCHWIR,les vestiges du château actuel ont succédé à un manoir du XVe siècle. Les Andlau l'eurent en fief jusqu'en 1524, puis le cédèrent à noble Jean de Rixheim. Vingt ans plus tard cette propriété fut rétrocédée aux nobles d'Erdmannsdorf, puis parvint par mariage aux Truchsess de Rheinfelden. Ce fut au cours du XVIe siècle que le simple manoir agricole fut transformé en château2.\nEn 1722 le château fut incendié, puis reconstruit. Après sa restauration, il passa entre les mains de Griset. Son dernier propriétaire fut François Willemann, conseiller à la Chambre des Comptes des évêques de Strasbourg, qui renonça en faveur de son seigneur à ses droits. Vendu pendant la Révolution comme bien national, le château et ses dépendances furent transformés en exploitation agricole. Victime d'un nouvel incendie en 1934, il ne subsiste plus de nos jours que l'exploitation viti-vinicole, qui ceinture les anciennes fortifications, les restes de deux tours et un pont en pierre enjambant le fossé.","habitants":"Jean de Rixheim\"","divers":"Orschwihr 47°56'07\"N, 7°14'04\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Orschwihr_1.jpg","../../jctruffet.com/image/image_68/68_Orschwihr_2.jpg"]},"Consult_chateau_formulaire95c9":{"id":"Consult_chateau_formulaire95c9","dept":"68","canton":"Wintzenheim","commune":"Wintzenheim","nom":"Pflixbourg","type":"forteresse","periode":"XIII","histoire":"PFLIXBOURG   serait luvre de Frédéric II,  du fait que la région se trouve jusquà cette date entre les mains des ennemis des Hohenstaufen. Ces derniers prennent le contrôle de la zone en semparant de lavouerie de Munster en 1212 et en permettant laffranchissement de Colmar. Lexistence du château nest cependant assurée quen 1220, lorsquil est mentionné pour la première fois dans un document faisant état dun don fait par Frédéric II à Frédéric de Schauenbourg, qui occupe lendroit en tant que bailli impérial. Il sagit alors dune forteresse ayant une vocation purement militaire et dont les missions sont la surveillance de lentrée de la vallée de Munster, la protection de Colmar et le contrôle du prieuré Saint-Gilles. Le Pflixbourg reste dans les décennies suivantes la résidence de fonction des baillis de Haute-Alsace, comme Conrad Werner de Hattstatt. Celui-ci y réside au moins occasionnellement, bien quil possède plusieurs autres châteaux à proximité, sa femme y meurt en 1276. La construction du Hohlandsbourg en 1279 fait toutefois perdre au Pflixbourg une grande partie de sa raison dêtre, celui-ci permettant une surveillance plus efficace des alentours de Colmar. Signe de cette désaffection, le château sert de gage à de nombreuses reprises à partir de 1298 et tout au long du XIVe siècle. Le château devient un fief des Haus dIssenheim. À lextinction de ceux-ci en 1430, Sigismond de Bohême en fait cadeau à son vice-chancelier Caspar Schlick, qui le vend lui-même à Maximin de Ribeaupierre en 1434.","architecture":"PFLIXBOURG , ce château a été construit sur une projection vers le nord-ouest de lEhrberg délimitée par le vallon du Wilsbachgraben au sud-ouest et le vallon Saint-Gilles à lest. Le site culmine à 458 m daltitude, 200 m au-dessus du plancher de la vallée. Sur le plan géologique, léminence, en forme de Sigismond de Bohême  pain de sucre aux pentes raides, fait partie de la plaque granitique de Turckheim. Toutefois, le sous-sol nest pas composé ici de granite porphyroïde comme le reste de lEhrberg, mais forme une étroite bande de granite à deux micas entre ce dernier et une zone de gneiss granitique. Le Pflixbourg est presque entièrement construit en granit. Celui-ci a été en très grande majorité prélevé sur place lors du nivellement du sommet et du creusement du fossé et des caves des bâtiments. Deux petites carrières ont été localisées à quelques dizaines de mètres au nord-ouest du château, mais elles nont  eu quun rôle dappoint dans la phase finale du chantier. Lextraction a été faite en banquette et à la pince de carrier, une variante de barre à mine, en exploitant les failles naturelles de la roche. Les encadrements de fenêtres ont été taillés dans un grès rose au grain très fin, mais dont la provenance est indéterminé. La tour maîtresse est construite au point le plus haut du site, directement au débouché de la porte et de manière totalement indépendante du mur denceinte, dont elle est distante de 6 m au point le plus rapproché. Elle mesure 23 m de haut pour 9,50 m de diamètre, lépaisseur de ses murs étant en moyenne de 3 m; ceci a pour effet de réduire le volume intérieur disponible à un diamètre de 3,25 m. Il sagit donc dun bergfried un type de donjon fréquent dans le Saint-Empire et uniquement destinée au combat, sans quartiers dhabitation.","habitants":"famille de Sigismond de Bohême\"","divers":"Pflixbourg\n48°04'02\"N7°15'16\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Pflixbourg_3.jpg"]},"Consult_chateau_formulaired795-2":{"id":"Consult_chateau_formulaired795-2","dept":"68","canton":"Sainte-Marie-aux-Mines","commune":"Bergheim","nom":"Reichenberg","type":"Château","periode":"XII-XIII","histoire":"REICHENBERG en 1525 éclate la guerre dite « des Rustauds.  Dans toute lAlsace, les paysans gagnés par la réforme se soulèvent contre les seigneurs et le clergé. La région de Bergheim est particulièrement secouée. Le Reichenberg, en labsence de ses propriétaires, est pillé et incendié. Il ne sera plus restauré et pendant quatre siècles, il tombe en ruines.\nLes rumeurs accusent les sorcières de sêtre emparé de ce lieu écarté pour se réunir, y célébrer leur sabbat et maléfices. Une véritable chasse aux sorcières a lieu et 25 procès de sorcellerie se déroulent entre 1583 et 1630 à Bergheim. Ces malheureuses femmes seront alors torturées et brûlées vives sur le Grassberg, colline en face du Reichenberg.  Aujourdhui, la mémoire de ces femmes est réhabilitée dans le musée des sorcières de Bergheim. On y explique et illustre létat desprit de cette sombre époque dépidémies, de guerre et où la grande peur régnait à tout propos dans les superstitions les plus honteuses. Le château originel aurait été fondé par Philippe de Gerbéviller, il est mentionné en 1236, édifié par le duc Philippe de Lorraine et donné en fief à la famille de Reichenberg. Cest dans les années 50 que Patrick Cognacq achète son premier hectare de vignes au pied du château, et restaure et réutilise celui-ci.  Bienvenue sur les terres du Château du Reichenberg à Bergheim en Alsace, propriété de la famille Cognacq depuis plus de 100 ans.  L'édifice a fait l'objet d'une inscription partielle sur l'inventaire supplémentaire des monuments historiques par arrêté du 1er décembre 1995.","architecture":"REICHENBERG,  la guerre de 30 ans débute en 1620 et se transforme en guerre de religion entre les Catholiques et les Protestants. En 1632, les troupes protestantes du roi de Suède arrivent en force et se jettent sur lAlsace. Elles traversent sans résistance et exterminent la population en avançant vers le sud. Personne navait encore imaginé leur cruauté ; lAlsace est à feu et à sang. Ils arrivent à Bergheim le 15 novembre 1632. Ils assassinent la population et peu en survivent. Le Reichenberg est pillé et ce quil en restait des guerres précédentes est incendié. Le cauchemar épouvantable que vécut lAlsace pendant cette guerre est difficile à imaginer et dans la mémoire populaire, le souvenir se perpétue encore aujourdhui. Abandonné pendant la guerre de 1939-1945, le château fut à nouveau restauré par des reconstructeurs romantiques et aménagé en manoir néo-médiéval à l'emplacement des derniers vestiges. Le chantier mené de 1890 à 1925, sur les bases d'un édifice du XIIIe siècle, s'est orienté vers une tentative de reconstruction d'un château médiéval pour en faire une résidence. Ce type d'intervention s'inscrivait dans l'intérêt naissant pour les ruines du Moyen Âge qui fut développé un peu plus tard dans la reconstruction du Haut-Koenigsbourg.  Le château disparu dans son aspect médiéval a donc conduit à élever, après 1890,  Le château se compose actuellement d'un bâtiment principal formé de trois corps de bâtiment accolés et de deux bâtiments d'entrée au nord, de part et d'autre de la porte donnant accès à la cour.","habitants":"Famille de Reichenberg, Famille Cognacq \"","divers":"Reichenberg                                48°12'52\"N, 7°20'15\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Reichenberg_1.jpg","../../jctruffet.com/image/image_68/68_Reichenberg_2.jpg"]},"Consult_chateau_formulaire8716-2":{"id":"Consult_chateau_formulaire8716-2","dept":"68","canton":"Montmorin","commune":"Biederthal","nom":"Reichenstein","type":"Château","periode":"XVIII","histoire":"RIECHENSTIEN, ancien château des Reich de Reichenstein partiellement reconstruit en 1733, selon la date gravée sur le linteau de la porte d'entrée, pour François Joseph Reich de Reichenstein et son épouse, Rinck de Baldenstein. Du bâtiment primitif de fin du Moyen-Age ou du XVIe siècle subsistent des vestiges, principalement dans l'aile méridionale; la petite maison accolée au corps de logis principal, ancienne dépendance, comporte des vestiges qui remontent au XVIe ou au XVIIe siècle ; la grange qui date du XVIIIe siècle a été remaniée récemment avec aménagement de logements.","architecture":"RIECHENSTIEN l'édifice actuel se compose du corps de bâtiment principal datant de 1733, parallèle à la route et au ruisseau, avec passage transversal et deux caves avec portes en plein-cintre, d'une aile sud, en retour vers l'arrière, voûtée en berceau, accessible par une porte en plein-cintre, d'une tour qui abrite un escalier du XVIIIe siècle, accolée à l'arrière du corps de bâtiment principal et d'une grande grange à deux portes charretières en plein-cintre et étables dont la partie vers la rue a été transformée en habitation.","habitants":"François Joseph Reich de Reichenstein\"","divers":"ReichensteiN 47°28'14\"N, 7°26'57\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Reichenstein_1.jpg","../../jctruffet.com/image/image_68/68_Reichenstein_2.jpg"]},"Consult_chateau_formulaireb2a9":{"id":"Consult_chateau_formulaireb2a9","dept":"68","canton":"Altkirch","commune":"Hirtzbach","nom":"Reinack","type":"Château","periode":"XVII-XVIII","histoire":"REINACK,  au XVe siècle se situait, au même emplacement, un château fort de plaine entouré d'eau, fief autrichien détenu par les Hack de Schweighouse. Après plusieurs changements de propriétaires, il passa au XVIe siècle, par mariage, aux Reinach. Il fut probablement remanié au XVIIe siècle et reconstruit (ou transformé) au début du XVIIIe siècle, pour François Joseph de Reinach Hirtzbach et Anne Marie de Sickingen. Un contrat fut passé le 3 mars 1724 entre le baron de Reinach et les maîtres maçons de Délémont, Jean-Baptiste Mathée et Charles Feune concernant cette campagne de travaux correspondant au corps de logis à un étage, avec ailes en retour à 2 étages. Les armoiries des maîtres de l'ouvrage ont été placées plus tard dans le fronton (copiées sur une plaque de cheminée du début du XVIIIe siècle. Le 2e étage, entre les deux ailes, fut ajouté vers 1780 pour Antoine de Reinach Hirtzbach.","architecture":"REINACK, corps de logis avec deux courtes ailes en retour en maçonnerie ; pierre apparente pour l'avant-corps de la terrasse ; fenêtres à crossettes. Selon la notice de pré-inventaire par le baron de Reinach, un petit écusson aux armes des Reinach de 1635, orné de lambrequins et timbré de la couronne des barons du Saint-Empire se trouve au-dessus de la porte d'entrée d'une aile. Logis de la ferme en maçonnerie ; porte à crossettes. Dépendances en pan de bois et en maçonnerie. Chalets du parc en bois. Une petite tour fut ajoutée au XIXe siècle dans l'angle de l'aile sud, elle fut détruite en 1926. Le château fut restauré en 1804  entre les deux dernières guerres. La terrasse antérieure sur léger avant-corps fut ajoutée vers 1911. Un jardin à l'anglaise fut créé au début du XIXe siècle par Charles de Reinach avec ruisseau et étang. Il comporte une glacière, un hangar servant de remise et deux chalets, l'un construit selon le modèle d'un chalet du canton de Lucerne. Le parc est à la disposition de la commune depuis 1982. Dans le jardin du château se situe un cadran solaire sur pied du XVIIIe siècle. Les bâtiments de la ferme datent du début du XVIIIe et du XIXe siècle ; ils sont situés au nord de l'enceinte du château et se composent d'étables, écuries, de hangars et remises ainsi que d'une maison. Le château et le jardin n'ont pu être visités lors de l'enquête. L'édifice a fait l'objet d'une inscription partielle au titre des monuments historiques par arrêté du 6 mars 1990, puis d'un classement partiel par arrêté du 4 juillet 2000.","habitants":"François Joseph de Reinach Hirtzbach \"","divers":"Reinack                                  47°35'53\"N, 7°13'27\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Reinack_1.jpg","../../jctruffet.com/image/image_68/68_Reinack_2.jpg"]},"Consult_chateau_formulaire43bb":{"id":"Consult_chateau_formulaire43bb","dept":"68","canton":"Wintzenheim","commune":"Eguisheim","nom":"Saint_Léon_Eguisheim","type":"château","periode":"VII-XIII²²","histoire":"EGUISCHEIM la date de construction du château urbain d'Éguisheim n'est pas clairement établie. Aucun élément tangible ne prouve l'existence d'un château avant le XIIIe siècle.Les Étichonides, dont les descendants furent les Comtes d'Éguisheim avaient certes des possessions à Eguisheim, cependant l'hypothèse que le château urbain ait pu être fondé par Eberhard, petit-fils d'Etichon, Duc d'Alsace, est peu crédible. Cette supposition, souvent formulée autrefois, s'appuyait sur une chronique du couvent d'Ebersmunster affirmant que le Comte Eberhard, décédé en 747, habitait un château qu'il avait construit à Eguisheim. Cet écrit datant du XIIe siècle qui rapportait des faits antérieurs de 4 siècles pouvait toutefois être mis en doute et actuellement, on situe plus volontiers la demeure d'Eberhard au Haut-Eguisheim. Toutes les autres évocations d'un castrum Egisheim du XIe siècle jusqu'à la moitié du XIIIe siècle se rapportent à cet autre site fortifié, se trouvant à 2,5 km du village, sur les premiers contreforts des Vosges. La lignée des Comtes d'Éguisheim s'éteignit au XIIe siècle ; les Comtes de Dagsbourg héritèrent de leurs biens. Après la mort de Gertrude de Dabo (1225), dernière représentante de cette famille, plusieurs partis se disputèrent la succession. Parmi les prétendants, se trouvaient la famille de Linange, les Margraves de Bade, les Comtes de Ferrette et les évêques de Strasbourg. Ce conflit pourrait constituer un motif pour l'érection d'un château urbain à Éguisheim. La situation se détendut quand l'évêque Berthold  acheta ses droits sur Eguisheim au Margrave de Bade (2 novembre 1226)","architecture":"EGUISCHEIM,  la situation se détendit quand l'évêque de Berthold acheta ses droits sur Eguisheim au Margrave de Bade 2 novembre 1226 .Des considérations architecturales : le plan octogonal du mur d'enceinte et son appareil (pierres à bosses, marques de tâcheron) amènent les historiens à dater le château du début du XIIIe siècle. Les fouilles menées en 1994 et 1995 n'ont pas révélé d'éléments plus anciens. Dans les écrits, la première évocation certaine du château urbain se trouve dans un inventaire des biens de l'évêque de Strasbourg Jean de Dürbheim datant de 1355. En 1348, l'ensemble du site était propriété de Jean de Zellenberg, bailli d'Éguisheim. Après avoir été occupé par les Écorcheurs en 1444, il se trouvait en mauvais état et fut restauré à la veille du XVIIe siècle. C'est de cette époque que datent les fenêtres à meneaux du corps de logis à deux étages.                                                                                        Trois châteaux à, Eguisheim dont celui d'Eguisheim la tour carrée de Vaudemont et de Schlossberg  lRuines de 3 anciens châteaux en grès rose situés en haut d'une colline et accessibles par des sentiers.","habitants":"le comte Eberhard\"","divers":"St_Leon_d'Eguisheim                                                                                  48°02'34\"N, 7°18'22\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Saint_L%c3%a9on_Eguisheim_1.jpg","../../jctruffet.com/image/image_68/68_Saint_L%c3%a9on_Eguisheim_2.jpg","../../jctruffet.com/image/image_68/68_Saint_L%c3%a9on_Eguisheim_3.jpg","../../jctruffet.com/image/image_68/68_Saint_L%c3%a9on_Eguisheim_4.jpg"]},"Consult_chateau_formulaire5ea0":{"id":"Consult_chateau_formulaire5ea0","dept":"68","canton":"Ste-Marie aux mines","commune":"Ribeauvillé","nom":"Saint_Ulrich","type":"Château-Vestige","periode":"XI-XVI","histoire":"St-ULRICH, le nom du site est dû à la chapelle dédiée à ce saint qui se trouve dans le château. Les textes médiévaux, quant à eux, ne font nullement usage du nom Saint-Ulrich : le château portait le nom de la lignée des Rappolstein (ou Ribeaupierre, dans la forme francisée). Il est du XIe au XVIe siècle la principale résidence des puissants sires de Ribeaupierre. Il devait sans doute exister un autre château sur le même emplacement qui appartenait en 1114 à l'évêque de Bâle. Il est occupé militairement par Henri V qui s'en sert comme point d'appui dans sa guerre contre les Eguisheim.  Anselme II de Ribeaupierre qui chasse les autres membres de sa famille du château, y soutint victorieusement deux sièges en 1287 contre Rodolphe IV de Habsbourg, roi des romains et en 1293 contre le roi Adolphe son successeur. Une criminelle célèbre, la dame Cunégonde d'Hungerstein (de son nom de jeune fille Billing de Willsperg) est enfermée au XVe siècle pendant près de vingt ans dans le donjon et tente de s'en échapper avec la complicité du guetteur. Elle était accusée d'avoir étranglée en 1487 Guillaume de Hungerstein, son mari, vassal des Ribeaupierre, établi à Guebwiller.  C'est un château d'une très belle architecture militaire du Moyen Âge en Alsace qui comprenait un donjon érigé au XIIe siècle et un logis avec cheminée du XIIe siècle. Au XIIIe siècle, la salle des chevaliers est décorée de neuf belles fenêtres de style roman que l'on peut encore apercevoir.","architecture":"St-ULRICH,  à la même époque, vers 1435, est érigée la chapelle consacrée à Saint-Ulrich évêque d'Augsbourg. La famille des Ribeaupierre quitte ce château au XVIe siècle pour un château de style Renaissance (l'actuel lycée de Ribeauvillé). Par la suite, le château est démantelé durant la guerre de Trente Ans.  La famille des Ribeaupierre quitte ce château au XVIe siècle pour un château de style Renaissance (l'actuel lycée de Ribeauvillé). Par la suite, le château est démantelé durant la guerre de Trente Ans.  Les vestiges actuellement visibles datent de plusieurs époques : le donjon carré et le corps de logis sont datés du XIIe siècle, la salle des chevaliers, et la grande tour d'habitation du XIIIe siècle, alors que la barbacane d'entrée et l'enceinte extérieure sont du XIVe siècle. Le château est réaménagé vers 1200 et doté d'un bâtiment d'apparat dont seul le niveau inférieur est conservé. Il s'éclaire par des fenêtres géminées surmontées d'oculus et est doté de banquettes latérales. La chapelle Saint-Ulrich est datée du XVe siècle.","habitants":"famille des Ribeaupierre\"","divers":"Saint_Ulrich                         48°12'10\"N, 7°18'19\"E1","gps":"","images":["../../jctruffet.com/image/image_68/68_Saint_Ulrich_1.jpg","../../jctruffet.com/image/image_68/68_Saint_Ulrich_2.jpg","../../jctruffet.com/image/image_68/68_Saint_Ulrich_3.jpg"]},"Consult_chateau_formulaire6bae-2":{"id":"Consult_chateau_formulaire6bae-2","dept":"68","canton":"Wintzenheim","commune":"Soultzbach-les-Bains","nom":"Schouenbourg","type":"Château","periode":"XIII-XV-","histoire":"sud-ouest. Sa construction a été soit contemporaine de celle de HATTSTATT-SCHAUENBOURG  Sa construction date des XIIIe, XVIe, XVIIe et XVIIIe siècles. A partir de 1275, une enceinte assure la protection du bourg. Une résidence est édifiée à l'emplacement le plus vulnérable de l'enceinte, dans son angle sud-ouest. Sa construction a été soit contemporaine de celle de l'enceinte, soit menée dans la foulée, le bâtiment étant mentionné dès 1289. L'édifice a subi par la suite de nombreux remaniements. Une première campagne se situe au XVIe siècle : oriel, tourelle polygonale, décor intérieur. Dans la première moitié du XVIIe siècle, ajout d'un étage supplémentaire et de sa charpente sur le château qui comprend alors un corps principal ouest, prolongé d'une aile en retour d'équerre au sud. Les nouveaux propriétaires souhaitent le transformer  des Hattstatt-Schauenbourg en hôtel pour curistes qui viennent profiter de la source d'eau minérale découverte en 1603. Au XVIIIe siècle, l'aile du château perd un étage et les percements sont  repris. A cette époque, les bâtiments sont disposés en U autour d'une cour étroite. La fonction d'hôtel perdure jusqu'au XIXe siècle. En 1903, le château des Hattstatt-Schauenbourg et les bâtiments attenants sont acquis par la congrégation des soeurs de la Divine Providence de Ribeauvillé en vue d'y aménager une maison de retraite. Ceci entraîne des aménagements intérieurs dans le château (escalier, chapelle) et la création d'un jardin dès le début de l'installation des soeurs. En 1970, il fut décidé de la construction de 2 bâtiments nouveaux abritant chambres et chapelle qui se substituèrent à des dépendances plus anciennes. Le bâtiment du réfectoire et la maison d'habitation, flanquant l'entrée, ont été maintenus en place. Le château des Hattstatt-Schauenbourg appartient depuis à une société privée.","architecture":"SCHOUENBOURG présentant des éléments disparates allant du XVe siècle au XIXe siècle ; 1ère mention en 1399 ; importants travaux effectués vers 1580 pour Peter Isaac Würm : transformation d'un château, sans doute plus archaïque, en manoir Renaissance ; l'escalier hélicoïdal de la grande tour polygonal, en partie du XVIe siècle, présente des marques de tâcheron dont deux se retrouvent à Strasbourg sur la maison de l'oeuvre Notre-Dame ; au XVIIIe siècle, travaux de réfection (nouvelle porte d'entrée, dallage, parquets, sans doute pour les Falckenhayn ; entre 1815 et 1820, réfection pour le général de Schauenbourg avec conservation de la façade Renaissance et de la tour polygonale, et peut-être adjonction de la petite tour postérieure vers la zorn, au milieu du XIXe siècle, les deux tours sont rehaussées d'un étage, l'une est ornée alors des créneaux et merlons.","habitants":"famillede Peter Isaac Würm \"","divers":"Wihr-au-Val","gps":"","images":["../../jctruffet.com/image/image_68/68_Schouenbourg_1.jpg","../../jctruffet.com/image/image_68/68_Schouenbourg_2.jpg"]},"Consult_chateau_formulaire81cf":{"id":"Consult_chateau_formulaire81cf","dept":"68","canton":"Wintzenheim","commune":"Soultzbach-les-Bains","nom":"Schrankenfels","type":"Vestiges","periode":"XIII-XV","histoire":"SCHRANKENFELS, est bâti en un seul jet vers 1220-1230, par la famille des Gueberschwihr et plus précisément Dietrich de Schrankenfels. Ces derniers sont à la fin du XIIe siècle des vassaux de lévêque de Strasbourg et il est possible que le château ait été un fief de lévêché.\nUne autre mention en 1305 indique que le château appartient à lévêque de Strasbourg, qui la remis en fief aux Hattstat, dont les Schrankenfels, qui occupent de fait la place, sont les vassaux. Il est mentionné une dernière fois comme étant occupé en 1353, mais nest plus quune ruine en 1431 et une chronique de 1470 évoque une destruction volontaire.","architecture":"SCHRANKENFELS, la date exacte de cette destruction nest pas connue avec certitude et est parfois située dans la deuxième moitié du XIVe siècle, mais plus précisément par Mengus et Rudrauf en 1427.  À lextinction des Hattstatt en 1603, les Schauenbourg récupèrent le château, mais ne semblent pas sy être intéressés et il est resté à létat de ruines. Les gravures du XVIIIe au XIXe siècle montrent des vestiges encore assez importants, mais létat général des ruines sest beaucoup dégradé par la suite. Vers 1967 le donjon sest effondré, emportant avec lui une partie de lenceinte. En 1994, le Conseil général du Haut-Rhin fait effectuer des travaux de consolidation du donjon et de la chemise occidentale. En 2019, le château a de nouveau été fermé au public en raison des chutes de pierres.","habitants":"Famille des  Hattstatt  et de                   Bernhard de Gilgenberg \"","divers":"Schrankenfels                         48°01'19\"N, 7°12'48\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Schrankenfels_1.jpg"]},"Consult_chateau_formulaire5c71-2":{"id":"Consult_chateau_formulaire5c71-2","dept":"68","canton":"Wintzenheim","commune":"Munster\nGriesbach-au-Val","nom":"Schwartzenberg","type":"Vestiges","periode":"XIII-","histoire":"SCHWARTZENBERG, le moment et le contexte de la construction du château de Schwarzenberg sont bien connus : en 1260, Walter de Geroldseck obtient de Richard de Cornouailles le droit de gérer les domaines dEmpire du bailliage dAlsace et il en profite pour confier des charges à divers membres de sa famille, dont celle davoué de labbaye de Munster, la construction dun château à proximité, étant situé à moitié sur les terres de labbaye, celle-ci proteste à au moins deux reprises, le 21 avril et le 2 mai 1261, pour demander larrêt de cette construction illégale, mais les travaux se poursuivent à bon train. La roue tourne cependant rapidement pour les Hohengeroldseck : en novembre, le roi arbitre en faveur de lévêque de Bâle et en juillet 1262, à la suite de sa défaite à la bataille de Hausbergen, Walter de Geroldseck sengage à lui céder également le château, alors déjà achevé. Ce nest cependant quen 1271 que les droits sont effectivement transférés à lévêché bâlois, et seulement en échange du paiement de six cents marcs dargent. À partir de cette date, il  est occupé par un prévôt (Vogt) dépendant directement de lévêque de Bâle. Cependant, en 1287, la ville de Munster et les villages avoisinants, réunis sous le nom de « Communauté du val Saint-Grégoire ». Signe de cette perte dintérêt,il sert alors de gage aux évêques de Bâle, notamment en 1309. A  partir de 1341, il est confié à la garde de la famille Münch de Landskron  jusquà lextinction de celle-ci en 1396. Décrit comme étant « quelque peu délabré » en 1401, il est alors transmis aux Beger de Geispolsheim, en échange de leur engagement à le remettre en état. Plus tard, entre 1496 et 1500, Jacob Beger fait réaliser de coûteux travaux de modernisation  visant notamment à améliorer la défense contre les canons. Après l'extinction de la famille des Beger en 1532, il est abandonné : déjà décrépi en 1605, il nest plus la résidence du prévôt de Munster au plus tard en 1636 et est signalé comme étant inhabitable en 1646, ce qui nempêche cependant pas dy placer de lartillerie en 1655. Cest peut-être en raison de cette utilisation militaire que les Français le dynamitent vers 1673.","architecture":"SCHWARTZENBERG, Le château est réquisitionné en 1940 par les autorités du Troisième Reich, puis les autorités de la zone d'occupation américaine en Allemagne installent un camp de personnes déplacées  à Scheinfeld en 1946, dont une partie demeure au château, jusqu'en 1949. Celui-ci est transformé dans sa plus grande part en lazaret, ou hôpital militaire. Ces réfugiés allemands venaient pour la plupart des anciens territoires, notamment de ceux de Prusse-Orientale absorbés par la nouvelle république socialiste soviétique de Lituanie. Plus d'un millier de réfugiés ont transité au château. Le prince Karl VII zu Schwarzenberg installe en 1986 un centre de recherches et de documentation et une bibliothèque de littérature de Bohême et de Tchécoslovaquie, ainsi qu'une petite maison d'édition de littérature d'opposition au régime communiste de la république populaire de Tchécoslovaquie.Après l'effondrement du régime, le prince a acquis la double nationalité tchèque et est devenu ministre des Affaires étrangères de la République tchèque entre janvier 2007 et mai 2009 puis de nouveau de juillet 2010 à 2013. Il est actuellement le chef de la maison de Schwarzenberg et passe des séjours fréquents au château. Il a ouvert dans une aile  une école privée  et une école technique. Le château est composé dun noyau, correspondant pour lessentiel à la première campagne de construction de 1261, doublé dune enceinte secondaire formant basse-cour. Les restes du noyau castral forment un pentagone convexe irrégulier pointant vers le nord. Les côtés ouest, Est et nord de ce pentagone sont constitués par une enceinte épaisse de 1,7 à 2 m, qui a toutefois en grande partie disparue dans la moitié nord. Au sud, côté le plus vulnérable, sélèvent aux angles deux tours rondes reliées par un mur-bouclier. Le creusement du fossé a constitué la principale source de matériaux pour le chantier, les ruines subsistantes employant  du granite prélevé directement sur place. Les éléments conservés sont généralement dune exécution assez peu soignée, avec des moellons à peine dégrossis et un mortier de mauvaise qualité, ce qui a joué un rôle non négligeable dans la dégradation rapide du château.","habitants":"Famille berger\"","divers":"Schwarzenberg                        48°02'15\"N, 7°09'53\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Schwarzenberg_1.jpg","../../jctruffet.com/image/image_68/68_Schwarzenberg_2.jpg"]},"Consult_chateau_formulaire9a26":{"id":"Consult_chateau_formulaire9a26","dept":"68","canton":"Wintzenheim","commune":"Wihr au Val","nom":"Sonnenbourg","type":"château","periode":"XIII","histoire":"SONNENBOURG,  a 1ère mention du château de Wihr apparaît en 1293 lors de la lutte entre le roi Adolphe de Nassau et la ville de Colmar, alliée aux seigneurs de Ribeaupierre. Alors fiefs de cette puissante famille, la ville forte de Wihr et le château sont pris et détruits par les troupes du grand bailli Cuno de Bergheim, sur ordre du roi Adolphe. En 1303, le château est reconstruit par les seigneurs de Ribeaupierre (Henri), qui le conservèrent en fief et le transmirent à leurs successeurs, les Deux-Ponts-Birkenfeld ; ces derniers le possédèrent jusqu'à la Révolution. En 1346, les seigneurs de Ribeaupierre cédèrent en arrière-fief la ville et le château aux seigneurs de Hattstatt, après en avoir reçu l'autorisation de l'évêque de Bâle.  En août 1796, Bartholomé Engelhart, tisseur de lin à Wihr, acquit une moitié du château, et acheta l'autre moitié le 14 janvier 1797 à l'orfèvre colmarien Jean Jacques Barth. Dès septembre 1798, le château appartenait à Mathias Wiss et à Jacques Reichenbach.","architecture":"SONNENBOURG, de nombreuses transformations subies par le château sont attestées dans les archives pour les XVIe et XVIIIe siècles, qu'il s'agisse de campagnes de construction ou de rénovations intérieures (1532 : ajout d'un escalier en vis, de 1534, 1637,. Une fontaine, située dans la cour, a été restaurée en 1718. Une description rédigée au XVIIIe siècle donne un bâtiment de 3 étages d'environ 35 m de long sur 12 m de large, orienté Nord-Sud, accolé au mur d'enceinte et séparé du village par une cour. Il comprenait une vingtaine de pièces, desservies par un escalier en vis aménagé dans une tour accolée sur son élévation Est. Le château avec ses dépendances (maison du veneur, écuries, remise) et jardins, abandonnés petit à petit au cours du XVIII e siècle, ont été vendus aux enchères le 9 janvier 1796. Le site du château est situé sur le point haut dominant le village à l'Ouest, encadré par l'actuelle rue du château à l'Est et l'actuel sentier dit Hinterschlosspfad à l'Ouest. Il a aujourd'hui la forme d'une terrasse polygonale soutenue par de hauts murs en moellons de grès rose. Rien ne subsiste du château en élévation.  En très mauvais état, il fut démantelé entre 1814 et 1824 pour construire la maison Wiss-Reichenbach. Les derniers éléments furent prélevés en 1881 par Joseph Monnier pour édifier sa propre maison sur le site même. Les murs de soutènement qui demeurent ont été largement restaurés après les bombardements du 18 juin 1940.","habitants":"Cuno de Bergheim\"","divers":"","gps":"","images":["../../jctruffet.com/image/image_68/68_Sonnenbourg_1.jpg","../../jctruffet.com/image/image_68/68_Sonnenbourg_2.jpg"]},"Consult_chateau_formulaire1abd":{"id":"Consult_chateau_formulaire1abd","dept":"68","canton":"Wintzenheim","commune":"Soultzbach-les-Bains","nom":"Soultzbach_les_Bains","type":"Château","periode":"XIII","histoire":"SOULTZBACH-les BAINS,les fortifications sont un ensemble douvrages ayant protégé la ville de Soultzbach-les-Bains au Moyen Âge et au début de lépoque moderne. Elles comportent une enceinte fortifiée et le château des Hattstatt-Schauenbourg, qui est inscrit au titre des monuments historique depuis 2009..La date du début de la construction des fortifications de Soultzbach-les-Bains est connue très précisément grâce aux Annales des Dominicains de Colmar, qui indiquent le 18 octobre 1275 que la bourgade a été entourée de murs et de fossés. Ces travaux sont commandités par le propriétaire du lieu, Conrad Wernher III de Hattstatt, qui cherche  à isoler ainsi le château de Wassenberg, possession de ses rivaux les Girsberg, du reste des possessions de ceux-ci dans la vallée de Munster. Il nest pas certain que le château existe déjà à cette date, celui-ci nétant mentionné pour la première fois quen 1289.","architecture":"SOULTZBACH-les BAINS, à la suite de revers de fortune, Conrad est contraint de céder la moitié de la ville au duc de Lorraine vers 1294, puis la moitié du château en 1306. Cette cession prend toutefois la forme dune oblation, le duc lui remettant immédiatement en fief les deux parties. Cela narrête toutefois pas les travaux daménagement de lenceinte, une nouvelle porte étant construite avant 1310. À cette date, les Hattstatt se défont de la partie du village qui leur reste, la moitié étant vendue au duc de Lorraine et lautre moitié à la famille de Blâmont. Les propriétés changent ensuite plusieurs fois de mains au cours des XIVe et XVe siècles, sans que les circonstances exactes de ces changements soient connues. Les Haus dIssenheim reçoivent ainsi en fief le château et une partie du village entre 1371 et 1405, puis le château est donné en gage à Bernhard de Gilgenberg et Bernhard Stoer en 1464. La situation de la propriété se clarifie à lextinction des Blâmont en 1504, les ducs de Lorraine devenant alors les seuls propriétaires du château et du village, quils remettent en fief à Jacques de Hattstatt. Celui-ci fait faire des travaux dès 1505 et ses successeurs lancent encore un chantier en 1585. Les Hattstatt séteignent toutefois peu après et, après un long procès pour attribuer lhéritage, la ville et le château reviennent aux Schauenbourg.","habitants":"Conrad Wernher III de Hattstatt\"","divers":"Soultzbach_les_Bains\n            48°02'10\"N7°12'05\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Soultzbach_Les_Bains_1.jpg","../../jctruffet.com/image/image_68/68_Soultzbach_Les_Bains_2.jpg","../../jctruffet.com/image/image_68/68_Soultzbach_Les_Bains_3.jpg"]},"Consult_chateau_formulaire8cc3":{"id":"Consult_chateau_formulaire8cc3","dept":"68","canton":"Wintzenheim","commune":"Soulzemat","nom":"Wagenbourg","type":"Château","periode":"XVII","histoire":"WAGENBOURG,  à 25 km au sud de Colmar, Soultzmatt s'étire le long de la Vallée Noble, ainsi désignée en raison des sept châteaux qui la gardaient. De ces forteresses, une seule est restée debout : Wagenbourg, acquise par la famille Klein, établie dans le village en 1605. Bien abritées par les plus hauts reliefs des Vosges, les vignes (11 ha) sont exploitées depuis 1987 par Jacky et Mireille Klein, rejoints en 2020 par leur fils Jean-Nicolas. Domaine certifié HVE.","architecture":"WAGENBOURG,  logo monument historique Inscrit MH (1987, façades, toitures, tour d'angle, tourelle d'escalier, pont d'accès avec piliers, grand escalier avec balustrade et cage, salles voûtées de la tour d'angle, escalier en vis dans la tourelle, pièce ouest avec parquet, plafond et cheminée, pièce nord lambrissée, six statues allégoriques dans le jardin.","habitants":"Jacky et Mireille Klein,\"","divers":"Wagenbourg                           47°57'33\"N, 7°14'31\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Wagenbourg_3.jpg"]},"Consult_chateau_formulaire3a60":{"id":"Consult_chateau_formulaire3a60","dept":"68","canton":"Wintzenheim","commune":"Walbach","nom":"Walbach","type":"Maison forte","periode":"XIV","histoire":"WALBACH, le château est mentionné par la première fois en 1336 sous le nom de Burgerlin, « petit château » et appartient alors aux Girsberg, qui possèdent une partie du village et un autre château plus important sur la montagne de lautre côté de la vallée, le Gigersbourg. En 1410, Jean-Guillaume de Girsberg transmet Walbach et son château aux Ribeaupierre, qui possédaient déjà lautre moitié du village. Au plus tard au début du XVIe siècle, le château est occupé par les Walbach, vassaux des Ribeaupierre, auxquels il retourne lorsque la famille des Walbach séteint en 1559. Dimportants travaux semblent avoir lieu pendant ce siècle, avec notamment la construction de la tourelle descalier et le remaniement dune grande partie des ouvertures. Au milieu du XVIIIe siècle, le château est en mauvais état faute dentretien. De grands travaux de restauration sont entrepris à partir de 1763 par les Deux-Ponts-Birkenfeld qui ont hérité du village à lextinction des Ribeaupierre. Ils durent au moins jusquen 1770-1771, dates portées sur les portes de la cour. Peu de temps après, en octobre 1775, la grange est détruite par un incendie causé par du foin rentré humide. Après la Révolution, le château est inhabité pendant un temps puis acheté par la famille Joseph en 1800. En 1898, Martin Joseph, maire de Walbach, le vend au fermier Hippolyte Blaise, dont les héritiers le possèdent encore à la fin des années 1960. Endommagé pendant la Seconde Guerre mondiale en raison de la présence dune batterie dartillerie dans le pré voisin, l'édifice fait l'objet d'une inscription au titre des monuments historiques depuis 1946.","architecture":"WALBACH, le château est composé dune cour quadrangulaire orientée nord-ouest sud-est, dont le logis occupe langle ouest. Celui-ci est une bâtisse massive de trois étages quadrangulaires sur rez-de-chaussée semi-enterré et servant de cellier, auxquels sajoutent encore plusieurs niveaux de combles. Les murs sont en moellons enduits avec des chaînages dangles en grès. Les encadrements des portes et des fenêtres sont du même matériau, ces derniers étant caractéristiques du XVIe siècle avec leurs banquettes, leurs meneaux et leurs linteaux sculptés de coquilles. Une tourelle descalier se trouve dans langle sud et deux petites annexes basses sont accolées au mur sud-ouest.  À lintérieur du logis se trouvent encore deux poêles de la seconde moitié du XVIIIe siècle en faïence imitant un marbre violet. Ils portent des cadres rectangulaires et des médaillons ovales décorés dinstruments de musique et de scènes bibliques dont certaines semblent avoir été copiées sur celles des stalles de l'église Notre-Dame de Guebwiller sculptées par Fidèle Sporer.","habitants":"famille des Walbach\"","divers":"Walbach                                      48°03'52\"N, 7°13'15\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Walbach_1.jpg"]},"Consult_chateau_formulairea070-2":{"id":"Consult_chateau_formulairea070-2","dept":"68","canton":"Ste-Marie aux Mines","commune":"Katzenthal","nom":"Wineck_68","type":"forteresse","periode":"XIII","histoire":"WINECK, quand Ulrich de Ferrette en fait loblation à lévêque de Strasbourg. Toutefois, en 1271, il est toujours entre les mains de la famille de Ferrette, qui le remet cette fois à lévêque de Bâle. En parallèle, il est occupé depuis la première moitié du XIIIe siècle par la famille de Wineck, qui le tient en fief des Ferrette. À une date indéterminée au cours du XIIIe siècle, le château se voit  amélioré par le remplacement de la palissage et du logis en bois par une enceinte et un bâtiment en pierre, tandis que le donjon est surélevé.  À lextinction des Ferrette en 1324, le château entre dans le patrimoine des Habsbourg, qui remettent en 1340 le fief au Rathsamhausen à la suite de lextinction de la famille de Wineck. En 1499, le château est décrit comme étant en ruines.","architecture":"WINECK le château est composé de trois parties : le donjon carré, qui se trouve dans langle nord-ouest du château supérieur, où se trouvait également le logis, tandis que la basse-cour sétend au sud et au sud-ouest. Un profond fossé taillé dans la roche sépare le château du reste de la colline au nord et à lest. Élevé dès lorigine en pierre calcaire taillées avec un bossage, le donjon a été surélevé à deux reprises, la seconde surélévation étant bien visible par lutilisation dun chaînage en grès. À la différence de lusage habituel des châteaux alsaciens, où le donjon est une construction uniquement défensive, celui du Wineck semble avoir été habité, ou à tout le moins a été doté de quelques éléments de confort comme des latrines et peut-être un poêle.","habitants":"Famille des Habsbourg\"","divers":"Wineck                                           48°06'33\"N, 7°16'41\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Wineck_68_1.jpg","../../jctruffet.com/image/image_68/68_Wineck_68_2.jpg","../../jctruffet.com/image/image_68/68_Wineck_68_3.jpg"]},"Consult_chateau_formulaire5c88":{"id":"Consult_chateau_formulaire5c88","dept":"68","canton":"Riquewihr","commune":"Riquewihr.","nom":"Wurtemberg","type":"Château","periode":"XV","histoire":"WURTEMBERG les ruines  on était acquise en 1864 par la société pour la conservation des monuments historiques dAlsace. L'édifice fait l'objet d'une inscription au titre des monuments historiques depuis le 11 octobre 1984, puis l'enceinte extérieure du château en 1991.                                                                                                 REICHENTEIN monument historique Inscrit MH (1990, corps de logis (façades, toitures, oriel, grand escalier côté cour, balcon en fer forgé), intérieur (grande salle du rez-de-chaussée avec cheminée et porte), mur de clôture avec arcades d'entrée, mur d'enceinte avec portail nord, deux pavillons (façades, toitures, niche avec puits), grille avec portail ouest, deux statues, portail et grille, piles en pierre, jardin avec murets, escaliers, bancs, fontaine, vasques en grès et statues.","architecture":"WURTEMBERG, en 1835 la commune acquit le 1er étage du château pour y installer l'école des garçons et acheta le reste du bâtiment en 1861. Une  La maison du receveur a été remaniée, les dépendances ont toutes disparu, remplacées par des bâtiments annexes modernes. le château des comtes de Montbéliard-Wurtemberg est un monument historique situé à Riquewihr, Une restauration importante eut lieu en 1900 redonnant au château l'allure qu'il a sur la gravure de Merian de 1644 : les redents cintrés des pignons furent remplacés par des créneaux, des bois de cerf (armoiries des Wurtemberg) furent placés sur le pignon est, la petite flèche et le campanile de la tourelle furent remplacé par une toiture galbée (remplacée depuis par une flèche). En 1970 une nouvelle restauration pour l'installation du musée d'histoire des P. T. T. avec rétablissement de l'ancienne salle des chevaliers au rez-de-chaussée et dégagement de 2 anciennes fenêtres avec colonnettes Renaissance. La maison du receveur a été remaniée, ansi que les dépendances.  L'édifice fait l'objet d'un classement au titre des monuments historiques depuis 1900.","habitants":"Les comtes de Montbéliard-Wurtemberg \"","divers":"Le château des comtes de Montbéliard-Wurtemberg  48°09'57\"N, 7°17'56\"E  ReichenteiNgrav 5_6  48°10'38\"N, 7°16'49\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Wurtemberg_1.jpg let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','68 — Haut-Rhin'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)showDet(start);
</script></body></html>
