const FULL={"Consult_chateau_formulairea4fe":{"id":"Consult_chateau_formulairea4fe","dept":"68","canton":"Altkirch","commune":"Altkirch","nom":"Altkirch","type":"Château","periode":"XII","histoire":"ALTKIRCH, du fait des incertitudes sur les dates exactes de constructions, il nest pas établi si lenceinte et le château ont été construits simultanément ou si lun à précédé lautre. Des documents mentionnent bien la présence dune résidence du comte Louis de Bar dès le XIe siècle, mais ils restent évasifs sur lemplacement et surtout la nature de celle-ci, qui pourrait navoir été quune simple demeure, sans fortifications. Le même problèmes se pose pour lhabitation du comte Thierry de Montbéliard, mentionnée en 1102. La première borne chronologique certaine est de 1215, date à laquelle la ville est qualifiée doppidum, ce qui indique quelle est fortifiée. De son côté, le château nest mentionné pour la première fois de manière identifiable quen 1231. Il faut toutefois noter que la ville est probablement un bourg castral et que, par conséquent, le château lui serait antérieur.  Ces fortifications pourraient ainsi être luvre de Frédéric II de Ferrette, qui fait de la ville le centre administratif de son comté au tournant des XIIe et XIIIe siècles. Les Ferrette en perdent la propriété peu de temps après au profit de lévêque de Bâle, qui la leur remet toutefois en fief.","architecture":"ALTKIRCH,  les fortifications perdent au cours de cette période leur usage militaire. Dimportantes modifications sont notamment effectuées au XVIIIe siècle pour faciliter la circulation en ouvrant une nouvelle rue à travers les murs de la ville, tandis que les habitants obtiennent dériger des constructions contre ceux-ci et dy percer des ouvertures. Faute dentretien, la majeure partie du château tombe quant à elle en ruines. À lextinction des Ferrette au début du XIVe siècle, les Habsbourg récupèrent la ville et le château pour lesquels ils nont toutefois quun intérêt modéré, ces derniers leur servant régulièrement de gage. À la suite du traité de Münster de 1648, la place devient une possession française, que Louis XIV offre à Mazarin en 1659. Ce quil en reste est finalement rasé entre 1844 et 1845 afin de libérer lespace pour une nouvelle église. En raison de labsence presque totale de vestiges, laspect du château est essentiellement connu par les dessins réalisés au XVIIIe et XIXe siècles. Son cur était un grand donjon circulaire, comparable à celui du Pflixbourg, entouré dune enceinte également circulaire comprenant au moins deux tours rondes aux angles sud et nord-ouest. Les bâtiments dhabitation et annexes étaient adossées à cette enceinte. Des fausses-braies dotées de tours venaient renforcer le dispositif à mi-pente, tandis que le côté tourné vers la ville était séparé celle-ci par un fossé. Le château était également doté dune chapelle, dédiée selon les sources à sainte Catherine ou à saint François et sainte Marguerite.","habitants":"Frédéric II de Ferrette\"","divers":"Altkirch                                      gps 47°37'23\"N7°14'12\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Altkirch_1.jpg","../../jctruffet.com/image/image_68/68_Altkirch_2.jpg"]},"Consult_chateau_formulaire2d93":{"id":"Consult_chateau_formulaire2d93","dept":"68","canton":"Barr","commune":"Kleppernburg","nom":"Barr","type":"Château","periode":"XII-XVII","histoire":"BARR  du XIIIe et XVIIe siècles, XVIIIe et XIXe siècles dit Kleppernburg ou Wepfermannsburg, puis maison du baill,  hôtel de ville.  Le 1er château aurait été construit par le bailli de Frédéric II, Woelfelin ; reconstruction vers 1210 par les Wepfermann, le mur d'enceinte qui subsiste daterait du 13e siècle ; vers 1380 reconstruction par les Ochsenstein ; à partir de 1568 le château est propriété de la ville de Strasbourg et sert de résidence au bailli ; le château est reconstruit en 1640 ainsi qu'une partie des communs et des ailes accolées avec passage d'entrée qui portent les dates 1617, 1641, 1644 et 1763.","architecture":"BARR; le château vendu en 1791 sert depuis d'hôtel de ville et a reçu à cette occasion le clocheton de l'ancienne maison commune ; en 1833 le rez-de-chaussée fut percé d'arcs en plein-cintre par l'architecte Kuhlmann ; en 1850 l'architecte Antoine Ringeisen aménagea une chapelle provisoire dans la salle du juge de paix créée au début du 19e siècle à l'étage d'un bâtiment annexe, le grenier aurait été détruit en 1873 mais le bâtiment avec garage et salle des fêtes qui le remplace semble plus récent ; endommagé pendant la dernière guerre, l'hôtel de ville a été restauré à l'identique.  Escalier hors-oeuvre : escalier symétrique, en maçonnerie ; escalier dans-oeuvre : escalier droit, en charpente ; escalier dans-oeuvre : escalier tournant à retours, en maçonnerie","habitants":"Bailli Frédéric II, Woelfelin \"","divers":"Barr                                        48°24'32\"N7°26'57\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Barr_1.jpg"]},"Consult_chateau_formulaire636e":{"id":"Consult_chateau_formulaire636e","dept":"68","canton":"Cernay","commune":"Wattewiller","nom":"Baudry_Hagenbach","type":"Château","periode":"XIX","histoire":"BAUDRY Ce château a été construit pour l'industriel Baudry avant 1930 par les architectes Schulé et Doll. En 1956, la propriété est acquise par l'entreprise Pont-à-Mousson qui la transforme en colonie de vacances. Le château est constitué de plusieurs corps organisés autour d'une tour massive ronde. A l'ouest une aile de plan allongé, à l'est un corps de plan rectangulaire est assorti de plusieurs avants-corps. L'ensemble est d'inspiration néo-régionale (aile Est en pan de bois sur rez-de-chaussée en maçonnerie) est néo-renaissance (tour centrale, pierres à bossage).                                                                                                                     HAGENBACH, à l'ouest du château actuel s'élevait le Weckenberg, motte castrale citée au 14e siècle dont il ne reste plus rien. Le château de Hagenbach (surnommé le château jaune) a été élevé vers 1900, détruit pendant la guerre de 1914-18 et reconstruit en 1924 par l'architecte Gilodi.","architecture":"BAUDRY,  on ne sait pas encore ce quil va advenir du puits médiéval remis à la lumière du jour devant lhôtel de ville dAltkirch, à loccasion des travaux daménagement de la place de la République,  mais on en sait tous les jours un peu plus sur son origine et son histoire grâce aux informations rapportées par divers habitants.\nAinsi, un extrait de journal conservé par Frédéric Aïta, et cité dans une de nos précédentes éditions, fait mention de ce puits « construit en 1410 » par. Jacques Vigneron, féru dhistoire et membre des Amis du Musée sundgauvien, nous a fait parvenir un autre document particulièrement intéressant quil a dailleurs déjà eu loccasion dexposer durant lété 2019 au Musée sundgauvien..","habitants":"Industriel Baudry \"","divers":"deux châteaux dans cet article;Baudry et  Hagendach  gpj   47°50'04\"N7°10'24\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Baudry_Hagenbach_1.jpg","../../jctruffet.com/image/image_68/68_Baudry_Hagenbach_2.jpg","../../jctruffet.com/image/image_68/68_Baudry_Hagenbach_3.jpg","../../jctruffet.com/image/image_68/68_Baudry_Hagenbach_4.jpg"]},"Consult_chateau_formulaire2b42":{"id":"Consult_chateau_formulaire2b42","dept":"68","canton":"Sainte-Marie-aux-Mines","commune":"Beblenheim","nom":"Beblenheim","type":"château","periode":"XV","histoire":"BEBLENHEIM de l'ancien château-fort, ou cour seigneuriale, de la famille noble de Beblenheim, subsiste une tour d'angle, un vestige de mur d'enceinte avec couleuvrinière accolé à la tour vers l'ouest et un corps de logis en maçonnerie et pan de bois. Il porte sur la chaîne d'angle Est,  la date de 1461 et un écu armorié, bûché. Il a été agrandi d'une travée vers l'est et complété par divers corps de bâtiments vers l'est et l'ouest au XVIIIe et au XIXe siècle. Après les Beblenheim, le château passa aux Hoen. Depuis 1952, il abrite la coopérative vinicole de Beblenheim et a été complété par des constructions modernes au nord. En retour sur le corps de logis vers le sud, bâtiment avec caveau de dégustation, porte datée de 1739 et pressoir de 1836  décoratives sur les cloisons dans le grenier. La tour, de plan rectangulaire est voûtée d'arêtes au rez-de-chaussée et construite en petit appareil de grès noyé dans du mortier, entre la tour et le corps de logis, bâtiments en maçonnerie et en pan de bois d'époques différentes.","architecture":"BEBLENHEIM, le corps de logis comporte un rez-de-chaussée en maçonnerie avec chaînes d'angle massives, fenêtres à meneaux et marques de tâcheron. La cave en sous-sol s'étend sous tout le bâtiment avec porte en plein-cintre vers l'adjonction. Le pan de bois de l'étage est de type archaïque avec assemblages en queue d'aronde et dents de scie, assemblages se retrouvant sur la charpente très restaurée par ailleurs. Dans les pièces de l'étage, vitraux modernes néo-Renaissance ; traces de peintures,","habitants":"Famille noble de Beblenheim,\"","divers":"","gps":"","images":["../../jctruffet.com/image/image_68/68_Beblenheim_1.jpg","../../jctruffet.com/image/image_68/68_Beblenheim_2.jpg"]},"Consult_chateau_formulaire06be":{"id":"Consult_chateau_formulaire06be","dept":"68","canton":"Sainte-Marie-aux-Mines","commune":"Riquewihr","nom":"Bilstein","type":"Vestiges","periode":"XII-XIV","histoire":"BLISTEIN, les frères Walter et Burkart de Horbourg, qui en sont les constructeurs, revendent toute leur seigneurie à Ulrich de Wurtemberg en 1324, pour la somme de 4000 Marks d'argent car ils sont sans descendance. Le château devient alors prison. En 1337, Ulrich fait descendre une statue miraculeuse de la vierge en la chapelle Notre-Dame du cimetière de Riquewihr, ce qui donne lieu à une affluence de pèlerins. Dans les années 1470, des travaux dentretien y sont réalisés, avec notamment la pose de nouvelles tuiles fabriquées à Riquewihr, puis à nouveau en 1546. Les Wurtemberg passent à la Réforme, du coup les troupes impériales assiègent le château. En 1547, les troupes de Charles Quint, en guerre contre les protestants, assiègent en vain le château.De nombreux travaux furent ensuite menés. Ainsi en 1558-59, on remplaçait les encadrements et vitres des fenêtres. L'année suivante, la toiture du donjon fut refaite, les travaux durèrent 20 jours. En 1561, on remplaça 800 tuiles plates, et 32 carreaux de poêles furent échangés. Le château du Bilstein est ensuite laissé à labandon et la ruine a servi comme carrière de pierres . Une zone de carrière de grès des Vosges, ayant alimenté le chantier du Bilstein, a été identifiée au sud-ouest du château, au lieu-dit Koenigstuhl. L'édifice fait l'objet d'un classement au titre des monuments historiques depuis 1898.","architecture":"BLISTIEN  Le château du Bilstein Aubure, dit aussi Bilstein Alsacien à ne pas confondre avec le Bilstein Urbeis, se tient à 757 mètres sur la pointe Nord-Est du Schlossberg, à Riquewihr,  le château  des comtes de Montbéliard-Wurtemberg est un monument historique situé à Riquewihr    La construction  date du XIIe au XIVe siècle. Il a été détruit en 1636. Il est aujourd'hui complètement en ruines. Il est doté d'un donjon de forme carée,  du XIIe siècle,  il  est devenu la propriété de l'Etat. Le château du Bilstein Aubure, est appelé le château de Bilstein Alsacien à ne pas confondre avec le Bilstein Urbeis, qui se tient à 757 mètres sur la pointe Nord-Est du Schlossberg, à Riquewihr.Il est classé aux M.H. depuis le 6/12/1898.","habitants":"Les Wurtemberg \"","divers":"château des contes            48°09'57\"N, 7°17'56\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Bilstein_1.jpg","../../jctruffet.com/image/image_68/68_Bilstein_2.jpg"]},"Consult_chateau_formulaire9d7b":{"id":"Consult_chateau_formulaire9d7b","dept":"68","canton":"Altkirch","commune":"Kiffis","nom":"Blochmont","type":"château","periode":"XIII-XV","histoire":"BLOCHMONT, en 1271, le château de Blochmont est cité dans un texte. Il appartient aux seigneurs d'Eptingen, vassaux des comtes de Ferrette (voir leur château) et des évêques de Bâle.   En 1356, le terrible tremblement de terre qui détruit Bâle, démolit aussi le château. En 1357, le château est rebâti.\n En 1449, les seigneurs d'Eptingen soutiennent les Habsbourg contre Bâle. Les Bâlois attaquent le château après 4 jours de siège, il est pris, puis démoli. Il ne fut jamais reconstruit, les hommes et l'histoire ont oublié cette ruine.. Au 21ème siècle, la découverte de la ruine est libre et gratuite. Le risque de recevoir une pierre est important. Ruine réservée aux passionnés, ou aux marcheurs.","architecture":"BLOCHMONT  La première mention du château date de 1271, quand Ulrich de Ferrette le reçoit en fief oblat de lévêque de Bâle, cest-à-dire quil en cède la propriété à lévêché, qui le lui remet immédiatement en fief. Celui-ci passe ensuite dès 1282 à la famille dEptingen qui le conserve dans les siècles qui suivent. Bien quil ny ait pas dinformation à ce sujet dans les documents, il est très probablement endommagé lors du séisme de Bâle de 1356. Son détenteur au milieu du XVe siècle, Hermann dEptingen, sattaque à la ville de Bâle, ce qui entraîne le siège du château qui est pris et détruit en 1449. Les Eptingen le reconstruisent toutefois et le conservent jusquen 1529, date à laquelle il est vendu aux Habsbourg. Encore occupé en 1548, il doit avoir été abandonné peu de temps après, car il est signalé comme étant en ruines en 1551 ;   Kiffis est une commune proche de la frontière Suisse, à 5 km au Sud-Est de Ferrette (voir ce château). Le château est à 1 km Nord-Ouest du bourg.   c'est bien un fossé qui entoure une butte.  Comme souvent dans les ruines oubliées, aucun sentier bien balisé il faut  gravir une pente au sol \"mouvant\".","habitants":"Famille des Habsbourg\"","divers":"Blochmont                                                  47°26'51\"N7°20'37\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Blochmont_1.jpg"]},"Consult_chateau_formulaire7294":{"id":"Consult_chateau_formulaire7294","dept":"68","canton":"Wittenheim","commune":"Bollwiller","nom":"Bollwiller","type":"Château","periode":"XIII-XVI","histoire":"BOLLWILLER, est inscrit aux M.H. depuis 2007. Le château de la Famille de Bollwiller, est cité au XIIe siècle est attesté en 1354, pour la première fois. Le château actuel se composait de deux parties dont la plus ancienne, au nord, datait du milieu du XVIe siècle ; en 1599, Rodolphe de Bollwiller l'agrandit vers le sud, ajoutant une seconde tourelle d'escalier. Au 1er étage, une galerie fut bâtie derrière la façade des 2 corps de bâtiment, avec un plafond à caissons. Le château de Bollwiller devint la propriété de Reinhold de Rosen, en 1649. Ses communs furent rajoutés en 1738. Au début du XIXe siècle, le château est racheté par des industriels qui construisirent une filature, à l'emplacement des communs et des magasins. D'après le plan cadastral de 1839, le château était entouré de douves remplies d'eau, ce n'est qu'au XIXe siècle que les douves du château seront comblées il sera racheté, en 1926, par KST, une société privée d'exploitation de mines de potasse. En 1961, le château de Bollwiller est racheté par l'Association les Papillons Blancs qui en fait, un I.M.P. (Institut Médico-Pédagogique pour Handicapés Mentaux). Le château de Bollwiller est classé aux M.H. depuis le 19.11.2007.","architecture":"BOLLWILLER  l'édifice fait l'objet d'une inscription au titre des monuments historiques depuis 2007.\nLe domaine abrite des instituts médico-éducatifs : l'IME Le château de Bollwiller et l'IMP, domaine Rosen.","habitants":"Famille de Reinhold de Rosen, \"","divers":"Bollwiller; 47°51'44\"N, 7°15'37\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Bollwiller_1.jpg"]},"Consult_chateau_formulairea8bc":{"id":"Consult_chateau_formulairea8bc","dept":"68","canton":"Soultz","commune":"Bucheneck","nom":"Bucheneck","type":"Château","periode":"XII","histoire":"BUCHENECK   l'objet d'une inscription sur l'inventaire supplémentaire des monuments historiques par arrêté du 6 décembre 1984. Le château soultzien existait déjà au XIIe siècle. Il a appartenu à plusieurs familles nobles, ainsi qu'à lévêque de Strasbourg, puis a été la résidence du bailli, il a ensuite changé de mains à diverses reprises avant d'être racheté, dans un état très délabré, par la ville de Soultz en 1977.Sous l'impulsion de Louis Wiederkehr, qui dirigera sa restauration et en deviendra le conservateur, le Bucheneck deviendra le musée.","architecture":"BUCHENECK  c'est devenu un Musée. Il est inscrit aux M.H. depuis 2004. Vendu comme bien national à la Révolution, le château de Bucheneck change plusieurs fois de propriétaires avant d'être racheté, en 1977, dans un état très délabré, par la commune de Soultz. Louis Wiederkehr, qui dirigera sa restauration, deviendra le conservateur du château de Bucheneck, devenu le Musée historique municipal, ouvert au public, depuis septembre 1990. Le Musée présente notamment une section archéologique, une maquette de la ville, des salles consacrées à l'Ordre de Malte, à la communauté juive de Soultz, à la Famille de Heeckeren-d'Anthès, à l'illustrateur Robert Beltz,","habitants":"Famille  de Louis Wiederkehr,\"","divers":"Bucheneck.  47°53'13\"N, 7°13'39\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Bucheneck_1.jpg","../../jctruffet.com/image/image_68/68_Bucheneck_2.jpg"]},"Consult_chateau_formulaire537e":{"id":"Consult_chateau_formulaire537e","dept":"68","canton":"Aargau","commune":"Burgstaller","nom":"Burgstaller","type":"Vestiges","periode":"XV","histoire":"BURGSTALLER  Avant le milieu du XIIIe siècle, la ville de Guebwiller nest pas ceinte de murailles et plusieurs petits châteaux coexistent dans et autour de la ville, habités par les ministériaux de labbaye de Murbach. Cest le cas du Hungerstein, mentionné dès 1179, de lAngreth, mentionné à partir de 1214, et du Burgstall, dont la construction a eu lieu entre le dernier quart du XIIe siècle et le début du XIIIe siècle, bien quil ne soit mentionné quà partir de 1270. À cette date il appartient à la famille dUngersheim, qui existe depuis au moins 1210, bien que le donneur dordre ne soit pas connu : les abbés de cette époque ayant bâti plusieurs châteaux, le Burgstall pourrait également être leurs uvres. Après la construction des fortifications urbaines entre 1260 et 1271, le château se trouve à lintérieur des murs et na alors plus quun intérêt militaire limité. Cela explique peut-être pourquoi Pierre dUngersheim vend en 1270 sa part à labbaye de Murbach, la famille le conservant toutefois sous forme de fief jusque dans le deuxième quart du XVe siècle. À cette date les Ungersheim abandonnent les lieux, qui est alors donné en fief à la famille dOstein, dautres ministériaux de labbaye. Ceux-ci ne loccupent que peu et il semble avoir été loué à un bourgeois de Guebwiller. Ce dernier obtient en 1473 lautorisation de labbé de faire des travaux « dans le vieux château désaffecté », ce qui laisse entendre que le château était  déjà assez délabré à cette époque.Après avoir demandé lautorisation de labbé, les Ostein vendent le château  vers le milieu du XVIe siècle. Il passe ensuite de mains en mains pendant un siècle avant dêtre acheté le 25 février 1693 à un bourgeois de Rouffach par les Antonins du couvent dIssenheim.  Ces immeubles commencent à être démolis à partir du 28 février 1972 dans le cadre du chantier de construction dune supérette, faisant émerger les vestiges.","architecture":"BURGGSTALLER,  Le plan du château prend la forme dun octogone, une disposition rare à cette époque qui se trouve essentiellement dans la région du Rhin supérieur et dans lancien royaume de Sicile. Cette répartition géographique laisse à penser quil y a eu une influence, même si indirecte, de Frédéric II, roi de Sicile et duc dAlsace.  Lenceinte est construite en grès rose, avec un grand appareil de pierres à bossage pour le parement extérieur et un petit appareil pour lintérieur. Elle mesure 22,40 m de diamètre avec des angles à 135°, lépaisseur du mur à la base étant de 1,75 m pour une hauteur de plus de unité 10,40 m daprès la plus haute section conservée en élévation. Il nen subsiste en surface quune partie du mur sud, langle sud-est, langle sud-ouest et une petite partie du mur sud-ouest ; ces vestiges sont en outre les seuls encore visibles du château. Lenceinte est précédée dun fossé inondable par la Lauch, qui a été comblé à la fin du XVe siècle. Il est de profil trapézoïdal, avec un fond de 2 m de large pour une largeur totale de 7,50 m et une profondeur denviron 5 m. Il est encadré du côté extérieur par une berme de 3,50 m de large et côté extérieur par un talus coiffé dune palissade. Laccès se fait sur le côté nord du château, par un pont en bois franchissant le fossé et dans lalignement duquel une porte est percée dans le mur. Celle-ci a été remaniée au moment où les fossés ont été comblés afin de faciliter laccès à la cour intérieure.Au centre exact de lespace formé par lenceinte se trouve un donjon de plan presque carré mesurant 6,55 m de large et 6,70 de long. Celui-ci nétant pas conservé au-dessus des fondations, sa hauteur et sa disposition intérieur ne peuvent être connus. Au pied de la façade orientale du donjon se trouve un puits maçonné en pierres sèches de 4,50 m de profondeur, qui a été comblé vers le milieu du XVIIe siècle. Aucun autre aménagement na été détecté à lintérieur de la cour, bien que la présence dun conduit de latrines et dune fente de lumière percés dans le mur sud laisse à penser quun logis en bois devait être adossé au mur intérieur de lenceinte. La fenêtre percée dans le même mur est en revanche tardive et correspond à la transformation du château en habitation bourgeoise à la fin du XVe siècle.","habitants":"famille dUngersheim\"","divers":"Burgstaller .47°54'39,2\"N, 7°12'35,1\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Burgstaller_1.jpg"]},"Consult_chateau_formulairec45b":{"id":"Consult_chateau_formulairec45b","dept":"68","canton":"Ste-Croix aux mines","commune":"Sainte-Croix-aux-Mines","nom":"Burrus","type":"Château","periode":"XIX","histoire":"BURUS,  est réquisitionné et transformé en centre de formation pour officiers SS. Il est de style néo-baroque. L'usine fut fermée en 1947 et, après la mort de Maurice en 1959, l'édifice fut vendu a une congrégation religieuse, puis revendue à des personnes privées. Le bâtiment a été racheté en 2021 par des personnes privées et est en cours de rénovation.est de style néo-baroque, comme l'Opéra Garnier (1875) ou léglise Saint-Maurice de Freyming-Merlebach (1913). Les architectes sont deux Alsaciens ayant fait leurs études à Stuttgart et à l'École des Beaux-Arts de Paris, Jules Berninger et son beau-frère Gustave Krafft. Le rez-de-chaussée est constitué de huit pièces et d'un hall d'une grande superficie. Le hall présente des colonnes de styles ioniques et corinthiennes (tout comme la salle rouge) et est orné de faux marbres jaunes. Elle est au centre du château et s'ouvre sur toutes les pièces et sur tous les étages.  La salle verte est parée de porte-miroirs qui agrandissent considérablement la pièce. Elle est ornée d'un plafond peint d'un ciel légèrement nuageux. La salle rouge est la plus opulente, avec ses deux colonnes en faux marbre rouge, ses dorures au cuivre qui magnifie tous les détails du plafond, des portes et des murs couverts par endroits de tapisseries de soie satinée rouge. La salle en bois est, comme son nom l'indique, toute en bois du sol au plafond ainsi qu'une moitié de mur recouvert de tapisserie en carton repoussé. Un meuble de style renaissance trône fièrement dans la pièce.","architecture":"HAUT ECHERY, Ce château situé au Petit Rombach, un hameau de Sainte-Croix-aux-Mines, est, aujourd'hui, complètement en ruine. Il est aussi connu sous le nom de château du Haut-Échéry et au début de son existence, il s'appelait initialement, le Château de Belmont. Il a été construit, au XIIIe siècle, par les nobles d'Échéry qui exploitèrent les mines d'argent2. Les ducs de Lorraine tenaient à cette époque l'advocatie du prieuré de Lièpvre. Le château d'Échéry s'élevait sur un pic rocheux, formant une saillie à l'intersection des vallons de Jaboumont et de la Vraie côte qui dominait le fond de la vallée d'une hauteur d'environ 100 mètres. Ce château permettait d'observer tout mouvement de troupes dans la vallée, puisqu'il n'existait qu'une seule route qui passait alors par le Petit Rombach. La route de Sainte-Marie-aux-Mines n'existait pas encore. Elle ne verra le jour qu'à partir de 1721. La route du Petit Rombach  celle qui fut construite par l'abbé Fulrad à l'époque du règne de Pépin le Bref en l'an 750 qui permettait de relier la Lorraine et l'Alsace. Les Ruines du château d'Echéry au Petit Rombac, ce château a été classé Monument historique le 6.12.1898 puis déclassé le 12.05.1932, en raison de son délabrement avancé. Les ruines du Château d'Echéry sont mises en vente,","habitants":"Jules Berninger et son beau-frère Gustave Krafft\"","divers":"Deux châteaux dans cet article;                        Echery GPS : 48°16'06\"N, 7°11'47\"E                  Burus   47°54'39,2\"N,7°12'35,1\"E","gps":"48°16'06\"N, 7°11'47\"E                  Burus   47°54'39,2\"N,","images":["../../jctruffet.com/image/image_68/68_Burus_1.jpg","../../jctruffet.com/image/image_68/68_Burus_2.jpg"]},"Consult_chateau_formulairec84c":{"id":"Consult_chateau_formulairec84c","dept":"68","canton":"Butenheim","commune":"Butenheim","nom":"Butenheim","type":"Vestiges","periode":"XIII","histoire":"Château de Breuschwickersheim,  site officiel de la commune.                                                    BUTENHEIM, le château fort de Butenheim est une ancienne motte castrale du XIe siècle, puis château fort des XIIe et XVIe siècles, de l'ancien village de Butenheim (actuel Petit-Landau) dans le Haut-Rhin, en Alsace. Ses ruines sont inscrites aux monuments historiques depuis 1964.  Cette seigneurie est vassale de la dynastie des descendants du comte Gontran le Riche, comte d'Alsace de 917 à 954, comte du Sundgau, et autres titres (fondateurs de la maison de Habsbourg en 1020 au château de Habsbourg en Suisse voisine, territoires héréditaires des Habsbourg). Elle est implantée dans la plaine d'Alsace, à 20 km à l'est de Mulhouse, sur le lieu-dit « Altdorf », proche du Rhin, actuelle frontière franco-allemande, dans une zone de marais, sur la rive dun ancien bras du Rhin  Landau vient de lalémanique Landowva, « Land », terre, et « Auw », prairie humide)","architecture":"BUTENHEIM, au XIIe siècle le château fort et son donjon sont construits sur la motte castrale précédente. Plusieurs familles de seigneurs vassaux des Habsbourg s'y succèdent. Il est endommagé en 1468 par les Suisses, reconstruit et agrandi par la maison d'Andlau au XVIe siècle, ruiné et incendié pendant la guerre de Trente Ans (1618-1648), et ses ruines rasées en 1865. Le site archéologique est fouillé dans les années 1980. Il ne subsiste à ce jour du village et de son château fort, qu'un bosquet d'arbres au milieu des champs, et quelques vestiges de murs et de circonvallations, entre le Rhin et la route D 468, au lieu-dit Altdorf, dans la commune de Petit-Landau.","habitants":"seigneurs vassaux des Habsbourg \"","divers":"Butenheim                              47°44'46\"N, 7°30'54\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Butenheim_1.jpg"]},"Consult_chateau_formulaired474":{"id":"Consult_chateau_formulaired474","dept":"68","canton":"Colmar","commune":"Colmar","nom":"Colmar","type":"Châteaux","periode":"XVI-XVIII","histoire":"COLMAR;Le Koïfhus (l'Ancienne Douane) achevé en 1480, est le plus ancien bâtiment public de la ville. A l'époque, il a joué un rôle central dans la vie économique de Colmar. Mentionné pour la première fois en 1370, le bâtiment servait au dépôt et au transit de tous les marchandises importées à Colmar.                                Cet édifice est classé au titre des monuments historiques de la France. Il est répertorié dans la base Mérimée, base de données sur le patrimoine architectural français du ministère de la Culture, sous la référence.                                                                                  Palais de l'ancien Oberlandesgericht construit de 1902 à 1906 suivant les plans des architectes Kuder et Müller, transformé en cour d'appel de Colmar en février 1919. Son architecture s'inspire du baroque allemand du 18e siècle. Le hall d'entrée est marqué par un escalier d'honneur monumental.","architecture":"KIENER  en 1937, la famille Kiener vend la villa à la ville de Colmar\n- de 1940-1945, la villa sert de sous-préfecture (Kreisleitung) pendant l'occupation allemande\n- en 1945, à la Libération, la villa Kiener devient bien national\n- en 1955, le bâtiment est attribué à l'Inspection académique\n- de 1960 à 1976, la villa est transformée en internat pour le lycée de jeunes filles Camille-Sée (à l'époque situé dans les locaux de l'actuel Lycée Schongauer), ajout d'un tennis et d'un plan d'eau\n- en 1977, la direction de l'inspection académique reprend possession des lieux en 2016, l'inspection académique déménage                                                                                        COLMAR; palais  Façades et toitures, hall d'entrée avec escalier d'honneur (cad. OB 20) : inscription par arrêté du 15 novembre 1985.  tous les bâtiments Palais de l'ancien Oberlandesgericht construit de 1902 à 1906 suivant les plans des architectes Kuder et Müller, transformé en cour d'appel de Colmar en février 1919. Son architecture s'inspire du baroque allemand du 18e siècle. Le hall d'entrée est marqué par un escalier d'honneur monumental.","habitants":"architectes Kuder et Müller\"","divers":"Kiener grav 9                                Colmar                           48°05'39\"N, 7°22'09\"E                     Palais                        48°04'17\"N, 7°21'03\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Colmar_1.jpg","../../jctruffet.com/image/image_68/68_Colmar_2.jpg","../../jctruffet.com/image/image_68/68_Colmar_3.jpg","../../jctruffet.com/image/image_68/68_Colmar_4.jpg","../../jctruffet.com/image/image_68/68_Colmar_5.jpg","../../jctruffet.com/image/image_68/68_Colmar_6.jpg","../../jctruffet.com/image/image_68/68_Colmar_7.jpg","../../jctruffet.com/image/image_68/68_Colmar_8.jpg","../../jctruffet.com/image/image_68/68_Colmar_9.jpg"]},"Consult_chateau_formulairef780":{"id":"Consult_chateau_formulairef780","dept":"68","canton":"Cernay","commune":"Engelbourg_Thann","nom":"Engelbourg","type":"Vestiges","periode":"XIII","histoire":"ENGELBOURG, ce château fut construit au XIIIe siècle par le comte de Ferrette pour surveiller la vallée de la Thur. À la suite des traités de Westphalie qui rattachent l'Alsace à la France, la frontière est repoussée des Vosges sur le Rhin et ce château perd son intérêt stratégique. Louis XIV ordonne alors, en février 1673, le démantèlement du château de d'Engelbourg. Le travail est confié à l'intendant Mathias Poncet de la Rivière, qui le fait exécuter par des mineurs de Giromagny. Après plusieurs tentatives, la grosse tour du donjon se soulève et se brise en plusieurs parties ; l'une d'entre elles est retombée pour former ce qu'on a surnommé « l'il de la Sorcière ».Les ruines spectaculaires ont été représentées sur plusieurs gravures romantiques du XIXe siècle. Les restes de l'édifice sont classés au titre des monuments historiques depuis 18981.\nDepuis 2006, chaque année des jeunes bénévoles viennent restaurer les ruines du château par l'intermédiaire de l'association Études et Chantiers Grand Est. De 2006 à 2012, des sections de murs et murailles, dont un appareil défensif contre l'artillerie, ont été mises au jour et consolidées. Un relevé très détaillé a été réalisé à cette occasion, et a permis une reconstitution informatique en 3D du site.","architecture":"ENGELBOURG, donjon circulaire, la tour des Sorcières est un flanquement cylindrique avec de courtes archères et des bouches à feu ovales. Dans sa dernière extension la forteresse dont le cur, avec son donjon et le logis qui le jouxtait, sont du XIIIe siècle. Elle a une forme ovale de 150 m de long sur 70 de large, sur un petit mamelon de 445 m d'altitude, entouré d'enceintes étagées.« L'il de la sorcière », toujours en place, témoigne de la cohésion de certains mortiers à la fin du Moyen Âge.","habitants":"Comte de Ferrette\"","divers":"Engelbourg\n47°48'53\"N, 7°06'04\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Engelbourg_1.jpg","../../jctruffet.com/image/image_68/68_Engelbourg_2.jpg"]},"Consult_chateau_formulaire1e32":{"id":"Consult_chateau_formulaire1e32","dept":"68","canton":"Sélestat","commune":"Kintzheim","nom":"Fabvier_Kintzheim","type":"Forteresse","periode":"XIV-XV","histoire":"KINTZHEIM, le château FABVIER a été construit au XIIe siècle. Il abrite aujourd'hui la Volerie des aigles. En 1227, le château appartenait à Thierry de Kintzheim, qui le détenait en fief avec l'abbaye d'Andlau. En 1262, ce sont les frères Hartmann et Egilof de Rathsamhausen et les Kagen qui deviennent prorpiétaires du château. Les Rathsamhausen s'estimant lésés lors du partage  reçu de Adolphe de Nassau, se rangeront du côté d'Albert de Habsbourg, le concurrent direct au trône impérial. Du temps d'Adolphe de Nassau, des querelles opposent ce prince à Albert de Habsbourg. Le château Fabvier fut détruit en 1298 par l'évêque de Strasbourg partisan d'Adolphe de Nassau. Les Rathsamhausen le firent reconstruire aux XIVe siècle et XVe siècles. Seuls les anciens bâtiments ont résisté à la destruction. En 1341, les héritiers des frères Rathsamhausen le  revendent  à la ville de Sélestat. En 1492, il  est revendu à la ville de Sélestat par Jean de Hattstatt qui y maintienent un bailli jusqu'à la destruction du château, en 1632, par l'Armée Suédois. Le Seigneur de Kintzheim sera remplacé par le Magistrat de Sélestat, il est revendu, en 1649, à Jean-Guillaume de Gollen, ainsi que ses droits féodaux qui y sont rattachés comme clauses il devient dès lors le seigneur de Kintzheim. Les parties détruites seront reconstruites et la chapelle, restaurée. En 1739, la famille Gollen s'éteint. Kintzheim passe à la famille de Broc. En 1765, les seigneurs de Kintzheim continuent d'entretenir le château mais ne l'habitent plus. Un ermite vient s'installer au-dessus de la chapelle consacrée au culte de Saint Jacques. En 1789, a lieu l'abolition des privilèges.","architecture":"KINTZHEIM  cesse d'être un domaine féodal. Le seigneur n'a plus l'autorisation d'y exercer la justice et de prélever des impôts. En 1801, le Marquis de Broc, dernier seigneur du château de Kintzheim, le  vend . La ville de Sélestat demande alors de bénéficier du droit de préemption telle qu'il était apparu sur l'acte de vente de 1649. La ville engage alors une procédure judiciaire pour retrouver ses droits sur le château. En 1804, Napoléon Ier signe de sa main un décret impérial déboutant la ville de Sélestat de sa requête. Le Château Fabvier devint une propriété privée et sera racheté, en 1802, par Gaëtan Mathieu de Fabvier. Il fit élever, dans le village, un manoir de style Directoire et fit aménager un grand parc paysager à l'anglaise. En 1945, au cours des combats pour la Libération, le château qui constitue un observatoire très recherché, est atteint par de nombreux obus, dont les points d'impact sont encore visibles, sur le donjon. Depuis 1968, le château Fabvier abrite la Volerie des Aigles, pour la plus grande joie de nombreux touristes.","habitants":"Kintzhein les  frères Rathsamhausen et au Marquis de Broc,\"","divers":"Kintzheim GPS : 48°15'22\"N, 7°23'11\"E","gps":"48°15'22\"N, 7°23'11\"E","images":["../../jctruffet.com/image/image_67/67_Fabvier_Kintzheim_1.jpg"]},"Consult_chateau_formulaire6948-2":{"id":"Consult_chateau_formulaire6948-2","dept":"68","canton":"Ferrette","commune":"Ferrette","nom":"Ferrette","type":"Vestiges","periode":"XVI","histoire":"FERRETTE, entre les mains d'une troupe de soldats suédois du Rhingrave d'Erlach, en 1632, durant la guerre de Trente Ans, malgré sa défense assurée par Jean-Adam de Ferrette. Deux ans plus tard, les paysans en révolte chassent la garnison suédoise du château, qui revient  avec des renforts. Ils prennent le village,  pourchassent les habitants puis détruisent les fortifications. En 1635, c'est au tour des troupes françaises d'attaquer le château. Une fois pris, il est en partie brûlé et détruit. Seul la partie basse sera restaurée. En 1651, Jean-Adam de Ferrette cède ses droits de propriété à son fils Philippe-Jacques de Ferrette, qui épouse Marie-Anne de Schoenau. En 1659, Louis XIV donne plusieurs seigneuries à son premier ministre Mazarin, dont celle de Ferrette. Il devient peu à peu une ruine.Il l'offre ensuite à sa nièce dont le mari prend les titres de duc de Mazarin et comte de Ferrette. Ces titres seront transmis à ses héritiers qui existent toujours en la personne du prince de Monaco, qui porte toujours le titre de comte de Ferrette. En 1671, le fils ainé de Philippe-Jacques de Ferrette, Jean-Joseph de Ferrette, hérite du château. En 1721, Marie-Anne de Ferrette, épouse de Jean-Jacques-Nicolas Reich de Reichenstein, en devient héritière à la mort de son père, Jean-Joseph. Par la suite, elle vend le château à la branche Ferrette-Carspach. François--Antoine de Ferrette-Carspach le fait démolir. En 1777, la seigneurie passe aux mains d'Honoré IV prince de Monaco, qui devient propriétaire du domaine de Ferrette par son mariage avec Louise d'Aumont, héritière de Mazarin. Le 29 juillet 1789, lors de la « Grande Peur », le château-bas est pillé et incendié par des paysans révoltés venant de la vallée de Saint-Amarin. Il est, dès lors, totalement abandonné et sert de carrière de pierre.","architecture":"FERRETTE,classées monument historique depuis 1930, les ruines du château sont entretenues et consolidées avec l'aide financière de la ville de Ferrette, des Services des Bâtiments de France. Le château a été vendu à un particulier en 2011.  Un moine de Lucelle y décrit deux entrées, trois cours et trois maisons. En 1600, le château possède trois bâtiments :l'Oberschloss ou château supérieur, creusé en partie dans le roc, compte six salles chauffées par un poêle et onze chambres, une cave à l'entrée, une cuisine et une étuve. Deux escaliers permettent son accès à cheval ou en chariot. Cet édifice est séparé de la tour du puits par une petite cour. Il correspond à l'ancien château des comtes de Ferrette et son accès depuis le nouveau château se faisait par une rampe depuis la grande cour. Cette partie du château possède un puits de 60 m de profondeur, la maison du bailli possède elle quatre salles, sept chambres, deux cuisines, une écurie pour y loger trois chevaux, une cave et même une salle de bains ; elle possède aussi des greniers pour y loger 1000 rézaux de grains, un bastion avec deux cachots était prévu pour défendre ce bâtiment ;  la Maison des chevaliers n'a qu'une salle et une chambre mais surtout des greniers capables de contenir 500 rézaux de grains.Un mur, avec des tours et des bastions prévus pour soutenir une attaque ponctuelle, entoure le château.  Dans son roman intitulé Anne de Geierstein, écrit en 1829, Walter Scott fait figurer le château de Ferrette et les méfaits de Pierre de Hagenbach, qui fut décapité pour ses nombreuses exactions.En 1838, le château est vendu à Jean Zuber, riche industriel et fabricant de papier peint à Rixheim, il est classé monument historique en 1842. En 1862, le château appartient à  la famille Zuber de Rixheim.","habitants":"Ministre Mazarin,                    famille de Philippe-Jacques de Ferrette\"","divers":"Ferrette                                        47°29'36\"N, 7°19'06\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Ferrette_1.jpg"]},"Consult_chateau_formulaireca49":{"id":"Consult_chateau_formulaireca49","dept":"68","canton":"Cernay","commune":"Lembach","nom":"Fleckenstien","type":"Vestiges","periode":"XII-XVII","histoire":"FLECKENSTEIN, c'et ancien château fort a été bâti au XIIe siècle.Il est de style semi-troglodyte. Son premier propriétaire était le Baron de Fleckenstein. Le château de Fleckenstein, attesté en 1165 a été construit à partir du XIIe siècle, et ce fief est resté aux barons de Fleckenstein jusqu'en 1720. Au XVIe siècle est  partagé entre les deux branches des Fleckenstein. Les armes de Frédéric de Fleckenstein et celles de sa seconde femme, Catherine de Cronberg ornent la tour d'escalier. Le château du Fleckenstein faisait partie des châteaux chargés de surveiller la route de liaison entre Bitche et Wissembourg. Il fut détruit en 1689 par le Général Melac, commandant les troupes du Baron de Montclar, sous Louis XIV. Le Château  du Fleckenstein passera ensuite dans les mains de la Famille Vitzthum d'Egersberget. Puis, en 1812, les ruines seront rachetées par Jean-Louis Apffel; à nouveau, ils change de propriétaire et sera racheté, en 1813 par le Général Harty, baron de Pierrebourg. En 1919, il sera la propriété de l'État, puis en 1958, appartiendra au Syndicat d'Initiative de Lembach. Le circuit des quatre châteaux invite les visiteurs, à l'inclure dans leur parcours, 3 autres sites fortifiés proches : le château du Hohenbourg, de Lwenstein et la Wegelnburg (Palatinat).","architecture":"FLECKENSTEIN est un château emblématique des Vosges du Nord parmi les plus visités dAlsace.  Edifié au XIIe siècle , le château sérige en sentinelle sur la ligne de défense des châteaux du Saint Empire romain germanique entre les villes impériales de Haguenau et de Kaiserslautern. Ses ruines témoignent de sa réputation de véritable citadelle imprenable et occupent une position remarquable doù lon peut observer une jolie vue sur la Vallée de la Sauer et les vastes forêts des Parcs Naturels Régionaux des Vosges du Nord et du Palatinat.   Il est finalement détruit sans livrer bataille par les armées de Louis XIV en 1680 qui le font sauter à la poudre noire. Murs denceinte et barbacane dentrée, tour du puits du XIII° et tour descalier du XVIe, puits et citernes, salles aux allures de caverne et escaliers taillés dans le rocher constituent autant déléments architecturaux justifiant son classement en monument historique dès 1898. Ils permettent au visiteur même peu averti de comprendre les étapes de lévolution de la forteresse médiévale.","habitants":"Famille Vitzthum d'Egersberge\"","divers":"FleckenstieN                       GPS : 49°02'41\"N, 7°46'19\"E","gps":"49°02'41\"N, 7°46'19\"E","images":["../../jctruffet.com/image/image_68/68_Fleckenstien_1.jpg"]},"Consult_chateau_formulaireb22d-2":{"id":"Consult_chateau_formulaireb22d-2","dept":"68","canton":"Sainte-Marie-aux-Mines","commune":"Ribeauvillé","nom":"Girsberg","type":"vestiges","periode":"XIV","histoire":"trois châteaux à Ribeauvillé, celui de Girsberg celui de St-Ulrich, de Steinau donjon pentagonal.                                                         GIRSBERG, le château du Girsberg (anciennement nommé Petit-Ribeaupierre) est lun des trois châteaux (avec le château de Saint-Ulrich et le Haut-Ribeaupierre) qui dominent la commune française de Ribeauvillé,. Il est situé à 528 m daltitude. Les vestiges des trois châteaux font lobjet dun classement au titre des monuments historiques par arrêté du 1er octobre 1841 et par le Journal Officiel du 16 février 1930. Ce sont les sires de Ribeaupierre qui édifièrent ce château au XIIIe siècle dénommé dabord Stein (La Roche) et le reconstruisirent après un incendie occasionné par la foudre en 1288.  En 1304, ils donnèrent en fief à des vassaux, les chevaliers de Girsberg dont il prit le nom.  Les Girsberg restèrent en possession du château jusqu'en 1422, date à laquelle une querelle étant survenue entre Guillaume de Girsberg et Maximin Ier de Ribeaupierre et Jean comte de Lupfen, le noble de Girsberg fut tué dans une attaque du fort, ce qui amena le retour des Ribeaupierre.  Les Girsberg le gardèrent jusquà leur extinction au XVe siècle. Il est abandonné au XVIIe siècle.","architecture":"GIRSBERG,  les vestiges actuellement visibles datent de plusieurs époques. Le donjon pentagonal et de plan carré à l'intérieur, construit en pierre, granit et grès, daté du XIIIe siècle a été classé monument historique en 1841.\nLe logis qui jouxte le donjon, est formé de deux bâtiments, dont l'un bâti en suivant le rocher n'est pas de forme régulière. Ils sont flanqués d'une tour demi-circulaire. Les logis comme la basse-cour sont datés du XIVe siècle.\nUne niche gravée d'un tau a été découverte en 1927. Le château du Gisberg est un château bâti à Ribeauvillé. C'est un ancien château fort, de style Médiéval, du XIIIe siècle. Le château du Gisbert fait partie des trois châteaux à découvrir, se trouvant à Ribeauvillé. Ce sont les Seigneurs de Ribeaupierre qui firent édifier le château du Gisberg, appelé en premier château de Stein (La Roche) et le firent reconstruire après un incendie occasionné par la foudre en 1288. En 1304, Mais une querelle survenant entre Guillaume de Girsberg et Maximin Ier de Ribeaupierre et Jean comte de Lupfen, le noble de Girsberg fut tué dans une attaque du fort, ce qui amena le retour des Ribeaupierre. Les Girsberg gardèrent le chateau jusquà leur extinction au XVe siècle. Il  sera abandonné qu'au XVIIe siècle, il est, en ruines aujourd'hui.","habitants":"chevaliers de Girsberg \"","divers":"trois châteaux à Ribeauvillé, celui de Girsberg celui de St-Ulrich, et de SteiNau donjoNpentagonal.             48°12'13\"N, 7°18'26\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Girsberg_1.jpg","../../jctruffet.com/image/image_68/68_Girsberg_2.jpg","../../jctruffet.com/image/image_68/68_Girsberg_3.jpg"]},"Consult_chateau_formulaire16bb":{"id":"Consult_chateau_formulaire16bb","dept":"68","canton":"Wettolsheim","commune":"Wettolsheim","nom":"Hagueneck","type":"Vestiges","periode":"XIVe","histoire":"HAGUENECK  le nom du château apparaît pour la première fois dans un document de 1263 mentionnant Burcart von Hagenecke. Cette famille, qui se trouve dans le camp dAdolphe de Nassau en 1298, est probablement apparentée à celle des seigneurs de Wettolsheim, qui possèdent le village depuis la première moitié du XIIIe siècle. Cette branche périclite toutefois dès la première moitié du XIVe siècle et le château est vendu en 1300,aux seigneurs de Laubgasse. Ceux-ci entrent alors en conflit avec les seigneurs de Haus et de Hattstatt, qui prennent dassaut le château et lincendient en 1304. Peu après le milieu du XVe siècle, le Hagueneck est partagé entre plusieurs copropriétaires, dont lun, Ulrich Stör, y entretient un châtelain. Ce dernier est chassé par le seigneur de Rust, un autre copropriétaire, ce qui semble avoir entraîné labandon du château, daprès un procès ayant eu lieu en 1482 et les constatations archéologiques. Il est mentionné en 1640 comme étant une ruine.Le château fait lobjet de restaurations en 1884, 1932 et 1972.","architecture":"HAGUENECK, le noyau castral est la partie la mieux préservée du château et est composé du donjon et dun logis regroupé dans une enceinte quadrangulaire. Cette partie du château est essentiellement construite en granite, mais le grès jaune de Rouffach a également été utilisé pour les parties devant être plus finement taillées, notamment les bordures de fenêtres. Les maçonneries sont réalisées dans un moyen appareil assez soigné, avec des pierres à bossage en forme de coussin aux angles. Implanté sur le mur sud de lenceinte, le donjon est une tour carrée de sept mètres de côtés, qui a la particularité dêtre presque entièrement pleine. Laccès se fait par une porte en plein cintre percée du côté nord, aux trois-quart de la hauteur de la tour. De là, un étroit couloir mène à un escalier en colimaçon situé au centre, qui permet daccéder au sommet.. Lescalier donnant accès à la porte et son implantation sont modernes : laccès original se faisait par une galerie couverte en bois reliée au mur denceinte occidental.","habitants":"F&mille de Burcart von Hagenecke\"","divers":"Hagueneck                                           48°03'08\"N, 7°16'30\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Hagueneck_1.jpg","../../jctruffet.com/image/image_68/68_Hagueneck_2.jpg","../../jctruffet.com/image/image_68/68_Hagueneck_3.jpg"]},"Consult_chateau_formulaire8867-2":{"id":"Consult_chateau_formulaire8867-2","dept":"68","canton":"Guebwiller","commune":"Hartmannswiller","nom":"Hartmannswiller","type":"château","periode":"XVIII","histoire":"HARTMANNSWILLER;  Le château est souvent daté à tort du XVIIIe siècle, il est héritier d'une longue évolution architecturale et d'une histoire compliquée. Ses origines sont mal connues. Mais, dès 1308, le château était entre les mains de Dietrich de Haus qui le céda à l'Église Frédéric, évêque de Bâle, donne en 1450 à Hermann V de Waldner le fief castral . Cette investiture fut renouvelée en 1454 par l'évêque Arnold tant en faveur d'Herman que de ses cousins Jean et Guillaume. Herman V céda en 1453, le château de Harmannswiller à Jean Henri Mewart pour le posséder sa vie durant. À la mort de ce dernier, Jean, évêque de Bâle, investit de nouveau en 1476 Hermann XI de Waldner et ses agnats (parent par agnation, descendant d'une même souche masculine) opposé à cognat. Après la mort de Hermann VI de Wagner tué à Olbsbruck près de Trente, le château passa à Jean-Guillaume, son frère aîné. En partie détruit par la guerre de Trente Ans, il fut réparé au milieu du XVIIe siècle par Philippe Jacques 1er de Waldner le rebâti par son petit-fils Chrétien Charles-Philippe qui employa à cet effet les matériaux du Castel ruiné du Weckenthal près de Berrwiller avec l'autorisation de l'évêque de Bâle en 1718.\nDésormais, le château resta aux mains des Waldner de Freundstein de la branche de Sierentz jusqu'à la Révolution française. Vers le milieu du XIXe siècle, Joseph Baumann, horticulteur à Bollwiller, acheta le Manoir. En 1855, il le revendra à Constant Zeller qui a fait fortune dans l'exploitation de la tuilerie d'Ollwiller Brillant ingénieur, Constant Zeller inventa un vernis révolutionnaire appliqué sur les tuyaux en argile comprimée auparavant lavée, triturée et malaxée. La tuilerie exploitait les gisements d'argile et de marne tertiaire situé sur les bans du village.","architecture":"HARTMANNSWILLER   La qualité de ses tuyaux s'est révélée bien supérieure à ceux fabriqués en ciment, grès ou fonte. Travailleur acharné et contactant une nombreuse clientèle sur tout le territoire, il réussit à décrocher des contrats avec l'État, les grandes compagnies de Chemin de Fer, les propriétaires de Domaine, l'industrie, l'agriculture et surtout les communes et municipalités.Son entreprise se développa à tel point qu'en 1864, il fut obligé de construire un nouveau bâtiment et un four de plus grande capacité. À cette époque, la tuilerie employa plus d'une centaine d'ouvriers. Constant Zeller est devenu membre de l'Académie nationale de Paris, obtient un premier prix à l'Exposition universelle de 1867 et de nombreuses autres distinctions dans différentes expositions.  Actuellement, on voit un grand logis en équerre dont une partie pourrait être datée du XIVe siècle. On remarque particulièrement les bases chaînées aux angles de bossages. À l'intérieur du bâtiment, une tour circulaire à l'intérieur de laquelle un escalier en vis ou à colimaçon  est ornée à l'entrée d'une porte sculptée et gravée sur le montant supérieur de la date de 1562. À l'angle sud-est, vestige d'une tour carrée, à l'angle nord-est, une tour en poivrière. Certaines fenêtres pourraient être de la Renaissance mais la plupart ont été repercées aux XVIIIe et XIXe siècles. Un plan de 1756 conservé aux archives départementales du Haut-Rhin montrent qu'une vaste basse-cour trapézoïdale flanquée de deux tours rondes aux angles précédait l'édifice au sud ou ouest. L'ensemble était entouré de larges fossés d'eau.","habitants":"Famille de  Jean Henri Mewart \"","divers":"Hartmannswiller              47°51'45\"N, 7°13'08\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Hartmannswiller_1.jpg"]},"Consult_chateau_formulaire373b":{"id":"Consult_chateau_formulaire373b","dept":"68","canton":"Colmar","commune":"Haut_Eguisheim          Dagsbourg, Wahlenbourg, Weckmunt","nom":"Haut_Eguisheim","type":"château","periode":"XI-XVIII","histoire":"Haut-Eguisheim.Dagsbourg, Wahlenbourg,.\nDès le XIe siècle, ces trois forteresses formaient un seul et même château. Le constructeur en est sans doute le comte Hugues IV de Nordgau. époux de Heilwige de Dabo, héritière du comté de Dabo (Dagsbourg). Mais le premier à porter le nom de \"Comte d'Eguisheim\", fut Gérard, tué, lors d'une guerre  privée, par un seigneur de Rappolstein (Ribeaupierre).Gérard est le frère  aîné de Bruno, évêque de Toul,  puis, de 1049 à 1054, pape sous le nom de Léon IX..  Une première destruction de la place forte fut menée, en 1026, par Ernest, duc de Souabe et d'Alsace.A la fin du XIe siècle la famille \"d'Eguisheim-Dabo\" est au sommet de sa gloire, elle s'alliera aux comtes de Vaudémont, peu à peu, la propriété sera divisée lors de successions et de mariages. En 1150, une partie de la forteresse échouera aux comtes de Ferrette.\nUn conflit entre Otton de Brunswick et Philippe de Souabe provoquera, en 1199, la destruction de la partie restée entre les mains des Eguisheim-Dagsbourg.La mort, sans héritiers directs, de la comtesse Gertrude de Dabo, en 1225, déclenchera une violente guerre entre trois prétendants : les comtes de Ferrette réels descendants de la famille, Simon de Linange dernier époux de Gertrude  et l'évêque de Strasbourg acheteur des droits de propriété de deux oncles maternels de la comtesse. De cette opposition nait la fameuse guerre de succession des Eguisheim-Dabo qui meurtrira l'Alsace entre 1227 et 1230. L'évêque en sort vainqueur. Il détiendra le Dagsbourg (château nord) et sera reconnu suzerain du Weckmund (Vaudémont) et du Wahlenbourg par les comtes de Ferrette.,  un valet, Hermann Klee, se prend de querelle avec ses employeurs et déclanche ainsi, en 1466, la guerre des six deniers. Ce conflit entraînera la destruction de Haut-Eguisheim.","architecture":"Daprès les habitants du village dEguisheim, ces trois châteaux auraient un rôle symbolique fort. Lun serait source de feu, le deuxième source deau et le troisième serait une mine dor ! Il est également dit que les châteaux ont un rôle de cadran solaire qui permettait de guider les travailleurs dans les plaines environnantes.. Le Wahlenbourg est le château situé au centre du site des trois châteaux dEguisheim. Tout comme le Dagsbourg, le château dispose dun fossé. Celui-ci date du début du XIIIe siècle et sépare le château du Weckmund. Le donjon est également réalisé en pierres à bosse et en pierres lisses mais il comprend des dimensions plus modestes avec une hauteur de 23,5 mètres et une superficie de 8,50 mètres carrés. A lépoque, on pouvait y accéder à partir du logis grâce à une porte. Ce logis date des années 1150.\nNous pouvons également apercevoir la chapelle Saint-Pancrace qui date du XIIe siècle. Il sagit du seul édifice qui a été épargné par la destruction du site en 1466.  Le Weckmund est le troisième châteaux du site et il se situe au Sud. Il se compose dun donjon construit au début du XIIIe siècle à partir de pierres à bosse. Celui-ci a les mêmes mesures que le donjon du Wahlenbourg et a été victime dun incendie qui a touché son flanc nord-ouest.","habitants":"Hugues IV de Nordgau. \"","divers":"Haut_Eguisheim_             48°02'20\"N, 7°16'23\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Haut_Eguisheim_1.jpg","../../jctruffet.com/image/image_68/68_Haut_Eguisheim_2.jpg","../../jctruffet.com/image/image_68/68_Haut_Eguisheim_3.jpg","../../jctruffet.com/image/image_68/68_Haut_Eguisheim_4.jpg"]},"Consult_chateau_formulaire73d3":{"id":"Consult_chateau_formulaire73d3","dept":"68","canton":"Sainte-Marie-aux-Mines","commune":"Ribeauvillé","nom":"Haut_Ribeaupierre","type":"château-fort","periode":"XIII","histoire":"HAUT-RIBEAUPIERRE  Il aurait été construit sur un ancien site romain. Connu sous le nom d'Altenkastel, c'est Anselme de Ribeaupierre qui prend possession de ce château vers 1288. Il a reçu la visite de l'empereur Rodolphe IV de Habsbourg en 1280 et 1284, puis à nouveau en 1286 pour un siège au cours duquel fut signé un traité important passé entre le roi de France Charles VII et le sire de Ribeaupierre. Par ce traité, ce dernier s'engagea à tenir toujours le fort ouvert aux forces des rois de France. Vers 1368, Brunon de Ribeaupierre en devient propriétaire. Vouant une haine féroce aux Anglais, il enferme dans son donjon le chevalier John Harleston, qui avait eu le malheur de parader dans la région avec un sauf-conduit impérial, de 1384 à 1387. John Harleston ne sera libéré que contre une forte rançon et à la suite de fortes pressions de l'empire. À la fin du XIIIe siècle, le château devint une résidence des Ribeaupierre. Un autre prisonnier de marque sera enfermé dans le donjon du Haut-Ribeaupierre en 1477. Il s'agit de Philippe Ier de Croÿ (1435-1511), comte de Chinay, allié de Charles le Téméraire fait prisonnier par un Ribeaupierre à Nancy,","architecture":"HAUT-RIBEAUPIERRE  C'était un château de style Médiéval. Sa construction date de 1084. 1084. Son origine remonte aux Comtes d'Eguisheim, propriétaires primitifs de la terre des Ribeaupierre. Il aurait été construit sur un ancien site romain, puis à nouveau en 1286 pour un siège au cours duquel fut signé un traité important passé entre le roi de France Charles VII et le sire de Ribeaupierre,  John Harleston ne sera libéré que contre une forte rançon et à la suite de fortes pressions de l'empire. À la fin du XIIIe siècle, le château devint une résidence des Ribeaupierre. Un autre prisonnier de marque sera enfermé dans le donjon du Haut-Ribeaupierre en 1477. Il s'agit de Philippe Ier de Croÿ (1435-1511), comte de Chinay, allié de Charles le Téméraire fait prisonnier par un Ribeaupierre à Nancy.Il ne reste que des ruines et un donjon restauré du château du Haut-Ribeauvillé Cerné par les mauvaises herbes, le château du Haut-Ribeaupierre, tombé en ruines, fait l'objet de consolidations..","habitants":"Roi Charles VII \"","divers":"Ribeauvillé  Haut_Ribeaupierre","gps":"","images":["../../jctruffet.com/image/image_68/68_Haut_Ribeaupierre_1.jpg","../../jctruffet.com/image/image_68/68_Haut_Ribeaupierre_2.jpg","../../jctruffet.com/image/image_68/68_Haut_Ribeaupierre_3.jpg"]},"Consult_chateau_formulaire22b0":{"id":"Consult_chateau_formulaire22b0","dept":"68","canton":"Saint-Louis","commune":"Hegenheim","nom":"Hegenheim","type":"Château","periode":"XVIII","histoire":"HEGENHEIM,  un sentiment anti-juif croissant s'accentue pendant l'année révolutionnaire de 1848. Le 23 avril 1848, une dispute éclate parce que des paysans de Hagenthal avaient chanté des chansons anti-juives. Lors d'une bagarre, un non-juif perd un doigt. À la suite de cela, la garde nationale juive est désarmée par une foule enragée, les juifs sont attaqués et plusieurs maisons juives sont prises d'assaut et complètement dévastées. Un enfant est tué. Seul le déploiement de troupes a pu mettre fin aux émeutes le 25 avril.  Avant la Première Guerre mondiale, Hégenheim était un important centre de production horlogère. La manufacture de montres Lévy employait une centaine d'ouvriers, dont la moitié venait de Suisse. Elle a été remplacée par la Société anonyme Manufacture d'horlogerie du Haut-Rhin (usqu'en 1963.","architecture":"HEGENHEIM L'édifice fait l'objet d'une inscription au titre des monuments historiques depuis 1990. Cette maison a été transmise jusqu'à nos jours à l'intérieur de la même famille, par héritage, dot de mariage, voire donation aux Barbier, Barbier-Schroffenberg, Gohr, Leoprechting, Reinach-Foussemagne, Reinach-Hirtzbach qui en sont actuellement propriétaires.\nIl s'agit du seul bâtiment inscrit au titre des Monuments Historiques de Hégenheim (1990).Le XVIIe siècle est marqué par l'installation d'une forte communauté juive aux portes de Bâle où ils ne sont pas tolérés. Il y avait cependant un cimetière. En 1673, Hannibal de Baerenfels vendit aux juifs un terrain à destination de synagogue et qui prit une importance régionale, et contient environ 8 000 tombes. La synagogue a été construite en 1723, brûlée par les troupes d'invasion alliées en juin 1815, reconstruite en 1821. L'asile pour vieillards israélites a ouvert en 1874.En 1838, il y avait 845 israélites à Hégenheim.\nÀ cette époque, Moïse Nordmann était rabbin à Hégenheim, poste qu'il conserve jusqu'à sa mort en 1884. Il était également responsable de nombreuses communautés suisses.","habitants":"famille  de Moïse Nordmann \"","divers":"Hegenheim                         47°33'45\"N, 7°31'43\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Hegenheim_1.jpg"]},"Consult_chateau_formulairec972":{"id":"Consult_chateau_formulairec972","dept":"68","canton":"Altkirch","commune":"Heidwiller","nom":"Heidwiller","type":"Château","periode":"XIV","histoire":"HEIDWILLER, le château était à lorigine propriété des Sires de Heidwiller, famille mentionnée dès 1105 et vassale des puissants Comtes de Ferrette. Fortement endommagé lors du tremblement de terre de 1356 ayant dévasté la ville de Bâle et ses alentours, il fut reconstruit et devint la propriété des nobles de Morimont en 1367. Seuls la tour Nord et létage du bas datent de cette époque.  En 1486, la famille de Reinach acheta le Château et en resta propriétaire jusquà la Révolution. Il fut surélevé au début du XVIème siècle puis doté, au XVIIIème siècle, de nouvelles ouvertures dans les tours et de linteaux de fenêtre en arc.  Confisqué pendant le Révolution, il servit de prison sous la Terreur. Il fut vendu comme bien national en 1795. Cest à cette époque que les deux tours et les dépendances du Château furent démolies. En 1849, la propriété fut achetée par Bernard Couchepin alors maire du village qui y installa une école de filles. Le Château fut ensuite revendu en 1861 à Madame Meyer, descendante de la famille Koechlin, célèbres industriels mulhousiens. Paul Kestner acquit le Château en 1899 et fit forger le portail encore visible de nos jours.  Le Château est de nos jours la résidence de ses actuels propriétaires.","architecture":"HEIDWILLER,  le château fût à l'origine construit  selon le schéma typique des bastions ou châteaux forts de plaines, c'est à dire selon un plan quadrilatéral entouré par des douves en eau. On pouvait dénombrer jusqu'à 500 semblables durant le haut Moyen-Âge dans la plaine de ce qui est aujourd'hui l'Alsace où la Suisse. C'est l'un des seuls n'ayant pas subi de remaniements architecturaux profonds au cours des siècles, offrant ainsi à l'observateur averti la contemplation de ses proportions d'origine.","habitants":"Famille de Reinach\"","divers":"Heidwiller   47°39'31\"N, 7°14'22\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Heidwiller_1.jpg","../../jctruffet.com/image/image_68/68_Heidwiller_2.jpg","../../jctruffet.com/image/image_68/68_Heidwiller_3.jpg"]},"Consult_chateau_formulaireb1aa-2":{"id":"Consult_chateau_formulaireb1aa-2","dept":"68","canton":"Colmar","commune":"Wintzenheim","nom":"Hohlandsbourg","type":"Fort","periode":"XIII-XIV","histoire":"HOLANDSBURG; Pendant la guerre de Trente Ans, le château est occupé par les Suédois en 1633, puis par les Français en 1634. Peu de temps après, les troupes impériales semparent par surprise de la place et la pillent6. En 1637, le commandant de Colmar, sur ordre de Richelieu, fait incendier le château, qui est ensuite démantelé à la poudre.Le château est classé au titre des monuments historiques par la liste de 1840. Un grand chantier de restauration est entamé en 1986, dans le but den faire un pôle touristique du département, à limage du Haut-Koenigsbourg dans le Bas-Rhin. Les opérations de terrassement de grande ampleur qui sont alors réalisées ne le sont pas dans les règles de lart : aucune fouille archéologique autorisée na lieu avant les travaux, ce qui entraîne la destruction des couches stratigraphiques et de toutes les informations liées, faisant perdre beaucoup de leur sens au matériel retrouvé lors du chantier. Ces faits donneront par ailleurs lieu à des suites judiciaires. Pour tenter de réparer les dégâts occasionnés, des fouilles menées par les services compétents eurent lieu en 1998 et 2004, permettant de récupérer tout-de-même quelques informations stratigraphiques, qui confirmèrent la chronologie connue du site, Les derniers travaux entrepris de 2011 à 2013 ont porté sur la création d'un pavillon d'accueil avec billetterie/boutique, d'un espace d'exposition permanente et d'exposition temporaire, d'un théâtre de plein air, d'un espace pédagogique et d'un pôle restauration comprenant brasserie et salle de réception.","architecture":"défendues par une forte déclivité naturelle du terrain.\nL'accès se fait par l'ancien pont-levis, appelé aujourd'hui pont-dormant, en traversant le bastion d'où, sur le côté droit, l'on aperçoit les restes de deux casemates voûtées en berceau, surplombées d'une plateforme d'artillerie dotée de bouches à feu soigneusement disposées. Elles sont probablement luvre de Lazare de Schwendi. Sur le côté gauche se trouve un jardin d'inspiration médiévale.Les murailles massives, de 100 × 60 mètres et de 12 à 15 m de haut, enserrent une grande cour dominée au nord par le château supérieur (ou Oberschloss), véritable cur fortifié et partie primitive (il date de la fin du XIIIe siècle) du Hohlandsbourg.Les trente chambres de tir avec leurs archères d'une hauteur moyenne de 2 m sont toujours bien visibles.  La tour carrée et la fausse braie ne furent rajoutées que quelques années plus tard par le comte de Lupfen, afin d'améliorer le côté défensif du château primitif. La tour abrite une citerne à eau reliée à un puits taillé dans le granit aménagé dans la cour. Une grille matérialise son emplacement initial sous l'auvent. Les logis du XIIIe siècle, remaniés successivement aux XIVe siècle et XVIe siècle par le comte de Lupfen et le Baron Lazare de Schwendi étaient destinés initialement à l'amélioration de la fonction résidentielle et des conditions de vie au château. Les restes d'un conduit d'évacuation d'une latrine double subsistent encore. Ils abritent maintenant les expositions temporaire et permanente. La brasserie et la salle de réception ont pris place dans les anciennes dépendances et écuries, au sud.Dans l'angle sud-est, subsistent les restes d'un grand escalier permettant aux hommes de troupe logés dans le château de parvenir rapidement au chemin de ronde.","habitants":"Famille du comte de Fürstenberg\"","divers":"Hohlandsbourg                     48°03'36\"N, 7°16'09\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Hohlandsbourg_1.jpg","../../jctruffet.com/image/image_68/68_Hohlandsbourg_2.jpg","../../jctruffet.com/image/image_68/68_Hohlandsbourg_3.jpg"]},"Consult_chateau_formulaire5101":{"id":"Consult_chateau_formulaire5101","dept":"68","canton":"","commune":"Labaroche","nom":"Hohnack","type":"Château","periode":"XIII","histoire":"HOHNACK, l'édifice fait l'objet d'un classement au titre des monuments historiques par arrêté du 19 août 1905.\nLe château est mentionné par une chronique ultérieure comme déjà existant en 1079, il appartient alors aux comtes d'Eguisheim. Il rentre ensuite  en possession des Ferrette et des Ribeaupierre qui le récupèrent définitivement en 1437. Le fief relève alors de la maison des Habsbourg.  Une garnison française prendra le château en 1635 sous l'initiative du gouverneur français de Colmar et l'occupera jusqu'en 1654. À partir de 1655, le château sera démantelé sur un ordre émanant de Louis XIV.Le château est ensuite vendu comme bien national pendant la Révolution française. La ruine est par la suite donnée à la Société pour la conservation des monuments historiques d'Alsace en 1886 par la famille Golbéry, alors propriétaire du château.  Il devient finalement propriété de la commune de Labaroche et l'est toujours aujourd'hui.","architecture":"HOHNACK, situé à 927 m d'altitude, il s'agit du second château bâti le plus haut d'Alsace, devancé par le Freundstein qui lui se trouve à 948 m d'altitude. Mentionné en  1079, il appartenait aux comtes d'Eguisheim. Il ira ensuite dans les mains des Ferrette et des Ribeaupierre qui le récupèreront  en 1437: Le fief relève alors de la maison des Habsbourg. Une garnison française prendra le château, en 1635, sous l'initiative du gouverneur français de Colmar et l'occupera jusqu'en 1654. Puis, en 1655, le château du Hohnack sera démantelé suite à un ordre du roi Louis XIV.  Il fut ensuite vendu comme bien national, pendant la Révolution Française. Le château du Hohnack en ruine fut donné par la suite, à la Société pour la Conservation des Monuments historiques dAlsace, en 1886, par la Famille Golbéry, qui en était propriétaire. Le château du Hohnack appartient à la commune de Labaroche, depuis, mais il est toujours en ruines. Les visites sont libres. Au XIIe siècle, le château dispose d'une enceinte polygonale avec un donjon carré, d'un logis seigneurial ainsi que des dépendances jouxtant les murailles. Il n'y a alors pas de tours de flanquement.  À partir de la fin du XVe siècle, le château se modernise à la suite de l'apparition des armes à feu. Trois bastions quadrangulaires, un bastion semi-circulaire ainsi qu'une barbacane sont ainsi ajoutés à l'édifice.L'utilisation de pierres à bosse est caractéristique de l'architecture du bâtiment.","habitants":"Famille des Ferrette\"","divers":"Hohnack  48°05'39\"N, 7°11'03\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Hohnack_1.jpg","../../jctruffet.com/image/image_68/68_Hohnack_2.jpg","../../jctruffet.com/image/image_68/68_Hohnack_3.jpg"]},"Consult_chateau_formulaire0bfb":{"id":"Consult_chateau_formulaire0bfb","dept":"68","canton":"Rixheim","commune":"Hombourg-Wihr","nom":"Hombourg_Wihr","type":"forteresse","periode":"XII-XX","histoire":"HOMBOURG  depuis 1923, la famille Burrus est propriétaire du Domaine de Hombourg, situé dans le Sud-Est de lAlsace (proche de lAllemagne et de la Suisse), et a considérablement modernisé et développé ce lieu emblématique.\nAujourdhui cest la troisième génération qui en est propriétaire. Lactivité principale est la production de céréales telles que le maïs et le blé. Du colza, du soja et de lorge y sont également produits. En 2020, le domaine a commencé la production de céréales en agriculture biologique sur ces terres du bord du Rhin : une agriculture raisonnée conduite par David Meyer, technicien agricole au domaine de Hombourg depuis 2007.\nDepuis fin 2021, avec notamment larrivée de Julien Walspeck en tant que directeur dexploitation, le domaine de Hombourg renforce sa volonté de sinscrire dans la durabilité. Le maraîchage de légumes biologiques et larboriculture complètent aujourdhui loffre de production agricole du domaine. Le respect de lenvironnement, lengagement avec la communauté, les relations de proximité avec les restaurateurs partenaires et locaux font partie intégrante de la philosophie du domaine.","architecture":"HOMBOURG   Le domaine de Horbourg est un lieu original en Alsace qui a appartenu à de grands industriels comme la famille Koechlin, et depuis 1922 à la famille Burrus.  Il réunit plusieurs activités : une ferme avec une étable qui imite larchitecture dun château médiéval datant du XXe siècle. Puis à l'arrière, un château du XIX siècle, autour duquel s'est développé un golf, le golf de Hombourg.                                                                          BERLIEREN   Logé au cur dun splendide cadre naturel, le château de Berlieren date du XIIe siècle et fut le premier bien attesté à Hombourg (Plombières).\nLe domaine de Berlieren est un endroit atypique entouré de verdure et deau, il comporte un vignoble biologique, un chai (lieu de vinification), des habitations privées mais aussi des salles de réception et un hôtel  à la fois moderne et authentique  qui raviront celles et ceux qui souhaitent y célébrer un mariage ou un autre évènement.","habitants":"famille Burrus \"","divers":"68_Hombourg_Wihr          47°45'35\"N, 7°30'22\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Hombourg_Wihr_1.jpg","../../jctruffet.com/image/image_68/68_Hombourg_Wihr_2.jpg","../../jctruffet.com/image/image_68/68_Hombourg_Wihr_3.jpg","../../jctruffet.com/image/image_68/68_Hombourg_Wihr_4.jpg","../../jctruffet.com/image/image_68/68_Hombourg_Wihr_5.jpg"]},"Consult_chateau_formulaire90bb-2":{"id":"Consult_chateau_formulaire90bb-2","dept":"68","canton":"Guebwiller","commune":"Buhl et Guebwiller","nom":"Hugstein","type":"Vestiges","periode":"XV","histoire":"HUGSTEIN a été édifié en 1227 par Hugo (Hugues) de Rothenbourg, prince abbé de Murbach de 1216 à 1236. Il est construit sur les communes de Buhl et Guebwiller. Il servait à la défense de l'abbaye de Murbach et de l'entrée de la vallée du Florival. En 1313, l'abbé Conrad Wiedergrun de Stauffenberg consacre la chapelle du château à la sainte Croix et à Saint Benoît. L'abbé Barthélémy d'Andlau modernise le Hugstein au cours du XVe siècle en lui adjoignant notamment une tour-porte ornée d'une frise et dotée d'un pont-levis.  Deux nouvelles tours sont également ajoutées au système défensif du château bien que son rôle principal soit résidentiel. Georges de Masevaux [archive] en continue la restauration mais meurt en 1542. Le château devient alors l'enjeu d'une querelle de succession entre Henri de Jestetten et son cousin Rodolphe Stoer de Stoerenbourg, abbé de Honcourt et capitulaire de Murbach. Ce dernier obtient finalement gain de cause mais le castel en souffre. En 1598, la foudre frappe le château. Il sert au début du XVIIe siècle de prison, particulièrement pour les luthériens ou encore pour les sorcières dont certaines seraient brulées devant le château. .","architecture":"HUGSTEIN, Abandonné par la suite, il sert encore de refuge aux pauvres gens avant d'être finalement utilisé comme carrière de pierres. La pierre dont est construit le château fut extraite du fossé qui l'entoure. .Le donjon cylindrique de 10 mètres de diamètre est relativement rare en Alsace. La partie haute du donjon a disparu depuis l'époque où le site servait de carrière. Le logis principal devait comporter deux voire trois étages. La clef de voûte de la chapelle mitoyenne (ou peut-être intégrée à la demeure) est visible au musée du Florival à Guebwiller. L'ensemble défensif est constitué d'un rempart dont les angles arrondis sont un leurre qui donne à l'assaillant l'impression que le château est équipé de tours cylindriques.","habitants":"Famille de   Georges de Masevaux \"","divers":"HugsteiN                                         47°55'15\"N, 7°11'31\"E","gps":"","images":["../../jctruffet.com/image/image_68/68_Hugstein_1.jpg","../../jctruffet.com/image/image_68/68_Hugstein_2.jpg"]},"Consult_chateau_formulaire9477":{"id":"Consult_chateau_formulaire9477","dept":"68","canton":"Wintzenheim","commune":"Rouffach","nom":"Isenbourg","type":"Château","periode":"XIII","histoire":"ISENBOURG,  avant que le château ne fût construit, il existait une ancienne maison de noble qui dominait le village durant   tout le début du Moyen-âge. C'est seulement plus tard que les rois d'Austrasie construisirent un château sur cet emplacement très favorable car placé sur une colline qui domine la ville de Rouffach ;  En 1278, Conrad de Lichtenberg restaura le château. Il fut ensuite agrandi par Henri de Blankenheim. Mais au milieu du XVIIe siècle, un archiduc entreprend de construire un tout nouveau château, juste au nord de l'ancien en forme de fer à cheval. Mais en 1751, le grand chapitre de la cathédrale prend la décision de raser le château. Il fut ensuite vendu comme bien national à la Révolution. Les restes du château furent détruits par Xavier Jourdain qui le remplaça par une maison de campagne.De 1880 à 1895, Xavier Ostermeyer fit construire le château actuel.","architecture":"ISENBOURG,  le prestigieux château dIsenbourg va connaître une profonde transformation dans les mois à venir. Propriété de Jérôme et Alice Tourbier depuis le 31 octobre dernier, lhôtel-restaurant et spa de Rouffach va grosso modo changer du tout au tout. De plan rectangulaire,à trois niveaux huit travées, toit à la mansart flanqués d'une séries de huit lucarne, accolée  deux tour ronde une avec toit en poivrière l'autre flanqué d'un poste de garde.","habitants":"Conrad de  Lichtenberg\"","divers":"Rouffac                                   47°57'46\"N, 7°17'47\"E1","gps":"","images":["../../jctruffet.com/image/image_68/68_Isenbourg_1.jpg","../../jctruffet.com/image/image_68/68_Isenbourg_2.jpg"]},"Consult_chateau_formulairef3d9":{"id":"Consult_chateau_formulairef3d9","dept":"68","canton":"Kaysersberg","commune":"Kintzheim","nom":"Kaysersberg","type":"Château-fort","periode":"XIII","histoire":"REICHENSTIEN, le château a été la demeure de l'Empereur Rodolphe Ier de 1282 à 1286. Du XIVe au XVIIe siècle, le château a été confié aux évêques de Mayence. Cependant, il a commencé à se dégrader après 1572 quand il est devenu non rentable de l'entretenir pour Anton von Wiltberg, le chambellan de Mayence., le château fort Reichenstein (ou Falkenburg) domine le village de Trechtingshausen. Ce grand complexe est un des exemples les plus impressionnants de la reconstruction de châteaux forts en style néogothique. Construit au Xe Ie siècle comme château fort d'un gentilhomme brigand, il était détruit en 1253 et en 1282. Au  siècle suivant  il commençait à tomber en ruïne. En 1835 Friedrich Wilhelm von Barfuß commençait avec la reconstruction du château fort. Le baron Kirsch-Purcelli achetait le château fort en 1899 et poursuivait le travail avec beaucoup d'enthousiasme. Le mur-abri est particulièrement digne d'être vu. Dans le château fort on trouve (a part la plus grande collection de plaques de fours du Rheinland-Pfalz 1200 trophées de chasse du monde entier, des armes, des armures, de la porcelaine et des meubles originaires de cinq siècles. L'édifice fait l'objet d'une inscription sur l'inventaire supplémentaire des monuments historiques depuis 1996","architecture":"IFS,  logo monument historique Inscrit MH (1999, passage d'entrée, façades et toitures du châtelet, tourelle d'escalier, escalier sur jardin avec garde-corps, parquets au rez-de-chaussée, cinq cheminées, façades et toitures de la dépendance est, façades et toitures sur rues de la dépendance ouest, murs d'enceinte, jardin avec balustrade au sud) . Situé sur un promontoire rocheux environ 100 m au-dessus du Rhin, son site fut bâti vers l'an 900 comme un poste frontière de l'Empire germain. il était alors connu sous les noms de Vogtsburg ou Feitsburg. En 1823, les ruines du château et ses fondations ont été achetées par le Prince Frédéric de Prusse, le neveu du roi Frédéric-Guillaume III. Ensuite, le château a été reconstruit sous la direction de Claudius von Lassaulx. Il a été rebaptisé château Rheinstein en raison de son site rocheux imposant au-dessus du Rhin. Depuis 1975, il est une propriété privée de la famille Hecher qui l'a restauré pendant 19 ans.","habitants":"Famille de Georges de Masevaux \"","divers":"trois châteaux dans cet article; ReichensteiNet les Ifs                                             50°00'18,5\"N, 7°51'12,6\"E                                               Ifs  48°08'07\"N, 7°17'14\"E","gps":"","images":["../../jctruffet.com/image/image_68
