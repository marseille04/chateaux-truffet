oyale, pendant les guerres de Vendée, il y résida, ce qui valut au château d'être incendié 5 fois, entre 1793 et 1794 et, d'être actuellement en ruines. Toujours aux descendants de la famille de la Rochejacquelin.   Les armes de la famille de Rorthais et de Meulles sont gravées sur le grand portail qui donne accès sur la grande cour.                                                                                                           MAROTTE,  dresse ses toits pointus recouverts d'ardoises. Construite par M. Moreau, chapelier à Châtillon sur Sèvres, la demeure fut achevée en 1859, puis modifiée et agrandie par son neveu le marquis de Brettes qui en hérita en 1912. Demeurée depuis lors dans la famille de Brettes, elle changea de propriétaire il y a quelques années.","architecture":"DURBELIERE, de la fin du XVe siècle. Ensemble repris au début du XVIIe siècle, maintenant en ruines.  Les anciens communs qui ferment la cour sur 80 m de long, devenus aujourd'hui bâtiments de ferme, s'achèvent à l'ouest par une longue galerie ornée de colonnes et qui servait de manège. Les ruines, environnées d'étangs et d'arbres séculaire le portail, la balustrade, les fenêtres et les cheminées de style Renaissance en sont les vestiges. La demeure entourée de douves était imposante. Elle mesurait 60 mètres sur 30 et comprenait 49 pièces. Actuellement, les pans de murs qui subsistent sont situés dans un espace entouré de douves et auquel on accède par un pont dormant qui a succédé à un pont-levis. À gauche, se situe une tour hexagonale datant de lépoque ancienne, à droite, une balustrade de pierre à colonnes, au fond, un mur de façade avec portes et fenêtres Renaissance, de chaque côté des tours quadrangulaires et ce qui reste des ailes de retour. Le tout se situe dans une grande cour fermée par des vastes bâtiments, ayant longtemps fait office de maisons dhabitation.                                                       MAROTTE,  bâti en pierre de pays, est composé d'un corps de bâtiment central flanqué de deux pavillons carrés à deux étages, aux toits pentus. Des lucarnes éclairent les combles ornés au sommet d'épis de faîtage et de frises en zinc. En retrait du château, des communs complètent l'ensemble. D'architecture simple, la Marotte représente parfaitement le style adopté pour la construction des grandes demeures de la deuxième moitié du XIXe siècle.","habitants":"Famille du Vergier \r\n        \"","divers":"Vestiges à St-Aubin 46° 56' 23\" nord, 0° 41' 30\"  ouest.                                             46° 56' 59,92\" Nord, 0° 41' 13,12\" Ouest","gps":"","images":["../image/image_79/79_St_Aubin_Baubign%c3%a9_1.jpg","../image/image_79/79_St_Aubin_Baubign%c3%a9_2.jpg","../image/image_79/79_St_Aubin_Baubign%c3%a9_3.jpg","../image/image_79/79_St_Aubin_Baubign%c3%a9_4.jpg","../image/image_79/79_St_Aubin_Baubign%c3%a9_5.jpg","../image/image_79/79_St_Aubin_Baubign%c3%a9_6.jpg","../image/image_79/79_St_Aubin_Baubign%c3%a9_7.jpg","../image/image_79/79_St_Aubin_Baubign%c3%a9_8.jpg"]},"Consult_chateau_formulaire47cb":{"id":"Consult_chateau_formulaire47cb","dept":"79","canton":"La Plaine Niortaise","commune":"Saint-Gelais","nom":"St_Gelais","type":"Château","periode":"XVI","histoire":"ST-GELAIS, a été construit dans la première moitié du XVIe siècle par Charles V de Saint-Gelais. Son emplacement avait été choisi en contrebas d'un premier château, dont l'existence remontait au commencement de la maison de Saint-Gelais avec Hugues de Lusignan, fils de Rodolphe. Ce dernier fit de Saint-Gelais son fief et son nom, qu'il transmit à ses descendants. Le bâtiment actuel présente un corps de logis d'un étage percé de fenêtres à meneaux et surmonté de trois grandes lucarnes également à meneaux. Sa construction a été entreprise vers 1550. Celle de la tour hexagonale, avec sa lucarne, qui porte encore la croix des Lusignan et renferme l'escalier à vis, remonte aux années 1530. L'ensemble s'apparente, par son style décoratif, davantage aux châteaux Renaissance de la Loire qu'à ceux du Poitou. Au faite du pignon sud, la coupe et la corbeille attestent l'appartenance des seigneurs de Saint-Gelais à la religion réformée. Saint-Gelais passa aux mains des Plessis-Châtillon, aux Narbonne-Pelet, et après la Révolution, il fut restitué à leurs héritiers, les Voyer d'Argenson, qui le vendirent en 1831 à la famille Gaignard.","architecture":"ST-GELAIS,  l'aile actuelle se prolongeait au sud-est et une aile perpendiculaire orientée sud-ouest/nord-est complétait le bâtiment. Ces constructions furent démolies en 1918 et les pierres vendues. La tourelle d'angle hexagonale, qui se trouve maintenant à l'extrémité sud-est du bâtiment, marquait le départ de l'aile perpendiculaire. La toiture est éclairée de lucarnes-pignons à candélabres. Un bandeau à ressauts souligne la toiture. Fenêtres à une traverse ; fenêtres à meneaux. L'escalier à vis de la tour présente une partie supérieure de noyau en bois et une partie inférieure en pierre. Le rez-de-chaussée conserve les cheminées les plus remarquables.","habitants":"Famille de Hugues de Lusignan\r\n        \"","divers":"Château de St-Gelais;  46° 23' 04\" nord, 0° 23' 28\" ouest","gps":"","images":["../image/image_79/79_St_Gelais_1.jpg","../image/image_79/79_St_Gelais_2.jpg","../image/image_79/79_St_Gelais_3.jpg"]},"Consult_chateau_formulaire4841":{"id":"Consult_chateau_formulaire4841","dept":"79","canton":"Le Val de Thouet","commune":"Saint-Leger de Montbrun","nom":"St_Leger_Montbrun","type":"Château","periode":"XV-XVII","histoire":"BEAUVAIS, ce fief dont subsistent, les vestiges dun curieux château, une tour et des restes de murailles crénellées jadis décorées de médaillons était possédé au XVIe siècle par Guillaume Aubrudeau, seigneur de la Voirie. Au début du XVIIe siècle, il relevait de la vicomté de Thouars et était aux mains des Chambret, il passa ensuite à François Monbielle, aux de Touvois, et aux Frère. Ces derniers, d'une famille fort ancienne originaire des environs d'Airvault, possédèrent longtemps la maison forte d'Argentine. Ils demeurèrent à Beauvais jusqu'au début du XIXe siècle.\r\nL'entrée donnant accès au château est pourvue de deux tours en partie délabrées dont l'originalité et de posséder un toit en pierres. Du château, qui est un curieux mélange de différents styles, on peut encore apercevoir les restes des tours et le crénelage des murailles.","architecture":"RIGNY, de style Renaissance, le château de Rigny a été à plusieurs reprises restauré et remanié. Dans sa chapelle, avant la Révolution, le domaine, après avoir appartenu aux Aubineau pendant un peu plus de 100 ans, passa vers la moitié du XVIIIe siècle aux Bunault. Né en 1752 au château de Rigny, Charles-Louis Bunault termina sa carrière militaire comme maître de camp. Il participa, en 1789, à l'assemblée de la noblesse du Poitou, émigra en 1791, servit à l'armée des Princes et fut nommé Prévôt d'Angers en 1816. En son absence, le château fut occupé par les Vendéens qui, en 1793, y entreposèrent des vivres saisis à Thouars.\r\nLe 4 mai 1897, la comtesse Jeanne Marie Haward de la Blotterie, née Odart de Rilly, épouse d'un ancien préfet, fut à Paris l'une des 100 et quelques victimes du tragique Incendie du Bazar de la Charité, association philanthropique présidée par la comtesse d'Alençon, sur de l'impératrice Elisabeth d'Autriche.","habitants":"Beauvais, famille   Guillaume Aubrudeau Rigny, famille Charles-Louis Bunault \r\n        \"","divers":"a Saint-Leger de Montbrun, château de Rigny grav 1-2 de Beauvais grav 3 -4","gps":"","images":["../image/image_79/79_St_Leger_Montbrun_1.jpg","../image/image_79/79_St_Leger_Montbrun_2.jpg","../image/image_79/79_St_Leger_Montbrun_3.jpg","../image/image_79/79_St_Leger_Montbrun_4.jpg"]},"Consult_chateau_formulaire3a9e":{"id":"Consult_chateau_formulaire3a9e","dept":"79","canton":"Melle","commune":"St-Martin lès Melle","nom":"St_Louis_Augustin","type":"Maison -forte","periode":"XV","histoire":"St-LOUIS-ST-AUGUSTIN, plusieurs seigneurs de Gagemont sont mentionnés au XVe siècle: Pierre de Gascougnolle en 1404, Guillaume Maynaud en 1465; de cette période peuvent dater une partie du gros-oeuvre du logis ; le pigeonnier bâti vers 1565 a été arasé à une date inconnue ; la propriété, ayant appartenu aux Prevost dits de Gagemont entre le début du XVIIe siècle et le troisième quart du XIXe siècle puis à la famille Montalembert d'Esse, a subi de nombreuses transformations au cours du XIXe siècle : avant 1832 adjonction ou transformation des ailes latérales du logis, en 1837 une remise à voiture a été édifiée au sud-est du château, à la même époque exhaussement des tours et du logis et percement de baies en travées régulières, en 1842 la veuve de Louis Charles-Auguste Prevost fait édifier une chapelle funéraire à la mémoire de son mari, dédiée à Saint-Louis et Saint-Augustin, cette chapelle est construite par Jean Dulin architecte départemental de la Vienne, des 1848 le service de cette chapelle est rattaché à la cure de Saint-Romans-lès-Melle et une messe dominicale y est célébrée, vers 1870 construction d'une remise au nord, entre 1886 et 1912 mise en place d'une grille en fonte datable par son style de la première moitié du XIXe siècle, par Paul Henri Texier d'Arnoult propriétaire du château.","architecture":"St-LOUIS-ST-AUGUSTIN, une métairie située au sud-ouest du château appartenait au domaine jusqu'au début du XXe siècle ; entre 1966 et 1968, les propriétaires actuels ont procédé à une restauration du château et ont réaménagé le parc, une des cheminées est un remploi récent provenant du manoir de la Groie à Chail. Au logis rectangulaire à sous-sol et deux étages carrés, flanqué d'une tour polygonale au nord et de deux tours circulaires au sud-ouest, le tout couvert d'ardoise, s'ajoutent deux petites ailes latérales à un seul étage couvertes de tuile creuse ; communs couverts de tuile creuse ; chapelle funéraire à façade et couverture en pierre de taille, à un vaisseau voûté en berceau brisé.","habitants":"Famille Montalembert d'Esse\r\n        \"","divers":"A St-Martin lès Melle; le château de St-Louis-Augustin","gps":"","images":["../image/image_79/79_St_Louis_Augustin_1.jpg","../image/image_79/79_St_Louis_Augustin_2.jpg"]},"Consult_chateau_formulaire4303":{"id":"Consult_chateau_formulaire4303","dept":"79","canton":"Le Val de Thouet","commune":"St-Loup-Sur-Thouet et Lamairé","nom":"St_Loup_Lamairé","type":"Forteresse","periode":"XVI-XVII","histoire":"ST-LOUP, les premiers écrits mentionnent au XIe siècle, Drogon, premier seigneur connu. Au cours de la période médiévale marquée par la famille de Dercé.  Sous lancien régime, les seigneurs maintiennent la prestance de la demeure, en 1645 Nicolas Lepage, conseiller du roi, puis au début du XVIIIe siècle, Jacques de Boyer de la Boissière, receveur général des finances de Bretagne. Son fils, Jean-Baptiste donne un nouvel éclat au lieu grâce aux travaux quil entreprend. En 1767, le château est vendu à Jean Haran de Borda, fermier général, qui le lègue en 1772 à son neveu Jean dAbbadie, le château demeure la propriété des dAbbadie jusquen 1894. La famille Maussabré Beufvier en fait alors lacquisition et le conserve jusquau décès de la comtesse Gilberte de Maussabré en 1983, dernière du nom, qui le lègue à la \"Ligue Nationale contre le Cancer\" qui démembre le parc. Le domaine est vendu aux époux Jean-Jacques Debout et Chantal Goya qui le cèdent en 1990, au comte Charles-Henri de Bartillat qui y réside. Chambres d'hôtes.","architecture":"ST-LOUP,   un campanile coiffe le pavillon central, tous ces éléments donnent au château le style darchitecture propre au début du classicisme, dit Louis XIII,  un campanile coiffe le pavillon central, tous ces éléments donnent au château le style darchitecture propre au début du classicisme, dit Louis XIII. Le domaine se pare de somptueux jardins dessinés et réalisés par les plus célèbres jardiniers de lépoque. Un compte-rendu de 1631 relate la rencontre entre le jardinier des Gouffier, Jamin, et celui des ducs de Richelieu et de Thouars.","habitants":"Famille de Dercé \r\n        \"","divers":"Forteresse de St-Loup à Lamairé GPS : 46° 47' 22\" Nord et 0° 10' 05\" Ouest","gps":"46° 47' 22\" Nord et 0° 10' 05\" Ouest","images":["../image/image_79/79_St_Loup_Lamair%c3%a9_1.jpg","../image/image_79/79_St_Loup_Lamair%c3%a9_2.jpg","../image/image_79/79_St_Loup_Lamair%c3%a9_3.jpg","../image/image_79/79_St_Loup_Lamair%c3%a9_4.jpg","../image/image_79/79_St_Loup_Lamair%c3%a9_5.jpg","../image/image_79/79_St_Loup_Lamair%c3%a9_6.jpg","../image/image_79/79_St_Loup_Lamair%c3%a9_7.jpg"]},"Consult_chateau_formulaire3d28":{"id":"Consult_chateau_formulaire3d28","dept":"79","canton":"Saint-Maixent-l","commune":"Saint-Maixent","nom":"St_Maixent_Pin","type":"Château","periode":"XV-XVI","histoire":"PIN, a été construit sur l'emplacement de la métairie d'Exireuil, qui prit dès le XVIe siècle le nom de métairie du Pin en raison de sa dépendance du domaine seigneurial du Pin d'Augé. Avant 1789, le Pin d'Augé était le siège d'une seigneurie dont les possesseurs furent entre autres les familles de Clairvaux, Janvre, de Lespinatz, Adam, d'Orfeuille. A la Révolution, le domaine fut confisqué et fut acquis par Guy André Rouhier, procureur du roi à Saint-Maixent. A la fin du XIXe siècle, le Pin devint propriété du général Félix Coiffé natif de Thorigné. Après avoir fait  ses campagnes, il se retira au Pin où il mourut en 1908.                                                                                                        St-MAIXENT, en 1204, Philippe-Auguste déclara l'abbaye unie à la couronne de France et en 1223, son fils Louis VIII fit construire un château-fort. Passée sous la domination étrangère pendant la guerre de cent ans, la ville fut reprise par Dugesclin, le 4 septembre 1372. Charles VII remercia la ville pour sa fidélité en lui accordant ses armes et de nombreux privilèges. François Villon finit ses jours à St-Maixent où il mourut en 1489. Prise par les troupes du prince de Condé en 1568, détruite par les Calvinistes le 22 septembre 1568, reprise par les catholiques en 1569, elle fut reperdue à nouveau et reprise en 1574 par le duc de Montpensier. Les remparts en mauvais état qui dataient de 7 siècles furent rasés en 1740. En 1750 le comte de Blossac, intendant du Poitou fit démolir la vieille porte  Chalon et fit reconstruire la porte actuelle achevée en 1762. On lui doit aussi la place Denfert et la percée des avenues qui traversent la ville. Pendant la révolution, la ville prit le nom de Maixent puis de Vauclair sur Sèvres, l'abbaye devient un hopital, l'abbatiale fut pillée et profanée en 1793, elle fut rendue au culte en 1803.","architecture":"PIN , le château a été édifié au début du XIXe siècle, construction classique de plan rectangulaire et flanquée de quatre tourelles à chaque angle. Les deux façades sont identiques et la partie centrale, de chaque façade s'élevant au dessus du perron, est couronnée d'un fronton à jour. Cette jolie demeure, située sur les hauteurs de Saint-Maixent, jouit d'un panorama exceptionnel.                                         St-MAIXENT, la ville retrouvait seulement à la fin du XIXe, notoriété, prestige et confiance avec l'important centre de formation militaire connu depuis, nationalement. Musée du sous-officier, au quartier Marchand, aménagé sur l'emplacement du château de Saint-Maixent. L'origine de cet établissement remonte à l'année 1926. Le général Pierre Michelin fonde alors le musée du souvenir pour retracer le passé militaire de Saint-Maixent et celui d'autres écoles de formation.                                                                                                        Logis de Saint-Martin hôtel de la famille Heintz.","habitants":"Pin, Guy André Rouhier                                                                   St-Maixent;  Comte de Blossac\r\n        \"","divers":"St-Maixent la porte Chalon grav 2. la Pin grav 1. hôtel Balisy grav-3 Hôtel de ville grav 4   Château de Beugne grav 5             St-Maixent grav 6.  46° 24' 49\" nord, 0° 12' 25\" ouest","gps":"","images":["../image/image_79/79_St_Maixent_Pin_1.jpg","../image/image_79/79_St_Maixent_Pin_2.jpg","../image/image_79/79_St_Maixent_Pin_3.jpg","../image/image_79/79_St_Maixent_Pin_4.jpg","../image/image_79/79_St_Maixent_Pin_5.jpg","../image/image_79/79_St_Maixent_Pin_6.jpg"]},"Consult_chateau_formulaire307f":{"id":"Consult_chateau_formulaire307f","dept":"79","canton":"Melle","commune":"Saint-Martin lès Melle","nom":"St_Martin_Melle","type":"Château","periode":"XVII-XIX","histoire":"Deux châteaux à Saint-Martin les Melle  celui de Chaillé et ceui de Gagemont ( voir Melle)   et autres châteaux pas d'information.                                                                                                                            CHAILLE, le château de Chaillé a été construit de 1603 à 1604, date gravée sur la clef d'une porte de l'aile sud, sur les vestiges d'un ancien château-fort, par l'architecte Jacques Trotin, pour Jacques de Constant, gentilhomme ordinaire du roi et gouverneur de Marans, qui avait acquis cette seigneurie en 1601. Les dépendances, probablement antérieures à la construction du château, sont en partie restaurées en 1650 et  1658. Dans le quatrième quart du XVIIe siècle, les toitures et les vitres sont entretenues, dans la deuxième moitié du XVIIIe siècle, le château reste inhabité et n'est plus entretenu. A la Révolution, le château a été utilisé comme entrepôt de grains, puis a servi de prison sous le Consulat. Acquis en 1806 par un notable local, le château est restauré en 1810 et 1817 par son nouveau propriétaire. Dans la deuxième moitié du XXe siècle, il a été restauré et aménagé en maison de retraite.","architecture":"CHAILLE,  la résidence du chateau de Chaillé est composé au XVIIe siècle d'un bâtiment récent offrant un cadre prestigieux doublé d'une ambiance chaleureuse.  Logis couvert en ardoise et communs en tuile creuse ; corps central à un étage carré et un étage de comble, aile sud à un étage de soubassement, voûte d'arêtes pour 2 pièces et en berceau plein-cintre pour la 3 eime , un étage carré et un étage de comble, aile nord en rez-de-chaussée et étage de comble ; corps central couvert en longs pans, ailes et pavillons couverts en longs pans à croupes.","habitants":"Chaillé;Jacques de Constant                                                            Gagemon;\r\n        \"","divers":"a  St-Martin Melle; château de Chaillé grav 2-3 et divers châteaux","gps":"","images":["../image/image_79/79_St_Martin_Melle_1.jpg","../image/image_79/79_St_Martin_Melle_2.jpg","../image/image_79/79_St_Martin_Melle_3.jpg","../image/image_79/79_St_Martin_Melle_4.jpg","../image/image_79/79_St_Martin_Melle_5.jpg","../image/image_79/79_St_Martin_Melle_6.jpg"]},"Consult_chateau_formulairee7da":{"id":"Consult_chateau_formulairee7da","dept":"79","canton":"Le Val de Thouet","commune":"St Martin de Sanzay","nom":"St_Martin_Sanzay","type":"Château","periode":"XV","histoire":"Deux châteaux à Saint-Martin de Sanzay donc  du Bois de Sanzay, Bourg Joly (article suivant)  la Coste et Grenouillon à deux kilomètres de Sanzay.                                                                                                                                                                LA COSTE,  la seigneurie de la Coste (ou la Côte) appartenait, en 1584, à Christophe de la Couste. Au début du XIXe siècle, la Coste était propriété du marquis de la Corbière. En 1880, elle fut acquise par M. Geay. Vers 1900 enfin elle est passée à la famille qui la possède encore aujourd'hui.                                                                                                            GRENOUILLON, le fief  relevant de la baronnie d'Argenton, jadis appelé Grenollon, puis Grenoillon, doit son nom à son premier possesseur, Stéphane Granollia, d'une famille noble, dont plusieurs membres furent chevaliers de Malte. A la fin du XVe siècle, la terre était encore dans cette famille. En 1568, la seigneurie était aux mains de Pierre Lambert, seigneur de la Brunetière et Grenouillon. Puis elle passa à plusieurs familles illustres : les Savary de Mauléon en 1640, les du Bellay en 1664, et en 1692, les Jaudonnet de Laugrenière qui en restèrent propriétaires jusqu'en 1824.                                                                                                 SANZAY du Bois, l'existence du château est mentionnée dès 810. L'édifice fut à deux reprises détruit par les Anglais au XIIe siècle et au XIVe siècle, puis reconstruit au XVe siècle. En 1793, le château fut incendié et les biens confisqués. Propriété de monsieur Gorce.                                                                  SANZAY la chapelle, la porte et restes des anciennes fortifications.","architecture":"GRENOUILLON, du château primitif, peu de chose subsiste, sauf les douves qui enserrent la cour du logis sur trois côtés. Les communs, quatre tourelles et la fuie datent du XVe siècle. L'édifice se compose d'un corps de bâtiment rectangulaire encadré par deux pavillons. La porte d'entrée, côté cour, est remarquable. Il existe par ailleurs, un vieux potager français, taillé selon l'art topiaire, où se côtoient fleurs et légumes. Ce sont les Jaudonnet de Laugrenière qui transformèrent ce jardin en même temps que la demeure.  \r\n La COSTE, le château actuel, bâti dans les toutes premières années du XIXe siècle, est d'une grande élégance, sa construction est vraisemblablement l'uvre du marquis de la Corbière qui fit bâtir la demeure à l'emplacement du logis primitif, dont seule subsiste une tour ronde sur la façade arrière. Cette dernière peut remonter au XVe siècle. Le château de la Coste présente d'harmonieuses proportions. Il s'agit d'une bâtisse de plan rectangulaire, flanquée à chaque extrémité d'un pavillon carré, en légère saillie.                                                      SANZAY du BOIS, l'édifice est entouré de larges douves en eau. L'ensemble est constitué de nombreux bâtiments disparates, décrivant un plan irrégulier en amande, qui encadrent une cour plane sensiblement pentagonale. La pierre siliceuse rose-rouge, abondante dans la région, fut utilisée pour édifier les parties anciennes, ainsi que le granit local gris bleuté.  Le salon du premier étage est accessible par une ancienne chapelle désaffectée, le château a été restauré par M. et Mme Gorce qui proposent la location de salles et des visites culturelles. Les jardins sont susceptibles d'accueillir des tentes, sans limitation de capacité.","habitants":"Grenouillon;  Savary de Mauléon.                                                Sanzay, seigneur local,                                                                   la Coste, M. Geay\r\n        \"","divers":"A St-Martin de Sanzay; château la Coste grav 1.  Genouillon grav  2-3    Bois -4 château du Bois de Sanzay; grav 4-5-6                        47° 03' 54\" Nord et 0° 11' 10\" Ouest","gps":"","images":["../image/image_79/79_St_Martin_Sanzay_1.jpg","../image/image_79/79_St_Martin_Sanzay_2.jpg","../image/image_79/79_St_Martin_Sanzay_3.jpg","../image/image_79/79_St_Martin_Sanzay_4.jpg","../image/image_79/79_St_Martin_Sanzay_5.jpg","../image/image_79/79_St_Martin_Sanzay_6.jpg"]},"Consult_chateau_formulaire2515":{"id":"Consult_chateau_formulaire2515","dept":"79","canton":"Cerizay","commune":"Saint André Sur Sèvre,","nom":"St_Mesmin","type":"Forteresse","periode":"XIV","histoire":"ST-MESMIN, en 1360, Jehan de Montfaucon est dit chevalier et seigneur de Saint-Mesmin et de la Fosse, la forteresse est en bon état et fortifiée. En 1372, son fils, Pierre, entreprend d'importants travaux de fortification. Il est probable que le château actuel soit le résultat, pour une grande partie, de la reconstruction réalisée par Pierre de Montfaucon, puis passa par mariage à la famille du Plessis. Jeanne du Plessis  apporta ensuite à la famille par mariage  à Georges de Vaudrey de Saint-Paul leurs descendants sont toujours présent dans les lieux au début du XVIIe siècle mais en 1665 Saint Mesmin a changé de propriétaire appartient à Gilbert Petit gentilhomme de la chambre du prince de Condé Alexis-Henri Petit de la Guierche obtient en 1705 l'érection de sa terre en marquisat. Le domaine passe par alliance aux Vasselot qui conserveront le domaine jusqu'à la Révolution, en 1797 vendu comme bien national est acquis par Pierre de Ters est le cède  en 1806, à un chirurgien de Louis XVI.  La famille Proust acquit saint-Mesmin en 1818 pour exploiter les terres, ne se préocupe pas du château qui se dégrade  lentement. Durant la première guerre mondiale, l'édifice servira d'hôpital. En 1990, l'association du château de Saint-Mesmin acquiert, pour le franc symbolique, l'édifice auprès de son ancien propriétaire M. Paul Proust, le restaure. Le château de Saint-Mesmin-la-Ville est aujourdhui géré par une collectivité publique : le syndicat mixte du château de Saint-Mesmin  est ouvert à la visite.","architecture":"ST-MESMIN, forteresse médiévale du XIVe siècle à laquelle s'est ajouté, au XVe siècle, un imposant donjon de 28 m de haut. Douves asséchées, vestiges du pont-levis, archères, canonnières, chemin de ronde sur mâchicoulis témoignent de l'importance militaire de cette forteresse de la fin du Moyen-Age. Au XIIIe siècle,  aucune trace architecturale ne fait mention de la forteresse actuelle. Le château de Saint-Mesmin fut une des premières étapes des colonnes Infernales en 1793 pendant les guerres de Vendée, un détachement incendia le château mais seul le donjon et une partie des communs furent brûlés. Il comprend une enceinte hexagonale de la fin du XIVe siècle, augmentée d'une grosse tour cylindrique construite au XVe siècle. L'enceinte primitive était flanquée de 7 tours en fer à cheval. A l'est, deux de ces tours, réunies en châtelet, encadrent une porte protégée par une herse et un pont-levis. La tour Sud-Ouest a disparu. Celle du Sud a été remplacée par le donjon actuel qui renferme 3 salles superposées. Le premier niveau, transformé en chapelle, est voûté en coupole sur croisées d'ogives. Les niveaux supérieurs sont desservis par un escalier à vis. Le logis et les communs sont disposés autour d'une cour rectangulaire. Un escalier hélicoïdal dessert les étages et permet l'accès au chemin de ronde. Le logis renferme une vaste salle seigneuriale du XIVe siècle.","habitants":"Saint Mesmin;  famille Proust\r\n        \"","divers":"Forteresse de St Mesmin  : 46° 47' 59\" Nord et 0° 43' 04\" Ouest","gps":"","images":["../image/image_79/79_St_Mesmin_1.jpg","../image/image_79/79_St_Mesmin_2.jpg","../image/image_79/79_St_Mesmin_3.jpg","../image/image_79/79_St_Mesmin_4.jpg","../image/image_79/79_St_Mesmin_5.jpg"]},"Consult_chateau_formulaire31c9":{"id":"Consult_chateau_formulaire31c9","dept":"79","canton":"Mauléon","commune":"St-Pierre des Echaubrognes","nom":"St_Pierre_Echaubrognes","type":"Château","periode":"XVII","histoire":"Deux châteaux à Saint-Pierre d'Echaubrogne celui de Landebergère et celui de la Louisière.                                                                                         LANDEBERGERE, sa construction remonterait au début ou au milieu du XVIIe siècle. Les premiers propriétaires connus sont des Rochard dont le chef de famille, Pierre, était conseiller secrétaire du roi. Marie-Marguerite Rochard sa fille, hérita du château et la seigneurie passa ensuite dans la famille Buor de la Gobinière en janvier 1737 avant d'échoir aux Buor de Voy en 1762. Au début du XXe siècle, la demeure appartenait à M. Baudry, maire de Cholet.                                           La LOUISIERE,  doit son nom à Anne Julienne Louise Jolly, devenue Mme Gouraud. Elle décida la construction de la demeure où elle entre en 1850. A sa mort en 1863, le château est habité par son second mari M. Brunet. En 1874, la propriété est vendue aux enchères et le comte Savary de Beauregard en devient l'acquéreur. Dix ans plus tard, Berthe de Beauregard, héritière de la demeure, fait construire une chapelle communiquant avec ses appartements.","architecture":"LANDEBERGERE; les restes du château ne permettent pas de se faire une idée précise de ce qu'il fut autrefois. Il ne subsiste qu'un corps de logis en L, sans douves, comblées à la fin des années 60. Le château possède une cour centrale que borde une galerie, autrefois couverte, percée de cinq arquebusières et éclairée par des ouvertures doubles à arc en plein cintre. Une porte à fronton permet d'accéder à la partie principale. Sur la face nord, à l'extérieur, on remarque une bretèche posée sur mâchicoulis.                                                                    LOUISIERE, château de plan presque carré, auquel on a juxtaposé à droite de la façade principale une chapelle. L'originalité de la façade réside dans l'avant corps en forme de tourelle polygonale s'élevant au dessus de l'escalier d'entrée, avec ses deux volées doubles, s'impose sur tout ce côté du bâtiment. Le château est éclairé par des fenêtres en plein cintre. Les deux étages nobles sont soulignés par une double moulure couvrant les quatre murs de la demeure.","habitants":"Landebergère Famille de Buor de la Gobinière                          Louisière; Comte Savary de Beauregard \r\n        \"","divers":"A St-Pierre  d'Echaubrognes;  château de la Forgerie grav 1                                       Buhards grav 2                         .46° 59' 25\" nord, 0° 44' 35\" ouest","gps":"","images":["../image/image_79/79_St_Pierre_Echaubrognes_1.jpg","../image/image_79/79_St_Pierre_Echaubrognes_2.jpg"]},"Consult_chateau_formulaire46bf":{"id":"Consult_chateau_formulaire46bf","dept":"79","canton":"Frontenay-Rohan-Rohan","commune":"St-Symphorien","nom":"St_Symphorien","type":"Château","periode":"XV-XVIII","histoire":"Trois châteaux à St-Symphorien celui de Lens, de Crespe et de St-Symphorien.                                                                                                                   LENS, le  fief de Lens est connu depuis le XIIIe siècle. En 1244, il était tenu par Geoffroy de Beauchamp. Au début du XVIIIe siècle, la terre appartenait à Charles Augustin de Beynac, qui en était encore propriétaire en 1744. A la veille de la Révolution, la propriété était entre les mains de Pierre Le Roux, lequel décéda en 1781. Le domaine devint ensuite propriété de Pharamond de la Porte, d'une famille originaire du Périgord. Le château actuel remonte au milieu du XVIIIe siècle. On y accède par une allée rectiligne plantée de marronniers. Une perspective a été aménagée au sud et au nord où elle délimite d'un côté une charmille et de l'autre un parc à l'anglaise. C'est un vaste édifice, de plan rectangulaire, portant sur chaque façade un fronton triangulaire. Elle est couverte d'une toiture à la Mansart et pourvue de larges baies. Le bâtiment est muni à chaque angle d'un pavillon carré, mais qui n'est toutefois pas accolé à l'édifice.                                                                                                         ST-SYMPHORIEN, la commune peut senorgueillir davoir vu naître lancêtre de Lyndon Baines Johnson, 36è président des Etats-Unis : Pierre-François Creuzé, né en 1693, huguenot persécuté, émigré en Angleterre, puis aux Amériques. Amédée de La Porte, maire de St-Symphorien et propriétaire du château de Lens, est, au XIXe siècle., chef de cabinet du ministre des Travaux Publics, puis sous-secrétaire détat à la Marine. Son fils Henri embrasse aussi une carrière émérite en tant que ministre de linstruction publique, secrétaire perpétuel de lAcadémie Française et lun des acteurs politiques majeurs des Deux-Sèvres.","architecture":"CRESPE, eut comme premier seigneur connu Isaac de Crin ays qui avait épousé Louise Giraudeau en 1620. Il est mentionné en 1635 lors de la convocation de ia noblesse de la baronnie de Frontenay en vue de la nomination d'un censeur dans le balliage de Saint-Jean-d'Angély. Le fief passa ensuite aux Chaubier. Au début du XVIIIe siecle, il était aux Beynac puis un demi-siècle plus tard à Pierre Le Roux, seigneur de Crespé, Lens et Galardon. Son fils René Louis lui succédera à la veille de la Révolution.  Le château actuel de Crespé qui abrite aujourd'hui un club de tennis, ne présente pas un grand intérêt architectural. En revanche, les dépendances présentent une curieuse façade plantée d'ossements sur cinq rangées faisant saillie de quelques centimètres entre les pierres.                                                                                                                  ST-SYMPHORIEN, la propriété du XVIIIe siècle, réaménagée au XIXe siècle, se présente comme une grosse maison bourgeoise simplement agrémentée de deux tours d'angle. L'intérêt principal de cet édifice est la présence de papiers peints panoramiques en camaïeu ou polychromes réalisés dans les années 1815. Dans la pièce nord, ils représentent des vues de Venise, imprimées en grisaille ou en camaïeu vert dans la pièce sud, papier peint à la main suite à une commande, c'est une pièce unique sans motif répétitif qui représente des paysages alpestres.","habitants":"Lens; Charles Augustin de Beynac,                                             Crespe; famille des Chaubier,                                                                 St-Symphorien, Amédée de La Porte,\r\n        \r\n        \"","divers":"St-Symphorien : 46° 15' 50,2\" Nord, 0° 29' 30,38\" Ouest  Chat de lens grav 2","gps":"","images":["../image/image_79/79_St_Symphorien_1.jpg","../image/image_79/79_St_Symphorien_2.jpg"]},"Consult_chateau_formulaire4251":{"id":"Consult_chateau_formulaire4251","dept":"79","canton":"Bressuire","commune":"Saint-Varent","nom":"St_Varent","type":"Manoir","periode":"XV","histoire":"BROSSE, en 1798, il était affermé à Marie Revault, fermière de la Nation. Au milieu du XIXe siècle, Charles Rousseau, avocat demeurant à Thouars, achète le domaine fait raser en partie les ruines restantes de même que les murailles qui le défendaient et fait reconstruire le château actuel. Des défenses extérieures, il ne subsiste qu'une vieille tour située à droite du château. En 1930, il devint la propriété du baron de Gunzbourg qui cinq ans plus tard le céda au propriétaire actuel.                                                                                              BOURNIZEAUX  pas d'information historique.","architecture":"BROSSE,  les archives de Saint-Loup mentionnent Thiors en 1384, dont la seigneurie relevait de Thouars. Le premier propriétaire connu est Louis de la Chapellerie qui obtint Thiors par son mariage avec la fille de Raymond Colin de Thiors, il en fit l'aveu au château de Thouars, le 14 janvier 1420. Auparavent le château fut possédé par la famille poitevine d'origine napolitaine Palavicini, qui se transforma en Pelvoisin puis Appelvoisin.","habitants":"Brosse; Charles Rousseau\r\n        \"","divers":"A st Varent; château de la Brosse grav 1. Bournizeaux grav 2-3","gps":"","images":["../image/image_79/79_St_Varent_1.jpg","../image/image_79/79_St_Varent_2.jpg","../image/image_79/79_St_Varent_3.jpg"]},"Consult_chateau_formulaire30ce":{"id":"Consult_chateau_formulaire30ce","dept":"79","canton":"Autize-Égray","commune":"Ste-Ouenne","nom":"Ste_Ouenne","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux à Sainte-Ouenne; le château de Gazeaux et de Moussière .                                                                                                                  GAZEAU, de la fin du XVe ou du début du XVIe siècle,  Le château fut construit pour Pierre Aymeret et son épouse Jeanne de Gazeau. Il reste la propriété de la famille Aymeret pendant plus de 300 ans, jusqu'en 1796. propriété de la famille Dessalien.                                                                                                                             MOUSSIERE, la seigneurie  appartenait au XVIe siècle aux Malmouche. Elle passa dans la famille Janvre au XVIIe siècle, par le mariage de Renée de Malmouche avec Daniel Janvre. Les Janvre, devenus par la suite Janvre de la Moussière, y demeurèrent jusqu'au début du XIXe siècle, ensuite le logis est passé à la famille Faidy, et à la suite d'un échange en 1863, la demeure sortit de cette famille. La façade principale est pourvue d'une belle porte monumentale surmontée d'un arc. Il est orné de trois lucarnes portant les dates 1584  (pour deux d'entre elles) et 1630 (pour la troisième). Celles ci sont encadrées de pilastres qui supportent un petit fronton décoré de trois vases. A l'arrière, à l'angle nord ouest, subsiste une tour tronquée. Les communs datent de 1610.","architecture":"GAZEAU, présentant une série de bâtiments rectangulaires disposés autour d'une cour. Deux tours rondes, en avancée au nord, sont reliées au châtelet d'entrée par un muret. Elles sont percées de canonnières, rares éléments défensifs du château qui ne possède ni pont-levis, ni herse, ni douve ou talus. L'aile nord est occupée d'un seul tenant par le châtelet d'entrée, un corps de logis appelé \"maison du chapelain\" et séparé de la chapelle par un passage. Le châtelet est percé d'une porte cochère et d'une piétonnière, toutes deux défendues par des mâchicoulis couverts sur consoles à ressauts et surmontées d'une épaisse moulure gothique, relevée en accolade au-dessus de la porte cochère. Le châtelet est percé, sur son élévation nord, d'une grande fenêtre à traverse moulurée au-dessus des portes, et d'une travée de trois petites fenêtres. Au-dessus des deux premiers mâchicoulis de chaque extrémité, entre les consoles, se trouvent des motifs trilobés flamboyants sculptés. Une très longue galerie occupe l'aile Est, séparée de la chapelle par une petite pièce carrée. Dans le prolongement de l'aile, au sud, se trouvait autrefois la maison seigneuriale, entièrement détruite au début du XIXe siècle, ainsi que le pigeonnier démantelé à la fin des années 1970. De toute la partie sud du château ne subsistent plus que les fondations au sol. Elle était percée, sur sa façade ouest, de trois larges arcatures.","habitants":"Gazeau Famille Aymeret                                                       moussière; Famille Janvre\r\n        \"","divers":"A ste-Ouenne; Gazeau  grav 1 à 6.  46° 13' 49\" nord, 0° 00' 38\" est                         Moussière  : 46° 26 47\" Nord, 0° 26 42\" Ouest Puy-Blayn grav 7","gps":"","images":["../image/image_79/79_Ste_Ouenne_1.jpg","../image/image_79/79_Ste_Ouenne_2.jpg","../image/image_79/79_Ste_Ouenne_3.jpg","../image/image_79/79_Ste_Ouenne_4.jpg","../image/image_79/79_Ste_Ouenne_5.jpg","../image/image_79/79_Ste_Ouenne_6.jpg","../image/image_79/79_Ste_Ouenne_7.jpg"]},"Consult_chateau_formulaire485e":{"id":"Consult_chateau_formulaire485e","dept":"79","canton":"Parthenay","commune":"Amailloux","nom":"Tennessus","type":"Forteresse","periode":"XIV-XVI","histoire":"AMAILLOUX,  en 1404 Chaillot des Près cité comme seigneur, en 1437, Georges d'Abin, seigneur, auquel succéda un La Court, sollicita vainement l'autorisation de fortifier son château, permission que le pouvoir royal accorda en 1469 à l'un de ses successeurs. Amailloux, dont la seigneurie qui s'étendait également sur St-Germain-de-Longue-Chaume était tenue d'Airvault à foi et hommage lige, était en 1561, aux mains de François Frezeau, seigneur de la Frezelière. Le domaine échut, par mariage, à Georges de Maillé de la Tour-Landry. En 1752 un Maillé vendit la seigneurie à Alexis de Liniers, dont les descendants conservèrent le domaine jusqu'à la Révolution.                                                                                                          TENNESSUS, au XVIe siècle  passe aux Bordet de la Fenêtre, en 1607 aux Chasteigner le château est condamné à la démolition par arrêté du Directoire des Deux Sèvres, les propriétaires ayant émigré en 1792, mais la sentence n'est pas exécutée, il fut acheté en 1975 par le sculpteur Dominique Piéchaud, qui a entrepris aussitôt les réparations les plus urgentes. En 1989, le château fut vendu et tomba finalement aux mains des Anglais, ces nouveaux propriétaires la famille  Freeland ont continué les travaux de restauration, et viennent d'achever leur dernier projet, la restitution du troisième étage du donjon. Le château de Tennessus est, aujourd'hui, aménagé en chambres d'hôtes","architecture":"AMAILLOUX, de ce qui fut le château seigneurial d'Amailloux subsistent un reste de tour et quelques vestiges de constructions anciennes. Entourée de douves, sa grande cour à laquelle on accédait par un pont levis était protégée par un mur de six pieds percé de nombreuses meurtrières. Entre les tours d'angle, un corps de logis était flanqué d'une tour à escalier extérieur. Après 1700, le château fut remplacé par une demeure d'aspect moins austère. Les Bleus l'incendièrent en 1793 pendant la prise du bourg par les soldats de Westermann, mais elle ne fut pas reconstruite.                                                                                         TENNESSUS, la tour est mentionnée dès 1404. En 1793,  l'édifice est entouré de douves. A l'ouest, subsiste une partie de l'enceinte entourant maisons, granges et communs de la métairie. Les communs sont ordonnés autour d'une cour rectangulaire protégée par deux tours arasées. Sur le logis au nord, se lit la date de 1771. Les bâtiments datent du XVIIe siècle, avec des remaniements au XVIIIe siècle. Après plusieurs propriétaires durant les XIXe et XXe siècles, ce précieux témoin du passé semblait voué à sa ruine.","habitants":"Amailloux; Alexis de Liniers                                                   Tenessus; famille  Freeland\r\n        \"","divers":"A Amailloux; Tenessus 46° 42' 50\" nord, 0° 16' 43\" ouest","gps":"","images":["../image/image_79/79_Tennessus_1.jpg","../image/image_79/79_Tennessus_2.jpg","../image/image_79/79_Tennessus_3.jpg","../image/image_79/79_Tennessus_4.jpg","../image/image_79/79_Tennessus_5.jpg"]},"Consult_chateau_formulaire2d87":{"id":"Consult_chateau_formulaire2d87","dept":"79","canton":"La Gâtine","commune":"St-Aubin le Cloud","nom":"Theil_79","type":"Château","periode":"XII-XV","histoire":"THEIL, la première construction érigée sur le site du logis du Theil remonte au XIIe siècle. Peu d'éléments sont conservés de cette période. A la fin du XIXe siècle, le logis a été refait par l'architecte Paul Guillerot, très inspiré par le style Renaissance. Propriété de la baronne et du baron Davillier.","architecture":"THEIL, toutes les parties hautes ont été reprises et la décoration intérieure refaite. La façade ouest a été prolongée d'une fausse terrasse, un pont à deux arches a été construit pour franchir les douves. En ce qui concerne les dépendances, il ne subsiste que la moitié de l'aile sud et l'aile ouest. La disposition actuelle des pièces, au moins celles du rez-de-chaussée, est encore celle du logis médiéval tout comme la cheminée monumentale de la bibliothèque. L'intérieur renferme des éléments de décoration remarquables: boiseries, encadrements de portes en granit, cheminée monumentale, escalier en vis en granit. Le parc constitue un ensemble harmonieux de 200 hectares et comporte trois étangs, il figure comme un exemple de parc agricole paysager à l'anglaise.","habitants":"baron Davillier\r\n        \"","divers":"A st-Aubin; le château du Theil, 46° 40' 40\" nord, 0° 18' 14\" ouest","gps":"","images":["../image/image_79/79_Theil_79_1.jpg","../image/image_79/79_Theil_79_2.jpg","../image/image_79/79_Theil_79_3.jpg","../image/image_79/79_Theil_79_4.jpg"]},"Consult_chateau_formulaireca7c":{"id":"Consult_chateau_formulaireca7c","dept":"79","canton":"Le Val de Thouet","commune":"Luzay","nom":"Thiors","type":"Château","periode":"XV","histoire":"THIORS, les archives de Saint-Loup mentionnent Thiors en 1384, dont la seigneurie relevait de Thouars. Le premier propriétaire connu est Louis de la Chapellerie qui obtint Thiors par son mariage avec la fille de Raymond Colin de Thiors, il en fit l'aveu au château de Thouars, le 14 janvier 1420. Auparavent le château fut possédé par la famille poitevine d'origine napolitaine Palavicini, qui se transforma en Pelvoisin puis Appelvoisin. . Depuis 1986, le logis de Thiors appartient à M. et Mme Castaing.","architecture":"THIORS, le château de Thiors occupe une position centrale entre deux parcelles bordées de murs d'enceinte cantonnés de tours circulaires aux angles. La parcelle à l'ouest du château abrite un parc et à l'est une cour fermée par des communs. Les tours sont encore plus ou moins debout et l'entrée au sud du château est défendue par une tour ronde en moellons à moitié arasée. Sur un porche donnant accès au jardin, l'inscription 1625 date de remaniement du château et des communs. Le corps de logis est de plan rectangulaire, l'angle sud-ouest possède une grosse tour circulaire coiffée d'une poivrière.","habitants":"Louis de la Chapellerie \r\n        \"","divers":"A Luzay ; Le château de Thiors  46° 55' 31\"  nord, 0° 13' 05\" ouest","gps":"","images":["../image/image_79/79_Thiors_1.jpg","../image/image_79/79_Thiors_2.jpg","../image/image_79/79_Thiors_3.jpg"]},"Consult_chateau_formulaire8d89":{"id":"Consult_chateau_formulaire8d89","dept":"79","canton":"Niort","commune":"St-Liguaire","nom":"Tiffardière","type":"Château","periode":"XV-XIX","histoire":"TIFFARDIERE, la seigneurie de la Tiffardière, mentionnée dès 1260, était tenue au milieu du XVe siècle par Jean Chevaleau écuyer, seigneur de Boisragon et la Tiffardière, il avait épousé Jeanne Rogre. A la fin du XVIe siècle la Tiffardière était aux mains de Jean, écuyer, seigneur de Boisragon et la Tiffardière, arrière-petit-fils du précédent. Capitaine huguenot et gouverneur de Saint-Maixent, il défendit cette ville en 1587 contre le duc de Joyeuse. Les Chevaleau conservèrent le domaine de la Tiffardière jusqu'au milieu du XVIIe siècle. A la veille de la Révolution, il fut acquis par Gabriel-Jean-Berthelin de Montbrun, puis transmis par sa fille à son époux le comte Hélie de Sainte-Hermine et appartint successivement à Pierre Bodet de la Fenêtre puis au baron Petiet à la fin du XIXe siècle. Au début du XIXe siècle, au comte de Sainte-Hermine. A sa place, il fit construire un édifice de plan rectangulaire d'une grande sobriété, devenu propriété du conseil général des Deux-Sèvres.","architecture":"TIFFARDIERE,  le 23 mai 1783, il est acheté par le comte Gabriel-Jean-Simon Berthelin de Montbrun, chevalier, seigneur d'Aiffres, de Montmartin, Coulon etc,  à Messire François-Isaac Delacropte, écuyer, seigneur, marquis de Saint Abre, et dame Maris-Françoise-Thècle-Laurens Degorse son épouse, Marguerite Garnier, veuve de Henri-Joseph Delacropte de Saint-Abre, Olivier de Goret, seigneur de Juyers et sa nièce Marie de Goret, héritiers de Messire Olivier Garnier, écuyer, seigneur de Fontanon et de dame Laval, son épouse. Le comte Gabriel-Jean Bertelin de Montbrun transmit son château à sa fille, Marie-Agathe, épouse du Comte Emmanuel-Armand-Jean de Saint-Hermine. Celui-ci fit détruire lancien château en 1820, en ne conservant quune tour et la fuie.  Il fit construire de 1819 à 1823 un modeste château. Un édifice de plan rectangulaire d'une grande sobriété.Ce sont les restes de ce château que nous pouvons voir actuellement.  Le comte Emmanuel Armand Jean de Sainte-Hermine transmet la Tiffardière à lune de ses filles : Zoé Angélique, épouse de M. Pierre Bodet de Lafenestre. À la mort de celle-ci, la propriété revint à Marie Anna épouse du baron Sylvain Petiet.Le petit fils de celui-ci : le baron Henri Pétiet vendit le domaine le 2 août 1907 à Mr et Mme Lévesque. Roger Lévesque attribue le château à sa fille, Mme Monnier. C'est en 1959 qu'elle vend le château et ses dépendances au département.","habitants":"Famille des Chevaleau\r\n        \"","divers":"Château de la Tiffardière à St-Liguaire","gps":"","images":["../image/image_79/79_Tiffardi%c3%a8re_1.jpg","../image/image_79/79_Tiffardi%c3%a8re_2.jpg","../image/image_79/79_Tiffardi%c3%a8re_3.jpg"]},"Consult_chateau_formulaire4e31":{"id":"Consult_chateau_formulaire4e31","dept":"79","canton":"La Gâtine","commune":"St-George de Noisné","nom":"Touche_Poupard","type":"Château","periode":"XV","histoire":"TOUCHE-POUPARD semble remonter au milieu du XIIe siècle mais la date est incertaine. Au XVe siècle, la Touche Poupard devint la propriété de la famille Guitteau qui le céda un siècle plus tard à Charles Payen écuyer, protestant. La famille Payen fit rebâtir le logis central et les communs. La famille de Bernay propriétaire de 1785 à 1890, restaura le logis, fit combler les douves et construire une chapelle.","architecture":"TOUCHE-POUPARD, mutilé au début du XXe siècle, va bientôt partager son nom avec un barrage dont la construction est prévue pour les années à venir. La façade nord possède deux étages et une toiture d'ardoises. Le bâtiment a été amputé au XXe siècle des deux ailes qui le flanquaient. Au sud, on peut voir deux tourelles en encorbellement qui encadrent l'ancienne entrée.","habitants":"Famille Guitteau \r\n        \"","divers":"Château de la Touche-Poupard à St-George de Noisné","gps":"","images":["../image/image_79/79_Touche_Poupard_1.jpg","../image/image_79/79_Touche_Poupard_2.jpg"]},"Consult_chateau_formulairef4fa":{"id":"Consult_chateau_formulairef4fa","dept":"79","canton":"Frontenay-Rohan-Rohan","commune":"Vallans","nom":"Vallans","type":"Château","periode":"XV","histoire":"Trois châteaux à Vallans celui d'Allerit, de Gautret et de Vallans. ALLERIT, la seigneurie d'Allerit ou Allery appartenait en 1443 à Guillaume Grany qui était aussi seigneur de Bois-Pouvreau, importante seigneurie proche de Ménigoute, aujourd'hui disparue. A la fin du XVIe siècle, cette maison noble était aux mains de la baronne Louise d'Estissac, née La Béraudière qui vendit Allerit en 1595 à la veuve de Jacques de Béchillon. Cette dernière transmit le domaine à son fils Samuel, nommé gentilhomme ordinaire de la chambre du Roi en 1614. Pierre Charles de Béchillon, petit fils de Samuel fut le dernier seigneur d'Allerit à la fin du XVIIe siècle.                                                                            VALLANS   la seigneurie de Vallans était aux mains de Guy de Surgères au début du XIVe siècle. Sa fille Jeanne apporta le fief de Vallans à son époux Geoffroy d'Argenton. Des d'Argenton l'édifice passa en 1363 aux Beaumont. En 1480 le domaine changea à nouveau de mains et passa aux de Chourses. Ces derniers gardèrent le fief jusqu'à la fin du XVIe siècle. En 1650, la propriété appartenait à Charles du Bellay, marquis de Thouarcé, qui le revendit la même année à Charles de Béchillon. Par la suite, Vallans passa aux Chebrou. Le château de Vallans, situé dans le bourg, a été restauré ces dernières années.","architecture":"VALLANS, il fut le site d'une seigneurie dont on trouve des traces dès le XIVe siècle                                                                                                                         ALLERIT, l'actuel château a été édifié en 1780. C'est une grande bâtisse rectangulaire, de conception classique et dotée de nombreuses ouvertures. Dans la cour, face à la demeure, se dresse un beau pigeonnier.                                      GAUTRET, se situe à la limite nord de la commune, en bord de marais. On retrace son histoire jusqu'au début du XVIIe siècle. Au début du XXe siècle, le logis fut légué à la famille de Francis Picabia, peintre et écrivain proche du mouvement Dada, avant d'être racheté par un agriculteur local en 1940.","habitants":"Allerit; Pierre Charles de Béchillon                                              Vallans; Famille de Chebrou\r\n        \"","divers":"A Vallans; Allerit grav 1-2-3     de Ligniers grav -4    divers hôtel  5 Gautret grav-6                                                             46° 12' 54\" nord, 0° 33' 05\" ouest","gps":"","images":["../image/image_79/79_Vallans_1.jpg","../image/image_79/79_Vallans_2.jpg","../image/image_79/79_Vallans_3.jpg","../image/image_79/79_Vallans_4.jpg","../image/image_79/79_Vallans_5.jpg","../image/image_79/79_Vallans_6.jpg"]},"Consult_chateau_formulaireb9c6":{"id":"Consult_chateau_formulaireb9c6","dept":"79","canton":"La Gâtine","commune":"Vasles","nom":"Vasles_Sayette","type":"Château","periode":"XVII","histoire":"Trois châteaux à Vasles, dont Vasles,  Chilleau et Sayette.                                                    CHILLEAU, élégante demeure du XVIIe siècle, largement remaniée au XIXe siècle, appartenu aux puissants seigneurs du Chilleau. D'ancienne noblesse, certains membres de cette famille se distinguèrent dans la carrière militaire. Le Chilleau resta entre leurs mains jusqu'à la Révolution. Les derniers du Chilleau ont probablement émigré à cette époque, et de nombreux propriétaires s'y succédèrent jusqu'en 1812 (les La Roche Saint-André, les Tardieu de Maleyssie, etc), date à laquelle il fut acheté par François Delaunay-Lemière, qui s'était déjà rendu acquéreur du domaine de Paulier. Il passa ensuite aux La Caze, puis en 1912 entra dans la famille Audoin, dont les descendants étaient encore propriétaires récemment.                                                                                                          SAYETTE, le château de la sayette appartient toujours à la Famille de la Sayette depuis sa construction en 1123  subit les aléas de l'histoire, investi par les Anglais, assiégé par les Huguenots, puis il est vendu comme bien national à la Révolution.  Elle est ornée par onze vitraux réalisés en 1856 et 1882, par Lobin de Tours  puis Fournier. Emmanuel et Michelle de La Sayette ont repris en 1977 le château ancestral, dans la famille depuis 14 générations. Le château de la Sayette est inscrit aux MH depuis 2004. Ses nouveaux propriétaires M. et Mme de Saint-André procèdent à sa restauration et l'ont fait inscrire en 2006.","architecture":"CHILLEAU, présente un plan rectangulaire. Sa façade est flanquée de deux hauts pavillons en saillie. Il subit des modifications importantes vers 1886, lorsque le baron La Caze, propriétaire du Chilleau, fit venir l'architecte parisien Lecur pour transformer la demeure du XVIIe siècle, déjà édifiée sur une maison noble du XIVe siècle.                            SAYETTE, au XIXe siècle, l'architecte Boyer se voit confier les travaux de remaniement, et érige une chapelle néo-gothique, entre 1856 et 1882. Entouré d'un parc fermé par des grilles XVIIIe, le château se compose d'un corps central à deux niveaux sous lucarnes. De part et d'autre, deux pavillons  du XIXe siècle, sous toiture à quatre pentes. Sur l'élévation postérieure, deux tours en demi hors-oeuvre, coiffées de poivrières. A l'intérieur, deux salons ont conservé leurs boiseries du XVIIIe siècle et plusieurs chambres à l'étage. La chapelle s'ordonne autour d'un module carré central. Elle est ornée par onze vitraux réalisés en 1856 et 1882, par Lobin de Tours puis Fournier.                                                                                                        VASLES, l'architecture de ce logis en équerre est conforme au XVe siècle. Le bâtiment est richement orné de superbes fenêtres à meneaux. Ce logis est ce qui reste d'un ensemble castral, comprenant un \"pénitencier\". La plus grande partie a été détruite vers 1900 pour faire place à l'agrandissement de la place publique et à la construction d'une nouvelle église. Le logis est couvert d'une haute toiture à tuiles plates. Il comprend une tour hexagonale à vis.","habitants":"Chilleau; Famille Audoin                                                     Sayette;  famille  deLobin de Tours \r\n        \"","divers":"Sayette grav 4-5-6   : 46° 35' 50\" Nord et 0° 00' 41\" Est                            Vasles GPS : 46° 34' 33,88\" Nord et 0° 01' 32,07\" Ouest  Chilleau grav 2-3","gps":"46° 34' 33,88\" Nord et 0° 01' 32,07\" Ouest  Chilleau grav 2-","images":["../image/image_79/79_Vasles_Sayette_1.jpg","../image/image_79/79_Vasles_Sayette_2.jpg","../image/image_79/79_Vasles_Sayette_3.jpg","../image/image_79/79_Vasles_Sayette_4.jpg","../image/image_79/79_Vasles_Sayette_5.jpg","../image/image_79/79_Vasles_Sayette_6.jpg"]},"Consult_chateau_formulaire1d47-3":{"id":"Consult_chateau_formulaire1d47-3","dept":"79","canton":"Bressuire","commune":"Chapelle-Gaudin","nom":"Vermette","type":"Manoir","periode":"XV-XVI","histoire":"VERMETTE,  c'est en 1968 que des travaux, entrepris par le sculpteur Dominique Piéchaud, sauvèrent l'édifice. La Propriétaire : Roomlala Anne.","architecture":"VERMETTE, c'est un château construit en 1520. entouré de douves, est formé de deux ailes en équerre de part et d'autre d'une tour hexagonale dans laquelle un grand escalier à vis dessert les étages tandis qu'une tourelle relaie l'escalier pour accéder à son sommet. Mis à part les fenêtres à meneaux et l'arc de la porte d'entrée traduisant un style gothique finissant, les cheminées en granit ainsi que les trois lucarnes en tuffeau richement ornementées sur la façade nord, incitent à dater sa construction vers les années 1520. Bâti en granit et en roche métamorphique, à l'exception des lucarnes en tuffeau et des marches de l'escalier à vis en calcaire à ammonites de Thouars, le château fut incendié durant la Révolution et si l'aile nord demeure à peu près intacte, terminée par deux échauguettes décoratives, l'aile Est a été amputée. Le XIXe siècle a vu sa décadence et sa transformation en exploitation agricole.","habitants":"Famille de  Roomlala Anne \r\n        \"","divers":"Vermette  grav de 1 à 6: 46° 55' 56\" Nord, 0° 22' 50\" Ouest","gps":"","images":["../image/image_79/79_Vermette_1.jpg","../image/image_79/79_Vermette_2.jpg","../image/image_79/79_Vermette_3.jpg","../image/image_79/79_Vermette_4.jpg","../image/image_79/79_Vermette_5.jpg","../image/image_79/79_Vermette_6.jpg"]},"Consult_chateau_formulaire518b-2":{"id":"Consult_chateau_formulaire518b-2","dept":"79","canton":"La Gâtine","commune":"Vernoux sur Boutonne","nom":"Vernoux_Boutonne","type":"maison forte","periode":"XV-XVI","histoire":"Deux châteaux  à Vernoux sur  Boutonne celui du grand-port  et à Périgné à deux kilomètres au nord le château de la Guittonière.  GUITTONIERE, le fief de la Guittonnière appartenait au XVe siècle à la famille Roux, puis passa vers 1470 à la famille Rogier. En 1507, il changea de mains et entra dans la famille Berland, qui conserva la terre jusqu'en 1666, date à laquelle Françoise épousa son cousin, François Thibault, chevalier, seigneur de la Carte, à qui elle apporta ce domaine. En 1754, Louis Thibault de la Carte, marquis de la Ferté, le céda à Jean Baptiste de Bonneval, inspecteur général des manufactures du royaume. Il le vendit en 1771, à Jean Etienne Delavault, prieur-curé d'Amuré et à Louis Delavault, négociant à Niort. Le château est passée en 1909 à madame Lagarde, légataire universelle d'Anaïs Delavault, puis aux familles Aumônier et Martinet                                                                                                                                 GRAND-PORT, le domaine est constitué de plusieurs éléments distincts inclus dans une enceinte rectangulaire cantonnée de tours rondes. Son front était défendu par une pièce d'eau. Dans la cour, un petit logis-tour date des XVe-XVIe siècles. Au-dessus d'une porte se trouvent les armoiries au chef de Malte, qui sembleraient appartenir aux Gitton.","architecture":"GUITTONIERE, Il subsiste une belle tour imposante, couronnée de mâchicoulis et comportant un chemin de ronde. On remarque sur le crénelage le blason sculpté de la famille Berland. Elle est coiffée d'un toit conique en ardoises. Cette tour, très bien conservée, est reliée à un corps de logis, cantonné à son autre extrémité d'une tour tronquée dotée d'une tourelle d'angle.                                                        GRAND-PORT, un logis XVIIe siècle longe le front Est. Il est de plan rectangulaire et recevait autrefois une toiture à pans brisés. Il conserve des portes sculptées, un escalier monumental ainsi qu'une cheminée sculptée. Des dépendances à caractère agricole se trouvent dans la cour (four à pain, écuries, granges). A l'extérieur sont construits une fuie de 1789 boulins et une vaste grange-écurie qui abritait un important élevage mulassier au début du XXe siècle. Ouverture exceptionnelle aux journées du patrimoine: visite commentée des bâtiments restaurés (matériaux et technique de restauration), sauf petit logis XVIe siècle privé. Visite commentée partielle du logis du XVIIe siècle (à restaurer), visite libre du pigeonnier et des jardins en cours de restitution.","habitants":"Guittonière; Famille Berland\r\n        \"","divers":"A Vernoux Boutonne; Guitonnière grav 1-2                                      Gd-Port   grav 3-4-5                                                                        Vernoux 46° 10' 16\" nord, 0° 15' 51\" ouest","gps":"","images":["../image/image_79/79_Vernoux_Boutonne_1.jpg","../image/image_79/79_Vernoux_Boutonne_2.jpg","../image/image_79/79_Vernoux_Boutonne_3.jpg","../image/image_79/79_Vernoux_Boutonne_4.jpg","../image/image_79/79_Vernoux_Boutonne_5.jpg","../image/image_79/79_Vernoux_Boutonne_6.jpg"]},"Consult_chateau_formulairefe37":{"id":"Consult_chateau_formulairefe37","dept":"79","canton":"Celles-sur-Belle","commune":"La Motte St-Héray","nom":"Villedieu_Comble","type":"Château","periode":"XV","histoire":"VILLEDIEU, le propriétaire obtint de Charles VII, au XVe siècle, l'autorisation de construite une maison forte pour résister aux Anglais. Propriété de La famille Maurice Bernard.","architecture":"VILLEDIEU de Comblé,  lLe château occupait une position stratégique, situé sur une île et était protégé par une première enceinte de fossés entourant une vaste cour. Vers 1543, la reconstruction de la demeure est entreprise. A la Révolution, le domaine fut vendu comme bien national. Le porche flanqué de deux tours date du XVe siècle. Un pont mettant en communication la cour de l'îlot du château, a été construit en 1577 puis refait en 1889 dans le style du XVIIe siècle sur les plans de Victor Surreaux (arche en anse, décorée d'un bossage en pointes de diamant, surmontée d'une galerie à balustres tournées). La façade sud a été totalement remaniée. Elle est encadrée de tourelles en encorbellement, reposant sur une galerie de cinq arcades à cintre surbaissé. Le deuxième niveau de la façade est orné d'une frise formée de 18 têtes. Les fenêtres des lucarnes sont flanquées de cariatides. La façade nord s'appuie sur deux tours, l'une carrée, l'autre pentagonale. Côté Est, le pignon est flanqué de deux tourelles en encorbellement, et surélevé d'un fronton. A l'ouest, un pavillon en avant-corps sur trois niveaux, a été édifié au XIXe siècle. Les trois communs datent du XVIIe siècle, comprenant un portail souligné de bossages vermiculés et des oculus pour éclairer les greniers.","habitants":"famille Maurice Bernard\r\n        \"","divers":"Villedieu  grav 1 à 4                  46° 21' 19\" nord, 0° 06' 39\" ouest","gps":"","images":["../image/image_79/79_Villedieu_Comble_1.jpg","../image/image_79/79_Villedieu_Comble_2.jpg","../image/image_79/79_Villedieu_Comble_3.jpg","../image/image_79/79_Villedieu_Comble_4.jpg"]},"Consult_chateau_formulaire9434-2":{"id":"Consult_chateau_formulaire9434-2","dept":"79","canton":"Celles-sur-Belle","commune":"Beaussais-Vitré","nom":"Villermat","type":"Château","periode":"XV","histoire":"VILLERMAT,  au XVe siècle, la famille de Saint-Gelais tenait la seigneurie de Villermat. La maison noble passa ensuite aux mains de la famille d'Orfeuille qui l'avaient en hommage du seigneur de Gascougnolles. La famille de Parthenay la posséda de 1571 à 1672 environ. En 1698, le fief appartenait au seigneur Josué demeurant près de Saint-Jean-d'Angély. Au XVIIIe siècle, il appartiendra à la famille de Turpin, branche de Jouhé. Le logis ira ensuite aux époux Devezeau, à Mme de Chergé et à Mr Leblois. Louis Bonaventure Alfred Bruneau, compositeur de musique, possèdera le logis de Villermat, jusqu'en 1920, date à laquelle, il cèdera la propriété, aux agriculteurs, exploitant les terres. Le logis de Villermat-en-Beaussais est une propriété privée.","architecture":"VILLERMAT,  il est composé d'un bâtiment à une travée et un étage, dont les ouvertures se situent sur le mur gouttereau et, d'une tour d'escalier accolée. La porte est surmontée d'un linteau en accolade.","habitants":"Famille de Turpin,\r\n        \"","divers":"Villemart grav 1           46° 17' 28\" Nord, 0° 09' 06\" Ouest","gps":"","images":["../image/image_79/79_Villermat_1.jpg"]},"Consult_chateau_formulairec19c":{"id":"Consult_chateau_formulairec19c","dept":"79","canton":"Vitré","commune":"Vitré","nom":"Vitré_Chateau","type":"Château","periode":"XV-XIX","histoire":"BESSIERE, le château de la Bessière apparaît pour la première fois dans les hommages d'Alphonse de France, comte de Poitiers, au XIIIe siècle, Hugues de la Touche en était alors seigneur. Il passa ensuite à la famille de Saint-Gelais Lusignan. En 1432, Tranchant de Saint-Gelais, chevalier, seigneur de la Bessière, n'ayant pas d'enfant, le légua à ses neveux et par le jeu d'un partage, il échut à Jean de Saint-Gelais. La demeure passa ensuite à différentes familles, aux Chabanais, aux Brémond d'Ars, aux Payen, et aux Gourjault. Le château a été construit au XVe siècle, largement restauré et agrandi vers 1880.                                                                           FONTIVILLE, l'édifice a été construit entre 1845 et 1848 pour Pierre-François-Alcide Taillefer, juge de paix du canton de Celles, et son épouse Pauline-Virginie Belleroche. Ils ont donnés à leur demeure le nom de Fontiville qui apparaît en 1856. Vers 1890, Jacques-Louis-Alfred Guille-Desbuttes et sa femme, née Anne-Fanny Taillefer, ont fait bâtir l'orangerie. Dans la première moitié du XXe siècle, le château a été loué à différents particuliers, puis un restaurant s'y est installé. C'est à cette époque que le jardin d'hiver, accolé sur l'élévation sud, a été rénové en remplaçant les panneaux vitrés par des baies à double vitrage sur le même soubassement. Depuis 1996, il est de nouveau une propriété privée d'habitation.","architecture":"BESSIERE, l'édifice est bâti sur une colline. Les différents corps de bâtiments sont répartis autour d'une cour trapézoïdale dont le logis occupe la partie sud. Celui-ci est constitué d'un corps de bâtiment rectangulaire flanqué d'un pavillon à l'ouest et prolongé de deux travées à l'est, l'ensemble est couvert en ardoise. Un escalier secondaire, en bois, a été installé dans l'agrandissement Est du logis. Les baies des lucarnes ont un décor trilobé inscrit dans un fronton triangulaire.                                                                                                 FONTIVILLE, le château, de plan carré et double en profondeur, a cinq travées sur les élévations nord, Est et sud, et trois travées sur l'élévation ouest. Sur l'élévation nord deux fausses travées semblent avoir été murées dès l'origine. Le solin est en pierre de taille. Les niveaux du rez-de-chaussée surélevé et du premier étage sont soulignés par des bandeaux d'appui. Le second étage carré fait office d'étage d'attique. Les chaînes d'angle sont en bossage jusqu'au niveau du second étage. Les vitres de la porte d'entrée sont protégées par des panneaux en fonte ouvragé. Les garde-corps de l'étage sont également en fonte ouvragé.  Le corps de logis est couvert en longs pans et croupes à très faible pente et le jardin d'hiver en métal. Toutes les dépendances sont couvertes en tuiles creuses. Un bélier, permettant d'élever l'eau, avait été installé dans un pré en bas près d'une source.","habitants":"Bessière;famille de Saint Gelais Lusignan, Fontiville; Jacques-Louis-Alfred Guille-Desbuttes \r\n        \"","divers":"A Vitré; Bessière grav-1.                                                          Fontiville grav 2-3","gps":"","images":["../image/image_79/79_Vitr%c3%a9_Chateau_1.jpg","../image/image_79/79_Vitr%c3%a9_Chateau_2.jpg","../image/image_79/79_Vitr%c3%a9_Chateau_3.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','79 — Deux-Sèvres'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
