lle dun capitaine du château de Saint Maixent. Il fit graver sur une lucarne de la demeure, portant armoiries et datant de 1598, la devise suivante \"virtute et labore\". Un siècle plus tard, la Grande Fougère était la propriété du sieur Marchand demeurant à Paris. Le domaine passa aux Espron de Beauregard, puis successivement aux Albert, Desaivre, Cadoudat et Alix.                                                                                                                               MAILLE  , François de Lesquelen, marié à Béatrix de Kermavan, reprit le nom de Kermavan. François de Lesquelen était lui-même le fils de Hervé de Lesquelen de Léon, mort en 1288 et, descendait d'une branche cadette des comtes de Léon. la seigneurie de Maillé est connue depuis la fin du XVIe siècle. Elle relevait de Saint-Maixent et était la propriété des Eschalard, une ancienne famille originaire de Parthenay. En 1646, Maillé passe aux mains de Jean de Caillo et reste sa propriété jusqu'à la Révolution.","architecture":"GRANDE-FOGERE, la construction semble remonter à la fin du XIVe ou au début du XVe siècle. Elle a subi des remaniement et des agrandissements aux XVIe et XVIIe siècles. Il existe toujours une tour carrée, privée de son toit et munie dune bretèche. La porte dentrée est surmontée dun fronton triangulaire à jour. Dans laxe de cette porte sise sous le toit, subsiste une autre bretèche.                                                                                                  LOGES, formait une seigneurie connue depuis le XVe siècle. La façade postérieure nord est la plus ancienne. Aux XVe-XVIe siècles le logis est flanqué de deux tours de défenses. En 1776 le corps de logis principal est agrandi d'une aile ouest et d'une chapelle construite dans le parc. En 1780, deux pavillons complètent les deux ailes, les communs sont construits en 1820 dans le prolongement des ailes du château et deux grilles ferment la cour, un potager clos avec pavillons servant de logement au jardinier et de remise, une fontaine et son lavoir, ainsi qu'une chapelle, complètent l'ensemble.                                                                                                  MAILLE, le domaine est clos de murs et l'accès se fait par un portail, percé d'une porte charretière et d'une porte piétonne cintrées à clefs passantes: cantonné de deux tours rondes abritant des pigeonniers, comparables à celui des loges ou de Nuchèze. Le logis est construit sur une terrasse, il est de plan rectangulaire. L'entrée est mise en valeur par un pavillon carré dans le même alignement, mais plus haut que le reste du bâtiment. On note une différence dans l'emploi des matériaux de couverture : ardoise pour le pavillon et tuiles creuses pour le reste du logis. Plusieurs dates apparaissent sur le portail et le mur de clôture : 1630, 1636 et 1646.","habitants":"Grande Fougère   Espron de Beauregard,                       Maillé; famille de Jean Caillo\r\n        \"","divers":"Grande-Fougère grav 3-4 Loges  grav 1-2.    46° 27' 36\" nord, 0° 20' 13\" ouest                                         PS : 48° 37' 20\" Nord, 4° 10' 08\" Ouest                                                                           Maillé  grav 4 à 8              46° 26' 42\" nord, 0° 19' 48\" ouest","gps":"","images":["../image/image_79/79_Chapelle_Baton_1.jpg","../image/image_79/79_Chapelle_Baton_2.jpg","../image/image_79/79_Chapelle_Baton_3.jpg","../image/image_79/79_Chapelle_Baton_4.jpg","../image/image_79/79_Chapelle_Baton_5.jpg","../image/image_79/79_Chapelle_Baton_6.jpg","../image/image_79/79_Chapelle_Baton_7.jpg","../image/image_79/79_Chapelle_Baton_8.jpg"]},"Consult_chateau_formulairea6a5":{"id":"Consult_chateau_formulairea6a5","dept":"79","canton":"Parthenay","commune":"La Chapelle Bertrand","nom":"Chapelle_Bertrand","type":"Château","periode":"XV","histoire":"Trois châteaux à la Chapelle-Bertrand, dont celui de la Chapelle Bertrand  celui de la Touche-Ory et de la Rouillière dans article suivant pour ses deux derniers.                                                                    CHAPELLE BERTRAND, au chevalier Louis Normandin, au XIVe siècle, premier seigneur connu de La Chapelle-Bertrand, succéda Jehan Bonnet, également seigneur de Saint-Lin et de La Boissière-en-Gâtine.  En 1549, Madeleine, fille de Léon de Melun, apporta, en lépousant, terres et château à François dEscoubleau de Sourdis. Leur descendant, René dEscoubleau, vendit le domaine, en 1776, à Gabrielle Poignand de Lorgère et à son frère Jean. Dernière de sa lignée, Louise-Eugénie Poignand de Lorgère épousa, en 1813, Alphonse dAubéri, chevau-léger en 1814, qui, lannée suivante, accompagna Louis XVIII dans son bref exil à Gand, avant de participer à la chouannerie de 1815 avec Louis de La Rochejaquelein. Dernière du nom, Louise-Radegonde dAubéri, célibataire, fille du marquis Louis-Gaspard dAubéri du Maurier, après avoir consenti divers dons à des institutions religieuses, légua, en 1967, plusieurs fermes de la commune et le château de La Chapelle-Bertrand à son parent, le comte Louis de La Bérurière de Saint-Laon, du château du Puy-Louet, aux Aubiers. Pour le promeneur venant de la direction de Parthenay, souvre, sur la gauche, à lentrée du petit bourg de La Chapelle-Bertrand, une longue allée bordée darbres séculaires.","architecture":"CHAPELLE BERTRAND, la construction  remonte à la seconde moitié du XVe ou au début du XVIe siècle. Il est précédé au sud d'une cour fermée par des murs et des bâtiments annexes. Le porche d'entrée est percé dans une tour carrée à un étage. Une seconde tour ronde flanque l'enceinte au sud est et des dépendances agricoles s'étendent vers l'ouest. Au nord, deux ailes de communs délimitent une cour carrée. Une tour ronde flanque la dépendance ouest à l'angle de la cour. Elle semble contemporaine de la construction du logis et abritait des écuries et la boulangerie.\r\nD'autres dépendances, une porcherie de la deuxième moitié du XIXe siècle, et un jardin, complètent l'ensemble du domaine. La tour nord est effondrée, château classé et privé en cours de restauration, ouvert au public lors de manifestations occasionnelles.","habitants":"François dEscoubleau de Sourdis\r\n        \"","divers":"Chapelle-Bertrand 46° 37' 20\" nord, 0° 10' 16\" ouest grav 1 à 3.  Ory Grav  4-5.","gps":"","images":["../image/image_79/79_Chapelle_Bertrand_1.jpg","../image/image_79/79_Chapelle_Bertrand_2.jpg","../image/image_79/79_Chapelle_Bertrand_3.jpg","../image/image_79/79_Chapelle_Bertrand_4.jpg","../image/image_79/79_Chapelle_Bertrand_5.jpg"]},"Consult_chateau_formulaire7e01":{"id":"Consult_chateau_formulaire7e01","dept":"79","canton":"Parthenay","commune":"La Chapelle_Bertrand","nom":"Chapelle_Bertrand_II","type":"Château","periode":"XV-XVI","histoire":"TOUCHE-ORY, vers le milieu du XVIe siècle, cest une demoiselle Nicole Sicard, dame de Viennay qui en est propriétaire, mais à la suite dun échange, la Touche Ory entre dans la famille Poignand pour y rester jusqu'à la fin du siècle. Au début du XVIIe siècle elle est passée dans la famille des Pineau par le mariage de Jacques Pineau avec Catherine Poignand, puis vers le milieu du XVIIe passa dans la famille Pouget par le mariage de Jeanne Pineau avec Pierre Pouget, qualifié de commissaire de lArtillerie.  Le 28 septembre 1672, le fils du propriétaire rend aveu au duc de la Meilleraye en ces termes : \" Sachent tous que de vous, très haut et très puissant seigneur\", monsieur Armand Charles, duc de Mazarin, de la Meilleraye et de Mayenne, pair de France, je Vincent Pouget, fils aîné de Pierre Pouget, tient et avoue tenir de mon dit seigneur, à cause de votre seigneurio de la Crolaye, réunie et incorporée à votre duché de la Meilleraye, a foi et hommage plein, 25 sols de cens et un éperon doré de service quand le cas advient, les choses qui ensuivent, cest à savoir : une borderie de terre appelée la Touche-Aury, avec ses appartenances de maison, vergers, prés, bois, étang, garenne, ainsi que toutes autres choses quelconques, sises en la paroisse de La Chapelle-Bertrand.\r\nÀ la fin du XVIIe siècle, La Touche-Aury passe à une nouvelle famille, lors du partage de la succession entre leurs cinq enfants, elle échoit à Marie Pouget, épouse de Pierre Chaboceau, avocat au Bailliage de Parthenay. Elle passe ensuite dans la famille des Olivier par le mariage de Marie Geneviève Chaboceau avec Pierre Augustin Olivier, sieur de la Barrière.","architecture":"La ROUILLIERE, au voisinage d'un bel étang, proche de Parthenay, le château de la Roulière dépendait jadis de la paroisse de Pompaire. Le domaine relevait féodalement du fief Aguillon qui relevait lui-même de la Crolaye de Beaulieu sous Parthenay. On y accédait par la poterne à pont-levis d'un massif donjon carré, encombrant, cet ouvrage défensif a été détruit en 1920. Ainsi a été mis en valeur l'édifice Renaissance dont le toit d'ardoises s'orne de deux fenêtres au fronton arrondi et d'une porte à l'archivolte triangulaire qui la surmontait et d'un cadran solaire. A Jacques Pizon, seigneur de La Roulière en 1401, succédèrent les Goulard, les Daillon, les Eschalard et les Asse. La fille unique de Olivier Asse apporta le domaine par mariage à René Thory. Puis la propriété passa à la famille Lauzon, qui la conservera jusqu'à la Révolution. Deux d'entre eux ayant émigré, le domaine fut vendu comme bien national.","habitants":"Touche; famille des Olivier                                                         Roulière;  famille Lauzon\r\n        \r\n        \"","divers":"Chapelle-Bertrand la Touche grav 1 Rouillière grav-2 3","gps":"","images":["../image/image_79/79_Chapelle_Bertrand_II_1.jpg","../image/image_79/79_Chapelle_Bertrand_II_2.jpg","../image/image_79/79_Chapelle_Bertrand_II_3.jpg"]},"Consult_chateau_formulaire33d4":{"id":"Consult_chateau_formulaire33d4","dept":"79","canton":"Vitré","commune":"Vitré","nom":"Chateauneuf_Vitré","type":"Château","periode":"XVIII","histoire":"CHATEAUNEUF, ce château a été élevé en 1887 sur une parcelle non bâtie, dite les Prés, à proximité de l'ancien manoir, pour Louis Auguste de Clervaux, qui avait épousé en 1883, Mathilde Pauline Agathe d'Adhémar. Le château est resté dans cette famille jusqu'en 1965. Les pierres tombales de différents membres de la famille de Clervaux, ainsi que de leurs épouses se trouvent dans le cimetière privé.","architecture":"CHATEAUNEUF, l'édifice a un plan rectangulaire, couvert d'un toit à longs pans et croupes, sur lequel se greffe un pavillon à droite de l'élévation postérieure. L'élévation antérieure se distingue par deux tourelles couvertes d'un toit conique. La porte d'entrée principale est encadrée par des pilastres et surmontée d'un fronton armorié. Les lucarnes sont de factures différentes selon les élévations. Les chaînages et les encadrements des baies sont harpés. La façade est couronnée d'une corniche à modillons et les linteaux des fenêtres sont couverts d'une plate-bande à claveaux.","habitants":"Famille de Louis Auguste de Clervaux,\r\n        \r\n        \"","divers":"Chateauneuf à Vitré GPS : 46° 17' 02\" Nord, 0° 11' 53\" Ouest","gps":"46° 17' 02\" Nord, 0° 11' 53\" Ouest","images":["../image/image_79/79_Chateauneuf_Vitr%c3%a9_1.jpg","../image/image_79/79_Chateauneuf_Vitr%c3%a9_2.jpg"]},"Consult_chateau_formulaire916e":{"id":"Consult_chateau_formulaire916e","dept":"79","canton":"Chef-Boutonne","commune":"Chef-Boutonne","nom":"Chef_Boutonne","type":"Château","periode":"XV","histoire":"CHEF-BOUTONNE  château hôtel de ville.                                                                                                                A cinq kilomètres à l'ouest à Saint-Martin d'Entraigues le château de Couturette pas d'image.                                                                                         COUTURETTE, la seigneurie existait déjà en 1081. Elle relevait de la baronnie de Chef-Boutonne. Puis en 1086, elle appartiendra à Plantacia et Angreline de Noreith. Sa construction date du XIVe siècle à 1663. Ce n'est qu'au début du XIVe siècle que le château de Couturette appartiendra à la famille de la Tour. En 1663, le domaine sera échangé avec celui de Jacques de Ponthieu, seigneur de Beaupuy et de Chambon. Puis en 1756, il échoit à la famille le Comte, suite au mariage de Marie de Ponthieu avec le seigneur du Theil, François le Comte. A la Révolution, le château de Couturette appartiendra à François Hélène de Nesmond qui a épousé, en 1775, Marie Louise Le Comte.","architecture":"CHEF-BOUTONNE  château hôtel de ville.                                                 Le château de COUTURETTE (XIe siècle), siège d'une seigneurie, est une vieille gentilhommière flanquée de deux tours d'angle et jadis entourée de douves.  On accède au château  par un porche. L'intérieur a été aménagé en pigeonnier. Le château  possède sur sa façade principale, une tour de forme polygonale, qui date du XVe siècle. Dans l'angle de la tour, il reste une tourelle en encorbellement. La tour est dotée d'une porte d'accès à l'escalier, surmontée d'un gable en accolade, à l'arrière. L'une d'elle a conservé une galerie ouverte élégante.","habitants":"Couturette; Famille de la Tour\r\n        \"","divers":"Couturette GPS : 46° 07' 26\" Nord et 0° 07' 50\" Ouest","gps":"46° 07' 26\" Nord et 0° 07' 50\" Ouest","images":["../image/image_79/79_Chef_Boutonne_1.jpg"]},"Consult_chateau_formulaire6f24":{"id":"Consult_chateau_formulaire6f24","dept":"79","canton":"Autize-Égray","commune":"Cherveux","nom":"Cherveux","type":"Forteresse","periode":"XI-XV","histoire":"Deux châteaux à Cherveux celui de Cherveux, la Carte (voir article) et celui de Francs (pas d'image).                                                                                                                              CHERVEUX,  après la victoire de Du Guesclin en 1369, le chateau revint à Amaury de Craon. Lui succéda Guy de la Trémoille, chambellan, 1er ministre et gouverneur du royaume de Charles VII, Louis de La Trémoille vendit Cherveux en 1457 à Amaury d'Etissac, seigneur de Coulonges-les-Royaux qui le céda à Jean de Naydes qui, à son tour le vendit à la famille Chenin. Leur fille, Louise Chenin épousa Robert Conningham en mai 1440. D'origine écossaise, capitaine de la garde du corps du roi, Cunningham fit bâtir l'édifice dans sa forme actuelle d'un seul jet, vers 1470. Cherveux fut transmis par mariage aux Puyguyon, puis aux Saint-Gelais. Louis de Saint Gelais, amiral de la flotte protestante, en fit une redoutable place forte. Elle allait être néanmoins prise et subire bien des avaries en 1569, par le comte du Lude, qui passa toute la garnison au fil de l'épée, puis en 1574, par le duc de Montpensier et le 15 décembre 1586, elle subit les assauts de M. Malicorne, gouverneur du Poitou. Après toutes ces épreuves, le propriétaire Charles de Saint Gelais se convertit au catholicisme et fit interdire le culte protestant à Cherveux. Succédèrent aux Saint-Gelais, les Plessis-Chatillon, et au XVIIIe siècle les Narbonne-Pelet, ils moururent guillotinés. Leurs biens furent vendus au profit de la nation, racheté par M. Pierre Alloneau le 12 frimaire an III. Les Clouzot Meynier descendants de Pierre Alloneau, le conservèrent jusqu'en 1931 et le vendirent à des fermiers.","architecture":"FRANCS,  a été construit sur une ancienne forteresse du VIe ou VIIe siècle où Clovis aurait même fait une escale. Des fondations ont en effet été mises à jour. En 1891, de très importantes réparations laissèrent peu de traces du château ancien (date portée au dessus de la marquise). Seul un beau pigeonnier bâti au XVIe siècle marque la gloire passée de cette bâtisse. En 1958, le château des Francs a été racheté pour abriter une maison de convalescence.\r\nLa CARTE est un château bâti à Cherveux, Il date du XV-et XIXe siècle. \r\n CHERVEUX, ce fut une simple motte féodale qui, entre les mains des Lusignan, devint une forteresse. Elle fut prise en 1242 par Saint Louis sur Hugues XI de Lusignan qui avait des démêlés avec le roi et donné par celui-ci à son frère Alphonse, comte du Poitou. Le château fut restitué à ses descendants car il fit sa soumission et rentra en grâce. Il est classé MH depuis 1929. Il date du XII-XVe siècle. Il appartient en indivision à la famille Redien qui en firent des  chambres d'hôtes.","habitants":"Cherveux; famille Chenin                                                           Famille Redien\r\n        \"","divers":"Cherveux GPS : 46° 24' 59\" Nord et 0° 21' 21\" Ouest","gps":"46° 24' 59\" Nord et 0° 21' 21\" Ouest","images":["../image/image_79/79_Cherveux_1.jpg","../image/image_79/79_Cherveux_2.jpg","../image/image_79/79_Cherveux_3.jpg","../image/image_79/79_Cherveux_4.jpg","../image/image_79/79_Cherveux_5.jpg","../image/image_79/79_Cherveux_6.jpg"]},"Consult_chateau_formulairea67c":{"id":"Consult_chateau_formulairea67c","dept":"79","canton":"Bressuire","commune":"Chiché","nom":"Chiché","type":"Château","periode":"XVIII","histoire":"CHICHE,  les vestiges du château de Chiché se trouvent à l'entrée du bourg, près de la route nationale, sur le rebord de la vallée du Thouaret. Son histoire est intimement liée à celle de la baronnie de Bressuire et de ses seigneurs, les Beaumont-Bressuire. Le château-fort de Chiché, comme beaucoup de forteresses féodales, était en ruine dès le début du XVIIIe siècle.","architecture":"CHICHE, autant qu'on puisse en juger actuellement, il devait se présenter sous la forme d'un quadrilatère à peu près régulier, borné sur trois côtés par des fossés, et couvert à l'ouest par un grand étang formé par le Thouaret et un ruisseau descendant du bourg. Il semble n'avoir jamais eu qu'une seule enceinte, jalonnée de 15 tours et percée de deux portes. Seule subsiste la porte de la partie basse, près du Thouaret, face à l'emplacement de la digue de l'ancien étang, cette porte ouvre en arc brisé entre deux tours sous une fenêtre géminée. Elle était munie d'une herse. Les tours de l'enceinte étaient probablement les unes pleines, les autres creuses.","habitants":"Beaumont-Bressuire\r\n        \r\n        \"","divers":"Chiché 46° 47' 56\" nord, 0° 21' 32\"  ouest","gps":"","images":["../image/image_79/79_Chich%c3%a9_1.jpg","../image/image_79/79_Chich%c3%a9_2.jpg","../image/image_79/79_Chich%c3%a9_3.jpg"]},"Consult_chateau_formulaire265f":{"id":"Consult_chateau_formulaire265f","dept":"79","canton":"La Gâtine","commune":"La Ferrière en Parthenay","nom":"Chutelière","type":"Maison forte","periode":"XV","histoire":"CHUTELIERE, les premiers seigneurs de la Chutelière sont les La Court. François de La Court fut le père d'Antoinette, dame de la Chutelière, qui apporta la terre à son mari Pierre Chauvin. La Chutelière passa par mariage, aux familles Rabelin, puis de Chouppes. Pierre, marquis de Chouppes seigneur du Porteau en Pressigny et de la Chutelière, eut une brillante carrière d'officier. Par acte du 18 novembre 1665, le marquis de Chouppes vendit la propriété à Josias Charles Olivier d'une famille de notables de Parthenay. La Chutelière passa par mariage dans la famille Turquand d'Auzay.","architecture":"CHUTELIERE, le château paraît remonter au XVe siècle, il se compose d'un grand corps de logis, la façade sud est flanquée aux angles de larges tours circulaires. La façade nord est due aux Turquand d'Auzay et témoigne des goûts du milieu du XIXe siècle; une parfaite symétrie entre la porte à deux vantaux et les trois fenêtres de chaque côté, cette symétrie cache, en fait, des pièces inégales. L'ensemble est fermé, au sud, par un canal alimenté par la Vendelogne et au nord, par des douves sèches surplombées d'une passerelle.","habitants":"Famille de la Court\r\n        \"","divers":"Château de la Chatelières à la Ferrière","gps":"","images":["../image/image_79/79_Chuteli%c3%a8re_1.jpg","../image/image_79/79_Chuteli%c3%a8re_2.jpg"]},"Consult_chateau_formulaire8331":{"id":"Consult_chateau_formulaire8331","dept":"79","canton":"Cerizay","commune":"Cirières","nom":"Cirières","type":"Château","periode":"XIX","histoire":"CIRIERES, vers 1850 la famille de la Rochebrochard entreprend la construction du château, niché dans le bourg de Cirières. Il passa ensuite au marquis de Tinguy dont la famille possédera la demeure jusqu'en 1966.  Marie Claude et Jean Marie Dugast pour en fire une chambre d'hôtes.","architecture":"CIRIERES, l'édifice se compose d'un corps de logis rectangulaire auquel on a juxtaposé un pavillon plus élevé. Bien que les éléments décoratifs de ce dernier soient semblable à ceux de la partie primitive, le pavillon rompt l'équilibre de la construction, l'entrée ne se situe plus au centre du bâtiment et une des tourelles en surplomb est englobée dans la demeure, alors qu'elle soulignait auparavant l'extrémité gauche de la façade. Les toitures couvertes en ardoises sont effilées et pointues, l'entrée se fait par un avant-corps sur lequel on lit la date de 1852. Il règne une unité du décor, le chambranle des fenêtres, les faux mâchicoulis, les lucarnes-frontons dont les rampants sont ornés de choux, se rencontrent sur la construction. Mais une grande différence, voulue, existe entre les deux façades : elle repose sur le grand nombre de fenêtres côté jardin. Le château de pur style néo-gothique présente un effort d'ornementation dans un matériau difficilement malléable le granit.","habitants":"famille de la Rochebrochard \r\n        \"","divers":"Château de Cirièes  à Cirières","gps":"","images":["../image/image_79/79_Ciri%c3%a8res_1.jpg","../image/image_79/79_Ciri%c3%a8res_2.jpg"]},"Consult_chateau_formulaire0b89":{"id":"Consult_chateau_formulaire0b89","dept":"79","canton":"Mauléon","commune":"Loublande","nom":"Coudraie_Noyers","type":"Château","periode":"XV-XVI","histoire":"COUDRAIE-NOYERS,  construit au Moyen Age, subit d'importantes transformations à la fin du XVIe siècle. Pierre de Comeillaud, chevalier de l'ordre du Roi, en est alors propriétaire. Son fils Pierre se marie au début du XVIIe siècle avec Jeanne Gyrault qui, devenue veuve, lègue ses biens à ses neveux et nièces François et Lucrèce Gyrault. A leur mort, le château est mis en vente à l'un des cohéritiers, une dame Eveillon. Après la Révolution, la propriété est vendue à M. de Pignerolle, puis à M. Bonnet, de Cholet.","architecture":"COUDRAIE-NOYERS, une allée rectiligne qui mène à un long bâtiment à usage de dépendance et formant enceinte. Au centre, un porche ouvre sur une cour rectangulaire au fond de laquelle se dresse le corps de logis orienté au sud. Celui-ci a subi des dommages car la partie droite a été abaissée, la toiture peu inclinée est recouverte de tuiles. Une toiture aiguë en ardoises surmonte la partie gauche qui est flanquée, à l'ouest, de deux magnifiques tours d'angle portant mâchicoulis, ces éléments en font une demeure d'influence Renaissance qui n'a pas abandonné sa fonction défensive.","habitants":"Famille de Pierre de Comeillaud,\r\n        \"","divers":"Château de Coudraye Noyers  46° 58' 20\" nord, 0° 48' 04\" ouest","gps":"","images":["../image/image_79/79_Coudraie_Noyers_1.jpg","../image/image_79/79_Coudraie_Noyers_2.jpg","../image/image_79/79_Coudraie_Noyers_3.jpg"]},"Consult_chateau_formulairedac3":{"id":"Consult_chateau_formulairedac3","dept":"79","canton":"La Plaine Niortaise","commune":"Echiré","nom":"Coudray_Sablart","type":"Forteresse-vestiges","periode":"XII- XV","histoire":"COUDRAY-SABLART, les sires de Parthenay participent aux luttes qui opposent les Rois de France et les Rois dAngleterre, les Plantagenêt, pour la possession du Poitou, et la mort en 1199 de Richard Cur de Lion rapproche le seigneur de Parthenay de Jean sans Terre, le nouveau Roi dAngleterre, lentrée en guerre des seigneurs de Parthenay à ses côtés, justifie ainsi lédification et le développement du Coudray-Salbart, est lune des plus célèbres forteresses de la France médiévale et ses hautes tours dominent encore la Sèvre niortaise. Le dernier propriétaire le comte de Dresnay. Si le Coudray-Salbart apparaît dans les textes vers 1219-1222, tous les historiens semblent daccord pour affirmer que le départ de la construction de la forteresse primitive date de 1202, premiers subsides accordés à Hugues de Parthenay l'archevêque par Jean sans Terre pour fortifier son fief. En effet cest avec laide du roi dAngleterre que la place fut créée et connut un réel développement.","architecture":"COUDRAY-SABLART, le site choisi pour la construction du château présente un grand intérêt stratégique. Il contrôle le passage sur la Sèvre et la frontière Sud des terres des Parthenay. Il sépare également les terres des frères Lusignan qui lenserrent à lEst et à lOuest et il assure probablement aussi un revenu par la perception des droits de passage des bateaux qui commercent entre Niort et lAbbaye de Saint-Maixent.  La soumission du Poitou au roi Louis IX (Saint-Louis) en 1240, met fin à lhistoire du château. La prisée de 1460 signale déjà un état dabandon. Dès lors, le château passe de mains en mains. En 1776, il est vendu par le duc dArtois, futur Charles X, à labbé Dufay de la Taillée qui possédait un château et des terres à Echiré. Le descendant, Pierre Du Dresnay, le cède à la communauté dAgglomération de Niort en juin 2000.  depuis l'année 2000, c'est la communauté d'agglomération du Niortais qui en est propriétaire et qui en a confié la gestion culturelle et touristique aux Amis du Coudray-Salbart. L'architecture est extraordinaire et n'a jamais été remaniée. Ce château comporte notamment de superbes tours à éperon en amande.","habitants":"Comte de Dresnay\r\n        \r\n        \r\n        \"","divers":"Château de Coudray Sablart à Echiré","gps":"","images":["../image/image_79/79_Coudray_Sablart_1.jpg","../image/image_79/79_Coudray_Sablart_2.jpg","../image/image_79/79_Coudray_Sablart_3.jpg","../image/image_79/79_Coudray_Sablart_4.jpg","../image/image_79/79_Coudray_Sablart_5.jpg","../image/image_79/79_Coudray_Sablart_6.jpg"]},"Consult_chateau_formulairedd21":{"id":"Consult_chateau_formulairedd21","dept":"79","canton":"Autize-Égray","commune":"Coulonges sur l","nom":"Coulonges_Autize","type":"Château","periode":"XII-XVI","histoire":"Deux châteaux à Coulonges celui de Roussière et de St-Goard dans article suivant pour ses deux derniers.                                    COULONGES;  au XIIe siècle  bâti à Coulonges-sur-l'Autize.  L'existence du château de Coulonges est due à la destruction dun château féodal, sur ordre de Louis XI et aux rôles joués par une famille venue du Périgord dont lancêtre Amaury dEstissac avait acheté les seigneuries de Coulonges, Cherveux et autres. Amaury dEstissac dès 1421 est au service du dauphin Charles, futur Charles VII père de Louis XI. Le fils de Jean dEstissac, Geoffroy, est destiné selon la tradition, à léglise, mais cet humaniste, protecteur de Rabelais est grand animateur et constructeur. Cest lui qui fait construire le château renaissance de Coulonges en sinspirant de lart nouveau. Dès le XVIe siècle, cet ensemble de la renaissance connut une grande notoriété. Louis dEstissac acheva luvre de son oncle sur ce château de Coulonges les Royaux. Charles IX vint à Coulonges les Royaux avec le Duc dAnjou, Marguerite de Valois fille dHenri II et de Catherine de Médicis. Celle-ci et la cour attendaient au château la prise de Saint Jean dAngely, assiégée par les troupes royales aux ordres du Duc dAnjou. Saint Jean dAngély se rendit le 2 décembre 1569 et Charles IX avec toute sa cour fît Noël à Coulonges les Royaux où ils séjournèrent durant deux mois, a la fin du XVIe siècle passe par alliance aux la Rochefoucault.  A partir de 1849 l'aquafortiste Octave de Rochebrune fit démonter certains éléments de Coulonges qui menaçait ruine pour orner son château de Terre-Neuve. Le château de Coulonges est classé aux M.H. en 1993 et 1994.","architecture":"COULONGES, la construction  date de 1542 à 1544,  est de style Renaissance. Il abrite dans ses murs la Mairie et l'Office de Tourisme. Entre 1574 et 1585, Coulonges est entre les deux camps protestant et catholique. A lextinction dune descendance mâle (Charles dEstissac ayant été tué en duel) la demeure connaît de nombreuses vicissitudes qui nous mènent à son état actuel. En 1793, temps marqué par la Révolution française, le château Renaissance est vendu comme bien national. En 1866, Octave de Rochebrune, pour sauvegarder les principaux ornements du château; porte dentrée, caissons des plafonds, escalier monumental, porte de la chapelle et cheminée alchimique, les fait transporter au château de Terre Neuve à Fontenay le Comte. Au début du XXe siècle, Alix Jean achète une partie du château. Après être resté quelques années aux mains de M. le comte de Bonnetière, le château de Coulonges et son parc sont acquis par la commune, il abrite actuellement l'hôtel de ville.\r\n De l'édifice qui devait, à l'origine, dessiner un plan à peu près carré, flanqué à ses angles de pavillons carrés et, au sud, d'une longue galerie de neuf arcades, il ne reste aujourd'hui qu'un bâtiment en équerre bordant une place au centre du bourg. Seules subsistent l'aile Est et le départ de l'aile sud, occupée par la chapelle et les trois pavillons rectangulaires. Celui du nord a été amputé de son deuxième étage.","habitants":"Famille Amaury dEstissac\r\n        \"","divers":"Château de Coulonges-Autize GPS : 46°28'54\" Nord et 0°36'00\" Ouest","gps":"46°28'54\" Nord et 0°36'00\" Ouest","images":["../image/image_79/79_Coulonges_Autize_1.jpg","../image/image_79/79_Coulonges_Autize_2.jpg","../image/image_79/79_Coulonges_Autize_3.jpg","../image/image_79/79_Coulonges_Autize_4.jpg"]},"Consult_chateau_formulaire4619":{"id":"Consult_chateau_formulaire4619","dept":"79","canton":"Autize-Égray","commune":"Coulonges sur l","nom":"Coulonges_Autize_II","type":"Château","periode":"XV-XVIII","histoire":"ROUSSIERE, est le témoin de l'attachement d'une famille à cette terre depuis le XIVe siècle, les Girard. La propriété sera transmise par héritage à Guillaume Fouquet de la Varenne. A sa mort, les terres et le château de La Roussière passeront aux Champagne, dont une fille épousera Charles César, comte de Choiseul, duc de Praslin.\r\nLe château  souffre de l'inocupation de ses propriétaires, de l'éloignement et de la difficulté d'accès jusqu'au XIXe siècle. La Roussière sera successivement possédée par le baron de Damas, avant de revenir à la famille de Chabot.                                                             ST-GOARD, au XVe siècle, Jeanne de Montendre et son mari Hugues de Vivonne firent construire ce château. Il servait de rendez-vous de chasse car la région abondait en sangliers. C'est à l'occasion de parties de chasse que Charles IX, en 1569, fit la connaissance de Jean de Vivonne, le marquis de Saint-Goard, qu'il nomma ambassadeur auprès du Roi d'Espagne en 1572. Après les Vivonne, il passa à la famille Janmier, puis aux Molé, qui ajoutèrent un bâtiment en 1754. A la fin du XIXe siècle, il appartenait à Rouget-Lafosse qui le restaura et se passionna pour son histoire.","architecture":"ROUSSIERE, après de nombreuses dévastations, le château actuel a été bâti au XVIIIe siècle. C'est une maison bourgeoise datant  de la fin du XVIIIe siècle, bâtie par moitié sur des caves voûtées du XIIIe siècle. La façade sud ouvre sur une terrasse et un jardin à la française. Cette façade est régulièrement percée de baies sur trois étages. Des lucarnes sont ouvertes dans les combles. De ce côté, l'accès au rez-de-chaussée s'effectue par un perron à double révolution. Du côté nord, la cour est fermée par un porche cantonné de deux tours inégales, datant  du XVe siècle. L'accès aux étages se fait par un escalier de pierre dont la rampe en fer forgé date du XIXe siècle. A proximité des terrasses et du jardin à la française, se trouve un bassin rectangulaire pavé dans le fond, entouré d'un mur en moellon sans mortier. Trois fontaines en pierre de taille alimentent ce bassin par des caniveaux de pierre.                                                                               St-GOARD,  connut une période de quasi-abandon au XXe siècle, mais son propriétaire actuel l'a sauvé de la déchéance. Il se compose de deux corps de logis, un corps principal du XVe siècle et un autre du XVIIIe. Il a été l'objet de nombreuses restaurations qui n'ont toutefois pas altéré son aspect d'origine. Les deux tourelles de guet en encorbellement, rappellent qu'il fut conçu avant la Renaissance.","habitants":"Roussière, famille de Roussière                                                        ST-Goard, famille Janmier\r\n        \"","divers":"Château de Saint-Goard grav 1 , de Roussière  grav_2-3-1","gps":"","images":["../image/image_79/79_Coulonges_Autize_II_1.jpg","../image/image_79/79_Coulonges_Autize_II_2.jpg","../image/image_79/79_Coulonges_Autize_II_3.jpg","../image/image_79/79_Coulonges_Autize_II_4.jpg"]},"Consult_chateau_formulairee5b2":{"id":"Consult_chateau_formulairee5b2","dept":"79","canton":"Bressuire","commune":"Terves","nom":"Coussaye_Terves","type":"Château","periode":"XVII","histoire":"COUSSAYE,  a appartenu à une famille de La Coussaye jusqu'à la fin du XVIe siècle. La famille de Feydeau en est propriétaire au XVIIIe siècle. Pendant la Révolution, le 7 février 1792, M. de Feydeau fut assassiné par d'anciens domestiques du château. Après la Révolution, la propriété passe aux Piet de Beaurepaire, puis aux La Rochebrochard.","architecture":"COUSSAYE, le château de la Coussaye a été édifié au début du XVIIe siècle, c'est une élégante construction très remaniée au XIXe siècle. Elevée sur un plan en L, la demeure comprend un étage surmonté d'un grenier, couvert d'ardoises, cantonné de deux tourelles en poivrière en encorbellement sur la façade Est, et d'une tour ronde, plus importante, sur la façade nord. La façade Est semble avoir conservé quelques vestiges anciens, notamment la porte d'entrée ouvrant en plein cintre. Les fenêtres ont gardé des traces de meneaux, et trois petites lucarnes ornent la toiture. Une tour circulaire flanque le portail qui donne accès à la propriété. Un crénelage surmonte la porte charretière qui ouvre en plein cintre, accompagnée d'une porte piétonne.","habitants":"famille de La Coussaye \r\n        \"","divers":"Château de Coussaye à Terves","gps":"","images":["../image/image_79/79_Coussaye_Terves_1.jpg","../image/image_79/79_Coussaye_Terves_2.jpg"]},"Consult_chateau_formulaire5574":{"id":"Consult_chateau_formulaire5574","dept":"79","canton":"Chef boutonne","commune":"Couture d","nom":"Couture_Argenson","type":"Château","periode":"XVI","histoire":"FOYES, la seigneurie de la Foye a appartenu à la famille de la Rochefoucault avant le XIVe siècle. Au milieu du XVIIe siècle, la propriété passa à la famille de Boisse. Le château actuel remplace l'ancien logis noble possédé par Jean Alexandre de Céris, écuyer, et demoiselle Lauriol son épouse. Leurs fils Pierre Alexandre et Louis Charles Thomas émigrèrent à la Révolution. Pierre Alexandre, de retour, vint s'installer à la Foye et en 1840 vendit le domaine au comte Jean Baptiste de Chabot, lieutenant de Louveterie, qui fit construire le château en 1852. En 1905, la propriété appartient à Clément Cercler de la Noue.","architecture":"FOYES,  le bâtiment a été en partie ravagé par un incendie en 1934, la façade a été modifiée à l'occasion de sa reconstruction. Les actuels propriétaires l'ont acheté en 1988. D'une grande sobriété, il est constitué d'un corps rectangulaire flanqué à chaque extrémité d'un haut pavillon. Un balcon supporté par des piliers est remarquable. Le domaine comprend un parc et des jardins réalisés par M. Cercler de la Noue au début du XXe siècle, d'un arborétum et d'une roseraie depuis 1988.","habitants":"Famille de Boisse\r\n        \"","divers":"Couture-Argenson grav 1_3  45° 59' 37\" nord, 0° 04' 59\" ouest  La Foyes grav 2","gps":"","images":["../image/image_79/79_Couture_Argenson_1.jpg","../image/image_79/79_Couture_Argenson_2.jpg","../image/image_79/79_Couture_Argenson_3.jpg","../image/image_79/79_Couture_Argenson_4.jpg","../image/image_79/79_Couture_Argenson_5.jpg"]},"Consult_chateau_formulaire1637":{"id":"Consult_chateau_formulaire1637","dept":"79","canton":"Saint-Maixent-l","commune":"La Crèche","nom":"Crèche","type":"Maison-forte Châteaux","periode":"XIII-XIV-XVII-XIX","histoire":"Trois châteaux à la Crèche celui de Breloux, de Bouguoin et de la Voûte .                                                                                                                              BRELOUX, construite au XIVe ou XVe siècle, la maison-forte autrefois appelée la Tour de Breloux ne nous révèle plus que quelques vestiges de sa forme d'origine. Habitée en 1649, la maison noble de la Tour de Breloux ne l'était plus à la fin du XVIIe siècle, en raison de son mauvais état. On décide alors la construction de la \"Maison Neuve\", actuel château de Breloux, sur le terrain contigu. D'abord modeste, ce nouvel édifice fut agrandi et embelli, un siècle plus tard. A la même époque, on restaurait l'ancien logis pour l'utiliser en exploitation agricole. En 1792, le propriétaire ayant rejoint l'armée des princes, la propriété fut confisquée et vendu comme bien national. Les acquéreurs, sans doute spéculateurs, la revendirent, mais six fois plus cher. Le plus ancien propriétaire de la Tour de Breloux connu, Méry d'Availles, écuyer, vivait en 1550. On trouve ensuite une dame, Jeanne de Grany, épouse d'Antoine de Barbezières, dont la fille Elisabeth épousa Jean de Massougnes, en 1597. Le château resta pendant deux siècles la propriété de la famille de Massougnes. En 1783, un noble niortais,Savignac des Roches, en devint acquéreur.                                                                                                   BOUGUOIN, château-fort construit au XIIIe siècle par la famille de Vivonne, puis vendu au XVIIe siècle aux ducs de Mazarin et en 1776 au comte d'Artois.                                                                                                   LA VOUTE, en ce lieu existait une importante métairie, fief de Bougouin. Elle fut démolie et remplacée, en 1848, par l'actuel château.","architecture":"LA VOUTE,  c'est une grande et belle demeure dominant la vallée de la Sèvre Niortaise. Elle est entourée d'un vaste parc. Depuis le XVIe siècle, et durant deux cents ans, \"Lavau\", comme elle s'appelait alors, appartint à la famille Chaigneau. Propriété des Brun-Puyrajoux à la fin du XIXe siècle, La Voûte passa, au début des années 1920, aux mains de la famille Baigneux. La Voûte fut mise en vente, le nouveau propriétaire, M. Guérin, armateur rochelais, fit abattre la presque totalité des arbres qui couvraient la partie basse du parc, avant de céder le domaine dans les années 1950, aux chantiers navals de la Pallice l'utilisant à des fins sociales. Après une longue période d'abandon, la bâtisse était achetée en 1990, par la fédération départementale des chasseurs des Deux-Sèvres, avec une partie du parc.                                                            BOUGUOIN, de ce château-fort, il ne subsiste que deux murs formant les ailes nord et ouest, les deux autres, fermant la cour intérieure dans laquelle se trouvaient la chapelle et le donjon, ayant été démolies au XVIIIe siècle. Belle charpente de châtaignier dans l'aile nord au deuxième étage. Reste à l'extrémité de l'aile ouest une belle tour du XIIIe siècle. L'escalier intérieur conduit au chemin de ronde couvert, pratiqué dans l'épaisseur des murs. Dans les parties les plus anciennes, cheminées et reposoirs de pierre dans l'embrasure d'une grande fenêtre à meneaux.","habitants":"Breloux; Famille   Méry d'Availles                                              Bougoin,  famille de Vivonne                                                      La Voûte; famille Chaigneau\r\n        \"","divers":"A la Crèche 46° 21' 42\" nord, 0° 17' 56\"  ouest                            Breloux grav 1 à 3                                                                                   La Voûte grav 4-5-6                                                                     Bouguoin grv 7","gps":"","images":["../image/image_79/79_Cr%c3%a8che_1.jpg","../image/image_79/79_Cr%c3%a8che_2.jpg","../image/image_79/79_Cr%c3%a8che_3.jpg","../image/image_79/79_Cr%c3%a8che_4.jpg","../image/image_79/79_Cr%c3%a8che_5.jpg","../image/image_79/79_Cr%c3%a8che_6.jpg","../image/image_79/79_Cr%c3%a8che_7.jpg"]},"Consult_chateau_formulaire10b8":{"id":"Consult_chateau_formulaire10b8","dept":"79","canton":"Cérizay","commune":"Montravers","nom":"Deffend","type":"Château-vestigres","periode":"XIX","histoire":"A Montravers le château de la Loissière, de Montravers et du Vieux Deffend                                                                                                                          DEFFEND,  en 1820 acquisition du domaine par Jean Marie Bouthiller de la Chêze son gendre  Gabriel Jean Philippe Savary de Beauregard. Le château construit de 1860 à 1865 suivant les plans de larchitecte parisien Delarue. La famille Savary de Beauregard reçoit le pape Léon XIII. En 1884 décès  de Henri-Charles de Savary de Beauregard.  son fils  qui hérite  après son mariage avec Montravers en 1860 avec Adélaïde de Chabot. Héritier de son oncle Charles-Eustache Cousseau de l'Epinay propriétaire du vieux  château choisit de faire construire le nouveau château des Deffend.                                                   MONTRAVERS, connu depuis le XIIIe siècle, le château de Montravers remonte pour l'essentiel au XVe siècle avec des aménagements du XIXe siècle. Vers 1850, démolition de la partie centrale du corps de logis dont les matériaux servent à construire la maison neuve de La Louissière .","architecture":"DEFFEND, corps de logis de plan  rectangulaire coiffé d'un toit en croupe dans un style Louis XIII est cantonné de deux pavillons en saillie coiffés de comble en pyramide, un avant corps appareillé en pierre inspiré renaissance à laquelle il emprunte le principe de la travée rythmique. La façade postérieure  est flanquée de deux pavillons latéraux de minces tourelles en encorbellement coiffées de poivrières L'avant corps précédé d'un escalier à double volée prend la forme  d'une tour à plan coupés. Lharmonie des volumes, le mélange du granit, de la pierre de Chauvigny, de la brique rouge et de lardoise angevines donne au château le charme cossu des demeures bourgeoises.                                                                                                MONTRAVERS, connu depuis le XIIIe siècle, le château de Montravers remonte pour l'essentiel au XVe siècle avec des aménagements du XIXe siècle. Vers 1850, démolition de la partie centrale du corps de logis dont les matériaux servent à construire la maison neuve de La Louisière. L'édifice initial était constitué d'un logis rectangulaire appuyé d'une tour, une tour à pans coupés et d'une aile en retour d'équerre dotée d'une tour nord-ouest prolongée, en façade arrière, par un pavillon rectangulaire. Une enceinte se développait vers l'ouest enfermant une cour, dont le côté sud était défendu par la tour du logis et une deuxième tour attenante aux communs.","habitants":"Déffend; famille Savary de Beauregard \r\n        \"","divers":"A  Montravers ; Louisière grav 1-2 Montravers-Vieux grav 3 . 46° 49' 46\" nord, 0° 43' 01\" ouest            Deffend   grav 4-5-6-7               46° 50' 39\" nord, 0° 45' 17\"  ouest","gps":"","images":["../image/image_79/79_Deffend_1.jpg","../image/image_79/79_Deffend_2.jpg","../image/image_79/79_Deffend_3.jpg","../image/image_79/79_Deffend_4.jpg","../image/image_79/79_Deffend_5.jpg","../image/image_79/79_Deffend_6.jpg","../image/image_79/79_Deffend_7.jpg"]},"Consult_chateau_formulairec324":{"id":"Consult_chateau_formulairec324","dept":"79","canton":"Bressuire","commune":"Beaulieu sous Bressuire","nom":"Dubrie","type":"Château","periode":"XVI-XVII","histoire":"DUBRIE, le site a dû être occupé très tôt par une forteresse dont la grosse tour carrée de l'angle nord-ouest pourrait être le témoin. C'est de ce château que Jean Foucher rendait aveu en 1382 au baron de Bressuire. Aujourd'hui, la majorité des constructions date de la deuxième moitié du XVIe siècle. Des reprises de construction ont été faites au cours de la première moitié du XVIIe siècle, en effet, de 1615 et 1635 inscrits sur une porte et sur la cheminée de la grande salle.                                                                                                                             VERGER-BEAU , les premiers seigneurs du Verger Beau appartiennent à la famille Méhée, qui possédaient ce logis depuis la fin du XVe siècle jusqu'au début du XVIIe siècle. A cette époque il passe à la famille de Culant qui le garde jusqu'au XVIIIe siècle. Par sentence du tribunal de Niort du 29 juillet 1779, il est adjugé à Pierre Gourdon de l'Archenault. Ses enfants l'ont vendu le 23 messidor an X à l'ancêtre du propriétaire actuel","architecture":"DUBRIE, le corps principal est un quadrilatère cantonné de deux tours rondes sur la face sud et deux tours carrées sur celle au nord. Les deux tours rondes coiffées de toits pointus en ardoises sont décornées de fenêtres rondes. Une longue galerie relie la tour ronde de l'angle sud à la haute tour carrée du nord-ouest. L'aile nord du château comprend un rez-de-chaussée surélevé par rapport au jardin et un étage sous un toit de tuiles. L'histoire de ce château est liée à celle d'une famille, les La Haye-Montbault qui le posséda depuis le XVIe siècle jusqu'à la fin du XIXe siècle.                                                                  VERGER BEAU, le château se cache dans un jardin organisé autour de pièces d'eau. Il s'articule autour d'une cour centrale, dont le logis occupe le côté sud, c'est un édifice rectangulaire à un étage débordant en forme de galerie en colombage reposant sur des piles de bois. Il vient buter sur une tour ronde massive accolée d'une tourelle en encorbellement, la galerie, plus récente que la tour, prend appui sur un mur plus ancien. La tour renferme l'escalier qui dessert le premier étage et deux salles où l'on accède par l'escalier contenu dans la tourelle en encorbellement.","habitants":"Dubrie;  baron de Bressuire                                                         Verger, famille Méhée\r\n        \"","divers":"A Beaulieu sous Bressuire ; Dubrie; GPS : · 46° 53' 54\" Nord , 0° 30' 18\" Ouest","gps":"· 46° 53' 54\" Nord , 0° 30' 18\" Ouest","images":["../image/image_79/79_Dubrie_1.jpg","../image/image_79/79_Dubrie_2.jpg","../image/image_79/79_Dubrie_3.jpg","../image/image_79/79_Dubrie_4.jpg"]},"Consult_chateau_formulairee4bd":{"id":"Consult_chateau_formulairee4bd","dept":"79","canton":"Thouars","commune":"Thouars","nom":"Duc_Trémoille","type":"Palais","periode":"XVI-XVII","histoire":"DUC de la TREMOILLE,   c'est avec l'arrivée des ducs de la Trémoïlle que le nouveau château vu le jour. Marie de La Tour d'Auvergne, épouse d'Henri III de La Trémoïlle, duc de Thouars, ne supporte plus de vivre dans ce château fort le trouvant froid peu confortable, elle menace de quitter Thouars si rien n'est entreprit pour lui construire une demeure confortable. A l'origine le projet initial prévoyait l'édification d'une demeure beaucoup plus modeste. On commença tout d'abord par construire un pavillon adossé au vieux château et en 1638, Jacques Lemercier lui conseilla de ne rien conserver des anciens bâtiments. La duchesse décida alors de raser le vieux château médiéval et de réutiliser les matériaux pour édifier une aile reliant le nouveau pavillon à la collégial Notre-Dame. Avec une façade de plus de 110 mètres de long précédé d'une cours d'honneur entourée de galeries à portiques, le château de Thouars est l'un des plus important en France dans la moitié du XVIIe siècle.","architecture":"DUC de la TREMOILLE  les appartements encadrent un pavillon central surmonté d'un dôme au milieu duquel s'ouvre l'entrée principale, la façade  de plus de 110 mètres de long, précédée d'une cour d'honneur, entourée de galeries à portiques,   rappelle celle du palais des Tuileries. L'architecture du château est extrêmement sobre, on peut peut être y lire la volonté de la duchesse demeurée fidèle à une certaine rigueur protestante. Ce bâtiment devint une prison pendant un temps, recueillant notamment bon nombre de communards en 1871. Le bâtiment principal accueille un collège public et les écuries abritent l'école municipale d'arts plastiques. Perchés sur le promontoire rocheux, la chapelle Notre-Dame et le château des Ducs de la Trémoïlle sont des monuments emblématiques de la ville. Au cours de la visite, les portes de la chapelle et du château sont grandes ouvertes. Découvrez les anciennes cuisines, les caves ou bien encore le cabinet de Marie de la Tour d'Auvergne.","habitants":"Famille de la Trémoille\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"A Thouars;  Forteresse des ducs de la Trémoille GPS : 46° 58' 15\" Nord 0° 13' 02\" Ouest","gps":"46° 58' 15\" Nord 0° 13' 02\" Ouest","images":["../image/image_79/79_Duc_Tr%c3%a9moille_1.jpg","../image/image_79/79_Duc_Tr%c3%a9moille_2.jpg","../image/image_79/79_Duc_Tr%c3%a9moille_3.jpg","../image/image_79/79_Duc_Tr%c3%a9moille_4.jpg","../image/image_79/79_Duc_Tr%c3%a9moille_5.jpg","../image/image_79/79_Duc_Tr%c3%a9moille_6.jpg","../image/image_79/79_Duc_Tr%c3%a9moille_7.jpg","../image/image_79/79_Duc_Tr%c3%a9moille_8.jpg"]},"Consult_chateau_formulaireddf7":{"id":"Consult_chateau_formulaireddf7","dept":"79","canton":"Mauléon","commune":"Breuil sous Argenton","nom":"Ebaupinaye","type":"Vestiges-Forteresse","periode":"XV","histoire":"EBAUPINAYE, c'est en février de l'an 1458 que des lettres du roi de France Charles VII accordèrent à François de Vendel, chevalier, la permission de fortifier son \"hostel\" de l'Ebaupinaye. Il profita de cette autorisation pour bâtir la maison forte, typique de l'architecture médiévale du XVe siècle. François de Vendel était vassal du Seigneur dArgenton, comme beaucoup dautre du nom qui souvent servaient au château même dArgenton, tel Hardouin de Vendel un des hommes de confiance de Philippe de Commynes et capitaine du château dArgenton. Au XVIe siècle, l'édifice passe à la famille Tusseau par le mariage d'Amboise de Vendel, avec René Tusseau, devenue veuve en 1565, Amboise de Vendel vendit l'Ebaupinaye à Charles d'Hillerin. En 1692, la famille dHillerin revendit lEbaupinaye à Claude de Chatillon, baron d'Argenton. Le château fut habité jusquà la Révolution de 1793, lorsquil fut saccagé et vendu comme bien national. Puis les charpentes et les planchers furent dévorés par un incendie pendant les guerres de Vendée.","architecture":"EBEAUPINAYE, cette forteresse carrée entourée de douves, qu'enjambe un pont marquant l'emplacement d'un ancien pont-levis, est flanquée à ses angles de quatre tours et d'une cinquième sur sa courtine principale. Un haut parapet crénelé reposant sur une belle ceinture de mâchicoulis couronne le sommet des tours et des courtines sur tout le pourtour, et lui imprime un caractère belliqueux, plein de charme. Au dessus, sélèvent les pignons qui portaient les charpentes, avec leurs larges fenêtres à croisillons. Dautres fenêtres à meneaux sont percées dans les courtines, principalement dans celles de la façade. Mais les tours et les accès découverts n'ont que de rares et étroites ouvertures. L'écusson des de Vendel gravé au-dessus de l'une des fenêtres sur la façade, témoigne de la construction au XVe siècle, puisque l'Ebaupinaye avait cessé de leur appartenir au siècle suivant. La première enceinte constituée par un mur de clôture a disparu , transformée par endroit en chemin,et en muret. Au sud des douves, il reste un pigeonnier construit en une puissante tour ronde, selon la coutume de la région. L'Ebaupinaye est classée parmi les M.H. depuis le 08 Janvier 1898.","habitants":"famille Tusseau\r\n        \"","divers":"Breuil sous Argenton;    Forteresse d'Ebaupinaye  GPS : 47° 00' 09\" Nord 0° 25' 29\" Ouest","gps":"47° 00' 09\" Nord 0° 25' 29\" Ouest","images":["../image/image_79/79_Ebaupinaye_1.jpg","../image/image_79/79_Ebaupinaye_2.jpg","../image/image_79/79_Ebaupinaye_3.jpg","../image/image_79/79_Ebaupinaye_4.jpg","../image/image_79/79_Ebaupinaye_5.jpg"]},"Consult_chateau_formulaire9b74":{"id":"Consult_chateau_formulaire9b74","dept":"79","canton":"La Plaine Niortaise","commune":"Echiré","nom":"Echiré","type":"Château-Vestiges","periode":"XVI-XVII","histoire":"Deux châteaux à Echiré dont celui de Mursay et de Taillée.                   MURSAY,  construit à la fin du XVIe siècle par François de Vivonne et Adrienne de Vallée , épouse dAgrippa dAubigné, à sa mort, sa fille Louise Arthémise hérite du château. Elle accueille sa nièce, Françoise dAubigné. Après avoir été lépouse du poète Scarron, Françoise sera la nourrice des enfants du roi avant de devenir Mme de Maintenon, compagne du roi Louis XIV. A la fin du XVIIe siècle, le château de Mursay appartient à Philippe de Valois, chevalier, seigneur et marquis de Villette Mursay. Le 17 septembre 1698, il cède le domaine  à son neveu Jean de Saint-Hermine. Puis  est acquis en 1776 par Antoine Martin, riche négociant, juge et échevin de la ville de Niort. Pendant une bonne partie du XIXe siècle, la propriété sétait transmise de mère en fille, avant dêtre vendu le 14 décembre 1940 à M. Eugène Bourdezeau. Sa fille en était encore propriétaire en 1987.                                                                                             TAILLEE  construit au XVIIe siècle, par Josué du Fay de la Taillée qui avait épousé le 27 avril 1629 Préjente de Magné. Leur fils Louis du Fay, seigneur de la Taillée, épouse le 9 décembre 1683 Elisabeth Martel de Vandré. C'est la nièce d'Eléonore Desmier d'Olbreuse, sa fille, Sophie Dorothée, épouse Georges Louis de Brunswick Hanovre qui monte sur le trône d'Angleterre sous le nom de Georges Ier. Georges-Guillaume du Fay, par contrat de mariage signé le 19 février 1705 au château de la Durbelière, épouse Françoise du Vergier de La Rochejaquelein. Par sa mère, née Élisabeth de Caumont d'Adde. Le château actuel est la propriété des descendants directs des premiers possesseurs, Anne-Laure de Bonneville propose en exclusivité le charme et l'élégance de cette demeure familiale. Propriété du comte de Dresnay.","architecture":"MURSAY, l'édifice est établi sur une plateforme surélevée rectangulaire dont les angles sont cantonnés de tourelles. Sur cette plateforme, le château se compose d'un corps de logis partagé en deux parties inégales par la tour de l'escalier qui en prend toute l'épaisseur. Ce corps de logis est lui-même cantonné de quatre tours d'inégales dimensions. Les grosses tours étaient appareillées tandis que la construction apparaît généralement en moellons. La distribution intérieure comprend un escalier droit sur lequel ouvre la porte d'entrée. Le rez-de-chaussée est surélevé et abritait les pièces de réception.                                                                                TAILLEE . a été bâti, en pierre de taille, dans le style Henri IV / Louis XIII. Il a été édifié en un seul jet, au début du XVIIe siècle.  Au cours de la Révolution, la famille du Fay de La Taillée va émigrer. Le château est mis en vente comme bien national, mais ne trouvera pas d'acquéreur. Ses propriétaires légitimes le récupèreront à leur retour d'émigration. Le château actuel est la propriété des descendants directs des premiers possesseurs. Les deux pigeonniers ont été entretenus et restaurés. Le château de la Taillée fut transmis, de génération en génération, à leurs descendants directs, qui le possèdent toujours, depuis. Il a été inscrit aux M.H. en 1969 et 1987.","habitants":"Mursay; François de Vivonne                                                          Taillée,   Josué du Fay de la Taillée \r\n        \"","divers":"Echiré; grav 1-                          St-Loup grav-3                    Taillée   grav de 6 à 9     46° 23' 42\" nord, 0° 24' 42\" ouest                                     Mursay  grav 4-5              GPS : 46° 22' 36, 84\" Nord 0° 28' 13,08\" Ouest","gps":"46° 22' 36, 84\" Nord 0° 28' 13,08\" Ouest","images":["../image/image_79/79_Echir%c3%a9_1.jpg","../image/image_79/79_Echir%c3%a9_2.jpg","../image/image_79/79_Echir%c3%a9_3.jpg","../image/image_79/79_Echir%c3%a9_4.jpg","../image/image_79/79_Echir%c3%a9_5.jpg","../image/image_79/79_Echir%c3%a9_6.jpg","../image/image_79/79_Echir%c3%a9_7.jpg","../image/image_79/79_Echir%c3%a9_8.jpg","../image/image_79/79_Echir%c3%a9_9.jpg"]},"Consult_chateau_formulaire9f80":{"id":"Consult_chateau_formulaire9f80","dept":"79","canton":"Mignon-et-Boutonne","commune":"Ensigné","nom":"Ensigné","type":"Château","periode":"XIII-XIX","histoire":"ENSIGNE, la commanderie d'Ensigné, fondée par Hugues de Payns, date à la première moitié du XIIe siècle, elle possède une chapelle romane. En 1254, Pierre Marquansane vendit aux templiers d'Ensigné un fief dépendant du château de Dampierre, résidence de Guillaume Maingot, sire de Surgères. Le seigneur de Surgères investit donc de ce fief le commandeur Pierre Adry. Aux mains des templiers, elle est passée, par la suite, sous la protection des hospitaliers jusqu'à la Révolution. A la fin du XIXe siècle, cet ensemble couvrait plus d'un hectare et comprenait la demeure, une grange immense et une chapelle.","architecture":"ENSIGNE  Le château, ou ancien donjon, était primitivement un corps de logis rectangulaire, avec quatre tours de défense et une tourelle d'escalier au milieu. Les deux tours sud ont disparu. La façade nord a été peu modifiée. Deux grosses tours rapprochées commandent une ancienne entrée avec pont-levis. Le couronnement des tours a été modifié. Les trois autres façades ont été très modifiées. Intérieurement, en sous-sol, subsistent des salles voûtées et un puits. Les étages ont été transformés en habitation bourgeoise de la fin du XIXe siècle. Ce donjon devait être entouré de douves. A l'ouest de ce dernier et, en dépendant, se trouve une grande grange formée de trois nefs de six travées, dont la charpente pose sur de gros piliers en pierre de taille. Une petite baie géminée, au-dessus de la porte d'entrée, paraît dater du XIIe siècle. Les bâtiments de la ferme comprennent une chapelle du XIIe siècle, rectangulaire. Un autre bâtiment rectangulaire présente une façade percée, au ras du sol, de deux archères et, au-dessus, deux petites ouvertures faites de deux baies géminées. L'intérieur conserve, en sous-sol, une salle voûtée en berceau, éclairée par les deux archères et, au-dessus, des restes de cheminées.","habitants":"Guillaume Maingot,\r\n        \"","divers":"Commanderie d'Ensigné","gps":"","images":["../image/image_79/79_Ensign%c3%a9_1.jpg","../image/image_79/79_Ensign%c3%a9_2.jpg"]},"Consult_chateau_formulaireee1d":{"id":"Consult_chateau_formulaireee1d","dept":"79","canton":"Frontenay-Rohan-Rohan","commune":"Epannes","nom":"Epannes","type":"Château","periode":"XV-XVIII","histoire":"EPANNES,  la seigneurie d'Epannes est connue depuis le XIIe siècle, les premiers propriétaires furent les de Béchillon d'une famille de très ancienne noblesse. Marie de Béchillon, fille unique de Pierre de Béchillon épouse Bertrand de Vivonne en 1591, Epannes passe alors dans la famille de Vivonne. Au début du XVIIe siècle, le château devient la propriété de la famille d'Aitz, qui l'occupera jusqu'au XVIIIe siècle. Ensuite la demeure passa successivement aux Gillier, aux Saint-Léger, aux Grimouard, aux des Collards du Bouchaud puis aux Cugnac à partir du milieu du XIXe siècle.","architecture":"EPANNES, aujourd'hui, le domaine est remarquablement entretenu par cette famille. Au cours de la guerre 1914-18, le château abrita des réfugiés belges. Le château, élevé au XVIIIe siècle, adopte un plan rectangulaire. Deux ailes flanquées sur sa façade principale légèrement en retour, lui confèrant cette forme de demi-cercle. Les communs, bâtis en 1632, s'alignent dans le prolongement de chaque aile formant la cour d'honneur.","habitants":"famille d'Aitz\r\n        \"","divers":"Château d'Epannes","gps":"","images":["../image/image_79/79_Epannes_1.jpg","../image/image_79/79_Epannes_2.jpg"]},"Consult_chateau_formulairef773":{"id":"Consult_chateau_formulairef773","dept":"79","canton":"Saint-Maixent-l","commune":"Exireuil","nom":"Exireuil","type":"Château","periode":"XIV-XVI","histoire":"Deux châteaux à Exireuil celui d'Avançon et celui de Vaire.               AVANCON, l'ancien fief d'Avançon relevait de la châtellenie de Saint-Maixent. Cette seigneurie a appartenu aux familles de Nuchèze, de Laval, de la Jaille, de St Georges, d'Albin de Valzergues et de Rechignevoisin. En 1698, le domaine d'Avançon appartenait au sieur de Castellane, capitaine de dragons, demeurant à Poitiers. A la Révolution, c'est le marquis Marie de Castellane qui en était propriétaire. Il émigra en 1791 et mourut à Londres en 1799. Le château fut vendu comme bien national, et acquis le 6 messidor an II par Gabriel Perrineau, négociant, mais il le revendit rapidement à Charles de Raity, marquis de Vitré, qui céda l'édifice le 19 pluviôse an XI à Mlle Marie Zénobie Leclerc de Vezins, fille d'émigré qui avait été emprisonnée pendant plus de deux ans. Elle épousa en 1801 Louis Aymer de la Chevalerie, dont les enfants le vendirent au milieu du XIXe siècle à la famille Taunay.                                                       VAIRE, en 1040, le cartulaire de l'abbaye de Saint-Maixent signalait l'existence d'une villa Vairec. Trois siècles plus tard, en 1374, Vairé appartenait à M. de Vezançay, seigneur de Germain. Puis la seigneurie de Vairé passa dans la famille Frère. René fut le premier seigneur de Vairé, dans la première moitié du XVIIe siècle. Son fils René lui succéda, puis Charles qui semble avoir vendu la propriété. Au XVIIIe siècle, Vairé appartenait à Charles de Gennes, puis à son fils Jean Baptiste, mort en 1734. Soit par vente, soit par héritage, le domaine de Vairé passa alors à la famille du Courtioux.","architecture":"AVANCON, se présentant comme un vaste carré fortifié, le château date certainement du XVIe siècle. Côté cour, dans la partie ancienne, les fenêtres sur consoles et la porte d'entrée surmontée d'un fronton sont de grande qualité.                                                                                                      VAIRE, construit à côté d'une motte féodale, Vairé est mentionné en 1040 puis en 1374. La partie centrale du logis semble remonter au XVIIIe siècle alors que les pavillons ont été élevés au XIXe siècle et la façade remaniée, elle porte la date 1860.","habitants":"Avancon, famille de Nuchèze                                                      Vaire,  à M. de Vezançay\r\n        \"","divers":"Exireuil   46° 26' 03\" nord, 0° 11' 26\" ouest   Avancon grav 2-3-4                Vaire grav 5-6-7","gps":"","images":["../image/image_79/79_Exireuil_1.jpg","../image/image_79/79_Exireuil_2.jpg","../image/image_79/79_Exireuil_3.jpg","../image/image_79/79_Exireuil_4.jpg","../image/image_79/79_Exireuil_5.jpg","../image/image_79/79_Exireuil_6.jpg","../image/image_79/79_Exireuil_7.jpg","../image/image_79/79_Exireuil_8.jpg"]},"Consult_chateau_formulaire592a":{"id":"Consult_chateau_formulaire592a","dept":"79","canton":"Celles-sur-Belle","commune":"Exoudun","nom":"Exoudun","type":"Maison forte","periode":"XV","histoire":"EXOUDUN,  l'édifice a appartenu aux comtes d'Eu, puis aux puissants Lusignan, aux de Magné et aux de Fay. Pendant les guerres de Religion, à la fin de 1585, les troupes du duc de Maine occupèrent le château. En 1586, Agrippa d'Aubigné arriva à la tête d'une troupe protestante dans l'espoir de reprendre le château et le bourg aux catholiques, il y subit des pertes élevées et se retira. Sous la Révolution, l'édifice fut utilisé comme prison, avant d'être vendu comme bien national. Il fut acquis en 1791 et resta dans la même famille jusqu'en 1906.","architecture":"EXOUDUN, château féodal dit \"rasé\", bâti sur un roc, à flanc de colline qui domine le bourg. Vaste logis rectangulaire, ses tours furent rasées sur l'ordre de Richelieu et privées de leur chemin de ronde et mâchicoulis. Forteresse des XVe et XVIe siècles,  de forme quadrangulaire, le château présente une grande austérité, due à sa vocation défensive. La demeure est flanqué de quatre tours rondes arasées, percées de hautes meurtrières. Le sommet a été découronné, on aperçoit encore une petite tourelle en surplomb dans l'angle. Sa façade possède de belles fenêtres ornées de gables ou d'accolades.","habitants":"Famille d'Exoudon\r\n        \"","divers":"Exoudon grav 1 à 4                 46° 20' 43\" nord, 0° 04' 51\" ouest","gps":"","images":["../image/image_79/79_Exoudun_1.jpg","../image/image_79/79_Exoudun_2.jpg","../image/image_79/79_Exoudun_3.jpg","../image/image_79/79_Exoudun_4.jpg"]},"Consult_chateau_formulaire5299":{"id":"Consult_chateau_formulaire5299","dept":"79","canton":"Le Val de Thouet","commune":"Bouillé Loretz","nom":"Ferrieres_79","type":"Château","periode":"XVIII","histoire":"FERRIERES, la fondation du monastère remonte à l'année 979, sous Louis le Débonnaire; mais la maison de Sanzais en réclamait le titre de fondateur. En 1130, Geoffroy de Doué, seigneur de Doué, fait dont du monastère, de toute ses terres de Ferrières et de la plupart de ses biens à l'Abbaye de la Sainte Trinité de Tiron. Des personnages célèbres ont séjourné à Ferrières et notamment Bertrand de Got, le 05 juin 1305, Archevêque de Bordeaux et qui deviendra le premier Pape en Avignon sous le nom de Clément V. Louis XI il séjournera le 06 avril 1470 alors qu'il se rendait au sanctuaire du Puy-Notre-Dame. Pendant la guerre de Cent Ans, et malgré la protection des puissants vicomtes de Thouars, l'Abbaye fut saccagée, pillée et incendiée par les compagnies de brigands. Elle renaîtra de ses cendres avec Jehan du Chastel, premier abbé commandataire qui accueillera Louis XI en 1470. À la fin de l'année 1569 l'armée huguenote menée par Coligny, après la défaite de Moncontour, pille, incendie les abbayes d'Asnières et de Ferrières, et brûle les archives. Relevée partiellement en 1580 par l'abbé Romulus Bonajuti, l'abbaye ne retrouvera jamais sa grandeur, l'influence du clergé et le nombre des moines ayant  régressé. L'Edit de Mai 1563, ordonnant l'aliénation des biens du clergé pour combler le déficit du trésor, conduit progressivement l'abbaye à la ruine. Malgré les efforts de l'abbé Charles François de Montaigu qui entreprend des travaux de restauration en 1739, l'abbaye sera vendue aux enchères publiques, le 07 avril 1791 au comte de la Selle d'Echully.","architecture":"FERRIERES,  le château actuel a été élevé après la Révolution, sur les restes du logis abbatial ; une grande partie des bâtiments ont disparu, des vestiges restent toujours: une partie de l'église abbatiale, la façade nord de la maison de l'abbé avec sa tour nord-ouest, l'escalier de pierre en colimaçon et sa tour sud-ouest, l'une des tours du châtelet d'entrée, le blason de l'abbé Louis de Bourbon sur une cheminée, la pierre tombale de l'abbé Gille Loistron de Ballon, le puits du cloître et un bâtiment de ferme avec sa tour.","habitants":"Abbé Charles François de Montaigu\r\n        \"","divers":"Bouillé Loretz ; Le château de Ferrieres 47° 04' 47\" nord, 0° 16' 17\" ouest","gps":"","images":["../image/image_79/79_Ferrieres_79_1.jpg","../image/image_79/79_Ferrieres_79_2.jpg","../image/image_79/79_Ferrieres_79_3.jpg","../image/image_79/79_Ferrieres_79_4.jpg","../image/image_79/79_Ferrieres_79_5.jpg"]},"Consult_chateau_formulairee119":{"id":"Consult_chateau_formulairee119","dept":"79","canton":"Saint-Maixent-l","commune":"Sainte-Néomaye","nom":"Fontenelle_79","type":"Château","periode":"XIX","histoire":"FONTENELLE,   au début du XIXe siècle, existait encore la maison noble de la famille Vernoux. Ce sont probablement les Frappier de Niort qui ont fait construire sur son emplacement, aux environs de 1850, le petit château actuel qui fut acquis en 1919 par le marquis de Ricaumont. Le domaine a été revendu en 1939 à la famille Vigroux. Jean Armand Vigroux, directeur de la société Creusot-Loire, est décédé à Paris en 1982. De ce fait, la demeure devint propriété de Robert Ratton, beau frère du défunt.","architecture":"FONTENELLE, d'un style tout à fait particulier dans la région, le château de la Fontenelle est d'un aspect très gracieux.   il a été restauré et aménagé par une association, les Amis du désert, pour en faire, en 1988, un centre de stages culturels.","habitants":"Famille Vernoux\r\n        \"","divers":"Château de Fontenelles à  Sainte-Néomaye","gps":"","images":["../image/image_79/79_Fontenelle_79_1.jpg","../image/image_79/79_Fontenelle_79_2.jpg","../image/image_79/79_Fontenelle_79_3.jpg","../image/image_79/79_Fontenelle_79_4.jpg"]},"Consult_chateau_formulaireadd8":{"id":"Consult_chateau_formulaireadd8","dept":"79","canton":"Thouars","commune":"Sainte -Verge","nom":"Foret_Ste_Verge","type":"Château","periode":"XIV-XVI","histoire":"FORET, située dans le bourg même de Sainte-Verge, la terre de la Forest, qui appartenait au XIVe siècle à la famille Jousseaume avait pris naissance autour de léglise. Jean Jousseaume, seigneur de la Forest, fait des donations au profit de cette église. Un titre du 11 septembre 1428, constate la dotation de deux chapellenies au même lieu, par Louis Jousseaume, écuyer, seigneur de Soussais, Jean Jousseaume, écuyer, seigneur de la Forêt-sur-Sèvre et de Commequiers, et par Jeanne de lIle, sa veuve, tutrice de Louis et Jeanne leurs enfants mineurs. En 1438, l'édifice passa aux Beaumont-Bressuire par le mariage de Jeanne Jousseaume avec Jean de Beaumont, chambellan du roi Charles VII. Le domaine de la Forêt fut par la suite tenu par les La Rochefoucault jusqu'en 1578, puis par la famille Cornillon au milieu du XVIIe siècle. Au XIXe siècle, de hauts et puissants seigneurs habitèrent tour à tour La Forêt, les Guéniveau de La Roye, les du Chesne de Beauregard, la famille Chanfreau et au début du XXe siècle Clément Ménard, maire de Thouars. Le domaine de la Forêt appartient aujourd'hui à la famille de Beauregard.","architecture":"FORET, la demeure noble a été fortement transformée jusqu'au XIXe siècle, de sorte qu'il ne reste de médiéval que l'escalier à vis et deux portes en accolade et moulures gothiques. Les communs, situés contre l'enceinte, à l'ouest, ont gardé leur cachet ancien avec le four et deux cheminées en pierre de la fin du XVe siècle. Une chambre aménagée dans la dépendance accolée au logis, est entièrement couverte de papier peint panoramique datant du premier tiers du XIXe siècle, du type \"Monuments de Paris\".","habitants":"Famille  Cornillon\r\n        \"","divers":"Foret  a Sainte-Verge; grav 1-2                                 47° 00' 23\" nord, 0° 12' 51\" ouest","gps":"","images":["../image/image_79/79_Foret_Ste_Verge_1.jpg","../image/image_79/79_Foret_Ste_Verge_2.jpg"]},"Consult_chateau_formulaire26fb":{"id":"Consult_chateau_formulaire26fb","dept":"79","canton":"Cérizay","commune":"La Forêt sur Sèvres","nom":"Foret_sur_Sèvres","type":"Château","periode":"XIV-XVI","histoire":"Trois châteaux à Foret sur Sèvres dans cet aricle celui  de Forêt de la Jobtière et de Plessis-Bâtard.                                                                                FORET sur SEVRES, se situe sur l'une des deux îles bordées par la Sèvre Nantaise. Construit en 1370 par René Jousseaume, seigneur de la Forêt, il passe en 1440 à la famille de Beaumont Bressuire. Thibaut reconstruit le château assisté par son père devenu évêque de Paris. Catherine de Beaumont en épousant Eustache du Bellay apporte la terre de la Forêt dans cette famille. En 1614, le domaine est acheté par du Plessis-Mornay, \"Le Pape des Huguenots\", ami et conseiller d'Henri IV. Il restaure la demeure qui avait souffert pendant les guerres de religion. La baronnie de la Forêt reste jusqu'au XVIIIe siècle à la famille de Jaucourt.  M. de la Maquillé entreprend d'en relever les ruines. Inachevé, il appartient à la Rochejaquelein jusqu'en 1855 puis au comte de Rohan-Chabot qui termine sa restauration.                                                                                                                         JOBTIERE,a la fin du XIVe siècle, la dame d'Appelvoisin serait à l'origine de la construction d'un château à la Jobtière seigneurie dépendant de la baronnie de Bressuire. Reconstruit vers 1480, l'édifice devient à la fin du XVIe siècle la propriété de Claude Bonaventure de Crevant, qui a épousé Marie d'Appelvoisin, des Crevant, elle passe à la famille d'Albon. Bénigne Le Ragors de Bretonvilliers, par son mariage avec une demoiselle d'Albon, devient seigneur de la Jobtière. Leur arrière-petite-fille, la duchesse de la Rochefoucault, vend le domaine peu après la Révolution.                                                                                                                   PLESSIS BATARD,   au début du XIXe siècle. Pierre Robouam, juge de paix  achète le domaine à la famille Montaigu. En 1903, le Plessis-Bâtard devient la propriété du marquis des Dorides, et l'environnement sera créé à cette époque","architecture":"FORET sur SEVRE, l'édifice servira de prison aux Bleus puis aux Blancs au cours des Guerres de Vendée. Le château sera détruit par un incendie et en 1819, les éléments du XVIe siècle ont été modifiés au cours des restaurations du XIXe siècle. Il ne reste que trois tours et deux corps de bâtiment de cette époque.                                                                                         JOBTIERE, le château s'inscrit dans une cour entourée de dépendances. Le corps de logis, rectangulaire, comprenant un rez-de-chaussée et un premier étage, est doté sur sa façade d'une importante tour d'escalier polygonale. Un bâtiment d'entrée est accolé à la tour renfermant le monumental escalier en vis. Le logis en granit particulièrement massif est couvert d'une toiture de tuiles plates, à quatre pans. Ses murs sont percés des fenêtres à meneaux et croisillons. Protégé par les douves, La Jobtière était avant tout un lieu résidentiel : aussi l'a-t-on doté de cheminées monumentales et de grandes fenêtres à coussièges.                                                                                                    PLESSIS BATARD,  un château existait depuis plusieurs siècles, en effet, on peut admirer une belle porte en accolade datant du XVIe siècle. A la suite des dévastations de la Révolution, l'acquéreur entreprend la construction du château actuel, dans le style Premier Empire, n'a subi de remaniement que pour sa toiture. C'est un corps de bâtiment dont la partie centrale est en saillie et en retrait,  Quelques marches mènent à la porte d'entrée. Côté jardin, un escalier à double volée conduit au corps central.","habitants":"Forêt  Famille de Jaucourt                                                         Jobtiere Famille d'Albon.\r\n        \"","divers":"A  La Forêt sur Sèvres; Jobtiere  46° 43' 34\" nord, 0° 39' 17\" ouest                                                                                                  Foret  grav 11 à 6    46° 46' 19\" nord, 0° 38' 43\" ouest","gps":"","images":["../image/image_79/79_Foret_sur_S%c3%a8vres_1.jpg","../image/image_79/79_Foret_sur_S%c3%a8vres_2.jpg","../image/image_79/79_Foret_sur_S%c3%a8vres_3.jpg","../image/image_79/79_Foret_sur_S%c3%a8vres_4.jpg","../image/image_79/79_Foret_sur_S%c3%a8vres_5.jpg","../image/image_79/79_Foret_sur_S%c3%a8vres_6.jpg"]},"Consult_chateau_formulairef5ca":{"id":"Consult_chateau_formulairef5ca","dept":"79","canton":"La Gâtine","commune":"Thenezay","nom":"Foret_Thezenay","type":"Château","periode":"XIV-XVII","histoire":"Trois château à Thézenay celui de la Forêt,  de Porteau et du Thay. FORET, les premières traces remontent à 1451, date à laquelle Eustache de Luains devint propriétaire du château de la Forêt. La famille de Luains, originaire du Mirebalais, disposait d'autres biens sur la commune, entre autre le Logis de Puysan. Plusieurs familles se succédèrent, entre autres, Jacques De Belleville en 1698 puis les chevaliers de la Coindardière propriétaires également du château du Thay. C'est vers 1830-1834, que la famille Grassin a acquis la propriété. Elle la gardera jusqu'en 1995, date à laquelle la famille Marquis l'achètera et en est toujours propriétaire aujourd'hui. Sur la propriété on remarque un beau pigeonnier comprenant 1200 boulins et un four à chaux construit par Désiré Grassin en 1887.            PORTEAU à Preéssigny, forteresse de l'époque féodale possédée par les de Craon, elle passa en 1400 aux Chabot lors du mariage de Marie, fille de Guillaume II de Craon, avec Louis de Chabot, seigneur de Pressigny. Les Chabot conservèrent leur domaine pendant 120 ans. Les Prévost et les Chauvin leur succédèrent puis les de Chouppes, d'une vieille famille ayant rempli d'importantes fonctions au cours des règnes de Henri IV, Louis XIII et Louis XIV. Au XIXe siècle, les Talhouët-Roy, d'une vieille famille d'origine bretonne, étaient propriétaires du Porteau. Construit entre 1914 et 1920 dans un domaine boisé de quelque 150 hectares de bois et de prairies.","architecture":"LE CHATEAU DU THAY, une grosse tour carrée aux murs percés de meurtrières autrefois flanqués d'un escalier extérieur, c'est ce qui reste du château du Thay ou se succédèrent du XVIe au XVIIe siècle, les chevaliers de la Coindardière. Particularités : les latrines situées à la base de la tour donnent directement dans l'eau.                                                      FORET, Thézenay  ancien logis de la Grande Forêt, proche de Thénezay, comporte encore, outre de nombreux bâtiments, une tour très ancienne et très élevée avec meurtrières. Derrière les communs, on peut voir un beau pigeonnier qui a conservé intact son aménagement intérieur et qui compterait 1200 alvéoles. Sa toiture est en ardoises, à pans coupés arrondis, et est ornée dune jolie lucarne.                                                                               PORTEAU,  le château a remplacé un assez triste édifice du XVIIIe siècle. Un pavillon central en léger retrait, dominant d'un niveau deux bâtiments d'angle au faîtage surmonté d'une crête de tôle découpée, c'est ainsi que se présente, avec ses ouvertures d'une symétrique régularité et, à la base des toits, cinq petites fenêtres au fronton triangulaire, la façade classique du château qui s'ouvre sur un élégant jardin à la française avec son miroir d'eau.","habitants":"Famille de Luains\r\n        \r\n        \"","divers":"A Thezenay; Foret-Thenezay porteau  grav 1-2 Thenezay 3 à 6","gps":"","images":["../image/image_79/79_Foret_Thezenay_1.jpg","../image/image_79/79_Foret_Thezenay_2.jpg","../image/image_79/79_Foret_Thezenay_3.jpg","../image/image_79/79_Foret_Thezenay_4.jpg","../image/image_79/79_Foret_Thezenay_5.jpg","../image/image_79/79_Foret_Thezenay_6.jpg"]},"Consult_chateau_formulaire86ce":{"id":"Consult_chateau_formulaire86ce","dept":"79","canton":"La Gâtine","commune":"Les Forges","nom":"Forges","type":"Manoir","periode":"XV-XIX","histoire":"FORGES,   en 1404, Michau de Saint-Gelais était le seigneur des Forges, en 1456, Antoine de Payele, puis Guillaume de Saint Julien. Au début du XVIe siècle, la seigneurie des Forges était aux mains de Jean Boucard, chanoine et trésorier du chapitre de Ménigoute. En 1527, il légua la châtellenie des Forges à son neveu, Louis Jourdain, cette famille conserva le domaine des Forges jusqu'à la fin du XVIe siècle. Elle passa à cette époque aux Bonnin par le mariage de Barbe Jourdain avec René Bonnin, seigneur du Plessis-Asse. Ensuite, la terre des Forges va appartenirt successivement aux Chevalleau de Boisragon, aux Godet de la Riboulerie, puis aux Coyreau des Loges.","architecture":"FORGES, aujourd'hui les
