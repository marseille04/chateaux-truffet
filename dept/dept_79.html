st mentionnée mais de cette première construction, seuls les communs subsistent. La propriété passe entre les mains des Chabot, des Revost, des Baudéan Parabère, commanditaires du château actuel, puis en 1718 à Jacques Thibault de la Carte et enfin de 1834 à 1969 à la famille Brach.","architecture":"MOULIERES, le corps principal, côté cour, a perdu de sa sobriété par l'adjonction de deux contreforts au XIXe siècle. Les façades sur trois niveaux côté cour, quatre niveaux côté rivière, reprennent la formule du rustique français, où chaque travée est encadrée de chaînages de pierres. Elles tentent de retrouver une polychromie grâce au jeu des chaînages, avec un appareil en pierre dissimulé sous un enduit rose. Un soin tout particulier a été apporté aux portes d'entrée qui s'ouvrent sur un vestibule monumental voûté qui a entraîné le rejet des escaliers à ses extrémités. Elément majeur de la façade, côté rivière, l'escalier monumental, à balustres carrées en poire, épouse les accidents de la roche sur laquelle est élevé le château.","habitants":"Famille de Jacques Thibault de la Carte\r\n        \"","divers":"A  Saint-Pompain; château de Moulières  46° 26' 53\" nord, 0° 36' 46\" ouest","gps":"","images":["../image/image_79/79_Mouli%c3%a8res_1.jpg","../image/image_79/79_Mouli%c3%a8res_2.jpg","../image/image_79/79_Mouli%c3%a8res_3.jpg"]},"Consult_chateau_formulaire50e7":{"id":"Consult_chateau_formulaire50e7","dept":"79","canton":"Mauléon","commune":"Saint-Aubin du Plain","nom":"Muflet","type":"Maison-forte","periode":"XV-XIX","histoire":"Deux châteaux à Saint-Aubin du Plain, celui de Muflet et de Noirlieu                                                                                                                     MUFLET,  seigneurie mentionnée dès 1378. Le château est un bâtiment médiéval ayant subi des transformations à la fin du XVIe siècle et au début du XVIIe siècle. Il est doté d'une tour maîtresse qui remonte sans doute au XIVe siècle (escalier à vis intérieur et archères).                                                                                                                    NOIRLIEU,  à deux km à l'ouest , était autrefois le siège d'une importante seigneurie qui s'étendait sur presque toute la superficie de la commune. Le plan cadastral de 1811 montre combien, au début du XIXe siècle, les bâtiments de l'ancienne seigneurie tenaient une place très importante dans le bourg. Les premiers seigneurs connus de Noirlieu furent les Carrion, originaires d'Anjou, à partir du début du XVe siècle. Les Fournier leur succédèrent dès le commencement du XVIIe siècle. Puis en 1685, le domaine de Noirlieu passa à Paul Naudin, lieutenant général du duché pairie de Thouars, ensuite il passa par mariage à la famille de la Haye Montbault, puis aux Aubry et aux Ringeard de la Charmoise au milieu du XVIIIe siècle.","architecture":"MUFLET, le corps de logis principal est doté d'un grand escalier en vis placé dans une tour hors-oeuvre à l'arrière, et d'un système de défense équipé de nombreuses canonnières. A proximité du château de Muflet se trouve un oratoire du XVe siècle. Le château est au centre d'une enceinte carrée dont il subsiste les communs, une tour d'angle tronquée et le portail d'entrée. Des douves entouraient le château et la cour de ferme.                                                                                                              NOIRLIEU Il ne subsiste, de l'ancien château aujourd'hui transformé en exploitation agricole, que deux tours et un long corps de bâtiments (les communs) que traverse une porte charretière.","habitants":"Famille des  Carrion\r\n        \"","divers":"Muflet; grav 1-à 5;  46° 55' 45\" nord, 0° 26' 42\" ouest    Noirlieu grav 6-7","gps":"","images":["../image/image_79/79_Muflet_1.jpg","../image/image_79/79_Muflet_2.jpg","../image/image_79/79_Muflet_3.jpg","../image/image_79/79_Muflet_4.jpg","../image/image_79/79_Muflet_5.jpg","../image/image_79/79_Muflet_6.jpg","../image/image_79/79_Muflet_7.jpg"]},"Consult_chateau_formulaireec4a":{"id":"Consult_chateau_formulaireec4a","dept":"79","canton":"Melle","commune":"Paizay le Tort","nom":"Mélzéard","type":"Château","periode":"XV","histoire":"MELZEARD, le donjon a été bâti vers 1419 pour Pierre Frotier, sénéchal du Poitou, fils de Jean Frotier et petit-fils de Jeanne Ravart, dame de Melzéard. En 1452, le roi Charles VII lui octroya par lettres patentes le droit de haute, moyenne et basse Justice. En 1470, Prégent Frotier a vendu la seigneurie de Melzéard à Guyon de Puygirault qui a aménagé une chapelle dans une tourelle de l'enceinte.","architecture":"MELZEARD, d'autres tours confortaient l'enceinte contre laquelle venaient s'appuyer les bâtiments de communs et d'habitation, l'ensemble formant ainsi une cour rectangulaire. Le logis est doté de tours carrées (antérieur au XVIe siècle, réaménagé au XVIIe siècle et à la veille de la Révolution), il avait sa façade antérieure ouverte à l'est. Une aile en retour d'équerre reliait le logis au donjon. Devant l'entrée principale se trouvait un pigeonnier construit avant la fin du XVIIe siècle. Entre 1780 et 1832, le corps de logis a été allongé au nord, à la place de la tour démolie et devenue pavillon. Les communs reliant le logis au donjon, ainsi que ceux à l'est de la cour ont été démolis. Les communs, qui fermaient le côté nord de la cour, ont été prolongés vers l'est, et une nouvelle orangerie et une grange ont été élevées dans le jardin. En 1885, la dernière campagne de travaux a remodelé le domaine. Le logis et une partie des dépendances sont démolis. En février 1993, le château est ravagé par un incendie et vendu par lots.\r\nChâteau de plan régulier en H, à toit à longs pans et croupes sur les deux ailes les autres toitures ayant été détruites par l'incendie, donjon de plan circulaire à toiture conique ; écuries de plan régulier en H et deux conciergeries couvertes en ardoise ; chapelle de plan pentagonal, dont le rez-de-chaussée est voûté d'ogives, à toiture conique en tuile plate.","habitants":"Famille de  Pierre Frottier\r\n        \r\n        \r\n        \"","divers":"Paizay le tort ; 46° 10' 49\" nord, 0° 09' 42\" ouest                                     Mélzéard 46° 11' 11\" nord, 0° 10' 08\" ouest","gps":"","images":["../image/image_79/79_M%c3%a9lz%c3%a9ard_1.jpg","../image/image_79/79_M%c3%a9lz%c3%a9ard_2.jpg","../image/image_79/79_M%c3%a9lz%c3%a9ard_3.jpg","../image/image_79/79_M%c3%a9lz%c3%a9ard_4.jpg","../image/image_79/79_M%c3%a9lz%c3%a9ard_5.jpg"]},"Consult_chateau_formulairef1ef":{"id":"Consult_chateau_formulairef1ef","dept":"79","canton":"Niort","commune":"Niort","nom":"Niort_Donjon","type":"Forteresse","periode":"XII-XVI","histoire":"DONJON-Niort, le plus remarquable ensemble de donjons jumeaux de France se dresse en pleine ville. Il sagit en réalité des vestiges dun très important ensemble dun périmètre de 700 mètres, armé dune dizaine de tours, dont il formait le cur:  Cest Henri II Plantagenêt qui, pour protéger les domaines de son épouse, dAliénor dAquitaine,  décida la reconstruction de cette forteresse, entre 1160 et 1175. Les deux donjons carrés sont hauts de 28 et 23 mètres et ont un plan semblable. Chaque angle est appuyé dun contrefort cylindrique et les murs dun contrefort semi-rond. Le donjon sud, entièrement dans son état dorigine, présente sous son crénelage, des mâchicoulis bandés sur arcs entre ses tourelles-contreforts. Celui au nord seffondra en partie en 1719 et fut reconstruit un peu moins haut. Distants de seize mètres, lun et lautre étaient reliés par deux courtines prolongeant leurs faces nord-ouest et sud-est, renforcées par des contreforts semi cylindriques. La cour ainsi délimitée, accessible par un pont-levis, en façade, formait un piège redoutable en cas dincursion ennemie en raison des tirs effectués des terrasses des donjons. La porte dentrée actuelle du premier étage a été percée à la fin du XVIe siècle pour le séjour de Catherine de Médicis et son linteau est orné de trygliphes et métopes. Lentrée dorigine consistait en une modeste porte en plein cintre, identique à celles de lintérieur, elle nétait accessible que par une échelle de bois et se situe à gauche de la tour dentrée actuelle, au sud-est. Le bâtiment central couvert dune toiture dardoises a été créé, sans doute dès le XIVe siècle, en couvrant la cour comprise entre les deux donjons.","architecture":"DONJON,  la tour sud possède trois niveaux accessibles, comme dans lautre tour, par un escalier à vis, chaque niveau étant voûté en berceau brisé, ou plein cintre pour le troisième. La tour nord en possède quatre dont deux sont dépourvus de voûtes et délimités par un plafond de bois. Les salles basses du corps central, couronnées de voûtes surbaissées, sont remarquables par leur appareillage ordonné autour dune clef en losange portant la date de ces travaux, 1750 à 1752. Restaurées en 1980, elles ont retrouvé leur allure dorigine et leur sol a été reconstitué à partir des traces darrachement et des gargouilles découlement des eaux usées. Elles abritent actuellement les salles darchéologie du musée, à lorigine du musée du costume poitevin devenu, plus tard, municipal. Les bâtiments, achetés à lEtat par la Ville sous le premier Empire, ont servi de prison, de service darchives et abritèrent la mairie de1792 à 1848. Cest dans la cour du château de Niort, qui renfermait de nombreux bâtiments, le logement du capitaine, une chapelle quAliénor dAquitaine signa la charte de franche-commune accordée aux Niortais en 1203. Les noms de la plupart des châtelains résidant au château (XVeXVIIIe siècles) nous sont connus. Une compagnie dinvalides y séjourna au XVIIIe siècle jusquen 1793,  il abrite un musée municipal de 1ère catégorie, contrôlé par lEtat.","habitants":"Aliénor dAquitaine                                                                  Catherine de Médicis\r\n        \"","divers":"Niort; Donjon grav de 4 à 7","gps":"","images":["../image/image_79/79_Niort_Donjon_1.jpg","../image/image_79/79_Niort_Donjon_2.jpg","../image/image_79/79_Niort_Donjon_3.jpg","../image/image_79/79_Niort_Donjon_4.jpg","../image/image_79/79_Niort_Donjon_5.jpg","../image/image_79/79_Niort_Donjon_6.jpg","../image/image_79/79_Niort_Donjon_7.jpg","../image/image_79/79_Niort_Donjon_8.jpg"]},"Consult_chateau_formulaireb7fe":{"id":"Consult_chateau_formulaireb7fe","dept":"79","canton":"Mauléon","commune":"Nueil les Aubiers","nom":"Nueil_Aubiers_I","type":"Château","periode":"XV-XVI","histoire":"il y a 8 châteaux à Neuil-les-Aubiers.  dans cet article ; Cerveau, Tournelay, Fresne Chabot  et Gallière.                                                                                       CERVEAU, les 28 tours et les 2 douves en faisaient une forteresse au Moyen-âge. sa construction a débuté au XVe siècle et s'est achevée au XVIe siècle. En 1576, François Ier Champlay reçoit du Roi Henri III, le droit de fortifier la maison, pillée et incendiée pendant les guerres de Religion (1575-1576). La maison noble comptait alors de nombreuses tours d'enceinte, des boutiques et abritait les Réformés. Restauré au XVIe siècle, l'édifice se présente sous la forme d'un donjon carré, cantonné d'une tour ronde et d'une tour carrée, arasée. Des canonnières côtoient des baies à traverses et meneaux. Au devant du donjon du XVe siècle, une loggia fermée par un muret en moëllons terminé par une assise de dalles en granit mouluré, est ajourée de piles de section carrée et de colonnes doriques. A droite, cette loggia est fermée par un ancien oratoire en pierre de taille.  En 1536 Jeanne Maslon cède Cervaux à François de Camplays. Le fils de celui-ci, François II, seigneur de Cervaux, épousa en 1552 Jeanne de Beaumont des Dorides, en 1901, est acquis par la famille HY d'Argenton-Château.                                    \r\nFRESNE-CHABOT,  seigneurie du Fresne est mentionnée dès 1239 ; elle prit le nom de Fresne-Chabot car possédée par un sieur de Chabot.  Le nom resta malgré les multiples propriétaires.                                                                    TOURNELAY, il fut construit par Charles Etienne Chauvin Lénardière. Son neveu, Charles de la Maufreyere, entreprit la réalisation du parc. Sa fille épousa Guy de Marliave qui continua son uvre en créant des parterres à la française puis sa mère créa l'étang et restaura le domaine. Les propriétaires actuels, la famille de Lassus continuent cette uvre.","architecture":"FRESNE-CHABOT, le château comportait à l'origine un corps de logis rectangulaire cantonné de deux tours et la propriété était close de murs. Au XIXe siècle, le corps de logis perdit une de ses tours et fut converti en dépendances. Une habitation fut bâtie face à l'ancien corps de logis, l'ensemble de ces bâtiments s'ordonne autour d'une vaste cour.\r\nGALLIERE, était autrefois entourée de douves qui ont été, depuis, comblées. Le porche d'entrée est bien conservé. Il est de forme carré à fenêtres géminées et portant le pont-levis. Le château de la Gallière fut habité notamment par Charles Etienne Chauvin Lénardière dont la fille Jeanne épousa Alexis des Nouhes. Ce dernier se distingua en 1792 lors des combats des guerres de Vendée, en prenant la tête des combats de Thouars, Torfou, mais il fut battu à Cholet. Leurs fils, bien que très jeune, lui succèdera dans les combats successifs de 1796, 1799 et en 1815. C'est en tombant de cheval qu'il perdit la vie. Le château de la Gallière est inscrit aux M.H. depuis 1987.                                                                                                       TOURNELAY, autour du château se déploient un parterre à la française et un parc paysager clos de 30 hectares. Des perspectives lointaines alternent avec des bois, des étangs et des rivières conférant au domaine une ampleur exceptionnelle. Le parc est un véritable arboretum.","habitants":"Cerveau famille HY d'Argenton-Château.                                        Tournelay Charles Etienne Chauvin Lénardière                                 Fresne-Chabot famille de Chabot                                         Gallière, Charles Etienne Chauvin Lénardière\r\n        \r\n        \"","divers":"A  Nueil les Aubiés; Gallière grav-1  : 46° 55' 03\" Nord, 0° 34' 37\" Ouest       Tournalay grav 4-5-6          : 46° 55' 57\" Nord et 0° 35' 29\" Ouest  Cervau   grav-2    Fresne Chabot grav -3","gps":"","images":["../image/image_79/79_Neuil_Aubiers_I_1.jpg","../image/image_79/79_Neuil_Aubiers_I_2.jpg","../image/image_79/79_Neuil_Aubiers_I_3.jpg","../image/image_79/79_Neuil_Aubiers_I_4.jpg","../image/image_79/79_Neuil_Aubiers_I_5.jpg","../image/image_79/79_Neuil_Aubiers_I_6.jpg"]},"Consult_chateau_formulairea4a1":{"id":"Consult_chateau_formulairea4a1","dept":"79","canton":"Mauléon","commune":"Nueil les Aubiés","nom":"Nueil_Aubiers_II","type":"Château","periode":"XV-XVII","histoire":"Dans cet article le château de Mipied, de Puy-Louet, de la Bobinière, de Brunaire et de Caphar.                                                                                  MILPIED, château du XVe siècle en ruine ; le porche d'entrée est monumental. La famille Rigault, propriétaire, se distingue à travers plusieurs siècles pour diverses raisons. En 1605, Jacques Rigault, seigneur de Milpied, est chevalier de l'Ordre du Roi, gentilhomme ordinaire de sa chambre. Sa fille seule héritière apporta Milpied en dot à Philippe de la Béraudière. Celui-ci pendant la Fronde, combattait aux côté du prince de Condé à Paris. Il joue un rôle assez important pour être compris nominativement dans l'amnistie accordée par Louis XIV aux Frondeurs.  Son fils Jacques de la Béraudière, né le 11 décembre 1669, fut dès 14 ans garde du corps de Louis XIV. Pendant les guerres de Vendée un de ses descendants s'illustra au combat de 1799 aux Aubiers.                                                                                                                            PUY-LOUET, s'appelait Piloët en 1351. La maison noble qui date du XVe siècle, encore habitée il y a peu de temps, se composait d'un grand logis, de dépendances. En 1789, Louis Joseph de Calais, propriétaire, prend la tête des premiers insurgés aux Aubiers ; déporté en Espagne il put fuir et se cacher en France sous un nom d'emprunt. Afin de l'aider à retrouver ses terres, des notables de la commune certifient le 30 septembre 1797 que Pierre Calais, n'a pas quitté les Aubiers du 7 mai 1792 au 30 septembre 1797, qu'il a donné de quoi embellir les fêtes républicaines et qu'il s'est comporté en bon et honnête citoyen. Ainsi Louis Joseph de Calais put rejoindre Puy Louet ; il y meurt le 18 août 1823,L'actuel château fut bâti en 1870 par Henri Soulard de la Roche. Il passa ensuite à la famille de Lostende jusqu'en 1940 qui le vend à l'actuel propriétaire la famille de Saint-Laon.","architecture":"BODINIERE, construit au XVIe siècle, se compose d'un beau corps de logis bien conservé et est entouré d'un parc.Au dessus de la porte d'entrée figure le blason daté de 1563 de la famille Morna. Michel-Joseph Morna, sénéchal du lieu est au XVIIe siècle avocat au Parlement. Propriété des de Rangot, dont Félix fut maire des Aubiers, il passe ensuite aux Belot de la Digne puis aux Brice-Montigny et est actuellement la propriété de la famille du Boisbaudry.                                   BRUNAIRE, est un château bâti à Nueil-les-Aubiers.                                                                                                             CAPHAR c'est un long bâtiment flanqué de trois tours d'angle d'origine.  Caphar est mentionné dés 1510. On accédait à ce château côté nord par un grand porche, aujourd'hui disparu. Le logis était devenu la propriété d'Alexandre Mignot d'Houdan par son mariage avec Marie-Madeleine Chauvière en 1770. Leur petit-fils fils, maire des Aubiers de 1878 à 1884, mourra sans descendance. Caphar fut l'un des premiers refuges du curé Guillaume Barbarin, traqué en 1791 pour refus de serment. Pendant la Révolution, un aïeul se présente en mairie pour faire enregistrer la naissance de son enfant, nommé Pierre. L'employé préposé à l'état civil fait alors remarqué que la jeune République interdit de choisir un prénom se rapportant à un saint. Le jeune papa demande ironiquement d'appeler l'enfant « granit » ou « silex ».\r\nLe dénouement de l'histoire s'achève par l'acte de naissance suivant :  l'an II de la République.","habitants":"Milpied; La famille Rigault                                                                  puy-Louet ; Louis Joseph de Calais\r\n        \"","divers":"A   Nueil les Aubiés; Bodinières grav 5                                      Caphar grav 1 à 4                                                                             Milpied grav 6    46° 56' 17\" Nord et 0° 35' 19\" Ouest.                                  Puy-louet grav 7-8-9","gps":"","images":["../image/image_79/79_Nueil_Aubiers_II_1.jpg","../image/image_79/79_Nueil_Aubiers_II_2.jpg","../image/image_79/79_Nueil_Aubiers_II_3.jpg","../image/image_79/79_Nueil_Aubiers_II_4.jpg","../image/image_79/79_Nueil_Aubiers_II_5.jpg","../image/image_79/79_Nueil_Aubiers_II_6.jpg","../image/image_79/79_Nueil_Aubiers_II_7.jpg","../image/image_79/79_Nueil_Aubiers_II_8.jpg","../image/image_79/79_Nueil_Aubiers_II_9.jpg"]},"Consult_chateau_formulaire8fa0-2":{"id":"Consult_chateau_formulaire8fa0-2","dept":"79","canton":"Mauléon","commune":"Nueil les Aubiers","nom":"Nueil_Aubiers_III","type":"Château","periode":"XIII-XV-XVII","histoire":"Dans cet article le chateau des Dorides, de la Sainte Famille, et de la Favrière.                                                                                                               DORIDES, en 1384 le maître des lieux est Philippot Collet, ce personnage est alors peu recommandable : il fut emprisonné pour brigandage pendant la guerre de cent ans. Au siècle suivant, le château devient la propriété des seigneurs de Beaumont de Bressuire. André et François de Beaumont prirent le titre en 1470 de « Seigneurs des Dorides ». Au XVIIe siècle, le château devient la propriété de la famille de la ville de Pérolles. Détruit à la Révolution, il ne subsiste de l'ancien château , que quelques tours.\r\nDans une lettre datée du 29 septembre 1800, le comte des Dorides écrit à son père le marquis : « Notre maison a été la plus brûlée de tout le pays, tout a été saccagé. Vendu comme biens nationaux en l'an VIII,  il change plusieurs fois de propriétaires et fut reconstruit par monsieur Guéneau Duformanoir, avant d'être acquis par la famille de La Garde, en 1883.                                                                          SAINTE-FAMILLE,   propriété de la famille du Coudray, c'est la régisseuse des lieux, madame Fradin qui hérite de la propriété. En 1921 la propriété est à nouveau léguée. C'est la communauté religieuse de Salvert de Migné-Auxance  qui devient propriétaire à condition que la présence de religieuses, uvrant comme gardes malades, s'y maintienne à perpétuité.  A partir de 1932, les surs reçoivent les premiers patients. Ce n'est qu'en 1956 que la demeure se transforme en maison de retraite. Les charges administratives devenant trop importantes, et le nombre de religieuse fléchissant, la gestion est alors confiée au CCAS.","architecture":"La FAVRIERE, à Neuil sur Argent,  l'origine du logis de la Favrière remonterait à 1315, selon des archives retrouvées au château de la Durbellière de Saint-Aubin de Baubigné qui mentionnent aussi qu'il appartenait alors aux de Beaumont du Bois-Charruyau. Les détails architecturaux témoignent de façon indéniable de son origine féodale. C'est en 1570 que le seigneur du lieu Claude Le Mastin, gentilhomme d'honneur de la reine Catherine de Médicis, fait construire la galerie Renaissance. Dans la nuit du 11 au 12 avril 1793, l'armée républicaine bloquée dans sa progression par les royalistes fait halte au Logis. Le général des « bleus », Quetineau, envoie alors 2500 hommes affronter Henri de La Rochejaquelein et ses hommes. C'est à l'issue de cette bataille  que les républicains, détruisent la chapelle de la Favrière, avant de poursuivre leur route. Restauré avec passion, le site est inscrit à l'Inventaire supplémentaire des M.H. depuis 1987. Pour avoir plus d'informations sur la restauration des lieux, découvrez le à site Internet qui lui est consacré Logis de la Favrière.","habitants":"Dorides; Philippot Collet                                                              Favrière; Claude Le Mastin                                                             Ste Famille; famille du Coudray,\r\n        \r\n        \"","divers":"A Nueil les Aubiers; Dorides  grav 1-2  : 46° 55' 57\" Nord et 0° 31' 49\" Ouest                                                                           Favières grav 3-4","gps":"","images":["../image/image_79/79_Nueil_Aubiers_III_1.jpg","../image/image_79/79_Nueil_Aubiers_III_2.jpg","../image/image_79/79_Nueil_Aubiers_III_3.jpg","../image/image_79/79_Nueil_Aubiers_III_4.jpg","../image/image_79/79_Nueil_Aubiers_III_5.jpg"]},"Consult_chateau_formulaire77d7":{"id":"Consult_chateau_formulaire77d7","dept":"79","canton":"Le Val de Thouet","commune":"Oiron","nom":"Oiron","type":"Palace","periode":"XV-XVII","histoire":"OIRON, construction  en 1450, le domaine appartient à Guillaume Gouffier, valet de chambre de Jacques Coeur qui  reçoit les terres des  mains du roi Charles VII, le fils de Gillaume prénommé Artus  embelli le château. Le fils d'Artus Claude grand écuyer de France sous François Ier, titré duc du Roannais. En 1568 et 1569, il est pillé par les protestants. Les travaux du XVIIe siècle lui donnent son aspect actuel. François d'Aubusson comte de la Feuillade reçoit Oiron par mariage en 1667 c'est son fils louis qui vend en 1700 à la marquise de Montespan  la nouvelle propriétaire à sa mort c'est son fils le duc d'Antin, puis aux marquis  de Villeroy avant d'être acquis par les Fournier de Boisairault qui le conservent  jusqu'en 1941, A la Révolution, le château est pillé et les sculptures mutilées. Aujourd'hui propriété de l'état.","architecture":"OIRON, le château se compose d'un corps de bâtiment central, à grand toit en bâtière, avec des façades du XVIIe siècle ornées. Ce bâtiment est flanqué de pavillons également ornés, dans le même style que les décors du bâtiment central. Le pavillon nord présente une balustrade à trophées. Le pavillon sud est inachevé. De ces deux pavillons se détachent deux ailes. L'aile nord, du XVIe siècle pour le rez-de-chaussée, présente une galerie voûtée sur croisée d'ogives s'ouvrant sur la cour. Elle est du XVIIe siècle pour les étages. L'aile sud date du XVIIe siècle et ne comporte qu'un rez-de-chaussée surmonté d'une terrasse. Elle se termine par un pavillon à deux étages. Les extrémités des ailes sont flanquées de tours rondes surmontées de toits en coupoles. La façade du bâtiment central s'orne de pilastres et cordons à bossages, médaillons, niches. Le bord du toit est orné de trophées et le centre surmonté d'un fronton. A l'intérieur de l'aile nord, la galerie du premier étage est couverte d'un plafond à petits caissons peints ainsi que de fresques représentant la guerre de Troie d'après Homère et Virgile.  De 1869 à 1877, l'architecte Daviaux entreprend la restauration de l'édifice.","habitants":"Famille de François d'Aubusson \r\n        \"","divers":"Oiron; : 46° 57' 06\" Nord, 0° 04' 39\" Ouest","gps":"","images":["../image/image_79/79_Oiron_1.jpg","../image/image_79/79_Oiron_2.jpg","../image/image_79/79_Oiron_3.jpg","../image/image_79/79_Oiron_4.jpg","../image/image_79/79_Oiron_5.jpg"]},"Consult_chateau_formulaire1427-2":{"id":"Consult_chateau_formulaire1427-2","dept":"79","canton":"Mignon-et-Boutonne","commune":"Usseau","nom":"Olbreuse","type":"Château","periode":"XIII-XVI","histoire":"OLBREUSE,  au XVIe siècle le château doit sa renommée au personnage emblématique dEléonore Desmier dOlbreuse. Devenue comtesse de Wilhemsburg, elle devient, grace au mariage de sa fille Sophie Dorothée de Brunswick, la belle-mère du Roi dAngleterre Georges Ier. Elle est la grand mère dune longue et prestigieuse lignée de souverain. On la surnomme ainsi la \"grand-mère de lEurope\". Au delà du personnage d'Eléonore dOlbreuse, la famille Desmier convertie au protestantisme prit part au sauvetage de nombreux protestants durant la terrible période des Dragonnades. Ces soldats royaux avaient pour mission de tyranniser les hérétiques et de les ramener à la vrai foi. Profitant de leurs privilèges, la famille Desmier, en 1729  Olbreuse passe aux Prévost  de Gagemont, la dernière des Prévost en 1871 madame de Nossay le cède  à Charles-Louis Desmier issu de la branche de la Carlière qui avait émigré à la Révolution, petite fille de Charles-Louis  Christiane Desmier épouse Félix Maingueneau fut la dernière à habiter aux château. Le château d'Olbreuse est rénové en 1967, depuis 1996 Olbreuse appartient à monsieur René Boscals de Réals. Le château d'Olbreuse est inscrit en 1973, propriété de monsieur Arrive.","architecture":"OLBREUSE, le château est à l'origine un bâtiment médiéval datant du XIIIe siècle, présentant un bâtiment rectangulaire avec quatre tours, remanié à plusieurs reprises et en dernier lieux au XIXe siècle, le château à pour origine une maison forte agrandie sous le règne de Louis XV et privée de ses courtines, de larges ouvertures percent ses façades, de plan rectangulaire flanqué à chacun de ses angles extérieurs d'une tour équipée de meurtrières. Un corps de logis, unique est aujourd'hui réduit en largeur  par rapport à son état d'origine formait l'un des côtés d'une cour fermée de courtines dans laquelle s'élevait un puits toujours visible et coiffé d'un toit  en dôme du XVIe siècle. En 1760 sur l'emplacement de la courtine à gauche du corps de logis une aile est construite avec rez-de-chaussée et un étage de grenier.","habitants":"Eléonore Desmier dOlbreuse\r\n        \"","divers":"A Usseau;  46° 10' 59\" Nord 0° 36' 02\" Ouest","gps":"","images":["../image/image_79/79_Olbreuse_1.jpg","../image/image_79/79_Olbreuse_2.jpg","../image/image_79/79_Olbreuse_3.jpg","../image/image_79/79_Olbreuse_4.jpg"]},"Consult_chateau_formulairef8b6":{"id":"Consult_chateau_formulairef8b6","dept":"79","canton":"Bressuire","commune":"Machepaille","nom":"Orangerie","type":"Manoir","periode":"XIX","histoire":"ORANGERIE, le château a été élevé dans le courant de l'année 1853 sur l'une des nombreuses dépendances appartenant à la famille Guignard de Germond, citée dès le XIIe siècle, et dont les membres étaient seigneurs de la Vauderie, de la Salle Guibert, de Champeau. Le château fut vraisemblablement construit par Jean Baptiste Désiré Guignard de Gennond, époux de Anne-Marie-Yolande-Hyacinthe de Baudry d'Asson. A leur mort, le domaine revint à l'un de leurs quatre enfants, Joseph-François-Charles, qui décéda au château en 1893. Il vendit la propriété à son gendre, Emile Delor, qui lui-même la céda, en 1917, à Gaston Roy, négociant et son épouse Louise Mercier. Cette dernière décéda en 1926, l'édifice fut vendu plusieurs fois avant d'être acquis en 1955 par Antoine Blanquer et son épouse qui en firent don en 1959 à l'association Foyer de Bel Air, l'actuel propriétaire, la famille Brunet.","architecture":"ORANGERIE, le château consiste en un bâtiment rectangulaire à deux niveaux toit en croupe,  flanqué d'une tour ronde à chaque angles  toit en poivrières.","habitants":"Famille Guignard de Germond\r\n        \"","divers":"A Marchepaille ;l'orangerie St-Loup sur Thouet le Chillou","gps":"","images":["../image/image_79/79_Orangerie_1.jpg","../image/image_79/79_Orangerie_2.jpg","../image/image_79/79_Orangerie_3.jpg"]},"Consult_chateau_formulaire73fb":{"id":"Consult_chateau_formulaire73fb","dept":"79","canton":"La Gâtine","commune":"Gourgé","nom":"Orfeuille","type":"Manoir","periode":"XIV-XV","histoire":"ORFEUILLE; la terre d'Orfeuille est mentionnée dès le XIVe siècle. Château d'origine du XIVe siècle, brûlé au XVe siècle et au XVIIe siècle, remanié à plusieurs reprises, notamment aux XVIIe et XIXe siècles, Après avoir appartenu à la famille d'Argenton à la fin du XIVe siècle, la seigneurie passa aux Thibault de 1553 à 1582 et aux Linax jusqu'en 1618. Le 20 juillet 1618, Jean de linax, écuyer, vendait Orfeuille à Samuel Guichard, écuyer, seigneur du Châtelier Payré. A la fin du XVIIIe siècle la terre d'Orfeuille était toujours aux mains de cette famille, représentée par Charles-Christophe-Henri Guichard. Au moment de la Révolution, son fils Charles-Henri émigra, et ses biens furent alors confisqués et mis en vente au profit de la Nation. Appartient à monsieur Jean Fruchard.","architecture":"ORFEUILLE, le château brûla fin du XVe siècle et du XVIIe siècle, corps de logis rectangulaire à deux niveaux et quatre tours rondes toit en poivrières ,aux angles encore cernés par une enceinte mais remanié au XVIIe siècle et restauré au XIXe siècle.","habitants":"Famille d'Argenton\r\n        \"","divers":"A Gourgé ; 46° 45' 33\" nord, 0° 12' 46\" ouest","gps":"","images":["../image/image_79/79_Orfeuille_1.jpg","../image/image_79/79_Orfeuille_2.jpg","../image/image_79/79_Orfeuille_3.jpg","../image/image_79/79_Orfeuille_4.jpg","../image/image_79/79_Orfeuille_5.jpg","../image/image_79/79_Orfeuille_6.jpg"]},"Consult_chateau_formulaire0291":{"id":"Consult_chateau_formulaire0291","dept":"79","canton":"Autize-Égray","commune":"Saint-Maxire","nom":"Oriou","type":"Château","periode":"XVI","histoire":"ORIOU,  ce village avait une importance stratégique au Moyen-Age et au XVIe siècle, notamment à cause de ses ponts. Situé à l'écart du village, dans une boucle de la Sèvre, le domaine d'Oriou est clos de murs. Le château a été bâti dans la deuxième moitié du XVIe siècle, Les premiers seigneurs connus furent les Laurens, l'état civil de Niort fait mention, en 1579, du baptême de Bertrand Laurens, fils de Jacob, seigneur d'Oriou. Puis en 1598, la seigneurie passa aux mains de Jehan Berland, à Jehan succéda son fils Jean, au cours de la première moitié du XVIIe siècle. Marié à Barbe Picot, il eut deux filles dont l'une, Catherine, épousa le 21 février 1667 Léon Jourdain, chevalier seigneur de Marsilly, lui apportant ainsi les terres et le château d'Oriou. Les Jourdain de Villiers le gardèrent jusque dans la première moitié du XIXe siècle époque à laquelle ils le vendirent à monsieur Laurence. Ce dernier se sépara de la propriété peu de temps après. Le domaine échut à Clémentin de la Rochebrochard qui le transmit à son fils Louis. A la fin du XIXe siècle, il mit en vente le château qui fut acheté par le docteur Auguste Tonnet.","architecture":"ORIOU, divers bâtiments de dépendances ont été ajoutés au corps de logis rectangulaire, possédant une tour accolée à sa façade orientale. Il est entouré de douves sèches traversées par deux ponts conduisant aux portes d'entrée. Deux tourelles d'angle sur consoles moulurées, agrémentent l'élévation ouest, accentuant son aspect défensif. Les ouvertures ont été remaniées au XIXe siècle. La tour ronde à l'arrière abrite l'escalier à vis et a conservé son chemin de ronde sur consoles. Le parapet en pierre de taille est sommé d'une poivrière en ardoise. L'intérieur du logis a été très remanié par ses habitants successifs. Au nord du logis, une grosse tour ronde est accolée aux dépendances. Son rez-de-chaussée est couvert d'une voûte plate en moellons. Chaque angle du domaine était défendu par des tours rondes encore visibles au XIXe siècle. Malgré ses réfections du XIXe siècle, le logis a conservé son aspect de petite seigneurie rurale de la fin du XVIe, début XVIIe siècle.","habitants":"Famille de  Bertrand Laurens,\r\n        \"","divers":"A Saint-Maxire ; Oriou 46° 23' 22\" nord, 0° 27' 59\" ouest","gps":"","images":["../image/image_79/79_Oriou_1.jpg","../image/image_79/79_Oriou_2.jpg","../image/image_79/79_Oriou_3.jpg"]},"Consult_chateau_formulaireab82":{"id":"Consult_chateau_formulaireab82","dept":"79","canton":"Melle","commune":"Saint-Génard","nom":"Ouches","type":"Palace","periode":"XIV-XV","histoire":"OUCHES, à l'époque d'Henri II, les créneaux des tours ont été rasés pour faire place à des charpentes neuves. L'aile gauche et la porte centrale remontent à cette époque, mais elles ont été remaniées en 1707 par l'architecte Pierre Le Duc, dit le Toscane. L'enceinte renferme les dépendances construites en 1709-1710 par l'architecte Guy Ogeron, dit \"La Bonté \".  Le château des Ouches, acquis en 1676 par Louis Frotier, appartient toujours à un descendant de celui-ci:  Aujourd'hui à Pierre-Edouard de la Coste-Messelière depuis 1980.","architecture":"OUCHES, ancien manoir féodal transformé, se composant d'un corps principal et de deux ailes. Sa construction primitive remonte à l'époque romane. Le château est flanqué de quatre tours qui remontent au XIVe ou XVe siècle, mais ont été remaniées en 1707.  A cette époque, les doubles meneaux ont été retirés aux fenêtres et des toitures à la Mansard ont été établies. Avant la restauration de 1850, l'aile droite était plus rapprochée du centre de la cour d'honneur et comprenait un donjon carré muni d'une voûte pour le passage des voitures. Ce donjon a été supprimé en 1850 et l'aile droite est devenue à peu près semblable à l'aile gauche. A droite et en dehors du château se trouve une grosse tour, peut-être ancien ouvrage défensif, utilisée comme fuie depuis le XVIIe siècle. L'intérieur est percé de 1735 oculis à pigeons. Avant les douves sèches qui entourent le château, se trouvait une enceinte composée de murailles et de fossés, cantonnée d'une tour à chaque angle. Celle de l'angle nord subsiste et les murailles sont restées intactes du côté qui domine la vallée. Logis en partie voûté au rez-de-chaussée, couvert d'un toit à longs pans brisés en ardoise ; tours d'angle et tour du mur d'enceinte à toit conique couvert d'ardoise ; pigeonnier à toit conique couvert de tuile plate ; communs à toit à longs pans couvert d'ardoise ; petites dépendances couvertes de tuile creuse ; chapelle à toit polygonal en pierre.","habitants":"Famille de Louis Frotier\r\n        \"","divers":"a  Saint-Génard ;     Ouches  46° 11' 51\" nord, 0° 09' 27\" ouest","gps":"","images":["../image/image_79/79_Ouches_1.jpg","../image/image_79/79_Ouches_2.jpg","../image/image_79/79_Ouches_3.jpg","../image/image_79/79_Ouches_4.jpg","../image/image_79/79_Ouches_5.jpg"]},"Consult_chateau_formulaire99a4":{"id":"Consult_chateau_formulaire99a4","dept":"79","canton":"Mignon-et-Boutonne","commune":"Breuil sur Chizé","nom":"Parsay","type":"Château","periode":"XVIII","histoire":"PARSAY;  la seigneurie de Parsais eut comme premier propriétaire connu au XVe siècle Pierre de Viron, écuyer, seigneur de Parsais et du Marais. La terre de Parsais passa aux XVIe et XVIIe siècles aux Curzay. Au cours du XVIIIe siècle, Parsais devint propriété des Marsault de la Cailletière puis des Parsay, dont deux des membres furent maîtres des eaux et forêts à Chizé. Au XXe siècle, Parsay était encore aux mains de cette famille représentée par madame de Valence de Minardière.","architecture":"PARSAY, de plan rectangulaire sur soubassement, flanqué de deux pavillons carrés  aux extrémités, l'ensemble à deux niveaux la partie centrale à sept travées toit en croupe avec fronton triangulaire sur les façades avec occulus centrale et deux ailes en retour forme avec les dépendances sur parc ,  le château de Parsay abrite aujourd'hui une maison de repos et de convalescence. Cette demeure dont la date de construction remonte vraisemblablement au XVIIIe siècle, est situé au cur d'un très beau parc d'agrément.","habitants":"Marsault de la Cailletière \r\n        \"","divers":"Château de Parsay à Breuil sur Chizé","gps":"","images":["../image/image_79/79_Parsay_1.jpg","../image/image_79/79_Parsay_2.jpg","../image/image_79/79_Parsay_3.jpg","../image/image_79/79_Parsay_4.jpg"]},"Consult_chateau_formulaired39a":{"id":"Consult_chateau_formulaired39a","dept":"79","canton":"Parthenay","commune":"Parthenay","nom":"Parthenay","type":"château-vestiges","periode":"XIII-XV","histoire":"PARTHENAY, la première occupation de lactuel site du château de Parthenay ne remonte pas au-delà du XIe siècle avec Josselin comme premier seigneur. En 1202 Philippe Auguste confisque les domaines français à Jean sans Terre et en 1427 passe à Arthur de Bretagne connetable comte  de Richemont  fut seigneur  de Parthenay  et en 1458 la seigneurie passe aux Orléans, famille de Dunois-Longueville et au XVIIe siècle le château est complètement délaissé.","architecture":"PARTHENAY. la citée se caractérise par la présence de deux fosses silos profondes denviron 1,20 mètres, creusées dans le rocher. La construction du château date du début du XIIIe siècle, avec des tours relativement petites, composées chacune dune salle  munie de trois archères. Elle concerne également un mur comportant des trous de barre qui a ensuite été englobé dans la porte dentrée. Un peu plus tard, vers le milieu du XIVe siècle, lédification concerne lensemble du site et les deux petites tours primitives ont été englobées par des constructions plus grandes,    lenceinte du château presque triangulaire, est alors flanquée de neuf tours, dont deux constituent le massif de la porte dentrée, située au sud-est. Le site du château connaît plusieurs modifications vers le milieu du XVe siècle, avec la construction de la Bastille de Rochemont  et de deux boulevards dartillerie: lun sur le front sud et lautre, sur le front Est. Le système de franchissement au sud, jusqualors en bois, est remplacé par des piliers maçonnés qui devaient soutenir un pont volant. A la fin du XVe siècle, lun des piliers subit des transformations et cest certainement à ce moment que sont réalisées les structures du pont dormant, composées de trois murs formant un \"U\" rattaché à la contrescarpe et supportant le pont-levis. Un autre accès au château sur le front Est, datable du XVe siècle a été mis au jour lors de fouilles en 1995. Il comportait deux piles maçonnées, constituant le pont dormant, qui recevait le pont-levis.","habitants":"Famille de Dunois-Longueville\r\n        \"","divers":"Parthenay ; 46° 39' 08\" Nord et 0° 15' 07\" Ouest","gps":"","images":["../image/image_79/79_Parthenay_1.jpg","../image/image_79/79_Parthenay_2.jpg","../image/image_79/79_Parthenay_3.jpg","../image/image_79/79_Parthenay_4.jpg","../image/image_79/79_Parthenay_5.jpg","../image/image_79/79_Parthenay_6.jpg","../image/image_79/79_Parthenay_7.jpg","../image/image_79/79_Parthenay_8.jpg","../image/image_79/79_Parthenay_9.jpg"]},"Consult_chateau_formulaireb66b":{"id":"Consult_chateau_formulaireb66b","dept":"79","canton":"Parthenay","commune":"Parthenay","nom":"Parthenay_Chateau","type":"Château","periode":"XVI-XIX","histoire":"CLAIRIERE à ADILLY, à deux kilomètres au nord ouest Transformé en chambres d'hôtes.                                                                                                      BERTRANDIERE, chambres d'hôtes de monsieur Laurent Giraud.                                                                                                        PLAN, un parc et une prairie de plus de sept hectares, dominant d'un côté la vallée du Thouet, entourent, au nord-ouest de la ville de Parthenay   appartenait à Rohin du Breuil. Acquis plus tard par M. Giraud, un riche coiffeur parisien de la rue des Capucines, le château connut deux autres propriétaires avant d'être acheté en 1985 par la municipalité de Parthenay,  propriété de la commune, abrite une maison de repos.                                                                                                          POMPARAIN, construit par Auguste Bardet, maire de la commune de 1872 à 1887 et gendre de Louis Joseph Blot, colonel du 4ème hussard sous le premier Empire. Avec son frère Jean François député des Deux-Sèvres, Auguste fonda à Pompairain une importante filature qui, après avoir occupé de nombreux ouvriers, ferma ses portes en 1884. A proximité du château, restauré avec soin par ses derniers propriétaires, a été édifiée une accueillante maison de repos dont les hôtes apprécient le confort et le calme.","architecture":"CLAIRIERE  Au XVIe siècle, un des logis possédait deux tourelles aux angles et un escalier frontal.On peut imaginer que des fortifications supplémentaires étaient présentes, car le fief possédait droit de fortification et de colombier. Le pigeonnier existe toujours, une de ses pierres porte la date 1671 ou 1691.                                                                                              BERTRANDIERE   de plan rectangulaire a deux niveaux, trois pour les deux pavillons avec lucarnes sur combles, la partie centrale de trois través toit en croupe.                                                                                         PLAN, l'élégant château des Plants. Rectiligne, une allée de chênes conduit à un pavillon édifié vers le milieu du XIXe siècle. Ses anciens communs ont été affectés à un club hippique. Un pignon en arc de mitre orne la fenêtre supérieure de l'unique tour circulaire du château. Elle s'encastre entre deux bâtiments carrés ornés sous leur toit d'une rangée de mâchicoulis et de fenêtres encadrées dans leur partie supérieure d'une moulure.                                                 POMPARAIN  à Chatillon sur Thouet  accolé à Parthenay, flanquée de deux sveltes tours au toit pointu, la blanche façade du château de Pompairain en contrebas, cette élégante demeure de style Renaissance entourée d'un vaste parc a été construite, dans la seconde moitié du XIXe siècle de plan en U à deux niveaux avec série de Lucarnes sur combles.","habitants":"Bertrandière; Laurent Giraud.                                                              Plan;  Rohin du Breuil.                                                           Pomparain; Auguste Bardet\r\n        \"","divers":"Parthenay;  grav 9 46° 39' 08? nord, 0° 14' 58? ouest  Ardilly grav 1-2                         Bertrandière grav 3-4                               Plan grav 5-6                          Pomparain grav 7-8","gps":"","images":["../image/image_79/79_Parthenay_Chateau_1.jpg","../image/image_79/79_Parthenay_Chateau_2.jpg","../image/image_79/79_Parthenay_Chateau_3.jpg","../image/image_79/79_Parthenay_Chateau_4.jpg","../image/image_79/79_Parthenay_Chateau_5.jpg","../image/image_79/79_Parthenay_Chateau_6.jpg","../image/image_79/79_Parthenay_Chateau_7.jpg","../image/image_79/79_Parthenay_Chateau_8.jpg","../image/image_79/79_Parthenay_Chateau_9.jpg"]},"Consult_chateau_formulaire4490":{"id":"Consult_chateau_formulaire4490","dept":"79","canton":"La Gâtine","commune":"Peyratte","nom":"Payré","type":"Château","periode":"XV-XVI","histoire":"PAYRE, depuis le premier connu de ses seigneurs, Jean, également seigneur de Soulièvres et de la Coudrelle d'Aubigny, les Guichard ont, pendant plus de quatre siècles possédé Payré, fief de la baronnie de Parthenay. Certains d'entre eux combattirent aux côtés des Parthenay. Marie Friez, une antiquaire parisienne, en a fait lacquisition en janvier 1997.","architecture":"PAYRE, la première forteresse, antérieure à la naissance du bourg voisin de la Peyratte, a été remplacée au XVe siècle par un château, aux deux corps de bâtiments en équerre percés de hautes fenêtres jadis à meneaux. La façade sur la cour possède une belle porte de style pré-Renaissance et deux grosses tours flanquent l'arrière de la vieille demeure au toit coiffé de tuiles rouges. Payré a conservé dans quelques-unes de ses pièces aux poutres apparentes, de belles cheminées et des escaliers en pierre. Sur la gauche, les murs de la chapelle attenante ont conservé des traces de fresques évoquant autrefois la Cène et le martyre de St Sébastien. A sa charpente ancienne, s'ajoutent une baie, dont les meneaux flamboyants ont été murés et une arcade en arc elliptique et colonnes à piédroits.  le château est inclus dans un espace polygonal délimité par des bâtiments de ferme. Il date de la fin de la période médiévale du XVe-XVIe siècle et présente un caractère fortifié. La façade sur cour est percée d'une porte centrale surmontée d'un fronton mouluré. La chapelle est accolée au corps de logis. Il s'agit d'un édifice rectangulaire sous charpente moulurée du XIVe siècle. Les restes du portail et de la baie orientale se distinguent dans la maçonnerie.","habitants":"Famille ;Coudrelle d'Aubigny les Guichard \r\n        \"","divers":"Château de Payré ; 46° 40' 59\" nord, 0° 09' 29\" ouest","gps":"","images":["../image/image_79/79_Payr%c3%a9_1.jpg","../image/image_79/79_Payr%c3%a9_2.jpg"]},"Consult_chateau_formulaire5b4a":{"id":"Consult_chateau_formulaire5b4a","dept":"79","canton":"Autize-Égray","commune":"Champdeniers St-Denis","nom":"Pont_Jarno","type":"Château","periode":"XVII","histoire":"PONT-JARNO, cette seigneurie a appartenu fort longtemps aux Pont -Jarno, famille poitevine de très ancienne noblesse. Le domaine resta entre leurs mains sans interruption jusqu'à la Révolution. Le propriétaire en était alors Marc-Joseph Jamo, électeur de la noblesse du Poitou en 1789. qui émigra. Pont-Jarno fut alors confisqué et vendu comme bien national. Il fut acquis par les Gauffreteau, famille de meuniers. Quelques années plus tard, Marc-Augustin Jarno, fils du précédent, racheta la propriété familiale. Il léga la propriété à Jacques-Alexandre de Liniers, dont il était le grand-père maternel. Ce dernier était aussi le petit-fils du célèbre vice-roi de Buenos Aires et lui-même comte de Buenos Aires. aujourd'hui transformé en  chambres d'hôtes.","architecture":"PONT-JARNO, le château actuel est l'uvre de Jacques Alexandre de Liniers qui lui a fait subir d'importantes transformations. Il s'agit d'un long bâtiment sur soubassement à trois niveaux et lucarnes sur combles  accosté à chaque angle de deux pavillons rectangulaires. La tour centrale s'ouvre sur un escalier à deux volées semi-circulaires convergentes. Les lucarnes à fronton lui confèrent une certaine fantaisie.","habitants":"famille  Pont Jarno  Marc Joseph Jamo\r\n        \"","divers":"A Champdeniers St-Denis le château de Pont Jarno","gps":"","images":["../image/image_79/79_Pont_Jarno_1.jpg","../image/image_79/79_Pont_Jarno_2.jpg","../image/image_79/79_Pont_Jarno_3.jpg","../image/image_79/79_Pont_Jarno_4.jpg","../image/image_79/79_Pont_Jarno_5.jpg"]},"Consult_chateau_formulaireb103":{"id":"Consult_chateau_formulaireb103","dept":"79","canton":"Thouars","commune":"Mausés-Thouarsais","nom":"Pressoir","type":"Château","periode":"XIII-XV","histoire":"PRESSOIR ; la seigneurie du Pressoir est mentionnée dès 1363 sous le nom de Pressou Bachelier. Ce fief relevait du duché de Thouars à hommage lige. En 1616, Philippe de Lomeau en était seigneur. Plus tard, la terre était entre les mains des Chambes. En 1660, Gabriel de Chambes céda la seigneurie à Annibal de la Trémoille, comte de Marsilly. Puis elle appartint aux Marillet à partir de 1670, aux Fouchier au début du XVIIIe siècle. Au début du XIXe siècle, le château était propriété de M. Girault dont l'une des filles épousa M. Moquin, ancien lieutenant sous le 1er Empire, et lui apporta le domaine du Pressoir. Ayant épousé la fille de ces derniers, M. Lecomte vendit la propriété en 1888 à Clément Pichault.","architecture":"PRESSOIR, domine une vallée encaissée au fond de laquelle coule un ruisseau le Coulonges. Construit au XIIIe siècle, il aurait été transformé au XVIe siècle. Du château subsistent une cour intérieure entourée de bâtiments : un corps de logis servant de ferme et des ruines de murs à l'Est du logis. En retour à l'Est, au-dessus d'un souterrain taillé dans le rocher, se trouvent des bâtiments comportant des parties très anciennes. Au sud se trouvent des ruines d'enceinte avec tours et archères. A l'ouest, une terrasse donnant sur la vallée comportait des défenses, en particulier une tour carrée servant de pigeonnier, semblant remonter aux XIIe et XIIIe siècles.","habitants":"Famille de Philippe de Lomeau\r\n        \"","divers":"A  Mausés-Thouarsais, le Pressoir 46° 58' 05\" nord, 0° 15' 01\" ouest","gps":"","images":["../image/image_79/79_Pressoir_1.jpg","../image/image_79/79_Pressoir_2.jpg"]},"Consult_chateau_formulaire968e":{"id":"Consult_chateau_formulaire968e","dept":"79","canton":"Cerizay","commune":"Pugny","nom":"Pugny","type":"Maison forte","periode":"XII-XV","histoire":"PUGNY, cest en effet à Guillaume dAppelvoisin, personnage en vue à la cour de Louis XI, écuyer du roi, que lon doit cette fortification. En 1474, il obtint de Louis XI dinstituer à Pugny une foire le jour de la Saint-Pierre, patron de la paroisse. Le grand remaniement du château à lieu vers 1550 par Guy de Sainte-Maure. Durant la Révolution le château fut confisqué au marquis de Mauroy et vendu avec les terres comme bien national. Au XIXe et XXe siècles le château fut transformé en exploitation agricole.les Grenier ayant été les premiers propriétaires avant de céder aux de Coloigne. Au fil du temps, les propriétaires se succédèrent. En 1731, les Crussol dUzès revendirent le château   à François-Denis de Mauroy, gouverneur des villes et châteaux de Tarascon.   Plus tragiques furent les événements de la guerre de Vendée comme le rappelle Rémy Billaud. « Mme de La Rochejaquelein écrit dans ses mémoires : Les gardes nationaux emportèrent comme trophées, au bout de leurs baïonnettes, des nez, des oreilles et des lambeaux de chair humaine.","architecture":"PUGNY,  les plus anciennes mentions de lexistence du château remontent aux Xe et XIe siècles. C'est à la fin du XVe siècle que le château de Pugny deviendra une forteresse par autorisation royale, c'était un grand corps de bâtiment, flanqué de deux gros pavillons carrés et composé de grands appartements à trois étages dont les offices et cuisines sont dans les souterrains, un escalier de pierres de taille à deux rampes et en fer à cheval et une basse-cour environnée de bâtiments avec quatre tours rondes aux angles.  Les Gardes nationaux de Pouzauges, de La Châtaigneraie et de Fontenay, qui allaient au secours de Bressuire, sarrêtèrent à Pugny. Ils se mirent à piller et à saccager le château et pour finir lincendièrent. Ainsi, disparut, victime à la fois des flammes et des folles passions des hommes, cette antique et belle demeure que dillustres familles avaient édifiée et embellie. Après le départ des incendiaires, la population terrifiée vient sans doute contempler longuement les ruines fumantes de ce qui avait été le siège dune puissance seigneurie qui semblait défier les siècles.","habitants":"Guillaume dAppelvoisin\r\n        \"","divers":"Pugny ; 46° 43' 41\" nord, 0° 31' 22\" ouest","gps":"","images":["../image/image_79/79_Pugny_1.jpg","../image/image_79/79_Pugny_2.jpg","../image/image_79/79_Pugny_3.jpg"]},"Consult_chateau_formulaire2482":{"id":"Consult_chateau_formulaire2482","dept":"79","canton":"Autize-Égray","commune":"Xaintray","nom":"Puychenin","type":"Maison forte","periode":"XII-XVII","histoire":"PUY-CHENIN,  date du XIIe siècle avec Geofrroy de Granges de Surgères, fils du sénéchal du Poitou pour Richard Cur de Lion et gendre du seigneur de Rancon qui a participé à la deuxième croisade avec Louis VII et Aliénor d'Aquitaine. La seigneurie relevait de la baronnie de Parthenay et était un arrière-fief de Châteauneuf-en-Gâtine. Le Logis a été remanié au XVIIe siècle pour Moïse Pyniot, protestant avéré.  L'influence protestante d'une extrême sobriété dans l'architecture, peut amener à supposer que Moïse Pyniot ait choisi de suivre les conseils d'Olivier de Serre pour l'agriculture et Mesnage des Champs pour les jardins. Jusqu'en 1970, arbres fruitiers, vignes, ifs, légumes, buis et fleurs continuaient de prospérer dans cette parcelle, puis laissée à l'abandon jusqu'en 2000, les nouveaux propriétaires y ont maintenant tracé les formes du nouveau potager en cours de réalisation. Ce tracé est inspiré en partie du jardin des Champs-Faez de Claude de Taillemont.","architecture":"PUY-CHENIN,  le château forme un quadrilatère entouré de douves,  le blason des Pyniot est situé au dessus d'une porte des communs. Les ouvertures de style Louis XIII surplombent une parcelle d'un ha. Il subsiste des tronçons d'une haie de buis, un ha au bout du jardin et des haies d'aubépines. Le corps de logis adopte un plan rectangulaire à deux niveaux. Il est encadré de chaque côté de dépendances qui forment la cour d'honneur. La façade nord s'ouvre par une porte à fronton grec soutenu par deux pilastres. La façade sud-est cantonnée de deux pavillons carrés, chacun doté d'une lucarne surmontée d'un fronton à acrotères. Les communs forment un U au nord du logis. Ils abritent un four à pain et diverses granges.","habitants":"Famille de Moïse Pyniot\r\n        \"","divers":"Puychenin ; 46° 30' 15\" nord, 0° 28' 56\" ouest","gps":"","images":["../image/image_79/79_Puychenin_1.jpg","../image/image_79/79_Puychenin_2.jpg"]},"Consult_chateau_formulaire46c0":{"id":"Consult_chateau_formulaire46c0","dept":"79","canton":"Saint-Maixent-l","commune":"Souvigné","nom":"Reigné","type":"Château","periode":"XV-XVI","histoire":"REGNE,  est lié depuis le XVe siècle à la famille Vasselot. L'édifice d'origine médiévale est remanié au XVIe siècle par le percement de quelques ouvertures. Pierre II de Vasselot, décédé en 1717, et son épouse Jacquette Pouvreau de Logerie font édifier deux pavillons quadrangulaires accolés au corps de logis. Après un incendie des toitures en 1793, des travaux de restauration générale sont réalisés en 1905 .","architecture":"REIGNE, la construction du château de Reigné date du Moyen -Age. Les éléments protégés sont les façades et toitures,  après un incendie des toitures en 1793, des travaux de restauration générale sont réalisés en 1905 par l'architecte Lafargue, qui crée une double galerie permettant la liaison entre le corps de logis et les pavillons, et des galerie basses en retour d'équerre attenantes aux pavillons. L'intérieur est alors totalement aménagé ne conservant que quelques cheminées anciennes dans les salons et la cuisine. Le château est entouré de trois ailes de communs au sud en U, d'un puits  rond avec sa ferronnerie, et d'un pigeonnier,  la fuie, inscrits aux M.H. depuis le 17.12.1990.","habitants":"Famille de Pierre II de Vasselot\r\n        \"","divers":"Château de Reigné à Souvigné : 46° 22' 27\" Nord, 0° 11' 10\" Ouest","gps":"","images":["../image/image_79/79_Reign%c3%a9_1.jpg","../image/image_79/79_Reign%c3%a9_2.jpg","../image/image_79/79_Reign%c3%a9_3.jpg","../image/image_79/79_Reign%c3%a9_4.jpg"]},"Consult_chateau_formulaire2ad4":{"id":"Consult_chateau_formulaire2ad4","dept":"79","canton":"","commune":"Marne","nom":"Retournay","type":"Manoir","periode":"XVI","histoire":"RETOURNAY, le château relevait à foi et hommage lige de la baronnie de Moncontour. Abandonné, Retournay a été très bien restauré par M. et Mme Foucteau dès qu'ils en sont devenus propriétaires. Voici la description qui en est faite d'un article d'une adjudication du 15 avril 1789: cette seigneurie dépend avec la métairie de Piaudry, de la seigneurie de Marsay.","architecture":"RETOURNAY, petit château dont le style Renaissance n'a pas été touché,   C'est une élégante construction du XVIe siècle flanquée de tourelles à deux de ses angles. Sa haute toiture d'ardoises est percée de jolies lucarnes ornées de blasons dont celui de la famille Acton. Edifice de plan carré, fenêtres à meneaux sur les quatre façades, trois lucarnes ornées de pilastres, tour d'escalier percée de meurtrières, échauguette, bretèche au-dessus de la porte. Dans un commun à proximité, subsiste une porte à pont-levis, offrant une première défense. Un ensemble de bâtiments de servitudes, entouré de communs, encadre le château, la seigneurie  consiste  dans un pavillon couvert en ardoises, composé d'un petit pont en bois à l'entrée, chambre basse à cheminée, antichambre à côté,  escalier en pierre pour monter aux appartements, chambre haute, antichambre à côté, autre chambre dans la tour, chambre au deuxième étage avec cheminée, antichambre à côté, cabinet dans la tour, cave en dessous, caveau sous la tour appelé prison, cave au-dessous des appartements et fossé autour dudit pavillon.","habitants":"famille Acton\r\n        \"","divers":"Château de Retounay à Marne","gps":"","images":["../image/image_79/79_Retournay_1.jpg","../image/image_79/79_Retournay_2.jpg","../image/image_79/79_Retournay_3.jpg","../image/image_79/79_Retournay_4.jpg","../image/image_79/79_Retournay_5.jpg","../image/image_79/79_Retournay_6.jpg"]},"Consult_chateau_formulairefa40":{"id":"Consult_chateau_formulairefa40","dept":"79","canton":"Mignon-et-Boutonne","commune":"Argenton l","nom":"Roche_Argenton","type":"Château","periode":"XIX","histoire":"ROCHE, attribué à Constantin Guys, le château de la Roche est inscrit aux M.H. depuis le 4/12/1995.  Il appartient depuis à une société privée, propriété de la famille Keufer.","architecture":"ROCHE, ensemble XIXe siècle de style néo-Renaissance, construit en tuffeau. Travaux effectués de 1860 à 1862, à l'emplacement d'un édifice plus ancien probablement du XVIIe siècle, de plan en L, en réutilisant une partie de l'aile est-ouest. De l'aile en retour d'équerre, il ne reste que les caves. Un corps de logis rectangulaire, avec une tour hors oeuvre hexagonale, est appuyé de deux pavillons en retrait sur l'élévation sud. Sur l'élévation postérieure, une tourelle hors oeuvre abritant un escalier, s'inscrit dans l'angle formé par le pavillon ouest et le corps principal, tandis qu'une tourelle en encorbellement sur pile rectangulaire marque la limite du pavillon Est. Le décor est emprunté au répertoire Renaissance : fenêtres encadrées de pilastres ornés de disques et de chapiteaux ; tables de pierre entre deux bandeaux moulurés ; lucarnes à fenêtres pendantes dont les pilastres sont sommés d'un entablement et d'un fronton-pignon encadré d'amortissements. Tentures  du XVIIe siècle dans la galerie nord. Les salons du rez-de-chaussée conservent des cheminées et des sanguines sur le thème de la chasse à courre, attribuées à Constantin Guys.","habitants":"Famille Keufer et  Constantin Guys\r\n        \"","divers":"Château de la Roche à Argenton l'eglise; 47° 02' 36\" Nord et 0° 16' 32\" Ouest","gps":"","images":["../image/image_79/79_Roche_Argenton_1.jpg","../image/image_79/79_Roche_Argenton_2.jpg","../image/image_79/79_Roche_Argenton_3.jpg"]},"Consult_chateau_formulaireaf72-2":{"id":"Consult_chateau_formulaireaf72-2","dept":"79","canton":"Celles-sur-Belle","commune":"Méssé","nom":"Roche_Elie","type":"Donjon","periode":"XIV-XVII","histoire":"ROCHE-ELIE, le donjon est antérieur au début du XIVe siècle, la première mention est de 1312. Il ne subsiste qu'une tour pourvue d'archères, transformée au XVIIe siècle en pigeonnier et des éléments défensifs comprenant des douves à l'intérieur d'une enceinte pourvue de trois tours.","architecture":"ROCHE-ELIE, le logis a conservé une date 1557 et une cheminée pouvant dater de la même époque. Les deux portails, au nord (détruit) et au sud-ouest, pourraient dater du XVIIe siècle, et un oculus conservé sur l'élévation sud du logis. Vendu durant la Révolution comme bien national, une grande écurie a été ajoutée aux dépendances dans le premier quart du XIXe siècle. Les façades du logis ont été remaniées vers 1882. Le donjon et le pigeonnier ont été restaurés dans le quatrième quart du XXe siècle. A côté de la tour se trouvait une habitation Renaissance.","habitants":"seigneur local\r\n        \"","divers":"Château de la Roche-Elie à Méssé ;     46° 15' 54\" nord, 0° 05' 44\" est","gps":"","images":["../image/image_79/79_Roche_Elie_1.jpg","../image/image_79/79_Roche_Elie_2.jpg"]},"Consult_chateau_formulairec73f":{"id":"Consult_chateau_formulairec73f","dept":"79","canton":"La Gâtine","commune":"Loumois","nom":"Roche_Faton","type":"Château","periode":"XV-XVI","histoire":"ROCHE-FATON; château de Guy de La Rochefaton, mentionné dès 1179, incendié lors des conflits opposant les Armagnac et les Bourguignons en 1417, on doit à Mathurin Pidoux la reconstruction de l'ancienne forteresse médiévale à partir de 1544. Au XVIIe siècle, Les Vassé sattachent à transformer les abords du château. Ils font dessiner les jardins à la française, construisent les ailes de communs à la place des murs de fortifications et aménagent à lintérieur des salons à la mode du moment. Charles-Marie-Auguste de Beaumont, futur marquis dAutichamp, célèbre général vendéen, généralissime des armées catholiques et royales dAnjou et du Haut-Poitou, repose dans la chapelle Saint-Nicolas.,  Au XVIIe siècle, Les Vassé sattachent à transformer les abords du château. Charles-Marie-Auguste de Beaumont, futur marquis dAutichamp, généralissime des armées catholiques et royales dAnjou et du Haut-Poitou, repose dans la chapelle Saint-Nicolas.","architecture":"ROCHE-FATON, le château comprend trois corps de bâtiments qui s'ordonnent autour d'une cour : le châtelet d'entrée flanqué de deux tours du XVe siècle attenant au corps de logis à deux ailes en équerre des XVe et XVIe siècles, deux ailes de communs du XVIIe siècle établis à l'emplacement des courtines dont deux tours sont conservées. Au XVIIe siècle, les Vassé sattachent à transformer les abords du château. Ils font dessiner les jardins à la française, construisent les ailes de communs à la place des fortifications. Des douves, il ne reste qu'une pièce d'eau. A la fin du XVIIIe, une terrasse est créée face au logis et une chapelle du XIXe siècle jouxte les communs.","habitants":"Mathurin Pidoux\r\n        \"","divers":"Château de la Roche-Faton à Loumois ; 46° 42' 57\" Est et 0° 08' 01\" Ouest","gps":"","images":["../image/image_79/79_Roche_Faton_1.jpg","../image/image_79/79_Roche_Faton_2.jpg","../image/image_79/79_Roche_Faton_3.jpg","../image/image_79/79_Roche_Faton_4.jpg","../image/image_79/79_Roche_Faton_5.jpg","../image/image_79/79_Roche_Faton_6.jpg"]},"Consult_chateau_formulaireb68e-2":{"id":"Consult_chateau_formulaireb68e-2","dept":"79","canton":"","commune":"Voultejon","nom":"Rochejaquelin","type":"Château","periode":"XV","histoire":"ROCHEJAQUELIN, le château de la Rochejaquelein, au charme rustique, évoque un peu par son style certains manoirs bretons. D'abord possédé par les Brun, la Rochejaquelein appartint par la suite à la famille Le Mastin qui détint le domaine depuis le début du XIVe siècle jusqu'en 1521. A cette date, Renée Le Mastin l'apporta en dot à Guy du Vergier, qui transmit la terre de la Rochejaquelein à son fils François, conseiller de Jeanne d'Albret. Celle-ci est l'uvre de Louis de la Rochejaquelein qui la fit bâtir en 1576.","architecture":"ROCHEJAQUELIN, on accède à ce domaine par un porche monumental doté de portes charretière et piétonne. Il porte les armes des du Vergier et la date 1566. Le château est clos de murs, comprant le pavillon d'entrée, le logis et l'ancienne grange seigneuriale. Le pavillon d'entrée, élevé en granit du pays, date au XVe siècle. De style gothique, il est cantonné d'une tourelle à quatre pans contenant l'escalier à vis. Sur la façade opposée, il est agrémenté d'une petite tour circulaire, on doit la construction du logis Renaissance à François de la Rochejaquelein. Le domaine conserve une belle fuie carrée.","habitants":"Famille de Guy du Vergier\r\n        \"","divers":"Château de Rochejaquelin à Voultejon","gps":"","images":["../image/image_79/79_Rochejaquelin_1.jpg","../image/image_79/79_Rochejaquelin_2.jpg","../image/image_79/79_Rochejaquelin_3.jpg","../image/image_79/79_Rochejaquelin_4.jpg"]},"Consult_chateau_formulaire2fa9":{"id":"Consult_chateau_formulaire2fa9","dept":"79","canton":"Saint-Maixent-l","commune":"Saivres","nom":"Saivres","type":"Château","periode":"XV","histoire":"SAIVRES, château de l'Herbaudière (voir article de la Roche Naide, de Saugé et  de Russay.\r\nBEAUREGARD, au début du XVe siècle, le fief de Beauregard appartenait à une famille Lambert. Gillaume Lambert était seigneur de Beauregard en 1451. Cette famille en demeura propriétaire jusqu'au XVIe siècle. Vers 1570, Antoine Baudet, qui avait épousé Renée Lambert, vendit la seigneurie à Charles Marchand, maire de Saint-Maxent en 1582. Vers 1595, il fit démolir la vieille demeure et construire sur son emplacement une gentilhommière, mais les travaux traînèrent et une partie du logis ne fut pas élevée notamment un pavillon et sa tour. Charles Marchand décéda en 1614. Alors Beauregard passa par voie de succession aux Signy. En 1680 le domaine devint propriété de Henri Birot d'Ariomant. Sa petite-fille épousa M. de Boisgrellier, qui décéda en 1745, sans héritier. Son neveu Léon Charles de la Liborlière devint à son tour propriétaire de Beauregard. Pendant la Révolution Beauregard fut confisqué et vendu comme bien national, il fut acquis en 1794 par Louis Paul Tirant, huissier de Saint Maixent.                                            \r\nROCHE-NAIDE, cétait une petite seigneurie relevant de la seigneurie de Faye de Nanteuil. Vers 1430, la famille de Nesde ou de Naide entra en possession du fief, lui donna son nom et conserva la propriété jusqu'en 1680. En 1697, des assemblées importantes de réformés eurent lieu au château de la Roche-Naide. L'édifice fut ensuite possédé par la famille Daguin jusqu'en 1840.\r\n SAUGE pas d'information historique,  sinon chambres d'hôtes.","architecture":"BEAUREGARD, ses enfants vendirent la propriété en 1847 à Pierre Lambert, agriculteur. Vers 1862, il détruisit la haute toiture qui recouvrait le logis pour la remplacer par un toit presque plat, et il abattit le sommet de la tour. La lente dégradation de Beauregard continua : la fuie fut démolie, de nouveaux bâtiments ajoutés aux anciens. Sauvé de la décrépitude, grâce à ses actuels propriétaires, le château de Beauregard a aujourd'hui retrouvé son aspect d'antan.                RUSSAY, le château et la métairie appartenaient en premier, au Noble de Russay, au XVIIe siècle, les Palustre et Fradin, puis au XVIIe, par les Marchant. Ensuite,il a apaprtenu aux familles Thébault, Suzeau et Proust. Suite au décès de Jacquette Marchant, appartient depuis aux descendants de Mr Papet. Le logis a été construit au 1840, pour le Dr Dumoustier, remplaçant l'ancienne maison noble qui avait appartenu aux Palustres, Texier et Denyort, ainsi que la métairie. En 1841, le logis et la métairie passent aux mains de la Famille Proust, puis Bourreau, puis Delylle avant d'appartenir aux Libner. L'ancienne métairie, qui se situe à l'Ouest du logis de Russay, a apparenu aux Bidault, de Neuport, Guichard, Tutaut, et Chevalier. Puis elle ira dans les mains de Etienne Gaudéchoux, de Saint-Maxent, le 5 Thermidor de l'An II.                                                                             Le ROCHE-NAIDE  a été remanié à la fin du XIXe siècle pour Achille Palustre. De l'ancien château qui devait avoir une forme carrée, il ne subsiste que quatre tours rondes au toit conique.","habitants":"Beauregard Famille de Charles Marchand Russay, familles Thébault                                                                                      Roche Naide  famille de  Daguin.\r\n        \"","divers":"Château de Beauregard à Saivres de 1 à 5 de Russay Grav 6,    de Saugé  grav 7-8.  la Roche Nesde grav 9","gps":"","images":["../image/image_79/79_Saivres_1.jpg","../image/image_79/79_Saivres_2.jpg","../image/image_79/79_Saivres_3.jpg","../image/image_79/79_Saivres_4.jpg","../image/image_79/79_Saivres_5.jpg","../image/image_79/79_Saivres_6.jpg","../image/image_79/79_Saivres_7.jpg","../image/image_79/79_Saivres_8.jpg","../image/image_79/79_Saivres_9.jpg"]},"Consult_chateau_formulaire8787":{"id":"Consult_chateau_formulaire8787","dept":"79","canton":"La Gâtine","commune":"St-Pardoux-Soutiers","nom":"Salinière","type":"Château","periode":"XIX","histoire":"SALINIERE,  le château est aux mains de la famille de la Salinière, depuis le début du XVIIIe siècle. En effet, le 23 janvier 1714, Marguerite Augron de la Salinière, unique héritière, épousait Jean Poignant de la Resnière. Par la suite, ils reprirent le nom de La Salinière. Le château actuel construit vers 1850, est l'uvre de Joseph Benjamin Poignant de la Salinière.","architecture":"SALINIERE, il occupe l'emplacement d'un bâtiment antérieur et beaucoup d'éléments ont été réutilisés, telles les boiseries et les portes intérieures du XVIIIe siècle. L'entrée du château se fait par une imposante grille surmontée d'armoiries supportées par deux lions. La demeure est précédée par les dépendances, symétriques et d'inspiration italienne, avec alternance régulière de bâtiments hauts et bas qui s'étendent parallèlement de chaque côté de la cour d'honneur. Le château adopte un plan rectangulaire. Sa façade principale est cantonnée de deux pavillons en saillie. A l'arrière, une tourelle cylindrique chevauche le bâtiment. La demeure est située au milieu d'un beau parc qui s'étend sur plus de 50 hectares.","habitants":"Famille de la Salinière\r\n        \"","divers":"Château de Salinière à st-Pardoux","gps":"","images":["../image/image_79/79_Salini%c3%a8re_1.jpg","../image/image_79/79_Salini%c3%a8re_2.jpg","../image/image_79/79_Salini%c3%a8re_3.jpg","../image/image_79/79_Salini%c3%a8re_4.jpg"]},"Consult_chateau_formulaireb385":{"id":"Consult_chateau_formulaireb385","dept":"79","canton":"Celles-sur-Belle","commune":"Salles en Toulon","nom":"Salles_Toulon","type":"Château","periode":"XV-XVIII","histoire":"SALLES,  la famille Gillier se fond avec la famille de Sainte-Maure-Montausier. Léon de Sainte-Maure, né du premier mariage de Louise Gillier, épouse en 1606 Marguerite de Chateaubriand. En 1610, naît leur fils Charles . En son jeune âge il prit le titre de duc de Montausier et épousa Julie d'Angennes, fille de la marquise de Rambouillet. On dit que Louis XIV vint deux fois à Salles, en 1675 et 1680, dates de plantation de chacun des deux platanes. Marie-Julie de Sainte Maure hérite de la terre de Salles et du château de Pugny. Elle était donc duchesse d'Uzès et de Montausier, marquise de Rambouillet et de Pisani, dame de Salles, Pugny, Talmond et autres lieux. L'un de ses fils, François de Crussol, chevalier, comte de Montausier, épouse en 1705 Charlotte Pasquier de Franclieu.  Son autre fils, Louis Charles de Crussol, marquis de Montausier, épouse en 1737 Marie-Elisabeth d'Aubusson de La Feuillade. Louis Charles est le créateur de la partie XVIIIe siècle du château, le 10 juillet 1750, il accueille à Salles le roi Louis XV qui y aurait couché. Le fils d'Anne-Marie André de Crussol meurt sans postérité, et le château passe à Antoinette-Catherine Emmanuel de Crussol, mariée à Alexandre Green de Saint-Marsault. Sa fille après avoir épousé Charles Léon, comte de Lescours, vend Salles en 1873 à Mme Dulas.","architecture":"SALLES;  Le fief et la seigneurie remontent au début du Moyen-Âge. On reconnaît un chevalier de Maintrolles qui était, au XIIe siècle, seigneur de Salles. Son successeur semble être le vicomte Aymeri Bar qui était à Salles au moment de la Guerre de Cent Ans. En 1489, Salles appartenait aux Gillier, gens d'armes anoblis en 1379, ce sont eux à qui l'on doit les bases du château, cette famille fut d'influence considérable pour la contrée et était propriétaire du château de La Villedieu. Ses armoiries se trouvent sur la porte gothique du château.  Le château était resté quatre siècles dans la même famille et le plus souvent transmis par les femmes. Deux propriétaires se sont succédé sans l'entretenir. La réparation de la toiture était indispensable afin de stopper les dégâts causés par la tempête de 1972. La remise en état fut réalisée, mais en octobre 1974 la partie du XVe siècle brûlait. En dix mois tout fut réparé avec le concours des artisans locaux.","habitants":"Louis-Charles de Crussol,\r\n        \"","divers":"Château de Salles à salles -Toulon;  46° 23' 10\" nord, 0° 05' 44\" ouest","gps":"","images":["../image/image_79/79_Salles_Toulon_1.jpg","../image/image_79/79_Salles_Toulon_2.jpg","../image/image_79/79_Salles_Toulon_3.jpg","../image/image_79/79_Salles_Toulon_4.jpg"]},"Consult_chateau_formulaire7910-2":{"id":"Consult_chateau_formulaire7910-2","dept":"79","canton":"Mauléon","commune":"Argenton les Vallées","nom":"Sanzay","type":"Vestiges","periode":"XIII","histoire":"SANZAY,  l'histoire du château de Sanzay est surtout celle de la famille de Sanzay. Peu de documents témoignent directement de sa construction ou de son usage. Ainsi l'étude archéologique de l'ensemble des vestiges prend une réelle importance et contraint le chercheur à émettre des hypothèses dont la validité ne peut être affirmée que par des travaux de recherches sur le terrain. De ce château du XIIIe siècle les restes des anciennes fortifications, la porte dans le châtelet d'entrée encadré de deux tours ainsi que la chapelle aux baies de style gothique ont été inscrits monument historique le 3 décembre 1930.","architecture":"SANZAY, les vestiges du XIIIe siècle en élévation sont essentiellement le châtelet d'entrée, la tour donjon, et un bâtiment pour les gardes situé au nord-est, avec tour d'artillerie. Gilles Niort, et l'association du château de Sanzay, ont uvré pour faire découvrir ce monument en mauvais état à Marie-Claude Bakkal-Lagarde qui a organisé des travaux de 1998 à 2003 dans le cadre de chantiers de jeunes. Les travaux ont porté sur la restauration de petit bâtiments, de la tour donjon, la fouille des douves a permis de découvrir cinq tours d'enceinte disparues. Plusieurs publications ont été réalisées à la suite du dégagement des douves en vue de leur remise en eau, notamment dans les bulletins de l'association pour le développement de l'archéologie sur Niort et les environs                                                      Le châtelet d'entrée, encadré de deux tours, présente au rez-de-chaussée une porte charretière et une poterne qui après inspection du bâti ont été rouvertes à l'occasion des chantiers d'été. Au-dessus les passages pour mouvoir le pont-levis sont conservés.\r\nLa tour-donjon a été tronquée anciennement, exposée aux intempéries, elle a retrouvé une toiture en 2005. Celle-ci est placée un niveau en dessous de la toiture initiale. L'accès au premier niveau de la tour donjon n'est possible que par la face sud où se trouve une porte. Il n'existe aucune communication entre le premier et le second niveau.","habitants":"famille de Sanzay\r\n        \"","divers":"Château de Sanzay 46° 57' 36\" nord, 0° 26' 27\" ouest","gps":"","images":["../image/image_79/79_Sanzay_1.jpg","../image/image_79/79_Sanzay_2.jpg","../image/image_79/79_Sanzay_3.jpg","../image/image_79/79_Sanzay_4.jpg"]},"Consult_chateau_formulaire4981":{"id":"Consult_chateau_formulaire4981","dept":"79","canton":"9  Mignon-et-Boutonne","commune":"St-Hilaire la Palud","nom":"Sazay","type":"Château","periode":"XV","histoire":"SAZAY,    se situe dans un petit hameau sur la commune de Saint-Hilaire La Palud. L'actuel château a été construit sur le site d'une ancienne forteresse médiévale. Vendue au Roi de France en 1538, elle faisait partie des places fortes royales occupées lors des guerres de religion afin d'isoler les villes protestantes de la Rochelle et Saint-Jean d'Angély. En 1749, elle fut acquise par le duc de Châtillon et arriva, par mariage, dans les mains du duc de Crussol d'Uzès.  Au moment de la Révolution sa veuve émigra, abandonnant le château et les terres, le domaine fut confisqué et mis en vente. En 1798, Charles Durozay, qui demeurait à Paris, s'en porta acquéreur. Il le céda par la suite à François Noël Proust, receveur général de Niort. L'édifice actuel fut élevé au cours des années 1820 dans le style des constructions de l'époque.","architecture":"SAZAY, il s'agit d'un logis de plan rectangulaire, cantonné d'ailes basses en retour d'équerre, terminées par deux pavillons et une clôture basse en fer à cheval. Une ferme a également été construite à l'ouest du logis, de même qu'un pigeonnier. Le style adopté est le néo-classicisme : cinq travées de baies régulières et rectangulaires, un avant-corps central sous fronton triangulaire, une corniche à denticules, bandeau horizontal entre deux niveaux, porte encadrée de pilastres, architrave, garde-corps en ferronnerie. Le côté jardin présente un petit péristyle à deux colonnes supportant un balcon, un chambranle à fasce autour des baies et un larmier sur chacune d'elles. A l'intérieur, les dispositions d'origine subsistent. Les pièces ont conservé leurs cheminées décorées de staff empire, les plafonds en plâtre et quelques boiseries.","habitants":"duc de Crussol d'Uzès\r\n        \"","divers":"a St-Hilaire la Palud ; château de Sazay 46° 57' 36\" nord, 0° 26' 27\" ouest","gps":"","images":["../image/image_79/79_Sazay_1.jpg","../image/image_79/79_Sazay_2.jpg","../image/image_79/79_Sazay_3.jpg","../image/image_79/79_Sazay_4.jpg","../image/image_79/79_Sazay_5.jpg","../image/image_79/79_Sazay_6.jpg","../image/image_79/79_Sazay_7.jpg"]},"Consult_chateau_formulairefd57":{"id":"Consult_chateau_formulairefd57","dept":"79","canton":"Mauléon","commune":"St-Aubin de Baubigné","nom":"St_Aubin_Baubigné","type":"Vestiges-Chateaux","periode":"XV-XIX","histoire":"DURBELIERE, il date du XVe siècle. Durant les guerres de Vendée, et à la Révolution. Depuis 1250, le château a appartenu à la famille de Rorthais. En 1460, Thibault de Rorthais fit rebâtir le château, sur les bases dune ancienne construction féodale du Xe-XIe siècle. C'est de cette époque que datent les meurtrières et les échauguettes, dans les bâtiments qui entourent les ruines. En 1603, la Durbelière passe par alliance dans la famille de Meulles par un mariage avec Renée de Rorthais. Entre 1620 et 1630, le seigneur Pierre de Meulles organisa divers modifications: A la fin du XVIIIe siècle, il se transmis à la famille du Vergier de la Rochejaquelin. Henri de La Rochejaquelin y naquit en 1772, général de l'Armée catholique et r
