 douves sèches qui entourent l'édifice sont l'unique témoignage de l'existence de l'ancienne maison noble des Forges, elle a fait place au XIXe siècle, à un beau château présentant un plan en U à deux niveaux toits en croupes. Le corps de logis principal est doté à chaque extrémité d'une aile en retour fermant la cour d'honneur.","habitants":"Famille de Jean Boucard\r\n        \"","divers":"A les Forges le château des Forges.","gps":"","images":["../image/image_79/79_Forges_1.jpg","../image/image_79/79_Forges_2.jpg","../image/image_79/79_Forges_3.jpg","../image/image_79/79_Forges_4.jpg"]},"Consult_chateau_formulaire85d8":{"id":"Consult_chateau_formulaire85d8","dept":"79","canton":"Autize-Égray","commune":"Villiers la Plaine","nom":"Forterie","type":"Château","periode":"XVII-XVIII","histoire":"FORTERIE,   en 1242, il est rasé sur ordre de Saint-Louis, car son seigneur, Guy de Rochefort est partisan de Hugues de Lusignan, comte de la Marche et allié du Roi dAngleterre. Seules les caves subsistent encore aujourdhui. Les Jourdain, seigneurs dEmbleville, dOriou, des Forges et autres lieux le reconstruit au XVe siècle et le protège de fortifications défendues par la vieille, petite et grande garde. Le comte et maire de Niort, Etienne de Villiers, en est propriétaire au début du XVIe siècle. Le 20 novembre 1566, François Jourdain au service du duc de Montpensier, Jean de Bourbon, échange avec Jean de Laval, baron de Bressuire, la sixième partie de la baronnie de la Mothe Saint-Héray contre la terre et la seigneurie de Villiers en Plaine. A sa mort le fief est attribué à son fils Louis qui en rend hommage à labbé de Saint-Maixent en 1590. Propriété de la commune, hôtel de ville, médiathèque. Durant la Révolution, Charles Jourdain émigre, la demeure est nationalisée, puis rachetée en 1795 par son épouse Renée Charlotte de Conty.  En 1868, il est transmis par mariage avec Marie Jourdain à Emile Gaud de La Forterie. Il est la propriété en 1954 des Pères de Chavagnes en Paillers, congrégation religieuse vendéenne, puis racheté en 1962 par la Ville de Niort qui sen sert comme centre de loisirs.","architecture":"FORTERIE, les envahisseurs normands, devenus les seigneurs de la localité, construisent au milieu du IXe siècle, sur une légère éminence le château primitif composé à lorigine de quatre tours crénelées. Sa châtellenie dépendra à la fois de Saint-Maixent et de Parthenay, lactuel édifice, qui conserve la tour du midi, les douves sèches et lemplacement du pont-levis, est élevé au milieu du XIXe siècle dans lesprit des grands châteaux classiques des XVIIe et XVIIIe siècles: une cour dhonneur encadrée par un corps de logis principal et deux ailes. En 1989, la mairie de Villiers en Plaine est installée dans le monument néo-classique qui est rénové 23 ans plus tard. Magnifique écrin de verdure, le parc du château entouré de murs de pierres, abrite de nombreuses essences d'arbres; toute proche, dans les écuries restaurées du château, la médiathèque Georges L Godeau; juste à côté, dans les anciennes dépendances restaurées, le restaurant scolaire.","habitants":"Famille de  Etienne de Villiers\r\n        \"","divers":"a Villiers la Plaine le château de la Forterie","gps":"","images":["../image/image_79/79_Forterie_1.jpg","../image/image_79/79_Forterie_2.jpg","../image/image_79/79_Forterie_3.jpg","../image/image_79/79_Forterie_4.jpg"]},"Consult_chateau_formulaire0948":{"id":"Consult_chateau_formulaire0948","dept":"79","canton":"Saint-Maixent-l","commune":"François","nom":"Francois","type":"Château","periode":"XIV-XVI","histoire":"Deux châteaux à François celui d'Availles et celui Valdeleigne. AVAILLES, était le siège d'une importante seigneurie citée dès 1390. Il semble que le château appartint d'abord aux Parthenay. Un siècle plus tard, Artus de Parthenay épousa Jeanne de Gourjault ils eurent plusieurs enfants dont Jacquette qui épousa François Chevalier, seigneur de La Frapinière. La seigneurie d'Availles resta aux mains des Chevalier jusqu'en 1774, date à laquelle elle fut vendue à Antoine Denis Monnier, qui ajouta son nom à celui d'Availles, la propriété resta dans cette famille jusque dans la deuxième moitié du XIXe siècle. En 1872, il passa par mariage aux Louveau de la Règle puis en 1906, à M. Bizard et ensuite par échange en 1909, à M. Apercé et enfin à M. Chollet, propriétaire actuel.                                                                                    VAUDELEIGNE    Le premier seigneur dont on trouve trace à Vaudeleigne fut Charles Sacher, au milieu du XVIe siècle, docteur régent de la faculté de médecine de Poitiers et médecin du roi. Décédé avant 1610, il laissait une fille, Anne Sacher qui épousa en 1609 Jacques de Villiers, seigneur de Prinçay, échevin et maire de Niort dès 1605 qui, par son mariage, fut ensuite qualifié : \"Seigneur de la maison noble, terre et seigneurerie de Vaudeleigne\". Leur fille Marie, épousa en 1629 Aimable de Bosquevert, seigneur de Bourneuf. Jacques de Bosquevert, fils du précédent, devint seigneur de Vaudeleigne. Au décès du dernier de cette famille, leurs héritiers le vendirent à Eugène Jacques de Grimouard qui en fit sa résidence secondaire.","architecture":"AVAILLES, la demeure actuelle diffère sensiblement du bâtiment médiéval car les tours ont disparu, la façade bâtie au XVIIIe siècle est remarquable, il semble qu'elle ait été édifiée en 1777 ainsi qu'en témoigne l'inscription sur la ferronnerie de l'escalier. Un parc de plus de 30 hectares entoure le château.                                                                             VAUDELEIGNE, belle et vaste demeure dont une partie a été élevée au XVe siècle, le château de Vaudeleigne a fait l'objet de remaniements au cours du XIXe siècle par l'addition d'une aile et surmontée d'une terrasse. Le bâtiment primitif est orné de deux élégantes tourelles recouvertes de zinc. A l'angle opposé à la façade principale s'élève une tour massive recouverte d'ardoises. Le bâtiment primitif est orné dans la même orientation par deux élégantes tourelles semblant bien postérieures surmontées de toitures coniques en zinc. Par contre, à l'angle opposé de la façade principale, s'élève une grosse tour à toit conique en ardoise contemporaine de la première construction également couverte d'ardoises. Jadis, un grand parc entouré de murs et planté de beaux arbres entourait le château. Il n'en reste qu'une faible partie.","habitants":"Availles, famille des Parthenay                                            Valdeleigne, famille de Jacques de Villiers\r\n        \"","divers":"François; 46° 23' 10\" nord, 0° 21' 18\" ouest","gps":"","images":["../image/image_79/79_Francois_1.jpg","../image/image_79/79_Francois_2.jpg","../image/image_79/79_Francois_3.jpg","../image/image_79/79_Francois_4.jpg"]},"Consult_chateau_formulairef762":{"id":"Consult_chateau_formulairef762","dept":"79","canton":"Melle","commune":"St-Martin les Melle","nom":"Gagemont_Melle","type":"Château","periode":"XV","histoire":"MELLE, au Xe siècle, a été le siège dun comté puis rentra dans la hiérarchie féodale. Dès 950, on mentionne lexistence dun lieu fortifié, motte castrale (avec une tour) entourée de palissades de bois. Fin XIe, le donjon sur motte a été abandonné au profit dun second château construit à lemplacement de lactuelle place Bujault.                                                                                                               GAGEMONT, la seigneurie de Gagemont relevait de la châtellenie de Melle. Elle appartenait au XVe siècle à Pierre de Gascougnolles qui rendait hommage au duc de Berry le 20 octobre 1404, pour la tierce partie du fief de Trappe qui dépendait de Gagemont. La terre passa à Guillaume Maynaud qui avait épousé Jeanne de Beaussais en 1430. A la fin du XVIe siècle, Gagemont était propriété de la famille Prévost, originaire du Poitou, les Prévost de Gagemont le conservèrent jusqu'au milieu du XIXe siècle, puis elle passa à Artus Louis Henri Jacques, marquis de Montalembert d'Essé, neveu de la comtesse de Gagemont, décédée sans enfants. Puis le château appartint aux Poupinot, aux Pallardy, aux Texier d'Arnoult, aux Couzin, et aux Dumont qui l'ont vendu en 1966 aux propriétaires actuels.  Marquis  de 1855-1927 marié le 1er août 1883 avec Constance Loppin de Montmort marié le 29 octobre 1904 avec Euloge Deveuyst","architecture":"MELLE, il était constitué dun donjon rectangulaire à trois contreforts et entouré dune enceinte flanquée de tours.\r\nCe château fut démoli en 1577. Des fortifications sont reconstruites à la fin du XIIe et au début du XIIIe siècles et enserrent la ville haute. Ces fortifications, au pied de lescarpement, protègent les accès depuis la vallée de la Béronne et du Pinier. Côté Nord, le château barre la crête du promontoire.                                                                                         GAGEMONT, le fief de Gagemont est cité dès le XIVe siècle. De gros travaux de restauration ont été réalisés au début du XIXe siècle (avant 1835), puis après 1840 : construction de nouveaux communs, agrandissement des pavillons latéraux englobant en partie les deux tours rondes. Entre 1880 et 1912, une grille d'entrée pouvant dater de la seconde moitié du XIXe siècle a été placée à l'entrée du parc. Le domaine, enclos de murs, un salon d'été à l'entrée du potager et un ancien bâtiment avec arches et sous-sol, sont disposés dans le parc. Le logis est de plan rectangulaire, flanqué de deux tours rondes sur l'élévation sud-ouest, et d'une tour polygonale au milieu de l'élévation nord-est. L'ensemble peut remonter à la fin du Moyen-Age mais fut altéré par le percement de baies rectangulaires, la création d'un troisième niveau sous comble et la construction de deux pavillons bas sur les élévations latérales.","habitants":"Famille Prévost de Gagemont\r\n        \"","divers":"Château de Gagemont à Melle   46° 12' 43\" nord, 0° 09' 57\" ouest","gps":"","images":["../image/image_79/79_Gagemont_Melle_1.jpg","../image/image_79/79_Gagemont_Melle_2.jpg"]},"Consult_chateau_formulaire2fc0":{"id":"Consult_chateau_formulaire2fc0","dept":"79","canton":"Celles-sur-Belle","commune":"St-Coutant","nom":"Germain","type":"Maison forte","periode":"XIV-XVI","histoire":"GERMAIN, la seigneurie de Germain a appartenu depuis le bas Moyen-Age à Jean de Vezançay et ses descendants du XIVe siècle à la fin du XVIe siècle. Acquise par la famille Le Coq au XVIIe siècle, elle lui a appartenu jusqu'au milieu du XVIIIe siècle, vendue en 1749 à la veuve de Louis Frotier de la Coste Messelière, puis en 1818 à Pierre Paul Jean Roy de l'Isle et en 1846 à Pierre Louis Charles Cuvillier de Champoyau.","architecture":"GERMAIN, le donjon carré et la tour ronde pourraient dater du XIVe ou du XVe siècle, ces deux tours ont été reliées par la suite par deux corps de bâtiments en L, distribués par une tour d'escalier, ces logis peuvent dater du XVIe siècle comme en témoignent les deux galeries, les baies à meneaux et les cheminées, entre 1768 et 1798, des travaux de restauration et d'assainissement ont eu lieu, dans le troisième quart du XIXe siècle, les bâtiments ont été entretenus. Ils ont été partagés entre plusieurs propriétaires dans le troisième quart du XXe siècle. Les corps de bâtiments ouest et sud sont couverts d'un toit à longs pans en tuile creuse ; la tour carrée sud a un toit en pavillon couvert en ardoise ; la tourelle d'escalier a un toit conique en tuile plate ; la tour circulaire a perdu sa toiture d'origine.","habitants":"famille Le Coq\r\n        \r\n        \"","divers":"Maison forte  à saint-Coutant   46° 13' 49\" nord, 0° 00' 38\" est","gps":"","images":["../image/image_79/79_Germain_1.jpg","../image/image_79/79_Germain_2.jpg","../image/image_79/79_Germain_3.jpg"]},"Consult_chateau_formulaire9acf":{"id":"Consult_chateau_formulaire9acf","dept":"79","canton":"Le Val de Thouet","commune":"Glénay","nom":"Glénay","type":"Vestiges","periode":"XII-XV","histoire":"GLENAY, à l'origine, cette maison forte était occupée par un capitaine qui surveillait le passage à gué de la rivière. Ultérieurement le seigneur vint habiter ce lieu et fit modifier la maison forte pour la transformer en château du XIIe siècle au XIVe siècle. En 1386 le seigneur Jean de Beaumont fait restaurer les fortifications endommagées pendant la guerre de Cent Ans. \r\nAu cours des siècles, trois familles se succèdent dans les lieux, les Beaumont, les Saint-Gelais de Lusignan et au début du XVIIe siècle les Vignerot de Pontcourlay, qui deviendront plus tard ducs de Richelieu. Le Cardinal de Richelieu a séjourné durant quelques mois entre les années 1610 et 1611 auprès de son beau-frère, René Vignerot de Pontcourlay. L'édifice actuel date de la fin du XVe ou du début du XVIe siècle. Les bâtiments de communs sont accompagnés d'un pigeonnier de plan circulaire, et orné des armes des Vignerot. L'église abrite les gisants en marbre de René de Vignerot et son épouse Françoise du Plessis de Richelieu, soeur du Cardinal. Exécutés vers 1625 et attribués à Michel II Bourdin. Les parties hautes de la chapelle sont défensives.","architecture":"GLENAY les premières fondations ont été construites au début du XIIe siècle à l'écart du bourg sur une petite roche escarpée qui domine le Thouaret.  Après les guerres de religion, le château est restauré, remanié et agrandi. Des appartements sont conçus dans le bâtiment central renaissance, avec fenêtres à meneaux. La chapelle sainte-Marguerite est également aménagée à côté de l'immense fuie. La destruction de l'édifice commence à la Révolution. Les sculptures mortuaires de Réné de Vignerot de Pontcourlay et de son épouse, Françoise du Plessis, ont été déplacées au XXe siècle de l'église de Glenay vers la chapelle. Le château bénéficie de multiples protections au titre des M.H. : une inscription le 18 avril 1995 (Façades et toitures des communs) et un classement le 31 juillet 2000 (Logis, chapelle et pigeonnier).C'est aujourd'hui un domaine privé et il subsiste, le large colombier aux armoiries des Vignerot de Pontcourlay, la chapelle sainte-Marguerite et les cheminées parmi les vestiges de l'édifice principal.","habitants":"René de Vignerot \r\n        \"","divers":"Vestiges  à Glénay   GPS : 46° 51' 30\" Nord 0° 15' 35\" Ouest","gps":"46° 51' 30\" Nord 0° 15' 35\" Ouest","images":["../image/image_79/79_Gl%c3%a9nay_1.jpg","../image/image_79/79_Gl%c3%a9nay_2.jpg","../image/image_79/79_Gl%c3%a9nay_3.jpg","../image/image_79/79_Gl%c3%a9nay_4.jpg","../image/image_79/79_Gl%c3%a9nay_5.jpg"]},"Consult_chateau_formulairede5c":{"id":"Consult_chateau_formulairede5c","dept":"79","canton":"Thouars","commune":"Sainte-Verge","nom":"Gosselinière","type":"Château","periode":"XVIII","histoire":"GOSSELINIERE, la seigneurie de la Gosselinière est signalée en 1384 par un aveu rendu à Péronelle vicomtesse de Thouars. Au XVe siècle, elle était propriété de la famille de La Rochefaton, et au XVIIe siècle de la famille Dupont de Cherzay, magistrats de Poitiers. En 1706 Charles dAloigny la rachète, issu dune vieille famille noble du Poitou, les dAloigny Rochefort, une des plus anciennes de France; la maison dAloigny a été confirmé dans sa noblesse en 1667. Charles-François dAloigny de Rochefort, né le 5 avril 1757 à Sainte-Verge, émigra à la Révolution, ses biens furent confisqués puis vendus en 1798. Au XIXe siècle, la Gosselinière était la propriété dEmile Bergeon, sénateur, conseiller général du canton de Thouars, maire de Sainte-Verge. Le château, proche des anciennes dépendances, a été reconstruit au début du XVIIIe siècle, mais partiellement détruit au XIXe siècle. L'édifice, de plan rectangulaire, est flanqué d'un pavillon carré et à l'autre extrémité d'une tour octogonale. Le tout est recouvert d'une toiture à la Mansart. Le château de la Gosselinière était la propriété de Bergeon Emile Firmin  21 juillet 1828 (Argenton Château)  18 mars 1891 (Sainte-Verge). Sénateur, conseiller général du canton de Thouars, maire de Sainte-Verge, où il possède le château de la Gosselinière.","architecture":"GOSSELINIERE, le château, proche de ses anciennes dépendances, a été reconstruit au début du XVIIIe siècle. L'édifice était à l'origine de plan rectangulaire, flanqué de deux pavillons en avant-corps, le tout recouvert d'une toiture à la Mansart. Partiellement détruit vers 1850, deux tourelles ont été ajoutées aux XIXe et XXe siècles.","habitants":"famille de La Rochefaton\r\n        \"","divers":"a Sainte-Verge ; Gosselinière   47° 00' 30\" nord, 0° 12' 39\" ouest","gps":"","images":["../image/image_79/79_Gosselini%c3%a8re_1.jpg"]},"Consult_chateau_formulaire33e8":{"id":"Consult_chateau_formulaire33e8","dept":"79","canton":"La Gâtine","commune":"Gourgé","nom":"Gourgé","type":"Maison-forte","periode":"XV-XVI","histoire":"Deux châteaux à Gourgé celui de Chaussée et de Roche-Enfants.                                                                                                                                CHAUSSEE, est mentionné vers 1120, son premier seigneur était Geoffroy Adelofi. La famille suivante prit le nom du domaine et le conserva jusqu'au début du XIVe siècle, époque ou il passa par voie de succession aux Grignon. Catherine Grignon, dernière héritière, épousa vers 1520 Louis Bigot auquel elle apporta la Chaussée, le domaine revint à sa fille Anne qui avait épousé François Girard. A sa mort, elle laissait un fils, Eusèbe Girard, seigneur de Marsay et La Chaussée. Epoux de Marie Chevalier, il eurent deux filles, l'une épousa René Durcot, lui apportant La Chaussée. Elle passa ensuite à Pierre François de Montaigu qui décéda en 1764. Elle appartint ensuite aux familles Boulin et Barin jusqu'à son achat en 1975 par les propriétaires actuels.                                                                                               ROCHE-ENFANTS, le premier seigneur connu est Aimery Aymar, écuyer, seigneur de la Roche aux Enfants, vivait en 1397. Les Aymar se succèdent jusqu'à Charles, écuyer, maintenu noble en 1667 décédé à Poitiers vers 1682. Anne, sa sur, devint dame de la Roche-aux-Enfants ; elle épousa Jacques Roger de Montbel, chevalier, seigneur de Champeron, par contrat en date du 11 juillet 1683, et c'est ainsi que la terre passa dans cette famille. Les petits enfants Montbel vendirent l'édifice à Pierre Gabriel Brunet de Sairigné le 4 août 1783. Suivant acte du 3 octobre de la même année, Jean d'Abbadie, seigneur de Saint-Loup, exerça le retrait féodal sur partie des biens vendus à Pierre Brunet de Sairigné. En 1859 le château fut vendu à Jules Fabien Failly et passa par héritage à la famille Beauchet-Filleau et à la famille Aubrun qui en est toujours propriétaire.","architecture":"CHAUSSEE, bâtisse massive de plan rectangulaire, à l'angle droit le logis est flanqué d'une belle échauguette transformée en pigeonnier au XVIIe siècle. Des fenêtres à traverse et à meneaux subsistent témoins d'une transformation aux XVe et XVIe siècles. Le château a le mérite de présenter une authenticité rare, peu de remaniements y sont intervenus.   La seigneurie est mentionnée dès 1120. Le logis du XVe siècle est un bâtiment rectangulaire flanqué, à l'ouest, d'une grosse tour circulaire tronquée d'un étage et, à l'est, d'une échauguette sur consoles, transformée plus tard en pigeonnier. Les façades sont percées de fenêtres à meneaux. Deux bretèches, portées par des consoles et ornées de trilobés, défendent les accès primitifs. L'intérieur conserve un escalier à vis dont la cage carrée est entièrement en oeuvre, ainsi que des cheminées médiévales.                                                                               ROCHE, le château de la Roche est situé dans un site au sommet d'un coteau dominant la vallée du Thouet et face au bourg. Il relevait de la baronnie de Saint-Loup à cause de la châtellenie de Crémille, son annexe, avec droit de haute justice et à différents hommages et devoirs de fief.","habitants":"Chaussée; Famille de Eusèbe Girard,                                         Roche; Pierre Gabriel Brunet \r\n        \"","divers":"A Gourgé ;Chaussée   46° 43' 41\" nord, 0° 08' 08\" ouest","gps":"","images":["../image/image_79/79_Gourg%c3%a9_1.jpg","../image/image_79/79_Gourg%c3%a9_2.jpg"]},"Consult_chateau_formulaireb982":{"id":"Consult_chateau_formulaireb982","dept":"79","canton":"Melle","commune":"Gournay -Loizè","nom":"Gournay","type":"Château","periode":"XV-XVIII-XIX","histoire":"deux châteaux à Gurnay celui de Gournay et celui de le Chevrelière.                                                                                                       GOURNAY, la seigneurie du Haut-Gournay relevait jadis de Chef-Boutonne. Elle fut aux mains des Villedon depuis le XVIe siècle. Pendant la Révolution, Louis Venant Alexis de Villedon, seigneur de Gournay, chevalier de Malte et lieutenant au régiment d'Anjou-infanterie, émigra et combattit en 1792 dans l'armée des princes. Aujourd'hui chambres d'Hôtes de la famille Guillard.                                 CHEVRELIERE , elle relevait de la baronnie de Gascougnolles. Avant 1793, le domaine de la Chevrelière appartenait à Charles de Villedon, seigneur de Gournay et grand écuyer du Roi.  Acquise depuis 1792 par la famille Ayme aux demoiselles de Villedon (Villedon fut seigneur de la Chevrelière au XVIe siècle) Le château actuel a été reconstruit en 1810 par Jacques René Aymé de la Chevrelière issu d'une ancienne famille du Mellois. Après une courte carrière militaire, il devint trésorier-payeur aux armées puis premier Chambellan du prince Murat.  Après son mariage en 1816, Jacques René Aymé de la Chevrelière, retiré sur ses terres, entamera une carrière politique locale. Dailleurs durant la seconde guerre mondiale, les allemands avaient installé leur QG au château pour voir les arrivées de la mer via les moyens de lépoque.  Le domaine de la Chevrelière revint à son fils aîné Louis Marie Balthazar Edouard, il est aujourd'hui toujours aux mains de ses descendants.","architecture":"CHEVRELIERE, la propriété de la Chevrelière est située sur une butte qui domine à lOuest. est mentionnée dès 1594 dans le cartulaire des Châtelliers. Le château actuel a été reconstruit en 1810.  En 1811, il sera nommé, par Napoléon, baron de l'Empire. Après son mariage en 1816, Jacques René Aymé de la Chevrelière, retiré sur ses terres, entamera une carrière politique locale. A sa mort en 1843, il laissera à ses héritiers une fortune considérable.   Le château de la Chevrelière, construction du XIXe siècle, est d'une grande sobriété. Construit sur un plan rectangulaire, il possède un étage attique .                                                                                          GOURNAY, la tour d'escalier correspond aux restes de l'ancien château de Gournay. De plan octogonal à la base, elle a des encorbellements moulurés qui donnent à sa partie supérieure une forme carrée. Sa corniche est ornementée de coquilles Saint-Jacques concaves. La Tour remonterait vraisemblablement au début du XVe siècle. A cette construction se trouve accolé au logis renaissance qui conserve de belles fenêtres à traverses et à meneaux ainsi que des restes de baies surmontées de pilastres. L'ancien château abrite aujourd'hui les locaux de l'hôtel de ville de Gournay-Loizé.","habitants":"Gournay, Louis Venant Alexis de Villedon                             Chevreliere Famille Ayme\r\n        \"","divers":"Gournay Loizé;      46° 09' 04\" nord, 0° 03' 42\" ouest                     Chevrelière grav 1  Loize grav 2  Touche grav 3-4-5","gps":"","images":["../image/image_79/79_Gournay_1.jpg","../image/image_79/79_Gournay_2.jpg","../image/image_79/79_Gournay_3.jpg","../image/image_79/79_Gournay_4.jpg","../image/image_79/79_Gournay_5.jpg"]},"Consult_chateau_formulairea19a":{"id":"Consult_chateau_formulairea19a","dept":"79","canton":"Frontenay-Rohan-Rohan","commune":"Granzay-Gript","nom":"Granzay_Griffier","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux à Granzay-Gript celui de Bone et de Griffier.               BONE, le domaine de la Bône (ou la Baune), situé à proximité de vestiges gallo-romains, appartenait en 1850 à la famille Bourgleau. En 1873. Il fut acquis par Pierre d'Azy, administrateur des Chemins de Fer de l'Ouest. Quelques années plus tard, ce dernier s'en défit au moyen d'un échange. Il céda son domaine à Salomon Beleys, banquier, en contrepartie de quoi celui-ci s'engageait à lui laisser ses deux propriétés parisiennes. En 1880, la Bône changea à nouveau de propriétaire en la personne de Louis Leclerc. Trois années plus tard, il s'en sépara au profit d'Edgar Baron. Puis à la veille de la première guerre mondiale, la propriété passa à la famille Baron-Latouche.\r\nGRIFFIER,   aurait été construit à la fin du Moyen-Age. Après la Révolution, en l'an IX, le domaine du Griffier, appartenant au citoyen Morisset, président du conseil général, fit l'admiration de tous.","architecture":"BONE, la Bône était au XIXe siècle le siège d'une distillerie située au cur d'un domaine ne comptant pas moins de 240 hectares. La demeure, percée de nombreuses ouvertures, remonte aux années 1860. En revanche, les servitudes qui s'étendent perpendiculairement au bâtiment datent du XVIIIe siècle.                                                                                                      GRIFFIER,  le Journal des Deux Sèvres vantait la qualité de la vigne qu'il entretenait, la \"folle blanche\", excellente pour le vin blanc et les eaux-de-vie, la production de vin pouvait être l'avenir du département. Aujourd'hui, l'ensemble se conçoit comme un vaste bâtiment principal, le corps de logis, sur lequel se greffent, en retour, des dépendances couvertes en tuiles. Celui-ci, à deux étages couvert d'un toit plat simulant la terrasse est un bâtiment néoclassique du XXe siècle en appareil calcaire. A chaque angle, différent chacun des niveaux, une succession de bossages, cartouche et pilastre anime la façade. Ce logis sobre prend place au centre d'un édifice plus ancien, bien modifié déjà et terminé à chaque extrémité par une tour carrée. Le tout est surmonté d'un petit donjon crénelé.","habitants":"Bone famille Bourgleau.                                                             Griffier, famille Morisset\r\n        \"","divers":"à Granzay-Gript; le château  de Bone grav  5-6","gps":"","images":["../image/image_79/79_Granzay_Griffier_1.jpg","../image/image_79/79_Granzay_Griffier_2.jpg","../image/image_79/79_Granzay_Griffier_3.jpg","../image/image_79/79_Granzay_Griffier_4.jpg","../image/image_79/79_Granzay_Griffier_5.jpg","../image/image_79/79_Granzay_Griffier_6.jpg"]},"Consult_chateau_formulaire39c9":{"id":"Consult_chateau_formulaire39c9","dept":"79","canton":"La Gâtine","commune":"Beaulieu sous Parthenay","nom":"Guyonnière","type":"Château","periode":"XVI","histoire":"GUYONNIERE, en 1574, la propriétaire Michelle Poupot dame de la Pipardière fut tuée par une pierre tombée du château en construction il date   de cet époque au XVIe siècle à Beaulieu-Sous-Parthenay par la famille Moysen, au XVIIe siècle Le château de la Guyonnière est acquis par les Ladvocat au XVIIIe siècle, la famille de Moysen  reprend possession  du domaine. En 1804 vente de la Guyonnière à Jacques Labbaye et passe en 1890 à la famille Jamain.                                                                                                                       les douves et les cheminées du château ont été inscrits aux M.H. le 4/03/1986. Propriété de  madame Viviane Dugois.","architecture":"GUYONNIERE, remaniements au XVe siècle et au XVIe siècle, il conserve une allure féodale marquée. Le château est constitué d'un quadrilatère cerné de douves. La façade nord comprend le logis seigneurial. La façade ouest est constituée d'un long bâtiment qui abritait les communs tandis que les deux autres façades sont formées de murs d'enceinte percés de meurtrières. L'accès à la cour se fait par un pont à deux arches sur lequel venait autrefois s'appuyer l'extrémité d'un pont-levis. L'entrée se compose d'un porche en plein cintre, flanqué d'une poterne et surmonté des logements pour les bras du pont-levis. Une bretèche défensive couronne l'ensemble. Les angles de l'enceinte sont flanqués de quatre tours. La quatrième tour d'angle est couverte d'une voûte hémisphérique sur laquelle s'élève un pigeonnier de 800 bouliers de calcaire. Sur la façade opposée à l'entrée principale existe une autre poterne autrefois défendue par un pont-levis. Les tours et l'enceinte ont conservé, avec leur grand nombre de meurtrières, leur système de défense qui confère à l'ensemble un caractère très médiéval.","habitants":"famille Moysen\r\n        \"","divers":"Beaulieu sous Parthenay ; GPS : 46° 34' 58\" Nord 0° 14' 35\" Ouest","gps":"46° 34' 58\" Nord 0° 14' 35\" Ouest","images":["../image/image_79/79_Guyonni%c3%a8re_1.jpg","../image/image_79/79_Guyonni%c3%a8re_2.jpg","../image/image_79/79_Guyonni%c3%a8re_3.jpg","../image/image_79/79_Guyonni%c3%a8re_4.jpg","../image/image_79/79_Guyonni%c3%a8re_5.jpg","../image/image_79/79_Guyonni%c3%a8re_6.jpg"]},"Consult_chateau_formulaire91a7":{"id":"Consult_chateau_formulaire91a7","dept":"79","canton":"Celles-sur-Belle","commune":"Vançais","nom":"Guérivière","type":"Château","periode":"XVI","histoire":"GUERIVIERE, dans un aveu de 1561 est mentionné l'hébergement du seigneur de la Guérivière. De cette époque subsistent les deux tours d'un bâtiment en U situé en face du logis actuel. Vendu à la Révolution, le domaine a été acquis par Dominique Vallée, cultivateur à Lezay. Après 1855, le logis actuel a été rebâti par son nouveau propriétaire, Gabriel Alexandre de Prin, qui a fait aménager une chapelle dans la tour Est où se trouve un vitrail daté de 1894.","architecture":"GUERIVIERE, le corps central  de plan rectangulaire à deux niveaux et lucarnes sur toit brisé est couvert en longs pans brisés et les tours d'angle en toit conique, l'escalier en pierre jusqu'à l'étage puis en bois de l'étage au comble. Flanqué de tourelles  rondes en façade toit en poivrières.","habitants":"Gabriel Alexandre de Prin\r\n        \"","divers":"Guérivière à Vinçais; 46° 18' 05\" nord, 0° 03' 09\"  est","gps":"","images":["../image/image_79/79_Gu%c3%a9rivi%c3%a8re_1.jpg","../image/image_79/79_Gu%c3%a9rivi%c3%a8re_2.jpg","../image/image_79/79_Gu%c3%a9rivi%c3%a8re_3.jpg"]},"Consult_chateau_formulaire748a":{"id":"Consult_chateau_formulaire748a","dept":"79","canton":"Saint-Maixent-l","commune":"Saivres","nom":"Herbaudière","type":"Herbaudière","periode":"XVI","histoire":"HERBAUDIERE,  Marguerite des Francs est dite veuve de Pierre Chauvau, écuyer, seigneur du Breuil-Mayrault et de Lerbaudère. Arriva ensuite la famille de Neuport qui marqua de son empreinte l'Herbaudière pendant près de deux siècles. Ils se succédèrent jusqu'en 1630. L'Herbaudière relevait de la châtellerie de Sainte-Néomaye et comprenait alors le château, deux métairies au hameau de l'herbaudière, le village de La Cailletière, la borderie de La Petite Coutancière, des droits sur La Thibaudière, la métairie dite Le Pinier, la métairie noble de Courpeteau de Russay, et La Barre-Sanglier, plus la maison noble de La Fontaine et ses appartenances de clôtures, jardins et prés communément appelés le Grand-Pré de l'Herbaudière. En 1635, le domaine revint à Philippe Tutault et en 1738, Philippe Louis Tutault, le fils de Philippe Tutault, devenu sieur de l'Herbaudière, décédait sans héritier direct, la propriété échut à Charles Guichard. Pendant la Révolution, le château fut confisqué et vendu au profit de la Nation. Un fermier, Louis Vandier l'acquit. Le château actuel, bâti en 1599, fut l'oeuvre de Philippe de Neuport qui fit démolir l'ancienne maison seigneurale et reconstruire une gentilhommière dans les goûts de l'époque.","architecture":"HERBAUDIERE, l'ensemble du bâtiment forme un quadrilatère de 60 mètres de longueur et 50 mètres de largeur. Les communs sont flanqués d'une tour à chacun des angles. L'accès dans la cour se fait par une porterie, possédant portes charretière et piétonne. L'entrée était autrefois surmontée de mâchicoulis.  Le logis se trouve en fond de cour, occupant l'aile ouest d'un quadrilatère formé par trois ailes de communs. Le front oriental est appuyé de deux tours recouvertes de poivrières avec lucarnes à acrotères. Les portes piétonne et cochère étaient défendues par un hourd dont il ne reste que les consoles. Le logis s'élève de deux niveaux sur soubassement et présente des lucarnes à frontons triangulaires à acrotères à boule. Une tour se trouve dans l'angle nord-est sur cour ; une deuxième dans l'angle sud-ouest sur jardin. La porte axiale est ponctuée de colonnes supportant un entablement sommé d'une niche avec statuette et encadrée de deux oculi. L'élévation sur jardin est austère et sans décor. L'intérieur conserve des cheminées monumentales. Le salon est décoré d'un papier peint panoramique figurant des scènes de chasse. Le décor, rare, est typé de la fin du XVIe et début du XVIIe siècle.","habitants":"Philippe de Neuport\r\n        \"","divers":"l' Herbaudière à Saivres;         GPS : 46° 25' 31\" Nord 0° 13' 53\" Ouest","gps":"46° 25' 31\" Nord 0° 13' 53\" Ouest","images":["../image/image_79/79_Herbaudi%c3%a8re_1.jpg","../image/image_79/79_Herbaudi%c3%a8re_2.jpg","../image/image_79/79_Herbaudi%c3%a8re_3.jpg","../image/image_79/79_Herbaudi%c3%a8re_4.jpg","../image/image_79/79_Herbaudi%c3%a8re_5.jpg"]},"Consult_chateau_formulaire0bb8":{"id":"Consult_chateau_formulaire0bb8","dept":"79","canton":"La Gâtine","commune":"Pougne-Hérisson","nom":"Hérisson_79","type":"Forteresse","periode":"XIV","histoire":"HERISSON, viendrait du germain Heric, camp militaire. Ce bourg est important au Moyen-Âge, un marché hebdomadaire se tient dès le XIVe siècle. C'est alors une possession des seigneurs de Parthenay. Le castrum est mentionné dès 1040. Hérisson était, à la fin du Moyen-Age, une petite ville disposant d'une halle où se tenait un marché régulièrement, deux auberges et deux églises. Le château est construit sur une butte entourée de fossés, et se dresse à côté de l'église qui a servi à l'origine de chapelle castrale, remontant elle aussi au XIIe siècle avec des croisées d'ogives du XIIIe siècle. Les deux bourgs de Pougne et de Hérisson se regroupent en 1801. Pougne Hérisson est une commune dhistoires, on dit que les Anglais ont attaquer le château, le propriétaire a attendu que les assaillants soient juste devant pour leur jeter de la terre et les ensevelir vivants. Il sest alors formé une colline.","architecture":"HERISSON  le château de Hérisson présente une enceinte polygonale en partie arasée. La courtine ouest, mieux conservée, est flanquée de trois tours rondes. Ces ouvrages, sans élément de tir, devaient protéger les logis ouverts sur la cour. Un grand logis est adossé à cette courtine. Un corps de bâtiment plus tardif, fin du XVIe siècle, le prolonge doté d'une galerie fermée sur cour, desservie par une tourelle d'escalier à vis. De plan rectangulaire sur trois niveaux, le logis comprend à chaque étage deux pièces en enfilade, éclairées par de hautes fenêtres à coussièges. Postérieur à la muraille, le logis pourrait dater du XVe siècle, comme la tour d'escalier, alors que le couloir de distribution, qui a pu remplacer une galerie en bois, est plus tardif. Les communs sont construits en appentis près du logis. Le château de Hérisson semble un des tout premier châteaux connus de Gâtine, avec ceux de Germond et de Parthenay.","habitants":"seigneurs de Parthenay\r\n        \r\n        \"","divers":"A Pougne Hérisson; 46° 41' 04\" nord, 0° 24' 50\" ouest","gps":"","images":["../image/image_79/79_H%c3%a9risson_79_1.jpg","../image/image_79/79_H%c3%a9risson_79_2.jpg","../image/image_79/79_H%c3%a9risson_79_3.jpg","../image/image_79/79_H%c3%a9risson_79_4.jpg"]},"Consult_chateau_formulaire6f56":{"id":"Consult_chateau_formulaire6f56","dept":"79","canton":"Melle","commune":"Chef-Boutonne","nom":"Javarzay","type":"Forteresse","periode":"XV-XVI","histoire":"JAVARZAY, en 1304 tenu par la famille de Chaunay en 1448 Anne de Chaunay épouse Jean de Rochechouart qui le reconstruit en 1514 par des membres de la maison de Rochechouart-branche de Chandeniers en 1530 à la mort de François de Rochechouart, les travaux son poursuivis par sa veuve Blanche d'Aumont. En ont été propriétaires : la famille de La Rochefoucauld-Roye, par achat en 1655 à François de Rochechouart de Chandeniers ; le comte de Pontchartrain, ministre de Louis XIV ; Chrétien Guillaume de Lamoignon de Malesherbes, avocat de Louis XVI. Jérôme Phélypeaux, secrétaire d'État de la Marine, fils du chancelier de France Louis, acheta la terre de Javarzay en 1712 . Mais il y avait aussi un lien familial : sa femme était Eléonore-Christine de La Rochefoucauld fille de Frédéric-Charles comte de Roucy et de Roye, dite mademoiselle de Chef-Boutonne. En 1785, au moins, le propriétaire est Joseph Michel Le Blois, avocat aux tribunaux militaires lors de la Révolution. Sa fille, Marie-Anne, née au château en 1787  épousa Ange Achille de Brunet, comte de Neuilly le château revient à sa fille madame de Montboisier vendu en 1804 à connut plusieurs propriétaire dont un sieur Poirier qui raser les douzes tours de l'enceinte, en 1854 acquis par la famille Perrain qui firent édifier une orangerie ouvrant sur parc par cinq baies  cintrées ainsi  qu'une aile accolée à la grosse tour. Passe ensuite à la famille Moreau et après la première guerre  devient la propriété de la famille de notaires les Piard-Desmaret et  en  1982 acquis par la commune, a été classé M.H. en 1862.","architecture":"JAVARZAY, le château  allie à la fois l'aspect renaissance et l'aspect féodal avec ses mâchicoulis et ses douves mais aussi ses toits coniques couverts dardoise. Son pavillon dentrée est flanqué de quatre tourelles à encorbellement.  Il reste du château, le plus imposant de l'époque en Deux-Sèvres, le bâtiment qui réunit les deux tours et la chapelle. L'aile gauche a été détruite et l'aile droite est une construction ultérieure. L'enceinte a été démolie entre 1820 et 1824 et les sculptures ont disparu. L'orangerie date de 1854.   le colombier paraît encore sur le plan cadastral de 1843 et, à la même époque, le dessin de Baugier montre un pilier de l'allée d'entrée ; si on en juge par l'appareillage de ses pierres, il devait être contemporain de la ruine qui était récemment le long de la rue et qui datait du château, puisque ses pignons étaient ornés des mêmes figures encore visible sur celui qui reste. En 1982, la commune devint propriétaire du château, de ses dépendances et de son parc. Il abrite aujourdhui le musée de la coiffe, une salle est dédiée à Jean-François Cail et à des expositions temporaires. Un étang fut creusé en 1996, dans la prairie à l'arrière du château. Le site est aujourdhui fréquenté par les touristes et les promeneurs de tous âges.","habitants":"famille de Chaunay\r\n        \"","divers":"A Chef sur Boutonne; château de Javarzay                46° 06' 33\" Nord et 0° 04' 58\" Ouest","gps":"","images":["../image/image_79/79_Javarzay_1.jpg","../image/image_79/79_Javarzay_2.jpg","../image/image_79/79_Javarzay_3.jpg","../image/image_79/79_Javarzay_4.jpg","../image/image_79/79_Javarzay_5.jpg","../image/image_79/79_Javarzay_6.jpg","../image/image_79/79_Javarzay_7.jpg","../image/image_79/79_Javarzay_8.jpg","../image/image_79/79_Javarzay_9.jpg"]},"Consult_chateau_formulaire8753":{"id":"Consult_chateau_formulaire8753","dept":"79","canton":"Melle","commune":"Pioussay","nom":"Jouhé","type":"Forteresse","periode":"XV-XVII","histoire":"JOUHE, première mention écrite du fief de Jouhé en 1147, parenté avec une grande ligne poitevine des Turpin de Crissé, Guillaume Turpin devenu en 1236 seigneur de Jouhé sa descendance fait élevé le donjon au XVe siècle. En 1661 Marie de Turpin fille de Jacques chevalier et de Jeanne de Sochet avec Jean de Landeix chevalier seigneur de Brie. Martial de Landeix épouse  Marie-Anne de Céris meurt en 1714 laissant une fille, Louise qui  s'allie à Paul Naudet de Lespaud qui cédèrent la propriété à François Chabot, écuyer  seigneur de Peuchebrun, en 1824 son descendant Nicolas-Mandé Chabot vend Jouhé à François Tallonneau, en 1917 la veuve de Camille-Edouart Tallonneau se défait de Jouhé au profit de  Fernand  Barny de Romanet et le cède en 1926 à mademoiselle Lucie de Terrasson, depuis 1979 appartient à la famille Pierre Simon qui installe le musée  historique de l'ordre de Malte.","architecture":"JOUHE, les bâtiments sont répartis autour d'une cour rectangulaire, au nord-est s'étend le logis, tandis qu'au sud de cet édifice se dresse le donjon. L'origine du logis remonte au XVe siècle, remanié au XVIIe siècle. Le donjon constitue l'élément majeur de cet ensemble, avec ses quatre étages, dont un de combles qui surmontent le rez-de-chaussée, le troisième étage est ceinturé par le chemin de ronde garni de mâchicoulis, et sur le parapet crénelé repose la toiture d'où émerge une grande cheminée. A l'intérieur les étages sont desservis par un escalier à vis situé dans l'angle nord ouest. Les pièces sont couvertes de voûtes et de plafonds charpentés.","habitants":"Famille de Turpin\r\n        \"","divers":"A Pioussay;   Jouhé 46° 04' 32\" nord, 0° 01' 34\" est","gps":"","images":["../image/image_79/79_Jouh%c3%a9_1.jpg","../image/image_79/79_Jouh%c3%a9_2.jpg","../image/image_79/79_Jouh%c3%a9_3.jpg","../image/image_79/79_Jouh%c3%a9_4.jpg","../image/image_79/79_Jouh%c3%a9_5.jpg","../image/image_79/79_Jouh%c3%a9_6.jpg"]},"Consult_chateau_formulaire4325-2":{"id":"Consult_chateau_formulaire4325-2","dept":"79","canton":"","commune":"Combrand","nom":"La Pastellière","type":"Château","periode":"XVI-XVII","histoire":"LA PASTELLIERE, la construction date de la fin du XVe siècle et du début du XVIe siècle. En 1641 il appartient encore à la famille de La Pastellière. En octobre 1704, le château est acheté par Charles Durant, fils de Philippe Durant et de Jeanne Merlet, marchand des tissages de Bressuire de son métier, qui avait acheté en 1703  l'office de maire perpétuel de Bressuire. La famille Durant ajouta alors le nom de la seigneurie au sien et prit le nom Durant de La Pastellière. Lors de la Guerre de Vendée, le château servit d'hôpital militaire pour les blessés vendéens en 1793 et la colonne infernale du général Grignon tenta sans succès de le brûler en 1794.  En 1889 il est acheté par la famille Savary de Beauregard. En 1953, le domaine est morcelé.  Le château est vendu sur saisie en 2003 à la société Foncier-Sa. Depuis son rachat, le château a fait l'objet d'une rénovation intégrant la modernité dans le respect de l'histoire.","architecture":"LA PASTELLIERE, le château se compose d'une partie résidentielle à laquelle s'ajoutent sur la face nord une tour ronde et une tour carrée, la face sud est flanquée d'une tourelle en surplomb. En premier lieu furent bâtis le logis principal puis dans la seconde moitié du XVIe siècle, l'escalier monumental. Les deux tours furent rajoutées aux XVIIIe et XIXe siècles mais il est vraisemblable que deux de ces éléments existaient à l'origine. La Pastellière présente de magnifiques fenêtres à meneaux, d'intéressantes lucarnes, trois escaliers à vis avec marche portant noyau et une belle porte d'entrée coiffée d'un chambranle reposant sur deux modillons sculptés.   Hérissée de ses tours et de ses lucarnes, cantonnée autour de ses douves en eau dans un espace trapézoïdal défendu aujourd'hui par trois tours rondes et des murets crênelés, auquel on accède après avoir traversé un petit pont-levis et une porte en granit, offre l'image parfaite du château sorti tout droit d'un livre de contes. La toiture en ardoise est à pentes brisées pour le corps de logis, à quatre pentes pour le pavillon en avancée et la tour carrée arrière, en poivrière pour les trois tours rondes.","habitants":"Famille Durant de La Pastellière                                                   Famille Savary de Beauregard\"","divers":"Château de la Pastellière à Combrand ;   46° 51' 11\" nord, 0° 40' 36\" ouest","gps":"","images":["../image/image_79/79_La_Pastelli%c3%a8re_1.jpg"]},"Consult_chateau_formulaire25c7":{"id":"Consult_chateau_formulaire25c7","dept":"79","canton":"La Gâtine","commune":"St-Martin du Fouilloux","nom":"Laspois","type":"Château","periode":"XV-XVII","histoire":"LASPOIS, une première mention de Laspois est faite en 1441. Au siècle suivant, cette seigneurie était tenue par René de Laspois, gentilhomme huguenot. Les Laspois conservèrent la terre jusqu'au XVIIe siècle, époque à laquelle elle passa aux Rousseau. En 1882, Marie Rousseau de Laspois épousait M. Courbe, magistrat, le domaine fut transmis à leur fils Joseph qui, célibataire, le légua à l'évêché de Poitiers. Le château fut acquis en 1966 par les propriétaires actuels.","architecture":"LASPOIS, on accède au château par un porche muni de portes cochère et piétonne. Précédée d'une cour d'honneur, la demeure offre une belle élégance dans le style du XVIIIe siècle. Elle se compose, côté cour, d'un corps de logis de type rectangulaire. Côté jardin deux pavillons carrés lui ont été juxtaposés. La construction d'origine dont il reste à l'arrière une tourelle circulaire coiffée d'un toit polygonal, peut remonter au XVIe ou au XVIIe siècle. Le château a cependant été remis au goût du jour dans le premier quart du XVIIIe siècle, comme l'atteste la date 1724, inscrite sur un des oculus.  de plan en U deux pavillons saillant en façades. Passés un portail à portes cochère et piétonnière, et une cour fermée par des bâtiments, le logis offre une façade à quatre travées sous lucarnes. L'élévation postérieure présente deux ailes en retour d'équerre avec une tourelle dans l'angle. L'intérieur conserve un escalier rampe sur rampe avec limon porteur soutenu par deux pilastres et réunis par un arc surbaissé avec agrafe centrale. La salle à manger est ornée de lambris XVIIIe siècle et l'étage conserve également des boiseries.","habitants":"Famille de René de Laspois\r\n        \"","divers":"A St-Martin du Fouilloux; Laspois-  46° 35' 27\" nord, 0° 07' 11\" ouest","gps":"","images":["../image/image_79/79_Laspois_1.jpg"]},"Consult_chateau_formulaire3ba8":{"id":"Consult_chateau_formulaire3ba8","dept":"79","canton":"Celle sur Belle","commune":"Lezay","nom":"Lezay","type":"Château","periode":"XV-XVIII","histoire":"Deux châteaux dans cet article de Lezay celui de Lezay et de Marais. LEZAY, après Jacques de Coloigne, fils de Hugues, la seigneurie de Lezay passa, un peu avant 1400, aux mains de son cousin Guillaume Odart, puis de Jean de Torsay, seigneur de La Mothe-Saint-Héray, avant dappartenir aux Beaumont, aux de Rochechouart, aux de Melun, de revenir aux Beaumont et de passer enfin aux Laval, avec Pierre, aîné et chef de la puissante maison des Montmorency-Laval, lesquels la conservèrent jusquà la Révolution.  En 1642, Louis XII, pour récompenser Hilaire de Laval de ses bons services, avait érigé la baronnie en marquisat. A sa mort, en 1798, la terre et le château de Lezay revinrent à son petit-fils, le duc de Montmorency-Laval.    Vendus comme biens nationaux pendant la Révolution, le château et ses dépendances furent acquis par un avocat parisien, Jean Baptiste Chamborre, qui, en 1818, le revendit à un sieur Gorrin, directeur des contributions indirectes à Parthenay.                                                                                                   MARAIS,  ce château a appartenu à différentes branches de la famille de Lezay Lusignan. En 1429 Chales VII a autorisé Jean II de Lezay à faire reconstruire et fortifier son château dont il reste des éléments de fortification. Dans le second quart du XVIIe siècle, du temps de Robert de Lezay, des travaux auraient eu lieu. De cette époque reste une porte cintrée à encadrement mouluré dans les dépendances. A partir du troisième quart du XVIIe siècle le château a été affermé. Vendu à la Révolution comme bien national.","architecture":"LEZAY, le musée lapidaire de Niort possède une tombe provenant de la chapelle du château sur laquelle est représenté, en relief, un guerrier dont la tête est appuyée sur un coussin. On y lit lépitaphe de Philippe de Melun, chevalier, seigneur de la Borde et de Lezay, conseiller et chambellan du roi, décédé en 1467.                                                                                                MARAIS, du XVe siècle le premier château fort, détruit par les Anglais vers 1370, avait été bâti sur une motte, fortifié de quatre grosses tours et ceint de douves et d'arrière douves. Depuis le milieu du XIIe siècle jusqu'à la Révolution, vendu  comme bien national, le château aurait été démoli (tours et logis) avant 1810, le pigeonnier a disparu entre 1807 et 1832, le site, les douves et les dépendances ont été conservés. Au XXe siècle, un logement a été aménagé dans une aile. Tous les corps de bâtiments sont couverts en  longs pans à pignons couverts ; les deux tours carrées sont couvertes en appentis.","habitants":"Marais famille de Lezay Lusignan\r\n        \"","divers":"Château de Lezay grav 1-2-7.    Du Marais de 3 à 6","gps":"","images":["../image/image_79/79_Lezay_1.jpg","../image/image_79/79_Lezay_2.jpg","../image/image_79/79_Lezay_3.jpg","../image/image_79/79_Lezay_4.jpg","../image/image_79/79_Lezay_5.jpg","../image/image_79/79_Lezay_6.jpg","../image/image_79/79_Lezay_7.jpg"]},"Consult_chateau_formulaire47e5":{"id":"Consult_chateau_formulaire47e5","dept":"79","canton":"Celles-sur-Belle","commune":"Lezay","nom":"Lezay_II","type":"Maison forte","periode":"XV-XVI","histoire":"Dans cet article de LEZAY le château de Bouhas de Saint-Germain  et de Chaillou à Chey.                                                                                                 BOUHAS est un logis bâti à Lezay,  la seigneurie de Bouhas était un arrière-fief relevant féodalement de la châtellenie des Marais. Les cheminées de la partie droite du logis et l'échauguette d'angle indiquent une construction du XVIe siècle, confirmée de la date 1567, gravée sur la porte d'entrée actuelle du logis. Depuis le XVIIe siècle, la Famille de Pons en était le propriétaire. Les propriétaires auraient habité ou se sont toujours réservés la demeure. Sur le plan cadastral de 1832, le logis est précédé au centre de l'élévation antérieure, d'un corps de bâtiment carré qui contenait  un escalier à vis en maçonnerie tandis que l'escalier actuel est un escalier intérieur droit, en charpente. L'ensemble est bien conservé et en cours de restauration.                                                                                              SAINT-GERMAIN, le nom d'un métayer du seigneur de Germain en 1438 a été conservé par les archives. Le grand moulin de Germain pourrait dater de la fin du XVIe siècle. Nous ne connaissons pas les dates de construction ou d'acquisition des autres métairies et moulins. Plusieurs sources du XVIIIe siècle décrivent l'ensemble des fermes et moulins dépendant de cette seigneurie. Dans la deuxième moitié de ce siècle, l'ancien pavillon de chasse est également devenu une métairie. Entre 1782 et 1798, la métairie de la porte a été démolie et une grande campage de restauration des bâtiments, logis et dépendances, a eu lieu. Le château et son domaine n'ont pas été vendus comme biens nationaux. Au XIXe siècle, la métairie du Pavillon et le Grand moulin de Germain, situés dans l'ancienne clôture, ont continué à dépendre du château.","architecture":"CHAILLOU à CHEY,  date du XIVe siècle, les tours Est et sud et les murs sud-est et sud-ouest peuvent dater du XIVe ou XVe siècle, avec la porte en accolade et l'escalier à vis à l'intérieur, le reste du gros-oeuvre daterait du XVIe siècle, la date de 1561 est inscrite sur une pierre sculptée actuellement déposée. Au XVIIe siècle, des remaniements intérieurs sont effectués sur la cheminée à griffes de lion, l'escalier rampe sur rampe, les communs nord-ouest datent de cette époque. En 1731 est construit au nord-est un corps de bâtiment avec chapelle. En 1875, le comte de Menou fait remanier les élévations nord-ouest et sud-est, aménager le salon à mi-étage, édifier une tour crénelée dans le jardin et retracer l'allée principale. En 1905 Eugène Bougouïn fait refaire l'élévation nord-est, et aménage à l'intérieur deux pièces du rez-de-chaussée. Dans la deuxième moitié du XXe siècle, deux baies, dont l'encadrement provient d'une maison de Chenay sont installées dans le mur sud ouest,\r\nLogis couvert d'un toit à longs pans à croupe, en ardoise, et surmonté d'un belvédère à flèche hexagonale, en ardoise ; tours d'angle et pigeonnier couverts d'un toit conique, en ardoise ; communs couverts de toits à longs pans à croupe, en tuile mécanique ; tour crénelée à toit en terrasse ; escalier principal du logis en pierre à deux volées rampe sur rampe prolongé par un vestige d'un escalier à vis ; escalier en bois entre l'étage en surcroît et le comble, et entre le comble et le belvédère.","habitants":"Famille d'Eugène Bougouïn \r\n        \"","divers":"Lezay  GPS : 46° 15' 55\" Nord, 0° 00' 27\" Oues                      Bouhas grav 1 à 3   Chaillou grav   4-5.                                                 St-Germain grav 6-7","gps":"46° 15' 55\" Nord, 0° 00' 27\" Oues                      Bouha","images":["../image/image_79/79_Lezay_II_1.jpg","../image/image_79/79_Lezay_II_2.jpg","../image/image_79/79_Lezay_II_3.jpg","../image/image_79/79_Lezay_II_4.jpg","../image/image_79/79_Lezay_II_5.jpg","../image/image_79/79_Lezay_II_6.jpg","../image/image_79/79_Lezay_II_7.jpg"]},"Consult_chateau_formulaired7a5":{"id":"Consult_chateau_formulaired7a5","dept":"79","canton":"Le Val de Thouet","commune":"Maisontiers","nom":"Maisontiers","type":"Château","periode":"XV-XVI","histoire":"MAISONTIERS,  de la fin du XVe ou du début du XVIe siècle, entouré d'un mur d'enceinte flanqué de deux tours rondes. La maison du gardien est située à l'entrée. En avançant vers le château, le premier bâtiment sur la droite se compose de trois corps de bâtiments (porcherie, four à pain, bergerie). L'écurie date du XIXe siècle. Le château fut construit pour Claude de Montjehan, dame de Goulesnes. Un fief des chevaliers hospitaliers. Fin du XVe siècle, Claude de Montjehan fit racheter les bâtiments, puis les fit transformer, donnant le château actuel.  Elle le revendit le 21/05/1544 à Guyonne de la Bernardière, épouse de René de Tusseau.  Au cours du XVIe siècle, Maisontiers passa à la famille de Tusseau et y resta jusqu'à la Révolution, époque où il est confisqué et pillé. Plus tard, les deux filles de M. de Tusseau parvinrent à racheter le château, leur descendance s'éteignit en 1870. Maisontiers passa alors par héritage à une autre branche de la famille, dont les descendants occupent toujours le château.","architecture":"MAISONTIERS, la construction du château de Maisontiers date du XIIIe au XVIe siècle. Les écuries   datent du XIXe siècle.  L'aile Ouest, remodelée à la demande de Claude de Montjehan, est la partie la plus ancienne. La plus récente, l'écurie, date du XIXe siècle. Le château de Maisontiers est admirable grace à ses douves, au Nord-Est, qui atteignent 110 mètres de long sur 40 mètres de large.  Le château est situé à l'est du village de Maisontiers, entre la route départementale 137 où se trouve son entrée, et le ruisseau la Taconnière. Le château est inscrit partiellement aux M.H.en 1957, puis en 2005 et en totalité avec, le domaine, depuis fin 2013.","habitants":"Famille de Tusseau\r\n        \"","divers":"Château de Maisontiers GPS : 46° 46' 38\" Nord, 0° 14' 47\" Ouest","gps":"46° 46' 38\" Nord, 0° 14' 47\" Ouest","images":["../image/image_79/79_Maisontiers_1.jpg","../image/image_79/79_Maisontiers_2.jpg","../image/image_79/79_Maisontiers_3.jpg","../image/image_79/79_Maisontiers_4.jpg"]},"Consult_chateau_formulaired02d":{"id":"Consult_chateau_formulaired02d","dept":"79","canton":"Thouars","commune":"Missé","nom":"Marsay","type":"Manoir","periode":"XV-XVII","histoire":"MARSAY, le fief de Marsay dit aussi de Missey relevait jadis de Thouars. Il fut possédé par la famille Acton depuis le début du XVe siècle au moins jusqu'à la Révolution. En effet, en 1419, Geoffroy Acton, seigneur de Marsay, rendait aveu au vicomte de Thouars pour les lieux et hébergement. Le dernier représentant de cette famille mourut célibataire peu de temps avant la Révolution. Le château fut mis en vente en 1793, à Jean Loury, orfèvre. Il fut l'ancêtre des actuels propriétaires.  Le château a appartenut à Mme de Montespan. Il possède une chapelle dans une tour, un pigeonnier et une poterne encadrée de deux tours.","architecture":"MARSAY, deux constructions ont précédé l'actuel château. La première daterait du XIe siècle et consistait en un fortin dont il reste une salle voûtée et fortifiée et une tour. La seconde remonterait au XVe ou XVIe siècle. Le château actuel fut édifié, pour partie, à partir d'un ancien donjon dont il est difficile de définir la date et l'origine. Elégant, raffiné, Marsay présente une longue façade éclairée et est couvert d'une toiture à deux pans en ardoises. Une partie des bâtiments, remontant à la fin du Moyen-Age, a été détruite pour permettre aux habitants de l'actuelle demeure de mieux profiter de la vue sur le Thouet. Une grande avenue donne accès à la cour d'honneur limitée, en son entrée, par deux tours rondes. Celle située à l'ouest est transformée en chapelle. Le château lui-même comprend un simple corps de logis. Une aile située en retour d'équerre, au nord, a été détruite au XIXe siècle. L'intérieur conserve un escalier en pierre à balustres, tournant à gauche, ainsi que le trumeau de la cheminée du salon réalisée au XIXe siècle, qui renferme une toile attribuée à Mignard.","habitants":"famille Acton                                                                                 Mme de Montespan\r\n        \"","divers":"A Missé;  Marsay: 46° 56' 41\" et 0° 09' 41\" Ouest","gps":"","images":["../image/image_79/79_Marsay_1.jpg","../image/image_79/79_Marsay_2.jpg","../image/image_79/79_Marsay_3.jpg","../image/image_79/79_Marsay_4.jpg"]},"Consult_chateau_formulairefde0":{"id":"Consult_chateau_formulairefde0","dept":"79","canton":"Mauléon","commune":"Mauléon","nom":"Mauléon","type":"Château-vestiges","periode":"XI-XV","histoire":"Trois châteaux à Mauléon celui de Mauléon, de la Blandinière et vestiges de la Cantinière.                                                                                                     BLANDINIERE, château construit pour Alexis Hongres. Depuis se succédèrent de nombreuses familles : les Eschalard et les Yonques au début du XVIe siècle, les Pontlevoy, les Poirot et les de Pierres après la Révolution, les Bois-Jourdan, les Le Large, les Coulonges, les Villoutreys et les Poul Piquet depuis 1946.                                                     MAULEON, au XIIe siècle, une fortification est construite sur le haut d'une colline et en possession de la famille Mauléon. En 1233, la place forte appartient à la famille Touars. Au XVIIIe siècle, le domaine appartient au duc de Châtillon. Vers 1792, les Révolutionnaires s'emparent des ruines puis les vendent comme bien national.  Au XIXe siècle, le château héberge une gendarmerie. Au début du XXe siècle, le site devient un centre catholique. En 1942, le vestige est inscrit aux M.H..  En 1990, la ville de Mauléon achète le château puis aménage dans ses entrailles la mairie et un cinéma.                                                                                                                                    la CANTINIERE, la Cantinière tient son nom des ses premiers seigneurs, les Cantineau. En 1632, un pavillon refermant la chapelle est construit. Le château, qui était encore habité après 1914, a pratiquement disparu sous la végétation.","architecture":"BLANDINIERE, construit à la fin du XVe siècle et dans la première moitié du XVIe, il a conservé son agencement médiéval avec ses murs d'enceinte et ses différentes entrées fortifiées. Une chapelle, accolée à l'entrée principale, conserve de belles voûtes à liernes et tiercerons en granit. Le logis comporte une tour centrale abritant un escalier dans ses premiers niveaux et des salles privées aux étages supérieurs, seule la porte fortifiée rappelle l'origine médiévale.                                                                                                    MAULEON, mentionnée pour la première fois au XIe siècle. Au XIIIe siècle, le château n'est plus un verrou militaire, il ne comporte qu'une petite garnison. Au XIVe siècle, le château est abandonné. En 1597, durant les guerres de religion, à la tête d'une puissante armée, Henri III de Navarre s'empare du château. Au XVIIe siècle, le Cardinal de Richelieu en ordonne la démolition.  Reconstruction des fortifications de la ville et du château au début du XIIIe siècle. Au XVIe siècle, destruction pendant les guerres de religion, et ce qui restait des murailles est rasé au XVIIe siècle sur ordre de Richelieu. Construction au XVIIIe siècle de la sénéchaussée sur l'esplanade du château.                                                                                     la CANTINIERE, Sa partie la plus ancienne remontait au XVe siècle. Il fut ensuite remanié en 1632 et 1765. Seuls quelques pans de murs sont encore debout, ainsi que deux tours. La Cantinière est entièrement entourée de douves en eau et l'accès se fait par un ancien pont.","habitants":"Familles les Eschalard                                                    Famille Touars\r\n        \"","divers":"Mauléon;   Grav 1-2.  46° 55' 25\" nord, 0° 45' 16\"  ouest                        Blandinières Grav de 4à 7 46° 56' 03\"  nord, 0° 47' 00\"  ouest                                             Jouin Grav 3                Durbelière grav 8_9","gps":"","images":["../image/image_79/79_Maul%c3%a9on_1.jpg","../image/image_79/79_Maul%c3%a9on_2.jpg","../image/image_79/79_Maul%c3%a9on_3.jpg","../image/image_79/79_Maul%c3%a9on_4.jpg","../image/image_79/79_Maul%c3%a9on_5.jpg","../image/image_79/79_Maul%c3%a9on_6.jpg","../image/image_79/79_Maul%c3%a9on_7.jpg","../image/image_79/79_Maul%c3%a9on_8.jpg","../image/image_79/79_Maul%c3%a9on_9.jpg"]},"Consult_chateau_formulaire7378":{"id":"Consult_chateau_formulaire7378","dept":"79","canton":"La Gâtine","commune":"Oroux","nom":"Maurivet_Oroux","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux à Oroux dont celui d'Oroux et celui de Maurivet. MAURIVET, au XVe siècle construit par les Garnier, la seigneurie de Maurivet fut \"saisie réellement et adjugée par décret aux requêtes du Palais, à Paris, le 20 septembre 1702, au cousin au quatrième degré dudit Emmanuel-François Garnier, Pierre Cossin. Au XVIIIe siècle,  les Garnier de Maurivet s'éteignent avec Emmanuel-François baron de Bouillac. Pierre Cossin seigneur de la Braudière. La transformation par Henri Elie Cossin, du parc redessiné dans le goût de le Nôtre, puis reconstruction de la chapelle placée sous le vocable de Notre-Dame de Pitié à lemplacement dun ancien oratoire détruit hors des guerres de religion, flanquement du corps central par deux pavillons. Puis passera en héritage  aux Marcé changera de mains à plusieurs reprises dans le cours du XXe siècle La Famille Le Vaillant de Chaudenay a vendu le château d'Oroux en 1999. La Famille Ambrogi y réside depuis et a entrepris dimportants travaux de restauration et à la famille Desforges. Le Château de Maurivet est inscrit et classé aux M.H. depuis 1988                                      OROUX cette seigneurie était connu jadis sous le nom de Saint-Denis d'Oroux, Arthur Rataud, chevalier, était seigneur d'Oroux au XVIe siècle. Le 2 octobre 1537  Louis Jourdain, écuyer, seigneur des Forges échangea la seigneurie de St-Denis d'Oroux qu'il avait eue du seigneur de Curzay, avec Adrien Vernon, écuyer, qui lui céda l'hôtel et maison de Boisfremin. A partir de 1680, la seigneurie de Saint-Denis d'Oroux appartient aux des Francs, César des Francs et François, son fils, sont dits seigneurs de Saint-Denis.","architecture":"MAURIVET, cest entre 1490 et 1530, vraisemblablement en deux temps, que fut élevé le corps principal de Maurivet, construit par les Garnier. Au début du XIXe siècle ajout pour Louis Joseph Cossin, de deux ailes basses pour servir de communs et fermer la cour du château.  Le corps de logis primitif qui compte quatre travées est élevés sur un rez-de-chaussée, un étage et un niveau de comble éclairé par des lucarnes sommet de frontons, comporte en son centre un édicule percée d'une baie et coiffé d'un toit indépendant. Les éléments architecturaux de la Renaissance, situés essentiellement sur la façade antérieure du pavillon central ainsi qu'une cheminée monumentale sculptée, côtoient les ajouts postérieurs, offrent l'aspect d'un ensemble typique de la Gâtine.                                                                                                          OROUX, le château, situé au cur du village se compose de deux corps de bâtiments disposés en retour déquerre datant du XVe siècle sur des fondations gallo-romaines et romanes, au XVIIIe siècle. Une tour circulaire, en partie rasée abrite la chapelle Sainte-Néomaye construite par Mme de Maurivet. Le château fait lobjet de restauration depuis quelques années. L'édifice est remarquable notamment pour son grand portail en granit, aux toitures d'ardoises à la Mansart, son très bel escalier à vis et ses cheminées en granit, situés dans le logis du XVe siècle.","habitants":"Famille des Garnier de Maurivet                                                   Oroux; famille d' Arthur Rataud,\r\n        \"","divers":"A Oroux;  Maurivet GPS : 46° 42' 15\" Nord, 0° 05' 16\" Ouest     Oroux grav 1 à 4   Maurivet grav de 5 à 9","gps":"46° 42' 15\" Nord, 0° 05' 16\" Ouest     Oroux grav 1 à 4   Ma","images":["../image/image_79/79_Maurivet_Oroux_1.jpg","../image/image_79/79_Maurivet_Oroux_2.jpg","../image/image_79/79_Maurivet_Oroux_3.jpg","../image/image_79/79_Maurivet_Oroux_4.jpg","../image/image_79/79_Maurivet_Oroux_5.jpg","../image/image_79/79_Maurivet_Oroux_6.jpg","../image/image_79/79_Maurivet_Oroux_7.jpg","../image/image_79/79_Maurivet_Oroux_8.jpg","../image/image_79/79_Maurivet_Oroux_9.jpg"]},"Consult_chateau_formulaire0a74-2":{"id":"Consult_chateau_formulaire0a74-2","dept":"79","canton":"La Gâtine","commune":"Mazières en Gatines","nom":"Mazières_Gatines","type":"Palace-Manoir","periode":"XIX","histoire":"Deux châteaux à Mazières en Gatines celui de Mazières et celui de la Ménardière.                                                                                                    MENARDIERE, situé sur la commune de Mazières-en-Gâtine, est une demeure de la fin du XIXe siècle. On doit sa construction à Eugène Proust, riche bourgeois de Mazières qui devint maire de cette commune en 1881. En 1898, sa veuve légua La Ménardière à la commune, à la seule condition que la demeure soit transformée en hospice, mais ses héritiers ayant attaqué le testament, son souhait ne put s'accomplir qu'en 1959.                                                                      MAZIERES dit PETIT CHENE,  était, à l'origine, une seigneurie. Vers 1780, le château fut entièrement reconstruit et l'entrepreneur utilisa beaucoup de matériaux provenant d'anciens châteaux en ruines. La façade comportait deux ailes en retour avec, au-devant, une vaste cour d'honneur. La façade postérieure s'ouvrait sur un jardin avec orangerie. Il y avait plusieurs pièces d'eau et des bosquets aménagés. A la Révolution, le Petit-Chêne fut vendu comme bien national puis récupérer par le marquis à son retour d'émigration.","architecture":"MENARDIERE, est une construction massive, presque carrée. La façade principale est flanquée d'une tourelle sur un de ses angles, tandis qu'à l'autre extrémité, en retrait, s'élève une tour carrée. La façade arrière est ornée sur chacun de ses angles d'une tourelle en surplomb.                                                            PETIT CHENE, en 1843, le château fut totalement transformé. Les deux ailes furent démolies et l'édifice fut mis au goût de l'époque (style Louis XIII). Le château présente un corps de logis principal rectangulaire, avec pavillon central. Deux ailes en retour cantonnent la façade Est, donnant sur cour. Il s'étage sur deux niveaux, plus combles. Les lucarnes ont une forme variée, allant de l'oculus à la lucarne sans décor ou à la lucarne à fronton et ailerons. La façade postérieure est agrémentée, au-devant du pavillon central, d'un porche hors-oeuvre formant terrasse au deuxième niveau. Ce porche à demi-ouvert sur le parc, présente une avancée semi-circulaire soutenue par quatre piles rondes à chapiteaux toscans. L'entablement est décoré d'une frise sculptée. La façade sud possède également un porche hors-oeuvre. Une frise à décor végétal et une agrafe, décorent l'entablement. Des chapiteaux ioniques marquent les angles de ce porche.","habitants":"Familles d'Eugène Proust\r\n        \"","divers":"A Mazières en Gatines; le petit chêne grav de 1 à 4                             46° 32' 00\"  nord, 0° 19' 20\"  ouest                                                     Ménardière grav de 6 à 8","gps":"","images":["../image/image_79/79_Mazi%c3%a8res_Gatines_1.jpg","../image/image_79/79_Mazi%c3%a8res_Gatines_2.jpg","../image/image_79/79_Mazi%c3%a8res_Gatines_3.jpg","../image/image_79/79_Mazi%c3%a8res_Gatines_4.jpg","../image/image_79/79_Mazi%c3%a8res_Gatines_5.jpg","../image/image_79/79_Mazi%c3%a8res_Gatines_6.jpg","../image/image_79/79_Mazi%c3%a8res_Gatines_7.jpg","../image/image_79/79_Mazi%c3%a8res_Gatines_8.jpg"]},"Consult_chateau_formulaire96c0":{"id":"Consult_chateau_formulaire96c0","dept":"79","canton":"Parthenay","commune":"Beaulieu sous Parthenay","nom":"Meilleraye","type":"Vestiges","periode":"XIV-XVII","histoire":"MEILLERAYE, il fut acheté le 12 novembre 1574 par Jean de la Porte, apothicaire, à la famille Marafin qui avait succédé, dans la deuxième moitié du XVe siècle, aux Liniers, premiers possesseurs connus. Son neveu Charles I de la Porte,  hérita de La Meilleraye en 1585 et fit construire, vers 1620, par l'architecte Clément Métezeau,  un nouveau château. Marié à Claude de Champlais, il eut un fils qui était le maréchal Charles de la Porte, duc de La Meilleraye, sa tante Suzanne de la Porte épouse de François du Plessis, était la mère du cardinal de Richelieu. Charles II épousa en 1637, en deuxièmes noces, Marie de Cossé-Brissac qui vécut à La Meilleraye avec le jeune Armand Charles, son beau-fils, né en 1632 d'un premier mariage de son époux avec Marie d'Effiat. Armand Charles épousa, en 1661, Hortense Mancini, nièce du cardinal Manzarin, et devint la même année duc de Mazarin, à la mort du cardinal. Il mena un train de vie princier et à la mort de son père en 1664, il hérita de toutes les charges que celui-ci occupait en Bretagne et à la cour de France. Malheureusement, il perdit la faveur royale et sa femme Hortense le quitta. Il était fort laid et austère et elle était belle et volage. Armand Charles se retira alors en 1673 à La Meilleraye, devint seigneur dévot, généreux, charitable et y mourut en 1713. Son fils, Guy Paul Jules, se distingua dans les armées de Louis XIV, il eut pour héritier un fils Guy Paul Jules, qui abandonna le château et en confia la garde à son serviteur, Claude François Gallas et à son fils Pierre François Gallas, concierge. Le château décadant fut vendu en 1776 au comte d'Artois, frère de Louis XVI.","architecture":"MEILLERAYE, un petit manoir féodal, relevant de la baronnie de Parthenay, s'élevait jadis sur l'emplacement du futur et beau château de La Meilleraye qui fut séquestrée comme bien d'émigré, puis elle servit de carrière, exploitée par tous les propriétaires successifs. La statue du cardinal Richelieu fut brisée et la tête servit de contrepoids à un tourne broche. Le château formait un quadrilatère entouré de douves pleines d'eau. Un pont en bois donne accès à ce qui fut sans doute la cour d'honneur. A l'opposé, un autre pont donne accès au corps de logis principal. Ce château devait se composer d'une cour centrale entourée de bâtiments, avec corps de logis principal et deux ailes en retour. Les autres parties du quadrilatère étaient formées par des bâtiments de service dont seules les caves subsistent. Le corps de logis principal devait être imposant, construit dans le style du début du XVIIe siècle, en granit. Au centre, une grande porte encadrée de deux colonnes doriques avec entablement sans décor, devait ouvrir sur les pièces de réception.","habitants":"famille Marafin                                                                           maréchal Charles de la Porte\r\n        \"","divers":"A  Beaulieu sous Parthenay ;  La Meilleraye 46° 34' 58\"  nord, 0° 14' 35\"  ouest","gps":"","images":["../image/image_79/79_Meilleraye_1.jpg","../image/image_79/79_Meilleraye_2.jpg","../image/image_79/79_Meilleraye_3.jpg","../image/image_79/79_Meilleraye_4.jpg"]},"Consult_chateau_formulaireea1f":{"id":"Consult_chateau_formulaireea1f","dept":"79","canton":"Cerizay","commune":"Moncoutant","nom":"Moncoutant","type":"Château","periode":"XV-XIX","histoire":"Deux châteaux à Moncoutant celui de Genève et celui Puy Cadoré. GENEVE, situé dans le bourg de Moncoutant, le château de Genève doit son nom au fait que pendant les guerres de religion, Moncoutant devint le refuge de nombreux calvinistes, ce qui avait valu à la cité de Moncoutant d'être surnommée \"la petite Genève\". Le château actuel a été construit au XIXe siècle. Il a longtemps appartenu à la famille Puichaud, qui a donné quelques maires à la commune. Racheté par la municipalité, il abrite aujourd'hui la bibliothèque municipale.                                                                                             PUY CADORE, en effet, à la fin du quinzième siècle, les seigneurs donnèrent à leurs habitations quelque chose de moins belliqueux ; au XVIe siècle, à la tête d'une bande d'aventuriers qui ravagèrent la région, le seigneur de Picadoré se racheta en allant prêter main-forte au seigneur de Bressuire. Il agit de même avec celui de Parthenay menacé par les ligueurs. Diverses légendes s'attachent à la forteresse-observatoire que le sire de Picadoré, qui n'avait pas que des amis, avait fait bâtir afin d'assurer sa propre défense, et si solidement qu'elle a résisté aux injures du temps.  Racheté par Patrick Goubeau.","architecture":"GENEVE, corps de logis rectangulaire à deux niveaux avec lucarnes sur combles flanqués aux extrémitées de la façade sur la droite d'une tour carrée  à trois niveaux  avec tourelles accolées  à l'opposée tourelle à toit en poivrière, plein cintre en façade  un avant corps à trois niveaux toit en poivrière, l'ensemble recouvert d'ardoises.                                                                                                            PUY -CADORE, la tour du Puy Cadoré, placée sur le chemin de Chantemerle à Moncoutant. D'un côté, elle est ronde, et l'extrémité opposée est triangulaire. La porte, qui était assez élevée au-dessus des douves, conduit à un rez-de-chaussée où se trouvent un puits et un lavoir. Tous les étages, qui sont éclairés par des fenêtres carrées, sont occupés par deux appartements : l'un est assez grand, et l'autre, qui est beaucoup plus petit, est dans l'angle de la tour que surmontent des mâchicoulis, mais point de galerie, point de créneaux. La tour de Puy Cadoré ressemble à celle de Joué ; ce n'est plus qu'une pâle imitation.","habitants":"Genève amille Puichaud                                                                 Puy Cadore\r\n        \r\n        \"","divers":"A Moncoutant; château de Genève grav 1-2.  Puy Cadoré Grav 3-4-5","gps":"","images":["../image/image_79/79_Moncoutant_1.jpg","../image/image_79/79_Moncoutant_2.jpg","../image/image_79/79_Moncoutant_3.jpg","../image/image_79/79_Moncoutant_4.jpg","../image/image_79/79_Moncoutant_5.jpg"]},"Consult_chateau_formulaire3543":{"id":"Consult_chateau_formulaire3543","dept":"79","canton":"Celles-sur-Belle","commune":"La Mothe Saint-Héray","nom":"Mothe_St_Héray","type":"Château","periode":"XVII","histoire":"MOTHE-ST-HERAY, entre 1604 et 1608, transformation du château-fort en logis, par Jacques Trotin : réaménagement des corps de bâtiments, entre les tours en conservant l'entrée fortifiée pour Jean de Baudean, le nouveau seigneur de La Mothe Saint-Héray. Son fils Henri et Catherine de Pardailhan Armagnac, son épouse, ont fait élever entre 1634 et 1640 une orangerie surmontée d'une grande salle et accompagnée de deux pavillons par Nicolas Tillon, maître maçon du château de Richelieu dans l'Indre et Loire, dont les sculptures sont probablement dues à Jacques Nadeau et Jean Sauvage.  En 1778 deux projets de réaménagement du château, de reconstruction des communs et le tracé d'un parc, par Lequin de la Tour et le Niortais Bernard d'Aguescy, faits pour Amédée de Carvoisin, fils du seigneur de La Mothe, n'ont pas abouti,  pendant la Révolution, le domaine n'a pas été aliéné comme bien national. En 1840 le domaine a été vendu en lots et l'acquéreur du logis l'a fait démolir. De nombreuses sculptures ont été remployées dans les maisons du canton, une partie des communs a été conservée et transformée en plusieurs fermes.  Après de multiples usages, l'Orangerie, acquise en 1928 par la commune La Mothe Saint Héray, a été restaurée de 1928 à 1953, ainsi que  les pavillons.","architecture":"ORANGERIE  c'est un long bâtiment à 2 niveaux , de style Louis XIII. C'est l'ancienne dépendance de l'ancien château des Baudéan-Parabère. Une dame de Parabère fut la maîtresse de Philippe d'Orléans, régent de France puis le château appartiendra à la famille des Carvoisin. Le château de l'Orangerie date de 1632 à 1634, par Nicolas Tillon, maître-maçon de Richelieu,  dans l'orangerie jusqu'à son départ avec son épouse Caroline Bonaparte pour régner à Naples, Napoléon Ier la donna au général Georges Mouton, qu'il fit comte de Lobau  avant d'être élevé par Louis-Philippe Ier successivement aux dignités de maréchal (1831) puis de pair de France (1833)  en instituant un majorat sur la terre de la Mothe. Celui-ci décédé sans héritier, en 1838, le domaine revint à lÉtat, qui le mit en vente. S'ensuivit en 1842 la démolition quasi totale du château médiéval que les vues du XIXe siècle montrent cerné de douves en eau. Mais, en 1925, l'Orangerie fut partiellement démontée pour être transportée outre-Atlantique, chose qui fut interrompue par lÉtat. Vestiges visibles du mobilier de la demeure, le tableau d'Abel Grimou Le marquis d'Artaguiette  ainsi qu'un ensemble de lambris peints du XVIIe siècle ont été conservés au musée d'Agesci à Niort. Restaurée à partir de 1997 et agrémentée d'un jardin à la française créé sur ce qui était devenu une cour et d'un canal, l'ancienne Prangerie est le théâtre de nombreuses manifestations culturelles et peut être aussi louée pour des évènements familiaux.","habitants":"La Mothe Famille de Jacques Trotin                                     Orangerie Fammille des Carvoisin\r\n        \"","divers":"A  La Mothe Saint-Héray;  Orangerie, grav 4-5-6 6   : 46° 21' 21\" Nord, 0° 06' 32\" Ouest .                                                                 Mothe  grav 1-2- 3      46° 22' 30\" Nord et 0° 07' 23\" Ouest","gps":"","images":["../image/image_79/79_Mothe_St_H%c3%a9ray_1.jpg","../image/image_79/79_Mothe_St_H%c3%a9ray_2.jpg","../image/image_79/79_Mothe_St_H%c3%a9ray_3.jpg","../image/image_79/79_Mothe_St_H%c3%a9ray_4.jpg","../image/image_79/79_Mothe_St_H%c3%a9ray_5.jpg","../image/image_79/79_Mothe_St_H%c3%a9ray_6.jpg"]},"Consult_chateau_formulaired8ab":{"id":"Consult_chateau_formulaired8ab","dept":"79","canton":"Autize-Égray","commune":"Saint-Pompain","nom":"Moulières","type":"Château","periode":"XVIII","histoire":"MOULIERES, dès le XVe siècle, la terre des Moulières e
