izay","commune":"Absie","nom":"Abbaye_Absie","type":"Château","periode":"XIX","histoire":"ABSIE Abbaye, le château fut édifié autour de 1870 sur les restes de l'ancienne abbaye cistercienne. On doit sa construction à Emile Brie. Ce dernier a d'ailleurs laissé ses initiales au-dessus de la porte d'entrée du château,  il est ensuite passé aux Taudière par le mariage d'Emily Brie avec Jacques Henri Taudière dont le père Jacques-Paul fut député de 1889 à 1893. Encore par mariage, l'Abbaye échut dans la famille Guépin qui a conservé le château jusqu'en 1986, date à laquelle il a été acquis par la commune de l'Absie.","architecture":"ABSIE, le château de l'Abbaye est une construction de type rectangulaire, chaque extrémité de la demeure est flanquée d'un haut pavillon rectangulaire dont l'un est en saillie alors que l'autre est en retrait par rapport au corps de logis principal. Les lucarnes des pavillons aux frontons cintrés et coiffées d'un acrotère, viennent agrémenter la demeure à l'allure quelque peu sévère.","habitants":"Famille Brie\r\n        \r\n        \r\n        \"","divers":"Le château d'Absie 46° 38' 03? nord, 0° 34' 30? ouest","gps":"","images":["../image/image_79/79_Abbaye_Absie_1.jpg","../image/image_79/79_Abbaye_Absie_2.jpg","../image/image_79/79_Abbaye_Absie_3.jpg"]},"Consult_chateau_formulaireba10":{"id":"Consult_chateau_formulaireba10","dept":"79","canton":"Le Val de Touhet","commune":"Airvault","nom":"Airvault","type":"Château","periode":"XI-XV","histoire":"Deux châteaux à Airvault celui de Barroux (voir article), de Soulièvres et de Vernay.                                                                                                                                        AIRVAULT dit de Soulièvres , construit à la fin du XIIe siècle ou au début du XIIIe. En 1207, le château sera assiégé et conquis par le roi Philippe Auguste. Le 22/09/1565, Jean Ysoré, Baron dAirvault accueillit le roi Charles IX et le petit prince de Navarre (futur roi Henri IV). Le 3/10/1569, après la bataille de Moncontour qui vit la victoire du Duc dAnjou (le futur Henri III), Gaspard de Coligny qui commandait les calvinistes battus ordonna de mettre le feu au château pour se venger de René Ysoré (fils de Jean Ysoré) qui avait contribué à sa défaite. Incendié, le château d'Airvault sera abandonné par ses propriétaires. Au début de la seconde guerre mondiale, le ministère du Travail s'est installé dans le château de Soulièvres jusqu'à l'arrivée des Allemands. Le montant des dommages de guerre, visant à réparer les dégâts causés sur l'édifice, n'a pas suffi au marquis de Maussabré pour la restauration de ses deux propriétés Les fonds destinés au château de Soulièvres ont pu être affectés au château de Saint-Loup-sur-Thouet, à condition que l'édifice auquel a renoncé son propriétaire soit détruit, comme le veut la loi. C'est ainsi que, le 6 avril 1955, le château de Soulièvres a été soufflé par 150 kilos d'explosifs disposés par une entreprise parthenaysienne. Par chance, les écuries ont été conservées ainsi que la chapelle et le pavillon de chasse. Au début du XXe siècle, le propriétaire du château d'Airvault fit construire un logement dans la basse-cour, le château d'Airvault est classé aux M.H. en 1929 et 2007.","architecture":"AIRVAULT,  sa construction aurait débuté au XIe siècle sur un ancien castrum et se serait achevée au XVe siècle, de forme  rectangulaire avec d'épaisses murailles présentant des restes de créneaux, des archères et un chemin de ronde. Dans les années 1940, le crénelage de l'enceinte a été arasé. Deux des angles de l'enceinte sont munis d'une tour quadrangulaire rajoutée en biais sur le rempart à l'aide d'un arc reliant les deux côtés de l'angle, mode de construction régionale du XIIIe ou XIVe siècle, la cour est accessible au sud-ouest par un châtelet rectangulaire défendu par une bretèche et des hourds, et percé d'une porte à herse et assommoir. Le long de la courtine ouest se trouve le corps de logis principal du XVe siècle. Les dépendances consistent en une prison à l'est et une écurie à l'ouest. Dans les années 1920, le propriétaire a fait construire sa maison dans la basse-cour et projetait de détruire le château pour en vendre les matériaux.                  VERNAY, attesté en 1144, il semble ne rester aucun vestige visible de cette période, ni même antérieur au XVIe siècle. De plan carré, il présente des façades classiques et une toiture à la Mansart. Deux tours rondes subsistent à l'ouest, devant un grand bassin alimenté par un aqueduc de 1400 mètres de long. Sous le règne de Henri II Plantagenêt, le seigneur de Vernay fut complice de l'assassinat de Thomas Becket, archevêque de Canterbury (Angleterre). Ce dernier, martyrisé dans sa cathédrale, fut rapidement canonisé.","habitants":"Famille de Jean Ysoré\r\n        \"","divers":"Airvault grav 1-2-3-4 , 46° 49' 39\" nord, 0° 08' 17\" ouest.   soulièvres grav 5-6 Vernay grav 8","gps":"","images":["../image/image_79/79_Airvault_1.jpg","../image/image_79/79_Airvault_2.jpg","../image/image_79/79_Airvault_3.jpg","../image/image_79/79_Airvault_4.html","../image/image_79/79_Airvault_5.jpg","../image/image_79/79_Airvault_6.jpg","../image/image_79/79_Airvault_7.jpg","../image/image_79/79_Airvault_8.jpg"]},"Consult_chateau_formulaire391c":{"id":"Consult_chateau_formulaire391c","dept":"79","canton":"Frontenay-Rohan-Rohan","commune":"Arçais","nom":"Arcais","type":"Château","periode":"XIX","histoire":"ARCAIS, le château d'Arçais est un château bâti à Arçais, ce château situé à l'embarcadère date du XIXe siècle","architecture":"ARCAIS,  il est de style classique, avant les aménagements et travaux de dessiccation successifs, la région était largement recouverte par la mer et le village se trouvait en bordure du golfe des Pictons. Par la suite Arçais est devenue une localité active qui a connu son apogée au XIXe siècle, comme en témoignent notamment les deux reproductions d'anciennes grues en bois du port, grâce auxquelles les découpes de peupliers étaient hissées sur le quai, ainsi que, toute proche, la maison classique construite en 1829 et dont les onze entrepôts en contrebas servaient à ranger du poisson, du vin ou du bois.","habitants":"Seigneur local\r\n        \r\n        \"","divers":"Chaâteau d'Arçais à Arçais","gps":"","images":["../image/image_79/79_Arcais_1.jpg","../image/image_79/79_Arcais_2.jpg"]},"Consult_chateau_formulaire0b20":{"id":"Consult_chateau_formulaire0b20","dept":"79","canton":"Autize-Égray","commune":"Ardin","nom":"Ardin","type":"Château","periode":"XIII-XVIII","histoire":"Trois châteaux à Ardin dont Bois-Rataut, Dilay et Payré.                           BOIS-RATAUT, d'abord appelé Bois d'Ardin, l'édifice probablement antérieur au XIIIe siècle, prit le nom de la famille Ratault qui l'acheta au XIVe siècle. En 1500, Antoine de Nouzières le céda à François de Brilhac, dont l'un des descendants Pierre, fut premier président au parlement de Rennes. La belle-fille de ce dernier le vendit à Pallardy, seigneur de Montigny, puis le château fut acquis, vers 1750, par René Quentin Desprez d'Ambreuil de Montpezat. Son fils ayant émigré en 1791, son domaine fut vendu comme bien national le 18 floréal an II à Augustin Delarue et à la veuve Doucet, et revendu le 27 thermidor an III au conventionnel Chauvin Hersant. Il est aujourd'hui la propriété de ses descendants .                                      DILAY, fut construit au XVIIIe siècle, ceint de douves dont le premier propriétaire connu, en 1371, fut Jean Bigot qui le transmit à ses descendants directs jusqu'aux environs de 1560. Le premier édifice ayant été détruit par un incendie en 1705, Marguerite de Châteauneuf, veuve de Léonard de Gousse, le fit rebâtir dans le goût de l'époque. Son arrière petit fils Armand-Henri-Hercule de Gaumont émigra, et le château fut donc vendu au profit de la Nation à Pierre Godard, chef de bataillon, le II prairial an VI, ses descendants le cédèrent en 1887 à M. Alphonse Lavois. Vendu à nouveau, il abrita une colonie de vacances, avant d'être acquis par son actuel propriétaire.","architecture":"BOIS-RATAUT, du château féodal primitif subsistent deux tours rondes massives encadrant un logis couvert de tuiles. La tour Est découronnée a perdu son chemin de ronde crénelé au XVe siècle. Deux pilastres encadrant la porte de la façade qui donne sur la cour d'honneur sont ornés de chapiteaux Renaissance. L'autre façade ouvre sur un parc ombragé de grands arbres et domine la vallée de l'Autize. PAYRE, le 3 mars 1449, Clément Grimouard, par sa mère, Jeanne de Mazée, dame du Péré, était alors co-propriétaire d'un ensemble peu important constitué d'une \"pré-clôture\" autour de son habitation.  les Grimouard à partir du XVe siècle. A la Révolution, le domaine du Payré, métairie, château,  fuie et terre fut acheté par le citoyen Jérôme Martineau de Coulonges, mais après les vicissitudes de cette période, le château et les terres reviendront entre les mains de la famille Grimouard. Incendié en 1836 a entraîné des modifications et réemplois d'éléments anciens dans les bâtiments d'exploitation. La tour témoigne comment l'ensemble des défenses avait été combiné pour permettre le tir croisé d'armes à feu                                                                           DILAY  Le corps de logis rectangulaire est flanqué de deux ailes en saillie, la façade donne sur une terrasse où poussent de magnifiques cèdres. A l'ouest, sur la façade latérale, une inscription rappelle les circonstances de la reconstruction ; elle est surmontée de l'écu sculpté des Châteauneuf.","habitants":"Famille Ratault                                                                                  Dilay; Marguerite de Châteauneuf,                                             Payre;  les Grimouard\r\n        \"","divers":"A Ardin , Bois-Rataut grav 1-2-3,                                                         Dilay grav 4,                                                                                   Payré grav  5-6","gps":"","images":["../image/image_79/79_Ardin_1.jpg","../image/image_79/79_Ardin_2.jpg","../image/image_79/79_Ardin_3.jpg","../image/image_79/79_Ardin_4.jpg","../image/image_79/79_Ardin_5.jpg","../image/image_79/79_Ardin_6.jpg"]},"Consult_chateau_formulaire66f8":{"id":"Consult_chateau_formulaire66f8","dept":"79","canton":"Bressuire","commune":"Argenton Château","nom":"Argenton","type":"Vestiges","periode":"XV","histoire":"Quatre châteaux à Argenton celui d'Argenton,  de Condrie, de Mazières et de la Prune au Poi pas d'information pour ses deux derniers.                                                                                                                                                      ARGENTON,  imposant château bâti autour de l'an mil, il ne reste aujourd'hui que des remparts. A la fin du XVe siècle, Philippe de Commynes, seigneur dArgenton et conseiller diplomatique reçut le roi de France Louis XI et de nombreux ambassadeurs. C'est aux alentours de 1830, que le château fut incendié, durant les guerres de Vendée puis il fut rasé, les visiteurs découvriront ce qu'était le château du temps de Philippe de Commynes, les transformations subies au cours du XIXe siècle, le paysage environnant avec les vallées de lOuère et de lArgenton. Ils peuvent ainsi comprendre le choix stratégique de lemplacement.                                                          COINDRIE à la Coudre 2 km au sud, la seigneurie de la Coindrie est signalée dès le XIIIe siècle. Elle appartenait alors à Pierre Garnier, seigneur de Villedon, qui fut maire de Poitiers de 1230 à 1239. Les Garnier possédaient encore la Coindrie à la fin du XIVe siècle. Un siècle plus tard, elle était passée aux mains des La Coudre qui la passèrent par le mariage aux Guillet dont les descendants possédaient encore la terre de la Coindrie jusque vers le milieu du XVIIe siècle. Elle fut plus tard propriété des Richeteau.","architecture":"ARGENTON, abrité derrière ses remparts, le château-fort, construit à la fin du XVe siècle, sélève sur trois niveaux, sa position lui permet dagrandir sa baronnie et dembellir sa maison avec des tapisseries fabriquées à Tournai, sa région de naissance, et des meubles précieux. Sa bibliothèque est renommée dans tout le royaume. Louis XI, qui séjourne souvent à Thouars, est régulièrement reçu à Argenton. Le Roi et son conseiller sentendent bien, on les voit chasser dans la forêt avoisinante et au château, ils senferment de longues heures échafaudant des plans pour asseoir la Couronne de France. Louis XI laissera le souvenir dun Roi retors, mais fin à la politique; quant à Philippe de Commynes, on lui doit de nombreux écrits dont ses mémoires en huit volumes. Son gisant en marbre est visible au musée du Louvre. Du château-fort ne subsistent que les remparts et la belle chapelle Saint-Georges. Elle conserve de très belles fresques du XIe siècle dont un Christ en majesté considéré comme le plus grand du Poitou Charentes.                                                                                 COINBDRIE, il ne subsiste plus rien du château primitif, il fut incendié en 1794 par les Colonnes Infernales. Seules subsistent les douves entourant une construction de la fin du XIXe siècle, présente un aspect massif. Il est construit sur un plan presque carré et largement inspiré du style de la première Renaissance Française. Le château est doté d'un pignon triangulaire en façade, il possède en outre un grand nombre de fenêtres à traverses et à meneaux.","habitants":"Argenton Philippe de Commynes.                                              Coindrie Famille des Guillet\r\n        \r\n        \"","divers":"Argenton grav 1-2,   GPS : 46° 59' 08\" Nord, 0° 26' 54\" Ouest. Coindrie grav 3, Mazière-4, Prune au Poi- grav-5","gps":"46° 59' 08\" Nord, 0° 26' 54\" Ouest. Coindrie grav 3, Mazière","images":["../image/image_79/79_Argenton_1.jpg","../image/image_79/79_Argenton_2.jpg","../image/image_79/79_Argenton_3.jpg","../image/image_79/79_Argenton_4.jpg","../image/image_79/79_Argenton_5.jpg"]},"Consult_chateau_formulairecfe5":{"id":"Consult_chateau_formulairecfe5","dept":"79","canton":"Saint-Maixent-l","commune":"Exireuil","nom":"Aubigny_Sèvres","type":"Forteresse","periode":"XII- XVIII","histoire":"AUBIGNY, était une forteresse et le siège d'une importante seigneurie dont relevaient 163 fiefs. Les seigneurs d'Aubigny étaient également seigneurs de Faye, autre forteresse située au-dessus de Nanteuil. Ils avaient droit de haute, moyenne et basse justice et leurs fourches patibulaires étaient sur le territoire de Nanteuil à la fin du XIe siècle, Aubigny faisait partie des biens de la famille Loubet, l'une des plus riches de la région. Elle possédait de nombreux fiefs dont celui de la Tour-Loubet qui occupait une grande partie de la ville de Saint-Maixent. Vers 1130, Marguerite Loubet, dernière héritière de cette famille, apporta tous ses biens à Thibaud Chabot des seigneurs de Vouvant. Le logis fut érigé en 1564 par Louis de Rochechouart. Les Chabot devenaient seigneurs d'Aubigny et de Faye, la Tour Loubet prenait le nom de la Tour Chabot. En 1744, François de la Broue de Vareilles se rendit acquéreur d'Aubigny et l'aménagea au goût de l'époque. Il fit abattre le donjon, la tour carrée et ce qui restait de l'ancien château, ne gardant que ses deux tours et le logis dans lequel il pratiqua de nouvelles ouvertures.  En 1845, le château d'Aubigny fut transformé en exploitation agricole et changea de mains plusieurs fois. Il était en piteux état lorsqu'en 1968 M. et Mme de Catalan s'en rendirent acquéreurs. Ils en ont entrepris la restauration avec soin et goût.","architecture":"AUBIGNY, le château actuel date de trois époques différentes: les tours, du XIIe siècle et peut-être même du XIe siècle; le logis entre les tours, du XVIe siècle et la construction qui double le logis, du XVIIIe siècle. D'après les documents, on sait que l'ancien château était entouré de douves. Sa façade ouest baignait dans un étang transformé en jardin au XVIe siècle. Il y avait deux enceintes et une 1ère cour dont l'entrée subsiste en partie avec un portail ogival flanqué de deux petites tours. A droite étaient les communs qu'on retrouve dans les bâtiments actuels. A leur extrémité, du côté de la chapelle, se trouvait une porterie avec deux tours et un pont-levis. Cette première cour était séparée de la cour du château par une douve. On passait de l'une à l'autre par un pont-levis. Les infrastructures de deux tours découvertes dans la première cour permettent de supposer qu'elles étaient les défenses du pont-levis. Dans la cour du château se trouvaient outre les bâtiments d'habitation, le donjon et une grosse tour carrée appelée \"la Mélusine\".\r\nIl subsiste des remparts, les pignons nord et sud des bâtiments actuels et reste un chemin de ronde. La chapelle présente la particularité d'être en dehors de l'enceinte. Pour la façade, entre les tours on utilisa l'ancien rempart. Ce logis était simple, il ouvrait par quatre fenêtres sur l'étang et quatre fenêtres sur la cour du donjon. Au dessus de la porte de l'escalier un écusson portant les armes de Louis de Rochechouart, très martelé il menaçait ruine et a dû être remplacé.","habitants":"Famille Loubet                                                                                   Famille Chabot\r\n        \"","divers":"Forteresse d'Aubigny  46° 44' 29? nord, 0° 07' 06? ouest grav 1 à 3 et divers châteaux","gps":"","images":["../image/image_79/79_Aubigny_S%c3%a8vres_1.jpg","../image/image_79/79_Aubigny_S%c3%a8vres_2.jpg","../image/image_79/79_Aubigny_S%c3%a8vres_3.jpg","../image/image_79/79_Aubigny_S%c3%a8vres_4.jpg","../image/image_79/79_Aubigny_S%c3%a8vres_5.jpg"]},"Consult_chateau_formulaireb34a":{"id":"Consult_chateau_formulaireb34a","dept":"79","canton":"Saint-Maixent-l","commune":"Augé","nom":"Augé","type":"Château","periode":"XIX","histoire":"deux châteaux à Augé, celui de Champmargou  et d'Homelière.                                                               CHAMPMARGOU,  a été construit au XIXe siècle à l'emplacement d'un ancien fief, comme en témoignent les trois tours d'origine. Différentes familles s'y succédèrent dont les Regnoux, les de l'Isle et les La Chaussée. Puis pendant près de deux siècles, après son acquisition en 1785 Champmargou resta aux mains d'une famille originaire du saint-maixentais, les Garran de Balzan, dont l'un des membres, François Gabriel, connut une brillante carrière politique en devenant sénateur de 1886 à 1902.                                                           HOMELIERE, le premier habitant de l'Homelière dont on trouve trace est Loys Poussard en 1467;  Lays Poussard qui fait aveu en 1585 à Charles de Vivonne, sénéchal de Saintonge. A la fin du XVIe siècle, la seigneurie de l'Homelière passe aux mains d'un vieux lignage de gentilshommes poitevins : les Clervaux. Vers 1886, cornmenca une longue phase de décrépitude qui dura jusqu'à son achat en 1973, par les propriétaires actuels.","architecture":"CHAMPMARGO, apparaît comme une curieuse composition; les trois tours  plus anciennes flanquent l'angle d'un bâtiment formé de deux corps distincts. Très certainement l'ensemble primitif disposait de quatre tours. La façade principale est récente, avec son toit transversal. L'autre construction, surbaissée aux versants de toits inégaux, est plus ancienne.                                                                                 HOMELIERE, le corps de logis comprend quatre éléments principaux, tous construits en moellons calcaires, seuls les encadrements d'ouvertures étant façonnés en pierres de taille. A gauche une tour ronde de trois niveaux, reçut sans doute à la fin du XVIIe siècle, des balustres de pierre taillée. La partie principale présente une toiture à la Mansart qui associe la tuile canal et l'ardoise. La disposition assez régulière des ouvertures, les lucarnes sommitales aux frontons triangulaires coiffés de pots de feux révèlent un aménagement de façade effectué sous Louis XIII ou Louis XIV, seule la porte en bas à droite marquant par son néo-classicisme le début du XIXe siècle.","habitants":"Champagnou; Famille de  Garran de Balzan   Homeliere ; Loys Poussard \r\n        \"","divers":"Champmargou grav 1 à 3 et Homelière de 4 à 6","gps":"","images":["../image/image_79/79_Aug%c3%a9_1.jpg","../image/image_79/79_Aug%c3%a9_2.jpg","../image/image_79/79_Aug%c3%a9_3.jpg","../image/image_79/79_Aug%c3%a9_4.jpg","../image/image_79/79_Aug%c3%a9_5.jpg","../image/image_79/79_Aug%c3%a9_6.jpg"]},"Consult_chateau_formulaire1869":{"id":"Consult_chateau_formulaire1869","dept":"79","canton":"Saint-Maixent-l","commune":"Azay le Brulé","nom":"Aulnay_79","type":"Château","periode":"XVI","histoire":"AULNAY,  la mention la plus ancienne du château apparaît clairement sur le manteau de la cheminée du logis (1529) entre les médaillons des deux époux Jaccques de Biron, ecuyer et dame Jacquette Borillaud, seigneur et dame de céans ont fait faire le logis, jardins et prés clôturés tout à neuf. Après les Biron, d'autres familles s'y succédèrent : les Chasteigner, les Montauzier et les Galliot au XVIIe siècle. Vinrent ensuite, les Bodet de la Fenêtre et les Chaigneau de la Guyonnière qui en furent les derniers occupants. Pierre Antoine Chaigneau mort en 1879, légua le château de l'Aulnay à l'hôpital de Saint-Maixent: il était le dernier descendant de Jonas Chaigneau, premier pasteur de Saint-Maixent en 1598.","architecture":"AULNAY, la façade ouest présente une tour polygonale surmontée d'un toit pointu à plusieurs pans et abritant un escalier à vis; une bretèche équipée d'une couleuvrine domine la porte d'entrée sommée de la sculpture de deux chevaliers en cotte de mailles, agenouillés de part et d'autre du blason de la famille de Biron. Cette tour était l'unique accès à la demeure dès l'époque de sa construction, chose étonnante, elle s'ouvre en façade sur un couloir de circulation, sorte de galerie desservant les pièces des deux étages. La pièce où trône une imposante cheminée, au sud, devait être réservée à l'apparat. Les fenêtres de la façade ouest du logis, sur le jardin, remontent certainement à la fin du XVIIe siècle. Amples, et garnies de petits carreaux, elles témoignent de l'amélioration, par une lumière plus abondante, donnée à ces logis un peu austères. Les trois tours définissant le quadrilatère peuvent être attribuées à la campagne de 1529. La plus importante cantonne l'entrée du château de l'Aulnay au nord-ouest. Son diamètre, 5,40 m hors murs, est justifié par les pièces carrées des deux étages que l'on atteignait par un escalier à vis accolé. Le château actuellement utilisé comme exploitation agricole. L'ensemble se présente comme une cour en quadrilatère au fond de laquelle s'élève le logis à l'est. Le logis principal a conservé la plupart de ses traits originels. Il s'agit d'un bâtiment au toit très pentu, achevé de chaque côté par des murs pignons et ne comportant qu'un seul étage.","habitants":"Famille de  Chaigneau Famille de Biron.\r\n        \"","divers":"Château d'Aulnay grav de 1 à 3","gps":"","images":["../image/image_79/79_Aulnay_79_1.jpg","../image/image_79/79_Aulnay_79_2.jpg","../image/image_79/79_Aulnay_79_3.jpg"]},"Consult_chateau_formulaireccd0":{"id":"Consult_chateau_formulaireccd0","dept":"79","canton":"Le Val de Thouet","commune":"Availles-Thouarsais","nom":"Availles_Thouarsais","type":"Forteresse","periode":"XIII-XVI","histoire":"PIOGE, forteresse du XIIe siècle confisqués par Jean sans Terre en 1317 passe à Jean Acton puis les du Bouchet deviennent seigneur en 1393 et en 1512 Artus de Cossé surintendant des finances et maréchal de France  devient seigneur par son mariage avec Françoise du Bouchet une de leur fille de ces derniers apporte Piogé en dot lors de son mariage avec Charles de Montmorency comte de Damville, suite à une vente le domaine passe à Zacharie du Bellay qui auront à leur mariage avec Jeanne Herbert de Bellefonds six enfants dont Théodore, ce dernier quitte la France en laissant Piogé au mari de sa soeur Eléonore, Jean Rogier. Au Rogier succéderont par alliance, les Hebert de Grandmont dont les descendants cèderont le domaine en 1816 à un notaire d'Airvault François-Pierre Cot.","architecture":"PIOGE, la forteresse de plan quadrangulaire domine le bâtiment et l'enceinte constituant le château. Elle avait été détruite une première fois par Philippe Auguste lors de sa conquête du Poitou en 1207. Le donjon, construit à flanc de coteau, est enfermé de murailles formant une cour rectangulaire flanquée de tours d'angle. Il est lui-même appuyé de contreforts rectangulaires au sud, d'une tour ronde dans l'angle nord-ouest et d'une seconde dans l'angle nord-est. Une salle à arcades en sous-sol et des traces de peinture murale sont à signaler. Ce donjon du XIIe siècle a  été reconstruit au XIVe siècle. Une chapelle rectangulaire s'ouvrant par une porte ogivale est placée à l'est du donjon et peut remonter au XIIIe siècle. Le donjon devenu trop vétuste, un logis a été construit entre deux tours de flanquement de la courtine à chemin de ronde. Ce logis de la fin du XVe ou du début du XVIe siècle, a été réaménagé aux XVIIIe et XXe siècles. La petite cour située entre le logis et le donjon, est fermée à l'ouest par une tour-porte à arc ogival. Elle est précédée d'une cour de communs placés entre le rocher et la courtine, datés du XVIIIe siècle. Un châtelet d'entrée (deux tours rondes reliées par une porte plein cintre sommée de mâchicoulis), ferme cette cour. En dehors de l'enceinte, en contrebas de la courtine, se trouve un pigeonnier circulaire.","habitants":"Charles de Montmorency\r\n        \"","divers":"Châteaau de Piogé  GPS : 46° 51' 37,36\" Nord 0° 09' 13,6\" Ouest                     Piogé 46° 51' 37\" nord, 0° 09' 14\" ouest","gps":"46° 51' 37,36\" Nord 0° 09' 13,6\" Ouest                     P","images":["../image/image_79/79_Availles_Thouarsais_1.jpg","../image/image_79/79_Availles_Thouarsais_2.jpg","../image/image_79/79_Availles_Thouarsais_3.jpg","../image/image_79/79_Availles_Thouarsais_4.jpg","../image/image_79/79_Availles_Thouarsais_5.jpg"]},"Consult_chateau_formulaireae0d":{"id":"Consult_chateau_formulaireae0d","dept":"79","canton":"Val de Thouet","commune":"Airvault","nom":"Barroux_Airvault","type":"Manoir","periode":"XVI-XVII","histoire":"BARROUX-AIRVAULT, après avoir été aux mains de plusieurs familles, il entre dans la famille des Maussabré, au Moyen-Age, la seigneurie relevait de Thouars.  Le manoir de Barroux date des XVIe et XVIIe siècles.  Au début du XVIIe siècle, Barroux échut dans la famille Boinard, et en 1634, la  seigneurie était passée à la famille de Rangot. Jeanne Boinard avait en effet épousé Gabriel de Rangot. Ils se sont maintenus à Barroux jusqu'à la Révolution, période à laquelle Barroux fut confisqué et vendu comme bien national. Quelque temps après, il fut racheté par Mlle de Rangot. Ensuite, après avoir été aux mains de plusieurs familles, il entre dans la famille des Maussabré qui garda  le logis jusqu'au milieu du XXe siècle. L'édifice est inscrit au titre des M.H. le 5 décembre 1984.","architecture":"BARROUX, l'architecture du logis le rattache à un ensemble de logis de même importance et distants de quelques dizaines de kilomètres. Leur plan est semblable, avec les mêmes échauguettes aux angles, une porte d'entrée et un escalier très voisins.  L'édifice a dû être agrandi au XVIIe siècle. Le logis est placé à l'angle d'une cour fermée par des communs. Des tours se dressaient autrefois aux angles de cette sorte d'enceinte. Seule la tour-pigeonnier, au nord-ouest, existe encore. L'accès à la cour se fait par un double portail comprenant une partie cochère et une partie piétonne. De part et d'autre de la cour, les communs ont gardé à peu près leur aspect du XVIIe siècle, avec des portes en plein cintre et à agraphe marquée. Seule une partie de l'aile sud, touchant au logis, a été reconstruite sans doute au XIXe siècle. Logis et communs sont construits en petits moellons équarris. Seule la porte et les encadrements de fenêtres sont en pierre de taille. La hauteur du toit a été diminuée lors d'un remaniement de la charpente. Des échauguettes aux angles attestent encore d'un esprit très féodal. L'intérieur conserve un type d'escalier à une volée droite rampe sur rampe, très fréquent à la fin du XVIe et au début du XVIIe siècle. Dans la pièce du rez-de-chaussée, le trumeau de la cheminée conserve des peintures. De même, à l'étage du dessus, les parties du plafond portaient également un décor peint de feuillages et de fleurs.","habitants":"Famille Boinard\r\n        \r\n        \"","divers":"manoir du Barroux","gps":"","images":["../image/image_79/79_Barroux_Airvault_1.jpg","../image/image_79/79_Barroux_Airvault_2.jpg","../image/image_79/79_Barroux_Airvault_3.jpg","../image/image_79/79_Barroux_Airvault_4.jpg"]},"Consult_chateau_formulairec7e6":{"id":"Consult_chateau_formulairec7e6","dept":"79","canton":"Le Val de Thouet","commune":"St-Cyr la Lande","nom":"Beaugé","type":"Château","periode":"XVII","histoire":"BEAUGE, Baugé appartenait au début du XIVe siècle à la famille Barro. Celle-ci s'y maintient jusqu'au début du XVIe siècle. La famille obtint ses premières lettres de noblesse en 1653, lorsque Uriel de la Ville, Sénéchal du Duché  et premier capitaine de la ville de Thouars, alors que des troubles éclataient, repoussa les assaillants hors de sa ville. L'homme le plus important de cette famille reste Pierre-Louis de la Ville-Baugé, chef vendéen, durant la Révolution, membre du conseil de guerre et officier général de l'armée catholique et royale avec Henri de La Rochejaquelein. Le château était la propriété des Barro au début du XVIe siècle, Le domaine passa alors aux Pidoux, puis aux La Ville vers 1550. La personnalité la plus marquante de cette famille reste Pierre-Louis de la Ville-Baugé, notable des Deux Sèvres qui prit parti pour la cause révolutionnaire. Sous la Restauration, il sera maire de Thouars.  Le château  date du XVIIe siècle, appartient à la famille de La-Ville-Baugé  toujours propriétaires du château, le firent remanier au XVIIe siècle.","architecture":"BEAUGE, le château de Baugé est inscrit aux M.H. depuis le 13/04/1989 pour ses façades et ses toitures, son escalier et ses 2 cheminées à décor peint, l'une dans le salon du rez-de-chaussée et l'autre, dans la chambre à l'étage à gauche de l'escalier. Le château tel qu'il se présente aujourd'hui date de 1687, c'est un bel exemple d'architecture de la fin du XVIIe siècle. Le bâtiment principal est rectangulaire et cantonné à l'ouest d'un pavillon carré. La porte d'entrée est d'une grande élégance. Surmontée d'un fronton triangulaire, portant armoiries, elle est encadrée de deux oculus. Dans le parc subsiste un pigeonnier.","habitants":"Famille  Uriel de la Ville-Baugé\r\n        \"","divers":"Beaugé  GPS : 7° 03' 07\" Nord, 0° 09' 51\" Ouest","gps":"7° 03' 07\" Nord, 0° 09' 51\" Ouest","images":["../image/image_79/79_Beaug%c3%a9_1.jpg"]},"Consult_chateau_formulaire88a9":{"id":"Consult_chateau_formulaire88a9","dept":"79","canton":"Celles-sur-Belle","commune":"Beaussais","nom":"Beaussais","type":"Château","periode":"XV-XVIII","histoire":"BEAUSSAIS, construit en 1780 pour Louis-Gabriel  Yongues, seigneur. Avant la Révolution, un moulin à proximité du château et trois métairies faisaient partie du domaine agricole : la métairie des Chaumes, un ancien manoir déclassé, et les métairies du Cimetière et du Petit Courtiou. Lors des ventes des biens nationaux de première origine, en 1791, Louis-Gabriel Yongues s'est fait adjuger les métairies de la Cholerie et de la Touche,  et la métairie noble du Courtiou, qui avait appartenu à la baronnie de Saint-Romans. Mais le seigneur de Beaussais va émigrer en 1793 et Joseph-Pierre Desmarest, demeurant à Niort, acquiert comme bien national, le 17 mars 1794, le château, ainsi que les métairies du Cimetière, du Petit Courtiou, et Six-Chiens. En 1803 le domaine appartient à Etienne Simon.                                                                                                                       BOULAYE, la construction du logis peut remonter fin du XVe siècle comme en témoigne sa structure, ses baies et ses cheminées. Le manoir dépendait, avec une partie des terres et des bois, du château de Beaussais tandis que la grange et des terrains dépendaient du logis de Villermat. Au début du XVIe siècle, le domaine appartenait à Pierre de la Boulaye, écuyer. Il passe ensuite à Pierre de la Court, puis, par mariage, à Samuel de la Barre seigneur de Leigne. Toujours par mariage en 1673, il passe à la famille Chalmot où il reste jusqu'en 1817. A cette époque il est légué par testament à Françoise de Sanzillon, épouse d'Antoine Louis de Garreau. En 1826, à sa mort, la Boulaye est vendue à M. et Mme Frappier.","architecture":"BEAUSSAIS, il est édifié à proximité d'une forteresse disparue dont il subsiste une petite tour, peut-être de l'enceinte du donjon, et qui conserve à sa base trois archères, l'ensemble est situé au bord d'un ruisseau, à l'ouest du village de Beaussais. Le logis, de plan rectangulaire, est flanqué, à l'est, d'une aile en forme de pavillon et prolongé, à l'ouest, d'une construction plus basse. La façade, de six travées à pleins appareillés, a ses ouvertures couvertes d'un linteau délardé en arc segmentaire. Un corps de bâtiment à un étage, couvert en appentis en tuile creuse, double l'élévation postérieure. L'escalier intérieur a une rampe à balustres en bois.                                             BOULAYE, bâti en terrain plat, le logis est entouré de fossés en eau. Le logis se compose de plusieurs corps de bâtiments: un corps de bâtiment rectangulaire  du sud au nord, un second corps de bâtiment d'ouest en est, au nord duquel est accolé un troisième corps de bâtiment (toutes ces parties sont couvertes en tuiles mécaniques). Entre le premier et le deuxième corps de bâtiment se trouve la tour d'escalier polygonale prolongée au nord par un espace de circulation. Cette tour est couverte d'un toit en pavillon en ardoise. Au sud de cet ensemble, les corps de bâtiments agricoles sont groupés autour d'une cour trapézoïdale fermée d'un portail, à porte cochère rectangulaire et porte piétonne couverte en plein cintre, flanqué, à l'ouest, d'une tour-pigeonnier tronquée.","habitants":"Beaussais, Famille de Louis-Gabriel Yongues                        Boulaye;  famille Chalmot \r\n        \"","divers":"Beaussais  GPS : 46° 17' 28\" Nord, 0° 09' 06\" Ouest  Grav 1 à 3 .                                                                                          Boulaye  grav 4    GPS : 46° 17' 28\" Nord, 0° 09' 06\" Ouest","gps":"46° 17' 28\" Nord, 0° 09' 06\" Ouest  Grav 1 à 3 .","images":["../image/image_79/79_Beaussais_1.jpg","../image/image_79/79_Beaussais_2.jpg","../image/image_79/79_Beaussais_3.jpg","../image/image_79/79_Beaussais_4.jpg"]},"Consult_chateau_formulaire7ebe":{"id":"Consult_chateau_formulaire7ebe","dept":"79","canton":"Parthenay","commune":"Chapelle-Thireuil","nom":"Bois_Chapeleau","type":"Château","periode":"XV","histoire":"BOIS-CHAPELEAU, la première mention du Bois Chapeleau est en 1332 pour un arrêté du Parlement indiquant que la seigneurie passait de la tutelle de celle de la châtellenie de Fontenay à la seigneurie de Parthenay Vouvent. Au début du XVe siècle, le domaine est possédé par Guichard dAppelevoisin, allié du seigneur de Parthenay. Il soutient ce dernier à défendre la ville. Au XVIIe siècle, la seigneurie fut vendue au sieur de Fonbriand avant d'être à un gentilhomme protestant, Paul de Vendée. De succession en succession, le château échut au comte de Touchimbert, qui fit reconstruire la demeure au XIXe siècle, avant de la céder à son gendre, dont descendent les propriétaires actuels.","architecture":"BOIS-CHAPELEAU, situé au milieu d'un parc aux arbres magnifiques, au bout d'une longue pelouse, le château de Bois-Chapeleau n'a plus rien de la demeure féodale des Appelvoisin, mis à part peut-être les communs élevés à l'écart. C'est un bâtiment de style néo-classique construit en 1862 : le corps de logis rectangulaire dominant une terrasse est flanqué de deux ailes en saillie, aux toits pointus.","habitants":"Famille de Guichard dAppelevoisin\r\n        \"","divers":"Chapeleau grav de1 à 4. Chapelle-Tireuil; 46° 33' 32\" nord, 0° 33' 18\" ouest grav 5","gps":"","images":["../image/image_79/79_Bois_Chapeleau_1.jpg","../image/image_79/79_Bois_Chapeleau_2.jpg","../image/image_79/79_Bois_Chapeleau_3.jpg","../image/image_79/79_Bois_Chapeleau_4.jpg","../image/image_79/79_Bois_Chapeleau_5.jpg"]},"Consult_chateau_formulaire189c":{"id":"Consult_chateau_formulaire189c","dept":"79","canton":"Bressuire","commune":"Boismé","nom":"Boismé","type":"Château","periode":"XV","histoire":"Deux châteaux à Boismé celui de Clisson et celui de Guirère et la ferme fortifiée des Corbin.                                                                                     CLISSON, au début de la Révolution,  Clisson appartenait au jeune marquis Louis Marie de Lescure qui devint l'un des principaux chefs de l'armée vendéenne, son château fut incendié. De l'incendie il ne resta que la chapelle et les communs, là où le château actuel est construit. C'est un long bâtiment à un étage construit sur un plan en L. Il renferme de nombreux souvenirs de Lescure et d'Henri de la Rochejaquelein: répliques des portraits de Lescure, Henri et Louis de la Rochejaquelein, offertes par le Roi Louis XVIII à la marquise de la Rochejaquelein, assiettes en étain sur lesquelles ont été inscrits les dates de naissance des filles de Mme de Lescure pendant la \"virée de galerne\". La famille de Beauregard, propriétaire du château.                                                                                                             GUIRERE, la seigneurie de la Guirère est mentionnée vers 1150 dans le cartulaire de l'Absie. Erigée en châtellenie, elle relevait, en 1646, de la Forêt-sur-Sèvre. Ses premiers seigneurs connus furent les Appelvoisin aux XIVe et XVe siècles, cette famille posséda de nombreux fiefs dans le Bocage. A la fin du XVe siècle, le château avec ses terres comprenant moulins à eau et à vent passèrent aux Sainte-Maure. Mais deux siècles plus tard, la terre revint aux Appelvoisin. En 1699, elle passa à la famille Tatin qui la conserva jusqu'au milieu du XIXe siècle.","architecture":"CLISSON,  le château, y conserve le manuscrit des mémoires de la marquise de la Rochejaquelein et beaucoup d'autres archives. Les vitraux de la chapelle célèbrent les hauts faits des deux chefs vendéens. On ne saurait oublier le merveilleux parc de Clisson et sa charmille.                                                                                     CORBIN; ferme fortifiée  construit au XVe siècle, fut brûlé pendant la guerre de Vendée. Pierre Alexandre Gourdon épouse en 1777, Marie-Marthe Corbin, qui devient également la dernière dame de Boisalbert de Neuvy Bouin un peu avant la Révolution. Les nombreux blasons des familles Corbin représentent en commun un corbeau de sable. Corbin a été reconstruit au XIXe siècle. Armoiries et date 1788 sur le linteau. L'édifice est composé d'un étage carré, le gros oeuvre, pierre et revêtement, coiffé d'un toit à longs pans recouvert de tuiles creuses.                                                                                                                 GUIRERE; la Guiraire est transformée en exploitation agricole et l'ancienne demeure seigneuriale ne sera bientôt plus qu'un souvenir tant son état de décrépitude est avancé, on peut encore apercevoir les traverses qui ornent les baies de la façade principale, l'édifice était doté de deux échauguettes qui ont été arasées au même moment que la partie supérieure de la demeure.","habitants":"Clisson; marquis Louis Marie de Lescure                                    Guirère; famille des Appelvoisin \r\n        \"","divers":"Boismé; 46° 46' 32? nord, 0° 26' 02? ouest Clisson grav 2","gps":"","images":["../image/image_79/79_Boism%c3%a9_1.jpg","../image/image_79/79_Boism%c3%a9_2.jpg","../image/image_79/79_Boism%c3%a9_3.jpg"]},"Consult_chateau_formulairee00c":{"id":"Consult_chateau_formulairee00c","dept":"79","canton":"Autize-Égray","commune":"Pamplie","nom":"Boissoudan","type":"Château","periode":"XIX","histoire":"BOISSOUDAN, à deux pas du Vieux Boissoudan se dresse une belle demeure de Boissoudan construite au XIXe siècle, sa construction est l'uvre de Mme de Tournelles, veuve de Marc Pierre Gonzalve de Pont Jarno.","architecture":"BOISSOUDAN , il s'agit d'un corps de bâtiment massif, inspiré du XVIIe siècle, avec une tourelle en légère saillie et un avant-corps donnant sur la cour et sur le parc. Le travail des bossages autour des ouvertures et les petites lucarnes semi-circulaires sont du meilleur effet. Le château de Boissoudan est implanté dans un site boisé et bénéficie d'un panorama exceptionnel.","habitants":"Marc Pierre Gonzalve de Pont Jarno\r\n        \"","divers":"Château de Boissoudan","gps":"","images":["../image/image_79/79_Boissoudan_1.jpg","../image/image_79/79_Boissoudan_2.jpg","../image/image_79/79_Boissoudan_3.jpg"]},"Consult_chateau_formulaire6071":{"id":"Consult_chateau_formulaire6071","dept":"79","canton":"La Gâtine","commune":"Mérigoute","nom":"Boucard_Mérigoute","type":"Château","periode":"XVI","histoire":"BOUCARD, Jean Boucard, riche clerc, doté d'un excellent sens de l'administration des biens fut trésorier du chapitre, de 1495 jusqu'à sa mort en 1536. Afin de préparer son arrivée dans l'au-delà après une vie qu'il qualifia d'indigne, il éleva une chapelle destinée à sa sépulture et aussi une aumônerie. Cette chapelle est le joyau architectural de Ménigoute et  un très rare bâtiment de style gothique flamboyant homogène.","architecture":"BOUCARD;  logis de Jean Boucard, trésorier du chapitre, présente toutes les caractéristiques d'une petite place forte avec, en particulier, la présence de meurtrières. Le reste du château a été très remanié jusqu'au XVIe siècle, l'enclos du chapitre collégial révèle en fait le caractère défensif qu'avait pris le bourg au cours du Moyen-Age. Trois éléments en donnent encore la preuve. Le site d'abord, véritable motte féodale, est protégé par une ample boucle de la Vonne, ce dispositif naturel est renforcé par les douves dont les faces sont encore visibles au sud de la place des Cloîtres et la tour circulaire du château.","habitants":"Famille de Jean Boucard\r\n        \"","divers":"Château de Boucard Mérigoute","gps":"","images":["../image/image_79/79_Boucard_M%c3%a9rigoute_1.jpg","../image/image_79/79_Boucard_M%c3%a9rigoute_2.jpg","../image/image_79/79_Boucard_M%c3%a9rigoute_3.jpg","../image/image_79/79_Boucard_M%c3%a9rigoute_4.jpg","../image/image_79/79_Boucard_M%c3%a9rigoute_5.jpg","../image/image_79/79_Boucard_M%c3%a9rigoute_6.jpg"]},"Consult_chateau_formulairebf33":{"id":"Consult_chateau_formulairebf33","dept":"79","canton":"Thouars","commune":"Bouillé-saint-Paul","nom":"Bouillé_St_Paul","type":"Vestiges -Château","periode":"XIII-XVI","histoire":"A Bouillé  Saint-Paul, les vestiges, le château de Preuil, de la Ferrière et de Loretz et un hôtel dans un manoir féodal, mis à part Preuil pas d'informations pour les autres.                                                                                                                 PREUIL, la chatellanie de Bouillé Saint-Paul dépendait de la Viconté de Thouars. Vers 1320, son premier seigneur connu est Ardouin Grésille.  La seigneurie du Preuil était tenue, au milieu du XVe siècle, par Thibaud de la Haye, écuyer, seigneur de la Salle. En 1473, Jehan Royrand était qualifié de seigneur de Preuil et de Bretignolles. Leur succédèrent par la suite Jehan de Beaumont, chevalier, seigneur de Preuil en 1537 et Marc Delaville qui possédait cette seigneurie en 1587. Puis de 1644 à 1774, elle resta aux mains de la famille des Pierrois. Le château passa ensuite à Jacques François Duchastel, seigneur de la Pinarderie. A la veille de la Révolution, il était possédé par Charles Aymé Fouqueteau des Mortiers. En 1793, il échut à M. de la Marque par son mariage avec Agathe Fouqueteau des Mortiers.   En 1996, la propriété devient patrimoine communal. Suite à des travaux de restauration, la municipalité décide den faire le siège de la mairie et sy installe en 1998.","architecture":"BOUILLE-ST-PAUL; les vestiges les plus anciens du château pourraient dater du XIIIe siècle et a en partie conservé ses anciennes douves. Les vestiges de lenceinte et de ses tours pourraient datés du XIIIe siècle également. Une large porte cochère doublée dune porte piétonne permet laccès. Au XIXe siècle, il fait lobjet daménagements avec notamment la construction dun corps de logis appuyé par le mur Sud de lenceinte. Cest une maison bourgeoise à deux niveaux sous toitures dardoises, dont la façade sorganise en travées régulières, côté cour. Des communs sont également édifiés. Le pigeonnier, au centre de la cour est lannexe agricole la plus ancienne. Il est datable du XVIe siècle. Ce pigeonnier circulaire conserve son échelle tournante pour laccès à ses nombreux boulins rectangulaires.","habitants":"Famille d'Ardouin Grésille.\r\n        \"","divers":"Preuil  grav 2-3.         47° 01' 34\" nord, 0° 20' 42\" ouest","gps":"","images":["../image/image_79/79_Bouill%c3%a9_St_Paul_1.jpg","../image/image_79/79_Bouill%c3%a9_St_Paul_2.jpg","../image/image_79/79_Bouill%c3%a9_St_Paul_3.jpg","../image/image_79/79_Bouill%c3%a9_St_Paul_4.jpg","../image/image_79/79_Bouill%c3%a9_St_Paul_5.jpg","../image/image_79/79_Bouill%c3%a9_St_Paul_6.jpg","../image/image_79/79_Bouill%c3%a9_St_Paul_7.jpg"]},"Consult_chateau_formulaire0583":{"id":"Consult_chateau_formulaire0583","dept":"79","canton":"7  Le Val de Thouet","commune":"Boussais","nom":"Boussais_Chatillon","type":"Château","periode":"XV-XVII","histoire":"CHATILLON, la seigneurie de Châtillon relevait autrefois du duché de Thouars. Elle avait droit de haute justice. Ses premiers seigneurs connus furent les Rouaut qui possédèrent cette terre de 1396 à 1567, date à laquelle elle passa aux Le Vieux. Au début du XVIIe siècle, la seigneurie était aux mains des Préaux jusqu'à la fin du XVIIIe siècle. Châtillon passa par mariage aux Maussabré puis à leurs héritiers. En 1908, il appartenait au Conseil Général. Par la suite le château servit tour à tour de colonie de vacances, de lieu de refuge aux Espagnols, aux Français et à des nomades en 1941.","architecture":"CHATILLON, en 1943, il abrita un orphelinat. Après la deuxième guerre mondiale, le conseil général mit en vente le château. L'acquéreur, décide de ne pas payer d'impôts s'employa à sa destruction: triste destinée pour ce château. Ce qu'il en reste, appelé Maison Carrée, s'est greffé à la grosse tour d'origine. La partie Est remonte au XVe siècle, elle est l'uvre des Rouaut. De cette époque, il ne reste qu'une tour, un pan de mur et des fenêtres.","habitants":"Famille des Préaux\r\n        \"","divers":"Château de Châtillon à Boussais","gps":"","images":["../image/image_79/79_Boussais_Chatillon_1.jpg","../image/image_79/79_Boussais_Chatillon_2.jpg","../image/image_79/79_Boussais_Chatillon_3.jpg","../image/image_79/79_Boussais_Chatillon_4.jpg","../image/image_79/79_Boussais_Chatillon_5.jpg"]},"Consult_chateau_formulaire057a":{"id":"Consult_chateau_formulaire057a","dept":"79","canton":"Bressuire","commune":"Bressuire","nom":"Bressuire","type":"Bréssuire ; vestiges et Château","periode":"XV-XVII","histoire":"BRESSUIRE, Vestiges de l'entrée du vieux château et remparts, architecture militaire médiévale. Première mention du château en 1029. Le château appartient à la famille des Beaumont-Bressuire à partir du XIe siècle jusqu'au début du XVIe siècle. Les vestiges visibles datent essentiellement de la fin du XIIe et du début du XIIIe siècle. Le château a été dépecé dans la première moitié du XVIIIe siècle. Un nouveau logis a été construit vers 1880, en retrait par rapport à l'ancien. Château acquis par la commune en 1975. La forteresse comportait trois enceintes, mais la plus extérieure a disparu .                                                                                                                    RIPARFONDS, logis de Jacques de Brillouet, maître d'hôtel du seigneur de Bressuire au XVe siècle, le château devient au siècle suivant la maison des champs de la famille Gabriau, magistrat et notable de la ville de Poitiers. Au début du XVIIe siècle, Riparfonds perd son statut de maison des champs pour être loué à un fermier. L'incendie du logis par la colonne du général Grignon, le 15 mars 1794, pendant la guerre de Vendée, marque la ruine du lieu pour quelques années. Après sa confiscation, sa vente comme bien d'émigré et son démembrement qui se traduit par la constitution de trois exploitations agricoles.","architecture":"RIPARFONDS, a conservé sa disposition première logis au fond de la cour, bâtiments d'exploitation sur le côté. Un porche à portes charretière et piétonne donne accès à la cour. Dans le fond, le logis, sous la forme d'un bâtiment rectangulaire sur lequel un avant corps fait saillie. La porte d'entrée ouvre en plein cintre dans une travée dorique cantonnée de pilastres soutenant un simple entablement. Un escalier droit à rampe sur rampe donne accès à l'étage. Le mur noyau se termine sur le palier intermédiaire par un pilastre cannelé sur lequel s'appuient les arcs en anse de panier surmontant chaque volée et retombant sur des culots en forme d'écussons. La création du jardin a débuté en 1996, sur la basse-cour et une partie du grand jardin du logis. Il est divisé en deux parties: le petit jardin d'agrément devant les anciens communs représente l'ancien lieu de plaisance que les Gabriau avaient aménagé derrière le logis, il a été conçu comme un jardin d'inspiration italienne avec des fontaine.   A côté, le \"grand jardin\" potager et fruitier:  parterres surélevés fournissent tous les légumes et fruits qui auraient pu, s'ils avaient été présents en France à cette époque, se retrouver sur la table du seigneur Gabriau.","habitants":"Famille des Beaumont-Bressuire Riparfonds; Jacques de Brillouet,\r\n        \"","divers":"Bressuire et remparts grav de 1 à 4,    46° 50' 30\" nord, 0° 29' 56\" ouest château grav 5-6-7. Riparfonds  grav 8-9","gps":"","images":["../image/image_79/79_Bressuire_1.jpg","../image/image_79/79_Bressuire_2.jpg","../image/image_79/79_Bressuire_3.jpg","../image/image_79/79_Bressuire_4.jpg","../image/image_79/79_Bressuire_5.jpg","../image/image_79/79_Bressuire_6.jpg","../image/image_79/79_Bressuire_7.jpg","../image/image_79/79_Bressuire_8.jpg","../image/image_79/79_Bressuire_9.jpg"]},"Consult_chateau_formulaire2c68":{"id":"Consult_chateau_formulaire2c68","dept":"79","canton":"Celles-sur-Belle","commune":"Aigonnay","nom":"Breuil_Aigonnay","type":"Château","periode":"XV","histoire":"BREUIL; la seigneurie du Breuil est mentionnée vers 1430 lors du remariage d'Andrée de Varèze et Guy de Chourses, seigneur de Malicorne. En 1530, Florence de Villiers dame du Breuil d'Aigonnay, épouse Jacques Chalmot. Jusqu'à la Révolution, leurs descendants porteront le titre de seigneurs du Breuil d'Aigonnay. En ce qui concerne les bâtiments, il ne reste que des vestiges de l'ancien régime dans les communs, comme les lucarnes à frontons, les portes cintrées, et une canonnière. En 1819, lors de l'établissement du cadastre napoléonien, la parcelle dite du \"logis du Breuil\", imposée pour une porte cochère et quarante huit ouvertures, appartient à la famille Garreau qui venait d'acquérir le domaine. C'est entre 1833 et 1859 où le domaine appartient à la famille de Manceau, que le nouveau logis a été construit, la chapelle funéraire de 1843 qui servait au culte a probablement été reconstruite. En 1888, le château est acheté à M. de Lauzon pour installer un petit séminaire pour l'ordre des pères de l'Assomption. C'est de cette période que date le bâtiment situé à l'est du logis. En 1902, les religieux furent expulsés et les bâtiments mis sous séquestre. Le domaine sera vendu aux enchères en 1912.","architecture":"BREUIL, le logis est placé au centre d'un vaste espace, occupé, à l'ouest, par deux longs corps de bâtiments entre lesquels se trouve l'entrée face à l'allée d'accès. Une tour, en ruine, leur est accolée au sud-est. La chapelle au décor néo-classique, dont le toit s'est effondré, se trouve au sud, et un petit corps de bâtiment, au sud-est, a peut-être fait office d'orangerie. Le petit séminaire, placé perpendiculairement au logis au nord-est, est un long bâtiment à un étage carré et sept travées. Le logis, de plan rectangulaire, est double en profondeur. Bien que d'aspect sobre et un peu austère, la façade présente quelques éléments décoratifs : les pleins de travée sont appareillés, les trois travées centrales sont encadrées d'un pilastre à bossage, traitement que l'on retrouve aux pilastres corniers ; la porte à encadrement mouluré est précédée d'un perron rectangulaire de quatre degrés. Les niveaux sont soulignés de bandeaux et les quatre élévations sont couronnées d'une corniche moulurée. Le comble n'est éclairé que d'une seule lucarne à fronton cintré. Le logis et le petit séminaire sont couverts en ardoise, les autres bâtiments ont des toits en tuile creuse.","habitants":"Famille de Jacques Chalmot\r\n        \"","divers":"Château du Breuil à Aigonnay","gps":"","images":["../image/image_79/79_Breuil_Aigonnay_1.jpg","../image/image_79/79_Breuil_Aigonnay_2.jpg","../image/image_79/79_Breuil_Aigonnay_3.jpg","../image/image_79/79_Breuil_Aigonnay_4.jpg"]},"Consult_chateau_formulaire57df":{"id":"Consult_chateau_formulaire57df","dept":"79","canton":"Melle","commune":"Hanc","nom":"Breuil_Coiffault","type":"Maison forte","periode":"XV-XVI","histoire":"BREUIL-COIFFAULT; Guyot d'Alloue, qui servit comme homme d'armes, en 1467, au ban d'Angoumois, fut le premier à prendre le titre de seigneur de Breuil-Coiffaud. Après Elie d'Alloue (1665), le domaine passa aux Theville. La seigneurie du Breuil-Coiffaud releva successivement des seigneuries de Mairé-Levescault (1512) puis du château de Ruffec. Dénombrement et aveu le 12 mai 1547 à l'évêque de Poitiers par Jean d'Allouhe pour le fief et seigneurie de Peuchebrun (Longré). Idem le 27 juin 1614 hommage plain par Pierre Dallouhe, écuyer, seigneur du Breuil-Coiffault et Peuchebrun. Peuchebrun est composé d'une maison noble, maison forte, terre, fuie et garenne. Idem par René de Saint-Amand le 26 octobre 1684. En 1650 à Marie d'Alloue, épouse d'un gentilhomme normand, Jacques de  Thiville. Antoinette de Thiville, fille de Marie d'Alloue, épouse en 1663 Jean de Pons, écuyer, et lui apporte en dot le domaine. Jean de Pons est cité en 1689, dans le dénombrement de la seigneurie de Melleran. À la génération suivante, le seigneur du Breuil, également prénommé Jean, épouse en 1692 une angoumoisine, Marie Coyteux, fille de Pierre, seigneur de Lordaget, lieutenant assesseur au marquisat de Ruffec.  En 1663 le domaine se transmet par mariage aux de Pons. En 1774, la seigneurie est sortie du patrimoine des de Pons et a pour propriétaire Jean Charles César de Lestang, écuyer.","architecture":"BREUIL-COIFFAULT; sa maison noble est depuis longtemps disparue. Trois inscriptions, avec des textes pieux ou amusants en forme de rébus ,  l'un est illustré d'une oie et d'un bouteillon, sont gravées sur des pierres à la « Grand'Maison » du Breuil-Coiffaud. Au XIe siècle le secteur du Breuil accueille un premier ouvrage défensif. La construction du logis se situerait au XVe siècle. Les seigneurs du Breuil ne sont pas connus avant le XVe siècle logis du Breuil connaîtra par la suite une longue période de décadence avant d'être acquis, dans les dernières années du XXe siècle, par MM. Hubert Bressel et Michel Dervillez. Depuis 1993, ces derniers ont engagé un vaste programme de restauration, qui s'est accompagné de la création d'un jardin à la française, d'une roseraie et d'un labyrinthe de buis.","habitants":"Famille de Pierre d'Allouhe\r\n        \"","divers":"Hanc 46° 04' 34\" nord, 0° 00' 51\" ouest","gps":"","images":["../image/image_79/79_Breuil_Coiffault_1.jpg","../image/image_79/79_Breuil_Coiffault_2.jpg"]},"Consult_chateau_formulaire89e5":{"id":"Consult_chateau_formulaire89e5","dept":"79","canton":"Autize-Égray","commune":"Cherveux","nom":"Carte","type":"Château","periode":"XV","histoire":"CARTE ,  est connu dès le XVe siècle. Il a appartenu, de 1440 à 1730, à la famille Thibault. Nicolas Thibault et sa femme Marie Métivière y fondent, le 28 juin 1450, une Chapellenie. De cette période semble être conservés les soubassements et les tours du logis. La famille Thibault s'éteint au XVIIIe siècle, et lui succède la famille Avice. A cette époque sont reconstruits les communs et le logis. Au XIXe siècle, la propriété revient aux de Liniers, puis au XXe siècle elle appartient à la famille Chaurand. Des modifications ont été effectuées au XIXe siècle et une importante restauration a été faite en 1973. La chapelle a subi des remaniements au XIXe siècle. On y trouve, à l'intérieur, des dalles funéraires au nom de : Magdeleine Chevalier, dame de Vuzay, décédée en 1599, Bénigne Thibault en 1604, Charles François Jault de Chantigné en 1813, Colombe Avice de La Carte (veuve du précédent) en 1844, Samuel Amable Jau de Chantigné en 1863.","architecture":"CARTE, est situé en écart sur la départemental. On entre par une poterne dans une vaste cour rectangulaire. En bordure sud de cette cour se trouve le logis principal, de plan en L avec une tour sur son flanc. En bordure Est de la cour sont des communs et une orangerie, et, en bordure ouest des écuries. La chapelle est reliée par un long couloir au logis, elle est couverte de voûtes d'ogives. Huit pierres tombales ont été observées sur le sol. La porte extérieure de la chapelle est en arc brisé avec des nervures. Une terrasse borde l'édifice au sud et à l'est, elle suit les anciens fossés. Deux tours sont situées sur la façade postérieure du château. La première fait face à un puits et à une allée de Tilleuls qui mènent au lieu-dit de la Porte. La bergerie actuelle est une ancien logement de ferme avec buanderie et four. La porte extérieure de la chapelle serait un vestige de la première construction datant du XVe siècle.","habitants":"Famille Thibault\r\n        \"","divers":"Château de Carte à Cherveux  Carte      46° 25' 35\" Nord et 0° 22' 36\" Ouest","gps":"","images":["../image/image_79/79_Carte_1.jpg","../image/image_79/79_Carte_2.jpg"]},"Consult_chateau_formulaire6b8f":{"id":"Consult_chateau_formulaire6b8f","dept":"79","canton":"La celle sur Belle","commune":"La celle sur Belle","nom":"Celle_Belle","type":"Château","periode":"XV-XVIII-XIX","histoire":"FORGE,  le château de la Forge a  été construit pour un membre de la famille Nossay, seigneurs de la Forge depuis la fin du XVIe siècle. Entre 1642 et 1648, travaux de réparations et de constructions, notamment le pavillon du temps de Pierre de Nossay, époux de Louise de Brémond,                                                                                     LUSSAUDIERE, les premiers seigneurs connus au manoir de la Lussaudière sont les Pandin. Vers 1750-1760, le logis appartenait aux d'Auzy et plus tard, il devint la propriété du général Poinsignon.                                                                         PETIT BRUSSON,   le château du Petit Brusson a été construit au cur d'un site calme et verdoyant. Cette demeure, qui domine une vaste prairie, a été édifiée à la fin du XIXe siècle par Raoul Godefroy de Menilglaise, époux de la sur de Mme Louis de la Rochebrochard.","architecture":"FORGE, un édifice isolé au sud de l'ancien bourg de Montigné. Les bâtiments occupent un vaste espace d'environ trois cent mètres de longueur. Les murs de clôture et les bâtiments sont en pierre calcaire. Le corps de bâtiment de l'ancien château est ruiné, il était de forme quadrangulaire avec un retour vers l'est et peut-être un prolongement vers le nord-est.  Le logement qui l'accompagnait est constitué de deux corps de bâtiment rectangulaires accolés au rez-de-chaussée et comble.                                                                   LUSSAUDIERE, le corps central du logis pourrait remonter au XVIIe siècle et les deux pavillons au XIXe siècle, présente un corps de bâtiment central flanqué de deux pavillons plus hauts. Le corps central a une élévation à trois travées avec porte. Les pavillons sont à deux étages et un comble  à surcroit  éclairé par une lucarne à fronton triangulaire.                                                                                                    Petit BRUSSON, le style de cette construction s'inspire nettement de la Renaissance, les éléments d'architecture empruntés à différents édifices modèles, sont traités avec beaucoup de délicatesse ; une tourelle sur culot, un fronton étroit aux rampants ornés de choux, des lucarnes à meneaux, et la tour pointue qui témoigne de l'héritage médiéval. Ne faisant aucunement pastiche, l'ensemble offre une belle unité.","habitants":"Forge; famille Nossay Petit Buisson;  Raoul Godefroy de Menilglaise,                   \r\n        \"","divers":"Château de la Forge de Lassaudière grav 4  et du Petit Brusson","gps":"","images":["../image/image_79/79_Celle_Belle_1.jpg","../image/image_79/79_Celle_Belle_2.jpg","../image/image_79/79_Celle_Belle_3.jpg","../image/image_79/79_Celle_Belle_4.jpg"]},"Consult_chateau_formulaire6202":{"id":"Consult_chateau_formulaire6202","dept":"79","canton":"La celle sur Belle","commune":"La Celle sur Belle","nom":"Celle_sur_Belle","type":"Palaie","periode":"Palais","histoire":"ABBAYE-ROYAL, le prieuré de Notre-Dame-de-Celles fut érigé en 1137 en abbaye par l'évêque de Poitiers. Elle fut, dès lors, une étape importante pour les pèlerins en route vers Saint-Jacques-de-Compostelle. L'abbatiale fut reconstruite au XVe siècle sur les ordres de Louis XI. L'Abbaye fut détruite en 1568 par les huguenots. Il faudra attendre le XVIIe siècle et le talent de François le Duc, dit Toscane, pour la voir de nouveau reconstruite. La Révolution qui éclate en 1789, année où Charles-Maurice de Talleyrand-Périgord prend par procuration possession de son siège, scelle le destin de labbaye. Après le Concordat de 1801 qui rétablit lexercice du culte, labbatiale devient léglise paroissiale Notre-Dame. Le logis conventuel, propriété privée, perd sa charpente et sa toiture dorigine. Quant au pèlerinage, tombé en désuétude, il est rétabli en 1899.                                                                                                                          VIEUX LOGIS,   le château du Vieux Logis au site déjà ancien a été reconstruit par Jacques Elie Manceau, écuyer, seigneur de Boissoudan. Jacques Elie est l'auteur du parfait fauconnier ou l'art de bien exercer les oiseaux. Cet ouvrage écrit au milieu du XVIIIe siècle, ne fut édité qu'en 1864. Jacques Elie Manceau passe pour le dernier grand fauconnier de France.","architecture":"ABBAYE, sa façade imposante se compose dun haut clocher-porche et, plus bas, dun étonnant portail roman à six voussures polylobées, vestiges de la première construction. Situés en contrebas de léglise, labbaye et les bâtiments conventuels furent également reconstruits sur les plans de François le Duc. Lédifice, de style Louis XIV, domine la vallée de la Belle et de superbes jardins à la française. Dans laile sud, un grand réfectoire constitué de six travées donne accès à lancienne cuisine. En accédant à la cour arrière, un magnifique déambulatoire donne accès à la salle du Pilier, ainsi quà la crypte de la première église paroissiale de Celles-sur-Belle, léglise Saint-Hilaire, seule partie romane encore visible en ces lieux. Un musée se visite au premier étage des bâtiments conventuels : sont notamment reconstituées la chambre de labbé où ont séjourné plusieurs personnages illustres, ainsi qu'une cellule monastique.                                                                                                  VIEUX-LOGIS arbore, à chaque extrémité, ses deux tours de la fin du Moyen-Age, couvertes d'un toit tronconique à petites tuiles plates. Le corps de logis, de style XVIIIe rustique, est simple avec ses trois divisions: le rez-de-chaussée, un premier étage et des combles à surcroît sous un toit de tuiles creuses. L'entrée dans la cour se fait par un pavillon ouvert de deux portes charretière et piétonne: côté rue ces ouvertures sont de forme carrée, côté cour, en plein cintre.","habitants":"Abbaye Charles-Maurice de Talleyrand-Périgord. Vieux logis, Jacques Elie Manceau \r\n        \"","divers":"Abbaye royal grav 1-2 , 46° 15' 41\" nord, 0° 12' 33\" ouest. Vieux Logis grav 3-4","gps":"","images":["../image/image_79/79_Celle_sur_Belle_1.jpg","../image/image_79/79_Celle_sur_Belle_2.jpg","../image/image_79/79_Celle_sur_Belle_3.jpg","../image/image_79/79_Celle_sur_Belle_4.jpg"]},"Consult_chateau_formulaire48ca":{"id":"Consult_chateau_formulaire48ca","dept":"79","canton":"Cerizay","commune":"Cerizay","nom":"Cerizay","type":"Château","periode":"XV-XIX","histoire":"Deux châteaux à Cérizay celui de Puy-Genest et de la Roche.                                                                                       PUY-GENEST, la seigneurie du Preuil était tenue, au milieu du XVe siècle, par Thibaud de la Haye, écuyer, seigneur de la Salle. En 1473, Jehan Royrand était qualifié de seigneur de Preuil et de Bretignolles. Leur succédèrent par la suite Jehan de Beaumont, chevalier, seigneur de Preuil en 1537 et Marc Delaville qui possédait cette seigneurie en 1587. Puis de 1644 à 1774, elle resta aux mains de la famille des Pierrois. Le château passa ensuite à Jacques François Duchastel, seigneur de la Pinarderie. A la veille de la Révolution, il était possédé par Charles Aymé Fouqueteau des Mortiers. En 1793, il échut à M. de la Marque par son mariage avec Agathe Fouqueteau des Mortiers.                                                                             La ROCHE, un moulin s'élevait à cet endroit en 1329; la seigneurie de la Roche a été la propriété de la famille de Meulles durant les XVe et XVIe siècles.  Aujourd'hui gîtes de France de  Jadaud Nathalie.","architecture":"PUY-GENEST; le château actuel est une construction du début du XIXe siècle. C'est une belle demeure de style classique, pourvu de larges baies et d'une toiture à la Mansart. La propriété possède un pigeonnier et des dépendances qui abritent aujourd'hui une cave vinicole.                                            La ROCHE, construit à la fin du XIXe siècle sur une petite colline, est bordé sur deux de ses côtés d'un magnifique étang. S'il n'existe aucune mention d'un château antérieur, on peut cependant affirmer que le lieu dit est ancien. De proportions modestes, l'édifice adopte un plan rectangulaire auquel on a accosté une tour circulaire sur un des côtés. Son toit est à deux versants brisés et à croupes. La façade dominant le plan d'eau présente un avant-corps en saillie percé de baies géminées sur ces trois niveaux. La porte d'entrée décentrée se situe sur la face opposée, côté jardin. On peut remarquer une légère inspiration du style néo gothique se limitant aux chambranles moulurés des fenêtres, agrémentés d'une accolade. Ces derniers constituent avec le bossage aux angles du bâtiment et autour des ouvertures, l'unique décor de l'édifice.","habitants":"Puy Genest; Famille des Pierrois                                           La Roche; Famille de Meulles \r\n        \"","divers":"Château du Puy-Genest grav 1-2-3 et de la Roche grav 4-5","gps":"","images":["../image/image_79/79_Cerizay_1.jpg","../image/image_79/79_Cerizay_2.jpg","../image/image_79/79_Cerizay_3.jpg","../image/image_79/79_Cerizay_4.jpg","../image/image_79/79_Cerizay_5.jpg"]},"Consult_chateau_formulaire1a22":{"id":"Consult_chateau_formulaire1a22","dept":"79","canton":"Cerizay","commune":"Largeasse","nom":"Chabirandière","type":"Maison forte","periode":"XV","histoire":"CHABIRANDIERE, en 1380, la seigneurie appartenait à un sieur Guillaume David. Ses descendants conservèrent le domaine de la Chabirandière jusqu'à Jean David qui possédait en même temps le fief de la Grippe au Tallud. Leur succédèrent les Charbonneau puis les Colasseau. Vers 1740, la Chabirandière était aux mains de Marie Henriette Gentet. Le 30 juillet 1789, Anne Catherine Poiret, veuve de Louis Charles Poiret, vendit la propriété, à Pierre Jacques Marcollay, père de Pierre-Henry Marcollay, curé défroqué, maire de Largeasse pendant un demi siècle. L'ex-ecclésiastique et sa sur Marie Marthe vendirent la Chabirandière en nue-propriété. Des Brillaud, le château passa, par mariage aux Pouzet, aux Gaillard et aux Larmanjat.","architecture":"CHABIRANDIERE,  la construction du logis peut se situer au XVe siècle, mais les premiers propriétaires connus remontent au XIVe siècle. Le bâtiment d'origine a été remanié aux XVIe et XIXe siècle. Il se compose de deux bâtiments juxtaposés : le logis et une aile de communs. Le logis, bâtiment rectangulaire à un étage, a conservé les traces d'un aménagement Renaissance lisibles dans les ouvertures. Il est encadré, côté parc, par deux tours rondes comportant des percements des XVe et XVIe siècles et des archères canonnières. L'aile des communs, plus basse, présente également des détails de l'architecture médiévale (fenêtres à meneau, porte moulurée). L'intérieur a conservé quelques cheminées médiévales. un haut portail s'ouvre sur la grande cour du château, la vieille demeure a encore belle allure avec ses deux tours et ses hautes fenêtres, malgré d'indispensables remaniements infligés au côté gauche de sa façade intérieure.","habitants":"Famille de Louis Charles Poiret\r\n        \"","divers":"Château de Chabirandière  46° 40' 00\" nord, 0° 30' 15\" ouest","gps":"","images":["../image/image_79/79_Chabirandi%c3%a8re_1.jpg","../image/image_79/79_Chabirandi%c3%a8re_2.jpg","../image/image_79/79_Chabirandi%c3%a8re_3.jpg","../image/image_79/79_Chabirandi%c3%a8re_4.jpg"]},"Consult_chateau_formulaireff4f":{"id":"Consult_chateau_formulaireff4f","dept":"79","canton":"Autize-Égray","commune":"Champdeniers Saint-Denis","nom":"Champdeniers","type":"Château","periode":"XV-XVII-XIX","histoire":"Trois châteaux à Champdeniers celui  de Nuchéze, de Puyraveau, de Villeneuve et St-Denis pas d'information pour ce dernier.                                                                                                                  NUCHEZE,  passe par mariage à Jacques de Montalembert qui entreprend sa reconstruction à partir du donjon quasi-intact de 1437. En 1559, Léon de Nuchèze achète l'édifice et l'ensemble des terres. En 1714, le domaine est acheté par Jacques Thibault, sieur du Planti et reste au sein de cette famille jusqu'en 1920. Racheté par un Tourangeau, en 2018.                                                                                                                                       LUC, la seigneurie du Luc relevait de Pressigny et fut la résidence des derniers seigneurs de Champdeniers (les La Rochebrochard). On y trouve au début XVe siècle les Nuchèze, puis la seigneurie passa aux Chabot vers 1511. La terre du Luc fut vendue en 1566 à Jean de Melin. A son décès, en 1577, elle revint à sa veuve Gabrielle Aymar qui se remaria avec Jacques d'Escars, sieur des Loges et des Isles. Un siècle plus tard, la seigneurie du Luc était aux mains de Louis Suyrot, seigneur de de Champeaux. Il transmit le domaine à sa fille Elisabeth qui épousa en 1675 Henry Bellanger. La terre du Luc passa par la suite aux La Rochebrochard. Le château actuel est l'uvre de Théodore de la Rochebrochard. A sa mort le château du Luc échut à son neveu M. de Brach.                                                                                    PUYRAVEAU, appartenait en 1526 à Jean Mourault, écuyer, licencié ès lois. Vers 1577, il passa aux mains de la famille Adam. Puis on trouve les Légier, conseillers au Présidial de Poitiers. Au milieu du XVIIIe siècle, Puyraveau était propriété d'Augustin de Clerveaux, seigneur de l'Homelière d'Augé, qui le céda en 1766 à Germain Lecointe, marchand de Saint-Maixent. Celui-ci le transmit  à son fils Mathieu, homme de loi de St-Maixent, puis  échut à son fils Louis qui poursuivit les transformations du parc et de l'habitation. A sa mort en 1899, le domaine passa à sa fille, Hélène Tribert qui légua la propriété en 1964 à L'évêché de Poitiers.","architecture":"NUCHERE, mentionné pour la première fois en 1320, le domaine se compose d'un pigeonnier circulaire, d'une chapelle Sainte-Catherine rectangulaire, édifiée vers 1630, d'un four à pain et du corps de logis rectangulaire avec une tour hors-oeuvre polygonale renfermant un escalier à vis au centre, et une tour carrée en avancée sur la gauche. Un pignon élevé s'interrompt au niveau de la tour d'escalier. Le logis, reconstruit au XVIIIe siècle, se poursuit alors, à droite de la tour sous une toiture plus basse. Chaque pièce a conservé sa cheminée. L'architecture est typée de la fin du Moyen-âge. Il s'agit d'un édifice défensif dominant la vallée de l'Egray et comprenant un donjon rectangulaire. La présence de douves,  et d'ouvertures de tir, confirment cette fonction de défense. Le logis actuel se compose de trois corps de bâtiments disposés en L, le donjon au centre dominant l'ensemble avec ses toitures à fortes pentes, couvertes d'ardoise et sa tourelle d'escalier polygonale est encadré de deux ailes, l'une dans le même alignement, l'autre en retour, couvertes de tuiles creuses.       PUYRAVEAU, possède comme témoignages les plus anciens, ses tours d'angle du XVIe siècle. La majeure partie de l'édifice remonte au XVIIe siècle, mais de nombreuses modifications sont venues l'altérer au XIXe siècle.","habitants":"Léon de Nuchèze   Puyraveau;  famille Adam\r\n        \"","divers":"Nuchèze  grav 1-2-3. 4  46° 29' 26\" nord, 0° 22' 47\" ouest     Püyravau grav 5-6         GPS : 46° 29' 06\" Nord, 0° 24' 14\" Ouest                                                                                            Villeneuve grav-7 . Saint-Denis grav 8 Le Luc grav 9","gps":"46° 29' 06\" Nord, 0° 24' 14\" Ouest","images":["../image/image_79/79_Champdeniers_1.jpg","../image/image_79/79_Champdeniers_2.jpg","../image/image_79/79_Champdeniers_3.jpg","../image/image_79/79_Champdeniers_4.jpg","../image/image_79/79_Champdeniers_5.jpg","../image/image_79/79_Champdeniers_6.jpg","../image/image_79/79_Champdeniers_7.jpg","../image/image_79/79_Champdeniers_8.jpg","../image/image_79/79_Champdeniers_9.jpg"]},"Consult_chateau_formulaire4430":{"id":"Consult_chateau_formulaire4430","dept":"79","canton":"Niort","commune":"Moutiers sous chantemerle","nom":"Chantemerle_79","type":"Château","periode":"XIX","histoire":"CHANTEMERLE, a été construit pendant la « Restauration » entre 1815 et 1830. Cette grande demeure présente des caractères communs aux constructions de cette époque, construit par le duc de Beauvilliers, le château passa par voie de succession à la famille Choiseul d'Harcourt à qui on doit l'élégante chapelle de Chantemerle. Par la suite, les descendants furent successivement : la comtesse d'Hinnisdal, le comte Bernard d' Avaray, le comte des Moutiers, Mme de Laage de Meux et depuis 1995  Mme Lelièvre. Le château ne fut qu'un rendez-vous de chasse ; il n'a jamais été habité régulièrement par ses propriétaires. Le prince de Chalais au XIXe siècle, gendre du duc de Beauvilliers, venait fréquemment visiter ce domaine qu'il avait eu en héritage. Pour faciliter les chasses qu'il organisait dans la forêt, où les derniers loups disparurent vers 1880, il fit percer la longue allée qui, de part en part, traverse les grands bois. C'est seulement pendant l'occupation que des réfugiés s'y sont installés durablement.","architecture":"CHANTEMERLE, aurait succédé à une maison forte entourée de douves construite au lieu-dit « Le Petit Château », distant de quelques centaines de mètres. Le château, d'un plan rectangulaire, est d'une grande simplicité. Couvert d'ardoise, l'ensemble s'élève sur deux étages carrés et un comble à surcroît. Ce dernier niveau est éclairé par de petites ouvertures rectangulaires placées sous la bordure du toit et par des lucarnes percées dans le versant. La façade est rythmée par cinq travées. La travée centrale est mise en valeur : elle est traitée à la manière d'un pignon venant interrompre la bordure du toit.\r\nAujourd'hui, afin de raviver son histoire, le château a été entièrement rénové pour vous procurer tranquillité et confort.","habitants":"Famille Choiseul d'Harcourt \r\n        \"","divers":"Chantemerle à Moutiers sous Chantemerle. GPS : 46° 19' 33\" Nord, 0° 27' 38\" Ouest","gps":"46° 19' 33\" Nord, 0° 27' 38\" Ouest","images":["../image/image_79/79_Chantemerle_79_1.jpg","../image/image_79/79_Chantemerle_79_2.jpg","../image/image_79/79_Chantemerle_79_3.jpg"]},"Consult_chateau_formulaireaeb0":{"id":"Consult_chateau_formulaireaeb0","dept":"79","canton":"Niort","commune":"Ste Pezenne","nom":"Chantemerle_Pezenne","type":"Château","periode":"XIX","histoire":"CHANTEMERLE, le château de Chantemerle a été construit dans la première moitié du XIXe siècle.  La demeure, construite sur un plan de type rectangulaire, offre une grande simplicité, possède néanmoins quelques éléments très intéressants, et en particulier une curieuse tour carrée, à l'arrière de la bâtisse, rappelant un donjon féodal.","architecture":"CHANTEMERLE, la  construction du XIXe siècle pastiche d'architecture de la première moitié du XVIIe siècle. Ce château s'élève sur trois niveaux et s'ouvre du côté Sèvre par un niveau inférieur qui rattrape la dénivellation du terrain. Construit en calcaire tendre, présente en façade un balcon soutenu par des consoles sculptées et au niveau des deux étages, une travée centrale marquée par une triple baie avec fronton brisé orné d'une guirlande. De part et d'autre de cette façade, de fausses tours d'angle sont marquées par un ressaut et rythmées par des chaînages à refends. D'importantes constructions complètent l'intérêt de cette demeure, une longue aile d'écuries et de communs, ainsi que les restes d'une chapelle. Erigée entre 1864 et 1872, la chapelle est un édifice qui allie les styles néo-gothique et néo-roman. Entièrement construite en pierre de taille et entourée d'une clôture, elle est richement ornée tant intérieurement qu'extérieurement. Sans que l'on connaisse l'identité des artisans qui ont concouru à cette oeuvre, il semble évident que le propriétaire a fait appel aux plus grands noms, sans doute parisiens, de cette période du second Empire.  L'ensemble constitue une réserve ornithologique et botanique unique en bordure de ville. Propriétés de la ville de Niort, centre de loisirs.","habitants":"Seigneur Local\r\n        \"","divers":"Chantemerle GPS : 46° 19' 33\" Nord, 0° 27' 38\" Ouest                          ste Pezenne  46° 20' 59\" nord, 0° 28' 28\" ouest","gps":"46° 19' 33\" Nord, 0° 27' 38\" Ouest","images":["../image/image_79/79_Chantemerle_Pezenne_1.jpg","../image/image_79/79_Chantemerle_Pezenne_2.jpg","../image/image_79/79_Chantemerle_Pezenne_3.jpg"]},"Consult_chateau_formulaire539e":{"id":"Consult_chateau_formulaire539e","dept":"79","canton":"Autize-Égray","commune":"La Chapelle-Bâton","nom":"Chapelle_Baton","type":"Château","periode":"XIII-XIV-XVI","histoire":"Trois châteaux à la Chapelle Bâton celui des Loges  et de Maille   celui de la Grande Fougère.                                                                                                                GRANDE-FOUGERE, la seigneurie  est connue depuis le XIVe siècle et relevait à cette époque des Faye. A la fin du XVIe siècle, était aux mains de François Masson, écuyer, sieur de Breuilbon et la Fougère, et avait épousé Cassandre Texier, fi
