issé par la famille Reille partie dans le maquis, les troupes allemandes, anglaises et françaises occupèrent successivement le château.  Les habitants du village de Janvry ont témoigné des dégradations faites au domaine par certaines troupes durant leurs respectives occupations  Certains soldats ont arraché des lattes de parquet des salons afin de les brûler dans la cheminée lors des longs mois d'hiver de la guerre, et dans divers endroits de la demeure, on trouve des inscriptions faites par les diverses troupes, témoignant de leur passage entre 1939 et 1945.","habitants":"baron Jean Reille\"","divers":"Château de Janvry                                  GPS : 48° 38' 49,81\" Nord, 2° 09' 14,65\" Est","gps":"48° 38' 49,81\" Nord, 2° 09' 14,65\" Est","images":["../image/image_91/91_Janvry_1.jpg","../image/image_91/91_Janvry_2.jpg","../image/image_91/91_Janvry_3.jpg","../image/image_91/91_Janvry_4.jpg"]},"Consult_chateau_formulairedb38":{"id":"Consult_chateau_formulairedb38","dept":"91","canton":"Épinay-sous-Sénart","commune":"Quincy sous Sénart","nom":"Leroy","type":"Château","periode":"XIX","histoire":"LEROY, le château Leroy a été construit en 1889, doit son nom à son premier propriétaire, Charles Isidore Leroy, qui était le fils du fondateur de l'industrie des papiers Leroy. Il a été racheté par le Ministère de lIntérieur qui y loge la 3e compagnie républicaine de sécurité. Les compagnies républicaines de sécurité, également connues sous le sigle CRS, sont un corps de la police nationale en France, intervenant dans les manifestations, mais aussi dans la protection civile. Elles ont été créées par un décret du 8 décembre 1944 par le général De Gaulle,   Le château leroy appartient maintenant au ministère de lIntérieur et loge la 3e Compagnie Républicaine de Sécurité.","architecture":"LEROY, plusieurs entrées permettaient laccès à la propriété avant son lotissement en 1924. Lentrée dhonneur, peu utilisée, se trouvait route de Combs-la-ville. Sur son côté droit, existait une orangerie transformée par la suite en maison dhabitation. A gauche, une petite porte donnait accès à la propriété. Un petit pavillon accueillait les visiteurs ; il était habité par lun des trois jardiniers du domaine. Une allée sablée conduisait au château, tandis que dautres menaient au superbe parc. Ce dernier était grossièrement agrémenté de fleurs, darbustes, de rosiers, de pelouses et de nombreux arbres. En contrebas, en direction de lYerres, par des escaliers creusés dans le sol, on arrivait à une porte qui permettait laccès au chemin longeant la rivière.","habitants":"général De Gaulle\"","divers":"Château de Leroy à Quincy sous Sénart                                                              GPS : 48° 40' 17\" Nord, 2° 32' 26\" Est","gps":"48° 40' 17\" Nord, 2° 32' 26\" Est","images":["../image/image_91/91_Leroy_1.jpg","../image/image_91/91_Leroy_2.jpg"]},"Consult_chateau_formulairef7a2-2":{"id":"Consult_chateau_formulairef7a2-2","dept":"91","canton":"Arpajon","commune":"Leuville sur orge","nom":"Leuville","type":"Château","periode":"XVI","histoire":"LEUVILLE, château des Géorgiens a été construit au XVIe siècle. Il est de style Renaissance. Le domaine géorgien de Leuville-sur-Orge a été acheté le 24/06/1922 par les autorités de la République démocratique de Géorgie réfugiées en France, après avoir séjourné, un temps, en Turquie : le Parlement géorgien avait mandaté le gouvernement afin de conduire la reconquête de la Géorgie à partir de létranger, suite à linvasion du territoire national par les armées de la Russie soviétique en février et mars 1921. Le 23/09/2016, le transfert de propriété à l'Etat géorgien est signé à Leuville-sur-Orge en présence des ministres géorgiens de la Diaspora et de la Justice, et du vice-ministre géorgien des Affaires Etrangères. L'Ambassade de Géorgie annonce peu après que la gestion quotidienne du domaine est confiée pour une année au Foyer géorgien, association regroupant les résidents.  Le château de Leuville est dans un état précaire aujourd'hui. Afin de rénover et de reconstruire les bâtiments, sur les 4 hectares de terrain restants, le gouvernement géorgien prévoit un investissement de 5 millions d'euros, sur la période de 2017 à 2026. Le 5 février 2017, le comité de gestion du centre franco-géorgien s'est réuni sous la présidence du Vice-ministre Géorgien des Affaires étrangères, avec la participation d'une part de deux représentants des anciens dépositaires de la propriété, ainsi que, d'autre part, celle du président de l'association géorgienne en France et d'un représentant de l'immigration récente.","architecture":"LEUVILLE, château constitué d'une aile en moellons calcaires, terminée à l'est par une tour carrée moderne (XIXe-XXe siècles). Le toit à longs pans a été remanié et recouvert de tuiles mécaniques. Il est supporté par une charpente ancienne et éclairé de lucarnes. La façade sur rue est composée de six travées dont les fenêtres sont surmontées d'arcades légèrement incurvées et sont séparées par des oeils-de-boeuf. La façade sur parc est composée de onze travées encadrées de briques. Dans le parc, contre le mur séparant le domaine de la rue, a été creusé un nymphée dont le bassin est toujours approvisionné et dont le mur est percé de niches. Deux pylônes ont été édifiés au XIXe siècle pour marquer l'entrée de l'aile qui subsiste.","habitants":"ministre Géorgien \"","divers":"Château de Leuville sur Orge                  GPS : 48° 36' 58\" Nord, 2° 15' 50\" Est","gps":"48° 36' 58\" Nord, 2° 15' 50\" Est","images":["../image/image_91/91_Leuville_1.jpg","../image/image_91/91_Leuville_2.jpg","../image/image_91/91_Leuville_3.jpg"]},"Consult_chateau_formulaire9046-2":{"id":"Consult_chateau_formulaire9046-2","dept":"91","canton":"Brétigny-sur-Orge","commune":"Longpont sur Orge","nom":"Longpont_sur_Orge","type":"Château","periode":"XVII-XIX","histoire":"deux châteaux dans cet article,  Lormoy, et Mesnil                     LORMOY, reconstruit en 1837 par Pierre Anne Dedreux pour monsieur Paturle, industriel lyonnais et député, sur le site d'un ancien château édifié au XVIIe siècle dont un corps de logis servit de base au nouvel édifice, c'est Gaston d'Orléans qui aurait entrepris, la construction de ce premier château vers 1627, des transformation furent menées au début du XIXe siècle par le duc de Maillé, le château de 1837 avait deux étages et des pavillons latéraux surmontés de terrasses à l'italienne. En 1862 le château est acquis par la famille Say (sucreries) et agrandi : des ailes sont ajoutées et les toits modifiés par l'architecte Garon ; l'édifice de 1837 est le corps de bâtiment central actuel. L'allée des marronniers dans l'axe du château et de la tour de Montlhéry a été percée.  A Say en 1863 ; elle a été classée au titre des sites le 8 mai 1935. De 1934 à 1971, le domaine appartient à la congrégation des pères de l'assomption qui y installèrent un séminaire ; en prolongement de l'aile nord l'architecte Couroux construisit une chapelle dont il ne reste aujourd'hui que la structure extérieure. Le domaine a été démantelé et loti à partir de 1920. Le corps central est accosté de deux pavillons en léger ressaut et deux ailes disposées dans le prolongement de l'ensemble ; le tout est couvert de toits en pavillon à terrasse faîtière. Les bâtiments sont enduits. Les pavillons d'entrée sur la rue de Lormoy sont construits en meulière. L'ensemble des communs, à l'architecture italianisante, sont remarquables par la conservation de leur état initial. Depuis 1983 maison de retraite.","architecture":"MESNIL  le château du Mesnil a été construit au milieu du XVIIe siècle pour un certain Leroy, écuyer des pages de la petite écurie du roi, qui en fit sa résidence secondaire. Il fut détruit en 1840. Seuls subsistent la chapelle, les communs et le portail d'entrée; selon la tradition locale, cette chapelle aurait été, comme celle du château de Villebouzin, le théâtre des messes noires organisées de madame de Montespan. Les murs intérieurs de la chapelle conservent les traces d'un décor peint représentant une architecture de pilastres, chapiteaux, corniche et panneaux de boiserie.                                                                                           .","habitants":"Mesnil  madame de Montespan                                Lormoy Famille Say          \"","divers":"deux châteaux a  Longpont sur Orge, Lormoy grav 3-4, Mesnil  grav 1-2                                                                       Lormoy GPS : 48° 38' 11\" Nord, 2° 17' 24,2\" Est","gps":"48° 38' 11\" Nord, 2° 17' 24,2\" Est","images":["../image/image_91/91_Longpont_sur_Orge_1.jpg","../image/image_91/91_Longpont_sur_Orge_2.jpg","../image/image_91/91_Longpont_sur_Orge_3.jpg"]},"Consult_chateau_formulairedd22":{"id":"Consult_chateau_formulairedd22","dept":"91","canton":"Dourdan","commune":"St_Chéron","nom":"Marais_Baville","type":"Château","periode":"XVII-XVIII","histoire":"MARAIS  Le site du Marais sur lequel se trouvait jadis le château fort des Hurault, dont ne subsistent aujourd'hui que les douves et le donjon (la tour en entrant) ou Sully, ministre de Henri IV, reçut magnifiquement, s'est développé à travers les siècles. A la fin du XVIIIe siècle, en 1778, le trésorier général de l'artillerie et du génie, Jean Le Maître, y fit construire le château actuel, le plus beau d'Ile de France à cette période, par l'architecte Barré. Il faut remarquer le parti que l'architecte a su tirer du site, la proportion du château par rapport au miroir d'eau, le mystérieux péristyle à l'italienne, la perfection avec laquelle ont été traités les bandeaux et les frises dus aux grands sculpteurs du temps, l'élégante habileté avec laquelle le château du XVIIIe siècle est raccordé à l'ancien par le pont à galerie vitrée. De même Achille Duchêne à qui l'on doit la restauration de la plupart des jardins attribués à André Le Nôtre qui, s'inspirant des plans de l'ancien jardin à la française, a crée l'actuel en 1910, a veillé à l'harmonie des proportions par rapport aux façades.  La Duchesse de Talleyrand acquit le château du Marais de la Duchesse de Noailles en 1899, et a débuté un travail de restauration poursuivi par sa fille Violette, épouse du Président Gaston Palewski, ancien directeur du cabinet du général de Gaulle, membre de l'Institut, et ancien ministre d'état. Ce sont les enfants de celle-ci, Anna de Bagneux et Charles Maurice de Pourtales qui s'y adonnent. Beaucoup de visiteurs illustres se sont succédés au château : le fabuliste Florian, neveu de Voltaire, Mathieu Molé, futur premier ministre de Louis Philippe, qui devint le gendre de la maîtresse de maison, Wellington, quand il était ambassadeur à Paris, il y a eu surtout Chateaubriand et Pauline de Beaumont, Sainte Beuve et Mme d'Arbouville et plus récemment André Malraux et Louise de Vilmorin.","architecture":"à cinq K.M. au sud à Saint-Chéron BAVILLE dit du Marais également, La terre de Bâville a été achetée en 1559 par Charles de Lamoignon dune illustre famille de robe. En 1625 son fils, Chrétien de Lamoignon, président au Parlement de Paris, a chargé le maître maçon Michel Villedo de bâtir un édifice sur lemplacement de lancien manoir. Bâville a été érigé en marquisat en 1671, pour son fils, Guillaume de Lamoignon, premier président au Parlement de Paris. En 1677, Chrétien François de Lamoignon, fils de Guillaume, fait ajouter deux ailes en retour déquerre, couvertes de combles, à la Mansart et terminées par deux pavillons sur le devant. En 1768, c'est toujours un Lamoignon qui fait bâtir les communs. De la même année sont les gypseries du stucateur Clerici. En 1816, les jardins à la française sont remplacés par des jardins à l'anglaise avant d'être rétablis par l'architecte paysagiste Achille Duchêne sans doute. Le parc a conservé de cette époque plusieurs de ses anciennes fabriques.  Éléments protégés MH : le château avec toutes ses dépendances, les deux parcs clos de murs et leurs fabriques : inscription par arrêté du 22 octobre 1990.  Le château privé,situé sur la commune de Saint-Chéron, appartient actuellement  au vicomte Henri de Talhouët et à sa famille . Il ne se visite pas ordinairement est peu visible de l'extérieur. C'est un château de style Louis XIII, de grande dimension, à l'architecture élégante et assez sophistiquée. Le corps central est flanqué de deux ailes latérales qui se terminent par des pavillons en saillie. Le corps central seul ne comporte pas de parement de briques inséré dans la pierre. Il fut édifié entre 1625 et 1629 par Michel Villedo, maître maçon de Louis XIII, pour Chrétien de Lamoignon, conseiller  puis président à mortier au Parlement de Paris.\nLes deux ailes datent cependant de 1677. L'autre façade du château: on voit mieux les ailes. L'aile de gauche a été démolie,et on a utilisé ses matériaux pour construire l'orangerie, il a remplacé un ancien manoir seigneurial, il va appartenir aux Lamoignon jusqu'en 1791.  Il appartient actuellement au vicomte de Talhouet qui descend des Lamoigon.","habitants":"La Duchesse de Talleyrand  et du vicomte Henri de Talhouët por Baville\"","divers":"Deux châteaux a st-Chéron  Baville  grav 1-2 et Marais grav 3-4.  GPS : 48° 34' 23\" Nord, 2° 06' 07\" Est                                                                  Baville GPS : 48° 34' 0,34\" Nord, 2° 07' 36,37\" Est","gps":"48° 34' 23\" Nord, 2° 06' 07\" Est","images":["../image/image_91/91_Marais_Baville_1.jpg","../image/image_91/91_Marais_Baville_2.jpg","../image/image_91/91_Marais_Baville_3.jpg","../image/image_91/91_Marais_Baville_4.jpg","../image/image_91/91_Marais_Baville_5.jpg"]},"Consult_chateau_formulaire90e3":{"id":"Consult_chateau_formulaire90e3","dept":"91","canton":"Arpajon","commune":"Bouray sur Juine","nom":"Mesnil_Voysin","type":"Château","periode":"XV","histoire":"MESNIL-VOISIN L'actuel château de Mesnil-Voysin est bâti en 1635 sur les fondations d'un ancien édifice du Moyen Âge. À la fin du XIIe siècle, le domaine aurait été la propriété d'un chevalier Gautier, « seigneur du Mesnil », et homme lige du roi Philippe Auguste. Au XVe siècle, la propriété passe aux mains de la famille Karnazet, qui se le transmet sur plusieurs générations, jusqu'en 1455, quand Jean de Vaillant reprend les rênes du domaine. La chapelle du Mesnil est commanditée par Renée Sabathier, épouse de Guillaume Hérouard, secrétaire de la chambre du Roi, en 1611. Elle y sera inhumée en 1616. Le château « vieux » sera détruit, en 1633-1634, par François Jameau, maçon du village voisin de Lardy. Des travaux de reconstruction sont entrepris par Pierre Hérouard, dès 1635, mais des soucis financiers l'obligent à revendre ses biens dont le domaine, en cours de travaux. Racheté par Claude Cornuel, conseiller du roi Louis XIII et intendant des finances, les travaux sont terminés par Michel Villedo qui, en 1657,  le château de Mesnil-Voisin changea de propriétaires au gré des successions et des mariages, pour passer successivement dans les mains des Broglie, des Rougé, des Choiseul, des Polignac et des d'Argentré. En mai 1652, le jeune Louis XIV y séjourne avec Mazarin, lors du siège d'Etampes pendant la Fronde. Charles Guillaume, marquis de Broglie, fait construire, dans le parc, la tour de Pocancy. Le domaine et le château sont loués au comte mexicain Subervielle au début du XXe siècle, puis mis en vente en 1939. La société privée qui en fait l'acquisition prévoyait une restauration et une modernisation, stoppées par l'occupation des lieux par les troupes allemandes, puis américaines durant le conflit mondial. En 1954, la famille Mansillon acquiert les lieux, puis les vend en 1993 au baron Bertrand Merlin d'Estreux de Beaugrenier.","architecture":"MESNIL VOISIN,   l'influence italienne apportée par la Renaissance et illustrée par les châteaux de la Loire s'atténuant, elle trouve à Mesnil-Voysin les éléments qui caractériseront le grand classicisme français, marqué par la simplicité majestueuse de son ordonnancement symétrique, proche d'un certain minimalisme cher à François Mansart. En 1993, une équipe de compagnons se lance dans un chantier de restauration des plus importants, pour retrouver l'esprit de cette demeure exceptionnelle, par son caractère complet, son environnement, son parc dessiné à la fin du XVIIe par André Le Nôtre et sa richesse hydraulique. Le tracé du canal bordant l'arrière du château a été entièrement recreusé entre 1999 et 2001. Il a ainsi repris son tracé initial quittant la Juine un peu en amont du château pour y replonger en aval de celui-ci, juste avant le pont de Cochet.La procédure de classement s'est déroulée en trois phases :  L'ensemble des façades et toitures du château et des deux pavillons d'angle ainsi que celles des communs avec leur mur de clôture fait lobjet dun classement au titre des M.H. depuis le 18 décembre 1980,  L'intérieur fait l'objet d'une inscription au titre des M.H. depuis le 12 octobre 1994,  Le petit parc fait l'objet dun classement au titre des M.H. depuis le 6 novembre 1995.   Le château a été construit par le réputé maçon de la Creuse, Michel Villedo. Il possède de vastes communs. Au centre de la cour des communs, un immense pigeonnier coiffé d'une poivrière présente ses 3 500 boulins (nichoirs intérieurs), sa charpente et son dénichoir mobile. C'est un des rares à être préservé en l'état avec l'escalier mobile interne.L'importance du chantier apparaît à travers ses 360 fenêtres à refaire.","habitants":"famille Karnazet et Charles Guillaume, marquis de Broglie\"","divers":"Bouray sur Juine48° 31' 14? nord, 2° 16' 34? est","gps":"","images":["../image/image_91/91_Mesnil_Voysin_1.jpg","../image/image_91/91_Mesnil_Voysin_2.jpg","../image/image_91/91_Mesnil_Voysin_3.jpg"]},"Consult_chateau_formulaire7c9a":{"id":"Consult_chateau_formulaire7c9a","dept":"91","canton":"Mennecy","commune":"Guigneville sur Essonne","nom":"Michaudière","type":"Château","periode":"XIX","histoire":"MICHAUDIERE, se situe non loin du cur de la commune de Guigneville-sur-Essonne, de lautre côté de la voie ferrée. On a longtemps cru que cet édifice avait été construit pour remplacer lancien château de Guigneville, prétendument démoli pour permettre le passage du chemin de fer. Or, il nen est rien! Ce château fut construit en 1878 par Pierre Schaeffer,  fabricant de pianos au sein de la maison Erard. Dans les années 1920, le bâtiment fut transformé en hôtel-restaurant haut de gamme, accueillant la bourgeoisie parisienne, désireuse de prendre le bon air. Grâce à son vaste parc, où sécoule la rivière Essonne, le château présente en effet un cadre idéal pour se ressourcer. Cest à cette époque quil prend le nom de la Michaudière, du nom de son chef cuisinier et gérant, Michaud. En 1959, le château est de nouveau réhabilité en copropriété. Ainsi son organisation intérieure est totalement modifiée pour y accueillir des appartements.","architecture":"MICHAUDIERE,  la façade est restée intacte, ainsi que lescalier monumental situé dans le hall du château. La façade correspond à un style architectural francilien de la seconde moitié du XIXe siècle, mêlant des éléments du style classique français à des éléments tirés du vocabulaire architectural de cette période : chaînages dangle, enduit rocaillé, toiture dite à forte pente réalisée en ardoises. La façade est marquée par un axe central comprenant trois travées, délimitées par des pilastres dont les chapiteaux sculptés représentent des chauves-souris. La structure de lédifice est très innovante pour lépoque. En effet, pour la réalisation des plafonds, des matériaux nouveaux ont été utilisés, le ciment associé au fer. Le château est entouré par un vaste parc, très boisé, au fond duquel sécoule lEssonne. Ce parc est inscrit à linventaire général du patrimoine culturel. Un petit édifice interpelle lorsquon entre dans ce parc, il sagit du pavillon Suédois, probablement la maison du gardien, qui sappelait monsieur Suédois.","habitants":"Famille de Pierre Schaeffer\"","divers":"Château de la Michaudière à Guigneville sur Essonne","gps":"","images":["../image/image_91/91_Michaudi%c3%a8re_1.jpg","../image/image_91/91_Michaudi%c3%a8re_2.jpg","../image/image_91/91_Michaudi%c3%a8re_3.jpg"]},"Consult_chateau_formulaire14bb":{"id":"Consult_chateau_formulaire14bb","dept":"91","canton":"Corbeil-Essonnes","commune":"Lisses","nom":"Montauger","type":"Château","periode":"XVIII","histoire":"MONTAUGER,  à la lisière entre les espaces urbains du Nord du département et les zones rurales du Sud, il constitue la \"porte dentrée\" des Marais des basses vallées de lEssonne et de la Juine. Situé sur les communes de Lisses et Villabé,  l'édifice principal est l'aile gauche d'un château du XVIIIe siècle, construit pour Gilbert-Jérôme Clautrier, premier commis du contrôle général des finances, par l'architecte du roi, Jacques Hardouin-Mansart de Sagonne, de 1759 à 17623. Il remplace un château plus ancien bâti au début du XVIIe siècle à l'emplacement d'une bâtisse médiévale. Démoli en grande partie en 1818-1819, le château est recomposé dans son état actuel dans les années 1840. Il a connu des propriétaires importants tels que Sylvain Rosengart, frère et associé du grand constructeur automobile du même nom, ou la famille Ruffier d'Epenoux, ses derniers propriétaires privés.","architecture":"MONTAUGER, le domaine est acheté en 2002 par le conseil départemental de l'Essonne qui le restaure et décide d'en faire sa Maison de l'environnement. Vous pouvez désormais accéder librement à lensemble de son parc de 15 ha, entre prairies, vergers, et marais. A l'ombre de ses grands arbres, son parc calme et secret vous enchantera par son patrimoine écologique et paysager très varié. Toute la palette des paysages du département semble avoir été rassemblée ici : vergers, étangs et marais, coteaux, mares et ruisseaux y composent une riche mosaïque naturelle à parcourir au fil des allées.","habitants":"Famille Gilbert-Jérôme Clautrier\"","divers":"Château de Montauger à Lisses","gps":"","images":["../image/image_91/91_Montauger_1.jpg","../image/image_91/91_Montauger_2.jpg"]},"Consult_chateau_formulaire55fc":{"id":"Consult_chateau_formulaire55fc","dept":"91","canton":"Longjumeau","commune":"Saulx-les Chartreux","nom":"Monthuchet","type":"Château","periode":"XVII","histoire":"MONTHUCHET, la construction fut entamée par Bernard Pinon, conseiller de la grande chambre du Roi qui fit défricher les terres, construire une demeure et aménager un parc. À sa mort en 1710, le domaine revint à la famille de Pracomtal, propriétaire du château de Villebon-sur-Yvette. En 1784, les religieux de l'ordre des Chartreux abandonnèrent leur propriété sur le village à Charles-Pierre Savalette de Magnanville mais récupéra le château jusqu'en 1785 où monsieur Savalette racheta le domaine. À la Révolution, le château fut vendu comme bien national à monsieur Féron qui le vendit au marquis Jean Joseph Dessolles, général et pair de France. À sa mort, la succession établie au 14 novembre 1828 permit le retour des biens à sa fille de La Rochefoucault d'Estissac qui vendit le tout au général Louis Jacques Ruelle de Santerre. Il revendit le château au graveur Antoine Coupé qui démantela le domaine.","architecture":"MONTHUCHET en 1914, le château était partiellement démoli. Le château se compose d'un corps principal droit en brique de style renaissance, à six fenêtres, à un étage augmenté de combles mansardés. L'ensemble est couvert d'ardoise. Il est complété d'une maison de maître et d'un corps de ferme en L. Le parc, d'une superficie de sept hectares, est clos de murs et ouvert par deux grilles d'honneur en vis-à-vis, l'une au nord, la principale au sud. Il est paysagé, planté d'arbres et dispose d'une pelouse à l'ouest, agrémentée par un étang alimenté par le ruisseau de Chauffour. Au nord-est est aménagé un jardin potager.","habitants":"Famille de Pracomtal\"","divers":"Château de Monthuchet à  Saulx-les Chartreux","gps":"","images":["../image/image_91/91_Monthuchet_1.jpg"]},"Consult_chateau_formulaireebe5":{"id":"Consult_chateau_formulaireebe5","dept":"91","canton":"Longjumeau","commune":"Montlhéry","nom":"Montlhéry_fort","type":"Vestiges","periode":"XIV-XVIII","histoire":"Deux châteaux dans cet article, Montlhery et Souche. MONTLHERY, Olivier de Clisson qui eut la garde du château de 1382 à 1392. Il ajouta quatre étages desservis par une tour d'escalier hors-oeuvre, avec chemin de ronde sur mâchicoulis au quatrième étage. La chapelle dont les fondations subsistent en bordure sud-est du fossé a été édifiée par saint Louis en 1254. Un procès-verbal d'expertise constate l'état de ruine des lieux dès 1547. Pendant les guerres de religion qui parachevèrent sa dégradation, la forteresse servit de quartier général aux calvinistes et en 1591 les habitants de Montlhéry obtinrent d'Henri IV son démantèlement. Elle servit dès lors de carrière de pierres, notamment pour les murs d'enceinte de la ville commencés en 1540. Au cours du XIXe siècle il servit aux expériences scientifiques (détermination de la vitesse de la lumière et du son). La première restauration est due à Henri Labrouste qui en 1842 consolida la grande brèche de la Tour brûlée par un massif en briques. Son successeur Garry traita également en brique le sommet de la tourelle d'escalier. En 1946 un pont en béton armé remplaça celui dû à l'architecte Naples en 1878 et une terrasse en ciment armé fut posée sur le donjon. En 1844 la commune avait acquis les terrains environnant la tour pour établir une promenade publique.","architecture":"MONTLHERY, les courtines cantonnées de quatre tours circulaires, aujourd'hui arasées, encadrent une plate-forme rectangulaire proche d'un carré qui se prolonge vers le sud-est par une avancée triangulaire avec au bout la tour maîtresse. Seule la Tour brûlée située au nord-ouest a conservé plus que sa base talutée ; elle est reconnaissable à ses reprises en brique dues à Labrouste. La tour nord à droite de l'entrée a un fort dévers, d'où son nom de Tour penchée. Des deux autres tours, Est et sud, ne subsistent que les maçonneries de soutènement. Les tours et les courtines sud et est sont construites en pierre de taille assez régulière. Le donjon a une hauteur de 30, 35 m et un diamètre de 9,60 m à la base. Sa partie basse (rez-de-chaussée et premier étage) abrite deux salles superposées de plan hexagonal, autrefois voûtées ; elles ont été édifiées avec un parement externe en carreaux de grès très soigné alors que la maçonnerie interne, enduite, est en matériaux plus légers (meulière et chaux). Au premier niveau, à gauche de l'entrée un escalier rampant est aménagé dans l'épaisseur de la paroi.                                                                      SOUCHE à Montlery , maison du XVIIIe siècle remaniée au XIXe siècle. Le site est constitué par le prolongement de la butte de la tour de Montlhéry et englobe des vestiges des anciens remparts. Dans les années trente une partie du jardin sur terrasses a été réaménagée (bassins et serre). La deuxième terrasse s'appuie sur un mur fortifié, élément de l'enceinte de la ville, construite entre 1540 et 1580. La façade sur jardin, du bâtiment principal à deux niveaux, porte un enduit rocaillé, la façade postérieure (trois niveaux), un crépi tyrolien ; le toit est en tuiles plates à longs pans en croupe, celui de l'aile en retour à longs pans brisés, terrasson en zinc et brisis en ardoise.Propriété de la commune.","habitants":"Famille d' Olivier de Clisson\"","divers":"Deux châteaux à, Montlhéry et Souche grav 1.                                                      GPS : 48° 34' 44\" Nord, 2° 26' 06\" Est                                                                GPS : 8° 38' 06\" Nord, 2° 16' 19\" Est","gps":"48° 34' 44\" Nord, 2° 26' 06\" Est","images":["../image/image_91/91_Montlh%c3%a9ry_Fort_1.jpg","../image/image_91/91_Montlh%c3%a9ry_Fort_2.jpg","../image/image_91/91_Montlh%c3%a9ry_Fort_3.jpg","../image/image_91/91_Montlh%c3%a9ry_Fort_4.jpg","../image/image_91/91_Montlh%c3%a9ry_Fort_5.jpg"]},"Consult_chateau_formulairedd22-2":{"id":"Consult_chateau_formulairedd22-2","dept":"91","canton":"Etampes","commune":"Morigny Champigny","nom":"Morigny_Champigny","type":"Château","periode":"XVIII","histoire":"Deux châteaux dans cet article, Jeurre  et Morigny-Champigny  JEURRE, la construction du château de Jeurre date de 1784 à 1787. En 1412, il est fait mention d'un \" hébergement appelé la Tour de Jeurre \", également nommé \" le château de Barre\". La Tour en ruines date du milieu du XVIIIe siècle. Le château de Jeurre a été construit au XVIIIe siècle, pour la famille Regnault de Barre. Le parc de Jeurre était construit au-dessus dune nappe phréatique ainsi quune partie du château qui était dressé sur des pilotis, suite à une nappe phréatique, le domaine subissait plusieurs inondations. Louis-César Dusfresne de Saint Léon décida de la construction dun aqueduc-siphon, aujourdhui, répertorié comme M.H. Racheté en 1790, par le financier Louis-César-Alexandre Dufresne Saint-Léon, accusé et exilé, le château de Jeurre alla ensuite dans les mains du comte Mollien. Au XIXe siècle, il revint dans la famille des Saint-Léon. Les châteaux du Grand et Petit Jeurre sont attestés depuis 1689. Entre 1809 et 1814, revient par héritage aux Mollien eut lieu l'agrandissement du château du Grand Jeurre, la reconstruction des communs, de la ferme et de la maison du jardinier, par les architectes Pierre Nicolas Bénard, puis par Jacques Charles Bonnard et l'aménagement du parc du château. Fragments de deux autres hôtels parisiens également intégrés dans le château de Jeurre. La jonction des 2 pavillons a été réalisée à la fin du XIXe siècle. Le château a été classé aux M.H. le 9/08/1957, Son propriétaire actuel est le comte Louis Dufresne de Saint-Léon.","architecture":"JEURRE, consistant en un chateau en très mauvais état, dont un des pavillons n'est pas couvert, et l'autre n'est pas fini, et au surplus manquant de portes et de fenêtres, terres bois, et autre appartenances et dépendances\". Moins de dix ans plus tard, le 24 novembre 1768, après la mort du marquis Louis de Talaru, son fils César Marie vend à Germain Petit, laboureur et receveur de la terre et seigneurie de Mesnil Giraut, \"le chateau de Joeur scitué audit lieu de Joeur\".Le 23 mars 1792, Germain Petit vend le domaine à son gendre Etienne-Louis Collard-Dutileul.  Son propriétaire actuel est le comte Louis Dufresne de Saint-Léon.                                                                                                                                 MORIGNY-CHAMPIGNY, le château de 330 m² avec élévation sur trois niveaux fut construit à la fin du XVIIIe siècle. Il est entouré de six hectares de terrain avec dépendances, la propriété appartenait à cette époque à la famille Saint-Périer. Sous l'occupation, le  château de Morigny est occupé par les Allemands et la comtesse de Saint Perrier ne manquait jamais une occasion de faire remarquer à ses hôtes, que dans le vestibule pavé d'une mosaïque gallo-romaine provenant de Sousy la Briche, les carrés de céramique manquants, ont été enlevés par les bottes ferrées des \"Nazis\". Derniers vestiges de l'occupation, des portraits grands formats d'Hitler et de Goering, sont restés dans le grenier du château jusqu'à la mort de la comtesse en 1978. Sans héritier direct la comtesse lègue le domaine à la Sorbonne, ce cadeau cher à entretenir est revendu et tombe dans l'escarcelle d'investisseurs privés. Restauré, le site accueille une vingtaine de logements locatifs de prestige","habitants":"Famille Regnault de Barre\"","divers":"Deux châteaux à Morigny Champigny Jeurre grav_2 et Morigny-Champigny- grav Grav_1.          Vaudouleurs grav 3                                          GPS : 48° 26' 53\" Nord, 2° 10' 55\" Est                                                                  Jeurre  GPS : 48° 28' 05\" Nord, 2° 11' 17\" Est","gps":"48° 26' 53\" Nord, 2° 10' 55\" Est","images":["../image/image_91/91_Morigny_Champigny_1.jpg","../image/image_91/91_Morigny_Champigny_2.jpg"]},"Consult_chateau_formulaire16d6":{"id":"Consult_chateau_formulaire16d6","dept":"91","canton":"Etampes","commune":"Méréville","nom":"Méréville","type":"Château","periode":"XV-XVII","histoire":"MEREVILLE, à partir d'une construction préexistante du XVIe siècle, le marquis de Laborde aménagea le domaine de Méréville de 1784 à 1794 avec le concours des plus grands artistes de l'époque : Bélanger, Hubert Robert, Greuze, Augustin Pajou, Jospeh Vernet, pour en faire le plus beau parc à l'anglaise d'Europe continentale, la colonne Trajane a été édifiée pendant le quatrième quart du XVIIIe siècle par J. André. Les fabriques ont été restaurées. Mais certaines fabriques ont été transférées dans le parc du château de Jeurre situé a Morigny-Champigny. A l'intérieur, une partie des décors et l'essentiel des aménagements subsistent, marbre jaune, glaces, lambris d'acajou, cheminées.","architecture":"MEREVILLE: chateau d'époque Louis XIII cantonné de quatre grosses tours d'angles, classement par arrêté du 15 juin 1977. La \"Colonne Trajane\", fabrique de l'ancien petit parc : classement par arrêté du 7 septembre 1978. Les parties subsistantes des cinq fabriques suivantes de l'ancien petit parc : le \"fort\", les \"écuries anglaises\", le pont du chemin, le \"petit château\", la \"fausse chapelle\" :Toutes les pièces avec leur décor au rez-de-chaussée du château, à l'exception des trois pièces déjà classées : . Les intérieurs du château, à l'exception de toutes les pièces du rez-de-chaussée classées : inscription par arrêté du 17 décembre 1993. En totalité, l'aqueduc du domaine, y compris la vanne permettant sa prise d'eau au moulin de Semainville : inscription par arrêté du 29 juin 2013. proprriété de monsieur T.S.Kelly.","habitants":"Famille du marquis de Laborde\"","divers":"Château de Méréville                                  GPS : 48° 19' 12\" Nord, 2° 05' 28\" Est","gps":"48° 19' 12\" Nord, 2° 05' 28\" Est","images":["../image/image_91/91_M%c3%a9r%c3%a9ville_1.jpg","../image/image_91/91_M%c3%a9r%c3%a9ville_2.jpg","../image/image_91/91_M%c3%a9r%c3%a9ville_3.jpg","../image/image_91/91_M%c3%a9r%c3%a9ville_4.jpg"]},"Consult_chateau_formulaireda70":{"id":"Consult_chateau_formulaireda70","dept":"91","canton":"Mennecy","commune":"Nainvilles les Roches","nom":"Nainville","type":"Château","periode":"XIX","histoire":"NAINVILLE, est construit au XIXe siècle, dans un style Louis XIII. Il fut la propriété de l'État, jusqu'en 2007, et abrita pendant 30 ans, l'École Nationale Supérieure des Officiers de Sapeurs-Pompiers (ENSOSP). Celle-ci a été fermée le 28/06/2007. L'ENSOSP a été vendue en décembre 2008. Le Château de Nainville-les-Roches a été vendu près de 4 millions d'euros. Ce Château de Nainville-les-Roches, de style Louis XIII est noyé dans un écrin de verdure de 40 Ha, avec 176 chambres, un hall de 100 m2 avec un escalier de marbre, un hammam, un squash et 2 bunkers souterrains ! Mais le mystérieux acheteur qui a exigé une clause de confidentialité en signant en décembre a redonné le sourire aux habitants de la commune. Ce château de Nainville-les-Roches, tombant dans le domaine privé va ramener des impôts locaux, fonciers et taxe professionnelle. Et cerise sur le gâteau : le propriétaire a offert à la Commune un emplacement de 100 places de parking. Le château de Nainville était auparavant la propriété du ministère de l'Intérieur. Jusqu'en 2007, la belle demeure a abrité la fine fleur des pompiers, l'Ensosp, la grande école des sapeurs-pompiers de France. Il y aura un complexe hôtelier et, de l'autre côté, des logements des pompiers, un centre pour handicapés. Une source proche du dossier glisse que  les propriétaires, très concernés par le sujet, développent un projet personnel.","architecture":"NAINVILLE les Roches C'est la première fois que l'Etat, qui se sépara de son patrimoine, en confia la vente à un agent immobilier. Après près de 2 ans infructueux où la vente a été confiée aux domaines. Et le gagnant est : Patrice Besse, spécialiste des « châteaux et vieilles demeures ». Le bénéfice de la vente ira à 85 % dans la poche du Ministère. Le reste sera dispatché dans des projets comme la reconstruction de l'Ecole des Pompiers à Aix-en-Provence. Patrice Besse a empoché au passage la somme de 200 000 Euros. « Cette vente n'était pas facile dans le contexte actuel, résume-t-il : « On ne vend pas des châteaux tous les jours. »","habitants":"ministère de l'Intérieur\"","divers":"Château de Nainvilles les Roches GPS : 48° 30' 17\" Nord, 2° 29' 34\" Est","gps":"48° 30' 17\" Nord, 2° 29' 34\" Est","images":["../image/image_91/91_Nainville_1.jpg","../image/image_91/91_Nainville_2.jpg"]},"Consult_chateau_formulaired232":{"id":"Consult_chateau_formulaired232","dept":"91","canton":"Arpajon","commune":"La Norville","nom":"Norville","type":"Château","periode":"XVI","histoire":"NORVILLE  Le manoir seigneurial de Norville a disparu pendant la guerre de Cent ans. Un nouveau château est construit par ministère de l'Intérieur qui acquiert le fief en 1610. Il s'agit d'un grand corps de logis à chaque extrémité duquel se trouvait un pavillon couvert de tuiles. Une cour s'étendait devant l'habitation et l'ensemble était entouré de fossés. Ce château sera transformé, après son acquisition le 26 Juillet 1737, par le fermier général François Jules Duvaucel Le bâtiment est en grande partie réédifié, une grille en fer en ferme l'entrée. Le parc, autour du château, aurait été dessiné par André Le Nôtre. Des héritiers de Duvaucel, le château passa à René Louis de Boisgiroult en 1759, à Joseph Louis Bidé de la Granville, puis au duc de Mouchy en 1772 et en 1784 à Louis Jacques Baron, receveur général des finances de Franche Comté, le château resta dans la famille jusqu'au début du XXe. Entre 1901 et 1906, les boiseries du grand salon sont vendues. Elles sont remontées en 1924 dans l'hôtel de Mrs Hamilton Rice à New York et sont maintenant à la National Gallery de Washington.","architecture":"La NORVILLE, château constitué d'un corps central avec un avant-corps de deux étages et trois travées accosté de deux pavillons de un étages et deux travées à ses extrémités. Celui de gauche est prolongé d'une aile plus basse (un étage et trois travées, avec un toit en terrasse). Le corps central et les deux pavillons ont un étage de comble éclairé de lucarnes, l'avant-corps est surmonté d'un fronton triangulaire. Les toits sont recouverts d'ardoise. Sur la façade postérieure sont encore visibles le soubassement du château du XVIIe siècle et l'emplacement des anciens fossés. Le parc a été très largement loti, l'entrée du château est fermée par une grille du XVIIIe siècle entre deux pavillons carrés de deux travées, couverts d'un toit d'ardoise avec une lucarne. L'intérieur a été réaménagé par le centre de phoniatrie qui l'occupe. Ne subsistent que le grand escalier XVIIIe siècle et le grand salon. Celui-ci a gardé sa cheminée Louis XV mais son décor de boiserie vendu entre 1901 et 1906 a été remplacé par un décor de stuc ; seule la corniche du plafond est restée en place avec son décor sculpté de Nicolas Pineau.","habitants":"général François Jules Duvaucel \"","divers":"Château à la Norville                                                                GPS : 48° 37' 44\" Nord, 2° 27' 21\" Est","gps":"48° 37' 44\" Nord, 2° 27' 21\" Est","images":["../image/image_91/91_Norville_1.jpg","../image/image_91/91_Norville_2.jpg","../image/image_91/91_Norville_3.jpg"]},"Consult_chateau_formulairea97f-2":{"id":"Consult_chateau_formulairea97f-2","dept":"91","canton":"Arpajon","commune":"Ollainville","nom":"Ollainville","type":"château","periode":"XVII-XIX","histoire":"Deux châteaux dans cet article Ollainville et la Roche.                                   OLLAINVILLE,  le château d'Ollainville, de style Restauration, est reconstruit  au XVIIe siècle sur l'emplacement d'un premier château  dont subsistent les pavillons d'entrée. Deux pavillons au décor de briques, au toit brisé en pavillon, encadrent une porte d'entrée monumentale surmontée d'un fronton. Avec le mur d'enceinte, ils sont les seuls vestiges du XVIIe siècle. Le château actuel est constitué de trois corps de bâtiments. Le corps central a cinq travées. Les deux niveaux sont séparés par un bandeau mouluré et une corniche. Ce décor se reproduit sous le toit. Celui-ci est orné d'un fronton central éclairé par trois fenêtres surmontées d'un oculus. Des pilastres ornent les angles du bâtiment. En retour d'équerre, un autre bâtiment de même type mais au décor plus sobre regarde vers l'est. Il a cinq travées ouvrant sur le plan d'eau et trois lucarnes éclairent le toit. IL est cantonné légèrement en retrait par une aile plus basse recouverte de tuiles plates, sans doute les anciens communs. Le château est entouré d'un parc dans lequel on trouve une orangerie décorée de niches contenant des bustes de type romain. Elle comprend un bâtiment allongé à cinq ouvertures en plein cintre et de ailes plus basses, en terrasses couronnées d'une balustrade.une partie du parc et l'orangerie a été rachetée par la commune.","architecture":"LA ROCHE, en 1832 décès de madame Veuve Augustin Pomme qui laisse en héritage à ses trois enfants, un terrain de deux hectares et une maison. Après partage, le propriétaire de la maison et du terrain attenant devient à  Pierre Auguste Pomme, agent de change, qui se lance à partir de 1844 dans une vaste entreprise d'extension du domaine familial. En 1853, il acquiert une propriété mitoyenne qui augmente la superficie du terrain de plus de trois hectares. Il y fait alors construire une demeure néo-Louis XIII. Il est élu maire en 1865 et le restera jusqu'à sa mort le 21 Janvier 1870. Ses biens sont légués à ses soeurs qui meurent en 1876 et en 1880 sans héritier direct. Le domaine passe ensuite de main en main. La chambre de commerce l'acquiert en 1939 puis le vend en 1948 à l'éducation nationale afin d'y accueillir des enfants en échec scolaire. Ainsi est créé l'établisement régional d'éducation adaptée d'Ollainville.\nChâteau constitué d'un corps central de trois travées accosté de deux pavillons d'une travée. Le bâtiment possède un étage de comble éclairé, en façade, par une lucarne entourée de deux oeils de boeuf pour le corps central, par deux une grande lucarne pour chacun des deux pavillons. Le château de style néo-Louis XIII, est construit en briques rouges, avec des chaînages d'angle en pierre. L'entrée se fait par un escalier en fer à cheval en pierre. La toiture est en ardoise. Une clé sculptée surmonte la fenêtre centrale, au premier étage.","habitants":"Famille de Pierre Auguste Pomme\"","divers":"trois châteaux à Ollainville grav 2-3   et la Roche  grav 1.                                                   Ollainville GPS : 48° 35' 30\" Nord, 2° 12' 59\" Est","gps":"48° 35' 30\" Nord, 2° 12' 59\" Est","images":["../image/image_91/91_Ollainville_1.jpg","../image/image_91/91_Ollainville_2.jpg","../image/image_91/91_Ollainville_3.jpg"]},"Consult_chateau_formulaire32f9":{"id":"Consult_chateau_formulaire32f9","dept":"91","canton":"Ris Orangis","commune":"Ris Orangis","nom":"Orangis_Réaux","type":"Château","periode":"XVII-XVIII","histoire":"ORANGIS  les plus anciens seigneurs d'Orangis sont signalés dans le cartulaire de Longpont. On y trouve vers 1136, Herbert et Gilbert d'Orengy, puis Baudoin et Thibaud d'Orengy et enfin, au XIIIe siècle, le chevalier Jean de Orangiaco. Le hameau a été rattaché à Ris en 1793, dans le souci des notables de l'époque de faciliter la collecte de l'impôt. Le château d'Orangis, dit château Lot, porte le nom de la famille qui l'occupe depuis 1793. Devenu bien national pendant la Révolution, le domaine qui avait appartenu aux seigneurs de Ris, est acheté par une dame Jousserand, aïeule de la famille Lot. Le château n'était, au XVIIIe siècle, qu'un rendez-vous de chasse assez petit, composé d'un rez-de-chaussée et d'un étage, comportant une entrée et deux petites pièces en bas et l'équivalent au premier étage. Il a été rehaussé et agrandi au XIXe siècle tel que nous le connaissons encore aujourd'hui. Les derniers propriétaires descendaient des généraux Ordener, la propriété a été mise en vente après le décès de Madame Lot. Les héritiers ne voulant pas l'occuper, c'est une Société qui a acheté le château.\nTrois sociétés se sont partagé l'ensemble du Domaine. La municipalité a racheté le château il y a deux ans et mis un droit de préemption sur le reste afin d'éviter que ne se réalise une opération immobilière à cet endroit. Par manque d'argent la situation reste en l'état. Actuellement ce château est à l'abandon et en très mauvais état.","architecture":"REAUX à Soisy sur école  village voisin de Ris -Orangis  Au XVIIIe siècle, la famille d'Averton, ruinée, cède la seigneurie réduite au vieux château et ainsi que la ferme des Réaux au comte de Cély. La descendance vend la propriété en 1820 à Sylvain Mignon, entrepreneur de bâtiments du roi sous la Restauration, qui reconstruit la partie centrale du manoir. Rachetée en 1864 par la comtesse Sophie Osmont Du Tillet, née Pauwels, richissime héritière du fondateur de la compagnie du Gaz, la demeure prend son aspect actuel sous la conduite de son fils Édouard. Le château des Réaux allie à son charme naturel des ouvrages chargés d'histoire, ce château de style Napoléon III a été entièrement restauré en 1982.","habitants":"Famille d'Orangis\"","divers":"deux châteaux à Ris -Orangis , Réaux  et Trousseaux grav-3   Ris  GPS : 48° 39' 13\" Nord, 2° 24' 58\" Est","gps":"48° 39' 13\" Nord, 2° 24' 58\" Est","images":["../image/image_91/91_Orangis_R%c3%a9aux_1.jpg","../image/image_91/91_Orangis_R%c3%a9aux_2.jpg","../image/image_91/91_Orangis_R%c3%a9aux_3.jpg"]},"Consult_chateau_formulairefab1":{"id":"Consult_chateau_formulairefab1","dept":"91","canton":"Palaiseau","commune":"Orsay","nom":"Orsay_II","type":"Château","periode":"XVI","histoire":"Deux châteaux dans cet article, Launay et Grand-Mesnil.                                                                            LAUNAY, en 1258 le prieuré de Sainte Catherine du Val des Ecoliers à Paris acquiert des terres à Orsay près du Moulin à blé de lAulnay sur lYvette. En 1323 les moines sengagent à entretenir le pont sur lYvette permettant laccès au moulin et, aujourdhui, emprunté par les étudiants. Charles VI accorde aux moines, en 1414, le droit de \"queste\" pour lutilisation du moulin. En 1474, ils le louent à un meunier. En 1583, Maître Poussepin, notaire et secrétaire du roi, devient seigneur de Launay sous la suzeraineté des moines parisiens. Il obtient du roi la possibilité de fortifier le moulin, de creuser des fossés et dédifier un pont-levis. Le moulin est à lintérieur du château. En 1710, Messire Adrien François Waymel, Grand Maître des Eaux et Forêts, déjà propriétaire de la Vauve près de Corbeville, possède le château. En 1790, les époux Basly, nouveaux propriétaires, vendent château et moulin à leur fille et à son mari Charles Félix Desjobert, grand maître des Eaux et Forêts et acquis aux idées nouvelles. Il gardera le château et sera maire dOrsay de 1805 à 1813. Sa fille Elisa décède en laissant 12000 F aux pauvres de la paroisse. En 1880 le château est loué à Maurice Bunau Varilla qui lachète en 1906 et le moulin en 1908. En 1944 les sympathies pro-allemandes du journal de M Bunau Varilla amènent la confiscation de ses biens à son décès. En 1955, un décret dutilité publique conclut lacquisition par lUniversité de Paris, du château et des territoires communaux avoisinants.","architecture":"GRAND MESNIL à Ures sur Yvette, voisin à Orsay de style Renaissance. Le château du Grand-Mesnil est depuis un hôpital psychiatrique. Le centre hospitalier dOrsay, est spécialisé en psychiatrie et pédopsychiatrie.    Demeure royale pour les malades. Un \"Hostel seigneurial\", dépendant de Gometz-le-Châtel, existait au Grand-Mesnil avant 1383. Antoine de Valles crée vers 1630 le château actuel et l'entoure d'un parc. En 1734, le domaine est acheté par Pierre Fauchard de Grand-Mesnil. Il est le \"père de l'art dentaire moderne\". En 1788, la première assemblée municipale se déroule en ce lieu. En 1954, le département y installe un hospice. Le château est aujourd'hui une annexe de l'hôpital d'Orsay. Le parc, est accessible par deux pavillons qui délimitent sa cour. A sa droite se déploient les anciennes dépendances avec le pigeonnier. Une extension a été créée au XIXe siècle. Le château est aujourd'hui entouré de constructions accueillant l'école d'infirmières. Ce château à la française, au plan massé, comprend un corps central de trois niveaux et de trois travées calé par deux pavillons. Chaque corps est individualisé par ses toitures à la Mansart couvertes d'ardoises. Le décor des façades, très simple, est créé par le contraste des enduits de la brique qui souligne les travées des fenêtres.","habitants":"Maître Poussepin  à  Maurice Bunau Varilla\"","divers":"à Orsay châteaux de Launay  grav -1 -2                                                                     GPS : 48° 41' 58\" Nord, 2° 11' 15\" Est                                                           Grand_Mesnil grav 2","gps":"48° 41' 58\" Nord, 2° 11' 15\" Est","images":["../image/image_91/91_Orsay_II_1.jpg","../image/image_91/91_Orsay_II_2.jpg","../image/image_91/91_Orsay_II_3.jpg"]},"Consult_chateau_formulairefc6b":{"id":"Consult_chateau_formulairefc6b","dept":"91","canton":"Palaiseau","commune":"Orsay","nom":"Orsay_Launay","type":"Château","periode":"XIV-XVII","histoire":"La Grande BOUVECHE, en 1400, Raymond Raguier, maître des chambres aux deniers du Roi entreprend la construction d'un château à Orsay. Lors de son décès en 1421, son gendre Bureau Boucher, maître des requêtes et garde des sceaux lui succède. En 1424, pendant la guerre de Cent Ans, le château fort fut pris par les Anglais. Par mariage et héritage, la seigneurie revint en 1675 à Charles Boucher, conseiller au Parlement et prévôt des marchands de Paris qui présidait les travaux dassainissement du quai de la Grenouillère, devenu par arrêté du roi Louis XIV le quai d'Orsay. En 1743, à la mort de Pierre Charles Louis Boucher, Pierre Grimod du Fort, fermier général et intendant des Postes acheta le domaine, il réaménagea la ville, restructura le centre. Son fils, Pierre Gaspard Marie Grimod d'Orsay poursuivit les travaux et fut titré comte dOrsay. En 1790, la Révolution permit à Orsay de devenir une commune et à madame Hulot dacquérir le château. Le général Moreau possédait le château après 1791. Le manoir de la Grande Bouvêche, formé de deux tours médiévales, est aujourd'hui le seul vestige du château d'Orsay qui ait résisté à la tourmente révolutionnaire. Construit au début du XVe siècle, son domaine s'étendait sur une vaste superficie, allant de l'église au cimetière et de l'Yvette à la rue de Paris. Le château s'élevait dans le parc municipal, aujourd'hui appelé parc Charles Boucher. Quant à la ferme de la Bouvêche elle devient bien national à la Révolution, ce qui la fait échapper à la destruction. Elle passe entre les mains de plusieurs propriétaires au XIXe siècle, dont en 1808 le duc de Padoue, Arrighi de Casanova, propriétaire également du château de Courson. Acquise par la mairie en 1985, c'est aujourd'hui un site incontournable de la culture.","architecture":"TEMPLE de la GLOIRE, Sa construction date de 1801, par larchitecte Pierre-Alexandre Vignon qui le fit ériger, en lhonneur du Général Moreau. Le Temple de la Gloire a été classé aux M.H. depuis 1979.                       L","habitants":"Famille de Marie Grimod d'Orsay\"","divers":"Deux châteaux à Orsay grande Bouvéche grav 2-3 et le Temple de la Gloire grav -1.Temple                            GPS : 48° 42' 00\" Nord, 2° 12' 04\" Est","gps":"48° 42' 00\" Nord, 2° 12' 04\" Est","images":["../image/image_91/91_Orsay_Launay_1.jpg","../image/image_91/91_Orsay_Launay_2.jpg","../image/image_91/91_Orsay_Launay_3.jpg"]},"Consult_chateau_formulaire3b1f-2":{"id":"Consult_chateau_formulaire3b1f-2","dept":"91","canton":"Athis-Mons","commune":"Athis-Mons","nom":"Ozonville","type":"Château","periode":"XV-XVI-XVII","histoire":"OZONVILLE, le fief d'Ozonville ou des Carneaux constituait un des fiefs les plus importants relevant de la seigneurie d'Athis. Formé de la réunion de plusieurs propriétés dont l'une appartenait au XVIIe siècle à Valentin Conrart, premier secrétaire de l'Académie française qui y recevait fréquemment Melle de Sudéry et la société littéraire de son temps, le domaine fut acquis en 1721 par le maréchal duc de Roquelaure et passa à sa mort, en 1738, aux mains de la veuve du maréchal de Villars (qui réunit à la propriété la maison de campagne de Conrart). Le château du XVIIe siècle comprend un corps de logis central flanqué de deux pavillons carrés sur la cour d'honneur. La charpente de l'aile sud-ouest a été datée par dendrochronologie des années 1623-1643. Le plan dressé en 1736 pour le duc de Roquelaure fait apparaître diverses adjonctions : une aile en retour sur la cour , des communs à l'entrée de l'allée d'honneur, une orangerie, des pavillons dans le parc. Le pavillon qui accompagne la façade du château sur le parc a sans doute été ajouté à la fin du XVIIIe siècle. En 1883, M. Mottet-Bey, ancien colonel au service du Pacha d'Egypte, vendit Ozonville à la société immobilière d'Athis-Mons créée par les anciens élèves des frères des écoles chrétiennes pour se porter acquéreurs du domaine ; les frères, menacés d'expulsion hors de leur maison de Paris par les lois anti-congréganistes, cherchaient à proximité de Paris une propriété pouvant servir à la fois de maison mère et de centre de retraite pour les frères et leurs élèves. L'architecte Conchon est chargé d'agrandir les bâtiments, qui prennent alors le nom de Notre-Dame-des-Retraites : deux galeries vitrées superposées sont installées devant le corps principal du château et deux ailes symétriques sont construites de part et d'autre de la cour d'entrée, celle de droite rapidement agrandie par l'adjonction de six travées et d'un étage supplémentaire","architecture":"OZONVILLE, en 1885, une chapelle est édifiée par le même architecte. En même temps que la chapelle une école primaire est construite à l'entrée de la propriété ; elle est démolie peu après sa fermeture en 1974. En 1894 un grand édifice appelé Second noviciat est édifié dans le parc pour servir aux chapitres généraux et aux retraites des jeunes frères issus de toutes les maisons de la congrégation ; le promenoir qui lui est accolé est remplacé en 1977 par une aile plus basse à deux niveaux. Les bâtiments de la ferme du XVIIe siècle donnant sur la route de Longjumeau (avenue Marcel-Sembat) ont été amputés en 1933-1934 à leur angle nord pour améliorer le carrefour de la place Henri-Deudon, et presqu'entièrement détruits en 1975 lorsque plus de la moitié de la propriété a été vendue à une société immobilière pour favoriser la modernisation du centre-ville; la résidence du Parc d'Ozonville occupe désormais cette partie de l'ancien parc. Le pavillon de musique, transformé en chapelle funéraire en 1884 pour recevoir les corps des derniers supérieurs de la congrégation, a été démoli vers 1980 lors de l'élargissement de la rue Jean-Baptiste-de-la-Salle.abrite la maison de retraite des frères des écoles chrétiennes.","habitants":"Famille de M. Mottet-Bey\"","divers":"Châteaux d'Ozonville à Athis-Mons","gps":"","images":["../image/image_91/91_Ozonville_1.jpg","../image/image_91/91_Ozonville_2.jpg"]},"Consult_chateau_formulaire24bd":{"id":"Consult_chateau_formulaire24bd","dept":"91","canton":"Arpajon","commune":"Lardy","nom":"Pastoureaux","type":"Château","periode":"XIX","histoire":"PASTOUREAUX, en 1580 le fief était la possession d'hugues le Maçon passa en 1680 à Claude Denis maitre fontainier du roi Les Pastoureaux restèrent, par successions féminines dans la même famille, après la mort de Claude Denis en 1680. Madame Bobières de Chars, femme de greffier en chef de la prévôté de Paris, puis Madame dAngervilliers, femme de trésorier de France à Montauban.Pendant la Révolution, la propriété des Pastoureaux progressivement aménagé, embellie, passa aux mains dhommes daffaires habiles, les Morel, qui associés avec un marchand papetier de Paris, créèrent une usine de papier qui fonctionnera de 1793 à 1797 mais sans rentabilité convenable. Cest alors quune certaine Mme Chambry, originaire sans doute du milieu textile, créa dans les bâtiments existants une manufacture de lacets et de passementerie. Dabord locataire elle en devint propriétaire en 1807. Elle continua en même temps à exploiter le moulin à blé des Sellés, qui fut avec le moulin Goujon et le moulin Richard, un des trois fournisseurs en blé du village de Lardy pendant les périodes difficiles de la Révolution.Madame Chambry vendit en 1821 à Mme Doré qui fit faillite et céda la propriété et lusine à la famille Gozzoli-Michelez. La famille sagrandit, un des frères Michelez fit construire une grande maison à côté du petit chemin menant au gré de la Juine. Il épouse la fille dun valeureux général de la révolution et de lempire : le baron Boyer qui passa les trois dernières années de sa vie dans la maison principale et y mourut en 1851. Léon Michelez fut un peintre connu de la vallée de la Juine, ami de Narcisse Berchère.","architecture":"PASTOUREAUX,  de lancien domaine, il reste la grande allée des Tilleuls plantée par Claude Denis à qui son métier avait appris le souci du décor.\nIl reste aussi en bord de Juine, de pauvres restants du moulin des Sellés, imposant bâtiment du XIVè siècle, avec une tour carrée. Il reste enfin la manufacture ancienne, transformée en appartement, témoignage rare de larchitecture industrielle à la fin du XVIIIè siècle. Lensemble garde une réelle noblesse et les bords de Juine ne manquent pas de lui donner une séduction un peu mystérieuse.","habitants":"Famille Michelez\"","divers":"A  Lardy château de Pastoureaux  GPS : 48° 31' 14\" Nord, 2° 15' 56\" Est","gps":"48° 31' 14\" Nord, 2° 15' 56\" Est","images":["../image/image_91/91_Pastoureaux_1.jpg","../image/image_91/91_Pastoureaux_2.jpg"]},"Consult_chateau_formulaire1d85":{"id":"Consult_chateau_formulaire1d85","dept":"91","canton":"Etampes","commune":"Cerny","nom":"Presles_Villiers","type":"Château","periode":"XVIII-XIX","histoire":"PRESLES, le château de Presles, à Cerny, appartient depuis près de deux siècles à la famille Carnot qui compte quelques-uns des personnages les plus illustres de France : Lazare Carnot, organisateur de la Victoire en 1793 sous la Révolution, Sadi Carnot, cinquième président de la République (de 1887 à 1894) ou encore le mathématicien Hippolyte Carnot. Car les Carnot ne se contentaient pas de trouver le repos dans cette demeure. Ils ont tous apporté leur touche : Lazare Carnot a planté les platanes qui forment une haie d'honneur pour les arrivants. Voulant vivre à Presles en autarcie, il y a développé une ferme, un jardin et un potager. Hippolyte a fait agrandir le château en hauteur et l'a peint en fausses briques pour être plus à la mode. Quant au président Sadi, il a fait construire une ferme moderne avec un système très efficace d'évacuation des eaux usées et des eaux de pluie qui fonctionne toujours..","architecture":"VILLIERS, après avoir appartenu à Alix ou Adèle de Champagne qui le réunit à la couronne de France par son mariage avec Louis VII le Jeune, dont elle fut la troisième épouse en 1165. Au tout début du XIVe siècle, Villiers-le-Châtel était à Jean d'Ormoy : il épousa Isabeau, sur d'Hugues III de Bouville (les Bouville possédaient Milly, Boisses, La Chapelle, Achères, Bouville et Farcheville), et leur fille Marie d'Ormoy maria Jean des Essarts d'Ambleville, d'où Julien des Essarts d'Ambleville qui prit pour femme Isabelle de Vendôme. La fille du vidame Robert, sire de Lassay, La Ferté, Villepreux ; parent par sa mère Marie de Dreux des Dreux-Bossart-Châteauneuf ; leur fille Jeanne des Essarts, dame d'Ambleville, La Chapelle, Achères et Villiers, épousa Bouchard de Mornay sire de Saint-Germain et de La Ferté-Nabert, au début du XVe siècle, d'où la suite proliférante de la maison de Mornay par leur fils Charles de Mornay. Jean de Mornay, l'un des fils de Charles, était encore dit sire d'Achères en 1479 et de Villiers en 1480, mais son propre fils Gilles de Mornay l'était seulement d'Achères : on peut donc penser que Villiers est passé en d'autres mains vers 1480. En effet, il fut donné à titre de fief par Louis XI à son barbier Olivier Le Daim, qui eut aussi Vayres en 1479. Après la mort dOlivier Le Daim (exécuté en 1484), le château fit retour à la couronne en 1515. En 1484 lors de la confiscation des biens dOlivier le Daim, la famille de Foix-Navarre le récupéra. La reine dAragon, Germaine de Foix, épouse de Ferdinand II le Catholique et nièce de Louis XII, le posséda alors et cest elle qui le vendit au Seigneur de Chièvres, Guillaume de Croÿ, il appartint ensuite à Jean de Croÿ.","habitants":"Presles; famille Carnot                     Villiers, Jean de Croÿ.\"","divers":"trois châteaux à Cerny grav-2-3,  Presles grav-1 et Villiers.                         Cerny  GPS : 48° 28' 35\" Nord, 2° 19' 45\" Est","gps":"48° 28' 35\" Nord, 2° 19' 45\" Est","images":["../image/image_91/91_Presles_Villiers_1.jpg","../image/image_91/91_Presles_Villiers_2.jpg","../image/image_91/91_Presles_Villiers_3.jpg"]},"Consult_chateau_formulaire3b0f":{"id":"Consult_chateau_formulaire3b0f","dept":"91","canton":"Ris-Orangis","commune":"Ris-Orangis","nom":"Ris_Orangis_1","type":"Château","periode":"XVI","histoire":"Trois châteaux dans cet article, Dranem, Fromont, Lot,                                                                                   LOT , porte le nom de la famille qui l'occupe depuis 1793. Devenu bien national pendant la Révolution, le domaine qui avait appartenu aux seigneurs de Ris, est acheté par une dame Jousserand, aïeule de la famille Lot,  a appartenu à Henri Lot, directeur des archives nationales au XIXe siècle. Vers 1840, les propriétaires font agrandir et rehausser le pavillon pour lui donner sa forme actuelle .Abandonné depuis 2020, un projet conséquent de réhabilitation est mené par la commune qui a usé du droit de préemption pour sauver le patrimoine.                                                                                                          FROMONT, vers 1150, fut Gui de Trousseau. En 1173, l'Ordre du Temple, qui possèdait alors des biens à Fromont, installa une Commanderie dans ce qui n'était alors qu'une imposante maison fortifiée. Le roi Philippe VI de Valois fit don des terrains acquis par l'Ordre du Temple, à l'abbaye de Saint-Magloire de Paris. Abandonné jusqu'à son acquisition par le marquis Jacques de Thou, en 1564, il servit alors de carrière de pierres aux Rissois. Reconstruit par Arnould de Nouveau, il fut alors utilisé comme rendez-vous de chasse. Au milieu du XVIIe siècle, Israël Silvestre vint dessiner le château de Fromont et les jardins. Le chevalier Philippe de Lorraine le grand amour de Philippe d'Orléans dépense des sommes importantes, offertes par son amant, pour embellir le château et les jardins. Le jardin descend par niveaux successifs jusqu'à la Seine toute proche. Louis XIV s'arrêtait souvent à Fromont, chez son quasi beau-frère, puisque le domaine se situe sur la route reliant Versailles à Fontainebleau. Le chevalier de Lorraine meurt en 1702. Le château devint, en 1760, la propriété du comte Turpin de Crissé, jusqu'à la Révolution.","architecture":"DRANEM,  il a été reconstruit sous le règne de Louis XV et Napoléon envisage son achat en 1797 mais c'est le comte Andréossy, fils de François Andréossy4, qui en acquiert la propriété en 1802   En 1911, le château est racheté par Armand Ménard, dit Dranem, qui en fait la Fondation Dranem. Celle-ci constitue une maison de retraite d'artistes  pour leur éviter de finir leur vie de manière misérable. Elle a été inaugurée en 1911 par le président Armand Fallières. La maison de retraite est maintenant ouverte à tous. C'est un établissement de type EHPAD. Elle est dirigée par Valérie Hénault depuis 2004.                                                                                                            FROMONT Après 1789, le comte émigra. Le château et son parc furent confisqués et vendus comme Bien National. Ils furent rachetés par un fidèle de la famille de Beauharnais, Mr Calmenet. Son gendre, Mr. Soulange-Bodin, transforma Fromont en un Institut d'Horticulture  En 1829, Charles X, roi de France, vint visiter les serres et les jardins ainsi que l'orangerie (qui deviendra plus tard la salle des fêtes avant d'être transformée en habitations. En 1841, dans sa nouvelle histoire de Paris, J. de Gaulle confirme que Fromont renferme « une collection universelle, sans égale en Europe, de végétaux exotiques, plantes de serre chaude, d'orangerie, de terre de bruyères, des Alpes, d'Amérique et autres, les plus rares et les plus nouvelles parties du monde ». En 1847, il fut acquis par Fromental Halévy, puis il passa à son beau-frère, Hippolyte Rodrigues. En 1917, une partie du domaine est acheté par les Boulonneries de Bogny-Brau, dont les usines de la région de Charleville sont envahies par les allemands. Les usines sont construites entre la rue de Fromont et la Seine, à côté de ce qui sera plus tard le domaine des alcools. En 1926, le reste du parc fut acquis par Bernard Lévy, qui en fit un lotissement. La même année, Mr Albert Rémy, maire de Ris-Orangis, racheta le château et y fit installer la Mairie.","habitants":"Comte Turpin de Crissé\"","divers":"Trois châteaux à Ris Orangis, Dranem grav-4, Fromont grav 1, Gomel grav _2   Lot grav 5                                                                    Lot, 48° 38' 27? nord, 2° 24' 06? est Fromont  GPS : 48° 39' 14\" Nord, 2° 24' 57\" Est","gps":"48° 39' 14\" Nord, 2° 24' 57\" Est","images":["../image/image_91/91_Ris_Orangis_1.jpg","../image/image_91/91_Ris_Orangis_2.jpg","../image/image_91/91_Ris_Orangis_3.jpg"]},"Consult_chateau_formulaire9649":{"id":"Consult_chateau_formulaire9649","dept":"91","canton":"Ris-Orangis","commune":"Ris Orangis","nom":"Ris_Orangis_II","type":"Château","periode":"XVII","histoire":"Deux châteaux dans cet arrticle,  Gomel et Trousseau.                   GOMEL , la construction du château Gomel date du XVIIe siècle. Le château Gomel appartenait au Comte Charles-René de Bombelles, Seigneur d'Orangis, époux morganatique de l'Archiduchesse Marie-Louise d'Autriche. Sous la Restauration, il devint la propriété de Jean-Baptiste Gomel, qui fut maire de Ris-Orangis, de 1823 à 1828. Il passa ensuite dans les mains de son fils, Charles-Samson Gomel, conseiller d'état et maire de la commune, de 1848 à 1880. Depuis, le château Gomel est fait d'appartements privés. Il existe 5 châteaux à Ris-Orangis à découvrir dont , le château Trousseau, le château Dranem, fondé par Dranem lui-même à la même époque, le château de Fromont (devenu l'Hôtel-de-Ville de Ris-Orangis), le château Lot (à l'abandon) pour certains voir les articles.  Ce château est plus aujourd'hui plus connu sous l'appellation de « château Gomel » du nom de la famille qui l'occupe depuis le XIXe siècle et qui a donné deux maires à la commune.\nEn 1995, le bâtiment principal a été rénové et partagé en appartements. A droite de la grille on aperçoit la chapelle. Très dégradée, elle n'a pas bénéficié de la rénovation du château. Ce n'est qu'en novembre 2011 que des travaux de réfection ont été entamés sur la toiture qui menaçait de s'effondrer.","architecture":"TROUSSEAU, le château de Trousseau à Ris-Orangis, appartenait, pendant la Révolution à un certain Pileur de Brévannes. En 1793, le domaine est mis sous scellés et vendu comme bien national. C'est le comte Ordener qui en fera l'acquisition en décembre 1802. En 1842 le château est racheté par Monsieur Harenger, ancétre de l'actuel propriétaire. Le château est toujours visible. Les jardins du parc, le potager et les bassins d'agrément étaient alimentés par un aqueduc souterrain qui récoltait les eaux du plateau ainsi que le trop plein d'eau de l'Ecoute. Si l'aqueduc existe toujours, il ne sert aujourd'hui plus qua l'arrosage du potager du domaine. Dans la cour de grande ferme on peut encore voir un four a pain, réhabilité et réutilisé pour certaines animations de la ville, une fromagerie et la petite ferme qui accueillait à l'époque, basse-cour et lapins.\nÉléments protégés MH : le château de Trousseau en totalité : inscription par arrêté du 14 novembre 1985.","habitants":"Comte Charles-René de Bombelles et Jean-Baptiste Gomel\"","divers":"châteaux Ris Orangis , Trousseau grav 1_3 _4_5                                                               Gomel grav_2","gps":"","images":["../image/image_91/91_Ris_Orangis_II_1.jpg","../image/image_91/91_Ris_Orangis_II_2.jpg","../image/image_91/91_Ris_Orangis_II_3.jpg","../image/image_91/91_Ris_Orangis_II_4.jpg","../image/image_91/91_Ris_Orangis_II_5.jpg"]},"Consult_chateau_formulaire75a9":{"id":"Consult_chateau_formulaire75a9","dept":"91","canton":"Gif-sur-Yvette","commune":"Bievres","nom":"Roches_Bièvres","type":"Château","periode":"XIX","histoire":"ROCHES,  c'était la maison littéraire de l'écrivain français Victor Hugo, est occupé depuis par la Secte Soka Gakkai, sur un site de 1996, est inscrit aux M.H. depuis 1966, dit château des Roses, plane toujours l'ombre de la star internationale des Lettres françaises. Jeune écrivain, il fut profondément attaché à « cette deuxième maison » à la campagne,  Elle accueille les visiteurs depuis 1991. « Nous présentons ici de nombreuses pièces liées à l'activité de l'écrivain », explique Stéphane Mahuet, qui veille au quotidien du musée, la maison de campagne appartenait depuis 1804 à  Bertin l'Ainé, fondateur du Journal des Débats, De 1815 à 1841, son salon littéraire attira tout ce que le monde politique et des arts comptait de plus éminent : Chateaubriand, Berlioz, Ingres, Liszt, etc. Chateaubriand, ami de très longue date de la famille Bertin, venait en voisin de la Vallée-aux-Loups. Mais l'hôte le plus illustre fut Victor Hugo, qui séjournait au château des Roches chaque fois qu'il le pouvait. Hugo, sa femme, ses enfants, prenaient le coche place des Vosges et descendaient à Sceaux d'où une correspondance les conduisait à Bièvres. Aujourd'hui, le château accueille la maison littéraire Victor Hugo, mais les propriétaires  sont M.et Mme Heuzey.","architecture":"ROCHES,  date du XIXe siècle. Le château est de style néo-classique, architecture  néo-Louis XIII, la maison de campagne la plus charmante et la plus littéraire des environs de Paris, la propriété appartenait à Bertin l'Aîné. Qui décéda en 1841 laissant deux fils; Edouard paysagiste et Armand qui laissèrent les Roches à leur soeur Louise qui la conserva jusqu'à sa mort en 1877, le domaine fut acheté par Gaux-Marly fondeur en  bronze qui remania le château et le suréleva en partie. L'édifice de plan en U de trois niveaux toit en croupes et tours carrées sur deux angles dont celui de gauche à quatre niveaux le toit de ses tours à quatre pans.","habitants":"EcrivainVictor Hugo\"","divers":"a Bievres; Roches et le pavillon Victor Hugo","gps":"","images":["../image/image_91/91_Roches_Bi%c3%a8vres_1.jpg","../image/image_91/91_Roches_Bi%c3%a8vres_2.jpg"]},"Consult_chateau_formulairee9b6":{"id":"Consult_chateau_formulairee9b6","dept":"91","canton":"Dourdan","commune":"Roinville","nom":"Roinville","type":"Château","periode":"XIVXVI","histoire":"ROINVILLE,  le petit château de Roinville, situé près de léglise paroissiale, est un ravissant bâtiment construit en 1613. Des comédiens illustres de la troupe de Molière y ont habité au début du XVIIIe siècle : la famille Poisson, spécialisée dans le rôle de Crispin, dont Paul Poisson.\nÉléments protégés MH : la partie Louis XIII : inscription par arrêté du 20 février 1945.","architecture":"CHATEAUPERS, depuis la mairie de Roinville, la ferme fortifiée de Châteaupers, ancien fief fortifié érigé au XIVe siècle, et sa tour carrée. Un donjon qui servait de tour de guet au Moyen Âge,  le veilleur sonnait la trompe lorsquil voyait venir les pillards depuis la vallée de lOrge, et les habitants courraient se réfugier à lintérieur. Les douves, partiellement comblées, et le pont-levis ont disparu, mais Châteaupers a conservé sa forme originelle (un quadrilatère) et son esprit médiéval. Au XVIe siècle, la ferme fut apportée en dot au seigneur du Marais, par la fille des châtelains de Villeconin. Une tapisserie, conservée au Musée de Cluny, et un portrait au crayon conservé au Cabinet des Estampes la représente. C'est sous le vocable de Dame de Chateaupers qu'elle est désignée dans la collection des portraits au crayon de la Bibliothèque Nationale. On peut désormais découvrir la ferme de lintérieur : le logis seigneurial, restauré dans les règles de lart, a récemment été transformé en gîte rural. Loccasion de marcher sur les traces de Rachel de Cochefilet, la plus illustre maîtresse de ces lieux, puisquelle fut lépouse dun certain Sully, ministre dHenri IV.Éléments protégés MH : les façades et les toitures de la ferme, sauf le corps de logis : inscription par arrêté du 9 juin 1977. Les façades et les toitures du corps de logis et l'emprise foncière de la ferme : inscription par arrêté du 2 juillet 2010.  M. Jean Valentin de Bernis, gîte rural.","habitants":"famille Poisson\"","divers":"Deux châteaux à Roinvile; Roinville et Chateaupers, et petit château grav 5","gps":"","images":["../image/image_91/91_Roinville_1.jpg","../image/image_91/91_Roinville_2.jpg","../image/image_91/91_Roinville_3.jpg","../image/image_91/91_Roinville_4.jpg","../image/image_91/91_Roinville_5.jpg"]},"Consult_chateau_formulaire7d89":{"id":"Consult_chateau_formulaire7d89","dept":"91","canton":"Mennecy","commune":"Ballancourt sur Essonne","nom":"Saussay","type":"Château","periode":"XVII-XIX","histoire":"SAUSSAY  propriété d'Olivier Le Daim, barbier de Louis XI, le château fut brûlé par les Espagnols en 1592 pendant les guerres de Religion. Le propriétaire obtint du Roi Henri IV,  l'autorisation d'entourer d'eau la demeure qu'il rebâtit dans le style \"brique et pierre\". Propriété de Me de Gaumont, parlementaire, il fut transmis par les femmes aux familles Bragelongne, Canclaux et Colbert au début du XIXe siècle. En 1735, un pavillon fut construit en vis à vis de celui qui existait déjà et à l'identique. C'est ainsi que le château prit son aspect actuel, de deux châteaux se faisant face et s'ouvrant sur un parc. Juste avant la Révolution, le bâtiment d'entrée et le pont levis furent abattus et remplacés par deux élégants pavillons dans le style de l'architecte Nicolas Ledoux, à la fin du XVIIIe siècle. Au XIXe siècle, les Colbert doublèrent le pavillon principal dans sa largeur et le dotèrent d'une magnifique bibliothèque. Au début du XXe siècle, le château passa à la famille des Bourbon Busset, et le parc fut redessiné par Duchêne qui sut y conjuguer le charme des parcs à l'anglaise et l'harmonie des jardins à la française, ce parc composé à partir de trois perspectives comporte des pièces d'eau, pelouses encadrées de topiaires ou plantées d'essences rares. L'académicien Jacques de Bourbon Busset vécut dans ce château où habitent aujourd'hui ses enfants, petits-enfants et arrières-petits-enfants. Toujours dans cette famille. sur le territoire d'une ancienne commanderie templière et édifié sur les ruines d'un château féodal du XVe siècle, le Saussay constitue un rare ensemble de deux châteaux du XVIIIe siècle se faisant face à lentrée dun parc entouré deau.","architecture":"A 10 K.M. au nord VERT le GRAND, il a été construit au XIXe siècle, en brique et calcaire, à lemplacement de lancien château féodal incendié à lépoque de la Révolution. De celui- ci, il ne reste que les dépendances, dont une tour carrée et des douves du XVIIe siècle également un parc. Il existe autour une propriété boisée de 7 hectares avec des arbres bicentenaires. le Domaine était bien plus grand à la veille de la Révolution. Plusieurs opérations de cession du grand Parc ont pour conséquence de réduire le domaine au périmètre clos actuel du petit Parc, dans lequel se situe un jardin, abandonné depuis de nombreuses années, avec ses douves et canaux reliés, avec un système hydraulique toujours existant, et des allées bordées par le ru Misery qui assure lalimentation en eau (dont la source importante se trouve rue de la source . Le château et domaine de la Saussaye ont été rachetés par la commune en 2013. C'était la propriété de Daniel Victor de Trimond, qui y décéda, en 1813, et son épouse en 1839. Roland Dubillard a vécu dans les dépendances du château de la Saussay.","habitants":"Saussay Famille de Colbert  et Braguelongne                   Verrt,   Daniel Victor de Trimond, \"","divers":"Ballancourt sur Essonne le château de Billy  GPS : 48° 31' 26\" Nord, 2° 19' 18\" Est                                                                                                 Vert GPS : 48° 34' 24\" Nord, 2° 21' 33\" Est","gps":"48° 31' 26\" Nord, 2° 19' 18\" Est","images":["../image/image_91/91_Saussay_1.jpg","../image/image_91/91_Saussay_2.jpg","../image/image_91/91_Saussay_3.jpg","../image/image_91/91_Saussay_4.jpg","../image/image_91/91_Saussay_5.jpg"]},"Consult_chateau_formulaireff16":{"id":"Consult_chateau_formulaireff16","dept":"91","canton":"Savigny sur Orge","commune":"Savigny sur Orge","nom":"Savigny_sur_Orge","type":"Château","periode":"XIV-XVI","histoire":"SAVIGNY  1802, Louis Nicolas Davout acquit le château de Savigny et y fit faire dimportants travaux. En 1869, la reine dEspagne Isabelle II, en exil, séjourna au Château de Savigny. En 1475, Étienne de Vesc, chambellan de Charles VIII, acquit le domaine de Savigny. Entre 1485 et 1488, il étendit le domaine sur la Champagne et le bois de Viry. Charles-François de Vintimille du Luc hérita de la seigneurie et mourut au château en 1740. Au XVIIIe siècle, Marie-Nicolas Pigeon, avocat au Parlement de Paris fit construire le domaine de Courte-rente. Entre 1635 et 1797, le domaine de Grand Vaux passa entre différentes mains. Pierre Vigier lacquit en 1797 et lagrandit jusquà sa mort en 1817, le parc couvrant alors 100 hectares. En 1801, Pauline de Beaumont loua le domaine de Courte-rente pour abriter ses amours avec François-René de Chateaubriand. En 1802, Louis Nicolas Davout duc d'Auerstaedt après la guerre de l'Empire   acquit le château de Savigny et y fit dimportants travaux. En 1854, Charles Petit, propriétaire de la ferme de Champagne créa une usine dexpérimentation de distillation de la betterave sucrière. En 1855, Louis Adolf Duval, futur maire de la commune créa une manufacture de fleurs artificielles. En 1869, la reine dEspagne Isabelle II en exil séjourna au château de Savigny.","architecture":"SAVIGNY élevé au bord de l'Orge date pour certaines pièces du XIVe siècle notamment  les grosses tours rondes qui encadrent le corps de logis central, remanié plusieurs fois au cours des siècle. Racheté par l'état  en 1945 aux héritiers du Maréchal, Le château de Savigny est devenu depuis le Lycée Corot.","habitants":"Famille de Pierre Vigier\"","divers":"Savigny  GPS : 48° 40' 47\" Nord, 2° 20' 45\" Est","gps":"48° 40' 47\" Nord, 2° 20' 45\" Est","images":["../image/image_91/91_Savigny_sur_Orge_1.jpg","../image/image_91/91_Savigny_sur_Orge_2.jpg","../image/image_91/91_Savigny_sur_Orge_3.jpg","../image/image_91/91_Savigny_sur_Orge_4.jpg"]},"Consult_chateau_formulairecca2":{"id":"Consult_chateau_formulairecca2","dept":"91","canton":"Dourdan","commune":"St-Sulpice de Favières","nom":"Segrez_St_Sulpice","type":"Château","periode":"XVII-XVIII","histoire":"SEGREZ, la construction du château de Segrez date de 1733 au XIXe siècle. Son propriétaire initial était André Haudry de Soucy. Au marquis d'Argenson  (sec
