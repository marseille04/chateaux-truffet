rétaire d'état aux affaires étrangères de Louis XV de 1744 à 1747 et homme de Lettres ami de Voltaire , connu notamment pour ses Mémoires). Celui-ci y mourra en 1757. Mme de Montullé , fille d'André Haudry , et son mari hériteront par la suite du château et le loueront en 1772 au comte de Blot . M. de Montullé le reprend en 1802 , puis il passe aux mains du marquis de La Garde en 1808. A partir de 1857, le botaniste Pierre-Alphonse-Martin Lavallée fait ses premières plantations d'arbres et d'arbustes. En 1858, il réunit \"tous les végétaux ligneux cultivables à l'air libre\". A partir de 1860, il décide d'ordonner ses collections et d'établir des écoles d'arbres en ligne, regroupant des végétaux classés par famille et étiquetés. A sa mort, le château de Segrez comptera 6 500 espèces. En 1869,  sera agrandi et deux ailes seront ajoutées, de part et d'autre du corps central, pour y loger le personnel employé à l'arboretum. Vers 1950 , la famille Picard  devient propriétaire de Segrez et opérera de nouvelles plantations. Les collections botaniques continuent aujourd'hui d'être agrandies. Le château de Segrez propose aussi la location de salles pour vos mariages, cérémonies, etc, est un château inscrit aux M.H. depuis 2009. Propriété de monsieur Franklin Picard.","architecture":"SEGREZ, la construction du château de Segrez date de 1733 au XIXe siècle, En 1747, un parc régulier est aménagé autour du château, avec bosquets, parterres réguliers, jets d'eau, bassins, pièce d'eau, son miroir d'eau et son réseau hydraulique. En 1782, le parc fut transformé en un parc pittoresque avec une grotte à deux salles ornées de coquillages du Pacifique, le château de conception oblong à  trois niveaux, côté parc avant cvorps d'entrée sommet d'un fronton triangulaire et lucarnes.","habitants":"Famille de André Haudry de Soucy\"","divers":"St-Sulpice de Favières château de Segrez                                                          GPS : 48° 32' 46\" Nord, 2° 10' 38\" Est","gps":"48° 32' 46\" Nord, 2° 10' 38\" Est","images":["../image/image_91/91_Segrez_St_Sulpice1.jpg","../image/image_91/91_Segrez_St_Sulpice2.jpg"]},"Consult_chateau_formulaire3366":{"id":"Consult_chateau_formulaire3366","dept":"91","canton":"Dourdan","commune":"Souzy la Briche","nom":"Souzy_la_Briche","type":"Château","periode":"XVI-XiIX","histoire":"SOUZY la BRICHE ,  accueille depuis 1972 présidents et Premiers ministres. Le château de Souzy-la-Briche est un manoir, c'est l'une des résidences de la République Française. Cette demeure a été construite sous la Restauration et léguée en héritage en 1978 par le banquier Jean Simon. Ce n'est pas un monument historique. Il est de style Empire. Seule, sa chapelle, de style gothique, présente un intérêt particulier. Le château de Souzy-la-Briche est une résidence privée des Chefs de l'État français en exercice. Giscard y est venu une seule fois. La nouvelle vie de Souzy-la-Briche commence en 1981  avec Mazarine et sa mère, Anne Pingeot. François Mitterrand va alors faire des lieux le havre discret de sa famille cachée. \"M. Simon, qui était plutôt rigide, a dû se retourner dans sa tombe\", sourit le maire. L'ex-Premier ministre Ayrault, en toute discrétion, est venu passer 2 week-ends dans le château de Souzy-la-Briche avec son épouse. Matignon a fait effectuer des travaux pour remettre les lieux en état. Du mobilier national a été acheminé sur place, selon les services du Premier ministre, ont été dépensés en \"travaux d'entretien divers\". Matignon admet  de \"dépenses de transmission\" pour mettre la propriété aux normes de communication actuelles.","architecture":"SOUZY la BRICHE,  les hôtes du château n'entrent pas par le portail principal mais par une entrée au fond du parc, loin de tout regard.\" est un écrin de 15 hectares entouré de hauts murs, lui-même dans un vaste domaine de 300 hectares. Le parc, somptueux, possède une chapelle du XIIe siècle au milieu d'un grand bassin, un canal de 250 m de long Les lieux n'ont été ouverts au public qu'une seule fois, en 1995. Héritant en \"compensation\" de Souzy-la-Briche, François Fillon n'est venu au Château de Souzy-la-Briche, qu'une seule fois, et n'est jamais revenu. Situé dans le parc du château de Versailles, l'ancien relais de chasse de la Lanterne, traditionnellement affecté aux Premiers ministres, est devenu, sous la présidence de Nicolas Sarkozy, réservé à l'Élysée. En 2016, Manuel Valls et Bernard  Cazeneuve y passèrent le réveillon de la Saint-Sylvestre ensemble, dans le château de Souzy-la-Briche. L'Elysée cherche à se débarrasser de ce domaine trop couteux essonnien mais un problème juridique se pose : dans son legs, l'ancien propriétaire a interdit la vente du château. Le domaine de Souzy a coûté l'an passé 233 749  à l'Etat, dont 185 988  en charges de personne. Entre 2007 et 2008, les dépenses ont augmenté de 20% ! C'est beaucoup trop, estime la Cour des Comptes.","habitants":"banquier Jean Simon.\"","divers":"Souzy la Briche                                                          GPS : 48° 31' 37\" Nord, 2° 08' 49\" Est","gps":"48° 31' 37\" Nord, 2° 08' 49\" Est","images":["../image/image_91/91_Souzy_la_Briche_1.jpg","../image/image_91/91_Souzy_la_Briche_2.jpg","../image/image_91/91_Souzy_la_Briche_3.jpg"]},"Consult_chateau_formulairef66d":{"id":"Consult_chateau_formulairef66d","dept":"91","canton":"Les Ulis","commune":"St-Jean de Beauregard","nom":"St-Jean_de _Beauregard","type":"Château","periode":"XVI-XVII","histoire":"BEAUREGARD  Jusqu'au XIIIe siècle le fief de Montfaucon était rattaché pour partie à l'abbaye des Vaux de Cernay. Au début du XVIe siècle son nom fut changé en celui de Saint-Jean de Beauregard. Le château a été bâti en 1612 sur les ruines de l'ancien château de Montfaucon, à l'initiative de François Dupoux, avocat au conseil privé du roi, fit construire le château en 1610 à l'emplacement d'un manoir plus ancien dont les communs sont peut-être avec l'orangerie le dernier reste ; seul  le corps de logis central et les deux pavillons les plus élevés étaient exécutés quand Duproux fut entraîné dans la disgrâce de Concini et contraint de vendre son château en 1617. En 1639 les héritiers se défont de Beauregard au profit de François Garnier son successeur Pierre de la Mouche conseiller du roi, passa ensuite au baron de Neufville marquis de st-Pierre et acquis par la veuve  du fermier général Laurent Charron, après elle à la comtesse de Murinais. qui le conservera jusqu'à  sa vente en 1878 par le comte de Caraman descendant  de Riquet créateur du canal du Midi, qui le restaure, mais il a gardé les principaux éléments de sa conception d'origine. Maurice de Caraman,son épouse Marie leur fille épouse  du duc de Padoue et héritière du château de Courson que leur fils Ernest de caraman  qui en  hérita. Beauregard  c'est Charles duc  de Caraman avec son épouse Françoise de Rohan Chabot, leur fille Marie épouse le vicomte Louis de Curel. Propriété du duc de Caraman.","architecture":"BEAUREGARD,  le corps central est dominé par deux pavillons saillants à deux étages carrés, eux-mêmes flanqués de pavillons plus bas couverts d'un toit à longs pans brisés. Le château est entièrement en grès pour le corps central et en brique et grès pour les pavillons  ( la brique est aujourd'hui cachée par un enduit). Ses toits sont en ardoise. Les communs sont en moellons de meulière sous enduit avec chaînage, pourtour des ouvertures et soubassement en grès ; ils sont couverts de toits à longs pans et croupes brisés en ardoise et tuile plate. Le colombier couvert d'un toit conique a conservé ses boulins. Le château se prolonge vers le nord d'une aile basse occupée également par des communs. L'orangerie en meulière et grès est installée sous la terrasse qui s'étend devant la façade nord-est du château ; sur la façade ouest s'ouvre la cour d'honneur prolongée par une percée de 1800 m en direction de Gometz ; le parc dessiné à la française à gardé ses grands tracés d'origine ; seule la partie Est à été remaniée en parc paysager au XIXe siècle ; le potager de deux hectares est clos de murs.  Au XIXe siècle la partie Est du parc a été remaniée en composition à l'anglaise après la destruction de la ferme ; le potager de deux hectares, entièrement clos de murs, a été restauré dans ses tracés d'origine. La chapelle qui sert d'église paroissiale a été élevée entre 1825 et 1839 sur l'emplacement d'une première église du XVIIe siècle.  Éléments protégés MH : le domaine compris dans l'enceinte des murs d'enclos ainsi que la grande allée d'accès : classement par arrêté du 5 juillet 1993.","habitants":"Famille de  Laurent II Charron et le comte de Caraman\"","divers":"St-Jean de Beauregard château de Beauregard                                               GPS : 48° 39' 41\" Nord, 2° 09' 49\" Est","gps":"48° 39' 41\" Nord, 2° 09' 49\" Est","images":["../image/image_91/91_St-Jean_de_Beauregard_1.jpg","../image/image_91/91_St-Jean_de_Beauregard_2.jpg","../image/image_91/91_St-Jean_de_Beauregard_3.jpg"]},"Consult_chateau_formulaireed45":{"id":"Consult_chateau_formulaireed45","dept":"91","canton":"Dourdan","commune":"St-Cyr-sous-Dourdan","nom":"St_Cyr_sous_Dourdan","type":"Château","periode":"XVI-XVIII","histoire":"Deux châteaux dans cet article; Bandeville et la ferme des Tourelles.                                                                                                    BANDEVILLE, le château a été construit dans le style Louis XIII pour Thierry Sevin, président au parlement de Paris. Sur le château Louis XIII. En 1530 Thomas Rappouël, secrétaire du roi et de sa chambre, surintendant des finances, acquiert Bandeville, puis d'autres fiefs au cours des années suivantes, il fait agrandir le château et crée un parc. En 1682, Bandeville est érigé en marquisat au profit de François Bazin, maître des requêtes qui le fait transformer. En 1806, le domaine passe au comte James Alexandre de Pourtalès. Depuis il est demeuré dans la famille de Pourtalès, devenue également propriétaire du manoir du Marais par le mariage du comte James de Pourtalès avec Violette de Talleyrand Périgord.              La Ferme des TOURELLES,  est un édifice du XIIIe siècle-XVIe siècle situé à Saint-Cyr-sous-Dourdan,  pour être le logis seigneurial d'Augustin Le Prevost, seigneur de Saint Cyr entre 1588 et 1599. est reconstruite à la fin du XVIe siècle et sert de logis seigneurial. A partir du XVIIe siècle et jusqu'en 1970 l'édifice fut une ferme et abrita ensuite un centre hippique et un restaurant. La ferme fait l'objet d'un classement partiel aux monuments historiques par un arrêté du 11 juillet 1975 : les façades et les toitures sont concernées par cet arrêté.  La commune a acheté l'édifice en faisant valoir son droit de préemption en 2005.","architecture":"BANDEVILLE, le château a été construit dans le style Louis XIII  L'édifice présente une grande aile de deux étages, assise sur un demi-sol et flanquée de deux pavillons en saillie, auxquels ont été accolés ultérieurement deux pavillons. Bien que plus petits, ceux-ci respectent toutefois l'harmonie du bâtiment. Le château, édifié à mi-pente de la vallée de la Rémarde, est entouré d'un vaste parc créé par Thomas Rappouël et dont le réaménagement, en 1833, est l'oeuvre de Louis-Sulpice Varé. Le parc, avec ses plans d'eau, offre une superbe vue.Éléments protégés MH : les façades et les toitures, le vestibule, l'escalier, le salon à décor Empire : classement par arrêté du 24 mai 1974. Le parc : inscription par arrêté du 24 mai 1974.","habitants":"BandevilleFamille de l François Bazin,                                 La ferme Augustin Le Prevost\"","divers":"Deux châteaux  à St-Cyr-sous-Dourdan,                                              Bandeville grav 5-6-7 et la ferme des Tourelles  grav-1-2-3-4                                                                 GPS : 48° 34' 31,01\" Nord, 2° 01' 48\" Est                                                             lz ferme  48° 33' 58? N, 2° 02' 02? Est","gps":"48° 34' 31,01\" Nord, 2° 01' 48\" Est","images":["../image/image_91/91_St_Cyr_sous_Dourdan_1.jpg","../image/image_91/91_St_Cyr_sous_Dourdan_2.jpg","../image/image_91/91_St_Cyr_sous_Dourdan_3.jpg","../image/image_91/91_St_Cyr_sous_Dourdan_4.jpg","../image/image_91/91_St_Cyr_sous_Dourdan_5.jpg","../image/image_91/91_St_Cyr_sous_Dourdan_6.jpg","../image/image_91/91_St_Cyr_sous_Dourdan_7.jpg","../image/image_91/91_St_Cyr_sous_Dourdan_8.jpg"]},"Consult_chateau_formulaire6059-2":{"id":"Consult_chateau_formulaire6059-2","dept":"91","canton":"Evry","commune":"St_Germain_les_Corbeil","nom":"St_Germain_les_Corbeil","type":"Château","periode":"XVI","histoire":"St GERMIN les CORBEIL  cest en 1312 que le premier château fut construit par Geoffroy Coquatrix, échanson du roi Philippe-Le-Bel. Plus tard occupé par Alexandre Farnèse, il subit plusieurs transformations jusquà sa destruction en 1590, brûlé par son propriétaire.  Il est reconstruit en 1620 par Nicolas Thibeuf, nouveau seigneur du Val-Coquatrix puis, au cours du XVIIIe siècle, devient propriété de la famille de Brétignières. Au XIXe siècle, le domaine est acheté par Aymé-Stanislas Darblay (Les Moulins de Corbeil et La papeterie dEssonne). En 1846, il décide de le faire démolir et de faire construire une demeure plus moderne, qui est le château actuel.","architecture":"TIGERY  Les Hospitaliers de l'ordre de Saint-Jean de Jérusalem possédaient à Tigery un membre qui faisait partie du prieuré hospitalier de Saint-Jean en l'Île-lez-Corbeil. Le prieur avait le droit de haute, moyenne et basse justice. Il y avait rattachée au membre la chapelle de Saint-Genefort;  Le Grand Château (le Cénacle, actuelle Communauté du Chemin-Neuf), Le Petit Château.   Le château du Petit-Sénart, qui abrite à partir de 1967 le Centre psychopédagogique du Petit-Sénart de l'Association Olga Spitzer, devenu Institut Thérapeutique, Educatif et Pédagogique","habitants":"Famille de  Nicolas Thibeuf\"","divers":"A St-Germain-les-Corbeil                                     Tigery -grav  2_3_4                                     48° 38' 21? nord, 2° 30' 26? est","gps":"","images":["../image/image_91/91_St_Germain_les_Corbeil_1.jpg","../image/image_91/91_St_Germain_les_Corbeil_2.jpg","../image/image_91/91_St_Germain_les_Corbeil_3.jpg","../image/image_91/91_St_Germain_les_Corbeil_4.jpg"]},"Consult_chateau_formulairebbde":{"id":"Consult_chateau_formulairebbde","dept":"91","canton":"Ste-Geneviève  des Bois","commune":"Ste-Geneviève  des Bois","nom":"Ste_Geneviève_des_Bois","type":"Château","periode":"XVIII-XIX","histoire":"Deux châteaux dans cet article, Cossonnerie et Parc-Pierre.                        Ste GENEVIEVE DES BOIS;   du château fort, il ne reste qu'une grosse tour, flanquée de deux tourelles. les communs  du XVIIIe siècles forment un fer à cheval  . Le château reçut souvent la visites des rois de France  qui venaient chasser en forêt de Séguigny; C'est là que Louis XIV remarqua mademoiselle de Fontanges.                                                                                  COSSONNERIE; La construction du château  de la Cossonnerie date du XVIIIe au XIXe siècle. La région est ruinée à la fin du Moyen Age. L'Hôtel-Dieu de Paris accordait des baux, si le preneur construisait une ferme sur les masures en ruines. En 1555, Cosme Gousseron déclare sa ferme au Terrier. Celle-ci prend le nom de son propriétaire : Gousseron, Goussonnerie, puis Cossonnerie. En 1752, René Dupasquy, avocat au parlement de Paris, vend à Bertier de Sauvigny une maison bourgeoise et une ferme. Cette propriété appartiendra ensuite au Baron Fain, historien et secrétaire de Napoléon Ier. En 1927, l'Anglaise Dorothy Pagès rachète le château de la Cossonnerie pour la Princesse Metschersky, pour y recueillir des réfugiés russes. Le château de la Cossonnerie abrite, aujourd'hui, dans ses murs, une Maison de Retraite.","architecture":"PARC-PIERRE date du XIXe siècle. En 1489, les Bordes de Liers, ou Parc de Pierre, sont baillées à Bertrand Scalinet par l'Hôtel-Dieu de Paris. En 1651, le propriétaire du Parc de Pierre, appelé alors Parc Monplaisir, rend hommage à Gaston d'Orléans, comte de Montlhéry, pour sa maison composée de tours, d'un pavillon et d'un colombier. En 1748, les murailles en ruines servent à combler les fossés. En 1780, Bertier de Sauvigny achète le Parc-Pierre à Mathieu de Roussy. Le Château du Parc-Pierre actuel est construit en 1871. En 1973, la ville acquiert la propriété pour en faire un centre de loisirs. Au Sud-Est, le Parc-Pierre accueille une ferme pédagogique et un parc animalier. Au centre de la commune, le parc Pablo-Neruda et lallée verte du château permettent au génovéfains de saérer en centre-ville.","habitants":"Cossonnerie; Bertier de Sauvigny                                   Parc pierre\"","divers":"Ste-Geneviève  des Bois château de Parc-Pierre et ste Geneviève                                          GPS : 48° 38' 26\" Nord, 2° 19' 37\" Est                                                                  Parc pierre grav 1-2-3                                  Ste geneviève grav 4-5","gps":"48° 38' 26\" Nord, 2° 19' 37\" Est","images":["../image/image_91/91_Ste_Genevi%c3%a8ve_des_Bois_91_1.jpg","../image/image_91/91_Ste_Genevi%c3%a8ve_des_Bois_91_2.jpg","../image/image_91/91_Ste_Genevi%c3%a8ve_des_Bois_91_3.jpg","../image/image_91/91_Ste_Genevi%c3%a8ve_des_Bois_91_4.jpg","../image/image_91/91_Ste_Genevi%c3%a8ve_des_Bois_91_5.jpg"]},"Consult_chateau_formulaire521e":{"id":"Consult_chateau_formulaire521e","dept":"91","canton":"Etampes","commune":"Chalo st-Mars","nom":"Tronchet","type":"Château","periode":"XVII","histoire":"TRONCHET, c'est dans le contrat de mariage entre Gédéon des Mazis et Anne de Rochechouart passé devant Pierre Jutet, notaire a Etampes, le 2 août 1613, que l'on trouve la première mention explicite du Tronchet. Le futur époux y est en effet désigné comme \"ecuyer sieur du Tronchay et de Saint-Mard en partie, enseigne des gardes du corps du Roi\". Son père était \"Claude Desmazis, vivant ecuyer, sieur de Briéres les Scellés\", sa mère Catherine Sanguin. On y apprend surtout qu'un bâtiment existe à cette époque : le contrat est établi \"suivant la coutume du bailliage d'Estampes au de là duquel est la principale demeure dudict sieur futur époux\", sans autre précision. Par ailleurs, dans les archives de la famille des Mazis, Catherine Sanguin, seconde femme de Claude des Mazis, est qualifiée de \"dame du Tronchet\" dans son contrat de mariage du 1er janvier 1565. Aucune source n'a permis de vérifier cette information concernant la fille de Claude Sanguin, chevalier sire de Meudon et d'Etiennette de Martines. Toutefois, une clause du contrat de 1613 fait allusion à d'éventuels projets de construction, mais la encore, il n'a pas été possible d'en tirer des conclusions quant au bâtiment actuel. Aucun inventaire après décès qui aurait fait état d'une activité constructrice de Gédéon des Mazis n'a été retrouvé. En 1652, le fils aîné de Gédéon des Mazis, Henri, chevalier de L'ordre de Saint-Michel, seigneur du Tronchet, épouse Marie Tiraqueau. Leur fils aîné Alexandre, né en 1654, capitaine-major du régiment de Besons cavalerie, meurt sans héritiers en 1710, et c'est sa soeur, Anne-Charlotte Henriette Desmazis qui devient alors Dame du Tronchet.","architecture":"TRONCHET, en 1688, elle avait épousé Guy-Victor de Vigny, chevalier seigneur d'Emerville, capitaine au régiment d'Orléans infanterie, receveur de la ville de Paris. Claude-Henry de Vigny, fils de Guy-Victor transmit le domaine a l'aîné de ses douze enfants, Claude-Louis-Victor, a l'occasion de son mariage avec Mme de Montlivault, en 1766. Lors de la liquidation et du partage du patrimoine du citoyen Claude-Louis-Victor de Vigny, capitaine exempt des cent suisses de la garde du Roi, le 28 messidor an VI (16 juillet 1798 ), le domaine est décrit comme suit : \"la maison du Tronchet consistant en un corps de logis occupé par le déclarant, cour, basse-cour, clos de murs et fossés. Le \"dépouillement de l'inventaire fait après le décès de M. Glaude-Louis-Victor de Vigny par M. Vénard notaire a Etampes en date du 14 janvier 1808\" mentionne \"seize pièces qui sont états de dépenses, notes mémoires, devis, marchés et quittances des sommes payées par M. de Vigny en l'année 1780 pour édifier et construire le bâtiment en aile de l'ancien chateau du Tronchet appelé le bâtiment neuf, et un relevé général de toutes les dites sommes. Il convient à ajouter à cette somme celle  payée par N. de Vigny en l'année 1776 pour construction de l'escalier du chateau du Tronchet et de la lanterne qui l'éclaire. Total de ce que M. de Vigny a payé pour améliorations et augmentation du chateau du Tronchet, de M. Claude-Louis-Victor de Vigny, décédé le 25 décembre 1807. \"Le domaine et terre du Tronchet consistant en un château et maison d'habitation, parc enclos, fermes, terres labourables, bois, maisons, prés, aunoies et autres héritages. \nÉléments protégés MH : les façades et les toitures du manoir et des communs sauf les parties modernes, le pigeonnier, le mur d'enceinte : inscription par arrêté du 27 août 1975.","habitants":"Famille des Mazis\"","divers":"Chalo st-Mars château de Tronchet       GPS : 48° 26' 15\" Nord, 2° 03' 14\" Est","gps":"48° 26' 15\" Nord, 2° 03' 14\" Est","images":["../image/image_91/91_Tronchet_1.jpg","../image/image_91/91_Tronchet_2.jpg"]},"Consult_chateau_formulaire84d8-2":{"id":"Consult_chateau_formulaire84d8-2","dept":"91","canton":"Gif sur Yvette","commune":"Gif sur Yvette","nom":"Val_fleuri","type":"Château","periode":"XIX","histoire":"VAL-FLEURI,  en 1949, les premiers coups de pioche sont donnés pour créer le Commissariat à lÉnergie Atomique sur le plateau de Saclay. Premiers appareils et premiers chercheurs sy installent en 1951. Pour loger le personnel, le CEA acquiert, le 21 novembre 1947, auprès de la famille Lemaire, la propriété du Val Fleury. Le prix de vente sera alors fort discuté. Après trois années de procédures et de démêlés, lacte notarié est signé en présence notamment de Raoul Dautry, administrateur général du CEA, de Frédéric et Irène Joliot-Curie.  En 2000, le château cesse son activité, avant de devenir la propriété de la commune qui en fait lacquisition en 2003 avec le concours de lAgence des Espaces Verts de la région Ile-de-France. Le parc souvre alors au public, tandis que le château, transformé en espace dédié à la culture, accueille aujourdhui des expositions artistiques, scientifiques, historiques, au succès croissant.","architecture":"VAL-FLEURI, construit au XIXe siècle, le château du Val Fleury trône, du haut de ses 860 m2, dans un parc aménagé et agrémenté de pièces deau qui sétend jusquau bord de lYvette. La propriété comprenait également une annexe, deux pavillons, une orangerie et un jardin potager. Après loccupation allemande, la demeure est à restaurer entièrement. Cest larchitecte Auguste Perret, réputé pour son esthétique fonctionnelle, qui se voit confier le programme immobilier du CEA. Le domaine héberge chercheurs, stagiaires, ingénieurs travaillant sur le plateau de Saclay. La demeure, avec ses seize chambres, ses dépendances, son écurie, son orangerie et son vaste parc, deviennent le théâtre dune joyeuse vie de château.","habitants":"Famille Lemaire,\"","divers":"Gif sur Yvette  château de Val Fleuri  Val fleuri GPS : 48° 42' 07\" Nord, 2° 08' 02\" Est","gps":"48° 42' 07\" Nord, 2° 08' 02\" Est","images":["../image/image_91/91_Val_Fleuri_1.jpg","../image/image_91/91_Val_Fleuri_2.jpg"]},"Consult_chateau_formulaire791a-2":{"id":"Consult_chateau_formulaire791a-2","dept":"91","canton":"Gif-sur-Yvette","commune":"Villiers la Bâche","nom":"Vallée_Bonnard","type":"Château","periode":"XVII-XIX","histoire":"Deux châteaux dans cet article, Vallée Bonnard et Villiers la Bache. VALLEE BONNARD  Le château de la Vallée Bonnard a été construit dans le dernier quart du XIXe siècle sur un emplacement en partie construit; décor intérieur néo-gothique et art déco en mosaïque dans la salle de bains, premier quart du XXe siècle, statue de deux lions dans le jardin signée L. Riche, 1905...Élévation à travées  : étage de soubassement, 2 étages carrés, étage de comble  escaliers escalier de distribution extérieur, escalier droit, escalier hors-oeuvre, escalier en vis sans jour, escalier dans-oeuvre, escalier tournant à retours avec jour, cage ouverte, gros-oeuvre : meulière, silex, appareil mixte, moellon sans chaîne en pierre de taille, enduit,  toit conique, toit à longs pans, croupe  en  ardoise, métal en couverture.","architecture":"VILLIERS LA BACHE  Le château, route de Saint-Aubin, fut élevé entre 1640 et 1684 par Michel Lucas, seigneur de Saclay, comte de Châteaufort, sur les ruines de lhôtel de Presles. Au XVIIe siècle, tout était sur place, moulin, église, ferme, potager, fruitier, colombier, vignes ainsi qu'un tribunal et sa prison. Après sa reconstruction par Michel Lucas, il fut acquis par Nicolas de Bartillat, dans la deuxième moitié du XVIIe siècle, puis par Claude Olivier Boucher puis Anjorrant de Tracy au XVIIIe siècle. Il fut restauré au début du XIXe par la famille Biver qui fit combler les douves qui lentouraient jusqualors. Le comte Eugène Biver et sa femme Marie Hélène Caillat y font valoir à partir de la ferme du Viviers contiguë, un vaste domaine agricole. Leur fille Marie Hélène habitera le château jusquen 1985. M. Yves Lecoq a acheté le château en 1995 et y a installé le siège de son entreprise.    Éléments protégés MH : le château de Villiers en totalité : inscription par  arrêté du 9 février 1946.","habitants":"Famille de Michel Lucas\"","divers":"Vallée Bonnard et Villiers la Bache. grav 2","gps":"","images":["../image/image_91/91_Vall%c3%a9e_Bonnard_1.jpg"]},"Consult_chateau_formulaire335f":{"id":"Consult_chateau_formulaire335f","dept":"91","canton":"Etampes","commune":"Morigny-Champigny","nom":"Vaudouleurs","type":"Château","periode":"XVII","histoire":"VAUDOULEURS,  la liste des propriétaires : Guillaume Petibon en 1449, en 1559 Guillemette Dantelu, puis son fils Guillaume Le Long en 1575. Le 9 juin 1622 enfin, Guillaume Le Long rend hommage pour une possession d'une  vigne, appelé Petitbon, à lui échu par le décès de Guillaume le Long son pére (chartrier de Vaudouleurs). Claude Godin est à son tour propriétaire le 22 août 1595 du \"lieu et manoir de Vaudouleurs consistant en maison à demeure, granges, étables, cave dessous, le tout couvert de tuile et chaume, cour, volière et droit de coulombier duquel il y a encore a présent des vestiges, clos à murs, porte charretiere et ponts, à lui échu par le décès de Guillaume Godin prêtre. Enfin, Jacques Godin, fils de Claude, rend hommage pour raison du fief de Vaudouleurs le 2 novembre 1606. Les bâtiments ne semblent pas en trés bon état lors d'une vente le 11 juillet 1618 : \"le lieu seigneurial de Vaudouleur consistant en plusieurs masures, colombier à pied non couvert, clos de murs en partie.  La propriété demeure dans la famille de François Odet Chevreau jusquen 1800 lorsque le 14 pluviôse an VIII  Chevreau-Vaudouleurs vend à Emmanuel Jean Baptiste Joseph Marchand, \"commissaire des guerres employé à l'armée d'Italie, demeurant à Paris, lors de la vente par Henri Marie Charles Couturier à Alfred Crosnier le 24 et 25 avril 1891, le domaine de Vaudouleurs est dit comporter \"une maison habitation comprenant principal corps de bâtiment, une petite chapelle, communs, parc entourant la propriété traversée par la rivière de la Chalouette ou d'Étampe.","architecture":"VAUDOULEURS;  lors de la vente par Henri Marie Charles Couturier à Alfred Crosnier le 24 et 25 avril 1891, le domaine de Vaudouleurs est dit comporter \"une maison habitation comprenant principal corps de bâtiment parc entourant la propriété traversée par la rivière de la Chalouette ou d'Étampes,  Une maison de jardinier dite le Petit Vaudouleur sur les bords de la Juine. Une construction neuve a été élevée au centre du terrain.Situé au sud-ouest du village de Morigny, le domaine de Vaudouleurs est délimité a l'est par le chemin rural du Prieuré Morigny; au sud par la limite du territoire communal et l'ouest par la rivière d'Etampes. L'accès au château, composé de cinq travée sur deux niveaux, se fait par une porte précédée d'un perron de six marches. Une lucarne plus grande accentue la travée d'axe Décor dans l'enduit : chaînes d'angles à refends, pilastres encadrant la travée axiale, clef légèrement saillante ponctuant le linteau des fenétres, toit brisé. Dans la vente des 24 et 25 avril 1891 (Chartrier de Vaudouleurs), les communs sont dits se composer d'un bâtiment. Un autre bâtiment composé de vacherie, remise, logement de deux pièces pour la femme de basse cour. Est aussi mentionné un réservoir élevé sur colonnes en fonte avec manège, puits et pompe (eau de ce réservoir alimente la cuisine de la maison). La chapelle est un bâtiment de plan octogonal, avec une sacristie rectangulaire au nord-est. On y accède par un perron de cinq marches. Les deux c6tés nord et sud sont éclairés par une fenêtre jumelée en plein cintre.","habitants":"famille de François Odet Chevreau\"","divers":"Vaudouleurs GPS : 48° 26' 53\" Nord, 2° 10' 55\" Est","gps":"48° 26' 53\" Nord, 2° 10' 55\" Est","images":["../image/image_91/91_Vaudouleurs_1.jpg"]},"Consult_chateau_formulaire8a94":{"id":"Consult_chateau_formulaire8a94","dept":"91","canton":"Gif-sur-Yvette","commune":"Vauhallan","nom":"Vauhallan","type":"Château","periode":"XVII-XVIII-XIX","histoire":"Trois châteaux dans cet article, Arpentis, Limon et Martinière.                          ARPENTIS, des seigneurs d'Arpentis ou Repentis sont attestés au XIe siècle, ce qui pourrait dater une première implantation des bâtiments et des douves en face postérieure des corps . Au XVIIIe siècle, il s'agit d'un fief , l'implantation autour d'une cour rectangulaire est celle d'aujourd'hui, les corps sont en place, vers 1740 . Les corps remontent au dernier tiers du XVIIIe siècle ou au début du XIXe siècle. Une reconstruction des corps a eu lieu au XIXe, voire au début du XXe siècle. Isolé sur le plateau, le manoir domine la vallée dans laquelle est situé le village de Vauhallan. Plan d'ensemble : cour rectangulaire qui comprenait un accès depuis les champs entre les corps . Des vestiges d'arc en plein cintre sont visibles. Les corps sont couverts de toits à deux versants ou en appentis à pignons couverts. En face postérieure de 18 un petit appendice est couvert d'un toit a pans. Le corps  est couvert d'un toit à deux versants a croupes. Le corps  est couvert d'un toit en pavillon. Les corps ont en outre une couverture comportant un égout retroussé. Le corps de logis principal possède une porte d'entrée particulièrement soignée, encadrée de grès taillés avec refends, surmontée d'un linteau en grès taillés dont la clef est légèrement dépassante. Le linteau est surmonté d'un fronton triangulaire mouluré avec cartouche ovale. Un étage carré dont le sol est carrelé, un étage de comble dont le sol est en pierre. Au rez-de-chaussée, le sol est en partie carrelé (tomettes carrées), en partie pavé de grès.","architecture":"ARPENTIS, au rez-de-chaussée, une trappe accède à une cave dont l'accès pourrait s'effectuer sous l'escalier qui conduit aux étages. Escalier tournant comportant deux volées droites. Les deux premières marches sont en pierre, puis les autres sont en bois et carrelées. Rambarde et balustre en bois tourné. Planchers constitués de poutres et solives en bois et de bardeaux. Deux fermes de charpente dont l'entrait se trouve dans le plancher ; deux demies fermes de croupe. Cloisons en pans de bois, remplissage en moellons et enduit plâtre. Cheminée au rez-de-chaussée et a l'étage. Souche en pignon comportant un contrefort. En face postérieure, traces d'un bâtiment qui devait se retourner d'équerre. On aperçoit des arrachements de murs et de plancher ainsi que des portes aux étages menant à ce bâtiment. Corniche en plâtre mouluré. Lucarne à deux versants à croupe en face postérieure. Si l'implantation du manoir peut remonter au XIe siècle, l'ensemble comporte actuellement des corps de bâtiments datant de la première moitié du XVIIe siècle et d'autres construits ou remaniés dans la deuxième moitié du XVIIIe siècle et au XIXe siècle. Les caractéristiques défensives, encore présentes en 1809, ont aujourd'hui disparu, mais sont suggérées par la situation isolée et dominante du manoir.\n MARTINIERE  à cinq K.M. à l'ouest   Depuis son magnifique portail, on peut admirer sa façade et,  son ancienne voie pavée restée quasiment intacte. Existence d'un château à l'allure défensive dont il ne subsiste que des vestiges dont une tour comportant des archères, transformée en colombier, qui remonterait à la première moitié XVIIe siècle ainsi qu'une partie du pavillon d'entrée. Le logis a été reconstruit puis agrandi avec l'aile sud au XIXe siècle. Les parties agricoles du XIXe siècle. Buste de femme en céramique dans un médaillon. il accueille un site du Ministère de la Défense.","habitants":"Seigneur local\"","divers":"a Vauhallan   château des Appentis et                                                                                                                                                           Martinière grav 4-5-6  Appentis grav-1-2 Limon grav-3                                    GPS : 48° 44' 03\" Nord, 2° 12' 20\" Est","gps":"48° 44' 03\" Nord, 2° 12' 20\" Est","images":["../image/image_91/91_Vauhallan_1.jpg","../image/image_91/91_Vauhallan_2.jpg","../image/image_91/91_Vauhallan_3.jpg","../image/image_91/91_Vauhallan_4.jpg","../image/image_91/91_Vauhallan_5.jpg"]},"Consult_chateau_formulaire5f15":{"id":"Consult_chateau_formulaire5f15","dept":"91","canton":"Gif-sur-Yvette","commune":"Verrières le Buisson","nom":"Verrières_Buisson","type":"Château","periode":"XVII","histoire":"CInq  châteaux dans cet article, Paron et  Bois-Loriot, Vaillant, Marienthal  et Verrières le Buisson                                                          PARON, le château, dont le corps principal remonte à la fin du XVIIe siècle, est agrémenté de deux avant-corps saillants. Il évoque par sa rigueur le style de Mansard. Des adjonctions de part et dautre ont été réalisées à la fin du XIXe siècle. Il appartint à Jean-Baptiste Laffitte (famille de banquier), puis en 1850 à Constant-André Say (de la famille Say qui sallia ensuite aux Béghin), dont le père, Louis avait participé, tout comme les Vilmorin, à la mise en valeur de la betterave sucrière suite au blocus de lépoque napoléonienne. La demeure fut rachetée par Me Couderc, notaire à Villefranche de Rouergue pour sa fille religieuse qui voulait y créer un pensionnat de jeunes filles. Vers 1890, la congrégation de la Sainte Famille de Villefranche de Rouergue, installa un pensionnat de jeunes filles qui dut quitter la place en 1905. Le domaine a été acheté par le comte Marc dEstienne dOrves époux de Caroline Julie Lévèque de Vilmorin. Il abrita leur fils Honoré et leur petit-neveu David Régnier, tous deux héros de la Résistance. Une aile du château est occupée par la famille Régnier ; le reste de la propriété a été lotie.                         BOIS LORIOT, vaste propriété allant jusqu'à l'actuelle rue du Maréchal Leclerc. La demeure est construite vers 1669 pour Philippe de Moucy, seigneur de La Couronne et de Mignaux. De cette campagne subsistent les communs. En 1706, la propriété appartint entre autre à Ponce Coche, premier valet de chambre du duc d'Orléans. Puis elle passa de 1706 à 1719 à Pierre Dodun, conseiller du Roy. Le corps de logis a été remanié et agrandi côté jardin pour Edouard Bertin de 1854 à 1871. Décor sculpté des façades du XIXe siècle, statues de femmes.","architecture":"VAILLANT, le début de la construction du château Vaillant date de 1640. C'est un château de style Renaissance, est devenu le centre artistique. La construction du château fut entreprise à partir de 1640 avec une cour en façade et un jardin à l'arrière. il a été reconstruit en 1720. Dans la deuxième moitié du XVIIIe siècle, le bâtiment a été entouré d'un Jardin à la Française et l'entrée de la propriété complétée par 2 pavillons. Au XIXe siècle, Jean-Baptiste Philibert Vaillant racheta le château, le bâtiment principal a été agrandi, les pavillons d'entrée détruits et le jardin réaménagé, a été classé le 21/08/1959 et a été inscrit le 8/09/1965 aux M.H.                                                                                                                                                         MARIENTHAL, le château de Marienthal construit en 1852 pour Félix Tourneux, au hameau de Vaupéreux (vallée des pierres où était exploitée la meulière), est un édifice de style Renaissance, en briques et pierre, dessiné en arc de cercle et orné de sculptures originales, pourvu dun jardin dhiver. Edifié à flanc de coteau, son parc plonge sur la vallée de la Bièvre. Depuis 1915, il est la propriété de la famille Wildenstein (uvres dart et écurie de course).                                                                               VERRIERES-LE-BUISSON, gentilhommière du XVIIe siècle, aurait abrité les amours de Louis XIV et de mademoiselle de la Vallière. Louise de Vilmorin demeure qui appartenait à sa famille depuis 1803, demeure de 1680 aurait été offerte par Louis XIV à mademoiselle de la valliere. Aujourd'hui propriété de la famille de Vilmorin. château de plan en U au XVIIIe siècle. Détruit entre 1809 et 1860, seule subsiste l'ancienne aile gauche, actuellement communs. Reconstruit en 1860 pour A. Carteron. Lucien Carteron vendit la propriété à la commune de Verrières le Buisson. Cette propriété possédait un très grand parc de 7 à 8 hectares, entourée d'un côté par la rue de Paron, un morceau de la rue d'Estienne d'Orves, l'avenue du Général Leclerc et par la voie verte. Modifié en 1937 (suppression de l'avant-corps en face antérieure et toiture). L'hôtel de ville s'installa dans la demeure vers 1936-1937. Le jardin est transformé en lotissement.","habitants":"Famille de  Jean-Baptiste Laffitte\"","divers":"Verrières le Buisson Quatre châteaux , Paron grv _2_3grav -4_5, Bois Loriot grav-1  Vaillant grav 6, Marienthal et Verrière grav 4_5                                      Vaillant GPS : 48° 44' 49\" Nord, 2° 15' 52\" Est                                               Marienthal GPS : 48° 44' 47\" Nord, 2° 16' 02\" Est","gps":"48° 44' 49\" Nord, 2° 15' 52\" Est","images":["../image/image_91/91_Verri%c3%a8res_Buisson_1.jpg","../image/image_91/91_Verri%c3%a8res_Buisson_2.jpg","../image/image_91/91_Verri%c3%a8res_Buisson_3.jpg","../image/image_91/91_Verri%c3%a8res_Buisson_4.jpg","../image/image_91/91_Verri%c3%a8res_Buisson_5.jpg","../image/image_91/91_Verri%c3%a8res_Buisson_6.jpg","../image/image_91/91_Verri%c3%a8res_Buisson_7.jpg"]},"Consult_chateau_formulaire71ef-2":{"id":"Consult_chateau_formulaire71ef-2","dept":"91","canton":"Massy","commune":"Massy","nom":"Vilgenis","type":"Château","periode":"XVI-XVII","histoire":"VILGENIS. Vers 1502, un château est édifié, composé d'une basse-cour équipée de bâtiments agricoles et d'un donjon, entourés d'une enceinte flanquée de quatre tours; le domaine appartenait alors à la famille Fourquaud, avocats et procureurs au Parlement de Paris, et seigneur de Villegénis et de Villemoisson.n 1575, le domaine passe à la famille de Vigny qui agrandit le domaine en annexant les terres d'Igny et Gommonvilliers.En 1616, c'est Bertrand de Solly qui achète le domaine relevant de la baronnie de Macy, puis en 1618, il est acquis par Charles Levoyer le 27 mars 1643, il revient à Barthélémy de Lafont et Étienne de Vigny. Le 6 septembre 1651, la veuve de ce dernier, Madeleine de Lafont, cède le château de Villegénis et ses dépendances, la terre et seigneurie d'Igny et le fief de Gommonvilliers sis en la paroisse d'Igny à Pierre d'Albertas, maître des requêtes, seigneur de Ners et Gémenos; en 1688, c'est Guy Carré de Montgeron qui en prit possession en attendant la majorité d'Henry-Reynaud d'Albertas (1674-1746), héritier de son grand-oncle. Ce dernier devint le premier président de la cour des comptes de Provence. En 1719, Claude Glucq (1676-1742), magistrat et industriel parisien rachète le domaine Le 8 août 1741, Claude Glucq, ruiné, cède à Claude-Pierre, marquis de Sabrevois, capitaine de carabiniers et Louise de Guiry, Mais dès le 7 décembre 1744, Élisabeth-Alexandrine de Bourbon-Condé dite mademoiselle de Sens (1705-1765), la plus jeune des filles de Louis III de Bourbon-Condé et de Louise-Françoise de Bourbon achète à son tour les fiefs et seigneuries de Villegénis,  en 1765, le domaine revient à Louis V Joseph de Bourbon-Condé  neveu d'Élisabeth-Alexandrine de Bourbon  qui fait replanter le parc, redessiner l'entrée du château, reconstruire les communs en 1774 et aménager une glacière. En 1787 le domaine de 455 hectares est légué à Louise-Adélaïde de Bourbon-Condé.","architecture":"VILGENIS,  en 1789 il est pillé, puis vendu le 18 août 1795 à M. Detmar-Basse qui y installe une filature textile et qui le revend en 1806 à François Duprey-Blampain.En 1823, Charles Arnoult Delorme fait démolir le château pour en récupérer et vendre les matériaux afin de construire à Paris, le passage Delorme ; il fait édifier à la place une maison bourgeoise décorée par Jean-Auguste-Dominique Ingres. en 1860, c'est son fils Napoléon Joseph Charles Paul Bonaparte qui en hérite et qui le revend en 1865 au peintre André Giroux qui le lègue à son gendre Louis Eugène Bazin-Giroux.   Le prince Jérôme Bonaparte achète le domaine, agrandit la demeure dans le style Empire. En 1906, le château est acheté en cadeau de mariage par l'homme d'affaires américain William Ellis Corey à son épouse la cantatrice Mabelle Gilman.                                                                                                                                                             Le château est de style Empire. Il a été construit de 1823 à 1852. Le Château de Vilgénis servait autrefois d'habitation. Il a été rebâti en 1823. Il est inscrit partiellement aux M.H. depuis 1977. Le Château de Vilgénis est devenu le Centre de Formation d'Air France, il  est inscrit aux M.H. depuis 1948.","habitants":"Famille de Vigny\"","divers":"A Massy château de Vilgenis                  GPS : 48° 44' 02\" Nord, 2° 14' 38\" Est","gps":"48° 44' 02\" Nord, 2° 14' 38\" Est","images":["../image/image_91/91_Vilgenis_1.jpg","../image/image_91/91_Vilgenis_2.jpg","../image/image_91/91_Vilgenis_3.jpg"]},"Consult_chateau_formulaired2e2":{"id":"Consult_chateau_formulaired2e2","dept":"91","canton":"Longjumeau","commune":"Ville du Bois","nom":"Ville_du_Bois","type":"Château","periode":"XVII","histoire":"Deux châteaux dans cet article, Plessis St-Père et Ville du Bois. PLESSIS-ST-PERE, le fief du Plessis Saint Père est mentionné dès 1265. Un important château y fut construit au XVIIe siècle. Il fit l'objet d'importants réaménagements au début du XIXe siècle, l'architecte Liégeois, chargé de sa restauration, le dota d'une salle de bains, le peintre Bertin peignit le plafond de la chapelle, tandis que Valenciennes décora les appartements. Le dernier propriétaire fut un certain Delorme qui fit détruire le château en 1827. Subsistent les douves et les communs longtemps utilisés comme ferme sous le nom de \"La Croix Saint-Jacques\", devenue centre communal de loisirs. Des gravures nous ont conservé l'état du château, qui s'élevait sur un terre-plein carré dont les deux angles étaient occupés par des tours carrées coiffées en pavillon, et entouré de douves que franchissait un important pont-levis. Le château lui-même se composait d'un corps central à sept fenêtres, coiffé d'ardoises à quatre pans et encadré de deux pavillons en saillie. De la demi-lune du château partaient trois avenues en éventail rejoignant la route d'Orléans. Une partie du quadrilatère des douves larges de 15 m est encore visible.","architecture":"VILLE du BOIS  L'ancien château qui occupe la pointe du parc vers le village a appartenu au chirurgien Ambroise Paré qui y avait installé sa maison des champs, il est connu sous le nom de Grand'maison. En 1788, la propriété fut acquise par la famille Macé de Bagneux. L'aile nord a été reconstruite en briques et l'aile sud démolie en 1894 pour donner accès au nouveau domaine, auquel il sert d'entrée en 1891. Un château brique et pierre fut bâti au milieu du parc pour Emmanuel de Lalain Chaumel, cousin d'Auguste Joseph Macé de Bagneux, maire de la Ville du Bois de 1896 à 1908. Une salle des fêtes et un pavillon en meulière ont été édifiés dans le parc au début du XXe siècle. Le domaine est aujourd'hui un établissement privé d'enseignement secondaire dépendant de l'Institution du Sacré-Coeur.   Le château est une construction brique et pierre sur un soubassement en meulière. Le pavillon d'angle sud-est comporte deux étages carrés ; il est couvert d'un toit en pavillon ainsi que le corps qui fait saillie sur la façade principale. Les façades du corps principal de la Grand'maison située à l'entrée du domaine sont enduites et l'aile nord-est est en briques. Le pavillon construit au début du XXe siècle au nord du château est en moellons de meulière et son toit en tuiles mécaniques. La salle des fêtes est en briques sur un soubassement en meulière.","habitants":"Chirurgien Ambroise Paré \"","divers":"Deux châteaux de Ville au Bois, Plessis St-Père grav 3 et Ville du Bois grav 1-2. GPS : 48° 39' 40\" Nord, 2° 16' 07\" Est","gps":"48° 39' 40\" Nord, 2° 16' 07\" Est","images":["../image/image_91/91_Ville_du_Bois_1.jpg","../image/image_91/91_Ville_du_Bois_2.jpg","../image/image_91/91_Ville_du_Bois_3.jpg","../image/image_91/91_Ville_du_Bois_4.jpg"]},"Consult_chateau_formulaire982b":{"id":"Consult_chateau_formulaire982b","dept":"91","canton":"Les Ulis","commune":"Villebon sur Yvette","nom":"Villebon_Yvette","type":"Château","periode":"XVI-XVII","histoire":"VILLEBON  Auguste de Thou, avocat au Parlement de Paris fait construire en 1512 trois pavillons de style Renaissance avec une belle galerie. Seul le bâtiment à l'entrée du domaine : le pavillon Sully subsiste aujourd'hui. Nicolas de Thou, évèque de Chartres présidera le 27 février 1594 au sacre de Henri IV. En 1611 un incendie dévaste le château. Jacques de Thou engage l'architecte Métezeau pour le reconstruire suivant de nouveaux plans. En 1617, mort de Jacques de Thou et de l'architecte Métezeau avant la fin des travaux. André Potier de Novion, président en la cour au Parlement de Paris commence la reconstruction du château en 1626 d'après les plans de l'architecte Métezeau : deux pavillons renaissance étaient à intégrer au nouveau bâtiment. Son fils Nicolas Conseiller de Louis XIII continue luvre de son père. Pendant la Fronde (1649-1652) Villebon est ravagé : incendies, destructions, pillages, viols, tortures, famine. La population souffre. Avec sa congrégation, Vincent de Paul vient au secours des villageois. Nicolas Potier de Novion restaure les deux pavillons renaissance de 1656 à1658. La chapelle privée du château est agrandie: Saint Côme et Damien, est transformée en Église Paroissiale. Le domaine passa ensuite aux mains de nombreux propriétaires: en 1668 Antoine de Rippert, en 1696 Hubert de Champy, en 1787 Claude Gabrielle, marquise de Pracontal, en 1806 le comte Alfred Félix de Montesquiou Fezensac fait construire l'Orangerie","architecture":"VILLEBON, en 1832 le baron Laurent Antoine Isidore de Nivière, ancien maire de Lyon, receveur des Finances, fait construire le pigeonnier. Son fils Louis de Nivière sera maire de Villebon entre 1862 et 1884. Le château reçoit les soldats blessés et convalescents en 1916. Léon Henri de Nivière sera le dernier des Nivière à posséder le château. Le domaine est vendu en 1920 à Monsieur Hawkins  à la société Immobilière de lÉcole Ile de France. Hawkins avait participé à la fondation en 1898 de lécole des Roches à Verneuil-sur-Avre. Incendie en 1933 du Pavillon Sully. En 1934 fermeture de l'école. Sauveur de la  commune en 1652, la congrégation de la Mission reprend le domaine en 1937. La propriété comprend 26 hectares de bois, prés, pièce d'eau et les bâtiments. L'extérieur du château ne subit pas de modification, seul l'intérieur fut rendu fonctionnel. Occupation en 1940 par les SS d'abord puis par des troupes allemandes pendant presque toute la guerre. Le château a été très abîmé. Après la réfection, un petit séminaire et un centre de formation des futurs missionnaires occupent le château. Le Centre de Retraite Spirituelle des Pères Lazaristes et un nouveau Collège Lycée privé (qui porte toujours le nom d'Ile de France) se partagent le domaine en 1970.   Centre de retraite spirituelle des Pères Lazaristes.","habitants":"Famille  De Nicolas Potier de Novion\"","divers":"A Villebon sur Yvette  château de Villebon                                                                                     GPS : 48° 41' 57\" Nord, 2° 15' 29\" Est","gps":"48° 41' 57\" Nord, 2° 15' 29\" Est","images":["../image/image_91/91_Villebon_Yvette_1.jpg","../image/image_91/91_Villebon_Yvette_2.jpg","../image/image_91/91_Villebon_Yvette_3.jpg"]},"Consult_chateau_formulaire869c":{"id":"Consult_chateau_formulaire869c","dept":"91","canton":"Brétigny-sur-Orge","commune":"Longpont sur Orge","nom":"Villebouzin","type":"Château","periode":"XVII","histoire":"VILLEBOUZIN au XIIe siècle fief en possession des Cocherel, en 1357  vendue à la collégiale de Saint-Nicolas du Louvre et des Bons-Enfants  puis en 1543 achat par Robert de Grison, notaire et conseiller du roi,  transforme le  manoir en une résidence seigneuriale. Marie Louise de Grisson épouse et héritière  de Villebouzin en 1656 François de Montgomery  pendant la deuxième moitié du XVIIe siècle c'est ce ménage qui reconstruit le château  sur l'emplacement d'un ancien château féodal. conserveront le domaine jusqu'en 1700, puis passe à Louis de la Motte Villebraye d'Aspremont. En 1718 achat du domaine par les Labbé et à son épouse Marie-Anne Fleuriau d'Armenoville fille du chatelain de Rambouillet. Au XVIIIe siècle échoit en héritage à l'une des filles Marie-Madeleine alliée à Simon-Charles de Ballainvilliers, en 1767 le domaine revient à leurt fils qui le loue  au duc de Charost à Louis Durand et à Jean-Jacques de Lemerie à la Révolution , les propriétaires émigres , vendu comme bien national son propriétaire d'alord les Chargot  Jean-François banquier propriétaire des forges du Creusot Reconstitue le domaine sa fille et son gendre Andrieux de Cheptainville se dessaissisent  du domaine en 1844   au profit de                                                                 M. Baudoin, entrepreneur de pompes funèbres  qui  fait démolir les tourelles ainsi que les pavillons , en 1870 occupé par les allemands en 1887 passe aux Thuillier en 1911 à M.René Michau consul de France en 1960 clinique psychiatrique par la famille de Bagneux.","architecture":"VILLEBOUZIN . L'édifice est presque dans son état d'origine, composé d'un corps central élevé sur un rez-de-chaussée un premier étage et un second sous combles, flanquée de deux ailes légèrement saillates à toitures indépendates,  seuls deux pavillons comprenant une chapelle et une salle de spectacle situés à l'avant ont disparu   Deux tourelles, subsistent du château primitif, flanquant aux angles la cour d'honneur et dont l'une abritait un colombier, furent également démolies à cette date. Le clocheton qui surmonte le fronton et le porche semi-circulaire au centre de la façade antérieure semblent être une adjonction du XIXe siècle. Le corps central couvert d'un grand comble à quatre pans est encadré de gros pavillons carrés coiffés de toits en pavillon. La façade sur parc est agrémentée de deux petits pavillons formant retour. Des douves en partie comblées entourent complètement le château et forment à l'avant une grande cour d'honneur. 1785, le marquis d'Eschoisy remania la décoration intérieure et aménagea à l'anglaise une partie du parc à été restauré en 1912 par l'architecte Paul Friesé, qui construisit également les communs. Un parterre à la française a été rétabli après 1911.","habitants":"Famille de Montgomery\"","divers":"Longpont sur Orge Villebouzin. GPS : 48° 38' 33\" Nord, 2° 17' 34\" Est","gps":"48° 38' 33\" Nord, 2° 17' 34\" Est","images":["../image/image_91/91_Villebouzin_1.jpg","../image/image_91/91_Villebouzin_2.jpg","../image/image_91/91_Villebouzin_3.jpg"]},"Consult_chateau_formulairee646":{"id":"Consult_chateau_formulairee646","dept":"91","canton":"Dourdan","commune":"Villeconin","nom":"Villeconin_Grange","type":"Château","periode":"XIII-XIV-XVII","histoire":"Trois châteaux dans cet article, la Grange et Villeconin.                          La GRANGE, fut bâti au XIIIe siècle,  pendant la guerre de cent ans, la région fut ravagée, y compris Villeconin et le château de la Grange n'a pas résisté aux événements. C'est probablement à partir de cette époque que le château de la Grange a été endommagé, perdant son rôle de résidence seigneuriale pour être utilisé comme ferme. Le chateau fut victime de plusieurs actes de pillage au fil du temps, servant de carrière pour la reconstruction du village, même avant son abandon.  puis a appartenu à Jean de Montagu, homme politique et mécène du Moyen-Age. Le château porte le nom de \"La Grange\", nom de l'épouse de Jean de Montagu, Jacqueline de La Grange, fille d'un président du Parlement de Paris. La famille de Montagu a occupé le château  Le château passa ensuite par héritage et mariage à la famille Graville. Son représentant le plus prestigieux fut l'Amiral de Graville, chambellan et conseiller du roi. Puis au fil des ventes et héritages se succédèrent les familles Savary, Colin, Cochefillet, Merault, Glué, d'Ornaison, de Talaru. Les Cochefillet dont Rachel épouse en 1592 Maximilien de Béthune futur duc de Sully. Lors de la Révolution, César de Talaru fut exproprié et le château de la Grange vendu aux enchères avec ses autres biens, transformé en ferme, acquis en 1932 par le comte de Jouvencel et en héritage à sa fille madame Falcon de Longevialle, puis à ses fils qui en sont toujours propriétaires.","architecture":"VILLECONIN  Demeure historique située au coeur d'un village fleuri dans la vallée de la Renarde, a été construit à la fin du XIVe siècle par Jean de Montagu, surintendant des finances du roi Charles VI.   Pendant la Guerre de Cent Ans, la région fut ravagée, y compris Villeconin et le château de la Grange n'a pas résisté aux événements. La Grange est considérée en 1794 comme un corps de ferme en ruine, dans un angle au midi une tour découverte cintrée par le bas sans porte servant de bûcher. Les bâtiments ne semblent plus avoir été utilisés depuis le XIXe siècle. On pense que le château de la Grange n'était pas une place forte militaire, mais faisait partie d'un système de surveillance constitué également par la tour Guinette d'Étampes et places fortes de Montlhéry, Marcoussis et Saint-Yon. Il est transformé à la Renaissance par les Cochefilet, belle-famille de Sully. A la Révolution, l'édifice est décrété bien national. Au début du XIXe siècle, il devient une ferme inscrite à l'inventaire des monuments historiques en 1926. La bâtisse est acquise par Henri de Jouvencel en 1932. Son petit-fils, Roland de Longevialle, marquis de Vauvineux propriétaire actuel et sa famille vous font découvrir cette demeure de charme.   La priorité est de sécuriser le site. En 2016, l'accent sera aussi mis sur le débroussaillage et les travaux urgents de la voûte et sur une fissure de la Tour de l'escalier. La Drac se chargera, dans un premier temps d'établir un diagnostic et d'évaluer l'intérêt du site.   Éléments protégés MH : le manoir des Ardenelles en totalité : inscription par arrêté du 10 mai 1926.","habitants":"Grange;   Famille de Louis Malet de Graville\"","divers":"Trois châteaux à Villeconin, la Grange grav-4-5-6-,  et Villeconin grav-1-2-3-GPS : 48° 29' 56\" Nord, 2° 07' 50\" Est","gps":"48° 29' 56\" Nord, 2° 07' 50\" Est","images":["../image/image_91/91_Villeconin_Grange_1.jpg","../image/image_91/91_Villeconin_Grange_2.jpg","../image/image_91/91_Villeconin_Grange_3.jpg","../image/image_91/91_Villeconin_Grange_4.jpg","../image/image_91/91_Villeconin_Grange_5.jpg","../image/image_91/91_Villeconin_Grange_6.jpg","../image/image_91/91_Villeconin_Grange_7.jpg","../image/image_91/91_Villeconin_Grange_8.jpg"]},"Consult_chateau_formulaireeb8f":{"id":"Consult_chateau_formulaireeb8f","dept":"91","canton":"Arpajon","commune":"Egly","nom":"Villelouvette","type":"Château","periode":"XVIII","histoire":"VILLELOUVETTE, le village d'Egly est érigé en paroisse dès le XIIIe siècle et le restera jusqu'au milieu du XVIIe siècle où il est rattaché a la cure de Boissy-sous-Saint-Yon. Le clocher de son église est du XIIIe siècle, il est le seul témoignage de l'église primitive, celle-ci ayant été ravagée par un incendie pendant la guerre de cent Ans. A la Révolution, la terre d'Egly appartenait au maréchal de Castries, seigneur d'Ollainville et de Bruyères-le-châtel. Le hameau de Villelouvette dépend de la commune d'Egly. Sa seigneurie a toujours eu un seigneur particulier qui relevait de Saint-Yon. Villelouvette possède aussi un moulin depuis le moyen-Age, qui transformait le blé des agriculteurs environnants.\nLa seigneurie de Villelouvette relevait sous l'Ancien Régime de Saint-sulpice de Favières.","architecture":"VILLELOUVETTE,  un château y existe au XVIIIe siècle qui reste en l'état jusqu'en 1848. Il était situé au nord du château actuel, plus près de l'Orge. le bâtiment actuel a été construit en 1857. Il a été vendu en 1960 à la commune de Montrouge qui y a installé un centre aéré. Corps de logis central accosté de deux ailes, et sept travées, deux étages carrés et d'un étage de comble avec lucarnes. La travée centrale est en saillie: un perron y précède la porte d'entrée surmontée, au premier étage, d'une porte-fenêtre avec balcon, la lucarne centrale porte un décor de pilastres et consoles et  surmontée d'une horloge et d'un clocheton, le toit à longs pans et à croupes est couvert de tuiles plates. Aux ailes, deux avant-corps carrés légèrement en saillie, au toit en pavillon. Côté parc, les deux avant-corps présentent un léger décrochement et le corps central est orné aux angles d'une tourelle ronde en encorbellement. Les murs sont recouverts de crépi qui, aux encadrements des fenêtres aux chaînes d'angle imite la pierre de taille. propriété de la commune, centre aéré.","habitants":"Seigneurs locaux\"","divers":"A Egly, Villelouvette,                                    GPS : 48° 34' 47\" Nord, 2° 13' 18\" Est","gps":"48° 34' 47\" Nord, 2° 13' 18\" Est","images":["../image/image_91/91_Villelouvette_1.jpg","../image/image_91/91_Villelouvette_2.jpg"]},"Consult_chateau_formulairedd9b":{"id":"Consult_chateau_formulairedd9b","dept":"91","canton":"Etampes","commune":"Morigny_Champigny","nom":"Villemartin","type":"Château","periode":"XVIII","histoire":"VILLEMARTIN,   ce vieux fief, cité dans maintes chroniques, avait été confisqué par Louis XI, sur Guyon du Rié, auquel il avait jadis donné, et ce, parce qu'il avait suivi le parti du Duc de Bourgogne. Le don eut lieu en 1472 et se fit en faveur de Baugeois de Wicardel  qui est alors dit \"écuyer seigneur de La Barre et de Villemartin\". En 1544, c'est Jean Le Verrier qui est mentionné comme sieur de Villemartin et le domaine reste dans cette famille pendant près d'un siècle. Il n'est toutefois pas possible de préciser pourquoi c'est de nouveau par un Wicarcel que Villemartin est transmis à Claude de Valentin en 1642. On apprend que Jacques de Fleury est chevalier seigneur de Villemartin en 1683. Le 12 mars 1708, Jean-Jacques de Fleury, l'héritier bénéficiaire de défunte Angélique-Thérése de Fleury, \"vend à Vincent Maynon, seigneur baron de Bouville et Farcheville, conseiller du Roy en sa cour de parlement, la terre et seigneurie de Villemartin  en la paroisse de Champigny près d'Etampes,  il y a un canal d'eau vive et de l'autre cinq a six arpens ou environ de bois taillis qui composent le parc dudit château, le tout clos de murs à exception de la partie qui règne sur la longueur dudit canal lequel sert de cloture en cet endroit, château et dont l'une conduit de la grande porte et principale entrée de cellui- ci au village de Champigny, l'autre à la garenne dudit château, et la troisième de la porte de derrière du dit jardin au village de Morigny\", ainsi qu'au moins deux des trois avenues d'ormes (celle prenant a la porte principale et celle à l'arrière).","architecture":"VILLEMARTIN,  château composé d'un grand corps de logis à pavillons couvert de tuile et tourelles couvertes d'ardoise dans lequel il y a une chapelle, basse cour en laquelle il y a granges, ecuries, etables, bergerie, colombier a pied, et autres édifices et batiments aussi couverts de tuile, jardin a présent en friche aux derrière et aux côtes  du dit château sur l'un des côté, La seule information est fournie par Maxime Legrand : \"pendant la Révolution, silence complet sur le fief ; point de seigneur assigné dans son manoir\". Pour le XIXe siècle, deux constructions nouvelles (maisons) apparaissent sur la parcelle 1200 (ferme) de 1875 à 1876. Quant a la ferme de Villemartin, elle fait l'objet d'un bail. Le 14 décembre 1641 puis le 11 mai 1648 ou elle est dite consister \"en maison à demeurer en la basse-cour, granges, étables. Le colombier est aussi mentionné à cette occasion. On relève très peu de variantes dans le bail du 20 mai 1715 : \"un batiment composé d'une chambre basse, une chambre haute, grenier dessus, toit a porcs et poulailler.  Enfin, deux moulins semblent également avoir dépendu de ce domaine. Ne possédant aucune information relative à la construction et aux bâtiments, les sources étant trop lacunaires et l'absence d'étude nautorisent pas de formuler des conclusions pertinentes. On peut néanmoins suggérer que l'enceinte avec les tourelles en encorbellement remonte au XVe siècle, hôtel restaurant.","habitants":"Famille de   Claude de Valentin\"","divers":"château de Villemartin à Morigny_Champigny","gps":"","images":["../image/image_91/91_Villemartin_1.jpg","../image/image_91/91_Villemartin_2.jpg"]},"Consult_chateau_formulaired407-2":{"id":"Consult_chateau_formulaired407-2","dept":"91","canton":"Gif-sur-Yvette","commune":"Villers le Baclé","nom":"Villers le Baclé","type":"Château","periode":"XV-XVII-XVIII","histoire":"VOISINS  le THUIT,  ou Villiers le Baclé  La construction du château de Villiers-le-Bâcle date du XVIIe siècle. Il est de style Louis XIII. Il se situe à 22 kms au Sud-Ouest de Paris. Le château de Voisins-le-Tuit se situe dans un parc clos de 40 ha, dont 36 ha de forêt. Le château se trouve sur le fief de Villiers, parfois appelé fief de Presles. Ce fief a appartenu à Jean Le Bâcle de 1310 à 1332, à Jean de Presles en 1403, aux Voisins du XIVe siècle au XVIe siècle, puis au XVIIe siècle à Françoise Lombard, Michel Lucas et Nicolas de Bartillat, au XVII  Ie siècle à Claude Olivier Boucher et Ajorrant de Tracy. Au milieu du XVIIe siècle,  un hôtel particulier se trouvait à l'emplacement actuel du château : l'hôtel de Presles. Le château de Voisins-le-Tuit actuel a été construit vers 1650 par Michel Lucas, familier de Louis XIII, sur les ruines de l'édifice précédent, une restauration importante a été réalisée au début du XIXe siècle par la famille Biver.  Le propriétaire actuel du château est Mr Yves Lecoq, dont il constitue la résidence principale. Il a acquis le château, en 1995, en très mauvais état. Il a été inscrit aux M.H. le 9/02/1946.","architecture":"VOISINS  le THUIT. De nombreuses réparations furent effectuées. Le presbytère est aménagé en logement d'habitation. La parcelle où étaient situés le tribunal et la prison a été cédée à la commune de Villiers-le-Bâcle pour l'agrandissement du cimetière. Le château est régulièrement loué pour des événements privés ou des tournages cinématographiques. Ainsi, des scènes de Ridicule, des Ames grises, ainsi que de la série télévisée Nicolas Le Floch y ont été réalisées. Le château de Voisins-le-Tuit est normalement fermé au public, mais des visites y sont organisées, chaque été. Fief mentionné dès le XVe siècle. En 1521, un aveu est rendu au roi par Gabriel Decozan de Lainers pour sa seigneurie et terre de Magny-l'Essart, dans lequel est compris le fief des Vasseaux appartenant aus héritiers de Guillaume de Voisins. Château féodal flanqué de tours, attesté par un plan de 1768. Reconstruit ou modifié au cours du XVIIIe siècle. Modifications et agrandissements au XIXe siècle, le colombier est détruit.","habitants":"Famille de Nicolas de Bartillat\"","divers":"Villers le Baclé  château de Voisins le Thuit                                                                    GPS : 48° 43' 40,62\" Nord, 2° 07' 46,81\" Est","gps":"48° 43' 40,62\" Nord, 2° 07' 46,81\" Est","images":["../image/image_91/91_Voisins_le_Tuit_1.jpg"]},"Consult_chateau_formulaire4aae":{"id":"Consult_chateau_formulaire4aae","dept":"91","canton":"Draveil","commune":"Draveil","nom":"Villiers_Draveil","type":"Château","periode":"XVI-XVII","histoire":"VILLIERS, le fief de Villiers, qui appartient à l'abbaye de Saint-Victor de Paris depuis le milieu du XIIe siècle, relève ensuite du fief de Marcenoux jusqu'en 1732, date du rattachement de celui-ci au parc du château seigneurial de Draveil après son acquisition par le fermier général Marin de La Haye. En 1782 un château est élevé sur l'emplacement d'un édifice plus ancien détruit par un incendie. De la première demeure subsistent deux pavillons d'entrée, d'époque Henri IV, mais remaniés au XVIIIe siècle lors de la construction du corps principal. Les ailes latérales plus basses qui relient le corps principal à ces pavillons ont été rajoutées vers 1789. L'allée des Tilleuls qui conduit au château a été plantée sous le règne de Louis XIV. Le parc, qui compte six hectares au XVIIIe siècle, est réaménagé \"à l'anglaise\" au début du XIXe siècle par le botaniste André Thouin qui créée une grande prairie bordée d'un front boisé, puis réaménagé en 1900 par Edouard André. Le domaine devient en 1954 la propriété de la société centrale immobilière de la caisse des dépôts et consignations qui y établit un ensemble de 700 logements répartis entre des pavillons de 2 ou 4 logements et des immeubles de 2 et 3 étages. En 1987 il est racheté par la commune, qui installe dans le château une bibliothèque municipale et transforme l'orangerie en lieu d'expositions.  Propriété de la commune, bibliothèque et centre culturel.","architecture":"VILLIERS, le château situé au fond de la cour d'honneur comprend un corps central en légère saillie, à trois travées, et sommé d'un fronton. Sur la façade postérieure ce fronton est orné d'un groupe sculpté représentant Cérès, déesse de l'agriculture et des moissons. Les pavillons d'entrée et le château, reliés par des ailes en rez-de-chaussée, comprennent un étage carré et un étage de comble. La toiture à longs pans du château a été refaite en 1954 avec charpente métallique. Les pavillons sont couverts de longs pans brisés. Derrière l'aile latérale ouest se trouvent les communs (écuries et orangerie surmontée d'un pigeonnier). A l'est du château, un jardin aménagé dans le prolongement du parc comporte un plan d'eau alimenté par une source surmontée d'un rocher en forme de grotte. De ce plan d'eau, agrémenté d'une île, partait autrefois un petit ruisseau longeant une allée dite \"des Philosophes\", jusqu'à l'étang de La Noirat situé au nord, en contrebas du parc. D'autres pièces d'eau ont été comblées.  Éléments protégés MH : les façades et les toitures du château ainsi que les pavillons d'entrée et les boiseries d'origine : inscription par arrêté du 18 juin.","habitants":"Fief de Marcenoux\"","divers":"Draveil château de Villiers                     GPS : 48° 40' 57\" Nord, 2° 24\" 19\" Est","gps":"48° 40' 57\" Nord, 2° 24\" 19\" Est","images":["../image/image_91/91_Villiers_Draveil_1.jpg"]},"Consult_chateau_formulaire5ce5":{"id":"Consult_chateau_formulaire5ce5","dept":"91","canton":"Gif-sur-Yvette","commune":"Verrières le Buisson","nom":"Vilmorin_91","type":"Château","periode":"XVII-XIX","histoire":"VILMORIN, c'est un château de style Renaissance et Louis XIII. Le propriétaire actuel du château de Vilmorin est la Famille Vilmorin. En 1650, il existait déjà un domaine, entourant un important bâtiment, de surface presque identique à la propriété actuelle (4 hectares), faisant partie des biens de François Thuret, écuyer, sire de la Tour, bourgeois parisien. Cette grande maison, un peu modifiée, est au cur du château actuel, et date donc de la première moitié du XVIIe siècle. Lensemble a appartenu ensuite à une demi-douzaine de propriétaires, parmi lesquels on peut citer Antoine Benoist, peintre de Louis XIV et sculpteur sur cire célèbre (de 1690 à 1698) , Philippe-Joseph Perrotin de Barmond, haut fonctionnaire parisien, qui construisit de nouveaux bâtiments au début du XVIIIème siècle (de 1698 à 1746), Michel-Antoine David,  Louis-Balthazard de la Chevardière, musicien,  premier maire de Verrières en 1790, qui continua à édifier des constructions (de 1788 à 1812). En 1815, ses héritiers vendirent la propriété à Philippe-André Levêque de Vilmorin, propriétaire de la « maison de graines Vilmorin-Andrieux »,La famille fut consacrée par un monument créé à la suite dune souscription internationale, en 1908 (aujourdhui installée derrière lancienne mairie de Verrières). Le château de Vilmorin, avec de nouveaux bâtiments construits aux XIXe et XXe siècles, et son parc, larboretum Vilmorin, appartiennent à la famille Vilmorin. Louise de Vilmorin aimait passionnément cette demeure où elle a souvent résidé, et où elle est morte le 26/12/1969, elle est enterrée dans larboretum.","architecture":"VILMORIN, ayant accueilli André Malraux, celui-ci continua à vivre au château de Vilmorin jusquà sa mort en 1976. Inhumé dans le cimetière communal, il fut transféré au Panthéon en 1996. Le parc a été classé Réserve naturelle en 1959, et certaines parties du château ont été inscrites à lInventaire Supplémentaire des Monuments Historiques en 1965. Implanté sur le coteau nord de la vallée de la Bièvre, le château est entouré d'un parc de 4,5 ha appelé aussi l'Arboretum Vilmorin, proche de la Forêt de Verrières qui couvre le plateau de Villacoublay. Le château de Vilmorin est inscrit aux M.H. le 8/09/1965.   Le corps de bâtiment principal daterait du milieu XVIIe siècle ; les agrandissements, à l'ouest du corps principal, sont réalisés entre 1765 et 1786 ; puis avant 1809 dont ne subsistent qu'en partie. Modifications vers 1815 pour la famille de Vilmorin qui l'acquiert, et qui constitue un arboretum dans le parc; bâtiment à usage de laboratoire porte la date 1890; décor de têtes aux clefs des baies cintrées, des têtes de lion sur le portail constituent l'élément remarquable du château, site classé en 1959. La légende selon laquelle Louis XIV aurait fait construire le château pour Mademoiselle de la Vallière semble fausse, il pourrait s'agir à l'origine d'un pavillon de chasse.  Éléments protégés MH : le château de Vilmorin en totalité : inscription par arrêté du 8 septembre 1965, Il existe 6 châteaux dans la ville de Verrières-le-Buisson.","habitants":"Famille Vilmorin\"","divers":"Verrières le Buisson château de Vilmorin                                               GPS : 48° 44' 58,06\" Nord, 2° 16 06,31\" Est","gps":"48° 44' 58,06\" Nord, 2° 16 06,31\" Est","images":["../image/image_91/91_Vilmorin_91_1.jpg","../image/image_91/91_Vilmorin_91_2.jpg"]},"Consult_chateau_formulaire1b2c":{"id":"Consult_chateau_formulaire1b2c","dept":"91","canton":"Yerres","commune":"Yerres","nom":"Yerres","type":"Château","periode":"XVII","histoire":"trois châteaux dans cet article  Beauregard, Caillebotte   et du Maréchal de Saxe.                                                                                                       BEAUREGARD, sa construction date de 1899 à 1974. Il représente une partie de l'ancien fief de Dannemois, domaine dans la mouvance de la seigneurie d'Yerres. En 1761, une première demeure importante appartient à Antoine-Nicolas Desallier d'Argenville et à son épouse. Cette dernière est la petite-fille de Françoise Moreau, dite « Fanchon », musicienne de l'Opéra de Paris qui réside dans le Canton d'Yerres, dès 1706. Desallier d'Argenville est l'auteur du Voyage pittoresque des environs de Paris ou description des maisons royales, châteaux et autres lieux de plaisance, situés à quinze lieus aux environs de cette ville, édité une première fois en 1755, et objet de plusieurs rééditions. La propriété appartient entre 1840 et 1844 au général Charles Tristan, comte de Montholon. L'actuel château de Beauregard est édifié, par Honoré Aurélien Benoiston, qui acquiert le Domaine de Beauregard, en 1880. L'architecture de l'édifice est une interprétation de la poterne d'entrée du château seigneurial d'Yerres. Le château de Beauregard abrite dans ses murs, la mairie de Yerres.","architecture":"CAILLEBOTTE gustave de Caillebotte grand peintre, la propriété  s'illustre pour son jardin remarquable.                                                                                                        MARECHAL DE SAXE, la construction du château date de 1617 à 1635.  en 1748 achat du domaine par Maurice de Saxe, château de la Renaissance, de style Louis XIII. Son propriétaire initial était Charles Duret qui en fit sa résidence principale. Le maréchal décède  en 1750 ces héritiers le cède à Jacques Raymond secrétaire du roi et acquis en 1801 par Marc Henri le Pileur et revendu en 1804 à Jean-Baptiste Boscary de Villeplaine ancêtre direct du baron Gourgaud  qui le conserve jusqu'en 1990. En 2000, le château de la Grange est racheté par le groupe Savry qui y installa un hôtel de prestige, appelé de  château du Ma let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','91 — Essonne'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
