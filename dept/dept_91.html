rrières les buissons","nom":"Amblainvilliers","type":"Château","periode":"XVIII-XIX","histoire":"AMBLAINVILLIERS, à lorigine, une place forte féodale, possession du seigneur de Massy, fut élevée à Amblainvilliers entre les deux bras de la Bièvre. Lors de la guerre de Cent ans, en 1358, les anglais sen emparèrent. Jean le Bon, roi de France, la reprit contre rançon et la fit abattre pour supprimer une menace potentielle sur Paris. A son emplacement, un nouveau château a été élevé au XVIe siècle. Melle de Sens (1705-1765), fille légitimée de Louis XIV et de Mme de Montespan, résidant à Vilgénis en était la locataire (bail emphytéotique) auprès de lAbbaye de Saint-Germain-des-Prés. Revenu en héritage à son neveu Louis-Joseph de Bourbon, prince de Condé (1736-1818), celui-ci le racheta et y vécu jusquà la révolution. Acquis comme bien démigré, il fut détruit par son nouveau propriétaire Nicolas Charles Pommery en 1796. Un nouvel édifice fut construit en 1883 dans le style plus riant des villas italiennes, pour la marquise Joséphine de Visconti doù son nom Villa Visconti.","architecture":"AMBLAINVILLIERS, est un château de style Renaissance., c'était autrefois un château fort. Les Anglais s'en emparèrent, en 1358. Le château sera abattu. Un autre château sera reconstruit à son emplacement au XVIe siècle. Au XVIIe siècle, des tours furent ajoutées au château d'Amblainvilliers. Dans l'une des tours, sera instalée une chapelle, et dans l'autre, une prison, avec une cour au milieu, un clos de fossé rempli d'eau vive.Bâtiments sur rue; on trouve une tête de cheval sculptée sur le pignon des écuries. En 1674, existait deux bâtiments en bordure de la rue de Paris, auxquels vient s'ajouter un bâtiment perpendiculaire à la rue au cours du XVIIIe siècle. Un jardin régulier occupe à cette époque l'emplacement de l'actuel château. L'écurie ainsi que les bâtiments situés à côtés du portail sont probablement contemporains du château vers 1810.","habitants":"Louis-Joseph de Bourbon et marquise Joséphine de Visconti\"","divers":"Château d'Amblainvilliers à la Verrieres les Buisson                                GPS : 48° 44' 47\" Nord, 2° 16' 02\" Est","gps":"48° 44' 47\" Nord, 2° 16' 02\" Est","images":["../image/image_91/91_Amblainvilliers_1.jpg"]},"Consult_chateau_formulaire6e23":{"id":"Consult_chateau_formulaire6e23","dept":"91","canton":"Dourdan","commune":"Angervilliers","nom":"Angervilliers","type":"Château","periode":"XIV-XVII","histoire":"ANGERVILLIERS,  fut construit au XIVe siècle par Élisabeth d'Angervilliers, dame de Fleury en Beauce qui en fit sa résidence. En 1555, après plusieurs tractations, le château passe à Anne de Pisseleu, duchesse d'Étampes et favorite de François Ier. Les seigneurs rendaient haute, moyenne et basse justice dont les appels se rendaient au châtelet. Il n'en reste actuellement que le pressoir en forme de H, dont une partie a été restaurée et abrite de nos jours les locaux administratifs et culturels du village. En 1600, Jacques-Auguste de Thou, président du parlement de Paris, devenait propriétaire de la terre d'Angervilliers, puis la céda ensuite à Jacques Bouhier de Beauregard dont l'héritier et le petit-fils, d'Édouard Ollier de Nointel, a contribué à agrandir le domaine. Après son décès, sa veuve vendit la propriété à monsieur Bouin, qui continua les acquisitions de biens aux environs, afin d'accroître la population d'Angervilliers. Son fils, Charles-Prosper Bouin, ministre de la guerre en 1694 pour Louis XIV, en hérita puis le donna à sa fille Jeanne Bouin, veuve de Jean-René Longueil, duc de Ruffec. En 1761, le domaine fut vendu  à Pierre-François de Fonferrier puis cédé à son frère Louis-Roland d'Etrenneville, mort la même année. C'est André-Gabriel Juber, marquis de Bouville, qui acheta le château et son héritier le vendit à son tour à Jean-Louis Julien en 1788 à la veille de la Révolution. En 1792, ce dernier émigra et ses biens furent sur le point d'être vendus comme biens nationaux. Jean-Louis Julien revint précipitamment sur ses terres et se tua sur la pièce d'eau de la propriété qui passa à ses filles, la marquise de Catellan et la comtesse de Gramont. Madame de Catellan était une fidèle amie de Madame de Récamier, qui fit ainsi de fréquents séjours au château d'Angervilliers. Hôtel de ville.","architecture":"ANGERVILLIERS on peut se demander si les écrivains familiers du salon parisien de cette dernière, tels que Benjamin Constant, Chateaubriand, ou madame de Staël, n'auraient pas fait quelques visites à leur amie, exilée en 1808. De nombreuses lettres de madame de Récamier font allusion à son amitié avec madame de Catellan et madame de Staël, ainsi qu'à son séjour à Angervilliers. Du château du XVIIe siècle, entouré d'un grand parc dû à Le Nôtre et agrémenté de pièces d'eau alimentées par les aqueducs souterrains datant du XVIIe siècle, il ne reste qu'une partie des communs construit au XVIIe siècle. Il est remplacé en 1815 par le petit château rose, lui-même transformé par les comtes Sapia de Lencia qui apportèrent beaucoup de changement sur le domaine et firent disparaître les constructions les plus anciennes. Au début du XXe siècle, un manoir est construit par Lazare Weiller à l'emplacement du château primitif. Acquis en 1928 par Arthur Weisweiller et son épouse née Betty Deutsch de la Meurthe, d'origines juives, ceux-ci moururent en déportation. Le Baron de Gainsbourg racheta la propriété en piteux état. Pendant la seconde guerre mondiale, elle a été occupée par l'organisation allemande Todt, et réquisitionnée ensuite par les Américains et les Français. Aujourd'hui, le domaine laissé à l'abandon appartient à monsieur Gustave Leven, des Eaux Perrier et Minérales de France. Ce domaine est aujourd'hui très connu du milieu de l'exploration urbaine, grâce à Timothy Hannem sous le nom de \"domaine des 3 colonnes\". En 1983, la commune rachète les communs, extérieurs au parc à monsieur Leven pour les restaurer et y installer des locaux à l'usage de la collectivité. L'orangerie, construite en 1682, en forme de H, au toit mansardé, abrite aujourd'hui la mairie et la salle polyvalente. L'ancien colombier seigneurial, placé au centre de la cour des communs de l'ancien château, est également au cur du projet de réhabilitation et d'animation de la commune: il abrite aujourd'hui les locaux de la bibliothèque municipale.","habitants":"Famille de Madame  de Catellan                                     et le Baron de Gainsbourg\"","divers":"Château d'Angervilliers à Angervilliers.                                               GPS : 48° 35' 28\" Nord, 2° 3' 54\" Est","gps":"48° 35' 28\" Nord, 2° 3' 54\" Est","images":["../image/image_91/91_Angervilliers_1.jpg"]},"Consult_chateau_formulaireddec":{"id":"Consult_chateau_formulaireddec","dept":"91","canton":"Palaiseau","commune":"Palaiseau","nom":"Ardenay_Palaiseau","type":"Château","periode":"XIX","histoire":"ARDENAY, le château d'Ardenay fut construit à la fin du XIXe siècle par le minotier du moulin de Montrouge, originaire de Chateauroux, Monsieur Jean Boussac, alors que la commune de Palaiseau était un lieu de villégiature  durant les années 2000, le bâtiment fut classé au titre des monuments protégés dans le cadre du plan local d'urbanisme de la ville.","architecture":"ARDENAY, il a appartenu à Jean Boussac qui en avait fait une maison d'habitation. Il est de style Beaux-Arts. Le château est édifié en meulière selon la mode de l'époque et la géologie du lieu, selon un plan carré avec une tour carrée à l'angle nord-est et une poivrière à l'angle sud-est. Elle est construite sur trois niveaux, le dernier étant mansardé. Entre 1958 et 1960 fut construite la résidence du parc dArdenay, suivant les préceptes de lArchitecte Le Corbusier, 7 bâtiments entourent lancienne demeure, transformée en bibliothèque et salle des fêtes pour les copropriétaires. Son propriétaire actuel est la Co-Propriété du Parc d'Ardenay. Il est inscrit aux M.H. Le château d'Ardennay est devenu depuis la bibliothèque municipale de Palaiseau.","habitants":"Famille de  Jean Boussac, \"","divers":"Château d'Ardenay à Palaiseau           GPS : 48° 42' 57\" Nord, 2° 14' 26\" Est","gps":"48° 42' 57\" Nord, 2° 14' 26\" Est","images":["../image/image_91/91_Ardenay_Palaiseau_1.jpg"]},"Consult_chateau_formulaire2d95":{"id":"Consult_chateau_formulaire2d95","dept":"91","canton":"Arpajon","commune":"Bruyères-le- Châtel","nom":"Arny_Morionville","type":"Château","periode":"XVIII-XIX","histoire":"ARNY, à la fin du XVIIIe siècle, le domaine passe à la famille Charlet, qui deviennent des notables locaux après la Révolution et achètent le château de Bruyères. Alexandre Charlet, légitimiste, qui a démissionné de la vice présidence du tribunal de première instance de la Seine à l'avènement de Louis-Philippe, fait construire le château en 1859. En 1909, ses héritiers le vendent à Jules Henner (neveu du peintre), qui fait creuser un étang. Après de nombreux changements de propriétaires, le château et son parc de 25 hectares sont aujourd'hui à l'abandon et interdits d'accès. le domaine d'Arny existe depuis le XVIe siècle, avec une maison bourgeoise de petites dimensions qu'une cour avec porte cochère séparait des bâtiments de ferme. Elle possédait aussi un jardin potager et un jardin d'agrément avec parterre et bassin central. \nBâtiment de forme allongée (onze travées), comprenant sur la façade avant, un léger avant-corps central surmonté d'un tympan triangulaire et deux avant-corps latéraux et sur la façade arrière un avant-corps central de forme polygonale. Seuls les bandeaux séparant les étages et les angles de la demeure sont en pierre. Toit mansardé en ardoise. Sur chaque façade, un perron souligne l'entrée.","architecture":"MORIONVILLE, le château de Morionville a été construit au XVIIIe siècle sur l'emplacement de l'ancien fief des \"Moines blancs\" appartenant jusqu'au XVIe siècle à l'abbaye des Vaux de Cernay. Le dernier propriétaire, appartenant à la famille de Ferrières, meurt en Italie en 1944, et le domaine est vendu alors, entre 1939 et 1945, le château avait beaucoup souffert de l'occupation des troupes allemandes puis américaines. En 1947, le nouvel acquéreur vend le château délabré et le parc dénudé aux établissements Simon Louis qui y installent des terrains de culture et un service de nettoyage, de stockage et de mise en condition de graines de fleurs. En 1972, la société Vitakraft, nouvelle propriétaire, détruit le château pour y édifier une usine moderne. Seuls subsistent les communs, la chapelle du XVIIIe siècle et la grille d'entrée.\nChâteau construit en pierre et constitué à l'origine d'un corps de logis central, à un étage carré et sept travées, à bossages, entouré de deux ailes plus basses, couvertes en terrasses. Le toit oblongs, à croupes était couvert d'ardoises. Un perron de cinq marches ouvrait l'avant-corps central sur le parc. La chapelle est de style néo-jésuite, les communs sont en moellons calcaire et couverts de tuile plate.","habitants":"Arny la  famille Charlet   Marionville; famille de Ferrières\"","divers":"Deux chäteaux dans cet article grav-1    Arny GPS : 48° 35' 37\" Nord, 2° 11' 33\" Est                                  Morionille grav 2 -3","gps":"48° 35' 37\" Nord, 2° 11' 33\" Est","images":["../image/image_91/91_Arny_Morionville_1.jpg","../image/image_91/91_Arny_Morionville_2.jpg"]},"Consult_chateau_formulaire1e5a":{"id":"Consult_chateau_formulaire1e5a","dept":"91","canton":"Athis-Mons","commune":"Athis-Mons","nom":"Athis_Mons","type":"Château","periode":"XVI-XVII","histoire":"ATHIS, dès le XVe siècle une maison seigneuriale, propriété de Pierre Poignant, conseiller au Parlement, existe à l'emplacement actuel du château. Le domaine est agrandi à la fin du XVIe siècle par Pierre Violle, président de la cour des aides, et le château reconstruit au XVIIe siècle par la famille de La Brousse, qui rachète la seigneurie en 1628. Un plan de 1693 montre déjà le corps de logis actuel flanqué de deux pavillons. Il est acquis en 1743 par mademoiselle de Charolais, arrière-petite-fille du grand Condé et petite-fille de Louis XIV, qui fait du château sa résidence d'été. En déplaçant la ferme seigneuriale, elle aménage une cour d'honneur avec pavillons d'entrée et créée une perspective dans l'axe du château.","architecture":"ATHIS ; En 1756, mademoiselle de Charolais, fait prolonger le pavillon ouest de deux travées, en 1881, Alphonse Chodron de Courcel, sénateur, achète le domaine et fait appel à l'architecte Georges Lisch pour réaliser divers aménagements: construction en 1906 (date portée) d'un bâtiment abritant une bibliothèque contre le pignon ouest, de deux tourelles reliant le château aux communs et ouvrant sur le parc, d'une galerie conduisant à la chapelle seigneuriale, de piliers monumentaux face à la grille en demi-lune et sur l'allée d'honneur. Athis En 1946, le collège Saint-Charles fondé à Juvisy en 1913 et détruit par le bombardement de 1944 est transféré à Athis-Mons dans la propriété du baron de Courcel ; des bâtiments scolaires, une chapelle et des terrains de sport sont édifiés autour du château entre 1950 et 1958. Le parc aménagé par la famille de La Brousse au XVIIe siècle, embelli au XVIIIe par Melle de Charolais a perdu l'essentiel de ses éléments d'architecture (murs de soutènement, fontaines, cascade, canal alimenté par l'Orge).  Le corps central surmonté d'un fronton est flanqué de deux pavillons en saillie et plus hauts d'un étage.","habitants":"Famille de La Brousse\"","divers":"Château d'Athis-Mons à Athis-Mons                                                  GPS : 48° 42' 31\" Nord, 2° 23' 26\" Est","gps":"48° 42' 31\" Nord, 2° 23' 26\" Est","images":["../image/image_91/91_Athis_Mons_1.jpg","../image/image_91/91_Athis_Mons_2.jpg","../image/image_91/91_Athis_Mons_3.jpg"]},"Consult_chateau_formulaire0520":{"id":"Consult_chateau_formulaire0520","dept":"91","canton":"Athis-Mons","commune":"Athis-Mons","nom":"Avaucourt","type":"Château","periode":"XIX","histoire":"AVAUCOURT   château élevé en 1893 par l'architecte Pucey à l'emplacement d'un ancien château dit Petit château d'Athis ou clos d'Avaucourt; ce fief qui relevait de la seigneurie d'Athis était possédé en 1412 par Jean du Puy, écuyer, valet de chambre de Charles VI, et passa ensuite à la famille d'Avaugour; Mademoiselle de Charolais en fit en 1756 une dépendance du château d'Athis. En 1893 à monsieur Dasset qui fit construire le château. De ce premier édifice subsiste un nymphée aménagé dans le mur de soutènement de la terrasse. Devenue en 1906 propriété d'Alphonse Louis de Courcel, la demeure entourée d'un parc de neuf hectares est acquise le 5 mars 1929 par la commune pour y installer les services de la mairie et du dispensaire.  En 1971 un centre administratif est construit dans le parc par l'architecte Goldstein. Le parc devenu municipal est site classé depuis 1942. Les murs en meulière sont habillés d'un enduit ciment, avec des bossages pour marquer les angles. Le sous-sol, éclairé par des baies vitrées et porte s'ouvrant sur le jardin, forme terrasse côté Seine. Le vestibule porte un décor de stuc (putti, chutes d'armes) et le grand salon (salle des mariages) des peintures en camaïeu en dessus-de-porte. Le mur de soutènement de la terrasse qui s'étend à l'arrière du bâtiment est orné d'un nymphée à bossages du XVIIe siècle. L'avenue Aristide Briand traverse le parc en diagonale et le sépare en deux triangles dont le 1er est animé par un théâtre de verdure. Le bâtiment administratif est entièrement vitré pour mieux s'intégrer au parc d'Avaucourt. Le bâtiment des services techniques est relié au parc du château d'Athis par un petit pont qui enjambe la rue.  Hotel de Ville.","architecture":"PASTOUREAUX  en 1580 le fief appartenait à Hugues le Maçon                                        vous accueille pour vous proposer d'y fêter vos évènements privés (mariage, baptême, départ en retraite, fête familiale, etc). Location du château des Pastoureaux de 1 à 100 personnes","habitants":"famille d'Avaugour\"","divers":"Chateaux d'Avaucourt GPS : 48° 42' 25\" Nord, 2° 23' 20\" Est                                                            Pastoureaux GPS : 48° 31' 14\" Nord, 2° 15' 56\" Est","gps":"48° 42' 25\" Nord, 2° 23' 20\" Est","images":["../image/image_91/91_Avaucourt_1.jpg","../image/image_91/91_Avaucourt_2.jpg"]},"Consult_chateau_formulaire910a":{"id":"Consult_chateau_formulaire910a","dept":"91","canton":"Arpajon","commune":"Avrainville","nom":"Avrainville","type":"Château","periode":"XVII","histoire":"AVRAINVILLE  Le château d'Avrainville a été construit au XVIIe siècle: le premier propriétaire, en 1663, est Mathurin du Gas, secrétaire conseiller du Roi, contrôleur des barrages et pavés de France et Prévôt d'Avrainville. Un plan du XVIIIe siècle conservé aux archives nationales,  En 2008, le conseil municipal a fait installer la Mairie, dans les murs du château d'Avrainville.","architecture":"AVRAINVILLE, ce bâtiment disparaît au cours du siècle pour être remplacé par une maison de campagne composée d'un seul corps de bâtiment et de communs, l'aile gauche est ajoutée dans la deuxième moitié du XIXe siècle, puis au début du XXe siècle, on construit l'aile droite qui rejoint les communs réaménagés. Le parc, de six hectares à l'origine, a été progressivement loti. Grande maison composée d'un corps central et de deux ailes latérales dans le prolongement. Le corps central possède six travées sur un étage carré et un étage de combles éclairé par deux lucarnes. Deux ailes latérales ont été rajoutées : l'aile gauche est d'une travée, l'aile droite d'une travée pour la façade antérieure qui vient buter sur les anciens communs, et de deux travées pour la façade postérieure où les deux ailes sont légèrement en avant-corps. Un bandeau mouluré sépare les deux niveaux et une corniche soutient le toit. Des bossages marquent les chaînes d'angles et séparent les divers corps. Le bâtiment principal des communs a été rattaché à la demeure et forme une aile en retour d'équerre.","habitants":"Famille de  Mathurin du Gas\"","divers":"Château d'Avrainville à Avrainville          GPS : 48° 33' 45\" Nord, 2° 14' 56\" Est","gps":"48° 33' 45\" Nord, 2° 14' 56\" Est","images":["../image/image_91/91_Avrainville_1.jpg","../image/image_91/91_Avrainville_2.jpg"]},"Consult_chateau_formulaire2bbe":{"id":"Consult_chateau_formulaire2bbe","dept":"91","canton":"Longjumeau","commune":"Ballainvilliers","nom":"Ballainvilliers","type":"Château","periode":"XVII","histoire":"BALLAINVILLIERS, c'est un château de style classique. La construction du château de Ballainvilliers date du XVIIe siècle. Son propriétaire initial était Nicolas Lepagnol de Fontenoy qui en avait fait sa résidence principale. Il fut vendu à la Révolution comme bien national et fut racheté par la famille du baron Charles-Bernard. Après avoir eu plusieurs propriétaires, le château de Ballainvilliers est devenu la propriété des surs de Saint Vincent de Paul, en 1877, qui en firent un orphelinat. Au XXe siècle, le château de Ballainvilliers devient un centre de colonies de vacances. Du château originel construit au XVIIe siècle ne subsistent que laile gauche au Nord et la chapelle.","architecture":"BALLAINVILLIERS,  du château originel construit au XVIIe siècle ne subsistent que laile gauche au nord et la chapelle, à trois niveaux sur soubasements, toits sur-bessé en croupes, Le château de Ballainvilliers a été racheté, en 1994, par la commune de Ballainvilliers qui en a fait, depuis, son centre culturel.","habitants":"Famille de Nicolas Lepagnol de Fontenoy\"","divers":"Château de Ballainvilliers à Ballainvilliers                                                   GPS : 48° 40' 20\" Nord, 2° 17' 37\" Est","gps":"48° 40' 20\" Nord, 2° 17' 37\" Est","images":["../image/image_91/91_Ballainvilliers_1.jpg"]},"Consult_chateau_formulaireb1a3":{"id":"Consult_chateau_formulaireb1a3","dept":"91","canton":"Mennecy","commune":"Boutigny-sur-Essonne","nom":"Belesbat","type":"Château","periode":"XV-XVIII","histoire":"BELESBAT, en 1479, Louis XI séjourne dans l'ancien château de Bélesbat, édifié  dans la seconde moitié du XVIe siècle par les Hurault de Cheverny propriétaire des terres depuis 1556,  avec le porche d'entrée avec ses tours de défense. le chancelier Michel de L'Hôpital, apôtre de la tolérance, y décède dans les bras de sa fille en 1573.  passa ensuite au marquis de Livry.  Henri IV fréquente régulièrement le château, dont le logis est entièrement reconstruit au XVIIe siècle. J-B Berthelot de Duchy en est le seigneur de 1706 à 1740. Voltaire y séjourne plusieurs fois en 1725. Le parc est abattu en 1747. Rémy François de Chestret, bienfaiteur de Boutigny, devient propriétaire du domaine en 1786, puis passe par la suite par héritage au marquis de Rennepont. La famille Allez le possède jusqu'en 1920, date à laquelle il est acquis par les Raynal. Le château est alors délabré. En 1970, des bâtiments sont détruits et les douves sont comblées. Vendu et sauvé en 1988, le château est restauré et converti en hôtel-golf en 1991.","architecture":"BELESTAT est de style Renaissance. La construction de la Conciergerie du château de Belesbat date du XVIe siècle, de pierre et brique de plan en U à huit travées et à deux niveaux, porches d'entrée à deux tours de trois niveaux ces toits en poivrières, le château est alors délabré. En 1970, des bâtiments sont détruits et les douves sont comblées. Vendu et sauvé en 1988, le château est restauré et converti en hôtel-golf en 1991, il  est inscrit aux M.H.le 2/02/1948.","habitants":"J-B Berthelot de Duchy \"","divers":"Château de Belesbat à Boutigny  GPS : 48° 25' 57\" Nord, 2° 22' 24\" Est","gps":"48° 25' 57\" Nord, 2° 22' 24\" Est","images":["../image/image_91/91_Belesbat_Boutigny_1.jpg","../image/image_91/91_Belesbat_Boutigny_2.jpg","../image/image_91/91_Belesbat_Boutigny_3.jpg"]},"Consult_chateau_formulaire11f6":{"id":"Consult_chateau_formulaire11f6","dept":"91","canton":"Gif sur Yvette","commune":"Gif sur Yvette","nom":"Belleville_Gif","type":"Château","periode":"XVIII","histoire":"BELLEVILLE, en 1634, le propriétaire est Gilles de Trapu, procureur du Châtelet .Le site était alors un fief comportant une ferme et une modeste maison seigneuriale. On sait qu'un siècle plus tard le fermier habitait le rez de chaussée du bâtiment, tandis que le seigneur se réservait les chambres hautes. Puis en 1754, la propriétaire d'alors, François Béasse de La Brosse, fait ajouter notamment à proximité un bâtiment de deux étages. Celui-ci est agrandi par son héritier Pierre Juvénal Gallois de la Tour par l'ajout dans son prolongement d' un pavillon qui comporte un escalier carré et des pièces de réception. C'est alors (1774) que la dénomination de \"château\" apparaît. La fille du précédent,\népouse de Jacques Julien Devin de Fontenay , y ajoute au début de la Restauration deux ailes en V qui donnent à l'édifice son aspect actuel. Il est acheté en 1853 par le comte Edouard de Chambray. Il reconstruit les bâtiments de la ferme à l'écart du château en 1855, et aménage le parc. À la mort de son fils Raoul, en 1885, le domaine est morcelé. Le château et la ferme sont vendus séparément. En 1947, il abrite un centre de formation pour aides ménagères.","architecture":"BELLEVILLE, à  l'origine, le domaine se trouvait sur la commune de Gometz-la-Ville. En 1968, une SCI immobilière achète les terres de la ferme et y construit l'actuel quartier de Chevry II qui fait partie de Gif sur Yvette et cerne le château, encadré par deux petites ailes en retour couvertes de terrasse, puis  en 1976 la commune de Gif rachète le château et en fait un centre culturel et d'exposition. Lorsqu'on arrive par l'allée principale, le château apparaît comporte un corps de logis central à trois pans, d'un pavillon central polygonal, couvert d'une toiture à la Mansart, prolongé par  deux ailes en V surmontées de terrasses\nA gauche de cet ensemble, on découvre ce qui doit être la partie antérieure du bâtiment Une autre vue  du château : à gauche, on devine la partie antérieure, à laquelle se sont rajoutées le pavillon.","habitants":"Jacques Julien Devin de Fontenay \"","divers":"Château de Belleville à Gif sur yvette","gps":"","images":["../image/image_91/91_Belleville_Gif_1.jpg","../image/image_91/91_Belleville_Gif_2.jpg","../image/image_91/91_Belleville_Gif_3.jpg"]},"Consult_chateau_formulaire7605":{"id":"Consult_chateau_formulaire7605","dept":"91","canton":"Draveil","commune":"Draveil","nom":"Bergeries_Draveil","type":"Château","periode":"XVII","histoire":"BERGERIES,  l'actuel château est le troisième du nom, construit sur le domaine des Bergeries de Sénart, mentionné pour la première fois en 1481, comme appartenant à la seigneurie de Rouvres installée sur le territoire de Vigneux, voisin de Draveil. Le premier est construit au début du XVIIe siècle par la famille Le Fèvre de Caumartin qui avait acquis la seigneurie de Rouvres. En 1827, le château étant devenu inhabitable, son propriétaire, le baron Didelot, vend le domaine à la couronne. Le château est démoli et un deuxième est construit un peu plus au nord, sur la commune de Vigneux. Pour encourager l'industrie de la soie en France, le Roi Charles X décide de consacrer la propriété à la sériciculture et fait planter des mûriers sur le domaine. En 1881, le domaine est vendu par adjudication à un banquier, le comte Raphaël Cahen d'Anvers. Il fait construire, l'année suivante, l'édifice actuel. Bâtit sur l'emplacement du château primitif, le château, sur les hauteurs de Mainville, jouit d'une belle vue sur la vallée. Après la mort du comte d'Anvers en 1900, la propriété est acquise par Ferdinand Goldschmidt, puis transmise à ses héritiers., école de formation de la Police nationale.","architecture":"BERGERIES , c'est le 3ème chateau, construit sur le domaine des Bergeries de Sénart. Le château des Bergeries a été mentionné pour la première fois, en 1481. Il appartenait à la seigneurie de Rouvres, installée à Vigneux, voisin de Draveil. Le premier château  fut construit au début du XVIIe siècle par la famille Le Fèvre de Caumartin, qui avait acquis aussi le château de Rouvres.  Surmonté d'un toit complexe, le château, de style Louis XIII et de forme carrée, il se compose d'un rez de chaussée et deux étages,  chaque angle de la bâtisse étant coiffé d'un toit de forme pyramidale, avec une robe de brique et de pierre. La couverture d'ardoises est de trois couleurs d'où émergent de belles cheminées. La magnifique grille d'entrée ainsi que le pavillon de garde datent du premier château (1481). Auguste Renoir, peintre des bords de Seine à Champrosay, était venu au château, pour y faire le portrait des Demoiselles Cahen d'Anvers, encore enfant.","habitants":"Famille Le Fèvre de Caumartin\"","divers":"château de la Bergeries à Draveil         GPS : 48° 41' 07\" Nord, 2° 24' 29\" Est","gps":"48° 41' 07\" Nord, 2° 24' 29\" Est","images":["../image/image_91/91_Bergeries_Draveil_1.jpg","../image/image_91/91_Bergeries_Draveil_2.jpg","../image/image_91/91_Bergeries_Draveil_3.jpg"]},"Consult_chateau_formulaire4fff":{"id":"Consult_chateau_formulaire4fff","dept":"91","canton":"Etampes","commune":"Boissy la Rivière","nom":"Bierville_Boissy","type":"Château","periode":"XVIII","histoire":"BIERVILLE,  est situé à proximité du hameau de Bierville. Au XIe siècle, il est fait mention d'un domaine appartenant au chevalier Lancelot de Bierville. Au XIe siècle,  seul le pigeonnier, qui date du XIVe siècle, du château féodal, a survécu. Le bâtiment principal a, dans ses grandes lignes, son aspect actuel depuis le milieu du XVIIIe siècle.  Le château de Bierville et le domaine appartiennent successivement à de familles apparentées aux Richelieu (les Fuzée de 1604 à 1737, les Poilloüe de Saint-Mars jusqu'à la Révolution, où ils deviennent bien national en 1794, un des fils du propriétaire étant accusé d'avoir émigré malgré les dénégations de son père qui soutenait qu'il était mort. Ils sont ensuite acquis au XIXe siècle par la famille Van Loo. Le château de Bierville et le domaine ont été rachetés, en 1921, par Marc Sangnier, député démocrate-chrétien avant la lettre, pionnier du mouvement des auberges de Jeunesse en France, élu maire de Boissy-la-Rivière, en 1925, avant d'être légués à la CFTC, devenue la CFDT en 1964.","architecture":"BIERVILLE, au XIe siècle, il est fait mention d'un domaine  seul le pigeonnier, qui date du XIVe siècle, du château féodal, a survécu. Le bâtiment principal a, dans ses grandes lignes, son aspect actuel depuis le milieu du XVIIIe siècle. Seul le pigeonnier, qui date du XIVe siècle, du château féodal, a survécu. Le bâtiment principal a, dans ses grandes lignes, son aspect actuel depuis le milieu du XVIIIe siècle.","habitants":"Lancelot de Bierville.\"","divers":"Château de Bierville à Boissy                    GPS : 48° 22' 41,29\" Nord, 2° 8' 50,97\" E","gps":"48° 22' 41,29\" Nord, 2° 8' 50,97\" E","images":["../image/image_91/91_Bierville_Boissy_1.jpg","../image/image_91/91_Bierville_Boissy_2.jpg"]},"Consult_chateau_formulaire9227":{"id":"Consult_chateau_formulaire9227","dept":"91","canton":"Brétigny-sur-Orge","commune":"Saint Vrain","nom":"Billy_St_Vrain","type":"Château","periode":"XVI-XVII","histoire":"BILLY, il appartenait, en 1304, à Raoul de Saint-Vrain. Le château de Billy  et a appartenu à Jérôme Marchand, secrétaire de Catherine de Médicis, et Henri Saint-Simon, neveu du philosophe Claude Saint-Simon. Philippe le Bel, en 1314, avait mis tous les châteaux implantés, sur la paroisse dEscorchy, sous la suzeraineté directe dHugues de Bouville. Mais, les seigneurs de Billy refusèrent de rendre hommage aux successeurs de Bouville, jusquen 1653. Yvon de Karnazet rachèta, en 1446, le château de Billy, qui, entre temps, avaient de nombreux propriétaires. En 1556, les Karnazet vendirent le château de Billy à Jérôme Marchand, secrétaire de Catherine de Médicis. En 1704, Levasseur, Marquis de Saint-Vrain, racheta le château de Billy, ainsi que le château de Bonnainville qui lui était attaché et le revendit, en 1706. Il garda la seigneurie.","architecture":"BILLY; De nombreux travaux furent réalisés et, en 1780, fut transformé, lui apportant l'aspect de ce qu'il est aujourdhui. Au début du XIXe siècle, la famille Saint-Simon (Henri, neveu de Claude le philosophe socialiste) en devinrent les nouveaux propriétaires. En 1844, les Pérignon  le rachetèrent. Trois générations se succèdèrent. Ils jouèrent un rôle important dans la vie de Saint-Vrain, que ce soit au conseil municipal qu'au sein du bureau daide sociale. Cest la fille de Maurice, Camille, veuve de Baudreuil, qui le gèra jusquen 1938. La grille en fer forgé du château de Saint-Vrain a été créée par les compagnons et date du XIXe siècle. Aujourd'hui,le château de Billy et son domaine sont la propriété de la famille Roncari. C'est un château privé,  le château de La Boissière (visible de la rue et le château de la famille de Mortemart, caché dans son écrin de verdure.","habitants":"famille Saint-Simon\"","divers":"Château de Billy  à St-Vrain                         GPS : 48° 31' 26\" Nord, 2° 19' 18\" Est","gps":"48° 31' 26\" Nord, 2° 19' 18\" Est","images":["../image/image_91/91_Billy_St_Vrain_1.jpg"]},"Consult_chateau_formulaire98d4":{"id":"Consult_chateau_formulaire98d4","dept":"91","canton":"Gif-sur-Yvette","commune":"Bievres","nom":"Bièvres_91_I","type":"Château","periode":"XVII-XVIII","histoire":"Plusieurs châteaux à Bièvres dont celui de Bièvres, la Martinière , Silvy et Pavillon de Victor Hugo voir article.                                                              SILVY   Bâtiment entouré d'un parc régulier (dont il reste des vestiges) qui s'étend en 1740 de la place de la Mairie au 9 rue Léon Mignotte , divisé en deux propriétés entre 1740 et 1765. Fontaine et bassin de la deuxième moitié du XVIIe siècle. Construction de maisons en bordure de la rue à partir de 1760. Château reconstruit en 1773 pour Pierre Silvy, conseiller du roi. Remanié et transformé en mairie après 1901. Une plaque commémorative de la fondation d'une rente faite par Marguerite Legras, veuve de Pierre Silvy, en 1706,  Au 3 rue Léon Mignotte, la maison a été modifiée par l'adjonction de deux avant-corps latéraux après 1809. Le décor intérieur est dû a Auguste Perret pour A. Janet. Au 5 rue Léon Mignotte, le corps principal semble avoir été doublé en Largeur peu après 1809. Une ancienne loggia, dont on aperçoit les balustres correspond a cet élargissement. Cette maison a été habitée par Ernest Laurent entre 1900 et 1929. Il y avait son atelier et y aurait dessiné des cartons destinés à la Manufacture de toiles de Jouy.                                                                                                   BIEVRES château d'origine XIVe siècle. Aurait été remanié au XVIIe siècle. A appartenu à Jean Nicolas Francine de 1689 à 1692. Des communs subsistent les écuries construites au XVIIe siècle. Une aile au sud construite dans la 2e moitié du XVIIIe siècle. Des parties construites au  XIXe siècle. Corps de logis à 2 étages carrés, élévation à travées détruit.","architecture":"La MATINIERE, a été bâti entre 1740 et 1765 alors que Bièvres était sous l'influence du château de Versailles tout proche, pour le nouveau seigneur du lieu, Germain Pichault de la Martinière, chirurgien, conseiller d'État de Louis XV puis Louis XVI. Au XIXe siècle, l'aile ouest fut détruite les façades du corps principal modifiées. En 1890, les communs furent à leur tour modifiés. Sous l'occupation, le château fut réquisitionné, et à la libération, il revint au département de Seine et Oise. Le 19 septembre 1963, le château fut inscrit au titre des monuments historiques. Le château de la Martinière est construit en meulière et calcaire enduit. Un corps principal à deux niveaux, augmenté sur la façade sud d'une avancée coiffée d'un fronton est complété à l'est par une aile carrée, l'aile ouest, symétrique a été détruite au XIXe siècle. Le tout est couvert par un toit à longs pans d'ardoise sur le dernier étage mansardé. Centre social aujourd'hui\nÉléments protégés MH : les façades et les toitures du château : inscription par arrêté du 19 septembre 1963.","habitants":"Famille de  Germain Pichault de la Martinière\"","divers":"Plusieurs châteaux à Bièvres dont celui de Bièvres, la Martinière   grav -1-2-3, Silvy -grav  4  et Pavillon de Victor Hugo grav-8 .    Silvy GPS : 48° 45' 14\" Nord, 2° 12' 54\" Est                                                                                          Bel-Air grav- GPS : 48° 45' 15\" Nord, 2° 12' 54\" Est   Roches grav 5 GPS : 48° 45' 25\" Nord, 2° 12' 02\" Est","gps":"48° 45' 14\" Nord, 2° 12' 54\" Est","images":["../image/image_91/91_Bi%c3%a8vres_91_I_1.jpg","../image/image_91/91_Bi%c3%a8vres_91_I_2.jpg","../image/image_91/91_Bi%c3%a8vres_91_I_3.jpg","../image/image_91/91_Bi%c3%a8vres_91_I_4.html","../image/image_91/91_Bi%c3%a8vres_91_I_5.jpg","../image/image_91/91_Bi%c3%a8vres_91_I_6.jpg","../image/image_91/91_Bi%c3%a8vres_91_I_7.jpg","../image/image_91/91_Bi%c3%a8vres_91_I_8.jpg"]},"Consult_chateau_formulaire7a9f":{"id":"Consult_chateau_formulaire7a9f","dept":"91","canton":"Gif-sur-Yvette","commune":"Bièvres","nom":"Bièvres_91_II","type":"Château","periode":"XVI-XVII-XVIII-XIX","histoire":"Quatre châteaux dans cet article Bel-Air, Vauboyen  et Rochedieu.                                                                                         VAUBOYEN, château de Vauboyen a été construit entre 1809 et 1815 par l'architecte et inspecteur des bâtiments du Louvre Claude-Louis Bernier pour madame de La Celle de Châteaubourg, alors que Bièvres était un rendez-vous d'artistes, notamment grâce au salon littéraire de Victor Hugo tenu au château des Roches voisin. Les communs ont pu être construits en même temps ; poêle en céramique en sous-sol ; lambris sculptés ; motifs peints ; statues (dans des niches) sur le perron ; décor intérieur stuqué. Le château, construit en meulière et enduit sur un plan cruciforme présente un style palladien Empire. Monté sur un sous-sol surélevé, deux niveaux surmontés d'une toiture à quatre pans en ardoise et terminé par une terrasse entouré d'une rambarde en fonte. Les façades nord et sud sont percées de deux fenêtres par niveau. Les façades est et ouest sont complétées par un péristyle, soutenu par trois colonnes toscanes, le premier niveau est complété par une loggia, en trompe-l'il à l'ouest, avec un plafond à caissons et des niches, le tout surmonté d'un fronton triangulaire. Le parc est équipé d'une fabrique en meulière et brique constituée des communs, d'une écurie, d'une vacherie, d'un colombier carré et d'un lavoir. Il est fermé par un portail monumentale avec une grille en fonte et fer forgé encadrée par quatre colonnes de style éclectique égyptien.","architecture":"BEL-AIR  Le toponyme Bel Air correspond, au XVIIIe siècle, à la ferme de Giry (Gisy) apparu après 1809. Le corps principal et une partie des communs et des pavillons d'entrée datent du milieu du XVIIIe siècle. Remanié au XIXe siècle. Construction d'un bâtiment en U et de la chapelle vers 1890. A l'intérieur, décor de céramique, consoles sculptées dans cage d'escalier. En face postérieure, le corps principal du château comporte un avant-corps central en légère saillie, conserve un bel étage décorés de balcons. Le sous-sol, soubassement à refends sous toute la surface du corps principal, comporte une série de caves voûtées transversalement distribuées par un couloir voûté longitudinalement, séminaire des missions étrangères                                                                                                                                   La ROCHEDIEU, mention du hameau des Roches vers 1750. Le château peut remonter à la première moitié du XVIIe siècle. Plan en quadrilatère fermé en 1740. Trois ailes détruites avant 1765  et reconstruites avant 1809. Une aile subsiste qui comportait une tourelle détruite vers 1975, communs et aile sud de la première moitié XIXe siècle.","habitants":"Vauboyen famille Madame de La Celle de Châteaubourg                                                   Roches  la Secte Soka Gakkai\"","divers":"Quatre  châteaux dans cet article  Vauboyen grav 6, et Rochedieu grav -5.     Bel -Air                                                                                                            GPS : 48° 45' 25\" Nord, 2° 12' 02\" Est                                                     Vauboyen  GPS : 48° 45' 41,27\" Nord, 2° 11' 39,18\" Est","gps":"48° 45' 25\" Nord, 2° 12' 02\" Est","images":["../image/image_91/91_Bi%c3%a8vres_91_II_1.jpg","../image/image_91/91_Bi%c3%a8vres_91_II_2.jpg","../image/image_91/91_Bi%c3%a8vres_91_II_3.jpg","../image/image_91/91_Bi%c3%a8vres_91_II_4.jpg","../image/image_91/91_Bi%c3%a8vres_91_II_5.jpg","../image/image_91/91_Bi%c3%a8vres_91_II_6.jpg"]},"Consult_chateau_formulairebb04":{"id":"Consult_chateau_formulairebb04","dept":"91","canton":"Étampes","commune":"Chalo st-Mars","nom":"Boinville","type":"Château","periode":"XVI-XVII","histoire":"BOINVILLE, date du 18 septembre 1515. Le 13 avril 1620, François du Faur rend hommage de la terre et seigneurie de Boinville. Il est dit acquéreur de Suzanne de Lisle, veuve de Pierre Cauchon, prévôt des marchands d'Etampes. Selon dom Basile Fleureau, maître Pierre Mérauit était seigneur de Boinville en 1667. En 1688, Henri des Mazis devient seigneur de Boinville par échange contre Briéres-les-Scellés avec M. d'Oraison, seigneur de Chamarande qui dépendait de la Tour d'Etampes, par l'intermédiaire de la seigneurie de Boinville. Le 13 septembre 1690, dame Elisabeth Le Roux, veuve de feu Messire Henry des Mazis, chevalier, seigneur de Boinville, rend hommage à messieurs du chapitre de église Notre-Dame d'Etampes pour la terre et seigneurie du Grand Boinville. Enfin, le 13 octobre 1693, le partage des biens de feu messire Henry des Mazis, chevalier, seigneur de Boinville et de Saint-Mard et de feu dame Elisabeth Le Roux son épouse, fait état de la maison et lieu seigneurial dudit Boinvlle qui est également appelée  le château. C'est à cette date que'on voit aussi apparaître \"une ferme et mestairie assise audit Boinville appelée le petit Boinville, vers le grand pont, et consistant en un grand corps de logis, chambres à feu, greniers au-dessus, le tout couvert de tuilles, fournil et écurie y attendant, et autres édifices de batiments, grande court, le tout clos et renfermé de murailes, grande porte, une autre porte sur la rivière avec une grange en masure, derrière et a côté dans lequel est bâti la grange des champarts des Célestins. Jusquau 28 juillet 1793 le Grand et le Petit Boinvile appartiennent a la famille des Mazis, dont les hommages sont conservés pour 1711.","architecture":"BIONVILLE, autrefois siège d'une importante seigneurie Boinville était constitué en 1902 d'un petit groupe de bâtiments agricoles. Jusquaux dernières années du XVIIe siècle, on ne possède aucune information sur un éventuel bâtiment situé a Boinville, alors que le premier acte de foy et hommage rendu par Charles de Nasselles, écuyer pour raison du fief terre et seigneurie de Grant Boynville, , toutefois, aucune des déclarations ne nous renseigne sur l'architecture de ces propriétés. C'est seulement lors de la liquidation des biens des émigrés quapparaissent de nouveau quelques éléments plus précis. Le 28 ventôse an II (18 mars 1794), Simon Bourgine, bourgeois à Boinville, est alors propriétaire.  Dès cette époque, le logis parait avoir l'aspect que l'on connait aujourd'hui avec une façade antérieure sans ressaut et deux petits pavillons en légère saillie à l'arrière, Sur l'élévation antérieure les ouvertures sont réparties en cinq travées sur trois niveaux. La travée axiale est marquée au rez-de-chaussée par la porte, précédée d'un perron de quatre marches en grès. L'organisation des percées (trois travées groupées au centre et une travée isolée sur chaque côté) s'explique par la présence de deux pavillons sur la face postérieure. L'élévation postérieure est en tous points comparable à la façade antérieure, avec deux pavillons en légère saillie sur les côtés. Décor simplifié de la porte. Enduit total. Le décor a été refait récemment. Le nombre et la répartition des ouvertures sont les mêmes que sur la face côté cour. Une seule porte dans l'axe. Des pilastres dans l'enduit encadrent la travée centrale et soulignent les angles du corps central comme des ailes. Toit à longs pans et croupes. Une aile plus récente est postérieure. Bâtiment de plan rectangulaire. Face sur cour. Trois ouvertures en travées sur deux niveaux. A gauche, les deux portes sont précédées d'un perron de cinq marches. Face sur jardin trois fenêtres cintrées et une petite fenêtre rectangulaire à mi-hauteur. Toit à longs pans et demi-croupe.","habitants":"la famille des Mazis\"","divers":"Château de Bionville à Chalo  st-Mars","gps":"","images":["../image/image_91/91_Boinville_1.jpg","../image/image_91/91_Boinville_2.jpg","../image/image_91/91_Boinville_3.jpg"]},"Consult_chateau_formulaire84b2":{"id":"Consult_chateau_formulaire84b2","dept":"91","canton":"Les Ulis","commune":"Villejust","nom":"Bois_Courtin","type":"Château","periode":"XV-XVI","histoire":"BOIS-COURTIN, la première mention fait remonter lorigine de cette terre en 1372, où Regnault de Villejust déclare dans ses biens 14 arpents au Bois Courtin. On retrouve également Jean de Montagu en 1398, qui fait de même. Puis Thomas de Balsac dans son aveu des seigneuries de la Roue de Linas et de Villejust cite le \"bois des courtines\" tenant aux fourches patibulaires de Villiers. Le domaine de Bois-Courtin fut vendu en 1820 à Jean Alexandre Pauquet de Villejust, qui acheta cent quatorze hectares de bois percé de quatre route de chasse. À sa mort en 1839, une coupe de bois est effectuée. En 1841 commença l'extraction à ciel ouvert de meulière. En 1932, la famille Ocampo, propriétaire du domaine.","architecture":"BOIS-COURTIN,   c'est à cette époque que fut construit le pavillon au centre du domaine en meulière avec cinq ouvertures par portes doubles sur la façade principale, surélevé d'un toit mansardé couvert d'ardoise et d'une terrasse en zinc. S'ajoutait une ferme, un logement de concierge et remise, puis dans le parc une étable et une basse-cour. En 1932 le  propriétaire du domaine ajouta une tour ronde en façade. Le bâtiment en meulière est constitué d'un corps principal en rez-de-chaussée surélevé par un premier étage et d'un second mansardé. Trois ouverture sont pratiquées sur chaque façade et pour chaque niveau. Sur la façade sud, deux avancées sont construites à chaque extrémité, elles accueillent chacune deux ouvertures. Une tour ronde est enfin ajoutée avec deux ouvertures, surélevées d'un clocheton. L'ensemble est couvert d'ardoise, une toiture terrasse en zinc est implantée au sommet.","habitants":"Jean Alexandre Pauquet de Villejust\"","divers":"Château de Bois Courtin à Villejust            GPS : 48° 41' 19\" Nord, 2° 14' 10\" Est","gps":"48° 41' 19\" Nord, 2° 14' 10\" Est","images":["../image/image_91/91_Bois_Courtin_1.jpg","../image/image_91/91_Bois_Courtin_2.jpg","../image/image_91/91_Bois_Courtin_3.jpg"]},"Consult_chateau_formulaire81d4":{"id":"Consult_chateau_formulaire81d4","dept":"91","canton":"Etampes","commune":"Boissy le sec","nom":"Boissy_le_Sec","type":"Château","periode":"XIV-XIX","histoire":"BOISSY le SEC, appartient a la famille de Paviot jusqu'en 1702. Alors que les historiens s'accordent pour attribuer sa construction à Jean de Paviot et donnent unanimement la date de 1339, il apparaît pour la première fois dans les textes en septembre 1349 : \"aveu et dénombrement donné par sieur Paviot chevalier à la comtesse d'Alençon à cause de sa châtellenie d'Etampes savoir des terres qu'il tenait d'elle entr'autres de son habergement de Boissy et de la haute justice\". En 1400, Pierre de Paviot, échanson du duc d'Orléans et fils aîné de Jean, rend hommage \"de la même terre à Jean duc de Berry, fils du Roy à cause dudict comté d'Etampes\". La succession des seigneurs de Boissy est bien connue grâce à la généalogie de MM. de Paviot, dressée sur les titres qui en restent aujourdhui par Julien Délimoges, notaire royal à Boissy-le-Sec, le 18 janvier 1695 : Jacques, fils de Pierre, chevalier, échanson du roi Charles VI se marie en 1401 ; Loys gouverneur de Pithiviers et Etampes, tué en 1422 dans un combat contre les Anglais ; Pierre II, maître d'hôtel du duc Charles de Berry, frère de Louis XI, gouverneur des places d'Etampes et de Dourdan en 1465 ; Jean II ; Guillaume, né en 1488 ; Jacques II, né en 1525 ; son fils aîné, Pierre III, né en 1559, également gouverneur de Dourdan ; Charles II, né en 1580 est capitaine de la compagnie du duc d'Orléans, son fils Charles III meurt en 1697. C'est la petite-fille de ce dernier, Marie-Denise de Paviot, veuve de François Le Clerc de Fleurigny, remariée a Charles de Cugnac, seigneur d'Imonville qui est l'unique héritière du château au moment de la vente en 1702, les enfants de Charles III ayant tous renoncé a leurs droits entre 1697 et 1699.","architecture":"BOISSY LE SEC, l'acte de la vente par \"Charles de Cugnac, chevalier, seigneur d'Imonville et autres lieux demeurant ordinairement en son chasteau d'Imonville bailliage de Chartres, à Dame Marie-Magdelaine Le Tellier dame de Fresne, veuve de Claude Hemart, concilier du Roy, contrôleur des gage, passé devant Meunier et Huet notaires à Paris, le 13 décembre 1702, nous fournit une première description succincte de l'édifice. La \"terre et seigneurie de Boissy-le-Secq consiste alors en un vieux chasteau composé de corps de logis, court, jardins, basse cours, batiments. Le 2 décembre 1710, Boissy-le-Sec est vendu devant Bailly et son confrère notaires à Orléans à Charles Boyetet de Mérouville et Marie Brachu son épouse. Ceux-ci renoncent à leurs droits sur \"Ledit manoir et batiment de la ferme\" ainsi que leur fils Charles Boromée Boyetet et Marie Francoise Pochon de Beauregard son épouse, au bénéfice de Charles Hector de Boissy, par acte passé devant le lieutenant général au bailliage d'Orléans reçu par Pompon et son confrère notaires à Orléans le 31 mai 1743. C'est en 1791 que le fils aîné de Charles Hector de Boissy, Charles Hector Francois Boyetet de Boissy, \"lieutenant au régiment de l'Orleannois cavalerie, demeurant à Paris, rue du Bouloy\" vend a M. Guillaume Couturier, ancien fermier général et de Marie-Madelaine Couturier, son épouse, demeurant a Paris boulevard de Montmartre, paroisse Saint Bustache : \"premièrement le château de Boissy                          sa construction a débuté au XIVe et s'est achevée au XIXe siècle. C'est un manoir, fut pris par les Anglais, en 1358 et conservé, par eux, comme gage de paiement de la rançon de Jean II, Roi de France, où il fut fait prisonnier lors de la Bataille de Poitiers. Ce n'est que dans la seconde moitié du XVe siècle, que les descendants de Jean Paviot, vont transformer le château de Boissy-le-Sec en une demeure de plaisance, en y apportant un corp de logis principal et de nombreuses fenêtres, dans un style Gothique Flamboyant. Il est classé aux M.H. en 2007.","habitants":"famille de Paviot\"","divers":"Château de  Boissy le Sec                                       GPS : 48° 28' 37,52' Nord, 2° 5' 22,84\" Est","gps":"48° 28' 37,52' Nord, 2° 5' 22,84\" Est","images":["../image/image_91/91_Boissy_le_Sec_1.jpg","../image/image_91/91_Boissy_le_Sec_2.jpg"]},"Consult_chateau_formulairec824":{"id":"Consult_chateau_formulairec824","dept":"91","canton":"Mennecy","commune":"Milly la forêt","nom":"Bonde_Buno","type":"Château","periode":"XV-XIX","histoire":"BONDE, le château de Milly, dont certaines parties datent du XIe siècle et bâti par les premiers barons de Milly d'origine normande, a été reconstruit et agrandi vers 1475 par lamiral de Graville. Le château de la Bonde fut la propriété d'Hugues III de Bouville, de Olivier V de Clisson, de Jean II de Montmorency, de Jean-François de Faudoas d'Averton, de Marc-Antoine Front de Beaupoil de Saint-Aulaire et de Pierre Marie du Lau d'Allemans. Au XIXe siècle, les tours du châtelet furent rehaussées de crénelures en brique et d'une toiture élancée. \nÉléments protégés MH : les façades et les toitures du château, la salle des gardes; le sol de l'ensemble du domaine historique limité par les douves, le sol de l'allée de la Garenne : inscription par arrêté du 16 juillet 1996.","architecture":"BONDE, construit à proximité d'une île artificielle de la rivière l'école, à l'ouest de la collégiale Notre-Dame, son parc est bordé à l'Ouest par le cours de la rivière, qui forme au Nord des douves protégeant le châtelet. Le parc fut recensé en 1991 pour ses clôtures, ses canaux et les allées. Le château de la Bonde est inscrit en partie aux M.H. depuis le 20/12/1972.                             Au delà du pont de pierre qui a remplacé lancien pont-levis, il présente une belle façade avec ses deux tours rondes crénelées. L'ensemble comprend le vieux lavoir de la Bonde remis en état en 1964. Séparé par le pont de la corne, l'abreuvoir à fond pavé dans lequel se mire le château assume un triple rôle : domestique en tant qu'abreuvoir, défensif en tant que douve, et dynamique en tant que retenue d'eau. Jusqu'au XXe siècle, le débit ainsi renforcé, fait tourner en aval une série de moulins sur le cour de la rivière. Éléments protégés MH : les façades et les toitures du château, la salle des gardes; le sol de l'ensemble du domaine historique limité par les douves, le sol de l'allée de la Garenne : inscription par arrêté du 16 juillet 1996.                                                                                                               BUNO à quinze K.M.au sud ouest le château de BUNO à Gironville  hôtel restaurant  de Corinne et Olivier Merciécca.","habitants":"Amiral de Graville.\"","divers":"Deux châteaux ; Bonde et Buno à Milly la Forêt                                                              Bonde grav 1-2-3 GPS : 48° 24' 08\" Nord, 2° 27' 50\" Est                                                           Buno grav 4-5-6  PS : 48° 22' 18\" Nord, 2° 22' 48\" Est","gps":"48° 24' 08\" Nord, 2° 27' 50\" Est","images":["../image/image_91/91_Bonde_Buno_1.jpg","../image/image_91/91_Bonde_Buno_2.jpg","../image/image_91/91_Bonde_Buno_3.jpg","../image/image_91/91_Bonde_Buno_4.jpg","../image/image_91/91_Bonde_Buno_5.jpg","../image/image_91/91_Bonde_Buno_6.jpg"]},"Consult_chateau_formulaired44d":{"id":"Consult_chateau_formulaired44d","dept":"91","canton":"Etampes","commune":"Etampes","nom":"Bourgneuf","type":"Château","periode":"XIV-XVI","histoire":"BOURGNEUF, le fief du Bourgneuf est situé dans la paroisse de Saint-Pierre d'Etampes. Le premier seigneur dont nous trouvions le nom est Claude de l'Isle, écuyer, qui, en 1517, rend foi et hommage à l'évêque de Paris. \"Par acte du 25 août 1530, Claude de l'Isle, écuyer, sieur du Grand Boinville, vend à Frangois Roiger, conseiller du Roi et son procureur général au parlement de Paris, les fief, terre et seigneurie, appartenances et dépendances du Bourgneut. Dans le décret volontaire du 26 août 1530, \"le lieu fief et manoir du Bourgneuf en deux corps de logis sont simplement évoqués, alors qu'une convention passée le 30 janvier 1527 faisait état du \"lieu seigneurial du Bourgneuf assis au bourg Saint-Père d'Estampes, lequel lieu seigneurial  ensemble ses déppendances qui se consiste en un  lieu fief et manoir appellé fief du Bourgneuf auquel y a étables court jardin et appartenances. Le 25 ou 26 février 1580, Georges Rolger, écuyer, cède, par-devant Maître Catherin Poitevin, notaire, la seigneurie du Bourgneuf à noble homme Bénigne Le Ragois, conseiller, notaire et secrétaire du roi. Le domaine du Bourgneuf consiste alors \"en un grand corps de logis muable couvert de tuille,  le tout d'un tenant et clos de murs, un grand jardin assis à  l'opposé dudit lieu;. A cette occasion est également mentionné \"un moulin a blé assis sur la rivière de Juisne, vulgairement appellé le moulin du Bourgneuf.  En 1630, une requête adressée par Bénigne Le Ragois, qui était dit en 1626 seigneur du Bourgneuf conseiller du Roy et receveur général de ses finances à Limoges, au duc de Vendôme indique que le principal manoir du Bourgneuf se trouve enfermé entre deux petites ruelles, fort rapprochées l'une de l'autre.","architecture":"BOURGNEUF,  toutefois, il ne semble guère possible de faire coïncider cette énumération avec un plan du XVIIIe siècle, sur lequel on reconnaît cependant  \"la douve a mettre poissons\" de l'autre côté, c'est surtout la distribution du logis qui pose un problème, dans la mesure où il est très difficile de localiser la \"grande gallerie\" et les \"deux grandes salles\", quant à l'escalier, il en existe deux au XVIIIe siècle, mais il est probable que celui à quatre noyaux, logé dans un pavillon carré dans l'angle à droite, soit le plus ancien. Enfin \"la ventillation de acquisition du Bourgneuf\" suivant acquisition faite par le contrat du 24 mars 1655, non datée, comporte quelques repères chronologiques. Le logis ne parait pas avoir subi de grandes transformations par rapport a l'état de 1655, si ce n'est qu'on mentionne quatre escaliers.  un château couvert d'ardoises, composé d'un vestibule ayant porte d'entrée sur la cour, grand escalier et celui ; à gauche dudit vestibule, un grand salon, au bout duquel est un appartement composé d'une chambre, cabinet de garde-robe, un autre appartement y joignant ; un autre batiment en aile composé de plusieurs chambres basses et chambres hautes ; à droite dudit vestibule, un salon à manger, au bout duquel est un cabinet et une garde-robe, un cabinet servant de bibliothèque, et un batiment en aile, consistant en une cuisine et un grand commun et un office ; au premier étage, un grand corridor communiquant a plusieurs chambres et cabinets, grenier sur le tout ; au sud du batiment, un jardin contenant environ un quartier de terre, et, au nord, la basse cour, consistante en écuries, vacheries et bûchers couverts de tuilles ; auquel lieu était autrefois un petit jardin.","habitants":"Famille de Georges Rolger,\"","divers":"Château de Bourgneuf à Etampes","gps":"","images":["../image/image_91/91_Bourgneuf_1.jpg"]},"Consult_chateau_formulaire2065":{"id":"Consult_chateau_formulaire2065","dept":"91","canton":"Étampes","commune":"Morigny-Champigny","nom":"Brunehaut","type":"Château","periode":"XVI-XIX","histoire":"BRUNEHAUT,  on sait que Girard Dufour \"marchand et bourgeois d'Etampes\" possède Brunehaut dès 1511. Dans le terrier du duché d'Etampes pour 1511-1512, sont citées la \"maison, terres et appartenances de la Tour de Brunehaut\". Versn 1527, la veuve de Girard Dufour détient un \"manoir manable auquel la maison couverte de chaume. avec un autre héritage, le tout assis près  de Saint-Phallier au lieu dit Srunehault\". Enfin, dans une récapitulation de 1527-1578, on apprend qu'à la \"maison appelée la Tour de Brunehault\" s'ajoutent des \"granges, étables, vollière... le tout en un enclos.\" Elle appartient alors à Anthoinette Thibaut. Un aveu du 18 mai 1666 fournit quelques indications supplémentaires : \"le Grand Brunehault scis en la paroisse de St Germain d'Estanpes concistant en une grande porte charretière ouvrant du côté du grand chemin de Paris, allée servant de charrière et entrée par laquelle on entre dans la cour dudit lieu, autre porte charetière. Toute la cour close de murs ou il est un corps de logis ou il y à une allée allant à une petite cour close de murs ou sont une fontaine et lavoir, et chambre, une grande étable joignant ladite allée doublée, grenier au-dessus des chambres et du même côté une grande bergerie le tout couvert de tuile servant de batterie, ouvrant par ladite chambre basse et un grenier au-dessus ouvrant sur le petit clos.","architecture":"BRUNEHAUT, date de 1786 à 1819. Le château a conservé son style néo-classique du début du XIXe siècle.  Brunehaut fut reconstruit de 1870 à 1875. Il appartient au Département. A l'origine du domaine, la Tour de Brunehaut est mentionnée en 1046. Une \" maison \" avec des dépendances est attestée au XVIe siècle et jusqu'en 1666. En 1688, il est fait mention du \" pavillon neuf \" et du \" nouveau jardin \". Les vastes embellissements, furent réalisés, pour Charles de Viart, entre 1786 et 1802 : création du parc orné de fabriques, reconstruction des communs, de la ferme en partie, du moulin. La colonne de la Concorde civile porte la date 1800. Entre 1859 et 1868 furent bâtis : la maison du gardien, un lavoir, le bâtiment du réservoir, une maison pour le jardinier, une orangerie, deux serres, un jardin potager. Entre 1873 et 1874, démolition des communs et adjonctions par l'architecte Charles Lecoeur. Deux tourelles et une travée à l'Est, ont été ajoutées, en 1931. Le Parc du XVIIe siècle a été redessiné, à la fin du XVIIIe au XIXe siècle. Le château de Brunehaut est devenu un Institut d'Action Médico-Pédagogique.","habitants":"Famille d' Anthoinette Thibaut.\"","divers":"a Morigny-Champigny  château de Brunehaut.                                         GPS : 48° 27' 15,6\" Nord, 2° 10' 45,42\" Est","gps":"48° 27' 15,6\" Nord, 2° 10' 45,42\" Est","images":["../image/image_91/91_Brunehaut_1.jpg","../image/image_91/91_Brunehaut_2.jpg"]},"Consult_chateau_formulaire2a8d":{"id":"Consult_chateau_formulaire2a8d","dept":"91","canton":"Palaiseau","commune":"Bruyères- Le Châtel","nom":"Bruyères_Chatel","type":"Château-fort","periode":"XII-XIV","histoire":"BRUYERES LE CHATEL, le plus ancien document mentionnant l'existence du château de Bruyères le Châtel est la charte de l'abbaye de Saint Florent de Saumur de 1070. Il a été construit sur les ruines d'un ancien monastère de religieuses dont ne subsiste que la chapelle Notre Dame au XIe siècle. De cette forteresse, appartenant au système de défense de la région parisienne, élevée sur une éminence naturelle dominant le village, ne reste que très peu de vestiges. De nouvelles fortifications sont édifiées au XIVe, dont subsistent la poterne d'entrée avec les tourelles, les mâchicoulis et les traces de la herse d'un pont levis. Le premier seigneur mentionné est Hugues de Bruyères, début XIIIe. A partir de 1457, le domaine appartient à la famille de la Rochette. En 1676, Louis XIV érige la baronnie de Bruyères en marquisat, en faveur de Louis de l'Espinette Le Mairat qui réaménage le château et le parc,  les fortifications sont rasées en 1793. En 1820, le baron Charlet, secrétaire de la duchesse d'Angoulême, réorganise le domaine. En 1908, M. Lenoir restaure la chapelle et fait élever un péristyle à colonnes devant le corps de logis. La dernière propriétaire, Mme Wallut, lègue le château en 1958 à l'Association pour l'aide aux jeunes garçons infirmes gérée par l'ordre hospitalier des Frères de Saint-Jean de Dieu.","architecture":"BRUYERES  LE CHATEL, le château actuel présente des restes de l'ancienne fortification du XIVe siècle: la poterne d'entrée avec deux tourelles qui portent des traces de la herse du pont-levis. A l'arrière une porte plus simple, percée dans une courtine, reliait une tour ronde à la chapelle seigneuriale. De cette dernière, seul le choeur redécoré en style néo-gothique en 1908, a subsisté. Le corps de logis a profondément été remanié au XVIIe siècle. Les salles et salons du rez-de-chaussée ont conservé les boiseries et meubles de cette époque. En même temps étaient aménagées des terrasses étagées qui descendent vers le parc où a été creusé un plan d'eau : \"le Miroir\".  En 1806, avec les matériaux de l'aile Ouest détruite,  le nouveau propriétaire fait abattre les arbres du parc, les fortifications sont rasées en 1793. Le château (détruit) construit en pierre et constitué à l'origine d'un corps de logis central, à un étage carré et sept travées, à bossages, entouré de deux ailes plus basses, couvertes en terrasses. Le toit à longs, à croupes était couvert d'ardoises. Un perron de cinq marches ouvrait l'avant-corps central sur le parc. La chapelle est de style néo-jésuite, les communs sont en moellons calcaire et couverts de tuile plate. En 1972, la société Vitakraft, devenue propriétaire du château de Morionville le  fait détruire  pour y construire une usine moderne, à la place. Il ne subsiste depuis que les communs, la chapelle du XVIIIe siècle et la grille d'entrée. C'est une propriété privée.","habitants":"famille de la Rochette\"","divers":"Château de Bruyères- Le Châtel                                                                 GPS : 48° 35' 43\" Nord, 2° 11' 35\" Est  GPS : 48° 35' 37\" Nord, 2° 11' 33\" Est","gps":"48° 35' 43\" Nord, 2° 11' 35\" Est  GPS : 48° 35' 37\" Nord, 2°","images":["../image/image_91/91_Bruy%c3%a8res_Chatel_1.jpg","../image/image_91/91_Bruy%c3%a8res_Chatel_2.jpg"]},"Consult_chateau_formulaire7a32":{"id":"Consult_chateau_formulaire7a32","dept":"91","canton":"Yerres","commune":"Yerres","nom":"Budé_Grange","type":"Château","periode":"XV","histoire":"Deux châteaux dans cet article Bude et la Grange du (maréchal de Saxe)                                                                                                                              BUDE, le château seigneurial avait été construit par la famille Budé dans les premières années du XVe siècle. Les Budé, notaires et secrétaires du Roi avaient été seigneurs d'Yerres pendant deux siècles. Le plus célèbre d'entre eux, l'érudit hélleniste Guillaume Budé ne fut pas seigneur d'Yerres, sa mémoire fut honorée par la construction de \"la fontaine Budé\" dans une propriété mitoyenne. Ce château fut la propriété de la famille Hamelin du début du XIXe siècle jusqu'au décès de Michèle Hamelin en août 2000.\nÉléments protégés MH : le château en totalité, selon l'extension déterminée par les vestiges de son enceinte : inscription par arrêté du 20 décembre 2013.","architecture":"La GRANGE, messieurs les Anglais tirez les premiers, ainsi se comportait le maréchal de Saxe sur le champ de bataille de Fontenoy en 1745, et vainquit l'ennemi de toujours. Louis XV, reconnaissant, lui donna Chambord et quelques privilèges, après l'avoir nommé maréchal de France. Il s'offrit donc le château de la Grange qui porte aujourd'hui son nom. Son passage en ces lieux nous vaut les beaux décors de la grande galerie. Chevalier stucateur du Roi, réalisa les trophées de batailles et de chasses sur les dessins de La Touche. Il commande des travaux gigantesques visant à remodeler château et jardins. Son gaillard portrait règne en pied dans le grand salon blanc et or, réalisé par le célèbre architecte Oppenord. On lui prête d'autres brillantes conquêtes, la Princesse Ivanovna, Duchesse de Courlande, offre sa mémoire au plus bel appartement.Son propriétaire initial était Charles Duret qui en fit sa résidence principale. En 2000, le château de la Grange est racheté par le Groupe Savry qui y installa un hôtel de prestige, appelé de « château du maréchal de Saxe ». \nÉléments protégés MH : les façades et les toitures du château sauf les ailes basses, les façades et les toitures des communs, les pièces suivantes du château avec leur décor : la grande galerie, la salle à manger et le salon dit salon doré au rez-de-chaussée, l'escalier, la chambre Louis XIII au premier étage, la cour d'honneur et les douves, l'avant-cour avec sa grille et ses deux pavillons d'entrée, le parc sauf la ferme : classement par arrêté du 8 avril 1971.","habitants":"famille Budé   et famille Hamelin \"","divers":"deux châteaux à Yerres dans cet article, Bude grav-2-3,et la Grange gra-1.                                                    Budé GPS : 48° 42' 56,92\" Nord, 2° 29' 26,09\" Est                                                     Grange-  GPS : 48° 43' 44\" Nord, 2° 29' 42\" Est","gps":"48° 42' 56,92\" Nord, 2° 29' 26,09\" Est","images":["../image/image_91/91_Bud%c3%a9_Grange_1.jpg","../image/image_91/91_Bud%c3%a9_Grange_2.jpg","../image/image_91/91_Bud%c3%a9_Grange_3.jpg"]},"Consult_chateau_formulaire8387":{"id":"Consult_chateau_formulaire8387","dept":"91","canton":"Étampes","commune":"Chalo-st-Mars","nom":"Carneaux","type":"Chateaux","periode":"XVI-XVII","histoire":"CARNEAUX, jadis fief important dans la paroisse, aujourd'hui simple habitation de fermier, le domaine des Carneaux semble attesté depuis 1572, année où Jean Morin, écuyer, est désigné comme seigneur des Carneaux. Par sa fille Antoinette, le fief entre au début du XVIIe siècle dans la famille de la Tranchée, qui le conserve jusquen 1668 ou 1674. Jusquen 1722 , la terre des carneaux fait l'objet à trois reprises dadjudications par sentence du châtelet ou arrêt du Parlement. La première description sommaire figure dans un titre de rente du 11 novembre 1740 : \"ledit lieu seigneurial des carneaux assis près le bourg dudit Chalo Saint Mars qui se consiste en un grand corps de logis, ou il y a chambres basses et chambres hautes, grenier dessus cave dessous, grange, étables et autres aisances, colombier, le tout couvert de tuile, cour devant avec trois arpens de pré aussi devant. Il appartient alors et jusquen 1858 a la famille de Prunelé qui possède également le château du Grand Saint-Mars. Le Moulin des Carneaux est mentionné pour la première fois au début du XVIIe siècle, a l'occasion de la succession de feu Jacques de l'Isle, écuyer, seigneur de Lonquetoise. En 1643, le \"grand moulin de Challou-Saint-Mard dit des carneaux\" . Description de 1740 . Aucune précision supplémentaire n'est fournie par des descriptions plus récentes.","architecture":"CARNEAUX  L'ancien moulin qui apparaît encore n'a toujours pas été démoli en 1831, mais n'existe plus actuellement. La ferme et le moulin des Carneaux ainsi que le château du Grand-Saint-Mars furent vendus le 7 décembre 1858 à M. et Mme Marcellin Masse de Combles. un plan de la seconde moitié du XVIIIe siècle représente la situation respective du manoir et du moulin avant le transfert de ce dernier. En effet, le 24 janaies 1803, \"le citoyen Prunelé, propriétaire de la terre des Cornaux adresse au maire de Chalo-Saint-Mars la pétition suivante \"étant dans l'intention de transporter le tournant de mon moulin des carnaut, dans les bâtiments de la ferme du même nom, de l'autre côte du chemin tendant du bourg de Chalo Saint Mars à Gueurville, il sera nécessaire de changer près des nouvelles constructions, le canal de la rivière qui se trouvera traversé deux fois le chemin en question et en changer un peu la direction conformément au plan annexé dudit registre et qui sera ci-après tracé afin que le public ne souffre pas de ce changement. En conséquence il est davis qu'il y a lieu d'autoriser le dit Prunelé à faire construire les deux ponts et le nouveau chemin indiqué au dit plan, à la charge par lui d'entretenir à perpétuité les dits ponts et chemin de la manière indiquée en la dite pétition après quoi la séance a été levée.","habitants":"famille de la Tranchée  et à la  famille de Prunelé\"","divers":"A Chalo-st-Mars châteaux de Carneaux","gps":"","images":["../image/image_91/91_Carneaux_1.jpg"]},"Consult_chateau_formulairec6bf":{"id":"Consult_chateau_formulairec6bf","dept":"91","canton":"Les Ulis","commune":"Marcoussis","nom":"Celestins_Marcoussis","type":"Chateaux","periode":"XVIII-XIX","histoire":"Trois châteaux dans cet article; Celestins, Bel-Ebat et Chêne-Rond.                                         CELESTINS la construction date du 4ème quart du XVIII siècle et du 3ème quart du XIXe siècle, devenu depuis un centre culturel, a été reconstruit, en 1859, sur lemplacement dun ancien couvent qui datait du XVe siècle. Il a été inventorié au Patrimoine. Le Château des Célestins occupe l'emplacement d'un ancien monastère, que Jean de Montagu, surintendant des finances de Charles VI, avait fondé en 1404, dans le voisinage de son château. Placé sous l'invocation de la Sainte-Trinité et achevé en 1408, ce couvent fut occupé par des moines célestins. Incendiés en 1562, durant les guerres de religion, vendus comme bien national et démolis à la Révolution, les bâtiments furent acquis, sous l'Empire, par le marquis de Salperwick qui acheva leur destruction et ne conserva, pour son habitation, que le corps du logis formant le côté oriental du cloître. En 1859 François Claude Latour, architecte parisien et nouvel acquéreur du domaine, entreprit la construction du château actuel. De l'ancien couvent, ne subsistent plus que ses 2 caves en enfilade voûtées en berceau, situées perpendiculairement à l'extrémité méridionale du château, et une partie du portail d'entrée. Les bâtiments situés à côté de l'entrée dateraient de la fin du XVIIIe siècle. L'Orangerie du Célestins a été construite vers 1950. Depuis 1974, le château des Célestins est devenu la propriété de Marcoussis qui y a installé ses Services Municipaux.","architecture":"BEL-EBAT, château de Bel-Ébat date de la seconde moitié du XIXe siècle. Au XVIIe siècle, était une ferme près de laquelle fut élevée ensuite une habitation de maître, montrent un grand corps de logis avec 2 ailes en retour. Il convient à tous types de réceptions privées. La maison reconstruite au XIXe siècle se compose d'un seul corps de bâtiment sur un plan carré. Le chateau possède trois étages carrés. La façade sur le parc est flanquée de deux tourelles couvertes d'une flèche polygonale. La ferme est présente sur le cadastre napoléonien. Le château de Bel-Ebat est devenu une résidence privée.                                                                                                                               CHENE-ROND, date de 1880. L'architete était Mr Vigoureux. Le domaine du Chêne Rond remonterait aux premières années du XVIe siècle, mais le plus ancien acte le concernant date de 1586. Il comprenait à l'origine une ferme avec maison de maître ; il relevait directement de la tour de Montlhéry. L'édifice actuel fut construit en 1880 par l'architecte Vigoureux. En 1945, à l'instigation d'Yves Rocard, il fut acheté par le ministère de la défense, qui y installa des laboratoires de recherche en électronique pour le guidage des missiles fabriqués à la fonderie de la marine à Ruelle-sur-Touvre (Charente) ; entre 1946 et 1958 fonctionnèrent à côté deux antennes de radars allemands de type Wurzbourg ramenées d'Allemagne, servant à capter les signaux solaires. Depuis 1963, le bâtiment sert de logement pour les anciens techniciens du ministère de la Défense (Marine).","habitants":"Famille de marquis de Salperwick\"","divers":"Trois châteaux dans cet article; Celestins, grav-1 Bel-ébat et Chêne-Rond.   GPS : 48° 38' 33\" Nord, 2° 13' 50\" Est                                                                                              Bel-Ebat grav-1-2   GPS : 48° 38' 33\" Nord, 2° 13' 50\" Est                                                     Chéne rond  grav 4-5 GPS : 48° 38' 33\" Nord, 2° 13' 50\" Est","gps":"48° 38' 33\" Nord, 2° 13' 50\" Est","images":["../image/image_91/91_Celestins_Marcoussis_1.jpg","../image/image_91/91_Celestins_Marcoussis_2.jpg","../image/image_91/91_Celestins_Marcoussis_3.jpg","../image/image_91/91_Celestins_Marcoussis_4.jpg","../image/image_91/91_Celestins_Marcoussis_5.jpg"]},"Consult_chateau_formulaire8e4a":{"id":"Consult_chateau_formulaire8e4a","dept":"91","canton":"Dourdan","commune":"Chamarande","nom":"Chamarande_91","type":"Château","periode":"XV-XVII","histoire":"CHAMARANDE  ne fut jamais fortifié, est  construit au XVIe siècle, probablement pour François Hurault, prévôt des marchands de Paris et ami personnel du roi Henri IV, qui acquiert en 1563 les deux seigneuries, constituant l'actuel domaine et y établit sa résidence. Après le décès de François Hurault en 1613, l'édifice passe à son fils Jean, qui agrandit le domaine. Mais le bâtiment souffre durant la Fronde, en mauvais état, il est vendu en 1654 à Pierre Mérault ancien fermier des gabelles, anobli par l'acquisition d'une charge d'écuyer et secrétaire du roi Louis XIV. C'est lui qui fait édifier le château actuel, attribué tardivement à François Mansart, sans qu'aucun document ne vienne corroborer cette conjoncture, il est plus communément attribué à Nicolas de L'Espine.  Le quadrilatère entouré de douves comprend alors le logis flanqué latéralement par les communs. L'entrée de la cour d'honneur est cantonnée de deux pavillons, celui de gauche abritant la chapelle, le domaine est orné de canaux, bassins et fontaines. André Le Nôtre intervient dans le parc sans que la date soit connue avec certitude. Endetté, Pierre Mérault vend le domaine en 1684 à Clair Gilbert d'Ornaison, dit Chamarande, 1er valet de chambre de Louis XIV. C'est pour lui qu'en 1685, des lettres patentes de Louis XIV, érigent Bonnes en comté de Chamarande. À sa mort en 1737, le château passe par héritage à son cousin germain, Louis de Talaru, marquis de Chalmazel, maître d'hôtel de la reine Marie Leszczynska. Il fait appel à l'architecte Pierre Contant d'Ivry. les communs abritent depuis 1999 le dépôt principal des archives départementales de l'Essonne","architecture":"CHAMARANDE, dans les années 1780, une pièce d'eau est créée, avec en son centre une île bordée de cyprès de Louisiane : la tradition l'attribue au peintre paysagiste Hubert Robert. Après la Révolution, Louis Justin, marquis de Talaru, qui recouvre le domaine sous le Consulat, le fait remettre en état et fait redessiner le parc à l'anglaise. Maire de Chamarande, il réside au château jusqu'à sa mort en 1850. En 1852, le domaine est vendu à Pierre et René Robineau. Le domaine devient, en 1857, la propriété de Victor Fialin, comte puis duc de Persigny, ministre de l'Intérieur de Napoléon III. Il crée une galerie au rez-de-chaussée, qu'il meuble avec luxe, bâtit le mur d'enceinte, achève la transformation du parc à l'anglaise. De nouvelles dépendances sont édifiées. Près de la nouvelle grille d'honneur est placé un obélisque. Le duc meurt en 1872. En 1876, Chamarande est acquis par Aristide Boucicaut fondateur du bon Marché, qui fait aménager une salle à manger dans le goût Renaissance. Il meurt en 1877, sa veuve épouse en secondes noces, en 1881, le Dr Laurent Amodru, maire de Chamarande jusqu'en 1922 et député de Seine et Oise. Après 1913, la cascade est ornée de copies des statues des fleuves de Versailles. De 1923 à 1951, le château est un haut lieu de formation du Scoutisme en France.  En 1957, le dernier propriétaire privé est Auguste Mione, président de \"la Construction moderne française\" avant le rachat du domaine, en 1978, par le conseil général de l'Essonne.","habitants":"Famille de François Hurault \"","divers":"Château de Chamarande              GPS : 48° 30' 46,01\" Nord, 2° 13' 14,99\" Est","gps":"48° 30' 46,01\" Nord, 2° 13' 14,99\" Est","images":["../image/image_91/91_Chamarande_91_1.jpg","../image/image_91/91_Chamarande_91_2.jpg","../image/image_91/91_Chamarande_91_3.jpg","../image/image_91/91_Chamarande_91_4.jpg","../image/image_91/91_Chamarande_91_5.jpg","../image/image_91/91_Chamarande_91_6.jpg"]},"Consult_chateau_formulaire4f7e":{"id":"Consult_chateau_formulaire4f7e","dept":"91","canton":"Draveil","commune":"Draveil","nom":"Champrosay","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article Champrosay et Villiers. CHAMPROSAY  Le domaine dépendait au XVIIe siècle de la seigneurie de Soisy-sur-Seine : le terrier de 1644 mentionne une maison en forme de pavillon couverte d'ardoise appelée le Pont-Chardon. Le château a été reconstruit dans la deuxième moitié du XVIIIe siècle. Précédé d'une cour ouvrant sur la Grande-rue de Champrosay, il était entouré d'un grand clos fermé de murs. Au début du XIXe siècle ses terres s'étendaient jusqu'à la Seine (27 ha environ, dont 7 plantés de vignes). Une description de ce domaine est donnée en 1812 dans le procès-verbal de la vente à l'audience des saisie immobilières du tribunal de Corbeil, en faveur de Pierre d'Aubusson, marquis de La Feuillade. Le château a été restauré en 1987 et divisé en appartements. La même année, le domaine du Bois-Chardon a été acquis par l'Agence des espaces verts de la région Ile-de-France.   En 1812, le château consiste en un corps de logis entre cour et jardin, couvert en ardoises et tuiles. La cour, avec entrée sur la route par une grille de fer, est limitée au fond et à gauche par des bâtiments servant de logement au jardinier ; elle communique par un grand passage à la basse-cour située derrière ce logement, contenant diverses dépendances agricoles, à l'arrière desquelles figure un grand clos de 12 ha environ entouré de murs. Dans les potagers se trouvent deux pavillons, couverts l'un d'ardoises et l'autre de chaume.","architecture":"CHAMPROSAY, en 1849 ce terrain est prolongé par une pièce de terre et pré dans laquelle coule une source appelée fontaine du Trésor, qui alimente un lavoir enclos d'un mur. D'autres pièces de terres et de vignes complètent l'ensemble, ainsi qu'une allée de tilleuls accotant le château. Le château est couvert d'un toit à longs pans brisés ; un escalier en fer à cheval donne accès au rez-de-chaussée sur la façade principale. Une chapelle a été aménagée au XIXe siècle dans une partie des communs couverts de toits à longs pans.                                                                                                               VILLIERS, à Draveil le fief de Villiers, qui appartient à l'abbaye de Saint-Victor de Paris depuis le milieu du XIIe siècle, relève ensuite du fief de Marcenoux jusqu'en 1732, date du rattachement de celui-ci au parc du château seigneurial de Draveil après son acquisition par le fermier général Marin de La Haye. En 1782 un château est élevé sur l'emplacement d'un édifice plus ancien détruit par un incendie. De la première demeure subsistent deux pavillons d'entrée, d'époque Henri IV, mais remaniés au XVIIIe siècle lors de la construction du corps principal. Les ailes latérales plus basses qui relient le corps principal à ces pavillons ont été
