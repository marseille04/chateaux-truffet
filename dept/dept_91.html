 rajoutées vers 1789. L'allée des Tilleuls qui conduit au château a été plantée sous le règne de Louis XIV. Le parc, qui compte six hectares au XVIIIe siècle, est réaménagé \"à l'anglaise\" au début du XIXe siècle par le botaniste André Thouin qui créée une grande prairie bordée d'un front boisé, puis réaménagé en 1900 par Edouard André. Le domaine devient en 1954 la propriété de la société centrale immobilière de la caisse des dépôts et consignations qui y établit un ensemble de 700 logements répartis entre des pavillons de 2 ou 4 logements et des immeubles de 2 et 3 étages. En 1987 il est racheté par la commune.","habitants":"Famille de Pierre d'Aubusson                                Villiers général Marin de La Haye\"","divers":"Deux châteaux dans cet article Champrosay et Villiers","gps":"","images":["../image/image_91/91_Champrosay_1.jpg","../image/image_91/91_Champrosay_2.jpg","../image/image_91/91_Champrosay_3.jpg","../image/image_91/91_Champrosay_4.jpg"]},"Consult_chateau_formulaire5f43":{"id":"Consult_chateau_formulaire5f43","dept":"91","canton":"Arpajon","commune":"St Germain lès Arpajon","nom":"Chanteloup_91","type":"Château","periode":"XIII-XVIII","histoire":"CHANTELOUP   est au XIIIe siècle une maison de campagne de Philippe le Bel. Son épouse, Jeanne de Navarre, fonde sur la terre de Chanteloup, une chapelle et une maladrerie. Pendant la guerre de cent Ans, Edouard III d'Angleterre et son fils, le Prince Noir, détruisent la région. Charles V en fut propriétaire ainsi que Jean, duc de Berry. En 1518, François 1er l'échange contre la maison des Tuileries, propriété de Nicolas de Neuville. En 1504, il passe aux soeurs hospitalières. Au XVIIIe siècle, il appartient au marquis de Maulévrier. A la Révolution, il est la possession de Jacques-François Mallet, président de la chambre des comptes, il fait réaliser d'importants travaux et donne au corps de logis son aspect actuel. En 1792, Antoine Denis Chabanel agrandit le parc et rase le couvent de Saint-Eutrope dont il ne reste que le colombier. Au début du XIXe siècle, Roettiers de Montaleau, futur maire de Saint-Germain, modifie l'édifice, il supprime les ailes déjà raccourcies par le précédent propriétaire et fait construire les tours d'angle,  en 1949 date du décès  de la dernière descendante la baronne de Montfort qui se défait en 1958 au profit de la maison d'éditions religieuses, et ensuite à une socité civile  immobilière, en 2001 Chanteloup est en vente.","architecture":"CHANTELOUP, grand corps de logis central de 13 travées sur deux étages carrés ; les trois travées travées centrales sont surmontées d'une lucarne triple fermée par un fronton. L'ensemble date de la seconde moitié du XVIIIe siècle. Deux tourelles d'angle ont été rajoutées au début du XIXe siècle. Murs en meulière et brique recouverts d'un enduit façon pierre au pourtour des fenêtres et des portes. Toiture en zinc. A l'intérieur, le vestibule d'entrée conserve des boiseries et un escalier en fonte du XIXe siècle. Le colombier de Saint-Eutrope a perdu récemment sa toiture mais conserve ses boulins en argile et de beaux encadrement de portes en grès.","habitants":"le Prince Noir\"","divers":"a St Germain lès Arpajon château de Chanteloup                                                   GPS : 48° 35' 41\" Nord, 2° 15' 21\" Est","gps":"48° 35' 41\" Nord, 2° 15' 21\" Est","images":["../image/image_91/91_Chanteloup_91_1.jpg","../image/image_91/91_Chanteloup_91_2.jpg"]},"Consult_chateau_formulaire2a83":{"id":"Consult_chateau_formulaire2a83","dept":"91","canton":"Arpajon","commune":"Cheptainville","nom":"Cheptainville","type":"Château","periode":"XVIII-XIX","histoire":"trois châteaux dans cet article; Cheptainville, Euclides et Courbettes CHEPTAINVILLE, le village de Cheptainville est situé sur le plateau de la Beauce, entre la vallée de l'Orge et celle de l'Essonne.  Nous n'avons que peu de sources concernant son histoire. Nous savons cependant que la terre de Cheptainville était dans la mouvance de la châtellenie de Montlhéry et nous connaissons quelques-uns de ses seigneurs du XIIIe siècle. Au XVe siècle, elle passe dans la maison de Villers, au XVIIIe siècle, elle appartient à Frangois-Daniel Voisin, chancelier de France, seigneur du Mesnil-Voisin.                                   EUCLIDES à Boissy-sous st-Yon,à Six K.M.à l'ouest le manoir des COURBETTES, construit sur l'ancien fief de la Motte, daté du XVIIe siècle. Il a été renommé \"Le manoir de la Courbette\" et est au centre d'un domaine qui abrite aujourd'hui un centre équestre et deux courts de tennis ; le Manoir a toujours été exploité par les propriétaires ou un membre de la famille; les salles du rez-de-chaussée sont aujourd'hui louées pour des réceptions, sous l'enseigne « Le Domaine d'Euclide ». Il a le Label gîte de France: 3 épis. Vous y trouverez des chambres d'hôtes au 1er etage, pour 15 personnes. Dune superficie allant de 18 à 43 m2, de 1 à 5 personnes par chambre, elles portent toutes le nom dun cheval de fiction, appartenant au patrimoine littéraire, dans chacune vous trouverez une ambiance en rapport avec l'oeuvre à laquelle ce cheval appartient.","architecture":"CHEPTAINVILLE,  a été construit à la fin du XVIIIe siècle ou au début du XIXe siècle. L'aile en retour gauche a été rajoutée en 1890. Il est aujourd'hui divisé en appartements. Il se compose d'un corps principal dont la travée centrale est surmontée d'un fronton, accosté de deus ailes plus basses en équerre. Les toits à longs pans sont couverts de tuiles plates et des lucarnes éclairent l'étage de comble. L'aile gauche édifiée en 1890, est plus élevée que l'aile droite et s'agrémente de lucarnes passantes. Sur les deux côtés de la cour, les anciens bâtiments des communs se terminent par des pavillons carrés. La grille d'entrée est du XVIIIe siècle, le tracé des douves est toujours visible. L'allée d'arbres qui menait au château a été séparée du bâtiment par le passage de la route.","habitants":"Famille de Frangois-Daniel Voisin, \"","divers":"trois châteaux dans cet article; Cheptainville, Euclides et Courbettes                                                                GPS : 48° 33' 10\" Nord, 2° 15' 57\" Est                                                                       Courbettes  GPS : 48° 33' 31\" Nord, 2° 12' 31\" Est","gps":"48° 33' 10\" Nord, 2° 15' 57\" Est","images":["../image/image_91/91_Cheptainville_1.jpg"]},"Consult_chateau_formulaireb9d5":{"id":"Consult_chateau_formulaireb9d5","dept":"91","canton":"Massy","commune":"Chilly-Mazarin","nom":"Chilly_Mazarin","type":"Château","periode":"XIII-XVII","histoire":"Deux châteaux dans cet article; Chilly-Mazarin et Bel-Abord.   CHILLY-MAZARIN, un premier château fut construit par les comtes de Dreux au XIIIe siècle. Au XVIIe siècle, Antoine Coëffier de Ruzé d'Effiat, seigneur du lieu réaménagea l'ensemble entre 1627 et 1632 par Métezeau et dota le château d'un jardin à la française avec un canal des douves et des pièces d'eau. En 1804, Louise d'Aumont vendit le château à l'homme d'affaires Louis Joseph Lecocq qui en fit détruire deux ailes. En 1822, il revendit le domaine en deux lots distincts. Le bâtiment principal fut acheté par Louis Isidore Jardin qui rasa le tout pour reconstruire une demeure bourgeoise de style néoclassique, puis il fut remanié en 1903.                 BEL-ABORD,  le château fut édifié à partir du XVIIe siècle, sous le nom de Château de Godefroy. Il est de style Louis XIII. Robert Godefroy, conseiller du roi, acquit le terrain où fut édifié le château, auprès du Maréchal dEffiat, en 1630. Ces terres furent ensuite désignées sous le nom de « fief de Godefroy ». Ce serait Louise-Jeanne de Durfort de Duras qui fit ériger le Château de Bel-Abord en ce siècle, pour lusage de labbé de la Fortelle. La propriété, qui était de 2 arpents en 1630, atteignit 9 arpents en 1751 puis, de 18 arpents en 1776. Il prit son nom actuel au XVIIIe siècle. Cette demeure fut détruite en 1963 par le promoteur de lactuelle résidence, lentreprise Cerioz.","architecture":"BEL-ABORD, il ne subsiste, aujourdhui, quune porte cochère donnant sur la rue, le mur d'enceinte sur 3 côtés et le pavillon Louis XIII, dont le plafond est attribué à Simon Vouet, peintre, ayant participé à la décoration du château de Versailles. Jean Joseph Ollivier-Beauregard, ancien Maire de Chilly-Mazarin, acquit le domaine à la fin du XIXe siècle et constitua un mobilier opulent, selon les sources, digne dun Musée. Le Château de Bel-Abord n'est pas inscrit ni classé aux M.H.                                       CHILY-MAZARIN En 1971, l'ensemble fut racheté par la municipalité pour y installer l'hôtel de ville. Le château actuel est construit sur un terre-plein engazonné encadré par des douves en eau franchies par un pont à trois arches supportant un portail monumental. Le côté nord de la cour est fermée par les communs composé de deux pavillons carrés à deux étages surmontés d'un toit en ardoise à quatre pans, reliés par un immeuble à toit mansardé. Le bâtiment principal est construit en pierre de taille, un corps principal est encadré par deux pavillons symétriques en retrait de la façade, le tout est élevé sur quatre niveaux, le dernier mansardé. Trois baies sont percées à chaque niveau du corps principal et une sur chaque collatéraux, deux ils-de-buf surplombent les fenêtres latérales au niveau de la toiture faite d'ardoise et de zinc à quatre pans. Le parc du château est encore aujourd'hui composé d'un canal au sud et décoré d'une folie servant de regard pour l'aqueduc amenant les eaux des pièces d'eau.","habitants":"Chily   Famille d'Antoine Coëffier de Ruzé d'Effiat  et  Louis Joseph Lecocq                                Bel-Abord, Robert Godefroy\"","divers":"Chili-Mazarin grav-2-3                               Bel Abord  grav-1  GPS : 48° 42' 18,86\" Nord, 2° 18' 54,4\" Est","gps":"48° 42' 18,86\" Nord, 2° 18' 54,4\" Est","images":["../image/image_91/91_Chilly_Mazarin_1.jpg","../image/image_91/91_Chilly_Mazarin_2.jpg","../image/image_91/91_Chilly_Mazarin_3.jpg"]},"Consult_chateau_formulaire2360":{"id":"Consult_chateau_formulaire2360","dept":"91","canton":"Palaiseau","commune":"Orsay","nom":"Corbeville","type":"Château","periode":"XVI","histoire":"CORBEVILLE,   propriété de messire Isaac Arnauld, au conseil d'État et privé du roi Henri IV, intendant des Finances, et de Marie Perrin son épouse, le château de Corbeville semble avoir été construit vers 1520 par une aïeule de Marie Perrin d'après l'inscription gravée sur une pierre apposée sur l'un des murs. À cette époque, le château n'était composé que d'un pavillon qui fut doublé vers 1590 par Isaac Arnauld, chaque moitié étant surmontée d'une toiture séparée comme celle de deux maisons jumelles. Après l'avoir sollicitée, le propriétaire recevait le 31 mars 1605 du seigneur d'Orsay l'autorisation d'édifier quatre tourelles pour augmenter son logis, avoir des cabinets et garde-robes et pour la sûreté vis-à-vis des bois taillis qui l'entourent en ce lieu écarté. Son fils, également prénommé Isaac, conserva la propriété quelques années. En décembre 1631, le domaine était acheté par Pierre Mérault, écuyer et secrétaire du roi. Il mourut sans descendance en 1668 et Corbeville passa en 1675 à l'un de ses neveux, Abel de Sainte-Marthe. Vers 1660, la double toiture à égout central fut supprimée, et remplacée par le toit unique. Puis, en 1682, fut accordée une permission royale dirriguer les jardins par les eaux de la rigole longeant la bordure nord du domaine. Celle-ci drainait les eaux du plateau de Saclay. Ainsi, à la fin du XVIIe siècle, le domaine de Corbeville et son château avaient  acquis leur aspect général actuel. Après plusieurs changements de propriétaires, le domaine fut acquis en 1770 par le baron et la baronne de Schomberg, qui s'y installèrent jusqu'à la Révolution. Jean Ferdinand César, baron de Schomberg, originaire d'une très noble famille allemande de Saxe.","architecture":"CORBEVILLE, fut placé sous séquestre. Mis aux enchères, il fut adjugé en janvier 1794 au citoyen Milon, tanneur à Saint-Germain-en-Laye. Après la Révolution, les propriétaires se succédèrent. Le domaine fut acheté en 1816 par M. Jean-François Henri Destors. Il revenait en 1843 à sa fille Hélène qui avait épousé M. Alexis Vavin, notaire qui deviendra député de Paris en 1839. Corbeville allait rester propriété de cette famille jusqu'à la fin du siècle : Madame Alexis Vavin y vécut jusqu'à sa mort en octobre 1897. M. Vavin, dès 1823, se chargeait de l'entretien de la propriété. Corbeville au cours de ces années, vit passer des visiteurs illustres amis de la famille Vavin : Hippolyte Taine, Sully-Prudhomme, Lamartine. Une des uvres de Louis Clément Faller représente la châtaigneraie. En 1899, le domaine qui avait été mis en vente par adjudication était racheté par M. Léopold Appert, commissaire-priseur, puis M. René Appert, antiquaire, en héritait en 1923. En évoquant cette période, on doit mentionner la grande comédienne et femme de Lettres Madame Simone, et sans doute en qualité de locataire, elle emménagea au château en 1932 avec son époux, le poète et auteur dramatique François Porché. Ils y demeurèrent jusqu'en mai 1940, et M. Appert, lorsqu'il séjournait à Corbeville, occupait le pavillon attenant à la ferme. Durant la seconde guerre mondiale, comme beaucoup de belles demeures, il n'a pas échappé au pillage : meubles, tableaux et autres objets ont disparu. En 1946, le domaine fut vendu par M. Appert à une société civile dénommée Ferme de Corbeville qui appartenait à la Compagnie des compteurs. Vers 1955, la compagnie générale de Télégraphie sans fil rachetait le domaine de Corbeville.","habitants":"Famille du baron de  Schomberg\"","divers":"A Orsay château de Corbeville grav -1-2                                                                GPS : 48° 42' 45\" Nord, 2° 11' 15\" Est                                                                Grand -Mesnil grav-3","gps":"48° 42' 45\" Nord, 2° 11' 15\" Est","images":["../image/image_91/91_Corbeville_1.jpg","../image/image_91/91_Corbeville_2.jpg","../image/image_91/91_Corbeville_3.jpg"]},"Consult_chateau_formulairebc84":{"id":"Consult_chateau_formulairebc84","dept":"91","canton":"Mennecy","commune":"Courances","nom":"Courances","type":"Château","periode":"XVII","histoire":"COURANCES,   En 1552, Côme Clausse, notaire et secrétaire du Roi, acquiert de la famille Lapite un logis seigneurial situé à Courances à l'ouest de la forêt de Fontainebleau. A sa mort, en 1558, la terre est attribuée à son fils cadet Pierre, secrétaire de la chambre des comptes, puis à son petit-fils François, qui la cède en 1622 à Claude Gallard, notaire et secrétaire du Roi. Connu par des gravures d'Israël Henriet et Israël Sylvestre (1650). Au XVIIIe siècle, le château est mis au goût du jour par Anne Catherine Gallard, veuve de Nicolas Potier de Novion, qui ouvre la cour d'honneur en démolissant le mur et le portique d'entrée, et par sa petite-fille, Léontine Philippine de Novion et son mari Aymar de Nicolay qui modernisent le château (1775-1777) en faisant ouvrir de nouvelles baies et en faisant ajouter un vaste fronton sur chaque façade. En 1830, les Nicolay abandonnent le château et est racheté en 1872 par le banquier berlinois et baron Samuel de Haber. C'est pour lui que Gabriel Hippolyte Destailleur entreprend la restauration du château dans le style Louis XIII. Une campagne de travaux, en 1873, fait apparaître la brique sous le crépis, exhausse les combles des pavillons, ajoute sur les toitures des ornements en zinc. L'escalier intérieur est démoli et des degrés inspirés de celui du château de Fontainebleau sont plaqués sur chacune des façades. Une nouvelle aile, à comble brisé, est construite sur l'emplacement des cuisines pour abriter les appartements de maître et reliée par une galerie à l'aile ancienne. Le parc, l'un des plus beaux de France, a été commencé au XVIe siècle pour les Clausse et terminé par les Gallard au XVIIe siècle. propriété de M. de Ganay.","architecture":"COURANCES, en 1622 à Claude Gallard,  C'est sans doute lui qui fait construire un château de plan \"en H\" élevé sur une plateforme quadrangulaire entourée de douves, c'est de cette époque que datent l'allée d'honneur entre deux canaux et la grande perspective dans l'axe du château, avec ses canaux et ses bassins dont un long canal de 248 toises, des nappes et une salle d'eau. Au XVIIIe siècle, la marquise de Novion ajoute le beau miroir d'eau. En 1870, Destailleur le transforme en parc à l'anglaise. La marquise de Ganay petite-fille du baron de Haber, fait rétablir un dessin à la Française avec l'aide du paysagiste Achille Duchêne. Elle fait réaliser le bassin du fer à cheval et la fontaine d'Aréthuse, surmontée d'une nymphe en marbre sculptée en 1711 par Claude Poirier pour le parc de Marly (statue acquise en 2005 par le Musée du Louvre). En 1930, elle crée un jardin \"anglo-japonais\" .Éléments protégés MH : les façades et les toitures du château y compris les deux escaliers extérieurs des communs et des deux pavillons en bordure des douves, le parc ordonnancé et clos de murs avec ses pièces d'eau, y compris les douves et l'ancien moulin à foulon, l'allée d'accès dans la perspective de la façade de la cour d'honneur : classement par arrêté du 27 juin 1983.","habitants":"La marquise de Ganay   et    Aymar de Nicolay\"","divers":"Château de Courances                      GPS : 48° 26' 28,18\" Nord, 2° 28' 9,52\" Est","gps":"48° 26' 28,18\" Nord, 2° 28' 9,52\" Est","images":["../image/image_91/91_Courances_1.jpg","../image/image_91/91_Courances_2.jpg","../image/image_91/91_Courances_3.jpg","../image/image_91/91_Courances_4.jpg","../image/image_91/91_Courances_5.jpg","../image/image_91/91_Courances_6.jpg"]},"Consult_chateau_formulaire8f68":{"id":"Consult_chateau_formulaire8f68","dept":"91","canton":"Gif -sur-Yvette","commune":"Gif -sur-Yvette","nom":"Courcelle_Ermitage","type":"Château","periode":"XVII","histoire":"Deux châteaux dans cet article, Courcelle et Hermitage.                  COURCELLE  cette élégante demeure, que lon aperçoit depuis la route conduisant vers Saint-Rémy, date du XVIIe siècle. Cest un commissaire aux guerres de Louis XIII, Jean Hoquichan, qui, en 1638, fait construire un petit château entouré dun parc dessiné par un élève dAndré Le Nôtre sur le domaine de Courcelle (du latin Curticella, signifiant champ cultivable et, par extension, petit domaine. Remanié en profondeur à la fin du XVIIe siècle par les Feydeau, famille de grands parlementaires parisiens, également seigneurs de Courcelle, le château passe ensuite aux mains de propriétaires successifs qui transforment et agrandissent la propriété : Olivier de Montluçon, monsieur Bigot, le baron Couteulx du Molay, madame Duputel. madame Ebstein le met à la disposition du ministère de la guerre en 1914-1918 où il sert de maison de convalescence pour les blessés. En 1921, monsieur Rosenthal acquiert le domaine. Le château sera réquisitionné par les allemands durant la seconde guerre mondiale. En 1953, il est acheté en copropriété et entièrement restauré en 1996.","architecture":"HERMITAGE, en 1831, le baron Claude-François de Méneval, premier secrétaire de Napoléon Ier, achète la propriété de lHermitage et y fait construire une demeure bourgeoise carrée sur deux étages avec dépendances, au cur dun vaste parc de neuf hectares. Le domaine devient ensuite la propriété de la famille Debonnaire avant de devenir en 1889 la propriété dArthur Raffalovitch, économiste russe, attaché financier de lambassade de Russie en France. En 1921, le nouveau châtelain est un marchand de lingerie fine, puis lHermitage est racheté par les frères Givaudan, parfumeurs. En 1938, Xavier Givaudan, le dernier propriétaire, décide de vendre le domaine, trop vaste et trop lourd à entretenir. La ville de Gif, sous limpulsion de son maire, Arthur Levasseur, décide alors de lacquérir pour y installer les services municipaux. La nouvelle mairie est réaménagée, le vaste terrain de la propriété est morcelé, loti pour partie. Le mur longeant la Grande Rue (actuelle rue Amodru) est démoli, ouvrant le parc au public. Une grande place publique est également créée devant la mairie. Lensemble est inauguré en 1939. La place est baptisée Place Edouard Daladier. En 1955, la municipalité rend hommage à Arthur Levasseur tout juste décédé en donnant son nom au parc municipal. En 1984, les services municipaux emménagent dans un tout nouveau bâtiment à proximité. Le château de lHermitage accueille aujourdhui les cérémonies de mariage sous le regard de Juliette Adam dont le buste trône dans la grande salle, aux côtés des portraits de tous les chefs de lÉtat français depuis la IIe République. Lorangerie est devenue un lieu de réunion pour les associations, tandis que les anciennes écuries sont transformées en salle de cinéma, propriété de la commune, hôtel de ville.","habitants":"Famille de Jean Hoquichan et famille Feydeau\"","divers":"Gif -sur-Yvette, deux châteaux dans cet article, Courcelle grav-1-2     et Hermitage grav-3-4                                               Hermitage GPS : 48° 42' 07\" Nord, 2° 08' 02\" Est","gps":"48° 42' 07\" Nord, 2° 08' 02\" Est","images":["../image/image_91/91_Courcelle_Ermitage_1.jpg","../image/image_91/91_Courcelle_Ermitage_2.jpg","../image/image_91/91_Courcelle_Ermitage_3.jpg"]},"Consult_chateau_formulaire3bc6":{"id":"Consult_chateau_formulaire3bc6","dept":"91","canton":"Dourdan","commune":"Monteloup","nom":"Courson","type":"Château","periode":"XVII","histoire":"deux châteaux  dans cet article, Courson et Vaugrineuse.        COURSON, à l'origine résidence d'une grande lignée de parlementaires, les Lamoignon, le château de Courson appartient depuis le XVIIIe siècle à la même famille, notamment illustrée par un cousin issu de germain de Napoléon 1er : le duc de Padoue. Demeure ouverte et lumineuse, le château s'insère au coeur de la quiétude du parc dont les essences témoignent de la passion des différents propriétaires pour les arts du jardin et la botanique, l'édifice du XVIIe siècle érigé par Nicolas de Lamoignon évoque les célèbres modèles qui vont de Rosny, demeure de Sully, jusqu'au premier Versailles. Au XIXe siècle, Jean Thomas Arighi de Casanova, duc de Padoue, confie à Berthault, élève de Bellanger dessinateur des jardins de l'Impératrice Joséphine, le soin de transformer le jardin à la française en un parc paysager qui s'ouvre sur la campagne environnante. Transmis successivement à la famille de Caraman à la fin du XIXe siècle, puis aux Nervaux Loÿs.","architecture":"VAUGRIGNEUSE, sa construction date du XVIIe siècle. Le Château de Vaugrigneuse fut constuit au XVIIe siècle, pour Jean Heroard, médecin de 3 rois : Charles IX, Henri III et Henri IV. Vous pourrez organiser, au Château de Vaugrineuse, vos séminaires, mariages ou autres réceptions privées.                                                                                                                                             COURSON  Éléments protégés MH : les façades et les toitures, l'installation hydraulique et le pavillon qui la renferme : classement par arrêté du 1er février 1944. Le parc, avec son mur de clôture, y compris le saut-de-loup et la contrescarpe, l'allée perspective, les façades et les toitures des communs et la chapelle : inscription par arrêté du 4 février 1992.","habitants":"Famille des Lamoignon\"","divers":"A Monteloup château de  Vaugrigneuse grav-1.GPS : 48° 36' 09\" Nord, 2° 07' 15\" Est                                                   Courcon  GPS : 48° 36' 0,4\" Nord, 2° 08' 48,55\" Est","gps":"48° 36' 09\" Nord, 2° 07' 15\" Est","images":["../image/image_91/91_Courson_1.jpg","../image/image_91/91_Courson_2.jpg","../image/image_91/91_Courson_3.jpg","../image/image_91/91_Courson_4.jpg"]},"Consult_chateau_formulairef183":{"id":"Consult_chateau_formulairef183","dept":"91","canton":"Etampes","commune":"Angerville","nom":"Dommerville","type":"Château","periode":"XVIII","histoire":"DOMMERVILLE a été édifié de 1777 à 1782 par le marquis de Hallot, lieutenant général des armées du Roi, au décès  du marquis de Hallot, Dommerville passe à la comtesse de Valon  d'Ambrugeac en 1807 devient la propriété du général Rochambeau, en 1810 achat par le comte  de Ferrières de Sauveboeuf.  Utilisé comme bâtiment de ferme à partir de 1869, par un riche cultivateur et reconstruit le château dans l'enceinte du parc défigurant le site du château de Dommerville a été racheté en 1963 et l'extérieur a été restauré dans le respect de l'architecture d'origine. Achat du domaine par la famille Poisson.  Cette restauration est due à l'initiative de Didier Poisson et se poursuit avec le propriétaire actuel du château de Dommerville René Sentis, en 2002, fondateur et PDG de la société EBP informatique.","architecture":"DOMMERVILLE,  ce château est composé d'un corps central flanqué de deux ailes. Celle de gauche abrite les deux salles à manger et les deux escaliers. L'aile droite servait d'orangerie. Une allée de marronniers, longue de 250 mètres, conduit à la demi-lune, fermée par une grille de 35 mètres, qui précède l'avant-cour de la cour d'honneur.Parmi les communs, seules les cuisines ont subsisté. Les écuries ont disparu lors d'un incendie, en 1910. Le second étage, sous les combles mansardés, disparu depuis un peu plus d'un siècle, a été restitué lors d'une importante restauration qui a eu lieu entre 1995 et 1999.  Parmi les communs, seules les cuisines ont subsisté. Les écuries ont disparu lors d'un incendie, en 1910. Utilisé comme bâtiment de ferme à partir de 1869, le château de Dommerville a été racheté en 1963 et l'extérieur a été restauré dans le respect de l'architecture d'origine.\nÉléments protégés MH : les façades et les toitures, y compris celles des deux ailes et des communs, l'escalier intérieur de l'aile gauche avec sa rampe en fer forgé, la grille d'entrée et son muret en demi-lune, le pavillon hexagonal situé dans le parc : inscription par arrêté du 28 mars 1977.","habitants":"Marquis de Hallot\"","divers":"A  Angerville   château de Dommerrville                                                             GPS : 48° 19' 06,89\" Nord, 1° 59' 2,41\" Est","gps":"48° 19' 06,89\" Nord, 1° 59' 2,41\" Est","images":["../image/image_91/91_Dommerville_1.jpg","../image/image_91/91_Dommerville_2.jpg","../image/image_91/91_Dommerville_3.jpg"]},"Consult_chateau_formulairefb72-2":{"id":"Consult_chateau_formulairefb72-2","dept":"91","canton":"Etampes","commune":"Dourdan","nom":"Dourdan","type":"Forteresse","periode":"XII-XIV","histoire":"DOURDAN, le vieux \"castrum\" des premiers Capétiens était devenu très insuffisant pour la défense du domaine royal. Il fut donc remplacé par cette puissante citadelle, équipée des moyens de défense les plus perfectionnés. Philippe le Bel aimait y chasser, mais au fin politique, il le céda en apanage à son frère Louis d'Evreux. La forteresse  fut bâtie par Philippe Auguste vers 1222.  Le château demeura presque un siècle sous l'égide de cette famille. Il échut en 1385 au duc de Berry qui fit construire un superbe logis. Il fit élever les remparts de la ville. Dourdan dut ensuite affronter la guerre de cent ans, durant laquelle le château fut maintes fois pris et repris. Pendant les guerres de religion, la demeure fut très endommagée durant le siège de Dourdan par les Huguenots en 1591, assiégé par  lesz troupes du maréchal Biron  et dut capituler malgré la défense héroïque du capitaine Jacques. Trés endommagé est restauré par ces  propriétaires successifs; Nicolas Harlay de Sancy, puis Sully. Louis XIII rattacha Dourdan aux possessions Royales en 1611, et le donna à sa mère, Marie de Médicis. Louis XIV, devenu roi fit de même pour Anne d'Autriche. Après la Fronde, le château de Dourdan fut octroyé à la famille d'Orléans qui le transforma en prison. Vendu en viager en 1961, le château revint à la ville de Dourdan en 1969, il bénéficie de nombreuses campagnes de restauration.","architecture":"DOURDAN, la forteresse  avec son enceinte carrée de quatre vingt dix mètres de côté et entourée de profonds fossés et ses tours de flanquement régulièrement disposées abrita les séances du Tiers-Etat. Elle devint propriété de l'Etat à la Révolution. Après le départ des prisonniers pour Poissy, en 1819, une prison de dépôt fut maintenue jusqu'en 1852. Le château fut légué par héritage à Joseph Guyot, qui sauva la forteresse en aménageant en habitation l'ancien grenier à sel et le châtelet, et en restaurant le donjon. Vendu en viager en 1961, le château revint à la ville de Dourdan en 1969, il bénéficie de nombreuses campagnes de restauration.","habitants":"Famille d'Orléans\"","divers":"Château fort de Dourdan                     GPS : 48° 31' 47,06\" Nord, 2° 0' 40,14\" Est","gps":"48° 31' 47,06\" Nord, 2° 0' 40,14\" Est","images":["../image/image_91/91_Dourdan_1.jpg","../image/image_91/91_Dourdan_2.jpg","../image/image_91/91_Dourdan_3.jpg","../image/image_91/91_Dourdan_4.jpg"]},"Consult_chateau_formulaire26ce":{"id":"Consult_chateau_formulaire26ce","dept":"91","canton":"Draveil","commune":"Draveil","nom":"Draveil","type":"Château","periode":"XIX","histoire":"DRAVEIL, en 1920 les Péjistes vendent à la commune l'allée des Tilleuls plantée dans l'axe du château. En 1928, en vue d'élargir la route de Juvisy, le mur sud-est démoli sur une longueur de 470 m et reconstruit à ses frais par la municipalité de Draveil, Paris-Jardins lui cédant gratuitement la bande de terrain nécessaire. Entre 1926 et 1930, les deux murs de la cour d'honneur et les communs subsistants sont détruits pour permettre la création de nouveaux lots. En 1938 l'orangerie mise en location est transformée en cinéma. Le premier étage du château abrite aujourd'hui des logements réservés aux sociétaires âgés.","architecture":"DRAVEIL, le château est un édifice de plan rectangulaire formé de trois corps en U. Le corps de bâtiment principal présente une composition tripartite, avec avant-corps central et travées latérales en retrait. L'élévation de l'avant-corps central est à trois niveaux couronnés d'un fronton triangulaire percé d'un oculus, celle des travées latérales est à deux niveaux, de même que celle des ailes en retour. L'avant-corps central est couvert d'un toit en pavillon simple, tandis que les travées latérales sont couvertes de toits brisés en pavillons, tout comme les ailes en retour. La couverture est faite d'ardoises et les brisis s'ouvrent de lucarnes trahissant un étage de comble.","habitants":"Famille Draveil\"","divers":"Château de Draveil","gps":"","images":["../image/image_91/91_Draveil_1.jpg"]},"Consult_chateau_formulaire8c44":{"id":"Consult_chateau_formulaire8c44","dept":"91","canton":"Etampes","commune":"Etampes","nom":"Etampes","type":"Château","periode":"XII-XVIII-XIX","histoire":"Trois châteaux dans cet article; Etampes,  Petit St-Mars et Valnay. ETAMPES. C'est un ancien château fort royal. Le château d'Étampes a été classé aux M.H. Il ne subsiste que le donjon appelé depuis la Tour de Guinette. Un premier château fut construit à la demande de Robert le Pieux. Le donjon du château d'Etampes a été édifié vers 1140, à la demande du roi Louis VII. A la fin du XIIe siècle, Philippe-Auguste fit édifier une enceinte carrée reliée par une passerelle puis une seonde enceinte. De 1201 à 1213, le donjon servit de prison à la reine Ingeburge du Danemark. Le 16/01/1358, les Anglais s'emparèrent de la ville et du château d'Etampes,  repris par Charles V. Le 28.01.1387, Jean de Berry en fit don à son frère Philippe le Hardi. Vers 1412, le château servit de modèle au livre d'heures. Les Très Riches Heures du duc de Berry. Le 15 décembre 1411, la ville et le château furent assiégés par Jean sans Peur et furent annexés par le duché de Bourgogne. Du 19 au 31 juillet 1465, Charles le Téméraire s'installa au château après la bataille de Montlhéry. En 1513 Anne de Bretagne y séjourna, suivie en 1516 par Claude de France. Le 13 décembre 1562, il fut à nouveau pris par le prince de Condé et ne fut libéré que le 2 janvier 1563. En 1589, Henri IV autorisa les habitants à démanteler le château pour utiliser les pierres.","architecture":"ETAMPES, lors de la Révolution, le terrain de la Tour de Guinette fut vendu comme bien national. Elle fut ensuite abandonnée jusqu'à la Restauration.  L'acquéreur rasa les derniers bâtiments et fit transformer la tour en une carrière de pierres à ciel ouvert. Elle fut ensuite abandonnée jusqu'à la Restauration. En 1821, le duc d'Orléans revendit les derniers vestiges du château. En 1859, la ville acquit les ruines du donjon pour en faire un lieu de promenade. La Tour de Guinette est classée aux M.H. depuis 1862. Un Musée a été ouvert dans les murs du château d'Etampes. Il appartient à la mairie.                                                                                                                                         PETIT ST-MARS, en 1789, M. Poilloüe de Saint-Mars, ancien officier major aux gardes Françaises, était seigneur du Petit Saint Mars. On ne possède pas d'information sur la construction du château du Petit Saint Mars. Il est aujourd'hui utilisé comme maison de retraite par l'hôpital d'Etampes. D'élévation ordonnancée, la travée centrale du corps de logis principal comporte deux étages carrés et un étage de comble.                                                                                                 VALNAY M. Poilloüe de Saint-Mars est désigné comme seigneur de Valnay en 1527. En 1789, la seigneurie relève de Jean Auguste de Poilloüe de Saint-Mars. La famille Saint-Perier conserve le moulin et le château jusqu'à la fin du XIXe siècle. En 1909, un nouveau propriétaire ajoute un pavillon au logis. Le moulin a aujourd'hui disparu. Le logis est entièrement couvert d'enduit, de sorte que le matériau de gros oeuvre n'apparaît pas ; l'orangerie est bâtie en blocs de calcaire, avec un enduit imitant la brique ; une fabrique de jardin bâtie sur le bord de la Chalouette contient une turbine.","habitants":"le Duc d'Orléans                M. Poilloüe de Saint-Mars                                          Valnay M. Poilloüe de Saint-Mars\"","divers":"Trois châteaux dans cet article; Etampes grav-1- 5, Petit St-Mars grav-2-3 et Valnay-4                                        GPS : 48° 26' 04,02\" Nord, 2° 09' 40,86 Est","gps":"48° 26' 04,02\" Nord, 2° 09' 40,86 Est","images":["../image/image_91/91_Etampes_1.jpg","../image/image_91/91_Etampes_2.jpg","../image/image_91/91_Etampes_3.jpg","../image/image_91/91_Etampes_4.jpg","../image/image_91/91_Etampes_5.jpg"]},"Consult_chateau_formulaire84ed":{"id":"Consult_chateau_formulaire84ed","dept":"91","canton":"Evry","commune":"Evry","nom":"Evry_Hauldres","type":"Château","periode":"XVII","histoire":"Deux châteaux dans cet article Beauvoir, Hauldres et Yigery.                     BEAUVOIR   est le plus petit des cinq grands châteaux d'Evry, c'est le seul encore en place. La famille de Rohan acheta le terrain pour y construire, au début du XIXe siècle, une propriété bourgeoise. Quelques années plus tard, la famille de Revenaz Pastré, qui a dominé la propriété foncière à Évry et dans les communes voisines pendant un siècle et demi, racheta le domaine et fit reconstruire un nouveau château dans un style néo-classique imitant le Petit Trianon à Versailles. La grille d'entrée est surmonté de deux lions. Son parc de neuf hectares est agrémenté de statues dont une bergère et une musicienne, d'un kiosque et d'un pavillon.                        A Cinq  K.M. a l'est  d'Evry HAULDRES,  a été la résidence de Mme de Pompadour depuis son mariage, jusquà son installation à la cour.  Si la mère de Jeanne Poisson n'avait pas eu l'humeur coureuse, Etiolles n'aurait sans doute jamais abrité la résidence de la future marquise de Pompadour. Née en 1721 à Paris, Jeanne Poisson, de son nom de jeune fille, est élevée par son parrain Charles-François Le Normant de Tournehem, amant de sa mère depuis un certain temps. Depuis tellement longtemps même que certains le soupçonnent d'être le père naturel de la Pompadour. Au début du XVIIIe siècle, l'homme acquiert la seigneurie d'Etiolles. Très investi dans l'éducation de sa « filleule », il la marie en 1741 à son neveu, Charles-Guillaume, et abandonne aux jeunes époux le château d'Etiolles, surnommé aussi le château du Bourg. Il avait été vendu à Charles le Normand le 12 décembre 1684 par Marie Lorthon, restés veuve.  Il avait été vendu à Charles le Normand le 12 décembre 1684 par Marie Lorthon, resté veuve.","architecture":"HAULDRES. En février 1642, Richard de Petit de La Salle, conseiller secrétaire du roi, céde à son confrère Pierre Gargan, sieur de Villiers, à Paris, rue du Temple, le domaine des Hauldres qui relevait de la seigneurie dEtiolles dans l'Essonne. Gargan était le beau-père de Jean-François de Guénégaud des Brosses, évoqué plus bas, dont la famille et lui-même furent de fidèles commanditaires de François Mansart (hôtels Guénégaud du Plessis et Guénégaud des Brosses à Paris, le château du Plessis-Belleville et le château de Fresnes-sur-Marne. La maison érigée au XVIe siècle, servait à la surveillance du Ru des Hauldres, qui se jette dans la Seine. Le château des Hauldres venait dêtre somptueusement restauré. Le château actuel, très dénaturé, aujourd'hui, n'a plus rien de la splendide demeure du milieu du XVIIe siècle. Le château des Hauldres a été la résidence de l'architecte Joseph-Michel Le Soufach. Situé sur le bord droit de la Seine et confinant avec le foret de Menars, où le roi allait à chasse. Dans le même foret Jeanne Antoinette se fit noter par le roi pendant la chasse.  Depuis le mariage, le château fut équipé dun théâtre privé, où Jeanne Antoinette fit ses premières représentations théâtrales.","habitants":"Jeanne Poisson  Mme de Pompadour\"","divers":"a Evry Beauvoir  grav-1-2   Etiolles grav-3-4                                                                    GPS : 48° 37' 44\" Nord, 2° 27' 21\" Est                                                                           Petit Bourg  grav -5-                                 GPS : 48° 38' 22\" Nord, 2° 26' 28\" Est","gps":"48° 37' 44\" Nord, 2° 27' 21\" Est","images":["../image/image_91/91_Evry_Hauldres_1.jpg","../image/image_91/91_Evry_Hauldres_2.jpg","../image/image_91/91_Evry_Hauldres_3.jpg","../image/image_91/91_Evry_Hauldres_4.jpg","../image/image_91/91_Evry_Hauldres_5.jpg"]},"Consult_chateau_formulaire1e1b":{"id":"Consult_chateau_formulaire1e1b","dept":"91","canton":"Etampes","commune":"Bouville","nom":"Farcheville","type":"Château","periode":"XIII-XIV","histoire":"FARCHEVILLE, la construction du château de Farcheville date du XIIIe au XIVe siècle. C'est un ancien château fort. Le propriétaire initial était Hugues de Bouville, (1240-1304), baron de Milly, chambellan de Philippe le Bel, en 1291. En 1407, le domaine entre par héritage dans les possessions de la branche de Châtillon-sur-Loing de la maison de Coligny,  Farcheville entre aux XVIIe et XVIIIe siècles dans le patrimoine de riches familles de robe, les Jappin puis les Maynon. En 1637, la seigneurie est achetée par Maximilien Jappin, conseiller et secrétaire du roi.  En 1741, le domaine devient la propriété de Vincent Michel Maynon, président de la quatrième chambre   Le château de Farcheville est une forteresse de plaine, d'une disposition inhabituelle et, l'une des plus remarquables d'Île-de-France.","architecture":"FARCHEVILLE,  il comporte une vaste enceinte rectangulaire entourée de douves humides, flanquée de tours aux angles et dont les mâchicoulis sont portés par de grands arcs en tiers point bandés entre les contreforts. Au milieu de l'un des côtés, l'entrée s'ouvre dans le donjon rectangulaire, à côté d'un pavillon datant du début du XVIIe siècle.  Sous la Révolution française, celui-ci ne put empêcher la démolition d'environ la moitié des arcs de l'enceinte et d'une partie des créneaux. À cette époque, le pont-levis avait déjà disparu et les fossés étaient dits « cultivés  A l'intérieur de l'enceinte, on trouve une salle seigneuriale, une grange aux dîmes, des communs, un colombier, des remises et les écuries, une chapelle à voûte lambrissée dont le décor date du début du XIVe siècle. Bill Gates venait sy reposer, Mireille Mathieu sy produisait en privé sur demande de pensionnaires influents. Le château de Francheville était un important pied-à-terre français pour les milliardaires du monde entier.Il est classé aux M.H. depuis 1948.  l'intérieur de l'enceinte, on trouve une salle seigneuriale, une grange aux dîmes, un fournil, une chapelle (consacrée en 1304), un logis dit « la maison du chapelain » qui datent encore en partie des XIIIe et XIVe siècles. D'autres bâtiments, des communs, un colombier, des remises et écuries, le logis sud-ouest, furent plus fortement transformés du XVIe au XIXe siècle. En 1740 le pont-levis du châtelet d'entrée fut détruit pour construit le pont fixe actuel.Le volume était divisé jusqu'au XIXe siècle en deux espaces, le premier, à l'ouest, était la cour d'honneur, occupant les deux-tiers de l'enclos, avec le porche d'entrée, le corps de logis principal et sa salle dans l'angle nord-ouest, la chapelle, les cuisines, etc.  Le second occupait le tiers Est, séparé du reste par une barre de bâtiments, il était destiné aux activités agricoles.","habitants":"Hugues II  de Bouville,\"","divers":"Château de Farcheville à Bouville  GPS : 48° 25' 31\" Nord, 2° 17' 16\" Est","gps":"48° 25' 31\" Nord, 2° 17' 16\" Est","images":["../image/image_91/91_Farcheville_1.jpg","../image/image_91/91_Farcheville_2.jpg","../image/image_91/91_Farcheville_3.jpg","../image/image_91/91_Farcheville_4.jpg"]},"Consult_chateau_formulaire6e2b":{"id":"Consult_chateau_formulaire6e2b","dept":"91","canton":"Brétigny-sur-Orge","commune":"Brétigny sur Orge","nom":"Fontaine_Bretigny","type":"Château","periode":"XVII","histoire":"FONTAINE  c'est un château de style Renaissance. La construction  date du XIIIe au XVIIe siècle. Il fut bâti pour son propriétaire initial Antoine-Gaspard Boucher d'Argis. Le Château de la Fontaine est devenu un Institut Universitaire de Technologie. Son propriétaire actuel est l'Université d'Évry-Val d'Essonne.","architecture":"FONTAINE, En 1976, le parc de la Fontaine fut ouvert au public. La ville de Brétigny-sur-Orge a mis à disposition de l'IUT le château La Fontaine et une partie du terrain qui lentoure dans les années 1992. Ce site a été retenu pour limplantation dun département de gestion des Entreprises et des Administrations dans le château et lunité centrale dans les communs, un département de Génie Thermique et Énergie et un restaurant. Le château et ses alentours sont implantés sur un terrain de 58.000 m² aménagé en parc. De plus, les projets municipaux comportent léventualité de remettre en eaux les douves et bassins.","habitants":"Antoine-Gaspard Boucher d'Argis. \"","divers":"a Brétigny sur Orge château de Fontaine                                                                          GPS : 48° 37' 05,28\" Nord, 2° 18' 20,13\" Est","gps":"48° 37' 05,28\" Nord, 2° 18' 20,13\" Est","images":["../image/image_91/91_Fontaine_Br%c3%a9tigny_1.jpg","../image/image_91/91_Fontaine_Br%c3%a9tigny_2.jpg"]},"Consult_chateau_formulairefaa4":{"id":"Consult_chateau_formulairefaa4","dept":"91","canton":"Dourdan","commune":"Fontenay les Briis","nom":"Fontenay_les_Briis","type":"Château","periode":"XVIII","histoire":"FONTENAY, construit par la famille de Signac, ce château remplace peut-être un manoir médiéval antérieur. En 1738, un pont-levis entièrement métallique, le premier de ce type, est installé au-dessus des fossés qui entourent l'édifice. En 1854, le château de Fontenay, alors délabré, est entièrement restauré par M. Thayer. Acheté par la famille Chardin en 1870, il reste sa propriété jusqu'en 1937, date à laquelle il est racheté par le syndicat CGT du personnel de la société des transports en commun de la région parisienne.","architecture":"FONTENAY, le bâtiment de style classique, édifié au milieu d'un vaste parc, est constitué d'un corps central rectangulaire flanqué en façade de deux pavillons légèrement saillants. La toiture, à quatre pans, est percée de lucarnes mansardées.Propriété  de l'union des  syndicats Cgt de la Ratp le comité d'entreprise et aussi propriaire du château du Plat à Vallière dans la creuse.","habitants":"Famille de Signac\"","divers":"château de Fontenay les Briis                       GPS : 48° 37' 8,3\" Nord, 2° 9' 23,1\" Est","gps":"48° 37' 8,3\" Nord, 2° 9' 23,1\" Est","images":["../image/image_91/91_Fontenay_les_Briis_1.jpg","../image/image_91/91_Fontenay_les_Briis_2.jpg","../image/image_91/91_Fontenay_les_Briis_3.jpg"]},"Consult_chateau_formulaire0a91":{"id":"Consult_chateau_formulaire0a91","dept":"91","canton":"Mennecy","commune":"Fontenay le Vicomte","nom":"Fontenay_Vicomte","type":"Château","periode":"XVII","histoire":"FONTENAY LE VICOMTE, reconstruit vers 1850 à lemplacement du château de La Salle. Le marquis de La Prévalaye avait sollicité du sous-préfet de Corbeil une autorisation d'exploitation d'une carrière de pierre à ciel ouvert à Fontenay, sur le chemin de Pailleau, pour servir à la construction ou la réfection de bâtiments de la ferme du château. Elle lui fut accordée le 18 juillet. Il dut en profiter pour poursuivre ses réaménagements. Le marquis de La Prévalaye mourut au château de Fontenay-le-Vicomte, le 5 mars 1853, âgé de 71 ans. Dès le lendemain, son gendre, âgé de 29 ans, et son fermier Hénault, âgé de 40 ans, avec lequel il s'était lié d'amitié, vinrent déclarer son décès en mairie. Le domaine de Fontenay revint donc à sa fille unique et seule héritière, Louise-Sophie. Sa mère se vit , conformément à son contrat de mariage et en donna quittance devant notaire, le 7 mai 1853. La disparition de l'inventaire après décès de Louis-Sophie, daté du 9 novembre 1889, constitue une nouvelle lacune dans l'histoire du domaine après celle du fief de La Salle aux Payens aux XVIIe siècle. Fort heureusement, elle est compensée en partie par l'analyse succincte des titres et papiers de cet inventaire contenu dans l'acte de partage du 7 octobre 1891 et par l'inventaire après décès de Charles, son époux, du 17 avril 1861. Louise-Sophie poursuivit la politique d'accroissement du domaine de son père, surtout après les cessions faites en décembre 1865 pour la création de la ligne de chemin de fer en direction de Lyon par le Bourbonnais. Femme de grande piété, elle avait établi dans la maison acquise des époux Bidonet, le 17 août 1861, le presbytère de la paroisse de Fontenay et dans celle acquise de la marquise de Sercey, le 25 octobre 1866, une maison d'éducation religieuse. Le 22 août 1869, elle acquit de mesdames Fréchot, Cochin et Tétart, devant Me Jozon, notaire à Corbeil,  Outre les tourbières et les fermes, Louise-Sophie bailla les poissons de ses étangs : le 20 novembre 1854, elle le concéda à Henri Barassé.","architecture":"FONTENAY LE VICOMTE, L'argent ainsi récolté servit, outre les acquisitions de terres, à l'entretien du bâti.   Après la reconstruction du château et des communs par son père, elle procéda à la restauration générale de la ferme du château . Louise-Sophie demeura en possession du domaine de Fontenay jusqu'à sa mort, le 29 septembre 1889. Le partage de ses biens fonciers, dont ceux de Fontenay, se fit entre les trois enfants survivants issus de son union avec Charles Espivent de La Villesboisnet. Dans son rapport, Laroche porta un jugement sévère sur le château et ses dépendances : il considérait le premier comme \"une construction sans style\" dont \"seule la dimension lui conférait de l'importance\". Il était, disait-il, mal distribué, mal décoré, les étages très peu élevés et la construction très médiocre et en mauvais état. Fontennay le Vicomte, ce dernier point atteste que le château n'est pas de la fin du XIXe comme on l'a dit, mais bien du second quart du siècle ! Ce bâtiment, ajoutait-il, ne présente ni la commodité d'une habitation moderne, ni le caractère et les grandes proportions des châteaux anciens ! Sa transformation serait donc très onéreuse. Les seuls mérites du bâtiment résidaient, selon lui, dans son grand nombre de pièces, pratique pour loger une famille nombreuse. Les communs n'étaient guère mieux lotis à son goût et nécessitaient également d'importantes réparations. Les murs du parc étaient en très mauvais état et ne permettaient plus par conséquent d'y chasser.  Aujourd'hui, lédifice comprend onze travées situées de part et dautre dun avant-corps central. Lensemble est flanqué de deux tourelles dangle de plan carré. Le château comprend plusieurs parties constituantes dont des écuries et une orangerie. En revanche il semblerait que lorangerie ait subi dimportantes transformations afin de la transformer en logements.","habitants":"Le marquis de La Prévalaye \"","divers":"Château de Fontenay le Vicomte GPS : 48° 37' 8,3\" Nord, 2° 9' 23,1\" Est","gps":"48° 37' 8,3\" Nord, 2° 9' 23,1\" Est","images":["../image/image_91/91_Fontenay_Vicomte_1.jpg"]},"Consult_chateau_formulairee675":{"id":"Consult_chateau_formulairee675","dept":"91","canton":"Dourdan","commune":"Forges les Bains","nom":"Forges_les_Bains","type":"Château","periode":"XVIII","histoire":"FORGES LES BAINS,  construit au XVIIIe siècle, en bordure de la vallée de Chevreuse, par le descendant du seigneur Le Jariel de Forges, conseiller de François Ier à Milan en 1515, le château de Forges les Bains est célèbre pour ses beaux toits à la Mansart et son parc avec ses allées bordées de chênes. Un château existe à Forges dès le XIIIe siècle, mais il est reconstruit au XVIIe siècle, probablement pour la famille de Baillon, puis entièrement transformé par Edme Mathurin Le Jariel, écuyer du roi, seigneur de Forges de 1717 à 1729, dans la famille duquel le domaine reste jusqu'en 1810. En 1819, la demeure est achetée par Pierre-Antoine-Robert de Saint-Vincent, dont la famille en conserve la propriété.","architecture":"FORGES LES BAINS, le château à un étage, est composé d'un corps central, surmonté d'un attique couronné d'un fronton triangulaire, et flanqué de deux pavillons avec des combles à la française, percés de lucarnes. Éléments protégés MH : les façades et les toitures du château, le muret de clôture et la grille d'entrée, la grille séparant le château du parc : inscription par arrêté du 13 août 1963.","habitants":"Famille de Baillon\"","divers":"Château de  Forges les Bains                    GPS : 48° 37' 36,6\" Nord, 2° 05' 52,6\" Est","gps":"48° 37' 36,6\" Nord, 2° 05' 52,6\" Est","images":["../image/image_91/91_Forges_les_Bains_1.jpg","../image/image_91/91_Forges_les_Bains_2.jpg"]},"Consult_chateau_formulaire0f3f":{"id":"Consult_chateau_formulaire0f3f","dept":"91","canton":"Dourdan","commune":"Villeconin","nom":"Fresne_Saudreville","type":"Château","periode":"XIV-XVI","histoire":"Deux châteaux dans cet article, Fresne et Saudreville.                    FRESNE, était le siège d'une seigneurie importante citée dès 1242. Ce nom de Fresnes est certainement le souvenir d'un ancien bois de frênes défriché. Ce fief important, fit partie en 1482 de la donation faite par l'amiral de Grâville, aux Célestins de Marcoussis, de la terre et seigneurie d'Ardennes, dont il relevait. En 1520 le château comportait un grand corps de logis, l'hôtel seigneurial du Fresne, une cour, un colombier, une grange, une bergerie, une étable, une garenne etc.   Dans l'aveu et dénombrement fournit le 16 juin 1633 par Jacques Le Berche, il est écrit : un autel et lieu seigneurial consistant en un grand corps d'hôtel, deux gros pavillons et deux petits pavillons, le tout couvert d'ardoises et un petit corps de logis couvert en tuiles, cour, avant-cour et basse-cour fermée de grandes murailles, jardin, parc, clos partie de murs. Le château du Fresnes était encadré dun côté par les immenses champs de la Beauce, de lautre, par un parc admirable, aux ombres profondes comme une forêt. Ce beau château de la fin du XVIe siècle, tombera en ruine dans la seconde moitié du XIXe siècle, après la mort de la dernière représentante de la seigneurie du Fresne. Les possesseurs précédent sont de vieux noms de lÉtampois, comme les Wicardel, les Hémard, les Barville... le château constituait un précieux spécimen de lélégante et sobre architecture du début du XVIIe siècle: grand corps de logis avec quatre pavillons aux longs rampants. Depuis 1859, le château n'est plus occupé et tombe lentement en ruine, il n'y a plus de portes à l'entrée de la cour et plus de crépis à la façade. On pouvait constater des murs éboulés et des toitures découvertes.","architecture":"SAUDREVILLE, ce superbe château date du XVIIe siècle, le château de Saudreville de 1100 m² habitables environ, est en parfait état, entièrement rénové dans les règles de lart. Il a gardé de très nombreux éléments dorigine, une maison de gardien, 18ha (8 ha de parc et 10 ha de bois). En excellent état, double exposition, traversant, une partie étant inscrite aux M.H     la première trace écrite date de 1390, il s'agit d'une lettre d'achat \"du quart de lostel et appartenances de Saudreville, vendu par damoiselle Jehanne Leveneur, veuve de feu messire Thomas de Besu, à honorable homme Jehan de Montagu, secrétaire du roy, la vente a lieu au Chastelet de Paris devant Girard Acart et Regnault Dujardin clercs notaires jurés\". Avec l'hôtel, des menus, dîmes de champarts de grain et vin, et 12 arpents. Comme possesseur de Saudreville nous trouvons en 1404, Adam de Saudreville, en 1460, Jean de Saudreville qui rend foi et hommage à Catherine de Senive, dame de Boutervilliers, à cause du fief de la Ronce. En 1489, Jean Gilles, écuyer, seigneur de Fleury, à cause de Jeanne de Saudreville, son épouse (quittance de Marie de Hopital, dame de Boutervilliers). En 1527, Simon de Malannay rend foi et hommage a Jacques de lEstendant. En 1630, Pierre de Rotrou (aveu à Renée Hennequin, veuve de Henri Gouffier, marquis de Boissy, seigneur de Boutervilliers).  L'actuel château a été construit au XVIIe siècle pour Pierre de Rotrou, maître d'hôtel du Roi, et a succédé à un château antérieur. Éléments protégés MH : les façades et les toitures du château, des deux pavillons de garde et du bâtiment des communs ; la cour d'honneur avec le perron ; les douves avec leur pont ; l'ancien jardin : inscription par arrêté du 5 décembre 1972.","habitants":"Famille de 'Anne de Barville                              Saudreville messire Thomas de Besu\"","divers":"a Villeconin château de  Fresne et Saudreville.","gps":"","images":["../image/image_91/91_Fresne_Saudreville_1.jpg","../image/image_91/91_Fresne_Saudreville_2.jpg","../image/image_91/91_Fresne_Saudreville_3.jpg"]},"Consult_chateau_formulaire6e16":{"id":"Consult_chateau_formulaire6e16","dept":"91","canton":"Athis-Mons","commune":"Juvigny sur orge","nom":"Fromenteau","type":"Château","periode":"XVIII","histoire":"FROMENTEAU  En 1747, le clos Gallois est racheté par l'ancien maître de la poste de Fromenteau, René Angoullian qui y fait construire dès 1748 une maison, une grange, deux écuries, un poulailler ainsi qu'un puits, un bassin et un potager. Il y meurt en 1771. La propriété rachetée par le banquier Louis Francia de Beaufleury, est agrandie en 1775, d'un bâtiment supplémentaire doté d'un avant corps décoré. La demeure est alors dotée d'un vaste parc. La propriété traverse sans dommage l'époque révolutionnaire. Elle est rachetée au XIXe siècle par le chimiste Charles Adolphe Wurtz. Après être passée de main en main, la propriété est rachetée en 1961 par la ville de Juvisy qui installe dans le parc les deux bornes fontaines déplacées en 1970 du pont des Belles fontaines sur la R.N.7.","architecture":"FROMENTEAU , la construction du château, appelé initialement le château de Bel'Fontaines, date du XVIIe siècle. Il se trouvait dans un parc qui descendait jusqu'à la Seine et comportait un escalier en fer à cheval, comparable à celui de Fontainebleau. Il entre en 1811 dans la famille Monttessuy, mais subit d'importantes destructions lors de la guerre de 1870. La Municipalité le rachète, vers 1900, à sa dernière propriétaire, la Veuve de Gustave de Monttessuy et y installe l'hôtel de ville de la commune. Après les bombardements de 1944, la mairie fit rénover les bâtiments et, en 1965, l'architecte Paul Ohnenwald y fit bâtir, dans le bas du parc, un centre administratif qui accueille, les services administratifs, les archives, les services techniques et la salle du conseil de Juvisy-sur-Orge. Le château de Fromenteau abrite, depuis, dans ses murs, l'hôtel de ville de Juvisy-sur-Orge.","habitants":"Famille de  René Angoullian\"","divers":"a  Juvigny sur orge  château de Fromenteau                                                                                                                      GPS : 48° 41' 22,95\" Nord, 2° 22' 23,1\" Est","gps":"48° 41' 22,95\" Nord, 2° 22' 23,1\" Est","images":["../image/image_91/91_Fromenteau_1.jpg","../image/image_91/91_Fromenteau_2.jpg"]},"Consult_chateau_formulaire9769":{"id":"Consult_chateau_formulaire9769","dept":"91","canton":"Arpajon","commune":"Bouray sur Juine","nom":"Frémigny","type":"Château","periode":"XVII-XVIII","histoire":"deux châteaux dans cet article, Frémigny et Mesnil-Voisin FREMIGNY,  le château de Frémigny est dorigine gallo-romaine : la villa \"Ferminiacum ou Firminiacum\" appartenait à un riche praticien. Charles Louis Huguet de Semonville, jouera un rôle diplomatique et politique important sous les régimes de Louis XVI, de l'Empire et de la Restauration. Brillant aristocrate, il fut un fervent combattant des fameuses ordonnances. Il est Maire de Bouray sur Juine de 1816 à 1830. En 1825, il lègue Frémigny à son beau-fils, Charles Tristan de Montholon, que Napoléon avait pris pour aide de camp quelques années auparavant, il est élève de marine lorsqu'il se lie d'amitié avec la famille Bonaparte, compagnon d'exil de Napoléon Bonaparte, il est secrétaire et homme de confiance de l'Empereur qui lui dicte son testament.","architecture":"Après l'exécution de ce testament, il retourne en France dans son domaine de Frémigny, son train de vie effréné l'oblige en 1830 à vendre le château. Accablé de dettes il se réfugie en Belgique avant de s'exiler en Angleterre où il fréquente le jeune Prince Napoléon III. L'actuel château de Frémigny date du Consulat. Son style à \"l'italienne\", imite l'antique avec les influences des campagnes d'Italie et d'Égypte, péristyle à colonnades, terrasses, perrons, escalier à balustres. Le Parc de Frémigny est inscrit à linventaire du Patrimoine culturel. Il comprend notamment un étang et une orangerie. Il daterait du XIIIe siècle.","habitants":"Frémigny-Charles Louis Huguet de Semonville   Mesnil-Voisin; Pierre Hérouard, \"","divers":"A Bouray sur Juine   château de Frémigny                                                   Frémigny  Grav-1-2 GPS : 48° 31' 05\" Nord, 2° 18' 29\" Est","gps":"48° 31' 05\" Nord, 2° 18' 29\" Est","images":["../image/image_91/91_Fr%c3%a9migny_1.jpg","../image/image_91/91_Fr%c3%a9migny_2.jpg","../image/image_91/91_Fr%c3%a9migny_3.jpg","../image/image_91/91_Fr%c3%a9migny_4.jpg","../image/image_91/91_Fr%c3%a9migny_5.jpg"]},"Consult_chateau_formulaired7a4":{"id":"Consult_chateau_formulaired7a4","dept":"91","canton":"Gif sur Yvette","commune":"Gif sur Yvette","nom":"Gif_sur_Yvette","type":"Château","periode":"XVI-XVII","histoire":"Plusieurs châteaux à Gif sur-Yvette;  Belleville (voir article), Mérault et Val-Fleury, article suivant et Button.                                                                                                MERAULT,   Claude de Mérault, hérite du domaine de Gif en 1754. Il décide de construire un château digne de sa position et de ses fonctions, Lieutenant du Roy (Louis XV), au gouvernement du comté de Bourgogne, il avait tous les pouvoirs militaires en l'absence du gouverneur dans cette contrée appelée Franche-Comté, conquête majeure de Louis XIV et de ses fameux dragons. Il confie à Pierre Desmaisons, architecte du roi, d'en dessiner les plans. Le parc est dessiné par Pillet, admirateur d'André Le Nôtre. Parc et château attendront 1771 pour être achevés, Claude de Mérault endetté, meurt en 1757. C'est Charles Louis  Débonnaire, cousin au huitième degré, qui disposera du château et en continuera la construction. En 1946, le CNRS cherche un emplacement pour installer des laboratoires de recherche, Frédéric Joliot Curie, à la tête du nouveau CNRS, est l'ami de Jacques Noetzlin, propriétaire du château, qui ne désire pas conserver ce domaine. Tous deux suivent les cours de physique de J. Perrin. Le 3 juin 1946, le CNRS acquiert le château et son domaine.","architecture":"BUTTON, en 1657, Pierre III Mérault fait à Gif lacquisition dun vaste domaine comprenant alors un grand logis, une grande cour bordée de bâtiments, le logement du fermier, une chapelle, un jardin près de léglise, un parterre et un parc. En 1754, son petit-fils, Claude, lieutenant du roi au gouvernement du comté de Bourgogne, vicomte de Gif et de Châteaufort, hérite du domaine et y fait construire un château avec un parc ordonnancé. Il confie la conception du château à Pierre Desmaisons, architecte du roi et membre de lAcadémie darchitecture. Le parc sera quant à lui aménagé par le paysagiste Pillet, admirateur de Le Nôtre. Le château ne sera achevé que dans les années 1770 par un parent éloigné de Claude Mérault, Pierre-Charles Debonnaire, baron des Forges, procureur au Grand Conseil. La famille Debonnaire de Gif restera propriétaire du domaine jusquau début du XIXe siècle et donnera trois maires à la commune. Le château sera ensuite acquis par Ernest Bourlon de Sarty, ancien préfet, lui aussi maire de Gif et conseiller général de Seine-et-Oise après 1848, avant de devenir la propriété de Louis Juigné en 1869 puis de Paul Aubry en 1898. Des travaux dagrandissement au début du XXe siècle parachèveront la transformation de lédifice. Tout un ensemble de communs qui sétendaient au sud du château et arrivaient jusquà la grande rue (actuelle rue Amodru) ont été démolis en 1870. En 1878 est construit dans le domaine de Buton un grand réservoir deau par captage de deux sources, afin dalimenter le bourg via un réseau (le premier du genre à Gif) qui longeait la grande rue jusquà la place de léglise. Deux fontaines, lune située cour du Four, lautre près de léglise (toujours visible aujourdhui, rue Amodru), fournissaient leau à la population. Vers 1905, le niveau du parc sera surélevé et le mur de soutènement couronné par une balustrade. En 1912, Édouard Noetzlin, président du conseil dadministration de la banque de Paris et des Pays-Bas, devient le nouveau propriétaire du domaine. Au lendemain de la seconde guerre mondiale, son fils Jacques propose de céder la propriété à son ami Frédéric Joliot-Curie, alors directeur du centre national de la recherche scientifique. Lacte de vente est signé en 1946.","habitants":"Mérault et Button; Famille de  Charles Louis Débonnaire, famille Debonnaire de Gif \"","divers":"a Gif sur Yvette château de Button grav-4                                                       Merault  grav-1 Mairie grav-2                                                                   Val Fleuri grav-3                                GPS : 48° 42' 07\" Nord, 2° 08' 02\" Est","gps":"48° 42' 07\" Nord, 2° 08' 02\" Est","images":["../image/image_91/91_Gif_sur_Yvette_1.jpg","../image/image_91/91_Gif_sur_Yvette_2.jpg","../image/image_91/91_Gif_sur_Yvette_3.jpg","../image/image_91/91_Gif_sur_Yvette_4.jpg"]},"Consult_chateau_formulaire802c":{"id":"Consult_chateau_formulaire802c","dept":"91","canton":"Arpajon","commune":"Janville sur Juine","nom":"Gillevoisin","type":"Château","periode":"XV-","histoire":"GILLEVOISIN,  la première mention du château remonte à 1479, \"arpent de terre, appelé l'Ormoye, assis au lieu de Gillevoisin et tenu en fief par les déclarants du seigneur de Gillevoisin\". Malgré son ordonnance régulière autour d'un plan en U, le château de Gillevoisin est une mosaïque de bâtiments construits avec des matériaux variés et à différentes époques. Les parties les plus anciennes sont les ailes de communs. Le corps principal, construit au cours de la première moitié du XVIIe siècle, a été fortement remanié au XIXe siècle, la tour carrée centrale date de 1898. En 1597, le château de Gillevoisin appartenait à Marie Buisson, épouse de François Miron, puis est devenu à partir de 1618 propriété des Gobelins, les tinturiers du roi qui donnèrent leur nom, membres de la famille à l'origine de la célèbre manufacture.","architecture":"GILLEVOISIN, éléments protégés MH : les façades et les toitures du château neuf, des communs, de la chapelle et du pavillon de garde situés de part et d'autre de l'entrée : inscription par arrêté du 13 février 1969.","habitants":"Famille de  François Miron\"","divers":"a Janville sur Juine  château de Gillevoisin                                          GPS : 48° 30' 40\" Nord, 2° 14' 17\" Est","gps":"48° 30' 40\" Nord, 2° 14' 17\" Est","images":["../image/image_91/91_Gillevoisin_1.jpg","../image/image_91/91_Gillevoisin_2.jpg"]},"Consult_chateau_formulairea418":{"id":"Consult_chateau_formulairea418","dept":"91","canton":"Mennecy","commune":"Gironville sur Essonne","nom":"Gironville","type":"Château","periode":"XVIII","histoire":"GIRONVILLE,   il appartient à la famille de Laumoy, puis à la famille de Bizemont, également propriétaire d'autres fiefs dans la région. En 1803, le marquis de Bizemont fait don à la commune d'un terrain pour l'installation d'un nouveau cimetière. Ces terres sont revendues en 1863 à la comtesse de Pradel, petite-fille du marquis, à cause de l'accès difficile au cimetière et de l'effondrement des murs de clôture après de violentes pluies. La comtesse est chargée d'entretenir le mur, afin d'éviter la profanation des sépultures. Le château devient la propriété du comité d'entreprise de la société Rhône-Poulenc qui en fait une colonie de vacances. Il est ensuite racheté par la mairie et en 1992, une dépendance est transformée pour accueillir l'école maternelle intercommunale. Environ 19 ha du domaine, des marais, sont encore aménagés en promenade et classés espace naturel sensible avec l'aide du conseil général. Quant au château, façade et huisseries sont rénovées en 2001 grâce au département. Mais que faire de ce château, grande coquille vide de 600 m2. On a pensé implanter une maison du parc ou une maison de retraite, mais cela coûtait trop cher, se souvient le maire, Alain Eeckeman. Les élus imaginent alors un gîte d'étape et de groupes qui accueillerait des touristes, en groupe ou en famille, et des séminaires mais aussi des classes transplantées.","architecture":"GIRONVILLE,  le château est composé d'un corps central à étage, à fronton triangulaire, avec à ses extrémités deux pavillons formant des ailes en retour. Le perron est en forme de fer à cheval, tandis que les toits sont mansardés.  Le projet prévoit que le château abrite 80 lits (60 en configuration école maternelle) répartis dans une vingtaine de chambres, dont deux accessibles aux handicapés. Une salle de restaurant, une cuisine centrale et un centre de loisirs seront installés dans des dépendances toujours libres. Mais, avant cela, il faudra refaire tout l'intérieur du château, aujourd'hui délabré. La gestion a été déléguée à un organisme de tourisme associatif qui reversera un loyer à la commune. Les travaux ont commencé au cours de l'été 2013 et devraient duré 18 mois.","habitants":"famille de Bizemont\"","divers":"Château de Gironville                                                                   GPS : 48° 22' 18\" Nord, 2° 22' 48\" Est","gps":"48° 22' 18\" Nord, 2° 22' 48\" Est","images":["../image/image_91/91_Gironville_1.jpg"]},"Consult_chateau_formulaire7256":{"id":"Consult_chateau_formulaire7256","dept":"91","canton":"Evry","commune":"Evry","nom":"Grand_Bourg_Evry","type":"Château","periode":"XV-","histoire":"GRAND BOURG, la terre dEvry, qui se confondait à lépoque avec celle de Ris-Orangis, était au XVIIe siècle séparée en deux seigneuries: le Grand Bourg et pour le distinguer, le Petit Bourg. A lépoque, le château était nommé château de Grand Bourg, une altération de deux mots celtes ou germains: Gaul et bot, qui signifiaient Bois profond ou Bois élevé. Le château, porte désormais le nom du dernier propriétaire du château \"Bataille\". Le fief de Grand Bourg est passé en de nombreuses mains de seigneurs et de nobles, dont entre autres celles de la famille de Longueil, Jean Gallant, Louis Barbier, et Pierre Germain de Blanchebarbe, le premier propriétaire connu du château de Grand-Bourg. Son arrière-petit-fils, Ange Charles Guillemin de Courchamp en était le propriétaire durant la Révolution, période durant laquelle le château est une première fois pillé et laissé à labandon pendant vingt ans. En 1809, à la mort de Courchamp, la famille Davy de Chavigné, issue de la noblesse, se porte acquéreur du domaine. En 20 ans le domaine triple sa superficie, et fait alors 11 ha, des communs et une orangerie sont construits. Les bassins, fontaines et statues reprennent leurs places dans le parc, auprès des arbres centenaires. Madame de Chévigné, vieillissante, cède la maison à un notaire en retraite, Jean Marie Typhaine-Desaunaux, en 1862. A sa mort, sa veuve ne viendra que très rarement dans le domaine. Vers 1850, les surs de Sion s'installe dans une propriété du domaine, rue Ratisbonne, donnée par M.Ravenaz au Père Ratisbonne pour que celui-ci y installe une maison d'éducation religieuse.","architecture":"Grand-BOURG  M. Denfert-Rochereau, grand nom de lhistoire de France, fût propriétaire du domaine en 1880, jusquà son suicide en 1889. Il étend encore le domaine et fait construire un belvédère, des chenils, un colombier, une volière, une serre et un hangar. A sa mort cest Sophie Caroline Piollet, veuve Schmidt, qui hérite du château et de ses huit hectares de parc. Celle-ci décède en 1895 et laisse la propriété à son fils ; Jacques Frédéric Schmidt, qui remettra le parc en état et fit notamment construire une salle de billard et une salle de jeu. Ce dernier cèdera la demeure trente ans plus tard, en 1920 à Jean Joseph Louis Marcel Bataille. Le domaine Bataille est alors constitué de lauberge de la Nouvelle Hollande,du château, des écuries, du garage, de la salle de jeu, de la remise, des logements de concierges du belvédère, du colombier, de la maison du jardinier, de lorangerie, et des chenils qui seront démolis en 1926. A sa mort en 1942, il laisse le domaine à son épouse qui le délaissera et vendra lauberge à létat de ruine, puis le surplus du terrain à une société qui le morcellera. Lexcédent, dont le château Bataille, sera acquis par la commune en 1987 pour un franc symbolique. Propriété de la commune depuis 1987, le château Bataille et son parc de sept hectares ont été laissé à l'abandon de nombreuses années, avant de devenir propriété de la ville d'Evry et de faire l'objet d'un projet de rénovation et de réaménagement. Depuis 2010, le château s'est donc transformé, il est maintenant composé de 16 appartements. Il est visible à l'entrée du service des arts visuels.","habitants":"famille de Longueil,\"","divers":"château du Grand-Bourg à Evry","gps":"","images":["../image/image_91/91_Grand_Bourg_Evry_1.jpg","../image/image_91/91_Grand_Bourg_Evry_2.jpg","../image/image_91/91_Grand_Bourg_Evry_3.jpg"]},"Consult_chateau_formulairea8d5":{"id":"Consult_chateau_formulairea8d5","dept":"91","canton":"Etampes","commune":"Chalo st-Mars","nom":"Grand_St_Mars","type":"Château","periode":"XVII-XIX","histoire":"GRAND ST-MARS, la \"Maison à Chalo-Saint-Mars, bâtiments et clos est dite rebâtie à neuf en 1682\". Toutefois l'état actuel du bâtiment, agrandi et transformé au cours des XIXe et XXe siècles, n'a pas permis d'identifier avec certitude cette \"maison\" ou des vestiges de celle-ci. Au début du XVIIe siècle, le Grand Saint-Mars aurait été habité par Marie Crestard, appelée dame de Chalo-Saint-Mars. Le domaine figure peut-être parmi les \"acquisitions faites le 30 avril 1600 par Marie Crestard, veuve Philémon Danfroy et depuis femme de Jean Delacroix, de Claude et Frangois Chaudé\". En 1695, le domaine appartient à une héritière de celle-ci, Marie de Savoye, qui épouse cette année-la Jacques Philippe de Prunelé : \"la maison de Saint-Mars était propre de ladite Marie Desavoye comme fille et héritière de Benoist Desavoye, son père, lequel possédait tout lesdits biens (sauf quelques acquisitions qu'il avait faites) en qualité de donataire de Jehan Delacroix son oncle, qui avait épousé Marie Crestard (première acquéreur de la maison de Saint-Mars) suivant le testament olographe dudit Jean Delacroix en datte du 7 mai 1659 (Etampes, Etude Gangnard, Donation entre vifs du 4 mai 1750)\". En 1750, à L'occasion de la donation en faveur d'Henri de Prunelé, père d'Augustin Marie Etienne de Prunelé, une description sommaire fournit quelques indications sur les parties constituantes \"la maison ou château de Saint-Mars située entre les deux rivières dudit lieu avec tous les bastiments, et cour. Le partage de la succession de M. Jacques Philippe de Prunelé (1759) n'apporte aucune précision supplémentaire.","architecture":"GRAND ST-MARS, il apparaît toutefois que Méhu a réalisé ce projet on collaboration avec Julien Barbier. En effet, la chapelle du château figure en tête des travaux de ce dernier dans la demande d'admission qu'il adresse le 8 septembre 1934 à la société centrale des architectes. Quant au logis principal, Barbier avait effectué des travaux consistant dans le \"lancement en sous-oeuvre d'un plateau en béton armé sous tout le château (les pieux et longrines de fondations étant pourris par suite de l'abaissement des eaux du sol dans la région)\". Enfin, l'agrandissement des communs du château fut également réalisé par Julien Barbier en 1897-1900, seule la maison appartenait au vicomte de Prunelé en 1827. le plan actuel du château se compose d'un corps central flanqué de deux pavillons en légère saillie. A cette époque, les trois maisons voisines ne semblent pas faire partie du domaine. C'est seulement en 1898, que ces bâtiments sont indiqués comme appartenant à madame Masse de Combles, puis a son fils. Comme pour la chapelle, c'est a ce dernier qu'il faut attribuer l'initiative des travaux réalisés par Barbier. La description de la matrice porte pour 1900 : maison, écurie, remise, ce qui correspond bien aux agrandissements de 1897-1900. Ces indications sont par ailleurs confirmées par Legrand : le propriétaire actuel eut tout récemment l'excellente idée de raser les vieux bâtiments qui tombaient en ruines, de reporter sur la droite les écuries et remises et d'édifier à leur place en retour d'équerre une chapelle.","habitants":"Famille de Marie Crestard,\"","divers":"A  Chalo st-Mars, châtau de Grand  st-Mars GPS : 48° 25' 32,58\" Nord, 2° 04' 2,45\" Est","gps":"48° 25' 32,58\" Nord, 2° 04' 2,45\" Est","images":["../image/image_91/91_Grand_St_Mars_1.jpg","../image/image_91/91_Grand_St_Mars_2.jpg"]},"Consult_chateau_formulairebfab":{"id":"Consult_chateau_formulairebfab","dept":"91","canton":"Viry-Châtillon","commune":"Grigny","nom":"Grigny_Essonne","type":"Château","periode":"XVI-XVIII","histoire":"trois châteaux dans cet article; Arbalettes,  Morsang et Orgeval.                 ARBALETES, du château de lArbalète, aujourdhui totalement détruit, il ne subsiste plus que le parc et les communs. Ceux-ci nont rien de véritablement remarquables, mais ils sont les plus anciens bâtiments existant sur la commune de Grigny. Lorigine du château de l'Arbalète remonterait au XVIe siècle. En 1552, Guy III de lArbalète devient seigneur engagiste de Corbeil, il est probable quà cette époque il cherche à installer une maison des champs à Grigny. Elle fut créée par lachat de la moitié du grand fief de la Clochette, lautre moitié ayant été légué à lHôtel Dieu de Paris. Ce château de Grigny fut détruit au début du XIXe siècle. Une rumeur a couru sur le château qui nest pas fondée mais qui le fait rentrer dans la légende : Henri IV laurait fait construire pour lune de ses maîtresses..                                                                                                      ORGREVAL, à Villemoisson sur Orges  à deux K. M. de Morsang, c'était un manoir, de style Art-Nouveau. La construction du château d'Orgeval date de 1887 puis, de 1904 à 1905, pour Hector Guimard à Villemoisson-sur-Orge à la suite de la demande d'Achille Laurent. Il fut décerné \"Premier Prix\" au concours de façades de la Ville de Paris. Édifié par Mr. Laurent, Promoteur principal du Bois de Villemoisson, sur les plans de l'architecte Hector Guimard, célèbre pour plusieurs réalisations et pour avoir conçu les anciennes bouches de métro. Il est décédé aux États-Unis en 1942. Le Château d'Orgeval est inscrit aux M.H. le 15/01/1975.","architecture":"A  deux K.M. à l'ouest  MORSANG  Pierre Durey d'Harnoncourt acquiert cette propriété en 1739 et construit l'actuel château  sur l'emplacement de la maison plate des premiers seigneurs de Morsang. La propriété revient à sa fille, épouse de Louis Jean de Bertier de Sauvigny. En 1788, Louis Benigne François de Bertier prend la succession. Intendant de la Généralité de Paris, il est massacré dans les premiers jours de la Révolution. En 1844, son fils, Anne Ferdinand, vend le château. Après avoir appartenu successivement à diverses familles, celui-ci est racheté par Christian de Bertier en 1909. Il y effectue de gros travaux, la construction de la galerie entre les deux ailes en retour, et celle de l'actuelle salle des mariages qui termine l'ensemble au nord. En 1946, l'association diocésaine y ajoute un bâtiment reliant le château du XVIIIe siècle aux communs du XVIe siècle.\nÉléments protégés MH : les façades et les toitures, l'escalier principal avec sa rampe en fer forgé, les pièces suivantes avec leur décor : la bibliothèque, le petit et le grand salon à la suite au rez-de-chaussée et la chambre face à l'escalier au premier étage: inscription par arrêté du 5 juillet 1979.","habitants":"Famille de  Pierre Durey d'Harnoncourt \"","divers":"a Grigny  trois châteaux, Arbalettes grav -1-2,  Morsang grav 5-6-7-8                                                  et Orgeval grav-3-4.  Morsang GPS : 48° 39' 53,06\" Nord, 2° 21' 6,98\" Est","gps":"48° 39' 53,06\" Nord, 2° 21' 6,98\" Est","images":["../image/image_91/91_Grigny_Essonne_1.jpg","../image/image_91/91_Grigny_Essonne_2.jpg","../image/image_91/91_Grigny_Essonne_3.jpg","../image/image_91/91_Grigny_Essonne_4.jpg","../image/image_91/91_Grigny_Essonne_5.jpg","../image/image_91/91_Grigny_Essonne_6.jpg","../image/image_91/91_Grigny_Essonne_7.jpg","../image/image_91/91_Grigny_Essonne_8.jpg"]},"Consult_chateau_formulairee4c4":{"id":"Consult_chateau_formulairee4c4","dept":"91","canton":"Dourdan","commune":"Janvry","nom":"Janvry","type":"Château","periode":"XVI-XVII","histoire":"JANVRY, lorsque le baron Jean Reille est arrivé au château de Janvry à son retour de la guerre, des ronces et des orties poussaient dans certaines pièces de la maison. Assisté de sa femme Liliane, née Ubald Bocquet, Jean Reille a entamé des travaux en refaisant la toiture, installant leau courante et l'électricité et restaurant les pièces du château. Son fils, Ghislain Reille a poursuivi cette uvre lorsqu'il a repris la demeure dans les années 1980. il a été inscrit au titre des monuments historiques en 1981.","architecture":"JANVRY, a été construit entre 1600 et 1650 dans un style architectural typiquement Louis XIII. Le château est composé d'un pavillon principal, de communs, et de douves,  Mais durant la Révolution de 1789, l'édifice fut dévalisé avec tous les documents; son exploitation et son histoire disparurent. Déla
