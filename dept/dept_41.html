ique ; toit à longs pans ; pignon couvert ; croupe et noue, recouverts de tuiles plates.  M de Baudreuil propriétaire en 1930.","architecture":"FROGERES, a elle seule, entre les jardiniers, les gardes-chasses et les femmes de chambres, la famille Seydoux donnerait du travail à au moins à une demi-douzaine d'habitants de Saint-Viâtre, une petite commune du Loir et Cher, au cur de la Sologne. Les parrains du cinéma français y possèdent le château de Frogères. Bien entendu, comme tout grand propriétaire solognot, il possède en sus des dizaines d'hectares de forêt pour la chasse, mais surtout d'immenses terres agricoles. C'est Jérôme, l'aîné, qui est en charge du domaine.                                                                                                                 PETIT-POIS, fief dépendant de la Ferté Beauharnais attesté en 1447, comprenant une motte, un fossé, un portail, une clôture et une métairie, la motte et le fossé sont encore visibles. Le château actuel a été construit en 1819, il se compose d'un sous-sol et un étage carré, gros-oeuvre en brique, pierre et enduit partiel, l'édifice est surmonté de toit en pavillon ; toit à longs pans et croupe, recouverts d'ardoise et tuiles plates.                                                   VERVILLON. M. Paul Gitton propriétaire en 1930.","habitants":"Favelle M de Baudreuil et seigneurs locaux                \r\n        \"","divers":"à Saint-Viâtre ; Arsendrie grav-7-8, Auteroche grav- 1, Favelle grav-2-3-4, Frogères grav-5-6, Petit-Pois, Vervillon-grav-9.","gps":"","images":["../../jctruffet.com/image/image_41/41_St_Viatre_1.jpg","../../jctruffet.com/image/image_41/41_St_Viatre_2.jpg","../../jctruffet.com/image/image_41/41_St_Viatre_3.jpg","../../jctruffet.com/image/image_41/41_St_Viatre_4.jpg","../../jctruffet.com/image/image_41/41_St_Viatre_5.jpg","../../jctruffet.com/image/image_41/41_St_Viatre_6.jpg","../../jctruffet.com/image/image_41/41_St_Viatre_7.jpg","../../jctruffet.com/image/image_41/41_St_Viatre_8.jpg","../../jctruffet.com/image/image_41/41_St_Viatre_9.jpg"]},"Consult_chateau_formulaire3731":{"id":"Consult_chateau_formulaire3731","dept":"41","canton":"Ouzouer le Marché","commune":"Suèvres","nom":"Suèvres","type":"Château","periode":"XV-XVII-XIX","histoire":"Cinq  châteaux à Suèvres, celui de Bonneau, de la Grenouillière, de Forges, Laloin et st-Diziers.                                                                                                            LALOIN, c'est devenu l'Hôtel La Colonie. Le premier château fut acheté par Mgr Gervaise, évêque-abbé, missionnaire et prévôt de Suèvres, qui fut mangé par les cannibales en 1729 près de lOrénoque en Amérique du Sud. Pendant la guerre de 1870, le château actuel fut occupé par le prince Frédéric-Charles de Prusse, dit le « Prince rouge ».                                                                                  St DIZIERS,  châtellenie qui releva un temps du comté de Beaugency. Le château comprend deux parties distinctes. L'aile droite date des XVe et XVIe siècles. Le corps central est du XVIIe siècle et a été restauré vers 1860, époque à laquelle fut construite la chapelle. La façade sur cour de l'aile droite est flanquée de deux tours rondes donnant sur les douves. Celle de droite est doublée par une tourelle d'escalier polygonale, hors oeuvre. Le bâtiment principal est précédé d'une terrasse dont les extrémités présentent des tourelles à pans coupés, ainsi que l'avant de la façade. Un sous-sol est desservi par une galerie sur toute la longueur du château.                                                         BONNEAU a été commandité par Eugène Trégnier, ancien Député-Maire et Président du Loir-et-Cher. Il a été construit par larchitecte Charles-Joseph Pinsard, entre 1889 et 1892. C'est un élégant manoir en briques et en pierres blanches, construit au XIXe siècle dans un grand parc traversé par la Tronne de Diziers.","architecture":"GRENOUILLERE  Elle date du XVIIIe siècle et se situe dans la Vallée de la Loire entre les communes de Suèvres et de Mer. Il est fait mention de la seigneurie de la Grenouillère avant 1500. La Grenouillère appartenait à la Famille Baudet, puis il  sera transmis, en 1674, à la Famille Court. Il est de style Moyen-Age, début Renaissance, au XIXe siècle, il était composé dune maison de maitre, dune basse-cour, d'une grange, d'une écurie, d'un pressoir et d'une fontaine. Bâti au coeur d'un parc de 12Ha, il est entouré de douves. En 1791, Claude Chéreau, régisseur de Diziers en et propriétaire, le rachètera . Au fil des ans, de nombreux propriétaires se succèderont ensuite. Il n'est pas inscrit aux M.H. C'est un château privé,  Seul le parc a été transformé en terrain de camping.                                 LALOIN  En 1939, le château fut réquisitionné pour héberger des épouses de mobilisés avec leurs enfants. Juste après la guerre, le château devient une colonie de vacances de lUAP pendant 50 ans. Pour assurer la sécurité des enfants, des travaux importants daménagement commencent à dénaturer le site. En 2008, il devient un hôtel avec chambres dhôtes qui accueille des animations diverses : lotos, thés dansants, spectacles de cabaret avant de péricliter quelque peu. Cest dire le soulagement ressenti à Suèvres à lannonce du rachat du château par Hervé Archambeau, qui prévoit une remise en état à lidentique et des animations musicales de qualité « Autour du piano », nom donné aux concerts quil organise depuis longtemps à Paris. « De grandes espérances » donc pour reprendre le titre du roman de Charles Dickens, contemporain exact de la reconstruction de Laloin dans les années 1860, et le souhait de voir renaître cette composante exceptionnelle du patrimoine local. Le château Laloin est revendu le 3/03/2018 à Hervé Archambeau, acquéreur. Après avoir abrité des colonies de vacances, l'édifice est aujourdhui transformé en hôtel.","habitants":"Laloin, Mgr Gervaise,                                                 Grenouillière,Famille Baudet\r\n        \"","divers":"à Suèvres, celui de Bonneau grav-1, de la Grenouillière grav-3, de Forges grav-2, Laloin grav-4 et st-Diziers grav_5.                                              Bonneau GPS : 47° 40' 02\" Nord, 1° 27' 42\" Est                                                       Diziers  40' 48\" Nord et 1° 27' 38\" Est                                                                Grenouillére : 47° 41' 08\" Nord et 1° 29' 13\" Est                                          Forges 47° 40' 01\" nord, 1° 27' 54\" Est","gps":"47° 40' 02\" Nord, 1° 27' 42\" Est","images":["../../jctruffet.com/image/image_41/41_Su%c3%a8vres_1.jpg","../../jctruffet.com/image/image_41/41_Su%c3%a8vres_2.jpg","../../jctruffet.com/image/image_41/41_Su%c3%a8vres_3.jpg","../../jctruffet.com/image/image_41/41_Su%c3%a8vres_4.jpg","../../jctruffet.com/image/image_41/41_Su%c3%a8vres_5.jpg"]},"Consult_chateau_formulaire7f65":{"id":"Consult_chateau_formulaire7f65","dept":"41","canton":"Ouzouer le Marché","commune":"Talcy","nom":"Talcy","type":"Forteresse","periode":"XIV-XVI","histoire":"A Talcy le château de Talcy, de Cerqueux et de Fontenailles.                                                                                     TALCY, fut au XIIIe siècle une seigneurie, en 1466 Pierre Simon  magistrat parisien achète le domaine aux crièes du palais de justice de Paris et font élever un donjon carré, sa fille Marie vend en 1517 Talcy à Bernardo Salviati, parent des Médicis et riche banquier florentin attaché à la cour de François 1er, c'est aux environs de 1520 que Salviati édifie sa nouvelle demeure, la demeure de Talcy, reste étrangère à la mode italienne, sans recherche décorative et conservant plutôt l'aspect d'un édifice de la fin du Moyen-âge. C'est aux environs de 1520 qu'il achète le château et ses dépendances.  Et  les Salviati édifie sa nouvelle demeure. En 1531, Madeleine de la Tour d'Auvergne épouse de Bernardo Salviati donne naissance à une fille Cassandre,  en 1545 rencontre de Pierre de Ronsard et de Cassandre Salviati. En 1571 rencontre d'Agrippa d'Aubigné et  de Diane de Salviati et en 1667 se défont du domaine racheté par l'état en 1932.                                                                                                              A une dizaine de km à l'est à Josnes le château de CERQUEUX, du côté de l'arrivée par la cour bordée d'anciennes douves, un grand bâtiment se présente avec ses deux pavillons en avancée dont les toits rejoignent le sien en pénétration, est prolongé de deux ailes, un peu plus basses, en retour perpendiculaire. Balcons en fer forgé Louis XV. L'entablement à grosse doucine de l'ensemble n'est pas postérieur au XVIIe siècle. Au centre des deux façades se trouve un fronton du XVIIIe siècle, le grand perron à huit marches doit dater de cette époque. Côté parc, la façade du bâtiment central est plus longue et comporte les mêmes balcons de fer forgé. Elle est prolongée de chaque côté par deux petites tours carrées entièrement saillantes. Une des ailes, à l'est, servait d'orangerie. Les intérieurs datent tous du XVIIIe siècle et sont entièrement ornés de boiseries, le plus souvent de style Louis XV.","architecture":"FONTENAILLES, la construction date du XVIe siècle. Ce fief appartenait aux descendants des Montgommery (dont un des membres est celui qui blessa à mort le roi Henri II lors d'un tournoi), les Durfort  comtes et ducs de Lorges, qui préférèrent transférer leur Duché à Quintin, en Bretagne et, qui vendirent leurs terres de Beauce, à la fin du XVIIe siècle. Elles furent rachetées au XVIIIe siècle, par les Tassin de Charsonville. C'est un château inscrit aux M.H. depuis 1928.                                                                                                         TALCY, l'accès, au sud, se fait par un châtelet d'entrée de plan carré,un donjon massif de deux étages cantonné de trois tours polygonales aux angles. Un large chemin de ronde continu, relie les tourelles, porté par un mâchicoulis très proéminent. Les consoles, moulurées de larges doucines et de quarts de rond se développent sur un triple ressaut. Une arcature relie les consoles sur les murs sud et ouest, alors que du côté nord et  le parapet n'est pas échancré, peut-être en raison d'une interruption des travaux. Le mâchicoulis n'a pas été terminé au niveau de la tour nord-est. Le chemin de ronde, inopérant, s'apparente plus à un promenoir qu'à un organe défensif. L'aspect du châtelet d'entrée est un choix esthétique et symbolique. Dans la cour, restent l'aile ouest et un portique de quatre travées qui relie le châtelet et l'aile ouest, les arcades surbaissées retombent sur trois piliers sans chapiteau. C'est aussi l'époque où s'élèvent les grands châteaux Renaissance du Val de Loire et pourtant, la demeure de Talcy, reste étrangère à la mode italienne sans recherche décorative et conserve plutôt l'aspect d'un édifice de la fin du Moyen-âge. Éléments protégés MH : le château, classé par arrêté du 4 août 1908 et par arrêté du 29 mars 2005.","habitants":"Fontenailles; les Tassin de Charsonville                              Talci; Bernardo Salviati\r\n        \"","divers":"A Talcy le château de Talcygravde 1 à 5, de Cerqueux grav-9 et de Fontenailles grav_6-7-8.                                                Fontenailles : 47° 47' 33\" Nord et 1° 29' 05\" Est                                                                 Talcy : 47° 46' 11\" Nord et 1° 26' 39\" Est                                                   Cerqueux 47° 46' 38\" nord, 1° 32' 44\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Talcy_1.jpg","../../jctruffet.com/image/image_41/41_Talcy_2.jpg","../../jctruffet.com/image/image_41/41_Talcy_3.jpg","../../jctruffet.com/image/image_41/41_Talcy_4.jpg","../../jctruffet.com/image/image_41/41_Talcy_5.jpg","../../jctruffet.com/image/image_41/41_Talcy_6.jpg","../../jctruffet.com/image/image_41/41_Talcy_7.jpg","../../jctruffet.com/image/image_41/41_Talcy_8.jpg","../../jctruffet.com/image/image_41/41_Talcy_9.jpg"]},"Consult_chateau_formulairebe32-2":{"id":"Consult_chateau_formulairebe32-2","dept":"41","canton":"Selles sur Cher","commune":"Theillay","nom":"Theillay","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux à Theillay  celui de la Frégéolière et de Rere.                                                                           FREGEOLIERE   Ancien relais du XVIIIe siècle , est composé d'une maison de maitre du XVIIIe et de trois dépendances dans le style Solognot du XIXe siècle qui constituaient un corps de ferme. Situé sur un domaine de trois hectares, face à l'étang auquel il donne son nom, le bâtiment était initialement la propriété d'une famille dont le nom était \"Frégeolerie\" et qui par déformation est devenu La Frégeolière. Il n'est donc en aucun cas apparenté à la famille \"Bernard de La Frégeolière\". Il s'agit d'un château devenu un gîte d'hôtes.","architecture":"RERE, construit au XVIIe siècle, Il a été érigé par le comte Pierre d'Orléans sur les vestiges d'un château féodal. Un des plus anciens domaines familiaux de France, transmis de père en fils depuis 22 générations, ce beau château, tout de briques et pierres, s'élève au milieu d'une grande cour entourée de douves alimentées par le ruisseau de la Rère qui lui a donné son nom. Le château est composé d'un grand corps de logis central avec un étage flanqué de deux avant-corps carrés. Sur l'autre façade il est encadré par deux tours circulaires à lanternons. A l'entrée de la cour d'honneur, deux tours rondes isolées montent la garde. Depuis le XIIe siècle, cette demeure appartient à la famille des comtes d'Orléans qui tirent leur titre et leur nom des fonctions qu'ont occupées leurs ancêtres. En effet, avant même d'être l'apanage du frère du roi, le comté d'Orléans fut administré par un fonctionnaire qui avait le titre de vicomte (le comte étant le roi lui-même). Alors cette famille conserva ultérieurement ce titre et devint la souche de l'actuelle famille des comtes d'Orléans qui possède toujours le château de Rère, mais qu'il ne faut pas confondre avec les divers ducs d'Orléans de la famille de France. aujourd'hui chambre d'hôtes de charme.","habitants":"Frégeolière,famille de  Frégeolière                                                Rere ;comte Pierre d'Orléans\r\n        \"","divers":"à Theillay  celui de la Frégéolière grav 1-2 et de Rere grav-3-4.                                                                                   Frégolière 47° 18' 52\" Nord et 2° 02' 28\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Theillay_1.jpg","../../jctruffet.com/image/image_41/41_Theillay_2.jpg","../../jctruffet.com/image/image_41/41_Theillay_3.jpg","../../jctruffet.com/image/image_41/41_Theillay_4.jpg","../../jctruffet.com/image/image_41/41_Theillay_5.jpg"]},"Consult_chateau_formulairea6ee":{"id":"Consult_chateau_formulairea6ee","dept":"41","canton":"Onzain","commune":"La Chapelle Vendômoise","nom":"Toisy","type":"Château","periode":"XVIII","histoire":"La CHAPELLE, le patrimoine architectural de la commune comprend deux édifices portés à l'inventaire des monuments historiques : le dolmen de la Pierre Levée, classé en 1889 et le château de Toisy, inscrit en 1982.                                                                                                                                 TOISY, le château a été acheté par Lavoisier qui y a mené plusieurs expériences de chimie, notamment de séchage de tabac.","architecture":"TOISY, a cet effet il aurait fait aménager la tour d'angle (pigeonnier). D'un édifice de la fin du XVe siècle, il ne reste, à l'extérieur, que les fenêtres de l'étage de comble, à l'intérieur, un escalier à vis noyé dans la maçonnerie au moment des transformations plus tardives. L'ensemble a été remanié au XIXe siècle. Le château, qui conserve à l'ouest des douves réaménagées à la fin du XVIIIe, devait être ceinturé à l'origine d'un système défensif complet, comportant plusieurs tours d'angle. Il reste une grande tour couronnée d'un chemin de ronde à mâchicoulis, archères, et petites baies rectangulaires formant créneaux. C'est à la fin du Moyen-Age que la tour a été transformée en pigeonnier avec plus de 2000 nichoirs en brique. A la fin du XVIIIe siècle, Lavoisier fit plâtrer les cases inférieures sur une hauteur de deux mètres pour installer un laboratoire. Georges Bernanos, romancier et polémiste, habita La Chapelle-Vendômoise, au château de Thoisy, en 1946. Éléments protégés MH : la cheminée située au rez-de-chaussée du château, les façades et les toitures de la tour pigeonnier : inscription par arrêté du 4 octobre 1982.","habitants":"famille Lavoisier\r\n        \"","divers":"A la Chapelle Vendômoise  dont la chapelle 47° 40' 18\" nord, 1° 14' 24\" Est                                                                      Toisy   47° 40' 53\" nord, 1° 14' 38\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Toisy_1.jpg","../../jctruffet.com/image/image_41/41_Toisy_2.jpg","../../jctruffet.com/image/image_41/41_Toisy_3.jpg"]},"Consult_chateau_formulairecfe1":{"id":"Consult_chateau_formulairecfe1","dept":"41","canton":"Vineuil","commune":"Cheverny","nom":"Troussay","type":"Château","periode":"XV","histoire":"TROUSSAY, en 1545 Robert Bugy propriétaire du domaine et en 1732 à la famille de Pelluys par alliance passe ensuite aux Réméon et en 1828 à Louis de la Saussaye  qui en hérite.  Ce manoir fut fortement restauré entre 1850 et 1873, par l'architecte départemental Jules de La Morandière, le successeur de Duban à Blois, pour l'historien, archéologue et collectionneur, Louis de La Saussaye. C'est dans cette reconstruction pensée et dirigée par une personnalité éminente du Blésois que réside aujourd'hui l'intérêt de Troussay. Après la Révolution et les destructions qu'elle provoqua, suscita la création des grandes sociétés savantes et d'une émulation pour la conservation du patrimoine. Il est l'un des éminents antiquaires de cette génération éclectique, autodidacte passionné par l'histoire médiévale et l'archéologie naissante. Ce collectionneur fut correspondant de Mérimée pour la première Commission des M.H.. C'est dans l'architecture et la décoration du château de Louis XII et de François Ier que La Saussaye trouva les modèles d'inspiration pour la reconstruction de sa maison entreprise au même moment. Il en résulte un château réinventé où sont reconstitués les styles gothique et Renaissance. Le nouveau château de Troussay est la création architecturale d'un érudit collectionneur, qui, malgré la doctrine énoncée de respecter autant que possible l'état ancien, révèle le goût très caractéristique du milieu du XIXe siècle qui cherchait à recréer une atmosphère plutôt que l'authenticité. Les dépendances abritent un musée régional ainsi qu'une exposition sur la domesticité dans les châteaux d'autrefois.","architecture":"TROUSSAY, Bâti au XVe siècle, avec ses dépendances, sur un quadrilatère régulier, une ancienne plate-forme fossoyée, cette modeste demeure seigneuriale adopte le parti traditionnel du petit château solognot de la fin du Moyen-Age. Les trois bâtiments, logis et bâtiments de dépendances, sont implantés en U autour d'une cour fermée au sud par un muret. Le logis est placé au fond de  la cour. l'édifice consiste dans un corps de logis central à trois travées  élevé sur un rez-de-chaussée, un étage carré et un étage de comble, chevauché par deux lucarnes de pierre à tympan triangulaire, ce corps  est flanqué de deux ailes basses terminées par des tourelles offrent un appareil polychrome de briques roses et noires dessinant un damier, dont le toit d'ardoise est sommé par un lanternon. En retour se déploient les corps bas des dépendances,  repris à la Renaissance pour un écuyer, contrôleur au grenier à sel de Blois, Louis de la Saussaye sauva de la destruction de nombreux objets d'art et fragments d'architecture, dont certains de très grande qualité, qu'il fit remonter à Troussay : vitraux civils du XVIe siècle, attribués aux anciens hôtels de Guise et Sardini, à Blois, menuiseries gothiques et Renaissance des fenêtres de maisons démolies lors des grands travaux de voirie, sculpture de l'hôtel Hurault de Cheverny, dans la même ville, chapiteau et porte (l'un des plus remarquables témoins de la sculpture sur bois de la Renaissance) provenant de la célèbre chapelle du château d'Onzain et peut-être par là du château de Bury, édifice dont le rôle fut capital dans l'histoire de la première Renaissance française. La valeur architecturale de l'oeuvre conjointe de La Saussaye et de La Morandière, est modeste. L'architecture, bien que soignée, apparaît banale. Mais l'originalité et l'intérêt résident dans la pensée qui a présidé à la restauration de Troussay.","habitants":"famille de Pelluys\r\n        \"","divers":"A Cheverny château de Troussay  47° 29' 29\" Nord et 1° 25' 29\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Troussay_1.jpg","../../jctruffet.com/image/image_41/41_Troussay_2.jpg","../../jctruffet.com/image/image_41/41_Troussay_3.jpg","../../jctruffet.com/image/image_41/41_Troussay_4.jpg"]},"Consult_chateau_formulaire7dcd":{"id":"Consult_chateau_formulaire7dcd","dept":"41","canton":"Montrichard","commune":"Vallières les Grandes","nom":"Vallières_Grandes","type":"Château","periode":"XVII-XIX","histoire":"THOMASSERIE, Louis XIV en pied devant une ville assiégée, d'après le portrait réalisé par Hyacinthe Rigaud. Le portrait est signé Louis-Alexandre Lefebvre. Le jeune Louis XV est également représenté en pied et en armure, d'après une oeuvre de Jean-Baptiste Van Loo.  \r\nÉléments protégés MH : le corps de logis central avec ses décors en totalité, les façades et les toitures des corps de bâtiments formant les ailes de la cour d'honneur, enfin le pont d'accès et les douves maçonnées entourant le château : inscription par arrêté du 22 septembre 2009.","architecture":"THOMASSERIE, pavillon de chasse de plan en U avec façade sur cour et façade sur parc, le tout entouré de fossés en eau. La composition actuelle du domaine se répartit sur deux cours. Le corps central est composé d'un vaste vestibule ouvert de chaque côté par de larges portes. Les pièces latérales forment une suite de salons, d'une bibliothèque et d'une salle à manger qui conserve un ensemble de lambris et de placards en bois dont le panneautage pourrait être des premières années du XVIIIe siècle. Aux deux extrémités du corps de logis central, des bâtiments de communs ont été transformés afin d'augmenter le nombre de pièces habitables. Dans les années 1920, l'aménagement de l'aile ouest a entraîné l'ajout d'un niveau et le tout a été prolongé par une orangerie. L'édifice conserve un vestibule unique, pourvu d'un plafond peint à voussure, le sujet représenté est celui du char de Diane encadré par des allégories des quatre saisons, ce décor peint exécuté sur une préparation rouge, est complété par un portrait royal, peint sur les manteaux de pierre des cheminées des murs de refends.                                                                                                          GUILLOTIERE, la construction du château de la Guillotière date du XIXe siècle.","habitants":"Louis XIV\r\n        \"","divers":"a Vallières les Grandes le château de l'Estautière,    la Thomasserie grav-1-2-3 et de  la Guillautiere grav 4-5                                                           47° 25' 25\" Nord, 1° 08' 52\"                                                           Thomasserie : 47° 25' 25\" Nord, 1° 08' 52\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Valli%c3%a8res_Grandes_1.jpg","../../jctruffet.com/image/image_41/41_Valli%c3%a8res_Grandes_2.jpg","../../jctruffet.com/image/image_41/41_Valli%c3%a8res_Grandes_3.jpg","../../jctruffet.com/image/image_41/41_Valli%c3%a8res_Grandes_4.jpg","../../jctruffet.com/image/image_41/41_Valli%c3%a8res_Grandes_5.jpg"]},"Consult_chateau_formulaire682e":{"id":"Consult_chateau_formulaire682e","dept":"41","canton":"Romorantin Lanthenay","commune":"Veilleins","nom":"Veilliens","type":"Château","periode":"XVII","histoire":"A Veilleins le château de Montgiron, de St-Hubert,  Tréfontaines pas d'information pour ce dernier.                                                                                                          St-HUBERT,  le baron d'Abboville propriétaire en 1930. SCI du château, société civile immobilière est en activité depuis 15 ans, elle est spécialisée dans le secteur d'activité de la location de terrains et d'autres biens immobiliers. Monique Lezclerc est gérante.                                                         MONTGIRON, en 1409  vendu par Martin Delameule aux frères Chauveau.  Vers 1500 le domaine passe à un sieur Gitton la génération suivante, au XVIe siècle marié à une Dulac fille du seigneur de Trésfontaine. En 1701 le château a été construit pour Étienne de Languedou, seigneur de Montgiron, la ruine des Languedou le château passe dans diffèrentes mains. En 1805 il passa à la famille de Henri Madeleine, marquis de Beaucorps de la Bastière sa veuve se défait en 1836 du domaine au profit de   la famille d'Espinay-Saint-Luc que le comte Robert d'Espinay le  possède toujours. Éléments protégés MH : les façades et les toitures du château et de ses communs, des deux pavillons à l'est et du rendez-vous de chasse au nord : inscription par arrêté du 9 décembre 2003.","architecture":"MONTGIRON,  du XVIIe siècle / XVIIIe siècle, demeure de brique et de pierre, dans ses douves : château, communs, deux pavillons, rendez-vous de chasse au nord. Inscrit au titre des M.H.   Présente une partie centrale encadrée de pilastres plats, surmontée d'un fronton en tympan et à chaque extrémité, un pavillon légèrement saillant. Du côté de la cour d'honneur, deux communs symétriques élevés au XVIIe siècle encadrent le château perpendiculairement, les éléments plus anciens sont les ailes basses compant chacune cinq travées, élevées sur un rez-de-chaussée et un étage de combles éclairés par des mansardes, La façade côté parc est prolongée, à chacune de ses extrémités, En face de chacune d'elles, se trouvent deux pavillons symétriques rectangulaires. Deux tours rondes sont placées aux autres angles. Les façades et les toitures du château et de ses communs, des deux pavillons à l'est, du rendez-vous de chasse au nord : inscription par arrêté du 4 décembre 1968, modifiée par arrêté du 9 décembre 2003.","habitants":"St-Hubert  Baron d'Abboville                           Montgiron,famille de Henri Madeleine\r\n        \"","divers":"A Veilleins le château de Montgiron grav-3-4-5, de St-Hubert grav-1-2,  Tréfontaines grav-6                                                           Montgiron  47° 26' 12\" nord, 1° 41' 22\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Veilleins_1.jpg","../../jctruffet.com/image/image_41/41_Veilleins_2.jpg","../../jctruffet.com/image/image_41/41_Veilleins_3.jpg","../../jctruffet.com/image/image_41/41_Veilleins_4.jpg","../../jctruffet.com/image/image_41/41_Veilleins_5.jpg","../../jctruffet.com/image/image_41/41_Veilleins_6.jpg"]},"Consult_chateau_formulaire8377":{"id":"Consult_chateau_formulaire8377","dept":"41","canton":"Vendome","commune":"Vendôme","nom":"Vendome","type":"Château-Vestiges","periode":"XI-XVII","histoire":"VENDOME, il est en ruines mais on peut se promener dans le parc du château. Il est classé aux M.H. depuis 1840. Les vestiges datent du XIe au XVIIe siècle et de sa collégiale Saint-Georges évoquent la puissance des comtes, puis ducs de Bourbon-Vendôme, qui se hissèrent jusquau trône de France avec Henri IV. Vendôme devient un duché en 1515 et les ducs et duchesses participent à la transformation de la ville. La comtesse Marie de Luxembourg (1462-1546) préside à lembellissement de la chapelle Saint-Jacques, de la porte Saint-Georges, de la collégiale du château et la reconstruction de léglise Saint-Martin. En 1623, César de Bourbon fonde le collège des Oratoriens qui devient plus tard le lycée Ronsard, et dont une partie des bâtiments hébergent l'hôtel de ville et l'office du tourisme actuels.Le coeur de lespace castral est occupé par un très beau parc du XIXe siècle, qui offre un panorama unique sur la ville ; cèdre de 1807 et collection dhortensias créés par la famille Mouillère, propriété de la ville.","architecture":"ORATOIRE COURTIRAS ,le logis est prolongé à l'ouest par une petite aile dont les pièces en enfilade sont ornées de boiseries du XVIIIe siècle et de cheminées en pierre Louis XV et Louis XVI. Un grand bâtiment à l'est de la cour, enserre la chapelle qui lui est perpendiculaire. Un autre bâtiment ferme la cour à l'ouest et sert d'habitation à la ferme. Ce bâtiment est prolongé par une fuye ronde. La cour de ferme est bordée par un bâtiment de servitude du XVIe siècle. L'ensemble architectural de l'oratoire n'a pas été modifié depuis le XVIIIe siècle.\r\nÉléments protégés MH : les façades et les toitures du château, de la chapelle et des dépendances y compris la fuye ; la grille d'entrée en fer forgé : inscription par arrêté du 16 décembre 1974                                                           VENDOME  vestiges,   la première fortification est un donjon quadrangulaire construit au XIe siècle, situé à la pointe nord ouest du promontoire rocheux dans une propriété appelée La Capitainerie. Lenceinte médiévale, dont les murs sont encore en partie visibles, date du XIIe siècle. La Tour de Poitiers, tour maîtresse, domine par sa taille cet ancien dispositif renforcé au XIVe siècle. Au XVIIe siècle, le duc César de Vendôme fait réaliser des aménagements, notamment une rampe daccès ainsi qu'une porte dentrée afin d'ouvrir le château vers lextérieur. Des logis construits deux siècles plus tôt, il ne reste que la base des tours qui dominent la rampe. Délaissé par les ducs de Vendôme, il est rattaché à la couronne en 1712, mais il nen obtient pas plus dattention. En 1791, la ruine de la demeure est confirmée par sa vente à divers propriétaires successifs. Le cèdre majestueux, planté en 1807, témoigne de son renouveau en tant que parc dagrément.\r\nÉléments protégés MH : les ruines du château de Vendôme : classement par liste de 1840.","habitants":"La comtesse Marie de Luxembourg\r\n        \"","divers":"Château de Vendome et l' Oratoire 47° 47' 37\" Nord, 1° 03' 59\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Vendome_1.jpg","../../jctruffet.com/image/image_41/41_Vendome_2.jpg","../../jctruffet.com/image/image_41/41_Vendome_3.jpg","../../jctruffet.com/image/image_41/41_Vendome_4.jpg","../../jctruffet.com/image/image_41/41_Vendome_5.jpg","../../jctruffet.com/image/image_41/41_Vendome_6.jpg"]},"Consult_chateau_formulaire2316":{"id":"Consult_chateau_formulaire2316","dept":"41","canton":"Ouzouer le Marché","commune":"Vievy le Rayé","nom":"Vievy_le_Rayé","type":"Château","periode":"XV-XVIII","histoire":"VIEVY le RAYE   Au XIe siècle, cette seigneurie était entre les mains de la famille de Montigny. L'un des membres de cette famille, qui s'appelait Rahier, laissa son nom au pays. Au XIIIe siècle, le château appartenait à la famille de Melun. Mais la famille de Beauxoncles le posséda pendant presque trois siècles du XVe au XVIIIe siècle.\r\nÉléments protégés MH : les vestiges de la tour : inscription par arrêté du 29 décembre 1927.","architecture":"VIEVY-LE RAYE vestiges d'architectures militaire, notamment le donjon polygonal tout à fait remarquable.                                                                             Au milieu des constructions plus récentes, il subsiste des vestiges de la forteresse primitive: les traces de l'ancien pont-levis et de l'ancien donjon ainsi que deux grosses tours rondes massives encadrant un corps de logis où subsiste une fenêtre à croisillons sur la façade extérieure. La façade intérieure est en brique losangée, une tourelle polygonale conserve également une porte Renaissance. La partie ancienne est visible de la route. Les murs sont recouverts d'un curieux enduit de couleur orangée qui est sans doute à l'origine de son nom : le château rouge.","habitants":"Famille de Beauxoncles\r\n        \"","divers":"a Vievy le Rayé grav-2  château le Rouge grav-1  et vestiges de la tour grav-3","gps":"","images":["../../jctruffet.com/image/image_41/41_Vievy_le_Ray%c3%a9_1.jpg","../../jctruffet.com/image/image_41/41_Vievy_le_Ray%c3%a9_2.jpg","../../jctruffet.com/image/image_41/41_Vievy_le_Ray%c3%a9_3.jpg"]},"Consult_chateau_formulaire26d0-2":{"id":"Consult_chateau_formulaire26d0-2","dept":"41","canton":"Savigny sur Braye","commune":"Ville_aux_Clerc","nom":"Ville_aux_Clercs","type":"Château","periode":"XVI-XVIII","histoire":"Plusieurs châteaux  à la Ville aux Clercs, la Métairie, la Forêt, la Gaudinière, à deux km au sud  à Busloup Mussets  et Dorières  à 5 km au nord à Chauvigny.                                                                                           GAUDINIERE Aujourd'hui il ne reste plus rien de cette somptueuse demeure qui a régenté le village et ses alentours durant de nombreuses décennies. Quelques ruines  perdues dans les bois et situées à 5 Kms de la Ville aux Clercs offrent aux promeneurs le témoignage de ce riche passé. Le château connut plusieurs alertes au feu, à la fin des années 1920 brulé en 1934 Le domaine fut alors vendu pour quelques milliers de Francs entre les années 1937 et 1938. C'est une société, filiale des \"Mines de Lens \" dans le nord de la France qui acheta l'ensemble du domaine pour le reboiser, afin de s'approvisionner en poteaux de mines. Les ruines furent alors démolies, dispersées, voire pillées.","architecture":"LA FORET, manoir datant de 1856 avec un charme fou et une décoration très ingénieuse. Hôtel Maryse Redon la gérante. Métairies Manoir avec tours et entrée exagonale.                                                                 DIORIERES, le fief des Diorières relevait de celui de Chauvigny. famille de Beauxoncles propriétaire en 1930.  Le fief des Diorières relevait de celui de Chauvigny. Le château actuel a été construit en 1737, remplaçant un château primitif détruit lors d'un incendie. De l'ancien château subsiste les douves disposées autour d'un espace rectangulaire marqué aux angles nord-ouest, et sud-ouest d'une tour ronde. Le château se compose d'un corps de logis rectangulaire dont la partie centrale est surmontée d'un fronton triangulaire. L'intérieur a été entièrement refait à la fin du XIX e siècle. Éléments protégés MH : les façades et les toitures du château et des deux tours subsistantes de l'ancien chateau et les douves : inscription par arrêté du 30 juillet 1980. Monsieur de La Malène propriétaire en 1930                                                           MUSSETS,    ce château, construit au XVIe siècle, appartenait en 1537 à Jacques de Gaston nommé dans un titre du château de Diziers. En 1585, le château appartenait à Guillaume de Beaufils de Villepion. Au XVIe siècle, il était entre les mains de la famille du Bouchet. Après avoir changé plusieurs fois de propriétaires, l'édifice a été acquis fortuitement par Adolphe Louis de Musset cousin issu de germain d'Alfred de Musset, qui fit chez son parent un séjour pendant lequel il composa son célèbre roman \"La confession d'un enfant du siècle\".","habitants":"Dorières, famille de Beauxoncles,                                               Mussets, famille de  Guillaume de Beaufils \r\n        \"","divers":"à la Ville aux Clercs, la Métairie grav-1-2a Forêt grav-5-6, la Gaudinière, à deux km au sud  à Busloup Mussets  et Dorières  grav -3-4   47° 56' 34\" nord, 1° 05' 30\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Ville_aux_Clercs_1.jpg","../../jctruffet.com/image/image_41/41_Ville_aux_Clercs_2.jpg","../../jctruffet.com/image/image_41/41_Ville_aux_Clercs_3.jpg","../../jctruffet.com/image/image_41/41_Ville_aux_Clercs_4.jpg","../../jctruffet.com/image/image_41/41_Ville_aux_Clercs_5.jpg","../../jctruffet.com/image/image_41/41_Ville_aux_Clercs_6.jpg"]},"Consult_chateau_formulaire0402":{"id":"Consult_chateau_formulaire0402","dept":"41","canton":"Chambord","commune":"Neung sur Beuvron","nom":"Villebourgeon","type":"Château","periode":"XVII","histoire":"VILLEBOURGEON, d'époque Louis XIII, il est bâti au bord d'un étang. Le corps de bâtiment central, en brique et pierre est complété par deux ailes basses, plus récentes, qui ne déparent pas l'ensemble. Deux pavillons isolés montent la garde à l'entrée de la cour. C'est aux Gontault que l'on doit la construction de cet élégant château.  Le manoir primitif appartient à Guillaume de Ferrières au XVe siècle, puis à François et Jacques Deslande au XVIe siècle. Il est propriété de Jean Sachet en 1613, puis de Charlotte de Hallot, veuve de Claude Sachet. Le château actuel a été construit au XVIIe siècle par la famille de Nicolas Gontault. Il est vendu à Étienne Texier en 1711, puis passe à la famille Baguenault en 1741. Les Baguenault de Villebourgeon le revendent au marquis de Lasteyrie en 1820 et passe à la famille orléanaise Germon.Après être passé aux mains d'un Orléanais, Barthélemy Germon,  Il a été vendu en 1857 à Robert Constant Bouhier de L'Écluse, avocat et homme politique français.","architecture":"VILLEBOURGEON, pour le film de  lécole buissonnière, Nicolas Vanier sappuie sur une distribution cinq étoiles avec François Cluzet, François Berléand, Valérie Karsenti, Éric Elmosnino ou encore Laurent Gerra. Mais lautre star de ce casting est constituée de briques rouges solognotes : le château de Villebourgeon, à Neung-sur-Beuvron.  La grande partie du long-métrage se déroule dans cette magnifique demeure du XVIIe siècle. Dans la vraie vie, le propriétaire de la bâtisse lest tout autant. Il abhorre les photographies et préfère lanonymat. « Cest le château la star, pas moi », sourit celui qui est crédité au générique pour une fugace apparition. Sa famille est propriétaire des lieux depuis 160 ans. Le descendant est fier du résultat sur grand écran. Ils ont réussi à rendre lâme du château, avec les scènes de brume sur létang ou les images magnifiques avec le drone.  Laventure cinématographique de Villebourgeon a débuté un matin, alors que le propriétaire jardine. « Jai vu sortir deux colosses de deux mètres dune Fiat 500 rouge, se souvient le châtelain. Cétaient le régisseur principal et son fils. Ils mont dit quils cherchaient un château pour tourner un film. »","habitants":"Villebourgeon; Nicolas Gontault. \r\n        \r\n        \"","divers":"Neung sur Beuvron le château de Villebourgeon","gps":"","images":["../../jctruffet.com/image/image_41/41_Villebourgeon_1.jpg","../../jctruffet.com/image/image_41/41_Villebourgeon_2.jpg","../../jctruffet.com/image/image_41/41_Villebourgeon_3.jpg"]},"Consult_chateau_formulaire5de0":{"id":"Consult_chateau_formulaire5de0","dept":"41","canton":"Romorantin-Lanthenay","commune":"Villehevriers","nom":"Villehevriers","type":"Chateaux","periode":"X-XVIII","histoire":"Plusieurs chateaux à Villehevriers celui du Portail, de Trécy , de la Chansonnerie, de Glandier et des Roches.                                  PORTAIL, attesté en 1403, le château actuel a été édifié  au XVIIIe siècle; transformation des communs, du colombier en chapelle et de l'étage de comble du bâtiment principal vers 1892 pour la famille Portefin, nouveau propriétaire succédant à la famille d'Oberlin. Edifice composé d'un sous sol, d'un étage carré et étage de comble, escalier dans-oeuvre, gros-oeuvre en silex, calcaire, moellon et enduit. Type de couverture: toit à longs pans brisés; croupe; pignon découvert; terrasse et appentis, recouverts de tuile plate et d'ardoise.                                                                                               ROCHES , château XIXe siècle,                                                                        GLANDIERS Mlle Thevard propriétaire en 1930,  est un gîte de groupes référencé 4 épis Gîtes de France, situé à Villeherviers dans le Loir-et-Cher (41), proche de Romorantin et de ses services. Le calme et l'environnement préservé se conjuguent pour accueillir plusieurs types d'activités. Propriétaire Jacques et Francine Coullet.","architecture":"TRECY, demeure attestée au Xe siècle; corps de bâtiment en pavillon du XVIe siècle; restauré par Pierre Chauvallon vers 1910 en style éclectique; corps de bâtiments en équerre construits au XVIIIe siècle, restaurés. Les parties agricoles furent détruites après 1928. Villeherviers au Xe siècle c'était le Vicus Herveus, Villa Hervei, ensuite ville Hervié du XIIIe au XVIIIe siècle, c'était donc une simple villa, domaine rural, dépendante à l'origine du castrum de Romorantin. La Villa Hervé indique que ce village, au temps de la féodalité, appartenait à un seigneur Hervé. Cette famille Hervé de Tréci vassale du comte de Blois, propriétaire du domaine, y joua un rôle civilisateur et bienfaisant.","habitants":"famille Portefin                                                                            Mlle Thevard                                                                              Pierre Chauvallon\r\n        \"","divers":"à Villehevriers celui du Portail grav-1, de Trécy grav-2-3 , de la Chansonnerie grav-4, de Glandier grav 5-6 et des Roches grav-7.","gps":"","images":["../../jctruffet.com/image/image_41/41_Villehevriers_1.jpg","../../jctruffet.com/image/image_41/41_Villehevriers_2.jpg","../../jctruffet.com/image/image_41/41_Villehevriers_3.jpg","../../jctruffet.com/image/image_41/41_Villehevriers_4.jpg","../../jctruffet.com/image/image_41/41_Villehevriers_5.jpg","../../jctruffet.com/image/image_41/41_Villehevriers_6.jpg","../../jctruffet.com/image/image_41/41_Villehevriers_7.jpg"]},"Consult_chateau_formulairea39a":{"id":"Consult_chateau_formulairea39a","dept":"41","canton":"Chambord","commune":"Villeny","nom":"Villeny","type":"Château","periode":"XV","histoire":"GIRAUDIERE: la construction du Château de la Giraudière date du XVe siècle. Il est depuis cette date toujours dans la famille. Le château de la Giraudière possède une architecture de la fin du XVIIIe siècle. Vous serez accueillis dans un cadre verdoyant et agréable. Le confort d'une bâtisse élégante, sa sérénité et l'accueil chaleureux de ses propriétaires accompagneront votre séjour, chambres et tables d'hôtes.","architecture":"BONNEVILLE,  M. Pichery est le propriétaire en 1930.                                          GIRAUDIERE, près du château, se trouve une basse-cour de 1650, avec des dépendances et un pressoir d'époque. Certaines des briques fabriquées autrefois sur place, dans le four de Montecloche, sont pour signées et à l'image du style local très répandu en Sologne. Le parc est richement rempli d'arbres superbes. Certains arbres centenaires rappellent les années du début du XIXe siècle, où les séquoias venus d'Amérique se mêlaient aux platanes, chênes et châtaigniers.","habitants":"Bonneville M. Pichery Giraudiere ; famille de la Giraudière\r\n        \"","divers":"A Villeny château de Bonneville grrav-1 et de la Giraudière grav-2: 47° 37' 25\" Nord, 1° 45' 20\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Villeny_1.jpg","../../jctruffet.com/image/image_41/41_Villeny_2.jpg"]},"Consult_chateau_formulairea1ab":{"id":"Consult_chateau_formulairea1ab","dept":"41","canton":"Salbris","commune":"Tour en Sologne","nom":"Villesavin","type":"Château","periode":"XVI","histoire":"VILLESAVIN, château construit de 1527 à 1537 sur une ancienne seigneurie au XIVe siècle, pour Jean le Breton, surintendant des finances de François Ier, et en fit venir les mêmes maîtres d'uvre,  célèbre par la venue de Catherine de Médicis en 1611. Il appartient à une propriété privée qui loue ses salles et propose une visite du site. Il fut édifié, de 1527 et 1537, par Jean le Breton, Seigneur de Villandry. Il fut chargé par le roi de la conduite et des paiements des travaux de construction du château de Chambord. Au XVIIe siècle, Jean Phélippeaux fit effectuer de nombreux travaux concernant le château de Villesavin. Vous découvrirez un colombier à pied, à échelle tournante du XVI siècle. Il contient 1500 boulins, symbole de la puissance judiciaire au XVIIe siècle, le droit du colombier fut attribué en 1637 par Gaston dOrléans à Jean Phelypeaux, secrétaire des finances du Royaume de France. L'intérieur du château dévoile de beaux meubles des XVIe et XVIIIe siècles ainsi que des étains.  il appartient au comte et à la comtesse de Sparre.","architecture":"VILLESAVIN,   ce château Renaissance annonce le style classique par l'harmonie et la symétrie de ses façades, la chapelle, célèbre par la venue de Catherine de Médicis en 1611, possède des fresques murales du XVIe siècle et des peintures du XVIIe siècle. Le domaine comprend le château avec ses communs, une chapelle, possède des fresques murales du XVIe siècle et des peintures du XVIIe siècle, un potager et un parc. L'édifice comprend un grand bâtiment central et deux ailes et n'a presque pas été modifié par la suite. Seules les toitures, dont le plomb a été réquisitionné sous l'Empire, ont été refaites en ardoise. Le château de Villesavin est inspiré des villas de la Renaissance italienne. Ses façades ont été inspirée du château de Chambord. Le corps de bâtiment principal ne compte qu'un seul étage. Les tours rondes ont été, depuis, remplacées par des pavillons carrés symétriques. On remarque aussi les lucarnes traditionnelles du Val de Loire. L'escalier principal se trouve à l'intérieur du corps central. A l'entrée de la cour d'honneur sont bâtis deux pavillons, dont l'un abrite la chapelle. Le château de Villesavin abrite aussi le musée du mariage, a été classé aux M.H. le 7/03/1952 et le 10/07/1959.","habitants":"Famille de Jean le Breton\r\n        \"","divers":"Villesavin : 47° 32' 48\" Nord et 1° 30' 51\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Villesavin_1.jpg","../../jctruffet.com/image/image_41/41_Villesavin_2.jpg","../../jctruffet.com/image/image_41/41_Villesavin_3.jpg","../../jctruffet.com/image/image_41/41_Villesavin_4.jpg","../../jctruffet.com/image/image_41/41_Villesavin_5.jpg"]},"Consult_chateau_formulaire4793":{"id":"Consult_chateau_formulaire4793","dept":"41","canton":"Saint-Aignan","commune":"Pouillé","nom":"Voute_Pouillé","type":"Château","periode":"XVII","histoire":"La VOUTE, manoir de René Le Jard, fils de Charles Le Jard, seigneur de Vaugelay, lui-même arrière-petit-fils de Jean Le Jard, né en 1415, crée la souche des seigneurs de La Voûte, lors de lacquisition de la propriété, le 20 avril 1595. Il sagit dune maison du moyen-âge, bâtie sur les bases dune ancienne villa romaine. Construit par Hubert Le Jard à la fin du XVIIe siècle, le manoir de la Voûte entre dans la famille de Simonneau par mariage de la fille dHubert Le Jard avec François de Simonneau de Saclas, célébré à Pouillé le 21 janvier 1699. De cette union naît Louis de Simonneaude la Voûte, le 18 mai 1704. Ecuyer, devenu commissaire dartillerie auprès du Roi, cest lui qui entreprendra en 1728, la transformation du manoir pour lui donner son architecture actuelle, typique de lépoque Louis XIV. Il meurt à Pouillé le 23 février 1748, assassiné par son cousin, Louis de Simonneau de Galluy. En 1769, la fille du Comte de La Voûte, Marie Suzanne de Simonneau, épouse à St-Aignan, Nicolas Auguste Paillard de Clermont. Le domaine resta dans la lignée des Paillard de Clermont jusquen 1870 où une catastrophe financière priva cette famille du patrimoine de ses ancêtres. A partir de cette date, la propriété changera de mains plusieurs fois jusquen 1998 où elle est acquise par les propriétaires actuels.","architecture":"La VOUTE, avec son château de noble allure, son parc dagrément, ses grands cèdres et ses communs joliment aménagés, est sans doute le lieu le plus remarquable de Pouillé. Le promeneur un peu indiscret, en a eu un aperçu à travers la grande grille dentrée en fer forgé et les autres grilles dun mur bas. Le mur de clôture de la propriété, pas bien haut, avec ses vielles pierres patinées et son dos rond, na rien de défensif et laisse, lui aussi, admirer La Voûte. L'édifice, grande bâtisse, présente une belle architecture classique de lépoque Louis XIV. Maison traversante avec deux rangs de sept ouvertures en façade et deux pavillons latéraux, elle a été agrémentée de deux terrasses ornées de balustrades en pierre à la fin du XIXe siècle. À lintérieur, on peut voir d'anciennes traces des ouvertures de la demeure du moyen-âge, et un soubassement datant de lantiquité romaine. Le mur de clôture qui délimite la propriété actuelle a été élevé au XIXe siècle ce qui a donné lieu à des protestations de la population, privée du chemin daccès historique à léglise. Il dissimule un parc de 1,5 ha ou lon découvre des jardins en terrasse, un parc agrémenté de cèdres majestueux où il arrive que les cigognes fassent halte lors de leur migration. On notera la petite tour enserrée dans le mur de clôture qui date du XVIIe siècle. On remarquera à 200 pas de là, la demeure de La Brosse qui domine La Voûte en montant sur le plateau... Cette demeure Renaissance, plus ancienne que La Voûte, témoigne des rivalités ancestrales qui ont opposé, au XVIIIe siècle, les deux cousins Simonneau, lun seigneur de La Brosse, lautre, seigneur de La Voûte.","habitants":"Famille de Hubert Le Jard \r\n        \"","divers":"A Pouillé le château de la Voute","gps":"","images":["../../jctruffet.com/image/image_41/41_Voute_Pouill%c3%a9_1.jpg","../../jctruffet.com/image/image_41/41_Voute_Pouill%c3%a9_2.jpg"]},"Consult_chateau_formulairee32f":{"id":"Consult_chateau_formulairee32f","dept":"41","canton":"Montoire sur le Loir","commune":"Troo","nom":"Voute_Troo","type":"Château","periode":"XV-XVII","histoire":"La VOUTE Ancré au cur des vignobles vendômois, à 15 km de sa capitale Vendôme, le château de la Voûte vous ouvre les portes de ses chambres dhôtes,  vous serez envoûté par le charme des lieux. \r\nun grand parc et son jardin en terrasse.  Un lieu de séjour chargé dhistoire au carrefour des rencontres, de Diane de Poitiers à Henri IV , Construit sur les vestiges du château médiéval au temps des guerres de religions, l'histoire du château sest anoblie au fil des siècles. Transformé en hôtel restaurant par M.M. Clays et Venon.","architecture":"LA VOUTE est une demeure privée des XVII et XVIIIe siècle ouverte toute lannée. Construit sur les vestiges du château médiéval au temps des guerres de religions, l'histoire du château sest anoblie au fil des siècles.  Passées les deux tours du XVe siècle, massives et majestueuses, souvenirs dun passé riche en histoire ce lieu a vécu. Les propriétaires vous accueillent dans un havre de paix pour un hébergement de qualité. Ici il suffit découter murmurer le Loir qui serpente dans le parc et dadmirer la vue dans le parc boisé clos en terrasse à la française sur 4 hectares se prolongeant jusquaux rives du Loir.","habitants":"Seigneur local\r\n        \"","divers":"a Troo château de la Voute","gps":"","images":["../../jctruffet.com/image/image_41/41_Voute_Troo_1.jpg","../../jctruffet.com/image/image_41/41_Voute_Troo_2.jpg","../../jctruffet.com/image/image_41/41_Voute_Troo_3.jpg","../../jctruffet.com/image/image_41/41_Voute_Troo_4.jpg"]},"Consult_chateau_formulaire46e4":{"id":"Consult_chateau_formulaire46e4","dept":"41","canton":"Salbris","commune":"Vouzon","nom":"Vouzon","type":"Chateaux","periode":"XVI-XIX","histoire":"A Vouzon le château de Grillère, du Puys, de Corvier, de Chenaye et Ruets.                                                                                                         GRILLERE   Situé au milieu d'un vaste domaine, entouré de bois et d'eau, ce beau château du XVIe siècle est entièrement construit en briques roses. Il a conservé son aspect d'origine et ses poutres anciennes. Jeanne d'Arc, allant de Gien let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','41 — Loir-et-Cher'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)showDet(start);
</script></body></html>
