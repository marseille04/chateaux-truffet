d l'habitation et la chapelle ; un second bâtiment contient l'entrée et une cuisine voûtée sur pilier central. Au-dessus du portail se trouvent deux chambres dont une avec peintures murales. Au-dessus se dresse un campanile moderne. Ce corps de bâtiment est terminé, dans l'angle, par une tour. Dans le jardin se remarque un vieux puits en fer forgé, une tour en ruine et les restes d'une seconde chapelle. Au XVIIe siècle  démolition des courtines de l'enceinte et des quatre tours d'angle , une seule subsiste. Classement par arrêté du 27 avril 1927.                                                                                                                    PLACES,  à Lassay-sur-Croisne, château du XIXe-XXe siècles, cour d'honneur et jardin, pas d'information historique.","habitants":"La Mothe  Jean-Guillaume de La Dabinerie.                         Moulin;Philippe du Moulin\r\n        \"","divers":"à Lassay celui de Moulin de la Motte et de la Places grav-9                            Moulin 47° 22' 09\" Nord et 1° 36' 34\" Est                                                           Valangon 47° 20' 37\" Nord, 1° 11' 03\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Lassay_Moulin_1.jpg","../../jctruffet.com/image/image_41/41_Lassay_Moulin_2.jpg","../../jctruffet.com/image/image_41/41_Lassay_Moulin_3.jpg","../../jctruffet.com/image/image_41/41_Lassay_Moulin_4.jpg","../../jctruffet.com/image/image_41/41_Lassay_Moulin_5.jpg","../../jctruffet.com/image/image_41/41_Lassay_Moulin_6.jpg","../../jctruffet.com/image/image_41/41_Lassay_Moulin_7.jpg","../../jctruffet.com/image/image_41/41_Lassay_Moulin_8.jpg","../../jctruffet.com/image/image_41/41_Lassay_Moulin_9.jpg"]},"Consult_chateau_formulairec08d":{"id":"Consult_chateau_formulairec08d","dept":"41","canton":"Montoire sur le Loir","commune":"Lavardin","nom":"Lavardin","type":"Vestiges Château","periode":"XI-XIV-XV","histoire":"LAVARDIN, construit à partir du début du XIe siècle par les premiers seigneurs de Lavardin, le château fut vendu au comte de Vendôme vers 1130, dont il devint la principale forteresse à partir de la fin du XIIe siècle. Complètement remanié aux XIIe et XVe siècles, il fut enlevé aux Ligueurs en 1589, puis démantelé l'année suivante sur ordre d'Henri IV, duc de Vendôme et roi de France. Après le siège de 1590 par larmée dHenri IV, duc de Vendôme : démantèlement du château. Fin XIXe, années 1920-1930, de 1966 à 1969 : déblaiement des ruines par le Club du Vieux Manoir. 1987 : la commune devient propriétaire des ruines, dimportants travaux de consolidation sont menés.","architecture":"LAVARDIN, la construction de la forteresse remonte au Xe siècle, mais elle fut remaniée et presque reconstruite aux XIVe et XVe siècles. L'édifice forme un triangle, bordé du côté sud, par un chemin et un ravin. Sur le côté ouest, le plus exposé, un fossé fut creusé au pied du donjon. Il était protégé par une grosse tour carré en avant de ce bastion. Au nord, une première cour était entourée d'un mur, de trois tours et d'un fossé. Le château avait une double muraille avec tours et une porte flanquée de deux autres tours, entre lesquelles se dressait un pont-levis. Des rampes et des escaliers d'accès conduisaient aux étages de cours et de bâtiments jusqu'au donjon, lequel était enveloppé presque entièrement par une troisième muraille, de plan rectangulaire, le donjon était couronné par un chemin de ronde avec mâchicoulis, des passages souterrains communiquaient entre les bâtiments. Les troupes de Henri IV s'en emparèrent et son démantèlement fut ordonné.   Complètement remanié au XIVe et XVe siècles, il fut enlevé aux Ligueurs en 1589, puis démantelé, l'année suivante, sur ordre d'Henri IV, duc de Vendôme et roi de France. Éléments protégés MH : les vestiges du château de Lavardin : classement par arrêté du 21 novembre 1945.","habitants":"Comte de Vendôme\r\n        \"","divers":"vestiges du châeau de Lavardin 47° 44' 28\" Nord et 0° 53' 01\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Lavardin_1.jpg","../../jctruffet.com/image/image_41/41_Lavardin_2.jpg","../../jctruffet.com/image/image_41/41_Lavardin_3.jpg"]},"Consult_chateau_formulairecb8d":{"id":"Consult_chateau_formulairecb8d","dept":"41","canton":"Ouzouer le Marché","commune":"Verdes","nom":"Lierville","type":"Château","periode":"XV","histoire":"LIERVILLE, connu depuis le XVe siècle il à appartenu longtemps à la famille de Téligny, puis passe à   Louise de Coligny  qui vint cacher son veuvage après la mort de son deuxième mari, Guillaume de la Taciturne, de la famille d'Orange. Au XVIIIe siècle, le château de Lierville appartenait au marquis de Courtavel, pair de France sous Charles X. il appartient depuis plus d'un siècle  à la famille de Monteynard.","architecture":"LIERVILLE, le château de Lierville est construit au XVIe siècle sur le plan d'un château fortifié, formé à l'origine de quatre ailes dont deux restent, ponctuées par quatre tours. Des éléments du châtelet d'entrée sont encore décelables sur la façade postérieure de l'aile ouest, qui fut surélevée par la suite. Au XVIIIe siècle, l'aile nord-ouest faisant face à l'allée d'accès fut détruite pour dégager une cour d'honneur, les ailes furent repercées de manière symétrique et agrémentées de lucarnes en pierre. Dans la première moitié du XIXe siècle le château subit des remaniements dans le goût néo-gothique. L'aile nord-est est supprimée après 1836.   Éléments protégés MH : les façades et les toitures de l'aile Sud-Est et les deux tours attenantes : inscription par arrêté du 27 mai 1993.","habitants":"Famille de Monteynard.\r\n        \"","divers":"A Verdes le château de Lierville  47° 56' 04\" nord, 1° 24' 50\" est","gps":"","images":["../../jctruffet.com/image/image_41/41_Lierville_1.jpg","../../jctruffet.com/image/image_41/41_Lierville_2.jpg","../../jctruffet.com/image/image_41/41_Lierville_3.jpg","../../jctruffet.com/image/image_41/41_Lierville_4.jpg"]},"Consult_chateau_formulaire29fe":{"id":"Consult_chateau_formulaire29fe","dept":"41","canton":"Montoire sur le Loir","commune":"Lunay","nom":"Lunay_Mézière","type":"Château","periode":"XVI","histoire":"A Lunay quatre châteaux  dont celui de Mézière, de Blotinière, de Montelière et de Vadourière, pas d'info pour certains.                                                                      MEZIERE, où vivait le seigneur de la Mézière, médecin du Roi qui a accueilli en justes noces les parents d'Henri IV accompagné du poète Ronsard.   Demeure familiale habitée depuis 1893, ce château a été construit au XVIe siècle sur une villa gallo romaine à laquelle il doit son nom de Mézière. A cette époque, son commanditaire était Raphaël de Taillevis, huguenot, originaire de la Navarre, médecin d'Antoine de Bourbon, roi de Navarre et duc de Vendôme. Raphaël de Taillevis mourut vers 1600 et laissa la demeure à son fils, René de Taillevis, échanson du roi de Navarre (Henri IV), puis gentilhomme de la Chambre. Il s'était fait catholique et épousa Yolande de Beaufils, fille de Jean de Beaufils, seigneur de Villepion en Beauce. La famille de Taillevis l'occupera jusqu'en 1789. Le domaine passa ensuite à Augustin de Sarrazin, député de la noblesse du Vendômois aux États généraux. Son fils vendit Mézières en 1859 à Charles de Patouillet, comte de Deservillers, qui entreprit la restauration et l'agrandissement du château en lui conservant son style Renaissance. Demeure familiale habitée depuis 1893 par la même famille. Le roi de Navarre avec Jeanne d'Albret sont venus en juste noce.  Visite libre des extérieurs. Également, église Saint-Martin, appartenant au réseau des églises à fresques,","architecture":"BLOTINIERE Ancien fief et seigneurie de Guillaume Belotin, vassal de la seigneurie des Roches L'Evêque de 1270, M F. Fournier propriétaire en 1930.                                                                                                                    MEZIERE,ce château du XVIe siècle a été construit sur une villa gallo-romaine à laquelle il doit son nom de Mézière. Sa petite chapelle, son porche sculpté, ses quilles de cheminées incrustées d'ardoises comme à Chambord et sa jolie galerie Renaissance, confèrent à cette demeure un charme royal qui n'échappa pas, entre autres, au roi de Navarre. Visite libre des extérieurs. Egalement : possibilité de visite guidée pour les groupes uniquement.","habitants":"Mézière, famille de Raphaël de Taillevis\r\n        \"","divers":"A Lunay quatre châteaux, celui de Mézière grav de 1 à 5, de Blotinière grav-6, de Montelière grav-7 et de Vadourière grav 8,           Lunay 47° 48' 36\" nord, 0° 54' 57\" est","gps":"","images":["../../jctruffet.com/image/image_41/41_Lunay_M%c3%a9zi%c3%a8re_1.jpg","../../jctruffet.com/image/image_41/41_Lunay_M%c3%a9zi%c3%a8re_2.jpg","../../jctruffet.com/image/image_41/41_Lunay_M%c3%a9zi%c3%a8re_3.jpg","../../jctruffet.com/image/image_41/41_Lunay_M%c3%a9zi%c3%a8re_4.jpg","../../jctruffet.com/image/image_41/41_Lunay_M%c3%a9zi%c3%a8re_5.jpg","../../jctruffet.com/image/image_41/41_Lunay_M%c3%a9zi%c3%a8re_6.jpg","../../jctruffet.com/image/image_41/41_Lunay_M%c3%a9zi%c3%a8re_7.jpg","../../jctruffet.com/image/image_41/41_Lunay_M%c3%a9zi%c3%a8re_8.jpg"]},"Consult_chateau_formulairefbcf":{"id":"Consult_chateau_formulairefbcf","dept":"41","canton":"Saint-Aignan","commune":"Mareuil sur Cher","nom":"Mareuil_sur_Cher","type":"Château","periode":"XV-XVIII-XIX","histoire":"Trois châteaux à Mareuil sur Cher, celui de Mareuil de Bas-Guerret et de Mesmes.                                                                                              MAREUIL, l'ancien château date du XVe siècle, par la famille des Bans alors seigneurs de Mareuil, mais a été complètement remanié, et peut-être agrandi, au XVIIe siècle. Une salle présente des solives apparentes, ornées de peintures décoratives, datant de l'époque de Louis XIII. Le corps de cheminée est orné d'un décor d'architecture peint en trompe l'oeil. Au centre une peinture paraît représenter une scène montrant un personnage s'avançant vers une femme accompagnée de guerriers, des vaisseaux étant représentés à l'arrière. Propriété de la commune.\r\nÉléments protégés MH : la salle à cheminée et plafond peints située au rez-de-chaussée : inscription par arrêté du 8 octobre 1935.","architecture":"MAREUIL, est situé dans le cur du village au bord du Cher. Vous n'aurez qu'à passer le porche situé à droite de l'Eglise pour le découvrir.\r\nIl a été bâti au XVe siècle par la famille des Bans alors seigneurs de Mareuil. Il comprend à cette époque un modeste corps de logis et une tourelle polygonale sur la façade cst.  Au XVIIe siècle on l'agrandit pour y ajouter une aile orientée Nord Est et que l'on appelle aujourd'hui \"Aile Nord\".\r\nBAS-GUERET, situé sur la route d'Orbigny se trouve sur les hauteurs de Mareuil. Il a été construit par la famille Verley Faure entre 1879 et 1882. Cette famille très cléricale est aussi à l'origine de la construction de Notre Dame du Bas Guéret. Ce château, durant la seconde guerre mondiale, fût le théâtre d'un massacre de 8 personnes par l'armée allemande. Chaque année les mareuillais commémorent cette terrible journée du 31 août 1944 , édifice de plan en équerre à trois niveaux   tour en angle avec terrasse,  le retour à deux niveaux  toits en croupes.                                                                                                                     MESMES, cette bâtisse date du milieu du XVIIIe siècle a été bâti par les seigneurs de Mesnes, alors vassaux du comte de Saint Aignan. Corps de logis rectangulaire à un niveau, série de lucarnes par travées sur combles à la mansard, l'édifice accolée d'un retour en équerre en forme de T  de deux niveaux  avec lucarnes.","habitants":"Mareuil  Famille des Bans,                                                            Bas Gueret famille Verley \r\n        \"","divers":"Trois châteaux à Mareuil sur Cher, celui de Mareuil grav de 1 à 4, de Bas-Guerret grav-5 et de Mesmes grav 6-7.  47° 17' 38\" nord, 1° 19' 45\" Est.","gps":"","images":["../../jctruffet.com/image/image_41/41_Mareuil_sur_Cher_1.jpg","../../jctruffet.com/image/image_41/41_Mareuil_sur_Cher_2.jpg","../../jctruffet.com/image/image_41/41_Mareuil_sur_Cher_3.jpg","../../jctruffet.com/image/image_41/41_Mareuil_sur_Cher_4.jpg","../../jctruffet.com/image/image_41/41_Mareuil_sur_Cher_5.jpg","../../jctruffet.com/image/image_41/41_Mareuil_sur_Cher_6.jpg","../../jctruffet.com/image/image_41/41_Mareuil_sur_Cher_7.jpg"]},"Consult_chateau_formulairecb50":{"id":"Consult_chateau_formulairecb50","dept":"41","canton":"Vendome","commune":"Mazangé","nom":"Mazangé_Azé","type":"Château","periode":"XV","histoire":"Trois châteaux à Mazangé , de Bonnaventure,  de Courtoze, et de Borde.                                                                                                BONNAVENTURE, à appartenu aux templiers de Vendôme de 1223 à 1440 puis aux cordeliers qui leur succédèrent, à la fin du XVe siècle construction  d'un logis gothique   par Théodore Gaynier de Pavie , médecin du roi Louis XII,  acquit  en 1533 par Nicolas Gérard de Salmet, médecin du roi François Ier, attaché à  la maison d'Antoine de Bourbon Vendôme roi de Navarre, à la mort de Jean de Salmet en 1590 le château fut la propriété des Musset de 1537 à 1847, à la mort de Jean de Salmet en 1590 le château revient à sa soeur Marie qui épouse  en 1537 Claude de Musset, lieutenant au bailliage de Blois, leur fils Guuillaume, s'était allié en 1580 avec Cassandre de Peigné fille de la belle Cassandre Salviati qui fut chanté par Ronsard. Charles de Musset gentilhomme de la chambre du roi s'attache à agrandir le manoir construction d'une aile en retour d'équerre. Au XVIIIe siècle, la branche aïnée des Musset  délaissent Bonnaventure pour d'autres châteaux  , les bâtiments se dégradent. A la Révolution  le manoir est acquis par l'ancien intendant du domaine, puis revendu en 1802 à Paul Rodrigue, époux divorcé d'une demoiselle de Musset. Le nouveau   propriétaire  transforme l'habitation  et en 1809 cède Bonaventure à son ancien beau-frère, Victor  Donatien de Musset il est le père du poète Alfred de Musset dont la famille revende le domaine en 1869 à la famille Hemme qui transforme le bâtiment en ferme et font des démolitions à la recherche d'un hypothétiques trésor des templiers, le manoir est en ruine lorsqu'il fut acquis en 1969 par la famille Magnant.","architecture":"BONNAVENTURE,  construction gothiques du XVe siècle, avec salles voûtées, aujourd'hui incluse dans le corps de logis de style gothique du XVIIe siècle, flanqué d'un escalier extérieur et une galerie, ainsi que celle du portail d'entrée, flanquée de deux grosses tours dont l'une fut détruite au XVIIIe siècle, de cette époque semble dater le pigeonnier , les communs et certaines restaurations récentes du manoir sur le corps de logis, les tourelles en poivrière, les murs d'enceinte et le pigeonnier les communs et certaines tours, ainsi qu'une nouvelle chapelle qui sera démolie  au XVIIe siècle, et un pont-levis et un fossé sont rajouté. L'enceinte est renforcée par l'adjonction d'une tour voûtée en coupole, coiffée d'une poivrière effilée et percée de meurtrières qui fait face au portail. Au XVIIe siècle édification d'une aile perpendiculiére au logis couverte d'un toit pavillon dont le comble est éclairé par des lucarnes à frontons  rectangulaires. l'édifice transformé en ferme en 1869 avec des démolitions malgré son classement au M.H de 1966 se trouve en ruine mais sera sauvé par son nouveau propriétaire                                                                A cinq kilomètres au nord-ouest à Azé plusieurs châteaux sis sur le territoire de la commune : les châteaux de Beaulieu, Courtozé, la Roullière, Minière, Morillon.                                                                             COURTOZE du XIXe siècle, rénové en 2014 pour un projet touristique, et de Borde à Danzé.","habitants":"Famille de Musset\r\n        \"","divers":"Trois châteaux à Mazangé , de Bonnaventure grav 1-2-3-4,  de Courtoze grav 5-6, et de Borde grav-7.                                                   Bonnaventure 47° 48' 44\" nord, 0° 57' 21\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Mazang%c3%a9_Az%c3%a9_1.jpg","../../jctruffet.com/image/image_41/41_Mazang%c3%a9_Az%c3%a9_2.jpg","../../jctruffet.com/image/image_41/41_Mazang%c3%a9_Az%c3%a9_3.jpg","../../jctruffet.com/image/image_41/41_Mazang%c3%a9_Az%c3%a9_4.jpg","../../jctruffet.com/image/image_41/41_Mazang%c3%a9_Az%c3%a9_5.jpg","../../jctruffet.com/image/image_41/41_Mazang%c3%a9_Az%c3%a9_6.jpg","../../jctruffet.com/image/image_41/41_Mazang%c3%a9_Az%c3%a9_7.jpg"]},"Consult_chateau_formulairefcf8-2":{"id":"Consult_chateau_formulairefcf8-2","dept":"41","canton":"Selles sur Cher","commune":"Mennetou-sur-Cher","nom":"Mennetou_Cher","type":"Château","periode":"XII-XV","histoire":"châteaux à Menetou, celui de Berthets, de Menetou, de Veillière, de Plaudière, manoir du Loup et de François Ier.                       MENNETOU   Une demeure seigneuriale est attestée au XIe siècle pour Geoffroy 1er de Vierzon ; un château est fortifié en 1212 pour Hervé II de Vierzon; agrandissement au XIVe siècle, et embellissements pour la famille Le Loup au XVe siècle; acquis par les religieuses Bénédictines du prieuré à partir de 1686, il est vendu comme bien national en 1791. L'édifice encore très bien conservé au XIXe siècle, la charpente de la toiture est abaissée vers 1903 et la toiture rasée avec le deuxième étage en 1926; vestiges actuels de murs, baies et cheminées du XIIIe siècle et du  XVe siècle.\r\nA voir dans cette commune les fortifications de l'agglomération édifiées en 1212 pour Hervé II de Vierzon ; aménagements au XVe siècle : baie de la porte d'en bas, archère de la tour du nord ; il reste actuellement les trois ouvrages d'entrée et trois tours sans couvertures, des vestiges au nord, à l'est et au sud de la courtine qui n'est plus visible à l'ouest ; deux tours d'angle ont été abattues en 1869.","architecture":"MENNETOU Sur CHER,  possède encore sa grange aux dîmes de style gothique angevin du XIIIe siècle ainsi qu'une partie du prieuré bénédictin de 1206   et autres châteaux  tel que les Berthets , Veillières,  Plaudière et du Loup.                                                                                              VEILLIERES, manoir  bâti au milieu d'une clairière au nord de Mennetou-sur-Cher, au cur de la forêt Solognote. Depuis sa construction au début du XVIe siècle, il semble en grande partie conservé dans sa première facture, une cheminée à l'étage porte la date 1561. Les communs et les parties agricoles remontent au XVIIIe siècle, comme sa voisine la ferme de la Blatière. Un souterrain partirait du château et rejoindrait le bourg fortifié de la commune. La légende ajoute que le souterrain permettrait le passage d'un homme à cheval.                                                                         PLAUDIERE,  Hôtel restaurant situé dans un parc de 10 hectares, est un château qui date du XIXe siècle au cur de la campagne de Maray.","habitants":"Mennetou  famille d'Hervé II de Vierzon\r\n        \r\n        \"","divers":"châteaux à Menetou, celui de Berthets grav-4-5, de Mennetou grav- 1-2, de Veillière, de Plaudière grav-7, manoir du Loup grav-3 et de François Ier grav-6   Plautiere 47° 16' 14\" Nord et 1° 52' 00\" Est                                                       Maison François Ier  47° 16' 11\" nord, 1° 51' 58\" est","gps":"","images":["../../jctruffet.com/image/image_41/41_Mennetou_Cher_1.jpg","../../jctruffet.com/image/image_41/41_Mennetou_Cher_2.jpg","../../jctruffet.com/image/image_41/41_Mennetou_Cher_3.jpg","../../jctruffet.com/image/image_41/41_Mennetou_Cher_4.jpg","../../jctruffet.com/image/image_41/41_Mennetou_Cher_5.jpg","../../jctruffet.com/image/image_41/41_Mennetou_Cher_6.jpg","../../jctruffet.com/image/image_41/41_Mennetou_Cher_7.jpg"]},"Consult_chateau_formulaire7a1e":{"id":"Consult_chateau_formulaire7a1e","dept":"41","canton":"Vendome","commune":"Meslay","nom":"Meslay","type":"Château","periode":"XVIII","histoire":"MESLAY, suite à l'achat des terres par François de la Porte de Féraucourt en 1719 à sa mort l'héritier est son frère Jean François en 1730 et à son fils Pierre, intendant du Bourbonnais et à la génération suivante à Jean-Baptiste de la Porte, puis ason fils Hippolyte, passa ensuite à Guy de Lavau préfet de police sous la restauration les Boisfleury les succèdent par alliance. La construction du château de Meslay date de 1732 à 1735, par Jules Michel Alexandre Hardouin, qui en fut l'architecte. L'intérêt du château de Meslay tient à son site, à son architecture et à son histoire. Implanté dans un site remarquable en bordure du Loir, le château de Meslay, par l'harmonie de ses proportions, la sobriété des moyens employés, la délicatesse de son décor sculpté, est un édifice caractéristique du style régence, s'inscrit dans la lignée de Jules Hardouin et de Jacques Gabriel, classés aux M.H. depuis le 22/05/2017.","architecture":"MESLAY, a fait l'objet d'un véritable projet d'urbanisme. Le village de Meslay est le château de Meslay ont été reconstruits, simultanément, constituant un ensemble cohérent,  construction de plan massif élevé sur un fort soubassement et comporte deux étages et un comble  percé de lucarnes de mansardes, un avant corps à trois travées  s'inscrit au centre de la façade principale; les clés des fenêtres sont ornées de mascarons, des refends d'angle  et de forts bandeaux horizontaux animent cette façade d'une remarquable sobriété. Un escalier en fer à cheval permet d'accéder au grand salon logé  dans l'avant corps. Le parc est entouré de murs. Le château de Meslay est inscrit aux M.H. avec ses éléments protégé en totalité, la cour d'honneur avec sa grille et ses murs de clôture, la terrasse, les façades et toitures des bâtiments de la basse-cour du pigeonnier,  les façades et toitures des bâtiments de la cour des jardiniers, le potager avec ses murs de clôture et ses 2 grilles, la fabrique dans le parc paysager et la glacière, tels que délimités par un trait jaune sur le plan annexé.","habitants":"Famille de Jean-Baptiste de la Porte\r\n        \"","divers":"Meslay : 47° 49' 0,29\" Nord, 1° 5' 46,79\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Meslay_1.jpg","../../jctruffet.com/image/image_41/41_Meslay_2.jpg","../../jctruffet.com/image/image_41/41_Meslay_3.jpg"]},"Consult_chateau_formulairebc2a":{"id":"Consult_chateau_formulairebc2a","dept":"41","canton":"Savigny en Braye","commune":"Mondoubleau","nom":"Mondoubleau","type":"Vestiges","periode":"XI-XV-XVII","histoire":"Trois châteaux à Mondoubleau dont celui de Mondoubleau, des Rocheux et à deux km au nord à Choue,  Bouchet et Choupardière.                                                              MONDOUBLEAU, construit vers l'an 1010 pour le chevalier Hugues Doubleau fut abandonné au XVIe siècle. Seule reste habitable la maison du Gouverneur, dite maison de Courcillon. L'exploitation d'une carrière de la Marne sous le donjon, à partir de 1797, provoqua un affaissement de terrain en 1812, suivi de la séparation du sommet et de l'écroulement d'un pan en 1818. Une seconde partie de mur est tombée en 1873. Les garennes et les fossées furent vendus en 1739 et à la Révolution la ville devint propriétaire de la forteresse. La seigneurie de Mondoubleau s'est trouvée, dès son origine chevaucher le Vendômois et le Dunois. Cette situation géographique particulière ont conduit leurs seigneurs à avoir une double allégeance d'où le qualificatif de Doubleau qui est resté dans le nom de cette petite ville.   Propriété de la commune.\r\nÉléments protégés MH : les ruines du château : inscription par arrêté du 6 mars 1926.","architecture":"ROCHEUX, ancien fief relevant du château de Mondoubleau. Ces origines remontent au XVe siècle. La façade d'entrée du manoir est percée d'une porte d'entrée dont l'ouverture en arc surbaissé est ornée d'un encadrement en pierre avec pilastres de chaque côté et fronton triangulaire avec motif sculpté au centre. La façade postérieure est agrémentée, en son milieu, d'une tour carrée. A gauche le bâtiment forme une sorte de deuxième tour carrée plus basse. Corps de bâtiment annexe en retour, avec encadrement des ouvertures en pierre rouge. L'intérieur conserve des cheminées aux écussons armoriés. Autrefois, le manoir était entouré de fossés, aujourd'hui en partie comblés. Dans la cour d'entrée, reste une tour de défense à meurtrières. Communs autour de la cour.Éléments protégés MH : le manoir de Rocheux en totalité : inscription par arrêté du 25 février 1948.                                                                             \r\nBOUCHET, à Choue  a été construit au XVIIe siècle, et agrandi au début du XXe siècle. Le château primitif (connu sous le nom des ruines du Grand-Bouchet) avait appartenu au XVIe siècle à Françoise d'Avaucour qui l'apporta en dot à Pierre de Courtavel. Leurs descendants le conservèrent jusqu'en 1673. Au XVIIIe siècle, il appartenait à la famille Leclerc de Lesserville.","habitants":"pour le chevalier Hugues Doubleau \r\n        \r\n        \"","divers":"Trois châteaux à Mondoubleau dont celui de Mondoubleau grav 1-2, des Rocheux et à deux km au nord à Choue,  Bouchet -5 -6-7-8             et Choupardière grav-3-4. Mondoubleau  47° 58' 47\" nord, 0° 53' 32\" Est                                              Rocheux  47° 59' 52\" nord, 0° 52' 52\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Mondoubleau_1.jpg","../../jctruffet.com/image/image_41/41_Mondoubleau_2.jpg","../../jctruffet.com/image/image_41/41_Mondoubleau_3.jpg","../../jctruffet.com/image/image_41/41_Mondoubleau_4.jpg","../../jctruffet.com/image/image_41/41_Mondoubleau_5.jpg","../../jctruffet.com/image/image_41/41_Mondoubleau_6.jpg","../../jctruffet.com/image/image_41/41_Mondoubleau_7.jpg","../../jctruffet.com/image/image_41/41_Mondoubleau_8.jpg"]},"Consult_chateau_formulaireea76":{"id":"Consult_chateau_formulaireea76","dept":"41","canton":"Chambord","commune":"Mont près Chambord","nom":"Mont_Près_Chambord","type":"Château","periode":"XV-XVII","histoire":"Deux châteaux à Mont-Près Chambord le Chesnaye et le Clenord.                                                                            CHESNAYE, dépendances sud : ancien logis construit au XVe siècle, puis remanié ; logis début du  XVIIe siècle mutilé en 1920 par Loyau propriétaire : étage en surcroît et escalier extérieur détruits, rez-de-chaussée abaissé de moitié d'après les archives privées fut vendu en 1876 à Brouard Mézières, peintre en porcelaine demeurant au bourg de Bracieux.\r\nA voir également dans la commune de Mont-près-Chambord le château de Clénord ouvert au public et le manoir du Quartier (IMH), propriété privée.","architecture":"CLENORD, adossé à la forêt domaniale, demeure élégante et discrète, entourée d'un parc de vingt hectares et de jardins. Corps de bâtiment, vestige d'une galerie  du XVe siècle, cheminée ; corps de logis du XVIIe siècle remanié et agrandi au XVIIIe siècle; aménagements au XIXe siècle; communs restaurés dans le premier quart du XXe siècle. Il possède un portail remarquable.\r\nse compose: élévation à travées.en calcaire ; moellon ; enduit\r\nEtages : sous-sol ; un étage carré ; étage de comble.: escalier de distribution extérieur ; escalier droit ; escalier dans-oeuvre, toit à longs pans ; croupe ; pignon couvert ; toit en pavillon en ardoise aujourd'hui transformé en hôtel restaurant par madame Renault.","habitants":"Chesnaye;Brouard Méziere                                                  Clénord; seigneur local\r\n        \"","divers":"à Mont-Près Chambord le Chesnaye grav 1-2- hôtel de ville grav-3 et le Clenord grav-4-5.","gps":"","images":["../../jctruffet.com/image/image_41/41_Mont_Pr%c3%a8s_Chambord_1.jpg","../../jctruffet.com/image/image_41/41_Mont_Pr%c3%a8s_Chambord_2.jpg","../../jctruffet.com/image/image_41/41_Mont_Pr%c3%a8s_Chambord_3.jpg","../../jctruffet.com/image/image_41/41_Mont_Pr%c3%a8s_Chambord_4.jpg","../../jctruffet.com/image/image_41/41_Mont_Pr%c3%a8s_Chambord_5.jpg"]},"Consult_chateau_formulaired8a1":{"id":"Consult_chateau_formulaired8a1","dept":"41","canton":"Salbris","commune":"Yvon le Maron","nom":"Mont_Suzey","type":"Château","periode":"XVII-XIX","histoire":"Tois châteaux à Yvon le Maron le Mont Suzey, le Villedard et la Noue.                                                                                                                        MONT-SUZEY, le château du Mont Suzey, situé à mi-chemin entre Villeny et Yvoy le Marron, est un bâtiment dans le style néo-normand, construit de 1902 à 1903 pour Jules Berthier, fondateur de la Compagnie Havraise des Eaux, pendant la période d'opulence qui a marqué la Sologne de 1890 à 1914. Le Mont Suzey avec ses faux pans de bois, est surtout remarquable par le pittoresque de ses parties hautes, on regrettera la disparition des éléments faîtiers en cuivre et la plupart des épis de faîtages en briques vernissées. Ceux-ci vont être restitué par le propriétaire. Le château et ses communs forment un ensemble relativement complet qui illustre bien ce type de villégiature au début du siècle.Éléments protégés MH : le château ; les façades et les toitures de ses communs : inscription par arrêté du 21 juillet 1995.","architecture":"VILLEDARD, château composé d'un corps de logis rectangulaire flanqué de deux pavillons latéraux, bâti sur une plateforme entourée de douves enjambées par trois ponts. Les élévations sont en briques et pierre. Des jambes verticales, constituées de plaques de pierre, rythment la façade et la divisent en sept travées régulières surmontées par un fronton triangulaire ou semi-circulaire, en alternance, les pavillons latéraux, qui abritent à l'ouest la cuisine, à l'est la chapelle, reprennent la même technique d'appareillage. A l'intérieur, les pièces de réception en enfilade occupent le rez-de-chaussée, les chambres l'étage. Un escalier tournant suspendu mène au niveau supérieur. Le décor date du XVIIIe siècle. Celui de la chapelle, par contre, n'est pas antérieur au XIXe siècle, et réemploie un vitrail du XVIe siècle.Éléments protégés MH : la porte sans recouvrement, constituée de ses deux piliers, de la fermeture en métal, du couronnement et de la traverse le portant, la rampe d'escalier en fer forgé du corps de logis principal: inscription par arrêté du 31 octobre 1991.","habitants":"Mont-Suzey, famille de Jules Berthier\r\n        \"","divers":"à Yvon le Maron le Mont Suzey grav-1-2 , le Villedard  grav -3-4  et la Noue grav -5.                             Mont-Suzay 47° 38' 00\" Nord et 1° 51' 14\" Est                                                Villedard  47° 40' 03\" nord, 1° 53' 31\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Mont_Suzey_1.jpg","../../jctruffet.com/image/image_41/41_Mont_Suzey_2.jpg","../../jctruffet.com/image/image_41/41_Mont_Suzey_3.jpg","../../jctruffet.com/image/image_41/41_Mont_Suzey_4.jpg","../../jctruffet.com/image/image_41/41_Mont_Suzey_5.jpg"]},"Consult_chateau_formulaire9035":{"id":"Consult_chateau_formulaire9035","dept":"41","canton":"Onzain","commune":"Monteaux","nom":"Monteaux","type":"Château","periode":"XVI-XVIII","histoire":"MONTEAUX,  vers 1525-1535, la famille dOdin de Mondoucet, construit un petit château à LEsbat, près de Monteaux. En 1602, les Forget  achètent le domaine et ils vont le  refaire. En 1660, ils construisent le bâtiment actuel en forme de L mais sur un seul niveau avec le porche ; puis ils ajoutent un pigeonnier. De 1665 à 1738,  Monteaux est possédé par les Coutel dArgilly, descendants des Forget. En 1738,  il est vendu  à Isaac dAlençon.\r\nDepuis 1772 il passe dans la famille de  Montebise et il est encore dans cette même famille aujourdhui.  le château est constitué de deux édifices joints, et d'époques différentes du XVIe et XVIIIe siècle. Le plus ancien remplace lui-même un édifice antérieur. Il se compose d'un bâtiment rectangulaire flanqué de deux tours rondes.","architecture":"MONTEAUX, le bâtiment plus récent lui est accolé, formant un angle important. L'aile en retour d'équerre date de la fin du XVIIIe est percée, en son centre, d'un porche. Ce dernier est formé d'un arc en plein cintre, cantonné de demi colonnes géminées qui soutiennent un entablement décoré de triglyphes supportant une corniche. Cette aile est prolongée au sud par un bâtiment annexe du XVIIIe siècle, auquel est accolée une tour qui servait de pigeonnier. L'agencement des pièces intérieures est représentatif du XVIIIe siècle. A cette époque le jardin semble avoir fait l'objet d'aménagements dont témoignent un certain nombre de fabriques. Le moulin à eau, dit de Gièvre, de la fin du XVIIIe siècle, se présente sous la forme d'une fabrique chinoise. Éléments protégés MH : les façades, les toitures et l'escalier avec sa rampe à balustres en bois du château : inscription par arrêté du 25 mai 1976. Le moulin à eau, dit de Gièvre, y compris son mécanisme : inscription par arrêté du 1er mars 1989.","habitants":"Famille  Isaac dAlençon\r\n        \"","divers":"à Monteaux, celui de Monteaux grav-1-2-3-4-5   et du Portail  grav-6-7                                                                                     Monteaux 47° 29' 02\" nord, 1° 06' 31\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Monteaux_1.jpg","../../jctruffet.com/image/image_41/41_Monteaux_2.jpg","../../jctruffet.com/image/image_41/41_Monteaux_3.jpg","../../jctruffet.com/image/image_41/41_Monteaux_4.jpg","../../jctruffet.com/image/image_41/41_Monteaux_5.jpg","../../jctruffet.com/image/image_41/41_Monteaux_6.jpg","../../jctruffet.com/image/image_41/41_Monteaux_7.jpg"]},"Consult_chateau_formulaireb9c4":{"id":"Consult_chateau_formulaireb9c4","dept":"41","canton":"Blois","commune":"Montils","nom":"Montils","type":"Vestiges-château-forts","periode":"XIII-XV","histoire":"Deux châteaux à Montils les vestiges de Montils  et la Frileuze et la de Landes.                                                                                             MONTILS, construit par Thibault V comte de Blois entre 1180 et 1190, devait ressembler à celui de Châteaudun, bâti entre 1170 et 1190 par le même comte et dont laccès se faisait à 10 m du sol. Le donjon a du être dressé dans la seconde partie du règne de Thibaud V, au plus tôt dans les années 1160-1170 probablement. La salle basse servait de prison, on y accédait uniquement à partir du premier étage par un goulet. Dans la salle basse, une fosse latrine se déversait dans une salle souterraine. Deux soupiraux éclairaient la prison. Le château subit de graves dommages au cours des guerres de Religion. Partiellement écroulée en 1964, une campagne de restauration est menée en 1991. Il s'agit d'une tour circulaire surplombant le confluent de la Bièvre et du Beuvron. L'intérieur du rez-de-chaussée possède une voûte en plein cintre autour d'un pilier central qui abrite un puits. En février 2006, la commune des Montils a décidé la restauration du donjon.\r\nÉléments protégés MH : les vestiges de la tour : inscription par arrêté du 6 mai 1986.","architecture":"FRILEUZE Mr et Mme H de Gheest propriétaires en 1930.  Louis XIIIe fait restauré de Montils au XIIe siècle, les Montils au XIIIe siècle, au sens de « lieu fortifié ». Ancienne ville fortifiée attenante et château fort construits au XIIe siècle par Thibaud le Grand, comte de Blois. Maison-Dieu fondée par la comtesse Marguerite en 1222. L'église relevait de l'abbaye de Bourg-moyen ; ancien diocèse de Chartres. En août 1944, à l'occasion d'un incendie dans le château de Frileuse, les autorités d'occupation exécutèrent quelques résistants et blessèrent le curé, l'abbé Habeau, qui mourut quelques jours après de ses blessures. Une stèle commémore l'événement à l'extrémité de l'allée du château de Frileuse.","habitants":"Frileuze, M et Mme H de Gheest\r\n        \"","divers":"à Montils les vestiges de Montils  grav-1-2 et la Frileuze grav-3-4 et la de Landes grav-5-6  .Montis 47° 29' 41\" nord, 1° 17' 49\"  Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Montils_1.jpg","../../jctruffet.com/image/image_41/41_Montils_2.jpg","../../jctruffet.com/image/image_41/41_Montils_3.jpg","../../jctruffet.com/image/image_41/41_Montils_4.jpg","../../jctruffet.com/image/image_41/41_Montils_5.jpg","../../jctruffet.com/image/image_41/41_Montils_6.jpg"]},"Consult_chateau_formulaire5dc1":{"id":"Consult_chateau_formulaire5dc1","dept":"41","canton":"Chambord","commune":"Montlivault","nom":"Montlivault","type":"Château","periode":"XIV-XVII","histoire":"MONTLIVAULT, manoir modeste en 1593, la construction du grand corps de logis fut entreprise de 1610 à 1620, ancien manoir des courbato  résidence des seigneurs de Courbaton et de Montlivault en 1593 Jean d'Etampes, seigneur de Valençay et gendre de Jacques  Hurault se défait de la terre de Montivault au profit de Jacques le Maire, conseiller, secrétaire et maître des comptes du roi Henri IV, pui a son fils René. En 1738, Jean François le Maire   remanie le château  et en fait don à sa fille Marie-Angélique qui à épousée Eléonor Guyon seigneur de Diziers lieutenant des vaisseaux du roi. Le château  a été occupé pendant la guerre  de 1870 par l'état major du prince de Hesse. Le château appartient toujours à la famille Guyon-de-Montlivault.","architecture":"MONTILVAULT, en 1738 fut construit laile gauche appelée aussi \"petit château\", le portail et les grilles. Cette bâtisse présente donc au sud-est une façade sobre surmontée dune corniche à mondillons et trois lucarnes dont deux sont inachevées, la façade nord ouest est plus originale placées en encorbellement aux extrémités, deux minces tourelles en briques percées de petites meurtrières. Au centre, deux \"occuli\" signalent la présence dun escalier de pierre Louis XIII dont les rampes se développent autour dun mur ajouré. Le mur qui délimite le parc sappuie sur des vestiges de dépendances, et notamment sur deux tours munies de petites meurtrières rondes. Éléments protégés MH : les façades et les toitures des deux ailes du château, de l'Auditoire de Justice et de la tour d'enceinte subsistante ; le portail d'entrée ; à l'intérieur du château l'escalier en pierre du XVIIe siècle, les deux cheminées en pierre du XVIIe siècle au premier étage, la cheminée Louis XV du salon et son trumeau : inscription par arrêté du 13 juillet 1987.","habitants":"famille Guyon-de-Montlivault.\r\n        \"","divers":"Montlivault : 47° 38' 22\" Nord, 1° 26' 37\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Montlivault_1.jpg"]},"Consult_chateau_formulairea85d":{"id":"Consult_chateau_formulairea85d","dept":"41","canton":"Montoire sur le Loire","commune":"Montoire sur le Loire","nom":"Montoire_41","type":"vestiges-château","periode":"XII-XiV","histoire":"deux châteaux à Montoire celui  des vestiges de Montoire et Challay (voir article).                                                                                                            MONTOIRE sur LOIR,  le château féodal tire son origine des points fortifiés édifiés le long du Loir pour protéger les populations contre les attaques des Normands aux IXe et Xe siècles. Il est le siège de la seigneurie de Montoire qui dépendait du comte de Vendôme. Nihard, seigneur de Montoire en 1033, bâtit le donjon qui est ensuite entouré par une double enceinte. Il passe vers 1070 à Hamelin de Langeais issu d'une famille du Vendômois. Le sire de Montoire accède par mariage à la tête du comté de Vendôme. En 1188, Richard Coeur de Lion s'empare du bourg, aux dépens du roi de france Philippe II. Au XIVe siècle, le dispositif défensif est renforcé par des tours et une muraille. Dans la seconde moitié du XIVe siècle, le comte Jean VI achève les fortifications et fait creuser un fossé sur la rive droite du Loir pour protéger la ville neuve. En 1362, Robert Marcault s'empare de la ville pour le compte des Anglais. La forteresse était puissante avec un donjon solidement retranché. Le Roi Henri IV a fait démanteler le château à la fin des guerres de religion. En 1847 la commune achète les ruines du château. Les fossés de la rive droite ont été comblés sous le Second Empire. Éléments protégés MH : les ruines du château fort de Montoire sur Loir : classement par liste de 1862.","architecture":"MONTOIRE, les ruines du château dominent la ville , le donjon carré du XIIe siècle , les enceintes du XIVe siècle et XVIe siècle subsistent au milieu de la végétation.    La construction du château remonte au Xe siècle, mais il fut remanié et presque reconstruit aux XIVe et XVe siècles. L'édifice forme un triangle bordé, du côté sud, par un chemin et un ravin. Sur le côté ouest, le plus exposé, un fossé fut creusé au pied du donjon. Il était protégé par un autre, et par une grosse tour carré en avant de ce bastion. Au nord, une première cour était entourée d'un mur, de trois tours et d'un fossé. Elle renfermait un prieuré de Saint-Martin. Le château proprement dit avait une double muraille, avec tours, et une porte flanquée de deux autres tours, entre lesquelles se dressait un pont-levis. Des rampes et des escaliers d'accès conduisaient aux différents étages de cours et de bâtiments jusqu'au donjon, lequel était enveloppé presque entièrement par une troisième muraille. De plan rectangulaire, le donjon était couronné par un chemin de ronde avec mâchicoulis. Des passages souterrains communiquaient entre les bâtiments. Les troupes de Henri IV s'en emparèrent et son démentéllement fut ordonné.","habitants":"Seigneurs locaux\r\n        \"","divers":"à Montoire celui  des vestiges de Montoire                                             Montoire  47° 45' 18\" Nord, 0° 51' 52\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Montoire_41_1.jpg","../../jctruffet.com/image/image_41/41_Montoire_41_2.jpg"]},"Consult_chateau_formulairef3b8":{"id":"Consult_chateau_formulairef3b8","dept":"41","canton":"Montrichard","commune":"Montrichard Val sur Cher","nom":"Montrichard_41","type":"Vestiges-château-fort","periode":"XI-XIII-XIX","histoire":"MONTRICHARD, le premier château-fort de Montrichard a été construit au début du XIe siècle par le comte d'Anjou Foulques Nerra. Il lui servait de point d'appui dans la lutte qu'il menait contre les comtes de Blois. Le premier fidèle à qui il en attribua la garde est Roger le Diable, seigneur de Montrésor. En 1109 Hugues d'Amboise, s'empare du bourg et du château, il développe la forteresse, ce sont les restes de celle-ci que nous voyons maintenant. En 1188, le Roi de France Philippe Auguste fait le siège et enlève le château, celui-ci est alors partiellement détruit. La famille d'Amboise le  cède  au roi Louis XI. C'est dans ce château qu'a été célébré le mariage de Jeanne de France, la fille de Louis XI, avec Louis d'Orléans, futur Louis XII. Pendant les guerres de religion, en septembre 1589, le château est pris par le ligueur catholique, Claude de Marolles, mais celui-ci se rend rapidement au marquis de Souvré, un fidèle du Roi Henri IV. En 1585, Philippe Hurault chancelier de France et comte de Cheverny, achète la terre de Montrichard. Son fils Louis lui succède. Au XVIIe siècle, la seigneurie passa à Antoine Ruzé, marquis d'Effiat, premier écuyer du duc d'Orléans.Éléments protégés MH : le donjon de Montrichard : classement par arrêté du 14 juillet 1877.","architecture":"MONTRICHARD en 1016 construction du premier ouvrage défensif en 1109, du donjon actuel, au XVe siècle du nouveaux logis n'avait pas à l'origine de fonction militaire, dans l'enceinte du château , un ouvrage défensif a été détruit  et en 1188  lorsque les troupes de Philippe Auguste s'emparèrent de Montrichard. Au XIIIe siècle se traduira par une construction d'une enceinte enveloppant les fronts sud et ouest de la Basse cour et venant renforcer une première enceinte défendue par une poterne, au nord de la basse cour, deux corps de logis furent construit en équerre. Une tour cylindrique à étages voûtés, communiquant avec le donjon par un pont dormant. Les logis élevés sur des terrains instables s'écrouleront en 1753 donna la fin du domaine étant depuis longtemps privée de toute fonction militaire. Montrichard se  résume essentiellement aujourd'hui  à son donjon se présente comme une tour carrée haute de 20 mètres flanqués de contreforts et aux vestiges de courtines crénelées délimitant une enceinte quadrangulaire.                                                                                                      VALLAGON, cet élégant château à tourelles, date de 1851. Installé au cur des vignobles du centre de la France, le château de Vallagon vous propose son hôtel, une piscine ouverte en saison entourée d'un parc de 4 Ha. Vous pourrez y déguster des vins locaux au bar ou sur la terrasse. Décorées simplement, les chambres sont revêtues de parquet et offrent une vue sur le parc. Gérant : Kieftenbeld Clemens, Maria Gérant : Coenen Marcel, Eduard Gérant : Van Den Berg Jan, Johan","habitants":"Montrichard, comte d'Anjou Foulques Nerra Valagnon,\r\n        \r\n        \"","divers":"a Montrichard celui de Montrichard grav de1 à 5 et de Vallagon  grav -6-7                                                                       Montrichard 47° 20' 36,96\" Nord et 1° 11' 9,96\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Montrichard_41_1.jpg","../../jctruffet.com/image/image_41/41_Montrichard_41_2.jpg","../../jctruffet.com/image/image_41/41_Montrichard_41_3.jpg","../../jctruffet.com/image/image_41/41_Montrichard_41_4.jpg","../../jctruffet.com/image/image_41/41_Montrichard_41_5.jpg","../../jctruffet.com/image/image_41/41_Montrichard_41_6.jpg","../../jctruffet.com/image/image_41/41_Montrichard_41_7.jpg"]},"Consult_chateau_formulaireffb3":{"id":"Consult_chateau_formulaireffb3","dept":"41","canton":"Ouzouer le Marché","commune":"Muides-sur-Loire","nom":"Muides_sur_Loire","type":"Château","periode":"XVIII","histoire":"Deux châteaux à Muides le Colliers et Cressonnière.                   COLLIERS   Bâti en 1751, sur le bord de la Loire, par le Chevalier de Bela, le château de Colliers vous accueille pour une halte ou un séjour au calme du haut des terrasses dominant la Loire. Il sera pour vous la porte dentrée des châteaux du Val de Loire. La longue allée de tilleuls bicentenaires vous annonce lauthenticité de son intérieur et la sincérité de laccueil. La propriété qui jouxte le parc du château de Chambord, appartient à la famille de Gélis depuis 1783. Dans le pavillon nord-est se trouvent des peintures réalisées dans la seconde moitié du XVIIIe siècle, d'inspiration italienne, situées dans la salle-à-manger. Le soubassement et la corniche sont peints directement sur le mur. Le reste du décor est peint sur des toiles insérées dans les boiseries. Quelques thèmes sont identifiables : chute de Phaeton, Mars désarmé par Amour, Diogène dans son tonneau, Diane. Les autres panneaux n'ont pas de thèmes bien définis. Trois paysages de ruines ornent les dessus-de-porte.","architecture":"COLLIERS a été construit en 1737, au lieu-dit Colliers, par Ange-Jacques Gabriel, premier architecte du roi. Le chevalier de Béla était espion en Suède, au sujet des fonderies de canons, pour le roi Louis XV, et chambellan du roi de Pologne. Il aurait fait construire le château de Colliers, pour y vivre secrètement avec sa maîtresse, Mlle de Chauloy. Il est inscrit aux M.H. depuis 1991. \r\nÉléments protégés MH : l'ensemble pictural de la salle à manger actuelle du château ; les façades et les toitures du pavillon abritant cet ensemble pictural : inscription par arrêté du 31 octobre 1991.                                       CRESSONNIERE, autrefois la Closerie de Bel Air. Elle a appartenu à Antoine Edmé Pruneau de Pommegorge, gouverneur de la ville de Saint Dyé. Le château de la Cressonnière devint une pension de famille au début du XXe siècle. Après la guerre, cest une colonie de vacances appartenant à Félix Potin puis à la ville de Bagneux qui sy installe. Après avoir été inhabité, pendant plusieurs années, le château de la Cressonnière a été entièrement rénové, il est devenue depuis 2000 l'actuelle Mairie de Muides-sur-Loire.","habitants":"Colliers, famille de Gélis Créssonnière; à Félix Potin \r\n        \r\n        \"","divers":"à Muides le Colliers grav 1-2-3, Cressonnière grav-4 et Marais grav-5.                                                                    Colliers     47° 39' 56\" Nord et 1° 30' 54\" Est                      Créssonnière : 47° 40' 11\" Nord et 1° 31' 44\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Muides_sur_Loire_1.jpg","../../jctruffet.com/image/image_41/41_Muides_sur_Loire_2.jpg","../../jctruffet.com/image/image_41/41_Muides_sur_Loire_3.jpg","../../jctruffet.com/image/image_41/41_Muides_sur_Loire_4.jpg","../../jctruffet.com/image/image_41/41_Muides_sur_Loire_5.jpg"]},"Consult_chateau_formulaire18af":{"id":"Consult_chateau_formulaire18af","dept":"41","canton":"Selles sur Cher","commune":"Mur en Sologne","nom":"Mur_en_Sologne","type":"Château","periode":"XVI","histoire":"Mur en Sologne, 5 châteaux tous privés:  La Morinière, Boisgenceau, Fondjouan, La Cailleterie, La Noue.\r\nMORINIERE,Le château de la Morinière a été construit au milieu du XVIe siècle. Sa façade, décorée par un parement de briques, se caractérise par une certaine asymétrie des ouvertures. Il a abrité le grand-père du poète Pierre de Ronsard ainsi que l'écrivain Paul Besnard au XXe siècle. Après les des Roches-Herpin, se succédèrent la famille Benoit jusqu'en 1811, puis la famille Martinet et ses descendants jusqu'en 2016. Sur ce domaine existe également un magnifique pigeonnier et la tuilerie.Les autres furent édifiés vers la seconde moitié du XIXe siècle.\r\nFONDJUAN, une maison de maître existait, demeure de la famille Bertheaulme dit de Fondjouan, pour la différencier de Bertaulme dit de Marville. Le comte Léon de Rodats fit construire l'actuel château terminé en 1853, puis vendu en 1855 à Alexis Fontaine.                                                                     La CAILLETERIE par la famille Gaudron.  M Jean de Bournonville est le propriétaire en 1930.\r\nLa NOUE par la famille Taillarda. Les des Roches, seigneurs de la Morinière, suite au mariage en 1424 de Gauvain Des Roches, avec Perrette Lemoine, fille de Louis, lui-même seigneur de la Morinière. René Des Roches époux de Renée Chaudrier (tante de Pierre de Ronsard) fit construire l'actuel château de la Morinière vers 1548. Cette lignée Des Roches, puis des  Roches-Herpin, restera propriétaire du lieu jusqu'à la moitié du XVIIe siècle.","architecture":"MORINIERE, construit au XVIe siècle, de style Renaissance à l'emplacement d'un édifice féodal, par Guillaume des Roches qui avait la surveillance des travaux du château de Chambord. Le pont-levis et la galerie située près de l'entrée ont été détruits vers 1828. Le château se compose d'une avant-cour entourée de murs et bordée par les communs en briques et pierres. Historique : De là se fait l'accès dans l'enceinte rectangulaire du château, entouré sur les quatre faces de douves. Au fond se dresse le corps de logis principal, en briques et pierre, avec fenêtres à meneaux aux chapiteaux Renaissance. Une lanterne carrée se dresse sur la toiture, abritée par une pyramide que surmonte un campanile portant un dauphin en girouette. Sur la droite, un autre corps de logis porte la caractéristique du règne de Louis XII. Dans l'angle sud-est de l'enceinte se trouve un pavillon abritant la chapelle. En dehors de l'enceinte s'élève le colombier, contenant 1600 cases dont l'accès se fait par une échelle tournante.","habitants":"Morinière; famille Benoit                                                                 Fondjuan; famille Bertheaulme                                                          La Noue;  famille Taillarda\r\n        \"","divers":"a Mur en Sologne, la Morinière grav 1-2, Boisgenceau grav-3-4, Fondjouangrav-5-6, La Cailleterie grav-7.                                   Morinière 47° 26' 13\" nord, 1° 34' 57\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Mur_en_Sologne_1.jpg","../../jctruffet.com/image/image_41/41_Mur_en_Sologne_2.jpg","../../jctruffet.com/image/image_41/41_Mur_en_Sologne_3.jpg","../../jctruffet.com/image/image_41/41_Mur_en_Sologne_4.jpg","../../jctruffet.com/image/image_41/41_Mur_en_Sologne_5.jpg","../../jctruffet.com/image/image_41/41_Mur_en_Sologne_6.jpg","../../jctruffet.com/image/image_41/41_Mur_en_Sologne_7.jpg"]},"Consult_chateau_formulairee4e6":{"id":"Consult_chateau_formulairee4e6","dept":"41","canton":"Chambord","commune":"ST-Claude de Diray","nom":"Ménars","type":"Château","periode":"XVII-XVIII","histoire":"MENARS,  son propriétaire inital était Jacques Charron et son fils Guillaume trésorier général sous Louis XIII qui fit construire le château, celui-ci passa par héritage  à Colbert en faveur de qui Louis XIV l'érigea en marquisat en 1676. Elle abritait une statue de Louis XV par Nicolas Coustou, remplacé aujourd'hui par une copie de la Vénus de Médicis par Jean-Jacques Clérion. Vers l'Est, la terrasse se termine par un rond-point où Marigny fit bâtir un kiosque dans le goût chinois dessiné par Charles De Wailly. Cette demeure superbe n'eut que des propriétaires célèbres,   De 1728 à 1732 le roi Stanislas Leszczynski et la reine Catherine Opalinska séjournèrent chaque été. En 1760 achat de Ménars par Mme de Pompadour qui décède en 1764. Son frère Abel Poisson marquis de Vandières et de Marigny directeur des bâtiments du roi hérite du domaine poursuit l'embellissement du château, l'héritier du marquis  Poisson de Malvoisin se défait d'une partie des collections en 1804 Victor futur maréchal et duc de Bellune acquiert le château devenu ministre de la guerre de Louis XVIII donnera à Ménars des fêtes somptueuses. En 1830, Emile Pellapra surnommée l'Aiglonne qui passait pour la fille naturelle  de Napoléon hérite du domaine, son second époux, le prince de Chimay, fils de la célèbre Mme Tallien transforme le château  en établissement d'enseignement pour les jeunes gens, passe ensuite à la princesse de Beauffremont née Chimay  le revend en 1879 à la compagnie de Saint-Gobain qui le possède jusqu'en 1983.","architecture":"MENARS , c'est un château de style Classique, a été bâti de 1646 à 1775, composées de quatre pavillons du XVIIIe siècle, corps de logis central, légèrement en retrait  encadré de deux pavillons et de deux ailes, il est précédé d'une galerie basse, la façade arrière reliée par une belle rotonde du XVIIIe siècle,  des ailes couvertes en terrasse  remplace celle de Charron, de chaque côté de la cour d'honneur sont élevés deux bâtiments de service, le pavillon de l'horloge et celui du méridien. Au pied du château, la rotonde de l'abondance, construite par Soufflot, permet de passer du sous-sol du château à l'intérieur de l'orangerie. Les pièces ayant conservé leurs décors se situent principalement au rez-de-chaussée. Ils se composent de peintures sur bois, tapisseries, sculpture, menuiserie. Les architectes étaient Ange-Jacques Gabriel et Jacques-Germain Soufflot. Un jardin à l'anglaise fut créé dans le Bois Bas, petit ravin situé à l'ouest, que Marigny planta de bosquets d'arbres d'essences diverses. Au bord de la Loire, un désert fut aménagé et orné d'une grotte artificielle, est classé aux M.H. depuis le 15/02/1949. L'Hôtel de Ville de Ménars est installé dans les murs du château.  Éléments protégés MH : les façades et les toitures du château et des dépendances classement par arrêté du 21 août 1986. propriété d'une société civile immobilière du domaine de Ménars.","habitants":"Madame de Pompadour Jeanne Antoinette Poisson \r\n        \"","divers":"ST-Claude de Diray, Menars : 47° 38' 20\" Nord et 1° 24' 37\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_M%c3%a9nars_1.jpg","../../jctruffet.com/image/image_41/41_M%c3%a9nars_2.jpg","../../jctruffet.com/image/image_41/41_M%c3%a9nars_3.jpg"]},"Consult_chateau_formulaire7af0":{"id":"Consult_chateau_formulaire7af0","dept":"41","canton":"Chambord","commune":"Neung sur Beuvron","nom":"Neung_sur_Beuvron","type":"Château","periode":"XV-XVIII-XIX","histoire":"Sept châteaux à Neung sur Beuvron celui de Beuvron, Chauvallerie, de Gué-Mulon, de Marcheval, de Villebourgeon (voir article) et de Villemorant et de la Touchette.                                                                                            CHAUVELLERIE, le château de la Chauvellerie a été construit dans la deuxième moitié du XIXe siècle ; élévation à travées; un étage carré et étage de comble ; gros-oeuvre en brique ; toit conique et toit à longs pans couverts d'ardoise. En 1930, la propriété appartenait à la Vicomtesse de Geoffre de Chabrignac.                                                       GUE-MULON    Ce château très simple ne manque pas de charme, un corps de logis central est flanqué d'une tour ronde d'un côté et d'un pavillon carré de l'autre. Ce vaste domaine, qui en 1750 comprenait 1650 hectares, n'en comportait plus que 230 lorsqu'il fut racheté un siècle plus tard par le comte Regnault de Beaucarron qui y reçut le maréchal de Mac-Mahon en 1883. Au début du XXe siècle, la propriété appartenait à monsieur et madame Jean des Fontaines.                                                                                                              MARCHEVAL.  à Millancay, en 1883, la propriété appartenait à M. Emmanuel de Bersy et en 1889 au marquis de Ferrières-Sauvebuf. Mlle de Sauveboeuf propriétaire en 1930. Éléments protégés MH : les façades et les toitures du château : inscription par arrêté du 20 août 1976.","architecture":"TOUCHETTE, c'est juste avant 1914 que Lucien Jullemier acheta le domaine de La Touchette à Neung-sur-Beuvron. Vers 1919, il y reçut à déjeuner le président de la République Raymond Poincarré. Puis dès 1920, il commanda à l'architecte Pierre Chauvallon la métamorphose de la simple maison de maître, rectangulaire et en brique, de La Touchette en « château » avec une aile de communs tout autant « antidatés.       MARCHEVAL, a l'ouest de l'esplanade se trouvent des bâtiments du XIXe siècle. A l'est est située la chapelle surmontée d'un clocheton. Au sud, la maison du garde a été conservée. L'esplanade est longée par des douves qui la séparent de la cour intérieure du château qui en occupe le côté nord. Le château, en briques et pierres, du XVIIIe siècle, a été construit à l'emplacement d'un édifice plus ancien. Le centre de la façade sud forme une avancée surmontée d'un fronton triangulaire, les ailes sont redoublées symétriquement par les communs.                                   VILLEMORANT, maître Prudhomme-Soliot propritaire en 1930, Jean-Bedel Bokassa, président de la république centrafricaine, était le propriétaire du château de Villemorant.Marie-France Bokassa n'était pas revenue depuis plus de vingt ans. Même si les lieux ont changé, elle en garde des souvenirs de vacances heureuses.","habitants":"Chauvallerie; Vicomtesse de Geoffre de Chabrignac.                   Gué-Mulon;  jean des Fontaines.                         Marcheval;marquis de Ferrières-Sauvebuf,                     Touchette; Lucien Jullemier,                                  Villebourgeon; Nicolas Gontault.                           Villemorant;  M Prudhomme-Soliot\r\n        \"","divers":"à Neung sur Beuvron celui de Beuvron grav-1-2, Chauvallerie grav-3, de Gué-Mulon grav-4-5, de Marcheval grav-6-7,  de Villemorant grav-8  et de la Touchette  grav-9.","gps":"","images":["../../jctruffet.com/image/image_41/41_Neung_sur_Beuvron_1.jpg","../../jctruffet.com/image/image_41/41_Neung_sur_Beuvron_2.jpg","../../jctruffet.com/image/image_41/41_Neung_sur_Beuvron_3.jpg","../../jctruffet.com/image/image_41/41_Neung_sur_Beuvron_4.jpg","../../jctruffet.com/image/image_41/41_Neung_sur_Beuvron_5.jpg","../../jctruffet.com/image/image_41/41_Neung_sur_Beuvron_6.jpg","../../jctruffet.com/image/image_41/41_Neung_sur_Beuvron_7.jpg","../../jctruffet.com/image/image_41/41_Neung_sur_Beuvron_8.jpg","../../jctruffet.com/image/image_41/41_Neung_sur_Beuvron_9.jpg"]},"Consult_chateau_formulaire0970":{"id":"Consult_chateau_formulaire0970","dept":"41","canton":"Salbris","commune":"Nouan le Fuzelier","nom":"Nouan_Fuzelier","type":"Château","periode":"XIV-XV-XIX","histoire":"Cinq châteaux à Nouan le Fuzelier; Chales, Mazères, Moléon, Mont-Evray, Pottin.                                                                                         MAZERES, seigneurie attestée en 1387 et 1404 ; forteresse édifiée en 1415 pour Regnault de Silly ; vestiges de ce château et de sa motte encore visibles à la fin du XVIIIe siècle, mais aujourd'hui détruits; nouveau château construit à proximité au XVIIe ou dans la première moitié du XVIIIe siècle, achevé avant 1750, château détruit après 1838, seuls les communs subsistent, il est remplacé par un bâtiment composé d'un étage carré et un étage de comble. MOLEON, a partir d'une construction remontant au XVe siècle, rendez vous de chasse, l'édifice a été agrandi en plusieurs étapes. Les principales campagnes de travaux remontent aux XVIIe et XIXe siècles. De l'édifice primitif subsistent la tour octogonale à la base carrée, ainsi que l'aile ouest accolée d'une tour ronde. A cette partie ont été ajoutés au XVIIe siècle un corps de logis parallèle au bâtiment du XVe siècle, avec un pavillon faisant retour d'équerre. La campagne de travaux menés au XIXe siècle a conféré au château son aspect actuel, ces travaux comprennent un bâtiment qui s'accroche à l'ancien corps du XVIIe siècle derrière une échauguette en encorbellement. A l'extérieur de l'esplanade déterminée par le fossé, ont été ajoutés à cette époque des communs qui ont remplacé des bâtiments détruits. Ce bâtiment est caractéristique des châteaux de Sologne à architecture de brique. propriété de la comtesse de Laage de Meux.\r\nÉléments protégés MH : les façades et les toiture de la tour du XVe siècle sur la façade Sud ;inscription par arrêté du 20 décembre 1985.","architecture":"CHALES, le domaine de Chalès, acquis en 1947 par luvre des Orphelins des Douanes, est issu du partage de la propriété dite « Potin » qui comptait plus de 2.000 hectares au XIXe siècle. Il a appartenu notamment à Mme Gaumont (les cinémas) et M. Raymond (ingénieur grenoblois, dépositaire exclusif pour lEurope de la fabrication de la fermeture éclair et propriétaire du brevet de fabrication du bouton-pression), son mari.Reconnue dutilité publique dès 1922, elle uvre aujourdhui pour lenfance douanière.  Le château a été construit en 1905 par monsieur Bigot, entrepreneur qui avait acheté le domaine un an plus tôt.  vous propose son gîte et ses chambres d'hôtes pour un séjour agréable.\r\nMONT-EVRAY, château XIXe siècle, propriété privée, tour carrée,  il est construit sur un domaine de 160 hectares, au cur de la Sologne, a été légué à lAssociation les Petits frères des Pauvres pour servir de lieu daccueil intergénérationnel. Cette ancienne Maison de maître, à l'origine a été construite à la fin du XVIIIe siècle. Une extension de la briqueterie du domaine a été réalisée au XIXe siècle avec lajout de deux tours dangle, lui apportant son aspect du château actuel. C'est une construction typique en brique rouge couverte dardoise. Au dessus du porche dentrée, les armoiries des anciens propriétaires ont été sculptées dans la pierre. Le château de Mont-Evray a été inscrit aux M.H. le 20/12/1985                                                                                                                            POTTIN, Nouan-le-Fuzelier, château du XXe siècle.","habitants":"Mazères;  Regnault de Silly                                                     Moleon ;comtesse de Laage de Meux.                                              Chales; Mme Gaumont Mont-Evray \r\n        \"","divers":"à Nouan le Fuzelier; Chales grav 1-2, Mazères grav-3, Moléon grav-4, Mont-Evray grav-5, Pottin-grav-6    Chataignerie grav-8   Voilly grav-8  Villegondin grav-9                                             Chalès GPS : 47° 32' 15\" Nord, 2° 02' 19\" Est                                                 Moléon 47° 32' 15\" Nord, 2° 02' 19\" Est                                                                 Mont-Evray : 47° 30' 17,16\" Nord, 2° 2' 1,61\" Est","gps":"47° 32' 15\" Nord, 2° 02' 19\" Est","images":["../../jctruffet.com/image/image_41/41_Nouan_Fuzelier_1.jpg","../../jctruffet.com/image/image_41/41_Nouan_Fuzelier_2.jpg","../../jctruffet.com/image/image_41/41_Nouan_Fuzelier_3.jpg","../../jctruffet.com/image/image_41/41_Nouan_Fuzelier_4.jpg","../../jctruffet.com/image/image_41/41_Nouan_Fuzelier_5.jpg","../../jctruffet.com/image/image_41/41_Nouan_Fuzelier_6.jpg","../../jctruffet.com/image/image_41/41_Nouan_Fuzelier_7.jpg","../../jctruffet.com/image/image_41/41_Nouan_Fuzelier_8.jpg","../../jctruffet.com/image/image_41/41_Nouan_Fuzelier_9.jpg"]},"Consult_chateau_formulaire7d5a":{"id":"Consult_chateau_formulaire7d5a","dept":"41","canton":"Chambord","commune":"Nozieux","nom":"Nozieux","type":"Château","periode":"XVII","histoire":"NOZIEUX, il y aurait beaucoup à dire sur l'histoire du hameau de Nozieux. Autrefois partie intégrante de la commune de Montlivault, Nozieux fut rattaché à Saint Claude sous Louis XIV : les paroissiens se plaignaient de léloignement de leur église alors que celle de Saint Claude nétait pour eux quà une demi lieue. \r\n Au XVIIe siècle, Jehan de Charon y fit construire un château. Propriété pendant quatre ans de Mme de Pompadour (comme le château de Ménars qui lui fait face), il ne reste plus de lédifice que des caves voûtées et de belles dépendances privées. Le domaine était entièrement clos de murs, neuf pavillons en marquaient les angles : il nen demeure que deux. Propriété de Franck Provost.","architecture":"Nous pouvons également admirer à Nozieux une jolie demeure du XVe siècle dont la façade possède de belles fenêtres à meneaux. Cette maison est un ancien relais de diligence (propriété privée).","habitants":"Jehan de Charon\r\n        \"","divers":"Château de Noizieux","gps":"","images":["../../jctruffet.com/image/image_41/41_Nozieux_1.jpg","../../jctruffet.com/image/image_41/41_Nozieux_2.jpg"]},"Consult_chateau_formulaire935e":{"id":"Consult_chateau_formulaire935e","dept":"41","canton":"Onzain","commune":"Onzain","nom":"Onzain","type":"Château","periode":"XIV-XVIII","histoire":"Cinq châteaux à Onzain celui d'Onzain, les Douves, Seillac,Tertres et Vallandran.                                                                                                               ONZAIN, de 1358 à 1380, les anglais occupent la région, dont la « forteresse d'Onzain » dès octobre 1358, et aussi Bury dont il ne reste que des ruines en 1362. C'est cette forteresse qu'apporte en dot Jeanne Guénand, descendante de Guy de Bury, à son Epoux, Hélion de Neillac en 1380. Celui-ci est un important personnage de la Cour des rois Charles V puis Charles VI, et il entreprend, avec son frère Guillaume, de reconstruire le château en 1381, La fille d'Hélion, Jeanne, mariée en 1402 à Guillaume d'Argenton, hérite du château, que ses descendants garderont durant tout le XVe siècle. En 1498, Jeanne de Chambes, autre descendante de Jeanne de Neillac, rachète à ses cousins Renée de la Haie et Joachim de Montespedon le château et la totalité des domaines. En 1563, le château d'Onzain sert de prison pour le prince de Condé, fait prisonnier à Dreux, qui essaie de s'en évader, est repris et conduit à Amboise. Le château a été confisqué en 1562 par Catherine de Médicis. Le château est vendu par les héritiers de la Rochefoucault au marquis de Vibraye puis, en 1642, à Charles de Rostaing, arrière petit-fils de Florimond Robertet, qui avait fait construire le château de Bury vers 1515.  En 1720, elle fait don de sa seigneurie, de son château, et de ses dettes, au Comte de Varax, son neveu. Celui-ci et son fils, Jacques-Marie de Perrachon, reçoivent Voltaire à Onzain, Ambroise-Julien-Clément de Feillet, conseiller au parlement de Paris achète le château en 1753, puis le vend en 1760 à Michel-Jean-Hugues de Péan, gouverneur général du Québec jusqu'à 1759, la propriété a été saisie en 1816, vendue en lots. Le château est démoli de 1823 à 1826 et les matériaux sont également vendus.","architecture":"Les châteaux d'ONZAIN et HAUTES LOIRE, de plan rectangulaire,le  corps de logis central à deux niveaux,toits en croupes avec lucarnes sur combles, des  pavillons carrés aux extrémités accolés par deux pavillons à un étage.                                                                                                                                      Les DOUVES, il subsiste la plate-forme castrale de 2000m entourée de ses douves en eau. Un jardin bordée de murs, situé entre les douves et le ruisseau du Cissereau, complètent cet ensemble au charme indescriptible au centre de cette plarte forme édifice de plan rectangulaire à deux niveaux,  le château est reconstruit à la fin du XIVe siècle par les frères Hélion et Guillaume de Neillac, proches des rois Charles V et VI. Il reste de cette campagne une partie de la grosse tour maîtresse bâtie au nord de la propriété.   Anne de Polignac et son époux Francois II de la Rochefoucault qui mènent de front la reconstruction dOnzain et de La Rochefoucault (Charentes) durant le deuxième quart du XVIe siècle. Ils ne conservent du château dHélion de Neillac que la grosse tour maîtresse, la famille Perrachon (1720-1753).                                                                                                         Au nord d'Ouzain le château du TERTRE  du XIXe siècle, corps de logis central  à deux niveaux et lucarnes sur comble  toit en croupe, accolé sur les flanc de pavillon d'une travée à niveau inférieur  Bernard et Christine Valois dirigent un hôtel de charme.                                                                                                                       Au nord d'Ouzain le château de SEILLAC du XVIIIe siècle gîte de vacances  et du TERTRES  à Onzain demeure de la fin du XIXe siècle transformé en hôtel restaurant par Christine et Bernard Valois.","habitants":"Onzain;   marquis de Vibraye                                                       Douves; Famille de Neillac                                                       Tertre; Famille de Valois\r\n        \"","divers":"à Onzain celui d'Onzain grav-1, les Douves grav-6, Seillac grav-2 -3 ,Tertres grav-4 et Vallandran grav-5.   Oinzain 47° 30' 04\" nord, 1° 10' 29\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Onzain_1.jpg","../../jctruffet.com/image/image_41/41_Onzain_2.jpg","../../jctruffet.com/image/image_41/41_Onzain_3.jpg","../../jctruffet.com/image/image_41/41_Onzain_4.jpg","../../jctruffet.com/image/image_41/41_Onzain_5.jpg","../../jctruffet.com/image/image_41/41_Onzain_6.jpg"]},"Consult_chateau_formulaire844f":{"id":"Consult_chateau_formulaire844f","dept":"41","canton":"Onzain","commune":"Marolles","nom":"Pezay","type":"Château","periode":"XV-XVIII","histoire":"PEZAY, dès 1095, le premier propriétaire de cette terre, Ebrard de Puisée, en fait don aux moines de Marmoutier près de Tours. En 1680, l'édifice est en possession de la famille Bélot qui le vend à Marie Boesnier, épouse en seconde noce de Jacques Masson. Leur fils fut connu sous le nom de marquis de Pezay, baron de Frasnay, sans justifier ses titres. Littérateur, il fréquente les salons de la haute société  est choisi par Maurepas pour donner des leçons de tactique à Louis XVI. Mais il se fit des ennemis qui le firent exiler dans ses terres où il mourut en 1777. Ancien domaine de labbaye de Marmoutier, est acquis en 1680 par la famille Belot. En 1752, les Belot le revendent à Marie Boësnier, veuve de Jacques Masson et sur de Paul Boësnier de l'Orme. Il passa à son fils Alexandre-Frédéric-Jacques Masson de Pezay. En 1784, la demeure est achetée par Charles-Victor François de Salaberry qui la revend en 1793 à M. Grignon de Bonvallet. Sa veuve la lègue à son neveu M. Bouneau d'Alençon, qui la passe à M. Storelli, dont le fils devint l'amiral André Storelli, chef d'état-major de la Marine, qui possède le château avec sa femme, Bernadette d'Irumberry de Salaberry.","architecture":"Le château de Pezay, La façade du château d'une longueur inhabituelle résulte en réalité de la réunion tardive (1871) de deux corps de logis indépendants du XVIIIe siècle reliés par une travée centrale en faible saillie et flanquée de quatre tours trapues ajoutées pour la circonstance.","habitants":"famille Bélot et Charles-Victor François de Salaberry\r\n        \"","divers":"A Marolles, château de Pezay  47° 39' 20\" Nord et 1° 18' 36\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Pezay_1.jpg","../../jctruffet.com/image/image_41/41_Pezay_2.jpg","../../jctruffet.com/image/image_41/41_Pezay_3.jpg"]},"Consult_chateau_formulairee91d":{"id":"Consult_chateau_formulairee91d","dept":"41","canton":"Montoire sur le loir","commune":"Huisseau en Beauce","nom":"Plessis_Fortia","type":"Château","periode":"XV-XVIII","histoire":"A trois kilomètres au sud ouest le château d'Ambloy                                                                                                                          PLESSIS-FORTIA dit Plessis saint-Amand, seigneurie du Plessis-Fromentières qui a été vendue le 8 avril 1599 par la veuve de Gilbert du Puy du Fou à Bernard de Fortia III vers 1566-1629  conseiller au parlement de Paris en 1585, épouse en 1586  Marguerite Leclerc, fille de Nicolas Leclerc, secrétaire du roi. La construction du château  entre 1600 et 1620. À la mort de Bernard Fortia III, le château est inachevé mais habitable. Le contrat de 1633 traite de la construction du pavillon. Au décès de Bernard de Fortia, le château revient à son fils François (vers 1587-1631). Conseiller du roi  maître des requêtes en 1629, intendant du Dauphiné en 1628 et intendant de Guyenne en 1631. Peu de travaux ont été effectués dans le château du Plessis-Fortia. Il épousera Anne de La Barre, en 1619. En 1633, « Jehan Foy, s'engage à terminer la construction du château. Anne de La Barre fit surélever le corps principal du logis, construire le grand escalier de pierre, le gros pavillon Est qui porte les initiales d'Anne de La Barre. Sur une lucarne du gros pavillon Est on lit 1638 et les initiales BF.  Bernard de Fortia IV a été conseiller au parlement de Normandie en 1642, maître des requêtes en 1649, Il s'est marié en 1649 à Marguerite Le Mairat, fille de Jean Le Mairat et d'Anne Colbert de Saint-Pouange.  Le château du Plessis-Fortia ira, ensuite, à son fils, Jacques, puis, en 1726, à son fils cadet, l'abbé Anne Bernard de Fortia, qui le revendit, en 1728, à Charles Prévost, sieur de Saint-Cyr. En 1755 les créanciers obtiennent la vente   à René Goury qui meurt en 1760 passe  Jean-Jacques de la Poëlerie et à son neveu Etienne Sanlot riche financier vend à Michel Foucault se dernier meurt en 1821 sa veuve Marie-Elisabeth Leray de Chaumont treize ans plus tard par héritage passera à la famille Le Gouvello puis aux La Villarmois qui le cède en 1913 à madame Van den Brock d'Obrenan ces derniers  meurt en déportation en 1944. toujours dans cette famille.","architecture":"PLESSIS-FORTIA , en 1971 leurs petits-fils vendent à la famille Séjournet, onze ans après possession d'une société immobilière. Le château du Plessis-Fortia est inscrit aux M.H. depuis 1953.  L'édifice se compose d'un logis central et de deux pavillons rectangulaires perpendiculaires et saillant légèrement sur les façades. De part et d'autre du pont de pierre, franchissant la douve pour donner accès à la cour d'honneur, se trouvent deux pavillons en brique et pierre. Au nord-est, le château a été prolongé par un bâtiment d'habitation. Éléments protégés MH : les façades et les toitures du château, des deux pavillons isolés édifiés de chaque côté de la cour d'honneur et le parc : inscription par arrêté du 27 août 1953.                                                                                                               AMBLOY, du XVIIIe siècle,  au moyen-âge ce domaine avait une importance certaine et dépendait de la Baronnie de Lavardin. Au XIVe siècle, il appartenait à la famille Juston, puis passa au siècle suivant, par mariage, aux de Vimeur. En 1506, il fut vendu à François Carreau, époux de Jeanne de Ronsard. Puis le château passa à la famille du Plessis et aux d'Aloigny au XVIIe siècle. Au début du XVIIIe siècle, la demeure fut reconstruite sous son aspect actuel par Louis Antoine de Verthamon. Ses descendants possédèrent cette propriété jusqu'au milieu du XIXe siècle.","habitants":"Famille de Bernard de Fortia III                                              Ambloy ;famille Juston\r\n        \"","divers":"A Huisseau sur  Beauce, le château d'Ambloy  grav-1 et de Pessis-Fortia grav-2-3-4                                                         47° 42' 39\" Nord, 1° 00' 19\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Plessis_Fortia_1.jpg","../../jctruffet.com/image/image_41/41_Plessis_Fortia_2.jpg","../../jctruffet.com/image/image_41/41_Plessis_Fortia_3.jpg","../../jctruffet.com/image/image_41/41_Plessis_Fortia_4.jpg"]},"Consult_chateau_formulaire15b8":{"id":"Consult_chateau_formulaire15b8","dept":"41","canton":"Montrichard","commune":"Pontlevoy","nom":"Pontlevoy","type":"Abbaye","periode":"XVI-XVIII","histoire":"A Pontlevoy plusieurs châteaux en plus de l'abbaye, Bordes, Maré Belle-Etoile, Laleu, Mahoudière.                                                                                                    PONTLEVOY, labbaye est fondée en 1034 par Gelduin II de Saumur (mort le 11 septembre 1040). Preuve de son attachement pontilévien, il est inhumé le 23 septembre en léglise abbatiale de Pontlevoy. A la fin du XIVe siècle, en pleine Guerre de Cent Ans, les anglais ruinent les lieux. Puis ce seront les protestants venant de prendre Blois (en février 1568). Toujours en ruines en 1623. Plus pour longtemps : en 1644, un collège voit le jour. En 1776, Louis XVI y installe le collège royal de préparation militaire. Une référence. Sous la Révolution, pas besoin dêtre grand clerc pour imaginer que la convention ne soutient pas lenseignement religieux, A la suite de diverses péripéties,  baisse drastique du nombre délèves et malversations financières, létablissement se trouve dans une situation économique catastrophique à la fin du XIXe siècle. Pendant la première guerre mondiale, il abrite un hôpital de 500 lits où les blessés reprennent des forces. Mais lécole ferme à lorée de la seconde guerre mondiale. Elle deviendra un centre de formation professionnelle. En 1972 sinstalle Promotrans, association de formation de chauffeurs routiers. Lorsque vingt ans après, lassociation part à Vendôme, labbaye ferme. Un bel espoir renaît avec le vu de Michel Petrucciani de faire de labbaye une école de jazz (avec Didier Lockwood). Malheureusement, le génial pianiste meurt prématurément le 6 janvier 1999 à New York.  Décor néo-Rocaille du XIXe siècle.","architecture":"BORDES,  tel qu'il nous apparaît actuellement est le fruit de l'adaptation architecturale aux modes de vie et d'habitat qui se sont succédé durant trois voire quatre siècles. En 1763, M. de la Ponce achète le domaine et entreprend d'important travaux pour agrandir autant que pour améliorer et mettre au goût de l'époque sa nouvelle demeure. Il fait alors appel à un architecte Louis Denis. Le Camus et un autre corps de bâtiment est alors construit en face de celui qui existait déjà, puis le corps central du château actuel est élevé pour réunir les deux bâtiments qui constituent des ailes de retour. Au XIXe siè
