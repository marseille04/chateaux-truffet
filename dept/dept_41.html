cle sont bâtis un escalier d'apparat et une galerie.                                                          MARE,  manoir construit entre 1456 et 1507, l'édifice est entouré de fossés d'eau, accessible par deux ponts, dont certaines parties forment des viviers. Il se compose d'un logis avec chapelle indépendante, un corps prolongeant le logis et servant à l'origine d'écuries et de grenier, et des granges converties en garage et logement. L'intérieur du logis, remanié dans les années 1900, conserve deux cheminées monumentales d'origine, des coussièges sur deux niveaux. La chapelle est formée de deux travées, voûtée d'ogives à nervures moulurées portées par des culots sculptés dans la nef et par des colonnes engagées dans l'abside. Elle conserve des vestiges de peinture murale des années 1500. Au début du XXe siècle, les bâtiments agricoles ont été transformés en logements. Éléments protégés MH : les façades et les toitures du logis seigneurial ; la chapelle en totalité, et le puits : inscription par arrêté du 7 novembre 2003.                                           LALEU;  M Desbaines propriétaire en 1930.","habitants":"Bordes; M. de la Ponce \r\n        \"","divers":"A Pontlevoy plusieurs châteaux en plus de l'abbaye grav-4, Bordes grav-6 , Maré Belle-Etoile grav-5, Laleu grav-1, Mahoudière grav-7.   Bordes : 47° 24' 41\" Nord, 1° 13' 34\" Est            Maré  47° 24' 54\" nord, 1° 12' 18\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Pontlevoy_1.jpg","../../jctruffet.com/image/image_41/41_Pontlevoy_2.jpg","../../jctruffet.com/image/image_41/41_Pontlevoy_3.jpg","../../jctruffet.com/image/image_41/41_Pontlevoy_4.jpg","../../jctruffet.com/image/image_41/41_Pontlevoy_5.jpg","../../jctruffet.com/image/image_41/41_Pontlevoy_6.jpg","../../jctruffet.com/image/image_41/41_Pontlevoy_7.jpg","../../jctruffet.com/image/image_41/41_Pontlevoy_8.jpg"]},"Consult_chateau_formulairef017-2":{"id":"Consult_chateau_formulairef017-2","dept":"41","canton":"Montoire sur le Loir","commune":"Couture sur Loir","nom":"Possonnière","type":"Château","periode":"XVI","histoire":"Trois châteaux à Couture sur Loir celui du Pin, de la Possonnière et la Verrerie.                                                                                                           PIN  à Couture sur loir M de la Chaussée propriétaire en 1930. pas d'autre information sur ce château.                                            POSSONNIERE, où Pierre de Ronsard naquit en 1524. Le manoir, construit par le père du poète vers 1515,  construit par Olivier de Ronsard avec son épouse Jeanne d'Illiers des Radrets, le château passe par alliance à la famille de Château-Renault vice -amiral et maréchal de France passa à la famille d'EStaing qui le transforme en ferme, acquit par l'architecte Eugène  Fanost qui le restaure et le vend à monsieur  Delahaye aujourd'hui dans sa descendance les Hallopeau. Éléments protégés MH : le château de la Possonnière dit aussi Château de Ronsard : classement par liste de 1862.                                                           A cinq kilomètres au sud à Montrouveau le château de la Verrerie. VERRERIE   Le château, construit en 1810, est situé dans un parc de 17 hectares avec des arbres exceptionnels, son architecture a belle allure. Le château est atypique, par son environnement naturel, un parc qui a conservé arbres en sous-bois, massifs, jardins aménagés et potager. Les intérieurs nont pas été modifiés, mais restaurés, depuis sa construction : plafonds avec une grande hauteur, pas de division des pièces, carrelages dépoque et boiseries, un univers intérieur raffiné et délicieusement excentrique déco classique revisitée avec des accents Gustavien, du Baroque, des objets contemporains. M. Bruno Dujardin, le propriétaire des lieux, a mis huit ans à le restaurer, chambres d'hôtes.","architecture":"PIN, classique de plan rectangulaire à deux niveaux avec corps de logis central entre deux pavillons latéraux frontons sur façade.                                                                                                                 POSSONNIERE,  à gardé  sa tour octogonale ses fenêtres à meneaux et surtout ses devises latines semée sur la façade comprend un corps de logis rectangulaire, et des dépendances creusées dans le tuffeau. Les cuisines troglodytes ont des portes ornées de sculptures Renaissance. Le château a été fortement restauré au XIXe siècle. La demeure présente, par son décor, un grand intérêt, on y trouve pour la première fois des éléments qui seront utilisés ensuite dans les châteaux royaux des bords de Loire, mêlés à des décors floraux. L'ensemble n'est pas parvenu intégralement jusqu'à notre époque. Il comprenait plusieurs bâtiments groupés autour d'une cour intérieure: le corps de logis principal, des communs. La chapelle et l'aile en retour, vers le coteau, ont disparu. Du bâtiment adossé au coteau ne restent que les caves et une partie de l'escalier qui desservait les étages. Il est de style Renaissance Italienne. Il est surnommé le château de Ronsard. Il date du XVIe siècle. Le château de la Possonnière est l'ancienne maison natale de Pierre de Ronsard. Venez découvrir ce lieu intimiste, loin de la foule des grands châteaux de la Loire, et laissez-vous bercer par un Ronsard chantant la nature vendômoise. Le Manoir de la Possonnière à la fin du XVe siècle et communs troglodytiques ornés de sentences et de sculptures Renaissance. Jardins de roses anciennes et contemporaines.","habitants":"Pierre de Ronsard\r\n        \"","divers":"à Couture sur Loir celui du Pin grav 6-7, de la Possonnière  grav-3-4-5  et la Verrerie grav 1-2.   Poissonnière : 47° 44' 48\" Nord et 0° 41' 32\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Possonni%c3%a8re_1.jpg","../../jctruffet.com/image/image_41/41_Possonni%c3%a8re_2.jpg","../../jctruffet.com/image/image_41/41_Possonni%c3%a8re_3.jpg","../../jctruffet.com/image/image_41/41_Possonni%c3%a8re_4.jpg","../../jctruffet.com/image/image_41/41_Possonni%c3%a8re_5.jpg","../../jctruffet.com/image/image_41/41_Possonni%c3%a8re_6.jpg","../../jctruffet.com/image/image_41/41_Possonni%c3%a8re_7.jpg"]},"Consult_chateau_formulaire17a5":{"id":"Consult_chateau_formulaire17a5","dept":"41","canton":"Montoire sur le Loir","commune":"Naveil","nom":"Prépatour_Naveil","type":"Château","periode":"XVIII","histoire":"PREPATOUR,  de 1745, année où le Sieur Courlesvaux achète le domaine et fait construire le château actuel (le corps principal) pour remplacer la demeure existante en trop mauvais état, à 1970, année où lécole ménagère agricole, qui occupe les lieux depuis 20 ans, ferme définitivement. Différents propriétaires et leurs familles se sont succédé dans ce château, y laissant chacun des traces de leur histoire. Quant aux habitants de ce lieu-dit (une dizaine de foyers), leur vie fut marquée par les guerres, le passage du tramway, etc. En 1961, Pierre Richy, alors instructeur dart dramatique à l Académie de Paris, séduit par Prépatour, y tourne un film : «Les 3 griffes», une histoire de sorcellerie. Des habitants du lieu y sont figurants. Une projection par jour est programmée. Le samedi, lépouse et la belle-sur de Mr Richy,décédé il y a quelques années nous feront lhonneur dêtre présentes.","architecture":"PREPATOUR, construit vers le milieu du XVIIIe siècle pour un sieur de Courlesvaux, l'ancien manoir, très délabré à cette date, avait eu sa période de grâce et de gaieté à l'époque ou Antoine de Bourbon y venait boire le vin blanc de Surin, produit de son clos que lui même et son fils Henri IV après lui affectionnait tout particulièrement et que chanta Ronsard, depuis la dernière guerre, le domaine appartient au département qui à installé une école d'enseignement ménager agricole. l'édifice de plan rectangulaire à deux niveaux à huit travées  et série de lucarnes correspondantes sur toits brisés à la mansard.","habitants":"Sieur Courlesvaux\r\n        \r\n        \"","divers":"A Naveil le château de Prépatour","gps":"","images":["../../jctruffet.com/image/image_41/41_Pr%c3%a9patour_Naveil_2.jpg"]},"Consult_chateau_formulaire6701":{"id":"Consult_chateau_formulaire6701","dept":"41","canton":"Savigny en Braye","commune":"Pézou","nom":"Pézou","type":"Château","periode":"XIV-XIX","histoire":"deux châteaux à Pézou celui de Chicheray et Secretainerie.                                            CHICHERAY    Le château actuel a été construit en 1840 pour le comte de Ferrières Sauvebuf, mais le domaine a une longue histoire. Parmi ses anciens seigneurs, on trouve en effet Jean Cueillette, gouverneur du Languedoc et maire de Tours en 1511. Puis l'édifice appartient successivement aux familles de Bruet, de Marescot, de Brunier. En 1930, la propriété était à la famille de Brisoult.","architecture":"SECRETAINERIE, ce lieu était autrefois connu sous le nom de prieuré Sainte Catherine parce que la chapelle était dédiée à cette sainte, mais les habitants l'appelaient également la Dîme parce que c'était dans la grange dîmeresse de ce prieuré qu'étaient apportées les dîmes de la paroisse. Les possessions des moines de la Trinité de Vendôme à Pezou remontaient au Xe siècle, mais elles étaient trop faibles pour justifier le maintien d'un prieuré et en 1318, par décision du chapitre, le prieuré fut réuni à l'office de secrétain de l'abbaye, d'où le nom de \"secrétainerie\". Son vrai nom devrait être fief Beauxoncles, car il avait été édifié au XIVe siècle par un Beauxoncles, bourgeois de Vendôme. Ses fils, parvenus à la noblesse, firent sculpter leurs armoiries sur le manteau de la cheminée où elles sont encore. L'édifice fut acheté au XVe siècle par les moines de la Trinité et devint la maison du prieuré. Le fief, lui-même des Beauxoncles, consistant principalement en la rivière du Loir, a été racheté par Jean Cueillette, seigneur de Chicheray. Cette demeure, qui se mire dans la rivière, est l'une des plus pittoresques de la vallée du Loir. Elle est entretenue avec soin par M. Pierre Janssen.","habitants":"Chicheray, comte de Ferrières Sauvebuf                          Serétainerie ;  Jean Cueillette\r\n        \"","divers":"à Pézou celui de Chicheray gra-1 et Secretainerie grav-2.","gps":"","images":["../../jctruffet.com/image/image_41/41_P%c3%a9zou_1.jpg","../../jctruffet.com/image/image_41/41_P%c3%a9zou_2.jpg"]},"Consult_chateau_formulaire9d17":{"id":"Consult_chateau_formulaire9d17","dept":"41","canton":"Savigny sur braye","commune":"Renay","nom":"Renay","type":"Château","periode":"XVII-XIX","histoire":"RENAY, le fief dépendait de l'abbaye de la Trinité de Vendôme. La demeure a sans doute été construite pour la famille de Rochambeau qui possédait cette terre. Parmi les anciens seigneurs de Renay, on trouve Jean Bobin en 1351, Pierre de Courbanton en 1424 et son gendre Gilles de Gallon en 1497. Le premier seigneur fut Guillaume de Renay (1180) puis resta dans la même famille de 1400 à 1720  de Courbenton, de Gallon, Guischard, de Courcillon, en 1751 le Maréchal et Marquis de Rochambeau acquit la maison qui resta dans la famille jusqu'en 1816. Suit les Ragunet Lépine, les Haudos de Possesse, les Jeanpierre, les Roucher. C'est la propriété de M. Durand qui a dépecé la propriété. Le château passa ensuite à la famille Guischard qui était protestante, elle y résida jusqu'à la révocation de l'édit de Nantes, provoquant l'exil de Jean Guischard qui céda Renay à son épouse, Catherine de Courcillon, qui s'était convertie au catholicisme. C'est la famille du maréchal de Rochambeau qui donna son aspect définitif au château avant de s'en séparer en 1816. Éléments protégés MH : les façades et les toitures de la tour et du bâtiment du XVe siècle : inscription par arrêté du 15 juillet 1971.","architecture":"RENAY, la construction date du XIIe au XIXe siècle. Le fief dépendait de l'abbaye de la Trinité de Vendôme. Au Nord-Ouest du château se trouve une grosse tour circulaire du XVe siècle. A l'Ouest et à l'extérieur, deux lignes d'étroites ouvertures de cette tour ont été ouvertes et ornementées à la Renaissance. Contigu à cette tour et faisant équerre, se trouve un mince bâtiment qui servait d'amorce au mur d'enceinte, encadrant le plan carré. Le château du XVIIe siècle est un quadrilatère dont la façade extérieure au Sud revient aux deux extrémités en deux pavillons. Une tour du XIIe siècle faisait partie d'un système défensif comprenant un ensemble de tours de gué le long du Loir,  Châteaudun, Fréteval, Lavardin, elle a été remaniée au XVIe siècle dans le gout de la Renaissance. Elle est reliée à d'importants bâtiments du XVIIe siècle par une charmante galerie reconstruite au XIXe siècle, auparavant poterne d'entrée avec un magnifique pont-levis, il reste une infime partie des douves. La seigneurie de Renay s'étendait sur environ 700 hectares de Chêne-Carré à La Chapelle-Enchérie.  Suit les Ragunet Lépine, les Haudos de Possesse, les Jeanpierre, les Roucher. C'est la propriété de M. Durand qui a dépecé la propriété.","habitants":"Renay; Guillaume de Renay\r\n        \"","divers":"château de Renay 47° 50' 30\" Nord, 1° 9' 57\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Renay_1.jpg","../../jctruffet.com/image/image_41/41_Renay_2.jpg"]},"Consult_chateau_formulaire6d91":{"id":"Consult_chateau_formulaire6d91","dept":"41","canton":"Selles sur Cher","commune":"Theillay","nom":"Rere","type":"Château","periode":"XIV","histoire":"RERE, les fondations du château datent du XIVe siècle, appartenait alors et depuis, à la Famille d'Orléans. Il fut reconstruit à partir de 1658 et restauré en 1898. Le château appartient depuis au Comte Albéric dOrléans. C'est le plus ancien domaine familial de Sologne. Il est habité par sa famille depuis le XIVe siècle. C'est la 22  èime génération de la famille qui se transmet le château de Rère de père en fils. Albéric d'Orléans nous parle d'un certain Georges Pompidou, Lieutenant de réserve, qui se trouvait au château de Rère, en Juin 1940, avec des réfugiés venus de Belgique et du Nord de la France. Le château de Rère vous propose ses chambres d'hôtes.","architecture":"RERE,  aurait pu opter pour la vente du château, il a finalement décidé de le faire vivre. Vaille que vaille. Un gîte puis des chambres d'hôtes ont vu le jour. Les salles et les jardins accueillent aussi des réceptions, des séminaires et des expositions d'art contemporain. Un autre projet prend également forme, tourné vers la formation. l'hôte des lieux raconte alors les hommes et les destins des tableaux dans la salle de billard, des Cent-Jours à Waterloo; les blasons conservés dans la splendide chapelle consacrée, les commodes et le plancher qui datent de la reconstruction, au XVIIe siècle; les deux tours rondes du XVe siècle qui enserrent le château, etc. Un détour dans les couloirs du temps et nous voilà pendant la 2ème Guerre mondiale.","habitants":"Famille d'Orléans.\r\n        \"","divers":"A Theillay , Rere 47° 18' 52\" Nord et 2° 02' 28\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Rere_1.jpg"]},"Consult_chateau_formulaire4be1":{"id":"Consult_chateau_formulaire4be1","dept":"41","canton":"Blois","commune":"Rilly-sur-Loire","nom":"Rilly_sur_Loire","type":"Château","periode":"XVII","histoire":"Deux châteaux à Rilly dont celui de Rilly, celui de  la Haute Borde,   HAUTE-BORDE  : La location para-hôtelière professionnelle destinée à toute personne physique ou aux entreprises pour des courts, moyens et longs séjours, accompagnés de fourniture de prestations de services,. « Propriété de la famille Debois-Redon, cétait une résidence agricole avec trois, quatre fermes autour », retrace Marie Barrère.La Haute Borde a ensuite appartenu à Berthe Jousselin qui a épousé un prince russe du nom de De Korewo, dans les années trente. Le château se met à accueillir « des événements culturels et artistiques : Berthe donnait des leçons de musique ». Et Marie Barrère de poursuivre son récit : « Sans enfant, elle décide de faire don de ses meubles au Mobilier national qui les a ensuite prêtés au château de Blois ; le château, lui, est mis en viager. » Puis, entre les années cinquante et les années quatre-vingt-dix, la Haute Borde devient un hôtel restaurant, avant donc dêtre racheté par la famille Barrère. Si pendant dix ans, la famille en a fait une résidence secondaire, elle a décidé de « la re-exploiter et de renouer » avec lesprit quavait voulu lui insuffler Berthe Jousselin et ainsi allier « tourisme et culture ».M et Mme Korewo propriétaire en 1930  La famille Barrère, plus précisément Marie et Jacques, en a fait lacquisition en 2007. Ce couple de marchands dart, arrivé dans la région il y a 25 ans, a eu un véritable « coup de cur » pour cet édifice situé au cur de la Vallée de la Loire.","architecture":"HAUTE-BORDE, la location immobilière meublée et équipée, l' organisation d'évènements et location de salle de réunion pour séminaires, la promotion d'artistes et gestion d'ateliers d' artistes à titre accessoire l'achat vente en direct de produits alimentaires et non alimentaires.  En lespace de treize ans, les propriétaires ont eu le temps de réviser lhistoire de ce château « construit au début du XIXe siècle ».                                                                            RILLY; propriétaire en 1930 : Marquise de Chauvelin.","habitants":"Haute-Borde; famille Debois-Redon\r\n        \"","divers":"à Rilly dont celui de Rilly grav 1-2-3, celui de  la Haute Borde grav  4-5","gps":"","images":["../../jctruffet.com/image/image_41/41_Rilly_sur_Loire_1.jpg","../../jctruffet.com/image/image_41/41_Rilly_sur_Loire_2.jpg","../../jctruffet.com/image/image_41/41_Rilly_sur_Loire_3.jpg","../../jctruffet.com/image/image_41/41_Rilly_sur_Loire_4.jpg","../../jctruffet.com/image/image_41/41_Rilly_sur_Loire_5.jpg"]},"Consult_chateau_formulaireccff":{"id":"Consult_chateau_formulaireccff","dept":"41","canton":"Salbris","commune":"Salbris","nom":"Rivaulde","type":"Château","periode":"XVI","histoire":"RIVAULDE, au XVe siècle, Rivaulde était un château-fort qui appartenait aux seigneurs de La Ferté-Imbault. Transformé en manoir, le peintre Toulouse-Lautrec en deviendra propriétaire, au XIXe siècle. En 1882, à la fin de sa vie, le peintre, ruiné, va se résoudre à revendre la propriété sur 3000 hectares, aux frères Schneider, de riches industriels du Creusot. Ceux-ci feront démolirent lancienne forteresse et feront rebâtir lédifice que lon connaît aujourdhui. Le Château de Rivaulde sera offert en cadeau par Henri Schneider à son épouse, Euxodie Asselin (1853-1942). C'est l'un des plus beaux châteaux de la Sologne. Le Château de Rivaulde est surnommé « le petit Vaux-le-Vicomte ». Il date du XXe siècle et se rtrouve au Nord-Est. ,   Henri Schneider meurt le 18 mai 1898, sans voir son nouveau château. Il laissera à son épouse, Eudoxie, la gestion du domaine. Mme Schneider fait, de Rivaulde, sa résidence de prédilection. Elle collectionnera les meubles anciens et les objets dart. Le reste des 3 000 hectares est partagé par les descendants de la branche Sauvage de Brantes, dont est issue, entre autres, Anne-Aymone, épouse du président Valéry Giscard d'Estaing, ou le père de celle-ci, François, résistant mort à Mauthausen (Autriche) en 1944.  Une photographie datant de 1913 atteste de la présence du Prince de Galles en vacances au château. De grands noms de la noblesse, de la finance, de lindustrie et de la diplomatie comptent parmi les habitués de la famille. Dans les années 1950, les héritiers Schneider ne peuvent plus entretenir cette énorme bâtisse qui est revendue au groupe Michelin. Celui-ci en fait une colonie de vacances puis labandonne aux pillards. Dans les années 1960, le château est revendu morcelé en copropriétés. En 1985, un golf est construit par un riche industriel parisien, mais celui-ci fait faillite, en 1996 et, les installations sont revendues à la Mairie de Salbris.","architecture":"RIVAULDE,  la construction du château initial date de 1524, mais il sera reconstruit en 1902 par larchitecte Coulon. De vastes dimensions, avec ses dépendances et notamment les écuries, le château de Rivaulde est alors surnommé « le petit Vaux-le-Vicomte ».   Pavillon circulaire central toit en bulbe autour duquel s'articulent deux longs corps de logis formant un L.  utilisant les fondations anciennes, dont le noeud central du plan est formé par un hall d'entrée avec un escalier monumental. L'escalier et le hall distribuent la zone des invités et la salle des chasseurs sur la droite, les appartements privés sur la gauche. Derrière le vestibule se trouvent trois pièces communes, bibliothèque, salon, salle à manger. La construction s'étend de 1900 à 1905. Le château et ses écuries appartiennent à la deuxième vague de constructions castrales qui voit le jour à partir de 1890, dans le centre et le sud-Est de la Sologne, la propriété se trouva partagée entre les trois héritières et il devint un lieu de colonies de vacances. En 1974, le château dont l'entretien devenait très lourd fut vendu. Sur un soubassement à deux niveaux et série de lucarnes sur comble deux pavillons carrés aux extrémités à trois niveaux toit a quatre pans idem avec lucarnes.","habitants":"seigneurs de La Ferté-Imbault\r\n        \"","divers":"A Salbris; Rivaulde 47° 25' 34\" Nord et 2° 03' 10\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Rivaulde_1.jpg","../../jctruffet.com/image/image_41/41_Rivaulde_2.jpg","../../jctruffet.com/image/image_41/41_Rivaulde_3.jpg","../../jctruffet.com/image/image_41/41_Rivaulde_4.jpg"]},"Consult_chateau_formulaire1dd1":{"id":"Consult_chateau_formulaire1dd1","dept":"41","canton":"Montoire sur le Loir","commune":"Thoré la Rochette","nom":"Rochambeau","type":"Château","periode":"XVI-XVIII","histoire":"ROCHAMBEAU ,  au XVIe siècle appartient à Louis de Belon, chanoine de saint-Georges de Vendôme, qui en fit don à sa sur Christine, épouse de Mathurin de Vimeur en 1516 Fauconnier du duc de Vendôme , en 1791 Rochambeau reçoit le bâton de maréchal   a été remanié au XVIIIe siècle par  Rochambeau. Il appartient depuis le XVIe siècle à cette famille. La chambre du maréchal n'a pas changé depuis sa mort en 1807. C'est la que son épouse , née Tellès  d'Acosta elle élévera les enfants de son fils qui fut retenu en captivité à Saint-Domingue pendant plus de dix ans la comtesse de Rochambeau  en est toujours propriétaire.","architecture":"ROCHAMBEAU , initialement construit au XVIe siècle, pour la partie centrale, a été remanié au XVIIIe siècle par le maréchal de Rochambeau, avec l'adjonction de deux gros pavillons carrés et de toitures à la Mansart.  Suite à un effondrement de la falaise, en face du château, on a bâti en 1841 un mur de soutènement de tracé concave, dans le goût néo-classique, développé entre deux tours, et comportant une chapelle au centre et de part et d'autre des communs. En 1841 effrondement partiel de la falaise faisant face  au château endommageant une partie de la cour d'honneur. Derrière ce bâtiment, en pénétrant sous la roche, on accède au puisard, sorte de théâtre circulaire ouvert, autrefois planté de vignes. La chapelle a été bâtie par l'Abbé Brisacier en 1873, curé atypique, démissionnaire de ses fonctions pour se consacrer à la sculpture et à l'architecture des églises. L'allée de tilleuls a été tracée par le maréchal de Rochambeau, et plantée de deux rangées de tilleuls de Hollande, bicentenaires aujourd'hui, longeant le Loir sur sa rive gauche, bordé du côté opposé par la coupe du coteau. Honoré de Balzac a évoqué cette allée qu'il a empruntée, élève au Collège des Oratoriens de Vendôme, durant les promenades du jeudi. Dans le coteau, sont percées de nombreuses grottes dont quelques unes pourraient bien avoir été habitées aux temps préhistoriques.  Inscription par arrêté du 12 septembre 1969.","habitants":"maréchal de Rochambeau, \r\n        \r\n        \"","divers":"a Thoré la Rochette; Rochambeau  : 47° 47' 47,14\" Nord et 0° 58' 55,29\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Rochambeau_1.jpg","../../jctruffet.com/image/image_41/41_Rochambeau_2.jpg","../../jctruffet.com/image/image_41/41_Rochambeau_3.jpg","../../jctruffet.com/image/image_41/41_Rochambeau_4.jpg"]},"Consult_chateau_formulaire0c42":{"id":"Consult_chateau_formulaire0c42","dept":"41","canton":"Savigny en Braye","commune":"Freteval","nom":"Rocheux","type":"Château","periode":"XIII-XVI-XIX","histoire":"ROCHEUX, le château de Rocheux était autrefois lune des dix seigneuries de la baronnie de Fréteval.  Le premier seigneur de Rocheux sappelait Jehan de Morée, en 1238, il habita le premier château au XIIIe siècle. La famille de Morée restera dans la seigneurie jusquau XVIe siècle, lorsque succéda la famille de Beauxoncles. En 1586 ce manoir consistait « en maison seigneuriale, court,  le tout clos à murs et grands fossés avec pont-levis, basse-cour en laquelle y a volière à pigeons et édifices pour le mestayer aussi close à murs et fossés hors laquelle court est la touche de bois de haulte fustaye, garenne, jardin. Marc-Hyacinthe de Rosmadec, vice-roi des Indes et gouverneur des Isles et terres fermes de lAmérique, devient lacquéreur de Rocheux en 1690, dont lun des descendants reconstruit le château vers 1720.  Puis, le château de Rocheux sera acquis en 1791 par la famille Le Trosne qui va le rebâtir en lui donnant lallure des Villas à litalienne. Cest à la fin du XIXe siècle que le comte de Villebresme le fit transformer. En 1996, lhôtel  restaurant ferma définitivement ses portes suite à la faillite du studio denregistrement implanté dans lune des dépendances, il fut vendu aux enchères à la bougie au tribunal de Blois en 1998, date à laquelle Laurent Guerre-Genton et sa famille en ont fait leur résidence.","architecture":"ROCHEUX , petite Histoire du château de Rocheux situé à Fréteval, il fut construit au XIIIe siècle où il était utilisé comme une maison seigneuriale, puis un relais de poste. A partir de 1815, le château fut remanié en villa à litalienne, style très en vogue à lépoque. A la fin du XIXe siècle, le château prit sa forme actuelle. Le domaine est également constitué dun parc de 18ha (dont 12 de bois avec des arbres centenaires), dune orangerie, une serre, un parc et 2 dépendances se faisant face à lentrée.          Le château de Rocheux et ses remarquables bâtiments dans leur forme actuelle où lon peut encore remarquer les blasons dans la salle principale. Après avoir été longtemps une « maison de maître », où les propriétaires vivaient de lexploitation des terres du domaine, avec un ensemble de fermes attenantes, une grande partie des terres fut vendue et le château devint une hostellerie, activité retrouvée car jadis, il fut déjà relais de poste et permettait aux quelques voyageurs de séjourner au château.","habitants":"famille de Beauxoncles\r\n        \"","divers":"A Freteval ; Rocheux   : 47° 51' 58\" Nord, 1° 11' 02\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Rocheux_1.jpg","../../jctruffet.com/image/image_41/41_Rocheux_2.jpg","../../jctruffet.com/image/image_41/41_Rocheux_3.jpg","../../jctruffet.com/image/image_41/41_Rocheux_4.jpg","../../jctruffet.com/image/image_41/41_Rocheux_5.jpg","../../jctruffet.com/image/image_41/41_Rocheux_6.jpg"]},"Consult_chateau_formulairef6de":{"id":"Consult_chateau_formulairef6de","dept":"41","canton":"Romorantin-Lanthenay","commune":"Romorantin-Lanthenay","nom":"Romorantin","type":"Château","periode":"XVI-XVIII-XIX","histoire":"ROMORANTIN, édifié vers 1450 pour Jean d'Angoulême, corps de logis et vestiges de trois tours ; agrandi et modifié vers 1510, puis transformé après la Révolution en palais de justice; construction au XIXe siècle des bâtiments de la sous préfecture, prison et gendarmerie; restauration dans la deuxième moitié  du XIXe siècle du palais de justice et partie de la sous préfecture en style néo-Renaissance, aménagements par Poupard, architecte, vers 1860, en 1970 après démolition de la prison et de la gendarmerie, la sous-préfecture est agrandie. Projet non exécuté, au début XVIe siècle d'agrandissement par Léonard de Vinci, François 1er porta son intérêt sur Chambord. Cependant les rois revinrent à Romorantin. François Il, qui n'a régné que quelques mois y signa, en 1559, une ordonnance connue sous \"  l'Edit de Romorantin  \", qui mettait fin à l'inquisition dans le Roussillon, à la suite du rattachement de la province à la France. Propriété du département, il abrite le palais de justice et sous-préfecture.Éléments protégés MH :  classé partiellement en 1912,   la  sous-préfecture occupe en partie l'aile attenante remaniée.","architecture":"RIOUBERT château XVIe-XIXe siècles de style néo-Renaissance.                                                                              Et à huit kilomètres au sud à Villefranche sur Cher le château de la GODINIERE, la carte de Cassini mentionne l'écart de la Grande Gaudinière à l'emplacement de l'actuel château ainsi que la métairie de la Petite Gaudinière à l'emplacement des actuelles parties agricoles. Le château a été construit à la limite du XVIIIe siècle XIXe siècle, une aile est élevée pendant la deuxième moitié du XIXe siècle. a un étage carré en  Gros-oeuvre: calcaire ; moellon ; pierre de taille de Couverture  toit à longs pans ; croupe   en   ardoise.","habitants":"François 1er \r\n        \"","divers":"a château de Romorantin-Lanthenay grav 1-2-3-7 de la Gaudinière grav-6 et de  Riobert grav 4-5; Remorantin 47° 21' 28\" nord, 1° 44' 32\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Romorantin_1.jpg","../../jctruffet.com/image/image_41/41_Romorantin_2.jpg","../../jctruffet.com/image/image_41/41_Romorantin_3.jpg","../../jctruffet.com/image/image_41/41_Romorantin_4.jpg","../../jctruffet.com/image/image_41/41_Romorantin_5.jpg","../../jctruffet.com/image/image_41/41_Romorantin_6.jpg","../../jctruffet.com/image/image_41/41_Romorantin_7.jpg"]},"Consult_chateau_formulairef322":{"id":"Consult_chateau_formulairef322","dept":"41","canton":"Savigny sur braye","commune":"Saint-Jean Froidmendel","nom":"Rougemont_41","type":"Château","periode":"XVII","histoire":"Trois châteaux Saint-Jean Froidmendel celui de Rogemont (verrerie) de Beauvoir                                                                                                                             ROUGEMONT, ce château de pierres et briques, du plus pur style grand siècle, a été précédé par une demeure appartenant à la famille de Vendôme qui avait été détruite par les Anglais en 1421 et qui fut ruinée vers 1600 par un incendie. Le propriétaire à cette époque, Simon Franceschi, était gentilhomme de Marie de Médicis, maître des Eaux et Forêts du comte de Dunois, époux d'Anne Chouasne, fille d'Hector Chouasne, seigneur des Coudreaux, fit rebâtir le château dans le style de l'époque sur le terre-plein de l'ancien édifice. Aussi pénètre-t-on dans la cour d'honneur par un portail défendu par un pont-levis. Le château lui même est formé d'un corps de bâtiment à un étage et le pavillon central, saillant, est surmonté d'un dôme orné d'une horloge et terminé par un lanternon. Ce beau château a été restauré vers 1765 par le marquis de la Chesnaie, seigneur des Diorières. Le domaine passa ensuite à la famille de Nadaillac et appartient aujourd'hui à Monsieur M.-J. Courteaux. Le château est situé au milieu d'un grand parc qui domine le village de Saint-Jean.                                                                        BEAUVOIR, le comte R. Labbé de Montais est le propriétaire en 1930, pas d'autre information pour ce château.","architecture":"Verrerie de Rougemont, Le 12 août 1473, le comte de Dunois donna à bail à Jean et André de Brossard, écuyers-verriers, une place en ruine en forêt de Fréteval, dans les bois de Mauvoisin pour y édifier les bâtiments d'une verrerie. Les travaux de cette verrerie ayant cessé par la mort du dernier propriétaire, le citoyen Busson-Challoir a continué cet établissement vers la fin de l'An VIII, et pour plus de facilités, il en a transporté le siège à Rougemont, auprès de la grande route de Vendôme à Châteaudun, mais toujours sur le dos  de la forêt de Fréteval. Ses affaires étant dès lors très dérangées, il na pas réussi dans cette entreprise et il a été forcé de l'abandonner le 10 Ventôse An XI ».Cette verrerie disparue au cours des années, fut à nouveau créée vers 1813, par Pierre Bessirard de la Touche, nouveau propriétaire du château de Rougemont qui possédait les forges de Fréteval et de Courcelles, ainsi que la verrerie de Mauvoisin ou Busloup ou la Brûlonnerie, en forêt de Fréteval. Celui-ci sassocia quelque temps plus tard à Louis Alexandre Vimont, maître de verrerie déjà cité. En 1851, elle était exploitée par Edmond, lun des fils Vimont.Elle était en face du château et fabriquait des cloches à melon, des flaconnages pour la pharmacie et la parfumerie.Ayant appartenu à la famille de Nadaillac, propriétaire du château, commune de Saint-Jean-Froidmentel, elle passa pendant les dix dernières années, à la société générale de Verrerie et cessa toute activité vers 1920. Les bâtiments furent rasés.","habitants":"Famille de  Simon Franceschi   et famille de Nadaillac\r\n        \"","divers":"Saint-Jean Froidmendel celui de Rogemontgrav -1-2  (verrerie) de Beauvoir grav-3-4","gps":"","images":["../../jctruffet.com/image/image_41/41_Rougemont_41_1.jpg","../../jctruffet.com/image/image_41/41_Rougemont_41_2.jpg","../../jctruffet.com/image/image_41/41_Rougemont_41_3.jpg","../../jctruffet.com/image/image_41/41_Rougemont_41_4.jpg"]},"Consult_chateau_formulairee6c0":{"id":"Consult_chateau_formulairee6c0","dept":"41","canton":"Montrichard","commune":"Fresnes","nom":"Roujoux","type":"Château","periode":"XVI","histoire":"ROUJOUX en 1450  aveu de Guillaume Paris pour sa terre de Roujoux auprès du châtelain de Fougères, en 1528 Jacques du  Pas de Feuquières cède Roujoux à Jean de Villebresme  seigneur de Fougères, époux de Jehanne le Berruyer, leur fils  Pierre de Villebresme fait construire le château au XVIe siècle,  en 1616  René de Maillé seigneur de Benehart et Diane Clausse  son épouse font rebâtir le château, en  1777 les Maillé  cèdent le domaine à Louis Richou de Rochefort et à son gendre  Joseph Lecomte à sa mort en 1803, les héritiers aliennent le château et ses terres à un marchand de biens, les sieurs Leconte et Beyenne entreprennent de tout revendre et  qui sera vendu en 1820 après avoir connu d'autres propriétaires entre temps échoit au colonel Carrel. Un propriétaire suivant les De Carbonnières à court d'argent dépouille le château d'une belle cheminée et autres. A la suite  deux ventes se succèdent en 1889 Gabriel Potier de la Morandière fils de Jules de la Morandière  (1813-1883) est demeure dans cette famille.","architecture":"ROUJOUX, ce château d'époque Louis XIII a été construit sur l'emplacement d'une forteresse plus ancienne dont il subsiste les vastes douves. Elle avait été possédée par la famille de Villebresmes, mais l'édifice actuel a été bâti par René de Maillé en 1625, comme en fait foi le fronton de la porte d'entrée qui porte cette date avec les armes du constructeur. En 1889, Gabriel de la Morandière, fils du célèbre architecte qui rénova Chaumont, restaure le château et aménage les appartements dans le goût de l'époque Louis XIII. Le château est formé d'un corps de bâtiment central flanqué de deux ailes en retour  qui encadrent la cour d'honneur, on accède  au corps central coiffé d'un toit brisé qu'éclairent deux lucarnes, par une belle porte dont l'entablement sculpté d'une frise est surmonté d'un fronton agrémenté d'un médaillon. Au centre un avant-corps percé d'une unique fenêtre et d'un oculus est amorti d'un grand fronton cintré. Au premier étage, une galerie est ornée de fresques montrant Persée délivrant Andromède. Le corps de logis se déploie  entre une tour ronde coiffée d'un dôme que somme un lanternon, et un pavillon en hauteur qu'accoste une petite construction percée d'un porche auquel mène un pont de bois franchissant la douve. Éléments protégés MH : le château, sa plate-forme et ses douves en totalité : inscription par arrêté du 5 mars 2007.","habitants":"Famille de Villebresmes\r\n        \"","divers":"A Fresnes le Roujoux 47° 26' 02\" nord, 1° 24' 03\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Roujoux_1.jpg","../../jctruffet.com/image/image_41/41_Roujoux_2.jpg","../../jctruffet.com/image/image_41/41_Roujoux_3.jpg","../../jctruffet.com/image/image_41/41_Roujoux_4.jpg","../../jctruffet.com/image/image_41/41_Roujoux_5.jpg"]},"Consult_chateau_formulaireaedd":{"id":"Consult_chateau_formulaireaedd","dept":"41","canton":"Salbris","commune":"Salbris","nom":"Salbris","type":"Château","periode":"XV-XVII","histoire":"Plusieurs châteaux à Salbris dont Chesne, Chéne,  Maranbert et Ortie, Bas-Boulay. Rivaulde voir article.                                                                             CHESNE, ce petit château date du milieu du XIXe siècle. Bertrand  et Marie-Laure des Abbayes le restaurent eux-mêmes depuis 6 ans. Il y a 5 grandes et belles chambres lumineuses sont à votre disposition, dont lune, située au rez-dechaussée est accessible aux personnes handicapées. Elles donnent toutes sur un beau parc ou sur la rivière. Vous pourrez disposer dun salon avec une cheminée et dun billard.C'est devenu un gîte d'hôtes. Vous arriverez au domaine en prenant une superbe allée de Douglas centenaires. Vous pourrez admirer le magnifique chêne de 600 ans situé derrière latelier de peinture de Marie-Laure. Dans cette propriété de 20 hectares bordée de 800 m de rivière, vous y trouverez le calme, lespace et la convivialité.                                                                                               CHENE, seigneurie attestée en 1413 ; le château est composé de deux corps en équerre et dépendances entourés de fossés, décrit en 1722; en mauvais état en 1760; reconstruit à neuf au milieu du XIXe siècle  ; deuxième aile en construction en 1864, achevée en 1869; fossés comblés entre 1760 et 1832 ; daté par travaux historiques. Le bâtiment se compose d'un étage carré et étage de comble. Gros-oeuvre en brique, le château est surmonté d'un toit à longs pans brisés et croupe recouverts d'ardoise.","architecture":"MARANBERT corps de logis central rectangulaire  entre deux pavillons rectangulaires de même niveaux, toits en croupes, à deux niveaux avec lucarnes sur combles,  pas d'information  historique  pour ce château.                                                                                                                      ORTIE, est situé au lieu-dit l'Ortie à Salbris. Depuis le Moyen-Age, Salbris n'est qu'un modeste village, appartenant à l'abbaye Saint-Sulpice-de-Bourges. Le bourg était réduit et se limitait aux rues rayonnant autour de l'église. De nos jours avec le développement du chemin de fer dans les années 1850, le village est devenu une ville importante au cur de la Sologne. Sa construction date  de la fin du XIXe siècle. C'est actuellement une propriété privée. Certaines remarques glanées sur le net laissent a penser que ce château ait eu à subir un incendie engendrant par la suite une restauration. La disparition des toitures du XIXe siècle, aurait tendance à confirmer ces faits.                                                                       VALAUDRAN, demeure du XIXe siècle,  entièrement rénové en 2019 transformé en hôtel restaurant pas d'autre information.","habitants":"Bertrand  et Marie-Laure des Abbaye\r\n        \"","divers":"à Salbris dont Chesne-grav-1, Chéne grav-2,  Maranbert- grav-3 et Ortie grav-8, Bas-Boulay gravc-4-5. Villaudran grav-6-7.                                                                                        Chesne 47° 25' 34\" Nord, 2° 03' 10\" Est                                                                   Ortie : 47° 25' 34\" Nord et 2° 03' 10\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Salbris_1.jpg","../../jctruffet.com/image/image_41/41_Salbris_2.jpg","../../jctruffet.com/image/image_41/41_Salbris_3.jpg","../../jctruffet.com/image/image_41/41_Salbris_4.jpg","../../jctruffet.com/image/image_41/41_Salbris_5.jpg","../../jctruffet.com/image/image_41/41_Salbris_6.jpg","../../jctruffet.com/image/image_41/41_Salbris_7.jpg","../../jctruffet.com/image/image_41/41_Salbris_8.jpg"]},"Consult_chateau_formulairef2e3":{"id":"Consult_chateau_formulairef2e3","dept":"41","canton":"Savigny en Braye","commune":"Sargé en Braye","nom":"Sargé_en_Braye","type":"Château","periode":"XV-XVII","histoire":"deux châteaux à Sargé en Braye, le Radrets et Montmarin.                 RADRETS, sur un éperon, dominant le confluent de deux vallées, la Grenne et la Braye, le château des Radrets est bâti sur un quadrilatère de fossés possédant sur trois angles ses bastions, fortifications des XVIe-XVIIe siècles. Cet ensemble est relié par une passerelle à l'ancien manoir de Tenay, devenu métairie au XVe siècle, possédant une tour carrée et une grange avec une charpente en carène de vaisseau renversé. En 1670, un aveu de René Elisée Darrot décrit ainsi les Radrets \"Maison noble de la Berruère composée d'un grand corps de logis couvert d'ardoises, auquel il y a une grande salle basse et haute chambre, le tout enclos de grandes murailles, pont-levis au devant et au derrière, faits de l'autorité du Roy lors des guerres civiles du royaume\". Le château garde le nom de Berruère de Saint Cyr de Sargé jusqu'en 1677, date à laquelle Louis XIV accorde par lettres patentes signées au camp de Cambrai en août 1677 de réunir en un seul fief les hommages et fiefs voisins de la Berruère de Sargé. Le 18 juin 1765, vente des Radrets, à l'audience du châtelet à Paris, à Louis Grégoire Mirleau de Neuville de Saint Héry, écuyer, fermier général, époux d'Anne Racine, fille de Louis Racine et petite-fille du grand poète. En 1831, vente des Radrets à Madame Marin de Montmarin, ancêtre des actuels propriétaires.","architecture":"MONTMARIN, a été construit à l'emplacement de celui de la Tuaudière. Le château, ses communs et la chapelle délimitent une cour rectangulaire. L'ordonnance sévère des bâtiments répond aux caractéristiques architecturales du XVIIe siècle, le corps de logis central s'accompagne de pavillons de chaque côté. L'intérieur est garni de boiseries du XVIIe siècle. Dans la bibliothèque, les boiseries de la partie centrale, de style XVIIIe siècle, proviendraient du château des Radrets. La cour est limitée au nord-est par les communs du XIXe siècle, et au nord-ouest par les deux pavillons et la chapelle de même époque que le château. Le domaine est complété par un beau portail d'entrée et un pigeonnier aux dates incertaines.\r\nÉléments protégés MH : les façades et les toitures du château et des deux pavillons : inscription par arrêté du 17 septembre 1986.                                                                       RADRETS, est bâti sur des fortifications du XVIe  XVIIe siècles. Un vaste terre-plein au plan carré est entouré de larges fossés. D'importantes caponières de défense sont en saillie. Chaque avancée est percée d'une large meurtrière. L'ensemble du mur-talus et des caponières est entouré d'un gros cordon nobiliaire. Le corps de logis principal remonte aux XVe et XVIe siècles. A l'arrière une tour d'escalier carrée est en partie imbriquée dans la façade ouest. Une aile en retour d'équerre est plus récente. Au sud, une chapelle a été accolée, au XVIIe siècle, au pignon méridional. La grange se compose de deux bâtiments en équerre avec, à l'angle extérieur, une tour carrée en saillie sur les deux façades. Elle présente une charpente de châtaigner en carène de navire, certainement gothique. Une fuye carrée se trouve entre la ferme et le château. inscription par arrêté du 1er avril 2010.","habitants":"Radrets; Madame Marin de Montmarin,\r\n        \"","divers":"à Sargé en Braye, le Radrets grav 2-3 et Montmarin, grav-1                                         Montmarin 47° 54' 58\" nord, 0° 50' 09\" Est                                                     Radrets  47° 56' 11\" nord, 0° 51' 04\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Sarg%c3%a9_en_Braye_1.jpg","../../jctruffet.com/image/image_41/41_Sarg%c3%a9_en_Braye_2.jpg","../../jctruffet.com/image/image_41/41_Sarg%c3%a9_en_Braye_3.jpg"]},"Consult_chateau_formulaire2c03":{"id":"Consult_chateau_formulaire2c03","dept":"41","canton":"Savigny sur Braye","commune":"Savigny sur Braie","nom":"Savigny_sur_Braie","type":"Chateaux","periode":"XV-","histoire":"Deux châteaux à Savigny sur Braie ; Fretay et Glatigny.                          FRETAY, le château est construit sur une motte féodale ceinturée de larges douves. Au XVe siècle, il appartenait à la famille de la Beschière. En 1545, la veuve de Jacques de la Beschières se remaria avec Hugues de Vancé, auquel on attribue la construction du château de Fretay, qui subit sans doute  des transformations. Vers 1583, il appartenait à la famille de Mellet qui allait le conserver pendant un siècle. En 1687, le dernier des Mellet transmet le château à son neveu, Louis de Jousselin, dont les descendants vécurent en ce lieu jusqu'au milieu du XIXe siècle. A la Révolution, François de Jousselin, âgé de 65 ans et son épouse se retirèrent à Montoire en laissant leurs biens à leur fils moyennant une rente. Cette clause évita la vente du château qui fut rendu plus tard à ses propriétaires. Depuis 1983, la propriété appartient à M. et Mme de Saint-Salvy qui apportent tous leurs soins à sa conservation.","architecture":"GLATIGNY, si le château de Glatigny est une construction moderne, cette gentilhommière a une histoire digne d'être rappelée, puisqu'en 1573, Gilles de Ronsard (neveu du poète de la Pléiade) prit pour 99 ans le bail de Glatigny, qui avait pris fin par la mort d'Edmond de la Châtaigneraie, sans enfants. Mais dès 1576, Gilles de Ronsard épousait Françoise de Taillevis, veuve dudit de la Châtaigneraie, les époux, qui avaient également acheté la Linoterie, eurent onze enfants qui formèrent la lignée des Ronsard de la Linoterie. Leur descendance devait demeurer à Glatigny jusqu'à la fin du XVIIe siècle. Le château de Glatigny appartenait à la famille Liger en 1930.","habitants":"Fretay ; famille de la Beschière                                                            Glatigny;Gilles de Ronsard\r\n        \r\n        \r\n        \"","divers":"à Savigny sur Braie ; Fretay grav-1 et Glatigny grav 2-3.","gps":"","images":["../../jctruffet.com/image/image_41/41_Savigny_sur_Braye_1.jpg","../../jctruffet.com/image/image_41/41_Savigny_sur_Braye_2.jpg","../../jctruffet.com/image/image_41/41_Savigny_sur_Braye_3.jpg"]},"Consult_chateau_formulaire3475":{"id":"Consult_chateau_formulaire3475","dept":"41","canton":"Selles sur Cher","commune":"Selles sur Cher","nom":"Selles_sur_Cher","type":"Château","periode":"XIII-XIV-XV","histoire":"Trois châteaux à la Selles sur Cher dont celui de la Selles,  de Clamecy, et  de Nouies                                                                                                                   SELLES-SUR-CHER, premier donjon édifié sur motte dans la deuxième moitié du Xe siècle pour Thibault 1er, comte de Blois, détruit en 1113. Un nouveau château, flanqué de trois tours d'angle, dont subsistent la tour dite du coq, le châtelet et la motte trapézoïdale, construit en 1212 pour Robert de Courtenay,  passe à la famille de Chalon, pris par le prince Noir, libéré par Du Guesclin en 1370, fera augmenter de nouvelles défenses, le château passe à Georges de la Trémoille, le pavillons nord et sud, le châtelet sud et les communs bâtis dans la deuxième moitié du XVIe siècle pour la famille de la Trémoille,  Louis de Husson comte de Tonnerre  et fils d'Antoinette de la Trémoille  hérite et sera transmis par héritage à Antoine de Crussol duc d'Uzès, le château est acquis en 1593 par Jacques de Goyon, maréchal de France en 1604 vendue à  Philippe de Béthune  dernier frère de Sully, transforme  la forteresse en une luxueuse résidence de style Renaissance. Resté aux Béthune jusqu'en 1719, acquis par Cardin le Bret président au parlement de Provence, puis passe au marquis de Bartillat, après 1789 est acquis par monsieur de Massias, dont le petit-fils  Eugène du Moulinet d'Hardemare ancêtre des propriétaires  actuels. Éléments protégés MH : le château, y compris le sol de la cour et les douves : classement par arrêté du 22 octobre 1985.","architecture":"CLAMECY, fief de Jean de Clamecy en 1180, détruit, vestiges en mauvais état; le corps de logis actuels est construit au XVe siècle pour l'un des membres de la famille de Clamecy; le portail nord est bâti au XVIIIe siècle ; hôtel devenu école libre après 1944. Le château est inscrit MH  en 1946                                                                                                      BOIS-MEHANT, construit au XIV° siècle, M et Mme Célian Goury du Roslan sont les propriétaires en 1930,   pas d'autre information.                                                                                                                         SELLES Le Château de Selles-sur-Cher, a été en premier, une forteresse médiévale dont la construction remonte à 935.  Elle fut détruite, en partie, au XVIIIe siècle et reconstruite pour en faire une demeure d'agrément.  Occupant l'aile nord-Est de l'enceinte médièval qui est conservé, l'architecte Jacques Androuet du Cerceau imagine un ensemble en forme de quadrilatère longeant le cher au nord. l'ancienne courtine est transformée en mur d'écran fermant la cour d'honneur, un portail monumental  en forme d'arc divisé en trois travées  séparées par des colonnes toscannes et surmonté d'un grand fronton semi-circulaire à bossages, de part et d'autre sont élevés  deux pavillons. Les pavillons nord et sud, le portail principal, et la décoration intérieure du châtelet du XIIIe siècle sont achevés en 1612.  Le château subit une restauration importante en 1913 par l'architecte Pierre Chauvallon, est rouvert au Public depuis 2012 et se visite. Cette habitation, proche de l'ancien château de Clamecy, en a peut-être été une dépendance. Selon la tradition, Jeanne d'Arc y aurait couché lors de son séjour à Selles. La façade sur rue a été restaurée au XVIIe siècle et présente un pavillon avec fenêtre encadrée de pilastres à cannelures surmontés de chapiteaux sculptés. La partie droite laisse voir d'anciens murs d'une époque antérieure. La façade sur cour est encadrée d'un pignon à gauche et d'une tourelle carrée à droite.","habitants":"Selles; famille de la Trémoille,                                                                        Bois Méhant ; famille de Célian Goury du Roslan\r\n        \r\n        \"","divers":"à la Selles sur Cher dont celui de la Selles le fort grav-1-2- le château 3-4-5-6-7, et de Nouies grav-8.  maison de Jeanne d'Arc  grav-9.                                                                                                Selles: 47° 16' 28\" Nord et 1° 32' 59\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Selles_sur_Cher_1.jpg","../../jctruffet.com/image/image_41/41_Selles_sur_Cher_2.jpg","../../jctruffet.com/image/image_41/41_Selles_sur_Cher_3.jpg","../../jctruffet.com/image/image_41/41_Selles_sur_Cher_4.jpg","../../jctruffet.com/image/image_41/41_Selles_sur_Cher_5.jpg","../../jctruffet.com/image/image_41/41_Selles_sur_Cher_6.jpg","../../jctruffet.com/image/image_41/41_Selles_sur_Cher_7.jpg","../../jctruffet.com/image/image_41/41_Selles_sur_Cher_8.jpg","../../jctruffet.com/image/image_41/41_Selles_sur_Cher_9.jpg"]},"Consult_chateau_formulaire274b":{"id":"Consult_chateau_formulaire274b","dept":"41","canton":"Salbris","commune":"Souesmes","nom":"Souesmes","type":"Forteresse","periode":"XV-XVII-XIX","histoire":"Deux châteaux à Souesmes dont Souesmes et Rebutinière.                                                                    SOUESMES, au début les premiers seigneur son les de Vierzon puis au XIIIe siècle aux comtes de Sancerre qui le conserveront un siècle, passa à la fin du XVe siècle à Jean d'Etampes seigneur de la Ferté d'Imbault qui fait  reconstruire le corps de logis.  En 1534 la demeure est acquise par la famille Francières, en 1562 au début de la guerre de religion, Souesmes accueille des rescapés d'un massacre perpétré par les calcvinistes à la Ferté Imbault. Au début du XVII passe à la famille des Buissons. En 1646, la terre de Souesmes fut érigée en châtellenie par ordonnance de Louis XIV en faveur de Guillaume Perrochel, succèdent par vente à François le Maître avocat au parlement.  Au XVIIIe siècle, la propriété passa entre les mains de différentes familles de robe qui comptaient plusieurs conseillers au parlement de Paris. Puis à Claude Cahouet président des finances d'Orléans, à un sieur de Layau et enfin  en 1773, à  M. de Bragelongne qui vendit le château à Alexandre Moreau de Chassy, acquis en 1854 par Pierre Chatard  qui le  vendent après retauration en 1863 à  la famille d'Ernest de la Ronde,  ancien capitaine des troupes en Guyane et à Cayenne, ancêtres des propriétaires actuels les Reydets de Vulpillières                                                                                                      .Éléments protégés MH : les façades, les toitures et les douves : inscription par arrêté du 20 décembre 1985.","architecture":"SOUESMES,  la forteresse est construite sur un terre plein entouré de douves en eau,  se compose d'un corps de logis central, partie la plus ancienne, flanqué de deux ailes en retour d'équerre. De chaque côté de la façade du corps central se dresse une tour couronnée de mâchicoulis. Les ailes sont reliées au corps central par un pavillon. Une tour carrée s'élève à leur extrémité ouest au XVII construction des ailes. La façade sud de l'aile nord est percée d'arcades du XIXe siècle. Malgré quelques remaniements, conserve les caractéristiques architecturales du début du XVIIe siècle. Sa construction de briques s'intègre à l'architecture traditionnelle solognote.                                                                                     REBUTINIERE, du XIXe siècle avec son bélier hydraulique, des fontaines, des croix de chemin, le monument à la mémoire du maquis, les gares situées le long de lancienne ligne de chemin de fera voie métrique qui reliait.  Le Blanc(Indre) à Argent (Cher), les maisons datées qui jalonnent la commune.","habitants":"Souesmes;famille d'Ernest de la Ronde,\r\n        \"","divers":"à Souesmes dont Souesmes grav 1-2-3 et Rebutinière grav 4-5-6.                                                                                    Souesmes 47° 27' 55\" nord, 2° 10' 49\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Souesmes_1.jpg","../../jctruffet.com/image/image_41/41_Souesmes_2.jpg","../../jctruffet.com/image/image_41/41_Souesmes_3.jpg","../../jctruffet.com/image/image_41/41_Souesmes_4.jpg","../../jctruffet.com/image/image_41/41_Souesmes_5.jpg","../../jctruffet.com/image/image_41/41_Souesmes_6.jpg"]},"Consult_chateau_formulairec6d8":{"id":"Consult_chateau_formulairec6d8","dept":"41","canton":"Savigny sur Braye","commune":"Saint-Agil","nom":"St_Agil","type":"Château","periode":"XIV-XV","histoire":"deux châteaux à St-Agil dont celui de St-Agil et Alleray.                                       St-AGIL, les seigneurs  sont connus depuis le Xe siècle.   par  les Mondoubleau,  on trouve la famille Le Gallais qui passe le domaine par voie de mariage à la famille de la Vove.  En 1469  Oudart de la Vove   petit-neveu héritier entreprend la construction du Manoir. Pendant le XVe et le XVIe siècle, cette famille se succéda au château de Saint-Agil et lui donna son aspect actuel. Ses descendants par alliance;  les de Laugan, René chambellan du duc d'Anjou,  la comtesse de Mouchy  hérite de Saint-Agil des Courtavel conservèrent la propriété jusqu'en 1726, acquit par  Louis Angran d'Alleray conseiller du roi. En 1818, le château de Saint Agil fut achetée par le comte de Saint-Maixent Léon de Tailefumyr  qui agrandit le château d'une petite aile néogotyque sur l'arrière. Ses descendants le comte de  Lugnaud de Lussac héritiers le possèdent toujours.  Éléments protégés MH : le château en totalité : inscription par arrêté du 13 février 1926.","architecture":"St-AGIL,  l'architecte était Jules Ardoin-Mansart. La construction date du XIIIe au XVe siècle,  s'est achevée en 1720. L'entrée du château de Saint-Agil se fait par une élégante poterne construite en 1510 par Antoine de la Vove. Corps de logis constitué de deux ailes en équerre avec à un angle une tour d'escalier polygonale à laquelle vient s'accoler une tourelle en encorbellement, un splendide  châtelet d'entrée aux allures de donjon consiste dans un corps central à haute toiture qu'éclaire une lucarne Renaissance à galbe rectangulaire et Pinacles, il  s'encadre entre deux tours cylindriques de taille inégales,  de briques et pierres flanqué de deux tours surmontées de mâchicoulis. La haute toiture contient une belle lucarne à fronton sculpté et se termine par un lanternon. Le corps de logis attenant est très ancien mais a été très modifié au XVIIIe siècle. Il est de construction massive et contraste avec la grâce de son entrée.                                                                                             ALLERAY, manoir  commune de Choue, transformé en ferme aujourd'hui; bâtiments composées de plusieurs pavillons date du XVe siècle, entourés de deux enceintes de fossés, dont la première de forme rectangulaire et de 200 mètres environ de côté, trace  de l'ancien pont levis, la seconde enceinte au centre de la première est d'une forme  à peu près circulaire d'un diamètre de 40 mètres c'est dans cette enceinte que se trouve le manoir. Appartenait  à Jacques de Vendôme  descendant de Jehan de Vendôme, premier seigneur d'Alleray, Jacques de Vendôme fut assassiné le 22 février 1611 laissant sa veuve Marguerite de Marecot qui se remariat   à César de Maires. Avec Jacques  de  Vendôme nacquirent  Denise et Marie.","habitants":"famille Le Gallais                                                             Alleray,Jacques de Vendôme  \r\n        \"","divers":"à St-Agil dont celui de St-Agil grav 1-2-3  et Alleray grav 4-5.                                                            St-AGIL 48° 02' 00\" Nord, 0° 55' 35\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_St_Agil_1.jpg","../../jctruffet.com/image/image_41/41_St_Agil_2.jpg","../../jctruffet.com/image/image_41/41_St_Agil_3.jpg","../../jctruffet.com/image/image_41/41_St_Agil_4.jpg","../../jctruffet.com/image/image_41/41_St_Agil_5.jpg"]},"Consult_chateau_formulaire3774":{"id":"Consult_chateau_formulaire3774","dept":"41","canton":"Saint-Aignan","commune":"Saint-Aignan sur Cher","nom":"St_Aignan","type":"Château","periode":"XV-XVI-XVII","histoire":"Saint AIGNAN, construit au Xe siècle par les comtes de Blois et reconstruit au XVe siècle et au  XVIe siècle édification des ailes en retour d'équerre. A partir du XIIe siècle inféodée à la famille de Donzy passa par alliance aux Chatillon, aux Bourbons aux maisons de Bourgogne et de Châlons et enfin à la famille de Husson. Au XVe siècle par alliance au la Trémoille et au Rohan . En 1520 Claude de Husson, comte de Tonnerre trouvât la mort à Pavie après avoir apporté des modifications au château. La forteresse passe à sa soeur Louise de Husson  épouse depuis 1496  à Emery de Beauvillier  qui est transmis à son fils Claude puis à François fils de Claude gouverneur de Touraine puis à son fils Paul ministre d'état époux d'une fille de Colbert sans héritier mâle à sa mort  en 1714,  le château revient à son demi-frère Paul-Hippolyte de Beauvillier duc de St-Aignan au XIXe siècle la dernière des Beauvilliers Elodie épouse  d'Elie de Talleyrand-Périgord prince de Chalais  fait effectuer des transformations dans un style troubadour, après le mariage d'Emma de Talleyrand  avec le comte de  Choiseul-Daillecourt en 1857  toujours habité par la Famille de La Roche-Aymon, descendants des Beauvilliers.  Le château présente la particularité d'avoir été transmis par voie d'héritage familial, génération après génération, depuis l'origine jusqu'à nos jours.  Propriété   du vicomte Harld de Milleville et au marquis et marquise de La Roche Aymon, maison d'hôtes et gîtes.","architecture":"St-AIGNAN, construit sur un éperon rocheux, le château surplombe, au sud, la pittoresque cité de Saint Aignan. Au nord, il domine la vallée du Cher. Depuis la cour d'honneur et la grande terrasse adjacente. De nombreux éléments le composent et date de diverses époques, du IXe au XIXe siècle. La Tour Hagard et les vestiges de l'ancienne forteresse constituent la partie la plus ancienne ainsi que le château Renaissance  du XVe et XVIe siècles qui est du château primitif bâti au début du XIe siècle, restent les vestiges du donjon et du mur d'enceinte.  Le château  fut reconstruit, en 1680.  Il est formé d'un grand et long bâtiment rectangulaire avec, en son centre, un pavillon carré surmonté d'un belvédère, d'où un bel escalier de pierres dessert l'étage noble. L'édifice actuel, d'époque Renaissance, déploie ses élégantes façades de tuffeau percées de fenêtres à meneaux, en équerre, présente une façade nord coupée par deux pavillons en briques et pierres. Les combles sont décorés par des lucarnes à fronton. Au sud, dans la cour d'honneur, les deux bâtiments se coupent à angle droit. Ils sont percés de fenêtres à meneaux cruciformes, séparées par des pilastres et des bandeaux sur lesquels des sujets sont abrités dans de petites niches. Des lucarnes de pierre avec frontons à pinacles et coquilles, ornent les toits. Une tour polygonale moderne, hors oeuvre, relie les deux corps de logis. Elle est très décorée par des pilastres et des colonnes jumelles. Le pavillon ouest est le plus richement décoré. Une frise garnie de médaillons à l'italienne supporte une balustrade ajourée. Les ruines du château primitif se trouvent face au château actuel. L'édifice a été très restauré au XIXe siècle. Éléments protégés MH : le château, ainsi que le parc et les ruines de l'ancien château : inscription par arrêté du 30 juillet 1946.","habitants":"famille de Husson\r\n        \r\n        \"","divers":"à Saint-Aignan sur Cher.                                                                      St-Aignan 47° 16' 10\" Nord et 1° 22' 36\" Est--47° 16' 11\" nord, 1° 22' 29\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_St_Aignan_1.jpg","../../jctruffet.com/image/image_41/41_St_Aignan_2.jpg","../../jctruffet.com/image/image_41/41_St_Aignan_3.jpg","../../jctruffet.com/image/image_41/41_St_Aignan_4.jpg","../../jctruffet.com/image/image_41/41_St_Aignan_5.jpg","../../jctruffet.com/image/image_41/41_St_Aignan_6.jpg","../../jctruffet.com/image/image_41/41_St_Aignan_7.jpg","../../jctruffet.com/image/image_41/41_St_Aignan_8.jpg"]},"Consult_chateau_formulaire512a":{"id":"Consult_chateau_formulaire512a","dept":"41","canton":"Blois","commune":"Saint-Denis sur Loire","nom":"St_Denis_sur_Loire","type":"Château","periode":"XVI-XVIII","histoire":"ST-DENIS SUR LOIRE, cette demeure médiévale achetée par Philippe Hurault en 1341 sous le roi de France Philippe VI de Valois, appartient toujours aux descendants de la famille Hurault, la famille Ayguesparsse. Très implantée dans la région la famille Hurault a aussi édifié le château de Cheverny. A la Renaissance, Denys II Hurault (mort vers 1538) seigneur de Saint Denis, Trésorier de la reine, capitaine de la ville et du château de Blois, reçut souvent les visites royales de la Cour de Blois, dont Catherine de Médicis et Marie de Médicis, Reines de France, qui se plaisaient à au château de Saint-Denis-sur-Loire et pour la réputation curative de ses sources minérales. En 1578, Philippe Hurault de Cheverny, le frère de Marie Hurault de Saint-Denis, fut Garde des sceaux de France puis, devint chancelier de France, sous le règne du Roi Henri III de France. Il sera nommé une seconde fois, en 1590, sous le règne du Roi Henri IV de France. En 1643, Florimond Hurault, chevalier, seigneur de Saint-Denis, conseiller du Roi Louis XIV de France, devient grand Maître enquêteur et général réformateur des eaux et forêts de France. Jacques III Hurault, en 1695, seigneur de Saint-Denis, est nommé capitaine du régiment des vaisseaux du Roi Louis XIV de France, puis des dragons. Le marquis Anne Marc Raoul Hurault de Saint-Denis (1725 - 1793), servit, sous le règne du Roi Louis XVI de France comme capitaine de dragons au régiment de Caraman. En 1851, la comtesse Élisabeth de Beaucorps-Créquy (née Hurault de Saint-Denis) réhabilite les eaux. Elle obtient le droit d'ouvrir, au public, la station hydrominérale.","architecture":"ST-DENIS SUR LOIRE,  construit au XVIIIe sièdcle sur les soubassements  d'un ancien château entouré de douves. Il fait partie des châteaux de la Loire. Il était déja attesté avant 1341, époque du Haut-Moyen Age. Son propriétaire initial était Philippe Hurault. C'est un château de styles : médiéval et classique, éléments protégés MH : le château, le parc, les douves et les tours : inscription par arrêté du 6 mars 1948. La Chapelle du château, y compris son décor ainsi que le sol correspondant à l'ancienne église dont elle faisait partie : classement par arrêté du 5 décembre 1988.","habitants":"famille Hurault, famille Ayguesparsse\r\n        \"","divers":"St-Denis 47° 37' 27\" Nord, 1° 23' 19\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_St_Denis_sur_Loire_1.jpg","../../jctruffet.com/image/image_41/41_St_Denis_sur_Loire_2.jpg","../../jctruffet.com/image/image_41/41_St_Denis_sur_Loire_3.jpg","../../jctruffet.com/image/image_41/41_St_Denis_sur_Loire_4.jpg"]},"Consult_chateau_formulairefd82-2":{"id":"Consult_chateau_formulairefd82-2","dept":"41","canton":"Montrichard","commune":"St_Georges sur Cher","nom":"St_Georges_Cher","type":"Château","periode":"XVI","histoire":"st- Georges sur Cher deux châteaux dont Coudraies et de Chaise.                                                                                   COULDRAIES, construit au début du XVIe siècle pour un chanoine de Saint-Martin de Tours, le manoir des Couldraies est très représentatif de l'architecture tourangelle à l'époque de la Renaissance. Le pavillon principal est agrémenté d'un décor sculpté en partie restauré à l'identique au XIXe siècle. Au XVIIe siècle les baies ont perdu leurs meneaux et ont été abaissées. Les autres parties du bâtiment sont venues s'accoler postérieurement. Elles sont formées d'une aile basse, d'un pavillon carré et d'une tour du XIXe siècle. A l'intérieur une hotte de cheminée conserve une fresque dans le style de la seconde école de Fontainebleau, faisait anciennement partie du fief du château de Chenonceau dont il est éloigné seulement de deux kilomètres. Achevé de construire en 1515, il servait de relais de chasse et de galanterie aux rois François 1er et Henri II de France, ainsi qu'à la célèbre Diane de Poitiers. Le père et le fils s'y sont ainsi succédé, et selon la légende, ont rendu hommage à la même Favorite Royale. Par la suite, le domaine passa régulièrement de main fortunée en main fortunée, sans jamais qu'une famille ne se l'approprie longtemps.                                           CHAISE prieuré, chambres d'hôtes dans ce manoir du XVIe siècle musée des outils anciens de la viticulteur et gîtes de France par la famille Duret-Thérizols.","architecture":"CHAISE, manoir du XVIe siècle, au pignon Est a été accolé, vers 1830, un bâtiment qui a remplacé une construction très ancienne, mais du même type.  La chapelle date de la fin du XIIe siècle, début du XIIIe. De conception romane transformée en gothique au XVIe siècle.\r\nDe plan rectangulaire, elle est formée dune double travée voûtée sur croisée dogives. Les nervures et les arcs  moulurés dun tore retombent aux angles sur de simples pierres en guise de culots, et de chaque côté, au centre, par le chapiteau orné de feuillage à crochet dune fine colonnette.  Trois fenêtres à lancette ajourent le chevet plat, la médiane étant plus large et placées du haut. Les murs goutterots, à lextérieur, sont épaulés de trois contreforts amortis au glacis. Au nord toutes les ouvertures ont été murées ; au sud, subsistent deux oculus et une petite baie romane. Un plan de 1762 indique que cette chapelle avait un clocher aujourdhui disparu, mais dont lemplacement est visible sous le toit. Les actuels propriétaires ont confié le remplacement des vitraux modernes à André Duret, artiste peintre.\r\nCOULDRAIES, d'ailleurs, la devise du château inscrite (sans doute au XVIIIe siècle) sur la cheminée du grand salon, reprise comme emblème des vins du domaine \"ornementatum hereditas labor\" signifie littéralement \"le travail est l'ornement de l'héritage\". Cette devise sonne bien comme celle d'un roturier, dont la relative fortune était le fruit de son labeur.Éléments protégés MH : les façades et les toitures du manoir (à l'exclusion de la partie du XIXe siècle) ; la cheminée peinte au rez-de-chaussée ; façades et toitures du colombier : inscription par arrêté du 18 novembre 1987. Aujourd'hui chambres d'hôtes.","habitants":"rois François 1er et Henri II de France,\r\n        \"","divers":"st- Georges sur Cher deux châteaux dont Coudraies  grav-1-2-3 et de Chaise grav 4-5.","gps":"","images":["../../jctruffet.com/image/image_41/41_St_Georges_Cher_1.jpg","../../jctruffet.com/image/image_41/41_St_Georges_Cher_2.jpg","../../jctruffet.com/image/image_41/41_St_Georges_Cher_3.jpg","../../jctruffet.com/image/image_41/41_St_Georges_Cher_4.jpg","../../jctruffet.com/image/image_41/41_St_Georges_Cher_5.jpg"]},"Consult_chateau_formulaired407":{"id":"Consult_chateau_formulaired407","dept":"41","canton":"Selles sur Cher","commune":"St Loup","nom":"St_Loup_Langon","type":"Château","periode":"XV-XVII","histoire":"De l'autre côté du Cher à Langon le château de Berthets et de Préjeux                                                                                                                                                   SAINT-LOUP chambres d'hôtes.                                                                 SAUVETERRE, possession de la famille Graçay du XIIe au XVe siècle, de la famille du Bois aux XVe et XVIe siècles, à la famille d'Etampes au XVIIe siècle, puis à la famille Bénard. L'édifice actuel est limite  du XVIIIe siècle XIXe siècle; les communs, à l'emplacement de l'ancien château, datent du quatrième quart du XIXe siècle; un moulin à eau détruit après 1880, tuilerie détruite après 1825. La façade du XVIIIe siècle est ponctuée en son centre d'un fronton triangulaire, elle est flanquée de deux petits pavillons à un seul niveau, couverts de toits brisés.M Bazin propriétaire en 1930 Château de Sauveterre, siège d'une ancienne baronnie et demeure de la famille Bénard de Sauveterre jusqu'à la fin du XXe siècle, propriété privée.","architecture":"St-LOUP édifice rectangulaire à deux niveaux  à cinq travées toit en croupes                                                                                                                   BERTHETS  M. Dumont est propriétaire en 1930; de plan rectangulaire corps de logis central à deux niveaux  fronton central en calotte sur trois travées  toit en croupe avec lanternon, l'édifice est accolé sur les flans d'un pavillon rectangulaire à trois niveaux toit en croupe et à l'opposé terrasse avec tours polygonales.                                                                                                 PREJEUX, dans le même style que Berthet la tour est en façade à deux niveaux.","habitants":"Berthet; M. Dumont                                                     Sauveterre;famille Bénard\r\n        \r\n        \"","divers":"à Langon le château de Berthets  grav-3 et de Préjeux grav-2. A st Loup celui de St-Loup grav-1 et Sauveterre grav-4-5","gps":"","images":["../../jctruffet.com/image/image_41/41_St_Loup_Langon_1.jpg","../../jctruffet.com/image/image_41/41_St_Loup_Langon_2.jpg","../../jctruffet.com/image/image_41/41_St_Loup_Langon_3.jpg","../../jctruffet.com/image/image_41/41_St_Loup_Langon_4.jpg","../../jctruffet.com/image/image_41/41_St_Loup_Langon_5.jpg"]},"Consult_chateau_formulaire397a":{"id":"Consult_chateau_formulaire397a","dept":"41","canton":"Onzain","commune":"St-Lubin en Vergonnois","nom":"St_Lubin_Vergonnois","type":"Château","periode":"Xv-XVI","histoire":"Deux châteaux à Saint-Lubin en vergonnois, la Vrillière et la Sourdière.                                                                                                       VRILLIERE, ce château de la banlieue de Blois se signale en raison de l'importance de la famille des Phélypeaux de la Vrillière qui ont occupé les plus hautes fonctions au cour des XVIIe et XVIIIe siècles. Le premier de cette lignée fut Raymond Phélypeaux secrétaire d'État. La construction est plutôt attribuée à son fils, Louis Phélypeaux, conseiller d'Etat, qui délaissa à partir de 1650 la demeure trop modeste à son goût lorsque son épouse, Marie Particelli d'Émery (fille de l'intendant des finances) hérita du domaine de Châteauneuf sur Loire, qui devint jusqu'en 1777, la résidence préférée de cette famille. Malgré leur fortune, leurs titres ou leurs fonctions tous les Phélypeaux conservèrent toujours le nom de leur première demeure. Le dernier, Louis Phélypeaux, connu sous le nom de comte de Saint-Florentin, devint en 1770 duc de la Vrillière. M et Mme Parent du Châtelet sont les propriétaires en 1930.","architecture":"SOURDIERE; château de plan en équerre à deux niveaux accolé d'une tour toit en croupes, les propriétaires en 1930 sont M et Mme de  Pieboue d'Héritot.                                                                                                                           VRILLIERE,de plan rectangulaire,corps de logis entre deux pavillons carrés  à deux niveaux et lucarnes sur toits pentus en tuiles.","habitants":"Vrillière ; famille des Phélypeaux de la Vrillère.                               Sourdière; famille de  famille de Pieboue d'Héritot \r\n        \"","divers":"à Saint-Lubin en vergonnois, la Vrillière grav-3 et la Sourdière grav-1-2.","gps":"","images":["../../jctruffet.com/image/image_41/41_St_Lubin_Vergonnois_1.jpg","../../jctruffet.com/image/image_41/41_St_Lubin_Vergonnois_2.jpg","../../jctruffet.com/image/image_41/41_St_Lubin_Vergonnois_3.jpg"]},"Consult_chateau_formulaire2361":{"id":"Consult_chateau_formulaire2361","dept":"41","canton":"Montoire sur le Loir","commune":"Saint-Martin des Bois","nom":"St_Martin_des_Bois","type":"Château","periode":"XVII","histoire":"Trois châteaux à  St-Martin des Bois  celui de la Chevalinière et de St Georges,  de Danne, de Lignière et de Ranay pas d'information.                                                                                                           CHEVALINIERE, ancien fief et seigneurie relevant du Tertre de Montoire.                                                                                                       DANNE, l'actuel château est construit en 1826 par l'architecte Leblond et remplace un bâtiment plus ancien dont il ne reste que la fuie. Une partie des communs a probablement été élevée vers 1840 et les parties agricoles (étable, porcheries, poulailler) vers 1860-1870. L'édifice s'élève au cur d'un parc paysagé avec bosquets et massifs d'arbres, réalisé au cours des années 1830-1840 par J. Chevalier.                                                                                                                    St-GEORGES DES BOIS,  lorsqu'en 1782, Jean Sébastien de Querhoent, capitaine de vaisseau, hérita de son cousin, Louis Joseph de Querhoent, il ne put habiter le château que le défunt avait laissé à sa veuve. Aussi, à défaut de pouvoir habiter ses deux châteaux de Montoire ou Lavardin.","architecture":"CHEVALINIERE, la façade sur cour du logis est flanquée d'une tour polygonale d'escalier. La porte d'entrée est ornée d'une chimère sculptée dans le sommier gauche. A l'intérieur, la vis de l'escalier est en pierre au début, puis en bois. A l'est et au sud-est du logis se trouve un petit bâtiment de servitude dont certains murs sont à pans de bois.                                                                                       DAME, le château est élevé sur un sous-sol construit en pierre de taille de granit, et abritant les communs, depuis lequel on accède au rez-de-chaussée surélevé par un escalier en U à lest, et un escalier droit à louest. La façade de style néoclassique est rythmée par sept travées : les trois travées centrales encadrées de pilastres cannelés sont surmontées par un fronton triangulaire. Les travées latérales sont elles coiffées par des lucarnes au fronton.                                                                                                           St-GEORGES DES BOIS, ce château est en réalité formé par les bâtiments de l'ancienne abbaye de Saint-Georges qui avait été fondée au VIe siècle par Childebert complètement en ruines, le marquis chercha une maison, et racheta en 1792 à la nation, l'abbaye de Saint Georges pour s'y loger. Il restaura la chapelle, supprima le cloître et ne garda que les parties les plus habitables des bâtiments de l'ancienne abbaye. Ainsi subsiste l'ancienne salle capitulaire de deux travées, transformée en salle à manger. Il reste également sous la terrasse une ancienne chapelle souterraine convertie en orangerie.","habitants":"Jean Sébastien de Querhoen\r\n        \"","divers":"à  St-Martin des Bois  celui de la Chevalinière grav-4 et de St Georges grav_5,  de Danne grav-1-2, de Lignière grav-3 et de Ranay grav-6         Chevalinière 47° 45' 45\" nord, 0° 48' 41\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_st_Martin_des_Bois_1.jpg","../../jctruffet.com/image/image_41/41_st_Martin_des_Bois_2.jpg","../../jctruffet.com/image/image_41/41_st_Martin_des_Bois_3.jpg","../../jctruffet.com/image/image_41/41_st_Martin_des_Bois_4.jpg","../../jctruffet.com/image/image_41/41_st_Martin_des_Bois_5.jpg","../../jctruffet.com/image/image_41/41_st_Martin_des_Bois_6.jpg"]},"Consult_chateau_formulaire4050":{"id":"Consult_chateau_formulaire4050","dept":"41","canton":"Romorantin-Lanthenay","commune":"St-Viâtre","nom":"St_Viatre","type":"Château","periode":"XV-XVIII-XIX","histoire":"six châteaux à Saint-Viâtre ; Arsendrie, Auteroche, Favelle, Frogères, Petit-Pois, Vervillon.                                                                  ARSENDRIE  M. Bouchut est le propriétaire en 1930 aujourd'hui SCI , société civile immobilière Jean-Claude Rohault de  Fleury, est gérant de la société.                                                                                              AUTEROCHE;  fief donné au XIIe siècle au chapitre de Saint-Aignan d'Orléans ; seigneurie attestée en 1381, 1484 et 1539 d'après Guérin ; le bâtiment actuel a été bâti au XVIIIe siècle. C'est une motte rectangulaire de 45 mètres de long sur 40 mètres de large et les fossés de 14 mètres et 12 mètres de large. Trois enceintes complètent celle du château. L'édifice de plan symétrique se compose d'un étage carré et étage de comble, le gros oeuvre, en brique, toit à longs pans et croupe surmontés de tuiles plates. Le château est inscrit MH en 1989.                                                                FAVELLE,  édifice remontant au XVe siècle ; motte et fossés encore visibles sur le cadastre de 1832, nivelés, vestige d'une tour à laquelle est accolé un nouveau château vers 1870. Projets de construction d'un château par Henri d'Auvergne pour Roger de la Selle non réalisés; la chapelle est élevée vers 1870. La demeure est composée d'un sous-sol, un étage carré et étage de comble. Gros-oeuvre en brique et pierre avec brique en remplissage, l'édifice est surmonté de toit con
