const FULL={"Consult_chateau_formulaire3926":{"id":"Consult_chateau_formulaire3926","dept":"41","canton":"Montrichard-St-Aignan","commune":"Angé-Bourré","nom":"Angé_Bourré","type":"Château","periode":"XV-XIX","histoire":"Quatre châteaux à Angé-Bourré, celui d'Angé,  de la salle, des Roches et de Valagnon.                                                                                          ANGE, fief important qui relevait en partie de la châtellenie de Montrésor. Château reconstruit au XVe siècle restent la porterie que les modifications du XVIIIe siècle ont un peu altérée, une tour d'angle, un pan de mur d'enceinte avec meurtrière et une partie des douves. Le logis d'habitation a été remplacé par un château moderne, la porte se trouve au sud de l'ancienne enceinte, dont les courtines ont disparu. il est constituée par un bâtiment rectangulaire percé, à son rez-de-chaussée, d'un couloir reliant deux arcades en plein cintre. Le pont-levis était doublé à gauche d'un autre pont-levis à flèche, précédant un guichet. A l'angle nord-est, la porte est accompagnée d'une tourelle carrée, soutenue par un pilier. il est accompagné à l'angle nord-ouest d'une tour polygonale dont la porte en anse de panier est accostée de pilastres amortis par des pinacles, et encadrée d'une accolade à crochets et fleurons. le château d'Angé, inscrit en 1953, et une maison du XVIe siècle, inscrite en 1926.","architecture":"la SALLE,  manoir à l'est à Bourré  chambres d'hôtes de la famille Roussard.                                                                                                                              La ROCHES, manoir  adossé par sa façade nord au flanc du coteau. Sur sa façade sud fait saillie une tour polygonale contenant un escalier à vis de pierre et dont les étages sont soulignés par des cordons moulurés. Des médaillons surmontent la porte d'accès à la tour, porte accostée de pilastres Renaissance supportant un entablement. Au 1er étage de la travée Ouest, la fenêtre est également accostée de pilastres Renaissance. Au rez-de-chaussée de la travée opposée, une porte cochère en anse de panier donne accès à un couloir menant aux caves creusées dans le coteau.                                                                                                               VALLAGON, cet élégant château de 1851, à tourelles, corps de logis central  de plan rectangulaire toits en croupe, à deux niveaux sur soubassement,  et le troisième sur comble flanquée de deux tours polygonales à trois niveaux toit en poivrières et deux tourelles en encorbellement en façade toit pointus enserrant les baies jumenées à meneaux , et double bandeau, vous propose son hôtel, une piscine ouverte en saison entourée d'un parc de 4 Ha. Vous pourrez y déguster des vins locaux au bar ou sur la terrasse. Décorées simplement, les chambres sont revêtues de parquet et offrent une vue sur le parc.","habitants":"Famille Roussard\r\n        \r\n        \"","divers":"Quatre châteaux à Angé-Bourré, celui d'Angé grav 1-2,  de la Salle grav 3, des Roches grav--4-5- et de Vallagnon grav- 6-7                           .   Angé  47° 19' 56\" Nord, 1° 14' 37\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Ang%c3%a9_Bourr%c3%a9_1.jpg","../../jctruffet.com/image/image_41/41_Ang%c3%a9_Bourr%c3%a9_2.jpg","../../jctruffet.com/image/image_41/41_Ang%c3%a9_Bourr%c3%a9_3.jpg","../../jctruffet.com/image/image_41/41_Ang%c3%a9_Bourr%c3%a9_4.jpg","../../jctruffet.com/image/image_41/41_Ang%c3%a9_Bourr%c3%a9_5.jpg","../../jctruffet.com/image/image_41/41_Ang%c3%a9_Bourr%c3%a9_6.jpg","../../jctruffet.com/image/image_41/41_Ang%c3%a9_Bourr%c3%a9_7.jpg"]},"Consult_chateau_formulaire751d":{"id":"Consult_chateau_formulaire751d","dept":"41","canton":"le Perche","commune":"Arville","nom":"Arville","type":"Commanderie","periode":"XII-XV","histoire":"COMMENDERIE dit  des Templiers  est citée pour la première fois en 1185. Elle se situe à proximité du Temple sous Mondoubleau qui existait dès 1134. Cette commanderie était réputée pour la qualité et la quantité de son parc bovin et porcin. On y élevait également des chevaux pour la défense de la Terre Sainte. Lhistoire de la commanderie est marquée par les querelles qui ont opposé les Templiers aux seigneurs de Mondoubleau au début du XIIIe siècle. En effet, ceux-ci ne voyaient pas d'un bon il la puissance et la richesse grandissante des Templiers dans la région. Les Templiers se virent même interdire de construire un four banal, d'étaler leurs marchandises.  Voyant que les querelles s'envenimaient, le représentant du pape, l'abbé de Sainte-Geneviève de Paris, dut excommunier le vicomte de Mondoubleau. Après l'arrestation des Templiers, la commanderie d'Arville fit partie des biens confisqués à lordre par Philippe le Bel. Puis quand le pape Clément V supprima l'ordre en 1312, cette commanderie revint à l'ordre de Saint-Jean de Jérusalem. Les hospitaliers occupèrent les lieux jusqu'à la Révolution Française. Parmi les commandeurs hospitaliers, se trouve Emery d'Amboise, frère du cardinal-premier ministre de Louis XII qui devint en 1503, le 40e grand-maître de lordre de Saint-Jean de Jérusalem. Ensuite la commanderie fut vendue en tant que bien national et morcelée entre plusieurs exploitants agricoles. Des agriculteurs vécurent là jusqu'à la remise en valeur récente des lieux.","architecture":"La commanderie possède encore une partie de ses bâtiments d'origine, à savoir une chapelle du XIIe siècle, une grange dîmière.  Une tour a été transformée en pigeonnier aux XVe et XVIe siècles. Le logis des chevaliers attenant à l'église a disparu et a été remplacé au XVIIIe siècle par un presbytère encore visible actuellement.                                                                  Fondée au XIIe siècle par lordre du Temple, la commanderie dArville reste, par limportance de ses bâtiments, lune des commanderies les mieux conservées de France. Eglise, porche dentrée (XIIe), écuries, grange dîmière, pigeonnier du XVe- XVIe siècle, chacun de ces bâtiments évoque le quotidien des Templiers avant leur départ pour la Terre Sainte. Elle vous ouvre aujourdhui ses portes. Un musée sur lhistoire des Templiers et des croisades vient compléter la visite. Huit espaces scénographiés proposent une mise en scène interactive : dArville à Jérusalem en traversant le port de Gènes, votre visite se métamorphose en voyage pour vous dévoiler laventure templière.","habitants":"framilkle d'Emery d'Amboise\r\n        \r\n        \r\n        \"","divers":"Commanderie 48° 03' 51\" nord, 0° 56' 53\" est","gps":"","images":["../../jctruffet.com/image/image_41/41_Arville_1.jpg","../../jctruffet.com/image/image_41/41_Arville_2.jpg","../../jctruffet.com/image/image_41/41_Arville_3.jpg","../../jctruffet.com/image/image_41/41_Arville_4.jpg"]},"Consult_chateau_formulaire0215":{"id":"Consult_chateau_formulaire0215","dept":"41","canton":"Montoire sur le loire","commune":"Authon","nom":"Authon_41","type":"Château","periode":"XIII-XVIII-","histoire":"deux châteaux à Authon dont Etoile et Fresne                                  ETOILE, bâti à partir de 1851, le château est construit d'après les plans de l'architecte Phidias Vestier, il présente un plan massé dans un style éclectique néo-Louis XIII. L'abbatiale comprend une nef de quatre travées et un choeur terminé par une abside cantonnée de deux absidioles. Les deux collatéraux ont été supprimés. Le carré du transept supportait, à l'origine, le clocher central. La façade ouest conserve le portail d'origine. Le pignon à crochets est une réfection du XVIe siècle, l'abbaye se distingue par son caractère dépouillé, refusant toute sculpture décorative.  Cette abbaye fut réunie en 1770 à celle de Saint-Georges à Saint-Martin-des-Bois. Cette armoire demeura sur place après l'acquisition de l'abbaye durant la Révolution par Legrad de Marizy et passa dans les biens de Frédéric de La Rochefoucauld, en 1850, qui la fit repeindre.                                                                       FRESNE, au XIIIe siècle le fief de Plessis-Godehoust passe par alliance à la famille Vendôme aux seigneur de Montigny au XVIe siècle construction du château, en 1727 achat du Fresne par Louis-Joseph Legrand de Marizy, en 1804 achat par le général Perron  ancêtres des propriétaires actuels. Sa fille Madeleine épouse Alfred de Montesquiou, ces derniers font appel au paysagiste Bülher pour créer un parc à l'anglaise. Après eux le domaine passe à leur fille Louise de Brantes ; Anne-Aymone Giscard d'Estaing, épouse de Valéry Giscard d'Estaing  née Anne-Aymone Sauvage de Brantes, fille de François Sauvage de Brantes, résistant mort au camp de Mauthausen (Autriche) en 1944. Elle est l'actuelle propriétaire du château du Fresne,  Aujourd'hui,  appartient au petit-fils le marquis de Brantes .","architecture":"FRESNE, a été construit, vers 1786, en remplacement d'un château plus ancien. Elevé à partir de 1766, le château actuel est l'oeuvre de l'architecte Anatole Amoudru. De plan rectangulaire présente  sept travées sur ses façades principales, appareillé de refend a en pierre de taille aux angles, à deux niveaux avant corps en légère saillie en occupe le centre surmonté d'un fronton triangulaire qui se détache légèrement du toit mansardé avec des lucarnes sur le pour tour, initialement percé d'oeils-de-boeuf . La cour d'honneur est structurée par les deux tours circulaires, les pavillons carrés et, de part et d'autre du château, deux corps de bâtiments dont l'un contient la chapelle et les greniers et l'autre le pavillon des bains L'entrée a été déplacée et la composition s'est ordonnée autour du château du Fresne d'où rayonnent les allées et le parc. Seule la partie des communs a été conservée du manoir. : inscription par arrêté du 5 mars 2007.","habitants":"Famille Vendôme                                                                         Fresne,  marquis de Brantes                                      \r\n        \r\n        \"","divers":"deux châteaux à Authon dont Etoile grav-1-2-3 et Fresne grav 4-5-6-7                                                                                            Authon 47° 37' 26\" nord, 0° 53' 17\" est                                                                                  Etoile 47° 38' 40\" Nord, 0° 53' 52\" Est                                                                 fresne 47° 38' 40\" Nord et 0° 53' 52\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Authon_41_1.jpg","../../jctruffet.com/image/image_41/41_Authon_41_2.jpg","../../jctruffet.com/image/image_41/41_Authon_41_3.jpg","../../jctruffet.com/image/image_41/41_Authon_41_4.jpg","../../jctruffet.com/image/image_41/41_Authon_41_5.jpg","../../jctruffet.com/image/image_41/41_Authon_41_6.jpg","../../jctruffet.com/image/image_41/41_Authon_41_7.jpg"]},"Consult_chateau_formulairee04a":{"id":"Consult_chateau_formulairee04a","dept":"41","canton":"La Beauce","commune":"Avaray","nom":"Avaray","type":"Château","periode":"XIII","histoire":"AVARAY, au château du XIIIe sièle ont été ajoutées, sur les soubassements primitifs, les ailes ouest et nord, en conservant les tours. Les douves furent aménagées vers 1620. Propriétaire  d'une partie de la demeure  monsieur Christophe Pittet Il sagissait dun appartement et dun studio à acquérir au château dAvaray géré en copropriété, suisse dorigine et installé avec sa femme française à Montreux, au bord du lac Léman, Christophe Pittet se montre fort intéressé par cette opportunité. Depuis janvier 2019, Christophe et Valérie ont investi leur appartement et y viennent dès quils le peuvent. Le reste du temps, ils continuent de résider en Suisse.","architecture":"AVARAY, de plan en U à deux niveaux sur soubassement en eau, série de lucarnes sur toit en croupes, entouré de douves, présentant trois ailes ouvertes sur le sud, transformé ensuite. C'est un des rares châteaux Louis XIII conservés en Val de Loire. Au château du XIIIe siècle ont été ajoutées, sur les soubassements primitifs, les ailes ouest et nord, en conservant les tours rondes. Les douves furent aménagées vers 1620. En 1736, ce qui avait été conservé du vieux château fut démoli et l'aile orientale fut construite, complétant le château tel qu'il est aujourd'hui. Dès 1730, trois ponts dormants franchissaient les douves et le pont-levis primitif avait été supprimé. Sous la Restauration, fut ajouté à la façade sud, l'avant-corps central avec son balcon à balustres soutenu par quatre colonnes, et le fronton triangulaire qui le domine.","habitants":"monsieur Christophe Pittet\r\n        \r\n        \r\n        \"","divers":"Avaray  47° 43' 15\" nord, 1° 33' 41\" est","gps":"","images":["../../jctruffet.com/image/image_41/41_Avaray_1.jpg","../../jctruffet.com/image/image_41/41_Avaray_2.jpg","../../jctruffet.com/image/image_41/41_Avaray_3.jpg","../../jctruffet.com/image/image_41/41_Avaray_4.jpg"]},"Consult_chateau_formulairef4af":{"id":"Consult_chateau_formulairef4af","dept":"41","canton":"Vendome","commune":"Baillou","nom":"Baillou 41","type":"Château","periode":"XVI","histoire":"BAILLOU,  Beauvais de Saint-Paul dit qu'il était jadis entouré de hautes murailles qui en défendaient les approches; qu'on y voyait un portail cintré sur lequel était bâtie une guérite.  L'édifice fut encore entouré en 1652 de grands fossés pour le mettre à l'abri d'un coup de main. Madame la Marquise de Courtavel en était propriétaire en 1930.","architecture":"BAILLOU, une partie Renaissance et un pavillon Louis XIII, domine le village. de plan en L à deux niveaux, toit en croupes série de lucarnes sur combles, avant corps d'entrée de trois travées à trois niveaux avec fronton. Il a été plusieurs fois remanié et ne présente par de style architectural bien déterminé. Beauvais de Saint-Paul dit qu'il était jadis entouré de hautes murailles qui en défendaient les approches; qu'on y voyait un portail cintré sur lequel était bâtie une guérite. De distance en distance, les murs étaient percés de meurtrières. Deux tourelles dont l'une se nommait \"tour de Vendôme\", et l'autre \"tour du Mans\" faisaient de ce lieu une forteresse. L'édifice fut encore entouré en 1652 de grands fossés pour le mettre à l'abri d'un coup de main.","habitants":"Madame la Marquise de Courtavel \r\n        \"","divers":"le château de Baillou","gps":"","images":["../../jctruffet.com/image/image_41/41_Baillou_1.jpg","../../jctruffet.com/image/image_41/41_Baillou_2.jpg","../../jctruffet.com/image/image_41/41_Baillou_3.jpg"]},"Consult_chateau_formulairec909":{"id":"Consult_chateau_formulairec909","dept":"41","canton":"Chambord","commune":"La Ferte Beauharnais","nom":"Beauharnais","type":"Château","periode":"XI-XVII","histoire":"La FERTE-BEAUHARNAIS, au XIe siècle. En 1752 Avrain de Meung seigneur, dans cette seigneurie jusqu'en 1514 le domaine s'appelait la Ferté D'Avrain, le château moyenâgeux est détruit par François de Beauharnais, gouverneur général des îles sous le vent et marquis. Il élève à sa place en 1724 un château de style classique, et en 1750 son fils, l'acheta, En 1750 le propriétaire de l'époque, Pierre-François de la Porte (fils d'un fermier général), le vendit à François de Beauharnais, gouverneur de la Martinique et général du baîllage d'Orléans. Il obtint en 1764 l'érection de la châtellenie en marquisat sous le nom de la Ferté Beauharnais. A sa mort, le château passa à son petit fils, le prince Eugène de Beauharnais, fils issu du premier mariage de Joséphine Tascher de la Pagerie, future impératrice  Alexandre de Beauharnais, commandant de l'Armée du Rhin, époux de Joséphine de Beauharnais, future impératrice, est guillotiné sous le règne de la terreur pendant la Révolution Française.Il devint par la suite duc de Leuchtenberg et son fils épousa une fille de l'empereur de Russie. A la mort du prince, La Ferté Beauharnais passa à René de la Selle de Ligué, époux de Marie-Madeleine de Mac-Mahon. Leurs descendants refusèrent de le céder à Napoléon III qui voulait le racheter en souvenir de sa grand-mère Joséphine. En 1805 c'est son fils Eugène de Beauharnais qui s'occupe du domaine en l'embellissant. Celui-ci est vendu à sa mort en 1830. Le futur empereur Napoléon III, petit-fils d'Alexandre, y revient en 1852.Le domaine appartient aujourd'hui à monsieur Doucet.","architecture":"BEAUHARNAIS,  mais il ne reste rien de la forteresse primitive et le château actuel a été construit au XVIIIe siècle, au coeur d'un grand parc entièrement clos de murs. Le corps de logis double en profondeur et construit en brique et pierre sur soubassement, il compte trois niveaux dont un sous comble, au centre  de la façade d'arrivée se détache un avant corps à trois travées, autrefois  orné de bustes aujourd'hui disparus il est couronné d'un fronton  triangulaire percé d'un oculu. Le corps principal est symétriquement flanqué  de deux grosses tours cylindriques dont les bases remontent à la maison forte d'origine, coiffées de toits en cloches qui leur donnent une pittoresque silhouette, ces tours confèrent un aspect médiéval à cette demeure très classique mais massive situé dans un grand parc.","habitants":"Famille de  François de Beauharnais\r\n        \"","divers":"Château de Beauharnais 47° 32' 33\" Nord et 1° 50' 49\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Beauharnais_1.jpg","../../jctruffet.com/image/image_41/41_Beauharnais_2.jpg","../../jctruffet.com/image/image_41/41_Beauharnais_3.jpg"]},"Consult_chateau_formulairedf73":{"id":"Consult_chateau_formulairedf73","dept":"41","canton":"Vineuil","commune":"Cellettes","nom":"Beauregard_41","type":"Château","periode":"XiV-XV","histoire":"BEAUREGARD, une tradition locale veut que Beauregard  été un pavillon de chasse de François 1er, le roi en fit don à son oncle, le bâtard de Savoie. Le domaine est acquis en 1543 par Jean du Thier, contrôleur général des finances d'Henri II. Ami des Arts, poète lui-même, il est le protecteur de Joachim du Bellay de Ronsard. En 1617, Paul Ardier se retire à Beauregard. Il a servi la couronne de France sous trois rois: Henri II, Henri III et Louis XIII, comme contrôleur général des armées,  Beauregard reçoit la visite de personnages célèbres. Lorsque la cour de Louis XIII s'arrête à Blois en 1626, Richelieu craignant une conspiration accepte l'hospitalité d'Ardier et réside à Beauregard avec sa compagnie de mousquetaires. La grande Mademoiselle, en 1655 vient voir Vineuil le frère d'Ardier, compromis dans les intrigues de la Fronde avec Condé et cite sa visite dans ses Mémoires. La famille du marquis de Gaucourt qui possédait le château par héritage depuis 1752, le vendit en 1816, au vicomte de Preval, lieutenant général des armées du roi. Celui-ci s'occupa plus de la terre que du monument;  il réalisa de vastes plantations de betteraves. Le général vendit la propriété à la comtesse de Sainte-Aldegonde, veuve du maréchal Augereau, duc de Castiglione. C'est à Beauregard que fut célébré en grande pompe le mariage de sa fille Marie Valentine avec le marquis de Talleyrand Périgord, duc de Dino qui habitait le château de Valençay. De 1850 à 1925, Beauregard changea plusieurs fois de propriétaires, le comte de Cholet, pair de France, de 1850 à 1912, M. Louis Tillier qui fit d'importants travaux dans le parc jusqu'en 1925, et aujourd'hui à la famille de Gosselin.","architecture":"BEAUREGARD, c'est par M. et Mme Marcel de Gossellin en 1925 que le château de Beauregard entra dans la famille des propriétaires actuels. En 1968, le comte et la comtesse Alain du Pavillon en héritèrent et par dimportants travaux d'aménagement restaurèrent le château et les communs. aujourd'hui  Marine Vignes et Laurent Gannac.   Des travaux qui se prolongent à l'heure actuelle par la restauration des  portraits ainsi que des boiseries de la Galerie des Illustres commencèrent alors les travaux de restauration du parc et la réalisation du jardin des Portraits sur le plan de Gilles Clément, avec en projet une cédraie ainsi qu'un jardin d'écorces. Ce jardin, dont on admire dabord la forme et les couleurs en surplomb, se dévoile lorsquon le traverse; douze chambres de charmilles de douze couleurs différentes représentant les panneaux des règnes évoqués dans la galerie de 327 portraits du château, soit 315 ans dhistoire implicitement racontés en fleurs et en couleurs. Création également du \"verger des écorces\" afin daccéder à la glacière du XVIIIe siècle entièrement restaurée, ou encore à implanter différentes collections botaniques (chênes, bambous, houx, parrotias) dont une Nursery internationale de cèdres.\r\nEléments protégés MH : château : classement par liste de 1840. Parc du château : les trois pavillons du XVIIe siècle, à l'exclusion de la construction postérieure adossée contre l'un d'eux; façades et toitures du corps de bâtiment des communs, face au château, et pavillon accolé au nord, le parc et ses murs de clôture: inscription par arrêté du 8 septembre 1993.","habitants":"Famille se Jean du Thier Paul Ardier \r\n        \"","divers":"A Cellettes, château de   Beauregard                                                   47° 32' 13\" nord, 1° 23' 03\" est","gps":"","images":["../../jctruffet.com/image/image_41/41_Beauregard_41_1.jpg","../../jctruffet.com/image/image_41/41_Beauregard_41_2.jpg","../../jctruffet.com/image/image_41/41_Beauregard_41_3.jpg","../../jctruffet.com/image/image_41/41_Beauregard_41_4.jpg"]},"Consult_chateau_formulaire01a2":{"id":"Consult_chateau_formulaire01a2","dept":"41","canton":"Blois","commune":"Blois","nom":"Blois","type":"Château","periode":"XIII-XV","histoire":"BLOIS,  a été construit sur les bases dun manoir du XVe siècle  est de styles Gothique, Renaissance et Classique. Sa construction a débuté au XIIIe siècle et s'est achevée au XVIIe siècle. L'Ordonnance de Blois date de 1499 relative à l'organisation judiciaire. Valentine de Milon y meurt en 1408. Jeanne d'Arc s'y arrête en allant à Orléans, Louis XII y naquit et Anne de Bretagne y mourut en 1514. les Etats Généraux s'y réunirent de 1576-1577. L'Ordonnance de Blois fut signée en 1579 relative à la tenue des actes de mariage. L'Assassinat d'Henri Ier de Guise eut lieu à Blois en 1588. Catherine de Médicis y mourut. François  Ier  en fit construire la plus grande partie de 1516 à 1525  dans le style Renaissance. Blois est classé aux M.H. depuis 1840.   Son architecture aux lignes classiques et sa façade flanquée de deux tours confère à la propriété élégance et caractère.                                                                        HALLES aux GRAINS Au XVe siècle, la halle aux blés de Blois est une construction imposante qui occupe la totalité de l'îlot. Ce bâtiment abrite alors, au rez-de-chaussée, la halle proprement dite et, au premier étage, le palais de justice, bâti par les premiers ducs d'Orléans et les comtes de Blois. En 1806, le Domaine, qui avait légué la propriété d'un terrain à la ville, revient sur sa décision. Il réclame désormais une somme surévaluée comparée à l'état du bâtiment qui se trouve dans ce terrain. En 1840, la municipalité souhaite malgré tout que l'on reconstruise une nouvelle halle car l'ancienne, située dans le bâtiment médiéval, ne convient plus aux besoins de la ville. Dès 1842, la municipalité envisage donc la construction d'un nouveau bâtiment.","architecture":"HÖTEL de Ville, il se situe derrière la cathédrale Saint-Louis. Il occupe les bâtiments de lancien palais épiscopal, qui fut construit par l'architecte Jacques V Gabriel auquel on doit aussi le Vieux Pont à Blois. En 1700, les plans sont terminés et les travaux commencent. Lédifice sélève sur 2 niveaux au côté de la cour et occupe 4 niveaux vers la terrasse basse. Lévêque de Blois sy installe officiellement en mars 1704. Cest grâce à sa majestueuse façade Sud à 4 niveaux, que le palais est prêt à se comparer avec le château de Blois. Le premier niveau traité en bossages continus souvre sur la terrasse basse par des baies plein-cintre. En ce qui concerne la façade sur cour, elle est marquée par un avant-corps central dune travée en faible saillie, souligné des chaînes de refend et surmonté dun fronton triangulaire1 aux armes de premier évêque. Les colonnes qui précèdent, lentrée ne sont pas dans le projet initial, surement ajoutés pendant lépiscopat de lévêque Thémines. Aujourd'hui, c'est devenu l'Hôtel de Ville de Blois.\r\nHALLE, aux grains L'année suivante, en 1843, vient le concours d'architectes et la mise en place d'un projet pour la Halle aux Grains. Ce projet est validé en 1845, après quelques modifications. En 1849, la construction de la Halle débute et le préfet nomme ce bâtiment « Palais du Peuple ». Il est inauguré le 26 août 1850. Elle est cependant sauvée par l'association \" Parlez-moi d'amour\", entendue par Jack Lang, qui intervient pour que la Halle soit classée comme M.H. en 1984. Elle devient lieu d'exposition et salle de spectacle en tant que « scène nationale ». Le 13 décembre 1985, la ville de Blois fête l'inauguration de sa nouvelle Halle, qui prend le nom de « Palais des Congrès et de la culture ».","habitants":"François Ier\r\n        \r\n        \"","divers":"Château de Blois , de la Halle aux Grains   grav 8, 47° 35' 08\" Nord et 1° 19' 51\" Est Hôtel de ville  : 47° 35' 19\" Nord, 1° 20' 14\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Blois_1.jpg","../../jctruffet.com/image/image_41/41_Blois_2.jpg","../../jctruffet.com/image/image_41/41_Blois_3.jpg","../../jctruffet.com/image/image_41/41_Blois_4.jpg","../../jctruffet.com/image/image_41/41_Blois_5.jpg","../../jctruffet.com/image/image_41/41_Blois_6.jpg","../../jctruffet.com/image/image_41/41_Blois_7.jpg","../../jctruffet.com/image/image_41/41_Blois_8.jpg"]},"Consult_chateau_formulairead86":{"id":"Consult_chateau_formulairead86","dept":"41","canton":"Blois","commune":"Blois","nom":"Blois_Vicomté","type":"Palais","periode":"XiV-XV","histoire":"BLOIS, la mort de Charles dOrléans, son fils Louis devient duc dOrléans et comte de Blois, avant de devenir roi de France sous le nom de Louis XII en 1498. Le château  devient ainsi une demeure royale où le roi séjourne les mois dhiver, accueille à laube du 6 décembre 1491 le mariage de la duchesse Anne de Bretagne et du roi Charles VIII.   Louis XII, qui passa son enfance au château, fait construire de décembre 1498 à 1502, laile Louis XII. Cette aile, à lesthétique flamboyante,  est bâtie avec une double galerie, la galerie basse reprenant la disposition dun cloître et dans la partie haute une galerie intérieure. Le 9 janvier 1514, Anne de Bretagne décède au château de Blois. Le comté de Blois est donné à Claude, fille aînée de Louis XII et Anne de Bretagne. De 1515 à 1524, François 1er y fait construire sur laile nord un logis dinspiration Renaissance flanqué du célèbre escalier à vis de Blois. En Juillet 1524, la reine Claude, fille de Louis XII et dAnne de Bretagne et épouse de François 1er, meurt à Blois. En 1539, le roi fait transférer le mobilier à Fontainebleau suivi en 1544 par la bibliothèque. Lors dun bal donné en avril 1545, Pierre de Ronsard fait la rencontre de la belle Cassandre Salviati, qui lui inspire le fameux « Sonnet à Cassandre ».En 1550, Henri II fait réaliser des travaux dans le « logis neuf », laile François 1er. En mars 1572, plusieurs fêtes sont célébrées à Blois pour larrivée de Henri de Navarre, venu fêter ses fiançailles avec Marguerite de Valois, sur de Charles IX. Les fiançailles ont lieu en avril 1572 dans la chapelle du château. En 1576 et 1588, le roi Henri III convoque les états généraux à Blois. Au XVIIe siècle, est construite par François Mansart laile Gaston dOrléans. Ce bâtiment est un des premiers édifices caractéristiques du classicisme français. Après la mort de Gaston Jean Baptiste de France, duc dOrléans le 2 février 1660, le château, inachevé, est mal entretenu et se détériore. La transformation en 1788 du château en caserne sauve lancien palais de la destruction.","architecture":"VICOMTE-BLOIS, mentionné en 886, le château de la Vicomté, était un ancien château de chasse, des Rois de France, il se trouve un peu à l'écart,  jouit d'une vue exceptionnelle sur la vallée de la Loire. il bénéficie de la proximité de la forêt domaniale de Blois, habité de longue date par des seigneurs familiers de la Cour, il garde le charme de ces grandes maisons où la proximité de la nature, le site et la qualité des invités donnaient une valeur d'exception aux réceptions qui y étaient organisées. C'est au XXe siècle qu'il se transforme en hôtel, atelier d'exposition de peinture et plus récemment en salon de réceptions événementielles, face au château, tout en appréciant la beauté et la tranquillité du site. Depuis le 21 décembre, la prestigieuse bâtisse est la propriété d'Elisabeth et Grégoire Marty. Ils arrivent du Nord avec un étonnant parcours professionnel. Grégoire, architecte de formation, exerce dans la grande distribution, au titre de cadre chargé de l'implantation de surfaces de vente à l'international. Dans un premier temps, il poursuivra sa carrière entre deux avions. Elisabeth a connu les fastes des palaces parisiens, en travaillant dans les quatre étoiles de la capitale. « J'ai reçu une formation. L'objectif est d'offrir d'autres services comme des séminaires d'entreprises, des concerts, des rassemblements de rallye, des réunions familiales thématiques et toute manifestation événementielle. A terme, nous créerons des chambres d'hôtes haut de gamme » précise la gérante. Elisabeth et Grégoire ont craqué pour cette demeure de caractère. « C'est un rêve de jeunesse » s'amusent les acquéreurs, qui résideront aux Grouëts. Prosper Mérimée le fait classer sur le première liste des M.H. en 1840. Le 9 mars 1843 laile François Ier est restituée à la ville de Blois afin de devenir un musée. Pour le reste du château, il faudra attendre le 30 octobre 1867 pour le voir ouvert au public dans son intégralité.","habitants":"Charles dOrléans      Famille d'Elisabeth et Grégoire Marty\r\n        \r\n        \"","divers":"Blois-Vicomté 47° 35' 38\" Nord, 1° 19' 41\" Est et hôtel de ville grav-8,","gps":"","images":["../../jctruffet.com/image/image_41/41_Blois_Vicomt%c3%a9_1.jpg","../../jctruffet.com/image/image_41/41_Blois_Vicomt%c3%a9_2.jpg","../../jctruffet.com/image/image_41/41_Blois_Vicomt%c3%a9_3.jpg","../../jctruffet.com/image/image_41/41_Blois_Vicomt%c3%a9_4.jpg","../../jctruffet.com/image/image_41/41_Blois_Vicomt%c3%a9_5.jpg"]},"Consult_chateau_formulaire203b":{"id":"Consult_chateau_formulaire203b","dept":"41","canton":"Montoire sur le Loir","commune":"Ternay","nom":"Bois_Freslon","type":"Manoir","periode":"XIV-XV","histoire":"BOIS-FRESLON, c'est un manoir fortifié, sa construction date du XIVe siècle. En 1930, son propriétaire était le comte O. d'Espinay-Saint-Luc. Le les origines du château datent du Moyen Age.  Propriété de monsieur Paul  Chidaine.","architecture":"BOIS-FRESLON, c'est vers la fin du XIVe ou au début du XVe siècle que le château féodal semble avoir été reconstruit avec une grosse tour ronde à l'angle nord-ouest de l'enceinte carrée. Cette enceinte a été régularisée et pourvue de trois tourelles d'angle. Adossé à la tour nord-ouest, le bâtiment principal, rectangulaire, s'étend du nord au sud. Sa façade ouest a été restaurée et modifiée vers 1870 dans le style néo-renaissance. Une aile vers l'est complète le château sur la façade nord de l'enceinte. Une aile a été ajoutée au XIXe siècle côté ouest. A l'autre extrémité de la cour a été construit un bâtiment, appelé la chapelle, doté d'une voûte en pierre. La porte d'accès à cet espace a conservé une partie de son décor du XVIe siècle. Dans la cour, un puits alimentait le château en eau.que le château de Bois-Freslon a été inscrit aux M.H. depuis en 2009.","habitants":"lFamille du comte O. d'Espinay-Saint-LucLe \r\n        \"","divers":"Bois -Freslon 47° 43' 51\" Nord, 0° 46' 48\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Bois_Freslon_1.jpg","../../jctruffet.com/image/image_41/41_Bois_Freslon_2.jpg","../../jctruffet.com/image/image_41/41_Bois_Freslon_3.jpg","../../jctruffet.com/image/image_41/41_Bois_Freslon_4.jpg"]},"Consult_chateau_formulaire3a4f":{"id":"Consult_chateau_formulaire3a4f","dept":"41","canton":"Salbris","commune":"Selles St-Denis","nom":"Bois_Méhant","type":"Chateaux","periode":"XVIII","histoire":"BOIS-MEHANT à la Selles St-Denis.  M et Mme Célian Goury du Roslan sont les propriétaires en 1930 .                                                        LA NOUE, ce château, construit au XVIe siècle, appartenait en 1537 à Jacques de Gaston nommé dans un titre du château de Diziers. En 1585, le château appartenait à Guillaume de Beaufils (de Villepion). Au XVIe siècle, il était entre les mains de la famille du Bouchet (à Condé près  de Nogent le Rotrou). Après avoir changé plusieurs fois de propriétaires, l'édifice a été acquis fortuitement par Adolphe Louis de Musset cousin issu de Germain d'Alfred de Musset, qui fit chez son parent un séjour pendant lequel il composa son célèbre roman \"La confession d'un enfant du siècle\".","architecture":"BOIS-MEHANT,  corps de logis central oblongue de sept travées à deux niveaux avec série de lucarnes sur combles, pavillon d'entrée central saillant à quatre niveaux toit en croupe, encadré par deux pavillons de trois niveaux toit à deux pans.                                                                                     La NOUE, corps de logis central à trois niveaux avec lucarnes de plan carrées à toit brisé, ce dernier inséré entre deux pavillons rectangulaires à quatre niveaux toit en croupe.","habitants":"Bois-Méhant  M et Mme Célian Goury du Roslan                                    La noue\r\n        \r\n        \"","divers":"Château de Bois-Méhant et de la Noue grav 1  à la Selles St-Denis   47° 23' 16\" nord, 1° 57' 27\" est.                                                                Bois -Méhant grav2-3-4-5,  48° 47' 02\" nord, 1° 26' 13\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Bois_M%c3%a9hant_1.jpg","../../jctruffet.com/image/image_41/41_Bois_M%c3%a9hant_2.jpg","../../jctruffet.com/image/image_41/41_Bois_M%c3%a9hant_3.jpg","../../jctruffet.com/image/image_41/41_Bois_M%c3%a9hant_4.jpg","../../jctruffet.com/image/image_41/41_Bois_M%c3%a9hant_5.jpg"]},"Consult_chateau_formulairee5fa":{"id":"Consult_chateau_formulairee5fa","dept":"41","canton":"Vendome","commune":"Bonneveau","nom":"Bonneveau","type":"Château","periode":"XIII-XV","histoire":"Trois châteaux à Bonneveau dont celui de Bonneveau de Matval et la Fosse.                                                                                                                                      BONNEVEAU    Ce château, du XVe siècle, est situé à l'extrême limite de la province, il appartenait aux comtes de Vendôme. En 1582, il fut vendu à Gilles de Souvré, maréchal de France, seigneur de Courtenvaux. Sa petite-fille Anne épousa en 1662 Michel le Tellier, marquis de Louvois et seigneur de Bonneveau. Ses descendants conservèrent ce titre et en 1780, Louise-Françoise-Charlotte le Tellier de Louvois épousa Pierre de Montesquiou-Fezensac. Sous le nom de madame de Montesquiou, elle devint célèbre pour avoir été gouvernante du roi de Rome. Ses descendants ont conservé cette terre jusqu'au début de ce siècle. propriété de Gilles Van Peene.                                                                                                        MATVAL,  Bonneveau aurait eu pour origine un castrum mérovingien, nommé Matoval, détruit par les Normands au Xe siècle. En 1459, la propriété fut donnée à Jean, bâtard de Louis de Bourbon et de Vendôme, qui fut probablement le commanditaire du manoir actuel, la demeure comprend un bâtiment d'habitation. A l'angle sud est se trouve un mur percé de meurtrières, vestige d'une construction dont subsistent des arrachements sur le mur pignon du corps de bâtiment qui relie la demeure à une tour circulaire. Des meurtrières et une bretèche en assuraient la défense. Sous le coteau et le manoir restent des galeries souterraines.","architecture":"MATVAL, c'était une forteresse. La construction du château de Matval date du XIIIe et XVe siècles. La gouvernante de Napoléon II surnommé l'Aiglon vint y vivre. Le site de Matval est reconnu comme la terre de naissance des pommes « Les Reinettes du Mans ». Le propriétaire des lieux, Childebert Ier, ayant rapporté d'Espagne des greffes de pommiers, les sema lui-même, dans son parc, donnant vie à ce qui allait devenir la pomme la plus célèbre de France. On dit que les reinettes du Mans furent baptisées, ainsi en l'honneur des deux filles du roi : les « Réginettes ».                                                                                         La FOSSE   sur la commune de Fontaine-les-Coteaux, à cinq kilomètres au Sud-Est se trouve l'arboretum de la Fosse (ou Parc botanique de la Fosse), l'un des plus anciens de France. Regroupant des collections d'arbres et arbustes du monde plantés depuis la fin du XVIIIe siècle, il est en France le premier qui fut, dès 1978, protégé au titre des M.H. pour sa valeur botanique et paysagère.","habitants":"Bonneveau, Famille de Gilles de Souvré\r\n        \"","divers":"Trois châteaux à Bonneveau dont celui de Bonneveau Godelinière grav-4, les vestiges de Matval  grav-1-2 grav-3 et la Fosse grav-5,  Matval 47° 48' 48,96\" Nord et 0° 44' 49,92\" Est                                                                                         Bonneveau  47° 48' 49\" nord, 0° 44' 50\" est .","gps":"","images":["../../jctruffet.com/image/image_41/41_Bonneveau_1.jpg","../../jctruffet.com/image/image_41/41_Bonneveau_2.jpg","../../jctruffet.com/image/image_41/41_Bonneveau_3.jpg","../../jctruffet.com/image/image_41/41_Bonneveau_4.jpg","../../jctruffet.com/image/image_41/41_Bonneveau_5.jpg"]},"Consult_chateau_formulaire2249":{"id":"Consult_chateau_formulaire2249","dept":"41","canton":"Romorantin-Lanthenay","commune":"Vernou en Sologne","nom":"Borde","type":"Château","periode":"XVII","histoire":"BORDE, ce château, construit entre 1643 et 1645, a été peu modifié, mais son environnement a évolué avec les modes jusqu'au XIXe siècle. La pièce lambrissée, attribuée à Jean Berain (1687-1688), a été ramenée au début du XXe siècle de l'hôtel de Mailly à Paris. Au XXe siècle, une galerie a été ajoutée au rez de chaussée couverte en terrasse ajoutée au début  du XXe siècle sur la façade sud . Le fossé a été comblé en 1830 et la motte arasée.","architecture":"BORDE, corps de logis central rectangulaire à six travées de trois niveaux, flanqué aux extrémités de pavillon rectangulaire de même niveaux toit en croupes pour les trois édifices\r\nEléments protégés :château, ses dépendances (à l'exclusion du château d'eau) et parc de la Borde , lieudit château de la Borde,et  lieudit Parc de Laborde  : partie nord avec pour limite sud l'allée Marion, lieudit Le Marchais Creux: inscription par arrêté du 24 novembre 1994.","habitants":"Famille de  Jean Berain \r\n        \"","divers":"A Vernou en Sologne,  La Borde 47° 26' 12\" nord, 1° 41' 22\" est","gps":"","images":["../../jctruffet.com/image/image_41/41_Borde_41_1.jpg","../../jctruffet.com/image/image_41/41_Borde_41_2.jpg"]},"Consult_chateau_formulaired231":{"id":"Consult_chateau_formulaired231","dept":"41","canton":"Saint-Benoît-du-Sault.","commune":"Chaillac","nom":"Brosse_Chaillac","type":"Château","periode":"XI-XIV","histoire":"BROSSE, la famille des vicomtes de Brosse est intéressante,  parce qu'une branche junior a hérité du comté de Penthièvre dans les années 1430 par mariage, et à la fin du XVe siècle a fait plusieurs mariages dynastiques importants, y compris avec les comtes de Savoie, bien qu'ils sortent du cadre de cet article sur le château de Brosse. Cette forteresse va appartenir aux seigneurs de Chauvigny et à la famille de Bourbon-Montpensier. Elle est incendiée par les Anglais au cours de la guerre de Cent Ans. 1194/1206 : Richard Cur de Lion ou Jean sans Terre achève l'enceinte du château. Celle-ci s'ouvre par une immense porte du XIVe encore assez bien conservée, surmontée des armoiries reconnaissables de la maison de Chauvigny-Brosse : sept fusées posées de fasce, surmontées d'un lambel à six pendants. 1328 : Brosse passe dans la famille de Chauvigny. les tours qui les flanquent, remaniées au XIVe siècle.1369 : les troupes anglaises s'emparent du château. Dans une excavation on trouve des ossements humains provenant sans doute des victimes du siège de 1369. 1502 : Brosse passe aux Bourbon-Montpensier.1768 : le château sert de carrières de pierre  et fait lobjet dune inscription au titre des M.H., depuis le 11 mars 1935.Le château est laissé à l'abandon à partir du XVIIIe siècle. Château de Brosse (Xe siècle) : il fut construit par le vicomte de Limoges Géraud, époux de Rothilde de Brosse. Il ne reste que des ruines aujourd'hui.","architecture":"BROSSE, situé sur lancienne commune de Brosse, était la possession des vicomtes de Brosse, qui furent puissants au Moyen Âge, et eurent même leur propre monnayage au XIe siècle. Toutefois, le village créé autour du château, situé dans un cul-de-sac, ne concurrença jamais celui de Chaillac, dorigine antique, surtout après avoir été détruit par les Anglo-Poitevins en 1370.","habitants":"Famille de Bourbon-Montpensier\r\n        \"","divers":"Vestiges du château de la Brosse à Chaillac","gps":"","images":["../../jctruffet.com/image/image_41/41_Brosse_Chaillac_1.jpg","../../jctruffet.com/image/image_41/41_Brosse_Chaillac_2.jpg","../../jctruffet.com/image/image_41/41_Brosse_Chaillac_3.jpg","../../jctruffet.com/image/image_41/41_Brosse_Chaillac_4.jpg"]},"Consult_chateau_formulairefbb4":{"id":"Consult_chateau_formulairefbb4","dept":"41","canton":"Moulineuf","commune":"Valencisse","nom":"Bury","type":"Vestiges","periode":"XIII","histoire":"BURY, le château de Bury avait été bâti pour Florimond Robertet qui possédait une immense fortune. Il est vrai qu'il était trésorier de France et secrétaire d'État des Rois Charles VIII, Louis XII et François 1er. Au XVIIIe siècle, les derniers descendants de son commanditaire, Claude Robertet, puis Florimond, premier président à la Cour des Comptes l'avaient transmis par mariage à la famille de Villeroy. Ces derniers le cédèrent au marquis de Rostaing qui réunit en 1642 la terre de Bury à celle d'Onzain et fit démolir Bury pour construire celui d'Onzain.  Après quelques années, le domaine de Rostaing est démembré. Julien Clément de Feillet le revend en 1760 à Jean-Marie Hugues de Péan. C'est ensuite à M. Fouillon d'Escotier puis M. Crognon Bonvalet que revient la propriété du domaine. C'est ce dernier qui fera démolir le château d'Onzain en 1823. Monsieur François Philippe Gastebois neveu de Madame Crognon Bonvalet hérite des ruines de Bury et les revend en 1868 à M. Ragnon inspecteur général de l'Université. En 1882, Mrs Trawford, riche Anglaise, fait l'acquisition de ce qui reste du château. A sa mort, son mari revendra le domaine à M. Paul Jousselin qui fit bâtir la maison actuelle contre une tour de l'ancien château. En 1921, Madame Lenoir achète le château, puis M. Alibert, Conseiller d'Etat qui en devient le propriétaire en 1925 et M. Henry Reverdy, en 1933. La famille Reverdy conserve la propriété du domaine jusqu'en 1969. Les propriétaires actuels sont Monsieur et Madame de Guillenchmidt","architecture":"BURY,  ce château était un chef-d'uvre de la Renaissance, il était composé de trois corps de bâtiments disposés autour d'une cour. Le quatrième côté était fermé par un mur au milieu duquel était percée l'entrée défendue par deux tourelles et un pont-levis. Le château était flanqué de quatre tours et entouré d'eau. De beaux jardins l'accompagnaient. On ne connait l'aspect de l'édifice que par le dessin qu'en donne  J. Androuet du Cerceau, car Bury a été détruit.","habitants":"Famille de  Florimond Robertet \r\n        \r\n        \"","divers":"A Valancisse le Bury 47° 33' 56\" nord, 1° 12' 13\" est","gps":"","images":["../../jctruffet.com/image/image_41/41_Bury_1.jpg","../../jctruffet.com/image/image_41/41_Bury_2.jpg","../../jctruffet.com/image/image_41/41_Bury_3.jpg","../../jctruffet.com/image/image_41/41_Bury_4.jpg"]},"Consult_chateau_formulaire1a79":{"id":"Consult_chateau_formulaire1a79","dept":"41","canton":"Blois","commune":"Candé-sur-Beuvron","nom":"Candé_Beuvron","type":"Château","periode":"XV-XVI","histoire":"deux châteaux à Candé dont celui de Candé et Madon.                              CANDE  Il devait exister, avant le château actuel, un édifice féodal sans doute détruit par les Anglais au XIVe siècle. Un membre de la famille Maussion fit appliquer la façade actuelle à un ancien bâtiment élevé précédemment, peut-être sur l'emplacement du château primitif. \r\nMADON, le château actuel occupe l'emplacement d'une ancienne maison de plaisance des comtes de Blois. Cette propriété appartenait jadis à l'abbaye de Saint-Lomer qui la reçut vers l'an 1000 d'un chevalier. Les abbés de Saint-Lomer en firent un lieu de repos et de divertissement. En 1698, l'abbaye de Saint Lomer fut rattachée à l'évêché de Blois, le lieu devint la maison de campagne des évêques de Blois. Le château actuel fut édifié vers 1770 par Mgr de Termont, évêque de Blois.Louis XII vint négocier l'annulation de son mariage. Dans ce manoir, acheté en 1994 par un homme d'affaires japonais qui en tomba amoureux, dit-on, depuis un survol en avion. Le château a été racheté, en 2008, par un investisseur français, avec le projet de le transformer en hôtel de luxe.  il fut acheté plus tard par le baron d'Etchegoyen dont les descendants le possèdent toujours, propriétaire le comte et la comtesse  Jean de Warren.","architecture":"CANDE comprend un corps de bâtiment principal, surmonté d'un fronton percé d'un oeil-de-boeuf. Un large perron de trois marches donne accès à l'intérieur de la demeure. Bossages à pierre entre les portes-fenêtres. Sur la façade postérieure, perpendiculairement, se trouve une chapelle à abside semi-circulaire. Derrière la chapelle, en arrière du bâtiment principal, se trouve une autre construction plus ancienne. Dans la cour, les restes d'un colombier en forme de tour circulaire. A côté, le bâtiment a été élevé sur une cave voûtée transformée en crypte. L'intérieur garde une cage d'escalier avec rampe en fer forgé, des boiseries et des plaques de cheminées.                                                                                                                  MADON, la demeure se compose d'un corps de logis principal avec deux ailes perpendiculaires sur la façade d'entrée. Une grande terrasse dont l'accès se fait par deux marches, précède le château. La façade postérieure, donnant sur le parc, est semblable à la façade d'entrée, les ailes en retour formant deux avant-corps en pavillon. Sur la gauche, un grand corps de bâtiment s'accole perpendiculairement le long du château (aile Louis XIII). En face de ce bâtiment, un pavillon du XVIe siècle, remanié pour en faire une dépendance (vestige de l'ancien château d'époque Louis XII). Dans le parc, une chapelle couverte en dôme, avec fronton demi-circulaire, édifiée sur une source dite miraculeuse pour les yeux, qui court dans un bassin rond se trouvant dans une cave voûtée. Éléments protégés MH : le château de Madon y compris le parc, la chapelle, les communs et la grille d'entrée : inscription par arrêté du 10 avril 1948.","habitants":"candé,famille Maussion                                                               Madon; baron d'Etchegoyen\r\n        \"","divers":"deux châteaux à Candé dont celui de Candé grav 1-2 et Madon grav 3-4.  Candé  7° 29' 51\" nord, 1° 15' 17\" est                                                   Madon : 47° 31' 03\" Nord et 1° 17' 24\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Cand%c3%a9_Beuvron_1.jpg","../../jctruffet.com/image/image_41/41_Cand%c3%a9_Beuvron_2.jpg","../../jctruffet.com/image/image_41/41_Cand%c3%a9_Beuvron_3.jpg","../../jctruffet.com/image/image_41/41_Cand%c3%a9_Beuvron_4.jpg"]},"Consult_chateau_formulaire4269":{"id":"Consult_chateau_formulaire4269","dept":"41","canton":"Vineuil","commune":"Cellettes","nom":"Cellettes_41","type":"Château","periode":"XV-XVII","histoire":"Trois châteaux à Cellettes,  l'Archerie, d'Angevinière, de Conon   et de Montron pas d'information pour ce dernier.                                                                                                                                                                                    ARCHERIE, château à découvrir : Le château de l'Angevinière, le château de l'Archerie M Milnor Gibson propriétaire en 1930.                                                     ANGEVINIERE, bâti à Cellettes,  est appelé aussi le château Mon repos ou le Gord.                                                                                    BOUSSEUIL, de la construction primitive du XIIe siècle, il ne subsiste qu'une tour transformée en colombier. Le château a été édifié à la fin du XVe et au début du XVIe siècle. Au XIXe siècle, il a été complété par un corps de bâtiment construit dans le style néo-gothique cher à cette époque. Le château de Bousseuil est agréablement situé au milieu d'un parc, il a été restauré par M. Denis.                                                                                                                       CONON, château documenté depuis le XIIIe siècle. A partir de 1648, il tombe peu à peu dans l'oubli et se voit transformé en ferme avant la Révolution. Les vestiges des différentes occupations sont conservés: l'enceinte pourvue de tours carrées et circulaires encadrant l'entrée du domaine. Reprises de la fin du XVe et du début du XVIe siècle. Dans le logis, décors peints du XVIIe siècle.\r\nÉléments protégés MH : l'enceinte et les sols du logis seigneurial (lieu-dit Conon): inscription par arrêté du 8 avril 2004.","architecture":"CONON Le château de Conon a été transformé en ferme privée. Mais on peut encore voir le mur d'enceinte de l'ancien château. Le château de Conon a été vendu ainsi que ses meubles en 2018. Les Malartic étaient les avant derniers propriétaires de Conon, depuis 40 ans. Après lavoir vendu, ils ont dispersé une partie des meubles aux enchères. Cette maison va continuer de vivre. Voilà lune des grandes satisfactions de Ségolène et Hubert de Malartic. Ils avaient acheté le château de Conon, en forêt de Boulogne, à Cellettes, en 1978. Ils lui ont consacré beaucoup de temps, dargent et dénergie pour le restaurer, espérant « redonner un peu de son âme ». Ils sont heureux de le transmettre à un jeune couple envisageant de sy installer et ayant un projet touristique. « Cest un lieu très ancien. On retrouve des traces écrites de Conon dès le XIIIe siècle. Cétait une petite seigneurie qui bénéficiait du droit de justice », retrace le futur ancien propriétaire. Racheté en 1650 par le seigneur de Beauregard, le château a commencé à décliner, devenant une simple métairie allant même jusquà servir de « carrière de pierres ». « En 1905, il avait été acheté par un notaire de Compiègne : il en avait fait sa résidence secondaire », indique encore Hubert de Malartic, qui vivait avec son épouse à temps plein à Cellettes depuis « la retraite » et les années 2000. Ils ont aujourdhui décidé de vendre pour « adapter leur habitation à leur train de vie actuel » et pour sinstaller au pays basque. Le château de Conon est inscrit aux M.H. depuis 2004.","habitants":"Seigneur locaux\r\n        \"","divers":"Trois châteaux à Cellettes,  l'Archerie grav-1, d'Angevinière grav-2-3, de Conon grav-4-5  et de Montrion grav-6-7 . Boussière-grav 8       Bousseuil grav -9                           Conon  47° 31' 31\" Nord et 1° 24' 05\" Est                                                        Montrion 47° 32' 04\" nord, 1° 23' 57\" est","gps":"","images":["../../jctruffet.com/image/image_41/41_Cellettes_1.jpg","../../jctruffet.com/image/image_41/41_Cellettes_2.jpg","../../jctruffet.com/image/image_41/41_Cellettes_3.jpg","../../jctruffet.com/image/image_41/41_Cellettes_4.jpg","../../jctruffet.com/image/image_41/41_Cellettes_5.jpg","../../jctruffet.com/image/image_41/41_Cellettes_6.jpg","../../jctruffet.com/image/image_41/41_Cellettes_7.jpg","../../jctruffet.com/image/image_41/41_Cellettes_8.jpg","../../jctruffet.com/image/image_41/41_Cellettes_9.jpg"]},"Consult_chateau_formulaire14e2":{"id":"Consult_chateau_formulaire14e2","dept":"41","canton":"Vineuil","commune":"Cellettes","nom":"Cellettes_II_41","type":"Château","periode":"XV-XVII","histoire":"Sept châteaux dans cet article de Celettes celui de Fresnaies, Gagnotterie , Hydronière, de Rochettes, Rozelles et Vaugelay. FRESNAIES, il fait partie d'un des 18 châteaux et maisons de maitre qui se trouvent construits à Cellettes.  Pour vous donner une idée, voici la liste de ses châteaux à découvrir : Le château de l'Angevinière, appelé Mon repos ou le Gord, le château de l'Archerie, le château des Aulnières (XVIIe siècle), le château de Beauregard (XVIe siècle voir article) ouvert à la visite avec son parc de 70 hectares, le château de la Blancardière, le Boisselas qui date du milieu du XVIIe siècle, le château de la Boissière, le château de Bousseuil, le château de Conon transformé en ferme, le château La Fresnaye, le château de la Gagnotterie, appelé aussi la Feuillée ou les Rosiers, le château l'Hydoinière, le château de Lutaine, qui abrita l'académicien Paul Claudel qui y écrivit en 1923 \"Les conversations\", La Maison Vert ou le château de la Vaugelay, le château de Montrion, le château d'Ornay, le château des Rochères, le château de la Rozelle et le château de la Coque, plus proche de Cellettes que de Cormeray, à qui il appartient;","architecture":"GAGNOTTERIE, pas d'information.                          HYDROINIERE, pas d'information.                                                                               LUTAINE, le château de Lutaine s'enorgueillit d'avoir abrité, quelque temps, l'académicien Paul Claudel qui y écrivit, en 1923, \"Les conversations en Loir-et-Cher\". Le château est adossé à la forêt de Russy.                                         ROCHETTES   un violent incendie a détruit le château des Rochères le mercredi 17/04/2019 que les sapeurs-pompiers de Loir-et-Cher ont reçu l'alerte, suite à l'appel du gardien, pour un incendie sur le site du château des Rochères. Rapidement sur les lieux, les hommes du feu ont constaté que la toiture s'était embrasée sur la partie la plus haute du bâtiment principal, qui s'étend sur une surface au sol de 200 à 300 m2. La bâtisse, qui est une ancienne closerie, fut construite au XVIIe siècle. Elle présente une ossature ancienne et il a fallu doser les moyens en eau pour ne pas affaiblir la structure ni alourdir les planchers.                                                   ROZELLE, devenu un hôtel 4 étoiles, le château de la Rozelle peut accueillir 50 personnes et vous propose 22 chambres. La Rozelle est situé à moins de 20 minutes des prestigieux châteaux de Chambord, Blois, Cheverny et Chaumont sur Loire. : architecture, jardin, histoire des différents propriétaires. Nous avons personnalisé la décoration de chaque chambre en choisissant du mobilier style XVIIIe siècle, des tissus tendus.                                                             VAUGELAY, le château de Vaugelay fut occupé, en 1906, par Maurice Bége et après, par le comte d'Arcy. A la famille de Silz en devint le propriétaire en 1930.","habitants":"Seigneurs Locaux\r\n        \"","divers":"Sept châteaux dans cet article de Celettes celui de Fresnaies grav-1, Gagnotterie  grav-2, Hydronière grav-3, de Rochettes grav-4, Rozelles grav-5-6-7 et Vaugelay grav 7. Fresnayes : 47° 31' 45\" Nord et 1° 22' 53\" Est                                              Gagnotterie 47° 31' 45\" Nord et 1° 22' 53\" Est                                                  Rochettes : 47° 31' 45\" Nord, 1° 22' 53\" Est                                                        Rozelle  47° 31' 45\" Nord et 1° 22' 53\" Est                                                        Vaugelay  47° 31' 45\" Nord, 1° 22' 53\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Cellettes_II_1.jpg","../../jctruffet.com/image/image_41/41_Cellettes_II_2.jpg","../../jctruffet.com/image/image_41/41_Cellettes_II_3.jpg","../../jctruffet.com/image/image_41/41_Cellettes_II_4.jpg","../../jctruffet.com/image/image_41/41_Cellettes_II_5.jpg","../../jctruffet.com/image/image_41/41_Cellettes_II_6.jpg","../../jctruffet.com/image/image_41/41_Cellettes_II_7.jpg","../../jctruffet.com/image/image_41/41_Cellettes_II_8.jpg"]},"Consult_chateau_formulaire1c08":{"id":"Consult_chateau_formulaire1c08","dept":"41","canton":"Blois","commune":"Chailles","nom":"Chailles","type":"Château","periode":"XVII","histoire":"Deux châteaux à Chailles, Pigeonnière et de Plessis Villelouet.                                                                     PIGEONNIERE, château construit en grande partie au début du XVIIe siècle. Très délabré au sortir de la Révolution, il fut restauré et agrandi à partir de 1858 sous la direction de Jules de la Morandière. Des vestiges de fortifications sont encore visibles dans le tracé des fossés et la disposition de quatre tourelles rondes et carrées, qui formaient les quatre angles d'un château fortifié pré-existant. Le corps de logis principal est flanqué latéralement de deux ailes cantonnées au nord de tours carrées. Au sud, la cage d'escalier flanque le corps principal. S'y voient également les deux tourelles circulaires. Au nord, deux pavillons carrés surplombent la terrasse et conservent des traces de fortifications. Les ailes basses latérales étaient destinées aux usages domestiques et agricoles. A l'intérieur, une bibliothèque au décor peint, dû à Chenu et Ulysse Besnard. Les torchères en bois ornant le garde corps, représentant les quatre saisons, furent réalisées par l'ébéniste Biberon. Le corps principal conserve trois cheminées en pierre du XVIIe siècle, et repeintes au XIXe siècle par les mêmes artistes. Seule la cheminée d'une chambre au premier étage a conserve ses peintures d'origine sur la hotte droite. Éléments protégés MH : les façades et les toitures de la bibliothèque avec son décor intérieur ; les trois cheminées de style Louis XIII situées dans le corps principal du château : inscription par arrêté du 20 avril 1989.","architecture":"PLESSIS-VILLELOUET, il date du XVIIe siècle, comprend ses façades, toitures du château, chapelle, les quatre bâtiments de la ferme modèle, la laiterie et sa grotte. La clinique psychiatrique de la Chesnaie : le petit et le grand Boissier, le « train vert » a seigneurie est mentionnée à partir du XIVe siècle. Le château présentait deux tours cantonnant un corps central, le tout entouré de fossés. Par la suite, deux ailes symétriques fermèrent la cour formant un U. Au XVIIIe siècle, l'architecte Jean-Baptiste Collet reprend les façades du corps central, perce le comble de lucarnes et aménage les intérieurs. Il dissimule les tourelles médiévales et perce de larges baies la façade sur parc. En 1840, des travaux de restauration sont conduits par l'architecte Courtiller. La chapelle, de style néo-flamboyant, a été intérieurement décorée par Maurice de Vaines. Une ferme modèle est bâtie, le parc redessiné et l'allée d'accès créée, la laiterie de propreté associée à une grotte rustique, sous l'étable principale de la ferme modèle, ne semble pas de la même époque. Éléments protégés MH : les façades et les toitures du château ; la chapelle en totalité ; les quatre bâtiments de la ferme modèle ; la laiterie de propreté et sa grotte rustique en totalité : inscription par arrêté du 9 janvier 2006.","habitants":"Pigeonnière, Jules de la Morandière                         PlessisJean-Baptiste Collet \r\n        \r\n        \"","divers":"Deux châteaux à Chailles, Pigeonnière grav-1    et de Plessis Villelouet grav 2                                                                   Pigeonnière  47° 31' 58\" Nord et 1° 18' 09\" Est                                              Plessis-Villelouet 47° 31' 47,02\" Nord et 1° 18' 1,33\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Chailles_1.jpg","../../jctruffet.com/image/image_41/41_Chailles_2.jpg"]},"Consult_chateau_formulaire512b":{"id":"Consult_chateau_formulaire512b","dept":"41","canton":"Montoire sur le Loir","commune":"Montoire sur le Loir","nom":"Challay","type":"Château","periode":"XI-XVI","histoire":"CHALLAY,  L'édifice présente trois grandes périodes de construction. L'ensemble des années 1535-1545 qui comprend les tours et leurs travées avec pilastres superposés, caractéristiques de la Renaissance et l'escalier rampe sur rampe. Des années 1750-1770, datent l'aile du Vieux Chalay, l'aménagement des pièces et l'agrandissement de la façade sud. Le XIXe siècle a repris la façade sud, l'enveloppe du pavillon Est, la façade plaquée sur l'aile du Vieux Chalay, la modification du portail, l'édification de la chapelle, la création de l'orangerie et l'aménagement du parc. Chalay est conforme au type d'édifice dérivant de ceux du roi René. Avec l'introduction de son pavillon étroit réservé à l'escalier à rampes droites, le château s'est affirmé comme un exemple novateur dans les années 1530-1540 en matière d'architecture et dans le domaine de la sculpture dans cette partie du Vendômois.","architecture":"CHALAY Marescot (1758-1832), général du génie des armées de la République et de l'Empire est décédé au château de Chalay. Il ne reste que des ruines du château, il se situe dans l'ancienne commune de Saint-Quentin-lès-Troo. Le château  de Chalay ou château de Montoire-sur-le-Loir et son donjon a été bâti par les premiers  seigneurs de Montoire  à la fin du XIe siècle. Le musée des rencontres ou gare historique retrace l'entrevue de Montoire. Le musée est consacré aux entrevues des 22 et 24 octobre 1940 entre Laval et Hitler puis, entre Pétain et Hitler.","habitants":"seigneurs de Montoire\"","divers":"A montoire sur le Loir le château de Chalay  GPS : 47° 45' 18\" Nord, 0° 51' 52\" Est","gps":"47° 45' 18\" Nord, 0° 51' 52\" Est","images":["../../jctruffet.com/image/image_41/41_Challay_1.jpg","../../jctruffet.com/image/image_41/41_Challay_2.jpg"]},"Consult_chateau_formulaire964c":{"id":"Consult_chateau_formulaire964c","dept":"41","canton":"Chambord","commune":"Huisseau-sur-Cosson","nom":"Chambord","type":"Palais","periode":"XVI-XVII","histoire":"CHAMBORD, François de Valois devient roi de France  sous le nom de François Ier,  en 1519 débuta la construction,  les successeurs de François Ier ne viennent quasiment jamais à Chambord. Si Henri II poursuit les travaux de laile de la chapelle, Charles IX n'y chassera quà de rares occasions et cest Gaston dOrléans qui redonne un peu de vie aux lieux. Exilé par deux fois dans le Comté de Blois par son frère Louis XIII, il y réside souvent entre 1634 et 1660 et en assume linstallation de ses appartements dans laile Royale. Mais la construction nest terminée quavec Louis XIV, qui aime ce lieu prestigieux, au point dy faire huit séjours ponctués de chasses, de ballets et de pièces de théâtre, dont le Bourgeois Gentilhomme, qui fut jouée la première fois au château de Chambord en 1670. Venant avec la cour dès 1668, il fait terminer laile de la chapelle, transformer une partie du premier étage du donjon afin dy aménager une suite royale et surélever lenceinte basse dun étage pour y loger plus de monde. Au XVIIIe siècle, le château se transforme en cadeau royal prestigieux. Stanislas Leszczynski beau-père de Louis XV, attend du château un refuge, suite à lexil auquel son pays la contraint et cest dans ce contexte quil occupe Chambord pendant huit années. En 1748, Maurice de Saxe devient, pour deux ans, le nouvel occupant de Chambord et afin de le récompenser des victoires militaires remportées pour la France, il est promu maréchal et reçoit en 1748, de Louis XV, le titre de gouverneur à vie du domaine. Maurice de Saxe fait aménager les écuries de Jules Hardouin Mansart afin dy placer un haras royal. La mort du maréchal de Saxe en 1750 amène à Chambord son neveu, le comte de Friesen, qui y réside pendant cinq ans.","architecture":"CHAMBORD; à partir de 1784, linstallation à demeure du marquis de Polignac, en tant que gouverneur, maintient un château meublé et de nouveaux aménagements voient le jour dans léventualité dun passage de Louis XVI. A la Révolution, les tergiversations concernant le devenir de Chambord, justifient le fait que la demeure abrite tour à tour des magasins à fourrage, un atelier de fabrication de poudre, une maison darrêt et le siège de la 15e Cohorte de la Légion dHonneur. Après la victoire à la bataille de Wagram en 1809, Napoléon offre Chambord au maréchal Berthier qui nen profite que deux jours, suite à la mise en vente par la veuve de ce dernier, autorisée par Louis XVIII. Une souscription est organisée pour le racheter afin de le remettre à lhéritier de la couronne. Il sagit du duc de Bordeaux, petit-fils de Charles X. Cest lui qui, en 1820, alors quil na pas encore un an, devient le nouveau propriétaire des lieux. Contraint à lexil, il ne découvre son bien quen 1871 à loccasion dun séjour, pendant lequel il rédige le fameux manifeste expliquant les raisons qui lamènent à refuser la couronne. Malgré cet exil, il commence la restauration du château, que ses neveux, les Bourbon Parme, poursuivent intensément de 1881 à 1892 avec, notamment, la réfection de la lanterne du donjon. Propriété  de la famille de Bourbon Parme, depuis 1932,  acquit par l'état Chambord poursuit sans relâche ses restaurations.","habitants":"François Ier\r\n        \"","divers":"Le château de Chambord  à Husseau sur Cosson             GPS : 47° 37' 4,17\" Nord et 1° 30' 53,65\"    Est   -47° 36' 59\" nord, 1° 31' 01\" est","gps":"47° 37' 4,17\" Nord et 1° 30' 53,65\"    Est   -47° 36' 59\" no","images":["../../jctruffet.com/image/image_41/41_Chambord_1.jpg","../../jctruffet.com/image/image_41/41_Chambord_2.jpg","../../jctruffet.com/image/image_41/41_Chambord_3.jpg"]},"Consult_chateau_formulaire7c22":{"id":"Consult_chateau_formulaire7c22","dept":"41","canton":"La Beauce","commune":"Mer","nom":"Chantecaille","type":"Château","periode":"XV-XVI","histoire":"CHANTECAILLE, le nom de Chantecaille apparaît pour la première fois en 1409, et devait dès l'origine être une dépendance du château de Talcy. L'ensemble est construit au XVe siècle pour être une ferme. Au XVIIe siècle, la maison fut agrandie et couverte en ardoises. Le bâtiment central est surélevé, les ouvertures du corps de logis principal et des bâtiments annexes sont modifiées. L'aménagement du jardin et des terrasses datent de cette époque.","architecture":"CHANTECAILLE, date du XVe et XVIIe siècles.  Le bâtiment central  de plan rectangulaire à deux niveaux sur soubassement est surélevé, les ouvertures du corps de logis principal et des constructions annexes sont modifiées. L'aménagement du jardin et des terrasses datent de cette époque. Certains éléments du château de Chantecaille sont protégés (logis, la terrasse, le lavoir, la glacière, la chapelle et la clôture) au titre des M.H. depuis le 20/12/1985. Le château de chantecaille est privé.","habitants":"seigneur local\r\n        \"","divers":"Château de Chantecaille à Mer 47° 41' 57\" Nord et 1° 30' 30\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Chantecaille_1.jpg"]},"Consult_chateau_formulaire0c9b":{"id":"Consult_chateau_formulaire0c9b","dept":"41","canton":"Salbris","commune":"Chaon","nom":"Chaon","type":"Château","periode":"XVI-XVIII","histoire":"deux châteaux à Chaon dont Chaon et l'Hermitage                                                            CHAON,   construit sur une motte, attesté en 1520 ; l'édifice actuel est du XVIIIe siècle, et de la deuxième moitié du XIXe siècle; les communs construits en brique et pan de bois datent des XVIe et XVIIIe siècles. Le château conserve d'anciennes poutres de bois ornementées, ce qui permet de fixer la date de construction du précédent château au XVe siècle. Le château était entouré de douves, son premier seigneur était messire de Lanfernet, écuyer du Roi, seigneur de Villechauve. Le château actuel est composé d'un étage carré et étage de comble, gros-oeuvre en brique, calcaire et pan de bois, surmonté de toit à longs pans et croupe recouverts d'ardoise. Les communs construits en brique et pan de bois, dépendaient sans doute d'un édifice antérieur sur lequel on ne possède aucune indication.","architecture":"L'HERMITAGE, dit de la Forêt  M. A. Rochette propriétaire en 1930, se compose d'un corps de logis central rectangulaire  à trois niveaux couronné de mâchicoulis, toits à quatre pans surmonté d'un clocheton imposant,  lucarne en façade et avant corps d'entrée, l'édifice est prolongé d'une travée de part et autre avec quatre tourelles à trois niveaux couronnée de mâchicoulis chemin de ronde toit en poivrière.","habitants":"Hermitage; M. A. Rochette\r\n        \"","divers":"deux châteaux à Chaon dont Chaon grav_1-2  et  l'Hermitage grav 3-4","gps":"","images":["../../jctruffet.com/image/image_41/41_Chaon_1.jpg","../../jctruffet.com/image/image_41/41_Chaon_2.jpg","../../jctruffet.com/image/image_41/41_Chaon_3.jpg","../../jctruffet.com/image/image_41/41_Chaon_4.jpg"]},"Consult_chateau_formulairec68b":{"id":"Consult_chateau_formulairec68b","dept":"41","canton":"Saint-Aignan","commune":"Châteauvieux","nom":"Chateauvieux_41","type":"Château","periode":"XV-XVI","histoire":"CHATEAUVIEUX,  est formé de deux corps de logis en équerre d'époques différentes, la partie Renaissance, d'une rare élégance, est ornée de fenêtres à meneaux et de lucarnes richement sculptées. Les tours agrémentées de motifs décoratifs, sont des rappels pacifiques des anciens mâchicoulis. Le château qui domine le village occupe la place d'un éperon rocheux, aménagé et barré, peut-être dès l'époque romaine. Au Ve siècle, lors des invasions des Wisigoths, cette enceinte est déjà considérée vieille et elle est appelée \"castrum vetus\" (Château-vieux). Attaquée par les Anglo-Navarrais en 1350, elle est détruite en 1363 afin que les ennemis n'y reviennent pas. Vers 1390, Louis Rouy achète les ruines et construit un nouveau château: la gentilhommière et les communs. En 1550, le domaine appartient à Pierre de Voisines, seigneur de Lalleu. Il construit un nouveau corps de logis indépendant, orienté à angle droit avec le précédent. C'est cette aile Renaissance bien reconnaissable qui domine le village.  Vers 1650, un nouveau pavillon indépendant est édifié près de l'église. En 1740  le propriétaire, Pierre des Forges construit un corps de logis reliant la gentilhommière à l'ensemble du château. Après la Révolution, Mme Cambre rejoint sa demeure et lègue son domaine à sa nièce Augustine, mariée à un avocat Royer Collard, puis professeur d'Histoire et de Philosophie à la Sorbonne et admis à l'Académie Française en 1827.","architecture":"CHATEAUVIEUX,  il entreprend d'importants travaux de rénovation et il plante le parc d'arbres rares. Sa fille épouse Gabriel Antral, professeur à la faculté de médecine et habite le château. Leur fils Paul Antral devient vice-président du conseil d'État. Mais c'est surtout son épouse qui apporte la dernière note à l'édifice en créant terrasses et galerie et en édifiant, en 1914, une grosse tour dans un style néo-Renaissance qui ne dépare pas l'ensemble. A sa mort en 1925, elle lègue le domaine à une société Philantropique de Paris. En 1929, les religieuses de N-D de la Providence de Blois ont mission douvrir une maison de repos et dy recueillir la grande famille des cheminots.Létablissement se transforme en maison de retraite médicalisée en 1998, grâce au partenariat établi avec la caisse régionale dassurance maladie du centre, dans la chapelle du château, qui date du XVe siècle, se trouve une magnifique statue de pierre du XVIe siècle. Elle est certainement une des plus belles statues de France par lexpression de son visage rayonnant damour maternel et par ses formes douces et apaisantes. Cette chapelle était destinée à servir de nécropole aux corps des défunts nobles hommes et défuntes nobles dames de la seigneurie. A cette époque, elle était entièrement fermée de quatre murs, cest au siècle suivant que le Sieur Jehan de Voysines fit ouvrir une large baie donnant sur le choeur de léglise.","habitants":"Famille de Louis Rouy\r\n        \"","divers":"A saint-Aignan; Chateauvieux                  45° 49' 44\" Nord et 6° 12' 12\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Chateauvieux_41_1.jpg","../../jctruffet.com/image/image_41/41_Chateauvieux_41_2.jpg","../../jctruffet.com/image/image_41/41_Chateauvieux_41_3.jpg"]},"Consult_chateau_formulaire6cfd":{"id":"Consult_chateau_formulaire6cfd","dept":"41","canton":"Blois","commune":"Chaumont sur Loire","nom":"Chaumont_Loire","type":"Forteresse","periode":"XV","histoire":"CHAUMONT, au Xe siècle, Eudes 1er, comte de Blois, bâtit une forteresse pour protéger la ville de Blois des attaques incessantes de Foulques Néra, Comte d'Anjou. Le chevalier normand Guelduin reçut Chaumont et fit consolider la forteresse. Sa petite-nièce, Denise de Fougères, ayant épousé Sulpice d'Amboise, le château passe dans la famille d'Amboise pour cinq siècles. Louis XI fit brûler et raser le château de Chaumont en 1465, pour punir Pierre d'Amboise de s'être révolté contre le pouvoir royal lors de la Ligue du bien public. Peu après, ses terres furent restituées. Celui-ci, puis son fils, Charles 1er d'Amboise entreprirent sa reconstruction de 1465 à 1475, ils poursuivirent les travaux par l'aile ouest, la tour d'Amboise et la première travée contiguë de l'aile Sud dans le style gothique et défensif du XVe siècle avec un chemin de ronde, des mâchicoulis et des douves sèches entourant le château.. Le château a désormais la forme d'un U. Devant le pont-levis se trouve l'aile Sud à gauche, l'aile Est à droite qui encadre le châtelet d'entrée et que cantonnent deux tours. La chapelle se trouve à l'extrémité de l'aile Est, face à la Loire. En se tenant face à la Loire dans la cour intérieure du château, on localise l'aile Ouest à droite, flanquée par la tour d'Amboise au Sud-Ouest à l'extérieur, face au parc. Sur la gauche, s'élève l'aile Est cantonnée par la tour St-Nicolas à l'angle Nord Est, face au parc.                                                                                    A l'Est à Rilly  château de HAUTE BORDE, la location para-hôtelière professionnelle destinée à toute personne physique ou aux entreprises pour des courts, moyens et longs séjours.                                                                                            RILLY, propriétaire en 1930 : marquise de Chauvelin, aujourd'hui foyer pour adultes handicapès.","architecture":"CHAUMONT, de 1498 à 1510, Charles II de Chaumont d'Amboise aidé de son oncle le cardinal Georges d'Amboise, poursuivit la reconstruction dans un style déjà marqué par la Renaissance, tout en conservant la même allure générale fortifiée; l'aile sud, le châtelet d'entrée, l'aile Est accolé à l'aile sud. L'introduction des motifs italianisants sur l'escalier monumental ainsi que sur le châtelet est particulièrement précoce. La chapelle se trouve à l'extrémité de l'aile Est, face à la Loire. Devenue veuve en 1559, Catherine de Médicis achète Chaumont en 1560, contraignant Diane de Poitiers à l'accepter en échange du château de Chenonceau. La favorite de Henri II édifie le chemin de ronde à mâchicoulis du châtelet d'entrée et de l'aile orientale restés inachevés en 1510, en y apposant ses chiffres et ses emblèmes, d'entrelacés, arcs et carquois, cors de chasse, delta et croissants. Avec la destruction de l'aile Nord en 1739 par Nicolas Berthin de Vauguyen, maître des Requêtes au Parlement de Paris, le château perd en partie son allure de château fort et devient demeure d'agrément.En 1750, Jacques Donatien Le Ray, futur intendant des Invalides, achète Chaumont, il installe en 1770 une verrerie et une manufacture de médaillons de terre.  En 1810, madame de Staël y séjourne, entourée d'une véritable cour d'opposants à Napoléon, parmi lesquels figurent alors Benjamin Constant et madame Récamier. Le comte d'Aramon l'achète en 1883 et effectue d'importantes réparations, poursuivi par le vicomte de Walsh à partir de 1847. En 1875, Marie-Charlotte Say petite-fille du financier et sucrier Louis Say, acquié Chaumont. Elle épouse la même année le prince de Broglie qui redonne au château un éclat sans précédent, les époux font appel à l'architecte Paul Ernest Sanson qui restaure le château. En 1884, le prince de Broglie  vend le château de Chaumont en 1938 à l'Etat.","habitants":"famille d'Amboise           Catherine de Médicis \r\n        \r\n        \r\n        \"","divers":"Deux châteaux dans cet article Chaumont grav 1-2-3-4-5 et celui de Haute-Borde grav-6-7 à Rilly         47° 28' 45\" Nord et 1° 10' 54\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Chaumont_Loire_1.jpg","../../jctruffet.com/image/image_41/41_Chaumont_Loire_2.jpg","../../jctruffet.com/image/image_41/41_Chaumont_Loire_3.jpg","../../jctruffet.com/image/image_41/41_Chaumont_Loire_4.jpg","../../jctruffet.com/image/image_41/41_Chaumont_Loire_5.jpg","../../jctruffet.com/image/image_41/41_Chaumont_Loire_6.jpg"]},"Consult_chateau_formulaire9ec4":{"id":"Consult_chateau_formulaire9ec4","dept":"41","canton":"Salbris","commune":"Chaumont sur Tharonne","nom":"Chaumont_Tharonne","type":"Château","periode":"XVII-XIX","histoire":"Deux châteaux à Chaumont sur Tharonne  dont la Motte et Mousseau.                                                                                                                                       La MOTTE, depuis les premières strates médiévales jusqu'aux dernières des XVIIIe et XIXe siècles mises en place par la famille Gaullier, qui a alimenté en maires la commune de Chaumont sur Tharonne,  édifice entouré de fossés possession de Hervé Couet en 1424; augmenté d'une grange et d'une étable, possession de Jacques de Coudray en 1628; reconstruit en 1763, corps de bâtiment à deux ailes et quatre pavillons pour Henry Gaullier;  une lucarne porte la date 1769.   inscription par arrêté du 27 octobre 2000.                                                                                                                             Château du MOUSSEAU, du XIXe siècle,","architecture":"La MOTTE, situé à Chaumont sur Tharonne,  conserve les traces de son évolution, suivant les principaux cycles de transformation des châteaux solognots. Avec ses dépendances et l'ensemble du domaine, ce manoir reste un témoin rare et précieux d'une demeure seigneuriale représentatif du patrimoine castral de la Sologne. Depuis les premières strates médiévales jusqu'aux dernières des XVIIIe et XIXe siècles mises en place par la famille Gaullier, qui a alimenté en maires la commune de Chaumont sur Tharonne, l'évolution de l'ensemble de ce domaine  peut s'effectuer à travers la lecture des vestiges des bâtiments et du paysage, très lisibles sur les photographies aériennes. Le lieu castral de la Motte garde une symbolique patrimoniale forte avec ses vestiges archéologiques remontant au Moyen-Age, et son petit manoir du XIVe-XVe siècles reconstruit au XVIIIe sur sa plate forme fossoyée, et l'ensemble de ses dépendances.","habitants":"Motte famille Gaullier\r\n        \r\n        \"","divers":"Deux châteaux à Chaumont sur Tharonne  dont la Motte grav-1-2-3, Mousseau grav- 4, Brouchetauld grav-5 , Drelas grav 6.                                      . Motte_47° 36' 50\" nord, 1° 53' 41\" est","gps":"","images":["../../jctruffet.com/image/image_41/41_Chaumont_Tharonne_1.jpg","../../jctruffet.com/image/im
