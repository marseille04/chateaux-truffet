age_41/41_Chaumont_Tharonne_2.jpg","../../jctruffet.com/image/image_41/41_Chaumont_Tharonne_3.jpg","../../jctruffet.com/image/image_41/41_Chaumont_Tharonne_4.jpg","../../jctruffet.com/image/image_41/41_Chaumont_Tharonne_5.jpg","../../jctruffet.com/image/image_41/41_Chaumont_Tharonne_6.jpg"]},"Consult_chateau_formulaire916d":{"id":"Consult_chateau_formulaire916d","dept":"41","canton":"Vineuil","commune":"Cheverny","nom":"Cheverny","type":"Château","periode":"XVII","histoire":"Trois château à Cheverny celui de Cheverny et du Breuil. et de Troussay ( voir article).                                                                                               CHEVERNY, vers 1492 Jean Hurault acquiert la terre et le château fut construit entre 1626 et 1635 par Henri Hurault de Cheverny, Lieutenant Général des Armées du Roi de France,  en 1510  tué à Naples sa veuve vend en 1551 le domaine à Diane de Poitiers.  En 1565 les  fils Raoul Hurault Jacques seigneur de Vibraye et son frère Philippe garde des sceaux de Henri III rachètent le domaine en 1596 il le cède à son fils Henri, en 1590 Henri Hurault avait épousé  Françoise Chabot fille du comte de Charny agé de onze ans après avoir contraint son épouse adultère au suicide le comte condamné à l'exil épouse en seconde noce en 1604, Marguerite Gaillard de la Morinière, comme à Chenonceau et à Azay le Rideau, qui dirigea la construction, confiant la réalisation à l'architecte Jacques Bougier. La décoration a été achevée par la fille d'Henri Hurault et de Marguerite, la marquise de Montglas, dans les années 1650. Elle a été confiée au sculpteur et menuisier Hevras Hammerber et au peintre Jean Mosnier (1600-1656), tous deux originaires de Blois. en 1755 le château passe aux mains de diffèrents propriétaires dont Henri-Claude d'Harcourt, passe ensuite à Jean Nicolas Dufort achète avec les terres  les titres de comte de Cheverny. En 1825 Anne-Denis de Vibraye  descendant de Raoul Hurault  achète cheverny, dont le propriétaire actuel, Charles-Antoine de Vibraye marquis de Vibraye est le descendant.                                                                              BREUIL transformé en hôtel restaurant par la famille Tétenoire.","architecture":"CHEVERNY, sa construction débuta  en 1510 par un château mi-forteresse mi-plaisance et fut achevée en 1634,  est de style Renaissance  est classé aux M.H. depuis 2010, est devenu un Musée ouvert au public, de part et autre d'un étroit pavillon central s'étendent deux ailes terminées par deux gros pavillons coiffés de dômes à lanternon, nombreuses lucarnes et oeils-de-boeuf donnent à la façade principale relief et animation.  Un majestueux escalier de pierre à montée droite qui occupe le corps central, délicatement orné de sculptures représentant des fruits, des fleurs, des armes et les symboles des arts, mène aux appartements. A signaler dans la salle des Gardes et la chambre du Roi, la riche décoration des panneaux oeuvre de Jean Mosnier et une série de cinq magnifiques tapisseries, d'après des cartons de Simon Vouet, représentant les travaux d'Ulysse, celles-ci proviennent de la manufacture de Paris qui est antérieure à celle des Gobelins. Le jardin à la française a été reconstitué. L'allée principale qui fait face au château est longue de six kilomètres. Il est célèbre pour avoir servi de modèle à Hergé (Tintin), si vous effacez les ailes latérales de la demeure, vous serez transporté des bords de Loire jusqu'à Moulinsart, le château du Capitaine Haddock.","habitants":"Famille de Henri Hurault de Cheverny\r\n        \"","divers":"à Cheverny celui de Cheverny grav 6-7-8  et du Breuil grav 1 à 5.  47° 30' 01\" Nord et 1° 27' 29\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Cheverny_1.jpg","../../jctruffet.com/image/image_41/41_Cheverny_2.jpg","../../jctruffet.com/image/image_41/41_Cheverny_3.jpg","../../jctruffet.com/image/image_41/41_Cheverny_4.jpg","../../jctruffet.com/image/image_41/41_Cheverny_5.jpg","../../jctruffet.com/image/image_41/41_Cheverny_6.jpg","../../jctruffet.com/image/image_41/41_Cheverny_7.jpg","../../jctruffet.com/image/image_41/41_Cheverny_8.jpg"]},"Consult_chateau_formulaired4d0":{"id":"Consult_chateau_formulaired4d0","dept":"41","canton":"Montrichard","commune":"Chissay en Touraine","nom":"Chissay_Touraine","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux à Chissay en Touraine dont celui de Chissay et la Ménaudière.                                                                                                   CHISSAY, cet ancien château-fort a été construit sous Charles VII pour le trésorier de France Pierre Bérard, époux d'Anne de Ronsard.  Demeure royale qui reçut Charles VII et Louis XI ont séjourné ici, de nombreux actes royaux en font foi. Le 19 avril 1543, Bérard vend le domaine à Philibert Babou, seigneur de la Bourdaisière. L'édifice passe ensuite dans les mains du duc de Choiseul jusqu'à la veille de la Révolution. Choiseul cède le château à son ami Jean-Baptiste du Buc, homme de mérite et de belle fortune, qui fera connaissance avec les prisons révolutionnaires. A sa mort en 1795, Chissay est la propriété de Jacques Gaigneron, comte de Marolles allié par sa mère à l'impératrice Joséphine. Pendant plus d'un demi siècle, Gaigneron reste propriétaire de Chissay et maire de la commune. Successivement détenu par le baron et la baronne de Gartempe, et ensuite par leurs descendants les Costa de Beauregard. Les membres de cette famille accueillent, en Juin 1940, M. Paul Raynaud, chef du gouvernement, qui y installe son Q.G. Dans le grand salon se tiennent des conférences politiques et militaires. Chissay reçoit le général Weygand, l'ambassadeur de Grande-Bretagne, des ministres qui restent en liaison avec le Président résidant à 30 km de là, au château de Cangé. Le 12 Juin, le Général de Gaulle arrive à Chissay pour présenter à Paul Raynaud son projet de réduit breton et Chissay venait d'être témoin de la chute de la IIIe République. Ce jour-là, l'avenir de la France s'est joué derrière les murs épais du château. Aujourd'hui transformé en hôtel-restaurant par Philippe de Savary.","architecture":"CHISSAY,  les bâtiments rénovés en 1986 résument toute l'architecture tourangelle, le château est le séjour idéal pour découvrir le merveilleux Val de Loire. Les diners sont organisés dans la salle des gardes ou dans la salle gothique,  les chambres et les appartements confortables et fonctionnels, sont meublés dans le style du XIXe. Du 10 au 13 juin 1940, face à l'avancée allemande, le gouvernement français se replia sur Tours et les châteaux environnants. Le président du Conseil Paul Reynaud et son cabinet s'installèrent au château de Chissay.                                             MENAUDIERE, sa construction date du XVe au XVIe siècle et du XIXe siècle. Paul Reynaud, ancien président du Conseil, s'y replia avec son administration en juin 1940. Autour de 1443, est bâti un château dont il reste la porte fortifiée occidentale et les courtines. Au début du XVIe siècle est construit l'édifice actuel, ainsi que des courtines adjacentes au bâtiment de servitudes, le long de la porte fortifiée. A la fin du XVIe siècle, deux pavillons carrés sont construits aux angles ouest et sud et les douves sont refaites. François Gaillard, seigneur de la Menaudière, en devient propriétaire vers 1650, et fait doubler le château dans le même style. En 1898 construction de l'aile nord-ouest. Les façades Est dominent l'ancien étang qui alimentait les douves en eau et qui a été en partie asséché et converti en potager. Hôtel-restaurant,  les chambres sarticulent sur trois corps de bâtiments situés autour de la cour intérieure. Éléments protégés MH : la porte fortifiée, les deux pavillons d'angle de l'enceinte : inscription par arrêté du 30 juillet 1963.","habitants":"Chissay Famille de Jacques Gaigneron                          Menaudière,Famille de François Gaillard\r\n        \"","divers":"à Chissay en Touraine celui de Chissay grav de1 à 5   et la Ménaudière grav 6-7 .47° 20' 17\" Nord et 1° 08' 02\" Est Menaudière47° 21' 16\" nord, 1° 09' 25\" est","gps":"","images":["../../jctruffet.com/image/image_41/41_Chissay_Touraine_1.jpg","../../jctruffet.com/image/image_41/41_Chissay_Touraine_2.jpg","../../jctruffet.com/image/image_41/41_Chissay_Touraine_3.jpg","../../jctruffet.com/image/image_41/41_Chissay_Touraine_4.jpg","../../jctruffet.com/image/image_41/41_Chissay_Touraine_5.jpg","../../jctruffet.com/image/image_41/41_Chissay_Touraine_6.jpg","../../jctruffet.com/image/image_41/41_Chissay_Touraine_7.jpg"]},"Consult_chateau_formulaire679d":{"id":"Consult_chateau_formulaire679d","dept":"41","canton":"Saint-Aignan","commune":"Chémery-Mehers","nom":"Chémery","type":"Château","periode":"XV","histoire":"A deux km au sud-ouest  à Mehers le manoir de Beauregard. CHEMERY,  date du XVIe siècle construit par les Husson seigneurs de Saint-Aignan, la demeure était rattachée jusquen 1970 à la terre de Saint-Aignan qui lavait converti en ferme en 1729. Propriété de Regnault de Chemery ( 1236 ), il fut aussi celle de René de Beauvillier Comte de St Aignant. Les propriétaires vous initieront aux subtilités de larchitecture du bâtiment. le château est un exemple de sauvegarde du patrimoine qui passionnera autant le néophyte que lamateur darchitecture.Il est en cours de restauration depuis 1981. Cette ancienne propriété a appartenu à Alain Souchon (Chanteur français) jusqu'en 1980. Aujourd'hui à monsieur Fontaine  BEAUREGARD a été construit dans les premières années du XVIe siècle. Le bâtiment principal, de plan rectangulaire, contient deux grandes salles à chaque étage, soit six chambres. Chacune des salles est éclairée par une fenêtre à meneau et croisillon. Ces fenêtres étaient surmontées par une lucarne en pierre, à meneaux, et se terminant par un grand gâble flanqué de chaque côté par une colonne engagée, à pinacle, gâble et pinacles sont décorés de crochets et de fleurons de feuillages. Au centre de la façade sud, un escalier en vis est placé dans une tour saillante octogonale à l'extérieur, circulaire à l'intérieur. La porte est surmontée d'une accolade, ornée de crochets et d'un fleuron sculptés. Au dessus, deux mâchicoulis servaient à sa défense. Le centre de la façade nord est occupé par une tour circulaire. Au niveau du deuxième étage, à chacun des angles de la demeure, une échauguette sur encorbellement permettait la surveillance des abords. .","architecture":"CHEMERY   Au sud de Blois, sur la route de Contres à Selles-sur-Cher, se dresse sur lemplacement dune forteresse du XIIe siècle, un château du XVe siècle et remanié au XVIe siècle.   Entourés de douves, les bâtiments forment une cour, le château occupant un côté et les communs lautre. Il comporte plusieurs ailes et se trouve intégralement entouré de douves. Le château de Chémery est un mélange darchitecture médiévale et renaissance, de rudesse et de raffinement. Le château médiéval se compose d'une cour presque carrée, entourée de douves sur trois côtés. Le pont-levis aboutit à une porte fortifiée, défendue par des mâchicoulis et une tourelle en encorbellement rajoutée au XVe siècle. En pénétrant dans la cour, sur la gauche, se trouvent les restes des constructions du XIIIe siècle, le nouveau  logis seigneurial s'ouvre par de grande fenêtres à meneaux qui s'organisent selon un axe vertical. il est flanqué d'une vieille tour d'angle et de l'antique châtelet d'entrée qui a  conservé avec ses corbeaux le châtelet d'entrée un air médiéval. Un rez-de-chaussée servant de grande salle à manger avec une cheminée conservant des traces de peinture. L'accès au premier étage se fait par un escalier contenu dans une tour. A droite de l'entrée, reliées par une galerie de bois aux bâtiments du XIIIe siècle, se trouvent les constructions plus importantes du XVe siècle, avec remaniements au XVIe siècle.","habitants":"Famille des Husson                                                                    Famille Alain Souchon \r\n        \r\n        \"","divers":"château de Chémery grav1-2-3-4-5 à Mehers le manoir de Beauregard grav 6-7.  : 47° 20' 43\" Nord 1° 28' 48\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Ch%c3%a9mery_1.jpg","../../jctruffet.com/image/image_41/41_Ch%c3%a9mery_2.jpg","../../jctruffet.com/image/image_41/41_Ch%c3%a9mery_3.jpg","../../jctruffet.com/image/image_41/41_Ch%c3%a9mery_4.jpg","../../jctruffet.com/image/image_41/41_Ch%c3%a9mery_5.jpg","../../jctruffet.com/image/image_41/41_Ch%c3%a9mery_6.jpg","../../jctruffet.com/image/image_41/41_Ch%c3%a9mery_7.jpg"]},"Consult_chateau_formulaire9615":{"id":"Consult_chateau_formulaire9615","dept":"41","canton":"Montrichard","commune":"Contres","nom":"Contres","type":"Château","periode":"XVIII-","histoire":"deux châteaux à Contres dont le château  de Contres (construit dans les années 1800). la Gondelaine.                                                                    CONTRES, le manoir de Contres vous accueille dans un manoir datant du XIXe siècle de plan carré sur soubassement à deux niveaux et lucarnes sur combles, avant corps d'entrée légèrement saillant et tourelle sur flancs à trois niveaux à  toits extrêmement effilés, situé dans un parc de 1 hectare doté d'un étang et d'arbres de 200 ans. Il propose une terrasse bien exposée ainsi que des chambres qui sont élégamment décorées, elles offrent une vue sur le parc, elles présentent des poutres apparentes et des couleurs neutres.  Vous pourrez savourer une cuisine et des vins locaux dans le restaurant de l'hôtel.","architecture":"GONDELAINE  ce château de plan en U  par deux ailes en retrait terminant par des frontons à deux niveaux et lucarnes sur combles.  accolée au corps de logis central côté cour plein cintre une tourelle  polygonale dépassant l'ensemble toit à l'impériale à l'opposé  sur façade côté parc deux tours rondes inférieure à l'édifice qui lui et à deux niveaux à six travées et lucarne sur toit en croupe.  Edouard-François-Jean de Hautecloque: En 1871, au moment de l'invasion prussienne, il fit partie du corps des éclaireurs à cheval de Loir et Cher. Il habitait au château de la Gondelaine, commune de Contres, dont il avait hérité de son oncle, M. Edmond de Bellejame, il fut nommé conseiller municipal municipal de cette commune en 1874, il meurt à Blois le 14 juin 1888, il fut inhumé près de son oncle  M. de Bellejame, dans le cimetière de Contres. le peintre, cinéaste et décorateur, Jules de Froberville épousa Sidonie de Hauteclocque. Sa belle-mère était la propriétaire de la Gondelaine près de Contres.  Mr et Mme Lecoq-Vallon propriétaires en 1930.","habitants":"Gandelaine famille de Mr et Mme Lecoq-Vallon \r\n        \"","divers":"Trois châteaux à Contres dont le château  de Contres grav 1-2, la Gondelaine grav 3-4,                                               Contres : 47° 25' 11\" Nord, 1° 25' 43\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Contres_1.jpg","../../jctruffet.com/image/image_41/41_Contres_2.jpg","../../jctruffet.com/image/image_41/41_Contres_3.jpg","../../jctruffet.com/image/image_41/41_Contres_4.jpg"]},"Consult_chateau_formulairec559":{"id":"Consult_chateau_formulairec559","dept":"41","canton":"Vineuil","commune":"Cormeray-Chitenay","nom":"Cormeray_Chitenay","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux  à Cormeray- Chitenay celui de Coque  et Chitenay.                                                                                                                COQUE  Le château de la Coque est plus proche de Cellettes que de Cormeray, qui est sa commune d'appartenance, est devenu un gîte rural, qui vous propose ses chambres d'hôtes dans un cadre champêtre très agréable.","architecture":"CHITENAY, construit vers 1750, hormis l'aile secondaire qui lui est antérieure mais fut remaniée lors de la construction du bâtiment principal, avec trois étages et corps de logis central à deux niveaux  avec série de lucarnes sur comble brisé, fut construit par un  financier de Blois, Gui-Guillaume Mahy qui se ruina dans cette construction. Acquise  sous la monarchie  de juillet  par le Marquis de Guilhem toujours dans cette famille. La toiture est dominée par un clocheton moderne. Une aile en retour d'équerre, vers le nord, date du XVIIe siècle et a été remaniée au XVIIIe siècle. A l'intérieur, décoration du salon, tapisserie murale, et une femme assise avec un chien dans une galerie. Éléments protégés MH : l'ensemble des façades et des toitures du château et des communs : inscription par arrêté du 13 septembre 1960.","habitants":"Chitenay: Famille Gui-Guillaume Mahy\r\n        \"","divers":"à Cormeray- Chitenay celui de Coque grav-3  et Chitenay grav 1-2.  Chitenay   47° 29' 37\" nord, 1° 22' 41\" est -  47° 29' 37\" nord, 1° 22' 39\" Est        Coque  : 47° 29' 28\" Nord et 1° 24' 26\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Cormeray_Chitenay_1.jpg","../../jctruffet.com/image/image_41/41_Cormeray_Chitenay_2.jpg","../../jctruffet.com/image/image_41/41_Cormeray_Chitenay_3.jpg"]},"Consult_chateau_formulaire70dc":{"id":"Consult_chateau_formulaire70dc","dept":"41","canton":"Vineuil","commune":"Cheverny","nom":"Cour_Cheverny","type":"Château","periode":"XV-XVII","histoire":"Six  châteaux à découvrir à Cour-Cheverny : le Breuil, de Sérigny, Beaumont, Chantreuil,  les Murblins, la Sistière, la Taurie et Vivier                                                                                                                                 VIVIER,  la construction date du XVe siècle. Le charmant Manoir est composé d'un bâtiment long, flanqué au Nord d'une tour carrée, plus haute d'un étage, percée d'ouvertures du XVe siècle. Au Sud, à distance du logis, se trouvent 2 tours circulaires percées de meurtrières, qui servaient d'angles et défendaient le mur et l'enceinte entourée de fossés. Le manoir est inscrit partiellement aux M.H. en 1971. Un commun est situé à l'Est.  C'est un gîte d'hôtes.                                                                                                             SERIGNY, M et Mme Herbelot furent les propriétaires en 1930.                                                                                  BEAUMONT, est une vaste demeure Vous serez chez vous dans toute la propriété, tout en étant déchargés des tâches d'entretien. Tout a été conçu pour rendre votre séjour agréable et profiter des nombreuses activités toutes proches : détente assurée pour grands et petits ! Une piscine dans le parc de 10 hectares saura vous rafraîchir aux beaux jours. Découvrir toute la richesse du patrimoine de la « Vallée des Rois de France » en empruntant la voie cyclable qui passe aux portes du château, simmerger dans la vie de la cour de la Renaissance en participant à une chasse à courre. Des activités culturelles et sportives parmi tant dautres, que vous pourrez pratiquer à partir de Beaumont.                                                                           MUBLINS   pas d'information historique.","architecture":"BREUIL;  date du XVe siècle est située à lextrémité de laile jouxtant la partie principale de lédifice et bordant le fossé encore existant. De ce côté se trouve lancienne entrée de la cour dhonneur. Il sagissait peut-être, comme à Cheverny et à Troussay, à lépoque de leur acquisition, dun simple manoir. En effet, le manoir de Troussay fut construit par Robert de Bugy en 1450  le domaine reste la propriété de la famille de Bugy jusquau XVIIIe siècle.  En mai 1504, soit seulement 50 ans plus tard, Jacques Hurault achète la terre de Cheverny sur laquelle est édifié un manoir (ce nest quen 1510 que Raoul Hurault obtient lautorisation du roi dédifier un château défensif : le premier château de Cheverny. La terre de Cheverny restera dans le giron de la famille Hurault jusquau milieu du XVIIe siècle,  pour y revenir à partir de 1825). (2) Pour le château du Breuil, sachant quune partie date du XVe siècle, à une époque contemporaine de Cheverny et de Troussay, au début du XXIe siècle, il est, pour la partie principale, un pur produit des XVIIe et XVIIIe siècle. Les châteaux construits ou reconstruits à cette époque sont des châteaux dagrément qui ont perdu leur fonction défensive. Le titre de propriété du comte Henri de la Salle daté de 1901- de 1968 à 1985 : le comte de Boussac  - de 1985 à 2003 : les époux Tête Noire (hôtel) ; de 2003 à 2018 : Bernard Gattoliat.                                                                                            SISTIERE, Propriétaire en 1930 M et Mme Manset","habitants":"Seigneurs locaux                                                                        Breuil; famille de Bugy \r\n        \"","divers":"à Cour-Cheverny : le Breuil grav-6, de Sérigny grav-7, Beaumont   grav-2-3,de Bordes grav 4-5, Chantreuil,  les Murblins, la Sistière grav-8, la Taurie et Vivier grav-9 .                                                    Mublin     47° 30' 37\" Nord, 1° 27' 25\" Est                                                         Taurie   47° 30' 37\" Nord, 1° 27' 25\" Est                                                              SErignie      47° 30' 37\" Nord, 1° 27' 25\" Est                                             Sistiere  : 47° 30' 37\" Nord, 1° 27' 25\" Est                                                                                Vivier  47° 30' 37\" Nord, 1° 27' 25\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Cour_Cheverny_1.jpg","../../jctruffet.com/image/image_41/41_Cour_Cheverny_2.jpg","../../jctruffet.com/image/image_41/41_Cour_Cheverny_3.jpg","../../jctruffet.com/image/image_41/41_Cour_Cheverny_4.jpg","../../jctruffet.com/image/image_41/41_Cour_Cheverny_5.jpg","../../jctruffet.com/image/image_41/41_Cour_Cheverny_6.jpg","../../jctruffet.com/image/image_41/41_Cour_Cheverny_7.jpg","../../jctruffet.com/image/image_41/41_Cour_Cheverny_8.jpg","../../jctruffet.com/image/image_41/41_Cour_Cheverny_9.jpg"]},"Consult_chateau_formulaired9cc":{"id":"Consult_chateau_formulaired9cc","dept":"41","canton":"Ouzouer le Marché","commune":"Cour sur Loire","nom":"Cour_sur_Loire","type":"Château","periode":"XV","histoire":"COUR-SUR-LOIRE, les bâtiments actuels datent, dans leur majeure partie, de la fin du XVe siècle. Depuis cette époque, 515 ans se sont écoulés durant lesquels le château a appartenu principalement à deux familles : les Hurault, il fut construit pour Jacques Hurault, trésorier de France sous Louis XII de 1492 à 1647  et les Flers le marquis de Flers de l'académie française et leurs descendants, depuis 1829. Viennent ensuite les Charon, (1647-1760), les Poisson (1760-1794), et les Fleury, (1798-1822). Le record de brièveté est détenu par le dernier secrétaire perpétuel de l'Académie française de l'Ancien Régime, Jean-François Marmontel (1723-1799). Il a possédé le domaine de Cour 24 heures, et seulement en option.  Propriété de monsieur  de Monicault et de madame Laurent du Buit.","architecture":"COUR-sur-LOIRE, le bâtiment présente, sur sa façade nord-ouest, une tour polygonale contenant une vis de pierre, ouverte par une porte surmontée d'une accolade à crochets et fleurons, accostée de pinacles. Le bâtiment fut quelques années plus tard, prolongé au nord -Est par un édifice de même élévation, avec tourelle à son angle nord, et du côté sud-ouest par un pavillon formant une courte aile en retour, avec une tour carrée à son angle sud. Vers 1840-1850, un bâtiment prolonge le château au sud-ouest, accompagné de tourelles. L'ancien logis est entouré d'un jardin paysager constitué dès 1829. Les bâtiments de communs disparaissent pour la plupart, excepté la maison du jardinier, d'autres apparaissent comme la chapelle de style troubadour, consacrée en 1842.    A conservé de hautes fenêtres à meneaux et une tour. Le monument fait lobjet dune inscription au titre des M.H.depuis le 10 octobre 1961.","habitants":"Famille de Jacques Hurault\r\n        \"","divers":"Cour sur Loire  47° 39' 05\" nord, 1° 25' 28\" est","gps":"","images":["../../jctruffet.com/image/image_41/41_Cour_sur_Loire_1.jpg","../../jctruffet.com/image/image_41/41_Cour_sur_Loire_2.jpg","../../jctruffet.com/image/image_41/41_Cour_sur_Loire_3.jpg","../../jctruffet.com/image/image_41/41_Cour_sur_Loire_4.jpg"]},"Consult_chateau_formulaire4ca2":{"id":"Consult_chateau_formulaire4ca2","dept":"41","canton":"Selles sur Cher","commune":"Châtres sur cher","nom":"Douy","type":"Château","periode":"XVIII-","histoire":"DOUY, le fil de l'histoire du château a été déroulé depuis 1505, année mentionnée sur un acte de vente du domaine à Pierre de Chéry, seigneur écuyer de Saint-Aignan-en-Noyers en pays bourbonnais. La famille des Leclerc de Douy y demeura jusqu'en 1802 époque à laquelle il fut vendu au financier Ouvrard. En 1815, Jérôme  Bonaparte s'y cacha quelques jours. Ses propriétaires ont changé régulièrement jusqu'à 1892, année à laquelle l'ancêtre de la famille La Rochefoucauld s'installe dans le lieu. Henri de La Rochefoucauld épouse la fille du baron Célian Sébastien Goury du Roslan,  maire de Châtres,  de 1902  à 1929. Leur fils Aymar épouse Claude Normant de Romorantin, et sera lui aussi maire du village de 1964  à  1977. Aujourd'hui, c'est l'un de leurs trois enfants Patrice qui a la lourde tâche de conserver le patrimoine.","architecture":"DOUY, au XVIe siècle, déclaration des héritages du lieu de Dhouy avec mention \"d'un grand corps de logis orquel y a troys chambres en deux desquelles y a chemynée et ung four basty a muraille\". château édifié en 1701 et chapelle attestée fin du XVIIe siècle ; logement dépendance nord vestiges du XVIe siècle ; granges fin XVIIIe ou début XIXe siècle; château rehaussé d'un étage en 1892. La façade appareillée en briques est précédée de deux pavillons latéraux : chapelle à gauche, logement à droite.  Selon des archives privées : le 08-11-1702, bail de la métairie de la Bernaudière par Jacques Leclerc, seigneur de Douy. Le 14 juin 1760, état des réparations de maçonnerie et couvertures à faire dans les métairies et locatures de la terre de Douy, vues et estimées par le soussigné François Bergot.","habitants":"famille de La Rochefoucauld \r\n        \r\n        \r\n        \r\n        \"","divers":"A Chartres sur Cher le château de Douy","gps":"","images":["../../jctruffet.com/image/image_41/41_Douy_1.jpg","../../jctruffet.com/image/image_41/41_Douy_2.jpg"]},"Consult_chateau_formulairef7e1":{"id":"Consult_chateau_formulairef7e1","dept":"41","canton":"Montoire sur le Loir","commune":"Les Hayes","nom":"Drouilly","type":"Château","periode":"XV-XVII","histoire":"DROUILLY, en 1634, la terre et seigneurie des Hayes fut achetée par le duc César de Vendôme qui la donna aussitôt à son serviteur et ami Claude du Bellay, seigneur de Drouilly en Brie. Cette branche des du Bellay se perpétua longtemps dans cette propriété. En 1708, François du Bellay, contraint de vendre sa terre de Drouilly, obtint du duc de Vendôme l'autorisation de donner à la seigneurie des Hayes le nom de Drouilly que sa famille portait depuis deux cents ans. Mais seul le château changea de nom; le village conserva le château dans sa forme actuelle fut reconstruit par François du Bellay au début du XVIIe siècle toujours son nom primitif.\r\nEn 1930 il est vendu à la famille Bergeron. Puis le prince Jean Caracciolo le racheta. Depuis 1974 il appartient à une famille américaine, les Wetherill qui ont poursuivi la restauration.","architecture":"DROUILLY, le château dans sa forme actuelle fut reconstruit par François du Bellay au début du XVIIe siècle. Des précédentes constructions, il ne reste que deux pavillons et deux tours du pigeonniers  du XVIe siècle. Il a été endommagé au XIXe siècle par un incendie. Une toiture plus basse qu'à l'origine fut reconstruite, dans les années 60 et fit de nombreux travaux de restauration et en particulier la toiture retrouva sa hauteur d'origine.De la forteresse primitive, seuls deux tours ont été conservées et deux pavillons du XVIe siècle. Entouré de murs et de grilles soigneusement obturées, il cache sa sobre architecture dans un parc admirablement entretenu.","habitants":"Famille de François du Bellay\r\n        \"","divers":"A la Hayes le château de Drouilly","gps":"","images":["../../jctruffet.com/image/image_41/41_Drouilly_1.jpg"]},"Consult_chateau_formulaire7871":{"id":"Consult_chateau_formulaire7871","dept":"41","canton":"Savigny en Braye","commune":"Droué-Poislay","nom":"Droué_Poislay","type":"Château","periode":"XV-XVII","histoire":"Cinq châteaux dans cet article celui de Droué, de Chaussepot, la Bilière et de Ruan à Ruan sur Egvonne  \r\nDROUE, château situé sur une ancienne motte féodale, défense avancée de Châteaudun. Du château primitif subsiste l'emprise, les fossés et deux bâtiments de la basse-cour,  grange et petite longère. Edification du château neuf entre 1610 et 1614. Jacques et Bénédicte de Piédoüe d'Héritôt se consacrent aujourd'hui à la remise en état du château de Droué. Nous n'avons pu sauver que quelques éléments essentiels comme certains lustres, se souvient Jacques de Piédoüe, propriétaire de cette demeure. Aujourd'hui à la famille de Maurice Viron.                                                                                    A trois kilomètres au nord au Poislay le château de  CHAUSSEPOT,   la seigneurie, mentionnée depuis le XIIIe siècle, dépendait du château de Courtalain. détruit par les anglais lors de la guerre de cent-Ans.  Du XVe siècle passe  aux Mallefède, au XVIIIe siècle passe par héritage aux Boisguyon, qui le cèderont en 1833 au duc de Montmorency,  et acquis par le colonel Miklos de Kiss de Nemesker ancien écuyer du cadre noir de Saumur il avait épousé la fille du marquis de Charron,  propriétaire depuis  1930.  et au sud-Est à Ruan sur Egvonne le château de Ruan  monsieur de Rambure propriétaire en 1930.    Le château de Bilière,  monsieur Roland d'Estape propriétaire en 1930 Pas d'autre information pour ses deux châteaux.","architecture":"DROUE, édifice en pierre et briques, se composant aujourd'hui d'un corps central et d'un pavillon. Autrefois la plateforme d'implantation était entourée de fossés dont il ne reste que celui sur la façade principale. Des travaux ont été réalisés en 1855-1869, touchant la distribution intérieure. L'escalier monumental a conservé son emplacement, ainsi que le niveau semi-enterré des offices.  Le château en totalité : classement par arrêté du 27 décembre 2007. Le château de Droué date du XVIIe siècle. Les travaux réalisés en 1855-1869 modifièrent la distribution intérieure. L'escalier monumental a conservé son emplacement, ainsi que le niveau semi-enterré des offices.                                                                                                   CHAUSSEPOT, l'édifice actuel est construit sur une plateforme entourée de douves, qui remonte aux XVe-XVIe siècles, et dont ne subsistent que deux tours adossées aux communs et au corps de bâtiment principal, La formule des travées avec jambes harpées montant de fond et encadrant des baies et trumeaux, est fréquemment utilisée depuis le milieu du XVIe siècle. Les lignes verticales, les jambes harpées et les travées étroites sont typiques de la fin du XVIe ou du début du XVIIe siècle.   Quelques modifications ont eu lieu au XIXe siècle.","habitants":"Droué; Famille de Jacques de Piédoüe                                    Chaussepot; famille des Boisguyon\r\n        \"","divers":"Cinq châteaux à Droué-Poislay celui de Droué grav 1-2, de Chaussepot grav 3-4-5, la Bilière grav-6  et de Ruan grav 7 à Ruan sur Egvonne  Droué  : 48° 2' 13,86\" Nord et 1° 4' 34,52\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Drou%c3%a9_Poislay_1.jpg","../../jctruffet.com/image/image_41/41_Drou%c3%a9_Poislay_2.jpg","../../jctruffet.com/image/image_41/41_Drou%c3%a9_Poislay_3.jpg","../../jctruffet.com/image/image_41/41_Drou%c3%a9_Poislay_4.jpg","../../jctruffet.com/image/image_41/41_Drou%c3%a9_Poislay_5.jpg","../../jctruffet.com/image/image_41/41_Drou%c3%a9_Poislay_6.jpg","../../jctruffet.com/image/image_41/41_Drou%c3%a9_Poislay_7.jpg"]},"Consult_chateau_formulaire15ae":{"id":"Consult_chateau_formulaire15ae","dept":"41","canton":"Salbris","commune":"Ferté-Imbault","nom":"Ferté_Imbault","type":"Château","periode":"XV-XIX","histoire":"Trois châteaux à la Ferté-Imbault, celui de la Ferté et de Sauldre.                                                                                                  FERTE-IMBAULT, cest avec la famille dEtampes, au début XVe siècle, que le château renaîtra de ses ruines. Mais cest Jacques dEtampes, Maréchal de Camp, Capitaine des Gardes du Corps de Gaston dOrléans, frère de Louis XIII qui l'a fait bâtir en 1627,  elle possédait aussi depuis le XVe siècle la baronnie de La Ferté-Imbault, dont dépendait Salbris. La fille de madame Geoffrin y résida et à laissé quelques souvenirs. La baronnie fut élevée en marquisat sous Jacques d'Estampes (1590-1668), marquis de Mauny, seigneur de Salbris, maréchal de France, qui le  fit reconstruire  en 1807 le domaine sort de la seigneurie d'Etampes, longtemps délaissé il est restauré en 1820 par William Lee, et malgré les bombardements  en 1944 l'édifice est restauré par la famille Bertrand. C'est devenu un hôtel et club Vacanciel.                                                                                                              SAULDRE, situé au coeur de la Sologne, le domaine de la Sauldre possède un château construit au XIXe siècle qui bénéficie dun espace de 220 hectares de parcs et de forêts, son nom viendrait de la rivière, la Sauldre. Le château abrite aujourd'hui un hôtel restaurant.","architecture":"FERTE-IMBAULT,  le château actuel garde encore l'aspect d'une maison-forte dont la motte aurait été nivelée en deux terrasses. Du château médiéval reste le soubassement de 2 tours au pied de la façade principale, datant de la fin du XIVe siècle. Vers 1520, il fut agrémenté d'une façade aux percements sculptés de grotesques et de médaillons, et adjonction de deux tours rondes suivant les principes darchitecture de lépoque, en conservant les parties utilisables, un magnifique ensemble dont lessentiel subsiste aujourdhui. De vastes communs sélèvent de chaque côté de la cour dhonneur et accompagnent le corps de bâtiment principal ainsi que deux pavillons qui encadrent la cour intérieure. Pour lagrément, un parc est dessiné, clos dun mur qui existe toujours. Au cours des siècles, le château changera de mains de nombreuses fois. Au XIXe siècle, la terrasse sur l'avant-cour fut modifiée dans le style néo-gothique. L'avant-corps central aurait été reconstruit après la seconde guerre mondiale. A l'intérieur, une salle conserve un plafond à la française orné d'un décor peint du XVIIe siècle. Il est le plus important château de brique de Sologne avec de remarquables communs de pur style Louis XIII.                                                                                     .","habitants":"Ferté, Famille dEtampes                                                           La Noue, famille du Bouchet\r\n        \r\n        \"","divers":"à la Ferté-Imbault, celui de Barboire grav-1,  la Ferté  de Sauldre grav-2-3-4-5-6, Bois-Méhant grav-7 à la Selles st-Denis et de la Noue grav-8-9.  47° 23' 16\" nord, 1° 57' 27\" est.                                                                    Ferté 47° 23' 15,83\" Nord et 1° 57' 26,8\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Fert%c3%a9_Imbault_1.jpg","../../jctruffet.com/image/image_41/41_Fert%c3%a9_Imbault_2.jpg","../../jctruffet.com/image/image_41/41_Fert%c3%a9_Imbault_3.jpg","../../jctruffet.com/image/image_41/41_Fert%c3%a9_Imbault_4.jpg","../../jctruffet.com/image/image_41/41_Fert%c3%a9_Imbault_5.jpg","../../jctruffet.com/image/image_41/41_Fert%c3%a9_Imbault_6.jpg","../../jctruffet.com/image/image_41/41_Fert%c3%a9_Imbault_7.jpg","../../jctruffet.com/image/image_41/41_Fert%c3%a9_Imbault_8.jpg","../../jctruffet.com/image/image_41/41_Fert%c3%a9_Imbault_9.jpg"]},"Consult_chateau_formulairef056":{"id":"Consult_chateau_formulairef056","dept":"41","canton":"Chambord","commune":"Fontaine en Sologne","nom":"Fontaine_Bauzy","type":"Château","periode":"XV-XVI","histoire":"La Hayes. Cobrières. Ravinière. Gué la Guette. Et Veillenne à Bauzy.                                                      COBRIERES, Maurice de Bournonville propriétaire en 1930.                                                                                 RAVINIERE, édifice construit en 1500 pour François de Reffuge puis, au XVIe siècle il passa dans les mains de Daniel de Launay, puis ce sera la famille Le Cocq, et ensuite Adine. En 1927, Hubert d'Assy le vendit au colonel de Courcel, son fils Geoffroy prit la suite, il fut l'aide de camp du général De Gaulle. Il prit sa retraite dans son château de la Ravinière qui est situé sur la route de Bauzy, les ailes, les pavillons latéraux et le portail de la fin XVIe siècle ou début XVIIe siècle, restauré, remanié et agrandi au XIXe siècle. La demeure connut une nouvelle restauration en 1932, pour le baron de Courcel, par l'architecte Georges Lisch et un sculpteur local, Lemoine. La chapelle a été aménagée dans le pigeonnier. Les parties les plus récentes s'accordent parfaitement au style général de l'édifice. Les dépendances sont d'authentiques constructions solognotes à colombage et le merveilleux jardin, parfaitement entretenu, forme un écrin à ce manoir qui peut-être considéré comme l'un des plus réussi de toute la Sologne.                                                                          CHEVROLIERE M et Mme Jean Des Francs propriétaire en 1930.","architecture":"HARDONNIERE, château du XIXe et du-XXe siècles, pigeonnier, écurie, parc, communs, pas d'historique                                                                                 Le manoir de l'ILE  fut autrefois une motte féodale entourée de fossés en eau. Le manoir actuel a été construit au XVIe siècle, l'escalier porterait la date  de 1560. Les bâtiments sont organisés autour d'une cour carrée, la grange à colombages élevée au XVIe siècle fut détruite en 1943. La chapelle, de plan rectangulaire, est un peu surélevée par rapport aux communs qui la prolongent. Elle n'a pas de clocher, mais conserve sur son pignon ouest deux fines baies jumelées; elle est essentiellement batie en briques. Désaffectée, elle a été transformée en grange lorsque le manoir devint une ferme.                                                       VEILLENNE, château mentionné en 1664, détruit en 1847 et remplacé à partir de 1846 par un nouvel édifice, agrandi en 1865. Enceinte quadrangulaire; fossé large de 8 m à 16 m. Le bâtiment est composé d'un étage carré et étage de comble, gros-oeuvre en brique ; pierre ; pierre avec brique en remplissage, élévation à travées surmontée de toit à longs pans ; toit conique ; terrasse recouverte d'ardoise.\r\nLa présence, sur la commune de Bauzy ou les environs, d'un certain nombre d'enceintes anciennes, prouve qu'à une époque, déjà fort éloignée, cette partie de la Sologne a été habitée. Cela porte à croire que l'enceinte de Veillenne peut remonter à une très haute antiquité. propriété de la famille Lemaignein depuis plus d'un siècle.","habitants":"Corbières Maurice de Bournonville.                                      Ravinière; famille Le Cocq                                              Veillènne; famille Lemaignein \r\n        \"","divers":"Fontaine en Sologne, La Hayes grav-1. Cobrières grav 2-3. Ravinière grav-4. Gué la Guette grav 7. Et Veillenne grav 5-6  à Bauzy Herbonnière  grav 8, Chevrolière grav-9","gps":"","images":["../../jctruffet.com/image/image_41/41_Fontaine_Bauzy_1.jpg","../../jctruffet.com/image/image_41/41_Fontaine_Bauzy_2.jpg","../../jctruffet.com/image/image_41/41_Fontaine_Bauzy_3.jpg","../../jctruffet.com/image/image_41/41_Fontaine_Bauzy_4.jpg","../../jctruffet.com/image/image_41/41_Fontaine_Bauzy_5.jpg","../../jctruffet.com/image/image_41/41_Fontaine_Bauzy_6.jpg","../../jctruffet.com/image/image_41/41_Fontaine_Bauzy_7.jpg"]},"Consult_chateau_formulaire7d98":{"id":"Consult_chateau_formulaire7d98","dept":"41","canton":"Savigny en Perche","commune":"Fontaines les Coteaux","nom":"Fosse_la","type":"Château","periode":"XVI","histoire":"La FOSSE, achat du domaine en 1751 par la famille Frédéreau la fille de sieur Frédéreau ancien officier, Charlotte l'apporte à son époux Sébastien-Gérard futur magistrat de la cour des comptes, au XVIIIe siècle propriétaire du domaine commence à planter des arbres méridionaux, le fils Alexandre-Sébastien ingénieur des ponts-et-Chaussées hérite de la passion et sera l'un des conseillers de l'impératrice Joséphine pour l'aménagement du parc de Malmaison. le fils Alexandre-Sébastien ingénieur des ponts-et-Chaussées hérite de la passion et sera l'un des conseillers de l'impératrice Joséphine pour l'aménagement du parc de Malmaison. Il décide  de créer sur le domaine de la Fosse et fait construire  une vaste villa remplaçant la maison de maître du domaine.","architecture":"La FOSSE, construction d'origine médiévale, et de style directoire corps de bâtiment rectangulaire à trois niveaux et couvert d'un toit à pentes. Son étroite  façade principale comporte un rez-de-chaussée une galerie ouverte. Deux tourelles rondes, en légère saillies encadrent cette façade, dont la partie supérieure est terminée par un pignon triangulaire percée d'une baie cintrée. A la droite du corps principal, un pavillon postérieur, en retrait est bâti  sur un soubassement rattrapant la déclivité du terrain. La villa est prolongée sur sa gauche par un petit bâtiment   à un seul étage couvert d'un haut comble brisé à sa gauche jouxté par l'orangerie de style néoclassique, le long bâtiment bas éclairé par cinq baies  et couvert d'un toit à pentes et en retour un bâtiment des communs.  Sur la commune de Fontaine-les-Coteaux, se trouve l'arboretum de la Fosse (ou Parc botanique de la Fosse), l'un des plus anciens de France. Regroupant des collections d'arbres et arbustes du monde plantés depuis la fin du XVIIIe siècle, il est en France le premier qui fut, dès 1978, protégé au titre des M.H.pour sa valeur botanique et paysagère.","habitants":"famille Frédéreau\r\n        \"","divers":"A Fontaines les Coteaux, le château de la Fosse","gps":"","images":["../../jctruffet.com/image/image_41/41_Fosse_la_1.jpg","../../jctruffet.com/image/image_41/41_Fosse_la_2.jpg","../../jctruffet.com/image/image_41/41_Fosse_la_3.jpg","../../jctruffet.com/image/image_41/41_Fosse_la_4.jpg","../../jctruffet.com/image/image_41/41_Fosse_la_5.jpg","../../jctruffet.com/image/image_41/41_Fosse_la_6.jpg"]},"Consult_chateau_formulairec13b":{"id":"Consult_chateau_formulairec13b","dept":"41","canton":"Blois","commune":"Fougères sur Bièvre","nom":"Fougères_Boissay","type":"Château","periode":"XV-XVII","histoire":"Plusieurs châteaux à Feings celui de Belyvière, de Favras et de la Source pas d'information pour les deux derniers.                                                                                                              BELYVIERE, manoir ayant conservé des lucarnes Renaissance et une tourelle polygonale. Sur la droite, le bâtiment forme une tour carrée mitoyenne avec le bâtiment des communs. Lucarnes avec pilastres à chapiteaux sculptés. La façade sur cour présente une tour polygonale d'escalier au milieu de la façade.                                FOUGERES, premier château du XIe siècle  la seigneurie acquise en 1334 par Gaucher de Faverois  En 1470, Pierre de Refuge, trésorier de Louis XI, obtint du roi l'autorisation de reconstruire le château qui avait été abattu en 1356 sur l'ordre d'Edouard III d'Angleterre, à l'exception du donjon. Pierre de Refuge, éleva la façade principale située au nord, l'aile ouest et commença les bâtiments du sud, qui furent terminés par son gendre, Jean de Villebresmes. Acquies en 1789 à la veille de la Révolution par René Lambot.  En 1814, le propriétaire y installa une filature actionnée par les eaux de la Bièvre, qui fonctionna jusqu'en 1890. Il est aujourd'hui la propriété de l'État Français qui l'a racheté en 1932.                                                                                       BOISSAY, ce château d'architecture classique, du XVIIIe siècle, faisait autrefois partie de la terre de Fougères. Cette importante seigneurie, lune des plus anciennes du Blésois, tenue entre autres par les familles de Faverois, de Refuges, et de Villebresme. Le château passa ensuite par les mains de la famille de Rhoddes qui vend le domaine en 1738 à René Lambot de Fougères, conseiller du Roi, époux de Marguerite Pasquier. Les derniers propriétaires furent les de Quatrebarbes, Magdeleine de Quatrebarbes qui hérite à la mort de son frère, vend le domaine en 1946, à lAssociation Charles Péguy. En 1947, le centre de Boissay souvrait dans cette région déshéritée du département.","architecture":"FEINGS, transformé en lycée Agricole. La seigneurie de Feings appartenait à l'abbaye de Pont-Levoy. Elle y était représentée par un maire héréditaire et possédant cette mairie à titre de fief. En 1225, sous le règne de Louis VIII, père de Saint Louis. Soixante sept ans après cette transaction, en 1292, sous le règne de Philippe le Bel, un des successeurs de ce maire féodal  y mourut.                                                                                      FOUGERES, le château présente encore l'aspect d'un château fort. Il était autrefois entouré d'eau sur ses quatre faces. Un chemin de ronde, couvert et à mâchicoulis, couronne les murailles de la façade nord. Ces murailles s'appuient au donjon rectangulaire, antérieur au château actuel, et à une grosse tour ronde. Au centre de la façade, une porte fortifiée prise entre deux tours rondes, donne accès à la cour intérieure. Le donjon a été percé, au XVIe siècle, de fenêtres et lucarnes. Les différents étages sont desservis par un escalier à vis contenu dans une tourelle ronde située dans la cour intérieure du château, et accolée à l'un des angles du donjon.   Les bâtiments d'habitation s'ouvrent sur cette cour et sont adossés aux murailles ouest et sud. Celui de l'ouest est divisé en quatre étages dont l'accès se fait par un escalier à vis placé dans une tourelle hexagonale. Le corps de logis sud se termine par la chapelle. Du côté Est s'ouvre une galerie comprenant quatre arcades surbaissées, faisant communiquer la chapelle avec l'escalier du donjon. Toutes les dispositions primitives extérieures subsistent presque intactes et font de ce beau petit château un intéressant spécimen de demeure seigneuriale de la fin de l'époque gothique. En 1993, le ministère de la culture et la caisse nationale des monuments historiques et des sites ont retenu pour le château une orientation sur l'art de bâtir et les métiers du bâtiment. \r\nÉléments protégés MH : le château de Fougères sur Bièvre en totalité: classement par arrêté du 14 septembre 1912.","habitants":"Famille de Jean de Villebresmes\r\n        \"","divers":"Plusieurs châteaux à Feings celui de Belyvière grav-1, de Favras grav-2, de la Source grav -7-8 et à Fougères  Fougères grav 4-5-6 et Boissay grav-3;                                   Belivière 47° 26' 41\" nord, 1° 21' 42\" Est                                                     Fougères: 47° 26' 52\" Nord et 1° 20' 37\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Foug%c3%a8res_Boissay_1.jpg","../../jctruffet.com/image/image_41/41_Foug%c3%a8res_Boissay_2.jpg","../../jctruffet.com/image/image_41/41_Foug%c3%a8res_Boissay_3.jpg","../../jctruffet.com/image/image_41/41_Foug%c3%a8res_Boissay_4.jpg","../../jctruffet.com/image/image_41/41_Foug%c3%a8res_Boissay_5.jpg","../../jctruffet.com/image/image_41/41_Foug%c3%a8res_Boissay_6.jpg","../../jctruffet.com/image/image_41/41_Foug%c3%a8res_Boissay_7.jpg","../../jctruffet.com/image/image_41/41_Foug%c3%a8res_Boissay_8.jpg","../../jctruffet.com/image/image_41/41_Foug%c3%a8res_Boissay_9.jpg"]},"Consult_chateau_formulaire3897":{"id":"Consult_chateau_formulaire3897","dept":"41","canton":"Savigny sur Braye","commune":"Le Temple","nom":"Fredonnière","type":"Château","periode":"XIX","histoire":"FREDONNIERE, il a été construit vers 1855 par Louis Gédéon Alfred, vicomte de Salvert. Mais son histoire remonte au Moyen-Age. Du XVe siècle au XVIIIe siècle, il a appartenu à la famille de Coutance. C'est dans les caves de la Fredonnière qu'en 1560, se seraient retrouvés les conjurés d'Amboise décidés à abaisser la puissance de la famille de Guise et affaiblir la royauté.","architecture":"FREDONNIERE, située au milieu d'un parc magnifique, la Fredonnière est un exemple typique du style Troubadour, exubérant, habituellement peu goûté, mais qui pourra être plus apprécié dans l'avenir.  L'édifice  à deux niveaux sur soubassement  et série de lucarnes à meneaux garnies d'acrotères et pinacles, flanqué en façade sur les extrémité de deux tours rondes à trois niveaux avec mâchicoulis à toits en poivrières,  pavillons d'entrée à trois niveaux saillants reflète les aspirations de l'époque : d'une part le modernisme avec les grandes fenêtres, le chauffage à air pulsé, la distribution de pièces autour de vastes galeries, les cabinets de toilette pour les chambres, d'autres part la tradition, rappelée par les citations de la Bible, les armoiries sculptées dans la pierre, la chapelle avec les vitraux provenant des ateliers Lobin à Tours. Le parc est planté d'essences très en vogue dans la deuxième moitié du XIXe siècle : cèdres, séquoias, pins maritimes, marronniers, chênes d'Amérique, tilleuls.","habitants":"famille de Guise \r\n        \r\n        \"","divers":"A le Temple le château de Fredonnière","gps":"","images":["../../jctruffet.com/image/image_41/41_Fredonni%c3%a8re_1.jpg","../../jctruffet.com/image/image_41/41_Fredonni%c3%a8re_2.jpg"]},"Consult_chateau_formulairee93a":{"id":"Consult_chateau_formulairee93a","dept":"41","canton":"Onzain","commune":"Villefrancoeur","nom":"Freschines","type":"Château","periode":"XVI-XVII","histoire":"FRESCHINES, construit aux XVIe et XVIIe siècles, il a été transformé au XVIIIe par l'architecte des bâtiments du roi Jean-Baptiste Collet.   Des deux châteaux l'un est un  manoir du XVe siècle qui a conservé des vestiges de son enceinte fortifiée a été transformé en ferme lorsque le receveur général des finances, Jean Baptiste Begon fit construire en 1763 un château de style classique qu'il trouvait plus adapté à son importance. En 1778, Antoine Laurent de Lavoisier, chimiste, acquit cette demeure sans grâce où il poursuivit ses expériences de chimie et d'agronomie jusqu'en 1794 date de son arrestation qui le conduisit à l'échafaud. L'autre  a été  élévé au XVIIIe siècle, il fut habités par le savant Lavoisier qui y avait installé ses laboratoires.","architecture":"FRESCHINES, Elisabeth Herring arrive dAutriche avec sa fille Valérie ; elle est architecte, sa fille diplômée en sciences politiques :  Nous voulons faire revivre Freschines, cest tellement beau  Cest formidable de rencontrer ces gens qui ont connu le château, comme cette sur qui y a travaillé, Enthousiastes, elles comptent exploiter le potentiel dune quarantaine de chambres, progressivement, avec des chambres dhôtes dès maintenant puis en louant certaines parties en meublés de tourisme. En juillet, nous accueillons un mariage chinois, Valérie souhaite ouvrir ce site exceptionnel, le conseil municipal de la commune avait dailleurs été invité à la visite. Et les connaissances de Colette Beaune, mais aussi de Pierre de Bizemont, qui a mené la visite, leurs sont précieuses.  Je travaille sur Jean-Baptiste Collet, architecte  de Freschines, Pierre de Bizemont est satisfait de constater que les cheminées du XVIIIe siècle nont pas été pillées et que si lon voit encore des traces de la clinique, laile XVIIIe est restée en état.  En observant la petite sacristie, qui se trouve en demi-étage, on a retrouvé des portes coulissantes en boiseries du XVIIIe.  Elle a été bénite en 1763 au moment de la construction et différents inventaires permettent de suivre sa composition. La frise danges dorés est charmante. Les découvertes sont donc très encourageantes, le lieu toujours aussi somptueux.  Mais il faudra beaucoup de travail et de courage pour remettre en état le site, chambres dhôtes.","habitants":"Antoine Laurent de Lavoisier\r\n        \"","divers":"A Villefrancoeur le château de  Freschines  47° 41' 48\" Nord et 1° 13' 45\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Freschines_1.jpg","../../jctruffet.com/image/image_41/41_Freschines_2.jpg","../../jctruffet.com/image/image_41/41_Freschines_3.jpg","../../jctruffet.com/image/image_41/41_Freschines_4.jpg"]},"Consult_chateau_formulaire495c":{"id":"Consult_chateau_formulaire495c","dept":"41","canton":"Savigny sur Braye","commune":"Fréteval","nom":"Fréteval","type":"Château","periode":"XI-XIII","histoire":"Rocheux voir article                                                                            FRETEVAL;  vestiges de la  forteresse du XIe siècle, couvrant 4,5 hectares. Vestiges imposants du donjon témoin de la première génération des donjons circulaires en pierre. Château de Marches, il fut un haut-lieu des relations tumultueuses entre les Plantagenêt et le Royaume de France, mais aussi de conventions de mariages. Site militaire dépendant du seigneur de Meslay-le-Vidame, près de Chartres. La première place forte a été construite en partie sur l'emplacement des ruines d'un village fortifié carolingien; Saint Victor. Le donjon circulaire en pierre a été bâti par Nivelon, avant son départ pour la première croisade avec l'aide du comte de Blois Etienne II, il faisait face au château de Vendôme qui était sous la suzeraineté du comte d'Anjou et gardait le Dunois du reste de la vallée du Loir. La rivalité entre la puissante maison de Blois et la maison d'Anjou était telle, que le site de Fréteval était d'une grande importance. Lorsque que les Angevins deviendront rois d'Angleterre par la suite, il continuera de jouer le rôle de frontière entre les capétiens et les plantagenêts. Le château est actuellement la propriété d'Armand de La Rochefoucauld, duc de Doudeauville.\r\nÉléments protégés MH : les vestiges du donjon : inscription par arrêté du 13 février 1926.","architecture":"FRETEVAL est ruiné, durant toute cette période instable,  fief majeur de cette famille Meslay, seigneur de Fréteval jusqu'à la fin du XIIIe siècle. Pendant la Guerre de Cent-Ans, les fortifications du château sont améliorées mais il subira, à deux reprises, en 1418, les assauts de troupes anglaises. Abimé, il reste habité jusqu'en 1487, année des dernières monnaies trouvées. Il sert ensuite de carrière de pierre d'où sont état actuel. Le donjon est inscrit aux M.H. depuis le 13 février 1926. Depuis 1968, des fouilles et des opérations de préservations sont mises en place, avec ses 3 lignes de défense, présente aussi un donjon véritable témoin de la première génération des donjons à la fois circulaires et en pierre,  le donjon, bâti vers l'an 1100, est l'un des plus anciens donjons circulaires de France.La Tour de Grisset est de style gallo-romain,  est le vestige d'un fanum, petit temple gallo-romain  située à Fréteval.","habitants":"seigneur de Meslay-le-Vidame\r\n        \"","divers":"Tour Grisset 47° 53' 47,23\" Nord et 1° 11' 01,29\" Est                                 vestiges de Freteval  grav -3, 47° 53' 07\" nord, 1° 12' 41\" est","gps":"","images":["../../jctruffet.com/image/image_41/41_Fr%c3%a9teval_1.jpg","../../jctruffet.com/image/image_41/41_Fr%c3%a9teval_2.jpg","../../jctruffet.com/image/image_41/41_Fr%c3%a9teval_3.jpg"]},"Consult_chateau_formulairefdd2":{"id":"Consult_chateau_formulairefdd2","dept":"41","canton":"Savigny sur Braye","commune":"Souday","nom":"Glatigny","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux à Souday celui de Glatigny  et de la Cour.                               La COUR, Marguerite de Marescot et Jacques de Vandomois en font mention dans leur testament en 1597. Madame Brayer, petite-fille de M. de Chenevières, fit retoucher à cette chapelle plus d'un siècle après. Ce n'est qu'aux soins de M. le vicomte de Courtavel, propriétaire du château au XVIIIe siècle, qu'elle doit toute l'élégance actuelle de sa décoration.                                                                                                      GLATIGNY, au XIIIe siècle la seigneurie de Glatigny  relavait de celle de Mondoubleau  et de la famille de Souday,  cette gentilhommière a une histoire digne d'être rappelée, puisqu'en 1573, Gilles de Ronsard   neveu du poète de la Pléiade prit pour 99 ans le bail de Glatigny, au XVe siècle passe à la famille du Bellay qui y construisit le château, l'héritière   Marguerite de la Tour du Landry  l'apporte en dote a vec Louis du Bellay seigneur de Langey qui mourut à Glatigny en 1522, parmi leurs huit enfants quatre occuperont de hautes fonctions sous le règne de François Ier. Guillaume (1491-1543) habile diplomate, terminera sa carrière comme vice roi de Piémont et gouverneur de Turin, avant de devenir gouverneur de la Normandie.  le domaine est transmit à la descendance de Martin du Bellay jusqu'à Charles prince d'Yvetot. En 1671, le domaines est acquis par les Chennevrières, le derniers seigneurs de Glatigny Jean Baptiste  Bochard de Saron fut exécuté en 1794.  Vendu comme bien national au XIXe siècle le domaine est sous la restauration acquis par le vicomte d'Arsigny ancêtres des propriétaires actuels la famille du Breuil de Pontbriard-Marzan.","architecture":"La COUR, l'origine manoir féodal, rajeuni par des restaurations et embellissements successifs, se montre aujourd'hui sous un aspect des plus gracieux. Les larges fossés qui l'entouraient autrefois vers le nord, et le pont-levis qui en défendait l'entrée, ont disparu pour faire place à de charmants jardins arrosés par les eaux vivent du Coitron, circonscrit dans son enceinte fortifiée, se vouait exclusivement au culte du dieu de la guerre. Aujourd'hui, soigné, entouré de frais ombrages, le château se mire dans l'onde claire de son beau vallon. Une antique chapelle, restaurée avec goût, se voit près du château.                                                           GlATIGNY, construit en 1544 Si le château de Glatigny est une construction moderne, cette gentilhommière juchée sur un important soubassement, le corps de logis est cantonné sur cour de deux ailes en retour moins élevées et terminées  par un pignon . Elevé sur trois niveaux dont un  de comble, le corps central avec toit à hautes  et à forte pente, présente deux séries de deux travées s'ordonnant autour d'une travée centrale correspondant au grand escalier à rampes droites. Celui-ci, auquel on accède du côté de la cour par une porte encadrée de colonnes. Eclairé au niveau de l'étage par des baies cintrées,   jumelles et au niveau du comble par une baie géminée sommée d'un fronton droit surmontée d'un lanternon moderne, la façade appareillée en maçonnerie de brique décorée de croisillons se détachent les chaines d'angle et les encadrements de fenêtre, en pierres blanches.","habitants":"Cour,M. le vicomte de Courtavel                                               Glatigny;  famille de Gilles de Ronsard\r\n        \"","divers":"à Souday celui de Glatigny  et de la Cour grav 4_5.","gps":"","images":["../../jctruffet.com/image/image_41/41_Glatigny_1.jpg","../../jctruffet.com/image/image_41/41_Glatigny_2.jpg","../../jctruffet.com/image/image_41/41_Glatigny_3.jpg","../../jctruffet.com/image/image_41/41_Glatigny_4.jpg","../../jctruffet.com/image/image_41/41_Glatigny_5.jpg","../../jctruffet.com/image/image_41/41_Glatigny_6.jpg"]},"Consult_chateau_formulaire5fa1":{"id":"Consult_chateau_formulaire5fa1","dept":"41","canton":"Montrichard","commune":"Monthou sur Cher","nom":"Gué_Péan","type":"Château","periode":"XV-XVI","histoire":"GUE-PEAN , c'est au XVe siècle que la famille Alamand achète la seigneurie et fait construire le château. En 1527 la seigneurie est érigée en châtellenie par François Alamand, vassal du seigneur de Saint-Aignan. C'est son petit-fils qui termine la construction du château.  La fille de François Charlotte épouse François de Picques.  En 1645 remaniement de l'aile nord  et le corps de logis par Charlotte de Picques. En octobre 1676, Charlotte Alamand vend le Gué-Péan et ses dépendances à François de la Motte-Villebret comte d'Aspremont, dont la veuve Gabrielle de La Malot du Bousquet l'aopportera à son tour en dot à son second époux, Jean Hippolyte d'Estampes, marquis de Bellebrune. C'est ensuite la famille Amelot de Chaillou qui prendra possession du château, durant 62 ans. Vient ensuite la famille de Cassin, propriétaire du Gué-Péan en 1832. Ils sont les premiers à y résider. L'orangerie voit le jour en 1885 et le château dispose ainsi d'un jardin d'hiver. Le 7 mars 1952, une grande partie du château est classée M.H.. En 1961, le château du Gue-Pean est vendu à Mr Kéguelin de Rozières puis, plus tard, à Mr Laming. (Architecte du Futuroscope). \r\nÉléments protégés MH : les façades et les toitures du château ainsi que le pont d'accès : classement par arrêté du 10 octobre 1980.","architecture":"GUE-PEAN, bâti sur un plan carré, la présence d'une voie romaine non loin du château, qui coupait le ruisseau par un gué, donna le premier nom à ce lieu-dit : le gué payant, qui devient par la suite, le Gué-Péan. La construction du château commence en 1543 pour se terminer en 1573. L'édifice présente un plan carré féodal avec quatre tours circulaires aux angles, des bâtiments sur trois côtés  est flanqué, du côté de l'entrée, de deux tours circulaires dont il ne subsiste que la partie inférieure. La tour Ouest est surmontée d'un chemin de ronde reposant sur de faux mâchicoulis. De chaque côté, un pavillon en retour, fait un décrochement, s'alignant sur les ailes en retour du bâtiment principal. A l'est, le château du Gué-Péan est relié au pavillon et au bâtiment Henri II par une galerie, cette partie est traitée en orangerie. Au sud-est du château se trouve le quadrilatère fermé par des dépendances.","habitants":"Famille Amelot de Chaillou\r\n        \"","divers":"A Monthou sur Cher ;le Gué-Pean: 47° 21' 0,21\" Nord et 1° 19' 8,32\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Gu%c3%a9_P%c3%a9an_1.jpg","../../jctruffet.com/image/image_41/41_Gu%c3%a9_P%c3%a9an_2.jpg","../../jctruffet.com/image/image_41/41_Gu%c3%a9_P%c3%a9an_3.jpg","../../jctruffet.com/image/image_41/41_Gu%c3%a9_P%c3%a9an_4.jpg"]},"Consult_chateau_formulaire810a":{"id":"Consult_chateau_formulaire810a","dept":"41","canton":"Chambord","commune":"Neuvy","nom":"Herbault","type":"Château","periode":"XVI","histoire":"HERBAULT,  cest Nicolas de Foyal qui fit construire le château dHerbault dans la 1ère moitié du XVIe siècle, sur une terre qui appartenait à sa famille.  Issu dune famille noble de lOrléanais, il gouverne vers 1515, la place militaire de Romorantin. Il y surveille également les travaux ce qui lui vaut dêtre nommé ensuite commissaire de Chambord à compter de 1521. Son arrière-petit-fils, Annibal de Foyal, dernier seigneur dHerbault meurt en 1591, sans héritier. Raymond Phelypeaux se porte acquéreur du château en 1591 et entreprend de grands travaux.   Le comte Charles Jean Innocent Le Couturier de Courcy, achète le château le 28 septembre 1814, pour le compte de Jacques François Le Couturier de Courcy, demeurant près de Louviers. Il ne conserve la propriété que 2 ans et la revend  en 1816.  Un négociant qui se porte acquéreur du château : Denis Simon Bourguignon, le 6 novembre 1816. Le 30 octobre 1827, les héritiers de Simon Bourguignon vendent le château à M. Henri-Aimé-Alphonse Laurent, ancien négociant à Blois. Ils en restent propriétaires jusquen 1838.   Philippe-Edouard Labbé de Champgrand, achète le château dHerbault en 1839. Il sy installe avec son épouse, Marie-Elisabeth Herry de Maupas. A partir de 1896, les Georges Labbé de Champgrand ne figurent plus sur les états de recensement de Neuvy ils ont vendu le château à Raymond Bege. Aujourd'hui l'établissement  est spécialisé dans le secteur d'activité de l'hébergement médicalisé pour enfants handicapés.","architecture":"HERBAULT, seuls les communs du monument font lobjet dune inscription au titre de l'inventaire supplémentaire des  M.H. depuis le 12 octobre 1942.  Une construction devait exister sur le site dès l'époque romaine. En 1525, le château est reconstruit après un incendie, en pierre et brique  dans le style Renaissance, à cette date, seul le corps de logis principal était achevé. Son successeur fit ajouter les communs et la chapelle. Entouré de douves sur trois côtés, le château se compose d'un corps de logis rectangulaire flanqué de deux tours cylindriques du côté nord et d'une aile en retour d'équerre terminée par une autre tour. Les communs datent du XVIIIe siècle. Jardins à la française reconstitués, seul le corps de logis principal était achevé. Son successeur fit ajouter les communs et la chapelle.","habitants":"Jacques François Le Couturier de Courcy\r\n        \"","divers":"A Neuvy le château d'Herbault 47° 33' 00\" Nord et 1° 34' 17\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Herbault_1.jpg","../../jctruffet.com/image/image_41/41_Herbault_2.jpg","../../jctruffet.com/image/image_41/41_Herbault_3.jpg","../../jctruffet.com/image/image_41/41_Herbault_4.jpg"]},"Consult_chateau_formulairea043":{"id":"Consult_chateau_formulairea043","dept":"41","canton":"Montoire sur le Loir","commune":"Couloumiers la Tour","nom":"Huchigny","type":"Château","periode":"XVI","histoire":"HUCHIGNY, le manoir associé à son moulin sont évoqués dès 1268 dans les documents d'archives. La propriété est implantée sur le cours de la Houzée.","architecture":"HUCHIGNY, Les bâtiments se déploient autour de deux cours : celle du manoir, avec les écuries, le logis du fermier et l'actuelle bibliothèque et celle où se regroupent les bâtiments agricoles et le moulin. Construit sur le ruisseau, ce dernier est modernisé en 1850 et conserve l'ensemble de son mécanisme, sa ventellerie et son bief. Le manoir et l'écurie sont les deux bâtiments qui distinguent le site d'Huchigny en raison de leurs charpentes à assemblages dites \"à la Philibert Delorme\". Le manoir médiéval se caractérise par trois phases d'évolution, visibles au niveau des caves et du rez-de-chaussée. Ainsi, une porte située dans les caves remonte au XVIe siècle. L'extension au nord-est, avec des murs de refend dotés d'une cheminée, détermine la seconde étape. La troisième grande phase d'évolution du bâtiment d'habitation principal se situe entre 1781-1782 et 1818-1819.","habitants":"Seigneur local\r\n        \"","divers":"a Couloumiers la Tour, château d'Huchigny","gps":"","images":["../../jctruffet.com/image/image_41/41_Huchigny_1.jpg"]},"Consult_chateau_formulairebe8c":{"id":"Consult_chateau_formulairebe8c","dept":"41","canton":"Chambord","commune":"Huisseau sur Cosson","nom":"Huisseau_Cosson","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux à Huisseau celui de Grotteaux et de Saumery.                                                                      GROTTEAUX, la construction du château date de 1620, pour Guillaume Ribier, sur d'anciennes fondations. Le roi Louis XIII appréciait particulièrement ce haut magistrat blaisois, député du Tiers. Il lui proposa par trois fois un poste de ministre, notamment lors dune visite aux Grotteaux avec Richelieu au retour du siège de La Rochelle en 1628. Guillaume Ribier a toujours refusé ce poste, privilégiant ses fonctions locales, la douceur de vivre des Grotteaux et surtout ses deux passions : lécriture (ses « mémoires dEtat ») et sa collection, la plus importante d'Europe. Guillaume Ribier est à lorigine de la réconciliation entre le roi Louis XIII et sa mère Marie de Médicis. Il la rencontrait très régulièrement pendant son exil à Blois.                                                                                                      SAUMERY, a été reconstruit aux XVIIe et XVIIIe siècles pour les Johanne de la Carre de Saumery gouverneurs du château de Chambord, En 1938, la clinique médicale du centre investit le château de Saumery, (anagramme de \"amy seur\" ami sûr) loué à des descendants des Johanne de La Carre, propriétaires des lieux depuis le XVIe siècle et détenteurs de la charge de gouverneurs de Chambord pendant plus de 150 ans.","architecture":"GROTTEAUX, en 1760, la famille de Lenfernat, alors propriétaire des Grotteaux, agrandit la demeure par la construction dun pavillon attenant au bâtiment dorigine. Durant le Directoire, Charles-Joseph Bagieu, régisseur des vivres de la Grande Armée, ami de Napoléon Bonaparte et passionné de botanique, fit construire lOrangerie. Lempereur lui enverra des graines et des plants rapportés par une mission de botanistes de retour de Louisiane en lui demandant de les acclimater dans le parc du château des Grotteaux. Cest ainsi que lon peut y admirer, le long de la rivière, les plus beaux arbres dautomne dont les cyprès chauves (Taxodium). Le château des Grotteaux est classé à linventaire des M.H. depuis 1954 et son parc depuis 1997.La Commanderie, charmant pavillon construit au XIXe siècle se situe à lentrée du domaine.                                                                                        SAUMERY, vestiges du XVIe siècle de l'ancien château dans l'aile de la chapelle restaurée, pavillons d'entrée, corps de passage, communs, maison de garde et dépendances du  XVIIe siècle. Corps de logis principal du XVIIe siècle et XVIIIe siècle, agrandi et remanié à la deuxième moitié du XIXe siècle, daté par travaux historiques. Escalier en bois à rampe en fer forgé du XVIIIe siècle, de plan symétrique. élévation à travées. : un étage carré ; étage de comble, escalier dans-oeuvre, escalier tournant à retours avec jour.Gros-oeuvre : calcaire ; moellon, toit à longs pans , croupe ; toit à longs pans brisés ; toit en pavillon ; pignon couvert, ardoise. voûte d'ogives ; voûte en berceau,  hospice.","habitants":"Grotteaux;Guillaume Ribier                                                Saumeray; Johanne de la Carre de Saumer\r\n        \"","divers":"à Huisseau celui de Grotteaux grav 1-2-3 et de Saumery  grav-4.                                        Grotteaux  : 47° 35' 6,16\" Nord, 1° 25' 15,76\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Huisseau_Cosson_1.jpg","../../jctruffet.com/image/image_41/41_Huisseau_Cosson_2.jpg","../../jctruffet.com/image/image_41/41_Huisseau_Cosson_3.jpg","../../jctruffet.com/image/image_41/41_Huisseau_Cosson_4.jpg"]},"Consult_chateau_formulairea5f6":{"id":"Consult_chateau_formulairea5f6","dept":"41","canton":"Onzain","commune":"Chouzy-sur cisse","nom":"Laleu_Chouzy","type":"château","periode":"XV","histoire":"LALEU, la seigneurie de Laleu dépendait de l'abbaye de Marmoutier  Vers le milieu du XVIe siècle, l'abbaye de Marmoutier, au XVIIIe siècle, les fermiers de Laleu sont des marchands, des notaires ou des bourgeois, et le logis devint la demeure habituelle de modestes laboureurs. En 1780, Antoine-Jean Rattier, futur maire de Chouzy en 1810, déjà fermier d'un grand domaine dépendant de l'abbaye de Marmoutier sur la commune de Chouzy, la Grande Varenne, achète par adjudication à Monseigneur de Fleury, archevêque de Tours, « les bâtiments composant le château de Laleu avec ses dépendances, en jardin potager et terres labourables  . En 1813, A.-J. Rattier vendit Laleu à l'arrière-grand-père de madame Camille Meusnier qui était également propriétaire du domaine de la Touche ; ce dernier réunit ainsi les deux domaines et le vignoble de Laleu « d'une contenance d'environ douze hectares, dont la majeure partie existe dans la pièce dite Les Marteaux, objet du bail de l'année 1275 de l'abbaye de Marmoutiers à treize cultivateurs, a été reconstitué entre 1894 et 1939 par Camille Meusnier, notaire à Blois, et son fils Maurice Meusnier  . En 1933 Léon Daudet y situe, sous le titre « L'Alleu.","architecture":"LALEU « Le mur de façade était flanqué aux angles de deux tours rondes. Des travaux au XVIIIe siècle ont fait disparaître des éléments médiévaux (fenêtres à meneaux, démolition de deux tours., )percées de meurtrières. Entre les tours, le pignon du grand logis, la chapelle aux contreforts couronnés de gargouilles et le porche d'entrée accompagné d'une petite porte de service. Des modifications architecturales ont eu lieu au début du XVIIIe siècle, en particulier le démantèlement de l'une des tours de la façade et de deux autres. Ses parties les plus anciennes remontent au XVe siècle. Selon une hypothèse vraisemblable, mais non appuyée sur des archives, Jeanne d'Arc aurait pu y passer la nuit du 24 au 25 avril 1429, lors d'un déplacement entre Amboise et Blois.","habitants":"\"","divers":"Chouzy-sur Cisse le château de Laleu 47° 30' 39\" nord, 1° 12' 16\" Est et de Laleu à Pontevoy grav-4","gps":"","images":["../../jctruffet.com/image/image_41/41_Laleu_Chouzy_1.jpg","../../jctruffet.com/image/image_41/41_Laleu_Chouzy_2.jpg","../../jctruffet.com/image/image_41/41_Laleu_Chouzy_3.jpg","../../jctruffet.com/image/image_41/41_Laleu_Chouzy_4.jpg"]},"Consult_chateau_formulaire7b78":{"id":"Consult_chateau_formulaire7b78","dept":"41","canton":"Salbris","commune":"Lamotte-Beuvron","nom":"Lamotte_Beuvron","type":"Château","periode":"XIV-XV-XVII","histoire":"châteaux à Lamottte  dit de St-Maurice.                                          LAMOTTE-BEUVRON, propriété des de Laire au XVe siècle, nouveau logis à tourelle construit en 1567 pour Gilbert de Levis de Ventadour, un château neuf lui est accolé dans la deuxième moitié du XVIIe, la chapelle en 1666, pour Marie de la Guiche. Il appartient à Jacque Henry de Durfort en 1704, à gauche, une partie construite au milieu du XVIIe siècle par Anne de Lévis de Ventadour, qui possédait la seigneurie de Vouzon-Lamotte par héritage familial, et non en raison de son titre d'archevêque de Bourges, à droite, une partie fut construite sous le Second Empire, époque où le domaine appartenait à Napoléon III, d'abord à titre personnel, puis comme dotation de la couronne. Acquis par l'empereur en 1850. En 1852, cherchant une propriété proche du berceau familial de la Ferté-Beauharnais, Louis-Napoléon Bonaparte achèta le château de Lamotte. Quand le prince-président se proclama Napoléon III, la propriété devint le domaine Impérial.  Le château de Lamotte-Beuvron, en cours de restauration, accueille depuis un musée,  propriété de l'Etat, Institut Saint-Maurice. La fédération Française d'équitation y installa son siège social, en 2008, à la suite de la modification de ses statuts. Elle est installée à l'emplacement des anciens bâtiments du centre pénitentiaire juvénile, en ruines depuis de nombreuses années et, restauré pour l'occasion.","architecture":"LAMOTHE dit St-Maurice, édifice fortifié, reconstruit entre 1393 et 1404 pour Guichard, dauphin d'Auvergne.  Cest avec le développement de lartillerie et des canons, quarriva la fin des fortifications en bois, vers 1490. Le premier édifice en pierre, dont on retrouve les traces sous le château, fut construit à lemplacement de lancienne Motte. Vers 1567, la Renaissance délaisse les fortifications médiévales, édification du logis que lon peut toujours voir au Nord du château. Au XVIIe siècle, Anne de Lévis de Ventadour ayant hérité du domaine, fit construire, à lemplacement de la motte féodale, un nouveau château avec sa façade en trois parties. Entre 1806 et 1840, destruction du corps de bâtiment sud du château du XVIIe siècle, de l'entrée nord et du colombier, fossé comblé à l'est et au sud. De 1850 à 1860 restauration du logis du XVIe siècle, remaniement des façades du bâtiment Est du XVIIe siècle, reconstruction des bâtiments Est et ouest de l'ancienne basse-cour, par les architectes Poirot et Delamme. Elle allait devenir une ferme modèle. Sous la 3ème République, le domaine fut transféré au ministère de la justice qui en fit une colonie publique déducation pénitentiaire, jusquen 1992. Le premier directeur, un ecclésiastique, plaça la colonie sous le patronage de Saint-Maurice. En 1914, le domaine de Saint-Maurice accueillit un hôpital militaire bénévole de 60 lits pour les blessés de la grande guerre.","habitants":"Gilbert de Levis de Ventadour,\r\n        \"","divers":"châteaux à Lamottte  dit de St-Maurice grav-1-2-3  et le château de Beuval grav-4   et l'hôtel de ville grav-5.                                                      Lamothe; 47° 36' 10\" Nord et 2° 01' 32\" Est","gps":"","images":["../../jctruffet.com/image/image_41/41_Lamotte_Beuvron_1.jpg","../../jctruffet.com/image/image_41/41_Lamotte_Beuvron_2.jpg","../../jctruffet.com/image/image_41/41_Lamotte_Beuvron_3.jpg","../../jctruffet.com/image/image_41/41_Lamotte_Beuvron_4.jpg","../../jctruffet.com/image/image_41/41_Lamotte_Beuvron_5.jpg"]},"Consult_chateau_formulaire54d1":{"id":"Consult_chateau_formulaire54d1","dept":"41","canton":"Selles sur Cher","commune":"Lassay sur Croisne","nom":"Lassay_Moulin","type":"Château","periode":"XV-XVI-XIX","histoire":"Trois châteaux à Lassay celui de Moulin de la Motte et de la Places.                                                                                 La MOTHE,  à  cette époque, la demeure fut vendue à un ancien officier aux Grenadiers Royaux de l'Orléanais : Jean-Guillaume de La Dabinerie qui fuyait les troubles révolutionnaires de Romorantin, sa propriété de La Dabinerie ayant été saccagée, il trouva à la Mothe la tranquillité qu'il cherchait. Ses descendants n'ont jamais cessé de l'habiter.                                                                                                     MOULIN  c'est en 1480 que Philippe du Moulin commença à construire son château. Par une charte du 10 octobre 1490, il reçu l'autorisation de Charles, comte d'Angoulême, de fortifier son bâtiment de tours, barbacanes, arballestrières, créneaux, archières, canonnières, pont-levy. La tradition veut qu'il sauva la vie du rois Charles VIII à la bataille de Fornoue, le 6 juillet 1495, comme en atteste Philippe de Commynes, historien du roi, dans ses mémoires. En 1496, Charles VIII le maria à une très riche veuve \"haute et puissante Charlotte d'Argouges\" qui apporta à son mari de fort beaux écus qui permirent à Philippe de terminer le Moulin. En 1498, Louis XII accordait à Philippe du Moulin une charte confirmant les privilèges octroyés par ses prédécesseurs à la seigneuries du Moulin. Philippe mourut à Langres, en 1506, où il fut enterré. Mais il avait demandé que son coeur repose dans l'église de Lassay où il est encore sous un enfeu. En 1901, lors du rachat par M. de Marchéville, si le gros oeuvre était  relativement en bon état, les toitures et l'intérieur étaient entièrement à restaurer.","architecture":"La MOTHE, cette charmante gentilhommière a été construite au XVIe siècle sur un terre plein entouré de larges douves. Elle était formée à l'origine d'un corps de logis central en rez-de-chaussée encadré par deux ailes terminées par deux tours carrées. L'une de ces ailes a été détruite en 1803.                                                                                                                              MOULIN, les travaux durèrent jusqu'en 1914. C'est en travaillant à partir du dictionnaire raisonné du Mobilier Français et des travaux d'Eugène Viollet-le-Duc que la restauration fût faite. Une recherche minutieuse a permis de trouver meubles, tapisseries et bibelots. Le jardin potager a été redessiné, drainé et aménagé pour nourrir tous ceux qui vivaient au château, il se compose de deux corps de bâtiments, l'accès se fait par un portail accosté d'une poterne et flanqué de deux tours précédées d'un pont-levis, le logis compren
