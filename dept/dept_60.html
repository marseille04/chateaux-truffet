on et de Lisette disposées dans la cour d'honneur, mur d'enceinte : inscription par arrêté du 14 décembre 1990.","habitants":"Famille de Mr Ernest-Antoine Seillière\"","divers":"Château d'ognon à Ognon                     GPS : 49° 14' 6,84\" Nord, 2° 39' 2,78\" Est","gps":"49° 14' 6,84\" Nord, 2° 39' 2,78\" Est","images":["../../jctruffet.com/image/image_60/60_Ognon_1.jpg","../../jctruffet.com/image/image_60/60_Ognon_2.jpg","../../jctruffet.com/image/image_60/60_Ognon_3.jpg"]},"Consult_chateau_formulairefebe":{"id":"Consult_chateau_formulairefebe","dept":"60","canton":"Grandvilliers","commune":"Omécourt","nom":"Omécourt","type":"Château","periode":"XVIII","histoire":"OMECOURT. Au XVe siècle, Jean Gourles était propriétaire de l'édifice. Depuis le XVIe siècle, la famille Cossart d'Espiès, représentée aujourd'hui par le baron de Coriolis, qui en est propriétaire.","architecture":"OMECOURT, long corps de logis de brique et de pierre animé par des décrochements de l'avant corps central et deux pavillons terminaux, élevé au fond de la  grande cour d'honneur précédée d'une grille aux barreaux en pique coupée en deux par une grecque et accroché à des pilastres avec de gros pots à feu. Son large fronton est décoré d'un double écu aux armes sous une couronne de marquis, le tout flanqué de drapeaux, d'un carquois et d'autres attributs guerriers. Le château et ses dépendances ont été rebatis en 1757, château de brique et pierre à deux étages avec de hauts combles à lucarnes.","habitants":"la famille Cossart d'Espiès\"","divers":"Château d'Omécourt à Omécourt 49° 36' 39? nord, 1° 50' 54? est","gps":"","images":["../../jctruffet.com/image/image_60/60_Om%c3%a9court_1.jpg","../../jctruffet.com/image/image_60/60_Om%c3%a9court_2.jpg"]},"Consult_chateau_formulairefdcd":{"id":"Consult_chateau_formulairefdcd","dept":"60","canton":"Compiègne","commune":"Pierrefonds","nom":"Pierrefonds","type":"Forteresse","periode":"XII-XIV-XVI","histoire":"PIERREFONDS  Au XIIe siècle, s'élevait déjà sur le site, construit par le puissant lignage des Nivelon, seigneurs de Pierrefonds, originaires de Quierzy. Il n'en reste que des caves situées sous le logis du XIVe. Ce château passe à la fin du XIIe siècle au roi Philippe Auguste et demeure ensuite dans le domaine royal. En 1392, le Roi Charles VI donne le comté de Valois et plusieurs châtellenies, dont Pierrefonds, à son frère Louis d'Orléans: en 1406, le Roi érige le comté en duché, y incluant entre autres Pierrefonds. En 1396, Louis d'Orléans entreprend la reconstruction quasi totale du château, l'architecte n'est pas connu, bien qu'on puisse sans doute l'attribuer à Raymond du Temple, le chantier fut dirigé par le maître des oeuvres de la châtellenie de Senlis, Jean le Noir et supervisé, après la mort de Raymond du Temple, par le maître général des oeuvres du duché Jean Aubelet, après l'assassinat du duc en 1407, les travaux s'interrompirent. En mars 1617, dans les débuts troublés du règne de Louis XIII, le château est propriété de François Annibal d'Estrée (frère de Gabrielle d'Estrée), membre du \"parti des mécontents\" mené par Henri II de Bourbon Condé, prince de Condé. L'édifice est assiégé et pris par les troupes envoyées par Richelieu, secrétaire d'État à la guerre, son démantèlement est entrepris, mais pas mené à son terme en raison de l'ampleur de la tâche. Les ouvrages extérieurs sont rasés, les toitures détruites, et des saignées sont pratiquées dans les tours et les courtines. Le château restera en ruines pendant plus de deux siècles. Napoléon Ier le rachète vers 1810.  Au cours du XIXe siècle, l'engouement pour le patrimoine architectural du Moyen-Âge le fait devenir une \"ruine romantique\": en août 1832, Louis-Philippe y offre un banquet à l'occasion du mariage de sa fille Louise avec Léopold de Saxe Cobourg Gotha, premier roi des Belges.","architecture":"PIERREFONDS, Louis Napoléon Bonaparte visite le château de Pierrefonds en 1850 et sur les conseils de Prosper Mérimée, celui-ci devenu l'empereur Napoléon III, demande à l'architecte Eugène Viollet-le-Duc d'entreprendre sa restauration en 1857. Une anecdote raconte que l'empereur hésitant entre la restauration du château de Pierrefonds et celle d'un autre château, l'impératrice Eugénie lui proposa un tirage au sort dont sortit le nom de Pierrefonds. Et pour cause: pour satisfaire sa préférence elle aurait écrit ce nom sur les deux papiers du tirage, il n'est alors question que d'une simple remise en état des parties habitables (donjon et deux tours), les ruines \"pittoresques\" devant subsister pour le décor. En 1862 le projet prend de l'ampleur: le souverain désire cette fois ci d'en faire une résidence impériale, le château doit donc être entièrement reconstruit. Les travaux, qui auront coûté 5 millions de francs de l'époque, seront arrêtés en 1885, six ans après la mort de Eugène Viollet-le-Duc. Faute d'argent, la décoration des salles reste inachevée. Eugène Viollet-le-Duc fera un travail d'invention pour l'intérieur et de recréation beaucoup plus que de restauration. Il imaginera comment aurait dû être le château, sans se baser sur l'histoire de la demeure. La cour intérieure avec ses galeries Renaissance, tout autant que les peintures polychromes d'inspiration médiévale témoignent de son éclectisme et de sa liberté d'interprétation, on reconnaît par contre dans l'architecture extérieure sa connaissance de l'art castral du XIVe siècle. L'architecte s'offrira dans le parc et les fortifications un éventail éclectique des constructions défensives des autres époques. Il a laissé libre cours à une inspiration personnelle, travail qui n'est pas sans rappeler celui effectué par l'architecte au château de Roquetaillade. Mort avant la fin du chantier, son gendre Maurice Ouradou, terminera la reconstruction.","habitants":"Famille de François Annibal d'Estrée\"","divers":"Forteresse de Pierrefonds à Pierrefonds","gps":"","images":["../../jctruffet.com/image/image_60/60_Pierrefonds_1.jpg","../../jctruffet.com/image/image_60/60_Pierrefonds_2.jpg","../../jctruffet.com/image/image_60/60_Pierrefonds_3.jpg","../../jctruffet.com/image/image_60/60_Pierrefonds_4.jpg"]},"Consult_chateau_formulaire3413":{"id":"Consult_chateau_formulaire3413","dept":"60","canton":"Compiègne","commune":"Pierrefonds","nom":"Pierrefonds_Chateau","type":"Forteresse","periode":"XIX","histoire":"trois châteaux dans cet article Pierrefonds, Hermitage et Joval PIERREFONDS, si ses détracteurs lui ont reproché cette réinvention d'une architecture néo-médiévale, qui prenait de larges libertés avec la vérité archéologique, Eugène Viollet-le-Duc a montré d'un exceptionnel sens de l'élévation, de la volumétrie et d'une incontestable sensibilité du site dans cette reconstruction. Le parc également conçu par Eugène Viollet-le-Duc comme un musée de la fortification en plein air, est totalement accessible au public. A découvrir également dans le parcours de visite du château, le \"bal des gisants\", une scénographie pérenne de la galerie des gisants, véritable trésor méconnu du patrimoine français, une exposition permanente sur les plomberies dart des ateliers Monduit, qui ont participé à la plupart des grands chantiers de restauration dans les monuments historiques aux XIXe et XXe siècles.\nÉléments protégés MH : le ce château de Pierrefonds en totalité : classement par liste de 1862.                                                                               HERMITAGE à la fontaine des roches ce charmant manoir de style anglo-normand date de la fin du XIXe siècle. Il est adossé à la forêt de Compiègne et domine une vaste clairière de 10 hectares, où chevaux et cervidés sauvages cohabitent en toute quiétude. Le domaine comprend 5 chambres de charme dont 3 avec terrasse, un salon de lecture à l'étage. Salon avec cheminée.","architecture":"JONVAL,  il se trouve face au château de Pierrefonds, caché par les bois. Le comte de Failly, un rémois fortuné, fit construire le château de Jonval. Mark Dumas, son propriétaire russe actuel, a racheté le château de Jonval à une association qui portait son nom. Des travaux ont été menés dans les dépendances pour qu'il puisse y vivre et l'extérieur du château a été rénové. Mark Dumas, de 44 ans, souhaite redonner à la ville historique son rayonnement d'antan. Au XIXe siècle, la ville s'appelait encore Pierrefonds-les-Bains et attirait de nombreux curistes grâce à son établissement des bains. Une quarantaine de trains effectuaient des liaisons quotidiennes avec la Capitale. Un casino avait même été construit près des sources. La renommée de Pierrefonds était telle que l'impératrice Eugénie, très attirée par le thermalisme, y venait à l'occasion. L'intérieur du château est en cours de restauration. Dans ses 2 ha de verdure, le Russe souhaite créer un « jardin futuriste » qui ouvrirait au Public, au printemps 2017. Les promeneurs pourront arpenter les allées où des fontaines seront installées, admirer des sculptures en bronze et des cascades, observer des arbres aux formes insolites. Un jardin fait de légumes flottants sera également planté et des passages souterrains seront créés. Les gérants du château sont Grivko Aleksander et Mark Dumas, qui mènent actuellement un projet similaire à Etretat (Seine-Maritime). La société du château de Jonval est une société civile immobilière, créée le 21.09.2006. , elle est spécialisée dans le secteur d'activité de la location de terrains et d'autres biens immobiliers.","habitants":"Famille de Mars Dumas,                                      Eugène Viollet-le-Duc\"","divers":"Forteresse de Pierrefonds à Pierrefonds  et l'Hermitage  grav-1 GPS : 49° 21' 06\" Nord, 2° 58' 53\" Est          et   Jonval  grav-3                                              GPS : 49° 21' 06\" Nord, 2° 58' 53\" Est","gps":"49° 21' 06\" Nord, 2° 58' 53\" Est          et   Jonval  grav-","images":["../../jctruffet.com/image/image_60/60_Pierrefonds_Chateau_1.jpg","../../jctruffet.com/image/image_60/60_Pierrefonds_Chateau_2.jpg","../../jctruffet.com/image/image_60/60_Pierrefonds_Chateau_3.jpg"]},"Consult_chateau_formulaire9af5":{"id":"Consult_chateau_formulaire9af5","dept":"60","canton":"Crépy-en-Valois","commune":"Vauciennes","nom":"Plessis_au_Bois","type":"Manoir","periode":"XVII-XVIII","histoire":"deux châteaux dans cet article; Plessis au Bois et Boursonne.                     PLESSIS au BOIS   le manoir est attesté depuis 1180, il présente un vieux logis central du XVe siècle avec des fenêtres à meneaux et des pignons à redents, un donjon hexagonal en briques et pierres début Renaissance avec deux tourelles sur contrefort. Au nord une tour de guet et au sud une tour carrée. Le manoir a appartenu à la famille de Noüe jusqu'au milieu du XVIIe siècle, puis entre autres à Philippe d'Orléans, frère de Louis XIV et à son fils le Régent. Le manoir est composé de deux ailes en retour d'équerre liées par une tourelle avec échauguette sur cul-de-lampe mouluré. Le logis d'habitation, partie la plus ancienne, se prolonge au nord par une tour monumentale en brique et pierre à trois niveaux. L'autre aile présente une élévation orientale très soignée : la façade est divisée en travées soulignées de pilastres plats surmontés de chapiteaux à corbeille nue et d'un entablement. Cette aile a peut-être eu une fonction d'écurie et grenier à foin. Une ambiance énigmatique enveloppe Le Plessis au Bois avec sa cour pavée, son logis et ses sept jardins évoquant la Genèse, conçus par Diane de Longuemar, maîtresse des lieux et sculpteur accompli. On y trouve des arbustes à baies, un bassin vivier cerné d'iris et de glycines, puis un potager fleuri avec vignes, pommiers et poiriers palissés, un canal d'eau, des rosiers grimpants et un boulingrin. Éléments protégés MH : le manoir, y compris le pavillon d'entrée, les murs de clôture et le colombier : inscription par arrêté du 8 novembre 1999.","architecture":"Au sud de Vauciennes à trois K.M.BOURSONNE  Située en bordure de la forêt de Villers-Cotterêts dans le Valois Boursonne a appartenu pendant trois siècles à la famille de Capendu. Charles de Capendu, vicomte de Boursonne, maître des eaux et forêts du bailliage de Valois, marié le 25 février 1602 à Antoinette de Sébouville.","habitants":"Boursonne; famille de Capendu\"","divers":"deux châteaux dans cet article; Plessis au Bois grav-1-2-3 et Boursonne grav-4 .       Boursonne                                                 gps 49° 12' 12? nord, 3° 02' 46? est","gps":"","images":["../../jctruffet.com/image/image_60/60_Plessis_au_Bois_1.jpg","../../jctruffet.com/image/image_60/60_Plessis_au_Bois_2.jpg","../../jctruffet.com/image/image_60/60_Plessis_au_Bois_3.jpg","../../jctruffet.com/image/image_60/60_Plessis_au_Bois_4.jpg"]},"Consult_chateau_formulaire4740":{"id":"Consult_chateau_formulaire4740","dept":"60","canton":"Thourotte","commune":"PLessis-Brion","nom":"Plessis_Brion","type":"Château","periode":"XV-XVI","histoire":"PLESSIS-BRION, les seigneurs du Plessis possèdent  une maison forte à l'emplacement du château actuel  commençait au XVe siècle,  très bel édifice du début du XVIe siècle, édifié par Jean de Poumereux, grand maître d'artillerie de François Ier, qui unit des caractères défensifs aux influences de la première Renaissance. se succèdent les Fransures, puis les Alègres et au XVII Philippe de Béthune en est le seigneur comte de Selles et de Charost marquis de Chabris. Sully seigneur de Plessis Brion après lui ,le domaine passe  aux Guéroult de Montmarin, puis aux Collier  au XVIIIe siècle Jean Nicolas Martigny de la Boissière alors proprietaire du Plessis fait installer une grille  de fer forgé de style louis XV, les héritiers cèdent le domaine à Nicolas, baron de Bréda issu d'une branche cadette de l'illustre maison de Nassau, les descendants conserveront le plessis  jusqu'à la veille de la seconde guerre mondiale le château fit l'objet d'une nouvelle campagne de restauration dès 1920 sous la direction d'Abel Mahieu et  après avoir appartenu aux Fay aujourd'hui le propriétaire actuel est la famille Lafon de Lageneste du colonel comte.","architecture":"PLESSIS-BRION, au cours des siècles, le château subit des campagnes successives d'aménagement et de restauration. Suite aux dommages causés par la première guerre mondiale, Le parc a été refait à la fin du XIXe siècle. Le Plessis-Brion est le seul château renaissance de l'Oise.  L'édifice avec ses grosses tours  présente des réminiscenses médièvales. construits en briques roses, flanqués à ses angles extérieurs de deux grosses tours rondes coiffés de toits en poivrières sous une couronne de merlons et de crénaux, sur la cour dont l'un des côtés est bordé par une aile en retour d'équerre, une tourelle polygonale hors oeuvre occupant le centre de la façade abrite l'escalier. Elle à conservé un portail en anse de panier à beau décor sculpté. encadrées de chaînages de pierre blanche. Éléments protégés MH : le portail d'entrée du XVIe siècle ; la grille du XVIIIe siècle sur la route de Rebécourt : inscription par arrêté du 26 juin 1946. Les façades et les toitures du château ; le sol de la cour d'honneur ; les murs dominant les fossés ; les caves et l'escalier principal du château : classement par arrêté du 19 avril 1991.","habitants":"Famille de Jean de Poumereux,\"","divers":"Château de Plessis  Brion","gps":"","images":["../../jctruffet.com/image/image_60/60_Plessis_Brion_1.jpg","../../jctruffet.com/image/image_60/60_Plessis_Brion_2.jpg","../../jctruffet.com/image/image_60/60_Plessis_Brion_3.jpg"]},"Consult_chateau_formulairecf62":{"id":"Consult_chateau_formulairecf62","dept":"60","canton":"Pont-Sainte-Maxence","commune":"Pontpoint","nom":"Pontpoint","type":"Château","periode":"XII-XIV-XIX","histoire":"Trois châteaux dans cet article, St-Paterne, Bois-Feuillette et la Tour de Fécamp .                                                                                                                           ST PATERNE La construction du manoir de Saint-Paterne date du début du XIVe siècle. Le manoir de Saint-Symphorien également appelé le manoir de Saint-Paterne, du nom du hameau et de la rue où il se situe, son édification remonte  au début du xive siècle. Une affirmation tenace voulant quil ait été bâti par l'ordre des Templiers, dissout par ordre du pape en 1312 quand la construction du manoir n'était probablement même pas achevée. Selon une autre tradition, le manoir aurait servi de chancellerie à Philippe le Bel. Aucune source ne confirme cette version et l'on peut y opposer le décès de ce roi intervenu en 1314. Le manoir de Saint-Symphorien fut érigé en fief en 1659. À la Révolution Française, vendu comme bien national, il fut transformé en ferme. Racheté en 1920, ses trois derniers propriétaires ont procédé à un travail remarquable de réhabilitation. On le visite uniquement lors des Journées du Patrimoine mais ses façades nord et est sont bien visibles depuis la rue. De deux granges furent rajoutées plus tard. Le Manoir de Saint-Paterne servit de chancellerie, à Philippe Le Bel, puis au XVIIe siècle, de résidence à Philippe Poulet, gouverneur de Pont-Sainte-Maxence et Maréchal des Armées royales. Le manoir de Saint-Paterne a été classé aux M.H. depuis le 11/01/1921.","architecture":"BOIS-FEUILLETTE, château de Bois-Feuillette, chemin de Crépy : construit en 1903 dans le style classique, il est légèrement inspiré par le palais de la Légion d'honneur à Paris: un corps central d'un plan semi-circulaire faisant saillie devant la façade, orné par quatre colonnettes ioniques, et supportant une coupole ; absence d'étage. Chaque fenêtre du rez-de-chaussée est surmontée par un cartouche rectangulaire contenant un bas-relief. Contrairement au modèle parisien, le château de Bois-Feuillette est doté d'un toit à la Mansart, précédé d'un balcon avec une balustrade courant le long de toute la façade principale. Ce château fut par ailleurs le domicile du général Pierre Billotte (1906-1992), compagnon de la Libération et Grand Officier de la Légion d'honneur.  La magnifique grille d'entrée du château de Bois-Feuillette, à l'ouest de la commune.   et  le château de Bois-Feuillette, à l'ouest de la commune près de Pont-Sainte-Maxence. Le château a été équipé de volets roulants en plastique.                  TOURS de FECAMP, rue du Moncel.  Il s'agit de vestiges d'un ancien manoir royal, comportant à l'origine quatre tours, dont la moitié a disparu Ce manoir fut construit pour le roi Philippe le Bel à partir de 1306, en transformant un manoir plus modeste dont la construction avait été entamée en 1290 par Philippe de Beaumanoir.Le logis entre les deux tours n'a aucun rapport avec l'ancien manoir royal ; il ne date que du XIXe siècle. L'appellation des vieilles tours  fait référence à Jacques de Villiers, seigneur de Fécamp et gardien du domaine au début du XVIIe siècle.","habitants":"St-Paterne;  Famille de Philippe Poulet bois feuillette\"","divers":"Trois châteaux dans cet article, St-Paterne grav-1, Bois-Feuillette grav-2  et la Tour de Fecamp  grav-3                                                                     GPS : 49° 18' 07\" Nord, 2° 38' 28\" Est","gps":"49° 18' 07\" Nord, 2° 38' 28\" Est","images":["../../jctruffet.com/image/image_60/60_Pontpoint_1.jpg","../../jctruffet.com/image/image_60/60_Pontpoint_2.jpg","../../jctruffet.com/image/image_60/60_Pontpoint_3.jpg"]},"Consult_chateau_formulaire29f8":{"id":"Consult_chateau_formulaire29f8","dept":"60","canton":"Chaumont-en-Vexin","commune":"Pranes","nom":"Pranes_Alincourt","type":"Château","periode":"XVII-XVIII","histoire":"Deux chateaux dans cet article Alincout et Vaudancourt. ALINCOURT, forme un ensemble étonnant de constructions disparates mises en scène, Un manoir existait déjà lorsque Pierre Le Gendre, trésorier de France sous les règnes de Louis XII et François 1er, fait l'acquisition du domaine en 1488, le Gendre  agrandira  le manoir primitif, travaux poursuivis aux XVIe et XVIIe siècles par la puissante famille de Neufville-Villeroy dont plusieurs membres seront titulaires de charges importantes pendant cette période. cette famille s'en defait en  1734, passa en 1774 à Joseph Florent de Vallière marquis, après la Révolution le domaine revient à sa fille Charlotte qui épouse Pierre Robert de Bobièrre puis aux deux enfants du ménage Bobière Alfred et Charlotte allié au général Rémond lequel mourra en ce château en 1859 resté dans la descendance des Bobière jusqu'en 1976 et a été racheté est passé à la comtesse Hubert le Grelle, et  en janvier 2009, par Alain Duménil.  Éléments protégés MH : le château ainsi que le bâtiment des communs, les fortifications, le colombier et le parc : classement par arrêté du 1er février 1944.                                                                     VAUDANCOURT  le château de Vaudancourt construit au XVIIe siècle, pour la famille de Pellevé, seigneurs de Boury et propriétaire du fief de Vaudancourt. Les jardins avec l'étang, sont inscrit au pré-inventaire des jardins remarquables.","architecture":"ALINCOURT, la construction du château d'Alaincourt date du XV au XVIIe siècle, seigneur de Villeroy  (mort en 1512). Pierre Le Gendre  était, de 1485 à 1498, receveur des tailles et subsides à Rouen. Il voyageait souvent entre Rouen et Paris, et cette implantation dans le Vexin français se trouvait assez proche de ces deux villes, dans une région d'où était originaire la 3ème épouse de son père, Françoise de Damport. À partir de 1498, il se fixa à Paris. Il fit, dans son domaine, des travaux importants, rajoutant au manoir médiéval de nouveaux bâtiments lui donnant une physionomie singulière. La famille de Neufville-Villeroy a fait effectuer des travaux, au XVIIe siècle. L'église de Magny-en-Vexin conserve les tombeaux de plusieurs d'entre eux. Pierre Le Gendre, seigneur d'Alincourt et de Magny-en-Vexin, est mort en 1525. L'inventaire après décès a été dressé le 18/02/1525. Il s'était remarié en 1512 avec Charlotte Briçonnet, appartenant à une famille bourgeoise riche et anoblie. N'ayant pas eu d'enfant, il avait testé en faveur de son neveu, Nicolas II de Neufville.  le château  est entourée d'une enceinte basse par laquelle on pénètre par une rampe s'encadrant entre deux piliers de pierre, le manoir  est plaquée d'une tour d'ecalier dotée d'une porte gothique et flanquée d'une aile en retour terminée côté sud par un pignon cantonné de deux tourelles du XVe siècle. la tour du général de plan octogonnal qui occupe l'angle de la façade nord sur un bâtiment comportant un rez-de- chaussée et un étage, joint à cette tour au donjon, une tourelle à chaque angle. la basse cour est séparée par un grand corps de dépendances au centre duquel s'ouvre le porche d'entrée, surmonté d'un fronton encadré de deux tourelles.","habitants":"Alinbcourt  famille de Neufville-Villeroy                          Vaudancourt;  famille de Pellevé         \"","divers":"Château à Pranes                                   Alincourt Grav 1-2-3-4  GPS : 49° 11' 10\" Nord, 1° 45' 32\" Est                                                          Vaudancourt grav -5-6  49° 14' 03? nord, 1° 45' 23? est","gps":"49° 11' 10\" Nord, 1° 45' 32\" Est","images":["../../jctruffet.com/image/image_60/60_Pranes_Alincourt_1.jpg","../../jctruffet.com/image/image_60/60_Pranes_Alincourt_2.jpg","../../jctruffet.com/image/image_60/60_Pranes_Alincourt_3.jpg","../../jctruffet.com/image/image_60/60_Pranes_Alincourt_4.jpg","../../jctruffet.com/image/image_60/60_Pranes_Alincourt_5.jpg","../../jctruffet.com/image/image_60/60_Pranes_Alincourt_6.jpg"]},"Consult_chateau_formulairebae9":{"id":"Consult_chateau_formulairebae9","dept":"60","canton":"Estrées-Saint-Denis","commune":"Pronleroy","nom":"Pronleroy","type":"Château","periode":"XVI","histoire":"PRONLEROY, au bas Moyen Âge, le village dépend initialement du comté de Clermont, et est donné en partie à l'abbaye Notre-Dame de Breteuil en 1035 par Guildin comte de Clermont. Au XVIe siècle, la seigneurie de Pronleroy passa dans les mains de la famille de Lancry, par le mariage d'Antoinette Hérault, dame de Pronleroy et de Riffard, avec Jean IV de Lancry écuyer seigneur de Bains, et Boulogne la Grace. La famille Lancry s'illustre par de nombreux militaires. En 1806, madame de Lancry de Pronleroy donna un exemple utile en se soumettant elle et ses jeunes enfants, au procédé de la vaccination contre la variole, en présence d'une nombreuse assemblée. Les Lancry, pour ne pas réduire ses ouvriers au chômage, fit continuer le travail, s'endetta, fit des emprunts onéreux, et finalement, pour faire honneur à ses engagements, dût vendre toutes ses propriétés de Pronleroy. Étienne Marcel se compromet par son alliance avec Charles II le Mauvais. Les bourgeois, devant le mécontentement de la population, se tournent alors vers le parti royaliste de Jean Maillard. Alors qu'il essaie de faire entrer Charles II le Mauvais dans Paris au milieu de la nuit, Étienne Marcel est surpris par l'échevin Jean Maillard, qui l'exécute le 31 juillet 1358, devant la Porte Saint-Antoine. Dans les jours qui suivent, ses partisans sont mis à mort. Le dauphin est rentre triomphalement à Paris deux jours plus tard. Charles le Mauvais, voyant la situation se retourner, opère un nouveau renversement d'alliance et va écraser la jacquerie dans le sang à Mello. La dernière rencontre entre les Jacques et les seigneurs a lieu entre Nointel et Catenoy, au lieu-dit le Champ de Bataille","architecture":"PRONLEROY  Guillaume Cale a la tête tranchée sur la grand-place de Clermont et 3 bourgeois, Pierre le Cirier, Jean Alliaume et Henri du Breuil, reçoivent des lettres de rémission pour avoir pillé pendant cette période le château d'Ermenonville Le château de Pronleroy était pendant la première guerre mondiale le poste de commandement du Général Mangin qui lança, le 11 juin 1918, la contre-attaque de Méry Courcelles, et qui fut la première offensive victorieuse des armées françaises en 1918 qui arrêta la marche des armées allemandes sur Compiègne.   Éléments protégés MH : les pavillons d'entrée, la grille, l'avenue, les bâtiments des communs ; le pigeonnier ; le château: inscription par arrêté du 14 septembre 1949.","habitants":"Famille de Lancry\"","divers":"Château à Pronleroy","gps":"","images":["../../jctruffet.com/image/image_60/60_Pronleroy_1.jpg","../../jctruffet.com/image/image_60/60_Pronleroy_2.jpg"]},"Consult_chateau_formulaire06d8":{"id":"Consult_chateau_formulaire06d8","dept":"60","canton":"Méru","commune":"Puiseux-le-Hauberger","nom":"Puiseux","type":"Château","periode":"XVII-XIX","histoire":"PUISEUX, le pavillon d'Armentières fut construit vers 1825 à la demande de madame Boula de Mareuil, ancêtre de l'actuel propriétaire.  Au XVIIe siècle, le château de Puiseux fut agrandi. Le pavillon central à 3 étages en pierre blanche. A droite et à gauche, des galeries cintrées imaginées ou refaites avec adresse, au XIXe, joignent le corps principal à 2 bâtiments dont l'un, du XVIIIe siècle, est nommé le château d'Aguesseau. Le marquis Henri François d'Aguesseau, chancelier de France sous le roi Louis XV, possédait Puiseux. qu'il fit entièrement rénové, a été, au cours du XXe siècle, la demeure de la famille de Maistre, descendante du célèbre philosophe savoyard, Joseph de Maistre.","architecture":"PUISEUX le château de Puiseux est formé d'apports successifs des XVIIe, XVIIIe et XIXe siècle. La partie la plus ancienne du château (pavillon d'Aguesseau) fut édifiée au XVIIe siècle. Le pavillon central, dit d'Armentières fut construit par le marquis à partir de 1752 et le pavillon d'Aguesseau fut également remanié à cette époque. L'aile sud et les deux ailes basses de part et d'autre . Le décor intérieur de la demeure est  composé.   Éléments protégés MH : l'ensemble du château à l'exclusion des communs du XIXe siècle ; les boiseries des deux chambres à alcôve au deuxième étage du pavillon d'Aguessau ; les boiseries des trois salons du rez-de-chaussée du pavillon d'Armentières : inscription par arrêté du 10 décembre 1986.  Au XVIIe siècle, le château de Puiseux fut agrandi. Le pavillon central à 3 étages en pierre blanche.","habitants":"Le marquis Henri François d'Aguesseau\"","divers":"Château à Méru                                      Puiseux   GPS : 49° 13' 03,26\" Nord, 2° 14' 08,43\" Est","gps":"49° 13' 03,26\" Nord, 2° 14' 08,43\" Est","images":["../../jctruffet.com/image/image_60/60_Puiseux_1.jpg","../../jctruffet.com/image/image_60/60_Puiseux_2.jpg","../../jctruffet.com/image/image_60/60_Puiseux_3.jpg"]},"Consult_chateau_formulaireb633":{"id":"Consult_chateau_formulaireb633","dept":"60","canton":"Noyon","commune":"Quesmy","nom":"Quesmy","type":"Manoir","periode":"XIX","histoire":"QUESMY, la terre de Quesmy eut pour premier seigneur connu de la maison Macquerelle, en la personne de Jean de Macquerel, écuyer, qui épousa Marie de Quierzy. La seigneurie passa à Louis de Macquerel, chevalier, fils de Louis et d'Isabelle Testu; il fut seigneur de Rimbercourt de la Warde et de Quesmy, ainsi que gouverneur de la citadelle de Noyon. Il épousa en 1572 Charlotte de Valpergue. Jean de Macquerel, seigneur de Quesmy, qui épousa Françoise de Bétancourt, restée veuve, la seigneurie échut à son fils Louis de Macquerel, chevalier, seigneur de Quesmy et d'autres lieux. Il mourut le 13 décembre 1780 dans son château et fut inhumé dans la chapelle de l'église de Quesmy. En 1653, la demeure est incendiée par les armées espagnoles. Un écuyer du roi, Jean de Maquerel fut l'heureux propriétaire, sa descendance gardera le château jusqu'au XIXe siècle.","architecture":"QUESMY,  durant la première guerre mondiale, il abritait un hôpital militaire allemand et fut détruit au départ des troupes en 1917. Il fut reconstruit dans son aspect actuel en 1919 par un industriel du sucre de la région. La grande dépendance est demeurée intacte, bien que son toit et été rénové. Le jardin à la Française est resté dessiné comme à l'origine tout autant que le portail et les douves.","habitants":"Famille de Macquerelle\"","divers":"Quesmy GPS : 49° 38' 05\" Nord, 3° 03' 36\" Est","gps":"49° 38' 05\" Nord, 3° 03' 36\" Est","images":["../../jctruffet.com/image/image_60/60_Quesmy_1.jpg"]},"Consult_chateau_formulaire35de":{"id":"Consult_chateau_formulaire35de","dept":"60","canton":"Pont-Sainte-Maxence","commune":"Raray","nom":"Raray","type":"Château","periode":"XIII-XVII","histoire":"RARAY, l'histoire de Raray remonte au XIIIe siècle avec comme premier propriétaire la famille Bouteiller de Senlis. Se succéderont Robert de Cressonnart, évêque de Senlis, Arnoult d'Audename, les Ghistelles et les Ligny en 1464. Ceux-ci garderont les terres durant tout le XVe siècle. Vers 1600, les terres sont vendues à Nicolas de Lancy, conseiller du Roi, trésorier général de l'ordinaire des guerres et Chambellan du duc d'Orléans. C'est lui qui est le bâtisseur du château actuel et les deux haies cynégétiques qui feront la renommée et l'honneur du château La terre de Raray fût érigée en marquisat par Louis XIV en 1654. Passé par les Lancy  à celle des  le  comte de Nonant de Pierrecourt. Mme de Sévigné y séjourna, elle était la cousine des Lancy. En 1760 Raray acquit par le marquis de Barres  et en 1782, par alliance  de la fille  du marquis de Barres au marquis de Bédoyère, la vicomtesse en hérita de Raray est Charles de la Bédoyère propriétaire de Raray. Une collections de tableaux légués par Mme Geoffrin tante de M. de le Bédoyère qui serait encore propriétaire aujourd'hui.   Les haies cynégétiques: quatre chiens, un cerf, un sanglier et 18 niches de chaque côté, habitées par des bustes d'empereurs romains et d'impératrices, ainsi que des dieux de l'Olympe, parmi lesquels on reconnaît Flore, Diane, Mercure, Apollon et Bacchus, et des personnages contemporains de Nicolas de Lancy.","architecture":"RARAY, date du XVIIe et XVIIIe siècle. Les quatre façades et les toitures ; les murs et balustrades entourant la cour d'honneur et la porte rouge donnant sur la forêt sont classé aux M.H. depuis le 25/11/1924. Le bâtiment longeant la place, le pigeonnier et le bâtiment (à droite de la cour de Brasseuse) de la ferme : inscription par arrêté du 22 août 1949. Le mur de clôture avec ses quatre tourelles y compris le mur pignon des anciennes écuries et son échauguette (à l'exception de la porte rouge déjà classée : inscription par arrêté du 5/06/1967. Les deux plafonds peints du XVIIe siècle du rez-de-chaussée et du premier étage : classés par arrêté du 3 octobre 1983.  Le château de Raray possède de superbe balustrades, dans la cour d'honneur, à l'Est. La porte Rouge ou porte de Diane, (ou porte de la Licorne), évoque la chasse fabuleuse de la Licorne, premier épisode représentant la Belle et la Bête, l'histoire disant que la licorne animal sauvage ne peut se laisser prendre que par une vierge. Le parc servit au tournage, en 1945, par Jean Cocteau du film La Belle et la Bête.","habitants":"famille Bouteiller de Senlis\"","divers":"Château de Raray   à Raray   GPS : 49° 15' 37\" Nord, 2° 42' 55\" Est","gps":"49° 15' 37\" Nord, 2° 42' 55\" Est","images":["../../jctruffet.com/image/image_60/60_Raray_1.jpg","../../jctruffet.com/image/image_60/60_Raray_2.jpg","../../jctruffet.com/image/image_60/60_Raray_3.jpg","../../jctruffet.com/image/image_60/60_Raray_4.jpg"]},"Consult_chateau_formulaire5d62":{"id":"Consult_chateau_formulaire5d62","dept":"60","canton":"Saint-Just-en-Chaussée","commune":"Ravenel","nom":"Ravenel","type":"Château","periode":"XVIII","histoire":"RAVENEL, la construction du château de Ravenel date du XVIIIe siècle. La seigneurie appartenait au XVIe siècle à la famille de Ravenel, et elle passa à la famille de Guillebon. En 1750, elle fut vendue à M. Bouchart qui la revendit à la famille de Guermante. Mlle de Obsonville le conserva le temps de la Révolution. Louis Ernest Prondre, marié à Marguerite Joseph de Rothe, dont la mère Mme de la Vaulx, fut la dernière femme du maréchal de Richelieu, transmit la seigneurie à sa fille Emma Louise Joséphine Prondre de Ravenel, épouse du comte Joseph Marie Scipion de Chazelles. Le domaine de Ravenel passe ensuite à sa fille, qui épousa, en 1855, d'Edmond Ratisbonne, receveur des Finances et trésorier-payeur-général, petit-fils d'Auguste Ratisbonne, qui deviendra maire de Ravenel. Le jardin d'agrément a été inscrit au Pré-inventaire des Jardins Remarquables. La Famille Ratisbonne conserva le château de Ravenel, jusqu'en 1969.","architecture":"RAVENEL; l'édifice Le chateau de Ravenel est un magnifique château du XVIIIe siècle, se compose d'un bâtiment principal de plan rectangulaire à deux niveaux , corps de logis compris entre une tour carrée et un pavillon à quatre travées,toits brisée pour le corps de logis et toit en croupe pour le pavillon avec lucarnes sur les deux bâtiments,  et d'une aile, accueillant 8 appartements ainsi que d'un jardin d'agrément ayant été inscrit au pré-inventaire des jardins remarquables, dans un parc dun hectare.","habitants":"Famille de Ravenel\"","divers":"Ravenel  GPS : 49° 30' 59\" Nord, 2° 30' 07\" Est","gps":"49° 30' 59\" Nord, 2° 30' 07\" Est","images":["../../jctruffet.com/image/image_60/60_Ravenel_1.jpg"]},"Consult_chateau_formulaire5f8e-2":{"id":"Consult_chateau_formulaire5f8e-2","dept":"60","canton":"Chantilly","commune":"Coye-la-Forêt","nom":"Reine_Blanche","type":"Château","periode":"XIII-XVII","histoire":"La REINE BLANCHE,  limpératrice Elisabeth dAutriche séjourna au château en 1882. Le duc d'Aumale l'a légué à l'Institut de France, le château de la Reine Blanche date du XIIIe et XIXe siècle. Dubois Victor en fut l'architecte), Boichard et Thierry,  en furent les sculpteurs. Le château de la Reine Blanche (1825/1826), fut édifié pour le duc de Bourbon,  petit château. Éléments protégés MH : le château avec les décors intérieurs des petits et grands salons (lambris du XVIIIe siècle), son parc, ses aménagements hydrauliques, les douves en eau, le pont métallique de Pinel, les deux pavillons d'entrée et la ferme : inscription par arrêté du 2 avril 2002.","architecture":"La REINE BLANCHE , ce petit édifice d'époque médiévale fut transformé en moulin, connu sous le nom de loge de Viarmes. Situé au nord du village, le château actuel est dû au prince de Condé qui l'a fait reconstruire dans les années 1760-1770 dans un style néo-classique. Les aménagements hydrauliques du parc datent du XVIIe siècle (propriété de Toussaint Roze, secrétaire du cabinet de Louis XIV). Vers 1770, Condé installa une manufacture d'indiennes dans les dépendances du château profitant de la rivière toute proche pour son énergie motrice. C'est le début de l'activité industrielle dans le village. Les dépendances ont été remaniées à la suite d'un incendie en 1829 et aménagées en logements au XXe siècle. Le château de la Reine Blanche date du XIIIe et XIXe siècle. En 1825 et 1826, il fut transformé dans le goût néo-gothique alors naissant, à la demande du Duc de Bourbon.  Le château de la Reine Blanche constitue un témoignage  précoce du goût néo-gothique qui accompagna la redécouverte de l'art médiéval au début du XIXe siècle. L'abondante iconographie romantique à son sujet en a fait un des archétypes du genre. Le château de la Reine Blanche est à voir absolument! Il est magnifique ! Il a été classé aux M.H. depuis 9/05/1989.","habitants":"limpératrice Elisabeth dAutriche s\"","divers":"Château de la Reine Blanche à Coye-la-Forêt,  GPS : 49° 09' 19,27\" Nord, 2° 28' 46,5\" Est","gps":"49° 09' 19,27\" Nord, 2° 28' 46,5\" Est","images":["../../jctruffet.com/image/image_60/60_Reine_Blanche_1.jpg","../../jctruffet.com/image/image_60/60_Reine_Blanche_2.jpg"]},"Consult_chateau_formulairec7e8-2":{"id":"Consult_chateau_formulairec7e8-2","dept":"60","canton":"Thourotte","commune":"Ribécourt-Dreslincourt","nom":"Ribécourt","type":"Château","periode":"XVIII","histoire":"RIBECOURT, bâti par le comte Nonant de Raray au XVIIIe siècle sur les restes dun ancien château,  fut successivement la propriété du chevalier de Migieu, marquis de Savigny, Etienne Gassot, chevalier vicomte de la Vienne, François Raymond Aimerie, comte de Narbonne Pelet puis à leur fils Théodore qui mourut célibataire en 1901. Ce dernier, sans descendant direct, la propriété fut légué à sa nièce, Mlle Alyette Lareinty-Tholozan. Bien que souvent pris pour cible par lartillerie allemande, il subit peu de dommages pendant la première guerre mondiale. En 1919 il servit de camp de prisonniers. Mlle Alyette de Lareinty Tholozan, sa dernière propriétaire, fut décorée de la croix de guerre, puis de la croix de la Légion dhonneur.","architecture":"RIBECOURT, la construction du chateau de Ribécourt date du XVIe au XVIIIe siècle, pour le comte Nonant de Raray, sur les restes dun ancien château.  servi de camp de prisonniers, en 1919. Sa dernière propriétaire. En 1920, elle en  fit don  au ministère des anciens combattants, pour la rééducation des mutilés. Depuis, le château de Ribécourt accueille, le lycée horticole.","habitants":"Famille du chevalier de Migieu,\"","divers":"Châteu de Ribecourt GPS : 49° 30' 39\" Nord, 2° 55' 24\" Est","gps":"49° 30' 39\" Nord, 2° 55' 24\" Est","images":["../../jctruffet.com/image/image_60/60_Rib%c3%a9court_1.jpg"]},"Consult_chateau_formulairec899":{"id":"Consult_chateau_formulairec899","dept":"60","canton":"Estrées-Saint-Denis","commune":"Ricquebourg","nom":"Ricquebourg","type":"Château","periode":"XVII","histoire":"RICQUEBOURG, le premier propriétaire fut Thomas Rivié, un aide-maréchal ferrant qui, après avoir sauvé le cheval préféré de Louvois, ministre de Louis XIV, obtient son annoblissement comme secrétaire du roi et la fourniture exclusive de chevaux pour l'artillerie royale. Placé au milieu d'un domaine boisé de 44 hectares, sur une île artificielle dans un étang, Les propriétaires se succèdent ensuite jusquen 1954, année où la famille Cambie, propriétaire actuel, installe dans le domaine un élevage de charolais, les lieux sont redevenus un paisible lieu délevage, comme initialement, avec les chevaux de Thomas Rivié.","architecture":"RICQUEBOURG,  il fut construit en 1712 , placé au milieu d'un domaine boisé de 44 hectares, sur une île artificielle dans un étang, l'édifice a été construit, en 1712, sur pilotis, à partir des fondations d'une ancienne forteresse en ruine, ou d'un ancien manoir féodal, selon les sources. Au fil des années, le bâtiment a subi quelques transformations, dont le retrait d'un étage et un jardin paysagé à l'anglaise y fut créé à la fin du XIXe siècle par des propriétaires anglais. En tant que monument sélectionné par la mission d'identification du patrimoine immobilier en péril, il fait partie des projets prioritaires du loto du patrimoine. Le jardin d'agrément du château est considéré dans l'Inventaire général du patrimoine culturel.","habitants":"famille Cambie\"","divers":"Château de Ricquebourg                            GPS : 49° 33' 18\" Nord, 2° 45' 19\" Est","gps":"49° 33' 18\" Nord, 2° 45' 19\" Est","images":["../../jctruffet.com/image/image_60/60_Ricquebourg_1.jpg","../../jctruffet.com/image/image_60/60_Ricquebourg_2.jpg","../../jctruffet.com/image/image_60/60_Ricquebourg_3.jpg","../../jctruffet.com/image/image_60/60_Ricquebourg_4.jpg"]},"Consult_chateau_formulaire81b3":{"id":"Consult_chateau_formulaire81b3","dept":"60","canton":"Pont-Sainte-Maxence","commune":"Roberval","nom":"Roberval","type":"Château","periode":"XVIII","histoire":"ROBERVAL, le château actuel date de la seconde moitié du XVIIIe siècle, construit sur les vestiges d'un édifice qui aurait été bâti au XVIe siècle et appartenait à la famille de La Rocque. Après la mort de Jean François de La Rocque en 1560, le château passa à son neveu Louis de Madaillan, fils de Charlotte de La Roque. Au XVIIIe siècle, la demeure fut profondément modifiée par Charles de Rohan, Prince de Soubise. Au début du XIXe siècle, vers 1817, M. Davène de Fontaine était propriétaire du domaine de Roberval. Ses descendants possèdent toujours le château, mais les Davène de Fontaine portent depuis le début du XXe siècle le nom de Davène de Roberval. A l'entrée du château on peut admirer un très beau colombier hexagonal datant du XVe siècle.\nÉléments protégés MH : les façades et les toitures du château ; les décors des XVIIIe et XIXe siècles ornant les pièces suivantes du rez-de-chaussée : le vestibule d'honneur, le salon d'honneur, la salle à manger et le grand salon ; le colombier et le parc : inscription par arrêté du 13 juillet 1993.","architecture":"ROBERVAL, son architecture est de style classique, ses décors datent du XVIIe et XVIIIe siècle. Le château de Roberval est la résidence privée de la famille Davène de Roberval. Au XVIIIe siècle, Charles de Rohan, Prince de Soubise fit profondément modifier le château qui datait de la Renaissance. Il fit redécorer la façade et les intérieurs dans le style Louis XVI, apportant au château son apparence actuelle. La façade est ornée dun balcon supporté par 2 colonnes aux chapiteaux doriques. La porte dentrée, en plein cintre, présente un tympan garni de bas-reliefs. La fenêtre dhonneur sur le balcon est surmontée dune guirlande végétale. Les toitures sont garnies de lucarnes au fronton triangulaire, dils de buf ovales surmontés de guirlandes et d'un bas-relief en pierre. À droite du château, le colombier hexagonal est du XVIe siècle, à l'exception de la salle basse qui représente un vestige du château médiéval. Le château de Roberval est inscrit partiellement aux M.H. depuis le 13/07/1993.","habitants":"Famille de La Rocque\"","divers":"Château de Roberval                        GPS : 49° 17' 25,44\" Nord 2° 41' 18,96\" Est","gps":"49° 17' 25,44\" Nord 2° 41' 18,96\" Est","images":["../../jctruffet.com/image/image_60/60_Roberval_1.jpg"]},"Consult_chateau_formulaire354d":{"id":"Consult_chateau_formulaire354d","dept":"60","canton":"Chaumont-en-Vexin","commune":"Liancourt","nom":"Rochefoucault_Vexin","type":"Château","periode":"XIV-XVIII","histoire":"ROCHEFOUCAULT, les communs du château de la Rochefoucault ont été construits au XVIIIe siècle. En 1780, le duc de La Rochefoucauld Liancourt crée une \"école des métiers\" pour les orphelins et fils de soldats de son régiment. Cette ferme appartient aujourd'hui au patrimoine de la fondation Arts et Métiers. Au début du XXe siècle, la famille Floquet a acquis le château  et transformé les communs en fabrique de chaussures par l'adjonction de sheds dans la cour.  Éléments protégés MH : les anciennes dépendances comprenant les communs, le pavillon du jardinier et la laiterie : inscription par arrêté du 3 décembre 1930.","architecture":"ROCHEFOUCAULT,  la construction du château  date du XIIe au XIVe siècles. Il ne subsiste actuellement que les communs de cet ancien château. L'ensemble des communs fait lobjet dune inscription au titre des M.H. depuis le 3/12/1930.","habitants":"Duc de La Rochefoucauld Liancourt\"","divers":"Château de la Rochefoucault à Liancourt GPS : 49° 19' 39\" Nord 2° 27' 42\" Est","gps":"49° 19' 39\" Nord 2° 27' 42\" Est","images":["../../jctruffet.com/image/image_60/60_Rochefoucault_Vexin_1.jpg"]},"Consult_chateau_formulaire33f2-2":{"id":"Consult_chateau_formulaire33f2-2","dept":"60","canton":"Pont-Sainte-Maxence","commune":"Sacy le petit","nom":"Sacy","type":"Château","periode":"XVI","histoire":"SACY, en 1624, Anne dAutriche se retire à labbaye Saint-Corneille ses terres de Sacy. Elle les donne à des religieuses bénédictines pour lesquelles elle fait bâtir labbaye du Val-de-Grâce à Paris, et ce afin de remercier le seigneur de lui avoir donné un fils, le futur Louis XIV. Les Pottier deviendront, de père en fils, régisseurs de ces terres. Avec l'installation religieuse apparaît la famille la Mothe Houdancourt, propriétaire dun ensemble de châteaux qui en construira aussi un  à Sacy, où mourra en 1651, Philippe de la Mothe. En 1653, Louis XIV nomme maréchal, Philippe de la Mothe-Houdancourt, en récompense de ses services à la guerre, et crée le duché-pairie du Fayel. En 1757 le marquis de Gamaches, époux de Jeanne Gabrielle de la Mothe Houdancourt, vend ce quil tient de sa femme à Sacy pour couvrir des dettes de jeu. Nicolas Pottier, régisseur des dames du Val de Grâce et son épouse, Marie-Françoise Le Brasseur, achètent les terres et le château ducal, puis en 1780 il est vendu sans son parc à Claude-François Dupressoir, cultivateur. A la fin du XIXe siècle, Henriette Félicité Dupressoir, arrière-petite-fille de Madeleine Félicité et Claude François Dupressoir, épouse un belge  naturalisé français, Emile Deneufbourg, qui sera maire du village.","architecture":"SACY, le château de Sacy est une ancienne ferme, transformée en château, sous l'Empire. Il comporte un parc à l'anglaise, un potager et une belle allée d'arbres centenaires. Ses propriétaires avaient fait fortune dans la culture de la betterave sucrière, grâce à un embargo sur le sucre de canne, provenant des îles de la Martinique. Ils complétèrent alors la transformation en remplaçant les vergers par un « parc à langlaise » selon la mode de lépoque. Hermine Williams, qui en hérita en 1994, est la descendante de la famille qui, il y a 200 ans, fit transformer la ferme en ce château, entouré darbres, se situe à lentrée du village.","habitants":"Famille La Mothe Houdancourt,\"","divers":"Château à Sacy le Petit                                          Sacy GPS : 49° 21' 42\" Nord, 2° 37' 48\" Est","gps":"49° 21' 42\" Nord, 2° 37' 48\" Est","images":["../../jctruffet.com/image/image_60/60_Sacy_1.jpg"]},"Consult_chateau_formulaire6bea":{"id":"Consult_chateau_formulaire6bea","dept":"60","canton":"Senlis","commune":"Saintines","nom":"Saintines","type":"Château","periode":"XV-XVI","histoire":"SAINTINES, fondé au XIe siècle par Thibaut Ier, comte de Senlis, Saintines fut le siège d'un château au début de l'époque féodale. Le château appartint à Pierre de Cuignières entre 1320 jusqu'à sa mort en 1356. Propriété de monsieur Scherrer.","architecture":"SAINTINES le château actuel a été construit en 1513 et se situe au milieu d'un domaine fortement boisé. A côté du château moderne Le donjon Polygonal, couronné de mâchicoulis du XIVe siècle, protège l'entrée à la cour d'honneur, transformé en parterre, accessible uniquement par un pont. La base du bâtiment avec sa petite porte d'entrée en arc surbaissé provient probablement encore du donjon médiéval précédent. Elle ouvre sur une haute salle voûtée d'ogives, appelée salle d'armes. Le premier étage a été transformé en logement du régisseur sous la Restauration et très modernisé. Le second étage a peu changé depuis la construction, et contient une belle cheminée du XVIe siècle. Sur le niveau du troisième étage se trouve le chemin de ronde, crenelé et muni de mâchicoulis. Le premier niveau des combles est aménagé en pigeonnier.  Le donjon situé à l'intérieur de l'usine d'allumettes de Saintines.\nÉléments protégés MH : le donjon : inscription par arrêté du 23 février 1951.","habitants":"Pierre de Cuignières \"","divers":"Forteresse de Saintines","gps":"","images":["../../jctruffet.com/image/image_60/60_Saintines_1.jpg","../../jctruffet.com/image/image_60/60_Saintines_2.jpg","../../jctruffet.com/image/image_60/60_Saintines_3.jpg"]},"Consult_chateau_formulaire6f9c":{"id":"Consult_chateau_formulaire6f9c","dept":"60","canton":"Méru","commune":"Amblainville","nom":"Sandricourt","type":"Château","periode":"XVI","histoire":"SANDRICOURT, au fond d'une vaste cour d'honneur bordée de communs, et incluant une chapelle de la fin du moyen-âge, allonge un élégant corps de bâtiment central à faibles ailes de deux étages sur un sous-sol. La terre de Sandricourt fut aux Hédouville avant 1493, date où elle passa par héritage aux Saint Simon. Toute une lignée de Saint-Simon, marquis de Sandricourt, le posséda jusqu'en 1755, où ils vendirent le marquisat à une vieille fille, Mlle Davejean. C'est pour elle et son neveu, le comte de Banne, que fut construite la demeure actuelle en remplacement de l'ancienne forteresse médiévale détruite au XIXe siècle. Création d'Henri et Achille Duchêne, architectes paysagistes qui ont conçu le jardin entre 1880 et 1900. L'élément le plus remarquable est l'allée de la Marquise qui s'étend sur plus de 4 km à partir du château, cette allée paysagère s'étend sur deux communes, Amblaiville et Méru. l'allée dite de la Marquise ; le grand parterre, dit parterre de Diane ; la cascade de fleurs et la clairière ronde : inscription par arrêté du 18 juillet 1991.","architecture":"SANDRICOURT, organisateur d'un des derniers grands tournois de la fin du Moyen Âge, au château de Sandricourt. Ce tournoi a regroupé 2000 personnes venues de toute la France, pendant une semaine, au mois de septembre 1493. Il est connu historiquement sous le nom du Pas d'armes de Sandricourt. Le parc du domaine  est un jardin réalisé entre 1880 et 1900 par Henri et Achille Duchêne, deux architectes paysagistes (père et fils). L'allée de la Marquise, qui s'étend sur plus de 4 kms à partir du château, est classé au M.H. depuis le 18/07/1991.","habitants":"marquis de Sandricourt\"","divers":"Château de Sandricourt à Ablainville GPS : 49° 12' 18\" Nord, 2° 08' 17\" Est","gps":"49° 12' 18\" Nord, 2° 08' 17\" Est","images":["../../jctruffet.com/image/image_60/60_Sandricourt_1.jpg","../../jctruffet.com/image/image_60/60_Sandricourt_2.jpg","../../jctruffet.com/image/image_60/60_Sandricourt_3.jpg"]},"Consult_chateau_formulaire706d":{"id":"Consult_chateau_formulaire706d","dept":"60","canton":"Senlis","commune":"Senlis","nom":"Senlis","type":"Château","periode":"XIV-XVIII-XIX","histoire":"Trois  châteaux dans cet article Senlis, le Musée des arts et la Fontaine de Chaâlis.                                                                                   SENLIS, le château est fréquenté dès le IXe siècle par Charles le Chauve puis Louis le Bègue. La première mention précise du château sous le terme de palatio date de 990. Le château actuel a été bâti au XIIe siècle, sous Louis VI le Gros. Avant 1137, la chapelle Saint-Denis et le corps de bâtiment sont construits. La grosse tour du \"Prétoire\" serait contemporaine de ce chantier. Au XIIIe siècle, des remaniements sont effectués dans le château avec la construction de la chambre du roi. Au XIVe siècle la tour du Prétoire est aménagée ainsi que la tour du rempart romain située au niveau de la chambre du roi. De nouveaux travaux de réaménagement sont conduits au cours du XVe siècle. Au XVIe siècle un escalier monumental est élevé pour accéder à la salle des gardes datant du XVIIe siècle. Henri IV est le dernier roi à séjourner à Senlis. En 1793, il est vendu comme bien national. Au cours du XIXe siècle, la façade sud de la chambre du roi est rebâtie après suppression de la galerie la reliant au prieuré Saint-Maurice. Les dépendances du château sont partiellement abattues en 1812. En 1861, le corps de bâtiment disparaît en partie. C'est en 1956 que la ville de Senlis rachète le château. L'entrée dans la cour se fait par la porterie située au sud. La tour dite du Prétoire est située en face de cette porte, elle s'appuie contre le rempart. L'intérieur de cette tour a été voûté d'ogives au XIVe siècle. Plus à l'ouest se trouve le corps de logis principal du château qui s'appuie contre le rempart. Il s'élevait sur deux étages : au rez-de-chaussée étaient les cuisines et le cellier et à l'étage la salle des gardes et la salle d'apparat.","architecture":"SENLIS, prieuré remanié au XIXe siècle dans le goût néo-gothique. La chapelle s'élevait contre la salle des gardes. Elle possédait deux étages avec une tribune et était fermée à l'est par une abside semi-circulaire. Elle communiquait avec la salle des gardes et un passage était aménagé sous sa tribune occidentale qui permettait d'accéder directement au corps de logis. Éléments protégés MH : le château : classement par liste de 1862. Le prieuré Saint-Maurice ; les façades et les toitures du logis du prieur; le sol : inscription par arrêté du 21 décembre 1987. les ruines du donjon roman; l'ensemble des vestiges du mur gallo-romain : classement par arrêté du 6 novembre 1995.                                                                                                              Le MUSEE d'ART  et d'Archéologie se situe à proximité immédiate de la Cathédrale de Senlis. Le catalogue de l'inventaire du musée est riche de 3178 entrées. Seulement les objets les plus intéressants ont été sélectionnés pour l'exposition permanente. Bien que représentant la majeure partie de la collection de par le nombre des pièces, le très riche fonds d'estampes, gravures et dessins n'est pas accessible au grand public, hormis quelques échantillons. Une partie du sous-sol se présente comme un musée de site où le visiteur découvre les vestiges dune maison gallo-romaine sur laquelle a été bâti l'ancien Palais. Lautre section, une belle cave voûtée abrite la mise en scène du spectaculaire ensemble dex-voto gallo-romains exhumés lors des fouilles du temple de guérison de la forêt dHalatte. Les collections archéologiques se déploient au rez-de-chaussée, autour dun monumental socle de bronze.                                                                  FONTAINE de CHAALIS au sud-Est  château du XVIIIe siècle. Collections de N. Jacquemart-André et de Jean-Jacques Rousseau. Journées de la Rose.","habitants":"Les rois de France\"","divers":"Trois  châteaux dans cet article Senlis vestiges grav 4-5, le Musée des arts grav-3 et la Fontaine de chaâlis grav-1-2-6-7                            Musee GPS : 49° 12' 23\" Nord, 2° 35' 13\" Est","gps":"49° 12' 23\" Nord, 2° 35' 13\" Est","images":["../../jctruffet.com/image/image_60/60_Senlis_1.jpg","../../jctruffet.com/image/image_60/60_Senlis_2.jpg","../../jctruffet.com/image/image_60/60_Senlis_3.jpg","../../jctruffet.com/image/image_60/60_Senlis_4.jpg","../../jctruffet.com/image/image_60/60_Senlis_5.jpg","../../jctruffet.com/image/image_60/60_Senlis_6.jpg","../../jctruffet.com/image/image_60/60_Senlis_7.jpg"]},"Consult_chateau_formulaire099e-2":{"id":"Consult_chateau_formulaire099e-2","dept":"60","canton":"Chaumont-en-Vexin","commune":"Serans","nom":"Serans","type":"Château","periode":"XIX","histoire":"SERANS, la construction du château de Serans et de la ferme s'échelonne du XVIIe au XIXe siècle. Le logis du fermier, le colombier et les dépendances agricoles, construits en moellons, paraissent dater des années 1620. Le portail en pierre de taille date de la fin du XVIIe siècle. Le château de style XVIIIe siècle, a été bâti au cours de la deuxième moitié du XIXe siècle. La construction du château de Serans date du XIXe siècle, avec une ferme des années 1620 et son parc.","architecture":"SERANS, Éléments protégés MH : les façades et les toitures des bâtiments de la ferme, comprenant le logis du fermier, les bâtiments de dépendances agricoles, le colombier et le portail, les façades et les toitures du château, les façades et les toitures du pavillon qui lui fait face au sud, la terrasse et son mur de soutènement, l'escalier en fer à cheval avec la fontaine, les bassins et les serres: inscription par arrêté du 31 octobre 1997  Le château de Serans est inscrit aux M.H. depuis le 31/10/1997.","habitants":"seigneurs locaux\"","divers":"Château de Serans                                    GPS : 49° 11' 14\" Nord, 1° 49' 55\" Est","gps":"49° 11' 14\" Nord, 1° 49' 55\" Est","images":["../../jctruffet.com/image/image_60/60_Serans_1.jpg","../../jctruffet.com/image/image_60/60_Serans_2.jpg","../../jctruffet.com/image/image_60/60_Serans_3.jpg","../../jctruffet.com/image/image_60/60_Serans_4.jpg"]},"Consult_chateau_formulaireac6a":{"id":"Consult_chateau_formulaireac6a","dept":"60","canton":"Estrées-Saint-Denis","commune":"Orvillers -sorel","nom":"Sorel","type":"Château","periode":"XVII","histoire":"SOREL, en 1645, Anne Claire de Hamel, dame de Sorel, épouse Antoine de La Viefville, marquis dOrvillers, député de la noblesse de Picardie aux Etats généraux. Celui-ci, abandonnant son château dOrvillers après son mariage. Cest à la fin du XVIIIe siècle que l'édifice sera vendu par la dernière marquise  de la Viefville dOrvillers. Le baron Chapelain du Brosseron baron d'Empire conseiller général de l'Oise  en deviendra propriétaire et décèda en 1845 à Sorel. Son épouse, grande amie de la veuve et des filles de lécrivain Beaumarchais les recevra très souvent au château où elles monteront de nombreux spectacles pour leurs amis et les habitants du village.  Sa fille la baronne de Ségonzac hérite ancêtre des propriétaire actuel, ces dames vantaient le charme de cette terre à 22 lieues de Paris.  Propriétaire  Mme Hubert Fournis soeur de M. et Mme G. du Plessis de Grenédan qui l'expose Salle de réception,  baptême, mariage, anniversaire, communion ou autre.","architecture":"SOREL,  la construction du château de Sorel qui se termine vers 1655. Il est en brique et pierre, de style Louis XIII, présente un corps de bâtiment principal flanqué de deux ailes et précédé de douves ornementales.  Quelques modifications architecturales furent effectuées sous Napoléon III, on ajouta la grande balustrade de pierre ornant la façade avant. Le château et ses communs subirent des dommages au cours de la première guerre mondiale.","habitants":"Famille d\"Antoine de La Viefville,\"","divers":"Château de Sorel à Orvillers -sorel  GPS : 49° 34' 05 04\" Nord, 2° 42' 26 30\" Est","gps":"49° 34' 05 04\" Nord, 2° 42' 26 30\" Est","images":["../../jctruffet.com/image/image_60/60_Sorel_1.jpg","../../jctruffet.com/image/image_60/60_Sorel_2.jpg","../../jctruffet.com/image/image_60/60_Sorel_3.jpg","../../jctruffet.com/image/image_60/60_Sorel_4.jpg"]},"Consult_chateau_formulaire4980":{"id":"Consult_chateau_formulaire4980","dept":"60","canton":"Chantilly","commune":"Vineuil-Saint-Firmin-Chantilly","nom":"St_Firmin_Vexin","type":"Château","periode":"XVII-XVIII","histoire":"ST-FIRMIN, château formé à l'origine d'un corps de bâtiment encadré de deux pavillons, comportant deux étages et un comble. Cet édifice construit en pierre de taille est agrémenté d'un jardin à l'anglaise. Il est visible du parc du château de Chantilly, de l'autre côté du grand canal, avant le grand octogone. Bel exemple d'architecture Louis XVI terminé juste avant la Révolution et comportant de beaux décors de boiseries peintes au rez-de-chaussée.  Éléments protégés MH : les façades et les toitures du château, le grand salon et son décor, la glacière : inscription par arrêté du 15 avril 1988.","architecture":"St-FIRMIN n'est visible, uniquement, que depuis le parc de Chantilly (du bassin octogonal près de la grande cascade). Il appartient à l'Institut et se situe dans un jardin anglais attenant au parc du château de Chantilly, sur une butte gazonnée. Quand Nicolas d'Orgemont acheta la seigneurie de Saint-Firmin en 1390, il y avait déjà une grande maison. Au milieu du XVIIIe siècle, Louis Poulletier de la Martinière, lieutenant des chasses de Chantilly, fait construire une nouvelle maison. Dès que la propriété est rachetée par le fermier général Charles Delahaye le 31 mars 1787, ce manoir est démoli et remplacé par le château actuel, de style néo-classique, selon les plans de l'architecte parisien André Aubert. Il entre dans le domaine de Chantilly, en 1828 et, devint la demeure de Robert d'Orléans et sa famille, à la fin du XIXe siècle. Les façades du corps de logis d'un étage sont sobres, mais soigneusement travaillées en pierre de taille. Les 3 travées centrales sont placées en léger retrait. Deux pavillons latéraux, à un étage également, ont été ajoutés aux angles Nord-Ouest et Nord-Est, peu après, sa construction. Le château de Saint-Firmin comporte aussi un long bâtiment de dépendances, de style néoclassique, ainsi qu'une glacière au puits cylindrique. Le château de Saint-Firmin est la propriété de l'Institut de France, au Parc de Chantilly, près de la grande cascade, a été inscrit aux M.H. depuis 1988.","habitants":"Nicolas d'Orgemont\"","divers":"Châeau  à Vineuil-Saint-Firmin-Chantilly        GPS : 49° 11' 50,28\" Nord, 2° 30' 2,16\" Est","gps":"49° 11' 50,28\" Nord, 2° 30' 2,16\" Est","images":["../../jctruffet.com/image/image_60/60_St_Firmin_Vexin_1.jpg","../../jctruffet.com/image/image_60/60_St_Firmin_Vexin_2.jpg"]},"Consult_chateau_formulaire7ebe-2":{"id":"Consult_chateau_formulaire7ebe-2","dept":"60","canton":"Méru","commune":"Belle-Eglise","nom":"St_Just_Vexin","type":"Château","periode":"XV-XVIII","histoire":"SAINT-JUST, situé sur une propriété de 17 hectares, ce château du XVIIe siècle vous accueille à Belle-Église, près de Paris. Appelé hôtel de Villiers, le château prend son nom définitif avec larrivée dOudin de Saint Just en 1450, sa construction s'échelonnant du XIIe au XIXe siècle,  a appartenu successivement aux familles de Villiers de Montmorency par alliance en 1415, de Saint Just par acquêt en 1450, de Mérard de Saint Just  en 1751, aux marquis de Persan, au général Servan de Gerbey et enfin aux comtes de Ribes toujours  par acquêt en 1826. Le jardin d'agrément du château est cité dans le pré-inventaire des jardins remarquables.","architecture":"SAINT-JUST se situe en dehors du village, sur la RD 923, direction de Chambly. Le château Saint Just, érigé au milieu du XVe siècle, constitue un lieu prestigieux et doté d'histoire. Univers professionnel et cadre d'exception s'associent pour créer un lieu unique où le charme, L'édifice en double en retour d'equerre à deux niveaux flanquée sur un côté deux tourelles en angles toit en poivrières  l'authenticité et la haute technologie se côtoient en parfaite harmonie.  Il fut appelé en premier l'hôtel de Villier, prit son nom définitif en 1450, à l'arrivée d'Oudin de Saint-Just.","habitants":"familles de Villiers de Montmorency\"","divers":"Château de St-Just en Vexin              GPS : 49° 11' 35\" Nord, 2° 13' 11\" Est","gps":"49° 11' 35\" Nord, 2° 13' 11\" Est","images":["../../jctruffet.com/image/image_60/60_St_Just_Vexin_1.jpg","../../jctruffet.com/image/image_60/60_St_Just_Vexin_2.jpg","../../jctruffet.com/image/image_60/60_St_Just_Vexin_3.jpg","../../jctruffet.com/image/image_60/60_St_Just_Vexin_4.jpg","../../jctruffet.com/image/image_60/60_St_Just_Vexin_5.jpg","../../jctruffet.com/image/image_60/60_St_Just_Vexin_6.html"]},"Consult_chateau_formulaire3989":{"id":"Consult_chateau_formulaire3989","dept":"60","canton":"Saint-Just-en-Chaussée","commune":"ST_Rémy en eau","nom":"ST_Rémy_en_Eau","type":"Château","periode":"XVIII","histoire":"SAINT-REMY EN L'EAU.  Jardin irrégulier et maison de poupées, le jardin qui vit naître d'Angiviller, surintendant des bâtiments de Louis XVI est caractéristique des jardins paysagers de la fin du XVIIIe siècle.  Éléments protégés MH : les façades et les toitures du château, de la chapelle, des communs, du pigeonnier ; l'escalier intérieur du château avec sa rampe d'appui : inscription par arrêté du 4 février 1987.","architecture":"SAINT-REMY EN L'EAU, bel édifice de la fin du XVIIIe siècle. Le château proprement dit, en briques et pierres, comporte un avant corps central en faible saillie et deux pavillons latéraux. L'élévation est à deux étages et comble avec lucarnes. Les communs forment un ensemble imposant et remarquable en pierres appareillées de plan en U. Une chapelle et un colombier complètent cet ensemble. Il succède à un manoir du XVIe siècle dont subsistent trois tours en brique.","habitants":"Seigneur local\"","divers":"Château de st-Rémy des Eau","gps":"","images":["../../jctruffet.com/image/image_60/60_ST_R%c3%a9my_en_Eau_1.jpg","../../jctruffet.com/image/image_60/60_ST_R%c3%a9my_en_Eau_2.jpg"]},"Consult_chateau_formulaire1554":{"id":"Consult_chateau_formulaire1554","dept":"60","canton":"Estrées-Saint-Denis","commune":"Cuvilly","nom":"Séchelles","type":"Château","periode":"XVIII","histoire":"SECHELLES,  dit aussi de Cuvilly, son bâtisseur Jean Moreau de Séchelles (1690-1760) issu d'une famille bourgeoise parisienne nommé controleur général des finances  Jean-Baptiste Moreau, qui devint intendant de Valenciennes, puis intendant de larmée de Flandre et enfin contrôleur général des Finances en 1754,  acquit en 1715 la seigneurie de Séchelles dont il prit le nom ; il fi t démolir le château construit en 1530, pour y substituer vers lannée 1740 celui que lon voit aujourdhui. Moreau de Séchelles mourut ministre dEtat le 30 décembre 1760 .","architecture":"SECHELLES,  éléments décoratifs dépoque, boiserie et décors épargnés par les outrages du temps : durant la  guerre 1939/1945, le château fut occupé par les  Français durant la « drôle de guerre », puis par les   Allemands et enfin par les Américains.  Les cartes  postales montrent par ailleurs les dégâts causés par la grande guerre.","habitants":"r Jean Moreau de Séchelles\"","divers":"Château des Séchelles à Cuvilly","gps":"","images":["../../jctruffet.com/image/image_60/60_S%c3%a9chelles_1.jpg","../../jctruffet.com/image/image_60/60_S%c3%a9chelles_2.jpg"]},"Consult_chateau_formulaire4446-2":{"id":"Consult_chateau_formulaire4446-2","dept":"60","canton":"Clermont","commune":"Tartigny","nom":"Tartigny","type":"Château","periode":"XVI","histoire":"TARTIGNY, le château a été bâti au milieu du XVIe siècle par la famille de Montmorency-Laval et a conservé une partie de sa modénature et de son décor d'architecture Renaissance. Le château est un édifice moderne dans son ensemble avec certaines parties du XVIe siècle ainsi qu'une haute tour, propriété de la famille de Baudus. Le parc  possède un curieux potager circulaire. Le décor extérieur, la tourelle, le pavillon, le colombier et le jardin potager sont inscrits monument historique depuis 1998. Le parc et le jardin peuvent être visités lors des journées du patrimoine et de Jardins en scènes.","architecture":"TARTIGNY, a conservé une partie de sa modénature et de son décor d'architecture Renaissance (aile ouest), présentant une superposition de pilastres d'ordre composite, un entablement à métopes et des tables saillantes, l'aile ouest est cantonnée d'une tourelle ronde haute de 25 m qui offre une ornementation Renaissance. Le château a subi des remaniements au XIXe siècle, tant au niveau des toitures (combles redressés et lucarnes néo-gothiques) que des maçonneries (crépi à faux joints). La propriété conserve également un colombier octogonal du XVIIe ou XVIIIe siècle, en torchis et un étonnant potager circulaire du milieu du XIXe siècle clos d'un mur de brique, un des seuls exemples de ce type dans le nord de la France. Pour ce qui est du décor intérieur, on remarque l'ancienne cuisine avec sa cheminée, la pile centrale du XVIe siècle, ainsi que les boiseries et stucs néo-Louis XVI d' époque Second Empire. Le château est un édifice moderne dans son ensemble avec certaines parties du XVIe siècle ainsi qu'une haute tour. Le décor extérieur, la tourelle, le pavillon, le colombier et le jardin potager sont inscrits monument historique depuis 1998.","habitants":"famille de Montmorency-Laval\"","divers":"Château de Tartigny","gps":"","images":["../../jctruffet.com/image/image_60/60_Tartigny_1.jpg","../../jctruffet.com/image/image_60/60_Tartigny_2.jpg","../../jctruffet.com/image/image_60/60_Tartigny_3.jpg"]},"Consult_chateau_formulaire2d26-2":{"id":"Consult_chateau_formulaire2d26-2","dept":"60","canton":"Chaumont-en-Vexin","commune":"Trie château","nom":"Trie_Chateau","type":"Château","periode":"XI-XVI-XIX","histoire":"Deux châteaux dans cet article, Trie et Morainville à Heillés.               TRIE-CHATEAU, le château primitif a été construit par les rois de France pour lutter contre les Normands. c'est un château de style Médiéval et Renaissance. Le château primitif a été construit au XIe siècle, pour le roi de France Philippe Ier, pour lutter et défendre le Vexin contre les incursions Vikings. En 1418, durant la guerre de cent ans, il fut pris par Henri V d'Angleterre qui en fit son quartier général. Après avoir appartenu à la famille de Trie, puis à celle de Dammartin, puis d'Estouteville, transformé par Adrienne d'Estouteville puis agrandi par Henri de Longueville, au XVIe siècle, qui en fit une demeure de plaisance,  il reçut la visite du roi Henri IV. et devient la propriété des Bourbon-Longueville, des Bourbon-Conti puis, en 1783, il a appartenu à Monsieur, frère du Roi Louis XVI qui deviendra Louis XVIII. Au XVIIIe siècle, il se présente comme une suite de corps de bâtiments comprenant le château vieux avec trois ailes médiévales et le château-neuf, du XVIIe siècle. De ce vaste château il subsiste une partie du château vieux où aurait séjourné Jean Jacques Rousseau, et un escalier Renaissance il fut transformé en maison bourgeoise et, dans la deuxième moitié du XIXe siècle, la propriété de Joseph-Arthur de Gobineau. \n Éléments protégés MH : les façades et les toitures de la tour ronde ; les tours demi-rondes qui s'élèvent à l'angle Sud-Ouest et le mur de courtine reliant ces tours à la tour ronde ; la salle voûtée du sous-sol et l'escalier du XVIe siècle y compris sa voûte: inscription par arrêté du 28 janvier 1956.","architecture":"MORAINVILLE à Heilles  au sud , à cinq K.M.  d'Hermes.  Le premier seigneur de Morainville connu était Mr Rochefort au XVIIe siècle, c'est ensuite le capitaine de Guédeville au XVIIIe siècle qui en était propriétaire, à sa mort en 1769, la dame Marie Françoise de Lavieuville, sa veuve, épousa Gabriel Isidore Mathieu Blondin dit d'Esigny, écuyer, gendarme du Roi. Morinville passa ensuite à la dame de Quémy, puis à monsieur Charles François Bourgeois, général révolutionnaire, au baron des Bordes, ancien greffier de la cour des comptes. monsieur Millière, ancien maire de Heilles, fut également propriétaire de la demeure. Tournant le dos au château de Morainville, a été construit le château de Saint-Pierre.","habitants":"Famille des   Bourbon-Longuevill\"","divers":"Deux châteaux dans cet article,  de trie-châteaux                                                Trie grav-2 et Morainville grav-1 à Heillés grav 3.  Trie   GPS : 49° 17' 6,36\" Nord, 1° 49' 17,4\" Est","gps":"49° 17' 6,36\" Nord, 1° 49' 17,4\" Est","images":["../../jctruffet.com/image/image_60/60_Trie_Chateau_1.jpg","../../jctruffet.com/image/image_60/60_Trie_Chateau_2.jpg","../../jctruffet.com/image/image_60/60_Trie_Chateau_3.jpg"]},"Consult_chateau_formulaire9342":{"id":"Consult_chateau_formulaire9342","dept":"60","canton":"Estrées-Saint-Denis","commune":"Cernoy","nom":"Trois_Etots","type":"Château","periode":"XV-XVI","histoire":"TROIS-ETOTS;  Cernoy, sous l'Ancien Régime, n'était pas une paroisse mais était rattachée à celle de Noroy. Son église est dévasté durant les guerres du XVe siècle et le logement du vicaire transformé en écurie. Il aurait existé au XIIe siècle un couvent dénommé Sainte-Croix. Trois-Étots est une ancienne seigneurie qui appartenait au XIVe siècle à la maison de Villers-Saint-Paul, alors l'une des plus importantes du Beauvaisis.                                                                        Manoir de Trois-Étôts. De 1724 à 1813, il est demeuré la propriété de la famille de Herte, M.A. Anisson du Perron demeure aujourd'hui propriété privée.","architecture":"TROIS-ETOTS:   Louis Graves indiquait « Les anciennes paroisses de Cernay et de Trois-Étots, dont le territoire a peu d'étendue, et dont la population est faible, furent réunies en 1826 à la commune de Noroy. Les réclamations des localités, fondées sur l'éloignement du nouveau chef-lieu, ont fait modifier cette circonscription, après un intervalle de sept années. Par ordonnance du 15 septembre 1833, les villages de Noroy et de Trois-Étots ont été détachés de Noroy ; mais au lieu de composer, comme par le passé deux municipalités distinctes, ils sont demeurés réunis en une seule commune dont le chef-lieu a été fixé à Cernoy ». l'une des façades date du XVe siècle, l'autre du XVIe siècle et sont réalisées en calcaire blanc avec des compartiments de brique en lits réguliers ou posés en oblique. Au rez-de-chaussée, piliers de bois à écussons sculptés, dont un mi-parti de France et de Bretagne.","habitants":"Famille de Herte,\"","divers":"Château de Tiois-Etots à  Cernoy","gps":"","images":["../../jctruffet.com/image/image_60/60_Trois_Etots_1.jpg","../../jctruffet.com/image/image_60/60_Trois_Etots_2.jpg","../../jctruffet.com/image/image_60/60_Trois_Etots_3.jpg"]},"Consult_chateau_formulaire8c26":{"id":"Consult_chateau_formulaire8c26","dept":"60","canton":"Mouy","commune":"Troissereux","nom":"Troissereux","type":"Château","periode":"XV-XVI","histoire":"TROISSEREUX, il est appelé le château de Troissereux ou  de Troisrieux. L'architecte était Sebastiano Serlio. Son proprétaire initial fut Brunulf qui était le beau frère du roi Dagobbert, mort en 627. revenue aux Milly la seigneurie échoit par alliance à Jean III de Sains qui en 1355 rend hommage à Jean de Marigny, jean de Sains son  petit-fils Robert, héritier reste fidèle au roi. En 1473, l'héritière  Margueite de Poix épouse georges Paléologue de Bissipat d'origine Turcs , leur fille Anne de Bissipat épouse en 1514 Gobert d'Apremont  c'est lui qui transforme la forteresse en résidence d'agrément. En 1542 la seigneurie passe par alliance aux Marivaux. après la mort de Claude de Marivaux en 1598 le domaine est partagé par ses deux filles.  En 1745 achat du château par la famille de Corberon, Pierre-Daniel Bourrée de Corberon président au parlement  de Paris, et  les Tranié,  Aujourd'hui, le château de Troissereux est habité par les descendants de l'ancienne Famille du Beauvaisis et du général Tranié, libérateur de la Serbie en Septembre-octobre 1918.","architecture":"TROISSEREUX  à l'origine, château du XIIe siècle, reconstruit en grande partie au XVe siècle et remanié au XVIe siècle.  C'est un château de style Renaissance. C'était un Fort situé aux avant-postes de Beauvais et destiné à protéger la ville. Édifice de style Renaissance, en brique et pierre. en forme de L  constitué par une aile principale, une aile basse (galerie) et une tour dite la Tour du Temps qui abrite un escalier à vis en brique, ainsi quune horloge médiévale classée M.H. et porte au sommet une girouette astrale. Deux des parcelles du parc sont boisées, la troisième présente une grande pelouse. Le château est complété de communs, d'un ancien moulin, et de trois moulins situés sur la rivière du Thérain. Éléments protégés MH : le portail sur la cour avec sa grille ; les façades et les toitures du château ; la cour ; les douves et les plans d'eau : classement par arrêté du 25 février 1983. Le grand escalier avec sa rampe en fer forgé ; l'escalier à vis dans la tour ; le grand salon et la salle à manger avec leur décor au rez-de-chaussée . Le parc du château, avec le vase et le pont enjambant les douves : inscription par arrêté du 10 avril 1992. L'ancien domaine, le canal aux 2/3 bouché, les plans d'eau attenants, tous les aménagements hydrauliques de la vallée en partant du canal de dérivation jusqu'aux moulins, les aménagements hydrauliques des moulins et la parcelle de l'avenue en perspective (à l'exclusion de toute construction), à l'exception des parties classées. Le domaine a été inscrit en 2003 aux M.H.. Les escaliers et le grand salon sont nscrits aux M.H.  Son portail, ses façades, ses toitures et ses douves sont classés aux M.H. en 1983 ainsi que le parc. Il est ouvert au public et se visite.","habitants":"Famille de Corberon\"","divers":"Château de Troissereux                                      GPS : 49° 28' 38,28\" Nord, 2° 02' 23,31\" Est","gps":"49° 28' 38,28\" Nord, 2° 02' 23,31\" Est","images":["../../jctruffet.com/image/image_60/60_Troissereux_1.jpg","../../jctruffet.com/image/image_60/60_Troissereux_2.jpg","../../jctruffet.com/image/image_60/60_Troissereux_3.jpg","../../jctruffet.com/image/image_60/60_Troissereux_4.jpg"]},"Consult_chateau_formulaire5fe9":{"id":"Consult_chateau_formulaire5fe9","dept":"60","canton":"Beauvais","commune":"Troussures","nom":"Troussures","type":"Château","periode":"XVI-XIX","histoire":"TROUSSURES, la seigneurie de Troussures remonte à lan 1075 Garénus de Trussuris. Une première construction de lenceinte fortifiée seffectua ensuite par le seigneur de Troussures qui donna son nom au village. En 1700, le maréchal de Boufflers, descendant de Renault, est vendue au comte de Saisseval et son fils la vend en 1783 à Louis -Lucien Le Caron, chevalier, lieutenant civil et criminel au baillage.  Cest son petit-fils qui construira le château sous sa forme actuelle. Toussaint Le Caron (1829-1914), écuyer et membre au grand conseil du Roi, acheta la propriété et sera le dernier comte de Troussures.  La propriété demeure ainsi dans la famille Le Caron de 1667 à 1919 ; puis faute de descendance, est vendue à Henri Gézard. 1919-1921 : Henri Gézard acheta la propriété et la revendit deux ans plus tard en la divisant : La ferme et les terres sont vendues à Mr Georges Ledieu qui employa comme fermier Mr Ablin en 1922, Mr Ecklao en 1927. En 1951 Mr Muller en devint propriétaire et la ferme aujourdhui appartient toujours à la famille Muller: Le couple Nourrissons habite le château , loffre au Père Doncoeur.  Elle est confiée au Père Caffarel qui en prend possession le 28 avril 1966 jusquà sa mort en 1996  , la congrégation Saint-Jean reçoit la propriété et en a lusage pour fonder un prieuré, par vux de pauvreté, elle a proposé que le diocèse en soit le propriétaire et Mgr Thomazeau.","architecture":"TROUSSURES, le château fut bâti en 1570 pour Jacques Richard, à lemplacement de la pelouse devant le château actuel et perpendiculaire à celui-ci. Toussaint le Caron, écuyer, membre au grand conseil du Roi, reprit la propriété et sera le dernier comte de Troussures, il rase complètement le château à la fin du XIXe siècle et le reconstruit sous sa forme actuelle. Faute de descendance, la propriété est vendue en 1919 à Henri Gézard, qui la revendit deux ans plus tard en la divisant ; la ferme. Le château et le parc de 8 hectares sont vendus à La générale Nourrisson qui le possède de 1921 à 1938, à cette date, elle off
