e présent à ce jour, collège et lycée avec internat de la 6e à la Terminale. Une association de parents et danciennes élèves de la maison Française se constitue pour permettre le rachat dune partie de la propriété et y maintenir létablissement scolaire. Collèges. Nathalie Durand est la directrice de la maison française, un établissement privé catholique qui rassemble un collège et un lycée.","habitants":"maître Anthoine Charmolue\"","divers":"A la Cuise-la-Motte le château de la Chesnoye","gps":"","images":["../../jctruffet.com/image/image_60/60_Chesnoye_1.jpg","../../jctruffet.com/image/image_60/60_Chesnoye_2.jpg"]},"Consult_chateau_formulaire61b3":{"id":"Consult_chateau_formulaire61b3","dept":"60","canton":"Thourotte","commune":"Ville_Chiry _Ourscamp","nom":"Chiry_Ourscamps","type":"VILLE","periode":"XVIII-XIX-XX","histoire":"ORRY la VILLE, le premier château attesté à la  Ville datait du XVIIIe siècle ; il est représenté sur une aquarelle de 1816. Une autre construction lui succéda, vers le milieu du XIXe siècle, connue par les cartes postales du début du XXe siècle. La demeure, détruite pendant la première guerre mondiale fut reconstruite vers 1930, suivant un parti plus modeste. La lucarne portant les armoiries est un remploi du précédent bâtiment. L'édifice ressemble plutôt à la maison d'un bourgeois qu'à un château. Les propriétaires ont cependant voulu lui donner l'air d'importance et ils ont fait faire en conséquence un fronton en pierres de taille supporté par quatre colonnes.\nLe Castelet fut édifié en 1884 par un pharmacien parisien, au lieu dit « la Borne-Blanche ».","architecture":"Village voisin à CHIRY-Ourscamp MENNECHET Il a été construit en 1881. Edifice inachevé, le château Mennechet a été conçu comme une galerie richement sculptée sur ses façades et pignons extérieurs. Son commanditaire Alphonse Mennechet de Barival (1812-1903), d'origine saint-quentinoise, aurait fait fortune par son mariage avec sa cousine Henriette Caroline Paillet dont le père Charles était amateur d'oeuvres d'art. Vers 1855, Mennechet acquiert de nombreuses terres à Chiry-Ourscamp, commune traversée par le chemin de fer, à mi-distance entre Paris et Saint-Quentin. Il y bâtit un empire de pierres dédié à son épouse, dont une tour, le château-musée, deux petits manoirs et de vastes écuries. A son décès en 1903, Mennechet, sans héritier direct, laisse un testament dans lequel il cède sa collection d'objets d'art au musée Antoine Lécuyer et la gestion de son patrimoine à son neveu, Louis Hugues. Devenu en 1905 Louis Hugues-Menechet, l'héritier dilapide sa fortune et se voit placé en minorité. Aujourd'hui ruiné,il  fut bâti vers 1880 pour recevoir les uvres d'art d'Alphonse Mennechet de Barival : celui-ci conservait peintures, sculptures et faïences dans ses petits manoirs et souhaitait les mettre en valeur dans un musée, ce qui motive la construction de ce château-galerie. Mennechet décède en 1903 à 90 ans, alors que le château-Musée de Mennechet n'est pas achevé. Au cours de la première guerre mondiale, le château-galerie est endommagé, alors que la tour et un des manoirs construits par Mennechet sur la commune de Chiry-Ourscamp sont détruits il est endommagé, à nouveau, durant la seconde guerre mondiale, n'est jamais restauré. D'importants travaux de défrichement et de nettoyage ont été effectués en 2008 sous l'impulsion du nouveau propriétaire et ont permis la découverte d'une cave voûtée inconnue jusqu'ici. Son propriétaire actuel est Mr Yves Lavaire, qui a entrepris sa restauration. Le château a été inscrit aux M.H. en 2011.","habitants":"Alphonse Mennechet de Barival\"","divers":"Ville_Chiry _Ourscamps                     Mennechet grav-2                                        GPS : 49° 32' 46\" Nord, 2° 56' 45\" Est","gps":"49° 32' 46\" Nord, 2° 56' 45\" Est","images":["../../jctruffet.com/image/image_60/60_Chiry_Ourscamps_1.jpg","../../jctruffet.com/image/image_60/60_Chiry_Ourscamps_2.jpg"]},"Consult_chateau_formulaire0649":{"id":"Consult_chateau_formulaire0649","dept":"60","canton":"Compiègne","commune":"Choisy au bac","nom":"Choisy_au_Bac","type":"Château","periode":"XVIII-XIX","histoire":"Deux châteaux dans cet article; Plessis Brion  et Bonshommes.    PLESSIS-BRION   village voisin de de Choisy au Bac, Il a été construit sur les fondations d'une anciene forteresse féodale datant de 1500. Vous serez accueilli agréablement pour les visites intérieures du rez-de-chaussée et une visite libre du parc à l'anglaise.","architecture":"BONSHOMMES,  Il fut bâti en 1885 sous l'ancien nom de château de Francport. Le château des Bonshommes date du XVIIIe siècle. C'est devenu un hôtel avec une belle piscine intérieure et un parc de 18 ha. Cet ancien prieuré abritait l'ancien pavillon de chasse du roi Napoléon III. Les salons en enfilade du château du Francport, à Choisy-au-Bac près de Compiègne, ont longtemps été vides, pendant une dizaine d'années, les portes de ce bâtiment du XIXe siècle sont restées closes à cause des démêlés juridiques des anciens propriétaires. 2014 est l'année de la renaissance pour l'édifice sous la forme d'un hôtel-restaurant. « Maintenant, les portes sont grandes ouvertes et tout le monde peut venir, le gérant de Terres de Kéops, la société qui occupe la bâtisse et l'a rebaptisée de son nom d'origine « le château des Bonshommes ». Près d'1 M a été dépensé par l'entreprise depuis octobre 2013 pour rénover le château et en faire « le premier opérateur bio et bio tourisme ». Produits bio 100 % français et centre de balnéothérapie. Nous sommes propriétaires de 11 fermes et nous travaillons avec 32 autres soumises à un cahier des charges plus strict que celui du bio », raconte Christian, grâce à ce réseau, un système d'abonnement a été lancé en région parisienne.","habitants":"Bonshommes  Famille de  Christian\"","divers":"Deux châteaux dans cet article; de  Choisy le Bac,                                          Plessis Brion  et Bonshommes.            GPS : 49° 26' 20\" Nord, 2° 52' 42\" Est","gps":"49° 26' 20\" Nord, 2° 52' 42\" Est","images":["../../jctruffet.com/image/image_60/60_Choisy_au_Bac_1.jpg","../../jctruffet.com/image/image_60/60_Choisy_au_Bac_2.jpg"]},"Consult_chateau_formulairee4ca":{"id":"Consult_chateau_formulairee4ca","dept":"60","canton":"Montataire","commune":"Mello","nom":"Cires_les_Mello","type":"Château","periode":"XVI","histoire":"MELLO, propriété successive des Familles de Mello, de Nesle et de Montmorency, le château de Mello appartient, aujourd'hui, à une société de crédit-bail Immobilier, qui loue les installations hôtelières au Groupe Châteauform. Celui-ci exploite 101 chambres, dédiées à l'accueil des séminaires dirigé par le comte de Boissieu propriétaire actuel.","architecture":"MELLO, l'édifice élevé par Dreux de Mello et les Neeles datent du XIIe siècle. il y eut à Mello, de toute ancienneté, un château-fort qui fut construit sur des substructions de la fin du Moyen-Age, et repris à l'époque classique. La famille Seillière est à l'origine des constructions qui sélevaientt à l'emplacement de la demeure actuelle dominant à l'est la vallée du Thérain. les façades construites en belle pierre blanches, avec leurs tourset la rotonde centrale percée de fenêtres à meneaux sont l'oeuvre des Montmorency  devenu par héritage  au XVe siècle propriété des Mello.  en 1820 le baron Seillière le restaure.     Il y avait à la porte d'entrée deux énormes tours qui ont été démolies en 1800, l'une d'elles, haute de 27 mètres, était surmontée d'un donjon de 20 mètres de haut, du quel on pouvait, paraît-il, découvrir Beauvais, la Butte Montmartre et une immense étendue de terre. encore debout. Éléments protégés MH : les façades et les toitures de l'ancien château, du château du second Empire dit \"petit château\", de la chapelle Sainte Anne et de la chapelle mortuaire des Sellières : inscription par arrêté du 25 juin 1986, modifié par arrêté du 1er février 1989.","habitants":"Familles de Mello                   Famille Seillière \"","divers":"Château à Mello GPS : 49° 16' 23\" Nord, 2° 21' 59\" Est","gps":"49° 16' 23\" Nord, 2° 21' 59\" Est","images":["../../jctruffet.com/image/image_60/60_Cires_les_Mello_1.jpg","../../jctruffet.com/image/image_60/60_Cires_les_Mello_2.jpg","../../jctruffet.com/image/image_60/60_Cires_les_Mello_3.jpg","../../jctruffet.com/image/image_60/60_Cires_les_Mello_4.jpg","../../jctruffet.com/image/image_60/60_Cires_les_Mello_5.jpg"]},"Consult_chateau_formulaire1a6f":{"id":"Consult_chateau_formulaire1a6f","dept":"60","canton":"Compiègne","commune":"Compiègne","nom":"Compiègne","type":"Forteresse-Palais","periode":"XVIII","histoire":"Quatre châteaux dans cet article, Compeigne, Francport, la tour Jeanne d'Arc et Brevières.                                                                  COMPIEGNE : Charles V fit construire une forteresse.  Cest en 1374 que Charles V, le \"sage Roi\" cher à Christine de Pisan, décide de faire bâtir un nouveau château, sur un terrain proche des remparts racheté aux religieux de labbaye saint-Corneille, à lemplacement de lédifice actuel.  Au XVIIIe siècle, Louis XV décida de reconstruire entièrement le château. De 1751 à 1788, larchitecte Ange Jacques Gabriel et Le Dreux de la Châtre, réalisèrent un des monuments . Après la Révolution, Napoléon Ier chargea larchitecte Berthault de remettre le château en état. Il y accueillit sa deuxième épouse, larchiduchesse Marie Louise dAutriche, en 1810. Après la chute du régime impérial en 1870, le château de Compiègne devint un musée national. Une politique de restitution des états historiques y est menée depuis 1945, le château restera, avec ceux de Versailles et de Fontainebleau, lune des trois résidences où le Roi se déplace avec son conseil et où il gouverne. Charles VI y réunit les états généraux en 1382. Henri IV y transfère la cour des Monnaies de 1590 à 1594. Il y prépare le traité de Vervins signé le 2 mai 1598, qui met fin à la guerre qui oppose la France à lEspagne. Au début du règne de Louis XIII, un traité dalliance entre la France et les Provinces Unies y est signé le 12 juillet 1624. Dans les annales de la diplomatie il porte le nom de traité de Compiègne. Le 29 avril 1814, Louis XVIII et la duchesse dAngoulême, fille de Louis XVI, sont accueillis au château par les maréchaux dEmpire. Le roi y prépare le rétablissement de la monarchie et reçoit une députation du corps législatif. Le 1er mai, le tsar Alexandre Ier vient au château pour recommander au roi le projet de constitution libérale élaboré par le Sénat.","architecture":"COMPIEGNE, devenus une véritable tradition, ces camps se perpétueront jusquau milieu du XIXe siècle : de 1666 à 1847, il y aura en tout seize \"camps de Compiègne\". En août 1429, revenant de Reims où il avait été sacré en présence de Jeanne dArc, Charles VII fait une entrée solennelle à Compiègne et séjourne 12 jours au château. Il inaugure une tradition que respecteront la plupart des souverains ; celle de \"La halte au château de Compiègne au retour du sacre\". Le dernier roi sacré à Reims, Charles X, sy conformera encore. Prélude à une union royale, le 14 mai 1770 eut lieu à Compiègne la première rencontre entre le Dauphin Louis Auguste, futur Louis XVI, et Marie Antoinette dAutriche. Le mariage a été célébré à Versailles le 16 mai suivant. Près de 40 ans plus tard, le 27 mars 1810, un scénario à peu près identique se répète : Napoléon Ier rencontre à Compiègne larchiduchesse Marie Louise dAutriche, nièce de la reine Marie Antoinette, et reproduit le geste dynastique accompli par Louis XV en 1770. Cest au cours dun séjour quil effectue à Compiègne du 18 au 28 décembre 1852 que Napoléon III forme le dessein dépouser Eugénie de Montijo, comtesse de Teba. Leur union eut lieu à Paris en 1853. Nombre dunions princières furent célébrées à Compiègne, mais le seul mariage royal, dont le château fut le théâtre, fut celui de la princesse Louise Marie dOrléans, fille du roi Louis-Philippe, avec Léopold Ier, roi des Belges, le 9 août 1832.                                                                                                      FRANCPORT est un château bâti à Choisy-le-Sec. \nLa Tour JEANNE D'ARC est depuis la propriété de la commune Compiègne. BREVIERES à 5 K.M.  au sud,  se situe dans le hameau du même nom. Il a été construit pour un ministre de la justice de Napoléon III. C'est devenu, aujourd'hui, le centre de formation du syndicat force ouvrière.","habitants":"Henri IV-Napoléon III\"","divers":"Quatre châteaux dans cet article, Compièigne grav -1-2-3,Francport grav-4, la tour Jeanne d'Arc grav-5 et Brevières grav -6-7-8.                     GPS : 49° 25' 09\" Nord, 2° 49' 52\" Est                                                                               Francport GPS : 49° 26' 20\" Nord, 2° 52' 42\" Est                                                                   Tour GPS : 49° 25' 6,24\" Nord, 2° 49' 19,2\" Est                                       Brevières GPS : 49° 20' 55\" Nord, 2° 54' 18\" Est","gps":"49° 25' 09\" Nord, 2° 49' 52\" Est","images":["../../jctruffet.com/image/image_60/60_Compi%c3%a8gne_1.jpg","../../jctruffet.com/image/image_60/60_Compi%c3%a8gne_2.jpg","../../jctruffet.com/image/image_60/60_Compi%c3%a8gne_3.jpg","../../jctruffet.com/image/image_60/60_Compi%c3%a8gne_4.jpg","../../jctruffet.com/image/image_60/60_Compi%c3%a8gne_5.jpg","../../jctruffet.com/image/image_60/60_Compi%c3%a8gne_6.jpg","../../jctruffet.com/image/image_60/60_Compi%c3%a8gne_7.jpg","../../jctruffet.com/image/image_60/60_Compi%c3%a8gne_8.jpg"]},"Consult_chateau_formulaire4158":{"id":"Consult_chateau_formulaire4158","dept":"60","canton":"Chaumont-en-Vexin","commune":"Corbeil-Cerf","nom":"Corbeil_Cerf","type":"Château","periode":"XVI-XVII","histoire":"CORBEIL-CERF, à l'origine au XIIIe siècle la seigneurie de la famille de Méru. En 1620 la seigneurie passe  à Charles de Brinon, puis acquisent en 1664 par  Jean Barton de Montbras. Les Lubersac de st-Julien  héritent en 1693. l'Intérieurs en grande partie aménagés par le marquis de Lubersac à la fin du XIXe siècle et au début du XXe siècle. Parc transformé à la même époque par les architectes paysagistes Henri et Achille Duchêne. Ajout de quatre jardins clos fleuris, à l'est du château en 1960, par le paysagiste René Perchère, une roseraie, un jardin de broderie de buis, un jardin maure et un jardin vert.  Éléments protégés MH : les façades et les toitures du château et de l'ancien pressoir : classement par arrêté du 15 septembre 1966.,  inscription par arrêté du 31 août 1992. Le pavillon du XVIIe siècle situé à l'angle nord est : classement par arrêté du 24 octobre 1994.","architecture":"CORBEIL-CERF,  la construction du château de Corbeil-Cerf date du XVIe au XVIIe siècle. Composé d'un corps de bâtiment du XVIe siècle auquel à été accolé, au siècle suivant un autre corps coiffé lui d'un toit à la française légèrement moins élevé. au XIXe siècle sont venus s'ajouter deux pavillons d'angle comptant un rez de chaussées et un étage mansardé. Une aile qui flanquait le château au sud-est, a été démolie au XIXe siècle à l'époque ou furent édifiés les deux bâtiments de communs. C'était autrefois un simple rendez-vous de chasse. Au XIXe siècle, le château de Corbeil-Cerf devint un lieu de résidence. Dès son origine. L'architecte Paysagiste était René Perchère. Le château de Corbeil-Cerf possède un parc à la Française, composé de 6 kms de charmilles, bien taillées. Vous pourrez aussi admirer de grandes perspectives en rideaux qui débouchent sur des percées, des roseraies superbes, un mail de tilleuls palissé à l'Italienne, ses 3 jardins secrets. Le château de Corbeil-Cerf est partiellement classé aux M.H. depuis 1966.","habitants":"Famille des Lubersac\"","divers":"château Corbeil au cerf","gps":"","images":["../../jctruffet.com/image/image_60/60_Corbeil_Cerf_1.jpg","../../jctruffet.com/image/image_60/60_Corbeil_Cerf_2.jpg"]},"Consult_chateau_formulaire0608":{"id":"Consult_chateau_formulaire0608","dept":"60","canton":"Chantilly","commune":"Coye la forêt","nom":"Coye_la_Forêt","type":"Château","periode":"XVII-XVIII","histoire":"COYE la FORET, la construction date du XVIIe au XIXe siècle.  Situé au Nord du village, le château actuel est dû au prince de Condé, qui le fit reconstruire de 1760-1770, dans un style néo-Classique. Ce petit édifice d'époque médiévale fut transformé en moulin, connu sous le nom de loge de Viarmes. En 1825 et 1826, il fut transformé dans le goût néogothique alors naissant, à la demande du duc de Bourbon. Les travaux furent confiés à l'architecte Victor Dubois, et les sculptures furent réalisées par Boichard et Thierry. Cet édifice constitue un témoignage particulièrement précoce du goût néogothique qui accompagna la redécouverte de l'art médiéval au début du XIXe siècle. L'abondante iconographie romantique à son sujet en a fait un des archétypes du genre.\nÉléments protégés MH : le château en  totalité : classement par arrêté du 28 février 2014, modifiant larrêté du 9 mai 1989.","architecture":"COYE la FORET,  les aménagements hydrauliques du parc datent du XVIIe siècle (propriété de Toussaint Roze, secrétaire du cabinet du roi de France Louis XIV). Vers 1770, Condé fit installer une manufacture d'indiennes, dans les dépendances du château, profitant de la rivière proche, pour son énergie motrice. Ce fut le début de l'activité industrielle dans le village. Les dépendances furent remaniées à la suite d'un incendie, en 1829 et, aménagées en logements, au XXe siècle. Le château de Coye-la-Forêt avec les décors intérieurs des petits et grand salons (lambris du XVIIIe siècle), son parc, ses aménagements hydrauliques, les douves en eau, le pont métallique de Pinel, les 2 pavillons d'entrée et la ferme, qui sont inscrits aux M.H. depuis le 2/04/2002.","habitants":"Famille de Toussaint Roze\"","divers":"Château à Coye la Forêt                                                    GPS : 49° 08' 34\" Nord, 2° 28' 27\" Est","gps":"49° 08' 34\" Nord, 2° 28' 27\" Est","images":["../../jctruffet.com/image/image_60/60_Coye_la_For%c3%aat_1.jpg"]},"Consult_chateau_formulaire1f03":{"id":"Consult_chateau_formulaire1f03","dept":"60","canton":"Creil","commune":"Creil","nom":"Creil","type":"Château","periode":"XV-XVIII","histoire":"CREIL, un château appartenant aux seigneurs de Senlis est mentionné sur l'actuelle île Saint-Maurice. Sous le règne de Philippe Ier au XIe siècle, Creil appartient au comte de Clermont. Au XIIe siècle, Raoul Ier qui est alors le maître du domaine y fait construire une maladrerie qui est consacrée par lévêque de Beauvais. Tout à la fin du XIIe siècle, le 23 janvier 1197, la fille aînée de Raoul Ier de Clermont, Catherine de Clermont, va affranchir les habitants par une charte communale.  Ils demeureront libres jusquà lannexion de Philippe II Auguste, roi de France, lorsquil devient comte de Clermont et administre directement le domaine. En 1269, le Louis Ier, duc de Bourbon, reçoit le château. Charles le Bel y nait en juin 1294. Le château reste dans le domaine de la couronne jusquà François Ier qui loffre à Marguerite de Navarre. Larchitecte de Catherine de Médicis, Androuet du Cerceau, le dessine dans les plus excellent bâtiments de France et voici la citation associée à limage  Le 9 février 1782, la seigneurie, qui est entrée dans les propriétés des Princes de Condé, est vendue par ceux-ci à Pierre Juéry, procureur du roi à Creil. La ruine du château royal commence. Le château est en grande partie détruit. À partir de ce quil restait, l'une des tours, le maire de Creil, Jules Juillet, entre 1846 et 1868, y fait bâtir une maison de campagne, qui devient un cabinet de curiosité pour les amateurs d'objets anciens. Léglise de Saint-Evremont devient une manufacture dans la première partie du XIXe siècle. À noter que ce qui restait de la partie nord-est du château est classé parmi les monuments historiques depuis le 17 décembre 1923.","architecture":"CREIL, devenu maison bourgeoise à la fin du XVIIIe siècle, ce château est aujourd'hui le musée vivant Gallé Juillet. Il retrace l'histoire de la faïencerie. C'était la première industrie du bassin creillois il y a près de 200 ans qui employait à l'époque 60 % de la population. Derrière l'hôtel de ville, à l'emplacement de la collégiale Saint-Evremond on peut voir les vestiges de l'ancien château reconstruit par Charles V en 1374 à l'emplacement d'un château-fort plus ancien. Vendu par le prince de Condé, il fut en grande partie démoli en 1784. De nombreux rois de France, de Saint-Louis à Louis XIV, y séjournèrent, en particulier Charles VI qui y soigna sa folie. C'est dans la maison Gallé Juillet devenue musée municipal que se trouvent les éléments les plus anciens du XIIIe siècle. Hôtel de ville et musée Gallé-Juillet.\nÉléments protégés MH : le château en totalité : classement par arrêté du 17 décembre 1923.  Creil, Cet ancien château fort est de style Médiéval. La construction du château de Creil date du XIIIe au XVe siècle. Il ne reste depuis que la tour.","habitants":"Famille de Clermont\"","divers":"Château de Creil                                       GPS : 49° 15' 39\" Nord, 2° 28' 21\" Est","gps":"49° 15' 39\" Nord, 2° 28' 21\" Est","images":["../../jctruffet.com/image/image_60/60_Creil_1.jpg","../../jctruffet.com/image/image_60/60_Creil_2.jpg","../../jctruffet.com/image/image_60/60_Creil_3.jpg"]},"Consult_chateau_formulaire3940":{"id":"Consult_chateau_formulaire3940","dept":"60","canton":"Grandvilliers","commune":"Crillon","nom":"Crillon_Gerberoy","type":"Château","periode":"XV","histoire":"Trois châteaux dans cet article; Crillon, Monceaux et Gerberoy.     CRILLON, la famille de Boufflers acheta la seigneurie de Caigny en 1435. Elle prit le nom de Boufflers qu'elle conserva jusqu'en 1784, où le domaine passa à la famille Crillon. Le château a été construit pour le maréchal de Boufflers où il donnait des fêtes célèbres. Le plus illustre fut le duc Louis-François de Boufflers, maréchal de France, qui naquit au château en 1644. Après de nombreux combats, il revint à Boufflers et restaura son château endommagé durant les guerres de la Ligue. Mort en 1711, son coeur fut déposé dans le choeur de l'église. C'est dans un bois, face au château, en 1701 que le maréchal de Boufflers fit placer la statue équestre de Louis XIV, puis elle fut transportée à Beauvais en 1783, où elle fut détruite par le vandalisme révolutionnaire en aout 1792.  Crillon a porté successivement plusieurs noms, modifiés au gré des possesseurs successifs de son ancienne seigneurie. Nommée alors Caigny, elle est, aux XVI e et XVIIe siècles, la possession de la famille de Boufflers. En 1604, François de Boufflers obtient du Roi Louis XIII l'érection en comté de sa seigneurie de Caigny, avec l'autorisation d'y établir un marché. En 1695, son petit-fils, le maréchal de Boufflers, obtient de Louis XIV l'érection du comté de Caigny en duché de Boufflers, puis en 1708 en duché-pairie de Boufflers. En 1757, le duché de Boufflers est acheté par Claude Jean Baptiste de Saisseval (1723-1761), dont le fils, Claude Louis de Saisseval, obtient par lettres du Roi Louis XV en juillet 1766, l'érection de l'ancien duché-pairie de Boufflers en marquisat de Saisseval.\nEn 1783, Claude Louis de Saisseval vend son marquisat de Saisseval à Félix de Berton des Balbes de Crillon, alors comte de Crillon (1758-1820). Ce dernier obtient en 1784 que la terre de Saisseval prenne le nom de Crillon. En 1789, il représente la noblesse du bailliage de Beauvais aux Etats-généraux. En 1817, il est fait duc et pair par le Roi Louis XVIII.","architecture":"MONCEAUX, le château de Monceaux a été construit en 1763 avec une très belle situation sur la vallée du Petit Thérain. La demeure est dans la même famille depuis sa construction.  Le château de Moncaux appartient à la famille d'Hardivilliers. Le jardin d'agrément et le parc du château de Monceaux sont inscrits au pré-inventaire des jardins remarquables.\nÉléments protégés MH : les façades et les toitures du château ; le grand salon, le petit salon et la bibliothèque avec leur décoration ; le portail d'entrée ; la partie ordonnancée du parc : classement par arrêté du 18 mars 1970.                                                                                                  GERBEROY,  en 1435, Gerberoy est le lieu d'une bataille de la guerre de cent ans. Un val qui fait face à Gerberoy, s'appelle depuis le Val d'Arondel, du nom du comte d'Arundel, seigneur anglais qui y fut défait par les troupes françaises. Bien que la ville, avant et après, ait été le théâtre de nombreux autres faits de guerre, cette bataille est restée la plus célèbre dans la mémoire locale. En juillet 1472, après avoir levé le siège de Beauvais, Charles le Téméraire campe près de Sarcus, et brûle au passage Songeons et Gerberoy. Gerberoy est pillée et ruinée à plusieurs reprises durant les guerres de Religion, puis ses murailles sont démantelées et la ville cesse définitivement d'être une place forte. En 1679, une histoire du château et de la ville de Gerberoy, du chanoine Jean Pillet, est publiée ; c'est la principale source d'informations historiques sur Gerberoy du Moyen Âge au XVIIe siècle.","habitants":"famille Crillon et Boufflers\"","divers":"Gerberoy  grav-1-2                                                          49° 32' 06? nord, 1° 51' 02? est                                     Monceaux Grav-4  GPS : 49° 31' 11,4\" Nord, 2° 00' 16\" Est","gps":"49° 31' 11,4\" Nord, 2° 00' 16\" Est","images":["../../jctruffet.com/image/image_60/60_Crillon_Gerberoy_1.jpg","../../jctruffet.com/image/image_60/60_Crillon_Gerberoy_2.jpg","../../jctruffet.com/image/image_60/60_Crillon_Gerberoy_3.jpg","../../jctruffet.com/image/image_60/60_Crillon_Gerberoy_4.jpg"]},"Consult_chateau_formulaire257e":{"id":"Consult_chateau_formulaire257e","dept":"60","canton":"Saint-Just-en-Chaussée","commune":"Crèvecoeur-le-Grand","nom":"Crèvecoeur_le_Grand","type":"Château","periode":"XVI-XVII","histoire":"CREVECOEUR le GRAND, château du XVIe remanié au XVIIe siècle, il est bâti en brique rouge et en pierre, avec tourelles. A l'intérieur, cheminée monumentale du XVIIe siècle. Il fut la propriété de l'amiral de Bonnivet, sous François Ier. Le duc de Liancourt l'offrit en 1790 pour accueillir les sans abri de la commune, suite à l'incendie qui détruisit 50 maisons. François Ier y séjourna en 1520 en route pour l'entrevue du \"camp du Drap d'or\". Louis XIV y passa une nuit, le 15 juillet 1680. Le lendemain, la tour Nord dans laquelle il avait passé la nuit s'écroula. Il possédait de vastes dépendances et un parc enclos de 25 hectares. Après être passé entre les mains de cinq nobles familles, il fut, avec le domaine, démantelé et vendu par lots à différents particuliers en 1842. Aujourd'hui, c'est l'aile François Ier, bien entretenu, qui abrite la mairie et les mariages sont célébrés dans la chambre occupée par le roi, vaste pièce, très haute de plafond où trône une cheminée monumentale. Hôtel de ville, visite libre de la salle François Ier en semaine. Éléments protégés MH : les façades et les toitures de l'aile François Ier ; les façades et les toitures du corps principal : inscription par arrêté du 29 avril 1959.","architecture":"CREVECOEUR le GRAND, la construction du château de Crèveoeur-le-Grand date des XVIe et XVIIe siècles. Les rois François Ier et Louis XIV s'y rendirent. Après la Révolution, la propriété fut démantelée et vendue, en 1843, par lots, à plusieurs particuliers. Afin de permettre le passage d'une rue (aujourd'hui devenue une voie piétonne), l'aile sud fut séparée du corps de logis. Les fêtes François-Ier se déroulent, tous les ans, en souvenir du passage du roi François Ier à Crèvecur. Plus de 300 habitants y participent, en costumes de l'époque. La construction du château de Crèvecoeur-le-Grand date du XVIe et XVIIe siècles. Il était censé être l'un des plus beaux de l'époque. François Ier et Louis XIV,  s'y rendirent. Après la Révolution, la propriété fut démantelée et vendue par lots à différents particuliers en 1842. Afin de permettre le passage d'une rue (aujourd'hui transformée en voie piétonne), l'aile Sud fut séparée du corps de logis. Elle abrite aujourd'hui les services de la Mairie, les autres bâtiments étant utilisés par l'hôpital local.","habitants":"Amiral de Bonnivet\"","divers":"Château à Crèvecoeur-le-Grand.                                     GPS : 49° 36' 28,44\" Nord 2° 4' 38,28\" Est","gps":"49° 36' 28,44\" Nord 2° 4' 38,28\" Est","images":["../../jctruffet.com/image/image_60/60_Cr%c3%a8vecoeur_le_Grand_1.jpg","../../jctruffet.com/image/image_60/60_Cr%c3%a8vecoeur_le_Grand_2.jpg","../../jctruffet.com/image/image_60/60_Cr%c3%a8vecoeur_le_Grand_3.jpg","../../jctruffet.com/image/image_60/60_Cr%c3%a8vecoeur_le_Grand_4.jpg"]},"Consult_chateau_formulairef9e1":{"id":"Consult_chateau_formulairef9e1","dept":"60","canton":"Chaumont-en-Vexin","commune":"St-Sulpice","nom":"Crécy_Vexin","type":"Château","periode":"XVI-XVIII","histoire":"CRECY, le château actuel date du XVIIIe siècle, mais il aurait existé une maison seigneuriale, possédée par la famille de Morel des Champs en 1512. Le château sera modifié vers 1621 pour Charles des Champs et son épouse Suzanne de Verny. Au XVIIe siècle, la seigneurie est érigée en marquisat, elle appartient à la famille de la Motte-Houdancourt. Durant la Révolution Française, il appartenait à la famille Choart de Buzanval, monsieur Bégnine Choart fut arrêté et mis en prison, on le ramena à Crécy où il mourut le 11 septembre 1793. En 1946, le château est donné aux Frères Missionnaires des Campagnes et devient le prieuré Saint-Vincent de Paul et en 1970,","architecture":"CRECY, les ailes et remises ont été rajoutées au XVIIIe siècle. Les caves situées sous les trois travées centrales ont conservé six voûtes en pierre dont les croisées dogives prennent appui sur de puissants doubleaux. En 1946, le château est donné aux Frères missionnaires des Campagnes et devient le prieuré Saint-Vincent de Paul et en 1970, le prieuré est vendu à lassociation de la maison Familiale Rurale qui ouvrira un centre de formation agricole, et dans le château est réalisé un centre de Formation.","habitants":"Famille de la Motte-Houdancourt\"","divers":"château de crécy à St-Sulpice","gps":"","images":["../../jctruffet.com/image/image_60/60_Cr%c3%a9cy_Vexin_1.jpg","../../jctruffet.com/image/image_60/60_Cr%c3%a9cy_Vexin_2.jpg"]},"Consult_chateau_formulaire926e-2":{"id":"Consult_chateau_formulaire926e-2","dept":"60","canton":"Crépy-en-Valois","commune":"Crépy en Valois","nom":"Crépy_en_Valois","type":"Château","periode":"XIII","histoire":"quatre châteaux dans cet article; Crépy, Gueresme, Gilocourt et Cornon.                                                                                                               CREPY EN VALOIS, en 1170 Thibault II de Crépy Nanteuil  transmet à son fils Philippe Ier, compagnon d'armes de Philippe Auguste à la bataille de Bouvines, affirme sa richesse en surélevant la chapelle et en construisant un château à vocation résidentielle. Le premier étage accueille les cuisines et l'ensemble des communs. Plus surprenant était le confort des chambres nobles, éclairées par de larges fenêtres. Philippe Ier recevait dans une salle couverte d'une magnifique charpente. Lorsqu'il perd sa vocation résidentielle dans la deuxième moitié du XIIIe siècle, cet espace se transforme peu à peu en grenier. Le domaine en 1406 est érigé en duché-pairie. Au XVe siècle le château est rattaché au domaine des ducs de Valois. Il devient ensuite le siège du tribunal du baillage et de l'administration du duché. De la fin du XVIe siècle à 1850, le château sert entre autres de prison. Une froide nuit d'octobre elle accueille un hôte illustre, le poète Gérard de Nerval. Par la suite, associations locales et compagnie théâtrale se succèdent avant de laisser la place à un musée. Refondé en 1949, les collections de celui-ci sont alors orientées vers l'archerie puis le patrimoine religieux du Valois.    le musée de l'archerie et du Valois est installé dans un ensemble médiéval original, à la fois palais princier, noble demeure seigneuriale et maison de ville. Construit sur un promontoire découpé dans le plateau du Valois, il occupe à une position dominante. Une chapelle basse, dédiée à saint Aubin et ouverte sur la ville, est d'abord bâtie vers 1170 par Thibault III de Crépy Nanteuil.  Éléments protégés MH : le château de Crépy en Valois en totalité : inscription par arrêté du 3 avril 1926.","architecture":"AU nord à 5 KM de Crépy,  GILOCOURT  un château privé, fermé au public.                                                                                                                           TRUMILLY-CORNON à cinq K.M à l'ouest  A l'origine, la seigneurie de Trumilly appartenait au chapitre de Saint-Rieul de Senlis et Drucy faisait partie du baillage de Beaumont sur Oise. C'est Charlemagne qui donna à Oger le Danois la colline de Cornon où ce dernier construit une forteresse. Cette demeure fut attaquée par les Navarrois et les Bourguignons aux XIVe et XVe siècles et ne revint à la Couronne qu'en 1359. Le château subit de nouveaux ravages au XVe siècle et sa forme actuelle date du XVIIIe siècle.                                                                                                                                                                                                                                                                GUERESME, le château et le parc de Geresme,  à l'ouest de la ville de Crépy-en-Valois. Il est composé d'un vaste jardin public, dans le style d'un jardin anglais, situé dans un vallon arboré, avec des fabriques, des étangs, des enclos avec des animaux et des jeux pour enfants. Château et parc de Géresme, avenue de l'Europe, à l'est de la ville : vaste parc de 21 hectares, dans le style d'un jardin à l'anglaise, situé dans un vallon arboré, avec des fabriques, des étangs, des enclos avec des animaux et des jeux pour enfants. En 1974, la ville devient propriétaire du parc et du château de Géresme. Le parc est inauguré et ouvert au public en 1978.","habitants":"Famille de  Thibault II de Crépy\"","divers":"quatre châteaux dans cet article; Crepy grav 1-2-3-4, Gueresme  grav -5 et Gilaucourt grav 6 et Cornon.                                                               Gueresme  GPS : 49° 14' 09\" Nord, 2° 53' 24\" Est                                               Gilocourt GPS : 49° 17' 34\" Nord, 2° 52' 49\" Est","gps":"49° 14' 09\" Nord, 2° 53' 24\" Est","images":["../../jctruffet.com/image/image_60/60_Cr%c3%a9py_en_Valois_1.jpg","../../jctruffet.com/image/image_60/60_Cr%c3%a9py_en_Valois_2.jpg","../../jctruffet.com/image/image_60/60_Cr%c3%a9py_en_Valois_3.jpg","../../jctruffet.com/image/image_60/60_Cr%c3%a9py_en_Valois_4.jpg","../../jctruffet.com/image/image_60/60_Cr%c3%a9py_en_Valois_5.jpg","../../jctruffet.com/image/image_60/60_Cr%c3%a9py_en_Valois_6.jpg"]},"Consult_chateau_formulaire65d7":{"id":"Consult_chateau_formulaire65d7","dept":"60","canton":"Compiègne","commune":"Cuise la Motte","nom":"Cuise_la_Motte","type":"Château","periode":"XIV-XVII","histoire":"trois châteaux dans cet article , Cuise-la-Motte et Ortois, Hautefontaine.                                                                                                 CUISE LA MOTTE, Gilles Charmolue acquiert de Louis-Charles de Lévy, duc de Ventadour (maison des Montmorency) au profit de  Gilles Charmolue, conseiller du roi grenetier au grenier à sel de Compiègne, les terres et seigneurie de Cuise par acte de cession du 14 juillet 1662 (copie notariée du 3 août 1662) Cet acte ne fait plus état dun château mais  dune masure ayant seulement quelques fondations et murailles.  Le 11 octobre 1804, la dernière  dame de Cuise  Marie-Madeleine-Josèphe Féret, veuve de François Defresne,  chevalier, dernier seigneur de Cuise se dessaisit de tous ses biens . Cest le citoyen Jean-Antoine Varanguin- Villepin, maire de Cuise la Motte qui achète le château et ses dépendances. Le 13 avril 1818, sa fille épouse  Antoine, Gabriel Leféron dEterpigny, et hérite du château et de la ferme du Mont de Cuise.   Antoine Gabriel Leféron dEterpigny qui sera maire de Cuise la Motte, est descendant de la maison Charmolue par Louis Leféron, seigneur de Ville dont la femme était la sur de lépouse de Gilles Charmolue.                                                                                                       ORTOIS à Jaulzy Vers 1550, construction d'un petit domaine autour d'un château. L'ensemble remplaçait sans doute un château plus ancien, comme en témoigne la présence de caves remontant au XIVe siècle. Détruit à la Révolution, l'édifice cède la place à un corps de bâtiment vers 1810. Le jardin comprend des fabriques, comme le petit temple, en vogue au XVIe siècle, aujourd'hui rares en France. Éléments protégés MH : les vestiges du château, le temple, les murs d'enceinte et les tourelles d'angle : inscription par arrêté du 7 juin 2004.","architecture":"CUISE LA MOTTE, château dont les premières pierres furent posées au XIVe siècle. Doté d'une magnifique poterne d'entrée encadrée de tours massives, le château est flanqué de deux grosses tours carrées avec des hautes coiffes à quatre faces de tuiles château ainsi que l'ensemble des communs, le pont et les douves doté d'une magnifique poterne d'entrée encadrée de tours massives, le château de Cuise la Motte est flanqué de deux grosses tours carrées avec des hautes coiffes à quatre faces de tuiles.                                                                           Sa construction  débuta au XIVe siècle et se termina au XVIIe siècle, dont les premières pierres furent posées au XIVe siècle, il  est inscrit aux M.H. depuis 1986 avec ses communs, le pont et les douves.                                                                                                                                  a cinq K.M. au sud-est HAUTEFONTAINE; le château  a été construit au milieu du XIXe siècle sur les fondations d'un édifice précédent détruit après la révolution. Cest dans cette ancienne demeure de la fin du XVIIe siècle, appartenant à la comtesse de Rothe, que sétait établie une véritable société de cour. Parmi les visiteurs prestigieux du château, on trouve Henri Louis Hautefontaine Marie, prince de Rohan Guéméné, grand chambellan de France, le duc de Lauzun et la duchesse de Polignac. A côté, dans la cour de la ferme, un beau pigeonnier octogonal daté de 1771, élevé pour la comtesse de Rothe.","habitants":"Antoine Gabriel Leféron dEterpigny \"","divers":"trois  châteaux dans cet article , a Cuise, Chesnoies grav 1 et Ortois. Parc -Hauitefontaine grav-2-3                                          cuise  GPS : 49° 23' 08\" Nord, 3° 00' 31\" Est","gps":"49° 23' 08\" Nord, 3° 00' 31\" Est","images":["../../jctruffet.com/image/image_60/60_Cuise_la_Motte_1.jpg","../../jctruffet.com/image/image_60/60_Cuise_la_Motte_2.jpg","../../jctruffet.com/image/image_60/60_Cuise_la_Motte_3.jpg","../../jctruffet.com/image/image_60/60_Cuise_la_Motte_4.jpg"]},"Consult_chateau_formulaire6feb":{"id":"Consult_chateau_formulaire6feb","dept":"60","canton":"Noyon","commune":"Cuts","nom":"Cuts","type":"Château","periode":"XVII","histoire":"CUTS, Il se compose d'un corps de logis flanqué sur sa façade sud de deux pavillons aux deux bouts, le tout couvert d'ardoises, entouré de douves en eau. Le colombier située à l'est est le seul vestige de la basse cour, pavillon de la façade sud, tourelle ouest de l'escalier de service, et la distribution intérieure entièrement remaniée. La galerie de la façade nord est bâtie en 1898 et le pont donnant accès à la cour nord, reconstruit en 1890, date de la création d'un tapis vert. En 1917, les Allemands détruisent le pigeonnier et incendient le château, il sera reconstruit en 1926, en conservant le soubassement et les assises de fondations de la première construction. La reconstruction est réalisée à l'identique, hormis quelques détails, création de douves, l'édifice conserve un escalier à balustre du XVIIe siècle ainsi que des éléments de dallage du XVIIIe siècle. La maison du régisseur a été bâtie en 1824.","architecture":"CUTS, c'est en 1636, que fut construit le château de Cuts, sur l'emplacement d'un édifice plus ancien. Il est composé d'un corps de logis, de deux pavillons aux deux extrémités, sur la façade Sud. La toiture est recouverte d'ardoises. Le château de Cuts est entouré de douves en eau. il  a été remanié de 1881 à 1898. Les charpentes refaites, ont été réhaussée d'un étage. Le pavillon de la façade sud, avec une tourelle coté Ouest,de l'escalier de service et la distribution intérieure a été entièrement remaniée. Le colombier situé, du coté Est, est le seul vestige de la basse-cour. La galerie de la façade Nord date de 1898. Le pont donnant accès à la cour Nord, a été reconstruit en 1890, ainsi qu'un tapis vert. En 1917, les Allemands détruisirent le pigeonnier et incendièrent le château. il sera reconstruit, en 1926, gardant le soubassement et les assises des fondations de la première construction. La reconstruction du château a été réalisée à l'identique, à part quelques détails. Comme la création de douves, l'édifice a conservé son escalier à balustre qui date du XVIIe siècle ainsi que des éléments du dallage qui remonte au XVIIIe siècle. Louis Gashing décrit un corps de logis flanqué sur sa façade septentrionale de deux pavillons aux deux bouts, le tout couvert d´ardoises, entouré de douves en eau.","habitants":"Louis Gashing \"","divers":"Château de Cuts  GPS : 49° 31' 55\" Nord, 3° 06' 02\" Est","gps":"49° 31' 55\" Nord, 3° 06' 02\" Est","images":["../../jctruffet.com/image/image_60/60_Cuts_1.jpg","../../jctruffet.com/image/image_60/60_Cuts_2.jpg"]},"Consult_chateau_formulaire7b8e":{"id":"Consult_chateau_formulaire7b8e","dept":"60","canton":"Mouy","commune":"Juvignies","nom":"Douye_Vexin","type":"Château","periode":"XIV-","histoire":"DOUYE,  ce sont les vestiges du château médiéval du roi Jean le Bon, il est relié à un mur d'enceinte. Deux ailes sont liées par une tourelle d'escalier hexagonale. Une tour cylindrique fait la liaison avec le pavillon de gauche. A voir également la Chambrerie de Béthisy-Saint-Pierre qui est située aux abords du chevet de l'église paroissiale. La Chambrerie fut au Haut Moyen Age, le siège de la juridiction du Chambrier de France. En 1123, Lisiard de Crépy, évêque de Soissons, donne à l'abbé de Saint-Crépin-le-Grand, Teulphe, les autels de Saint-Pierre et de Saint-Martin pour y installer une communauté de moines. Au XVIIe siècle, la Chambrerie devient le prieuré Saint-Pierre de l'Ordre réformé de Saint-Maur. Pendant la Révolution, elle fut vendue comme bien national. Au milieu du XIXe siècle, une communauté de bénédictins venue de La-Pierre-qui-Vire s'installe à Béthisy;   les travaux d'aménagement commencent en 1857. La chapelle est construite en 1859. Expulsés une première fois en 1880, les religieux le seront définitivement en 1903 et seront remplacés par les Soeurs des Ecoles Chrétiennes de la Miséricorde. La Chambrerie de Béthisy-Saint-Pierre conserve des éléments disparates, témoignage de ses occupations successives : mur de clôture du Moyen Age avec portail d'entrée du XIXe siècle, salle voûtée du XIVe siècle dite salle capitulaire, caves voûtées en berceau, logis remanié au XIXe siècle, chapelle (1859) , temple d'inspiration grecque (1843).","architecture":"DOUYE, Béthisy fut une résidence Royale, plusieurs souverains de la dynastie Capétienne y séjournèrent au XIe siècle. Deux tourelles polygonales du XIVe siècle couvertes de toits pyramidaux, entourent l'entrée du château de la Douye, ce sont les vestiges du château médiéval du roi Jean le Bon, les verrières de la chapelle sont extrêmement intéressantes : les grisailles de la nef ont été réalisées à La-Pierre-qui-Vire ; les vitraux du transept illustrant le Sacré-Coeur et la Vierge au Saint-Coeur sont signées de l'atelier Lévêque, en activité à Beauvais entre 1850 et 1888 ; la rose de la façade orientale est l'oeuvre de l'abbé Deligny, auteur des verrières des églises de Jonquières, Rémy, Canly et Le Meux ; cette rose figure la Passion du Christ grâce à des symboles. Le mur d'enceinte et portail d'entrée ; les façades et les toitures du logis ; les caves du logis ; la salle voûtée du XIVe siècle dans le logis ; la chapelle prieurale en totalité ; le temple d'inspiration grecque de 1843 ; le jardin et les sols archéologiques sont inscrits MH par arrêté du 13 octobre 1998.\nÉléments protégés MH : les façades et les toitures du château de la Douye ; les façades et les toitures et le mur d'enceinte du château du roi Jean : inscription par arrêté du 14 septembre 1949.","habitants":"Seigneurs locaux\"","divers":"Château de Douye à Juvignies","gps":"","images":["../../jctruffet.com/image/image_60/60_Douye_Vexin_1.jpg","../../jctruffet.com/image/image_60/60_Douye_Vexin_2.jpg","../../jctruffet.com/image/image_60/60_Douye_Vexin_3.jpg"]},"Consult_chateau_formulaire3af1":{"id":"Consult_chateau_formulaire3af1","dept":"60","canton":"Beauvais","commune":"Warluis","nom":"Epine_Warluis","type":"Château","periode":"XVII-XVIII","histoire":"L'EPINE  le château actuel a été précédé par un château médiéval dont il reste la tour ainsi que la tourelle situées au sud et à l'est de l'édifice. A partir de cette époque, la demeure subit trois vagues de transformations. L'aile qui se déploie à l'est date du XVIIe siècle. Un escalier de style Louis XV pourvu d'une rampe en fer forgé fut conçu dans l'ancien corps médiéval. Le château est modernisé dans le premier quart du XIXe siècle : agrandissement vers l'ouest, deux avant-corps sont ménagés et un étage d'attique est créé. Deux dépendances à usage de remise et de logement ont été édifiées aux XVIIIe et XIXe siècles. Enfin, la chapelle datant du XVIe siècle est toujours visible.  Éléments protégés MH : le domaine du château comme suit : le château, les façades et les toitures, l'escalier Louis XV avec sa rampe en ferronnerie, la tour et la tourelle, les dépendances (remise et logement du gardien) les façades et les toitures, la chapelle en totalité : inscription par arrêté du 12 mars 2012.","architecture":"L'EPINE, d'origine médiévale, il subsiste quelques éléments d'architecture intérieurs et extérieurs. Le château de l'Epine a été agrandi et transformé au XVIIe, au XVIIIe siècle et au début du XIXe siècle. Le château de l'Epine est une propriété privée, fermée au public. Il est inscrit aux M.H. depuis le 12/03/2012.","habitants":"\"","divers":"Château de l'Epine à Warluis                    GPS : 49° 23' 20\" Nord, 2° 08' 30\" Est","gps":"49° 23' 20\" Nord, 2° 08' 30\" Est","images":["../../jctruffet.com/image/image_60/60_Epine_Warluis_1.jpg"]},"Consult_chateau_formulaire10d5":{"id":"Consult_chateau_formulaire10d5","dept":"60","canton":"Nanteuil-le-Haudouin","commune":"Ermenonville","nom":"Ermenonville","type":"Palais","periode":"XVIII","histoire":"ERMENONVILLE, le premier château-fort d'Ermenonville avait été construit, en 987, à l'époque d'Hugues Capet et, au XVe siècle, le roi Louis XI est venu y séjourner. À la fin du XVIe siècle, le roi Henri IV venait souvent se reposer à Ermenonville. Il a permis à son fidèle cavalier à la jambe de bois Dominique de Vic d'acquérir le château d'Eermenonville. En 1754, il est vendu au collecteur des impôts du roi Louis XV, René Hatte. Son petit-fils, le Marquis René de Girardin en 1763  en   devient propriétaire par héritage et  à partir de 1765, il aménage le parc orné de fabriques, inspiré par Jean-Jacques Rousseau et sa vision de la nature. Le marquis s'entoure de Jean-Marie Morel, de Hubert Robert et de jardiniers écossais. Le 2 juillet 1778 Jean-Jacques Rousseau meurt et est enterré dans l'île des Peupliers jusqu'en 1794 sera ensuite transféré au Panthéon.  Le 31 mai 1991, le château est acheté par \"Les hôtels particuliers\" du groupe de Philippe Savry. Il est réaménagé en hôtel-restaurant de prestige.","architecture":"ERMENONVILLE, Palais à trois corps de logis de pan rectangulaire à deux niveaux avec série de lucarnes sur comble en croupes recouvert d'ardoises. l'ensemble est accolée daux angles de tours rondes à  mâchicoulis toits en poivrière, sur la façades  intérieure et extèrieure avant corps avec fronton triangulaire. Le parc comptait à l'origine plus de 50 fabriques. Le château occupe une position centrale. La partie nord comprend le Désert, les étangs et une partie agricole.   Au nord du château d'Eermenonville subsiste le « Petit parc » le long d'un étang appelé la « Grande rivière », avec quelques fabriques de jardin de la fin du XIXe siècle.   Au XVIIIe siècle le château est transformé sur les fondations de l'ancien château-fort, dont il reste deux tours rondes à l'est et deux à l'ouest, ainsi que les douves.                                                                        Éléments protégés MH : le château : inscription par arrêté du 11 juin 1930. Le parc Jean-Jacques Rousseau : l'ensemble des terrains formant le parc ; le banc de la Reine ; la grotte des naïades ; la cascade ; la glacière ; le pont de la brasserie disparue ; l'autel de la rêverie ; le temple de la philosophie ; la grotte aux ossements ; la tombe de Jean-Jacques Rousseau dans l'île aux peupliers ; le tombeau du jeune inconnu ; le faux-dolmen ; la table des mères avec son inscription ; le banc rustique ; l'inscription liminaire à l'entrée du parc ; le tombeau présumé de Frédéric Meier ; la prairie arcadienne au Sud : classement par arrêté du 26 janvier 1989. Le parc Jean-Jacques-Rousseau : l'embarcadère ; le jeu d'arc : inscription par arrêté du 26 janvier 1989.","habitants":"Jean-Jacques Rousseau \"","divers":"Château d'Ermenonville                                GPS : 49° 07' 36\" Nord, 2° 41' 35\" Est","gps":"49° 07' 36\" Nord, 2° 41' 35\" Est","images":["../../jctruffet.com/image/image_60/60_Ermenonville_1.jpg","../../jctruffet.com/image/image_60/60_Ermenonville_2.jpg","../../jctruffet.com/image/image_60/60_Ermenonville_3.jpg","../../jctruffet.com/image/image_60/60_Ermenonville_4.jpg","../../jctruffet.com/image/image_60/60_Ermenonville_5.jpg"]},"Consult_chateau_formulaireb143":{"id":"Consult_chateau_formulaireb143","dept":"60","canton":"Noyon","commune":"Appily","nom":"Estay","type":"Château","periode":"XVI-XVII","histoire":"ESTAY,  est donné en 1155 à l'abbaye de Longpont. Des traces d'occupation romaine y ont été découvertes en 1830. Le fief était du ressort du bailliage de Chauny. Il était composé au début du XVIIe siècle, d'une cense et de deux maisons, sur le bord de l'Oise. En 1609, Estay appartient à Joram de Vrévin, conseiller du Roi, lieutenant général civil et criminel au bailliage et prévosté de Chauny, puis à la famille Méniolle d'Armancourt, au XVIIIe siècle. M. Paffe épouse la fille d´Anne-Claire Victoire Méniolle d'Epinoy, créée en 1829, à l'initiative de Charles Paffe et de Casimir Bove.  Le colombier et un côté de la basse-cour datent du XVIIIe siècle; les autres parties de la basse-cour sont soit du début du XIXe siècle soit des années 1925, 1930.\nLe corps de logis a été construit au milieu du XIXe siècle, en conservant quelques éléments d´un édifice de la seconde moitié du XVIIIe siècle. Diverses inscriptions ont été relevées dans le sous-sol, avec les dates 1766 et 1782. Le colombier du château, aujourd´hui isolé, se trouvait jusqu'à la première guerre mondiale au centre de la cour des communs.","architecture":"ESTAY, cette construction, de plan octogonal, construite en brique avec de puissants chaînages de pierre, est sans doute contemporaine des parties les plus anciennes du corps de logis. A l´intérieur, échelle tournante et boulins en torchis sur une structure en bois et en tuile plate sont conservés. En 1829, Charles Paffe et Casimir Bove installent, dans les dépendances du château, une sucrerie de betteraves équipée d'une chaudière à vapeur dès l'origine. La fabrique, qui emploie 90 ouvriers saisonniers en 1851.  La sucrerie est équipée d'une chaudière à vapeur dès l'origine. En 1850, elle est équipée de sept fourneaux, deux fours, une forge, et onze machines. En 1851, elle compte huit chaudières et 600 formes et cristallisoirs. Le logis du château, qui a conservé des parties de la deuxième moitié du XVIIIe siècle (dates 1766 et 1782 dans le sous-sol du logis), date pour l'essentiel du milieu du XIXe siècle., semble avoir cessé sa production vers 1893. Aujourd'hui le château comprend un logis de plan allongé, au centre d'un parc à l'anglaise, une basse-cour et des communs disposés autour d'une cour carrée, enfin un colombier aujourd'hui isolé. Inscriptions dans le sous-sol du logis: Iean David . 1766  Iay été posé en l'absence de M. de Rinoy écuyer valet de Charles de la Reine seigneur d'Estay posé par Martin Charles Pollet son concierge 18 juin 1782.","habitants":"famille Méniolle d'Armancourt\"","divers":"Château d'Estay à Appily","gps":"","images":["../../jctruffet.com/image/image_60/60_Estay_1.jpg"]},"Consult_chateau_formulairec1f8":{"id":"Consult_chateau_formulairec1f8","dept":"60","canton":"Clermont","commune":"Breuil-le-Sec","nom":"Etournelles","type":"Château","periode":"XVIII-XIX","histoire":"ETOURNELLES , le paysagiste Louis-Sulpice Varé proche de l'empereur Napoléon III. Celui-ci a été transformé, vers 1671, par Louis de Béchameil (1630-1707), surintendant de Monsieur, qui était le frère de Louis XIV, pour devenir une importante exploitation agricole, il est particulièrement généreux, à plus forte raison qu'il n'est destiné qu'à la consommation personnelle des maîtres des lieux depuis sa création en 1848. Le parc possède de longues allées sinueuses avec de jolis points de vue, des arbres majestueux, un étang et son île reliée par deux ponts. Éléments protégés MH : le jardin potager : inscription par arrêté du 27 décembre 2004.","architecture":"ETOURNELLES  le chateau des Etournelles de la Ferme des Étournelles ou Ferme des Tournelles repose sur les bases d'un ancien manoir fortifié dont il reste seulement une tourelle. Entouré de quatre murs de pierres érigés il y a plus d'un siècle et demi, le potager est vraiment le cur du parc du château.  L'habitation a été remaniée au XIXe siècle, mais l'imposante grange à récolte, construite vers 1680, est demeurée intacte. Le jardin des Étournelles est créé par Louis-Sulpice Varé en 1851.   Sa construction date du XVIIIe siècle et s'est achevée au XIXe siècle. il est inscrit aux M.H. depuis le 27.12.2004. Devenu un lieu de passage stratégique, occupé tout au long du Moyen-Age, le château des Etournelles est ensuite transformé en une élégante demeure résidentielle. Il sera transformé, au milieu du XIXe siècle, avec l'association, d'un parc et d'un jardin aménagé par le paysagiste Louis-Sulpice Varé.","habitants":"Famille de Louis de Béchameil\"","divers":"Château des Etournelles à Breuil-le-Sec                                                                     GPS : 49° 22' 18\" Nord, 2° 26' 59\" Est","gps":"49° 22' 18\" Nord, 2° 26' 59\" Est","images":["../../jctruffet.com/image/image_60/60_Etournelles_1.jpg","../../jctruffet.com/image/image_60/60_Etournelles_2.jpg"]},"Consult_chateau_formulaireb377":{"id":"Consult_chateau_formulaireb377","dept":"60","canton":"Estrées-Saint-Denis","commune":"Le Fayel","nom":"Fayel","type":"Château","periode":"XVII","histoire":"FAYEL,  construit pour le maréchal, duc de la Motte Hondencourt, que ce dernier  avait acquit en 1627, par Bruand de 1650 à 1656. Le château est la réplique fidèle du premier château de Versailles, rendez-vous de chasse de Louis XIII. Louis XIV vint au Fayel avec sa mère et Mazarin pour y recevoir la Reine Christine de Suède selon la description des mémoires de Madame de Motteville. Le parc est attribué à Le Nôtre. en 1653  ergée en duché-pairie.  Au XVIIIe siècle, le domaine passa successivement par mariage aux Rouault Gamache apparentés à la famille des Arnauld jansénistes qui introduisirent dans le château les boiseries qui y sont encore, aux Héricy, aux Walsh Serrant et aux Cossé Brissac, propriétaire actuel .  Le château abrite aussi des portraits et mobiliers provenant de la famille du maréchal d'Empire Mortier, Duc de Trévise, ancêtre du propriétaire actuel. Le château du Fayel s'est toujours transmis par mariage (La Mothe-Houdancourt, Rouault-Gamaches, d'Héricy)  le comte  Charles de Cossé-Brissac acquiert le château en 1925.","architecture":"FAYEL, il date du XVII-XXe siècles. Il servait de château seigneurial. Son propriétaire initial était la Famille de La Mothe-Houdancour. Le château du Fayel sert depuis d'habitation privée.  Il s'agit d'un beau château de briques à coin de pierre avec un corps central à deux ailes en retour bien entretenu. L'intérieur a été réaménagé au XVIIIe siècle. Il était entouré d'un parc à la française, peut-être de Le Nôtre, dont on distingue encore le plan. Il est dessiné par Jacques Bruant pour  Philippe de La Mothe-Houdancourt, maréchal de France et vice-roi de Catalogne. L'architecte Jacques Bruant a egalement construit le pavillon des drapiers, dont la facade se trouve aujourd'hui au musée Carnavalet et le batiment a été remplacé par la Crèmerie de Paris. Il est le frère ainé de Libéral Bruand, architecte des Invalides. Une grande partie des peintures et des meubles que l'on peut voir dans le château actuel provient de ces différentes familles. Éléments protégés MH : les façades et les toitures ainsi que le pavillon dans le parc à l'angle sud-ouest du château : inscription par arrêté du 13 janvier 1947. Les façades et les toitures des communs : inscription par arrêté du 5 août 1980.","habitants":"Famille de La Mothe-Houdancour. \"","divers":"Château de Fayel  à le Fayel                                   GPS : 49° 22' 12\" Nord, 2° 41' 49\" Est","gps":"49° 22' 12\" Nord, 2° 41' 49\" Est","images":["../../jctruffet.com/image/image_60/60_Fayel_1.jpg"]},"Consult_chateau_formulaire20db":{"id":"Consult_chateau_formulaire20db","dept":"60","canton":"Mouy","commune":"Thury-sous-Clermont","nom":"Fillerval","type":"Château","periode":"XVIII","histoire":"FILLERVAL, château construit au XVIIIe siècle pour la famille des astronomes Cassini, entouré de douves avec un bel étang. La famille des Cassini était en possession de la seigneurie de Thury depuis 1719, elle avait établi un observatoire dans une tour du château. Fronton du château représentant les instruments de l'astronomie. Une des filles de Jean Dominique Cassini épousa Monsieur de Vuillefroy, de Silly, dont le père était propriétaire du château de Fillerval à la fin du XIXe siècle. César François Cassini de Thury fils de Jacques, né à Thury, réalise une grande carte de France, appelée Carte de Cassini, en 183 feuilles à l'échelle de 1/86400. Elle servira de modèle à la carte d'Etat-Major. Il est également le mathématicien qui définit la fonction donnant une courbe appelée \"Cassinienne\". Le jardin d'agrément de Fillerval est inscrit au pré-inventaire des jardins remarquables.","architecture":"FILLERVAL, la construction du château date du XVIIIe siècle. Situé sur l'emplacement de l'ancien château fortifié de Thury, propriété des Cassini depuis 1719, qui fut détruit en 1784 pour faire place à une construction entourée de douves et d'un étang. En 1950, le château de Fillerval a été ravagé par un incendie mais a été, depuis, restauré. Sur son fronton, on peut admirer les instruments de l'astronomie. Aujourd'hui, il est occupé par le centre de formation de l'Institut Français de Gestion. Vous pourrez aussi y organiser des mariages pour une centaine d'invités.","habitants":"famille des Cassini\"","divers":"château de fillerval  à Thury-sous-Clermont                                             GPS : 49° 21' 29\" Nord, 2° 18' 46\" Est","gps":"49° 21' 29\" Nord, 2° 18' 46\" Est","images":["../../jctruffet.com/image/image_60/60_Fillerval_1.jpg"]},"Consult_chateau_formulaire1b58":{"id":"Consult_chateau_formulaire1b58","dept":"60","canton":"Beauvais","commune":"Saint-Martin-le-Nud","nom":"Flambermont","type":"Château","periode":"XVII","histoire":"FLAMBERMONT, le SATO, service d'aide aux toxicomanes, a racheté le château de Flambermont pour y accueillir des jeunes toxicomanes et les aider à leur réinsertion. La construction  date du XVIIe siècle. Il est inscrit aux M.H. depuis 2007 et 2012. Le château de Flambermont est en brique et pierre . La Serre est de type Palmarium et date de la fin du XIXe siècle. Les éléments protégés par les M.H. sont la cour, le jardin, le mur de clôture, le parc, la serre, le vestibule et le bureau du château.","architecture":"FLAMBERMONT, château en brique et pierre construit au XVIIe siècle. Serre de type palmarium de la fin du XIXe siècle. L'édifice accueille lassociation SATO Picardie qui traite de laddiction sous toutes ses formes, sa prévention, son dépistage, son traitement, notamment sur le plan de la réinsertion professionnelle et défendre lintérêt des personnes touchées par cette pathologie.\nÉléments protégés MH : les façades et les toitures du château, son hall d'entrée ; la pièce tapissée de lambris en bois servant aujourd'hui de bureau ; la cour d'honneur ; le jardin d'agrément ; la serre ; l'ensemble du parc et ses murs de clôture comprenant une porte charretière : inscription par arrêté du 26 janvier 2007, modifié par arrêté du 20 janvier 2012.","habitants":"Association SATO \"","divers":"Château de Flambermont à Saint-Martin-le-Nud                                          GPS : 49° 24' 01\" Nord 2° 03' 22\" Est","gps":"49° 24' 01\" Nord 2° 03' 22\" Est","images":["../../jctruffet.com/image/image_60/60_Flambermont_1.jpg"]},"Consult_chateau_formulaireb390":{"id":"Consult_chateau_formulaireb390","dept":"60","canton":"Grandvilliers","commune":"Fontaine Lavaganne","nom":"Fontaine_Lavaganne","type":"Château","periode":"XIV","histoire":"FONTAINE LAVAGANNE, le château de Fontaine Lavaganne  construit au XIVe siècle. Il fut attaqué en 1419 par les Anglais, sous les ordres des comtes d'Huntington et de Cornouailles. Anne de Pisseleu, future duchesse d'Etampes et favorite de Françoise Ier, y naquit en 1508. Le château-fort fut pris en 1589 par les ligueurs d'Amiens, commandés par le capitaine Lefort. En 1592 le sieur de Boufflers, bailli de Beauvais, l'un des chefs de la ligue se retira dans ce château où il soutint différentes attaques des royalistes. L'édifice passa en 1678 à monsieur Jolly d'Oudeuil, qui en fit une maison de plaisance. Après avoir été dans la famille de Cossart d'Espiès, il appartient à M. Gérard de Lestanville.","architecture":"FONTAINE LAVAGANNE, c'est une des rares forteresse du Moyen-Age restée intacte jusqu'à nos jours, sauf la tour Ganelon détruite en 1830 et qui datait du XIIe siècle. Deux corps de bâtiment en équerre le joignent à deux tours, l'une ronde à poivrière, l'autre quadrangulaire à mâchicoulis, le tout forme un mélange de lucarnes, de contreforts et de constructions ajoutées du XVe siècle à nos jours.  La construction du château date du XIVe siècle. Il fut construit en pierre et en silex. Le château de Fontaine-Lavaganne est depuis une propriété privée, fermée au public.","habitants":"Monsieur Jolly d'Oudeuil,                                Famille de Cossart d'Espiès\"","divers":"Château à Fontaine Lavaganne        GPS : 49° 35' 57\" Nord, 1° 57' 20\" Est","gps":"49° 35' 57\" Nord, 1° 57' 20\" Est","images":["../../jctruffet.com/image/image_60/60_Fontaine_Lavaganne_1.jpg"]},"Consult_chateau_formulaire3905":{"id":"Consult_chateau_formulaire3905","dept":"60","canton":"Chantilly","commune":"Gouvieux","nom":"Fontaines_Vexin","type":"Château","periode":"XVIII","histoire":"FONTAINES, cette ancienne résidence appartenait à la famille Rothschild, puis il est devenu un centre de formation jésuite, pour devenir un centre de séminaires d'entreprises. (façades, toitures et escalier monumental du château ; façades, toitures et pavillon octogonal de la ferme normande sur la route ; façades et toitures des « Tourelles », Le domaine a été fondé en 1781 par Jacques Berthault, entrepreneur de bâtiment à Paris originaire de Chantilly, qui se fit construire une grande maison dans un parc. Son fils profita des ventes de biens nationaux à la Révolution pour agrandir la propriété à 27 ha et créer un Jardin anglais. Après sa mort, vers la fin de l'Empire, 5 propriétaires se succédèrent, et le domaine fut divisé en 2 parties vers 1833. Le secteur du jardin anglais fut loti et coupé par le chemin de fer. L'autre partie fut acquise en 1878 par Nathan-James de Rothschild, qui la porta à 27 ha et fit construire un château par l'architecte Félix Langlais, dont le gros uvre fut achevé en 1881. L'édifice de brique et pierre avec des hauts combles à la française est inspiré du style Louis XIII, exception faite des tourelles et des bow-windows de la façade sur le parc des pavillons latéraux. S'y ajoutèrent ensuite d'autres bâtiments : « Les Tourelles », portail côté Chantilly (1880) ; la « Ferme normande »  (1892), qui fut le domicile de Thérèse de Rothschild, en 1895.  Fontaines,  les écuries et la maison du concierge « le Chauffour ». Les Rothschild abandonnèrent le château des Fontaines, en 1933 et le vidèrent, avec une grande partie du décor compris. Durant la guerre, le château des Fontaines servit de PC pour la Luftwaffe relié téléphoniquement par une ligne directe au PC dHitler, puis fut occupé par les Américains après la libération.","architecture":"FONTAINES,  en 1946, la famille le vendit finalement aux Jésuites, qui y installèrent leur séminaire des missions. Ils y firent bâtir une chapelle en briques décorée d'une fresque d'Albert Gleizes   en 1950, une maison d'hôtes pour les séminaristes et une grande bibliothèque constituant deux appendices au château. La bibliothèque comprenait environ 700.000 ouvrages dont un cahier de la rarissime et célèbre « Bible de Gutenberg ». L'activité du séminaire cessa en 1970 et les Jésuites quittèrent Gouvieux, en 1999. En 1998, la chapelle et ses deux ailes disgracieuses furent supprimées et le château de Chantilly fut restauré « à lidentique » par la société Capgemini, devenu le nouveau propriétaire du domaine. Aujourd'hui, le château des Fontaines est privé, fermé au public.                                                       La TOUR , de style anglo-normand. ce manoir a été bâti au début du XIXe siècle, comme résidence de campagne, pour une famille de banquiers parisiens, et s'appelait, alors, « Le Chalet ». Le château de la Tour fut équisitionné durant la seconde guerre mondiale puis transformé en hôtel-restaurant en 1946. Au cours de la troisième République, des artistes célèbres le fréquentèrent, comme : Jean Gabin, Édith Piaf ou Tino Rossi. En 1973, le château a connu d'importants travaux de restauration, et un second bâtiment dans un style proche du bâtiment principal lui a été adjoint, ultérieurement. Le nom du château de la Tour est justifié par un pastiche d'une tour médiévale, à côté de l'entrée du domaine.                                                                    Les TOURELLES  », porte d'entrée monumentale côté Chantilly, dans le style d'un château du XVIIe siècle, construit en 1880 par l'architecte Félix Langlais pour le baron de Rothschild. Les façades et toitures sont inscrits aux monuments historiques depuis le 9 août 1999.","habitants":"Famille Rothschild\"","divers":"Châteaux de Fontaines à Gouvieux GPS : 49° 11' 18\" Nord, 2° 25' 01\" Est                                                               Tour  grav- 6     GPS : 49° 11' 18\" Nord, 2° 25' 01\" Est","gps":"49° 11' 18\" Nord, 2° 25' 01\" Est","images":["../../jctruffet.com/image/image_60/60_Fontaines_Vexin_1.jpg","../../jctruffet.com/image/image_60/60_Fontaines_Vexin_2.jpg","../../jctruffet.com/image/image_60/60_Fontaines_Vexin_3.jpg","../../jctruffet.com/image/image_60/60_Fontaines_Vexin_4.jpg","../../jctruffet.com/image/image_60/60_Fontaines_Vexin_5.jpg","../../jctruffet.com/image/image_60/60_Fontaines_Vexin_6.jpg"]},"Consult_chateau_formulaire035a":{"id":"Consult_chateau_formulaire035a","dept":"60","canton":"Méru","commune":"Fosseuse","nom":"Fosseuse","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article Anserville et Fosseuse;                       FOSSEUSE; l le château de Fosseuse qui fut la propriété des Montmorency, que cette famille la quitta  à la fin du XVIIe siècle, étant vendu à Louise de Prie, veuve du maréchal de la Mothe-Houdancourt. Le château de Fosseuse est érigé en marquisat au XVIIIe siècle, pour Philippe Thomé, conseiller au parlement et entrera, en 1807, dans la famille de Kergorlay,   peu avant la seconde guerre mondiale le domaine est acquis par monsieur Henry  Allenbach,  son neveu Mr et Mme Marro.                                                                                                             Village voisin au nord de Fosseuse, ANSERVILLE  sobre édifice en pierre de taille construit entre 1789 et 1833 sur l'emplacement d'un château plus ancien et qui conserve quelques vestiges de son décor intérieur du XVIIIe siècle. Avec les restes de son parc à la française et sa ferme, le château d'Anserville forme le centre historique et paysager du village. L'écrivain Bertrand de Jouvenel, dont le père était marié à la célèbre Colette, l'a longtemps habité. Des scènes du film \"Fort Saganne\"y ont été tournées. Il date du XVIIIe au XIXe siècle,   il est inscrit aux M.H. depuis le 8/11/1990.  Éléments protégés MH : les façades et les toitures du château : inscription par arrêté du 8 novembre 1990.","architecture":"FOSSEUSE, château du XVIe siècle possédant un parc romantique de 16 hectares. Le jardin est d'inspiration médiévale. Château commandité par la famille de Montmorency. Vestiges de décor Renaissance. Le château de Fosseuse et le parc ont été dépouillés par un antiquaire et un marchand de bois dans les années 1930. Les propriétaires actuels cherchent a entretenir et rénover la demeure dans la mesure du possible.  les trois grandes fenêtres en demi-cintre de cette salle offrent une vue du château. La remise a été refaite a neuf avec un sol carrelé et le chauffage. Éléments protégés MH : les façades et les toitures du château : inscription par arrêté du 27 juillet 1992. Il est inscrit à l'Inventaire supplémentaire des monuments historiques depuis le 27.07.1992. Dans la bibliothèque donnant sur l'étang, vous pourrez découvrir son histoire et celle de son héritière, dite La Belle Fosseuse  qui vécut une folle histoire d'amour avec le roi de France Henri IV. Gîte d'hôtes de charme, dirigé aujourd'hui par\nM Marro.","habitants":"famille de Montmorency\"","divers":"Deux châteaux dans cet article Anserville grav -4    et Fosseuse grav-1-2-3 photo de Tournaire Anserville  GPS : 49° 13' 38\" Nord, 2° 12' 28\" Est                                                     Fosseuse GPS : 49° 12' 36,34\" Nord, 2° 11' 17,89\" Est","gps":"49° 13' 38\" Nord, 2° 12' 28\" Est","images":["../../jctruffet.com/image/image_60/60_Fosseuse_1.jpg","../../jctruffet.com/image/image_60/60_Fosseuse_2.jpg","../../jctruffet.com/image/image_60/60_Fosseuse_3.jpg","../../jctruffet.com/image/image_60/60_Fosseuse_4.jpg"]},"Consult_chateau_formulaire34db":{"id":"Consult_chateau_formulaire34db","dept":"60","canton":"Chaumont-en-Vexin","commune":"Fresneaux_Montchevreuil","nom":"Fresneaux","type":"Château","periode":"XII-XVII-XVIII","histoire":"Trois châteaux dans cet article  Fresneaux, Beaufresne et Théribus. FRESNEAUX, cet édifice a été construit sur les fondations d'un château plus ancien datant du XIIe siècle sur le coteau de Montchevreuil,  par Guillaume de Mornay ou par son fils, Pierre de Mornay, qui reçut en donation en 1539 de Jean Chenu La terre de Montchevreuil. Au XVIIe siècle, des ailes sont ajoutées au château et des écuries construites. L'intérieur est remanié au XIXe siècle par Jules de Mornay, marquis de Montchevreuil. Aujourd'hui le château est un lieu unique et équipé de structures permettant de recevoir vos plus beaux évènements.  Il comporte  aujourd'hui un grand corps de logis de la fin du XVe siècle inclus dans une construction postérieure plus basse et flanquée d'ailes en retour. Propriété de la socièté civile  immobilière de Montchevreuil.\nÉléments protégés MH : les façades et les toitures du château : inscription par arrêté du 21 février 1983.","architecture":"THERIBUS A deux K.M au nord. Le château, dont les origines remontent au XVIIe siècle, est entouré de ses anciens murs de clôture, comprend le corps de logis rectangulaire et ses ailes, les communs, ordonnés autour d'une cour scindée en deux par un bassin. La chapelle est indépendante, du côté du jardin. Les espaces intérieurs du château ont gardé la distribution primitive et l'essentiel de leurs origines. Le château de Théribus se situe également sur la commune du Mesnil-Théribus. \nÉléments protégés MH : le château comprenant le corps central et les pavillons, (excepté la salle à manger, son office et sa cuisine moderne au rez-de-chaussée, la chambre principale au premier étage et les pièces qui lui sont contiguës, salle de bain et petite chambre en chêne, le pigeonnier, les communs, les façades et les toitures, la chapelle, les deux portes cochères d'entrée et leurs hémicycles, le bassin, le potager et la serre, la cour, le parc à l'anglaise, sa pelouse et le bois, les murs de clôture existants: inscription par arrêté du 7 juin 2007, modifié par arrêté du 10 juillet 2007.                                                                                                                    A trois K.M. au nord le Mesnil -Théribus le château de BEAUFRESNE,  ce château a été construit au XVIIIe siècle pour Henri Marie marquis de Grasse. Il est situé dans un cadre vallonné de 20 hectares traversé par un petit cours d'eau. Le marquis de Grasse est mort sans descendance en 1882, la famille de Grasse était propriétaire du chateau jusqu'à sa vente en 1892. A cette date, Mary Cassatt, artiste peintre américaine, achète le château, elle le modernise notamment avec lélectricité dont elle a besoin pour son atelier de pointe sèche, et sy installe définitivement. Elle va préparer fébrilement lexposition quelle doit faire à New York et qui suffira a payer Beaufresne. Le château accueille aujourd'hui des adolescents en formation d'horticulture.","habitants":"Beaufresne   Famille d' Henri Marie marquis de Grasse                                Fresneaux, Famille de Mornay                           \"","divers":"Trois châteaux dans cet article  Fresneaux, Beaufresne grav-2-3 et Théribus grav-1                        Monchereuil grav 4                                  GPS : 49° 17' 07\" Nord, 2° 00' 30\" Est                                                                Theribus . GPS : 49° 18' 28\" Nord, 1° 59' 16\" Est","gps":"49° 17' 07\" Nord, 2° 00' 30\" Est","images":["../../jctruffet.com/image/image_60/60_Fresneaux_1.jpg","../../jctruffet.com/image/image_60/60_Fresneaux_2.jpg","../../jctruffet.com/image/image_60/60_Fresneaux_3.jpg","../../jctruffet.com/image/image_60/60_Fresneaux_4.jpg"]},"Consult_chateau_formulaireb957":{"id":"Consult_chateau_formulaireb957","dept":"60","canton":"Grandvilliers","commune":"Gerberoy","nom":"Gerberoy","type":"Château","periode":"XVII","histoire":"Trois châteaux dans cet article  Gerberoy, Hannaches et Songeons.    GERBEROY,  fin janvier ou début février 1079, Guillaume le Conquérant affronte, près de Gerberoy, son fils Robert Courteheuse, allié au roi de France Philippe Ier. Cette bataille voit la défaite du roi d'Angleterre, qui est même blessé au cours des affrontements.  En 1435, Gerberoy est le lieu d'une bataille de la guerre de Cent Ans. Un val qui fait face à Gerberoy, s'appelle depuis le Val d'Arondel, du nom du comte d'Arundel, seigneur anglais qui y fut défait par les troupes françaises. Bien que la ville, avant et après, ait été le théâtre de nombreux autres faits de guerre, cette bataille est restée la plus célèbre dans la mémoire locale. En juillet 1472, après avoir levé le siège de Beauvais, Charles le Téméraire campe près de Sarcus, et brûle au passage Songeons et Gerberoy.\nGerberoy est pillée et ruinée à plusieurs reprises durant les guerres de Religion, puis ses murailles sont démantelées et la ville cesse définitivement d'être une place forte.\nEn 1679, une histoire du château et de la ville de Gerberoy, du chanoine Jean Pillet, est publiée ; c'est la principale source d'informations historiques sur Gerberoy du Moyen Âge au XVIIe siècle.","architecture":"SONGEONS, le château de Songeons en briques, flanqué de deux pavillons carrés, est construit en 1720 pour la marquise d'Armentières, dame d'honneur de la duchesse de Berri. La demeure est ornée de cours, de basses-cours, décuries, de vastes greniers et de jardins que l'on doit à André Le Nôtre et La Quintinie. La demeure possède des jardins potagers sur les bords du Thérain, près dun vivier, au niveau dune prairie entourés de bois, les jardins dagrément sont couverts de fleurs, de tapis de verdure et de bocages. Il appartient actuellement à la congrégation des petites soeurs de l'assomption.                                                                                           HANNACHES, sur la route menant de Gerberoy à Saint Germer de Fly, le château d'Hannaches (deuxième moitié XVe siècle, première moitié XVIe siècle) forme avec l'église et la ferme voisine, un ensemble exceptionnel. Cette demeure de brique présente une série d'ouvertures dont les meneaux cruciformes ont pour la plupart disparu, l'unique décor est constitué de motifs de briques vernissées noires. Le château de plan rectangulaire à deux niveaux est cantonné à chaque angle d'une tour à toiture en poivrière. L'église, très sobre, servait de chapelle castrale et conserve les pierres tombales des Bissipart. La ferme possède un intéressant pigeonnier. Les communs datent du XVIIIe siècle. Éléments protégés MH : les façades et les toitures des communs situés de part et d'autre de l'entrée principale le long du C.D. 104 : inscription par arrêté du 19 janvier 1987. Les façades et les toitures du château ; le portail d'entrée principal : classement par arrêté du 13 septembre 1991.","habitants":"chanoine Jean Pillet\"","divers":"Château de Songeons d'Hannaches à Gerberoy                                          Songeons grav 3 à 5 Gerberoy grav 1 -2     Hannaches grav 7-8-9                                                       GPS : 49° 32' 43,35\" Nord, 1° 51' 22,04\" Est","gps":"49° 32' 43,35\" Nord, 1° 51' 22,04\" Est","images":["../../jctruffet.com/image/image_60/60_Gerberoy_1.jpg","../../jctruffet.com/image/image_60/60_Gerberoy_2.jpg","../../jctruffet.com/image/image_60/60_Gerberoy_3.jpg","../../jctruffet.com/image/image_60/60_Gerberoy_4.jpg","../../jctruffet.com/image/image_60/60_Gerberoy_5.jpg","../../jctruffet.com/image/image_60/60_Gerberoy_6.jpg","../../jctruffet.com/image/image_60/60_Gerberoy_7.jpg","../../jctruffet.com/image/image_60/60_Gerberoy_8.jpg","../../jctruffet.com/image/image_60/60_Gerberoy_9.jpg"]},"Consult_chateau_formulairec6df":{"id":"Consult_chateau_formulairec6df","dept":"60","canton":"Chantilly","commune":"Gouvieux","nom":"Gouvieux","type":"Château","periode":"XIX","histoire":"quatre châteaux dans cet article , Gouvieux, Montvillargéne, Pré-Nonette et manoir de la Tour                                                                                                                             GOUVIEUX, est situé place du général Marchand à Gouvieux, est devenu un hôtel de charme.                                                        MONTVILLARGENNE, en 1911, Jeanne de Rothschild (Paris, 1874 - Paris, 1929), fille de James Édouard de Rothschild (1844 - 1881) et de Thérèse Laure Rothschild (1847 - 1931), sur d'Henri de Rothschild et épouse du baron Leonino (1867 - Milan, 1911), banquier italien, fai
