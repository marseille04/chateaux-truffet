re au Père Riquet, Jésuite, sa propriété de Troussures pour les étudiants en médecine du centre Laënnec. Depuis 1997, la demeure est devenue Prieuré Notre-Dame de Cana avec la présence de sept frères et de quatre soeurs de la communauté Saint Jean.  Une seigneurie, un château, une maison spirituelle et enfin un prieuré.","habitants":"famille Le Caro\"","divers":"Château de Troussures                                gps 49° 23' 24? nord, 1° 58' 25? est","gps":"","images":["../../jctruffet.com/image/image_60/60_Troussures_1.jpg","../../jctruffet.com/image/image_60/60_Troussures_2.jpg"]},"Consult_chateau_formulaire1514":{"id":"Consult_chateau_formulaire1514","dept":"60","canton":"Senlis","commune":"Senlis","nom":"Valgenceuse","type":"Château","periode":"XVIII","histoire":"VALGENCEUSE. la construction du château date de la fin du XVIIIe siècle. Une des plus anciennes mentions du domaine remonte à 1396, date à laquelle il est acheté par le doyen du Chapitre Saint-Frambourg de Senlis. Celui-ci en fait don au chapitre à sa mort. Ce chapitre le vend en 1582 à la famille Bréguet puis à la famille Brillot. En 1620, le domaine revient à Jean Crochet auquel succède son fils Louis Crochet, conseiller des princes de Condé et archidiacre à Senlis. C'est eux qui font dessiner le premier parc et creuser la pièce d'eau dans le lit de la Nonette. Un certain Lebel, receveur des domaines, acquiert le domaine en 1656 et achève ces aménagements. Il fait construire alors un château aujourd'hui démoli.   Le dessin en est attribué à André Le Nôtre qui, vers ces années là, travaillait à Chantilly, la chose n'est pas invraisemblable, car c'est un tableau de maître.   Au cours du XIXe siècle, Louise-Célina de Junquières (1806-1875), devenue Marquise de Giac, par mariage, tient un salon littéraire dans le château et le parc : elle y reçoit Alfred de Vigny, Gérard de Nerval, grand admirateur qui la cite dans ses écrits, puis Alexandre Dumas et Alexandre Dumas fils","architecture":"VALGENCEUSE, fin XVIIIe siècle les Lhoste bâtissent l'habitation actuelle, orientée différemment de l'ancienne, qui regardait la Nonette. La construction rappelle la manière de l'architecte Bélanger : on peut la comparer à la Folie Sainte James. L'arrivée offre une belle ordonnance, avec son corps central sommé d'un fronton flanqué de deux ailes en retour, ses combles de faible élévation, son péristyle (augmenté plus tard de deux prologements entre les ailes), et ses deux étages dont le deuxième offre des baies cintrées. Sur la façade opposée, qui regarde le parc, des niches se creusent vers les extrémités du bâtiment, ornées de statues et de bustes. Un péristyle marque le centre de l'édifice et deux petits pavillons en rez de chaussée termine la composition. Les propriétaires se succèdent jusqu'au XIXe siècle par les femmes. Fin du XVIIIe siècle, le château de Valgenceuse est reconstruit dans un style néo-classique, bien que son architecture ressemble au style « Directoire » du tout début du XIXe siècle. Le château est constitué d'un seul corps de bâtiment surmonté d'un fronton central. Cette façade est rythmée par des niches comportant des statues en pied ou en buste. Deux petites ailes se distinguent légèrement du seul côté de la façade ouest. Cette même façade comporte une grande terrasse à balustrade reliant les deux ailes.  Éléments protégés MH : la terrasse bordant la rivière La Nonette avec sa balustrade en pierre, les statues et leurs socles: classement par arrêté du 10 août 1942. Les façades et les toitures du château et de l'orangerie ; le parc, y compris le miroir d'eau: inscription par arrêté du 27 février 1992. Les parties du domaine du parc et la rivière de la Nonette dans sa portion traversant le domaine, comme élément constitutif du parc historique : inscription par arrêté du 17 juin 2016.","habitants":"Famille Brillot et Famille Crochet\"","divers":"Château de Valgenceuse à Senlis    GPS : 49° 11' 59,26\" Nord, 2° 36' 01,79\" Est","gps":"49° 11' 59,26\" Nord, 2° 36' 01,79\" Est","images":["../../jctruffet.com/image/image_60/60_Valgenceuse_1.jpg","../../jctruffet.com/image/image_60/60_Valgenceuse_2.jpg"]},"Consult_chateau_formulaire2a5b":{"id":"Consult_chateau_formulaire2a5b","dept":"60","canton":"Crépy-en-Valois","commune":"Verberie","nom":"Verberie","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux dans cet article  St-Corneille et St-Germain.                         St-CORNEILLE, ce château a été transformé en appartements. Il était autrefois la résidence du concierge ou de l'intendant du palais royal. C'était une grosse tour se terminant à l'Ouest, les dépendances des bâtiments royaux. Le château de Saint-Corneille a ensuite été érigé en fief lié à l'office du concierge, fonction qui a été rendu héréditaire par abus de pouvoir de l'un de ses détenteurs. Le roi Robert a racheté le château de Saint-Corneille grâce à l'or que Constance d'Arles apporta dans leur mariage, puis il en fit don à l'abbaye Saint-Corneille, en 1029. Les moines de l'abbaye vendirent le domaine vers le début du XVe siècle. Le château Saint-Corneille n'est pas visible depuis la rue. Il a été transformé en appartements privés.","architecture":"ST-GERMAIN , le Baron Bich (1914-1994), co-fondateur de la société BIC, leader mondial des stylos à bille, résida au manoir Saint-Germain de Verberie, est inscrit aux M.H. depuis 1949 ,  est situé sur l'ancienne paroisse de Saint Germain, rattachée à la commune voisine de Verberie en 1792. L'édifice a été construit en 1502 et restauré par le Baron Bich en 1967. L'histoire raconte que Marcel Bich a eu l'idée du stylo jetable révolutionnaire dans son jardin du manoir de Saint-Germain, sur l'ancienne route de Verberie à Rhuis. Installé dans l'Oise depuis 1939, Marcel Bich était attaché à la région. Il a restauré le manoir qui était alors en état de ruine avancée. L'église de l'ancien hameau de Saint-Germain ayant disparu, le baron Bich la remplaça par la chapelle Saint-Cyr du hameau de Lèvemont, rachetée auprès de la commune de Hadancourt-le-Haut-Clocher. On peut remarquer un petit pigeonnier carré du XVIe siècle à gauche du logis. La propriété est visible de la route, entre Rhuis et Verberie.\nÉléments protégés MH : le bâtiment d'habitation ; le colombier ; le bâtiment des communs et le mur de clôture : inscription par arrêté du 16 novembre 1949.","habitants":"Famille des Constance d'Arles                                           Le Baron Bich \"","divers":"Chateau à la verberie                       St-Corneille grav -3-4                     GPS : 49° 18' 40\" Nord, 2° 43' 56\" Est                                                                     ST-Germain                                                 grav -1-2      GPS : 49° 18' 19,44\" Nord, 2° 42' 28,44\" Est","gps":"49° 18' 40\" Nord, 2° 43' 56\" Est","images":["../../jctruffet.com/image/image_60/60_Verberie_1.jpg","../../jctruffet.com/image/image_60/60_Verberie_2.jpg","../../jctruffet.com/image/image_60/60_Verberie_3.jpg","../../jctruffet.com/image/image_60/60_Verberie_4.jpg"]},"Consult_chateau_formulaire58be":{"id":"Consult_chateau_formulaire58be","dept":"60","canton":"Clermont","commune":"Verderonne","nom":"Verderonne","type":"Château","periode":"XVI-XVIII","histoire":"VERDERONNE, la seigneurie de Verderonne a été établie en 1240, quand le chevalier Simon de Villers-Saint-Paul, déjà seigneur de plusieurs lieux dans les environs, reçoit des mains d'Alphonse III de Portugal et de Mathilde de Dammartin son épouse, un fief à Verderonne. La famille de Villers-Saint-Paul vend la seigneurie au baron de Gesvres en 1575, qui la cède à la maison de Laubespine en 1586. Sur les anciennes fondations d'un château fort du XIIIe siècle dont subsistent les deux tours rondes aux extrémités de la façade principale sud-ouest, il fait construire un nouveau château.\nClaude de lAubespine obtient lérection en marquisat de son domaine de Verderonne grâce à sa fidélité au roi pendant la Fronde. Les Potier de Gesvres le vendirent au XVIIIe siècle à la famille Andlau qui réalisa d'importantes transformations. Cest en 1725 que la construction du nouveau château est achevée par Etienne-Louis marquis de Beaucourt et de Verderonne (petit fils de Charles). Couvert de dette le marquis vend le domaine au comte dAndlau qui y fera quelques modifications. En 1884 le général dAndlau, sénateur de lOise vend le domaine à M. Baudrier, banquier à Paris. Le château à servit dhôpital de campagne lors de la première guerre mondiale et est occupé par larmée allemande lors de la seconde. Le château est laissé à labandon plusieurs années avant de faire lobjet de nombreuses restaurations ces dernières années par le propriétaire actuel.","architecture":"VERDERONNE, le château a été reconstruit vers 1740, sur les fondations du château des marquis de l'Aubespine datant de 1590, dont il ne reste plus rien. Les deux tours remontent au XIIIe siècle. Le parc possède un beau colombier, des roses anciennes, une serre, un jardin fleurit avec collection d'iris et plantes vivaces, une grange qui abrite un beau théâtre style Louis XV et un jardin d'eau où s'épanouissent des nymphéas. Serre hollandaise rectangulaire, s'ouvrant sur un jardin d'hiver également rectangulaire, armature métallique. Exemple de plus en plus rare de serre standardisée de cette époque.  L'édifice, à un étage et au toit à la Mansart, comporte une aile centrale et deux plus courtes ailes latérales en retour d'équerre, à l'arrière. La façade principale sud-ouest en pierre d'apparat s'établit sur neuf travées, dont trois incombent au corps central en légère saillie, surmonté par un fronton et deux tours rondes aux extrémités de la façade principale. Le perron comporte un escalier en double révolution. Parmi les éléments protégés au titre des monuments historiques à l'intérieur du château, l'on peut citer l'escalier principal avec sa rampe en fer forgé ; au rez-de-chaussée, la salle à manger, le grand salon, la chambre à alcôve (petit salon), la bibliothèque et la chambre ouest ; au premier étage, la chambre avec cheminée à trumeau rocaille, les deux chambres dans le pavillon central, la chambre de la tour et la chambre au-dessus de la bibliothèque ; au deuxième étage, la chambre mitoyenne de la tour ouest.","habitants":"Famille de Villers-Saint-Paul \"","divers":"Château de Verderonne gps 49° 19' 56? nord, 2° 29' 37? est","gps":"","images":["../../jctruffet.com/image/image_60/60_Verderonne_1.jpg","../../jctruffet.com/image/image_60/60_Verderonne_2.jpg"]},"Consult_chateau_formulairec994":{"id":"Consult_chateau_formulairec994","dept":"60","canton":"Creil","commune":"Verneuil-en-Halatte","nom":"Verneuil_Halatte","type":"Manoir","periode":"XVII","histoire":"deux châteaux dans cet article; hôtel Salomon et Verneuil. SALOMON  DE BROSSE   A l'origine hôtel de Saint-Quentin, le manoir Salomon de Brosse a pris son appelation et sa forme définitive actuelle à compter du XVIIe siècle. Cette maison, jadis appelée Maison jaune ou Maison de Sully s'intégrait dans l'ensemble des bâtiments qui constituaient, à la fin du XVIe siècle, l'hotel de Saint-Quentin. L'architecte Salomon de Brosse, né dans une maison voisine, a acheté ce manoir en 1613 pour en faire son habitation. Il a remplacé la tour hexagonale par une tour rectangulaire en pierre équarie, couverte en ardoise. Le corps de logis était à cette époque couvert de tuile. La forme initiale de ces ouvertures, le haut semi-circulaire avec entourage saillant le profil du toit, rappellent les lignes habituelles des oeuvres de Salomon de Brosse.","architecture":"VERNEUIL,  Philippe IV de Boulainvilliers, seigneur de Verneuil, voulait posséder une demeure digne de son rang. Il passa commande en 1560 à Jacques Androuet du Cerceau, architecte de Verneuil, de construire son château, mais à cours de moyen, en 1575, il vend sa seigneurie au duc de Nemours et les travaux reprennent. En 1600, Henri IV achète Verneuil et l'offre à sa favorite, Henriette d'Entragues, assorti du titre de marquise. Il demande à Salomon de Brosse, petit fils d'Androuet de Cerceau, de parfaire et terminer la construction. Les trois corps de logis étaient disposés en potence, le quatrième côté était constitué par une galerie en rez-de-chaussée avec pavillon d'entrée au milieu et précédé d'une avant-cour. Chaque bâtiment d'habitation comprenait un rez-de-chaussée, deux étages et un comble. Considérant qu'il portait ombrage à Chantilly le prince de Condé l'achète et à partir de 1734 le fait démolir. Il n'en reste que les parties enterrées derrière les murs de soutènement de la terrasse. La restauration est entreprise depuis 1988 par le club du vieux manoir et la commune  en à la propriété.","habitants":"Famille de  Salomon de Brosse\"","divers":"Château de Verneuil-Halatte                 GPS : 49° 16' 38\" Nord, 2° 31' 23\" Est","gps":"49° 16' 38\" Nord, 2° 31' 23\" Est","images":["../../jctruffet.com/image/image_60/60_Verneuil_Halatte_1.jpg","../../jctruffet.com/image/image_60/60_Verneuil_Halatte_2.jpg","../../jctruffet.com/image/image_60/60_Verneuil_Halatte_3.jpg"]},"Consult_chateau_formulaire337b":{"id":"Consult_chateau_formulaire337b","dept":"60","canton":"Senlis","commune":"Versigny","nom":"Versigny","type":"Palais","periode":"XVII","histoire":"VERSIGNY, en 1404 la terre de Versigny est acquise par Henri de Marle. En 1635 démantèlement de l'ancien château. En 1856 le château rentre par mariage dans la famille de Kersaint de Claire-Louise de Bernaguet de Penautier avec le comte Guy Gabriel de Kersaint  qui le possède  toujours. En 1918, le général Mangin établit son quartier général et c'est au château que seront dressés les plans de la seconde et victorieuse bataille de la Marne qui conduira à la fin des hostilités en novembre 1918. En 1940, le château est à nouveau occupé et servira de Q.G. au colonel commandant le 57ème régiment de la 7ème division d'Infanterie coloniale. Pas châtelain, plutôt « propriétaire gestionnaire d'un château ». La nuance est ténue mais elle est chère à Guy-Pierre de Kersaint, maire de Versigny, un petit village du Valois.  Comme son père et son grand-père, il se bat pour restaurer un domaine qui appartient à sa famille depuis 1848.","architecture":"VERSIGNY, entre 1640 et 1690, le château de Versigny est reconstruit en forme de fer à cheval en se prolongeant jusqu'à la grille d'honneur. Les perspectives, les dessins géométriques et le parc à la française sont dessinés à cette époque par le célèbre paysagiste André Le Nôtre. Il sera également modifié au XVIIe et surtout au XIXe siècle. On lui apportera une touche de jardin à l'anglaise en incluant dans le dessin géométrique du parc à la française quelques allées tortueuses. C'est l'époque du retour à la nature et de l'influence anglaise. En 1770, le château est modifié par l'élargissement et la réfection symétrique des deux ailes. Entre 1836 et 1844, le château prend sa forme actuelle. \nÉléments protégés MH : le château : inscription par arrêté du 5 avril 1930. Le parc et son jardin, avec ses fabriques, sa statuaire, ses murs de clôture et sauts-de-loup, les perspectives dites de Martin Crosne, de Galatée et du bois des Vignettes et la maison forestière : inscription par arrêté du 27 juillet 2009.","habitants":"Famille de Kersaint\"","divers":"Versigny GPS : 49° 9' 28,8\" Nord, 2° 45' 38,52\" Est","gps":"49° 9' 28,8\" Nord, 2° 45' 38,52\" Est","images":["../../jctruffet.com/image/image_60/60_Versigny_1.jpg","../../jctruffet.com/image/image_60/60_Versigny_2.jpg","../../jctruffet.com/image/image_60/60_Versigny_3.jpg","../../jctruffet.com/image/image_60/60_Versigny_4.jpg","../../jctruffet.com/image/image_60/60_Versigny_5.jpg","../../jctruffet.com/image/image_60/60_Versigny_6.jpg"]},"Consult_chateau_formulaireb1bb":{"id":"Consult_chateau_formulaireb1bb","dept":"60","canton":"Crépy-en-Valois","commune":"Vez","nom":"Vez","type":"Château","periode":"XIV","histoire":"Deux châteaux dans cet article; Vez, et de Pondron à Bonneuil.                     VEZ, au cur de la vallée de lAutomne sélève le donjon de Vez, imposante forteresse médiévale, ou la domination romaine, Vez devint un camp militaire qui servait à défendre la Gaule contre les invasions Barbares. Dès linvasion des Francs, Vez devint un poste militaire à la tête dune province. Après la bataille de Soissons en 486, Vez prit le titre de capitale dun territoire et pendant cinq siècles elle devint la capitale des Valois, ce château de pierre et de bois, dont il ne reste rien, dominait la vallée du haut de la colline. En 1360, larrière-petit-fils de Raoul dEstrée, Jehan de Vez éleva avec laide de la population le donjon pentagonal et la deuxième enceinte des remparts dans laquelle furent englobés les restes de lancien château. Le château fut repris et fortifié par Louis dOrléans au XIVe siècle et resta pendant cinq siècles la capitale du Valois. le donjon reconstruit au XIVe siècle et complètement restauré par un émule de Viollet le duc, haut de 27 mètres, et la chapelle jouxtant le logis de la cour intérieure, furent terminés à la fin du XIVe par Louis dOrléans frère du roi Charles VI à qui le Valois fut donné en 1386. Ce château-fort, dans laquelle Jeanne d'Arc séjourne en 1430, présente, à côté d'une charpente métallique des ateliers Eiffel, une magnifique cheminée du XIIIe siècle. L'ensemble, spécimen parfait d'architecture militaire des XIIIe et XIVe siècles, fut vendu comme bien national à la Révolution. Le général Mangin y établit son Q G. en 1918. Le château de Vez avec son donjon a été classé M.H.par arrêté du 13 juin 1904., prolongé par une oeuvre de l'artiste Sol Lewitt au rez-de-chaussée du donjon. Des expositions d'art moderne y sont organisées chaque été.Éléments protégés MH : le château de Vez en totalité : classement par arrêté du 13 juin 1904, propriété de madame Leroux.","architecture":"PONDRON   à Bonneuil en Valois trois K.M, au sud, dominant le carrefour du vallon et de la vallée de lAutomne, ce château fut construit au XIXe siècle, à l'aspect médiéval, première Renaissance, il est fanqué de deux tourelles, couvertes en ardoise, situé au milieu d'un beau parc à l'anglaise de deux hectares. Son architecture médiévale séduit tout autant que ses salons raffinés.","habitants":"Vauciennes   Famille de madame Leroux \"","divers":"Trois châteaux dans cet article; Vez  grav 1-2-3  , Plessis au Bois et de Pondron grav 4       Plessis au bois GPS : 49° 13' 12\" Nord, 3° 01' 16\" Est                                    Pondron GPS : 49° 17' 08\" Nord, 2° 59' 40\" Est                                                       Vaumoise grav 5                                                 GPS : 49° 14' 15\" Nord, 2° 58' 50\" Est                                                 Vez GPS : 49° 15' 44\" Nord, 2° 59' 58\" Est","gps":"49° 13' 12\" Nord, 3° 01' 16\" Est","images":["../../jctruffet.com/image/image_60/60_Vez_1.jpg","../../jctruffet.com/image/image_60/60_Vez_2.jpg","../../jctruffet.com/image/image_60/60_Vez_3.jpg","../../jctruffet.com/image/image_60/60_Vez_4.jpg","../../jctruffet.com/image/image_60/60_Vez_5.jpg"]},"Consult_chateau_formulaire37b3":{"id":"Consult_chateau_formulaire37b3","dept":"60","canton":"Montataire","commune":"Villers sous st Leu","nom":"Villers_sous_st_Leu","type":"Château","periode":"XVIII","histoire":"VILLERS  SOUS ST-LEU, ancienne demeure des sires de Poyen, Villers fut dès le milieu du XVIIe siècle, celle des Lumagne et des Mascranny du Château-Chinon. Le duc de Mascrany, propriétaire du château durant la Révolution, ne peut éviter qu'il soit vendu, vers 1800, à un belge, Jean-Jacques Digelman. Après la Révolution, la superbe demeure et le parc se sont progressivement délabrés. En 1906  M. Berson acquiert le château. En 1978, il a été inscrit à l'inventaire des monuments historiques. Mais le manque de fonds des Beaux-Arts n'a pas permis, à l'époque, de réaliser les moindres travaux. En 1986, un propriétaire indélicat, n'entretient pas le bâtiment, il transforme les abords en déchetterie et le dépouille de toutes ses richesses, de ses cheminées et surtout de ses poutres en chêne, et le toit commence à s'effondrer. En 1993, la municipalité décide de devenir propriétaire de l'édifice et entrepend   les démarches d'une expropriation, cinq ans après elle peut enfin rentrer dans les lieux qui menaçaient totalement ruine et sauver la demeure, propriété de la commune, hôtel de ville.\nJean André Lumague (1564-1637), important banquier et homme d'affaires proche de Catherine de Médicis et de Saint-Vincent de Paul, fut seigneur de Villers-sous-Saint-Leu.","architecture":"VILLERS  SOUS ST-LEU   (façades et toitures, cour d'honneur, douves, grille d'entrée inscrits monument historique: Il date des XVIIe et XVIIIe siècles40. Sa partie réhabilitée est occupée par la mairie depuis 2003, après 13 années de négociations avec les anciens propriétaires, qui « s'étaient surtout attachés, semble-t-il, à désosser petit à petit la demeure.   L'aile orientale est en cours de rénovation.Éléments protégés MH : les façades et les toitures ; la cour d'honneur ; les douves ; la grille d'entrée : inscription par arrêté du 19 septembre 1966.","habitants":"Famille de Jean André Lumague\"","divers":"Château de Villers-sous-st-Leu","gps":"","images":["../../jctruffet.com/image/image_60/60_Villers_sous_st_Leu_1.jpg","../../jctruffet.com/image/image_60/60_Villers_sous_st_Leu_2.jpg"]},"Consult_chateau_formulaire4100":{"id":"Consult_chateau_formulaire4100","dept":"60","canton":"Nogent-sur-Oise","commune":"Villers st-Paul","nom":"Villers_st_Paul","type":"Château","periode":"XVIII","histoire":"VILLERS ST-PAUL, éu lieu-dit Le Parc, un château du Moyen-Age fut bâti, qui prit le nom de château de Nogent sous lequel il était connu au XVIIIe siècle. Ses douves étaient alimentées par la Brêche qui arrosait le parc. Ce premier château a été remplacé au XVIIIe siècle par l'édifice actuel situé un peu plus au sud que le précédent. Il était la propriété de M. de Sartines, qui le vendit au joaillier de la couronne Aubert. Puis Randon de Latour l'acquit et le rebâtit à neuf. Ses héritiers le cédèrent au citoyen d'Aucourt de Saint-Just. L'intérieur est meublé avec élégance. L'auteur de Zélia, de la Prisonnière, du Calife de Bagdad y réunit des artistes et des musiciens. Aujourd'hui, les anciens communs et les deux pavillons carrés qui demeurent d'autrefois sont dans le même état de ruines que le château, classé en 1929.    Éléments protégés MH : le château : inscription par arrêté du 16 mai 1929.","architecture":"VILLERS ST-PAUL  Le domaine  sétendait sur une superficie de 40 hectares au sud-ouest de la commune de Villers-Saint-Paul. Il était compris dans un périmètre formé par la ligne de chemin de fer,  sur le territoire de la commune de Nogent-sur-Oise.  Cétait un édifice sobre, construit en pierres blanches, dominé par un pavillon central, avec sur le toit à la française des lucarnes à frontons courbes et de très hautes cheminées. Les fenêtres rapprochées ne laissaient aux parties pleines quune surface réduite. Lesplanade était précédée dune belle grille très soignée aux barreaux en piques.   Il était entouré dun vaste parc, remarquable par ses jardins, ses belles distributions des eaux de la Brèche alimentant les douves, les canaux et un étang au milieu duquel existait une petite île boisée. Sur 15 hectares de ce parc étaient plantés de grands arbres, chênes, charmes, hêtres, ormes marronniers blancs et rouges, érables dont le sycomore ainsi que des conifères tels que des cèdres et des séquoïas. Une allée bordée de tilleuls reliait le parc du château à léglise de Nogent-sur-Oise et aboutissait dans l'actuelle rue du Moustier.","habitants":"Famille de Randon de Latour\"","divers":"Château de Villers st-Paul","gps":"","images":["../../jctruffet.com/image/image_60/60_Villers_St_Paul_1.jpg"]},"Consult_chateau_formulaire4a12":{"id":"Consult_chateau_formulaire4a12","dept":"60","canton":"Pont-ste-Maxence","commune":"Pont-ste-Maxence","nom":"Villette","type":"Château","periode":"XX","histoire":"VILLETTE, château restauré au début du XXe siècle et habité autrefois  Le précédent château fut le domicile de la Marquise Reine Philiberte Rouph de Varicourt (1757-1822), fille adoptive de Voltaire, qui la maria au marquis Charles de Villette (1736-1793). par la marquise de Villette, Mlle de Varicourt, fille adoptive de Voltaire. Le château de Villette resta dans leur famille, jusqu'en 1865, année ou il fut vendu au Baron de Montreuil. L'urne funéraire contenant le coeur de Voltaire y fut longtemps conservée. Le mobilier et la propriété furent vendus séparément en 1865. La propriété fut vendue au baron de Montreuil. Son fils la vendit en 1900 à la famille Stern. C'est dans cette propriété que logèrent les plénipotentiaires allemands jusqu'à la signature de la paix en 1918. Depuis le début des années 2000, sous l'impulsion de l'architecte Nereo Randon, une société immobilière \"renaissance de Villette\" a restaurée le château à l'abandon, pour en faire une résidence de copropriétaires.","architecture":"VILETTE, c'est en 1761 que le marquis Pierre-Charles de Villette, après l'acquisition de la châtellenie de Sacy-le-Grand en 1755, entreprend la construction du château de Villette au lieu-dit du Plessis Longueau pour remplacer le château de Fontaine-le-Comte dans les marais. Pont-Sainte-Maxence, vestiges du fief de Mello du XIIIe siècle. Le château de Villette de la famille Fould-Stern, peu après son achèvement, au début du XXe siècle.","habitants":"famille Stern\"","divers":"A   Pont-ste-Maxencele château de Vilette  GPS : 49° 18' 07\" Nord, 2° 36' 16\" Est","gps":"49° 18' 07\" Nord, 2° 36' 16\" Est","images":["../../jctruffet.com/image/image_60/60_Villette_1.jpg"]},"Consult_chateau_formulairee18a":{"id":"Consult_chateau_formulairee18a","dept":"60","canton":"Noyon","commune":"Mondescourt","nom":"Waripont","type":"Manoir","periode":"XVIII","histoire":"WARIPONT, le fief est attesté en 1371, en 1569, Jean de Tordecilles, écuyer et seigneur de Waripont, déclare qu'il consiste en \"maisons. En 1783, il est décrit comme \"maison, château seigneurial, granges, étables, jardins, enclos, appartenant à Alexandrine du Clozel. Le plan de 1877 montre que le logis est implanté entre la cour et le jardin, perpendiculairement à la rue. Un pigeonnier s'élève au centre de la cour, bordée par les dépendances agricoles, cour à laquelle aboutit une avenue donnant accès à la propriété depuis le chemin de tour de ville.","architecture":"WARIPONT,  la ferme visible sur les plans de 1893 a disparu au XXe siècle. seul subiste le logis construit dans la première moitié du XVIIIe siècle. Le château est une grande maison de la première moitié du XVIIIe siècle. Il a subi des transformations au XIXe siècle, notamment au niveau des baies et de la distribution intérieure. l'origine du mot Waripont proviendrait d'un pont situé sur un bras de l'Oise reliant Noyon à Chauny pour le franchissement duquel un droit était perçu par le seigneur des lieux.","habitants":"Famille de Alexandrine du Clozel.\"","divers":"A Mondescourt le château de Waripont","gps":"","images":["../../jctruffet.com/image/image_60/60_Waripont_1.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','60 — Oise'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)showDet(start);
</script></body></html>
