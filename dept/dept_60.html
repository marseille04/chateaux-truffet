const FULL={"Consult_chateau_formulaire53b4":{"id":"Consult_chateau_formulaire53b4","dept":"60","canton":"Grandvilliers","commune":"Achy","nom":"Achy","type":"Château","periode":"XVIII","histoire":"ACHY, longtemps demeuré dans la famille de Clermont-Tonnerre. Cette très belle demeure, au cur d'un parc de plusieurs dizaines d'hectares, appartient à l'association \"Les Petits Frères des Pauvres\".","architecture":"ACHY, le château  a été construit en 1750, entièrement en briques, au fond de la vallée du Thérinet, à l'emplacement d'une forteresse gothique. D'anciennes fondations expliquent l'irrégularité de périmètre étroitement masquée par l'architecture. Un pavillon central massif joint des ailes latérales d'avancée très faible par deux corps intermédiaires de trois fenêtres. Le grand escalier latéral est précédé d'un court vestibule à marches et colonnes, précédant une suite de salons à boiseries. A l'écart du corps de logis principal, subsiste un plaisant ensemble de communs du XVIIIe siècle dont une orangerie construit en 1750, en briques et pierre du Beauvaisis. Il remplace une forteresse gothique du Moyen-Age, une motte féodale est encore visible à larrière du château. Le grand escalier latéral est précédé dun court vestibule, lui même précédent une suite de salon à boiseries et une bibliothèque. Le château d'Achy est devenu, aujourd'hui, un centre daccueil touristique pour les personnes démunies, les plus agées, ou handicapés. Le château d'Achy ouvre ses portes aux  Journées du Patrimoine. Visite des salons du château d'Achy, l'orangerie, la chapelle, les vestiges du puits, du four à chaux, de la motte féodale se visitent, si le temps le permet.","habitants":"Famille de Clermont-Tonnerre\"","divers":"Château d'Achy                                                   GPS : 49° 33' 25\" Nord, 1° 58' 48\" Est","gps":"49° 33' 25\" Nord, 1° 58' 48\" Est","images":["../../jctruffet.com/image/image_60/60_Achy_1.jpg"]},"Consult_chateau_formulairea1f5":{"id":"Consult_chateau_formulairea1f5","dept":"60","canton":"Clermont","commune":"Agnetz-Clermont","nom":"Agnetz_Clermont","type":"Château","periode":"XI-XVI-XIX","histoire":"Cinq châteaux dans cet article Agnetz, Coutance, Nointel, Clermont et  Fay.                                                                                                              AGNETZ à l'ouest de Clermont,  constituait aux XIIe et XIIIe siècles une seigneurie qui se divisa plus tard en comptait quatre fiefs, le fief d'Agnest comprenant la plaine d'Agnest y compris Broquier. Le château fut la propriété d'Emile de Girardin, créateur de la presse moderne. Il y passa les derniers étés de sa vie et y écrivit ses Lettres d'Agnetz. Le château appartint ensuite à Paul Cuvinot, sénateur de l'Oise et président du Conseil général. En 2008, il a été racheté par la municipalité qui y a effectué des travaux de remise en état et d'aménagement du bâtiment afin d'y installé les services techniques.                                                                                                   COUTANCE à deux K.M. au sud Neuilly sous Clermont  L'ex-château de Coutance fut détruit au XIXe siècle et remplacé par une villa appelée la Villa de Coutance au 3ème quart du XXe siècle. Le jardin d'agrément de l'ancien château de Coutance est inscrit au pré-inventaire des Jardins remarquables.                                                                                            FAY Anne Marie Chrestien de Sainte-Berthe, born 17 December 1790 (Friday), decède le 8 June 1860 (Friday) - Clermont en Beauvaisis, agée 69 ans","architecture":"NOINTEL à trois K.M. à l'Est de Clermont, châreau construit pour Jean de Turmenyes, garde du trésor royal de Louis XIV, il aurait été édifié par un élève de Jules Hardouin Mansart. Il possède à l'origine le toit caractéristique de cet architecte, plat et couronné de balustres. A la fin du XVIIIe siècle, M. Ribault surélève le bâtiment d'un étage et les balustres sont descendus et remployés pour délimiter une cour carrée devant la façade sud. Le toit est à nouveau modifié à la fin du XIXe siècle. Transformé en rendez-vous de chasse de la forêt de Carnelle par le prince de Conti en 1749, le domaine est acquis au cours du XVIIIe siècle par le financier Bergeret, qui y invite Fragonard. Le propriétaire, Renaud Siry a ouvert en 1986 le Musée de l'Auto miniature dans ce château, inauguré par Jean-Pierre Beltoise. Plus de 5000 voitures de collection y sont rassemblées. Éléments protégés MH : les façades et les toitures du château, des communs, des écuries et des pavillons de garde ; le parc dans son intégralité  inscription par arrêté du 3 novembre 1997.                                                                                                                              CLERMONT  Le donjon de Clermont ou château des comtes de Clermont-en-Beauvaisis est tout ce qu'il reste d'un ancien château féodal, qui date du XIe siècle. Construit à la pointe du promontoire que forme la promenade du Châtellier, c'est une construction de 25,50 m sur 17,50 m. Le donjon de Clermont domine la ville, même s'il a été surbaissé, à cause d'un effondrement causé par la tempête de février 1984. Au XIXe siècle, Louise Michel fut prisonnière au donjon du château de Clermont, transformé en prison, de 1883 à 1884. Il est en cours de restauration.","habitants":"Seigneurs locaux\"","divers":"quatre châteaux dans cet article Agnetz  grav-2, Coutance grav-1, Nointel grav-5, Clermont grav 3 et de Fay grav-4.                                 Clermont GPS : 49° 22\" 48' Nord, 2° 25' 09\" Est                                                             Coutance GPS : 49° 20' 45\" Nord, 2° 24' 44\" Est","gps":"49° 22\" 48' Nord, 2° 25' 09\" Est","images":["../../jctruffet.com/image/image_60/60_Agnetz_Clermont_1.jpg","../../jctruffet.com/image/image_60/60_Agnetz_Clermont_2.jpg","../../jctruffet.com/image/image_60/60_Agnetz_Clermont_3.jpg","../../jctruffet.com/image/image_60/60_Agnetz_Clermont_4.jpg","../../jctruffet.com/image/image_60/60_Agnetz_Clermont_5.jpg"]},"Consult_chateau_formulaire42dd":{"id":"Consult_chateau_formulaire42dd","dept":"60","canton":"Mouy","commune":"Ansacq","nom":"Ansacq","type":"Château","periode":"XV-XVI","histoire":"Trois châteaux dans cet article Ansacq, Auvillers et Saules.                                                               ANSACQ au sud de Neuilly s/s Clermont , le château daterait du XVIe siècle, l'édifice est entouré de fossés alimentés par le Rû d'Ansacq qui forme à la suite un beau plan d'eau. Les fortifications, en partie détruites par les Guerres de Religion, sont représentées par les bâtiments de la ferme. Le cardinal de Mazarin se serait réfugié dans ce château pendant la Fronde sous la minorité de Louis XIV dans les années 1650. La Révolution le confisque sur les biens du comte de Provence, futur roi Louis XVIII. Le domaine devint successivement la propriété du Duc de Mouchy, branche cadette des Ducs de Noailles, de la société Noury Land de Venette, de M. Bernard Bécret, agriculteur, originaire de l'Aisne, de Mme Isabelle Gruet qui a beaucoup investi pour l'entretien de ce château. Les travaux effectués par des entreprises qualifiées, avec le plus grand respect des vestiges, ont redonné un cachet à cette propriété privée qui fait l'admiration de tous. Les propriétaires actuels sont monsieur et madame Greuzat.","architecture":"AUVILLERS, la construction du château d'Auvillers est antérieure au XVe siècle. Il fut bâti près de la gorge de Lierval pour défendre à la fois le chemin de Paris, qui passait par cette partie du coteau et la descente dans la vallée de la Brêche et les approches de Clermont, ville siège du comté mouvant du roi. C'était alors un corps de logis ayant 4 tours, avec un fossé et un pont levis. C'est devenu, aujourd'hui, un mélange de 2 constructions. La façade Nord du château Est a conservé ses 2 tours et celle du Sud, ses 2 pavillons. Il a appartenu aux familles d'Auvillers, d'Erquinvillers, Barillon, d'Aubery, Dreux, Falconis, d'Amanzé, de Mailly, d'Hangest. Le Château d'Auvillers vous propose depuis ses chambres d'hôtes.                                        SAULES  à la sortie du village, vers Mérard, subsistent les vestiges du château-fort d'Ansacq, datant du IXe siècle. Commandé par un lieutenant qui dépendait du capitaine de Mouy, il fut démoli par l'invasion des Normands. Les douves du château étaient alimentées par le Rû, petit cours d'eau qui traverse Ansacq. L'entrée comprenait un bâtiment auquel on accédait par un pont-levis. Dans la muraille on peut voir encore les entailles du pont-levis où viennent s'encastrer les montants lorsqu'on le relevait. La restauration du château des Saules a été entamée il y a une vingtaine dannées. Les travaux ont duré plus de dix ans. Ils ont été réalisés dans la plus pure tradition artisanale afin de conserver le cachet de ce lieu millénaire.","habitants":"Ansacq;     de Mme Isabelle Gruet                          Familles d'Auvillers\"","divers":"Trois châteaux dans cet article Ansacq grav-1, Auvillers  grv 4-5 et Saules grav-2-3.                                                  Auvillers  GPS : 49° 20' 45\" Nord, 2° 24' 44\" Est","gps":"49° 20' 45\" Nord, 2° 24' 44\" Est","images":["../../jctruffet.com/image/image_60/60_Ansacq_1.jpg","../../jctruffet.com/image/image_60/60_Ansacq_2.jpg","../../jctruffet.com/image/image_60/60_Ansacq_3.jpg","../../jctruffet.com/image/image_60/60_Ansacq_4.jpg","../../jctruffet.com/image/image_60/60_Ansacq_5.jpg"]},"Consult_chateau_formulaire1187":{"id":"Consult_chateau_formulaire1187","dept":"60","canton":"Crépy-en-Valois","commune":"Verberie","nom":"Aramont_Vexin","type":"Château","periode":"XVI-XVII","histoire":"ARAMONT,  la seigneurie d'Aramont et de Verberie furent acquis en 1632, par Henri de Lancy, trésorier des guerres, sous Henri IV. Le château d'Aramont lui fut attribué et fut construit, avant 1639, quand Henri de Lancy devint également seigneur de Raray et se consacra à la reconstruction du château d'Aramont ,  il fut édifié par le seigneur de Raray, Nicolas de Lancy et érigé en fief par Louis XIII. Il s'élève à l'endroit ou se terminait l'aile gauche du palais de Charlemagne. Hippolyte Mosselman, banquier bruxellois et propriétaire d'Aramont depuis 1840, le fit reconstruire et agrandir. Le banquier mourut en 1873 et, le château changea encore plusieurs fois de propriétaires, pendant tout son histoire.  La famine à Verberie fut la cause du ralliement à la Révolution. La ville accueillit avec joie cette Révolution; le 25 juin 1792 elle planta un arbre, un joli colombier octogonal édifié au XIXe siècle, constitué d'un soubassement en pierre puis d'un ensemble à deux niveaux séparés par un larmier. Le château abrite désormais le siège social du regroupement des organismes de sauvegarde de l'Oise. propriété de la commune.","architecture":"ARAMONT, or, d'après un dessin de 1818, le château d'Aramont d'origine était beaucoup plus petit, son corps de logis principal, de style classique, ne comportait que 5 travées, prolongé par des ailes basses rejoignant des pavillons. Le château d'Aramont actuel a gardé des éléments de ce premier château, mais daterait, pour l'essentiel, de la seconde moitié du XIXe siècle.  Depuis, le château d'Aramont présente un abondant décor, constitué de balcons, lucarnes, faîtages et hautes cheminées arborant des \"M\" pour Mosselman. Les communs, au Nord de la cour d'honneur, ont conservé, par contre, leur style d'origine. Une tour carrée fut démolie en 1847. On trouve encore des substructions et des restes d'anciens murs avec une ogive du XIIIe siècle.  Le château d'Aramont appartient aujourd'hui à la commune de Verberie et abrite des salles pour les réceptions, des gîtes et accueille plusieurs organismes socio-culturels. Une visite extérieure est possible tous les jours. Le parc avec ses promenades et équipements sportifs est ouvert au public.","habitants":"Famille d'Henri de Lancy,\"","divers":"Aramont  GPS : 49° 18' 40\" Nord, 2° 43' 56\" Est","gps":"49° 18' 40\" Nord, 2° 43' 56\" Est","images":["../../jctruffet.com/image/image_60/60_Aramont_Vexin_1.jpg","../../jctruffet.com/image/image_60/60_Aramont_Vexin_2.jpg"]},"Consult_chateau_formulaire1be1":{"id":"Consult_chateau_formulaire1be1","dept":"60","canton":"Beauvais","commune":"Berneuil en bray","nom":"Auteuil","type":"Château","periode":"XVI-XVII-XIX","histoire":"AUTEUIL, le château primitif a été détruit à la fin du XVIe siècle, et abandonné au profit d'un château voisin. En 1990, le château d'Auteuil devint la propriété du Peintre Hiri, puis, en 2001, il fut racheté par un membre de la Jet-Set, d'origine libanaise, la richissime Mouna Ayoub, avant d'être racheté, en 2003, par des amateurs qui y ont fait aménager des chambres d'hôtes. Éléments protégés MH : le château ; les façades et les toitures ; la plate-forme entourée de ses douves et les parcelles attenantes dont la grande pâture au nord, en totalité : inscription par arrêté du 14 septembre 2007.","architecture":"AUTEUIL, la construction du château d'Auteuil date du XVIe siècle. De ce nouveau château ne restent que les soubassements, la plateforme, les douves, et les fondations. Il fut reconstruit une dernière fois dans les années 1850, presque à l'identique. Il présente un escalier à balustres néo-gothiques du XVIIe siècle, et plusieurs pièces ont conservé leur parquet, lambris et peintures. Le choix du XVIIe siècle comme période de référence pour une construction du XIXe est plutôt rare. Le vaste domaine qui comprenait jardins à la française, prairies et bois de chasse, a été démantelé au XXe siècle. L'établissement est entouré par un parc paysager traversé par des sentiers de randonnée. Décorées dans un style personnalisé avec un mobilier traditionnel, le château d'Auteuil est un château familial entouré de haras, de 150 chevaux pur sang et de forêts. Éléments protégés MH : le château ; les façades et les toitures ; la plate-forme entourée de ses douves et les parcelles attenantes dont la grande pâture au nord, en totalité : inscription par arrêté du 14 septembre 2007.","habitants":"La richissime Mouna Ayoub\"","divers":"Auteuil                                                                 GPS : 49° 20' 55\" Nord, 2° 04' 40\" Est","gps":"49° 20' 55\" Nord, 2° 04' 40\" Est","images":["../../jctruffet.com/image/image_60/60_Auteuil_1.jpg","../../jctruffet.com/image/image_60/60_Auteuil_2.jpg"]},"Consult_chateau_formulairec546":{"id":"Consult_chateau_formulairec546","dept":"60","canton":"Thourotte","commune":"Avricourt","nom":"Avricourt","type":"Château","periode":"XVI","histoire":"AVRICOURT, le château d'Avricourt, appartenant à monsieur le comte de Louvencourt, est un beau bâtiment en briques et chaines de pierre, à haut pignon, qui a été construit en 1540.","architecture":"AVRICOURT château de plan recranglaire à trois niveaux flanqués ,Il est orné de deux tourelles toit en poivrières et de deux pavillons ajoutés en 1758. Sur la façade nord, au dessus des fenêtres, cinq médaillons de ronde-bosse, représentant sans doute des portraits d'anciens seigneurs. Sur la façade sud on peut lire au-dessus de la porte \"Portio mea domine sit in terra viventium\". Le parc posséde des jardins remarquables.","habitants":"Comte de Louvencourt,\"","divers":"Château d'Avricourt","gps":"","images":["../../jctruffet.com/image/image_60/60_Avricourt_1.jpg","../../jctruffet.com/image/image_60/60_Avricourt_2.jpg"]},"Consult_chateau_formulaire8a6c":{"id":"Consult_chateau_formulaire8a6c","dept":"60","canton":"Mouy","commune":"Bailleul-sur_Thérain","nom":"Bailleul_sur_Thérain","type":"Forteresse","periode":"XVIII","histoire":"Deux châteaux dans cet article Bailleul et Trye.                                                     BAILLEUL, c'est une belle construction en brique et pierre aux volumineux mascarons, aux balcons chiffrés en fer forgé, garnie à la base de bornes coniques, reliées par des chaînes, elle est de pur style Mansart, modèle du genre de ce grand architecte, constructeur de Versailles. Deux tours féodales subsistent de l'ancien château, l'une du XIVe siècle, l'autre rebâtie sur le modèle de celle du château de Langeais. La façade méridionale, toute ensoleillée donne sur les belles pelouses du parc. Cette seigneurie remonte aux temps les plus reculés de la féodalité. Elle possédait plusieurs fiefs et était assez importante pour être mentionnée dans les transactions par lesquelles passa le comté de Clermont avant d'être réuni à la couronne en 1258. Le premier acte que l'on retrouve est celui par lequel Pierre de Bailleul en l'année 1134, autorise les religieux d'Ourscamps à s'établir sur les terres et à fonder avec son aide et ses deniers une abbaye dont les restes se voient encore. La \"Maison forte\" aurait reçu la visite de Louis IX (Saint-Louis) et de sa mère Blanche de Castille.  En 1724, François Michel du Mesnil épouse Thérèse de Gaudechart, reconstruit le château et meurt sans enfant et laisse la demeure à son épouse par testament avec tous ses biens en 1778. Durant près de 900 ans, 5 familles seront propriétaires du château dont, en dernier, l'illustre famille des  marquis de Gaudechart, maintenant éteinte. Le 11 février 2012, un incendie a embrasé la toiture du château de Bailleul-sur-Therain.","architecture":"A trois K.M. au sud à Hermés château de la TRYE, domaine de Froidmont, est situé dans un parc de 6,5 hectares, en lisière de la forêt domaniale de Hez-Froidmont. Le château de La Trye sélève sur le site de lAbbaye de Froidmont, fondée au XIIe siècle et détruite à la Révolution. De celle-ci ne subsistent, aujourdhui, que lancienne boulangerie, une aile du Palais abbatial, des vestiges du cellier, les bassins et le mur denceinte. Ce dernier datant du XIVe siècle est classé MH et clôt lensemble du parc du château. Cest dans ce site historique protégé, propice à la réflexion, que nous vous proposons deux espaces de réception et de séminaire, alliant le prestige et la confidentialité. Les espaces proposés à ce jour : Au centre dun vaste parc peuplé darbres centenaires, les espaces du château de La Trye sont lumineux, et donnent de tout côté, sur le parc, et  offre une unité de lieu rare et une ouverture sur un extérieur de qualité.                                                                   Éléments protégés BAILLEUL:  les façades et les toitures du bâtiment principal (à l'exclusion de la poterne d'entrée avec ses deux tours); les façades et les toitures des communs ; la grille d'entrée : inscription par arrêté du 19 avril 1961, propriété d'une société, les tours qui forment la poterne sont des imitations probables, du XVe siècle. De 1819 à 1837, le château de Bailleul-sur-Therain va abriter le petit séminaire africain fondé par la révérende Père Anne-Marie Javouhey.","habitants":"Famille de François Michel du Mesnil \"","divers":"Deux châteaux dans cet article Bailleul  grav 1-2-3  et Trye grav 4-5.                                                                     GPS : 49° 23' 06\" Nord, 2° 12' 47\" Est                                                               Trye GPS : 49° 21' 30\" Nord, 2° 14' 48\" Est","gps":"49° 23' 06\" Nord, 2° 12' 47\" Est","images":["../../jctruffet.com/image/image_60/60_Bailleul_sur_Th%c3%a9rain_1.jpg","../../jctruffet.com/image/image_60/60_Bailleul_sur_Th%c3%a9rain_2.jpg","../../jctruffet.com/image/image_60/60_Bailleul_sur_Th%c3%a9rain_3.jpg","../../jctruffet.com/image/image_60/60_Bailleul_sur_Th%c3%a9rain_4.jpg","../../jctruffet.com/image/image_60/60_Bailleul_sur_Th%c3%a9rain_5.jpg"]},"Consult_chateau_formulaire0b87":{"id":"Consult_chateau_formulaire0b87","dept":"60","canton":"Nanteuil-le-Haudouin","commune":"Baron","nom":"Beaulieu_le_Vieux","type":"Manoir","periode":"XVI","histoire":"BEAULIEU le VIEUX, au milieu des bâtiments en U se trouve le pédiluve où l'on venait laver les chevaux. Une première enceinte ajourée ornée d'une grille assez modeste du XVIIIe siècle délimite la cour de ferme. Une seconde enceinte d'une longueur de 800m englobe des pâtures. A l'extrémité sud-ouest de cette enceinte se trouvent les deux petites maisons très simples du jardinier. En ce qui concerne le manoir proprement dit, ses parties les plus anciennes datent du XVIe siècle, mais il a été remanié au XVIIIe siècle et bien restauré par ses propriétaires. Le décor de gypseries est du à l'artiste italien dont le nom est gravé sur le revers de la dalle funéraire qui recouvre le buffet de la salle à manger.\nÉléments protégés MH : la grange dimière : classement par arrêté du 26 mars 1982. Les façades et les toitures ; le mur de la clôture de la première enceinte avec sa grille du XVIIIe siècle ; inscription par arrêté du 26 mars.","architecture":"BEAULIEU le VIEUX , Il s'agit d'un bâtiment remanié à trois époques. Au XVIe siècle a été élevé un corps de logis principal de trois travées Le manoir est en réalité une ferme, un grand ensemble, et sa grande dîmière ont été bâtis à l'écart, grange classée M.H. depuis 26/03/1982. Deux communes prolongent de chaque côté la belle grange qui fait l'intérêt principal de cet ensemble, le manoir ou bâtiment d'habitation et le hangar attenant formant l'autre branche du U. Le manoir de Beaulieu-le-Vieux avec sa salle à manger au rez-de-chaussée et la chambre à alcôve à l'étage au-dessus de la chapelle, cour pavée avec pédiluve pour chevaux et mur d'enceinte avec grille du XVIIIe siècle inscrits par le même arrêté : Les bâtiments s'organisent le long de trois côtés de la cour carrée, partiellement pavée, et comportant en son centre un abreuvoir-pédiluve pour les chevaux et le bétail. La cour est délimitée par un mur d'enceinte partiellement ajouré du XVIIIe siècle, et cet ensemble ainsi que les pâtures l'entourant au Nord, à l'Est et au Sud-Est compris dans une seconde enceinte dont la longueur avoisine les 800 m. Le Manoir de Beaulieu-le-Vieux a été remanié au XVIIIe siècle et son intérieur est parfaitement restauré, si bien que le décor ne justifie pas une protection aux M.H. La salle à manger a conservé un lambris assez sobre du XVIIe siècle, le buffet est recouvert par une dalle funéraire, l'escalier a gardé sa rampe en fer forgé, de facture simple du XVIIIe siècle et une chambre à alcôve présente de beaux décors en stuc, exécutés par un artiste italien.","habitants":"Seigneurs locaux\"","divers":"Beaulieu  GPS : 49° 10' 26\" Nord, 2° 43' 49\" Est","gps":"49° 10' 26\" Nord, 2° 43' 49\" Est","images":["../../jctruffet.com/image/image_60/60_Beaulieu_le_Vieux_1.jpg"]},"Consult_chateau_formulairea048":{"id":"Consult_chateau_formulairea048","dept":"60","canton":"Pont-Sainte-Maxence","commune":"Beaurepaire","nom":"Beaurepaire_Vexin","type":"Château","periode":"XVI","histoire":"BEAUREPAIRE, la partie de l'aile latérale qui a le caractère du XVIe siècle a été batie par Mauroy de Saint-Ligier en 1425. Le reste des constructions, avec la façade, a été remanié par les Lameth de 1577 à 1614.   Beaurepaire propriété de M. Christian de Luppé, maire de Beaurepaire.\nÉléments protégés MH : la façade et la toiture ainsi que les cheminées de la cuisine et de la salle à manger au rez-de-chaussée; la chapelle (actuellement église paroissiale) : inscription par arrêté du 29 décembre 1978.","architecture":"BEAUREPAIRE, est un édifice en pierre de Verneuil, élevé sur un terre-plein entouré de larges douves remplies d'eau. Il se compose de deux ailes en équerre flanquées de tours surmontées de toits pointus. A l'ouest de la façade, une tour octogonale plus importante que les autres, coiffée d'une couverture, remaniée à deux reprises entre 1871 et 1884, qui affecte aujourd'hui la forme d'un dôme. Autrefois isolée, elle a été reliée au château en 1901 par le bâtiment neuf.  La constuction date de 1425, de 1508 et de 1577.  L'aile terminée en 1519, et dont une partie fut détruite pour faire place à des bâtiments habitables, remplaçait elle-même un château plus ancien dont on rencontre encore quelques vestiges. Notamment sous la tour nord, dont la base est circulaire. La voûte d'entrée, en retrait sur la façade du XVIIe siècle, avec son fronton austère, est la poterne de l'ancien château-fort. La tour octogonale, rhabillée en 1577, faisait certainement partie de l'ensemble primitif. L'alignement de toutes ces constructions primitives est en arrière de celui du XVIIe siècle, ce qui mettait les tours en flanquement. Jusque vers 1819, des dépendances bordaient le côté ouest du quadrilatère et venaient s'appuyer à la tour octogonale. Seul le côté ayant vue sur l'Oise semble n'avoir pas été construit. Mais il était à coup sûr garni d'un rempart comme devait l'être l'espace qu'occupe aujourd'hui le bâtiment neuf. Derrière ses douves, flanqué de ses tours, le château, logis et cour, était clos et fortifié, comme il était habituel en ces temps troublés, tout particulièrement près de l'Oise, route des invasions et frontière entre l'Ile-de-France et la Picardie.","habitants":"Famille de Mauroy de Saint-Ligier en\"","divers":"Beaurepaire  49° 17' 53? nord, 2° 33' 54? est","gps":"","images":["../../jctruffet.com/image/image_60/60_Beaurepaire_Vexin_1.jpg","../../jctruffet.com/image/image_60/60_Beaurepaire_Vexin_2.jpg","../../jctruffet.com/image/image_60/60_Beaurepaire_Vexin_3.jpg"]},"Consult_chateau_formulaire7b4f":{"id":"Consult_chateau_formulaire7b4f","dept":"60","canton":"Beauvais","commune":"Beauvais","nom":"Beauvais_60","type":"Palais","periode":"XII-XVI-XVIII","histoire":"Quatres châteaux dans cet article, le palais des évêques, la Houssoye, Nivillers et la tour Boileau.\n PALAIS  des évêques, comtés de Beauvais, situé au pied de la célèbre cathédrale, ce bâtiment qui s'appuie sur la muraille gallo-romaine est une forteresse du XIIe siècle plaquée d'une façade Renaissance. L'édifice a été reconstruit au XVIe siècle et restauré au XIXe siècle. Les deux puissantes tours à poivrières furent édifiées en 1306, elles ont été bâties à la demande de l'évêque Simon de Nesles pour défendre l'entrée de la ville. Le palais épiscopal, résidence des évêques-comtes de Beauvais jusqu'à la Révolution française, a été ensuite tour à tour préfecture puis Palais de justice jusqu'en 1973. Il est maintenant devenu le musée départemental de l'Oise, l'un des plus beaux musées de Picardie.\nÉléments protégés MH : le palais épiscopal en totalité : classement par liste de 1862.                                                                                                    A dix K.M. au sud ouest le château de la HOUSSOYE de la fin du XVIIIe siècle. Il sert actuellement de maison de convalescence de la mutuelle générale du commerce, de lIndustrie et de lartisanat.    Louis-François de la Houssoie, seigneur de Maizicourt, de Neuvillette et de Gouy, capitaine de cavalerie dans le régiment Dauphin, et chevalier de Saint-Louis en 1703, est institué héritier de Nicolas de la Houssoie, ainsi que son cousin germain, en 1709, et meurt en 1714. Louis-François de la Houssoie de Neuvillette, né le 4 juillet 1705, est reçu page du roi dans sa grande écurie le 19 juin 1720.","architecture":"NIVILLERS, à 5 K.M Au nord -Est de Beauvais Le château de Nivillers a été construit en 1739 pour la famille Lespinay, qui détenait la seigneurie du lieu, à la fin du XVIIIe siècle la demeure appartenait au baron Antoine Lemaire-Darion, chevalier de l'Empire, membre du corps législatif, et conseiller en la Cour Impériale d'Amiens. A cette époque l'ensemble du domaine consistait en un \"château et ses cours, un jardin et des dépendances entourés de murs, une ferme à côté, avec ses bâtiments d'exploitation et les terres en dépendantes; le tout comprenant 102 hectares\". Après avoir été au baron Jacques de Reinach, banquier français d'origine allemande, le château abrite aujourd'hui un centre d'action sociale et éducative.                                                                                               TOUR BOILEAU, un nouveau rempart est bâti à la fin du XIIe siècle sous Philippe Auguste pour protéger la ville qui sest agrandie bien au-delà de son enceinte antique. Aux XIVe et XVe siècles, pendant la guerre de cent ans, de nouvelles constructions sont ajoutées comme la tour Boileau en 1489, du nom du maire qui a ordonné sa construction. Elle est située à proximité de lancienne porte Saint-Jean, au-delà du Thérain, à une trentaine de mètres en avant du rempart, auquel elle était reliée par une galerie couverte. Au-delà de sa fonction défensive, elle permettait de réguler le débit deau destiné à alimenter les fossés bordant les fortifications et les moulins de la ville implantés en aval. La tour devint au XVIIe siècle, un cachot pour les soldats ennemis et servit ensuite de poudrière, de caserne de pompiers. Aujourdhui, les vestiges de la tour descalier, la galerie couverte et le bâtiment-pont qui enjambe le Thérain, dominent encore la zone de confluence du Thérain et de lAvelon.\nÉléments protégés MH : la tour Boileau : inscription par arrêté du 5 avril 1930, rectifié par arrêté du 20 mai 1930, propriété de la commune.","habitants":"Nivilers; Famille Lespinay\"","divers":"Quatres châteaux dans cet article, le palais des évêquesgrav1-2-3, la Houssoye grav-6, Nivillers grav-5 et la tour Boileau grav-4.                          La Houssoye                                              49° 21' 19? nord, 1° 56' 34? est                                 nivillers gps 49° 27' 27? nord, 2° 10' 00? est","gps":"","images":["../../jctruffet.com/image/image_60/60_Beauvais_60_1.jpg","../../jctruffet.com/image/image_60/60_Beauvais_60_2.jpg","../../jctruffet.com/image/image_60/60_Beauvais_60_3.jpg","../../jctruffet.com/image/image_60/60_Beauvais_60_4.jpg","../../jctruffet.com/image/image_60/60_Beauvais_60_5.jpg","../../jctruffet.com/image/image_60/60_Beauvais_60_6.jpg"]},"Consult_chateau_formulairec47b":{"id":"Consult_chateau_formulairec47b","dept":"60","canton":"Compiègne","commune":"Berneuil sur Aisne","nom":"Berneuil_sur_Aisne","type":"Château","periode":"XVI","histoire":"BERNEUIL sur AISNE , le marquisat dAttichy et la terre de Berneuil appartiennent à la famille de Borgnes de Villette avant 1620. Durant la Révolution, le château appartenait à Charles Bretagne de la Trémoïlle, militaire, qui émigra en 1791. Ses biens furent confisqués comme biens nationaux et rachetés par monsieur Pierre Adrien Bailly, cultivateur demeurant à Berneuil, suivant actes des dix huit Messidor et trois Thermidor de lAn Trois. Le domaine de Berneuil, toujours exploité par le fermier Bailly, échut en héritage en 1818 à Louis Stanislas Kostka. Lédifice, entouré de ses terres fut vendu aux enchères le 28 février 1858, ainsi que toutes les constructions et terres y attenant, par madame Augusta Murray, seconde femme et veuve de Louis Stanislas Kostka. Il a été très abîmé lors de la deuxième guerre mondiale (tour arrière tronquée, base de la tour de gauche démolie à la hauteur dun étage). En 1992, monsieur et madame Eric de Finance lacquirent. Depuis lors il le restaure entièrement lui-même, de la cave voûtée à la toiture.","architecture":"BERNEUIL sur AISNE, la partie la plus ancienne du château comprenant les caves voûtées et lescalier monumental, constituait un pavillon de chasse au début du XVIIe siècle. Éléments protégés MH : le château de Berneuil en totalité : inscription par arrêté du 22 août 1949. il est actuellement en cours de restauration.","habitants":"famille de Borgnes de Villette et  madame Augusta Murray\"","divers":"Château de Berneuil GPS : 49° 24' 52\" Nord, 3° 00' 40\" Est","gps":"49° 24' 52\" Nord, 3° 00' 40\" Est","images":["../../jctruffet.com/image/image_60/60_Berneuil_sur_Aisne_1.jpg"]},"Consult_chateau_formulairef81b":{"id":"Consult_chateau_formulairef81b","dept":"60","canton":"Chaumont-en-Vexin","commune":"Boissy-le-Bois","nom":"Boissy_le_Bois","type":"Château","periode":"XVI","histoire":"BOISSY LE BOIS,  manoir du Vexin construit au XVIe siècle, qui conserve notamment une grange et un colombier octogonal. Le manoir a subi de nombreux remaniements entre le XVIIe et le XIXe siècle. L'ensemble était, en 1989, en très mauvais état et laissé totalement à l'abandon par son propriétaire.  Éléments protégés MH : la grange et le pigeonnier : les façades et les toitures ; la conciergerie et le jardin potager : inscription par arrêté du 2 avril 2002.","architecture":"BOISSY LE BOIS, Il est composé de brique et pierre, ainsi que la Ferme seigneuriale. Le manoir du Vexin  est cantonné d'une tour cylindrique en pierre. Au manoir est attenante l'ancienne ferme seigneuriale, qui conserve notamment une grange et surtout un colombier octogonal et un porche datant également du XVIe siècle et bâtis en brique et pierre. Les murs de clôture de l'ancien jardin potager du XVIIe siècle portent une peinture de 1737. Le manoir de Boissy-le-Bois a subi de nombreux remaniements entre le XVIIe et le XIXe siècle. L'ensemble était, en 1989, en très mauvais état et laissé totalement à l'abandon par son propriétaire. La Grange et le pigeonnier avec ses façades et toitures, la conciergerie et le jardin potager en totalité sont inscrits aux M.H. le 2/04/2002.","habitants":"Seigneur local\"","divers":"Château de Boissy  le Bois                        GPS : 49° 16' 44,03\" Nord, 1° 56' 26,82\" Est","gps":"49° 16' 44,03\" Nord, 1° 56' 26,82\" Est","images":["../../jctruffet.com/image/image_60/60_Boissy_le_Bois_1.jpg"]},"Consult_chateau_formulaire8a6a":{"id":"Consult_chateau_formulaire8a6a","dept":"60","canton":"Estrées-Saint-Denis","commune":"Boulogne la grasse","nom":"Boiulogne_Grasse","type":"Château","periode":"XIX","histoire":"BOULOGNE LA GRASSE, à la fin du XIXe siècle, Charles de Boulogne, riche propriétaire belge, achète le titre de comte et fait construire une folie architecturale sur les vestiges du château de la famille de Lancry. Larmature en béton armé (une innovation à l'époque) permet au tout nouveau comte de bâtir rapidement un édifice solide et de laisser libre cours à sa fantaisie : sculptures de saints, gargouilles, références à la légende arthurienne et inscriptions en latin.   Tout y est et le château propose de centaines de trouvailles et trésors plus ou moins cachés.                                                                     Boulogne-la-Grasse est située sur un pan de colline boisé \nElle occupe un site dominant, autrefois lieu de passage de la voie Romaine de Beauvais à Saint-Quentin et frontière entre les Bellovaques et les Ambiens.","architecture":"BOULOGNE LA GRASSE, véritable attraction jusquau début de la première guerre mondiale, Boulogne-la-Grasse a ensuite beaucoup souffert. Quelques mois après la victoire de la Marne, le front se déplace dans lOise et le château, dont la haute tour offre une vue imprenable jusquà Amiens, est réquisitionné par larmée française. Il devient un camp militaire et pendant 4 ans, des centaines dhommes vont y tenter de survivre, par exemple en se terrant dans les tunnels creusés autour du château, et dans lesquels on peut toujours voir les « graffitis » et signatures des soldats de lépoque.  Les plus gros dégâts seront infligés au bâtiment entre le printemps 1918 et la mi-août. Le village et son château sont dabord bombardés puis conquis par larmée allemande lors des combats autour de Montdidier. La contre-attaque française victorieuse, quelques mois avant larrêt des combats, laisse lédifice encore un peu plus meurtri. Il a fallu près de 25 ans pour reconstruire certaines parties du château et de ses dépendances, mais aujourdhui encore les cicatrices de la grande guerre sont béantes.","habitants":"Famille de Lancry.\"","divers":"Château de Boulogne la Grasse","gps":"","images":["../../jctruffet.com/image/image_60/60_Boulogne_Grasse_1.jpg","../../jctruffet.com/image/image_60/60_Boulogne_Grasse_2.jpg","../../jctruffet.com/image/image_60/60_Boulogne_Grasse_3.jpg","../../jctruffet.com/image/image_60/60_Boulogne_Grasse_4.jpg"]},"Consult_chateau_formulaire3a1a":{"id":"Consult_chateau_formulaire3a1a","dept":"60","canton":"Chantilly","commune":"Boran sur oise","nom":"Boran_sur_Oise","type":"Château","periode":"XVI-XVIII","histoire":"Deux châteaux dans cet article, Boran et Précy sur Oise.             BORAN, de 1716 à 1721, Marie Madeleine de la Vieuville, comtesse de Parabère, donnait de somptueuses fêtes au château, au temps ou elle était la maîtresse de Philippe d'Orléans. Le château de Boran, sera transmis, par mariage à Raoul de La Poeze, marquis d´Harambure, et resta dans sa descendance directe.  Le domaine a été marqué par Marie-Madeleine de la Vieuville, née en 1693 à Paris, qui est devenue par mariage comtesse de Parabère. Veuve en 1716 . Elle donna au château des fêtes et des chasses somptueuses. A voir également dans cette commune, la ferme de Morancy (restes d'une ancienne forteresse) qui est inscrite MH par arrêté du 29 octobre 1941.\nA cinq K.M, au  nord  PRECY, les premiers seigneurs avaient bâti leur manoir à l'endroit même où s'élève l'édifice actuel sur la place de l'Église. De belle allure, il est vrai, il ne remonte qu'à la fin du XIXe siècle, mais il est bâti sur l'emplacement de l'ancienne résidence seigneuriale appelé le \"Grant Hostel\" dans les vieux manuscrits. Les fondations et le sous-sol où se trouve la salle des gardes, remontent au Moyen-Age. Les fossés, encadrent toujours le grand parc et la demeure, elle est flanquée d'une tour hexagonale portant les armes de la famille de Saint Gelais, titulaire de la seigneurie de Précy sur Oise, Blaincourt et Bouqueval au XVIe siècle. Pendant la guerre de cent ans, la demeure seigneuriale fut prise par les Anglais qui s'y installèrent. Les sires de Précy qui, dans cette aventure, n'avaient pas perdu la vie, relevèrent l'édifice. Mais il devait tomber au début du XVIIIe siècle.   Maison de repos, clinique des Lierres.","architecture":"BORAN,  l'édifice se situe à l'emplacement d'un château plus ancien, construit au XVIe siècle avant d'être complètement remis au goût du jour dans les années 1850. Ce château datait du XVIe siècle, et fut remplacé, par une résidence de campagne, au XVIIIe siècle, remaniée et remise au goût de l'époque au cours en 1850.  Le corps de logis principal ne comporte qu'un rez-de-chaussée sur un sous-sol surélevé, avec des hauts combles à la française. L'entrée, est accessible par un escalier d'honneur à double révolution. Elle se situe dans un corps central saillant, surmonté d'une double lucarne au fronton entrecoupé, percé d'un oculus. Deux rangées de pilastres encadrent les fenêtres de la lucarne. Aux deux extrémités, la façade de 7 travées est précédée de pavillons latéraux, dont celui à l'Est se cache derrière une aile en retour d'équerre ajoutée postérieurement. Elle comporte un étage et son architecture s'adapte à celle du logis principal, ce qui n'est pas tout à fait le cas d'une seconde aile latérale, à l'arrière, côté Ouest. Les façades sont entièrement traitées en pierre de taille. Deux tours rondes sur la façade arrière ne sont visibles depuis la cour d'honneur que par leurs toits en poivrière. Le colombier, en mauvais état, est éloigné du château, et se situe sur un terrain vague, au Nord de la rue du Pilori. Les façades, caves, toitures, portial d'entrée, Éléments protégés MH : les façades et les toitures du château ; les caves ; le portail d'entrée et les communs qui le cantonnent; le pigeonnier et l'ensemble des murs de clôture du domaine : inscription par arrêté du 21 mai 2007.","habitants":"Famille de Marie Madeleine de la Vieuville,\"","divers":"Deux châteaux dans cet article, Boran grav 1-2-3 et Précy sur Oise grav -4-5-6.                                            GPS : 49° 10' 16,68\" Nord, 2° 21' 41,4\" Est","gps":"49° 10' 16,68\" Nord, 2° 21' 41,4\" Est","images":["../../jctruffet.com/image/image_60/60_Boran_sur_Oise_1.jpg","../../jctruffet.com/image/image_60/60_Boran_sur_Oise_2.jpg","../../jctruffet.com/image/image_60/60_Boran_sur_Oise_3.jpg","../../jctruffet.com/image/image_60/60_Boran_sur_Oise_4.jpg","../../jctruffet.com/image/image_60/60_Boran_sur_Oise_5.jpg","../../jctruffet.com/image/image_60/60_Boran_sur_Oise_6.jpg"]},"Consult_chateau_formulaire5866":{"id":"Consult_chateau_formulaire5866","dept":"60","canton":"Chaumont-en-Vexin","commune":"Bouconvillers","nom":"Bouconvillers","type":"Château","periode":"XVII","histoire":"BOUCONVILLERS, En 1726, la terre seigneuriale de Bouconvillers appartenait à Pierre-Gilbert des Voisins, président au parlement de Paris. Jean Baptiste Lemoyne de Bellisle, chevalier,seigneur de Vernon, la détenait en 1780. Sa petite-fille épouse du comte d'Urre, pair de France sous Charles X, l'avait recueillie dans la succession de sa mère, et occupait avec son mari le château ou ils sont morts l'un en 1848,","architecture":"BOUCONVILLERS, ce château, construit à la fin du XVIIe siècle, est situé au sud-est du village à la section dite \"le hameau\" qui est composée du château entouré du parc et de douze maisons. Bouconvillers était une seigneurie qui a été possédée de 1100 à 1400 par une famille qui en portait le nom. Le parc, avec son jardin d'agrément, aurait été dessiné par le célèbre architecte-paysager André Le Nôtre.","habitants":"Famille de Pierre-Gilbert des Voisins\"","divers":"Château de Bouconvilliers","gps":"","images":["../../jctruffet.com/image/image_60/60_Bouconvillers_1.jpg","../../jctruffet.com/image/image_60/60_Bouconvillers_2.jpg"]},"Consult_chateau_formulaire5dd3":{"id":"Consult_chateau_formulaire5dd3","dept":"60","canton":"Chaumont-en-Vexin","commune":"Boury en Vexin","nom":"Boury_en_Vexin","type":"Château","periode":"XVII","histoire":"BOURY en VEXIN   Depuis Gaubert, premier seigneur connu de cette maison de Boury en 1030, qui participera à travers les siècles à l'histoire du Vexin, les familles se succèdent par alliances.  En 1584 le château passe par alliance  à la famille Péllevé. Ainsi, au milieu du XVIIe siècle, la Baronnie de Boury appartient à Guillaume Aubourg, parent éloigné des Péllevé, conseiller du Roi, garde des rôles des offices et grand audiencier de France Guillaume Aubourg, devenu par lettre patente de Louis XIV, marquis de Boury. L'édifice resta propriété familiale, sauf pendant une cinquantaine dannées au XIXe siècle, à lissue desquelles Hubert-Edouard-Zentz dAlnois put le racheter pour loffrir à son épouse, arrière-petite-fille du dernier seigneur de Boury.","architecture":"BOURY en VEXIN   c'est un château de plaisance. La construction date de 1685 à 1698. L'Architecte était Jules Hardouin-Mansart, pour les plans du nouveau château, les travaux commenceront en 1685 pour être achevés en 1689. L'ornementation des façades est confiée à Thibault Poissant.  Son propriétaire initial était Guillaume Aubourg de Boury. La construction du château de Boury. Il est de type château de plaisance. Le château de Boury-en-Vexin fut meublé au XVIIe siècle et édifié sur les plans de Mansart (M.H. privé). Il possède une cuisine d'époque et un jardin à la Française. C'est un pur exemple de l'architecture classique à l'apogée du XVIIe siècle. L'architecte qui le créa fut Jules Hardoin-Mansart. La cour d'honneur et la façade principale donnent sur l'Ouest et sont visibles depuis la rue. Son propriétaire actuel est Philippe Zentz d'Alnois qui en a fait sa résidence et un Musée. Sont protégés aux MH : la chapelle, l'orangerie, la buanderie, le colombier, la fontaine, l'abreuvoir, le parc, l'écurie, l'élévation et la toiture. Le musée est ouvert au Public. Visite guidée des salons, de la chapelle et de la cuisine.    Éléments protégés MH : les façades et toitures du château et de la chapelle attenante, de l'écurie ancienne située dans le parc, du bâtiment ancien (comprenant l'orangerie, la buanderie et le Colombier situé dans le parc), de l'écurie ancienne située à l'entrée du domaine ; la fontaine-abreuvoir ; le parc : classement par arrêté du 18 juin 1931.","habitants":"Famille de Guillaume Aubourg\"","divers":"Château de Boury en Vexin               GPS : 49° 14' 24\" Nord, 1° 44' 21\" Est","gps":"49° 14' 24\" Nord, 1° 44' 21\" Est","images":["../../jctruffet.com/image/image_60/60_Boury_en_Vexin_1.jpg","../../jctruffet.com/image/image_60/60_Boury_en_Vexin_2.jpg","../../jctruffet.com/image/image_60/60_Boury_en_Vexin_3.jpg","../../jctruffet.com/image/image_60/60_Boury_en_Vexin_4.jpg"]},"Consult_chateau_formulaire940c":{"id":"Consult_chateau_formulaire940c","dept":"60","canton":"Mouy","commune":"Bresles","nom":"Bresles","type":"Château","periode":"XVI-XVIII","histoire":"BRESLES,  le château de Bresles actuel date du début du XVIIIe siècle et abrite aujourd'hui lhôtel de ville. La chapelle dédiée à Saint-Pierre et Saint-Paul a été fondée, en 1312, par Simon de Clermont-Nesles, qui fut Evêque de Beauvais. La construction du château de Bresles débuta au XVIe siècle et fut achevée au XVIIIe siècle. Son ancien propriétaire était le diocèse de Beauvais. Son propriétaire actuel est la commune de Bresles Peu de choses subsistent de la forteresse médiévale, ancienne résidence des évêques de Beauvais. Le château fut construit au début du XVIIIe siècle. Il comporte deux ailes à angle droit à deux étages et combles couvertes d'une toiture à croupes. Les intérieurs de l'édifice conservent en grande partie les dispositions et décors d'origine, mais les meubles sont dispersés et des matériaux de l'aile, datant du XVIe siècle, revendus. En octobre 1998 les services de la mairie s'installent dans les locaux, bien que la totalité du bâtiment n'ait pas été restaurée, faute de moyens financiers.","architecture":"BRESLES, la construction du château de Bresles date du XVIe au XVIIIe siècle. Le premier château fort qui datait de 1212, a été détruit. Son propriétaire actuel est la commune de Bresles.  Éléments protégés MH : l'aile principale y compris les intérieurs à l'exclusion de l'aile en retour le long de la rue de la Chaussée, le porche d'entrée et le bâtiment qui lui est accolé avec leur sol et les vestiges qu'il contient, l'ensemble des vestiges du bastion entourant la cour de la mairie, la porte monumentale connexe à l'église sur le passage du château, la porte monumentale entre le bastion et l'église : inscription par arrêté du 25 juin 1986..","habitants":"Evêques de Beauvais\"","divers":"Château de Bresles                                GPS : 49° 24' 33\" Nord, 2° 15' 08\" Est","gps":"49° 24' 33\" Nord, 2° 15' 08\" Est","images":["../../jctruffet.com/image/image_60/60_Bresles_1.jpg"]},"Consult_chateau_formulaire3cfc":{"id":"Consult_chateau_formulaire3cfc","dept":"60","canton":"Saint-Just-en-Chaussée","commune":"Breteuil","nom":"Breteuil","type":"Château","periode":"XVI-XVIII","histoire":"BRETEUIL, ancienne Abbaye Notre-Dame fondée probablement avant les invasions normandes, labbaye bénédictine Notre-Dame de Breteuil est rétablie et restaurée vers 1030 par le comte de Breteuil Gilduin. En grande partie à lorigine de limplantation de la population britulienne sur son site actuel, le monastère connaît une très grande prospérité spirituelle et temporelle tout au long du Moyen Âge. De cette prospérité témoigne encore aujourdhui lexceptionnelle chapelle abbatiale gothique à deux niveaux, de la fin du XIIIe siècle, voûtée sur croisées dogives et pourvue dun riche décor sculpté (chapiteaux, culs-de-lampe) et dun rare et remarquable pavage en terre cuite émaillée du XIVe siècle.                          Idéalement situé au centre de la commune de Breteuil-sur-Noye, le château de la Butte a été totalement rénové pour devenir un gîte de groupe.   Il dispose d'un parc arboré d'un hectare et d'un parking totalement clos .","architecture":"BRETEUIL, après les troubles de la guerre de Cent Ans, labbaye renoue avec un certain dynamisme économique dans la première moitié du XVIe siècle, ce que nous révèle le logis abbatial avec ses deux tours, rebâti à linitiative du dernier abbé régulier, entre 1498 et 1527, mais aussi une remarquable frise Renaissance à médaillons sculptés, découverte fortuitement lors de travaux il y a quelques années.   Malgré un déclin inexorable amorcé dès le XVIe siècle, le monastère fait lobjet dun vaste programme de reconstruction à linitiative de la dernière communauté de religieux, entre 1777 et 1790. Les travaux, à peine terminés lors de la fermeture du couvent en 1790, se traduisent par la construction de deux ailes de style classique encore visibles aujourdhui. Vendu comme bien national en 1796, transformée en « château », lancienne abbaye est partagée entre deux propriétaires jusquen 1964. Elle abrite actuellement un établissement médical ainsi que le siège de la communauté de communes de lOise picarde.  Le château de Breteuil était une importante place forte où les rois séjournèrent souvent au Moyen âge . Il fut assiégé plusieurs fors, notamment en 1356 et en 1386. Il fut une première fois détruit en 1429 par les anglais, ainsi que le village et l'abbaye Notre-Dame.","habitants":"\"","divers":"Butte grav 1 et Breteuil sur Noye grav-2","gps":"","images":["../../jctruffet.com/image/image_60/60_Breteuil_1.jpg","../../jctruffet.com/image/image_60/60_Breteuil_2.jpg"]},"Consult_chateau_formulaire65c6":{"id":"Consult_chateau_formulaire65c6","dept":"60","canton":"Noyon","commune":"Brétigny","nom":"Brétigny","type":"Château","periode":"XVI-XVIII","histoire":"BRETIGNY, château construit en zone inondable près de l'Oise,  indique également que « Brétigny avait une forteresse qui commandait le passage de l'Oise et communiquait avec la rivière au moyen d'un double fossé, dont le pont subsistait au XIXe siècle.\nEn 1438, Jean de l'Isle, capitaine de Dive, se retire dans la forteresse de Brétigny, d'où il moleste les habitants de Noyon. Le comte d'Eu étant fait prisonnier, on lui  trancha la tête sur la place de l'Hôtel-de-Ville, ainsi qu'à vingt de ses compagnons. La forteresse fut immédiatement ruinée.","architecture":"BRETIGNY,  logis avec son escalier hors-oeuvre en vis et la tour, dont le premier niveau est voûté d'ogives, datent pour l'essentiel du XVIe siècle. Le logement est très remanié dans le premier quart du XVIIIe siècle, date portée 1707: suppression de l'étage carré transformé en étage de comble avec pignons à redents et destruction des échauguettes d'angle. Les communs datent du XIXe siècle. Le château de Brétigny est une grande maison de plan rectangulaire en rez-de-chaussée, flanquée aux quatre angles de puissants contreforts dont deux conservent les vestiges d'échauguettes. La tour ronde d'escalier, adossée à la façade, indique que l'édifice comportait primitivement au moins un étage supplémentaire.","habitants":"Famille  Jean de l'Isle,\"","divers":"Château de Brétigny","gps":"","images":["../../jctruffet.com/image/image_60/60_Br%c3%a9tigny_1.jpg"]},"Consult_chateau_formulairec949":{"id":"Consult_chateau_formulairec949","dept":"60","canton":"Noyon","commune":"Béhéricourt","nom":"Béhéricourt","type":"Château","periode":"XV-XVII","histoire":"BEHERICOURT, cet ancien chateau a été construit au XIIe siècle. Il est d'époque du Moyen-Age. Le château vieux fut probablement détruit lors de la campagne menée par Henri IV contre la ligue picarde en juillet 1591, au cours de laquelle il assiège la ville de Noyon. Au XVe siècle, le château de Béhéricourt est devenue la propriété de Louis de Couste, écuyer de Jeanne d'Arc, ses armes ont été découvertes dans la maçonnerie du logis. Le château servait d'habitation, appartient, aujourd'hui, au comte et comtesse d'Arnoult de Fleury.","architecture":"BEHERICOURT, du château médiéval, détruit en majeure partie pendant les guerres de la Ligue, subsistent néanmoins la porte fortifiée, les caves et le soubassement probablement édifiés au début du XIVe siècle ainsi que des fragments du mur d'enceinte. Quant au château actuel il est le résultat de campagnes de construction s'échelonnant du XVIIe siècle, pour le corps de bâtiment sud-est (briques à harpages de pierre sur soubassement de grès) au XIXe siècle pour le corps de logis nord-ouest. Les caves, vestiges du château vieux, avec grand et petit celliers reliés entre eux par des escaliers et pour la plupart voûtées en berceau, offrent un intérêt archéologique, puisqu'elles permettent de restituer en partie le plan de la demeure médiévale. Le château neuf en dépit de l'hétérogénéité de ses parties constituantes présente des qualités architecturales non négligeables, où le grès, la brique et la pierre révèlent une harmonieuse conjugaison, en dépit de la dissymétrie d'ensemble. Éléments protégés MH : la porte fortifiée ; le mur de clôture ; les deux celliers médiévaux avec les escaliers qui les relient : inscription par arrêté du 30 mai 1988.","habitants":"Famille de Louis de Couste\"","divers":"Château de Béhéricourt                     GPS : 49° 35' 49\" Nord, 3° 03' 58\" Est","gps":"49° 35' 49\" Nord, 3° 03' 58\" Est","images":["../../jctruffet.com/image/image_60/60_B%c3%a9h%c3%a9ricourt_1.jpg","../../jctruffet.com/image/image_60/60_B%c3%a9h%c3%a9ricourt_2.jpg"]},"Consult_chateau_formulaire2cf3":{"id":"Consult_chateau_formulaire2cf3","dept":"60","canton":"Thourotte","commune":"Elincourt Sainte Marguerite,","nom":"Béllinglise","type":"Château","periode":"XVI","histoire":"BELLINGLISE  le château de Bellinglise est situé au nord de la commune dans un parc boisé de 160 hectares. C'est un édifice remanié, il fut construit sur les restes dun tertre gallo-romain. Lédification du manoir doit remonter au XIIe siècle. Ce bâtiment appartint à la seigneurie de Bellinglise jusquau milieu du XVIIe siècle. Mais insuffisant pour cette puissante famille Hamel, le modeste manoir dorigine fut remanié au XVIe siecle. Cest depuis cette période que le château de Bellinglise montre fièrement ses façades Renaissance.","architecture":"BELLINGLISE, la construction du château de Bellinglise date du XVIe siècle. Le manoir d'origine, fut maintes fois remanié. Il remonte au XIIe siècle. Il fut agrandi, une 1ère fois au XIVe siècle. Les seigneurs de Bellinglise utilisaient une des tourelles de la façade principale comme prison, car ils avaient obtenu le droit de rendre haute, moyenne et basse justice. Au début de la Renaissance, la famille Hamel de Bellinglise décida de remanier ce petit château, de style Médiéval, devenu trop modeste au regard de son ascension sociale. Le choix des matériaux se porte sur des briques rouges et noires, avec un chaînage de pierres blanches qui anime la façade. Lancienne entrée du château de Bellinglise est encadrée de deux tourelles carrées. Des remaniements et aménagements moins importants furent effectués au XVIIe siècle. Le château fut, à nouveau modifié au XIXe siècle. Depuis 2005, il est exclusivement dédié à l'accueil des séminaires d'entreprises. Il est géré par le groupe Chateauform.","habitants":"Famille Hamel\"","divers":"Château de Béllinglisse                                      GPS : 49° 32' 17\" Nord, 2° 49' 00\" Est","gps":"49° 32' 17\" Nord, 2° 49' 00\" Est","images":["../../jctruffet.com/image/image_60/60_B%c3%a9llinglise_1.jpg","../../jctruffet.com/image/image_60/60_B%c3%a9llinglise_2.jpg"]},"Consult_chateau_formulaire055b":{"id":"Consult_chateau_formulaire055b","dept":"60","canton":"Crépy-en-Valois","commune":"Béthisy Saint Pierre,","nom":"Béthisy_St_Pierre","type":"Château","periode":"XII-XVIII","histoire":"Trois châteaux dans cet article;, Chambrerie,  Hulleux à Nery et Orrouy .                                                                                            \nA voir également la CHAMBRERIE  de Béthisy-Saint-Pierre qui est située aux abords du chevet de l'église paroissiale. La Chambrerie fut au Haut Moyen Age, le siège de la juridiction du Chambrier de France. En 1123, Lisiard de Crépy, évêque de Soissons, donne à l'abbé de Saint-Crépin-le-Grand, Teulphe, les autels de Saint-Pierre et de Saint-Martin pour y installer une communauté de moines. Au XVIIe siècle, la Chambrerie devient le prieuré Saint-Pierre de l'Ordre réformé de Saint-Maur. Pendant la Révolution, elle fut vendue comme bien national. Au milieu du XIXe siècle, une communauté de bénédictins venue de La-Pierre-qui-Vire s'installe à Béthisy; les travaux d'aménagement commencent en 1857. La Chambrerie de Béthisy-Saint-Pierre conserve des éléments disparates, témoignage de ses occupations successives : mur de clôture du Moyen Age avec portail d'entrée du XIXe siècle, salle voûtée du XIVe siècle dite salle capitulaire, caves voûtées en berceau, logis remanié au XIXe siècle, chapelle (1859) , temple d'inspiration grecque 1843.","architecture":"HULLEUX  à Nery au sud ouest de Bhetisy. Mi-château, mi-gentilhommière, l'édifice fut construit vers 1550, bâtiment rectangulaire de trois étages, la porte centrale est sommée d'un reliquaire fait d'un fronton soutenu par de minces colonettes. A l'intérieur on remarque de beaux plafonds à poutres, une riche cheminée à niches et encadrements. L'escalier démuni de paliers intermédiaires tourne comme dans les anciens escaliers à vis. Cet ancien relais de chasse de François Ier a aussi appartenu aux Bouteiller de Raray et de Brasseuse. Elle est aujourd'hui la propriété de la famille Meignen.   Éléments protégés MH : les façades et les toitures du manoir : classement par arrêté du 11 octobre 1971.                        ORROUY, il appartient aujourd'hui à la famille Grégoire Sainte-Marie. Le château d'Orrouy fut, au XVIIIe siècle, la propriété de la famille de Foucault. Il a appartenu à la famille Deshayes, puis aux Villiers et enfin, par alliance, aux Desfriches-Doria. Il a aussi appartenu au comte Armand Doria, membre de l'Institut de France. Le château d'Orrouy avec ses façades et toitures, escalier central et mur d'enceinte, et portail d'entrée, les façades et les toitures du logis; la salle voûtée du XIVe siècle dans le logis ; le temple d'inspiration grecque de 1843 ; le jardin et les sols archéologiques sont inscrits MH par arrêté du 13 octobre 1998. Prpopriété de la commune. Roi Jean-le-Bon, situé à côté du château de la Douye, il ne reste que des vestiges de cet ancien château médiéval, possède un châtelet avec deux tourelles polygonales,qui datent du XIVe et XVe siècle, couvertes de toits pyramidaux. Béthisy-Saint-Pierre  ou plusieurs souverains de la Dynastie Capétienne séjournèrent, dès le XIe siècle. Le château du roi Jean-le-Bon est inscrit aux M.H. le 14/09/1949, ainsi que son enceinte.","habitants":"Seigneurs locaux              Orrouy;  Famille de Foucault\"","divers":"trois châteaux dans cet article;  Chambrerie grav-1  Hulleux à Nery  grav-2-3  et Orrouy grav  4-5-6.                                                        Roi Jean  GPS : 49° 18' 07\" Nord, 2° 48' 14\" Est                                                     Orrouy      GPS : 49° 17' 34\" Nord 2° 51' 33\" Est","gps":"49° 18' 07\" Nord, 2° 48' 14\" Est","images":["../../jctruffet.com/image/image_60/60_B%c3%a9thisy_St_Pierre_1.jpg","../../jctruffet.com/image/image_60/60_B%c3%a9thisy_St_Pierre_2.jpg","../../jctruffet.com/image/image_60/60_B%c3%a9thisy_St_Pierre_3.jpg","../../jctruffet.com/image/image_60/60_B%c3%a9thisy_St_Pierre_4.jpg","../../jctruffet.com/image/image_60/60_B%c3%a9thisy_St_Pierre_5.jpg","../../jctruffet.com/image/image_60/60_B%c3%a9thisy_St_Pierre_6.jpg"]},"Consult_chateau_formulaire5adb":{"id":"Consult_chateau_formulaire5adb","dept":"60","canton":"Méru","commune":"Chambly","nom":"Chambly","type":"Château","periode":"XVIII-XIX","histoire":"Deux châteaux dans cet article Chambly et le pavillon Conti. CHAMBLY, en 1887, le prince Joachim Murat, cinquième du nom, marié à Cécile Ney dEchingen, l'arrière petite fille du maréchal Ney, acheta au baron Camont de Valence et à Marie de Beaumont les anciens domaines de Petimus et dEvosseaux. Il fit démolir le château de Petimus et bâtir tout près des ruines, lactuel château par les architectes Blondel et Langlois, quant au parc, il fut dessiné par le paysagiste Duchène en vue d'en faire un paysage romantique.  De nombreux artisans de la commune contribuèrent à sa réalisation. En 1914, la grande salle des attelages servit d'hôpital de campagne, pendant la première guerre mondiale. Les bâtiments furent aménagés en plusieurs dortoirs de plus de 150 lits chacun. Le château fut occupé par les Allemands pendant la deuxième guerre mondiale, puis fut abandonné et pillé jusqu'à ce que M. Simonet le rachète et commence à le restaurer en 1977. Depuis le château appartient à sa descendance.                                                                               CONTI, le pavillon Conti, est un château qui date du XVIIIe siècle. Avec son parc, il est inscrit aux M.H. depuis le 22/09/1952. À la suite de son rachat par la ville de Chamblis, le pavillon Conti a été transformé en un Centre de loisirs.","architecture":"CHAMBLY, la construction du château de Chambly date du XIXe siècle. C'est un château privé. Une partie du parc s'étend sur la commune de Ronquerolles, un premier château appelé Petimus était situé en contrebas du château actuel. Il a notamment appartenu à François de L'Hospital. Seul subsiste aujourdhui une chapelle qui fut construite, en 1670. Le château sera racheté en 1887, par Joachim Murat, 5ème prince Murat. Le château original a été détruit pour laisser la place au château actuel. Passionné de chasse à courre, le prince Murat fera rajouter de grandes écuries, des communs et un petit haras. Le château de CHambly et ses dépendances servirent dhôpital auxiliaire, lors de la première guerre mondiale, sous les numéros 38 et 261. Durant la seconde guerre mondiale, le château de Chambly fut occupé par les troupes allemandes, puis il sera laissé à l'abandon. Ce n'est qu'en 1977, que le château de Chambly sera racheté puis restauré. Au début des années 2000, le château de Chambly et son parc ont servi de lieu de tournage de film.","habitants":"Famille du Baron Camont de Valence \"","divers":"Deux châteaux dans cet article Chambly et le pavillon Conti.                              GPS : 49° 09' 20\" Nord, 2° 13' 39\" Est                                                               Chambly Conti grav-2  Conti GPS : 49° 09' 54\" Nord, 2° 14' 28\" Est","gps":"49° 09' 20\" Nord, 2° 13' 39\" Est","images":["../../jctruffet.com/image/image_60/60_Chambly_1.jpg","../../jctruffet.com/image/image_60/60_Chambly_2.jpg"]},"Consult_chateau_formulaire3161":{"id":"Consult_chateau_formulaire3161","dept":"60","canton":"Chantilly","commune":"Chantilly","nom":"Chantilly_1","type":"palais","periode":"XIV","histoire":"CHANTILLY   Il ne reste de l'ancienne forteresse médiévale (1386) des Orgemont que la base des sept tours, baignant dans les douves. En 1484, Pierre d'Orgemont, sans enfant, lègue Chantilly à son neveu Guillaume de Montmorency. Le connétable Anne de Montmorency (1493 - 1567), compagnon d'armes du roi François Ier à Marignan, joue un rôle politique éminent sous François Ier et Henri II, qui viennent souvent à Chantilly. Il fait rénover le château médiéval par l'architecte Pierre Chambiges. Vers 1560, il commande à Jean Bullant, déjà architecte de son château d'Ecouen, la construction de la capitainerie ou petit château, partie la plus ancienne de Chantilly. Anne de Montmorency fait aménager la terrasse où se dresse aujourd'hui sa statue équestre réalisée par Paul Dubois en 1886, et construire sept chapelles dont trois subsistent. Son petit-fils, Henri II de Montmorency, élève dans le parc la maison de Sylvie. En révolte contre le Roi Louis XIII, il est décapité à Toulouse en 1632. Chantilly est alors confisqué par le roi Louis XIII. En 1643, la demeure est rendue à la soeur d'Henri II de Montmorency, épouse d'Henri II de Bourbon-Condé, parents du grand Condé. Louis II de Bourbon Condé (1621-1686), dit le grand Condé, transforme le domaine en faisant dessiner le parc par André Le Nôtre, le futur jardinier du château de Versailles. Le Nôtre canalise la Nonette pour créer le grand canal, et il fait construire par Daniel Gittard le grand Degré et crée la perspective actuelle allant  de la grille d'Honneur à la terrasse. Le grand Condé fait de Chantilly un lieu de fêtes et un cercle littéraire où voisinent La Fontaine, La Bruyère, Madame de Sévigné, Bossuet, madame de La Fayette, et l'évêque de Meaux qui écrira l'oraison funèbre du grand Condé.","architecture":"CHANTILLY, en leur honneur, les deux allées parallèles, qui encadrent les parterres, prennent le nom d'allées des Philosophes. Le grand Condé donne des bals. Molière joue Tartuffe à Chantilly. Le fils du grand Condé, le prince Henri-Jules, fait transformer par Jules Hardouin Mansart le grand château dont les travaux sont achevés par Jean Aubert. Louis-Henri, prince de Bourbon Condé, 1er ministre de Louis XV de 1723 à 1726, fait bâtir par Jean Aubert les écuries, chef-d'oeuvre architectural du XVIIIe siècle, crée la manufacture de porcelaine de Chantilly, fait aménager un cabinet d'histoire naturelle. Pour décorer les appartements, il fait appel aux peintres Oudry, Nattier, Desportes et Huet. Son fils, Louis-Joseph, prince de Condé, fait construire le Jeu de Paume en 1756, le château d'Enghien et le long bâtiment classique situé à droite de la grille d'honneur, édifié par Jean François Leroy de 1769 à 1772. En 1774, il fait dessiner le jardin anglo-chinois et construire \"le Hameau\", groupe de cinq maisons rustiques qui inspira le \"Hameau de la reine Marie Antoinette\" au Trianon de Versailles, il émigre et en 1792 forme l'armée d'émigration, dite armée de Condé. Les collections du château sont saisies comme biens d'émigrés et transportées au Louvre et il sert de prison. En 1799, les bâtiments sont vendus à des démolisseurs qui détruisent le grand château jusqu'à la terrasse, le parc est ravagé. Après 1815, le prince Louis-Joseph, revenu d'émigration, fait restaurer les appartements et il obtient le retour d'une partie des collections. En 1817, le fils de Louis Joseph, Louis-Henri Joseph, duc de Bourbon, sans héritier, après l'assassinat de son fils dans les fossés du château de Vincennes en 1804, lègue ses biens en 1830 à son petit-neveu, Henri d'Orléans, duc d'Aumale, alors âgé de huit ans, cinquième fils du roi Louis Philippe.","habitants":"Les princes Bourbon Condé\"","divers":"Palais de Chantilly                                     GPS : 49° 11' 38,4\" Nord, 2° 29' 8,88\" Est","gps":"49° 11' 38,4\" Nord, 2° 29' 8,88\" Est","images":["../../jctruffet.com/image/image_60/60_Chantilly_1_1.jpg","../../jctruffet.com/image/image_60/60_Chantilly_1_2.jpg","../../jctruffet.com/image/image_60/60_Chantilly_1_3.jpg","../../jctruffet.com/image/image_60/60_Chantilly_1_4.jpg","../../jctruffet.com/image/image_60/60_Chantilly_1_5.jpg","../../jctruffet.com/image/image_60/60_Chantilly_1_6.jpg","../../jctruffet.com/image/image_60/60_Chantilly_1_7.jpg","../../jctruffet.com/image/image_60/60_Chantilly_1_8.jpg"]},"Consult_chateau_formulaire578d":{"id":"Consult_chateau_formulaire578d","dept":"60","canton":"Chantilly","commune":"Chantilly","nom":"Chantilly_Enghein","type":"Palais","periode":"XIV","histoire":"Deux châteaux dans cet article Chantilly et le château d'Enghein.                            CHANTILLY_2   Militaire, le duc d'Aumale fait ses premières armes dès 1840 en Algérie, s'illustre en mai 1843 lors de la prise de la Smalah d'Abd el Kader. De Juillet de 1830 à 1848, il fait décorer ses appartements par Eugène Lami, et élever par l'architecte Duban une galerie de bois pour les desservir, mais il doit quitter la France après la Révolution de 1848. Exilé à Twickenham près de Londres, il réunit les collections conservées aujourd'hui à Chantilly. A son retour après 1871, veuf et ayant perdu ses deux fils à l'âge de 18 et 21 ans, il fait reconstruire le château de Chantilly de 1875 à 1885 par l'architecte Honoré Daumet, afin d'y présenter ses collections. Le duc d'Aumale, membre de l'Institut de France depuis 1871, lègue à l'Institut le château en 1884, sous réserve qu'après sa mort le musée Condé soit ouvert au public, que sa présentation soit préservée et que les collections ne puissent être prêtées. Le musée Condé sera ouvert moins d'un an après sa mort, le 17 avril 1898.  Éléments protégés MH : le Jeu de Paume, à l'exclusion des intérieurs de l'appartement du conservateur : classement par arrêté du 24 octobre 1988. Les parties suivantes du grand château de Daumet : les façades, les toitures et le gros oeuvre ; l'escalier d'honneur, y compris les peintures de la voûte. Les grandes écuries, y compris le manège et la porte Saint-Denis. Le château d'Enghien. L'ensemble des terrasses, parterres et plans d'eau. Les bâtiments et les fabriques suivants : les deux pavillons de Mansart encadrant l'entrée, ainsi que la grille et le pont qui les précèdent ; le hameau ; la maison de Sylvie ;  la fontaine de Beauvais, y compris le bassin enfoui, le mur du fond et les deux rampes ; la fontaine des Druides (ou des Truites) et la fontaine de Sylvie ; l'île d'amour, le pont des grands hommes.","architecture":"CHATEAU d'ENGHIEN,  construit en 1769 par l'architecte Jean-François Leroy, il a pour fonction originelle de loger les invités des princes. Il doit son nom à Louis Antoine de Bourbon-Condé, duc d'Enghien, fils du dernier prince de Condé, qui fut logé avec ses nourrices dans le bâtiment après sa naissance en 1772. Il est composé d'une succession de quatre logements accolés marqués par quatre entrées propres surmontées chacune d'un petit fronton triangulaire le tout couronné d'une balustrade, qui sont de nos jours le logement de fonction de la conservatrice du musée Condé, et les anciens logements attribués aux 3 académiciens, membres du Collège des conservateurs du domaine.","habitants":"Les princes Bourbon Condé\"","divers":"Château d'Enghein à Chantilly       GPS : 49° 11' 38,4\" Nord, 2° 29' 8,88\" Est                                                           Enghein  grav 1                                             GPS : 49° 11' 38,4\" Nord, 2° 29' 8,88\" Est","gps":"49° 11' 38,4\" Nord, 2° 29' 8,88\" Est","images":["../../jctruffet.com/image/image_60/60_Chantilly_Enghein_1.jpg","../../jctruffet.com/image/image_60/60_Chantilly_Enghein_2.jpg","../../jctruffet.com/image/image_60/60_Chantilly_Enghein_3.jpg"]},"Consult_chateau_formulaire35cd":{"id":"Consult_chateau_formulaire35cd","dept":"60","canton":"Chantilly","commune":"Chantilly","nom":"Chantilly_Pavillon","type":"Château","periode":"XVII-XIX","histoire":"Deux châteaux dans cet article Grand Condé, le pavillon de Manse.                               L'Hôtel du GRAND-CONDE a été construit, en 1908, par l'architecte Charles Holl et appartenait, alors, à la chaîne d'Hôtels Ruhl. Il compte 100 chambres avec salles de bain et téléphone, sur 6 étages, un bar et un restaurant avec une terrasse donnant sur la pelouse. Le roi George V y résida à plusieurs reprises. L'ancien hôtel du Grand-Condé fut réquisitionné, en 1914, pour en faire le grand quartier général des armées, jusqu'en 1916. Il fut à nouveau réquisitionné pendant la seconde guerre mondiale mais, par l'armée allemande puis par l'armée américaine. En 1948, il fut vendu et transformé en appartements privés. L'ancien hôtel du grand-Condé est visible de l'extérieur.","architecture":"PAVILLON DE MANSE, la construction date de 1676 à 1680. Au bord de la Nonette, au cur de Chantilly, le pavillon de Manse a été construit en 1678 pour abriter une machine hydraulique. Son rôle était de puiser l'eau d'une source à son aplomb, de l'élever pour remplir un réservoir à ciel ouvert, et de là, la distribuer aux bassins, fontaines, cascades et jets d'eau qui ornaient la partie ouest des jardins du grand Condé, dessinés par Le Nôtre. Le mécanisme a été entièrement reconstitué par l'association chargée de la mise en valeur du site. Accolé au pavillon de Manse se trouve un autre bâtiment construit au XIXe siècle destiné à approvisionner le château de Manse et la ville en eau puis à abriter une blanchisserie industrielle que l'on peut encore visiter. Le pavillon, y compris sa machinerie et la partie des bâtiments édifiée au XIX siècle, ainsi que le canal d'amenée et son écluse sont classés par arrêté du 9 mai 1989. Le propriétaire du Pavillon de Manse actuel est l'Institut de France. Aujourd'hui, le pavillon de Manse est devenu le centre d'Interprétation. Il a été classé aux M.H. en 1989 et en 2014.","habitants":"Le grand condé\"","divers":"Deux châteaux dans cet article Grand Condé grav-2, le pavillon de Manse grav-2  Grand--Condé    GPS : 49° 11' 25,8\" Nord, 2° 27' 53,71\" Est","gps":"49° 11' 25,8\" Nord, 2° 27' 53,71\" Est","images":["../../jctruffet.com/image/image_60/60_Chantilly_Pavillon_1.jpg","../../jctruffet.com/image/image_60/60_Chantilly_Pavillon_2.jpg","../../jctruffet.com/image/image_60/60_Chantilly_Pavillon_3.jpg"]},"Consult_chateau_formulaire04f0":{"id":"Consult_chateau_formulaire04f0","dept":"60","canton":"Chaumont-en-Vexin","commune":"Chaumont-en-Vexin","nom":"Chaumont_Vexin","type":"Château","periode":"XVI","histoire":"Trois châteaux dans cet article ; Chaumont-Vexin, Bertichère,  et Tourly.                                                                                                          BERTICHERE, le château de Bertichère fut construit vers le XVIe siècle dans le style Renaissance. Il a appartenu aux comtes de Chaumont puis aux ducs de Longueville puis au prince de Conti. Il a été la résidence de Monsieur, le Frère du Roi Louis XIV. Il est bordé par la Troesne, la forêt de Trie-Château et les champs de Chaumont-en-Vexin. Actuellement, le château de Bertichère  appartient à une société privée. C'est devenu un hôtel-Golf pour le centre de Loisirs du \"Golf de Bertichères\" qui propose des activités équestres, piscine, tennis. Au centre des pistes de golf se trouve une chapelle romane du XIIe siècle dédiée à Saint Eutrope. Un pèlerinage a lieu le 30/04, chaque année.                                                                                            CHAUMONT-VEXIN  Louis Graves indiquait que « Le château était bâti sur un plan elliptique, et composé de dix tours séparées par des intervalles égaux ; il renfermait dans son enceinte le prieuré de Saint-Pierre, et le donjon nommé Tour-au-bègue ».\nLe château occupe une vaste butte d'environ 400 m de diamètre. Il ne subsiste de l'enceinte maçonnée qui encerclait le sommet que quelques vestiges. Sur le versant est, un étagement en terrasse pourrait correspondre à une basse-cour à usage utilitaire dominée par l'enclos résidentiel.","architecture":"BERTICHERE, fut construit vers le XVIe siècle dans le style Renaissance. Au fil du temps, le château a été considérablement restauré et transformé en centre de loisirs, il reste peu de choses. La ferme a davantage conservée son caractère d'origine. Elle se compose d'une grange et d'un colombier datés du XVIe siècle, d'un pavillon de style Louis XIII et d'une écurie, datés du XVIIe siècle, et de deux bâtiments agricoles du XIXe siècle, dont l'un est accolé au pavillon Louis XIII. La grange construite en moellons, conserve une belle charpente à chevrons, le pigeonnier s'apparente par son architecture à la grange. Éléments protégés MH : la grange et le colombier de la ferme du château : inscription par arrêté du 17 décembre 1999.  Il est de style Renaissance. Sa construction date du XVIe siècle. Il est inscrit aux M.H. en 1999.                                                                                   A cinq K.M.au sud est ,  TOURLY, le château de Tourly est un ancien manoir seigneurial construit au XIIIe siècle, situé près de l'église de style flamboyant. Tour à l'angle nord-est et tourelle à l'angle sud-ouest, sur les contreforts.","habitants":"Famille du Prince de Conti\"","divers":"Château à Chaumont en Vexin             Bois la brosse  grv -7                              Fay grav-4                                                        Jard grav-1                                            Bertichère grav-2-3  GPS : 49° 16' 12\" Nord, 1° 51' 20\" Est                                          Tourly grav-5-6                                            49° 13' 30? nord, 1° 56' 52? est","gps":"49° 16' 12\" Nord, 1° 51' 20\" Est","images":["../../jctruffet.com/image/image_60/60_Chaumont_Vexin_1.jpg","../../jctruffet.com/image/image_60/60_Chaumont_Vexin_2.jpg","../../jctruffet.com/image/image_60/60_Chaumont_Vexin_3.jpg","../../jctruffet.com/image/image_60/60_Chaumont_Vexin_4.jpg","../../jctruffet.com/image/image_60/60_Chaumont_Vexin_5.jpg","../../jctruffet.com/image/image_60/60_Chaumont_Vexin_6.jpg","../../jctruffet.com/image/image_60/60_Chaumont_Vexin_7.jpg"]},"Consult_chateau_formulaire2d3b":{"id":"Consult_chateau_formulaire2d3b","dept":"60","canton":"Compiègne","commune":"Cuise-la-Motte","nom":"Chesnoye","type":"Château","periode":"XVI-XX","histoire":"CHESNOIE, au Moyen-Age, le village de Cuise était un rendez-vous de chasse. Au milieu du XIVe siècle, à la mort de Jean de Cuise, seigneur, son domaine fut partagé entre ses trois enfants. Sa fille, Marie, reçut Genancourt, avec le Val des Bruyères et les bois formant aujourdhui lécart de La Chesnoye. Son neveu, Ferry de Cuise, héritier de sa tante, céda en 1399, au duc de Valois, la part de Marie. Ce dernier en fit présent le 21 septembre 1400 aux Célestins de Saint-Pierre en Châtres. Au XVIe siècle, le fief de La Chesnoye, \"assis entre Neuffontaine et Genencourt, paroisse de Cuyse\" appartient à maître Anthoine Charmolue, chanoine de Noyon,  décède en 1595. La propriété fut acquise en 1879 par Félicité Marie de Frézals de Bourfaut (1821-1907) mariée au comte Pierre Louis Charles Achille de Failly (1810-1892) qui devint sénateur du Second Empire et sa femme, dame d'honneur de l'impératrice Eugénie. Général de division, il avait été envoyé par Napoléon III afin de protéger la Rome pontificale menacée par les partisans de l'unité italienne, il remporta la victoire de Mentana et télégraphia \"Les chassepots ont fait merveille. Ce général fut aussi parmi les vaincus de 1870. Il était domicilié au pavillon de La Chenoye à Cuise La Motte. En 1871, après la guerre Franco-prussienne, il fut reproché au général comte de Failly dêtre resté trop inactif pendant cette guerre. De plus, il fut fait prisonnier à la bataille de Sedan. Rendu à la vie civile, il passa le reste de sa vie entre son château de La Chesnoye, où son hôtel, à Compiègne. Il mourut à Compiègne le 15 novembre 1892, à lâge de 82 ans . Le château primitif possédait une architecture classique française, avant sa reconstruction à la fin XIXe siècle dans ce style anglais que nous lui connaissons aujourdhui.","architecture":"CHESNOYE, le château primitif possédait une architecture classique français, avant sa reconstruction à la fin XIXe siècle dans ce style anglais que nous lui connaissons aujourdhui.  En 1915, la Chesnoye sert dun hôpital militaire. En 1918, en juillet, il est la base du IIIe corps darmée américaine. A partir du 31 juillet, est le Q. G. du 7 corps darmée. Les soldats américains occuperont la propriété jusquen 1919. Pendant la seconde guerre mondiale, il servira encore de quartier général aux armées engagées dans les combats. En mai et juin 1940, le PC du 8ème régiment dartillerie divisionnaire occupe le château, à proximité du P.C. du Colonel Blasselle du 170e R.I. qui est au château de Montauban. Celui-ci devra aussi installer son PC au château de La Chesnoye le 10 juin, avant de devoir se replier dès le 12 juin. Présence dont les habitants des villages ne parlent jamais. En 1946, le château sert encore de base à larmée américaine. Une partie des caves est transformée en \"bar\". Des habitants de Cuise La Motte se souviennent encore des tentes américaines dans la prairie. Le 27 juillet 1950, monsieur le comte Frédéric Pillet-Will fait donation de la propriété  au sanatorium du clergé de France. Après la seconde guerre mondiale, la propriété abrite un séminaire interdiocésain où a enseigné le père Couturier. En 1958, les surs de la sainte croix de Jérusalem installent, dans la propriété, leur établissement scolaire \"La Maison Française\" encor
