t construire le château de Montvillargenne à Gouvieux où la branche dite de Londres de la famille Rothschild possède déjà le château des Fontaines. Il est remplacé par une école des métiers d'arts en 1969. En 1985, le château de Montvillargenne est transformé en hôtel-restaurant qui obtient sa 4ème étoile en 2003                                                                                           La TOUR hôtel du domaine préserve depuis plus dun siècle le charme et la beauté du château de la Tour. Cette bâtisse élégante\n dirigé par monsieur de Clairval .","architecture":"MONTVILLARGENNE, cest en 1900 que la baronne Jeanne de Rothschild entreprit de faire bâtir le château par larchitecte Chatenay, formé à lécole des Beaux-Arts par Honoré Daumet, larchitecte du château de Chantilly. Le château de Montvillargenne pour lamateur de classicisme est un peu déroutant, en effet il emprunte aux architectures régionales et étrangères, les colombages normands, les fenêtres britanniques, les toitures wurtembourgeoises ou encore les balcons béarnais. Après la mort de Jeanne de Rothschild en 1929, le château est occupé par les troupes allemandes pendant la deuxième guerre mondiale. En 1945, les religieuses du sacré cur sinstallent et fondent un noviciat. A sa fermeture en 1969, une école aux métiers d'art ouvre ses portes. Cest en 1985 que le château soriente définitivement vers une activité dhôtellerie et de restauration gastronomique traditionnelle.                                                                                                                 PRE -NONETTE,  le manoir et les écuries ont été construits en colombages, dans un style anglo-normand, proche de celui de la « Ferme normande » du domaine des Fontaines. Tous les bâtiments du haras sont construits dans un style normand, avec des colombages. Le haras du Pré Nonette s'inscrit dans un grand parc à l'anglaise, proche de Chantilly.","habitants":"Famille  de Rothschild\"","divers":"Trois châteaux dans cet article , Gouvieux, Montvillargéne  grav 1-2-3-4  , Pré-Nonette,  grav-7                Hôtel Gouvieux GPS : 49° 11' 18\" Nord 2° 25' 01\" Est                                  Pré-Nonette  GPS : 49° 11' 18\" Nord, 2° 25' 01\" Est la tour grav 5-6","gps":"49° 11' 18\" Nord 2° 25' 01\" Est","images":["../../jctruffet.com/image/image_60/60_Gouvieux_1.jpg","../../jctruffet.com/image/image_60/60_Gouvieux_2.jpg","../../jctruffet.com/image/image_60/60_Gouvieux_3.jpg","../../jctruffet.com/image/image_60/60_Gouvieux_4.jpg","../../jctruffet.com/image/image_60/60_Gouvieux_5.jpg","../../jctruffet.com/image/image_60/60_Gouvieux_6.jpg","../../jctruffet.com/image/image_60/60_Gouvieux_7.jpg"]},"Consult_chateau_formulaire1ca6":{"id":"Consult_chateau_formulaire1ca6","dept":"60","canton":"Montataire","commune":"St-Leu d","nom":"Guesdière","type":"Château","periode":"XII","histoire":"GUESDIERE, le château abrite une très belle peinture murale, apelée la fresque Silvie, qu'on suppose être une représentation de Marie-Félicie des Ursins, duchesse de Montmorency, ainsi que la muse de la Guesdière. A l'intérieur, superbe peinture murale  dans le bureau du maire datée du XVIIe siècle et représentant vraissemblablement Marie Félicie des Ursin, épouse du connétable de Montmorency, plus connue sous le nom de \"Sylvie\", égérie des poètes de son époque.   Il se compose d'un jardin d'inspiration à la Française et d'un jardin à l'anglaise, vestige du jardin composé au début du XXe siècle, hôtel de ville.","architecture":"GUESDIERE , le château de la Guesdière doit sa fondation au comte de Clermont, qui le fit construire, en 1176, pour y loger ses hommes d'armes, qui assurait la sécurité des moines du Prieuré. Le château de la Guesdière connut de nombreux agrandissements dont les derniers datent de la fin du XIXe siècle. Il contient la peinture murale \"Marie-Félicie\", situé en contrebas de l'Abbatiale Saint-Nicolas, le parc du château de la Guesdière offre une vue magnifique sur celle-ci. Il est classé aux M.H. C'est devenu la mairie.","habitants":"Famille de Montmorency\"","divers":"a St-Leu d'Esserent le château de la Guesdière                                                                 GPS : 49° 13' 02,97\" Nord, 2° 25' 17,24\" Est","gps":"49° 13' 02,97\" Nord, 2° 25' 17,24\" Est","images":["../../jctruffet.com/image/image_60/60_Guesdi%c3%a8re_1.jpg","../../jctruffet.com/image/image_60/60_Guesdi%c3%a8re_2.jpg","../../jctruffet.com/image/image_60/60_Guesdi%c3%a8re_3.jpg","../../jctruffet.com/image/image_60/60_Guesdi%c3%a8re_4.jpg"]},"Consult_chateau_formulaire5e33":{"id":"Consult_chateau_formulaire5e33","dept":"60","canton":"Mouy","commune":"Hondainville","nom":"Hondainville","type":"Manoir","periode":"XVIII","histoire":"HOUDAINVILLE  dit château vert, édifié en 1780, sur les ruines d'une ancienne construction, par M. Vialart de Saint Morys, il fut partagé en deux lots à la Révolution. Le premier, comprenant le château et le parc, fut vendu par la nation. L'acheteur fit démolir le château et raser le parc. Le second lot revint à M de Saint-Morys fils, qui logea dans les dépendances du château de son père. Sa demeure devint un cabinet des arts, réunissant une nombreuse bibliothèque et la collection la plus considérable qui existat d'objets du moyen-âge.","architecture":"HOUDAINVILLE,  Il fit construire, pour loger toutes ses richesses, une maison dans le style gothique du XVe siècle. Il meurt en duel en juillet 1817 et les choses restèrent dans l'état jusqu'au jour où M. Schillings épousa Mlle de Saint-Morys, et qu'il fit terminer cette construction en y ajoutant tous les agréments qu'elle était susceptible de recevoir. On remarque à l'intérieur, un salon orné de meubles Renaissance. Il est éclairé par des croisées ogivales garnies de curieuses verrières. Dans cette pièce, on voit un miroir de madame Diane de Poitiers, des tableaux du Primatice et un bas relief de Jean Goujon.","habitants":"Famille de M de Saint-Morys\"","divers":"Chaâteau d'Houdainville grav 1-2 et de st Agnan grav 3","gps":"","images":["../../jctruffet.com/image/image_60/60_Hondainville_1.jpg","../../jctruffet.com/image/image_60/60_Hondainville_2.jpg"]},"Consult_chateau_formulairec3da":{"id":"Consult_chateau_formulairec3da","dept":"60","canton":"Chaumont-en-Vexin","commune":"Hénonville","nom":"Hénonville","type":"Château","periode":"XVIII","histoire":"HENONVILLE, château du XIIIe siècle, détruit sous la Jacquerie et reconstruit en 1554. Le château est fait de trois bâtiments en pierre blanche, orné de table en reliefs et de ligne de refend. Le corps de bâtiment central de trois étages a été aménagée en 1722 par François Augier, grand audiencier de France. Il appartint successivement en 1714 à Pierre François Ogier d'Ivry, en 1779 à Jean-Baptiste, Marie Roslin d'Ivry, en 1900 à la famille Bamberger. En 1939, M. Bamberger ruiné vida le château et vendit ses biens. Occupé en 1940 par les allemands, il servit en 1944 de garnison à l'armée Américaine. En 1946 il est utilisé par M. Lejbel pour l'association d'enfants des déportés israélites. En 1952, il appartient à M. et Mme Van Themsche. En 1975, il est racheté par la commune, longtemps inhabité, il est restauré progressivement.\nÉléments protégés MH : les façades et les toitures du château : classement par arrêté du 5 mai 1960.","architecture":"HENONVILLE, un premier château, attesté au XIIIe siècle, fut démoli sous la grande jacquerie et reconstruit en 1554. Il fut rebâti en 1722. Les fondations sont en grande partie celles du château d'origine, et l'on trouve au second étage, derrière des boiseries, des vestiges d'une tour médiévale.  Le fronton central porte une couronne comtale avec un écusson qui est celui de Roslin d'Ivry \"fait baron d'Empire en 1808\", il a été sculpté par Cantrel en 1811. Sur une des tours, à l'arrière du château, un cadran solaire porte la date 1580. Les tours d'angle sont de construction plus récentes, les tours paraissent ajourées de nombreuses fenêtres, une partie est simulée en trompe-l'oeil. Le château d'Hénonville fut modernisé entre 1765 et 1771 par l'architecte parisien Jean Benoît Vincent Barré pour Jean-Marie Roslin d'Ivry, qui fut l'un des premiers collectionneurs de Fragonard. Barré conserva les 4 tours d'angle, comme l'avait fait Germain Boffrand au château d'Haroué en Lorraine. Roslin d'Ivry avait décoré son château de toiles de François Boucher comme Les lavandières (New-York, Metropolitan Museum of Art). Celle-ci a fait entreprendre la restauration du château d'Hénonville, en 1978.","habitants":"Famille de Pierre-François Ogier\"","divers":"Château d'Hénonville                                  GPS : 49° 12' 23\" Nord, 2° 03' 12\" Est","gps":"49° 12' 23\" Nord, 2° 03' 12\" Est","images":["../../jctruffet.com/image/image_60/60_H%c3%a9nonville_1.jpg","../../jctruffet.com/image/image_60/60_H%c3%a9nonville_2.jpg","../../jctruffet.com/image/image_60/60_H%c3%a9nonville_3.jpg"]},"Consult_chateau_formulairecfe6":{"id":"Consult_chateau_formulairecfe6","dept":"60","canton":"Chantilly","commune":"Lamorlaye","nom":"Lamorlaye","type":"Château","periode":"XIII-XIX","histoire":"LAMORLAYE, le domaine appartint à la Couronne jusqu'au XIIIe siècle, époque à laquelle Louis VIII le vendit à sa cousine, la comtesse de Ponthieu, qui y fit construire un château. Au XIXe siècle, les envahisseurs prussiens le détruisent, pour le remplacer par un nouveau château construit en 1838. Il est racheté en 1872 par le comte Vigier et Ernest Sanson, architecte, est chargé de la direction des travaux de restauration et ajoute le pavillon d'angle occidental, côté étang, abritant un hall et un grand escalier. Pendant la première guerre mondiale, le château est le siège de l'état-major du général Duportal et de la Kommandantur sous l'occupation. Ensuite s'est installé l'institut biblique européen en 1960. Ses deux tours dangle au profil élancé témoignent d'un riche passé, tour à tour forteresse moyenâgeuse et palais Renaissance.","architecture":"LAMORLAYE  sa construction date de 1880. Le premier château a été bâti au XIIIe siècle. Ruiné durant la guerre de cent ans, il sera restauré et entre dans la possession du Grand Condé. Il le revendra ou il restera jusqu'en 1838, en dépit de la Révolution. Le maire de Gouvieux le comte Vigier et Ernest Sanson, le fait reconstruit entièrement sous la Restauration après les dégradations commises par les Prussiens. En 1838, l'ingénieur Alexandre Gérard le rachète et fait construire l'entrée actuelle. Claude Coin, proche de Napoléon III, lui succèdera en 1854 et fera appel au paysagiste Louis-Sulpice Varé pour la création du Jardin anglais. Le domaine représentait à cette époque 87 ha. Il est racheté en 1872 par le comte Vigier, ami du duc d'Aumale. En 1880, l'architecte Ernest Sanson est chargé de la direction des travaux de restauration. Il fera rajouter le pavillon d'angle occidental, côté étang, qui abrite un hall et un grand escalier. Pendant la première guerre mondiale, le château de Lamorlaye devient le siège de l'état-major du général Duportal, et d'une kommandantur sous l'occupation. En 1960, une association américaine \"L'institut biblique européen\" s'y installe. Le château possède aussi une ancienne orangerie aux fenêtres murées, au nord de la cour d'honneur. Depuis 2005, il a été racheté par la commune mais il reste sans usage particulier, est entouré d'un petit parc à l'anglaise, il ne peut être visité avec son parc, planté dessences rares, invite à la flânerie.","habitants":"le comte Vigier et Ernest Sanson\"","divers":"Château de Lamorlaye à Lamorlaye        GPS : 49° 09' 20\" Nord, 2° 26' 30\" Est                                                                     photo de Webtournaire.com","gps":"49° 09' 20\" Nord, 2° 26' 30\" Est","images":["../../jctruffet.com/image/image_60/60_Lamorlaye_1.jpg","../../jctruffet.com/image/image_60/60_Lamorlaye_2.jpg"]},"Consult_chateau_formulaire9ee9":{"id":"Consult_chateau_formulaire9ee9","dept":"60","canton":"Chaumont-en-Vexin","commune":"Lattainville","nom":"Lattainville","type":"Château","periode":"XIX","histoire":"LATTAINVILLE, achevé vers 1901, le château appartenait à madame Hénon, épouse d'un négociant en tissus parisien. Bien qu'endommagé par les combats de la seconde guerre mondiale, il est encore habité de nos jours.","architecture":"LATTAINVILLE, le château, pastiche néo-gothique, fut construit au XIXe siècle, bâti en ciment armé, matériau nouveau pour l'époque, il est l'oeuvre de la famille Pauchot. En 1919, bardés de titres d'ingénieurs un peu usurpés, ils fondent la société des constructions en fer-béton et pierre armée Pauchot. On peut légitimement se demander quels excentriques fortunés avaient choisi de vivre dans ces fausses ruines qui étaient, à l'origine, parfaitement habitables. Certains éléments architecturaux de Lattainville tirent leur inspiration des châteaux de Pierrefonds (escalier d'honneur) ou de Lavardin et l'ensemble, si l'on excepte quelques maladresses, donne un néogothique flamboyant très vraisemblable, l'effet de ruines est bien rendu par des larmiers brisés ou l'imitation de maladie de la pierre et de l'usure du temps.","habitants":"Famille de Madame Hénon\"","divers":"Château de Lattainville","gps":"","images":["../../jctruffet.com/image/image_60/60_Lattainville_1.jpg","../../jctruffet.com/image/image_60/60_Lattainville_2.jpg"]},"Consult_chateau_formulaire8b7a":{"id":"Consult_chateau_formulaire8b7a","dept":"60","canton":"Chantilly","commune":"ST-Maximin","nom":"Laversine","type":"Château","periode":"XIX","histoire":"LAVERSINE, à l'origine fief dépendant de l'Abbaye de Royaumont en 1166, le manoir de Laversine servit de relais de chasse au Roi Henri II. Sous la renaissance, il évolue en résidence de campagne, mais connait surtout son heure de gloire grâce au comte et à la comtesse de Suze, héritiers d'une riche lignée portuguaise et fidèle compagnon du roi François Ier. Celui-ci vint au moins deux fois à Laversine, on dit même que le château de Laversine aurait été financé par le Roi (une Salamandre à la porte dentrée) et quau frontispice, il aurait fait inscrire la phrase pleine de sous entendus \"tout à la fin Suze\". De 1771 à 1782 le château est laissé à l'abandon puis démantelé. En 1882, le baron de Rotschild fait construire un nouveau château par l'architecte Aldrophe. En 1918, le château sert d'hôpital militaire et accueille l'état major allemand chargé de construire des V1 dans les carrières environnantes. Le baron de Rothschild  lègue le bâtiment à l'état qui devient le lycée professionnel. Le château et le parc ne sont pas visitables mais ce dernier est ouvert lors des semaines régionales de l'environnement. De 1951 à 19933,4, Shatta Simon et Bouli Simon dirigent la maison d'enfants située au château de Laversine.\nUne formation professionnelle est donnée dans cette institution.","architecture":"LAVERSINE; l'actuel château a été construit par Alfred-Philibert Aldrophe (1834-1895), architecte de la ville de Paris. Il est bâti en pierre tirée des carrières de Saint-Maximin, qui appartiennent aussi au baron Gustave de Rothschild, sur le bord du plateau, avant la paroi rocheuse, face à l'ample paysage de la vallée de l'Oise. Son style est très librement inspiré de François Mansart. Devant l'entrée, sont placés deux groupes animaliers en marbre sculptés par Georges Gardet.  La baronne de Rothschild et ses trois filles reçoivent beaucoup à Paris, à l'hôtel de l'avenue de Marigny, comme à Laversine, pendant que le baron et ses deux frères dirigent ensemble la banque de la rue Laffitte. Robert de Rothschild hérite du domaine en 1912 et accueille les soldats blessés convalescents pendant la grande guerre. Entre les deux guerres, le domaine est surtout réservé aux chasses à courre auxquelles sont conviés parents et amis de la famille de Rothschild. Siège du commandement allemand des unités chargées de la construction des V1 dans les carrières voisines de 1940 à 1944, le château abrite ensuite des unités américaines en 1944 / 1945. Mis à sac à la Libération et délaissé, il est remis à une fondation à la mort de Robert de Rothschild en 1949 à charge d'héberger et de former les enfants orphelins de la Shoah. Collège d'enseignement professionnel, puis lycée d'enseignement professionnel et enfin lycée professionnel, il est depuis les lois de décentralisation, propriété du conseil régional de Picardie et abrite le LP « Donation-de Rothschild .","habitants":"baron de Rothschild \"","divers":"château de Laversine a ST-Maximin","gps":"","images":["../../jctruffet.com/image/image_60/60_Laversine_1.jpg","../../jctruffet.com/image/image_60/60_Laversine_2.jpg","../../jctruffet.com/image/image_60/60_Laversine_3.jpg"]},"Consult_chateau_formulairecd4a":{"id":"Consult_chateau_formulairecd4a","dept":"60","canton":"Chaumont-en-Vexin","commune":"Lavilletertre","nom":"Lavilletertre","type":"Château","periode":"XVII","histoire":"SAINT-CYR, le château appartenait avant la Révolution à M. de Saint-Soupplet qui périt sur l'échafaud. Il passa à la famille de Sesmaisons pendant plus d'un siècle avant de devenir propriété de M. Rossignol.\nÉléments protégés MH : les façades et les toitures du château et des communs, la cour d'honneur avec le portail d'entrée : inscription par arrêté du 26 septembre 1969.","architecture":"SAINT-CYR, un premier château-fort est incendié par un duc de Normandie, puis reconstruit et à nouveau rasé par les troupes de Henri IV. A côté de ses ruines, un troisième château est élevé à la fin du XVIe siècle. Château terminé au XVIIe avec communs, chapelle, cour d'honneur, douves et parc. Corps de logis central à trois étages dont le supérieur est mansardé, deux pavillons prolongés par deux ailes. La grille d'honneur date du temps de Louis XV. Deux licornes entourent les armes des Saint-Soupplet sur la grille en fer forgé du XVIIIe siècle. Dans le parc, donjon d'une forteresse démantelée par Charles V, rare survivance de l'architecture militaire romane.","habitants":"famille dela comtesse de  Sesmaisons\"","divers":"Château de St cyr  à lavilletertre     49° 11' 48? nord, 1° 55' 49? est                                                                     GPS : 49° 10' 47,28\" Nord, 1° 57' 11,52\" Est                                                          photo de Tournaire.com","gps":"49° 10' 47,28\" Nord, 1° 57' 11,52\" Est","images":["../../jctruffet.com/image/image_60/60_Lavilletertre_1.jpg","../../jctruffet.com/image/image_60/60_Lavilletertre_2.jpg","../../jctruffet.com/image/image_60/60_Lavilletertre_3.jpg"]},"Consult_chateau_formulaire26d0":{"id":"Consult_chateau_formulaire26d0","dept":"60","canton":"Estrées-Saint-Denis","commune":"Longueil Ste- Marie","nom":"Longueil","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article; le Meux et Longueil                                               Le MEUX, en 1156, le village portait le nom latin dUlmeus, qui sest transformé à plusieurs reprises; en 1256 Ommeus le Val, en 1308 Le Meus et en 1480 Domeux, pour prendre de nos jours le nom de Le Meux. Au XIIIe siècle construction  d'un château féodal. En 1429, le château féodal du Meux est détruit sur ordre de Charles VII. C'est en 1637 que le château actuel est construit. L'édifice brique et Pierre, commencé par Jean de Rouville au XVIIe siècle, et dont on dit que les jardins sont de André Le Nôtre, est un bel exemple de construction de style Louis XV. Éléments protégés MH : les façades et les toitures, ainsi que le portail d'entrée et l'escalier intérieur : inscription par arrêté du 17 mai 1977.  Les différents propriétaires furent : Louis Marie de Rouville (à partir de 1708), le comte de la Mothe-Haudancourt (1720), Jacques-François de Maleissye (1738), C-F Laurès (1747), M. Viat (1791), Sophie Viat (1804), filles de Sophie Viat (1830), Jeanne-Valérie Poulain de la Bigne (1875), comtesse d'Evry (1908), Hector Sirot (1942), propriétaire actuel (1976).","architecture":"LONGUEIL,  c'est un manoir qui possède une porte fortifiée datant du XVIe siècle. Il se situe à côté du portail de l'église, place Charles-de-Gaulle. il  est inscrit aux M.H. depuis 1949. La porte et certains éléments du manoir proviennent de l'ancien château de Longueil, dont les fortifications furent démolies, en grande partie, en 1750, quand le château devint une ferme. Des ruines importantes de bâtiments non concernés par cette transformation subsistent encore au XIXe siècle, dont de hauts murs décorés de sculptures et la base d'un donjon, ainsi que les traces des fossés d'enceinte. Le château de Longueil est un lieu hautement symbolique pour l'histoire de la région. Propriété de l'abbaye Saint-Corneille de Compiègne, il occupe un emplacement stratégique et joue un rôle important dans la guerre de cent Ans. En 1358, quand les Anglais habitèrent le château de Creil qu'ils utilisent comme base militaire pour la conquête de la région. Une garnison de 200 soldats est stationnée à Longueil, commandée par le capitaine Guillaume Allaud qui choisit le Grand Ferré, comme Lieutenant. Son implication est décisive pour la défense du village et du château, en dépit de l'avantage des Anglais quant au nombre et à l'armement. Les habitants participèrent activement à la défense, craignant qu'une fois le château de Longueil-Sainte-Marie occupé, il ne soit difficile de renvoyer l'adversaire, hors de France. Le château de Longueil-Sainte-Marie sera occupé, 2 fois, par les Anglais, vers 1420-1429 et pendant le siège de Compiègne, au printemps de 1430. Ces occupations ne furent possibles qu'avec une population et une garnison se soumettant, sans résistance à l'envahisseur, ayant épuisé les ressources, ne croyant plus que le roi de France saura réinstaurer son pouvoir. Le manoir de Longueil-Sainte-Marie et la porte du XVIe siècle se situent à côté de l'église.","habitants":"Meux; Famille de Jean de Rouville \"","divers":"Longueil Ste- Marie, château de Longueil et de Meux                                    GPS : 49° 21' 27\" Nord, 2° 43' 07\" Est                                                               Meux grav-3 GPS : 49° 21' 57\" Nord, 2° 44' 47\" Est","gps":"49° 21' 27\" Nord, 2° 43' 07\" Est","images":["../../jctruffet.com/image/image_60/60_Longueil_1.jpg","../../jctruffet.com/image/image_60/60_Longueil_2.jpg","../../jctruffet.com/image/image_60/60_Longueil_3.jpg"]},"Consult_chateau_formulaire6364":{"id":"Consult_chateau_formulaire6364","dept":"60","canton":"Estrées-Saint-Denis","commune":"Maignelay-Montigny","nom":"Maignelay","type":"Château","periode":"XVI-XIX","histoire":"MAIGNELAY,  de la forteresse médiévale, sont conservées une tour circulaire, accompagnée du fossé partiellement remblayé et une partie de l'enceinte. Ce vestige du rempart est construit en moellons de grès pour les fondations, calcaire pour la partie supérieure et brique pour les réfections du XIXe siècle. Il correspond à l'architecture militaire classique des XIIIe-XIVe siècles. Il sert ensuite de mur de clôture au château, et sans doute de soubassement au nouvel édifice. Le château actuel comprend un corps de logis central, brique et pierre de style Renaissance, du début XVIe siècle, et deux ailes de quatre étages édifiées au XIXe siècle.","architecture":"Éléments protégés MH : les vestiges du rempart médiéval (la muraille, la tour ronde, le fossé et la contrescarpe situés sur une partie de la place en herbe appartenant au domaine public : inscription par arrêté du 20 avril 2004.","habitants":"Seigneur local\"","divers":"a  Maignelay-Montigny  château de Maignelay","gps":"","images":["../../jctruffet.com/image/image_60/60_Maignelay_1.jpg"]},"Consult_chateau_formulaire1950":{"id":"Consult_chateau_formulaire1950","dept":"60","canton":"Grandvilliers","commune":"Villers-Vermont","nom":"Mercastel","type":"Château","periode":"XVIII","histoire":"MERCASTEL, c'est à Marie-Renée de la Barberie, dernière représentante de la branche aînée des Mercastel, que l'on doit la construction du château actuel, menée à partir de 1758 sur les plans de l'architecte Fontaine. Le château de Mercastel a appartenu, par héritage, jusqu'en 1970, à la famille de Polignac. Le château du Mercastel fut ruiné, à la fin de l'époque Médiévale, son logis disparut. Seules, les dépendances subsistent encore et présentent du côté extérieur, des murs en moellons, dont le caractère défensif, fut renforcé, par la présence de pavillons saillants permettant de couvrir les approches. .Éléments protégés MH : les façades et les toitures du château et des communs ; le portail d'entrée de la cour d'honneur ; les douves et les clôtures du jardin ; la chapelle : inscription par arrêté du 8 décembre 1966.","architecture":"MERCASTEL, probablement ruiné dès la fin de l'époque médiévale, le logis a disparu, mais les dépendances qui subsistent présentent du côté extérieur des murs en moellons dont le caractère, visiblement défensif, est renforcé par la présence de pavillons saillants permettant de couvrir les approches. cette demeure aux lignes sobres, alliant simplicité et équilibre, confort et élégance, évoque parfaitement l'art de vivre à la campagne à la fin de l'époque Louis XV.  couverte de combles à pente modérée, elle présente des façades en moellons enduits, rehaussés de cordons et d'encadrement de briques, la pierre se limitant aux clés des baies et aux chaînes d'angle. La distribution intérieure n'a pas subi de modifications majeures depuis la construction, si l'on en juge par l'inventaire révolutionnaire. Du côté du parc, un perron central, doté d'une balustrade Louis XVI en fer forgé, permet de descendre sur la terrasse gazonnée qui commande un vaste paysage. Le château de Mercastel avec ses lignes sobres, allie, aujourd'hui, la simplicité et l'équilibre, le confort et l'élégance. Il évoque remarquablement l'art de vivre à la campagne, à la fin de l'époque Louis XV.","habitants":"Famille de Polignac\"","divers":"a Villers-Vermont le château de Mercastel GPS : 49° 34' 39\" Nord, 1° 44' 41\" Est","gps":"49° 34' 39\" Nord, 1° 44' 41\" Est","images":["../../jctruffet.com/image/image_60/60_Mercastel_1.jpg"]},"Consult_chateau_formulaire68bf":{"id":"Consult_chateau_formulaire68bf","dept":"60","canton":"Beauvais","commune":"Warluis","nom":"Merlemont","type":"Château","periode":"XIII-XVII","histoire":"MERLEMONT, les traces de vie au château commence vers le XIIe siècle, avec Roscelin de Merlemont, premier seigneur recensé, qui occupe une résidence dite \"Vieux Castel\". Puis, devenue propriété au XVe siècle de Pierre de Turgis, seigneur dAllonne, Laversines, Noailles, Saint Sulpice, Fouquerolles, le domaine est transmis par mariage à son gendre Louis des Courtils, seigneur de Grémévilliers et du Frestoy près de Songeons. Il appartient depuis, tout comme les bois et terres attenantes, à la même famille.\nLe château actuel, construit sur des bases qui remontent au XIIIe siècle, a pris sa forme définitive au XVIIe siècle. Bien situé au-dessus de la vallée du Thérain, le site avait pris une certaine notoriété au moment des guerres de religion, qui ont beaucoup fait parler d'elles dans le Beauvaisis au XVIe siècle suite à l'abjuration contre le Catholicisme, sur le domaine, de Jean des Courtils puis du cardinal Odet de Châtillon, Évêque de Beauvais, le plus célèbre prélat français de la Renaissance. Le château a été la proie des flammes vers 1736, a été reconstruit avec grandeur jusqu'au XVIIIe siècle. Il s'est agrandi au XIXe, flanqué d'une aile en brique et pierre côté Est. Puis il fut de nouveau très abîmé par les bombardements à la fin de la seconde guerre mondiale en 1944 (du 25 et 27 juin, au   5 juillet), la propriété étant occupée par les forces opposantes. En 1965 sont effectués de gros travaux de conservation sur les parties les plus anciennes \"rescapées\" des obus. Sa toiture d'ardoise établie à la Mansard, accuse encore la noblesse de la façade d'arrivée, néoclassique.","architecture":"MERLEMONT, les proportions sont gardées, élevé sur rez-de-chaussée et étage. En 1979 Le château est classé en partie à l'inventaire supplémentaire des monuments historiques. En 2020 un arrêté complémentaire de protection ISMH a été délivré portant sur les abords du château, du Lavoir et du Séchoir. Depuis 1995, des programmes de travaux de conservation, d'aménagement et de réhabilitation sont chaque année engagés pour redonner vie au domaine:  2000/2008: remise en forme progressive de lenvironnement naturel, à proximité du bâti, pour enlever les mauvais souvenirs de l'histoire, (96 bombes tombées sur 1km) et redonner le caractère à la fois noble et pittoresque au château, 2010/2012 : lancement de l'étude préalable à la réhabilitation complète du château, avec le concours financier de la DRAC et du conseil général de Picardie. Première ouverture en 2010 des extérieurs aux Journées européennes du patrimoine, 2011/2012, dégagement et mise en valeur du mur de soutènement du château. En 2013 aménagement et entretien du site pour sa première saison d'ouverture des extérieurs à la visite. En 2014/2015, grand travaux d'entretien du mur de soutènement du château. 2016/2022 études fluides et restauration des flancs nord et sud. Le château de Merlemont de style Renaissance.\nÉléments protégés MH : le pignon nord avec ses deux tourelles en encorbellement ; la tourelle du sud-ouest ; la salle voûtée en sous-sol : inscription par arrêté du 9 octobre 1979.","habitants":"Seigneurs locaux\"","divers":"A Warluis le château de Merlemont GPS : 49° 23' 20\" Nord, 2° 08' 30\" Est","gps":"49° 23' 20\" Nord, 2° 08' 30\" Est","images":["../../jctruffet.com/image/image_60/60_Merlemont_1.jpg","../../jctruffet.com/image/image_60/60_Merlemont_2.jpg"]},"Consult_chateau_formulairebe27":{"id":"Consult_chateau_formulairebe27","dept":"60","canton":"Chantilly","commune":"Mesnil en Thelle","nom":"Mesnil_en_Thelle","type":"Châzteau","periode":"XVI-XVIII-XX","histoire":"Deux châteaux dans cet article, le Mesnil et  Lamberval.                  MESNIL en THELLE, le Mesnil fut longtemps compris dans le comté de Beaumont-sur-Oise et dans la baronnie de Persan. Alors appelé Mesnil-Les-Beaumont, les terres furent acquises en 1489 par Charles de la Rivière, seigneur du Colombier de Persan. Nous ne possédons pas d'historique sur ce château. Il est à noter que l'église est classée MH par arrêté du 28 juillet 1966. Le grand choeur-halle à chevet plat appartient à la typologie du XIIIe siècle. Après les destructions dues à la guerre de cent ans, l'édifice est reconstruit à partir de 1500 (bas-côtés, voûtes, clocher latéral). Au XXe siècle, des reconstructions sont réalisées au titre des dommages de la guerre de 1940.","architecture":"A cinq  K.M. au  nord au Fresnoy sur Thelle,  LAMBERVAL  Le lieu-dit \"Lamberval\" existe depuis l'an 1000. Depuis cette époque, trois constructions se sont succédées, un château-fort, un château Renaissance puis la demeure actuelle au début du XIXe siècle. Celle ci se caractérise par une architecture épurée avec un corps de bâtiment principal en pierres et briques datant de 1823 et de deux tourelles construites en 1854. Le château est entouré d'un parc dont les arbres sont centenaires. Propriété de la famille Lamoureux depuis 1936, les propriétaires actuels sont la troisième génération.","habitants":"Seigneurs locaux\"","divers":"Deux châteaux dans cet article de Mesnil en Thelle, le Mesnil grav 1-2 et  Lamberval grav-3.","gps":"","images":["../../jctruffet.com/image/image_60/60_Mesnil_en_Thelle_1.jpg","../../jctruffet.com/image/image_60/60_Mesnil_en_Thelle_2.jpg","../../jctruffet.com/image/image_60/60_Mesnil_en_Thelle_3.jpg"]},"Consult_chateau_formulairee756":{"id":"Consult_chateau_formulairee756","dept":"60","canton":"Grandvilliers","commune":"Moliens","nom":"Moliens","type":"Manoir","periode":"XIX","histoire":"MOLIENS , La seigneurie.avait le titre de chatellenie. Elle était -partagée entre le commandeur de Saint-Mauvis et le marquis de Sarcus.  Au quinzième siècle, Antoine de Villiers de l'Isle-Adams, père de l'évêque de Beauvais, était seigneur de Moliens qui appartint dans le siècle suivant, à Charles Do seigneur de Franconville-aux-bois.  La terre passa vers 1763 à la maison de Tiercelin avec le marquisat de Sarcus.","architecture":"MOLIENS, la commune, instituée lors de la Révolution française, absorbe celle de La Neuville-lès-Moliens,  par ordonnance royale de décembre 1826.   Château construit en 1890 par le comte d'Audricourt, sénateur de l'Oise, pour l'offrir à sa femme. Saccagé par les Allemands pendant la deuxième guerre mondiale, le château a été entièrement restauré, c'est aujourd'hui une belle bâtisse Anglo-Normande de caractère implanté en plein coeur d'un cocon hermétique de nature de 3 hectares, entouré d'arbres bicentenaires et de salons de jardin de style..","habitants":"Famille du  comte d'Audricourt\"","divers":"Manoir à Moliens à Moliens","gps":"","images":["../../jctruffet.com/image/image_60/60_Moliens_1.jpg","../../jctruffet.com/image/image_60/60_Moliens_2.jpg","../../jctruffet.com/image/image_60/60_Moliens_3.jpg"]},"Consult_chateau_formulairea4d0":{"id":"Consult_chateau_formulairea4d0","dept":"60","canton":"Estrées-Saint-Denis","commune":"Monchy_Humières","nom":"Monchy_Humières","type":"Château","periode":"XVII","histoire":"MONCHY-HUMIERES, au XIXe siècle, le château a appartenu à Clémentine Curial, maîtresse de Stendhal. En 1990, Mme Masako Ohya, veuve d'un ancien ministre japonais a acheté le château. Surnommée la milliardaire rose à cause de ses tenues couleur saumon, elle y a créé un golf.  Madame Masako Ohya, propriétaire du château de Monchy-Humières de 1980 à la fin de 1990 et créatrice du golf, séduite par les lieux et passionnée par ce sport. Disparue en 1999,  ayant une prédilection pour cette couleur. Elle avait toujours sur elle les cendres de son mari dans un sac Chanel. Le dessin initial du parcours a été confié à larchitecte Patrice Simon.","architecture":"MONCHY, un site plein de charme, légèrement vallonné, parcouru d'étangs, de ruisseaux et de plans d'eau creusés à l'époque du roi Soleil est dominé par l'élégante silhouette du château. De plan  rectangulaire à onze travées plus prolongement de pavillons en ailes de deux travées chacun, l'ensemble à deux niveaux avec serie de lucarnes sur combles sur toitures  en croupes recouvert d'ardoises, pavillons d'entré à l'opposé avec avancé du toit sur trois travées soutenu par deux colonness doriques. Vous y trouverez un terrain de golf de 18 trous et un gite de chambres d'hôtes.","habitants":"Famille de  Mme Masako Ohya\"","divers":"Monchy-Humières GPS : 49° 28' 14\" Nord, 2° 45' 10\" Est","gps":"49° 28' 14\" Nord, 2° 45' 10\" Est","images":["../../jctruffet.com/image/image_60/60_Monchy_Humi%c3%a8res_1.jpg","../../jctruffet.com/image/image_60/60_Monchy_Humi%c3%a8res_2.jpg","../../jctruffet.com/image/image_60/60_Monchy_Humi%c3%a8res_3.jpg"]},"Consult_chateau_formulaire6b91":{"id":"Consult_chateau_formulaire6b91","dept":"60","canton":"Nogent-sur-Oise","commune":"Monchy St-Eloi","nom":"Monchy_St_Eloi","type":"Château","periode":"XVII","histoire":"MONCHY, le domaine est saisi, vendu judiciairement et adjugé à Louis Leclerc qui devient seigneur de Monchy, et entreprend la reconstruction du château vers 1620.  Château construit vers 1650 par Antoine Leconte, évêque de Grasse, qui mourut a Monchy en 1683. François Bréhamel, ayant acquis le château en 1726, fit planter entre la rivière et Caucriaumont, le verger que l'on appela plus tard le Quinconce. Pierre Poterat, conseiller du roi, acheta le domaine en 1740. Il fit reconstruire le château accompagné de quatre pavillons carrés remplaçant les tours, le tout entouré de murailles avec fossés remplis des eaux de la Brêche. En 1764, ce fut Nicolas de Guelle qui devint chatelain, puis la famille Percheron, avant le retour des Guelle en 1788. Le domaine appartint à Théophile Deyeux en 1816, fils de Nicolas Deyeux, chimiste, membre de l'institut qui avait présenté à l'empereur en 1811, le 1er pain de sucre de betterave pressée dans les dépendances. Ce furent ensuite les familles Lévêque en 1829, de Poret en 1834, Leboeuf en 1865, Julie Leboeuf connue sous le nom de Marguerite Bellanger, amie de Napoléon. Puis les Misanguy en 1875, Augustin Godillot en 1879, Brabant en 1886, Dailly en 1896. Enfin, la propriété fut vendue en 1963 à l'AFPT  propriété d'une association.","architecture":"MONCHY,  létat actuel du château date de 1852, date à laquelle le comte de Poret fait construire les ailes ainsi que la galerie éclairée par des vitraux de différentes provenances. Il fait également surélever la partie centrale du second étage, afin déquilibrer la perspective du bâtiment. Napoléon III se rendant au château de Compiègne effectue de fréquentes visites à Monchy, où il joue au billard avec son ami le comte de Poret. Le château de Monchy na pas eu de personnalités très marquantes parmi ses nombreux propriétaires. Il doit surtout sa réputation locale à deux dentre eux : Marguerite Bellanger favorite de Napoléon III, qui en eut lusufruit, car cest pour le fils naturel de celle-ci, Charles Lebuf, que Napoléon III achète discrètement le domaine (cet enfant étant probablement son fils). Puis le fameux industriel et affairiste Alexis Godillot célèbre par ses fournitures militaires et en particulier les chaussures auxquelles les soldats donnèrent son nom. En 1896, le château devient la possession de la famille Dailly, qui héberge le célèbre peintre Léon Bonnat, portraitiste officiel de la troisième République, qui meurt au château le 8 septembre 1922. En 1963, le domaine est morcelé par la construction de la nouvelle route nationale. Vingt-neuf hectares sont achetés par l'association pour le développement de la formation professionnelle dans les transports, représenté par son président-délégué général et fondateur Gérard Dupont, afin de créer un centre régional de formation. En 1966, la Brèche est détournée du parc et son lit comblé. Après restauration du château, et agrandissement des bâtiments de lancienne ferme, les premières formations sont dispensées en 1966. De nouveaux bâtiments sont construits dès 1972 afin de répondre à la demande de formations toujours croissante.","habitants":"Famille de Louis Leclerc Famille de Poret\"","divers":"Château de Monchy St-Eloi","gps":"","images":["../../jctruffet.com/image/image_60/60_Monchy_St_Eloi_1.jpg"]},"Consult_chateau_formulaire7858":{"id":"Consult_chateau_formulaire7858","dept":"60","canton":"Senlis","commune":"La Chapelle-en-Serval","nom":"Mont_Royal","type":"Château","periode":"XVI-","histoire":"Trois châteaux dans cet article ; Pontarmé,  Chapelle  et Mont-Royal.                                                                                                                                                                          MONT-ROYAL,  l'architecte est Guillaume Tronchet pour le compositeur Fernand Halphen ce dernier choisit pour son nouveau château une butte au sein de la « garenne de La Chapelle », forêt appartenant au domaine du vieux château , que son père Georges Halphen avait déjà acquis en 1882. Après avoir rejeté le projet de style anglo-normand de l'architecte René Sergent, puis un premier projet de style médiéval, le commanditaire fixa son choix sur le second projet de Guillaume Tronchet. Sa construction a débuté en 1907 et s'est achevée en 1911 dans la première guerre mondiale.   Fernand Halphen fit bâtir, sur les plans de l'architecte Guillaume Tronchet, ce château de style Louis XVI. Fernand Halphen ne put en profiter très longtemps, car il fut mobilisé en 1914 et tomba au front en 1917, sa veuve, Alice Koenigswarter créa la \"fondation Halphen\" destinée à aider les élèves de composition musicale du conservatoire en faisant exécuter leurs uvres. Pendant la deuxième guerre mondiale, le château a été vidé de son mobilier et vandalisé.  En 1989, J.P. Hermier l'achète aux descendants de Fernand Halphen et le transforme en hôtel, qui ouvre ses portes en 1990. En juin 1992, le groupe des hôtels Concorde acquiert l'ensemble de la propriété. Son propriétaire actuel est monsieur Robin   qui en a fait un hôtel prestigieux.","architecture":"CHAPELLE en Serval  Sous le Second Empire, le domaine est racheté pa Frédéric Sargenton, agent de change à Paris, puis par Edmond Blanc en 1877. Préférant s'installer à Saint-Cloud, Blanc revend le château, en 1882, à Georges Halphen, négociant de diamants à Paris. Le « Vieux-Château » ne suffit bientôt plus à son fils Fernand Halphen, qui décida au début du XXe siècle, de se faire construire un nouveau château, au sein du domaine familial, Le « Vieux-Château » a été subdivisé en appartements plus récemment.                                                                                                                                                         à cinq K.M au nord PONTARME,  fut reconstruit au premier quart du XVIe siècle, comporte plusieurs bâtiments ordonnés autour d'une cour rectangulaire, seulement, deux bâtiments présentent un intérêt archéologique et historique : la porte fortifiée partiellement médiévale à l'ouest et le logis Renaissance, sur toute la longueur du côté Est, partiellement à étage. L'aile basse fait suite à la porte fortifiée au Nord, le bâtiment en retour d'équerre ne datent que du XXe siècle. L'autre aile basse faisant suite à la porte fortifiée au sud et le bâtiment fermant la cour côté Sud ont perdu leur identité suite aux remaniements successifs. Ses premiers propriétaires furent Bouteiller de Senlis, Bertrand et Valentine Lorfèvre. Avec la Révolution, le logis du château servit de bâtiment d'exploitation, à la ferme que le château était devenu, depuis longtemps, et ce n'est qu'à partir de 1910, que le château fut successivement reconstitué, dans son apparence du XVIe siècle, avec toutefois quelques compromis. Le château de Pontarmé avec ses façades et toitures de la porte fortifiée, son pont sur les douves.","habitants":"Chapelle  et mont royal Georges Halphen et Fernand Halphen\"","divers":"Trois châteaux dans cet article ; Pontarmé grav 3-4-5, Chapelle  grav-6     et Mont-Royal grav -1-2                             Mont -Royal  GPS : 49° 07' 34\" Nord, 2° 32' 58\" Est                                                               Pontarmé GPS : 49° 9' 20,16\" Nord, 2° 32' 55,68\" Est                                                       La Chapelle GPS : 49° 07' 42\" Nord, 2° 32' 07\" Est","gps":"49° 07' 34\" Nord, 2° 32' 58\" Est","images":["../../jctruffet.com/image/image_60/60_Mont_Royal_1.jpg","../../jctruffet.com/image/image_60/60_Mont_Royal_2.jpg","../../jctruffet.com/image/image_60/60_Mont_Royal_3.jpg","../../jctruffet.com/image/image_60/60_Mont_Royal_4.jpg","../../jctruffet.com/image/image_60/60_Mont_Royal_5.jpg","../../jctruffet.com/image/image_60/60_Mont_Royal_6.jpg"]},"Consult_chateau_formulaireeb01":{"id":"Consult_chateau_formulaireeb01","dept":"60","canton":"Montataire","commune":"Montataire","nom":"Montataire","type":"","periode":"XVIII-XIX","histoire":"Trois châteaux dans cet article, Montataire, Laversine et Khardys. MONTATAIRE,  Hugues de Clermont est à l'origine du premier château bâti au XIe siècle, il n'en reste qu'une chapelle romane. Un siècle plus tard, son fils Renaud II le fit fortifier à la demande de Louis VI Le Gros. Il fut pourvu d'un donjon, de quatre tours rondes, et d'une enceinte de murailles crénelées. Un peu plus tard une seconde enceinte fut construite en contre bas. Une partie du donjon et deux tours existent encore aujourd'hui. Après les Clermont, il échut aux La Tournelle. Puis ce fut la famille de Hardencourt qui posséda Montataire. Ils subirent la Jacquerie. Au XVe siècle le château est en ruines, détruit par la guerre de cent ans et la Jacquerie. C'est les Lespard de Madaillan qui en deviennent propriétaires, le restaure et l'embellisse pendant trois siècles. Henri IV viendra souvent rendre visite à son ami, Jean de Mardaillan. Les terrasses crénelées sont remplacées par des toits pointus et des fenêtres sont ouvertes alors le château féodal devient une élégante demeure seigneuriale. La Révolution ne fit pas de dommages particuliers, à l'exception du propriétaire M. de Lorbehaye qui se ruina. En 1846, le baron Georges-Ferdinand-Emile de Condé achète le château et le restaure. Il deviendra, de 1870 à 1879, maire de la ville et conseiller général du canton de Creil. Son héritier Alfred Dunbar Schultze en fut le dernier propriétaire jusqu'à sa mort en 1943. Il appartient à la société Sollac qui cherche à le revendre depuis 2010. ( propriété d' Usinor).","architecture":"Au sud de Mantataire St Maximin le château de Laversine                             LAVERSINE, le manoir de la Versine servit de relais de chasse au Roi Henri II. Sous la renaissance, il évolue en résidence de campagne, mais connait surtout son heure de gloire grâce au comte et à la comtesse de Suze, héritiers d'une riche lignée portuguaise et fidèle compagnon du roi François Ier. Celui-ci vint au moins deux fois à Laversine, on dit même que le château de Laversine aurait été financé par le Roi (une Salamandre à la porte dentrée) et quau frontispice, il aurait fait inscrire la phrase pleine de sous entendus \"tout à la fin Suze\". De 1771 à 1782 le château est laissé à l'abandon puis démantelé. En 1882, le Baron de Rotschild fait construire un nouveau château par l'architecte Aldrophe. En 1918, le château sert d'hôpital militaire et accueille l'état major allemand chargé de construire des V1 dans les carrières environnantes. Le baron de Rothschild lègue le bâtiment à l'état qui devient le lycée professionnel. Le château et le parc ne sont pas visitables mais ce dernier est ouvert lors des Semaines Régionales de l'Environnement.","habitants":"Mandataire, famille de Hardencourt                       Laversine,le Baron de Rotschild\"","divers":"Trois châteaux dans cet article, Montataire, Laversine grav-1-2   et Khardys grav -3                                            GPS : 49° 15' 22\" Nord, 2° 26' 21\" Est","gps":"49° 15' 22\" Nord, 2° 26' 21\" Est","images":["../../jctruffet.com/image/image_60/60_Montataire_1.jpg","../../jctruffet.com/image/image_60/60_Montataire_2.jpg","../../jctruffet.com/image/image_60/60_Montataire_3.jpg"]},"Consult_chateau_formulaire0299":{"id":"Consult_chateau_formulaire0299","dept":"60","canton":"Chaumont-en-Vexin","commune":"Montherland","nom":"Montherland","type":"Château","periode":"XVIII","histoire":"MONTHERLAND  Henri Millon de Montherlant, écrivain célèbre, tient son nom de la seigneurie de Montherlant, achetée en 1755 par Antoine Millon, son lointain ancêtre qui mourut au château de Montherlant en 1777. L'édifice qui n'appartient plus à la famille depuis 1852 a marqué la jeunesse de l'écrivain.","architecture":"MONTHERLAND, près de l'église, dans un parc à la végétation dense se dresse le château construit au début du XVIIIe siècle en brique et relevé de pierres blanches sculptées. Château sans doute bâti sur la base d'un château plus ancien. Un mur en silex entoure le domaine, a l'intérieur, lambris du XVIIIe siècle. Parc, jardin et potager complètent la demeure.  L'édifice a été construit en briques et en pierre, et se compose d'un corps de logis principal, de 2 ailes latérales complétées par 2 autres ailes en retour d'équerre. A l'intérieur, se trouve des lambris du XVIIIe siècle. Un Parc, un jardin et un potager complètent le château de Montherlant. Éléments protégés MH : le château, comprenant également son parc et jardin : inscription par arrêté du 17 mars 2003.","habitants":"Henri Millon de Montherlant, \"","divers":"Châteazu de  Montherland                     GPS : 49° 16' 41\" Nord 2° 02' 57\" Est","gps":"49° 16' 41\" Nord 2° 02' 57\" Est","images":["../../jctruffet.com/image/image_60/60_Montherland_1.jpg"]},"Consult_chateau_formulaired732":{"id":"Consult_chateau_formulaired732","dept":"60","canton":"Senlis","commune":"Montlévêque_Senlis","nom":"Montlévêque","type":"Château","periode":"XV-XVI-XIX","histoire":"MONTLEVEQUE,  à l'emplacement où se seraient rencontrés les messagers annonçant la victoire de Bouvines et celle de la Roche-aux-Moines, vue du Mont-l'Évêque, maison de campagne des évêques de Senlis dans le Valois  en 1785, par Tavernier de Jonquières, vu du sud-est. Guérin lance la construction de l'actuelle église Saint Germain dans le village et installe sa résidence de campagne un peu plus au sud. Il s'agissait  d'une fortification dont il reste des traces dans le château actuel. Cette fortification devient la résidence d'été des évêques de Senlis qui l'agrémentent au fil des siècles et y ajoutent diverses dépendances, dont certaines subsistent, tout en asséchant les terres à l'aide de divers ouvrages hydrauliques, permettant leur exploitation (pisciculture, moulins, potagers, etc.).  Gravement endommagé durant la Guerre de Cent Ans, le château a été en grande partie reconstruit au XVIe siècle.\nÀ la suite de la Révolution, le domaine de Mont-l'Évêque devient un bien national pendant quelques années. Le dernier évêque a y avoir vécu est Armand de Roquelaure. Joseph-Xavier de Pontalba acquiert la propriété en 1807. Le château de Mont-l'Evêque appartient à la famille Delfau de Pontalba depuis 1806.","architecture":"MONTLEVEQUE, en effet, c'est en 1214 que Philippe Auguste offre au chancelier Guérin évêque de Senlis, le site de Montleroy, qui prendra par la suite le nom de Montleveque. Il ne cessera d' appartenir aux évêques de Senlis jusqu'à la Révolution. Les bâtiments sont achetés en 1806 par la famille de Pontalba qui lui donne son aménagement actuel cet ensemble se compose de trois bâtiments. La chapelle et le château remontent au XVe siècle. Ils ont été complètement remaniés après 1840 et décorés dans le style troubadour. Le logis du XVIIIe siècle a été construit pour recevoir les services administratifs du diocèse. À partir de 1840, elle fit entièrement remanier les façades du château et sa chapelle, en face, dans un style troubadour. Mont-l'Évêque est considéré comme l'un des rares exemples aboutis de ce style romantique. La structure interne reste cependant celle du XVIe siècle, quand le château a été reconstruit une première fois suite aux destructions du siècle précédent. Le niveau inférieur a conservé ses salles du XIVe siècle. Ces bâtiments s'organisent autour d'un espace central rectangulaire au milieu d'un vaste et remarquable parc, l'histoire de cet ensemble est très liée à celui de l'abbaye de la victoire. Éléments protégés MH : les façades et les toitures du château proprement dit, de l'aile XVIIIe siècle et de la chapelle ; la bibliothèque du château : inscription par arrêté du 28 juin 1989.","habitants":"Famille Delfau de Pontalba \"","divers":"Château de Mont-l'évêque à senlis GPS : 49° 11' 36,96\" Nord, 2° 37' 46,56\" Est","gps":"49° 11' 36,96\" Nord, 2° 37' 46,56\" Est","images":["../../jctruffet.com/image/image_60/60_Montl%c3%a9v%c3%aaque_1.jpg","../../jctruffet.com/image/image_60/60_Montl%c3%a9v%c3%aaque_2.jpg","../../jctruffet.com/image/image_60/60_Montl%c3%a9v%c3%aaque_3.jpg","../../jctruffet.com/image/image_60/60_Montl%c3%a9v%c3%aaque_4.jpg","../../jctruffet.com/image/image_60/60_Montl%c3%a9v%c3%aaque_5.jpg"]},"Consult_chateau_formulairecd03":{"id":"Consult_chateau_formulairecd03","dept":"60","canton":"Pont-Sainte-Maxence","commune":"Montépilloy","nom":"Montépilloy","type":"Vestiges -Château","periode":"XIII-XVI","histoire":"MONTEPILLOY, édifié vers 1150 par Gui IV Le Bouteiller de Senlis, le château domine le comté de Senlis grâce à son formidable donjon, certainement le plus haut du domaine royal capétien à l'époque de sa construction vers 1190. Le château et sa seigneurie ont appartenu à une succession de familles proches des rois de France. A l'origine possession des Le Bouteiller de Senlis, bras armés des premiers capétiens ayant participé aux côtés de Louis VI le Gros à sa lutte contre les seigneurs féodaux rebelles. Les vestiges du château-fort comportent, outre le très haut donjon, une enceinte polygonale dont les douves datent du XIIe siècle, un châtelet d'entrée (du XIIIe siècle, remanié au XIVe siècle, surélevé et transformé au XVIe siècle) dont le pont-levis permet l'accès à une basse-cour. De là, on accède, par un autre pont-levis au réduit fortifié (datant du XVe siècle), constituée par une grande courtine dotée d'un chemin de ronde comportant des mâchicoulis sous les créneaux, reliant la tour maîtresse, elle-même rehaussée d'un niveau, au logis seigneurial et sa tour semi-circulaire.\nÉléments protégés MH : les restes du château de Montépilloy : classement par arrêté du 3 mai 1963.","architecture":"MONTEPILLOY, le château est en ruine depuis la dernière phase de la guerre de cent ans et son enceinte abrite une ferme depuis cette date, aujourd'hui, inexploitée. Ruiné depuis le milieu du XVe siècle environ, ce château remonte au XIIe siècle et a été rebâtie en partie sous Robert de Lorris, seigneur d'Ermenonville, après 1353, et Olivier V de Clisson, après 1389, il servit de point de guet et de défense, notamment pendant les guerres des XIVe et XVe siècles. Son vestige le plus emblématique, car visible de loin grâce à l'implantation du village sur une colline, est la haute épine subsistant du donjon, mesurant 35 m de haut. Se réduisant aujourd'hui à son flanc nord-est, le donjon avait une épaisseur de dix-huit mètres au sol et comportait cinq niveaux et une cave. L'accès se faisait par une passerelle amovible au niveau du premier étage. Les étages, sauf le deuxième, étaient voûtés d'ogives, et deux étages étaient dotés d'une cheminée. Le quatrième étage, rehaussé vers 1409 à  1411, était destiné à l'approvisionnement de projectiles et à la défense, donnant accès à des hourds et au toit, avec mur crénelé et mâchicoulis. Outre le donjon, les ruines du château comprennent le portail dans un châtelet avec deux tours hémi-cylindriques d'une hauteur de 13,6 m, une courtine et des restes de la structure ayant supporté le pont-levis ; une deuxième tour crénelée avec les vestiges du logis du début du XVe siècle ; et une partie de la muraille d'enceinte, au nord. L'ensemble est intégré dans une ancienne ferme qui occupe la totalité du site du château, d'un diamètre de 85 m environ. Les fossés sont en partie comblés.","habitants":"Les Bouteiller de Senlis\"","divers":"Château de Montépiloy                                       GPS : 49° 12' 37,08\" Nord, 2° 41' 58,56\" Est","gps":"49° 12' 37,08\" Nord, 2° 41' 58,56\" Est","images":["../../jctruffet.com/image/image_60/60_Mont%c3%a9pilloy_1.jpg","../../jctruffet.com/image/image_60/60_Mont%c3%a9pilloy_2.jpg","../../jctruffet.com/image/image_60/60_Mont%c3%a9pilloy_3.jpg"]},"Consult_chateau_formulaire8472":{"id":"Consult_chateau_formulaire8472","dept":"60","canton":"Senlis","commune":"Mortefontaine","nom":"Mortefontaine","type":"Château","periode":"XVII-XVIII","histoire":"deux châteaux dans cet article Mortefontaine et Vallière MORTEFONTAINE, la châtellenie de Montmélian, vendue au XIIIe siècle à l'abbaye de Saint-Denis, est achetée par le propriétaire de Mortefontaine en 1599 et érigée en marquisat de Montmélian-Mortefontaine au XVIIe siècle pour la famille le Peletier. Louis Le Peletier, qui reçoit le domaine en héritage en 1770 se fait appeler \"monsieur de Mortefontaine\" et fait traiter le petit parc en jardin anglo-chinois. Le Peletier fait aménager le grand parc. Joseph Bonaparte achète le domaine en 1798. En 1800, on y signe le traité d'amitié entre la France et les États-Unis, dit Traité de Mortefontaine et l'on y négocie les préliminaires de la paix d'Amiens le 25 mars 1802. En 1827, le dernier prince de Condé, père du duc d'Enghien, acquiert Mortefontaine pour la baronne de Feuchères, sa maîtresse qui en hérite à sa mort en 1830. La baronne de Feuchères meurt en 1840 sans postérité directe en léguant Mortefontaine à sa filleule, Sophie Thanaron. En 1894, le parc est vendu à Agénor de Gramont, onzième duc de Gramont et à la duchesse, née Marguerite de Rothschild. Ils font construire le château de Vallière en style néo-gothique et néo-Renaissance. Vers 1928, le château est vendu à la famille de Gramont. Il est cédé par le comte Louis René de Gramont en 1945 à l'ordre des dominicaines qui construisent un couvent dans le parc et ouvrent une école dans le château. Il est à ce jour toujours propriété de ce même ordre.\nÉléments protégés MH : le château en totalité, les deux pavillons d'entrée (façades et toitures) et le parc, y compris la glacière, en totalité : inscription par arrêté du 2 août 2004.","architecture":"VALLIERE,.Joseph Bonaparte acheta le château de Vallière et le domaine de Mortefontaine, en 1798. Il fut signé en 1800, le traité d'Amitié entre la France et les États-Unis d'Amérique dit traité de Mortefontaine et on y célébra les mariages de Caroline et Pauline Bonaparte.  Il date du XIXe siècle. En 1827, le dernier prince de Condé, père du duc d'Enghien, racheta Mortefontaine pour la baronne de Feuchères, sa maîtresse, qui en hérita, à sa mort, en 1830. Cette dernière, qui mourut en 1840, légua Mortefontaine à sa filleule, Sophie Thanaron (1901). En 1894, une large partie du domaine de Vallière fut revendue au duc de Gramont qui y fit construire le château de Vallière. Il a été construit en 1894 pour Agénor de Gramont, duc de Gramont, et la duchesse, née Marguerite de Rothschild dans le Grand Parc du vaste domaine de Mortefontaine, qui avait appartenu à Joseph Bonaparte. Ce domaine fut acquis par le duc de Gramont, en 1894, de Mme Corbin, petite-nièce de la baronne de Feuchères, héritière du dernier prince de Condé. Il comprend les vestiges d'un ancien parc à \"fabriques\" aménagé vers 1780 pour Louis Le Peletier de Morfontaine, et quatre étangs, peints par Watteau et par Corot. Le parc, assez vallonné, est traité \"à l'Anglaise\" et comprend le pavillon de Vallière, qui servait de rendez-vous de pêche et de lieu de fêtes, ainsi que de nombreux vestiges. Le château offre une silhouette néo-gothique avec façades de style Renaissance inspirées des châteaux du Val de Loire, notamment des quatre tours d'angle de celui d'Azay le Rideau. .Éléments protégés MH : les façades et les toitures du château : inscription par arrêté du 29 octobre 1975. propriété du duc de Gramont.","habitants":"Famille le Peletier.\"","divers":"dans cet article Mortefontaine et Vallière Mortefontaine grav-1                                     GPS : 49° 06' 36,36\" Nord, 2° 36' 12,96\" Est                                                      Vallière grav 2-3-4 GPS : 49° 07' 2\" Nord, 2° 36' 44\" Est","gps":"49° 06' 36,36\" Nord, 2° 36' 12,96\" Est","images":["../../jctruffet.com/image/image_60/60_Mortefontaine_1.jpg","../../jctruffet.com/image/image_60/60_Mortefontaine_2.jpg","../../jctruffet.com/image/image_60/60_Mortefontaine_3.jpg","../../jctruffet.com/image/image_60/60_Mortefontaine_4.jpg"]},"Consult_chateau_formulairec114":{"id":"Consult_chateau_formulairec114","dept":"60","canton":"Grandvilliers","commune":"Morvillers","nom":"Morvillers","type":"Manoir","periode":"XVI","histoire":"MORVILLERS, manoir en pan de bois et communs ayant appartenu aux seigneurs de Lannoy-de-Morvillers. C'est un ensemble représentatif des demeures seigneuriales qui se répandent à la fin du Moyen-Age et se perpétuent dans le paysage rural. Ce type de manoir correspond généralement aux seigneurs de la petite féodalité, dont le rang et la fortune ne leur confèrent pas le droit au château. Il est étroitement lié à un domaine agricole.","architecture":"MORVILLERS, éléments protégés MH : le manoir comprenant le corps du logis, composé des parties en pans de bois et en brique, corps de logis et ailes en retour, en totalité, des communs, à savoir le bâtiment longeant la rue et les petits bâtiments lui faisant face (ancien poulailler  en calcaire et brique (gros ouvre) , les sols de la cour jusqu'aux anciennes limites, enfin le jardin et ses murs de clôture: inscription par arrêté du 19 janvier 2006.","habitants":"seigneurs de Lannoy-de-Morvillers\"","divers":"manoir de Morvillers","gps":"","images":["../../jctruffet.com/image/image_60/60_Morvilliers_1.jpg"]},"Consult_chateau_formulaire1e98-2":{"id":"Consult_chateau_formulaire1e98-2","dept":"60","canton":"Chaumont-en-Vexin","commune":"Mouchy le Chatel","nom":"Mouchy_le_Chatel","type":"Château","periode":"XVI-XIX","histoire":"Trois châteaux dans cet article; Mouchy, Mouy et la Maison Bordez. MOUCHY, l'ancien château dont il subsiste la terrasse, une tour circulaire, les constructions comprises comme des fabriques (écuries), le caveau familial, la statuaire et des bâtiments d'habitation, ont été restaurés au XIXe siècle par l'architecte Hippolyte Destailleur, dans le style troubadour.\nMouchy-le-Châtel fut le siège d'une des plus importantes baronnies de Picardie. Sa forteresse fut assiégée en 1101 par Louis VI le Gros. La seigneurie appartint à Jean de Brosse en 1430, puis à la maison de Trie. La famille de Maricourt fut seigneur de Mouchy jusqu'à la fin du XVIe siècle, qui revint ensuite à la maison de Noailles                                                                                                              Éléments protégés MH : la terrasse de l'ancien château, le parc et ses murs de clôture dont la tour d'angle de la bergerie, l'entrée du parc du côté de Heilles, la chapelle, la maison du gardien, le portail et le saut de loup, refaite dans le même esprit et incorporée au domaine (excepté les écuries et les dépendances, la maison de la Lanterne, la statuaire, l'église, la nouvelle maison d'habitation, le jardin, la piscine et ses parties annexes) : inscription par arrêté du 3 juillet 2009.","architecture":"MOUY;  à partir du XIIe siècle, Mouy était une place forte dépendante de la châtellenie de Mouchy-le-Chatel.  En 1459, on parle de Mouy comme d'un village de 300 feux et dont le cur est constitué par une église, un château et ses dépendances. Lors de la rénovation de la place Cantrel, 23 sépultures médiévales ont été découvertes en 2018. Le château dont il ne reste qu'une petite partie, servit de refuge aux protestants de la région durant les guerres de religions du XVIe siècle, le seigneur de l'époque étant partisan de la réforme.   Cette citadelle, enjeu de plusieurs combats, fut prise et reprise tout au long de ces périodes troublées et connut les destructions et les représailles du pouvoir catholique que pareille situation suppose. Le dernier des Vaudrey-Coligny (famille possédant les terres de Mouy depuis 1449) étant resté le seigneur de Mouy après les événements que la place avait dû endurer, il devint le serviteur le plus zélé de Henri IV. Mouy, par le jeu des seigneurs morts sans postérité et des successions multiples, finira par échoir à Monsieur le Frère du Roi avant la Révolution. Ces idées de progrès et de liberté restent fortement ancrées et le 21 décembre 1851, les résultats au plébiscite de Louis-Napoléon Bonaparte placent le canton de Mouy en tête des votes négatifs du département. La Maison Bordez-Greber (début du XXe siècle), inscrite monument historique depuis 1990.","habitants":"famille de Maricourt\"","divers":"Trois châteaux dans cet article; Mouchy, Mouy et la maison Bordez_Grav-3","gps":"","images":["../../jctruffet.com/image/image_60/60_Mouchy_le_Chatel_1.jpg","../../jctruffet.com/image/image_60/60_Mouchy_le_Chatel_2.jpg","../../jctruffet.com/image/image_60/60_Mouchy_le_Chatel_3.jpg"]},"Consult_chateau_formulaire7964":{"id":"Consult_chateau_formulaire7964","dept":"60","canton":"Nanteuil le Haudoin","commune":"Nanteuil le Haudoin","nom":"Nanteuil_Haudoin","type":"château","periode":"XVII","histoire":"NANTEUIL le HAUDOIN     Occupation gallo-romaine, lendroit fut habité dès le VIe siècle pour devenir lune des plus riches possessions romaines dans les Gaules. Clovis donna la terre à lun de ses généraux pour services rendus. Au fil du temps, la cité passa aux mains de plusieurs seigneurs pour devenir, de 1746 à la Révolution, propriété des Bourbons-Condés qui en furent les derniers seigneurs.","architecture":"NANTEUIL le HAUDOIN  Si le vaste château qui abritait la famille fut détruit durant la Révolution, on peut aujourdhui encore en admirer quelques vestiges : les pavillons Louis XIII, lun dit du brigadier, lautre du jardiner. Éléments protégés MH : les façades et les toitures des deux pavillons de l'ancien château et le mur de soutènement des terrasses reliant ces deux pavillons : inscription par arrêté du 20 janvier 1950.","habitants":"Famille  des Bourbons-Condés\"","divers":"Château de Nanteui Haudoin et de Baco   grav 3","gps":"","images":["../../jctruffet.com/image/image_60/60_Nanteuil_Haudoin_1.jpg","../../jctruffet.com/image/image_60/60_Nanteuil_Haudoin_2.jpg","../../jctruffet.com/image/image_60/60_Nanteuil_Haudoin_3.jpg"]},"Consult_chateau_formulairee5d1":{"id":"Consult_chateau_formulairee5d1","dept":"60","canton":"Chaumont-en-Vexin","commune":"Neuville-Bosc","nom":"Neuville_Bosc","type":"Château","periode":"XVIII","histoire":"NEUVILLE-BOSC, au cur dun petit hameau, face à la mairie-école, le château a été construit au XVIIIe siècle et a appartenu à monsieur Antoine Harvard. Il est actuellement utilisé par une société, pour l'organisation de séminaires d'entreprises. Le château  et ses dépendances sont entourées dun parc de 8 hectares bordé dune grande forêt classée. Le domaine peut accueillir une cinquantaine dhôtes dans un espace propice aux promenades dans le parc, bref, à tout ce qui favorise naturellement l'organisation d'un séminaire, la réflexion, la créativité et la cohésion de vos équipes en séminaire.","architecture":"NEUVILLE-BOSC, château des XVIIIe et XIXe siècles, construit en 1750 par labbé Largillière, augmenté en 1849 par monsieur Antoine Havard, industriel et amoureux du Vexin et de lendroit. Il y construit la ferme en 1800, lécole, la maison du métayer aujourdhui la maison des Jardins, la grange devant le château. Transformée en 1993 par l'architecte Richard Gallois, il abrite aujourdhui la mairie.   Neuville-Bosc ainsi que la forêt qui lentoure est un lieu classé et inscrit à lInventaire supplémentaire des monuments historiques. Sarah Bernhardt y avait sa maison, un lieu privilégié, plus loin dans la forêt. En 1996, le château de Neuville-Bosc est exclusivement voué à laccueil de séminaires dentreprises.","habitants":"Monsieur Antoine Harvard\"","divers":"Château de Neuville-Bosc","gps":"","images":["../../jctruffet.com/image/image_60/60_Neuville_Bosc_1.jpg","../../jctruffet.com/image/image_60/60_Neuville_Bosc_2.jpg","../../jctruffet.com/image/image_60/60_Neuville_Bosc_3.jpg"]},"Consult_chateau_formulaire64fc":{"id":"Consult_chateau_formulaire64fc","dept":"60","canton":"Nogent sur oise","commune":"Nogent sur oise","nom":"Nogent_sur_Oise","type":"Château","periode":"XVII-XIX","histoire":"trois   châteux dans cet article, Rochers,  Rieux et Sarcus.                                               Des ROCHERS  à Nogent sur oise construit à la fin du XIXe siècle, par un industriel anglais sur lemplacement dun ancien vignoble. Occupé pendant la deuxième guerre mondiale par les allemands et ensuite par les américains, il fit office de logements pour des ingénieurs de sociétés aux alentours. Lensemble du domaine a été racheté par la commune en 1982, des manifestations, des congrès et des séminaires se déroulent dans la grande salle qui peut recevoir jusqu'à 700 personnes. La partie ancienne du bâtiment accueille les élèves de lécole municipale, propriété de la commune, espace culturel.                                                                                                         SARCUS, à Nogent  le château de Sarcus, près de Grandvillers, a été construit au XVIe siècle et détruit en 1833. C'est monsieur Daudin qui racheta ces vestiges et les fit reconstruire en son parc comme fabriques. Le groupe principal est formé de trois arcades et une voûte. Le second forme une chapelle dans un autre endroit du parc. Un troisième élément était une arcade aujourd'hui effondrée dont les morceaux sont conservés dans les communs du château. Ces ruines sont un témoin exceptionnel de l'art de la première Renaissance en Picardie. Éléments protégés MH : les vestiges du château de Sarcus : inscription par arrêté du 23 novembre 1999.","architecture":"RIEUX,  à cinq K.M.à l'est .En 1685, le château de Rieux fut pillé et dévasté par les grenadiers du roi, car le sieur Muission, qui en était propriétaire, professait la religion réformée. Le château actuel date de la fin du XVIIe siècle. Important, bien entretenu, situé parmi les sources d'eaux, l'édifice était entouré de douves qui ont été comblées presque entièrement il y a peu de temps. Sicaire Ciron, directeur de la manufacture de porcelaine de Chantilly, habita la demeure, que sa famille posséda jusqu'en 1880. Autrefois, l'eau de Rieux, pompée dans le parc du château, était mise en bouteille à la source du château, eau de table et de régime autorisé par l'état en 1893.","habitants":"famille du sieur Muission\"","divers":"trois châteux dans cet article, de Nogent sur Oise  rieux grav 1,  Rochers grav-2,  et Sarcus  grav-3                             GPS : 49° 16' 23\" Nord, 2° 01' 52\" Est","gps":"49° 16' 23\" Nord, 2° 01' 52\" Est","images":["../../jctruffet.com/image/image_60/60_Nogent_sur_Oise_1.jpg","../../jctruffet.com/image/image_60/60_Nogent_sur_Oise_2.jpg","../../jctruffet.com/image/image_60/60_Nogent_sur_Oise_3.jpg"]},"Consult_chateau_formulaireaaa4":{"id":"Consult_chateau_formulaireaaa4","dept":"60","canton":"Noyon","commune":"Noyon","nom":"Noyon_Mont_Renaud","type":"Château","periode":"XVI-XVII","histoire":"trois cvhâteaux dans cet article Noyon Mont-Renaud,  Crisolles et Menechet.                                                                                                           NOYON, MONT RENAUD Le mont Renaud est une colline qui domine la ville de Noyon dans le département de l'Oise. En mars et avril 1918, les troupes françaises tenant la position  dernier verrou barrant la route de Paris à l'armée allemande  bombardèrent la ville de Noyon tenue par les Allemands.  La colline est attestée sous le nom de mont Hérimont au Moyen Âge, puis devient mont Saint-Louis au XIVe siècle, avant de devenir mont Renaud en hommage au fondateur de la chartreuse. En 1802, alors que le site est propriété d'un certain M. Boileau, l'ancienne chartreuse est transformée par l'architecte François-Tranquille Gauché (1766-1846), ancien élève de Charles De Wailly, qui en fait un château. Il lui est adjoint une ferme à la fin du XIXe siècle.                                                                                                   Au nord de Noyon CRISOLLES,  cette chambre d'hôtes possède une aire de jeux pour vos enfants et offre une vue sur le jardin. Le Manoir de Crisolles possède aussi un salon de coiffure. Vous pourrez pratiquer diverses activités dans les environs, notamment le vélo et la randonnée. Saint-Quentin est à 32 km, tandis qu'Albert se trouve à 50 km. Enfin, l'aéroport de Paris Beauvais-Tillé est distant de 68 km. e Manoir de Crisolles est devenu un gite touristique.","architecture":"MONT-RENAUD, en 1818, un château avec colombier et fabrique de jardin furent construits sur les plans de l'architecte Léré, de Compiègne. Une chapelle (St Louis) fut édifiée en 1820.  Le domaine du Mt Renaud devint en 1848 la propriété de Monsieur de Boulancy (il appartient toujours à cette famille). A la fin du XIXe siècle le château fut modifié et une ferme fut construite.  Le musée est installé dans l'ancien palais épiscopal.   Le Mont-Renaud, qui domine l´ensemble de la ville de Noyon et des alentours, servit de base de bombardement en 1918 et fut l´objet d´âpres combats. L'édifice fut presque entièrement détruit en 1918 ; une partie du château et de la ferme sera reconstruite de 1914 à 1922 (dates portées sur le pavillon d'entrée de la ferme)Ce dernier comportait notamment une chapelle épiscopale démantelée en 1897 par l'architecte des Monuments historiques Paul Selmersheim qui en restaurant la cathédrale de Noyon entre 1884 et 1910, souhaitait dégager le flanc sud de la cathédrale. La première Guerre mondiale achève de ruiner la chapelle. Les travaux de stabilisation des ruines datent des années 1930 et en 1993 et ceux de restauration de 20101. Cette chapelle est importante dans l'histoire de l'art car le traitement en 1175 de la baie jumelle surmontée d'un oculus pratiqué dans le haut du mur préfigure la baie gothique.                                                                                                                     Edifice inachevé, le château Mennechet a été conçu comme une galerie richement sculptée sur ses façades et pignons extérieurs. Son commanditaire Alphonse Mennechet de Barival (1812-1903), d'origine saint-quentinoise","habitants":"Seigneurs locaux et famille de  M. Boileau\"","divers":"Château à Noyon Palais E grav-3-4-5                                                                 49° 33' 48? nord, 2° 58' 25? est   Crisolles -2-3  GPS : 49° 37' 20\" Nord, 3° 01' 01\" Est                                    Passel grav-6","gps":"49° 37' 20\" Nord, 3° 01' 01\" Est","images":["../../jctruffet.com/image/image_60/60_Noyon_Mont_Renaud_1.jpg","../../jctruffet.com/image/image_60/60_Noyon_Mont_Renaud_2.jpg","../../jctruffet.com/image/image_60/60_Noyon_Mont_Renaud_3.jpg","../../jctruffet.com/image/image_60/60_Noyon_Mont_Renaud_4.jpg","../../jctruffet.com/image/image_60/60_Noyon_Mont_Renaud_5.jpg","../../jctruffet.com/image/image_60/60_Noyon_Mont_Renaud_6.jpg"]},"Consult_chateau_formulaired24b":{"id":"Consult_chateau_formulaired24b","dept":"60","canton":"Compiègne","commune":"Saint-Crepin-aux-Bois","nom":"Offémont","type":"Château","periode":"XVII","histoire":"OFFEMONT, imposant château implanté au sommet dun relief, il domine la vallée du ruisseau du Fourchon au-dessus de la cime des arbres. Une forteresse était établie au XIIe siècle sur ce site. Le château est rebâti à la fin du XVe siècle.   Hugues de Beaumont de la maison de Persan-Beaumont, puis de la Thourotte et par alliance en 1294 à la famille de Nesle Guy IV de Nesles maréchal de France, auXVIe siècle les Montmorency.  Henri II de Montmorency gouverneur du Languedoc adversaire au roi sera fait prisonnier, sera décapité sur l'ordre de Louis XIII. Plus tard Denys Dreux d'Aubray, conseiller d'état père de Marie Madeleine  marquise de Brinvilliers   s'établiera à Offémont et empoisonne son père la marquise meurt dans l'année en cours. Le château est devenu la   propriété du comte Pillet-Will.  Le château actuel, transformé jusquau XIXe siècle, est inscrit à linventaire supplémentaire des monuments historiques. La façade sud a conservé un esprit XVIIe siècle, tandis que la façade nord adopte un aspect féodal avec quatre tours. Elle souvre sur une terrasse bordée de douves, fermée par une belle grille du XVIIIe siècle.","architecture":"OFFEMONT, le sentier principal, la route des Maîtres relie la porte Saint-Crépin au sud et la porte de Tracy au nord, en passant par le château. Aux deux entrées se dressent une habitation de garde et un portail.  Des communs du XVIIe siècle jouxtent la façade. À lentrée sud, lancienne faisanderie a été aménagée en habitation. Le parc dOffémont est un domaine de 410 hectares constitué en grande majorité de forêt dans le prolongement de celle de Laigue et de traces de jardins à langlaise aménagés au XIXe siècle. Le site privé est clôturé par des murs en pierre, dès le XVIe siècle. Les premières descriptions dun parc datent de 1383 \"le manoir est entouré dun jardin : les 24 arpents accroissent lancien parc ; un lieu-dit le clos renferme vivier, aunois, friches, broussailles, prés, bois\". Le parc est traversé par 30 kms de sentiers forestiers, tracés dès le Moyen-âge. En 1674, selon les archives consultées par Paul Guynemer, la seigneurie comporte le château, composé dun corps de logis en pierre de taille et quatre grosses tours rondes, la basse cour avec le colombier, etc ; le parc dans lequel se trouvent 321 arpents de bois taillis, 160 mines de terres labourables.\nÉléments protégés MH : les vestiges de l'église et des deux cloîtres ; l'entrée de l'abbaye ; la grange aux dîmes ; le pigeonnier et l'ensemble des sols de l'ancienne abbaye Sainte-Croix : classement par arrêté du 9 juillet 1962. Les façades et les toitures du château et des communs ; les terrasses et les murs de soutènement : inscription par arrêté du 22 février 1963.","habitants":"Famille de Nesle \"","divers":"a Saint-Crepin-aux-Bois le château d'Offémont                                                         GPS : 49° 26' 05\" Nord, 2° 58' 48\" Est","gps":"49° 26' 05\" Nord, 2° 58' 48\" Est","images":["../../jctruffet.com/image/image_60/60_Off%c3%a9mont_1.jpg","../../jctruffet.com/image/image_60/60_Off%c3%a9mont_2.jpg","../../jctruffet.com/image/image_60/60_Off%c3%a9mont_3.jpg","../../jctruffet.com/image/image_60/60_Off%c3%a9mont_4.jpg"]},"Consult_chateau_formulaire7c95":{"id":"Consult_chateau_formulaire7c95","dept":"60","canton":"Pont-Sainte-Maxence","commune":"Ognon","nom":"Ognon","type":"Château","periode":"XVIII","histoire":"OGNON  date du XVIIe au XVIIIe siècle, était de style Néo-Renaissance. Il appartient à Mr Ernest-Antoine Seillière. Bien qu'inscrit au titre des sites, sur la base de la loi du 2 mai 1930 relative à la protection des monuments naturels et des sites de caractère artistique, historique, scientifique, légendaire ou pittoresque, le château d'Ognon a été démoli en 1957 en raison des lourds dégâts subis lors de son occupation par des troupes et des réfugiés pendant la seconde guerre mondiale. Ce château, au moins le deuxième sur le site, ne datait que de 1881/1883 et était de style néo-Renaissance. Seule la grosse tour est ancienne. La grille d'entrée sur la rue de la Forêt, les communs sur la route de Brasseuse et surtout le parc aménagé en plusieurs étapes entre 1600 environ et 1753 subsistent toujours. L'attribution de sa conception à André Le Nôtre ne relève que d'une hypothèse. Sur une superficie de 50 ha, entouré d'un haut mur d'enceinte, s'étend ce qui fut l'un des majeurs jardins à la française du XVIIIe siècle. Le parc se compose notamment de la longue allée du Mail, du grand escalier avec ses deux gloriettes, de forêts et pelouses, d'un miroir d'eau avec embarcadère, de la salle de verdure et d'un grand étang. De nombreuses statues sont disposées dans le parc, dont « les Quatre Parties du monde », « les Quatre Vertus » et « les Quatre Saisons ».","architecture":"OGNON, le premier plan connu du domaine, dressé en 1382, est conservé à la Bibliothèque nationale. Il montre déjà le manoir au même endroit que le dernier château en date. Alors que le château a été plusieurs fois reconstruit au même emplacement, la disposition générale du domaine n'a quasiment pas évolué depuis les origines. La grande allée nord-sud du parc, connue comme l'allée du Mail, peut donc être attestée dès 1382. Cependant, aucune représentation picturale du château antérieur au XIXe siècle n'est connue, ni même une description de son architecture. Un aveu de Jean de La Fontaine du 9 avril 1530 précise seulement que le château comporte deux ailes et une tour, ainsi qu'une ferme avec maison, grange, étables, colombier, puits, cour, verger, vignes et bois. La dernière description sommaire du domaine avant la fin de l'ancien régime est contenue dans le testament de Maximilien Titon, rédigé en 1711 : « Le château seigneurial consiste en une grosse tour, deux grands corps de logis, un pavillon, deux cours et une cour verte, basse cour, granges établies et bergeries, colombier, le tout fermé de murs et contenant cinq arpents    Éléments protégés MH : le parc, ses pièces d'eau, l'ensemble des fabriques anciennes du parc, entre autres les gloriettes et l'embarcadère, les bancs, les terrasses et les escaliers, et l'ensemble de la statuaire de ce parc, les vases ainsi que les statues de Coryd
