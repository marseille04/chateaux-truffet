pouse qu'il fait élever le château, après leur mariage. Il a été maire de Dampierre de 1846 à 1876. Deux ailes en ressaut sur la façade ont été ajoutées au XXIe siècle par les propriétaires actuels.","architecture":"NOUES ST YTHIER, construction de taille modeste ne datant guère que de la fin du XIXe siècle puisque construite entre 1872 et 1879  pour Gabriel Placide de Rancourt-Mimerand, est néanmoins un beau spécimen de l'architecture en style Renaissance, brique et pierre.  Le château est constitué de deux bâtiments en T dont l'un est flanqué, des deux côtés d'une de ses extrémités, d'une tour polygonale à pans coupés et d'une tour circulaire en poivrière.                                                                                MARCHAIS-CREUX, un robuste colombier du XVIe siècle, à gauche de la grille d'accès, portant un blason au fronton de sa porte d'entrée, atteste de l'ancienneté du domaine dont la demeure date pratiquement de la même époque. Le \"Marchais-Creux\" , qui donne son nom au lieu, a  pour origine une motte féodale. En 1471, Edmond Gilidor est propriétaire des lieux. Vers 1518 Jean Ier de Villiers est seigneur de Marchais-Creux. Jean III de Villiers est grand maître des forêts de France. Mais c'est  Jean IV de Villiers, bailli de Gien en 1655, qui fit élever le château Renaissance dont une partie est encore visible. En 1691, la propriété est vendue par adjudication à Louis de Rancourt, ils  sont jusqu'à la Révolution des financiers et des officiers comptables. À la mort d'Edme de Rancourt, en 1835, le domaine est partagé entre ses trois filles. L'une d'elles, Marie-Caroline épouse de Carré de Bray, conserve Marchais-Creux. Son fils, Louis Carré de Bray est maire de Dampierre de 1876 à 1884. Des transformations sont entreprises dans le château et les bâtiments annexes dans la seconde moitié du XIXe siècle.","habitants":"Dampierre; famille de Cugnac                                             Verdier; Maxime du Verdier de la Sorinière                             Noues ;Gabriel Placide de Rancourt-Mimerand                            Marchais; Louis de Rancourt\r\n        \"","divers":"Trois châteaux a Dampierre en Burly; Dampierre grav1-2-3 et Marchais-Creux grav-4 Noues grav-5 et Verdier.    grav 6   buisson grav-7                                                                         Dampierre 47° 45' 35\" nord, 2° 30' 55\" est","gps":"","images":["../image/image_45/45_Dampierre_Burly_1.jpg","../image/image_45/45_Dampierre_Burly_2.jpg","../image/image_45/45_Dampierre_Burly_3.jpg","../image/image_45/45_Dampierre_Burly_4.jpg","../image/image_45/45_Dampierre_Burly_5.jpg","../image/image_45/45_Dampierre_Burly_6.jpg","../image/image_45/45_Dampierre_Burly_7.jpg"]},"Consult_chateau_formulaireb18b":{"id":"Consult_chateau_formulaireb18b","dept":"45","canton":"Pithiviers","commune":"Dadonville","nom":"Denainvilliers","type":"Château","periode":"XIV-XIX","histoire":"DENAINVILLIERS,   est connue dès les XIIe et XIIIe siècles,  les premiers seigneurs furent les d'Escrennes.  En 1621, Antoinette Jacquelot, héritière du domaine, épouse Claude du Hamel, introducteur des Ambassadeurs de Louis XIII entra dans la famille du Hamel; Claude du Hamel reconstruisit le château actuel en 1630.  Ce dernier, anobli en 1635, fit démolir l'ancien château et ses dépendances et édifier le corps de logis central vers 1625. De 1632 à 1638, il fait élever les deux pavillons, reliés par la suite au bâtiment par deux ailes. En 1647, la chapelle est consacrée. Au XVIIIe siècle, le scientifique Henri-Louis Duhamel du Monceau demeure au château. Il fait installer plusieurs cadrans solaires dont un ensemble gnomonique et mène, dans le château, des expériences préliminaires à la rédaction de nombreux traités. Son actuel propriétaire, le comte Joseph de Pelet, y est arrivé en 1956, la maison était à l'abandon. Restaurée, Joseph de Pelet a installé dans une pièce un petit musée dédié à Duhamel du Monceau. Inscription par arrêté du 23 juin 1988.","architecture":"DENAINVILLIERS,  constitue un ensemble imposant, comprenant un bâtiment central à sept travées à deux nuiveaux, à  chaque extrémité  un pavillon  et une petite aile basse d'une travée. Dans le château, il fait aménager son atelier, construire des cuves de quatre mètres de profondeur dans les caves des communs pour étudier la conservation des grains et procède à la plantation de nombreux arbres d'essences exotiques dans le parc. En 1750, il fait édifier, à l'entrée du château, un moulin \"à la polonaise\" destiné à la conservation des grains. En 1805, le château est restauré dans le style de l'époque. Par la suite, le moulin est aménagé en pigeonnier. Les ouvertures pratiquées entre les piliers de pierre de taille sont murées et le mécanisme détruit et dispersé.","habitants":"famille du Hamel\r\n        \"","divers":"A Dadonville le  châteaux de Denainvilliers","gps":"","images":["../image/image_45/45_Denainvilliers_1.jpg","../image/image_45/45_Denainvilliers_2.jpg","../image/image_45/45_Denainvilliers_3.jpg","../image/image_45/45_Denainvilliers_4.jpg"]},"Consult_chateau_formulaire602e":{"id":"Consult_chateau_formulaire602e","dept":"45","canton":"Gien","commune":"Saint-Gondon","nom":"Dominuze","type":"Château","periode":"XVIII","histoire":"DEMINUZE, site de souche fort ancienne, puisqu'en 1260, le temple, appelé Dominus était une possession des Templiers. Des aménagements à la fin du XVIIIe siècle sont réalisés par M. de Rancourt de Villiers, député de la noblesse aux États Généraux de 1764, et complétés par des agrandissements au XIXe siècle.  L'ensemble s'agrémente d'un grand parc à l'anglaise aménagé en 1825, à l'initiative du comte général Eugène Gabriel d'Argoult par les soins de l'architecte paysagiste Paul de Choulot qui en dressa le plan.","architecture":"DEMINUZE ces travaux vont transformer cette demeure en un véritable château avec chapelle, pigeonnier, et dépendances rustiques regroupant granges, écuries, chenil et bûcher. Il se présente comme un bâtiment rectangulaire égayé par deux terrasses dont l'une à balustrade en pierre et élégamment ordonnancé, comportant un étage et rythmé de simples baies et portes-fenêtres. La chapelle bâtie en 1788, joliment restaurée en 1827, baigne dans une lumière que filtrent de beaux vitraux. L'ensemble s'agrémente d'un grand parc à l'anglaise aménagé en 1825.","habitants":"Rancourt de Villiers, \r\n        \"","divers":"A Saint-Gondon le château de  Dominuze","gps":"","images":["../image/image_45/45_Dominuze_1.jpg","../image/image_45/45_Dominuze_2.jpg","../image/image_45/45_Dominuze_3.jpg","../image/image_45/45_Dominuze_4.jpg"]},"Consult_chateau_formulairef057":{"id":"Consult_chateau_formulairef057","dept":"45","canton":"Chécy","commune":"Donnery","nom":"Donnery","type":"Château","periode":"XV-XVIII-XIX","histoire":"châteaux à Donnery, la Morinière, la Touche et la Motte; Allone voir article.                                                                                                             DONNERY; au Moyen-âge, il nexiste pas à proprement parlé de « seigneurie de Donnery » même si une branche cadette de la famille de Foyal installée en Blésois, a ajouté « Donnery » à son nom. Tout comme les seigneurs qui, au XVIIIe siècle, se qualifiaient de « seigneur dAllonne, la Touche, de Donnery et autres lieux. La seule importante et ancienne seigneurie était celle dAllonne. La famille de Foyal en fut seigneur du XVe siècle jusquen 1710, où elle vendit la seigneurie avec ses fermes et ses bois, à Jules de Flacourt, « sieur de la Touche »                                                                                                               MORINIERE ce lieu est d'abord une métairie au XVIIe siècle. Au cours du siècle suivant, ses terres ayant été jointes à une autre métairie voisine appartenant au même propriétaire, ce lieu devient une maison de vignes, sorte de résidence secondaire pour des bourgeois d'Orléans (familles de Beausse, Menault, Guérin). En 1764, elle devient la propriété de la famille Jarry, de Saint-Denis-de-l'Hôtel, enrichie par le commerce du vin. À la fin du XVIIIe siècle, Alexandre Jarry entreprend la construction du château actuel et constitue un domaine important. Son petit-fils Alexandre sera le maire de Donnery ayant exercé le plus long mandat, de 1853 à 1898. C'est le beau-père du romancier Ponson du Terrail qui a acheté la propriété voisine des Charmettes qu'il occupe durant l'été et la saison de la chasse. Les descendants du maire, Alexandre Jarry, possèdent la propriété jusqu'à sa vente en 1935.","architecture":"La MOTTE pa d'information historique.                                                                                                                                  La TOUCHE du XV-XIXe siècle, est situé dans une chênaie, jouxtant le domaine des Grands Billons. La famille de Foyal est une des premières familles nobles connues ayant possédé la terre de Donnery. Elle conclura de nombreuses alliances avec des fiefs proches pour accroître son domaine. Au milieu du XVe siècle, Guyot de Foyal, seigneur de Donnery et d'Allone, épouse Marie Boyau, fille du seigneur de Fay-aux-Loges. Au XVIe siècle, leur arrière-petit-fils, François de Foyal, gouverneur pour le Roi des villes de Jargeau, Château-Renard et Châtillon-sur-Loing, possédera les fiefs d'Allonne, de Fay-aux-Loges, de Donnery, de Puiseaux et de Mainvilliers. En 1710, Nicolas de Foyal petit-fils de François, vendra la terre d'Allonnes et la seigneurie de Donnery à Jules de Flacourt. Le château fut remanié au XIXe siècle, il possède deux corps de logis rectangulaires de trois étages. Le corps de logis le plus ancien est cantonné de quatre tours cylindriques. En 1952, une partie du domaine de la Touche, vaste forêt de pins, de bouleaux et de chênes a été cédée afin de créer un golf.","habitants":"Morinière; famille Jarry                                                                          la Touche; Guyot de Foyal,\r\n        \"","divers":"châteaux à Donnery; la Morinière grav-3, la Touche  grav 1 et la Motte grav-2.","gps":"","images":["../image/image_45/45_Donnery_1.jpg","../image/image_45/45_Donnery_2.jpg","../image/image_45/45_Donnery_3.jpg"]},"Consult_chateau_formulaire3c1a":{"id":"Consult_chateau_formulaire3c1a","dept":"45","canton":"Ferrières-en-Gâtinais","commune":"Dordives","nom":"Dordives","type":"Château","periode":"XII-XIX","histoire":"deux châteaux dans cet article ; Mez le Maréchal et Thurelles. MEZ-MARECHAL, les ruines imposantes de ce château-fort sont très anciennes, du XIIe siècles. Les premiers seigneurs furent les Clément, Alberic Clément, fils de Robert, Accompagna Philippe Auguste à la croisade et fut nommé 1er maréchal de France. C'est ce titre qui donna son nom au château. Il fut tué en 1191 à Saint Jean d'Acre. Ses deux successeurs, Henry et Jean Clément, portèrent aussi le titre de maréchal de France. La lignée des Clément s'éteignit au XIVe siècle et le château passa à la maison de Melun. Adam de Melun fut chambellan des Rois Jean le Bon et Charles V. Le château fut ensuite acheté par le duc de Nemours, époux d'Anne d'Este, dame de Montargis. Puis par mariage, il passa successivement aux Chaigneaux, aux Meignan et ensuite à Philibert de Turin, président du Grand Conseil. De 1672 à 1761 la seigneurie fut réunie à l'apanage du duc d'Orléans. Puis elle revint à la famille  de La Trémoille. Pendant la Révolution, le château appartenait à Antoine-Guillaume Girard, receveur de la terre. Au début du XXe siècle, il était au docteur Bertillon qui l'a transmis à Madame Vincent.","architecture":"MEZ-MARECHAL,  forme un ensemble de constructions en ruines n'ayant pas subi de remaniements importants depuis sa construction, qui date de la seconde moitié du XIIe siècle. Une enceinte rectangulaire est défendue par quatre tours placées aux angles. Sur l'une des faces, deux autres tours flanquent la porte d'entrée. Le centre de cette enceinte est occupé par un donjon rectangulaire, flanqué de quatre tourelles. Appuyés sur deux faces des courtines s'étendaient sur les bâtiments d'habitation dont il reste quelques fragments et des substructions.                                                                                        THURELLES, du XIXe siècles  cette immense bâtisse est construite au cur d'une très vaste propriété boisée, connue depuis très longtemps. Sous Philippe Auguste, une charte d'Orléans libéra les serfs de Ferrières et de Thurelles de l'esclavage. En 1652 un capitaine des galères possédait Thurelles, son père, François Thiballier, seigneur de Toury à Nargis, fut envoyé aux Indes par Colbert, mais n'en revint pas. Plus récemment, Jean-Baptiste Moreau, négociant en bois à Château-Landon, possédait la demeure. Son fils, sénateur, remplaça l'édifice d'origine vers 1842, par le château actuel, vaste construction vouée à la chasse avec un important personnel. Il fut enterré en 1873 avec son épouse dans la chapelle qui existe toujours. En 1926, leur petite-fille, Hélène Durand Gallice y habita et ce fut sa fille qui lui succéda.","habitants":"Mez-Maréchal; famille La Trémoille.                                      Thurelles; François Thiballier,\r\n        \r\n        \"","divers":"A Dordives château de Mez-Maréchal grav-1-2-3 et de Thurelles grav-4                                                                             Mez 48° 09' 01\" nord, 2° 47' 32\" est","gps":"","images":["../image/image_45/45_Dordives_1.jpg","../image/image_45/45_Dordives_2.jpg","../image/image_45/45_Dordives_3.jpg","../image/image_45/45_Dordives_4.jpg"]},"Consult_chateau_formulaire556d":{"id":"Consult_chateau_formulaire556d","dept":"45","canton":"Château-Renard","commune":"Douchy","nom":"Douchy","type":"Forteresse","periode":"XV-XIX","histoire":"Deux châteaux dans cet article ; Brulerie et Launay.                       BRULERIE, du XIXe siècle,  le château de la Brûlerie, datant du Premier Empire, puis agrandi en 1886, a été construit sur les ruines d'un vieux château remontant au Moyen Âge. Le fief de la Brûlerie est en effet très ancien: Jeanne d'Arc, se rendant à Auxerre, prit gîte à la Brûlerie dans la nuit du 28 juin 1429. Jean Davy, seigneur de la Brûlerie, fit reconstruire la chapelle, après les outrages de la guerre de cent ans ; il se fit inhumer dans celle-ci, et après lui tous les seigneurs de la Brûlerie, on peut y voir ses armes, \"d'azur à la croix ancrée d'argent\". A l'intérieur, les peintures décorant le salon d'honneur sont inscrites à l'inventaire des M.H.                                                                                           LAUNAY, du XIXe siècle, le 1er seigneur de Launay serait Guillaume de Launay en 1297. On trouve la famille du Souchet en 1480. Charlotte du Souchet épouse Lion le Fort, chevalier de Saint Michel, seigneur de Juranville et de Villemandeur. Celui-ci suit le Roi François 1er, en Italie et meurt en 1541. Madeleine, épouse de Philippe de Villereau, convertit la chapelle en temple vers 1605. En 1842, le domaine est acheté par Pascal Happert qui va construire un nouveau château qui existe toujours.","architecture":"BRULERIE, du XIXe siècle, dominant la vallée de l'Ouanne, ce très grand château à la longue façade à parements de briques, jouit d'une situation exceptionnelle, au milieu d'un immense parc. Le logis, terminé en pignon à trois pans coupés, est flanqué de deux pavillons bas avec terrasses à l'italienne.                                                                                                                                                                                                        LAUNAY, du XIXe siècle en contrebas de la route dans un lacis de ruisseaux et de marais aménagés. Il est entouré de prairie, de bassins et de massifs fleuris, mais ce lieu a été occupé de tout temps. Ce lieu humide a toujours été aménagé en \"radier\" (un marais disposé en rayons qui délimitent des quadrilatères formant des îles entre lesquelles s'écoulent les eaux), Ce château a été bâti à proximité d'une maison-forte aujourd'hui disparue et qui était accolée à un important colombier toujours en place et qui présente plus d'un millier de boulins et atteste donc de la qualité des anciens occupants du lieu.","habitants":"Brulerie; Jean Davy                                                                   Launay; famille du Souchet \r\n        \r\n        \"","divers":"Deux châteaux à Douchy Brulerie grav-3-4 et Launay_grav 1-2.","gps":"","images":["../image/image_45/45_Douchy_1.jpg","../image/image_45/45_Douchy_2.jpg","../image/image_45/45_Douchy_3.jpg","../image/image_45/45_Douchy_4.jpg"]},"Consult_chateau_formulaire6f93":{"id":"Consult_chateau_formulaire6f93","dept":"45","canton":"Cléry-Saint-André","commune":"Dry","nom":"Dry","type":"Château","periode":"XIX","histoire":"Trois châteaux dans cet article; Bouchet, Concyr et Villecante. BOUCHET,  il doit son magnifique parc arboré à son premier propriétaire qui était passionné de botanique. Le château a été bâti en 1853 sur les vestiges d'un édifice de la fin du XVIe siècle pour la famille Laage de La Rocheterie. Le plus célèbre représentant de cette dernière fut Maxime de Laage, écrivain et maire de Dry peu avant la guerre de 1870. Le domaine a été racheté en 1961 par l'office national de la chasse et de la faune sauvage et contient un centre de formation pour agents techniques et techniciens de l'environnement (garde-chasses). VILLECANTE, on trouve un Jacques de Lhuillier seigneur de Villecante en 1645. Le château figure sur la carte de Cassini en 1750. C'est la famille Gombault devenue propriétaire du domaine après la Révolution qui fit reconstruire le château dans les années 1850. L'édifice, de plan symétrique, se compose d'un étage carré, gros-oeuvre : revêtement, élévation à travées surmontée de toit à longs pans et croupe recouverts d'ardoises. Autour de la demeure s'organise de nombreuses dépendances. En 1960, les propriétaires, M. et Mme Durant des Aulnois, ont fait don au département du Loiret du domaine pour y installer une maison de retraite.","architecture":"CONCYR, de nombreuses pièces d'archives témoignent de l'ancienneté de cette seigneurie relevant de la châtellenie de Beaugency. On trouve un Hommage de l'hostel de Concire, mouvant de la chastellenie de Balgency, rendu par Pierre de Roue, escuyer, le 9 juillet 1383. L'orthographe de ce lieu-dit a évolué au cours des siècles : Concire en 1646, Grand Concire au XVIIIe siècle sur la carte de Cassini, Concir sur le cadastre de 1826 et enfin Concyr sur le cadastre de 1937. Il y avait là, aux XIIe et XIIIe siècles, une motte féodale avec plate-forme défensive de forme polygonale, entourée de fossés. Cette motte porte, dès le XIVe siècle, une maison couverte d'ardoises, avec une métairie et des dépendances. Le château actuel date de 1830, pour le cops de logis central ; les deux pavillons latéraux à chaînages de brique ont été ajoutés en 1870, et différentes modifications ont été apportées par les propriétaires successifs.","habitants":"Bouchet; famille Laage de La Rocheterie                Villecante;famille Gombault\r\n        \"","divers":"Trois châteaux à Dry; Bouchet grav-1-2-3, Concyr et Villecante grav-4-5                                                                 Bouchet   47° 47' 11\" nord, 1° 42' 15\" est","gps":"","images":["../image/image_45/45_Dry_1.jpg","../image/image_45/45_Dry_2.jpg","../image/image_45/45_Dry_3.jpg","../image/image_45/45_Dry_4.jpg","../image/image_45/45_Dry_5.jpg"]},"Consult_chateau_formulaire84a6":{"id":"Consult_chateau_formulaire84a6","dept":"45","canton":"Malesherbes","commune":"Sermaises","nom":"Enzanville","type":"Forteresse","periode":"XII-XV","histoire":"ENZANVILLE,  dépendent les hameaux dEnzanville, Dreville, et Mesrobers, reconnaît pour seigneur, lAbbé de Sainte-Colombe lés Sens, qui a justice haute, moyenne, et basse, dans toute létendue de ladite paroisse. Lors que la Coûtume dEstampes qui fut reformée en lan 1556, il y eut \"grande contestation entre les substituts du procureur Général du Roy, aux bailliages dOrléans, et dEstampes, chacun deux prétendant que les appels de celui de Sermaises devrait être portez à son ressort ; mais ils ne furent pas écoutez, parce quils vont directement à la cour du parlement, par privilège du Roy Charles VI.\" Protection pour la ville royale dÉtampes, le château d'Enzanville servira également à collecter limpôt et à étendre l'influence de l'abbaye de Saint-Pierre-le-Vif de Sens. Propriété de Jean de Lubin, 1er grand fauconnier de France du Roi en 1428, seigneur dEnzanville. Enzanville est régi par les coutumes dÉtampes en 1556. Propriété de la famille De Vidal du XVIIe au XVIIIe siècles. Le château donnera son surnom d'Enzanville à Guy-Victor de Vidal (1692-1720). Propriété d'André de Vidal (1643-1708), gendarme de la garde du Roi, décrit comme chevalier, seigneur d'Ezerville, Enzanville et autres lieux en 1688. Le 28 décembre 1715, Charles-André de Vidal (1684-1741) fait foi et hommage à la baronnie de Serinade pour la tour d'Enzanville. Propriété de Charles-Louis de Vidal, chevalier, seigneur d'Eserville et d'Enzanville (1716-1755), élevé page à la grande écurie du Roi.","architecture":"ENZANVILLE suite,  Charles-Louis de Vidal n'ayant que des filles, c'est son jeune frère Charles-Alexandre de Vidal (1735-), lieutenant dans le régiment Royal-Lorraine, qui reprend le titre et apparait comme chevalier de Chaumont et Puissant seigneur d'Anzanville des grands châtellier de Villarseau et autres lieux en 1774. Au moment des États généraux du 9 mars 1789, le château appartient à M. de Vidal de Lion, chevalier de l'Ordre royal et militaire de Saint-Louis. De Vidal de Lion est présent dans le procès-verbal de l'Assemblée générale des Trois Ordres pour le bailliage d'Étampes.                                                   Construit au XIIe et XIIIe siècles, le château se composait à l'origine d'une base carrée à laquelle étaient adossées deux tours. L'une des deux tours a aujourd'hui disparu. Sans ouverture au rez-de-chaussée à l'origine, une porte et une cheminée seront ajoutées au XVe siècle. En 1896 : « De Sermaises nous nous dirigeons vers Blandy ; à mi chemin, nous apercevons une construction massive, une sorte de donjon carré, flanqué de deux tours rondes, percées de quelques minuscules ouvertures et obliquement découronnées comme celles du château de la Chasse, dans la forêt de Montmorency. Ceci appartient au village d'Anzanville que nous traversons bientôt ; c'était une petite forteresse autrefois, c'est une grande ferme aujourd'hui ; dans les environs du pays on l'appelle la Tour.","habitants":"Enzanville; de Jean de Lubin\r\n        \"","divers":"A Sermaises le château d'Enzanville","gps":"","images":["../image/image_45/45_Enzanville_1.jpg"]},"Consult_chateau_formulaire0914-2":{"id":"Consult_chateau_formulaire0914-2","dept":"45","canton":"Briare","commune":"Faverelles","nom":"Faverelles","type":"Château","periode":"XVI-XVIII","histoire":"Du PUITS, les communs du château du Puits avec leurs briques et tuiles, leurs charpentes du XVIe siècle et leurs colombages constituent la partie la plus ancienne du domaine, qui fut inféodé en 1594 par Henry de Bourbon, grand connétable, à Lancelot du Puits, écuyer, avec droit de moyenne, haute et basse justice. La construction du château fut achevée en 1604. Il servit vers 1652 de rendez vous de chasse à Anne Marie Louise d'Orléans dite la Grande Mademoiselle, duchesse de Montpensier et de Saint Fargeau, cousine de Louis XIV, exilée à Saint Fargeau d'où elle venait en voisine chez ses cousins de Chabannes qu'à cette époque, habitaient le château du Puits.","architecture":"PUITS, elle leur prêtera son architecte François Le Vau qui bâtira les deux lanternons coiffant les deux tours jumelles qui ne sont pas sans rappeler celles du château de Saint Fargeau. Le contraste entre les communs d'avant 1594, tuiles et briques, et le château d'après 1604, ardoises et pierres, séparés par une cour d'honneur, est très frappant, non moins que celui offert par la façade vers le parc d'aspect classique pour avoir été refaite au XVIIIe siècle.","habitants":"Anne Marie Louise d'Orléans \r\n        \"","divers":"A Faverelles le château du Puits","gps":"","images":["../image/image_45/45_Faverelles_1.jpg"]},"Consult_chateau_formulaire2d38":{"id":"Consult_chateau_formulaire2d38","dept":"45","canton":"Ferrières-en-Gâtinais","commune":"Ferrières-en-Gâtinais","nom":"Ferrières_Vaugouard","type":"Château","periode":"XVII-XIX","histoire":"à L'ouest  Fontenay sur Loing voisin de la Ferrières                                                      Des HAUTES VERNES   le château domine la rivière de la Cléry. Selon la tradition, il fut construit beaucoup plus tard sur l'emplacement d'un ancien fort Saint-Éloi, qui vers 1068 abritait Geoffroy le Barbu, petit fils de Foulques Nera. Geoffroy était en guerre contre son frère Foulques le Réchin, enfermé dans la ville de Ferrières. Geoffroy battu, s'enfuit en incendiant le fort et la ville.","architecture":"Des HAUTES VERNES, le château actuel est beaücoup plus récent, il fut construit en 1802 par les Mérindol, une vieille famille savoyarde, propriétaire des lieux du XVIe siècle au XXe siècle. La toiture de cette demeure est à la Mansart, le corps central est plus élevé que les deux ailes. Le milieu de la façade est orné d'une statue de nymphe placée dans une logette creusée dans le mur. Les deux ailes d'un étage inclus dans la toiture avec des fenêtres géminées surmontées d'un fronton triangulaire. Malgré les mauvais traitements qu'elle a subis, la demeure retrouve enfin son aspect d'origine.                                                  VAUGOUARD, la construction du château débuta en 1750, sur demande du Colonel de Salis Samade, commandant du régiment Suisse de Salis Samade Grisoirs. Ce régiment était en charge de la protection du Roi de France, et eu un rôle important lors de la révolution Française, en étant notamment en charge de la protection de la Bastille en 1789.\r\nEn 1789, le Colonel de Salis Samade cède le domaine à son neveu, le Baron Henri de Triqueti. Élève du célèbre sculpteur Anne-Louis Girodet, Triqueti se voit confier la réalisation des portes de bronze de léglise de la Madeleine à Paris. Proche de la famille du Roi, il offrit le Château de Vaugouard en 1838 au Duc dOrléans, fils ainé du Roi Louis Philippe 1er, pour en faire un rendez-vous de chasse. Aujourd'hui golf hôtel.","habitants":"Hautes vernes; Foulques Nera                                                                        Vaugouard; Salis Samade Grisoirs.\r\n        \r\n        \"","divers":"A la Ferrière grav 1-2  et Vaugouard grav 3-4-5                          Haute vernes -6","gps":"","images":["../image/image_45/45_Ferri%c3%a8res_Vaugouard_1.jpg","../image/image_45/45_Ferri%c3%a8res_Vaugouard_2.jpg","../image/image_45/45_Ferri%c3%a8res_Vaugouard_3.jpg","../image/image_45/45_Ferri%c3%a8res_Vaugouard_4.jpg","../image/image_45/45_Ferri%c3%a8res_Vaugouard_5.jpg","../image/image_45/45_Ferri%c3%a8res_Vaugouard_6.jpg"]},"Consult_chateau_formulaire36f1":{"id":"Consult_chateau_formulaire36f1","dept":"45","canton":"La Ferté Saint-Aubin","commune":"La Ferté Saint-Aubin","nom":"Ferté_St_Aubin","type":"Château","periode":"XIX","histoire":"Quatre châteaux dans cet article dont Aulnettes, Beuvronnes, Bohardière,  et Chartraines. La Ferté  article à part.                                                                                            AULNETTES, la propriété de Mme Méder comprenait la terre des Aulnettes, La Mercerie, La Luzière, La Tuile et Les Brays. Jules Émery, négociant, époux de Jeanne Méder, hérite des Aulnettes et de La Mercerie. Une première demeure est élevée avec des communs vers 1877. En 1905, M. Roger Nivière acquiert La Mercerie et transforme la maison des Aulnettes en un château: une aile est ajoutée et une tourelle d'escalier est accolée sur la façade postérieure, puis le logis est prolongé par une fausse chapelle qui abrite une cuisine et une salle de bains au premier étage. Son fils Jean y adjoint en 1930 une aile, à l'ouest, qui termine la série des agrandissements. En 1960, la propriété est lotie, le propriétaire gardant la ferme de La Mercerie le reste est vendu et constitue le domaine actuel des Aulnettes.                                                                                     BEUVRONNE, l'histoire de la propriété de Beuvronne remonte aux XVIIe et XVIIIe siècles au cours desquels il semble qu'elle soit une métairie appartenant sans doute à un domaine plus important. Mais le château de ce nom, aujourd'hui détruit par un incendie, ne fut construit qu'en 1902 par les frères Transon, pépiniéristes orléanais. Au cours de la seconde guerre mondiale, il avait été loué à Georges Claude, chimiste, inventeur des lampes Claude.","architecture":"BOHARDIERE, l'origine du château de La Bohardière n'est pas expliquée, mais la propriété est très ancienne puisqu'elle apparaît comme métairie sur la carte du duché-pairie de 1675. L'orthographe du nom varie beaucoup dans le temps avec une prédilection au XIXe siècle pour la Bohardière. Construit sur l'emplacement d'une ferme qui aurait été rasée pour sa construction, la Bohardière remonte aux alentours de 1850 et aurait été élevée pour un orléanais qui, ruiné, l'aurait vendu inachevé à la comtesse de Serraincourt, qui en sera propriétaire jusqu'en 1903. Côté architecture, le château est remarquable par son style Louis XIII avec fronton triangulaire en arc de cercle sur la façade ouest.                                                                      CHARTRAINE, est un exemple typique d'une propriété solognote. Véritable petit village vivant pratiquement en autarcie comme cela se faisait au XIXe siècle, il présente une remarquable unité architecturale ou la brique domine presque exclusivement. Le domaine de Chartraine comprenait un château avec orangerie, autour duquel s'étendaient des communs avec le jardin-verger, la maison du jardinier, les écuries, le pigeonnier, le chenil, un kiosque, la glacière (aujourd'hui disparue) et plusieurs fermes. Sa construction daterait du dernier tiers du XIXe siècle.","habitants":"Aulnettes;M. Roger Nivière                                       Beuvronne;les frères Transon                                              Bohardière:  Comtesse de Serraincourt\r\n        \r\n        \r\n        \r\n        \"","divers":"Quatre châteaux dont Aulnettes grav-1, Beuvronnes grav_2, Bohardière grav-3,  et Chartraine grav-4.                                    Aulnettes_47° 42' 15\" nord, 1° 53' 14\"  est                                             Beuvronne  47° 40' 59\"  nord, 1° 58' 36\" est                                      Bohardière 47° 44' 19\" nord, 1° 58' 49\" est","gps":"","images":["../image/image_45/45_Fert%c3%a9_St_Aubin_1.jpg","../image/image_45/45_Fert%c3%a9_St_Aubin_2.jpg","../image/image_45/45_Fert%c3%a9_St_Aubin_3.jpg","../image/image_45/45_Fert%c3%a9_St_Aubin_4.jpg"]},"Consult_chateau_formulairea6b4":{"id":"Consult_chateau_formulairea6b4","dept":"45","canton":"La Ferté Saint- Aubin","commune":"La Ferté Saint-Aubin","nom":"Ferté_St_Aubin_II","type":"Château","periode":"XIX","histoire":"Cinq châteaux dans cet article; Chevau, Bellefontaine, Garonnière et de Grisonnière.                                                                           CHEVAU, dont les quatre pavillons lancent vers le ciel leurs toits quadrangulaires, a été reconstruit à la place d'un édifice antérieur en 1869 par Jules Bertrand, avant d'être agrandi quelques années plus tard. La façade sud, au rez-de-chaussée, est occupée en son centre par une galerie couverte d'arcades que surmonte une terrasse. Ses chapiteaux ioniques et ses médaillons aux écoinçons s'inspirent sans doute des planches gravées des hôtels Orléanais de la Renaissance comme celui de l'hôtel Toutin, publiées à la même époque. En 1595, Henri IV accorde à Jacques Hilaire, receveur des Finances de la généralité d'Orléans, l'autorisation de clore et de fortifier sa maison de murailles, pont-levis, tourelles, tours, et autres défenses pour son château. En 1762 il appartenait à Thomas Dillon Hussey, puis la succession de ses divers propriétaires n'est pas connue jusqu'à son acquisition par la famille de Patrice Pellat qui s'en sépara en 2002.                                                                                                            BELLEFONTAINE, le nom des Fontaines n'apparaît sur les cartes qu'à la fin du XIXe siècle et semble lié à la construction du château du même nom qui, comme beaucoup de demeures dans la région, a été construit en deux étapes. Le domaine a appartenu à la famille Louis de 1888 jusqu'en 1920. C'est d'ailleurs dans cette période, en 1900, que fut édifié le château. Il fut vendu entre 1921 et 1925 à la famille Boussion dont les biens furent divisés en 1962, entre les cinq héritiers.","architecture":"GORONIERE, c'est à H. Obled, propriétaire du domaine entre 1889 et 1911, qu'on doit la construction dans le style nèo-gothique du château de La Goronnière de 1890 à 1891, à partir d'une ossature métallique suivant un procédé mis au point par Gustave Eiffel. Le successeur de Obled, M. F. Robert agrandit la propriété par l'achat de terres en 1924 puis en 1931                                                                                                                  La GRISONNIERE,   faisait partie d'un vaste domaine avec La Papinière et La Chauvelière acquis en 1861 par Charles Pierre. Après sa vente par la famille Pierre en 1890, la propriété connaît une dizaine de propriétaires. Ce n'est qu'au début du siècle dernier qu'un château y est construit. Ce petit château solognot entouré dun beau parc paysager appartient aujourd'hui à  Madame Marie-Christine Héron-Vanneuville.                                                                               LANDES, la Lande d'autrefois dans ces pelouses au milieu desquelles on le voit surgir avec, en son centre, une tourelle, un toit gracieux et des pignons aux rampants étagés. Sa construction ne remonte guère qu'à 1870. En 1888, c'est E. Burgières, maire de La Ferté Saint Aubin de 1892 à 1900, qui en est propriétaire jusqu'en 1912, date à laquelle M. et Mme Plicque  s'en portent acquéreurs jusqu'en 1933. Aujourd'hui, le château des Landes héberge une maison de retraite et il a fait l'objet d'une mise en conformité aux règles de sécurité propres à ce type d'établissement.","habitants":"Chevau;Thomas Dillon Hussey,                                  Bellefontaine;famille Louis                                                          Goronière; H. Obled                                                                           Les Landes: E. Burgières\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Cinq châteaux à la Ferté st-Aubin;  Chevau, Bellefontaine, Garonnière, Grisonnière et des Landes.                                 Bellefontaine 47° 43' 51\" nord, 1° 56' 18\" est                                      Chevau  47° 44' 25\" nord, 1° 54' 55\" est                               Papinière   47° 42' 10\" nord, 1° 54' 55\" est","gps":"","images":["../image/image_45/45_Fert%c3%a9_St_Aubin_II_1.jpg","../image/image_45/45_Fert%c3%a9_St_Aubin_II_2.jpg","../image/image_45/45_Fert%c3%a9_St_Aubin_II_3.jpg","../image/image_45/45_Fert%c3%a9_St_Aubin_II_4.jpg"]},"Consult_chateau_formulaire3fc1":{"id":"Consult_chateau_formulaire3fc1","dept":"45","canton":"La Ferté Saint- Aubin","commune":"La Ferté Saint-Aubin","nom":"Ferté_St_Aubin_III","type":"Château","periode":"XVIII-XIX","histoire":"Trois châteaux  dans cet article ; Luzière, Muids, Popinière pas d'information et Ruth.                                                                                      LUZIERE.  M. Henri Bossange, qui fut maire de La Ferté-Saint-Aubin de 1900 à 1911, acheta le domaine de La Luzière, maison et ferme, Les Brays et La Tuile à M. Paul Méder, héritier de Mme veuve Méder. Il y fit construire en 1894 la demeure actuelle, qui se définit comme la juxtaposition de trois styles; normand, suisse et anglais, s'appuyant sur l'expérience architecturale passée, combinant dans un éclectisme débridé, principes, solutions et motifs d'époque et d'origines géographiques différentes. Ainsi, on peut remarquer dans la partie gauche, des arcades classiques que surmontent deux niveaux d'élévation, marqués par les modèles réalisés à la fin du siècle dans de nombreux édifices balnéaires puis un corps central, dont la volumétrie n'est pas sans rappeler les chalets suisses et, enfin, une aile dont le décor imbrique les motifs de l'architecture à pans de bois de tradition médiévale et les bois découpés. Après le morcellement de la propriété par Mme veuve Bossange, le château est acheté par la ville de Bezons, qui en a fait un important centre de vacances.                                                                LANDES, la Lande d'autrefois dans ces pelouses au milieu desquelles on le voit surgir avec, en son centre, une tourelle, un toit gracieux et des pignons aux rampants étagés. Sa construction ne remonte guère qu'à 1870. En 1888, c'est E. Burgières, maire de La Ferté Saint Aubin de 1892 à 1900, qui en est propriétaire jusqu'en 1912, date à laquelle M. et Mme Plicque  s'en portent acquéreurs jusqu'en 1933. Aujourd'hui, le château des Landes héherge une maison de retraite","architecture":"Des MUIDS, en 1741, le capitaine de Vaisseau  M. Henri Bossange, Ecossais dorigine, officier de la couronne Britannique il décide de racheter une propriété et dy créer le domaine des Muids. Il fera édifier la partie centrale du château. En 1869, son fils Henri Thomas construit laile nord puis laile sud de la bâtisse. Au début du XIXe siècle, il nétait pas rare de rencontrer aux Muids, le prince Murat, ami de la famille ou plus tard labbé lHermite qui trouva en cette demeure linspiration de beaucoup de ses écrits. En 1886 le domaine est acquis par les Maes. Ils y apportent les boiseries, font combler une partie des douves et plantent les abords de la demeure dessences rares, ils la conservent par voie dhéritage jusqu'en 1983 date à laquelle la propriété fut cédée afin dy être aménagée en hôtel-restaurant.                                                                               RUTH, au début du XIXe siècle, en 1824, le château appartenait au château de La Ferté. C'est le docteur  M. Henri Bossange qui aurait fait construire l'édifice vers 1875, laquelle passa aux Caussin de Parceval puis aux Chauffard. En 1959, les 250 hectares de la propriété sont vendus séparément au gré des besoins de son propriétaire. Bernard Toulier classe la propriété comme éclectique, néo-gothique, l'architecte a joué sur la symétrie et l'asymétrie selon un concept dégagé des contraintes académiques qui accentuent les effets additifs provoqués par des accumulations, probablement en plusieurs étapes, de tourelles, d'ailes et d'annexes aux volumes contrasté.","habitants":"Luzière; M. Henri Bossange                                                           Les Muids: M. Henri Bossange                                                    Ruth:  M. Henri Bossange\r\n        \r\n        \"","divers":"Trois châteaux àla Ferté st-Aubin ; Luzière grav-1-2, Muids grav-3-4-5, Popinière  et Ruth grav-6-7.                                               La Ferté 47° 41' 11\" nord, 1° 55' 04\" est                                  Landes 47° 40' 28\" nord, 1° 58' 30\" est                                                         Luzière   47° 42' 03\" nord, 1° 53' 07\" est                                                         Muids  47° 40' 25\" nord, 1° 58' 09\" est                                                         Ruth  47° 41' 07\" nord, 1° 57' 17\"  est","gps":"","images":["../image/image_45/45_Fert%c3%a9_St_Aubin_III_1.jpg","../image/image_45/45_Fert%c3%a9_St_Aubin_III_2.jpg","../image/image_45/45_Fert%c3%a9_St_Aubin_III_3.jpg","../image/image_45/45_Fert%c3%a9_St_Aubin_III_4.jpg","../image/image_45/45_Fert%c3%a9_St_Aubin_III_5.jpg"]},"Consult_chateau_formulaire4570":{"id":"Consult_chateau_formulaire4570","dept":"45","canton":"La Ferté Saint-Aubin","commune":"La Ferté Saint-Aubin","nom":"Ferté_St_Aubin_IV","type":"Château","periode":"XVI-XVII","histoire":"FERTE St-AUBIN,  en 1250, c'est un Renaud de l'Isle qui est seigneur de La Ferté par son mariage avec Isabeau, fille de Henri des Nids. Ensuite c'est les Mornay et les Graçay qui en deviennent propriétaires par mariage avec des de l'Isle. Puis leur succèdent les de Meung, les La Châtre, les d'Estampes, puis Louise d'Estampes, dame de la Ferté Nabert, qui meurt sans enfants en 1575, en faisant hériter les Saint-Nectaire. A partir de ce moment, les documents ne manquent pas. La famille est connue est illustre. Elle existe encore et porte le nom de Ferté-Senectère. C'est Henri de Saint-Nectaire qui construisit la partie gauche du château en briques dite \"le petit château\". En 1617, la terre de la Ferté est érigée pour lui en marquisat par le Roi Louis XIII. Son fils Henri II fut un vaillant soldat, et il devint maréchal de France et le Roi le récompensa en érigeant la Ferté Nabert en duché pairie sous le nom de la Ferté Senecterre. Le maréchal de Senectère mourut en 1681 après avoir commencé la reconstruction du château, c'est lui qui éleva le beau corps de logis de la partie droite dont une moitié seulement a été réalisée, on en a longtemps attribué les plans à Jules Hardoin Mansard puis à Thibaut Poissant qui travailla à Vaux-le-Vicomte. On pense aujourd'hui qu'il a été érigé vers 1630 par l'architecte du duc d'Orléans Théodore Lefèvre. En 1746, il fut vendu au maréchal de Lowendal qui ne le garda que 9 ans, mais ajouta les communs situés sur la partie droite du château.","architecture":"FERTE St-AUBIN ( suite), après avoir changé de mains plusieurs fois le château fut vendu en 1822 à François Victor de Masséna, prince d'Essling, duc de Rivoli, fils du célèbre général d'Empire, le nouveau propriétaire s'y ruina en fêtes et dépenses somptuaires. Le château devait changer de nombreuses fois de propriétaires avant d'être acheté en 1947 par le comte d'Hoffelize. Aujourdhui  la famille Lancelot,                                                                               faisant abattre, l'ancienne forteresse, qui occupe un vaste terre plein entourés de douves le nouveau propriétaire, construction en trois périodes différentes reprenant des éléments plus anciens, fait construire la partie gauche du logis que l'on appelle \" le petit château\", il s'agit d'un pavillon bas à haut comble, flanqué d'un pavillon plus étroit, dont l'appareil est en briques irrégulières dessinant un motif de croisillons. Fenêtre du rez -de-chaussée  surmontées de frontons triangulaires sont entourées de chaînages de pierre blanche. Le grand château  présente un corps de logis central dans l'alignement du petit du côté de la cour, flanqué d'un important pavillon en forte saillie, les façades de briques  sont rythmées par des pilastres de calcaire blanc. Le portail d'entrée monumental, couronné d'un fronton, auquel on accède depuis un pont dormant s'élèvent deux pavillons carrés coiffé d'un toit en dôme. Composé de bâtiments d'âges différents qui lui font gagner en originalité ce qu'il perd en unité.   Entouré d'eau et de bois, majestueux bien que disparate.","habitants":"Famille de les Saint Nectaire\r\n        \r\n        \"","divers":"à la Ferté st-Aubin                                                                         La Ferté  47° 43' 35\" nord, 1° 56' 36\" est                                    La Ferté  47° 41' 11\"nord, 1° 55' 04\" est","gps":"","images":["../image/image_45/45_Fert%c3%a9_St_Aubin_IV_1.jpg","../image/image_45/45_Fert%c3%a9_St_Aubin_IV_2.jpg","../image/image_45/45_Fert%c3%a9_St_Aubin_IV_3.jpg","../image/image_45/45_Fert%c3%a9_St_Aubin_IV_4.jpg","../image/image_45/45_Fert%c3%a9_St_Aubin_IV_5.jpg","../image/image_45/45_Fert%c3%a9_St_Aubin_IV_6.jpg","../image/image_45/45_Fert%c3%a9_St_Aubin_IV_7.jpg"]},"Consult_chateau_formulaire2b6a":{"id":"Consult_chateau_formulaire2b6a","dept":"45","canton":"Montcresson","commune":"Forest","nom":"Forest_45","type":"Château","periode":"XII-XVII-XIX","histoire":"La FOREST, des documents font remonter le domaine et le château à l'époque de Saint-Louis. Un pavillon de chasse aurait existé à l'emplacement de l'édifice actuel, reconstruit vers 1600. Il était entouré d'une enceinte, avec des tours, détruite par Mac Mahon vers 1865. Le maréchal Mac Mahon, qui en fit sa résidence de 1860 à 1893, année de sa mort, fit construire la salle à manger en terrasse, devant le rez-de-chaussée, ainsi que le jardin d'hiver accolé à la tour de défense. Les intérieurs du château sont marqués par le XIXe siècle  Le corps de logis primitif est couvert d'ardoise.  Inscription aux M.H.  par arrêté du 29 septembre 1986.","architecture":"La FOREST, seul  subsiste trois tours, le bâtiment du XVIIe siècle est un long quadrangulaire d'un étage sur rez-de-chaussée, surmonté d'une haute toiture aux combles éclairés de cinq lucarnes de briques aux frontons alternés en arcs ou triangles. Cette façade nord a été complétée, au XIXe siècle, d'un perron à quatre colonnes en tronçons et, à l'est, par une chapelle couverte en dôme complétée d'une tourelle d'angle, le tout à la demande de Mac Mahon. La façade sud a été prolongée à la fin du XVIIe siècle par deux pavillons et ailes en retour, dont les encadrements de fenêtres semblent avoir été repris au XIXe siècle. L'aile en retour Est a été complétée, au XIXe siècle, par un bâtiment qui lui est perpendiculaire, devant le rez-de-chaussée, ainsi que le jardin d'hiver accolé à la tour de défense. Les intérieurs du château sont marqués par le XIXe siècle.  Le corps de logis primitif est couvert d'ardoise.","habitants":"Maréchal Mac Mahon\r\n        \"","divers":"A Montcresson  château le Forest  47° 53' 38\" nord, 2° 49' 13\" est","gps":"","images":["../image/image_45/45_Forest_45_1.jpg","../image/image_45/45_Forest_45_2.jpg"]},"Consult_chateau_formulaire5c89":{"id":"Consult_chateau_formulaire5c89","dept":"45","canton":"Jargeau","commune":"Férolles","nom":"Férolles","type":"Château","periode":"XV-XVII","histoire":"Deux châteaux dans cet article; Gué-Gaillard et le Queuvre.   GUE-GAILLARD, si dom Morin, le vénérable bénédictin qui écrivit l'Histoire du Gâtinais au XVIIe siècle revenait, retrouverait-il au Gué-Gaillard l'allure martiale de la citadelle, dont s'empara le chevalier de Villers au cours des guerres de Religion, certainement pas. De la forteresse du XVe siècle, transformée au XVIIe et au XVIIIe siècle, puis remaniée au cours des deux siècles suivants, le château dont les ailes nord-est et sud-est ont été détruites après 1832, mais dont les actuelles façades sont généreusement éclairées de grandes baies donnant sur les douves, a gagné en charme et en élégance ce qu'il a sans doute perdu en arrogance et en rudesse. Les communs datent de la seconde moitié du XIXe siècle.","architecture":"la QUEUVRE, il subsiste peu de choses du beau rendez-vous de chasse du duc de Penthièvre, dépendant de Châteauneuf sur Loire, cependant les quelques bâtiments qui restent, bien que transformés en ferme, ornés de tourelles et coiffés de hautes toitures, permettent de juger ce que fut cette résidence où Louis XIV avait couché en 1659, lors de son voyage dans les Pyrénées pour conclure son mariage avec l'infante Marie Thérèse d'Autriche. Mais le domaine a une origine encore plus ancienne, puisqu'au XIVe siècle, Pierre de la Ferté était à la fois seigneur de la Ferté Hubert, du Bruel et de la Queuvre. En 1480, Étienne de Saint-Mesmin était seigneur de la Queuvre et il appartint ensuite à Jean des Barres du fait de son mariage avec Jeanne de Saint-Brisson. En 1458, Aignan de Saint-Mesmin achète La Queuvre à Michel de Beauvilliers, écuyer, seigneur de la Ferté-Hubert. C'est sans doute son fils qui construisit cette maison entre 1515 et 1520.  Inscription par arrêté du 12 janvier 1931.","habitants":"\"","divers":"Deux châteaux à Férolles, Gué-Gaillard grav-2-3 et le Queuvre grav-1.                                                                                Gué Gaillard  47° 49' 15\" nord, 2° 05' 47\" est                                                                                                         le Queuvre  47° 49' 43\" nord, 2° 09' 05\" est","gps":"","images":["../image/image_45/45_F%c3%a9rolles_1.jpg","../image/image_45/45_F%c3%a9rolles_2.jpg","../image/image_45/45_F%c3%a9rolles_3.jpg"]},"Consult_chateau_formulaire86e3":{"id":"Consult_chateau_formulaire86e3","dept":"45","canton":"Beaune-la-Rolande","commune":"Garennes_Barville","nom":"Garennes_Barville","type":"Château","periode":"XVI","histoire":"GARENNES, ce château, aujourd'hui en ruines, a eu jadis un rôle important car il fut le berceau de la famille de Barville (seigneurs de Maisoncelles, le Coudray, le Buisson, etc.) qui se poursuivit jusqu'à la Révolution et s'éteignit avec Louis de Barville qui résidait à Pithiviers et qui fut député de la noblesse aux états généraux de 1789. La famille de Barville remonte à l'époque de Philippe Auguste. En 1430, on trouve Guillaume de Barville, seigneur des Garennes et de Gaubertin, puis son fils Louis qui épousa Jacqueline de Longueau de Saint Michel et mourut en 1524. En 1528, les Garennes furent vendues à Richard de Saint Martin, un huguenot. Sa petite-fille, Marie de Saint Martin, épousa Bertrand de Barville qui rentra ainsi en possession du château familial. Le XVIIIe siècle fut une période qui marqua le déclin de la demeure qui fut démembrée et passa en de nombreuses mains parmi lesquelles Félix Laperche dont la famille possédait le château de Rochefort.","architecture":"GARENNE, de plan rectangulaire à deux niveaux avec lucarnes sur combles  toit en croupe accolé de tourelles aux extrémité toit en poivrière. En plein centre de façade avant corps d'entrée saillant de trois étages avec support à la base.","habitants":"famille de Barville\r\n        \r\n        \"","divers":"à Barville en Gâtinais le château de la Garenne","gps":"","images":["../image/image_45/45_Garennes_Barville_1.jpg","../image/image_45/45_Garennes_Barville_2.jpg","../image/image_45/45_Garennes_Barville_3.jpg"]},"Consult_chateau_formulaire7123":{"id":"Consult_chateau_formulaire7123","dept":"45","canton":"Beaugency","commune":"Lailly en Val","nom":"Gaschetières","type":"Château","periode":"XVII-XX","histoire":"GASCHETIERES, appartenant à Claude Galmet, veuve de J-J. Bigot, fut adjugé à Guillaume Cornuel leur gendre, époux d'une célèbre précieuse, Anne Bigot, le 30 août 1635. Ce dernier, adjudicataire de 5 grosses fermes en 1620, trésorier de l'extraordinaire des guerres en 1628 et traitant dans les années 1635-1645, fit reconstruire le château vers 1643-1645. Un demi-plan, non daté (XVIIe ou XVIIIe siècle), nous fait connaître l'existence primitive d'un double escalier tournant à 3 volées droites construit dans l'aile droite, à droite du vestibule d'entrée, et maintenant disparu. En 1650, il fit élever le petit pavillon à usage de chapelle implanté devant et à gauche de la façade principale, chapelle sous l'invocation de la Sainte-Vierge et de Sainte-Anne. Un second pavillon voué à l'habitation, lui est symétrique et contemporain. Le domaine resta la propriété de sa famille jusqu'à son achat en 1730 par le fermier général Thoynard de Jouy. Ses descendants en furent propriétaires jusqu'au tout début du XIXe siècle. Le 17 janvier 1836 c'est la famille Fricon qui l'acheta et réalisa les importants travaux, avec un nouvel escalier édifié au même endroit que le précédent. Les noms de Ricard, architecte orléanais et Louis Parent, architecte parisien, apparaissent sur des mémoires en 1867 et 1877 pour l'un et 1884 et 1887 pour l'autre, une serre chaude fut construite en 1867 par Benjamin Ricard, Couturier, entrepreneur, et Charpentier frères, fabricants de serres de jardin à Orléans.","architecture":"GASCHETIERES, (suite)  les lucarnes primitives du château ont été détruites au XXe siècle. La ferme et ses dépendances figurent en plan, et furent modifiées ou construites au XIXe siècle ou au début du XXe siècle. Le colombier fut transformé en habitation avant la guerre de 1939-40. Une importante grange aux murs en bauge, sans doute antérieure à la Révolution, est visible à l'extrémité sud des dépendances. Château en brique et pierre avec toits à longs pans à croupes ; logement symétrique du jardinier en brique et pierre à toit en pavillon avec court faîtage ; colombier et logement de domestiques, à la base des jambages du H des dépendances, ont un étage carré ; les murs sont en moellon enduit et les toits en pavillon ; l'ensemble des autres bâtiments en rez-de-chaussée sont en moellon enduit avec généralement des baies en brique et pierre, toit à longs pans et noues couverts de tuile plate ou d'ardoise ; parallèlement à la barre du H, part au sud, de l'extrémité du jambage droit jusqu'au niveau de l'autre jambage, la grange en bauge étayée par des contreforts en pierre alternant inégalement avec des jambes de briques de l'épaisseur des murs ; sa charpente, peu ancienne, est couverte de plaques de fibro-ciment ondulé; le pignon visible est en moellon enduit ; serre en fer, verre, brique et moellon enduit. Sur le dessus de la porte d'entrée du château et sous la voûte de la chapelle armes sculptées de François-Marie-Roland de Fricon et Thérèse Huchet de Quenetain.","habitants":"famille Fricon\r\n        \"","divers":"A Lally en Val, la Gaschetières","gps":"","images":["../image/image_45/45_Gascheti%c3%a8res_1.jpg","../image/image_45/45_Gascheti%c3%a8res_2.jpg"]},"Consult_chateau_formulaire1eba":{"id":"Consult_chateau_formulaire1eba","dept":"45","canton":"Beaune-la-Rolande","commune":"Gaubertin","nom":"Gaubertin","type":"Château","periode":"XV-XIV","histoire":"GAUBERTIN, au début du XIVe siècle, il appartenait à la famille de Barville, on signale à cette époque Hugues vers 1355, et Guillaume vers 1370. En 1450, Guillaume II de Barville était seigneur de Gaubertin, Barville (les Garennes) et autres lieux. Cette terre de Gaubertin passa à la famille des Hayes en 1404. Jeanne des Hayes la porta en mariage à Pierre de Bougy, dont la famille était originaire d'un vilIage de la forêt d'Orléans. Leur fils, Christophe de Bougy, seigneur d'Ascoux et la Motte-Chemault, devint seigneur de Gaubertin en 1492; il eut trois femmes. De la dernière naquit Claude qui épousa Jeanne de Montcelars leur fils, Jean de Bougy comparut en 1509 à la rédaction de la coutume d'Orléans, et il fut tué le 14 septembre 1515 à Saint Julien près de Marignan ou il fut inhumé. Au XVIe siècle, M. de Verton, Trésorier de France, acquit le domaine qu'il habita avec sa famille jusque vers 1600. Puis, le château passa jusqu'en 1627 entre les mains de Jean Boitel, De 1627 à 1660, la famille de Harlay Montmorency et Harlay Sancy tient Gaubertin en fief. Puis la famille du Deffant possède Gaubertin et en 1728 préside au baptême de la cloche de l'église. Avant la Révolution les chevaliers de la Taille deviennent seigneurs de Gaubertin-Sancy. Au XIXe siècle, François Louis Alexandre Barbot est propriétaire de Gaubertin, mort en 1832. Le château est ensuite acheté par M. Louis-Théodore Anceau, mort en 1888. Il s'est transmis par les femmes dans la même famille. Ainsi, l'ont possédé Mme Royer, Mme Poulain, Mme Brillé et sa fille, Mme Gulon, qui poursuit sa restauration.","architecture":"GAUBERTIN a  conservé un corps de bâtiment flanqué de deux tourelles en encorbellement qui montre bien sa parenté avec les châteaux du voisinage (Barville, Bellegarde etc.).                                                                                                                  MARIE,  est attesté dès le XIVe siècle comme propriété des Barville ; il fut reconstruit au XVe siècle après sa destruction par les anglais; la demeure actuelle datant du XIXe siècle, est en cours de restauration et les communs également du XIXe siècle. L'édifice se compose de deux étages carrés et un étage en surcroît, le gros-oeuvre en calcaire, moellon et enduit, élévation à travées, escalier dans-oeuvre, les couvertures: toit à longs pans; croupe; toit en pavillon et toit conique, couverts d'ardoise.","habitants":"famille de Barville                                                                         famille du Deffant \r\n        \"","divers":"Château de Gaubertin grav-1-2              Marie grav-3                                48° 07' 23\" nord, 2° 25' 46\" est","gps":"","images":["../image/image_45/45_Gaubertin_1.jpg","../image/image_45/45_Gaubertin_2.jpg","../image/image_45/45_Gaubertin_3.jpg"]},"Consult_chateau_formulairef1b0":{"id":"Consult_chateau_formulairef1b0","dept":"45","canton":"Beaune-la-Rolande","commune":"Egry","nom":"Gaudigny","type":"Forteresse","periode":"XV","histoire":"Deux châteaux dans cet article ;  Gaudigny, et la Mothe-Egry. GAUDIGNY, perdu au milieu des labours, caché dans un bosquet, le château de Gaudigny est généralement inconnu c'était cependant un fief important qui dépendait, à l'origine, de la seigneurie des Lyards, près de Corbeilles. Les premiers seigneurs connus furent Celeran en 1152, puis Caleran de Gaudigny en 1182. Un de ses descendants, l'abbé de Saint-Jean de Sens, un autre, seigneur de la Motte d'Egry en 1360. Puis la terre passa à Guillaume de Beaune, dit Roland, sire de Gaudigny, dont la tombe se trouvait dans l'église. Son dessin avait été relevé par Ed. Michel, ses armes portaient la quinte feuille et un lambel. Au retour d'un pèlerinage en terre sainte il donna sa terre à l'abbaye de Saint Denis, et c'est des moines de Saint-Denis que Laurent de Lanquedoüe reçut le fief de Gaudigny. Il avait épousé Claude de Billy et leur fille, Jeanne, porta Gaudigny en dot dans la famille du Roux qui le conserva un siècle environ, jusqu'à ce que Marie Anne du Roux épouse Henri de Gouju, seigneur de Chapuiseau. Leur fille épousa un célèbre marin, l'amiral Roland Barrin de la Galissonnière, gouverneur du Canada de 1747 à 1749. C'était un ami de Duhamel du Monceau et il favorisa l'importation de plantes exotiques que le savant agronome essayait de naturaliser dans son pays.","architecture":"GAUDIGNY, détruit une première fois par les Anglais avait été dévasté une deuxième fois au moment des guerres de religions, en novembre 1587 par les reîtres et les lansquenets qui avaient été défaits à la bataille de Vimory et qui traversaient le Gâtinais avant d'être écrasés à Auneau en Beauce. Son mur d'enceinte n'était plus que ruines, mais le château subsistait. Au XIXe siècle, il fut transformé en ferme mais il a été récemment restauré avec goût. Il a gardé un bel escalier à vis et une vaste cheminée aux montants sculptés et à la hotte en pierre de taille portant écusson. Edmond Michel qui l'a représenté croyait y reconnaître les armes de la famille de Billy, mais il s'agit en réalité de celles de Languedoüe. Inscription par arrêté du 13 mars 1991.                                                                                                        MOTHE-EGRY, il ne reste plus guère que quelques pans de mur et un pont de pierre enjambant un fossé plein d'eau. En 1360, son seigneur était Jean de Gaudigny qui le tenait d'un conseiller à la chambre des Requêtes du roi du nom de L'Huillier. Jean de Gaudigny le revendit à Philippe de Villiers qui le céda à la famille des L'Huillier. Cette maison connut surtout son heure de célébrité lorsque le Roi Louis XI y vint voir sa \"mie\" Louise L'Huillier, il y séjourna et signa de nombreuses lettres patentes portant les dates de 1466. Il y tomba malade, ses médecins lui ayant prescrit comme remède, l'eau d'une fontaine proche, le Roi, méfiant, la fit goûter (ou peser) par ses proches pour voir si elle n'était pas toxique. Aussi, depuis, cette fontaine a-telle reçu le nom de \"Fontaine pesée\".","habitants":"Famille du Roux                                                                         Famille des L'Huillier\r\n        \"","divers":"Deux châteaux à Egry  Gaudigny grav-2-3, et la Mothe-Egry grav-1.","gps":"","images":["../image/image_45/45_Gaudigny_1.jpg","../image/image_45/45_Gaudigny_2.jpg","../image/image_45/45_Gaudigny_3.jpg"]},"Consult_chateau_formulairea500":{"id":"Consult_chateau_formulairea500","dept":"45","canton":"Beaugency","commune":"Beaugency","nom":"Gibaudières","type":"Château","periode":"XVIII-XIX","histoire":"GIBAUDIERES, Pellieux signale vers 1800 des \"médailles en bronze des 1ers empereurs romains trouvées en différents endroits de la ville de Beaugency\" qui attestent la présence d'un habitat local durant la période gallo-romaine. Il faut ensuite remonter au IXe ou au début du Xe siècle pour avoir de nouveaux indices d'une présence humaine. Plusieurs pièces de monnaies d'un atelier monétaire balgentien du temps de Charles le Simple désignent le lieu comme un castrum ou un castellum.","architecture":"GIBAUDIERES; château  du XVIIIe-XIXe siècles, flanqué de tourelles.  Élégante construction du XVIIIe siècle, le château des Gibaudières a été profondément remanié au XIXe siècle. Il y avait donc là une demeure fortifiée autour de laquelle se maintenait un habitat. De cette époque rien ne subsiste. C'est peut-être au XIe siècle que fut élevée la première enceinte de la ville dont ne sont conservés que la porte de l'Horloge et des vestiges de murs. Entre 1118 et 1130 fut élevée la deuxième enceinte de la ville. Il est composé d'un corps de logis principal à un étage carré, dont les pignons latéraux sont flanqués de deux petites tourelles à chapeau pointu. Deux pavillons couverts de tuiles plates ponctuent l'ensemble, tandis qu'à l'arrière une petite tourelle à pans coupés est coiffée d'un toit polygonal. Le corps de logis, couvert d'ardoises, a gardé sa frise de faîtage. L'architecte parisien, Marcel Dastugue, qui a habité cet édifice à partir de 1929, a fait construire la galerie reliant la tourelle ronde à la tourelle hexagonale.","habitants":"Marcel Dastugue\r\n        \r\n        \"","divers":"A Beaugency château de la  Gibaudieres","gps":"","images":["../image/image_45/45_Gibaudi%c3%a8res_1.jpg","../image/image_45/45_Gibaudi%c3%a8res_2.jpg"]},"Consult_chateau_formulaire1196":{"id":"Consult_chateau_formulaire1196","dept":"45","canton":"Gien","commune":"Gien","nom":"Gien_Marcault","type":"Château","periode":"XIV-XV-XVI","histoire":"GIEN; Le comté de Gien remonte au XIe siècle, Rainaud ancêtre de la lignée épouse en 1015, la fille du roi Robert. Philippe Auguste rattache Gien au domaine royal. En 1307 le château est cédé en apanage par Philippe le Bel à son frère Louis, comte d'Evreux, il revient à la couronne  un siècle plus tard. En 1410 le jeune duc d'Orléans s'allie  aux ducs de Berry, le château est cédé au comte de Henrichemont connétable de France, puis aux Dunois fidèle compagnon de Jeanne d'Arc , et compta plusieurs propriétaires au Moyen-Age. La fin du XVe siècle le domaine est l'apanage de Pierre de Bourbon. La construction du château pour Anne de Beaujeu comtesse de Gien et fille aînée de Louis XI, marié à quatorze ans,  en 1474 au sire de Beaujeu, futur duc Pierre II de Bourbon. Anne à la mort de son père  et de son frère elle fut nommée régente du royaume. En 1522 décès d'Anne de Beaujeau.  Par trahison du connétable de Bourbon, tous ces biens furent confisqués. François Ier signa l'acte sur lequel y confiait à sa mère  Louise de Savoie. Au moment de la Fronde , en 1652, Louis XIV enfant et la reine mère Anne d'Autriche chassé par l'émeute trouvèrent à Gien un asile. Le château passa par la suite à divers propriétaires avant d'être confisqué sous la Révolution, menacé par la\" bande noire\" il fut sous l'Empire acquis par le département du Loiret. Le château de Gien devient propriété du département en 1823 abritant tour à tour la sous-préfecture, le tribunal et la prison. En 1842, le château est classé M.H.,  et héberge le musée international de la chasse crée sous l'impulsion d'Henri de Linarès en 1952.","architecture":"MARCAULT, à Poilly les Gien une seigneurie de Marcault existait déjà aux XVe et XVIe siècles. À la fin du XIXe siècle la propriété a été achetée par une famille originaire de Gien, les Janson de Couët. Elle comportait à l'époque un château du XVIIe siècle en mauvais état, qui a été remplacé en 1910 par le château actuel. L'édifice comprend un corps central à trois travées surmonté d'un toit à l'impériale agrémenté d'un clocheton et des ailes en ressaut. La jeune Bernadette Chaudron de Courcel, future épouse du président Chirac. Suivant la tradition, le parc a été dessiné par Édouard André  collaborateur du baron Haussmann, l'entreprise \"Guist'hau Concept\", actuel propriétaire.                                                                   GIEN, le château de Gien fut d'abord un édifice médiéval construit à l'emplacement d'un rendez-vous de chasse de 1494 à 1500. Le seul vestige subsistant de cette époque est la tour carrée située sur la façade sud, la Tour \"Charlemagne\". Le château fut remanié dès la fin du XVIe siècle, le bâtiment hébergea Henri II et Catherine de Médicis, puis Louis XIV et Anne d'Autriche durant la Fronde. L'architecture particulière du château est un exemple de géométrie appliquée comme en témoignent les dessins de façade formés par les briques polychromes, les vastes fenêtres révèlent l'esprit de la première Renaissance française, les tourelles logeant les escaliers à vis. Après avoir reçu les plus grands souverains de notre histoire (François Ier, Louis XIV notamment), .","habitants":"Anne de Beaujeu                                                                          Marcault; Bernadette Chaudron de Courcel, Mme Chirac.\r\n        \"","divers":"Deux châteaux à Gien dont Gien grav de 3 à 9  et Marcault grav-1-2.                                                                                           Gien; 47° 41' 06\" nord, 2° 37' 54\" est","gps":"","images":["../image/image_45/45_Gien_Marcault_1.jpg","../image/image_45/45_Gien_Marcault_2.jpg","../image/image_45/45_Gien_Marcault_3.jpg","../image/image_45/45_Gien_Marcault_4.jpg","../image/image_45/45_Gien_Marcault_5.jpg","../image/image_45/45_Gien_Marcault_6.jpg","../image/image_45/45_Gien_Marcault_7.jpg","../image/image_45/45_Gien_Marcault_8.jpg","../image/image_45/45_Gien_Marcault_9.jpg"]},"Consult_chateau_formulaire0841":{"id":"Consult_chateau_formulaire0841","dept":"45","canton":"Ferrières-en-Gâtinais","commune":"Griselles","nom":"Griselles","type":"Châteux","periode":"XVII-XVIII-XIX","histoire":"Deux châteaux dans cet article dont Bois le Roi et Fontaine.                                                                                       BOIS le ROI, le premier seigneur était Pierre Ozon, sieur de La Borde, prévôt lieutenant  à Montargis. Le domaine passa ensuite à François Jean Baptiste de La Salva qui le fit bâtir en 1655  Il changea plusieurs fois de propriétaires et passa en 1828 aux mains du comte Joseph de Villeneuve-Bargemont. Il fut très connu à la cour de Charles X et de Louis Philippe. En 1820, il épousa Constance Hyacinthe Isaure de Brosses, fille du préfet de Nantes. Le comte de Villeneuve-Bargemont eut plusieurs enfants, et la plus célèbre fut Marguerite qui épousa, en 1849, le vicomte Jean Marie de Revier de Mauny, peintre et dessinateur, Marguerite elle-même réalisa le plafond du bureau et des panneaux de céramique.                                                                         FONTAINE,  le château de la Fontaine, qui date sûrement de la fin du XIXe siècle, a une origine beaucoup plus ancienne et doit son nom à la présence d'une source. Signalé dès le Moyen-Age, il a été détruit, puis reconstruit plusieurs fois. Au XVIIe siècle, le château appartenait à Mme de la Place, veuve d'un officier du duc d'Orléans. Son fils fut juge de paix à Montargis et, au moment de la Révolution, il se réfugia à La Fontaine, loin des agitations de la ville.","architecture":"BOIS le ROI, bâtit en 1655 le château actuel, en remplacement de l'édifice du temps de Louis VII. La construction se limitait au pavillon central, de style Louis XIII, en moelIon et brique, un étage surmonté d'un toit à la Mansart.  élever en 1845  les deux ailes du château, les écuries, les communs et l'orangerie.                                                                                             FONTAINE, le propriétaire suivant fut le Comte de Brosses. M. de Brosses fit raser l'ancien château pour bâtir en 1840 cette très grosse demeure massive, à un étage, coiffée d'une toiture à la Mansart, l'entourage des fenêtres en brique ressort sur l'enduit clair des murs. Cette demeure fut meublée et décorée richement.","habitants":"Bois le roi; Pierre Ozon                                                                Fontaine; Comte de Brosses\r\n        \"","divers":"Deux châteaux à Griselles, Bois le Roi grav-1-2 et Fontaine grav 3.","gps":"","images":["../image/image_45/45_Griselles_1.jpg","../image/image_45/45_Griselles_2.jpg","../image/image_45/45_Griselles_3.jpg"]},"Consult_chateau_formulaire1479":{"id":"Consult_chateau_formulaire1479","dept":"45","canton":"Beaugency","commune":"Tavers","nom":"Guignes_Tavers","type":"Château","periode":"XVIII-XIX","histoire":"GUIGNES,  le château, derrière sa grande porte cochère, est situé sur le coteau de Guignes fameux pour ses vins autrefois. Le vignoble de Guignes a disparu vers 1990. Il y avait là une maison de maître appelée Briard qui appartenait à la fin de l'ancien régime à Etienne Lemoyne, procureur au parlement de Paris. Vers 1850 la propriété est aux mains d'Alcide Lasseux qui fait construire, à la place de la maison, la demeure que l'on peut voir aujourd'hui, composée d'un corps de logis et de deux pavillons. Depuis 1870, le château des Guignes est dans la même famille. Autour du château, le parc fleuri, arboré, en terrasse, est traversé par la rivière le Lien, bassins, jets d'eau, puits, sources complètent ce jardin pas comme les autres.","architecture":"GUIGNES, cette demeure, édifiée au milieu du XIXe siècle, occupe le flanc du coteau au pied duquel coule la rivière le Lien. Cette situation explique la structure du bâti, à deux niveaux côté rue et à trois niveaux côté val. La façade nord sur la rue de Guignes, a été agrandie autour de 1900 par un important avant corps couvert d'une terrasse à balustrade abritant un vestibule d'entrée. De part et d'autre de l'avant corps, deux tourelles ponctuent la façade: l'une hexagonale en encorbellement et à toit polygonal, et l'autre circulaire, à toit conique. Le jardin, aménagé en terrasses, abrite un puits à l'élégante ferronnerie et des communs (remises, écuries, orangerie) à l'architecture soignée, en brique, pierre et enduit.","habitants":"Etienne Lemoyne\r\n        \"","divers":"Le château de Guignes à Tavers, le Clos grav-3","gps":"","images":["../image/image_45/45_Guignes_Tavers_1.jpg","../image/image_45/45_Guignes_Tavers_2.jpg","../image/image_45/45_Guignes_Tavers_3.jpg"]},"Consult_chateau_formulairea490-2":{"id":"Consult_chateau_formulairea490-2","dept":"45","canton":"Château-Renard","commune":"Gy-les-Nonains","nom":"Gy_les_Nonains","type":"Château","periode":"XVIII-XIX","histoire":"Deux châteaux dans cet article; Changy et Garennes.                    CHANGY, est agréablement situé sur les bords de l'Ouanne, il a appartenu longtemps à une branche bâtarde de la famille de Courtenay, cette branche était issue de Pierre de Courtenay, qui a toujours passé pour le fils naturel que Jean de Courtenay, seigneur de Champignelles, et qu'il eut de Jeanne de la Brosse. Ses descendants demeurèrent à Changy jusqu'à François de Courtenay, mort en 1671, qui fut le dernier du nom. Sa fille Marie-Louise avait épousé Charles le Coigneux qui vendit la terre à M. Prévost du Quesnel, ancien capitaine des Vaisseaux du Roi. La demeure passa ensuite par mariage à M. Claude de Mithon, comte de Genouilly, également capitaine des Vaisseaux du Roi. Il fut au combat naval du 11 avril 1782 où la flotte française fut détruite et  fait prisonnier. Celui-ci l'accusa injustement de l'avoir abandonné, mais le tribunal militaire chargé de le juger le lava de tout soupçon et il fut nommé chef d'escadre des armées navales. Le baron de Triqueti posséda Changy, il était peintre et sculpteur. Il possédait les châteaux voisins du Perthuis à Conflans et de la Varennes à Amilly, et auteur des portes de bronze de l'église de la Madeleine et du tombeau du duc d'Orléans. Aujourd'hui chambres d'hôtes.","architecture":"GARENNES,  Gaschetières, ce  joli château, avec sa longue façade scandée de hautes fenêtres, égayée de frises et de dessins géométriques en brique, tandis qu'une triple corniche de brique court sous le toit. Chacune de ses extrémités est ponctuée d'une tour cylindrique à oculi, coiffée d'un chapeau conique de petites ardoises disposées en écailles de poissons. Les combles sont éclairés de petites lucarnes circulaires ouvragées, couronnées de pots à feu et de guirlandes. La lucarne centrale a perdu son fronton courbe qui autrefois la surhaussait; mais la dentelle de faîtage qui orne le toit est intacte. L'ensemble a gardé tout son charme d'antan.","habitants":"famille de Courtenay\r\n        \"","divers":"Gy les Nonains, deux châteaux ; Changy grav 2-3 et Garennes grav-1.","gps":"","images":["../image/image_45/45_Gy_les_Nonains_1.jpg","../image/image_45/45_Gy_les_Nonains_2.jpg","../image/image_45/45_Gy_les_Nonains_3.jpg"]},"Consult_chateau_formulaire1bfa":{"id":"Consult_chateau_formulaire1bfa","dept":"45","canton":"Orléans","commune":"Saint-Marceau","nom":"Hautes_Montées","type":"Palais","periode":"XVII-XIX","histoire":"HAUTES-MONTEES, acquis en 1880 par François Cléret-Parmentier, industriel résidant à Paris, qui le remania entièrement. En 1949, le château de La Grande-Chesnaye, est vendu à la caisse d'allocations familiales qui le baptise château des Hautes Montées et y abritera pendant plusieurs années l'Institut de rééducation des Hautes-Montées. La ville d'Orléans qui s'en porte acquéreur en 2003, le vend en 2007 à un promoteur qui aménage vingt cinq appartements de haut standing aussi bien dans le château que dans ses dépendances.","architecture":"HAUTES-MONTEES, le château des Hautes-Montées, anciennement nommée La Grande-Chesnaye est une construction élevée sur les bases d'un château du XVIIe siècle,  tant sur le plan architectural dans le style néo-gothique (gargouilles, et lucarnes surmontées de pinacles) que sur le plan décoratif, inspiration Renaissance (voûtes en croisées d'ogives, chapiteaux ornés de feuilles, d'animaux, de fruits, cul-de-lampe et niches surmontées de coquilles Saint-Jacques).","habitants":"François Cléret-Parmentier\r\n        \r\n        \"","divers":"Saint-Marceau château de Hautes-Montées","gps":"","images":["../image/image_45/45_Hautes_Mont%c3%a9es_1.jpg","../image/image_45/45_Hautes_Mont%c3%a9es_2.jpg"]},"Consult_chateau_formulaire3eeb":{"id":"Consult_chateau_formulaire3eeb","dept":"45","canton":"Meung-sur-Loire","commune":"Huisseau sur Mauves","nom":"Huisseau_Mauves","type":"Château","periode":"XII-XVIII-XIX","histoire":"Deux châteaux dans cet article; Huisseau et Pré le Fort.                            HUISSEAU   le château fort, simple fortin de bois, fut remplacé au Xe siècle par un château-fort qui est à l'origine du village de Huisseau sur Mauves. Il est construit à l'époque pour protéger les terres cultivées et les paysans des pillards de la forêt toute proche. La seigneurie de Huisseau sur Mauves avait droit de haute, moyenne et basse justice. La terre de Huisseau n'a jamais quitté la lignée de ses fondateurs depuis 1160. Jeanne d'Arc  y fait une halte le 18 juin 1429. Inscription par arrêté du 14 octobre 1970. Appartient au comte de Robien.                                                         PRE le FORT, les premiers seigneurs connus au XIIIe siècle sont les de Beaugency, dont le pouvoir était exercé par le bailli. On trouve ensuite une série de seigneurs de différentes familles : les Vivier, les Canaye, les Rabault, puis les de Jussac. En 1704, André de Flacourt est le nouveau propriétaire. Sa fille Angélique, veuve en 1777, cède la terre de Pré le Fort à son fils Joseph de Thiville, qui émigre en 1792 à Londres et ses biens sont confisqués. En 1843, le château est adjugé au comte Edmond Bigot de la Touanne. En 1858, sa fille en hérite et se marie à Édouard de Beauregard. Son petit-fils, le baron Alain d'Alairac d'Aigremont le cède en 1898 aux religieuses de Saint-Vincent de Paul de Stains, qui y établirent une colonie de vacances. En 1961, les surs vendront la propriété à Charles Cordier, industriel.","architecture":"HUISSEAU, aujourd'hui, la poterne médiévale donne accès au château comprenant deux bâtiments en équerre, flanqués de trois tours rondes du côté externe, qui donnent à l'intérieur sur un magnifique jardin. L'entrée du château s'ouvre entre deux tourelles encadrant le porche. Le château lui-même, entouré de douves, a été restauré au XVIIIe siècle. Il se compose de deux bâtiments en équerre avec un puits dans la cour intérieure, autrefois fermée par un bâtiment supplémentaire dont il reste les assises d'une quatrième tour. Une tour voûtée avec une oubliette et deux cheminées dans les sous-sol dateraient du XIIe siècle. Une grille en fer forgé provenant de la cathédrale de Meaux ferme la cour intérieure. L'intérieur du château, restauré au XIXe siècle par la famille Bizemont, possède des cheminées monumentales et des plafonds à caissons                                                                             PRE le FORT, niché au milieu de son parc, l'actuel château de Pré le Fort est une construction du XIXe siècle, remaniée et reconstruite au cours des années 1864 et 1865 par le comte Edmond de La Touanne, lieutenant de vaisseau. Mais le domaine a une origine plus ancienne. Les propriétaires successifs ont redonné une jeunesse à cette maison qui en avait besoin.","habitants":"Huisseau; famille Bizemont                                                                               Pre le fort; comte Edmond de La Touanne\r\n        \"","divers":"A Huisseau sur Mauves, deux châteaux; Huisseau grav 1 à 5 et Pré le Fort.","gps":"","images":["../image/image_45/45_Huisseau_Mauves_1.jpg","../image/image_45/45_Huisseau_Mauves_2.jpg","../image/image_45/45_Huisseau_Mauves_3.jpg","../image/image_45/45_Huisseau_Mauves_4.jpg","../image/image_45/45_Huisseau_Mauves_5.jpg","../image/image_45/45_Huisseau_Mauves_6.jpg","../image/image_45/45_Huisseau_Mauves_7.jpg"]},"Consult_chateau_formulairedc0b-2":{"id":"Consult_chateau_formulairedc0b-2","dept":"45","canton":"Sully-sur-Loire","commune":"Isdes","nom":"Isdes","type":"Château","periode":"XVII-XVIII-XIX","histoire":"Quatre châteaux dans cet article; Brenne, Champs, Mardelle,  et Ste-Caire.                                                                                                  BRENNE, ce petit logis en rez-de-chaussée et à un étage de combles, au fond d'une jolie cour, est entouré de fossés maçonnés en eau. Cette configuration rappelle que le château fut reconstruit entre le XVIIe et le XVIIIe siècle, sur une ancienne motte féodale, en réutilisant la plate-forme rectangulaire fossoyée. L'édifice fut remanié par la suite, avec l'ajout des deux petits pavillons en retour, de construction plus récente. Le fronton arrondi au-dessus de la porte est dû au propriétaire actuel. Signalons que, non loin de là, sur cette commune, il existe une autre motte féodale, aux Berthiers, où l'on peut voir très nettement le tracé de la plate-forme rectangulaire, entourée sur ses quatre côtés d'un large fossé.                                            MARDELLE, du XVIIIe siècle était autrefois une tuilerie-briqueterie, conserve un très beau témoignage d'archit
