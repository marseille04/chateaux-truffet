et article; Marais et Montliard à deux K.M.au nord-ouest à Boiscommun, Chermault.                                    MARAIS,   il ne reste rien de la vaste bâtisse du XVIIIe siècle qui s'étendait sur un seul niveau perçé de onze ouvertures et qui était surmontée d'un comble à la Mansard portant autant de lucarnes. La monotonie de cette architecture était rompue par l'existence aux extrémités de deux ailes. Cette demeure fut incendiée puis détruite au cours de la dernière guerre mondiale. Elle avait abrité un érudit, Laureault de Foncemagne qui s'était attaché à l'étude de la période franque et de la loi salique. Originaire de Boiscommun, il était le protégé du duc d'Antin, châtelain de Bellegarde. L'Académie française lui avait ouvert ses portes, il fut surtout célèbre pour la polémique qu'il soutint contre Voltaire au sujet de l'authenticité du testament politique du cardinal de Richelieu. Voltaire avait même contre son habitude, reconnu l'exactitude des raisons de son adversaire et rendit hommage à son mérite. Au XIXe siècle le château passa à la famille Driard, propriétaire du château de Montliard. Le château est agrémenté par de beaux jardins aménagés par Emmanuel de Laugereit.                                                    CHEMAULT, château attesté par un texte de 1489. En 1498, fin d'une campagne de travaux achevant le château; en 1853, démolition du château; les boiseries ont été transportées au château de Rouville, commune de Malesherbes ; vestiges actuels sans doute du XVe siècle ; parquet fait en mai 1688 par Pierre Declomesnil; une plaque de cheminée datée  de 1545 représente les exploits de Samson.","architecture":"MONTLIARD,  est un pur chef-d'uvre de la Renaissance, mais bien avant cette époque, il y avait, à une centaine de mètres du manoir, une forteresse dont les fossés ont subsisté jusqu'à nos jours, en un lieu dit Le Bois de la Motte, le seigneur devait y rendre la justice car les terres attenantes ont conservé des noms évocateurs : \"La Prison\", \"Les Damnés\", et \"Le Bois des Pendus\". Cette place forte fut remplacée au XIIIe siècle par un deuxième château construit à l'emplacement de la maison actuelle. Au XIVe siècle, il fut acheté par Simonet Barbou, écuyer de Nicolas Braque, châtelain de Bellegarde (à l'époque Soisy-aux-Loges). En 1384, Simonet Barbou fit don du domaine à sa fille Jeannette Barbou à l'occasion de son mariage avec Jean 1er de Vièvres. Vers 1591, il fut entièrement reconstruit tel que nous le voyons. Il est toujours resté dans la même famille.\r\nC'est une demeure de brique en appareil losangé égayé de fenêtres à meneaux et croisillons à encadrement de pierres. Au milieu de la façade, une tourelle à cinq pans contient l'escalier. L'autre façade, à l'ouest, est ornée de deux tours carrées plongeant directement dans l'eau. Depuis le XIIIe siècle et jusqu'à la fin du XIXe siècle, il a appartenu à la famille de Vièvres  il est passé par alliance à la famille Driard qui le possède toujours.","habitants":"Marais; du duc d'Antin Montliard; Simonet Barbou  famille de Vièvres \r\n        \"","divers":"Trois châteaux à Montliard Marais  grav-1-2 et Montliard -3-4-5 à deux K.M.au nord-ouest à Boiscommun, Chermault.                        Montliard     48° 01' 05\" nord, 2° 23' 39\" est","gps":"","images":["../image/image_45/45_Montliard_1.jpg","../image/image_45/45_Montliard_2.jpg","../image/image_45/45_Montliard_3.jpg","../image/image_45/45_Montliard_4.jpg","../image/image_45/45_Montliard_5.jpg"]},"Consult_chateau_formulaire57bd":{"id":"Consult_chateau_formulaire57bd","dept":"45","canton":"Pithiviers","commune":"Escrennes","nom":"Montvilliers","type":"Château","periode":"XVI-XVIII","histoire":"MONTVILLIERS,   bien que les larges baies ouvertes au XIXe siècle lui donnent un aspect moderne, le château de Montvilliers est très ancien. Il a vraisemblablement été construit à la fin du XVIe siècle pour Pierre Rousseau qui faisait partie des cent gentilhommes de la chambre du roi.","architecture":"MONTVILLIERS, est formé d'un grand corps de logis flanqué de quatre tours, corniche en pierre, les moulures des fenêtres semblent être du début Renaissance, élévation à travées , élévation ordonnancée, un étage carré  toit conique à longs pans ,croupe en ardoise.","habitants":"Pierre Rousseau \r\n        \"","divers":"A Escrennes château de Montvilliers","gps":"","images":["../image/image_45/45_Montvilliers_1.jpg"]},"Consult_chateau_formulairee889":{"id":"Consult_chateau_formulairee889","dept":"45","canton":"Châtillon-sur-Loire","commune":"Saint-Firmin-sur-Loire","nom":"Motte_St_Firmin","type":"Château","periode":"XIX","histoire":"MOTTE  St-FIRMIN, la Motte était un site très ancien, et, comme le nom de cette agréable demeure semble l'indiquer, elle a pu être construite à proximité d'une motte féodale. Aucun document ne subsiste qui permettrait de reconstituer l'histoire du Ve au XVe siècle de ce coin de terre où une présence seigneuriale relevant du château de Saint Brisson est attestée depuis 1579 jusqu'à la Révolution.  En 1793, pendant la Révolution, La Motte passa pendant quelque temps aux mains d'un sieur Barbereux, qui la revendit à M. Coumol, ancien magistrat, ancien avoué au Tribunal de cassation. Elle fut ensuite véritablement livrée au pillage, puis vendue à nouveau en 1824 au baron Jacques-François Roger, gouverneur du Sénégal qui s'y consacra au point même de l'agrandir quelque peu. Mais, en 1872, la demeure seigneuriale, devenue propriété de M. Brun.","architecture":"MOTTE St-FIRMIN, la gentilhommière actuelle, sise entre le canal de Briare et la Loire, est un beau logis entouré de fossés pleins d'une eau vive, provenant d'une source à l'origine de l'implantation antique à cet endroit. Elle a été édifiée au XIXe siècle à l'emplacement d'une forteresse qui devait couvrir tout le rectangle actuellement surélevé de sa cour intérieure. Mais cette forteresse n'existait déjà plus au XVIe siècle quand, sur ses fondations, furent construits un peu plus tard deux élégants petits pavillons détachés de l'édifice d'aujourd'hui, venu remplacer après trois siècles d'existence un précédent château bâti de 1609 à 1616 par la fille de l'amiral de Coligny. Mais, en 1872, la demeure seigneuriale, devenue propriété de M. Brun, fut démolie à l'exception des deux pavillons du jardin et fit place à la construction actuelle qui se compose d'un imposant corps de logis quadrangulaire, haut d'un niveau sous un étage de combles éclairés par des lucarnes. Un avant-corps à pans coupés marque le centre de l'une de ses façades principales, couverte par une petite terrasse. Deux hautes tours circulaires coiffées d'un cône flanquent les angles de la façade qui lui est opposée. L'ensemble, couvert d'un toit à croupes d'ardoises, continue de nos  jours à prodiguer à ses habitants la limpidité et la fraîcheur des eaux qui l'entourent.","habitants":"baron Jacques-François Roger\r\n        \"","divers":"A Saint-Firmin-sur-Loire château de la Motte St-Firmin","gps":"","images":["../image/image_45/45_Motte_St_Firmin_1.jpg","../image/image_45/45_Motte_St_Firmin_2.jpg"]},"Consult_chateau_formulairec688":{"id":"Consult_chateau_formulairec688","dept":"45","canton":"Gien","commune":"Moulinet sur Solin","nom":"Moulinet","type":"Château","periode":"XII_XIX","histoire":"MOULINET,  il ne reste que quelques vestiges de ce château qui remontait à la plus haute antiquité. Louis VI le Gros l'avait acquis des moines de Saint Benoît et l'avait donné à Blanchard de Lorris. Mais son fils, débauché, le céda à Louis VII. Ce dernier l'avait promis à Pierre de Courtenay au cours de la deuxième croisade, mais le donna finalement à l'abbé de Saint-Benoit en compensation des sommes avancées par les moines pour couvrir les frais de cette expédition. Les ruines du château sont dites de la \"Reine Blanche\" car, selon la tradition populaire, cette dernière l'aurait habité lorsque la cour séjournait au château, mais cela n'a jamais été prouvé. La légende assure que Blanche de Castille apparaît à minuit sur le tumulus de la Bernaudière accompagnée de ses demoiselles d'honneur toutes vêtues de blanc. C'est un édifice à hautes cheminées flanqué dune tour ronde, écrêtée, à meurtrière. Le parcours des douves est encore visible, accentué par deux étangs qui les ont agrandies.","architecture":"SOLIN, cette élégante demeure présente un corps de bâtiment principal à trois travées flanqué de deux corps de logis en retrait, le tout couvert de toits à longs pans, l'ensemble surplombant l'un des plus beaux étangs de la région. Ses propriétaires, la famille Bellecourt, ont mis plusieurs années à terminer cette demeure qui passa successivement entre les mains de commerçants parisiens et d'aristocrates locaux avant d'être racheté en 1968 par ses propriétaires actuels.","habitants":"Solin; famille Bellecourt,\r\nMoulinet ; Blanchard de Lorris      \r\n        \"","divers":"Deux châteaux à Moulinet sur Solin; le Moulinet grav-1 et Solin grav-2","gps":"","images":["../image/image_45/45_Moulinet_1.jpg","../image/image_45/45_Moulinet_2.jpg"]},"Consult_chateau_formulairefc3d":{"id":"Consult_chateau_formulairefc3d","dept":"45","canton":"Briare","commune":"Breteau","nom":"Muguet","type":"Château","periode":"XIX","histoire":"MUGUET,  de style néo-Louis XIII, construit en 1863, n'a pas de caractère historique puisqu'il est de construction récente, mais il servit de résidence au Général Weygand. C'est là que se tint le Conseil suprême franco-anglais des 11 et 12 juin 1940 qui demanda l'armistice. En effet c'est le lieu que choisit Paul Reynaud, président du conseil pour organiser la réunion demandée par Churchill et qui prendra le nom de conférence de Briare. Le château vit se réunirent Churchill, Pétain et de Gaulle. La réunion de Breteau est présentée comme celle de la rupture de l'alliance franco-anglaise, Churchill refusa à Paul Reynaud et à Weygand, l'appui de l'aviation britannique pour enrayer l'avance allemande. Inscription aux M.H. par arrêté du 9 septembre 1991.","architecture":"VIEUX MUGUET, ce château fut la propriété de la famille du marquis de Cosnac, qui fit construire dans la deuxième moitié du XIXe siècle le château voisin du Muguet. Le domaine prit alors le nom de Vieux-Muguet, pour se différencier de la nouvelle résidence des Cosnac. Le château, construit dans la première décennie du XIXe siècle, est d'une grande simplicité architecturale; il est composé d'un corps de bâtiment à un étage carré et combles, avec deux ailes en retour. On remarque, le long de l'allée conduisant à la demeure, une longère utilisée comme écurie et dans le parc, les vestiges d'une maison à colombages ainsi qu'une jolie tourelle à toit conique, à corniche et encadrement de porte en brique.","habitants":"famille du marquis de Cosnac\r\n        \r\n        \"","divers":"A Breteau château du Muguet  et du Vieux Muguet grav -4                                                47° 40' 48\" nord, 2° 52' 26\" est","gps":"","images":["../image/image_45/45_Muguet_1.jpg","../image/image_45/45_Muguet_2.jpg","../image/image_45/45_Muguet_3.jpg","../image/image_45/45_Muguet_4.jpg"]},"Consult_chateau_formulaire1950-2":{"id":"Consult_chateau_formulaire1950-2","dept":"45","canton":"Cléry-Saint-André","commune":"Mézières","nom":"Mézières_Cléry","type":"Château","periode":"XVII-XVIII-XIX","histoire":"A Mézières château de Bailly, d'Elus. A Clery St-André le château du Mardereau,  l'Émerillon et Mézières les Cléry.                                                                BAILLY, cette élégante et vaste demeure dans son écrin d'arbres et de pelouses était au XVIIIe siècle un rendez-vous de chasse dépendant du château voisin de Mézières. Le bâtiment d'origine a été agrandi et anobli par l'ajout d'un petit pavillon en retour, et au début du XXe siècle, par la construction d'un grand pavillon coiffé d'une toiture à l'impériale. Ce grand pavillon a été construit par Maurice Colas des Francs et son épouse Cécile Tassin de Charsonville. La façade côté parc, dont la porte d'entrée est surmontée d'un fronton néo-classique, donne sur un étang.                                                                                                           ELUS,  du XVIIIe siècle, le nom de la propriété vient d'une butte voisine, appelée mont des Élus, tumulus surmonté d'un amas rocheux et d'une statue de la Vierge. Après la Révolution la moitié de la butte appartenait au châtelain des Élus et l'autre moitié au châtelain de Mézières. En 1836, le château est racheté par M. Lochon-Barrault, qui fait planter des vignes au pied de la butte et cède la moitié de celle-ci à M. d'Orsanne propriétaire de Mézières. On accède à ce château, ceint de douves en eau, par un petit pont de pierre croulant sous le lierre.  Passé la grille, on découvre la façade, dont la porte, encadrée de deux oculis, est surmontée d'un fronton rond, ce fronton, aujourd'hui détérioré, portait la date de 1760. Dans les années 1900, le logis était occupé par un distillateur, dénommé Dolbeau.","architecture":"EMERILLON,  ce rendez-vous de chasse, construit au XVIIe siècle est édifié pour \"Noble homme Jean Dehesne\". Il passa ensuite dans plusieurs mains et fut acquis en 1753 par Pierre Samuel Bigot de Cherelles, puis il passa par alliance à la famille de Tristan. Le château, les communs et la chapelle datent du XVIIe siècle, diverses reconstructions l'ont modifié au cours des siècle, la façade Ouest fut remaniée au XIXe siècle, il a toujours fier allure avec sa cour d'honneur fermée par un fossé en eau.                                                                             MEZIERES les CLERY, construit au XVIIe siècle et très fortement restauré en 1883, remplace un château ancien dont l'existence est attestée par les plans datant de 1640, il subsiste une tour sur la gauche du château. C'est une belle demeure pourvue d'une terrasse. Le salon est garni de très belles boiseries. Un parc paysagé,  d'après le vicomte de Larnage, le château a appartenu aux Bernard du XVe au XVI siècle, aux Duchon du XVIIe au XVIIIe siècle ainsi qu'aux Lenoir. Il était le siège d'une baronnie. Il fut acquis en 1803 par M. de Lockhart, géologue et a été transmis par descendance aux familles d'Orzanne et de Larnage (originaire de la Drôme), a épousé Mlle d'Orsanne de Thizay vers 1900.                                                  MARDEREAU  2 km à l'est  à Cléry St-André; fut reconstruit dans le dernier quart du XVIIe siècle et terminé au début du XVIIIe siècle, et se compose dun bâtiment central avec des pavillons latéraux et deux bâtiments en équerre. Le parc à langlaise abrite de nombreux communs datant du XVIIIe siècle.","habitants":"Elus; M. Lochon-Barrault\r\n        \r\n        \r\n        \"","divers":"A Mézières château de Bailly  d'Elus. A Clery bailly grav-1                    st André le château du Mardereau grav 2-3-4-5, et le château de l'Émerillon grav 6-7.","gps":"","images":["../image/image_45/45_M%c3%a9zi%c3%a8res_Cl%c3%a9ry_1.jpg","../image/image_45/45_M%c3%a9zi%c3%a8res_Cl%c3%a9ry_2.jpg","../image/image_45/45_M%c3%a9zi%c3%a8res_Cl%c3%a9ry_3.jpg","../image/image_45/45_M%c3%a9zi%c3%a8res_Cl%c3%a9ry_4.jpg","../image/image_45/45_M%c3%a9zi%c3%a8res_Cl%c3%a9ry_5.jpg","../image/image_45/45_M%c3%a9zi%c3%a8res_Cl%c3%a9ry_6.jpg","../image/image_45/45_M%c3%a9zi%c3%a8res_Cl%c3%a9ry_7.jpg"]},"Consult_chateau_formulaire0ca1":{"id":"Consult_chateau_formulaire0ca1","dept":"45","canton":"Ferrières-en-Gâtinais","commune":"Nargis","nom":"Nargis","type":"Château","periode":"XV-XVIII-XIX","histoire":"CORNOU, la légende voudrait que le château ait été bâti par un gentilhomme qui aurait été en Terre Sainte avec Saint-Louis. En réalité, il suffit de voir la configuration du bâtiment et son décor flamboyant, mais discret, ses fenêtres anciennement à meneaux et ses ouvertures surmontées d'accolades pour savoir que la construction ne peut que remonter à la fin du XVe siècle. Aujourd'hui, doté d'une tour sur l'un des angles de sa façade postérieure et d'une tourelle d'escalier marquant sa façade principale, ce château du Gâtinais était initialement cantonné de quatre tours comme en atteste le cadastre napoléonien. Plusieurs auteurs du XIXe siècle affirment que les tours ont été détruites volontairement vers 1850, afin d'en vendre les matériaux. Comme beaucoup d'autres constructions de cette époque, cette demeure possède quatre pièces à feu, soit deux par niveau: la cuisine et la grande salle au rez de chaussée et deux chambres occupent l'étage. Un comble et un sous-sol parachèvent l'ensemble.","architecture":"DU TOURY, de nombreux propriétaires se succèdent à Toury, dont le comte de Sampigny qui, en 1765, fait ériger sur le domaine une chapelle. Louis-Charles de Portelance est seigneur de Toury à la Révolution. Le propriétaire suivant, le baron de La Tour, fait construire le château actuel à la place de l'ancienne habitation. Toury est vendu en 1818 aux Lemesle. C'est Jean-Thomas, fils de Thomas Lemesle, chevalier du Saint-Sépulcre de Jérusalem, qui viendra y vivre quelques années. Le comte Jean Thomas Lemesle, né le 11 décembre 1802 à Moristown dans l'état du New Jersey, a su faire fructifier et développer son domaine et prend une part active dans la vie de la commune, dont il sera maire. En 1881, la demeure passe à la famille Hallaire. En 1918, la veuve Hallaire lègue ses biens à la fondation Valentin Haüy qui en fait une maison de retraite pour aveugles jusqu'en 1991.","habitants":"comte de Sampigny. Louis-Charles de Portelance\r\n        \"","divers":"A Nargis, château mairie grav 4 de Cornou grav 2_3 et du Toury grav-1.","gps":"","images":["../image/image_45/45_Nargis_1.jpg","../image/image_45/45_Nargis_2.jpg","../image/image_45/45_Nargis_3.jpg","../image/image_45/45_Nargis_4.jpg"]},"Consult_chateau_formulaireaa31-2":{"id":"Consult_chateau_formulaireaa31-2","dept":"45","canton":"Jargeau","commune":"Neuvy  en Sullias","nom":"Neuvy_Sullias","type":"Château","periode":"XVII-XVIII-XIX","histoire":"Deux châteaux dans cet article ; la Brosse et Gilloy.                         La BROSSE du XVIIe siècle, ne subsiste  qu'un corps de logis en rez-de-chaussée construit en brique au XVIIe siècle, relié par deux tours carrées dont une terminée par des claustra, et les vestiges d'un châtelet d'entrée qui se compose d'une porte piétonne et d'une porte charretière, avec des ponts-levis indépendants, le tout entouré de douves en eau. Bâtiments aux angles nord et sud du XIXe siècle.","architecture":"GILLOY, du XIXe siècle,  cet élégant château à cinq travées est construit sur un soubassement de pierres en petit appareil. Sur la façade principale un balcon à garde-corps de pierre surrnonte la porte d'entrée. L'étage des combles est égayé de hautes lucarnes à frontons coiffées d'un toit à quatre rampants. Le château du Gilloy appartient dans les années 1870 à M. Hazard, maire de Neuvy en Sullias.","habitants":"Gilloy;  M. Hazard, \r\n        \"","divers":"à Neuvy  en Sullias la Brosse grav-3-4  et Gilloy grav-1-2.                                               Brosse  47° 45' 26\" nord, 2° 15' 39\" est","gps":"","images":["../image/image_45/45_Neuvy_Sullias_1.jpg","../image/image_45/45_Neuvy_Sullias_2.jpg","../image/image_45/45_Neuvy_Sullias_3.jpg","../image/image_45/45_Neuvy_Sullias_4.jpg"]},"Consult_chateau_formulaired632":{"id":"Consult_chateau_formulaired632","dept":"45","canton":"Beaune-la-Rolande","commune":"Nibelle","nom":"Nibelle","type":"Château","periode":"XVI-XVII-XIX","histoire":"Trois châteaux à Nibelle; Flotin, du Hallier et de la Guette du XIXe siècle pas d'information historique pour ce dernier.                                                                                                          FLOTIN,   du XIXe siècle  le prieuré, aujourd'hui complètement disparu, avait été fondé en 1169 par Guillaume, abbé des chanoines réguliers de Saint-Augustin de Saint-Jean-de-Sens, qui s'y était retiré dans la solitude avec quelques uns de ses chanoines. Le prieuré, devenu riche, créa au cours des siècles suivants une vingtaine de filiales toutes soumises à la règle de saint-Augustin. La guerre de Cent Ans le ruina et il fut mis en commende au XVe siècle, puis tomba en ruines et disparut au XVIIe siècle. Vendu comme bien national en 1793, il appartenait sous l'Empire au général Andrieux qui le rasa et bâtit sur son emplacement un château moderne qui domine les étangs qui ont donné le nom à ce lieu, il appartenait au XIXe siècle à l'historien érudit René de Maulde.                                                           Du HALLIER  Vestiges, à la fin du XVe siècle, construction d'un escalier en vis dans les communs. Au deuxième quart du XVIe siècle (1537) il est vendu à Charles de l'Hôpital. Sa construction daterait de 1530, ou 1550 voire 1560, confirmé dans cet état par un aveu de 1601. La première moitié du XVIIIe siècle voit l'utilisation de la bâtisse comme carrière et la disparition du second étage carré.","architecture":"Du HALLIER, le château se présente comme un quadrilatère dont les murs de courtine sont cantonnés de dix grosses tours circulaires. L'appareil est de brique à chaînages de pierres apparentes. A l'ouest se trouve l'entrée avec un pont dormant qui semble remonter au XVIIe siècle, refait en 1939. A gauche de cette entrée s'ouvre une galerie couverte, du milieu du XVIe siècle. A la suite, s'ouvre une autre galerie couverte qui prolonge celle de l'ouest et longe la courtine nord. A droite de cette galerie s'ouvrent d'anciennes salles basses, édifiées au XVIe siècle sur des infrastructures peut-être légèrement antérieures. A la courtine est, s'adossent d'anciennes écuries, à double nef.  La tour centrale de la façade Est a été démolie. Un ancien four de poteries locales se trouve à la suite. Il est possible qu'il ait primitivement servi de chapelle pour le château. A la courtine sud s'adossent quelques bâtiments à usage agricole et l'habitation des propriétaires. En avancée sur cette façade et située dans la cour, une grange semble dater du milieu du XVIIe siècle. Le château est entouré de douves creusées à pleine terre, transformées en parterres fleuris.  inscription par arrêté du 13 décembre 1967.","habitants":"Flotin;  général Andrieux                                                                   Hallier; Charles de l'Hôpital\r\n        \"","divers":"deux châteaux à Nibelle; Flotin grav-8 et du Hallier  grav-1-2-3-4-5   et de la Guette grav-6-7.                                             Hallier   48° 01' 01\" nord, 2° 18' 42\" est","gps":"","images":["../image/image_45/45_Nibelle_1.jpg","../image/image_45/45_Nibelle_2.jpg","../image/image_45/45_Nibelle_3.jpg","../image/image_45/45_Nibelle_4.jpg","../image/image_45/45_Nibelle_5.jpg","../image/image_45/45_Nibelle_6.jpg","../image/image_45/45_Nibelle_7.jpg","../image/image_45/45_Nibelle_8.jpg"]},"Consult_chateau_formulaire3b2a":{"id":"Consult_chateau_formulaire3b2a","dept":"45","canton":"Châtillon-Coligny","commune":"Nogent sur Vernisson","nom":"Nogent_Vernisson","type":"Château","periode":"XVII-XVIII-XIX","histoire":"Cinq châteaux dans cet article; Bellevue, Barres, Mivoie et Pralins pas d'information pour ce   dernier.                                               BELLEVUE, du XVIII-XIXe siècle,  le logis est  représenté sur le cadastre ancien de 1831, pourrait être d'après les vues aériennes des années 1950, une construction du XVIIIe siècle, remaniée et agrandie à la fin du XIXe ou au début du XXe siècle. Des deux autres bâtiments bordant la cour sur le cadastre, il subsiste celui du sud-ouest, agrandi par un bâtiment en retour d'équerre et par un colombier. Le parc contient des pièces d'eau et un bassin. La ferme est postérieure à 1831.  \r\nBARRES, construit au XVIIIe siècle et ses communs sont achetés par Philippe André Levêque de Vilmorin en 1820. L'Etat acquiert une partie du domaine en 1866 pour y installer en 1873 une école primaire de sylviculture, rénovation du château et des communs, construction du pavillon Guinier, transformation des anciennes écuries en dortoir et construction de la maison des vignes (maison du garde général). En 1882 est fondée l'école secondaire forestière, construction du pavillon Lorentz et rénovation du château. Verd 1900, reconstruction du logement du brigadier, construction du pavillon Daubrée qui abrite le musée, en remplacement du chalet forestier de l'exposition universelle de 1878 qui avait été remonté à cet emplacement en 1881. Premières plantations de l'arboretum en 1820.","architecture":"BARRES, il est distribué par trois escaliers : un escalier principal dans-oeuvre tournant à retours avec jour en maçonnerie dessert l'étage carré, un escalier de service dans-oeuvre tournant à retours avec jour suspendu dessert tous les niveaux, un escalier hors-oeuvre à vis avec jour en bois dessert étage et étage de comble ; les communs, les deux maisons de jardinier et la maison de garde sont en brique avec pierre en remplissage, seule une des deux maisons de jardinier présente une couverture de tuile mécanique, seule la maison de garde possède un toit en pavillon.                                                                                            La MIVOIE, du XIXe siècle est représenté sur un document de 1718 ; le corps de logis semble bien du XVIIIe siècle, le colombier pourrait être plus ancien; la chapelle, également représentée en 1718, a probablement été remaniée voire reconstruite dans la deuxième moitié du XIXe siècle ; le moulin de la Mivoie, existant au XVIIIe siècle, a été refait à la fin du XIXe siècle, les communs situés au sud ont été remaniés ; les communs du nord présentent un bâtiment à pan de bois antérieur au XIXe siècle. Le corps de logis et certains communs sont couverts d'ardoise.                              PRASLINS, du XIXe siècle, dit château de Chaufour, puis un château édifié sous l'Empire qui prend le nom de Praslins, ont précédé l'édifice actuel édifié par l'architecte Alex Fournier en 1894. Le château de Praslins est joliment situé, au cur d'un parc aménagé pour le comte d'Éprémesnil par l'architecte paysagiste Paul de Choulot. Pierres blanches, briques rouges, pans de bois, lucarnes, toits à auvent, tourelles en poivrière, vérandas à large vitrage, perron à balustres: la variété est harmonieuse et plaisante.","habitants":"Barres; Philippe André Leveque de Vilmorin                             Praslins; comte d'Éprémesnil \r\n        \"","divers":"Cinq châteaux à Nogent sur Vernisson  ; Bellevue grav-6, Barres  grav-1-2, Mivoie grav 7 et Pralins grav -3-4-5                               Barres-47° 50' 09\" nord, 2° 45' 43\" est                                            Bellevue  47° 49' 37\" nord, 2° 44' 00\" est","gps":"","images":["../image/image_45/45_Nogent_Vernisson_1.jpg","../image/image_45/45_Nogent_Vernisson_2.jpg","../image/image_45/45_Nogent_Vernisson_3.jpg","../image/image_45/45_Nogent_Vernisson_4.jpg","../image/image_45/45_Nogent_Vernisson_5.jpg","../image/image_45/45_Nogent_Vernisson_6.jpg","../image/image_45/45_Nogent_Vernisson_7.jpg","../image/image_45/45_Nogent_Vernisson_8.jpg"]},"Consult_chateau_formulaire74ba":{"id":"Consult_chateau_formulaire74ba","dept":"45","canton":"Gien","commune":"Névoy","nom":"Névoy","type":"Château","periode":"XIX","histoire":"Deux châteaux dans cet article ; Bois-Béhague et Grande-Brosse.                                                                                      BOIS-BEHAGUE,  du XIXe siècle, Le domaine de Bois-Béhague est l'uvre d'un agronome célèbre, doublé d'un humaniste, le comte Amédée de Béhague. Lorsqu'il achète la terre de Dampierre en 1826, sa propriété comprend trois fermes sur la commune de Neuvoy : le Tranchoir, le Bois-d'Amblay et Mocquegueule, et des friches, des brandes et des étangs. En quelques années, ces terres sont défrichées, assainies, plantées en pins sylvestres, chênes et bouleaux. M. de Béhague y fait construire des maisons pour ses ouvriers, une briqueterie et une chapelle pour les habitants du domaine, cette exploitation exemplaire prend le nom de son créateur et s'appelle \"Bois-Béhague\". Le château lui même, datant de 1870, est une demeure en brique et pierre, avec un avant-corps central à pan coupé surmonté d'un clocheton. Le décor est d'inspiration néo-gothique et Renaissance.","architecture":"GRANDE BROSSE,   du XIXe siècle, on accède au château par une longue allée de 1000 mètres, autrefois bordée d'un alignement de pins. Le château a été bâti vers 1860 par Charles Léguillon sur un territoire de 200 hectares qui, par acquisitions successives devinrent 387 hectares. Ce château du XIXe siècle, avec parement de brique rouge, est composé d'un corps de bâtiment central, encadré de deux pavillons aux toits à l'impériale. Curieux détail : l'architecte, qui a également édifié le château de Bois Béhague voisin, avait oublié l'escalier. Désordre qui fut réparé par l'adjonction d'un escalier dans l'uvre, solution peu esthétique et peu fonctionnelle imposée par l'avancement des travaux. Le parc comprend un étang de plus de 11 hectares, creusé en deux temps par les moines locaux, celui-ci alimentait le château et la ferme à l'aide d'un bélier hydraulique. À proximité de la ferme, un pigeonnier avec échelle subsiste encore.","habitants":"comte Amédée de Béhague                                                              Gde Brosse ;Charles Léguillon \r\n        \"","divers":"Deux châteaux à Névoy; Bois-Béhague grav-2 et Grande -Brosse.","gps":"","images":["../image/image_45/45_N%c3%a9voy_1.jpg","../image/image_45/45_N%c3%a9voy_2.jpg"]},"Consult_chateau_formulaire3216-2":{"id":"Consult_chateau_formulaire3216-2","dept":"45","canton":"Olivet","commune":"Olivet","nom":"Olivet","type":"Château","periode":"XVII-XIX-XX","histoire":"Dans cet article le château de Beauséjour, de Bellevue, de Fontaine et d'Isambert.                                                                                                                              BEAUSEJOUR, du XIXe siècle, aujourd'hui limité à l'est par le parc de Lorette, au sud par la route, au nord par le Loiret, et clos de murs à l'ouest, le château de Beauséjour est le type même du domaine marqué au sceau du Second Empire. Il poussa la couleur locale jusqu'à appartenir de 1875 à 1885 à une demi-mondaine, Emma Cruch, qui, suivant les modes de l'époque, y compris l'anglomanie, s'était affublée d'un nom anglais: Cora Pearl. C'est au début du XXe siècle que le château fut doté d'un étage supplémentaire qui en a modifié l'aspect.                                               BELLEVUE  Du XXe siècle On peut faire remonter les origines de Bellevue à 1696, date à laquelle le bâtiment appartenait à Charles Fournier, écuyer et sieur de La Grand-Cour avant d'être vendu en 1760 à Grignon de Bonvalet. Les Allemands le brûlèrent en 1870, on reconstruisit sur son emplacement un bâtiment à ossature entièrement métallique du type \"architecture Eiffel\" alors très en vogue. La demeure devait connaître plusieurs repentirs et ajouts qui, suivant la période, les propriétaires, la firent assimiler tantôt à une résidence anglaise, tantôt à un palais mauresque par l'incrustation d'azulejos dans les murs de la façade. Une tourelle du bâtiment, achetée à l'Exposition universelle de 1900 à Paris, y fut réinstallée par les maîtres ardoisiers de France. Devenue au début du XXe siècle la résidence secondaire de la famille Dessaux, vinaigrier à Orléans, Bellevue est actuellement divisée en copropriété privée.","architecture":"FONTAINE, il a été édifié pour la première fois au XVIIe siècle par Léonor de Raganne qui y résida de 1638 à 1669, il aménagea un parc à la française et agrandit la propriété de sorte que lorsqu'il la vendit en 1669 au prévôt d'Orléans François Le Reboux. Léon-Hector Patas d'Illiers, auquel son arrière grand-mère Pinchinat légua la Fontaine en 1797, créa un vaste jardin anglais au nord du château et le long de la rivière et aménagea le potager. Il reste du parc du XVIIe siècle un rond-point qui aurait été dessiné par Le Nôtre, d'où partent en étoile huit majestueuses allées traversant de part en part la futaie de vieux chênes. Le reste du parc est l'oeuvre de Léon-Hector d'Illiers. Les pelouses se glissent entre des arbres d'essences rares auxquels la riche terre du val a valu un beau développement. Des percées sont ménagées sur la Cathédrale d'Orléans et sur les moulins alentour. Une grotte artificielle abrite la fontaine qui a donné son nom à la propriété.                                                                                ISAMBERT,  du XIXe siècle, le château d'Isarnbert, d'une masse assez importante, est d'une architecture simple, avec ses deux étages percés de hautes fenêtres, son toit d'ardoise à quatre rampants, mansardé, cerclé d'une corniche moulurée et surmonté de grandes cheminées. À l'origine, le château avait été bâti avec un perron et de belles terrasses qui n'existent plus. En 1959, il fut acheté par la congrégation des surs de la Sagesse qui y installa la maison de retraite de l'institution des sourdes Saint-Marceau d'Orléans.","habitants":"Bellevue; Charles Fournier et  famille Dessaux,                                     Fontaine; Léonor de Raganne\r\n        \"","divers":"A Olivet, le château de Beauséjour grav-1, de Bellevue grav 2-3-4, de Fontaine grav-5-6-7 et d'Isambert-Grav-8.            .  Fontaine 47° 52' 20\" nord, 1° 52' 48\" est","gps":"","images":["../image/image_45/45_Olivet_1.jpg","../image/image_45/45_Olivet_2.jpg","../image/image_45/45_Olivet_3.jpg","../image/image_45/45_Olivet_4.jpg","../image/image_45/45_Olivet_5.jpg","../image/image_45/45_Olivet_6.jpg","../image/image_45/45_Olivet_7.jpg","../image/image_45/45_Olivet_8.jpg"]},"Consult_chateau_formulairea46c":{"id":"Consult_chateau_formulairea46c","dept":"45","canton":"Olivet","commune":"Olivet","nom":"Olivet_45","type":"Château","periode":"XVIII","histoire":"Trois châteaux dans cet article; la Motte d'Avy, Poutyl, Quatre v-Vents et Quetonnier.                                                                                                                            la MOTHE d'AVY, du XVIIIe siècle,  appelé plus tard la Mothe Bouquin, est une belle construction en pierre de taille qui, date de 1730. La simplicité de cet ensemble, surmonté d'un fronton triangulaire, selon le style de l'époque, met en valeur un large perron dont la rampe est ornée des armes de François Sarrebourse de Mondonville  qui devint propriétaire du château de la Mothe en 1709, après que la famille Bouquin l'a conservé jusqu'au début du XVIIIe siècle. Depuis 1970, le château est la propriété de la commune d'Olivet et demeure en attente d'une réhabilitation.                                                                                                  POUTYL , début du XVIIIe siècle, le maréchal d'Escures constitue ce grand domaine. Il réunit une bonne centaine de prés, vignes et bois. Il fait édifier le château sur la belle terrasse qui domine encore la rivière. Au second empire, un grand fronton est aménagé sur la façade du château.  Le château aurait accueilli les rencontres secrètes d'Henri IV et d'Henriette d'Entraigues. En 1941 propriété de la ville d'Olivet.                                                                                                          QUATRE VENTS,  c'est en effet sur les terres des Quatre-Vents, qui appartenaient alors à M. Jacque-Demainville, qu'eut lieu la fête de la Fédération des gardes nationales, le 8 mai 1790, qui attira trente mille personnes venues de tout le royaume.","architecture":"QUATRE VENTS,   du XVIIIe siècle, cette noble demeure est composée d'un bâtiment central avec deux pavillons surmontés d'élégants frontons triangulaires. Autrefois entourée de plaines ouvertes aux quatre vents, son nom lui vient de sa situation. Le nom de ce domaine reste attaché à un événement historique important:                                                  QUETONNIERE, du XVIIIe siècle se compose de bâtiments intéressants, constitue aujourd'hui une des plus belles propriétés riveraines du Loiret. Le premier bâtiment est le corps de logis du bâtiment principal, presque carré, surmonté d'un toit à 4 pans garni de quatre cheminées avec deux pavillons semi circulaires pour le flanquer de part et d'autre qui étaient simplement surmontés d'une architrave finement moulurée et soutenue par des colonnes aux chapiteaux ioniques avant que d'être plus tard coiffés d'un premier étage. Le second édifice est une construction beaucoup plus petite mais à la facture étonnante, sorte de temple à colonnes, à l'allure égyptienne, aux chapiteaux ornés de feuilles de lotus. Enfin, un garage à bateaux dont la façade est attribuée à l'architecte Garnier, complète l'ensemble. Ses deux piédroits qui baignent dans la rivière sont ornés d'une tête d'éléphant. Sur l'abri proprement dit se trouve une pièce dont la baie est flanquée de pilastres jumelés.","habitants":"Poutyl;   maréchal d'Escures                                                                                      Quatre vent.  M. Jacque-Demainville,\r\n        \r\n        \"","divers":"Trois châteaux à Olivet la motte d'Avy grav-2-3 , Poutyl-grav-4, quatre vents et Quetonniergrav-6.","gps":"","images":["../image/image_45/45_Olivet_45_1.jpg","../image/image_45/45_Olivet_45_2.jpg","../image/image_45/45_Olivet_45_3.jpg","../image/image_45/45_Olivet_45_4.jpg","../image/image_45/45_Olivet_45_5.jpg","../image/image_45/45_Olivet_45_6.jpg"]},"Consult_chateau_formulaire630d":{"id":"Consult_chateau_formulaire630d","dept":"45","canton":"Olivet","commune":"Olivet","nom":"Olivet_II","type":"Château","periode":"XVII","histoire":"Deux châteaux dans cet article; du Rondon  et la Source.                 la Motte d'Avy( voir article)                                                                                                                      RONDON, du XVIIIe siècle, s'appelait jadis le Rondeau et comprend les restes d'une maison qu'habita Catherine de Médicis. La résidence du XVIIe siècle, qui appartenait aux comtes de Richeloup, a été complètement remaniée en 1880. La façade nord, ouvrant sur la pelouse, présente une terrasse et un grand perron à deux volées. L'intérieur a été aménagé en vue de la fonction actuelle de maison de repos et n'a conservé aucun vestige ancien. Les camaïeux ornant les trumeaux des portes d'un salon, ont certainement été rapportés. L'escalier principal en bois sculpté est du style 1880. Le parc aurait été tracé par Le Nôtre. Une pelouse descend en pente douce vers la rivière sur laquelle elle se termine par une balustrade encadrée par deux grilles de fer forgé. La balustrade surmonte un mur de soutènement qui domine la rivière. Elle est formée de balustres classiques, séparés de loin en loin par des panneaux pleins. Les deux extrémités sont ponctuées par des urnes de pierre. Les deux grilles qui se dressent à chaque extrémité présentent, au centre du fronton aux arabesques, la lettre R.  inscription par arrêté du 28 avril 1964.","architecture":"La SOURCE,  du XVIIe siècle, tire ses origines du présent fait par Clovis dun vaste terrain aux moines de lAbbaye de Micy au début des années 500. Un domaine est ainsi constitué sur les bords du Loiret et un château est construit. Au début du XVIIIe siècle, l'édifice est occupé par un aristocrate britannique fortuné, lord Bolingbroke, c'est également un homme de lettre et desprit et le château devient, dans les années 1720, un centre culturel animé que ses amis ont surnommé lacadémie de la Source. Il aurait hébergé un certain François Marie Arouet, dit Voltaire, lors de l'écriture de son célébrissime livre Candide. Un siècle plus tard, après la défaite de Waterloo en 1815, le maréchal Davour et son état-major font du château de la Source leur résidence. Cest en ces lieux que les restes de larmée napoléonienne sont définitivement dissous. Le château est devenu aujourd'hui le siège administratif des facultés.","habitants":"Rondon; comtes de Richeloup                                                         La source; lord Bolingbroke\r\n        \"","divers":"châteaux a Olivet du Rondon grav-1-2,  et la Source grav-3-4.   Beauvoir grav-5-6     Etang grav-7                                              La source   47° 51' 02\" nord, 1° 56' 02\" est","gps":"","images":["../image/image_45/45_Olivet_II_1.jpg","../image/image_45/45_Olivet_II_2.jpg","../image/image_45/45_Olivet_II_3.jpg","../image/image_45/45_Olivet_II_4.jpg","../image/image_45/45_Olivet_II_5.jpg","../image/image_45/45_Olivet_II_6.jpg"]},"Consult_chateau_formulaire4836":{"id":"Consult_chateau_formulaire4836","dept":"45","canton":"Orléans","commune":"Orléans","nom":"Orléans","type":"Palais","periode":"XVIII-XIX","histoire":"trois châteaux dans cet article celui de Chenaie et l'hôtel Groslot et la Motte-Sanguin.                                                                                                         CHENAIE, dit des MONTEES , cette belle demeure du XVIIe siècle, au milieu d'un vaste parc, est composée d'un corps de logis à cinq travées, flanqué de deux pavillons symétriques en légère saillie, prolongé ultérieurement, d'un seul côté, par un bâtiment à deux travées. Les combles sont éclairés par des lucarnes à frontons, dont les piédroits sont ornés de volutes. Au début du XVIIe siècle, Isaac Blanchard seigneur de Rouville est propriétaire de la terre des Montées, qu'il cède à Pierre Demeulles en 1629. Le domaine a connu de nombreux propriétaires, ainsi le baron Harold Portalis, maire d'Orléans à la fin du XIXe siècle, avait acquis le château et son parc de 19 hectares. En 1938, ce sont les aciéries de Longwy qui se portent acquéreur du château des Montées. Vendu en 1946 à la ville de Bourg la Reine, qui en fait une colonie de vacances jusqu'en 1956, date à laquelle la caisse d'allocations familiales du Loiret le rachète, avec son parc de 18 hectares en bois, prairies et jardins.    Emile  Penev, qui a racheté, il y a 7 ans, à la mairie dOrléans, le château des Hautes Montées. Son objectif : faire de cette grande bâtisse du XIXe siècle  une \"résidence de standing\".","architecture":"MOTTE-SANGUIN, le 25 août 1899, le ministère de la Guerre cède le domaine et son hôtel au département. L'hôtel revient au domaine privé le 29 septembre 1900 après son acquisition par la famille Desplanches, puis le 29 novembre 1921 par la famille Alicot. le 21 janvier 1928. la famille possédant l'hôtel le vend à la ville d'Orléans en 1976. La municipalité le revend en 2011 à la société immobilière Xaintrailles, qui le revend à son tour au groupe Villemain en 2012. Depuis 2014, les sept appartements aménagés dans le château sont loués par l'association Studium afin d'héberger des chercheurs en visite à l'Université d'Orléans.                                                        HOTEL GROSLOT, l'hôtel Groslot a été construit par Jean de Groslot bailly d'Orléans de 1530 à 1550 , et à Jacques Androuet Du Cerceau pour le bailli d'Orléans, Jacques Groslot, le bâtiment possède une façade caractéristique en briques rouges disposées en losanges. Il se compose d'un corps de logis central flanqué de deux ailes de style Renaissance.  Il abrite l'hôtel de ville depuis 1790. François II, venu présider les Etats Généraux, accompagné de son épouse Marie Stuart et sa mère Catherine de Médicis, y mourut en 1560. Charles IX, Henri III et Henri IV en furent aussi les hôtes illustres. Aujourd'hui se visitent le salon d'Honneur, l'ancienne salle du conseil municipal, l'ancien bureau du maire et la salle des mariages. On peut découvrir de nombreux souvenirs de Jeanne d'Arc, des toiles de qualité, des tapisseries d'Aubusson et du mobilier d'époque. Et dans la cour d'honneur, se dresse la statue en pied de Jeanne d'Arc due à la princesse Marie d'Orléans.  Éléments protégés MH : l'hôtel Groslot en totalité : classement par liste de 1862.","habitants":"Montée; Isaac Blanchard                                                                            Groslot; Jean de Groslot                                                                                                                                         Motte sanguin;famille Desplanches\r\n        \r\n        \"","divers":"Deux châteaux à Orléans celui de Chenaie  grav-1-2,  l'hôtel Groslot grav-3-4-5 et la Montée grav-6-7  la Motte-Sanguin Grav-8.                                                                                             Groslot   47° 54' 09\" nord, 1° 54' 31\" est                                                 Motte Saguin 47° 53' 59\" nord, 1° 55' 07\" est","gps":"","images":["../image/image_45/45_Orl%c3%a9ans_1.jpg","../image/image_45/45_Orl%c3%a9ans_2.jpg","../image/image_45/45_Orl%c3%a9ans_3.jpg","../image/image_45/45_Orl%c3%a9ans_4.jpg","../image/image_45/45_Orl%c3%a9ans_5.jpg","../image/image_45/45_Orl%c3%a9ans_6.jpg","../image/image_45/45_Orl%c3%a9ans_7.jpg","../image/image_45/45_Orl%c3%a9ans_8.jpg"]},"Consult_chateau_formulaire67a9":{"id":"Consult_chateau_formulaire67a9","dept":"45","canton":"Lorris","commune":"Thimory","nom":"Ouchamps","type":"Château","periode":"XIX","histoire":"OUCHAMPS, du XIXe siècle, une famille seigneuriale, au XVIIe siècle, les Douchamps, donne son nom à ce fief dont le château, bâti dans un site particulièrement pittoresque, date de la fin du XIXe siècle, pour Paul Payen dont la famille conservera la propriété pendant près de 100 ans.","architecture":"OUCHAMPS, le château se dresse sur une plate-forme carrée entourée d'eaux vives, ses douves sont alimentées par une abondante fontaine. Les angles sont ponctués par deux pavillons carrés flanqués d'élégantes tourelles rondes coiffées en poivrière. On accède à la plate-forme par un pont avec garde-corps en ferronnerie. Au début du XXe siècle un corps de bâtiment à un étage supplémentaire a été accolé à la façade de l'édifice principal, bâti sur sous-sol avec deux niveaux et des combles éclairés par des lucarnes à fronton triangulaire et des ils de buf. De fastueux communs, dont un beau pigeonnier bâtis entre 1892 et 1897 de part et d'autre de la cour d'honneur pavée, accueillent le visiteur qui pouvait y déposer chevaux et voiture. Un peu à l'écart, une haute tour à laquelle des créneaux donnent une allure guerrière servait de château d'eau.","habitants":"Paul Payen\r\n        \"","divers":"A Thimory le château d'Ouchamps","gps":"","images":["../image/image_45/45_Ouchamps_1.jpg","../image/image_45/45_Ouchamps_2.jpg","../image/image_45/45_Ouchamps_3.jpg"]},"Consult_chateau_formulairea75c":{"id":"Consult_chateau_formulairea75c","dept":"45","canton":"Lorris","commune":"Ouzouer des Champs","nom":"Ouzouer_Champs","type":"Château","periode":"XVII","histoire":"A Ouzouer des champs le château de  d'ouzouer, de la Garenne-Dieu et du Pont                                                                                           OUZOUER des CHAMPS, il y avait là, au XVe siècle, un fief et la résidence des seigneurs d'Ouzouer. Au début du XIXe siècle on pouvait encore voir l'ancien château entouré de douves alimentées par l'eau du Puiseaux, affluent du Loing, et son moulin de Calabre. Au XVIIe siècle, Nicolas Pénillon est seigneur d'Ouzouer, le château restera dans cette famille jusqu'à la Révolution. En 1792, Simon Bruno Morot de La Couche achète le château. En 1855, Denis Bizoueme, propriétaire du domaine, reconstruit le château et la ferme. En 1919, la famille Meltzheim l'achète et transforme les bâtiments de la ferme en tannerie alimentée par la force motrice du moulin. En 1959 l'usine ferme, remplacée par une ébénisterie d'art. Le château actuel, reconstruit en 1855, d'allure classique, possède un corps de logis à un étage carré prolongé de deux pavillons à chaînage de brique, sous un toit à quatre rampants.                                               GARENNE-DIEU, du XIXe siècle à Bersey et s'appelle Chez-Dieu, ce toponyme semblant désigner une propriété ecclésiastique. La Garenne-Dieu se présente sous la forme d'une élégante maison des champs dont le corps de logis comptait cinq travées à l'origine. Elle a été modifié ensuite par l'adjonction de deux tourelles carrées, l'une d'elle à terrasse dont l'utilisation ne nous est pas connue. L'édifice a reçu également un péristyle sur l'une des façades.","architecture":"A un kilomètres au nord à st-Hilaire en Puisseaux                           DU PONT,  est le plus ravissant manoir qu'on puisse imaginer. C'est une demeure rustique, basse, flanquée de deux tours massives coiffées de larges toits couverts de petites tuiles. Le bâtiment mire sa blancheur dans les eaux du Puiseaux qui s'étale à cet endroit en un large plan d'eau. Entouré de vastes pelouses et de peupliers frissonnants, c'est l'image même du calme et de la simplicité champêtre. Ce château n'a sans doute jamais eu d'histoire bien importante. Philippe de Corquilleroy, seigneur du Pont, protestant, s'était réfugié près de Genève. En 1556, à la demande de l'Amiral de Coligny, Calvin le mit à la tête de missionnaires qui s'embarquèrent à Honfleur le 20 novembre 1556 pour coloniser le Brésil, mais l'expédition échoua. A la fin du XIXe siècle, le château a appartenu à Eugène Brieux, élu à lAcadémie française le 18 mars 1909, auteur de pièces à thèse, de comédies sociales dans la tradition de Dumas fils et d'Augier, ou, selon le mot de Jacques Copeau, de \"mélodrames d'idées\".","habitants":"Ouzouer;famille Meltzheim \r\n        \"","divers":"A Ouzouer des champs le château de  d'ouzouer, de la Garenne-Dieu et du Pont","gps":"","images":["../image/image_45/45_Ouzouer_Champs_1.jpg","../image/image_45/45_Ouzouer_Champs_2.jpg"]},"Consult_chateau_formulaireefd1":{"id":"Consult_chateau_formulaireefd1","dept":"45","canton":"Ouzouer-sur-Loire","commune":"Ouzouer des Champs","nom":"Ouzouer_Loire","type":"Château","periode":"XIVXVI-XIX","histoire":"cinq châteaux à Ouzouer. Fortinière, Garenne-Dieu, Gués,  la Manderie et  de l'Orme du XIXe siècle.                                                                                                    FORTINIERE, on ignore la date de construction de La Fortinière qui n'existait pas sur le cadastre de 1817 mais on sait qu'au début du XIXe siècle cette demeure, sa ferme et les terres appartenaient à la famille Grison, avant que M. Félix Vandreville n'en devienne seul propriétaire, puis Mme Leduc, née Amand. C'est cette dernière qui vendit en 1929 l'ensemble de ses biens de La Fortinière à M. Ernest Carnot, fils du président de la République Sadi Carnot. À partir de 1934, il faut distinguer La Fortinière vendue à M. Maxime de Clermont, qui y résidera jusqu'à sa mort en 1957, de la ferme de La Fortinière vendue à M. Viplé qui la conservera jusqu'en 1960, acquisition par des descendants d'Ernest Carnot.                                                                                                                                                                                   ORME du XVIe siècle, appartenait aux moines de Saint-Benoît-sur-Loire qui contrôlaient ainsi la navigation fluviale, il reste de nombreux vestiges: des tours, des murailles et une chapelle qui forment un ensemble très pittoresque. Le puissant corps principal de l'édifice, doté sur l'une de ses façades de fenêtres à la Mansart, reste flanqué à l'une de ses extrémités d'une tour, le tout couvert en ardoises. Vendu à plusieurs reprises, c'est en 1924 que le château de L'Orme fut acquis par Ernest Carnot, fils du président de la République Sadi Carnot, qu'un de ses descendants conserve encore.","architecture":"GUES,  du XIV-XIXe siècle, en partie reconstruit, le château fut de nouveau détruit au moment de la Révolution avant d'être réédifié pour se présenter tel qu'on le découvre aujourd'hui. Le château des Gués consiste en trois corps de bâtiments disposés en U, ils entourent une petite cour carrée ceinte de douves en eau que seule une passerelle soutenue par quatre arches permet de franchir. Sous son aspect actuel, il se présente comme une maison typique du Directoire, ses fondations attestent l'existence à l'origine d'un château fort que deux têtes ornant les contreforts de sa façade principale permettent de dater du XIe siècle.                                                                                                            La MANDERIE, au XIXe siècle, on trouve dans les registres d'Ouzouer la mention La Manderie ou La Maindry (Mainderie), le mot \"mandre\" désignant au XIIIe siècle une étable et un \"mandrier\" désignant au XVe siècle un berger. C'est sur les terres de son exploitation agricole de La Manderie, 154 hectares à l'époque, que le propriétaire, M. Nouette Delorme qui les avait achetées en 1859, décida en 1875 de faire construire \"une habitation plus vaste et plus confortable\" que celle existante, qui deviendra le château actuel édifié en 1878. Le bâtiment, avec ses combles brisés percés de lucarnes, est flanqué d'une tour carrée présentant trois niveaux, coiffée d'un toit en pavillon.","habitants":"Orme;  Ernest Carnot                                                                         Manderie; famille  de Nouette Delorme\r\n        \r\n        \"","divers":"Quatre châteaux à Ouzouer. Fortinière, Gués, la Manderie grav-1 et de l'Ormegrav 2-3 du XIXe.","gps":"","images":["../image/image_45/45_Ouzouer_Loire_1.jpg","../image/image_45/45_Ouzouer_Loire_2.jpg","../image/image_45/45_Ouzouer_Loire_3.jpg","../image/image_45/45_Ouzouer_Loire_4.jpg","../image/image_45/45_Ouzouer_Loire_5.jpg"]},"Consult_chateau_formulaire8424":{"id":"Consult_chateau_formulaire8424","dept":"45","canton":"Pithiviers","commune":"Pithiviers","nom":"Pithiviers","type":"Château","periode":"XVI-XVII-XVIII-XIX","histoire":"trois châteaux dans cet article;l'Ardoise, Bellecour, Folie Joinville, la Rochette du XVIIe siècle et de Trétinville .                                                               ARDOISE, l'appellation de l'Ardoise est attestée en 1561,  pour Gouault Archambault, conseiller du roi, qui, au cours de sa carrière dans l'administration des finances, a pu prendre directement conseil auprès de Philibert de l'Orme. L'édifice servit surtout de gîte d'étape aux rois de France, entre Chambord et Fontainebleau. Henri IV y a couché en 1602 ; Louis XIV autre date. Très près de la sortie d'Orléans et face à la Loire, le château est une belle résidence de style simple et classique, entourée de son parc auquel on accède par une longue allée, l'entrée se fait par une belle grille en fer forgé. Sa façade postérieure domine la vallée de la Loire. Les encadrements des fenêtres sont ornés de quelques motifs sculptés. La toiture présente une forme particulière de carène renversée. La charpente est un des exemples subsistants relativement rares de charpente assemblée suivant le procédé de Philibert de l'Orme, avec cerces moisées de faible dimension, dont l'écartement est maintenu par des bois clavetés. \r\nBELLECOUR,  est construit à la fin du XVIIe siècle, entre 1695 et 1697, par Alphonse-Charles de Bareillier de Forteville. Les curés de l'église Saint Salomon de Pithiviers lui concèdent un droit de chapelle pour son domaine. La bâtisse change à plusieurs reprises de propriétaires. Au milieu du XVIIIe siècle, elle appartient à Jean Mercier subdélégué de l'intendant de la généralité d'Orléans.                                                                     TRETINVILLE; de Timoléon de La Taille,  capitaine de frégate, chevalier de Saint Louis, et de Anne de Reverseau de La Taille, décédée en 1792.","architecture":"BELLECOUR,(suite), en 1781, elle est acquise par Pierre Lejeune qui l'agrandit grâce à l'acquisition de biens nationaux. Ce dernier est maire de Pithiviers en août 1799. Après sa mort, son fils Hippolyte Lejeune hérite en 1812 de la propriété. A la Restauration, il obtient l'autorisation d'adjoindre le titre de Bellecour à son nom. Les descendants vendent la propriété à Jacques Bourgoin en 1939.  Le domaine passe à la société immobilière de Mortefontaine en 1976 qui y installe des religieuses dominicaines.                                                                                                                        FOLIE-JOINVILLE, au XVe siècle,  appartient aux de La Taille, seigneurs de Bondaroy et de Dossainville, Au XVIIIe siècle, le domaine appartient à la famille Masson du Monceau qui ajoute de Joinville à son nom. Après la Révolution, le château et les terres passent par échange à Alexandre Duhamel de Fougeroux, ses descendants les ont conservés jusque dans les années 2000. L'élégant château du XVIIIe siècle, a été reconstruit en 1756, dans le plus pur style classique. Il est prolongé vers l'est, par de beaux communs en brique et pierre, dont l'architecture et le décor sont très soignés: on remarque les lucarnes surmontées de frontons à degrés.                             TRETINVILLE,  gros bâtiment à un étage, coiffé d'une toiture à la Mansart, garnie de cinq fenêtres. Du côté de l'arrivée, le manoir est agrémenté sur sa gauche, d'une tourelle carrée coiffée d'une toiture très pointue. Une curieuse noria, à l'extérieur de la cour, avec son mécanisme en bois, couverte d'une belle toiture en bois également, complète cet ensemble.","habitants":"Ardoise; Gouault Archambault                                                Bellecour; Gouault Archambault                                                     Folie Joinville; famille Masson du Monceau \r\n        \"","divers":"trois châteaux  à Pithiviers grav-1-2, l'Ardoise grav-3, Bellecour grav-4, Folie Joinville grav-5 , la Rochettegrav-6 du XVIIe siècle   les essarts grav 7-8                                    Ardoise  48° 10' 20\" nord, 2° 15' 28\" est                                   Pithiviers  48° 10' 21\" Nord et 2° 15' 09\" Est                                             Bellecour  48° 10' 02\" nord, 2° 15' 14\" est","gps":"","images":["../image/image_45/45_Pithiviers_1.jpg","../image/image_45/45_Pithiviers_2.jpg","../image/image_45/45_Pithiviers_3.jpg","../image/image_45/45_Pithiviers_4.jpg","../image/image_45/45_Pithiviers_5.jpg","../image/image_45/45_Pithiviers_6.jpg","../image/image_45/45_Pithiviers_7.jpg","../image/image_45/45_Pithiviers_8.jpg"]},"Consult_chateau_formulaire19d8":{"id":"Consult_chateau_formulaire19d8","dept":"45","canton":"Montargis","commune":"Mignerette","nom":"Planchette","type":"Château","periode":"XII-XVI","histoire":"PLANCHETTE. en 1291 le premier seigneur Jean de Bonnay. En 1457, un premier château du XIIe siècle, en partie détruit par la guerre de Cent Ans, appartenait à Huet de Barville et à sa femme, fille de Guillaume le Vicomte. En 1518, il était déjà passé à Jean de Mousselars époux de Etiennette de Saintville qui le transmit en 1547 à son fils Esmé, cette famille devait se poursuivre à la Planchette jusqu'en 1702. Ainsi on trouve Alexandre II de Mousselars qui épousa Catherine de Barville, fille de Jean de Barville et de Catherine de Houville, puis leur fils Christophe leur succéda. Charles II, fils du précédent, vécut surtout à Paris, en effet il avait épousé Suzanne Leclerc, fille du Surintendant et Commissaire général des vivres et camps des armées du Roi. Leur fils Guillaume fut le dernier des Mousselars, il légua La Planchette à sa sur Catherine qui avait épousé Gabriel Coignet lieutenant général du gouvernement du Vermandois, Catherine décéda en 1702. Par mariage, leur fille Charlotte Coignet, fit passer la Planchette dans la famille de Pierre le Tellier, petit neveu du ministre célèbre le Tellier de Louvois. Cette famille y resta jusqu'en 1808. Louis-Antoine le Tellier transformera le château en supprimant tout ce qui subsistait de féodal ou de militaire. Le fils de ce dernier, Jean-Marie II le Tellier vit mourir tous ses enfants sauf Marie-Françoise-Rosalie qui épousa en 1795 un officier, Jean-Baptiste Patrauld, ancien professeur de Bonaparte à Brienne et propriétaire du prieuré de Villemoutiers.","architecture":"PLANCHETTE  (suite ) Le château passa ensuite aux Driard de Montliard puis aux Catinat de Quiers après 1860. passa dans diverses mains et en  1912, Léon Lambert dit \"de Loulay\" dont l'épouse était une princesse Sviatopolk Czartoryska fit réaménager le château ainsi que le parc qui avait souffert d'un long abandon. De 1982 à 1994, Amédéo Ballester commence la restauration complète du château et fait replanter le parc, selon le concept d'allées forestières, d'après les plans de l'architecte paysagiste, conservateur des jardins du Palais du Luxembourg à Paris. Mais il doit abandonner ses projets. Enfin, les difficultés rencontrées pour la restauration du château n'ont pas rebuté M. et Mme Kessler-Cagger qui poursuivent courageusement l'uvre de leur prédécesseur. Ce château   complètement inconnu, mais  cependant fort ancien et certaines parties dateraient, dit-on du XIIe siècle. Il est entièrement entouré par des douves en eau, cantonné  à ses angles de tours cylindriques, le corps de logis de dimensions modestes, un rez-de-chaussée, un étage et un étage de comble, au centre de la façade principale, une tour d'escalier en hors oeuvre, du XVe siècle coiffée d'un toit en poivrières surmonté d'un lanternon.  Les communs couverts de toits à la Mansard, datent sans doute du XVIIe siècle. Le colombier du XVIe siècle, très bien conservé, est l'un des plus beaux de la région.","habitants":"famille de Pierre le Tellier,\r\n        \"","divers":"château de Planchette à Mignerette","gps":"","images":["../image/image_45/45_Planchette_1.jpg","../image/image_45/45_Planchette_2.jpg","../image/image_45/45_Planchette_3.jpg","../image/image_45/45_Planchette_4.jpg"]},"Consult_chateau_formulaired7cd":{"id":"Consult_chateau_formulaired7cd","dept":"45","canton":"Beaune-la-Rolande","commune":"Bordeaux en Gatinais","nom":"Plessis_Bellière","type":"Château","periode":"XVI-XVIII-XIX","histoire":"Trois châteaux dans cet article Plessis-Bellière, au sud Corbeilles .                                                                                                                          PLESSIE-BELLIER,  du XIXe siècle, pendant les guerres de Religion, Alexandre de Folarton, seigneur de Bordeaux en Gâtinais, s'en alla combattre à Bois-Commun qui était aux mains des protestants. Il les chassa pour peu de temps, car le capitaine protestant, Jacques de Brabançon de Saint-Martin le tua avant de reprendre la ville. Le domaine et ses dépendances firent l'objet d'une vente publique en 1822. C'est au château que naquit en 1832 Abel Bergasse de Nicolas Bergasse, avocat et député de Lyon, qui fut l'un des défenseurs.\r\nCORBEILLES, ce château fut bâti de 1717 à 1725 pour Nicolas François Guérin qui commanda également à Nicolas Marcelin, serrurier du Roi, la belle grille d'entrée en fer forgé qui fut posée en 1738 et qui fait encore la fierté du village. Les deux pavillons d'entrée furent ajoutés en 1760 par son fils Edouard. La famille de Tarade hérita du château de Corbeilles en 1769 et le garda jusqu'à sa vente en 1944 à la commune, qui y installa la mairie.","architecture":"PLESSIE-BELLIERE, entouré d'un beau parc arboré, le château est une maison massive et rustique coiffée d'une toiture à la Mansart du début du XIXe siècle. Un important pigeonnier d'environ huit mètres de diamètre, avec cave voûté et environ 1600 boulins, atteste de l'importance des bâtiments qui ont précédé le château actuel.                                                      CORBEILLES, château entouré de deux pavillons abritant la mairie avec colombier rond, vestiges des douves et grilles  en fer forgées.  l'ensemble est composé d'un beau parc mais aussi de douves, un pigeonnier et une orangerie.","habitants":"Plessie; Abel Bergasse                                                           Corbeilles; famille de Tarade \r\n        \"","divers":"Trois châteaux Bordeaux en Gatinais; Plessis-Bellière, au sud Corbeilles et à l'ouest Vaux-grav 5-6.","gps":"","images":["../image/image_45/45_Plessis_Belli%c3%a8re_1.jpg","../image/image_45/45_Plessis_Belli%c3%a8re_2.jpg","../image/image_45/45_Plessis_Belli%c3%a8re_3.jpg","../image/image_45/45_Plessis_Belli%c3%a8re_4.jpg","../image/image_45/45_Plessis_Belli%c3%a8re_5.jpg","../image/image_45/45_Plessis_Belli%c3%a8re_6.jpg"]},"Consult_chateau_formulaireb168":{"id":"Consult_chateau_formulaireb168","dept":"45","canton":"Briare","commune":"Ouzouer sur Trézée","nom":"Pont_Chevron","type":"Chateaux","periode":"XVI-XVIII-XIX-","histoire":"PONT-CHEVRON,  le nom de Pont Chevron, vient d'Olivier de Pont-Cheron seigneur de Montbouy compagnon de saint-Louis,  puis les Arnauld, les ruines du château médiéval sont rasées en 1870  par son propriétaire Alexandre Charlet.  Le château est habité toute l'année par les propriétaires héritiers du comte d'Harcourt en 1896  ce dernier  fit  construire un  nouveau château. Il existait au Moyen-Age un château-fort, implanté sur une ile au milieu de l'étang. On accède à la cour d'honneur à travers les communs ou en faisant le tour par l'extérieur. Il ne reste de nos jours que quelques fondations en ruine et un pont en pierre. L'ancien château qui était en ruine au début du siècle fut démoli à cette époque.                                                                                                       Chateau voisin à Pont-Chevron  ESCRIGNELLES, de tous côtés, ce château est entouré d'eaux vives et son accès ne se faisait jadis que par un pont levis. Un second fossé protégeait les communs. Au Moyen-Age s'élevait à cet emplacement un donjon que possédait en 1510 Jean de Longueau, marié a Catherine de Courtenay. La forteresse fut détruite au XVIIIe siècle et remplacée par la demeure actuelle qui fut construite en 1740 pour M. Nicou de la Chovinière. Pendant la Révolution, le château fut vendu au citoyen Ouvrard, fournisseur aux armées durant la guerre d'Espagne. Au XIXe siècle il fut racheté par le marquis de Palaiseau. Ses descendants l'ont conservé jusqu'au XIXe siècle et il appartient aujourd'hui au Comte des Garets.","architecture":"PONT-CHEVRON,  il était composé d'un quadrilatère qui se présentait comme un donjon, on communiquait à l'intérieur par un escalier desservant les différents étages, cet escalier avait été creusé dans le mur.  La construction du nouveau château a duré quatre ans. Il a été construit sur des plans du XVIIIe siècle. C'est pourquoi on retrouve dans cette architecture une symétrie parfaite, une simplicité et une élégance tout à fait remarquable,  l'édifice est formé d'un corps de logis de plan allongé. Il présente, au nord, une rotonde ovale en demi-hors-oeuvre, formant avant-corps central. Les communs sont de plan rectangulaire, ponctué au sud d'un avant-corps central. A l'intérieur, un vaisseau central distribuait les remises à voitures et les écuries. De part et d'autre, et en vis à vis du château, s'étendent deux ailes en quart de cercle, terminées par deux pavillons, celui de l'ouest abritant la chapelle. Si le décor, en façade, se concentre sur les frontons, il n'est pas absent du reste de l'édifice : des clefs sculptées en forme d'agrafes et des guirlandes de fleurs soulignent les baies ; un bossage en table anime le pavement des trumeaux. Tout autour de l'édifice court une balustrade. A l'intérieur, le hall d'entrée présente un décor architecturé rappelant celui des façades. La salle à manger s'orne d'un décor de gypserie peint en faux marbre. Le salon est orné de panneaux sur toile représentant des animaux.","habitants":"Pont; Alexandre Charlet                                                                   Escrignelles  ;M. Nicou de la Chovinière. \r\n        \"","divers":"A Ouzouer sur Trézée, le château de pont-Chevron et de Escrignelles grav-6.                                                                            Pont-Chevron 47° 41' 23\" nord, 2° 46' 12\" est","gps":"","images":["../image/image_45/45_Pont_Chevron_1.jpg","../image/image_45/45_Pont_Chevron_2.jpg","../image/image_45/45_Pont_Chevron_3.jpg","../image/image_45/45_Pont_Chevron_4.jpg","../image/image_45/45_Pont_Chevron_5.jpg","../image/image_45/45_Pont_Chevron_6.jpg"]},"Consult_chateau_formulairebe40":{"id":"Consult_chateau_formulairebe40","dept":"45","canton":"Outarville","commune":"Autruy sur Juine","nom":"Porte_Martel","type":"Château","periode":"XVII","histoire":"PORTE-MARTEL, du XVIIe siècle, la seigneurie de la Porte avait appartenu pendant plus de quatre siècles (de 1266 à 1655) à la famille de Prunelé et la première forteresse flanquée de quatre tours avait été construite en 1266 par Guillaume III de Prunelé. En 1655, Diane de Prunelé vendit sa terre à François Lesecq, trésorier général qui vendit la propriété à son tour à Damien de Martel. Jean Damien de Martel fut lieutenant général des armées du Roi en 1670 et sa famille conserva le domaine de la Porte jusqu'en 1914. Cest lun de ses descendants, Jean-Charles Elizabeth de Martel, qui deviendra maire dAutruy en 1865.","architecture":"PORTE-MARTEL, situé à l'extrême nord du département du Loiret, proche de l'Essonne, cet imposant château inachevé construit en 1605 par le marquis de Prunelé, présente de beaux décors sculptés qui portent encore la marque de la Renaissance: pilastres surmontés de chapiteaux ioniques, frises de losanges, etc. La maison domine la Vallée de la Juine qui s'y ramifie en nombreux ruisseaux d'eaux vives au milieu d'un parc luxuriant.","habitants":"famille de Prunelé \r\n        \"","divers":"A Autruy sur Juine le château de Porte-Martel.","gps":"","images":["../image/image_45/45_Porte_Martel_1.jpg","../image/image_45/45_Porte_Martel_2.jpg"]},"Consult_chateau_formulairee2bc":{"id":"Consult_chateau_formulairee2bc","dept":"45","canton":"Châtillon-Coligny","commune":"Pressigny-les-Pins","nom":"Pressigny_Pins","type":"Château","periode":"XVI-XVIII-XIX","histoire":"Trois châteaux dans cet article dont;  Préssigny les Pins, Beaudenin, et de la Valette.                                                                                 BEAUDENIN, du XIXe siècle, selon la propriétaire actuelle, le château de Beaudenin aurait été construit à la fin du quatrième quart du XIXe siècle, sur les fondations d'un bâtiment plus ancien, dans le style normand, pour Charles Saunier, rentier.                                                                                                                         PRESSIGNY les PINS   du XVI -XVIIe siècle, ancien fief dépendant de la seigneurie de Praslin, le château fort de Pressigny était construit dans le bourg. Il reste une tour de défense du XVIe siècle, le colombier et la grange de cet ensemble datant probablement de la même époque. Le monumental porche d'entrée est du XVIIe siècle et les communs ont été bâtis au XVIIIe siècle en rez-de-chaussée, toit à longs pans en croupe ; toit en pavillon ; toit conique, couvert en  tuile plate et ardoise.                                                                                        La VALETTE  Le château de la Valette, a été construit vers 1880 . Une chapelle fut bâtie en 1899 dans le parc planté d'arbres. Depuis 1935, la demeure appartient à l'ambassade d'Espagne et elle accueille des émigrés politiques espagnols.","architecture":"BEAUDENIN, en moellons de calcaire assises sous tous les bâtiments ; le corps de  logis  en L  est en moellons enduits au rez-de-chaussée et en faux pans de bois (ciment) à l'étage, les baies sont encadrées de brique au rez-de-chaussée ; le bâtiment nord-est du corps de logis est en moellons de calcaire et le niveau de comble est en faux pans de bois ; le bâtiment sud-ouest du corps de logis est en moellons enduits au rez-de-chaussée, en brique à l'étage (baies encadrées de pierre) et en faux pans de bois à l'étage de comble.                                                                                                          La VALETTE, l'édifice abritait également un collège espagnol qui ferme ses portes en 1986, le clocheton n'existe plus après 1930, le monogramme PB figure à la grille en fer forgé située sur le côté nord-ouest des limites du parc. Une chapelle fut bâtie en 1899 dans le parc planté d'arbres.Murs enduits; chaînes d'angle et encadrements de baies en brique et pierre aux deux façades, les trois travées centrales sont accostées de trois ordres superposés dorique, ionique et toscan.","habitants":"Responsble locaux\r\n        \r\n        \"","divers":"Trois châteaux à Pressigny-les-Pins  dont de Préssigny valette-grav 1-2-3-4.  Vieux Pressigny grav-5. Beaudenin grav -6-7,                                                                                             Beaudenin 47° 51' 59\" nord, 2° 46' 21\" est                              Valette   47° 52' 56\" nord, 2° 45' 04\" est","gps":"","images":["../image/image_45/45_Pressigny_Pins_1.jpg","../image/image_45/45_Pressigny_Pins_2.jpg","../image/image_45/45_Pressigny_Pins_3.jpg","../image/image_45/45_Pressigny_Pins_4.jpg","../image/image_45/45_Pressigny_Pins_5.jpg","../image/image_45/45_Pressigny_Pins_6.jpg","../image/image_45/45_Pressigny_Pins_7.jpg"]},"Consult_chateau_formulaireb0b1":{"id":"Consult_chateau_formulaireb0b1","dept":"45","canton":"Fay aux Loges","commune":"Fay aux Loges","nom":"Reynerie_45","type":"Château","periode":"XVIII","histoire":"REYNERIE , au XIXe siècle, le château de la Reynerie appartient à la riche famille des Jarry, dont le célèbre feuilletoniste, Alexis Ponson du Terrail épouse en 1857 la jolie héritière à Orléans, on voit le romancier séjourner souvent dans la propriété de son épouse qui, après la mort de son mari en 1871, continue d'y résider. Après son décès, il est successivement racheté par M. Monceau, puis par le peintre belge Van Beers, qui y meurt en 1927. Le couturier parisien Christoba Balenciaga acquiert La Reynerie en 1943. Au fond du parc, la source de Saint-Cosme, surmontée d'une petite chapelle, était autrefois le but de pèlerinages et de processions.","architecture":"REYNERIE, un élégant toit à la Mansart donne à cette demeure, avec ses deux petites ailes en retour, un cachet du XVIIIe siècle, on peut d'ailleurs lire la date de 1768 gravée sur la pierre du linteau central sur la façade sud. Les cheminées ont été ajoutées plus tard.","habitants":"famille des Jarry\r\n        \"","divers":"A la Fay aux Loges le château de la  Reynerie","gps":"","images":["../image/image_45/45_Reynerie_45_1.jpg"]},"Consult_chateau_formulaire24c4":{"id":"Consult_chateau_formulaire24c4","dept":"45","canton":"Châteauneuf-sur-Loire","commune":"Châteauneuf-sur-Loire","nom":"Rivière_Chatenoy","type":"Forteresse","periode":"XV-XVI-XVII","histoire":"La RIVIERE, à la fin du XVe siècle, Robert de Harlay, troisième fils de Louis de Harlay et de Germaine Cur, acquit le domaine de la Rivière. Vers 1580, Nicolas de Harlay conseillé au parlement de Paris, maître des requêtes et surintendant des Finances, familier du Roi Henri III, qu'il avait aidé financièrement, fit reconstruire le château selon la mode de l'époque. En 1659, Achille de Harlay le vendit à Louis de Louviers fils d'un drapier qui le laissa en 1694 à sa veuve, dame Geneviève de Gaumont. Leur fille épousa en 1686 le marquis Achille d'Assigny. Ils eurent deux enfants, un fils, Jean Baptiste d'Assigny qui se maria à Louise David de Bousquet, et une fille qui épousa le comte François Charles de Sampigny, capitaine du régiment de Vaudémont. Les deux beaux-frères conservèrent la propriété en indivision, mais Jean-Baptiste d'Assigny mourut le premier en laissant une fille, née en 1743, qui épousa son cousin germain, Louis-Charles de Sampigny, officier des mousquetaires du Roi. En 1785, le domaine de la Rivière fut élevé en sa faveur en marquisat par le Roi Louis XVI. Le château de la Rivière fut vendu en 1795 à Pierre Tassin de Maupas, drapier à Orléans. Ensuite ses descendants le revendirent en 1814 à Jean-Louis Blanchard, négociant à Orléans. Son petit fils Anatole Thiercelin fit réaménager le château en 1860. En 1875, Louise Thiercelin épousa le futur général Brugère qui s'était distingué en 1870 au combat de Beaune-la-Rolande. Leurs descendants y demeurent toujours.","architecture":"La RIVIERE, construit en briques roses, est formé d'un donjon à poivrières s'ouvrant par une porte défendue par un pont-levis et d'un grand corps de logis flanqué de deux grosses tours, l' accès se fait par une allée d'arbres conduisant à la façade de briques roses. La construction comprend un donjon carré de deux étages et un corps de bâtiment qui lui est accolé en équerre au sud. Les douves forment un canal rectangulaire, entourant également la cour au nord et la pelouse au sud. L'entrée se fait par le donjon, précédée d'un pont de pierre ayant remplacé le pont-levis. La façade extérieure du donjon est flanquée de deux tours en poivrière. Un grand portail en anse de panier donne accès au vestibule qui occupe la base du donjon, et débouche dans la cour par un portail identique. La façade sur cour présente à peu près la même ordonnance, moins les tourelles. Le côté nord de la cour était occupé, à l'origine, par les communs qui ont été reportés, au XIXe siècle, au-delà de la douve, rejoignant les écuries et le colombier. Au XIXe siècle, une tour carrée et crénelée a été accolée à la façade sud du donjon.","habitants":"comte François Charles de Sampigny\r\n        \r\n        \"","divers":"A Châteauneuf-sur-Loire le château de la Rivière-Chatenoy","gps":"","images":["../image/image_45/45_Rivi%c3%a8re_Chatenoy_1.jpg","../image/image_45/45_Rivi%c3%a8re_Chatenoy_2.jpg","../image/image_45/45_Rivi%c3%a8re_Chatenoy_3.jpg"]},"Consult_chateau_formulaire2b10":{"id":"Consult_chateau_formulaire2b10","dept":"45","canton":"Beaune-la-Rolande","commune":"Beaune-la-Rolande","nom":"Rochefort_45","type":"Forteresse","periode":"XIII-XVI-XX","histoire":"ROCHEFORT, Au XIVe siècle le château appartenait à la famille de Rochefort qui lui laissa son nom. En 1371, Jehan de Rochefort partit combattre les Anglais sous les ordres du maréchal Louis de Sancerre, Jean de Rochefort s'en revint à Barville. En 1505, Jean Couard, écuyer, est seigneur de Barville et Rochefort. En 1597, on trouve Jehan de la Mothe, écuyer. Au XVIIe siècle, la vieille forteresse abrita Marguery de Calvy, écuyer, seigneur des Loges et de Rochefort. Au XVIIIe siècle, le château était à un négociant parisien, Pierre Pouillot, et à son épouse Geneviève Fagot, morte en 1780, originaire d'une famille de négociants en vins de Boynes, puis à leur gendre, M. Huré Duvallot, qui fut maire de Barville. En 1835, le domaine passa entre les mains de la famille Laperche, qui le céda en 1899 à Théophile Marois, son petit-fils, le professeur Robert Gaumont, entreprit la restauration de cette remarquable demeure qui n'en pouvait plus de vieillesse. Il effaça les traces des modernisations excessives des XVIIIe et XIXe siècles et redonna à la façade un aspect en harmonie avec le style médiéval de l'antique demeure.","architecture":"ROCHEFORT, la toiture et les tourelles coiffées de poivrières du château de Rochefort émergent du paysage et forment avec le village de Barville en Gâtinais qui s'étend de l'autre côté de la route forme un bel ensemble. Le château est une forteresse médiévale d'un style très pur composée d'un gros corps de logis carré flanqué de quatre tours d'angles. La plus grosse d'entre elles contient l'escalier qui ouvre sur la façade par une porte gothique en accolade ornée d'un écusson. Les trois autres tours sont pleines et forment un contrefort jusqu'à la hauteur des combles. Ces contreforts sont aujourd'hui inutiles car le château de Rochefort est entouré de jardins, mais à l'origine il baignait directement dans l'eau et les contreforts d'angles assuraient sa solidité. Sur trois de ses côtés il est encore entouré de douves en eau creusées dans le lit du ruisseau du Fusain. Le château de Rochefort est certainement l'une des plus anciennes demeures de l'Orléanais.  Pendant plus de sept siècles, Rochefort resta sous la dépendance des moines de Saint-Denis, mais au cours de cette période, le domaine ne con
