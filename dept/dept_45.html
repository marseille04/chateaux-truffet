mg":"../image/image_45/45_Vrigny_1.jpg"},{"id":"Consult_chateau_formulaire15d5","nom":"Yèvre_le_Chatel","commune":"Yèvre le châtel","type":"Vestiges","img":"../image/image_45/45_Y%c3%a8vre_le_Chatel_1.jpg"}];const FULL={"Consult_chateau_formulaired915":{"id":"Consult_chateau_formulaired915","dept":"45","canton":"Briare","commune":"Adon","nom":"Adon","type":"château","periode":"XIX","histoire":"deux châteaux dans cet article; Adon et Rebel-Oiseau.                      ADON,  il y avait là, sur une motte entourée de fossés, une demeure seigneuriale, fief vassal de la seigneurie de La Bussière. Ce château de \"la Mothe-d'Adon\" appartenait aux XVIIe et XVIIIe siècles, à la famille de Gadois, puis à la famille de La Chauverie. Augustin de Luigny de La Chauverie vend le domaine en 1772 à Arsène André Tourolle, écuyer, qui fait reconstruire un nouveau château. La demeure passe par héritage aux familles de La Boulaye et de Thugny, dont les héritiers vendent la propriété en 1850.  En 1879, le domaine est racheté par Arthur Jaupitre qui fait rebâtir le château en 1887. La famille Jaupitre conserve la propriété jusqu'en 1937.                                                                                                         REBEL OISEAU  En 1809, le célèbre général-comte de Boigne, qui avait acquis une immense fortune aux Indes, devient propriétaire du château et du domaine de L'Arblaiseau,","architecture":"ADON, le domaine est alors composé d'une maison de maître, jardins, cour d'honneur, communs et étangs. L'édifice présente une ordonnance harmonieuse avec un corps de logis, au centre duquel la porte d'entrée s'inscrit dans une tourelle à pans coupés, prolongé de deux pavillons. Les combles sont éclairés par de belles lucarnes circulaires sculptées,  un long bâtiment en rez-de-chaussée avec un étage de combles percés de larges lucarnes.                                                                                                                    REBEL OISEAU, cette solide et harmonieuse demeure figure sous son nom d'origine sur la carte de Cassini dressée par ordre du Roi Louis XV: l'Arblaiseau. le parc est embellit  par le général; sans doute est-ce à lui que nous devons les magnifiques séquoias qui s'y dressent, défiant le temps et les tempêtes. Plus tard, par déformation populaire, son nom s'est transformé en Rebel-Oiseau. Le logis est flanqué d'une tour au toit pointu qui abrite une cloche qui ajoute au charme de l'endroit.","habitants":"Adon; famille de La Chauverie                                                     Rebel-Oiseau;   général-comte de Boigne\r\n        \"","divers":"deux châteaux à Ardon; Adon grav 1-2, Rebel-Oiseau grav 3  et St-Père grav-4.                                                                          Adon 47° 45' 42? nord, 2° 47' 42? est","gps":"","images":["../image/image_45/45_Adon_1.jpg","../image/image_45/45_Adon_2.jpg","../image/image_45/45_Adon_3.jpg","../image/image_45/45_Adon_4.jpg"]},"Consult_chateau_formulaired780":{"id":"Consult_chateau_formulaired780","dept":"45","canton":"Chécy","commune":"Donnery","nom":"Allone","type":"Château","periode":"XV-XIX","histoire":"ALLONE, la seigneurie d'Allone, située à Donnery, était vassale de la seigneurie du Four à ban de Vitry-aux-Loges jusqu'au début du XVIIe siècle, puis du duché d'Orléans. le château est très lié à l'histoire de Donnery, car la seigneurie regroupa au début du XVIIe siècle celles de Donnery et de la Touche, les deux domaines seront réunis jusqu'en 1830. La famille de Foyal, qui occupe les lieux du XVe siècle jusqu'au début du XVIIIe siècle, vend la seigneurie en 1710 à Jules de Flacourt. Mais après le départ des Foyal, le château inhabité tombe en ruine, seule la basse-cour est occupée et reçoit des travaux d'entretien. En 1814, Noël Pasques négociant belge, fait l'acquisition du domaine et fait édifier la demeure actuelle. Sa famille y réside toujours.  Ces deux domaines furent vendus à la famille Leduc en 1719, puis en 1814 à la famille Pâque, qui en demeura conjointement propriétaire jusqu'en 1830. Ils s'étendaient sur les communes de Donnery et, pour partie, de Mardié et Trainou, la plupart des fermes de ces trois communes en ayant dépendu anciennement.","architecture":"ALLONE, les bâtiments sont positionnés selon un plan rectangulaire autour d'une grande cour, rappelant les plans des fermes fortifiés de l'Orléanais et de la Beauce. Les bâtiments frontaux sont flanqués de deux grosses tours cylindriques couvertes d'un toit conique. La tour de droite est un pigeonnier à pied, dont on peut voir encore les boulins. Devant le château d'Allone se trouve un jardin semi-circulaire, qui autrefois devait former un glacis d'entrée.","habitants":"Famille de   Jules de Flacourt\r\n        \"","divers":"Château d'Allone à Doméry","gps":"","images":["../image/image_45/45_Allone_1.jpg","../image/image_45/45_Allone_2.jpg","../image/image_45/45_Allone_3.jpg"]},"Consult_chateau_formulairec32b":{"id":"Consult_chateau_formulairec32b","dept":"45","canton":"Amilly","commune":"Amilly","nom":"Amilly","type":"Château","periode":"XVII-XIX","histoire":"Trois châteaux dans cet article; Bourgoins, Chesnoy, et Pailleterie.  Varennes voir article.                                                                                                   BOURGOINS, du couvent des Dominicaines de Montargis tout proche, fondé par Amicie, fille de Simon de Montfort et épouse de Gauthier II de Courtenay. Sur les ruines du manoir de la seigneurie des Bourgoins s'éleva par la suite un bâtiment d'époque Louis XIV que vendirent les religieuses. C'est le docteur Trioson, médecin des armées du roi, qui acquit le domaine, fit raser la maison et fit bâtir en 1775 l'élégant château de style Louis XVI qui existe encore aujourd'hui. Le docteur Trioson légua ce château à son fils adoptif, le peintre Girodet-Trioson, dont les initiales G.T. se retrouvent sur la grille et les balcons. Au fronton de cette grille, on trouve la devise \"Libertatis exoneratae recessus\", et au-dessus des entrées du château, on lit côté nord, Nec plus nec minus, et côté sud : Paix et Peu. Girodet-Trioson résida souvent aux Bourgoins et y recevait. N'ayant pas d'enfant, il légua son domaine à sa nièce, Rosine Becquerel Despreaux, qui le transmit à ses descendants. Ceux-ci le vendirent en 1900, en emmenant à Chenevières les meubles et les collections.                                                                      CHESNOY, du début du XIXe siècle, Le Chesnoy est un ensemble composé de trois fermes à la lisière de la forêt. L'une d'elle devient la propriété de la ville de Montargis, qui, grâce au legs des époux Roux Fédry, y crée, au nom de l'État, le 17 novembre 1886, une école pratique d'agriculture.","architecture":"CHESNOY, l'imposant bâtiment aux ouvertures ourlées de brique date de cette époque. Aujourd'hui, le lycée Le Chesnoy les Barres est l'un des fleurons de l'enseignement agricole et l'un des plus grands établissements de ce type en France.                                                                                                            PAILLETERIE, au XVIIe siècle, le château s'appelle Le Chesnoy et appartient à un personnage important et fortuné, Jacques Guyon, seigneur de la Rivière et du Chesnoy, receveur des Aides et Tailles de Montargis. C'est à lui et à Guillaume Boutheroüe, que Louis XIII accorde en 1638, l'autorisation de terminer à leurs frais la construction du canal de Briare, en devenant propriétaires et en l'exploitant. Le canal est ouvert à la navigation en 1642. Pour le remercier, le roi anoblit le commanditaire du canal, qui prend désormais le nom de Guyon du Chesnoy. Le fils de ce dernier épouse en 1664 Jeanne Marie Bouvier de La Mothe. L'une des filles du couple, Jeanne-Marie Guyon du Chesnoy épouse le fils de Nicolas Fouquet. En 1754, un gentilhomme du Pays de Caux Davy de La Pailleterie, achète le domaine qu'il agrandit et rebaptise La Pailleterie. En 1769, il le vend à Nicolas Croquet de Béligny. Le château que nous pouvons admirer aujourd'hui, très équilibré avec son fronton et sa longue façade rythmée de neuf ouvertures sur chacun des deux étages, a été construit au XVIIIe siècle. Ces bâtiments du XVIIe siècle abritent le musée des Arts et Traditions du Gâtinais.","habitants":"Bourgoins; famille Becquerel Despreaux\r\n        \"","divers":"Trois châteaux à Amilly;  Bourgoins grav-1,  Chesnoy grav-2,   Pailleterie  grav 3-4","gps":"","images":["../image/image_45/45_Amilly_1.jpg","../image/image_45/45_Amilly_2.jpg","../image/image_45/45_Amilly_3.jpg","../image/image_45/45_Amilly_4.jpg"]},"Consult_chateau_formulaire8602":{"id":"Consult_chateau_formulaire8602","dept":"45","canton":"Outarville","commune":"Oison","nom":"Amoy","type":"Château","periode":"XVI","histoire":"AMOY, situé dans un bosquet ombreux, le château d'Amoy constitue une oasis de verdure au milieu de la plaine beauceronne des environs d'Aschères. Possession de l'abbaye de Saint Denis jusqu'en 1209, le château passe au chevalier Mathieu de Dossainville. La seigneurie d'Amoy appartiendra aux Rochon d'Amoy (ou Robichon d'Amoy) qui s'y maintiennent pendant des siècles. En 1793, le château était passé par alliance à Paul Prévot, chevalier, baron et seigneur d'Amoy apparenté à la famille de Secqueville.","architecture":"AMOY, le domaine est agrandi au milieu du XVIIe siècle par diverses acquisitions. L'actuel château d'Amoy date probablement de cette période. Après la Révolution, les communs sont restaurés et de nouvelles constructions élevées, empiétant notamment sur les douves à l'est. Le parc boisé situé au sud est traversé par deux allées rectilignes. L'avant-cour donne accès, par un pont dormant, à une plate-forme quadrangulaire, cernée de douves sèches, qui supporte le corps de logis ainsi que les communs. Cette plate-forme est très ancienne : le soubassement des tours qui la flanquaient, toujours visibles pour certaines d'entre elles, conserve des assises en pierres de taille  d'origine médiévale. Le corps de logis se compose d'un niveau entresolé, d'un rez-de-chaussée surmonté d'un étage carré et d'un niveau de combles. La façade principale nord comporte cinq frontons alternativement triangulaires et cintrés, côté sud, tous triangulaires. Deux épis de faîtage sont visibles au niveau de la toiture. Le plan actuel montre de larges transformations ainsi qu'une surface occupée plus importante. A la fin du XIXe siècle ou au début du XXe siècle, les élévations ont été repercées, perdant leur aspect d'origine.","habitants":"Mathieu de Dossainville.\r\n        \"","divers":"A Oison le château d 'Amoy  48° 08' 34\" nord, 1° 59' 14\" est","gps":"","images":["../image/image_45/45_Amoy_1.jpg","../image/image_45/45_Amoy_2.jpg"]},"Consult_chateau_formulaire83cc":{"id":"Consult_chateau_formulaire83cc","dept":"45","canton":"Ferté-Sain-Aubin","commune":"Ardon","nom":"Ardon","type":"Château","periode":"XIX","histoire":"Quatre châteaux dans cet article  Buglin, Madères, Renardière, Rousselière et Villiers.                                                                                                           ROUSSELIERE, dont il ne reste qu'une partie, est moins un château qu'un manoir qui appartint à M. Houël, architecte à Paris qui le reconstruisit et l'agrandit vers 1890. Il est lié au souvenir de Laréveillère Lepeaux, conventionnel, membre du Directoire, qui l'acheta le 13 messidor an XII, des époux Chauvet, alors qu'il habitait avec sa femme Céline à Paris. Le député arriva en septembre 1804 au château où il passa ses dernières années dans la disgrâce et l'oubli. M. Légier, député au conseil des Cinq-Cents, a également habité La Rousselière.                                                                     BUGLAIN, avant la Révolution, à une des branches de la famille d'Orléans. La seigneurie était annexée au duché du même nom, Madeleine d'Orléans devint, le 22 vendémiaire an XII, propriétaire au titre d'héritière de sa mère, Françoise de Troyes. Madeleine d'Orléans vendit ce domaine, le 25 août 1800, à Thomas-Philippe Lézier, conseiller à la cour d'Orléans, qui le laissa à son neveu, Germain-Nicolas, avocat à la susdite cour. C'est des héritiers de Germain-Nicolas qu'en 1852, M. Dominique Delafon l'acheta. Il mourut en juin 1890, à l'âge de 80 ans après une magistrature de 38 années à la mairie d'Ardon. Il laissait une veuve qui, âgée de 85 ans, habitait encore le château avec ses enfants.","architecture":"RENARDIERE,   deux tours rondes semblent monter la garde devant cette demeure du XIXe siècle, qui font à l'entrée comme un aspect terrible, mais que l'accueil dément aussitôt. Le bâtiment principal à deux étages carrés couvert d'ardoise, est prolongé de deux pavillons asymétriques, dont l'un est surhaussé d'un étage.                                                                                                                         VILLIERS, le château de Villiers a été construit vers 1885 pour la famille d'Aubrun en style néo-Louis XIII, selon la tradition largement répandue du château de chasse solognot. Il développe à l'est et à l'ouest ses deux façades en brique et pierre de taille, au centre desquelles un beau pavillon avancé et à trois pans élève sa toiture légère et majestueuse en même temps et sur les cheminées se détachent les chiffres des châtelains. Sur la façade nord est accolée une chapelle dont le toit plat à balustre fait terrasse aux fenêtres du premier étage.","habitants":"Rousselière, Famille Chauvet                             Buglain;Thomas-Philippe Lézier                                                    Villiers; famille d'Aubrun\r\n        \"","divers":"Quatre châteaux à Ardon;   Buglain grav-1, Madères grav-3, Renardière grav-2, Rousselière et Villiers-4.                                                                                Buglain  47° 45' 45\" nord, 1° 52' 10\" est                                         Madères     47° 43' 59\" nord, 1° 53' 27\" est                                   Renardière   47° 46' 25\" nord, 1° 52' 39\" est                                      Rousseliere-Buglain  47° 45' 52\" nord, 1° 53' 07\" est                                       Villiers 47° 47' 50\" nord, 1° 53' 24\" est","gps":"","images":["../image/image_45/45_Ardon_1.jpg","../image/image_45/45_Ardon_2.jpg","../image/image_45/45_Ardon_3.jpg","../image/image_45/45_Ardon_4.jpg"]},"Consult_chateau_formulaire36cd":{"id":"Consult_chateau_formulaire36cd","dept":"45","canton":"Gien","commune":"Arrabloy","nom":"Arrabloy","type":"Forteresse","periode":"XIII","histoire":"ARRABLOY, le vieux donjon ruiné d'Arrabloy est fort ancien. Le premier seigneur qui s'illustra fut Jean d'Arrabloy, ami et confident de Philippe IV le Bel, qui le nomma sénéchal de Périgord et de Quercy, mort vers 1303. Son fils Pierre fut chancelier de France sous Louis X le Hutin avant d'entrer dans les ordres et de finir cardinal en 1316, il se fit enterrer en l'église d'Arrabloy en 1340.. Il épousa Jeanne dAnlézy, qui décèdera en 1310 et sera enterrée dans léglise paroissiale dArrabloy. Il mourut en 1311, (ou 1329) à Arrabloy. Il laissa un fils, Pierre dArrabloy, qui fut  cardinal en 1316 par le pape Jean XXII, puis fut fait chancelier de France par Louis X en 1316.","architecture":"ARRABLOY, dans le bourg, il y a les vestiges de la forteresse construite au XIIIe siècle par Jehan dArrabloy. Construit en forme de carré de 30 mètres de côté, il est fortifié par des tours dangle polygonales, possède un donjon et une tour carrée qui sert de porte dentrée. Les douves laissent encore apparentes les bases des tours. Les meurtrières présentent sur cet édifice la fonction défensive de ce château. Situé en plaine, il avait pour rôle de protéger les populations alentour des brigands. Jehan dArrabloy, noble français, seigneur , fut lun des intimes du roi, Philippe le Bel, qui le nomma sénéchal du Quercy et du Périgord. Il eut à soutenir de nombreux combats en Aquitaine contre les troupes du Roi dAngleterre, ce qui fit sa renommée,  Les ruines d'Arrabloy, qui étaient autrefois envahies de broussailles, ont été habilement dégagées et restaurées. Elles montrent un quadrilatère défendu par des tours d'angles polygonales. La porte d'entrée, fortifiée est bien conservée et la sévérité des constructions défensives est heureusement tempérée par d'élégantes fenêtres à meneaux.","habitants":"Arabloy, Jehan dArrabloy\r\n        \"","divers":"Château d'Arabloy-   47° 42' 13\" nord, 2° 42' 41\" est","gps":"","images":["../image/image_45/45_Arrabloy_1.jpg","../image/image_45/45_Arrabloy_2.jpg","../image/image_45/45_Arrabloy_3.jpg"]},"Consult_chateau_formulaire463d":{"id":"Consult_chateau_formulaire463d","dept":"45","canton":"Puiseaux","commune":"Augerville","nom":"Augerville","type":"Château","periode":"XVIII","histoire":"AUGERVILLE, a la fin du XIIIe siècle, Pierre-de-Beaumont fait édifier, avec son frère Dreux, un château fort. En 1290, le fils de Dreux, Jehan de Beaumont, seigneur d'Augerville, maître du palais royal sous les rois Philippe IV le Bel et Louis X le Hutin, hérite du château qu'il agrandit. Au XVe siècle, faute d'entretien et du fait des pillages, il devient une ruine qu'achète Jacques Coeur qui, en tant que grand argentier de Charles VII, a coutume de racheter les fiefs abandonnés après la guerre de Cent Ans, pour les remembrer à sa guise. Jacques II Cur hérite du domaine en 1488, puis sa sur, Marie Cur de 1505 à 1557, et ensuite sont fils, Jean Luillier. Il accueille le 17 septembre 1562, Catherine de Médicis et le jeune roi Charles IX, Jean Luillier meurt en 1563 à Paris, léguant le château et fief d'Augerville à son fils Nicolas en 1588. Et le château passera encore de mains en mains. En septembre 1976, le mobilier est vendu aux enchères et le domaine adjugés à monsieur Dupont, qui a l'intention d'y créer un parc de loisirs.","architecture":"AUGERVILLE, la municipalité d'Augerville la Rivière ayant obtenu le classement de la façade du château et des communs aux M.H. , le parc de loisirs ne verra pas le jour. À défaut, M. Dupont aménage une boîte de nuit dans une aile des communs. C'est là que dans la nuit du 6 au 7 janvier 1986, un incendie criminel détruit la discothèque. À cette date, le château est inhabitable, car sa toiture à refaire laisse passer l'eau à maints endroits. De 1986 à 1989, le château et le domaine d'Augerville-la-Rivière sont revendus deux fois.\r\nDu Moyen Age subsistent la plateforme, quatre tours d'angle du bâtiment principal et les douves. Ce bâtiment est rectangulaire avec avant-corps saillant et un grand comble à la française à lucarnes de pierre du XVIe siècle. La façade sur le parc a été remaniée au XXe siècle. De part et d'autre de l'entrée du domaine, les dépendances conservent le caractère architectural du XVIIe siècle, de même que le pigeonnier. Ce dernier conserve en fonctionnement le dispositif intérieur de charpente sur pivot desservant les alvéoles.  M.H. inscription par arrêté du 20 août 1976.","habitants":"Augerville;  Jean Luillier\r\n        \"","divers":"Château d'Augerville la Rivière,     48° 15' 04\" nord, 2° 26' 20\" est1","gps":"","images":["../image/image_45/45_Augerville_1.jpg","../image/image_45/45_Augerville_2.jpg","../image/image_45/45_Augerville_3.jpg","../image/image_45/45_Augerville_4.jpg"]},"Consult_chateau_formulairee66b":{"id":"Consult_chateau_formulairee66b","dept":"45","canton":"Puiseaux","commune":"Boësses","nom":"Aulnay_sous_Boésses","type":"Château","periode":"XIII-XVIII","histoire":"AULNAY-BOESSES, est un ancien château-fort, qui conserve une tour en parfait état et dont les origines datent du XIIIe siècle. Son nom vient du seigneur Jean d'Aulnay qui y vécut au XIIIe siècle. La demeure est située à 95 km au sud-ouest de Paris, entre Fontainebleau et Orléans au coeur du Gâtinais. Chambres d'hôtes.","architecture":"AULNAY-BOESSES,  le bâtiment principal a été rénové au XVIIIe siècle et s'ouvre vers l'Est. Une grande allée de 60 m est close par un portail. On accède à l'entrée centrale au premier étage, par un perron à deux volées. Du bas du perron, cinq étages vous conduisent jusqu'en haut de la tour, d'où un superbe panorama de 360° vous fera découvrir champs et plaines à perte de vue et les grands arbres des bois qui s'étendent face à la demeure. D'anciennes douves bordent l'édifice à l'ouest et au sud où elles finissent en un étang, enjambé par un pont de bois. Un parc planté d'arbres fruitiers, de peupliers, de fleurs et plantes entourent la propriété protégée par cinq hectares de terres et de bois.","habitants":"seigneur Jean d'Aulnay\r\n        \"","divers":"Château d'Aulnay sous Boésses","gps":"","images":["../image/image_45/45_Aulnay_sous_Bo%c3%a9sses_1.jpg","../image/image_45/45_Aulnay_sous_Bo%c3%a9sses_2.jpg"]},"Consult_chateau_formulaire2858":{"id":"Consult_chateau_formulaire2858","dept":"45","canton":"Châtillon-sur-Loire","commune":"Autry_le_Chatel","nom":"Autry_le_Chatel","type":"Château","periode":"XV-XVII-XIX","histoire":"Quatre châteaux dans cet article; Autry, Guibardière, Robinière et La Roche.                                                                                                                AUTRY le CHATEL dit  le petit-château,  siège de la châtellenie dAutry la ville quon date de la fin du XVe siècle. Au XVIIe siècle, Louis Turpin de Crissé, comte de Sansay épousa Anne Marie de Coulanges, cousine de la Marquise de Sévigné qui fit plusieurs séjours à Autry, chez sa cousine. A la Révolution, le marquis de Saint Brisson, Maximilien Séguier, qui avait épousé Mademoiselle Le Roy de Valmont, fille des seigneurs dAutry, vint habiter Autry, où il se sentait plus à labri. En 1823, Mme Robert Colas des Francs acquit du colonel Séguier les terres dAutry le Châtel  et dAutry la Ville (le Petit château).  Le château est un grand bâtiment rectangulaire flanqué au nord et en milieu de façade d'une tour polygonale d'escalier et, au sud, de deux tours d'angles circulaires, celle de l'ouest abritant un oratoire du XVe siècle. La cour d'honneur est limitée par des douves autrefois en eau.                                                                                                         ROBINIERE, cette élégante propriété a été érigée dans un environnement champêtre. Les couvreurs, par souci d'esthétique ou d'économie de matériaux, ont fait alterner de petites tuiles sur la partie centrale et des ardoises sur les noues et les ailes de construction antérieure. Les bâtiments d'exploitation, qui se trouvent à proximité de la maison principale, présentent une grange à longs pans interrompus par une ouverture charretière surmontée d'un colombier carré. Le château de la Robinière a appartenu à une famille huguenote d'origine luxembourgeoise, les Streing, installé à Gien et dont l'un des membres, Henri, s'est marié avec Marie Babeau de La Robinière dans la chapelle de Chamerolles.","architecture":"GUILBARDERIE, au XVIIIe siècle, une gentilhommière, avec des bâtiments ruraux et une ferme que Sigismond Devade, notaire à Orléans et député, après en avoir hérité au XIXe siècle, décide de le remodeler complètement. Bâti sur un étage au-dessus d'un entresol, on y accède par un escalier droit au milieu de la façade pour laquelle le projet d'origine prévoyait un avant corps à pans coupés, non réalisé. Au bâtiment principal construit en briques, fabriquées sur le domaine, à motifs roses et noirs et structurés d'une modénature de pierre blanche, répondent en négatif les communs bâtis en moellon enduit blanc. Les premiers sont couverts d'ardoises, et les seconds de tuiles plates respectant ainsi la hiérarchie des matériaux. De 1942 à 1957, propriété de la famille Pintat, puis à la famille Honnorat qui le conservera jusqu'en 2002.                                                                    La ROCHE, appartenaient aux seigneurs d'Autry. En 1848, M. l'abbé Tallereau, a été bâti à la fin du XIXe siècle sur un domaine de 500 ha incluant la ferme. Après être passée entre différentes mains, la propriété est achetée par la ville d'Aubervilliers qui en fait, entre 1947 et 1980, une colonie de vacances. Le corps de bâtiment est encadré de deux petits pavillons symétriques, les toitures sont percées de lucarnes à fronton cintré. A l'intérieur, l'escalier monumental est orné d'un vitrail signé Delon.","habitants":"Autry; Louis Turpin de Crissé,                                  Robinière;les Streing, Guibardière; famille Pintat\r\n        \"","divers":"Quatre châteaux à Autry le Châtel ;  Autry grav-1-2, Guibardière grav-3, Robinière grav-4 et La Roche grav-5","gps":"","images":["../image/image_45/45_Autry_le_Chatel_1.jpg","../image/image_45/45_Autry_le_Chatel_2.jpg","../image/image_45/45_Autry_le_Chatel_3.jpg","../image/image_45/45_Autry_le_Chatel_4.jpg","../image/image_45/45_Autry_le_Chatel_5.jpg"]},"Consult_chateau_formulaireb43e":{"id":"Consult_chateau_formulaireb43e","dept":"45","canton":"Arthenay","commune":"Arthenay","nom":"Auvilliers","type":"Château","periode":"XVII-XVIII","histoire":"AUVILLIERS, c'est un grand château construit aux XVIIe et XVIIIe siècles entouré d'un parc qui a été dessiné par André Le Nôtre. La marquise de Pompadour l'acquit en 1761 . Madame de Montespan et le roi Louis XIV s'y arrêtaient à chacun de leurs voyages au château de Chambord. Au XVIIIe siècle, il appartenait à l'intendant de la généralité d'Orléans, Perrin de Cypierre, qui possédait également le château de Chevilly. Aujourd'hui,  c' est un complexe médico-social accueillant plus de cent adultes handicapés mentaux.","architecture":"AUVILLIERS, corps de logis de plan rectangulaire à trois niveaux sur soubassements, deux étages et lucarnes sur toit en trois pavillons de trois travées, l'édifice est flanqué de deux tours rondes aux extrémités, toit en poivrières.","habitants":"Madame de Montespan\r\n        \"","divers":"Château d'Auvilliers à Artenay","gps":"","images":["../image/image_45/45_Auvilliers_1.jpg","../image/image_45/45_Auvilliers_2.jpg","../image/image_45/45_Auvilliers_3.jpg","../image/image_45/45_Auvilliers_4.jpg"]},"Consult_chateau_formulaire68e4":{"id":"Consult_chateau_formulaire68e4","dept":"45","canton":"Meung-sur-Loire","commune":"Baccon","nom":"Baccon","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux dans cet article; Renardière et Touanne. RENARDIERE,   l'une des Mauves prend sa source dans le parc  de cette très ancienne seigneurie qui était, aux XVe et XVIe siècles aux Mareau, importante famille d'échevins orléanais. En 1714, le propriétaire de La Renardière est Jean Nicolas Martinet, seigneur haut justicier de Charsonville, chef d'escadron aux armées du roi. Quelques décennies plus tard, il appartient à Charles-François Tassin de Charsonville, riche propriétaire terrien et importateur de canne à sucre d'Orléans. Pendant la guerre de 1870 le château de la Renardière est l'enjeu de combats: en octobre, les Bavarois s'installent à Baccon et le général Von Colomb établit son poste de commandement à La Renardière où cantonne tout son état major. Le 9 novembre, lors de la grande bataille de Coulmiers, le corps de l'armée de Loire déloge de vive force l'ennemi qui avait transformé le parc en redoute. La famille de Billy était alors propriétaire du château. Aujourd'hui, dans ce havre de paix, le grand château classique avec ses deux élégants pavillons et sa petite chapelle garde le lointain souvenir de ces heures terribles.","architecture":"La TOUANNE, depuis 1684, le château de la Touanne appartient à la famille Bigot de la Touanne et à ses descendants. Le château actuel, dont la plus grande partie remonte au XVIIe siècle, présente un plan en H, c'est-à-dire des ailes en retour sur les deux façades du corps de bâtiment principal. La façade d'accueil au sud-ouest, vers la cour d'honneur, a certainement été reprise sous la Restauration (entablement remonté d'un demi étage pour supprimer les lucarnes). Un large perron central marque la base de quatre pilastres plats soutenant un fronton en tympan orné d'un oculi monumental à fronton saillant. De ce côté, l'aile de gauche en retour date du XVIIIe siècle. La façade sur parc est d'origine, avec jambages et claveaux en briques et pierre. La cour d'honneur est précédée de fossés secs. De chaque côté, deux pavillons datent du XVIIe siècle. Le parc avec massifs fleuris et arbres fruitiers colorent les allées et les pelouses autour du château. Un colombier domine la rivière et voisine avec un cèdre bicentenaire. La propriété appartient aujourd'hui à Christine et Nicolas d'Aboville  inscription par arrêté du 23 septembre 1970.","habitants":"Bernardière;  Jean Nicolas Martinet,                                                     Touanne; famille Bigot de la Touanne.\r\n        \"","divers":"Deux châteaux à Baccon Renardière grav 1 et Touanne grav-2.                                        Touanne 47° 52' 18\" nord, 1° 39' 06\" est","gps":"","images":["../image/image_45/45_Baccon_1.jpg","../image/image_45/45_Baccon_2.jpg"]},"Consult_chateau_formulaire3f33":{"id":"Consult_chateau_formulaire3f33","dept":"45","canton":"Courtenay","commune":"Bazoches  sur le Betz","nom":"Bazoches_Betz","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article, Bazoches et Bignon dans la commune voisine 3 K.m. à l'ouest.                                                                                    BAZOCHES , vers 1650, Pierre Hodoard issu d'une lignée de noblesse de robes se dit seigneur de Bazoches. Il épouse à cette date, Françoise, fille de Claude de l'Isle, seigneur du Grand Courtoiseau. Un vaste parc contenant trois étangs et traversé par la rivière du Betz.                                                                               BIGNON, au XVIe siècle, Charles de Melun acquit la seigneurie du Bignon et fit construire un château fortifié et entouré d'eau. Sous Louis XV, il fut acheté par Victor Riquetti, marquis de Mirabeau, économiste, auteur d'un ouvrage \"La Théorie de l'Impôt\", qui le fit exiler par le roi en 1761 dans sa propriété. C'est au Bignon qu'étaient nés ses deux fils : le Comte en 1749, et le Vicomte en 1754. L'aîné, qui s'illustra plus tard sous le seul nom de Mirabeau, était turbulent et fut durement traité par son père qui le fit enfermer à la Bastille, il fut ensuite interné au fort de Joux, s'enfuit en Hollande, et fut à nouveau emprisonné à Vincennes en 1777. Son père, seigneur du Bignon, mourut en 1789, et il prit alors le titre de marquis de Mirabeau et joua pendant la Révolution le rôle que l'on sait, il mourut en 1791. c'est en 1889 que le village du Bignon ajouta à son nom primitif celui du célèbre Tribum. Condorcet achète le château et le donne à sa fille, épouse d'Arthus O'connor, indépendantiste irlandais qui fut un temps général d'Empire et mourut en 1852.","architecture":"BAZOCHES, ce château du XVIIe siècle était construit sur une motte carrée (sans doute fort ancienne) entourée de douves. Au nord et au sud, deux ponts donnaient accès au château dont la disposition actuelle semble fort originale. Il est en effet formé de deux ensembles de bâtiments rigoureusement identiques situés à l'ouest et à l'est et se faisant face, ils sont surmontés de toits à la Mansard et couverts de tuiles. Un pavillon plus élevé coupe la façade aux deux tiers de la longueur. Les fenêtres ont des encadrements de briques caractéristiques de cette époque, en réalité, il s'agit des deux ailes du château primitif dont le corps central était situé entre ces deux corps de bâtiments et qui aurait été détruit, pense-t-on, durant la Révolution.                                                                                                BIGNON, le château du XVIIe siècle, fut complètement rasé vers 1850 et remplacé par l'édifice actuel, dit  maison du poète Patrice de la Tour du Pin, de plan en équerre deux corps de logis deux niveaux sur soubassement,  série de lucarnes sur toits d'ardoise en croupes, accolé  sur l'angle d'une tour ronde à trois niveaux, avec toit en poivrières.","habitants":"Bazoches; Famille de Claude de l'Isle                                         Bignon; Marquis de Mirabeau Victor Riquetti\r\n        \"","divers":"Deux châteaux à Bazoches sur le Betz. Bazoches grav-1-2 et Bignon dans la commune voisine 3 K.m. à l'ouest grav -3-4-5.","gps":"","images":["../image/image_45/45_Bazoches_Betz_1.jpg","../image/image_45/45_Bazoches_Betz_2.jpg","../image/image_45/45_Bazoches_Betz_3.jpg","../image/image_45/45_Bazoches_Betz_4.jpg","../image/image_45/45_Bazoches_Betz_5.jpg"]},"Consult_chateau_formulaire80ce":{"id":"Consult_chateau_formulaire80ce","dept":"45","canton":"Malesherbes","commune":"Morville en Beauce","nom":"Beauclair","type":"Château","periode":"XVII","histoire":"BEAUCLAIR, Jacques de La Barre, seigneur d'Arbouville et gentilhomme ordinaire de la Maison du Roi, cède cette terre en 1558 à Claude Bourdin, contrôleur des écuries du roi Henri II. Sa fille Élisabeth épouse Édouard Le Coigneux, conseiller au Parlement de Rouen. Ils héritent du fief de Bezonville, qui passe ensuite par mariage chez les comtes de Chambly, également comtes de Bosmont. La fille du dernier comte de Chambly, Jacqueline-Louise, héritière de sa maison, épouse en 1741 le comte René-François-André de La Tour du Pin.  La Charce.  Ce fut fait par René-Charles-François de La Tour du Pin Chambly de La Charce, fils unique né en 1746. Il est à l'origine des principales constructions actuelles du château de Beauclair. Guillotiné le 7 juillet 1794, un seul de ses deux fils survivra à la Terreur révolutionnaire. Le château sera en partie incendié durant cette période. Henry de la Tour du Pin Chambly de La Charce succède à son père guillotiné, et reconstruit les communs, écuries et ferme, dans un style italien, durant la Restauration. Son fils Berlion prend sa suite, puis le fils de celui-ci, prénommé Henry (comme son grand-père), en 1866. Henry n'ayant pas d'enfant, son frère Humbert lui succède au château de Beauclair. Leur sur épouse Aynard de Clermont-Tonnerre, fils du duc Gaspard de Clermont-Tonnerre, général et ministre durant la Restauration. Aynard de Clermont-Tonnerre deviendra lui aussi général, et décèdera à Bezonville en 1884. Leur fille Gabrielle de Clermont-Tonnerre hérite de la propriété en 1903. Elle avait épousé en 1883 Humbert Hadelin, marquis de La Tour du Pin-Gouvernet.","architecture":"BEAUCLAIR, le château se transmet ensuite chez les descendants de cette famille jusqu'en 2018 où, dans un état relativement dégradé, il est cédé au propriétaire actuel, qui ambitionne de le restaurer entièrement et d'y ouvrir des salles de réception. Le 7 avril 2019 le château est victime d'un incendie, la toiture s'est entièrement embrasée et selon les pompiers environ 300 mètres carrés sont brûlés. Le château de Beauclair se présente en un plan symétrique, composé d'un corps central encadré par deux ailes de part et d'autre. La façade Nord se distingue par quatre avancées, tandis que la façade Sud est d'une grande sobriété. Si la façade Nord semble avoir cet aspect dès 1780, lorsqu'elle est érigée à la demande du comte de La Tour du Pin Chambly de la Charce, la façade Sud a été légèrement simplifiée après l'incendie qui ravagea le château durant la Révolution. Les communs, ferme, écuries, orangerie et granges datent de la Restauration. Ils ont été érigés vers 1820, et présentent une influence architecturale nettement italienne.","habitants":"Famille des Clermont-Tonnerre\r\n        \"","divers":"Château de Beauclair à Morville en Beauce","gps":"","images":["../image/image_45/45_Beauclair_1.jpg"]},"Consult_chateau_formulaire86a5":{"id":"Consult_chateau_formulaire86a5","dept":"45","canton":"Beaugency","commune":"Beaugency","nom":"Beaugency","type":"Forteresse","periode":"XV-XVI-XIX","histoire":"BEAUGENCY; l'annulation du mariage  de Louis VII avec Aleinor d'Aquitaine, raison officiel, qui avait donné au roi que deux filles, trois semaines après la séparation elle épousait le comte d'Anjou Henri Plantagenet qui devait monter sur le trône d'Angleterre, Louis VII perdait l'énorme dot de sa première femme, dont le donjon du XIe siècle dit la tour César  élevés par les sirs de Beaugency, sur le domaine desquels le chapitre d'Amiens jouissait de redevances avant qu'il  n'entre dans le domaine royal à la fin du XIIIe siècle. le duc d'Alençon et sa compagnie vient mettre le siège devant la place. Les anglais dut déguerpirent  trois jours plus tard. En 1442, la seigneurie appartenait au Dunois qui firent élever le petit château en contre bas du donjon, le logis seigneurial de Dunois et de Jean d'Orléans duc de Longueville est implanté au nord-est du château et s'appuie sur le mur de courtine nord alors que ce dernier est remplacé par la façade du logis de Dunois à l'est. De plan quadrangulaire, ce bâtiment contient à l'est le corps de logis de Dunois sur lequel vient s'adosser au sud la chapelle Saint-Georges. A l'ouest, en vis-à-vis, s'élèvent les vestiges du logis de Jean d'Orléans-Longueville, son petit-fils, augmenté d'un pavillon disposé à l'extérieur de l'angle sud-ouest de l'ensemble,  le conservèrent un siècle. La demeure des princes de Dunois est aujourdhui une demeure privée. Le château a été rouvert au public en octobre 2014 après des travaux de mise aux normes.","architecture":"BEAUGENCY, au sud s'élevait un corps de galeries fermé de deux étages joignant les deux corps de logis. Au nord, adossé au mur de courtine de l'enceinte, se dresse un corps de bâtiment élevé après 1839, date de création du Dépôt de Mendicité et avant l'Atlas Froyer de 1847 sur lequel il est signalé en plan. Il joint également les deux corps de logis et remplace un bâtiment en pan de bois de l'époque de Dunois, le logis  fut édifié au milieu du XVe siècle et celui de Jean-d'Orléans-Longueville à la fin du premier quart du XVIe siècle. Ce dernier fut construit à partir d'un corps de bâtiment préexistant remontant à l'époque romane comme le signale une portion de baie romane cintrée visible dans un vestige de son mur pignon sur lequel s'accole la partie sud-ouest du pavillon Renaissance. Le corps de galerie élevé sous Dunois fut transformé aux XIXe et XX siècles et comporte, à l'heure actuelle, trois niveaux divisés en pièces ou galerie d'exposition au musée créé en 1927 sous le nom de musée régional de l'Orléanais et devenu musée Daniel Vannier. Le corps de bâtiment nord remplaça une construction plus ancienne remontant certainement à l'époque de Dunois. Elle comportait alors : une cuisine, un ou deux offices au rez-de-chaussée et des chambres à l'étage. En maçonnerie au rez-de-chaussée, elle était à pan de bois à l'étage avec des croisées. Devenu musée régional.","habitants":"Famille des Dunois\r\n        \"","divers":"Château de Beaugency grav-1, des Dunois grav-2, tour grav 3 -4-5. Vestiges grav 6-7.","gps":"","images":["../image/image_45/45_Beaugency_1.jpg","../image/image_45/45_Beaugency_2.jpg","../image/image_45/45_Beaugency_3.jpg","../image/image_45/45_Beaugency_4.jpg","../image/image_45/45_Beaugency_5.jpg","../image/image_45/45_Beaugency_6.jpg","../image/image_45/45_Beaugency_7.jpg"]},"Consult_chateau_formulaire606a":{"id":"Consult_chateau_formulaire606a","dept":"45","canton":"Châtillon-sur-Loire","commune":"Beaulieu-sur-Loire","nom":"Beaulieu_sur_Loire","type":"Forteresse","periode":"XI-XIV-XV","histoire":"Deux châteaux à Beaulieu sur Loire dont Beaulieu dit de courcelles (voir article) et Assay. ASSAY, le château domine le Val de Loire, fut construit au XIe et XIVe siècle  est entouré de murailles. La famille des Stutts, dorigine écossaise, le possède depuis le XVe siècle.  En 1474, Louis XI accorda à Thomas Stutt la nationalité française. A partir de ce moment, les Stutt ajoutèrent à leur nom celui d'Assay. Il appartient au comte d'Estutt d'Assay, descendant direct de l'officier de Charles VII. Cette famille l'avait loué au romancier Henri Viard avant de le reprendre.Éléments protégés M. H : les murs extérieurs et le chemin de ronde avec les échauguettes et les tourelles ; la tour, le donjon avec ses deux échauguettes et ses escaliers ; le logis et la chapelle ; le pigeonnier : inscription par arrêté du 25 octobre 1957.","architecture":"BEAULIEU, la terre de Beaulieu relevait des chanoines de St-Etienne de Bourges depuis la fin du XIVe siècle. La ville était entourée de fortifications et dominée par un château édifié à la fin du XIIe siècle par Geoffroy de la Brière. Le bâtiment, de forme rectangulaire, est assez massif, le pont-levis en bois a été remplacé par un pont en pierre qui traverse les douves encore pleines. Il donnait accès de la basse-cour à la cour de l'édifice. Le corps de garde, au centre du bâtiment, est surmonté de mâchicoulis, et conserve sa herse. Deux poivrières permettaient de protéger les ailes du château et étaient reliées par un chemin de ronde toujours existant. Il possède un colombier du XVIIIe siècle avec de nombreux boulins représentant létendu du domaine. Avant la fin du XIVe siècle, les chanoines devinrent propriétaires du château, le firent restaurer et garnir d'ouvrages de défense. L'église romane élevée au XIe siècle, qui jouxtait à l'est le château, fut incendiée par les Protestants en 1569. Le chapitre de Bourges fit reconstruire le transept et le chevet en 1597. Il reste une nef romane, peut-être du XIe siècle. La porte monumentale de la façade fut réalisée vers 1836. Boiseries et embellissements datent du XVIIIe siècle.","habitants":"Famille de Thomas Stutt\r\n        \r\n        \"","divers":"Deux châteaux à Beaulieu sur Loire dont Beaulieu grav 6-7-8  et  Assay grav 1 à 5                                                                     Assay 47° 33' 48\" nord, 2° 47' 17\" est                                                                                                                                      Beaulieu 47° 32' 36\" nord, 2° 49' 03\" est","gps":"","images":["../image/image_45/45_Beaulieu_sur_Loire_1.jpg","../image/image_45/45_Beaulieu_sur_Loire_2.jpg","../image/image_45/45_Beaulieu_sur_Loire_3.jpg","../image/image_45/45_Beaulieu_sur_Loire_4.jpg","../image/image_45/45_Beaulieu_sur_Loire_5.jpg","../image/image_45/45_Beaulieu_sur_Loire_6.jpg","../image/image_45/45_Beaulieu_sur_Loire_7.jpg","../image/image_45/45_Beaulieu_sur_Loire_8.jpg"]},"Consult_chateau_formulairea974":{"id":"Consult_chateau_formulairea974","dept":"45","canton":"Bellegarde","commune":"Bellegarde","nom":"Bellegarde_45","type":"Forteresse","periode":"XIV-XVI","histoire":"BELLEGARDE,  dès le XVe siècle, la seigneurie passe par alliance à Galloucio de l'Hôpital.   En 1645 le donjon de Braque s'appela Soisy  puis Choisuy devenu marquisat devient la propriété de Roger de Saint-Lary, puis édifié en duchay-Prairie  sous le nom de Bellegarde, en 1645 Nicolas de l'Hôpital, duc de Vitry l'assassin de Concini cède le marquisat de Choisy à Rogerde Saint-Lary à sa mort en 1647  laisse sa terre de Choisy  qui prendra le nom de Bellegarde à son neveu Jean Antoine Pardaillan de Gondrin, sa veuve cède le domaine à son neveu, le marquis de Montespan père du duc d'Antin directeur des bâtiments du roi.   Vendu en 1757 à la mort du dernier duc d'Antin acquis par Gautier sieur de Besigny l'avant dernier marquis de Bellegarde, ancien logis du capitaine des Gardes qui le cède en 1775 à Pierre Gilbert de Voisins ce dernier meurt à l'échafaud ren 1794, vendu comme bien national l'ensemble est racheté par la commune donjon et Pavillon Salamandre. Sous Henri IV, les avant corps dont les soubassements baignent dans les douves et dont la partie supérieure a été remplacée en 1844, sont reliés au donjon par des galeries ajourées dont restent les arrachements sur la face nord; le pavillon des ondes flanquant à l'ouest le donjon, renferme un bel escalier à rampe de fer forgé, l'église s'agrandit, au sud, d'une chapelle latérale, couvrant le caveau seigneurial, ces travaux sont l'uvre de Jacques de l'Hospital entre 1578 et 1635, dernier comte et premier marquis de Choisy aux Loges.","architecture":"BELLEGARDE, entre 1355 et 1388, Nicolas Braque fait bâtir l'actuel donjon  entouré de vastes douves en eau, sur plan carré avec quatre tourelles en encorbellement. Les fondations du donjon remonterait au XIIe siècle, un pilier dont le chapiteau sorne de grosses volutes en fait foi au rez de chaussée, le château des l'Hospital trouve sa physionomie définitive sous Henri IV et Louis XIII, à l'époque où Claude Chastillon le dessine et Dom Morin le décrit. la Tour Capitaine élevée en briques, figure sous l'estampe de Chastillon (1564-1606), elle aurait d'abord servi de prison. Il est sur, en tout cas, qu'elle devint Tour de Colombage, puis fut aménagée en habitation sous Louis XV, Dans la haute cour ou cour d'honneur (actuelle Cour d'Antin), il comprend la Tour Capitaine, les deux avant-corps à galeries et le pavillon des Ondes flanquant le donjon. Des bâtiments remplacés par le duc d'Antin sont construits un siècle plus tard. Au XVIIe siècle, les l'Hospital bâtissent les granges de la basse-cour, dont les portes de briques rayonnantes subsistent encore. En 1692, le duc d'Antin achète le château. En 1708, il fait remanié les deux cours pour aménager dans la haute cour ses appartements personnels et dans la basse-cour ses écuries. En 1782, Gilbert de Voisins, président au Parlement de Paris, dernier marquis de Bellegarde, fait exécuter par Viel, l'actuel escalier d'honneur de la face sud. La grille de la cour d'Antin remplace en 1836, celle du duc d'Antin, détruite par les alliés en 1815.","habitants":"Bellegarde; Nicolas Braque.                                                              Jean Antoine Pardaillan de Gondrin\r\n        \"","divers":"Bellegarde grav de 1 à 6               47° 59' 13\" nord, 2° 26' 31\" est","gps":"","images":["../image/image_45/45_Bellegarde_45_1.jpg","../image/image_45/45_Bellegarde_45_2.jpg","../image/image_45/45_Bellegarde_45_3.jpg","../image/image_45/45_Bellegarde_45_4.jpg","../image/image_45/45_Bellegarde_45_5.jpg","../image/image_45/45_Bellegarde_45_6.jpg"]},"Consult_chateau_formulaire0a00":{"id":"Consult_chateau_formulaire0a00","dept":"45","canton":"Meung-sur-Loire","commune":"Chaingy","nom":"Bezy","type":"Château","periode":"XV-XVI","histoire":"deux châteaux à Chaingy, Bezy et Longuevault.                                       BEZY,  le château a été acheté en 1958 pour y installer une maison familiale rurale, agrandie d'un centre pédagogique en1962.  Bézy  accueille tous types de cérémonies (baptêmes, fêtes de famille, Monsieur et Madame Gouveia, propriétaires du lieu.                                                                                                                     LONGUEVAULT, ce château, attesté sous la forme Longuevault  au XVe siècle dans le cartulaire de Saint-Avit d'Orléans.","architecture":"BEZY, sur la carte de Cassini en 1750, le Bézy apparaît situé au milieu du Clos des Fourneaux:  c'est alors une demeure, d'architecture classique, avec dépendances à usage vinicole, sur le coteau surplombant la Loire, entourée de vignes. En bordure de la route d'Orléans à Blois, dite de La Pompadour (c'est la favorite qui avait fait paver la route afin de se rendre commodément à son château de Menars), la propriété est signalée par une élégante grille en fer forgé du XVIIIe siècle. Le château est composé d'un corps de logis à cinq travées, un étage carré et étage de combles, flanqué d'un côté par un vaste pavillon à trois travées.                                                                                                                                                          LONGUEVAULT, puis au début du XIXe siècle, Longuevault, conserve dans ses dépendances une tour du XVIe siècle. On découvre, derrière une belle grille, la façade blanche, à l'ordonnance symétrique : un corps de logis prolongé de deux faux pavillons, eux-mêmes flanqués d'appentis plus bas. Devant la façade principale, un puits en fer forgé, élégamment ouvragé, a été conservé. Le domaine, dans un décor boisé, abrite aujourd'hui un centre équestre.","habitants":"Bézy,  Famille de Gouvéia\r\n        \"","divers":"deux châteaux à Chaingy, Bezy grav1-2 et Longuevault grav_3.","gps":"","images":["../image/image_45/45_Bezy_1.jpg","../image/image_45/45_Bezy_2.jpg","../image/image_45/45_Bezy_3.jpg"]},"Consult_chateau_formulaire6961":{"id":"Consult_chateau_formulaire6961","dept":"45","canton":"Briare","commune":"Ardon","nom":"Boisgibault","type":"Château","periode":"XVII-XIX","histoire":"BOISGIBAULT, vers 1500 est détaché de la seigneurie de la Salle, acquis ou héritage à René Maubert contrôleur de la guerre en  en 1564 par Jean Maubert bourgeois d'Orléans  à l'époque, en 1630 le manoir est agrandi, mais  les  Maubert en difficulté les créanciers font saisir le château vendu en adjudication acquis par Henri-Claude Darnel de Bussière.  Il existait un manoir dont le territoire de près de 75 hectares n'a pas cessé de s'agrandir jusqu'au XVIIIe siècle. Le manoir fut reconstruit à partir de 1680. Ses propriétaires successifs continuèrent d'agrandir le domaine et d'aménager le château. En 1712  il changea de main est acheté par Joseph Charpentier seigneur de Brandelong et de Méliers passera ensuite à son frère Jacques Charpentier de Mondonville receveur des tailles, puis à son neveu Jacques Charpentier de Boisgibault  président à la cour des aides de Paris qui fit des achats de terrains jusqu'à 3000 hectares.  Charpentier de Boisgibault meurt en1794 laissant la propriété à sa fille et son gendre M. de Montaudoin propriétaire du château de la Source à Orléans; au décès des époux Montaudouin, le domaine est en vente par les héritiers acquis en 1804 par les Rennel qui le garde trois ans et le cèdent en 1809 à la famille de Belle. En 1829  passe à Maurice Goujon marquis de Grasville qui l'utilisera en rendez vous de chasse jusqu'à son décès en 1865, en 1875 à la mort de la marquise le domaine est amputé d'une grande partie de ses terres acquise par Albert de Bengy de Puyvallée, sa fille Valentine épouse en 1900 le comte Adrien de Mathan aujourd'hui toujours dans la descendance.","architecture":"BOISGIBAULT, obtint le droit d'avoir une chapelle et la firent aménager en 1756 dans le château, et  deux ailes en retour d'équerre qui bordent la cour ont été ajoutées au cours de la même campagne. L'escalier et sa rampe en fer forgé et des boiseries du rez-de-chaussée datent certainement des aménagements de cette époque ainsi que la grille qui donne accès à la cour d'honneur. A la Révolution, l'ensemble fut vendu en neuf lots, avec le château et sa basse-cour. Les pièces du rez-de-chaussée ont conservé un décor s'étalant de la fin du XVIIe siècle au début du XXe siècle. En 1829, le domaine fut acquis par le marquis de Gasville. Il s'employa à en faire une des plus belles chasses de Sologne, faisant prolonger les murs du parc par une palissade de plus d'un kilomètre pour s'assurer une réserve de gibier importante. Les bois étaient percés de grandes avenues en étoile. Il fit édifier un pavillon carré appelé le télégraphe, sur lequel était installée une plate-forme supportant un télégraphe à bras. Un système de poulies et d'engrenages permettait d'actionner les bras du télégraphe au rez-de-chaussée sur les indications d'un observateur qui suivait les évènements du haut de la plate-forme. Le bras indiquait aux chasseurs la direction prise par l'animal.","habitants":"Henri-Claude Darnel de Bussière.\r\n        \"","divers":"Château de Boisgibault  à Ardon     47° 47' 18\" nord, 1° 52' 00\" est","gps":"","images":["../image/image_45/45_Boisgibault_1.jpg","../image/image_45/45_Boisgibault_2.jpg"]},"Consult_chateau_formulaire0952":{"id":"Consult_chateau_formulaire0952","dept":"45","canton":"La Ferté-Saint-Aubin","commune":"Ligny le Ribault","nom":"Bon_Hotel","type":"Château","periode":"XIX","histoire":"BON-HOTEL, parmi les nombreux châteaux élevés en Sologne à la fin du XIXe siècle, celui-ci est l'un des plus grands et des plus originaux. Cette demeure, dont la silhouette et l'abondant décor sculpté rappellent les châteaux de style Renaissance du Val de Loire, a été construite vers 1882 pour Georges Dupré de Saint Maur, sur des plans de Clément Parent, architecte parisien.","architecture":"BON-HOTEL, la composition du plan s'inspire de celle du château de Chenonceau. L'escalier, dérivé des modèles de la Renaissance espagnole, est un compromis entre le découpage d'un carré en neuf parties et une mauvaise lecture du modèle en bois du château de Chambord. Chaque division intérieure est reprise par une disposition spécifique dans la toiture: pavillons à l'impériale, toits à double pignon, à croupes et en poivrière. La multiplication des toitures avec la présence du petit belvédère évoque les toits de Chambord. Les références aux châteaux de la Renaissance du Val de Loire, rares dans l'architecture solognote, sont sensibles dans l'élévatIon principale. La travée centrale avec ses baies géminées est une réminiscence d'Azay le Rideau.","habitants":"Georges Dupré de Saint Maur\r\n        \"","divers":"a Ligny le Ribault le Bon-Hôtel  47° 41' 03\" nord, 1° 45' 12\"est","gps":"","images":["../image/image_45/45_Bon_Hotel_1.jpg","../image/image_45/45_Bon_Hotel_2.jpg"]},"Consult_chateau_formulairefe20":{"id":"Consult_chateau_formulairefe20","dept":"45","canton":"Pithiviers","commune":"Bondaroy","nom":"Bondaroy","type":"Forteresse","periode":"XIV","histoire":"BONDAROY actuellement manoir de La Taille,  Il y a quelques années, le château semblait voué à la ruine, les toitures s'effondraient. Il en reste d'importants vestiges: une porte fortifiée, deux tours massives carrées munies de meurtrières. Il a eu une histoire célèbre à partir de 1488, il fut le berceau de la famille de la Taille qui s'est illustrée dans la littérature. Deux poètes y sont nés, Jacques de la Taille, a écrit plusieurs tragédies, son frère Jean de la Taine suivit Condé à La Rochelle en 1568, puis s'attacha à Henri IV, dont il chanta la gloire ; il avait pour devise : la plume et l'épée. Il avait épousé Charlotte du Moulin, fille du seigneur de Rouville de Malesherbes. Ses poèmes, ses comédies et ses tragédies lui ont valu une place dans la littérature française. Après la famille de la Taille, le château appartint à Armand de Fougeroux, neveu et héritier de Duhamel du Monceau, auquel il succéda à l'Académie des Sciences. Transformé en ferme au début du XXe siècle il frôla la ruine totale. Tout récemment, Roland de la Taille l'a racheté afin de le restaurer et de redonner vie à la demeure de ses aïeux.","architecture":"BONDAROY ancien château fort transformé en manoir fortifié. La façade principale est constituée en sa partie centrale par un châtelet d'entrée et aux extrémités par deux pavillons carrés. Des tours circulaires flanquent les bâtiments. Une tour d'enceinte très défigurée subsiste encore dans le pays, non loin du château, en bordure de la rue principale. En face du château, du côté de la vallée, vestiges d'un petit portail qui donnait accès à la basse-cour de celui-ci. Il reste des vestiges de tourelles à meurtrières, quelques pans de murs et une porte de ferme.","habitants":"Famille; Jacques de la Taille\r\n        \"","divers":"château de Bondaroy; 48° 10' 36\" nord, 2° 16' 44\" est","gps":"","images":["../image/image_45/45_Bondaroy_1.jpg","../image/image_45/45_Bondaroy_2.jpg","../image/image_45/45_Bondaroy_3.jpg"]},"Consult_chateau_formulaire0a77":{"id":"Consult_chateau_formulaire0a77","dept":"45","canton":"Briare","commune":"Bonny-sur-Loire","nom":"Bonny_sur_Loire","type":"Château","periode":"XVI- XIX","histoire":"Deux châteaux dans cet article; Sablonnière et Sainjoncs. SABLONNIERE,  en 1600 la Sablonnière appartenait à Gabriel Pellault, conseiller du roi. Au cours des XVIIe et XVIIIe siècles, il changea souvent de mains, et parmi les propriétaires on trouve Nicolas Desnots en 1630, Jacques Charrier en 1651, Pierre de Chaludet en 1655, Antoine de Rancourt en 1714, et enfin Pierre de Chazal en 1759, conseiller à la cour des Aides et doyen du Grand Conseil de Paris. Sa famille conserva le domaine un siècle. C'est seulement en 1960 que M. Dechamboux en assura la restauration, puis le céda à son propriétaire actuel, M. Bertrand, qui a décoré l'intérieur et entretient avec le plus grand soin les jardins et le parc.                                                                           SAINJONCS,   en 1740, appartenait à un bourgeois de Bonny, Claude Frappier. Au tout début du XIXe siècle, Jacques-Alexis de La Jolive, y réside et y meurt en 1823. Ce sont les propriétaires suivants, les de Saint Maurice qui dans les années 1830, font bâtir le bel ensemble d'allure classique que l'on peut admirer aujourd'hui.","architecture":"SABLONNIERE   ce magnifique château, construit sur un vaste quadrilatère entouré de douves, récemment restauré et a retrouvé sa splendeur passée,  le château fut brûlé pendant la Révolution, puis réparé tant bien que mal vers 1803.   L'entrée est majestueuse avec sa grille de fer forgé encadrée de pilastres sculptés, la cour d'honneur est flanquée de quatre tours massives plongeant dans les douves. Le corps de logis n'a qu'un niveau, surmonté d'une haute toiture de vieilles tuiles. La maison, toute blanche, est percée de hautes fenêtres s'ouvrant sur l'eau ou sur des jardins éclatants de fleurs.                                                                                       SAINJONCS, un bel ensemble d'allure classique, de gracieuses arcades, dans le prolongement de la façade à fronton, abritent un jardin intérieur .","habitants":"Sablonnière: Gabriel Pellault                                          Sainsongs; Famille de Claude Frappier\r\n        \"","divers":"Deux châteaux à Bonny sur Loire; Sablonnière grav-1 et Sainjoncs grav 2-3.","gps":"","images":["../image/image_45/45_Bonny_sur_Loire_1.jpg","../image/image_45/45_Bonny_sur_Loire_2.jpg","../image/image_45/45_Bonny_sur_Loire_3.jpg"]},"Consult_chateau_formulaire9b18":{"id":"Consult_chateau_formulaire9b18","dept":"45","canton":"Pithiviers","commune":"Estouy","nom":"Bouville","type":"Château","periode":"XVII","histoire":"BOUVILLE, la terre de Bouville entre dans la famille de Drouin en 1558 par le mariage de Claude de Vaux, dame de Bouville, avec Léon de Drouin, seigneur de Chenou près de Château Landon. Florizel de Drouin de Bouville est établi en 1663 par le duc d'Orléans, capitaine et gouverneur de Pithiviers. Philippe de Drouin de Bouville hérite en 1764 du comté voisin de Rocheplatte. Son aîné, Florizel Louis, continuera la branche des Rocheplatte, tandis que son frère Anne Jacques Philippe sera la souche de la branche cadette qui se poursuit à Bouville jusqu'au début du XXe siècle avec le titre de Vicomte.","architecture":"BOUVILLE du XVIIe siècle  le château de style Louis XIII ainsi que les nombreux bâtiments qui l'accompagnent ont été maintes fois remaniés, ce domaine est surtout remarquable par son magnifique parc traversé par l'Essonne et par son colombier du début du XVIIIe siècle, très bien conservé. Il contient 1660 boulins, témoignage de l'importance des seigneurs du lieu.La chapelle, le colombier et une partie des communs sont couverts de tuiles plates ; le château et les tourelles sont couverts d'ardoises. Restauration des communs.","habitants":"Philippe de Drouin de Bouville \r\n        \r\n        \r\n        \"","divers":"A Estouy le château de Bouville 48° 11' 13\" nord, 2° 21' 08\" est","gps":"","images":["../image/image_28/28_Bouville_1.jpg","../image/image_28/28_Bouville_2.jpg"]},"Consult_chateau_formulaireef30":{"id":"Consult_chateau_formulaireef30","dept":"45","canton":"Briare","commune":"Briare","nom":"Briare","type":"Château","periode":"45_Briare_Beau desert","histoire":"Cinq châteaux dans cet article ; Trousse-Barrière, Beauvoir  et Beauval celui de Beau-Désert  et de Vaugeraud.                                        TROUSSE-BARRIERE, il y avait à l'origine une ancienne métairie acquise par Hugues Cosnier pour les besoins de la construction du Canal de Briare. Paul Yver, gendre de Jean-Félix Bapterosses, dirigeant des émaux de Briare et administrateur de la faïencerie de Gien, fit construire ce château sur des terres acquises entre 1885 et 1890. Réalisé en briques et pierre de taille à l'instar de son « cousin » le château de Beauvoir, il est doté de deux tours rondes d'angle. La salle à manger est ornée d'un plafond à caisson style renaissance et on y trouve des vitraux peints par Henri Harpignies, familier de Jean-Félix Bapterosses ainsi qu'une peinture monumentale du même Harpignies, donnée à la ville par la fille de M. Yver Le domaine a ensuite appartenu à la famille Yver puis à celle de Becdelièvre par héritage. Il a ensuite été cédé au diocèse avant d'être inoccupé durant une dizaine d'années. Aujourd'hui, il appartient à la ville de Briare qui l'utilise comme centre d'exposition et résidence d'artistes.","architecture":"BEAU-DESERT, a été construit à la fin du XIXe siècle par le comte Louis d'Harcourt, propriétaire du château de Pont Chevron ainsi que de nombreux autres domaines environnants. Au cur d'un vaste parc à l'anglaise, le château se présente sous la forme d'un corps de logis principal à huit travées dont 2 sont contenues dans un avant-corps central surmonté d'un fronton triangulaire. Deux ailes, légèrement surélevées, viennent s'y appuyer perpendiculairement. Chacune de ces ailes est surmontée d'un gracieux lanternon carré.                                                                                                       VAUGERAUD, aux lignes sobres, sous son toit d'ardoises à quatre pentes, se cache dans un parc boisé descendant vers le canal de Briare. La demeure appartient, dans la deuxième moitié du XVIIIe siècle, à Catherine Adélaïde Lhuillier de Tigy, veuve de M. des Hâtes. En février 1781, Élizabeth Gabrielle Lhuillier de Tigy, sa nièce, épouse Jean Louis Henry de Longuève, l'une des personnalités orléanaises les plus en vue, magistrat brillant, conseiller et avocat du roi à Orléans. Sensible aux idées nouvelles, Henry de Longuève est élu député aux États généraux. Mais resté monarchiste, poursuivi il se réfugie au château de Vaugeraud où l'accueille la tante de sa femme. Sous la Terreur, il est arrêté et emprisonné à Gien, mais libéré après la chute de Robespierre. L'Empire, puis la Restauration le couvrent d'honneurs et de hautes fonctions. Devenu veuf, il hérite du château, dont il fait sa résidence principale, et où il meurt en 1841.","habitants":"Trousse-famille Yver                                                                         Beau-Desert  comte Louis d'Harcourt\r\n        \"","divers":"Cinq châteaux à Briare ; Trousse-Barrière grav 2-3-4, Beauvoir grav-1   celui de Beau-Désert grv-5  et de Vaugeraud-6.                                                                          Trousse Barrière  47° 38' 38\" nord, 2° 44' 11\" est","gps":"","images":["../image/image_45/45_Briare_1.jpg","../image/image_45/45_Briare_2.jpg","../image/image_45/45_Briare_3.jpg","../image/image_45/45_Briare_4.jpg","../image/image_45/45_Briare_5.jpg","../image/image_45/45_Briare_6.jpg"]},"Consult_chateau_formulaire1cba":{"id":"Consult_chateau_formulaire1cba","dept":"45","canton":"Briare","commune":"Briare","nom":"Briare_II","type":"Château","periode":"XVI-XVII","histoire":"BEAUVAL, offre une image harmonieuse, avec ses combles brisés à la Mansart et son avant-corps central à chaînage de pierre, dont les fenêtres d'étages sont surmontées d'un fronton et de blasons sculptés, le même registre décoratif se retrouve sur la façade arrière dont la porte d'entrée a conservé sa marquise finement ouvragée. Sur l'entablement de l'avant corps, un décor en faïences de Gien et émaux de Briare. Au XIXe siècle, Beauval appartient à la famille Jarry, dont l'une des filles, Julie, épouse en 1861 l'éminent docteur Napoléon Pietresson de Saint Aubin ces deux familles sont originaires de Saint-Sauveur-en-Puisaye. La demeure conserve le souvenir du passage du général De Gaulle : ce dernier, en effet, couche au château de Beauval (les propriétaires sont alliés à sa famille) lorsque le 11 juin 1940, il vient participer au Conseil suprême interallié réuni au château du Muguet à Breteau (non loin de Briare) à la demande de Churchill.","architecture":"Seigneurs du CANAL, les bâtiments qui abritent la mairie de Briare ne sont autres que ceux de l'ancien château construit sur un terre plein fortifié dès le XIIIe siècle et maintes fois restaurés. Il fut occupé par Hugues Cosnier premier promoteur du canal de Briare sous Henri IV. Les travaux interrompus à la mort d'Henri IV, reprirent en 1629 sous l'impulsion du marquis d'Effiat qui venait de le racheter. Peu après la mise en service du canal en 1642, la compagnie acheta le château aux héritiers du marquis et y installa les services administratifs. En 1729, André de Gironde, seigneur du canal fit ajouter l'aile nord. Enfin en 1867 après la vente de la compagnie a l'état, la municipalité  l'acheta pour y loger l'hôtel de ville. Au rez-de-chaussée du corps de logis principal se trouve une cheminée en marbre datant de 1730. L'aile Est abrite une chapelle de plan ovale et ornée de lambris. L'aile ouest est desservie par un escalier tournant à rampe de fer forgé du XVIIIe siècle. La maison du directeur des canaux est un édifice construit à la fin du XVIIe siècle le long du canal, au nord de Cepoy, par Nicolas Cadot, directeur général jusquen 1692. Lédifice, composé dun long corps aux baies cintrées est flanqué de pavillons latéraux et couvert de toitures brisées. Le bâtiment a servi de maison de convalescence pour les soldats blessés durant la Guerre de 1914-1918. Devenue propriété de la commune en 1951, cet édifice abrite depuis avril 1977 une accueillante Auberge de Jeunesse recevant également des séminaires, des stages ou classes de découverte.","habitants":"Beauval; famille Jarry                                                               Canal: Hugues Cosnier\r\n        \"","divers":"A Briare le château de Beauval grav-3 et des seigneurs du canal grav-1-2","gps":"","images":["../image/image_45/45_Briare_II_1.jpg","../image/image_45/45_Briare_II_2.jpg","../image/image_45/45_Briare_II_3.jpg"]},"Consult_chateau_formulairea135":{"id":"Consult_chateau_formulairea135","dept":"45","canton":"Fleury-les-Aubrais","commune":"Chanteau","nom":"Brossette","type":"château","periode":"XIX","histoire":"BROSSETTE, a notamment appartenu au vicomte Henry de Bellaigue, maire de Chanteau de 1919 à 1945, attaché à son domaine et au village, a écrit deux ouvrages d'histoire locale : les familles de Chanteau. Le château de la Brossette racheté par la ville de Fleury-les-Auhrais abrite un centre de loisirs aujourd'hui.","architecture":"BROSSETTE, à la lisière de la forêt d'Orléans, derrière sa belle grille en fer forgée, La Brossette a toujours son grand parc, ses pelouses soignées et ses massifs de fleurs qui ravissaient déjà les visiteurs en 1900. Edifiées dans les années 1870, cette noble villégiature, de style classique.","habitants":"Vicomte Henry de Bellaigue\r\n        \"","divers":"A Chanteau le château de Brosette","gps":"","images":["../image/image_45/45_Brossette_1.jpg","../image/image_45/45_Brossette_2.jpg"]},"Consult_chateau_formulaire1e0d":{"id":"Consult_chateau_formulaire1e0d","dept":"45","canton":"Briare","commune":"Sully sur Loire","nom":"Buissière_45","type":"Forteresse","periode":"XII-XVI","histoire":"Deux châteaux à la Buissière dont la Buissière et le Chesnaie.                                                                                     La BUISSIERE dit château des pêcheurs,  au XIIe siècle, La Bussière était une des places fortes de la famille de Feins et  par héritage passe à la maison de Sancerre, puis passe à Etienne de Fromont, notaire, à Marguerite de Boislève et enfin à Jean de Ganay chancelier de France. En 1518 Jeanne Brinon dame de la Bussière apporte le domaine à Jean du Tillet, greffier  au parlement de Paris. Les seigneurs du Tillets, propriétaires pendant 3 siècles jusqu'à la Révolution, qui  a été fatale aux du Tillet qui ont dû se séparer du château et émigrer, vendus  aux enchères, c'est en 1814 que la famille Chasseval  marchand de bois s'y installe et le restaure. Aujourd'hui, cette même famille continue à l'entretenir et à faire vivre ce patrimoine. Le parc de 70 hectares, les jardins à la française et l'étang furent dessinés par Le Nôtre à la demande de Charles du Tillet, président du grand conseil du roi Louis XIV.  En 1958, le comte Henri de Chasseval, alors âgé de 28 ans, devient propriétaire du château de La Bussière. En 1962, avec l'aide de son épouse, il décide de l'ouvrir au public et d'y présenter une collection unique d'uvres d'art sur la pêche en eau douce.","architecture":"CHESNAYE, a été construit au XIXe siècle, de style néo-classique, il possède deux pavillons symétriques et des parements en brique. La demeure se dresse au milieu de magnifique parc de 11 hectares. La propriété appartient à la famille Martin Denis, cinq chambres d'hôtes dont deux suites proposées dans ce beau petit château.                                                                                                                  La BUISSIERE, durant les guerres de religion très endommagé, reconstruit au XVIe siècle puis de nouveau après la Révolution, le corps de logis et les Chasseval transformèrent au XVIIe siècle la forteresse en une belle demeure de plaisance, en briques losangées et pierres. Les bâtiments remarquables des communs, édifiés vers 1660, abritaient les chevaux dans de magnifiques écuries. L'étage servait au stockage des récoltes et de l'impôt local, le champart.  Petit à petit, le château des Pêcheurs s'est ouvert aux visiteurs qui peuvent admirer l'orangerie, la sellerie avec sa collection de harnais, les écuries, le potager du XVIIIe siècle le parc avec sa promenade le long de l'eau, son parcours des cabanes et sa chasse au trésor. On ne peut imaginer la visite de ce site sans se promener dans le jardin potager qui se poursuit dans le parc dessiné par André Le Nôtre, classement au M.H.  par arrêté du 2 mai 1995.","habitants":"Buissière:  famille de Feins; Jean de Ganay                   Chesnaye; famille Martin Denis\r\n        \r\n        \"","divers":"Deux châteaux à la Buissière dont la Buissière  grav-2 à 6 et le Chesnaie grav-1                                                       Buissière  47° 44' 50\" nord, 2° 44' 52\" est","gps":"","images":["../image/image_45/45_Buissi%c3%a8re_45_1.jpg","../image/image_45/45_Buissi%c3%a8re_45_2.jpg","../image/image_45/45_Buissi%c3%a8re_45_3.jpg","../image/image_45/45_Buissi%c3%a8re_45_4.jpg","../image/image_45/45_Buissi%c3%a8re_45_5.jpg","../image/image_45/45_Buissi%c3%a8re_45_6.jpg"]},"Consult_chateau_formulaire0e6c-2":{"id":"Consult_chateau_formulaire0e6c-2","dept":"45","canton":"Neuville aux Bois","commune":"Neuville aux Bois","nom":"Cas_Rouge","type":"Château","periode":"XIX","histoire":"CAS ROUGE, la famille Martin Denis Désiré Lubin, qui avait exécuté des peintures de style académique. Il commença par travailler selon la mode romantique de Delacroix. Mais il fut influencé par Léon Bonnat, qui lui apprit l'art du portrait. Mort en 1929, il léga son uvre à la ville de Pithivier.","architecture":"CAS ROUGE,  le château est une sobre demeure du XIXe siècle. Un pavillon central, très simple à un étage, montre une entrée en avancée surmontée d'un petit fronton triangulaire. En retrait, deux ailes à un seul niveau sont couvertes d'un toit à la Mansart. En avant de ce corps de logis, de chaque côté, il y a deux pavillons couverts de petites tuiles. En 1926 la demeure possédait un grand parc dont le plan a été conservé. Derrière celle-ci un massif dont le dessin rappelait le tracé des jardins à l'anglaise. Les allées avaient une distribution presque symétrique, sur les côtés de la maison, il y avait une grande avenue de tilleuls bordée d'un vaste potager. Cette demeure avait abrité un peintre classique, très oublié, de la fin du XIXe siècle et du début du XXe siècle.","habitants":"famille Martin Denis Désiré Lubin, \r\n        \"","divers":"Château de Cas-Rouge à Neuville  aux bois","gps":"","images":["../image/image_45/45_Cas_Rouge_1.jpg","../image/image_45/45_Cas_Rouge_2.jpg","../image/image_45/45_Cas_Rouge_3.jpg"]},"Consult_chateau_formulaire17aa":{"id":"Consult_chateau_formulaire17aa","dept":"45","canton":"Châlette-sur-Loing","commune":"Cepoy","nom":"Cepoy","type":"Château","periode":"XIV-XIX","histoire":"CEPOY, le premier château, construit vers 1200 en cet endroit, avait été édifié pour le garde de la forêt de Montargis toute proche. C'est pourquoi il fut appelé le \"château du Verdier\", puis \"Beauverd\", nom qu'il conserva jusqu'à la Révolution, son propriétaire, le marquis de Champigny, le vendit à Jacques Bouvier de la Motte, d'une vieille famille de magistrats de Montargis. La famille compta parmi ses membres Jeanne-Marie Bouvier de la Motte, célèbre mystique, plus connue sous le nom de Mme Guyon, amie de Fénelon. Pendant plus d'un siècle, le château devait rester dans cette famille. A partir de 1681, Jacques Bouvier commença la construction d'un nouveau château que ses héritiers poursuivront. Vers 1731, Guillaume Bouvier transforma la garenne qui entourait la maison en un parc à la française. Le domaine fut érigé en marquisat par le Louis XV. Guillaume Bouvier, marquis de Cépoy, mourut en 1759 . Sa veuve, Anne de Beauharnais, sera inhumée près de lui en 1770. Son successeur, le marquis Guillaume Bouvier, deuxième du nom, meurt à son tour en 1774 et sa veuve vend le château à un certain Chupin, conseiller au parlement. Ce dernier reçoit le 30 mai 1785, dans son château, les filles du roi Louis XV, Adélaïde et Victoire de France, qui vont prendre les eaux à Vichy.","architecture":"CEPOY, détruit en 1358, il fut reconstruit 22 ans plus tard et ne changea pas d'aspect jusqu'au XVIIe siècle. C'était une maison-forte entourée de fossés avec un pont-levis et un colombier.  Le corps principal prit l'aspect qu'il a conservé actuellement. Mais de part et d'autre du bâtiment central, deux ailes le reliaient aux tours d'angle. Vers 1646, le château, abandonné, était presque en ruines, A leur retour le 3 août, elles y couchèrent encore. A chaque fois, pour elles et leur suite, il fallut établir 163 lits dans le château. On avait construit des appartements dans l'orangerie et monté des tentes dans la cour. Après la Révolution, le château ne fut plus entretenu, les deux ailes latérales furent abattues, seules furent conservées les deux tours d'angle. Acheté par la commune en 1954, il entra dans un état d'abandon total. En 1977, un nouveau maire, M. Bezeault, réussit à l'arracher à la mort. Centre professionnel de formation, compagnons du devoir et du tour de France.","habitants":"Jacques Bouvier de la Motte\r\n        \"","divers":"Château de Cepoy à Cepoy","gps":"","images":["../image/image_45/45_Cepoy_1.jpg","../image/image_45/45_Cepoy_2.jpg"]},"Consult_chateau_formulaire9e27":{"id":"Consult_chateau_formulaire9e27","dept":"45","canton":"Sully-sur-Loire","commune":"Cerdon","nom":"Cerdon","type":"Château","periode":"XIX","histoire":"Trois châteaux dans cet article ; Boulaye, Cerdon et Grandval. BOULAYE, appelé à l'origine château des Rodeaux, du nom du domaine où il est installé, fut construit vers 1890 sur les plans de son propriétaire, Adolphe Bertheau, qui l'entoura d'un beau petit parc comportant de belles essences. Un écusson en vitrail portant les initiales A.B. de cet artiste peintre amateur figuraient sur la façade, s'insérant dans un hublot aujourd'hui bouché. Le mélange de la pierre et de la brique sous les toits d'ardoises crée un effet de polychromie constituant la base essentielle du décor d'époque de cette demeure.                                                                                                               CERDON, qui se reflète sur sa pièce d'eau près du Beuvron, est caché au milieu d'un petit parc, avec ses communs, entouré de murs de briques. Qualifié à la belle époque de moderne style, il traduit plutôt un éclectisme très fleuri inspiré du style Renaissance. Il a été construit vers 1870 pour Auguste Ganneval, brillant avocat et maire de la commune.","architecture":"GRANDVAL, un agencement complexe de toits à pavillons, à longs pans, en croupes et demi-croupes, caractérise ce bâtiment avec façades décorées de briques. Cet aspect composite s'explique par sa construction en plusieurs étapes. Vers 1900, le marquis de Moncuit fait bâtir un rendez-vous de chasse au cur d'un vaste domaine de 3 500 ha à vocation cynégétique. Cette construction d'origine ne comprenait que le pavillon à hautes toitures et à deux étages, flanqué d'un corps de logis à deux travées asymétriques. Dans les années 1920, le nouveau propriétaire, M. Martel, agrandit la demeure en y ajoutant un corps de logis à trois travées, couvert d'une charpente métallique. En 1936, la propriété est cédée au front populaire qui fait élever des bâtiments indépendants afin de loger de nombreux ouvriers, réfugiés politiques espagnols. En 1947, le château de Grandval devient la propriété de l'armée française qui le transforme en bâtiment de repos pour les jeunes veuves d'officiers.","habitants":"Boulaie, Adolphe Bertheau                                                         Cerdon;  Auguste Ganneval                                                      Grandval;  M. Martel\r\n        \"","divers":"Trois châteaux à Cerdon; Boulaie grav-1, Cerdon grav-5 et Grandval-grav-2-3-4.","gps":"","images":["../image/image_45/45_Cerdon_1.jpg","../image/image_45/45_Cerdon_2.jpg","../image/image_45/45_Cerdon_3.jpg","../image/image_45/45_Cerdon_4.jpg","../image/image_45/45_Cerdon_5.jpg"]},"Consult_chateau_formulairec027":{"id":"Consult_chateau_formulairec027","dept":"45","canton":"Beaune-la-Rolande","commune":"Chambon-la-Forét","nom":"Chambon_la_Foret","type":"Château","periode":"XVI-XIX","histoire":"Deux châteaux dans cet article; Luzerne, la Rive au Bois.            LUZERNE, en 1403, il appartenait à Jean d'Angeliers, seigneur de Chambon. En 1417, pendant la guerre de cent ans, il fut fortifié par les partisans du roi pour former avec Yèvre le Châtel, Courcelles et Mousseaux (près de Boynes), une ligne de positions avancées, destinées à protéger Orléans contre les Anglais, qui s'étaient emparés de Beaumont et d'Etampes et dont les garnisons faisaient des incursions meurtrières dans la campagne pour assurer leur ravitaillement. Après les destructions de la guerre de cent ans, puis celles des guerres de religion, le château fut reconstruit en 1590.  Au XVIIIe siècle, il appartint au comte de la Luzerne, ministre de la Marine de Louis XVI, frère du cardinal de la Luzerne, évêque de Langres et du chevalier de la Luzerne. De son passé guerrier, il a gardé deux tours massives, mais l'architecture de l'autre façade où domine la brique, rappelle celle des châteaux de Sologne. Aujourd'hui, les propriétaires, M. et Mme Bouche-Florin souhaitent redonner au château sa dimension environnementale qu'il connut autrefois.","architecture":"CHAMBON, dit de Luzerne, se compose d'un corps de bâtiment rectangulaire, flanqué côté nord d'étroits pavillons. Côté sud, il est accosté de deux tours aménagées aux XVIIe et XVIIIe siècles, vestiges de l'ancien château-fort. Des traces des anciennes douves sont conservées au nord et à l'ouest. La façade nord offre un aspect très caractéristique de l'architecture du XVIIe siècle. Un ensemble de communs subsiste à l'ouest.                                                                                                   La RIVE du BOIS  au sud du bourg, le hameau de la Rive-du-Bois est à l'origine un hameau de forestiers. Il y eut un ancien château, appartenant à la famille de Beaupréau, dont il ne reste aujourd'hui que deux fermes. Un nouveau château est reconstruit à la fin du XIXe sièc
