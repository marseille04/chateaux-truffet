ecture vernaculaire, typique de la Sologne : une magnifique grange séchoir dont le vaste toit, couvert de petites tuiles plates, descend très bas sur le sol avec une large ouverture entamant un des pans de la toiture pour permettre un accès aisé. On peut voir, dans les murs de briques, d'un délicat rose passé, les claires-voies pratiquées pour l'aération et pour un séchage optimal des tuiles et des briques. Quant au logis, il est composé de deux grosses maisons, anciennes métairies, réunies entre elles par un corps de bâtiment plus bas, puis agrandies plus tard par l'arrière. Les rustiques lucarnes, largement engagées dans le mur gouttereau et coupant l'égout du toit (lucarnes pendantes à bâtière) indiquent bien l'origine paysanne du bâti.","architecture":"CHAMPS,  du XIXe siècle est un édifice totalement dissymétrique d'une belle qualité architecturale. Il se compose de plusieurs corps accolés, dont deux tours en demi-hors-uvre sur l'une des façades soulignent les jonctions. Les différences de ses toitures donnent à l'ensemble un jeu de volumes très réussi. Le décor est soigné, lucarnes, cheminées, chaînes d'angles, viennent renforcer l'impression donnée par cette demeure édifiée en 1810 et agrandie en 1860 par Paul de Schoudens, arrière grand père du propriétaire actuel.                                                          Ste-CLAIRE réalisée pour un certain Thomas vers 1865, est une création originale, puisant ses racines dans le répertoire médiéval et pourrait être inspirée des réalisations anglaises. Le pignon du corps principal évoque les demeures \"romanes\" avec des baies géminées éclairant l'étage noble du logis. Le motif de la fenêtre centrale est particulièrement soigné. Les baies en arc brisé sont soulignées d'une archivolte finement sculptée; les tympans sont décorés de motifs polychromes; le garde-corps du balcon porte des éléments quadrilobés sculptés. Un long bâtiment étroit est accolé à ce premier corps. C'est une sorte de tour surmontée d'un belvédère, avec une petite tourelle en poivrière. La mise en uvre des briques et la polychromie sont adaptées à chaque partie de l'édifice.","habitants":"Champs; Paul de Schoudens                                                               Ste-Claire; Monsieur Thomas\r\n        \"","divers":"quatre châteaux  à Isdes: Brenne grav-1-2, Champs grav-4, Mardelle grav-3,  et Ste-Caire grav 5-6.                                  Brenne  47° 39' 38\" nord, 2° 17' 40\" est","gps":"","images":["../image/image_45/45_Isdes_1.jpg","../image/image_45/45_Isdes_2.jpg","../image/image_45/45_Isdes_3.jpg","../image/image_45/45_Isdes_4.jpg","../image/image_45/45_Isdes_5.jpg","../image/image_45/45_Isdes_6.jpg"]},"Consult_chateau_formulaireb582":{"id":"Consult_chateau_formulaireb582","dept":"45","canton":"Cléry-Saint-André","commune":"Jouy le Potier","nom":"Jouy_le_Potier","type":"Château","periode":"XV-XIV-XIX","histoire":"Trois châteaux dans cet article; Cendray, Montour et Vignelles.                                                                                           CENDRAY, un premier château a été construit au XIVe siècle, qui était composé d'un logis seigneurial et de plusieurs fermes : La Touche, La Lotière, la locature des Champs Bretons... Vers 1562, le château de Cendray est démoli par les huguenots, alors une habitation provisoire est bâtie en dehors des fossés de défense. Ce château se composait d'un rez-de-chaussée et d'un premier étage ayant chacun onze ouvertures. En 1849, une tuilerie, dont le four est toujours visible le long de la route de Cléry-Saint-André, est construite pour accéder aux divers besoins de restauration des bâtiments. En 1853,   le château provisoire est abattu et remplacé par le château actuel, dont la proximité avec le grand étang ajoute à la beauté du site.                               MONTOUR, un premier château fut édifié au XIIe pour les Beauvilliers, seigneurs du Lude, la terre de Monthoust ou Montoux, puis Montour, qui conservèrent cette propriété jusqu'au XVe siècle, elle passa ensuite, vers 1540, au seigneur de Villefallier. La terre de Montour passa en différentes mains; les Bigot et les Cornuel au XVIIe siècle, les Verdier au XIXe siècle, avant de devenir la propriété d'Ernest de Loynes du Houlley, qui agrandit le corps de logis et lui ajouta une aile en retour. En janvier 1890, la demeure est détruite par un incendie  est reconstruite en 1892.","architecture":"VIGNELLES, construit en 1885, est soucieux du bien-être en s'élevant sur une légère éminence. L'harmonie de l'ensemble est due à des pavillons carrés aux bases largement ajourées, aux avancées d'un corps de logis central précédées d'un perron en terrasse, à des toitures aux formes dissemblables, à une tourelle ronde appuyée sur un fût en encorbellement, ainsi qu'à des parements de pierre de taille faisant cadre à la brique rose rejointoyée de blanc. Ce château tel qu'il se présente aujourd'hui remplace l'ancien Vignelles qui ne se composait que d'un rez-de-chaussée avec mansardes de cinq ouvertures, et dont il ne reste qu'une pierre portant la date \"1606\", encastrée dans un angle du nouveau château. À cette époque, Vignelles appartenait à la famille de Renier sans qu'on puisse à partir de là donner la filiation exacte des propriétaires du lieu. Mais, il est certain que l'hébergement de Vignelles est plus ancien encore, Dans les années 90, il subit de nouveau un  incendie. Le couple qui racheta le château pour rénovation souhaitait le reconstruire tel qu'il était à l'origine (un seul étage) mais malheureusement la rénovation coûteuse ne put aboutir.","habitants":"Cendray;  seigneur local                                                                                             Montour; seigneur de Villefallier.                                                        Vignelles; famille de Renier \r\n        \"","divers":"Trois châteaux a Jouy le Potier; Cendray grav 3-4, Montour grav-1-2 et Vignelles grav 5-6-7-8.                                                 Cendray 47° 45' 14\" nord, 1° 48' 08\" est","gps":"","images":["../image/image_45/45_Jouy_le_Potier_1.jpg","../image/image_45/45_Jouy_le_Potier_2.jpg","../image/image_45/45_Jouy_le_Potier_3.jpg","../image/image_45/45_Jouy_le_Potier_4.jpg","../image/image_45/45_Jouy_le_Potier_5.jpg","../image/image_45/45_Jouy_le_Potier_6.jpg","../image/image_45/45_Jouy_le_Potier_7.jpg","../image/image_45/45_Jouy_le_Potier_8.jpg"]},"Consult_chateau_formulairecc10":{"id":"Consult_chateau_formulairecc10","dept":"45","canton":"Cléry-Saint-André","commune":"Jouy le Potier","nom":"Jouy_le_Potier_II","type":"Château","periode":"XVI-XIX","histoire":"deux châteaux dans cet article; Lude  et Villefallier.                  LUDE, propriété de Herbert de Beauvilliers en 1115,  aux héritiers jusqu'en 1429 et passe à cette date à Jean de la Rable dont les descendants le possédaient encore au milieu du XVIe siècle. Durant les guerres de religion, le Lude était une place catholique, ce qui a valu au donjon et à l'aile droite du château qui s'y appuyait, d'être démantelés par les troupes de l'amiral de Coligny. La propriété a été achetée par la famille de Bastide au milieu du XIXe siècle. A la fin du siècle, l'artiste Maurice Bastide a fait effectuer des restaurations par l'architecte H. Rapine, qui visaient les consolidations nécessaires à donner au château un aspect historique.                                                          VILLEFALLIER, le château a été construit par l'architecte Jules Édouard Potier de la Morandière dans le quatrième quart du XIXe siècle pour le vicomte Raymond Bigot de Morogues.","architecture":"LUDE, on accède au château après avoir traversé des communs entourant une cour quadrangulaire plantée en jardin : L'atelier du peintre Maurice Bastide a pris la place de la ferme située en face de l'entrée du château. Le château est disposé en L sur une plate-forme maçonnée entourée de douves alimentées par les eaux du Cosson. Le pavillon de la poterne permet d'accéder à la cour d'honneur. Le logis est disposé en fond de cour, avec ses travées de baies remaniées par l'adjonction de meneaux et traverses, surmontées de lucarnes ornées de décors sculptés, d'un style proche de la Renaissance tourangelle, à partir de 1896. Une aile à gauche est couverte d'une toiture s'achevant en croupe. Une aile plus basse, aux ouvertures repercées sur la cour et relevée en briques du côté des douves, relie ce bâtiment à la poterne. La survivance d'un culte à Sainte-Corneille dans la chapelle du parc, est à l'origine de l'ouverture de ce parc au public.                                                                                              VILLEFALLIER,  deux pavillons sont en avancée sur un motif central, et le sentiment artistique du constructeur a su s'éloigner de cette convention de symétrie qui rend banales d'autres façades de la même époque. Une tour ronde qui contient l'escalier à l'un des angles est une réelle trouvaille. L'édifice de plan symétrique, se compose d'un étage carré et un étage de comble, gros-oeuvre en brique, élévation ordonnancée surmontée d'un toit en pavillon, toit à longs pans brisés et croupe, recouverts d'ardoises.","habitants":"Lude; famille de Bastide                                              Villefallier; vicomte Raymond Bigot de Morogues\r\n        \"","divers":"A Jouy-le-Potier deux châteaux Lude grav 1-2-3-4 et Villefallier grav-5-6.                                                                            Lude  47° 43' 01\" nord, 1° 50' 47\" est","gps":"","images":["../image/image_45/45_Jouy_le_Potier_II_1.jpg","../image/image_45/45_Jouy_le_Potier_II_2.jpg","../image/image_45/45_Jouy_le_Potier_II_3.jpg","../image/image_45/45_Jouy_le_Potier_II_4.jpg","../image/image_45/45_Jouy_le_Potier_II_5.jpg","../image/image_45/45_Jouy_le_Potier_II_6.jpg"]},"Consult_chateau_formulaire11be":{"id":"Consult_chateau_formulaire11be","dept":"45","canton":"Saint-Jean-le-Blanc","commune":"Saint-Jean-le-Blanc","nom":"La_Mothe_St_Lyé","type":"Château","periode":"XVII-XIX","histoire":"La MOTHE,  Simon de Bombelles, seigneur de Bougy partit à la croisade avec Saint Louis et protégea le roi blessé à l'aide de son écu. En récompense, il reçut la baronnie de la Mothe Saint-Lyé vers 1273 qui resta dans cette famille pendant plus de trois siècles. En 1603, le château de la Mothe Saint-Lyé fut vendu à Denis de Rossieux, puis en 1634 à Guillaume de Caen, major général des armées navales du Roi à Saint Domingue. Guillaume presque ruiné défendit ses droits avec acharnement et entama avec les descendants des Bombelles, restés seigneurs du village voisin de Villereau, un procès qui se poursuivit pendant plus d'un siècle. En 1645, Michel d'Alligre, conseiller du roi, secrétaire général des menus plaisirs des affaires de la chambre du Roi devint seigneur de Saint-Lyé et poursuivit le procès, de telle sorte qu'en 1670, les deux adversaires étant complètement ruinés, le château de Saint-Lyé ainsi que ses meubles furent vendus. En 1677, le château appartenait à François Lemaire de Villeromard, seigneur de Diziers (à Suèvres) trésorier général des guerres qui donna à la demeure son aspect actuel. Comme il n'avait pas d'enfant il légua Saint-Lyé à l'ainé des deux fils de sa femme, Gabriel de Sauvion qui n'y vint jamais. La Mothe Saint Lyé passa à Jacques Desnot en 1698, premier fauconnier du duc d'Orléans, puis au comte de Sassenage et en 1717 à Guillaume François Dugué de Bagnols conseiller du roi qui y mourut en 1743. En 1808, la propriété appartenait à Alexandre Bioche de Misery, puis à Madame Voys.","architecture":"La MOTHE, édifice à perron central en pierre appareillée, au fond d'une cour d'honneur entourée de douves qui bordent le château. Ce bâtiment est composé d'un étage de soubassement, d'un rez-de-chaussée comprenant les pièces de réception et d'un premier étage situé sous un toit à la Mansart. La façade nord est flanquée de deux tours rondes, dans celle de l'est se trouve un escalier. Elles sont les témoins d'une construction antérieure. Les pièces du rez-de-chaussée sont ornées de boiseries du XVIIIe siècle. Les cheminées du salon et de la salle à manger, les trumeaux peints sont de la même époque. La grille d'entrée et la balustrade du perron en fer forgé datent du XVIIe siècle. En 1808, la propriété appartenait à Alexandre Bioche de Misery, puis à Madame Voys. En 1884, la comtesse de Cabro en était propriétaire. Plus récemment l'édifice, restauré avec raffinement, abritait le repos de Raymond Subes membre de l'Institut et rénovateur de l'art de la Ferronnerie.","habitants":"Simon de Bombelles\r\n        \"","divers":"Saint-Jean-le-Blanc, château de la Motte","gps":"","images":["../image/image_45/45_La_Mothe_St_Ly%c3%a9_1.jpg","../image/image_45/45_La_Mothe_St_Ly%c3%a9_2.jpg","../image/image_45/45_La_Mothe_St_Ly%c3%a9_3.jpg","../image/image_45/45_La_Mothe_St_Ly%c3%a9_4.jpg"]},"Consult_chateau_formulairecaed-2":{"id":"Consult_chateau_formulairecaed-2","dept":"45","canton":"Beaugency","commune":"Lailly en Val","nom":"Lailly_en_Val","type":"Château","periode":"XV-XVII-XIX-XX","histoire":"Quatre châteaux à Lailly en Val ; Fonpertuis, Gaschetières (voir article).                                                                                                   FONPERTUIS, construit au XVe siècle par Constant II, seigneur de Lailly, Charles le Bon, sire dArmagnac y est né, Jean François de Maupassant, chevalier de Saint Louis y est décédé. Devenu propriété de Guy Émeric Anne de Durfort-Civrac (1767-1837), duc de Lorges, il a été vendu en 1956 au Fonds Humanitaire Polonais et aménagé en maison de retraite.\r\n PULLY, les représentants sont dédié à la comtesse d'Archiac, la propriétaire. Le portail d'entrée avec ses vantaux en fer forgé, fut sans doute réalisé à l'occasion de cette période de construction comme l'indique le décor des portes caractéristiques du style néo-classique qui fit son apparition à la fin du règne de Louis XV. certainement au siècle dernier lorsque monsieur Geffrier en était propriétaire. C'est sa fille, Mme de la Frésange, qui hérita de la propriété et la vendit en 1955 à la famille Hackenberger. Cette dernière fit démolir le château et sa chapelle, mais conserva les communs propriétaire Marcel Bich construit en 1800 par Vincent Gaillard, créateur des « Messageries Gaillard-Lebrun ». Son gendre Eugène Sue, sy réfugia de 1843 à 1849. Le château est acquis en 1977 par Marcel Bich qui le fera démolir en 1979 pour transformer le domaine en golf international ouvert depuis 1987.","architecture":"FONPERTUIS, du château antérieur à 1720, il ne reste rien. Il était avant cette date à Louis-Augustin Angrand, chevalier vicomte de Fontpertuis, qui le vendit avec la terre, seigneurie et vicomté le 9 octobre 1714 à Jacques Papillon de la Grange, ce dernier fit élever un nouveau château avec ses dépendances entre 1720 et 1723. L'ensemble fut racheté par son précédent propriétaire lors d'une adjudication du 3 août 1730. De ce château, on connait l'élévation de l'aile percée d'une porte monumentale et le colombier toujours en place qui semble ancien. Un nouveau corps de bâtiment principal, entouré de douves, fut bâti en 1858 à l'emplacement de l'ancien par la famille des ducs de Lorge qui acquirent Fontpertuis le 6 ventôse An XIII (28 septembre 1804). Après 1919, l'aile sud fut détruite puis reconstruite dans un style unifiant l'ensemble du château dont les façades du corps principal furent transformées à partir de 1921. Les dépendances furent édifiées vers 1890 par l'architecte orléanais Pagot et les entrepreneurs Guilletdoux et Gervaise. Château entouré de douves, de plan régulier en L et élévation ordonnancée avec un étage carré et un étage de comble, toit à longs pans brisés et à croupes de même ; escalier avec rampe en fer forgé ; dépendances à plan en U avec couvertures en ardoise, toits à longs pans, pignons couverts et croupe ; nombreuses baies des communs avec encadrement en brique et pierre en alternance ; colombier à toit en pavillon ; orangerie à toit à longs pans couvert d'ardoise.","habitants":"Fonpertuis;  Jean François de Maupassant                                Gaschetières; François Ier\r\n        \"","divers":"Quatre châteaux à Lailly en Val ; Fonpertuis,  1 à 5                              Fontpertuis  47° 46' 00\" nord, 1° 40' 59\" est","gps":"","images":["../image/image_45/45_Lailly_en_Val_1.jpg","../image/image_45/45_Lailly_en_Val_2.jpg","../image/image_45/45_Lailly_en_Val_3.jpg","../image/image_45/45_Lailly_en_Val_4.jpg","../image/image_45/45_Lailly_en_Val_5.jpg"]},"Consult_chateau_formulaire93a0":{"id":"Consult_chateau_formulaire93a0","dept":"45","canton":"Beaugency","commune":"Lailly en Val","nom":"Lailly_en_Val_II","type":"Château","periode":"XVII-XIX","histoire":"trois chateaux dans cet article; Bertaudière, Bordes et Pully         BERDAUDIERE,  de plan rectangulaire, édifié en moellon, possède des ouvertures d'une grande sobriété et un escalier à vis, en bois, dans uvre, au noyau torsadé et directement accessible depuis la porte d'entrée, toiture avec des marches qui montent jusqu'au comble, ce qui le fait émerger de l'ensemble comme au château de la Morinière réalisé dans les années 1545. Seules fioritures : deux lucarnes en pierre qui viennent conclure les deux travées de fenêtres de la façade antérieure ainsi qu'un escalier en pierre, de quelques marches, formant perron et qui permet d'atteindre le rez-de-chaussée surélevé depuis la cour.                                                                                          BORDES, Vincent Caillard,  commença la construction du château au XIXe siècle. A sa mort en 1843, son fils aîné, Marc Caillard, hérita. Eugène Sue, son beau-frère, lui acheta quelques dépendances du château et fit élever dans son prolongement une galerie où il aimait écrire et une serre vers 1844-1945. Alexandre Dumas qui vit la demeure en 1846  Marc en acheva la construction vers 1880.  Du XIX e siècle bâtiment couvert en terrasse ; le corps principal avait deux niveaux d'élévation ordonnancée, d'une tour-porche en avant-corps à trois niveaux ; présence de tourelles à toit conique sur cette dernière et d'une tour ronde, à l'arrière du bâtiment, à toit circulaire à la base et polygonal au-dessus ; une galerie en rez-de-chaussée complétait l'ensemble sur l'arrière gauche du bâtiment avec une serre. La brique et le moellon enduit sont employés sur l'ensemble des constructions.","architecture":"PULLY,  la propriétaire la comtesse d'Archiac,  de style néo-classique qui fit son apparition à la fin du règne de Louis XV. certainement au siècle dernier lorsque monsieur Geffrier en était propriétaire. C'est sa fille, Mme de la Frésange, qui hérita de la propriété et la vendit en 1955 à la famille Hackenberger. Cette dernière fit démolir le château, mais conserva les communs , le propriétaire Marcel Bich construit en 1800 par Vincent Gaillard, créateur des « Messageries Gaillard-Lebrun ». Son gendre Eugène Sue, sy réfugia de 1843 à 1849. Le château est acquis en 1977 par Marcel Bich qui le fera démolir en 1979 pour transformer le domaine en golf international ouvert depuis 1987. du XVIIIe siècle château à un étage carré, élévation ordonnancée, murs en brique et pierre et toit à longs pans brisés et croupes de même; communs disposées symétriquement de part et d'autre de la cour et présentant chacun deux pavillons à un étage carré, élévation ordonnancée ou à travées et toit en pavillon couvert d'ardoises ; ces pavillons sont implantés aux extrémités des longs corps de bâtiments à usage de remises et d'écuries à toit a longs pans et croupes couverts d'ardoises ; les murs sont en brique apparente ou enduite ; le pavillon près de l'entrée, à droite, et les écuries ont une façade postérieure à pan de bois apparemment hourdée de brique ; orangerie en brique avec toit à longs pans et croupes couverts en tuiles plates ; portail principal d'entrée en fer forgé.  De l'ancien château construit en 1763, il ne reste que les communs; la clôture et la grille sont inscrits à l'inventaire des M.H.","habitants":"Berdaudière; seigneur local                                                                                                     Bordes;  Vincent Caillard                                                                        Pully; comtesse d'Archiac,\r\n        \"","divers":"trois chateaux à Lailly en Val Bertaudière, Bordes  grav 3-4 et Pully grav -1-2","gps":"","images":["../image/image_45/45_Lailly_en_Val_II_1.jpg","../image/image_45/45_Lailly_en_Val_II_2.jpg","../image/image_45/45_Lailly_en_Val_II_3.jpg","../image/image_45/45_Lailly_en_Val_II_4.jpg"]},"Consult_chateau_formulairedbaa":{"id":"Consult_chateau_formulairedbaa","dept":"45","canton":"Châlette-sur-Loing","commune":"Chalette sur Loing","nom":"Lancy","type":"Château","periode":"XVIII","histoire":"LANCY,  cest sur les ruines du prieuré que lactuelle maison principale est construite, à la fin du XVII siècle. Clos de murs et flanqué sur sa façade sud dun pigeonnier, elle prend le nom de château du Lancy. Le premier seigneur connu est Charles Asselineau, écuyer, seigneur du Fresnoy et ancien capitaine-exempt des gardes du roi. En 1652, durant la fronde, le château est à nouveau pillé par les soldats de larmée de Condé. Le château passe à la famille Duperche de Beaulieu de Nemours. Il comprend alors, la maison principale (18 mètres de long sur 7 de large), le colombier, les bâtiments dexploitation et 27 hectares. Loué en 1783 pour vingt ans à la comtesse de Framond, épouse du commandant du vaisseau \"le Caton\", Georges de Framond, fille de messire Jean Baptiste de Bragelongue et de Catherine Pierrette de Cuigy, filleule de Stanislas Leczinski ancien Roi de Pologne. Le château est vendu le 2 mars 1792 à un jeune officier dinfanterie de vingt-trois ans, Jean Louis François Maralde de Fontenay des Roches et devenu  le premier maire de Châlette sur Loing en 1801. La magnifique rangée de platanes qui borde lactuelle rue La Fontaine est plantée en 1850 par le nouveau propriétaire, le comte Armand Louis Frédéric de Gogué, ancien capitaine de cavalerie de Napoléon, qui décède le 04 novembre 1860 dans son château.","architecture":"LANCY, du moyen-âge ont survécu la petite tourelle que lon peut observer de la rue, au Nord du petit bâtiment située à droite des grilles de lentrée, Des restes de la chapelle il ne demeure que très peu déléments. Retrouvée il y a quelques années lors de la restauration de la toiture de la maison située au Nord de la porcherie. En effet cest dans labside semi circulaire de la chapelle quavait été construit le four à pain,  au XIX siècle, dissimulant ainsi complètement la chapelle. Le pigeonnier construit à la fin du XVII siècle est intact. A lintérieur, dans son sous-sol, lemplacement pour les Chaix, au-dessus la place pour le \"ballou\" (enveloppe du grain de blé) et les cordes de chanvre, et dans les étages supérieurs, toutes les petites loges en castille. A lextérieur on observe en hauteur sa ceinture de pierre en saillie. La maison principale bâtie à la même époque sest agrandie au Nord dune extension  au XIX siècle, pour joindre les communs, et plus tard dune autre extension au Sud. Ses murs en pierre de taille ont été enduits à la tyrolienne dans les années 1900. Elle conserve à lintérieur de nombreux éléments dépoque.","habitants":"famille Duperche de Beaulieu\r\n        \"","divers":"A Chalette sur Loing le château de Lancy","gps":"","images":["../image/image_45/45_Lancy_1.jpg","../image/image_45/45_Lancy_2.jpg","../image/image_45/45_Lancy_3.jpg"]},"Consult_chateau_formulaire3073":{"id":"Consult_chateau_formulaire3073","dept":"45","canton":"Gien","commune":"Langesse","nom":"Langesse","type":"Château","periode":"XIX","histoire":"LANGESSE,   Langesse était autrefois le siège d'une importante seigneurie signalée en 1373, qui jouissait de droits forestiers très étendus. La présence d'un château seigneurial, dont la maison de Courtenay était propriétaire vers le milieu du XIVe siècle, le confirme. En 1595, le domaine fut acquis par Jean Dufaur, cette famille le garda jusqu'en 1652 d'où il passa ensuite aux châtelains du Chesnoy. Le duc d'Orléans y exerça, depuis, le droit de haute justice. En raison de la préférence royale,  le plaisir de la chasse est resté et pour l'exercer M. Loreau, conseiller général.","architecture":"LANGESSE,  put jouir de privilèges particuliers dans la forêt d'Orléans , mais, comme le château, ce droit seigneurial s'en est allé. Le plaisir de la chasse est resté et pour l'exercer M. Loreau, conseiller général, y fit bâtir en 1894 l'actuel château qui n'a aucun rapport évidemment avec l'ancien, détruit au cours des guerres de Religion. C'est un vaste pavillon à double corps au centre duquel, sur la façade Est, se détache une rotonde avec dôme surmonté d'un campanile où l'on accède par un perron en fer à cheval.","habitants":"Famille de Jean Dufaur\r\n        \"","divers":"Château de Langesse","gps":"","images":["../image/image_45/45_Langesse_1.jpg","../image/image_45/45_Langesse_2.jpg"]},"Consult_chateau_formulairea1e5":{"id":"Consult_chateau_formulairea1e5","dept":"45","canton":"Chécy","commune":"Mardié","nom":"Latingy","type":"Manoir","periode":"XIV-XVII","histoire":"LATINGY,  c'était un fief au début du XIVe siècle, Depuis le XVe siècle il ne fut possédé que par deux lignées. La première comprenait les Hüe de Miromesnil dont Armand Thomas, né au château, qui fut premier président du parlement de Rouen et garde des sceaux de Louis XVI. La deuxième tient son origine de Nicolas Lasneau, bourgeois orléanais, qui acheta en 1790 la terre de Latingny occupée depuis lors par ses descendants. Un plan, daté de 1668, du géomètre Fleury,","architecture":"LATINGY, montre un vaste ensemble de bâtiments, bordé par des bois à l'est et à l'ouest. Aujourd'hui, ceux-ci comprennent, au centre, le château et une chapelle ; à l'ouest, les communs comportant trois portes inscrites dans les arcades, surmontées d'une horloge intégrée dans le fronton, une ferme au sein de laquelle se dresse un important pigeonnier élevé en 1550, et à l'est du château, une autre ferme bâtie au XIXe siècle. Les ailes nord-est et sud-est du logis ancien furent démolies en 1831 et 1860. À nouveau, deux ailes lui furent adjointes, de part et d'autre, au sud, de 1872 à 1874.","habitants":"Famille de Nicolas Lasneau\r\n        \"","divers":"A Mardié le château de Latingy     47° 52' 36\" nord, 2° 04' 57\" est","gps":"","images":["../image/image_45/45_Latingy_1.jpg","../image/image_45/45_Latingy_2.jpg"]},"Consult_chateau_formulaire8a9b":{"id":"Consult_chateau_formulaire8a9b","dept":"45","canton":"La Ferté-Saint-Aubin","commune":"Ligny le Ribault","nom":"Ligny_Ribault","type":"Château","periode":"XVIII-XIX-XX","histoire":"six châteaux dans cet article; Bretéche, Briou-Landre, Cantée, Frogerie, Vieux-Maison et La Cour.   Bon-Hôtel voir article                                                                         BRETECHE, du XVIIIe siècle, très simple, comprend un corps central flanqué de deux ailes en saillie. C'est la propriété de la famille de Baudus. Le lieutenant-colonel Elie de Baudus était aux côtés de Napoléon à Waterloo. A été  blessé au bras droit par un éclat d'obus. Aujourd'hui, le château de la Bretèche est toujours dans cette famille.                                               \r\n  CANTEE, du XVIII-XIXe siècle où la pierre blanche est maîtresse, ainsi que la ligne droite et la froide régularité sans être monotone. Au centre, un pavillon carré à la haute toiture, à droite et à gauche deux pavillons plus petits et plus bas, ajoutés dans les années 1840 par M. de Baudus lorsqu'il arriva à La Cantée.                                                                                                                VIEUX-MAISONS, du XIXe siècle, au bout d'une allée, le château  s'élève au lieu-dit Les Boursières, c'est une grande construction où éclatent le rouge de la brique et le blanc de la pierre, bâtie à partir de 1884 pour Robert Leroux de Villiers sur un nouveau site distant de quelques centaines de mètres du premier château du XVe siècle. Le château, les communs avec les écuries du propriétaire. Les toitures de toutes formes et de toutes hauteurs font venir à la pensée l'image d'un petit village ramassé. Le château de Vieux Maisons appartient aujourd'hui à M. Bernard Lozé, une des grandes figures du capitalisme français, spécialisé dans le conseil en investissements financiers.","architecture":"BRIOU-LANDRE, fut reconstruit à la fin du XIXe siècle dans un style classique, la demeure est composée d'un corps de logis à un étage carré, coiffé d'un toit à longs pans, prolongé de chaque côté par deux petits pavillons.                                                       LA-COUR, du XVII-XXe siècle, il ne subsiste rien de la maison médiévale qu'habita, dit-on, Jean de Meung. Le monastère qui lui succéda fut à son tour détruit pendant les guerres de religion. Le château actuel fut bâti en 1603 par Claude de Bernard, écuyer. Il a été construit sur un terre-plein complètement entouré de douves creusées directement dans le lit du Cosson. C'est un bel édifice classique de briques roses avec un pavillon central en saillie. En 1781, il appartenait à Étienne Fleureau de Guillonville, secrétaire du roi et contrôleur général des domaines et bois du duché d'Orléans. En 1789, Mgr de Montmorency-Laval y trouva refuge et y resta plusieurs mois. Vers 1860, la famille Dufaur de Pibrac y apporta d'importantes transformations. Depuis 1968, l'édifice appartient à M. et Mme Daussy qui s'efforcent de lui rendre son aspect Henri IV d'origine.                                      FROGERIE, le château est construit pour Robert de Massy vers 1890-1892. Vers 1904, l'agrandissement du logis couvert en terrasse est surmonté d'étonnants belvédères, les communs et les dépendances sont commandés par Alexandre André, le gendre de Robert de Massy, dans un style Belle Époque. Les ancres des tirants des belles cheminées portent le monogramme du propriétaire.","habitants":"Seigneurs locaux\r\n        \"","divers":"six châteaux Ligny le Ribault Bretéche grav -2, Briou-Landre grav-1, Cantée grav-8, Frogerie grav 3-4, Vieux-Maison grav-5 et La Cour grav -6-7.","gps":"","images":["../image/image_45/45_Ligny_Ribault_1.jpg","../image/image_45/45_Ligny_Ribault_2.jpg","../image/image_45/45_Ligny_Ribault_3.jpg","../image/image_45/45_Ligny_Ribault_4.jpg","../image/image_45/45_Ligny_Ribault_5.jpg","../image/image_45/45_Ligny_Ribault_6.jpg","../image/image_45/45_Ligny_Ribault_7.jpg"]},"Consult_chateau_formulaireda64":{"id":"Consult_chateau_formulaireda64","dept":"45","canton":"Sully-sur-Loire","commune":"Lion en Sullias","nom":"Lion_en_Sullias","type":"Château","periode":"XVII-XIX","histoire":"Dans cet article deux châteaux; Cuissy et la Ronce.                    CUISSY,   du XVII-XIXe siècle, est une belle demeure du XVIIe siècle qui fut bâtie en 1630 par René de Menou pour remplacer une maison-forte où, dit-on, Jeanne d'Arc aurait séjourné en mars 1430 et où une garnison de la Ligue avait capitulé en mai 1591 après que François de Coligny (fils de l'amiral) avait fait tirer à partir d'Ouzouer un seul boulet de pierre. L'élément le plus intéressant est la salle à manger entièrement boisée et ornée des portraits de la famille de Menou et de la famille de Cremeur, alliées à la suite du mariage de Charles de Menou et de Jacqueline de Cremeur. La propriété resta dans la même famille jusque vers 1760. Elle fut acquise en 1922 par Mario Roques, écrivain, professeur à la Sorbonne et membre de l'Institut. Son fils Jean Roques, ingénieur, entretient avec soin ce témoin des siècles passés.                                                                                                                      LA RONCE, une résidence des XVIIIe et XIXe siècles, les terres de la Ronce, pour n'être qu'un lieu de culture relevant de la seigneurie du Puy n'ont jamais elles-mêmes constitué une seigneurie. Le château actuel accuse nettement le XIXe siècle par le remaniement d'un pavillon Louis XIII auquel on a fait une addition sans caractère architectonique. Il fut sans doute construit pour la famille de Corsernbleu qui le posséda.  Récemment, il était propriété de la famille Reille.","architecture":"CUISSY (suite), Le château actuel, entouré de douves sur trois côtés, est une construction en fer à cheval qui  donne sur une cour carrée. Le corps de logis principal remonte à 1630 et comporte un étage surmonté d'une haute toiture. L'aile Est date du XVIIIe siècle, L'aile principale, bâtiment rectangulaire à un étage, présente une façade faite d'un blocage de silex et de mortier. L'aile ouest est plus récente (1842) et a été élevée sur une ancienne chapelle dont il ne reste aucune trace. Des douves entourent les trois façades sur jardin. A l'intérieur, la salle à manger, à droite du couloir d'entrée, a gardé des boiseries anciennes et renferme une galerie de portraits du XVIIe siècle. La pièce conserve également une cheminée à piédroits de pierre sculptés (vase de fleurs surmonté d'une chimère, de deux bustes humains et d'un lion rugissant et tenant un écu). Dans l'aile Est, la buanderie abrite un puits de pierre et une cave voûtée.  Inscription aux M.H. par arrêté du 29 décembre 1978.","habitants":"famille de Menou \r\n        \r\n        \"","divers":"A Lion en Sullias deux châteaux; Cuissy grav 1-2 et la Ronce grav-3-4.","gps":"","images":["../image/image_45/45_Lion_en_Sullias_1.jpg","../image/image_45/45_Lion_en_Sullias_2.jpg","../image/image_45/45_Lion_en_Sullias_3.jpg","../image/image_45/45_Lion_en_Sullias_4.jpg"]},"Consult_chateau_formulairefd74":{"id":"Consult_chateau_formulairefd74","dept":"45","canton":"Amilly","commune":"Lombreuil","nom":"Lombreuil","type":"Château","periode":"XIII-XVIII","histoire":"LOMBREUIL,   dit de la Mothe  Au XVIIe siècle.                                   La MOTHE  Au IXe siècle, le lointain ancêtre de la Mothe se nommait le fief du Bois Fosse en raison d'un ensemble de fossés qui interdisaient l'entrée. Vers 1200 l'édifice fut rattaché au fief voisin de Villoiseau appartenant aux d'Oison. Il prit le nom de la Mothe à ce moment là. Sous Philippe le Hardi, Etienne le Chancelier qui en avait hérité le fit reconstruire et jusqu'à la Révolution, il a porté le nom de La Mothe Chancelier. Au XVIIe siècle, on relève les noms de la famille Aldard, descendants d'Écossais. Au XVIIIe siècle, à la suite d'un incendie ce château appartenait à la famille Bouvier de la Motte qui compta parmi ses membres Jeanne Marie Bouvier de la Motte, la célèbre mystique connue sous le nom de Mme Guyon. Le château de Lombreuil appartint à Jean Baptiste Bouvier, chevalier de Cepoy, et c'est là que naquit en 1774 son fils Jean-Baptiste-Louis qui s'enrôla dans les armées de la République et devint lieutenant de Dragons. En 1805, son fils Georges Edgar Henri naquit a Lombreuil également, la famille partageait sa vie entre le château et sa maison Renaissance de la place Sainte-Croix à Montargis (aujourd'hui place Jules-Ferry), récemment restaurée. Jean Baptiste Louis Bouvier de la Motte hérita du titre de marquis de Cepoy que portait son oncle Guillaume Bouvier et le transmit à sa descendance. Il mourut en 1852.","architecture":"La MOTHE   le château Louis XIII fut complètement reconstruit. Son propriétaire, le chevalier de la Haye y mourut en 1814. Son petit-fils, connu sous le nom de Timon de Cormenin, écrivain politique pamphlétaire, violemment hostile à Louis-Philippe. Le château est élevé dans le plus pur style de la fin du XVIIIe siècle, il comprend un rez-de-chaussée élevé et un étage surmonté d'un toit plat masqué par une balustrade. Un avant-corps central de faible saillie est surmonté d'un fronton triangulaire, encadré par deux colonnes plates surmontées de chapiteaux ioniques.","habitants":"famille Bouvier de la Motte\r\n        \"","divers":"A Lombreuil le château de Lombreuil dit la Mothe","gps":"","images":["../image/image_45/45_Lombreuil_1.jpg","../image/image_45/45_Lombreuil_2.jpg","../image/image_45/45_Lombreuil_3.jpg"]},"Consult_chateau_formulaireb8a8":{"id":"Consult_chateau_formulaireb8a8","dept":"45","canton":"Lorris","commune":"Lorris","nom":"Lorris","type":"Château","periode":"XV-XIX","histoire":"deux châteaux à Lorris dont Lorris et Bignon. et un Km au nord à Noyer la Marrière et la Missandière                                                                                            BIGNON en 1898, Paul Payen, propriétaire du château d'Ouchamps à Thimory, fait construire pour son fils, au cur d'une vaste propriété, cet important bâtiment dont l'architecture et le décor s'inspirent d'un Moyen-Âge de fantaisie: une grosse tour carrée à mâchicoulis et échauguette d'angle, une tourelle hexagonale à toit pointu abritant le vestibule des lucarnes à pinacles dans l'esprit ogival, une entrée protégée d'un dais sculpté et surmonté d'un balcon, et des épis de faîtage.  Tout cela, ajouté à la combinaison asymétrique des masses, donne beaucoup de pittoresque à cet édifice, bâti en pierre de Souppes. Les communs sont également une réalisation architecturale remarquable. Paul Payen fait aussi construire un château d'eau pour alimenter toutes les fermes du domaine. En 1938, Jean Cousin, propriétaire des usines fabriquant la Brillantine rachète le château.                                     MARRIERE  a 1 km au nord à Noyers, est une étonnante construction rappelant un manoir anglais édifié dans les années 1870-1880 par le préfet du département, Joseph Michon, médecin et homme politique. Il a été élève de Littré et de Claude Bernard, amis de son père chirurgien. Nommé préfet du Puy de Dôme après la guerre de 1870 pour contenir les velléités bonapartistes, il se voit confier la préfecture du Loiret en 1877 avec la confiance de Mac-Mahon. Joseph Michon chassant en forêt d'Orléans, décide de se faire bâtir un pavillon de chasse en 1867, il construit la Petite Marrière, construction modeste, mais de style anglais avec tour et terrasses crénelées. En 1876, il fait agrandir le bâtiment initial, toujours dans le même style, tel qu'on peut l'admirer aujourd'hui.","architecture":"LORRIS, construit à la fin du XVe siècle par Jean de Neufvy, seigneur de Langesse, sur la vaste place du Martroi, le château de Lorris est composé d'un rez-de-chaussée, d'un premier étage et d'une toiture à la française, percée de hautes lucarnes richement sculptées. La maçonnerie est en pierre de taille y compris les piédroits, angles, corniches et linteaux mais le plein des murs est en briques dessinant des motifs géométriques en dents de scie alternées au rez-de-chaussée et en losanges entrelacés au premier étage. Les jambages des portes et des fenêtres sont à chapiteaux et décorés de sculptures mêlant des petits amours, des fruits et des chiens. Les fenêtres sont à meneaux, rectangulaires et géminées plein cintre. De chaque côté du toit, deux rampants sont surmontés de deux figures soutenant des écussons. Sur la façade postérieure, une tourelle octogonale renferme un escalier en colimaçon desservant les niveaux. Cette gracieuse construction, typique de l'architecture de la Renaissance en Orléanais, a été restaurée au XIXe siècle par l'architecte René Dusserre. Aujourd'hui hôtel de ville.                                            MISSANDIERE à lest du village, un gite de 20 personnes se trouve dans les corps de bâtiment du château de la Missandière transformé en petit manoir au milieu de 40 ha de terres et de bois.","habitants":"Bignon Famille de Paul Payen\r\n        \"","divers":"deux chateaux à Lorris dont Lorris grav 6   et Bignon grav 1-2-3. et un Km au nords à Noyer la Marrière grav 4 et la Missandière grav-5","gps":"","images":["../image/image_45/45_Lorris_1.jpg","../image/image_45/45_Lorris_2.jpg","../image/image_45/45_Lorris_3.jpg","../image/image_45/45_Lorris_4.jpg","../image/image_45/45_Lorris_5.jpg","../image/image_45/45_Lorris_6.jpg"]},"Consult_chateau_formulaireb849":{"id":"Consult_chateau_formulaireb849","dept":"45","canton":"Neuville-aux-Bois","commune":"Loury","nom":"Loury","type":"Château","periode":"XVIII-XX","histoire":"Trois châteaux dans cette article; Chenayes, Coudreceau, la Roncière.                                                                                                         CHESNAYE, du XVIII-XXe siècle, est une sobre maison des champs construite au XVIIIe siècle. En 1770, la propriété est achetée par Louis Nolleau Procureur au Parlement, puis Lieutenant général du duché prairie de Sully sur Loire, il occupa les fonctions de Président du tribunal révolutionnaire de Neuville en 1792, il est décédé le 5 nivôse en l'an VII à Neuville, époux de Catherine Denoux fille de Magistrats à Paris et petite fille du Procureur au Parlement de Paris. En 1870, pendant la guerre, le château servit de centre mobile de soins à l'armée française, et accueillit de nombreux blessés au combat de Chilleurs en décembre 1870. Une croix, sise dans le bois au sud ouest de la grille de la cour d'honneur du château, mentionne cinq soldats morts de leurs blessures. La façade principale, très simple, est ornée d'un fronton triangulaire. Son entretien est assuré par M. Chabrier de la Saulnière.","architecture":"COUDRECEAU,  du  XVIIIe siècle, simple métairie, ce lieu anciennement désigné Motte-Coudreceau est un temps joint à la seigneurie voisine des Vérelles au XVIe siècle ou bien à celle de Loury au XVIIe siècle. Le Coudreceau prend son autonomie au début du XVIIIe siècle. En 1718, il devient la propriété de François Seurrat, négociant orléanais qui y fit construire une maison de campagne. En 1757, sa fille vend la demeure à son lointain cousin Jacques Isaac Seurrat de La Boulaye, avocat au Parlement, c'est lui qui fait bâtir Le Coudreceau qui, selon un dessin de 1775, n'est pas totalement achevé à cette date. Au XIXe siècle le château appartient par héritage à la famille d'Alès qui le possède encore vers la fin du XXe siècle.                                                                                              La RONCIERE, du XVIe siècle est une très vaste maison formée d'un grand corps de logis central flanqué de deux gros pavillons coiffés d'un toit à la Mansard. Le domaine a une origine très ancienne puisqu'en 1573, Achille et Hector de Morainville furent condamnés et exécutés à la suite du meurtre de M. Méry Lamy, seigneur de Loury. En 1734, Catherine de Longueil céda la Roncière à la marquise de Vieuxpont.","habitants":"Chesnays; famille de Louis Nolleau                                      Coudreceau; François Seurrat                                    Roncière; famille de Catherine de Longueil \r\n        \r\n        \"","divers":"Trois châteaux à Loury; Chenayes grav-1-2, Coudreceau  grav 3-4, la Roncière grav-5","gps":"","images":["../image/image_45/45_Loury_1.jpg","../image/image_45/45_Loury_2.jpg","../image/image_45/45_Loury_3.jpg","../image/image_45/45_Loury_4.jpg","../image/image_45/45_Loury_5.jpg"]},"Consult_chateau_formulairefb3c":{"id":"Consult_chateau_formulairefb3c","dept":"45","canton":"Neuville-aux-Bois","commune":"Loury","nom":"Loury_II","type":"Château","periode":"XVI-XIX","histoire":"Deux châteaux dans cet article; Loury et St-Germains.                    LOURY, au XIVe siècle,  appartenait à la famille des Lamy qui le garda un siècle puis elle échut à la famille de Pellard. En 1646, Jean de Pellard tua le curé du village pendant l'office parce qu'il avait refusé d'offrir l'encens à son fils. Le Roi châtia le meurtrier en faisant détruire le château. Après sa reconstruction, il passa à Jacob Blanquet de la Haye qui l'avait acheté en 1663. Il y demeura peu de temps car il alla servir le roi aux Indes où il fut contraint de capituler (il était amiral et lieutenant général des armées du roi). De retour en France, il partit servir en Lorraine, prit le château de Bouillon avant de périr dans un combat en 1676, avant même d'avoir fini de payer son château qui revint à sa tante, Léonie Bailly, veuve Regnard. Le château passa ensuite aux familles de Rochechouart puis de la Vergne, et appartint en 1900 à M. Lavedan. Le château a été racheté par la commune au XXe siècle et abrite lHôtel de ville; entouré dun beau parc arboré ce site est un point de rencontre des habitants.","architecture":"ST-GERMAINS, est établi en 1844 par vente des bois ayant appartenu à la seigneurie de Saint-Germain, d'où son nom. Vers 1845, Jean Jacques Édouard Bouglé, maire de Longpont et propriétaire du lieu, fait déboiser une partie de forêt pour y construire un château. La date de 1847 a été retrouvée gravée dans le grenier des écuries. L'emplacement de la demeure et du parc ont été établis sur la ligne de partage des eaux Seine-Loire, permettant de creuser la pièce d'eau du parc qui alimente deux canaux. \"Un château avec tourelles élevé sur caves, rez-de-chaussée et deux étages avec mansardes. Parc avec pelouse, pièce d'eau, rivière anglaise et canaux formant clôture. Communs comprenant serres, écuries, remises et habitations de domestiques et de garde. Jardin potager. Chalet à l'entrée de la propriété, comprenant habitation de maître avec communs pour maison de garde, logements de chiens et de chevaux\", peut-on lire lors de la vente de 1876. Vers 1892, il est la propriété de MM. Lubin père et fils. Le second, artiste-peintre, a laissé ses uvres au musée de Pithiviers.","habitants":"Loury; famille des Lamy                                                                    St-Germains; Famille de Jean Jacques Édouard Bouglé\r\n        \r\n        \"","divers":"Deux châteaux à  Loury dont celui de Loury-grav-2  et St-Germains grav 1.","gps":"","images":["../image/image_45/45_Loury_II_1.jpg","../image/image_45/45_Loury_II_2.jpg"]},"Consult_chateau_formulairedc5d":{"id":"Consult_chateau_formulairedc5d","dept":"45","canton":"Malesherbes","commune":"Malesherbes","nom":"Malesherbes","type":"Château","periode":"XIV-XVII","histoire":"MALESHERBES, en 1383 Jean de Montagu seigneurs des Bois-Malesherbes secrétaire de Charles V à sa mort  la seigneurie passe à sa fille Jacqueline qui épouse  Jean Malet de Graville grand maître de France, leur petit-fils  Louis  amiral de France proches des rois Charles VII et Louis XII. A la mort de l'amiral de Graville  en 1516,  Malhesherbes  a été apporté en dot par Anne de Graville à son cousin Pierre de Balzac d'Entragues gouverneur d'Orléans. De nombreux souverains y séjournèrent : de Charles V à Louis XIV, sans oublier Henri IV qui y signa le 1er octobre 1599 une promesse, par laquelle il s'engageait à épouser Henriette d'Entragues. à la mort de François Balzac d'Entragues en 1613, le château est acquis en 1718 par le chancelier Guillaume de Lamoignon  et le restaura. Son fils  Chrétien-Guillaume de Lamoignon, est le plus illustre possesseur du château  émigre au début de la Révolution mais regagne la france en 1792,  il accepte la défense de Louis XVI devant la convention arrêté et exécuté, fut guillotiné avec sa fille et ses petits enfants, en 1794.   La comtesse et le comte de Nicolay en hérite est le possède toujours.","architecture":"MALESHERBES, édifier au XIV et XVIIe siècle présente actuellement deux ailes en briques et pierres du XVIIIe siècle et trois tours d'angles médiévales, il subsiste trois tours munies de leurs hourds entre lesquelles s'organisent deux ailes perpendiculaires. Jusqu'au début du XIXe siècle, quatre ailes ponctuées de quatre tours fermaient une cour centrale selon les mêmes dispositions que le château-fort d'origine. Le corps principal, construit de 1720 à 1724, est l'oeuvre de Pierre de Vigny. Certains décors intérieurs sont dus à Robert de Cotte, premier architecte du roi. L'aile en retour a fait l'objet d'une surélévation et d'un traitement des façades dans le style du corps principal, pour harmoniser l'ensemble et obéir à la rigueur classique du début du XVIIIe siècle. Les dépendances s'élèvent autour de ce qui fut autrefois la basse-cour, communiquant avec le château par un pont-levis encadré de deux tourelles. Elles sont constituées de greniers ou grange à champarts, édifiés à la fin du Moyen-Age et remaniés au XVIe (porche) et XVIIIe siècle (bulbe de la tour d'escalier); de la conciergerie ou maison du receveur qui abritait également le capitaine de la garde, dont la façade sur le parc fut remaniée en 1722 ; de la chapelle castrale édifiée à la fin du XVe siècle à laquelle fut adjoint un vaisseau plus vaste au début du XVIIe siècle.","habitants":"Guillaume de Lamoignon\r\n        \"","divers":"Malesherbois   48° 17' 14\" nord, 2° 24' 57\" est","gps":"","images":["../image/image_45/45_Malesherbes_1.jpg","../image/image_45/45_Malesherbes_2.jpg","../image/image_45/45_Malesherbes_3.jpg","../image/image_45/45_Malesherbes_4.jpg"]},"Consult_chateau_formulairec26f":{"id":"Consult_chateau_formulairec26f","dept":"45","canton":"La Ferté-Saint-Aubin","commune":"Marcilly-en-Villette","nom":"Marcilly_en_Vilette","type":"Château","periode":"XIX","histoire":"quatre châteaux dans cet article; Cerf-bois, Chapelle,  Houssaies, et des Tourelles.                                                                                              Du CERF-BOIS, au début du XIXe siècle, il n'y avait au Cerf-Bois qu'une rustique maison de maître typiquement solognote. Sa propriétaire en était, dit-on, Mlle Alix, qui habitait le plus souvent à Férolles. En 1826, Étienne de Mainville qui faisait alors restaurer le château d'Alosse, agrandit sa propriété en achetant les terres du Cerf Bois. Mais les frais de restauration d'Alosse ayant été très onéreuses, Étienne de Mainville dut vendre une grande partie de son domaine et se retira à sa propriété du Cerf Bois. En 1848, il commença la construction du château actuel, mais faute d'argent, le chantier dura jusqu'en 1858 et fut terminé par son fils. En 1878, la propriété fut vendue à Albert Pinçon, qui créa en 1891 le parc et fit creuser la pièce d'eau. Son uvre fut continuée par son gendre, le baron de Labeau, qui a transmis le domaine à sa fille, Mme Valdelièvre. Ses enfants l'habitent toujours.                                                                  HOUSSAYE, construit dans le quatrième quart du XIXe siècle, appartient à la famille Arvengas depuis le début du XXe siècle. La façade sur jardin possède une belle galerie en pan de bois, élévation à travées, un étage carré ; étage de comble: toit en pavillon ; toit à longs pans ; pignon couvert :en  ardoise","architecture":"CHAPELLE, du XIXe siècle, il y avait là une ancienne place forte seigneuriale, dont la plate-forme et les fossés étaient encore visibles au XIXe siècle. En 1514, Guillaume Le Jart est seigneur des Chapelles. Au XVIIe siècle, la terre est aux Guéribalde et au XVIIIe siècle elle passe aux mains de la famille de Tolède. La demeure est saisie après une banqueroute et rachetée par le marquis de Coué, seigneur de la Ferté. En 1840, Hippolyte Pinçon, marié avec sa cousine, Esther Driard qui a reçu en dot le château, fait construire l'édifice actuel, à l'emplacement de l'ancien château. Il s'attache également à mettre en valeur les terres du domaine, en les marnant et en y plantant des pins.                                                                                                                    DES TOURELLES, sur le bois dit de Saint-Aignan ou des Coudreaux qu'il a acheté en 1852, le propriétaire parisien Julien Coiffier reconstruit une ferme qu'il avait précédemment bâtie le long de l'ancien chemin de Bourges (de Marcilly à Olivet) et implante à côté le château des Tourelles. Julien Coiffler a été maire de la commune de Marcilly de 1877 à 1888. Julien Ratié, pharmacien à Paris, rachète en 1926 le domaine qui comprend des terres, des vignes et un bois avec un beau parc, une roseraie et des espaliers d'arbres fruitiers. C'est également une magnifique propriété de chasse. Après la mort de Julien Ratié le domaine est vendu en 1955 .","habitants":"Cerf-Bois;, Étienne de Mainville                                      Houssaye; famille Arvengas,                                              Chapelle;famille de Tolède.                                 Tourelles;Julien Coiffier \r\n        \r\n        \"","divers":"quatre châteaux  à Marcilly en Vilette, Cerf-bois grav-1-2, Chapelle grav-3-4,  Houssaies grav-6-7, et des Tourelles grav-5.                                                                                                 Cerf-Bois 47° 45' 56\" nord, 2° 05' 25\" est                                                      Chapelle  47° 47' 00\" nord, 2° 03' 33\" est                                 Houssaye  47° 45' 43\" nord, 2° 01' 44\" est","gps":"","images":["../image/image_45/45_Marcilly_en_Vilette_1.jpg","../image/image_45/45_Marcilly_en_Vilette_2.jpg","../image/image_45/45_Marcilly_en_Vilette_3.jpg","../image/image_45/45_Marcilly_en_Vilette_4.jpg","../image/image_45/45_Marcilly_en_Vilette_5.jpg","../image/image_45/45_Marcilly_en_Vilette_6.jpg"]},"Consult_chateau_formulaire4642":{"id":"Consult_chateau_formulaire4642","dept":"45","canton":"La Ferté-Saint-Aubin","commune":"Marcilly-en-Villette","nom":"Marcilly_Villette","type":"Château","periode":"XIV-XVII-XIX","histoire":"Deux châteaux dans cet article celui d'Alosse et de Bruel.        ALLOSSE, le premier seigneur d'Alosse fut un certain Guillaume Cramoy. A partir du XIVe siècle on sait qu'Alosse appartenait à la famille de la Ferté qui le posséda plus de trois siècles, en 1427 on trouve Jehan de la Ferté, seigneur d'Alosse, qui participa semble-t il, à l'expédition envoyée pour secourir Montargis assiégée par les Anglais. Après la guerre de Cent Ans,  Jean de la Ferté le succède à Alosse. L'un d'eux est désigné sous le nom de Jean de Meung ou de la Ferté-Avrain (la Ferté-Beauharnais) du fait de son adoption par Jean de Meung et de Jacquette Garreau, son épouse. A partir de 1640, on trouve à Alosse Nicolas de Fortbois, chevalier. En 1698, la terre d'Alosse est achetée par François Rousseau de la Motte. Son fils, capitaine de carabiniers mourut à Alosse âgé de 88 ans. Ses héritiers vendirent le domaine à Louis Bénigne Dehais-Gendron. En 1831, il fut acheté par Étienne de Mainville qui en modifia l'aspect et qui combla les douves, mais, complètement ruiné, il ne put terminer son uvre et fut obligé de vendre la propriété dont il ne garda que la partie qui forme aujourd'hui le Cerf Bois. Le baron d'Ailly s'en rendit acquéreur en 1852 et y mena grand train. En 1907 le domaine passa à son petit-fils, le comte Joseph de Brosse, qui loua le château pour  la chasse. En 1934, le château fut mis en vente et à partir de ce moment commença un morcellement qui n'a fait que se poursuivre, grâce à M. de Mainville qui s'y ruina, une symétrie qu'il n'avait jamais eue.","architecture":"ALLOSSE, construit en briques losangées, coiffé de hautes toitures, hérissé de tourelles et de poivrières, la demeure est le type même du château de Sologne. Si les restaurations du XIXe siècle lui ont ajouté quelques fâcheux appendices, tels les escaliers, les balustres ou l'épis de faîtage, il faut convenir que les transformations de cette époque redoutable ont conservé la plus grande partie de l'ancien manoir tel que l'avait représenté  Ch. Pensee. Les douves ont été supprimées, les baies sont modernes, mais les lucarnes de la façade nord ont été conservées et le château, enfin terminé.                                                                                                  BRUEL, est une maison d'antique fondation. Son nom, dérivé du vieux mot français breuil, désigne un clos, un bois entouré de haies. La famille qui portait ce nom y demeura jusqu'à la fin du XIIIe siècle. Son propriétaire, Louis Michel de Chemillard émigra pendant la Révolution, et la demeure fut vendue comme bien national. La terre fut morcelée et le château en grande partie détruit. Il fut cependant racheté et restauré vers 1824 par M. Hippolyte Cournol, écrivain, aujourd'hui oublié, qui le vendit en 1833 au comte de Murat d'Estang, originaire du Dauphiné. En 1917, ses descendants vendirent la demeure à M. Henri Brinon, industriel, qui s'attacha à remettre la propriété en état. Les terres furent reboisées, les étangs remis en eau et le château consolidé. Son uvre fut continuée et parachevée par son gendre, M. Henri Deschamps, agent de change à Orléans qui l'a transmis à son fils Patrice Deschamps.","habitants":"Alosse;  famille de la Ferté                                                          Bruel;  Louis Michel de Chemillard\r\n        \"","divers":"Deux châteaux à Marcilly-en-Villette  celui d'Alosse grav-1-2 et de Bruel  grav-3 .                                                                    Allosse 47° 45' 58\" nord, 2° 03' 59\" est                                        Bruel 47° 48' 27\" nord, 2° 03' 04\" est","gps":"","images":["../image/image_45/45_Marcilly_Villette_1.jpg","../image/image_45/45_Marcilly_Villette_2.jpg","../image/image_45/45_Marcilly_Villette_3.jpg","../image/image_45/45_Marcilly_Villette_4.jpg"]},"Consult_chateau_formulaire32e0":{"id":"Consult_chateau_formulaire32e0","dept":"45","canton":"Pithiviers","commune":"Marsainvilliers","nom":"Marsainvilliers","type":"Château","periode":"XVIe-XVIIIe","histoire":"ESSARTS,  pas d'information historique, propriété privée  inscription aux M.H. par arrêté du 27 juillet 2006, modifié par arrêté du 21 mai 2007.","architecture":":Les ESSARTS, le corps de bâtiment est d'origine médiévale, il est flanqué de deux tours à bossages conservées sur la façade postérieure du corps de logis principal. A la fin du XVIe ou au début du XVIIe siècle, ajout d'un corps de galerie à arcades et bossages troués un sur deux, il est flanqué de tours carrées couvertes en pavillon. Dans la seconde moitié du XVIIIe siècle, construction d'ailes parallèles dans l'alignement des tours carrées, en commençant à l'est par celle qui contient la chapelle. L'aile symétrique a été ajoutée, puis deux ailes en retour d'équerre, entourant la cour d'honneur.  Au rez-de-chaussée du bâtiment central, galerie en arcades côté entrée. Du côté du parc, le château est simplement flanqué à ses extrémités par deux tours rondes qui se présentent symétriquement. Base des murs : bossages au niveau des tours, corniche en pierre, lucarnes.  L'ensemble, complété par un vaste corps de ferme s'articulant autour de deux cours quadrangulaires, est disposé dans un parc paysager.","habitants":"Seigneur local\r\n        \"","divers":"Château des Essarts à Marsainvilliers","gps":"","images":["../image/image_45/45_Marsainvilliers_1.jpg","../image/image_45/45_Marsainvilliers_2.jpg","../image/image_45/45_Marsainvilliers_3.jpg","../image/image_45/45_Marsainvilliers_4.jpg"]},"Consult_chateau_formulaire183f":{"id":"Consult_chateau_formulaire183f","dept":"45","canton":"La Ferté-Saint-Aubin","commune":"Ménestreau en Villette","nom":"Menestreau_Vilette","type":"Château","periode":"XVIII-XIX","histoire":"Cinq châteaux dans cet article; Ciran, Mazuray, Louan, Gd-Bois et-Vilette.                                                                                                              GRAND-BOIS,  en briques, avec pans de bois à l'étage, présente ce style \"villa normande\" en vogue à l'époque de sa construction, à l'extrême fin du XIXe siècle. Les pignons couverts avec avancées du toit sont également caractéristiques de ce style néo-régional des années 1900.                                                                                                               CIRAN,  du XIXe siècle, une de ses plus belles vitrines. Le domaine est agrémenté d'un parc aux cerfs, d'une volière, d'un marais ornithologique et d'une ferme. Le parc du château constitue un véritable arboretum composé de trente essences d'arbres différents. Les plus remarquables sont centenaires : douglas, châtaignier, séquoïa géant, cèdre du Liban, et le plus ancien, un chêne pédonculé dénommé \"le chêne de Jeanne d'Arc\", serait âgé de 500 à 600 ans. L'Association pour \"la Fondation Sologne\", qui en est propriétaire depuis 1977, gère et entretient ce domaine dans un équilibre entre la nature et le travail des hommes. Le domaine du Ciran s'est fixé pour objectif de participer à la conservation et à la mise en valeur du milieu naturel.                                                                                                                MAZURAY, situé à un point culminant de la Sologne, ce château en brique avec pierre en remplissage a été construit au XIXe siècle, vers 1882, puis modifié par la suite. L'un des bâtiments, à l'origine couvert d'une terrasse a été surmonté d'un toit à longs pans percé d'une haute lucarne néo-Renaissance.","architecture":"LOUAN, du XIXe siècle,  Henri du Verne reconstruisit le château vers 1885, sur un site plus ancien, en gardant l'ancienne plate-forme rectangulaire fossoyée.  Le maître d'uvre ayant emprunté le vocabulaire ornemental de la Renaissance afin de l'adapter aux matériaux du pays. Les écuries et les remises sont disposées de part et d'autre de l'entrée avec deux tourelles aux angles du front d'entrée. La basse-cour est repoussée au-delà des fossés, tout autour des douves pleines d'eaux vives de toute beauté. Les douves sont anciennes, mais le château est récent. Seulement, ce que la nouveauté de la construction n'a pas changé, c'est le magnifique site où elle se trouve. En effet si vous arrivez de plain-pied au château du côté cour, il n'en va pas de même sur la façade opposée : là on est étonné de voir que ces douves et ces eaux vives sont à l'extrême pointe d'un plateau, sur une hauteur qui, par trois étages successifs de terrasses gazonnées, descend au fond de la vallée.                                                                                                       VILETTE, le nouveau château de Villette, construit au XVIIIe siècle, tourne le dos à l'ancien lieu seigneurial de Villette, qu'il relègue à quelques centaines de mètres avec les bâtiments de la ferme. À défaut de pouvoir s'approprier matériellement le site et de l'intégrer dans le parc le nouveau château s'approprie le toponyme voisin attaché au lieu seigneurial, Villette, qui remplace l'ancien toponyme du \"Puet\", jugé peu évocateur.","habitants":"Dseigneurs locaux\r\n        \"","divers":"Quatre châteaux à   Ménestreau en Villette  Gav 1-2      Ciran grav 3-4-5, Mazuray, louan grav 6-7, Gd-Bois et-Vilette.","gps":"","images":["../image/image_45/45_Menestreau_Vilette_1.jpg","../image/image_45/45_Menestreau_Vilette_2.jpg","../image/image_45/45_Menestreau_Vilette_3.jpg","../image/image_45/45_Menestreau_Vilette_4.jpg","../image/image_45/45_Menestreau_Vilette_5.jpg","../image/image_45/45_Menestreau_Vilette_6.jpg","../image/image_45/45_Menestreau_Vilette_7.jpg"]},"Consult_chateau_formulairec3cc":{"id":"Consult_chateau_formulairec3cc","dept":"45","canton":"Meung sur Loire","commune":"Meung sur Loire","nom":"Meung_sur_Loire","type":"Château","periode":"XII-XVIII-XIX-XX","histoire":"A Meung  dans cet article, la Lilardière, Marais , Mouche  et Meung.                                                                                                   LILARDIERE, du XVIII-XXe siècle  était appelé les Lilas, demeure d'architecture classique est composée d'un corps de logis à cinq travées, à un étage carré et un étage de comble éclairé par de hautes lucarnes en pierre, élégamment coiffées de frontons cintrés et leurs piédroits sont ornés de moulures. Le bâtiment principal est prolongé de deux ailes en rez-de-chaussée, avec toits à la Mansart. Les chaînages et les encadrements des baies sont en pierre de taille, disposées en parpaings et boutisses. On peut voir dans le parc une pittoresque tour crénelée abritant le château d'eau, Le château Les Lilas, racheté en 1978, a été transformé en une maison de retraite médicalisée.  \r\nMARAIS La seigneurie des Marais possédait dès le Moyen Âge le moulin  (construit vers 1064), puis au XVIe siècle, les moulins de Farou et de Pantin, sur les Mauves. Le premier seigneur connu des Marais est Euverte Hatte (qui fit construire à Orléans l'hôtel Euverte-Hatte, Centre Charles-Péguy). Le domaine resta dans la famille jusque vers 1670, époque à laquelle il passe à Claude Joly, chantre et chanoine de Notre-Dame de Paris. En 1712, la seigneurie échoit à Charles François d'Arsac. En 1769, elle appartient à Pierre Sinson de Sévestreville, seigneur de Bel Air. Il existait aux Marais un château féodal, dont restent deux grosses tours carrées. Au XVIIe siècle, une demeure de plaisance remplace le château, avec une chapelle consacrée en 1682 par Mgr de Coislin. La chapelle et la demeure sont toujours là dans un parc aménagé à la fin du XIXe siècle et traversé par la rivière les  deux Mauves.","architecture":"MEUNG sur LOIRE,  est la résidence des Evêques d'Orléans, seigneurs de Meung, qui furent maîtres d'ouvrage de toutes les campagnes de construction. Le premier château, adossé à la Collégiale a été construit pour Manassès de Garlande, évêque de 1146 à 1185. Manassès de Seignelay évêque de 1207 à 1221 fait construire à quelques mètres du château primitif un nouveau château. C'est un grand corps rectangulaire cantonné d'une tour à chaque angle, trois sont encore visibles, la quatrième a été noyée dans les adjonctions du XVIIIe siècle. Au début du XVIe siècle, le corps du XIIIe a été doublé et une tour d'entrée (l'emplacement du pont-levis est encore visible). On doit la façade du XVIIIe siècle, sur le parc, à Fleuriau d'Armonville (évêque de 1716 à 1733) qui fit dresser une nouvelle façade postérieure et commanda d'importants agrandissements, puis Louis Sextius de Jarente de la Bruyère, évêque de 1758 à 1788. Exilé à Meung en 1768 après la disgrâce de Choiseul, il fit ajouter la chapelle et le vestibule, dus sans doute à Louis François Trouard, grand maître actif à la Cathédrale d'Orléans de 1765 à 1773 et un pavillon de jardin (attribué à Louis-Denis Le Camus, architecte du duc de Choiseul à Chanteloup, près d'Amboise) classement par arrêté du 26 janvier 2004. Propriété de madame G. Douchement.                                                                       MOUCHE, du XVIIIe siècle, chambres d'hôtes de Jean-Jacques et Milène Perrody.","habitants":"Evêques d'Orléans\r\n        \"","divers":"A Meung sur loire , la Lilardière grav-1, Marais Grav-2 , Mouche grav-3-4  et Meung  grav-5-6-7  Mariau grav-8                                                 Mariau 47° 49' 45\" nord, 1° 43' 52\" est                                       Meung  47° 49' 24\" nord, 1° 41' 39\" est","gps":"","images":["../image/image_45/45_Meung_sur_Loire_1.jpg","../image/image_45/45_Meung_sur_Loire_2.jpg","../image/image_45/45_Meung_sur_Loire_3.jpg","../image/image_45/45_Meung_sur_Loire_4.jpg","../image/image_45/45_Meung_sur_Loire_5.jpg","../image/image_45/45_Meung_sur_Loire_6.jpg","../image/image_45/45_Meung_sur_Loire_7.jpg","../image/image_45/45_Meung_sur_Loire_8.jpg"]},"Consult_chateau_formulairec0af":{"id":"Consult_chateau_formulairec0af","dept":"45","canton":"Montargis","commune":"Montargis","nom":"Montargis","type":"Forteresse","periode":"XII-XVI","histoire":"MONTARGIS,    vers 1020, de l'union de ces familles, naît Hildegarde Hérou, c'est la première châtelaine de Montargis portant ce titre. Elle épouse Jocelin de la famille des comtes de Sens. En 1069, Jocelin, devenu veuf, épouse en seconde noces Isabelle de Monthléry, naîtra un fils, Miles puis ce dernier aura un fils, Rainaud. En 1139, la fille de Rainaud, Elisabeth, épouse Pierre, fils cadet du Roi Louis VI le Gros. En 1188, Pierre II, son fils cède le château au roi Philippe Auguste, comme dans tous les chateaux de cette époque il fait fortifié, en 1190, une \"Grosse Tour\". En 1328 Philippe de Valois devient roi sous le nom de Philippe VI et garde le château pour lui. Si Jean II le Bon y réside peu, son fils Charles V le Sage, réalise la rénovation de la grande salle. En 1792, l'édifice passe au domaine national. Le chancelier du Duc, l'amiral de La Touche-Tréville, achète une partie du château. En 1896 les filles de Chardon vendent la partie actuelle à Mme de Clerval. En 1897, Mme de Cintré, achète ces bâtiments et les restaure pour y abriter l'Institution Saint-Louis. En 1919, elle en fait don à l'abbé Lane, supérieur de l'Institution. En 1934, l'abbé Lane le cède à la SCI du château de Montargis pour créer une association pour sa sauvegarde.","architecture":"MONTARGIS, cette ancienne forteresse royale, bâtie par la famille de Courtenay et agrandie par Charles V, fut le théâtre de la première victoire française sur lAnglais durant la terrible Guerre de Cent ans. Devenue résidence luxueuse sous Renée de France, fille dAnne de Bretagne, elle sest ensuite endormie jusquà subir les affronts de la Révolution et ses suites. Les écuries, une poterne, des remparts, des caves, des jardins Renaissance reconstitués et une église enterrée vous permettront de découvrir ce lieu unique et vous plonger dans lhistoire française et européenne.le château royal construit au XIIe siècle, dont il ne reste le châtelet d'entrée agrandi au XIIIe siècle, des fragments de l'enceinte, des terrasses, réaménagé et modifié au XVe siècle de cette époque  datent les bâtiments d'habitations en équerre.  Les premières tours du château entourent maintenant le donjon et la chapelle Sainte-Marie, c'est la résidence des Courtenay France. En 1810, il est entre les mains de destructeurs, acheté par Masse et Pichot, Chardon et Trémier, il devient une carrière de pierre. En 1840, il ne reste presque plus rien du château royal de Montargis sauf le lieu du gouvernement et la tour carrée.","habitants":"famille de Courtenay \r\n        \"","divers":"Château de Montargis","gps":"","images":["../image/image_45/45_Montargis_1.jpg","../image/image_45/45_Montargis_2.jpg","../image/image_45/45_Montargis_3.jpg","../image/image_45/45_Montargis_4.jpg","../image/image_45/45_Montargis_5.jpg","../image/image_45/45_Montargis_6.jpg"]},"Consult_chateau_formulaire8516":{"id":"Consult_chateau_formulaire8516","dept":"45","canton":"Beaune-la-Rolande","commune":"Montbarrois","nom":"Montbarrois","type":"Château","periode":"XVII-XVIII","histoire":"deux châteaux dans cet article; la Javelière et la Motte-Poirier. la JAVELIERE, avant la Révolution,  appartenait à Pélerin de la Buxière, \"seigneur de Nibelle, Saint-Sauveur et en partie de Beaumoulin\". Médecin, homme politique et propriétaire de plantations de cannes à sucre à St-Domingue. En 1787, il fut délégué à l'Assemblée provinciale d'Orléans puis il fut élu le 25 mars 1789 à la constituante sur les listes du Tiers-État. Proche de Philippe Égalité, il signe le serment du jeu de Paume. Son fils Etienne Marie Pélerin de la Javelière vécut dans la propriété une existence de hoberau, se distinguant par ses idées \"ultra\". En 1887, l'édifice devint propriété de Casati de Casatis, juriste et historien, auteur d'ouvrages savants sur les étrusques. Casati, influencé par le retour du style troubadour, (le clocher de Beaune-la-Rolande tout proche venait d'être reconstruit par Eugène Viollet-le-Duc) voulut donner une touche médiévale à la Javelière et adjoignit au corps de logis les quatre curieuses tourelles d'angle en encorbellement à effet exclusivement décoratif qui ornent la façade Nord. Propriétaire du château de Courcelles près de Boynes, il l'avait orné également de ces mêmes éléments décoratifs. Casati meurt à la Javelière en 1919. Les propriétaires actuels, M. et Mme Patrick Masure  l'acquis en 1992.","architecture":"JAVELIERE,  selon la tradition, l'édifice aurait été construit vers 1630. Si le nom de son premier propriétaire est resté inconnu, il semble bien qu'il ait dû faire face à quelques difficultés financières car la construction est restée inachevée. En effet, le corps central du logis devait être flanqué de deux ailes en retour. Seule l'aile Est a été achevée. A l'ouest la construction s'est arrêtée à 1,5 m de hauteur, les fondations ont été complétées par une petite orangerie Masure se consacrent à la restauration du parc longtemps négligé mais agrémenté maintenant d'un étang et à la création d'une collection d'arbustes et d'arbres d'ornement.                                                                                                MOTTE POIRIER, construit au XVIIIe siècle,  a été vendu le 18 août 1767 par Jean Baptiste Baubert à Madame Marie Louise Fêtu de la Sablonnière. Il existe bien, dans le parc, une motte boisée, d'une quinzaine de mètres de diamètre, entourée d'un fossé rempli d'eau. L'aile orientale date de la deuxième moitié du XVIIIe siècle, aujourd'hui restaurée et remaniée. La famille Paré  en fut la dernière propriétaire privée dans le première moitié du XXe siècle. Aujourd'hui le château appartient à la Ville d'Orly (Val de Marne).","habitants":"Javelière; Etienne Marie Pélerin de la Javelière                              Motte-Poirier;  Jean Baptiste Baubert \r\n        \"","divers":"deux châteaux à Montbarrois la Javelière grav 1-2  et la Motte Poirier grav 3-4.","gps":"","images":["../image/image_45/45_Montbarrois_1.jpg","../image/image_45/45_Montbarrois_2.jpg","../image/image_45/45_Montbarrois_3.jpg","../image/image_45/45_Montbarrois_4.jpg"]},"Consult_chateau_formulaire416c":{"id":"Consult_chateau_formulaire416c","dept":"45","canton":"Châtillon-Coligny","commune":"Montbouy","nom":"Montbouy","type":"Château","periode":"XV-XVII-XVIII-XIX-XX","histoire":"Six châteaux à Montbouy, Bennes, les Giraults, Mousseaux, Chenevriere et  Puyseau.  Salleneuve.                                                                                     BENNES, le corps de logis de la ferme actuelle constitue le logis primitif du château de Bennes du XVe siècle, certaines baies ont été remaniées au XVIIIe siècle, la grange de la ferme date certainement du XVIIIe siècle, un deuxième corps de logis est élevé  dans la deuxième moitié du XVIIIe siècle, à quelque distance du premier, il est agrandi en 1911 par la construction d'un corps accolé selon la plus grande longueur et la chapelle, bâtie en retour d'équerre par Franconi, propriétaire au début du XIXe siècle, se trouve prise entre les deux bâtiments.                                                                                                                           GIRAULTS,  près de l'ancien château des Giraults disparu et connu par la tradition orale, on construit avant 1831  une grande ferme dont la maison est convertie en orphelinat par M. Dupuy vers 1820 - 1830; une chapelle est bâtie vers 1870, dans le style néo-gothique, pour servir à l'orphelinat; M. Milon achète les Giraults vers 1900 et fait construire une grande villa néo normande, les travaux sont réalisés entre 1905 et 1908.                                                                                                  MOUSSEAUX, le colombier est tout ce qui subsiste de l'édifice du XVIIIe siècle ; le corps de logis principal est de la deuxième moitié du XVIIIe siècle et a été repris au XIXe siècle ; les baies des communs et du colombier ont été remaniées à la même époque, à un étage carré et étage de comble,  à  toit conique;  toit à longs pans brisés; croupe brisée ; pignon couvert,  en  tuiles plates.                                                                                                            Salleneuve,  pas d'information historique.","architecture":"BENNES,  était alimenté en eau par un château d'eau, le remplissage était assuré par une machine à vapeur, on a arrêté son fonctionnement vers 1965 lors de l'adduction d'eau. Le logis primitif présente un escalier à vis dans une tour hors-oeuvre; la grange est à charpente sur poteaux et murs gouttereaux bas ; la chapelle comprend un escalier à vis dans une tour en demi hors-oeuvre; ardoise sur le corps du XXe siècle.                                                                                                  CHENEVRIERE,  de nouveaux bâtiments ont été bâtis à Chenevières sans doute vers la fin de la première moitié du XVIe siècle. Au XVIIe siècle, les actes et les représentations graphiques s'accordent pour décrire un lieu à nouveau en ruine. L'actuel château a été construit à la fin du XVIIIe siècle à l'emplacement de l'ancien édifice. Il présente une façade très simple de cinq travées dont l'axe central est marqué par la porte d'entrée et un fronton percé d'une lucarne. La façade postérieure donne sur le canal de Briare et le Loing au nord-est.                                                                                                                                                                                                                        PUYSEAU, est à cheval sur les communes de Montbouy et de la chapelle sur Aveyron. Située au cur de la campagne, derrière un beau portail ouvragé en fer forgé, cette résidence, d'une élégance toute classique, est composée d'un corps de logis, daté de la deuxième moitié du XVIIIe siècle, à un étage carré et un étage de combles éclairés par des lucarnes, recouvert de tuile plate. Deux pavillons symétriques, en légère saillie, prolongent le bâtiment. Un discret décor de brique encadre les baies.","habitants":"Resposables locaux\r\n        \"","divers":"Six châteaux à Montbouy, Bennes  grav-1, les Girault grav-2, Mousseaux grav-3, Chenevriere grav-6 et  Puyseau grav-7.  Salleneuve grav 4-5.","gps":"","images":["../image/image_45/45_Montbouy_1.jpg","../image/image_45/45_Montbouy_2.jpg","../image/image_45/45_Montbouy_3.jpg","../image/image_45/45_Montbouy_4.jpg","../image/image_45/45_Montbouy_5.jpg","../image/image_45/45_Montbouy_6.jpg","../image/image_45/45_Montbouy_7.jpg"]},"Consult_chateau_formulairefd9a":{"id":"Consult_chateau_formulairefd9a","dept":"45","canton":"Pithiviers","commune":"Pithiviers","nom":"Montguignard","type":"Château","periode":"XIII-XIX","histoire":"MONTGUIGNARD, quelques vestiges ont été conservés des constructions antérieures au bâtiment actuel. L'entrée principale présente des avancées protégées par deux tours décapitées.","architecture":"MONTGUIGNARD, ces restes de fortifications sont du XVIe siècle. La porte, flanquée d'une poterne, est une ouverture qui peut être datée du XIVe siècle, formée d'un arc en tiers-point à arêtes aigües, renforcée en arrière par un arc plein cintre. Les bâtiments situés à l'est conservent une pièce carré qui sert de cave. L'accès se fait par un escalier qui s'ouvre à l'extérieur par une porte en anse de panier, aux arêtes abattues par des chanfreins qui pourrait dater du XVIe siècle. Cet escalier aboutit à une première cave couverte d'une voûte en berceau. De la paroi sud-est de cette cave part un couloir étroit, voûté en berceau, qui aboutit à une autre pièce. Cette dernière comporte, au centre, une colonne ronde avec chapiteau à crochet, d'un type classique au XIIIe siècle. Sur le tailloir carré viennent aboutir les huit nervures des voûtes, quatre doubleaux et quatre diagonaux. L'ensemble des voûtes forme ainsi quatre secteurs carrés, chacun d'eux voûté en croisée d'ogives. Du XIIIe siècle également peut dater une amorce d'escalier qui se détache à l'angle nord de la paroi nord-est et qui, après un coude rapide, semble se diriger vers le nord-ouest. Il s'agit sans doute de la salle basse d'un ancien donjon carré. La première construction de ce donjon serait antérieure au XIIIe siècle. Au XIIIe siècle, cette salle basse fut voûtée et la porte fut seule conservée.","habitants":"Seigneur local\r\n        \"","divers":"A Pithiviers le Viei le château de Montguignard","gps":"","images":["../image/image_45/45_Montguignard_1.jpg","../image/image_45/45_Montguignard_2.jpg","../image/image_45/45_Montguignard_3.jpg"]},"Consult_chateau_formulaireb401":{"id":"Consult_chateau_formulaireb401","dept":"45","canton":"Beaune-la-Rolande","commune":"Montliard","nom":"Montliard","type":"Château","periode":"XVIII","histoire":"Trois châteaux dans c
