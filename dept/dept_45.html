t rare, construite au XIXe siècle à l'ombre du château comme dépendance industrielle, ne subsiste que le séchoir.                                                                                                                    MONTGERLON, du XIXe siècle, ce charmant château, de style néo-Renaissance, a été construit en deux étapes: le logis d'origine, ne comprenant que deux travées, était flanqué de chaque côté par une tourelle ronde en encorbellement à toit en poivrière. Un peu plus tard, les propriétaires, la famille Kolb-Bernard (grands industriels du Nord) envisagent d'agrandir la demeure. L'édifice d'origine est alors doublé d'un bâtiment presque identique, relié par une belle tourelle hexagonale. Cette construction en brique et pierre présente de nombreux éléments architecturaux et décoratifs d'inspiration Renaissance, très en vogue en Sologne à la fin du XIXe siècle : les motifs de briques noires en losanges et en résilles, les encadrements de fenêtres, les baies géminées du rez-de-chaussée réunies par une accolade.","architecture":"MONTISAMBERT, du XIXe siècle était jadis une importante seigneurie, à laquelle était inféodé le château voisin de La Matholière qui s'appelait alors le Petit-Monttzambert. Pendant des siècles, la seigneurie appartint aux du Lac de Montizambert alliés aux du Lac de Chamerolles. À la fin de l'Ancien Régime le château n'avait pas grande allure, il était environné de fossés en eau de toutes parts et l'accès aux appartements se faisait par un pont-levis qui ouvrait dans la cuisine. M. du Lac décida alors de reconstruire un château plus élégant et plus confortable. Mais la mort l'empêcha de mener à bien ce projet, et ses deux fils ne souhaitèrent pas le poursuivre. Le château, tel que nous le voyons aujourd'hui, a été reconstruit par Ferdinand Ravot, au XIXe siècle. Il a gardé une partie de ses douves à l'avant du château, enjambées par un pont dormant. L'ancienne plate-forme carrée reste bien visible, avec ses deux pavillons d'angle. Le corps de bâtiment en brique à un étage carré et un étage de combles, éclairé par trois lucarnes, est flanqué de deux pavillons asymétriques couverts de toits à pans brisés. À la Belle Époque, les châteaux de La Matholière et Montizambert ont été, pendant un temps, réunis en une seule propriété appartenant aux Raguenet de Saint-Albin.","habitants":"baron de Morogues.                                                          famille Kolb-Bernard   M. du Lac  Ferdinand Ravot\r\n        \"","divers":"trois châteaux à Jargeau ; la Caille grav-1   Montgerlon grav-2, Montisambert grav-3.","gps":"","images":["../image/image_45/45_Tigy_II_1.jpg","../image/image_45/45_Tigy_II_2.jpg","../image/image_45/45_Tigy_II_3.jpg"]},"Consult_chateau_formulaire4021":{"id":"Consult_chateau_formulaire4021","dept":"45","canton":"Jargeau","commune":"Jargeau","nom":"Tigy_Jargeau","type":"Château","periode":"XVIII-XIX","histoire":"quatre  châteaux à Jargeau; dont Chérupeaux, Gué-Robert, Matholière  et Molaine.                                                                    CHERUPEAUX, du XIXe siècle est niché au cur dun vaste parc de dix hectares aux arbres centenaires, entouré par 360 hectares de forêts et de neuf étangs. C'est un beau château de la fin du XIXe siècle que son propriétaire actuel a meublé dans le style Napoléon III qui est celui de sa construction. Les communs typiquement solognots, ont été aménagés par M. Nielsen en autant de maisonnettes rurales pittoresques où l'éditeur bien connu des Presses de la Cité reçoit les auteurs. Chambres d'hôtes.                                                                                                                       GUE-ROBERT, du XIXe siècle un important pavillon à quatre faces et à pans coupés s'élevait à l'extrémité ouest de cet élégant château en brique. Ce bâtiment, qui avait été ajouté en 1887, a aujourd'hui disparu, rendant ainsi au château son allure originelle. Sur la façade, côté parc, figurent de gracieux médaillons en terre cuite à l'antique. Le Gué Robert a appartenu à M. d'Escures, puis au baron Gaspard Gourgaud, aide de camp et mémorialiste de Napoléon, puis à ses descendants. Un trésor archéologique a été découvert sur cette propriété en 1831: une figurine en terre cuite représentant une femme assise tenant un enfant dans chaque bras, ainsi qu'une médaille romaine à l'effigie de Marc Aurèle.","architecture":"MATHOLIERE, du XVIII-XIXe sièclele logis central du château de La Matholière a été édifié en 1743. C'est durant le troisième quart du XIXe siècle qu'on démolit les dépendances adjacentes en pan de bois pour accoler au logis deux ailes symétriques couvertes en pavillons. A partir de 1866, la tour d'angle et le colombier sont détruits pour laisser place à une galerie en terrasse abritant l'orangerie. Ce bâtiment est terminé par une chapelle néo-gothique dans le goût romantique. À la Belle Époque, les deux châteaux de La Matholière et de Montizambert appartenaient à la même famille Raguenet de Saint-Albin.                                                                                                     MOLAINE, a été établi au XVIIIe siècle sur l'emplacement d'un manoir féodal.  On y accède par une belle grille en fer forgé du XVIIIe siècle. L'élégante façade de briques roses et l'ardoise des toits se reflètent dans un étang. Sous la Restauration, le domaine appartient au vicomte Adrien de Grémion, chevalier de Saint Louis, ancien capitaine de cavalerie, brigadier des gardes du corps du roi, 1er adjoint au maire d'Orléans à partir de 1816, et maire de Tigy de 1826 à 1830. Un peu à l'écart, dans le parc, on peut voir une ravissante chapelle de style néo gothique édifiée par M. de Laage de Meux en 1866, elle offre de nombreuses analogies avec la chapelle de La Matholière, sur la même commune, et pourrait être attribuée au même architecte.","habitants":"Chérupeaux; M. Nielsen                                                              Cué-Robert;  M. d'Escures.                                                    Martholière ; famille Raguenet de Saint-Albin.                                 Molaine ; vicomte Adrien de Grémion\r\n        \"","divers":"quatre  châteaux à Jargeau ; dont Chérupeaux, Gué-Robert grav-1, Matholière grav-2  et Molaine.","gps":"","images":["../image/image_45/45_Tigy_Jargeau_1.jpg","../image/image_45/45_Tigy_Jargeau_2.jpg"]},"Consult_chateau_formulaireb81b":{"id":"Consult_chateau_formulaireb81b","dept":"45","canton":"Jargeau","commune":"Jargeau","nom":"Vannes_Cosson","type":"Château","periode":"XIX","histoire":"Trois châteaux dans cet article; Fraisières, Montambert et Prépisson.                                                                                                     FRAISIERES,  du XIXe siècle,   ce château, en briques, flanqué d'un petit pavillon présentant un décor géométrique de briques, a été bâti en 1846. Il a gardé son faîtage de toiture en plomb. En 1870, il appartenait à M. Hanguillard, maire de la commune de Vannes sur Cosson sous le Second Empire. Puis, le domaine est devenu la propriété de Mme veuve Rousse Lacordaire, qui y avait reconstitué son salon chinois de Pékin. En effet son mari avait été, de 1896 à 1926, directeur des postes chinoises, situation considérable qui lui a permis de vivre dans l'intimité de l'empereur de Chine qui le recevait à sa table. Ses trois enfants sont nés en Chine. On peut voir dans le parc une ancienne glacière en briques et, dans la ferme attenante appelée le Petit Voisin, un remarquable pigeonnier en briques.                                                                                       PREPINSON,  du XIXe siècle,  Prépinson s'écrivait autrefois le Pré de Pinçon. Construit vers 1844, ce château se trouve dans un site remarquable, dominant un étang de 10 hectares. Il est de style néo-Renaissance, avec un losangé de briques rouges et noires, bien dans l'esprit solognot. Vers 1875, il appartenait à M. Xavier Pothain, ancien maire de Suvy-aux-Bois. De 1940 à 1944, il abrita une école publique de plein air.","architecture":"MONTAMBERT, édifié dans le dernier quart du XIXe siècle, le château se situe non loin du lieu d'une légende que nous rappellent Huet et Pigelet dans leurs Promenades pittoresques: \"par la route de Vienne en Val on rencontre un affluent du Cosson, le ru des Quatre Vents. Non loin de sa source à droite les toitures du château de Montambert se distinguent au milieu des arbres, et le ru, modeste et sinueux s'écoule lentement à travers bois jusqu'au moment où il rejoint le Cosson, à Pont-Meschiens. C'est là que le seigneur d'Alosse, guidé par le chien de La Rougerie, sauva 4 enfants égarés pendant une tourmente de neige dans l'hiver 1354. Un pont fut bâti pour perpétuer le souvenir de ce mémorable événement. Montambert se situe sur une hauteur, en haut de la côte du Racinat à l'ouest. Le château est une belle demeure d'allure classique, dans un beau parc. De sa terrasse, on a une belle vue sur toute la Sologne. En 1874, la propriété appartenait à la famille de Charsonville.","habitants":"Châteauneuf; famille de la Vrillière.                                             Aigrefin ;Jean de Beaurain\r\n        \"","divers":"Trois châteaux à Jargeau Fraisières  grav-1-2, Montambert grav-3 et Prépisson grav-4-5.","gps":"","images":["../image/image_45/45_Vannes_Cosson_1.jpg","../image/image_45/45_Vannes_Cosson_2.jpg","../image/image_45/45_Vannes_Cosson_3.jpg","../image/image_45/45_Vannes_Cosson_4.jpg","../image/image_45/45_Vannes_Cosson_5.jpg"]},"Consult_chateau_formulaire49d6":{"id":"Consult_chateau_formulaire49d6","dept":"45","canton":"Amilly","commune":"Amilly","nom":"Varenne_Amilly","type":"Château","periode":"XIV-XIX","histoire":"La VARENNE, ce délicieux château, qui mire ses toitures dans les douves qui l'entourent de toutes parts entra dans l'Histoire vers l'an 1300, comme propriété de Pierre de Monceau qui avait pour charge l'administration de la forêt de Paucourt (ancien nom de la forêt de Montargis). Sa famille conserva Varennes jusqu'aux alentours de 1440, date à laquelle le château passa à la famille Le Maire, qui assura longtemps les mêmes fonctions. C'est Robert Le Maire et ensuite son fils Pierre qui restaurèrent vers 1460 le château mis à mal par les anglo-Bourguignons qui occupèrent Montargis de 1431 à 1438. Puis la famille se ramifia dans la région en de nombreuses branches et l'un des descendants, Guillaume de Montgareux vendit, en 1742, la propriété aux Bénédictines de Montargis qui le gardèrent jusqu'à la Révolution en négligeant beaucoup son entretien. En 1791, vendu comme bien national, il es acquis par la marquise de Salis-Samade épouse du lieutenant des \"32 gardes Suisses\" qui, le 14 juillet 1789, avaient défendu la Bastille. Leur nièce épousa le baron Michel de Triqueti propriétaire du château du Perthuis.","architecture":"VARENNE, en 1857, le baron Henri de Triqueti restaura le château en respectant les lignes anciennes. Ce sculpteur injustement oublié fut l'auteur des portes monumentales en bronze de l'église de la Madeleine à Paris. Il avait donné la Varennes à sa fille Blanche de Triqueti, épouse d'Edward Lee Schilde, neveu du général américain Lee, chef des armées sudistes. Pour elle, il avait sculpté au-dessus de la porte d'entrée un bas-relief représentant une \"biche prise dans le lacet de l'Amour\" daté de 1868. Elle tenait un salon littéraire à Paris, dont Pierre Loti était le fleuron, et elle recevait à Varennes, écrivains et poètes. Elle mourut en 1886 et son époux se remaria à la fille d'un diplomate de vieille famille auvergnate Eugène de Sartiges qui, en 1834, avait dirigé au Pérou une expédition pour retrouver la ville précolombienne Inca de Machu Picchu. Depuis, le château est resté dans la même famille et appartient aujourd'hui au comte Emmanuel de Sartiges.","habitants":"le baron Henri de Triqueti \r\n        \r\n        \"","divers":"Château de la Varenne à Amilly","gps":"","images":["../image/image_45/45_Varenne_Amilly_1.jpg","../image/image_45/45_Varenne_Amilly_2.jpg"]},"Consult_chateau_formulaire60a9-2":{"id":"Consult_chateau_formulaire60a9-2","dept":"45","canton":"Bellegarde","commune":"Ladon","nom":"Versaudière","type":"Château","periode":"XVIII-XIX","histoire":"VERSAUDIERE,  du XIXe siècle, d'après la tradition, M. Albert Grenet, qui travaillait pour les Eaux et Forêts d'Orléans, aurait rajeuni cette maison en 1838. Sa tombe se trouve au cimetière du bourg.","architecture":"VERSAUDIERE, malgré l'invasion galopante de l'urbanisme, le château qui se trouve à la sortie du bourg reste présent dans sa verdure. La demeure de style du XIXe siècle est une grande bâtisse à deux niveaux de plan rectangulaire, série de lucarnes sur comble coiffée d'une toiture à la Mansart. Les fenêtres sont égayées par une alternance de brique et pierre. Les abords de ce grand édifice sont parfaitement entretenus.","habitants":"M. Albert Grenet\r\n        \"","divers":"A Ladon le château de la Versaudière","gps":"","images":["../image/image_45/45_Versaudi%c3%a8re_1.jpg","../image/image_45/45_Versaudi%c3%a8re_2.jpg"]},"Consult_chateau_formulaire7224":{"id":"Consult_chateau_formulaire7224","dept":"45","canton":"Jargeau","commune":"Vienne en Val","nom":"Vienne_en_Val","type":"Château","periode":"XVIII-XIX","histoire":"Trois châteaux dans cet article; Prateaux, Pré-Fontaine, Violière et la Motte.                                                                                                                    PRATEAUX, construit au XVIIIe siècle, ce château occupe l'emplacement d'un édifice antérieur, dont on reconnaît bien la plate-forme toujours entourée de douves en eau. Les angles de cette plate-forme portent une petite tourelle surmontée d'un garde-corps. Le château primitif se situait le long d'un antique chemin, d'origine gallo-romaine, qui longeait la Loire en bordure de coteau, mais hors d'atteinte des crues. Le château actuel dont le corps de logis, très classique, est coiffé d'un gracieux clocheton, a appartenu au XVIIIe siècle à la famille orléanaise des Grosteste: Louis Marin Grosteste, écuyer, est seigneur des Prateaux en 1770. Pendant la Révolution, le château des Prateaux est habité par M. Petau, membre de l'Assemblée nationale.                                                                                     VIOLIERE  du XIXe siècle, le château de La Violière, élégante demeure, dont le corps de logis est orné d'un fronton et prolongé de deux pavillons, a été construit dans les années 1880. Il appartenait au début du XXe siècle à un célèbre avocat à la cour d'appel de Paris, maître Henri Barboux (1834-1910), considéré comme l'une des gloires du barreau français. Élu à l'Académie française en 1907, il avait été en particulier l'avocat de Sarah Bernhardt dans une affaire qui opposait la tragédienne à l'administration de la Comédie-Française.","architecture":"La MOTTE, le château de la Motte a été édifié en 1886 à l'emplacement d'un ancien château démoli en 1820. On peut encore voir dans le parc une cave voûtée en briques avec une porte en plein cintre, qui remonte à l'ancien château. Le château, tel qu'on peut le voir aujourd'hui, présente un corps de logis à cinq travées, flanqué d'un bâtiment plus ancien recouvert d'un toit à la Mansart. Christophe Sauvageon, prieur curé de Sennely de 1675 à 1710, a laissé un manuscrit décrivant la vie des Solognots au milieu desquels il a vécu pendant 35 ans. Il évoque les domaines de Sologne comme ce premier château de la Motte: \"les grands seigneurs de la province, gentilshommes, charmés de l'agréable variété de la Sologne qui forme le plus délicieux paysage du monde l'été, y ont construit de belles maisons entre lesquelles on n'a pu décider qui l'emporte sur les quatre, Sully, La Motte, La Ferté-Senneterre et La Ferté-Imbaut\".","habitants":"Prateaux; Famille des Grosteste                                                      Violère; maître Henri Barboux\r\n        \"","divers":"A Jargeau  le château de Prateaux grav-1, Pré-Fontaine grav-2 et Violière grav-3.","gps":"","images":["../image/image_45/45_Vienne_en_Val_1.jpg","../image/image_45/45_Vienne_en_Val_2.jpg","../image/image_45/45_Vienne_en_Val_3.jpg"]},"Consult_chateau_formulaired7c2":{"id":"Consult_chateau_formulaired7c2","dept":"45","canton":"Sully-sur-Loire","commune":"Viglain","nom":"Viglain","type":"Château","periode":"XVII-XVIII-XIX","histoire":"Dans cet article le château de Beauregard, de Béon, de Baffou et Buffière.                                                                                                       BEAUREGARD, dès le XIVe siècle, Beauregard est construit sur une motte carrée entourée de larges fossés en eau. Elle est accessible par un pont-levis. En 1557, le château comprend trois corps de bâtiments. Les trois pavillons d'angle carrés remontent à 1630. Les Pâris sont seigneurs de Beauregard vers 1557. Rose Pâris épouse Jean Pochon, avocat au Parlement de Paris, fils de François Pochon, écuyer originaire du Maine venu s'établir à Orléans. Les Pochon de Beauregard occuperont la demeure jusqu'en 1791. Tous se prénommeront Hector, ils auront les titres les plus divers : conseillers du Roi, commissaires des guerres et trésoriers généraux des finances. L'un d'eux sera lieutenant d'une compagnie du régiment de Picardie, tandis qu'un autre sera gouverneur de Port français à Saint Domingue. En 1791, à la mort du dernier Pochon, le château de Beauregard et les terres de la famille sont vendus à un bourgeois d'Orléans, M. Barbat du Plessis, seigneur de Vitry-aux-Loges. A la fin du XIXe siècle, au notaire de Chateauneuf.                                                                                                BEON,  au lieu-dit Le Béon est une belle demeure construite au XVIIIe siècle et reprise au siècle suivant. La propriété a conservé le site de la demeure seigneuriale connue dès le XIVe siècle et dont l'assise est inscrite à l'intérieur de fossés en eau. Au XVIIIe siècle, le château du Béon appartenait au vicomte de lEpinière, lieutenant-colonel de cavalerie et chevalier de Saint-Louis, il fut chargé de mission en Italie par Louis XVI. Il est larrière grand-père du maréchal Lyautey.","architecture":"BAFFOU, du XIXe siècle , sur ordre de Louis XIV, le château de Baffou sera rasé et les arbres du domaine seront coupés à hauteur dhomme, le château actuel, propriété privée bâti sous la Restauration, présente lexemple type des résidences solognotes de cette époque (château à trois corps, maison de garde, longère, chenil, ferme) construites toutes de briques orangées du pays, serties de pierres de taille blanches de Touraine, couvertes dardoises en forme décailles.                                                                                                                BUFFIERE, du XIXe siècle après la guerre de Cent Ans, la région intéresse les gentilshommes et les bourgeois enrichis qui acquièrent des terres en Sologne. Au XVIe siècle, des routes se créent et des manoirs sont édifiés, mais les guerres de Religion amènent le trouble dans la région. Au XIXe siècle, de nombreuses propriétés sont utilisées pour la chasse. C'est le cas pour La Buffière, où Perronnet, marchand de bois à Saint-Benoît-sur-Loire, après avoir acquis un domaine forestier de 300 hectares, édifia vers 1830 le relais de chasse actuel qu'il transmit à ses enfants et petits enfants. Le lieu est aujourd'hui spécialisé dans la chasse des petits gibiers.","habitants":"Beauregard; famille de Jean Pochon                                              Béon ;  vicomte de lEpinière\r\n        \"","divers":"A Viglain le château de Beauregard grav-1, de Béon, de Baffou grav-2-3 et Buffière grav-4.                                              Baffou  47° 44' 43\" nord, 2° 18' 24\" est                                               Beauregard 47° 43' 22\" nord, 2° 17' 50\" est                                         Buffière  47° 43' 51\" nord, 2° 20' 13\" est","gps":"","images":["../image/image_45/45_Viglain_1.jpg","../image/image_45/45_Viglain_2.jpg","../image/image_45/45_Viglain_3.jpg","../image/image_45/45_Viglain_4.jpg"]},"Consult_chateau_formulairec46e-2":{"id":"Consult_chateau_formulairec46e-2","dept":"45","canton":"Amilly","commune":"Villemandeur","nom":"Villemandeur","type":"Forteresse","periode":"XIII-XVI-XVIII","histoire":"Trois châteaux dans cet article; Lisledon,  Plateville et Villemandeur.                                                                                      LISLEDON, Le château féodal, devenu l'abri des reîtres après la bataille de Vimory en 1587, fut détruit par Henri de Guise. Henri de Birat, écuyer et premier valet de garde-robe du roi, racheta les ruines et le fit reconstruire entre 1613 et 1626 et transforma son nom en Birague. Au XIXe siècle, il fut restauré par Adolphe Cochery ministre des Postes et sénateur du Loiret. Les tourelles ont été refaites dans le style troubadour, alors en vogue, et la tourelle d'escalier a été ajoutée. Puis il passa à son fils Georges Cochery député du Loiret et ministre des finances de 1896 à 1898. Il y mourut en 1914. Le domaine de Lisledon connaîtra alors plusieurs propriétaires plus intéressés par lexploitation des bois que par le château lui-même. En 1927, le Docteur Léopold Kollitsch achète Lisledon et restera jusquà son décès le dernier résident du château. La propriété connaîtra encore deux propriétaires: la famille Douzon et la Sté pharmaceutique de lEgic qui utilisera le château pour entreposer ses archives.\r\nPLATTEVILLE, au XVIIIe siècle, il appartenait aux Noirat de Platteville, puis à Lefèvre des Barres qui le céda en 1788 à l'amiral de Latouche Tréville, membre de la Société de Cincinnatus, devenu surintendant des domaines du duc d'Orléans (le futur Philippe Égalité). Cette acquisition permit au comte de la Touche d'être élu comme député de la noblesse pour le baillage de Montargis en 1789. Plus tard, le château de Platteville passa entre les mains du baron Fain, secrétaire de Napoléon, puis du général, comte de Salles qui s'illustra à la guerre de Crimée. Il appartient aujourd'hui au comte Sourdeau de Beauregard Platteville.","architecture":"VILLEMANDEUR  construit au XIIIe siècle. Il en reste le mur d'enceinte, les créneaux, les tourelles, les fossés et une partie du corps de logis. Ce château, proche de la ville de Montargis, Guillaume de Souplainville, seigneur, figure parmi les grands baillis de Montargis. Sa fille Annie fut enlevée par Lancelot du Lac, seigneur de Chamerolles ce qui donna lieu à un procès. La demeure passa ensuite à la famille de Robert le Fort, huguenot qui s'y retrancha, ce qui entraîna la destruction de la maison, bientôt rebâtie à partir des ruines. En 1683, Anne-Marie Le Fort épousa un seigneur poitevin Pierre de Chamborlan issu d'une famille de militaires. Son petit-fils André Claude, colonel d'un régiment de Hussards, devint marquis. Il émigra en 1792 et sa fille vendit le château à Chrysostome Rousseau. Ses descendants y demeurent toujours. M. Meltzheim, ingénieur agronome, et son épouse Geneviève Rousseau entreprennent des travaux de cette demeure en 1959.                                                                                       PLATTEVILLE, est construit sur une cour entièrement entourée d'eau. L'entrée se fait par une imposante poterne flanquée de tours à poivrières. Ses origines remontent à la guerre de Cent Ans, mais le château lui même est une construction moderne.","habitants":"Lisledon; Adolphe Cochery                                        Villemandeur; Chrysostome Rousseau.                            Platteville;  Noirat de Platteville\r\n        \"","divers":"A Villemandeur château de Villemandeur de Lisledon grav-4-5-6 et de Platteville grav 1-2-3","gps":"","images":["../image/image_45/45_Villemandeur_1.jpg","../image/image_45/45_Villemandeur_2.jpg","../image/image_45/45_Villemandeur_3.jpg","../image/image_45/45_Villemandeur_4.jpg","../image/image_45/45_Villemandeur_5.jpg","../image/image_45/45_Villemandeur_6.jpg","../image/image_45/45_Villemandeur_7.jpg"]},"Consult_chateau_formulairecd7c":{"id":"Consult_chateau_formulairecd7c","dept":"45","canton":"Bellegarde","commune":"Villemoutiers","nom":"Villemoutiers","type":"Forteresse","periode":"XIX","histoire":"VILLEMOUTIERS,   du XIXe siècle   Le village tire son nom d'un ancien prieuré qui subsista jusqu'à la Révolution. Ce prieuré dépendait de l'abbaye de Ferrières et constituait un refuge pour les moines en cas d'invasion. Il fut détruit en 1558 pendant les guerres de religion. Après la bataille de Vimory en 1587, les reîtres lui donnèrent le coup de grâce. A la Révolution, il fut acheté par un ancien moine du nom de Patrault qui était un mathématicien connu, et avait enseigné à l'école de Brienne où il avait eu le jeune Bonaparte parmi ses élèves. En 1841, l'ancien prieuré fut racheté par le peintre Mailand qui le transforma en une résidence d'agrément.","architecture":"VILLEMOUTIERS, il aménagea la demeure dans le style gothique tel qu'on le concevait à l'époque. Il y a ajouté deux tourelles dont l'une en encorbellement récupérée dans une maison de Paris, démolie au moment du percement de la rue Rivoli. Son carrelage, ses voûtes minuscules constituent l'élément le plus intéressant de l'édifice dont le style troubadour ne plaît pas toujours. En revanche, le parc verdoyant, traversé de ruisseaux, est un lieu plein d'agrément.","habitants":"le peintre Mailand\r\n        \"","divers":"A Villemoutiers le château de Villemoutiers","gps":"","images":["../image/image_45/45_Villemoutiers_1.jpg","../image/image_45/45_Villemoutiers_2.jpg"]},"Consult_chateau_formulaireb118":{"id":"Consult_chateau_formulaireb118","dept":"45","canton":"Châteauneuf-sur-Loire","commune":"Vitry-aux-Loges","nom":"Vitry_aux_Loges","type":"Château","periode":"XV-XIX-XX","histoire":"Deux château dans cet article; la Motte, Plessis et Vaux.                            MOTTE, du XIXe siècle, au creux de la vallée, près du canal d'Orléans, le château de La Motte fut reconstruit en 1866 sur les bases d'un vieux château-fort. Au XVIIe siècle, le propriétaire est Abraham Nouël, seigneur de Saint Denis, le château de la Motte appartenait au début du XVIIIe siècle à Jacques d'Estrades, seigneur de la Motte Vitry, conseiller du Roy, contrôleur provincial de l'artillerie. De cet ancien château, les quatre tours d'angles et la façade postérieure ont été conservées et dans le parc le colombier. Aujourd'hui c'est une agréable demeure dont l'entrée est ornée de deux tours.                                                                   VAUX;  du XVe siècle,de plan quadrangulaire, fut édifié au XVe siècle. Il est constitué de quatre corps de logis qui encadrent une grande cour d'honneur. Le corps principal du château est de plain pied, et la partie gauche, qui aurait été bâtie après la guerre de Cent Ans, repose sur quatre belles caves. Le château a conservé trois tours cylindriques d'origine. La cour d'honneur est entièrement close à l'est par les remparts et à l'ouest par les douves qui traversent une partie du terrain, c'est le témoin le mieux conservé de l'architecture ancienne et de la présence seigneuriale à Vitry. Il conservera son pont-levis jusqu'au XVIIe siècle,  transformé en chambre d'hôtes.","architecture":"PLESSIS du XIV -XXe siècle,  il comprend une longue bâtisse terminée à chaque extrémité par une tourelle. Il a été récemment restauré avec un goût parfait par Jacques d'Estrades. Le lieu remonte aux temps les plus reculés et, depuis Pépin le Bref, Robert le Pieux, Louis Le Débonnaire, Louis VI, et de nombreux rois séjournèrent à cet endroit qui commandait la forêt d'Orléans ou forêt des Loges. Au XIVe siècle, la prévôté de Vitry fut transformée en châtellenie et releva du duché d'Orléans dont la forêt prit le nom. Cette forêt fut ravagée par les Anglais en 1346, puis en 1428. Le château du Plessis appartenait au XVIIe siècle à M. de la Vrillère, puis il passa aux Picot, barons de Dampierre, aux de Ferrières, aux d'Estrades et de Chauvelin. Pendant la Révolution il appartenait à M Barbot. Parmi les autres seigneurs de Vitry au XVIe siècle, on note Pierre de Hanelles, Philippe et Jean de Bridiers et la famille de Ruzé au XVIIIe siècle.","habitants":"Motte; Jacques d'Estrades                                                             Plessis; M. de la Vrillère\r\n        \r\n        \r\n        \"","divers":"A Vitry-aux-Loges château de la Motte grav de1 à 5 Plessis grav-7-8-9, vaux grav-6.","gps":"","images":["../image/image_45/45_Vitry_aux_Loges_1.jpg","../image/image_45/45_Vitry_aux_Loges_2.jpg","../image/image_45/45_Vitry_aux_Loges_3.jpg","../image/image_45/45_Vitry_aux_Loges_4.jpg","../image/image_45/45_Vitry_aux_Loges_5.jpg","../image/image_45/45_Vitry_aux_Loges_6.jpg","../image/image_45/45_Vitry_aux_Loges_7.jpg","../image/image_45/45_Vitry_aux_Loges_8.jpg","../image/image_45/45_Vitry_aux_Loges_9.jpg"]},"Consult_chateau_formulaire6126-3":{"id":"Consult_chateau_formulaire6126-3","dept":"45","canton":"Pithiviers","commune":"Vrigny","nom":"Vrigny","type":"Château","periode":"XV","histoire":"VRIGNY, au XIIIe siècle, on y trouve Hervé du Mez, fils du maréchal Nicolas du Mez. Au XVe siècle, le domaine est possédé par la famille de Boutisau dont les descendants le vendirent au début du XVIe à Charles de la Motte. En 1579, Jacques de Morainville achète le château, mais sa fille Renée le revend à Sébastien d'Archambault, contrôleur Général de l'Artillerie. En 1645, Jean de Gueribalde, huguenot, achète Vrigny, mais ses filles le vendent en 1665 à Louis Richer, seigneur de l'Isle, auditeur à la Chambre des Comptes. C'est lui qui reconstruit le château. Le pavillon central est son uvre. Sa fille Jacqueline avait épousé Claude Raymond, seigneur d'Arfeuil, conseiller à la cour des Aydes. C'est leur fille Jeanne-Louise Raymond qui épousa Alexandre du Hamel, seigneur de Denainvilliers, en 1731. En 1743, Jeanne-Louise d'Arfeuil avait fait don de la demeure à son beau-frère Henri Duhamel du Monceau, inspecteur général de la Marine, membre de l'Académie des Sciences. Henri Duhamel était un travailleur infatigable et en avait oublié de se marier, il avait en fait adopté ses neveux, fils de sa sur Angélique qui avait épousé monsieur Pierre de Fougeroux. Ce sont eux qui reprirent son nom et ses armoiries par autorisation Royale. A Vrigny, Armand de Fougeroux, ingénieur de la Marine, membre de l'Académie royale des Sciences, continua la tradition et fut à l'origine de la famille des propriétaires actuels qui conservent pieusement les souvenirs et les manuscrits de leurs prestigieux ancêtres.","architecture":"VRIGNY, admirablement situé au milieu de grands bois, est entièrement entouré de douves  a gardé dans son ensemble l'aspect qu'il avait au XVIIIe siècle, bien qu'en 1868,logis central de deux niveaux sur soubassements lucarnes sur  toits en croupe et fronton triangulaire sur trois travées saillantes, les héritiers ont surélevés les ailes des pavillons d'un niveau supérieur.","habitants":"Jacques de Morainville\r\n        \"","divers":"Château de Vrigny; 47° 49' 39\" nord, 2° 49' 12\" est","gps":"","images":["../image/image_45/45_Vrigny_1.jpg","../image/image_45/45_Vrigny_2.jpg"]},"Consult_chateau_formulaire15d5":{"id":"Consult_chateau_formulaire15d5","dept":"45","canton":"Pithiviers","commune":"Yèvre le châtel","nom":"Yèvre_le_Chatel","type":"Vestiges","periode":"XIII","histoire":"YEVRE le CHATEL,  le 1er seigneur d'Yèvre le Châtel fut, vers l'an 1000, Arnoul, neveu de l'évêque d'Orléans qui fit construire un premier château-fort. Un peu plus tard, on trouve Foulques, vicomte du Gâtinais.  En 1120, il céda sa terre à Louis VIIe Le Gros. Puis le château échut à André de Bourgogne dont la fille le porta en dot en 1204 à Amaury de Montfort, connétable de France, qui le reconstruisit sous sa forme actuelle et le transmit à ses descendants. Confisquée au profit de la couronne, cette terre fut ensuite transformée en apanage pour les ducs d'Orléans. La forteresse joua un rôle très important pendant la guerre de Cent Ans, parmi ses capitaines, on doit citer Bouchard de Mornay qui périt à Azincourt le 25 octobre 1415, puis François de Grignaux qui fut remplacé par un moine chevalier de l'ordre de Saint-Jean de Jérusalem: Nicolas de Giresme, qui harcela sans arrêt les Anglais.  Propriété  de l'association des amis de la ville.","architecture":"YEVRE le CHATEL, cette forteresse, édifiée sous Philippe Auguste, a pour plan un losange de 30 mètres de côté, les ruines imposantes de cette puissante forteresse constituent l'une des curiosités les plus remarquables des environs de Pithiviers. Situées sur un promontoire dominant la vallée de la Rimarde pendant des siècles, ce château-fort abandonné, a représenté l'un des plus importants bastions du pouvoir Royal en Orléanais, cantonné de tours aux quatre angles. Les tours rondes ont une dizaine de mètres de diamètre, les courtines ont trois mètres d'épaisseur et sont hautes de 15 mètres environ. Les salles intérieures des tours sont hexagonales, couvertes de voûtes ogivales et percées de meurtrières. Les murs d'enceinte sont munis, dans leur maçonnerie, d'arcs de décharge allant d'une tour à l'autre, destinés à annuler toute tentative de sape. L'entrée, haut placée était précédée par un pont-levis qui s'abattait sur une pile de maçonnerie. L'entrée était pourvue d'une herse, d'un assommoir et d'une deuxième porte. Le logis n'était plus un donjon, mais une vaste maison adossée à la courtine ouest. Les vestiges d'une deuxième enceinte se retrouvent à la porte défendue par deux tours trapues qui complètent cet extraordinaire ensemble.  Classement  par liste de 1862.","habitants":"Amaury de Montfort\r\n        \r\n        \"","divers":"Château de Yèvre le  Châtel","gps":"","images":["../image/image_45/45_Y%c3%a8vre_le_Chatel_1.jpg","../image/image_45/45_Y%c3%a8vre_le_Chatel_2.jpg","../image/image_45/45_Y%c3%a8vre_le_Chatel_3.jpg","../image/image_45/45_Y%c3%a8vre_le_Chatel_4.jpg","../image/image_45/45_Y%c3%a8vre_le_Chatel_5.jpg","../image/image_45/45_Y%c3%a8vre_le_Chatel_6.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','45 — Loiret'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
