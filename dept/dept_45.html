le. Le comte Henri de Beaupréau est conseiller municipal de Neuville-aux-Bois à partir de 1871, en 1876 il emploie une dizaine de personnes dans sa propriété. Il meurt dans son château en 1899. Jusqu'en 1915, la comtesse de Beaupréau en est la propriétaire. La vaste demeure, flanquée d'un haut pavillon avec toit à l'impériale, est aujourd'hui occupée par un institut médico-éducatif.","habitants":"Comte de la Luzerne                                                                         Rives famille de Beaupréau\r\n        \r\n        \r\n        \"","divers":"Deux châteaux à Chambon la Forêt; Luzerne grav-1-2            la Rive au Bois","gps":"","images":["../image/image_45/45_Chambon_la_Foret_1.jpg","../image/image_45/45_Chambon_la_Foret_2.jpg"]},"Consult_chateau_formulaire2adb":{"id":"Consult_chateau_formulaire2adb","dept":"45","canton":"Briare","commune":"Champoulet","nom":"Champoulet","type":"Château","periode":"XVIII-","histoire":"CHAMPOULET « auparavant, la propriété appartenait à la famille Lescure, fondateur de la Société d'emboutissage de Bourgogne puis Ólafur Ólafsson est arrivé au milieu des années 2000. Il reste extrêmement discret et on ne le voit pas souvent. Je rencontre régulièrement son assistante, qui s'exprime très bien en français, mais Monsieur Ólafsson ne s'exprime qu'en anglais, comme j'ai pu m'en apercevoir lorsqu'il m'avait invité pour un thé, il y a deux ans, en présence de son épouse », explique Yolande Ganne.","architecture":"CHAMPOULET, à  quelques encablures de l'imposante bâtisse, les passants peuvent déambuler autour de l'étang, propriété des Voies navigables de France, et avoir une vue plus précise des lieux en empruntant le sentier communal.\r\n« Les jardins du château sont très bien entretenus par des ouvriers présents toute l'année. Monsieur Ólafsson m'avait confié passer de plus en plus de temps à Champoulet, en présence de ses enfants et petits-enfants », ajoute la première magistrate.","habitants":"Monsieur Ólafsson\r\n        \"","divers":"Château de Champoulet","gps":"","images":["../image/image_45/45_Champoulet_1.jpg","../image/image_45/45_Champoulet_2.jpg","../image/image_45/45_Champoulet_3.jpg","../image/image_45/45_Champoulet_4.jpg"]},"Consult_chateau_formulaire60e9":{"id":"Consult_chateau_formulaire60e9","dept":"45","canton":"Lorris","commune":"Varennes Changy","nom":"Changy","type":"Château","periode":"XVIII-XIX","histoire":"Trois châteaux à Varennes Changy dont celui de Changy  de Solin et de Courtigis.                                                                                               CHANGY; connut maintes périodes troublées en changeant souvent de propriétaires. Sous Napoléon, lorsque Charles Tristan de Montholon-Sémouville, comte d'Empire et chambellan de l'Empereur, en devint propriétaire en 1813, il eut à cur d'engager des travaux que le château n'avait pas connu depuis la Révolution et le départ, en 1803, de Jean-Baptiste de Villemor, son probable bâtisseur: ses propriétaires successifs, M. Seneau, marchand de biens, puis M. Malherbe, se limitant à l'entretien. Mais les travaux ne furent jamais achevés, ni payés pas plus que l'achat du domaine ne fut totalement réglé, faute de ressources, le château passa en 1837 à Napoléon Hector Soult, marquis de Dalmatie, dont la famille poursuivra l'amélioration de la propriété jusqu'à sa vente en 1920, date à laquelle, après un peu plus de 80 ans d'éclat, elle fut vendu à M. Jacques Mathieu Bergougnan, d'où elle passa à sa fille. On pense que les deux pavillons et la partie centrale du château reçurent leur second étage à l'occasion de travaux de restauration qui suivirent un incendie en 1847.","architecture":"A quatre kilomètres au sud aux  Moulinet sur Solin,                        SOLIN, cette élégante demeure présente un corps de bâtiment principal à trois travées flanqué de deux corps de logis en retrait, le tout couvert de toits à longs pans, l'ensemble surplombant l'un des plus beaux étangs de la région. Ses propriétaires, la famille Bellecourt, ont mis plusieurs années à terminer cette demeure qui passa successivement entre les mains de commerçants parisiens et d'aristocrates locaux avant d'être racheté en 1968 par ses propriétaires actuels.                                                                                  A deux K.M. au nord à Oussoy en Gatinais.                                COURTIGIS, la demeure actuelle remplace un château plus ancien détruit au XVIe siècle, que les Le Maire avaient tenu en fief, ce château, situé au milieu de grands bois, est entouré de verdure et de cours d'eau qui en font une merveilleuse demeure. Elle est occupée par monsieur Chareire, avocat au Conseil d'Etat et à la Cour de Cassation. Au XVIIe siècle, la propriété appartenait à Hubert Aulas, seigneur de Courtigy, lieutenant de la maréchaussée de Montargis, ancien capitaine de cavalerie, chevalier de Saint-Louis, il résidait le plus souvent à Montargis dans sa belle maison de la rue du Pont de l'Ouche que son épouse, Sophie Desnoyers, revendit après son décès lors qu'elle alla rejoindre ses fils établis à Nancy.","habitants":"Changy; Famille de Napoléon Hector Soult.                                    solin; famille Bellecourt,                                                                         Courtigis, famille de  Hubert Aulas\r\n        \"","divers":"Trois châteaux à Varennes. Changy dont celui de Changy grav 1-2  de Solin grav-3 au Moulinet et de Courtigis à Oussoy grav 4-5.","gps":"","images":["../image/image_45/45_Changy_1.jpg","../image/image_45/45_Changy_2.jpg","../image/image_45/45_Changy_3.jpg","../image/image_45/45_Changy_4.jpg","../image/image_45/45_Changy_5.jpg"]},"Consult_chateau_formulaire5204":{"id":"Consult_chateau_formulaire5204","dept":"45","canton":"Ingré","commune":"Ingré-Orléans","nom":"Chapelle","type":"Château","periode":"XV-XX","histoire":"CHAPELLE, à partir de 1593, on connaît les différents propriétaires du château, parmi lesquels deux figures féminines: la première, au XVIIIe siècle, Félicité Lion du Sablon, marié en 1763 à Étienne Fleureau de Guillonville, contrôleur des bois du duché d'Orléans. Le second personnage marquant est l'actrice de la Comédie-Française, Mlle Raucourt, qui y a séjourné entre 1801 et 1815, meublant le château avec goût et raffinement, l'ornant de sculptures et de tableaux, et y donnant libre cours à sa passion pour la botanique.","architecture":"CHAPELLE, ce château, remanié à plusieurs reprises au cours des siècles, présente un corps de logis à sept travées, à un étage carré et six lucarnes en croupes sur le versant du toit à longs pans. Il est flanqué de deux tourelles circulaires à poivrière qui, bien que très remaniées, remontent au XVe siècle. Sur la façade arrière qui donne sur la Loire, deux tourelles carrées ponctuent le bâtiment. Les collections de plantes qu'elle entretenait étaient remarquables et devaient à sa mort, aller enrichir les collections du jardin des plantes d'Orléans, propriété du conseil général du Loiret.","habitants":"Étienne Fleureau de Guillonville\r\n        \"","divers":"Château de la Chapelle à Ingré grav 1-2-3.","gps":"","images":["../image/image_45/45_Chapelle_1.jpg","../image/image_45/45_Chapelle_2.jpg","../image/image_45/45_Chapelle_3.jpg"]},"Consult_chateau_formulaire480b":{"id":"Consult_chateau_formulaire480b","dept":"45","canton":"Ingré","commune":"Chapelle Saint-Mesmin","nom":"Chapelle_St_Mesmin","type":"Château","periode":"XVIII-XIX","histoire":"Quatre châteaux  dans cet article celui d'Ardoise ,  des Hauts,  la Solitude  et la Source de Rollin.                                                                   ARDOISE, résidence agréable qui domine la Loire. Cette demeure entourée d'arbres, aux salons élégants ornés de boiseries, remplace un château plus ancien du XVIe siècle qui possédait une tour ronde de 16 mètres de diamètre qui commandait la route de Meung à Orléans.                                               La SOLITUDE, cette élégante demeure construite dans la première moitié du XVIIIe siècle, ordonnant ses bâtiments autour d'une cour d'honneur, est à l'origine, la maison de campagne de Claude Lion du Sablon, conseiller du roi, dont la fille a épousé Étienne Fleureau de Guillonville. A la fin de l'ancien régime, le petit château est la propriété de Joseph-Louis Ripault Desormeaux, historiographe de la maison de Bourbon, auteur de divers ouvrages historiques. Il passe en 1802 à son neveu Louis-Madeleine Ripault, archéologue orientaliste ayant participé à l'expédition d'Égypte. Après avoir été bibliothécaire de Bonaparte, il se retire à La Chapelle Saint-Mesmin où il poursuit ses recherches. La communauté des religieuses hospitalières s'installe au château en 1853 et y crée un hospice, qui prend le nom de La Solitude. En 1902, transformé en maison de retraite, en 1948 le château abrite une maison de repos et de convalescence. En 1996, la municipalité achète La Solitude et y installe l'hôtel de Ville.","architecture":"Le château des HAUTS, simple manoir au XVe siècle, a été restauré sur ordre du roi de France Charles VII et selon la tradition plusieurs rois y auraient séjourné : Henri II, Charles IX. Ce dernier l'aurait fait restaurer pour sa maîtresse Marie Touchet. À la mort de celle-ci en 1638, sa fille Henriette de Balzac d'Entragues, maîtresse d'Henri IV aurait hérité du château des Hauts,qu'elle loua en 1801 à mademoiselle Raucourt, propriété ensuite de l'évêché d'Orléans, puis du conseil général, a été racheté par une société d'informatique pour en faire son siège. En 1870, à la chute de l'Empire, Mgr Félix Dupanloup y réunit les héritiers du trône de France afin de tenter de rétablir la monarchie.                                                                                La SOURCE du ROLLIN, du du XIXe siècle est composé d'un corps de logis à deux étages, prolongé de deux pavillons plus bas dont le toit s'orne de lucarnes. Plusieurs communs s'organisent autour d'une cour fermée. La demeure a été la propriété de M. Cottereau puis de la Caisse de retraite et de prévoyance des clercs et employés de notaires. En 1964, l'édifice a été racheté par le ministère de la Justice, qui  a ouvert une unité éducative d'activités de jour. Le domaine est composé du château à trois niveaux de sous-sol, dun rez-de-chaussée et de deux étages sur une surface intérieure de 4348 m² c'est un parc boisé.","habitants":"Solitude; Joseph-Louis Ripault Desormeaux.                               Les Hauts;Marie Touchet.                                                                    Les Sources; M. Cottereau\r\n        \"","divers":"Quatre châteaux  à la Chapelle Saint-Mesmin; celui d'Ardoise grav-1 ,  des Hauts grav 2,  la Solitude grav-4  et la Source de Rollin grav-3.                                                                                   Hauts  47° 53' 12\" nord, 1° 50' 25\" est","gps":"","images":["../image/image_45/45_Chapelle_St_Mesmin_1.jpg","../image/image_45/45_Chapelle_St_Mesmin_2.jpg","../image/image_45/45_Chapelle_St_Mesmin_3.jpg","../image/image_45/45_Chapelle_St_Mesmin_4.jpg"]},"Consult_chateau_formulaire5d8b":{"id":"Consult_chateau_formulaire5d8b","dept":"45","canton":"Saint-Jean de Braye","commune":"Saint Jean de Braye","nom":"Charbonnière_45","type":"Palais","periode":"XIX","histoire":"CHARBONNIERE, le nom de charbonnière a pour origine l'activité de production de charbon de bois qui avait lieu autrefois sur le domaine. propriété de la ville d'Orléans. En 1830-1832, au moment de la confection du cadastre, la famille Ligneau-Grandcourt est propriétaire du domaine. Deux autres famille en deviennent propriétaires après et l'occupent avant sa démolition complète en 1882. Le domaine est alors racheté en 1894 par M. Prot-Roussel. Le château comme il existe actuellement est construit entre 1895 et 1900. Il demeurera dans la famille Prot, parfumeurs, jusqu'en 1946. A cette date il est racheté par la ville de Saint-Cloud pour le destiner à ses oeuvres de vacances. La ville d'Orléans acquit le domaine en 1974 et l'ouvre au public. Le château fait partie d'un domaine boisé divisé en deux propriétés qui forment un ensemble de 250 ha et les limites de ses deux domaines sont peu visibles pour le promeneur.","architecture":"CHARBONNIERE, les travaux de construction du Grand Charbonnière, énorme château de briques et de pierres, au style imité de l'époque Louis XIII, ont commencé en octobre 1894. Jusqu'à la guerre de 1914, il permet à la famille Prot, parfumeurs à Paris, d'y vivre des moments agréables dans un cadre somptueux. Puis viennent les guerres : la mobilisation et la mort de plusieurs hommes de la famille en 1914 ; l'occupation des communs et du château ; la réquisition des chevaux en 1918 ; puis plus tard l'occupation 1940-1945 au cours de laquelle le château abrita de hauts dignitaires de l'armée allemande. Les dégradations furent très importantes.   La propriété reste à la famille Prot jusqu'en 1946, année durant laquelle la mutation est faite à la ville de Saint-Cloud (Hauts-de-Seine). Le domaine abrite ensuite la colonie de vacances des enfants de Clichy-la-Garenne. À partir de 1974, la ville d'Orléans en est propriétaire. Elle aménage un vaste centre de loisirs, qui a fonctionné l'été, pendant de nombreuses années. Actuellement, le château n'est guère utilisé. Il est parfois loué pour des mariages, des réunions familiales, et quelques expositions. Le très beau parc, de plus de 100 hectares, qui entoure le château, est ouvert au public et ajoute un attrait à cette demeure.","habitants":"famille Ligneau-Grandcour\r\n        \"","divers":"A Saint-Jean de Braye château de la Charbonnière 47° 56' 13\" nord, 1° 59' 24\"  est","gps":"","images":["../image/image_45/45_Charbonni%c3%a8re_45_1.jpg","../image/image_45/45_Charbonni%c3%a8re_45_2.jpg","../image/image_45/45_Charbonni%c3%a8re_45_3.jpg","../image/image_45/45_Charbonni%c3%a8re_45_4.jpg","../image/image_45/45_Charbonni%c3%a8re_45_5.jpg"]},"Consult_chateau_formulaire4c3f":{"id":"Consult_chateau_formulaire4c3f","dept":"45","canton":"Château-Renard du Loiret","commune":"Château-Renard du Loiret","nom":"Chateau_Renard","type":"Château","periode":"XVII","histoire":"La MOTHE,  passa  entre les mains de la famille de Courtenay. En 1382, il appartint à la famille de La Trémoille, barons de Sully. En 1531, la demeure fut vendue à la veuve de Gaspard de Coligny, maréchal de France, qui avait épousé en 1514 Louise de Montmorency, sur du célèbre Connétable. Leur fils Gaspard II s'illustra sous le nom d'amiral de Coligny à la tête des protestants. Mais peu après, les troupes royales prirent Châteaurenard et détruisirent le château de la Mothe pour s'éviter la peine de le défendre. En 1595, après l'assassinat de l'amiral, à la Saint Barthélemy, le château échut à sa fille unique, Louise de Coligny, qui avait elle même perdu, au cours de ce massacre, son époux Charles de Theligny, seigneur de Lierville, après un an de mariage. Elle se remaria avec Guillaume de Nassau, prince d'Orange, dit le Taciturne et fit bâtir en 1609, sur les ruines du château d'en bas, la magnifique demeure que nous admirons aujourd'hui mais qu'elle n'habita jamais. Son époux fut assassiné à Delft en 1584 en sortant de table, Louise de Coligny, folle de douleur, quitta la Hollande en 1620. Sur l'invitation de Marie de Médicis, elle s'installa au château de Fontainebleau et y mourut la même année. En effet à la maison de Nassau succéda à celle d'Amat en 1658, puis celle d'Aquin en 1680. En 1755, il échut à Jean Pierre Fougeret qui le transmit en 1756 à son fils, Jean de Fougeret, Receveur Général des Finances et épousa en 1762 Anne-Françoise d'Outremont qui lutta contre la mortalité infantile des enfants et créa \"La Charité maternelle\" uvre destinée à multiplier les crèches dans les villes.","architecture":"La MOTHE, cette demeure sans doute la plus belle du Loiret, fut élevée sur les fondations de l'ancienne forteresse, ce qui explique le plan unique en France de ce château. La forteresse primitive était en effet octogonale et le château actuel a été construit sur trois des côtés de cet octogone. Aussi la façade principale est-elle flanquée de deux ailes placées obliquement. Cela donne à la façade un aspect largement ouvert, original et élégant. Le château est flanqué de chaque côté par des bâtiments bas, terminés par une tourelle coiffée d'une coupole. L'octogone primitif, entièrement entouré d'eau, forme la cour du château. La demeure elle-même est construite de briques et pierres  est surmontée de hautes toitures. Les hautes fenêtres qui l'éclairent sont entourées d'encadrements de pierre, il a gardé son aspect primitif malgré de nombreuses restaurations successives.. La reine Marie-Antoinette en était la protectrice. A la Révolution, M. de Fougeret périt sur l'échafaud en 1794. En 1806, ses descendants vendirent le château de la Motte à M. Paul de Baert, marié à Mlle Lamoignon de Malesherbes, petite-fille du défenseur de Louis XVI. Sa fille unique épousa M. Lepelletier des Forts qui mourut en 1861 en le laissant à sa fille qui épousa le comte de Maleyssie, qui restaura encore une fois La Mothe en 1882. Enfin, Mlle de Maleyssie vendit le château à M. Locher, qui  entreprit une restauration complète. Récemment, plusieurs propriétaires ont essayé d'entretenir et de rentabiliser cet important domaine transformer en hôtel.","habitants":"famille de La Trémoille\r\n        \r\n        \"","divers":"Château  de la Mothe à  Château-Renard du Loiret","gps":"","images":["../image/image_45/45_Chateau_Renard_Motte_1.jpg","../image/image_45/45_Chateau_Renard_Motte_2.jpg","../image/image_45/45_Chateau_Renard_Motte_3.jpg","../image/image_45/45_Chateau_Renard_Motte_4.jpg","../image/image_45/45_Chateau_Renard_Motte_5.jpg"]},"Consult_chateau_formulaire2da2":{"id":"Consult_chateau_formulaire2da2","dept":"45","canton":"Châteauneuf -sur-Loire","commune":"Châteauneuf -sur-Loire","nom":"Chateauneuf_Loire","type":"Château","periode":"XV-XVII-XVIII-XIX","histoire":"CHATEAUNEUF,  ce sont les Capétiens qui entreprirent la construction du château, mais les Valois et la famille d'Orléans aimaient également y séjourner, à l'origine construction royale ou séjournèrent  Louis le gros, Blanche de Castille, Saint-Louis, Charles IV, le Bel.  Les Phélypeaux de la Vrillière   dynastie de ministres, tenaient la seigneurie au début du XVIIe siècle,le château fut détruit en 1803  Louis Phélypeaux remplaça le châteaux médiéval, dont il reste quelques vestiges, par une somptueuse  demeure de Louis XIV.  Après être passé au duc de Penthièvre le château fut démoli  sans raison au début de l'empire par un architecte,  mais il reste les quatre pavillons d'avant-cour  et les dépendances, et la rotonde qui renferme le musée,  il a était reconstruit au XVIIIe siècle par la famille de la Vrillière.   Benoît Lebrun (1754-1819), architecte et politicien français, a été propriétaire du château est décédé dans la commune.                                                                                                             A deux kilomètres à l'est à st-Martin d'Abbat;  AIGREFIN, il y avait sur cette terre un petit manoir royal pour la chasse.  Philippe III le Hardi fils de Saint Louis donna cette terre à son gendre Guyon Le Bas. En 1506, Jean de Beaurain est sieur d'Egrefin et en 1573, Élisabeth de Beaurain, veuve de Jacques de Fauville, est dite dame d'Égrefin. En 1587, elle passe à Jules de Régnier, écuyer. Sa veuve Claude de Fauville, vend le domaine en 1611 à Mathias Tricquoy sieur de la Caillaudière, lieutenant d'artillerie.","architecture":"CHATEAUNEUF, aujourd'hui il ne subsiste qu'une rotonde, la galerie, l'Orangerie, les pavillons d'avant-cour qui abritent l'hôtel de ville et le musée de la Marine de la Loire, et enfin les écuries voûtées à la Mansart. On accède au vaste parc en traversant les douves par une élégante passerelle de pierre. Ce parc à la Française, dessiné par André Le Nôtre au XVIIIe siècle. Au XIXe siècle le parc est transformé en parc à l'Anglaise, corps de logis de plan rectangulaire oblong à deux niveaux toit en croupes accolée à la rotonde toit en coupole.                                                                                                     L'ETANG, manoir  hôtel pas d'information historique de style classique corps de logis rectangulaire à trois niveaux, accolé d'un pavillon à deux niveaux avec avant corps d'entrée sur façade côté parc avec fronton triangulaire au niveau du toit à quatre pans pour cet avant corps, le reste en croupe avec des lucarnes sur comble.                                                                             AIGREFIN, du manoir des seigneurs d'Aigrefin, il reste les caves de la haute époque royale,  Les caves actuelles du château sont de style roman et remontent à ce premier manoir. La maison et le colombier reconstruit en 1687 par François Ducloux. L'étymologie du nom Aigrefin (faim violente) peut rappeler combien cet ancien fief de la châtellenie de Châteauneuf  était d'un bien médiocre rapport. Le château d'Aigrefin a appartenu au début du XXe siècle à Mme Migneron, veuve de l'ancien conseiller général et ancien maire de Châteauneuf sur Loire, qui faillit être fusillé par les Prussiens en 1870.","habitants":"Châteauneuf; famille de la Vrillière.                                                Aigrefin ;Jean de Beaurain\r\n        \"","divers":"Châteauneuf-sur- Loire le château de Chateauneuf grav 2-3-4 , l'Etang grav 6 et d'Aigrefin grav-7 à St-Martin d'Abbat;  Poutil grav-5                                                                                    Chateauneuf  47° 51' 51\" nord, 2° 13' 00\" est","gps":"","images":["../image/image_45/45_Chateauneuf_Loire_1.jpg","../image/image_45/45_Chateauneuf_Loire_2.jpg","../image/image_45/45_Chateauneuf_Loire_3.jpg","../image/image_45/45_Chateauneuf_Loire_4.jpg","../image/image_45/45_Chateauneuf_Loire_5.jpg","../image/image_45/45_Chateauneuf_Loire_6.jpg","../image/image_45/45_Chateauneuf_Loire_7.jpg"]},"Consult_chateau_formulaired6f5":{"id":"Consult_chateau_formulaired6f5","dept":"45","canton":"Château-Renard","commune":"Château-Renard","nom":"Chateaurenard_Haut","type":"Vestiges","periode":"XIII-XVIII","histoire":"CHATEAURENARD dit D'EN HAUT; la ville a conservé les vestiges  son aspect ancien en raison de sa cité antique et de ses deux châteaux. L'un est construit sur la hauteur, et l'autre, entouré d'eau provenant de la rivière, sur sa motte féodale, a été reconstruit au début de XVIIe siècle, il reste l'un des plus beaux châteaux du département. Le château a été construit pour la première fois au Xe siècle par Renard, comte de Sens, pour être détruit.","architecture":"CHATEAURENARD, il fut reconstruit de façon beaucoup plus gigantesque au XIIIe siècle, les murailles épaisses laissent une impression de puissance. Grande enceinte quadrangulaire flanqué aux angles de quatre tours circulaires. Cette forteresse a survécu longtemps et a même joué un rôle au moment des guerres de Religion, puisqu'en 1561 le célèbre amiral Gaspard II, converti au protestantisme, y installa un gouverneur huguenot qui se montra odieux avec les habitants catholiques. Après la célèbre bataille avec les troupes Royales, commandées par la Rochefoucauld-Barbezieux, la ville fut détruite et le château démantelé, offre désormais le spectacle romantique d'une puissance à jamais anéantie propriété de la commune.","habitants":"Renard, comte de Sens\r\n        \"","divers":"Châteaurenard-Haut à Chateaurenard  47° 56' 01\" nord, 2° 55' 43\" est","gps":"","images":["../image/image_45/45_Chateaurenard_Haut_1.jpg","../image/image_45/45_Chateaurenard_Haut_2.jpg","../image/image_45/45_Chateaurenard_Haut_3.jpg"]},"Consult_chateau_formulairee79c":{"id":"Consult_chateau_formulairee79c","dept":"45","canton":"Châtillon-Coligny","commune":"Châtillon-Coligny","nom":"Chatillon_Coligny","type":"Château","periode":"XVIII-XIX","histoire":"Deux chateaux dans cet article, Chatillon, et  à la Chapelle sur Aveyron, Ballu.                                                                                                                          CHATILLON-COLIGNY, en 1359, Louis de Melun aménage une ligne de fortification plus étendue, prolongée en 1376 autour de la ville. En 1437, la terre passe au domaine des Coligny, et en 1464, Jean III de Coligny commande la terrasse au-dessus de l'orangerie, le corps de bâtiment dit le Fer à Cheval date du XVe siècle. De 1547 à 1562, l'amiral Gaspard II de Coligny fait édifier un corps de galerie au nord du corps précédent et un autre corps à l'ouest relié au corps de galerie par un pavillon, le corps de galerie aurait été orné par le Primatice et Jean Goujon, le pavillon contenait l'escalier. Gaspard II fait réaliser l'orangerie et le puits sculpté attribué à Goujon. Pendant les guerres de Religion, on consolide l'enceinte à l'aide de six bastions. En 1569, Martinangue, gouverneur de Gien, chasse les réformés et pille le château de Coligny. En 1572, on ordonne sa démolition, qui commence par le pavillon sud, mais qui s'interrompt en 1638.  Gaspard IV de Coligny abjure la religion protestante en 1645. En 1648, le comté de Châtillon est érigé en duché prairie on aurait alors bâti un pavillon  contenant quatre appartements, des jardins dessinés par André Le Nôtre, les quatre pavillons d'angle du jardin et l'escalier accédant au jardin. En 1798, Antoine François Gourgeon et Hugues Montbrun, adjudicataires du château, obtiennent l'autorisation de le démolir. En 1816, Charles Emmanuel de Montmorency Luxembourg achète le château et fait bâtir en 1854, le logis actuel dans un ancien commun. Il subsiste aujourd'hui la tour maîtresse, le puits, l'orangerie et le logis aménagé en 1854.","architecture":"CHATILLON-COLIGNY, est un castrum aux mains des comtes de Blois  En 1143, il est détruit par Louis VII, et la famille de Châtillon s'éteint. Au milieu du XIIe, la terre passe à la famille de Champagne, le donjon est bâti vers 1180 par Etienne I de Sancerre.  La tour de plan circulaire puis polygonal à seize côtés, ce donjon offre à chacune des arêtes de ses faces, un pilastre surmonté d'un chapiteau qui décèle le ciseau de la fin du XIIe siècle. En 1854, a été construit un château de briques pour Charles Emmanuel Sigismond de Montmorency Luxembourg qui avait racheté les ruines après avoir fui au Portugal pour échapper à l'échafaud. On y retrouve une ancienne tour-porte qui en forme l'élément central. La cour d'honneur, en terrasse, n'est en fait que la partie supérieure de l'orangerie datant de la seconde moitié du XVIe siècle, sans doute l'une des  premières de la Renaissance française, elle constitue le morceau de choix du château de l'amiral de Coligny.                                                                                 BALLUS Construit vers 1820. Le fief appartenait au baron de Vilmaure, la ferme est aujourdhui indépendante ; les communs datent de la seconde moitié du XIXe siècle. (Inscrit à linventaire du patrimoine culturel).","habitants":"Chatillon coligny; amiral Gaspard II de Coligny                              Ballus; baron de Vilmaure\r\n        \"","divers":"Deux chateaux  à Châtillon-Coligny, Chatillon grav-1 à 6 , et  à La Chapelle sur Aveyron, Ballus grav-7.","gps":"","images":["../image/image_45/45_Chatillon_Coligny_1.jpg","../image/image_45/45_Chatillon_Coligny_2.jpg","../image/image_45/45_Chatillon_Coligny_3.html","../image/image_45/45_Chatillon_Coligny_4.jpg","../image/image_45/45_Chatillon_Coligny_5.jpg","../image/image_45/45_Chatillon_Coligny_6.jpg","../image/image_45/45_Chatillon_Coligny_7.jpg","../image/image_45/45_Chatillon_Coligny_8.jpg"]},"Consult_chateau_formulaired3e3":{"id":"Consult_chateau_formulaired3e3","dept":"45","canton":"Outarville","commune":"Chaussy","nom":"Chaussy_45","type":"Château","periode":"XVII","histoire":"CHAUSSY, ce château aurait peut-être été construit par François de Paule de Lamyrault, chevalier, seigneur de Chaussy en Beauce. Il fut maire d'Orléans en 1737.  Cinq chambres d'hôtes.","architecture":"CHAUSSY,   au milieu de la plaine beauceronne, on est surpris de trouver un agréable buisson de verdure qui procure la fraîcheur et le calme. Le château qui s'y tient comprend plusieurs parties, l'entrée se fait par une belle grille de fer forgé, tenue par deux grands piliers de pierre taillée. À gauche, on trouve les ruines d'une tour qui servait de colombier, elle correspondait à un premier château qui daterait de 1535. À droite, le château d'architecture classique, comprend un corps central à un étage, flanqué de deux ailes à un seul niveau, coiffé d'une toiture à la Mansart, qui équilibre et agrandit l'édifice.","habitants":"François de Paule de Lamyrault\r\n        \r\n        \"","divers":"le château de Chaussy","gps":"","images":["../image/image_45/45_Chaussy_45_1.jpg","../image/image_45/45_Chaussy_45_2.jpg","../image/image_45/45_Chaussy_45_3.jpg","../image/image_45/45_Chaussy_45_4.jpg"]},"Consult_chateau_formulaire9528":{"id":"Consult_chateau_formulaire9528","dept":"45","canton":"Artenay","commune":"Chevilly","nom":"Chevilly","type":"Château","periode":"XVIII-XIX","histoire":"Deux châteaux à Chevilly ; dont Chevilly et Cossoles.                       CHEVILLY,  a l'origine la terre appartenait au chapitre de sainte-Croix d'Orléans en 1675 passa dans différentes mains dont Nicolas Matte  conseiller du roi qui construisit  le château  à partir de 1783 il devient forteresse en 1870. Il a été transformé par l'architecte Jean Benoît Vincent Barré pour Jean François Perrin de Cypierre, intendant de la généralité d'Orléans et son épouse, Florimonde Parat de Montgeron.  Le parc immense est entretenu avec soin par le baron et la baronne Bazin de Caix.                                                                                                     COSSOLES, le château de Cossoles situé à Chevilly,  La construction actuelle date du XVIIIe siècle ; le château a été au centre de la seigneurie de Chevilly qui a longtemps appartenu aux de Bombel et gérée  par les ordres religieux.  Sous Napoléon III, le château de Cossoles appartenait au vicomte de Courcelles, qui, en 1866, fit construire tout à côté, une chapelle ouverte à tous les habitants des environs. À la fin du XIXe siècle, le domaine situé au milieu des bois, passe aux mains de la famille de La Tour d'Auvergne, dont le fameux équipage chassait dans la forêt d'Orléans toute proche. Dans le premier quart du XXe siècle, les Nail-Demelette, famille originaire du Maine-et-Loire, sont propnétaires de Cossoles.","architecture":"CHEVILLY, château qui date du XVIe siècle fut repris aux XVII- XVIIIe siècles  c'est un bâtiment imposant à l'architecture  dépouillée; un avant corps important cinq travées occupe le centre du logis, celui-ci  étant flanqué de deux ailes  de trois travées et de deux pavillons, d'autres bâtiments sur la gauche encadrent  la cour d'honneur. La façade du nord  présente un Fronton classique supporté par quatre colonnes d'ordre colossal et celle du sud est ornée d'un beau balcon  par un motif Louis XV, ornée d'un ordre dorique, est harmonieuse, l'une des meilleures réussites de Barré, la chapelle est classée M.H .  On peut voir dans les communs une glacière d'une ampleur exceptionnelle. Parc à la française et tout un ensemble de vases et de statues du XVIIIe siècle représente les cinq continents. De magnifiques attelages hippomobiles rappellent l'activité passée du domaine. Inscription au M.H par arrêté du 19 décembre 1967.                                                                                                            COSSOLES;   le corps de logis à cinq travées, comprenant un étage carré et un étage de combles éclairés par des lucarnes date du XVIIIe siècle. Le château a été agrandi au XIXe siècle d'un pavillon carré, surhaussé d'un second étage, et un étage de combles et un étage en surcroît sous la toiture. On accède à la cour de cette demeure par un pont de pierre qui enjambe des douves.","habitants":"Chevilly:  Jean François Perrin de Cypierre                          Cossoles; famille de La Tour d'Auvergne\r\n        \"","divers":"Deux châteaux à Chevilly ; dont Chevilly grav-3-4 et Cossoles grav 1-2.                                                                                         Chevilly  48° 01' 09\" nord, 1° 52' 54\"  est                                       Cossoles  48° 01' 13\" nord, 1° 55' 34\" est","gps":"","images":["../image/image_45/45_Chevilly_1.jpg","../image/image_45/45_Chevilly_2.jpg","../image/image_45/45_Chevilly_3.jpg","../image/image_45/45_Chevilly_4.jpg"]},"Consult_chateau_formulaire00a3":{"id":"Consult_chateau_formulaire00a3","dept":"45","canton":"Ouzouer-sur-Loire","commune":"Saint Benoît sur Loire","nom":"Chevrières","type":"Chevrières","periode":"XVIII","histoire":"CHEVRIERES,  Au XXe siècle, le château des Chevrières est la propriété de la famille Madre, marchand de bois. Ces notables de la commune sont des amis intimes du poète, romancier et peintre Max Jacob qui est venu pendant 18 ans manger avec eux tous les vendredis au château.  Les mésaventures d'une uvre patrimoniale restent liées à ce paisible château entouré d'un grand jardin, tout près de la Loire. En effet l'ancien retable mauriste, érigé en 1661 par l'architecte Antoine Charpentier dans l'abside de la basilique, avait été acheté par le propriétaire du château  le 12 septembre 1861, qui l'avait rebâti dans une de ses granges, il est racheté et remonté devant le mur méridional du transept de la basilique, en 1923.","architecture":"CHEVRIERES, du XVIIIe siècle, Il avait fallu la pugnacité du curé, l'intervention de la commune et des Beaux-Arts, pour que le retable.  On remarque, sur la façade de Chevrières, de nombreux éléments décoratifs qui sont des remplois provenant des anciens bâtiments conventuels de l'abbaye de Saint-BenoÎt. Ainsi, le porche d'entrée présente deux beaux pilastres dont les chapiteaux sont ornés de feuillages et qui supportent un entablement en pierre sculpté, surmonté d'un balcon à balustre. L'encadrement des portes des pavillons latéraux est également orné de riches sculptures. Le poète Max Jacob fréquentait le château de dont il aimait beaucoup le jardin, animé de jets d'eau dans une belle vasque en pierre.  Les encadrements des portes et des fenêtres sont orné de sculptures. Le château, privé, n'est pas ouvert à la visite.","habitants":"famille Madre\r\n        \"","divers":"A  Saint-Benoît-sur-Loire le château de Chevrières                      47° 48' 40\" nord, 2° 18' 22\" est","gps":"","images":["../image/image_45/45_Chevri%c3%a8res_1.jpg","../image/image_45/45_Chevri%c3%a8res_2.jpg","../image/image_45/45_Chevri%c3%a8res_3.jpg"]},"Consult_chateau_formulaire6e2f":{"id":"Consult_chateau_formulaire6e2f","dept":"45","canton":"Pithiviers","commune":"Chilleurs aux Bois","nom":"Chilleurs_Chamerolles","type":"Forteresse","periode":"XII-XVI-XVIII","histoire":"Deux châteaux dans cet article; Chamerolles et la Saussaie. CHAMEROLLES, au XIIe siècle construction de la maison forte par Guillermet Brouart  acquit en 1390 par Nicolas Nico en 1440 Bertrand Dulac se rend acquéreur et reconstruction par Lancelot Ier du Lac, chambellan de Louis XII, Il a conservé de la maison forte . Au XVIe siècle, Lancelot II, petit-fils de Lancelot Ier, se rallie au protestantisme en 1562, Chamerolles abrite un temple protestant dans une de ses pièces. La demeure devint un haut lieu de la religion protestante dans la région. En 1672,  est vendu à Jacques Johannes de la Carre marquis de Saumery beau-frère de Colbert. Il est gouverneur du château de Chambord et du comté de Blois et maréchal des armées du Roi. Au XVIIIe siècle, en 1774, le château devient la propriété des Lambert puis celle de Gaston Jessé Curély en 1924. Occupé, saccagé et dépouillé pendant la deuxième guerre mondiale, il est mis en vente en 1970. En 1976, la Ville de Paris se retrouve avec la charge de la demeure délaissé, le château tombe en ruines,  que rachète le conseil général du Loiret en 1987.                                                                                                              SAUSSAYE, familles de Romand et Jeuslin de Villiers, située sur la propriété, et qui existait déjà avant la construction du château au XVIIIe siècle, la ferme de la Saussaye, en été 1944, connut des heures dramatiques lors de l'attaque du maquis de Chilleurs par les Allemands.","architecture":"CHAMEROLLES, L'enceinte en forme de trapèze est entourée de fossés en eau. Trois côtés sont occupés par des bâtiments bas : à l'ouest, le corps de logis principal avec deux ailes en retour d'équerre ; les écuries et un appartement moderne ; les cuisines et services. Sur le quatrième côté est placé le pavillon d'entrée, isolé des autres constructions. A chaque angle du trapèze est placée une grosse tour circulaire. Un pavillon rectangulaire flanqué, sur la façade extérieure, de deux tourelles dont l'une contient l'escalier, marque l'entrée du château. la forme traditionnelle des forteresses médiévales, mais a été conçu comme un château d'habitation. C'est à ce titre, qu'il est l'un des premiers châteaux Renaissance de France et l'un des rares à posséder toujours un pont-levis en état de fonctionnement. Sa partie inférieure est percée d'un passage voûté avec porte charretière et poterne. La partie supérieure est occupée par de nombreuses chambres de domestiques. La tour flanquant la gauche de l'entrée a conservé son sous-sol voûté en berceau annulaire sur pilier central en brique. En retour d'équerre, l'aile ouest comprend une série de pièces de réception desservies par un couloir.                                                                                    La SAUSSAIE, du XVIIIe siècle comprend un élégant corps de logis à sept travées, composé à l'origine d'un simple rez de chaussée surmonté d'un étage de combles. Vers 1880, cette construction a été surélevée d'un étage et flanquée de deux ailes dont une en retour. De belles lucarnes à chapeau, sculptées et armoriées, éclairent les combles: on peut y voir les armoiries accolées.","habitants":"Chamerolles ; Jacques Johannes de la Carre                                 Saussaie; Jeuslin de Villiers\r\n        \"","divers":"Deux châteaux à  Chilleurs aux bois; Chamerolles grav-2 à26   et la Saussaie grav-1.                                                        Chamerolles  48° 03' 37\" nord, 2° 09' 51\" est","gps":"","images":["../image/image_45/45_Chilleurs_Chamerolles_1.jpg","../image/image_45/45_Chilleurs_Chamerolles_2.jpg","../image/image_45/45_Chilleurs_Chamerolles_3.jpg","../image/image_45/45_Chilleurs_Chamerolles_4.jpg","../image/image_45/45_Chilleurs_Chamerolles_5.jpg","../image/image_45/45_Chilleurs_Chamerolles_6.jpg"]},"Consult_chateau_formulaire5146":{"id":"Consult_chateau_formulaire5146","dept":"45","canton":"La Ferté-Saint-Aubin","commune":"Marcilly en Villette","nom":"Chilly","type":"Château","periode":"XVII-XIX","histoire":"CHILLY, est moderne, premier seigneur connu est Hugues de Chilly vers 1150. Vers 1256, on trouve Eudes de Chilly, bourgeois d'Orléans. En 1306, Macé de Chilly devint chef des procureurs de la ville et obtint des lettres d'anoblissement. Son sceau (d'argent au lion de gueules) figure dans une sentence arbitrale rendue par lui au chapitre de Saint-Aignan. Son contre-sceau représente la plus ancienne figuration connue des armes de la ville d'Orléans. En 1295, il rendit foi et hommage à Jean Barat, seigneur de Cormes. Macé II de Chilly vivait vers 1350, son fils Macé III eut une fille, Guillemette qui porta la terre en dot à Guillaume Flamberge, avocat et échevin à Orléans en 1423. Chilly passa en 1480 à Claude Flamberge, puis à Jean Ill, conseiller et avocat du roi au bailliage d'Orléans, il mourut vers 1574 et sa fille Girarde porta cette terre dans la maison de Mareau. Hector II de Mareau était gentilhomme ordinaire du prince de Condé. Ses descendants  restèrent à Chilly jusqu'à la fin du XVIIe siècle. En 1665, Marguerite de Mareau avait porté la seigneurie à son deuxième époux Louis de Mailly. Leur fille Elisabeth, épousa en 1708 le marquis de Viefville, Capitaine de Frégate Légère du Roi. Leur fille Louise-Marguerite épousa le marquis de Thiboutot en 1730 et mourut l'année suivante en laissant une fille, Louise-Rose qui épousa Philippe de Saint Simon, marquis de Courtomer. Ils vendirent la propriété en 1754 à Augustin de Brezé. A sa mort en 1770, sa fille vendit le domaine en 1774 à Picquefeu de Longpré qui s'en défit en 1789.","architecture":"CHILLY  En 1806, le domaine fut acheté par Jean Baptiste Mallet qui ne tardera pas à prendre le nom de Mallet de Chilly, natif d'Amiens, après la Révolution se consacra entièrement à la mise en valeur des terres solognotes qui étaient presque toutes en friches, envahies par la bruyère. Sa tâche achevée et la terre de Chilly remise en état, il se retira à Orléans. En 1865, M. Bertrand acheta Chilly à la famille de La Tour du Pin, la propriété fut transmise à leur petite-fille, Mme Eugène Deschamps, et ses descendants la possèdent toujours.  Le château est constitué d'un corps de logis central sur soubassement à deux niveaux et lucarnes sur un toit trés pentu, accolé de deux pavillons à trois niveaux sur les flancs avec tourelles intermédiaires et tour carré sur le flanc ouest, lanternon sur le toit.","habitants":"Chilly;  Hugues de Chilly  et famille de La Tour du Pin\r\n        \"","divers":"A Marcilly en Vilette le château de Chilly                                     47° 47' 15\" nord, 1° 58' 59\"  est","gps":"","images":["../image/image_45/45_Chilly_1.jpg","../image/image_45/45_Chilly_2.jpg","../image/image_45/45_Chilly_3.jpg"]},"Consult_chateau_formulaire7c63":{"id":"Consult_chateau_formulaire7c63","dept":"45","canton":"Gien","commune":"Le Choux","nom":"Choux","type":"Château","periode":"XIX","histoire":"deux châteaux dans cet article; La  Jouanne et Mortumier et autres sans article.   A deux K.M.au sud-est Boismoirand le château de Cormont.                                                                                                    CORMONT, en 1870, le château fut reconstruit par Guy Latu avec deux tours circulaires à couronnement crénelé. En 1889, il appartenait à M. David. Plus récemment, il a été aménagé pour servir de colonie de vacances pour des enfants de la ville de Genevilliers.                                                                                                                                              La JOUANNE; cette demeure du XIXe siècle, située au milieu de vastes terrains de chasse, d'allure très simple, a été construite à la fin du XIXe siècle par l'homme politique Raphaël Delaunay, médecin, pharmacien, il a été maire de Gien, député du Loiret et membre actif du parti radical, attentif aux problèmes d'hygiène publique. Pendant la première guerre mondiale, il a servi comme pharmacien aide major de première classe. Attaché à sa propriété de la Jouanne, il s'y rendait très souvent. Près du château, un intéressant site préhistorique a été fouillé par des archéologues qui ont mis au jour des outils de l'époque magdalénienne.                                                                                    MORTUMIER  pas d'information historique.","architecture":"CORMONT, le château, dominant la vallée du Vernisson, est agrémenté d'un grand parc boisé, les ruines qu'il contient rappellent que s'élevait là une antique forteresse, qui remonterait aux Gallo-Romains. Un premier château fut le siège d'une sanglante bataille au moment des guerres de Religion. En 1621, la chapelle a été transformée en un temple protestant par Jean-Pierre Dufaur de Pibrac. Sous Louis XIV, le château dut soutenir un siège au cours duquel le maréchal Dubourg trouva la mort.  Deux pavillons de garde complètent l'ensemble.                                                                                                                                         MORTUMIER, située au milieu d'un vaste parc, cette demeure, construite au XIXe siècle, présente un corps de logis flanqué de deux pavillons. Les hautes toitures et les hautes cheminées donnent à l'ensemble une élégance toute classique. On remarque à côté de l'édifice principal, trois petites constructions à usage de communs, dont deux sont surmontées d'un clocheton.","habitants":"Jouanne; Raphaël Delaunay\r\n        \"","divers":"deux châteaux aux Choux, la  Jouanne grav 3 et Mortumier grav 2 et autres sans article.   A deux K.M.au sud-est Boismoirand-grav-4 le château de Cormont-grav_5.","gps":"","images":["../image/image_45/45_Choux_1.jpg","../image/image_45/45_Choux_2.jpg","../image/image_45/45_Choux_3.jpg","../image/image_45/45_Choux_4.jpg","../image/image_45/45_Choux_5.jpg","../image/image_45/45_Choux_6.jpg"]},"Consult_chateau_formulairee3dd":{"id":"Consult_chateau_formulairee3dd","dept":"45","canton":"Chécy","commune":"Chésy","nom":"Chécy","type":"Château","periode":"XVIII-XIX","histoire":"Tois châteaux dans cet article dont Bel-Air, Crot, Bretauche. AUCHE,   du XVIIIe siècle, des plans montrent son état au XVe siècle et au XVIIIe siècle, il aurait été habité par Daniel-François Legrande de Melleray, intendant des finances du duc d'Orléans pendant la Régence. Pierre Sébastien Daniel Espivent de La Villesboinet (1830). Charles Le Ray de Chaumont, marquis de Saint-Paul (1885). Le château aurait également appartenu à une congrégation de soeurs, qui avaient fait voeux de silence, jusque dans les années 1970.                                                                                                  CROT,  en 1464, il fut acquit par Jean Meillon, vigneron et resta dans cet famille pendant trois générations. En 1540, le domaine passa à Jean le Maire, bourgeois et marchand à Orléans, seigneur d'Edeville et du Muid. Sa famille le conserva pendant six générations et y construisit une maison et une chapelle. Après avoir appartenu à Jean Berge de 1748 à 1757, le domaine fut acheté par le sieur J.-B. Boucher, licencié en Lois, prêtre-chanoine . Son frère, puis ses neveux le conservèrent jusqu'en 1828. De 1836 à 1843, le château passa aux Colas des Francs, puis changea cinq fois de propriétaires, parmi eux, le baron de Nervo.","architecture":"BEL-AIR, un industriel hollandais, Claude Vandebergue, acheta la propriété en 1797, fit construire le château, les communs et le temple de l'Amour qui existent toujours. François Narcisse Pagot, un des meilleurs architectes orléanais sous le Directoire, orna Bel Air de balcons . Parmi les différents propriétaires, citons le Cardinal du Pont en 1839.     \r\nCROT, le château était défendu par des tourelles carrées et par un pont-levis flanqué de deux tourelles circulaires. \r\n  BRETAUCHE, c'est un château reconstruit au XVIIIe siècle auquel aboutit une belle allée de peupliers, venant de Boigny. Il est formé d'un pavillon central et de deux ailes en retrait.","habitants":"Bel air; Claude Vandebergue                                                   Bretauche ; Daniel-François Legrande de Melleray,                            Crot; Jean Berge\r\n        \r\n        \"","divers":"Cinq châteaux à Chécy; Bel-Air grav-1, Bretauche grav 2-3,  Crot grav-4.                                                                             Bretauche  47° 54' 43\" nord, 2° 02' 50\" est","gps":"","images":["../image/image_45/45_Ch%c3%a9cy_1.jpg","../image/image_45/45_Ch%c3%a9cy_2.jpg","../image/image_45/45_Ch%c3%a9cy_3.jpg","../image/image_45/45_Ch%c3%a9cy_4.jpg"]},"Consult_chateau_formulaire3fab":{"id":"Consult_chateau_formulaire3fab","dept":"45","canton":"Chécy","commune":"Chécy","nom":"Chécy_II","type":"Château","periode":"XVII-XVIII","histoire":"Trois châteaux dans cet article; Herpinière, Prèche et Reuilly. HERPINIERE, du XVIIe siècle, cette petite seigneurie, située au bord du canal d'Orléans, prend le nom de Herpinière au XVIIe siècle, d'après le nom de l'un de ses premiers propriétaires, Jean Herpin. Le château a appartenu à d'importantes familles de notables dont, au XVIIe siècle, François Bugy, conseiller du roi et trésorier de la gendarmerie de France, et au XVIIIe siècle, les familles de Geuffronneau et Ravot. À la fin de la Révolution, le domaine échoit à Jean-René Bottet, notaire à Orléans, maire de Chécy de 1814 à 1821.                                                                                            PRECHE, la Prêche remontent à 1642: lieu de vignes à Bionne comprenant maison pour maîtres et vigneron, pressoir, cours, jardin, prés, parc d'arbres. En 1806, la propriété est aux mains de Mme de Laage de La Rochetterie.                                                                        REUILLY du XVIIIe siècle  château fort où Jeanne d'Arc fut reçue par Guy de Cailly le 29 avril 1429 avant d'attaquer Orléans. Ce seigneur s'attacha à elle durant tout le siège et la suivit jusqu'à Rouen après avoir tenté vainement, avec Dunois et Xaintrailles de la délivrer de la tour où elle était enfermée dans une cage de fer. Le château de Reuilly appartenait en 1867 à M. Boucher de Molandon, puis passa au XXe siècle au baron de Beaucorps.","architecture":"PRECHE, du XVIIe siècle ; son logis, orienté est-ouest, de forme rectangulaire est formé d'un rez-de-chaussée assez surélevé et d'un étage sous des combles mansardés, la toiture d'ardoise, au bris arrondi, reposant sur un entablement de pierre mouluré. Chacune des façades est percée de cinq hautes fenêtres dont la partie supérieure est dormante et séparée par une belle moulure en goutte d'eau. Les combles sont éclairés de lucarnes de pierre au fronton courbe dont cinq à l'ouest et trois à l' est. A l'ouest du côté cour, un double perron évasé donne accès par dix marches à la porte d'entrée centrale. Au nord, le bâtiment, qui fait un tout parfaitement authentique, a été prolongé par une aile en forme de tour à la fin du XIXe siècle, inscription par arrêté du 16 mai 1974.                                                                                           HERPINIERE, cette propriété, réputée au XVIe siècle pour la qualité de ses vins, comporte des dépendances en lien avec ses anciennes activités viticoles: pressoir, cellier, écuries et caves. Le château conserve sur sa façade arrière les traces de la construction du XVIIe siècle, la façade principale donnant sur le canal a été profondément modifiée au XIXe siècle, dans le style néo-Renaissance.                                                               REUILLY, du XVIIIe siècle, le château actuel est une grosse demeure très simple, qui remplace un ancien château fort.","habitants":"Préche: Mme de Laage de La Rochetterie.                      Herpinière:, Jean Herpin                                                                          Reuilly;  Guy de Cailly\r\n        \"","divers":"A Chécy le château de l'Herpinière grav 1 de Prèche Grav-2 et de Reuilly_3.","gps":"","images":["../image/image_45/45_Ch%c3%a9cy_II_1.jpg","../image/image_45/45_Ch%c3%a9cy_II_2.jpg","../image/image_45/45_Ch%c3%a9cy_II_3.jpg"]},"Consult_chateau_formulaire3370":{"id":"Consult_chateau_formulaire3370","dept":"45","canton":"Châteauneuf-sur-Loire","commune":"Combreux","nom":"Combreux","type":"Château","periode":"XIX","histoire":"COMBREUX, le château néo médiéval XIXe siècle.  Plusieurs grands seigneurs, dont les noms sont gravés dans l'antichambre, s'y sont succédé dont un bien connu, Lancelot de la Taille. Le château  faisant partie du domaine Royal  était une des résidences de Henri Ier, il y mourut en 1006. En 1108, le Roi Louis VI, dit le Gros, pressé d'argent, le mit en gage. Depuis il a appartenu à une longue lignée de hauts et puissants seigneurs dont les noms sont gravés sur une plaque de marbre, dans lantichambre. Celui-là même qui a logé dans le château de Jarnonce, à Vitry-aux-Loges. Il y a eu aussi Guy de Senlis de la Tour qui en devint le possesseur en 1124, jusqu'à la famille de La Rochefoucauld, qui le détient encore actuellement,  le château constitue à l'origine un fief de la châtellenie de Vitry.  L'édifice est acquis par Alexandre-Jules de La Rochefoucauld, duc d'Estissac au XIXe siècle.  C'est d'ailleurs cette dernière famille qui entreprendra une transformation totale des locaux.  Le duc d'Estissac est recensé comme organisateur de chasses à courre sur les terres du château de Combreux.","architecture":"COMBREUX,   le château néo médiéval XIXe siècle  est une vaste demeure souvent remaniée, conservant de ses origines qu'une vieille tour trapue et massive, reconnaissable à la patine du temps parmi les constructions plus récentes, l'édifice est de style néogothique,  entouré de douves  la date de construction du château d'origine n'est pas connue mais on peut trouver dans les textes une mention du château dès le XIIe siècle.                                                                                           A un kilomètre au nord-Est à Sury aux Bois château de CHIMACOUR,  hôtel du XIXe siècle le château est une somptueuse bâtisse du XIXe siècle construite en 1834 pour devenir un relais de chasse. Transformé en hôtel restaurant dans les années 80, puis fermé fin 99, il a de nouveau ouvert ses portes en 2008,  pas d'autre information.","habitants":"famille de La Rochefoucauld,\r\n        \"","divers":"Combreux grav-1 à 6 et Chimacour grav-7-8                                     47° 57' 31\" nord, 2° 18' 19\" est","gps":"","images":["../image/image_45/45_Combreux_1.jpg","../image/image_45/45_Combreux_2.jpg","../image/image_45/45_Combreux_3.jpg","../image/image_45/45_Combreux_4.jpg","../image/image_45/45_Combreux_5.jpg","../image/image_45/45_Combreux_6.jpg","../image/image_45/45_Combreux_7.jpg","../image/image_45/45_Combreux_8.jpg"]},"Consult_chateau_formulaire4342":{"id":"Consult_chateau_formulaire4342","dept":"45","canton":"Amilly","commune":"Conflans-sur-Loing","nom":"Conflans_sur_Loing","type":"Château","periode":"XVII-XVIII","histoire":"deux châteaux dans cet article; Charmoy, Perthuis                                                                                                   CHARMOY, est un imposant  pavillon entouré d'un beau parc. Mais derrière cette vaniteuse construction du XIXe siècle, se cache un manoir du XVIIe siècle entouré de ses douves pleines d'eau, peut-être le Vieux Charmoy. Si cette demeure souffre d'un environnement plus ingrat que sa cadette, son architecture n'en présente pas moins un intérêt certain. On y accède par un pont de pierre à deux arches qui enjambe des douves. L'édifice est située au fond d'une petite cour d'honneur, sa façade postérieure plonge directement dans l'eau. Le logis comprend un étage surmonté d'un toit de vieilles tuiles percé de lucarnes ornées de frontons triangulaires ou arrondis. Les fenêtres sont très hautes et leur encadrement comporte une alternance de pierres et de briques. L'intérieur a conservé ses dispositions d'origine, les plafonds sont pourvus de poutres magnifiques. Un bel escalier central a conservé sa rampe à balustres de bois, d'époque Louis XIII. Les propriétaires M. et Mme Triau s'efforcent de redonner vie à ces vestiges des siècles passés.","architecture":"PERTHUIS, ce beau château à la sobre architecture date du XVIIIe siècle. La demeure est entourée de vastes pelouses, la partie centrale fut sans doute construite en 1706 par un David, dont la famille possédait cette terre depuis le Moyen-Age. En 1768, le château fut vendu à la famille de Parceval qui transforma notablement cette maison vers 1771.  Fut acheté en 1787 par le baron Michel de Triqueti, consul de Sardaigne. L'un de ses descendants, Henri de Triqueti fut sculpteur, auteur des portes monumentales de l'église de la Madeleine à Paris. Sa fille, Blanche de Triqueti, épousa Edward Lee Schilde, neveu du général Lee, le héros malheureux de la cause sudiste pendant la guerre de sécession. Elle tenait à Paris un salon littéraire très fréquenté à l'époque par les célébrités, Pierre Loti en était le fleuron le plus brillant. Blanche mourut en 1886. Les souvenirs du père et de sa fille sont conservés par leurs héritiers. Le château est aujourd'hui occupé par le Comte Eugène de Sartiges.","habitants":"Charmoy; M. et Mme Triau                                                      Perthuis; famille de Parceval \r\n        \r\n        \"","divers":"Deux châteaux à  Conflans sur Loing; Charmoy  grav-3-4, Perthuis grav-1-2","gps":"","images":["../image/image_45/45_Conflans_sur_Loing_1.jpg","../image/image_45/45_Conflans_sur_Loing_2.jpg","../image/image_45/45_Conflans_sur_Loing_3.jpg","../image/image_45/45_Conflans_sur_Loing_4.jpg","../image/image_45/45_Conflans_sur_Loing_5.jpg"]},"Consult_chateau_formulaire5a96":{"id":"Consult_chateau_formulaire5a96","dept":"45","canton":"Meung-sur-Loire","commune":"Coulmiers","nom":"Coulmiers","type":"Château","periode":"XVIII-XIX","histoire":"Deux châteaux dans cet article ; Coulmiers et de Luz. COULMIERS, situé au milieu de son parc, le château du bourg de Coulmiers appartenait à l'origine à Claude Martin d'Ormoy, conseiller du roi et président de l'élection de Pithiviers. À sa mort, au début de l'année 1789, ses héritiers vendirent la terre et le château en juillet 1789, à René Claude Maximilien Capitan, écuyer, conseiller du roi, premier avocat au bureau des Finances de la généralité d'Orléans, et juge magistrat au bailliage, siège présidial du châtelet d'Orléans. Au-dessus d'une porte d'entrée, les armoiries de Claude Martin d'Ormoy furent mutilées à la Révolution. Le château a l'aspect d'une belle demeure de campagne du XIXe siècle, avec un corps de logis central coiffé d'une haute toiture et flanqué à gauche, d'un pavillon surmonté d'un toit à la Mansart et d'un autre pavillon plus modeste. De l'ancien château subsiste une cave et une glacière. L'histoire du pays a conservé des souvenirs sanglants de la guerre de 1870. En effet, le 9 novembre 1870, les troupes bavaroises y avaient installé leur artillerie et furent délogées par les troupes du général d'Aurelles de Paladines. La propriété appartenait à cette époque à la famille de Villebonne.","architecture":"LUZ , le château date de l'année 1848, remplaçant ainsi l'ancien château, démoli en 1843, dont seule la cave existe encore. C'est une sobre construction classique avec un corps central à un étage et cinq ouvertures, flanqué de deux pavillons à deux étages qui dominent le corps de bâtiment central. Une chapelle privative fut construite en 1842 à proximité du château. Le parc assure à l'ensemble un environnement champêtre. L'un des propriétaires, Pierre de Lafons, fervent huguenot et compagnon d'Henri de Navarre, devint contrôleur de la maison du roi de Navarre et plus tard secrétaire d'Henri IV. En 1870, le château de Lutz s'est trouvé au cur des batailles. Le 9 novembre, le général d'Aurelles  de Paladines, commandant en chef de la première armée de la Loire, après avoir remporté la victoire de Coulmiers, établit à Lutz son quartier général et fut reçu par le comte de Courcy, qui était maire de Coulmiers. Une plaque apposée sur la façade du château en témoigne.","habitants":"Coulmiers: Claude Martin d'Ormoy                                                     Luz ; Pierre de Lafons\r\n        \r\n        \"","divers":"Deux châteaux à Coulmiers dont  Coulmiers grav-1  et de Luz grav-2-3.","gps":"","images":["../image/image_45/45_Coulmiers_1.jpg","../image/image_45/45_Coulmiers_2.jpg","../image/image_45/45_Coulmiers_3.jpg"]},"Consult_chateau_formulairea461":{"id":"Consult_chateau_formulairea461","dept":"45","canton":"Neuville-aux-Bois","commune":"Ingrannes","nom":"Cour_Dieu","type":"Château","periode":"XIX","histoire":"COUR-DIEU, Georges Simenon a été locataire de ce château d'octobre 1934 à février 1936. C'est là qu'il a écrit plusieurs de ses uvres, parmi lesquelles \"Faubourg, Chemin sans issue, Les Rescapés du Télémaque, Quartier nègre, et Les Demoiselles de Concarneau\". Dans ses Mémoires, à plusieurs reprises, il parle de la forêt d'Orléans qu'il n'aimait guère : \"Je devais bientôt trouver lugubre cette forêt, humide, aux allées rectilignes qui se croisaient à intervalles égaux comme sur un damier\", et la description qu'il fait du village n'est pas plus avenante: \"Ingrannes était minuscule, les gens assez sauvages comme le sont en général les habitants des forêts\". La forêt et les villages d'Ingrannes et de Vitry-aux-Loges ont servi de cadre à une enquêtes de Maigret intitulée \"Les Larmes de bougie\".","architecture":"COUR-DIEU, ce grand édifice du XIXe siècle, avec lucarnes à frontons courbes et triangulaires alternés, est surtout remarquable par le voisinage de l'abbaye cistercienne Notre-Dame de La Cour-Dieu, des XIIe et XlIIe siècles. Les ruines émouvantes de l'église abbatiale et des bâtiments conventuels l'environnent au milieu des vieux arbres.","habitants":"Georges Simenon \r\n        \"","divers":"A Ingrannes le château de Cour-Dieu","gps":"","images":["../image/image_45/45_Cour_Dieu_1.jpg","../image/image_45/45_Cour_Dieu_2.jpg","../image/image_45/45_Cour_Dieu_3.jpg"]},"Consult_chateau_formulaire70a2":{"id":"Consult_chateau_formulaire70a2","dept":"45","canton":"Château-Renard","commune":"Saint-Germain des Prés","nom":"Courbevaux","type":"Château","periode":"XIX","histoire":"COURBEVAUX, existait au Moyen Âge. Il a été détruit pendant la guerre de cent ans, puis reconstruit peu après. Le château que l'on peut voir aujourd'hui est une construction de la fin du XIXe siècle, dans un style néo-gothique fantaisiste, avec tours crénelées, immense vitrail, fenêtres à meneaux. À ce château de Courbevaux reste attaché le souvenir d'une personnalité singulière : Emmanuel de Sainville. Propriétaire à la fin du XIXe siècle, il y a élevé des paons et des poules gâtinaises. Adepte de parapsychologie et de télépathie, il a marqué l'imaginaire du Gâtinais. Peintre à ses heures, il signait ses toiles \"Loup de Sainville\".  En 1958, Alice et René Paroux habitent au Kremlin-Bicêtre dans un appartement assez modeste, à quelques encablures de Paris. René est entrepreneur de travaux publics et Alice soccupe des neuf enfants. Le Home Sweet Home est étroit, et mon grand-père recherche une résidence secondaire, avec bois et pièce deau. Comment tombe-t-il sur lannonce du Chasseur français, quil ne lit jamais. En tout cas, il saute sur loccasion et laventure commence.","architecture":"COURBEVAUX, au XIXe siècle, est à cette époque dans un piteux état : le château est « en état de vétusté », selon la terminologie de lacte de vente, délabré et insalubre, le parc mal entretenu malgré les « beaux arbres dessences diverses » et les douves quasiment sans eau. Corps de logis à deux niveaux sur soubassement à grandes baies sur pignon et façade accolé d'une tourelle carrée et d'une ronde, tour pentagonal   sur l'arrière crénelées.","habitants":"Emmanuel de Sainville et la famille Paroux\r\n        \"","divers":"A Saint-Germain-des-Prés le château de Courbevaux","gps":"","images":["../image/image_45/45_Courbevaux_1.jpg","../image/image_45/45_Courbevaux_2.jpg","../image/image_45/45_Courbevaux_3.jpg","../image/image_45/45_Courbevaux_4.jpg"]},"Consult_chateau_formulaire9e98":{"id":"Consult_chateau_formulaire9e98","dept":"45","canton":"Beaune-la-Rolande","commune":"Courcelles","nom":"Courcelles_le_Roy","type":"Château","periode":"XII-XIII-XV","histoire":"COURCELLES LE ROY  le château a subi, depuis sa construction primitive, de très importantes modifications. Il est certain qu'à l'emplacement actuel du château s'élevait, jadis, une demeure féodale d'une notable importance. De cette demeure primitive, il ne subsiste rien de nos jours, sinon le pavillon central avec mâchicoulis et les restes de fenêtres à meneaux. La porte donnant accès à la cour d'honneur est aussi un vestige de l'ancienne entrée fortifiée du château; les deux bâtiments ont été modifiés sous Henri IV ou Louis XIII par des revêtements de brique et de pierre, et si l'architecture militaire féodale apparaît dans les tours à poivrière et les mâchicoulis, ces éléments défensifs n'ont qu'un rôle décoratif. On y pénètre par la porte ouest donnant dans les appartements ou la porte Est donnant dans la cour d'honneur. Le principal appartement du château a toujours été désigné sous le nom de \"chambre du Roy\", et le domaine, depuis très longtemps, porte l'appellation de Courcelles-le-Roi. Aujourd'hui isolé, il surgit d'une façon d'autant plus féerique qu'il est en ruine, ses fenêtres s'ouvrant béantes sur l'extérieur. Ce lieu a été à l'origine un rendez-vous de chasse des Rois lorsqu'ils séjournaient à Boiscommun. Saint-Louis et Charles VIII y sont venus, dit-on. Au XVe siècle, le château appartenait à la famille de Braque. Il passa ensuite à la famille Lucas. Puis à Maurice Dupin, père de George Sand qui séjourna chez ses cousins, les Vallet de Villeneuve.C à la fin du XIXe siècle, il fut restauré par M. Casati de Casatis, conseiller à la cour de Paris et érudit. L'un des nouveaux propriétaires, M. Pierre Capitaine, après bien des vicissitudes, a entrepris des travaux de restauration et de consolidation de l'édifice.","architecture":"COURCELLES LE ROY  dit de Beaulieu, Il existe deux châteaux de Courcelles, souvent appelés Courcelles-le-Roi.  le château s'ordonne autour d'un quadrilatère. Trois corps de bâtiment entourent la cour intérieure. La façade sud-ouest présente un bâtiment du XVIIe siècle. Au centre se détache un pavillon qui semble dater de la même époque mais peut être un pastiche du XIXe siècle. Aux extrémités de cette façade ont été ajoutées, au XIXe siècle, des ailes terminées par des tours, celles du sud-est ayant été démolies au XXe siècle et remplacées par un pavillon. La façade nord-est présente une succession de trois pavillons reliés entre eux. Au centre, le \"châtelet\" a été modifié ou construit au XIXe siècle. Au nord se trouve la chapelle élevée à la fin du XVIIIe siècle. A l'ouest de ces bâtiments se trouvent les écuries, le colombier à lanternon et les communs avec la grange. Ce château est réduit à des pans de mur au milieu desquels seule a survécu une très jolie tourelle polygonale abritant l'escalier à vis.  Le château abandonné, a été en grande partie détruit volontairement au cours du XXe siècle et risquait une destruction totale.","habitants":"famille de Braque.\r\n        \"","divers":"A Courcelles le château de Courcelles le Roy dit de Beaulieu                               Courcelles  48° 05' 44\" nord, 2° 18' 49\" est","gps":"","images":["../image/image_45/45_Courcelles_le_Roy_1.jpg","../image/image_45/45_Courcelles_le_Roy_2.jpg","../image/image_45/45_Courcelles_le_Roy_3.jpg","../image/image_45/45_Courcelles_le_Roy_4.jpg","../image/image_45/45_Courcelles_le_Roy_5.jpg","../image/image_45/45_Courcelles_le_Roy_6.jpg"]},"Consult_chateau_formulaire250b":{"id":"Consult_chateau_formulaire250b","dept":"45","canton":"Ferrières-en-Gâtinais","commune":"Courtempierre","nom":"Courtempierre","type":"Château","periode":"XIV","histoire":"COURTEMPIERRE, bien que les restaurations abusives du XIXe siècle et l'amputation de son parc lui aient retiré son cachet, est une très ancienne demeure riche d'histoire. Dès 1357  Etienne Ferrant est seigneur de Courtempierre et le nom ne s'éteint qu'en 1472 lorsque Ameline Ferrant le porte dans la famille de Souplainville, dont la fortune grandit sous Louis XI, puis sous Louis XII puisque ce dernier vint chasser le cerf pendant quinze jours à Courtempierre. C'est là que les ambassadeurs de Machiavel trouvèrent Louis XII et commencèrent leurs négociations. Guillaume de Souplainville, qui succéda à son père en 1511. Sa fille, Catherine de Souplainville, épousa Jean du Moustiers, seigneur de Saragosse en Berry, conseiller et maître d'hôtel d'Eléonore d'Autriche, seconde femme de François 1er. Sa petite-fille Catherine épousa en seconde noce Claude de l'Isle, un huguenot qui combattit avec Henri III contre les Guise et mourut en duel au lendemain de l'assassinat du roi, son maître. Mais en 1585, il avait déjà vendu Courtempierre à Jacques Amyot, déjà célèbre en littérature, grâce à sa traduction de Plutarque. Il était évêque d'Auxerre, grand aumônier de France et précepteur des enfants de Henri II. A sa mort en 1593, Courtempierre passa à son frère Jean Amyot qui le transmit à son fils Nicolas en 1594. Sa petite-fille, Anne Amyot porta le château en dot à Alexandre de Lalande, seigneur de Corbeilles, les Lalane conservèrent le domaine jusqu'en 1775. Il fut vendu à Jean Corbin Duplessis, chef de la fruiterie du roi, qui le céda en 1779 à Charles Joseph, comte du Bellay.","architecture":"COURTEMPIERRE,(suite), le 17 juin 1789, le château fut acheté par Joseph-Parfait Amyot, l'arrière-petit-neveu de l'évêque d'Auxerre, qui ne fut pas inquiété à la Révolution et devint le premier maire de Courtempierre. A sa mort, il fut acheté par un notaire de Corbeilles, M. Salmon. De 1842 à 1872, il passa à Achille Michotte de Neile, originaire de Belgique. L'édifice fut acquis par une famille d'origine anglaise, les Wetthale, qui le restaurèrent selon le goût de l'époque. De nombreux propriétaires se sont succédé depuis. De plan rectangulaire corps de logis à deux niveaux avec série sur le toit brisé flanqué de part et autre d'un pavillon carré à deux niveaux  et lucarne sur comble et à l'opposé d'une tour ronde à trois niveaux avec lanternon, sur la façade plein cintre un avant corps d'entrée sur piliers supportant une terrasse.","habitants":"Famille de   Souplainville\r\n        \"","divers":"Château de Courtempierre","gps":"","images":["../image/image_45/45_Courtempierre_1.jpg","../image/image_45/45_Courtempierre_2.jpg","../image/image_45/45_Courtempierre_3.jpg"]},"Consult_chateau_formulaire438b":{"id":"Consult_chateau_formulaire438b","dept":"45","canton":"Pithiviers","commune":"Dadonville","nom":"Dadonville","type":"Château","periode":"XVII-XVIII-XIX","histoire":"Deux châteaux dans cet article de Dadonville; la Brosse et Solvins.\r\nBROSSE, du XVII-XIX situé au milieu d'un parc bien entretenu . Le château a été construit après 1665 par Louis Richer, seigneur de L'Isle. Mais l'histoire du château remonte au XIIIe siècle, on y trouve Hervé du Mez, fils du maréchal Nicolas du Mez. En 1645, Jean de Guéribalde, huguenot, l'achète et le revend à Louis Richer qui le reconstruit. Sa fille épouse Claude Raymond, seigneur d'Arfeuil, conseiller à la cour des Aides, leur fille, Jeanne Louise d'Arfeuil, épousera en 1731 Alexandre Duhamel, seigneur du château de Denainvilliers, c'est ainsi que les deux châteaux vont ensemble devenir célèbres grâce à la valeur des deux frères, Alexandre et Remi Duhamel, qui devaient s'illustrer dans les domaines de la botanique et l'agronomie. Ils sont les créateurs de l'agronomie moderne.","architecture":"BROSSE, du XVII-XIX siècle, le château est une grosse construction complétée de chaque côté par des additifs postérieurs. Il est construit sur un terre-plein entièrement entouré de douves en eau. Le corps de logis principal à un étage, présente une partie centrale en ressaut à trois fenêtres, surmontée d'un fronton triangulaire, c'est la partie la plus ancienne. Les deux ailes ont été rehaussées en 1868 d'un étage supplémentaire .                                                                    SOLVINS, un manoir du XVIIe siècle existait avant la construction de ce château situé au fond de la verdoyante vallée de l'uf. Le château de Solvins, composé d'un corps de logis rectangulaire encadré de deux imposants pavillons carrés, a été construit en 1850. On accède à la propriété par une belle allée de platanes qui longe la rivière, plantée par Fougeroux de Bondaroy, neveu de Duhamel du Monceau, en 1770. Accotée aux dépendances du château, la ferme de Solvins ordonne ses remarquables bâtiments autour d'une cour fermée.","habitants":"Brosse;  Louis Richer                                                                    Solvins;\r\n        \"","divers":"Deux châteaux de Dadonville; la Brosse grav-1-2 et Solvins grav-3-4.","gps":"","images":["../image/image_45/45_Dadonville_1.jpg","../image/image_45/45_Dadonville_2.jpg","../image/image_45/45_Dadonville_3.jpg","../image/image_45/45_Dadonville_4.jpg"]},"Consult_chateau_formulaire0748":{"id":"Consult_chateau_formulaire0748","dept":"45","canton":"Châtillon-Coligny","commune":"Dammarie-sur-Loing","nom":"Dammarie_Loing","type":"Château","periode":"XV-XVIII-XIX","histoire":"Trois châteaux dans  cet article de Dammarie ; Gervils, Mivoisin et Nailly.                                                                                                                              GEVRILS, construit à la fin du XVIIIe siècle, sinon au début du XIXe siècle, ce château, agrémenté d'un beau parc, se compose d'un logis à un étage flanqué de deux pavillons d'angle. Le rez-de-chaussée de la façade principale s'ouvre sur un long portique de style néo-palladien. C'est en 1897-1898 que le célèbre architecte Hector Guimard aménagea une salle à manger et une salle de billard à l'intérieur de ce château pour M. Albert Roy, pharmacien. Le décor intérieur comportait des vitraux qui se trouvent au musée d'Orsay. Quatre beaux arbres, d'une grande prestance, appartenant au domaine arboré, sont classés depuis 2009.                                                                                                                             MIVOISIN, le Domaine de Mivoisin rayonne autour de son château, construit au début du XVIe siècle à linitiative de Gaspard de Coligny, père du célèbre amiral protestant contemporain dHenri IV et victime du massacre de la Saint Barthélémy.Au fil dune histoire mouvementée, depuis les guerres de religion jusquà la révolution française, le domaine changera souvent de mains et son château, saccagé à plusieurs reprises, fera lobjet dagrandissements aux XVIIIe et XIXe siècles. Mivoisin devient en 1919 la propriété de Marcel Boussac, dont lempire industriel est en plein développement.\r\nSous la férule de ce grand entrepreneur, la taille du domaine sera multipliée par 10, pour approcher, en 1980, les 3600 hectares.Les chasses de Mivoisin acquièrent ainsi, sous la férule de Marcel BOUSSAC, une réputation mythique, que la famille propriétaire du Domaine perpétue depuis trois générations, tout en se consacrant à la valorisation de ce vaste patrimoine agricole, forestier et architectural.","architecture":"MIVOISIN,  se compose d'un corps massé cantonné de tours circulaires datable du XVe siècle, au XVIIIe siècle, on ajoute deux ailes en retour et le logis adopte un plan en U. Au XIXe siècle, on ajoute un petit bâtiment au sud du corps primitif, les communs datent du XVIIIe et du XIXe siècles. Le moulin originel, en partie détruit, n'est plus actif, il fonctionnait sur un bief du Loing. La machinerie, installée au XIXe siècle dans un nouveau bâtiment dit \"salle des machines\", a été restaurée au XXe siècle.                                                                                        NAILLY,  le bâtiment situé au sud et la tour circulaire semblent appartenir à un édifice ancien qui pourrait remonter au XVe siècle, un document d'archive du XVIIIe siècle signale le château de Nailly. L'édifice est reconstruit au XVIIIe siècle et présente un corps central flanqué de deux corps plus étroits, dans le quatrième quart du XIXe siècle, les murs sont enduits, les encadrements des baies sont refaits en brique. Dans la première moitié du XXe siècle un autre bâtiment est accolé au sud, couvert en terrasse il présente un toit à longs pans et croupe. Un des communs remonte au XVIIIe siècle, les écuries datent du quatrième quart du XIXe siècle.","habitants":"Gevrils ;  M. Albert Roy                                                             Mivoisin; M. Marcel Boussac \r\n        \"","divers":"Trois châteaux a Dammarie sur loing;  Gervils grav-5, Mivoisin grav1-2- et Nailly grav-4.                                                    Nailly  47° 47' 37\" nord, 2° 51' 44\" est","gps":"","images":["../image/image_45/45_Dammarie_Loing_1.jpg","../image/image_45/45_Dammarie_Loing_2.jpg","../image/image_45/45_Dammarie_Loing_3.jpg","../image/image_45/45_Dammarie_Loing_4.jpg","../image/image_45/45_Dammarie_Loing_5.jpg"]},"Consult_chateau_formulaire62f0-2":{"id":"Consult_chateau_formulaire62f0-2","dept":"45","canton":"Briare","commune":"Dammarie-en-Puysaye","nom":"Dammarie_Puysaye","type":"Forteresse","periode":"XIII-XIX","histoire":"DAMMARIE, le premier seigneur connu fut Narjod, seigneur de Feins en 1237, auquel on attribue la construction de la forteresse. En 1378, il fut acheté par Nicolas Braque, seigneur de Châtillon. Sa fille Jeanne épousa Pierre III de Courtenay. Jean V de Courtenay mena une vie de débauche et vendit douze châteaux, ne conservant que Dammarie. Sa statue équestre est restée au-dessus de la porte d'entrée du château avec sa devise: \"Et Puisaye, et Puisaye\". Guillaume 1er de Coligny, seigneur de Châtillon, l'acquit en 1451. Sa famille le conserva pendant deux siècles et le vendit en 1632 aux Fraguier de Rouville. En 1737, le château de Dammarie était racheté par la société du canal de Briare qui le laissa tomber en ruines. En 1838, le comte de Longthuis l'acheta, le restaura et y aménagea des écuries, un chenil et une grande partie de l'habitation. En 1944, les allemands l'incendièrent complètement. Ses ruines furent vendues en 1966 à la famille Marnier, qui entreprit sa restauration. Le château était flanqué de sept tours à l'origine, cinq sont encore visibles et une seule (donjon) a été bien conservée, inscription par arrêté du 1er octobre 1987.","architecture":"DAMMARIE, le château a conserve sa porte entre deux tours rondes à mâchicoulis toit en poivrières ainsi que deux autres tours d'angles avec une partie de l'enceinte, corps de logis sur soubassement à deux niveaux et lucarnes sur comble. L'amiral de Coligny habita cette demeure.","habitants":"L'amiral de Coligny     le comte de Longthuis  \r\n        \r\n        \r\n        \"","divers":"A Dammarie-en-Puisaye le château de Dammarie;         Dammarie  47° 37' 37\" nord, 2° 52' 20\" est","gps":"","images":["../image/image_45/45_Dammarie_Puysaye_1.jpg","../image/image_45/45_Dammarie_Puysaye_2.jpg"]},"Consult_chateau_formulaire2747":{"id":"Consult_chateau_formulaire2747","dept":"45","canton":"Ouzouer-sur-Loire","commune":"Dampierre-en-Burly","nom":"Dampierre_Burly","type":"Forteresse","periode":"XVII-XIX","histoire":"Trois châteaux dans cet article; Dampierre, Marchais-Creux, Noues st-Ythier et Verdier,  pas d'info pour Noues.                            DAMPIERRE , Au XVIIIe siècle, la seigneurie passa à Feydeau de Marville, puis fut  détruite à la Révolution. En 1826 M.de Behague, agronome, s'y installa et créa un domaine de 2.000 hectares. Il y mourut en 1884 à 80 ans. Il ne reste du château que le pavillon de l'horloge du XVIIe siècle qui sert d'entrée. Il appartient à M. de Ganay. Dans ce même pays, il faut aussi signaler le manoir de Marchais-Creux. Ses jardins, dit-on, avaient été dessinés par Le Nôtre. Un colombier du XVIe siècle témoigne de l'ancienneté du domaine. Mais la demeure elle-même date du XVIe siècle. Elle fut habitée pendant des siècles par les Rancourt, puis les Adhémar. Le corps présente une façade principale en pierre et une façade postérieure en pierre et briques sans décoration.  Au rez-de-chaussée, passage voûté en briques, en berceau avec arcs en pierre et pénétrations latérales en lunettes.  L'ensemble n'a pas été remanié. Inscription au M.H. par arrêté du 6 mars 1928.                                                                                      VERDIER, a été construit par Maxime du Verdier de la Sorinière. Appartenant à une noble famille angevine qui avait payé un lourd tribut aux guerres vendéennes, né en 1813 à Chemillé dans le Maine et Loire, il est devenu dampierrois par son mariage en 1842 avec Adélaïde de Rancourt, héritière d'une partie du domaine du Marchais -Creux. C'est sur les terres de son é
