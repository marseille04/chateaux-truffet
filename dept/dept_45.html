nut un éclat passager, pendant quelques années du XIIe siècle grâce à l'abbé Suger, qui en fit sa résidence favorite. Il fit reconstruire le château, le fortifia et le protégea en faisant creuser deux étangs qui forment aujourd'hui les douves. Il compléta son uvre en édifiant une vaste grange.","habitants":"famille Laperche\r\n        \"","divers":"A la Beaune-la-Rolande le château de Rochefort.","gps":"","images":["../image/image_45/45_Rochefort_45_1.jpg","../image/image_45/45_Rochefort_45_2.jpg"]},"Consult_chateau_formulaired750":{"id":"Consult_chateau_formulaired750","dept":"45","canton":"Puiseaux","commune":"Puiseaux","nom":"Rocheplatte","type":"Forteresse","periode":"XIII-XVIII","histoire":"ROCHEPLATTE, en 1385, il appartenait à Gilles d'Echainvilliers, chambellan du roi, qui le transmit à son fils Jean. Celui-ci combattit à Azincourt en 1415 et fut fait prisonnier par Jean sans Peur, il vendit sa seigneurie en 1430 à Guillaume Le Tur; son fils, Simon, conseiller au Parlement, mourut jeune et légua le château en 1450 à son fils Regnault, huissier d'armes de Louis XI. N'ayant pas d'enfant, passa à sa petite nièce, Gilette Henequin, qui la porta en dot à François d'Amours, Leur fils, Gabriel d'Amours vendit  en 1528 à Belin de Magnard. Ses enfants revendirent la seigneurie à Louis de Grailly, sieur de Chalette, en 1598. Cette famille la garda jusqu'en 1676. A cette époque, le château fut acheté par Pierre de Marolles, officier. Leur fils, Pierre II de Marolles, fut nommé comte de Rocheplatte en 1724.  Comme il mourut sans enfant, il légua son comté à sa cousine germaine, Jeanne de Sorcy, qui le légua à un cousin issu de germain du feu comte Pierre de Marolles: Philippe de Drouin de Bouville. Son fils, Florizel Louis de Drouin, comte de Rocheplatte, fut nommé, après la Révolution, maire d'Aulnay-la-Rivière. A la Restauration, en 1816, il fut nommé maire d'Orléans par Louis XVIII. En 1831, le château de Rocheplatte passa a son fils, Albert Florizel de Drouin, marié à Marie Adrienne de Crublier de Fougères. La comtesse de Rocheplatte transmit le château à sa fille, Luce de Monbel, qui devint comtesse de la Rochefoucault d'Estissac, qui le transmit à son fils Xavier, puis à sa petite-fille Solange, épouse du prince Paul Murat. C'est aujourd'hui leur fils, le prince Louis Murat, qui, aidé de son épouse Isabelle d'Harcourt, nièce du comte de Paris, a redonné vie et splendeur à cette demeure qui avait souffert de la dernière guerre.","architecture":"ROCHEPLATTE, C'est vers 1726 que le nouveau comte fit démolir la vieille forteresse et construire à sa place le château, un pont dormant descendant vers la cour d'honneur est porté par trois arches en anse de panier. Le logis se compose d'un bâtiment rectangulaire situé au fond de la cour, prolongé de deux ailes en retour. Le rez-de-chaussée présente, au centre, un fronton Louis XV, triangulaire, supporté par deux larges pilastres. Ce fronton est surmonté d'un pavillon et d'une lucarne Napoléon III. L'intérieur conserve une rampe d'escalier en fer forgé d'époque Louis XV, provenant d'un hôtel particulier parisien. Un salon est orné de boiseries Louis XV, ainsi qu'une grande chambre au premier et à l'est. Un souterrain voûté, sur plan deux fois cruciforme, se trouve au milieu de l'avant-cour. Il se compose d'une nef centrale divisée en cinq travées sur croisées d'ogives, et de deux transepts, donnant un plan en croix de Lorraine. Un puits au sud, du côté des douves, devait servir d'entrée primitive.   inscription par arrêté du 30 octobre 1973.","habitants":"Pierre II de Marolles,\r\n        \"","divers":"A Puiseaux le château de   Rocheplatte","gps":"","images":["../image/image_45/45_Rocheplatte_1.jpg","../image/image_45/45_Rocheplatte_2.jpg","../image/image_45/45_Rocheplatte_3.jpg","../image/image_45/45_Rocheplatte_4.jpg","../image/image_45/45_Rocheplatte_5.jpg"]},"Consult_chateau_formulaire1360":{"id":"Consult_chateau_formulaire1360","dept":"45","canton":"Outarville","commune":"Outarville","nom":"Rougemont_45","type":"Château","periode":"XVI-XX","histoire":"ROUGEMONT, était un fief d'Aschères et avait appartenu successivement aux familles de Linières, de Miramion, de Reilhac en 1500, de Bartz en 1538, de Boucard, à Philippe Hautemont ou Hauteman. En 1626, la seigneurie de Rougemont fut réunie à celle d'Aschères par un Beauclerc dont les descendants conservèrent Aschères tandis que Rougemont redevenait indépendant. En 1637, le roi Louis XIII passa par la Beauce pour se rendre à Orléans pour signer la paix avec son frère Gaston en révolte contre lui, il s'arrêta au château. Au XVIIIe siècle, Rougemont était propriété de François Delay de la Garde, puis de ses descendants. Cette demeure, qui était tombée dans l'abandon, a été restaurée en 1961 par un historien M. François Ribadeaux Dumas qui espérait retrouver les cryptes et souterrains qui sont creusés dans le calcaire, sous le château, comme cela arrive si souvent en Beauce.","architecture":"ROUGEMONT, bâtisse imposante, corps de logis rectangulaire à trois niveaux  toit en croupes et  avant corps d'entré en forme de tour de quatre niveaux  toit à quatre pans l'édifice est prolongé d'une aile sur la gauche.","habitants":"François Delay de la Garde\r\n        \"","divers":"A  Outarville le château de Rougemont","gps":"","images":["../image/image_45/45_Rougemont_45_1.jpg","../image/image_45/45_Rougemont_45_2.jpg","../image/image_45/45_Rougemont_45_3.jpg"]},"Consult_chateau_formulaire0d95":{"id":"Consult_chateau_formulaire0d95","dept":"45","canton":"Malesherbes","commune":"Malesherbes","nom":"Rouville","type":"Forteresse","periode":"XV-XIX","histoire":"ROUVILLE, au XIe siècle est inféodé à Robert de château Landon, elle fut reconstruite par Hector de Boissy, panetier de Charles VII, en 1430 la maison forte est prise par les anglais et incendiée, en 1492 reconstruit par Hugues de Boissy panetier du roi Charles VIII, Hugues mourut en 1499 en laissant son château à son fils Louis de Boissy, mort en 1528, sa pierre funéraire le représentant en armure se trouve dans la chapelle du château. Sa fille Jeanne épousa Hector le Cointe, et leur fille Catherine le Cointe épousa Antoine du Moulin. Leur fille Charlotte devint l'épouse du poète Jean de la Taille, seigneur de Bondaroy, en 1575. Mais auparavant en 1573, Antoine du Moulin avait cédé la seigneurie de Rouville à Guillaume Baillon qui la vendit en 1579 à Camille de Fera, gentilhomme italien. Cette famille conserva le château jusqu'en 1845. A la Révolution, l'un d'entre eux fut élu membre de l'assemblée départementale. Il était ami de Lavoisier et périt sur l'échafaud. Comme il n'avait pas d'enfant, le dernier comte, Jean-Victor de Fera, céda l'édifice en 1801 à son neveu Guyon de Guercheville. Son fils Florizel le vendit en 1846 à la famille d'Aboville, celle-ci le possède toujours.","architecture":"ROUVILLE, du XV-XIXe siècle, de style néogothique avec une galerie Renaissance flanquée d'une tour est ajoutée, sur la cour  était à l'origine pourvu d'une cour intérieure close. Il était constitué de deux corps de logis; l'un au nord, flanqué de quatre tours servait d'habitation et l'autre au sud qui servait de communs. les façades modifié par l'ajout de balustrades gothiques pinacles et écussons armoriés les communs étaient reliés par deux courtines qui fermaient la cour. A la Révolution, la courtine Est fut abattue et les fenêtres élargies. Puis au XIXe siècle, le comte Ernest d'Aboville fit restaurer le château par un élève de Viollet-le-Duc. Il fit édifier le long de la courtine Ouest une galerie de style Renaissance.","habitants":"Famille  de Camille de Fera   et  la famille d'Aboville\r\n        \r\n        \"","divers":"A Malesherbes le château de Rouville  48° 18' 16\" nord, 2° 24' 42\" est","gps":"","images":["../image/image_45/45_Rouville_1.jpg","../image/image_45/45_Rouville_2.jpg","../image/image_45/45_Rouville_3.jpg","../image/image_45/45_Rouville_4.jpg","../image/image_45/45_Rouville_5.jpg","../image/image_45/45_Rouville_6.jpg","../image/image_45/45_Rouville_7.jpg","../image/image_45/45_Rouville_8.jpg"]},"Consult_chateau_formulaire0cf7":{"id":"Consult_chateau_formulaire0cf7","dept":"45","canton":"Jargeau","commune":"Sandillon","nom":"Sandillon","type":"Château","periode":"XVI-XVIII","histoire":"Dans cet article quatre châteaux à Sandillon ; Allou, Bardy, Champvallin, les vestiges du château des Marais.                                                                                                                    ALLOU, du XIXe siècle, le vicomte Gabriel d'Orléans possédait aux Marais, un château fort ancien et fort beau. Il a été détruit après l'expulsion des princes. La plate forme portant la maison-forte médiévale a été transformée en une petite île au milieu d'un étang intégré au parc paysager. Une nouvelle demeure, composée d'un simple corps de logis à un étage carré, a été construite dans la première moitié du XIXe siècle sur ce domaine où un château était attesté depuis le haut Moyen-Age.                          CHAMPVALLIN,  construit au XVIIe siècle; aile sud-ouest au XVIIe siècle; aile nord-ouest détruite au milieu du XIXe siècle pour la construction du château actuel ; la cheminée des communs provient du Petit Marmogne à Sandillon et date du XVIe siècle. L'édifice est composé de deux étages carrés, le gros-oeuvre en calcaire; moellon; brique avec pierre en remplissage et enduit. Type de couverture: croupe; toit en pavillon, toit à longs pans; pignon recouverts d'ardoises. Parc boisé de 10 hectares. Cette terre formait autrefois deux paroisses distinctes; Saint-Patrice et Saint-Aignan. Au XVIIIe siècle, les de Champvallins étaient seigneurs justiciers de la première et les Autroches de la seconde. La demeure appartenait en 1910, à Monsieur René de la Loge, neveu de M. de Champvallins, conseiller municipal d'Orléans. Chambres d'hôtes.","architecture":"BARDY, date de la première moitié du XIXe siècle: d'allure très classique, avec son corps de logis prolongé de deux petits pavillons bas, il occupe l'emplacement d'une demeure seigneuriale (un Gilo de Bardiaco, Gilles de Bardy. En 1870, Bardy appartient à M. Martine. Pendant la deuxième guerre mondiale, le château a servi de cache à quelques précieuses antiquités égyptiennes du musée d'Orléans. En effet, Auguste Baillet, fameux égyptologue, élève de Maspéro, avait acheté, lors d'une mission archéologique au Caire, de nombreux objets pour le compte de l'abbé Desnoyers, conservateur du musée d'Orléans. À l'annonce de la déclaration de guerre, en septembre 1939, des objets avaient été transférés à l'abri au château de Bardy, échappant ainsi à la destruction. L'un des deux fils d'Auguste Baillet, Louis, qui se fit bénédictin dans la communauté de Solesmes, fut l'ami de Charles Péguy et son confident spirituel.                                            MARAIS   Cette élégante demeure, élevée au XVIIe siècle, présente un corps de logis à un étage carré, prolongé de deux petits pavillons en rez de jardin. On remarquera l'encadrement des baies en pierre de taille et les frontons cintrés des lucarnes en croupes. Le château des Marais, depuis sa construction, en 1753, appartient à la famille Brossard de Corbigny,","habitants":"Famille des de Champvallins                                                       Marais:  famille Brossard de Corbigny, \r\n        \"","divers":"A Sandillon quatre châteaux  Allou grav-1, Bardy grav-2, Champvallin grav-3,   les vestiges du château des Marais grav-4 ,    champs oudry grav-5                                                             Allou-47° 50' 16\" nord, 2° 02' 13\" est                                           Champvallin  47° 50' 46\" nord, 2° 00' 13\" est","gps":"","images":["../image/image_45/45_Sandillon_1.jpg","../image/image_45/45_Sandillon_2.jpg","../image/image_45/45_Sandillon_3.jpg","../image/image_45/45_Sandillon_4.jpg","../image/image_45/45_Sandillon_5.jpg"]},"Consult_chateau_formulaireafc0":{"id":"Consult_chateau_formulaireafc0","dept":"45","canton":"Jargeau","commune":"Sandillon","nom":"Sandillon_II","type":"Château","periode":"XVI-XVIII-XIX","histoire":"Trois châteaux dans cet article; la Porte et Puchesse, du Gamereau des XVIe, XVIIe et XVIIIe siècles; de Puchesse datant du XIXe siècle.                                                                                                                 PORTE, a été édifié à partir de 1776 , la chapelle achevée en 1785, construction commanditée par Claude de Loynes d'Autroche, homme de lettres, agronome, qui le légua à sa nièce la comtesse d'Orléans, il était en 1910 la propriété de la Vicomtesse d'Orléans.                                                                                                                GAMEREAU, le corps de bâtiment nord date du XVIIe siècle (antérieur à 1665). Puis, au début du XVIIIe siècle, la rénovation du château est entreprise;  on ajoute un corps de bâtiment sud, composé d'un pavillon et d'une seule travée de corps central, sans toucher à l'ancien château construit plus d'un siècle auparavant. Première piérre posée par le sieur Pierre Sainson le Jeune le 30 septembre 1721\".  En 1870, le domaine appartient à M. Marchand. Dans le parc on peut voir une ancienne glacière voûtée et un pigeonnier carré, couvert de tuiles plates, avec un randier en pierre.                                                                                                    PUCHESSE,  a appartenu au XVIIIe siècle aux Colas des Francs: en 1720, Robert Colas des Francs achète la terre et la seigneurie du Grand Puchesse au sieur Sergent qui la tenait depuis 1709 du sieur Boyet et de Mérouville. Sa fille Marie-Madeleine Colas des Francs dame de Puchesse épouse en 1723 Gabriel Baguenault qui devient ainsi seigneur de Puchesse.  Le château était en 1910 la propriété de M. Gustave Baguenault de Puchesse.","architecture":"La PORTE, cest en 1996 que les propriétaires actuels acquièrent le domaine. Le salon latéral, de style Louis XV, est orné de quatre dessus-de-porte en camaïeu bleu représentant des scènes galantes. Lambris exécuté après 1834. Le salon central, de style Empire, est orné de quatre dessus-de-porte en faible relief. L'ancienne salle à manger est ornée de quatre dessus-de-porte en terre cuite avec une niche sculptée en haut relief d'une femme versant de l'eau. La chapelle est couverte d'une voûte peinte d'un décor céleste. Les communs actuels, construits entre les deux guerres, remplacèrent ceux achevés en 1876   Le domaine de La Porte comprenant un château du XVIIIe siècle, une chapelle et un parc, est situé sur les communes de Sandillon et de Saint-Cyr-en-Val  classement par arrêté du 20 octobre 1995.                                                                                                                      PUCHESSE, le château actuel a été reconstruit au XIXe siècle, de style classique c'est une belle demeure à un étage carré et étage de combles éclairés de lucarnes en croupes, composée d'un corps de logis prolongé de deux ailes symétriques. Dans le parc, une petite chapelle dont l'acte de fondation est daté de 1640. Le parc abrite également de belles dépendances et une orangerie.","habitants":"Puchesse ; famille des Colas des Francs               Porte;Claude de Loynes d'Autroche\r\n        \"","divers":"Trois châteaux à Sandillon; la Porte grav-4 et Puchesse grav 5. de  du Gamereau grav-2-3,   Bruel grav-1   de Sculas grav-6                                                                                          La porte  47° 49' 11\" nord, 2° 00' 15\" est","gps":"","images":["../image/image_45/45_Sandillon_II_1.jpg","../image/image_45/45_Sandillon_II_2.jpg","../image/image_45/45_Sandillon_II_3.jpg","../image/image_45/45_Sandillon_II_4.jpg","../image/image_45/45_Sandillon_II_5.jpg","../image/image_45/45_Sandillon_II_6.jpg"]},"Consult_chateau_formulaire1ea5":{"id":"Consult_chateau_formulaire1ea5","dept":"45","canton":"Courtenay","commune":"Courtenay","nom":"Selle_sur_Bied","type":"Château","periode":"XVII","histoire":"La SELLE  sur le BIED,  construit en 1645. Le comté de la Selle appartint à la famille de Saulx-Tavannes en 1641 puis à un d'Aquin en 1695, aux familles du Deffand et enfin de Bethisy. Vendu comme bien national, une papeterie est installée dans le château. Vers 1835, la demeure est achetée par Alexandre Pelletier notaire à la Selle sur le Bied, sa fille Amanda épouse Amédée Perrier, également notaire. En 1906, à la mort dAmédée, le château revient à son fils, Alexandre Perrier, procureur à Montargis. Il entreprend des travaux,  En 1935, il laisse lusufruit à sa veuve. Celle-ci meurt en 1940 sans héritier direct. Le château revient à Gabrièle Duché, épouse de Henri Sédillot. Cette famille Sédillot a donné un maire de Montargis, un officier et un économiste, M. René Sédillot en est le propriétaire actuel.","architecture":"La SELLE  sur le BIED construit en 1645, est formé d'un grand corps de bâtiment flanqué de deux pavillons carrés aux toitures élevées. Alexandre Perrier, procureur à Montargis. Il entreprend des travaux, relève la charpente, ajoute un étage, et transforme les perrons qui deviennent parallèles à la façade.  Entouré de douves sur trois côtés, le château est baigné au sud par La Cléry. Le corps de bâtiment, qui était d'un seul niveau à l'origine, est flanqué de deux pavillons plus élevés. Modénature de maçonnerie de pierre avec chaînages et encadrements de briques apparentes. A l'ouest, le château est précédé d'une esplanade dont il est séparé par un pont ancien qui franchit les douves. inscription par arrêté du 1er octobre 1963.","habitants":"famille Sédillot\r\n        \"","divers":"Courtenay le château de la Selle sur le  Bied","gps":"","images":["../image/image_45/45_Selle_sur_Bied_1.jpg","../image/image_45/45_Selle_sur_Bied_2.jpg"]},"Consult_chateau_formulaire0eb4":{"id":"Consult_chateau_formulaire0eb4","dept":"45","canton":"La Ferté-Saint-Aubin","commune":"La Ferté-Saint-Aubin","nom":"Sennely","type":"Château","periode":"XVIII-XIX","histoire":"TURPINIERE, au  XIVe siècle appartenait aux seigneurs de la Turpinière, les terres , autrefois dépendait du château de Sully à la puissante famille de la Trémoille, au XVe siècle à des membres de la famille de Guierlay. Construit à la fin du XVIe siècle par la famille de La Rable, la Turpinière était habitée vers 1660 par Silvine de La Rable et Charles de Moulins, lieutenant des gardes du corps du duc d'Orléans. Saisie en 1678, le château appartenait à la fin du règne de Louis XV à René Trossard, chef du gobelet du roi, qui en négligea l'entretien. Jérôme Massuau de Villars, ancien président des consuls d'Orléans, l'acquit en 1774 et le fit restaurer, à sa mort, le domaine passe à son neveu François-Auguste Prouvensal de Saint-Hilaire, le transmet à son fils le célèbre botaniste sans postérité léguera à sa nièce épouse d'Edmé-Philippe Aubépin de Lamothe Dreuzy, toujours dans cette famille,   inscription au M.H. par arrêté du 20 octobre 1989.","architecture":"TURPINIERE,  du XVIIIe siècle, construit en briques décorées de motifs losangés, entouré de douves élargies en une succession d'étangs bordés de cyprès chauves et de rhododendrons arborescents, le château a conservé tout le charme et l'authenticité des demeures anciennes de Sologne. Le corps de logis est encadré d'étroits pavillons saillants à travée unique. De l'autre côté il est précédé d'un terre plein rectangulaire terminé par des tourelles carrées, flanquées des pavillons d'angle. Au delà des douves s'étend une cour gazonnée, bordée de dépendances basses dont les matériaux, briques et tuiles, expriment toutes les nuances de couleurs, de l'ocre au rose, dans une belle harmonie de tons. La chapelle néo-classique a été reconstruite à partir de 1805, à l'extérieur des douves.                                                  COURTAIL;  du XIXe siècle,  du Courtail ou de Courtaille, haute demeure en brique à décor de pierre flanquée d'un petit bâtiment couvert d'un toit à la Mansart, a été construit en 1874 par l'architecte orléanais François Narcisse Pagot pour Eugène Colas des Francs. Il a ensuite appartenu à son fils, Paul Colas des Francs, maire de la commune de Sennely, élévation à travées à deux étages, toit à longs pans ; croupe en  ardoise.","habitants":"Tupinière; Famille de la Rable.                                                       Courtail; Eugène Colas des Francs.\r\n        \"","divers":"A  La Ferté-Saint-Aubin , Courtail grav-1 et  Turpinière grav-2-3-4                                                                                   Turpinière  47° 42' 48\" nord, 2° 06' 10\" est","gps":"","images":["../image/image_45/45_Sennely_1.jpg","../image/image_45/45_Sennely_2.jpg","../image/image_45/45_Sennely_3.jpg","../image/image_45/45_Sennely_4.jpg"]},"Consult_chateau_formulaire1ef7":{"id":"Consult_chateau_formulaire1ef7","dept":"45","canton":"Sully-sur-Loire","commune":"Sully-sur-Loire","nom":"Solaire","type":"Forteresse","periode":"XIX","histoire":"SOLAIRE, date du XIXe siècle, sa construction a été effectuée entre 1867 et 1870 par Madame Blanchet après le décès de son mari en 1857, avec lequel elle s'était rendue propriétaire d'une maison de maître d'une douzaine de pièces. Ces deux tiers des éléments d'origine, intégrés au château, résultaient déjà de la transformation d'une maison d'habitation cédée en 1772 par le duc de Sully qui venait de l'acquérir, à Pierre François Villoing. À la mort de ce dernier, vingt ans plus tard, son neveu Jean François Amal, notaire à Sully, qui avait présidé en 1789 l'assemblée des habitants de Bonnée, pour la rédaction des cahiers de doléances adressés au Roi, reprit la propriété.","architecture":"SOLAIRE, aujourd'hui est constitué d'un corps central à un étage, flanqué de deux pavillons carrés de même hauteur, offrant au milieu de sa façade une tourelle semi-octogonale servant d'entrée. Le pavillon d'accès fut construit en 1854, simultanément à l'aménagement d'un parc créé par Eugène Bühler, architecte paysagiste, avec l'aide de son frère Denis.","habitants":"Madame Blanchet\r\n        \"","divers":"A Sully-sur-Loire le château de Solaire","gps":"","images":["../image/image_45/45_Solaire_1.jpg"]},"Consult_chateau_formulaire7293":{"id":"Consult_chateau_formulaire7293","dept":"45","canton":"Meung-sur-Loire","commune":"Meung-sur-Loire","nom":"St_Ay","type":"Château","periode":"XVIII-XIX","histoire":"Trois châteaux dans cet article ; la Herse, Voisins et Grande Maison.                                                                                                                        La HERSE, du XIXe siècle en bordure de Loire, entre Fourneaux et Saint-Ay, on peut apercevoir ce château dont la façade présente un ordonnancement très symétrique: le corps de logis central, auquel on accède par une belle terrasse à balustrade, est flanqué à chaque extrémité d'un pavillon coiffé d'un toit en croupe, auquel est accolé un pavillon couvert d'une terrasse. Au XIXe siècle, le peintre Gaston Hochard, né à Orléans en 1863, propriétaire de la demeure y a installé un atelier dans lequel il vient peindre durant l'été, ce peintre d'histoire et d'architecture a traité de scènes de la vie parisienne élégante, ses tableaux sont aujourd'hui recherchés.                                                                      GRANDE-MAISON, du XVIIIe siècle depuis 1601 cet ancien relais de chasse, est un très agréable domaine des bords de Loire avec une pièce d'eau qui donne vie à un parc arboré.                                                                                 St_Ay   François Rabelais (v.1490-1553), médecin et écrivain humaniste français, fit de fréquents séjours au château.","architecture":"GRANDE MAISON, les constructions sont de style variés, la maison principale comporte un étage avec un toit à mansardes couvert d'ardoises. Les communs au contraire ont des toitures de vieilles tuiles. L'histoire locale a retenu que cette belle demeure, placée sur la route d'Orléans à Meung-sur-Loire, a servi de halte à Madame de Pompadour qui s'arrêtait pour une collation lorsqu'elle se rendait à son château de Ménars. Le jardinier-paysagiste André Le Nôtre dessina les jardins de ce magnifique parc arboré de quatre hectares.                                                                                                         VOISINS  du XIXe siècle le château actuel est l'ancienne demeure de l'abbesse de la célèbre abbaye de Voisins dont il ne subsiste rien d'autre. C'était un couvent de femmes de l'ordre de Citeaux qui comptait parmi elles des jeunes filles de grande noblesse. Au XVIIe siècle, les religieuses adhérèrent au jansénisme et de nombreuses religieuses de Port-Royal vinrent à Voisins. Mais cette orientation hâta sa chute et le couvent fut fermé en 1774. Mais la disparition ne fut effective qu'en 1778, après la mort des dernières religieuses. Le château est entouré d'un parc que sillonne  les mauves, Il est orné d'un grand bassin alimenté par la \"Fontaine des Nonnes\".Beppo di Massimi (1875-1961), industriel de l'aéronautique italien puis français, a vécu  est mort au château de Voisins.","habitants":"La Herse : le peintre Gaston Hochard\r\n        \"","divers":"A Meung-sur-Loire; la Herse-2-3, Voisins grav-5-6 et Grande Maison grav-4.","gps":"","images":["../image/image_45/45_St_Ay_1.jpg","../image/image_45/45_St_Ay_2.jpg","../image/image_45/45_St_Ay_3.jpg","../image/image_45/45_St_Ay_4.jpg","../image/image_45/45_St_Ay_5.jpg","../image/image_45/45_St_Ay_6.jpg"]},"Consult_chateau_formulaired390":{"id":"Consult_chateau_formulaired390","dept":"45","canton":"Gien","commune":"Gien","nom":"St_Brisson_Loire","type":"Forteresse","periode":"XII-XIX","histoire":"SAINT-BRISSON, au XIIe siècle, elle est déjà une place forte importante pour opposer une sérieuse résistance à l'armée de Louis VI, venu réprimer l'insolence du seigneur pillard de Saint-Brisson. L'abbé Suger écrit en 1137, \"après avoir incendié l'habitation seigneuriale, Louis VI Le Gros sera contraint d'assiéger la tour pour forcer la reddition du brigand\". L'habitation seigneuriale se trouvait au sud du château, dans l'enceinte, protégée par des constructions défensives. Au XIIIe siècle, le château revint à Thibaut, comte de Champagne et de Sancerre. En 1290, Jeanne de Sancerre le porta en dot à Jean de Courtenay, cette famille le vendit plus tard à Juvénal des Ursins, archevêque de Reims, qui le légua à son frère Guillaume Juvénal des Ursins, chancelier de France en 1445. Par alliance, il appartint aux maisons d'Amboise, de Beaujeu, de Clèves-Nevers. Puis Henriette de Clèves l'apporte en dot en 1565 à Ludovic de Gonzague qui le vendit alors avec Autry le Châtel en 1567 à Pierre Séguier, président du Parlement de Paris. Pierre II, puis Pierre III lui succédèrent et Louis XIV érigea la terre en marquisat. En 1793, Nicolas-Maximilien Séguier, marquis de Ranst de St-Brisson voulant effacer tout souvenir des prérogatives seigneuriales  fait abattre le donjon et la courtine sud. Abandonné depuis la Révolution, en 1819 son descendant le fait restaurer. Habité jusqu'en 1987 il fut légué par son dernier propriétaire Anne de Ranst de Berchem à la commune de Saint-Brisson. Aujourd'hui propriété de monsieur Guyot.","architecture":"Saint-BRISSON, du XIXe siècle, construite en surplomb d'un ancien bras de la Loire, la forteresse, grâce à sa forme hexagonale de 150 mètres de développement rondes ou quadrangulaires, toutes les ouvertures sont repercées ou créées en fonction de la nouvelle distribution intérieure, modifiée au goût du jour (salle à manger néo-gothique ; salon de style Louis XVI). Les tours carrées, arasées, prennent l'allure de pavillons. La façade sur cour de l'aile nord-est, traitée dans un style néo-classique, correspond à un état de la fin du XIXe siècle. Le parc, avec ses allées droites, ses canaux délimitant un parterre et son plan d'eau, correspond à un aménagement de la fin du XVIIIe siècle. Il a gardé son caractère campagnard et libre de tout alignement. Le chemin ombragé est courbe et nous laisse devant le pont de pierre qui enjambe les douves. En 1987, sous la responsabilité de la municipalité, une association vit le jour, les \"Amis du château de Saint Brisson\". Avec ardeur ils se mirent au nettoyage et à la restauration des pièces qui seront ouvertes à la visite en Mai 1988.   Inscription par arrêté du 7 avril 1993.","habitants":"marquis Nicolas-Maximilien Séguier\r\n        \r\n        \"","divers":"A Gien le château de St-Brisson  47° 39' 00\" nord, 2° 40' 56\" est","gps":"","images":["../image/image_45/45_St_Brisson_Loire_1.jpg","../image/image_45/45_St_Brisson_Loire_2.jpg","../image/image_45/45_St_Brisson_Loire_3.jpg","../image/image_45/45_St_Brisson_Loire_4.jpg","../image/image_45/45_St_Brisson_Loire_5.jpg","../image/image_45/45_St_Brisson_Loire_6.jpg","../image/image_45/45_St_Brisson_Loire_7.jpg"]},"Consult_chateau_formulaire5af2":{"id":"Consult_chateau_formulaire5af2","dept":"45","canton":"Saint-Jean-le-Blanc","commune":"Saint-Cyr en Val","nom":"St_Cyr_en_Val","type":"Château","periode":"XIV-XVI-XVII-Xix","histoire":"Saint-Cyr en Val on peut voir sept châteaux ; Reyville,  , Gautray Morchêne et de Viéville.                                                                               GAUTRAY, du XVIIIe siècle, en 1525, le château de Cormes fut restauré dans le style Renaissance sur les ruines d'une forteresse détruite par la guerre de cent ans. Le château fut reconstruit au XVIIIe siècle, le logis est entouré de douves. La chapelle est construite en retour d'angle au nord du corps de logis, elle est orientée vers le nord. Au XIVe siècle, ce domaine appartenait à Guillaume Le Breton, puis au XVe à Jehan de l'Espiney. Le château de Gautray passa ensuite par alliance à Guillaume Compain, dont la fille Marguerite épousa en 1600 Jehan Saichet d'Espiney. Durant la Révolution le domaine de Gautray appartenait à Claude de Loynes qui fut attaqué en 1795. En 1801, celui-ci partagea ses biens entre ses quatre enfants dont une fille. Parmi les descendants de cette dernière, une fille épousa un Colas des Francs, descendant de Guillaume Compain créateur du domaine de Gautray. La demeure a été détruite en 1765 par un incendie, et reconstruite.                                                                                          MORCHENE,  ce domaine de 75 hectares est une propriété communale depuis 1988. Le château a été construit en 1904 pour le compte de la famille Colas des Francs. Le Morchêne affluent du Dhuy, donne son nom à cette propriété. Il alimente l'étang situé au coeur du parc et rejoint ensuite le Loiret au Parc Floral d'Orléans, la Source, dans le parc, des sentiers de promenade sont autant d'occasion de balades, de nombreux équipements de loisirs sont disponibles. Le parc a été retenu comme site d'accueil d'une partie de la Collection Nationale d'Iris.","architecture":"La MOTTE, du XIV-XXe siècle, construit par Jean II de Vailly à la fin du XVe siècle, situé près du Dhuy, a été totalement démoli vers 1780 et ses douves comblées. Seul le colombier, daté de 1703, subsiste au fond du jardin. Vers 1864, Ludovic Colas des Francs fait bâtir une nouvelle demeure toute en brique à proximité du vieux château, il a été racheté par la commune. Il héberge un centre aéré pendant les vacances scolaires et le parc est ouvert au public, on peut y découvrir un joli pigeonnier. Les dépendances sont réservées aux association.                                                                                   REYVILLE, du XIXe siècle était l'une des propriétés de plus de cent hectares qui occupait près des trois cinquième de la commune de Saint-Cyr-en-Val. Le domaine et château construit en style néo-Louis XIII, appartenaient à la fin du XIXe siècle à Jean Raguenet de Saint Aubin.","habitants":"Gautray; Claude de Loynes                                                             la Motte;Jean II de Vailly                                                              Reyville;  Jean Raguenet de Saint Aubin.\r\n        \"","divers":"Saint-Cyr en Val on peut voir sept châteaux ; Reyville grav_7,   Gautray grav--6, Morchéne grav-1_2 e.  la Motte grav  -3                                                Morchène   47° 49' 36\" nord, 1° 58' 03\" est                                          La Motte 47° 50' 01\" nord, 1° 58' 39\" est","gps":"","images":["../image/image_45/45_St_Cyr_en_Val_1.jpg","../image/image_45/45_St_Cyr_en_Val_2.jpg","../image/image_45/45_St_Cyr_en_Val_3.jpg","../image/image_45/45_St_Cyr_en_Val_4.jpg","../image/image_45/45_St_Cyr_en_Val_5.jpg","../image/image_45/45_St_Cyr_en_Val_6.jpg","../image/image_45/45_St_Cyr_en_Val_7.jpg"]},"Consult_chateau_formulaireca32":{"id":"Consult_chateau_formulaireca32","dept":"45","canton":"Châteauneuf-sur-Loire","commune":"Châteauneuf-sur-Loire","nom":"St_Denis_en_Val","type":"Vestiges, château","periode":"XIII-XIV","histoire":"MELLERAY, appartenait en 1689 aux sieurs et dame Chemin, puis à leurs enfants. Elle fut ensuite à Pierre Doillet, seigneur de Saint Aignan et Josèphe de Védye, son épouse, qui la cédèrent à Jacques Nicolas Picault, lequel s'en disait seigneur en 1755. En 1758, Melleray appartenait à Philippe Desnuelles, l'édifice passa à Marguerite Desnuelles, sa petite-fille, épouse de Pierre Dehérain, possesseur en 1791, puis à Émilie Dehérain, femme de Pierre de Vésien. Louise de Vésien, leur fille et Gabriel Bidault de Montot, son mari, le vendirent en 1798 à Antoine Doisnel qui s'en dessaisit en 1808, au profit de Jean-Jacques Louet. Le château fut reconstruit vers 1840 par Cosme Louet de Terrouenne, qui fut maire de Saint-Denis en Val de 1849 à 1872. Il occupe l'emplacement d'anciennes îles, celui de bras de Loire utilisés par les eaux aux moments des crues, et une partie du lit majeur où coulait le fleuve du XVe siècle. Le baron Petier acheta le domaine avant qu'il ne soit vendu en 1961 à la Safer qui le morcela.  \r\n BOUCHET, le 28 avril 1429, Jeanne d'Arc s'arrête sur la rive gauche de la Loire avec sa troupe, près du port du Bouchet. De là elle traverse la Loire pour délivrer Orléans. Ce port placé sur un bras de la Loire était alors très actif grâce au commerce des vins, favorisé par l'importance de la navigation sur le fleuve, le vin était recueilli dans les environs d'Orléans jusqu'au coup fatal porté par le phylloxéra à la fin du XIXe siècle. Le château accueille une maison maternelle de bienfaisance durant l'occupation. La directrice Mme Henriette de Mornac, accepte que cette institution serve de relais pour des enfants juifs malgré les risques encourus. Elle a reçu en 1979 le titre de \"Juste parmi les Nations\".","architecture":"Les ruines du château de l'ISLE sont situées dans la partie nord-est du territoire de la commune de Saint-Denis-en-Val, Vestiges, la construction du château débute en 1530, à l'initiative du bailli d'Orléans Jacques Groslot, chancelier de Marguerite de Navarre et propriétaire de lÎle aux Bourdons, une terre isolée par les eaux seulement lors des crues et située dans l'enclave de la paroisse de Chécy. En 1535, Groslot se voit autorisé par le roi de France François Ier à construire un pont-levis. Jacques Groslot résigna ses fonctions de bailli dOrléans en 1545, 7 ans avant son décès ; elles étaient héréditaires et son fils Jérôme lui succéda. En 1560, arrêté avec Condé, Jérôme est sauvé par le décès de François II dans lhôtel Groslot.  En 1570, déchu et condamné pour crime de lèse-majesté, Jérôme Groslot est finalement gracié en 1571 , cependant il périt à Paris en 1572 dans le massacre de la Saint-Barthélemy. En 1751, le domaine sort des propriétés des Groslot et de leurs descendants. En 1794, François-Luc-Pierre Jacques de Mainville, négociant d'étoffes indiennes, devient propriétaire. En 1829, le domaine de lIsle qui appartient à Louët de Terrouenne, maire de Saint-Denis-en-Val, est en partie rattaché à cette commune. En septembre 1866, les eaux de la Loire en crue font céder la levée à 150 mètres du château qui, déjà en mauvais état, est alors en grande partie détruit.  L'association acquiert le château le 31 mars 2010, est inscrit à linventaire supplémentaire en 1925.","habitants":"Merleray famille de Philippe Desnuelles,                                      d l'Isle; Jacques Groslot\r\n        \"","divers":"A Châteauneuf-sur-Loire château du Bouchet grav 4-5 ; de la Melleraygrav-6 et vestiges du château de L'isle grav 1-2-3 Bonnevaux grav-7","gps":"","images":["../image/image_45/45_St_Denis_en_Val_1.jpg","../image/image_45/45_St_Denis_en_Val_2.jpg","../image/image_45/45_St_Denis_en_Val_3.jpg","../image/image_45/45_St_Denis_en_Val_4.jpg","../image/image_45/45_St_Denis_en_Val_5.jpg","../image/image_45/45_St_Denis_en_Val_6.jpg","../image/image_45/45_St_Denis_en_Val_7.jpg"]},"Consult_chateau_formulaire06ed":{"id":"Consult_chateau_formulaire06ed","dept":"45","canton":"Châteauneuf-sur-Loire","commune":"Châteauneuf-sur-Loire","nom":"St_Denis_Hotel","type":"Château","periode":"XVII-XVIII- XIX","histoire":"deux châteaux dans cet article ; Chenailles et St-Aignan. CHENAILLES,  du XVIIe siècle,   le château appartenait au XVIe siècle à Geoffroy et François Vallée en 1635 puis à Claude. Il passa en 1693 à Jacques Fête, commissaire ordinaire des guerres, qui le céda en 1696 à Louis Fête de Noisi, grand maître des Eaux et Forêts d'Orléans, qui vendit la propriété en 1719 à Mlle Constance Eléonore d'Estrée, mariée au Comte d'Ampus. Il fut vendu en 1735 à Mlle Sauveur qui le légua à Joly de Fleury, procureur général au parlement,qui le garda jusqu'à la Révolution et lui donna son aspect actuel. Les rois de France venaient souvent à Chenailles. La grille est flanquée de deux piliers surmontés de lions héraldiques présentant les armoiries, le parc a été dessiné par Le Nôtre. A l'intérieur était conservé un boudoir orné de boiseries sculptées datant de 1610. Sur les panneaux étaient peintes des scènes d'amours de Renaud et d'Armide dues au pinceau de Simon Vouet. Tout ce décor a été vendu au début du siècle, puis exposé a Paris en 1962 et orne le musée américain de Tolédo aujourd'hui.","architecture":"St-AIGNAN,  du XIXe siècle, construit à partir de 1866, sur les plans de l'architecte parisien Clément Parent, à l'initiative de M. et Mme Seurrat de Loynes de Morette, le château de Saint-Aignan jouit d'une vue unique sur la Loire et son val, formé au premier plan par Jargeau et Saint Denis de l'Hôtel. La construction de ce château du nom du saint patron protecteur de la famille de Loynes de Morette qui en avait gardé les reliques pendant la Révolution, dura trois ans sous la direction d'Alfred de Bengy de Puy-Vallée. La difficulté de l'arrivée des pierres, consécutive à la crue du fleuve en 1866, y apporta quelque retard, et ce n'est que le 26 août 1869 que fut bénie la chapelle de style néo-Renaissance, aux voûtes élevées, ornées de clefs où l'on voit les armoiries de la famille. Les jardins furent aménagés par Lebreton, paysagiste à Orléans. C'est malheureusement à la suite d'un incendie, survenu en février 1941, que l'ensemble de la toiture a disparu et a été remplacé par une terrasse avec acrotère.","habitants":"Chenailles:  Joly de Fleury                                  St-Aignan; Famille de Seurrat de Loynes de Morette\"","divers":"deux châteaux  à Châteauneuf-sur-Loire; Chenailles grav-1-2  e t St-Aignan grav-3-4.                              Chenailles  47° 52' 22? nord, 2° 09' 27? est                                          St-Aignan  47° 52' 31? nord, 2° 06' 13? est","gps":"","images":["../image/image_45/45_St_Denis_Hotel_1.jpg","../image/image_45/45_St_Denis_Hotel_2.jpg","../image/image_45/45_St_Denis_Hotel_3.jpg","../image/image_45/45_St_Denis_Hotel_4.jpg"]},"Consult_chateau_formulaireb58c":{"id":"Consult_chateau_formulaireb58c","dept":"45","canton":"Château-Renard","commune":"Château-Renard","nom":"St_Firmin_Bois","type":"Château","periode":"XVIII-XIX","histoire":"Deux châteaux dans cet article, Frélats et la Vallée.                      FRELATS, du XVIIIe siècle, à quelques kilomètres au nord de Château-Renard, le château des Frelats est situé au milieu des bois et agrémenté d'un étang. Cet élégant château comprend des bâtiments disposés en U à un étage, surmonté d'une belle couverture à la Mansart. Auprès de la maison se trouvent des dépendances, des écuries et une orangerie. Sa construction devrait remonter à la fin du XVIIe siècle, car, une branche de la famille des seigneurs du Grand Courtoiseau à Triguères y résidait en 1672. En 1675, Anne Françoise Picot de Combreux y décéda sous le nom de dame des Frelats. Au début du XIXe siècle, le colonel François Chaud, ancien officier de l'Empire, racheta Les Frelats et devint maire du village.","architecture":"La VALLEE, du XIXe siècle, cette imposante demeure, de style classique à deux étages, est précédée d'une vaste terrasse à ballustrades qui s'étend sur toute sa longueur. Le château a été bâti vers 1809 pour Charles Claude François Blondet de la Blossière, lieutenant général de police du baillage royal de Chateaurenard jusqu'au rachat des charges par M. de Fougeret (propriétaire du château de la Motte) en 1773. M. Blondet de la Blossière, d'une vieille famille de bourgeois et de gens de robe, était connu après la Révolution comme journaliste à Montargis où il avait fondé le \"journal du district de Montargis ou L'Eclaireur\" qui n'eut qu'une brève durée. A la suite du décès de son fils, chef de bataillon au 1er régiment d'artillerie, survenu en 1812 à Vilna (en Russie) M. Blondet de la Blossière légua son château de la Vallée à sa cousine Marie Thèrèse de Beaubois des Grandmaisons épouse de François Guiller de Mont Charmoy ancien président du tribunal de Cosne.","habitants":"Frélats:  Anne Françoise Picot de Combreux                          La Vallée;Charles Claude François Blondet de la Blossière\r\n        \"","divers":"Deux châteaux à Château-Renard , Frélats  grav-1  et la Vallée_grav 2.","gps":"","images":["../image/image_45/45_St_Firmin_Bois_1.jpg","../image/image_45/45_St_Firmin_Bois_2.jpg"]},"Consult_chateau_formulaire8295-2":{"id":"Consult_chateau_formulaire8295-2","dept":"45","canton":"Courtenay","commune":"St-Hilaire-Puisseaux","nom":"St_Hilaire_Andrésis","type":"Château","periode":"XVII-XIX","histoire":"Deux châteaux à St-Hilaire ; Montalan et Ratelet.                                          MONTALAN, du XIXe siècle, le château actuel, moderne, remplace une construction plus ancienne. Ce château-fort avait été pris par les Anglais en 1428, mais il fut repris par Philippe de Ville Châtel, sieur de Talan, qui prit le nom de Montalan par ordre royal et conserva le château qu'il transforma. Le château de Montalan est construit dans un site verdoyant et domine la petite rivière de la Cléry qui serpente entre Courtenay et Ferrières. La maison actuelle est agréable à habiter. Elle a été construite sur un terre-plein de forme rectangulaire qui correspond à une ancienne plate-forme d'une forteresse.","architecture":"RATELET, du XVIIe siècle la composition en est très harmonieuse: un corps de logis à toit en croupe flanqué de deux pavillons à toit en croupe brisée puis, un peu écartés, deux pavillons à toit en pavillon. Le pavillon de droite est un ancien rendez-vous de chasse. Il y avait là au Moyen-Âge un important prieuré, pendant la guerre de cent ans les troupes anglaises de Robin Canolle incendient et pillent le prieuré. Par la suite, ce fief échoit à la famille seigneuriale de Courtenay, les Boulainvilliers. Charlotte de Boulainvilliers épouse Claude Cordelle, c'est sans doute à lui que l'on doit le Ratelet actuel, édifice de style Louis XIII, bâti entre 1610-1643. En 1738, Gabriel René Mesnil est propriétaire et fait planter des arbres tout autour, à la place des vignes en 1748. Son fils, Gabriel Jacques Mesnil le reçoit par succession, il y meurt en 1783 sans enfant. Le colombier circulaire est une survivance de la tour du fief et de l'habitat du XVIe siècle.","habitants":"Ratelet ; famille de Gabriel René Mesnil\r\n        \r\n        \r\n        \"","divers":"Deux châteaux à St-Hilaire ; Montalan grav-1-2 et Ratelet grav-3-4.","gps":"","images":["../image/image_45/45_St_Hilaire_Andr%c3%a9sis_1.jpg","../image/image_45/45_St_Hilaire_Andr%c3%a9sis_2.jpg","../image/image_45/45_St_Hilaire_Andr%c3%a9sis_3.jpg","../image/image_45/45_St_Hilaire_Andr%c3%a9sis_4.jpg"]},"Consult_chateau_formulairec19a":{"id":"Consult_chateau_formulairec19a","dept":"45","canton":"Montargis","commune":"St Hilaire sur Puiseaux","nom":"St_Hilaire_Puiseaux","type":"Château","periode":"XVI","histoire":"PONT; Philippe de Corquilleroy, seigneur du Pont, protestant, s'était réfugié près de Genève. En 1556, à la demande de l'Amiral de Coligny, Calvin le mit à la tête de missionnaires qui s'embarquèrent à Honfleur le 20 novembre 1556 pour coloniser le Brésil, mais l'expédition échoua. A la fin du XIXe siècle, le château a appartenu à Eugène Brieux, élu à lAcadémie française le 18 mars 1909, auteur de pièces à thèse, de comédies sociales dans la tradition de Dumas fils et d'Augier, ou, selon le mot de Jacques Copeau, de \"mélodrames d'idées\".","architecture":"PONT,  le château du Pont à Saint-Hilaire est le plus ravissant manoir qui se puisse imaginer. C'est une demeure rustique, basse, flanquée de deux tours massives coiffées de larges toits couverts de petites tuiles. Le bâtiment mire sa blancheur dans les eaux du Puiseaux qui s'étale à cet endroit en un large plan d'eau. Entouré de vastes pelouses et de peupliers frissonnants, c'est l'image même du calme et de la simplicité champêtre. Ce manoir est une construction rustique, basse à un seul niveau, coiffé dune haute toiture et flanqué de deux grosses tours rondes avec toitures en poivrière. Celle-ci couvertes de petites tuiles se reflètent dans les eaux de la rivière qui sétale en cet endroit en un large plan deau","habitants":"Philippe de Corquilleroy\r\n        \r\n        \"","divers":"A St Hilaire sur Puiseaux le château de Pont","gps":"","images":["../image/image_45/45_St_Hilaire_Puiseaux_1.jpg","../image/image_45/45_St_Hilaire_Puiseaux_2.jpg","../image/image_45/45_St_Hilaire_Puiseaux_3.jpg"]},"Consult_chateau_formulaire03bf":{"id":"Consult_chateau_formulaire03bf","dept":"45","canton":"Olivet","commune":"Olivet","nom":"St_Hilaire_St_Mesmin","type":"Chateaux","periode":"XVII-XX","histoire":"Trois châteaux  dans cet article; Boucheteau, Folleville et la Pie.                                                                              BOUCHETEAU, du XVIIIe siècle, située entre Loire et Loiret cette belle demeure se trouvait autrefois au milieu d'un vaste domaine de 100 hectares. La façade sur la rue est encadrée par deux petits pavillons en retour, tandis que sur l'arrière le logis présente, au rez-de-chaussée un avant-corps à pans coupés servant de vestibule. Le château a été construit au XVIIe siècle par un sieur Carré, qui prit le nom de Carré de Boucheteau. Celui-ci, bibliophile averti, légua aux prêtres de l'oratoire d'Orléans 3800 volumes pour former une bibliothèque qui serait ouverte au public. Ses descendants ont conservé la propriété jusqu'à la fin de l'Ancien Régime. Au XIXe siècle, divers propriétaires, hommes politiques, notables d'Orléans se sont succédé. En 1873, M. Leturque, marchant de biens, achète le domaine pour en faire une opération financière et revend les terres morcelées.                                                                                                        FOLLEVILLE, mentionnée dès le XIIIe siècle comme maison forte, l'actuelle construction de Folleville remonte au XVIIe siècle. L'ensemble a été restauré vers 1940. Le logis à rez-de-chaussée surélevé avec ses deux pavillons est disposé au fond de la cour d'honneur sur laquelle donnent la chapelle, le pigeonnier et les communs. La basse-cour contiguë prolonge le quadrilatère. L'ensemble des bâtiments est inclus dans un jardin clos de murs, séparé du parc forestier et des bois. Le château est relié au bourg de Saint-Hilaire par une route rectiligne tracée dans l'axe du logis.","architecture":"La PIE, avant le XIXe siècle, la propriété de la Pie était une closerie, petite exploitation entourée de murs ou de haies avec une maison d'habitation. En 1814, l'édifice est vendu à Vincent Caillard des célèbres diligences Laffitte et Caillard. Sa famille crée l'ile en contrebas de la propriété. La famille Delaugère en devient acquéreur en 1895 et fait raser l'aille gauche du bâtiment pour la reconstruire selon le modèle normand. On remplace les poutres de bois, utilisées pour ce type de construction, par des poutre en béton. Les sources de la Pie sont également habillées par ce même matériau. Après 1910, l'aile droite est rasée, puis reconstruite selon le modèle de la première, pour la famille du propriétaire suivant qui réalise aussi le pont en briques sur la Pie au droit de la venelle des \"Mauvais payeurs\". Au cours de la première guerre mondiale, les bâtiments du château sont réquisitionnés pour devenir un hôpital militaire complémentaire et accueillir les poilus blessés sur le front, propriété de la commune, il abrite l'hôtel de ville depuis 1978.","habitants":"Boucheteau ; sieur Carré.                                                          La PIE; famille de Vincent Caillard \r\n        \"","divers":"Trois châteaux à Olivet   Boucheteau, Folleville grav-2 et la Pie grav-3.","gps":"","images":["../image/image_45/45_St_Hilaire_St_Mesmin_1.jpg","../image/image_45/45_St_Hilaire_St_Mesmin_2.jpg","../image/image_45/45_St_Hilaire_St_Mesmin_3.jpg"]},"Consult_chateau_formulairef054-2":{"id":"Consult_chateau_formulairef054-2","dept":"45","canton":"Saint Jean de Braye","commune":"Saint Jean de Braye","nom":"St_Jean_de_Braye","type":"Château","periode":"XIII-XVIII-XIX","histoire":"Quatre châteaux dans cet article, Bionne,  Miramion et St-Loup.  Bastille, Charbonnière (voir article pour ce dernier).                                                                                        BIONNE,  construit en 1860, le château se compose d'un corps de logis prolongé de deux pavillons asymétriques, dont l'un est de forme polygonale. Au XIXe siècle, l'édifice a souvent été la résidence secondaire de propriétaires aisés; Jules Dulong maire de la commune en 1830, Jacques Drake del Castillo, député tourangeau et châtelain de Candé, Madame Parisot, agent de change à Monte Carlo, et la famille Lissac, fabricant de lunettes. Au début de loccupation Allemande en 1940, un centre de jeunesse fut installé au château recevant des jeunes en difficulté et des délinquants. Ces garçons avaient besoin dêtre remis sur les rails, selon le tribunal des jeunes délinquants. A la fin du XXe siècle, le château, au milieu de son parc, abritait une hôtellerie de charme. Aujourdhui, la propriété a été réduite et ont été livrés des appartements début 2010.                                            St-LOUP, en 1235, Saint-Louis et l'évêque d'Orléans firent de Saint-Loup un prieuré de bénédictines jusqu'à la Révolution. La pape Urbain VIII l'avait érigé en abbaye en 1636. Nombreuses furent les abbesses issues de familles célèbres, dont Marie Olympe de Chastillon qui commença la construction de l'édifice actuel. Aussi, au moment de la Révolution le couvent fut fermé. La bastille de Saint Loup joua un rôle important durant la guerre de Cent Ans. En 1429, le 4 mai, la forteresse de Saint Loup fut prise d'assaut par les troupes françaises placées sous l'autorité de Jehanne la pucelle, ce fait d'armes fut le premier exploit des trois réussites qui obligèrent les Anglais à lever le siège d'Orléans.","architecture":"MIRAMION,   bâti au XVIIIe siècle, appartenait aux Beauharnais d'Orléans, grands propriétaires fonciers pourvus de plusieurs seigneuries dans la région. Dès le XVe siècle, ils sont seigneurs de La Chaussée ou Miramion, fief de la paroisse de Saint-Jean-de-Braye. Au XVIIe siècle, il arriva à la jeune veuve de Jacques de Beauharnais, seigneur de Miramion, conseiller au Parlement, une mésaventure qui fit le tour de Paris. Enlevée par Bussy Rabutin et éprouvée par ce rapt, elle se retira dans un couvent. Madame de Miramion a porté très haut le nom de cette terre Orléanaise, en fondant ses propres institutions pour la protection et l'éducation des filles repenties et des femmes pauvres; \"les miriamones\". Avec l'appui du Roi, elle fonde la Pharmacie Centrale, qu'on peut considérer comme le point de départ de l'Assistance publique. L'hôtel de Nesmond sur le quai de la Tournelle est actuellement le musée des Hôpitaux de Paris. Révérée par ses contemporains, elle meurt en 1696.","habitants":"Bionne; famille Lissac St-Loup; Marie Olympe de Chastillon\r\n        \"","divers":"six châteaux à Saint Jean de Braye; Marcel désir grav-1 Bionne grav-2,  coquille grav-3 , longues ailes grav-4 Miramion grav-5 et St-Loup  Bastille gra-6-7-8,","gps":"","images":["../image/image_45/45_St_Jean_de_Braye_1.jpg","../image/image_45/45_St_Jean_de_Braye_2.jpg","../image/image_45/45_St_Jean_de_Braye_3.jpg","../image/image_45/45_St_Jean_de_Braye_4.jpg","../image/image_45/45_St_Jean_de_Braye_5.jpg","../image/image_45/45_St_Jean_de_Braye_6.jpg","../image/image_45/45_St_Jean_de_Braye_7.jpg","../image/image_45/45_St_Jean_de_Braye_8.jpg","../image/image_45/45_St_Jean_de_Braye_9.jpg"]},"Consult_chateau_formulairec139":{"id":"Consult_chateau_formulairec139","dept":"45","canton":"Saint-Jean-le-Blanc","commune":"Saint-Jean-le-Blanc","nom":"St_Jean_le_Blanc","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article; Cormes et la Jonchère.                                                                                                                                         CORMES, du XVIe siècle,  la famille Raoul de Cormes, vendit en 1275 la seigneurie que ses ancêtres possédaient depuis longtemps à la famille de Jean Barat, qui la céda en 1357 à Philippe Grossetête, vicomte d'Orléans. Pendant la guerre de Cent Ans, Nicolas Grossetête hypothèque le château, comme il ne pouvait rembourser ses dettes, ses créanciers demandèrent sa vente, il se retrancha dans le château, les gens du roi durent le prendre par la force. Mais dès la nuit suivante, Grossetête les en chassa et il fallut l'arrêter pour que l'ordonnance fut exécutée. En 1448, Pierre de Fontenil, son créancier était seigneur de Cormes. Il passa à Etienne de Foville vers 1495, qui l'hypothèque à nouveau en faveur de Pierre Briçonnet, qui en prit possession à la fin du XVe siècle. A ce moment, le château, entouré d'eau, était flanqué de six tourelles avec pont-levis, rempart et créneaux. Ruiné par les Anglais, Pierre Briçonnet le fit rebâtir en 1525 dans le style de la première Renaissance française. Quand on se souvient qu'une Briçonnet avait épousé M. Thomas Bohier, constructeur du château de Chenonceau on comprend l'élégance de Cormes et sa parenté avec le célèbre château de la Loire.","architecture":"CORMES, une douve demi-circulaire prolonge l'étang et entoure complètement l'ancien plan féodal qui est indiqué par les bases de deux tours rondes saillant à l'est. La façade Est est marquée de cinq pilastres plats et saillants, typiquement Renaissance, montant jusque sous l'entablement et couronnés de chapiteaux corinthiens. En horizontal, deux bandeaux saillants ornés de losanges coupent la façade et séparent les étages. Les portes sont décorées, à linteau en plein cintre, et surmontées d'un fronton triangulaire. Au début du XXe siècle, un bâtiment couvert en terrasse a été accolé le long de la façade arrière. Les neuf ouvertures gothiques en plein cintre proviennent de la démolition de l'Hôtel-Dieu d'Orléans. Deux pavillons de dépendances et deux tours basses carrées sont placées de façon symétrique de part et d'autre de l'allée d'arrivée. inscription par arrêté du 27 octobre 1971.                                                                                                       JONCHERE  du XVIIe siècle, de pur style Louis XIV, comprend un corps de logis flanqué de deux courtes ailes sur la façade et un perron à balustres y donne accès par une terrasse qui s'étend entre deux pavillons. Il est surmonté d'un toit à la Mansard. En 1685, le domaine avait été acheté par Henri Mercier, receveur général des Finances de l'Orléanais qui fit construire le château tel que nous le voyons actuellement. Il fut vendu à sa mort en 1717 au duc de Villars Brancas. Après une longue période d'abandon, il a été racheté en 1881 par le comte Hilaire de Lacombe qui le restaura et l'a transmis à ses descendants. Le château et ses 110 hectares de terrain boisé ont été racheté par la commune en 2011.","habitants":"Cormes; Pierre Briçonnet                                                                             Jonchère: Henri Mercier\r\n        \"","divers":"Deux châteaux   Saint-Jean-le-Blanc;  Cormes grav-4-5 et la Jonchère grav-2-3.Porte grav-6                                                              Cormes  47° 48' 16\" nord, 1° 56' 15\" est","gps":"","images":["../image/image_45/45_St_Jean_le_Blanc_1.jpg","../image/image_45/45_St_Jean_le_Blanc_2.jpg","../image/image_45/45_St_Jean_le_Blanc_3.jpg","../image/image_45/45_St_Jean_le_Blanc_4.jpg","../image/image_45/45_St_Jean_le_Blanc_5.jpg"]},"Consult_chateau_formulairebc7b-2":{"id":"Consult_chateau_formulairebc7b-2","dept":"45","canton":"Beaune-la-Rolande","commune":"Beaune-la-Rolande","nom":"St_Michel_45","type":"Forteresse","periode":"XV","histoire":"ST-MICHEL, vers 1320 Jean IV de La Taille hérita des biens de son oncle maternel Adam Boulain dont la motte fortifiée \"La Motte Boulain\" dont il ne reste que le vieux colombier et qui deviendra plus tard le château de Saint Michel. En 1489, Marie de La Taille (1448-1512) dame de La Motte Boulain, hérita du manoir de la Motte Boulain. Elle et son mari, Bertrand II de Longueau (1450-1494), rebaptisèrent château de Saint Michel le manoir de la Motte Boulain après l'avoir érigé en manoir seigneurial, avec murailles, fossés, herses, pont-levis et mâchicoulis. Ce château fut transmis depuis de pères en fils pendant les 15 générations suivantes. En 1536, à la mort de Jean VIII de Longueau de Saint Michel (1488-1536) sa veuve, Jeanne de Courcelles, fit ajouter la chapelle Saint Jean à l'église avec porte donnant sur le cimetière. La fidélité de Jean IX de Longueau à la cause royale en 1562, pousse les calvinistes à piller les châteaux de Saint Michel et de Parville, puis en 1576 à incendier et détruire celui de Saint Michel. En 1580, Jean IX de Longueau entreprend sa reconstruction, terminée par Jean X de Longueau en 1591, avec le donjon actuel (inscription en bas à gauche du réduit du rez-de-chaussée). Le château de Saint Michel sert d'hôpital en 1870 pendant les combats de Beaune la Rolande. En 1940, le château est occupé durant trois mois par une unité allemande. Appartient aujourd'hui au lieutenant colonel Jean-Louis de Longeau qui à fêté en 1989 le cinquième centenaire de la présence de sa famille sur le domaine.","architecture":"St- MICHEL,  du château-fort médiéval ne subsistent aujourd'hui que le châtelet d'entrée et la tour nord réutilisée en colombier. Élevé de trois niveaux, le châtelet se compose d'un passage voûté d'un berceau en brique. Les deux étages carrés étaient à usage d'habitation. Le pont-levis primitif a été remplacé par un pont dormant. Le colombier, de plan circulaire, comporte deux niveaux et un étage sous comble qui abrite les boulins. L'escalier est enfermé dans une cage en pan-de-bois et torchis.   Inscription par arrêté du 6 avril 1989. A gauche de la cour d'honneur s'élevait  le corps de logis cantonné de tours coiffées en poivrière à deux de ses angles, détruit au XVIe siècle conservant les tours  d'angle et une partie de l'ancienne construction, le bâtiment élevé sur trois niveaux et couvert d'un toit à deux pentes, présente sur la cour  des fenêtres à arc segmentaire. A droite du châtelet d'entrée s'élève une aile basse de communs, cantonnée d'une tourelle d'angle.","habitants":"Famille de  Bertrand II de Longueau \r\n        \"","divers":"A la Beaune-la-Rolande le château de Saint-Michel","gps":"","images":["../image/image_45/45_St_Michel_45_1.jpg","../image/image_45/45_St_Michel_45_2.jpg","../image/image_45/45_St_Michel_45_3.jpg","../image/image_45/45_St_Michel_45_4.jpg"]},"Consult_chateau_formulairecb2a":{"id":"Consult_chateau_formulairecb2a","dept":"45","canton":"Châtillon-Coligny","commune":"Châtillon-Coligny","nom":"Ste_Geneviève_Bois","type":"Château","periode":"XVII-XIX","histoire":"Trois châteaux dans cet article, Bellecour, Brochard et Buisson. et vestiges de Briquemaux.                                                                      BELLECOUR, le château de Bellecour dit château de la Renardière ou de l'Arvaudière est une construction du XVIIIe siècle, la chapelle élevée en 1788 par M. de Falaiseau, vendue comme bien national, a disparu; en 1872, l'architecte Le Faure modifie la distribution, la ferme contemporaine subit des modifications à la fin des années 1880; le parc est planté d'essences recherchées (cèdres bleus de l'atlas, hêtres rouges.) qui sont peut-être à mettre en rapport avec l'arboretum des Barres. La travée centrale des deux façades principales est en pierre de taille, et bien que le sol soit riche en silex, les bâtiments sont construits  en moellons de calcaire enduits.                                                                                                                   BRIQREMAULT, vestiges  construit au XIIIe ou au XIVe siècle, Pregrimault est anéanti en 1359 par les Anglais. En 1374, est cité Adam de Prégrimault, écuyer, le fief et le château se reconstituent à partir de 1462. François de Beauvais de Briquemault, étroitement lié à Coligny et rendu responsable de cruelles exactions contre les catholiques dans le troisième quart du XVIe siècle, aurait reconstruit le château, mais rien ne reste de cette campagne de travaux, François est exécuté en 1572. Vers 1640, les Briquemault se convertissent au catholicisme, en 1706, le château de Briquemault passe au seigneur de Châtillon. En 1752, les Montmorency Luxembourg obtiennent que leur terre de Briquemault soit érigée en marquisat.","architecture":"BROCHARD, édifié à la fin du XIXe siècle par la famille Morris a été édifié à l'emplacement de l'ancien rendez-vous de chasse de la famille de Coligny qui fut détruit puis reconstruit et transformé à maintes reprises. Le château comprend un pavillon du XVIIe siècle, un corps de bâtiment du XVIIIe siècle, et un pavillon rehaussé après 1880, élévation à travées, un étage carré  de comble. Gros-oeuvre : calcaire , moellon, enduit,   toit à longs pans en  croupe et toit en pavillon recouvert  en ardoise.                                                                                                    La RIVIERE, est caché dans les arbres qui l'enserrent de toutes parts. Cette imposante bâtisse, a un étage carré et étage de comble, flanquée de deux pavillons coiffés d'un toit à l'impérial, a été construite au XIXe siècle. Les encadrements et piédroits des baies sont en brique                                             BUISSON, la ferme du buisson est représentée sur le cadastre de 1831, elle a été très remaniée, le château est construit dans le deuxième quart du XIXe siècle, après 1831, il comprend un corps de bâtiment à deux niveaux avec, sur la façade principale sud, une travée centrale accostée d'un ordre ionique. Dans la deuxième moitié XIXe siècle la travée est surélevée par un grand clocheton, Au début du XXe siècle, on ajoute un corps latéral en rez-de-chaussée à l'ouest, vers 1940 on détruit le clocheton, on agrandit le corps par la construction d'un pavillon d'angle et par la surélévation du corps latéral. L'escalier à double volée de la façade sud est remplacé par une terrasse.","habitants":"Briquemault; François de Beauvais de Briquemault      Brochard; famille de Coligny         \r\n        \r\n        \"","divers":"Trois châteaux à Châtillon-Coligny grav 4-5-6 , Bellecour -3, Brochard -4  et Buisson grav-5. Briquemaux grav 1-2                                         Bois-Joli  47° 49' 06\" nord, 2° 47' 32\" est                                       Brochard  47° 49' 39\" nord, 2° 49' 12\" est                                          Buisson  47° 50' 02\" nord, 2° 47' 02\" est","gps":"","images":["../image/image_45/45_Ste_Genevi%c3%a8ve_Bois_1.jpg","../image/image_45/45_Ste_Genevi%c3%a8ve_Bois_2.jpg","../image/image_45/45_Ste_Genevi%c3%a8ve_Bois_3.jpg","../image/image_45/45_Ste_Genevi%c3%a8ve_Bois_4.jpg","../image/image_45/45_Ste_Genevi%c3%a8ve_Bois_5.jpg","../image/image_45/45_Ste_Genevi%c3%a8ve_Bois_6.jpg","../image/image_45/45_Ste_Genevi%c3%a8ve_Bois_7.jpg"]},"Consult_chateau_formulaire4b2e":{"id":"Consult_chateau_formulaire4b2e","dept":"45","canton":"Neuville-aux-Bois","commune":"Neuville-aux-Bois","nom":"Sully_la_Chapelle","type":"Château","periode":"XV-XVI-XVII","histoire":"Trois châteaux dans cet article; Centimaison, Claireau et la Motte des Ruets.                                                                                                CENTIMAISON, il s'agit actuellement d'un ancien château fortifié entouré de ses douves en eau. On y accède par un pont dormant de pierre, donnant accès à une porte protégée par deux murs qui ont gardé des traces de meurtrières. La place forte conserve une enceinte avec des restes de tours. La maison d'habitation construite sur deux niveaux, de facture très simple, est flanquée de deux tours dont l'une ne présente plus que sa base, supportée par deux corbeaux. D'après les rumeurs locales, l'édifice, qui ne manque pas d'authenticité, aurait appartenu à la famille de Polignac.                                                                                     la MOTTE des RUETS, cette terre relevait de la châtellenie de Vitry-aux-Loges. Elle remonte au XVIe siècle, et le château de cette époque avait été construit sur une motte féodale. La maison actuelle qui le remplace est de construction plus récente, d'une architecture sobre. À la fin du XIXe siècle, le propriétaire, Alexandre Jarry, était un érudit très réputé en 1860 par ses nombreuses études. Son fils, René Jarry prit sa succession et mourut en 1930. Le manoir est situé au cur d'un beau parc et possède un ancien colombier.","architecture":"CLAIREAU, ce château comprend un vaste corps de logis du XVIIe siècle flanqué de deux tours circulaires, seuls vestiges de l'ancien manoir féodal qui avait appartenu à Richard de Longueau, maître de la garde de Courcy en forêt d'Orléans, avant de passer en 1524 à Jean de Pathay, dont le petit-fils Claude épousa en 1602 Louise du Lac, fille de Lancelot du Lac, seigneur de Chamerolles, Claude de Pathay fut seigneur de Claireau de 1636 à 1643. Puis la seigneurie de Claireau fut érigée en baronnie et passa à la famille des du Benay, c'est ainsi que François René, marquis du Bellay et baron de Claireau, époux de Marthe-Suzanne de Rochechouart, rebâtit en 1699 le château. Il resta dans la même famille jusqu'à ce qu'il fut acheté en 1733 par Louis François Roussel, baron de Courcy, conseiller au Parlement. Les terres de Courcy et de Claireau furent ensuite réunies et érigées en marquisat en 1751 par Louis XV en récompense des services rendus au Parlement par Louis Francois Roussel et sa famille, et à l'armée par un de ses fils mort des blessures reçues à Fontenoy.","habitants":"Centimaison; famille de Polignac                                              La Motte; Alexandre Jarry                                               Claireau; famille des du Benay\r\n        \"","divers":"Trois châteaux à Neuville-aux-Bois ; Centimaison Grav-1-2-3-4   Claireau grav-5-6 et la Motte des Ruets grav 8.","gps":"","images":["../image/image_45/45_Sully_la_Chapelle_1.jpg","../image/image_45/45_Sully_la_Chapelle_2.jpg","../image/image_45/45_Sully_la_Chapelle_3.jpg","../image/image_45/45_Sully_la_Chapelle_4.jpg","../image/image_45/45_Sully_la_Chapelle_5.jpg","../image/image_45/45_Sully_la_Chapelle_6.jpg","../image/image_45/45_Sully_la_Chapelle_7.jpg","../image/image_45/45_Sully_la_Chapelle_8.jpg"]},"Consult_chateau_formulairef595":{"id":"Consult_chateau_formulairef595","dept":"45","canton":"Sully sur Loire","commune":"Sully sur Loire","nom":"Sully_sur_Loire","type":"Forteresse","periode":"XI-XIV-XVII","histoire":"SULLY sur LOIRE, une forteresse est attestée au XIe siècle, certains historiens évoquent l'existence d'un fort. En 1381, la demeure des seigneurs de Sully revient par alliance aux seigneurs de la Trémoille, qui entreprennent la construction du \"Donjon\", imposante bâtisse flanquée de quatre tours, la forteresse prend alors l'aspect général qu'elle a conservé aujourd'hui. Jusqu'à 1602, année où Sully \" Maximilien de Béthune \" ministre du roi Henri IV acquiert le château, les principaux travaux portent sur les jardins et l'édification du Petit château, ensemble de bâtiments à vocation résidentielle, le premier duc de Sully va mobiliser beaucoup de temps et une part de sa fortune pour adapter la demeure à ses goûts : il fait renforcer les levées, pour se protéger des désastreuses crues de la Loire, crée un grand parc d'agrément, réaménage le \"Petit château\". Il édifie une tour supplémentaire au sud-ouest, et crée des galeries couvertes. En 1638, peu de temps avant sa mort, Sully fait imprimer au château les économies royales, ses fameux Mémoires. Le château ne quittera plus la famille de Béthune Sully jusqu'en 1962. Propriété du conseil général du Loiret depuis 1962, après être restée quatre siècles durant dans la famille des Béthune Sully.","architecture":"SULLY SUR LOIRE,  le château est entouré de douves encore en eau et comprend deux parties distinctes: le donjon et le petit château. Il est bâti au confluent de la Loire et de la Sange. Le donjon, édifice rectangulaire cantonné de quatre tours circulaires et doté d'une porte à deux tours vers le sud, correspond à la campagne de Guy de la Trémoille.  Le donjon du château offre un cas remarquable de logis à tours rondes de la fin du XIVe siècle, consacré à l'apparat, il est doublé par un logis privé de même structure interne, mais bien plus intime. Il comprend un logis et deux tours, dont une, celle du sud -est, a été construite au milieu du XVe siècle sur une tour plus ancienne, alors que l'autre, dite tour de Béthune, plus basse et terrassée, est une tour à canon bâtie en 1605. Le logis, élevé dans la première moitié du XVe siècle, fut à partir du XVIe siècle, la résidence des seigneurs de Sully. Les intérieurs ont été réaménagés (décor et mobilier) au XIXe siècle. Le corps qui joint le petit château au donjon a été rajouté au XVIIIe siècle et refait après l'incendie de 1918. La basse-cour à l'est, aujourd'hui nue, contenait autrefois le donjon bâti par Philippe Auguste peu avant 1219 à l'occasion d'une confiscation de la seigneurie.","habitants":"Maximilien de Béthune \r\n        \"","divers":"A Sully sur Loire,       Sully   47° 46' 04\" nord, 2° 22' 31\" est","gps":"","images":["../image/image_45/45_Sully_sur_Loire_1.jpg","../image/image_45/45_Sully_sur_Loire_2.jpg","../image/image_45/45_Sully_sur_Loire_3.jpg","../image/image_45/45_Sully_sur_Loire_4.jpg","../image/image_45/45_Sully_sur_Loire_5.jpg","../image/image_45/45_Sully_sur_Loire_6.jpg","../image/image_45/45_Sully_sur_Loire_7.jpg","../image/image_45/45_Sully_sur_Loire_8.jpg"]},"Consult_chateau_formulairecdb7":{"id":"Consult_chateau_formulairecdb7","dept":"45","canton":"Sully sur Loire","commune":"Sully sur Loire","nom":"Sully_sur_Loire_II","type":"Château","periode":"XVII-XIX-XX","histoire":"Deux châteaux dans cet article; Buissons,Guillaume et la Huardière.                                                                                                  GUILLAUMES  du XVIII-XXe siècle, les Guillaumes sont la maison d'enfance de l'artiste François Xavier d'Hérouville, qui a passé là sa jeunesse au contact de la nature, à sillonner les chemins de Sologne, nature dont il va nourrir son inspiration. Pionniers du Récup'Art, il a donné vie à tout un fabuleux bestiaire, en créant des sculptures singulières, cocasses et poétiques, à partir de vieux outils agricoles et de bouts de ferrailles récupérés.   La famille d'Hérouville, d'origine normande, s'est installée en Sologne au XIXe siècle, après avoir acquis cette propriété.                                                                                                        BUISSONS, du XIXe siècle, on y décèle deux phases de construction bien que l'ensemble affirme un caractère d'uniformité qui, tel qu'il se présente actuellement, date de 1879, sur loire  , conçu pour Henry Jahan, conseiller d'État et sénateur du Loiret. Il apparaît en fait qu'une première maison avait été édifiée par Edme Durand des Herpinières, qui fut agrandie, et il est permis de supposer que la lucarne en pierre date de cette construction d'origine, menée par ce propriétaire qui était ingénieur des Ponts et Chaussées. Le plus ancien seigneur connu du lieu, Pierre Thibault, est mentionné en 1403 dans un acte de foi et hommage. Rien ne subsiste d'une quelconque demeure de cette époque sur la propriété qui passa, par succession féminine, aux propriétaires actuels, en restant dans la même famille.","architecture":"GUILLAUMES, cette élégante gentilhommière, restaurée avec goût, est composée d'un corps de logis a quatre travées et à un étage carré, flanqué d'une tour un peu plus haute. Les ouvertures sont encadrées de brique, avec linteau en arc surbaissé ou linteau cintré. Les communs, couverts de tuiles plates avec trois lucarnes en bâtière sur le versant du toit, s'ouvrent par trois portes en plein cintre.                            HUARDIERE du XXe siècle, au bout d'une allée bordée de cèdres, on découvre cette propriété entourée d'un vaste parc. La Huardière n'était à l'origine qu'une ferme, dont les bâtiments datent du XVIIIe siècle: on peut toujours voir, inscrite sur une poutre, la date de 1778. Le château de style Louis XVI, inspiré du Petit Trianon, a été construit en 1920 par M. Pagnon, joaillier parisien, qui en dessina lui-même les plans. On remarque la toiture en terrasse ceinte d'une élégante balustrade de pierre, balustrade que l'on retrouve au balcon surmontant l'avant-corps central, et sur le petit pavillon latéral. Après 1945, de nombreux propriétaires se sont succédé dont un antiquaire fameux de la rue des Saints-Pères. L'actuelle propriétaire est tombée amoureuse de ce domaine et des charmes du Val de Loire. Membre d'associations scientifiques et culturelles internationales, mécène de manifestations culturelles, elle met en place des projets qui se dérouleront dans le cadre du château.","habitants":"Guillaumes ; François Xavier d'Hérouville                             Buissons; Edme Durand des Herpinières,                      Huardières;  M. Pagnon\r\n        \r\n        \"","divers":"Deux châteaux à  Sully sur Loire  Buissons grav-3, Guillaume et la Huardière grav 1-2.                                                          Huardière  47° 46' 42\" nord, 2° 19' 58\" est                                       Buissons 47° 43' 54\" nord, 2° 22' 31\" est","gps":"","images":["../image/image_45/45_Sully_sur_Loire_II_1.jpg","../image/image_45/45_Sully_sur_Loire_II_2.jpg","../image/image_45/45_Sully_sur_Loire_II_3.jpg"]},"Consult_chateau_formulaire0534":{"id":"Consult_chateau_formulaire0534","dept":"45","canton":"Briare","commune":"Briare","nom":"Thou","type":"Château","periode":"XV-XVIII","histoire":"Autres châteaux Linière, la Chaise et du Puits                                     THOU,  date de 1840, les bâtiments de la ferme adjacente sont bien antérieurs et présentent un indéniable intérêt architectural: ils abritent les vestiges d'un manoir du XVe siècle. Ces dépendances forment un bel ensemble bien restauré, auquel les toitures en petites tuiles plates aux tons fanés donnent une remarquable unité. Le logis est composé de deux bâtiments, dont le principal, d'époque Renaissance, est couvert d'un toit à longs pans percé de deux petites lucarnes. À l'intérieur, des boiseries d'époque habillent encore les murs. Le grenier, dont l'escalier possède une rampe en bois sculpté, est couvert d'une charpente en coque de navire renversée. En face du manoir une longue aile abrite les communs couverts d'un toit à la Mansart. Sur le flanc sud-est du manoir se dresse un important pigeonnier circulaire, dont la toiture conique, en tuiles plates, est surmontée d'un lanternon en ardoise. On remarque l'élégante lucarne d'envol à fronton triangulaire.                                                                                                                           La CHAISE, au XVIIIe siècle, on trouve Terrier de La Chaise comme possesseur du château. L'imposant édifice, d'époque Louis XIII, fut très remanié au XIXe siècle. Les éléments les plus anciens se trouvent dans les bâtiments de dépendances placés en équerre du corps de logis principal, cette aile consiste en un long rectangle au toit en croupe avec deux tours circulaires à poivrière encadrant sa façade postérieure. Le château présente une façade à trois travées, un étage et un autre sous combles, éclairé par des lucarnes. La travée centrale comprend une porte en plein cintre surmontée d'un balcon à balustres, et ponctuée par une lucarne imposante, richement ornementée.","architecture":"A deux KM au nord Batilly en Puisaye; La TUILERIE; d'origine fut édifié au XVe siècle. Au XVIe siècle, il appartient à la famille de Givarlay. En 1648, Champoulet est acquis par la Compagnie des seigneurs du canal de Loire en Seine, qui y réalise d'importants travaux d'embellissement, donnant au château de la Tuilerie l'allure qu'il a aujourd'hui. Jacques Guyon, seigneur du Chesnoy, porte le titre de seigneur de Champoulet. Le château fut un haut lieu de l'histoire pendant la Fronde: c'est là que se déroula, en 1652, la bataille décisive entre les cavaliers de Turenne et les troupes du Grand Condé, victoire qui sauva la couronne du jeune roi Louis XIV. Une demi lune marque l'entrée de cette belle demeure, dont les pelouses bordées de buis taillés en topiaires sont séparées de la route par un saut-de-loup. Des douves en eau baignent le pied du château, auquel on accède par un élégant pont. Les toitures, percées de lucarnes de pierre et à frontons sculptés, donnent une allure très \"Grand Siècle\" à cet ensemble. Le corps de logis central, composé d'un rez-de-chaussée et de deux étages surmontés de combles, est flanqué de 2 pavillons asymétriques. Accolée à l'un des pavillons, la chapelle laisse deviner l'arrondi de son abside.","habitants":"La Chaise;Terrier de La Chaise                                                         la Tuilerie ; famille de Givarlay       \r\n        \"","divers":"A Briare, château de Linière grav-1, cde la Chaise grav-2 , du Puitsgrav-3 , de la Thou grav-4-5","gps":"","images":["../image/image_45/45_Thou_1.jpg","../image/image_45/45_Thou_2.jpg","../image/image_45/45_Thou_3.jpg","../image/image_45/45_Thou_4.jpg","../image/image_45/45_Thou_5.jpg"]},"Consult_chateau_formulaire147f":{"id":"Consult_chateau_formulaire147f","dept":"45","canton":"Jargeau","commune":"Jargeau","nom":"Tigy_II","type":"Château","periode":"XIX","histoire":"trois châteaux dans cet article ; la caille   Montgerlon, Montisambert.                                                                                                               La CAILLE,  était au XVIIIe siècle la principale seigneurie des sieurs de Tigy, qui la tenaient en plein fief du duc de Sully. En face de Molaine, le petit château, en briques roses dans l'écrin de ses pelouses avec sa façade surmontée d'un fronton, a été reconstruit en 1866. Le château appartient à cette époque au baron de Morogues. De la tuilerie-briqueterie de La Caille, élément essentiel de l'économie domaniale en Sologne où la pierre es
